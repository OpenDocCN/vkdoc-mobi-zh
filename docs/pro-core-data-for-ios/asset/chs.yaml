- "# 开始入门\n\n如果你误读了本书的标题，以为它讨论和解读的是核心转储，并希望它能帮你调试一个棘手的应用崩溃问题，那你拿错了书。请去找调试器、内存工具，并预约一下验光师。否则，你购买、借阅、通过某种方式获得这本书，是因为你想更好地理解和在\
  \ iOS 应用中实现 Core Data。那么，你拿对了书。\n\n你或许正捧着一本纸质书阅读，它厚重结实，隐约散发着装订胶水的味道。你或许在 nook、iPad、Kindle、Sony\
  \ Reader、Kobo eReader 或其他电子书阅读器上翻动这些页面。你或许正盯着电脑屏幕——无论是笔记本电脑、上网本还是显示器——一边阅读几行文字，一边告诉自己别去管屏幕边缘像\
  \ CNN 滚屏一样刷新的 Twitter 信息流。在阅读时，你知道自己不仅可以随时停下来，还可以随时继续。无论何时你想读这本书，都可以拿起来。如果你标记了上次读到的位置，甚至可以从上次停下的地方重新开始。对于书籍来说，我们对此习以为常。\n\
  \n用户对于应用也抱有同样的期望。\n\n用户期望每次启动应用时都能找到他们的数据。苹果的 Core Data 框架能帮助你确保这一点。本章将向你介绍 Core\
  \ Data，解释它是什么、如何诞生，以及如何为 iOS 构建基于 Core Data 的简单应用。本书将带你走过 Core Data 的简单与复杂。请利用书中的信息，创建能够可靠、高效地存储和检索数据的应用，让用户能够信赖他们的数据。不过，请谨慎编写代码——你肯定不想写出有漏洞的代码，然后不得不处理棘手的应用崩溃问题。\n\
  \n\n\n### 什么是 Core Data？\n\n当人们使用电脑时，他们期望能够保留在完成任务过程中取得的任何进展。保存进度对于办公软件、代码编辑器以及涉及小个子水管工的游戏来说至关重要，这就是程序员所说的*持久化*。大多数软件都需要持久化能力，即存储和检索数据的能力，这样用户就不必在每次使用应用程序时重新输入所有数据。有些软件可以在没有任何数据存储或检索的情况下运行；计算器、水平仪以及那些会发出恼人或粗俗声音的应用就是典型的例子。然而，大多数有用的应用程序都会保留某些状态，无论是面向配置的数据、实现某个目标的进度，还是用户创建并关心的大量相关数据。理解如何在\
  \ iOS 设备上持久化数据，对于大多数有意义的 iOS 开发至关重要。\n\nApple 的 Core Data 提供了一个功能强大的持久化框架。Core Data\
  \ 并非唯一的数据存储选项，也并非在所有场景下都是最佳选择，但它与 Cocoa Touch 开发框架的其他部分配合良好，并且能很好地映射到对象。Core Data\
  \ 隐藏了数据存储的大部分复杂性，让你能够专注于让你的应用程序变得有趣、独特或易于使用。\n\n尽管 Core Data 可以将数据存储在关系型数据库（例如 SQLite）中，但它本身并不是一个数据库引擎。它甚至不一定非得使用关系型数据库来存储数据。虽然\
  \ Core Data 提供了一个实体关系图工具，但它不是一个数据建模器。它不像 Hibernate 那样是一个数据访问层，尽管它提供了许多相同的对象-关系映射功能。相反，Core\
  \ Data 将这些工具的最佳特性整合到一个数据管理框架中，允许你以一种类似于在常规面向对象编程中处理的对象图的方式来处理实体、属性和关系。\n\n早期的 iPhone\
  \ 程序员没有 Core Data 框架的强大功能来存储和检索数据。下一节将向你展示 iOS 中持久化背后的历史。\n\n### iOS 中的持久化历史\n\n\
  Core Data 源自在 NeXT 技术基础上的演进，最初是经由 WebObjects 的关系是从名为“企业对象框架”（EOF）的技术演变而来，WebObjects\
  \ 是另一项 NeXT 技术，至今仍为苹果网站的部分功能提供支持。它于 2005 年首次作为 Mac OS X 10.4（\"Tiger\"）的一部分亮相，但直到\
  \ 2009 年 6 月发布的 SDK 3.0 版本才出现在 iPhone 上。在 Core Data 出现之前，iPhone 开发者在持久化方面有以下选择：\n\
  \n- 使用属性列表，其中包含各种数据类型键值对的嵌套列表。\n- 使用 SDK 的 `NSCoding` 协议将对象序列化到文件。\n- 利用 iPhone\
  \ 对关系型数据库 SQLite 的支持。\n- 将数据持久化到互联网云端。\n\n开发者在构建第一波涌入苹果 App Store 的应用时，使用了所有这些数据存储机制。这些存储选项中的每一个仍然可行，并且开发者在使用更新版本的\
  \ SDK 构建新应用时继续使用它们。\n\n然而，这些选项都无法与 Core Data 的强大功能、易用性以及与 Cocoa 的良好兼容性相媲美。尽管在 Core\
  \ Data 问世之前的时代，有像 `FMDatabase` 或 `ActiveRecord` 这样的框架来简化 iOS 上的持久化处理，但当 Core Data\
  \ 可用时，开发者们还是感激地投向了它的怀抱。\n\n虽然 Core Data 可能并非最佳地解决所有持久化问题，并且你可能会使用其他手段（如前面列出的选项）来解决某些持久化场景，但你大多数情况下还是会求助于\
  \ Core Data。当你阅读本书，了解 Core Data 解决的问题以及它解决问题的优雅方式后，你很可能会在任何可能的时候使用 Core Data。随着新的持久化需求的出现，你不会问自己“我应该为此使用\
  \ Core Data 吗？”，而是会问：“有什么理由*不*使用 Core Data 吗？”\n\n下一节将向你展示如何使用 Xcode 的项目模板构建一个基本的\
  \ Core Data 应用程序。即使你已经生成了一个 Xcode Core Data 项目，并且知道要点击哪些按钮和复选框，也不要跳过下一节。它将解释模板生成的与\
  \ Core Data 相关的代码部分，并形成一个理解基础，本书的其余部分将在此基础上展开。\n\n### 创建一个基础的 Core Data 应用程序\n\n\
  Core Data 的众多方面、类以及细微差别值得进行精妙的分析和深入的讨论，以教会你掌握 Core Data 复杂性所需的一切知识。然而，建立支持理论的实践基础对于掌握同样至关重要。本节将使用\
  \ Xcode 内置模板之一构建一个简单的基于 Core Data 的应用程序，然后剖析其 Core Data 相关代码中最关键的部分，以展示它们的作用以及如何交互。在本节结束时，你将理解这个应用程序如何与\
  \ Core Data 交互以存储和检索数据。\n\n#### 理解 Core Data 组件\n\n在构建本节的基础 Core Data 应用程序之前，你应该对\
  \ Core Data 的各个组件有一个高层次的理解。图 1-1 展示了你将在此节中构建的应用程序的关键元素。请查看此图，以鸟瞰视角了解此应用程序实现了什么，其所有部分如何匹配，以及为什么需要它们。\n\
  \n作为 Core Data 的用户，你绝不应直接与底层持久化存储交互。Core Data 的基本原则之一是持久化存储应对用户进行抽象。这样做的一个关键优势是，将来能够无缝地更改后端存储，而无需修改其余代码。你应该尝试将\
  \ Core Data 描绘成一个管理对象持久化的框架，而不是想着数据库。毫不奇怪，由该框架管理的对象必须继承自 `NSManagedObject`，通常被称为托管对象。不过，不要认为\
  \ Core Data 组件命名约定中缺乏想象力就表明这是一个缺乏想象力或平庸的框架。事实上，Core Data 在将所有对象图相互依赖、优化和缓存保持在可预测状态方面做得非常出色，因此你无需为此担忧。如果你曾经尝试构建自己的对象管理框架，你就会明白\
  \ Core Data 为你解决的问题是多么复杂。\n\n![images](img/0101.jpg)\n\n**图 1-1.** *Core Data 组件概览*\n\
  \n就像我们需要一个宜居的环境才能生存一样，托管对象必须存在于一个适合它们生存的环境中，通常称为*托管对象上下文*，或简称为*上下文*。上下文不仅会跟踪你正在更改的对象的状态，还会跟踪所有依赖于它或它所依赖的对象的状态。你应用程序中的\
  \ `NSManagedObjectContext` 对象提供了这个上下文，并且是你的代码必须始终能够访问的关键属性。你通常通过让应用程序委托初始化 `NSManagedObjectContext`\
  \ 对象并将其作为其属性之一暴露给应用程序，来实现对该对象的访问。你的应用程序上下文通常也会将 `NSManagedObjectContext` 对象提供给主视图控制器。没有上下文，你将无法与\
  \ Core Data 交互。\n\n\n\n### 创建新项目\n\n首先，启动`Xcode`，通过菜单选择`File` ![images](img/U001.jpg)\
  \ `New` ![images](img/U001.jpg) `New Project`来创建一个新项目。请注意，你也可以通过按下 ![images](img/U004.jpg)\
  \ + ![images](img/U005.jpg) +`N` 来创建新项目。从应用程序模板列表中，在左侧的`iOS`下选择`Application`项，然后在右侧选择`Master-Detail\
  \ Application`。点击`Next`，在下一个屏幕的`Product Name`字段中输入`BasicApplication`，在`Company Identifier`字段中输入`book.coredata`，取消勾选`Use\
  \ Storyboard`，并勾选`Use Core Data`。参见图 1-2。点击`Next`按钮，选择`Xcode`将创建`BasicApplication`目录和项目的父目录，然后点击`Create`。`Xcode`会创建你的项目，生成项目文件，并在其\
  \ IDE 窗口中打开所有生成的文件，如图 1-3 所示。\n\n![images](img/0102.jpg)\n\n**图 1-2.** *使用 Core\
  \ Data 创建新项目*\n\n![images](img/0103.jpg)\n\n**图 1-3.** *Xcode 显示你的新项目*\n\n### 运行新项目\n\
  \n在深入研究代码之前，先运行它看看效果。点击`Run`按钮启动应用程序。`iPhone Simulator`会打开，应用程序会显示基于导航的界面，如图 1-4\
  \ 所示，其中表格视图占据了屏幕大部分区域，左上角有一个`Edit`按钮，右上角是常规的、用加号表示的`Add`按钮。应用程序的表格显示了一个空列表，表明应用程序没有识别到任何事件，这正是生成的`Xcode\
  \ Core Data`项目所存储的状态。通过点击应用程序右上角的加号按钮，创建一个带有当前时间戳的新事件。\n\n![images](img/0104.jpg)\n\
  \n**图 1-4.** *带有空白屏幕的基础应用程序*\n\n现在，点击`Xcode IDE`中的`Stop`按钮停止应用程序。如果应用程序没有使用 Core\
  \ Data 持久化存储，那么退出时就会丢失刚刚创建的事件。在没有持久化存储的情况下使用此应用维护一个事件列表将是一项西绪福斯式的任务——你必须在每次启动应用时重新创建这些事件。然而，由于应用程序使用了持久化存储，它通过`Core\
  \ Data`框架保存了你创建的事件。重新启动应用程序后，事件依然存在，如图 1-5 所示。\n\n![images](img/0105.jpg)\n\n**图\
  \ 1-5.** *包含持久化事件的基础应用程序*\n\n### 理解应用程序的组件\n\n该应用程序的结构相对简单。它包含一个描述数据存储中实体的数据模型，一个促进视图与数据存储交互的视图控制器，以及一个帮助初始化和启动应用程序的应用委托。图\
  \ 1-6 展示了涉及的类以及它们之间的关系。\n\n![images](img/0106.jpg)\n\n**图 1-6.** *BasicApplication\
  \ 示例中涉及的类*\n\n注意负责管理用户界面的`MasterViewController`类拥有一个指向托管对象上下文的句柄，以便与 Core Data 交互。当你阅读代码时，你会发现`MasterViewController`类是从应用委托中获取托管对象上下文的。这发生在控制器的`initWithNibName:bundle:`方法中，如下所示：\n\
  \n```\n- (id)initWithNibName:(NSString *)nibNameOrNil bundle:(NSBundle *)nibBundleOrNil\n\
  {\n  self = [super initWithNibName:nibNameOrNil bundle:nibBundleOrNil];\n  if (self)\
  \ {\n    self.title = NSLocalizedString(@\"Master\", @\"Master\");\n    id delegate\
  \ = [[UIApplication sharedApplication] delegate];\n    self.managedObjectContext\
  \ = [delegate managedObjectContext];\n  }\n  return self;\n}\n```\n\n名为`BasicApplication.xcdatamodeld`的入口（实际上文件系统中的一个目录）包含数据模型`BasicApplication.xcdatamodel`。数据模型是每个\
  \ Core Data 应用程序的核心。这个特定的数据模型仅为应用程序定义了一个名为`Event`的实体。`Events`被定义为仅包含一个名为`timeStamp`、类型为`Date`的属性的实体，如图\
  \ 1-7 所示。\n\n![images](img/0107.jpg)\n\n**图 1-7.** *Xcode 生成的数据模型*\n\n`Event`实体的类型是`NSManagedObject`，这是\
  \ Core Data 管理的所有实体的基本类型。第 2 章将更详细地解释`NSManagedObject`类型。\n\n\n\n### 获取结果\n\n下一个值得关注的类是`MasterViewController`。打开它的头文件（`MasterViewController.h`）会看到两个属性：\n\
  \n```\n@property (strong, nonatomic) NSFetchedResultsController *fetchedResultsController;\n\
  @property (strong, nonatomic) NSManagedObjectContext *managedObjectContext;\n```\n\
  \n这些属性的定义语法与任何 Objective-C 类属性相同。`NSFetchedResultsController`是 Core Data 框架提供的一种控制器类型，用于帮助管理查询结果。`NSManagedObjectContext`则是应用持久化存储的一个句柄，它提供了一个上下文或环境，供托管对象在其中存在。\n\
  \n`MasterViewController`的实现（位于`MasterViewController.m`中）展示了如何与 Core Data 框架交互以存储和检索数据。`MasterViewController`的实现为`fetchedResultsController`属性提供了一个显式的\
  \ getter 方法，该方法预先配置了该属性，以便从数据存储中获取数据。\n\n创建获取控制器的第一步是创建一个用于检索`Event`实体的请求，如下面来自`fetchedResultsController`访问器的代码所示：\n\
  \n```\nNSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];\nNSEntityDescription\
  \ *entity = [NSEntityDescription entityForName:@\"Event\"\n inManagedObjectContext:self.managedObjectContext];\n\
  [fetchRequest setEntity:entity];\n```\n\n请求的结果可以使用 Cocoa Foundation 框架中的排序描述符进行排序。排序描述符定义了用于排序的字段以及排序是升序还是降序。在本例中，按时间倒序排序，如下所示：\n\
  \n```\nNSSortDescriptor *sortDescriptor = [[NSSortDescriptor alloc] initWithKey:\n\
  @\"timeStamp\" ascending:NO];\nNSArray *sortDescriptors = [[NSArray alloc] initWithObjects:sortDescriptor,\
  \ nil];\n[fetchRequest setSortDescriptors:sortDescriptors];\n```\n\n一旦定义了请求，就可以用它来构建获取控制器。由于`MasterViewController`实现了`NSFetchedResultsControllerDelegate`，因此它可以被设置为`NSFetchedResultsController`的委托，以便在结果集发生变化时自动收到通知，并相应地更新其视图。你也可以通过调用托管对象上下文的`executeFetchRequest`方法获得相同的结果，但这样你就无法享受到使用`NSFetchedResultsController`带来的其他优势，例如与`UITableView`的无缝集成，稍后你将在本节和第\
  \ 9 章中看到这一点。以下是构建获取控制器的代码：\n\n```\nNSFetchedResultsController *aFetchedResultsController\
  \ = [[NSFetchedResultsController\n alloc] initWithFetchRequest:fetchRequest managedObjectContext:\n\
  self.managedObjectContext sectionNameKeyPath:nil cacheName:@\"Master\"];\naFetchedResultsController.delegate\
  \ = self;\nself.fetchedResultsController = aFetchedResultsController;\n```\n\n**注意：**\
  \ 你可能已经注意到，前面的`initWithFetchRequest`使用了一个名为`cacheName`的参数。你可以将`cacheName`参数设为`nil`来阻止缓存，但指定一个缓存名称则告诉\
  \ Core Data 去检查是否存在一个名称匹配的缓存，并查看它是否已经包含了相同的获取请求定义。如果找到匹配，它将重用缓存的结果。如果找到同名缓存条目但请求不匹配，则该缓存会被删除。如果完全找不到，则执行该请求，并为下次使用创建缓存条目。这显然是一种优化，旨在防止重复执行相同的请求。Core\
  \ Data 会智能地管理其缓存，以便如果结果被其他调用更新，受影响的缓存会被移除。\n\n最后，你需要指示控制器执行其查询以开始检索结果。为此，请使用`performFetch`方法。\n\
  \n```\nNSError *error = nil;\nif (![self.fetchedResultsController performFetch:&error])\
  \ {\n  NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n  abort();\n\
  }\n```\n\n你可以在代码清单 1–1 中看到`fetchedResultsController`的完整 getter 方法。\n\n**代码清单 1–1.**\
  \ fetchedResultsController 的完整 Getter 方法\n\n```\n- (NSFetchedResultsController *)fetchedResultsController\n\
  {\n  if (__fetchedResultsController != nil)\n  {\n    return __fetchedResultsController;\n\
  \  }\n\n  /*\n   设置获取结果控制器。\n   */\n  // 为实体创建获取请求。\n  NSFetchRequest *fetchRequest\
  \ = [[NSFetchRequest alloc] init];\n  // 根据实际情况编辑实体名称。\n  NSEntityDescription *entity\
  \ = [NSEntityDescription entityForName:@\"Event\" inManagedObjectContext:self.managedObjectContext];\n\
  \  [fetchRequest setEntity:entity];\n\n  // 将批处理大小设置为合适的数值。\n  [fetchRequest setFetchBatchSize:20];\n\
  \n  // 根据实际情况编辑排序键。\n  NSSortDescriptor *sortDescriptor = [[NSSortDescriptor alloc]\
  \ initWithKey:@\"timeStamp\" ascending:NO];\n  NSArray *sortDescriptors = [[NSArray\
  \ alloc] initWithObjects:sortDescriptor, nil];\n\n  [fetchRequest setSortDescriptors:sortDescriptors];\n\
  \n  // 根据实际情况编辑分区名称键路径和缓存名称。\n  // 分区名称键路径为 nil 表示“无分区”。\n  NSFetchedResultsController\
  \ *aFetchedResultsController = [[NSFetchedResultsController\nalloc] initWithFetchRequest:fetchRequest\
  \ managedObjectContext:self.managedObjectContext\nsectionNameKeyPath:nil cacheName:@\"\
  Master\"];\n  aFetchedResultsController.delegate = self;\n  self.fetchedResultsController\
  \ = aFetchedResultsController;\n\n        NSError *error = nil;\n        if (![self.fetchedResultsController\
  \ performFetch:&error])\n  {\n    /*\n     用能恰当处理错误的代码替换此实现。\n\n     abort() 会导致应用程序生成崩溃日志并终止。虽然此函数在开发过程中可能有用，但不应在正式发布的应用程序中使用。如果无法从错误中恢复，请显示一个警告面板，指示用户通过按\
  \ Home 键退出应用程序。\n     */\n    NSLog(@\"Unresolved error %@, %@\", error, [error\
  \ userInfo]);\n    abort();\n        }\n\n  return __fetchedResultsController;\n\
  }   \n```\n\n`NSFetchedResultsController`的行为类似于托管对象的集合，与`NSArray`类似，这使得它易于使用。事实上，它公开了一个名为`fetchedObjects`的只读属性，该属性的类型是`NSArray`，这使得访问它获取的对象更加容易。同样继承自`UITableViewController`的`MasterViewController`类，正好演示了`NSFetchedResultsController`在管理表格内容方面的优越性。\n\
  \n\n\n#### 插入新对象\n\n快速浏览`insertNewObject:`方法，即可了解如何创建新事件（托管对象）并将其添加到持久化存储中。托管对象由数据模型中的实体描述定义，并且只能存在于上下文之中。第一步是获取当前上下文以及实体定义。在本例中，你无需显式命名实体，而是复用已附加到获取结果控制器中的实体定义：\n\
  \n```\nNSManagedObjectContext *context = [self.fetchedResultsController managedObjectContext];\n\
  NSEntityDescription *entity = [[self.fetchedResultsController fetchRequest] entity];\n\
  ```\n\n既然已经收集了创建新托管对象所需的所有元素，接下来就可以创建`Event`对象并设置其`timeStamp`值。\n\n```\nNSManagedObject\
  \ *newManagedObject = [NSEntityDescription\n    insertNewObjectForEntityForName:[entity\
  \ name] inManagedObjectContext:context];\n[newManagedObject setValue:[NSDate date]\
  \ forKey:@\"timeStamp\"];\n```\n\n该过程的最后一步是告知 Core Data 将更改保存到其上下文中。显而易见的更改是你刚刚创建的对象，但请记住，调用`save:`方法也会影响上下文中其他任何未保存的更改。\n\
  \n```\nNSError *error = nil;\nif (![context save:&error]) {\n    NSLog(@\"Unresolved\
  \ error %@, %@\", error, [error userInfo]);\n    abort();\n}\n```\n\n插入新`Event`对象的完整方法如列表\
  \ 1–2 所示。\n\n**列表 1–2.** *插入新事件对象的完整方法*\n\n```\n- (void)insertNewObject {\n    //\
  \ 创建由获取结果控制器管理的实体的一个新实例。\n    NSManagedObjectContext *context = [self.fetchedResultsController\
  \ managedObjectContext];\n    NSEntityDescription *entity = [[self.fetchedResultsController\
  \ fetchRequest] entity];\n    NSManagedObject *newManagedObject = [NSEntityDescription\
  \ insertNewObjectForEntityForName:[entity name] inManagedObjectContext:context];\n\
  \n    // 如果合适，配置新托管对象。\n    // 通常应使用存取方法，但此处使用 KVC 可避免向模板中添加自定义类。\n    [newManagedObject\
  \ setValue:[NSDate date] forKey:@\"timeStamp\"];\n\n    // 保存上下文。\n    NSError *error\
  \ = nil;\n    if (![context save:&error]) {\n        NSLog(@\"Unresolved error %@,\
  \ %@\", error, [error userInfo]);\n        abort();\n    }\n}\n```\n\n#### 初始化托管上下文\n\
  \n显然，如果不先初始化托管上下文，上述所有操作都无法进行。这是应用程序委托的职责。在启用 Core Data 的应用程序中，委托必须暴露三个属性。\n\n```\n\
  @property (readonly, strong, nonatomic) NSManagedObjectContext *managedObjectContext;\n\
  @property (readonly, strong, nonatomic) NSManagedObjectModel *managedObjectModel;\n\
  @property (readonly, strong, nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n\
  ```\n\n请注意，它们都被标记为只读，这可以防止应用程序中的任何其他组件直接设置它们。仔细查看`BasicApplicationAppDelegate.m`会发现，这三个属性都有显式的\
  \ getter 方法。\n\n首先，托管对象模型从数据模型（`BasicApplication.xcdatamodel`）派生并加载。\n\n```\n- (NSManagedObjectModel\
  \ *)managedObjectModel\n{\n    if (__managedObjectModel != nil) {\n        return\
  \ __managedObjectModel;\n    }\n    NSURL *modelURL = [[NSBundle mainBundle] URLForResource:@\"\
  BasicApplication\" withExtension:@\"momd\"];\n    __managedObjectModel = [[NSManagedObjectModel\
  \ alloc] initWithContentsOfURL:modelURL];\n    return __managedObjectModel;\n}\n\
  ```\n\n然后，创建一个持久化存储来支持该模型。在本例中，与大多数 Core Data 场景一样，持久化存储由 SQLite 数据库提供支持。托管对象模型是数据存储的逻辑表示，而持久化存储则是该数据存储的具体实现。\n\
  \n```\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator {\n    if (__persistentStoreCoordinator\
  \ != nil) {\n        return __persistentStoreCoordinator;\n    }\n\n    NSURL *storeURL\
  \ = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"BasicApplication.sqlite\"\
  ];\n\n    NSError *error = nil;\n    __persistentStoreCoordinator = [[NSPersistentStoreCoordinator\
  \ alloc] initWithManagedObjectModel:[self managedObjectModel]];\n    if (![__persistentStoreCoordinator\
  \ addPersistentStoreWithType:NSSQLiteStoreType configuration:nil URL:storeURL options:nil\
  \ error:&error]) {\n        NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n\
  \        abort();\n    }\n\n    return __persistentStoreCoordinator;\n}\n```\n\n\
  最后，创建托管对象上下文。\n\n```\n- (NSManagedObjectContext *)managedObjectContext {\n    if\
  \ (__managedObjectContext != nil) {\n        return __managedObjectContext;\n  \
  \  }\n\n    NSPersistentStoreCoordinator *coordinator = [self persistentStoreCoordinator];\n\
  \    if (coordinator != nil) {\n        __managedObjectContext = [[NSManagedObjectContext\
  \ alloc] init];\n        [__managedObjectContext setPersistentStoreCoordinator:coordinator];\n\
  \    }\n    return __managedObjectContext;\n}\n```\n\n该上下文在整个应用程序中被用作与 Core Data\
  \ 框架和持久化存储交互的唯一接口，如图 1–8 所示。\n\n![images](img/0108.jpg)\n\n**图 1–8.** *Core Data\
  \ 初始化序列*\n\n最后，当应用程序委托的`application:didFinishLaunchingWithOptions:`方法被调用时，一切开始运作。\n\
  \n```\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions\n{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
  \ mainScreen] bounds]];\n    // 应用程序启动后的自定义覆盖点。\n\n    MasterViewController *controller\
  \ = [[MasterViewController alloc] initWithNibName:@\"MasterViewController\" bundle:nil];\n\
  \    self.navigationController = [[UINavigationController alloc] initWithRootViewController:controller];\n\
  \    self.window.rootViewController = self.navigationController;\n    [self.window\
  \ makeKeyAndVisible];\n    return YES;\n}\n```\n\n调用委托的`managedObjectContext`属性的\
  \ getter 方法会触发一系列连锁反应：`- (NSManagedObjectContext *)managedObjectContext`调用`- (NSPersistentStoreCoordinator\
  \ *)persistentStoreCoordinator`，后者再调用`- (NSManagedObjectModel *)managedObjectModel`。因此，对`managedObjectContext`的调用会初始化整个\
  \ Core Data 栈，并使 Core Data 处于就绪状态。\n\n如果你在机器上跟随 Xcode 进行操作，那么你已经有了一个基于 Xcode 模板生成的基本\
  \ Core Data 应用程序，可以运行它来创建、存储和检索事件数据。但是，如果你有一个现有的应用程序，并希望为其添加 Core Data 的强大功能，该怎么办呢？下一节将演示如何向现有的\
  \ iOS 应用程序添加 Core Data。\n\n\n\n### 将 Core Data 添加到现有项目\n\n并非总能像上一节所示那样，创建一个新应用并勾选“使用\
  \ Core Data”复选框。开发者们常常是先启动一个项目，编写大量代码，之后才意识到自己的应用需要 Core Data。我们认识一些开发者，他们拒绝承认应该手动将\
  \ Core Data 添加到现有应用中。他们非但不尝试去理解如何使用这个框架，反而受一种想要证明自己能写出更优秀持久化层的欲望驱使，踏上了曲折迂回的编程之路，结果却差强人意。他们把“坚持”和“固执”混为一谈。为了让这一转变更加轻松，本节将解释改造一个应用，使其能够识别并使用\
  \ Core Data 所需的具体步骤。\n\n启用一个应用以利用 Core Data 分为三个步骤。\n\n1.  添加 Core Data 框架。\n2.\
  \  创建数据模型。\n3.  初始化托管对象上下文。\n\n接下来的三小节将引导您完成这三个步骤，以便您能为任何现有的 iOS 应用添加 Core Data\
  \ 支持。\n\n#### 添加 Core Data 框架\n\n在 Objective-C 的世界里，库被称为*框架*。展开 Xcode 源代码树中的“Frameworks”分组，可以看到项目只识别少数几个框架。典型的\
  \ iOS 应用至少会包含 UIKit（iOS 的用户界面框架）、Foundation 和 Core Graphics。将 Core Data 添加到现有应用的第一步，就是通过将该框架添加到项目中来让应用识别它。为此，请执行以下步骤：\n\
  \n1.  在 Xcode 左侧选择项目，此时右侧会显示目标设置（见图 1-9）。\n2.  选择第四个标签页“Build Phases”，并展开名为“Link\
  \ Binary With Libraries”的部分（见图 1-10）。\n3.  点击该部分下方的 + 按钮，查看可添加的框架列表（见图 1-11）。\n\
  4.  选择 `CoreData.framework` 并点击“Add”按钮。\n5.  （可选）将项目源代码列表中的 `CoreData.framework`\
  \ 条目拖动到“Frameworks”文件夹中。\n\n![images](img/0109.jpg)\n\n**图 1-9.** *选择项目以查看目标设置*\n\
  \n![images](img/0110.jpg)\n\n**图 1-10.** *查看“Link Binary With Libraries”设置*\n\n\
  ![images](img/0111.jpg)\n\n**图 1-11.** *选择要链接的框架*\n\n`CoreData.framework` 现在已列在\
  \ Xcode 的左侧。由于应用现在能够识别 Core Data 框架，因此可以使用该框架特有的类，而不会产生编译错误。\n\n#### 创建数据模型\n\n\
  没有数据模型的 Core Data 应用是不完整的。数据模型描述了将由框架管理的所有实体。为简单起见，本节创建的模型只包含一个具有单一属性的类。可以在 Xcode\
  \ 中通过选择菜单中的 `File` ![images](img/U001.jpg) `New` ![images](img/U001.jpg) `New File`，然后从\
  \ iOS Core Data 模板中选取“Data Model”类型来创建数据模型，如图 1-12 所示。点击“Next”，将数据模型命名为 `MyModel.xcdatamodeld`，如图\
  \ 1-13 所示，然后点击“Save”。这将生成您的新数据模型并在 Xcode 中打开它（见图 1-14）。\n\n![images](img/0112.jpg)\n\
  \n**图 1-12.** *添加数据模型*\n\n![images](img/0113.jpg)\n\n**图 1-13.** *命名您的数据模型*\n\n\
  一旦数据模型打开，您可以通过点击 Xcode 窗口底部的“Add Entity”按钮来添加实体。您可以通过选择一个实体，然后按住“Add Entity”按钮右侧的“Add\
  \ Attribute”按钮，并从下拉菜单中选择属性类型（属性、关系或抓取属性）来向实体添加属性。Xcode 会更改此按钮的标签以匹配您上次添加的属性类型。只需点击该按钮即可添加该类型的属性。在此示例中，创建一个名为\
  \ `MyData` 的单个实体，并为其添加一个名为 `myAttribute`、类型为 `String` 的单个属性，如图 1-15 所示。\n\n![images](img/0114.jpg)\n\
  \n**图 1-14.** *您新建的空数据模型*\n\n![images](img/0115.jpg)\n\n**图 1-15.** *添加实体和属性*\n\n\
  \n\n### 初始化托管对象上下文\n\n最后一步是初始化托管对象上下文、持久化数据存储和对象模型。通常你可以添加与 Xcode 在创建项目时选择使用 Core\
  \ Data 会生成的相同代码：将这些组件定义为应用程序委托中的属性，声明一个`saveContext`方法，以及声明一个获取用于存储 Core Data 数据库文件的应用程序文档目录的辅助方法。你的`DemoAppAppDelegate.h`文件应该如代码清单\
  \ 1-3 所示。\n\n**代码清单 1-3.** *DemoAppAppDelegate.h 文件*\n\n```\n#import <UIKit/UIKit.h>\n\
  #import <CoreData/CoreData.h>\n\n@interface DemoAppAppDelegate : UIResponder <UIApplicationDelegate>\
  \ {\n\n}\n\n@property (strong, nonatomic) UIWindow *window;\n@property (strong,\
  \ nonatomic) UINavigationController *navigationController;\n\n@property (nonatomic,\
  \ retain, readonly) NSManagedObjectContext *managedObjectContext;\n@property (nonatomic,\
  \ retain, readonly) NSManagedObjectModel *managedObjectModel;\n@property (nonatomic,\
  \ retain, readonly) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n\n\
  - (void)saveContext;\n- (NSURL *)applicationDocumentsDirectory;\n\n@end\n```\n\n\
  切换到实现文件（`DemoAppAppDelegate.m`）。首先为新属性添加`@synthesize`行，如下所示：\n\n```\n@synthesize\
  \ managedObjectContext=__managedObjectContext;\n@synthesize managedObjectModel=__managedObjectModel;\n\
  @synthesize persistentStoreCoordinator=__persistentStoreCoordinator;\n```\n\n上一节展示了上下文是由物理数据存储创建的，而物理数据存储又是由数据模型创建的。初始化顺序保持不变，从你刚刚定义的模型加载对象模型开始。\n\
  \n```\n- (NSManagedObjectModel *)managedObjectModel {\n  if (__managedObjectModel\
  \ != nil) {\n    return __managedObjectModel;\n  }\n  NSURL *modelURL = [[NSBundle\
  \ mainBundle] URLForResource:@\"MyModel\" withExtension:@\"momd\"];\n  __managedObjectModel\
  \ = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];\n  return __managedObjectModel;\n\
  }\n```\n\n现在你已经加载了对象模型，可以利用它来创建持久化存储处理器。此示例使用`NSSQLiteStoreType`来指示存储机制应依赖于 SQLite\
  \ 数据库，如下所示：\n\n```\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\
  \ {\n  if (__persistentStoreCoordinator != nil) {\n    return __persistentStoreCoordinator;\n\
  \  }\n\n  NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
  DemoApp.sqlite\"];\n\n  NSError *error = nil;\n  __persistentStoreCoordinator =\
  \ [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
  \  if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
  \ configuration:nil URL:storeURL options:nil error:&error]) {\n    NSLog(@\"Unresolved\
  \ error %@, %@\", error, [error userInfo]);\n    abort();\n  }\n  return __persistentStoreCoordinator;\n\
  }\n```\n\n请注意，这段代码依赖于辅助方法`applicationDocumentsDirectory`来确定在哪里存储 SQLite 文件；稍后你将定义该方法。\n\
  \n接下来，从你刚刚定义的持久化存储初始化上下文。\n\n```\n- (NSManagedObjectContext *)managedObjectContext\
  \ {\n  if (__managedObjectContext != nil) {\n    return __managedObjectContext;\n\
  \  }\n\n  NSPersistentStoreCoordinator *coordinator = [self persistentStoreCoordinator];\n\
  \  if (coordinator != nil) {\n    __managedObjectContext = [[NSManagedObjectContext\
  \ alloc] init];\n    [__managedObjectContext setPersistentStoreCoordinator:coordinator];\n\
  \  }\n  return __managedObjectContext;\n}\n```\n\n为了完成在应用程序中准备使用 Core Data 的工作，你必须实现`applicationDocumentsDirectory`方法和`saveContext`方法。同样，你可以克隆\
  \ Xcode 生成的内容，如下所示：\n\n```\n- (NSURL *)applicationDocumentsDirectory {\n  return\
  \ [[[NSFileManager defaultManager] URLsForDirectory:NSDocumentDirectory inDomains:NSUserDomainMask]\
  \ lastObject];\n}\n\n- (void)saveContext {\n  NSError *error = nil;\n  NSManagedObjectContext\
  \ *managedObjectContext = self.managedObjectContext;\n  if (managedObjectContext\
  \ != nil) {\n    if ([managedObjectContext hasChanges] && ![managedObjectContext\
  \ save:&error]) {\n      NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n\
  \      abort();\n    }\n  }\n}\n```\n\n配置好 Core Data 后，应用程序现在可以使用托管对象上下文来存储和检索实体。让我们用一个简单的示例来演示这个过程：应用程序持久化并显示其被启动的次数。\n\
  \n在应用程序委托实现文件`DemoAppAppDelegate.m`中，编辑`didFinishLaunchingWithOptions:`方法，添加代码以检索之前的启动次数并添加新的启动事件。\n\
  \n**注意：** 尽管托管对象上下文、持久化存储协调器和托管对象模型通常是应用程序委托的成员，但存储和检索数据的代码通常放在与数据视图相对应的控制器中。这里将存储和检索条目的代码直接添加到应用程序委托中，只是为了方便和简单。在实际应用程序中，这类代码很可能属于控制器。\n\
  \n检索之前启动次数的代码会获取上下文并执行一个请求来获取类型为`MyData`的实体。\n\n```\nNSManagedObjectContext *context\
  \ = [self managedObjectContext];\nNSFetchRequest *request = [[NSFetchRequest alloc]\
  \ init];\nNSEntityDescription *entity = [NSEntityDescription entityForName:@\"MyData\"\
  \ inManagedObjectContext:context];\n[request setEntity:entity];\nNSArray *results\
  \ = [context executeFetchRequest:request error:nil];\n```\n\n然后你可以遍历结果数组来显示之前的启动次数。\n\
  \n```\nfor (NSManagedObject *object in results) {\n  NSLog(@\"Found %@\", [object\
  \ valueForKey:@\"myAttribute\"]);\n}\n```\n\n**注意：** 与托管对象属性交互的一种方式是使用键/值对通用访问器方法。`[object\
  \ valueForKey:@\"myAttribute\"]`将检索`myAttribute`的值，而`[object setValue:@\"theValue\"\
  \ forKey:@\"myAttribute\"]`将设置`myAttribute`的值。\n\n最后，在让应用程序继续正常执行之前，向上下文添加一个新条目，并使用之前实现的`saveContext`方法将新条目保存到持久化存储中。\n\
  \n```\nNSString *launchTitle = [NSString stringWithFormat:@\"launch %d\", [results\
  \ count]];\nNSManagedObject *object = [NSEntityDescription insertNewObjectForEntityForName:[entity\
  \ name] inManagedObjectContext:context];\n[object setValue:launchTitle forKey:@\"\
  myAttribute\"];\n[self saveContext];\nNSLog(@\"Added: %@\", launchTitle);\n```\n\
  \n首次启动应用程序会产生以下输出：\n\n```\n2011–02-25 05:13:23.783 DemoApp[2299:207] Added: launch\
  \ 0\n```\n\n第二次启动时会显示之前的启动记录：\n\n```\n2011–02-25 05:15:48.883 DemoApp[2372:207]\
  \ Found launch 0\n2011–02-25 05:15:48.889 DemoApp[2372:207] Added: launch 1\n```\n\
  \n应用程序委托实现文件中的完整方法如代码清单 1-4 所示。\n\n**代码清单 1-4.** *应用程序委托实现文件中的完整方法*\n\n\n\n`- (BOOL)application:(UIApplication\
  \ *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {\n\
  \    // 从 Core Data 获取启动记录\n    NSManagedObjectContext *context = [self managedObjectContext];\n\
  \    NSFetchRequest *request = [[NSFetchRequest alloc] init];\n    NSEntityDescription\
  \ *entity = [NSEntityDescription entityForName:@\"MyData\" inManagedObjectContext:context];\n\
  \    [request setEntity:entity];\n    NSArray *results = [context executeFetchRequest:request\
  \ error:nil];\n\n    // 遍历结果并打印日志\n    for (NSManagedObject *object in results)\
  \ {\n        NSLog(@\"找到 %@\", [object valueForKey:@\"myAttribute\"]);\n    }\n\n\
  \    // 为本次启动添加新条目\n    NSString *launchTitle = [NSString stringWithFormat:@\"启动\
  \ %d\", [results count]];\n    NSManagedObject *object = [NSEntityDescription insertNewObjectForEntityForName:[entity\
  \ name] inManagedObjectContext:context];\n    [object setValue:launchTitle forKey:@\"\
  myAttribute\"];\n    [self saveContext];\n    NSLog(@\"已添加: %@\", launchTitle);\n\
  \n    [self.window makeKeyAndVisible];\n    return YES;\n}`\n\n此前对 Core Data 一无所知的现有应用程序，现已通过最少的改造，装备了强大的数据存储管理框架。按照以下步骤，即可将\
  \ Core Data 的强大功能添加到任何现有应用程序中。\n\n### 总结\n\n无论是从零开始构建 iOS 应用程序，还是为现有 iOS 应用程序添加持久化功能，你都应强烈考虑使用\
  \ Apple 的 Core Data 框架。通过使用 Xcode 的模板和代码生成，可以快速入门 Core Data，或者你也可以手动添加 Core Data。无论采用哪种方式，Core\
  \ Data 都提供了一个持久化层，它抽象了数据存储和检索的大部分复杂性，并允许你以对象图的形式可靠地处理数据。\n\n本章概述了 Core Data 的各种类，以及它们如何协同工作——从上下文到托管对象，再到持久化存储及其协调器。你初步了解了获取结果控制器及其工作原理，但仅看到了简单的示例。下一章将更深入地剖析\
  \ Core Data 框架，揭示各个类及其内部工作机制，以便你精确掌握如何使用 Core Data 来持久化用户数据。\n\n## 第 2 章\n\n## 理解\
  \ Core Data\n\n许多开发者在初次接触 Core Data 时，会认为它及其相关的类是一团乱麻，反而阻碍而非增强了数据访问。或许他们是 Rails\
  \ 开发者，习惯于通过拼凑方法名来创建动态查找器，让“约定优于配置”来处理数据访问的繁琐工作。又或许他们是 Java 开发者，一直使用注解来配置企业 JavaBeans\
  \ (EJB) 或使用 Hibernate 来处理普通的旧式 Java 对象 (POJO)。无论其背景如何，许多开发者不会自然而然地接受 Core Data 框架或其处理数据的方式，就像许多开发者在初次接触\
  \ Interface Builder 及其构建用户界面时创建的动态对象时感到不适一样。我们建议你保持耐心和开放的心态，并向你保证 Core Data 框架绝非一个鲁布·戈德堡机械。该框架中的各类协同工作，宛若\
  \ 1980 年代拉里·伯德领衔的波士顿凯尔特人队在阵地进攻中的配合，一旦你理解了它们，就能看到其精妙与严谨。\n\n本章将解释 Core Data 框架中的各个类，既有单独介绍，也有对其协同工作方式的说明。请花时间阅读每个类的介绍，追溯它们如何协同工作，并动手输入和理解示例。\n\
  \n### Core Data 框架类\n\n第 1 章引导你完成了让应用程序搭载 Core Data 的简单步骤。你看到了一些代码片段，了解了要使用哪些类，并发现了要使\
  \ Core Data 工作需要调用和传递哪些方法及参数。你忠实地（或许有些盲目地）遵循了第 1 章的建议，同时可能好奇所有这些代码、类、方法和参数背后究竟是什么。阅读上一章的大多数开发者可能都想过，如果将某个参数值替换为另一个会发生什么。其中少数人甚至真的尝试了。在尝试的人中，有一小部分得到了除崩溃以外的结果，而其中又有一部分人确实得到了他们预期中的结果。\n\
  \n著名计算机科学家、因开发编程语言而获得 1972 年图灵奖的爱德格·迪杰斯特拉曾谈到，优雅是决定成败的品质，而非可有可无的奢侈品。Core Data 不仅解决了对象持久化的问题，而且是以优雅的方式解决的。要想在代码中实现优雅，你应该理解\
  \ Core Data，而不是仅仅猜测它的工作原理。阅读完本章后，你不仅将详细了解 Core Data 框架的结构，还会明白该框架仅用一小组类就解决了一个复杂问题，使得解决方案简单、清晰而优雅。\n\
  \n在本章中，你将构建一个类图，展示框架中涉及的类以及它们如何交互。你还将看到，有些类属于 Core Data 框架，而另一些则来自其他 Cocoa 框架（如\
  \ Foundation 框架）。在构建类图的同时，你还将在 Xcode 中构建一个小型应用程序，该程序处理一个虚构公司的组织结构图。\n\n要跟随本章进行操作，请使用“单视图应用程序”模板创建一个空白\
  \ iPhone 应用程序，如图 2–1 所示，并将其命名为 `OrgChart`。\n\n![images](img/0201.jpg)\n\n**图 2–1.**\
  \ *在 Xcode 中创建一个新应用程序。*\n\n按照第 1 章中“向现有项目添加 Core Data”一节的描述，将 Core Data 框架添加到项目中。你的\
  \ Xcode 项目应类似图 2–2。启动该应用程序并确保其不会崩溃。它除了显示一个灰色屏幕外什么也不做，但这个空白屏幕意味着你已经准备好继续构建该基于 Core\
  \ Data 的应用程序的其余部分。\n\n![images](img/0202.jpg)\n\n**图 2–2.** *添加了 Core Data 的 Xcode\
  \ 空白项目*\n\n图 2–3 描绘了你通常与之交互的 Core Data 类。第 1 章讨论了托管对象上下文，它由 `NSManagedObjectContext`\
  \ 类实现，并包含对 `NSManagedObject` 类型托管对象的引用。\n\n![images](img/0203.jpg)\n\n**图 2–3.**\
  \ *高级概览*\n\n你的代码通过向上下文添加托管对象来存储数据，并通过使用由 `NSFetchRequest` 类实现的获取请求来检索数据。如第 1 章所示，上下文使用持久化存储协调器（由\
  \ `NSPersistentStoreCoordinator` 类实现）进行初始化，并由数据模型（由 `NSManagedObjectModel` 类实现）定义。本章的其余部分将讨论这些类是如何创建的、它们如何交互以及如何使用它们。\n\
  \n```objc\n`- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions {\n    // 从 Core Data 获取启动记录\n    NSManagedObjectContext *context\
  \ = [self managedObjectContext];\n    NSFetchRequest *request = [[NSFetchRequest\
  \ alloc] init];\n    NSEntityDescription *entity = [NSEntityDescription entityForName:@\"\
  MyData\" inManagedObjectContext:context];\n    [request setEntity:entity];\n   \
  \ NSArray *results = [context executeFetchRequest:request error:nil];\n\n    //\
  \ 遍历结果并打印日志\n    for (NSManagedObject *object in results) {\n        NSLog(@\"找到\
  \ %@\", [object valueForKey:@\"myAttribute\"]);\n    }\n\n    // 为本次启动添加新条目\n  \
  \  NSString *launchTitle = [NSString stringWithFormat:@\"启动 %d\", [results count]];\n\
  \    NSManagedObject *object = [NSEntityDescription insertNewObjectForEntityForName:[entity\
  \ name] inManagedObjectContext:context];\n    [object setValue:launchTitle forKey:@\"\
  myAttribute\"];\n    [self saveContext];\n    NSLog(@\"已添加: %@\", launchTitle);\n\
  \n    [self.window makeKeyAndVisible];\n    return YES;\n}`\n```\n\n\n#### 模型定义类\n\
  \n如第 1 章所述，所有 Core Data 应用程序都需要一个对象模型。模型定义了要持久化的实体及其属性。实体具有三种属性：\n\n*   属性（Attributes）\n\
  *   关系（Relationships）\n*   获取属性（Fetched Properties）\n\n表 2-1 列出了不同的类及其角色的简要描述。遍历这些类以更好地理解模型实例化背后的机制是一项有趣的练习，但在实践中，在\
  \ Xcode 中创建模型通常是以图形方式完成的，无需编写一行代码。\n\n![images](img/t0201.jpg)\n\n图 2-4 展示了定义模型所涉及的类之间的关系。`NSManagedObjectModel`\
  \ 持有对零个或多个 `NSEntityDescription` 对象的引用。每个 `NSEntityDescription` 持有对零个或多个 `NSPropertyDescription`\
  \ 对象的引用。`NSPropertyDescription` 是一个抽象类，具有三个具体实现：\n\n*   `NSAttributeDescription`\n\
  *   `NSRelationshipDescription`\n*   `NSFetchedPropertyDescription`\n\n![images](img/0204.jpg)\n\
  \n**图 2-4.** *模型定义类*\n\n这一小组类足以定义你在处理 Core Data 项目时将使用的任何对象模型。如第 1 章中更详细的解释，你可以通过在菜单中选择\
  \ `File` ![images](img/U001.jpg) `New` ![images](img/U001.jpg) `New File`，并从 iOS\
  \ Core Data 模板中选择 Data Model 类型，从而在 Xcode 中创建数据模型。在本节中，你将创建一个代表公司组织架构图的模型。在 Xcode\
  \ 中，创建你的模型并命名为 `OrgChart`。在这个数据模型中，一个组织有一名负责人（首席执行官，即 CEO）。这位负责人有直接下属，而这些下属也可能有自己的直接下属。为简单起见，假设一个人有两个属性：唯一的员工标识符和姓名。你终于准备好开始在\
  \ Xcode 中定义数据模型了。\n\n打开数据模型文件，并添加一个新的 `Organization` 实体。与一个人类似，一个组织由唯一标识符和名称定义，因此向\
  \ `Organization` 实体添加两个属性。属性是实体的标量属性，这意味着它们是简单的数据持有者，可以包含单个值。属性类型在 `NSAttributeType`\
  \ 结构中定义，每种类型都会对实体强制实施某些数据约束。例如，如果属性的类型是整数，那么你尝试在该字段中放入字母数字值将会导致错误。表 2-2 列出了不同的类型及其含义。\n\
  \n![images](img/t0202.jpg)\n\n**注意：** 第 5 章将详细阐述 `Transformable` 类型及其使用方法。Transformable\
  \ 属性是一种告诉 Core Data 你想在托管对象中使用不受支持的数据类型，并且你将提供代码在持久化时将属性数据转换为受支持的类型来帮助 Core Data\
  \ 的方法。\n\n将第一个属性命名为 `id`，第二个命名为 `name`。默认情况下，新属性的类型设置为 `Undefined`，这特意阻止了代码编译，以强制你为每个属性设置类型。组织标识符总是简单的数字，因此对\
  \ `id` 属性使用 `Integer 16` 类型。对 `name` 属性使用 `String` 类型。此时，你的项目应如图图 2-5 所示。\n\n![images](img/0205.jpg)\n\
  \n**图 2-5.** *带有 Organization 实体的项目*\n\n此时，如果数据模型被正在运行的程序加载，它将由图图 2-6 所示的对象图表示。\n\
  \n![images](img/0206.jpg)\n\n**图 2-6.** *作为对象的组织模型*\n\n该图显示，托管对象模型（类型为 `NSManagedObjectModel`）指向一个实体描述，由名为\
  \ `Organization` 的 `NSEntityDescription` 实例表示，该实例对其 `managedObjectClassName` 属性使用了\
  \ `NSManagedObject`。该实体描述有两个属性描述（类型为 `NSAttributeDescription`）。每个属性描述有两个属性：`name`\
  \ 和 `attributeType`。第一个属性描述的 `name` 和 `attributeType` 属性分别具有值 `id` 和 `NSInteger16AttributeType`，而第二个属性则具有值\
  \ `name` 和 `NSStringAttributeType`。\n\n以创建 `Organization` 实体相同的方式，创建另一个名为 `Person`\
  \ 的实体，包含两个属性：`id` 和 `name`。你可以通过创建一个从 `Organization` 实体到 `Person` 实体的关系，并将其命名为 `leader`，从而将组织与其负责人关联起来。一旦这两个实体存在于\
  \ Xcode 中，创建关系就像选择源实体（`Organization`），单击并按住“添加属性”按钮直到出现下拉菜单，然后选择“添加关系”一样简单。将新关系命名为\
  \ `leader`，并将其目标设置为 `Person`。现在，添加一个从 `Person` 到 `Person` 的关系（是的，从 `Person` 实体回到自身的关系），并将其命名为\
  \ `employees`。这定义了一个人到其下属的关系。默认情况下，Xcode 创建一对一关系，这意味着保持默认设置的关系将一个源链接到一个目标。由于一个负责人可以管理许多下属，`Person`\
  \ 和 `Person` 之间的关系应该是一对多关系。要在 Xcode 中更正此关系，首先通过单击 Xcode 工具栏中“视图”上方最右侧的按钮来显示 Xcode\
  \ 的实用工具面板，从而显示该关系的属性。然后，单击以显示“数据模型检查器”，方法是单击实用工具面板顶部最右侧的按钮（请参阅图 2-7）。\n\n![images](img/0207.jpg)\n\
  \n**图 2-7.** *显示关系的属性*\n\n显示属性后，你现在可以通过选中“对多关系”旁边的复选框，将 `employees` 关系更改为一对多关系，如图\
  \ 2-8 所示。\n\n![images](img/0208.jpg)\n\n**图 2-8.** *一对多关系*\n\n**注意：** 在本章中，我们想向您展示如何使用模型编辑器设计的数据模型被解释为\
  \ Core Data 类。我们在创建模型时有意地走了一些捷径。有关如何创建对象模型的更详细信息，请参考第 4 章。\n\n**注意：** 您可能会注意到 Xcode\
  \ 抱怨您创建的两个关系，警告您存在一致性错误和配置错误的属性。Xcode 会抱怨缺少反向关系的 Core Data 关系，但这在此应用程序中应该不是问题。缺少反向关系带来的唯一影响是您无法导航反向关系。您可以暂时安全地忽略这些警告。\n\
  \n当前的数据模型如图图 2-9 所示，而图 2-10 显示了 Core Data 将如何把数据模型定义加载到活动对象中。\n\n![images](img/0209.jpg)\n\
  \n**图 2-9.** *数据模型*\n\n![images](img/0210.jpg)\n\n**图 2-10.** *包含 Person 的组织模型*\n\
  \n请注意，图 2-10 中描绘的对象图并未显示 Core Data 存储的对象图。相反，它展示了 Core Data 如何将您以图形方式创建的数据模型解释为可用于创建数据存储模式的对象。让\
  \ Core Data 加载数据模型并将其解释为 `NSManagedObjectModel` 的典型方法是通过使用如下代码创建指向数据模型的 URL：\n\n\
  \n\n`NSURL *modelURL = [[NSBundle mainBundle] URLForResource:@\"OrgChart\" withExtension:@\"\
  momd\"];`\n\n然后，你可以将该 URL 传递给托管对象模型的初始化器来创建模型，从而将对象模型描述加载到内存中。相关代码如下：\n\n`__managedObjectModel\
  \ = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];`\n\n了解模型如何在 Core\
  \ Data 内部表示为对象通常并不十分有用，除非你对创建自定义数据存储感兴趣，或者希望在运行时以编程方式生成数据模型。这类似于以编程方式创建 `UIViews`，而不是使用\
  \ Xcode 内置的用户界面编辑器 Interface Builder。然而，深入理解 Core Data 的工作原理能让你预见并避免复杂问题、排查错误，并创造性地优雅解决问题。\n\
  \n你已经了解了数据模型如何表示为 Core Data 类，但同样也注意到，除非涉及框架的高级使用，否则你几乎不需要直接与这些类交互。本章到目前为止讨论的所有类都涉及描述模型。本章剩余部分将专门讨论代表数据本身或数据访问器的类。\n\
  \n### 数据访问类\n\n你在第 1 章中了解到，Core Data 的初始化从将数据模型加载到 `NSManagedObjectModel` 对象开始。上一节通过示例展示了\
  \ `NSManagedObjectModel` 如何将该模型表示为 `NSEntityDescription` 和 `NSPropertyDescription`\
  \ 对象。初始化序列的第二步是通过 `NSPersistentStoreCoordinator` 创建并绑定到持久化存储。最后，初始化序列的第三步会创建 `NSManagedObjectContext`，你的代码通过它与上下文交互来存储和检索数据。为了更清晰说明，图\
  \ 2–11 展示了表示上下文和底层持久化存储的类图。\n\n![images](img/0211.jpg)\n**图 2–11.** *托管对象上下文对象图*\n\
  \n请注意 图 2–11 中 `NSManagedObjectModel` 对象在类图中的位置。它被加载并传递给持久化存储协调器（`NSPersistentStoreCoordinator`），以便持久化存储协调器能够确定如何在持久化存储中表示数据。持久化存储协调器充当托管对象上下文与实际写入数据的持久化存储之间的中介。除其他任务外，它还通过\
  \ `migratePersistentStore:` 方法管理数据从一个存储到另一个存储的迁移。\n\n`NSPersistentStoreCoordinator`\
  \ 使用 `NSManagedObjectModel` 类进行初始化。一旦分配了协调器对象，它就可以加载并注册所有持久化存储。以下代码演示了持久化存储协调器的初始化过程。它在其\
  \ `initWithManagedObjectModel:` 方法中接收托管对象模型，然后通过调用 `addPersistentStoreWithType:`\
  \ 方法注册持久化存储。\n\n`NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
  OrgChart.sqlite\"];`\n\n`NSError *error = nil;`\n`__persistentStoreCoordinator =\
  \ [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];`\n\
  `if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
  \ configuration:nil URL:storeURL options:nil error:&error])`\n`{`\n`  NSLog(@\"\
  Unresolved error %@, %@\", error, [error userInfo]);`\n`  abort();`\n`}`\n\niOS\
  \ 默认提供三种类型的持久化存储，如表 2–3 所示。\n\n![images](img/t0203.jpg)\n\n**注意：** Mac OS X 上的 Core\
  \ Data 提供第四种类型（`NSXMLStoreType`），它使用 XML 文件作为存储机制。这种第四种类型在 iOS 上不可用，大概是因为 iDevice\
  \ 的处理器速度较慢，且解析 XML 本身对处理器消耗较大。不过，在 iDevice 上解析 XML 是可行的，这一点从多个 iOS XML 解析库的存在即可证明。苹果似乎没有对\
  \ iOS 上缺少 XML 存储类型给出官方解释。\n\n典型用户会发现自己在使用 SQLite 类型，该类型将数据存储到运行在 iDevice 上的 SQLite\
  \ 数据库中，通常甚至可以说是唯一使用的类型。然而，你应该了解并理解其他类型，因为不同情况可能需要使用其他类型。尽管内存中的“持久化”存储听起来可能没什么用，但其经典用途是缓存从远程服务器获取的信息，并创建数据的本地副本，以限制带宽使用和相关延迟。数据在远程服务器上保持持久化，并且始终可以重新获取。\n\
  \n一旦创建了持久化存储协调器，托管对象上下文就可以作为 `NSManagedObjectContext` 实例进行初始化。托管对象上下文负责协调进出持久化存储的数据。这听起来可能是一项简单的任务，但请考虑以下挑战：\n\
  \n\n\n*   如果有两个线程请求同一个对象，它们必须获取到指向同一个实例的指针。\n*   如果同一个对象被多次请求，上下文必须足够智能，不去访问持久化存储，而是从其缓存中返回该对象。\n\
  *   上下文应能将针对持久化存储的更改保留在自身内部，直到请求执行提交操作。\n\n**注意：** 苹果强烈（并且合理地）反对对 `NSManagedObjectContext`\
  \ 进行子类化，因为它所执行的操作非常复杂，并且有可能使上下文及其管理的对象进入不可预测的状态。\n\n表 2–4 列出了一些用于检索、创建或删除数据对象的方法。更新数据是通过直接更改数据对象的属性来完成的。上下文会跟踪它从数据存储中拉取的每一个对象，并感知你做出的任何更改，以便这些更改能够持久化到后备存储。\n\
  \n![images](img/t0204.jpg)\n\n请记住，`NSManagedObjectContext` 负责协调进出持久化存储的数据传输，并保证数据对象的一致性。你应该仔细考虑删除托管对象的影响。当删除一个与其他托管对象存在关系的托管对象时，Core\
  \ Data 必须决定如何处理这些相关对象。关系的一个属性是“删除规则”，这是表 2–5 中解释的四种删除规则之一。表 2–5 将正在被删除的对象称为*父对象*，将位于关系另一端的对象称为*相关对象*。\n\
  \n![images](img/t0205.jpg)\n\n除了控制对持久化存储的访问之外，托管对象上下文还允许使用与用户界面设计中相同的范式来执行撤销和重做操作。表\
  \ 2–6 列出了处理撤销和重做操作时使用的重要方法。\n\n![images](img/t0206.jpg)\n\n第 5 章 讨论了 Core Data 操作的撤销和重做。\n\
  \n`NSManagedObjectContext` 是所有数据对象必须经过的、通往持久化存储的大门。为了能够跟踪数据，Core Data 强制所有数据对象继承自\
  \ `NSManagedObject` 类。你已经在本章前面看到，`NSEntityDescription` 实例定义了数据对象。`NSManagedObject`\
  \ 实例就是数据对象。Core Data 使用它们的实体描述来知道要访问哪些属性以及期望何种类型。\n\n托管对象支持键值编码（即名称-值对），以便为其包含的数据提供通用的访问器。访问数据的最简单方式是通过\
  \ `valueForKey:` 方法。可以使用 `setValue:forKey:` 方法将数据放入对象中。`key` 参数是数据模型中属性的名称。\n\n\
  ```\n- (id)valueForKey:(NSString *)key\n- (void)setValue:(id)value forKey:(NSString\
  \ *)key\n```\n\n注意，`valueForKey:` 方法返回一个 `id` 类型的实例，这是一种通用类型。实际的数据类型同样由数据模型和你指定的属性类型决定。请参考表\
  \ 2–2 以了解这些类型的列表。\n\n`NSManagedObject` 还提供了几种方法，帮助 `NSManagedObjectContext` 确定对象是否有任何更改。当需要提交任何更改时，上下文可以询问它跟踪的托管对象是否发生了变化。苹果强烈反对你重写这些方法，以防止干扰提交序列。\n\
  \n**注意：** 每个 `NSManagedObject` 实例都保留了一个对其所属上下文的引用。这也是一种无需到处传递上下文就能持有其引用的低成本方式。只要你拥有一个托管对象，就可以获取回其上下文。\n\
  \n要创建一个新的 `NSManagedObject` 实例，你首先需要根据实体名称和知道该实体的托管对象上下文，创建一个合适的 `NSEntityDescription`\
  \ 实例。`NSEntityDescription` 实例为新的 `NSManagedObject` 实例提供了定义（或描述）。然后，你向刚创建的 `NSEntityDescription`\
  \ 实例发送消息，以将一个新建的托管对象插入到上下文中并返回给你。代码如下所示：\n\n```\nNSEntityDescription *entity = [NSEntityDescription\
  \ entityForName:@\"Organization\"\n    inManagedObjectContext:managedObjectContext];\n\
  NSManagedObject *org = [NSEntityDescription insertNewObjectForEntityForName:[entity\n\
  \    name] inManagedObjectContext:managedObjectContext];\n```\n\n一旦你在上下文中创建了托管对象，就可以设置它的值。要为前面代码创建的名为\
  \ `org` 的 `NSManagedObject` 实例设置 `name` 属性，请调用以下代码：\n\n```\n[org setValue:@\"MyCompany,\
  \ Inc.\" forKey:@\"name\"];\n```\n\n### 键值观察\n\n你可以通过主动查询的方式来负责发现对托管对象所做的任何更改。当某些事件触发控制器对托管对象执行操作时，这种方法非常有用。然而，在很多情况下，让托管对象本身在你更改它们时负责通知你，可以让你的设计更加高效和优雅。为了提供这种通知服务，`NSManagedObject`\
  \ 类支持键值观察，以便在某个键的值更改之前和之后立即发送通知。键值观察并非 Core Data 特有的模式，而是贯穿 Cocoa 框架的。\n\n与键值观察通知相关的两个主要方法是\
  \ `willChangeValueForKey:` 和 `didChangeValueForKey:`。前者在更改发生前立即调用，后者在更改发生后立即调用。然而，为了让一个对象\
  \ `observerObject` 能够接收来自托管对象 `managedObject` 中属性 `theProperty` 值更改的通知，观察者对象必须首先使用如下代码向该对象注册：\n\
  \n```\n[managedObject addObserver:observerObject forKeyPath:@\"theProperty\"\n \
  \   options:(NSKeyValueObservingOptionNew | NSKeyValueObservingOptionOld) context:nil];\n\
  ```\n\n注册之后，观察者将开始即时收到它所监听的属性的更改通知。当尝试保持用户界面与其显示的数据同步时，这是一个极其有用的机制。\n\n\n\n### 查询类\n\
  \n到目前为止，本章已经介绍了如何初始化 Core Data 基础设施以及如何与它创建的对象进行交互。本节将讲解通过发送获取请求来检索数据的基础知识。毫不意外，获取请求是\
  \ `NSFetchRequest` 的实例。但或许会令你稍感惊讶的是，它几乎是 Core Data 框架中唯一一个与数据检索相关的类。在构建数据获取请求时所用到的其他大多数类都属于\
  \ Foundation Cocoa 框架，该框架也被其他所有 Cocoa 框架所使用。图 2–12 展示了源自 `NSFetchRequest` 的类图。\n\
  \n![images](img/0212.jpg)\n\n**图 2–12.** *NSFetchRequest 类图*\n\n获取请求由两个主要元素组成：一个\
  \ `NSPredicate` 实例和一个 `NSSortDescriptor` 实例。`NSPredicate` 通过指定约束条件来帮助过滤数据，而 `NSSortDescriptor`\
  \ 则按特定顺序排列结果集。这两个元素都是可选的，如果你未指定它们，那么若未指定 `NSPredicate`，结果将不受约束；若未指定 `NSSortDescriptor`，结果则不会排序。\n\
  \n创建一个简单的请求来检索持久化存储区中的所有组织（不受约束且不排序）的代码如下所示：\n\n```\nNSFetchRequest *fetchRequest\
  \ = [[NSFetchRequest alloc] init];\nNSEntityDescription *entity = [NSEntityDescription\
  \ entityForName:@\"Organization\" inManagedObjectContext:managedObjectContext];\n\
  [fetchRequest setEntity:entity];\nNSArray* organizations = [managedObjectContext\
  \ executeFetchRequest:fetchRequest error:nil];\n```\n\n首先，你需要为请求对象预留内存空间。然后，从上下文中检索出要获取的对象的实体描述，并将其设置到请求对象中。最后，通过调用\
  \ `executeFetchRequest:` 在托管对象上下文中执行查询。\n\n由于你没有使用 `NSPredicate` 实例来约束请求，因此 `organizations`\
  \ 数组将包含代表持久化存储区中每个组织的 `NSManagedObject` 实例。为了过滤结果并只返回部分组织，你需要使用 `NSPredicate` 类。要创建一个简单的谓词，将结果限制为名称包含字符串\
  \ `\"Inc.\"` 的组织，你可以调用 `NSPredicate` 的 `predicateWithFormat:` 方法，传入格式字符串以及要插入格式中的数据。然后，在托管对象上下文中执行请求之前，将该谓词添加到获取请求中。代码如下所示：\n\
  \n```\nNSPredicate *predicate = [NSPredicate predicateWithFormat:@\"name contains\
  \ %@\", @\"Inc.\"];\n[fetchRequest setPredicate:predicate];\n```\n\n要按组织名称的字母顺序对结果集进行排序，可以在执行请求之前向请求添加排序描述符。\n\
  \n```\nNSSortDescriptor *sortByName = [[NSSortDescriptor alloc] initWithKey:@\"\
  name\" ascending:YES];\n[fetchRequest setSortDescriptors:[NSArray arrayWithObject:sortByName]];\n\
  ```\n\n第 6 章将更深入地讲解如何使用谓词进行简单和复杂查询，以及如何使用排序描述符进行排序。\n\n图 2–13 将本章中你见过的所有 Core Data\
  \ 类图整合到一个单一的类图中，展示了所有这些类在框架中的关系。\n\n图中用线条人物代表的用户代码主要与四个类进行交互：\n\n* `NSManagedObject`\
  \ (1)\n* `NSManagedObjectContext` (2)\n* `NSFetchRequest` (3)\n* `NSFetchedResultsController`\
  \ (4)\n\n请在图 2–13 中找到这四个编号为 1–4 的类，并将它们作为锚点，你应该能识别出本章已学习过的各个独立类图。唯一的例外是 `NSFetchedResultsController`\
  \ (4)，它与 iOS 表格视图紧密配合。我们将在第 9 章中介绍 `NSFetchedResultsController`。\n\n![images](img/0213.jpg)\n\
  \n**图 2–13.** *Core Data 的主要类*\n\n\n\n### 类的交互方式\n\n至此，您应该已经对与 Core Data 交互所涉及的类以及其底层机制有了良好的理解。本节将扩展上一节创建的\
  \ `OrgChart` 应用程序，展示 Core Data 类之间交互的一些示例。与上一节类似，本章仍将重点保持在相对基础的层面。本章的目标是展示这些类如何协同工作。本书其余章节将深入探讨每个概念（如数据操作、自定义持久化存储、性能优化等）。\n\
  \n上一节创建的数据模型应类似于 图 2–14 所示。\n\n![images](img/0214.jpg)\n\n**图 2–14.** *组织数据模型*\n\
  \n`Organization` 和 `Person` 实体均使用 `Integer 16` 类型的属性作为每个实体的唯一标识符。阅读至此的大部分程序员可能已经想到了自增，并曾在\
  \ Xcode 用户界面中点击尝试自行启用标识符属性的自增功能。如果你正是其中一员，现在又回来阅读本章，你很可能已经感到沮丧并放弃了尝试。你找不到自增功能的原因很简单：它不存在。Core\
  \ Data 使用真正的对象引用来管理对象图。它不需要像在关系数据库中那样作为主键使用的唯一自增标识符。如果持久化存储恰好是像 SQLite 这样的关系数据库，框架可能会使用一些自增标识符作为主键。但无论如何，作为\
  \ Core Data 用户，你不必担心这一点；这只是实现细节。我们特意在这个例子中引入标识符的概念，原因有二：\n\n*   引出自增的问题。\n*   展示如何使用\
  \ Core Data 管理数值。\n\n人员标识符的含义类似于社会保险号。它并非为了自增而设计，因为它是在数据存储外部计算得出的标识符。在 `Organization`\
  \ 示例中，我们简单地通过对象哈希值派生 ID。虽然这不能保证唯一性，但足以满足此应用的目的，并且实现简单。\n\n**注意：**作为程序员，你应该注意不要过分拘泥于已有的数据库知识。Core\
  \ Data 不是数据库；它是一个对象图持久化框架。其行为更接近于面向对象数据库，而非传统的关系数据库。\n\n代码清单 2–1 展示了应用程序委托类 `OrgChartAppDelegate.h`\
  \ 的头文件。你可以看到三个 Core Data 相关的属性：\n\n*   `NSManagedObjectContext *managedObjectContext`\n\
  *   `NSManagedObjectModel *managedObjectModel`\n*   `NSPersistentStoreCoordinator\
  \ *persistentStoreCoordinator`\n\n你还可以看到返回应用程序文档目录（持久化存储所在位置）的方法声明，以及另一个用于保存托管对象上下文的\
  \ `saveContext:` 方法声明。实现文件 `OrgChartAppDelegate.m` 将定义这些方法。\n\n**代码清单 2–1.** *`OrgChartAppDelegate.h`*\n\
  \n```\n#import <UIKit/UIKit.h>\n#import <CoreData/CoreData.h>\n\n@class OrgChartViewController;\n\
  \n@interface OrgChartAppDelegate : UIResponder <UIApplicationDelegate>\n\n@property\
  \ (strong, nonatomic) UIWindow *window;\n@property (strong, nonatomic) OrgChartViewController\
  \ *viewController;\n@property (readonly, strong, nonatomic) NSManagedObjectContext\
  \ *managedObjectContext;\n@property (readonly, strong, nonatomic) NSManagedObjectModel\
  \ *managedObjectModel;\n@property (readonly, strong, nonatomic) NSPersistentStoreCoordinator\
  \ *persistentStoreCoordinator;\n\n- (void)saveContext;\n- (NSURL *)applicationDocumentsDirectory;\n\
  \n@end\n```\n\n在 `OrgChartAppDelegate.m` 中，为来自 `OrgChartAppDelegate.h` 的三个 Core\
  \ Data 相关属性添加 `@synthesize` 行，如下所示：\n\n```\n@synthesize managedObjectContext = __managedObjectContext;\n\
  @synthesize managedObjectModel = __managedObjectModel;\n@synthesize persistentStoreCoordinator\
  \ = __persistentStoreCoordinator;\n```\n\n接着，你需要为这三个 Core Data 相关属性编写访问器代码。每个访问器首先判断其负责的对象是否已被创建。如果已创建，则返回该对象。如果未创建，则访问器使用适当的\
  \ Core Data 公式创建该对象，创建所需的任何其他成员对象，并返回它。代码清单 2–2 中需添加到 `OrgChartAppDelegate.m` 的代码应该看起来很熟悉。\n\
  \n**代码清单 2–2.** *添加三个 Core Data 相关属性的访问器*\n\n```\n- (void)saveContext\n{\n    NSError\
  \ *error = nil;\n    NSManagedObjectContext *managedObjectContext = self.managedObjectContext;\n\
  \    if (managedObjectContext != nil)\n    {\n        if ([managedObjectContext\
  \ hasChanges] && ![managedObjectContext save:&error])\n        {\n            NSLog(@\"\
  Unresolved error %@, %@\", error, [error userInfo]);\n            abort();\n   \
  \     }\n    }\n}\n\n#pragma mark - Core Data stack\n\n/**\n Returns the managed\
  \ object context for the application.\n If the context doesn't already exist, it\
  \ is created and bound to the persistent store coordinator for the application.\n\
  \ */\n- (NSManagedObjectContext *)managedObjectContext\n{\n    if (__managedObjectContext\
  \ != nil)\n    {\n        return __managedObjectContext;\n    }\n\n    NSPersistentStoreCoordinator\
  \ *coordinator = [self persistentStoreCoordinator];\n    if (coordinator != nil)\n\
  \    {\n        __managedObjectContext = [[NSManagedObjectContext alloc] init];\n\
  \        [__managedObjectContext setPersistentStoreCoordinator:coordinator];\n \
  \   }\n    return __managedObjectContext;\n}\n\n/**\n Returns the managed object\
  \ model for the application.\n If the model doesn't already exist, it is created\
  \ from the application's model.\n */\n- (NSManagedObjectModel *)managedObjectModel\n\
  {\n    if (__managedObjectModel != nil)\n    {\n        return __managedObjectModel;\n\
  \    }\n    NSURL *modelURL = [[NSBundle mainBundle] URLForResource:@\"OrgChart\"\
  \ withExtension:@\"momd\"];\n    __managedObjectModel = [[NSManagedObjectModel alloc]\
  \ initWithContentsOfURL:modelURL];\n    return __managedObjectModel;\n}\n\n/**\n\
  \ Returns the persistent store coordinator for the application.\n If the coordinator\
  \ doesn't already exist, it is created and the application's store added to it.\n\
  \ */\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\n{\n    if (__persistentStoreCoordinator\
  \ != nil)\n    {\n        return __persistentStoreCoordinator;\n    }\n\n    NSURL\
  \ *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
  OrgChart.sqlite\"];\n\n    NSError *error = nil;\n    __persistentStoreCoordinator\
  \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
  \    if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
  \ configuration:nil URL:storeURL options:nil error:&error])\n    {\n        NSLog(@\"\
  Unresolved error %@, %@\", error, [error userInfo]);\n        abort();\n    }\n\n\
  \    return __persistentStoreCoordinator;\n}\n\n#pragma mark - Application's Documents\
  \ directory\n```\n\n\n\n```objectivec\n/**\n 返回应用程序 Documents 目录的 URL。\n */\n- (NSURL\
  \ *)applicationDocumentsDirectory\n{\n  return [[[NSFileManager defaultManager]\
  \ URLsForDirectory:NSDocumentDirectory\n                                       \
  \     inDomains:NSUserDomainMask] lastObject];\n}\n```\n\n由于本章重点在于 Core Data 如何运作，而非用户界面设计与开发，`OrgChart`\
  \ 应用可以满足于一个空白的灰色屏幕。所有工作都将在 `didFinishLaunchingWithOptions:` 方法中完成，我们将向您展示如何使用外部工具来验证\
  \ Core Data 是否正确持久化了对象。\n\n在从持久化存储中读取任何数据之前，您必须先写入数据。修改 `didFinishLaunchingWithOptions:`\
  \ 方法，调用一个名为 `createData:` 的新方法，如下所示：\n\n```objectivec\n- (BOOL)application:(UIApplication\
  \ *)application\ndidFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n{\n\
  \  [self createData];\n  self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
  \ mainScreen] bounds]];\n  // 应用程序启动后的自定义覆盖点。\n  self.viewController = [[OrgChartViewController\
  \ alloc]\n                          initWithNibName:@\"OrgChartViewController\"\
  \ bundle:nil];\n  self.window.rootViewController = self.viewController;\n  [self.window\
  \ makeKeyAndVisible];\n  return YES;\n}\n```\n\n在 `OrgChartAppDelegate.h` 中，像这样声明\
  \ `createData:` 方法：\n\n```objectivec\n- (void)createData;\n```\n\n现在，在 `OrgChartAppDelegate.m`\
  \ 中像这样定义 `createData:` 方法：\n\n```objectivec\n- (void)createData\n{\n}\n```\n\n在\
  \ `createData:` 方法的实现中，您需要创建一个组织机构和三名员工。先从组织机构开始。请记住，就您而言，托管对象存在于托管对象上下文中。不必担心持久化存储；托管对象上下文会为您管理持久化存储。您只需创建代表组织机构的托管对象，并使用以下代码将其插入到托管对象上下文中：\n\
  \n```objectivec\nNSManagedObject *organization = [NSEntityDescription\n        \
  \                         insertNewObjectForEntityForName:@\"Organization\"\n  \
  \                               inManagedObjectContext:self.managedObjectContext];\n\
  ```\n\n现在您已经创建了一个组织机构，但尚未为其指定名称和标识符。`name` 属性的类型是 `String`，因此像这样为组织机构设置名称：\n\n```objectivec\n\
  [organization setValue:@\"MyCompany, Inc.\" forKey:@\"name\"];\n```\n\n`id` 属性的类型是\
  \ `Integer 16`，这是一个类。所有 Core Data 属性都必须有一个类类型，而非基本类型。要为组织机构创建 `id` 属性，先从组织机构名称的哈希值创建一个基本类型\
  \ `int`，然后将基本类型 `int` 转换为 `NSNumber` 对象，以便在 `setValue:forKey:` 方法中使用。代码如下所示：\n\n\
  ```objectivec\n[organization setValue:[NSNumber numberWithInt:[@\"MyCompany, Inc.\"\
  \ hash]] forKey:@\"id\"];\n```\n\n**注意：** Core Data 为了符合键值编码要求，对属性使用对象。任何基本类型都应转换为\
  \ `NSNumber`，以便使用 `setValue:forKey:` 方法。\n\n现在组织机构有了名称和标识符，尽管这些更改尚未提交到持久化存储。框架知道您已经更改了它所追踪的对象，并在调用\
  \ `save:` 方法提交上下文更改时，对持久化存储进行必要的调整。\n\n一个没有员工的组织机构几乎没什么用处，因此使用与创建组织机构相同的方法创建三个分别名为\
  \ John、Jane 和 Bill 的人员：使用适当名称的实体描述在托管对象上下文中创建一个新的托管对象，并设置名称和标识符值。代码如下所示：\n\n```objectivec\n\
  NSManagedObject *john = [NSEntityDescription insertNewObjectForEntityForName:@\"\
  Person\"\n                                              inManagedObjectContext:self.managedObjectContext];\n\
  [john setValue:@\"John\" forKey:@\"name\"];\n[john setValue:[NSNumber numberWithInt:[@\"\
  John\" hash]] forKey:@\"id\"];\n\nNSManagedObject *jane = [NSEntityDescription insertNewObjectForEntityForName:@\"\
  Person\"\n                                              inManagedObjectContext:self.managedObjectContext];\n\
  [jane setValue:@\"Jane\" forKey:@\"name\"];\n[jane setValue:[NSNumber numberWithInt:[@\"\
  Jane\" hash]] forKey:@\"id\"];\n\nNSManagedObject *bill = [NSEntityDescription insertNewObjectForEntityForName:@\"\
  Person\"\n                                              inManagedObjectContext:self.managedObjectContext];\n\
  [bill setValue:@\"Bill\" forKey:@\"name\"];\n[bill setValue:[NSNumber numberWithInt:[@\"\
  Bill\" hash]] forKey:@\"id\"];\n```\n\n现在您有了一个组织机构和三个互不关联的人员。组织结构图应该将 John 设为公司的领导者，而\
  \ Jane 和 Bill 则向 John 汇报。`OrgChart` 应用的数据模型有两种类型的关系。领导者是 `Organization` 与 `Person`\
  \ 之间的一对一关系，而员工则通过 `Person` 与自身之间的一对多关系进行设置。设置一对一关系的值出奇地简单。\n\n```objectivec\n[organization\
  \ setValue:john forKey:@\"leader\"];\n```\n\nCore Data 知道您正在分配一个关系值，因为它了解数据模型，并知道\
  \ `leader` 代表一个一对一关系。如果您传递了一个具有错误实体类型的托管对象作为值，您的代码将无法运行。\n\n要将 Jane 和 Bill 分配为 John\
  \ 的下属，您必须为 `employees` 这一对多关系赋值。Core Data 会将一对多关系的多端作为一个集合（`NSSet`）返回，这是一个由唯一对象构成的无序集合。对于\
  \ John 的 `employees` 关系，如果您调用 `valueForKey:` 方法，Core Data 会返回为 John 工作的现有员工集合。然而，由于您想向集合中添加对象，请调用\
  \ `mutableSetValueForKey:` 方法，因为它会返回一个 `NSMutableSet`（您可以向其中添加和删除对象），而不是不可变的 `NSSet`。将一个新的\
  \ `Person` 托管对象添加到返回的 `NSMutableSet` 中，即可为关系添加一名新员工。代码如下所示：\n\n```objectivec\nNSMutableSet\
  \ *johnsEmployees = [john mutableSetValueForKey:@\"employees\"];\n[johnsEmployees\
  \ addObject:jane];\n[johnsEmployees addObject:bill];\n```\n\n同样，由于您已经修改了 Core Data\
  \ 所追踪的对象图，您无需再做任何其他事情来帮助它管理不同数据片段之间的依赖关系。一切行为都如同您对常规对象的预期一样。不过，同样地，这些更改在您使用创建的 `saveContext:`\
  \ 方法保存托管对象上下文之前不会提交。\n\n```objectivec\n[self saveContext];\n```\n\n`createData:`\
  \ 方法的内容至此结束。运行应用程序，在您的 SQLite 数据库中创建数据。再次强调，在 iPhone 模拟器中您只会看到一个空白的灰色屏幕。在下一节中，我们将使用其他工具来验证\
  \ `OrgChart` 应用程序是否已将数据添加到数据库中。\n\n\n\n#### SQLite 入门\n\n由于 `OrgChart` 应用使用 `SQLite`\
  \ 作为持久化存储，并且你刚刚创建了该存储并存入了一些数据，因此你可以使用任何 `SQLite` 查看工具（例如 `Base` (`http://menial.co.uk/software/base/`)、`SQLite\
  \ Database Browser` (`http://sqlitebrowser.sourceforge.net/`) 或 `SQLite Manager`\
  \ (`http://code.google.com/p/sqlite-manager/`)）来查看它。但请注意，如果你从外部工具更改了 `Core Data`\
  \ 所拥有的 `SQLite` 数据库，那么随意操作数据库可能会引发问题。`Core Data` 管理 `SQLite` 数据库的方式属于实现细节，随时可能发生变化。此外，你可能会以某种方式损坏数据，导致\
  \ `Core Data` 无法读取数据或正确重建对象图。请将此视为一个警告。然而，在开发应用程序时，你可以通过删除损坏的数据库并让应用重新创建它来从中恢复，所以请放心使用工具深入数据库来调试你的应用。\n\
  \n尽管有图形化浏览工具可用，但我们推荐使用你的 Mac 上已经安装的、功能完善的命令行工具：`sqlite3`。在 Mac 上，打开 `Terminal.app`\
  \ 进入命令提示符，然后切换到 iPhone 模拟器的部署目录，操作如下：\n\n`cd ~/Library/Application\\ Support/iPhone\\\
  \ Simulator`\n\n要找到名为 `OrgChart.sqlite` 的数据库文件，请使用 `find` 命令：\n\n`find . -name \"\
  OrgChart.sqlite\" –print`\n\n你应该会看到类似这样的输出：\n\n`./5.0/Applications/E8654A34-8EC4-4EAF-B531-00A032DD5977/Documents/OrgChart.sqlite`\n\
  \n生成的 ID 将与前例不同，而且 Apple 过去曾移动过相对路径，未来也可能再次移动，因此你的路径会与此不同。这是指向你数据库文件的相对路径。要打开该数据库，请将该相对路径传递给\
  \ `sqlite3` 可执行文件，操作如下：\n\n`sqlite3 ./5.0/Applications/E8654A34-8EC4-4EAF-B531-00A032DD5977/Documents/OrgChart.sqlite`\n\
  \n运行此命令后，你将进入 `SQLite` 交互式 shell。在此界面中，你可以运行 SQL 命令，直到退出 shell。\n\n```\nSQLite version\
  \ 3.7.5\nEnter \".help\" for instructions\nEnter SQL statements terminated with\
  \ a \";\"\nsqlite>\n```\n\n一个有趣的命令是 `.schema`，它将显示 `Core Data` 为了支持你的对象模型而创建的 SQL\
  \ 模式。\n\n```\nsqlite> .schema\nCREATE TABLE ZORGANIZATION ( Z_PK INTEGER PRIMARY\
  \ KEY, Z_ENT INTEGER, Z_OPT INTEGER, ZID\nINTEGER, ZLEADER INTEGER, ZNAME VARCHAR\
  \ );\nCREATE TABLE ZPERSON ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER,\
  \ ZID\nINTEGER, Z2EMPLOYEES INTEGER, ZNAME VARCHAR );\nCREATE TABLE Z_METADATA (Z_VERSION\
  \ INTEGER PRIMARY KEY, Z_UUID VARCHAR(255), Z_PLIST\nBLOB);\nCREATE TABLE Z_PRIMARYKEY\
  \ (Z_ENT INTEGER PRIMARY KEY, Z_NAME VARCHAR, Z_SUPER INTEGER,\nZ_MAX INTEGER);\n\
  CREATE INDEX ZORGANIZATION_ZLEADER_INDEX ON ZORGANIZATION (ZLEADER);\nCREATE INDEX\
  \ ZPERSON_Z2EMPLOYEES_INDEX ON ZPERSON (Z2EMPLOYEES);\nsqlite>\n```\n\n请注意，这些表的命名与你的实体并不完全一致，表的列数多于实体的属性数，并且数据库中还存在一些在\
  \ `Core Data` 数据模型中找不到的额外表。你还可以看到，`Core Data` 负责创建了用作主键的整型列，并管理着它们的唯一性。如果你熟悉 `SQLite`，就会知道任何定义为\
  \ `INTEGER PRIMARY KEY` 的列都会自动递增，但关键是你不必知道这一点甚至无需关心。`Core Data` 会处理唯一性。\n\n你应该能解读\
  \ `Core Data` 用于将实体映射到表的代码，并识别出支持这两个实体的两个表：`ZORGANIZATION` 和 `ZPERSON`。你可以在运行 `OrgChart`\
  \ 应用后查询这些表，并验证数据确实已存储在数据库中。\n\n```\nsqlite> select Z_PK, ZID, ZLEADER, ZNAME from\
  \ ZORGANIZATION;\n1|-19904|2|MyCompany, Inc.\n\nsqlite> select Z_PK, ZID, Z2EMPLOYEES,\
  \ ZNAME from ZPERSON;\n1|6050|2|Jane\n2|-28989||John\n3|28151|2|Bill\nsqlite>\n\
  ```\n\n这些行相当易于阅读。你可以看到你创建的单个组织，它的领导者（`ZLEADER`）是 `Z_PK=2` 的那个人（John）。John 没有上级，但\
  \ Jane 和 Bill 有相同的上级（`Z2EMPLOYEES`），而该上级的 `Z_PK` 是 `2`（正如所料，又是 John）。\n\n要退出 `SQLite`\
  \ 交互式 shell，请键入 `.quit` 并按下回车键。\n\n```\nsqlite> .quit\n```\n\n\n\n### 使用 Core Data\
  \ 读取数据\n\n在本章中，你使用 Core Data 将数据写入 SQLite 数据库，并使用 `sqlite3` 命令行工具读取数据，确认数据已正确存储在持久化存储中。你也可以使用\
  \ Core Data 从持久化存储中读取数据。返回 Xcode，打开 `OrgChartAppDelegate.m` 文件，添加使用 Core Data 读取数据的方法。\n\
  \n由于员工关系是递归的（即源实体和目标实体相同），请使用递归方法来显示一个人及其下属。接下来展示的递归 `displayPerson:` 方法接受两个参数（要显示的人以及缩进级别），并通过递归遍历一个人的员工列表，在适当的缩进级别打印他们。代码如下所示：\n\
  \n```\n- (void)displayPerson:(NSManagedObject*)person withIndentation:(NSString*)indentation\n\
  {\n  NSLog(@\"%@Name: %@\", indentation, [person valueForKey:@\"name\"]);\n\n  //\
  \ 为子级别增加缩进\n  indentation = [NSString stringWithFormat:@\"%@  \", indentation];\n\
  \n  NSSet *employees = [person valueForKey:@\"employees\"];\n  id employee;\n  NSEnumerator\
  \ *it = [employees objectEnumerator];\n  while ((employee = [it nextObject]) !=\
  \ nil)\n  {\n    [self displayPerson:employee withIndentation:indentation];\n  }\n\
  }\n```\n\n现在编写一个方法，从上下文中检索所有组织，并显示它们及其领导者以及领导者的下属。代码见代码清单 2-3。\n\n**代码清单 2-3.**\
  \ *从数据库读取数据的方法*\n\n```\n- (void)readData\n{\n  NSManagedObjectContext *context =\
  \ [self managedObjectContext];\n  NSEntityDescription *orgEntity = [NSEntityDescription\
  \ entityForName:@\"Organization\"\ninManagedObjectContext:context];\n\n  NSFetchRequest\
  \ *fetchRequest = [[NSFetchRequest alloc] init];\n  [fetchRequest setEntity:orgEntity];\n\
  \n  NSArray *organizations = [context executeFetchRequest:fetchRequest error:nil];\n\
  \n  id organization;\n  NSEnumerator *it = [organizations objectEnumerator];\n \
  \ while ((organization = [it nextObject]) != nil)\n  {\n    NSLog(@\"Organization:\
  \ %@\", [organization valueForKey:@\"name\"]);\n\n    NSManagedObject *leader =\
  \ [organization valueForKey:@\"leader\"];\n    [self displayPerson:leader withIndentation:@\"\
  \  \"];\n  }\n}\n```\n\n将方法声明添加到 `OrgChartAppDelegate.h` 中，以消除编译器警告。\n\n```\n- (void)readData;\n\
  - (void)displayPerson:(NSManagedObject *)person withIndentation:(NSString *)indentation;\n\
  ```\n\n最后，修改 `didFinishLaunchingWithOptions:` 方法，调用 `[self readData]` 而非 `[self\
  \ createData]`。\n\n```\n- (BOOL)application:(UIApplication *)application\ndidFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions\n{\n  //[self createData];\n  [self readData];\n  self.window\
  \ = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n  // 应用程序启动后的自定义覆盖点。\n\
  \  self.viewController = [[OrgChartViewController alloc]\ninitWithNibName:@\"OrgChartViewController\"\
  \ bundle:nil];\n  self.window.rootViewController = self.viewController;\n  [self.window\
  \ makeKeyAndVisible];\n  return YES;\n}\n```\n\n构建并启动应用程序，然后查看调试日志，你应该会看到以下输出，其中显示了你创建的、以\
  \ John 为领导的组织，以及 John 的两名下属：\n\n```\n2011-07-30 22:18:37.422 OrgChart[4460:f203]\
  \ Organization: MyCompany, Inc.\n2011-07-30 22:18:37.424 OrgChart[4460:f203]   Name:\
  \ John\n2011-07-30 22:18:37.425 OrgChart[4460:f203]     Name: Bill\n2011-07-30 22:18:37.426\
  \ OrgChart[4460:f203]     Name: Jane\n```\n\n你可以随意对 `OrgChart` 应用进行实验，修改 `createData:`\
  \ 方法中创建的管理对象，调用 `createData:` 来存储你的更改，并调用 `readData:` 来验证更改是否已写入。你可以在每次运行之间删除 SQLite\
  \ 数据库文件，让 `OrgChart` 应用重新创建它，或者让多次运行在数据库中积累对象。例如，如果你为 Jane 添加了一个新下属（Jack），那么 `OrgChart`\
  \ 应用的输出将如下所示：\n\n```\n2011-07-30 22:22:21.858 OrgChart[4517:f203] Organization:\
  \ MyCompany, Inc.\n2011-07-30 22:22:21.860 OrgChart[4517:f203]   Name: John\n2011-07-30\
  \ 22:22:21.861 OrgChart[4517:f203]     Name: Bill\n2011-07-30 22:22:21.861 OrgChart[4517:f203]\
  \     Name: Jane\n2011-07-30 22:22:21.862 OrgChart[4517:f203]       Name: Jack\n\
  ```\n\nJack 向 Jane 汇报。Jane 和 Bill 都向 John 汇报。John 是公司的领导者。\n\n### 小结\n\n至此，Core\
  \ Data 框架对你来说应该不再那么令人望而生畏了。在本章中，你探索了高效管理整个对象图持久化所涉及的主要类，而无需让用户接触复杂的图算法或繁琐的 C API\
  \ 来与特定数据库交互。使用 Core Data 就像开车一样，无需成为修车技师。该框架仅用大约十几个类就能表示对象模型并管理数据对象图。类结构的简洁性具有迷惑性。你已经看到了\
  \ Core Data 的强大功能——而这仅仅是个开始。当你深入探索其众多配置选项、UI 绑定、可选的持久化存储以及自定义托管对象类时，你将会进一步领略 Core\
  \ Data 的精妙之处。\n\n"
- '# 第 3 章


  '
- "# 存储数据：SQLite 与其他选项\n\n第 2 章 解释了组成 Core Data 框架的各个类，以及它们之间协同工作的相互依赖关系和精确性。接下来的章节将解释并演示该框架在获得期望结果方面的灵活性，但框架的灵活性是有一定限度的。该框架为数据的存入和取出规定了结构、顺序和规则。你必须按照这种顺序和结构，以\
  \ Core Data 的方式行事，才能可靠地存储和检索数据。然而，在定义持久化存储的外观或运作方式时，Core Data 的束缚便不复存在。尽管人们倾向于认为数据“属于”数据库，并且苹果公司提供并将\
  \ SQLite 数据库作为 Core Data 持久化存储的默认选项，但你还有其他的选择；你的数据可以以你想要的任何形式存储。在大多数情况下，你可能会对默认的\
  \ SQLite 数据库感到满意，但本章将讨论其他选项以及它们可能适用的场景。\n\n在本章中，你将构建一个包含两个表以及它们之间的一对多关系的简单应用程序。假设你自愿管理一个青少年足球联赛，并试图跟踪各支球队的信息。在你的数据模型中，有一个\
  \ `Team` 表记录球队名称和队服颜色，还有一个 `Player` 表记录每位球员的名字、姓氏和电子邮件地址。一支球队有多名球员，而每名球员只属于一支球队。你先为\
  \ SQLite 构建这个应用程序，然后将其移植到其他持久化存储选项：内存存储和原子（或自定义）存储。请跟随步骤操作，并随意将数据存储到 SQLite 或你能想到的任何其他持久化存储中。\n\
  \n\n\n### 可视化用户界面\n\nLeague Manager 应用包含四个界面：\n- 球队列表\n- 添加/编辑球队\n- 球员列表\n- 添加/编辑球员\n\
  \n球队列表界面会列出应用内存储的所有球队及其球衣颜色。界面中有一个用于添加球队的 `+` 按钮，以及一个用于删除球队的编辑按钮。该界面如图 3–1 所示。\n\
  \n![images](img/0301.jpg)\n\n**图 3–1.** *球队列表界面*\n\n添加/编辑球队界面提供了用于输入球队名称和球衣颜色的字段。该界面如图\
  \ 3–2 所示。你可以通过点击球队列表界面中的 `+` 按钮来添加新球队，或通过点击现有球队来编辑其名称和球衣颜色，从而显示此界面。\n\n![images](img/0302.jpg)\n\
  \n**图 3–2.** *添加/编辑球队界面*\n\n球员列表界面列出了特定球队的所有球员。通过点击任意球队旁边的详细信息展开按钮即可进入该界面。如图 3–3\
  \ 所示，该界面有一个用于添加新球员的 `+` 按钮和一个用于删除球员的编辑按钮。\n\n![images](img/0303.jpg)\n\n**图 3–3.**\
  \ *球员列表界面*\n\n与添加/编辑球队界面类似，添加/编辑球员界面允许用户添加或编辑球员，并提供了相应的字段：名、姓和电子邮件地址。该界面如图 3–4 所示。你可以通过点击球员列表界面中的\
  \ `+` 按钮来添加新球员，或通过点击现有球员来编辑其数据。\n\n![images](img/0304.jpg)\n\n**图 3–4.** *添加/编辑球员界面*\n\
  \n现在你已了解要构建的内容，让我们开始吧。\n\n### 使用 SQLite 作为持久化存储\n\n在本节中，你将构建一个基于 Core Data 的应用，本章将使用该应用来演示不同的持久化存储选项。你将从\
  \ Xcode 的 Core Data 模板开始，在生成的代码基础上构建一个应用，该应用可以存储一组球队和一组球员，并允许用户对其进行维护。不要过分关注应用代码或用户界面；相反，应聚焦于背后的持久化存储及其多种形式。\n\
  \n首先，启动 Xcode，选择 `File` ![images](img/U001.jpg) `New` ![images](img/U001.jpg) `New\
  \ Project`。在弹出的对话框左侧的 iOS 下选择 Application，在右侧选择 Master-Detail Application，如图 3–5\
  \ 所示。点击 Next 按钮。在项目选项中，为 Product Name 输入 **League Manager**，为 Company Identifier\
  \ 输入 **book.coredata**，并勾选 Use Core Data 复选框，如图 3–6 所示。\n\n![images](img/0305.jpg)\n\
  \n**图 3–5.** *选择 Master-Detail Application 模板*\n\n![images](img/0306.jpg)\n\n**图\
  \ 3–6.** *命名项目并选择使用 Core Data*\n\n将项目保存到你通常保存项目的位置。\n\n就当前目的而言，League Manager 应用中最有趣的部分是数据模型。理解持久化存储依赖于创建并理解合适的数据模型，因此请仔细且精确地完成这一部分。通过选择\
  \ `League_Manager.xcdatamodeld` 在 Xcode 中打开数据模型。Xcode 右侧会显示生成的数据模型，其中包含一个名为 `Event`\
  \ 的实体和一个名为 `timeStamp` 的属性。选中 `Event` 实体并按 Delete 键将其删除，这样你将得到一个空的数据模型，如图 3–7 所示。\n\
  \n![images](img/0307.jpg)\n\n**图 3–7.** *空数据模型*\n\nLeague Manager 数据模型需要两个实体：一个用于存储球队，另一个用于存储球员。对于球队，你需要跟踪两个属性：名称和球衣颜色。对于球员，你需要跟踪三个属性：名、姓和电子邮件地址（这样你就可以联系球员，通知他们训练、比赛以及负责分发橙子片的时间安排）。你还需要记录哪些球员为哪支球队效力，以及某位球员为哪支球队效力。首先创建\
  \ `Team` 实体：点击 Xcode 底部显示的 Add Entity 按钮。（它可能显示为 Add Fetch Request 或 Add Configuration；如果是这样，请点击并按住以从菜单中选择\
  \ Add Entity。）Xcode 会创建一个名为 `Entity` 的新实体，其名称已高亮显示，方便你直接输入 **Team** 并按 Enter 键。现在点击\
  \ Add Attribute 按钮（它可能显示为 Add Property 或 Add Fetched Property；如果是这样，请点击并按住以从菜单中选择\
  \ Add Attribute）并输入 `name` 作为新属性的名称。请注意，你也可以点击 Attributes 部分底部的 `+` 按钮来添加属性。从 Type\
  \ 下拉菜单中选择 `String`。现在按照相同步骤创建第二个属性，但将其命名为 `uniformColor`，并选择 `String` 类型。你的数据模型应如图\
  \ 3–8 所示。\n\n![images](img/0308.jpg)\n\n**图 3–8.** *球队数据模型*\n\n在创建球队与球员之间的一对多关系之前，你必须先有球员供球队关联。创建另一个名为\
  \ `Player` 的实体，包含三个属性，均为 `String` 类型：`firstName`、`lastName` 和 `email`。你的数据模型现在应如图\
  \ 3–9 所示。\n\n![images](img/0309.jpg)\n\n**图 3–9.** *球队与球员数据模型*\n\n#### 配置一对多关系\n\
  \n要创建 `Team` 实体与 `Player` 实体之间的一对多关系，请选中 `Team` 实体，然后点击 Relationships 部分下方的 `+`\
  \ 按钮。将此关系命名为 `players`，并从 Destination 下拉菜单中选择 `Player`。在数据模型检查器中，保持 Optional 复选框处于选中状态。勾选\
  \ To-Many Relationship 复选框；一支球队可以拥有多名球员。对于 Delete Rule，从下拉菜单中选择 Cascade，这样删除一支球队时会将其所有球员一并删除。你暂时还无法在\
  \ Inverse 下拉菜单中选择反向关系，因为你尚未创建反向关系。Relationship information 部分应如图 3–10 所示。\n\n![images](img/0310.jpg)\n\
  \n**图 3–10.** *球员关系选项*\n\n接下来，通过选中 `Player` 实体，添加一个关系并将其命名为 `team`，来创建从 `Player`\
  \ 实体到 `Team` 实体的反向关系。从 Destination 列中选择 `Team`，从 Inverse 列中选择 `players`。保持关系选项为默认值。现在，你应该能够选中\
  \ `Team` 实体并验证其 `players` 关系已有反向关系：`team`。你的 Xcode 窗口应如图 3–11 所示。\n\n![images](img/0311.jpg)\n\
  \n**图 3–11.** *完整的 League Manager 数据模型*\n\n\n\n### 构建用户界面\n\n数据模型完成后，`League Manager`\
  \ 现在需要代码来显示数据。`Xcode` 生成了显示球队列表所需的大部分代码；接下来的任务是调整代码，因为生成的代码是为显示 `Event` 实体准备的，而\
  \ `Event` 实体在数据模型中已不存在。这些代码位于 `MasterViewController.h` 和 `MasterViewController.m`\
  \ 中，因此首先打开 `MasterViewController.h` 文件。注意，它有两个成员：一个 `NSManagedObjectContext` 实例和一个\
  \ `NSFetchedResultsController` 实例。你可以将 `NSManagedObjectContext` 实例（即你认识的应用对象上下文）移动到应用的委托（`League_ManagerAppDelegate`）中，但在这个简单的应用中，我们暂且将其保留在此处。`NSFetchedResultsController`\
  \ 实例与表格视图协同工作以显示你的球队。\n\n你需要一个添加球队的方法，因此在 `MasterViewController.h` 中声明一个名为 `insertTeamWithName:`\
  \ 的方法。此外，生成的代码在几个地方保存了上下文，因此遵循“不要重复自己（DRY）”原则，将其全部移到一个名为 `saveContext:` 的方法中。`MasterViewController.h`\
  \ 的代码现在如下所示，新方法声明以粗体显示：\n\n```objc\n#import <UIKit/UIKit.h>\n#import <CoreData/CoreData.h>\n\
  \n@interface MasterViewController : UITableViewController <NSFetchedResultsControllerDelegate>\n\
  \n@property (strong, nonatomic) NSFetchedResultsController *fetchedResultsController;\n\
  @property (strong, nonatomic) NSManagedObjectContext *managedObjectContext;\n\n\
  - (void)insertTeamWithName:(NSString *)name uniformColor:(NSString *)uniformColor;\n\
  - (void)saveContext;\n\n@end\n```\n\n打开 `MasterViewController.m` 文件，在 `initWithNibName:bundle:`\
  \ 方法中调整视图标题，该方法为应用设置了标题。该行代码如下所示：\n\n```objc\nself.title = NSLocalizedString(@\"\
  League Manager\", @\"League Manager\");\n```\n\n现在在 `MasterViewController.m` 中定义\
  \ `insertTeamWithName:` 方法。该方法如下所示：\n\n```objc\n- (void)insertTeamWithName:(NSString\
  \ *)name uniformColor:(NSString *)uniformColor {\n    // 创建由获取结果控制器管理的实体新实例。\n \
  \   NSManagedObjectContext *context = [self.fetchedResultsController managedObjectContext];\n\
  \    NSEntityDescription *entity = [[self.fetchedResultsController fetchRequest]\
  \ entity];\n    NSManagedObject *newManagedObject = [NSEntityDescription\ninsertNewObjectForEntityForName:[entity\
  \ name] inManagedObjectContext:context];\n\n    // 配置新球队\n    [newManagedObject\
  \ setValue:name forKey:@\"name\"];\n    [newManagedObject setValue:uniformColor\
  \ forKey:@\"uniformColor\"];\n\n    // 保存上下文\n    [self saveContext];\n}\n```\n\n\
  这段代码从应用的 `fetchedResultsController` 中获取托管对象上下文，然后在该托管对象上下文中插入一个新的 `NSManagedObject`\
  \ 实例。注意，它并未指定要插入的新实体名为 `Team`。该名称在 `fetchedResultsController` 的访问器中定义。生成的代码使用了名称\
  \ `Event`，因此找到 `fetchedResultsController` 中如下所示的一行：\n\n```objc\nNSEntityDescription\
  \ *entity = [NSEntityDescription entityForName:@\"Event\"\ninManagedObjectContext:self.managedObjectContext];\n\
  ```\n\n并将其更改为：\n\n```objc\nNSEntityDescription *entity = [NSEntityDescription entityForName:@\"\
  Team\"\ninManagedObjectContext:self.managedObjectContext];\n```\n\n此外，你还会注意到 `fetchedResultsController`\
  \ 方法中生成的模型残留：对名为 `timeStamp` 属性的引用，该属性用于对获取的结果进行排序（第 6 章讨论了排序及其工作原理）。将其改为按球队名称升序排序，因此这一行：\n\
  \n```objc\nNSSortDescriptor *sortDescriptor = [[NSSortDescriptor alloc] initWithKey:@\"\
  timeStamp\"\nascending:NO];\n```\n\n现在看起来像这样：\n\n```objc\nNSSortDescriptor *sortDescriptor\
  \ = [[NSSortDescriptor alloc] initWithKey:@\"name\"\nascending:YES];\n```\n\n在创建了代表新球队的托管对象后，`insertTeamWithName:`\
  \ 方法中的代码使用传入的参数设置其名称和队服颜色：\n\n```objc\n[newManagedObject setValue:name forKey:@\"\
  name\"];\n[newManagedObject setValue:uniformColor forKey:@\"uniformColor\"];\n```\n\
  \n最后，`insertTeamWithName:` 方法通过调用你声明但尚未定义的 `saveContext:` 方法来保存对象图（包括新球队）。你可以通过从\
  \ `Xcode` 生成的现已多余的 `insertNewObject:` 方法中剪切并粘贴那段代码来定义它。剪切该代码段后，删除 `insertNewObject:`\
  \ 方法，并按如下方式定义 `saveContext:`：\n\n```objc\n- (void)saveContext {\n    NSManagedObjectContext\
  \ *context = [self.fetchedResultsController\nmanagedObjectContext];\n    NSError\
  \ *error = nil;\n    if (![context save:&error]) {\n        /*\n         替换此实现，以合适的方式处理错误。\n\
  \n         abort() 会导致应用生成崩溃日志并终止。你绝不应在发布的应用中使用此函数，\n尽管它在开发过程中可能有用。如果无法从错误中恢复，请显示一个提示用户按\
  \ Home 键退出应用的警告面板。\n         */\n        NSLog(@\"Unresolved error %@, %@\", error,\
  \ [error userInfo]);\n        abort();\n    }\n}\n```\n\n保留生成的注释，以提醒你调用 `abort`\
  \ 是一种非常不友好的错误处理方式。第 10 章讨论了合适的错误处理方式。既然你现在有了一个可重用的方法来保存上下文，请将 `commitEditingStyle:`\
  \ 方法中的那段代码替换为对新的 `saveContext:` 方法的调用。\n\n\n\n### 配置表格\n\n表格单元格仍在配置为显示`Event`实体，而不是`Team`实体。您希望在每个表格单元格中显示团队的两项信息：团队名称和队服颜色。为此，首先在`cellForRowAtIndexPath:`方法中修改所创建的单元格样式以及使用的`CellIdentifier`。将这一行：\n\
  \n```\nstatic NSString *CellIdentifier = @\"Cell\";\n```\n\n改为：\n\n```\nstatic NSString\
  \ *CellIdentifier = @\"TeamCell\";\n```\n\n并将创建的表格单元格样式从`UITableViewCellStyleDefault`更改为`UITableViewCellStyleValue1`，使这一行：\n\
  \n```\ncell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\n\
  reuseIdentifier:CellIdentifier];\n```\n\n变为如下形式：\n\n```\ncell = [[UITableViewCell\
  \ alloc] initWithStyle:UITableViewCellStyleValue1\nreuseIdentifier:CellIdentifier];\n\
  ```\n\n生成的代码中已创建了一个名为`configureCell:atIndexPath:`的方法，该方法负责配置单元格。将这个方法从配置`Event`实体改为配置`Team`实体。您还希望能够从团队下钻查看其球员，因此为每个单元格添加一个详细信息展开按钮。生成的方法如下所示：\n\
  \n```\n- (void)configureCell:(UITableViewCell *)cell atIndexPath:(NSIndexPath *)indexPath\
  \ {\n    NSManagedObject *managedObject = [self.fetchedResultsController\n     \
  \   objectAtIndexPath:indexPath];\n    cell.textLabel.text = [[managedObject valueForKey:@\"\
  timeStamp\"] description];\n}\n```\n\n将其修改为如下形式：\n\n```\n- (void)configureCell:(UITableViewCell\
  \ *)cell atIndexPath:(NSIndexPath *)indexPath {\n    NSManagedObject *managedObject\
  \ = [self.fetchedResultsController\n        objectAtIndexPath:indexPath];\n    cell.textLabel.text\
  \ = [[managedObject valueForKey:@\"name\"] description];\n    cell.detailTextLabel.text\
  \ = [[managedObject valueForKey:@\"uniformColor\"] description];\n    cell.accessoryType\
  \ = UITableViewCellAccessoryDetailDisclosureButton;\n}\n```\n\n### 创建团队\n\n应用程序目前功能还很少。例如，您无法添加团队或任何球员。不过，现在正是编译并运行应用程序以确保一切进展顺利的好时机。如果应用程序此时无法构建或运行，请返回并检查您的数据模型和代码，确保与之前显示的代码一致，然后再继续。\n\
  \n主-从应用程序模板还创建了一个名为`DetailViewController`的控制器。您可以重用这个类，但由于我们希望同时显示团队和球员的详细信息，最佳做法是删除它并为控制器重新命名。删除`MasterViewController.m`文件顶部的`#import\
  \ \"DetailViewController.h\"`行。找到`tableView:didSelectRowAtIndexPath:`方法并将其清空，如下所示：\n\
  \n```\n- (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n}\n```\n\n然后，您可以安全地删除这三个`DetailViewController`文件（`.h`、`.m`和`.xib`）。\n\
  \n如果您运行应用程序并点击 + 按钮添加团队，会注意到应用程序崩溃了。+ 按钮仍然连接到您已经删除的`insertNewObject:`方法。您需要将其连接到一个允许您创建新团队的方法。创建新团队的设计需要一个模态窗口，让您输入团队名称和队服颜色。您也可以重复使用这个模态窗口来编辑现有团队，用户可以通过点击团队单元格进行编辑。通过选择\
  \ Xcode 菜单中的 `File` → `New` → `New File`，然后在左侧 iOS 下选择 Cocoa Touch Class，右侧选择`UIViewController`子类来创建这个模态窗口，如图\
  \ 3–12 所示，然后点击 Next 按钮。\n\n![images](img/0312.jpg)\n\n**图 3–12.** *为新建团队添加视图控制器*\n\
  \n将类命名为`TeamViewController`，使其成为`UIViewController`的子类，并勾选“With XIB for user interface”复选框，如图\
  \ 3–13 所示，然后点击 Next。\n\n![images](img/0313.jpg)\n\n**图 3–13.** *为新团队的视图控制器选择选项*\n\
  \n打开新的头文件（`TeamViewController.h`）。在 League Manager 中，`MasterViewController`类控制管理对象上下文，因此`TeamViewController`需要一个对它的引用和一个相应的初始化方法。由于您可以使用该控制器编辑团队以及创建新团队，因此允许调用代码传递一个团队对象进行编辑，并为此存储一个属性并添加到初始化方法中。用户界面有两个文本字段，一个用于团队名称，一个用于队服颜色，因此`TeamViewController`需要为这些字段提供属性。用户界面还有两个按钮：Save\
  \ 和 Cancel，因此`TeamViewController`必须具有连接到这些按钮的方法。综合以上所有内容，您将得到如清单 3–1 所示的`TeamViewController.h`。\n\
  \n**清单 3–1.** *TeamViewController.h*\n\n```\n#import <UIKit/UIKit.h>\n\n@class MasterViewController;\n\
  \n@interface TeamViewController : UIViewController {\n    IBOutlet UITextField *name;\n\
  \    IBOutlet UITextField *uniformColor;\n    NSManagedObject *team;\n    MasterViewController\
  \ *masterController;\n}\n@property (nonatomic, retain) UITextField *name;\n@property\
  \ (nonatomic, retain) UITextField *uniformColor;\n@property (nonatomic, retain)\
  \ NSManagedObject *team;\n@property (nonatomic, retain) MasterViewController *masterController;\n\
  \n- (IBAction)save:(id)sender;\n- (IBAction)cancel:(id)sender;\n- (id)initWithMasterController:(MasterViewController\
  \ *)aMasterController team:\n    (NSManagedObject *)aTeam;\n\n@end\n```\n\n\n\n\
  现在打开 `TeamViewController.m`；导入 `MasterViewController.h`；删除 `initWithNibName:` 方法；为\
  \ `name`、`uniformColor`、`team` 和 `masterController` 添加 `@synthesize` 语句。接下来，添加一个如下所示的\
  \ `initWithMasterController:` 方法的定义：\n\n```\n- (id)initWithMasterController:(MasterViewController\
  \ *)aMasterController team:\n(NSManagedObject *)aTeam {\n  if ((self = [super init]))\
  \ {\n    self.masterController = aMasterController;\n    self.team = aTeam;\n  }\n\
  \  return self;\n}\n```\n\n在用户添加新团队的情况下，`aTeam` 参数将为 `nil`，并且 `TeamViewController.m`\
  \ 将负责创建新团队。然而，在用户编辑现有团队的情况下，你必须获取现有团队的属性值，并将它们放入相应的文本字段中。在 `viewDidLoad:` 方法中执行此操作，如下所示：\n\
  \n```\n- (void)viewDidLoad {\n  [super viewDidLoad];\n  if (team != nil) {\n   \
  \ name.text = [team valueForKey:@\"name\"];\n    uniformColor.text = [team valueForKey:@\"\
  uniformColor\"];\n  }\n}\n```\n\n最后，实现 `save:` 和 `cancel:` 方法，以便此控制器能够在用户点击保存或取消按钮时做出适当的响应。`save:`\
  \ 方法会检查非 `nil` 的 `masterController` 实例，然后通过检查其 `team` 成员是否为 `nil` 来决定是创建新团队还是编辑现有团队。如果\
  \ `team` 不是 `nil`，它将更新现有团队的值，并请求 `masterController` 成员保存其上下文。如果 `team` 是 `nil`，它将请求\
  \ `MasterViewController` 实例在托管对象上下文中创建一个新团队，并传递用户输入的团队名称和队服颜色。最后，它关闭自身。方法的实现如下所示：\n\
  \n```\n- (IBAction)save:(id)sender {\n  if (masterController != nil) {\n    if (team\
  \ != nil) {\n      [team setValue:name.text forKey:@\"name\"];\n      [team setValue:uniformColor.text\
  \ forKey:@\"uniformColor\"];\n      [masterController saveContext];\n    } else\
  \ {\n      [masterController insertTeamWithName:name.text uniformColor:uniformColor.text];\n\
  \    }\n  }\n  [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n`cancel:`\
  \ 方法则简单地关闭自身。整个文件应如列表 3–2 所示。\n\n**列表 3–2.** *TeamViewController.m*\n\n```\n#import\
  \ \"TeamViewController.h\"\n#import \"MasterViewController.h\"\n\n@implementation\
  \ TeamViewController\n\n@synthesize name;\n@synthesize uniformColor;\n@synthesize\
  \ team;\n@synthesize masterController;\n\n- (id)initWithMasterController:(MasterViewController\
  \ *)aMasterController team:\n(NSManagedObject *)aTeam {\n  if ((self = [super init]))\
  \ {\n    self.masterController = aMasterController;\n    self.team = aTeam;\n  }\n\
  \  return self;\n}\n\n- (void)didReceiveMemoryWarning {\n  [super didReceiveMemoryWarning];\n\
  }\n\n#pragma mark - View lifecycle\n\n- (void)viewDidLoad {\n  [super viewDidLoad];\n\
  \  if (team != nil) {\n    name.text = [team valueForKey:@\"name\"];\n    uniformColor.text\
  \ = [team valueForKey:@\"uniformColor\"];\n  }\n}\n\n- (void)viewDidUnload {\n \
  \ [super viewDidUnload];\n}\n\n- (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation\
  \ {\n  return (interfaceOrientation == UIInterfaceOrientationPortrait);\n}\n\n#pragma\
  \ mark - Button handlers\n\n- (IBAction)save:(id)sender {\n  if (masterController\
  \ != nil) {\n    if (team != nil) {\n      [team setValue:name.text forKey:@\"name\"\
  ];\n      [team setValue:uniformColor.text forKey:@\"uniformColor\"];\n      [masterController\
  \ saveContext];\n    } else {\n      [masterController insertTeamWithName:name.text\
  \ uniformColor:uniformColor.text];\n    }\n  }\n  [self dismissModalViewControllerAnimated:YES];\n\
  }\n\n- (IBAction)cancel:(id)sender {\n  [self dismissModalViewControllerAnimated:YES];\n\
  }\n\n@end\n```\n\n编写好支持用户界面的代码后，就可以构建标签、文本字段和按钮了，用户将通过它们来创建团队。在 Xcode 中打开 `TeamViewController.xib`。你应该会看到一个空白视图。将两个\
  \ `Label` 实例拖到视图上，并将它们的内容修改为 **Team Name:** 和 **Uniform Color:**。将两个 `Text Field`\
  \ 实例拖到视图上，并将它们与标签右侧对齐。将两个 `Round Rect Button` 实例拖到 `Label` 和 `Text Field` 控件的下方，并将它们的标签改为\
  \ **Save** 和 **Cancel**。你的视图应如图 3–14 所示。\n\n![images](img/0314.jpg)\n\n**图 3–14.**\
  \ *更新后的团队视图*\n\n通过按住 Ctrl 键并将 File's Owner 图标分别拖拽到对应的 `Text Field` 实例上，然后从弹出菜单中选择相应的\
  \ `name` 或 `uniformColor`，将 `Text Field` 实例绑定到 `TeamViewController` 的成员 `name` 和\
  \ `uniformColor`。通过按住 Ctrl 键依次将每个按钮拖拽到 File's Owner 图标上，然后从弹出菜单中选择相应的方法，将按钮连接到 `save:`\
  \ 和 `cancel:` 方法。\n\n在构建并运行应用程序之前，你必须返回 `MasterViewController` 并添加代码以显示你刚刚构建的团队界面。你将在两种场景中显示它：当用户点击\
  \ + 按钮创建新团队时，以及当用户点击表格中的现有团队进行编辑时。首先，创建响应 + 按钮点击的方法。在 `MasterViewController.h` 中声明一个名为\
  \ `showTeamView:` 的方法，如下所示：\n\n```\n- (void)showTeamView;\n```\n\n转到 `MasterViewController.m`，导入\
  \ `TeamViewController.h`，并添加 `showTeamView:` 方法的定义。此方法创建一个 `TeamViewController`\
  \ 实例，并使用 `MasterViewController` 实例和 `nil` 团队进行初始化，以便 `TeamViewController` 知道在用户点击保存时应创建一个新团队。该方法应如下所示：\n\
  \n```\n- (void)showTeamView {\n  TeamViewController *teamViewController = [[TeamViewController\
  \ alloc]\ninitWithMasterController:self team:nil];\n  [self presentModalViewController:teamViewController\
  \ animated:YES];\n}\n```\n\n现在，你需要将 + 按钮连接到此方法。转到 `viewDidLoad:` 方法，并将这一行代码\n\n\
  ```\nUIBarButtonItem *addButton = [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemAdd\
  \ target:self\naction:@selector(insertNewObject)];\n```\n\n修改为：\n\n```\nUIBarButtonItem\
  \ *addButton = [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemAdd\
  \ target:self\naction:@selector(showTeamView)];\n```\n\n现在应用程序应该能够添加团队了，但在测试之前，请先添加编辑团队的代码。这段代码应通过询问\
  \ `fetchedResultsController` 来获取被点击的团队，`fetchedResultsController` 将使用传递给 `didSelectRowAtIndexPath:`\
  \ 方法的 `indexPath` 来确定。然后，代码会创建一个 `TeamViewController` 实例，并使用 `MasterViewController`\
  \ 和被点击的团队进行初始化。找到 `didSelectRowAtIndexPath:` 方法，并添加编辑被点击团队的代码，如下所示：\n\n\n\n`- (void)tableView:(UITableView\
  \ *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath {`  \n`  NSManagedObject\
  \ *team = [[self fetchedResultsController] objectAtIndexPath:indexPath];`  \n` \
  \ TeamViewController *teamViewController = [[TeamViewController alloc]`  \n`initWithMasterController:self\
  \ team:team];`  \n`  [self presentModalViewController:teamViewController animated:YES];`\
  \  \n`}`\n\n构建应用并运行它。应用的界面与上次运行时相同，如图 3–15 所示。\n\n![images](img/0315.jpg)\n\n**图\
  \ 3–15.** *不包含任何球队的联赛管理器*\n\n然而，现在如果你点击`+`按钮，就会出现创建新球队的屏幕，如图 3–16 所示。\n\n尽管去添加几支球队，编辑一些球队，再删除一些球队。你可以关闭并重新启动应用，会发现球队的状态与退出应用时一致——它们都会被添加到你的\
  \ SQLite 数据存储中。你还会注意到，球队会按队伍名称的字母顺序排列。图 3–17 展示了一些示例球队，并显示了名称和队服颜色。\n\n![images](img/0316.jpg)\n\
  \n**图 3–16.** *向联赛管理器添加新球队*\n\n![images](img/0317.jpg)\n\n**图 3–17.** *包含球队的联赛管理器*\n\
  \n你可能会注意到，可以创建名称和队服颜色为空白的球队。如果这是一个真实的应用程序，你会采取措施防止用户创建没有名称甚至没有队服颜色的球队。然而，本章的重点仍然是不同的持久化存储选项，因此你特意省略了任何验证代码。你还会注意到，本章后面创建的球员用户界面也没有验证代码，因此你可以创建空白的球员。第\
  \ 5 章会讨论如何验证数据。\n\n退出应用，享受你迄今为止所取得的成果……然后你会意识到，你只完成了`Team`实体。你必须继续实现`Player`用户界面和实体，才能称为完整的联赛管理器应用！\n\
  \n#### 球员用户界面\n\n要实现`Player`用户界面，你需要两个视图及其对应的控制器：一个用于列出球队的球员，另一个用于添加新球员或编辑现有球员。这些控制器在很大程度上与`Team`的控制器类似，不过它们不包含`NSFetchedResultsController`，也不包含`MasterViewController`所拥有的其他\
  \ Core Data 类。取而代之的是，它们将 Core Data 的交互委托给`MasterViewController`。\n\n首先创建用于列出球队球员的控制器和视图。添加一个新的`UIViewController`子类，确保在“Subclass\
  \ of”下拉菜单中选择`UITableViewController`，并取消选中“With XIB for user interface”。将其命名为`PlayerListViewController`，然后将注意力转向`PlayerListViewController.h`文件。这个类负责列出球队的球员，因此需要引用它所管理球员的`Team`实体。此外，由于它将\
  \ Core Data 交互委托给`MasterViewController`类，因此还需要引用`MasterViewController`。该控制器会有一个用于添加新球员的`+`按钮，因此声明一个名为`showPlayerView:`的方法来响应这个按钮的点击。最后，由于它不使用`NSFetchedResultsController`实例来对球员进行排序，因此必须自行实现球员排序。为了实现所有这些功能，最终得到的`PlayerListViewController.h`文件如代码清单\
  \ 3–3 所示。\n\n**代码清单 3–3.** *PlayerListViewController.h*\n\n```\n#import <UIKit/UIKit.h>\n\
  \n@class MasterViewController;\n\n@interface PlayerListViewController : UITableViewController\
  \ {\n  NSManagedObject *team;\n  MasterViewController *masterController;\n}\n@property\
  \ (nonatomic, retain) NSManagedObject *team;\n@property (nonatomic, retain) MasterViewController\
  \ *masterController;\n\n- (id)initWithMasterController:(MasterViewController *)aMasterController\
  \ team:\n(NSManagedObject *)aTeam;\n- (void)showPlayerView;\n- (NSArray *)sortPlayers;\n\
  \n@end\n```\n\n你会在`PlayerListViewController.m`文件中看到`MasterViewController.m`的部分身影。打开文件，添加对`MasterViewController.h`的导入，以及`team`和`masterController`属性的`@synthesize`行。将生成的`initWithStyle:`方法修改为`initWithMasterController:`方法，该方法接受这两个属性并进行存储，代码示例如下：\n\
  \n```\n- (id)initWithMasterController:(MasterViewController *)aMasterController\
  \ team:\n(NSManagedObject *)aTeam {\n  if ((self = [super init])) {\n    self.masterController\
  \ = aMasterController;\n    self.team = aTeam;\n  }\n  return self;\n}\n```\n\n\
  Xcode 为你生成了一个`viewDidLoad:`方法。添加以下代码来适当地更新视图标题，并显示一个`+`按钮用于向球队添加球员。由于你尚未开始构建添加或编辑球员的用户界面，因此先将`+`按钮连接到一个目前为空的新方法`showPlayerView:`。这两个方法如下所示：\n\
  \n```\n- (void)viewDidLoad {\n  [super viewDidLoad];\n\n  self.title = @\"Players\"\
  ;\n\n  UIBarButtonItem *addButton = [[UIBarButtonItem alloc]\ninitWithBarButtonSystemItem:UIBarButtonSystemItemAdd\
  \ target:self\naction:@selector(showPlayerView)];\n  self.navigationItem.rightBarButtonItem\
  \ = addButton;\n}\n\n- (void)showPlayerView {\n}\n```\n\n在`viewWillAppear:`方法中，指示控制器的表视图重新加载其数据，如下所示：\n\
  \n```\n- (void)viewWillAppear:(BOOL)animated {\n  [super viewWillAppear:animated];\n\
  [self.tableView reloadData];\n}\n```\n\n\n\n如果您希望表格视图重新加载其数据，您必须告诉表格视图要加载和显示什么数据。球员列表将在一个分区中按字母顺序显示某支球队的所有球员。要获取球队的球员，调用该球队的`valueForKey:@\"\
  players\"`方法，该方法利用数据模型中的“players”关系从 SQLite 持久化存储中提取所有`Player`实体，并将它们作为`NSSet`返回。设置单个分区和表格行数的代码如下：\n\
  \n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView {\n  return\
  \ 1;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\
  \ {\n  return [(NSSet *)[team valueForKey:@\"players\"] count];\n}\n```\n\n对于表格单元格，再次使用`UITableViewCellStyleValue1`样式，在左侧显示文本（球员的名字和姓氏），在右侧显示文本（电子邮件地址）。将生成的`cellForRowAtIndexPath:`修改为如下所示：\n\
  \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n  static NSString *CellIdentifier = @\"PlayerCell\";\n\n  UITableViewCell\
  \ *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n  if (cell\
  \ == nil) {\n    cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleValue1\n\
  reuseIdentifier:CellIdentifier];\n  }\n\n  NSManagedObject *player = [[self sortPlayers]\
  \ objectAtIndex:indexPath.row];\n  cell.textLabel.text = [NSString stringWithFormat:@\"\
  %@ %@\", [[player\nvalueForKey:@\"firstName\"] description], [[player valueForKey:@\"\
  lastName\"] description]];\n  cell.detailTextLabel.text = [[player valueForKey:@\"\
  email\"] description];\n  return cell;\n}\n```\n\n这里您看到了对`sortPlayers`的调用。回顾一下，“team”实例上的“players”关系返回一个`NSSet`，它不仅没有排序，而且由于没有确定的顺序，也无法通过索引访问。`cellForRowAtIndexPath:`方法要求为特定索引提供单元格以对应后端数据，因此没有`NSSet`方法能够完成您在此需要的任务：为表格在该索引路径处返回适当的单元格。相反，您需要使用这个`sortPlayers:`方法将`NSSet`转换为按球员姓氏排序的`NSArray`，如下所示：\n\
  \n```\n- (NSArray *)sortPlayers {\n  NSSortDescriptor *sortLastNameDescriptor =\
  \ [[NSSortDescriptor alloc]\ninitWithKey:@\"lastName\" ascending:YES];\n  NSArray\
  \ *sortDescriptors = [NSArray arrayWithObjects:sortLastNameDescriptor, nil];\n \
  \ return [[(NSSet *)[team valueForKey:@\"players\"] allObjects]\nsortedArrayUsingDescriptors:sortDescriptors];\n\
  }\n```\n\n要显示球队的球员列表视图，请返回`MasterViewController.m`，并添加一个方法来响应点击球队的详细信息披露按钮。需要实现的方法称为`accessoryButtonTappedForRowWithIndexPath:`，在此方法中，您从\
  \ fetched results controller 中检索被点击的球队，创建一个`PlayerListViewController`实例，用主视图控制器和该球队进行初始化，然后显示该控制器。代码如下：\n\
  \n```\n- (void)tableView:(UITableView *)tableView\naccessoryButtonTappedForRowWithIndexPath:(NSIndexPath\
  \ *)indexPath {\n  NSManagedObject *team = [self.fetchedResultsController objectAtIndexPath:indexPath];\n\
  \  PlayerListViewController *playerListViewController = [[PlayerListViewController\n\
  alloc] initWithMasterController:self team:team];\n  [self.navigationController pushViewController:playerListViewController\
  \ animated:YES];\n}\n```\n\n在`MasterViewController.m`顶部添加对`PlayerListViewController.h`的导入，然后您就可以重新构建并启动\
  \ League Manager 了。您应该能看到之前创建的球队，但现在当您点击球队的详细信息披露按钮时，会跳转到球员列表视图，如图 3-18 所示。由于目前还没有添加球员的途径，列表是空白的，并且“+”按钮没有任何作用。\n\
  \n![Figure 3-18](img/0318.jpg)\n\n\n  \n#### 添加、编辑和删除球员  \n\n`LeagueManager` 应用基本完成，目前仅缺少添加、编辑和删除球员的功能。为实现这些功能，需创建一个新的\
  \ `UIViewController` 子类：在“Subclass of”下拉菜单中选择 `UIViewController`，并勾选“With XIB for\
  \ user interface”，将其命名为 `PlayerViewController`。此类与 `TeamViewController` 类及其界面类似，但包含三个字段：`firstName`、`lastName`\
  \ 和 `email`。它还持有对 `MasterViewController` 实例的引用，以便将所有 Core Data 的存储与检索操作委托给该类。该类中有一个成员用于记录该球员所属的球队，另一个成员用于引用球员对象。若球员对象为\
  \ `nil`，`PlayerViewController` 则创建新球员；否则，它将编辑现有球员对象。界面包含三个按钮：保存球员、取消操作（添加或编辑）以及删除球员。由于在删除球员前需显示确认操作表，因此让\
  \ `PlayerViewController` 实现 `UIActionSheetDelegate` 协议。`PlayerViewController.h`\
  \ 的内容请参见代码清单 3–4。  \n\n**代码清单 3–4.** *PlayerViewController.h*  \n\n```objc  \n#import\
  \ <UIKit/UIKit.h>  \n\n@class MasterViewController;  \n\n@interface PlayerViewController\
  \ : UIViewController <UIActionSheetDelegate> {  \n  IBOutlet UITextField *firstName;\
  \  \n  IBOutlet UITextField *lastName;  \n  IBOutlet UITextField *email;  \n  NSManagedObject\
  \ *team;  \n  NSManagedObject *player;  \n  MasterViewController *masterController;\
  \  \n}  \n@property (nonatomic, retain) UITextField *firstName;  \n@property (nonatomic,\
  \ retain) UITextField *lastName;  \n@property (nonatomic, retain) UITextField *email;\
  \  \n@property (nonatomic, retain) NSManagedObject *team;  \n@property (nonatomic,\
  \ retain) NSManagedObject *player;  \n@property (nonatomic, retain) MasterViewController\
  \ *masterController;  \n\n- (IBAction)save:(id)sender;  \n- (IBAction)cancel:(id)sender;\
  \  \n- (IBAction)confirmDelete:(id)sender;  \n- (id)initWithMasterController:(MasterViewController\
  \ *)aMasterController team:  \n(NSManagedObject *)aTeam player:(NSManagedObject\
  \ *)aPlayer;  \n\n@end  \n```  \n\n现在，打开 `PlayerViewController.m` 文件，导入 `MasterViewController.h`，并为各个属性添加\
  \ `@synthesize` 行。添加 `PlayerViewController.h` 中声明的 `initWithMasterController:` 方法，以使用\
  \ `MasterViewController` 实例、`team` 以及可能为 `nil` 的 `player` 初始化该视图控制器。该方法如下所示：  \n\
  \n```objc  \n- (id)initWithMasterController:(MasterViewController *)aMasterController\
  \ team:  \n(NSManagedObject *)aTeam player:(NSManagedObject *)aPlayer {  \n  if\
  \ ((self = [super init])) {  \n    self.masterController = aMasterController;  \n\
  \    self.team = aTeam;  \n    self.player = aPlayer;  \n  }  \n  return self; \
  \ \n}  \n```  \n\n使用 `viewDidLoad:` 方法从 `player` 托管对象中提取值（若不为 `nil`），并将其填入 `firstName`、`lastName`\
  \ 和 `email` 字段。该方法如下所示：  \n\n```objc  \n- (void)viewDidLoad {  \n  [super viewDidLoad];\
  \  \n  if (player != nil) {  \n    firstName.text = [player valueForKey:@\"firstName\"\
  ];  \n    lastName.text = [player valueForKey:@\"lastName\"];  \n    email.text\
  \ = [player valueForKey:@\"email\"];  \n  }  \n}  \n```  \n\n下一步是添加响应三个按钮的方法。`save:`\
  \ 和 `cancel:` 方法与 `TeamViewController` 类中的对应方法类似，具体如下：  \n\n```objc  \n- (IBAction)save:(id)sender\
  \ {  \n  if (masterController != nil) {  \n    if (player != nil) {  \n      [player\
  \ setValue:firstName.text forKey:@\"firstName\"];  \n      [player setValue:lastName.text\
  \ forKey:@\"lastName\"];  \n      [player setValue:email.text forKey:@\"email\"\
  ];  \n      [masterController saveContext];  \n    } else {  \n      [masterController\
  \ insertPlayerWithTeam:team firstName:firstName.text  \nlastName:lastName.text email:email.text];\
  \  \n    }  \n  }  \n  [self dismissModalViewControllerAnimated:YES];  \n}  \n\n\
  - (IBAction)cancel:(id)sender {  \n  [self dismissModalViewControllerAnimated:YES];\
  \  \n}  \n```  \n\n`MasterViewController` 中尚不存在 `insertPlayerWithTeam:` 方法，稍后将创建。但首先需要实现界面中删除按钮调用的\
  \ `confirmDelete:` 方法。该方法不会立即删除球员，而是显示一个操作表，请求用户确认其意图。实现时先检查 `player` 是否不为 `nil`，即只有已有球员才能被删除。实际上，编辑球员时才应显示删除按钮，但为了聚焦于\
  \ Core Data，此处保持简单，在添加球员时忽略删除按钮的点击。`confirmDelete:` 方法如下：  \n\n```objc  \n- (IBAction)confirmDelete:(id)sender\
  \ {  \n  if (player != nil) {  \n    UIActionSheet *confirm = [[UIActionSheet alloc]\
  \ initWithTitle:nil delegate:self  \ncancelButtonTitle:@\"Cancel\" destructiveButtonTitle:@\"\
  Delete Player\"  \notherButtonTitles:nil];  \n    confirm.actionSheetStyle = UIActionSheetStyleBlackTranslucent;\
  \  \n    [confirm showInView:self.view];  \n  }  \n}  \n```  \n\n注意，此处将 `self` 作为\
  \ `UIActionSheet` 初始化方法的委托。Cocoa 框架会调用所传入委托的 `clickedButtonAtIndex:` 方法，因此需实现该方法。它检查被点击的按钮是否为删除按钮，然后请求主视图控制器使用\
  \ `deletePlayer:` 方法删除球员（该方法需在 `MasterViewController` 中创建）。`clickedButtonAtIndex:`\
  \ 方法如下：  \n\n```objc  \n- (void)actionSheet:(UIActionSheet *)actionSheet  \nclickedButtonAtIndex:(NSInteger)buttonIndex\
  \ {  \n  if (buttonIndex == 0 && masterController != nil) {  \n    // The Delete\
  \ button was clicked  \n    [masterController deletePlayer:player];  \n    [self\
  \ dismissModalViewControllerAnimated:YES];  \n  }  \n}  \n```  \n\n现在，回到 `MasterViewController.h`，声明\
  \ `PlayerViewController` 调用的两个方法：`insertPlayerWithTeam:` 和 `deletePlayer:`。声明如下：\
  \  \n\n```objc  \n- (void)insertPlayerWithTeam:(NSManagedObject *)team firstName:(NSString\
  \ *)firstName  \nlastName:(NSString *)lastName email:(NSString *)email;  \n- (void)deletePlayer:(NSManagedObject\
  \ *)player;  \n```  \n\n打开 `MasterViewController.m`，定义这两个方法。`insertPlayerWithTeam:`\
  \ 方法与 `insertTeamWithName:` 方法类似，但有一些重要区别。`insertTeamWithName:` 方法利用获取结果控制器及其与 `Team`\
  \ 实体的关联，而 `Player` 实体与获取结果控制器并无关联。因此，`insertPlayerWithTeam:` 方法通过显式将 `Player` 名称传递给\
  \ `insertNewObjectForEntityForName:` 方法来创建 `Player` 实体。它还必须通过将“team”键（即数据模型中关系的名称）设置为相应\
  \ `Team` 实体来建立与该实体的关系。`insertPlayerWithTeam:` 方法如下：  \n\n\n\n\n`- (void)insertPlayerWithTeam:(NSManagedObject\
  \ *)team firstName:(NSString *)firstName lastName:(NSString *)lastName email:(NSString\
  \ *)email {\n  // 创建球员对象\n  NSManagedObjectContext *context = [self.fetchedResultsController\
  \ managedObjectContext];\n  NSManagedObject *player = [NSEntityDescription insertNewObjectForEntityForName:@\"\
  Player\" inManagedObjectContext:context];\n  [player setValue:firstName forKey:@\"\
  firstName\"];\n  [player setValue:lastName forKey:@\"lastName\"];\n  [player setValue:email\
  \ forKey:@\"email\"];\n  [player setValue:team forKey:@\"team\"];\n\n  // 保存上下文\n\
  \  [self saveContext];\n}\n```\n\n`deletePlayer:`方法会检索托管对象上下文，调用其 `deleteObject:`\
  \ 方法（传入 `Player` 托管对象），然后保存该上下文。其实现如下：\n\n```\n- (void)deletePlayer:(NSManagedObject\
  \ *)player {\n  NSManagedObjectContext *context = [self.fetchedResultsController\
  \ managedObjectContext];\n  [context deleteObject:player];\n  [self saveContext];\n\
  }\n```\n\n最后一步是创建用户界面，并在用户添加或编辑球员时显示它。选择 `PlayerViewController.xib`，点击视图图标，将三个 `Label`\
  \ 实例和三个 `Text Field` 实例拖到视图上。将标签分别命名为**名字：**、**姓氏：**和**邮箱：**，并将文本字段连接到相应的属性。将三个\
  \ `Round Rect Button` 实例拖到视图上，分别命名为保存、取消和删除，并将它们连接到对应的方法。你的视图应如图 3–19 所示。\n\n![images](img/0319.jpg)\n\
  \n**图 3–19.** *球员视图*\n\n为了在用户调用时显示球员视图，前往 `PlayerListViewController.m`，导入 `PlayerViewController.h`，找到之前创建的空白\
  \ `showPlayerView:` 方法。在该方法中，创建一个 `PlayerViewController` 实例，用主视图控制器、球队和 `nil` 球员进行初始化（以便应用创建新球员），然后以模态窗口形式显示该视图。代码如下：\n\
  \n```\n- (void)showPlayerView {\n  PlayerViewController *playerViewController =\
  \ [[PlayerViewController alloc] initWithMasterController:masterController team:team\
  \ player:nil];\n  [self presentModalViewController:playerViewController animated:YES];\n\
  }\n```\n\n你还需要让应用响应对球员单元格的点击，以便用户编辑或删除所选球员。找到 `PlayerListViewController.m` 中生成的\
  \ `didSelectRowAtIndexPath:` 方法，清空其内容，替换为以下代码：从排序后的 `players` 数组中获取被点击的球员，创建球员视图控制器，按之前的方式初始化（但这次传入所选球员），然后显示视图。此时方法如下：\n\
  \n```\n- (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n  NSManagedObject *player = [[self sortPlayers] objectAtIndex:indexPath.row];\n\
  \  PlayerViewController *playerViewController = [[PlayerViewController alloc] initWithMasterController:masterController\
  \ team:team player:player];\n  [self presentModalViewController:playerViewController\
  \ animated:YES];\n}\n```\n\n至此，League Manager 应用就完成了。构建并运行它。得益于 SQLite 持久化存储，之前添加的任何球队都应仍然显示。深入球队，添加、删除或编辑一些球员。也可以尝试删除球队，观察球员随之消失。\n\
  \n### 查看持久化存储中的数据\n\n第 2 章展示了如何使用 `sqlite3` 命令行工具浏览 SQLite Core Data 持久化存储中的数据。为了结束关于\
  \ SQLite 持久化存储的部分，找到你的 SQLite 数据库（`League_Manager.sqlite3`），使用如下命令启动 `sqlite3` 并传入数据库：\n\
  \n```\nsqlite3 ./5.0/Applications/CE79C20B-4CBF-47C3–9E7C-9EC24FA88/Documents/League_Manager.sqlite\n\
  ```\n\n保持 League Manager 应用在 iPhone 模拟器中运行，以便你可以在应用和 `sqlite3` 工具之间切换，观察对数据库的影响。\n\
  \n首先使用 `.tables` 命令显示所有表。输出应如下所示：\n\n```\nsqlite> .tables\nZPLAYER       ZTEAM \
  \        Z_METADATA    Z_PRIMARYKEY\n```\n\n`ZPLAYER` 表存储 `Player` 实体，`ZTEAM` 表存储\
  \ `Team` 实体。创建三支球队：Crew（蓝色队服）、Fire（红色队服）和 Revolution（绿色队服）。在 SQLite 数据库中，它们看起来类似如下（取决于你创建和删除了多少支球队）：\n\
  \n```\nsqlite> select * from ZTEAM;\n1|2|3|Crew|Blue\n2|2|1|Fire|Red\n3|2|1|Revolution|Green\n\
  ```\n\n快速检查数据库，发现 League Manager 应用中没有球员：\n\n```\nsqlite> select * from ZPLAYER;\n\
  ```\n\n深入 Crew 球队，添加三名球员：Jordan Gordon、Pat Sprat 和 Bailey Staley。参考图 3–20 了解如何输入球员信息。添加完这三名球员后，你应该能在“球员”屏幕的列表中看到他们，如图\
  \ 3–21 所示。\n\n![images](img/0320.jpg)\n\n**图 3–20** *添加一名球员*\n\n![images](img/0321.jpg)\n\
  \n**图 3–21.** *球员列表*\n\n对 `ZPLAYER` 表重新执行 select 命令。输出应类似如下：\n\n```\nsqlite> select\
  \ * from ZPLAYER;\n1|1|1|1|Jordan|Gordan|jgordon@example.com\n2|1|1|1|Pat|Sprat|psprat@example.com\n\
  3|1|1|1|Bailey|Staley|bstaley@example.com\n```\n\n现在再添加一名球员，但这次添加到 Fire 球队，命名为 Terry\
  \ Gary。然后运行一条命令，显示每支球队及其球员，如下所示：\n\n```\nsqlite> select ZTEAM.ZNAME, ZPLAYER.ZFIRSTNAME,\
  \ ZPLAYER.ZLASTNAME from ZTEAM, ZPLAYER where ZTEAM.Z_PK = ZPLAYER.ZTEAM;\nCrew|Jordan|Gordon\n\
  Crew|Pat|Sprat\nCrew|Bailey|Staley\nFire|Terry|Gary\n```\n\n现在删除 Pat Sprat，并重新运行相同的\
  \ SQLite 命令。输出应如下所示：\n\n```\nsqlite> select ZTEAM.ZNAME, ZPLAYER.ZFIRSTNAME, ZPLAYER.ZLASTNAME\
  \ from ZTEAM, ZPLAYER where ZTEAM.Z_PK = ZPLAYER.ZTEAM;\nCrew|Jordan|Gordon\nCrew|Bailey|Staley\n\
  Fire|Terry|Gary\n```\n\n最后，删除 Fire 球队，并验证不仅 Fire 球队被删除，其唯一球员 Terry Gary 也随之消失：\n\
  \n```\nsqlite> select ZTEAM.ZNAME, ZPLAYER.ZFIRSTNAME, ZPLAYER.ZLASTNAME from ZTEAM,\
  \ ZPLAYER where ZTEAM.Z_PK = ZPLAYER.ZTEAM;\nCrew|Jordan|Gordon\nCrew|Bailey|Staley\n\
  ```\n\n可见 SQLite 数据库的运行方式符合你的理解。在开发 iOS 应用时，欢迎随时查看 SQLite 数据库，以便更深入地理解和欣赏 Core Data\
  \ 的工作原理。你的大多数数据驱动型应用很可能都会使用 SQLite 数据库，因此理解它们如何与 Core Data 协同工作，有助于排查问题或优化性能。\n\n\
  \n### 使用内存持久化存储\n\n在上一节中，你构建了一个基于 Core Data 的应用程序，它使用了默认的 SQLite 持久化存储类型。本节将讨论另一种类型：内存持久化存储。我们先来看看如何切换存储类型，然后再详细说明为何要使用这种存储类型。\n\
  \n切换 Core Data 为应用程序所使用的存储类型非常简单，只需在应用委托中创建持久化存储协调器时指定新的类型即可。`League_ManagerAppDelegate.m`\
  \ 中 `persistentStoreCoordinator:` 方法的代码现在如代码清单 3–5 所示，更新后的代码以粗体显示。\n\n**代码清单 3–5.**\
  \ *`League_ManagerAppDelegate.m` 中的 `persistentStoreCoordinator:` 方法*\n\n```\n-\
  \ (NSPersistentStoreCoordinator *)persistentStoreCoordinator {\n  if (__persistentStoreCoordinator\
  \ != nil) {\n    return __persistentStoreCoordinator;\n  }\n\n//  NSURL *storeURL\
  \ = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"League_Manager.sqlite\"\
  ];\n\n  NSError *error = nil;\n  __persistentStoreCoordinator = [[NSPersistentStoreCoordinator\
  \ alloc] initWithManagedObjectModel:[self managedObjectModel]];\n  if (![__persistentStoreCoordinator\
  \ addPersistentStoreWithType:NSInMemoryStoreType configuration:nil URL:nil options:nil\
  \ error:&error]) {\n    NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n\
  \    abort();\n  }\n\n  return __persistentStoreCoordinator;\n}\n```\n\n存储已被切换为内存存储。重新启动应用程序后，首先会发现之前存储在数据存储中的所有数据都消失了。这是因为你切换了数据存储，并且没有尝试将数据从旧存储迁移到新存储。第\
  \ 8 章 会解释如何在两个持久化存储之间迁移数据。\n\n内存数据存储的生命周期始于 Core Data 堆栈初始化时，止于应用程序停止时。\n\n**注意：**\
  \ 自 iOS4 及 iDevices 引入多任务功能以来，切换到另一个应用程序并不一定会终止当前正在运行的应用程序。相反，应用会进入后台。当应用被发送到后台时，内存持久化存储仍然存在，因此当应用重新回到前台时，数据仍然可用。\n\
  \n在设计数据管理框架并思考其默认应提供哪些类型的持久化存储时，内存存储通常不是首先浮现的想法。要找到一个使用内存存储的充分理由可能颇具挑战性，但确实存在一些合理的用途。例如，远程数据的本地缓存就能从内存持久化存储中获益。假设你的应用程序从远程服务器接收数据。如果应用程序执行大量查询，良好的软件工程实践会要求使用高效的数据传输方式。远程服务器可以将数据以压缩包的形式传输到客户端应用程序，客户端随后解压数据并存入内存存储中，以便高效地进行查询。在这种情况下，你希望每次应用程序启动时，甚至在应用程序运行期间定期刷新数据，因此内存数据存储的丢失是可以接受的。\n\
  \n图 3–22 展示了一个在内存存储中本地缓存远程信息的应用程序的启动序列。\n\n![images](img/0322.jpg)\n\n**图 3–22.**\
  \ *本地缓存远程信息*\n\n在开发基于 Core Data 的 iOS 应用程序时，可以考虑在应用不要求跨调用持久化数据的情况下使用内存数据存储。然而，那些要求用户数据不会仅仅因为应用程序停止运行而消失的传统应用程序，则不能使用这种持久化存储类型。\n\
  \n### 创建自定义持久化存储\n\n将持久化存储的实现与用户进行抽象隔离，是 Core Data 框架的基本原则。这种抽象使得你可以在不同的默认存储类型（`NSSQLiteStoreType`、`NSInMemoryStoreType`、`NSBinaryStoreType`）之间切换，而无需修改超过一行代码。在某些情况下，默认的存储类型并不能最好地满足你的需求。Core\
  \ Data 框架提供了一个钩子，用于在这些特殊情况下创建自定义存储类型。在本节中，你将创建一个新的存储类型，并将其用于 League Manager 应用程序。\n\
  \n在着手实现之前，你应该了解 Core Data 只允许你创建原子存储类型。原子存储是一种每次执行保存操作时都会一次性写入所有内容的存储。这实际上排除了创建基于\
  \ SQL 的存储类型的可能性，因为这种类型本可以借助 SQLite 之外的数据库作为后端，且仅影响数据库中修改过的数据行。在本节中，你将构建一个基于文件的自定义存储，它会以逗号分隔值（CSV）文件的形式存储数据，不过我们将使用竖线符号（`|`）来分隔值。\n\
  \n自定义数据存储必须继承 `NSAtomicStore` 类（`NSPersistentStore` 的子类），该类提供了容纳数据所需的基础架构。为了更好地理解其工作原理，可以想象\
  \ Core Data 框架内部的两个层级，如图 3–23 所示。用户与包含 `NSManagedObject` 和 `NSManagedObjectContext`\
  \ 的层级交互。另一层级则执行实际的持久化操作，并包含持久化存储协调器和持久化存储。在自定义存储的情况下，持久化层级还包含 `NSAtomicStoreCacheNode`，该节点包含在此层级内持有数据的对象。`NSAtomicStoreCacheNode`\
  \ 之于 `NSAtomicStore`，就如同 `NSManagedObject` 之于 `NSManagedObjectContext`。\n\n![images](img/0323.jpg)\n\
  \n**图 3–23.** *Core Data 内部的两个层级*\n\n\n\n#### 初始化自定义存储\n\n新的自定义存储负责在存储设备与`NSAtomicStoreCacheNode`之间传输数据，同时也负责在`NSManagedObject`与`NSAtomicStoreCacheNode`之间传输数据。\n\
  \n创建自定义存储的第一步是添加一个（或多个）类来实现它。本节构建的自定义存储位于一个名为`CustomStore`的类中。使用 Xcode 向 League\
  \ Manager 应用程序添加一个名为`CustomStore`的新 Objective-C 类，指定其为`NSAtomicStore`的子类。`CustomStore.h`的初始代码很简单：它按预期扩展了`NSAtomicStore`，如代码清单\
  \ 3–6 所示。\n\n**代码清单 3–6.** *CustomStore.h*\n\n```\n#import <Foundation/Foundation.h>\n\
  \n@interface CustomStore : NSAtomicStore {\n}\n\n@end\n```\n\n实现类最初是空白模板，必须实现几个方法。它包含用于获取类型和标识符的访问器方法（本节后续会解释），一个接受持久化存储协调器及其他参数的初始化方法，以及一些待实现的方法（你将在本节的后续内容中逐步实现）。参见代码清单\
  \ 3–7。\n\n**代码清单 3–7.** *CustomStore.m*\n\n```\n#import \"CustomStore.h\"\n\n@implementation\
  \ CustomStore\n\n#pragma mark - NSPersistentStore\n\n- (NSString *)type {\n    return\
  \ [[self metadata] objectForKey:NSStoreTypeKey];\n}\n\n- (NSString *)identifier\
  \ {\n    return [[self metadata] objectForKey:NSStoreUUIDKey];\n}\n\n- (id)initWithPersistentStoreCoordinator:(NSPersistentStoreCoordinator\
  \ *)coordinator\nconfigurationName:(NSString *)configurationName URL:(NSURL *)url\
  \ options:(NSDictionary\n*)options {\n    self = [super initWithPersistentStoreCoordinator:coordinator\n\
  configurationName:configurationName URL:url options:options];\n\n    return self;\n\
  }\n\n+ (NSDictionary *)metadataForPersistentStoreWithURL:(NSURL *)url error:(NSError\
  \ **)error {\n    return nil;\n}\n\n#pragma mark - NSAtomicStore\n\n- (BOOL)load:(NSError\
  \ **)error {\n    return YES;\n}\n\n- (id)newReferenceObjectForManagedObject:(NSManagedObject\
  \ *)managedObject {\n    return nil;\n}\n\n- (NSAtomicStoreCacheNode *)newCacheNodeForManagedObject:(NSManagedObject\n\
  *)managedObject {\n    return nil;\n}\n\n- (BOOL)save:(NSError **)error {\n    return\
  \ YES;\n}\n\n-(void)updateCacheNode:(NSAtomicStoreCacheNode *)node fromManagedObject:\n\
  (NSManagedObject *)managedObject {\n}\n\n@end\n```\n\n所有 Core Data 存储都包含辅助元数据，帮助持久化存储协调器管理不同的存储。元数据在`NSPersistentStore`类中具体化为`NSDictionary`对象。对于新的数据存储，有两个数据项尤其重要：`NSStoreTypeKey`和`NSStoreUUIDKey`。`NSStoreTypeKey`的值必须是唯一标识数据存储类型的字符串，而`NSStoreUUIDKey`的值必须是唯一标识数据存储本身的字符串。为了创建唯一标识符，添加一个静态工具方法，用于生成并返回通用唯一标识符（UUID）：\n\
  \n```\n+ (NSString *)makeUUID {\n    CFUUIDRef uuidRef = CFUUIDCreate(NULL);\n \
  \   CFStringRef uuidStringRef = CFUUIDCreateString(NULL, uuidRef);\n    CFRelease(uuidRef);\n\
  \    NSString* uuid = [NSString stringWithString:( __bridge NSString *)uuidStringRef];\n\
  \    CFRelease(uuidStringRef);\n    return uuid;\n}\n```\n\n在本章的示例中，两个数据文件支持自定义存储。第一个文件扩展名为`.txt`，包含数据本身；第二个文件扩展名为`.plist`，包含元数据。针对加载和保存元数据的问题，你将添加一个保存元数据的方法，并完善`metadataForPersistentStoreWithURL:error:`方法的实现，以加载元数据。\n\
  \n数据存储的初始化基于一个基础 URL。在`CustomStore`示例中，URL 指向数据文件（`.txt`文件），而元数据文件的 URL 则通过将基础 URL\
  \ 中的`.txt`扩展名替换为`.plist`扩展名来派生。\n\n`writeMetadata:toURL:`方法接收元数据`NSDictionary`并将其写入文件，代码如下：\n\
  \n```\n+ (void)writeMetadata:(NSDictionary*)metadata toURL:(NSURL*)url {\n    NSString\
  \ *path = [[url relativePath] stringByAppendingString:@\".plist\"];\n    [metadata\
  \ writeToFile:path atomically:YES];\n}\n```\n\n加载元数据稍显复杂，因为如果数据存储是新建且元数据文件不存在，则必须同时创建元数据文件和一个空数据文件。Core\
  \ Data 期望元数据中包含存储类型和存储 UUID，这有助于持久化存储协调器处理自定义存储，因此需要为`NSStoreTypeKey`和`NSStoreUUIDKey`设置相应值。找到`metadataForPersistentStoreWithURL:error:`方法，并将其内容修改为检查元数据文件是否存在；如果不存在，则写入包含存储类型键和\
  \ UUID 键的元数据文件，同时写入一个空白数据文件，如代码清单 3–8 所示。\n\n**代码清单 3–8.** *`metadataForPersistentStoreWithURL:error:`方法*\n\
  \n```\n+ (NSDictionary *)metadataForPersistentStoreWithURL:(NSURL *)url error:(NSError\
  \ **)error {\n    // 确定元数据文件的文件名\n    NSString *path = [[url relativePath] stringByAppendingString:@\"\
  .plist\"];\n\n    // 如果元数据文件不存在，则创建它\n    if(![[NSFileManager defaultManager] fileExistsAtPath:path])\
  \ {\n        // 创建一个字典，存储存储类型键（CustomStore）\n        // 和 UUID 键\n        NSMutableDictionary\
  \ *metadata = [NSMutableDictionary dictionary];\n        [metadata setValue:@\"\
  CustomStore\" forKey:NSStoreTypeKey];\n        [metadata setValue:[CustomStore makeUUID]\
  \ forKey:NSStoreUUIDKey];\n\n        // 将元数据写入.plist 文件\n        [CustomStore writeMetadata:metadata\
  \ toURL:url];\n\n        // 写入一个空数据文件\n        [@\"\" writeToURL:url atomically:YES\
  \ encoding:[NSString defaultCStringEncoding] error:nil];\n\n        NSLog(@\"已创建新存储于\
  \ %@\", path);\n    }\n    return [NSDictionary dictionaryWithContentsOfFile:path];\n\
  }\n```\n\n借助检索元数据和创建空白存储的方法，你可以完善初始化方法，代码如下：\n\n```\n- (id)initWithPersistentStoreCoordinator:(NSPersistentStoreCoordinator\
  \ *)coordinator\nconfigurationName:(NSString *)configurationName URL:(NSURL *)url\
  \ options:(NSDictionary\n*)options {\n    self = [super initWithPersistentStoreCoordinator:coordinator\n\
  configurationName:configurationName URL:url options:options];\n\n    NSDictionary\
  \ *metadata = [CustomStore metadataForPersistentStoreWithURL:[self URL]\nerror:nil];\n\
  \    [self setMetadata:metadata];\n\n    return self;\n}\n```\n\n\n\n### NSManagedObject\
  \ 与 NSAtomicStoreCacheNode 之间的映射\n\n要使自定义存储正常运行，您必须为三个额外的实用方法提供实现。第一个方法为给定的托管对象创建一个新的引用对象。引用对象为每个\
  \ `NSAtomicStoreCacheNode` 提供唯一标识符（类似于数据库主键）。`Reference` 对象之于 `NSAtomicStoreCacheNode`，就如同\
  \ `NSObjectID` 之于 `NSManagedObject`。由于自定义数据存储必须管理 `NSManagedObject` 和 `NSAtomicCacheNode`\
  \ 之间的数据传输，因此它必须能够为新创建的托管对象创建引用对象。为此，您再次使用 UUID。\n\n```\n- (id)newReferenceObjectForManagedObject:(NSManagedObject\
  \ *)managedObject {\n    NSString *uuid = [CustomStore makeUUID];\n    return uuid;\n\
  }\n```\n\n需要的第二个方法创建一个新的 `NSAtomicStoreCacheNode` 实例，以匹配新创建的 `NSManagedObject`。当添加一个新的\
  \ `NSManagedObject` 并需要持久化时，框架首先使用 `newReferenceObjectForManagedObject:` 方法获取一个引用对象。`NSAtomicCache`\
  \ 会跟踪 `NSObjectID` 和引用对象之间的映射。当 Core Data 将托管对象持久化到持久化存储时，它会调用 `newCacheNodeForManagedObject:`\
  \ 方法，顾名思义，该方法会创建一个新的 `NSAtomicStoreCacheNode`，作为 `NSManagedObject` 的对等节点。\n\n```\n\
  - (NSAtomicStoreCacheNode *)newCacheNodeForManagedObject:(NSManagedObject *)managedObject\
  \ {\n    NSManagedObjectID *oid = [managedObject objectID];\n    id referenceID\
  \ = [self referenceObjectForObjectID:oid];\n\n    NSAtomicStoreCacheNode* node =\
  \ [self nodeForReferenceObject:referenceID andObjectID:oid];\n    [self updateCacheNode:node\
  \ fromManagedObject:managedObject];\n    return node;\n}\n```\n\n`newCacheNodeForManagedObject:`\
  \ 的实现会查找为托管对象创建的引用对象，并创建一个链接到该引用 ID 的新缓存节点。最后，该方法使用 `updateCacheNode:fromManagedObject:`\
  \ 方法将托管对象的数据复制到节点中。您的自定义存储还需要提供第三个方法的实现，如列表 3–9 所示。\n\n**列表 3–9.** *`updateCacheNode:fromManagedObject:`\
  \ 方法*\n\n```\n- (void)updateCacheNode:(NSAtomicStoreCacheNode *)node\nfromManagedObject:(NSManagedObject\
  \ *)managedObject {\n    // 确定托管对象的实体\n    NSEntityDescription *entity = managedObject.entity;\n\
  \n    // 遍历实体中的所有属性\n    NSDictionary *attributes = [entity attributesByName];\n\
  \    for (NSString *name in [attributes allKeys]) {\n        // 对于每个属性，将托管对象的值设置到节点中\n\
  \        [node setValue:[managedObject valueForKey:name] forKey:name];\n    }\n\n\
  \    // 遍历实体中的所有关系\n    NSDictionary *relationships = [entity relationshipsByName];\n\
  \    for (NSString *name in [relationships allKeys]) {\n        id value = [managedObject\
  \ valueForKey:name];\n        // 如果这是对多关系...\n        if ([[relationships objectForKey:name]\
  \ isToMany]) {\n            // ...获取所有目标对象\n            NSSet *set = (NSSet*)value;\n\
  \            NSMutableSet *data = [NSMutableSet set];\n            for (NSManagedObject\
  \ *managedObject in set) {\n                // 对于关系中的每个目标对象，将缓存节点添加到集合中\n      \
  \          NSManagedObjectID *oid = [managedObject objectID];\n                id\
  \ referenceID = [self referenceObjectForObjectID:oid];\n                NSAtomicStoreCacheNode*\
  \ n = [self nodeForReferenceObject:referenceID andObjectID:oid];\n             \
  \   [data addObject:n];\n            }\n            [node setValue:data forKey:name];\n\
  \        } else {\n            // 这是对一关系，因此只需获取关系的单个目标节点\n            NSManagedObject\
  \ *managedObject = (NSManagedObject*)value;\n            NSManagedObjectID *oid\
  \ = [managedObject objectID];\n            id referenceID = [self referenceObjectForObjectID:oid];\n\
  \            NSAtomicStoreCacheNode* n = [self nodeForReferenceObject:referenceID\
  \ andObjectID:oid];\n            [node setValue:n forKey:name];\n        }\n   \
  \ }\n}\n```\n\n该实现会查找给定托管对象的实体描述，并使用它来遍历属性和关系，以便将它们的值复制到节点中。\n\n为了跟踪缓存节点，创建一个实用方法，给定一个引用对象，如果存在则返回匹配的\
  \ `NSAtomicStoreCacheNode`，否则创建一个新的。\n\n```\n- (NSAtomicStoreCacheNode *)nodeForReferenceObject:(id)reference\n\
  andObjectID:(NSManagedObjectID *)oid {\n    NSAtomicStoreCacheNode *node = [nodeCacheRef\
  \ objectForKey:reference];\n    if (node == nil) {\n        node = [[NSAtomicStoreCacheNode\
  \ alloc] initWithObjectID:oid];\n        [nodeCacheRef setObject:node forKey:reference];\n\
  \    }\n    return node;\n}\n```\n\n`nodeForReferenceObject:andObjectID:` 的实现使用了一个名为\
  \ `nodeCacheRef` 的字典，因此需要在 `CustomStore.h` 头文件中声明它，如列表 3–10 所示。\n\n**列表 3–10.**\
  \ *CustomStore.h*\n\n```\n#import <Foundation/Foundation.h>\n\n@interface CustomStore\
  \ : NSAtomicStore {\n    NSMutableDictionary *nodeCacheRef;\n}\n\n@end\n```\n\n\
  在 `initWithPersistentStoreCoordinator:configurationName:URL:options:` 方法中初始化 `nodeCacheRef`。\n\
  \n```\n- (id)initWithPersistentStoreCoordinator:(NSPersistentStoreCoordinator *)coordinator\n\
  configurationName:(NSString *)configurationName URL:(NSURL *)url options:(NSDictionary\
  \ *)options {\n    self = [super initWithPersistentStoreCoordinator:coordinator\n\
  configurationName:configurationName URL:url options:options];\n    NSDictionary\
  \ *metadata = [CustomStore metadataForPersistentStoreWithURL:[self URL]\nerror:nil];\n\
  \    [self setMetadata:metadata];\n    nodeCacheRef = [NSMutableDictionary dictionary];\n\
  \    return self;\n}\n```\n\n\n\n#### 序列化数据\n\n到目前为止，你所做的只是实现了处理元数据、初始化数据存储，以及在\
  \ `NSManagedObject` 实例与 `NSAtomicStoreCacheNode` 实例之间传输数据的实用方法。然而，在实现读写存储设备的方法之前，自定义存储没有任何用处。在扩展\
  \ `NSAtomicStore` 时，必须提供 `load:` 和 `save:` 方法的实现，它们构成了自定义存储实现的核心部分。在本例中，我们从 `save:`\
  \ 方法开始。下面的 `save:` 方法代码乍看起来可能令人不知所措，但如果你花点时间跟进代码，就会意识到它只是遍历缓存节点，将属性值写入文件，随后写入关系值。属性值被转换为\
  \ `NSString`，并作为键值对以 *attributeName=value* 的形式追加到管道分隔的文件中。关系的处理方式类似，不过写入的值不是目标节点本身，而是由\
  \ `newReferenceObjectForManagedObject:` 方法创建的引用对象。对于一对多关系，代码会写入一个逗号分隔的引用对象列表。列表\
  \ 3–11 展示了 `save:` 方法。\n\n**列表 3–11.** *`save:` 方法*\n\n```\n- (BOOL)save:(NSError\
  \ **)error {\n    NSURL *url = [self URL];\n\n    // 首先更新元数据\n    [CustomStore writeMetadata:[self\
  \ metadata] toURL:url];\n\n    NSString* dataFile = @\"\";\n    // 然后写入实际数据\n  \
  \  NSSet *nodes = [self cacheNodes];\n    NSAtomicStoreCacheNode *node;\n    NSEnumerator\
  \ *enumerator = [nodes objectEnumerator];\n\n    // 枚举所有节点\n    while ((node = [enumerator\
  \ nextObject]) != nil) {\n        // 获取每个节点的对象 ID 和引用 ID\n        NSManagedObjectID\
  \ *oid = [node objectID];\n        id referenceID = [self referenceObjectForObjectID:oid];\n\
  \n        // 将实体名称和引用 ID 作为行的前两个值写入\n        NSEntityDescription *entity = [oid\
  \ entity];\n        dataFile = [dataFile stringByAppendingFormat:@\"%@|%@\", entity.name,\
  \ referenceID];\n\n        {   // 写入所有属性\n            NSDictionary *attributes =\
  \ [entity attributesByName];\n            NSAttributeDescription *key = nil;\n \
  \           NSEnumerator *enumerator = [attributes objectEnumerator];\n        \
  \    while ((key = [enumerator nextObject]) != nil) {\n                NSString\
  \ *value = [node valueForKey:key.name];\n                if (value == nil) value\
  \ = @\"(null)\";\n                dataFile = [dataFile stringByAppendingFormat:@\"\
  |%@=%@\", key.name, value];  \n            }\n        }\n\n        {   // 写入所有关系\n\
  \            NSDictionary *relationships = [entity relationshipsByName];\n     \
  \       NSRelationshipDescription *key = nil;\n            NSEnumerator *enumerator\
  \ = [relationships objectEnumerator];\n            while ((key = [enumerator nextObject])\
  \ != nil) {\n                id value = [node valueForKey:key.name];\n         \
  \       if (value == nil) {\n                    dataFile = [dataFile stringByAppendingFormat:@\"\
  |%@=%@\", key.name, @\"(null)\"];\n                } else if (![key isToMany]) {\
  \  // 一对一\n                    NSManagedObjectID *oid = [(NSAtomicStoreCacheNode*)value\
  \ objectID];\n                    id referenceID = [self referenceObjectForObjectID:oid];\n\
  \                    dataFile = [dataFile stringByAppendingFormat:@\"|%@=%@\", key.name,\
  \ referenceID];\n                } else {  // 一对多\n                    NSSet* set\
  \ = (NSSet*)value;\n                    if ([set count] == 0) {\n              \
  \          dataFile = [dataFile stringByAppendingFormat:@\"|%@=%@\", key.name, @\"\
  (null)\"];\n                    } else {\n                        NSString *list\
  \ = @\"\";\n                        for (NSAtomicStoreCacheNode *item in set) {\n\
  \                            id referenceID = [self referenceObjectForObjectID:[item\
  \ objectID]];\n                            list = [list stringByAppendingFormat:@\"\
  %@,\", referenceID];\n                        }\n                        list =\
  \ [list substringToIndex:[list length]-1];\n                        dataFile = [dataFile\
  \ stringByAppendingFormat:@\"|%@=%@\", key.name, list];\n                    }\n\
  \                }\n            }\n        }\n        // 换行，进入下一行以处理下一个节点\n    \
  \    dataFile = [dataFile stringByAppendingString:@\"\\n\"];\n    }\n    // 写入文件\n\
  \    NSString *path = [url relativePath];\n    [dataFile writeToFile:path atomically:YES\
  \ encoding:[NSString defaultCStringEncoding] error:error];  \n    return YES;\n\
  }\n```\n\n文本文件中每条数据记录（在代码中由 `NSAtomicStoreCacheNode` 实例表示）遵循以下格式：\n\n```\nEntity\
  \ Name|Reference\nObject|attribute1=value1|attribute2=value2|...|relationship1=ref1,ref2,ref3|relationship2=ref4|...\n\
  ```\n\n`load:` 方法遵循与 `save:` 方法相同的步骤，但方向相反。它逐行读取数据文件，对每一行使用第一个元素查找实体描述，使用第二个元素作为节点的引用对象，然后遍历剩余元素以加载属性和关系。它利用这些元素重构\
  \ `NSAtomicStoreCacheNode` 实例；请参见列表 3–12。\n\n**列表 3–12.** *`load:` 方法*\n\n```\n\
  - (BOOL)load:(NSError **)error {\n    // 查找要加载的文件\n    NSURL* url = [self URL];\n\
  \    NSMutableSet *nodes = [NSMutableSet set];\n    NSString *path = [url relativePath];\n\
