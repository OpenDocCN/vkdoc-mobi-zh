  trans: "\n```objectivec\n- (void)deleteAllShapes {\n    // 获取所有形状\n    NSFetchRequest\
    \ *fetchRequest = [[NSFetchRequest alloc] init];\n    NSEntityDescription *entity\
    \ = [NSEntityDescription entityForName:@\"Shape\" inManagedObjectContext:self.managedObjectContext];\n\
    \    [fetchRequest setEntity:entity];\n    NSArray *shapes = [managedObjectContext\
    \ executeFetchRequest:fetchRequest error:nil];\n\n    // 逐一删除每个形状\n    for (NSManagedObject\
    \ *shape in shapes) {\n        [managedObjectContext deleteObject:shape];\n  \
    \  }\n\n    // 保存上下文\n    NSError *error = nil;\n    if (![self.managedObjectContext\
    \ save:&error]) {\n        NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n\
    \        abort();\n    }\n\n    // 通知视图重新绘制\n    [topView setNeedsDisplay];\n\
    \    [bottomView setNeedsDisplay];\n}\n```\n\n你可能注意到 `ShapesViewController` 类中有一个托管对象上下文的成员，但你尚未为该成员设置任何值。打开\
    \ `ShapesAppDelegate.m` 并添加代码来设置该值。方法定义中，新增的一行以粗体显示，如下所示：\n\n```objectivec\n-\
    \ (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions {\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\n    // 应用启动后的自定义覆盖点\n    self.viewController = [[ShapesViewController\
    \ alloc] initWithNibName:@\"ShapesViewController\" bundle:nil];\n    self.viewController.managedObjectContext\
    \ = self.managedObjectContext;\n    self.window.rootViewController = self.viewController;\n\
    \    [self.window makeKeyAndVisible];\n    return YES;\n}\n```\n\n构建 Shapes 应用还需要处理最后一个\
    \ Core Data 相关部分：创建 `Canvas` 实例并将其与视图关联，以及为每个 `Canvas` 创建一个 `Transform` 实例。这段代码应放入\
    \ `ShapesViewController.m` 的 `viewDidLoad:` 方法中。\n\n```objectivec\n- (void)viewDidLoad\
    \ {\n    // 创建 Canvas 实体\n    NSManagedObject *canvas1 = nil;\n    NSManagedObject\
    \ *canvas2 = nil;\n\n    // 加载画布\n    NSFetchRequest *fetchRequest = [[NSFetchRequest\
    \ alloc] init];\n    NSEntityDescription *entity = [NSEntityDescription entityForName:@\"\
    Canvas\" inManagedObjectContext:self.managedObjectContext];\n    [fetchRequest\
    \ setEntity:entity];\n    NSArray *canvases = [managedObjectContext executeFetchRequest:fetchRequest\
    \ error:nil];\n\n    // 如果持久化存储中已存在画布，则加载它们\n    if([canvases count] >= 2) {\n\
    \        NSLog(@\"加载现有画布\");\n        canvas1 = [canvases objectAtIndex:0];\n\
    \        canvas2 = [canvases objectAtIndex:1];\n    } else { // 持久化存储中不存在画布，则创建它们\n\
    \        NSLog(@\"创建新画布\");\n        canvas1 = [NSEntityDescription insertNewObjectForEntityForName:[entity\
    \ name] inManagedObjectContext:self.managedObjectContext];\n        canvas2 =\
    \ [NSEntityDescription insertNewObjectForEntityForName:[entity name] inManagedObjectContext:self.managedObjectContext];\n\
    \n        // 为每个画布创建 Transform 实例。第一个的缩放比例为 1\n        NSManagedObject *transform1\
    \ = [NSEntityDescription insertNewObjectForEntityForName:@\"Transform\" inManagedObjectContext:self.managedObjectContext];\n\
    \        [transform1 setValue:[NSNumber numberWithFloat:1] forKey:@\"scale\"];\n\
    \        [canvas1 setValue:transform1 forKey:@\"transform\"];\n\n        // 第二个画布的\
    \ Transform 缩放比例为 0.5\n        NSManagedObject *transform2 = [NSEntityDescription\
    \ insertNewObjectForEntityForName:@\"Transform\" inManagedObjectContext:self.managedObjectContext];\n\
    \        [transform2 setValue:[NSNumber numberWithFloat:0.5] forKey:@\"scale\"\
    ];\n        [canvas2 setValue:transform2 forKey:@\"transform\"];\n\n        //\
    \ 保存上下文\n        NSError *error = nil;\n        if (![self.managedObjectContext\
    \ save:&error]) {\n            NSLog(@\"Unresolved error %@, %@\", error, [error\
    \ userInfo]);\n            abort();\n        }\n    }\n    // 将 Canvas 实例设置到视图中\n\
    \    topView.canvas = canvas1;\n    bottomView.canvas = canvas2;\n}\n```"
- fmt: "#### Enabling User Interactions with the Shapes Application\n\nThat completes\
    \ the Core Data parts of the application. You could build and run it, but nothing\
    \ visible has changed. You need to add user interface elements to create, update,\
    \ and delete shapes. Start with creation. The user interface for creating a shape\
    \ is to tap the screen, so add a method to `ShapesViewController.m` to capture\
    \ any screen taps, determine the location of the tap, scale the location appropriately\
    \ according to the canvas, and call the `createShapeAt:` method, passing in the\
    \ tapped point.\n\n```\n#pragma mark - Touch events handling\n\n- (void)touchesBegan:(NSSet\
    \ *)touches withEvent:(UIEvent *)event {\n  UITouch *touch = [touches anyObject];\n\
    \n  // Where did the view get touched?\n  CGPoint location = [touch locationInView:\
    \ touch.view];\n\n  // Scale according to the canvas’ transform\n  float scale\
    \ = [(BasicCanvasUIView *)touch.view scale];    \n  location = CGPointMake(location.x\
    \ / scale, location.y / scale);\n\n  // Create the shape\n  [self createShapeAt:location];\n\
    }\n```\n\nNow the application merits building and running. You haven't finished\
    \ yet—you can't update or delete shapes—but you deserve some gratification for\
    \ having worked this long. Build and run the application, and tap the screen a\
    \ few times. Notice that you can tap either screen half, and the shapes appear\
    \ on both, with the shapes twice as big on the top half. Rotate the screen, and\
    \ see that the shapes still display. See [Figure 5–11](#Chapter05.html#fig_5_11)\
    \ for an example of what your screen should look like.\n\n![images](images/0511.jpg)\n\
    \n**Figure 5–11.** *Some shapes on your screen*\n\nStop the running application,\
    \ and add the user interface elements to update and delete the shapes. The user\
    \ interface for updating the shapes is rotating the device, so add a method to\
    \ detect any device rotation, and call the `updateAllShapes` method from within\
    \ it.\n\n```\n- (void) willRotateToInterfaceOrientation:(UIInterfaceOrientation)toInterfaceOrientation\n\
    duration:(NSTimeInterval)duration {\n  [self updateAllShapes];\n}\n```\n\nAdding\
    \ support for detecting whether the device is shaken, so the application can delete\
    \ all the shapes, is slightly more complicated. `ShapeViewController` must become\
    \ the first responder when its view displays, so add the method that makes it\
    \ eligible to be a first responder, and then make it become the first responder\
    \ in the `viewDidAppear` method.\n\n```\n- (BOOL)canBecomeFirstResponder {\n \
    \ return YES;\n}\n\n- (void)viewDidAppear:(BOOL)animated {\n  [super viewDidAppear:animated];\n\
    \  [self becomeFirstResponder];\n}\n```\n\nNow, add the method to detect any shakes,\
    \ and call the `deleteAllObjects` method from within it.\n\n```\n#pragma mark\
    \ - Shake events handling\n\n- (void)motionEnded:(UIEventSubtype)motion withEvent:(UIEvent\
    \ *)event {\n  if (event.subtype == UIEventSubtypeMotionShake) {\n    [self deleteAllShapes];\n\
    \  }\n}\n```\n\nThis completes the Shapes application. Build it, run it, tap it,\
    \ rotate it, shake it. You should see shapes appear, change colors, and disappear.\
    \ Through the easy Core Data interface, you can create, retrieve, update, and\
    \ delete data from your persistent store.\n\nIf you have any problems building\
    \ or running the Shapes application, check the accuracy of your data model and\
    \ also of your code. The complete source code of the Shapes application is available\
    \ online on this book's page at `http://apress.com/`.\n\nThe next section enhances\
    \ the Shapes application by adding custom data objects instead of using `NSManagedObject`\
    \ instances. In the typical life cycle of a Core Data–enabled application, you\
    \ will likely start by using `NSManagedObject`. As your application evolves, you\
    \ will eventually feel the need to introduce custom data objects for code clarity\
    \ and maintainability.\n\n### Generating Classes\n\nThis is the first time in\
    \ this book that you are on the verge of enhancing your managed objects to a level\
    \ that makes them truly blend with the rest of your code. Core Data gives you\
    \ so much flexibility to implement your own managed objects that you can almost\
    \ completely hide the fact that they are backed by the framework. In this section,\
    \ you rework the Shapes application in order to use custom managed objects. You\
    \ can make the changes either to your existing Shapes project, or make a copy\
    \ of the project and make changes to that. In the downloadable source code for\
    \ this book, we made a copy of the Shapes project in a directory called `Shapes2`\
    \ and made the changes there.\n\nThe first step in enhancing the Shapes application\
    \ is to create the data object classes themselves. You can create them manually\
    \ or let Xcode generate them for you. Generating classes for your model's entities\
    \ in Xcode 4 dispenses with the trickery that Xcode 3 required (open your model\
    \ file, click somewhere in the background, select **File** ![images](images/U001.jpg)\
    \ **New File**, and only then do you have the option to create classes to represent\
    \ your entities).\n\nTo generate classes for your model's entities, select **File**\
    \ ![images](images/U001.jpg) **New** ![images](images/U001.jpg) **New File**,\
    \ and select Core Data under iOS on the left and `NSManagedObject` subclass on\
    \ the right, as shown in [Figure 5–12](#Chapter05.html#fig_5_12). Click Next,\
    \ and in the ensuing dialog, select the Shapes data model, as shown in [Figure\
    \ 5–13](#Chapter05.html#fig_5_13), and click Next. The next dialog lets you select\
    \ the entities in your data model for which you'd like to generate classes. Select\
    \ all of them, as shown in [Figure 5–14](#Chapter05.html#fig_5_14), and click\
    \ Next. Click the Create button in the next dialog to save your generated classes.\n\
    \n![images](images/0512.jpg)\n\n**Figure 5–12.** *Creating a new NSManagedObject\
    \ subclass*\n\n![images](images/0513.jpg)\n\n**Figure 5–13.** *Selecting the Shapes\
    \ data model*\n\n![images](images/0514.jpg)\n\n**Figure 5–14.** *Selecting which\
    \ entities need classes generated*\n\nTo keep the code organized, a good practice\
    \ is to create a group of classes where you will store your data objects. In Xcode,\
    \ select all the generated classes, Ctrl+click, and select New Group from Selection.\
    \ Rename the new group to `Managed Objects`. [Figure 5–15](#Chapter05.html#fig_5_15)\
    \ shows what your source tree should look like.\n\n![images](images/0515.jpg)\n\
    \n**Figure 5–15.** *Source tree with the Managed Object classes in a group*\n\n\
    Xcode updates your model to use the generated classes for your entities. To verify,\
    \ display the attributes of any of your entities in the Data Model inspector.\
    \ For the Class field, the name of your generated class should display instead\
    \ of `NSManagedObject`. [Figure 5–16](#Chapter05.html#fig_5_16) shows an example\
    \ using the `Canvas` entity; note that Xcode has changed the entry for Class from\
    \ `NSManagedObject` to `Canvas`, the new class you generated.\n\n![images](images/0516.jpg)\n\
    \n**Figure 5–16.** *The Canvas entity updated to use the Canvas class*\n\nYou\
    \ don't have to use Xcode's generator to create model classes, however. To perform\
    \ the same task manually, without having Xcode generate your classes, you would\
    \ do two things:\n\n1.  Create the code for the class (open any of the new files\
    \ to see examples).\n2.  Update the Class field for the entity in your data model\
    \ to point to the new class.\n\nThat's good information to know, in case you ever\
    \ have to create those classes manually, but it's nice to have Xcode do the work\
    \ for you.\n\nNow, let's look at some of these classes. Open `Vertex.h`. You can\
    \ see that it imports the Foundation and Core Data framework header files, that\
    \ it derives from `NSManagedObject`, and that it exposes the properties (both\
    \ attributes and relationships) of the `Vertex` entity as Objective-C properties,\
    \ like so:\n\n```\n#import <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n\
    \n@class Polygon;\n```"
  raw: '#### Enabling User Interactions with the Shapes Application


    That completes the Core Data parts of the application. You could build and run
    it, but nothing visible has changed. You need to add user interface elements to
    create, update, and delete shapes. Start with creation. The user interface for
    creating a shape is to tap the screen, so add a method to `ShapesViewController.m`
    to capture any screen taps, determine the location of the tap, scale the location
    appropriately according to the canvas, and call the `createShapeAt:` method, passing
    in the tapped point.


    **`#pragma mark - Touch events handling`**


    **`- (void)touchesBegan:(NSSet *)touches withEvent:(UIEvent *)event {`**

    **`  UITouch *touch = [touches anyObject];`**


    **`  // Where did the view get touched?`**

    **`  CGPoint location = [touch locationInView: touch.view];`**


    **`  // Scale according to the canvas’ transform`**

    **`  float scale = [(BasicCanvasUIView *)touch.view scale];    `**

    **`  location = CGPointMake(location.x / scale, location.y / scale);`**


    **`  // Create the shape`**

    **`  [self createShapeAt:location];`**

    **`}`**


    Now the application merits building and running. You haven’t finished yet—you
    can’t update or delete shapes—but you deserve some gratification for having worked
    this long. Build and run the application, and tap the screen a few times. Notice
    that you can tap either screen half, and the shapes appear on both, with the shapes
    twice as big on the top half. Rotate the screen, and see that the shapes still
    display. See [Figure 5–11](#Chapter05.html#fig_5_11) for an example of what your
    screen should look like.


    ![images](images/0511.jpg)


    **Figure 5–11.** *Some shapes on your screen*


    Stop the running application, and add the user interface elements to update and
    delete the shapes. The user interface for updating the shapes is rotating the
    device, so add a method to detect any device rotation, and call the `updateAllShapes`
    method from within it.


    **`- (void) willRotateToInterfaceOrientation:(UIInterfaceOrientation)toInterfaceOrientation`**

    **`duration:(NSTimeInterval)duration {`**

    **`  [self updateAllShapes];`**

    **`}`**


    Adding support for detecting whether the device is shaken, so the application
    can delete all the shapes, is slightly more complicated. `ShapeViewController`
    must become the first responder when its view displays, so add the method that
    makes it eligible to be a first responder, and then make it become the first responder
    in the `viewDidAppear` method.


    **`- (BOOL)canBecomeFirstResponder {`**

    **`  return YES;`**

    **`}`**


    **`- (void)viewDidAppear:(BOOL)animated {`**

    **`  [super viewDidAppear:animated];`**

    **`  [self becomeFirstResponder];`**

    **`}`**


    Now, add the method to detect any shakes, and call the `deleteAllObjects` method
    from within it.


    **`#pragma mark - Shake events handling`**


    **`- (void)motionEnded:(UIEventSubtype)motion withEvent:(UIEvent *)event {`**

    **`  if (event.subtype == UIEventSubtypeMotionShake) {`**

    **`    [self deleteAllShapes];`**

    **`  }`**

    **`}`**


    This completes the Shapes application. Build it, run it, tap it, rotate it, shake
    it. You should see shapes appear, change colors, and disappear. Through the easy
    Core Data interface, you can create, retrieve, update, and delete data from your
    persistent store.


    If you have any problems building or running the Shapes application, check the
    accuracy of your data model and also of your code. The complete source code of
    the Shapes application is available online on this book’s page at `http:`//`apress.com/`.


    The next section enhances the Shapes application by adding custom data objects
    instead of using `NSManagedObject` instances. In the typical life cycle of a Core
    Data–enabled application, you will likely start by using `NSManagedObject`. As
    your application evolves, you will eventually feel the need to introduce custom
    data objects for code clarity and maintainability.


    ### Generating Classes


    This is the first time in this book that you are on the verge of enhancing your
    managed objects to a level that makes them truly blend with the rest of your code.
    Core Data gives you so much flexibility to implement your own managed objects
    that you can almost completely hide the fact that they are backed by the framework.
    In this section, you rework the Shapes application in order to use custom managed
    objects. You can make the changes either to your existing Shapes project, or make
    a copy of the project and make changes to that. In the downloadable source code
    for this book, we made a copy of the Shapes project in a directory called Shapes2
    and made the changes there.


    The first step in enhancing the Shapes application is to create the data object
    classes themselves. You can create them manually or let Xcode generate them for
    you. Generating classes for your model’s entities in Xcode 4 dispenses with the
    trickery that Xcode 3 required (open your model file, click somewhere in the background,
    select **File** ![images](images/U001.jpg) **New File**, and only then do you
    have the option to create classes to represent your entities).


    To generate classes for your model’s entities, select **File** ![images](images/U001.jpg)
    **New** ![images](images/U001.jpg) **New File**, and select Core Data under iOS
    on the left and NSManagedObject subclass on the right, as shown in [Figure 5–12](#Chapter05.html#fig_5_12).
    Click Next, and in the ensuing dialog, select the Shapes data model, as shown
    in [Figure 5–13](#Chapter05.html#fig_5_13), and click Next. The next dialog lets
    you select the entities in your data model for which you’d like to generate classes.
    Select all of them, as shown in [Figure 5–14](#Chapter05.html#fig_5_14), and click
    Next. Click the Create button in the next dialog to save your generated classes.


    ![images](images/0512.jpg)


    **Figure 5–12.** *Creating a new NSManagedObject subclass*


    ![images](images/0513.jpg)


    **Figure 5–13.** *Selecting the Shapes data model*


    ![images](images/0514.jpg)


    **Figure 5–14.** *Selecting which entities need classes generated*


    To keep the code organized, a good practice is to create a group of classes where
    you will store your data objects. In Xcode, select all the generated classes,
    Ctrl+click, and select New Group from Selection. Rename the new group to `Managed
    Objects`. [Figure 5–15](#Chapter05.html#fig_5_15) shows what your source tree
    should look like.


    ![images](images/0515.jpg)


    **Figure 5–15.** *Source tree with the Managed Object classes in a group*


    Xcode updates your model to use the generated classes for your entities. To verify,
    display the attributes of any of your entities in the Data Model inspector. For
    the Class field, the name of your generated class should display instead of `NSManagedObject`.
    [Figure 5–16](#Chapter05.html#fig_5_16) shows an example using the `Canvas` entity;
    note that Xcode has changed the entry for Class from `NSManagedObject` to `Canvas`,
    the new class you generated.


    ![images](images/0516.jpg)


    **Figure 5–16.** *The Canvas entity updated to use the Canvas class*


    You don’t have to use Xcode’s generator to create model classes, however. To perform
    the same task manually, without having Xcode generate your classes, you would
    do two things:


    1.  Create the code for the class (open any of the new files to see examples).

    2.  Update the Class field for the entity in your data model to point to the new
    class.


    That’s good information to know, in case you ever have to create those classes
    manually, but it’s nice to have Xcode do the work for you.


    Now, let’s look at some of these classes. Open `Vertex.h`. You can see that it
    imports the Foundation and Core Data framework header files, that it derives from
    `NSManagedObject`, and that it exposes the properties (both attributes and relationships)
    of the `Vertex` entity as Objective-C properties, like so:


    `#import <Foundation/Foundation.h>`

    `#import <CoreData/CoreData.h>`


    `@class Polygon;`'
  trans: "\n#### 启用与图形应用的用户交互\n\n这样便完成了应用的 Core Data 部分。你可以构建并运行它，但界面上并没有任何可见变化。你需要添加用户界面元素来创建、更新和删除图形。先从创建开始。创建图形的用户界面操作是点击屏幕，因此在\
    \ `ShapesViewController.m` 中添加一个方法，用于捕获屏幕点击、确定点击位置、根据画布进行适当缩放，然后调用 `createShapeAt:`\
    \ 方法并传入点击点坐标。\n\n```\n#pragma mark - 触摸事件处理\n\n- (void)touchesBegan:(NSSet *)touches\
    \ withEvent:(UIEvent *)event {\n  UITouch *touch = [touches anyObject];\n  \n\
    \  // 视图在哪被触摸？\n  CGPoint location = [touch locationInView: touch.view];\n  \n\
    \  // 根据画布的形变进行缩放\n  float scale = [(BasicCanvasUIView *)touch.view scale];  \
    \  \n  location = CGPointMake(location.x / scale, location.y / scale);\n  \n \
    \ // 创建图形\n  [self createShapeAt:location];\n}\n```\n\n现在值得构建和运行应用了。虽然你尚未完成——还不能更新或删除图形——但你已经为此付出了大量努力，理应收获一些成就感。构建并运行应用，然后点击屏幕几次。请注意，你可以点击屏幕的任一半，图形会在上下两半屏都出现，并且上半屏的图形尺寸是下半屏的两倍。旋转屏幕，图形依然会正常显示。请参见图\
    \ 5–11 查看屏幕应有的显示效果。\n\n![images](img/0511.jpg)\n\n**图 5–11.** *屏幕上的若干图形*\n\n停止正在运行的应用，然后添加用于更新和删除图形的用户界面元素。更新图形的用户界面操作是旋转设备，因此添加一个检测设备旋转的方法，并在其中调用\
    \ `updateAllShapes` 方法。\n\n```\n- (void) willRotateToInterfaceOrientation:(UIInterfaceOrientation)toInterfaceOrientation\n\
    duration:(NSTimeInterval)duration {\n  [self updateAllShapes];\n}\n```\n\n添加对设备摇一摇的检测支持，以便应用能够删除所有图形，这一过程稍显复杂。`ShapeViewController`\
    \ 必须在其视图显示时成为第一响应者，因此添加使其具备第一响应者资格的方法，然后在 `viewDidAppear` 方法中使其成为第一响应者。\n\n```\n\
    - (BOOL)canBecomeFirstResponder {\n  return YES;\n}\n\n- (void)viewDidAppear:(BOOL)animated\
    \ {\n  [super viewDidAppear:animated];\n  [self becomeFirstResponder];\n}\n```\n\
    \n现在，添加检测摇动的方法，并在其中调用 `deleteAllObjects` 方法。\n\n```\n#pragma mark - 摇动事件处理\n\n\
    - (void)motionEnded:(UIEventSubtype)motion withEvent:(UIEvent *)event {\n  if\
    \ (event.subtype == UIEventSubtypeMotionShake) {\n    [self deleteAllShapes];\n\
    \  }\n}\n```\n\n至此，Shapes 应用开发完成。构建它，运行它，点击它，旋转它，摇动它。你会看到图形出现、颜色变化、然后消失。通过易用的\
    \ Core Data 接口，你可以对持久化存储中的数据进行创建、检索、更新和删除操作。\n\n如果在构建或运行 Shapes 应用时遇到任何问题，请检查你的数据模型和代码的准确性。Shapes\
    \ 应用的完整源代码可在本书的页面 `http://apress.com/` 上在线获取。\n\n下一节将通过使用自定义数据对象而非 `NSManagedObject`\
    \ 实例来增强 Shapes 应用。在 Core Data 应用的典型生命周期中，你通常会从使用 `NSManagedObject` 开始。随着应用的演进，为了提升代码的清晰度和可维护性，你最终会需要引入自定义数据对象。\n\
    \n### 生成类\n\n这是本书中你首次将受管对象提升到能真正与代码其他部分融合的地步。Core Data 为你实现自定义受管对象提供了极大的灵活性，你几乎可以完全隐藏它们由框架支持的这一事实。在本节中，你将重构\
    \ Shapes 应用以使用自定义受管对象。你可以直接修改现有的 Shapes 项目，也可以复制一个项目副本再进行修改。在本书的可下载源代码中，我们在名为\
    \ `Shapes2` 的目录下复制了 Shapes 项目并进行了修改。\n\n增强 Shapes 应用的第一步是创建数据对象类本身。你可以手动创建，也可以让\
    \ Xcode 为你生成。在 Xcode 4 中为模型实体生成类，省去了 Xcode 3 所需的小技巧（打开模型文件，点击背景空白处，选择**文件** ![images](img/U001.jpg)\
    \ **新建文件**，然后才能选择创建表示实体的类）。\n\n要为模型实体生成类，请选择**文件** ![images](img/U001.jpg) **新建**\
    \ ![images](img/U001.jpg) **新建文件**，然后在左侧 iOS 下选择 Core Data，在右侧选择 `NSManagedObject`\
    \ 子类，如图 5–12 所示。点击下一步，在后续对话框中选择 Shapes 数据模型，如图 5–13 所示，然后点击下一步。下一个对话框让你选择数据模型中需要生成类的实体。全选它们，如图\
    \ 5–14 所示，点击下一步。在下一个对话框中点击“创建”按钮来保存生成的类。\n\n![images](img/0512.jpg)\n\n**图 5–12.**\
    \ *创建新的 NSManagedObject 子类*\n\n![images](img/0513.jpg)\n\n**图 5–13.** *选择 Shapes\
    \ 数据模型*\n\n![images](img/0514.jpg)\n\n**图 5–14.** *选择需要生成类的实体*\n\n为了保持代码组织有序，一个好的实践是创建一个用于存放数据对象的类组。在\
    \ Xcode 中，选中所有生成的类，按住 Ctrl 键并点击，然后选择“从所选内容新建组”。将新组重命名为 `Managed Objects`。图 5–15\
    \ 展示了你的源代码树应该呈现的样子。\n\n![images](img/0515.jpg)\n\n**图 5–15.** *包含 Managed Object\
    \ 类组的源代码树*\n\nXcode 会更新你的模型，以便为实体使用生成的类。要验证这一点，请在地数据模型检查器中显示任意实体的属性。在“类”字段中，应显示生成的类名而非\
    \ `NSManagedObject`。图 5–16 以 `Canvas` 实体为例进行了展示；请注意，Xcode 已将“类”字段的值从 `NSManagedObject`\
    \ 更改为 `Canvas`，即你生成的新类。\n\n![images](img/0516.jpg)\n\n**图 5–16.** *Canvas 实体已更新为使用\
    \ Canvas 类*\n\n然而，你并非必须使用 Xcode 的生成器来创建模型类。若要手动执行相同任务（而不让 Xcode 生成类），你需要做两件事：\n\
    \n1.  创建类的代码（打开任意新文件查看示例）。\n2.  更新数据模型中实体的“类”字段，使其指向新类。\n\n了解这些信息很有用，以防你将来需要手动创建这些类，不过让\
    \ Xcode 代劳要方便得多。\n\n现在，让我们看看其中一些类。打开 `Vertex.h`。你可以看到它导入了 Foundation 和 Core Data\
    \ 框架头文件，派生自 `NSManagedObject`，并将 `Vertex` 实体的属性（包括属性和关系）作为 Objective-C 属性暴露出来，如下所示：\n\
    \n```\n#import <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n\n@class\
    \ Polygon;\n```\n"
