    Open `MasterViewController.m`, and define those two methods. The `insertPlayerWithTeam:`
    method looks similar to the `insertTeamWithName:` method, with some important
    differences. The `insertTeamWithName:` method takes advantage of the fetched results
    controller and its tie to `Team` entities, while `Player` entities have no tie
    to the fetched results controller. The `insertPlayerWithTeam:` method, then, creates
    a `Player` entity by explicitly passing the `Player` name to the `insertNewObjectForEntityForName:`
    method. It also must create the relationship to the appropriate `Team` entity
