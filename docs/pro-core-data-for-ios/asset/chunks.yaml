    Your data set is now ready and verified. The remainder of this chapter deals with
    extracting only certain objects and rearranging them based on constraints you
    specify.


    ### Filtering


    Core Data uses the `NSPredicate` class from the Foundation framework to specify
    how to select the objects that should be part of the result set when executing
    a fetch request. Predicates can be built in two ways: either you can build the
    object and its graph manually or you can use the query language `NSPredicate`
    implements. You will find that most of the time you will prefer the convenience
    and readability of the latter method.


    This section looks at both ways of building predicates for each example in order
    to help draw a parallel between the query language and the `NSPredicate` object
    graph. Understanding both ways will help you determine your preferred approach.
    You can also mix and match the approaches depending on your applications and data
    scenarios.


    The predicate query language builds an `NSPredicate` object graph from a string
    representation that has similarities with a SQL `WHERE` clause. The method that
    builds a predicate from the language is `+predicateWithFormat:(NSString*)`. For
    instance, if you want to get the managed object that represents Jane, you build
    the predicate by calling `[NSPredicate predicateWithFormat:@"name = ''Jane''"]`.


    To test this, modify the `readData:` method as follows:


    `- (void)readData`

    `{`

    `  NSManagedObjectContext *context = [self managedObjectContext];`

    **`NSEntityDescription *entity = [NSEntityDescription entityForName:@"Person"`**![images](images/U002.jpg)

    **`inManagedObjectContext:context];`**


    **`NSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];`**

    **`[fetchRequest setEntity:entity];`**


    **`NSPredicate *predicate = [NSPredicate predicateWithFormat:@"name=''Jane''"];`**

    **`[fetchRequest setPredicate:predicate];`**


    **`NSArray *persons = [context executeFetchRequest:fetchRequest error:nil];`**


    **`for (NSManagedObject *person in persons)`**

    **`{`**

    **`NSLog(@"name=%@ age=%@", [person valueForKey:@"name"], [person valueForKey:@"age"]);`**

    **`}`**

    `}`


    Running the application again yields the following expected output:


    `name=Jane age=26`


    In its simplest form, a predicate executes a test on an object. If the test succeeds,
    then the object is part of the result set. If the test is negative, then the object
    isn''t included in the result set. In the previous example, `name=''Jane''` is
    an example of a simple predicate. The key path `name` and the constant string
    value `''Jane''` are called *expressions*. The operator `=` is called a *comparator*.


    #### Expressions for a Single Value


    Expressions, represented by the `NSExpression` class, are the basic building blocks
    of a predicate. They represent values that can be compared with each other or
    simply evaluated by themselves. The simplest and most common type of expression
    is the expression that represents a single value (as opposed to representing a
    collection of values). `NSPredicate` supports four types of single-value expressions,
    as shown in [Table 6–1](#Chapter06.html#tab_6_1).


    ![images](images/t0601.jpg)


    The previous example using the query language had two expressions: `name` and
    `Jane`. The `name` expression is a key path into the managed object, while the
    `Jane` expression is a constant value. Creating the same expressions in code looks
    like this:


    `NSExpression *exprName = [NSExpression expressionForKeyPath:@"name"];`

    `NSExpression *exprJane = [NSExpression expressionForConstantValue:@"Jane"];`


    #### Expressions for a Collection


    Some comparisons require more than one right-side expression. This is the case,
    for example, when you want to compare a value against a range of values. In this
    situation, you need to provide a lower bound value and an upper bound value. Predicates
    use arrays of expressions to represent multiple values. The following example
    shows how to build a range of values. First, you create the expressions representing
    the single values; you then put them into an expression representing the array
    using the `expressionForAggregate:` method.


    `NSExpression *lower = [NSExpression expressionForConstantValue:[NSNumber`![images](images/U002.jpg)

    `numberWithInt:20]];`

    `NSExpression *upper = [NSExpression expressionForConstantValue:[NSNumber`![images](images/U002.jpg)

    `numberWithInt:35]];`

    `NSExpression *exprRange = [NSExpression expressionForAggregate:[NSArray`![images](images/U002.jpg)

    `arrayWithObjects:lower, upper, nil]];`


    **NOTE:** Although the `NSExpression` class provides a way to build an expression
    from a selector using the `expressionForFunction:arguments:` method, this mechanism
    is not supported by Core Data.'
  trans: "\n### 读取并输出数据\n\n现在你已经创建了持久化存储并插入了所有组织结构图测试数据，就不再需要调用 `createData:` 方法了。停止应用程序，并在\
    \ `application:didFinishLaunchingWithOptions:` 方法中注释掉对 `createData:` 的调用。在其下方添加对\
