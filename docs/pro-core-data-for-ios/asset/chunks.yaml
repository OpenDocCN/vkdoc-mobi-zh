  raw: '#### Using the Custom Store


    The last step required to use the custom store with the League Manager application
    is to register it and use it when initializing the persistent store coordinator.
    This is all done in the application delegate (`League_ManagerAppDelegate.m`).
    First, add an import at the top of the class so that the implementation is aware
    of the `CustomStore` class.


    `#import "CustomStore.h"`


    Modify the `application:didFinishLaunchingWithOptions:` method to register the
    custom store when the application awakes.


    `- (BOOL)application:(UIApplication *)application`

    `didFinishLaunchingWithOptions:(NSDictionary *)launchOptions`

    `{`

    **`  [NSPersistentStoreCoordinator registerStoreClass:[CustomStore class]`![images](images/U002.jpg)**

    **`forStoreType:@"CustomStore"];`**

    **`  NSLog(@"Registered types:  %@", [NSPersistentStoreCoordinator registeredStoreTypes]);`**


    `    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];`

    `    // Override point for customization after application launch.`


    `  MasterViewController *controller = [[MasterViewController alloc] initWithNibName:@"MasterViewController"
    bundle:nil];`

    `  self.navigationController = [[UINavigationController alloc] initWithRootViewController:controller];`

    `  self.window.rootViewController = self.navigationController;`

    `    [self.window makeKeyAndVisible];`

    `    return YES;`

    `}`


    Finally, alter the `persistentStoreCoordinator:` accessor to use the new custom
    store.


    `- (NSPersistentStoreCoordinator *)persistentStoreCoordinator {`

    `  if (__persistentStoreCoordinator != nil) {`

    `    return __persistentStoreCoordinator;`

    `  }`


    `  NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@`**`"League_Manager.txt`**`"];`


    `  NSError *error = nil;`

    `  __persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self
    managedObjectModel]];`

    `  if (![__persistentStoreCoordinator addPersistentStoreWithType:@"CustomStore"
    configuration:nil URL:storeURL options:nil error:&error]) {`

    `    NSLog(@"Unresolved error %@, %@", error, [error userInfo]);`

    `    abort();`

    `  }`


    `  return __persistentStoreCoordinator;`

    `}`


    At this point, you should be able to start the application, and it will use the
    new custom store. A file called `League_Manager.txt` will be created in the same
    directory where the `League_Manager.sqlite` database was when you first implemented
    it earlier in this chapter. Take the application for a spin, add a few teams and
    players, and then go check the `League_Manager.txt` data file using any text editor.
    Depending on the teams and players you create, the file will look something like
    this:


    `Player|5247F86F-0397-4814-9AF7-5F6946BE20C4|email=rrondo@example.com|firstName=Rajon|lastName=Rondo|team=9F2662B9-3006-4B8D-BC43–EA68DB7AD037`

    `Player|20C2D39C-D831-4AD7-9FE7-E1CE22D765E0|email=twarner@example.com|firstName=Tyson|lastName=Warner|team=3BBC1923–0EA7-485C-9516-3B993D30D0CE`

    `Player|3E817374-2BE2-495F-8029-1698C34DE07F|email=ljames@example.com|firstName=LeBron|lastName=James|team=3BBC1923–0EA7-485C-9516-3B993D30D0CE`

    `Player|7ABACD30-2586-4522-8369-0D104FE248AF|email=cbosh@example.com|firstName=Chris|lastName=Bosh|team=3BBC1923–0EA7-485C-9516-3B993D30D0CE`

    `Player|D14E8D95-FC94-48AA-BE9B-E20FC36B70EB|email=dwade@example.com|firstName=Dwyane|lastName=Wade|team=3BBC1923–0EA7-485C-9516-3B993D30D0CE`

    `Team|3BBC1923–0EA7-485C-9516-3B993D30D0CE|name=Miami Heat|uniformColor=Red|players=3E817374-2BE2-495F-8029-1698C34DE07F,7ABACD30-2586-4522-8369-0D104FE248AF,D14E8D95-FC94-48AA-BE9B-E20FC36B70EB,20C2D39C-D831-4AD7-9FE7-E1CE22D765E0`

    `Team|9F2662B9-3006-4B8D-BC43–EA68DB7AD037|name=Boston Celtics|uniformColor=Green|players=5247F86F-0397-4814-9AF7-5F6946BE20C4`


    In the data file, you can see two teams, Boston Celtics and Miami Heat, in the
    last two lines of the file. The entity name, “Team,” is the first field on each
    of those two rows. You see that the Boston Celtics has one player, as it has only
    one reference ID listed for the `players` relationship in the last field of its
    row. That reference ID listed for the `players` relationship matches the reference
    ID for Rajon Rondo, which is the second field in the first row of the file. You
    can also see the four players that represent the Miami Heat''s future: LeBron
    James, Dwyane Wade, Chris Bosh, and Tyson Warner.


    #### What About XML Persistent Stores?


    Core Data offers another persistent store type, XML, on Mac OS X that you specify
    by passing `NSXMLStoreType` to your persistent store coordinator''s `addPersistentStoreWithType:`
    method. Passing `NSXMLStoreType` when compiling for iOS, however, gives you a
    compiler error: `''NSXMLStoreType'' undeclared`. If you look in the Core Data
    header files for iOS, you''ll find the following in `NSPersistentStoreCoordinator.h`:


    `// Persistent store types supported by Core Data:`

    `COREDATA_EXTERN NSString * const NSSQLiteStoreType __OSX_AVAILABLE_STARTING(__MAC_10_4,`

    `__IPHONE_3_0);`

    `COREDATA_EXTERN NSString * const NSBinaryStoreType __OSX_AVAILABLE_STARTING(__MAC_10_4,`

    `__IPHONE_3_0);`

    `COREDATA_EXTERN NSString * const NSInMemoryStoreType __OSX_AVAILABLE_STARTING(__MAC_10_4,
    __IPHONE_3_0);`


    Indeed, `NSXMLStoreType` remains undeclared, though it''s emphatically available
    for Mac OS X. To understand why, turn to Apple''s developer documentation on Core
    Data Persistent Store Features, found at [`http://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/CoreData/Articles/cdPersistentStores.html`](http://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/CoreData/Articles/cdPersistentStores.html),
    to read the following explanation for XML''s exclusion on iOS:


    `iOS: The XML store is not available on iOS.`


    That''s all you get, keeping Apple''s reputation for secrecy intact. You''re left,
    then, to speculate. Apple probably left XML off iOS''s version of Core Data for
    a few reasons:


    *   Parsing XML can consume a lot of processor cycles, making an iDevice, with
    its slower processor relative to an iMac, Mac Pro, and so on, slower.

    *   Because parsing XML uses more processing power, it can consume more battery
    life.

    *   XML, with its characters, brackets, and metadata, generally consumes more
    storage space than binary file types.

    *   Apple likes to steer its developers toward solutions it deems better, rather
    than providing as many options as possible. XML is superfluous for Core Data persistence.


    If you miss XML and want it available for your applications, you can write your
    own XML custom store. If you imagine a nice, nested XML document issuing from
    your complex data models, however, you will probably become frustrated in your
    attempts to create a custom XML persistent store type. Core Data relationships
    have their inverses, meaning that you really can''t arbitrate parenthood among
    entities. In the League Manager data model, for example, should `Team` entity
    tags contain `Player` entity tags, because the team “owns” its players, or should
    it be the reverse? Do players own the teams they play for (as many superstar professional
    athletes have demonstrated)? If you pursue an XML custom data store, you''ll find
    that you don''t produce readable XML documents that make relationships clear,
    but rather XML documents with lots of peers that are fit only for Core Data''s
    consumption. For example, if you port the same League Manager data model to a
    Mac OS X Core Data application that uses an XML persistent store and enter the
    same data for teams and players, Core Data produces the XML document shown in
    [Listing 3–13](#Chapter03.html#list_3_13).


    **Listing 3–13.** *XML from Porting the League Manager Data Model to a Mac OS
    X Core Data Application*


    `<?xml version="1.0"?>`

    `<!DOCTYPE database SYSTEM "file:///System/Library/DTDs/CoreData.dtd">`'
  trans: "\n#### 使用自定义存储\n\n在 League Manager 应用中使用自定义存储所需的最后一步是注册它，并在初始化持久化存储协调器时使用它。所有操作都在应用代理（`League_ManagerAppDelegate.m`）中完成。首先，在类顶部添加一条导入语句，以便实现代码能够识别\
    \ `CustomStore` 类。\n\n```\n#import \"CustomStore.h\"\n```\n\n修改 `application:didFinishLaunchingWithOptions:`\
    \ 方法，以便在应用启动时注册自定义存储。\n\n```\n- (BOOL)application:(UIApplication *)application\n\
    didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n{\n    [NSPersistentStoreCoordinator\
    \ registerStoreClass:[CustomStore class]\n                                   \
    \  forStoreType:@\"CustomStore\"];\n    NSLog(@\"已注册类型：%@\", [NSPersistentStoreCoordinator\
    \ registeredStoreTypes]);\n\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\n    // 应用启动后的自定义覆盖点。\n\n    MasterViewController *controller\
    \ = [[MasterViewController alloc] initWithNibName:@\"MasterViewController\" bundle:nil];\n\
    \    self.navigationController = [[UINavigationController alloc] initWithRootViewController:controller];\n\
    \    self.window.rootViewController = self.navigationController;\n    [self.window\
    \ makeKeyAndVisible];\n    return YES;\n}\n```\n\n最后，修改 `persistentStoreCoordinator:`\
    \ 访问器以使用新的自定义存储。\n\n```\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\
    \ {\n    if (__persistentStoreCoordinator != nil) {\n        return __persistentStoreCoordinator;\n\
    \    }\n\n    NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
    League_Manager.txt\"];\n\n    NSError *error = nil;\n    __persistentStoreCoordinator\
    \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
    \    if (![__persistentStoreCoordinator addPersistentStoreWithType:@\"CustomStore\"\
    \ configuration:nil URL:storeURL options:nil error:&error]) {\n        NSLog(@\"\
    未解决的错误：%@, %@\", error, [error userInfo]);\n        abort();\n    }\n\n    return\
    \ __persistentStoreCoordinator;\n}\n```\n\n此时，你应该能够启动应用，并且它将使用新的自定义存储。一个名为 `League_Manager.txt`\
    \ 的文件将会被创建在你之前在本章首次实现时创建 `League_Manager.sqlite` 数据库的同一目录中。启动应用试试看，添加几个球队和球员，然后使用任意文本编辑器检查\
    \ `League_Manager.txt` 数据文件。根据你创建的球队和球员，该文件的内容将类似于：\n\n```\nPlayer|5247F86F-0397-4814-9AF7-5F6946BE20C4|email=rrondo@example.com|firstName=Rajon|lastName=Rondo|team=9F2662B9-3006-4B8D-BC43–EA68DB7AD037\n\
    Player|20C2D39C-D831-4AD7-9FE7-E1CE22D765E0|email=twarner@example.com|firstName=Tyson|lastName=Warner|team=3BBC1923–0EA7-485C-9516-3B993D30D0CE\n\
    Player|3E817374-2BE2-495F-8029-1698C34DE07F|email=ljames@example.com|firstName=LeBron|lastName=James|team=3BBC1923–0EA7-485C-9516-3B993D30D0CE\n\
    Player|7ABACD30-2586-4522-8369-0D104FE248AF|email=cbosh@example.com|firstName=Chris|lastName=Bosh|team=3BBC1923–0EA7-485C-9516-3B993D30D0CE\n\
    Player|D14E8D95-FC94-48AA-BE9B-E20FC36B70EB|email=dwade@example.com|firstName=Dwyane|lastName=Wade|team=3BBC1923–0EA7-485C-9516-3B993D30D0CE\n\
    Team|3BBC1923–0EA7-485C-9516-3B993D30D0CE|name=Miami Heat|uniformColor=Red|players=3E817374-2BE2-495F-8029-1698C34DE07F,7ABACD30-2586-4522-8369-0D104FE248AF,D14E8D95-FC94-48AA-BE9B-E20FC36B70EB,20C2D39C-D831-4AD7-9FE7-E1CE22D765E0\n\
    Team|9F2662B9-3006-4B8D-BC43–EA68DB7AD037|name=Boston Celtics|uniformColor=Green|players=5247F86F-0397-4814-9AF7-5F6946BE20C4\n\
    ```\n\n在数据文件中，你可以看到最后两行是两个球队：波士顿凯尔特人队和迈阿密热火队。实体名称“Team”是这两行中每一行的第一个字段。你可以看到波士顿凯尔特人队有一名球员，因为在其行的最后一个字段中，`players`\
    \ 关系只列出了一个引用 ID。该 `players` 关系列出的引用 ID 与拉简·隆多的引用 ID 匹配，后者是文件第一行中的第二个字段。你还可以看到代表迈阿密热火队未来的四名球员：勒布朗·詹姆斯、德维恩·韦德、克里斯·波什和泰森·沃纳。\n\
    \n#### XML 持久化存储怎么样？\n\nCore Data 在 Mac OS X 上提供了另一种持久化存储类型——XML，你可以通过将 `NSXMLStoreType`\
    \ 传递给持久化存储协调器的 `addPersistentStoreWithType:` 方法来指定它。然而，在为 iOS 编译时传递 `NSXMLStoreType`\
    \ 会产生一个编译错误：`'NSXMLStoreType' 未声明`。如果你查看 iOS 的 Core Data 头文件，会在 `NSPersistentStoreCoordinator.h`\
    \ 中发现以下内容：\n\n```\n// Core Data 支持的持久化存储类型：\nCOREDATA_EXTERN NSString * const\
    \ NSSQLiteStoreType __OSX_AVAILABLE_STARTING(__MAC_10_4,\n__IPHONE_3_0);\nCOREDATA_EXTERN\
    \ NSString * const NSBinaryStoreType __OSX_AVAILABLE_STARTING(__MAC_10_4,\n__IPHONE_3_0);\n\
    COREDATA_EXTERN NSString * const NSInMemoryStoreType __OSX_AVAILABLE_STARTING(__MAC_10_4,\
    \ __IPHONE_3_0);\n```\n\n确实，`NSXMLStoreType` 仍然未声明，尽管它明确适用于 Mac OS X。要理解原因，请查阅\
    \ Apple 关于 Core Data 持久化存储功能的开发者文档，网址为 [`developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/CoreData/Articles/cdPersistentStores.html`](http://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/CoreData/Articles/cdPersistentStores.html)，其中对\
    \ iOS 上排除 XML 的解释如下：\n\n```\niOS：XML 存储在 iOS 上不可用。\n```\n\n仅此而已，这保持了 Apple 保密的声誉。那么，你只能进行推测。Apple\
    \ 可能在 iOS 版本的 Core Data 中弃用 XML 有几个原因：\n\n- 解析 XML 会消耗大量处理器周期，使得处理器速度相对 iMac、Mac\
    \ Pro 等较慢的 iDevice 运行更慢。\n- 因为解析 XML 会消耗更多处理能力，所以可能会消耗更多电池电量。\n- XML 及其字符、括号和元数据，通常比二进制文件类型占用更多存储空间。\n\
    - Apple 倾向于引导开发者采用它认为更好的解决方案，而不是提供尽可能多的选项。对于 Core Data 持久化来说，XML 是多余的。\n\n如果你怀念\
    \ XML 并希望它在你的应用中可用，你可以编写自己的 XML 自定义存储。然而，如果你想象从一个复杂数据模型生成一个漂亮的、嵌套的 XML 文档，那么在尝试创建自定义\
    \ XML 持久化存储类型时，你可能会感到沮丧。Core Data 的关系有其逆关系，这意味着你实际上无法仲裁实体之间的父子关系。例如，在 League Manager\
    \ 数据模型中，是 `Team` 实体标签应包含 `Player` 实体标签（因为球队“拥有”其球员），还是反过来？球员是否拥有他们效力的球队（正如许多超级巨星职业运动员所展示的那样）？如果你追求一个\
    \ XML 自定义数据存储，你会发现你生成的不是使关系清晰的、可读的 XML 文档，而是包含大量同级节点、仅适合 Core Data 消费的 XML 文档。例如，如果你将相同的\
    \ League Manager 数据模型移植到一个使用 XML 持久化存储的 Mac OS X Core Data 应用，并为球队和球员输入相同的数据，Core\
    \ Data 会生成如代码清单 3–13 所示的 XML 文档。\n\n**代码清单 3–13.** *将 League Manager 数据模型移植到 Mac\
    \ OS X Core Data 应用后生成的 XML*\n\n```\n<?xml version=\"1.0\"?>\n<!DOCTYPE database\
    \ SYSTEM \"file:///System/Library/DTDs/CoreData.dtd\">\n```\n"
