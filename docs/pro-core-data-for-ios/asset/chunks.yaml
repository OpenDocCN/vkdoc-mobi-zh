  trans: '

    ### 将 Core Data 添加到现有项目


    并非总能像上一节所示那样，创建一个新应用并勾选“使用 Core Data”复选框。开发者们常常是先启动一个项目，编写大量代码，之后才意识到自己的应用需要 Core
    Data。我们认识一些开发者，他们拒绝承认应该手动将 Core Data 添加到现有应用中。他们非但不尝试去理解如何使用这个框架，反而受一种想要证明自己能写出更优秀持久化层的欲望驱使，踏上了曲折迂回的编程之路，结果却差强人意。他们把“坚持”和“固执”混为一谈。为了让这一转变更加轻松，本节将解释改造一个应用，使其能够识别并使用
    Core Data 所需的具体步骤。


    启用一个应用以利用 Core Data 分为三个步骤。


    1.  添加 Core Data 框架。

    2.  创建数据模型。

    3.  初始化托管对象上下文。


    接下来的三小节将引导您完成这三个步骤，以便您能为任何现有的 iOS 应用添加 Core Data 支持。


    #### 添加 Core Data 框架


    在 Objective-C 的世界里，库被称为*框架*。展开 Xcode 源代码树中的“Frameworks”分组，可以看到项目只识别少数几个框架。典型的
    iOS 应用至少会包含 UIKit（iOS 的用户界面框架）、Foundation 和 Core Graphics。将 Core Data 添加到现有应用的第一步，就是通过将该框架添加到项目中来让应用识别它。为此，请执行以下步骤：


    1.  在 Xcode 左侧选择项目，此时右侧会显示目标设置（见图 1-9）。

    2.  选择第四个标签页“Build Phases”，并展开名为“Link Binary With Libraries”的部分（见图 1-10）。

    3.  点击该部分下方的 + 按钮，查看可添加的框架列表（见图 1-11）。

    4.  选择 `CoreData.framework` 并点击“Add”按钮。

    5.  （可选）将项目源代码列表中的 `CoreData.framework` 条目拖动到“Frameworks”文件夹中。


    ![images](img/0109.jpg)


    **图 1-9.** *选择项目以查看目标设置*


    ![images](img/0110.jpg)


    **图 1-10.** *查看“Link Binary With Libraries”设置*


    ![images](img/0111.jpg)


    **图 1-11.** *选择要链接的框架*


    `CoreData.framework` 现在已列在 Xcode 的左侧。由于应用现在能够识别 Core Data 框架，因此可以使用该框架特有的类，而不会产生编译错误。


    #### 创建数据模型


    没有数据模型的 Core Data 应用是不完整的。数据模型描述了将由框架管理的所有实体。为简单起见，本节创建的模型只包含一个具有单一属性的类。可以在 Xcode
    中通过选择菜单中的 `File` ![images](img/U001.jpg) `New` ![images](img/U001.jpg) `New File`，然后从
    iOS Core Data 模板中选取“Data Model”类型来创建数据模型，如图 1-12 所示。点击“Next”，将数据模型命名为 `MyModel.xcdatamodeld`，如图
    1-13 所示，然后点击“Save”。这将生成您的新数据模型并在 Xcode 中打开它（见图 1-14）。


    ![images](img/0112.jpg)


    **图 1-12.** *添加数据模型*


    ![images](img/0113.jpg)


    **图 1-13.** *命名您的数据模型*


    一旦数据模型打开，您可以通过点击 Xcode 窗口底部的“Add Entity”按钮来添加实体。您可以通过选择一个实体，然后按住“Add Entity”按钮右侧的“Add
    Attribute”按钮，并从下拉菜单中选择属性类型（属性、关系或抓取属性）来向实体添加属性。Xcode 会更改此按钮的标签以匹配您上次添加的属性类型。只需点击该按钮即可添加该类型的属性。在此示例中，创建一个名为
    `MyData` 的单个实体，并为其添加一个名为 `myAttribute`、类型为 `String` 的单个属性，如图 1-15 所示。


    ![images](img/0114.jpg)


    **图 1-14.** *您新建的空数据模型*


    ![images](img/0115.jpg)


    **图 1-15.** *添加实体和属性*

