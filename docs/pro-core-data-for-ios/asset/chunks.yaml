    \ directives in the header file. The `@dynamic` directive is used to tell the\
    \ compiler that even though it can’t find the methods that fulfill the contract,\
    \ they will be there by the time the runtime needs to invoke them. In essence,\
    \ you are telling the compiler to trust you. Of course, if you break your promise\
    \ and do not provide the accessors at runtime, you will be punished with an application\
    \ crash. Because your class extends `NSManagedObject`, the accessors are generated\
    \ for you so you don’t have to worry about any punishment. It is safe to use the\
    \ `@dynamic` directive for entity properties.\n\n`#import \"Vertex.h\"`\n`#import\
    \ \"Polygon.h\"`\n\n`@implementation Vertex`\n`@dynamic y;`\n`@dynamic x;`\n`@dynamic\
