    \ extends `NSManagedObject`.\n\n`#import <Foundation/Foundation.h>`\n`#import\
    \ <CoreData/CoreData.h>`\n`#import \"Shape.h\"`\n\n`@interface Circle : Shape`\n\
    \n`@property (nonatomic, retain) NSNumber * x;`\n`@property (nonatomic, retain)\
    \ NSNumber * y;`\n`@property (nonatomic, retain) NSNumber * radius;`\n\n`@end`\n\
    \nNext in line to review is `Polygon`. `Polygon`s are slightly different from\
    \ the other objects created so far because they have a to-many relationship to\
