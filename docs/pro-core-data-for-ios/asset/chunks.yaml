  trans: '

    ### 启动 Instruments


    虽然你可以像启动其他应用程序一样启动 Instruments，但 Xcode 提供了一种更简单的方式来启动它并运行你的应用程序。在 Xcode 菜单中，选择
    `Product` → `Profile`。这会启动 Instruments，并显示一个对话框，询问你要分析什么，如图 7-12 所示。


    ![images](img/0712.jpg)


    **图 7-12.** *Instruments 要求你选择一个模板*


    由于 Instruments 没有为 iOS 提供 Core Data 模板，请选择 `Blank` 模板，然后点击 `Profile` 按钮。这将打开 Instruments
    主窗口，并显示一条消息，要求你将录制工具从库中拖到此处，如图 7-13 所示。


    ![images](img/0713.jpg)


    **图 7-13.** *Instruments 主窗口*


    点击 `Library` 旁边的箭头以显示库。你会在录制工具面板中看到四个与 Core Data 相关的工具，如图 7-14 所示。将这四种工具全部拖到 Instruments
    窗口的左侧边栏，使其看起来像图 7-15。


    ![images](img/0714.jpg)


    **图 7-14.** *工具库中的 Core Data 录制工具*


    ![images](img/0715.jpg)


    **图 7-15.** *包含 Core Data 录制工具的 Instruments 主窗口*


    现在，你已经配置好 Instruments 来录制 Core Data 交互，点击 Instruments 窗口左上角的 `Record` 按钮，启动 iOS
    模拟器和 `PerformanceTuning` 应用程序。


    ### 理解结果


    Instruments 窗口显示其正在追踪的 Core Data 测量指标，包括以下内容：


    - Core Data 保存

    - Core Data 获取

    - Core Data 故障

    - Core Data 缓存未命中


    运行 `PerformanceTuning` 应用程序中的任何测试——例如，预取故障测试——并等待测试完成。测试完成后，点击 Instruments 左上角的
    `Stop` 按钮，停止应用程序并停止录制 Core Data 测量结果。然后，你可以查看测试结果，了解关于保存、获取、故障和缓存未命中的信息。你可以通过选择菜单中的
    `File` → `Save As` 将结果保存到文件系统，以便日后复查。在 Instruments 中，可以使用标准的 `File` → `Open` 菜单项重新打开这些结果。


    图 7-16 展示了运行预取故障测试后的 Instruments 窗口。你可以看到 Core Data 获取的获取次数和获取持续时间（以微秒为单位）（你可能需要稍微调整列表头才能显示所有信息）。代码对
    `Movie` 实体执行了一次获取请求（Instruments 将获取调用列出两次：一次是调用开始时，一次是调用结束时）。该请求耗时 450,700 微秒，获取了
    200 部电影，这可以从获取实体 `Movie` 和获取计数 200 中看出。


    ![images](img/0716.jpg)


    **图 7-16.** *预取故障测试的结果*


    通过将窗口中间的 `Event List` 下拉菜单更改为 `Call Tree`，你可以查看获取请求的调用树。通过勾选窗口左侧的 `Hide System
    Libraries` 复选框，可以减少查看应用程序代码中调用所需的导航深度。图 7-17 展示了获取请求的调用树。使用调用树，你可以确定代码的哪些部分正在从
    Core Data 存储中获取数据。


    ![images](img/0717.jpg)


    **图 7-17.** *获取请求的调用树*


    这仅仅是 Instruments 能为你所做事情的一个缩影，它可以帮助你确定应用程序如何使用 Core Data，并引导你找到 Core Data 性能缓慢而需要优化的地方。


    ### 总结


    从唯一化到故障处理再到缓存托管对象，Core Data 为你做了大量的数据访问性能优化。这些优化是免费的，无需你付出任何额外的努力。然而，你应该了解 Core
    Data 提供的这些优化，以确保与之协同工作，而不是背道而驰。


    然而，并非所有的 Core Data 性能提升都是自动获得的。在本章中，你学习了如何使用预取和谓词优化等技术，为你的应用程序从 Core Data 中榨取尽可能多的性能。你还学习了如何使用
    Instruments 应用程序分析你的 Core Data 应用程序，从而了解你的应用程序如何使用 Core Data，以及问题出在哪里。


    其他 iOS 编程书籍可能会很好地展示如何在针对持久化存储执行长时间查询时显示一个旋转指示器和“请稍候”消息。本书则向你展示如何完全避免使用旋转指示器和“请稍候”消息。


    ## 第 8 章


    ## 版本控制与数据迁移


    在开发基于 Core Data 的应用程序时，通常第一次并不能完全准确地设计出数据模型。你一开始创建的数据模型似乎满足了应用程序的数据需求，但随着应用程序开发的深入，你常常会发现数据模型需要改变，以适应你不断发展的应用程序愿景。在应用程序生命周期的这个阶段，更改数据模型以适应你对应用程序数据的新理解几乎没有什么代价：你的应用程序将无法启动，启动时会崩溃并显示以下消息：


    ```

    用于打开存储的模型与用于创建存储的模型不兼容。

    ```


    你可以通过文件系统找到数据库文件并删除它，或者从 iPhone 模拟器或你的设备上删除这个尚不成熟的应用程序来解决这个问题。无论哪种方式，使用旧版架构的数据库文件都会消失，持久化存储中的数据也会随之消失，你的应用程序将在下次启动时重新创建数据库文件。在应用程序的开发过程中，你可能会多次执行此操作。


    然而，一旦你发布了应用程序，人们开始使用它，他们就会在设备上的持久化存储中积累他们认为重要的数据。每次你想发布一个数据模型有所变更的应用程序新版本时，都要求他们删除自己的数据存储，这会让你的应用程序立即跌至一星评级，评论者会谴责苹果的评级系统不允许零星甚至负星评级。


    这是否意味着发布应用程序会冻结其数据模型，你的应用程序 1.0 版本中的数据模型是永久性的？你最好在第一个公开版本中就将数据模型设计得完美无缺，因为你永远无法再更改它？幸运的是，答案是否定的。Apple
    预见到了在应用程序生命周期中改进 Core Data 模型的需求，并构建了相应的机制，让你能够更改数据模型，然后将用户的数据迁移到新模型，这一切都不需要用户干预，甚至让他们毫无察觉。本章将介绍数据模型版本控制以及跨这些版本进行数据迁移的过程，无论你对模型做了多么复杂的更改。

    '
- fmt: '### Versioning


    To take advantage of Core Data''s support for versioning your data model and migrating
    data from version to version, you start by explicitly creating a new version of
    the data model. To illustrate how this works, let''s bring back the Shapes application
    from [Chapter 5](#Chapter05.html#ch5). Make a copy of it, because you''ll be changing
    its data model several times in this chapter. In the original version of Shapes,
    you created a data model, which makes the model appear as shown in [Figure 8–1](#Chapter08.html#fig_8_1).


    ![images](images/0801.jpg)


    **Figure 8–1.** *The single-version data model*


    `Shapes.xcdatamodeld` contains the model and is actually a directory on your file
    system. It contains the files necessary to create the Core Data storage when your
    application runs. Select `Shapes.xcdatamodeld` and take a look at the File inspector
    in the Utilities view in Xcode, as shown in [Figure 8–2](#Chapter08.html#fig_8_2).
    It shows the name of the current model version, Shapes. Since there is only one
    version of the object model, the current version is automatically set. To add
    a new version, from the Xcode menu, select `Editor` → `Add Model Version`. A panel
    displays that allows you to enter a version name and a select the model that the
    new version is based on, as shown in [Figure 8–3](#Chapter08.html#fig_8_3). Accept
    the defaults and select Finish. Xcode creates a new directory inside `Shapes.xcdatamodeld`
    called `Shapes 2.xcdatamodel`, as shown in [Figure 8–4](#Chapter08.html#fig_8_4).
    Each listing below `Shapes.xcdatamodeld` represents a version of your data model;
    the green check mark denotes the version your application is currently using.


    ![images](images/0802.jpg)


    **Figure 8–2.** *The current version of the data model*


    ![images](images/0803.jpg)


    **Figure 8–3.** *Selecting the version name and model basis*


    ![images](images/0804.jpg)


    **Figure 8–4.** *The data model with two versions*


    You can see that your original data model, `Shapes.xcdatamodel`, is the current
    version. Before changing the current version from `Shapes.xcdatamodel` to `Shapes
    2.xcdatamodel`, run the Shapes application and create a few shapes so you have
    data to migrate across versions. You need data in your database to test that the
    data migrations through this chapter work properly.


    Now, suppose you want to add a new `name` attribute to the `Shape` entity. If
    you edit your current model and add a `name` attribute to the `Shape` entity,
    you will have the unpleasant surprise of seeing your application crash on startup.
    That''s because the data stored in the data store does not match the Core Data
    data model. One option to alleviate this problem is to delete your existing data
    store. This is an acceptable option while you are developing your app, but if
    you already have customers using this app, this will trigger their wrath. For
    a smoother experience, we strongly recommend versioning your model and using Core
    Data''s migrations to preserve your users'' data by migrating it from the old
    model to the new. Any changes you make to your data model go into the new version
    of the model, not any of the old ones. For you, this means that you''ll add the
    `name` attribute to the `Shape` entity in the `Shapes 2` data model.


    To make this change, select the `Shapes 2` data model, and then add a `name` attribute
    of type `String` to the `Shape` entity in the normal way. [Figure 8–5](#Chapter08.html#fig_8_5)
    shows the Xcode window with the new version of the Core Data model and the `name`
    attribute added to the `Shape` entity.


    ![images](images/0805.jpg)


    **Figure 8–5.** *The Xcode window with a second version of the model*


    In addition to adding new attributes, you can make nonoptional attributes become
    optional and Core Data can deal with it. Change the following attributes to optional:


    - The `color` attribute in the `Shape` entity

    - The `scale` attribute in the `Transform` entity

    - The `index`, `x` and `y` attributes in the `Vertex` entity


    To change the current version of the model from `Shapes` to `Shapes 2`, select
    `Shapes.xcdatamodeld` and set the current version in the Utility panel to `Shapes
    2`, as shown in [Figure 8–6](#Chapter08.html#fig_8_6).


    ![images](images/0806.jpg)


    **Figure 8–6.** *Updating the current data model version to Shapes 2*


    At this point, your application has a new current version of the data model, but
    it''s not ready to run yet. You need to define a policy for migrating the data
    from the version of the model called `Shapes` to the one called `Shapes 2`. If
    you tried running the application now, you would get a crash because, just as
    if you had changed the first model, the data store does not match the current
    model. The application needs to be told how you want it to handle switching from
    the old model to the new one. The rest of this chapter discusses the various ways
    to do that.


    ### Lightweight Migrations


    Once you have a versioned data model, you can take advantage of Core Data''s support
    for migrations as you evolve your data model. Each time you create a new data
    model version, users'' application data must migrate from the old data model to
    the new. For the migration to occur, Core Data must have rules to follow to know
    how to properly migrate the data. You create these rules using what''s called
    a *mapping model*. Support for creating these is built in to Xcode. For certain
    straightforward cases, however, Core Data has enough smarts to figure out the
    mapping rules on its own without requiring you to create a mapping model. Called
    *lightweight migrations*, these cases represent the least work for you as a developer.
    Core Data does all the work and migrates the data. This section details the lightweight
    migration process and walks you through the list of changes that are supported
    and how to implement them.


    For your migration to qualify as a lightweight migration, your changes must be
    confined to this narrow band:


    - Add or remove a property (attribute or relationship).

    - Make a nonoptional property optional.

    - Make an optional attribute nonoptional, as long as you provide a default value.

    - Add or remove an entity.

    - Rename a property.

    - Rename an entity.


    In addition to requiring less work from you, a lightweight migration using a SQLite
    data store runs faster and uses less space than other migrations. Because Core
    Data can issue SQL statements to perform these migrations, it doesn''t have to
    load all the data into memory in order to migrate it, and it doesn''t have to
    move the data from one store to the other. Core Data simply uses SQL statements
    to alter the SQLite database in place. If feasible, you should aggressively try
    to confine your data model changes to those that lightweight migrations support.
    If not, the other sections in this chapter walk you through more complicated migrations.'
