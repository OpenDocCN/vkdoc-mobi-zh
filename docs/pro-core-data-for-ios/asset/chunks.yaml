    ### Summary


    This chapter covered the heart of the purpose of Core Data: to create, retrieve,
    update, and delete data in a persistent store. Like Ruby on Rails, Core Data provides
    simple yet powerful mechanisms to carry out these CRUD operations. Whether talking
    directly to your `NSManagedObject` instances or using custom classes to represent
    your data objects, you can perform CRUD operations through the interfaces Core
    Data provides you without getting into the messy details of SQL or other data
    storage details.


    One area where Core Data trumps Ruby on Rails is its native support for undoing
    data operations. Although efforts continue to add Undo/Redo support for Rails,
    no solution built into Rails provides an easy way to undo data-related operation
    like Core Data does.


    Although now you know almost all you need for writing usable Core Data applications,
    don’t stop here. The next chapter talks about how to refine result sets so that
    you can filter, sort, and aggregate the data you retrieve from your persistent
    store.


    ## Chapter 6


    ## Refining Result Sets


    Billing itself as “the ultimate automotive marketplace,” AutoTrader.com allows
    consumers in the United States to buy and sell cars. According to census data,
    the United States has around 250 million registered motor vehicles, so you can
    imagine that finding the perfect car can daunt even the most intrepid prospective
    car buyer. To help car buyers cut through the myriad cars they don''t want to
    find the one they do, AutoTrader.com provides tools on its web site to filter
    available cars by criteria such as body style, make, model, year, price, and location.


    When dealing with large sets of data, refining result sets is essential for analysts
    to extract any meaning from the data. Computers, including iDevices, excel at
    narrowing data sets to make it easier for computer users to understand the data
    with which they''re working. Imagine, for example, how much more difficult calling
    someone from your iPhone would be if the Contacts application didn''t sort your
    contacts alphabetically or allow you to search for a contact.


    This chapter demonstrates how to sort, filter, and aggregate data using Core Data''s
    mechanisms so you can help your application''s users find the data they need.


    ### Building the Test Application


    You can get data out of a Core Data persistent store in two ways. If you already
    have handles to existing managed objects, then you can follow the object graph
    and relationships to pull more objects out. If you don''t have any objects yet,
    such as when the application first starts, then you must go get them directly
    out of the persistent store. In this case, you typically use an instance of `NSFetchRequest`
    to go get objects. You initialize an `NSFetchRequest` with an `NSEntityDescription`,
    which helps narrow the result set by constraining the type of managed objects
    to retrieve. This chapter shows you how to narrow your fetch requests in various
    ways using the `NSFetchRequest` class.


    To support the examples in this chapter, you''ll reuse the OrgChart application
    from [Chapter 2](#Chapter02.html#ch2). We suggest you make a copy of the application
    because you will make some changes to [Chapter 2](#Chapter02.html#ch2)''s data
    model in this chapter. Since [Chapter 2](#Chapter02.html#ch2), you''ve learned
    that Core Data can better deal with managing the object graph if all the relationships
    have an inverse, so go back to the OrgChart application and add reverse relationships
    for leader and employees. To accomplish this, open the `OrgChart.xcdatamodeld`
    data model, and select the `Person` entity. Since Organization already has the
    leader relationship to the `Person` entity, add a relationship called organization
    in `Person`, set the destination to Organization, and select leader as the inverse
    relationship. `Person` also has a self-referencing relationship called employees,
    so create a relationship from `Person` to `Person`, call it manager, and select
    employees as the inverse relationship. Also, rename the id attribute of `Person`
    to age. Your `Person` entity should look like [Figure 6–1](#Chapter06.html#fig_6_1).


    ![images](images/0601.jpg)


    **Figure 6–1.** *The Person entity with inverse relationships*'
