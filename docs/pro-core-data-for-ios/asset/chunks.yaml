    the metadata helps the persistent store coordinator deal with the custom store,
    so set those values for the `NSStoreTypeKey` and `NSStoreUUIDKey`. Find the `metadataForPersistentStoreWithURL:error:`
    method and change its contents to check for the existence of a metadata file and,
    if not found, to write one with the store type key and the UUID key, and also
    to write a blank data file, like in [Listing 3–8](#Chapter03.html#list_3_8).


