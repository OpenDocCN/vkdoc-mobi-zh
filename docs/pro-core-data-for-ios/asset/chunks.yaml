    - `- (void)remove<Key>:(NSSet *)value;`\n\nThis feature means that it is possible\
    \ to call `addVerticesObject:(Vertex*)` where before you called `[[managedObject\
    \ mutableSetValueForKey:key] addObject:value]`.\n\n`#import <Foundation/Foundation.h>`\n\
    `#import <CoreData/CoreData.h>`\n`#import \"Shape.h\"`\n\n`@interface Polygon\
    \ : Shape`\n\n`@property (nonatomic, retain) NSSet *vertices;`\n`@end`\n\n`@interface\
    \ Polygon (CoreDataGeneratedAccessors)`\n\n`- (void)addVerticesObject:(NSManagedObject\
    \ *)value;`\n`- (void)removeVerticesObject:(NSManagedObject *)value;`\n`- (void)addVertices:(NSSet\
    \ *)values;`\n`- (void)removeVertices:(NSSet *)values;`\n\n`@end`\n\nYou don’t\
    \ need implementations for these methods in `Polygon.m`, however, because they’re\
    \ automatically provided by the KVC mechanism. If Xcode generated these methods,\
    \ you can leave them or delete them.\n\nFeel free to peruse the rest of the code\
    \ for the generated classes. Armed with your knowledge of Core Data and the previous\
    \ information, you should understand what’s happening with this code.\n\nNow that\
    \ you have your custom objects, you can go back to the application code to use\
    \ their properties directly, rather than going through `valueForKey:`. Open `ShapesViewController.m`,\
    \ and add import statements for all the new objects you’ve created, as shown here:\n\
    \n`#import \"Polygon.h\"`\n`#import \"Circle.h\"`\n`#import \"Shape.h\"`\n`#import\
    \ \"Canvas.h\"`\n`#import \"Vertex.h\"`\n`#import \"Transform.h\"`\n\nNext, update\
    \ the `createShapeAt:` method to use your new classes. The revised implementation\
