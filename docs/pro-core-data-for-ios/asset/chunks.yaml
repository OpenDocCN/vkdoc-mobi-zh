    \n```\n- (void)readData\n{\n  NSManagedObjectContext *context = [self managedObjectContext];\
    \  \n  NSEntityDescription *entity = [NSEntityDescription entityForName:@\"Person\"\
    \ninManagedObjectContext:context];\n\n  NSFetchRequest *fetchRequest = [[NSFetchRequest\
    \ alloc] init];\n  [fetchRequest setEntity:entity];\n\nNSPredicate *predicate\
    \ = [NSPredicate predicateWithFormat:@\"age=26\"];\n[fetchRequest setPredicate:predicate];\n\
    \nNSArray *matches = [context executeFetchRequest:fetchRequest error:nil];\n\n\
    NSMutableArray *persons = [[NSMutableArray alloc] init];\nfor (NSManagedObject\
    \ *obj in matches)\n{\n[persons addObject:[obj valueForKey:@\"manager\"]];\n}\n\
    \n  for (NSManagedObject *person in persons)\n  {\n    NSLog(@\"name=%@ age=%@\"\
    , [person valueForKey:@\"name\"], [person valueForKey:@\"age\"]);\n  }\n}\n```\n\
    \n子查询表达式提供了一种将解决方案封装到单个查询中的方法，从而消除了获取数据后手动进行后处理的需要。你的整个谓词和逻辑可以替换为 `\"SUBQUERY(employees,\
    \ $x, $x.age == 26).@count > 0\"`，该表达式对于任何其 `employees` 关系中至少有一个 26 岁员工的人都会返回\
    \ true。子查询会遍历一个集合表达式（本例中为 `employees`）并创建一个临时变量（本例中为 `$x`，但你可以随意命名），该变量依次取集合中每一项的值来评估谓词。语法\
    \ `@count` 返回集合中项目的计数。（本章后面你将了解更多关于聚合器的内容。）使用这个谓词，你可以清理 `readData:` 方法，如下所示：\n\
    \n```\n- (void)readData\n{\n  NSManagedObjectContext *context = [self managedObjectContext];\
