    \ = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n  // 应用程序启动后进行自定义的覆盖点。\n\
    \  self.viewController = [[OrgChartViewController alloc] initWithNibName:@\"OrgChartViewController\"\
    \ bundle:nil];\n  self.window.rootViewController = self.viewController;\n  [self.window\
    \ makeKeyAndVisible];\n  return YES;\n}\n```\n\n接下来，编辑 `displayPerson:withIndentation:`\
    \ 方法以显示人员的年龄，因为你刚刚添加了这个新字段，如下所示：\n\n```\n- (void)displayPerson:(NSManagedObject*)person\
    \ withIndentation:(NSString*)indentation\n{\nNSLog(@\"%@Name: %@ (%@)\", indentation,\
    \ [person valueForKey:@\"name\"], [person valueForKey:@\"age\"]);\n\n  // 为子级别增加缩进\n\
    \  indentation = [NSString stringWithFormat:@\"%@  \", indentation];\n\n  NSSet\
    \ *employees = [person valueForKey:@\"employees\"];\n  id employee;\n  NSEnumerator\
    \ *it = [employees objectEnumerator];\n  while((employee = [it nextObject]) !=\
    \ nil)\n  {        \n    [self displayPerson:employee withIndentation:indentation];\n\
    \  }\n}\n```\n\n再次启动应用程序，日志输出将类似于以下示例，显示你的两个组织已经存在，并带有正确的组织结构图。（你的输出顺序可能有所不同——例如，公司\
    \ B 可能出现在公司 A 之前——但这并不重要。）\n\n```\n2011-07-31 20:59:09.057 OrgChart[9928:f203]\
    \ Organization: Company A\n2011-07-31 20:59:09.059 OrgChart[9928:f203]   Name:\
    \ John (32)\n2011-07-31 20:59:09.059 OrgChart[9928:f203]     Name: Tim (22)\n\
    2011-07-31 20:59:09.060 OrgChart[9928:f203]       Name: Kate (40)\n2011-07-31\
    \ 20:59:09.060 OrgChart[9928:f203]       Name: Jim (40)\n2011-07-31 20:59:09.061\
    \ OrgChart[9928:f203]       Name: Jill (22)\n2011-07-31 20:59:09.061 OrgChart[9928:f203]\
    \     Name: Jane (26)\n2011-07-31 20:59:09.062 OrgChart[9928:f203] Organization:\
    \ Company B\n2011-07-31 20:59:09.063 OrgChart[9928:f203]   Name: Mary (36)\n2011-07-31\
    \ 20:59:09.063 OrgChart[9928:f203]     Name: Tom (26)\n```\n\n你的数据集现在已经准备好并验证完毕。本章的其余部分将介绍如何只提取特定对象，并根据你指定的约束条件对其进行重新排列。\n\
    \n## 过滤\n\nCore Data 使用 Foundation 框架中的 `NSPredicate` 类来指定如何选择执行提取请求时应包含在结果集中的对象。谓词可以通过两种方式构建：你可以手动构建对象及其关系图，也可以使用\
    \ `NSPredicate` 实现的查询语言。你会发现大多数时候你更喜欢后一种方法的便利性和可读性。\n\n本节将针对每个示例探讨构建谓词的两种方法，以帮助你在查询语言和\
    \ `NSPredicate` 对象图之间建立联系。理解这两种方法将有助于你确定自己偏好的方式。你也可以根据应用程序和数据场景混合使用这些方法。\n\n谓词查询语言从字符串表示形式构建一个\
    \ `NSPredicate` 对象图，该字符串表示形式与 SQL `WHERE` 子句类似。从语言构建谓词的方法是 `+predicateWithFormat:(NSString*)`。例如，如果你想获取代表\
    \ Jane 的管理对象，可以调用 `[NSPredicate predicateWithFormat:@\"name = 'Jane'\"]` 来构建谓词。\n\
    \n为了测试这一点，按如下方式修改 `readData:` 方法：\n\n```\n- (void)readData\n{\n  NSManagedObjectContext\
    \ *context = [self managedObjectContext];\nNSEntityDescription *entity = [NSEntityDescription\
    \ entityForName:@\"Person\" inManagedObjectContext:context];\n\nNSFetchRequest\
    \ *fetchRequest = [[NSFetchRequest alloc] init];\n[fetchRequest setEntity:entity];\n\
    \nNSPredicate *predicate = [NSPredicate predicateWithFormat:@\"name='Jane'\"];\n\
    [fetchRequest setPredicate:predicate];\n\nNSArray *persons = [context executeFetchRequest:fetchRequest\
    \ error:nil];\n\nfor (NSManagedObject *person in persons)\n{\nNSLog(@\"name=%@\
    \ age=%@\", [person valueForKey:@\"name\"], [person valueForKey:@\"age\"]);\n\
    }\n}\n```\n\n再次运行应用程序，将得到以下预期输出：\n\n```\nname=Jane age=26\n```\n\n在最简单的形式中，谓词对对象执行测试。如果测试通过，则该对象属于结果集的一部分。如果测试未通过，则该对象不会包含在结果集中。在前面的例子中，`name='Jane'`\
    \ 是一个简单谓词的示例。键路径 `name` 和常量字符串值 `'Jane'` 被称为*表达式*。运算符 `=` 被称为*比较器*。\n\n### 单值表达式\n\
    \n由 `NSExpression` 类表示的表达式是谓词的基本构建块。它们表示可以相互比较或单独求值的值。最简单、最常见的表达式类型是表示单个值的表达式（与表示值集合的表达式相对）。`NSPredicate`\
    \ 支持四种类型的单值表达式，如表 6–1 所示。\n\n![images](img/t0601.jpg)\n\n之前使用查询语言的例子有两个表达式：`name`\
    \ 和 `Jane`。`name` 表达式是管理对象中的键路径，而 `Jane` 表达式是常量值。在代码中创建相同的表达式如下所示：\n\n```\nNSExpression\
    \ *exprName = [NSExpression expressionForKeyPath:@\"name\"];\nNSExpression *exprJane\
    \ = [NSExpression expressionForConstantValue:@\"Jane\"];\n```\n\n### 集合表达式\n\n\
    某些比较需要多个右侧表达式。例如，当你想要将一个值与一个值范围进行比较时，就会出现这种情况。在这种情况下，你需要提供一个下限值和一个上限值。谓词使用表达式数组来表示多个值。以下示例展示了如何构建一个值范围。首先，创建表示单个值的表达式；然后，使用\
    \ `expressionForAggregate:` 方法将它们放入表示数组的表达式。\n\n```\nNSExpression *lower = [NSExpression\
    \ expressionForConstantValue:[NSNumber numberWithInt:20]];\nNSExpression *upper\
    \ = [NSExpression expressionForConstantValue:[NSNumber numberWithInt:35]];\nNSExpression\
    \ *exprRange = [NSExpression expressionForAggregate:[NSArray arrayWithObjects:lower,\
    \ upper, nil]];\n```\n\n**注意：** 尽管 `NSExpression` 类提供了使用 `expressionForFunction:arguments:`\
    \ 方法从选择器构建表达式的方法，但 Core Data **不支持**这种机制。\n"
- fmt: "### Comparison Predicates\n\nExpressions aren't predicates by themselves.\
    \ The other element required is a comparator to evaluate the predicate. Two expressions\
    \ are compared with each other using the `NSComparisonPredicate` class, which\
    \ is a subclass of `NSPredicate`. The comparator is a binary operator between\
    \ a left expression and a right expression. [Table 6–2](#Chapter06.html#tab_6_2)\
    \ lists them and describes how `NSComparisonPredicate` uses the left (L) and the\
    \ right (R) expressions to determine the outcome of the comparison based on the\
    \ selected type.\n\n![images](images/t0602.jpg)\n\n**NOTE:** `NSLikePredicateOperatorType`\
    \ is a simplified version of `NSMatchesPredicateOperatorType`. While `NSMatchesPredicateOperatorType`\
    \ can use complex regular expressions, the `NSLikePredicateOperatorType` type\
    \ uses simple wildcard replacement (`*`) characters. So, the expression `name\
    \ like 'J*n*'` would match `Jane` and `John` but not `Jim`.\n\nThe `name='Jane'`\
    \ predicate could be written in code without going through the query language\
    \ by using `NSExpression` and `NSComparisonPredicate`, like so:\n\n```\nNSExpression\
    \ *exprName = [NSExpression expressionForKeyPath:@\"name\"];\nNSExpression *exprJane\
    \ = [NSExpression expressionForConstantValue:@\"Jane\"];\nNSPredicate *predicate\
    \ = [NSComparisonPredicate predicateWithLeftExpression:exprName\nrightExpression:exprJane\
    \ modifier:NSDirectPredicateModifier\ntype:NSEqualToPredicateOperatorType options:0];\n\
    ```\n\nYou could rewrite the `readData:` method using the predicate object graph\
    \ rather than the query language, and the output would still be the same. Obviously,\
    \ most programmers prefer using the query language, but it's a good exercise to\
    \ see how the query language translates into predicate objects behind the scenes.\
    \ The rewrite looks like this:\n\n```\n- (void)readData\n{\n  NSManagedObjectContext\
    \ *context = [self managedObjectContext];    \n  NSEntityDescription *entity =\
    \ [NSEntityDescription entityForName:@\"Person\"\ninManagedObjectContext:context];\n\
    \n  NSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];\n  [fetchRequest\
    \ setEntity:entity];\n\n  NSExpression *exprName = [NSExpression expressionForKeyPath:@\"\
    name\"];\n  NSExpression *exprJane = [NSExpression expressionForConstantValue:@\"\
    Jane\"];\n  NSPredicate *predicate = [NSComparisonPredicate predicateWithLeftExpression:exprName\n\
    rightExpression:exprJane modifier:NSDirectPredicateModifier\ntype:NSEqualToPredicateOperatorType\
    \ options:0];\n\n  [fetchRequest setPredicate:predicate];\n\n  NSArray *persons\
    \ = [context executeFetchRequest:fetchRequest error:nil];\n\n  for (NSManagedObject\
    \ *person in persons)\n  {\n    NSLog(@\"name=%@ age=%@\", [person valueForKey:@\"\
    name\"], [person valueForKey:@\"age\"]);\n  }\n}\n```\n\nRunning the application\
    \ with this version of `readData:` reveals the same output as before.\n\n```\n\
    name=Jane age=26\n```\n\nYou might have noticed that the fifth argument of the\
    \ static `init` method you just used is `options`. Options are used to modify\
    \ the behavior of the comparator. Options are not always applicable but are used\
    \ with the string comparison comparators only. They can also be specified in the\
    \ query language by appending the option code between square brackets right after\
    \ the operator. [Table 6–3](#Chapter06.html#tab_6_3) lists the available options\
    \ as well as how to use them in the query language.\n\n![images](images/t0603.jpg)\n\
    \nTo specify multiple options, you simply use the binary OR operator (`|`) between\
    \ them. In the query language, you append the codes together, as shown in the\
    \ following example:\n\n```\nNSPredicate *predicate = [NSPredicate predicateWithFormat:@\"\
    name =[cd] 'jàne'\"];\n```\n\nNote that `predicateWithFormat:` accepts string\
    \ formats. So, the previous example could also be written like so:\n\n```\n[NSPredicate\
    \ predicateWithFormat:@\"name =[cd] %@\", @\"jàne\"];\n```\n\nIf the right expression\
    \ is a collection rather than a single object, the modifier can be used to indicate\
    \ what the right expression is referring to; the modifiers are explained in [Table\
    \ 6–4](#Chapter06.html#tab_6_4).\n\n![images](images/t0604.jpg)"
  raw: '#### Comparison Predicates


    Expressions aren''t predicates by themselves. The other element required is a
    comparator to evaluate the predicate. Two expressions are compared with each other
    using the `NSComparisonPredicate` class, which is a subclass of `NSPredicate`.
    The comparator is a binary operator between a left expression and a right expression.
    [Table 6–2](#Chapter06.html#tab_6_2) lists them and describes how `NSComparisonPredicate`
    uses the left (L) and the right (R) expressions to determine the outcome of the
    comparison based on the selected type.


    ![images](images/t0602.jpg)


    **NOTE:** `NSLikePredicateOperatorType` is a simplified version of `NSMatchesPredicateOperatorType`.
    While `NSMatchesPredicateOperatorType` can use complex regular expressions, the
    `NSLikePredicateOperatorType` type uses simple wildcard replacement (*) characters.
    So, the expression `name like ''J*n*''` would match `Jane` and `John` but not
    `Jim`.


    The `name=''Jane''` predicate could be written in code without going through the
    query language by using `NSExpression` and `NSComparisonPredicate`, like so:


    `NSExpression *exprName = [NSExpression expressionForKeyPath:@"name"];`

    `NSExpression *exprJane = [NSExpression expressionForConstantValue:@"Jane"];`

    `NSPredicate *predicate = [NSComparisonPredicate predicateWithLeftExpression:exprName`![images](images/U002.jpg)

    `rightExpression:exprJane modifier:NSDirectPredicateModifier`![images](images/U002.jpg)

    `type:NSEqualToPredicateOperatorType options:0];`


    You could rewrite the `readData:` method using the predicate object graph rather
    than the query language, and the output would still be the same. Obviously, most
    programmers prefer using the query language, but it''s a good exercise to see
    how the query language translates into predicate objects behind the scenes. The
    rewrite looks like this:


    `- (void)readData`

    `{`

    `  NSManagedObjectContext *context = [self managedObjectContext];    `

    `  NSEntityDescription *entity = [NSEntityDescription entityForName:@"Person"`![images](images/U002.jpg)

    `inManagedObjectContext:context];`


    `  NSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];`

    `  [fetchRequest setEntity:entity];`


    **`NSExpression *exprName = [NSExpression expressionForKeyPath:@"name"];`**

    **`NSExpression *exprJane = [NSExpression expressionForConstantValue:@"Jane"];`**

    **`  NSPredicate *predicate = [NSComparisonPredicate predicateWithLeftExpression:exprName`**![images](images/U002.jpg)

    **`rightExpression:exprJane modifier:NSDirectPredicateModifier`**![images](images/U002.jpg)

    **`type:NSEqualToPredicateOperatorType options:0];`**


    `  [fetchRequest setPredicate:predicate];`


    `  NSArray *persons = [context executeFetchRequest:fetchRequest error:nil];`


    `  for (NSManagedObject *person in persons)`

    `  {`

    `    NSLog(@"name=%@ age=%@", [person valueForKey:@"name"], [person valueForKey:@"age"]);`

    `  }`

    `}`


    Running the application with this version of `readData:` reveals the same output
    as before.


    `name=Jane age=26`


    You might have noticed that the fifth argument of the static `init` method you
    just used is `options`. Options are used to modify the behavior of the comparator.
    Options are not always applicable but are used with the string comparison comparators
    only. They can also be specified in the query language by appending the option
    code between square brackets right after the operator. [Table 6–3](#Chapter06.html#tab_6_3)
    lists the available options as well as how to use them in the query language.


    ![images](images/t0603.jpg)


    To specify multiple options, you simply use the binary OR operator (`|`) between
    them. In the query language, you append the codes together, as shown in the following
    example:


    `NSPredicate *predicate = [NSPredicate predicateWithFormat:@"name =[cd] ''jàne''"];`


    Note that `predicateWithFormat:` accepts string formats. So, the previous example
    could also be written like so:


    `[NSPredicate predicateWithFormat:@"name =[cd] %@", @"jàne"];`


    If the right expression is a collection rather than a single object, the modifier
    can be used to indicate what the right expression is referring to; the modifiers
    are explained in [Table 6–4](#Chapter06.html#tab_6_4).


    ![images](images/t0604.jpg)'
  trans: "\n### 比较谓词\n\n表达式本身并不是谓词。另一个必需的元素是比较器，用于评估谓词。两个表达式通过 `NSComparisonPredicate`\
    \ 类（它是 `NSPredicate` 的子类）相互比较。比较器是一个位于左表达式和右表达式之间的二元运算符。表 6–2 列出了这些比较器，并描述了 `NSComparisonPredicate`\
    \ 如何根据所选类型，利用左表达式（L）和右表达式（R）来确定比较结果。\n\n![images](img/t0602.jpg)\n\n**注意：** `NSLikePredicateOperatorType`\
    \ 是 `NSMatchesPredicateOperatorType` 的简化版本。`NSMatchesPredicateOperatorType` 可以使用复杂的正则表达式，而\
    \ `NSLikePredicateOperatorType` 类型则使用简单的通配符替换（`*`）字符。因此，表达式 `name like 'J*n*'`\
    \ 可以匹配 `Jane` 和 `John`，但不能匹配 `Jim`。\n\n谓词 `name='Jane'` 可以不通过查询语言，而是直接使用 `NSExpression`\
    \ 和 `NSComparisonPredicate` 在代码中编写，如下所示：\n\n```\nNSExpression *exprName = [NSExpression\
    \ expressionForKeyPath:@\"name\"];\nNSExpression *exprJane = [NSExpression expressionForConstantValue:@\"\
    Jane\"];\nNSPredicate *predicate = [NSComparisonPredicate predicateWithLeftExpression:exprName\n\
    rightExpression:exprJane modifier:NSDirectPredicateModifier\ntype:NSEqualToPredicateOperatorType\
    \ options:0];\n```\n\n你可以使用谓词对象图（而非查询语言）来重写 `readData:` 方法，输出结果仍然相同。显然，大多数程序员更喜欢使用查询语言，但了解查询语言如何在幕后转换为谓词对象是一个很好的练习。重写后的代码如下：\n\
    \n```\n- (void)readData\n{\n  NSManagedObjectContext *context = [self managedObjectContext];\
    \    \n  NSEntityDescription *entity = [NSEntityDescription entityForName:@\"\
    Person\"\ninManagedObjectContext:context];\n\n  NSFetchRequest *fetchRequest =\
    \ [[NSFetchRequest alloc] init];\n  [fetchRequest setEntity:entity];\n\n  NSExpression\
    \ *exprName = [NSExpression expressionForKeyPath:@\"name\"];\n  NSExpression *exprJane\
    \ = [NSExpression expressionForConstantValue:@\"Jane\"];\n  NSPredicate *predicate\
    \ = [NSComparisonPredicate predicateWithLeftExpression:exprName\nrightExpression:exprJane\
    \ modifier:NSDirectPredicateModifier\ntype:NSEqualToPredicateOperatorType options:0];\n\
    \n  [fetchRequest setPredicate:predicate];\n\n  NSArray *persons = [context executeFetchRequest:fetchRequest\
    \ error:nil];\n\n  for (NSManagedObject *person in persons)\n  {\n    NSLog(@\"\
    name=%@ age=%@\", [person valueForKey:@\"name\"], [person valueForKey:@\"age\"\
    ]);\n  }\n}\n```\n\n使用这个版本的 `readData:` 运行应用程序，会得到与之前相同的输出。\n\n```\nname=Jane\
    \ age=26\n```\n\n你可能已经注意到，刚刚使用的静态 `init` 方法的第五个参数是 `options`。选项用于修改比较器的行为。选项并非总是适用，但仅用于字符串比较比较器。也可以在查询语言中，通过在操作符后面加上方括号内的选项代码来指定。表\
    \ 6–3 列出了可用的选项以及如何在查询语言中使用它们。\n\n![images](img/t0603.jpg)\n\n要指定多个选项，只需在它们之间使用二进制\
    \ OR 运算符（`|`）。在查询语言中，你需要将代码拼接在一起，如下例所示：\n\n```\nNSPredicate *predicate = [NSPredicate\
    \ predicateWithFormat:@\"name =[cd] 'jàne'\"];\n```\n\n注意，`predicateWithFormat:`\
    \ 接受字符串格式。因此，上面的例子也可以写成这样：\n\n```\n[NSPredicate predicateWithFormat:@\"name =[cd]\
    \ %@\", @\"jàne\"];\n```\n\n如果右表达式是一个集合而不是单个对象，则可以使用修饰符来表示右表达式所指的内容；修饰符在表 6–4\
    \ 中有详细说明。\n\n![images](img/t0604.jpg)\n"
- fmt: "### Compound Predicates\n\nYou just looked at a simple example for a predicate\
    \ that used only one criterion (`name = 'Jane'`). Predicates are often formed\
    \ by a logical combination of multiple subpredicates. If you want to find all\
    \ the people with a first name that starts with the letter *J* and with an age\
    \ between 20 and 35, the system should find John, Jane, and Jill, who are 32,\
    \ 26, and 22 years old, respectively, but not Jim, who is 40 years old. Core Data\
    \ allows you to build compound predicates using the `NSCompoundPredicate` class.\
    \ The compounding operator is one of the three main logic operators: OR, AND,\
    \ and NOT. Compound predicates can be built from one the three following methods,\
    \ as shown in [Table 6–5](#Chapter06.html#tab_6_5).\n\n![images](images/t0605.jpg)\n\
    \nFor this example, you build the predicate manually as follows:\n\n```\nNSExpression\
    \ *exprName = [NSExpression expressionForKeyPath:@\"name\"];\nNSExpression *exprJ\
    \ = [NSExpression expressionForConstantValue:@\"J\"];\n\nNSPredicate *p1 = [NSComparisonPredicate\
    \ predicateWithLeftExpression:exprName\nrightExpression:exprJ modifier:NSDirectPredicateModifier\n\
    type:NSBeginsWithPredicateOperatorType options:0];\n\nNSExpression *exprAge =\
    \ [NSExpression expressionForKeyPath:@\"age\"];\n\nNSExpression *lower = [NSExpression\
    \ expressionForConstantValue:[NSNumber\nnumberWithInt:20]];\nNSExpression *upper\
    \ = [NSExpression expressionForConstantValue:[NSNumber\nnumberWithInt:35]];\n\
    NSExpression *exprRange = [NSExpression expressionForAggregate:[NSArray\narrayWithObjects:lower,\
    \ upper, nil]];\n\nNSPredicate *p2 = [NSComparisonPredicate predicateWithLeftExpression:exprAge\n\
    rightExpression:exprRange modifier:NSDirectPredicateModifier\ntype:NSBetweenPredicateOperatorType\
    \ options:0];\n\nNSPredicate *predicate = [NSCompoundPredicate andPredicateWithSubpredicates:[NSArray\n\
    arrayWithObjects:p1, p2, nil]];\n```\n\nAfter updating the `readData:` method\
    \ with this predicate, running the application yields the following expected output.\n\
    \n```\nname=John age=32\nname=Jane age=26\nname=Jill age=22\n```\n\nAs shown in\
    \ [Table 6–5](#Chapter06.html#tab_6_5), the query language also supports compound\
    \ predicates using the OR, AND, and NOT operators. The same example could be rewritten\
    \ more simply using the query language, like so:\n\n```\nNSPredicate *predicate\
    \ = [NSPredicate predicateWithFormat:@\"name BEGINSWITH %@ AND age BETWEEN {%d,\
    \ %d}\", @\"J\", 20, 35];\n```\n\n**NOTE:** If you can't figure out the syntax\
    \ of the query language, You can always build the predicate object graph and then\
    \ print it to the console using `NSLog(@\"%@\", myPredicate)`. It will give you\
    \ the exact syntax to use.\n\nThe result of rewriting the `readData` method with\
    \ the string-based predicated is shown here. Running it yields the same result,\
    \ as expected.\n\n```\n- (void)readData\n{\n  NSManagedObjectContext *context\
    \ = [self managedObjectContext];  \n  NSEntityDescription *entity = [NSEntityDescription\
    \ entityForName:@\"Person\"\n inManagedObjectContext:context];\n\n  NSFetchRequest\
    \ *fetchRequest = [[NSFetchRequest alloc] init];\n [fetchRequest setEntity:entity];\n\
    \nNSPredicate *predicate = [NSPredicate predicateWithFormat:@\"name BEGINSWITH\
    \ %@ AND\nage BETWEEN {%d, %d}\", @\"J\", 20, 35];\n  [fetchRequest setPredicate:predicate];\n\
    \n  NSArray *persons = [context executeFetchRequest:fetchRequest error:nil];\n\
    \n  for (NSManagedObject *person in persons)\n  {\n    NSLog(@\"name=%@ age=%@\"\
    , [person valueForKey:@\"name\"], [person valueForKey:@\"age\"]);\n  }\n}\n```\n\
    \n### Subqueries\n\nIn some cases, you want to find objects based on criteria\
    \ that pertain to other related objects. For example, you might want to find all\
    \ the managers who have at least one direct report whose age is 26. According\
    \ to the test data set, this should return Mary and John, since both have 26–year-old\
    \ direct reports. Without subqueries, you can't fetch this result set directly.\
    \ Instead, you would need to perform two steps: first, fetch all the persons of\
    \ the right age, and then iterate through each of them to find their managers.\
    \ This solution is shown here:\n\n```\n- (void)readData\n{\n  NSManagedObjectContext\
    \ *context = [self managedObjectContext];  \n  NSEntityDescription *entity = [NSEntityDescription\
    \ entityForName:@\"Person\"\ninManagedObjectContext:context];\n\n  NSFetchRequest\
    \ *fetchRequest = [[NSFetchRequest alloc] init];\n  [fetchRequest setEntity:entity];\n\
    \nNSPredicate *predicate = [NSPredicate predicateWithFormat:@\"age=26\"];\n[fetchRequest\
    \ setPredicate:predicate];\n\nNSArray *matches = [context executeFetchRequest:fetchRequest\
    \ error:nil];\n\nNSMutableArray *persons = [[NSMutableArray alloc] init];\nfor\
    \ (NSManagedObject *obj in matches)\n{\n[persons addObject:[obj valueForKey:@\"\
    manager\"]];\n}\n\n  for (NSManagedObject *person in persons)\n  {\n    NSLog(@\"\
    name=%@ age=%@\", [person valueForKey:@\"name\"], [person valueForKey:@\"age\"\
    ]);\n  }\n}\n```\n\nSubquery expressions provide a way to encapsulate the solution\
    \ into a single query, eliminating the need to manually post-process the data\
    \ after retrieving it. Your entire predicate and logic can be replaced with \"\
    SUBQUERY(employees, $x, $x.age == 26). @count > 0\", which returns true for any\
    \ person with an employees relationship that has at least one employee who is\
    \ 26 years old. A subquery iterates through a collection expression (`employees`\
    \ in this case) and creates a temporary variable (`$x` in this example, but name\
    \ it however you'd like), which takes the value of each item in the collection\
    \ to evaluate the predicate. The syntax `@count` returns a count of the items\
    \ in the collection. (You will learn more about aggregators later in this chapter.)\
    \ Using this predicate, you can clean up the `readData:` method, like so:\n\n\
    ```\n- (void)readData\n{\n  NSManagedObjectContext *context = [self managedObjectContext];\
    \  \n  NSEntityDescription *entity = [NSEntityDescription entityForName:@\"Person\"\
    \ inManagedObjectContext:context];\n\n  NSFetchRequest *fetchRequest = [[NSFetchRequest\
    \ alloc] init];\n  [fetchRequest setEntity:entity];\n\nNSPredicate *predicate\
    \ = [NSPredicate predicateWithFormat:@\"(SUBQUERY(employees,\n$x, $x.age == %d).@count\
    \ > 0)\", 26];\n[fetchRequest setPredicate:predicate];\n\nNSArray *persons = [context\
    \ executeFetchRequest:fetchRequest error:nil];\n\n  for (NSManagedObject *person\
    \ in persons)\n  {\n    NSLog(@\"name=%@ age=%@\", [person valueForKey:@\"name\"\
    ], [person valueForKey:@\"age\"]);\n  }\n}\n```\n\nAnother way to return the same\
    \ result would be to use the expression modifier and apply the predicate to any\
    \ of the evaluated object's employees. The predicate would then look like this:\n\
    \n`[NSPredicate predicateWithFormat:@\"ANY employees.age == %d\", 26].`\n\nUnfortunately,\
    \ this kind of logic is risky because it works only with simple predicates. If\
    \ you had a compound predicate, the logic would be flawed. Imagine, for example,\
    \ that you wanted to return all the managers who not only have a direct report\
    \ whose age is 26 years old but also have a name that starts with the letter *T*.\
    \ According to your test data, this would only match Mary because she has an employee\
    \ named Tom who is 26 years old. It would no longer match John because although\
    \ Jane is 26 years old, her name does not start with *T*. If you tried to use\
    \ the expression modifier `ANY`, you would write your predicate like this:"
