    the persistence layer as transparent as possible.


    ### Validating Data


    Core Data won’t allow you to stuff data that doesn’t fit into any of the attributes
    in your model. Try, for example, to put a string like “Books for Professionals
    by Professionals,” the Apress tag line, into an attribute of type `Integer 16`,
    and you’ll raise an `NSInvalidArgumentException` that looks something like this:


