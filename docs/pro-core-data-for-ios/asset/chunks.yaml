    \ = [NSPredicate predicateWithFormat:@\"(SUBQUERY(employees,\n$x, $x.age == %d).@count\
    \ > 0)\", 26];\n[fetchRequest setPredicate:predicate];\n\nNSArray *persons = [context\
    \ executeFetchRequest:fetchRequest error:nil];\n\n  for (NSManagedObject *person\
    \ in persons)\n  {\n    NSLog(@\"name=%@ age=%@\", [person valueForKey:@\"name\"\
    ], [person valueForKey:@\"age\"]);\n  }\n}\n```\n\n返回相同结果的另一种方法是使用表达式修饰符，并将谓词应用于被评估对象的任意一名员工。谓词将如下所示：\n\
    \n`[NSPredicate predicateWithFormat:@\"ANY employees.age == %d\", 26].`\n\n不幸的是，这种逻辑存在风险，因为它仅适用于简单的谓词。如果你有一个复合谓词，逻辑就会出错。想象一下，例如，你想要返回所有不仅拥有\
