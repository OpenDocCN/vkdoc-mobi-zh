    ### Summary


    By now the Core Data framework should look a lot less overwhelming to you. In
    this chapter, you explored the main classes involved in efficiently managing the
    persistence of entire object graphs without having to expose the user to complex
    graph algorithms and grueling C APIs in order to interact with certain databases.
    Using Core Data is comparable to driving a car without having to be a mechanic.
    The framework is able to represent object models and manage data object graphs
    with just about a dozen classes. The simplicity of the class structure is misleading.
    You have seen the power of Core Data—and this is only a beginning. As you dig
    deeper into the many configuration options, UI bindings, alternate persistent
    stores, and custom managed object classes, you will also see the elegance of Core
    Data.


    ## Chapter 3


    ## Storing Data: SQLite and Other Options


    [Chapter 2](#Chapter02.html#ch2) explains the classes that comprise the Core Data
    framework and the interdependencies and precision with which they work together.
    The following chapters explain and demonstrate the flexibility of the framework
    to get the desired results, but the framework flexes only so far. The framework
    imposes a structure, order, and rigidity for putting data into and taking data
    out of a persistent store. You must work within that order and structure, doing
    things the Core Data way, to store and retrieve data reliably. Core Data''s shackles
    fall off, however, when defining what the persistent store looks like or how it
    works. Though people tend to think that data “belongs” in a database and Apple
    both provides and defaults to a SQLite database for Core Data''s persistent store,
    you have other options; your data can rest in whatever form you want. For most
    cases, you''ll probably be happy with the default SQLite database, but this chapter
    discusses other options and where they may be useful.


    In this chapter, you will build a simple application with two tables and a one-to-many
    relationship between them. Imagine you''ve volunteered to run a youth soccer league,
    and you''re trying to keep track of the teams. In your data model, you have a
    `Team` table that tracks the team name and the uniform color and a `Player` table
    that tracks the first name, last name, and e-mail address for each player. One
    team has many players, and each player belongs to only one team. You build this
    application first for SQLite and then port it to each of the other options for
    your persistent store: in-memory and atomic (or custom) stores. Follow along,
    and feel free to store your data in SQLite or any other persistent store you can
    imagine.'
  trans: "\n# 使用 Core Data 读取数据\n\n在本章中，你使用 Core Data 将数据写入 SQLite 数据库，并使用 `sqlite3`\
    \ 命令行工具读取数据，确认数据已正确存储在持久化存储中。你也可以使用 Core Data 从持久化存储中读取数据。返回 Xcode，打开 `OrgChartAppDelegate.m`\
    \ 文件，添加使用 Core Data 读取数据的方法。\n\n由于员工关系是递归的（即源实体和目标实体相同），请使用递归方法来显示一个人及其下属。接下来展示的递归\
    \ `displayPerson:` 方法接受两个参数（要显示的人以及缩进级别），并通过递归遍历一个人的员工列表，在适当的缩进级别打印他们。代码如下所示：\n\
    \n```\n- (void)displayPerson:(NSManagedObject*)person withIndentation:(NSString*)indentation\n\
    {\n  NSLog(@\"%@Name: %@\", indentation, [person valueForKey:@\"name\"]);\n\n\
    \  // 为子级别增加缩进\n  indentation = [NSString stringWithFormat:@\"%@  \", indentation];\n\
    \n  NSSet *employees = [person valueForKey:@\"employees\"];\n  id employee;\n\
    \  NSEnumerator *it = [employees objectEnumerator];\n  while ((employee = [it\
    \ nextObject]) != nil)\n  {\n    [self displayPerson:employee withIndentation:indentation];\n\
    \  }\n}\n```\n\n现在编写一个方法，从上下文中检索所有组织，并显示它们及其领导者以及领导者的下属。代码见代码清单 2-3。\n\n**代码清单\
    \ 2-3.** *从数据库读取数据的方法*\n\n```\n- (void)readData\n{\n  NSManagedObjectContext *context\
    \ = [self managedObjectContext];\n  NSEntityDescription *orgEntity = [NSEntityDescription\
    \ entityForName:@\"Organization\"\ninManagedObjectContext:context];\n\n  NSFetchRequest\
    \ *fetchRequest = [[NSFetchRequest alloc] init];\n  [fetchRequest setEntity:orgEntity];\n\
    \n  NSArray *organizations = [context executeFetchRequest:fetchRequest error:nil];\n\
    \n  id organization;\n  NSEnumerator *it = [organizations objectEnumerator];\n\
    \  while ((organization = [it nextObject]) != nil)\n  {\n    NSLog(@\"Organization:\
    \ %@\", [organization valueForKey:@\"name\"]);\n\n    NSManagedObject *leader\
    \ = [organization valueForKey:@\"leader\"];\n    [self displayPerson:leader withIndentation:@\"\
    \  \"];\n  }\n}\n```\n\n将方法声明添加到 `OrgChartAppDelegate.h` 中，以消除编译器警告。\n\n```\n\
    - (void)readData;\n- (void)displayPerson:(NSManagedObject *)person withIndentation:(NSString\
    \ *)indentation;\n```\n\n最后，修改 `didFinishLaunchingWithOptions:` 方法，调用 `[self readData]`\
    \ 而非 `[self createData]`。\n\n```\n- (BOOL)application:(UIApplication *)application\n\
    didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n{\n  //[self createData];\n\
    \  [self readData];\n  self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\n  // 应用程序启动后的自定义覆盖点。\n  self.viewController = [[OrgChartViewController\
    \ alloc]\ninitWithNibName:@\"OrgChartViewController\" bundle:nil];\n  self.window.rootViewController\
    \ = self.viewController;\n  [self.window makeKeyAndVisible];\n  return YES;\n\
    }\n```\n\n构建并启动应用程序，然后查看调试日志，你应该会看到以下输出，其中显示了你创建的、以 John 为领导的组织，以及 John 的两名下属：\n\
    \n```\n2011-07-30 22:18:37.422 OrgChart[4460:f203] Organization: MyCompany, Inc.\n\
    2011-07-30 22:18:37.424 OrgChart[4460:f203]   Name: John\n2011-07-30 22:18:37.425\
    \ OrgChart[4460:f203]     Name: Bill\n2011-07-30 22:18:37.426 OrgChart[4460:f203]\
    \     Name: Jane\n```\n\n你可以随意对 `OrgChart` 应用进行实验，修改 `createData:` 方法中创建的管理对象，调用\
    \ `createData:` 来存储你的更改，并调用 `readData:` 来验证更改是否已写入。你可以在每次运行之间删除 SQLite 数据库文件，让\
    \ `OrgChart` 应用重新创建它，或者让多次运行在数据库中积累对象。例如，如果你为 Jane 添加了一个新下属（Jack），那么 `OrgChart`\
    \ 应用的输出将如下所示：\n\n```\n2011-07-30 22:22:21.858 OrgChart[4517:f203] Organization:\
    \ MyCompany, Inc.\n2011-07-30 22:22:21.860 OrgChart[4517:f203]   Name: John\n\
    2011-07-30 22:22:21.861 OrgChart[4517:f203]     Name: Bill\n2011-07-30 22:22:21.861\
    \ OrgChart[4517:f203]     Name: Jane\n2011-07-30 22:22:21.862 OrgChart[4517:f203]\
    \       Name: Jack\n```\n\nJack 向 Jane 汇报。Jane 和 Bill 都向 John 汇报。John 是公司的领导者。\n\
    \n## 小结\n\n至此，Core Data 框架对你来说应该不再那么令人望而生畏了。在本章中，你探索了高效管理整个对象图持久化所涉及的主要类，而无需让用户接触复杂的图算法或繁琐的\
    \ C API 来与特定数据库交互。使用 Core Data 就像开车一样，无需成为修车技师。该框架仅用大约十几个类就能表示对象模型并管理数据对象图。类结构的简洁性具有迷惑性。你已经看到了\
    \ Core Data 的强大功能——而这仅仅是个开始。当你深入探索其众多配置选项、UI 绑定、可选的持久化存储以及自定义托管对象类时，你将会进一步领略 Core\
    \ Data 的精妙之处。\n\n# 第 3 章\n\n# 存储数据：SQLite 与其他选项\n\n第 2 章 解释了组成 Core Data 框架的各个类，以及它们之间协同工作的相互依赖关系和精确性。接下来的章节将解释并演示该框架在获得期望结果方面的灵活性，但框架的灵活性是有一定限度的。该框架为数据的存入和取出规定了结构、顺序和规则。你必须按照这种顺序和结构，以\
    \ Core Data 的方式行事，才能可靠地存储和检索数据。然而，在定义持久化存储的外观或运作方式时，Core Data 的束缚便不复存在。尽管人们倾向于认为数据“属于”数据库，并且苹果公司提供并将\
    \ SQLite 数据库作为 Core Data 持久化存储的默认选项，但你还有其他的选择；你的数据可以以你想要的任何形式存储。在大多数情况下，你可能会对默认的\
    \ SQLite 数据库感到满意，但本章将讨论其他选项以及它们可能适用的场景。\n\n在本章中，你将构建一个包含两个表以及它们之间的一对多关系的简单应用程序。假设你自愿管理一个青少年足球联赛，并试图跟踪各支球队的信息。在你的数据模型中，有一个\
    \ `Team` 表记录球队名称和队服颜色，还有一个 `Player` 表记录每位球员的名字、姓氏和电子邮件地址。一支球队有多名球员，而每名球员只属于一支球队。你先为\
    \ SQLite 构建这个应用程序，然后将其移植到其他持久化存储选项：内存存储和原子（或自定义）存储。请跟随步骤操作，并随意将数据存储到 SQLite 或你能想到的任何其他持久化存储中。\n"
- fmt: '### Visualizing the User Interface


    The League Manager application contains four screens:

    - Team List

    - Add/Edit Team

    - Player List

    - Add/Edit Player


    The Team List screen lists all the teams stored in the application along with
    their jersey colors. It has a `+` button to add a team and an Edit button to delete
    a team. The screen looks like [Figure 3–1](#Chapter03.html#fig_3_1).


    ![images](images/0301.jpg)


    **Figure 3–1.** *The Team List screen*


    The Add/Edit Team screen offers fields to type a team name and a jersey color.
    It looks like [Figure 3–2](#Chapter03.html#fig_3_2). You display it by clicking
    the `+` button from the Team List screen to add a new team or by tapping on an
    existing team to edit the team name and jersey color for an existing team.


    ![images](images/0302.jpg)


    **Figure 3–2.** *The Add/Edit Team screen*


    The Player List screen lists all the players for a particular team. You get to
    it by tapping the detail disclosure button beside any team. It has a `+` button
    for adding a new player and an Edit button for deleting a player, as you can see
    in [Figure 3–3](#Chapter03.html#fig_3_3).


    ![images](images/0303.jpg)


    **Figure 3–3.** *The Player List screen*


    Like the Add/Edit Team screen, the Add/Edit Player screen lets users add or edit
    players, offering the appropriate fields: first name, last name, and e-mail address.
    It looks like [Figure 3–4](#Chapter03.html#fig_3_4). You display it by clicking
    the `+` button from the Player List screen to add a new player or by tapping on
    an existing player to edit that player''s data.


    ![images](images/0304.jpg)


    **Figure 3–4.** *The Add/Edit Player screen*


    Now that you know what you''re building, let''s get started.


    ### Using SQLite as the Persistent Store


    In this section, you will build the Core Data–based application that you''ll use
    throughout this chapter to demonstrate different persistent store options. You
    start from Xcode''s Core Data template and build upon the generated code to create
    an application that stores a bunch of teams and a bunch of players and allows
    users to maintain them. Don''t get caught up in the application code or the user
    interface; instead, focus on the backing persistent store and its many forms.


    To begin, launch Xcode, and choose `File` ![images](images/U001.jpg) `New` ![images](images/U001.jpg)
    `New Project`. Select Application under iOS on the left of the ensuing dialog
    box, and select Master-Detail Application on the right, as shown in [Figure 3–5](#Chapter03.html#fig_3_5).
    Click the Next button. For the project options, type **League Manager** for the
    Product Name and **book.coredata** for the Company Identifier, and check the Use
    Core Data box, as shown in [Figure 3–6](#Chapter03.html#fig_3_6).


    ![images](images/0305.jpg)


    **Figure 3–5.** *Selecting the Master-Detail Application template*


    ![images](images/0306.jpg)


    **Figure 3–6.** *Naming the project and selecting to use Core Data*


    Save the project where you normally save projects.


    The most interesting part of the League Manager application, at least for current
    purposes, is the data model. Understanding persistent stores depends on creating
    and understanding the proper data model, so step through this part carefully and
    precisely. Open the data model in Xcode by selecting `League_Manager.xcdatamodeld`.
    The right side of Xcode displays the generated data model, which has a single
    entity called `Event` with a single attribute called `timeStamp`. Delete the `Event`
    entity by selecting it and pressing your Delete key, which should give you an
    empty data model, as in [Figure 3–7](#Chapter03.html#fig_3_7).


    ![images](images/0307.jpg)


    **Figure 3–7.** *Empty data model*


    The League Manager data model calls for two entities: one to hold teams and one
    to hold players. For teams, you track two attributes: name and uniform color.
    For players, you track three: first name, last name, and e-mail address (so you
    can contact players about practices, games, and the schedule for orange-slice
    responsibilities). You also track which players play for a given team, as well
    as which team a given player plays for. Start by creating the `Team` entity: click
    the Add Entity button shown at the bottom of Xcode. (It may be labeled Add Fetch
    Request or Add Configuration; if so, click and hold to select Add Entity from
    the menu.) Xcode creates a new entity called `Entity` with the name conveniently
    highlighted so you can type **Team** and press Enter. Now click the Add Attribute
    button (it may be labeled Add Property or Add Fetched Property; if so, click and
    hold to select Add Attribute from the menu) and type `name` to name the new attribute.
    Note that you can also click the `+` button at the bottom of the Attributes section
    to add the attribute. Select `String` from the Type drop-down. Now create the
    second attribute, following the same steps, but name the attribute `uniformColor`,
    and select the `String` type. Your data model should look like [Figure 3–8](#Chapter03.html#fig_3_8).


    ![images](images/0308.jpg)


    **Figure 3–8.** *Team data model*


    Before you can create the one-to-many relationship between teams and players,
    you must have players for teams to relate to. Create another entity called `Player`
    with three attributes, all of type `String`: `firstName`, `lastName`, and `email`.
    Your data model should now look like [Figure 3–9](#Chapter03.html#fig_3_9).


    ![images](images/0309.jpg)


    **Figure 3–9.** *Team and Player data model*


    #### Configuring the One-to-Many Relationship


    To create the one-to-many relationship between the `Team` entity and the `Player`
    entity, select the `Team` entity, and click the `+` button below the Relationships
    section. Name this relationship `players`, and select `Player` from the Destination
    drop-down. In the Data Model Inspector view, leave the Optional check box selected.
    Select the To-Many Relationship check box; one team can have many players. For
    Delete Rule, select Cascade from the drop-down so that deleting a team deletes
    all its players. You cannot yet select the inverse relationship in the Inverse
    drop-down because you haven''t created the inverse relationship yet. The Relationship
    information section should look like [Figure 3–10](#Chapter03.html#fig_3_10).


    ![images](images/0310.jpg)


    **Figure 3–10.** *Players relationship options*


    Next, create the relationship back from the `Player` entity to the `Team` entity
    by selecting the `Player` entity, adding a relationship, and calling it `team`.
    Select `Team` from the Destination column and `players` from the Inverse column.
    Leave the relationship options as the default. You should now be able to select
    the `Team` entity and verify that the `players` relationship has an inverse: `team`.
    Your Xcode window should look like [Figure 3–11](#Chapter03.html#fig_3_11).


    ![images](images/0311.jpg)


    **Figure 3–11.** *The complete League Manager data model*'
