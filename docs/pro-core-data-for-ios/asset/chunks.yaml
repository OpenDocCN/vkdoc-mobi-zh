    \ Core Data`项目所存储的状态。通过点击应用程序右上角的加号按钮，创建一个带有当前时间戳的新事件。\n\n![images](img/0104.jpg)\n\
    \n**图 1-4.** *带有空白屏幕的基础应用程序*\n\n现在，点击`Xcode IDE`中的`Stop`按钮停止应用程序。如果应用程序没有使用 Core\
    \ Data 持久化存储，那么退出时就会丢失刚刚创建的事件。在没有持久化存储的情况下使用此应用维护一个事件列表将是一项西绪福斯式的任务——你必须在每次启动应用时重新创建这些事件。然而，由于应用程序使用了持久化存储，它通过`Core\
