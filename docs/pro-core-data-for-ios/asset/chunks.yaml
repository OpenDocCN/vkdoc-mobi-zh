  trans: '

    ### 创建实体


    到目前为止，我们已经详细讨论了实体。实体描述了被管理对象的属性和关系。要在 Xcode 中添加实体，只需点击 Xcode 中实体部分下方的添加实体按钮，并为你的实体命名。


    默认情况下，每个实体的实例在运行时由 `NSManagedObject` 类型的对象表示，但随着项目的发展和成熟，你通常会选择创建自己的类来表示被管理对象。你的自定义被管理对象必须继承自
    `NSManagedObject`，并且必须在实体详细信息面板的类字段中指定自定义对象的类名，如图 4-10 所示。


    ![images](img/0410.jpg)


    **图 4-10.** *自定义被管理对象类*


    我们还有一个尚未涉及的主题：实体继承。与面向对象编程范式中的类继承非常相似，实体继承允许你创建从另一个实体继承属性，并可以添加自身属性的实体。例如，你可以创建一个
    `Person` 实体，而 `Player` 实体可以继承它。如果你还有其他表示人的实体——例如 `Coach`，你也可以继承自 `Person` 实体。如果你想阻止父实体被直接实例化，从而防止用户创建独立的
    `Person` 对象，你可以将 `Person` 实体设为抽象。例如，你可以创建一个带有 `dateOfBirth` 属性的 `Person` 实体。图
    4-11 展示了如何配置 `Person` 实体。注意它如何被设置为抽象以防止直接实例化。


    ![images](img/0411.jpg)


    **图 4-11.** *作为抽象实体的 Person 实体*


    下一步是更改 `Player` 实体的配置，并将其父实体设置为 `Person`。选择 `Player` 实体，并将父字段更改为 `Person`，如图 4-12
    所示。`Player` 实体现在继承自 `Person` 实体，如图 4-13 的图形视图所示。这意味着一个球员被管理对象也具有可设置和读取的 `dateOfBirth`
    属性。


    ![images](img/0412.jpg)


    **图 4-12.** *配置为继承自 Person 实体的 Player 实体*


    ![images](img/0413.jpg)


    **图 4-13.** *配置为继承自 Person 实体的 Player 实体的图形视图*


    ### 创建属性


    属性描述了一个实体。与面向对象编程中对象的属性类似，实体属性定义了实体的当前状态，并可以由各种数据类型表示。选择一个实体，然后点击属性标题下方的 + 按钮，为所选实体创建一个新属性。图
    4-14 展示了配置属性的不同选项。


    ![images](img/0414.jpg)


    **图 4-14.** *属性详细信息面板*


    本章前面部分，我们讨论了属性不同属性的含义。请参见表 4-1 回顾这些属性。可以说是属性最关键的性质是其类型。Core Data 默认提供了几种类型，如表
    4-2 所示。


    ![image](img/t0402.jpg)


    ![image](img/t0402a.jpg)


    这些类型大多很直观，因为它们直接映射到 Objective-C 数据类型。使用它们只需利用 `NSManagedObject` 实例的键/值访问器即可。`Transformable`
    类型是唯一没有 Objective-C 对应类型的类型。`Transformable` 类型用于自定义类型，即 Core Data 不支持的类型。当你试图持久化的属性无法整齐地归入某个支持的数据类型时，使用
    `Transformable` 作为类型。例如，如果你的被管理对象需要表示一种颜色并需要持久化它，那么使用 `CGColorRef` 类型是合理的。在这种情况下，你需要将
    Core Data 类型设置为 `Transient` 和 `Transformable`，并提供一个机制，让 Core Data 能够将该属性转换（变换）为支持的数据类型。当你创建自己的继承自
    `NSManagedObject` 的被管理对象时，使用自定义属性；这些内容将在下一章中更详细地介绍。


    ### 创建关系


    当你规范化数据模型时，根据所建模数据的复杂程度，你可能会创建多个实体。关系允许你将实体联系在一起，就像 League Manager 应用将队伍和球员联系起来一样。Core
    Data 允许你调整创建的关系，以准确反映数据之间的关联方式。


    在 Xcode 中，当你创建一个 Core Data 关系或选择一个现有关系时，你会看到一组可以修改的选项，以改变关系的性质。例如，如果你从 League
    Manager 数据模型中的 `Player` 实体选择“team”关系，你会看到类似图 4-15 的内容。该面板中的选项允许你配置关系的字段。这些字段如下：


    *   名称

    *   目标

    *   反向

    *   瞬态

    *   可选

    *   对多关系

    *   计数（最小值和最大值）

    *   删除规则


    接下来的几节将逐一讲解所有这些字段，解释它们的含义以及它们如何影响关系，以便你能够在数据模型中正确设置关系。


    ![images](img/0415.jpg)


    **图 4-15.** *关系面板*


    #### 名称


    第一个字段“名称”将成为 `NSManagedObject` 用来引用该关系的键的名称。按照惯例，它是被引用实体名称的小写形式。在对多关系的情况下，“名称”字段惯例上使用复数形式。请注意，这些指南只是约定，但如果你遵循它们，将使你的数据模型更易于理解、维护和操作。你可以看到
    League Manager 数据模型遵循了这些约定——在 `Player` 实体中，到 `Team` 实体的关系被称为“team”。在 `Team` 实体中，到
    `Player` 实体的关系，是一个对多关系，被称为“players”。


    #### 目标和反向


    下一个字段“目标”指定关系另一端的实体。“反向”字段允许你选择同一个关系，但是从目标实体的角度。要正确设置，请在两个相关实体中都创建关系，在每个实体中设置名称和目标，然后在一个实体中选择正确的反向关系。Core
    Data 会为另一个实体计算出反向关系并自动设置。


    将“反向”字段保留为“无反向关系”值会给你带来两个编译器警告：一致性错误和配置错误的属性。


    你可以忽略这些警告并在不指定反向关系的情况下运行你的应用程序——毕竟，这些是编译器警告，而不是编译器错误——但你可能会面临意想不到的后果。Core Data
    使用双向关系信息来维护对象图的**一致性**（因此有一致性错误）以及管理撤销和重做信息。如果你留下一个没有反向关系的关系，就意味着你将自行处理对象图的一致性和撤销/重做管理。然而，苹果文档强烈不鼓励这样做，尤其是在对多关系的情况下。当你不指定反向关系时，当关系这一端的被管理对象发生变化时，关系另一端的被管理对象不会被标记为已更改。考虑一个
    `Player` 对象被删除并且没有返回到其队伍的反向关系的例子。当保存对象图时，任何可空性规则或删除规则都不会被强制执行。

    '
- fmt: '#### Transient


    The `Transient` check box allows you to specify that a relationship should not
    be saved to the persistent store. A transient relationship still has support for
    undo and redo operations but disappears when the application exits, giving the
    relationship the life span of a Hollywood marriage. Here are some possible uses
    for transient relationships:


    - Relationships between entities that are temporal and shouldn’t survive beyond
    the current run of the application.

    - Relationship information that can be derived from some external source of data,
    whether another Core Data persistent store or some other source of information.


    In most cases, you’ll want your relationships to be persistent, and you’ll leave
    the `Transient` check box unchecked.


    #### Optional


    The next field, `Optional`, is a check box that specifies whether this relationship
    requires a non-`nil` value. Think of this like a nullable versus non-nullable
    column in a database. If you select the `Optional` check box, a managed object
    of this entity type can be saved to the persistent store without having anything
    specified for this relationship. If not selected, however, saving the context
    will fail. If the `Player` entity in the data model for League Manager, for example,
    left this check box unchecked, every player entity would have to belong to a team.
    Setting the “team” value for a player to `nil` (or never setting it at all) would
    cause all calls to `save:` to fail with the error description “team is a required
    value.”


    #### To-Many Relationship


    `To-Many Relationship` is another check box. Leaving this check box unchecked
    makes this relationship to-one, which means this relationship has exactly one
    managed object (or zero, depending on optionality settings) on each end of the
    relationship. For the League Manager application, unchecking the `To-Many Relationship`
    check box for the “players” relationship on the `Team` entity would mean that
    only one player could belong on a team, which might work for golf but not soccer.
    Selecting this check box means the destination entity can have many managed objects
    that relate to each managed object instance of this entity type.


    #### Count (Minimum and Maximum)


    The next fields, `Count`, `Minimum`, and `Maximum`, set limits on the number of
    managed objects of the destination entity type that can relate to each managed
    object of this entity type and take effect only if the `To-Many Relationship`
    check box is selected. Unchecking that box to make the relationship to-one resets
    both the `Minimum` and `Maximum` values to 1.


    In a to-many relationship, you can use the `Count` fields to set limits on the
    number of managed objects to which this managed object can relate. Exceeding the
    limits causes the `save:` operation to fail with a “Too many items” or a “Too
    few items” error message. Note that the `Optional` setting overrides the `Minimum
    Count` setting; if `Optional` is checked and `Min Count` is 1, saving the context
    when the relationship count is zero succeeds. Note also that Core Data doesn’t
    require that you set these values intelligently. You can, for example, set `Minimum
    Count` higher than `Maximum Count`. If you do this, calls to `save:` will always
    fail because you can never meet the `Count` criteria set. You’ve probably been
    in relationships yourself that seem this way.


    #### Delete Rule


    The `Delete Rule` setting allows you to specify what happens if you try to delete
    a managed object of this entity type. [Table 4–3](#Chapter04.html#tab_4_3) lists
    the four possibilities and what they mean.


    ![image](images/t0403.jpg)


    The League Manager application, for example, sets the `Delete Rule` for the “players”
    relationship in the `Team` entity to `Cascade` so that deleting a team would delete
    all the players related to it. If you set that rule to `Deny` and a team had any
    players, trying to delete the team would result in an error on any attempts to
    save the context with the message “team is not valid.” Setting the `Delete Rule`
    to `Nullify` would preserve the players in the persistent store, though they would
    no longer belong to any team.


    The `No Action` option represents another way, such as not specifying an inverse
    relationship, that Core Data allows you to accept responsibility for managing
    object graph consistency. If you specify this value for the `Delete Rule`, Core
    Data allows you to delete the source object but pretends to the destination objects
    that the source object still exists. For the League Manager application, this
    would mean disbanding a team but still telling the players to show up for practices
    and games. You won’t find many compelling reasons to use the `No Action` setting,
    except perhaps for performance reasons when you have many destination objects.
    [Chapter 7](#Chapter07.html#ch7) discusses performance tuning with Core Data.


    ### Summary


    For applications that depend on data, which means most applications, the importance
    of designing your data model correctly cannot be overstated. The Xcode data modeler
    provides a solid interface for designing and defining your data models, and in
    this chapter, you learned to navigate the many options available as you create
    entities, attributes, and relationships. Make sure to understand the implications
    of how you’ve configured your data model so that your applications can run efficiently
    and correctly.


    In most cases, you should avoid options in your model that wrest control from
    Core Data and make you manage the consistency of the object graph yourself. Core
    Data will almost always do a better job of managing object graph consistency than
    you will. When you must take control, make sure to debug your solutions well to
    prevent application crashes or data corruption.


    One feature of Xcode that you may find helpful is the ability to print your data
    model for review. You’ll find that Xcode can print your data model to any printer
    that Mac OS X supports.


    In the next chapter, you’ll learn how to use the data models you create by actually
    creating, retrieving, updating, and deleting data in them.


    ## Chapter 5


    ## Working with Data Objects


    The ability to easily interact with data in a database ranks high among the features
    that drive the success of most new programming languages and frameworks. This
    chapter talks about working with the data objects you create and store in your
    Core Data models. You’ll find Core Data provides an abstraction from the complexities
    of Structured Query Language (SQL) and database programming that allows you to
    quickly and efficiently read and write data to your persistent stores.'
  raw: '#### Transient


    The Transient check box allows you to specify that a relationship should not be
    saved to the persistent store. A transient relationship still has support for
    undo and redo operations but disappears when the application exits, giving the
    relationship the life span of a Hollywood marriage. Here are some possible uses
    for transient relationships:


    *   Relationships between entities that are temporal and shouldn’t survive beyond
    the current run of the application.

    *   Relationship information that can be derived from some external source of
    data, whether another Core Data persistent store or some other source of information.


    In most cases, you’ll want your relationships to be persistent, and you’ll leave
    the Transient check box unchecked.


    #### Optional


    The next field, Optional, is a check box that specifies whether this relationship
    requires a non-`nil` value. Think of this like a nullable versus non-nullable
    column in a database. If you select the Optional check box, a managed object of
    this entity type can be saved to the persistent store without having anything
    specified for this relationship. If not selected, however, saving the context
    will fail. If the `Player` entity in the data model for League Manager, for example,
    left this check box unchecked, every player entity would have to belong to a team.
    Setting the “team” value for a player to `nil` (or never setting it at all) would
    cause all calls to `save:` to fail with the error description “team is a required
    value.”


    #### To-Many Relationship


    To-Many Relationship is another check box. Leaving this check box unchecked makes
    this relationship to-one, which means this relationship has exactly one managed
    object (or zero, depending on optionality settings) on each end of the relationship.
    For the League Manager application, unchecking the To-Many Relationship check
    box for the “players” relationship on the `Team` entity would mean that only one
    player could belong on a team, which might work for golf but not soccer. Selecting
    this check box means the destination entity can have many managed objects that
    relate to each managed object instance of this entity type.


    #### Count (Minimum and Maximum)


    The next fields, Count, Minimum, and Maximum, set limits on the number of managed
    objects of the destination entity type that can relate to each managed object
    of this entity type and take effect only if the To-Many Relationship check box
    is selected. Unchecking that box to make the relationship to-one resets both the
    Minimum and Maximum values to 1.


    In a to-many relationship, you can use the Count fields to set limits on the number
    of managed objects to which this managed object can relate. Exceeding the limits
    causes the `save:` operation to fail with a “Too many items” or a “Too few items”
    error message. Note that the Optional setting overrides the Minimum Count setting;
    if Optional is checked and Min Count is 1, saving the context when the relationship
    count is zero succeeds. Note also that Core Data doesn’t require that you set
    these values intelligently. You can, for example, set Minimum Count higher than
    Maximum Count. If you do this, calls to `save:` will always fail because you can
    never meet the Count criteria set. You’ve probably been in relationships yourself
    that seem this way.


    #### Delete Rule


    The Delete Rule setting allows you to specify what happens if you try to delete
    a managed object of this entity type. [Table 4–3](#Chapter04.html#tab_4_3) lists
    the four possibilities and what they mean.


    ![image](images/t0403.jpg)


    The League Manager application, for example, sets the Delete Rule for the “players”
    relationship in the `Team` entity to Cascade so that deleting a team would delete
    all the players related to it. If you set that rule to Deny and a team had any
    players, trying to delete the team would result in an error on any attempts to
    save the context with the message “team is not valid.” Setting the Delete Rule
    to Nullify would preserve the players in the persistent store, though they would
    no longer belong to any team.


    The No Action option represents another way, such as not specifying an inverse
    relationship, that Core Data allows you to accept responsibility for managing
    object graph consistency. If you specify this value for the Delete Rule, Core
    Data allows you to delete the source object but pretends to the destination objects
    that the source object still exists. For the League Manager application, this
    would mean disbanding a team but still telling the players to show up for practices
    and games. You won’t find many compelling reasons to use the No Action setting,
    except perhaps for performance reasons when you have many destination objects.
    [Chapter 7](#Chapter07.html#ch7) discusses performance tuning with Core Data.


    ### Summary


    For applications that depend on data, which means most applications, the importance
    of designing your data model correctly cannot be overstated. The Xcode data modeler
    provides a solid interface for designing and defining your data models, and in
    this chapter, you learned to navigate the many options available as you create
    entities, attributes, and relationships. Make sure to understand the implications
    of how you’ve configured your data model so that your applications can run efficiently
    and correctly.


    In most cases, you should avoid options in your model that wrest control from
    Core Data and make you manage the consistency of the object graph yourself. Core
    Data will almost always do a better job of managing object graph consistency than
    you will. When you must take control, make sure to debug your solutions well to
    prevent application crashes or data corruption.


    One feature of Xcode that you may find helpful is the ability to print your data
    model for review. You’ll find that Xcode can print your data model to any printer
    that Mac OS X supports.


    In the next chapter, you’ll learn how to use the data models you create by actually
    creating, retrieving, updating, and deleting data in them.


    ## Chapter 5


    ## **Working with Data Objects**


    The ability to easily interact with data in a database ranks high among the features
    that drive the success of most new programming languages and frameworks. This
    chapter talks about working with the data objects you create and store in your
    Core Data models. You’ll find Core Data provides an abstraction from the complexities
    of Structured Query Language (SQL) and database programming that allows you to
    quickly and efficiently read and write data to your persistent stores.'
  trans: '

    #### 瞬态（Transient）


    `Transient`（瞬态）复选框允许你指定某个关系不应保存到持久化存储中。瞬态关系仍然支持撤销和重做操作，但在应用程序退出时会消失，使其生命周期如同好莱坞婚姻般短暂。以下是瞬态关系的一些可能用途：


    -   具有时效性且不应在本次应用运行结束后继续存在的实体间关系。

    -   可从某些外部数据源（无论是另一个 Core Data 持久化存储还是其他信息源）推导出的关系信息。


    大多数情况下，你希望关系是持久的，因此应保持 `Transient` 复选框处于未选中状态。


    #### 可选（Optional）


    下一个字段 `Optional`（可选）是一个复选框，用于指定此关系是否需要非 `nil` 值。可以将其类比为数据库中的可空列与不可空列。如果选中 `Optional`
    复选框，那么此实体类型的托管对象可以在未为此关系指定任何值的情况下保存到持久化存储中。但若未选中，则保存上下文将会失败。例如，如果 League Manager
    应用数据模型中的 `Player` 实体取消了此复选框的勾选，那么每个球员实体都必须属于某个球队。将球员的“team”值设置为 `nil`（或根本不设置）会导致所有对
    `save:` 的调用失败，并显示错误描述“team is a required value”。


    #### 对多关系（To-Many Relationship）


    `To-Many Relationship`（对多关系）是另一个复选框。取消选中此复选框会使关系成为对一（to-one）关系，这意味着该关系的每一端恰好有一个托管对象（或零个，具体取决于可选性设置）。对于
    League Manager 应用，如果取消勾选 `Team` 实体上“players”关系的 `To-Many Relationship` 复选框，就意味着一个球队只能有一名球员，这或许适用于高尔夫球，但不适用于足球。选中此复选框则表示目标实体可以有多个托管对象，这些对象与此实体类型的每个托管对象实例相关联。


    #### 数量（最小值和最大值）（Count (Minimum and Maximum)）


    接下来的字段 `Count`（数量）、`Minimum`（最小值）和 `Maximum`（最大值）用于设定此实体类型的每个托管对象可关联的目标实体类型托管对象的数量限制，且仅在选中
    `To-Many Relationship` 复选框时生效。取消选中该框使关系成为对一关系，会将 `Minimum` 和 `Maximum` 值都重置为 1。


    在对多关系中，你可以使用 `Count` 字段来限制此托管对象可关联的托管对象数量。超出限制会导致 `save:` 操作失败，并显示“Too many items”或“Too
    few items”错误消息。请注意，`Optional` 设置会覆盖 `Minimum Count` 设置；如果 `Optional` 被选中且 `Min
    Count` 为 1，当关系计数为零时保存上下文仍会成功。另请注意，Core Data 不会要求你智能地设置这些值。例如，你可以将 `Minimum Count`
    设置得比 `Maximum Count` 高。如果你这样做，对 `save:` 的调用将始终失败，因为你永远无法满足所设定的 `Count` 标准。你可能自己也经历过感觉像这样的关系。


    #### 删除规则（Delete Rule）


    `Delete Rule`（删除规则）设置允许你指定当尝试删除此实体类型的托管对象时会发生什么。表 4–3 列出了四种可能性及其含义。


    ![image](img/t0403.jpg)


    例如，League Manager 应用将 `Team` 实体中“players”关系的 `Delete Rule` 设置为 `Cascade`（级联），以便删除球队会删除所有与之相关的球员。如果你将该规则设置为
    `Deny`（拒绝），并且球队有任意球员，那么尝试删除该球队会导致任何保存上下文的尝试出错，并显示消息“team is not valid”。将 `Delete
    Rule` 设置为 `Nullify`（置空）会保留持久化存储中的球员，但他们将不再属于任何球队。


    `No Action`（无操作）选项代表了另一种方式，例如不指定反向关系，Core Data 允许你承担管理对象图一致性的责任。如果你为 `Delete Rule`
    指定此值，Core Data 允许你删除源对象，但会向目标对象假装源对象仍然存在。对于 League Manager 应用，这意味着解散一个球队，但仍然告诉球员们来参加训练和比赛。你很难找到使用
    `No Action` 设置的令人信服的理由，除非可能是出于性能考虑，当你有大量目标对象时。第 7 章 讨论了使用 Core Data 进行性能调优。


    ### 总结


    对于依赖数据的应用程序（即大多数应用程序），正确设计数据模型的重要性怎么强调都不为过。Xcode 数据模型器为设计和定义数据模型提供了坚实的界面，在本章中，你学习了如何在创建实体、属性和关系时浏览众多可用选项。请务必理解你所配置的数据模型的影响，以便你的应用程序能够高效且正确地运行。


    在大多数情况下，你应该避免在模型中使用那些会从 Core Data 手中夺走控制权、并迫使你自己管理对象图一致性的选项。Core Data 在管理对象图一致性方面几乎总是比你做得更好。当你必须掌控时，请确保对你的解决方案进行充分调试，以防止应用程序崩溃或数据损坏。


    Xcode 的一个你可能觉得有用的功能是能够打印你的数据模型以供审查。你会发现在 Mac OS X 支持的任何打印机上，Xcode 都能打印你的数据模型。


    在下一章中，你将学习如何通过实际创建、检索、更新和删除数据来使用你创建的数据模型。


    ## 第 5 章


    ## 处理数据对象


    轻松与数据库中的数据交互的能力是推动大多数新编程语言和框架成功的重要特性之一。本章讨论如何处理你创建并存储在 Core Data 模型中的数据对象。你会发现
    Core Data 提供了对结构化查询语言 (SQL) 和数据库编程复杂性的抽象，使你能够快速高效地读写持久化存储中的数据。

