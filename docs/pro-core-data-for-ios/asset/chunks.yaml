    The last step for using your custom attribute transformer is to register the transformer
    in `ShapesAppDelegate.m`. This can be done simply by importing `UIColorTransformer.h`
    and adding the following two lines at the beginning of the `application:didFinishLaunchingWithOptions:`
    method so that they are called before the Core Data stack is initialized:


    **`UIColorTransformer* transformer = [[UIColorTransformer alloc] init];`**

    **`[UIColorTransformer setValueTransformer:transformer forName:(NSString*)@"UIColorTransformerName"];`**


    You’ll have to delete your existing Shapes database, but then you can build and
    run the Shapes application to see your color transformer being used. You can also
    open the shapes SQLite database and look at the `ZCOLOR` column in the `ZSHAPE`
    table, which is now of type `BLOB`. If you look at any of the values there, you
    see that they are in the format created by the `transformedValue:` method of the
    `UIColorTransformer` class you created: three comma-separated float values that
    represent the components of the `CGColor`.


    In this section, you have seen how to take advantage of your custom objects to
    hide Core Data from your application code as much as possible in order to make
    the persistence layer as transparent as possible.


    ### Validating Data


    Core Data won’t allow you to stuff data that doesn’t fit into any of the attributes
    in your model. Try, for example, to put a string like “Books for Professionals
    by Professionals,” the Apress tag line, into an attribute of type `Integer 16`,
    and you’ll raise an `NSInvalidArgumentException` that looks something like this:


    `''NSInvalidArgumentException'', reason: ''Unacceptable type of value for attribute:
    property = "x"; desired type = NSNumber; given type = NSCFString; value = Books
    for Professionals by Professionals.''`


    Core Data enforces data integrity, but sometimes you want more than that. Sometimes
    you want to enforce what corporate-speak terms *business rules*, though they might
    or might not have anything to do with business. Take, for example, the `Polygon`
    instances in the Shapes application and their relationships with `Vertex` instances.
    A real-world polygon with no vertices doesn’t exist, so you set the “vertices”
    relationship to nonoptional. A polygon with one vertex isn’t a polygon, either.
    It’s a point. And a two-vertex polygon is a line. A polygon must have at least
    three vertices to make the club. For that reason, you set the value for Min Count
    in the “vertices” relationship to three. Relating a `Polygon` instance to only
    one or two `Vertex` instances prevents the managed object context from saving
    successfully. Instead, you get an error that looks like this: “Operation could
    not be completed. (Cocoa error 1580.)” The error codes come from the header file
    `CoreDataErrors.h` and are listed, along with descriptions, in [Table 5–1](#Chapter05.html#tab_5_1).
    Note that the descriptions are lifted directly from the header file. Checking
    this table reveals that error code 1580 means “to-many relationship with too few
    destination objects,” which describes exactly what you tried to do.


    ![images](images/t0501.jpg)


    The table of error codes gives you some clues about what Core Data will validate
    for you. The Core Data modeling tool for defining attributes and relationships
    gives you the same clues. For relationships, you can validate that to-many relationships
    have a valid number of destination objects—not too many and not too few. For attributes,
    however, you have a larger number of parameters you can validate, depending on
    the attribute type. For all the number types, you can specify a Min value and
    a Max value:


    * `Integer 16`

    * `Integer 32`

    * `Integer 64`

    * `Decimal`

    * `Double`

    * `Float`


    Violating the acceptable range gives you an `NSValidationNumberTooSmallError`
    or an `NSValidationNumberTooLargeError`, depending on which is appropriate. If,
    for example, you set the Min value to 7.0 and the Max value to 10.0 for the `radius`
    attribute of the `Circle` entity, random circles that don’t fall within that radius
    range would not save to the persistent store.


    For the `String` type, you can specify values for the Min Length and Max Length
    of the string, as well as provide a regular expression to which the value must
