  trans: '

    # 查询类


    到目前为止，本章已经介绍了如何初始化 Core Data 基础设施以及如何与它创建的对象进行交互。本节将讲解通过发送获取请求来检索数据的基础知识。毫不意外，获取请求是
    `NSFetchRequest` 的实例。但或许会令你稍感惊讶的是，它几乎是 Core Data 框架中唯一一个与数据检索相关的类。在构建数据获取请求时所用到的其他大多数类都属于
    Foundation Cocoa 框架，该框架也被其他所有 Cocoa 框架所使用。图 2–12 展示了源自 `NSFetchRequest` 的类图。


    ![images](img/0212.jpg)


    **图 2–12.** *NSFetchRequest 类图*


    获取请求由两个主要元素组成：一个 `NSPredicate` 实例和一个 `NSSortDescriptor` 实例。`NSPredicate` 通过指定约束条件来帮助过滤数据，而
    `NSSortDescriptor` 则按特定顺序排列结果集。这两个元素都是可选的，如果你未指定它们，那么若未指定 `NSPredicate`，结果将不受约束；若未指定
    `NSSortDescriptor`，结果则不会排序。


    创建一个简单的请求来检索持久化存储区中的所有组织（不受约束且不排序）的代码如下所示：


    ```

    NSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];

    NSEntityDescription *entity = [NSEntityDescription entityForName:@"Organization"
    inManagedObjectContext:managedObjectContext];

    [fetchRequest setEntity:entity];

    NSArray* organizations = [managedObjectContext executeFetchRequest:fetchRequest
    error:nil];

    ```


    首先，你需要为请求对象预留内存空间。然后，从上下文中检索出要获取的对象的实体描述，并将其设置到请求对象中。最后，通过调用 `executeFetchRequest:`
    在托管对象上下文中执行查询。


    由于你没有使用 `NSPredicate` 实例来约束请求，因此 `organizations` 数组将包含代表持久化存储区中每个组织的 `NSManagedObject`
    实例。为了过滤结果并只返回部分组织，你需要使用 `NSPredicate` 类。要创建一个简单的谓词，将结果限制为名称包含字符串 `"Inc."` 的组织，你可以调用
    `NSPredicate` 的 `predicateWithFormat:` 方法，传入格式字符串以及要插入格式中的数据。然后，在托管对象上下文中执行请求之前，将该谓词添加到获取请求中。代码如下所示：


    ```

    NSPredicate *predicate = [NSPredicate predicateWithFormat:@"name contains %@",
    @"Inc."];

    [fetchRequest setPredicate:predicate];

    ```


    要按组织名称的字母顺序对结果集进行排序，可以在执行请求之前向请求添加排序描述符。


    ```

    NSSortDescriptor *sortByName = [[NSSortDescriptor alloc] initWithKey:@"name" ascending:YES];

    [fetchRequest setSortDescriptors:[NSArray arrayWithObject:sortByName]];

    ```


    第 6 章将更深入地讲解如何使用谓词进行简单和复杂查询，以及如何使用排序描述符进行排序。


    图 2–13 将本章中你见过的所有 Core Data 类图整合到一个单一的类图中，展示了所有这些类在框架中的关系。


    图中用线条人物代表的用户代码主要与四个类进行交互：


    * `NSManagedObject` (1)

    * `NSManagedObjectContext` (2)

    * `NSFetchRequest` (3)

    * `NSFetchedResultsController` (4)


    请在图 2–13 中找到这四个编号为 1–4 的类，并将它们作为锚点，你应该能识别出本章已学习过的各个独立类图。唯一的例外是 `NSFetchedResultsController`
    (4)，它与 iOS 表格视图紧密配合。我们将在第 9 章中介绍 `NSFetchedResultsController`。


    ![images](img/0213.jpg)


    **图 2–13.** *Core Data 的主要类*

