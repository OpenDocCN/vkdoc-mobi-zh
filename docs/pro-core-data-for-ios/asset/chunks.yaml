  trans: '

    # 重命名实体和属性


    轻量级迁移也支持重命名实体和属性，但这需要你付出更多努力。除了修改模型之外，你还必须为修改名称的项目指定旧名称。你可以通过以下两种方式之一完成此操作：


    - 在 Xcode 数据建模器中

    - 在代码中


    Xcode 数据建模器是更简单的选择。当你在 Xcode 数据建模器中选择一个实体或属性时，有关该实体或属性的常规信息会显示在右侧的实用工具面板中。显示实用工具面板后，打开数据模型检查器，然后找到版本控制部分。在重命名
    ID 字段中，输入你已更改内容的旧名称（参见图 8-7）。


    ![images](img/0807.jpg)


    **图 8-7.** *包含重命名标识符字段的版本控制部分*


    如果你坚持在代码中指定旧名称（或者你仍在 Leopard 系统下运行，并且重命名 ID 字段不可用），则需要根据重命名的内容，调用 `NSEntityDescription`
    或 `NSPropertyDescription` 的 `setRenamingIdentifier:` 方法，并传入实体或属性的旧名称。你需要在模型加载完成之后，但打开持久化存储（`addPersistentStoreWithType:`）
    之前执行此操作。例如，如果你想将 `Vertex` 实体重命名为 `Point`，则应在调用 `addPersistentStoreWithType:` 之前添加以下代码：


    ```

    NSEntityDescription *point = [[managedObjectModel entitiesByName] objectForKey:@"Point"];

    [point setRenamingIdentifier:@"Vertex"];

    ```


    Core Data 负责迁移数据，但你仍有责任更新应用程序中所有依赖旧名称的代码。


    要实际查看此过程，请创建数据模型的新版本，并将其设置为当前版本。你现在应该处于第 4 版本 (`Shapes 4`)。在此版本的模型中，你将把 `Vertex`
    实体重命名为 `Point`。转到你的新模型文件 `Shapes 4.xcdatamodel`，并将 `Vertex` 实体重命名为 `Point`。然后，转到数据模型检查器选项卡中的版本控制部分，在重命名
    ID 字段中输入旧名称 `Vertex`，以便 Core Data 知道如何迁移现有数据（如图 8-8 所示），并保存此模型。


    ![images](img/0808.jpg)


    **图 8-8.** *将 Vertex 重命名为 Point 并指定重命名 ID*


    等等！在运行应用程序之前，请记住你负责更改任何依赖旧名称 `Vertex` 的代码。你可以将自定义托管对象类名从 `Vertex` 更改为 `Point`，将
    `Polygon` 实体中的关系名称从 `vertices` 更改为 `points`，并适当地更改任何变量名称。这里我们保持简单，只更改 Shapes 应用程序中引用
    `Vertex` 实体名称的一个地方。你可以在 `Polygon.m` 文件的 `[NSEntityDescription insertNewObjectForEntityForName:]`
    调用中找到它。它当前如下所示：


    ```

    Vertex *vertex = [NSEntityDescription insertNewObjectForEntityForName:@"Vertex"

    inManagedObjectContext:context];

    ```


    将传递给方法的实体名称从 `Vertex` 更改为 `Point`，使该行如下所示：


    ```

    Vertex *vertex = [NSEntityDescription insertNewObjectForEntityForName:@"Point"

    inManagedObjectContext:context];

    ```


    现在你可以构建并运行 Shapes 应用程序；所有现有的形状，包括多边形，都应该显示出来。你可以打开 SQLite 数据库，确认模式现在有一个 `ZPOINT`
    表


    ```

    CREATE TABLE ZPOINT ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER,
    ZINDEX INTEGER, ZPOLYGON INTEGER, ZX FLOAT, ZY FLOAT );

    ```


    并且没有 `ZVERTEX` 表。


    如你所见，轻量级迁移几乎毫不费力，至少对你来说是这样。Core Data 负责处理如何将数据从旧模型映射和迁移到新模型的艰巨工作。但是，如果你的模型更改超出了轻量级迁移所能处理的范围，则必须指定你自己的映射模型。


    ## 创建映射模型


    当你的数据模型更改超出了 Core Data 推断如何将数据从旧模型映射到新模型的能力时，你就不能使用轻量级迁移来自动迁移数据。相反，你必须创建一个所谓的*映射模型*来告诉
    Core Data 如何执行迁移。本节将引导你完成为迁移创建映射模型所涉及的步骤。映射模型大致类似于数据模型——数据模型包含实体和属性，而类型为 `NSMappingModel`
    的映射模型则包含实体映射（类型为 `NSEntityMapping`）和属性映射（类型为 `NSPropertyMapping`）。实体映射的作用正如你所期望的那样：它们将源实体映射到目标实体。同样，属性映射的作用也如你所想：将源属性映射到目标属性。映射模型使用这些映射，以及它们关联的类型和策略，来执行迁移。


    **注意：** Apple 的文档和代码可互换地使用术语 *destination* 和 *target* 来指代新的数据模型。在本章中，我们也效仿此做法，互换使用
    *destination* 和 *target*。


    在典型的数据迁移中，大多数实体和属性从旧版本到新版本并没有改变。对于这些情况，实体映射只是简单地将每个实体从源模型复制到目标模型。当你创建映射模型时，你会注意到
    Xcode 会生成这些实体映射，以及它可以从你的模型更改中推断出的任何其他内容，并将这些映射存储在映射模型中。这些映射代表了 Core Data 在轻量级迁移中迁移数据的方式。你必须创建新的映射，或调整
    Xcode 生成的映射，以更改数据的迁移方式。

    '
- fmt: '# Understanding Entity Mappings


    Each entity mapping, represented by an `NSEntityMapping` instance, contains three
    things:


    - A source entity

    - A destination entity

    - A mapping type


    When Core Data performs the migration, it uses the entity mapping to move the
    source to the destination, using the mapping type to determine how to do that.
    [Table 8–1](#Chapter08.html#tab_8_1) lists the mapping types, their corresponding
    Core Data constants, and what they mean.


    ![images](images/t0801.jpg)


    The Add, Remove, and Copy types don''t generate much interest because lightweight
    migrations handle these types of entity mappings. The Transform and Custom types,
    however, are what make this section of the book necessary. They tell Core Data
    that each source entity instance must be transformed, according to any specified
    rules, into an instance of the destination entity. You''ll see an example of both
    a `Transform` and a `Custom` entity mapping type in this chapter. If you specify
    a value expression for one of the entity''s properties, the entity mapping is
    of type `Transform`. If you specify a custom migration policy for the entity mapping,
    the entity mapping becomes a `Custom` type. As you work through this chapter,
    pay attention to the types the Core Data mapping modeler makes to your mapping
    model in response to changes you make.


    To specify the rules for a `Custom` entity mapping type, you create a migration
    policy, which is a class you write that derives from `NSEntityMigrationPolicy`.
    You then set the class you create as the custom policy for the entity mapping
    in the Xcode mapping modeler.


    Core Data runs your migration in three stages.


    1. It creates the objects in the destination model, including their attributes,
    based on the objects in the source model.

    2. It creates the relationships among the objects in the destination model.

    3. It validates the data in the destination model and saves it.


    You can customize how Core Data performs these three steps through the Custom
    Policy. The `NSEntityMigrationPolicy` class has seven methods you can override
    to customize how Core Data will migrate data from the source entity to the target
    entity, though you''ll rarely override all of them. These methods, listed in Apple''s
    documentation for the `NSEntityMigrationPolicy` class, provide various places
    during the migration that you can override and change Core Data''s migration behavior.
    You can override as few or as many of these methods as you''d like, though a custom
    migration policy that overrides none of the methods is pointless. Typically, you''ll
    override `createDestinationInstancesForSourceInstance:` if you want to change
    how destination instances are created or how their attributes are populated with
    data. You''ll override `createRelationshipsForDestinationInstance:` if you want
    to customize how relationships between the destination entity and other entities
    are created. Finally, you''ll override `performCustomValidationForEntityMapping:`
    if you want to perform any custom validations during your migration.


    The `createDestinationInstancesForSourceInstance:` method carries with it a caveat:
    if you don''t call the superclass''s implementation, which you probably won''t
    because you''re overriding this method to change the default behavior, you must
    call the migration manager''s `associateSourceInstance:withDestinationInstance:`
    ![images](images/U002.jpg) `forEntityMapping:` method to associate the source
    instance with the destination instance. Forgetting to do this will cause problems
    with your migration. You''ll learn the proper way to call this method later in
    this chapter, with the Shapes application.


    # Understanding Property Mappings


    A property mapping, like an entity mapping, tells Core Data how to migrate source
    to destination. A property mapping is an instance of `NSPropertyMapping` and contains
    the following three things:


    - The name of the property in the source entity.

    - The name of the property in the destination entity.

    - A value expression that tells Core Data how to get from source to destination.


    To change the way a property mapping migrates data, you provide the value expression
    for the property mapping to use. Value expressions follow the same syntax as predicates
    and use the following six predefined keys to assist with retrieving values:


    - `$manager`, which represents the migration manager.

    - `$source`, which represents the source entity.

    - `$destination`, which represents the destination entity.

    - `$entityMapping`, which represents the entity mapping.

    - `$propertyMapping`, which represents this property mapping.

    - `$entityPolicy`, which represents the entity migration policy.


    As you can see, these keys have names that make deducing their purposes easy.
    When you create a mapping model, you can explore the property mappings Xcode infers
    from your source and target data models to better understand what these keys mean
    and how they''re used.


    The simplest value expressions copy an attribute from the source entity to the
    destination entity. If you have a `Person` entity, for example, that has a `name`
    attribute and the `Person` entity hasn''t changed between your old and your new
    model versions, the value expression for the `name` attribute in your `PersonToPerson`
    entity mapping would be as follows:


    `$source.name`


    You can also perform manipulations of source data using value expressions. Suppose,
    for example, that the same `Person` entity had an attribute called `salary` that
    stores each person''s salary. In the new model, you want to give everyone four
    percent raises. Your value expression would look like this:


    `$source.salary*1.04`


    Since properties represent both attributes and relationships, property mappings
    represent mappings for both attributes and relationships. The typical value expression
    for a relationship calls a function, passing the migration manager, the destination
    instances, the entity mapping, and the name of the source relationship. For example,
    if your old data model had a relationship called `staff` in the `Person` entity
    that represented everyone who reported to this person and your new model has renamed
    this relationship to `reports`, the value expression for the `reports` property
    would look like this:


    `FUNCTION($manager, "destinationInstancesForEntityMappingNamed:sourceInstances:",
    "PersonToPerson", $source.staff)`


    Note that you use the `$manager` key to pass the migration manager, that you get
    the destination instances from the entity mapping for the source instances, that
    you pass the appropriate entity mapping (`PersonToPerson`), and that you pass
    the old relationship that you get from the `$source` key.'
