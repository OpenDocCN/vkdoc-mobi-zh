    ## About the Authors


    ![image](images/michael_privat.jpg) **Michael Privat** is the President and CEO
    of Majorspot, Inc., developer of the following iPhone and iPad apps:


    - Ghostwriter Notes

    - My Spending

    - iBudget

    - Chess Puzzle Challenge


    He is also an expert developer and technical lead for Availity, LLC, based in
    Jacksonville, Florida. He earned his Master''s degree in Computer Science from
    the University of Nice in Nice, France. He moved to the United States to develop
    software in artificial intelligence at the Massachusetts Institute of Technology.
    Coauthor of *Beginning OS X Lion Apps Development* (Apress, 2011), he now lives
    in Jacksonville, Florida, with his wife, Kelly, and their two children.


    ![image](images/rob_warner.jpg) **Rob Warner** is a senior technical staff member
    for Availity, LLC, based in Jacksonville, Florida, where he works with various
    teams and technologies to deliver solutions in the health care sector. He coauthored
    *Beginning OS X Lion Apps Development* (Apress, 2011) and *The Definitive Guide
    to SWT and JFace* (Apress, 2004), and he blogs at [www.grailbox.com](http://www.grailbox.com).
    He earned his Bachelor''s degree in English from Brigham Young University in Provo,
    Utah. He lives in Jacksonville, Florida, with his wife, Sherry, and their five
    children.


    ## About the Technical Reviewer


    ![image](images/robert_hamilton.jpg) **Robert Hamilton** is a seasoned information
    technology director for Blue Cross Blue Shield of Florida. He is experienced in
    developing applications for the iPhone and iPad; his most recent project was Ghostwriter
    Notes.


    Before entering his leadership role at BCBSF, Robert excelled as an application
    developer, having envisioned and created the first claims status application used
    by their providers through Availity.


    A native of Atlantic Beach, Florida, Robert received his B.S. in Information Systems
    from the University of North Florida. He supports The First Tee of Jacksonville
    and the Cystic Fibrosis Foundation. He is the proud father of two daughters.'
