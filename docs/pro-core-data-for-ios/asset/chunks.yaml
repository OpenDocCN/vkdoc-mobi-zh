  trans: '

    ### 错误/故障机制


    当你针对数据库运行 SQL 查询时，你清楚正在拉取的数据的深度和范围。你知道是否在联表查询，知道要取回的列，而且，如果足够谨慎，你还能限制从数据库拉取到工作内存中的行数。获取数据可能需要比使用
    Core Data 付出更多努力，但你拥有更强的控制力。你清楚用于保存所取数据的大致内存用量。


    然而，使用 Core Data 时，你为了易用性放弃了一定程度的控制力。例如，在第 5 章的 Shapes 应用中，每个 `Polygon` 实例都包含一个顶点集合，你通过面向对象而非面向数据的方式来访问它。你无需关心
    Core Data 是在应用启动时、多边形加载时、还是在你首次访问顶点时从数据库拉取顶点数据。但 Core Data 会关心这一点，并试图将数据从持久化存储加载到对象图的时机推迟到必要时刻，从而减少获取时间和内存占用。它通过一种称为
    *故障（fault）* 的机制来实现这一点。


    可以把故障想象成 Unix 文件系统上的符号链接，它既不是所指向的实际文件，也不包含文件的数据。但符号链接代表了该文件，并且在需要时可以访问该文件及其数据，就好像它本身就是文件一样。与符号链接类似，故障是一个占位符，可以访问持久化存储中的数据。一个故障既可以代表一个托管对象，也可以（当它代表一个对多关系时）代表一组托管对象。作为数据的链接或影子，故障占用的内存远少于实际数据。托管对象和故障的图示请参见图
    7–7。在此例中，托管对象是一个 `Shape` 实例，而故障指向相关的 `Vertex` 对象集合。`Shape` 用粗体表示，表明它已从持久化存储中取出并驻留在内存中。而顶点则用浅灰色显示，因为它们尚未从持久化存储中取出，也不在内存中。


    ![images](img/0707.jpg)


    **图 7–7.** *一个形状及其故障状态的顶点*


    #### 触发故障


    当 Core Data 必须从故障所指向的持久化存储中拉取数据并将其放入内存时，它使用术语 *触发故障（firing faults）*。Core Data
    已经“触发”了一个从数据存储获取数据的请求，而故障也从其代表实际数据的任务中被“触发”了。每当你请求一个托管对象的持久化数据时——无论通过 `valueForKey:`
    还是通过自定义类中返回或访问对象持久化数据的方法——都会导致故障触发。访问托管对象的元数据（而非持久化存储中存储的任何数据）的方法则不会触发故障。这意味着你可以查询托管对象的类、哈希值、描述、实体和对象
    ID 等信息，而不会触发故障。关于哪些方法不会触发故障的完整列表，请参阅 Apple 文档中“故障行为”部分，网址为 [`http://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/CoreData/Articles/cdPerformance.html`](http://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/CoreData/Articles/cdPerformance.html)。


    显式请求托管对象的持久化数据会触发故障，但调用任何从托管对象访问持久化数据的方法或结构也同样会触发故障。例如，你可以通过托管对象的关系访问集合而不会触发故障。然而，对集合进行排序会触发故障，因为任何逻辑排序都会依据对象的某些持久化数据进行。稍后在本节中构建的测试将演示这一行为。


    #### 故障与缓存


    我们之前说触发故障会从持久化存储中获取数据，这其实有点不准确。这种情况通常是成立的，但 Core Data 在跋涉到持久化存储获取数据之前，会首先在缓存中查找所需数据。如果
    Core Data 在缓存中找到了目标数据，它就会从缓存中拉取数据，跳过前往持久化存储的更漫长路径。“缓存”和“过期”部分会更详细地讨论缓存。


    #### 恢复故障


    控制应用程序持久化数据和内存使用的一种方法是将托管对象恢复为故障，从而释放其数据所占用的内存。通过调用托管对象上下文的 `refreshObject:mergeChanges:`
    方法，并将你想要设为故障的对象作为参数传入，同时将 `mergeChanges:` 参数设为 `NO`，即可将对象恢复为故障。例如，如果你有一个名为 `foo`
    的托管对象，并希望将其恢复为故障，可以使用类似如下的代码：


    ```

    [context refreshObject:foo mergeChanges:NO];

    ```


    调用之后，`foo` 就变成了一个故障，`[foo isFault]` 会返回 `YES`。如果你查看前面测试的代码，会在遍历所有 `movie` 实例的循环中看到将每个
    `movie` 实例恢复为故障的调用。


    ```

    [context refreshObject:movie mergeChanges:NO];

    ```


    理解 `mergeChanges:` 参数很重要。像前面代码那样传入 `NO`，会丢弃所有尚未保存到持久化存储的更改数据。执行此操作需要小心，因为你会丢失此故障对象中的所有数据更改，并且与故障对象相关的所有对象都会被释放。如果任何关系发生了更改，并且上下文随后被保存，那么你的故障对象将与其关系不同步，从而在持久化存储中造成数据完整性问题。


    **注意：** 由于通过调用 `refreshObject:mergeChanges:NO` 将对象设为故障会释放关系，因此你可以利用这一点来修剪内存中的对象图。例如，在
    PerformanceTuning 应用中，将一个电影设为故障会释放其关联的 200 个演员和 200 个工作室。


    向 `mergeChanges:` 传入 `YES` 则不会将对象设为故障。相反，它会从持久化存储（或最后的缓存状态）重新加载对象的所有持久化数据，然后重新应用在调用
    `refreshObject:` 之前已存在但尚未保存的所有更改。


    当你将一个托管对象恢复为故障时，Core Data 会向该托管对象发送以下两条消息：


    * 对象进入故障状态前的 `willTurnIntoFault:`

    * 对象进入故障状态后的 `didTurnIntoFault:`


    如果你为托管对象实现了自定义类，则可以在你的类中实现这两个方法之一或全部，以便对对象执行某些操作。例如，假设你的自定义托管对象对某些持久化值执行了耗时的计算并缓存了结果，并且你希望在所依赖的值不存在时将缓存结果置空。你可以在
    `didTurnIntoFault:` 方法中将计算结果置空。

    '
- fmt: "### Building the Faulting Test\n\nTo test what you've learned about faulting\
    \ in this section, build a test that will do the following:\n\n1. Retrieve the\
    \ first movie from the persistent store.\n2. Grab an actor from that movie.\n\
    3. Check whether the actor is a fault.\n4. Get the name of the actor.\n5. Check\
    \ whether the actor is a fault.\n6. Turn the actor back into a fault.\n7. Check\
    \ whether the actor is a fault.\n\nTo start, generate an `Actor` class from your\
    \ data model that will represent the `Actor` entity. You can, if you want, create\
    \ it manually. The following code is for the header file, `Actor.h`:\n\n```\n\
    #import <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n\n@interface\
    \ Actor : NSManagedObject\n\n@property (nonatomic, retain) NSString * name;\n\
    @property (nonatomic, retain) NSNumber * rating;\n@property (nonatomic, retain)\
    \ NSSet* movies;\n\n@end\n\n@interface Actor (CoreDataGeneratedAccessors)\n\n\
    - (void)addMoviesObject:(NSManagedObject *)value;\n- (void)removeMoviesObject:(NSManagedObject\
    \ *)value;\n- (void)addMovies:(NSSet *)value;\n- (void)removeMovies:(NSSet *)value;\n\
    \n@end\n```\n\nThe following code shows the implementation file, `Actor.m`. In\
    \ the implementation file, implement the methods `willTurnIntoFault:` and `didTurnIntoFault:`,\
    \ so that you can verify that Core Data indeed does call these methods when you\
    \ turn the object back into a fault. You don't do anything special in these methods\
    \ but simply log that the events happened.\n\n```\n#import \"Actor.h\"\n\n@implementation\
    \ Actor\n@dynamic name;\n@dynamic rating;\n@dynamic movies;\n\n- (void)willTurnIntoFault\
    \ {\n    NSLog(@\"Actor named %@ will turn into fault\", self.name);\n}\n\n- (void)didTurnIntoFault\
    \ {\n    NSLog(@\"Actor named %@ did turn into fault\", self.name);\n}\n\n@end\n\
    ```\n\nNow, create a class called `DidTurnIntoFaultTest` that implements the `PerformanceTest`\
    \ protocol. The following code is for `DidTurnIntoFaultTest.h`:\n\n```\n#import\
    \ <Foundation/Foundation.h>\n#import \"PerformanceTest.h\"\n\n@interface DidTurnIntoFaultTest\
    \ : NSObject <PerformanceTest>\n\n@end\n```\n\nThe following code is for `DidTurnIntoFaultTest.m`:\n\
    \n```\n#import <CoreData/CoreData.h>\n#import \"DidTurnIntoFaultTest.h\"\n#import\
    \ \"Actor.h\"\n\n@implementation DidTurnIntoFaultTest\n\n- (NSString *)name {\n\
    \    return @\"Did Turn Into Fault Test\";\n}\n\n// Pull all the movies and verify\
    \ that each of their actor objects are pointing to the same actors\n- (NSString\
    \ *)runWithContext:(NSManagedObjectContext *)context {\n    NSString *result =\
    \ nil;\n\n    // Fetch the first movie\n    NSFetchRequest *request = [[NSFetchRequest\
    \ alloc] init];\n    [request setEntity:[NSEntityDescription entityForName:@\"\
    Movie\"\n                                 inManagedObjectContext:context]];\n\
    \    NSPredicate *predicate = [NSPredicate predicateWithFormat:@\"name = %@\"\
    , @\"Movie 1\"];\n    [request setPredicate:predicate];\n    NSArray *results\
    \ = [context executeFetchRequest:request error:nil];\n\n    if ([results count]\
    \ == 1) {\n        NSManagedObject *movie = (NSManagedObject *)[results objectAtIndex:0];\n\
    \        NSSet *actors = [movie valueForKey:@\"actors\"];\n        if ([actors\
    \ count] != 200) {\n            result = @\"Failed to find the 200 actors for\
    \ the first movie\";\n        } else {\n            // Get an actor\n        \
    \    Actor *actor = (Actor *)[actors anyObject];\n\n            // Check if it's\
    \ a fault\n            result = [actor isFault] ? @\"Actor is a fault.\\n\" :\
    \ @\"Actor is NOT a fault.\\n\";\n\n            // Get its name and rating\n \
    \           result = [result stringByAppendingFormat:@\"Actor is named %@\\n\"\
    , actor.name];\n            result = [result stringByAppendingFormat:@\"Actor\
    \ has rating %d\\n\", [actor.rating integerValue]];\n\n            // Check if\
    \ it's a fault\n            result = [result stringByAppendingString:[actor isFault]\
    \ ?\n                      @\"Actor is a fault.\\n\" : @\"Actor is NOT a fault.\\\
    n\"];\n\n            // Turn actor back into a fault\n            result = [result\
    \ stringByAppendingString:@\"Turning actor back into a fault.\\n\"];\n       \
    \     [context refreshObject:actor mergeChanges:NO];\n\n            // Check if\
    \ it's a fault\n            result = [result stringByAppendingString:[actor isFault]\
    \ ?\n                      @\"Actor is a fault.\\n\" : @\"Actor is NOT a fault.\\\
    n\"];\n        }\n    } else {\n        result = @\"Failed to fetch the first\
    \ movie\";\n    }\n    return result;\n}\n\n@end\n```\n\nTurn your attention to\
    \ the `runWithContext:` method, which fetches the first movie from the persistent\
    \ store. It then grabs any one of the actors related to that movie and checks\
    \ to see whether this actor is a fault. Note that, although you have done nothing\
    \ to this point in the code to cause a fault to fire for the actor, the actor\
    \ may not be a fault at this point, depending on what you've been doing in the\
    \ application before this point. The code then accesses the actor's name and checks\
    \ again whether the actor is a fault. It won't be. The access to the name fired\
    \ a fault, if it hadn't already been fired elsewhere. The code then turns the\
    \ actor into a fault and verifies that the actor, indeed, is a fault.\n\nTo add\
    \ your new test to the application, open `PerformanceTuningViewController.m`,\
    \ make sure you import `DidTurnIntoFaultTest.h`, find the line in `viewDidLoad:`\
    \ that adds the tests to the `tests` array, and add the new test, like this:\n\
    \n```\nFetchAllMoviesActorsAndStudiosTest *famaasTest = [[FetchAllMoviesActorsAndStudiosTest\
    \ alloc] init];\nDidTurnIntoFaultTest *dtifTest = [[DidTurnIntoFaultTest alloc]\
    \ init];\nself.tests = [[NSArray alloc] initWithObjects:famaasTest, dtifTest,\
    \ nil];\n```\n\nBuild the application and run the test. You should see output\
    \ similar to this:\n\n```\nActor is a fault.\nActor is named Actor 42\nActor has\
    \ rating 8\nActor is NOT a fault.\nTurning actor back into a fault.\nActor is\
    \ a fault.\n```\n\nGo back to `Actor.m` and comment out the `willTurnIntoFault:`\
    \ and `didTurnIntoFault:` methods, as they and their calls to `NSLog()` can skew\
    \ timing results for any other tests that use the `Actor` class."
  raw: '#### Building the Faulting Test


    To test what you''ve learned about faulting in this section, build a test that
    will do the following:


    1.  Retrieve the first movie from the persistent store.

    2.  Grab an actor from that movie.

    3.  Check whether the actor is a fault.

    4.  Get the name of the actor.

    5.  Check whether the actor is a fault.

    6.  Turn the actor back into a fault.

    7.  Check whether the actor is a fault.


    To start, generate an `Actor` class from your data model that will represent the
    `Actor` entity. You can, if you want, create it manually. The following code is
    for the header file, `Actor.h`:


    `#import <Foundation/Foundation.h>`

    `#import <CoreData/CoreData.h>`


    `@interface Actor : NSManagedObject`


    `@property (nonatomic, retain) NSString * name;`

    `@property (nonatomic, retain) NSNumber * rating;`

    `@property (nonatomic, retain) NSSet* movies;`


    `@end`


    `@interface Actor (CoreDataGeneratedAccessors)`


    `- (void)addMoviesObject:(NSManagedObject *)value;`

    `- (void)removeMoviesObject:(NSManagedObject *)value;`

    `- (void)addMovies:(NSSet *)value;`

    `- (void)removeMovies:(NSSet *)value;`


    `@end`


    The following code shows the implementation file, `Actor.m`. In the implementation
    file, implement the methods `willTurnIntoFault:` and `didTurnIntoFault:`, so that
    you can verify that Core Data indeed does call these methods when you turn the
    object back into a fault. You don''t do anything special in these methods but
    simply log that the events happened.


    `#import "Actor.h"`


    `@implementation Actor`

    `@dynamic name;`

    `@dynamic rating;`

    `@dynamic movies;`


    **`- (void)willTurnIntoFault {`**

    **`NSLog(@"Actor named %@ will turn into fault", self.name);`**

    **`}`**


    **`- (void)didTurnIntoFault {`**

    **`NSLog(@"Actor named %@ did turn into fault", self.name);`**

    **`}`**


    `@end`


    Now, create a class called `DidTurnIntoFaultTest` that implements the `PerformanceTest`
    protocol. The following code is for `DidTurnIntoFaultTest.h`:


    `#import <Foundation/Foundation.h>`

    **`#import "PerformanceTest.h"`**


    `@interface DidTurnIntoFaultTest : NSObject <PerformanceTest>`


    `@end`


    The following code is for `DidTurnIntoFaultTest.m`:


    **`#import <CoreData/CoreData.h>`**

    `#import "DidTurnIntoFaultTest.h"`

    **`#import "Actor.h"`**


    `@implementation DidTurnIntoFaultTest`


    **`- (NSString *)name {`**

    **`return @"Did Turn Into Fault Test";`**

    **`}`**


    **`// Pull all the movies and verify that each of their actor objects are pointing
    to the same actors`**

    **`- (NSString *)runWithContext:(NSManagedObjectContext *)context {`**

    **`NSString *result = nil;`**


    **`// Fetch the first movie`**

    **`NSFetchRequest *request = [[NSFetchRequest alloc] init];`**

    **`[request setEntity:[NSEntityDescription entityForName:@"Movie"`![images](images/U002.jpg)**

    **`inManagedObjectContext:context]];`**

    **`NSPredicate *predicate = [NSPredicate predicateWithFormat:@"name = %@", @"Movie
    1"];`**

    **`[request setPredicate:predicate];`**

    **`NSArray *results = [context executeFetchRequest:request error:nil];`**


    **`if ([results count] == 1) {`**

    **`NSManagedObject *movie = (NSManagedObject *)[results objectAtIndex:0];`**

    **`NSSet *actors = [movie valueForKey:@"actors"];`**

    **`if ([actors count] != 200) {`**

    **`result = @"Failed to find the 200 actors for the first movie";`**

    **`} else {`**

    **`// Get an actor`**

    **`Actor *actor = (Actor *)[actors anyObject];`**


    **`// Check if it''s a fault`**

    **`result = [actor isFault] ? @"Actor is a fault.\n" : @"Actor is NOT a fault.\n";`**


    **`// Get its name and rating`**

    **`result = [result stringByAppendingFormat:@"Actor is named %@\n", actor.name];`**

    **`result = [result stringByAppendingFormat:@"Actor has rating %d\n", [actor.rating`![images](images/U002.jpg)**

    **`integerValue]];`**


    **`// Check if it''s a fault`**

    **`result = [result stringByAppendingString:[actor isFault] ?`**![images](images/U002.jpg)

    **`@"Actor is a fault.\n" : @"Actor is NOT a fault.\n"];`**


    **`// Turn actor back into a fault`**

    **`result = [result stringByAppendingString:@"Turning actor back into a fault.\n"];`**

    **`[context refreshObject:actor mergeChanges:NO];`**


    **`// Check if it''s a fault`**

    **`result = [result stringByAppendingString:[actor isFault] ?`![images](images/U002.jpg)**

    **`@"Actor is a fault.\n" : @"Actor is NOT a fault.\n"];`**

    **`}`**

    **`} else {`**

    **`result = @"Failed to fetch the first movie";`**

    **`}`**

    **`return result;`**

    **`}`**


    **`@end`**


    Turn your attention to the `runWithContext:` method, which fetches the first movie
    from the persistent store. It then grabs any one of the actors related to that
    movie and checks to see whether this actor is a fault. Note that, although you
    have done nothing to this point in the code to cause a fault to fire for the actor,
    the actor may not be a fault at this point, depending on what you''ve been doing
    in the application before this point. The code then accesses the actor''s name
    and checks again whether the actor is a fault. It won''t be. The access to the
    name fired a fault, if it hadn''t already been fired elsewhere. The code then
    turns the actor into a fault and verifies that the actor, indeed, is a fault.


    To add your new test to the application, open `PerformanceTuningViewController.m`,
    make sure you import `DidTurnIntoFaultTest.h`, find the line in `viewDidLoad:`
    that adds the tests to the `tests` array, and add the new test, like this:


    `FetchAllMoviesActorsAndStudiosTest *famaasTest = [[FetchAllMoviesActorsAndStudiosTest
    alloc] init];`

    **`DidTurnIntoFaultTest *dtifTest = [[DidTurnIntoFaultTest alloc] init];`**

    `self.tests = [[NSArray alloc] initWithObjects:famaasTest, dtifTest, nil];`


    Build the application and run the test. You should see output similar to this:


    `Actor is a fault.`

    `Actor is named Actor 42`

    `Actor has rating 8`

    `Actor is NOT a fault.`

    `Turning actor back into a fault.`

    `Actor is a fault.`


    Go back to `Actor.m` and comment out the `willTurnIntoFault:` and `didTurnIntoFault:`
    methods, as they and their calls to `NSLog()` can skew timing results for any
    other tests that use the `Actor` class.'
  trans: "  \n### 构建故障测试  \n\n为了检验你在本部分学到的关于故障（fault）的知识，请构建一个测试，该测试将执行以下操作：  \n\n\
    1.  从持久化存储中检索第一部电影。  \n2.  从该电影中获取一位演员。  \n3.  检查该演员是否是一个故障。  \n4.  获取该演员的姓名。\
    \  \n5.  检查该演员是否是一个故障。  \n6.  将该演员重新变回一个故障。  \n7.  检查该演员是否是一个故障。  \n\n首先，从你的数据模型生成一个代表\
    \ `Actor` 实体的 `Actor` 类。如果你愿意，也可以手动创建它。以下是头文件 `Actor.h` 的代码：  \n\n```\n#import\
    \ <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n\n@interface Actor\
    \ : NSManagedObject\n\n@property (nonatomic, retain) NSString * name;\n@property\
    \ (nonatomic, retain) NSNumber * rating;\n@property (nonatomic, retain) NSSet*\
    \ movies;\n\n@end\n\n@interface Actor (CoreDataGeneratedAccessors)\n\n- (void)addMoviesObject:(NSManagedObject\
    \ *)value;\n- (void)removeMoviesObject:(NSManagedObject *)value;\n- (void)addMovies:(NSSet\
    \ *)value;\n- (void)removeMovies:(NSSet *)value;\n\n@end\n```\n\n以下代码展示了实现文件 `Actor.m`。在实现文件中，实现\
    \ `willTurnIntoFault:` 和 `didTurnIntoFault:` 方法，以便验证当你将对象重新变回故障时，Core Data 确实调用了这些方法。在这些方法中，你不做任何特殊处理，仅记录事件发生。\
    \  \n\n```\n#import \"Actor.h\"\n\n@implementation Actor\n@dynamic name;\n@dynamic\
    \ rating;\n@dynamic movies;\n\n- (void)willTurnIntoFault {\n    NSLog(@\"Actor\
    \ named %@ will turn into fault\", self.name);\n}\n\n- (void)didTurnIntoFault\
    \ {\n    NSLog(@\"Actor named %@ did turn into fault\", self.name);\n}\n\n@end\n\
    ```\n\n现在，创建一个名为 `DidTurnIntoFaultTest` 的类，该类实现 `PerformanceTest` 协议。以下是 `DidTurnIntoFaultTest.h`\
    \ 的代码：  \n\n```\n#import <Foundation/Foundation.h>\n#import \"PerformanceTest.h\"\
    \n\n@interface DidTurnIntoFaultTest : NSObject <PerformanceTest>\n\n@end\n```\n\
    \n以下是 `DidTurnIntoFaultTest.m` 的代码：  \n\n```\n#import <CoreData/CoreData.h>\n\
    #import \"DidTurnIntoFaultTest.h\"\n#import \"Actor.h\"\n\n@implementation DidTurnIntoFaultTest\n\
    \n- (NSString *)name {\n    return @\"Did Turn Into Fault Test\";\n}\n\n// 拉取所有电影，并验证它们的每个演员对象是否指向相同的演员\n\
    - (NSString *)runWithContext:(NSManagedObjectContext *)context {\n    NSString\
    \ *result = nil;\n\n    // 获取第一部电影\n    NSFetchRequest *request = [[NSFetchRequest\
    \ alloc] init];\n    [request setEntity:[NSEntityDescription entityForName:@\"\
    Movie\"\n                                 inManagedObjectContext:context]];\n\
    \    NSPredicate *predicate = [NSPredicate predicateWithFormat:@\"name = %@\"\
    , @\"Movie 1\"];\n    [request setPredicate:predicate];\n    NSArray *results\
    \ = [context executeFetchRequest:request error:nil];\n\n    if ([results count]\
    \ == 1) {\n        NSManagedObject *movie = (NSManagedObject *)[results objectAtIndex:0];\n\
    \        NSSet *actors = [movie valueForKey:@\"actors\"];\n        if ([actors\
    \ count] != 200) {\n            result = @\"Failed to find the 200 actors for\
    \ the first movie\";\n        } else {\n            // 获取一个演员\n            Actor\
    \ *actor = (Actor *)[actors anyObject];\n\n            // 检查它是否是一个故障\n       \
    \     result = [actor isFault] ? @\"Actor is a fault.\\n\" : @\"Actor is NOT a\
    \ fault.\\n\";\n\n            // 获取其姓名和评分\n            result = [result stringByAppendingFormat:@\"\
    Actor is named %@\\n\", actor.name];\n            result = [result stringByAppendingFormat:@\"\
    Actor has rating %d\\n\", [actor.rating integerValue]];\n\n            // 检查它是否是一个故障\n\
    \            result = [result stringByAppendingString:[actor isFault] ?\n    \
    \                  @\"Actor is a fault.\\n\" : @\"Actor is NOT a fault.\\n\"];\n\
    \n            // 将演员重新变回故障\n            result = [result stringByAppendingString:@\"\
    Turning actor back into a fault.\\n\"];\n            [context refreshObject:actor\
    \ mergeChanges:NO];\n\n            // 检查它是否是一个故障\n            result = [result\
    \ stringByAppendingString:[actor isFault] ?\n                      @\"Actor is\
    \ a fault.\\n\" : @\"Actor is NOT a fault.\\n\"];\n        }\n    } else {\n \
    \       result = @\"Failed to fetch the first movie\";\n    }\n    return result;\n\
    }\n\n@end\n```\n\n将注意力转向 `runWithContext:` 方法，该方法从持久化存储中获取第一部电影。然后，它获取与该电影相关的任意一个演员，并检查该演员是否是一个故障。请注意，尽管到目前为止你在代码中未做任何触发演员故障（fault\
    \ fire）的操作，但根据你在应用程序中此前执行的操作，此时该演员可能并非故障。随后，代码访问演员的姓名，并再次检查演员是否是一个故障。此时它将不是。如果此前尚未在其他地方触发故障，那么对姓名的访问将触发一个故障。然后，代码将演员变回故障，并验证该演员确实是一个故障。\n\
    \n要将你的新测试添加到应用程序中，请打开 `PerformanceTuningViewController.m`，确保你导入了 `DidTurnIntoFaultTest.h`，在\
    \ `viewDidLoad:` 方法中找到将测试添加到 `tests` 数组的那行代码，然后添加新的测试，如下所示：  \n\n```\nFetchAllMoviesActorsAndStudiosTest\
    \ *famaasTest = [[FetchAllMoviesActorsAndStudiosTest alloc] init];\nDidTurnIntoFaultTest\
    \ *dtifTest = [[DidTurnIntoFaultTest alloc] init];\nself.tests = [[NSArray alloc]\
    \ initWithObjects:famaasTest, dtifTest, nil];\n```\n\n构建应用程序并运行测试。你应该会看到类似于以下的输出：\
    \  \n\n```\nActor is a fault.\nActor is named Actor 42\nActor has rating 8\nActor\
    \ is NOT a fault.\nTurning actor back into a fault.\nActor is a fault.\n```\n\n\
    回到 `Actor.m`，注释掉 `willTurnIntoFault:` 和 `didTurnIntoFault:` 方法，因为这两个方法及其对 `NSLog()`\
    \ 的调用可能会影响任何使用 `Actor` 类的其他测试的计时结果。  \n\n"
- fmt: "# Taking Control: Firing Faults on Purpose\n\nThis section on faulting began\
    \ by explaining that you had more control over memory usage when you ran SQL queries\
    \ yourself than you do by allowing Core Data to manage data fetches. Although\
    \ true, you can exert some amount of control over Core Data's fault management\
    \ by firing faults yourself. By firing faults yourself, you can avoid inefficient\
    \ scenarios in which Core Data must fire several small faults to fetch your data,\
    \ incurring several trips to the persistent store.\n\nCore Data provides two means\
    \ for optimizing the firing of faults:\n\n- Batch faulting\n- Prefetching\n\n\
    As a control group, create a test called `SinglyFiringFaultTest`. This test should\
    \ fetch all the movies, loop through them one by one, and do the following:\n\n\
    - Access the `name` attribute so that a fault fires for this movie only.\n- Loop\
    \ through all the related actors and access their `name` attributes, one at a\
    \ time, so each access fires a fault.\n- Reset each actor so the next movie will\
    \ have to fire faults for each actor.\n- Do the same for all the related studios.\n\
    \nThe following code is for `SinglyFiringFaultTest.h`:\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"PerformanceTest.h\"\n\n@interface SinglyFiringFaultTest : NSObject <PerformanceTest>\n\
    \n@end\n```\n\nThe following code is for `SinglyFiringFaultTest.m`:\n\n```\n#import\
    \ <CoreData/CoreData.h>\n#import \"SinglyFiringFaultTest.h\"\n\n@implementation\
    \ SinglyFiringFaultTest\n\n- (NSString *)name {\n    return @\"Singly Firing Fault\
    \ Test\";\n}\n\n- (NSString *)runWithContext:(NSManagedObjectContext *)context\
    \ {\n    NSString *result = @\"Singly Firing Fault Test Complete!\";\n\n    //\
    \ Fetch all the movies\n    NSFetchRequest *request = [[NSFetchRequest alloc]\
    \ init];\n    [request setEntity:[NSEntityDescription entityForName:@\"Movie\"\
    \n                                  inManagedObjectContext:context]];\n    NSArray\
    \ *results = [context executeFetchRequest:request error:nil];\n\n    // Loop through\
    \ all the movies\n    for (NSManagedObject *movie in results) {\n        // Fire\
    \ a fault just for this movie\n        [movie valueForKey:@\"name\"];\n\n    \
    \    // Loop through all the actors for this movie\n        for (NSManagedObject\
    \ *actor in [movie valueForKey:@\"actors\"]) {\n            // Fire a fault just\
    \ for this actor\n            [actor valueForKey:@\"name\"];\n\n            //\
    \ Put this actor back in fault so the next movie\n            // will have to\
    \ fire a fault\n            [context refreshObject:actor mergeChanges:NO];\n \
    \       }\n\n        // Loop through all the studios for this movie\n        for\
    \ (NSManagedObject *studio in [movie valueForKey:@\"studios\"]) {\n          \
    \  // Fire a fault just for this studio\n            [studio valueForKey:@\"name\"\
    ];\n\n            // Put this studio back in fault so the next movie\n       \
    \     // will have to fire a fault\n            [context refreshObject:studio\
    \ mergeChanges:NO];\n        }\n    }\n    return result;\n}\n\n@end\n```\n\n\
    Create these files, and add an instance of `SinglyFiringFaultTest` to your `tests`\
    \ array. Don't forget to import `SinglyFiringFaultTest.h`. Build the application,\
    \ launch the simulator, and run the test. Running this test on our machine took\
    \ about 2.2 seconds. By using prefetching, you should be able to improve on these\
    \ results!\n\n## Prefetching\n\nSimilar to batch faulting, prefetching minimizes\
    \ the number of times that Core Data has to fire faults and go fetch data. With\
    \ prefetching, though, you tell Core Data when you perform a fetch to also fetch\
    \ the related objects you specify. For example, using this chapter's data model,\
    \ when you fetch the movies, you can tell Core Data to prefetch the related actors,\
    \ studios, or both.\n\nTo prefetch related objects, call `NSFetchRequest`'s `setRelationshipKeyPathsForPrefetching:`\
    \ method, passing an array that contains the names of the relationships that you\
    \ want Core Data to prefetch. To prefetch the related actors and studios when\
    \ you fetch the movies, for example, use this code:\n\n```\nNSFetchRequest *request\
    \ = [[NSFetchRequest alloc] init];\n[request setEntity:[NSEntityDescription entityForName:@\"\
    Movie\"\n                              inManagedObjectContext:context]];\n[request\
    \ setRelationshipKeyPathsForPrefetching:[NSArray arrayWithObjects:@\"actors\"\
    ,\n                                                                         @\"\
    studios\", nil]];\nNSArray *results = [context executeFetchRequest:request error:nil];\n\
    ```\n\nThe line in bold instructs Core Data to prefetch all the related actors\
    \ and studios when it fetches the movies.\n\nBefore testing this, recognize that\
    \ your baseline numbers depend on turning each actor and studio back into a fault\
    \ after triggering the fault to load the data for a given movie. You did this\
    \ because each movie relates to the same 200 actors and the same 200 studios,\
    \ so the only time the actors and movies would normally be faults would be for\
    \ the first movie, not the remaining 199. Turning each actor and each studio back\
    \ into a fault for each movie allows you to measure firing faults for each actor\
    \ and studio for each movie.\n\nTurning each actor and each studio back into a\
    \ fault negates the performance gains offered by prefetching them, however, so\
    \ you're not going to refault them. To get good comparison numbers, then, you\
    \ must change the code for `SinglyFiringFaultTest` to not reset the `Actor` and\
    \ `Studio` objects. Open `SinglyFiringFaultTest.m`, go to the `runWithContext:`\
    \ method, and comment these two lines:\n\n```\n[context refreshObject:actor mergeChanges:NO];\n\
    \n[context refreshObject:studio mergeChanges:NO];\n```\n\nLaunch the app, and\
    \ rerun the test. On our machine, it takes about 1.9 seconds.\n\nNow, create a\
    \ new class called `PreFetchFaultingTest`, and implement the `PerformanceTest`\
    \ protocol. This test will look similar to `SinglyFiringFaultTest` with two important\
    \ differences:\n\n- The fetch prefetches the actors and studios.\n- The actors\
    \ and studios aren't turned back into faults.\n\nThe following code is the header\
    \ file:\n\n```\n#import <Foundation/Foundation.h>\n#import \"PerformanceTest.h\"\
    \n\n@interface PreFetchFaultingTest : NSObject <PerformanceTest>\n\n@end\n```\n\
    \nThe following is the implementation file:\n\n```\n#import <CoreData/CoreData.h>\n\
    #import \"PreFetchFaultingTest.h\"\n\n@implementation PreFetchFaultingTest\n\n\
    - (NSString *)name {\n    return @\"Pre-fetch Faulting Test\";\n}\n\n- (NSString\
    \ *)runWithContext:(NSManagedObjectContext *)context {\n    NSString *result =\
    \ @\"Pre-fetch Fault Test Complete!\";\n\n    // Fetch all the movies\n    NSFetchRequest\
    \ *request = [[NSFetchRequest alloc] init];\n    [request setEntity:[NSEntityDescription\
    \ entityForName:@\"Movie\"\n                                  inManagedObjectContext:context]];\n\
    \n    // Pre-fetch the actors and studios\n    [request setRelationshipKeyPathsForPrefetching:[NSArray\
    \ arrayWithObjects:@\"actors\",\n                                            \
    \                                 @\"studios\", nil]];\n    NSArray *results =\
    \ [context executeFetchRequest:request error:nil];\n\n    // Loop through all\
    \ the movies\n    for (NSManagedObject *movie in results) {\n        // Fire a\
    \ fault just for this movie\n        [movie valueForKey:@\"name\"];\n\n      \
    \  // Loop through all the actors for this movie\n        for (NSManagedObject\
    \ *actor in [movie valueForKey:@\"actors\"]) {\n            // Get the name for\
    \ this actor\n            [actor valueForKey:@\"name\"];\n        }\n\n      \
    \  // Loop through all the studios for this movie\n        for (NSManagedObject\
    \ *studio in [movie valueForKey:@\"studios\"]) {\n            // Get the name\
    \ for this studio\n            [studio valueForKey:@\"name\"];\n        }\n  \
    \  }\n    return result;\n}\n\n@end\n```\n\nThis line of code sets up the prefetching\
    \ for actors and studios:\n\n```\n[request setRelationshipKeyPathsForPrefetching:[NSArray\
    \ arrayWithObjects:@\"actors\", @\"studios\", nil]];\n```\n\nAdd this test to\
    \ the `tests` array in the `viewDidLoad:` method of `PerformanceTuningViewController`,\
    \ as you did the other tests. Build and run this test. Our results were about\
    \ 0.6 seconds, which is about 70 percent faster than the 1.9 seconds the same\
    \ test took without prefetching."
  raw: '#### Taking Control: Firing Faults on Purpose


    This section on faulting began by explaining that you had more control over memory
    usage when you ran SQL queries yourself than you do by allowing Core Data to manage
    data fetches. Although true, you can exert some amount of control over Core Data''s
    fault management by firing faults yourself. By firing faults yourself, you can
    avoid inefficient scenarios in which Core Data must fire several small faults
    to fetch your data, incurring several trips to the persistent store.


    Core Data provides two means for optimizing the firing of faults:


    *   Batch faulting

    *   Prefetching


    As a control group, create a test called `SinglyFiringFaultTest`. This test should
    fetch all the movies, loop through them one by one, and do the following:


    *   Access the `name` attribute so that a fault fires for this movie only.

    *   Loop through all the related actors and access their `name` attributes, one
    at a time, so each access fires a fault.

    *   Reset each actor so the next movie will have to fire faults for each actor.

    *   Do the same for all the related studios.


    The following code is for `SinglyFiringFaultTest.h:`


    `#import <Foundation/Foundation.h>`

    **`#import "PerformanceTest.h"`**


    `@interface SinglyFiringFaultTest : NSObject <PerformanceTest>`


    `@end`


    The following code is for `SinglyFiringFaultTest.m:`


    **`#import <CoreData/CoreData.h>`**

    `#import "SinglyFiringFaultTest.h"`


    `@implementation SinglyFiringFaultTest`


    **`- (NSString *)name {`**

    **`return @"Singly Firing Fault Test";`**

    **`}`**


    **`- (NSString *)runWithContext:(NSManagedObjectContext *)context {`**

    **`NSString *result = @"Singly Firing Fault Test Complete!";`**


    **`// Fetch all the movies`**

    **`NSFetchRequest *request = [[NSFetchRequest alloc] init];`**

    **`[request setEntity:[NSEntityDescription entityForName:@"Movie"`![images](images/U002.jpg)**

    **`inManagedObjectContext:context]];`**

    **`NSArray *results = [context executeFetchRequest:request error:nil];`**


    **`// Loop through all the movies`**

    **`for (NSManagedObject *movie in results) {`**

    **`// Fire a fault just for this movie`**

    **`[movie valueForKey:@"name"];`**


    **`// Loop through all the actors for this movie`**

    **`for (NSManagedObject *actor in [movie valueForKey:@"actors"]) {`**

    **`// Fire a fault just for this actor`**

    **`[actor valueForKey:@"name"];`**


    **`// Put this actor back in fault so the next movie`**

    **`// will have to fire a fault`**

    **`[context refreshObject:actor mergeChanges:NO];`**

    **`}`**


    **`// Loop through all the studios for this movie`**

    **`for (NSManagedObject *studio in [movie valueForKey:@"studios"]) {`**

    **`// Fire a fault just for this studio`**

    **`[studio valueForKey:@"name"];`**


    **`// Put this studio back in fault so the next movie`**

    **`// will have to fire a fault`**

    **`[context refreshObject:studio mergeChanges:NO];`**

    **`}`**

    **`}`**

    **`return result;`**

    **`}`**


    `@end`


    Create these files, and add an instance of `SinglyFiringFaultTest` to your `tests`
    array. Don''t forget to import `SinglyFiringFaultTest.h`. Build the application,
    launch the simulator, and run the test. Running this test on our machine took
    about 2.2 seconds. By using prefetching, you should be able to improve on these
    results!


    #### Prefetching


    Similar to batch faulting, prefetching minimizes the number of times that Core
    Data has to fire faults and go fetch data. With prefetching, though, you tell
    Core Data when you perform a fetch to also fetch the related objects you specify.
    For example, using this chapter''s data model, when you fetch the movies, you
    can tell Core Data to prefetch the related actors, studios, or both.


    To prefetch related objects, call `NSFetchRequest`''s `setRelationshipKeyPathsForPrefetching:`
    method, passing an array that contains the names of the relationships that you
    want Core Data to prefetch. To prefetch the related actors and studios when you
    fetch the movies, for example, use this code:


    `NSFetchRequest *request = [[NSFetchRequest alloc] init];`

    `[request setEntity:[NSEntityDescription entityForName:@"Movie"`![images](images/U002.jpg)

    `inManagedObjectContext:context]];`

    **`[request setRelationshipKeyPathsForPrefetching:[NSArray arrayWithObjects:@"actors",`![images](images/U002.jpg)**

    **`@"studios", nil]];`**

    `NSArray *results = [context executeFetchRequest:request error:nil];`


    The line in bold instructs Core Data to prefetch all the related actors and studios
    when it fetches the movies.


    Before testing this, recognize that your baseline numbers depend on turning each
    actor and studio back into a fault after triggering the fault to load the data
    for a given movie. You did this because each movie relates to the same 200 actors
    and the same 200 studios, so the only time the actors and movies would normally
    be faults would be for the first movie, not the remaining 199\. Turning each actor
    and each studio back into a fault for each movie allows you to measure firing
    faults for each actor and studio for each movie.


    Turning each actor and each studio back into a fault negates the performance gains
    offered by prefetching them, however, so you''re not going to refault them. To
    get good comparison numbers, then, you must change the code for `SinglyFiringFaultTest`
    to not reset the `Actor` and `Studio` objects. Open `SinglyFiringFaultTest.m`,
    go to the `runWithContext:` method, and comment these two lines:


    `[context refreshObject:actor mergeChanges:NO];`


    `[context refreshObject:studio mergeChanges:NO];`


    Launch the app, and rerun the test. On our machine, it takes about 1.9 seconds.


    Now, create a new class called `PreFetchFaultingTest`, and implement the `PerformanceTest`
    protocol. This test will look similar to `SinglyFiringFaultTest` with two important
    differences:


    *   The fetch prefetches the actors and studios.

    *   The actors and studios aren''t turned back into faults.


    The following code is the header file:


    `#import <Foundation/Foundation.h>`

    **`#import "PerformanceTest.h"`**


    `@interface PreFetchFaultingTest : NSObject` **`<PerformanceTest>`**


    `@end`


    The following is the implementation file:


    **`#import <CoreData/CoreData.h>`**

    `#import "PreFetchFaultingTest.h"`


    `@implementation PreFetchFaultingTest`


    **`- (NSString *)name {`**

    **`return @"Pre-fetch Faulting Test";`**

    **`}`**


    **`- (NSString *)runWithContext:(NSManagedObjectContext *)context {`**

    **`NSString *result = @"Pre-fetch Fault Test Complete!";`**


    **`// Fetch all the movies`**

    **`NSFetchRequest *request = [[NSFetchRequest alloc] init];`**

    **`[request setEntity:[NSEntityDescription entityForName:@"Movie"`![images](images/U002.jpg)**

    **`inManagedObjectContext:context]];`**


    **`// Pre-fetch the actors and studios`**

    **`[request setRelationshipKeyPathsForPrefetching:[NSArray arrayWithObjects:@"actors",`![images](images/U002.jpg)**

    **`@"studios", nil]];`**

    **`NSArray *results = [context executeFetchRequest:request error:nil];`**


    **`// Loop through all the movies`**

    **`for (NSManagedObject *movie in results) {`**

    **`// Fire a fault just for this movie`**

    **`[movie valueForKey:@"name"];`**


    **`// Loop through all the actors for this movie`**

    **`for (NSManagedObject *actor in [movie valueForKey:@"actors"]) {`**

    **`// Get the name for this actor`**

    **`[actor valueForKey:@"name"];`**

    **`}`**


    **`// Loop through all the studios for this movie`**

    **`for (NSManagedObject *studio in [movie valueForKey:@"studios"]) {`**

    **`// Get the name for this studio`**

    **`[studio valueForKey:@"name"];`**

    **`}`**

    **`}`**

    **`return result;`**

    `}`


    `@end`


    This line of code sets up the prefetching for actors and studios:


    `[request setRelationshipKeyPathsForPrefetching:[NSArray arrayWithObjects:@"actors",
    @"studios", nil]];`


    Add this test to the `tests` array in the `viewDidLoad:` method of `PerformanceTuningViewController`,
    as you did the other tests. Build and run this test. Our results were about 0.6
    seconds, which is about 70 percent faster than the 1.9 seconds the same test took
    without prefetching.'
  trans: "\n# 掌控主动权：主动触发故障\n\n关于故障的章节开头已说明，与让 Core Data 管理数据获取相比，自己运行 SQL 查询时能更好地控制内存使用。虽然事实如此，但你可以通过主动触发故障，对\
    \ Core Data 的故障管理施加一定程度的控制。通过主动触发故障，你可以避免低效场景——即 Core Data 必须触发多个小故障来获取数据，从而导致多次持久化存储访问。\n\
    \nCore Data 提供了两种优化故障触发的方式：\n\n- 批量故障处理\n- 预取\n\n作为对照组，创建一个名为 `SinglyFiringFaultTest`\
    \ 的测试。该测试应获取所有电影，逐个遍历它们，并执行以下操作：\n\n- 访问 `name` 属性，仅为此电影触发一个故障。\n- 遍历所有相关演员，并逐个访问它们的\
    \ `name` 属性，每次访问都触发一个故障。\n- 重置每个演员，以便下一部电影需要为每位演员重新触发故障。\n- 对所有相关工作室执行相同操作。\n\n\
    以下是 `SinglyFiringFaultTest.h` 的代码：\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"PerformanceTest.h\"\n\n@interface SinglyFiringFaultTest : NSObject <PerformanceTest>\n\
    \n@end\n```\n\n以下是 `SinglyFiringFaultTest.m` 的代码：\n\n```\n#import <CoreData/CoreData.h>\n\
    #import \"SinglyFiringFaultTest.h\"\n\n@implementation SinglyFiringFaultTest\n\
    \n- (NSString *)name {\n    return @\"单次触发故障测试\";\n}\n\n- (NSString *)runWithContext:(NSManagedObjectContext\
    \ *)context {\n    NSString *result = @\"单次触发故障测试完成！\";\n\n    // 获取所有电影\n   \
    \ NSFetchRequest *request = [[NSFetchRequest alloc] init];\n    [request setEntity:[NSEntityDescription\
    \ entityForName:@\"Movie\"\n                                  inManagedObjectContext:context]];\n\
    \    NSArray *results = [context executeFetchRequest:request error:nil];\n\n \
    \   // 遍历所有电影\n    for (NSManagedObject *movie in results) {\n        // 仅为此电影触发故障\n\
    \        [movie valueForKey:@\"name\"];\n\n        // 遍历这部电影的所有演员\n        for\
    \ (NSManagedObject *actor in [movie valueForKey:@\"actors\"]) {\n            //\
    \ 仅为此演员触发故障\n            [actor valueForKey:@\"name\"];\n\n            // 将此演员恢复为故障状态，以便下一部电影\n\
    \            // 需要重新触发故障\n            [context refreshObject:actor mergeChanges:NO];\n\
    \        }\n\n        // 遍历这部电影的所有工作室\n        for (NSManagedObject *studio in\
    \ [movie valueForKey:@\"studios\"]) {\n            // 仅为此工作室触发故障\n           \
    \ [studio valueForKey:@\"name\"];\n\n            // 将此工作室恢复为故障状态，以便下一部电影\n   \
    \         // 需要重新触发故障\n            [context refreshObject:studio mergeChanges:NO];\n\
    \        }\n    }\n    return result;\n}\n\n@end\n```\n\n创建这些文件，并将 `SinglyFiringFaultTest`\
    \ 的一个实例添加到 `tests` 数组中。别忘了导入 `SinglyFiringFaultTest.h`。构建应用，启动模拟器，然后运行测试。在我们的机器上运行此测试大约需要\
    \ 2.2 秒。通过使用预取，你应该能够改善这些结果！\n\n## 预取\n\n与批量故障处理类似，预取最大限度地减少了 Core Data 触发故障和获取数据的次数。然而，使用预取时，你可以告诉\
    \ Core Data 在执行获取操作时，同时获取你指定的相关对象。例如，使用本章的数据模型，当你获取电影时，可以告诉 Core Data 预取相关的演员、工作室，或两者都预取。\n\
    \n要预取相关对象，请调用 `NSFetchRequest` 的 `setRelationshipKeyPathsForPrefetching:` 方法，传入一个数组，其中包含你希望\
    \ Core Data 预取的关系名称。例如，要在获取电影时预取相关的演员和工作室，请使用以下代码：\n\n```\nNSFetchRequest *request\
    \ = [[NSFetchRequest alloc] init];\n[request setEntity:[NSEntityDescription entityForName:@\"\
    Movie\"\n                              inManagedObjectContext:context]];\n[request\
    \ setRelationshipKeyPathsForPrefetching:[NSArray arrayWithObjects:@\"actors\"\
    ,\n                                                                         @\"\
    studios\", nil]];\nNSArray *results = [context executeFetchRequest:request error:nil];\n\
    ```\n\n加粗的那一行指示 Core Data 在获取电影时预取所有相关的演员和工作室。\n\n在测试之前，请注意你的基准数字依赖于在触发故障加载某部电影的数据后，将每个演员和工作室恢复为故障状态。这样做是因为每部电影都关联相同的\
    \ 200 名演员和相同的 200 个工作室，因此演员和电影通常只在第一部电影时才处于故障状态，而非剩下的 199 部。将每个演员和每个工作室为每部电影恢复为故障状态，使你可以测量每部电影中每个演员和工作室的故障触发情况。\n\
    \n然而，将每个演员和每个工作室恢复为故障状态会抵消预取带来的性能提升，因此你不需要将它们重新设为故障。为了获得良好的比较数据，你必须修改 `SinglyFiringFaultTest`\
    \ 的代码，不再重置 `Actor` 和 `Studio` 对象。打开 `SinglyFiringFaultTest.m`，找到 `runWithContext:`\
    \ 方法，并注释掉以下两行：\n\n```\n[context refreshObject:actor mergeChanges:NO];\n\n[context\
    \ refreshObject:studio mergeChanges:NO];\n```\n\n启动应用，重新运行测试。在我们的机器上，大约需要 1.9\
    \ 秒。\n\n现在，创建一个名为 `PreFetchFaultingTest` 的新类，并实现 `PerformanceTest` 协议。该测试看起来与\
    \ `SinglyFiringFaultTest` 类似，但有两个重要区别：\n\n- 获取操作会预取演员和工作室。\n- 演员和工作室不会被恢复为故障状态。\n\
    \n以下是头文件：\n\n```\n#import <Foundation/Foundation.h>\n#import \"PerformanceTest.h\"\
    \n\n@interface PreFetchFaultingTest : NSObject <PerformanceTest>\n\n@end\n```\n\
    \n以下是实现文件：\n\n```\n#import <CoreData/CoreData.h>\n#import \"PreFetchFaultingTest.h\"\
    \n\n@implementation PreFetchFaultingTest\n\n- (NSString *)name {\n    return @\"\
    预取故障测试\";\n}\n\n- (NSString *)runWithContext:(NSManagedObjectContext *)context\
    \ {\n    NSString *result = @\"预取故障测试完成！\";\n\n    // 获取所有电影\n    NSFetchRequest\
    \ *request = [[NSFetchRequest alloc] init];\n    [request setEntity:[NSEntityDescription\
    \ entityForName:@\"Movie\"\n                                  inManagedObjectContext:context]];\n\
    \n    // 预取演员和工作室\n    [request setRelationshipKeyPathsForPrefetching:[NSArray\
    \ arrayWithObjects:@\"actors\",\n                                            \
    \                                 @\"studios\", nil]];\n    NSArray *results =\
    \ [context executeFetchRequest:request error:nil];\n\n    // 遍历所有电影\n    for (NSManagedObject\
    \ *movie in results) {\n        // 仅为此电影触发故障\n        [movie valueForKey:@\"name\"\
    ];\n\n        // 遍历这部电影的所有演员\n        for (NSManagedObject *actor in [movie valueForKey:@\"\
    actors\"]) {\n            // 获取此演员的名称\n            [actor valueForKey:@\"name\"\
    ];\n        }\n\n        // 遍历这部电影的所有工作室\n        for (NSManagedObject *studio\
    \ in [movie valueForKey:@\"studios\"]) {\n            // 获取此工作室的名称\n         \
    \   [studio valueForKey:@\"name\"];\n        }\n    }\n    return result;\n}\n\
    \n@end\n```\n\n以下这行代码设置了演员和工作室的预取：\n\n```\n[request setRelationshipKeyPathsForPrefetching:[NSArray\
    \ arrayWithObjects:@\"actors\", @\"studios\", nil]];\n```\n\n像添加其他测试一样，将此测试添加到\
    \ `PerformanceTuningViewController` 的 `viewDidLoad:` 方法中的 `tests` 数组中。构建并运行此测试。我们的结果大约是\
    \ 0.6 秒，比没有预取的相同测试的 1.9 秒快了约 70%。\n"
- fmt: "### Caching\n\nRegardless of target language or platform, most data persistence\
    \ frameworks and libraries have an internal caching mechanism. Properly implemented\
    \ caches provide opportunities for significant performance gains, especially for\
    \ applications that need to retrieve the same data repeatedly. `Core Data` is\
    \ no exception. The `NSManagedObjectContext` class serves as a built-in cache\
    \ for the `Core Data` framework. When you retrieve an object from the backing\
    \ persistent store, the context keeps a reference to it to track its changes.\
    \ If you retrieve the object again, the context can give the caller the same object\
    \ reference as it did in the first invocation.\n\nThe obvious trade-off that results\
    \ from the use of caching is that, while improving performance, caching uses more\
    \ memory. If no cache management scheme were in place to limit the memory usage\
    \ of the cache, the cache could fill up with objects until the whole system collapses\
    \ from lack of memory. To manage memory, the `Core Data` context has weak references\
    \ to the managed objects it pulls out of the persistent store. This means that\
    \ if the retain count of a managed object reaches zero because no other object\
    \ has a reference to it, the managed object will be discarded. The exception to\
    \ this rule is if the object has been modified in any way. In this case, the context\
    \ keeps a strong reference (that is, sends a `retain` signal to the managed object)\
    \ and keeps it until the context is either committed or rolled back, at which\
    \ point it becomes a weak reference again.\n\n**NOTE:** The default retain behavior\
    \ can be changed by passing `YES` to `setRetainsRegisteredObjects:` of `NSManagedObjectContext`.\
    \ By passing `YES`, the context will retain all registered objects. The default\
    \ behavior retains registered objects only when they are inserted, updated, deleted,\
    \ or locked.\n\nIn this section, you will examine the difference between fetching\
    \ objects from the persistent store or from the cache. You will build a test that\
    \ does the following:\n\n1. Resets the managed object context to flush the cache.\n\
    2. Retrieves all movies.\n3. Retrieves all actors for each movie.\n4. Displays\
    \ the time it took to perform both retrievals.\n5. Retrieves all movies (this\
    \ time the objects will be cached).\n6. Retrieves all actors for each movie.\n\
    7. Displays the time it took to perform both retrievals.\n\nTo start, create a\
    \ class called `CacheTest`, and add it to the Tests group in Xcode. Make sure\
    \ that `CacheTest` implements the `PerformanceTest` protocol. The following code\
    \ is for `CacheTest.h`:\n\n```\n#import <Foundation/Foundation.h>\n#import \"\
    PerformanceTest.h\"\n\n@interface CacheTest : NSObject <PerformanceTest>\n\n@end\n\
    ```\n\nThe following code is for `CacheTest.m`:\n\n```\n#import \"CacheTest.h\"\
    \n#import \"Actor.h\"\n\n@implementation CacheTest\n\n- (NSString *)name {\n \
    \   return @\"Cache Test\";\n}\n\n- (void)loadDataFromContext:(NSManagedObjectContext\
    \ *)context {\n    // Fetch all the movies and all actors\n    NSFetchRequest\
    \ *request = [[NSFetchRequest alloc] init];\n    [request setEntity:[NSEntityDescription\
    \ entityForName:@\"Movie\"\n                                   inManagedObjectContext:context]];\n\
    \    NSArray *results = [context executeFetchRequest:request error:nil];\n\n \
    \   // Fetch all the actors\n    for (NSManagedObject *movie in results) {\n \
    \       NSSet *actors = [movie valueForKey:@\"actors\"];\n        for (Actor *actor\
    \ in actors) {\n            [actor valueForKey:@\"name\"];\n        }\n    }\n\
    }\n\n// Pull all the movies and verify that each of their actor objects are pointing\
    \ to the same actors\n- (NSString *)runWithContext:(NSManagedObjectContext *)context\
    \ {\n    NSMutableString *result = [NSMutableString string];\n\n    [context reset];\
    \  // Clear all potentially cached objects\n\n    NSDate *startTest1 = [NSDate\
    \ date];\n    [self loadDataFromContext:context];\n    NSDate *endTest1 = [NSDate\
    \ date];\n    NSTimeInterval test1 = [endTest1 timeIntervalSinceDate:startTest1];\n\
    \    [result appendFormat:@\"Without cache: %.2f s\\n\", test1];\n\n    NSDate\
    \ *startTest2 = [NSDate date];\n    [self loadDataFromContext:context];\n    NSDate\
    \ *endTest2 = [NSDate date];\n\n    NSTimeInterval test2 = [endTest2 timeIntervalSinceDate:startTest2];\n\
    \    [result appendFormat:@\"With cache: %.2f s\\n\", test2];\n\n    return result;\n\
    }\n\n@end\n```\n\nLet's examine the `runWithContext:` method. It does the same\
    \ thing twice: fetch all the movies and all the actors. The first time, the cache\
    \ is explicitly cleared using `[context reset]`. The second time, all the objects\
    \ will be in the cache, and therefore the data will come back much faster. The\
    \ `loadDataFromContext:` method is invoked to retrieve all the movies and then\
    \ pulls every actor for each movie. You explicitly get the `name` property of\
    \ the actors in order to force `Core Data` to load the property, firing a fault\
    \ if necessary.\n\nAdd an instance of `CacheTest` to the `tests` array, build\
    \ the application, and run the Cache Test test. The output of the application\
    \ will look similar to [Figure 7–8](#Chapter07.html#fig_7_8), with the cached\
    \ version running significantly faster than the version without a cache.\n\n![images](images/0708.jpg)\n\
    \n**Figure 7–8.** *Measuring the difference between loading cached and noncached\
    \ objects*\n\nIf you reset the cache between the first and second tests using\
    \ `[context reset]`, then the time to execute the second test would be about the\
    \ same as the first test. This is because the objects would all have to be retrieved\
    \ from the persistent store again.\n\n### Expiring\n\nAny time an application\
    \ uses a cache, the question of cache expiration arises: when should objects in\
    \ the cache expire and be reloaded from the persistent store? The difficulty in\
    \ determining the expiration interval comes from juggling the performance gain\
    \ obtained by caching objects for long intervals versus the extra memory consumption\
    \ that entails and the potential staleness of the cached data. This section examines\
    \ the trade-offs of the two possibilities for expiring the cache and freeing some\
    \ memory.\n\n#### Memory Consumption\n\nAs more and more objects are put into\
    \ the cache, the memory usage increases. Even if a managed object is entirely\
    \ faulted, a quick call to `NSLog(@\"%d\", class_getInstanceSize(NSManagedObject.class))`\
    \ will show that the allocated size of an unpopulated managed object is 48 bytes.\
    \ This is because it holds references (that is, 4-byte pointers) to other objects\
