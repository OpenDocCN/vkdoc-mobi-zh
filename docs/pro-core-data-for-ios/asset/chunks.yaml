  raw: '### Using the Transformable Type


    Despite all the efforts to hide Core Data, it is likely that some properties of
    the custom objects just feel like they are using the “wrong” type simply to satisfy
    Core Data. For this type of situation, the framework allows you to use the `Transformable`
    type (`NSTransformableAttributeType`). In your Shapes application, the `color`
    property of the `Shape` object gives this sensation of type misuse. In the current
    implementation, the color is represented by a comma-delimited string so that you
    could use the `NSStringAttributeType` in the data model. It works well, but it
    makes using the object more complicated because you find yourself having to decode
    the value back and forth between a string and a color. The first step is to change
    the data model. Select the `Shape` entity, pick the `color` attribute, and change
    its type to `Transformable`. In the `Transformer` field, put the name of the custom
    transformer you’ll be writing: `UIColorTransformer`.


    **NOTE:** Value transformers are part of the Foundation framework in Cocoa. As
    the name indicates, they facilitate the transformation of data from one format
    to another. In Core Data, it is typical to use `NSKeyedUnarchiveFromDataTransformerName`,
    which converts objects into `NSData`. Alternatively, you may extend `NSValueTransformer`
    in order to provide a custom transformer, as you do in this chapter.


    In the code, you now edit `Shape.h` to change the property type from `NSString`
    to `UIColor`.


    `@property (nonatomic, retain) UIColor *color;`


    Naturally, using the `Transformable` type isn’t all good news. Because the transformer
    creates an `NSData` representation of the `color` property, the data store will
    use a binary field. In the case of SQLite, for example, a BLOB column will be
    created to store your data. This means that you can no longer use the data in
    the query. For instance, you would no longer be able to query for all red shapes.
    Note that with the string encoding you used before, it wasn’t trivial either,
    but it was at least possible.


    Since you changed the attribute type, you need to go back to the application code
    to make it use the new type. First, alter `ShapesViewController.m` to change the
    implementation of the `makeRandomColor:` method, like so:


    `- (`**`UIColor`** `*)makeRandomColor {`

    `  // Set the shape’s color`

    **`float red = (arc4random() % 256) / 255.0;`**

    **`float green = (arc4random() % 256) / 255.0;`**

    **`float blue = (arc4random() % 256) / 255.0;`**


    **`  return [UIColor colorWithRed:red green:green blue:blue alpha:1.0];`**

    `}`


    Don’t forget to change the return type in the method definition in the category
    at the top of the file, like so:


    `@interface ShapesViewController (private)`

    `- (void)createShapeAt:(CGPoint)point;`

    `- (void)updateAllShapes;`

    `- (void)deleteAllShapes;`

    `- (`**`UIColor`** `*)makeRandomColor;`

    `@end`


    The next place to modify is the implementation of the `drawRect:` method in `BasicCanvasUIView.m`.
    Be sure to import `Shape.h`, `Circle.h`, `Polygon.h`, and `Vertex.h` in `BasicCanvasUIView.m`
    and then update the `drawRect:` method as shown in [Listing 5–5](#Chapter05.html#list_5_5).


    ***Listing 5–5.** Modifying the `drawRect:` Method in `BasicCanvasUIView.m`.*


    `- (void)drawRect:(CGRect)rect {`

    `  // Check to make sure we have data`

    `  if (canvas == nil) {`

    `    return;`

    `  }`


    `  // Get the current graphics context for drawing`

    `  CGContextRef context = UIGraphicsGetCurrentContext();`


    `  // Store the scale in a local variable so we don’t hit the data store twice`

    `  float scale = self.scale;`


    `  // Scale the context according to the stored value`

    `  CGContextScaleCTM(context, scale, scale);    `


    `  // Retrieve all the shapes that relate to this canvas and iterate through them`

    `  NSSet* shapes = [canvas valueForKey:@"shapes"];`

    `  for (`**`Shape`** `*shape in shapes) {`

    `    // Get the entity name to determine whether this is a Circle or a Polygon`

    `    NSString *entityName = [[shape entity] name];`


    `    // Get the color`

    **`const CGFloat *rgb = CGColorGetComponents(shape.color.CGColor);`**

    **`CGContextSetRGBFillColor(context, rgb[0], rgb[1], rgb[2], 1.0);`**


    `    // If this shape is a circle . . .`

    `    if ([entityName compare:@"Circle"] == NSOrderedSame) {`

    `      // Get the x, y, and radius from the data store and draw the circle`

    **`Circle *circle = (Circle *)shape;`**

    **`float x = [circle.x floatValue];`**

    **`float y = [circle.y floatValue];`**

    **`float radius = [circle.radius floatValue];`**

    `      CGContextFillEllipseInRect(context, CGRectMake(x-radius, y-radius, 2*radius,`

    `2*radius));`

    `    } else if ([entityName compare:@"Polygon"] == NSOrderedSame) {`

    `      // This is a polygon`

    **`Polygon *polygon = (Polygon *)shape;`**


    `      // Use a sort descriptor to order the vertices using the index value`

    `      NSSortDescriptor *sortDescriptor = [[NSSortDescriptor alloc] initWithKey:`

    `                                          @"index" ascending:YES];`

    `      NSArray *sortDescriptors = [[NSArray alloc] initWithObjects:sortDescriptor,
    nil];`

    **`NSArray* vertices = [polygon.vertices`**

    **`sortedArrayUsingDescriptors:sortDescriptors];`**


    `      // Begin drawing the polygon`

    `      CGContextBeginPath(context);`


    `      // Place the current graphic context point on the last vertex`

    **`Vertex *lastVertex = [vertices lastObject];`**

    **`CGContextMoveToPoint(context, [lastVertex.x floatValue], [lastVertex.y`**

    **`floatValue]);`**


    `      // Iterate through the vertices and link them together`

    **`for (Vertex *vertex in vertices) {`**

    **`CGContextAddLineToPoint(context, [vertex.x floatValue], [vertex.y floatValue]);`**

    **`}`**

    `      // Fill the polygon`

    `      CGContextFillPath(context);`


    `      // Clean up`

    `      [sortDescriptors release];`

    `      [sortDescriptor release];`

    `    }`

    `  }`

    `}`


    We’ve noted that it is possible to use an alternate value transformer. You must
    use an alternate value transformer for objects that can’t be naturally serialized
    to `NSData`, and you can use one for any of your attributes.


    **TIP:** If a class conforms to the `NSCoding` protocol, then `NSKeyedUnarchiveFromDataTransformerName`
    can be used.


    You are now implementing a custom value transformer for your `UIColor` object.
    In Xcode, add a new class called `UIColorTransformer` that extends `NSValueTransformer`,
    as shown:


    **`#import <Foundation/Foundation.h>`**


    **`@interface UIColorTransformer : NSValueTransformer`**


    **`@end`**


    `NSValueTransformer` has several methods that must be implemented in `UIColorTransformer.m`
    in order to provide the functionality that Core Data requires. You first must
    make sure the transformer is reversible, which means it can transform a `UIColor`
    object into an `NSData` as well as transform the `NSData` back into a `UIColor`.
    This is critical in order to be able to store and retrieve the `color` attribute.
    For this, open the `UIColorTransformer.m` file, and override the `allowsReverseTransformation:`
    method, like so:


    **`+ (BOOL)allowsReverseTransformation {`**

    **`return YES;`**

    **`}`**


    You also indicate that the transformed object will be represented as an `NSData.`


    **`+ (Class)transformedValueClass {`**

    **`  return [NSData class];`**

    **`}`**


    Finally, you provide the two transformation methods. One will transform from `UIColor`
    to `NSData`, and the reverse method does the opposite. Note that this is a simplified
    implementation for color transformation that assumes that the `UIColor` object
    was created in the RGB color space, which is the case in the Shapes application.
    Color spaces fall outside the scope of this book, but we encourage you to read
    further about colors and transformers if you want to implement a more complete
    color value transformer.


    **`- (id)transformedValue:(id)value {`**

    **`  UIColor* color = (UIColor *)value;`**

    **`  const CGFloat *components = CGColorGetComponents(color.CGColor);`**'
