    Instead of creating a single store, you created two persistent stores in an almost
    identical manner. The only difference is that you explicitly named the configuration
    for the store to use, instead of passing `nil` for the configuration parameter.
    For `Passwords.sqlite`, you use the `Passwords` configuration, while the `Notes.sqlite`
    persistent store uses the `Notes` configuration.


    This is a good time to take a deserved break and launch the application. Add a
    new note as well as a new password entry to verify that it works. To your dismay,
    you don''t notice any difference. But rejoice because this is exactly what you
    were aiming for: a change in the underlying persistent store structure shouldn''t
    affect the rest of the MyStash application. Be content that the app still works
    even though you''ve completely changed how data is stored. To see the difference,
    you need to pop the hood open and take a look at the SQLite databases. Open a
    Terminal window, and go find your data stores using the following command:


    `find ~/Library/Application\ Support/iPhone\ Simulator/ -name "*.sqlite"`


    You will see your two new databases listed there, `Notes.sqlite` and `Passwords.sqlite`.
    If you open the `Notes.sqlite` database and run the `.schema` command, you will
    see the entire model, but although you can see that the note has been saved correctly,
    the `System` table does not contain any data.


    `sqlite> .schema`

    `CREATE TABLE ZNOTE ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER,
    ZBODY VARCHAR, ZTITLE VARCHAR );`

    `CREATE TABLE ZSYSTEM ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER,
    ZNAME VARCHAR, ZPASSWORD VARCHAR, ZUSERID VARCHAR );`

    `CREATE TABLE Z_METADATA (Z_VERSION INTEGER PRIMARY KEY, Z_UUID VARCHAR(255),
    Z_PLIST BLOB);`

    `CREATE TABLE Z_PRIMARYKEY (Z_ENT INTEGER PRIMARY KEY, Z_NAME VARCHAR, Z_SUPER
    INTEGER, Z_MAX INTEGER);`

    `sqlite> select * from ZNOTE;`

    `1|1|1|This is the note''s body|This is a note`

    `sqlite> select * from ZSYSTEM;`

    `sqlite>`


    Now do the same procedure on the `Passwords.sqlite` database. The opposite is
    true: the table for the `System` entity is populated but not the `Note`.


    `sqlite> .schema`

    `CREATE TABLE ZNOTE ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER,
    ZBODY VARCHAR, ZTITLE VARCHAR );`

    `CREATE TABLE ZSYSTEM ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER,
    ZNAME VARCHAR, ZPASSWORD VARCHAR, ZUSERID VARCHAR );`

    `CREATE TABLE Z_METADATA (Z_VERSION INTEGER PRIMARY KEY, Z_UUID VARCHAR(255),
    Z_PLIST BLOB);`

    `CREATE TABLE Z_PRIMARYKEY (Z_ENT INTEGER PRIMARY KEY, Z_NAME VARCHAR, Z_SUPER
    INTEGER, Z_MAX INTEGER);`

    `sqlite> select * from ZNOTE;`

    `sqlite> select * from ZSYSTEM;`

    `1|2|1|My Secure System|mypassword|myuserid`

    `sqlite>`


    You have successfully split your data model into two persistent stores. The next
    section explains a situation in which this might be useful.


    ### Adding Encryption


    Data encryption is a big deal for any application that requires storage of sensitive
    information. Core Data does not do much to help you with this task, but it doesn''t
    stand in your way, either. Securing data follows two schools of thought, and you
    may choose to adhere to either one based on your own needs and requirements. These
    two schools are either to encrypt the entire database file or to just encrypt
    selected fields within your data store. The next sections explain both options.'
  trans: "\n#### 使用模型配置\n\nCore Data 模型用于定义实体及其关系，以指定数据的布局方式，但它也可以规定数据的写入位置。要指定数据的写入位置，Core\
    \ Data 使用了所谓的*配置*。每个实体可以与一个或多个配置关联，当为某个配置创建持久化存储时，只有与该配置关联的实体才会被包含在持久化操作中。在你的示例中，你将创建两个配置。第一个配置包含笔记，第二个配置存储密码。\n\
    \n在 Xcode 中，打开 `MyStash.xcdatamodel` 模型。选择默认配置（位于实体列表下方）。它会显示与该配置关联的所有实体，如图 10–17\
    \ 所示。最初，只有默认配置存在，它同时包含了 `Note` 和 `System` 实体。按住 Xcode 窗口底部的“添加实体”按钮，从菜单中选择“添加配置”，并添加一个名为\
    \ `Notes` 的配置。重复该过程，创建另一个名为 `Passwords` 的配置。\n\n目前，`Notes` 配置没有关联任何实体。要将 `Note`\
    \ 实体添加到该配置的实体列表中，选中 `Notes` 实体，然后将其拖拽到该配置的实体列表中，如图 10–18 所示。要将 `System` 实体添加到\
    \ `Passwords` 配置，将 `System` 实体拖拽到 `Passwords` 配置中，如图 10–19 所示。\n\n![images](img/1017.jpg)\n\
    \n**图 10–17.** *默认配置*\n\n![images](img/1018.jpg)\n\n**图 10–18.** *将 Note 实体添加到\
    \ Notes 配置中*\n\n![images](img/1019.jpg)\n\n**图 10–19.** *已将 System 实体添加到 Passwords\
    \ 配置中*\n\n现在，你已经为拆分持久化存储准备好了模型。剩下要做的就是使用新的配置创建持久化存储。为此，打开 `AppDelegate.m`，并将 `persistentStoreCoordinator:`\
    \ 方法修改为与代码清单 10–17 一致。\n\n**代码清单 10–17.** *更新后的 `persistentStoreCoordinator:`\
    \ 访问器*\n\n```\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\n\
    {  \n  if (__persistentStoreCoordinator != nil)\n  {\n    return __persistentStoreCoordinator;\n\
    \  }\n\n  __persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc]\
    \ initWithManagedObjectModel:[self managedObjectModel]];\n\n  {\n    // 创建 Notes\
    \ 持久化存储\n    NSURL *noteStoreURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
    Notes.sqlite\"];\n    NSError *error = nil;\n    if (![__persistentStoreCoordinator\
    \ addPersistentStoreWithType:NSSQLiteStoreType configuration:@\"Notes\" URL:noteStoreURL\
    \ options:nil error:&error])\n    {\n      NSLog(@\"Unresolved error %@, %@\"\
    , error, [error userInfo]);\n      abort();\n    }\n  }\n\n  {\n    // 创建 Passwords\
    \ 持久化存储\n    NSURL *passwordStoreURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
    Passwords.sqlite\"];\n    NSError *error = nil;\n    if (![__persistentStoreCoordinator\
    \ addPersistentStoreWithType:NSSQLiteStoreType configuration:@\"Passwords\" URL:passwordStoreURL\
    \ options:nil error:&error])\n    {\n      NSLog(@\"Unresolved error %@, %@\"\
    , error, [error userInfo]);\n      abort();\n    }\n  }\n\n  return __persistentStoreCoordinator;\n\
    }\n```\n\n你没有创建单个存储，而是以几乎相同的方式创建了两个持久化存储。唯一的区别是你明确指定了存储要使用的配置名称，而不是为配置参数传递 `nil`。对于\
    \ `Passwords.sqlite`，你使用了 `Passwords` 配置，而 `Notes.sqlite` 持久化存储则使用了 `Notes` 配置。\n\
    \n现在是时候好好休息一下，启动应用看看效果了。添加一条新笔记和一条新密码条目，以验证其功能是否正常。令你沮丧的是，你可能没有注意到任何区别。但值得庆幸的是，这正是你的目标：底层持久化存储结构的变化不应影响\
    \ MyStash 应用的其余部分。即使你完全改变了数据的存储方式，应用依然能正常工作，这就应该让你满意了。要看到差异，你需要揭开引擎盖，看看 SQLite\
    \ 数据库。打开终端窗口，使用以下命令找到你的数据存储：\n\n```\nfind ~/Library/Application\\ Support/iPhone\\\
    \ Simulator/ -name \"*.sqlite\"\n```\n\n你会看到那里列出了两个新数据库：`Notes.sqlite` 和 `Passwords.sqlite`。如果你打开\
    \ `Notes.sqlite` 数据库并运行 `.schema` 命令，将看到完整的模型，但尽管你可以看到笔记已正确保存，`ZSYSTEM` 表中却不包含任何数据。\n\
    \n```\nsqlite> .schema\nCREATE TABLE ZNOTE ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER,\
    \ Z_OPT INTEGER, ZBODY VARCHAR, ZTITLE VARCHAR );\nCREATE TABLE ZSYSTEM ( Z_PK\
    \ INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER, ZNAME VARCHAR, ZPASSWORD\
    \ VARCHAR, ZUSERID VARCHAR );\nCREATE TABLE Z_METADATA (Z_VERSION INTEGER PRIMARY\
    \ KEY, Z_UUID VARCHAR(255), Z_PLIST BLOB);\nCREATE TABLE Z_PRIMARYKEY (Z_ENT INTEGER\
    \ PRIMARY KEY, Z_NAME VARCHAR, Z_SUPER INTEGER, Z_MAX INTEGER);\nsqlite> select\
    \ * from ZNOTE;\n1|1|1|This is the note's body|This is a note\nsqlite> select\
    \ * from ZSYSTEM;\nsqlite>\n```\n\n现在对 `Passwords.sqlite` 数据库执行同样的操作。结果正好相反：`ZSYSTEM`\
    \ 实体对应的表有数据，但 `ZNOTE` 表没有。\n\n```\nsqlite> .schema\nCREATE TABLE ZNOTE ( Z_PK\
    \ INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER, ZBODY VARCHAR, ZTITLE VARCHAR\
    \ );\nCREATE TABLE ZSYSTEM ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER,\
    \ ZNAME VARCHAR, ZPASSWORD VARCHAR, ZUSERID VARCHAR );\nCREATE TABLE Z_METADATA\
    \ (Z_VERSION INTEGER PRIMARY KEY, Z_UUID VARCHAR(255), Z_PLIST BLOB);\nCREATE\
    \ TABLE Z_PRIMARYKEY (Z_ENT INTEGER PRIMARY KEY, Z_NAME VARCHAR, Z_SUPER INTEGER,\
    \ Z_MAX INTEGER);\nsqlite> select * from ZNOTE;\nsqlite> select * from ZSYSTEM;\n\
    1|2|1|My Secure System|mypassword|myuserid\nsqlite>\n```\n\n你已经成功地将数据模型拆分到了两个持久化存储中。下一节将解释这种做法的适用场景。\n\
    \n### 添加加密\n\n对于任何需要存储敏感信息的应用来说，数据加密都是重中之重。Core Data 在此任务上能提供的帮助不多，但它也不会成为你的阻碍。保护数据安全遵循两种思路，你可以根据自己的需求和要求选择遵循其中一种。这两种思路要么是加密整个数据库文件，要么是只加密数据存储中的某些字段。接下来的部分将对这两种方案进行阐述。\n"
- fmt: "#### Persistent Store Encryption Using Data Protection\n\nOne of the security\
    \ options that was deployed with the iPhone 3GS is hardware-level disk encryption.\
    \ Apple calls it data protection. When enabled, it encrypts a portion of your\
    \ disk when the device is locked and is automatically decrypted when the device\
    \ is unlocked.\n\nFor data protection to work, it must be manually enabled. Keep\
    \ in mind that this is hardware-level disk encryption and therefore it works only\
    \ on the device itself, not on the iPhone Simulator. To enable it, open the iPhone\
    \ settings, and navigate to `Settings` ![images](images/U001.jpg) `General` ![images](images/U001.jpg)\
    \ `Passcode Lock`. Enable the passcode if not enabled yet. The bottom of the page\
    \ will display “Data protection is enabled,” as illustrated in [Figure 10–20](#Chapter10.html#fig_10_20),\
    \ if everything is properly set up.\n\n![images](images/1020.jpg)\n\n**Figure\
    \ 10–20.** *Enabling data protection on the device*\n\nFrom a programming standpoint,\
    \ the work involved in encrypting your database is surprisingly simple. When creating\
    \ the persistent store, you simply need to set the right attribute on the database\
    \ file and let iOS do the rest. Open `AppDelegate.m`, and change the implementation\
    \ of the `persistentStoreCoordinator:` to add the proper file attribute to encrypt\
    \ the password database, as shown in [Listing 10–18](#Chapter10.html#list_10_18).\n\
    \n**Listing 10–18.** *Encrypting the password database*\n\n```\n- (NSPersistentStoreCoordinator\
    \ *)persistentStoreCoordinator {\n  ...\n  {\n    // Create the Passwords persistent\
    \ store\n    NSURL *passwordStoreURL = [[self applicationDocumentsDirectory]![images](images/U002.jpg)\n\
    URLByAppendingPathComponent:@\"Passwords.sqlite\"];\n    NSError *error = nil;\n\
    \    if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType![images](images/U002.jpg)\n\
    configuration:@\"Passwords\" URL:passwordStoreURL options:nil error:&error])\n\
    \    {\n      NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n\
    \      abort();\n    }\n\n    // Encrypt the password database\n    NSDictionary\
    \ *fileAttributes = [NSDictionary![images](images/U002.jpg)\ndictionaryWithObject:NSFileProtectionComplete\
    \ forKey:NSFileProtectionKey];\n    if (![[NSFileManager defaultManager] setAttributes:fileAttributes![images](images/U002.jpg)\n\
    ofItemAtPath:[passwordStoreURL path] error:&error])\n    {\n      NSLog(@\"Unresolved\
    \ error with password store encryption %@, %@\", error, [error![images](images/U002.jpg)\n\
    userInfo]);\n      abort();\n    }\n  }\n  ...\n}\n```\n\nWhen you run your application\
    \ on a device that has data protection enabled, the `Passwords.sqlite` database\
    \ file will be automatically encrypted when the device is locked. This method\
    \ is cheap to implement, but understand that once the device is unlocked, the\
    \ file is automatically decrypted so the database is as secure as the phone. If\
    \ someone can guess the passcode, the database will be accessible, especially\
    \ if the phone is jailbroken (that is, root access is available). Another inconvenience\
    \ with this method is that for very large databases, the time it takes to unlock\
    \ and start your application might be rather large since a huge file will need\
    \ to be decrypted before it can be used.\n\n#### Data Encryption\n\nThe other\
    \ alternative to data security is to encrypt the data as you put it in the database.\
    \ This is a case when you encrypt only what you want to secure. Let's assume that\
    \ you want to be able to secure notes in the database.\n\n##### Using Encryption\n\
    \niOS comes with an encryption library. To make encryption easier, you add a new\
    \ category to the `NSData` class. In Xcode, create a new Objective-C category,\
    \ as shown in [Figure 10–21](#Chapter10.html#fig_10_21). Enter **Encryption**\
    \ for Category and **NSData** for Category on, as shown in [Figure 10–22](#Chapter10.html#fig_10_22).\
    \ This creates a category called `NSData+Encryption` and adds it to your project.\
    \ Since encryption algorithms lie outside the scope of this book, we don't dig\
    \ into how this category works, but simply give you the source in [Listing 10–18](#Chapter10.html#list_10_18)\
    \ (`NSData+Encryption.h`) and [Listing 10–19](#Chapter10.html#list_10_19) (`NSData+Encryption.m`).\n\
    \n![images](images/1021.jpg)\n\n**Figure 10–21.** *Creating an Objective-C category*\n\
    \n![images](images/1022.jpg)\n\n**Figure 10–22.** *Creating the `NSData+Encryption`\
    \ category*\n\n**Listing 10–18.** *`NSData+Encryption.h`*\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface NSData (Encryption)\n- (NSData *)encryptWithKey:(NSString *)key;\n\
    - (NSData *)decryptWithKey:(NSString *)key;\n@end\n```\n\n**Listing 10–19.** *`NSData+Encryption.m`*\n\
    \n```\n#import <CommonCrypto/CommonCryptor.h>\n#import \"NSData+Encryption.h\"\
    \n\n@implementation NSData (Encryption)\n\n- (NSData *)transpose:(NSString *)_key\
    \ forOperation:(int)operation\n{\n  // Make sure the key is big enough or else\
    \ add zeros\n  char key[kCCKeySizeAES256+1];\n  bzero(key, sizeof(key));\n\n \
    \ // Populate the key into the character array\n  [_key getCString:key maxLength:sizeof(key)\
    \ encoding:NSUTF8StringEncoding];\n\n  size_t allocatedSize = self.length + kCCBlockSizeAES128;\n\
    \  void *output = malloc(allocatedSize);\n\n  size_t actualSize = 0;\nCCCryptorStatus\
    \ resultCode = CCCrypt(operation, kCCAlgorithmAES128, ![images](images/U002.jpg)\n\
    kCCOptionPKCS7Padding, key, kCCKeySizeAES256, nil, self.bytes, self.length, output,\
    \ ![images](images/U002.jpg)\nallocatedSize, &actualSize);\n  if (resultCode !=\
    \ kCCSuccess)\n  {\n    // Free the output buffer\n    free(output);\n    return\
    \ nil;\n  }\n\n  return [NSData dataWithBytesNoCopy:output length:actualSize];\
    \  \n}\n\n- (NSData *)encryptWithKey:(NSString *)key\n{\n  return [self transpose:key\
    \ forOperation:kCCEncrypt];\n}\n\n- (NSData *)decryptWithKey:(NSString *)key\n\
    {\n  return [self transpose:key forOperation:kCCDecrypt];\n}\n\n@end\n```\n\n\
    This category adds two methods to the `NSData` class that will allow you to obtain\
    \ an encrypted and decrypted version of its binary content."
  raw: '#### Persistent Store Encryption Using Data Protection


    One of the security options that was deployed with the iPhone 3GS is hardware-level
    disk encryption. Apple calls it *data protection*. When enabled, it encrypts a
    portion of your disk when the device is locked and is automatically decrypted
    when the device is unlocked.


    For data protection to work, it must be manually enabled. Keep in mind that this
    is hardware-level disk encryption and therefore it works only on the device itself,
    not on the iPhone Simulator. To enable it, open the iPhone settings, and navigate
    to `Settings` ![images](images/U001.jpg) `General` ![images](images/U001.jpg)
    `Passcode Lock`. Enable the passcode if not enabled yet. The bottom of the page
    will display “Data protection is enabled,” as illustrated in [Figure 10–20](#Chapter10.html#fig_10_20),
    if everything is properly set up.


    ![images](images/1020.jpg)


    **Figure 10–20.** *Enabling data protection on the device*


    From a programming standpoint, the work involved in encrypting your database is
    surprisingly simple. When creating the persistent store, you simply need to set
    the right attribute on the database file and let iOS do the rest. Open `AppDelegate.m`,
    and change the implementation of the `persistentStoreCoordinator:` to add the
    proper file attribute to encrypt the password database, as shown in [Listing 10–18](#Chapter10.html#list_10_18).


    **Listing 10–18.** *Encrypting the password database*


    `- (NSPersistentStoreCoordinator *)persistentStoreCoordinator {`

    `  ...`

    `  {`

    `    // Create the Passwords persistent store`

    `    NSURL *passwordStoreURL = [[self applicationDocumentsDirectory]`![images](images/U002.jpg)

    `URLByAppendingPathComponent:@"Passwords.sqlite"];`

    `    NSError *error = nil;`

    `    if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType`![images](images/U002.jpg)

    `configuration:@"Passwords" URL:passwordStoreURL options:nil error:&error])`

    `    {`

    `      NSLog(@"Unresolved error %@, %@", error, [error userInfo]);`

    `      abort();`

    `    }`


    **`    // Encrypt the password database`**

    **`    NSDictionary *fileAttributes = [NSDictionary`![images](images/U002.jpg)**

    **`dictionaryWithObject:NSFileProtectionComplete forKey:NSFileProtectionKey];`**

    **`    if (![[NSFileManager defaultManager] setAttributes:fileAttributes`![images](images/U002.jpg)**

    **`ofItemAtPath:[passwordStoreURL path] error:&error])`**

    **`    {`**

    **`      NSLog(@"Unresolved error with password store encryption %@, %@", error,
    [error`![images](images/U002.jpg)**

    **`userInfo]);`**

    **`      abort();`**

    **`    }`**

    `  }`

    `  ...`

    `}`


    When you run your application on a device that has data protection enabled, the
    `Passwords.sqlite` database file will be automatically encrypted when the device
    is locked. This method is cheap to implement, but understand that once the device
    is unlocked, the file is automatically decrypted so the database is as secure
    as the phone. If someone can guess the passcode, the database will be accessible,
    especially if the phone is jailbroken (that is, root access is available). Another
    inconvenience with this method is that for very large databases, the time it takes
    to unlock and start your application might be rather large since a huge file will
    need to be decrypted before it can be used.


    #### Data Encryption


    The other alternative to data security is to encrypt the data as you put it in
    the database. This is a case when you encrypt only what you want to secure. Let''s
    assume that you want to be able to secure notes in the database.


    ##### Using Encryption


    iOS comes with an encryption library. To make encryption easier, you add a new
    category to the `NSData` class. In Xcode, create a new Objective-C category, as
    shown in [Figure 10–21](#Chapter10.html#fig_10_21). Enter **Encryption** for Category
    and **NSData** for Category on, as shown in [Figure 10–22](#Chapter10.html#fig_10_22).
    This creates a category called `NSData+Encryption` and adds it to your project.
    Since encryption algorithms lie outside the scope of this book, we don''t dig
    into how this category works, but simply give you the source in [Listing 10–18](#Chapter10.html#list_10_18)
    (`NSData+Encryption.h`) and [Listing 10–19](#Chapter10.html#list_10_19) (`NSData+Encryption.m`).


    ![images](images/1021.jpg)


    **Figure 10–21.** *Creating an Objective-C category*


    ![images](images/1022.jpg)


    **Figure 10–22.** *Creating the `NSData+Encryption` category*


    **Listing 10–18.** *`NSData+Encryption.h`*


    `#import <Foundation/Foundation.h>`


    `@interface NSData (Encryption)`

    **`- (NSData *)encryptWithKey:(NSString *)key;`**

    **`- (NSData *)decryptWithKey:(NSString *)key;`**

    `@end`


    **Listing 10–19.** *`NSData+Encryption.m`*


    **`#import <CommonCrypto/CommonCryptor.h>`**

    `#import "NSData+Encryption.h"`


    `@implementation NSData (Encryption)`


    **`- (NSData *)transpose:(NSString *)_key forOperation:(int)operation`**

    **`{`**

    **`  // Make sure the key is big enough or else add zeros`**

    **`  char key[kCCKeySizeAES256+1];`**

    **`  bzero(key, sizeof(key));`**


    **`  // Populate the key into the character array`**

    **`  [_key getCString:key maxLength:sizeof(key) encoding:NSUTF8StringEncoding];`**


    **`  size_t allocatedSize = self.length + kCCBlockSizeAES128;`**

    **`  void *output = malloc(allocatedSize);`**


    **`  size_t actualSize = 0;`**

    **`CCCryptorStatus resultCode = CCCrypt(operation, kCCAlgorithmAES128,` ![images](images/U002.jpg)**

    **`kCCOptionPKCS7Padding, key, kCCKeySizeAES256, nil, self.bytes, self.length,
    output,` ![images](images/U002.jpg)**

    **`allocatedSize, &actualSize);`**

    **`  if (resultCode != kCCSuccess)`**

    **`  {`**

    **`    // Free the output buffer`**

    **`    free(output);`**

    **`    return nil;`**

    **`  }`**


    **`  return [NSData dataWithBytesNoCopy:output length:actualSize];  `**

    **`}`**


    **`- (NSData *)encryptWithKey:(NSString *)key`**

    **`{`**

    **`  return [self transpose:key forOperation:kCCEncrypt];`**

    **`}`**


    **`- (NSData *)decryptWithKey:(NSString *)key`**

    **`{`**

    **`  return [self transpose:key forOperation:kCCDecrypt];`**

    **`}`**


    `@end`


    This category adds two methods to the `NSData` class that will allow you to obtain
    an encrypted and decrypted version of its binary content.'
  trans: "\n#### 使用数据保护功能的持久化存储加密\n\n随 iPhone 3GS 推出的安全选项之一是硬件级磁盘加密，苹果称之为**数据保护**。启用后，设备锁定时会加密磁盘的特定分区，并在设备解锁时自动解密。\n\
    \n数据保护功能需要手动启用。请记住，这是硬件级磁盘加密，因此仅适用于设备本身，而不适用于 iPhone 模拟器。要启用此功能，请打开 iPhone 设置，依次进入`设置`![images](img/U001.jpg)`通用`![images](img/U001.jpg)`密码锁定`。如果尚未启用密码，请先启用。如果一切设置正确，页面底部将显示“数据保护已启用”，如图\
    \ 10-20 所示。\n\n![images](img/1020.jpg)\n\n**图 10-20.** *在设备上启用数据保护*\n\n从编程角度来看，加密数据库的步骤出乎意料地简单。创建持久化存储时，只需在数据库文件上设置正确的属性，其余工作交给\
    \ iOS 处理。打开`AppDelegate.m`，修改`persistentStoreCoordinator:`的实现，添加正确的文件属性以加密密码数据库，如代码\
    \ 10-18 所示。\n\n**代码清单 10-18.** *加密密码数据库*\n\n```\n- (NSPersistentStoreCoordinator\
    \ *)persistentStoreCoordinator {\n  ...\n  {\n    // 创建密码持久化存储\n    NSURL *passwordStoreURL\
    \ = [[self applicationDocumentsDirectory]![images](img/U002.jpg)\nURLByAppendingPathComponent:@\"\
    Passwords.sqlite\"];\n    NSError *error = nil;\n    if (![__persistentStoreCoordinator\
    \ addPersistentStoreWithType:NSSQLiteStoreType![images](img/U002.jpg)\nconfiguration:@\"\
    Passwords\" URL:passwordStoreURL options:nil error:&error])\n    {\n      NSLog(@\"\
    未解决的错误 %@, %@\", error, [error userInfo]);\n      abort();\n    }\n\n    // 加密密码数据库\n\
    \    NSDictionary *fileAttributes = NSDictionary![images\ndictionaryWithObject:NSFileProtectionComplete\
    \ forKey:NSFileProtectionKey];\n    if (![[NSFileManager defaultManager] setAttributes:fileAttributes![images](img/U002.jpg)\n\
    ofItemAtPath:[passwordStoreURL path] error:&error])\n    {\n      NSLog(@\"密码存储加密时出现未解决错误\
    \ %@, %@\", error, error![images\nuserInfo]);\n      abort();\n    }\n  }\n  ...\n\
    }\n```\n\n当你在启用了数据保护的设备上运行应用程序时，`Passwords.sqlite` 数据库文件将在设备锁定时自动加密。这种方法实现成本低廉，但需注意：设备一旦解锁，文件会自动解密，因此数据库的安全性与手机本身相当。如果有人能猜到密码，数据库将可访问，尤其是当手机已越狱（即拥有\
    \ root 访问权限）时。此方法的另一个不便之处在于，对于非常大的数据库，解锁和启动应用程序所需的时间可能相当长，因为需要先解密大文件才能使用。\n\n\
    #### 数据加密\n\n数据安全的另一种替代方案是在数据存入数据库时对其进行加密。这种情况下，你只需加密需要保护的数据。假设你想保护数据库中的笔记。\n\n\
    ##### 使用加密功能\n\niOS 自带加密库。为了简化加密操作，你可以为 `NSData` 类添加一个新的分类。在 Xcode 中，创建一个新的 Objective-C\
    \ 分类，如图 10-21 所示。在“Category”字段输入 **Encryption**，在“Category on”字段选择 **NSData**，如图\
    \ 10-22 所示。这将创建一个名为 `NSData+Encryption` 的分类，并将其添加到你的项目中。由于加密算法超出了本书范围，我们不再深入探讨该分类的工作原理，而是直接提供代码清单\
    \ 10-18（`NSData+Encryption.h`）和 10-19（`NSData+Encryption.m`）中的源码。\n\n![images](img/1021.jpg)\n\
    \n**图 10-21.** *创建 Objective-C 分类*\n\n![images](img/1022.jpg)\n\n**图 10-22.**\
    \ *创建 `NSData+Encryption` 分类*\n\n**代码清单 10-18.** *`NSData+Encryption.h`*\n\n```\n\
    #import <Foundation/Foundation.h>\n\n@interface NSData (Encryption)\n- (NSData\
    \ *)encryptWithKey:(NSString *)key;\n- (NSData *)decryptWithKey:(NSString *)key;\n\
    @end\n```\n\n**代码清单 10-19.** *`NSData+Encryption.m`*\n\n```\n#import <CommonCrypto/CommonCryptor.h>\n\
    #import \"NSData+Encryption.h\"\n\n@implementation NSData (Encryption)\n\n- (NSData\
    \ *)transpose:(NSString *)_key forOperation:(int)operation\n{\n  // 确保密钥足够长，否则补零\n\
    \  char key[kCCKeySizeAES256+1];\n  bzero(key, sizeof(key));\n\n  // 将密钥填充到字符数组中\n\
    \  [_key getCString:key maxLength:sizeof(key) encoding:NSUTF8StringEncoding];\n\
    \n  size_t allocatedSize = self.length + kCCBlockSizeAES128;\n  void *output =\
    \ malloc(allocatedSize);\n\n  size_t actualSize = 0;\nCCCryptorStatus resultCode\
    \ = CCCrypt(operation, kCCAlgorithmAES128, ![images](img/U002.jpg)\nkCCOptionPKCS7Padding,\
    \ key, kCCKeySizeAES256, nil, self.bytes, self.length, output, ![images](img/U002.jpg)\n\
    allocatedSize, &actualSize);\n  if (resultCode != kCCSuccess)\n  {\n    // 释放输出缓冲区\n\
    \    free(output);\n    return nil;\n  }\n\n  return [NSData dataWithBytesNoCopy:output\
    \ length:actualSize];  \n}\n\n- (NSData *)encryptWithKey:(NSString *)key\n{\n\
    \  return [self transpose:key forOperation:kCCEncrypt];\n}\n\n- (NSData *)decryptWithKey:(NSString\
    \ *)key\n{\n  return [self transpose:key forOperation:kCCDecrypt];\n}\n\n@end\n\
    ```\n\n该分类为 `NSData` 类添加了两个方法，使你能获取其二进制内容的加密和解密版本。\n"
- fmt: "### Automatically Encrypting Fields\n\nTo support encrypted data, you modify\
    \ the data model to use `Transformable` instead of `String` as the data type for\
    \ the `body` attribute of the `Note` entity. Set the transformer name to `EncryptedStringTransformer`,\
    \ which is a class you'll write next, as illustrated in [Figure 10–23](#Chapter10.html#fig_10_23).\n\
    \n![images](images/1023.jpg)\n\n**Figure 10–23.** *The `body` attribute with the\
    \ `Transformable` data type*\n\nThe role of the transformer is to encrypt/decrypt\
    \ data as it goes into and comes out of the persistent store so that the rest\
    \ of the application does not need to worry or know about encryption.\n\nCreate\
    \ a new Objective-C class called `EncryptedStringTransformer` and make it a subclass\
    \ of `NSValueTransformer`. [Listing 10–20](#Chapter10.html#list_10_20) shows the\
    \ code for `EncryptedStringTransformer.h`, which is just as Xcode generated it.\n\
    \n**Listing 10–20.** *`EncryptedStringTransformer.h`*\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface EncryptedStringTransformer : NSValueTransformer\n\n@end\n```\n\n\
    Implement the transformer as shown in [Listing 10–21](#Chapter10.html#list_10_21).\
    \ This class uses the `NSData+Encryption` category to do all the encryption and\
    \ decryption, so the implementation is simple and consists of transforming the\
    \ clear text to encrypted data and vice versa.\n\n**Listing 10–21.** *`EncryptedStringTransformer.m`*\n\
    \n```\n#import \"EncryptedStringTransformer.h\"\n#import \"NSData+Encryption.h\"\
    \n\n@implementation EncryptedStringTransformer\n\n+ (Class)transformedValueClass\n\
    {\n  return [NSString class];\n}\n\n+ (BOOL)allowsReverseTransformation\n{\n \
    \ return YES;\n}\n\n- (id)transformedValue:(id)value\n{\n  if (value == nil)\n\
    \    return nil;\n\n  NSData *clearData = [value dataUsingEncoding:NSUTF8StringEncoding];\n\
    \  return [clearData encryptWithKey:@\"secret\"];\n}\n\n- (id)reverseTransformedValue:(id)value\n\
    {\n  if (value == nil)\n    return nil;\n\n  NSData *data = [value decryptWithKey:@\"\
    secret\"];\n\n  return [[NSString alloc] initWithData:data encoding:NSUTF8StringEncoding];\n\
    }\n\n@end\n```\n\n**NOTE:** For the sake of simplicity, we took the liberty of\
    \ using the same string (`\"secret\"`) as the encryption password in the transformer.\
    \ Obviously, this defies the notion of secured encryption since anyone can have\
    \ access to the password. We leave it up to you to change that password and/or\
    \ make it a user-configurable variable.\n\n### Testing the Encryption\n\nUnlike\
    \ the previous section where you couldn't see the hardware-level encryption since\
    \ it occurred only when the device was locked, with data encryption you can enjoy\
    \ the peace of mind of verifying that your data is encrypted. Since your model\
    \ isn't versioned, you will need to reset the simulator before launching.\n\n\
    Launch the application and add a new note, as shown in [Figure 10–24](#Chapter10.html#fig_10_24).\n\
    \n![images](images/1024.jpg)\n\n**Figure 10–24.** *Adding a new encrypted note*\n\
    \nWe know you really enjoy running the MyStash app, but we need to ask you to\
    \ put the toy down and take a look at the `Notes.sqlite` data store. Displaying\
    \ the data in the `ZNOTE` table shows the following encrypted data:\n\n```\nsqlite>\
    \ select * from ZNOTE;\n1|1|1|This is a note|??<??H.K?എi?ҍ ?^??Gh???;ܺ=??X?C^?????\n\
    ```\n\nOf course, if you relaunch the application, the data will be decrypted\
    \ properly before being displayed on the user interface. With this encryption\
    \ strategy, you are in complete control of the data security. Regardless of whether\
    \ the user has enabled data protection or not, the data is encrypted. If the device\
    \ is stolen and unlocked, the data will still be encrypted.\n\n## Sending Notifications\
    \ When Data Changes\n\nOn Mac OS X, Core Data provides UI bindings that allow\
    \ you to link your data directly to your user interface. With iOS, however, Core\
    \ Data currently offers no UI bindings; the closest thing you have is the `NSFetchedResultsController`.\
    \ When using that controller is not an option, you have to rely on your own coding,\
    \ with some help from the Key-Value Observing (KVO) mechanism. Since `NSManagedObject`\
    \ is Key-Value Coding (KVC) compliant, all the usual principles of KVO can be\
    \ applied, and notifications can be fired on data modifications. The KVO model\
    \ is very simple and decentralized, with only two objects at play: the observer\
    \ and the observed. The observer must be registered with the observed object and\
    \ the observed object is responsible for firing notifications when its data changes.\
    \ Thanks to the default implementation of `NSManagedObject`, firing notifications\
    \ is automatically handled for you.\n\nTo illustrate how to use notifications,\
    \ you'll create an example in which an observer outputs an acknowledgment that\
    \ it has received a change notification when the `name` attribute of the `System`\
    \ entity is modified. For simplicity, you output directly to the application console.\
    \ In a real application, the KVO mechanism could be used to automatically update\
    \ user interface elements.\n\n### Registering an Observer\n\nTo receive change\
    \ notifications, the observer must be registered with the observed object using\
    \ the `addObserver:forKeyPath:options:context:` method. The registration is valid\
    \ for a given key path only, which means it is valid only for the named attribute\
    \ or relationship. The advantage is that it gives you a very fine level of control\
    \ over what notifications fire.\n\nThe options give you an even finer level of\
    \ granularity by specifying what information you want to receive in your notifications.\
    \ [Table 10-1](#Chapter10.html#tab_10_1) shows the options, which can be combined\
    \ with a bitwise OR.\n\n![images](images/t1001.jpg)\n\nIn MyStash, you will add\
    \ an observer for the `System` entities. Open `PasswordListViewController.m`,\
    \ and edit the `configureCell:atIndexPath:` method to add the observer, as shown\
    \ in [Listing 10–22](#Chapter10.html#list_10_22).\n\n**Listing 10–22.** *Adding\
    \ an observer for changes to `name`*\n\n```\n- (void)configureCell:(UITableViewCell\
    \ *)cell atIndexPath:(NSIndexPath *)indexPath\n{\n  NSManagedObject *system =\
    \ [self.fetchedResultsController objectAtIndexPath:indexPath];\n  cell.textLabel.text\
    \ = [system valueForKey:@\"name\"];\n\n  // Register this object for KVO\n  [system\
    \ addObserver:self forKeyPath:@\"name\" options:NSKeyValueObservingOptionOld |\n\
    NSKeyValueObservingOptionNew context:nil];\n}\n```\n\nIn this case, you are registering\
    \ the `PasswordListViewController` as an observer of the `name` attribute that\
    \ wants to receive the old and new values when the attribute for this managed\
    \ object is modified."
  raw: '##### Automatically Encrypting Fields


    To support encrypted data, you modify the data model to use `Transformable` instead
    of `String` as the data type for the `body` attribute of the `Note` entity. Set
    the transformer name to `EncryptedStringTransformer`, which is a class you''ll
    write next, as illustrated in [Figure 10–23](#Chapter10.html#fig_10_23).


    ![images](images/1023.jpg)


    **Figure 10–23.** *The body attribute with the Transformable data type*


    The role of the transformer is to encrypt/decrypt data as it goes into and comes
    out of the persistent store so that the rest of the application does not need
    to worry or know about encryption.


    Create a new Objective-C class called `EncryptedStringTransformer` and make it
    a subclass of `NSValueTransformer`. [Listing 10–20](#Chapter10.html#list_10_20)
    shows the code for `EncryptedStringTransformer.h`, which is just as Xcode generated
    it.


    **Listing 10–20.** *`EncryptedStringTransformer.h`*


    `#import <Foundation/Foundation.h>`


    `@interface EncryptedStringTransformer : NSValueTransformer`


    `@end`


    Implement the transformer as shown in [Listing 10–21](#Chapter10.html#list_10_21).
    This class uses the `NSData+Encryption` category to do all the encryption and
    decryption, so the implementation is simple and consists of transforming the clear
    text to encrypted data and vice versa.


    **Listing 10–21.** *`EncryptedStringTransformer.m`*


    `#import "EncryptedStringTransformer.h"`

    **`#import "NSData+Encryption.h"`**


    `@implementation EncryptedStringTransformer`


    **`+ (Class)transformedValueClass`**

    **`{`**

    **`  return [NSString class];`**

    **`}`**


    **`+ (BOOL)allowsReverseTransformation`**

    **`{`**

    **`  return YES;`**

    **`}`**


    **`- (id)transformedValue:(id)value`**

    **`{`**

    **`  if (value == nil)`**

    **`    return nil;`**


    **`  NSData *clearData = [value dataUsingEncoding:NSUTF8StringEncoding];`**

    **`  return [clearData encryptWithKey:@"secret"];`**

    **`}`**


    **`- (id)reverseTransformedValue:(id)value`**

    **`{`**

    **`  if (value == nil)`**

    **`    return nil;`**


    **`  NSData *data = [value decryptWithKey:@"secret"];`**


    **`  return [[NSString alloc] initWithData:data encoding:NSUTF8StringEncoding];`**

    **`}`**


    `@end`


    **NOTE:** For the sake of simplicity, we took the liberty of using the same string
    (“secret”) as the encryption password in the transformer. Obviously, this defies
    the notion of secured encryption since anyone can have access to the password.
    We leave it up to you to change that password and/or make it a user-configurable
    variable.


    ##### Testing the Encryption


    Unlike the previous section where you couldn''t see the hardware-level encryption
    since it occurred only when the device was locked, with data encryption you can
    enjoy the peace of mind of verifying that your data is encrypted. Since your model
    isn''t versioned, you will need to reset the simulator before launching.


    Launch the application and add a new note, as shown in [Figure 10–24](#Chapter10.html#fig_10_24).


    ![images](images/1024.jpg)


    **Figure 10–24.** *Adding a new encrypted note*


    We know you really enjoy running the MyStash app, but we need to ask you to put
    the toy down and take a look at the `Notes.sqlite` data store. Displaying the
    data in the `ZNOTE` table shows the following encrypted data:


    `sqlite> select * from ZNOTE;`

    `1|1|1|This is a note|??<??H.K?എi?ҍ ?^??Gh???;ܺ=??X?C^?????`


    Of course, if you relaunch the application, the data will be decrypted properly
    before being displayed on the user interface. With this encryption strategy, you
    are in complete control of the data security. Regardless of whether the user has
    enabled data protection or not, the data is encrypted. If the device is stolen
    and unlocked, the data will still be encrypted.


    ### Sending Notifications When Data Changes


    On Mac OS X, Core Data provides UI bindings that allow you to link your data directly
    to your user interface. With iOS, however, Core Data currently offers no UI bindings;
    the closest thing you have is the `NSFetchedResultsController`. When using that
    controller is not an option, you have to rely on your own coding, with some help
    from the Key-Value Observing (KVO) mechanism. Since `NSManagedObject` is Key-Value
    Coding (KVC) compliant, all the usual principles of KVO can be applied, and notifications
    can be fired on data modifications. The KVO model is very simple and decentralized,
    with only two objects at play: the observer and the observed. The observer must
    be registered with the observed object and the observed object is responsible
    for firing notifications when its data changes. Thanks to the default implementation
    of `NSManagedObject`, firing notifications is automatically handled for you.


    To illustrate how to use notifications, you''ll create an example in which an
    observer outputs an acknowledgment that it has received a change notification
    when the `name` attribute of the `System` entity is modified. For simplicity,
    you output directly to the application console. In a real application, the KVO
    mechanism could be used to automatically update user interface elements.


    #### Registering an Observer


    To receive change notifications, the observer must be registered with the observed
    object using the `addObserver:forKeyPath:options:context:` method. The registration
    is valid for a given key path only, which means it is valid only for the named
    attribute or relationship. The advantage is that it gives you a very fine level
    of control over what notifications fire.


    The options give you an even finer level of granularity by specifying what information
    you want to receive in your notifications. [Table 10-1](#Chapter10.html#tab_10_1)
    shows the options, which can be combined with a bitwise OR.


    ![images](images/t1001.jpg)


    In MyStash, you will add an observer for the `System` entities. Open `PasswordListViewController.m`,
    and edit the `configureCell:atIndexPath:` method to add the observer, as shown
    in [Listing 10–22](#Chapter10.html#list_10_22).


    **Listing 10–22.** *Adding an observer for changes to `name`*


    `- (void)configureCell:(UITableViewCell *)cell atIndexPath:(NSIndexPath *)indexPath`

    `{`

    `  NSManagedObject *system = [self.fetchedResultsController objectAtIndexPath:indexPath];`

    `  cell.textLabel.text = [system valueForKey:@"name"];`


    **`  // Register this object for KVO`**

    **`  [system addObserver:self forKeyPath:@"name" options:NSKeyValueObservingOptionOld
    |`![images](images/U002.jpg)**

    **`NSKeyValueObservingOptionNew context:nil];`**

    **`}`**


    In this case, you are registering the `PasswordListViewController` as an observer
    of the `name` attribute that wants to receive the old and new values when the
    attribute for this managed object is modified.'
  trans: "\n### 自动加密字段\n\n为了支持数据加密，你需要修改数据模型，将 `Note` 实体中 `body` 属性的数据类型从 `String`\
    \ 改为 `Transformable`。将转换器名称设置为 `EncryptedStringTransformer`，这是一个你接下来要编写的类，如图 Figure\
    \ 10–23 所示。\n\n![images](img/1023.jpg)\n\n**图 10–23.** *使用 `Transformable` 数据类型的\
    \ `body` 属性*\n\n转换器的作用是在数据进入和离开持久化存储时对其进行加密/解密，这样一来，应用程序的其他部分就无需关心或知晓加密过程。\n\n\
    创建一个名为 `EncryptedStringTransformer` 的 Objective-C 类，并让它继承 `NSValueTransformer`。Listing\
    \ 10–20 展示了 `EncryptedStringTransformer.h` 的代码，其内容与 Xcode 生成的一致。\n\n**代码清单 10–20.**\
    \ *`EncryptedStringTransformer.h`*\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface EncryptedStringTransformer : NSValueTransformer\n\n@end\n```\n\n\
    按照 Listing 10–21 所示来实现该转换器。这个类使用 `NSData+Encryption` 类别来完成所有加密和解密操作，因此实现非常简单，无非就是将明文转换为加密数据，反之亦然。\n\
    \n**代码清单 10–21.** *`EncryptedStringTransformer.m`*\n\n```\n#import \"EncryptedStringTransformer.h\"\
    \n#import \"NSData+Encryption.h\"\n\n@implementation EncryptedStringTransformer\n\
    \n+ (Class)transformedValueClass\n{\n  return [NSString class];\n}\n\n+ (BOOL)allowsReverseTransformation\n\
    {\n  return YES;\n}\n\n- (id)transformedValue:(id)value\n{\n  if (value == nil)\n\
    \    return nil;\n\n  NSData *clearData = [value dataUsingEncoding:NSUTF8StringEncoding];\n\
    \  return [clearData encryptWithKey:@\"secret\"];\n}\n\n- (id)reverseTransformedValue:(id)value\n\
    {\n  if (value == nil)\n    return nil;\n\n  NSData *data = [value decryptWithKey:@\"\
    secret\"];\n\n  return [[NSString alloc] initWithData:data encoding:NSUTF8StringEncoding];\n\
    }\n\n@end\n```\n\n**注意:** 为简单起见，我们擅自决定在转换器中使用相同的字符串 (`\"secret\"`) 作为加密密码。显然，这违背了安全加密的理念，因为任何人都可以获取该密码。我们留给你自行修改密码，或者将其设为一个用户可配置的变量。\n\
    \n### 测试加密\n\n与上一节不同（硬件级加密仅在设备锁定时发生，因此你看不到效果），在使用数据加密时，你可以放心地验证数据是否已加密。由于你的模型未进行版本控制，因此需要在启动前重置模拟器。\n\
    \n启动应用程序并添加一条新笔记，如图 Figure 10–24 所示。\n\n![images](img/1024.jpg)\n\n**图 10–24.**\
    \ *添加一条新的加密笔记*\n\n我们知道你非常喜欢运行 MyStash 应用，但还是请你先放下这个小玩具，来看看 `Notes.sqlite` 数据存储。显示\
    \ `ZNOTE` 表中的数据，可以看到以下加密数据：\n\n```\nsqlite> select * from ZNOTE;\n1|1|1|This is\
    \ a note|??<??H.K?എi?ҍ ?^??Gh???;ܺ=??X?C^?????\n```\n\n当然，如果你重新启动应用程序，数据会在显示到用户界面之前被正确解密。通过这种加密策略，你可以完全掌控数据的安全性。无论用户是否启用了数据保护，数据都是加密的。如果设备被盗并且被解锁，数据仍然是加密的。\n\
    \n## 数据变更时发送通知\n\n在 Mac OS X 上，Core Data 提供了 UI 绑定，允许你将数据直接链接到用户界面。然而，在 iOS 上，Core\
    \ Data 目前不提供 UI 绑定；最接近的替代方案是 `NSFetchedResultsController`。当无法使用该控制器时，你必须依靠自己的编码，并借助键值观察（KVO）机制。由于\
    \ `NSManagedObject` 符合键值编码（KVC）规范，因此所有常规的 KVO 原则都可以应用，并且可以在数据修改时触发通知。KVO 模型非常简单且去中心化，只涉及两个对象：观察者和被观察者。观察者必须向被观察对象注册，而被观察对象负责在其数据发生变化时触发通知。得益于\
    \ `NSManagedObject` 的默认实现，通知的触发是自动为你处理的。\n\n为了说明如何使用通知，我们将创建一个示例：当 `System` 实体的\
    \ `name` 属性被修改时，观察者会输出一条确认信息，表明已收到变更通知。为简单起见，我们直接输出到应用程序的控制台。在实际应用中，KVO 机制可用于自动更新用户界面元素。\n\
    \n### 注册观察者\n\n要接收变更通知，观察者必须使用 `addObserver:forKeyPath:options:context:` 方法向被观察对象注册。注册仅对给定的键路径有效，这意味着它仅对该命名的属性或关系有效。其优势在于，你可以非常精细地控制哪些通知会被触发。\n\
    \n通过指定你希望在通知中接收的信息，选项提供了更细粒度的控制。表 10-1 列出了这些选项，它们可以通过按位或运算进行组合。\n\n![images](img/t1001.jpg)\n\
    \n在 MyStash 中，你将添加一个针对 `System` 实体的观察者。打开 `PasswordListViewController.m`，编辑 `configureCell:atIndexPath:`\
    \ 方法来添加观察者，如 Listing 10–22 所示。\n\n**代码清单 10–22.** *为 `name` 属性的变更添加观察者*\n\n```\n\
    - (void)configureCell:(UITableViewCell *)cell atIndexPath:(NSIndexPath *)indexPath\n\
    {\n  NSManagedObject *system = [self.fetchedResultsController objectAtIndexPath:indexPath];\n\
    \  cell.textLabel.text = [system valueForKey:@\"name\"];\n\n  // 为此对象注册 KVO\n\
    \  [system addObserver:self forKeyPath:@\"name\" options:NSKeyValueObservingOptionOld\
    \ |\nNSKeyValueObservingOptionNew context:nil];\n}\n```\n\n在本例中，你将 `PasswordListViewController`\
    \ 注册为 `name` 属性的观察者，并且希望在这个托管对象的属性被修改时接收旧值和新值。\n"
- fmt: "#### Receiving the Notifications\n\nTo receive notifications, the observer\
    \ must provide an implementation for the `observeValueForKeyPath:ofObject:change:context:`\
    \ method. This is the method that is called when a registered notification is\
    \ fired. Since `PasswordListViewController` is the observer, you add the method\
    \ in `PasswordListViewController.m`, as shown in [Listing 10–23](#Chapter10.html#list_10_23).\n\
    \n**Listing 10–23.** *Observing a change notification*\n\n```\n- (void)observeValueForKeyPath:(NSString\
    \ *)keyPath ofObject:(id)object\n                        change:(NSDictionary\
    \ *)change context:(void *)context\n{\n  NSLog(@\"Changed value for %@: %@ ->\
    \ %@\", keyPath,\n        [change objectForKey:NSKeyValueChangeOldKey],\n    \
    \    [change objectForKey:NSKeyValueChangeNewKey]);\n}\n```\n\nThe `change` dictionary\
    \ contains the modifications. Since you asked for both the old and new values\
    \ when you registered the observer, you can extract both values from the dictionary.\n\
    \nLaunch the application, and open the output console. Edit an existing password\
    \ by changing the system name, and then save the change. You will see output in\
    \ the console to show that the notification was received, like so:\n\n`2011-08-20\
    \ 07:46:35.047 MyStash[11493:f503] Changed value for name: TouchPad -> iPad`\n\
    \nNote that the change doesn't happen until you save the change and the context\
    \ is saved.\n\nThe KVO mechanism provides you a simple way to respond to changes\
    \ in your application's data.\n\n### Seeding Data\n\nA question we hear often\
    \ concerns how to distribute a persistent store that already contains some data.\
    \ Many applications, for example, include a list of values for the user to pick\
    \ from to categorize the data they enter, and developers need to populate the\
    \ data store with those values. You can approach this problem in several ways,\
    \ including creating a SQLite database yourself and distributing that with your\
    \ application instead of allowing Core Data to create the database itself, but\
    \ this approach has its drawbacks, especially if a future version of your application\
    \ augments this list of values. You really shouldn't overwrite the user's database\
    \ file with a new, otherwise blank one that has more values in its list.\n\nWhat,\
    \ then, is a simple approach that allows for future change? If you've been following\
    \ along with the examples in this book, you've already preloaded data into your\
    \ data stores many times. Think about all the applications in this book that don't\
    \ have user interfaces and how you got data into those. That's right: you created\
    \ managed objects in code and then saved the managed object context. If you extend\
    \ this approach a bit with a version to identify the data that's been loaded,\
    \ you can easily determine in code whether to add more values in the future. In\
    \ this section, you learn how to seed data into a Core Data–created persistent\
    \ store in a way that allows you to change the preseeded data in future versions\
    \ of your application.\n\n#### Adding Categories to Passwords\n\nTo demonstrate\
    \ seeding a list of values in the data store, you'll add a category to the passwords\
    \ in the MyStash application. Open the data model for MyStash, and add an entity\
    \ named `Category` with a nonoptional attribute of type String called `name`.\
    \ Add this new entity to the `Passwords` configuration. Add a to-many relationship\
    \ called `systems` that has the `System` entity as its destination, and add an\
    \ inverse relationship called `category` to the `System` entity.\n\nTo support\
    \ versioning, add another entity called `List` with two non-optional attributes:\
    \ a String called `name` and an Integer 16 called `version`. Add it to the `Passwords`\
    \ configuration.\n\nYour data model should look like [Figure 10–25](#Chapter10.html#fig_10_25).\n\
    \n![images](images/1025.jpg)\n\n**Figure 10–25.** *The updated MyStash data model\
    \ for seeding data*\n\nAdd the following three method declarations to `AppDelegate.h`:\
    \ one to load the data, one to save the context, and a helper to create a `Category`\
    \ managed object:\n\n```\n- (void)loadData;\n- (void)saveContext;\n- (NSManagedObject\
    \ *)addCategoryWithName:(NSString *)name;\n```\n\nAdd a call to the `loadData:`\
    \ method in `AppDelegate.m`, in the `application:didFinishLaunchingWithOptions:`\
    \ method, as the first line in that method.\n\nThen, implement the method. It\
    \ should do the following:\n\n1.  Fetch the version number for the `category`\
    \ entry in the `List` entity, creating the entry if it doesn't exist.\n2.  Based\
    \ on the version number, determine which category managed objects to create and\
    \ create them.\n3.  Update the version number.\n4.  Save the managed object context.\n\
    \nThe code for the `loadData:` is shown in [Listing 10–24](#Chapter10.html#list_10_24).\n\
    \n**Listing 10–24.** *The `loadData:` implementation*\n\n```\n#pragma mark - Seed\
    \ Data\n\n- (void)loadData\n{\n  // Get the version object for \"category\"\n\
    \  NSManagedObjectContext *context = [self managedObjectContext];\n  NSFetchRequest\
    \ *request = [[NSFetchRequest alloc] init];\n  [request setEntity:[NSEntityDescription\
    \ entityForName:@\"List\"\n                            inManagedObjectContext:context]];\n\
    \  [request setPredicate:[NSPredicate predicateWithFormat:@\"name = 'category'\"\
    ]];\n  NSArray *results = [context executeFetchRequest:request error:nil];\n\n\
    \  // Get the version number. If it doesn't exist, create it and set version to\
    \ 0\n  NSManagedObject *categoryVersion = nil;\n  NSInteger version = 0;\n  if\
    \ ([results count] > 0)\n  {\n    categoryVersion = (NSManagedObject *)[results\
    \ objectAtIndex:0];\n    version = [(NSNumber *)[categoryVersion valueForKey:@\"\
    version\"] intValue];\n  }\n  else\n  {\n    categoryVersion = [NSEntityDescription\
    \ insertNewObjectForEntityForName:@\"List\"\n                                \
    \            inManagedObjectContext:context];\n    [categoryVersion setValue:@\"\
    category\" forKey:@\"name\"];\n    [categoryVersion setValue:[NSNumber numberWithInt:0]\
    \ forKey:@\"version\"];\n  }\n\n  // Create the categories to get to the latest\
    \ version\n  if (version < 1)\n  {\n    [self addCategoryWithName:@\"Web Site\"\
    ];\n    [self addCategoryWithName:@\"Desktop Software\"];\n  }\n\n  // Update\
    \ the version number and save the context\n  [categoryVersion setValue:[NSNumber\
    \ numberWithInt:1] forKey:@\"version\"];\n  [self saveContext];\n}\n```\n\nYou\
    \ can see that the code fetches the entry for category in the `List` entity and\
    \ creates it if it doesn't exist. It pulls the version number for that entry to\
    \ determine which version of the category list has been loaded. The first time\
    \ you run this, the version will be set to zero. The code then adds the categories\
    \ it should based on the version number and updates the version number to the\
    \ latest so that subsequent runs won't append data that has already been loaded."
  raw: '#### Receiving the Notifications


    To receive notifications, the observer must provide an implementation for the
    `observeValueForKeyPath:ofObject:change:context:` method. This is the method that
    is called when a registered notification is fired. Since `PasswordListViewController`
    is the observer, you add the method in `PasswordListViewController.m`, as shown
    in [Listing 10–23](#Chapter10.html#list_10_23).


    **Listing 10–23.** *Observing a change notification*


    **`- (void)observeValueForKeyPath:(NSString *)keyPath ofObject:(id)object`**

    **`                        change:(NSDictionary *)change context:(void *)context`**

    **`{`**

    **`  NSLog(@"Changed value for %@: %@ -> %@", keyPath,`**

    **`        [change objectForKey:NSKeyValueChangeOldKey],`**

    **`        [change objectForKey:NSKeyValueChangeNewKey]);`**

    **`}`**


    The `change` dictionary contains the modifications. Since you asked for both the
    old and new values when you registered the observer, you can extract both values
    from the dictionary.


    Launch the application, and open the output console. Edit an existing password
    by changing the system name, and then save the change. You will see output in
    the console to show that the notification was received, like so:


    `2011-08-20 07:46:35.047 MyStash[11493:f503] Changed value for name: TouchPad
    -> iPad`


    Note that the change doesn''t happen until you save the change and the context
    is saved.


    The KVO mechanism provides you a simple way to respond to changes in your application''s
    data.


    ### Seeding Data


    A question we hear often concerns how to distribute a persistent store that already
    contains some data. Many applications, for example, include a list of values for
    the user to pick from to categorize the data they enter, and developers need to
    populate the data store with those values. You can approach this problem in several
    ways, including creating a SQLite database yourself and distributing that with
    your application instead of allowing Core Data to create the database itself,
    but this approach has its drawbacks, especially if a future version of your application
    augments this list of values. You really shouldn''t overwrite the user''s database
    file with a new, otherwise blank one that has more values in its list.


    What, then, is a simple approach that allows for future change? If you''ve been
    following along with the examples in this book, you''ve already preloaded data
    into your data stores many times. Think about all the applications in this book
    that don''t have user interfaces and how you got data into those. That''s right:
    you created managed objects in code and then saved the managed object context.
    If you extend this approach a bit with a version to identify the data that''s
    been loaded, you can easily determine in code whether to add more values in the
    future. In this section, you learn how to seed data into a Core Data–created persistent
    store in a way that allows you to change the preseeded data in future versions
    of your application.


    #### Adding Categories to Passwords


    To demonstrate seeding a list of values in the data store, you''ll add a category
    to the passwords in the MyStash application. Open the data model for MyStash,
    and add an entity named `Category` with a nonoptional attribute of type String
    called `name`. Add this new entity to the `Passwords` configuration. Add a to-many
    relationship called `systems` that has the `System` entity as its destination,
    and add an inverse relationship called `category` to the `System` entity.


    To support versioning, add another entity called `List` with two non-optional
    attributes: a String called `name` and an Integer 16 called `version`. Add it
    to the `Passwords` configuration.


    Your data model should look like [Figure 10–25](#Chapter10.html#fig_10_25).


    ![images](images/1025.jpg)


    **Figure 10–25.** *The updated MyStash data model for seeding data*


    Add the following three method declarations to `AppDelegate.h`: one to load the
    data, one to save the context, and a helper to create a `Category` managed object:


    **`- (void)loadData;`**

    **`- (void)saveContext;`**

    **`- (NSManagedObject *)addCategoryWithName:(NSString *)name;`**


    Add a call to the `loadData:` method in `AppDelegate.m`, in the `application:didFinishLaunchingWithOptions:`
    method, as the first line in that method.


    Then, implement the method. It should do the following:


    1.  Fetch the version number for the `category` entry in the `List` entity, creating
    the entry if it doesn''t exist.

    2.  Based on the version number, determine which category managed objects to create
    and create them.

    3.  Update the version number.

    4.  Save the managed object context.


    The code for the `loadData:` is shown in [Listing 10–24](#Chapter10.html#list_10_24).


    **Listing 10–24.** *The `loadData:` implementation*


    **`#pragma mark - Seed Data`**


    **`- (void)loadData`**

    **`{`**

    **`  // Get the version object for "category"`**

    **`  NSManagedObjectContext *context = [self managedObjectContext];`**

    **`  NSFetchRequest *request = [[NSFetchRequest alloc] init];`**

    **`  [request setEntity:[NSEntityDescription entityForName:@"List"`![images](images/U002.jpg)**

    **`inManagedObjectContext:context]];`**

    **`  [request setPredicate:[NSPredicate predicateWithFormat:@"name = ''category''"]];`**

    **`  NSArray *results = [context executeFetchRequest:request error:nil];`**


    **`  // Get the version number. If it doesn''t exist, create it and set version
    to 0`**

    **`  NSManagedObject *categoryVersion = nil;`**

    **`  NSInteger version = 0;`**

    **`  if ([results count] > 0)`**

    **`  {`**

    **`    categoryVersion = (NSManagedObject *)[results objectAtIndex:0];`**

    **`    version = [(NSNumber *)[categoryVersion valueForKey:@"version"] intValue];`**

    **`  }`**

    **`  else`**

    **`  {`**

    **`    categoryVersion = [NSEntityDescription insertNewObjectForEntityForName:@"List"`![images](images/U002.jpg)**

    **`inManagedObjectContext:context];`**

    **`    [categoryVersion setValue:@"category" forKey:@"name"];`**

    **`    [categoryVersion setValue:[NSNumber numberWithInt:0] forKey:@"version"];`**

    **`  }`**


    **`  // Create the categories to get to the latest version`**

    **`  if (version < 1)`**

    **`  {`**

    **`    [self addCategoryWithName:@"Web Site"];`**

    **`    [self addCategoryWithName:@"Desktop Software"];`**

    **`  }`**


    **`  // Update the version number and save the context`**

    **`  [categoryVersion setValue:[NSNumber numberWithInt:1] forKey:@"version"];`**

    **`  [self saveContext];`**

    **`}`**


    You can see that the code fetches the entry for category in the `List` entity
    and creates it if it doesn''t exist. It pulls the version number for that entry
    to determine which version of the category list has been loaded. The first time
    you run this, the version will be set to zero. The code then adds the categories
    it should based on the version number and updates the version number to the latest
    so that subsequent runs won''t append data that has already been loaded.'
  trans: "\n#### 接收通知\n\n要接收通知，观察者必须为 `observeValueForKeyPath:ofObject:change:context:`\
    \ 方法提供实现。当已注册的通知被触发时，会调用此方法。由于 `PasswordListViewController` 是观察者，因此需要在 `PasswordListViewController.m`\
    \ 中添加此方法，如代码清单 10–23 所示。\n\n**代码清单 10–23.** *观察变更通知*\n\n```\n- (void)observeValueForKeyPath:(NSString\
    \ *)keyPath ofObject:(id)object\n                        change:(NSDictionary\
    \ *)change context:(void *)context\n{\n  NSLog(@\"Changed value for %@: %@ ->\
    \ %@\", keyPath,\n        [change objectForKey:NSKeyValueChangeOldKey],\n    \
    \    [change objectForKey:NSKeyValueChangeNewKey]);\n}\n```\n\n`change` 字典包含了修改内容。由于在注册观察者时你同时请求了旧值和新值，因此可以从字典中提取这两个值。\n\
    \n启动应用程序，并打开输出控制台。通过更改系统名称来编辑一个现有密码，然后保存更改。你将在控制台中看到类似如下的输出，表明已收到通知：\n\n`2011-08-20\
    \ 07:46:35.047 MyStash[11493:f503] Changed value for name: TouchPad -> iPad`\n\
    \n请注意，直到你保存更改并且上下文被保存后，变更才会真正发生。\n\nKVO 机制为你提供了一种简单的方式，用以响应应用程序数据中的变更。\n\n###\
    \ 预填充数据\n\n我们经常听到的一个问题是如何分发一个已经包含一些数据的持久化存储。例如，许多应用程序会包含一个值列表，供用户选择以对输入的数据进行分类，而开发者需要将这些值填充到数据存储中。解决这个问题有几种方法，包括自行创建\
    \ SQLite 数据库并将其随应用程序一起分发，而不是让 Core Data 自行创建数据库，但这种方法有其缺点，尤其是当应用程序的未来版本扩充了此值列表时。你绝不应该用一个新的、其他方面空白但列表中有更多值的数据库文件来覆盖用户的数据库文件。\n\
    \n那么，一种既简单又能应对未来变更的方法是什么呢？如果你一直跟随本书中的示例进行操作，你已经多次将数据预加载到数据存储中了。想想本书中那些没有用户界面的应用程序，你是如何将数据放入其中的？没错：你在代码中创建了托管对象，然后保存了托管对象上下文。如果你对这个方法稍加扩展，增加一个版本号来标识已加载的数据，你就可以轻松地在代码中判断未来是否需要添加更多值。在本节中，你将学习如何将数据预填充到一个由\
    \ Core Data 创建的持久化存储中，并且这种方式允许你在应用程序的未来版本中修改预填充的数据。\n\n#### 为密码添加分类\n\n为了演示在数据存储中预填充一个值列表，你将给\
    \ MyStash 应用程序中的密码添加一个分类。打开 MyStash 的数据模型，添加一个名为 `Category` 的实体，它有一个非可选（必填）的 String\
    \ 类型属性 `name`。将此新实体添加到 `Passwords` 配置中。添加一个名为 `systems` 的对多关系，目标实体为 `System` 实体，并为\
    \ `System` 实体添加一个名为 `category` 的反向关系。\n\n为了支持版本管理，再添加一个名为 `List` 的实体，包含两个非可选属性：一个名为\
    \ `name` 的 String 类型属性和一个名为 `version` 的 Integer 16 类型属性。将其添加到 `Passwords` 配置中。\n\
    \n你的数据模型应类似于图 10–25。\n\n![images](img/1025.jpg)\n\n**图 10–25.** *为预填充数据而更新的 MyStash\
    \ 数据模型*\n\n在 `AppDelegate.h` 中添加以下三个方法声明：一个用于加载数据，一个用于保存上下文，以及一个用于创建 `Category`\
    \ 托管对象的辅助方法：\n\n```\n- (void)loadData;\n- (void)saveContext;\n- (NSManagedObject\
    \ *)addCategoryWithName:(NSString *)name;\n```\n\n在 `AppDelegate.m` 的 `application:didFinishLaunchingWithOptions:`\
    \ 方法中，作为该方法的第一个语句，添加对 `loadData:` 方法的调用。\n\n然后实现该方法。它应执行以下操作：\n\n1.  获取 `List`\
    \ 实体中 `category` 条目的版本号，如果该条目不存在则创建它。\n2.  根据版本号，确定要创建哪些 `Category` 托管对象并创建它们。\n\
    3.  更新版本号。\n4.  保存托管对象上下文。\n\n`loadData:` 方法的代码如代码清单 10–24 所示。\n\n**代码清单 10–24.**\
    \ *`loadData:` 的实现*\n\n```\n#pragma mark - Seed Data\n\n- (void)loadData\n{\n\
    \  // 获取 \"category\" 的版本对象\n  NSManagedObjectContext *context = [self managedObjectContext];\n\
    \  NSFetchRequest *request = [[NSFetchRequest alloc] init];\n  [request setEntity:[NSEntityDescription\
    \ entityForName:@\"List\"\n                            inManagedObjectContext:context]];\n\
    \  [request setPredicate:[NSPredicate predicateWithFormat:@\"name = 'category'\"\
    ]];\n  NSArray *results = [context executeFetchRequest:request error:nil];\n\n\
    \  // 获取版本号。如果不存在，则创建它并将版本号设为 0\n  NSManagedObject *categoryVersion = nil;\n \
    \ NSInteger version = 0;\n  if ([results count] > 0)\n  {\n    categoryVersion\
    \ = (NSManagedObject *)[results objectAtIndex:0];\n    version = [(NSNumber *)[categoryVersion\
    \ valueForKey:@\"version\"] intValue];\n  }\n  else\n  {\n    categoryVersion\
    \ = [NSEntityDescription insertNewObjectForEntityForName:@\"List\"\n         \
    \                                   inManagedObjectContext:context];\n    [categoryVersion\
    \ setValue:@\"category\" forKey:@\"name\"];\n    [categoryVersion setValue:[NSNumber\
    \ numberWithInt:0] forKey:@\"version\"];\n  }\n\n  // 创建分类以达到最新版本\n  if (version\
    \ < 1)\n  {\n    [self addCategoryWithName:@\"Web Site\"];\n    [self addCategoryWithName:@\"\
    Desktop Software\"];\n  }\n\n  // 更新版本号并保存上下文\n  [categoryVersion setValue:[NSNumber\
    \ numberWithInt:1] forKey:@\"version\"];\n  [self saveContext];\n}\n```\n\n你可以看到，代码获取了\
    \ `List` 实体中的 category 条目，如果不存在则创建它。它获取该条目的版本号，以确定已加载的是哪个版本的分列列。首次运行时，版本号将被设为零。然后，代码根据版本号添加相应的分类，并将版本号更新到最新，以便后续运行不会追加已经加载过的数据。\n"
- fmt: '**NOTE:** For the purpose of demonstrating the mechanism, we coded our seed
    data by hand. In a real application, you should consider pulling the lists from
    some text file or CSV file.


    [Listing 10–25](#Chapter10.html#list_10_25) shows the helper method for adding
    categories, `addCategoryWithName:`, which simply inserts a `Category` entity with
    the specified name into the managed object context.


    **Listing 10–25.** *Method to add a category*


    ```

    - (NSManagedObject *)addCategoryWithName:(NSString *)name

    {

      NSManagedObject *category = [NSEntityDescription insertNewObjectForEntityForName:@"Category"
    inManagedObjectContext:[self managedObjectContext]];

      [category setValue:name forKey:@"name"];

      return category;

    }

    ```


    Build and run the application, and then open `Passwords.sqlite` using `sqlite3`.
    If you run the `.schema` command, you''ll see that the new tables for `Category`
    and `List` are present.


    ```

    CREATE TABLE ZCATEGORY ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER,
    ZNAME VARCHAR );

    CREATE TABLE ZLIST ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER, ZVERSION
    INTEGER, ZNAME VARCHAR );

    ```


    The version number for the category list has been created.


    ```

    sqlite> select zversion from zlist where zname=''category'';

    1

    ```


    Finally, the expected categories have been loaded.


    ```

    sqlite> select * from zcategory;

    1|1|1|Web Site

    2|1|1|Desktop Software

    ```


    You have successfully seeded your data store with category values. You can quit
    and rerun the application, and you''ll notice that your versioning prevents these
    values from reloading and duplicating what''s already been loaded.


    ### Creating a New Version of Seeded Data


    Suppose you want to add credit card PINs as a category. Adding a version to this
    code is simple. You simply add another `if` statement, guarded by the new version
    number, and change the version number that''s written to the database. You want
    to add the entries cumulatively so that if you''re running the application for
    the first time, you get the categories for both versions 1 and 2, but if you''re
    already at version 1, the code loads only the values for version 2. Finally, you
    update the version number in the data store to reflect the version currently loaded.
    [Listing 10–26](#Chapter10.html#list_10_26) shows the updated code in the `loadData:`
    method.


    **Listing 10–26.** *Adding version 2 of the seeded data*


    ```

    - (void)loadData

    {

      ...

      // Create the categories to get to the latest version

      if (version < 1)

      {

        [self addCategoryWithName:@"Web Site"];

        [self addCategoryWithName:@"Desktop Software"];

      }

      if (version < 2)

      {

        [self addCategoryWithName:@"Credit Card PIN"];

      }


      // Update the version number and save the context

      [categoryVersion setValue:[NSNumber numberWithInt:2] forKey:@"version"];

      [self saveContext];

    }

    ```


    We haven''t updated the MyStash user interface to use the categories—we leave
    that as an exercise for you.


    ### Error Handling


    When you ask Xcode to generate a Core Data application for you, it creates boilerplate
    code for every vital aspect of talking to your Core Data persistent store. This
    code is more than adequate for setting up your persistent store coordinator, your
    managed object context, and your managed object model. In fact, if you go back
    to a non–Core Data project and add Core Data support, you''ll do well to drop
    in the same code, just as Xcode generates it, to manage Core Data interaction.
    The code is production-ready.


    That is, it is production-ready except in one aspect: error handling.


    The Xcode-generated code alerts you to this shortcoming with a comment that says
    this:


    ```

    /*

    Replace this implementation with code to handle the error appropriately.


    abort() causes the application to generate a crash log and terminate. You should
    not use this function in a shipping application, although it may be useful during
    development. If it is not possible to recover from the error, display an alert
    panel that instructs the user to quit the application by pressing the Home button.


    Typical reasons for an error here include:

    * The persistent store is not accessible;

    * The schema for the persistent store is incompatible with current managed object
    model.

    Check the error message to determine what the actual problem was.


    If the persistent store is not accessible, there is typically something wrong
    with the file path. Often, a file URL is pointing into the application''s resources
    directory instead of a writeable directory.


    If you encounter schema incompatibility errors during development, you can reduce
    their frequency by:

    * Simply deleting the existing store:

    [[NSFileManager defaultManager] removeItemAtURL:storeURL error:nil]


    * Performing automatic lightweight migration by passing the following dictionary
    as the options parameter:

    [NSDictionary dictionaryWithObjectsAndKeys:[NSNumber numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption,
    [NSNumber numberWithBool:YES], NSInferMappingModelAutomaticallyOption, nil];


    Lightweight migration will only work for a limited set of schema changes; consult
    "Core Data Model Versioning and Data Migration Programming Guide" for details.

    */

    ```


    The Xcode-generated implementation logs the error and aborts the application,
    which is a decidedly unfriendly approach. All users see when this happens is your
    application abruptly disappearing, without any clue as to why. If this happens
    in a shipping application, you''ll get poor reviews and low sales.


    Happily, however, you don''t have to fall into this trap of logging and crashing.
    In this section, you will explore strategies for handling errors in Core Data.
    No one strategy is the best, but this section should spark ideas for your specific
    applications and audiences and help you devise an error-handling strategy that
    makes sense.


    Errors in Core Data can be divided into two major categories:


    *   Errors in normal Core Data operations

    *   Validation errors


    The next sections will discuss strategies for handling both types of errors.'
