    Add a category for the `configureCell:atIndexPath:` method at the top of `AllPlayerViewController.m`:,
    like so;


    **`@interface AllPlayerViewController ()`**

    **`- (void)configureCell:(UITableViewCell *)cell atIndexPath:(NSIndexPath *)indexPath;`**

    **`@end`**


    Before you can run the application, however, you must set the managed object context
    for the `NSFetchedResultsController` instance to use. Connect the `managedObjectContext`
    by editing the `initWithStyle:` method:


    `- (id)initWithStyle:(UITableViewStyle)style`

    `{`

    `    self = [super initWithStyle:style];`

    `    if (self) {`

    `      self.title = @"Players";`

    `      self.tabBarItem.image = [UIImage imageNamed:@"players.png"];`

    **`id delegate = [[UIApplication sharedApplication] delegate];`**

    **`self.managedObjectContext = [delegate managedObjectContext];`**

    `    }`

    `    return self;`

    `}`


    Now, you can build and run the application. If you tap on the Players tab, you
    should see all the players in your persistent store, grouped into sections by
    team name (see [Figure 9–5](#Chapter09.html#fig_9_5)).


    ![images](images/0905.jpg)


    **Figure 9–5.** *League Manager with the players listed*


    ### Implementing the NSFetchedResultsControllerDelegate Protocol


    The `NSFetchedResultsControllerDelegate` protocol declares five optional methods
    that allow you to modify behavior or respond to change with respect to your `NSFetchedResultsController`
    instance. Four of these methods deal with changes to the underlying data, while
    one deals with the strings used for indices in an indexed table. Make the `AllPlayerViewController`
    your delegate for its `NSFetchedResultsController`, first by modifying `AllPlayerViewController.h`
    to declare that `AllPlayerViewController` implements the `NSFetchedResultsControllerDelegate`
    protocol, like this:


    `@interface AllPlayerViewController : UITableViewController`

    **`<NSFetchedResultsControllerDelegate>`**


    Then, go back to the `fetchedResultsController:` accessor and, instead of setting
    the delegate for the `fetchedResultsController` to `nil`, set it to `self`:


    `NSFetchedResultsController *aFetchedResultsController = [[NSFetchedResultsController
    alloc] initWithFetchRequest:fetchRequest managedObjectContext:self.managedObjectContext
    sectionNameKeyPath:@"team.name" cacheName:@"AllPlayer"];`

    `aFetchedResultsController.delegate = self;`

    `self.fetchedResultsController = aFetchedResultsController;`


    The `AllPlayerViewController` instance is now the delegate for the `fetchedResultsController`
    member, and you can implement the five delegate methods in the `AllPlayerViewController`
    class to change some behaviors. Let''s look at the method that deals with indices
    first.


    #### Indexing Your Table


    An iOS table view can display an index along the right side of the table. Tapping
    on the index allows you to jump through the table without having to scroll through
    all the table rows. See, for example, the Contacts app, which displays the alphabet
    (plus a search icon and an octothorpe) along the right side of the All Contacts
    view. Tap any letter in that list to jump directly to the section of contacts
    whose last names begin with that letter. iOS calls that list of letters an *index*,
    similar to an index in the back of a book that lets you look up and jump to specific
    pages in the book that refer to what you seek.


    To make your table view display an index, you implement two methods from the `UITableViewDataSource`
    protocol. The first, `sectionIndexTitlesForTableView:`, returns an `NSArray` containing
    all the index titles that the table should display. In the case of the Contacts
    app, this is the letters A-Z. The second, `sectionForSectionIndexTitle:atIndex:`,
    returns the section number of the section that corresponds to the specified section
    index; you get both the index''s title and its index to help you determine which
    section to return. This second method is called when the user taps the index on
    the right side of the table, so the app can determine where to jump to in the
    table.


    `NSFetchedResultsController` provides methods to help you implement these two
    methods: one that returns all the section index titles, called `sectionIndexTitles:`,
    and one that returns the section number for the specified index title and index,
    called `sectionForSectionIndexTitle:atIndex:`. You''ll use these methods to implement
    an index in the all player view. Add the following code to `AllPlayerViewController.m`:


    **`- (NSArray *)sectionIndexTitlesForTableView:(UITableView *)tableView {`**

    **`return [self.fetchedResultsController sectionIndexTitles];`**

    **`}`**


    **`- (NSInteger)tableView:(UITableView *)tableView sectionForSectionIndexTitle:(NSString
    *)title atIndex:(NSInteger)index {`**

    **`return [self.fetchedResultsController sectionForSectionIndexTitle:title atIndex:index];`**

    **`}`**


    Run the app again to view the index along the right side of the table, as shown
    in [Figure 9–6](#Chapter09.html#fig_9_6). The letters B-C-L-M-O along the right
    edge represent the index. Tap the O at the bottom to scroll directly to the “O”
    section, as shown in [Figure 9–7](#Chapter09.html#fig_9_7).


    ![images](images/0906.jpg)


    **Figure 9–6.** *The all-player view with an index*


    ![images](images/0907.jpg)


    **Figure 9–7.** *The all-player view after tapping on the O in the index*


    An `NSFetchedResultsController` instance defaults to supplying the initial letter
    of the section name only for the index titles, as you''ve just seen. What if,
    instead of showing only the first letter, you wanted to show the first three letters
    of a section''s name? The `NSFetchedResultsControllerDelegate` protocol has a
    method, added in iOS 4.0, called `controller:sectionIndexTitleForSectionName:`,
    that allows you to customize what shows in the index for a section. Prior to iOS
    4.0, to customize what displays in the table index, you had to create your own
    `NSFetchedResultsController` subclass and override that method. Using the delegate
    method is a friendlier approach.


    When the `controller:sectionIndexTitleForSectionName:` method is called, it''s
    passed the section name as an `NSString`, and it returns the index you want to
    be displayed as an `NSString`. Add the following code to `AllPlayerViewController`
    to use up to the first three letters of the section name as the index title:


    **`- (NSString *)controller:(NSFetchedResultsController *)controller sectionIndexTitleForSectionName:(NSString
    *)sectionName {`**

    **`return [sectionName substringToIndex:MIN([sectionName length], 3)];`**

    `}`


    iOS seems to cache index names aggressively, however, even across invocations
    of your application. If you build and run your application, you''ll probably still
    see single-letter index names, as your index names are read from cache and the
    method you just wrote isn''t being called. To purge the cache and fix this problem,
    call a static method on `NSFetchedResultsController` called `deleteCacheWithName:`,
    passing the name of your cache. Add this call right before you fetch the results
    in your `fetchedResultsController:` accessor, like this:


    **`[NSFetchedResultsController deleteCacheWithName:@"AllPlayer"];`**


    `// Fetch the data`

    `NSError *error = nil;`

    `if (![self.fetchedResultsController performFetch:&error]) {`

    `  NSLog(@"Unresolved error %@, %@", error, [error userInfo]);`

    `  abort();`

    `}`


    Build and run your application, and you should see the names of your indices updated
    to show up to the first three letters of the team names, as shown in [Figure 9–8](#Chapter09.html#fig_9_8).


    ![images](images/0908.jpg)


    **Figure 9–8.** *The all-player view with three-letter index names*'
