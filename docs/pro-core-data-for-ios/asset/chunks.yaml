    NSManagedObject *john = [NSEntityDescription insertNewObjectForEntityForName:@\"\
    Person\"\n                                              inManagedObjectContext:self.managedObjectContext];\n\
    [john setValue:@\"John\" forKey:@\"name\"];\n[john setValue:[NSNumber numberWithInt:[@\"\
    John\" hash]] forKey:@\"id\"];\n\nNSManagedObject *jane = [NSEntityDescription\
    \ insertNewObjectForEntityForName:@\"Person\"\n                              \
    \                inManagedObjectContext:self.managedObjectContext];\n[jane setValue:@\"\
    Jane\" forKey:@\"name\"];\n[jane setValue:[NSNumber numberWithInt:[@\"Jane\" hash]]\
    \ forKey:@\"id\"];\n\nNSManagedObject *bill = [NSEntityDescription insertNewObjectForEntityForName:@\"\
    Person\"\n                                              inManagedObjectContext:self.managedObjectContext];\n\
    [bill setValue:@\"Bill\" forKey:@\"name\"];\n[bill setValue:[NSNumber numberWithInt:[@\"\
    Bill\" hash]] forKey:@\"id\"];\n```\n\n现在您有了一个组织机构和三个互不关联的人员。组织结构图应该将 John 设为公司的领导者，而\
    \ Jane 和 Bill 则向 John 汇报。`OrgChart` 应用的数据模型有两种类型的关系。领导者是 `Organization` 与 `Person`\
