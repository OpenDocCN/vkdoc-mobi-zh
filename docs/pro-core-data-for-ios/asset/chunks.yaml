    ### 设计数据库


    美国哲学家拉尔夫·沃尔多·爱默生曾言：“愚蠢的一致性是思想狭隘者的小鬼。”人们常引用这句话来为粗心大意或忽视细节辩护。我们希望在既声称 Core Data
    不是数据库，又将其当作数据库使用的自相矛盾中，不要落入这个陷阱。本节将讨论如何设计数据结构，并将此过程类比为建模关系型数据库，这不仅极大地有助于讨论，也有助于最终的设计。然而，这种类比在某些地方会失效——正如所有类比都会有的那样——我们会在讨论中明确指出这些地方。


    Core Data 的实体描述在外观、行为、气味和感觉上都极其类似关系型数据库中的表。属性看起来像表中的列，关系感觉像主键和外键上的连接，而实体则像行。如果你的模型位于
    SQLite 持久化存储之上，那么 Core Data 实际上会将实体描述、属性、关系和实体实现为你所期望的数据库结构，正如第 2 章和第 3 章所展示的那样。但请记住，你的数据可以仅存在于内存中，或存在于某些没有表、行、列或主键、外键的平面文件原子存储中。Core
    Data 将数据结构从关系型数据库结构中抽象出来，简化了你建模和与数据交互的方式。请在理解 Core Data 建模方式的思维模型中允许这种抽象存在，否则你的
    Core Data 模型将充满冗余，行事与 Core Data 相悖，并产生次优的数据结构。


    具有数据建模经验的 Core Data 新手通常会抱怨缺少自动递增字段类型，认为他们有责任像在传统数据建模中那样为每个表定义主键。Core Data 没有自动递增类型，因为你根本不需要定义任何主键。Core
    Data 承担起建立和维护每个托管对象（即“行”）唯一性的责任。没有主键也意味着没有外键；Core Data 管理实体（即“表”）之间的关系，并为你执行所有必要的连接操作。请迅速克服不定义主键和外键带来的不适感，因为纠结于这个实现细节并不值得你花费精力或感到焦虑。


    另一个过度依赖数据库建模知识可能导致与 Core Data 设计理念相悖的地方在于多对多关系。例如，考虑一下如果 League Manager 应用程序中的玩家可以属于多个球队。如果真是这样，每个球队可以有多个球员，而每个球员也可以为多个球队效力。如果你在创建传统的关系型数据模型，你会创建三个表：一个用于球队，一个用于球员，另一个用于跟踪每个球队-球员关系。在
    Core Data 中，你仍然只需要两个实体：`Team` 和 `Player`，然后将从 `Player` 到 `Team` 的关系改为多对多关系。Core
    Data 在 SQLite 数据库中仍然会将其实现为三个表：`ZTEAM`、`ZPLAYER` 和 `Z1TEAMS`，但这只是一个实现细节。你不需要知道第三个表的存在，因为
    Core Data 会为你处理这一切。


    **提示：** 在创建 Core Data 模型时，请记住一条经验法则：关注数据本身，而非数据存储机制。


    #### 关系型数据库规范化


    关系型数据库理论推崇一种名为*规范化*的数据模型设计流程，其目标是减少或消除冗余，并提供对数据库内部数据的高效访问。规范化过程分为五个层级，或称*范式*，第六范式的研究仍在继续。这五个范式的定义只有逻辑学家才会喜爱，或许甚至只有他们才能理解；这些定义大致如下：


    > *“一个关系 R 满足第四范式（4NF）当且仅当，只要在 R 中存在一个多值依赖（MVD），比如 A -> -> B，那么 R 的所有其他属性也都函数依赖于
    A。换句话说，R 中唯一的依赖关系（函数依赖 FD 或多值依赖 MVD）都是 K -> X 的形式（即从候选键 K 到某些其他属性 X 的函数依赖）。等价地：R
    满足 4NF 当且仅当它满足 BCNF，并且 R 中的所有 MVD 实际上都是 FD。”*

    >

    > *(`www.databasedesign-resource.com/normal-forms.html`)*


    我们既没有足够的篇幅，也没有意向来逐一讲解每个范式的形式化定义并解释其含义。相反，本节将结合 Core Data 来描述每个范式，并提供数据建模建议。请注意，满足某个给定的范式，需要先满足它之前的所有范式。


    符合第一范式（1NF）的数据库被认为是规范化的。要符合这一规范化级别，数据库中的每一行必须具有相同数量的字段。对于 Core Data 模型而言，这意味着每个托管对象应具有相同数量的属性。由于
    Core Data 不允许你在实体中创建可变数量的属性，因此你的 Core Data 模型会自动满足第一范式。


    第二范式（2NF）和第三范式（3NF）处理非键字段与键字段之间的关系，规定非键字段应是对其所属的整个键字段的事实的描述。由于你的 Core Data 模型没有键字段，你理应不会遇到这些问题。不过，你应该确保给定实体的所有属性都描述的是该实体本身，而非其他事物。例如，`Player`
    实体不应包含 `uniformColor` 字段，因为队服颜色描述的是球队，而非某个独立的球员。


    接下来的两个范式，第四范式（4NF）和第五范式（5NF），在 Core Data 的世界中可以视为同一个范式。它们涉及减少或消除数据冗余，促使你将多值属性移至单独的实体，并在实体间创建多对多关系。用
    Core Data 的术语来说，4NF 规定实体不应拥有可以取多个值的属性。相反，你应该将这些属性移至一个单独的实体，并在实体间创建多对多关系。例如，考虑上一章中
    League Manager 应用程序模型中的球队和球员。一个违反 4NF 和 5NF 的模型会拥有一个单独的实体 `Team`，并额外添加一个属性：`player`。接着我们为每个球员创建一个新的
    `Team` 托管对象，这样就会产生多个冗余的 `Team` 对象。相反，League Manager 的数据模型将球员移至一个 `Player` 实体，并在每个球队及其球员之间创建了一个名为
    `players` 的多对多关系。


    在 Core Data 应用程序中创建模型时，请牢记数据库建模原则，并考虑通过将多值属性移至单独的实体来消除冗余。例如，在 League Manager 数据模型中，`Team`
    的 `uniformColor` 属性就提供了一个规范化的机会。命名颜色代表一个有限的集合（无论 Crayola 蜡笔公司声称什么），因此你可以创建一个名为
    `Color` 的实体，它有一个名为 `name` 的属性，并通过多对多关系与球队相关联。

    '
- fmt: '### Using the Xcode Data Modeler


    Some developers simply accept the tools given to them. Others build tools only
    when they believe the existing tools are inferior. A few, however, stubbornly
    insist on building all their own tools. We tend to fall into this last category
    of developers, and our colleagues know us as programmers who use only tools we
    build ourselves. We take pride in building tools and even hold celebrations after
    broadcasting the amount of time the tools save. We never tally the time it takes
    to build the tools, filing that time under “play time” because of our enjoyment
    for building tools. Surprisingly, however, writing a data modeler tool for Core
    Data never crossed our minds, probably because Xcode does a reasonable job of
    allowing you to model data. It’s by no means flawless, but it does work, and it’s
    perfectly integrated with the development environment, an attribute that even
    we would never be able to surpass with a tool we built. In fact, Xcode ships with
    a built-in data modeling tool that makes it easy to create data models visually
    rather than programming the `NSManagedObjectModel` by hand. You’ve gotten glimpses
    at this tool several times in the prior chapters. In this section, we spend less
    time dealing with how Core Data works and a little bit more time looking at the
    tool and how to use it.


    In this section, you won’t produce any runnable code. Instead, you will focus
    on the data modeler’s user interface. To add a data model to a project in Xcode,
    select **File ![image](images/U001.jpg) New ![image](images/U001.jpg) New File**
    from the menu. In the iOS section on the left, select the Core Data subsection.
    It reveals three file types: Data Model, Mapping Model, and `NSManagedObject`
    subclass. Mapping models assist with migrating data across data model versions,
    which is covered in [Chapter 8](#Chapter08.html#ch8), and `NSManagedObject` subclasses
    generate classes from the entities in your models, which is covered in [Chapter
    5](#Chapter05.html#ch5). Select Data Model, as shown in [Figure 4–1](#Chapter04.html#fig_4_1),
    and click Next. Pick a name for the data model, and click Save. Xcode creates
    the data model for you.


    ![images](images/0401.jpg)


    **Figure 4–1.** *New data model file*


    Opening your new data model file in Xcode opens it in the data modeler interface.
    Rich in buttons and options, the Xcode data modeler interface can be confusing.
    Refer to [Figure 4–2](#Chapter04.html#fig_4_2), which annotates the user interface
    to summarize the buttons relevant to data modeling, to understand how to work
    with the modeler to model your data.


    ![images](images/0402.jpg)


    **Figure 4–2.** *The data modeler interface*


    The modeler allows you to navigate through the entities, attributes, relationships,
    fetch requests, and configurations of the data model. You get more details about
    the chosen artifacts as you select them. You can also toggle between the Table
    view, shown in [Figure 4–2](#Chapter04.html#fig_4_2), or an Entity-Relationship-like
    view that Xcode calls “Graph” view, shown in [Figure 4–3](#Chapter04.html#fig_4_3),
    by pressing the corresponding Editor Style button at the bottom of the Xcode window.


    ![images](images/0403.jpg)


    **Figure 4–3.** *The Graph view*


    To make the model more interesting to talk about, open the League Manager data
    model from [Chapter 3](#Chapter03.html#ch3). The Xcode interface should look similar
    to [Figure 4–4](#Chapter04.html#fig_4_4).


    ![images](images/0404.jpg)


    **Figure 4–4.** *The League Manager model in the Xcode data modeler*


    You can see that Xcode displays the entities and properties in table form by default.
    You may find working with the graph form, which you get by clicking the Graph
    View button above Editor Style, easier. The League Manager in Graph View looks
    like [Figure 4–5](#Chapter04.html#fig_4_5).


    ![images](images/0405.jpg)


    **Figure 4–5.** *The League Manager model in Graph View*


    The graph view resembles a traditional entity-relationship diagram familiar to
    data modelers. In the graph view, you can easily see how the entities relate to
    each other. You may notice that the relationship from `Team` to `Player` is double-headed.
    That is because it is a one-to-many relationship. A team may have several players.
    The inverse relationship from `Player` to `Team` is single-headed because it is
    a one-to-one relationship. A player has only one team at most. We tend to find
    the Table View easier for creating and changing the model and the Graph View better
    for visualizing the model, but you can develop your own approach.


    You can get more information about any entity or property by selecting it. [Figure
    4–4](#Chapter04.html#fig_4_4), for example, shows the `Player` entity selected.
    In the upper right, you can see details about the `Player` entity: it’s named
    `Player`, it’s of class `NSManagedObject`, it has no parent entity, and it isn’t
    abstract. If you select a property, that panel changes to display details for
    that property, appropriate to its type. If you select, for example, the `email`
    attribute for the `Player` entity, the panel changes to look like [Figure 4–6](#Chapter04.html#fig_4_6).
    You’ll see the following:


    - It’s named `email`.

    - It’s optional.

    - It’s not transient or indexed.

    - It’s of type `String`.

    - It has no minimum or maximum length.

    - It has no default value.

    - It has no attached regular expression.

    - It won’t be indexed in Spotlight.

    - It won’t be stored in an external record.


    ![images](images/0406.jpg)


    **Figure 4–6.** *Details for the email attribute*


    Switching the selection to the `team` relationship of `Player` changes the panel
    to show relationship-oriented detail, as shown in [Figure 4–7](#Chapter04.html#fig_4_7).
    From this view, you learn the following about the relationship:


    - It’s named `team`.

    - It has a destination of `Team`.

    - It has the inverse relationship named `players`.

    - It’s optional but not transient.

    - It isn’t a to-many relationship.

    - It has a minimum count of 1 and a maximum count of 1.

    - It uses the delete rule called Nullify.

    - It won’t be indexed in Spotlight.

    - It won’t be stored in an external record.


    ![images](images/0407.jpg)


    **Figure 4–7.** *Details for the team relationship*


    Let’s look at the details for the `Player` entity shown in [Figure 4–8](#Chapter04.html#fig_4_8).
    Entities are defined by their names. Core Data also allows you to subclass `NSManagedObject`
    to provide an alternate implementation class for your managed objects. If you
    create a subclass of `NSManagedObject` and want an entity mapped to that class,
    then you can specify the class name in the entity details pane.


    ![images](images/0408.jpg)


    **Figure 4–8.** *Entity details pane*


    ### Viewing and Editing Attribute Details


    Select an attribute from the Attributes section in the middle column of Xcode’s
    data modeling tool in order to switch the detail pane to display attribute details.


    [Table 4–1](#Chapter04.html#tab_4_1) explains the fields in the Attribute pane.
    The first column, Name, refers to the name of the field, while the Description
    column explains what this field means and how it’s used.


    ![image](images/t0401.jpg)'
