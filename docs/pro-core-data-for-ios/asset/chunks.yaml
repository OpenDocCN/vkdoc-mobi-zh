  trans: "\n`- (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
    \ *)indexPath {`  \n`  NSManagedObject *team = [[self fetchedResultsController]\
    \ objectAtIndexPath:indexPath];`  \n`  TeamViewController *teamViewController\
    \ = [[TeamViewController alloc]`  \n`initWithMasterController:self team:team];`\
    \  \n`  [self presentModalViewController:teamViewController animated:YES];`  \n\
    `}`\n\n构建应用并运行它。应用的界面与上次运行时相同，如图 3–15 所示。\n\n![images](img/0315.jpg)\n\n**图 3–15.**\
    \ *不包含任何球队的联赛管理器*\n\n然而，现在如果你点击`+`按钮，就会出现创建新球队的屏幕，如图 3–16 所示。\n\n尽管去添加几支球队，编辑一些球队，再删除一些球队。你可以关闭并重新启动应用，会发现球队的状态与退出应用时一致——它们都会被添加到你的\
    \ SQLite 数据存储中。你还会注意到，球队会按队伍名称的字母顺序排列。图 3–17 展示了一些示例球队，并显示了名称和队服颜色。\n\n![images](img/0316.jpg)\n\
    \n**图 3–16.** *向联赛管理器添加新球队*\n\n![images](img/0317.jpg)\n\n**图 3–17.** *包含球队的联赛管理器*\n\
    \n你可能会注意到，可以创建名称和队服颜色为空白的球队。如果这是一个真实的应用程序，你会采取措施防止用户创建没有名称甚至没有队服颜色的球队。然而，本章的重点仍然是不同的持久化存储选项，因此你特意省略了任何验证代码。你还会注意到，本章后面创建的球员用户界面也没有验证代码，因此你可以创建空白的球员。第\
    \ 5 章会讨论如何验证数据。\n\n退出应用，享受你迄今为止所取得的成果……然后你会意识到，你只完成了`Team`实体。你必须继续实现`Player`用户界面和实体，才能称为完整的联赛管理器应用！\n\
    \n#### 球员用户界面\n\n要实现`Player`用户界面，你需要两个视图及其对应的控制器：一个用于列出球队的球员，另一个用于添加新球员或编辑现有球员。这些控制器在很大程度上与`Team`的控制器类似，不过它们不包含`NSFetchedResultsController`，也不包含`MasterViewController`所拥有的其他\
    \ Core Data 类。取而代之的是，它们将 Core Data 的交互委托给`MasterViewController`。\n\n首先创建用于列出球队球员的控制器和视图。添加一个新的`UIViewController`子类，确保在“Subclass\
    \ of”下拉菜单中选择`UITableViewController`，并取消选中“With XIB for user interface”。将其命名为`PlayerListViewController`，然后将注意力转向`PlayerListViewController.h`文件。这个类负责列出球队的球员，因此需要引用它所管理球员的`Team`实体。此外，由于它将\
    \ Core Data 交互委托给`MasterViewController`类，因此还需要引用`MasterViewController`。该控制器会有一个用于添加新球员的`+`按钮，因此声明一个名为`showPlayerView:`的方法来响应这个按钮的点击。最后，由于它不使用`NSFetchedResultsController`实例来对球员进行排序，因此必须自行实现球员排序。为了实现所有这些功能，最终得到的`PlayerListViewController.h`文件如代码清单\
    \ 3–3 所示。\n\n**代码清单 3–3.** *PlayerListViewController.h*\n\n```\n#import <UIKit/UIKit.h>\n\
    \n@class MasterViewController;\n\n@interface PlayerListViewController : UITableViewController\
    \ {\n  NSManagedObject *team;\n  MasterViewController *masterController;\n}\n\
    @property (nonatomic, retain) NSManagedObject *team;\n@property (nonatomic, retain)\
    \ MasterViewController *masterController;\n\n- (id)initWithMasterController:(MasterViewController\
    \ *)aMasterController team:\n(NSManagedObject *)aTeam;\n- (void)showPlayerView;\n\
    - (NSArray *)sortPlayers;\n\n@end\n```\n\n你会在`PlayerListViewController.m`文件中看到`MasterViewController.m`的部分身影。打开文件，添加对`MasterViewController.h`的导入，以及`team`和`masterController`属性的`@synthesize`行。将生成的`initWithStyle:`方法修改为`initWithMasterController:`方法，该方法接受这两个属性并进行存储，代码示例如下：\n\
    \n```\n- (id)initWithMasterController:(MasterViewController *)aMasterController\
    \ team:\n(NSManagedObject *)aTeam {\n  if ((self = [super init])) {\n    self.masterController\
    \ = aMasterController;\n    self.team = aTeam;\n  }\n  return self;\n}\n```\n\n\
    Xcode 为你生成了一个`viewDidLoad:`方法。添加以下代码来适当地更新视图标题，并显示一个`+`按钮用于向球队添加球员。由于你尚未开始构建添加或编辑球员的用户界面，因此先将`+`按钮连接到一个目前为空的新方法`showPlayerView:`。这两个方法如下所示：\n\
    \n```\n- (void)viewDidLoad {\n  [super viewDidLoad];\n\n  self.title = @\"Players\"\
    ;\n\n  UIBarButtonItem *addButton = [[UIBarButtonItem alloc]\ninitWithBarButtonSystemItem:UIBarButtonSystemItemAdd\
    \ target:self\naction:@selector(showPlayerView)];\n  self.navigationItem.rightBarButtonItem\
    \ = addButton;\n}\n\n- (void)showPlayerView {\n}\n```\n\n在`viewWillAppear:`方法中，指示控制器的表视图重新加载其数据，如下所示：\n\
    \n```\n- (void)viewWillAppear:(BOOL)animated {\n  [super viewWillAppear:animated];\n\
    [self.tableView reloadData];\n}\n```\n"
- fmt: "如果您希望表格视图重新加载其数据，您必须告诉表格视图要加载和显示什么数据。球员列表将在一个分区中按字母顺序显示某支球队的所有球员。要获取球队的球员，调用该球队的`valueForKey:@\"\
    players\"`方法，该方法利用数据模型中的“players”关系从 SQLite 持久化存储中提取所有`Player`实体，并将它们作为`NSSet`返回。设置单个分区和表格行数的代码如下：\n\
    \n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView {\n \
    \ return 1;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\
    \ {\n  return [(NSSet *)[team valueForKey:@\"players\"] count];\n}\n```\n\n对于表格单元格，再次使用`UITableViewCellStyleValue1`样式，在左侧显示文本（球员的名字和姓氏），在右侧显示文本（电子邮件地址）。将生成的`cellForRowAtIndexPath:`修改为如下所示：\n\
    \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath {\n  static NSString *CellIdentifier = @\"PlayerCell\";\n\n  UITableViewCell\
    \ *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n  if\
    \ (cell == nil) {\n    cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleValue1\n\
    reuseIdentifier:CellIdentifier];\n  }\n\n  NSManagedObject *player = [[self sortPlayers]\
    \ objectAtIndex:indexPath.row];\n  cell.textLabel.text = [NSString stringWithFormat:@\"\
    %@ %@\", [[player\nvalueForKey:@\"firstName\"] description], [[player valueForKey:@\"\
    lastName\"] description]];\n  cell.detailTextLabel.text = [[player valueForKey:@\"\
    email\"] description];\n  return cell;\n}\n```\n\n这里您看到了对`sortPlayers`的调用。回顾一下，“team”实例上的“players”关系返回一个`NSSet`，它不仅没有排序，而且由于没有确定的顺序，也无法通过索引访问。`cellForRowAtIndexPath:`方法要求为特定索引提供单元格以对应后端数据，因此没有`NSSet`方法能够完成您在此需要的任务：为表格在该索引路径处返回适当的单元格。相反，您需要使用这个`sortPlayers:`方法将`NSSet`转换为按球员姓氏排序的`NSArray`，如下所示：\n\
    \n```\n- (NSArray *)sortPlayers {\n  NSSortDescriptor *sortLastNameDescriptor\
    \ = [[NSSortDescriptor alloc]\ninitWithKey:@\"lastName\" ascending:YES];\n  NSArray\
    \ *sortDescriptors = [NSArray arrayWithObjects:sortLastNameDescriptor, nil];\n\
    \  return [[(NSSet *)[team valueForKey:@\"players\"] allObjects]\nsortedArrayUsingDescriptors:sortDescriptors];\n\
    }\n```\n\n要显示球队的球员列表视图，请返回`MasterViewController.m`，并添加一个方法来响应点击球队的详细信息披露按钮。需要实现的方法称为`accessoryButtonTappedForRowWithIndexPath:`，在此方法中，您从\
    \ fetched results controller 中检索被点击的球队，创建一个`PlayerListViewController`实例，用主视图控制器和该球队进行初始化，然后显示该控制器。代码如下：\n\
    \n```\n- (void)tableView:(UITableView *)tableView\naccessoryButtonTappedForRowWithIndexPath:(NSIndexPath\
    \ *)indexPath {\n  NSManagedObject *team = [self.fetchedResultsController objectAtIndexPath:indexPath];\n\
    \  PlayerListViewController *playerListViewController = [[PlayerListViewController\n\
    alloc] initWithMasterController:self team:team];\n  [self.navigationController\
    \ pushViewController:playerListViewController animated:YES];\n}\n```\n\n在`MasterViewController.m`顶部添加对`PlayerListViewController.h`的导入，然后您就可以重新构建并启动\
    \ League Manager 了。您应该能看到之前创建的球队，但现在当您点击球队的详细信息披露按钮时，会跳转到球员列表视图，如图 3-18 所示。由于目前还没有添加球员的途径，列表是空白的，并且“+”按钮没有任何作用。\n\
    \n![Figure 3-18](images/0318.jpg)"
  raw: 'If you want the table view to reload its data, you must tell the table view
    what data to load and display. The player list will display all the players for
    a team, sorted alphabetically, in a single section. To get the players for a team,
    call the team''s `valueForKey:@"players"` method, which uses the “players” relationship
    from the data model to pull all the `Player` entities from the SQLite persistent
    store and returns them as an `NSSet`. The code to set up the single section and
    the number of rows for the table looks like this:


    `- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView {`

    **`  return 1;`**

    `}`


    `- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section
    {`

    **`  return [(NSSet *)[team valueForKey:@"players"] count];`**

    `}`


    For the table cells, again use the `UITableViewCellStyleValue1` to display text
    on the left (the first and last names of the player) and text on the right (the
    e-mail address). Change the generated `cellForRowAtIndexPath:` to look like this:


    `- (UITableViewCell *)tableView:(UITableView *)tableView`![images](images/U002.jpg)

    `cellForRowAtIndexPath:(NSIndexPath *)indexPath {`

    `  static NSString *CellIdentifier = @`**`"PlayerCell"`**`;`


    `  UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];`

    `  if (cell == nil) {`

    `    cell = [[UITableViewCell alloc] initWithStyle:`**`UITableViewCellStyleValue1`**![images](images/U002.jpg)

    `reuseIdentifier:CellIdentifier];`

    `  }`


    **`  NSManagedObject *player = [[self sortPlayers] objectAtIndex:indexPath.row];`**

    **`  cell.textLabel.text = [NSString stringWithFormat:@"%@ %@", [[player`![images](images/U002.jpg)**

    **`valueForKey:@"firstName"] description], [[player valueForKey:@"lastName"] description]];`**

    **`  cell.detailTextLabel.text = [[player valueForKey:@"email"] description];`**

    `  return cell;`

    `}`


    Here you see a call to `sortPlayers:`. Recall that the “players” relationship
    on the “team” instance returns an `NSSet`, which not only has no sorting but also
    isn''t indexable, because it has no deterministic order. The `cellForRowAtIndexPath:`
    method demands a cell for a specific index into the backing data, so no `NSSet`
    method can perform the task you need here: to return the appropriate cell for
    the table at this index path. Instead, you convert the `NSSet` to an `NSArray`
    sorted by players'' last names using this `sortPlayers:` method, like so:


    **`- (NSArray *)sortPlayers {`**

    **`  NSSortDescriptor *sortLastNameDescriptor = [[NSSortDescriptor alloc]`![images](images/U002.jpg)**

    **`initWithKey:@"lastName" ascending:YES];`**

    **`  NSArray *sortDescriptors = [NSArray arrayWithObjects:sortLastNameDescriptor,
    nil];`**

    **`  return [[(NSSet *)[team valueForKey:@"players"] allObjects]`![images](images/U002.jpg)**

    **`sortedArrayUsingDescriptors:sortDescriptors];`**

    **`}`**


    To display the player list view for a team, go back to `MasterViewController.m`,
    and add a method to respond to taps on the detail disclosure buttons for teams.
    The method to implement is called `accessoryButtonTappedForRowWithIndexPath:`,
    and in this method you retrieve the tapped team from the fetched results controller,
    create a `PlayerListViewController` instance, initialize it with the master view
    controller and the tapped team, and show the controller. The code looks like this:


    **`- (void)tableView:(UITableView *)tableView`![images](images/U002.jpg)**

    **`accessoryButtonTappedForRowWithIndexPath:(NSIndexPath *)indexPath {`**

    **`  NSManagedObject *team = [self.fetchedResultsController objectAtIndexPath:indexPath];`**

    **`  PlayerListViewController *playerListViewController = [[PlayerListViewController`![images](images/U002.jpg)**

    **`alloc] initWithMasterController:self team:team];`**

    **`  [self.navigationController pushViewController:playerListViewController animated:YES];`**

    **`}`**


    Add an import for `PlayerListViewController.h` to the top of `MasterViewController.m`,
    and you''re ready to build and launch League Manager anew. You should see the
    teams you created before, but now when you tap the detail disclosure button for
    a team, you move to the Players list view, as in [Figure 3–18](#Chapter03.html#fig_3_18).
    Since you as yet have no way to add players, the list is blank, and the + button
    does nothing.


    ![images](images/0318.jpg)


    **Figure 3–18.** *Team with no players*'
