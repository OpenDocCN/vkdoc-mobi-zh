    \ `saveContext:` 方法保存托管对象上下文之前不会提交。\n\n```objectivec\n[self saveContext];\n```\n\
    \n`createData:` 方法的内容至此结束。运行应用程序，在您的 SQLite 数据库中创建数据。再次强调，在 iPhone 模拟器中您只会看到一个空白的灰色屏幕。在下一节中，我们将使用其他工具来验证\
    \ `OrgChart` 应用程序是否已将数据添加到数据库中。\n"
- fmt: '#### SQLite Primer


    Since the `OrgChart` application uses `SQLite` for its persistent store and you
    just created the store and put some data into it, you can use any `SQLite` viewing
    tool such as `Base` (`http://menial.co.uk/software/base/`), `SQLite Database Browser`
    (`http://sqlitebrowser.sourceforge.net/`), or `SQLite Manager` (`http://code.google.com/p/sqlite-manager/`)
    to view it. Be aware, however, that poking around a `SQLite` database that `Core
    Data` owns can create problems if you change the database from an external tool.
    The way `Core Data` manages a `SQLite` database is an implementation detail that
    could change. Further, you can mangle the data in ways that prevent `Core Data`
    from reading the data or properly reconstructing the object graph. Consider yourself
    warned. While developing applications, however, you can recover from a damaged
    database by deleting it and allowing your application to re-create it, so don''t
    hesitate to jump into the database using a tool to debug your applications.


    Despite the availability of graphical browsing tools, we recommend using the adequate
    command-line tool that''s already installed on your Mac: `sqlite3`. On your Mac,
    open `Terminal.app` to get to the command prompt and change to the iPhone Simulator''s
    deployment directory, like this:


    `cd ~/Library/Application\ Support/iPhone\ Simulator`


    To find the database file, named `OrgChart.sqlite`, use the `find` command:


    `find . -name "OrgChart.sqlite" –print`


    You should see output that looks something like this:


    `./5.0/Applications/E8654A34-8EC4-4EAF-B531-00A032DD5977/Documents/OrgChart.sqlite`


    The generated ID will differ from the previous example, and Apple has moved the
    relative path in the past and may do so again, so your path will vary from this.
    This is the relative path to your database file, so to open the database, pass
    that relative path to the `sqlite3` executable, like this:


    `sqlite3 ./5.0/Applications/E8654A34-8EC4-4EAF-B531-00A032DD5977/Documents/OrgChart.sqlite`


    Running this command will put you inside the `SQLite` shell. You can run SQL commands
    from this point until you exit the shell.


    ```

    SQLite version 3.7.5

    Enter ".help" for instructions

    Enter SQL statements terminated with a ";"

    sqlite>

    ```


    One interesting command is the `.schema` command, which will display the SQL schema
    `Core Data` created to support your object model.


    ```

    sqlite> .schema

    CREATE TABLE ZORGANIZATION ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER,
    ZID

    INTEGER, ZLEADER INTEGER, ZNAME VARCHAR );

    CREATE TABLE ZPERSON ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER,
    ZID

    INTEGER, Z2EMPLOYEES INTEGER, ZNAME VARCHAR );

    CREATE TABLE Z_METADATA (Z_VERSION INTEGER PRIMARY KEY, Z_UUID VARCHAR(255), Z_PLIST

    BLOB);

    CREATE TABLE Z_PRIMARYKEY (Z_ENT INTEGER PRIMARY KEY, Z_NAME VARCHAR, Z_SUPER
    INTEGER,

    Z_MAX INTEGER);

    CREATE INDEX ZORGANIZATION_ZLEADER_INDEX ON ZORGANIZATION (ZLEADER);

    CREATE INDEX ZPERSON_Z2EMPLOYEES_INDEX ON ZPERSON (Z2EMPLOYEES);

    sqlite>

    ```


    Note that the tables are not named exactly like your entities, the tables have
    more columns than your entities have attributes, and the database has extra tables
    not found in the `Core Data` data model. You can also see that `Core Data` took
    care of creating integer columns to be used as primary keys, and it manages their
    uniqueness. If you know `SQLite` well, you know that any column defined as `INTEGER
    PRIMARY KEY` will autoincrement, but the point is that you don''t have to know
    that or even care. `Core Data` handles the uniqueness.


    You should be able to decipher `Core Data`''s code for mapping entities to tables
    and recognize the two tables that support the entities: `ZORGANIZATION` and `ZPERSON`.
    You can query the tables after running the `OrgChart` application and validate
    that the data is in fact stored in the database.


    ```

    sqlite> select Z_PK, ZID, ZLEADER, ZNAME from ZORGANIZATION;

    1|-19904|2|MyCompany, Inc.


    sqlite> select Z_PK, ZID, Z2EMPLOYEES, ZNAME from ZPERSON;

    1|6050|2|Jane

    2|-28989||John

    3|28151|2|Bill

    sqlite>

    ```


    The rows are fairly easy to read. You see the single organization you created,
    and its leader (`ZLEADER`) is the person where `Z_PK=2` (John). John has no boss,
    but Jane and Bill have the same boss (`Z2EMPLOYEES`), and his `Z_PK` is `2` (John
    again, as expected).


    To exit the `SQLite` shell, type `.quit` and press Enter.


    ```

    sqlite> .quit

    ```'
  raw: '#### SQLite Primer


    Since the OrgChart application uses SQLite for its persistent store and you just
    created the store and put some data into it, you can use any SQLite viewing tool
    such as Base ([`http://menial.co.uk/software/base/`](http://menial.co.uk/software/base/)),
    SQLite Database Browser ([`http://sqlitebrowser.sourceforge.net/`](http://sqlitebrowser.sourceforge.net/))
    or SQLite Manager ([`http://code.google.com/p/sqlite-manager/`](http://code.google.com/p/sqlite-manager/))
    to view it. Be aware, however, that poking around a SQLite database that Core
    Data owns can create problems if you change the database from an external tool.
    The way Core Data manages a SQLite database is an implementation detail that could
    change. Further, you can mangle the data in ways that prevent Core Data from reading
    the data or properly reconstructing the object graph. Consider yourself warned.
    While developing applications, however, you can recover from a damaged database
    by deleting it and allowing your application to re-create it, so don''t hesitate
    to jump into the database using a tool to debug your applications.


    Despite the availability of graphical browsing tools, we recommend using the adequate
    command-line tool that''s already installed on your Mac: `sqlite3`. On your Mac,
    open `Terminal.app` to get to the command prompt and change to the iPhone Simulator''s
    deployment directory, like this:


    `cd ~/Library/Application\ Support/iPhone\ Simulator`


    To find the database file, named `OrgChart.sqlite`, use the `find` command:


    `find . -name "OrgChart.sqlite" –print`


    You should see output that looks something like this:


    `./5.0/Applications/E8654A34-8EC4-4EAF-B531-00A032DD5977/Documents/OrgChart.sqlite`


    The generated ID will differ from the previous example, and Apple has moved the
    relative path in the past and may do so again, so your path will vary from this.
    This is the relative path to your database file, so to open the database, pass
    that relative path to the `sqlite3` executable, like this:


    `sqlite3 ./5.0/Applications/E8654A34-8EC4-4EAF-B531-`![images](images/U002.jpg)

    `00A032DD5977/Documents/OrgChart.sqlite`


    Running this command will put you inside the SQLite shell. You can run SQL commands
    from this point until you exit the shell.


    `SQLite version 3.7.5`

    `Enter ".help" for instructions`

    `Enter SQL statements terminated with a ";"`

    `sqlite>`


    One interesting command is the `.schema` command, which will display the SQL schema
    Core Data created to support your object model.


    `sqlite> .schema`

    `CREATE TABLE ZORGANIZATION ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER,
    ZID`

    `INTEGER, ZLEADER INTEGER, ZNAME VARCHAR );`

    `CREATE TABLE ZPERSON ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER,
    ZID`

    `INTEGER, Z2EMPLOYEES INTEGER, ZNAME VARCHAR );`

    `CREATE TABLE Z_METADATA (Z_VERSION INTEGER PRIMARY KEY, Z_UUID VARCHAR(255),
    Z_PLIST`

    `BLOB);`

    `CREATE TABLE Z_PRIMARYKEY (Z_ENT INTEGER PRIMARY KEY, Z_NAME VARCHAR, Z_SUPER
    INTEGER,`

    `Z_MAX INTEGER);`

    `CREATE INDEX ZORGANIZATION_ZLEADER_INDEX ON ZORGANIZATION (ZLEADER);`

    `CREATE INDEX ZPERSON_Z2EMPLOYEES_INDEX ON ZPERSON (Z2EMPLOYEES);`

    `sqlite>`


    Note that the tables are not named exactly like your entities, the tables have
    more columns than your entities have attributes, and the database has extra tables
    not found in the Core Data data model. You can also see that Core Data took care
    of creating integer columns to be used as primary keys, and it manages their uniqueness.
    If you know SQLite well, you know that any column defined as `INTEGER PRIMARY
    KEY` will autoincrement, but the point is that you don''t have to know that or
    even care. Core Data handles the uniqueness.


    You should be able to decipher Core Data''s code for mapping entities to tables
    and recognize the two tables that support the entities: `ZORGANIZATION` and `ZPERSON`.
    You can query the tables after running the OrgChart application and validate that
    the data is in fact stored in the database.


    `sqlite> select Z_PK, ZID, ZLEADER, ZNAME from ZORGANIZATION;`

    `1|-19904|2|MyCompany, Inc.`


    `sqlite> select Z_PK, ZID, Z2EMPLOYEES, ZNAME from ZPERSON;`

    `1|6050|2|Jane`

    `2|-28989||John`

    `3|28151|2|Bill`

    `sqlite>`


    The rows are fairly easy to read. You see the single organization you created,
    and its leader (`ZLEADER`) is the person where `Z_PK=2` (John). John has no boss,
    but Jane and Bill have the same boss (`Z2EMPLOYEES`), and his `Z_PK` is `2` (John
    again, as expected).


    To exit the SQLite shell, type `.quit` and press Enter.


    `sqlite> .quit`'
  trans: '

    #### SQLite 入门


    由于 `OrgChart` 应用使用 `SQLite` 作为持久化存储，并且你刚刚创建了该存储并存入了一些数据，因此你可以使用任何 `SQLite` 查看工具（例如
    `Base` (`http://menial.co.uk/software/base/`)、`SQLite Database Browser` (`http://sqlitebrowser.sourceforge.net/`)
    或 `SQLite Manager` (`http://code.google.com/p/sqlite-manager/`)）来查看它。但请注意，如果你从外部工具更改了
    `Core Data` 所拥有的 `SQLite` 数据库，那么随意操作数据库可能会引发问题。`Core Data` 管理 `SQLite` 数据库的方式属于实现细节，随时可能发生变化。此外，你可能会以某种方式损坏数据，导致
    `Core Data` 无法读取数据或正确重建对象图。请将此视为一个警告。然而，在开发应用程序时，你可以通过删除损坏的数据库并让应用重新创建它来从中恢复，所以请放心使用工具深入数据库来调试你的应用。


    尽管有图形化浏览工具可用，但我们推荐使用你的 Mac 上已经安装的、功能完善的命令行工具：`sqlite3`。在 Mac 上，打开 `Terminal.app`
    进入命令提示符，然后切换到 iPhone 模拟器的部署目录，操作如下：


    `cd ~/Library/Application\ Support/iPhone\ Simulator`


    要找到名为 `OrgChart.sqlite` 的数据库文件，请使用 `find` 命令：


    `find . -name "OrgChart.sqlite" –print`


    你应该会看到类似这样的输出：


    `./5.0/Applications/E8654A34-8EC4-4EAF-B531-00A032DD5977/Documents/OrgChart.sqlite`


    生成的 ID 将与前例不同，而且 Apple 过去曾移动过相对路径，未来也可能再次移动，因此你的路径会与此不同。这是指向你数据库文件的相对路径。要打开该数据库，请将该相对路径传递给
    `sqlite3` 可执行文件，操作如下：


    `sqlite3 ./5.0/Applications/E8654A34-8EC4-4EAF-B531-00A032DD5977/Documents/OrgChart.sqlite`


    运行此命令后，你将进入 `SQLite` 交互式 shell。在此界面中，你可以运行 SQL 命令，直到退出 shell。


    ```

    SQLite version 3.7.5

    Enter ".help" for instructions

    Enter SQL statements terminated with a ";"

    sqlite>

    ```


    一个有趣的命令是 `.schema`，它将显示 `Core Data` 为了支持你的对象模型而创建的 SQL 模式。


    ```

    sqlite> .schema

    CREATE TABLE ZORGANIZATION ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER,
    ZID

    INTEGER, ZLEADER INTEGER, ZNAME VARCHAR );

    CREATE TABLE ZPERSON ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER,
    ZID

    INTEGER, Z2EMPLOYEES INTEGER, ZNAME VARCHAR );

    CREATE TABLE Z_METADATA (Z_VERSION INTEGER PRIMARY KEY, Z_UUID VARCHAR(255), Z_PLIST

    BLOB);

    CREATE TABLE Z_PRIMARYKEY (Z_ENT INTEGER PRIMARY KEY, Z_NAME VARCHAR, Z_SUPER
    INTEGER,

    Z_MAX INTEGER);

    CREATE INDEX ZORGANIZATION_ZLEADER_INDEX ON ZORGANIZATION (ZLEADER);

    CREATE INDEX ZPERSON_Z2EMPLOYEES_INDEX ON ZPERSON (Z2EMPLOYEES);

    sqlite>

    ```


    请注意，这些表的命名与你的实体并不完全一致，表的列数多于实体的属性数，并且数据库中还存在一些在 `Core Data` 数据模型中找不到的额外表。你还可以看到，`Core
    Data` 负责创建了用作主键的整型列，并管理着它们的唯一性。如果你熟悉 `SQLite`，就会知道任何定义为 `INTEGER PRIMARY KEY`
    的列都会自动递增，但关键是你不必知道这一点甚至无需关心。`Core Data` 会处理唯一性。


    你应该能解读 `Core Data` 用于将实体映射到表的代码，并识别出支持这两个实体的两个表：`ZORGANIZATION` 和 `ZPERSON`。你可以在运行
    `OrgChart` 应用后查询这些表，并验证数据确实已存储在数据库中。


    ```

    sqlite> select Z_PK, ZID, ZLEADER, ZNAME from ZORGANIZATION;

    1|-19904|2|MyCompany, Inc.


    sqlite> select Z_PK, ZID, Z2EMPLOYEES, ZNAME from ZPERSON;

    1|6050|2|Jane

    2|-28989||John

    3|28151|2|Bill

    sqlite>

    ```


    这些行相当易于阅读。你可以看到你创建的单个组织，它的领导者（`ZLEADER`）是 `Z_PK=2` 的那个人（John）。John 没有上级，但 Jane
    和 Bill 有相同的上级（`Z2EMPLOYEES`），而该上级的 `Z_PK` 是 `2`（正如所料，又是 John）。


    要退出 `SQLite` 交互式 shell，请键入 `.quit` 并按下回车键。


    ```

    sqlite> .quit

    ```

