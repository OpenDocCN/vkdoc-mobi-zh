    Like the code for responding to section changes, this code simply updates the
    table view according to what happened to the underlying data. As you read through
    this code, you should understand why you moved table cell configuration to its
    own method of `configureCell:atIndexPath:.` If any of the rows in the data are
    updated, you call this method to update the table view cell.


    Build and run the application. You''ll see that as you change the data in the
    League Manager tab, the changes are immediately reflected in the Players tab.


    ### Summary


    As long as the Core-Data–backed table views in your applications fit the paradigm
    covered by the `NSFetchedResultsController` class, using `NSFetchedResultsController`
    will simplify your development efforts when working with tables. Most of the code
    you write when working with `NSFetchedResultsController` instances doesn''t change
    from application to application, so you can get new applications running quickly.


    The batching and caching of `NSFetchedResultsController` also lets you more efficiently
    show the results in your table view. Rows will be loaded as your table view needs
    them for display, allowing your applications to consume less memory and perform
    better.


    ## Chapter 10


    ## Using Core Data in Advanced Applications


    You can build a lot of cool apps without using the material in this chapter. Before
    you slam this book closed, however, we recommend you keep reading. This chapter
    contains material that addresses some advanced Core Data topics that your particular
    applications may require, especially if securing user data is important to your
    application. Follow along with this chapter to put some advanced Core Data tools
    in your toolbox.


    In this chapter, we walk you through building an application that illustrates
    each of the topics we cover. You''ll build the application incrementally and will
    be able to run the application at the end of each section so you can see that
    section''s advanced feature working. Because each section builds on the previous
    ones, you shouldn''t try to skip any sections.


    The application you build in this chapter, called MyStash, stores both passwords
    and notes. By the time you''re done building it, the passwords will all be safely
    encrypted. The notes, by default, aren''t encrypted, but you can choose to encrypt
    individual notes. The passwords and notes live in separate databases, though they
    share the same data model. When you''re done, you can make a few tweaks to the
    code, add an enticing icon, and who knows? You may have an App Store hit on your
    hands!


    ### Creating an Application for Note and Password Storage and Encryption


    To begin creating the application that you''ll work with throughout this chapter,
    create a new Xcode project called MyStash. Choose the Empty Application template,
    as shown in [Figure 10–1](#Chapter10.html#fig_10_1), and click Next. Type **MyStash**
    for Product Name, check Use Core Data, and set Device Family to iPhone (see [Figure
    10–2](#Chapter10.html#fig_10_2)). Click Next, select the directory to save your
    project in, and click Create.


    ![images](images/1001.jpg)


    **Figure 10–1.** *Selecting the Empty Application template*


    ![images](images/1002.jpg)


    **Figure 10–2.** *Setting up the MyStash project*


    You can build and run your application now to view a blank, white screen. You
    have neither data nor a means to view that data. You''ll start by adding data
    to the application.


    #### Setting Up the Data Model


    The MyStash data model will have two entities: one to hold notes and one to hold
    passwords for systems (such as web sites). Open the data model, and create an
    entity called `Note` and another called `System`. Add two attributes to the `Note`
    entity:


    *   `title` (type String)

    *   `body` (type String)


    Add three attributes to the `System` entity:


    *   `name` (type String)

    *   `userId` (type String)

    *   `password` (type String)


    Your data model should look like [Figure 10–3](#Chapter10.html#fig_10_3).


    ![images](images/1003.jpg)


    **Figure 10–3.** *The MyStash data model*


    Once again, you can build and run the application, but all you''ll see is a blank
    screen. In the next section, you add a rudimentary interface. Actually adding,
    editing, and deleting data, however, won''t happen until you piece the user interface
    together in the next sections in this chapter.


    #### Setting Up the Tab Bar Controller


    The MyStash application uses two tabs to swap between Notes view and Passwords
    view. This means you need to add a tab bar controller to the main window. Open
    `AppDelegate.h`, and add a `UITabBarController` property.


    `@property (strong, nonatomic) UITabBarController *tabBarController;`


    Now, open the file `AppDelegate.m`, and add a `@synthesize` line for the tab bar
    controller.


    `@synthesize tabBarController = _tabBarController;`


    In the `application:didFinishLaunchingWithOptions:` method, add the tab bar controller
    to the main window so that method now looks like this:


    `- (BOOL)application:(UIApplication *)application`![images](images/U002.jpg)

    `didFinishLaunchingWithOptions:(NSDictionary *)launchOptions`

    `{`

    `  self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];`

    `  self.window.backgroundColor = [UIColor whiteColor];`


    **`  self.tabBarController = [[UITabBarController alloc] init];`**

    **`  [self.window addSubview:self.tabBarController.view];`**


    `  [self.window makeKeyAndVisible];`

    `  return YES;`

    `}`


    Build and run the app to see the tab bar controller, albeit small, added at the
    bottom of the screen, as shown in [Figure 10–4](#Chapter10.html#fig_10_4).


    ![images](images/1004.jpg)


    **Figure 10–4.** *MyStash with a tab bar*'
