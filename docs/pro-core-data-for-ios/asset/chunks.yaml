  trans: "\n### 创建 Core Data 项目\n\n首先，创建一个新的单视图应用程序，将产品选项设置为 iPhone。将其命名为 `PerformanceTuning`，并添加\
    \ Core Data 框架。在您的应用程序委托（`PerformanceTuningAppDelegate`）中，添加一个托管对象上下文、一个托管对象模型和一个持久化存储协调器，以及一个用于返回应用程序文档目录的方法和一个用于保存托管对象上下文的方法。以下是\
    \ `PerformanceTuningAppDelegate.h` 的代码：\n\n```objc\n#import <UIKit/UIKit.h>\n\
    #import <CoreData/CoreData.h>\n\n@class PerformanceTuningViewController;\n\n@interface\
    \ PerformanceTuningAppDelegate : UIResponder <UIApplicationDelegate>\n\n@property\
    \ (strong, nonatomic) IBOutlet UIWindow *window;\n@property (strong, nonatomic)\
    \ IBOutlet PerformanceTuningViewController *viewController;\n@property (nonatomic,\
    \ retain, readonly) NSManagedObjectContext *managedObjectContext;\n@property (nonatomic,\
    \ retain, readonly) NSManagedObjectModel *managedObjectModel;\n@property (nonatomic,\
    \ retain, readonly) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n\
    \n- (void)saveContext;\n- (NSURL *)applicationDocumentsDirectory;\n\n@end\n```\n\
    \n清单 7–1 展示了 `PerformanceTuningAppDelegate.m` 的代码。\n\n**清单 7–1.** *PerformanceTuningAppDelegate.m*\n\
    \n```objc\n#import \"PerformanceTuningAppDelegate.h\"\n#import \"PerformanceTuningViewController.h\"\
    \n\n@implementation PerformanceTuningAppDelegate\n\n@synthesize window=_window;\n\
    @synthesize viewController=_viewController;\n@synthesize managedObjectContext=__managedObjectContext;\n\
    @synthesize managedObjectModel=__managedObjectModel;\n@synthesize persistentStoreCoordinator=__persistentStoreCoordinator;\n\
    \n- (BOOL)application:(UIApplication *)application\ndidFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions\n{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\n    // Override point for customization after application\
    \ launch.\n    self.viewController = [[PerformanceTuningViewController alloc]\
    \ initWithNibName:@\"PerformanceTuningViewController\" bundle:nil];\n    self.window.rootViewController\
    \ = self.viewController;\n    [self.window makeKeyAndVisible];\n    return YES;\n\
    }\n\n- (void)applicationWillResignActive:(UIApplication *)application {\n}\n\n\
    - (void)applicationDidEnterBackground:(UIApplication *)application {\n}\n\n- (void)applicationWillEnterForeground:(UIApplication\
    \ *)application {\n}\n\n- (void)applicationDidBecomeActive:(UIApplication *)application\
    \ {\n}\n\n- (void)applicationWillTerminate:(UIApplication *)application {\n}\n\
    \n- (void)saveContext {\n    NSError *error = nil;\n    NSManagedObjectContext\
    \ *managedObjectContext = self.managedObjectContext;\n    if (managedObjectContext\
    \ != nil) {\n        if ([managedObjectContext hasChanges] && ![managedObjectContext\
    \ save:&error]) {\n            NSLog(@\"Unresolved error %@, %@\", error, [error\
    \ userInfo]);\n            abort();\n        }\n    }\n}\n\n#pragma mark - Core\
    \ Data stack\n\n/**\n Returns the managed object context for the application.\n\
    \ If the context doesn't already exist, it is created and bound to the persistent\
    \ store coordinator for the application.\n */\n- (NSManagedObjectContext *)managedObjectContext\
    \ {\n    if (__managedObjectContext != nil) {\n        return __managedObjectContext;\n\
    \    }\n\n    NSPersistentStoreCoordinator *coordinator = [self persistentStoreCoordinator];\n\
    \    if (coordinator != nil) {\n        __managedObjectContext = [[NSManagedObjectContext\
    \ alloc] init];\n        [__managedObjectContext setPersistentStoreCoordinator:coordinator];\n\
    \    }\n    return __managedObjectContext;\n}\n\n/**\n Returns the managed object\
    \ model for the application.\n If the model doesn't already exist, it is created\
    \ from the application's model.\n */\n- (NSManagedObjectModel *)managedObjectModel\
    \ {\n    if (__managedObjectModel != nil) {\n        return __managedObjectModel;\n\
    \    }\n    NSURL *modelURL = [[NSBundle mainBundle] URLForResource:@\"PerformanceTuning\"\
    \ withExtension:@\"momd\"];\n    __managedObjectModel = [[NSManagedObjectModel\
    \ alloc] initWithContentsOfURL:modelURL];\n    return __managedObjectModel;\n\
    }\n\n/**\n Returns the persistent store coordinator for the application.\n If\
    \ the coordinator doesn't already exist, it is created and the application's store\
    \ added to it.\n */\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\
    \ {\n    if (__persistentStoreCoordinator != nil) {\n        return __persistentStoreCoordinator;\n\
    \    }\n\n    NSURL *storeURL = [[self applicationDocumentsDirectory]\n      \
    \                 URLByAppendingPathComponent:@\"PerformanceTuning.sqlite\"];\n\
    \n    NSError *error = nil;\n    __persistentStoreCoordinator = [[NSPersistentStoreCoordinator\
    \ alloc] initWithManagedObjectModel:[self managedObjectModel]];\n    if (![__persistentStoreCoordinator\
    \ addPersistentStoreWithType:NSSQLiteStoreType configuration:nil URL:storeURL\
    \ options:nil error:&error]) {\n        NSLog(@\"Unresolved error %@, %@\", error,\
    \ [error userInfo]);\n        abort();\n    }\n    return __persistentStoreCoordinator;\n\
    }\n\n#pragma mark - Application's Documents directory\n\n/**\n Returns the URL\
    \ to the application's Documents directory.\n */\n- (NSURL *)applicationDocumentsDirectory\
    \ {\n    return [[[NSFileManager defaultManager] URLsForDirectory:NSDocumentDirectory\
    \ inDomains:NSUserDomainMask] lastObject];\n}\n\n@end\n```\n"
- fmt: "### Creating the Data Model and Data\n\nThe data model for this performance-testing\
    \ application consists of three entities: `Actor`, `Movie`, and `Studio`. `Actor`\
    \ and `Movie` have a many-to-many relationship, and `Movie` and `Studio` have\
    \ a many-to-many relationship. Each entity has two attributes: `name`, of type\
    \ String, and `rating`, of type Integer 16. Create your data model and call it\
    \ `PerformanceTuning.xcdatamodeld`. Create entities for `Actor`, `Movie`, and\
    \ `Studio`; give them each attributes called `name` of type String and `rating`\
    \ of type Integer 16; and create optional to-many relationships between `Actor`\
    \ and `Movie` and between `Movie` and `Studio`. Your completed data model should\
    \ look like [Figure 7–2](#Chapter07.html#fig_7_2).\n\n![images](images/0702.jpg)\n\
    \n**Figure 7–2.** *The performance-tuning data model*\n\nNow that you've completed\
    \ your data model, it's time to stuff data into it. You want enough data to be\
    \ able to do performance testing and differentiate between results, so the plan\
    \ is to create 200 actors, 200 movies, and 200 studios, and then to relate each\
    \ actor to each movie and vice versa and relate each movie to each studio and\
    \ vice versa. When you're done, you'll have three tables with 200 rows each (`Actor`,\
    \ `Movie`, and `Studio`) and two join tables with 40,000 rows each (`Actor`-to-`Movie`\
    \ and `Movie`-to-`Studio`).\n\nTo insert the data, open the `PerformanceTuningAppDelegate.h`\
    \ file, and declare two methods: one that loads the data into the persistent data\
    \ store and the other that acts as a helper method to create an entity. The helper\
    \ method takes two strings: the name of the entity to create and the value for\
    \ the `name` attribute. For the `rating` attribute, the helper will insert a random\
    \ number between one and ten. The two method declarations should look like this:\n\
    \n```\n- (void)loadData;\n- (NSManagedObject *)insertObjectForName:(NSString *)entityName\
    \ withName:(NSString *)name;\n```\n\nNow, open `PerformanceTuningAppDelegate.m`,\
    \ and define those methods. The helper method creates the object within the specified\
    \ entity type and then sets the value for the `name` attribute. It looks like\
    \ this:\n\n```\n- (NSManagedObject *)insertObjectForName:(NSString *)entityName\
    \ withName:(NSString *)name {\n    NSManagedObjectContext *context = [self managedObjectContext];\n\
    \    NSManagedObject *object = [NSEntityDescription insertNewObjectForEntityForName:entityName\
    \ inManagedObjectContext:context];\n    [object setValue:name forKey:@\"name\"\
    ];\n    [object setValue:[NSNumber numberWithInteger:((arc4random() % 10) + 1)]\
    \ forKey:@\"rating\"];\n    return object;\n}\n```\n\nThe method to load the data,\
    \ `loadData:`, first checks the persistent store to determine whether the data\
    \ has already been loaded so that subsequent runs of the program don't compound\
    \ the data store. If the data has not been created, the `loadData:` method creates\
    \ 200 actors with names like `Actor 1`, `Actor 2`, and so on; 200 movies with\
    \ names like `Movie 1`; and 200 studios with names like `Studio 1`. After creating\
    \ all the objects, the code loops through all the movies and adds relationships\
    \ to all the actors and to all the studios. Finally, `loadData:` saves the object\
    \ graph to the persistent data store. The following is the complete implementation\
    \ of the `loadData` method:\n\n```\n- (void)loadData {\n    // Pull the movies.\
    \ If we have 200, assume our db is set up.\n    NSManagedObjectContext *context\
    \ = [self managedObjectContext];\n    NSFetchRequest *request = [[NSFetchRequest\
    \ alloc] init];\n    [request setEntity:[NSEntityDescription entityForName:@\"\
    Movie\" inManagedObjectContext:context]];\n    NSArray *results = [context executeFetchRequest:request\
    \ error:nil];\n    if ([results count] != 200) {\n        // Add 200 actors, movies,\
    \ and studios\n        for (int i = 1; i <= 200; i++) {\n            [self insertObjectForName:@\"\
    Actor\" withName:[NSString stringWithFormat:@\"Actor %d\", i]];\n            [self\
    \ insertObjectForName:@\"Movie\" withName:[NSString stringWithFormat:@\"Movie\
    \ %d\", i]];\n            [self insertObjectForName:@\"Studio\" withName:[NSString\
    \ stringWithFormat:@\"Studio %d\", i]];\n        }\n\n        // Relate all the\
    \ actors and all the studios to all the movies\n        NSManagedObjectContext\
    \ *context = [self managedObjectContext];\n        NSFetchRequest *request = [[NSFetchRequest\
    \ alloc] init];\n        [request setEntity:[NSEntityDescription entityForName:@\"\
    Movie\" inManagedObjectContext:context]];\n        NSArray *results = [context\
    \ executeFetchRequest:request error:nil];\n        for (NSManagedObject *movie\
    \ in results) {\n            [request setEntity:[NSEntityDescription entityForName:@\"\
    Actor\" inManagedObjectContext:context]];\n            NSArray *actors = [context\
    \ executeFetchRequest:request error:nil];\n            NSMutableSet *set = [movie\
    \ mutableSetValueForKey:@\"actors\"];\n            [set addObjectsFromArray:actors];\n\
    \n            [request setEntity:[NSEntityDescription entityForName:@\"Studio\"\
    \ inManagedObjectContext:context]];\n            NSArray *studios = [context executeFetchRequest:request\
    \ error:nil];\n            set = [movie mutableSetValueForKey:@\"studios\"];\n\
    \            [set addObjectsFromArray:studios];\n        }\n    }\n    [self saveContext];\n\
    }\n```\n\nGo to the `application:didFinishLaunchingWithOptions:` method, and add\
    \ a call to your `loadData:` method before it displays the window and view so\
    \ it looks like this:\n\n```\n- (BOOL)application:(UIApplication *)application\
    \ didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n{\n    [self loadData];\n\
    \    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n\
    \    // Override point for customization after application launch.\n    self.viewController\
    \ = [[PerformanceTuningViewController alloc] initWithNibName:@\"PerformanceTuningViewController\"\
    \ bundle:nil];\n    self.window.rootViewController = self.viewController;\n  \
    \  [self.window makeKeyAndVisible];\n    return YES;\n}\n```\n\nBuild and run\
    \ the program to create your persistent data store."
  raw: '#### Creating the Data Model and Data


    The data model for this performance-testing application consists of three entities:
    `Actor`, `Movie`, and `Studio`. `Actor` and `Movie` have a many-to-many relationship,
    and `Movie` and `Studio` have a many-to-many relationship. Each entity has two
    attributes: `name`, of type String, and `rating`, of type Integer 16\. Create
    your data model and call it `PerformanceTuning.xcdatamodeld`. Create entities
    for `Actor`, `Movie`, and `Studio`; give them each attributes called `name` of
    type String and `rating` of type Integer 16; and create optional to-many relationships
    between `Actor` and `Movie` and between `Movie` and `Studio`. Your completed data
    model should look like [Figure 7–2](#Chapter07.html#fig_7_2).


    ![images](images/0702.jpg)


    **Figure 7–2.** *The performance-tuning data model*


    Now that you''ve completed your data model, it''s time to stuff data into it.
    You want enough data to be able to do performance testing and differentiate between
    results, so the plan is to create 200 actors, 200 movies, and 200 studios, and
    then to relate each actor to each movie and vice versa and relate each movie to
    each studio and vice versa. When you''re done, you''ll have three tables with
    200 rows each (`Actor`, `Movie`, and `Studio`) and two join tables with 40,000
    rows each (`Actor`-to-`Movie` and `Movie`-to-`Studio`).


    To insert the data, open the `PerformanceTuningAppDelegate.h` file, and declare
    two methods: one that loads the data into the persistent data store and the other
    that acts as a helper method to create an entity. The helper method takes two
    strings: the name of the entity to create and the value for the `name` attribute.
    For the `rating` attribute, the helper will insert a random number between one
    and ten. The two method declarations should look like this:


    **`- (void)loadData;`**

    **`- (NSManagedObject *)insertObjectForName:(NSString *)entityName withName:(NSString`![images](images/U002.jpg)**

    **`*)name;`**


    Now, open `PerformanceTuningAppDelegate.m`, and define those methods. The helper
    method creates the object within the specified entity type and then sets the value
    for the `name` attribute. It looks like this:


    **`- (NSManagedObject *)insertObjectForName:(NSString *)entityName withName:(NSString
    *)name {`**

    **`NSManagedObjectContext *context = [self managedObjectContext];`**

    **`NSManagedObject *object = [NSEntityDescription`![images](images/U002.jpg)**

    **`insertNewObjectForEntityForName:entityName inManagedObjectContext:context];`**

    **`[object setValue:name forKey:@"name"];`**

    **`[object setValue:[NSNumber numberWithInteger:((arc4random() % 10) + 1)]`![images](images/U002.jpg)**

    **`forKey:@"rating"];`**

    **`  return object;`**

    **`}`**


    The method to load the data, `loadData:`, first checks the persistent store to
    determine whether the data has already been loaded so that subsequent runs of
    the program don''t compound the data store. If the data has not been created,
    the `loadData:` method creates 200 actors with names like `Actor 1`, `Actor 2`,
    and so on; 200 movies with names like `Movie 1`; and 200 studios with names like
    `Studio 1`. After creating all the objects, the code loops through all the movies
    and adds relationships to all the actors and to all the studios. Finally, `loadData:`
    saves the object graph to the persistent data store. The following is the complete
    implementation of the `loadData` method:


    **`- (void)loadData {`**

    **`// Pull the movies. If we have 200, assume our db is set up.`**

    **`NSManagedObjectContext *context = [self managedObjectContext];`**

    **`NSFetchRequest *request = [[NSFetchRequest alloc] init];`**

    **`[request setEntity:[NSEntityDescription entityForName:@"Movie"`**![images](images/U002.jpg)

    **`inManagedObjectContext:context]];`**

    **`NSArray *results = [context executeFetchRequest:request error:nil];`**

    **`if ([results count] != 200) {`**

    **`// Add 200 actors, movies, and studios`**

    **`for (int i = 1; i <= 200; i++) {`**

    **`[self insertObjectForName:@"Actor" withName:[NSString stringWithFormat:`![images](images/U002.jpg)**

    **`@"Actor %d", i]];`**

    **`[self insertObjectForName:@"Movie" withName:[NSString stringWithFormat:`![images](images/U002.jpg)**

    **`@"Movie %d", i]];`**

    **`[self insertObjectForName:@"Studio" withName:[NSString stringWithFormat:`![images](images/U002.jpg)**

    **`@"Studio %d", i]];`**

    **`}`**


    **`// Relate all the actors and all the studios to all the movies`**

    **`NSManagedObjectContext *context = [self managedObjectContext];`**

    **`NSFetchRequest *request = [[NSFetchRequest alloc] init];`**

    **`[request setEntity:[NSEntityDescription entityForName:@"Movie"`![images](images/U002.jpg)**

    **`inManagedObjectContext:context]];`**

    **`NSArray *results = [context executeFetchRequest:request error:nil];`**

    **`for (NSManagedObject *movie in results) {`**

    **`[request setEntity:[NSEntityDescription entityForName:@"Actor"`![images](images/U002.jpg)**

    **`inManagedObjectContext:context]];`**

    **`NSArray *actors = [context executeFetchRequest:request error:nil];`**

    **`NSMutableSet *set = [movie mutableSetValueForKey:@"actors"];`**

    **`[set addObjectsFromArray:actors];`**


    **`[request setEntity:[NSEntityDescription entityForName:@"Studio"`![images](images/U002.jpg)**

    **`inManagedObjectContext:context]];`**

    **`NSArray *studios = [context executeFetchRequest:request error:nil];`**

    **`set = [movie mutableSetValueForKey:@"studios"];`**

    **`[set addObjectsFromArray:studios];`**

    **`}`**

    **`}`**

    **`[self saveContext];`**

    **`}`**


    Go to the `application:didFinishLaunchingWithOptions:` method, and add a call
    to your `loadData:` method before it displays the window and view so it looks
    like this:


    `- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary
    *)launchOptions`

    `{`

    `  [self loadData];`

    `  self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];`

    `  // Override point for customization after application launch.`

    `  self.viewController = [[PerformanceTuningViewController alloc]`

    `  initWithNibName:@"PerformanceTuningViewController" bundle:nil];`

    `  self.window.rootViewController = self.viewController;`

    `  [self.window makeKeyAndVisible];`

    `  return YES;`

    `}`


    Build and run the program to create your persistent data store.'
  trans: "\n### 创建数据模型与数据\n\n此性能测试应用的数据模型包含三个实体：`Actor`、`Movie` 和 `Studio`。`Actor`\
    \ 与 `Movie` 之间是多对多关系，`Movie` 与 `Studio` 之间也是多对多关系。每个实体都有两个属性：类型为 String 的 `name`\
    \ 和类型为 Integer 16 的 `rating`。请创建数据模型并将其命名为 `PerformanceTuning.xcdatamodeld`。为\
    \ `Actor`、`Movie` 和 `Studio` 创建实体；为它们分别添加名为 `name`（类型为 String）和 `rating`（类型为 Integer\
    \ 16）的属性；并在 `Actor` 与 `Movie` 之间以及 `Movie` 与 `Studio` 之间创建可选的多对多关系。完成后的数据模型应如图\
    \ Figure 7–2 所示。\n\n![images](img/0702.jpg)\n\n**图 7–2.** *性能调优数据模型*\n\n现在数据模型已创建完毕，接下来需要向其中填充数据。你需要足够的数据来进行性能测试并区分结果，因此计划创建\
    \ 200 个演员、200 部电影和 200 个工作室，然后将每个演员与每部电影关联（反之亦然），并将每部电影与每个工作室关联（反之亦然）。完成后，你将得到三个各有\
    \ 200 行的表（`Actor`、`Movie` 和 `Studio`），以及两个各有 40,000 行的连接表（`Actor`-`Movie` 和 `Movie`-`Studio`）。\n\
    \n为了插入数据，打开 `PerformanceTuningAppDelegate.h` 文件，并声明两个方法：一个用于将数据加载到持久化数据存储区，另一个作为辅助方法来创建实体。辅助方法接收两个字符串：要创建的实体名称和\
    \ `name` 属性的值。对于 `rating` 属性，辅助方法将插入一个介于 1 到 10 之间的随机数。这两个方法声明应如下所示：\n\n```\n\
    - (void)loadData;\n- (NSManagedObject *)insertObjectForName:(NSString *)entityName\
    \ withName:(NSString *)name;\n```\n\n现在，打开 `PerformanceTuningAppDelegate.m` 文件并定义这些方法。辅助方法在指定的实体类型内创建对象，然后设置\
    \ `name` 属性的值。代码如下：\n\n```\n- (NSManagedObject *)insertObjectForName:(NSString\
    \ *)entityName withName:(NSString *)name {\n    NSManagedObjectContext *context\
    \ = [self managedObjectContext];\n    NSManagedObject *object = [NSEntityDescription\
    \ insertNewObjectForEntityForName:entityName inManagedObjectContext:context];\n\
    \    [object setValue:name forKey:@\"name\"];\n    [object setValue:[NSNumber\
    \ numberWithInteger:((arc4random() % 10) + 1)] forKey:@\"rating\"];\n    return\
    \ object;\n}\n```\n\n加载数据的方法 `loadData:` 首先检查持久化存储区，以确定数据是否已加载，从而避免程序后续运行时重复添加数据。如果数据尚未创建，则\
    \ `loadData:` 方法会创建 200 个演员（名称类似 `Actor 1`、`Actor 2` 等）、200 部电影（名称类似 `Movie 1`）和\
    \ 200 个工作室（名称类似 `Studio 1`）。创建所有对象后，代码会遍历所有电影，并与所有演员及所有工作室建立关联。最后，`loadData:`\
    \ 将对象图保存到持久化数据存储区。以下是 `loadData` 方法的完整实现：\n\n```\n- (void)loadData {\n    // 拉取电影数据。如果已有\
    \ 200 条，则假定数据库已设置完成。\n    NSManagedObjectContext *context = [self managedObjectContext];\n\
    \    NSFetchRequest *request = [[NSFetchRequest alloc] init];\n    [request setEntity:[NSEntityDescription\
    \ entityForName:@\"Movie\" inManagedObjectContext:context]];\n    NSArray *results\
    \ = [context executeFetchRequest:request error:nil];\n    if ([results count]\
    \ != 200) {\n        // 添加 200 个演员、电影和工作室\n        for (int i = 1; i <= 200; i++)\
    \ {\n            [self insertObjectForName:@\"Actor\" withName:[NSString stringWithFormat:@\"\
    Actor %d\", i]];\n            [self insertObjectForName:@\"Movie\" withName:[NSString\
    \ stringWithFormat:@\"Movie %d\", i]];\n            [self insertObjectForName:@\"\
    Studio\" withName:[NSString stringWithFormat:@\"Studio %d\", i]];\n        }\n\
    \n        // 将所有演员和工作室与所有电影建立关联\n        NSManagedObjectContext *context = [self\
    \ managedObjectContext];\n        NSFetchRequest *request = [[NSFetchRequest alloc]\
    \ init];\n        [request setEntity:[NSEntityDescription entityForName:@\"Movie\"\
    \ inManagedObjectContext:context]];\n        NSArray *results = [context executeFetchRequest:request\
    \ error:nil];\n        for (NSManagedObject *movie in results) {\n           \
    \ [request setEntity:[NSEntityDescription entityForName:@\"Actor\" inManagedObjectContext:context]];\n\
    \            NSArray *actors = [context executeFetchRequest:request error:nil];\n\
    \            NSMutableSet *set = [movie mutableSetValueForKey:@\"actors\"];\n\
    \            [set addObjectsFromArray:actors];\n\n            [request setEntity:[NSEntityDescription\
    \ entityForName:@\"Studio\" inManagedObjectContext:context]];\n            NSArray\
    \ *studios = [context executeFetchRequest:request error:nil];\n            set\
    \ = [movie mutableSetValueForKey:@\"studios\"];\n            [set addObjectsFromArray:studios];\n\
    \        }\n    }\n    [self saveContext];\n}\n```\n\n找到 `application:didFinishLaunchingWithOptions:`\
    \ 方法，在显示窗口和视图之前添加对 `loadData:` 方法的调用，使其如下所示：\n\n```\n- (BOOL)application:(UIApplication\
    \ *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n\
    {\n    [self loadData];\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\n    // 应用程序启动后的自定义点。\n    self.viewController = [[PerformanceTuningViewController\
    \ alloc] initWithNibName:@\"PerformanceTuningViewController\" bundle:nil];\n \
    \   self.window.rootViewController = self.viewController;\n    [self.window makeKeyAndVisible];\n\
    \    return YES;\n}\n```\n\n构建并运行程序以创建持久化数据存储区。\n"
- fmt: "### Creating the Testing View\n\nThe application you're building will present\
    \ a picker with a list of tests you can run and a button to launch the selected\
    \ test. It will list the start time, the stop time, and the elapsed time for the\
    \ test, as well as a string describing the results of the test. Start creating\
    \ this user interface by opening the `PerformanceTuningViewController.h` file,\
    \ declaring that it implements the protocols for your picker view, declaring fields\
    \ for your user interface elements, and declaring a method to be called when someone\
    \ clicks the Run Selected Test button. The following code contains the contents\
    \ of `PerformanceTuningViewController.h`:\n\n```objc\n#import <UIKit/UIKit.h>\n\
    \n@interface PerformanceTuningViewController : UIViewController <UIPickerViewDataSource,\
    \ UIPickerViewDelegate> {\n    IBOutlet UILabel *startTime;\n    IBOutlet UILabel\
    \ *stopTime;\n    IBOutlet UILabel *elapsedTime;\n    IBOutlet UITextView *results;\n\
    \    IBOutlet UIPickerView *testPicker;\n}\n@property (nonatomic, retain) UILabel\
    \ *startTime;\n@property (nonatomic, retain) UILabel *stopTime;\n@property (nonatomic,\
    \ retain) UILabel *elapsedTime;\n@property (nonatomic, retain) UITextView *results;\n\
    @property (nonatomic, retain) UIPickerView *testPicker;\n\n- (IBAction)runTest:(id)sender;\n\
    \n@end\n```\n\nIn `PerformanceTuningViewController.m`, add `@synthesize` directives\
    \ for your fields, stub implementations for the picker view protocols you promised\
    \ to implement, and a stub implementation for `runTest`, like so:\n\n```objc\n\
    @synthesize startTime, stopTime, elapsedTime, results, testPicker;\n\n#pragma\
    \ mark - UIPickerViewDataSource methods\n\n- (NSInteger)numberOfComponentsInPickerView:(UIPickerView\
    \ *)pickerView {\n    return 1;\n}\n\n- (NSInteger)pickerView:(UIPickerView *)pickerView\
    \ numberOfRowsInComponent:(NSInteger)component {\n    return 1;\n}\n\n#pragma\
    \ mark - UIPickerViewDelegate methods\n\n- (NSString *)pickerView:(UIPickerView\
    \ *)pickerView titleForRow:(NSInteger)row forComponent:(NSInteger)component {\n\
    \    return @\"Test\";\n}\n\n#pragma mark - Run the test\n\n- (IBAction)runTest:(id)sender\
    \ {\n}\n```\n\nOpen the `PerformanceTuningViewController.xib` file, and start\
    \ building the view. You want labels for Start Time, Stop Time, and Elapsed, as\
    \ well as right-aligned labels to store the actual start time, stop time, and\
    \ elapsed time; a Text View to store the results of any test that runs; a button\
    \ for launching a test; and a picker view to show the available tests. Drag all\
    \ those items to the screen, and arrange them so they look like [Figure 7–3](#Chapter07.html#fig_7_3).\n\
    \n![images](images/0703.jpg)\n\n**Figure 7–3.** *Building the view for the performance-tuning\
    \ application*\n\nThe next step is to wire all the controls to the fields you\
    \ created in the `PerformanceTuningViewController` class. Ctrl+drag from the File's\
    \ Owner icon to each of the labels for start time, stop time, and elapsed time\
    \ (the right-aligned ones for displaying the actual times), and pick the appropriate\
    \ outlet for each. Ctrl+drag from File's Owner to the Text View, and select `results`.\
    \ Ctrl+drag from File's Owner to the picker view, select `testPicker`, and then\
    \ Ctrl+drag twice from the picker view back to File's Owner: the first time select\
    \ `dataSource`, and the second time select `delegate`. You'll know if you forget\
    \ to do this, because the picker view won't appear when you run your application.\
    \ Finally, Ctrl+drag from the Run Selected Test button to File's Owner, and select\
    \ `runTest:` from the pop-up. Save everything, build your application, and run\
    \ it. You should see something that looks like [Figure 7–4](#Chapter07.html#fig_7_4).\n\
    \n![images](images/0704.jpg)\n\n**Figure 7–4.** *The first run of the performance-tuning\
    \ application*\n\n### Building the Testing Framework\n\nThe approach for adding\
    \ tests for the performance testing application to run is to create an Objective-C\
    \ protocol called `PerformanceTest` and then create an array of tests that all\
    \ implement that protocol. The application will display the names of the tests\
    \ in the picker view and execute the selected test when the user taps the Run\
    \ Selected Test button. The protocol, then, requires two methods:\n\n- One to\
    \ return the name of the test for display in the picker view.\n- One to execute\
    \ the selected test in the application's managed object context.\n\nTo keep the\
    \ project organized, create a new group under the PerformanceTuning folder (Ctrl+click\
    \ PerformanceTuning and select New Group from the pop-up menu), and call it Tests.\
    \ The tests you add throughout this chapter will go in this group. To create the\
    \ protocol, select File ![images](images/U001.jpg) New ![images](images/U001.jpg)\
    \ New File, select Cocoa Touch on the left and Objective-C protocol on the right,\
    \ and click Next. Call the protocol `PerformanceTest.h`, and put it in the Tests\
    \ group. Open `PerformanceTest.h`, and modify it to match the following code:\n\
    \n```objc\n#import <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n\n\
    @protocol PerformanceTest <NSObject>\n\n- (NSString *)name;\n- (NSString *)runWithContext:(NSManagedObjectContext\
    \ *)context;\n\n@end\n```\n\nBefore integrating the testing framework into the\
    \ application, create a test (a “test” test, if you will) so that you have something\
    \ to both see in the picker view and to run. The first test you create will retrieve\
    \ all the movies, actors, and studios from the persistent store. Create a new\
    \ Objective-C class called `FetchAllMoviesActorsAndStudiosTest` as a subclass\
    \ of `NSObject`, and add it to the Tests group you just created. The following\
    \ code is for the header file:\n\n```objc\n#import <Foundation/Foundation.h>\n\
    #import \"PerformanceTest.h\"\n\n@interface FetchAllMoviesActorsAndStudiosTest\
    \ : NSObject <PerformanceTest>\n\n@end\n```\n\nHere is the code for the implementation\
    \ file. Modify your file to look like this:\n\n```objc\n#import <CoreData/CoreData.h>\n\
    #import \"FetchAllMoviesActorsAndStudiosTest.h\"\n\n@implementation FetchAllMoviesActorsAndStudiosTest\n\
    \n- (NSString *)name {\n    return @\"Fetch all test\";\n}\n\n- (NSString *)runWithContext:(NSManagedObjectContext\
    \ *)context {\n    NSFetchRequest *request = [[NSFetchRequest alloc] init];\n\
    \    [request setEntity:[NSEntityDescription entityForName:@\"Movie\" inManagedObjectContext:context]];\n\
    \    NSArray *results = [context executeFetchRequest:request error:nil];\n\n \
    \   int actorsRead = 0, studiosRead = 0;\n    for (NSManagedObject *movie in results)\
    \ {\n        actorsRead += [[movie valueForKey:@\"actors\"] count];\n        studiosRead\
    \ += [[movie valueForKey:@\"studios\"] count];\n        [context refreshObject:movie\
    \ mergeChanges:NO];\n    }\n    return [NSString stringWithFormat:@\"Fetched %d\
    \ actors and %d studios\", actorsRead, studiosRead];\n}\n\n@end\n```"
