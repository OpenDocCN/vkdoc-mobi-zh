- fmt: "# Reading the Data Using Core Data\n\nIn this chapter, you wrote data to a\
    \ SQLite database using Core Data, and you used the `sqlite3` command-line tool\
    \ to read the data and confirm that it had been correctly stored in the persistent\
    \ store. You can also use Core Data to read the data from the persistent store.\
    \ Go back to Xcode, and open the `OrgChartAppDelegate.m` file to add methods for\
    \ reading the data using Core Data.\n\nSince the employees relationship is recursive\
    \ (that is, the same source and destination entity), use a recursive method to\
    \ display a person and their subordinates. The recursive `displayPerson:` method\
    \ shown next accepts two parameters (the person to display and an indentation\
    \ level) and recurses through a person's employees to print them at appropriate\
    \ indentation levels. The code looks like this:\n\n```\n- (void)displayPerson:(NSManagedObject*)person\
    \ withIndentation:(NSString*)indentation\n{\n  NSLog(@\"%@Name: %@\", indentation,\
    \ [person valueForKey:@\"name\"]);\n\n  // Increase the indentation for sub-levels\n\
    \  indentation = [NSString stringWithFormat:@\"%@  \", indentation];\n\n  NSSet\
    \ *employees = [person valueForKey:@\"employees\"];\n  id employee;\n  NSEnumerator\
    \ *it = [employees objectEnumerator];\n  while ((employee = [it nextObject]) !=\
    \ nil)\n  {\n    [self displayPerson:employee withIndentation:indentation];\n\
    \  }\n}\n```\n\nNow write a method that retrieves all the organizations from the\
    \ context and displays them along with their leaders and the leaders' employees.\
    \ The code is in [Listing 2–3](#Chapter02.html#list_2_3).\n\n**Listing 2–3.**\
    \ *A Method for Reading the Data from the Database*\n\n```\n- (void)readData\n\
    {\n  NSManagedObjectContext *context = [self managedObjectContext];\n  NSEntityDescription\
    \ *orgEntity = [NSEntityDescription entityForName:@\"Organization\"\ninManagedObjectContext:context];\n\
    \n  NSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];\n  [fetchRequest\
    \ setEntity:orgEntity];\n\n  NSArray *organizations = [context executeFetchRequest:fetchRequest\
    \ error:nil];\n\n  id organization;\n  NSEnumerator *it = [organizations objectEnumerator];\n\
    \  while ((organization = [it nextObject]) != nil)\n  {\n    NSLog(@\"Organization:\
    \ %@\", [organization valueForKey:@\"name\"]);\n\n    NSManagedObject *leader\
    \ = [organization valueForKey:@\"leader\"];\n    [self displayPerson:leader withIndentation:@\"\
    \  \"];\n  }\n}\n```\n\nAdd the method declarations to `OrgChartAppDelegate.h`\
    \ to silence the compiler warnings.\n\n```\n- (void)readData;\n- (void)displayPerson:(NSManagedObject\
    \ *)person withIndentation:(NSString *)indentation;\n```\n\nFinally, alter the\
    \ `didFinishLaunchingWithOptions:` method to call `[self readData]` instead of\
    \ `[self createData]`.\n\n```\n- (BOOL)application:(UIApplication *)application\n\
    didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n{\n  //[self createData];\n\
    \  [self readData];\n  self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\n  // Override point for customization after application\
    \ launch.\n  self.viewController = [[OrgChartViewController alloc]\ninitWithNibName:@\"\
    OrgChartViewController\" bundle:nil];\n  self.window.rootViewController = self.viewController;\n\
    \  [self.window makeKeyAndVisible];\n  return YES;\n}\n```\n\nBuild and launch\
    \ the application, and then look in the Debug log to see the following output,\
    \ which shows the organization you created with John as its leader and also shows\
    \ John's two subordinates:\n\n```\n2011-07-30 22:18:37.422 OrgChart[4460:f203]\
    \ Organization: MyCompany, Inc.\n2011-07-30 22:18:37.424 OrgChart[4460:f203] \
    \  Name: John\n2011-07-30 22:18:37.425 OrgChart[4460:f203]     Name: Bill\n2011-07-30\
    \ 22:18:37.426 OrgChart[4460:f203]     Name: Jane\n```\n\nFeel free to experiment\
    \ with the `OrgChart` application, altering the managed objects created in the\
    \ `createData:` method and calling `createData:` to store your changes and `readData:`\
    \ to verify your changes were written. You can delete the SQLite database file\
    \ between runs and let the `OrgChart` application re-create it, or you can let\
    \ multiple runs accumulate objects in the database. If you, for example, add a\
    \ new person (Jack) as Jane's subordinate, then the `OrgChart` application's output\
    \ would look like the following:\n\n```\n2011-07-30 22:22:21.858 OrgChart[4517:f203]\
    \ Organization: MyCompany, Inc.\n2011-07-30 22:22:21.860 OrgChart[4517:f203] \
    \  Name: John\n2011-07-30 22:22:21.861 OrgChart[4517:f203]     Name: Bill\n2011-07-30\
    \ 22:22:21.861 OrgChart[4517:f203]     Name: Jane\n2011-07-30 22:22:21.862 OrgChart[4517:f203]\
    \       Name: Jack\n```\n\nJack works for Jane. Both Jane and Bill work for John.\
    \ John is the company's leader.\n\n## Summary\n\nBy now the Core Data framework\
    \ should look a lot less overwhelming to you. In this chapter, you explored the\
    \ main classes involved in efficiently managing the persistence of entire object\
    \ graphs without having to expose the user to complex graph algorithms and grueling\
    \ C APIs in order to interact with certain databases. Using Core Data is comparable\
    \ to driving a car without having to be a mechanic. The framework is able to represent\
    \ object models and manage data object graphs with just about a dozen classes.\
    \ The simplicity of the class structure is misleading. You have seen the power\
    \ of Core Data—and this is only a beginning. As you dig deeper into the many configuration\
    \ options, UI bindings, alternate persistent stores, and custom managed object\
    \ classes, you will also see the elegance of Core Data.\n\n# Chapter 3\n\n# Storing\
    \ Data: SQLite and Other Options\n\n[Chapter 2](#Chapter02.html#ch2) explains\
    \ the classes that comprise the Core Data framework and the interdependencies\
    \ and precision with which they work together. The following chapters explain\
    \ and demonstrate the flexibility of the framework to get the desired results,\
    \ but the framework flexes only so far. The framework imposes a structure, order,\
    \ and rigidity for putting data into and taking data out of a persistent store.\
    \ You must work within that order and structure, doing things the Core Data way,\
    \ to store and retrieve data reliably. Core Data's shackles fall off, however,\
    \ when defining what the persistent store looks like or how it works. Though people\
    \ tend to think that data \"belongs\" in a database and Apple both provides and\
    \ defaults to a SQLite database for Core Data's persistent store, you have other\
    \ options; your data can rest in whatever form you want. For most cases, you'll\
    \ probably be happy with the default SQLite database, but this chapter discusses\
    \ other options and where they may be useful.\n\nIn this chapter, you will build\
    \ a simple application with two tables and a one-to-many relationship between\
    \ them. Imagine you've volunteered to run a youth soccer league, and you're trying\
    \ to keep track of the teams. In your data model, you have a `Team` table that\
    \ tracks the team name and the uniform color and a `Player` table that tracks\
    \ the first name, last name, and e-mail address for each player. One team has\
    \ many players, and each player belongs to only one team. You build this application\
    \ first for SQLite and then port it to each of the other options for your persistent\
    \ store: in-memory and atomic (or custom) stores. Follow along, and feel free\
    \ to store your data in SQLite or any other persistent store you can imagine."
