    \n# 第 6 章\n## 优化结果集\n\nAutoTrader.com 自称是“终极汽车市场”，允许美国消费者买卖汽车。根据人口普查数据，美国约有 2.5\
    \ 亿辆注册机动车辆，因此您可以想象，即使是最勇敢的潜在购车者，也会在寻找完美汽车时感到困难。为了帮助购车者从海量汽车中筛选出心仪之选，AutoTrader.com\
    \ 在其网站上提供了按车型、品牌、型号、年份、价格和位置等条件筛选可用汽车的工具。\n\n处理大量数据集时，优化结果集对于分析师从数据中提取任何意义都至关重要。计算机（包括\
    \ iDevice）擅长缩小数据集范围，以便计算机用户更容易理解他们正在处理的数据。例如，想象一下，如果“通讯录”应用没有按字母顺序对联系人进行排序，也不允许您搜索联系人，那么从您的\
    \ iPhone 上给某人打电话会变得多么困难。\n\n本章演示如何使用 Core Data 的机制对数据进行排序、过滤和聚合，从而帮助您应用的用户找到他们所需的数据。\n\
    \n### 构建测试应用程序\n\n从 Core Data 持久化存储中获取数据有两种方式。如果您已经拥有现有托管对象的句柄，则可以沿着对象图和关系拉取更多对象。如果您还没有任何对象（例如应用程序首次启动时），则必须直接从持久化存储中获取它们。在这种情况下，您通常使用\
    \ `NSFetchRequest` 的实例来获取对象。您使用 `NSEntityDescription` 初始化 `NSFetchRequest`，这有助于通过限制要检索的托管对象类型来缩小结果集。本章向您展示如何使用\
    \ `NSFetchRequest` 类以各种方式缩小您的获取请求。\n\n为了支持本章中的示例，您将重用第 2 章中的 OrgChart 应用程序。我们建议您复制一份该应用程序，因为您将在本章中对第\
    \ 2 章的数据模型进行一些更改。自第 2 章以来，您已经了解到，如果所有关系都有反向关系，Core Data 可以更好地管理对象图，因此请返回 OrgChart\
    \ 应用程序，为 leader 和 employees 添加反向关系。为此，打开 `OrgChart.xcdatamodeld` 数据模型，选择 `Person`\
    \ 实体。由于 Organization 已经拥有到 `Person` 实体的 leader 关系，请在 `Person` 中添加一个名为 organization\
    \ 的关系，将目标设置为 Organization，并选择 leader 作为反向关系。`Person` 还有一个名为 employees 的自引用关系，因此请创建从\
    \ `Person` 到 `Person` 的关系，将其命名为 manager，并选择 employees 作为反向关系。同时，将 `Person` 的 id\
    \ 属性重命名为 age。您的 `Person` 实体应如图 6–1 所示。\n\n![images](img/0601.jpg)\n\n**图 6–1.**\
    \ *包含反向关系的 Person 实体*\n"
- fmt: "### Creating the Org Chart Data\n\nThe `OrgChart` application is a very simple\
    \ application with no fancy user interface—just a blank, gray window. For the\
    \ purposes of this chapter, you will use the `OrgChart` application to retrieve\
    \ the data from the persistent store. In the `OrgChartAppDelegate.m` file, the\
    \ `createData` method populates the data store. The data it uses to populate the\
    \ data store is represented in the org chart shown in [Figure 6–2](#Chapter06.html#fig_6_2).\n\
    \n![images](images/0602.jpg)\n\n**Figure 6–2.** *The sample org chart data set*\n\
    \n[Listing 6–1](#Chapter06.html#list_6_1) shows the `createData` method that populates\
    \ the data according to [Figure 6–2](#Chapter06.html#fig_6_2). Open `OrgChartAppDelegate.m`,\
    \ and replace the `createData` method from [Chapter 2](#Chapter02.html#ch2) with\
    \ [Listing 6–1](#Chapter06.html#list_6_1)'s code.\n\n**Listing 6–1.** *The `createData`\
    \ Method That Populates the Org Chart*\n\n```\n- (void)createData\n{\n  NSManagedObjectContext\
    \ *context = [self managedObjectContext];\n  \n  NSEntityDescription *orgEntity\
    \ = [NSEntityDescription entityForName:@\"Organization\"\ninManagedObjectContext:context];\n\
    \  NSEntityDescription *personEntity = [NSEntityDescription entityForName:@\"\
    Person\"\ninManagedObjectContext:context];\n\n  { // Company A\n    NSManagedObject\
    \ *organization = [NSEntityDescription\ninsertNewObjectForEntityForName:[orgEntity\
    \ name] inManagedObjectContext:context];\n    \n    [organization setValue:@\"\
    Company A\" forKey:@\"name\"];\n    int orgId = [organization hash];\n    [organization\
    \ setValue:[NSNumber numberWithInt:orgId] forKey:@\"id\"];\n\n    NSManagedObject\
    \ *john = [NSEntityDescription\ninsertNewObjectForEntityForName:[personEntity\
    \ name] inManagedObjectContext:context];\n    [john setValue:@\"John\" forKey:@\"\
    name\"];\n    [john setValue:[NSNumber numberWithInt:32] forKey:@\"age\"];\n\n\
    \    NSManagedObject *jane = [NSEntityDescription\ninsertNewObjectForEntityForName:[personEntity\
    \ name] inManagedObjectContext:context];\n    [jane setValue:@\"Jane\" forKey:@\"\
    name\"];\n    [jane setValue:[NSNumber numberWithInt:26] forKey:@\"age\"];\n\n\
    \    NSManagedObject *tim = [NSEntityDescription\ninsertNewObjectForEntityForName:[personEntity\
    \ name] inManagedObjectContext:context];\n    [tim setValue:@\"Tim\" forKey:@\"\
    name\"];\n    [tim setValue:[NSNumber numberWithInt:22] forKey:@\"age\"];\n\n\
    \    NSManagedObject *jim = [NSEntityDescription\ninsertNewObjectForEntityForName:[personEntity\
    \ name] inManagedObjectContext:context];\n    [jim setValue:@\"Jim\" forKey:@\"\
    name\"];\n    [jim setValue:[NSNumber numberWithInt:40] forKey:@\"age\"];\n\n\
    \    NSManagedObject *kate = [NSEntityDescription\ninsertNewObjectForEntityForName:[personEntity\
    \ name] inManagedObjectContext:context];\n    [kate setValue:@\"Kate\" forKey:@\"\
    name\"];\n    [kate setValue:[NSNumber numberWithInt:40] forKey:@\"age\"];\n\n\
    \    NSManagedObject *jill = [NSEntityDescription\ninsertNewObjectForEntityForName:[personEntity\
    \ name] inManagedObjectContext:context];\n    [jill setValue:@\"Jill\" forKey:@\"\
    name\"];\n    [jill setValue:[NSNumber numberWithInt:22] forKey:@\"age\"];\n\n\
    \    NSMutableSet *johnsEmployees = [john mutableSetValueForKey:@\"employees\"\
    ];\n    [johnsEmployees addObject:jane];\n    [johnsEmployees addObject:tim];\n\
    \n    NSMutableSet *timsEmployees = [tim mutableSetValueForKey:@\"employees\"\
    ];\n\n    [timsEmployees addObject:jim];\n    [timsEmployees addObject:kate];\n\
    \    [timsEmployees addObject:jill];\n\n    [organization setValue:john forKey:@\"\
    leader\"];\n  }\n\n  { // Company B\n    NSManagedObject *organization = [NSEntityDescription\n\
    insertNewObjectForEntityForName:[orgEntity name] inManagedObjectContext:context];\n\
    \    \n    [organization setValue:@\"Company B\" forKey:@\"name\"];\n    int orgId\
    \ = [organization hash];\n    [organization setValue:[NSNumber numberWithInt:orgId]\
    \ forKey:@\"id\"];\n\n    NSManagedObject *mary = [NSEntityDescription\ninsertNewObjectForEntityForName:[personEntity\
    \ name] inManagedObjectContext:context];\n    [mary setValue:@\"Mary\" forKey:@\"\
    name\"];\n    [mary setValue:[NSNumber numberWithInt:36] forKey:@\"age\"];\n\n\
    \    NSManagedObject *tom = [NSEntityDescription\ninsertNewObjectForEntityForName:[personEntity\
    \ name] inManagedObjectContext:context];\n    [tom setValue:@\"Tom\" forKey:@\"\
    name\"];\n    [tom setValue:[NSNumber numberWithInt:26] forKey:@\"age\"];\n\n\
    \    [[mary mutableSetValueForKey:@\"employees\"] addObject:tom];\n\n    [organization\
    \ setValue:mary forKey:@\"leader\"];\n  }\n\n  [self saveContext];\n}\n```\n\n\
    The next step is to edit the `application:didFinishLaunchingWithOptions:` method\
    \ to call `createData`, like so:\n\n```\n- (BOOL)application:(UIApplication *)application\n\
    didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n{\n  [self createData];\n\
    \n  self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n\
    \  // Override point for customization after application launch.\n  self.viewController\
    \ = [[OrgChartViewController alloc]\ninitWithNibName:@\"OrgChartViewController\"\
    \ bundle:nil];\n  self.window.rootViewController = self.viewController;\n  [self.window\
    \ makeKeyAndVisible];\n  return YES;\n}\n```\n\nDelete the existing data store\
    \ from when you ran `OrgChart` in [Chapter 2](#Chapter02.html#ch2) and launch\
    \ the application. It should start, display the gray screen, and have no output.\
    \ The application has created the persistent store and populated it with the org\
    \ chart data that you use throughout the rest of the chapter for sorting, filtering,\
    \ and aggregating result sets. You can verify that the application created the\
    \ persistent store using the techniques outlined in earlier chapters to find the\
    \ SQLite data store and run queries against it using the `sqlite3` command-line\
    \ tool. See [Chapter 2](#Chapter02.html#ch2) for more information."
