    # 理解实体映射


    每个由 `NSEntityMapping` 实例表示的实体映射都包含三部分内容：


    - 一个源实体

    - 一个目标实体

    - 一种映射类型


    当 Core Data 执行迁移时，它会使用实体映射将源数据移动到目标，并根据映射类型决定如何操作。表 8-1 列出了映射类型、对应的 Core Data
    常量及其含义。


    ![images](img/t0801.jpg)


    “添加”（Add）、“移除”（Remove）和“复制”（Copy）类型并不引人关注，因为轻量级迁移可以处理这些实体映射类型。然而，“转换”（Transform）和“自定义”（Custom）类型正是本书需要专门讲解此部分的原因。它们告诉
    Core Data：每个源实体实例必须根据指定的规则，转换为目标实体的一个实例。本章将分别演示 `Transform`（转换）和 `Custom`（自定义）实体映射类型的示例。如果你为实体的某个属性指定了值表达式，则该实体映射的类型为
    `Transform`（转换）。如果你为实体映射指定了自定义迁移策略，则该实体映射将变为 `Custom`（自定义）类型。在阅读本章时，请留意 Core Data
    映射模型构建器（mapping modeler）如何针对你的修改来调整映射模型。


    要为 `Custom`（自定义）实体映射类型指定规则，你需要创建一个迁移策略（migration policy），即编写一个继承自 `NSEntityMigrationPolicy`
    的类。然后，在 Xcode 的映射模型构建器中，将你创建的类设置为该实体映射的自定义策略。


    Core Data 分三个阶段运行你的迁移。


    1. 根据源模型中的对象，在目标模型中创建对象，包括它们的属性。

    2. 在目标模型的对象之间创建关系。

    3. 验证目标模型中的数据并保存。


    你可以通过自定义策略（Custom Policy）来自定义 Core Data 执行这三个步骤的方式。`NSEntityMigrationPolicy` 类有七个方法，你可以重写这些方法来自定义
    Core Data 如何将数据从源实体迁移到目标实体，不过你通常不需要重写全部七个方法。这些方法列在 Apple 的 `NSEntityMigrationPolicy`
    类文档中，它们提供了迁移过程中的多个可重写节点，用于改变 Core Data 的迁移行为。你可以根据需要重写其中几个或全部方法，但如果一个自定义迁移策略没有重写任何方法，那它就毫无意义。通常，如果你想改变目标实例的创建方式或其属性数据的填充方式，你会重写
    `createDestinationInstancesForSourceInstance:` 方法。如果你想自定义目标实体与其他实体之间的关系创建方式，你会重写
    `createRelationshipsForDestinationInstance:` 方法。最后，如果你想在迁移过程中执行任何自定义验证，你会重写 `performCustomValidationForEntityMapping:`
    方法。


    `createDestinationInstancesForSourceInstance:` 方法有一个注意事项：如果你不调用父类的实现（你可能不会调用，因为重写此方法就是为了改变默认行为），那么你必须调用迁移管理器的
    `associateSourceInstance:withDestinationInstance:` ![images](img/U002.jpg) `forEntityMapping:`
    方法，将源实例与目标实例关联起来。忘记这样做会导致迁移出现问题。稍后在本章中，你将通过 Shapes 应用学习正确调用此方法的方式。


    # 理解属性映射


    属性映射与实体映射类似，它告诉 Core Data 如何将源数据迁移到目标。属性映射是 `NSPropertyMapping` 的一个实例，包含以下三部分内容：


    - 源实体中属性的名称。

    - 目标实体中属性的名称。

    - 一个值表达式，告诉 Core Data 如何从源获取数据到目标。


    要改变属性映射迁移数据的方式，你需要为属性映射提供一个值表达式。值表达式遵循与谓词相同的语法，并使用以下六个预定义键来辅助检索值：


    - `$manager`，代表迁移管理器。

    - `$source`，代表源实体。

    - `$destination`，代表目标实体。

    - `$entityMapping`，代表实体映射。

    - `$propertyMapping`，代表此属性映射。

    - `$entityPolicy`，代表实体迁移策略。


    如你所见，这些键的名称使其目的很容易推断。当你创建映射模型时，可以探索 Xcode 从你的源模型和目标数据模型中推断出的属性映射，以便更好地理解这些键的含义及其用法。


    最简单的值表达式是将一个属性从源实体复制到目标实体。例如，如果你有一个 `Person` 实体，它有一个 `name` 属性，并且该 `Person` 实体在你的旧模型版本和新模型版本之间没有变化，那么你的
    `PersonToPerson` 实体映射中 `name` 属性的值表达式将如下所示：


    `$source.name`


    你也可以使用值表达式对源数据进行操作。例如，假设同一个 `Person` 实体有一个名为 `salary` 的属性，用于存储每个人的薪资。在新模型中，你想给每个人加薪
    4%。那么你的值表达式将如下所示：


    `$source.salary*1.04`


    由于属性既包括属性（attributes）也包括关系（relationships），因此属性映射同时代表了对属性和关系的映射。关系的一个典型值表达式会调用一个函数，该函数接收迁移管理器、目标实例、实体映射以及源关系的名称作为参数。例如，如果你的旧数据模型中，`Person`
    实体有一个名为 `staff` 的关系，代表向此人汇报的所有人，而你的新模型将这个关系重命名为 `reports`，那么 `reports` 属性的值表达式将如下所示：


    `FUNCTION($manager, "destinationInstancesForEntityMappingNamed:sourceInstances:",
    "PersonToPerson", $source.staff)`


    请注意，你使用 `$manager` 键来传递迁移管理器，从针对源实例的实体映射中获取目标实例，传递正确的实体映射（`PersonToPerson`），并传递从
    `$source` 键获取的旧关系。

    '
- fmt: "### Creating a New Model Version That Requires a Mapping Model\n\nEarlier\
    \ in this chapter, you created an entity called `Ellipse` that had four attributes:\
    \ `x`, `y`, `width`, and `height`. You didn't do anything with that entity, and\
    \ it wasn't incorporated into the application. The time for `Ellipse` to shine\
    \ has come, however, and you're going to incorporate it into the application.\
    \ Acting on the idea that `Circle`s are just `Ellipse`s that have the same width\
    \ and height (which may make mathematicians shudder but fits nicely with the Shape\
    \ application's code), you'll migrate all the `Circle` instances to the `Ellipse`\
    \ entity and delete the `Circle` entity entirely.\n\nYou've also decided that\
    \ you'd rather call the `scale` attribute of the `Transform` entity `scalarValue`.\
    \ What's more, you've decided that the shapes that the application draws are too\
    \ big and that the scales should be reduced 20 percent to 0.4 and 0.8, instead\
    \ of the existing 0.5 and 1.0.\n\nTo perform this migration, you'll need to create\
    \ a mapping model and a custom policy that will migrate each `Circle` instance\
    \ to a corresponding `Ellipse` instance. The `x` and `y` values will copy across\
    \ as is, and the `radius` value from the `Circle` will be copied to the `width`\
    \ and `height` attributes of the `Ellipse`. This custom policy will attach to\
    \ an entity mapping that's responsible for mapping `Circle`s to `Ellipse`s.\n\n\
    You'll also need to modify the property mapping for `scalarValue` to multiply\
    \ each `scale` value by 0.8 as the data migrates.\n\nTo get started, create a\
    \ new version of your data model; you should be up to version 5. In the new data\
    \ model, delete the `Circle` entity. Next, go to the `Transform` entity, and change\
    \ the name for the `scale` attribute to `scalarValue`. Change the parent entity\
    \ for the `Ellipse` entity to `Shape`. Create or generate a custom class for the\
    \ `Ellipse` entity, put it in the Managed Objects group, and then set the `Ellipse`\
    \ entity in the data model (if necessary) to this class, as shown in [Figure 8–9](#Chapter08.html#fig_8_9).\n\
    \n![images](images/0809.jpg)\n\n**Figure 8–9.** *The `Ellipse` entity set to the\
    \ Ellipse class*\n\nNow that the entity is defined, modify the `Ellipse` code\
    \ according to [Listings 8–1](#Chapter08.html#fig_8_1) and [8–2](#Chapter08.html#fig_8_2)\
    \ so that you can use it from the controller.\n\n**Listing 8–1.** *Ellipse.h*\n\
    \n```objectivec\n#import <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n\
    #import \"Shape.h\"\n\n@interface Ellipse : Shape  \n\n@property (nonatomic, retain)\
    \ NSNumber * height;\n@property (nonatomic, retain) NSNumber * width;\n@property\
    \ (nonatomic, retain) NSNumber * x;\n@property (nonatomic, retain) NSNumber *\
    \ y;\n\n+ (Ellipse *)randomInstance:(CGPoint)origin inContext:(NSManagedObjectContext\
    \ *)context;\n\n@end\n```\n\n**Listing 8–2.** *Ellipse.m*\n\n```objectivec\n#import\
    \ \"Ellipse.h\"\n\n@implementation Ellipse\n\n@dynamic height;\n@dynamic width;\n\
    @dynamic x;\n@dynamic y;\n\n+ (Ellipse *)randomInstance:(CGPoint)origin inContext:(NSManagedObjectContext\
    \ *)context {\n    Ellipse *ellipse = [NSEntityDescription insertNewObjectForEntityForName:@\"\
    Ellipse\"\n                                                    inManagedObjectContext:context];\n\
    \n    float width = 10 + (arc4random() % 90);\n    float height = 10 + (arc4random()\
    \ % 90);\n    ellipse.x = [NSNumber numberWithFloat:origin.x];\n    ellipse.y\
    \ = [NSNumber numberWithFloat:origin.y];\n    ellipse.width = [NSNumber numberWithFloat:width];\n\
    \    ellipse.height = [NSNumber numberWithFloat:height];\n\n    return ellipse;\n\
    }\n\n@end\n```\n\nThe `Ellipse` class looks suspiciously like the `Circle` class\
    \ but with `width` and `height` properties instead of a single `radius` property.\
    \ You now must update the Shapes application code in a few places to use `Ellipse`\
    \ instead of `Circle`. In `ShapesViewController.m`, change the line\n\n```objectivec\n\
    #import \"Circle.h\"\n```\n\nto this\n\n```objectivec\n#import \"Ellipse.h\"\n\
    ```\n\nThen, in the `createShapeAt:` method, change the code that creates the\
    \ shapes to create an `Ellipse` instead of a `Circle` for the case where the random\
    \ value for `type` is `0`:\n\n```objectivec\nif (type == 0) { // Ellipse\n   \
    \ shape = [Ellipse randomInstance:point inContext:self.managedObjectContext];\n\
    }\nelse {  // Polygon\n    shape = [Polygon randomInstance:point inContext:self.managedObjectContext];\n\
    }\n```\n\nIn `BasicCanvasUIView.m`, change the `Circle.h` import to instead import\
    \ `Ellipse.h`, then find the line in the `drawRect:` method that looks like this:\n\
    \n```objectivec\nif ([entityName compare:@\"Circle\"] == NSOrderedSame) {\n```\n\
    \nThe code inside the `if` condition draws a `Circle`, and you must change it\
    \ to draw an `Ellipse`. The updated code looks like this:\n\n```objectivec\nif\
    \ ([entityName compare:@\"Ellipse\"] == NSOrderedSame) {\n    Ellipse *ellipse\
    \ = (Ellipse *)shape;\n    float x = [ellipse.x floatValue];\n    float y = [ellipse.y\
    \ floatValue];\n    float width = [ellipse.width floatValue];\n    float height\
    \ = [ellipse.height floatValue];\n\n    CGContextFillEllipseInRect(context, CGRectMake(x\
    \ - (width / 2), y - (height / 2),\n                                         \
    \          width, height));\n}\n```\n\nThis completes the code changes to use\
    \ `Ellipse`s instead of `Circle`s. You now must make code changes to use the new\
    \ name for the `scale` attribute of the `Transform` entity, `scalarValue`. In\
    \ `Transform.h`, change the property name from `scale` to `scalarValue`. In `Transform.m`,\
    \ change this line\n\n```objectivec\n@dynamic scale;\n```\n\nto this\n\n```objectivec\n\
    @dynamic scalarValue;\n```\n\nand change this line\n\n```objectivec\ntransform.scale\
    \ = [NSNumber numberWithFloat:scale];\n```\n\nto this\n\n```objectivec\ntransform.scalarValue\
    \ = [NSNumber numberWithFloat:scale];\n```\n\nOpen `BasicCanvasUIView.m`, and\
    \ change the `scale:` method to look like this:\n\n```objectivec\n-(float)scale\
    \ {\n    NSManagedObject *transform = [canvas valueForKey:@\"transform\"];\n \
    \   return [[transform valueForKey:@\"scalarValue\"] floatValue];\n}\n```\n\n\
    You must also change the code that initially creates the two `Transform` instances\
    \ to use 0.4 and 0.8 for the scale instead of 0.5 and 1.0. This code is in `ShapesViewController.m`,\
    \ in the `viewDidLoad:` method, and looks like this:\n\n```objectivec\n// If there\
    \ aren't any canvases, then we create them\nTransform *transform1 = [Transform\
    \ initWithScale:1 inContext:self.managedObjectContext];\ncanvas1 = [Canvas initWithTransform:transform1\
    \ inContext:self.managedObjectContext];\n\nTransform *transform2 = [Transform\
    \ initWithScale:0.5 inContext:self.managedObjectContext];\ncanvas2 = [Canvas initWithTransform:transform2\
    \ inContext:self.managedObjectContext];\n```\n\nChange it to this:\n\n```objectivec\n\
    // If there aren't any canvases, then we create them\nTransform *transform1 =\
    \ [Transform initWithScale:0.8 inContext:self.managedObjectContext];\ncanvas1\
    \ = [Canvas initWithTransform:transform1 inContext:self.managedObjectContext];\n\
    \nTransform *transform2 = [Transform initWithScale:0.4 inContext:self.managedObjectContext];\n\
    canvas2 = [Canvas initWithTransform:transform2 inContext:self.managedObjectContext];\n\
    ```\n\nYou have your new model, and you've updated the code to use it. You're\
    \ ready to create a mapping model that will transform your `Circle`s into `Ellipse`s\
    \ and reduce the scales by 20 percent."
  raw: '#### Creating a New Model Version That Requires a Mapping Model


    Earlier in this chapter, you created an entity called `Ellipse` that had four
    attributes: `x`, `y`, `width`, and `height`. You didn''t do anything with that
    entity, and it wasn''t incorporated into the application. The time for `Ellipse`
    to shine has come, however, and you''re going to incorporate it into the application.
    Acting on the idea that `Circle`s are just `Ellipse`s that have the same width
    and height (which may make mathematicians shudder but fits nicely with the Shape
    application''s code), you''ll migrate all the `Circle` instances to the `Ellipse`
    entity and delete the `Circle` entity entirely.


    You''ve also decided that you''d rather call the `scale` attribute of the `Transform`
    entity `scalarValue`. What''s more, you''ve decided that the shapes that the application
    draws are too big and that the scales should be reduced 20 percent to 0.4 and
    0.8, instead of the existing 0.5 and 1.0.


    To perform this migration, you''ll need to create a mapping model and a custom
    policy that will migrate each `Circle` instance to a corresponding `Ellipse` instance.
    The `x` and `y` values will copy across as is, and the `radius` value from the
    `Circle` will be copied to the `width` and `height` attributes of the `Ellipse`.
    This custom policy will attach to an entity mapping that''s responsible for mapping
    `Circle`s to `Ellipse`s.


    You''ll also need to modify the property mapping for `scalarValue` to multiply
    each `scale` value by 0.8 as the data migrates.


    To get started, create a new version of your data model; you should be up to version
    5\. In the new data model, delete the `Circle` entity. Next, go to the `Transform`
    entity, and change the name for the `scale` attribute to `scalarValue`. Change
    the parent entity for the `Ellipse` entity to `Shape`. Create or generate a custom
    class for the `Ellipse entity`, put it in the Managed Objects group, and then
    set the `Ellipse` entity in the data model (if necessary) to this class, as shown
    in [Figure 8–9](#Chapter08.html#fig_8_9).


    ![images](images/0809.jpg)


    **Figure 8–9.** *The `Ellipse` entity set to the Ellipse class*


    Now that the entity is defined, modify the `Ellipse` code according to [Listings
    8–1](#Chapter08.html#fig_8_1) and [8–2](#Chapter08.html#fig_8_2) so that you can
    use it from the controller.


    **Listing 8–1.** *Ellipse.h*


    `#import <Foundation/Foundation.h>`

    `#import <CoreData/CoreData.h>`

    `#import "Shape.h"`


    `@interface Ellipse : Shape  `


    `@property (nonatomic, retain) NSNumber * height;`

    `@property (nonatomic, retain) NSNumber * width;`

    `@property (nonatomic, retain) NSNumber * x;`

    `@property (nonatomic, retain) NSNumber * y;`


    `+ (Ellipse *)randomInstance:(CGPoint)origin inContext:(NSManagedObjectContext
    *)context;`


    `@end`


    **Listing 8–2.** *Ellipse.m*


    `#import "Ellipse.h"`


    `@implementation Ellipse`


    `@dynamic height;`

    `@dynamic width;`

    `@dynamic x;`

    `@dynamic y;`


    0 **`+ (Ellipse *)randomInstance:(CGPoint)origin inContext:(NSManagedObjectContext
    *)context {`**

    **`Ellipse *ellipse = [NSEntityDescription insertNewObjectForEntityForName:@"Ellipse"`![images](images/U002.jpg)

    `inManagedObjectContext:context];`**


    **`float width = 10 + (arc4random() % 90);`**

    **`float height = 10 + (arc4random() % 90);`**

    **`ellipse.x = [NSNumber numberWithFloat:origin.x];`**

    **`ellipse.y = [NSNumber numberWithFloat:origin.y];`**

    **`ellipse.width = [NSNumber numberWithFloat:width];`**

    **`ellipse.height = [NSNumber numberWithFloat:height];`**


    **`return ellipse;`**

    `}`


    `@end`


    The `Ellipse` class looks suspiciously like the `Circle` class but with `width`
    and `height` properties instead of a single `radius` property. You now must update
    the Shapes application code in a few places to use `Ellipse` instead of `Circle`.
    In `ShapesViewController.m`, change the line


    `#import "Circle.h"`


    to this


    **`#import "Ellipse.h"`**


    Then, in the `createShapeAt:` method, change the code that creates the shapes
    to create an `Ellipse` instead of a `Circle` for the case where the random value
    for `type` is `0`:


    `if (type == 0) { // Ellipse`

    `  shape = [Ellipse randomInstance:point inContext:self.managedObjectContext];`

    `}`

    `else {  // Polygon`

    `  shape = [Polygon randomInstance:point inContext:self.managedObjectContext];`

    `}`


    In `BasicCanvasUIView.m`, change the `Circle.h` import to instead import `Ellipse.h`,
    then find the line in the `drawRect:` method that looks like this:


    `if ([entityName compare:@"Circle"] == NSOrderedSame) {`


    The code inside the `if` condition draws a `Circle`, and you must change it to
    draw an `Ellipse`. The updated code looks like this:


    `if ([entityName compare:@"Ellipse"] == NSOrderedSame) {`

    **`Ellipse *ellipse = (Ellipse *)shape;`**

    **`float x = [ellipse.x floatValue];`**

    **`float y = [ellipse.y floatValue];`**

    **`float width = [ellipse.width floatValue];`**

    **`float height = [ellipse.height floatValue];`**


    **`CGContextFillEllipseInRect(context, CGRectMake(x - (width / 2), y - (height
    / 2),` ![images](images/U002.jpg)

    `width, height));`**

    `}`


    This completes the code changes to use `Ellipse`s instead of `Circle`s. You now
    must make code changes to use the new name for the `scale` attribute of the `Transform`
    entity, `scalarValue`. In `Transform.h`, change the property name from `scale`
    to scalarValue. In `Transform.m`, change this line


    `@dynamic scale;`


    to this


    **`@dynamic scalarValue;`**


    and change this line


    `transform.scale = [NSNumber numberWithFloat:scale];`


    to this


    `transform.`**`scalarValue`** `= [NSNumber numberWithFloat:scale];`


    Open `BasicCanvasUIView.m`, and change the `scale:` method to look like this:


    `-(float)scale {`

    `  NSManagedObject *transform = [canvas valueForKey:@"transform"];`

    `  return [[transform valueForKey:@"scalarValue"] floatValue];`

    `}`


    You must also change the code that initially creates the two `Transform` instances
    to use 0.4 and 0.8 for the scale instead of 0.5 and 1.0\. This code is in `ShapesViewController.m`,
    in the `viewDidLoad:` method, and looks like this:


    `// If there aren''t any canvases, then we create them`

    `Transform *transform1 = [Transform initWithScale:1 inContext:self.managedObjectContext];`

    `canvas1 = [Canvas initWithTransform:transform1 inContext:self.managedObjectContext];`


    `Transform *transform2 = [Transform initWithScale:0.5 inContext:self.managedObjectContext];`

    `canvas2 = [Canvas initWithTransform:transform2 inContext:self.managedObjectContext];`


    Change it to this:


    `// If there aren''t any canvases, then we create them`

    `Transform *transform1 = [Transform initWithScale:0.8 inContext:self.managedObjectContext];`

    `canvas1 = [Canvas initWithTransform:transform1 inContext:self.managedObjectContext];`


    `Transform *transform2 = [Transform initWithScale:0.4 inContext:self.managedObjectContext];`

    `canvas2 = [Canvas initWithTransform:transform2 inContext:self.managedObjectContext];`


    You have your new model, and you''ve updated the code to use it. You''re ready
    to create a mapping model that will transform your `Circle`s into `Ellipse`s and
    reduce the scales by 20 percent.'
  trans: "\n### 创建需要映射模型的新模型版本\n\n在本章前面的内容中，你创建了一个名为 `Ellipse` 的实体，它包含四个属性：`x`、`y`、`width`\
    \ 和 `height`。当时你并未对该实体进行任何操作，也未将其集成到应用程序中。不过，现在 `Ellipse` 大显身手的时刻到了，你将把它集成到应用程序中。基于\"\
    圆形就是宽高相等的椭圆\"这一理念（数学家们可能会对此感到不适，但它却非常契合 Shape 应用程序的代码），你将把所有 `Circle` 实例迁移到 `Ellipse`\
    \ 实体，并彻底删除 `Circle` 实体。\n\n同时，你决定将 `Transform` 实体的 `scale` 属性更名为 `scalarValue`。此外，你还认为应用程序绘制的形状过大，应将缩放比例从现有的\
    \ 0.5 和 1.0 分别降低 20%，调整为 0.4 和 0.8。\n\n要执行此次迁移，你需要创建一个映射模型和一个自定义策略，该策略会将每个 `Circle`\
    \ 实例迁移到对应的 `Ellipse` 实例。其中，`x` 和 `y` 的值将原样复制，而 `Circle` 的 `radius` 值将被复制到 `Ellipse`\
    \ 的 `width` 和 `height` 属性。这个自定义策略将附着在一个负责将 `Circle` 映射到 `Ellipse` 的实体映射上。\n\n\
    你还需要修改 `scalarValue` 的属性映射，以便在数据迁移时将每个 `scale` 值乘以 0.8。\n\n首先，创建数据模型的新版本；当前版本应为第\
    \ 5 版。在新数据模型中，删除 `Circle` 实体。然后，转到 `Transform` 实体，将 `scale` 属性的名称更改为 `scalarValue`。将\
    \ `Ellipse` 实体的父实体改为 `Shape`。为 `Ellipse` 实体创建或生成一个自定义类，将其放入 Managed Objects 组，然后在数据模型中将\
    \ `Ellipse` 实体（如有必要）设置为此类，如图 Figure 8–9 所示。\n\n![images](img/0809.jpg)\n\n**图\
    \ 8–9.** *将 `Ellipse` 实体设置为 Ellipse 类*\n\n实体定义完成后，根据 清单 8–1 和 8–2 修改 `Ellipse`\
    \ 的代码，以便可以从控制器中使用它。\n\n**清单 8–1.** *Ellipse.h*\n\n```objectivec\n#import <Foundation/Foundation.h>\n\
    #import <CoreData/CoreData.h>\n#import \"Shape.h\"\n\n@interface Ellipse : Shape\
    \  \n\n@property (nonatomic, retain) NSNumber * height;\n@property (nonatomic,\
    \ retain) NSNumber * width;\n@property (nonatomic, retain) NSNumber * x;\n@property\
    \ (nonatomic, retain) NSNumber * y;\n\n+ (Ellipse *)randomInstance:(CGPoint)origin\
    \ inContext:(NSManagedObjectContext *)context;\n\n@end\n```\n\n**清单 8–2.** *Ellipse.m*\n\
    \n```objectivec\n#import \"Ellipse.h\"\n\n@implementation Ellipse\n\n@dynamic\
    \ height;\n@dynamic width;\n@dynamic x;\n@dynamic y;\n\n+ (Ellipse *)randomInstance:(CGPoint)origin\
    \ inContext:(NSManagedObjectContext *)context {\n    Ellipse *ellipse = [NSEntityDescription\
    \ insertNewObjectForEntityForName:@\"Ellipse\"\n                             \
    \                       inManagedObjectContext:context];\n\n    float width =\
    \ 10 + (arc4random() % 90);\n    float height = 10 + (arc4random() % 90);\n  \
    \  ellipse.x = [NSNumber numberWithFloat:origin.x];\n    ellipse.y = [NSNumber\
    \ numberWithFloat:origin.y];\n    ellipse.width = [NSNumber numberWithFloat:width];\n\
    \    ellipse.height = [NSNumber numberWithFloat:height];\n\n    return ellipse;\n\
    }\n\n@end\n```\n\n`Ellipse` 类看起来与 `Circle` 类极为相似，只是用 `width` 和 `height` 属性替代了单一的\
    \ `radius` 属性。你现在必须更新 Shapes 应用程序代码中的几个位置，以使用 `Ellipse` 代替 `Circle`。在 `ShapesViewController.m`\
    \ 中，将这一行\n\n```objectivec\n#import \"Circle.h\"\n```\n\n修改为\n\n```objectivec\n\
    #import \"Ellipse.h\"\n```\n\n然后，在 `createShapeAt:` 方法中，修改创建形状的代码，以便当 `type` 的随机值为\
    \ `0` 时，创建 `Ellipse` 而不是 `Circle`：\n\n```objectivec\nif (type == 0) { // Ellipse\n\
    \    shape = [Ellipse randomInstance:point inContext:self.managedObjectContext];\n\
    }\nelse {  // Polygon\n    shape = [Polygon randomInstance:point inContext:self.managedObjectContext];\n\
    }\n```\n\n在 `BasicCanvasUIView.m` 中，将 `Circle.h` 的导入语句改为导入 `Ellipse.h`，然后在 `drawRect:`\
    \ 方法中找到如下所示的一行：\n\n```objectivec\nif ([entityName compare:@\"Circle\"] == NSOrderedSame)\
    \ {\n```\n\n`if` 条件内的代码用于绘制一个 `Circle`，你必须将其修改为绘制 `Ellipse`。更新后的代码如下所示：\n\n```objectivec\n\
    if ([entityName compare:@\"Ellipse\"] == NSOrderedSame) {\n    Ellipse *ellipse\
    \ = (Ellipse *)shape;\n    float x = [ellipse.x floatValue];\n    float y = [ellipse.y\
    \ floatValue];\n    float width = [ellipse.width floatValue];\n    float height\
    \ = [ellipse.height floatValue];\n\n    CGContextFillEllipseInRect(context, CGRectMake(x\
    \ - (width / 2), y - (height / 2),\n                                         \
    \          width, height));\n}\n```\n\n至此，使用 `Ellipse` 替代 `Circle` 的代码修改就完成了。现在，你需要对代码进行修改，以使用\
    \ `Transform` 实体的 `scale` 属性的新名称 `scalarValue`。在 `Transform.h` 中，将属性名称从 `scale`\
    \ 改为 `scalarValue`。在 `Transform.m` 中，将这一行\n\n```objectivec\n@dynamic scale;\n\
    ```\n\n修改为\n\n```objectivec\n@dynamic scalarValue;\n```\n\n并将这一行\n\n```objectivec\n\
    transform.scale = [NSNumber numberWithFloat:scale];\n```\n\n修改为\n\n```objectivec\n\
    transform.scalarValue = [NSNumber numberWithFloat:scale];\n```\n\n打开 `BasicCanvasUIView.m`，将\
    \ `scale:` 方法修改如下：\n\n```objectivec\n-(float)scale {\n    NSManagedObject *transform\
    \ = [canvas valueForKey:@\"transform\"];\n    return [[transform valueForKey:@\"\
    scalarValue\"] floatValue];\n}\n```\n\n你还必须修改最初创建两个 `Transform` 实例的代码，将缩放比例从 0.5\
    \ 和 1.0 改为 0.4 和 0.8。该代码位于 `ShapesViewController.m` 的 `viewDidLoad:` 方法中，如下所示：\n\
    \n```objectivec\n// If there aren't any canvases, then we create them\nTransform\
    \ *transform1 = [Transform initWithScale:1 inContext:self.managedObjectContext];\n\
    canvas1 = [Canvas initWithTransform:transform1 inContext:self.managedObjectContext];\n\
    \nTransform *transform2 = [Transform initWithScale:0.5 inContext:self.managedObjectContext];\n\
    canvas2 = [Canvas initWithTransform:transform2 inContext:self.managedObjectContext];\n\
    ```\n\n将其修改为：\n\n```objectivec\n// If there aren't any canvases, then we create\
    \ them\nTransform *transform1 = [Transform initWithScale:0.8 inContext:self.managedObjectContext];\n\
    canvas1 = [Canvas initWithTransform:transform1 inContext:self.managedObjectContext];\n\
    \nTransform *transform2 = [Transform initWithScale:0.4 inContext:self.managedObjectContext];\n\
    canvas2 = [Canvas initWithTransform:transform2 inContext:self.managedObjectContext];\n\
    ```\n\n现在，你有了新的模型，并且已经更新了代码来使用它。下一步是创建一个映射模型，该模型将把 `Circle` 转换为 `Ellipse`，并将缩放比例降低\
    \ 20%。\n"
- fmt: "#### Creating a Mapping Model\n\nTo create a mapping model, go to Xcode's\
    \ menu, and select **File** ![images](images/U001.jpg) **New** ![images](images/U001.jpg)\
    \ **New File.** In the ensuing dialog box, select Core Data under iOS on the left,\
    \ and select Mapping Model on the right, as shown in [Figure 8–10](#Chapter08.html#fig_8_10).\
    \ Click Next.\n\n![images](images/0810.jpg)\n\n**Figure 8–10.** *Creating a new\
    \ mapping model*\n\nThe next step is to select the source model. Select `Shapes\
    \ 4.xcdatamodel`, as shown in [Figure 8–11](#Chapter08.html#fig_8_11), and click\
    \ Next. You are then asked to select the target model. Select `Shapes 5.xcdatamodel`\
    \ for the destination, as shown in [Figure 8–12](#Chapter08.html#fig_8_12), and\
    \ click Next. The last step is to name the mapping model. Name it `Model4to5.xcmappingmodel`\
    \ and click Create.\n\n![images](images/0811.jpg)\n\n**Figure 8–11.** *Selecting\
    \ the source data model*\n\n![images](images/0812.jpg)\n\n**Figure 8–12.** *Selecting\
    \ the target data model*\n\nYou should now see Xcode with your mapping model created,\
    \ including all the entity mappings and property mappings that Core Data could\
    \ infer, as shown in [Figure 8–13](#Chapter08.html#fig_8_13).\n\n![images](images/0813.jpg)\n\
    \n**Figure 8–13.** *Your new mapping model*\n\nCreating a mapping model puts you\
    \ in the same place you'd be with a lightweight migration, with mappings that\
    \ Core Data can infer from your source and target data models. The next step is\
    \ to customize the mapping model to migrate `Circle`s to `Ellipse`s. Start by\
    \ creating the custom policy you'll use, which is a subclass of `NSEntityMigrationPolicy`.\
    \ Create a new Objective-C class (under the Cocoa Touch templates) called `CircleToEllipseMigrationPolicy`\
    \ that subclasses `NSEntityMigrationPolicy`, as shown in [Figure 8–14](#Chapter08.html#fig_8_14).\
    \ Once it's created, create a new group for it called Migration Mappings.\n\n\
    ![images](images/0814.jpg)\n\n**Figure 8–14.** *Creating a new migration policy*\n\
    \nThe header file for your new migration policy class is simple, as you can see:\n\
    \n```\n#import <CoreData/CoreData.h>\n\n@interface CircleToEllipseMigrationPolicy\
    \ : NSEntityMigrationPolicy\n\n@end\n```\n\nIn the implementation file, `CircleToEllipseMigrationPolicy.m`,\
    \ you want to override the `createDestinationInstancesForSourceInstance:` method.\
    \ While performing the migration, Core Data will call this method each time it\
    \ goes to create an `Ellipse` instance from a `Circle` instance. Keep in mind\
    \ that both `Circle` and `Ellipse` inherit from the `Shape` entity, so you're\
    \ responsible for handling any of `Shape`'s properties as well. In your implementation,\
    \ you create an `Ellipse` instance; copy over the `x`, `y`, and `color` values\
    \ from the `Circle` instance passed to this method; and then copy the `Circle`'s\
    \ `radius` value to the `Ellipse`'s `width` and `height` values. Finally, you\
    \ tell the migration manager about the relationship between the source's `Circle`\
    \ instance and the target's new `Ellipse` instance, which is an important step\
    \ for the migration to occur properly. [Listing 8–3](#Chapter08.html#list_8_3)\
    \ shows the implementation file.\n\n**Listing 8–3.** *CircleToEllipseMigrationPolicy.m*\n\
    \n```\n#import \"CircleToEllipseMigrationPolicy.h\"\n\n@implementation CircleToEllipseMigrationPolicy\n\
    \n- (BOOL)createDestinationInstancesForSourceInstance:(NSManagedObject *)sInstance\n\
    \                                    entityMapping:(NSEntityMapping *)mapping\n\
    \                                          manager:(NSMigrationManager *)manager\n\
    \                                            error:(NSError **)error {\n    //\
    \ Create the ellipse managed object\n    NSManagedObject *ellipse = [NSEntityDescription\n\
    \                                insertNewObjectForEntityForName:[mapping destinationEntityName]\n\
    \                                inManagedObjectContext:[manager destinationContext]];\n\
    \n    // Copy the x, y, and color values from the Circle to the Ellipse\n    [ellipse\
    \ setValue:[sInstance valueForKey:@\"x\"] forKey:@\"x\"];\n    [ellipse setValue:[sInstance\
    \ valueForKey:@\"y\"] forKey:@\"y\"];\n    [ellipse setValue:[sInstance valueForKey:@\"\
    color\"] forKey:@\"color\"];\n\n    // Copy the radius value from the Circle to\
    \ the width and height of the Ellipse\n    [ellipse setValue:[sInstance valueForKey:@\"\
    radius\"] forKey:@\"width\"];\n    [ellipse setValue:[sInstance valueForKey:@\"\
    radius\"] forKey:@\"height\"];\n\n    // Set up the association between the Circle\
    \ and the Ellipse for the migration manager\n    [manager associateSourceInstance:sInstance\n\
    \            withDestinationInstance:ellipse\n                    forEntityMapping:mapping];\n\
    \n    return YES;\n}\n\n@end\n```\n\nYou might notice that we've ignored the `name`\
    \ attribute of `Shape`. Normally, you would copy this property from the source\
    \ to the target as well, but we've done nothing with the `name` attribute in the\
    \ Shapes application. We never added it to the `Shape` custom class, and we haven't\
    \ added any code that would fill that value, so we left it out here to illustrate\
    \ a point: if you leave an attribute out of a mapping policy, that attribute won't\
    \ be copied over and will be blank in the target entity.\n\nNotice also that we\
    \ didn't copy over the `canvases` relationships. The relationships are copied\
    \ over by default in `NSEntityMigrationPolicy`'s `createRelationshipsForDestinationInstance:`\
    \ method. By not overriding that method, we get Core Data to copy those over for\
    \ us.\n\nNow, you're ready to create the entity mapping between `Circle` and `Ellipse`.\
    \ With your mapping model (`Model4to5.xcmappingmodel`) selected, click the Add\
    \ Entity Mapping button. Name the new entity mapping `CircleToEllipse` and set\
    \ its `Source` to `Circle`, its `Destination` to `Ellipse`, and its `Custom Policy`\
    \ to `CircleToEllipseMigrationPolicy`, as shown in [Figure 8–15](#Chapter08.html#fig_8_15).\n\
    \n![images](images/0815.jpg)\n\n**Figure 8–15.** *Adding and configuring the `CircleToEllipse`\
    \ entity mapping*\n\nThis takes care of mapping `Circle`s to `Ellipse`s. Next,\
    \ you need to set up the property mapping for migrating the `scale` values of\
    \ `Transform` to `scalarValues` at 80 percent of their original values. Select\
    \ the `TransformToTransform` entity mapping in the mapping model, which displays\
    \ its information, including its Property Mappings, as shown in [Figure 8–16](#Chapter08.html#fig_8_16).\n\
    \n![images](images/0816.jpg)\n\n**Figure 8–16.** *The `TransformToTransform` mapping*\n\
    \nSelect the `scalarValue` property mapping, and under Attribute Mapping enter\
    \ the following for the Expression setting (as shown in [Figure 8–17](#Chapter08.html#fig_8_17)):\n\
    \n`$source.scale*0.8`\n\n![images](images/0817.jpg)\n\n**Figure 8–17.** *Setting\
    \ the Expression to map `scale` to `scalarValue`*\n\nThis tells Core Data to take\
    \ the value from the `scale` attribute from the source data model, multiply it\
    \ by 0.8, and store the value in the `scalarValue` attribute of the target.\n\n\
    Your mapping model is ready to perform the migration. Just as with lightweight\
    \ migrations, however, you need to add some code to the application delegate to\
    \ tell Core Data to execute a migration."
  raw: '#### Creating a Mapping Model


    To create a mapping model, go to Xcode''s menu, and select **File** ![images](images/U001.jpg)
    **New** ![images](images/U001.jpg) **New File.** In the ensuing dialog box, select
    Core Data under iOS on the left, and select Mapping Model on the right, as shown
    in [Figure 8–10](#Chapter08.html#fig_8_10). Click Next.


    ![images](images/0810.jpg)


    **Figure 8–10.** *Creating a new mapping model*


    The next step is to select the source model. Select `Shapes 4.xcdatamodel`, as
    shown in [Figure 8–11](#Chapter08.html#fig_8_11), and click Next. You are then
    asked to select the target model. Select `Shapes 5.xcdatamodel` for the destination,
    as shown in [Figure 8–12](#Chapter08.html#fig_8_12), and click Next. The last
    step is to name the mapping model. Name it `Model4to5.xcmappingmodel` and click
    Create.


    ![images](images/0811.jpg)


    **Figure 8–11.** *Selecting the source data model*


    ![images](images/0812.jpg)


    **Figure 8–12.** *Selecting the target data model*


    You should now see Xcode with your mapping model created, including all the entity
    mappings and property mappings that Core Data could infer, as shown in [Figure
    8–13](#Chapter08.html#fig_8_13).


    ![images](images/0813.jpg)


    **Figure 8–13.** *Your new mapping model*


    Creating a mapping model puts you in the same place you''d be with a lightweight
    migration, with mappings that Core Data can infer from your source and target
    data models. The next step is to customize the mapping model to migrate `Circle`s
    to `Ellipse`s. Start by creating the custom policy you''ll use, which is a subclass
    of `NSEntityMigrationPolicy`. Create a new Objective-C class (under the Cocoa
    Touch templates) called `CircleToEllipseMigrationPolicy` that subclasses `NSEntityMigrationPolicy`,
    as shown in [Figure 8–14](#Chapter08.html#fig_8_14). Once it''s created, create
    a new group for it called Migration Mappings.


    ![images](images/0814.jpg)


    **Figure 8–14.** *Creating a new migration policy*


    The header file for your new migration policy class is simple, as you can see:


    `#import <CoreData/CoreData.h>`


    `@interface CircleToEllipseMigrationPolicy : NSEntityMigrationPolicy`


    `@end`


    In the implementation file, `CircleToEllipseMigrationPolicy.m`, you want to override
    the `createDestinationInstancesForSourceInstance:` method. While performing the
    migration, Core Data will call this method each time it goes to create an `Ellipse`
    instance from a `Circle` instance. Keep in mind that both `Circle` and `Ellipse`
    inherit from the `Shape` entity, so you''re responsible for handling any of `Shape`''s
    properties as well. In your implementation, you create an `Ellipse` instance;
    copy over the `x`, `y`, and `color` values from the `Circle` instance passed to
    this method; and then copy the `Circle`''s `radius` value to the `Ellipse`''s
    `width` and `height` values. Finally, you tell the migration manager about the
    relationship between the source''s `Circle` instance and the target''s new `Ellipse`
    instance, which is an important step for the migration to occur properly. [Listing
    8–3](#Chapter08.html#list_8_3) shows the implementation file.


    **Listing 8–3.** *CircleToEllipseMigrationPolicy.m*


    `#import "CircleToEllipseMigrationPolicy.h"`


    `@implementation CircleToEllipseMigrationPolicy`


    **`- (BOOL)createDestinationInstancesForSourceInstance:(NSManagedObject *)sInstance`![images](images/U002.jpg)**

    **`entityMapping:(NSEntityMapping *)mapping manager:(NSMigrationManager *)manager`![images](images/U002.jpg)**

    **`error:(NSError **)error {`**

    **`// Create the ellipse managed object`**

    **`NSManagedObject *ellipse = [NSEntityDescription`![images](images/U002.jpg)**

    **`insertNewObjectForEntityForName:[mapping destinationEntityName]`![images](images/U002.jpg)**

    **`inManagedObjectContext:[manager destinationContext]];`**


    **`// Copy the x, y, and color values from the Circle to the Ellipse`**

    **`[ellipse setValue:[sInstance valueForKey:@"x"] forKey:@"x"];`**

    **`[ellipse setValue:[sInstance valueForKey:@"y"] forKey:@"y"];`**

    **`[ellipse setValue:[sInstance valueForKey:@"color"] forKey:@"color"];`**


    **`// Copy the radius value from the Circle to the width and height of the Ellipse`**

    **`[ellipse setValue:[sInstance valueForKey:@"radius"] forKey:@"width"];`**

    **`[ellipse setValue:[sInstance valueForKey:@"radius"] forKey:@"height"];`**


    **`// Set up the association between the Circle and the Ellipse for the migration
    manager`**

    **`[manager associateSourceInstance:sInstance withDestinationInstance:ellipse`![images](images/U002.jpg)

    `forEntityMapping:mapping];`**


    **`return YES;`**

    `}`


    `@end`


    You might notice that we''ve ignored the `name` attribute of `Shape`. Normally,
    you would copy this property from the source to the target as well, but we''ve
    done nothing with the `name` attribute in the Shapes application. We never added
    it to the `Shape` custom class, and we haven''t added any code that would fill
    that value, so we left it out here to illustrate a point: if you leave an attribute
    out of a mapping policy, that attribute won''t be copied over and will be blank
    in the target entity.


    Notice also that we didn''t copy over the `canvases` relationships. The relationships
    are copied over by default in `NSEntityMigrationPolicy`''s `createRelationshipsForDestinationInstance:`
    method. By not overriding that method, we get Core Data to copy those over for
    us.


    Now, you''re ready to create the entity mapping between `Circle` and `Ellipse`.
    With your mapping model (`Model4to5.xcmappingmodel`) selected, click the Add Entity
    Mapping button. Name the new entity mapping `CircleToEllipse` and set its `Source`
    to `Circle`, its `Destination` to `Ellipse`, and its `Custom Policy` to `CircleToEllipseMigrationPolicy`,
    as shown in [Figure 8–15](#Chapter08.html#fig_8_15).


    ![images](images/0815.jpg)


    **Figure 8–15.** *Adding and configuring the `CircleToEllipse` entity mapping*


    This takes care of mapping `Circle`s to `Ellipse`s. Next, you need to set up the
    property mapping for migrating the `scale` values of `Transform` to `scalarValues`
    at 80 percent of their original values. Select the `TransformToTransform` entity
    mapping in the mapping model, which displays its information, including its Property
    Mappings, as shown in [Figure 8–16](#Chapter08.html#fig_8_16).


    ![images](images/0816.jpg)


    **Figure 8–16.** *The `TransformToTransform` mapping*


    Select the `scalarValue` property mapping, and under Attribute Mapping enter the
    following for the Expression setting (as shown in [Figure 8–17](#Chapter08.html#fig_8_17)):


    `$source.scale*0.8` ![images](images/0817.jpg)


    **Figure 8–17.** *Setting the Expression to map `scale` to `scalarValue`*


    This tells Core Data to take the value from the `scale` attribute from the source
    data model, multiply it by 0.8, and store the value in the `scalarValue` attribute
    of the target.


    Your mapping model is ready to perform the migration. Just as with lightweight
    migrations, however, you need to add some code to the application delegate to
    tell Core Data to execute a migration.'
  trans: "\n#### 创建映射模型\n\n要创建映射模型，请在 Xcode 的菜单中选择 **文件** ![images](img/U001.jpg)\
    \ **新建** ![images](img/U001.jpg) **新建文件...**。在弹出的对话框中，选择左侧 iOS 下的 Core Data，然后在右侧选择\
    \ 映射模型，如图 8-10 所示。点击“下一步”。\n\n![images](img/0810.jpg)\n\n**图 8-10.** *创建新的映射模型*\n\
    \n下一步是选择源模型。选择 `Shapes 4.xcdatamodel`，如图 8-11 所示，然后点击“下一步”。接着系统会要求您选择目标模型。为目标选择\
    \ `Shapes 5.xcdatamodel`，如图 8-12 所示，然后点击“下一步”。最后一步是为映射模型命名。将其命名为 `Model4to5.xcmappingmodel`，然后点击“创建”。\n\
    \n![images](img/0811.jpg)\n\n**图 8-11.** *选择源数据模型*\n\n![images](img/0812.jpg)\n\
    \n**图 8-12.** *选择目标数据模型*\n\n现在您应该看到 Xcode 中已经创建了您的映射模型，其中包含 Core Data 能够推断出的所有实体映射和属性映射，如图\
    \ 8-13 所示。\n\n![images](img/0813.jpg)\n\n**图 8-13.** *您的新映射模型*\n\n创建映射模型后，您就处于与轻量级迁移相同的起点，即拥有了\
    \ Core Data 可以从源和目标数据模型中推断出的映射关系。下一步是自定义映射模型，以便将 `Circle` 迁移到 `Ellipse`。首先创建您将要使用的自定义策略，该类是\
    \ `NSEntityMigrationPolicy` 的子类。创建一个名为 `CircleToEllipseMigrationPolicy` 的新 Objective-C\
    \ 类（位于 Cocoa Touch 模板下），使其继承自 `NSEntityMigrationPolicy`，如图 8-14 所示。创建完成后，为其新建一个名为“迁移映射”的组。\n\
    \n![images](img/0814.jpg)\n\n**图 8-14.** *创建新的迁移策略*\n\n您的新迁移策略类的头文件很简单，如下所示：\n\
    \n```\n#import <CoreData/CoreData.h>\n\n@interface CircleToEllipseMigrationPolicy\
    \ : NSEntityMigrationPolicy\n\n@end\n```\n\n在实现文件 `CircleToEllipseMigrationPolicy.m`\
    \ 中，您需要重写 `createDestinationInstancesForSourceInstance:` 方法。在执行迁移过程中，每当 Core Data\
    \ 要从一个 `Circle` 实例创建一个 `Ellipse` 实例时，都会调用此方法。请记住，`Circle` 和 `Ellipse` 都继承自 `Shape`\
    \ 实体，因此您也需要负责处理 `Shape` 的所有属性。在您的实现中，您创建一个 `Ellipse` 实例；将从 `Circle` 实例传递过来的 `x`、`y`\
    \ 和 `color` 值复制过去；然后将 `Circle` 的 `radius` 值复制给 `Ellipse` 的 `width` 和 `height`\
    \ 值。最后，您需要告诉迁移管理器关于源 `Circle` 实例和目标新 `Ellipse` 实例之间的关系，这是确保迁移正确进行的重要步骤。代码清单 8-3\
    \ 显示了实现文件。\n\n**代码清单 8-3.** *CircleToEllipseMigrationPolicy.m*\n\n```\n#import\
    \ \"CircleToEllipseMigrationPolicy.h\"\n\n@implementation CircleToEllipseMigrationPolicy\n\
    \n- (BOOL)createDestinationInstancesForSourceInstance:(NSManagedObject *)sInstance\n\
    \                                    entityMapping:(NSEntityMapping *)mapping\n\
    \                                          manager:(NSMigrationManager *)manager\n\
    \                                            error:(NSError **)error {\n    //\
    \ 创建椭圆托管对象\n    NSManagedObject *ellipse = [NSEntityDescription\n            \
    \                    insertNewObjectForEntityForName:[mapping destinationEntityName]\n\
    \                                inManagedObjectContext:[manager destinationContext]];\n\
    \n    // 从 Circle 复制 x, y 和 color 值到 Ellipse\n    [ellipse setValue:[sInstance\
    \ valueForKey:@\"x\"] forKey:@\"x\"];\n    [ellipse setValue:[sInstance valueForKey:@\"\
    y\"] forKey:@\"y\"];\n    [ellipse setValue:[sInstance valueForKey:@\"color\"\
    ] forKey:@\"color\"];\n\n    // 从 Circle 复制 radius 值到 Ellipse 的 width 和 height\n\
    \    [ellipse setValue:[sInstance valueForKey:@\"radius\"] forKey:@\"width\"];\n\
    \    [ellipse setValue:[sInstance valueForKey:@\"radius\"] forKey:@\"height\"\
    ];\n\n    // 为迁移管理器设置 Circle 和 Ellipse 之间的关联\n    [manager associateSourceInstance:sInstance\n\
    \            withDestinationInstance:ellipse\n                    forEntityMapping:mapping];\n\
    \n    return YES;\n}\n\n@end\n```\n\n您可能注意到我们忽略了 `Shape` 的 `name` 属性。通常情况下，您也会将这个属性从源复制到目标，但在\
    \ Shapes 应用程序中我们并没有对 `name` 属性做任何处理。我们从未将其添加到 `Shape` 的自定义类中，也没有添加任何填充该值的代码，因此这里将其省略是为了说明一点：如果您在映射策略中忽略某个属性，该属性将不会被复制，并且在目标实体中会为空。\n\
    \n另外请注意，我们没有复制 `canvases` 关系。这些关系默认会通过 `NSEntityMigrationPolicy` 的 `createRelationshipsForDestinationInstance:`\
    \ 方法复制过来。通过不重写该方法，我们让 Core Data 替我们复制这些关系。\n\n现在，您已准备好创建 `Circle` 和 `Ellipse`\
    \ 之间的实体映射了。选择您的映射模型（`Model4to5.xcmappingmodel`），点击“添加实体映射”按钮。将新实体映射命名为 `CircleToEllipse`，并将其`源`设置为\
    \ `Circle`，`目标`设置为 `Ellipse`，`自定义策略`设置为 `CircleToEllipseMigrationPolicy`，如图 8-15\
    \ 所示。\n\n![images](img/0815.jpg)\n\n**图 8-15.** *添加并配置 `CircleToEllipse` 实体映射*\n\
    \n这样就处理了将 `Circle` 映射到 `Ellipse` 的工作。接下来，您需要设置属性映射，用于将 `Transform` 的 `scale` 值以原值的\
    \ 80% 迁移到 `scalarValues`。在映射模型中选择 `TransformToTransform` 实体映射，这会显示其信息（包括属性映射），如图\
    \ 8-16 所示。\n\n![images](img/0816.jpg)\n\n**图 8-16.** *`TransformToTransform` 映射*\n\
    \n选择 `scalarValue` 属性映射，然后在“属性映射”下的“表达式”设置中输入以下内容（如图 8-17 所示）：\n\n`$source.scale*0.8`\n\
    \n![images](img/0817.jpg)\n\n**图 8-17.** *设置表达式以将 `scale` 映射到 `scalarValue`*\n\
    \n这会告诉 Core Data 从源数据模型的 `scale` 属性中取值，将其乘以 0.8，然后将结果存储到目标的 `scalarValue` 属性中。\n\
    \n您的映射模型已准备好执行迁移。然而，与轻量级迁移一样，您需要在应用程序委托中添加一些代码，以告知 Core Data 执行迁移。\n"
- fmt: "### Migrating Data\n\nCreating the mapping model is essential to performing\
    \ a migration that lightweight migrations can't handle, but you still must perform\
    \ the actual migration. This section explains how to do this and then update the\
    \ code for the Shapes application to actually run the migration. By the end of\
    \ this section, you will have a Shapes application that includes all the shapes\
    \ it had before, including the circles, but now the circles are ellipses with\
    \ the same width and height. As you tap the screen, you'll see random ellipses\
    \ being created. You also may notice that everything is 80 percent of the size\
    \ it was before.\n\nTelling Core Data to migrate from the old model to the new\
    \ one using a mapping model you create is similar to how you tell Core Data to\
    \ use a lightweight migration. As you learned earlier, the way to tell Core Data\
    \ to perform a lightweight migration is to pass an options dictionary that contains\
    \ `YES` for two keys:\n\n- `NSMigratePersistentStoresAutomaticallyOption`\n- `NSInferMappingModelAutomaticallyOption`\n\
    \nThe first key tells Core Data to automatically migrate the data, and the second\
    \ tells Core Data to infer the mapping model.\n\nFor a migration using a mapping\
    \ model you created, you clearly want Core Data to still automatically perform\
    \ the migration, so you still set the `NSMigratePersistentStoresAutomaticallyOption`\
    \ to `YES`. Since you've created the mapping model, however, you don't want Core\
    \ Data to infer anything; you want it to use your mapping model. Therefore, you\
    \ set `NSInferMappingModelAutomaticallyOption` to `NO`, or you leave it out of\
    \ the options dictionary entirely.\n\nHow, then, do you specify the mapping model\
    \ for Core Data to use to perform the migration? Do you set it in the options\
    \ dictionary? Do you pass it somehow to the persistent store coordinator's `addPersistentStoreWithType:`\
    \ method? Do you set it into the persistent store coordinator? Into the managed\
    \ object model? Into the context?\n\nThe answer, which may seem a little shocking,\
    \ is that you do nothing. Core Data will figure it out. It searches through your\
    \ mapping models, finds one that's appropriate for migrating from the source to\
    \ the destination, and uses it. This makes migrations almost criminally easy.\n\
    \n#### Running Your Migration\n\nTo run the migration of your Shapes data store,\
    \ open the `ShapesAppDelegate.m` file, and remove the `NSInferMappingModelAutomaticallyOption`\
    \ key from the options dictionary. This means you change this line:\n\n```\nNSDictionary\
    \ *options = [NSDictionary dictionaryWithObjectsAndKeys:[NSNumber numberWithBool:YES],\
    \ NSMigratePersistentStoresAutomaticallyOption, [NSNumber numberWithBool:YES],\
    \ NSInferMappingModelAutomaticallyOption, nil];\n```\n\nto this:\n\n```\nNSDictionary\
    \ *options = [NSDictionary dictionaryWithObjectsAndKeys:[NSNumber numberWithBool:YES],\
    \ NSMigratePersistentStoresAutomaticallyOption, nil];\n```\n\nThis is all you\
    \ have to do to get Core Data to migrate your data using your mapping model, `Model4to5.xcmappingmodel`.\
    \ Set your current model version to `Shapes 5`, and then build and run the Shapes\
    \ application; you should see all the shapes you had in the database before you\
    \ ran the migration, albeit shown at 80 percent of the size they were before.\
    \ Go look at the SQLite database to confirm that the migration ran. You can see\
    \ that the `ZSHAPE` table now has columns for `ZWIDTH` and `ZHEIGHT`, but none\
    \ for `ZRADIUS`.\n\n```\nCREATE TABLE ZSHAPE ( Z_PK INTEGER PRIMARY KEY, Z_ENT\
    \ INTEGER, Z_OPT INTEGER, ZHEIGHT FLOAT, ZWIDTH FLOAT, ZX FLOAT, ZY FLOAT, ZNAME\
    \ VARCHAR, ZCOLOR BLOB );\n```\n\nYou can also fetch the values for `ZSCALARVALUE`\
    \ (not `ZSCALE`) from the `ZTRANSFORM` table to verify that they're 20 percent\
    \ smaller than the 0.5 and 1.0 that they used to be.\n\n```\nsqlite> select distinct\
    \ zscalarvalue from ztransform;\n0.4\n0.8\n```\n\nTap the screen of the Shapes\
    \ application a few times to see some ellipses created, as shown in [Figure 8–18](#Chapter08.html#fig_8_18).\n\
    \n![images](images/0818.jpg)\n\n**Figure 8–18.** *The Shapes application with\
    \ ellipses*\n\n### Custom Migrations\n\nIn most data migration cases, using the\
    \ default three-step migration process (create the destination objects, create\
    \ the relationships, and validate and save) is sufficient. Data objects are created\
    \ in the new data store from the previous version, then all relationships are\
    \ created, and finally the data is validated and persisted. There are, however,\
    \ some cases where you want to intervene in the middle of the migration. This\
    \ is where you need custom migrations.\n\nLet's imagine a case where, as part\
    \ of the migration, a new attribute in the destination object has to be prepopulated\
    \ before the application can function with the new model. Taking control of the\
    \ migration process initialization means that you need to perform all the work\
    \ that Core Data usually does for you. This means that you need to do the following:\n\
    \n- Make sure migration is actually needed.\n- Set up the migration manager.\n\
    - Run your migration by splitting the model into independent parts.\n\nThis section\
    \ goes through a custom migration example step by step to show you how to make\
    \ a non-trivial migration work.\n\nTo illustrate this example, start by creating\
    \ a new version of the Shapes model. You should now be on version 6 (`Shapes 6`).\
    \ Make sure the current model version is set to the new version of the model you\
    \ just created. In the new model, edit the `Shape` entity and add an attribute\
    \ called `uniqueID` of type `String`, as shown in [Figure 8–19](#Chapter08.html#fig_8_19).\
    \ You will use the migration process to populate this field with a Universally\
    \ Unique Identifier (UUID) so that each shape in your application has a unique\
    \ serial number.\n\n![images](images/0819.jpg)\n\n**Figure 8–19.** *The shape\
    \ entity with a new field*\n\n#### Making Sure Migration Is Needed\n\nTo validate\
    \ that a model is compatible with the persistent store, use the `isConfiguration:compatibleWithStoreMetadata:`\
    \ method of the `NSManagedObjectModel` class before adding the persistent store\
    \ to the coordinator. The data store metadata can be retrieved by querying the\
    \ coordinator using the `metadataForPersistentStoreOfType:URL:error:` method.\n\
    \nOpen `ShapesAppDelegate.m` and edit the `persistentStoreCoordinator` getter\
    \ as shown in [Listing 8–4](#Chapter08.html#list_8_4).\n\n**Listing 8–4.** *persistentStoreCoordinator\
    \ Detecting if Migration is Needed*\n\n```objc\n- (NSPersistentStoreCoordinator\
    \ *)persistentStoreCoordinator {\n    if (__persistentStoreCoordinator != nil)\
    \ {\n        return __persistentStoreCoordinator;\n    }\n\n    NSURL *storeURL\
    \ = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"Shapes.sqlite\"\
    ];\n\n    __persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc]\
    \ initWithManagedObjectModel:[self managedObjectModel]];\n\n    NSError *error\
    \ = nil;\n    NSDictionary *sourceMetadata = [NSPersistentStoreCoordinator metadataForPersistentStoreOfType:NSSQLiteStoreType\
    \ URL:storeURL error:&error];\n\n    NSManagedObjectModel *destinationModel =\
    \ [__persistentStoreCoordinator managedObjectModel];\n\n    BOOL pscCompatible\
    \ = [destinationModel isConfiguration:nil compatibleWithStoreMetadata:sourceMetadata];\n\
    \n    if(!pscCompatible) {\n        // Migration is needed\n        ... perform\
    \ the migration\n    }\n\n    if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
    \ configuration:nil URL:storeURL options:nil error:&error]) {\n        NSLog(@\"\
    Unresolved error %@, %@\", error, [error userInfo]);\n        abort();\n    }\n\
    \    return __persistentStoreCoordinator;\n}\n```\n\nIf migration is not needed,\
    \ then the persistent store can be registered with the coordinator as usual."
  raw: '### Migrating Data


    Creating the mapping model is essential to performing a migration that lightweight
    migrations can''t handle, but you still must perform the actual migration. This
    section explains how to do this and then update the code for the Shapes application
    to actually run the migration. By the end of this section, you will have a Shapes
    application that includes all the shapes it had before, including the circles,
    but now the circles are ellipses with the same width and height. As you tap the
    screen, you''ll see random ellipses being created. You also may notice that everything
    is 80 percent of the size it was before.


    Telling Core Data to migrate from the old model to the new one using a mapping
    model you create is similar to how you tell Core Data to use a lightweight migration.
    As you learned earlier, the way to tell Core Data to perform a lightweight migration
    is to pass an options dictionary that contains `YES` for two keys:


    *   `NSMigratePersistentStoresAutomaticallyOption`

    *   `NSInferMappingModelAutomaticallyOption`


    The first key tells Core Data to automatically migrate the data, and the second
    tells Core Data to infer the mapping model.


    For a migration using a mapping model you created, you clearly want Core Data
    to still automatically perform the migration, so you still set the `NSMigratePersistentStoresAutomaticallyOption`
    to `YES`. Since you''ve created the mapping model, however, you don''t want Core
    Data to infer anything; you want it to use your mapping model. Therefore, you
    set `NSInferMappingModelAutomaticallyOption` to `NO`, or you leave it out of the
    options dictionary entirely.


    How, then, do you specify the mapping model for Core Data to use to perform the
    migration? Do you set it in the options dictionary? Do you pass it somehow to
    the persistent store coordinator''s `addPersistentStoreWithType:` method? Do you
    set it into the persistent store coordinator? Into the managed object model? Into
    the context?


    The answer, which may seem a little shocking, is that you do nothing. Core Data
    will figure it out. It searches through your mapping models, finds one that''s
    appropriate for migrating from the source to the destination, and uses it. This
    makes migrations almost criminally easy.


    #### Running Your Migration


    To run the migration of your Shapes data store, open the `ShapesAppDelegate.m`
    file, and remove the `NSInferMappingModelAutomaticallyOption` key from the options
    dictionary. This means you change this line


    `NSDictionary *options = [NSDictionary dictionaryWithObjectsAndKeys:[NSNumber`![images](images/U002.jpg)

    `numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption, [NSNumber`![images](images/U002.jpg)

    `numberWithBool:YES], NSInferMappingModelAutomaticallyOption, nil];`


    to this


    `NSDictionary *options = [NSDictionary dictionaryWithObjectsAndKeys:[NSNumber`![images](images/U002.jpg)

    `numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption, nil];`


    This is all you have to do to get Core Data to migrate your data using your mapping
    model, `Model4to5.xcmappingmodel`. Set your current model version to `Shapes 5`,
    and then build and run the Shapes application; you should see all the shapes you
    had in the database before you ran the migration, albeit shown at 80 percent of
    the size they were before. Go look at the SQLite database to confirm that the
    migration ran. You can see that the `ZSHAPE` table now has columns for `ZWIDTH`
    and `ZHEIGHT`, but none for `ZRADIUS`.


    `CREATE TABLE ZSHAPE ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER,
    ZHEIGHT FLOAT, ZWIDTH FLOAT, ZX FLOAT, ZY FLOAT, ZNAME VARCHAR, ZCOLOR BLOB );`


    You can also fetch the values for `ZSCALARVALUE` (not `ZSCALE`) from the `ZTRANSFORM`
    table to verify that they''re 20 percent smaller than the 0.5 and 1.0 that they
    used to be.


    `sqlite> select distinct zscalarvalue from ztransform;`

    `0.4`

    `0.8`


    Tap the screen of the Shapes application a few times to see some ellipses created,
    as shown in [Figure 8–18](#Chapter08.html#fig_8_18).


    ![images](images/0818.jpg)


    **Figure 8–18.** *The Shapes application with ellipses*


    ### Custom Migrations


    In most data migration cases, using the default three-step migration process (create
    the destination objects, create the relationships, and validate and save) is sufficient.
    Data objects are created in the new data store from the previous version, then
    all relationships are created, and finally the data is validated and persisted.
    There are, however, some cases where you want to intervene in the middle of the
    migration. This is where you need custom migrations.


    Let''s imagine a case where, as part of the migration, a new attribute in the
    destination object has to be prepopulated before the application can function
    with the new model. Taking control of the migration process initialization means
    that you need to perform all the work that Core Data usually does for you. This
    means that you need to do the following:


    *   Make sure migration is actually needed.

    *   Set up the migration manager.

    *   Run your migration by splitting the model into independent parts.


    This section goes through a custom migration example step by step to show you
    how to make a non-trivial migration work.


    To illustrate this example, start by creating a new version of the Shapes model.
    You should now be on version 6 (`Shapes 6`). Make sure the current model version
    is set to the new version of the model you just created. In the new model, edit
    the `Shape` entity and add an attribute called ‘uniqueID'' of type `String`, as
    shown in [Figure 8–19](#Chapter08.html#fig_8_19). You will use the migration process
    to populate this field with a Universally Unique Identifier (UUID) so that each
    shape in your application has a unique serial number.


    ![images](images/0819.jpg)


    **Figure 8–19.** *The shape entity with a new field*


    #### Making Sure Migration Is Needed


    To validate that a model is compatible with the persistent store, use the `isConfiguration:compatibleWithStoreMetadata:`
    method of the `NSManagedObjectModel` class before adding the persistent store
    to the coordinator. The data store metadata can be retrieved by querying the coordinator
    using the `metadataForPersistentStoreOfType:URL:error:` method.


    Open `ShapesAppDelegate.m` and edit the `persistentStoreCoordinator` getter as
    shown in [Listing 8–4](#Chapter08.html#list_8_4).


    **Listing 8–4.** *persistentStoreCoordinator Detecting if Migration is Needed*


    `- (NSPersistentStoreCoordinator *)persistentStoreCoordinator {`

    `    if (__persistentStoreCoordinator != nil) {`

    `        return __persistentStoreCoordinator;`

    `    }`


    `    NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@"Shapes.sqlite"];`


    `    __persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self
    managedObjectModel]];`


    **`NSError *error = nil;`**

    **`NSDictionary *sourceMetadata = [NSPersistentStoreCoordinator metadataForPersistentStoreOfType:NSSQLiteStoreType
    URL:storeURL error:&error];`**


    **`NSManagedObjectModel *destinationModel = [__persistentStoreCoordinator managedObjectModel];`**


    **`BOOL pscCompatible = [destinationModel isConfiguration:nil compatibleWithStoreMetadata:sourceMetadata];`**


    **`if(!pscCompatible) {`**

    **`// Migration is needed`**


    **`... perform the migration`**

    **`}`**


    `    if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType     configuration:`
    nil `URL:storeURL options:nil error:&error]) {`

    `        NSLog(@"Unresolved error %@, %@", error, [error userInfo]);`

    `        abort();`

    `    }    `

    `    return __persistentStoreCoordinator;`

    `}`


    If migration is not needed, then the persistent store can be registered with the
    coordinator as usual.'
  trans: "\n### 迁移数据\n\n创建映射模型对于执行轻量级迁移无法处理的迁移操作至关重要，但你仍需实际执行迁移。本节将解释如何实现这一点，并更新 Shapes\
    \ 应用的代码以实际运行迁移。到本节结束时，你将拥有一个包含之前所有形状（包括圆形）的 Shapes 应用，但现在的圆形都变为宽度和高度相同的椭圆。当你点击屏幕时，会看到随机生成的椭圆。你可能还会注意到，所有形状的大小都变成了原来的\
    \ 80%。\n\n使用你创建的映射模型指示 Core Data 从旧模型迁移到新模型，与指示 Core Data 使用轻量级迁移的方式类似。正如你之前所学，指示\
    \ Core Data 执行轻量级迁移的方法是传递一个选项字典，其中包含两个键对应的 `YES`：\n\n- `NSMigratePersistentStoresAutomaticallyOption`\n\
    - `NSInferMappingModelAutomaticallyOption`\n\n第一个键指示 Core Data 自动迁移数据，第二个键指示 Core\
    \ Data 推断映射模型。\n\n对于使用你创建的映射模型的迁移，你显然希望 Core Data 仍然自动执行迁移，因此你仍需将 `NSMigratePersistentStoresAutomaticallyOption`\
    \ 设置为 `YES`。然而，既然你已经创建了映射模型，你就无需 Core Data 进行任何推断；你希望它使用你的映射模型。因此，你将 `NSInferMappingModelAutomaticallyOption`\
    \ 设置为 `NO`，或者完全将其从选项字典中移除。\n\n那么，你如何指定 Core Data 用于执行迁移的映射模型呢？是在选项字典中设置它吗？还是以某种方式将其传递给持久化存储协调器的\
    \ `addPersistentStoreWithType:` 方法？又或者将其设置到持久化存储协调器、托管对象模型或上下文中？\n\n答案可能会让你有些惊讶：你什么都不用做。Core\
    \ Data 会自行处理。它会在你的映射模型中搜索，找到一个适合从源模型迁移到目标模型的映射模型，然后使用它。这使得迁移变得异常简单。\n\n#### 运行你的迁移\n\
    \n要运行 Shapes 数据存储的迁移，请打开 `ShapesAppDelegate.m` 文件，并从选项字典中移除 `NSInferMappingModelAutomaticallyOption`\
    \ 键。这意味着你将这一行代码：\n\n```\nNSDictionary *options = [NSDictionary dictionaryWithObjectsAndKeys:[NSNumber\
    \ numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption, [NSNumber\
    \ numberWithBool:YES], NSInferMappingModelAutomaticallyOption, nil];\n```\n\n\
    修改为：\n\n```\nNSDictionary *options = [NSDictionary dictionaryWithObjectsAndKeys:[NSNumber\
    \ numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption, nil];\n```\n\
    \n要让 Core Data 使用你的映射模型 `Model4to5.xcmappingmodel` 迁移数据，你只需完成这些操作。将当前模型版本设置为 `Shapes\
    \ 5`，然后构建并运行 Shapes 应用；你应该会看到运行迁移前数据库中已有的所有形状，尽管它们现在以原来 80% 的大小显示。去查看 SQLite 数据库，确认迁移已运行。你可以看到\
    \ `ZSHAPE` 表现在包含 `ZWIDTH` 和 `ZHEIGHT` 列，但没有 `ZRADIUS` 列。\n\n```\nCREATE TABLE\
    \ ZSHAPE ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER, ZHEIGHT FLOAT,\
    \ ZWIDTH FLOAT, ZX FLOAT, ZY FLOAT, ZNAME VARCHAR, ZCOLOR BLOB );\n```\n\n你还可以从\
    \ `ZTRANSFORM` 表中获取 `ZSCALARVALUE`（不是 `ZSCALE`）的值，以验证它们比原来的 0.5 和 1.0 小了 20%。\n\
    \n```\nsqlite> select distinct zscalarvalue from ztransform;\n0.4\n0.8\n```\n\n\
    点击 Shapes 应用的屏幕几次，查看生成的椭圆，如图 8–18 所示。\n\n![images](img/0818.jpg)\n\n**图 8–18.**\
    \ *包含椭圆的 Shapes 应用*\n\n### 自定义迁移\n\n在大多数数据迁移场景中，使用默认的三步迁移过程（创建目标对象、创建关系、验证并保存）就足够了。首先根据先前版本在新数据存储中创建数据对象，然后创建所有关系，最后验证并持久化数据。然而，在某些情况下，你需要在迁移过程中进行干预。这时就需要用到自定义迁移。\n\
    \n设想一个场景，作为迁移的一部分，目标对象中的一个新属性需要在应用能够使用新模型之前预填充。接管迁移过程的初始化意味着你需要执行 Core Data 通常为你做的所有工作。这意味着你需要执行以下操作：\n\
    \n- 确保确实需要迁移。\n- 设置迁移管理器。\n- 通过将模型拆分为独立的部分来运行迁移。\n\n本节将通过一个自定义迁移的示例，逐步向你展示如何实现一个非平凡的迁移。\n\
    \n为了说明这个示例，首先创建一个 Shapes 模型的新版本。你现在应该处于版本 6（`Shapes 6`）。确保当前模型版本设置为刚创建的新模型版本。在新模型中，编辑\
    \ `Shape` 实体，添加一个类型为 `String` 的属性，名为 `uniqueID`，如图 8–19 所示。你将利用迁移过程为每个形状填充一个通用唯一标识符（UUID），以使应用中的每个形状都有一个唯一的序列号。\n\
    \n![images](img/0819.jpg)\n\n**图 8–19.** *包含新字段的形状实体*\n\n#### 确保需要迁移\n\n要验证模型是否与持久化存储兼容，请在将持久化存储添加到协调器之前，使用\
    \ `NSManagedObjectModel` 类的 `isConfiguration:compatibleWithStoreMetadata:` 方法。可以通过使用协调器的\
    \ `metadataForPersistentStoreOfType:URL:error:` 方法查询来检索数据存储元数据。\n\n打开 `ShapesAppDelegate.m`，按照清单\
    \ 8–4 所示编辑 `persistentStoreCoordinator` 的 getter 方法。\n\n**清单 8–4.** *persistentStoreCoordinator\
    \ 检测是否需要迁移*\n\n```objc\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\
    \ {\n    if (__persistentStoreCoordinator != nil) {\n        return __persistentStoreCoordinator;\n\
    \    }\n\n    NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
    Shapes.sqlite\"];\n\n    __persistentStoreCoordinator = [[NSPersistentStoreCoordinator\
    \ alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\n    NSError\
    \ *error = nil;\n    NSDictionary *sourceMetadata = [NSPersistentStoreCoordinator\
    \ metadataForPersistentStoreOfType:NSSQLiteStoreType URL:storeURL error:&error];\n\
    \n    NSManagedObjectModel *destinationModel = [__persistentStoreCoordinator managedObjectModel];\n\
    \n    BOOL pscCompatible = [destinationModel isConfiguration:nil compatibleWithStoreMetadata:sourceMetadata];\n\
    \n    if(!pscCompatible) {\n        // 需要迁移\n        ... 执行迁移\n    }\n\n    if\
    \ (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
    \ configuration:nil URL:storeURL options:nil error:&error]) {\n        NSLog(@\"\
    Unresolved error %@, %@\", error, [error userInfo]);\n        abort();\n    }\n\
    \    return __persistentStoreCoordinator;\n}\n```\n\n如果不需要迁移，则按通常方式将持久化存储注册到协调器即可。\n"
- fmt: "#### Setting Up the Migration Manager\n\nOnce it has been determined that\
    \ migration is indeed needed, the next step is to set up the migration manager,\
    \ which is a subclass of `NSMigrationManager`. To do this, you need to get a hold\
    \ of the model that matches the current persistent store: the previous version\
    \ of the model. This is the model you use as the source model of your migration\
    \ process. The source model can be obtained using the `mergedModelFromBundles:forStoreMetadata:`\
    \ method, which looks for a model in the application main bundle that matches\
    \ the given metadata.\n\nStart creating your custom migration manager by creating\
    \ a new class that extends `NSMigrationManager`. In this example, you'll call\
    \ it `MyMigrationManager` (see [Listing 8–5](#Chapter08.html#list_8_5)).\n\n**Listing\
    \ 8–5.** *MyMigrationManager.h*\n\n```objc\n#import <CoreData/CoreData.h>\n\n\
    @interface MyMigrationManager : NSMigrationManager\n@end\n```\n\nThe implementation\
    \ of the migration creates a new UUID for each `Shape` instance that is being\
    \ migrated and assigns the `uniqueID` attribute during the migration (see [Listing\
    \ 8–6](#Chapter08.html#list_8_6)).\n\n**Listing 8–6.** *MyMigrationManager.m*\n\
    \n```objc\n#import \"MyMigrationManager.h\"\n\n@implementation MyMigrationManager\n\
    \n- (void)associateSourceInstance:(NSManagedObject *)sourceInstance\nwithDestinationInstance:(NSManagedObject\
    \ *)destinationInstance\nforEntityMapping:(NSEntityMapping *)entityMapping {\n\
    \n    [super associateSourceInstance:sourceInstance\n    withDestinationInstance:destinationInstance\
    \ forEntityMapping:entityMapping];\n\n    NSString *name = [entityMapping destinationEntityName];\n\
    \n    if([name compare:@\"Ellipse\"] == NSOrderedSame || [name compare:@\"Polygon\"\
    ] == NSOrderedSame)\n        // Generate UUID\n        CFUUIDRef theUUID = CFUUIDCreate(NULL);\n\
    \        CFStringRef string = CFUUIDCreateString(NULL, theUUID);\n        CFRelease(theUUID);\n\
    \        NSString *uuid = (__bridge NSString *)string;\n\n        [destinationInstance\
    \ setValue:uuid forKey:@\"uniqueID\"];\n    }\n}\n\n@end\n```\n\n#### Running\
    \ the Migration\n\nIn this last step, you need to set your own class as the manager\
    \ in charge of performing this migration. Add an import for `MyMigrationManager.h`\
    \ at the top of the `ShapesAppDelegate.m` file and edit the `persistentStoreCoordinator`\
    \ method again, as shown in [Listing 8–7](#Chapter08.html#list_8_7).\n\n**Listing\
    \ 8–7.** *Launching the Custom Migration*\n\n```objc\n- (NSPersistentStoreCoordinator\
    \ *)persistentStoreCoordinator {\n    if (__persistentStoreCoordinator != nil)\
    \ {\n        return __persistentStoreCoordinator;\n    }\n\n    NSURL *storeURL\
    \ = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"Shapes.sqlite\"\
    ];\n    NSURL *newStoreURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
    Shapes-Temp.sqlite\"];\n\n    NSError *error = nil;\n    NSDictionary *sourceMetadata\
    \ = [NSPersistentStoreCoordinator metadataForPersistentStoreOfType:NSSQLiteStoreType\
    \ URL:storeURL error:&error];\n\n    if(sourceMetadata != nil) {\n    }\n\n  \
    \  NSManagedObjectModel *destinationModel = [self managedObjectModel];\n\n   \
    \ BOOL pscCompatible = [destinationModel isConfiguration:nil compatibleWithStoreMetadata:sourceMetadata];\n\
    \n    if(!pscCompatible) {\n        NSLog(@\"Migration is needed\");\n       \
    \ // Migration is needed\n\n        NSManagedObjectModel *sourceModel = [NSManagedObjectModel\
    \ mergedModelFromBundles:nil forStoreMetadata:sourceMetadata];\n\n        MyMigrationManager\
    \ *migrationManager = [[MyMigrationManager alloc] initWithSourceModel:sourceModel\
    \ destinationModel:destinationModel];\n\n        NSMappingModel *mappingModel\
    \ = [NSMappingModel inferredMappingModelForSourceModel:sourceModel destinationModel:destinationModel\
    \ error:&error];\n\n        if(mappingModel == nil) {\n            NSLog(@\"Could\
    \ not find a mapping model\");\n            abort();\n        }\n\n        if(![migrationManager\
    \ migrateStoreFromURL:storeURL\n            type:NSSQLiteStoreType\n         \
    \   options:nil\n            withMappingModel:mappingModel\n            toDestinationURL:newStoreURL\n\
    \            destinationType:NSSQLiteStoreType\n            destinationOptions:nil\n\
    \            error:&error]) {\n            // Deal with error\n            NSLog(@\"\
    Error migrating %@, %@\", error, [error userInfo]);\n            abort();\n  \
    \      }\n\n        // Replace the old store with the new one now that it's migrated\n\
    \        NSFileManager *fm = [NSFileManager defaultManager];\n        NSURL *backupURL\
    \ = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"Shapes-old.sqlite\"\
    ];\n\n        if(![fm moveItemAtURL:storeURL toURL:backupURL error:&error]) {\n\
    \            NSLog(@\"Error backing up the store\");\n            abort();\n \
    \       }\n        else if(![fm moveItemAtURL:newStoreURL toURL:storeURL error:&error])\
    \ {\n            NSLog(@\"Error putting the new store in place\");\n         \
    \   abort();\n        }\n        else if(![fm removeItemAtURL:backupURL error:&error])\
    \ {\n            NSLog(@\"Error getting rid of the old store\");\n        }\n\
    \    }\n\n    __persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc]\
    \ initWithManagedObjectModel:destinationModel];\n\n    if (![__persistentStoreCoordinator\
    \ addPersistentStoreWithType:NSSQLiteStoreType configuration:nil URL:storeURL\
    \ options:nil error:&error]) {\n        NSLog(@\"Unresolved error %@, %@\", error,\
    \ [error userInfo]);\n        abort();\n    }\n\n    return __persistentStoreCoordinator;\n\
    }\n```\n\nNote that the source and destination store URLs must be different so\
    \ that the migration can run. Once it is successful, it is up to you to get rid\
    \ of the old data store and clean up. This is done by moving the SQLite files\
    \ directly using the `NSFileManager` class as shown in the implementation above.\
    \ Upon returning from the method, the new and properly populated data store is\
    \ in place for the application to use.\n\nRun the application to execute the custom\
    \ migration and verify that the data store contains the right data by using the\
    \ `sqlite3` command line as usual.\n\n### Summary\n\nAlthough changing data models\
    \ can be painful in other programming environments, Core Data makes changing your\
    \ data models nearly painless. With its support for model versions, lightweight\
    \ migrations, and mapping models for migrations that aren't lightweight, you can\
    \ change your data models with impunity and let Core Data make sure your users'\
    \ data stays intact.\n\nAs with any part of your application, however, make sure\
    \ you test your migrations. Test them extensively. Test them even more than you\
    \ test your application code. Users can handle an occasional application crash,\
    \ but if they upgrade to the latest version of your application and lose their\
    \ data in the process, your application and reputation may never recover.\n\n\
    ## Chapter 9\n\n## Managing Table Views Using a Fetched Results Controller\n\n\
    A fetched results controller, implemented by the `NSFetchedResultsController`\
    \ class, blends Core Data results with a table view. Launch any nongame app on\
    \ your iPhone you'll probably find at least one table view. Apple made the table\
    \ view an essential part of the iPhone interface and uses it to great advantage\
    \ in its own applications. Many, if not all, of the applications you develop will\
    \ have table views, so anything you can learn to make using table views easier\
    \ will benefit you.\n\nIn line with its legendary attention to detail, Apple includes\
    \ a class with the Core Data framework that's designed to make Core Data work\
    \ better with table views. Called `NSFetchedResultsController`, it eases the development\
    \ tasks required to display data from a Core Data persistent store in a table\
    \ view. You saw the `NSFetchedResultsController` class in the League Manager application\
    \ from [Chapter 3](#Chapter03.html#ch3) in which the `MasterViewController` class\
    \ uses an instance of `NSFetchedResultsController` to display the teams. This\
    \ chapter dives deeper into how to use an `NSFetchedResultsController` and implements\
    \ a new All-Player view using `NSFetchedResultsController` in League Manager."
