  trans: "\n### 类的交互方式\n\n至此，您应该已经对与 Core Data 交互所涉及的类以及其底层机制有了良好的理解。本节将扩展上一节创建的 `OrgChart`\
    \ 应用程序，展示 Core Data 类之间交互的一些示例。与上一节类似，本章仍将重点保持在相对基础的层面。本章的目标是展示这些类如何协同工作。本书其余章节将深入探讨每个概念（如数据操作、自定义持久化存储、性能优化等）。\n\
    \n上一节创建的数据模型应类似于 图 2–14 所示。\n\n![images](img/0214.jpg)\n\n**图 2–14.** *组织数据模型*\n\
    \n`Organization` 和 `Person` 实体均使用 `Integer 16` 类型的属性作为每个实体的唯一标识符。阅读至此的大部分程序员可能已经想到了自增，并曾在\
    \ Xcode 用户界面中点击尝试自行启用标识符属性的自增功能。如果你正是其中一员，现在又回来阅读本章，你很可能已经感到沮丧并放弃了尝试。你找不到自增功能的原因很简单：它不存在。Core\
    \ Data 使用真正的对象引用来管理对象图。它不需要像在关系数据库中那样作为主键使用的唯一自增标识符。如果持久化存储恰好是像 SQLite 这样的关系数据库，框架可能会使用一些自增标识符作为主键。但无论如何，作为\
    \ Core Data 用户，你不必担心这一点；这只是实现细节。我们特意在这个例子中引入标识符的概念，原因有二：\n\n*   引出自增的问题。\n*  \
    \ 展示如何使用 Core Data 管理数值。\n\n人员标识符的含义类似于社会保险号。它并非为了自增而设计，因为它是在数据存储外部计算得出的标识符。在\
    \ `Organization` 示例中，我们简单地通过对象哈希值派生 ID。虽然这不能保证唯一性，但足以满足此应用的目的，并且实现简单。\n\n**注意：**作为程序员，你应该注意不要过分拘泥于已有的数据库知识。Core\
    \ Data 不是数据库；它是一个对象图持久化框架。其行为更接近于面向对象数据库，而非传统的关系数据库。\n\n代码清单 2–1 展示了应用程序委托类 `OrgChartAppDelegate.h`\
    \ 的头文件。你可以看到三个 Core Data 相关的属性：\n\n*   `NSManagedObjectContext *managedObjectContext`\n\
    *   `NSManagedObjectModel *managedObjectModel`\n*   `NSPersistentStoreCoordinator\
    \ *persistentStoreCoordinator`\n\n你还可以看到返回应用程序文档目录（持久化存储所在位置）的方法声明，以及另一个用于保存托管对象上下文的\
    \ `saveContext:` 方法声明。实现文件 `OrgChartAppDelegate.m` 将定义这些方法。\n\n**代码清单 2–1.** *`OrgChartAppDelegate.h`*\n\
    \n```\n#import <UIKit/UIKit.h>\n#import <CoreData/CoreData.h>\n\n@class OrgChartViewController;\n\
    \n@interface OrgChartAppDelegate : UIResponder <UIApplicationDelegate>\n\n@property\
    \ (strong, nonatomic) UIWindow *window;\n@property (strong, nonatomic) OrgChartViewController\
    \ *viewController;\n@property (readonly, strong, nonatomic) NSManagedObjectContext\
    \ *managedObjectContext;\n@property (readonly, strong, nonatomic) NSManagedObjectModel\
    \ *managedObjectModel;\n@property (readonly, strong, nonatomic) NSPersistentStoreCoordinator\
    \ *persistentStoreCoordinator;\n\n- (void)saveContext;\n- (NSURL *)applicationDocumentsDirectory;\n\
    \n@end\n```\n\n在 `OrgChartAppDelegate.m` 中，为来自 `OrgChartAppDelegate.h` 的三个 Core\
    \ Data 相关属性添加 `@synthesize` 行，如下所示：\n\n```\n@synthesize managedObjectContext =\
    \ __managedObjectContext;\n@synthesize managedObjectModel = __managedObjectModel;\n\
    @synthesize persistentStoreCoordinator = __persistentStoreCoordinator;\n```\n\n\
    接着，你需要为这三个 Core Data 相关属性编写访问器代码。每个访问器首先判断其负责的对象是否已被创建。如果已创建，则返回该对象。如果未创建，则访问器使用适当的\
    \ Core Data 公式创建该对象，创建所需的任何其他成员对象，并返回它。代码清单 2–2 中需添加到 `OrgChartAppDelegate.m`\
    \ 的代码应该看起来很熟悉。\n\n**代码清单 2–2.** *添加三个 Core Data 相关属性的访问器*\n\n```\n- (void)saveContext\n\
    {\n    NSError *error = nil;\n    NSManagedObjectContext *managedObjectContext\
    \ = self.managedObjectContext;\n    if (managedObjectContext != nil)\n    {\n\
    \        if ([managedObjectContext hasChanges] && ![managedObjectContext save:&error])\n\
    \        {\n            NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n\
    \            abort();\n        }\n    }\n}\n\n#pragma mark - Core Data stack\n\
    \n/**\n Returns the managed object context for the application.\n If the context\
    \ doesn't already exist, it is created and bound to the persistent store coordinator\
    \ for the application.\n */\n- (NSManagedObjectContext *)managedObjectContext\n\
    {\n    if (__managedObjectContext != nil)\n    {\n        return __managedObjectContext;\n\
    \    }\n\n    NSPersistentStoreCoordinator *coordinator = [self persistentStoreCoordinator];\n\
    \    if (coordinator != nil)\n    {\n        __managedObjectContext = [[NSManagedObjectContext\
    \ alloc] init];\n        [__managedObjectContext setPersistentStoreCoordinator:coordinator];\n\
    \    }\n    return __managedObjectContext;\n}\n\n/**\n Returns the managed object\
    \ model for the application.\n If the model doesn't already exist, it is created\
    \ from the application's model.\n */\n- (NSManagedObjectModel *)managedObjectModel\n\
    {\n    if (__managedObjectModel != nil)\n    {\n        return __managedObjectModel;\n\
    \    }\n    NSURL *modelURL = [[NSBundle mainBundle] URLForResource:@\"OrgChart\"\
    \ withExtension:@\"momd\"];\n    __managedObjectModel = [[NSManagedObjectModel\
    \ alloc] initWithContentsOfURL:modelURL];\n    return __managedObjectModel;\n\
    }\n\n/**\n Returns the persistent store coordinator for the application.\n If\
    \ the coordinator doesn't already exist, it is created and the application's store\
    \ added to it.\n */\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\n\
    {\n    if (__persistentStoreCoordinator != nil)\n    {\n        return __persistentStoreCoordinator;\n\
    \    }\n\n    NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
    OrgChart.sqlite\"];\n\n    NSError *error = nil;\n    __persistentStoreCoordinator\
    \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
    \    if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
    \ configuration:nil URL:storeURL options:nil error:&error])\n    {\n        NSLog(@\"\
    Unresolved error %@, %@\", error, [error userInfo]);\n        abort();\n    }\n\
    \n    return __persistentStoreCoordinator;\n}\n\n#pragma mark - Application's\
    \ Documents directory\n```\n"
- fmt: "```objectivec\n/**\n Returns the URL to the application's Documents directory.\n\
    \ */\n- (NSURL *)applicationDocumentsDirectory\n{\n  return [[[NSFileManager defaultManager]\
    \ URLsForDirectory:NSDocumentDirectory\n                                     \
    \       inDomains:NSUserDomainMask] lastObject];\n}\n```\n\nSince this chapter\
    \ focuses on how Core Data works, not on user interface design and development,\
    \ the `OrgChart` application can remain content with a blank, gray screen. All\
    \ its work will happen in the `didFinishLaunchingWithOptions:` method, and we\
    \ show you how to use external tools to verify that Core Data persisted the objects\
    \ appropriately.\n\nBefore you can read any data from the persistent store, you\
    \ have to put it there. Change the `didFinishLaunchingWithOptions:` method to\
    \ call a new method called `createData:`, like this:\n\n```objectivec\n- (BOOL)application:(UIApplication\
    \ *)application\ndidFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n\
    {\n  [self createData];\n  self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\n  // Override point for customization after application\
    \ launch.\n  self.viewController = [[OrgChartViewController alloc]\n         \
    \                 initWithNibName:@\"OrgChartViewController\" bundle:nil];\n \
    \ self.window.rootViewController = self.viewController;\n  [self.window makeKeyAndVisible];\n\
    \  return YES;\n}\n```\n\nIn `OrgChartAppDelegate.h`, declare the `createData:`\
    \ method like this:\n\n```objectivec\n- (void)createData;\n```\n\nNow define the\
    \ `createData:` method in `OrgChartAppDelegate.m` like this:\n\n```objectivec\n\
    - (void)createData\n{\n}\n```\n\nInside the `createData:` implementation, you\
    \ create an organization and three employees. Start with the organization. Remember\
    \ that the managed objects, as far as you're concerned, live in the managed object\
    \ context. Don't worry about the persistent store; the managed object context\
    \ takes care of managing the persistent store for you. You just create the managed\
    \ object representing the organization and insert it into the managed object context\
    \ using this code:\n\n```objectivec\nNSManagedObject *organization = [NSEntityDescription\n\
    \                                 insertNewObjectForEntityForName:@\"Organization\"\
    \n                                 inManagedObjectContext:self.managedObjectContext];\n\
    ```\n\nYou've now created an organization, but you've given it no name and no\
    \ identifier. The `name` attribute is of type `String`, so set the name for the\
    \ organization like this:\n\n```objectivec\n[organization setValue:@\"MyCompany,\
    \ Inc.\" forKey:@\"name\"];\n```\n\nThe `id` attribute is of type `Integer 16`,\
    \ which is a class. All Core Data attributes must have a class type, not a primitive\
    \ type. To create the `id` attribute for the organization, create a primitive\
    \ `int` from the hash of the name of the organization and then convert the primitive\
    \ `int` into an `NSNumber` object, which can be used in the `setValue:forKey:`\
    \ method. The code looks like this:\n\n```objectivec\n[organization setValue:[NSNumber\
    \ numberWithInt:[@\"MyCompany, Inc.\" hash]] forKey:@\"id\"];\n```\n\n**NOTE:**\
    \ Core Data uses objects for attributes in order to comply with key-value coding\
    \ requirements. Any primitive type should be converted into `NSNumber` to use\
    \ the `setValue:forKey:` method.\n\nThe organization now has a name and an identifier,\
    \ although the changes haven't yet been committed to the persistent store. The\
    \ framework knows that you've altered an object that it's tracking and makes the\
    \ necessary adjustments to the persistent store when the `save:` method is called\
    \ to commit the context changes.\n\nAn organization without people accomplishes\
    \ little, so create three people named John, Jane, and Bill using the same approach\
    \ you used to create the organization: create a new managed object in the managed\
    \ object context using the appropriately named entity description, and set the\
    \ name and identifier values. The code looks like this:\n\n```objectivec\nNSManagedObject\
    \ *john = [NSEntityDescription insertNewObjectForEntityForName:@\"Person\"\n \
    \                                             inManagedObjectContext:self.managedObjectContext];\n\
    [john setValue:@\"John\" forKey:@\"name\"];\n[john setValue:[NSNumber numberWithInt:[@\"\
    John\" hash]] forKey:@\"id\"];\n\nNSManagedObject *jane = [NSEntityDescription\
    \ insertNewObjectForEntityForName:@\"Person\"\n                              \
    \                inManagedObjectContext:self.managedObjectContext];\n[jane setValue:@\"\
    Jane\" forKey:@\"name\"];\n[jane setValue:[NSNumber numberWithInt:[@\"Jane\" hash]]\
    \ forKey:@\"id\"];\n\nNSManagedObject *bill = [NSEntityDescription insertNewObjectForEntityForName:@\"\
    Person\"\n                                              inManagedObjectContext:self.managedObjectContext];\n\
    [bill setValue:@\"Bill\" forKey:@\"name\"];\n[bill setValue:[NSNumber numberWithInt:[@\"\
    Bill\" hash]] forKey:@\"id\"];\n```\n\nYou now have one organization and three\
    \ unrelated people. The organizational chart should have John as the leader of\
    \ the company, while Jane and Bill should report to John. The `OrgChart` application's\
    \ data model has two types of relationships. The leader is a one-to-one relationship\
    \ from `Organization` to `Person`, while the employees are set through a one-to-many\
    \ relationship between `Person` and itself. Setting the value of the one-to-one\
    \ relationship is surprisingly simple.\n\n```objectivec\n[organization setValue:john\
    \ forKey:@\"leader\"];\n```\n\nCore Data knows that you are assigning a relationship\
    \ value because it knows the data model and knows that `leader` represents a one-to-one\
    \ relationship. Your code would not run if you were to pass a managed object with\
    \ the wrong entity type as the value.\n\nTo assign Jane and Bill as John's subordinates,\
    \ you have to assign values to the `employees` one-to-many relationship. Core\
    \ Data returns the many side of a one-to-many relationship as a set (`NSSet`),\
    \ which is an unordered collection of unique objects. For John's `employees` relationship,\
    \ Core Data returns the set of the existing employees working for John if you\
    \ call the `valueForKey:` method. Since you want to add objects to the set, however,\
    \ call the `mutableSetValueForKey:` method, because it returns an `NSMutableSet`,\
    \ which you can add to and delete from, instead of an immutable `NSSet`. Adding\
    \ a new `Person` managed object to the returned `NSMutableSet` adds a new employee\
    \ to the relationship. The code looks like this:\n\n```objectivec\nNSMutableSet\
    \ *johnsEmployees = [john mutableSetValueForKey:@\"employees\"];\n[johnsEmployees\
    \ addObject:jane];\n[johnsEmployees addObject:bill];\n```\n\nOnce again, since\
    \ you've modified the object graph of objects tracked by Core Data, you don't\
    \ have to do anything else in order to help it manage the dependencies between\
    \ the different pieces of data. Everything behaves just like you would expect\
    \ from regular objects. Once again, though, the changes aren't committed until\
    \ you save the managed object context, which you do using the `saveContext:` method\
    \ you created.\n\n```objectivec\n[self saveContext];\n```\n\nThis ends the contents\
    \ of the `createData:` method. Run the application to create the data in your\
    \ SQLite database. Again, you won't see anything in the iPhone simulator but a\
    \ blank, gray screen. In the next section, we use other tools to verify that the\
    \ `OrgChart` application added your data to the database."
