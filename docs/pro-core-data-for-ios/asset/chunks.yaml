  trans: "\n### 使用子查询\n\n你在上一章中了解了如何使用子查询来简化代码。在本节中，你将添加一个测试，以展示使用子查询与手动检索相关数据之间的区别。考虑一个示例，你想从一部电影中查找符合特定条件的所有演员。如果不使用子查询，你必须首先获取所有符合条件的电影。然后，你需要遍历每部电影并提取演员。接着，你遍历所有演员并将其添加到结果集中，同时确保如果同一演员出演多部电影，不会重复添加。手动查询的测试如下所示：\n\
    \n```\nNSMutableDictionary *actorsMap = [NSMutableDictionary dictionary];\nrequest\
    \ = [[NSFetchRequest alloc] init];\n[request setEntity:[NSEntityDescription entityForName:@\"\
    Movie\" inManagedObjectContext:context]];\n[request setPredicate:[NSPredicate\
    \ predicateWithFormat:@\"(rating < %d) OR (name LIKE %@)\", 5, @\"*c*or*\"]];\n\
    NSArray *movies = [context executeFetchRequest:request error:nil];\n\nfor (NSManagedObject\
    \ *movie in movies) {\n    NSSet *actorSet = [movie valueForKey:@\"actors\"];\n\
    \    for (NSManagedObject *actor in actorSet) {\n        [actorsMap setValue:actor\
    \ forKey:[[[actor objectID] URIRepresentation] description]];\n    }\n}\n```\n\
    \n在这个实现中，`actorsMap` 字典包含了所有演员。你通过 `objectID` 作为键来消除重复项。另一种替代方法是使用子查询（更多关于构建子查询的信息，请参考第\
    \ 6 章）。在这种情况下，子查询如下所示：\n\n```\nrequest = [[NSFetchRequest alloc] init];\n[request\
    \ setEntity:[NSEntityDescription entityForName:@\"Actor\" inManagedObjectContext:context]];\n\
    [request setPredicate:[NSPredicate predicateWithFormat:@\"(SUBQUERY(movies, $x,\
    \ ($x.rating < %d) OR ($x.name LIKE %@)).@count > 0)\", 5, @\"*c*or*\"]];\nNSArray\
    \ *actors = [context executeFetchRequest:request error:nil];\n```\n\n这里的一个主要区别是，你让持久化存储区完成所有检索匹配演员的工作，这意味着大部分结果无需返回到\
    \ Core Data 的上下文层进行后续处理。使用子查询时，你实际上并没有检索电影，而是直接设置获取请求来获取演员。相比之下，手动方式在检索电影后，必须触发故障（faults）才能检索演员。\n\
    \n为了在测试中演示这一点，请在项目中创建一个名为 `SubqueryTest` 的新类。头文件如下所示：\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"PerformanceTest.h\"\n\n@interface SubqueryTest : NSObject <PerformanceTest>\n\
    \n@end\n```\n\n测试在 `SubqueryTest.m` 中实现，如下所示：\n\n```\n#import <CoreData/CoreData.h>\n\
    #import \"SubqueryTest.h\"\n\n@implementation SubqueryTest\n\n- (NSString *)name\
    \ {\n    return @\"子查询性能测试\";\n}\n\n- (NSString *)runWithContext:(NSManagedObjectContext\
    \ *)context {\n    NSMutableString *result = [NSMutableString string];\n\n   \
    \ NSFetchRequest *request;\n\n    int count = 0;\n\n    [context reset];\n   \
    \ NSDate *startTest1 = [NSDate date];\n    NSMutableDictionary *actorsMap = [NSMutableDictionary\
    \ dictionary];\n    request = [[NSFetchRequest alloc] init];\n    [request setEntity:[NSEntityDescription\
    \ entityForName:@\"Movie\" inManagedObjectContext:context]];\n    [request setPredicate:[NSPredicate\
    \ predicateWithFormat:@\"(rating < %d) OR (name LIKE %@)\", 5, @\"*c*or*\"]];\n\
    \    NSArray *movies = [context executeFetchRequest:request error:nil];\n\n  \
    \  for (NSManagedObject *movie in movies) {\n        NSSet *actorSet = [movie\
    \ valueForKey:@\"actors\"];\n        for (NSManagedObject *actor in actorSet)\
    \ {\n            [actorsMap setValue:actor forKey:[[[actor objectID] URIRepresentation]\
    \ description]];\n        }\n    }\n\n    count = [actorsMap count];\n\n    NSDate\
    \ *endTest1 = [NSDate date];\n\n    NSTimeInterval test1 = [endTest1 timeIntervalSinceDate:startTest1];\n\
    \    [result appendFormat:@\"无子查询: %.2f s\\n\", test1];\n    [result appendFormat:@\"\
    检索到的演员数: %d\\n\", count];\n\n    [context reset];\n    NSDate *startTest2 = [NSDate\
    \ date];\n    request = [[NSFetchRequest alloc] init];\n    [request setEntity:[NSEntityDescription\
    \ entityForName:@\"Actor\" inManagedObjectContext:context]];\n    [request setPredicate:[NSPredicate\
    \ predicateWithFormat:@\"(SUBQUERY(movies, $x, ($x.rating < %d) OR ($x.name LIKE\
    \ %@)).@count > 0)\", 5, @\"*c*or*\"]];\n\n    NSArray *actors = [context executeFetchRequest:request\
    \ error:nil];\n    count = [actors count];\n    NSDate *endTest2 = [NSDate date];\n\
    \n    NSTimeInterval test2 = [endTest2 timeIntervalSinceDate:startTest2];\n  \
    \  [result appendFormat:@\"子查询: %.2f s\\n\", test2];\n    [result appendFormat:@\"\
    检索到的演员数: %d\\n\", count];\n\n    return result;\n}\n\n@end\n```\n\n打开 `PerformanceTuningViewController.m`，将\
    \ `SubqueryTest` 的一个实例添加到 `tests` 数组中，以便能够运行该测试。测试结果——速度提升超过 80%——是毋庸置疑的。\n\n\
    ```\n无子查询: 0.74 s\n检索到的演员数: 200\n子查询: 0.13 s\n检索到的演员数: 200\n```\n\n你编写谓词的方式会对应用程序的性能产生深远影响。应始终留意你要求\
    \ Core Data 执行的操作，以及如何通过更高效的谓词实现相同的结果。\n\n### 分析性能\n\n虽然在编写代码前深思熟虑，并理解故障（faulting）、预抓取（prefetching）和内存使用等概念的影响，通常能让你写出性能良好的稳固代码，但你往往仍需要一种无偏见、客观的方法来评估应用程序的表现。对应用程序性能最无偏见且最客观的评价来自运行它的计算机。因此，让计算机测量你应用程序中\
    \ Core Data 交互的结果，能为优化性能提供至关重要的见解。\n\n苹果提供了一款名为 Instruments 的工具，它可以测量应用程序的多个方面，包括与\
    \ Core Data 相关的项目。本节将展示如何使用 Instruments 来测量应用程序中 Core Data 的相关指标。我们鼓励你探索 Instruments\
    \ 提供的其他测量选项。\n"
- fmt: '### Launching Instruments


    Although you can launch Instruments as you would any other application, Xcode
    provides a simpler way to launch it to run your application. From the Xcode menu,
    select `Product` → `Profile`. This launches Instruments and displays a dialog
    asking you what you want to profile, as shown in Figure 7–12.


    ![images](images/0712.jpg)


    **Figure 7–12.** *Instruments asking you to choose a template*


    Since Instruments offers no Core Data template for iOS, select the `Blank` template
    and click the `Profile` button. That opens the main Instruments window with a
    message asking you to drag recording instruments here from the Library, as Figure
    7–13 shows.


    ![images](images/0713.jpg)


    **Figure 7–13.** *The main Instruments window*


    Click the arrow beside `Library` to display the library. You''ll see four Core
    Data-related instruments among the palette of recording instruments, as shown
    in Figure 7–14. Drag all four of these to the left sidebar of the Instruments
    window so that it resembles Figure 7–15.


    ![images](images/0714.jpg)


    **Figure 7–14.** *The Core Data recording instruments in the instrument library*


    ![images](images/0715.jpg)


    **Figure 7–15.** *The main Instruments window with the Core Data recording instruments*


    Now that you''ve configured Instruments to record Core Data interactions, click
    the `Record` button at the top left of the Instruments window to launch the iOS
    Simulator and the `PerformanceTuning` application.


    ### Understanding the Results


    The Instruments window shows the Core Data measurements it''s tracking, which
    include the following:


    - Core Data saves

    - Core Data fetches

    - Core Data faults

    - Core Data cache misses


    Run any of the tests in the `PerformanceTuning` application—say, the Pre-fetch
    Faulting Test—and wait for the test to complete. When the test finishes, click
    the `Stop` button in the upper left of Instruments to stop the application and
    stop recording Core Data measurements. You can then review the results from your
    test to see information about saves, fetches, faults, and cache misses. You can
    save the results to the file system for further review by selecting `File` → `Save
    As` from the menu. You reopen them in Instruments using the standard `File` →
    `Open` menu item.


    Figure 7–16 shows the Instruments window after running the Pre-fetch Faulting
    Test. You can see the fetch counts and fetch durations, which are in microseconds,
    for the Core Data fetches (you may have to jiggle the headers a bit to get everything
    to display). The code ran one fetch request against the `Movie` entity (Instruments
    lists the call for a fetch twice: once when the call starts and once when it finishes).
    The request, which took 450,700 microseconds, fetched 200 movies, which you can
    tell from the fetch entity, `Movie`, and the fetch count, 200.


    ![images](images/0716.jpg)


    **Figure 7–16.** *Results from the Pre-fetch Faulting Test*


    You can see the call tree for the fetch request by changing the drop-down in the
    middle of the window from `Event List` to `Call Tree`. You can reduce the navigation
    depth required to see the calls in your application''s code by checking the box
    next to `Hide System Libraries` on the left of the window. Figure 7–17 shows the
    call tree for the fetch request. Using the call tree, you can determine which
    parts of your code are fetching data from your Core Data store.


    ![images](images/0717.jpg)


    **Figure 7–17.** *The call tree for the fetch request*


    This is just a taste of what Instruments can do for you to help you determine
    how your application is using Core Data and how it can lead you to places where
    Core Data performance is slow enough to warrant optimization efforts.


    ### Summary


    From uniquing to faulting to caching managed objects, Core Data performs a significant
    amount of data access performance optimization for you. These optimizations come
    free, without any extra effort on your part. You should be aware of the optimizations
    that Core Data provides, however, so that you make sure to work with, not against,
    them.


    Not all Core Data performance gains come automatically, however. In this chapter,
    you learned how to use techniques such as prefetching and predicate optimization
    to squeeze all the performance from Core Data that you can for your applications.
    You also learned how to analyze your Core Data application using the Instruments
    application, so you can understand how your application is using Core Data and
    where the trouble spots are.


    Other iOS programming books might do an excellent job showing you how to display
    a spinner and a “Please Wait” message when running long queries against your persistent
    store. This book shows you how to avoid the need for the spinner and “Please Wait”
    message entirely.


    ## Chapter 8


    ## Versioning and Migrating Data


    As you develop Core Data–based applications, you usually don''t get your data
    model exactly right the first time. You start by creating a data model that seems
    to meet your application''s data needs, but as you progress through the development
    of the application, you''ll often find that your data model needs to change to
    serve your growing vision of what your application should do. During this stage
    of your application''s life, changing your data model to match your new understanding
    of the application''s data poses little cost: your application will no longer
    launch, crashing on startup with the message:


    ```

    The model used to open the store is incompatible with the one used to create the
    store.

    ```


    You resolve this issue either by finding the database file on the file system
    and deleting it or by deleting your fledgling application from the iPhone Simulator
    or your device. Either way, the database file that uses your outdated schema disappears,
    along with data in the persistent store, and your application re-creates the database
    file the next time it launches. You''ll probably do this several times during
    the development of your application.


    Once you release your application, however, and people start using it, they will
    accumulate data they deem important in the persistent stores on their devices.
    Asking them to delete their data stores any time you want to release a new version
    of the application with a changed data model will drop your app instantly to one-star
    status, and the people commenting will decry Apple''s rating system for not allowing
    ratings of zero or even negative stars.


    Does that mean releasing your application freezes its data model, that the data
    model in the 1.0 version of your application is permanent? That you''d better
    get the first public version of the data model perfect, because you''ll never
    be able to change it? Thankfully, no. Apple anticipated the need for improving
    Core Data models over the life of applications and built mechanisms for you to
    change data models and then migrate users'' data to the new models, all without
    their intervention or even awareness. This chapter goes through the process of
    versioning your data models and migrating data across those versions, however
    complex the changes you''ve made to the model.'
