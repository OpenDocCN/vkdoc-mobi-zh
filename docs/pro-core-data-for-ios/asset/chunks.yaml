    use by ensuring the uniqueness of each object in memory and that no two memory
    instances of an object point to the same instance in the persistent store.


    Consider, for example, the Shapes application from [Chapter 5](#Chapter05.html#ch5).
    Each `Shape` instance has a relationship with two `Canvas` instances. When you
    run the Shapes application and reference the two `Canvas` instances through any
    `Shape` instances, you always get the same two `Canvas` instances, as [Figure
    7–9](#Chapter07.html#fig_7_9) depicts. If Core Data didn''t use uniquing, you
    could find yourself in the scenario shown in [Figure 7–10](#Chapter07.html#fig_7_10),
    where each `Canvas` instance is represented in memory several times, once for
    each `Shape`, and each `Shape` instance is represented in memory several times,
    once for each `Canvas`.


    ![images](images/0709.jpg)


    **Figure 7–9.** *Uniquing shapes and canvases*


    ![images](images/0710.jpg)


    **Figure 7–10.** *Nonuniquing shapes and canvases*


    Uniquing not only conserves memory but also eliminates data inconsistency issues.
    Think what could happen, for example, if Core Data didn''t employ uniquing and
    the Shapes application had two memory instances of each shape (one for each canvas).
    Suppose that `Canvas 1` changed the color of a shape to mauve and `Canvas 2` changed
    the color of the shape to lime green. What color should the shape display? When
    the application stores the shape in the persistent store, what color should it
    save? You can imagine the data inconsistency bugs you''d have to track down if
    Core Data maintained more than one instance of each data object in memory.


    Note that uniquing occurs within a single managed object context only, not across
    managed object contexts. The good news, however, is that Core Data''s default
    behavior, which you can''t change, is to unique. Uniquing comes free with Core
    Data.


    To test uniquing, you''ll create a test that fetches all the movies from the persistent
    store and then compares each of their related actors to each other movie''s related
    actors. For the test to pass, the code must verify that only 200 `Actor` instances
    live in memory and that each movie points to the same 200 actors. To begin, create
    a new class called `UniquingTest,` which should implement the `PerformanceTest`
    protocol, like so:


    `#import <Foundation/Foundation.h>`

    **`#import "PerformanceTest.h"`**


    `@interface UniquingTest : NSObject <PerformanceTest>`


    `@end`'
  trans: '

    ### 暴力缓存过期


    如果你不关心丢失所有托管对象，可以完全重置上下文。这通常不是你想要选择的选项，但它极其高效。`NSManagedObjectContext` 有一个 `reset`
    方法，可以一次性清空缓存。一旦你调用 `[managedObjectContext reset]`，内存占用将显著降低，但如果你想再次获取任何对象，就必须付出访问持久化存储的代价。还请理解，与其他任何大规模销毁机制一样，在正在运行的应用程序中重置缓存会带来严重的副作用和连带损害。例如，在重置前你正在使用的任何托管对象现在都失效了。如果你尝试对它们进行任何操作，都会遭遇运行时错误。


    ### 通过 Fault 机制使缓存过期


    正如关于 Fault 的章节所解释的，Fault 是一种更精细的选项。你可以通过调用 `[context refreshObject:managedObject
    mergeChanges:NO]` 使任何托管对象变成 Fault。此方法调用后，该对象便成为 Fault，因此它在缓存中占用的内存会最小化，尽管并非为零。然而，这种策略一个不可忽视的优势是，当托管对象转变为
    Fault 时，它所引用的任何托管对象（通过关系）都会被释放。如果这些相关的托管对象没有其他引用指向它们，它们就会从缓存中移除，从而进一步降低内存占用。以这种方式使托管对象变为
    Fault 有助于剪枝整个对象图。


    ## 唯一性保证


    商业界和科技界都喜欢把名词变成动词，而伪词 *uniquing* 就证明了这一弱点。它试图定义使某物变得唯一或确保唯一性的行为。使用情况表明，不仅是苹果公司没有发明这个术语，而且它早于
    Core Data 出现。然而，苹果公司在其中文档中采用了这个术语，这引发了人们的担忧：有一天苹果公司会把听音乐的行为称为 *iPodding*。


    科技行业将术语 *uniquing* 与内存对象及其在数据存储中的表示关联起来。在《Core Java Data Objects》（Prentice Hall，2003
    年）一书中提到，uniquing“确保无论一个持久化对象被查找多少次，它在内存中都只有一个表示。在同一个 `PersistenceManager` 实例的范围内，对同一个持久化对象的所有引用都指向同一个内存对象。”


    Martin Fowler 在《企业应用架构模式》（Addison-Wesley Professional，2005 年）中为其取了一个不那么花哨、更具描述性且更符合英语习惯的名称：*identity
    map*。他解释说，身份映射“通过将每个已加载的对象保存在一个映射中，确保每个对象只被加载一次”。不管你怎么称呼它或如何描述它，*uniquing* 意味着
    Core Data 通过确保每个对象在内存中的唯一性，并且没有两个对象的内存实例指向持久化存储中的同一个实例，来节省内存使用。


    例如，考虑第 5 章 中的 Shapes 应用程序。每个 `Shape` 实例都与两个 `Canvas` 实例存在关系。当你运行 Shapes 应用程序并通过任何
    `Shape` 实例引用这两个 `Canvas` 实例时，你总是会得到相同的两个 `Canvas` 实例，如图 7–9 所示。如果 Core Data 不使用唯一性保证，你可能会发现自己处于图
    7–10 所示的场景中，其中每个 `Canvas` 实例在内存中被多次表示，每个 `Shape` 对应一次，而每个 `Shape` 实例在内存中也被多次表示，每个
    `Canvas` 对应一次。


    ![images](img/0709.jpg)


    **图 7–9.** *唯一化形状和画布*


    ![images](img/0710.jpg)


    **图 7–10.** *非唯一化形状和画布*


    唯一性保证不仅节省内存，还消除了数据不一致的问题。例如，想想如果 Core Data 不采用唯一性保证，并且 Shapes 应用程序中每个形状都有两个内存实例（每个画布一个），会发生什么。假设
    `Canvas 1` 将某个形状的颜色改为淡紫色，而 `Canvas 2` 将该形状的颜色改为青柠色。那么该形状应该显示什么颜色？当应用程序将该形状存储到持久化存储中时，它应该保存什么颜色？你可以想象，如果
    Core Data 在内存中维护了每个数据对象的多个实例，你将不得不追踪哪些数据不一致的 bug。


    请注意，唯一性保证仅在单个托管对象上下文内发生，不会跨托管对象上下文。不过，好消息是，Core Data 的默认行为（你无法更改）就是进行唯一化。唯一性保证是
    Core Data 自带的功能。


    为了测试唯一性保证，你将创建一个测试，从持久化存储中获取所有电影，然后比较每部电影的关联演员与另一部电影的关联演员。为了通过测试，代码必须验证内存中只有 200
    个 `Actor` 实例，并且每部电影都指向相同的这 200 个演员。首先，创建一个名为 `UniquingTest` 的新类，它应该实现 `PerformanceTest`
    协议，如下所示：


    ```

    #import <Foundation/Foundation.h>

    #import "PerformanceTest.h"


    @interface UniquingTest : NSObject <PerformanceTest>


    @end

    ```

    '
- fmt: "### 实现文件中的唯一性测试\n\n实现文件`UniquingTest.m`获取所有电影并遍历它们，提取与每部电影相关的所有演员。代码对演员进行排序，使其处于确定的顺序，以便可以预测性地比较实例。在第一次循环（针对第一部电影）中，代码将每个演员存储到一个引用数组中，以便所有后续循环都有东西可以与之比较。在后续的每次循环中，代码提取电影的演员并将其与引用数组进行比较。如果有一个演员不匹配，测试就会失败。代码如下所示：\n\
    \n```\n#import <CoreData/CoreData.h>\n#import \"UniquingTest.h\"\n\n@implementation\
    \ UniquingTest\n\n- (NSString *)name {\n    return @\"Uniquing test\";\n}\n\n\
    // 拉取所有电影，并验证它们的演员对象是否都指向相同的演员\n- (NSString *)runWithContext:(NSManagedObjectContext\
    \ *)context {\n    NSString *result = @\"Uniquing test passed\";\n\n    // 用于比较的演员数组\n\
    \    NSMutableArray *referenceActors = nil;\n\n    // 对演员进行排序\n    NSSortDescriptor\
    \ *sortDescriptor = [[NSSortDescriptor alloc] initWithKey:@\"name\" ascending:YES];\n\
    \    NSArray *sortDescriptors = [[NSArray alloc] initWithObjects:sortDescriptor,\
    \ nil];\n\n    // 拉取所有电影\n    NSFetchRequest *request = [[NSFetchRequest alloc]\
    \ init];\n    [request setEntity:[NSEntityDescription entityForName:@\"Movie\"\
    \ inManagedObjectContext:context]];\n    NSArray *results = [context executeFetchRequest:request\
    \ error:nil];\n\n    // 遍历每部电影\n    for (NSManagedObject *movie in results) {\n\
    \        // 获取演员\n        NSSet *actors = [movie mutableSetValueForKey:@\"actors\"\
    ];\n        NSArray *sortedActors = [actors sortedArrayUsingDescriptors:sortDescriptors];\n\
    \n        if (referenceActors == nil) {\n            // 第一次遍历；存储引用\n         \
    \   referenceActors = [[NSMutableArray alloc] initWithArray:sortedActors];\n \
    \       } else {\n            for (int i = 0, n = [sortedActors count]; i < n;\
    \ i++) {\n                if ([sortedActors objectAtIndex:i] != [referenceActors\
    \ objectAtIndex:i]) {\n                    result = [NSString stringWithFormat:@\"\
    Uniquing test failed; %@ != %@\", [sortedActors objectAtIndex:i], [referenceActors\
    \ objectAtIndex:i]];\n                    break;\n                }\n        \
    \    }\n        }\n    }\n    return result;\n}\n\n@end\n```\n\n要运行此测试，请打开`PerformanceTuningViewController.m`，并将`UniquingTest`的实例添加到`tests`数组中，同时导入`UniquingTest.h`。运行测试应显示每个演员在内存中只存在一次，并且\
    \ Core Data 已使用唯一性来减少应用程序的内存占用（参见 [图 7–11](#Chapter07.html#fig_7_11)）。\n\n![images](images/0711.jpg)\n\
    \n**图 7–11.** *唯一性测试的结果*\n\n### 使用更好的谓词提高性能\n\n尽管电影标题《2001：太空漫游》中的年份已到，但距离我们的机器能够智能地回应诸如“抱歉，戴夫。恐怕我做不到”之类的话，仍然遥遥无期。在撰写本书时，程序员仍然需要做大量的辅助工作来引导机器完成它们被要求执行的任务。这意味着你编写代码的方式决定了它的效率。通常有多种方法可以检索相同的数据，但你使用的解决方案可能会显著改变应用程序的性能。\n\
    \n#### 使用更快的比较器\n\n通常来说，字符串比较器的执行速度比原始类型比较器慢。当使用`OR`运算符组合谓词时，将原始类型比较器放在前面总是更高效，因为如果它们解析为`TRUE`，则无需评估其余比较器。这是因为“`TRUE`\
    \ OR 任何东西”始终为真。类似的策略可以用于AND组合的谓词。在这种情况下，如果第一个谓词失败，则不会评估第二个谓词，因为“`FALSE` AND 任何东西”始终为假。\n\
    \n为了验证这一点，向性能测试应用程序添加一个新测试。将新类命名为`PredicatePerformanceTest`。以下是头文件：\n\n```\n#import\
    \ <Foundation/Foundation.h>\n#import \"PerformanceTest.h\"\n\n@interface PredicatePerformanceTest\
    \ : NSObject <PerformanceTest>\n\n@end\n```\n\n此测试包含两个获取请求，它们使用OR组合的谓词检索相同的对象。在第一个测试中，字符串比较器`LIKE`在原始类型比较器之前使用。在第二个测试中，比较器的顺序被调换。每个测试运行1000次，以获得以秒为单位的显著计时；每次循环时，都会重置缓存以保持干净的上下文。以下代码展示了实现：\n\
    \n```\n#import <CoreData/CoreData.h>\n#import \"PredicatePerformanceTest.h\"\n\
    \n@implementation PredicatePerformanceTest\n\n- (NSString *)name {\n    return\
    \ @\"Predicate Performance Test\";\n}\n\n- (NSString *)runWithContext:(NSManagedObjectContext\
    \ *)context {\n    NSMutableString *result = [NSMutableString string];\n    NSFetchRequest\
    \ *request;\n    NSDate *startTest1 = [NSDate date];\n    for (int i=0; i<1000;\
    \ i++) {\n        [context reset];\n        request = [[NSFetchRequest alloc]\
    \ init];\n        [request setEntity:[NSEntityDescription entityForName:@\"Movie\"\
    \ inManagedObjectContext:context]];\n        [request setPredicate:[NSPredicate\
    \ predicateWithFormat:@\"(name LIKE %@) OR (rating < %d)\", @\"*c*or*\", 5]];\n\
    \        [context executeFetchRequest:request error:nil];\n    }\n    NSDate *endTest1\
    \ = [NSDate date];\n\n    NSTimeInterval test1 = [endTest1 timeIntervalSinceDate:startTest1];\n\
    \    [result appendFormat:@\"Slow predicate: %.2f s\\n\", test1];\n\n    NSDate\
    \ *startTest2 = [NSDate date];\n    for (int i=0; i<1000; i++) {\n        [context\
    \ reset];\n        request = [[NSFetchRequest alloc] init];\n        [request\
    \ setEntity:[NSEntityDescription entityForName:@\"Movie\" inManagedObjectContext:context]];\n\
    \        [request setPredicate:[NSPredicate predicateWithFormat:@\"(rating < %d)\
    \ OR (name like %@)\", 5, @\"*c*or*\"]];\n        [context executeFetchRequest:request\
    \ error:nil];\n    }\n    NSDate *endTest2 = [NSDate date];\n\n    NSTimeInterval\
    \ test2 = [endTest2 timeIntervalSinceDate:startTest2];\n    [result appendFormat:@\"\
    Fast predicate: %.2f s\\n\", test2];\n\n    return result;\n}\n\n@end\n```\n\n\
    要在用户界面中查看测试，请打开`PerformanceTuningViewController.m`，并将`PredicatePerformanceTest`的实例添加到`tests`数组中，同时导入`PredicatePerformanceTest.h`。\n\
    \n运行测试将一致地显示两个测试之间存在显著的计时差异。当然，计时结果会因机器性能而异，但以下是一个示例运行，其中快速谓词比慢速谓词性能高出超过25%：\n\
    \n```\nSlow predicate: 1.21s\nFast predicate: 0.89s\n```"
