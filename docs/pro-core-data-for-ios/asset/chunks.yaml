  trans: "\n### 实现文件中的唯一性测试\n\n实现文件`UniquingTest.m`获取所有电影并遍历它们，提取与每部电影相关的所有演员。代码对演员进行排序，使其处于确定的顺序，以便可以预测性地比较实例。在第一次循环（针对第一部电影）中，代码将每个演员存储到一个引用数组中，以便所有后续循环都有东西可以与之比较。在后续的每次循环中，代码提取电影的演员并将其与引用数组进行比较。如果有一个演员不匹配，测试就会失败。代码如下所示：\n\
    \n```\n#import <CoreData/CoreData.h>\n#import \"UniquingTest.h\"\n\n@implementation\
    \ UniquingTest\n\n- (NSString *)name {\n    return @\"Uniquing test\";\n}\n\n\
    // 拉取所有电影，并验证它们的演员对象是否都指向相同的演员\n- (NSString *)runWithContext:(NSManagedObjectContext\
    \ *)context {\n    NSString *result = @\"Uniquing test passed\";\n\n    // 用于比较的演员数组\n\
    \    NSMutableArray *referenceActors = nil;\n\n    // 对演员进行排序\n    NSSortDescriptor\
    \ *sortDescriptor = [[NSSortDescriptor alloc] initWithKey:@\"name\" ascending:YES];\n\
    \    NSArray *sortDescriptors = [[NSArray alloc] initWithObjects:sortDescriptor,\
    \ nil];\n\n    // 拉取所有电影\n    NSFetchRequest *request = [[NSFetchRequest alloc]\
    \ init];\n    [request setEntity:[NSEntityDescription entityForName:@\"Movie\"\
    \ inManagedObjectContext:context]];\n    NSArray *results = [context executeFetchRequest:request\
    \ error:nil];\n\n    // 遍历每部电影\n    for (NSManagedObject *movie in results) {\n\
    \        // 获取演员\n        NSSet *actors = [movie mutableSetValueForKey:@\"actors\"\
    ];\n        NSArray *sortedActors = [actors sortedArrayUsingDescriptors:sortDescriptors];\n\
    \n        if (referenceActors == nil) {\n            // 第一次遍历；存储引用\n         \
    \   referenceActors = [[NSMutableArray alloc] initWithArray:sortedActors];\n \
    \       } else {\n            for (int i = 0, n = [sortedActors count]; i < n;\
    \ i++) {\n                if ([sortedActors objectAtIndex:i] != [referenceActors\
    \ objectAtIndex:i]) {\n                    result = [NSString stringWithFormat:@\"\
    Uniquing test failed; %@ != %@\", [sortedActors objectAtIndex:i], [referenceActors\
    \ objectAtIndex:i]];\n                    break;\n                }\n        \
    \    }\n        }\n    }\n    return result;\n}\n\n@end\n```\n\n要运行此测试，请打开`PerformanceTuningViewController.m`，并将`UniquingTest`的实例添加到`tests`数组中，同时导入`UniquingTest.h`。运行测试应显示每个演员在内存中只存在一次，并且\
    \ Core Data 已使用唯一性来减少应用程序的内存占用（参见 图 7–11）。\n\n![images](img/0711.jpg)\n\n**图 7–11.**\
    \ *唯一性测试的结果*\n\n### 使用更好的谓词提高性能\n\n尽管电影标题《2001：太空漫游》中的年份已到，但距离我们的机器能够智能地回应诸如“抱歉，戴夫。恐怕我做不到”之类的话，仍然遥遥无期。在撰写本书时，程序员仍然需要做大量的辅助工作来引导机器完成它们被要求执行的任务。这意味着你编写代码的方式决定了它的效率。通常有多种方法可以检索相同的数据，但你使用的解决方案可能会显著改变应用程序的性能。\n\
    \n#### 使用更快的比较器\n\n通常来说，字符串比较器的执行速度比原始类型比较器慢。当使用`OR`运算符组合谓词时，将原始类型比较器放在前面总是更高效，因为如果它们解析为`TRUE`，则无需评估其余比较器。这是因为“`TRUE`\
    \ OR 任何东西”始终为真。类似的策略可以用于 AND 组合的谓词。在这种情况下，如果第一个谓词失败，则不会评估第二个谓词，因为“`FALSE` AND\
    \ 任何东西”始终为假。\n\n为了验证这一点，向性能测试应用程序添加一个新测试。将新类命名为`PredicatePerformanceTest`。以下是头文件：\n\
    \n```\n#import <Foundation/Foundation.h>\n#import \"PerformanceTest.h\"\n\n@interface\
    \ PredicatePerformanceTest : NSObject <PerformanceTest>\n\n@end\n```\n\n此测试包含两个获取请求，它们使用\
    \ OR 组合的谓词检索相同的对象。在第一个测试中，字符串比较器`LIKE`在原始类型比较器之前使用。在第二个测试中，比较器的顺序被调换。每个测试运行 1000\
    \ 次，以获得以秒为单位的显著计时；每次循环时，都会重置缓存以保持干净的上下文。以下代码展示了实现：\n\n```\n#import <CoreData/CoreData.h>\n\
    #import \"PredicatePerformanceTest.h\"\n\n@implementation PredicatePerformanceTest\n\
    \n- (NSString *)name {\n    return @\"Predicate Performance Test\";\n}\n\n- (NSString\
    \ *)runWithContext:(NSManagedObjectContext *)context {\n    NSMutableString *result\
    \ = [NSMutableString string];\n    NSFetchRequest *request;\n    NSDate *startTest1\
    \ = [NSDate date];\n    for (int i=0; i<1000; i++) {\n        [context reset];\n\
    \        request = [[NSFetchRequest alloc] init];\n        [request setEntity:[NSEntityDescription\
    \ entityForName:@\"Movie\" inManagedObjectContext:context]];\n        [request\
    \ setPredicate:[NSPredicate predicateWithFormat:@\"(name LIKE %@) OR (rating <\
    \ %d)\", @\"*c*or*\", 5]];\n        [context executeFetchRequest:request error:nil];\n\
    \    }\n    NSDate *endTest1 = [NSDate date];\n\n    NSTimeInterval test1 = [endTest1\
    \ timeIntervalSinceDate:startTest1];\n    [result appendFormat:@\"Slow predicate:\
    \ %.2f s\\n\", test1];\n\n    NSDate *startTest2 = [NSDate date];\n    for (int\
    \ i=0; i<1000; i++) {\n        [context reset];\n        request = [[NSFetchRequest\
    \ alloc] init];\n        [request setEntity:[NSEntityDescription entityForName:@\"\
    Movie\" inManagedObjectContext:context]];\n        [request setPredicate:[NSPredicate\
    \ predicateWithFormat:@\"(rating < %d) OR (name like %@)\", 5, @\"*c*or*\"]];\n\
    \        [context executeFetchRequest:request error:nil];\n    }\n    NSDate *endTest2\
    \ = [NSDate date];\n\n    NSTimeInterval test2 = [endTest2 timeIntervalSinceDate:startTest2];\n\
    \    [result appendFormat:@\"Fast predicate: %.2f s\\n\", test2];\n\n    return\
    \ result;\n}\n\n@end\n```\n\n要在用户界面中查看测试，请打开`PerformanceTuningViewController.m`，并将`PredicatePerformanceTest`的实例添加到`tests`数组中，同时导入`PredicatePerformanceTest.h`。\n\
    \n运行测试将一致地显示两个测试之间存在显著的计时差异。当然，计时结果会因机器性能而异，但以下是一个示例运行，其中快速谓词比慢速谓词性能高出超过 25%：\n\
    \n```\nSlow predicate: 1.21s\nFast predicate: 0.89s\n```\n"
- fmt: "### Using Subqueries\n\nYou saw in the previous chapter how to use subqueries\
    \ to help simplify the code. In this section, you add a test to show the difference\
    \ between using subqueries and retrieving related data manually. Consider an example\
    \ in which you want to find all actors from a movie that match certain criteria.\
    \ To do this without using a subquery, you have to first fetch all the movies\
    \ that match the criteria. You then have to iterate through each movie and extract\
    \ the actors. You then go through the actors and add them to your result set,\
    \ making sure you don't duplicate actors if they play in multiple movies. The\
    \ manually subquerying test is shown here:\n\n```\nNSMutableDictionary *actorsMap\
    \ = [NSMutableDictionary dictionary];\nrequest = [[NSFetchRequest alloc] init];\n\
    [request setEntity:[NSEntityDescription entityForName:@\"Movie\" inManagedObjectContext:context]];\n\
    [request setPredicate:[NSPredicate predicateWithFormat:@\"(rating < %d) OR (name\
    \ LIKE %@)\", 5, @\"*c*or*\"]];\nNSArray *movies = [context executeFetchRequest:request\
    \ error:nil];\n\nfor (NSManagedObject *movie in movies) {\n    NSSet *actorSet\
    \ = [movie valueForKey:@\"actors\"];\n    for (NSManagedObject *actor in actorSet)\
    \ {\n        [actorsMap setValue:actor forKey:[[[actor objectID] URIRepresentation]\
    \ description]];\n    }\n}\n```\n\nIn this implementation, the `actorsMap` dictionary\
    \ contains all the actors. You keyed them by `objectID` in order to eliminate\
    \ duplicates. The alternative to doing this is to use subqueries (please refer\
    \ to [Chapter 6](#Chapter06.html#ch6) for more information on building subqueries).\
    \ In this case, the subquery looks like this:\n\n```\nrequest = [[NSFetchRequest\
    \ alloc] init];\n[request setEntity:[NSEntityDescription entityForName:@\"Actor\"\
    \ inManagedObjectContext:context]];\n[request setPredicate:[NSPredicate predicateWithFormat:@\"\
    (SUBQUERY(movies, $x, ($x.rating < %d) OR ($x.name LIKE %@)).@count > 0)\", 5,\
    \ @\"*c*or*\"]];\nNSArray *actors = [context executeFetchRequest:request error:nil];\n\
    ```\n\nOne of the major differences here is that you let the persistent store\
    \ do all the work of retrieving the matching actors, which means that most of\
    \ the results don't have to make it back up to the context layer of Core Data\
    \ for you to post-process. With the subquery, you don't actually retrieve the\
    \ movies, and the fetched request is set up to fetch actors directly. The manual\
    \ option, on the other hand, has to fire faults to retrieve the actors after retrieving\
    \ the movies.\n\nTo demonstrate this in a test, create a new class in your project\
    \ called `SubqueryTest`. The header file is shown here:\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"PerformanceTest.h\"\n\n@interface SubqueryTest : NSObject <PerformanceTest>\n\
    \n@end\n```\n\nThe tests are implemented in `SubqueryTest.m`, like so:\n\n```\n\
    #import <CoreData/CoreData.h>\n#import \"SubqueryTest.h\"\n\n@implementation SubqueryTest\n\
    \n- (NSString *)name {\n    return @\"Subquery Performance Test\";\n}\n\n- (NSString\
    \ *)runWithContext:(NSManagedObjectContext *)context {\n    NSMutableString *result\
    \ = [NSMutableString string];\n\n    NSFetchRequest *request;\n\n    int count\
    \ = 0;\n\n    [context reset];\n    NSDate *startTest1 = [NSDate date];\n    NSMutableDictionary\
    \ *actorsMap = [NSMutableDictionary dictionary];\n    request = [[NSFetchRequest\
    \ alloc] init];\n    [request setEntity:[NSEntityDescription entityForName:@\"\
    Movie\" inManagedObjectContext:context]];\n    [request setPredicate:[NSPredicate\
    \ predicateWithFormat:@\"(rating < %d) OR (name LIKE %@)\", 5, @\"*c*or*\"]];\n\
    \    NSArray *movies = [context executeFetchRequest:request error:nil];\n\n  \
    \  for (NSManagedObject *movie in movies) {\n        NSSet *actorSet = [movie\
    \ valueForKey:@\"actors\"];\n        for (NSManagedObject *actor in actorSet)\
    \ {\n            [actorsMap setValue:actor forKey:[[[actor objectID] URIRepresentation]\
    \ description]];\n        }\n    }\n\n    count = [actorsMap count];\n\n    NSDate\
    \ *endTest1 = [NSDate date];\n\n    NSTimeInterval test1 = [endTest1 timeIntervalSinceDate:startTest1];\n\
    \    [result appendFormat:@\"No subquery: %.2f s\\n\", test1];\n    [result appendFormat:@\"\
    Actors retrieved: %d\\n\", count];\n\n    [context reset];\n    NSDate *startTest2\
    \ = [NSDate date];\n    request = [[NSFetchRequest alloc] init];\n    [request\
    \ setEntity:[NSEntityDescription entityForName:@\"Actor\" inManagedObjectContext:context]];\n\
    \    [request setPredicate:[NSPredicate predicateWithFormat:@\"(SUBQUERY(movies,\
    \ $x, ($x.rating < %d) OR ($x.name LIKE %@)).@count > 0)\", 5, @\"*c*or*\"]];\n\
    \n    NSArray *actors = [context executeFetchRequest:request error:nil];\n   \
    \ count = [actors count];\n    NSDate *endTest2 = [NSDate date];\n\n    NSTimeInterval\
    \ test2 = [endTest2 timeIntervalSinceDate:startTest2];\n    [result appendFormat:@\"\
    Subquery: %.2f s\\n\", test2];\n    [result appendFormat:@\"Actors retrieved:\
    \ %d\\n\", count];\n\n    return result;\n}\n\n@end\n```\n\nOpen `PerformanceTuningViewController.m`,\
    \ and add an instance of `SubqueryTest` to the `tests` array in order to be able\
    \ to run the test. The test results—over 80% faster—are unequivocal.\n\n```\n\
    No subquery: 0.74 s\nActors retrieved: 200\nSubquery: 0.13 s\nActors retrieved:\
    \ 200\n```\n\nHow you write your predicates can have a profound effect on the\
    \ performance of your application. You should always be mindful of what you are\
    \ asking Core Data to do and how you can accomplish the same results with more\
    \ efficient predicates.\n\n### Analyzing Performance\n\nAlthough thinking things\
    \ through before writing code and understanding the implications of things such\
    \ as faulting, prefetching, and memory usage usually nets you solid code that\
    \ performs well, you often need a nonbiased, objective opinion on how your application\
    \ is performing. The least biased and most objective opinion on your application's\
    \ performance comes from the computer it's running on, so asking your computer\
    \ to measure the results of your application's Core Data interaction provides\
    \ essential insight for optimizing performance.\n\nApple provides a tool called\
    \ Instruments that allows you to measure several facets of an application, including\
    \ Core Data–related items. This section shows how to use Instruments to measure\
    \ the Core Data aspects of your application. We encourage you to explore the other\
    \ measurements Instruments offers."
