  trans: "\n```objective-c\nif (parentController != nil)\n{\n    if (system != nil)\n\
    \    {\n        // 用户正在编辑一个已有的系统。存储其当前值\n        tempName = [NSString stringWithString:(NSString\
    \ *)[system valueForKey:@\"name\"]];\n        tempUserId = [NSString stringWithString:(NSString\
    \ *)[system valueForKey:@\"userId\"]];\n        tempPassword = [NSString stringWithString:(NSString\
    \ *)[system valueForKey:@\"password\"]];\n        // 用新值更新\n        [system setValue:name.text\
    \ forKey:@\"name\"];\n        [system setValue:userId.text forKey:@\"userId\"\
    ];\n        [system setValue:password.text forKey:@\"password\"];\n    }\n   \
    \ else\n    {\n        // 用户正在添加一个新系统。创建新的托管对象，但保留\n        // 一个指针指向它\n     \
    \   tempSystem = [parentController insertPasswordWithName:name.text userId:userId.text\
    \ password:password.text];\n    }\n    // 保存上下文并收集所有验证错误\n    errorText = [parentController\
    \ saveContext];\n}\nif (errorText != nil)\n{\n    // 发生验证错误。显示一个警告。\n    UIAlertView\
    \ *alert = [[UIAlertView alloc] initWithTitle:@\"错误！\" message:errorText delegate:nil\
    \ cancelButtonTitle:@\"确定\" otherButtonTitles:nil];\n    [alert show];\n\n   \
    \ // 由于我们遇到错误并且上下文未保存，撤销此方法所做的任何更改\n    if (tempSystem != nil)\n    {\n      \
    \  // 我们添加了一个对象，因此删除它\n        [[parentController.fetchedResultsController managedObjectContext]\
    \ deleteObject:tempSystem];\n    }\n    else\n    {\n        // 我们编辑了一个对象，因此将其恢复原状\n\
    \        [system setValue:tempName forKey:@\"name\"];\n        [system setValue:tempUserId\
    \ forKey:@\"userId\"];\n        [system setValue:tempPassword forKey:@\"password\"\
    ];\n    }\n}\nelse\n{\n    // 保存成功！仅在成功时关闭模态视图\n    [self dismissModalViewControllerAnimated:YES];\n\
    }\n```\n\n呼！将验证逻辑迁移到数据模型可真是一项繁重的工作。当您探索这种执行验证的方式时，您可能会同意，设计更好的用户界面（例如，仅当`userId`字段包含有效数据时才启用“保存”按钮）或在代码中验证值是更优的方法。\n\
    \n如果您运行此应用程序，点击添加新密码，并在用户 ID 字段中输入超过十个字符（包括标点符号），您将看到验证工作的成果，如图 10–28 所示。\n\n\
    ![images](img/1028.jpg)\n\n**图 10–28.** *在 System 的 userId 属性上设置验证*\n\n### 总结\n\
    \n在本章中，您探索了与 Core Data 相关的几个高级主题。其中一些（如错误处理和验证）很可能会在您的许多应用程序中用到。另一些（如加密）您可能只是偶尔使用。\n\
    \n通过本书的学习，您已经了解了 Core Data 的广度和深度。您了解到 Core Data 为您做了多少工作，也了解到为了与 Core Data 框架正确交互您需要完成哪些工作。我们希望您像我们享受编写本书一样享受阅读本书的乐趣，并期待您在应用程序中使用\
