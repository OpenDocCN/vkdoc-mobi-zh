- fmt: "# Viewing and Editing Relationship Details\n\nIn a similar manner, you can\
    \ click a relationship to view its details.\n\nRelationships have several properties.\
    \ First, they have a name and a destination entity. The destination describes\
    \ the type of objects the relationship points to. For a `Player` entity, the \"\
    team\" relationship points, as expected, to a `Team` entity. The Core Data architects\
    \ strongly recommend that every relationship have an *inverse relationship*—a\
    \ relationship that goes in the opposite direction. For example, `Player` has\
    \ a relationship to `Team`, so it is recommended, as we have implemented, that\
    \ `Team` have a relationship to `Player` as well. In fact, if you don't specify\
    \ an inverse relationship, the compiler will generate a warning message.\n\nTwo\
    \ additional properties are available for attributes: `Transient` and `Optional`.\
    \ A transient relationship does not get stored to the persistent store during\
    \ the `save:` operation. If the team relationship were transient, then the information\
    \ of which team a player belongs to would not be saved and would be lost when\
    \ the application exits. The `Player` object itself would still be persisted,\
    \ but the relationship with a team would not. Transient relationships can be useful\
    \ if you want to set values at runtime, such as a password or something derived\
    \ with code from other information, but don't want to store the relationship fact\
    \ using Core Data. When a relationship is optional, it simply means that you may\
    \ give it a `nil` value. For example, a player may not have a team.\n\nThe plurality\
    \ of a relationship defines how many destination objects this source object can\
    \ relate to: one or many. By default, a relationship is to-one, which means that\
    \ the source object can relate to at most one destination object. This is the\
    \ case for the \"team\" relationship of the `Player` entity: a player can have\
    \ at most only one team. But a team can have multiple players; therefore, the\
    \ \"player\" relationship of the `Team` entity is a to-many relationship. Its\
    \ value is represented by a set of entities. The plurality of a relationship can\
    \ also be further specified using a minimum and maximum value, which represents\
    \ the cardinality of the destination entities for that relationship.\n\nFinally,\
    \ Core Data uses the delete rule to understand what to do with destination objects\
    \ when a source object is deleted. Core Data can do different things to the players\
    \ of a team if the team is deleted. The options are No Action, Nullify, Cascade,\
    \ and Deny. The \"Setting Rules\" section in this chapter discusses the delete\
    \ rules and what they mean.\n\n# Using Fetched Properties\n\nSo far in this book,\
    \ we have mentioned attributes and relationships on several occasions. A third\
    \ property can be attached to an entity: a fetched property. Fetched properties\
    \ are comparable to relationships in that they allow an object to have references\
    \ to other objects. While relationships directly refer to destination objects,\
    \ however, fetched properties identify the destination objects by using a predicate.\
    \ Fetched properties behave like the smart playlists in iTunes in which the user\
    \ specifies a source list (usually the music library) and then specifies some\
    \ criteria to filter the results. Fetched properties behave differently from smart\
    \ playlists, however, in that they're evaluated the first time they are called,\
    \ and their results are cached until you tell them to reevaluate themselves using\
    \ the `refreshObject:mergeChanges:` method.\n\nIn the League Manager application,\
    \ you could, for example, create a fetched property in the `Team` entity to return\
    \ all the players whose last name begins with the letter *W*. Select the `Team`\
    \ entity, click the + button below the Fetched Properties section, and call the\
    \ new fetched property `wPlayers`. Select `Player` as the destination entity (that\
    \ is, the Entity type the fetched property will retrieve).\n\nIn the Predicate\
    \ field, specify the criteria for filtering the players using the standard `NSPredicate`\
    \ format (see Chapter 6 for more details on `NSPredicate`). In this example, the\
    \ predicate would be as follows:\n\n`lastName BEGINSWITH \"W\"`\n\nThis fetched\
    \ property, then, becomes a named property on the `Player` entity, just as all\
    \ the attributes and relationships are, and you access them the same way. You\
    \ can test this by adding code to the application delegate in League Manager's\
    \ `application:didFinishLaunchingWithOptions:` method that uses the `wPlayers`\
    \ fetched property. The code in Listing 4-1 fetches all the teams, grabs the first\
    \ team (if one exists), and then grabs all the players in the `wPlayers` fetched\
    \ property. It then iterates through those players and prints their first and\
    \ last names.\n\n**Listing 4-1.** *Using the wPlayers Fetched Property*\n\n```\n\
    NSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];\n[fetchRequest setEntity:[NSEntityDescription\
    \ entityForName:@\"Team\"\ninManagedObjectContext:self.managedObjectContext]];\n\
    NSArray *teams = [self.managedObjectContext executeFetchRequest:fetchRequest error:nil];\n\
    \nif ([teams count] > 0)\n{\n  NSManagedObject *team = [teams objectAtIndex:0];\n\
    \  NSSet *wPlayers = [team valueForKey:@\"wPlayers\"];\n  for (NSManagedObject\
    \ *wPlayer in wPlayers)\n  {\n    NSLog(@\"%@ %@\", [wPlayer valueForKey:@\"firstName\"\
    ], [wPlayer\nvalueForKey:@\"lastName\"]);\n  }\n}\n```\n\nIf you run this code,\
    \ depending on what data you've entered in League Manager, you should see something\
    \ like the following in the console:\n\n```\n2011-07-31 19:08:23.005 League Manager[8039:f203]\
    \ Dwyane Wade\n2011-07-31 19:08:23.006 League Manager[8039:f203] Tyson Warner\n\
    ```\n\nThe last important aspect of configuring a data model with Xcode is creating\
    \ fetch requests. You use fetch requests to retrieve managed objects from the\
    \ data model, just like you would use `NSFetchRequest` in code, except you can\
    \ predefine them here. To create a fetch request that will retrieve all the teams\
    \ with a green uniform, for example, select `Team` in the Entity section, click\
    \ and hold the Add Entity button until the drop-down menu appears, and select\
    \ Add Fetch Request. Call the fetch request `GreenTeams`. In the middle column\
    \ of Xcode you should see a + button to add criteria to the fetch request. Click\
    \ that button and type `uniformColor == \"Green\"`. It should look like Figure\
    \ 4-9.\n\n![images](images/0409.jpg)\n\n**Figure 4-9.** *Setting up the predicate\
    \ for a fetch request*\n\nFetch requests created this way are stored in the data\
    \ model and can be retrieved using the `fetchRequestTemplateForName:` method of\
    \ the `ManagedObjectModel` class. You can add code to the `application:didFinishLaunchingWithOptions:`\
    \ method of League Manager's application delegate to test this fetch request.\
    \ Listing 4-2 shows code to do that.\n\n**Listing 4-2.** *Using the Fetch Request\
    \ Created in the Model*\n\n```\nNSFetchRequest *fetchRequest = [self.managedObjectModel\n\
    fetchRequestTemplateForName:@\"GreenTeams\"];\nNSArray *teams = [self.managedObjectContext\
    \ executeFetchRequest:fetchRequest error:nil];\nfor (NSManagedObject *team in\
    \ teams)\n{\n  NSLog(@\"%@\", [team valueForKey:@\"name\"]);\n}\n```\n\nAgain,\
    \ depending on what data you've entered into League Manager, your console output\
    \ should look like this:\n\n```\n2011-07-31 19:17:25.598 League Manager[8184:f203]\
    \ Boston Celtics\n```"
  raw: '#### Viewing and Editing Relationship Details


    In a similar manner, you can click a relationship to view its details.


    Relationships have several properties. First, they have a name and a destination
    entity. The destination describes the type of objects the relationship points
    to. For a `Player` entity, the “team” relationship points, as expected, to a `Team`
    entity. The Core Data architects strongly recommend that every relationship have
    an *inverse relationship*—a relationship that goes in the opposite direction.
    For example, `Player` has a relationship to `Team`, so it is recommended, as we
    have implemented, that `Team` have a relationship to `Player` as well. In fact,
    if you don’t specify an inverse relationship, the compiler will generate a warning
    message.


    Two additional properties are available for attributes: `Transient` and `Optional`.
    A transient relationship does not get stored to the persistent store during the
    `save:` operation. If the team relationship were transient, then the information
    of which team a player belongs to would not be saved and would be lost when the
    application exits. The `Player` object itself would still be persisted, but the
    relationship with a team would not. Transient relationships can be useful if you
    want to set values at runtime, such as a password or something derived with code
    from other information, but don’t want to store the relationship fact using Core
    Data. When a relationship is optional, it simply means that you may give it a
    `nil` value. For example, a player may not have a team.


    The plurality of a relationship defines how many destination objects this source
    object can relate to: one or many. By default, a relationship is to-one, which
    means that the source object can relate to at most one destination object. This
    is the case for the “team” relationship of the `Player` entity: a player can have
    at most only one team. But a team can have multiple players; therefore, the “player”
    relationship of the `Team` entity is a to-many relationship. Its value is represented
    by a set of entities. The plurality of a relationship can also be further specified
    using a minimum and maximum value, which represents the cardinality of the destination
    entities for that relationship.


    Finally, Core Data uses the delete rule to understand what to do with destination
    objects when a source object is deleted. Core Data can do different things to
    the players of a team if the team is deleted. The options are No Action, Nullify,
    Cascade, and Deny. The “Setting Rules” section in this chapter discusses the delete
    rules and what they mean.


    #### Using Fetched Properties


    So far in this book, we have mentioned attributes and relationships on several
    occasions. A third property can be attached to an entity: a fetched property.
    Fetched properties are comparable to relationships in that they allow an object
    to have references to other objects. While relationships directly refer to destination
    objects, however, fetched properties identify the destination objects by using
    a predicate. Fetched properties behave like the smart playlists in iTunes in which
    the user specifies a source list (usually the music library) and then specifies
    some criteria to filter the results. Fetched properties behave differently from
    smart playlists, however, in that they’re evaluated the first time they are called,
    and their results are cached until you tell them to reevaluate themselves using
    the `refreshObject:mergeChanges:` method.


    In the League Manager application, you could, for example, create a fetched property
    in the `Team` entity to return all the players whose last name begins with the
    letter *W*. Select the `Team` entity, click the + button below the Fetched Properties
    section, and call the new fetched property **wPlayers**. Select `Player` as the
    destination entity (that is, the `Entity` type the fetched property will retrieve).


    In the Predicate field, specify the criteria for filtering the players using the
    standard `NSPredicate` format (see [Chapter 6](#Chapter06.html#ch6) for more details
    on `NSPredicate`). In this example, the predicate would be as follows:


    `lastName BEGINSWITH "W"`


    This fetched property, then, becomes a named property on the `Player` entity,
    just as all the attributes and relationships are, and you access them the same
    way. You can test this by adding code to the application delegate in League Manager’s
    `application:didFinishLaunchingWithOptions:` method that uses the `wPlayers` fetched
    property. The code in [Listing 4-1](#Chapter04.html#list_4_1) fetches all the
    teams, grabs the first team (if one exists), and then grabs all the players in
    the `wPlayers` fetched property. It then iterates through those players and prints
    their first and last names.


    **Listing 4–1.** *Using the wPlayers Fetched Propery*


    `NSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];`

    `[fetchRequest setEntity:[NSEntityDescription entityForName:@"Team"`

    `inManagedObjectContext:self.managedObjectContext]];`

    `NSArray *teams = [self.managedObjectContext executeFetchRequest:fetchRequest
    error:nil];`


    `if ([teams count] > 0)`

    `{`

    `  NSManagedObject *team = [teams objectAtIndex:0];`

    `  NSSet *wPlayers = [team valueForKey:@"wPlayers"];`

    `  for (NSManagedObject *wPlayer in wPlayers)`

    `  {`

    `    NSLog(@"%@ %@", [wPlayer valueForKey:@"firstName"], [wPlayer`

    `valueForKey:@"lastName"]);`

    `  }`

    `}`


    If you run this code, depending on what data you’ve entered in League Manager,
    you should see something like the following in the console:


    `2011-07-31 19:08:23.005 League Manager[8039:f203] Dwyane Wade`

    `2011-07-31 19:08:23.006 League Manager[8039:f203] Tyson Warner`


    The last important aspect of configuring a data model with Xcode is creating fetch
    requests. You use fetch requests to retrieve managed objects from the data model,
    just like you would use `NSFetchRequest` in code, except you can predefine them
    here. To create a fetch request that will retrieve all the teams with a green
    uniform, for example, select `Team` in the Entity section, click and hold the
    Add Entity button until the drop-down menu appears, and select Add Fetch Request.
    Call the fetch request **GreenTeams**. In the middle column of Xcode you should
    see a + button to add criteria to the fetch request. Click that button and type
    **uniformColor == “Green”**. It should look like [Figure 4–9](#Chapter04.html#fig_4_9).


    ![images](images/0409.jpg)


    **Figure 4–9.** *Setting up the predicate for a fetch request*


    Fetch requests created this way are stored in the data model and can be retrieved
    using the `fetchRequestTemplateForName:` method of the `ManagedObjectModel` class.
    You can add code to the `application:didFinishLaunchingWithOptions:` method of
    League Manager’s application delegate to test this fetch request. [Listing 4–2](#Chapter04.html#list_4_2)
    shows code to do that.


    **Listing 4–2.** *Using the Fetch Request Created in the Model*


    `NSFetchRequest *fetchRequest = [self.managedObjectModel`

    `fetchRequestTemplateForName:@"GreenTeams"];`

    `NSArray *teams = [self.managedObjectContext executeFetchRequest:fetchRequest
    error:nil];`

    `for (NSManagedObject *team in teams)`

    `{`

    `  NSLog(@"%@", [team valueForKey:@"name"]);`

    `}`


    Again, depending on what data you’ve entered into League Manager, your console
    output should look like this:


    `2011-07-31 19:17:25.598 League Manager[8184:f203] Boston Celtics`'
  trans: "\n# 查看和编辑关系详情\n\n同样地，您可以点击某个关系来查看其详细信息。\n\n关系具有几个属性。首先，它们都有一个名称和一个目标实体。目标实体描述了该关系所指向的对象类型。对于\
    \ `Player` 实体而言，正如预期，\"team\" 关系指向一个 `Team` 实体。Core Data 架构师强烈建议每个关系都应有一个*反向关系*，即指向相反方向的关系。例如，`Player`\
    \ 与 `Team` 之间存在关系，因此推荐（正如我们所实现的那样）`Team` 也与 `Player` 之间存在关系。事实上，如果您不指定反向关系，编译器将会生成一条警告消息。\n\
    \n属性还有两个额外的属性：`Transient`（瞬态）和 `Optional`（可选）。瞬态关系在 `save:` 操作期间不会被存储到持久化存储区。如果\
    \ team 关系是瞬态的，那么玩家所属队伍的信息将不会被保存，并在应用程序退出时丢失。`Player` 对象本身仍会被持久化，但与队伍的关系则不会。如果您希望在运行时设置值（例如密码或通过代码从其他信息派生出来的内容），但又不想使用\
    \ Core Data 存储关系事实，那么瞬态关系会很有用。当关系是可选时，仅意味着您可以为其赋予 `nil` 值。例如，某个玩家可能没有所属队伍。\n\n\
    关系的多重性定义了源对象可以关联多少个目标对象：一个或多个。默认情况下，关系是**对一**关系，这意味着源对象最多可以关联一个目标对象。`Player` 实体的\
    \ \"team\" 关系就是这种情况：一个玩家最多只能有一个队伍。但是一个队伍可以有多个玩家；因此，`Team` 实体的 \"player\" 关系是一个**对多**关系。它的值由一组实体表示。关系的多重性还可以使用最小值和最大值进一步指定，这代表了该关系目标实体的基数。\n\
    \n最后，Core Data 使用删除规则来确定当源对象被删除时，如何处理目标对象。如果队伍被删除，Core Data 可以对该队伍的玩家执行不同的操作。选项包括：无操作（No\
    \ Action）、置空（Nullify）、级联（Cascade）和拒绝（Deny）。本章的 \"设置规则\" 部分将讨论这些删除规则及其含义。\n\n#\
    \ 使用获取属性\n\n到目前为止，本书中我们已经多次提到了属性和关系。第三种属性可以附加到实体上：获取属性。获取属性与关系类似，因为它们都允许一个对象引用其他对象。但是，关系直接引用目标对象，而获取属性则通过使用谓词来识别目标对象。获取属性的行为类似于\
    \ iTunes 中的智能播放列表，用户指定源列表（通常是音乐库），然后指定一些条件来过滤结果。然而，获取属性的行为与智能播放列表的不同之处在于：它们在首次被调用时进行评估，并且其结果会被缓存，直到您使用\
    \ `refreshObject:mergeChanges:` 方法告知它们重新评估。\n\n例如，在 League Manager 应用程序中，您可以在\
    \ `Team` 实体中创建一个获取属性，以返回所有姓氏以字母 *W* 开头的玩家。选择 `Team` 实体，点击\"获取属性\"部分下方的 + 按钮，并将新的获取属性命名为\
    \ `wPlayers`。选择 `Player` 作为目标实体（即获取属性将检索的实体类型）。\n\n在\"谓词\"字段中，使用标准的 `NSPredicate`\
    \ 格式（更多关于 `NSPredicate` 的详细信息，请参见第 6 章）指定过滤玩家的条件。在本例中，谓词如下：\n\n`lastName BEGINSWITH\
    \ \"W\"`\n\n然后，这个获取属性就成为 `Player` 实体上的一个命名属性，就像所有属性和关系一样，并且您可以通过相同的方式访问它们。您可以通过在\
    \ League Manager 的 `application:didFinishLaunchingWithOptions:` 方法的应用委托中添加代码来测试这一点，该代码使用了\
    \ `wPlayers` 获取属性。清单 4-1 中的代码获取所有队伍，抓取第一个队伍（如果存在），然后抓取 `wPlayers` 获取属性中的所有玩家。接着，它遍历这些玩家并打印他们的名字和姓氏。\n\
    \n**清单 4-1.** *使用 wPlayers 获取属性*\n\n```\nNSFetchRequest *fetchRequest = [[NSFetchRequest\
    \ alloc] init];\n[fetchRequest setEntity:[NSEntityDescription entityForName:@\"\
    Team\"\ninManagedObjectContext:self.managedObjectContext]];\nNSArray *teams =\
    \ [self.managedObjectContext executeFetchRequest:fetchRequest error:nil];\n\n\
    if ([teams count] > 0)\n{\n  NSManagedObject *team = [teams objectAtIndex:0];\n\
    \  NSSet *wPlayers = [team valueForKey:@\"wPlayers\"];\n  for (NSManagedObject\
    \ *wPlayer in wPlayers)\n  {\n    NSLog(@\"%@ %@\", [wPlayer valueForKey:@\"firstName\"\
    ], [wPlayer\nvalueForKey:@\"lastName\"]);\n  }\n}\n```\n\n如果您运行此代码，根据您在 League\
    \ Manager 中输入的数据，您应该在控制台中看到类似以下内容：\n\n```\n2011-07-31 19:08:23.005 League Manager[8039:f203]\
    \ Dwyane Wade\n2011-07-31 19:08:23.006 League Manager[8039:f203] Tyson Warner\n\
    ```\n\n使用 Xcode 配置数据模型的最后一个重要方面是创建获取请求。您可以使用获取请求从数据模型中检索托管对象，就像在代码中使用 `NSFetchRequest`\
    \ 一样，区别在于您可以在此处预定义它们。例如，要创建一个获取所有穿着绿色队服的队伍的获取请求，请在\"实体\"部分选择 `Team`，点击并按住\"添加实体\"\
    按钮，直到出现下拉菜单，然后选择\"添加获取请求\"。将获取请求命名为 `GreenTeams`。在 Xcode 的中间列中，您应该会看到一个 + 按钮，用于向获取请求添加条件。点击该按钮并输入\
    \ `uniformColor == \"Green\"`。它应该看起来像图 4-9。\n\n![images](img/0409.jpg)\n\n**图\
    \ 4-9.** *为获取请求设置谓词*\n\n通过这种方式创建的获取请求存储在数据模型中，并且可以使用 `ManagedObjectModel` 类的 `fetchRequestTemplateForName:`\
    \ 方法进行检索。您可以向 League Manager 应用委托的 `application:didFinishLaunchingWithOptions:`\
    \ 方法中添加代码来测试此获取请求。清单 4-2 显示了执行此操作的代码。\n\n**清单 4-2.** *使用在模型中创建的获取请求*\n\n```\n\
    NSFetchRequest *fetchRequest = [self.managedObjectModel\nfetchRequestTemplateForName:@\"\
    GreenTeams\"];\nNSArray *teams = [self.managedObjectContext executeFetchRequest:fetchRequest\
    \ error:nil];\nfor (NSManagedObject *team in teams)\n{\n  NSLog(@\"%@\", [team\
    \ valueForKey:@\"name\"]);\n}\n```\n\n同样，根据您在 League Manager 中输入的数据，您的控制台输出应该如下所示：\n\
    \n```\n2011-07-31 19:17:25.598 League Manager[8184:f203] Boston Celtics\n```\n"
- fmt: '### Creating Entities


    We have been talking extensively about entities up to now. Entities describe the
    attributes and relationships of a managed object. To add an entity in Xcode, you
    simply click the Add Entity button below the Entity section in Xcode, and give
    your entity a name.


    By default, instances of each entity are represented by objects of type `NSManagedObject`
    at runtime, but as your project evolves and matures, you typically opt for creating
    your own classes to represent your managed objects. Your custom managed object
    must extend `NSManagedObject`, and you must specify the custom object class name
    in the Class field of the Entity details pane, as shown in [Figure 4–10](#Chapter04.html#fig_4_10).


    ![images](images/0410.jpg)


    **Figure 4–10.** *A custom managed object class*


    One topic we have not yet addressed is entity inheritance. Very similar to class
    inheritance in the object-oriented programming paradigm, entity inheritance allows
    you to create entities that inherit their properties from another entity and can
    add some of their own. For example, you could create a `Person` entity, and the
    `Player` entity could inherit from it. If you had other representations of people—`Coach`,
    for example—you could inherit from the `Person` entity. If you wanted to prevent
    the parent entity from being instantiated directly, preventing the user from creating
    a `Person` object as a stand-alone object, you could make the `Person` entity
    abstract. For example, you could create a `Person` entity that has a `dateOfBirth`
    attribute. [Figure 4–11](#Chapter04.html#fig_4_11) shows how a `Person` entity
    could be configured. Note how it is made abstract to prevent direct instantiation.


    ![images](images/0411.jpg)


    **Figure 4–11.** *The Person entity as an abstract entity*


    The next step is to change the `Player` entity configuration and set its parent
    entity to `Person`. Select the `Player` entity, and change the parent field to
    `Person`, as in [Figure 4–12](#Chapter04.html#fig_4_12). The `Player` entity now
    inherits from the `Person` entity, as illustrated in the graph view in [Figure
    4–13](#Chapter04.html#fig_4_13). This means that a player managed object also
    has a `dateOfBirth` attribute that can be set and read.


    ![images](images/0412.jpg)


    **Figure 4–12.** *The Player entity configured to inherit from the Person entity*


    ![images](images/0413.jpg)


    **Figure 4–13.** *Graph view of the Player entity configured to inherit from the
    Person entity*


    ### Creating Attributes


    Attributes describe an entity. Similar to the attributes of an object in object-oriented
    programming, entity attributes define the current state of an entity and may be
    represented by various data types. Select an entity and click the + button under
    the Attributes heading to create a new attribute for the selected entity. [Figure
    4–14](#Chapter04.html#fig_4_14) shows the different options for configuring an
    attribute.


    ![images](images/0414.jpg)


    **Figure 4–14.** *Attribute details pane*


    Earlier in this chapter, we talked about the meaning of the different properties
    of attributes. See [Table 4–1](#Chapter04.html#tab_4_1) to review the properties.
    Arguably the most critical property of an attribute is its type. Several types
    are available by default in Core Data, as shown in [Table 4–2](#Chapter04.html#tab_4_2).


    ![image](images/t0402.jpg)


    ![image](images/t0402a.jpg)


    Most of these types are straightforward because they map directly to an Objective-C
    data type. Using them is just a matter of leveraging the key/value accessors of
    the `NSManagedObject` instances. The `Transformable` type is the only type that
    doesn’t have an Objective-C counterpart. The `Transformable` type is used for
    custom types, which are types that aren’t supported by Core Data. Use `Transformable`
    as the type when the attribute you’re trying to persist doesn’t fit neatly into
    one of the supported data types. For example, if your managed object needs to
    represent a color and needs to persist it, it would make sense to use the `CGColorRef`
    type. In this case, you need to set the Core Data type to `Transient` and `Transformable`
    and provide Core Data with the mechanism for transforming the attribute into supported
    data types. Use custom attributes when you create your own managed objects that
    extend from `NSManagedObject`; they are covered in more detail in the next chapter.


    ### Creating Relationships


    As you normalize your data model, you’ll likely create several entities, depending
    on the complexity of the data you’re modeling. Relationships allow you to tie
    entities together, as the League Manager application does with teams and players.
    Core Data allows you to tune the relationships you create to accurately reflect
    how your data relates to each other.


    In Xcode, when you create a Core Data relationship or select an existing one,
    you see a set of options that you can modify to change the nature of the relationship.
    For example, if you select the “team” relationship from the `Player` entity in
    the League Manager data model, you see something that looks like [Figure 4–15](#Chapter04.html#fig_4_15).
    The options in that panel allow you to configure fields of the relationship. These
    fields are as follows:


    *   Name

    *   Destination

    *   Inverse

    *   Transient

    *   Optional

    *   To-Many Relationship

    *   Count (Minimum and Maximum)

    *   Delete Rule


    This next sections walk through all these fields, explaining what they mean and
    how they impact the relationship so that you can set up your relationships correctly
    in your data models.


    ![images](images/0415.jpg)


    **Figure 4–15.** *Relationship panel*


    #### Name


    The first field, Name, becomes the name of the key `NSManagedObject` uses to reference
    the relationship. By convention, it’s the name of the referenced entity in lowercase.
    In the case of a to-many relationship, the Name field conventionally is pluralized.
    Note that these guidelines are conventions only, but you will make your data models
    more understandable, maintainable, and easier to work with if you follow them.
    You can see that the League Manager data model follows these conventions—in the
    `Player` entity, the relationship to the `Team` entity is called “team.” In the
    `Team` entity, the relationship to the `Player` entity, a to-many relationship,
    is called “players.”


    #### Destination and Inverse


    The next field, Destination, specifies the entity at the other end of the relationship.
    The Inverse field allows you to select the same relationship, but from the destination
    entity’s perspective. To set this properly, create the relationship in both related
    entities, set the names and destinations in each entity, and then select the proper
    inverse relationship in one entity. Core Data figures out the inverse relationship
    for the other entity and sets it for you.


    Leaving the Inverse field with the value No Inverse Relationship gives you two
    compiler warnings: consistency error and misconfigured property.


    You can ignore these warnings and run your application without specifying an inverse
    relationship—after all, these are compiler warnings, not compiler errors—but you
    could face unexpected consequences. Core Data uses bidirectional relationship
    information to maintain the consistency of the object graph (hence the Consistency
    Error) and manage undo and redo information. If you leave a relationship without
    an inverse, you imply that you will take care of the object graph consistency
    and undo/redo management. The Apple documentation strongly discourages this, however,
    especially in the case of a to-many relationship. When you don’t specify an inverse
    relationship, the managed object at the other end of the relationship isn’t marked
    as changed when the managed object at this end of the relationship changes. Consider
    the example of a `Player` object being deleted and having no inverse relationship
    back to its team. Any optionality rules or delete rules aren’t enforced when the
    object graph is saved.'
