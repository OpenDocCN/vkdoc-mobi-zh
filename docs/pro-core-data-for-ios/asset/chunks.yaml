  trans: "\n### 配置表格\n\n表格单元格仍在配置为显示`Event`实体，而不是`Team`实体。您希望在每个表格单元格中显示团队的两项信息：团队名称和队服颜色。为此，首先在`cellForRowAtIndexPath:`方法中修改所创建的单元格样式以及使用的`CellIdentifier`。将这一行：\n\
    \n```\nstatic NSString *CellIdentifier = @\"Cell\";\n```\n\n改为：\n\n```\nstatic\
    \ NSString *CellIdentifier = @\"TeamCell\";\n```\n\n并将创建的表格单元格样式从`UITableViewCellStyleDefault`更改为`UITableViewCellStyleValue1`，使这一行：\n\
    \n```\ncell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\n\
    reuseIdentifier:CellIdentifier];\n```\n\n变为如下形式：\n\n```\ncell = [[UITableViewCell\
    \ alloc] initWithStyle:UITableViewCellStyleValue1\nreuseIdentifier:CellIdentifier];\n\
    ```\n\n生成的代码中已创建了一个名为`configureCell:atIndexPath:`的方法，该方法负责配置单元格。将这个方法从配置`Event`实体改为配置`Team`实体。您还希望能够从团队下钻查看其球员，因此为每个单元格添加一个详细信息展开按钮。生成的方法如下所示：\n\
    \n```\n- (void)configureCell:(UITableViewCell *)cell atIndexPath:(NSIndexPath\
    \ *)indexPath {\n    NSManagedObject *managedObject = [self.fetchedResultsController\n\
    \        objectAtIndexPath:indexPath];\n    cell.textLabel.text = [[managedObject\
    \ valueForKey:@\"timeStamp\"] description];\n}\n```\n\n将其修改为如下形式：\n\n```\n- (void)configureCell:(UITableViewCell\
    \ *)cell atIndexPath:(NSIndexPath *)indexPath {\n    NSManagedObject *managedObject\
    \ = [self.fetchedResultsController\n        objectAtIndexPath:indexPath];\n  \
    \  cell.textLabel.text = [[managedObject valueForKey:@\"name\"] description];\n\
    \    cell.detailTextLabel.text = [[managedObject valueForKey:@\"uniformColor\"\
    ] description];\n    cell.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;\n\
    }\n```\n\n### 创建团队\n\n应用程序目前功能还很少。例如，您无法添加团队或任何球员。不过，现在正是编译并运行应用程序以确保一切进展顺利的好时机。如果应用程序此时无法构建或运行，请返回并检查您的数据模型和代码，确保与之前显示的代码一致，然后再继续。\n\
    \n主-从应用程序模板还创建了一个名为`DetailViewController`的控制器。您可以重用这个类，但由于我们希望同时显示团队和球员的详细信息，最佳做法是删除它并为控制器重新命名。删除`MasterViewController.m`文件顶部的`#import\
    \ \"DetailViewController.h\"`行。找到`tableView:didSelectRowAtIndexPath:`方法并将其清空，如下所示：\n\
    \n```\n- (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n}\n```\n\n然后，您可以安全地删除这三个`DetailViewController`文件（`.h`、`.m`和`.xib`）。\n\
    \n如果您运行应用程序并点击 + 按钮添加团队，会注意到应用程序崩溃了。+ 按钮仍然连接到您已经删除的`insertNewObject:`方法。您需要将其连接到一个允许您创建新团队的方法。创建新团队的设计需要一个模态窗口，让您输入团队名称和队服颜色。您也可以重复使用这个模态窗口来编辑现有团队，用户可以通过点击团队单元格进行编辑。通过选择\
    \ Xcode 菜单中的 `File` → `New` → `New File`，然后在左侧 iOS 下选择 Cocoa Touch Class，右侧选择`UIViewController`子类来创建这个模态窗口，如图\
    \ 3–12 所示，然后点击 Next 按钮。\n\n![images](img/0312.jpg)\n\n**图 3–12.** *为新建团队添加视图控制器*\n\
    \n将类命名为`TeamViewController`，使其成为`UIViewController`的子类，并勾选“With XIB for user interface”复选框，如图\
    \ 3–13 所示，然后点击 Next。\n\n![images](img/0313.jpg)\n\n**图 3–13.** *为新团队的视图控制器选择选项*\n\
    \n打开新的头文件（`TeamViewController.h`）。在 League Manager 中，`MasterViewController`类控制管理对象上下文，因此`TeamViewController`需要一个对它的引用和一个相应的初始化方法。由于您可以使用该控制器编辑团队以及创建新团队，因此允许调用代码传递一个团队对象进行编辑，并为此存储一个属性并添加到初始化方法中。用户界面有两个文本字段，一个用于团队名称，一个用于队服颜色，因此`TeamViewController`需要为这些字段提供属性。用户界面还有两个按钮：Save\
    \ 和 Cancel，因此`TeamViewController`必须具有连接到这些按钮的方法。综合以上所有内容，您将得到如清单 3–1 所示的`TeamViewController.h`。\n\
    \n**清单 3–1.** *TeamViewController.h*\n\n```\n#import <UIKit/UIKit.h>\n\n@class\
    \ MasterViewController;\n\n@interface TeamViewController : UIViewController {\n\
    \    IBOutlet UITextField *name;\n    IBOutlet UITextField *uniformColor;\n  \
    \  NSManagedObject *team;\n    MasterViewController *masterController;\n}\n@property\
    \ (nonatomic, retain) UITextField *name;\n@property (nonatomic, retain) UITextField\
    \ *uniformColor;\n@property (nonatomic, retain) NSManagedObject *team;\n@property\
    \ (nonatomic, retain) MasterViewController *masterController;\n\n- (IBAction)save:(id)sender;\n\
    - (IBAction)cancel:(id)sender;\n- (id)initWithMasterController:(MasterViewController\
    \ *)aMasterController team:\n    (NSManagedObject *)aTeam;\n\n@end\n```\n"
- fmt: "Now open `TeamViewController.m`; import `MasterViewController.h`; delete the\
    \ `initWithNibName:` method; add `@synthesize` lines for `name`, `uniformColor`,\
    \ `team`, and `masterController`. Next, add a definition for the `initWithMasterController:`\
    \ method that looks like this:\n\n```\n- (id)initWithMasterController:(MasterViewController\
    \ *)aMasterController team:\n(NSManagedObject *)aTeam {\n  if ((self = [super\
    \ init])) {\n    self.masterController = aMasterController;\n    self.team = aTeam;\n\
    \  }\n  return self;\n}\n```\n\nIn the case in which users add a new team, the\
    \ `aTeam` parameter will be `nil`, and the `TeamViewController.m` will own the\
    \ responsibility to create it. In the case in which users edit an existing team,\
    \ however, you must take the existing team's attribute values and put them into\
    \ the appropriate text fields. Do that in the `viewDidLoad:` method, like this:\n\
    \n```\n- (void)viewDidLoad {\n  [super viewDidLoad];\n  if (team != nil) {\n \
    \   name.text = [team valueForKey:@\"name\"];\n    uniformColor.text = [team valueForKey:@\"\
    uniformColor\"];\n  }\n}\n```\n\nFinally, implement the `save:` and `cancel:`\
    \ methods so that this controller can respond appropriately to when the user taps\
    \ the Save or Cancel buttons. The `save:` method checks for a non-`nil` `masterController`\
    \ instance and then determines whether to create a new team or edit an existing\
    \ team by checking whether its team member is `nil`. If it's not `nil`, it updates\
    \ the values for the existing team and asks the `masterController` member to save\
    \ its context. If it is `nil`, it asks the `MasterViewController` instance to\
    \ create a new team in the managed object context, passing the user-entered values\
    \ for team name and uniform color. Finally, it dismisses itself. The method implementation\
    \ looks like this:\n\n```\n- (IBAction)save:(id)sender {\n  if (masterController\
    \ != nil) {\n    if (team != nil) {\n      [team setValue:name.text forKey:@\"\
    name\"];\n      [team setValue:uniformColor.text forKey:@\"uniformColor\"];\n\
    \      [masterController saveContext];\n    } else {\n      [masterController\
    \ insertTeamWithName:name.text uniformColor:uniformColor.text];\n    }\n  }\n\
    \  [self dismissModalViewControllerAnimated:YES];\n}\n```\n\nThe `cancel:` method\
    \ simply dismisses itself. The entire file should look like [Listing 3–2](#Chapter03.html#list_3_2).\n\
    \n**Listing 3–2.** *TeamViewController.m*\n\n```\n#import \"TeamViewController.h\"\
    \n#import \"MasterViewController.h\"\n\n@implementation TeamViewController\n\n\
    @synthesize name;\n@synthesize uniformColor;\n@synthesize team;\n@synthesize masterController;\n\
    \n- (id)initWithMasterController:(MasterViewController *)aMasterController team:\n\
    (NSManagedObject *)aTeam {\n  if ((self = [super init])) {\n    self.masterController\
    \ = aMasterController;\n    self.team = aTeam;\n  }\n  return self;\n}\n\n- (void)didReceiveMemoryWarning\
    \ {\n  [super didReceiveMemoryWarning];\n}\n\n#pragma mark - View lifecycle\n\n\
    - (void)viewDidLoad {\n  [super viewDidLoad];\n  if (team != nil) {\n    name.text\
    \ = [team valueForKey:@\"name\"];\n    uniformColor.text = [team valueForKey:@\"\
    uniformColor\"];\n  }\n}\n\n- (void)viewDidUnload {\n  [super viewDidUnload];\n\
    }\n\n- (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation\
    \ {\n  return (interfaceOrientation == UIInterfaceOrientationPortrait);\n}\n\n\
    #pragma mark - Button handlers\n\n- (IBAction)save:(id)sender {\n  if (masterController\
    \ != nil) {\n    if (team != nil) {\n      [team setValue:name.text forKey:@\"\
    name\"];\n      [team setValue:uniformColor.text forKey:@\"uniformColor\"];\n\
    \      [masterController saveContext];\n    } else {\n      [masterController\
    \ insertTeamWithName:name.text uniformColor:uniformColor.text];\n    }\n  }\n\
    \  [self dismissModalViewControllerAnimated:YES];\n}\n\n- (IBAction)cancel:(id)sender\
    \ {\n  [self dismissModalViewControllerAnimated:YES];\n}\n\n@end\n```\n\nWith\
    \ the code written to support the user interface, you're ready to build the labels,\
    \ text fields, and buttons the users will interact with to create teams. Open\
    \ `TeamViewController.xib` in Xcode. You should see a blank view. Drag two `Label`\
    \ instances onto the view, and change them to read **Team Name:** and **Uniform\
    \ Color:**. Drag two `Text Field` instances onto the view, and align them to the\
    \ right of the Labels. Drag two `Round Rect Button` instances below the `Label`\
    \ and `Text Field` controls, and change the labels on them to **Save** and **Cancel**.\
    \ Your view should look like [Figure 3–14](#Chapter03.html#fig_3_14).\n\n![images](images/0314.jpg)\n\
    \n**Figure 3–14.** *Updated team view*\n\nBind the `Text Field` instances to the\
    \ appropriate `TeamViewController` members, `name` and `uniformColor`, by Ctrl+dragging\
    \ from the File's Owner icon to the respective `Text Field` instances and selecting\
    \ `name` or `uniformColor` from the pop-up menu as appropriate. Wire the buttons\
    \ to the `save:` and `cancel:` methods by Ctrl+dragging from each button, in turn,\
    \ to the File's Owner icon and selecting the appropriate method from the pop-up\
    \ menu.\n\nBefore building and running the application, you must go back to `MasterViewController`\
    \ and include code to display the team interface you just built. You display it\
    \ in two scenarios: when users tap the + button to create a new team and when\
    \ they tap the team in the table to edit it. Start by creating the method to respond\
    \ to the + button tap. Declare a method called `showTeamView:` in `MasterViewController.h`:,\
    \ like so:\n\n```\n- (void)showTeamView;\n```\n\nGo to `MasterViewController.m`,\
    \ import `TeamViewController.h`, and add the definition for the `showTeamView:`\
    \ method. This method creates a `TeamViewController` instance, initializing it\
    \ with the `MasterViewController` instance and a `nil` team, so that the `TeamViewController`\
    \ knows to create a new team if the user taps Save. The method should look like\
    \ this:\n\n```\n- (void)showTeamView {\n  TeamViewController *teamViewController\
    \ = [[TeamViewController alloc]\ninitWithMasterController:self team:nil];\n  [self\
    \ presentModalViewController:teamViewController animated:YES];\n}\n```\n\nNow\
    \ you need to wire the + button to call this method. Go to the `viewDidLoad:`\
    \ method, and change this line\n\n```\nUIBarButtonItem *addButton = [[UIBarButtonItem\
    \ alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemAdd target:self\naction:@selector(insertNewObject)];\n\
    ```\n\nto this\n\n```\nUIBarButtonItem *addButton = [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemAdd\
    \ target:self\naction:@selector(showTeamView)];\n```\n\nThe application should\
    \ now be able to add teams, but before testing that, add the code to edit teams.\
    \ This code should determine the tapped team by asking the `fetchedResultsController`\
    \ which team was tapped, which it will determine using the `indexPath` passed\
    \ to the `didSelectRowAtIndexPath:` method. This code then creates a `TeamViewController`\
    \ instance and initializes it with the `MasterViewController` and the tapped team.\
    \ Find the `didSelectRowAtIndexPath:` method, and add the code to edit the tapped\
    \ team, like this:"
