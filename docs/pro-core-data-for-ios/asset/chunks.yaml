    ### Summary


    In this chapter, you explored several advanced topics relating to Core Data. Some
    you''ll most likely use, like error handling and validation, in many of your applications.
    Some, like encryption, you might use only occasionally.


    As you''ve worked through this book, you''ve learned the breadth and depth of
    Core Data. You learned how much work Core Data does for you, and you learned what
    work you must do to properly interact with the Core Data framework. We hope you''ve
    enjoyed reading this book as much as we enjoyed writing it, and we look forward
    to hearing from you as you use Core Data in your applications!


