    All Core Data stores have supporting metadata that help the persistent store coordinator
    manage the different stores. The metadata is materialized in the `NSPersistentStore`
    class as an `NSDictionary`. Two data elements are of particular interest to a
    new data store: `NSStoreTypeKey` and `NSStoreUUIDKey`. The `NSStoreTypeKey` value
    must be a string that uniquely identifies the data store type, while the `NSStoreUUIDKey`
    must be a string that uniquely identifies the data store itself. To create unique
    identifiers, add a static utility method that creates and returns universally
    unique identifiers (UUIDs):


    **`+ (NSString *)makeUUID {`**

    **`  CFUUIDRef uuidRef = CFUUIDCreate(NULL);`**

    **`  CFStringRef uuidStringRef = CFUUIDCreateString(NULL, uuidRef);`**

    **`  CFRelease(uuidRef);`**

    **`  NSString* uuid = [NSString stringWithString:( __bridge NSString *)uuidStringRef];`**

