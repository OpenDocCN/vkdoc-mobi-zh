- fmt: "#### Creating the Shape Application Data Model\n\nBefore writing the code\
    \ for the application, create your data model. Select **File** ![images](images/U001.jpg)\
    \ **New** ![images](images/U001.jpg) **New File**, select Core Data under iOS\
    \ on the left and Data Model on the right, and click Next. Call the model file\
    \ `Shapes.xcdatamodel` and save it to the Shapes folder in the Shapes group, as\
    \ shown in [Figure 5–4](#Chapter05.html#fig_5_4).\n\n![images](images/0504.jpg)\n\
    \n**Figure 5–4.** *Creating your Shapes data model*\n\nSelect `Shapes.xcdatamodeld`\
    \ to edit your data model, and follow these steps to finalize the model:\n\n1.\
    \  Add an entity called `Shape`, and give it a nonoptional attribute called `color`\
    \ of type `String`.\n2.  Add an entity called `Circle`, and give it three nonoptional\
    \ attributes, all of type `Float`: `radius`, `x`, and `y`. Set its Parent Entity\
    \ to `Shape`.\n3.  Add an entity called `Polygon` with no attributes, and set\
    \ its Parent Entity to `Shape`.\n4.  Add an entity called `Vertex` with a nonoptional\
    \ attribute called `index` of type `Integer 16`. Give it two nonoptional `Float`\
    \ attributes called `x` and `y`. Add a relationship called `polygon`, and set\
    \ Destination to `Polygon`. Make it optional, and leave the Delete Rule as Nullify.\n\
    5.  Add a relationship to the `Polygon` entity called `vertices`, and set its\
    \ Destination to `Vertex` and Inverse to `polygon`. Uncheck the Optional check\
    \ box, check the To-Many Relationship check box, set Min Count to 3, and set Delete\
    \ Rule to Cascade.\n6.  Add an entity called `Transform`, and give a nonoptional\
    \ attribute called `scale` of type `Float`.\n7.  Add an entity called `Canvas`,\
    \ and give it a relationship called `transform`. Set Destination to `Transform`,\
    \ uncheck the Optional check box, and set Delete Rule to Cascade. Add another\
    \ relationship called `shapes`. Set Destination to `Shape`, leave Optional checked,\
    \ and check the To-Many Relationship check box. Leave Delete Rule as Nullify.\n\
    8.  Select the `Shape` entity, and add a relationship called `canvases`. Set Destination\
    \ to `Canvas` and Inverse to `shapes`. Check Optional and To-Many Relationship,\
    \ and set Delete Rule to Nullify.\n9.  Select the `Transform` entity, and add\
    \ a relationship called `canvas`. Set Destination to `Canvas` and Inverse to `transform`.\
    \ Uncheck Optional, and set Delete Rule to Deny.\n\nWhen you finish, your data\
    \ model layout should look like [Figure 5–5](#Chapter05.html#fig_5_5).\n\n![images](images/0505.jpg)\n\
    \n**Figure 5–5.** *The Shapes application data model*\n\nWith your data model\
    \ in place, you’re ready to add Core Data support to your application delegate.\
    \ Open `ShapesAppDelegate.h`, import the Core Data headers, and add properties\
    \ for your managed object context, managed object model, and persistent store\
    \ coordinator. Also, add declarations for two methods: one to save the managed\
    \ object context, and one to return your application’s document directory. When\
    \ you’re done, your file should look like the following, with the added lines\
    \ in bold:\n\n```\n#import <UIKit/UIKit.h>\n#import <CoreData/CoreData.h>\n\n\
    @class ShapesViewController;\n\n@interface ShapesAppDelegate : NSObject <UIApplicationDelegate>\n\
    @property (strong, nonatomic) IBOutlet UIWindow *window;\n@property (strong, nonatomic)\
    \ IBOutlet ShapesViewController *viewController;\n@property (nonatomic, retain,\
    \ readonly) NSManagedObjectContext *managedObjectContext;\n@property (nonatomic,\
    \ retain, readonly) NSManagedObjectModel *managedObjectModel;\n@property (nonatomic,\
    \ retain, readonly) NSPersistentStoreCoordinator\n*persistentStoreCoordinator;\n\
    \n- (void)saveContext;\n- (NSURL *)applicationDocumentsDirectory;\n\n@end\n```\n\
    \nNext, open `ShapesAppDelegate.m`, and add `@synthesize` lines for the three\
    \ Core Data-related properties you just added. Also add accessors for the same\
    \ three Core Data–related properties. Finally, add implementations for your methods\
    \ to save the managed object context and to return the application’s document\
    \ directory. Your `ShapesAppDelegate.m` file should match [Listing 5–1](#Chapter05.html#list_5_1).\n\
    \n***Listing 5–1.** ShapesAppDelegate.m*\n\n```\n#import \"ShapesAppDelegate.h\"\
    \n#import \"ShapesViewController.h\"\n\n@implementation ShapesAppDelegate\n\n\
    @synthesize window=_window;\n@synthesize viewController=_viewController;\n@synthesize\
    \ managedObjectContext=__managedObjectContext;\n@synthesize managedObjectModel=__managedObjectModel;\n\
    @synthesize persistentStoreCoordinator=__persistentStoreCoordinator;\n\n- (BOOL)application:(UIApplication\
    \ *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {\n\
    \    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n\
    \  // Override point for customization after application launch.\n  self.viewController\
    \ = [[ShapesViewController alloc] initWithNibName:@\"ShapesViewController\" bundle:nil];\n\
    \  self.window.rootViewController = self.viewController;\n  [self.window makeKeyAndVisible];\n\
    \  return YES;\n}\n\n#pragma mark - Core Data stack\n\n- (NSManagedObjectContext\
    \ *)managedObjectContext {\n  if (__managedObjectContext != nil) {\n    return\
    \ __managedObjectContext;\n  }\n\n  NSPersistentStoreCoordinator *coordinator\
    \ = [self persistentStoreCoordinator];\n  if (coordinator != nil) {\n    __managedObjectContext\
    \ = [[NSManagedObjectContext alloc] init];\n    [__managedObjectContext setPersistentStoreCoordinator:coordinator];\n\
    \  }\n  return __managedObjectContext;\n}\n\n- (NSManagedObjectModel *)managedObjectModel\
    \ {\n  if (__managedObjectModel != nil) {\n    return __managedObjectModel;\n\
    \  }\n  NSURL *modelURL = [[NSBundle mainBundle] URLForResource:@\"Shapes\" withExtension:@\"\
    momd\"];\n  __managedObjectModel = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];\
    \    \n  return __managedObjectModel;\n}\n\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\
    \ {\n  if (__persistentStoreCoordinator != nil) {\n    return __persistentStoreCoordinator;\n\
    \  }\n\n  NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
    Shapes.sqlite\"];\n\n  NSError *error = nil;\n  __persistentStoreCoordinator =\
    \ [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
    \  if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
    \ configuration:nil URL:storeURL options:nil error:&error]) {\n    NSLog(@\"Unresolved\
    \ error %@, %@\", error, [error userInfo]);\n    abort();\n  }    \n  return __persistentStoreCoordinator;\n\
    }\n\n- (void)saveContext {\n  NSError *error = nil;\n  NSManagedObjectContext\
    \ *managedObjectContext = self.managedObjectContext;\n  if (managedObjectContext\
    \ != nil) {\n    if ([managedObjectContext hasChanges] && ![managedObjectContext\
    \ save:&error]) {\n      NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n\
    \      abort();\n    }\n  }\n}\n\n#pragma mark - Application's Documents directory\n\
    \n- (NSURL *)applicationDocumentsDirectory {\n  return [[[NSFileManager defaultManager]\
    \ URLsForDirectory:NSDocumentDirectory inDomains:NSUserDomainMask] lastObject];\n\
    }\n\n@end\n```"
  raw: '#### Creating the Shape Application Data Model


    Before writing the code for the application, create your data model. Select **File**
    ![images](images/U001.jpg) **New** ![images](images/U001.jpg) **New File**, select
    Core Data under iOS on the left and Data Model on the right, and click Next. Call
    the model file `Shapes.xcdatamodel` and save it to the Shapes folder in the Shapes
    group, as shown in [Figure 5–4](#Chapter05.html#fig_5_4).


    ![images](images/0504.jpg)


    **Figure 5–4.** *Creating your Shapes data model*


    Select `Shapes.xcdatamodeld` to edit your data model, and follow these steps to
    finalize the model:


    1.  Add an entity called `Shape`, and give it a nonoptional attribute called `color`
    of type String.

    2.  Add an entity called `Circle`, and give it three nonoptional attributes, all
    of type Float: `radius`, `x`, and `y`. Set its Parent Entity to `Shape`.

    3.  Add an entity called `Polygon` with no attributes, and set its Parent Entity
    to `Shape`.

    4.  Add an entity called `Vertex` with a nonoptional attribute called `index`
    of type Integer 16\. Give it two nonoptional `Float` attributes called `x` and
    `y`. Add a relationship called polygon, and set Destination to Polygon. Make it
    optional, and leave the Delete Rule as Nullify.

    5.  Add a relationship to the `Polygon` entity called vertices, and set its Destination
    to Vertex and Inverse to polygon. Uncheck the Optional check box, check the To-Many
    Relationship check box, set Min Count to 3, and set Delete Rule to Cascade.

    6.  Add an entity called `Transform`, and give a nonoptional attribute called
    `scale` of type Float.

    7.  Add an entity called `Canvas`, and give it a relationship called transform.
    Set Destination to Transform, uncheck the Optional check box, and set Delete Rule
    to Cascade. Add another relationship called shapes. Set Destination to Shape,
    leave Optional checked, and check the To-Many Relationship check box. Leave Delete
    Rule as Nullify.

    8.  Select the `Shape` entity, and add a relationship called canvases. Set Destination
    to Canvas and Inverse to shapes. Check Optional and To-Many Relationship, and
    set Delete Rule to Nullify.

    9.  Select the `Transform` entity, and add a relationship called canvas. Set Destination
    to Canvas and Inverse to transform. Uncheck Optional, and set Delete Rule to Deny.


    When you finish, your data model layout should look like [Figure 5–5](#Chapter05.html#fig_5_5).


    ![images](images/0505.jpg)


    **Figure 5–5.** *The Shapes application data model*


    With your data model in place, you’re ready to add Core Data support to your application
    delegate. Open `ShapesAppDelegate.h`, import the Core Data headers, and add properties
    for your managed object context, managed object model, and persistent store coordinator.
    Also, add declarations for two methods: one to save the managed object context,
    and one to return your application’s document directory. When you’re done, your
    file should look like the following, with the added lines in bold:


    `#import <UIKit/UIKit.h>`

    **`#import <CoreData/CoreData.h>`**


    `@class ShapesViewController;`


    `@interface ShapesAppDelegate : NSObject <UIApplicationDelegate>`

    `@property (strong, nonatomic) IBOutlet UIWindow *window;`

    `@property (strong, nonatomic) IBOutlet ShapesViewController *viewController;`

    **`@property (nonatomic, retain, readonly) NSManagedObjectContext *managedObjectContext;`**

    **`@property (nonatomic, retain, readonly) NSManagedObjectModel *managedObjectModel;`**

    **`@property (nonatomic, retain, readonly) NSPersistentStoreCoordinator`**

    **`*persistentStoreCoordinator;`**


    **`- (void)saveContext;`**

    **`- (NSURL *)applicationDocumentsDirectory;`**


    `@end`


    Next, open `ShapesAppDelegate.m`, and add `@synthesize` lines for the three Core
    Data-related properties you just added. Also add accessors for the same three
    Core Data–related properties. Finally, add implementations for your methods to
    save the managed object context and to return the application’s document directory.
    Your `ShapesAppDelegate.m` file should match [Listing 5–1](#Chapter05.html#list_5_1).


    ***Listing 5–1.** ShapesAppDelegate.m*


    `#import "ShapesAppDelegate.h"`

    `#import "ShapesViewController.h"`


    `@implementation ShapesAppDelegate`


    `@synthesize window=_window;`

    `@synthesize viewController=_viewController;`

    **`@synthesize managedObjectContext=__managedObjectContext;`**

    **`@synthesize managedObjectModel=__managedObjectModel;`**

    **`@synthesize persistentStoreCoordinator=__persistentStoreCoordinator;`**


    `- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary
    *)launchOptions {`

    `    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];`

    `  // Override point for customization after application launch.`

    `  self.viewController = [[ShapesViewController alloc] initWithNibName:@"ShapesViewController"
    bundle:nil];`

    `  self.window.rootViewController = self.viewController;`

    `  [self.window makeKeyAndVisible];`

    `  return YES;`

    `}`


    **`#pragma mark - Core Data stack`**


    **`- (NSManagedObjectContext *)managedObjectContext {`**

    **`  if (__managedObjectContext != nil) {`**

    **`    return __managedObjectContext;`**

    **`  }`**


    **`  NSPersistentStoreCoordinator *coordinator = [self persistentStoreCoordinator];`**

    **`  if (coordinator != nil) {`**

    **`    __managedObjectContext = [[NSManagedObjectContext alloc] init];`**

    **`    [__managedObjectContext setPersistentStoreCoordinator:coordinator];`**

    **`  }`**

    **`  return __managedObjectContext;`**

    **`}`**


    **`- (NSManagedObjectModel *)managedObjectModel {`**

    **`  if (__managedObjectModel != nil) {`**

    **`    return __managedObjectModel;`**

    **`  }`**

    **`  NSURL *modelURL = [[NSBundle mainBundle] URLForResource:@"Shapes" withExtension:@"momd"];`**

    **`  __managedObjectModel = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];    `**

    **`  return __managedObjectModel;`**

    **`}`**


    **`- (NSPersistentStoreCoordinator *)persistentStoreCoordinator {`**

    **`  if (__persistentStoreCoordinator != nil) {`**

    **`    return __persistentStoreCoordinator;`**

    **`  }`**


    **`  NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@"Shapes.sqlite"];`**


    **`  NSError *error = nil;`**

    **`  __persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self
    managedObjectModel]];`**

    **`  if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType
    configuration:nil URL:storeURL options:nil error:&error]) {`**

    **`    NSLog(@"Unresolved error %@, %@", error, [error userInfo]);`**

    **`    abort();`**

    **`  }    `**

    **`  return __persistentStoreCoordinator;`**

    **`}`**


    **`- (void)saveContext {`**

    **`  NSError *error = nil;`**

    **`  NSManagedObjectContext *managedObjectContext = self.managedObjectContext;`**

    **`  if (managedObjectContext != nil) {`**

    **`    if ([managedObjectContext hasChanges] && ![managedObjectContext save:&error])
    {`**

    **`      NSLog(@"Unresolved error %@, %@", error, [error userInfo]);`**

    **`      abort();`**

    **`    }`**

    **`  }`**

    **`}`**


    **`#pragma mark - Application''s Documents directory`**


    **`- (NSURL *)applicationDocumentsDirectory {`**

    **`  return [[[NSFileManager defaultManager] URLsForDirectory:NSDocumentDirectory
    inDomains:NSUserDomainMask] lastObject];`**

    **`}`**


    `@end`'
  trans: "#### 创建 Shape 应用数据模型\n\n在编写应用程序代码之前，请先创建数据模型。依次选择 **文件** ![图片](img/U001.jpg)\
    \ **新建** ![图片](img/U001.jpg) **新建文件**，在左侧 iOS 下选择 Core Data，在右侧选择数据模型，然后点击“下一步”。将模型文件命名为\
    \ `Shapes.xcdatamodel`，并将其保存到 Shapes 组中的 Shapes 文件夹中，如图 5-4 所示。\n\n![图片](img/0504.jpg)\n\
    \n**图 5-4.** *创建你的 Shapes 数据模型*\n\n选择 `Shapes.xcdatamodeld` 来编辑你的数据模型，并按照以下步骤完成模型：\n\
    \n1.  添加一个名为 `Shape` 的实体，并为其添加一个名为 `color` 的非可选属性，类型为 `String`。\n2.  添加一个名为 `Circle`\
    \ 的实体，并为其添加三个非可选属性，类型均为 `Float`：`radius`、`x` 和 `y`。将其父实体设置为 `Shape`。\n3.  添加一个名为\
    \ `Polygon` 的实体，不添加属性，并将其父实体设置为 `Shape`。\n4.  添加一个名为 `Vertex` 的实体，并为其添加一个名为 `index`\
    \ 的非可选属性，类型为 `Integer 16`。为其添加两个名为 `x` 和 `y` 的非可选 `Float` 属性。添加一个名为 `polygon`\
    \ 的关系，并将目标设置为 `Polygon`。将其设为可选，并保持删除规则为“置空”。\n5.  为 `Polygon` 实体添加一个名为 `vertices`\
    \ 的关系，将其目标设置为 `Vertex`，反向关系设置为 `polygon`。取消选中“可选”复选框，选中“对多关系”复选框，将最小计数设置为 3，并将删除规则设置为“级联”。\n\
    6.  添加一个名为 `Transform` 的实体，并为其添加一个名为 `scale` 的非可选 `Float` 类型属性。\n7.  添加一个名为 `Canvas`\
    \ 的实体，并为其添加一个名为 `transform` 的关系。将目标设置为 `Transform`，取消选中“可选”复选框，并将删除规则设置为“级联”。再添加一个名为\
    \ `shapes` 的关系。将目标设置为 `Shape`，保持“可选”为选中状态，并选中“对多关系”复选框。将删除规则保留为“置空”。\n8.  选择 `Shape`\
    \ 实体，并添加一个名为 `canvases` 的关系。将目标设置为 `Canvas`，反向关系设置为 `shapes`。选中“可选”和“对多关系”，并将删除规则设置为“置空”。\n\
    9.  选择 `Transform` 实体，并添加一个名为 `canvas` 的关系。将目标设置为 `Canvas`，反向关系设置为 `transform`。取消选中“可选”，并将删除规则设置为“拒绝”。\n\
    \n完成后，你的数据模型布局应如图 5-5 所示。\n\n![图片](img/0505.jpg)\n\n**图 5-5.** *Shapes 应用数据模型*\n\
    \n数据模型就位后，你就可以在应用委托中添加 Core Data 支持了。打开 `ShapesAppDelegate.h`，导入 Core Data 头文件，并为托管对象上下文、托管对象模型和持久化存储协调器添加属性。同时，为两个方法添加声明：一个用于保存托管对象上下文，另一个用于返回应用程序的文档目录。完成后，你的文件应如下所示，新增的行以粗体显示：\n\
    \n```\n#import <UIKit/UIKit.h>\n#import <CoreData/CoreData.h>\n\n@class ShapesViewController;\n\
    \n@interface ShapesAppDelegate : NSObject <UIApplicationDelegate>\n@property (strong,\
    \ nonatomic) IBOutlet UIWindow *window;\n@property (strong, nonatomic) IBOutlet\
    \ ShapesViewController *viewController;\n@property (nonatomic, retain, readonly)\
    \ NSManagedObjectContext *managedObjectContext;\n@property (nonatomic, retain,\
    \ readonly) NSManagedObjectModel *managedObjectModel;\n@property (nonatomic, retain,\
    \ readonly) NSPersistentStoreCoordinator\n*persistentStoreCoordinator;\n\n- (void)saveContext;\n\
    - (NSURL *)applicationDocumentsDirectory;\n\n@end\n```\n\n接下来，打开 `ShapesAppDelegate.m`，为你刚添加的三个\
    \ Core Data 相关属性添加 `@synthesize` 行。同时，为相同的三个 Core Data 相关属性添加访问器方法。最后，为你保存托管对象上下文和返回应用文档目录的方法添加实现。你的\
    \ `ShapesAppDelegate.m` 文件应与代码清单 5-1 一致。\n\n***代码清单 5-1.** ShapesAppDelegate.m*\n\
    \n```\n#import \"ShapesAppDelegate.h\"\n#import \"ShapesViewController.h\"\n\n\
    @implementation ShapesAppDelegate\n\n@synthesize window=_window;\n@synthesize\
    \ viewController=_viewController;\n@synthesize managedObjectContext=__managedObjectContext;\n\
    @synthesize managedObjectModel=__managedObjectModel;\n@synthesize persistentStoreCoordinator=__persistentStoreCoordinator;\n\
    \n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions {\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\n  // 应用启动后的自定义覆盖点。\n  self.viewController = [[ShapesViewController\
    \ alloc] initWithNibName:@\"ShapesViewController\" bundle:nil];\n  self.window.rootViewController\
    \ = self.viewController;\n  [self.window makeKeyAndVisible];\n  return YES;\n\
    }\n\n#pragma mark - Core Data 栈\n\n- (NSManagedObjectContext *)managedObjectContext\
    \ {\n  if (__managedObjectContext != nil) {\n    return __managedObjectContext;\n\
    \  }\n\n  NSPersistentStoreCoordinator *coordinator = [self persistentStoreCoordinator];\n\
    \  if (coordinator != nil) {\n    __managedObjectContext = [[NSManagedObjectContext\
    \ alloc] init];\n    [__managedObjectContext setPersistentStoreCoordinator:coordinator];\n\
    \  }\n  return __managedObjectContext;\n}\n\n- (NSManagedObjectModel *)managedObjectModel\
    \ {\n  if (__managedObjectModel != nil) {\n    return __managedObjectModel;\n\
    \  }\n  NSURL *modelURL = [[NSBundle mainBundle] URLForResource:@\"Shapes\" withExtension:@\"\
    momd\"];\n  __managedObjectModel = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];\
    \    \n  return __managedObjectModel;\n}\n\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\
    \ {\n  if (__persistentStoreCoordinator != nil) {\n    return __persistentStoreCoordinator;\n\
    \  }\n\n  NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
    Shapes.sqlite\"];\n\n  NSError *error = nil;\n  __persistentStoreCoordinator =\
    \ [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
    \  if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
    \ configuration:nil URL:storeURL options:nil error:&error]) {\n    NSLog(@\"无法解决的错误\
    \ %@, %@\", error, [error userInfo]);\n    abort();\n  }    \n  return __persistentStoreCoordinator;\n\
    }\n\n- (void)saveContext {\n  NSError *error = nil;\n  NSManagedObjectContext\
    \ *managedObjectContext = self.managedObjectContext;\n  if (managedObjectContext\
    \ != nil) {\n    if ([managedObjectContext hasChanges] && ![managedObjectContext\
    \ save:&error]) {\n      NSLog(@\"无法解决的错误 %@, %@\", error, [error userInfo]);\n\
    \      abort();\n    }\n  }\n}\n\n#pragma mark - 应用的文档目录\n\n- (NSURL *)applicationDocumentsDirectory\
    \ {\n  return [[[NSFileManager defaultManager] URLsForDirectory:NSDocumentDirectory\
    \ inDomains:NSUserDomainMask] lastObject];\n}\n\n@end\n```"
- fmt: "# 排版后的文本\n\n根据需求，`Shapes`应用程序将屏幕分成两半，并在两半上显示相同的形状，其中一半的形状尺寸加倍。`Canvas`实体在Core\
    \ Data数据模型中代表了这些屏幕半部分，但您需要相应的用户界面元素来实际在屏幕上绘制形状。为此，您将创建一个派生自`UIView`的类，然后将这两个视图添加到现有的XIB文件中。从创建类开始：选择**File**\
    \ ![images](images/U001.jpg) **New** ![images](images/U001.jpg) **New File**，在左侧选择Cocoa\
    \ Touch Class，在右侧选择Objective-C class，然后点击Next。将类命名为`BasicCanvasUIView`，并使其成为`UIView`的子类，如[Figure\
    \ 5–6](#Chapter05.html#fig_5_6)所示。您应该会看到该类的两个文件：`BasicCanvasUIView.h`和`BasicCanvasUIView.m`，它们已列在项目文件中。打开`BasicCanvasUIView.h`文件。\n\
    \n![images](images/0506.jpg)\n\n**Figure 5–6.** *从UIView派生BasicCanvasUIView类*\n\
    \n在`BasicCanvasUIView`中，您需要引用该视图将显示的对应`Canvas`实体，以及一种缩放视图的方式（一个实例的缩放比例为1x，另一个为2x）。将`BasicCanvasUIView.h`修改为如下所示：\n\
    \n```objc\n#import <UIKit/UIKit.h>\n#import <CoreData/CoreData.h>\n\n@interface\
    \ BasicCanvasUIView : UIView {\n    NSManagedObject *canvas;\n}\n@property (nonatomic,\
    \ retain) NSManagedObject *canvas;\n\n-(float)scale;\n\n@end\n```\n\n在类的实现文件`BasicCanvasUIView.m`中，您需要为`canvas`属性添加访问器和修改器，因此添加这行代码：\n\
    \n```objc\n@synthesize canvas;\n```\n\n`scale:`方法返回存储在与该视图表示的`Canvas`实体相关的`Transform`实体中的`scale`属性的值。请记住，`Canvas`与`Transform`是一对一的关系；每个`Canvas`实例都有一个对应的`Transform`实例。要获取`scale`的值，您需要使用CRUD的Retrieve操作。首先，从`BasicCanvasUIView`类指向的`Canvas`托管对象中检索`Transform`托管对象，代码如下：\n\
    \n```objc\nNSManagedObject *transform = [canvas valueForKey:@\"transform\"];\n\
    ```\n\n注意此处没有任何结构化查询语言（SQL）代码。另外还要注意，您用于检索关系值的语法与用于检索属性值的语法相同。Core Data不区分实体中属性的类型。\n\
    \n一旦有了对`Transform`托管对象的引用，您就可以使用如下代码检索其`scale`的值：\n\n```objc\n[transform valueForKey:@\"\
    scale\"]\n```\n\n`valueForKey:`方法返回一个对象，因此使用`floatValue`方法将存储的值作为`float`类型获取。`scale:`方法的完整实现如下所示：\n\
    \n```objc\n- (float)scale {\n    NSManagedObject *transform = [canvas valueForKey:@\"\
    transform\"];\n    return [[transform valueForKey:@\"scale\"] floatValue];\n}\n\
    ```\n\n实际绘制形状的方法看起来稍微复杂一些，而绘图和图形处理超出了本书的范围。不过，请仔细阅读代码，您会发现它并没有看起来那么糟糕。由于本书涵盖的是Core\
    \ Data，您可以直接输入这些代码而无需理解其原理。与Core Data相关的部分是Retrieve操作：该方法使用`Canvas`实体和`Shape`实体之间的关系检索所有要绘制的形状，然后检索要绘制形状的相关属性。对于`Circle`实例，代码检索`x`、`y`和`radius`属性以在屏幕上构造圆。对于`Polygon`实例，代码使用`Polygon`的`vertices`关系检索所有相关的`Vertex`实例，根据`index`属性对它们进行排序，然后绘制与这些顶点匹配的多边形。[Listing\
    \ 5–2](#Chapter05.html#list_5_2)展示了完整的`drawRect:`方法。\n\n***Listing 5–2.** `drawRect:`方法*\n\
    \n```objc\n- (void)drawRect:(CGRect)rect {\n    // Check to make sure we have\
    \ data\n    if (canvas == nil) {\n        return;\n    }\n\n    // Get the current\
    \ graphics context for drawing\n    CGContextRef context = UIGraphicsGetCurrentContext();\n\
    \n    // Store the scale in a local variable so we don't hit the data store twice\n\
    \    float scale = self.scale;\n\n    // Scale the context according to the stored\
    \ value\n    CGContextScaleCTM(context, scale, scale);    \n\n    // Retrieve\
    \ all the shapes that relate to this canvas and iterate through them\n    NSSet*\
    \ shapes = [canvas valueForKey:@\"shapes\"];\n    for (NSManagedObject *shape\
    \ in shapes) {\n        // Get the entity name to determine whether this is a\
    \ Circle or a Polygon\n        NSString *entityName = [[shape entity] name];\n\
    \n        // Get the color, stored as RGB values in a comma-separated string,\
    \ and set it into the context\n        NSString *colorCode = [shape valueForKey:@\"\
    color\"];\n        NSArray *colorCodes = [colorCode componentsSeparatedByString:@\"\
    ,\"];\n        CGContextSetRGBFillColor(context, [[colorCodes objectAtIndex:0]\
    \ floatValue] / 255,\n                                 [[colorCodes objectAtIndex:1]\
    \ floatValue] / 255,\n                                 [[colorCodes objectAtIndex:2]\
    \ floatValue] / 255, 1.0);        \n\n        // If this shape is a circle . .\
    \ .\n        if ([entityName compare:@\"Circle\"] == NSOrderedSame) {\n      \
    \      // Get the x, y, and radius from the data store and draw the circle\n \
    \           float x = [[shape valueForKey:@\"x\"] floatValue];\n            float\
    \ y = [[shape valueForKey:@\"y\"] floatValue];\n            float radius = [[shape\
    \ valueForKey:@\"radius\"] floatValue];\n            CGContextFillEllipseInRect(context,\
    \ CGRectMake(x-radius, y-radius, 2*radius, 2*radius));\n        } else if ([entityName\
    \ compare:@\"Polygon\"] == NSOrderedSame) {\n            // This is a polygon\n\
    \            // Use a sort descriptor to order the vertices using the index value\n\
    \            NSSortDescriptor *sortDescriptor = [[NSSortDescriptor alloc] initWithKey:\n\
    \                                                @\"index\" ascending:YES];\n\
    \            NSArray *sortDescriptors = [[NSArray alloc] initWithObjects:sortDescriptor,\
    \ nil];\n            NSArray* vertices = [[[shape mutableSetValueForKey:@\"vertices\"\
    ] allObjects]\n                                sortedArrayUsingDescriptors:sortDescriptors];\n\
    \n            // Begin drawing the polygon\n            CGContextBeginPath(context);\n\
    \n            // Place the current graphic context point on the last vertex\n\
    \            NSManagedObject *lastVertex = [vertices lastObject];\n          \
    \  CGContextMoveToPoint(context, [[lastVertex valueForKey:@\"x\"] floatValue],\n\
    \                                [[lastVertex valueForKey:@\"y\"] floatValue]);\n\
    }\n```"
  raw: 'According to the requirements, the Shapes application divides the screen in
    half and shows the same shapes on both halves, with the shapes doubled in size
    on one half. The `Canvas` entity represents these screen halves in the Core Data
    data model, but you need corresponding user interface elements to actually draw
    the shapes on the screen. To accomplish this, you’ll create a class derived from
    `UIView` and then add two of these views to your existing XIB file. Start by creating
    the class: select **File** ![images](images/U001.jpg) **New** ![images](images/U001.jpg)
    **New File**, select Cocoa Touch Class on the left and Objective-C class on the
    right, and click Next. Call the class `BasicCanvasUIView` and make it a subclass
    of `UIView`, as shown in [Figure 5–6](#Chapter05.html#fig_5_6). You should see
    the two files for the class, `BasicCanvasUIView.h` and `BasicCanvasUIView.m`,
    listed in the files for your project. Open the `BasicCanvasUIView.h` file.


    ![images](images/0506.jpg)


    **Figure 5–6.** *Deriving the BasicCanvasUIView class from UIView*


    In BasicCanvasUIView, you want a reference to the corresponding `Canvas` entity
    that this view will display, as well as a way to scale the view (one instance
    will have a 1x scale, while the other will have a 2x). Change `BasicCanvasUIView.h`
    to look like the following:


    `#import <UIKit/UIKit.h>`

    **`#import <CoreData/CoreData.h>`**


    `@interface BasicCanvasUIView : UIView {`

    **`  NSManagedObject *canvas;`**

    `}`

    **`@property (nonatomic, retain) NSManagedObject *canvas;`**


    **`-(float)scale;`**


    `@end`


    In the implementation file for your class, `BasicCanvasUIView.m`, you need an
    accessor and a mutator for the `canvas` property, so add this line:


    **`@synthesize canvas;`**


    The `scale:` method returns the value stored for the `scale` attribute in the
    `Transform` entity that relates to the `Canvas` entity that this view represents.
    Remember that `Canvas` has a one-to-one relationship with `Transform` ; each `Canvas`
    instance has a corresponding `Transform` instance. To get the value for `scale`,
    you use the Retrieve action of CRUD. You first retrieve the `Transform` managed
    object from the `Canvas` managed object that this `BasicCanvasUIView` class points
    to using this code:


    `NSManagedObject *transform = [canvas valueForKey:@"transform"];`


    Notice the absence of any Structured Query Language (SQL) code. Notice, also,
    that you retrieve the value for a relationship using the same syntax you’d use
    to retrieve the value of an attribute. Core Data doesn’t differentiate among the
    types of properties in an entity.


    Once you have a reference to the `Transform` managed object, you can retrieve
    its value for `scale` using code like this:


    `[transform valueForKey:@"scale"]`


    The `valueForKey:` method returns an object, so use the `floatValue` method to
    get the stored value as a `float` type. The `scale:` method, in its entirety,
    looks like this:


    **`- (float)scale {`**

    **`  NSManagedObject *transform = [canvas valueForKey:@"transform"];`**

    **`  return [[transform valueForKey:@"scale"] floatValue];`**

    **`}`**


    The method that does the actual drawing of shapes looks a little more complex,
    and drawing and graphics lie outside the scope of this book. Read through the
    code carefully, however, and you’ll find it’s not as bad as it looks. Since this
    book covers Core Data, though, you can just type this in without understanding
    it. The parts relevant to Core Data are the Retrieve operations: the method retrieves
    all the shapes to draw using the relationship between the `Canvas` entity and
    the `Shape` entity and then retrieves the relevant properties for the shape to
    draw. In the case of `Circle` instances, the code retrieves the `x`, `y`, and
    `radius` attributes to construct the circle on the screen. In the case of `Polygon`
    instances, the code retrieves all the related `Vertex` instances using `Polygon`’s
    `vertices` relationship, sorts them on the `index` attribute, and draws a polygon
    that matches the vertices. [Listing 5–2](#Chapter05.html#list_5_2) shows the entire
    `drawRect:` method.


    ***Listing 5–2.** The `drawRect:` Method*


    **`- (void)drawRect:(CGRect)rect {`**

    **`  // Check to make sure we have data`**

    **`  if (canvas == nil) {`**

    **`    return;`**

    **`  }`**


    **`  // Get the current graphics context for drawing`**

    **`  CGContextRef context = UIGraphicsGetCurrentContext();`**


    **`  // Store the scale in a local variable so we don’t hit the data store twice`**

    **`  float scale = self.scale;`**


    **`  // Scale the context according to the stored value`**

    **`  CGContextScaleCTM(context, scale, scale);    `**


    **`  // Retrieve all the shapes that relate to this canvas and iterate through
    them`**

    **`  NSSet* shapes = [canvas valueForKey:@"shapes"];`**

    **`  for (NSManagedObject *shape in shapes) {`**

    **`    // Get the entity name to determine whether this is a Circle or a Polygon`**

    **`    NSString *entityName = [[shape entity] name];`**


    **`    // Get the color, stored as RGB values in a comma-separated string, and
    set it into the context`**

    **`    NSString *colorCode = [shape valueForKey:@"color"];`**

    **`    NSArray *colorCodes = [colorCode componentsSeparatedByString:@","];`**

    **`    CGContextSetRGBFillColor(context, [[colorCodes objectAtIndex:0] floatValue]
    / 255,`**

    **`                             [[colorCodes objectAtIndex:1] floatValue] / 255,`**

    **`                             [[colorCodes objectAtIndex:2] floatValue] / 255,
    1.0);        `**


    **`    // If this shape is a circle . . .`**

    **`    if ([entityName compare:@"Circle"] == NSOrderedSame) {`**

    **`      // Get the x, y, and radius from the data store and draw the circle`**

    **`      float x = [[shape valueForKey:@"x"] floatValue];`**

    **`      float y = [[shape valueForKey:@"y"] floatValue];`**

    **`      float radius = [[shape valueForKey:@"radius"] floatValue];`**

    **`      CGContextFillEllipseInRect(context, CGRectMake(x-radius, y-radius, 2*radius,
    2*radius));`**

    **`    } else if ([entityName compare:@"Polygon"] == NSOrderedSame) {`**

    **`      // This is a polygon`**

    **`      // Use a sort descriptor to order the vertices using the index value`**

    **`      NSSortDescriptor *sortDescriptor = [[NSSortDescriptor alloc] initWithKey:`![images](images/U002.jpg)**

    **`@"index" ascending:YES];`**

    **`      NSArray *sortDescriptors = [[NSArray alloc] initWithObjects:sortDescriptor,
    nil];`**

    **`      NSArray* vertices = [[[shape mutableSetValueForKey:@"vertices"] allObjects]`![images](images/U002.jpg)**

    **`sortedArrayUsingDescriptors:sortDescriptors];`**


    **`      // Begin drawing the polygon`**

    **`      CGContextBeginPath(context);`**


    **`      // Place the current graphic context point on the last vertex`**

    **`      NSManagedObject *lastVertex = [vertices lastObject];`**

    **`      CGContextMoveToPoint(context, [[lastVertex valueForKey:@"x"] floatValue],`![images](images/U002.jpg)**

    **`[[lastVertex valueForKey:@"y"] floatValue]);`**'
