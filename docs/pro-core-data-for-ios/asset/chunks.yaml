    Core Data makes no attempt to determine parentage between teams and players, nor
    does it create tags for the different entity types. It relies instead on tags
    called `object` with entity names specified as `type` attributes; moreover, it
    makes players and teams peers, which sounds like a recipe for lockouts and season
    cancellations.


    ### Summary


    SQLite claims on its home page, [`www.sqlite.org`](http://www.sqlite.org), that
    it “is the most widely deployed SQL database engine in the world.” It enjoys the
    backing of technology titans like Oracle, Mozilla, and Adobe. If you''ve spent
    much time in your career in typical corporate development roles, you probably
    feel like data belongs in a database. SQLite stores your data efficiently and
    compactly. It doesn''t require atomically rewriting the persistent store every
    time you change it. It requires no custom coding to use it. Xcode generates all
    you need to get started with a SQLite-backed persistent store. Why wouldn''t you
    use a SQLite database for all your Core Data persistent stores?


    Well, you might. SQLite is probably the right choice for data storage for most,
    if not all, of your applications'' data storage needs. You''ve learned in this
    chapter, however, that other options exist and that you can create your own store
    types optimized for your particular applications and data needs. Whether you''re
    working with remote data that you should store only in memory, wanting to persist
    data into text files, or imagining some other scenario best served by some other
    custom data store type, understand that your data can live in places other than
    a SQLite database. Remember that you''re free to store your data however you want,
    and Core Data will manage it for you appropriately.


    ## Chapter 4


    ## Creating a Data Model


    You can create applications with the most intuitive user interfaces that perform
    tasks users can’t live without, but if you don’t model your data correctly, your
    applications will become difficult to maintain, will underperform, and might even
    become unusable. This chapter explains how to model your data to support, not
    undermine, your applications.'
