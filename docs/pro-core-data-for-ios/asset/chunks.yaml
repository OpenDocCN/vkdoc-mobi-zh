  trans: '

    ### 版本控制


    要利用 Core Data 对数据模型版本控制以及数据在不同版本间迁移的支持，你需要首先显式地创建一个新版本的数据模型。为了说明其工作原理，我们重新引入第
    5 章中的 Shapes 应用。请复制一份该应用，因为本章中你将多次修改其数据模型。在 Shapes 的原始版本中，你创建了一个数据模型，该模型如图 8-1
    所示。


    ![images](img/0801.jpg)


    **图 8-1.** *单版本数据模型*


    `Shapes.xcdatamodeld` 包含了该模型，它实际上是你文件系统中的一个目录。其中包含了应用运行时创建 Core Data 持久化存储所需的文件。选中
    `Shapes.xcdatamodeld`，并查看 Xcode 工具区域中的文件检查器，如图 8-2 所示。它显示了当前模型版本的名称：Shapes。由于只有一个对象模型版本，当前版本是自动设定的。要添加新版本，请从
    Xcode 菜单栏中选择 `Editor` → `Add Model Version`。此时会弹出一个面板，允许你输入版本名称，并选择新版本所基于的模型，如图
    8-3 所示。接受默认设置，然后点击完成。Xcode 会在 `Shapes.xcdatamodeld` 内部创建一个名为 `Shapes 2.xcdatamodel`
    的新目录，如图 8-4 所示。`Shapes.xcdatamodeld` 下的每个条目都代表你数据模型的一个版本；绿色勾选标记表示你的应用当前正在使用的版本。


    ![images](img/0802.jpg)


    **图 8-2.** *数据模型的当前版本*


    ![images](img/0803.jpg)


    **图 8-3.** *选择版本名称和模型基础*


    ![images](img/0804.jpg)


    **图 8-4.** *包含两个版本的数据模型*


    你可以看到，原始数据模型 `Shapes.xcdatamodel` 是当前版本。在将当前版本从 `Shapes.xcdatamodel` 更改为 `Shapes
    2.xcdatamodel` 之前，请先运行 Shapes 应用并创建几个形状，这样你就有数据可以跨版本迁移。你的数据库中需要有数据，才能测试本章中的数据迁移是否工作正常。


    现在，假设你想向 `Shape` 实体添加一个新的 `name` 属性。如果你编辑当前模型并向 `Shape` 实体添加一个 `name` 属性，你会惊讶地发现应用在启动时崩溃了。这是因为数据存储区中存储的数据与
    Core Data 数据模型不匹配。缓解此问题的一种方法是删除现有的数据存储区。在开发应用时，这可以接受，但如果已经有用户在使用此应用，这样做会招致他们的愤怒。为了获得更流畅的体验，我们强烈建议你对模型进行版本控制，并使用
    Core Data 的迁移功能，通过将数据从旧模型迁移到新模型来保护用户的数据。你对数据模型所做的任何更改都应进入新版本的模型，而不是任何旧版本。对你而言，这意味着你将在
    `Shapes 2` 数据模型的 `Shape` 实体中添加 `name` 属性。


    要做出此更改，请选中 `Shapes 2` 数据模型，然后按正常方式向 `Shape` 实体添加一个类型为 `String` 的 `name` 属性。图 8-5
    展示了包含新版本 Core Data 模型以及已向 `Shape` 实体添加 `name` 属性的 Xcode 窗口。


    ![images](img/0805.jpg)


    **图 8-5.** *包含模型第二个版本的 Xcode 窗口*


    除了添加新属性，你还可以将非可选属性改为可选属性，Core Data 能够处理这种情况。请将以下属性改为可选：


    - `Shape` 实体中的 `color` 属性

    - `Transform` 实体中的 `scale` 属性

    - `Vertex` 实体中的 `index`、`x` 和 `y` 属性


    要将模型的当前版本从 `Shapes` 更改为 `Shapes 2`，请选中 `Shapes.xcdatamodeld`，然后在工具面板中将当前版本设置为
    `Shapes 2`，如图 8-6 所示。


    ![images](img/0806.jpg)


    **图 8-6.** *将当前数据模型版本更新为 Shapes 2*


    此时，你的应用有了一个新的当前版本的数据模型，但它还不能运行。你需要定义一个策略，用于将数据从名为 `Shapes` 的模型版本迁移到名为 `Shapes
    2` 的版本。如果你现在尝试运行该应用，它会崩溃，原因与修改第一个模型时相同：数据存储区与当前模型不匹配。你需要告诉应用如何处理从旧模型切换到新模型。本章的其余部分将讨论实现此目的的多种方法。


    ### 轻量级迁移


    一旦你有了版本化的数据模型，就可以在演化数据模型时利用 Core Data 对迁移的支持。每次创建新的数据模型版本时，用户的应用数据都必须从旧模型迁移到新模型。为了进行迁移，Core
    Data 需要有要遵循的规则，才能知道如何正确地迁移数据。你可以使用所谓的*映射模型*来创建这些规则。Xcode 内置了对创建映射模型的支持。然而，对于某些简单的情况，Core
    Data 拥有足够的智能自行推断出映射规则，无需你创建映射模型。这被称为*轻量级迁移*，这些情况对开发者而言工作量最小。Core Data 完成所有工作并迁移数据。本节将详细介绍轻量级迁移过程，并引导你了解所支持的一系列更改及其实现方法。


    要使迁移符合轻量级迁移的条件，你的更改必须局限在以下狭窄范围内：


    -   添加或删除一个属性（属性或关系）。

    -   将非可选属性改为可选。

    -   将可选属性改为非可选，前提是你提供了默认值。

    -   添加或删除一个实体。

    -   重命名一个属性。

    -   重命名一个实体。


    除了需要你完成的工作更少之外，使用 SQLite 数据存储进行的轻量级迁移，运行速度比其他迁移方式更快，占用的空间也更少。因为 Core Data 可以发出
    SQL 语句来执行这些迁移，所以它无需将所有数据加载到内存中即可进行迁移，也无需将数据从一个存储区移动到另一个存储区。Core Data 只需使用 SQL
    语句就地修改 SQLite 数据库。如果可行，你应该积极尝试将数据模型的更改限制在轻量级迁移支持的范围内。如果不行，本章的其他部分将引导你完成更复杂的迁移。

    '
- fmt: "#### Migrating a Simple Change\n\n在上一节“版本管理”中，你在`Shapes`应用程序中创建了一个名为`Shapes\
    \ 2`的新模型版本，并在`Shapes 2`模型的`Shape`实体中添加了一个名为`name`的新属性。通过该变更执行轻量级迁移的最后一步，是告诉持久化存储协调器两件事：\n\
    \n- 它应该自动迁移模型。\n- 它应该推断映射模型。\n\n你可以通过在持久化存储协调器的`addPersistentStoreWithType:`方法的`options`参数中传递这些指令来实现。首先，像这样设置`options`（一个`NSDictionary`）：\n\
    \n```\nNSDictionary *options = [NSDictionary dictionaryWithObjectsAndKeys:[NSNumber\
    \ numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption, [NSNumber\
    \ numberWithBool:YES], NSInferMappingModelAutomaticallyOption, nil];\n```\n\n\
    这段代码创建了一个包含两个条目的`NSDictionary`实例。\n\n- 一个条目的键为`NSMigratePersistentStoresAutomaticallyOption`，值为`YES`，告知持久化存储协调器自动迁移数据。\n\
    - 另一个条目的键为`NSInferMappingModelAutomaticallyOption`，值为`YES`，告知持久化存储协调器推断映射模型。\n\
    \n然后，在调用`addPersistentStoreWithType:`时，将`options`对象（而非`nil`）传递给`options`参数。打开`ShapesAppDelegate.m`文件，将`persistentStoreCoordinator`方法修改为如下形式：\n\
    \n```\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator {\n  if (__persistentStoreCoordinator\
    \ != nil) {\n    return __persistentStoreCoordinator;\n  }\n\n  NSURL *storeURL\
    \ = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"Shapes.sqlite\"\
    ];\n  NSDictionary *options = [NSDictionary dictionaryWithObjectsAndKeys:[NSNumber\
    \ numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption, [NSNumber\
    \ numberWithBool:YES], NSInferMappingModelAutomaticallyOption, nil];\n\n  NSError\
    \ *error = nil;\n  __persistentStoreCoordinator = [[NSPersistentStoreCoordinator\
    \ alloc] initWithManagedObjectModel:[self managedObjectModel]];\n  if (![__persistentStoreCoordinator\
    \ addPersistentStoreWithType:NSSQLiteStoreType configuration:nil URL:storeURL\
    \ options:options error:&error]) {\n    NSLog(@\"Unresolved error %@, %@\", error,\
    \ [error userInfo]);\n    abort();\n  }    \n  return __persistentStoreCoordinator;\n\
    }\n```\n\n这就是迁移数据所需做的一切。构建并运行应用程序，它不再崩溃，而是显示你创建的所有形状。打开终端并导航到包含`Shapes`应用程序的SQLite文件的目录。与保留数据库文件迁移前后两个版本的较旧iOS版本不同，iOS\
    \ 5仅保留迁移后的版本。你会找到迁移后的文件`Shapes.sqlite`。使用`sqlite3`应用程序打开它，并运行`.schema`命令来查看`ZSHAPE`表的定义。你可以看到`Shapes.sqlite`文件已为`name`属性添加了一列：`ZNAME\
    \ VARCHAR`，如下所示。\n\n```\nsqlite> .schema\n…\nCREATE TABLE ZSHAPE ( Z_PK INTEGER\
    \ PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER, ZRADIUS FLOAT, ZX FLOAT, ZY FLOAT,\
    \ ZNAME VARCHAR, ZCOLOR BLOB );\n…\nsqlite>\n```\n\n#### Migrating More Complex\
    \ Changes\n\n如前所述，轻量级迁移除了添加属性外，还可以处理更多情况。像在“版本管理”一节中那样，创建另一个新版本的模型。Xcode会将此版本命名为`Shapes\
    \ 3`。对模型执行以下操作：\n\n1. 添加一个名为`Ellipse`的实体，该实体具有四个`Float`值：`x`、`y`、`width`和`height`。\n\
    2. 将`Canvas`实体的`transform`关系设为可选。\n\n在Xcode中，将当前模型更改为你刚刚创建的新模型。再次构建并运行`Shapes`应用程序，一切都会正常启动：新的数据模型将应用于SQLite数据存储，数据将适当迁移。当然，椭圆并没有神奇地添加到随机形状组合中，因为你还没有添加任何创建它们的代码，并且你也不必费心去做这件事，因为它不会加深你对模型版本管理和数据迁移的理解。但是，如果你查看数据库的模式，你会看到椭圆的表，如下所示：\n\
    \n```\nCREATE TABLE ZELLIPSE ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT\
    \ INTEGER, ZHEIGHT FLOAT, ZWIDTH FLOAT, ZX FLOAT, ZY FLOAT );\n```"
  raw: '#### Migrating a Simple Change


    In the previous section called “Versioning” you created a new model version in
    the Shapes application called `Shapes 2`, and you added a new attribute called
    `name` to the `Shape` entity in the `Shapes 2` model. The final step to performing
    a lightweight migration with that change is to tell the persistent store coordinator
    two things:


    *   It should migrate the model automatically.

    *   It should infer the mapping model.


    You do that by passing those instructions in the `options` parameter of the persistent
    store coordinator''s `addPersistentStoreWithType:` method. You first set up `options`,
    an `NSDictionary`, like this:


    `NSDictionary *options = [NSDictionary dictionaryWithObjectsAndKeys:[NSNumber`![images](images/U002.jpg)

    `numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption, [NSNumber`![images](images/U002.jpg)

    `numberWithBool:YES], NSInferMappingModelAutomaticallyOption, nil];`


    This code creates an instance of `NSDictionary` with two entries.


    *   One with the key of `NSMigratePersistentStoresAutomaticallyOption`, value
    of `YES`, which tells the persistent store coordinator to automatically migrate
    the data.

    *   One with the key of `NSInferMappingModelAutomaticallyOption`, value of `YES`,
    which tells the persistent store coordinator to infer the mapping model.


    You then pass this `options` object, instead of `nil`, for the `options` parameter
    in the call to `addPersistentStoreWithType:`. Open the `ShapesAppDelegate.m` file
    and change the `persistentStoreCoordinator` method to look like this:


    `- (NSPersistentStoreCoordinator *)persistentStoreCoordinator {`

    `  if (__persistentStoreCoordinator != nil) {`

    `    return __persistentStoreCoordinator;`

    `  }`


    `  NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@"Shapes.sqlite"];`

    **`NSDictionary *options = [NSDictionary dictionaryWithObjectsAndKeys:[NSNumber`**

    **`numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption, [NSNumber`**

    **`numberWithBool:YES], NSInferMappingModelAutomaticallyOption, nil];`**


    `  NSError *error = nil;`

    `  __persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self
    managedObjectModel]];`

    `  if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType
    configuration:nil URL:storeURL options:options error:&error]) {`

    `    NSLog(@"Unresolved error %@, %@", error, [error userInfo]);`

    `    abort();`

    `  }    `

    `  return __persistentStoreCoordinator;`

    `}`


    That''s all you have to do to migrate the data. Build and run the application,
    which no longer crashes but instead shows all the shapes you''ve created. Open
    a Terminal and navigate to the directory that contains the SQLite file for the
    Shapes application. Unlike older versions of iOS, which kept both the pre-migration
    and the post-migration versions of the database file, iOS 5 keeps only the post-migration
    version. You''ll find the post-migration file, `Shapes.sqlite`. Open it using
    the `sqlite3` application and run the `.schema` command to see the definition
    for the `ZSHAPE` table. You can see that the `Shapes.sqlite` file has added a
    column for the `name` attribute: `ZNAME VARCHAR`, as shown below.


    `sqlite> .schema`

    `…`

    `CREATE TABLE ZSHAPE ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER,
    ZRADIUS FLOAT, ZX FLOAT, ZY FLOAT, ZNAME VARCHAR, ZCOLOR BLOB );`

    `…`

    `sqlite>`


    #### Migrating More Complex Changes


    As claimed earlier, lightweight migrations handle a few more cases other than
    adding an attribute. Create another new version of the model as you did in the
    “Versioning” section. Xcode will call this version `Shapes 3`. Do the following
    to the model:


    1.  Add an entity called `Ellipse` that has four `Float` values: `x`, `y`, `width`,
    and `height`.

    2.  Make the `transform` relationship of the `Canvas` entity optional.


    In Xcode, change the current model to use the new one you just created. Once again,
    build and run the Shapes application, and everything will start fine: the new
    data model will be applied to the SQLite data store, and the data will migrate
    appropriately. Of course, ellipses haven''t magically been added to the random
    shape mix because you haven''t added any code to create them, and you won''t bother
    doing that because it doesn''t further your understanding of model versioning
    and data migration, but if you look at the schema for your database, you''ll see
    the table for ellipses, like so:


    `CREATE TABLE ZELLIPSE ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER,
    ZHEIGHT FLOAT, ZWIDTH FLOAT, ZX FLOAT, ZY FLOAT );`'
  trans: "\n#### 迁移简单变更\n\n在上一节“版本管理”中，你在`Shapes`应用程序中创建了一个名为`Shapes 2`的新模型版本，并在`Shapes\
    \ 2`模型的`Shape`实体中添加了一个名为`name`的新属性。通过该变更执行轻量级迁移的最后一步，是告诉持久化存储协调器两件事：\n\n- 它应该自动迁移模型。\n\
    - 它应该推断映射模型。\n\n你可以通过在持久化存储协调器的`addPersistentStoreWithType:`方法的`options`参数中传递这些指令来实现。首先，像这样设置`options`（一个`NSDictionary`）：\n\
    \n```\nNSDictionary *options = [NSDictionary dictionaryWithObjectsAndKeys:[NSNumber\
    \ numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption, [NSNumber\
    \ numberWithBool:YES], NSInferMappingModelAutomaticallyOption, nil];\n```\n\n\
    这段代码创建了一个包含两个条目的`NSDictionary`实例。\n\n- 一个条目的键为`NSMigratePersistentStoresAutomaticallyOption`，值为`YES`，告知持久化存储协调器自动迁移数据。\n\
    - 另一个条目的键为`NSInferMappingModelAutomaticallyOption`，值为`YES`，告知持久化存储协调器推断映射模型。\n\
    \n然后，在调用`addPersistentStoreWithType:`时，将`options`对象（而非`nil`）传递给`options`参数。打开`ShapesAppDelegate.m`文件，将`persistentStoreCoordinator`方法修改为如下形式：\n\
    \n```\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator {\n  if (__persistentStoreCoordinator\
    \ != nil) {\n    return __persistentStoreCoordinator;\n  }\n\n  NSURL *storeURL\
    \ = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"Shapes.sqlite\"\
    ];\n  NSDictionary *options = [NSDictionary dictionaryWithObjectsAndKeys:[NSNumber\
    \ numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption, [NSNumber\
    \ numberWithBool:YES], NSInferMappingModelAutomaticallyOption, nil];\n\n  NSError\
    \ *error = nil;\n  __persistentStoreCoordinator = [[NSPersistentStoreCoordinator\
    \ alloc] initWithManagedObjectModel:[self managedObjectModel]];\n  if (![__persistentStoreCoordinator\
    \ addPersistentStoreWithType:NSSQLiteStoreType configuration:nil URL:storeURL\
    \ options:options error:&error]) {\n    NSLog(@\"Unresolved error %@, %@\", error,\
    \ [error userInfo]);\n    abort();\n  }    \n  return __persistentStoreCoordinator;\n\
    }\n```\n\n这就是迁移数据所需做的一切。构建并运行应用程序，它不再崩溃，而是显示你创建的所有形状。打开终端并导航到包含`Shapes`应用程序的 SQLite\
    \ 文件的目录。与保留数据库文件迁移前后两个版本的较旧 iOS 版本不同，iOS 5 仅保留迁移后的版本。你会找到迁移后的文件`Shapes.sqlite`。使用`sqlite3`应用程序打开它，并运行`.schema`命令来查看`ZSHAPE`表的定义。你可以看到`Shapes.sqlite`文件已为`name`属性添加了一列：`ZNAME\
    \ VARCHAR`，如下所示。\n\n```\nsqlite> .schema\n…\nCREATE TABLE ZSHAPE ( Z_PK INTEGER\
    \ PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER, ZRADIUS FLOAT, ZX FLOAT, ZY FLOAT,\
    \ ZNAME VARCHAR, ZCOLOR BLOB );\n…\nsqlite>\n```\n\n#### 迁移更复杂的变更\n\n如前所述，轻量级迁移除了添加属性外，还可以处理更多情况。像在“版本管理”一节中那样，创建另一个新版本的模型。Xcode\
    \ 会将此版本命名为`Shapes 3`。对模型执行以下操作：\n\n1. 添加一个名为`Ellipse`的实体，该实体具有四个`Float`值：`x`、`y`、`width`和`height`。\n\
    2. 将`Canvas`实体的`transform`关系设为可选。\n\n在 Xcode 中，将当前模型更改为你刚刚创建的新模型。再次构建并运行`Shapes`应用程序，一切都会正常启动：新的数据模型将应用于\
    \ SQLite 数据存储，数据将适当迁移。当然，椭圆并没有神奇地添加到随机形状组合中，因为你还没有添加任何创建它们的代码，并且你也不必费心去做这件事，因为它不会加深你对模型版本管理和数据迁移的理解。但是，如果你查看数据库的模式，你会看到椭圆的表，如下所示：\n\
    \n```\nCREATE TABLE ZELLIPSE ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT\
    \ INTEGER, ZHEIGHT FLOAT, ZWIDTH FLOAT, ZX FLOAT, ZY FLOAT );\n```\n"
- fmt: '# Renaming Entities and Properties


    Lightweight migrations also support renaming entities and properties but require
    a little more effort from you. In addition to changing your model, you must specify
    the old name for the item whose name you changed. You can do this in one of two
    ways:


    - In the Xcode data modeler

    - In code


    The Xcode data modeler is the simpler option. When you select an entity or property
    in the Xcode data modeler, general information about that entity or property shows
    in the Utilities panel to the right. With the Utilities panel displayed, open
    the Data Model inspector, and then the Versioning section. In the Renaming ID
    field, enter the old name of whatever you''ve changed (see [Figure 8–7](#Chapter08.html#fig_8_7)).


    ![images](images/0807.jpg)


    **Figure 8–7.** *The Versioning section with the Renaming Identifier field*


    If you insist on specifying the old name in code (or if you''re still running
    under Leopard and have no field for Renaming ID), you''d make a call to the `setRenamingIdentifier:`
    method of `NSEntityDescription` or `NSPropertyDescription`, depending on what
    you''ve renamed, passing the old name for the entity or property. You do this
    after the model has loaded but before the call to open the persistent store (`addPersistentStoreWithType:`).
    If, for example, you want to change the name of the `Vertex` entity to `Point`,
    you''d add this code before the call to `addPersistentStoreWithType:`


    ```

    NSEntityDescription *point = [[managedObjectModel entitiesByName] objectForKey:@"Point"];

    [point setRenamingIdentifier:@"Vertex"];

    ```


    Core Data takes care of migrating the data, but you still have the responsibility
    to update any code in your application that depends on the old name.


    To see this in practice, create a new version of your data model and set it as
    the current version. You should now be on version 4 (`Shapes 4`). In this version
    of the model, you''ll rename the `Vertex` entity to `Point`. Go to your new model
    file, `Shapes 4.xcdatamodel`, and rename the `Vertex` entity to `Point`. Then,
    go to the Versioning section in the Data Model inspector tab, and type the old
    name, `Vertex`, into the Renaming ID field so that Core Data will know how to
    migrate the existing data (as [Figure 8–8](#Chapter08.html#fig_8_8) shows), and
    save this model.


    ![images](images/0808.jpg)


    **Figure 8–8.** *Renaming Vertex to Point and specifying the Renaming ID*


    Wait! Before running the application, remember that you''re responsible for changing
    any code that relies on the old name, `Vertex`. You could change the custom managed
    object class name from `Vertex` to `Point`, change the relationship name in the
    `Polygon` entity from `vertices` to `points`, and change any variable names appropriately.
    Let''s keep it simple here and change the one place the Shapes application refers
    to the `Vertex` entity name. You find it in `Polygon.m` in the call to `[NSEntityDescription
    insertNewObjectForEntityForName:]`. It currently reads as follows:


    ```

    Vertex *vertex = [NSEntityDescription insertNewObjectForEntityForName:@"Vertex"

    inManagedObjectContext:context];

    ```


    Change the entity name passed to the method from `Vertex` to `Point` so the line
    reads like this:


    ```

    Vertex *vertex = [NSEntityDescription insertNewObjectForEntityForName:@"Point"

    inManagedObjectContext:context];

    ```


    You can now build and run the Shapes application; all existing shapes, including
    polygons, should appear. You can open the SQLite database and confirm that the
    schema now has a `ZPOINT` table


    ```

    CREATE TABLE ZPOINT ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER,
    ZINDEX INTEGER, ZPOLYGON INTEGER, ZX FLOAT, ZY FLOAT );

    ```


    and no `ZVERTEX` table.


    As you''ve seen, lightweight migrations are nearly effortless, at least for you.
    Core Data handles the difficult work of figuring out how to map and migrate the
    data from the old model to new. However, if your model changes don''t fit within
    what lightweight migrations can handle, you must specify your own mapping model.


    ## Creating a Mapping Model


    When your data model changes exceed Core Data''s ability to infer how to map data
    from the old model to the new, you can''t use a lightweight migration to automatically
    migrate your data. Instead, you have to create what''s called a *mapping model*
    to tell Core Data how to execute the migration. This section walks you through
    the steps involved in creating a mapping model for your migration. A mapping model
    is roughly analogous to a data model—whereas a data model contains entities and
    properties, a mapping model, which is of type `NSMappingModel`, has entity mappings
    (of type `NSEntityMapping`) and property mappings (of type `NSPropertyMapping`).
    The entity mappings do just what you''d expect them to do: they map a source entity
    to a target entity. The property mappings, as well, do what you''d think: map
    source properties to target properties. The mapping model uses these mappings,
    along with their associated types and policies, to perform the migration.


    **NOTE:** Apple''s documentation and code use the terms *destination* and *target*
    interchangeably to refer to the new data model. In this chapter, we follow suit
    and use both *destination* and *target* interchangeably.


    In a typical data migration, most entities and properties haven''t changed from
    the old version to the new. For these cases, the entity mappings simply copy each
    entity from the source model to the target model. When you create a mapping model,
    you''ll notice that Xcode generates these entity mappings, along with anything
    else it can infer from your model changes, and stores these mappings in the mapping
    model. These mappings represent how Core Data would have migrated your data in
    a lightweight migration. You have to create new mappings, or adjust the mappings
    Xcode generates, to change how your data migrates.'
