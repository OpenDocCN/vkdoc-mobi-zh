    ```\n\n你遇到的问题在于，John 有两名员工：Jane（26 岁）和 Tim（22 岁）。Jane 符合年龄条件，而 Tim 符合名字首字母条件。问题在于你希望\
    \ `ANY` 修饰符同时封装两个条件，而不是一个条件对应一个 `ANY` 修饰符。这个反面示例说明了为什么子查询更适合解决此类问题。以下 `readData:`\
    \ 的实现展示了如何使用复合谓词进行子查询：\n\n```\n- (void)readData\n{\n  NSManagedObjectContext *context\
    \ = [self managedObjectContext];  \n  NSEntityDescription *entity = [NSEntityDescription\
    \ entityForName:@\"Person\"\ninManagedObjectContext:context];\n\n  NSFetchRequest\
    \ *fetchRequest = [[NSFetchRequest alloc] init];\n  [fetchRequest setEntity:entity];\n\
    \n  NSPredicate *predicate = [NSPredicate predicateWithFormat:@\"(SUBQUERY(employees,\
    \ $x, $x.age == %d and $x.name BEGINSWITH %@).@count > 0)\", 26, @\"T\"];\n  [fetchRequest\
    \ setPredicate:predicate];\n\n  NSArray *persons = [context executeFetchRequest:fetchRequest\
    \ error:nil];\n\n  for (NSManagedObject *person in persons)\n  {\n    NSLog(@\"\
    name=%@ age=%@\", [person valueForKey:@\"name\"], [person valueForKey:@\"age\"\
    ]);\n  }\n}\n```\n\n这次，它产生了正确的输出。\n\n```\nname=Mary age=36\n```\n\n### 聚合（Aggregating）\n\
    \n当我们想到数据聚合时，我们想到的是对集合进行全局统计。上一个示例就是这种情况，你希望知道子查询返回的集合中有多少个元素。集合运算符是键值编码（Key-Value\
    \ Coding）范式的一部分。它们可以嵌入在键路径中，以表示应执行聚合操作。图 6–3 展示了集合运算符的通用语法。\n\n![图片](img/0603.jpg)\n\
    \n**图 6–3.** *集合运算符的语法*\n\n你目前无法定义自己的自定义运算符，但最常用的运算符已默认可用，如表 6–6 所示。\n\n![图片](img/t0606.jpg)\n\
    \n让我们来尝试这些运算符。回到你的测试数据；这次你要返回所有直接下属平均年龄为 24 岁的经理。你的查询结果应该只包含 John，因为 Jane 是 26\
    \ 岁，Tim 是 22 岁。使用 `avg` 运算符，谓词出乎意料地简单。\n\n```\n\"employees.@avg.age = 24\"\n```\n\
    \n将 `readData:` 方法替换为以下实现：\n\n```\n- (void)readData\n{\n  NSManagedObjectContext\
    \ *context = [self managedObjectContext];  \n  NSEntityDescription *entity = [NSEntityDescription\
    \ entityForName:@\"Person\"\ninManagedObjectContext:context];\n\n  NSFetchRequest\
    \ *fetchRequest = [[NSFetchRequest alloc] init];\n  [fetchRequest setEntity:entity];\n\
    \n  NSPredicate *predicate = [NSPredicate predicateWithFormat:@\"employees.@avg.age\
    \ = %d\", 24];\n  [fetchRequest setPredicate:predicate];\n\n  NSArray *persons\
    \ = [context executeFetchRequest:fetchRequest error:nil];\n\n  for (NSManagedObject\
    \ *person in persons)\n  {\n    NSLog(@\"name=%@ age=%@\", [person valueForKey:@\"\
    name\"], [person valueForKey:@\"age\"]);\n  }\n}\n```\n\n运行这段代码会返回 John，正如预期。\n\
    \n其他运算符的工作方式相同。例如，要找出所有最年轻直接下属为 22 岁的经理，使用 `min` 运算符并构建如下谓词：\n\n```\nNSPredicate\
    \ *predicate = [NSPredicate predicateWithFormat:@\"employees.@min.age = %d\",\
    \ 22];\n```\n\n该谓词返回 John（他有 Tim，22 岁）和 Tim（他有 Jill，22 岁）。\n\n```\nname=John age=32\n\
    name=Tim age=22\n```\n\n一个行为略有不同的运算符是 `count` 运算符，它不接受参数属性。例如，要找出所有恰好有一个直接下属的经理，使用以下谓词：\n\
    \n```\nNSPredicate *predicate = [NSPredicate predicateWithFormat:@\"employees.@count\
    \ = %d\", 1];\n```\n\n这只会提取 Mary，因为她只有一名员工 Tom 向她汇报，如控制台所示。\n\n```\nname=Mary\
    \ age=36\n```\n\n### 排序（Sorting）\n\n排序是基于某些条件对结果数据集进行排序的操作。假设你想找出所有其经理姓名包含字母 *M*\
    \ 的人，但你想按年龄对结果集进行排序。\n\n#### 返回未排序的数据\n\n使用上一节中设置的数据集，你的查询应返回 Mary 的员工（Tom）和 Tim\
    \ 的员工（Kate、Jim 和 Jill）。对于此类示例，`readData:` 方法如下所示：\n\n```\n- (void)readData\n{\n\
    \  NSManagedObjectContext *context = [self managedObjectContext];  \n  NSEntityDescription\
    \ *entity = [NSEntityDescription entityForName:@\"Person\"\ninManagedObjectContext:context];\n\
    \n  NSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];\n  [fetchRequest\
    \ setEntity:entity];\n\n  NSPredicate *predicate = [NSPredicate predicateWithFormat:@\"\
    manager.name CONTAINS[c] %@\", @\"m\"];\n  [fetchRequest setPredicate:predicate];\n\
    \n  NSArray *persons = [context executeFetchRequest:fetchRequest error:nil];\n\
    \n  for (NSManagedObject *person in persons)\n  {\n    NSLog(@\"name=%@ age=%@\"\
    , [person valueForKey:@\"name\"], [person valueForKey:@\"age\"]);\n  }\n}\n```\n\
    \n用上面列出的代码替换现有的 `readData:` 方法，然后重新运行应用程序。在 Xcode 的控制台中，你应该会看到以下输出（每行前面的日期、时间和应用程序信息已删除），对象没有特定顺序：\n\
    \n```\nname=Jill age=22\nname=Jim age=40\nname=Kate age=40\nname=Tom age=26\n\
    ```\n"
- fmt: "#### Sorting Data on One Criterion\n\nIn many cases, especially when dealing\
    \ with user interfaces, sorting the data provides value, whether to make it more\
    \ visually appealing or to make data easier to find. This is where `NSSortDescriptor`\
    \ comes into play. Using this class, you can specify sort orders in a manner similar\
    \ to what you would do in SQL using the `ORDER BY` keyword. If you wanted your\
    \ result sorted by age, alter the `readData:` method to include a sort descriptor,\
    \ like so:\n\n```\n- (void)readData\n{\n  NSManagedObjectContext *context = [self\
    \ managedObjectContext];  \n  NSEntityDescription *entity = [NSEntityDescription\
    \ entityForName:@\"Person\" inManagedObjectContext:context];\n\n  NSFetchRequest\
    \ *fetchRequest = [[NSFetchRequest alloc] init];\n  [fetchRequest setEntity:entity];\n\
    \n  NSPredicate *predicate = [NSPredicate predicateWithFormat:@\"manager.name\
    \ CONTAINS[c] %@\", @\"m\"];\n  [fetchRequest setPredicate:predicate];\n\n  NSSortDescriptor\
    \ *sortDescriptorByAge = [[NSSortDescriptor alloc] initWithKey:@\"age\" ascending:YES];\n\
    \  NSArray *sortDescriptors = [[NSArray alloc] initWithObjects:sortDescriptorByAge,\
    \ nil];\n  [fetchRequest setSortDescriptors:sortDescriptors];\n\n  NSArray *persons\
    \ = [context executeFetchRequest:fetchRequest error:nil];\n\n  for (NSManagedObject\
    \ *person in persons)\n  {\n    NSLog(@\"name=%@ age=%@\", [person valueForKey:@\"\
    name\"], [person valueForKey:@\"age\"]);\n  }\n}\n```\n\nAgain, replace the `readData:`\
    \ method in `OrgChartAppDelegate.m` with the code listed earlier and run the application.\
    \ This time, the output comes back sorted by age. Note that Jim and Kate have\
    \ the same age, 40, so your output could have them reversed. Either way, your\
    \ output should look similar to this:\n\n```\nname=Jill age=22\nname=Tom age=26\n\
    name=Kate age=40\nname=Jim age=40\n```\n\nJust like some expressions in a predicate,\
    \ sort descriptors also rely on key paths to specify the property to use when\
    \ sorting. The second attribute of the `initWithKey:ascending:` method specifies\
    \ whether the order should be ascending or descending. Changing this value has\
    \ the effect of reversing the order.\n\n#### Sorting on Multiple Criteria\n\n\
    You can also add additional sorting criteria to obtain a multilevel sort. For\
    \ example, you might want to sort the data by age, and if multiple ages are the\
    \ same, use a complementary sort order such as alphabetically arranging the names.\
    \ This would remove the arbitrary return order of Jim and Kate in the previous\
    \ example. You may have noticed that the `setSortDescriptors:` expects an array\
    \ of sort descriptors. Adding a secondary sort level is simply a matter of adding\
    \ another sort descriptor to the array, like so:\n\n```\n- (void)readData\n{\n\
    \  NSManagedObjectContext *context = [self managedObjectContext];  \n  NSEntityDescription\
    \ *entity = [NSEntityDescription entityForName:@\"Person\" inManagedObjectContext:context];\n\
    \n  NSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];\n  [fetchRequest\
    \ setEntity:entity];\n\n  NSPredicate *predicate = [NSPredicate predicateWithFormat:@\"\
    manager.name CONTAINS[c] %@\", @\"m\"];\n  [fetchRequest setPredicate:predicate];\n\
    \n  NSSortDescriptor *sortDescriptorByAge = [[NSSortDescriptor alloc] initWithKey:@\"\
    age\" ascending:YES];\n  NSSortDescriptor *sortDescriptorByName = [[NSSortDescriptor\
    \ alloc] initWithKey:@\"name\" ascending:YES];\n  NSArray *sortDescriptors = [[NSArray\
    \ alloc] initWithObjects:sortDescriptorByAge, sortDescriptorByName, nil];\n  [fetchRequest\
    \ setSortDescriptors:sortDescriptors];\n\n  NSArray *persons = [context executeFetchRequest:fetchRequest\
    \ error:nil];\n\n  for (NSManagedObject *person in persons)\n  {\n    NSLog(@\"\
    name=%@ age=%@\", [person valueForKey:@\"name\"], [person valueForKey:@\"age\"\
    ]);\n  }\n}\n```\n\nSince Kate and Jim have the same age but Kate comes after\
    \ Jim in alphabetical order, the output changes from an arbitrary order to a deterministic\
    \ one.\n\n```\nname=Jill age=22\nname=Tom age=26\nname=Jim age=40\nname=Kate age=40\n\
    ```\n\nYou can verify that you control the order of Jim's and Kate's names by\
    \ changing the `sortDescriptorByName` instance to sort descending by passing `NO`\
    \ to the `ascending:` parameter, like this:\n\n```\nNSSortDescriptor *sortDescriptorByName\
    \ = [[NSSortDescriptor alloc] initWithKey:@\"name\" ascending:NO];\n```\n\nThe\
    \ resulting output confirms that Kate now comes before Jim:\n\n```\nname=Jill\
    \ age=22\nname=Tom age=26\nname=Kate age=40\nname=Jim age=40\n```\n\n### Summary\n\
    \nDumping an entire data set on someone overwhelms them and prevents them from\
    \ finding what they're looking for. AutoTrader.com recognizes this and uses its\
    \ ability to filter results as a marketing ploy to attract customers. You should\
    \ recognize this, too, as you build Core Data applications. Use the information\
    \ presented in this chapter to sort, filter, and aggregate results so that you\
    \ can narrow your data into what users seek.\n\n## Chapter 7: Tuning Performance\
    \ and Memory Usage\n\nLately, people have grown to hate hourglasses, spinning\
    \ beach balls, and “Please Wait” pop-ups. Although giving a visual clue that the\
    \ computer is working beats giving no such clue and letting customers think their\
    \ computers have locked up, better still would be to never have episodes of slowness\
    \ that make users wait. You may not always be able to achieve that goal, but you\
    \ should always try.\n\nFetching and storing data in a persistent store can take\
    \ a long time, especially when mounds of data are involved. This chapter assures\
    \ that you understand how Core Data helps you—and how you must help yourself—to\
    \ make sure you don’t pepper your users with “Please Wait” spinners or, worse,\
    \ an unresponsive application that appears locked up while it retrieves or saves\
    \ large object graphs. You will learn how to utilize the various tools and strategies,\
    \ such as caching, faulting, and the Instruments application that comes with Xcode.\n\
    \n### Building the Application for Testing\n\nYou need a way to complete performance\
    \ testing so that you can verify results. This section walks you through building\
    \ an application that will allow you to run various tests and see the results.\
    \ The application, shown in Figure 7–1, presents a list of tests you can run in\
    \ a standard picker view. To run a test, select it in the picker, click the Run\
    \ Selected Test button, and wait for the results. After the test runs, you’ll\
    \ see the start time, the stop time, the number of elapsed seconds for the test,\
    \ and some text describing the results of the test.\n\n![images](images/0701.jpg)\n\
    \n**Figure 7–1.** *The performance-tuning application*"
