    \n  // 添加密码列表标签页\n  PasswordListViewController *passwordListViewController = [[PasswordListViewController\
    \ alloc] initWithStyle:UITableViewStylePlain];\n  UINavigationController *navPasswordList\
    \ = [[UINavigationController alloc] initWithRootViewController:passwordListViewController];\n\
    \n  [self.tabBarController setViewControllers:[NSArray arrayWithObjects:navNoteList,\
