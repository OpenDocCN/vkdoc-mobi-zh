  trans: "\n### 构建用户界面\n\n数据模型完成后，`League Manager` 现在需要代码来显示数据。`Xcode` 生成了显示球队列表所需的大部分代码；接下来的任务是调整代码，因为生成的代码是为显示\
    \ `Event` 实体准备的，而 `Event` 实体在数据模型中已不存在。这些代码位于 `MasterViewController.h` 和 `MasterViewController.m`\
    \ 中，因此首先打开 `MasterViewController.h` 文件。注意，它有两个成员：一个 `NSManagedObjectContext` 实例和一个\
    \ `NSFetchedResultsController` 实例。你可以将 `NSManagedObjectContext` 实例（即你认识的应用对象上下文）移动到应用的委托（`League_ManagerAppDelegate`）中，但在这个简单的应用中，我们暂且将其保留在此处。`NSFetchedResultsController`\
    \ 实例与表格视图协同工作以显示你的球队。\n\n你需要一个添加球队的方法，因此在 `MasterViewController.h` 中声明一个名为 `insertTeamWithName:`\
    \ 的方法。此外，生成的代码在几个地方保存了上下文，因此遵循“不要重复自己（DRY）”原则，将其全部移到一个名为 `saveContext:` 的方法中。`MasterViewController.h`\
    \ 的代码现在如下所示，新方法声明以粗体显示：\n\n```objc\n#import <UIKit/UIKit.h>\n#import <CoreData/CoreData.h>\n\
    \n@interface MasterViewController : UITableViewController <NSFetchedResultsControllerDelegate>\n\
    \n@property (strong, nonatomic) NSFetchedResultsController *fetchedResultsController;\n\
    @property (strong, nonatomic) NSManagedObjectContext *managedObjectContext;\n\n\
    - (void)insertTeamWithName:(NSString *)name uniformColor:(NSString *)uniformColor;\n\
    - (void)saveContext;\n\n@end\n```\n\n打开 `MasterViewController.m` 文件，在 `initWithNibName:bundle:`\
    \ 方法中调整视图标题，该方法为应用设置了标题。该行代码如下所示：\n\n```objc\nself.title = NSLocalizedString(@\"\
    League Manager\", @\"League Manager\");\n```\n\n现在在 `MasterViewController.m` 中定义\
    \ `insertTeamWithName:` 方法。该方法如下所示：\n\n```objc\n- (void)insertTeamWithName:(NSString\
    \ *)name uniformColor:(NSString *)uniformColor {\n    // 创建由获取结果控制器管理的实体新实例。\n\
    \    NSManagedObjectContext *context = [self.fetchedResultsController managedObjectContext];\n\
    \    NSEntityDescription *entity = [[self.fetchedResultsController fetchRequest]\
    \ entity];\n    NSManagedObject *newManagedObject = [NSEntityDescription\ninsertNewObjectForEntityForName:[entity\
    \ name] inManagedObjectContext:context];\n\n    // 配置新球队\n    [newManagedObject\
    \ setValue:name forKey:@\"name\"];\n    [newManagedObject setValue:uniformColor\
    \ forKey:@\"uniformColor\"];\n\n    // 保存上下文\n    [self saveContext];\n}\n```\n\
    \n这段代码从应用的 `fetchedResultsController` 中获取托管对象上下文，然后在该托管对象上下文中插入一个新的 `NSManagedObject`\
    \ 实例。注意，它并未指定要插入的新实体名为 `Team`。该名称在 `fetchedResultsController` 的访问器中定义。生成的代码使用了名称\
    \ `Event`，因此找到 `fetchedResultsController` 中如下所示的一行：\n\n```objc\nNSEntityDescription\
    \ *entity = [NSEntityDescription entityForName:@\"Event\"\ninManagedObjectContext:self.managedObjectContext];\n\
    ```\n\n并将其更改为：\n\n```objc\nNSEntityDescription *entity = [NSEntityDescription\
    \ entityForName:@\"Team\"\ninManagedObjectContext:self.managedObjectContext];\n\
    ```\n\n此外，你还会注意到 `fetchedResultsController` 方法中生成的模型残留：对名为 `timeStamp` 属性的引用，该属性用于对获取的结果进行排序（第\
    \ 6 章讨论了排序及其工作原理）。将其改为按球队名称升序排序，因此这一行：\n\n```objc\nNSSortDescriptor *sortDescriptor\
    \ = [[NSSortDescriptor alloc] initWithKey:@\"timeStamp\"\nascending:NO];\n```\n\
    \n现在看起来像这样：\n\n```objc\nNSSortDescriptor *sortDescriptor = [[NSSortDescriptor\
    \ alloc] initWithKey:@\"name\"\nascending:YES];\n```\n\n在创建了代表新球队的托管对象后，`insertTeamWithName:`\
    \ 方法中的代码使用传入的参数设置其名称和队服颜色：\n\n```objc\n[newManagedObject setValue:name forKey:@\"\
    name\"];\n[newManagedObject setValue:uniformColor forKey:@\"uniformColor\"];\n\
    ```\n\n最后，`insertTeamWithName:` 方法通过调用你声明但尚未定义的 `saveContext:` 方法来保存对象图（包括新球队）。你可以通过从\
    \ `Xcode` 生成的现已多余的 `insertNewObject:` 方法中剪切并粘贴那段代码来定义它。剪切该代码段后，删除 `insertNewObject:`\
    \ 方法，并按如下方式定义 `saveContext:`：\n\n```objc\n- (void)saveContext {\n    NSManagedObjectContext\
    \ *context = [self.fetchedResultsController\nmanagedObjectContext];\n    NSError\
    \ *error = nil;\n    if (![context save:&error]) {\n        /*\n         替换此实现，以合适的方式处理错误。\n\
    \n         abort() 会导致应用生成崩溃日志并终止。你绝不应在发布的应用中使用此函数，\n尽管它在开发过程中可能有用。如果无法从错误中恢复，请显示一个提示用户按\
    \ Home 键退出应用的警告面板。\n         */\n        NSLog(@\"Unresolved error %@, %@\", error,\
    \ [error userInfo]);\n        abort();\n    }\n}\n```\n\n保留生成的注释，以提醒你调用 `abort`\
    \ 是一种非常不友好的错误处理方式。第 10 章讨论了合适的错误处理方式。既然你现在有了一个可重用的方法来保存上下文，请将 `commitEditingStyle:`\
    \ 方法中的那段代码替换为对新的 `saveContext:` 方法的调用。\n"
- fmt: "### Configuring the Table\n\nThe table cells are still configured to show\
    \ `Event` entities instead of `Team` entities. You want to show two pieces of\
    \ information for a team in each table cell: the team's name and its uniform color.\
    \ To accomplish this, first change the style of the cells created, as well as\
    \ the `CellIdentifier` used, in the `cellForRowAtIndexPath:` method. Change this\
    \ line:\n\n```\nstatic NSString *CellIdentifier = @\"Cell\";\n```\n\nto this:\n\
    \n```\nstatic NSString *CellIdentifier = @\"TeamCell\";\n```\n\nand change the\
    \ created table cells from style `UITableViewCellStyleDefault` to style `UITableViewCellStyleValue1`\
    \ so that this line:\n\n```\ncell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\n\
    reuseIdentifier:CellIdentifier];\n```\n\nlooks like this:\n\n```\ncell = [[UITableViewCell\
    \ alloc] initWithStyle:UITableViewCellStyleValue1\nreuseIdentifier:CellIdentifier];\n\
    ```\n\nThe generated code has created a method called `configureCell:atIndexPath:`\
    \ that's responsible for, well, configuring the cell. Change that method from\
    \ configuring for `Event` entities to configuring for `Team` entities. You also\
    \ want to be able to drill down from the team to see its players, so you add a\
    \ detail disclosure button to each cell. The generated method looks like this:\n\
    \n```\n- (void)configureCell:(UITableViewCell *)cell atIndexPath:(NSIndexPath\
    \ *)indexPath {\n    NSManagedObject *managedObject = [self.fetchedResultsController\n\
    \        objectAtIndexPath:indexPath];\n    cell.textLabel.text = [[managedObject\
    \ valueForKey:@\"timeStamp\"] description];\n}\n```\n\nChange it to look like\
    \ this:\n\n```\n- (void)configureCell:(UITableViewCell *)cell atIndexPath:(NSIndexPath\
    \ *)indexPath {\n    NSManagedObject *managedObject = [self.fetchedResultsController\n\
    \        objectAtIndexPath:indexPath];\n    cell.textLabel.text = [[managedObject\
    \ valueForKey:@\"name\"] description];\n    cell.detailTextLabel.text = [[managedObject\
    \ valueForKey:@\"uniformColor\"] description];\n    cell.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;\n\
