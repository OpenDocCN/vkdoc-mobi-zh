    set it yourself.


    If you want to support undoing actions in your iOS application, you typically
    create the undo manager when you set up your managed object context, which usually
    happens in the getter for the managed object context. The Shapes application,
    for example, sets up the managed object context in the application delegate, as
    shown here. Note the code in bold, which adds an undo manager to the managed object
    context.


