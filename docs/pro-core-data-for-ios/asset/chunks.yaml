- fmt: "#### Using the Custom Store\n\nThe last step required to use the custom store\
    \ with the League Manager application is to register it and use it when initializing\
    \ the persistent store coordinator. This is all done in the application delegate\
    \ (`League_ManagerAppDelegate.m`). First, add an import at the top of the class\
    \ so that the implementation is aware of the `CustomStore` class.\n\n```\n#import\
    \ \"CustomStore.h\"\n```\n\nModify the `application:didFinishLaunchingWithOptions:`\
    \ method to register the custom store when the application awakes.\n\n```\n- (BOOL)application:(UIApplication\
    \ *)application\ndidFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n\
    {\n    [NSPersistentStoreCoordinator registerStoreClass:[CustomStore class]\n\
    \                                     forStoreType:@\"CustomStore\"];\n    NSLog(@\"\
    Registered types:  %@\", [NSPersistentStoreCoordinator registeredStoreTypes]);\n\
    \n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n\
    \    // Override point for customization after application launch.\n\n    MasterViewController\
    \ *controller = [[MasterViewController alloc] initWithNibName:@\"MasterViewController\"\
    \ bundle:nil];\n    self.navigationController = [[UINavigationController alloc]\
    \ initWithRootViewController:controller];\n    self.window.rootViewController\
    \ = self.navigationController;\n    [self.window makeKeyAndVisible];\n    return\
    \ YES;\n}\n```\n\nFinally, alter the `persistentStoreCoordinator:` accessor to\
    \ use the new custom store.\n\n```\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\
    \ {\n    if (__persistentStoreCoordinator != nil) {\n        return __persistentStoreCoordinator;\n\
    \    }\n\n    NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
    League_Manager.txt\"];\n\n    NSError *error = nil;\n    __persistentStoreCoordinator\
    \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
    \    if (![__persistentStoreCoordinator addPersistentStoreWithType:@\"CustomStore\"\
    \ configuration:nil URL:storeURL options:nil error:&error]) {\n        NSLog(@\"\
    Unresolved error %@, %@\", error, [error userInfo]);\n        abort();\n    }\n\
    \n    return __persistentStoreCoordinator;\n}\n```\n\nAt this point, you should\
    \ be able to start the application, and it will use the new custom store. A file\
    \ called `League_Manager.txt` will be created in the same directory where the\
    \ `League_Manager.sqlite` database was when you first implemented it earlier in\
    \ this chapter. Take the application for a spin, add a few teams and players,\
    \ and then go check the `League_Manager.txt` data file using any text editor.\
    \ Depending on the teams and players you create, the file will look something\
    \ like this:\n\n```\nPlayer|5247F86F-0397-4814-9AF7-5F6946BE20C4|email=rrondo@example.com|firstName=Rajon|lastName=Rondo|team=9F2662B9-3006-4B8D-BC43–EA68DB7AD037\n\
    Player|20C2D39C-D831-4AD7-9FE7-E1CE22D765E0|email=twarner@example.com|firstName=Tyson|lastName=Warner|team=3BBC1923–0EA7-485C-9516-3B993D30D0CE\n\
    Player|3E817374-2BE2-495F-8029-1698C34DE07F|email=ljames@example.com|firstName=LeBron|lastName=James|team=3BBC1923–0EA7-485C-9516-3B993D30D0CE\n\
    Player|7ABACD30-2586-4522-8369-0D104FE248AF|email=cbosh@example.com|firstName=Chris|lastName=Bosh|team=3BBC1923–0EA7-485C-9516-3B993D30D0CE\n\
    Player|D14E8D95-FC94-48AA-BE9B-E20FC36B70EB|email=dwade@example.com|firstName=Dwyane|lastName=Wade|team=3BBC1923–0EA7-485C-9516-3B993D30D0CE\n\
    Team|3BBC1923–0EA7-485C-9516-3B993D30D0CE|name=Miami Heat|uniformColor=Red|players=3E817374-2BE2-495F-8029-1698C34DE07F,7ABACD30-2586-4522-8369-0D104FE248AF,D14E8D95-FC94-48AA-BE9B-E20FC36B70EB,20C2D39C-D831-4AD7-9FE7-E1CE22D765E0\n\
    Team|9F2662B9-3006-4B8D-BC43–EA68DB7AD037|name=Boston Celtics|uniformColor=Green|players=5247F86F-0397-4814-9AF7-5F6946BE20C4\n\
    ```\n\nIn the data file, you can see two teams, Boston Celtics and Miami Heat,\
    \ in the last two lines of the file. The entity name, “Team,” is the first field\
    \ on each of those two rows. You see that the Boston Celtics has one player, as\
    \ it has only one reference ID listed for the `players` relationship in the last\
    \ field of its row. That reference ID listed for the `players` relationship matches\
    \ the reference ID for Rajon Rondo, which is the second field in the first row\
    \ of the file. You can also see the four players that represent the Miami Heat's\
    \ future: LeBron James, Dwyane Wade, Chris Bosh, and Tyson Warner.\n\n#### What\
    \ About XML Persistent Stores?\n\nCore Data offers another persistent store type,\
    \ XML, on Mac OS X that you specify by passing `NSXMLStoreType` to your persistent\
    \ store coordinator's `addPersistentStoreWithType:` method. Passing `NSXMLStoreType`\
    \ when compiling for iOS, however, gives you a compiler error: `'NSXMLStoreType'\
    \ undeclared`. If you look in the Core Data header files for iOS, you'll find\
    \ the following in `NSPersistentStoreCoordinator.h`:\n\n```\n// Persistent store\
    \ types supported by Core Data:\nCOREDATA_EXTERN NSString * const NSSQLiteStoreType\
    \ __OSX_AVAILABLE_STARTING(__MAC_10_4,\n__IPHONE_3_0);\nCOREDATA_EXTERN NSString\
    \ * const NSBinaryStoreType __OSX_AVAILABLE_STARTING(__MAC_10_4,\n__IPHONE_3_0);\n\
    COREDATA_EXTERN NSString * const NSInMemoryStoreType __OSX_AVAILABLE_STARTING(__MAC_10_4,\
    \ __IPHONE_3_0);\n```\n\nIndeed, `NSXMLStoreType` remains undeclared, though it's\
    \ emphatically available for Mac OS X. To understand why, turn to Apple's developer\
    \ documentation on Core Data Persistent Store Features, found at [http://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/CoreData/Articles/cdPersistentStores.html](http://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/CoreData/Articles/cdPersistentStores.html),\
    \ to read the following explanation for XML's exclusion on iOS:\n\n```\niOS: The\
    \ XML store is not available on iOS.\n```\n\nThat's all you get, keeping Apple's\
    \ reputation for secrecy intact. You're left, then, to speculate. Apple probably\
    \ left XML off iOS's version of Core Data for a few reasons:\n\n- Parsing XML\
    \ can consume a lot of processor cycles, making an iDevice, with its slower processor\
    \ relative to an iMac, Mac Pro, and so on, slower.\n- Because parsing XML uses\
    \ more processing power, it can consume more battery life.\n- XML, with its characters,\
    \ brackets, and metadata, generally consumes more storage space than binary file\
    \ types.\n- Apple likes to steer its developers toward solutions it deems better,\
    \ rather than providing as many options as possible. XML is superfluous for Core\
    \ Data persistence.\n\nIf you miss XML and want it available for your applications,\
    \ you can write your own XML custom store. If you imagine a nice, nested XML document\
    \ issuing from your complex data models, however, you will probably become frustrated\
    \ in your attempts to create a custom XML persistent store type. Core Data relationships\
    \ have their inverses, meaning that you really can't arbitrate parenthood among\
    \ entities. In the League Manager data model, for example, should `Team` entity\
    \ tags contain `Player` entity tags, because the team “owns” its players, or should\
    \ it be the reverse? Do players own the teams they play for (as many superstar\
    \ professional athletes have demonstrated)? If you pursue an XML custom data store,\
    \ you'll find that you don't produce readable XML documents that make relationships\
