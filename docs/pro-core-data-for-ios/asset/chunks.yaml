  trans: '

    ### 什么是 Core Data？


    当人们使用电脑时，他们期望能够保留在完成任务过程中取得的任何进展。保存进度对于办公软件、代码编辑器以及涉及小个子水管工的游戏来说至关重要，这就是程序员所说的*持久化*。大多数软件都需要持久化能力，即存储和检索数据的能力，这样用户就不必在每次使用应用程序时重新输入所有数据。有些软件可以在没有任何数据存储或检索的情况下运行；计算器、水平仪以及那些会发出恼人或粗俗声音的应用就是典型的例子。然而，大多数有用的应用程序都会保留某些状态，无论是面向配置的数据、实现某个目标的进度，还是用户创建并关心的大量相关数据。理解如何在
    iOS 设备上持久化数据，对于大多数有意义的 iOS 开发至关重要。


    Apple 的 Core Data 提供了一个功能强大的持久化框架。Core Data 并非唯一的数据存储选项，也并非在所有场景下都是最佳选择，但它与 Cocoa
    Touch 开发框架的其他部分配合良好，并且能很好地映射到对象。Core Data 隐藏了数据存储的大部分复杂性，让你能够专注于让你的应用程序变得有趣、独特或易于使用。


    尽管 Core Data 可以将数据存储在关系型数据库（例如 SQLite）中，但它本身并不是一个数据库引擎。它甚至不一定非得使用关系型数据库来存储数据。虽然
    Core Data 提供了一个实体关系图工具，但它不是一个数据建模器。它不像 Hibernate 那样是一个数据访问层，尽管它提供了许多相同的对象-关系映射功能。相反，Core
    Data 将这些工具的最佳特性整合到一个数据管理框架中，允许你以一种类似于在常规面向对象编程中处理的对象图的方式来处理实体、属性和关系。


    早期的 iPhone 程序员没有 Core Data 框架的强大功能来存储和检索数据。下一节将向你展示 iOS 中持久化背后的历史。


    ### iOS 中的持久化历史


    Core Data 源自在 NeXT 技术基础上的演进，最初是经由 WebObjects 的关系是从名为“企业对象框架”（EOF）的技术演变而来，WebObjects
    是另一项 NeXT 技术，至今仍为苹果网站的部分功能提供支持。它于 2005 年首次作为 Mac OS X 10.4（"Tiger"）的一部分亮相，但直到
    2009 年 6 月发布的 SDK 3.0 版本才出现在 iPhone 上。在 Core Data 出现之前，iPhone 开发者在持久化方面有以下选择：


    - 使用属性列表，其中包含各种数据类型键值对的嵌套列表。

    - 使用 SDK 的 `NSCoding` 协议将对象序列化到文件。

    - 利用 iPhone 对关系型数据库 SQLite 的支持。

    - 将数据持久化到互联网云端。


    开发者在构建第一波涌入苹果 App Store 的应用时，使用了所有这些数据存储机制。这些存储选项中的每一个仍然可行，并且开发者在使用更新版本的 SDK 构建新应用时继续使用它们。


    然而，这些选项都无法与 Core Data 的强大功能、易用性以及与 Cocoa 的良好兼容性相媲美。尽管在 Core Data 问世之前的时代，有像 `FMDatabase`
    或 `ActiveRecord` 这样的框架来简化 iOS 上的持久化处理，但当 Core Data 可用时，开发者们还是感激地投向了它的怀抱。


    虽然 Core Data 可能并非最佳地解决所有持久化问题，并且你可能会使用其他手段（如前面列出的选项）来解决某些持久化场景，但你大多数情况下还是会求助于
    Core Data。当你阅读本书，了解 Core Data 解决的问题以及它解决问题的优雅方式后，你很可能会在任何可能的时候使用 Core Data。随着新的持久化需求的出现，你不会问自己“我应该为此使用
    Core Data 吗？”，而是会问：“有什么理由*不*使用 Core Data 吗？”


    下一节将向你展示如何使用 Xcode 的项目模板构建一个基本的 Core Data 应用程序。即使你已经生成了一个 Xcode Core Data 项目，并且知道要点击哪些按钮和复选框，也不要跳过下一节。它将解释模板生成的与
    Core Data 相关的代码部分，并形成一个理解基础，本书的其余部分将在此基础上展开。


    ### 创建一个基础的 Core Data 应用程序


    Core Data 的众多方面、类以及细微差别值得进行精妙的分析和深入的讨论，以教会你掌握 Core Data 复杂性所需的一切知识。然而，建立支持理论的实践基础对于掌握同样至关重要。本节将使用
    Xcode 内置模板之一构建一个简单的基于 Core Data 的应用程序，然后剖析其 Core Data 相关代码中最关键的部分，以展示它们的作用以及如何交互。在本节结束时，你将理解这个应用程序如何与
    Core Data 交互以存储和检索数据。


    #### 理解 Core Data 组件


    在构建本节的基础 Core Data 应用程序之前，你应该对 Core Data 的各个组件有一个高层次的理解。图 1-1 展示了你将在此节中构建的应用程序的关键元素。请查看此图，以鸟瞰视角了解此应用程序实现了什么，其所有部分如何匹配，以及为什么需要它们。


    作为 Core Data 的用户，你绝不应直接与底层持久化存储交互。Core Data 的基本原则之一是持久化存储应对用户进行抽象。这样做的一个关键优势是，将来能够无缝地更改后端存储，而无需修改其余代码。你应该尝试将
    Core Data 描绘成一个管理对象持久化的框架，而不是想着数据库。毫不奇怪，由该框架管理的对象必须继承自 `NSManagedObject`，通常被称为托管对象。不过，不要认为
    Core Data 组件命名约定中缺乏想象力就表明这是一个缺乏想象力或平庸的框架。事实上，Core Data 在将所有对象图相互依赖、优化和缓存保持在可预测状态方面做得非常出色，因此你无需为此担忧。如果你曾经尝试构建自己的对象管理框架，你就会明白
    Core Data 为你解决的问题是多么复杂。


    ![images](img/0101.jpg)


    **图 1-1.** *Core Data 组件概览*


    就像我们需要一个宜居的环境才能生存一样，托管对象必须存在于一个适合它们生存的环境中，通常称为*托管对象上下文*，或简称为*上下文*。上下文不仅会跟踪你正在更改的对象的状态，还会跟踪所有依赖于它或它所依赖的对象的状态。你应用程序中的
    `NSManagedObjectContext` 对象提供了这个上下文，并且是你的代码必须始终能够访问的关键属性。你通常通过让应用程序委托初始化 `NSManagedObjectContext`
    对象并将其作为其属性之一暴露给应用程序，来实现对该对象的访问。你的应用程序上下文通常也会将 `NSManagedObjectContext` 对象提供给主视图控制器。没有上下文，你将无法与
    Core Data 交互。

    '
- fmt: "### Creating a New Project\n\nTo begin, launch `Xcode`, and create a new project\
    \ by selecting `File` ![images](images/U001.jpg) `New` ![images](images/U001.jpg)\
    \ `New Project` from the menu. Note that you can also create a new project by\
    \ pressing ![images](images/U004.jpg) + ![images](images/U005.jpg) +`N`. From\
    \ the list of application templates, select the `Application` item under `iOS`\
    \ on the left, and pick `Master-Detail Application` on the right. Click `Next`,\
    \ and on the next screen type `BasicApplication` in the `Product Name` field,\
    \ `book.coredata` in the `Company Identifier` field, uncheck `Use Storyboard`\
    \ and check `Use Core Data`. See [Figure 1–2](<#Chapter01.html#fig_1_2>). Click\
    \ the `Next` button, choose the parent directory where `Xcode` will create the\
    \ `BasicApplication` directory and project, and click `Create`. `Xcode` creates\
    \ your project, generates the project's files, and opens its IDE window with all\
    \ the files it generated, as [Figure 1–3](<#Chapter01.html#fig_1_3>) shows.\n\n\
    ![images](images/0102.jpg)\n\n**Figure 1–2.** *Creating a new project with Core\
    \ Data*\n\n![images](images/0103.jpg)\n\n**Figure 1–3.** *Xcode showing your new\
    \ project*\n\n### Running Your New Project\n\nBefore digging into the code, run\
    \ it to see what it does. Launch the application by clicking the `Run` button.\
    \ The `iPhone Simulator` opens, and the application presents the navigation-based\
    \ interface shown in [Figure 1–4](<#Chapter01.html#fig_1_4>), with a table view\
    \ occupying the bulk of the screen, an `Edit` button in the top-left corner, and\
    \ the conventional `Add` button, denoted by a plus sign, in the upper-right corner.\
    \ The application's table shows an empty list indicating that the application\
    \ isn't aware of any events, which is what the generated `Xcode Core Data` project\
    \ stores. Create a new event stamped with the current time by clicking the plus\
    \ button in the top-right corner of the application.\n\n![images](images/0104.jpg)\n\
    \n**Figure 1–4.** *The basic application with a blank screen*\n\nNow, stop the\
    \ application by clicking the `Stop` button in the `Xcode IDE`. If the application\
    \ hadn't used Core Data persistence, it would have lost the event you just created\
    \ as it exited. Maintaining a list of events with this application and no persistence\
    \ would be a Sisyphean task—you'd have to re-create the events each time you launched\
    \ the application. Because the application uses persistence, however, it stored\
    \ the event you created using the `Core Data` framework. Relaunching the application\
    \ shows that the event is still there, as [Figure 1–5](<#Chapter01.html#fig_1_5>)\
    \ demonstrates.\n\n![images](images/0105.jpg)\n\n**Figure 1–5.** *The basic application\
    \ with a persisted event*\n\n### Understanding the Application's Components\n\n\
    The anatomy of the application is relatively simple. It has a data model that\
    \ describes the entities in the data store, a view controller that facilitates\
    \ interactions between the view and the data store, and an application delegate\
    \ that helps initialize and launch the application. [Figure 1–6](<#Chapter01.html#fig_1_6>)\
    \ shows the classes involved and how they relate to each other.\n\n![images](images/0106.jpg)\n\
    \n**Figure 1–6.** *Classes involved in the BasicApplication example*\n\nNote how\
    \ the `MasterViewController` class, which is in charge of managing the user interface,\
    \ has a handle to the managed object context so that it can interact with Core\
    \ Data. As you go through the code, you'll see that the `MasterViewController`\
    \ class obtains the managed object context from the application delegate. This\
    \ happens in the controller's `initWithNibName:bundle:` method, shown here:\n\n\
    ```\n- (id)initWithNibName:(NSString *)nibNameOrNil bundle:(NSBundle *)nibBundleOrNil\n\
    {\n  self = [super initWithNibName:nibNameOrNil bundle:nibBundleOrNil];\n  if\
    \ (self) {\n    self.title = NSLocalizedString(@\"Master\", @\"Master\");\n  \
    \  id delegate = [[UIApplication sharedApplication] delegate];\n    self.managedObjectContext\
    \ = [delegate managedObjectContext];\n  }\n  return self;\n}\n```\n\nThe entry\
    \ called `BasicApplication.xcdatamodeld`, which is actually a directory on the\
    \ file system, contains the data model, `BasicApplication.xcdatamodel`. The data\
    \ model is central to every Core Data application. This particular data model\
    \ defines only one entity, named `Event`, for the application. `Events` are defined\
    \ as entities that contain only one attribute named `timeStamp` of type `Date`,\
    \ as shown in [Figure 1–7](<#Chapter01.html#fig_1_7>).\n\n![images](images/0107.jpg)\n\
    \n**Figure 1–7.** *The Xcode-generated data model*\n\nThe `Event` entity is of\
    \ type `NSManagedObject`, which is the basic type for all entities managed by\
    \ Core Data. [Chapter 2](<#Chapter02.html#ch2>) explains the `NSManagedObject`\
    \ type in more detail."
  raw: '#### Creating a New Project


    To begin, launch Xcode, and create a new project by selecting `File` ![images](images/U001.jpg)
    `New` ![images](images/U001.jpg) `New Project` from the menu. Note that you can
    also create a new project by pressing ![images](images/U004.jpg) + ![images](images/U005.jpg)
    +N. From the list of application templates, select the Application item under
    iOS on the left, and pick Master-Detail Application on the right. Click Next,
    and on the next screen type **BasicApplication** in the Product Name field, **book.coredata**
    in the Company Identifier field, uncheck Use Storyboard and check Use Core Data.
    See [Figure 1–2](#Chapter01.html#fig_1_2). Click the Next button, choose the parent
    directory where Xcode will create the BasicApplication directory and project,
    and click Create. Xcode creates your project, generates the project''s files,
    and opens its IDE window with all the files it generated, as [Figure 1–3](#Chapter01.html#fig_1_3)
    shows.


    ![images](images/0102.jpg)


    **Figure 1–2.** *Creating a new project with Core Data*


    ![images](images/0103.jpg)


    **Figure 1–3.** *Xcode showing your new project*


    #### Running Your New Project


    Before digging into the code, run it to see what it does. Launch the application
    by clicking the Run button. The iPhone Simulator opens, and the application presents
    the navigation-based interface shown in [Figure 1–4](#Chapter01.html#fig_1_4),
    with a table view occupying the bulk of the screen, an Edit button in the top-left
    corner, and the conventional Add button, denoted by a plus sign, in the upper-right
    corner. The application''s table shows an empty list indicating that the application
    isn''t aware of any events, which is what the generated Xcode Core Data project
    stores. Create a new event stamped with the current time by clicking the plus
    button in the top-right corner of the application.


    ![images](images/0104.jpg)


    **Figure 1–4.** *The basic application with a blank screen*


    Now, stop the application by clicking the Stop button in the Xcode IDE. If the
    application hadn''t used Core Data persistence, it would have lost the event you
    just created as it exited. Maintaining a list of events with this application
    and no persistence would be a Sisyphean task—you''d have to re-create the events
    each time you launched the application. Because the application uses persistence,
    however, it stored the event you created using the Core Data framework. Relaunching
    the application shows that the event is still there, as [Figure 1–5](#Chapter01.html#fig_1_5)
    demonstrates.


    ![images](images/0105.jpg)


    **Figure 1–5.** *The basic application with a persisted event*


    #### Understanding the Application''s Components


    The anatomy of the application is relatively simple. It has a data model that
    describes the entities in the data store, a view controller that facilitates interactions
    between the view and the data store, and an application delegate that helps initialize
    and launch the application. [Figure 1–6](#Chapter01.html#fig_1_6) shows the classes
    involved and how they relate to each other.


    ![images](images/0106.jpg)


    **Figure 1–6.** *Classes involved in the BasicApplication example*


    Note how the `MasterViewController` class, which is in charge of managing the
    user interface, has a handle to the managed object context so that it can interact
    with Core Data. As you go through the code, you''ll see that the `MasterViewController`
    class obtains the managed object context from the application delegate. This happens
    in the controller''s `initWithNibName:bundle:` method, shown here:


    `- (id)initWithNibName:(NSString *)nibNameOrNil bundle:(NSBundle *)nibBundleOrNil`

    `{`

    `  self = [super initWithNibName:nibNameOrNil bundle:nibBundleOrNil];`

    `  if (self) {`

    `    self.title = NSLocalizedString(@"Master", @"Master");`

    `    id delegate = [[UIApplication sharedApplication] delegate];`

    **`self.managedObjectContext = [delegate managedObjectContext];`**

    `  }`

    `  return self;`

    `}`


    The entry called `BasicApplication.xcdatamodeld`, which is actually a directory
    on the file system, contains the data model, `BasicApplication.xcdatamodel`. The
    data model is central to every Core Data application. This particular data model
    defines only one entity, named `Event`, for the application. `Events` are defined
    as entities that contain only one attribute named `timeStamp` of type `Date`,
    as shown in [Figure 1–7](#Chapter01.html#fig_1_7).


    ![images](images/0107.jpg)


    **Figure 1–7.** *The Xcode-generated data model*


    The `Event` entity is of type `NSManagedObject`, which is the basic type for all
    entities managed by Core Data. [Chapter 2](#Chapter02.html#ch2) explains the `NSManagedObject`
    type in more detail.'
  trans: "\n### 创建新项目\n\n首先，启动`Xcode`，通过菜单选择`File` ![images](img/U001.jpg) `New` ![images](img/U001.jpg)\
