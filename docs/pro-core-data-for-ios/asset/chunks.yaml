- fmt: "### Adding the Tab\n\nTo add the tab for the Notes view, create a new `UIViewController`\
    \ subclass called `NoteListViewController` (see [Figure 10–6](#Chapter10.html#fig_10_6)).\
    \ On the next screen, be sure to make it a subclass of `UITableViewController`\
    \ and uncheck \"With XIB for user interface\", as shown in [Figure 10–5](#Chapter10.html#fig_10_5).\n\
    \n![images](images/1005.jpg)\n\n**Figure 10–5.** *Adding the view class for the\
    \ Notes view*\n\nOpen `NoteListViewController.m`, find the `initWithStyle:` method,\
    \ and in it, add a title and an image for the tab, like this:\n\n```objc\n- (id)initWithStyle:(UITableViewStyle)style\n\
    {\n  self = [super initWithStyle:style];\n  if (self) {\n    self.title = @\"\
    Notes\";\n    self.tabBarItem.image = [UIImage imageNamed:@\"note\"];\n  }\n \
    \ return self;\n}\n```\n\nFor the tab images, grab four files from the downloaded\
    \ source code for this book:\n\n- `note.png`\n- `password.png`\n- `note@2x.png`\n\
    - `password@2x.png`\n\nAlternatively, you can create your own. The iPhone 4 versions\
    \ (`*@2x.png`) should be about 60 pixels by 60 pixels, and the regular versions\
    \ should be about 30 pixels by 30 pixels. Make them have a transparent background\
    \ with a black image.\n\nHowever you get the four images, add them to your project\
    \ in a new group called Images, as in [Figure 10–6](#Chapter10.html#fig_10_6).\n\
    \n![images](images/1006.jpg)\n\n**Figure 10–6.** *The tab images added to the\
    \ project*\n\nNow, add the Notes tab to the tab bar controller in the application\
    \ delegate. Open `AppDelegate.m`, and add an import for the Note List view.\n\n\
    ```objc\n#import \"NoteListViewController.h\"\n```\n\nThen, in the `application:didFinishLaunchingWithOptions:`\
    \ method, create an instance of `NoteListViewController`, wrap it in an instance\
    \ of `UINavigationController`, and add it to the tab bar controller. The updated\
    \ method looks like this:\n\n```objc\n- (BOOL)application:(UIApplication *)application\
    \ didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n{\n  self.window\
    \ = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n  self.window.backgroundColor\
    \ = [UIColor whiteColor];\n\n  self.tabBarController = [[UITabBarController alloc]\
    \ init];\n  [self.window addSubview:self.tabBarController.view];\n\n  // Add the\
    \ note list tab\n  NoteListViewController *noteListViewController = [[NoteListViewController\
    \ alloc] initWithStyle:UITableViewStylePlain];\n  UINavigationController *navNoteList\
    \ = [[UINavigationController alloc] initWithRootViewController:noteListViewController];\n\
    \  [self.tabBarController setViewControllers:[NSArray arrayWithObjects:navNoteList,\
    \ nil]];\n\n  [self.window makeKeyAndVisible];\n  return YES;\n}\n```\n\nNow you\
    \ can build and run the application, and you see the view has a single tab (the\
    \ one for Notes), as shown in [Figure 10–7](#Chapter10.html#fig_10_7).\n\n![images](images/1007.jpg)\n\
    \n**Figure 10–7.** *The MyStash application with a single tab*\n\nYou still need\
    \ the tab for passwords, so make another view controller, patterned after the\
    \ one for notes. Once again, select \"UIViewController subclass,\" further specialize\
    \ it as a \"UITableViewController subclass,\" and call it `PasswordListViewController`.\
    \ Open the `PasswordListViewController.m` file, find the `initWithStyle:` method,\
    \ and use it to add a title and an icon for the tab.\n\n```objc\n- (id)initWithStyle:(UITableViewStyle)style\n\
    {\n  self = [super initWithStyle:style];\n  if (self) {\n    self.title = @\"\
    Passwords\";\n    self.tabBarItem.image = [UIImage imageNamed:@\"password\"];\n\
    \  }\n  return self;\n}\n```\n\nGo back to the `AppDelegate.m` file and add an\
    \ import for the password list view controller.\n\n```objc\n#import \"PasswordListViewController.h\"\
    \n```\n\nIn that same file, update the `application:didFinishLaunchingWithOptions:`\
    \ method to add the Passwords tab to the tab bar controller.\n\n```objc\n- (BOOL)application:(UIApplication\
    \ *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n\
    {\n  self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n\
    \  self.window.backgroundColor = [UIColor whiteColor];\n\n  self.tabBarController\
    \ = [[UITabBarController alloc] init];\n  [self.window addSubview:self.tabBarController.view];\n\
    \n  // Add the note list tab\n  NoteListViewController *noteListViewController\
    \ = [[NoteListViewController alloc] initWithStyle:UITableViewStylePlain];\n  UINavigationController\
    \ *navNoteList = [[UINavigationController alloc] initWithRootViewController:noteListViewController];\n\
    \n  // Add the password list tab\n  PasswordListViewController *passwordListViewController\
    \ = [[PasswordListViewController alloc] initWithStyle:UITableViewStylePlain];\n\
    \  UINavigationController *navPasswordList = [[UINavigationController alloc] initWithRootViewController:passwordListViewController];\n\
    \n  [self.tabBarController setViewControllers:[NSArray arrayWithObjects:navNoteList,\
    \ navPasswordList, nil]];\n\n  [self.window makeKeyAndVisible];\n  return YES;\n\
    }\n```\n\nNow, when you build and run the MyStash application, you should see\
    \ two tabs: one for notes and one for passwords, as [Figure 10–8](#Chapter10.html#fig_10_8)\
    \ shows. You now have the bare-bones MyStash application built; you'll add the\
    \ advanced features in the rest of the chapter!\n\n![images](images/1008.jpg)\n\
    \n**Figure 10–8.** *The MyStash application with two tabs*\n\n### Incorporating\
    \ NSFetchedResultsController into MyStash\n\nIf you run the MyStash application\
    \ now, you see the expected tabs for notes and passwords. You can't add any notes\
    \ or passwords, however, and you couldn't see them if you somehow added them.\
    \ In the previous chapter, you've learned how to use the `NSFetchedResultsController`\
    \ class to display data in a table. In this section, you apply the same technique\
    \ to display notes and passwords using two instances of `NSFetchedResultsController`\
    \ (one for notes and one for passwords)."
