    `  [super viewDidLoad];`

    **`  if (player != nil) {`**

    **`    firstName.text = [player valueForKey:@"firstName"];`**

    **`    lastName.text = [player valueForKey:@"lastName"];`**

    **`    email.text = [player valueForKey:@"email"];`**

    **`  }`**

    **`}`**


    Your next step is to add methods to respond to the three buttons. The `save:`
    and `cancel:` methods mirror the ones created for the `TeamViewController` class;
    they look like this:


