    `}`


    The brute force nature of this approach contrasts, however, with the elegance
    of `NSFetchedResultsController`. Instead, you can implement the four methods of
    the `NSFetchedResultsControllerDelegate` protocol that respond to changes in the
    underlying model to gracefully update your views in response to data change. The
    first two methods bookend any data changes. The `controllerWillChangeContent:`
    method is called when data changes and signals that the `NSFetchedResultsController`
    instance is about to respond to those changes. In this method, you typically call
    `beginUpdates:` on your table view, so that it can perform any animations simultaneously.
    Then, in `controllerDidChangeContent:` (called after the `NSFetchedResultsController`
    has finished responding to changes), you call `endUpdates:` on your table view
    to signal the completion of any simultaneous animations. Add this code to `AllPlayerViewController.m`:


    **`- (void)controllerWillChangeContent:(NSFetchedResultsController *)controller
    {`**

    **`[self.tableView beginUpdates];`**

    **`}`**


    **`- (void)controllerDidChangeContent:(NSFetchedResultsController *)controller
    {`**

    **`[self.tableView endUpdates];`**

    **`}`**


    The other two methods in the protocol, `controller:didChangeSection:atIndex:forChangeType:`
    and `controller:didChangeObject:atIndexPath:forChangeType:newIndexPath:`, allow
    you to respond to changes in sections and in rows, respectively. At the point
    these methods are called, your `NSFetchedResultsController` has already updated
    itself with the most current data and is giving you the opportunity to update
    your table view in response to the changed data. In your implementations, you
    should figure out what data changed and then instruct your table view to update
    itself accordingly.


    When a section changes, the `controller:didChangeSection:atIndex:forChangeType:`
    method is called, passing in the `NSFetchedResultsSectionInfo` object representing
    the object that changed, the index of the section that changed, and the type of
    the change that occurred, represented by an `NSFetchedResultsChangeType` instance.
    The `controller:didChangeObject:atIndexPath:forChangeType:newIndexPath:` method
    also uses the `NSFetchedResultsChangeType` values to denote what change occurred.
    [Table 9–1](#Chapter09.html#tab_9_1) lists the possible values for `NSFetchedResultsChangeType`
    along with their meanings.


    ![images](images/t0901.jpg)


    Notice from [Table 9–1](#Chapter09.html#tab_9_1) that only two `NSFetchedResultsChangeType`
    values, `NSFetchedResultsChangeInsert` and `NSFetchedResultsChangeDelete`, are
    ever passed for section changes. All four values can be passed for object (or
    row) changes.


    In your implementation, you typically determine what type of change occurred,
    and then you tell your table view what to do. Be aware, however, of what data
    your `NSFetchedResultsController` instance is fetching and what data you''re using
    for sections. In the League Manager application, for example, the `NSFetchedResultsController`
    instance is fetching data from the `Player` entity and using the players'' team
    names for the sections. The `NSFetchedResultsController` isn''t watching the Team
    entity at all. This means, for example, that if you go to the League Manager tab
    and add a new team, which adds a new `Team` entity to the data store, the `didChangeSection:`
    method isn''t called with an `NSFetchedResultsChangeInsert` change type. In fact,
    it isn''t called at all, as nothing related to the `NSFetchedResultsController`
    instance (that is, nothing related to the `Player` entity) has changed. If you
    add a new player to the new team, however, then the `didChangeSection:` method
    is called with `NSFetchedResultsChangeInsert` to tell you that a new section,
    or team, has been added.


    Likewise, if you edit a team on the League Manager tab (say, for example, you
    rename it), the `didChangeSection:` method isn''t called. If you do anything to
