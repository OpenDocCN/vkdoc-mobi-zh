    the organization, create a primitive `int` from the hash of the name of the organization
    and then convert the primitive `int` into an `NSNumber` object, which can be used
    in the `setValue:forKey:` method. The code looks like this:


    **`[organization setValue:[NSNumber numberWithInt:[@"MyCompany, Inc." hash]] forKey:@"id"];`**


