    **图 1-5.** *包含持久化事件的基础应用程序*\n\n### 理解应用程序的组件\n\n该应用程序的结构相对简单。它包含一个描述数据存储中实体的数据模型，一个促进视图与数据存储交互的视图控制器，以及一个帮助初始化和启动应用程序的应用委托。图\
    \ 1-6 展示了涉及的类以及它们之间的关系。\n\n![images](img/0106.jpg)\n\n**图 1-6.** *BasicApplication\
    \ 示例中涉及的类*\n\n注意负责管理用户界面的`MasterViewController`类拥有一个指向托管对象上下文的句柄，以便与 Core Data\
