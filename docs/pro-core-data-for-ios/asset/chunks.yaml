- fmt: "### Responding to Data Change\n\nYou might notice that the all-player view\
    \ doesn't respond well to change. If you add, edit, or delete players or teams\
    \ in the League Manager tab, then switch over to the Players tab, you don't see\
    \ any of your changes reflected. You could solve this by making the table reload\
    \ its data any time the view appears, like so:\n\n```\n- (void)viewWillAppear:(BOOL)animated\
    \ {\n    [super viewWillAppear:animated];\n    [self.tableView reloadData];\n\
    }\n```\n\nThe brute force nature of this approach contrasts, however, with the\
    \ elegance of `NSFetchedResultsController`. Instead, you can implement the four\
    \ methods of the `NSFetchedResultsControllerDelegate` protocol that respond to\
    \ changes in the underlying model to gracefully update your views in response\
    \ to data change. The first two methods bookend any data changes. The `controllerWillChangeContent:`\
    \ method is called when data changes and signals that the `NSFetchedResultsController`\
    \ instance is about to respond to those changes. In this method, you typically\
    \ call `beginUpdates` on your table view, so that it can perform any animations\
    \ simultaneously. Then, in `controllerDidChangeContent:` (called after the `NSFetchedResultsController`\
    \ has finished responding to changes), you call `endUpdates` on your table view\
    \ to signal the completion of any simultaneous animations. Add this code to `AllPlayerViewController.m`:\n\
    \n```\n- (void)controllerWillChangeContent:(NSFetchedResultsController *)controller\
    \ {\n    [self.tableView beginUpdates];\n}\n\n- (void)controllerDidChangeContent:(NSFetchedResultsController\
    \ *)controller {\n    [self.tableView endUpdates];\n}\n```\n\nThe other two methods\
    \ in the protocol, `controller:didChangeSection:atIndex:forChangeType:` and `controller:didChangeObject:atIndexPath:forChangeType:newIndexPath:`,\
    \ allow you to respond to changes in sections and in rows, respectively. At the\
    \ point these methods are called, your `NSFetchedResultsController` has already\
    \ updated itself with the most current data and is giving you the opportunity\
    \ to update your table view in response to the changed data. In your implementations,\
    \ you should figure out what data changed and then instruct your table view to\
    \ update itself accordingly.\n\nWhen a section changes, the `controller:didChangeSection:atIndex:forChangeType:`\
    \ method is called, passing in the `NSFetchedResultsSectionInfo` object representing\
    \ the object that changed, the index of the section that changed, and the type\
    \ of the change that occurred, represented by an `NSFetchedResultsChangeType`\
    \ instance. The `controller:didChangeObject:atIndexPath:forChangeType:newIndexPath:`\
    \ method also uses the `NSFetchedResultsChangeType` values to denote what change\
    \ occurred. [Table 9–1](#Chapter09.html#tab_9_1) lists the possible values for\
    \ `NSFetchedResultsChangeType` along with their meanings.\n\n![images](images/t0901.jpg)\n\
    \nNotice from [Table 9–1](#Chapter09.html#tab_9_1) that only two `NSFetchedResultsChangeType`\
    \ values, `NSFetchedResultsChangeInsert` and `NSFetchedResultsChangeDelete`, are\
    \ ever passed for section changes. All four values can be passed for object (or\
    \ row) changes.\n\nIn your implementation, you typically determine what type of\
    \ change occurred, and then you tell your table view what to do. Be aware, however,\
    \ of what data your `NSFetchedResultsController` instance is fetching and what\
    \ data you're using for sections. In the League Manager application, for example,\
    \ the `NSFetchedResultsController` instance is fetching data from the `Player`\
    \ entity and using the players' team names for the sections. The `NSFetchedResultsController`\
    \ isn't watching the `Team` entity at all. This means, for example, that if you\
    \ go to the League Manager tab and add a new team, which adds a new `Team` entity\
    \ to the data store, the `didChangeSection:` method isn't called with an `NSFetchedResultsChangeInsert`\
    \ change type. In fact, it isn't called at all, as nothing related to the `NSFetchedResultsController`\
    \ instance (that is, nothing related to the `Player` entity) has changed. If you\
    \ add a new player to the new team, however, then the `didChangeSection:` method\
    \ is called with `NSFetchedResultsChangeInsert` to tell you that a new section,\
    \ or team, has been added.\n\nLikewise, if you edit a team on the League Manager\
    \ tab (say, for example, you rename it), the `didChangeSection:` method isn't\
    \ called. If you do anything to the players on that team, however (add one, delete\
    \ one, edit one), then the `didChangeSection:` method is called twice: once with\
    \ `NSFetchedResultsChangeInsert` and once with `NSFetchedResultsChangeDelete`,\
    \ producing the net effect of updating the section with the new team name. This\
    \ means that you can rename a team in the League Manager tab, then switch to the\
    \ Players tab, and the section name will still display the old team name. If you\
    \ go back and add, edit, or delete a player, however, the team name will automatically\
    \ update. Make sure you understand these limitations and their consequences to\
    \ avoid frustrations.\n\nTo respond to section changes, implement the `controller:didChangeSection:atIndex:forChangeType:`\
    \ method, checking for the two valid values for the change type, and instruct\
    \ your table view to either insert or delete sections as appropriate, like this:\n\
    \n```\n- (void)controller:(NSFetchedResultsController *)controller didChangeSection:(id\
    \ <NSFetchedResultsSectionInfo>)sectionInfo atIndex:(NSUInteger)sectionIndex forChangeType:(NSFetchedResultsChangeType)type\
    \ {\n    switch(type) {\n        case NSFetchedResultsChangeInsert:\n        \
    \    [self.tableView insertSections:[NSIndexSet indexSetWithIndex:sectionIndex]\
    \ withRowAnimation:UITableViewRowAnimationFade];\n            break;\n\n     \
    \   case NSFetchedResultsChangeDelete:\n            [self.tableView deleteSections:[NSIndexSet\
    \ indexSetWithIndex:sectionIndex] withRowAnimation:UITableViewRowAnimationFade];\n\
    \            break;\n    }\n}\n```\n\nThe remaining method to implement that responds\
    \ to change in your `NSFetchedResultsController`'s underlying data is `controller:didChangeObject:atIndexPath:forChangeType:newIndexPath:`,\
    \ which is called when any object in your result set changes. As parameters, you're\
    \ passed the object that changed, the original index path (in the table view)\
    \ of the object before the change, the change type, and the new index path (in\
    \ the table view). The possible values for the change type are the values listed\
    \ in [Table 9–1](#Chapter09.html#tab_9_1). Depending on which change type you're\
    \ passed, you should update the table accordingly. The following implementation\
    \ does just that:\n\n```\n- (void)controller:(NSFetchedResultsController *)controller\
    \ didChangeObject:(id)anObject atIndexPath:(NSIndexPath *)indexPath forChangeType:(NSFetchedResultsChangeType)type\
    \ newIndexPath:(NSIndexPath *)newIndexPath {\n    switch(type) {\n        // Data\
    \ was inserted -- insert the data into the table view\n        case NSFetchedResultsChangeInsert:\n\
    \            [self.tableView insertRowsAtIndexPaths:[NSArray arrayWithObject:newIndexPath]\
    \ withRowAnimation:UITableViewRowAnimationFade];\n            break;\n```"
  raw: '#### Responding to Data Change


    You might notice that the all-player view doesn''t respond well to change. If
    you add, edit, or delete players or teams in the League Manager tab, then switch
    over to the Players tab, you don''t see any of your changes reflected. You could
    solve this by making the table reload its data any time the view appears, like
    so:


    `- (void)viewWillAppear:(BOOL)animated {`

    `  [super viewWillAppear:animated];`

