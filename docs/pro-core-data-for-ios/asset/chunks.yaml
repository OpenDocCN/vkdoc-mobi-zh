- fmt: "# Fetching Results\n\nThe next class of interest is the `MasterViewController`.\
    \ Opening its header file (`MasterViewController.h`) reveals two properties:\n\
    \n```\n@property (strong, nonatomic) NSFetchedResultsController *fetchedResultsController;\n\
    @property (strong, nonatomic) NSManagedObjectContext *managedObjectContext;\n\
    ```\n\nThese properties are defined using the same syntax as the definitions of\
    \ any Objective-C class properties. The `NSFetchedResultsController` is a type\
    \ of controller provided by the Core Data framework that helps manage results\
    \ from queries. `NSManagedObjectContext` is a handle to the application's persistent\
    \ store that provides a context, or environment, in which the managed objects\
    \ can exist.\n\nThe implementation of the `MasterViewController`, found in `MasterViewController.m`,\
    \ shows how to interact with the Core Data framework to store and retrieve data.\
    \ The `MasterViewController` implementation provides an explicit getter for the\
    \ `fetchedResultsController` property that preconfigures it to fetch data from\
    \ the data store.\n\nThe first step in creating the fetch controller consists\
    \ of creating a request that will retrieve `Event` entities, as shown in this\
    \ code from the `fetchedResultsController` accessor:\n\n```\nNSFetchRequest *fetchRequest\
    \ = [[NSFetchRequest alloc] init];\nNSEntityDescription *entity = [NSEntityDescription\
    \ entityForName:@\"Event\"\n inManagedObjectContext:self.managedObjectContext];\n\
    [fetchRequest setEntity:entity];\n```\n\nThe result of the request can be ordered\
    \ using the sort descriptor from the Cocoa Foundation framework. The sort descriptor\
    \ defines the field to use for sorting and whether the sort is ascending or descending.\
    \ In this case, you sort by descending chronological order, like so:\n\n```\n\
    NSSortDescriptor *sortDescriptor = [[NSSortDescriptor alloc] initWithKey:\n@\"\
    timeStamp\" ascending:NO];\nNSArray *sortDescriptors = [[NSArray alloc] initWithObjects:sortDescriptor,\
    \ nil];\n[fetchRequest setSortDescriptors:sortDescriptors];\n```\n\nOnce you define\
    \ the request, you can use it to construct the fetch controller. Because the `MasterViewController`\
    \ implements `NSFetchedResultsControllerDelegate`, it can be set as the `NSFetchedResultsController`'s\
    \ delegate so that it is automatically notified as the result set changes and\
    \ so that it updates its view appropriately. You could get the same results by\
    \ invoking the `executeFetchRequest` of the managed object context, but you would\
    \ not benefit from the other advantages that come from using the `NSFetchedResultsController`\
    \ such as the seamless integration with the `UITableView`, as you'll see later\
    \ in this section and in [Chapter 9](#Chapter09.html#ch9). Here is the code that\
    \ constructs the fetch controller:\n\n```\nNSFetchedResultsController *aFetchedResultsController\
    \ = [[NSFetchedResultsController\n alloc] initWithFetchRequest:fetchRequest managedObjectContext:\n\
    self.managedObjectContext sectionNameKeyPath:nil cacheName:@\"Master\"];\naFetchedResultsController.delegate\
    \ = self;\nself.fetchedResultsController = aFetchedResultsController;\n```\n\n\
    **NOTE:** You may have noticed that the `initWithFetchRequest` shown earlier uses\
    \ a parameter called `cacheName`. You could pass `nil` for the `cacheName` parameter\
    \ to prevent caching, but naming a cache indicates to Core Data to check for a\
    \ cache with a name matching the passed name and see whether it already contains\
    \ the same fetch request definition. If it does find a match, it will reuse the\
    \ cached results. If it finds a cache entry by that name but the request doesn't\
    \ match, then it is deleted. If it doesn't find it at all, then the request is\
    \ executed, and the cache entry is created for the next time. This is obviously\
    \ an optimization that aims to prevent executing the same request over and over.\
    \ Core Data manages its caches intelligently so that if the results are updated\
    \ by another call, the cache is removed if affected.\n\nFinally, you tell the\
    \ controller to execute its query to start retrieving results. To do this, use\
    \ the `performFetch` method.\n\n```\nNSError *error = nil;\nif (![self.fetchedResultsController\
    \ performFetch:&error]) {\n  NSLog(@\"Unresolved error %@, %@\", error, [error\
    \ userInfo]);\n  abort();\n}\n```\n\nYou can see the entire getter method for\
    \ `fetchedResultsController` in [Listing 1–1](#Chapter01.html#list_1_1).\n\n**Listing\
    \ 1–1.** *The Entire Getter Method for fetchedResultsController*\n\n```\n- (NSFetchedResultsController\
    \ *)fetchedResultsController\n{\n  if (__fetchedResultsController != nil)\n  {\n\
    \    return __fetchedResultsController;\n  }\n\n  /*\n   Set up the fetched results\
    \ controller.\n   */\n  // Create the fetch request for the entity.\n  NSFetchRequest\
    \ *fetchRequest = [[NSFetchRequest alloc] init];\n  // Edit the entity name as\
    \ appropriate.\n  NSEntityDescription *entity = [NSEntityDescription entityForName:@\"\
    Event\" inManagedObjectContext:self.managedObjectContext];\n  [fetchRequest setEntity:entity];\n\
    \n  // Set the batch size to a suitable number.\n  [fetchRequest setFetchBatchSize:20];\n\
    \n  // Edit the sort key as appropriate.\n  NSSortDescriptor *sortDescriptor =\
    \ [[NSSortDescriptor alloc] initWithKey:@\"timeStamp\" ascending:NO];\n  NSArray\
    \ *sortDescriptors = [[NSArray alloc] initWithObjects:sortDescriptor, nil];\n\n\
    \  [fetchRequest setSortDescriptors:sortDescriptors];\n\n  // Edit the section\
    \ name key path and cache name if appropriate.\n  // nil for section name key\
    \ path means \"no sections\".\n  NSFetchedResultsController *aFetchedResultsController\
    \ = [[NSFetchedResultsController\nalloc] initWithFetchRequest:fetchRequest managedObjectContext:self.managedObjectContext\n\
    sectionNameKeyPath:nil cacheName:@\"Master\"];\n  aFetchedResultsController.delegate\
    \ = self;\n  self.fetchedResultsController = aFetchedResultsController;\n\n  \
    \      NSError *error = nil;\n        if (![self.fetchedResultsController performFetch:&error])\n\
    \  {\n    /*\n     Replace this implementation with code to handle the error appropriately.\n\
    \n     abort() causes the application to generate a crash log and terminate. You\
    \ should not use this function in a shipping application, although it may be useful\
    \ during development. If it is not possible to recover from the error, display\
    \ an alert panel that instructs the user to quit the application by pressing the\
    \ Home button.\n     */\n    NSLog(@\"Unresolved error %@, %@\", error, [error\
    \ userInfo]);\n    abort();\n        }\n\n  return __fetchedResultsController;\n\
    }   \n```\n\n`NSFetchedResultsController` behaves as a collection of managed objects,\
    \ similar to an `NSArray`, which makes it easy to use. In fact, it exposes a read-only\
    \ property called `fetchedObjects` that is of type `NSArray` to make things even\
    \ easier to access the objects it fetches. The `MasterViewController` class, which\
    \ also extends `UITableViewController`, demonstrates just how suited the `NSFetchedResultsController`\
    \ is to manage the table's content."
