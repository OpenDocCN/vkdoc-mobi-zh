  trans: "\n# 获取结果\n\n下一个值得关注的类是`MasterViewController`。打开它的头文件（`MasterViewController.h`）会看到两个属性：\n\
    \n```\n@property (strong, nonatomic) NSFetchedResultsController *fetchedResultsController;\n\
    @property (strong, nonatomic) NSManagedObjectContext *managedObjectContext;\n\
    ```\n\n这些属性的定义语法与任何 Objective-C 类属性相同。`NSFetchedResultsController`是 Core Data\
    \ 框架提供的一种控制器类型，用于帮助管理查询结果。`NSManagedObjectContext`则是应用持久化存储的一个句柄，它提供了一个上下文或环境，供托管对象在其中存在。\n\
    \n`MasterViewController`的实现（位于`MasterViewController.m`中）展示了如何与 Core Data 框架交互以存储和检索数据。`MasterViewController`的实现为`fetchedResultsController`属性提供了一个显式的\
    \ getter 方法，该方法预先配置了该属性，以便从数据存储中获取数据。\n\n创建获取控制器的第一步是创建一个用于检索`Event`实体的请求，如下面来自`fetchedResultsController`访问器的代码所示：\n\
    \n```\nNSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];\nNSEntityDescription\
    \ *entity = [NSEntityDescription entityForName:@\"Event\"\n inManagedObjectContext:self.managedObjectContext];\n\
    [fetchRequest setEntity:entity];\n```\n\n请求的结果可以使用 Cocoa Foundation 框架中的排序描述符进行排序。排序描述符定义了用于排序的字段以及排序是升序还是降序。在本例中，按时间倒序排序，如下所示：\n\
    \n```\nNSSortDescriptor *sortDescriptor = [[NSSortDescriptor alloc] initWithKey:\n\
    @\"timeStamp\" ascending:NO];\nNSArray *sortDescriptors = [[NSArray alloc] initWithObjects:sortDescriptor,\
    \ nil];\n[fetchRequest setSortDescriptors:sortDescriptors];\n```\n\n一旦定义了请求，就可以用它来构建获取控制器。由于`MasterViewController`实现了`NSFetchedResultsControllerDelegate`，因此它可以被设置为`NSFetchedResultsController`的委托，以便在结果集发生变化时自动收到通知，并相应地更新其视图。你也可以通过调用托管对象上下文的`executeFetchRequest`方法获得相同的结果，但这样你就无法享受到使用`NSFetchedResultsController`带来的其他优势，例如与`UITableView`的无缝集成，稍后你将在本节和第\
    \ 9 章中看到这一点。以下是构建获取控制器的代码：\n\n```\nNSFetchedResultsController *aFetchedResultsController\
    \ = [[NSFetchedResultsController\n alloc] initWithFetchRequest:fetchRequest managedObjectContext:\n\
    self.managedObjectContext sectionNameKeyPath:nil cacheName:@\"Master\"];\naFetchedResultsController.delegate\
    \ = self;\nself.fetchedResultsController = aFetchedResultsController;\n```\n\n\
    **注意：** 你可能已经注意到，前面的`initWithFetchRequest`使用了一个名为`cacheName`的参数。你可以将`cacheName`参数设为`nil`来阻止缓存，但指定一个缓存名称则告诉\
    \ Core Data 去检查是否存在一个名称匹配的缓存，并查看它是否已经包含了相同的获取请求定义。如果找到匹配，它将重用缓存的结果。如果找到同名缓存条目但请求不匹配，则该缓存会被删除。如果完全找不到，则执行该请求，并为下次使用创建缓存条目。这显然是一种优化，旨在防止重复执行相同的请求。Core\
    \ Data 会智能地管理其缓存，以便如果结果被其他调用更新，受影响的缓存会被移除。\n\n最后，你需要指示控制器执行其查询以开始检索结果。为此，请使用`performFetch`方法。\n\
    \n```\nNSError *error = nil;\nif (![self.fetchedResultsController performFetch:&error])\
    \ {\n  NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n  abort();\n\
    }\n```\n\n你可以在代码清单 1–1 中看到`fetchedResultsController`的完整 getter 方法。\n\n**代码清单 1–1.**\
    \ fetchedResultsController 的完整 Getter 方法\n\n```\n- (NSFetchedResultsController\
    \ *)fetchedResultsController\n{\n  if (__fetchedResultsController != nil)\n  {\n\
    \    return __fetchedResultsController;\n  }\n\n  /*\n   设置获取结果控制器。\n   */\n \
    \ // 为实体创建获取请求。\n  NSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];\n\
    \  // 根据实际情况编辑实体名称。\n  NSEntityDescription *entity = [NSEntityDescription entityForName:@\"\
    Event\" inManagedObjectContext:self.managedObjectContext];\n  [fetchRequest setEntity:entity];\n\
    \n  // 将批处理大小设置为合适的数值。\n  [fetchRequest setFetchBatchSize:20];\n\n  // 根据实际情况编辑排序键。\n\
    \  NSSortDescriptor *sortDescriptor = [[NSSortDescriptor alloc] initWithKey:@\"\
    timeStamp\" ascending:NO];\n  NSArray *sortDescriptors = [[NSArray alloc] initWithObjects:sortDescriptor,\
    \ nil];\n\n  [fetchRequest setSortDescriptors:sortDescriptors];\n\n  // 根据实际情况编辑分区名称键路径和缓存名称。\n\
    \  // 分区名称键路径为 nil 表示“无分区”。\n  NSFetchedResultsController *aFetchedResultsController\
    \ = [[NSFetchedResultsController\nalloc] initWithFetchRequest:fetchRequest managedObjectContext:self.managedObjectContext\n\
    sectionNameKeyPath:nil cacheName:@\"Master\"];\n  aFetchedResultsController.delegate\
    \ = self;\n  self.fetchedResultsController = aFetchedResultsController;\n\n  \
    \      NSError *error = nil;\n        if (![self.fetchedResultsController performFetch:&error])\n\
    \  {\n    /*\n     用能恰当处理错误的代码替换此实现。\n\n     abort() 会导致应用程序生成崩溃日志并终止。虽然此函数在开发过程中可能有用，但不应在正式发布的应用程序中使用。如果无法从错误中恢复，请显示一个警告面板，指示用户通过按\
    \ Home 键退出应用程序。\n     */\n    NSLog(@\"Unresolved error %@, %@\", error, [error\
    \ userInfo]);\n    abort();\n        }\n\n  return __fetchedResultsController;\n\
    }   \n```\n\n`NSFetchedResultsController`的行为类似于托管对象的集合，与`NSArray`类似，这使得它易于使用。事实上，它公开了一个名为`fetchedObjects`的只读属性，该属性的类型是`NSArray`，这使得访问它获取的对象更加容易。同样继承自`UITableViewController`的`MasterViewController`类，正好演示了`NSFetchedResultsController`在管理表格内容方面的优越性。\n"
- fmt: "### Inserting New Objects\n\nA quick glance at the `insertNewObject:` method\
    \ shows how new events (the managed objects) are created and added to the persistent\
    \ store. Managed objects are defined by the entity description from the data model\
    \ and can live only within a context. The first step is to get a hold of the current\
    \ context as well as the entity definition. In this case, instead of explicitly\
    \ naming the entity, you reuse the entity definitions that are attached to the\
    \ fetched results controller:\n\n```\nNSManagedObjectContext *context = [self.fetchedResultsController\
    \ managedObjectContext];\nNSEntityDescription *entity = [[self.fetchedResultsController\
    \ fetchRequest] entity];\n```\n\nNow that you've gathered all the elements needed\
    \ to bring the new managed object to existence, you create the `Event` object\
    \ and set its `timeStamp` value.\n\n```\nNSManagedObject *newManagedObject = [NSEntityDescription\n\
    \    insertNewObjectForEntityForName:[entity name] inManagedObjectContext:context];\n\
    [newManagedObject setValue:[NSDate date] forKey:@\"timeStamp\"];\n```\n\nThe last\
    \ step of the process is to tell Core Data to save changes to its context. The\
    \ obvious change is the object you just created, but keep in mind that calling\
    \ the `save:` method will also affect any other unsaved changes to the context.\n\
    \n```\nNSError *error = nil;\nif (![context save:&error]) {\n    NSLog(@\"Unresolved\
    \ error %@, %@\", error, [error userInfo]);\n    abort();\n}\n```\n\nThe complete\
    \ method for inserting the new `Event` object is shown in [Listing 1–2](#Chapter01.html#list_1_2).\n\
    \n**Listing 1–2.** *The Complete Method for Inserting the New Event Object*\n\n\
    ```\n- (void)insertNewObject {\n    // Create a new instance of the entity managed\
    \ by the fetched results controller.\n    NSManagedObjectContext *context = [self.fetchedResultsController\
    \ managedObjectContext];\n    NSEntityDescription *entity = [[self.fetchedResultsController\
    \ fetchRequest] entity];\n    NSManagedObject *newManagedObject = [NSEntityDescription\
    \ insertNewObjectForEntityForName:[entity name] inManagedObjectContext:context];\n\
    \n    // If appropriate, configure the new managed object.\n    // Normally you\
    \ should use accessor methods, but using KVC here avoids the need to add a custom\
    \ class to the template.\n    [newManagedObject setValue:[NSDate date] forKey:@\"\
    timeStamp\"];\n\n    // Save the context.\n    NSError *error = nil;\n    if (![context\
    \ save:&error]) {\n        NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n\
    \        abort();\n    }\n}\n```\n\n### Initializing the Managed Context\n\nObviously,\
    \ none of this can happen without initializing the managed context first. This\
    \ is the role of the application delegate. In a Core Data–enabled application,\
    \ the delegate must expose three properties.\n\n```\n@property (readonly, strong,\
    \ nonatomic) NSManagedObjectContext *managedObjectContext;\n@property (readonly,\
    \ strong, nonatomic) NSManagedObjectModel *managedObjectModel;\n@property (readonly,\
    \ strong, nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n\
    ```\n\nNote that they are all marked as read-only, which prevents any other component\
    \ in the application from setting them directly. A closer look at `BasicApplicationAppDelegate.m`\
    \ shows that all three properties have explicit getter methods.\n\nFirst, the\
    \ managed object model is derived from the data model (`BasicApplication.xcdatamodel`)\
    \ and loaded.\n\n```\n- (NSManagedObjectModel *)managedObjectModel\n{\n    if\
    \ (__managedObjectModel != nil) {\n        return __managedObjectModel;\n    }\n\
    \    NSURL *modelURL = [[NSBundle mainBundle] URLForResource:@\"BasicApplication\"\
    \ withExtension:@\"momd\"];\n    __managedObjectModel = [[NSManagedObjectModel\
    \ alloc] initWithContentsOfURL:modelURL];\n    return __managedObjectModel;\n\
    }\n```\n\nThen a persistent store is created to support the model. In this case,\
    \ as well as in most Core Data scenarios, the persistent store is backed by a\
    \ SQLite database. The managed object model is a logical representation of the\
    \ data store, while the persistent store is the materialization of that data store.\n\
    \n```\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator {\n    if\
    \ (__persistentStoreCoordinator != nil) {\n        return __persistentStoreCoordinator;\n\
    \    }\n\n    NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
    BasicApplication.sqlite\"];\n\n    NSError *error = nil;\n    __persistentStoreCoordinator\
    \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
    \    if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
    \ configuration:nil URL:storeURL options:nil error:&error]) {\n        NSLog(@\"\
    Unresolved error %@, %@\", error, [error userInfo]);\n        abort();\n    }\n\
    \n    return __persistentStoreCoordinator;\n}\n```\n\nFinally, the managed object\
    \ context is created.\n\n```\n- (NSManagedObjectContext *)managedObjectContext\
    \ {\n    if (__managedObjectContext != nil) {\n        return __managedObjectContext;\n\
    \    }\n\n    NSPersistentStoreCoordinator *coordinator = [self persistentStoreCoordinator];\n\
    \    if (coordinator != nil) {\n        __managedObjectContext = [[NSManagedObjectContext\
    \ alloc] init];\n        [__managedObjectContext setPersistentStoreCoordinator:coordinator];\n\
    \    }\n    return __managedObjectContext;\n}\n```\n\nThe context is used throughout\
    \ the application as the single interface with the Core Data framework and the\
    \ persistent store, as [Figure 1–8](#Chapter01.html#fig_1_8) demonstrates.\n\n\
    ![images](images/0108.jpg)\n\n**Figure 1–8.** *Core Data initialization sequence*\n\
    \nLastly, everything is put in motion when the application delegate's `application:didFinishLaunchingWithOptions:`\
    \ method is called.\n\n```\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions\n{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\n    // Override point for customization after application\
    \ launch.\n\n    MasterViewController *controller = [[MasterViewController alloc]\
    \ initWithNibName:@\"MasterViewController\" bundle:nil];\n    self.navigationController\
    \ = [[UINavigationController alloc] initWithRootViewController:controller];\n\
    \    self.window.rootViewController = self.navigationController;\n    [self.window\
    \ makeKeyAndVisible];\n    return YES;\n}\n```\n\nCalling the getter for the delegate's\
    \ `managedObjectContext` starts a chain reaction in which `- (NSManagedObjectContext\
    \ *)managedObjectContext` calls `- (NSPersistentStoreCoordinator *)persistentStoreCoordinator`\
    \ and then in turn calls `- (NSManagedObjectModel *)managedObjectModel`. The call\
    \ to `managedObjectContext` therefore initializes the entire Core Data stack and\
    \ readies Core Data for use.\n\nIf you followed along with Xcode on your machine,\
    \ you have a basic Core Data–based application, generated from Xcode's templates,\
    \ that you can run to create, store, and retrieve event data. What if, however,\
    \ you have an existing application to which you want to add the power of Core\
    \ Data? The next section demonstrates how to add Core Data to an existing iOS\
    \ application."
  raw: '#### Inserting New Objects


    A quick glance at the `insertNewObject:` method shows how new events (the managed
    objects) are created and added to the persistent store. Managed objects are defined
    by the entity description from the data model and can live only within a context.
    The first step is to get a hold of the current context as well as the entity definition.
    In this case, instead of explicitly naming the entity, you reuse the entity definitions
    that are attached to the fetched results controller:


    `NSManagedObjectContext *context = [self.fetchedResultsController managedObjectContext];`

    `NSEntityDescription *entity = [[self.fetchedResultsController fetchRequest] entity];`


    Now that you''ve gathered all the elements needed to bring the new managed object
    to existence, you create the `Event` object and set its `timeStamp` value.


    `NSManagedObject *newManagedObject = [NSEntityDescription`

    ` insertNewObjectForEntityForName:[entity name] inManagedObjectContext:context];`

    `[newManagedObject setValue:[NSDate date] forKey:@"timeStamp"];`


    The last step of the process is to tell Core Data to save changes to its context.
    The obvious change is the object you just created, but keep in mind that calling
    the `save.` method will also affect any other unsaved changes to the context.


    `NSError *error = nil;`

    `if (![context save:&error]) {`

    `  NSLog(@"Unresolved error %@, %@", error, [error userInfo]);`

    `  abort();`

    `}`


    The complete method for inserting the new `Event` object is shown in [Listing
    1–2](#Chapter01.html#list_1_2).


    **Listing 1–2.** *The Complete Method for Inserting the New Event Object*


    `- (void)insertNewObject {`

    `  // Create a new instance of the entity managed by the fetched results controller.`

    `  NSManagedObjectContext *context = [self.fetchedResultsController managedObjectContext];`

    `  NSEntityDescription *entity = [[self.fetchedResultsController fetchRequest]
    entity];`

    `  NSManagedObject *newManagedObject = [NSEntityDescription insertNewObjectForEntityForName:[entity
    name] inManagedObjectContext:context];`


    `  // If appropriate, configure the new managed object.`

    `  // Normally you should use accessor methods, but using KVC here avoids the
    need to add`

    `a custom class to the template.`

    `  [newManagedObject setValue:[NSDate date] forKey:@"timeStamp"];`


    `  // Save the context.`

    `  NSError *error = nil;`

    `  if (![context save:&error]) {`

    `    NSLog(@"Unresolved error %@, %@", error, [error userInfo]);`

    `    abort();`

    `  }`

    `}`


    #### Initializing the Managed Context


    Obviously, none of this can happen without initializing the managed context first.
    This is the role of the application delegate. In a Core Data–enabled application,
    the delegate must expose three properties.


    `@property (readonly, strong, nonatomic) NSManagedObjectContext *managedObjectContext;`

    `@property (readonly, strong, nonatomic) NSManagedObjectModel *managedObjectModel;`

    `@property (readonly, strong, nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;`


    Note that they are all marked as read-only, which prevents any other component
    in the application from setting them directly. A closer look at `BasicApplicationAppDelegate.m`
    shows that all three properties have explicit getter methods.


    First, the managed object model is derived from the data model (`BasicApplication.xcdatamodel`)
    and loaded.


    `- (NSManagedObjectModel *)managedObjectModel`

    `{`

    `    if (__managedObjectModel != nil)`

    `    {`

    `        return __managedObjectModel;`

    `    }`

    `    NSURL *modelURL = [[NSBundle mainBundle] URLForResource:@"BasicApplication"
    withExtension:@"momd"];`

    `    __managedObjectModel = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];`

    `    return __managedObjectModel;`

    `}`


    Then a persistent store is created to support the model. In this case, as well
    as in most Core Data scenarios, the persistent store is backed by a SQLite database.
    The managed object model is a logical representation of the data store, while
    the persistent store is the materialization of that data store.


    `- (NSPersistentStoreCoordinator *)persistentStoreCoordinator {`

    `  if (__persistentStoreCoordinator != nil) {`

    `    return __persistentStoreCoordinator;`

    `  }`


    `  NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@"BasicApplication.sqlite"];`


    `  NSError *error = nil;`

    `  __persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self
    managedObjectModel]];`

    `  if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType
    configuration:nil URL:storeURL options:nil error:&error]) {`

    `    NSLog(@"Unresolved error %@, %@", error, [error userInfo]);`

    `    abort();`

    `  }`


    `  return __persistentStoreCoordinator;`

    `}`


    Finally, the managed object context is created.


    `- (NSManagedObjectContext *)managedObjectContext {`

    `  if (__managedObjectContext != nil) {`

    `    return __managedObjectContext;`

    `  }`


    `  NSPersistentStoreCoordinator *coordinator = [self persistentStoreCoordinator];`

    `  if (coordinator != nil) {`

    `    __managedObjectContext = [[NSManagedObjectContext alloc] init];`

    `    [__managedObjectContext setPersistentStoreCoordinator:coordinator];`

    `  }`

    `  return __managedObjectContext;`

    `}`


    The context is used throughout the application as the single interface with the
    Core Data framework and the persistent store, as [Figure 1–8](#Chapter01.html#fig_1_8)
    demonstrates.


    ![images](images/0108.jpg)


    **Figure 1–8.** *Core Data initialization sequence*


    Lastly, everything is put in motion when the application delegate''s `application:didFinishLaunchingWithOptions:`
    method is called.


    `- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary
    *)launchOptions`

    `{`

    `    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];`

    `    // Override point for customization after application launch.`


    `  MasterViewController *controller = [[MasterViewController alloc] initWithNibName:@"MasterViewController"
    bundle:nil];`

    `  self.navigationController = [[UINavigationController alloc] initWithRootViewController:controller];`

    `  self.window.rootViewController = self.navigationController;`

    `    [self.window makeKeyAndVisible];`

    `    return YES;`

    `}`


    Calling the getter for the delegate''s `managedObjectContext` starts a chain reaction
    in which `-(NSManagedObjectContext *)managedObjectContext`, calls `-(NSPersistentStoreCoordinator
    *)persistentStoreCoordinator` and then in turns calls `-(NSManagedObjectModel
    *)managedObjectModel`. The call to `managedObjectContext` therefore initializes
    the entire Core Data stack and readies Core Data for use.


    If you followed along with Xcode on your machine, you have a basic Core Data–based
    application, generated from Xcode''s templates, that you can run to create, store,
    and retrieve event data. What if, however, you have an existing application to
    which you want to add the power of Core Data? The next section demonstrates how
    to add Core Data to an existing iOS application.'
  trans: "\n### 插入新对象\n\n快速浏览`insertNewObject:`方法，即可了解如何创建新事件（托管对象）并将其添加到持久化存储中。托管对象由数据模型中的实体描述定义，并且只能存在于上下文之中。第一步是获取当前上下文以及实体定义。在本例中，你无需显式命名实体，而是复用已附加到获取结果控制器中的实体定义：\n\
    \n```\nNSManagedObjectContext *context = [self.fetchedResultsController managedObjectContext];\n\
    NSEntityDescription *entity = [[self.fetchedResultsController fetchRequest] entity];\n\
    ```\n\n既然已经收集了创建新托管对象所需的所有元素，接下来就可以创建`Event`对象并设置其`timeStamp`值。\n\n```\nNSManagedObject\
    \ *newManagedObject = [NSEntityDescription\n    insertNewObjectForEntityForName:[entity\
    \ name] inManagedObjectContext:context];\n[newManagedObject setValue:[NSDate date]\
    \ forKey:@\"timeStamp\"];\n```\n\n该过程的最后一步是告知 Core Data 将更改保存到其上下文中。显而易见的更改是你刚刚创建的对象，但请记住，调用`save:`方法也会影响上下文中其他任何未保存的更改。\n\
    \n```\nNSError *error = nil;\nif (![context save:&error]) {\n    NSLog(@\"Unresolved\
    \ error %@, %@\", error, [error userInfo]);\n    abort();\n}\n```\n\n插入新`Event`对象的完整方法如列表\
    \ 1–2 所示。\n\n**列表 1–2.** *插入新事件对象的完整方法*\n\n```\n- (void)insertNewObject {\n  \
    \  // 创建由获取结果控制器管理的实体的一个新实例。\n    NSManagedObjectContext *context = [self.fetchedResultsController\
    \ managedObjectContext];\n    NSEntityDescription *entity = [[self.fetchedResultsController\
    \ fetchRequest] entity];\n    NSManagedObject *newManagedObject = [NSEntityDescription\
    \ insertNewObjectForEntityForName:[entity name] inManagedObjectContext:context];\n\
    \n    // 如果合适，配置新托管对象。\n    // 通常应使用存取方法，但此处使用 KVC 可避免向模板中添加自定义类。\n    [newManagedObject\
    \ setValue:[NSDate date] forKey:@\"timeStamp\"];\n\n    // 保存上下文。\n    NSError\
    \ *error = nil;\n    if (![context save:&error]) {\n        NSLog(@\"Unresolved\
    \ error %@, %@\", error, [error userInfo]);\n        abort();\n    }\n}\n```\n\
    \n### 初始化托管上下文\n\n显然，如果不先初始化托管上下文，上述所有操作都无法进行。这是应用程序委托的职责。在启用 Core Data 的应用程序中，委托必须暴露三个属性。\n\
    \n```\n@property (readonly, strong, nonatomic) NSManagedObjectContext *managedObjectContext;\n\
    @property (readonly, strong, nonatomic) NSManagedObjectModel *managedObjectModel;\n\
    @property (readonly, strong, nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n\
    ```\n\n请注意，它们都被标记为只读，这可以防止应用程序中的任何其他组件直接设置它们。仔细查看`BasicApplicationAppDelegate.m`会发现，这三个属性都有显式的\
    \ getter 方法。\n\n首先，托管对象模型从数据模型（`BasicApplication.xcdatamodel`）派生并加载。\n\n```\n\
    - (NSManagedObjectModel *)managedObjectModel\n{\n    if (__managedObjectModel\
    \ != nil) {\n        return __managedObjectModel;\n    }\n    NSURL *modelURL\
    \ = [[NSBundle mainBundle] URLForResource:@\"BasicApplication\" withExtension:@\"\
    momd\"];\n    __managedObjectModel = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];\n\
    \    return __managedObjectModel;\n}\n```\n\n然后，创建一个持久化存储来支持该模型。在本例中，与大多数 Core\
    \ Data 场景一样，持久化存储由 SQLite 数据库提供支持。托管对象模型是数据存储的逻辑表示，而持久化存储则是该数据存储的具体实现。\n\n```\n\
    - (NSPersistentStoreCoordinator *)persistentStoreCoordinator {\n    if (__persistentStoreCoordinator\
    \ != nil) {\n        return __persistentStoreCoordinator;\n    }\n\n    NSURL\
    \ *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
    BasicApplication.sqlite\"];\n\n    NSError *error = nil;\n    __persistentStoreCoordinator\
    \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
    \    if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
    \ configuration:nil URL:storeURL options:nil error:&error]) {\n        NSLog(@\"\
    Unresolved error %@, %@\", error, [error userInfo]);\n        abort();\n    }\n\
    \n    return __persistentStoreCoordinator;\n}\n```\n\n最后，创建托管对象上下文。\n\n```\n-\
    \ (NSManagedObjectContext *)managedObjectContext {\n    if (__managedObjectContext\
    \ != nil) {\n        return __managedObjectContext;\n    }\n\n    NSPersistentStoreCoordinator\
    \ *coordinator = [self persistentStoreCoordinator];\n    if (coordinator != nil)\
    \ {\n        __managedObjectContext = [[NSManagedObjectContext alloc] init];\n\
    \        [__managedObjectContext setPersistentStoreCoordinator:coordinator];\n\
    \    }\n    return __managedObjectContext;\n}\n```\n\n该上下文在整个应用程序中被用作与 Core Data\
    \ 框架和持久化存储交互的唯一接口，如图 1–8 所示。\n\n![images](img/0108.jpg)\n\n**图 1–8.** *Core Data\
    \ 初始化序列*\n\n最后，当应用程序委托的`application:didFinishLaunchingWithOptions:`方法被调用时，一切开始运作。\n\
    \n```\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions\n{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\n    // 应用程序启动后的自定义覆盖点。\n\n    MasterViewController *controller\
    \ = [[MasterViewController alloc] initWithNibName:@\"MasterViewController\" bundle:nil];\n\
    \    self.navigationController = [[UINavigationController alloc] initWithRootViewController:controller];\n\
    \    self.window.rootViewController = self.navigationController;\n    [self.window\
    \ makeKeyAndVisible];\n    return YES;\n}\n```\n\n调用委托的`managedObjectContext`属性的\
    \ getter 方法会触发一系列连锁反应：`- (NSManagedObjectContext *)managedObjectContext`调用`- (NSPersistentStoreCoordinator\
    \ *)persistentStoreCoordinator`，后者再调用`- (NSManagedObjectModel *)managedObjectModel`。因此，对`managedObjectContext`的调用会初始化整个\
    \ Core Data 栈，并使 Core Data 处于就绪状态。\n\n如果你在机器上跟随 Xcode 进行操作，那么你已经有了一个基于 Xcode 模板生成的基本\
    \ Core Data 应用程序，可以运行它来创建、存储和检索事件数据。但是，如果你有一个现有的应用程序，并希望为其添加 Core Data 的强大功能，该怎么办呢？下一节将演示如何向现有的\
    \ iOS 应用程序添加 Core Data。\n"
- fmt: '### Adding Core Data to an Existing Project


    Creating a new application and selecting the Use Core Data check box, as shown
    in the previous section, isn''t always possible. Frequently, developers start
    an application, write a lot of code, and only realize later that they need Core
    Data in their application. We''ve known developers who have refused to admit that
    they should just add Core Data by hand to an existing application. Instead, fueled
    by a desire to prove that they could write their own better persistence layer
    (rather than try to understand how to use the framework), they embarked in convoluted
    programming that led to less than adequate results. They confused persistence
    with obstinacy. In the spirit of making the jump easier, this section explains
    the steps involved with retrofitting an application in order to make it aware
    of and use Core Data.


    Enabling an application to leverage Core Data is a three-step process.


    1.  Add the Core Data framework.

    2.  Create a data model.

    3.  Initialize the managed object context.


    The next three sections walk you through these three steps so you can add Core
    Data support to any existing iOS application.


    #### Adding the Core Data Framework


    In the Objective-C world, libraries are referred to as *frameworks*. Expanding
    the Frameworks groups in the Xcode source tree shows that the project is aware
    of only a handful of frameworks. Typical iOS applications will at least have UIKit
    (the user interface framework for iOS), Foundation, and Core Graphics. The first
    step to add Core Data to an existing application consists of making the application
    aware of the Core Data framework by adding it to the project. To do this, perform
    the following steps:


    1.  Select the project on the left side of Xcode, which displays target settings
    on the right (see [Figure 1–9](#Chapter01.html#fig_1_9)).

    2.  Select the fourth tab, Build Phases, and open the section called Link Binary
    With Libraries (see [Figure 1–10](#Chapter01.html#fig_1_10)).

    3.  Click the + button below that section to see a list of frameworks you can
    add (see [Figure 1–11](#Chapter01.html#fig_1_11)).

    4.  Select CoreData.framework and click the Add button.

    5.  (Optional) Drag the `CoreData.framework` entry in the source list for your
    project to the Frameworks folder.


    ![images](images/0109.jpg)


    **Figure 1–9.** *Selecting the project to see target settings*


    ![images](images/0110.jpg)


    **Figure 1–10.** *Viewing Link Binary With Libraries settings*


    ![images](images/0111.jpg)


    **Figure 1–11.** *Selecting a Framework to link to*


    The `CoreData.framework` is now listed on the left side of Xcode. Now that the
    application is aware of the Core Data framework, the classes specific to that
    framework can be used without creating compilation errors.


    #### Creating the Data Model


    No Core Data application is complete without a data model. The data model describes
    all the entities that will be managed by the framework. For the sake of simplicity,
    the model created in this section contains a single class with a single attribute.
    The data model can be created in Xcode by selecting `File` ![images](images/U001.jpg)
    `New` ![images](images/U001.jpg) `New File` in the menu and picking the type Data
    Model from the iOS Core Data templates, as shown in [Figure 1–12](#Chapter01.html#fig_1_12).
    Click Next, name the data model `MyModel.xcdatamodeld`, as shown in [Figure 1–13](#Chapter01.html#fig_1_13),
    and click Save. This generates your new data model and opens it in Xcode (see
    [Figure 1–14](#Chapter01.html#fig_1_14)).


    ![images](images/0112.jpg)


    **Figure 1–12.** *Adding a data model*


    ![images](images/0113.jpg)


    **Figure 1–13.** *Naming your data model*


    Once the data model opens, you can add entities by clicking the Add Entity button
    at the bottom of the Xcode window. You can add properties to entities by selecting
    an entity and clicking and holding the Add Attribute button to the right of the
    Add Entity button, and selecting the type of property (attribute, relationship,
    or fetched property) from the drop-down menu. Xcode changes the label of this
    button to match the last property type you added. Simply clicking the button adds
    that type of property. For this example, create a single entity called `MyData`
    with a single attribute called `myAttribute` of type `String`, as [Figure 1–15](#Chapter01.html#fig_1_15)
    shows.


    ![images](images/0114.jpg)


    **Figure 1–14.** *Your new, empty data model*


    ![images](images/0115.jpg)


    **Figure 1–15.** *Adding an entity and attribute*'
