    `  NSLog(@"Unresolved error %@, %@", error, [error userInfo]);`

    `  abort();`

    `}`


    iOS offers three types of persistent stores by default, as shown in [Table 2–3](#Chapter02.html#tab_2_3).


    ![images](images/t0203.jpg)


    **NOTE:** Core Data on Mac OS X offers a fourth type (`NSXMLStoreType`) that uses
    XML files as the storage mechanism. This fourth type isn''t available on iOS,
    presumably because of iDevices'' slower processors and the processor-intensive
    nature of parsing XML. Parsing XML is possible on iDevices, however, as the existence
    of several iOS XML parsing libraries proves. Apple seems to have issued no official
    explanation for the absence of the XML store type on iOS.


    Typical users will find themselves using the SQLite type, which stores the data
    into a SQLite database running on your iDevice, most often or even exclusively.
    You should be aware of and understand the other types, however, because different
    circumstances may warrant using the other types. As useless as an in-memory "persistent"
    store may sound, a classic use of the in-memory storage is to cache information
    fetched from a remote server and create a local copy of the data to limit bandwidth
    usage and the associated latencies. The data remains persistent on the remote
    server and can always be fetched again.


