    **Figure 10–19.** *The System entity added to the Passwords configuration*


    You have now prepared your model for the persistent store split. All that is left
    to do is to create the persistent stores using the new configurations. For this,
    open `AppDelegate.m`, and change the `persistentStoreCoordinator:` method to match
    [Listing 10–17](#Chapter10.html#list_10_17).


    **Listing 10–17.** *The updated `persistentStoreCoordinator:` accessor*


