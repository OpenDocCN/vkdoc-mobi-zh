- fmt: "#### Adding, Editing, and Deleting Players\n\nThe `LeagueManager` application\
    \ is nearly complete; it lacks means only for adding, editing, and deleting players.\
    \ To accomplish these tasks, create a new `UIViewController` subclass, select\
    \ `UIViewController` in the “Subclass of” dropdown, and select “With XIB for user\
    \ interface.” Call this controller `PlayerViewController`. It looks similar to\
    \ the `TeamViewController` class and interface but has three fields: `firstName`,\
    \ `lastName`, and `email`. It also has a reference to the `MasterViewController`\
    \ instance so it can defer all Core Data storage and retrieval to that class.\
    \ It has a member for the team this player belongs to, and it also has a reference\
    \ to the player. If the player is `nil`, `PlayerViewController` knows to create\
    \ a new player. Otherwise, it knows to edit the existing player object. The user\
    \ interface has three buttons: one to save the player, one to cancel the operation\
    \ (add or edit), and one to delete the player. Because you want to display a confirmation\
    \ action sheet before actually deleting a player, you make `PlayerViewController`\
    \ implement the `UIActionSheetDelegate` protocol. See [Listing 3–4](#Chapter03.html#list_3_4)\
    \ for what `PlayerViewController.h` should look like.\n\n**Listing 3–4.** *PlayerViewController.h*\n\
    \n```\n#import <UIKit/UIKit.h>\n\n@class MasterViewController;\n\n@interface PlayerViewController\
    \ : UIViewController <UIActionSheetDelegate> {\n  IBOutlet UITextField *firstName;\n\
    \  IBOutlet UITextField *lastName;\n  IBOutlet UITextField *email;\n  NSManagedObject\
    \ *team;\n  NSManagedObject *player;\n  MasterViewController *masterController;\n\
    }\n@property (nonatomic, retain) UITextField *firstName;\n@property (nonatomic,\
    \ retain) UITextField *lastName;\n@property (nonatomic, retain) UITextField *email;\n\
    @property (nonatomic, retain) NSManagedObject *team;\n@property (nonatomic, retain)\
    \ NSManagedObject *player;\n@property (nonatomic, retain) MasterViewController\
    \ *masterController;\n\n- (IBAction)save:(id)sender;\n- (IBAction)cancel:(id)sender;\n\
    - (IBAction)confirmDelete:(id)sender;\n- (id)initWithMasterController:(MasterViewController\
    \ *)aMasterController team:\n(NSManagedObject *)aTeam player:(NSManagedObject\
    \ *)aPlayer;\n\n@end\n```\n\nNow, open the `PlayerViewController.m` file, import\
    \ `MasterViewController.h`, and add `@synthesize` lines for the various properties.\
    \ Add the `initWithMasterController:` method declared in `PlayerViewController.h`\
    \ to initialize this view controller with a `MasterViewController` instance, a\
    \ `team`, and a possibly-`nil` player. That method looks like this:\n\n```\n-\
    \ (id)initWithMasterController:(MasterViewController *)aMasterController team:\n\
    (NSManagedObject *)aTeam player:(NSManagedObject *)aPlayer {\n  if ((self = [super\
    \ init])) {\n    self.masterController = aMasterController;\n    self.team = aTeam;\n\
    \    self.player = aPlayer;\n  }\n  return self;\n}\n```\n\nUse the `viewDidLoad:`\
    \ method to take the values from the `player` managed object, if non-`nil`, and\
    \ put them in the `firstName`, `lastName`, and `email` fields. That method looks\
    \ like this:\n\n```\n- (void)viewDidLoad {\n  [super viewDidLoad];\n  if (player\
    \ != nil) {\n    firstName.text = [player valueForKey:@\"firstName\"];\n    lastName.text\
    \ = [player valueForKey:@\"lastName\"];\n    email.text = [player valueForKey:@\"\
    email\"];\n  }\n}\n```\n\nYour next step is to add methods to respond to the three\
    \ buttons. The `save:` and `cancel:` methods mirror the ones created for the `TeamViewController`\
    \ class; they look like this:\n\n```\n- (IBAction)save:(id)sender {\n  if (masterController\
    \ != nil) {\n    if (player != nil) {\n      [player setValue:firstName.text forKey:@\"\
    firstName\"];\n      [player setValue:lastName.text forKey:@\"lastName\"];\n \
    \     [player setValue:email.text forKey:@\"email\"];\n      [masterController\
    \ saveContext];\n    } else {\n      [masterController insertPlayerWithTeam:team\
    \ firstName:firstName.text\nlastName:lastName.text email:email.text];\n    }\n\
    \  }\n  [self dismissModalViewControllerAnimated:YES];\n}\n\n- (IBAction)cancel:(id)sender\
    \ {\n  [self dismissModalViewControllerAnimated:YES];\n}\n```\n\nThe `insertPlayerWithTeam:`\
    \ method in `MasterViewController` doesn't yet exist, so you'll create that in\
    \ a moment. First, though, implement the `confirmDelete:` method for the Delete\
    \ button in the user interface to call. This method doesn't delete the player\
    \ right away but instead presents an action sheet requesting users to confirm\
    \ their intentions. The implementation here first checks whether the player is\
    \ not `nil`. In other words, you can delete only existing players. You really\
    \ should show the Delete button only when editing a player, but in the interest\
    \ of maintaining focus on Core Data, keep things simple and ignore Delete button\
    \ presses when adding a player. The `confirmDelete:` method looks like this:\n\
    \n```\n- (IBAction)confirmDelete:(id)sender {\n  if (player != nil) {\n    UIActionSheet\
    \ *confirm = [[UIActionSheet alloc] initWithTitle:nil delegate:self\ncancelButtonTitle:@\"\
    Cancel\" destructiveButtonTitle:@\"Delete Player\"\notherButtonTitles:nil];\n\
    \    confirm.actionSheetStyle = UIActionSheetStyleBlackTranslucent;\n    [confirm\
    \ showInView:self.view];\n  }\n  }\n```\n\nNote that you pass `self` as the delegate\
    \ to the `UIActionSheet`'s initialization method. The Cocoa framework will call\
    \ the `clickedButtonAtIndex:` method of the delegate you pass, so implement that\
    \ method. It checks to see whether the clicked button was the Delete button and\
    \ then asks the master view controller to delete the player using a method, `deletePlayer:`,\
    \ that you must create in `MasterViewController`. The `clickedButtonAtIndex:`\
    \ method looks like this:\n\n```\n- (void)actionSheet:(UIActionSheet *)actionSheet\n\
    clickedButtonAtIndex:(NSInteger)buttonIndex {\n  if (buttonIndex == 0 && masterController\
    \ != nil) {\n    // The Delete button was clicked\n    [masterController deletePlayer:player];\n\
    \    [self dismissModalViewControllerAnimated:YES];\n  }\n}\n```\n\nNow, move\
    \ back to `MasterViewController.h` and declare the two methods, `insertPlayerWithTeam:`\
    \ and `deletePlayer:`, that `PlayerViewController` calls. Those declarations look\
    \ like this:\n\n```\n- (void)insertPlayerWithTeam:(NSManagedObject *)team firstName:(NSString\
    \ *)firstName\nlastName:(NSString *)lastName email:(NSString *)email;\n- (void)deletePlayer:(NSManagedObject\
    \ *)player;\n```\n\nOpen `MasterViewController.m`, and define those two methods.\
    \ The `insertPlayerWithTeam:` method looks similar to the `insertTeamWithName:`\
    \ method, with some important differences. The `insertTeamWithName:` method takes\
    \ advantage of the fetched results controller and its tie to `Team` entities,\
    \ while `Player` entities have no tie to the fetched results controller. The `insertPlayerWithTeam:`\
    \ method, then, creates a `Player` entity by explicitly passing the `Player` name\
    \ to the `insertNewObjectForEntityForName:` method. It also must create the relationship\
    \ to the appropriate `Team` entity by setting it as the value for the “team” key,\
    \ which is what the relationship is called in the data model. The `insertPlayerWithTeam:`\
    \ method looks like this:"
  raw: '#### Adding, Editing, and Deleting Players


    The League Manager application is nearly complete; it lacks means only for adding,
    editing, and deleting players. To accomplish these tasks, create a new `UIViewController`
    subclass, select `UIViewController` in the “Subclass of” dropdown, and select
    “With XIB for user interface.” Call this controller **PlayerViewController**.
    It looks similar to the `TeamViewController` class and interface but has three
    fields: `firstName`, `lastName`, and `email`. It also has a reference to the `MasterViewController`
    instance so it can defer all Core Data storage and retrieval to that class. It
    has a member for the team this player belongs to, and it also has a reference
    to the player. If the player is `nil`, `PlayerViewController` knows to create
    a new player. Otherwise, it knows to edit the existing player object. The user
    interface has three buttons: one to save the player, one to cancel the operation
    (add or edit), and one to delete the player. Because you want to display a confirmation
    action sheet before actually deleting a player, you make `PlayerViewController`
    implement the `UIActionSheetDelegate` protocol. See [Listing 3–4](#Chapter03.html#list_3_4)
    for what `PlayerViewController.h` should look like.


