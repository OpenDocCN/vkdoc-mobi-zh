- fmt: "### Using an In-Memory Persistent Store\n\nIn the previous section, you built\
    \ a Core Data–based application that uses the default SQLite persistent store\
    \ type. This section deals with an alternate type: the in-memory persistent store.\
    \ Let's take a look at how to switch the store type before elaborating on why\
    \ you would ever want to use this type of store.\n\nChanging the store type Core\
    \ Data uses for your application is as simple as specifying the new type when\
    \ creating the persistent store coordinator in the application delegate. The code\
    \ for the `persistentStoreCoordinator:` method in `League_ManagerAppDelegate.m`\
    \ now looks like that in [Listing 3–5](#Chapter03.html#list_3_5), with the updated\
    \ code in bold.\n\n**Listing 3–5.** *The `persistentStoreCoordinator:` Method\
    \ in `League_ManagerAppDelegate.m`*\n\n```\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\
    \ {\n  if (__persistentStoreCoordinator != nil) {\n    return __persistentStoreCoordinator;\n\
    \  }\n\n//  NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
    League_Manager.sqlite\"];\n\n  NSError *error = nil;\n  __persistentStoreCoordinator\
    \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
    \  if (![__persistentStoreCoordinator addPersistentStoreWithType:NSInMemoryStoreType\
    \ configuration:nil URL:nil options:nil error:&error]) {\n    NSLog(@\"Unresolved\
    \ error %@, %@\", error, [error userInfo]);\n    abort();\n  }\n\n  return __persistentStoreCoordinator;\n\
    }\n```\n\nThe data store has been switched to in-memory. The first thing to notice\
    \ after launching the application again is that any data you previously had in\
    \ your data store is gone. This happened because you switched the data store and\
    \ didn't try to migrate the data from the old store to the new one. [Chapter 8](#Chapter08.html#ch8)\
    \ explains how to migrate data between two persistent stores.\n\nThe life cycle\
    \ of the in-memory data store starts when the Core Data stack is initialized and\
    \ ends when the application stops.\n\n**NOTE:** Since iOS4 and the introduction\
    \ of multitasking to the iDevices, switching to another application does not necessarily\
    \ terminate the currently running application. Instead, it goes into the background.\
    \ The in-memory persistent store survives when an application is sent to the background\
    \ so that the data is still around when the application comes back to the foreground.\n\
    \nWhen working on a data management framework and thinking about the different\
    \ types of persistent stores that it should provide by default, an in-memory store\
    \ isn't the first idea that comes to mind. Trying to come up with a good reason\
    \ to use an in-memory store can be a challenge, but some legitimate reasons exist.\
    \ For example, local caching of remote data can benefit from in-memory persistent\
    \ stores. Consider a case in which your application is fed data from a remote\
    \ server. If your application executes a lot of queries, good software engineering\
    \ practices would prescribe the use of efficient data transfer. The remote server\
    \ may transfer the data in compressed packages to your client application, which\
    \ can then uncompress that data and store it in an in-memory store so that it\
    \ can be efficiently queried. In this situation, you would want the data to be\
    \ refreshed every time the application starts, or even periodically while the\
    \ application runs, so losing the in-memory data store would be acceptable.\n\n\
    [Figure 3–22](#Chapter03.html#fig_3_22) illustrates the start-up sequence of an\
    \ application that caches remote information locally in an in-memory store.\n\n\
    ![images](images/0322.jpg)\n\n**Figure 3–22.** *Caching remote information locally*\n\
    \nAs you develop your Core Data–backed iOS applications, consider using in-memory\
    \ data stores when applications don't require data persistence across invocations.\
    \ Traditional applications, however, that require that users' data doesn't disappear\
    \ simply because the application stopped running can't use this persistent store\
    \ type.\n\n### Creating Your Own Custom Persistent Store\n\nThe principle of abstracting\
    \ the persistent store implementation from the user forms the basis for the Core\
    \ Data framework. This abstraction makes it possible to change the persistent\
    \ store type among the different default types (`NSSQLiteStoreType`, `NSInMemoryStoreType`,\
    \ `NSBinaryStoreType`) without changing more than a line of your code. In some\
    \ cases, the default store types don't best accomplish what you are trying to\
    \ achieve. The Core Data framework offers a hook for creating custom store types\
    \ for these special cases. In this section, you create a new store type and use\
    \ it with the League Manager application.\n\nBefore getting into the implementation\
    \ itself, you should be aware that Core Data only allows you to create atomic\
    \ store types. An atomic store is a store that writes its entire content all at\
    \ once every time a save operation is executed. This effectively excludes the\
    \ ability to create SQL-based store types that could be backed by a database other\
    \ than SQLite where only the rows of data that are modified are affected in the\
    \ database. In this section, you build a file-based custom store that will store\
    \ its data in a comma-separated values (CSV) file except that you will use the\
    \ pipe (`|`) symbol to separate values.\n\nCustom data stores must extend the\
    \ `NSAtomicStore` class (a subclass of `NSPersistentStore`) that provides the\
    \ infrastructure necessary to hold the data. To get a better idea of how this\
    \ works, picture two internal layers inside the Core Data framework, as shown\
    \ in [Figure 3–23](#Chapter03.html#fig_3_23). Users interact with the layer that\
    \ contains `NSManagedObject`s and `NSManagedObjectContext`. The other layer performs\
    \ the actual persistence and contains the persistent store coordinator and the\
    \ persistent stores. In the case of custom stores, the persistence layer also\
    \ contains `NSAtomicStoreCacheNode`, which contains objects that hold the data\
    \ within this layer. The `NSAtomicStoreCacheNode` object is to the `NSAtomicStore`\
    \ what the `NSManagedObject` is to the `NSManagedObjectContext`.\n\n![images](images/0323.jpg)\n\
    \n**Figure 3–23.** *Two layers inside Core Data*"
