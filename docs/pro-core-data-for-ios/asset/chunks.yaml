  trans: "\n# NSManagedObject 与 NSAtomicStoreCacheNode 之间的映射\n\n要使自定义存储正常运行，您必须为三个额外的实用方法提供实现。第一个方法为给定的托管对象创建一个新的引用对象。引用对象为每个\
    \ `NSAtomicStoreCacheNode` 提供唯一标识符（类似于数据库主键）。`Reference` 对象之于 `NSAtomicStoreCacheNode`，就如同\
    \ `NSObjectID` 之于 `NSManagedObject`。由于自定义数据存储必须管理 `NSManagedObject` 和 `NSAtomicCacheNode`\
    \ 之间的数据传输，因此它必须能够为新创建的托管对象创建引用对象。为此，您再次使用 UUID。\n\n```\n- (id)newReferenceObjectForManagedObject:(NSManagedObject\
    \ *)managedObject {\n    NSString *uuid = [CustomStore makeUUID];\n    return\
    \ uuid;\n}\n```\n\n需要的第二个方法创建一个新的 `NSAtomicStoreCacheNode` 实例，以匹配新创建的 `NSManagedObject`。当添加一个新的\
    \ `NSManagedObject` 并需要持久化时，框架首先使用 `newReferenceObjectForManagedObject:` 方法获取一个引用对象。`NSAtomicCache`\
    \ 会跟踪 `NSObjectID` 和引用对象之间的映射。当 Core Data 将托管对象持久化到持久化存储时，它会调用 `newCacheNodeForManagedObject:`\
    \ 方法，顾名思义，该方法会创建一个新的 `NSAtomicStoreCacheNode`，作为 `NSManagedObject` 的对等节点。\n\n\
    ```\n- (NSAtomicStoreCacheNode *)newCacheNodeForManagedObject:(NSManagedObject\
    \ *)managedObject {\n    NSManagedObjectID *oid = [managedObject objectID];\n\
    \    id referenceID = [self referenceObjectForObjectID:oid];\n\n    NSAtomicStoreCacheNode*\
    \ node = [self nodeForReferenceObject:referenceID andObjectID:oid];\n    [self\
    \ updateCacheNode:node fromManagedObject:managedObject];\n    return node;\n}\n\
    ```\n\n`newCacheNodeForManagedObject:` 的实现会查找为托管对象创建的引用对象，并创建一个链接到该引用 ID 的新缓存节点。最后，该方法使用\
    \ `updateCacheNode:fromManagedObject:` 方法将托管对象的数据复制到节点中。您的自定义存储还需要提供第三个方法的实现，如列表\
    \ 3–9 所示。\n\n**列表 3–9.** *`updateCacheNode:fromManagedObject:` 方法*\n\n```\n- (void)updateCacheNode:(NSAtomicStoreCacheNode\
    \ *)node\nfromManagedObject:(NSManagedObject *)managedObject {\n    // 确定托管对象的实体\n\
    \    NSEntityDescription *entity = managedObject.entity;\n\n    // 遍历实体中的所有属性\n\
    \    NSDictionary *attributes = [entity attributesByName];\n    for (NSString\
    \ *name in [attributes allKeys]) {\n        // 对于每个属性，将托管对象的值设置到节点中\n        [node\
    \ setValue:[managedObject valueForKey:name] forKey:name];\n    }\n\n    // 遍历实体中的所有关系\n\
    \    NSDictionary *relationships = [entity relationshipsByName];\n    for (NSString\
    \ *name in [relationships allKeys]) {\n        id value = [managedObject valueForKey:name];\n\
    \        // 如果这是对多关系...\n        if ([[relationships objectForKey:name] isToMany])\
    \ {\n            // ...获取所有目标对象\n            NSSet *set = (NSSet*)value;\n   \
    \         NSMutableSet *data = [NSMutableSet set];\n            for (NSManagedObject\
    \ *managedObject in set) {\n                // 对于关系中的每个目标对象，将缓存节点添加到集合中\n    \
    \            NSManagedObjectID *oid = [managedObject objectID];\n            \
    \    id referenceID = [self referenceObjectForObjectID:oid];\n               \
    \ NSAtomicStoreCacheNode* n = [self nodeForReferenceObject:referenceID andObjectID:oid];\n\
    \                [data addObject:n];\n            }\n            [node setValue:data\
    \ forKey:name];\n        } else {\n            // 这是对一关系，因此只需获取关系的单个目标节点\n   \
    \         NSManagedObject *managedObject = (NSManagedObject*)value;\n        \
    \    NSManagedObjectID *oid = [managedObject objectID];\n            id referenceID\
    \ = [self referenceObjectForObjectID:oid];\n            NSAtomicStoreCacheNode*\
    \ n = [self nodeForReferenceObject:referenceID andObjectID:oid];\n           \
    \ [node setValue:n forKey:name];\n        }\n    }\n}\n```\n\n该实现会查找给定托管对象的实体描述，并使用它来遍历属性和关系，以便将它们的值复制到节点中。\n\
    \n为了跟踪缓存节点，创建一个实用方法，给定一个引用对象，如果存在则返回匹配的 `NSAtomicStoreCacheNode`，否则创建一个新的。\n\n\
    ```\n- (NSAtomicStoreCacheNode *)nodeForReferenceObject:(id)reference\nandObjectID:(NSManagedObjectID\
    \ *)oid {\n    NSAtomicStoreCacheNode *node = [nodeCacheRef objectForKey:reference];\n\
    \    if (node == nil) {\n        node = [[NSAtomicStoreCacheNode alloc] initWithObjectID:oid];\n\
    \        [nodeCacheRef setObject:node forKey:reference];\n    }\n    return node;\n\
    }\n```\n\n`nodeForReferenceObject:andObjectID:` 的实现使用了一个名为 `nodeCacheRef` 的字典，因此需要在\
    \ `CustomStore.h` 头文件中声明它，如列表 3–10 所示。\n\n**列表 3–10.** *CustomStore.h*\n\n```\n\
    #import <Foundation/Foundation.h>\n\n@interface CustomStore : NSAtomicStore {\n\
    \    NSMutableDictionary *nodeCacheRef;\n}\n\n@end\n```\n\n在 `initWithPersistentStoreCoordinator:configurationName:URL:options:`\
    \ 方法中初始化 `nodeCacheRef`。\n\n```\n- (id)initWithPersistentStoreCoordinator:(NSPersistentStoreCoordinator\
    \ *)coordinator\nconfigurationName:(NSString *)configurationName URL:(NSURL *)url\
    \ options:(NSDictionary *)options {\n    self = [super initWithPersistentStoreCoordinator:coordinator\n\
    configurationName:configurationName URL:url options:options];\n    NSDictionary\
    \ *metadata = [CustomStore metadataForPersistentStoreWithURL:[self URL]\nerror:nil];\n\
    \    [self setMetadata:metadata];\n    nodeCacheRef = [NSMutableDictionary dictionary];\n\
    \    return self;\n}\n```\n"
- fmt: "#### Serializing the Data\n\nSo far, all you've done is implement utility\
    \ methods to deal with the metadata, initialize the data store, and perform the\
    \ data transfer between `NSManagedObject` instances and `NSAtomicStoreCacheNode`\
    \ instances. Until you implement the methods that read and write to the storage\
    \ device, however, the custom store has no use. When extending `NSAtomicStore`,\
    \ you are required to provide implementations for the `load:` and `save:` methods,\
    \ which serve as the meat of the custom store implementation. In this example,\
    \ start with the `save:` method. The code for the following `save:` method might\
    \ seem overwhelming at first, but if you take time to follow the code, you will\
    \ realize that it simply iterates through the cache nodes and writes attribute\
    \ values into the file, followed by relationship values. Attribute values are\
    \ converted into `NSString`s and appended to the pipe-delimited file as key-value\
    \ pairs in the form *attributeName=value*. Relationships work in a similar way\
    \ except that the value written is not the destination node itself but its reference\
    \ object as created by the `newReferenceObjectForManagedObject:` method. For one-to-many\
    \ relationships, the code writes a comma-delimited list of reference objects.\
    \ [Listing 3–11](#Chapter03.html#list_3_11) shows the `save:` method.\n\n**Listing\
    \ 3–11.** *The save: Method*\n\n```\n- (BOOL)save:(NSError **)error {\n    NSURL\
    \ *url = [self URL];\n\n    // First update the metadata\n    [CustomStore writeMetadata:[self\
    \ metadata] toURL:url];\n\n    NSString* dataFile = @\"\";\n    // Then write\
    \ the actual data\n    NSSet *nodes = [self cacheNodes];\n    NSAtomicStoreCacheNode\
    \ *node;\n    NSEnumerator *enumerator = [nodes objectEnumerator];\n\n    // Enumerate\
    \ through all the nodes\n    while ((node = [enumerator nextObject]) != nil) {\n\
    \        // Get the object ID and reference ID for each node\n        NSManagedObjectID\
    \ *oid = [node objectID];\n        id referenceID = [self referenceObjectForObjectID:oid];\n\
    \n        // Write the entity name and reference ID as the first two\n       \
    \ // values in the row\n        NSEntityDescription *entity = [oid entity];\n\
    \        dataFile = [dataFile stringByAppendingFormat:@\"%@|%@\", entity.name,\
    \ referenceID];\n\n        {   // Write all the attributes\n            NSDictionary\
    \ *attributes = [entity attributesByName];\n            NSAttributeDescription\
    \ *key = nil;\n            NSEnumerator *enumerator = [attributes objectEnumerator];\n\
    \            while ((key = [enumerator nextObject]) != nil) {\n              \
    \  NSString *value = [node valueForKey:key.name];\n                if (value ==\
    \ nil) value = @\"(null)\";\n                dataFile = [dataFile stringByAppendingFormat:@\"\
    |%@=%@\", key.name, value];  \n            }\n        }\n\n        {   // Write\
    \ all the relationships\n            NSDictionary *relationships = [entity relationshipsByName];\n\
    \            NSRelationshipDescription *key = nil;\n            NSEnumerator *enumerator\
    \ = [relationships objectEnumerator];\n            while ((key = [enumerator nextObject])\
    \ != nil) {\n                id value = [node valueForKey:key.name];\n       \
    \         if (value == nil) {\n                    dataFile = [dataFile stringByAppendingFormat:@\"\
    |%@=%@\", key.name, @\"(null)\"];\n                } else if (![key isToMany])\
    \ {  // One-to-One\n                    NSManagedObjectID *oid = [(NSAtomicStoreCacheNode*)value\
    \ objectID];\n                    id referenceID = [self referenceObjectForObjectID:oid];\n\
    \                    dataFile = [dataFile stringByAppendingFormat:@\"|%@=%@\"\
    , key.name, referenceID];\n                } else {  // One-to-Many\n        \
    \            NSSet* set = (NSSet*)value;\n                    if ([set count]\
    \ == 0) {\n                        dataFile = [dataFile stringByAppendingFormat:@\"\
    |%@=%@\", key.name, @\"(null)\"];\n                    } else {\n            \
    \            NSString *list = @\"\";\n                        for (NSAtomicStoreCacheNode\
    \ *item in set) {\n                            id referenceID = [self referenceObjectForObjectID:[item\
    \ objectID]];\n                            list = [list stringByAppendingFormat:@\"\
    %@,\", referenceID];\n                        }\n                        list\
    \ = [list substringToIndex:[list length]-1];\n                        dataFile\
    \ = [dataFile stringByAppendingFormat:@\"|%@=%@\", key.name, list];\n        \
    \            }\n                }\n            }\n        }\n        // Add a\
    \ new line to go to the next row for the next node\n        dataFile = [dataFile\
    \ stringByAppendingString:@\"\\n\"];\n    }\n    // Write the file\n    NSString\
    \ *path = [url relativePath];\n    [dataFile writeToFile:path atomically:YES encoding:[NSString\
    \ defaultCStringEncoding] error:error];  \n    return YES;\n}\n```\n\nEach data\
    \ record in the text file, represented in code by an `NSAtomicStoreCacheNode`\
    \ instance, follows this format:\n\n```\nEntity Name|Reference\nObject|attribute1=value1|attribute2=value2|...|relationship1=ref1,ref2,ref3|relationship2=ref4|...\n\
    ```\n\nThe `load:` method follows the same steps as the `save:` method but in\
    \ reverse. It reads the data file line by line and, for each line, uses the first\
    \ element to find the entity description, uses the second element as the node's\
    \ reference object, and then iterates through the remaining elements to load the\
    \ attributes and relationships. It uses these elements to reconstruct the `NSAtomicStoreCacheNode`\
    \ instances; see [Listing 3–12](#Chapter03.html#list_3_12).\n\n**Listing 3–12.**\
    \ *The load: Method*\n\n```\n- (BOOL)load:(NSError **)error {\n    // Find the\
    \ file to load from\n    NSURL* url = [self URL];\n    NSMutableSet *nodes = [NSMutableSet\
    \ set];\n    NSString *path = [url relativePath];\n    if(![[NSFileManager defaultManager]\
    \ fileExistsAtPath:path]) {\n        // File doesn't exist, so add an empty set\
    \ and bail\n        [self addCacheNodes:nodes];\n        return YES;\n    }\n\
    \    NSPersistentStoreCoordinator *coordinator = [self persistentStoreCoordinator];\n\
    \n    // Load the entire file into an array, with each element\n    // containing\
    \ one line from the file. Each element is then one\n    // node\n    NSString\
    \ *fileString = [NSString stringWithContentsOfFile:path encoding:[NSString defaultCStringEncoding]\
    \ error:error];\n    NSArray *lines = [fileString componentsSeparatedByString:@\"\
    \\n\"];\n    NSString *line;\n\n    // Enumerate through each line from the file\n\
    \    NSEnumerator *enumerator = [lines objectEnumerator];\n    while ((line =\
    \ [enumerator nextObject]) != nil) {\n        // Split the fields into an array\n\
    \        NSArray *components = [line componentsSeparatedByString:@\"|\"];\n```"
  raw: '#### Serializing the Data


    So far, all you''ve done is implement utility methods to deal with the metadata,
    initialize the data store, and perform the data transfer between `NSManagedObject`
    instances and `NSAtomicStoreCacheNode` instances. Until you implement the methods
    that read and write to the storage device, however, the custom store has no use.
    When extending `NSAtomicStore`, you are required to provide implementations for
    the `load:` and `save:` methods, which serve as the meat of the custom store implementation.
    In this example, start with the `save:` method. The code for the following `save:`
    method might seem overwhelming at first, but if you take time to follow the code,
    you will realize that it simply iterates through the cache nodes and writes attribute
    values into the file, followed by relationship values. Attribute values are converted
    into `NSString`s and appended to the pipe-delimited file as key-value pairs in
    the form *attributeName=value*. Relationships work in a similar way except that
    the value written is not the destination node itself but its reference object
    as created by the `newReferenceObjectForManagedObject:` method. For one-to-many
    relationships, the code writes a comma-delimited list of reference objects. [Listing
    3–11](#Chapter03.html#list_3_11) shows the `save:` method.


    **Listing 3–11.** *The save: Method*


    `- (BOOL)save:(NSError **)error {`

    **`    NSURL *url = [self URL];`**


    **`  // First update the metadata`**

    **`  [CustomStore writeMetadata:[self metadata] toURL:url];`**


    **`  NSString* dataFile = @"";`**

    **`  // Then write the actual data`**

    **`  NSSet *nodes = [self cacheNodes];`**

    **`  NSAtomicStoreCacheNode *node;`**

    **`  NSEnumerator *enumerator = [nodes objectEnumerator];`**


    **`  // Enumerate through all the nodes`**

    **`  while ((node = [enumerator nextObject]) != nil) {`**

    **`    // Get the object ID and reference ID for each node`**

    **`    NSManagedObjectID *oid = [node objectID];`**

    **`    id referenceID = [self referenceObjectForObjectID:oid];`**


    **`    // Write the entity name and reference ID as the first two`**

    **`    // values in the row`**

    **`    NSEntityDescription *entity = [oid entity];`**

    **`    dataFile = [dataFile stringByAppendingFormat:@"%@|%@", entity.name, referenceID];`**


    **`    {   // Write all the attributes`**

    **`      NSDictionary *attributes = [entity attributesByName];`**

    **`      NSAttributeDescription *key = nil;`**

    **`      NSEnumerator *enumerator = [attributes objectEnumerator];`**

    **`      while ((key = [enumerator nextObject]) != nil) {`**

    **`        NSString *value = [node valueForKey:key.name];`**

    **`        if (value == nil) value = @"(null)";`**

    **`        dataFile = [dataFile stringByAppendingFormat:@"|%@=%@", key.name, value];  `**

    **`      }`**

    **`    }`**


    **`    {   // Write all the relationships`**

    **`      NSDictionary *relationships = [entity relationshipsByName];`**

    **`      NSRelationshipDescription *key = nil;`**

    **`      NSEnumerator *enumerator = [relationships objectEnumerator];`**

    **`      while ((key = [enumerator nextObject]) != nil) {`**

    **`        id value = [node valueForKey:key.name];`**

    **`        if (value == nil) {`**

    **`          dataFile = [dataFile stringByAppendingFormat:@"|%@=%@", key.name,
    @"(null)"];`**

    **`        } else if (![key isToMany]) {  // One-to-One`**

    **`          NSManagedObjectID *oid = [(NSAtomicStoreCacheNode*)value objectID];`**

    **`          id referenceID = [self referenceObjectForObjectID:oid];`**

    **`          dataFile = [dataFile stringByAppendingFormat:@"|%@=%@", key.name,
    referenceID];`**

    **`        } else {  // One-to-Many`**

    **`          NSSet* set = (NSSet*)value;`**

    **`          if ([set count] == 0) {`**

    **`            dataFile = [dataFile stringByAppendingFormat:@"|%@=%@", key.name,
    @"(null)"];`**

    **`          } else {`**

    **`            NSString *list = @"";`**

    **`            for (NSAtomicStoreCacheNode *item in set) {`**

    **`              id referenceID = [self referenceObjectForObjectID:[item objectID]];`**

    **`              list = [list stringByAppendingFormat:@"%@,", referenceID];`**

    **`            }`**

    **`            list = [list substringToIndex:[list length]-1];`**

    **`            dataFile = [dataFile stringByAppendingFormat:@"|%@=%@", key.name,
    list];`**

    **`          }`**

    **`        }`**

    **`      }`**

    **`    }`**

    **`    // Add a new line to go to the next row for the next node`**

    **`    dataFile = [dataFile stringByAppendingString:@"\n"];`**

    **`  }`**

    **`  // Write the file`**

    **`  NSString *path = [url relativePath];`**

    **`  [dataFile writeToFile:path atomically:YES encoding:[NSString defaultCStringEncoding]
    error:error]; `**

    `  return YES;`

    `}`


    Each data record in the text file, represented in code by an `NSAtomicStoreCacheNode`
    instance, follows this format:


    `Entity Name|Reference`

    `Object|attribute1=value1|attribute2=value2|...|relationship1=ref1,ref2,ref3|relationship`

    `2=ref4|...`


    The `load:` method follows the same steps as the `save:` method but in reverse.
    It reads the data file line by line and, for each line, uses the first element
    to find the entity description, uses the second element as the node''s reference
    object, and then iterates through the remaining elements to load the attributes
    and relationships. It uses these elements to reconstruct the `NSAtomicStoreCacheNode`
    instances; see [Listing 3–12](#Chapter03.html#list_3_12).


    **Listing 3–12.** *The load: Method*


    `- (BOOL)load:(NSError **)error {`

    **`  // Find the file to load from`**

    **`  NSURL* url = [self URL];`**

    **`  NSMutableSet *nodes = [NSMutableSet set];`**

    **`  NSString *path = [url relativePath];`**

    **`  if(![[NSFileManager defaultManager] fileExistsAtPath:path]) {`**

    **`    // File doesn''t exist, so add an empty set and bail`**

    **`    [self addCacheNodes:nodes];`**

    **`    return YES;`**

    **`  }`**

    **`  NSPersistentStoreCoordinator *coordinator = [self persistentStoreCoordinator];`**


    **`  // Load the entire file into an array, with each element`**

    **`  // containing one line from the file. Each element is then one`**

    **`  // node`**

    **`  NSString *fileString = [NSString stringWithContentsOfFile:path encoding:[NSString`

    `defaultCStringEncoding] error:error];`**

    **`  NSArray *lines = [fileString componentsSeparatedByString:@"\n"];`**

    **`  NSString *line;`**


    **`  // Enumerate through each line from the file`**

    **`  NSEnumerator *enumerator = [lines objectEnumerator];`**

    **`  while ((line = [enumerator nextObject]) != nil) {`**

    **`    // Split the fields into an array`**

    **`    NSArray *components = [line componentsSeparatedByString:@"|"];`**'
