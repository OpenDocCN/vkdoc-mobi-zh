    \ Core Data API 用户来说看起来像一个单一的存储。\n\nMyStash 数据模型同时包含笔记和密码。当你运行 MyStash 应用程序时，所有笔记和密码都存储在`MyStash.sqlite`持久化存储中。不过，假设你想要将持久化存储拆分为两个，以便笔记存储在`Notes.sqlite`持久化存储中，密码存储在`Passwords.sqlite`持久化存储中。[图10–16](#Chapter10.html#fig_10_16)说明了这种拆分，显示了每种托管对象的持久化位置。\n\
