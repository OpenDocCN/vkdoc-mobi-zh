- fmt: "# Initializing the Managed Object Context\n\nThe last step consists of initializing\
    \ the managed object context, the persistent data store, and the object model.\
    \ You can usually add the same code that Xcode would have generated for you if\
    \ you had elected to use Core Data when you created your project: define these\
    \ components as properties in the application delegate, declare a `saveContext`\
    \ method, and declare a helper method for getting the application's document directory\
    \ in which to store the Core Data database file. Your `DemoAppAppDelegate.h` file\
    \ should look like [Listing 1–3](#Chapter01.html#list_1_3).\n\n**Listing 1–3.**\
    \ *The DemoAppAppDelegate.h file*\n\n```\n#import <UIKit/UIKit.h>\n#import <CoreData/CoreData.h>\n\
    \n@interface DemoAppAppDelegate : UIResponder <UIApplicationDelegate> {\n\n}\n\
    \n@property (strong, nonatomic) UIWindow *window;\n@property (strong, nonatomic)\
    \ UINavigationController *navigationController;\n\n@property (nonatomic, retain,\
    \ readonly) NSManagedObjectContext *managedObjectContext;\n@property (nonatomic,\
    \ retain, readonly) NSManagedObjectModel *managedObjectModel;\n@property (nonatomic,\
    \ retain, readonly) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n\
    \n- (void)saveContext;\n- (NSURL *)applicationDocumentsDirectory;\n\n@end\n```\n\
    \nSwitch over to the implementation file (`DemoAppAppDelegate.m`). Start by adding\
    \ `@synthesize` lines for your new properties, like this:\n\n```\n@synthesize\
    \ managedObjectContext=__managedObjectContext;\n@synthesize managedObjectModel=__managedObjectModel;\n\
    @synthesize persistentStoreCoordinator=__persistentStoreCoordinator;\n```\n\n\
    The previous section showed that the context is created from a physical data store,\
    \ which is in turn created from the data model. The initialization sequence remains\
    \ the same and starts with loading the object model from the model you just defined.\n\
    \n```\n- (NSManagedObjectModel *)managedObjectModel {\n  if (__managedObjectModel\
    \ != nil) {\n    return __managedObjectModel;\n  }\n  NSURL *modelURL = [[NSBundle\
    \ mainBundle] URLForResource:@\"MyModel\" withExtension:@\"momd\"];\n  __managedObjectModel\
    \ = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];\n  return __managedObjectModel;\n\
    }\n```\n\nNow that you've loaded the object model, you can leverage it in order\
    \ to create the persistent store handler. This example uses `NSSQLiteStoreType`\
    \ in order to indicate that the storage mechanism should rely on a SQLite database,\
    \ as shown here:\n\n```\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\
    \ {\n  if (__persistentStoreCoordinator != nil) {\n    return __persistentStoreCoordinator;\n\
    \  }\n\n  NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
    DemoApp.sqlite\"];\n\n  NSError *error = nil;\n  __persistentStoreCoordinator\
    \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
    \  if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
    \ configuration:nil URL:storeURL options:nil error:&error]) {\n    NSLog(@\"Unresolved\
    \ error %@, %@\", error, [error userInfo]);\n    abort();\n  }\n  return __persistentStoreCoordinator;\n\
    }\n```\n\nNotice that this code relies on the helper method `applicationDocumentsDirectory`\
    \ to determine where to store the SQLite file; you'll define that method in a\
    \ moment.\n\nNext, initialize the context from the persistent store that you just\
    \ defined.\n\n```\n- (NSManagedObjectContext *)managedObjectContext {\n  if (__managedObjectContext\
    \ != nil) {\n    return __managedObjectContext;\n  }\n\n  NSPersistentStoreCoordinator\
    \ *coordinator = [self persistentStoreCoordinator];\n  if (coordinator != nil)\
    \ {\n    __managedObjectContext = [[NSManagedObjectContext alloc] init];\n   \
    \ [__managedObjectContext setPersistentStoreCoordinator:coordinator];\n  }\n \
    \ return __managedObjectContext;\n}\n```\n\nTo finish preparing Core Data for\
    \ use in your application, you must implement the `applicationDocumentsDirectory`\
    \ method and the `saveContext` method. Again, you can clone what Xcode generates,\
    \ like this:\n\n```\n- (NSURL *)applicationDocumentsDirectory {\n  return [[[NSFileManager\
    \ defaultManager] URLsForDirectory:NSDocumentDirectory inDomains:NSUserDomainMask]\
    \ lastObject];\n}\n\n- (void)saveContext {\n  NSError *error = nil;\n  NSManagedObjectContext\
    \ *managedObjectContext = self.managedObjectContext;\n  if (managedObjectContext\
    \ != nil) {\n    if ([managedObjectContext hasChanges] && ![managedObjectContext\
    \ save:&error]) {\n      NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n\
    \      abort();\n    }\n  }\n}\n```\n\nWith Core Data in place, the application\
    \ can now use the managed object context to store and retrieve entities. Let's\
    \ use a simple example in which the application persists and displays the number\
    \ of times it was launched in order to illustrate this process.\n\nIn the application\
    \ delegate implementation file, `DemoAppAppDelegate.m`, edit the `didFinishLaunchingWithOptions:`\
    \ method, and add code to retrieve the previous launches and add a new launch\
    \ event.\n\n**NOTE:** Although the managed object context, persistent store coordinator,\
    \ and managed object model are typically members of the application delegate,\
    \ code that stores and retrieves data usually goes in controllers corresponding\
    \ to views of that data. Adding the code to store and retrieve entries directly\
    \ to the application delegate is only done here for convenience and simplicity.\
    \ In a real application, this kind of code would most likely belong to a controller.\n\
    \nThe code to retrieve the previous launches grabs the context and executes a\
    \ request to fetch entities of type `MyData`.\n\n```\nNSManagedObjectContext *context\
    \ = [self managedObjectContext];\nNSFetchRequest *request = [[NSFetchRequest alloc]\
    \ init];\nNSEntityDescription *entity = [NSEntityDescription entityForName:@\"\
    MyData\" inManagedObjectContext:context];\n[request setEntity:entity];\nNSArray\
    \ *results = [context executeFetchRequest:request error:nil];\n```\n\nYou can\
    \ then iterate through the array of results in order to display the previous launches.\n\
    \n```\nfor (NSManagedObject *object in results) {\n  NSLog(@\"Found %@\", [object\
    \ valueForKey:@\"myAttribute\"]);\n}\n```\n\n**NOTE:** One way to interact with\
    \ the managed object's properties is to use the key/value pair generic accessor\
    \ methods. `[object valueForKey:@\"myAttribute\"]` will retrieve the value of\
    \ `myAttribute`, while `[object setValue:@\"theValue\" forKey:@\"myAttribute\"\
    ]` will set the value of `myAttribute`.\n\nLastly, add a new entry to the context\
    \ before letting the application continue its normal execution, using the `saveContext`\
    \ method implemented earlier to save the new entry to the persistent store.\n\n\
    ```\nNSString *launchTitle = [NSString stringWithFormat:@\"launch %d\", [results\
    \ count]];\nNSManagedObject *object = [NSEntityDescription insertNewObjectForEntityForName:[entity\
    \ name] inManagedObjectContext:context];\n[object setValue:launchTitle forKey:@\"\
    myAttribute\"];\n[self saveContext];\nNSLog(@\"Added: %@\", launchTitle);\n```\n\
    \nLaunching the application for the first time yields this output:\n\n```\n2011–02-25\
    \ 05:13:23.783 DemoApp[2299:207] Added: launch 0\n```\n\nAnd launching it a second\
    \ time displays the previous launch:\n\n```\n2011–02-25 05:15:48.883 DemoApp[2372:207]\
    \ Found launch 0\n2011–02-25 05:15:48.889 DemoApp[2372:207] Added: launch 1\n\
    ```\n\nThe complete method from the application delegate implementation file is\
    \ shown in [Listing 1–4](#Chapter01.html#list_1_4).\n\n**Listing 1–4.** *The Complete\
    \ Method from the Application Delegate Implementation File*"
  raw: '#### Initializing the Managed Object Context


    The last step consists of initializing the managed object context, the persistent
    data store, and the object model. You can usually add the same code that Xcode
    would have generated for you if you had elected to use Core Data when you created
    your project: define these components as properties in the application delegate,
    declare a `saveContext` method, and declare a helper method for getting the application''s
    document directory in which to store the Core Data database file. Your `DemoAppAppDelegate.h`
    file should look like [Listing 1–3](#Chapter01.html#list_1_3).


    **Listing 1–3.** *The DemoAppAppDelegate.h file*


    `#import <UIKit/UIKit.h>`

    **`#import <CoreData/CoreData.h>`**


    `@interface DemoAppAppDelegate : UIResponder <UIApplicationDelegate> {`


    `}`


    `@property (strong, nonatomic) UIWindow *window;`

    `@property (strong, nonatomic) UINavigationController *navigationController;`


    **`@property (nonatomic, retain, readonly) NSManagedObjectContext *managedObjectContext;`**

    **`@property (nonatomic, retain, readonly) NSManagedObjectModel *managedObjectModel;`**

    **`@property (nonatomic, retain, readonly) NSPersistentStoreCoordinator *persistentStoreCoordinator;`**


    **`- (void)saveContext;`**

    **`- (NSURL *)applicationDocumentsDirectory;`**


    `@end`


    Switch over to the implementation file (`DemoAppAppDelegate.m`). Start by adding
    `@synthesize` lines for your new properties, like this:


    `@synthesize managedObjectContext=__managedObjectContext;`

    `@synthesize managedObjectModel=__managedObjectModel;`

    `@synthesize persistentStoreCoordinator=__persistentStoreCoordinator;`


    The previous section showed that the context is created from a physical data store,
    which is in turn created from the data model. The initialization sequence remains
    the same and starts with loading the object model from the model you just defined.


    `- (NSManagedObjectModel *)managedObjectModel {`

    `  if (__managedObjectModel != nil) {`

    `    return __managedObjectModel;`

    `  }`

    `  NSURL *modelURL = [[NSBundle mainBundle] URLForResource:@"MyModel" withExtension:@"momd"];`

    `  __managedObjectModel = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];`

    `  return __managedObjectModel;`

    `}`


    Now that you''ve loaded the object model, you can leverage it in order to create
    the persistent store handler. This example uses `NSSQLiteStoreType` in order to
    indicate that the storage mechanism should rely on a SQLite database, as shown
    here:


    `- (NSPersistentStoreCoordinator *)persistentStoreCoordinator {`

    `  if (__persistentStoreCoordinator != nil) {`

    `    return __persistentStoreCoordinator;`

    `  }`


    `  NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@"DemoApp.sqlite"];`


    `  NSError *error = nil;`

    `  __persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self
    managedObjectModel]];`

    `  if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType
    configuration:nil URL:storeURL options:nil error:&error]) {`

    `    NSLog(@"Unresolved error %@, %@", error, [error userInfo]);`

    `    abort();`

    `  }`

    `  return __persistentStoreCoordinator;`

    `}`


    Notice that this code relies on the helper method `applicationDocumentsDirectory`
    to determine where to store the SQLite file; you''ll define that method in a moment.


    Next, initialize the context from the persistent store that you just defined.


    `- (NSManagedObjectContext *)managedObjectContext {`

    `  if (__managedObjectContext != nil) {`

    `    return __managedObjectContext;`

    `  }`


    `  NSPersistentStoreCoordinator *coordinator = [self persistentStoreCoordinator];`

    `  if (coordinator != nil) {`

    `    __managedObjectContext = [[NSManagedObjectContext alloc] init];`

    `    [__managedObjectContext setPersistentStoreCoordinator:coordinator];`

    `  }`

    `  return __managedObjectContext;`

    `}`


    To finish preparing Core Data for use in your application, you must implement
    the `applicationDocumentsDirectory:` method and the `saveContext:` method. Again,
    you can clone what Xcode generates, like this:


    `- (NSURL *)applicationDocumentsDirectory {`

    `  return [[[NSFileManager defaultManager] URLsForDirectory:NSDocumentDirectory
    inDomains:NSUserDomainMask] lastObject];`

    `}`


    `- (void)saveContext {`

    `  NSError *error = nil;`

    `  NSManagedObjectContext *managedObjectContext = self.managedObjectContext;`

    `  if (managedObjectContext != nil) {`

    `    if ([managedObjectContext hasChanges] && ![managedObjectContext save:&error])
    {`

    `      NSLog(@"Unresolved error %@, %@", error, [error userInfo]);`

    `      abort();`

    `    }`

    `  }`

    `}`


    With Core Data in place, the application can now use the managed object context
    to store and retrieve entities. Let''s use a simple example in which the application
    persists and displays the number of times it was launched in order to illustrate
    this process.


    In the application delegate implementation file, `DemoAppAppDelegate.m`, edit
    the `didFinishLaunchingWithOptions:` method, and add code to retrieve the previous
    launches and add a new launch event.


    **NOTE:**Although the managed object context, persistent store coordinator, and
    managed object model are typically members of the application delegate, code that
    stores and retrieves data usually goes in controllers corresponding to views of
    that data. Adding the code to store and retrieve entries directly to the application
    delegate is only done here for convenience and simplicity. In a real application,
    this kind of code would most likely belong to a controller.


    The code to retrieve the previous launches grabs the context and executes a request
    to fetch entities of type `MyData`.


    `NSManagedObjectContext *context = [self managedObjectContext];`

    `NSFetchRequest *request = [[NSFetchRequest alloc] init];`

    `NSEntityDescription *entity = [NSEntityDescription entityForName:@"MyData" inManagedObjectContext:context];`

    `[request setEntity:entity];`

    `NSArray *results = [context executeFetchRequest:request error:nil];`


    You can then iterate through the array of results in order to display the previous
    launches.


    `for (NSManagedObject *object in results) {`

    `  NSLog(@"Found %@", [object valueForKey:@"myAttribute"]);`

    `}`


    **NOTE:**One way to interact with the managed object''s properties is to use the
    key/value pair generic accessor methods. `[object valueForKey:@"myAttribute"]`
    will retrieve the value of `myAttribute`, while `[object setValue:@"theValue"
    forKey:@"myAttribute"]` will set the value of `myAttribute`.


    Lastly, add a new entry to the context before letting the application continue
    its normal execution, using the `saveContext:` method implemented earlier to save
    the new entry to the persistent store.


    `NSString *launchTitle = [NSString stringWithFormat:@"launch %d", [results count]];`

    `NSManagedObject *object = [NSEntityDescription insertNewObjectForEntityForName:[entity`

    `name] inManagedObjectContext:context];`

    `[object setValue:launchTitle forKey:@"myAttribute"];`

    `[self saveContext];`

    `NSLog(@"Added: %@", launchTitle);`


