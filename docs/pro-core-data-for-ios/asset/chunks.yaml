    Instead, it goes into the background. The in-memory persistent store survives
    when an application is sent to the background so that the data is still around
    when the application comes back to the foreground.


    When working on a data management framework and thinking about the different types
    of persistent stores that it should provide by default, an in-memory store isn''t
    the first idea that comes to mind. Trying to come up with a good reason to use
    an in-memory store can be a challenge, but some legitimate reasons exist. For
    example, local caching of remote data can benefit from in-memory persistent stores.
    Consider a case in which your application is fed data from a remote server. If
    your application executes a lot of queries, good software engineering practices
    would prescribe the use of efficient data transfer. The remote server may transfer
    the data in compressed packages to your client application, which can then uncompress
    that data and store it in an in-memory store so that it can be efficiently queried.
    In this situation, you would want the data to be refreshed every time the application
    starts, or even periodically while the application runs, so losing the in-memory
    data store would be acceptable.


    [Figure 3–22](#Chapter03.html#fig_3_22) illustrates the start-up sequence of an
    application that caches remote information locally in an in-memory store.


    ![images](images/0322.jpg)


    **Figure 3–22.** *Caching remote information locally*


    As you develop your Core Data–backed iOS applications, consider using in-memory
    data stores when applications don''t require data persistence across invocations.
    Traditional applications, however, that require that users'' data doesn''t disappear
    simply because the application stopped running can''t use this persistent store
    type.


    ### Creating Your Own Custom Persistent Store


    The principle of abstracting the persistent store implementation from the user
    forms the basis for the Core Data framework. This abstraction makes it possible
    to change the persistent store type among the different default types (`NSSQLiteStoreType`,
    `NSInMemoryStoreType`, `NSBinaryStoreType`) without changing more than a line
    of your code. In some cases, the default store types don''t best accomplish what
    you are trying to achieve. The Core Data framework offers a hook for creating
    custom store types for these special cases. In this section, you create a new
    store type and use it with the League Manager application.


    Before getting into the implementation itself, you should be aware that Core Data
    only allows you to create atomic store types. An atomic store is a store that
    writes its entire content all at once every time a save operation is executed.
    This effectively excludes the ability to create SQL-based store types that could
    be backed by a database other than SQLite where only the rows of data that are
    modified are affected in the database. In this section, you build a file-based
    custom store that will store its data in a comma-separated values (CSV) file except
    that you will use the pipe (`|`) symbol to separate values.


    Custom data stores must extend the `NSAtomicStore` class (a subclass of `NSPersistentStore`)
    that provides the infrastructure necessary to hold the data. To get a better idea
    of how this works, picture two internal layers inside the Core Data framework,
    as shown in [Figure 3–23](#Chapter03.html#fig_3_23). Users interact with the layer
    that contains `NSManagedObject`s and `NSManagedObjectContext`. The other layer
    performs the actual persistence and contains the persistent store coordinator
    and the persistent stores. In the case of custom stores, the persistence layer
    also contains `NSAtomicStoreCacheNode`, which contains objects that hold the data
    within this layer. The `NSAtomicStoreCacheNode` object is to the `NSAtomicStore`
    what the `NSManagedObject` is to the `NSManagedObjectContext`.


    ![images](images/0323.jpg)


    **Figure 3–23.** *Two layers inside Core Data*'
  trans: "\n### 使用内存持久化存储\n\n在上一节中，你构建了一个基于 Core Data 的应用程序，它使用了默认的 SQLite 持久化存储类型。本节将讨论另一种类型：内存持久化存储。我们先来看看如何切换存储类型，然后再详细说明为何要使用这种存储类型。\n\
    \n切换 Core Data 为应用程序所使用的存储类型非常简单，只需在应用委托中创建持久化存储协调器时指定新的类型即可。`League_ManagerAppDelegate.m`\
    \ 中 `persistentStoreCoordinator:` 方法的代码现在如代码清单 3–5 所示，更新后的代码以粗体显示。\n\n**代码清单 3–5.**\
    \ *`League_ManagerAppDelegate.m` 中的 `persistentStoreCoordinator:` 方法*\n\n```\n\
    - (NSPersistentStoreCoordinator *)persistentStoreCoordinator {\n  if (__persistentStoreCoordinator\
    \ != nil) {\n    return __persistentStoreCoordinator;\n  }\n\n//  NSURL *storeURL\
    \ = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"League_Manager.sqlite\"\
    ];\n\n  NSError *error = nil;\n  __persistentStoreCoordinator = [[NSPersistentStoreCoordinator\
    \ alloc] initWithManagedObjectModel:[self managedObjectModel]];\n  if (![__persistentStoreCoordinator\
    \ addPersistentStoreWithType:NSInMemoryStoreType configuration:nil URL:nil options:nil\
    \ error:&error]) {\n    NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n\
    \    abort();\n  }\n\n  return __persistentStoreCoordinator;\n}\n```\n\n存储已被切换为内存存储。重新启动应用程序后，首先会发现之前存储在数据存储中的所有数据都消失了。这是因为你切换了数据存储，并且没有尝试将数据从旧存储迁移到新存储。第\
    \ 8 章 会解释如何在两个持久化存储之间迁移数据。\n\n内存数据存储的生命周期始于 Core Data 堆栈初始化时，止于应用程序停止时。\n\n**注意：**\
    \ 自 iOS4 及 iDevices 引入多任务功能以来，切换到另一个应用程序并不一定会终止当前正在运行的应用程序。相反，应用会进入后台。当应用被发送到后台时，内存持久化存储仍然存在，因此当应用重新回到前台时，数据仍然可用。\n\
    \n在设计数据管理框架并思考其默认应提供哪些类型的持久化存储时，内存存储通常不是首先浮现的想法。要找到一个使用内存存储的充分理由可能颇具挑战性，但确实存在一些合理的用途。例如，远程数据的本地缓存就能从内存持久化存储中获益。假设你的应用程序从远程服务器接收数据。如果应用程序执行大量查询，良好的软件工程实践会要求使用高效的数据传输方式。远程服务器可以将数据以压缩包的形式传输到客户端应用程序，客户端随后解压数据并存入内存存储中，以便高效地进行查询。在这种情况下，你希望每次应用程序启动时，甚至在应用程序运行期间定期刷新数据，因此内存数据存储的丢失是可以接受的。\n\
    \n图 3–22 展示了一个在内存存储中本地缓存远程信息的应用程序的启动序列。\n\n![images](img/0322.jpg)\n\n**图 3–22.**\
    \ *本地缓存远程信息*\n\n在开发基于 Core Data 的 iOS 应用程序时，可以考虑在应用不要求跨调用持久化数据的情况下使用内存数据存储。然而，那些要求用户数据不会仅仅因为应用程序停止运行而消失的传统应用程序，则不能使用这种持久化存储类型。\n\
    \n### 创建自定义持久化存储\n\n将持久化存储的实现与用户进行抽象隔离，是 Core Data 框架的基本原则。这种抽象使得你可以在不同的默认存储类型（`NSSQLiteStoreType`、`NSInMemoryStoreType`、`NSBinaryStoreType`）之间切换，而无需修改超过一行代码。在某些情况下，默认的存储类型并不能最好地满足你的需求。Core\
    \ Data 框架提供了一个钩子，用于在这些特殊情况下创建自定义存储类型。在本节中，你将创建一个新的存储类型，并将其用于 League Manager 应用程序。\n\
    \n在着手实现之前，你应该了解 Core Data 只允许你创建原子存储类型。原子存储是一种每次执行保存操作时都会一次性写入所有内容的存储。这实际上排除了创建基于\
    \ SQL 的存储类型的可能性，因为这种类型本可以借助 SQLite 之外的数据库作为后端，且仅影响数据库中修改过的数据行。在本节中，你将构建一个基于文件的自定义存储，它会以逗号分隔值（CSV）文件的形式存储数据，不过我们将使用竖线符号（`|`）来分隔值。\n\
    \n自定义数据存储必须继承 `NSAtomicStore` 类（`NSPersistentStore` 的子类），该类提供了容纳数据所需的基础架构。为了更好地理解其工作原理，可以想象\
    \ Core Data 框架内部的两个层级，如图 3–23 所示。用户与包含 `NSManagedObject` 和 `NSManagedObjectContext`\
    \ 的层级交互。另一层级则执行实际的持久化操作，并包含持久化存储协调器和持久化存储。在自定义存储的情况下，持久化层级还包含 `NSAtomicStoreCacheNode`，该节点包含在此层级内持有数据的对象。`NSAtomicStoreCacheNode`\
    \ 之于 `NSAtomicStore`，就如同 `NSManagedObject` 之于 `NSManagedObjectContext`。\n\n![images](img/0323.jpg)\n\
    \n**图 3–23.** *Core Data 内部的两个层级*\n"
- fmt: "#### Initializing the Custom Store\n\nA new custom store is responsible for\
    \ transferring data between the storage device and the `NSAtomicStoreCacheNode`s\
    \ as well as transferring data between the `NSManagedObject`s and the `NSAtomicStoreCacheNode`s.\n\
    \nThe first step to create a custom store is to add a class (or classes) to implement\
    \ it. The custom store this section builds lives in one class called `CustomStore`.\
    \ Use Xcode to add a new Objective-C class called `CustomStore` to the League\
    \ Manager application, specifying that it's a subclass of `NSAtomicStore`. `CustomStore.h`\
    \ starts out trivial: it extends `NSAtomicStore` as expected, as [Listing 3–6](#Chapter03.html#list_3_6)\
    \ shows.\n\n**Listing 3–6.** *CustomStore.h*\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface CustomStore : NSAtomicStore {\n}\n\n@end\n```\n\nThe implementation\
    \ class, which starts out blank, must implement a few methods. It has accessors\
    \ for its type and identifier, explained later in this section. It has an initializer\
    \ that takes a persistent store coordinator and some other parameters. It also\
    \ has a few other methods stubbed out that you'll implement as this section unfolds.\
    \ See [Listing 3–7](#Chapter03.html#list_3_7).\n\n**Listing 3–7.** *CustomStore.m*\n\
    \n```\n#import \"CustomStore.h\"\n\n@implementation CustomStore\n\n#pragma mark\
    \ - NSPersistentStore\n\n- (NSString *)type {\n    return [[self metadata] objectForKey:NSStoreTypeKey];\n\
    }\n\n- (NSString *)identifier {\n    return [[self metadata] objectForKey:NSStoreUUIDKey];\n\
    }\n\n- (id)initWithPersistentStoreCoordinator:(NSPersistentStoreCoordinator *)coordinator\n\
    configurationName:(NSString *)configurationName URL:(NSURL *)url options:(NSDictionary\n\
    *)options {\n    self = [super initWithPersistentStoreCoordinator:coordinator\n\
    configurationName:configurationName URL:url options:options];\n\n    return self;\n\
    }\n\n+ (NSDictionary *)metadataForPersistentStoreWithURL:(NSURL *)url error:(NSError\
    \ **)error {\n    return nil;\n}\n\n#pragma mark - NSAtomicStore\n\n- (BOOL)load:(NSError\
    \ **)error {\n    return YES;\n}\n\n- (id)newReferenceObjectForManagedObject:(NSManagedObject\
    \ *)managedObject {\n    return nil;\n}\n\n- (NSAtomicStoreCacheNode *)newCacheNodeForManagedObject:(NSManagedObject\n\
    *)managedObject {\n    return nil;\n}\n\n- (BOOL)save:(NSError **)error {\n  \
    \  return YES;\n}\n\n-(void)updateCacheNode:(NSAtomicStoreCacheNode *)node fromManagedObject:\n\
    (NSManagedObject *)managedObject {\n}\n\n@end\n```\n\nAll Core Data stores have\
    \ supporting metadata that help the persistent store coordinator manage the different\
    \ stores. The metadata is materialized in the `NSPersistentStore` class as an\
    \ `NSDictionary`. Two data elements are of particular interest to a new data store:\
    \ `NSStoreTypeKey` and `NSStoreUUIDKey`. The `NSStoreTypeKey` value must be a\
    \ string that uniquely identifies the data store type, while the `NSStoreUUIDKey`\
    \ must be a string that uniquely identifies the data store itself. To create unique\
    \ identifiers, add a static utility method that creates and returns universally\
    \ unique identifiers (UUIDs):\n\n```\n+ (NSString *)makeUUID {\n    CFUUIDRef\
    \ uuidRef = CFUUIDCreate(NULL);\n    CFStringRef uuidStringRef = CFUUIDCreateString(NULL,\
    \ uuidRef);\n    CFRelease(uuidRef);\n    NSString* uuid = [NSString stringWithString:(\
    \ __bridge NSString *)uuidStringRef];\n    CFRelease(uuidStringRef);\n    return\
    \ uuid;\n}\n```\n\nIn this chapter's example, two data files support the custom\
    \ store. The first file, which has a `.txt` extension, contains the data itself,\
    \ and the second file, which has a `.plist` extension, contains the metadata.\
    \ For the problem of loading and saving the metadata, you will add a method to\
    \ save the metadata and complete the implementation of `metadataForPersistentStoreWithURL:error:`\
    \ to load the metadata.\n\nData stores are initialized relative to a base URL.\
    \ In the `CustomStore` example, the URL points to the data file (the `.txt` file),\
    \ and the metadata file URL is derived from the base URL by swapping the `.txt`\
    \ extension for a `.plist` extension.\n\nThe `writeMetadata:toURL:` method takes\
    \ the metadata `NSDictionary` and writes it to a file, like so:\n\n```\n+ (void)writeMetadata:(NSDictionary*)metadata\
    \ toURL:(NSURL*)url {\n    NSString *path = [[url relativePath] stringByAppendingString:@\"\
    .plist\"];\n    [metadata writeToFile:path atomically:YES];\n}\n```\n\nLoading\
    \ the metadata is slightly more complicated because if the data store is new and\
    \ the metadata file does not exist, the metadata file must be created along with\
    \ an empty data file. Core Data expects a store type, and a store UUID from the\
    \ metadata helps the persistent store coordinator deal with the custom store,\
    \ so set those values for the `NSStoreTypeKey` and `NSStoreUUIDKey`. Find the\
    \ `metadataForPersistentStoreWithURL:error:` method and change its contents to\
    \ check for the existence of a metadata file and, if not found, to write one with\
    \ the store type key and the UUID key, and also to write a blank data file, like\
    \ in [Listing 3–8](#Chapter03.html#list_3_8).\n\n**Listing 3–8.** *The `metadataForPersistentStoreWithURL:error:`\
    \ Method*\n\n```\n+ (NSDictionary *)metadataForPersistentStoreWithURL:(NSURL *)url\
    \ error:(NSError **)error {\n    // Determine the filename for the metadata file\n\
    \    NSString *path = [[url relativePath] stringByAppendingString:@\".plist\"\
    ];\n\n    // If the metadata file doesn't exist, create it\n    if(![[NSFileManager\
    \ defaultManager] fileExistsAtPath:path]) {\n        // Create a dictionary and\
    \ store the store type key (CustomStore)\n        // and the UUID key\n      \
    \  NSMutableDictionary *metadata = [NSMutableDictionary dictionary];\n       \
    \ [metadata setValue:@\"CustomStore\" forKey:NSStoreTypeKey];\n        [metadata\
    \ setValue:[CustomStore makeUUID] forKey:NSStoreUUIDKey];\n\n        // Write\
    \ the metadata to the .plist file\n        [CustomStore writeMetadata:metadata\
    \ toURL:url];\n\n        // Write an empty data file\n        [@\"\" writeToURL:url\
    \ atomically:YES encoding:[NSString defaultCStringEncoding] error:nil];\n\n  \
    \      NSLog(@\"Created new store at %@\", path);\n    }\n    return [NSDictionary\
    \ dictionaryWithContentsOfFile:path];\n}\n```\n\nArmed with methods to retrieve\
    \ the metadata and create a blank store, you can complete the initialization method,\
    \ like so:\n\n```\n- (id)initWithPersistentStoreCoordinator:(NSPersistentStoreCoordinator\
    \ *)coordinator\nconfigurationName:(NSString *)configurationName URL:(NSURL *)url\
    \ options:(NSDictionary\n*)options {\n    self = [super initWithPersistentStoreCoordinator:coordinator\n\
    configurationName:configurationName URL:url options:options];\n\n    NSDictionary\
    \ *metadata = [CustomStore metadataForPersistentStoreWithURL:[self URL]\nerror:nil];\n\
    \    [self setMetadata:metadata];\n\n    return self;\n}\n```"
