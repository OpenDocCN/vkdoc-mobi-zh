    to process for any properties you haven’t explicitly written validation routines
    for. To use this validation option, you write methods in your `NSManagedObject`-derived
    class’s implementation file that take this form:


    `- (BOOL)validate<AttributeName>:(id *)ioValue error:(NSError **)outError`


