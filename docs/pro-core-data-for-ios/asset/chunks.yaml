    `  [super awakeFromInsert];`

    `  [self setValue:[NSDate date] forKey:@"myDate"];`

    `}`


    ### Undoing and Redoing


    Golfers call it a mulligan. School-yard children call it a do-over. Computer users
    call it **Edit** ![images](images/U001.jpg) **Undo**. Whatever you call it, you’ve
    realized that you’ve blundered and want to take back your last action. Not all
