    使用自定义属性转换器的最后一步，是在 `ShapesAppDelegate.m` 中注册该转换器。只需导入 `UIColorTransformer.h`，并在
    `application:didFinishLaunchingWithOptions:` 方法的开头添加以下两行代码，即可在 Core Data 栈初始化前调用它们：


    **`UIColorTransformer* transformer = [[UIColorTransformer alloc] init];`**

    **`[UIColorTransformer setValueTransformer:transformer forName:(NSString*)@"UIColorTransformerName"];`**


    你需要删除现有的 Shapes 数据库，然后构建并运行 Shapes 应用程序，即可看到颜色转换器被使用。你也可以打开 shapes SQLite 数据库，查看
    `ZSHAPE` 表中的 `ZCOLOR` 列，该列现在的类型是 `BLOB`。查看其中的任意一个值，你会看到它们采用你创建的 `UIColorTransformer`
    类的 `transformedValue:` 方法生成的格式：三个用逗号分隔的浮点数值，它们代表 `CGColor` 的各个分量。


    在这一节中，你已了解如何充分利用自定义对象，尽可能将 Core Data 隐藏在你的应用程序代码之后，从而使持久化层尽可能透明。


    ### 验证数据


    Core Data 不允许你向模型中的任何属性存储不符合其类型的数据。例如，尝试将诸如“专业人士的书籍，由专业人士编写”这样的字符串（Apress 的宣传语）放入类型为
    `Integer 16` 的属性中，将会引发一个类似如下的 `NSInvalidArgumentException` 异常：


    `''NSInvalidArgumentException'', reason: ''Unacceptable type of value for attribute:
    property = "x"; desired type = NSNumber; given type = NSCFString; value = Books
    for Professionals by Professionals.''`


    Core Data 强制保障数据完整性，但有时你需要的不仅仅是这个。有时你想要强制应用所谓的 **业务规则**，尽管这些规则可能与业务有关，也可能无关。以
    Shapes 应用程序中的 `Polygon` 实例及其与 `Vertex` 实例的关系为例。现实世界中没有顶点的多边形是不存在的，因此你将“vertices”关系设置为非可选。只有一个顶点的多边形也不是多边形，它是一个点。而拥有两个顶点的多边形是一条线。一个多边形必须至少有三个顶点才算得上。因此，你将“vertices”关系的“Min
    Count”值设置为 3。将 `Polygon` 实例仅关联到一个或两个 `Vertex` 实例会阻止托管对象上下文成功保存。相反，你会得到类似这样的错误：“Operation
    could not be completed. (Cocoa error 1580.)”。这些错误码来自头文件 `CoreDataErrors.h`，并在表
    5–1 中列出，同时附有描述。请注意，这些描述直接取自头文件。检查此表会发现，错误码 1580 意味着“对多关系中目标对象数量过少”，这恰好描述了你尝试的操作。


    ![images](img/t0501.jpg)


    错误码表格为你提供了关于 Core Data 会为你验证哪些内容的一些线索。用于定义属性和关系的 Core Data 建模工具也提供了同样的线索。对于关系，你可以验证对多关系中的目标对象数量是否有效——既不能太多也不能太少。然而，对于属性，你可以验证的参数更多，具体取决于属性类型。对于所有数字类型，你可以指定最小值（Min
    value）和最大值（Max value）：


    *   `Integer 16`

    *   `Integer 32`

    *   `Integer 64`

    *   `Decimal`

    *   `Double`

    *   `Float`


    超出允许范围的值会根据具体情况引发 `NSValidationNumberTooSmallError` 或 `NSValidationNumberTooLargeError`
    错误。例如，如果你将 `Circle` 实体的 `radius` 属性的 Min 值设为 7.0，Max 值设为 10.0，那么半径不在此范围内的随机圆形将无法保存到持久化存储中。


    对于 `String` 类型，你可以指定字符串的最小长度（Min Length）和最大长度（Max Length），还可以提供一个值必须符合的正则表达式。然而，`Date`
    属性处理起来稍微棘手一些，因为 Core Data 建模工具只提供了文本输入框来输入 Min 和 Max 值，却没有提示如何格式化这些值，或者是否有像“今天”（Today）、“昨天”（Yesterday）、“三天前”（3
    Days Ago）或“从现在起一年”（1 Year From Now）这样的“魔法”值可用。查阅 Apple 的文档一无所获，但稍微谷歌一下就能发现 Shane
    Crawford（[`http://shanecrawford.org/2008/57/coredatas-default-date-value/`](http://shanecrawford.org/2008/57/coredatas-default-date-value/)）和
    Jeff LaMarche（[`http://iphonedevelopment.blogspot.com/2009/07/core-data-default-dates-in-data-model.html`](http://iphonedevelopment.blogspot.com/2009/07/core-data-default-dates-in-data-model.html)）的博客文章，这些文章让
    Date 的 Min 和 Max 值（以及默认值，见“默认值”一节）听起来非常酷：你可以指定自然语言字符串，例如“now”、“today”或“last Saturday”。正当你兴奋不已时，你会读到帖子中说，这些自然语言字符串是在编译时解释的，而非运行时，因此它们永远不会更新以反映当前日期。这使它们变得毫无用处。


    不过，你可以在这些字段中输入具体日期，例如 1/1/1900，但这很难找到太多用处。下一节“自定义验证”将介绍如何验证相对日期。

