    ### Summary


    Whether building an iOS application from scratch or adding persistence to an existing
    iOS application, you should strongly consider turning to Apple''s Core Data framework.
    Using Xcode''s templates and code generation gives you a jump start down the Core
    Data path, or you can simply add Core Data by hand. Either way, you have in Core
    Data a persistence layer that abstracts most of the complexity of data storage
    and retrieval, and allows you to work with data reliably as an object graph.


    This chapter gave you an overview of Core Data''s classes and how they work together
    from the context to the managed objects to the persistent store and its coordinator.
    You caught a glimpse of fetch results controllers and how they work, but you saw
    only simple examples. The next chapter dives deeper into the Core Data framework,
    laying bare the classes and their interworkings so you know precisely how to use
    Core Data to persist your users'' data.


    ## Chapter 2


    ## Understanding Core Data


    Many developers, upon first seeing Core Data, deem Core Data and its classes a
    tangled mess of classes that impede, rather than enhance, data access. Perhaps
    they''re Rails developers, used to making up method names to create dynamic finders
    and letting convention over configuration take care of the dirty work of data
    access. Maybe they''re Java developers who have been annotating their Enterprise
    JavaBeans (EJBs) or hibernating their Plain Old Java Objects (POJOs). Whatever
    their backgrounds, many developers don''t take naturally to the Core Data framework
    or its way of dealing with data, just as many developers squirm when first presented
    with Interface Builder and the live objects it creates when building user interfaces.
    We counsel you with patience and an open mind and assure you that the Core Data
    framework is no Rube Goldberg. The classes in the framework work together like
    Larry Bird''s 1980s Boston Celtics in the half-court set, and when you understand
    them, you see their beauty and precision.


    This chapter explains the classes in the Core Data framework, both individually
    and how they work together. Take the time to read about each class, to trace how
    they work together, and to type in and understand the examples.


    ### Core Data Framework Classes


    [Chapter 1](#Chapter01.html#ch1) guided you through the simple steps to get an
    application outfitted with Core Data. You saw bits of code, learned which classes
    to use, and discovered which methods and parameters to call and pass to make Core
    Data work. You faithfully, and perhaps somewhat blindly, followed [Chapter 1](#Chapter01.html#ch1)''s
    advice while perhaps wondering what was behind all the code, classes, methods,
    and parameters. Most developers reading the previous chapter probably wondered
    what would happen if they substituted a parameter value for another. A few of
    them probably even tried it. A small percentage of those who tried got something
    other than an explosion, and a percentage of them actually got what they thought
    they would get.


    Edward Dijkstra, renowned computer scientist and recipient of the 1972 Turing
    Award for his work developing programming languages, spoke of elegance as a quality
    that decides between success and failure instead of being a dispensable luxury.
    Core Data not only solves the problem of object persistence but solves it elegantly.
    To achieve elegance in your code, you should understand Core Data and not just
    guess at how it works. After reading this chapter, you will understand in detail
    not only the structure of the Core Data framework but also that the framework
    solves a complicated problem with only a small set of classes, making the solution
    simple, clear, and elegant.


    Throughout the chapter, you will build the class diagram that shows the classes
    involved in the framework and how they interact. You will also see that some classes
    belong to the Core Data framework and others are imported from other Cocoa frameworks
    such as the Foundation framework. In parallel with building the class diagram,
    you will build a small application in Xcode that deals with a fictitious company''s
    organizational chart.


    To follow along with this chapter, set up a blank iPhone application using the
    Single View Application template, as [Figure 2–1](#Chapter02.html#fig_2_1) shows,
    and call it **OrgChart**.


    ![images](images/0201.jpg)


    **Figure 2–1.** *Create a new application in Xcode.*


    Add the Core Data framework to the project, as described in the “Adding Core Data
    to an Existing Project” section of [Chapter 1](#Chapter01.html#ch1). Your Xcode
    project should look like [Figure 2–2](#Chapter02.html#fig_2_2). Launch the app
    and make sure it starts without crashing. It doesn''t do anything other than display
    a gray screen, but that blank screen means you are set to continue building the
    rest of the Core Data–based application.


    ![images](images/0202.jpg)


    **Figure 2–2.** *Xcode with a blank project, with Core Data added*


    [Figure 2–3](#Chapter02.html#fig_2_3) depicts the classes of Core Data that you
    typically interact with. [Chapter 1](#Chapter01.html#ch1) talked about the managed
    object context, which is materialized by the `NSManagedObjectContext` class and
    contains references to managed objects of type `NSManagedObject`.


    ![images](images/0203.jpg)


    **Figure 2–3.** *High-level overview*


    Your code stores data by adding managed objects to the context and retrieves data
    by using fetch requests implemented by the `NSFetchRequest` class. As shown in
    [Chapter 1](#Chapter01.html#ch1), the context is initialized using the persistent
    store coordinator, implemented by the `NSPersistentStoreCoordinator` class, and
    defined by the data model, implemented by the `NSManagedObjectModel` class. The
    remainder of this chapter deals with how these classes are created, how they interact,
    and how to use them.'
  trans: "\n`- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions {\n    // 从 Core Data 获取启动记录\n    NSManagedObjectContext *context\
    \ = [self managedObjectContext];\n    NSFetchRequest *request = [[NSFetchRequest\
    \ alloc] init];\n    NSEntityDescription *entity = [NSEntityDescription entityForName:@\"\
    MyData\" inManagedObjectContext:context];\n    [request setEntity:entity];\n \
    \   NSArray *results = [context executeFetchRequest:request error:nil];\n\n  \
    \  // 遍历结果并打印日志\n    for (NSManagedObject *object in results) {\n        NSLog(@\"\
    找到 %@\", [object valueForKey:@\"myAttribute\"]);\n    }\n\n    // 为本次启动添加新条目\n\
    \    NSString *launchTitle = [NSString stringWithFormat:@\"启动 %d\", [results count]];\n\
    \    NSManagedObject *object = [NSEntityDescription insertNewObjectForEntityForName:[entity\
    \ name] inManagedObjectContext:context];\n    [object setValue:launchTitle forKey:@\"\
    myAttribute\"];\n    [self saveContext];\n    NSLog(@\"已添加: %@\", launchTitle);\n\
    \n    [self.window makeKeyAndVisible];\n    return YES;\n}`\n\n此前对 Core Data 一无所知的现有应用程序，现已通过最少的改造，装备了强大的数据存储管理框架。按照以下步骤，即可将\
    \ Core Data 的强大功能添加到任何现有应用程序中。\n\n### 总结\n\n无论是从零开始构建 iOS 应用程序，还是为现有 iOS 应用程序添加持久化功能，你都应强烈考虑使用\
    \ Apple 的 Core Data 框架。通过使用 Xcode 的模板和代码生成，可以快速入门 Core Data，或者你也可以手动添加 Core Data。无论采用哪种方式，Core\
    \ Data 都提供了一个持久化层，它抽象了数据存储和检索的大部分复杂性，并允许你以对象图的形式可靠地处理数据。\n\n本章概述了 Core Data 的各种类，以及它们如何协同工作——从上下文到托管对象，再到持久化存储及其协调器。你初步了解了获取结果控制器及其工作原理，但仅看到了简单的示例。下一章将更深入地剖析\
    \ Core Data 框架，揭示各个类及其内部工作机制，以便你精确掌握如何使用 Core Data 来持久化用户数据。\n\n## 第 2 章\n\n##\
    \ 理解 Core Data\n\n许多开发者在初次接触 Core Data 时，会认为它及其相关的类是一团乱麻，反而阻碍而非增强了数据访问。或许他们是 Rails\
    \ 开发者，习惯于通过拼凑方法名来创建动态查找器，让“约定优于配置”来处理数据访问的繁琐工作。又或许他们是 Java 开发者，一直使用注解来配置企业 JavaBeans\
    \ (EJB) 或使用 Hibernate 来处理普通的旧式 Java 对象 (POJO)。无论其背景如何，许多开发者不会自然而然地接受 Core Data\
    \ 框架或其处理数据的方式，就像许多开发者在初次接触 Interface Builder 及其构建用户界面时创建的动态对象时感到不适一样。我们建议你保持耐心和开放的心态，并向你保证\
    \ Core Data 框架绝非一个鲁布·戈德堡机械。该框架中的各类协同工作，宛若 1980 年代拉里·伯德领衔的波士顿凯尔特人队在阵地进攻中的配合，一旦你理解了它们，就能看到其精妙与严谨。\n\
    \n本章将解释 Core Data 框架中的各个类，既有单独介绍，也有对其协同工作方式的说明。请花时间阅读每个类的介绍，追溯它们如何协同工作，并动手输入和理解示例。\n\
    \n### Core Data 框架类\n\n第 1 章引导你完成了让应用程序搭载 Core Data 的简单步骤。你看到了一些代码片段，了解了要使用哪些类，并发现了要使\
    \ Core Data 工作需要调用和传递哪些方法及参数。你忠实地（或许有些盲目地）遵循了第 1 章的建议，同时可能好奇所有这些代码、类、方法和参数背后究竟是什么。阅读上一章的大多数开发者可能都想过，如果将某个参数值替换为另一个会发生什么。其中少数人甚至真的尝试了。在尝试的人中，有一小部分得到了除崩溃以外的结果，而其中又有一部分人确实得到了他们预期中的结果。\n\
    \n著名计算机科学家、因开发编程语言而获得 1972 年图灵奖的爱德格·迪杰斯特拉曾谈到，优雅是决定成败的品质，而非可有可无的奢侈品。Core Data 不仅解决了对象持久化的问题，而且是以优雅的方式解决的。要想在代码中实现优雅，你应该理解\
    \ Core Data，而不是仅仅猜测它的工作原理。阅读完本章后，你不仅将详细了解 Core Data 框架的结构，还会明白该框架仅用一小组类就解决了一个复杂问题，使得解决方案简单、清晰而优雅。\n\
    \n在本章中，你将构建一个类图，展示框架中涉及的类以及它们如何交互。你还将看到，有些类属于 Core Data 框架，而另一些则来自其他 Cocoa 框架（如\
    \ Foundation 框架）。在构建类图的同时，你还将在 Xcode 中构建一个小型应用程序，该程序处理一个虚构公司的组织结构图。\n\n要跟随本章进行操作，请使用“单视图应用程序”模板创建一个空白\
    \ iPhone 应用程序，如图 2–1 所示，并将其命名为 `OrgChart`。\n\n![images](img/0201.jpg)\n\n**图 2–1.**\
    \ *在 Xcode 中创建一个新应用程序。*\n\n按照第 1 章中“向现有项目添加 Core Data”一节的描述，将 Core Data 框架添加到项目中。你的\
    \ Xcode 项目应类似图 2–2。启动该应用程序并确保其不会崩溃。它除了显示一个灰色屏幕外什么也不做，但这个空白屏幕意味着你已经准备好继续构建该基于 Core\
    \ Data 的应用程序的其余部分。\n\n![images](img/0202.jpg)\n\n**图 2–2.** *添加了 Core Data 的 Xcode\
    \ 空白项目*\n\n图 2–3 描绘了你通常与之交互的 Core Data 类。第 1 章讨论了托管对象上下文，它由 `NSManagedObjectContext`\
    \ 类实现，并包含对 `NSManagedObject` 类型托管对象的引用。\n\n![images](img/0203.jpg)\n\n**图 2–3.**\
    \ *高级概览*\n\n你的代码通过向上下文添加托管对象来存储数据，并通过使用由 `NSFetchRequest` 类实现的获取请求来检索数据。如第 1 章所示，上下文使用持久化存储协调器（由\
    \ `NSPersistentStoreCoordinator` 类实现）进行初始化，并由数据模型（由 `NSManagedObjectModel` 类实现）定义。本章的其余部分将讨论这些类是如何创建的、它们如何交互以及如何使用它们。\n\
    \n```objc\n`- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions {\n    // 从 Core Data 获取启动记录\n    NSManagedObjectContext *context\
    \ = [self managedObjectContext];\n    NSFetchRequest *request = [[NSFetchRequest\
    \ alloc] init];\n    NSEntityDescription *entity = [NSEntityDescription entityForName:@\"\
    MyData\" inManagedObjectContext:context];\n    [request setEntity:entity];\n \
    \   NSArray *results = [context executeFetchRequest:request error:nil];\n\n  \
    \  // 遍历结果并打印日志\n    for (NSManagedObject *object in results) {\n        NSLog(@\"\
    找到 %@\", [object valueForKey:@\"myAttribute\"]);\n    }\n\n    // 为本次启动添加新条目\n\
    \    NSString *launchTitle = [NSString stringWithFormat:@\"启动 %d\", [results count]];\n\
    \    NSManagedObject *object = [NSEntityDescription insertNewObjectForEntityForName:[entity\
    \ name] inManagedObjectContext:context];\n    [object setValue:launchTitle forKey:@\"\
    myAttribute\"];\n    [self saveContext];\n    NSLog(@\"已添加: %@\", launchTitle);\n\
    \n    [self.window makeKeyAndVisible];\n    return YES;\n}`\n```\n"
- fmt: '#### The Model Definition Classes


    As explained in [Chapter 1](#Chapter01.html#ch1), all Core Data applications require
    an object model. The model defines the entities to be persisted and their properties.
    Entities have three kinds of properties:


    * Attributes

    * Relationships

    * Fetched properties


    [Table 2–1](#Chapter02.html#tab_2_1) shows the different classes and brief descriptions
    of their roles. Enumerating through the classes to better understand how the mechanics
    behind model instantiation work is an interesting exercise, but in practice creating
    the model in Xcode is typically done graphically without having to type a single
    line of code.


    ![images](images/t0201.jpg)


    [Figure 2–4](#Chapter02.html#fig_2_4) shows the relationships among the classes
    involved in defining a model. `NSManagedObjectModel` has references to zero or
    more `NSEntityDescription` objects. Each `NSEntityDescription` has references
    to zero or more `NSPropertyDescription` objects. `NSPropertyDescription` is an
    abstract class with three concrete implementations:


    * `NSAttributeDescription`

    * `NSRelationshipDescription`

    * `NSFetchedPropertyDescription`


    ![images](images/0204.jpg)


    **Figure 2–4.** *The model definition classes*


    This small set of classes is enough to define any object model you will use when
    working on your Core Data projects. As explained in more detail in [Chapter 1](#Chapter01.html#ch1),
    you create the data model in Xcode by selecting `File` ![images](images/U001.jpg)
    `New` ![images](images/U001.jpg) `New File` in the menu and picking the type Data
    Model from the iOS Core Data templates. In this section, you will create a model
    that represents a company''s organizational chart. In Xcode, create your model
    and call it `OrgChart`. In this data model, an organization has one person as
    the leader (the chief executive officer, or CEO). That leader has direct reports,
    which may or may not have direct reports of their own. For simplicity, say that
    a person has two attributes: a unique employee identifier and a name. You are
    finally ready to start defining the data model in Xcode.


    Open the data model file, and add a new `Organization` entity. Like a person,
    an organization is defined by a unique identifier and a name, so add two attributes
    to the `Organization` entity. Attributes are scalar properties of an entity, which
    means that they are simple data holders that can contain a single value. The attribute
    types are defined in the `NSAttributeType` structure, and each type enforces certain
    data constraints over the entity. For instance, if the type of the attribute is
    integer, an error will occur if you try to put an alphanumeric value in that field.
    [Table 2–2](#Chapter02.html#tab_2_2) lists the different types and their meanings.


    ![images](images/t0202.jpg)


    **NOTE:** [Chapter 5](#Chapter05.html#ch5) expands on the `Transformable` type
    and how to use it. Transformable attributes are a way to tell Core Data that you
    want to use a nonsupported data type in your managed object and that you will
    help Core Data by providing code to transform the attribute data at persist time
    into a supported type.


    Name the first attribute `id` and the second `name`. By default, the type of new
    attributes is set to `Undefined`, which purposely prevents the code from compiling
    in order to force you to set the type for each attribute. Organization identifiers
    are always going to be simple numbers, so use the type `Integer 16` for the `id`
    attribute. Use the type `String` for the `name` attribute. At this point, your
    project should look like [Figure 2–5](#Chapter02.html#fig_2_5).


    ![images](images/0205.jpg)


    **Figure 2–5.** *The project with the Organization entity*


    At this point, if the data model were to be loaded by a running program, it would
    be represented by the object graph shown in [Figure 2–6](#Chapter02.html#fig_2_6).


    ![images](images/0206.jpg)


    **Figure 2–6.** *The organization model as objects*


    The graph shows that the managed object model, which is of type `NSManagedObjectModel`,
    points to an entity description, represented by an `NSEntityDescription` instance
    named `Organization` that uses an `NSManagedObject` for its `managedObjectClassName`
    property. This entity description has two attribute descriptions (type `NSAttributeDescription`).
    Each attribute description has two properties: `name` and `attributeType`. The
    first attribute description has the values `id` and `NSInteger16AttributeType`
    for its `name` and `attributeType` properties, respectively, while the second
    has the values `name` and `NSStringAttributeType`.


    In the same manner that you created the `Organization` entity, create another
    entity named `Person` with two attributes: `id` and `name`. You can link the organization
    to its leader by creating a relationship from the `Organization` entity to the
    `Person` entity and call it `leader`. Once the two entities exist in Xcode, creating
    a relationship is as simple as selecting the source entity (`Organization`), clicking
    and holding the Add Attribute button until the drop-down menu appears, and selecting
    Add Relationship. Name the new relationship `leader`, and set `Person` as its
    destination. Now, add a relationship from `Person` to `Person` (yes, a relationship
    from the `Person` entity back to itself), and call it `employees`. This defines
    the relationship from a person to the person''s subordinates. By default, Xcode
    creates one-to-one relationships, which means that a relationship left at the
    default links one source to one destination. Since one leader can manage many
    subordinates, the relationship between `Person` and `Person` should be a one-to-many
    relationship. To correct the relationship in Xcode, first show the attributes
    for the relationship by displaying Xcode''s utilities panel by clicking the rightmost
    button above View in the toolbar of Xcode. Then, click to show the Data Model
    Inspector by clicking the rightmost button at the top of the utilities panel (see
    [Figure 2–7](#Chapter02.html#fig_2_7)).


    ![images](images/0207.jpg)


    **Figure 2–7.** *Showing the properties of a relationship*


    With the properties displayed, you can now change the `employees` relationship
    to one-to-many by checking the box beside To-Many Relationship, as shown in [Figure
    2–8](#Chapter02.html#fig_2_8).


    ![images](images/0208.jpg)


    **Figure 2–8.** *One-to-many relationship*


    **NOTE:** In this chapter, we want to show you how a data model designed using
    the model editor is interpreted into Core Data classes. We have purposely taken
    shortcuts when creating the model. For more detailed information on how to create
    object models, please refer to [Chapter 4](#Chapter04.html#ch4).


    **NOTE:** You may notice that Xcode complains about the two relationships you''ve
    created, warning you of a consistency error and a misconfigured property. Xcode
    complains about Core Data relationships without inverses, but this shouldn''t
    be an issue in this application. The only impact the lack of the inverse relationships
    has is that you can''t navigate the inverse relationships. You can safely ignore
    these warnings for the time being.


    The current data model is illustrated in [Figure 2–9](#Chapter02.html#fig_2_9),
    while [Figure 2–10](#Chapter02.html#fig_2_10) shows how the data model definition
    would be loaded into live objects by Core Data.


    ![images](images/0209.jpg)


    **Figure 2–9.** *The data model*


    ![images](images/0210.jpg)


    **Figure 2–10.** *The organization model with Person*


    Note that the object graph depicted in [Figure 2–10](#Chapter02.html#fig_2_10)
    is not showing the object graph that Core Data stores. Instead, it is an illustration
    of how Core Data interprets the data model you created graphically as objects
    it can use to create the data store schema. The typical way of making Core Data
    load and interpret a data model into an `NSManagedObjectModel` is done by creating
    a URL to the data model using code like this:'
