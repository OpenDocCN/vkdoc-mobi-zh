- fmt: '### Designing Your Database


    The American philosopher Ralph Waldo Emerson once said, “A foolish consistency
    is the hobgoblin of little minds.” People often wield that quote to defend carelessness
    or inattention to detail. We hope we’re not falling into that trap as we flip-flop
    inconsistently between claiming Core Data is not a database and treating it as
    if it were. This section discusses how to design your data structures, and likening
    this process to modeling a relational database greatly helps not only the discussion
    but also the resulting design. The analogy breaks down in spots, however, as all
    analogies do, and we point out those spots through this discussion.


    Core Data entity descriptions look, act, smell, and taste an awful lot like tables
    in a relational database. Attributes seem like columns in the tables, relationships
    feel like joins on primary and foreign keys, and entities appear like rows. If
    your model sits on a SQLite persistent store, Core Data actually realizes the
    entity descriptions, attributes, relationships, and entities as the database structures
    you’d expect, as [Chapters 2](#Chapter02.html#ch2) and [3](#Chapter03.html#ch3)
    demonstrate. Remember, though, that your data can live in memory only or in some
    flat-file atomic store that has no tables or rows or columns or primary and foreign
    keys. Core Data abstracts the data structure from a relational database structure,
    simplifying both how you model and interact with your data. Allow for that abstraction
    in your mental model of how Core Data modeling works, or you will fill your Core
    Data model with cruft, work against Core Data, and produce suboptimal data structures.


    Newcomers to Core Data who have data modeling experience decry the lack of an
    autoincrement field type, believing that they have the responsibility, as they
    do in traditional data modeling, to define a primary key for each table. Core
    Data has no autoincrement type because you don’t define any primary keys. Core
    Data assumes the responsibility to establish and maintain the uniqueness of each
    managed object, or row. No primary keys means no foreign keys, either; Core Data
    manages the relationships between entities, or tables, and performs any necessary
    joins for you. Get over the discomfort of not defining primary and foreign keys
    quickly, because agonizing over this implementation detail isn’t worth your effort
    or angst.


    Another place where too much database modeling knowledge can run you against Core
    Data’s grain involves many-to-many relationships. Consider, for example, if players
    in the League Manager application could belong to more than one team. If this
    were true, each team could have many players, and each player could play for many
    teams. If you were creating a traditional relational data model, you’d create
    three tables: one for teams, one for players, and one to track each team-player
    relationship. In Core Data, you’d still have just two entities, `Team` and `Player`,
    and you’d change the relationship from `Player` to `Team` to a to-many relationship.
    Core Data would still implement this in a SQLite database as three tables, `ZTEAM`,
    `ZPLAYER`, and `Z1TEAMS`, but that’s an implementation detail. You wouldn’t need
    to know about the third table, because Core Data takes care of it for you.


    **TIP:** Here’s a rule of thumb to remember as you create your Core Data models:
    worry about data, not data storage mechanisms.


    #### Relational Database Normalization


    Relational database theory espouses a process for designing a data model called
    *normalization*, which aims to reduce or eliminate redundancy and provide efficient
    access to the data inside the database. The normalization process divides into
    five levels, or *forms*, and work continues on a sixth form. The five normal forms
    carry definitions only a logician can love, or perhaps even understand; they read
    something like this:


    > *“A relation R is in fourth normal form (4NF) if and only if, wherever there
    exists an MVD in R, say A -> -> B, then all attributes of R are also functionally
    dependent on A. In other words, the only dependencies (FDs or MVDs) in R are of
    the form K -> X (i.e. a functional dependency from a candidate key K to some other
    attribute X). Equivalently: R is in 4NF if it is in BCNF and all MVD’s in R are
    in fact FDs.”*

    >

    > *(`www.databasedesign-resource.com/normal-forms.html`)*


    We have neither sufficient pages in this book nor the inclination to walk through
    formal definitions for each of the normal forms and then explain what they mean.
    Instead, this section describes each of the normal forms in relation to Core Data
    and provides data modeling advice. Note that adherence to a given normal form
    requires adherence to all the normal forms that precede it.


    A database that conforms to first normal form (1NF) is considered normalized.
    To conform to this level of normalization, each row in the database must have
    the same number of fields. For a Core Data model, this means that each managed
    object should have the same number of attributes. Since Core Data doesn’t allow
    you to create variable numbers of attributes in your entities, your Core Data
    models are automatically normalized.


    Second normal form (2NF) and third normal form (3NF) deal with the relationship
    between nonkey fields and key fields, dictating that nonkey fields should be facts
    about the entire key field to which they belong. Since your Core Data model has
    no key fields, you shouldn’t run afoul of these concerns. You should, however,
    make sure that all the attributes for a given entity describe that entity, and
    not something else. For example, the `Player` entity should not have a `uniformColor`
    field since the uniform color describes the team rather than an independent player.


    The next two normal forms, fourth normal form (4NF) and fifth normal form (5NF),
    can be considered the same form in the Core Data world. They deal with reducing
    or eliminating data redundancy, pushing you to move multiple-value attributes
    into separate entities and create to-many relationships between the entities.
    In Core Data terms, 4NF says that entities shouldn’t have attributes that can
    have multiple values. Instead, you should move these attributes to a separate
    entity and create a to-many relationship between the entities. Consider, for example,
    the teams and players in the model in the League Manager application from the
    previous chapter. A model that would violate 4NF and 5NF would have a single entity,
    `Team`, with an additional attribute: `player`. We would then create a new `Team`
    managed object for each player, so that we’d have several redundant `Team` objects.
    Instead, the League Manager data model moves players to a `Player` entity and
    creates a to-many relationship, `players`, between each team and its players.


    As you create your models in Core Data applications, keep database modeling in
    mind and consider removing redundancy by moving multiple-value attributes to separate
    entities. For example, in the League Manager data model, the `uniformColor` attribute
    of `Team` presents a normalization opportunity. Named colors represent a finite
    set, despite what Crayola may claim, so you could create an entity called `Color`
    that has an attribute, `name`, that relates to teams in a to-many relationship.'
