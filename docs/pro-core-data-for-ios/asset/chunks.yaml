    ### Summary


    Dumping an entire data set on someone overwhelms them and prevents them from finding
    what they''re looking for. AutoTrader.com recognizes this and uses its ability
    to filter results as a marketing ploy to attract customers. You should recognize
    this, too, as you build Core Data applications. Use the information presented
    in this chapter to sort, filter, and aggregate results so that you can narrow
    your data into what users seek.


    ## Chapter 7


    ## Tuning Performance and Memory Usage


    Lately, people have grown to hate hourglasses, spinning beach balls, and “Please
    Wait” pop-ups. Although giving a visual clue that the computer is working beats
    giving no such clue and letting customers think their computers have locked up,
    better still would be to never have episodes of slowness that make users wait.
    You may not always be able to achieve that goal, but you should always try.


    Fetching and storing data in a persistent store can take a long time, especially
    when mounds of data are involved. This chapter assures that you understand how
    Core Data helps you—and how you must help yourself—to make sure you don’t pepper
    your users with “Please Wait” spinners or, worse, an unresponsive application
    that appears locked up while it retrieves or saves large object graphs. You will
    learn how to utilize the various tools and strategies, such as caching, faulting,
    and the Instruments application that comes with Xcode.


    ### Building the Application for Testing


    You need a way to complete performance testing so that you can verify results.
    This section walks you through building an application that will allow you to
    run various tests and see the results. The application, shown in [Figure 7–1](#Chapter07.html#fig_7_1),
    presents a list of tests you can run in a standard picker view. To run a test,
    select it in the picker, click the Run Selected Test button, and wait for the
    results. After the test runs, you’ll see the start time, the stop time, the number
    of elapsed seconds for the test, and some text describing the results of the test.


    ![images](images/0701.jpg)


    **Figure 7–1.** *The performance-tuning application*'
  trans: "\n#### 按单一条件排序数据\n\n在许多情况下，尤其是在处理用户界面时，对数据进行排序能带来价值——无论是让数据更具视觉吸引力，还是让数据更容易查找。这时就需要用到\
    \ `NSSortDescriptor`。使用这个类，你可以像在 SQL 中使用 `ORDER BY` 关键字一样指定排序顺序。如果你希望结果按年龄排序，可以修改\
    \ `readData:` 方法，加入排序描述符，代码如下：\n\n```\n- (void)readData\n{\n  NSManagedObjectContext\
    \ *context = [self managedObjectContext];  \n  NSEntityDescription *entity = [NSEntityDescription\
    \ entityForName:@\"Person\" inManagedObjectContext:context];\n\n  NSFetchRequest\
    \ *fetchRequest = [[NSFetchRequest alloc] init];\n  [fetchRequest setEntity:entity];\n\
    \n  NSPredicate *predicate = [NSPredicate predicateWithFormat:@\"manager.name\
    \ CONTAINS[c] %@\", @\"m\"];\n  [fetchRequest setPredicate:predicate];\n\n  NSSortDescriptor\
    \ *sortDescriptorByAge = [[NSSortDescriptor alloc] initWithKey:@\"age\" ascending:YES];\n\
    \  NSArray *sortDescriptors = [[NSArray alloc] initWithObjects:sortDescriptorByAge,\
    \ nil];\n  [fetchRequest setSortDescriptors:sortDescriptors];\n\n  NSArray *persons\
    \ = [context executeFetchRequest:fetchRequest error:nil];\n\n  for (NSManagedObject\
    \ *person in persons)\n  {\n    NSLog(@\"name=%@ age=%@\", [person valueForKey:@\"\
    name\"], [person valueForKey:@\"age\"]);\n  }\n}\n```\n\n同样，将 `OrgChartAppDelegate.m`\
    \ 中的 `readData:` 方法替换为上面列出的代码，然后运行应用程序。这一次，输出结果会按年龄排序。请注意，Jim 和 Kate 年龄相同（都是 40\
    \ 岁），因此输出中它们的顺序可能互换。无论如何，你的输出应该类似下面这样：\n\n```\nname=Jill age=22\nname=Tom age=26\n\
    name=Kate age=40\nname=Jim age=40\n```\n\n就像谓词中的一些表达式一样，排序描述符也依赖键路径来指定排序时使用的属性。`initWithKey:ascending:`\
    \ 方法的第二个属性指定排序顺序是升序还是降序。改变这个值会反转排序顺序。\n\n#### 按多个条件排序数据\n\n你还可以添加额外的排序条件来实现多级排序。例如，你可能希望先按年龄排序数据，如果多个年龄相同，则使用补充排序顺序（如按名字字母顺序排列）。这样可以消除上一个例子中\
    \ Jim 和 Kate 的任意返回顺序。你可能已经注意到，`setSortDescriptors:` 方法期望的是一个排序描述符数组。添加二级排序只需向数组中添加另一个排序描述符即可，代码如下：\n\
    \n```\n- (void)readData\n{\n  NSManagedObjectContext *context = [self managedObjectContext];\
    \  \n  NSEntityDescription *entity = [NSEntityDescription entityForName:@\"Person\"\
    \ inManagedObjectContext:context];\n\n  NSFetchRequest *fetchRequest = [[NSFetchRequest\
    \ alloc] init];\n  [fetchRequest setEntity:entity];\n\n  NSPredicate *predicate\
    \ = [NSPredicate predicateWithFormat:@\"manager.name CONTAINS[c] %@\", @\"m\"\
    ];\n  [fetchRequest setPredicate:predicate];\n\n  NSSortDescriptor *sortDescriptorByAge\
    \ = [[NSSortDescriptor alloc] initWithKey:@\"age\" ascending:YES];\n  NSSortDescriptor\
    \ *sortDescriptorByName = [[NSSortDescriptor alloc] initWithKey:@\"name\" ascending:YES];\n\
    \  NSArray *sortDescriptors = [[NSArray alloc] initWithObjects:sortDescriptorByAge,\
    \ sortDescriptorByName, nil];\n  [fetchRequest setSortDescriptors:sortDescriptors];\n\
    \n  NSArray *persons = [context executeFetchRequest:fetchRequest error:nil];\n\
    \n  for (NSManagedObject *person in persons)\n  {\n    NSLog(@\"name=%@ age=%@\"\
    , [person valueForKey:@\"name\"], [person valueForKey:@\"age\"]);\n  }\n}\n```\n\
    \n由于 Kate 和 Jim 年龄相同，但 Kate 在字母顺序中排在 Jim 之后，输出结果从任意顺序变为确定顺序。\n\n```\nname=Jill\
    \ age=22\nname=Tom age=26\nname=Jim age=40\nname=Kate age=40\n```\n\n你可以通过将 `sortDescriptorByName`\
    \ 实例改为降序排序（向 `ascending:` 参数传递 `NO`）来验证对 Jim 和 Kate 名字顺序的控制，代码如下：\n\n```\nNSSortDescriptor\
    \ *sortDescriptorByName = [[NSSortDescriptor alloc] initWithKey:@\"name\" ascending:NO];\n\
    ```\n\n得到的输出确认了 Kate 现在排在 Jim 之前：\n\n```\nname=Jill age=22\nname=Tom age=26\n\
    name=Kate age=40\nname=Jim age=40\n```\n\n### 小结\n\n将整个数据集一股脑地抛给用户会让他们不知所措，也无法找到所需的内容。AutoTrader.com\
    \ 意识到了这一点，并将其过滤结果的能力作为一种营销手段来吸引客户。你在构建 Core Data 应用程序时也应该意识到这一点。利用本章介绍的信息来对结果进行排序、过滤和聚合，从而将数据缩小到用户寻找的范围。\n\
    \n## 第 7 章：调优性能与内存使用\n\n近来，人们越来越讨厌沙漏、旋转的沙滩球以及“请稍候”弹出窗口。虽然给出计算机正在工作的视觉提示比不给出提示、让用户以为电脑死机要好，但更好的做法是根本不要让用户等待。你可能无法总是实现这一目标，但你应始终努力尝试。\n\
    \n在持久化存储中获取和存储数据可能耗时较长，尤其是涉及大量数据时。本章将确保你理解 Core Data 如何帮助你——以及你如何自助——避免让用户看到“请稍候”旋转图标，更糟糕的是，当应用程序在检索或保存大型对象图时出现无响应、看似死机的情况。你将学习如何利用各种工具和策略，如缓存、故障（faulting）以及\
    \ Xcode 自带的 Instruments 应用。\n\n### 构建用于测试的应用程序\n\n你需要一种方法来完成性能测试，以便验证结果。本节将引导你构建一个应用程序，使你能够运行各种测试并查看结果。该应用程序（如图\
    \ 7-1 所示）在标准选择器视图中呈现一个测试列表。要运行测试，只需在选择器中选中它，点击“运行所选测试”按钮，然后等待结果。测试运行后，你将看到开始时间、结束时间、测试所耗秒数，以及一些描述测试结果的文本。\n\
    \n![images](img/0701.jpg)\n\n**图 7-1.** *性能调优应用程序*\n"
- fmt: "### Creating the Core Data Project\n\nStart by creating a new single view\
    \ application with the Product option set to iPhone. Call it `PerformanceTuning`\
    \ and add the Core Data framework. In your application delegate (`PerformanceTuningAppDelegate`),\
    \ add a managed object context, a managed object model, and a persistent store\
    \ coordinator, as well as a method for returning the application's document directory\
    \ and a method for saving the managed object context. The following is the code\
    \ for `PerformanceTuningAppDelegate.h`:\n\n```objc\n#import <UIKit/UIKit.h>\n\
    #import <CoreData/CoreData.h>\n\n@class PerformanceTuningViewController;\n\n@interface\
    \ PerformanceTuningAppDelegate : UIResponder <UIApplicationDelegate>\n\n@property\
    \ (strong, nonatomic) IBOutlet UIWindow *window;\n@property (strong, nonatomic)\
    \ IBOutlet PerformanceTuningViewController *viewController;\n@property (nonatomic,\
    \ retain, readonly) NSManagedObjectContext *managedObjectContext;\n@property (nonatomic,\
    \ retain, readonly) NSManagedObjectModel *managedObjectModel;\n@property (nonatomic,\
    \ retain, readonly) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n\
    \n- (void)saveContext;\n- (NSURL *)applicationDocumentsDirectory;\n\n@end\n```\n\
    \n[Listing 7–1](#Chapter07.html#list_7_1) shows the code for `PerformanceTuningAppDelegate.m`.\n\
    \n**Listing 7–1.** *PerformanceTuningAppDelegate.m*\n\n```objc\n#import \"PerformanceTuningAppDelegate.h\"\
    \n#import \"PerformanceTuningViewController.h\"\n\n@implementation PerformanceTuningAppDelegate\n\
    \n@synthesize window=_window;\n@synthesize viewController=_viewController;\n@synthesize\
    \ managedObjectContext=__managedObjectContext;\n@synthesize managedObjectModel=__managedObjectModel;\n\
    @synthesize persistentStoreCoordinator=__persistentStoreCoordinator;\n\n- (BOOL)application:(UIApplication\
    \ *)application\ndidFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n\
    {\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n\
    \    // Override point for customization after application launch.\n    self.viewController\
    \ = [[PerformanceTuningViewController alloc] initWithNibName:@\"PerformanceTuningViewController\"\
    \ bundle:nil];\n    self.window.rootViewController = self.viewController;\n  \
    \  [self.window makeKeyAndVisible];\n    return YES;\n}\n\n- (void)applicationWillResignActive:(UIApplication\
    \ *)application {\n}\n\n- (void)applicationDidEnterBackground:(UIApplication *)application\
    \ {\n}\n\n- (void)applicationWillEnterForeground:(UIApplication *)application\
    \ {\n}\n\n- (void)applicationDidBecomeActive:(UIApplication *)application {\n\
    }\n\n- (void)applicationWillTerminate:(UIApplication *)application {\n}\n\n- (void)saveContext\
    \ {\n    NSError *error = nil;\n    NSManagedObjectContext *managedObjectContext\
    \ = self.managedObjectContext;\n    if (managedObjectContext != nil) {\n     \
    \   if ([managedObjectContext hasChanges] && ![managedObjectContext save:&error])\
    \ {\n            NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n\
    \            abort();\n        }\n    }\n}\n\n#pragma mark - Core Data stack\n\
    \n/**\n Returns the managed object context for the application.\n If the context\
    \ doesn't already exist, it is created and bound to the persistent store coordinator\
    \ for the application.\n */\n- (NSManagedObjectContext *)managedObjectContext\
    \ {\n    if (__managedObjectContext != nil) {\n        return __managedObjectContext;\n\
    \    }\n\n    NSPersistentStoreCoordinator *coordinator = [self persistentStoreCoordinator];\n\
    \    if (coordinator != nil) {\n        __managedObjectContext = [[NSManagedObjectContext\
    \ alloc] init];\n        [__managedObjectContext setPersistentStoreCoordinator:coordinator];\n\
    \    }\n    return __managedObjectContext;\n}\n\n/**\n Returns the managed object\
    \ model for the application.\n If the model doesn't already exist, it is created\
    \ from the application's model.\n */\n- (NSManagedObjectModel *)managedObjectModel\
    \ {\n    if (__managedObjectModel != nil) {\n        return __managedObjectModel;\n\
    \    }\n    NSURL *modelURL = [[NSBundle mainBundle] URLForResource:@\"PerformanceTuning\"\
    \ withExtension:@\"momd\"];\n    __managedObjectModel = [[NSManagedObjectModel\
    \ alloc] initWithContentsOfURL:modelURL];\n    return __managedObjectModel;\n\
    }\n\n/**\n Returns the persistent store coordinator for the application.\n If\
    \ the coordinator doesn't already exist, it is created and the application's store\
    \ added to it.\n */\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\
    \ {\n    if (__persistentStoreCoordinator != nil) {\n        return __persistentStoreCoordinator;\n\
    \    }\n\n    NSURL *storeURL = [[self applicationDocumentsDirectory]\n      \
    \                 URLByAppendingPathComponent:@\"PerformanceTuning.sqlite\"];\n\
    \n    NSError *error = nil;\n    __persistentStoreCoordinator = [[NSPersistentStoreCoordinator\
    \ alloc] initWithManagedObjectModel:[self managedObjectModel]];\n    if (![__persistentStoreCoordinator\
    \ addPersistentStoreWithType:NSSQLiteStoreType configuration:nil URL:storeURL\
    \ options:nil error:&error]) {\n        NSLog(@\"Unresolved error %@, %@\", error,\
    \ [error userInfo]);\n        abort();\n    }\n    return __persistentStoreCoordinator;\n\
    }\n\n#pragma mark - Application's Documents directory\n\n/**\n Returns the URL\
    \ to the application's Documents directory.\n */\n- (NSURL *)applicationDocumentsDirectory\
    \ {\n    return [[[NSFileManager defaultManager] URLsForDirectory:NSDocumentDirectory\
    \ inDomains:NSUserDomainMask] lastObject];\n}\n\n@end\n```"
