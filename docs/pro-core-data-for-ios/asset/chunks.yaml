    object context, and `NSManagedObjectContext` provides a getter and a setter for
    the undo manager. Unlike Core Data on Mac OS X, however, the managed object context
    in iOS’s Core Data doesn’t provide an undo manager by default for performance
    reasons. If you want undo capabilities for your Core Data objects, you must set
    the undo manager in your managed object context yourself.


