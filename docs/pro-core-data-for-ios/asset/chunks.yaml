  trans: "\n**注意：** 为了演示这一机制，我们手动编写了种子数据。在实际应用中，你应该考虑从某个文本文件或 CSV 文件中读取列表。\n\n清单 10–25\
    \ 展示了用于添加类别的辅助方法 `addCategoryWithName:`，该方法简单地将一个具有指定名称的 `Category` 实体插入到托管对象上下文中。\n\
    \n**清单 10–25.** *添加类别的方法*\n\n```\n- (NSManagedObject *)addCategoryWithName:(NSString\
    \ *)name\n{\n  NSManagedObject *category = [NSEntityDescription insertNewObjectForEntityForName:@\"\
    Category\" inManagedObjectContext:[self managedObjectContext]];\n  [category setValue:name\
    \ forKey:@\"name\"];\n  return category;\n}\n```\n\n构建并运行应用程序，然后使用 `sqlite3` 打开\
    \ `Passwords.sqlite`。如果你运行 `.schema` 命令，会看到新增了 `Category` 和 `List` 这两个表。\n\n```\n\
    CREATE TABLE ZCATEGORY ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER,\
    \ ZNAME VARCHAR );\nCREATE TABLE ZLIST ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER,\
    \ Z_OPT INTEGER, ZVERSION INTEGER, ZNAME VARCHAR );\n```\n\n类别列表的版本号已创建。\n\n```\n\
    sqlite> select zversion from zlist where zname='category';\n1\n```\n\n最后，预期的类别数据已经加载完毕。\n\
    \n```\nsqlite> select * from zcategory;\n1|1|1|Web Site\n2|1|1|Desktop Software\n\
    ```\n\n你已经成功地向数据存储中导入了类别初始值。你可以退出并重新运行应用程序，会注意到版本控制机制防止了这些数据被重复加载。\n\n### 创建种子数据的新版本\n\
    \n假设你想将信用卡 PIN 码作为一个类别添加进去。为这段代码增加版本号很简单。你只需添加另一个由新版本号保护的 `if` 语句，并更改写入数据库的版本号即可。你需要累积性地添加条目，这样，如果你是首次运行应用程序，则会得到版本\
    \ 1 和版本 2 的所有类别；但如果你已经在版本 1 上，代码只会加载版本 2 的值。最后，你需要更新数据存储中的版本号，以反映当前已加载的版本。清单 10–26\
    \ 展示了 `loadData:` 方法中更新后的代码。\n\n**清单 10–26.** *添加种子数据的版本 2*\n\n```\n- (void)loadData\n\
    {\n  ...\n  // 创建类别以得到最新版本\n  if (version < 1)\n  {\n    [self addCategoryWithName:@\"\
    Web Site\"];\n    [self addCategoryWithName:@\"Desktop Software\"];\n  }\n  if\
    \ (version < 2)\n  {\n    [self addCategoryWithName:@\"Credit Card PIN\"];\n \
    \ }\n\n  // 更新版本号并保存上下文\n  [categoryVersion setValue:[NSNumber numberWithInt:2]\
    \ forKey:@\"version\"];\n  [self saveContext];\n}\n```\n\n我们还没有更新 MyStash 用户界面来使用这些类别——这作为练习留给你完成。\n\
    \n### 错误处理\n\n当你要求 Xcode 为你生成一个 Core Data 应用程序时，它会为与 Core Data 持久化存储通信的每个关键方面生成样板代码。这段代码对于设置你的持久化存储协调器、托管对象上下文和托管对象模型来说绰绰有余。实际上，如果你回到一个非\
    \ Core Data 项目并添加 Core Data 支持，直接插入与 Xcode 生成相同的代码来管理 Core Data 交互是很好的做法。这段代码是可以投入生产环境的。\n\
    \n也就是说，它在除了一个方面之外可以投入生产环境：错误处理。\n\nXcode 生成的代码通过一条注释提醒你这个缺点，注释内容如下：\n\n```\n/*\n\
    将这里的实现替换为能妥善处理错误的代码。\n\nabort() 会导致应用程序生成崩溃日志并终止。你不应该在发布的应用程序中使用此函数，尽管它在开发过程中可能有用。如果无法从错误中恢复，请显示一个警告面板，指导用户通过按下\
    \ Home 按钮退出应用程序。\n\n此处错误的典型原因包括：\n* 持久化存储不可访问；\n* 持久化存储的架构与当前的托管对象模型不兼容。\n请检查错误消息以确定实际问题。\n\
    \n如果持久化存储不可访问，通常文件路径有问题。通常，文件 URL 指向的是应用程序的资源目录，而不是可写目录。\n\n如果在开发过程中遇到架构不兼容错误，你可以通过以下方法减少其发生频率：\n\
    * 直接删除现有存储：\n[[NSFileManager defaultManager] removeItemAtURL:storeURL error:nil]\n\
    \n* 通过将以下字典作为 options 参数传递来执行自动轻量级迁移：\n[NSDictionary dictionaryWithObjectsAndKeys:[NSNumber\
    \ numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption, [NSNumber\
    \ numberWithBool:YES], NSInferMappingModelAutomaticallyOption, nil];\n\n轻量级迁移仅适用于有限的架构更改；更多详情请参考“Core\
    \ Data 模型版本控制与数据迁移编程指南”。\n*/\n```\n\nXcode 生成的实现会记录错误并终止应用程序，这显然是一种不友好的方式。当这种情况发生时，用户看到的是你的应用程序突然消失，没有任何线索说明原因。如果这种情况发生在已发布的应用程序中，你会得到差评和低销量。\n\
    \n但令人高兴的是，你不必陷入这种记录日志并使应用程序崩溃的陷阱。在本节中，你将探索在 Core Data 中处理错误的策略。没有哪一种策略是最好的，但本节应该能为你特定的应用程序和用户群激发灵感，并帮助你设计出一套合理的错误处理策略。\n\
    \nCore Data 中的错误可以分为两大类：\n\n*   正常 Core Data 操作中的错误\n*   校验错误\n\n接下来的小节将讨论处理这两类错误的策略。\n"
- fmt: "# Handling Core Data Operational Errors\n\nAll the examples in this book respond\
    \ to any Core Data errors using the default, Xcode-generated error-handling code,\
    \ dutifully outputting the error message to Xcode's console and aborting the application.\
    \ This approach has two advantages.\n\n* It helps diagnose issues during development\
    \ and debugging.\n* It's easy to implement.\n\nThese advantages help only you\
    \ as developer, however, and do nothing good for the application's users. Before\
    \ you publicly release an application that uses Core Data, you should design and\
    \ implement a better strategy for responding to errors. The good news is that\
    \ the strategy needn't be large or difficult to implement, because your options\
    \ for how to respond are limited. Although applications are all different, in\
    \ most cases you won't be able to recover from a Core Data error and should probably\
    \ follow Apple's advice, represented in the previous comment: display an alert\
    \ and instruct the user to close the application. Doing this explains to users\
    \ what happened and gives them control over when to terminate the app. It's not\
    \ much control, but hey—it's better than just having the app disappear.\n\nVirtually\
    \ all Core Data operational errors should be caught during development, so careful\
    \ testing of your app should prevent these scenarios. Dealing with them, however,\
    \ is simple: just follow Apple's advice from the comment. To add error handling\
    \ code to the `MyStash` application, declare a method in `AppDelegate.h` for showing\
    \ the alert:\n\n```\n- (void)showCoreDataError;\n```\n\nThen, add the implementation\
    \ to `AppDelegate.m`. You can quibble with the wording, but remember that error\
    \ messages aren't a paean to the muses, and the longer the message, the less likely\
    \ it will be read. [Listing 10–27](#Chapter10.html#list_10_27) contains an implementation\
    \ with a short and simple message—with only an extraneous exclamation mark to\
    \ plead with the user to read it:\n\n**Listing 10–27.** *A method to show a Core\
    \ Data error*\n\n```\n- (void)showCoreDataError\n{\n  UIAlertView *alert = [[UIAlertView\
    \ alloc] initWithTitle:@\"Error!\" message:@\"MyStash can't continue.\\nPress\
    \ the Home button to close MyStash.\" delegate:nil cancelButtonTitle:@\"OK\" otherButtonTitles:\
    \ nil];\n  [alert show];\n}\n```\n\nNow, change the `persistentStoreCoordinator:`\
    \ accessor method to use this new method instead of logging and aborting. [Listing\
    \ 10–28](#Chapter10.html#list_10_28) shows the updates to `persistentStoreCoordinator:`.\n\
    \n**Listing 10–28.** *The updated `persistentStoreCoordinator:` method*\n\n```\n\
    - (NSPersistentStoreCoordinator *)persistentStoreCoordinator\n{\n  if (__persistentStoreCoordinator\
    \ != nil)\n  {\n    return __persistentStoreCoordinator;\n  }\n  __persistentStoreCoordinator\
    \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
    \  {\n    // Create the Notes persistent store\n    NSURL *noteStoreURL = [[self\
    \ applicationDocumentsDirectory] URLByAppendingPathComponent:@\"Notes.sqlite\"\
    ];\n    NSError *error = nil;\n    if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
    \ configuration:@\"Notes\" URL:noteStoreURL options:nil error:&error])\n    {\n\
    \      [self showCoreDataError];\n    }\n  }\n\n  {\n    // Create the Passwords\
    \ persistent store\n    NSURL *passwordStoreURL = [[self applicationDocumentsDirectory]\
    \ URLByAppendingPathComponent:@\"Passwords.sqlite\"];\n    NSError *error = nil;\n\
    \    if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
    \ configuration:@\"Passwords\" URL:passwordStoreURL options:nil error:&error])\n\
    \    {\n      [self showCoreDataError];\n    }\n\n    // Encrypt the password\
    \ database\n    NSDictionary *fileAttributes = [NSDictionary dictionaryWithObject:NSFileProtectionComplete\
    \ forKey:NSFileProtectionKey];\n    if (![[NSFileManager defaultManager] setAttributes:fileAttributes\
    \ ofItemAtPath:[passwordStoreURL path] error:&error])\n    {\n      [self showCoreDataError];\n\
    \    }\n  }\n\n  return __persistentStoreCoordinator;\n}\n```\n\nTo force this\
    \ error to display, run the `MyStash` application, and then close it. Go to the\
    \ data model, add an attribute called `foo` of type `String` to the `Note` entity,\
    \ and then run the application again. The persistent store coordinator will be\
    \ unable to open the data store because the model no longer matches, and your\
    \ new error message will display, as shown in Figure 10–26.\n\n![images](images/1001a.jpg)\n\
    \n**Figure 10–1a.** *Handling a Core Data error*\n\nThat's probably the best you\
    \ can do to handle unexpected errors. The next section, however, talks about handling\
    \ expected errors: validation errors."
  raw: '#### Handling Core Data Operational Errors


    All the examples in this book respond to any Core Data errors using the default,
    Xcode-generated error-handling code, dutifully outputting the error message to
    Xcode''s console and aborting the application. This approach has two advantages.


    *   It helps diagnose issues during development and debugging.

    *   It''s easy to implement.


    These advantages help only you as developer, however, and do nothing good for
    the application''s users. Before you publically release an application that uses
    Core Data, you should design and implement a better strategy for responding to
    errors. The good news is that the strategy needn''t be large or difficult to implement,
    because your options for how to respond are limited. Although applications are
    all different, in most cases you won''t be able to recover from a Core Data error
    and should probably follow Apple''s advice, represented in the previous comment:
    display an alert and instruct the user to close the application. Doing this explains
    to users what happened and gives them control over when to terminate the app.
    It''s not much control, but hey—it''s better than just having the app disappear.


    Virtually all Core Data operational errors should be caught during development,
    so careful testing of your app should prevent these scenarios. Dealing with them,
    however, is simple: just follow Apple''s advice from the comment. To add error
    handling code to the MyStash application, declare a method in `AppDelegate.h`
    for showing the alert:


    **`- (void)showCoreDataError;`**


    Then, add the implementation to `AppDelegate.m`. You can quibble with the wording,
    but remember that error messages aren''t a paean to the muses, and the longer
    the message, the less likely it will be read. [Listing 10–27](#Chapter10.html#list_10_27)
    contains an implementation with a short and simple message—with only an extraneous
    exclamation mark to plead with the user to read it:


    **Listing 10–27.** *A method to show a Core Data error*


    **`- (void)showCoreDataError`**

    **`{`**

    **`  UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"Error!" message:@"MyStash`![images](images/U002.jpg)**

