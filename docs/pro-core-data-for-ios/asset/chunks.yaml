- fmt: '### Understanding CRUD


    Whether you claim the `R` stands for Read or Retrieve and whether you side with
    Destroy over Delete for the `D`, the acronym CRUD describes the four operations
    you perform on a persistent data store:


    - Create

    - Retrieve (Read)

    - Update

    - Delete (Destroy)


    These four operations apply to all persistent store interaction, whether you’re
    working with Core Data in an iOS application, an Oracle database in a Java Enterprise
    Web application, a Virtual Storage Access Method (VSAM) file in a COBOL program,
    or any other situation in which you have a program that works with data. In fact,
    the CRUD concept has been extended to describe other situations in which you create,
    retrieve, update, and delete data. For example, the latest approach to providing
    services over the Web, Representational State Transfer (REST), has been called
    CRUD for the Web; the HTTP verbs map to the CRUD operations like this:


    - `POST` = Create

    - `GET` = Retrieve

    - `PUT` = Update

    - `DELETE` = Delete


    In this chapter, you’ll build one application twice: once working directly with
    `NSManagedObject` instances and the second time with custom classes that extend
    `NSManagedObject`. This section builds the raw `NSManagedObject` version. With
    a nod to Scott Hanselman’s Baby Smash! ([`www.hanselman.com/babysmash/`](http://www.hanselman.com/babysmash/)),
    this application, called Shapes, has the following requirements and characteristics:


    - Each time someone taps the screen, a random shape appears where the screen was
    tapped.

    - The shape is randomly a circle or a polygon.

    - If a polygon, the shape has a random number of sides and can be concave, convex,
    or mixed.

    - If a circle, the shape has a random radius.

    - Shapes appear in random colors.

    - Shaking the device deletes all the shapes.

    - Rotating the device updates all the shapes to random colors.

    - The screen splits down the middle, and each shape appears twice, once on each
    screen half.

    - One of the screen halves is zoomed at 2x magnification (meaning some shapes
    won’t appear, because they’ll fall outside the screen’s boundaries).

    - Shapes is built for the iPad to take advantage of the extra screen space.


    From a Core Data perspective, Shapes illustrates the following:


    - *Create*: Each time you tap the screen, Shapes creates a shape object in the
    persistent store.

    - *Retrieve*: Each time the screen draws the shapes, Shapes retrieves the shapes
    from the persistent store.

    - *Update*: Each time you rotate the device, Shapes updates all the shapes in
    the persistent store with different random colors.

    - *Delete*: Each time you shake the device, Shapes deletes all the shapes from
    the persistent store.

    - *Inheritance*: The `Polygon` and `Circle` entities inherit from a common parent,
    `Shape`.

    - *One-to-many*: One `Polygon` instance relates to many `Vertex` instances.

    - *Many-to-many*: Many `Shape` instances relate to many `Canvas` instances.

    - *One-to-one*: One `Canvas` instance relates to one `Transform` instance, which
    controls scaling.


    The finished application will look like [Figure 5–1](#Chapter05.html#fig_5_1).


    ![images](images/0501.jpg)


    ***Figure 5–1.** The finished Shapes application*


    Shapes probably can’t compete with the fun of BabySmash!, but we don’t want to
    encourage smashing iPads anyway. Shapes illustrates a wide range of Core Data
    fundamentals. You’ll notice, however, that Shapes doesn’t filter or sort results,
    which [Chapter 6](#Chapter06.html#ch6) covers.


    In Xcode, create a new project and select a Single View Application under iOS.
    Call it Shapes, enter `book.coredata` for the Company Identifier, and set Device
    Family to iPad (as [Figure 5–2](#Chapter05.html#fig_5_2) shows). Save the project
    to open it in Xcode.


    ![images](images/0502.jpg)


    ***Figure 5–2.** New iPad project called Shapes*


    Notice that you had no opportunity in the Single View Application template to
    add Core Data to your application, so add Core Data now. You learned how to do
    that in [Chapter 1](#Chapter01.html#ch1), but to recap, select the Shapes project
    on the left, go to the Build Phases tab, and expand the Link Binary with Libraries
    section, as [Figure 5–3](#Chapter05.html#fig_5_3) shows. Click the + button under
    that section, select `CoreData.framework`, and click Add. `CoreData.framework`
    appears in your project’s file tree on the left side of Xcode. Drag it to the
    Frameworks folder.


    ![images](images/0503.jpg)


    **Figure 5–3.** *Preparing to add Core Data to the Shapes application*'
