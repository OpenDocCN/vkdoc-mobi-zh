  trans: '

    ### 可视化用户界面


    League Manager 应用包含四个界面：

    - 球队列表

    - 添加/编辑球队

    - 球员列表

    - 添加/编辑球员


    球队列表界面会列出应用内存储的所有球队及其球衣颜色。界面中有一个用于添加球队的 `+` 按钮，以及一个用于删除球队的编辑按钮。该界面如图 3–1 所示。


    ![images](img/0301.jpg)


    **图 3–1.** *球队列表界面*


    添加/编辑球队界面提供了用于输入球队名称和球衣颜色的字段。该界面如图 3–2 所示。你可以通过点击球队列表界面中的 `+` 按钮来添加新球队，或通过点击现有球队来编辑其名称和球衣颜色，从而显示此界面。


    ![images](img/0302.jpg)


    **图 3–2.** *添加/编辑球队界面*


    球员列表界面列出了特定球队的所有球员。通过点击任意球队旁边的详细信息展开按钮即可进入该界面。如图 3–3 所示，该界面有一个用于添加新球员的 `+` 按钮和一个用于删除球员的编辑按钮。


    ![images](img/0303.jpg)


    **图 3–3.** *球员列表界面*


    与添加/编辑球队界面类似，添加/编辑球员界面允许用户添加或编辑球员，并提供了相应的字段：名、姓和电子邮件地址。该界面如图 3–4 所示。你可以通过点击球员列表界面中的
    `+` 按钮来添加新球员，或通过点击现有球员来编辑其数据。


    ![images](img/0304.jpg)


    **图 3–4.** *添加/编辑球员界面*


    现在你已了解要构建的内容，让我们开始吧。


    ### 使用 SQLite 作为持久化存储


    在本节中，你将构建一个基于 Core Data 的应用，本章将使用该应用来演示不同的持久化存储选项。你将从 Xcode 的 Core Data 模板开始，在生成的代码基础上构建一个应用，该应用可以存储一组球队和一组球员，并允许用户对其进行维护。不要过分关注应用代码或用户界面；相反，应聚焦于背后的持久化存储及其多种形式。


    首先，启动 Xcode，选择 `File` ![images](img/U001.jpg) `New` ![images](img/U001.jpg) `New
    Project`。在弹出的对话框左侧的 iOS 下选择 Application，在右侧选择 Master-Detail Application，如图 3–5
    所示。点击 Next 按钮。在项目选项中，为 Product Name 输入 **League Manager**，为 Company Identifier
    输入 **book.coredata**，并勾选 Use Core Data 复选框，如图 3–6 所示。


    ![images](img/0305.jpg)


    **图 3–5.** *选择 Master-Detail Application 模板*


    ![images](img/0306.jpg)


    **图 3–6.** *命名项目并选择使用 Core Data*


    将项目保存到你通常保存项目的位置。


    就当前目的而言，League Manager 应用中最有趣的部分是数据模型。理解持久化存储依赖于创建并理解合适的数据模型，因此请仔细且精确地完成这一部分。通过选择
    `League_Manager.xcdatamodeld` 在 Xcode 中打开数据模型。Xcode 右侧会显示生成的数据模型，其中包含一个名为 `Event`
    的实体和一个名为 `timeStamp` 的属性。选中 `Event` 实体并按 Delete 键将其删除，这样你将得到一个空的数据模型，如图 3–7 所示。


    ![images](img/0307.jpg)


    **图 3–7.** *空数据模型*


    League Manager 数据模型需要两个实体：一个用于存储球队，另一个用于存储球员。对于球队，你需要跟踪两个属性：名称和球衣颜色。对于球员，你需要跟踪三个属性：名、姓和电子邮件地址（这样你就可以联系球员，通知他们训练、比赛以及负责分发橙子片的时间安排）。你还需要记录哪些球员为哪支球队效力，以及某位球员为哪支球队效力。首先创建
    `Team` 实体：点击 Xcode 底部显示的 Add Entity 按钮。（它可能显示为 Add Fetch Request 或 Add Configuration；如果是这样，请点击并按住以从菜单中选择
    Add Entity。）Xcode 会创建一个名为 `Entity` 的新实体，其名称已高亮显示，方便你直接输入 **Team** 并按 Enter 键。现在点击
    Add Attribute 按钮（它可能显示为 Add Property 或 Add Fetched Property；如果是这样，请点击并按住以从菜单中选择
    Add Attribute）并输入 `name` 作为新属性的名称。请注意，你也可以点击 Attributes 部分底部的 `+` 按钮来添加属性。从 Type
    下拉菜单中选择 `String`。现在按照相同步骤创建第二个属性，但将其命名为 `uniformColor`，并选择 `String` 类型。你的数据模型应如图
    3–8 所示。


    ![images](img/0308.jpg)


    **图 3–8.** *球队数据模型*


    在创建球队与球员之间的一对多关系之前，你必须先有球员供球队关联。创建另一个名为 `Player` 的实体，包含三个属性，均为 `String` 类型：`firstName`、`lastName`
    和 `email`。你的数据模型现在应如图 3–9 所示。


    ![images](img/0309.jpg)


    **图 3–9.** *球队与球员数据模型*


    #### 配置一对多关系


    要创建 `Team` 实体与 `Player` 实体之间的一对多关系，请选中 `Team` 实体，然后点击 Relationships 部分下方的 `+`
    按钮。将此关系命名为 `players`，并从 Destination 下拉菜单中选择 `Player`。在数据模型检查器中，保持 Optional 复选框处于选中状态。勾选
    To-Many Relationship 复选框；一支球队可以拥有多名球员。对于 Delete Rule，从下拉菜单中选择 Cascade，这样删除一支球队时会将其所有球员一并删除。你暂时还无法在
    Inverse 下拉菜单中选择反向关系，因为你尚未创建反向关系。Relationship information 部分应如图 3–10 所示。


    ![images](img/0310.jpg)


    **图 3–10.** *球员关系选项*


    接下来，通过选中 `Player` 实体，添加一个关系并将其命名为 `team`，来创建从 `Player` 实体到 `Team` 实体的反向关系。从 Destination
    列中选择 `Team`，从 Inverse 列中选择 `players`。保持关系选项为默认值。现在，你应该能够选中 `Team` 实体并验证其 `players`
    关系已有反向关系：`team`。你的 Xcode 窗口应如图 3–11 所示。


    ![images](img/0311.jpg)


    **图 3–11.** *完整的 League Manager 数据模型*

    '
- fmt: "### Building the User Interface\n\nWith the data model complete, `League Manager`\
    \ now requires code to display the data. `Xcode` generated most of the code necessary\
    \ to display the list of teams; the next task is to tweak the code, since it's\
    \ prepared to show `Event` entities and the `Event` entity no longer exists in\
    \ the data model. This code resides in `MasterViewController.h` and `MasterViewController.m`,\
    \ so start by opening the `MasterViewController.h` file. Notice that it has two\
    \ members: an `NSManagedObjectContext` instance and an `NSFetchedResultsController`\
    \ instance. You could move the `NSManagedObjectContext` instance, which you recognize\
    \ as the object context for your application, to your application's delegate (`League_ManagerAppDelegate`),\
    \ but you'll leave it here for this simple application. The `NSFetchedResultsController`\
    \ instance works with the table view to show your teams.\n\nYou need a method\
    \ to add a team, so add one called `insertTeamWithName:` and declare it in `MasterViewController.h`.\
    \ Also, the generated code saves the context in a couple of places, so adhere\
    \ to the Don't Repeat Yourself (DRY) principle and move it all to one method called\
    \ `saveContext:`. The code for `MasterViewController.h` now looks like this, with\
    \ the new method declarations in bold:\n\n```objc\n#import <UIKit/UIKit.h>\n#import\
    \ <CoreData/CoreData.h>\n\n@interface MasterViewController : UITableViewController\
    \ <NSFetchedResultsControllerDelegate>\n\n@property (strong, nonatomic) NSFetchedResultsController\
    \ *fetchedResultsController;\n@property (strong, nonatomic) NSManagedObjectContext\
    \ *managedObjectContext;\n\n- (void)insertTeamWithName:(NSString *)name uniformColor:(NSString\
    \ *)uniformColor;\n- (void)saveContext;\n\n@end\n```\n\nOpen the `MasterViewController.m`\
    \ file, and adjust the view title in the `initWithNibName:bundle:` method that\
    \ sets the title for the application. That line looks like this:\n\n```objc\n\
    self.title = NSLocalizedString(@\"League Manager\", @\"League Manager\");\n```\n\
    \nNow define the `insertTeamWithName:` method in `MasterViewController.m`. That\
    \ method looks like this:\n\n```objc\n- (void)insertTeamWithName:(NSString *)name\
    \ uniformColor:(NSString *)uniformColor {\n    // Create a new instance of the\
    \ entity managed by the fetched results controller.\n    NSManagedObjectContext\
    \ *context = [self.fetchedResultsController managedObjectContext];\n    NSEntityDescription\
    \ *entity = [[self.fetchedResultsController fetchRequest] entity];\n    NSManagedObject\
    \ *newManagedObject = [NSEntityDescription\ninsertNewObjectForEntityForName:[entity\
    \ name] inManagedObjectContext:context];\n\n    // Configure the new team\n  \
    \  [newManagedObject setValue:name forKey:@\"name\"];\n    [newManagedObject setValue:uniformColor\
    \ forKey:@\"uniformColor\"];\n\n    // Save the context\n    [self saveContext];\n\
    }\n```\n\nThis code gets the managed object context from the application's `fetchedResultsController`\
    \ and then inserts a new `NSManagedObject` instance into that managed object context.\
    \ Notice that it doesn't specify that the new entity you're trying to insert is\
    \ named `Team`. The name gets defined in the accessor for `fetchedResultsController`.\
    \ The generated code used the name `Event`, so find the line in `fetchedResultsController`\
    \ that looks like this:\n\n```objc\nNSEntityDescription *entity = [NSEntityDescription\
    \ entityForName:@\"Event\"\ninManagedObjectContext:self.managedObjectContext];\n\
    ```\n\nand change it to this:\n\n```objc\nNSEntityDescription *entity = [NSEntityDescription\
    \ entityForName:@\"Team\"\ninManagedObjectContext:self.managedObjectContext];\n\
    ```\n\nAlso, you'll notice another vestige of the generated model in the `fetchedResultsController`\
    \ method: a reference to the attribute called `timeStamp`, used for sorting the\
    \ fetched results ([Chapter 6](#Chapter06.html#ch6) discusses sorting and how\
    \ it works). Change to sort on the team name, ascending, so that this line:\n\n\
    ```objc\nNSSortDescriptor *sortDescriptor = [[NSSortDescriptor alloc] initWithKey:@\"\
    timeStamp\"\nascending:NO];\n```\n\nnow looks like this:\n\n```objc\nNSSortDescriptor\
    \ *sortDescriptor = [[NSSortDescriptor alloc] initWithKey:@\"name\"\nascending:YES];\n\
    ```\n\nAfter creating the managed object representing the new team, the code in\
    \ the `insertTeamWithName:` method sets its name and uniform color using the parameters\
    \ passed:\n\n```objc\n[newManagedObject setValue:name forKey:@\"name\"];\n[newManagedObject\
    \ setValue:uniformColor forKey:@\"uniformColor\"];\n```\n\nFinally, the `insertTeamWithName:`\
    \ method saves the object graph, including the new team, by calling the `saveContext:`\
    \ method that you declared but haven't yet defined. You define it by cutting and\
    \ pasting that bit of code from the now-superfluous `insertNewObject:` method\
    \ that `Xcode` generated. After snipping that bit, delete the `insertNewObject:`\
    \ method and define `saveContext:` like this:\n\n```objc\n- (void)saveContext\
    \ {\n    NSManagedObjectContext *context = [self.fetchedResultsController\nmanagedObjectContext];\n\
    \    NSError *error = nil;\n    if (![context save:&error]) {\n        /*\n  \
    \       Replace this implementation with code to handle the error appropriately.\n\
    \n         abort() causes the application to generate a crash log and terminate.\
    \ You should\nnot use this function in a shipping application, although it may\
    \ be useful during\ndevelopment. If it is not possible to recover from the error,\
    \ display an alert panel\nthat instructs the user to quit the application by pressing\
    \ the Home button.\n         */\n        NSLog(@\"Unresolved error %@, %@\", error,\
    \ [error userInfo]);\n        abort();\n    }\n}\n```\n\nLeave the generated comment\
    \ there to remind you that calling `abort` represents a decidedly un-user-friendly\
    \ way to handle errors. [Chapter 10](#Chapter10.html#ch10) talks about appropriate\
    \ error handling. Since you now have a method that you can reuse to save the context,\
    \ replace the other instance of that code found in the `commitEditingStyle:` method,\
    \ with a call to the new `saveContext:` method."
