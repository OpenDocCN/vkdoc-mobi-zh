    #### Building the Testing Framework


    The approach for adding tests for the performance testing application to run is
    to create an Objective-C protocol called `PerformanceTest` and then create an
    array of tests that all implement that protocol. The application will display
    the names of the tests in the picker view and execute the selected test when the
    user taps the Run Selected Test button. The protocol, then, requires two methods.


    *   One to return the name of the test for display in the picker view.

    *   One to execute the selected test in the application''s managed object context.


    To keep the project organized, create a new group under the PerformanceTuning
    folder (Ctrl+click PerformanceTuning and select New Group from the pop-up menu),
    and call it Tests. The tests you add throughout this chapter will go in this group.
    To create the protocol, select File ![images](images/U001.jpg) New ![images](images/U001.jpg)
    New File, select Cocoa Touch on the left and Objective-C protocol on the right,
    and click Next. Call the protocol `PerformanceTest.h`, and put it in the Tests
    group. Open `PerformanceTest.h`, and modify it to match the following code:


    `#import <Foundation/Foundation.h>`

    **`#import <CoreData/CoreData.h>`**


    `@protocol PerformanceTest <NSObject>`


    **`- (NSString *)name;`**

    **`- (NSString *)runWithContext:(NSManagedObjectContext *)context;`**


    `@end`


    Before integrating the testing framework into the application, create a test (a
    “test” test, if you will) so that you have something to both see in the picker
    view and to run. The first test you create will retrieve all the movies, actors,
    and studios from the persistent store. Create a new Objective-C class called `FetchAllMoviesActorsAndStudiosTest`
    as a subclass of `NSObject`, and add it to the Tests group you just created. The
    following code is for the header file:


    `#import <Foundation/Foundation.h>`

    **`#import "PerformanceTest.h"`**


    `@interface FetchAllMoviesActorsAndStudiosTest : NSObject` **`<PerformanceTest>`**


    `@end`


    Here is the code for the implementation file. Modify your file to look like this:


    **`#import <CoreData/CoreData.h>`**

    `#import "FetchAllMoviesActorsAndStudiosTest.h"`


    `@implementation FetchAllMoviesActorsAndStudiosTest`


    **`- (NSString *)name {`**

    **`return @"Fetch all test";`**

    **`}`**


    **`- (NSString *)runWithContext:(NSManagedObjectContext *)context {`**

    **`NSFetchRequest *request = [[NSFetchRequest alloc] init];`**

    **`[request setEntity:[NSEntityDescription entityForName:@"Movie"`**![images](images/U002.jpg)

    **`inManagedObjectContext:context]];`**

    **`NSArray *results = [context executeFetchRequest:request error:nil];`**


    **`int actorsRead = 0, studiosRead = 0;`**

    **`for (NSManagedObject *movie in results) {`**

    **`actorsRead += [[movie valueForKey:@"actors"] count];`**

    **`studiosRead += [[movie valueForKey:@"studios"] count];`**

    **`[context refreshObject:movie mergeChanges:NO];`**

    **`}`**

    **`return [NSString stringWithFormat:@"Fetched %d actors and %d studios", actorsRead,`![images](images/U002.jpg)**

