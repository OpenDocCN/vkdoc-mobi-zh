    \ on the runtime date, add a method to your `NSManagedObject`-derived class that\
    \ overrides `NSManagedObject`’s `awakeFromInsert:` method. In this method, called\
    \ when the object is inserted into the managed object context, you can provide\
    \ your own default value for any fields. The following implementation inserts\
    \ today’s date into the attribute `myDate` so that any new instances of this object\
    \ automatically have today’s date:\n\n```\n- (void)awakeFromInsert {\n  [super\
    \ awakeFromInsert];\n  [self setValue:[NSDate date] forKey:@\"myDate\"];\n}\n\
    ```\n\n## Undoing and Redoing\n\nGolfers call it a mulligan. School-yard children\
    \ call it a do-over. Computer users call it **Edit** > **Undo**. Whatever you\
    \ call it, you’ve realized that you’ve blundered and want to take back your last\
    \ action. Not all scenarios afford you that opportunity, to which many broken-hearted\
