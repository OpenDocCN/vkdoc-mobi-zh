    or an `NSValidationNumberTooLargeError`, depending on which is appropriate. If,
    for example, you set the Min value to 7.0 and the Max value to 10.0 for the `radius`
    attribute of the `Circle` entity, random circles that don’t fall within that radius
    range would not save to the persistent store.


