- fmt: "#### Using Model Configurations\n\nA Core Data model defines entities and\
    \ their relationships in order to specify how data should be laid out, but it\
    \ can also stipulate where the data should be written. To specify where data should\
    \ be written, Core Data uses what's called *configurations*. Each entity can be\
    \ associated with one or more configurations, and when a persistent store is created\
    \ for a configuration, only the entities linked to that configuration are included\
    \ in the persistence operation. In your example, you'll create two configurations.\
    \ The first one will contain notes, and the second will store passwords.\n\nIn\
    \ Xcode, open the `MyStash.xcdatamodel` model. Select the default configuration\
    \ (below the list of Entities). It displays all the entities associated with that\
    \ configuration, as shown in [Figure 10–17](#Chapter10.html#fig_10_17). Initially,\
    \ only the default configuration exists, which contains both the `Note` and the\
    \ `System` entities. Click and hold the Add Entity button at the bottom of the\
    \ Xcode window, select Add Configuration from the menu, and add a configuration\
    \ called `Notes`. Repeat the process to create another configuration called `Passwords`.\n\
    \nThe `Notes` configuration currently has no associated entities. To add the `Note`\
    \ entity to the associated list of entities, select the `Notes` entity, and then\
    \ drag it to the Entities list for that configuration, as shown in [Figure 10–18](#Chapter10.html#fig_10_18).\
    \ To add the `System` entity to the `Passwords` configuration, drag the `System`\
    \ entity to the `Passwords` configuration, as shown in [Figure 10–19](#Chapter10.html#fig_10_19).\n\
    \n![images](images/1017.jpg)\n\n**Figure 10–17.** *The default configuration*\n\
    \n![images](images/1018.jpg)\n\n**Figure 10–18.** *Adding the Note entity to the\
    \ Notes configuration*\n\n![images](images/1019.jpg)\n\n**Figure 10–19.** *The\
    \ System entity added to the Passwords configuration*\n\nYou have now prepared\
    \ your model for the persistent store split. All that is left to do is to create\
    \ the persistent stores using the new configurations. For this, open `AppDelegate.m`,\
    \ and change the `persistentStoreCoordinator:` method to match [Listing 10–17](#Chapter10.html#list_10_17).\n\
    \n**Listing 10–17.** *The updated `persistentStoreCoordinator:` accessor*\n\n\
    ```\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\n{  \n  if (__persistentStoreCoordinator\
    \ != nil)\n  {\n    return __persistentStoreCoordinator;\n  }\n\n  __persistentStoreCoordinator\
    \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
    \n  {\n    // Create the Notes persistent store\n    NSURL *noteStoreURL = [[self\
    \ applicationDocumentsDirectory] URLByAppendingPathComponent:@\"Notes.sqlite\"\
    ];\n    NSError *error = nil;\n    if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
    \ configuration:@\"Notes\" URL:noteStoreURL options:nil error:&error])\n    {\n\
    \      NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n      abort();\n\
    \    }\n  }\n\n  {\n    // Create the Passwords persistent store\n    NSURL *passwordStoreURL\
    \ = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"Passwords.sqlite\"\
    ];\n    NSError *error = nil;\n    if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
    \ configuration:@\"Passwords\" URL:passwordStoreURL options:nil error:&error])\n\
    \    {\n      NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n\
    \      abort();\n    }\n  }\n\n  return __persistentStoreCoordinator;\n}\n```\n\
    \nInstead of creating a single store, you created two persistent stores in an\
    \ almost identical manner. The only difference is that you explicitly named the\
    \ configuration for the store to use, instead of passing `nil` for the configuration\
    \ parameter. For `Passwords.sqlite`, you use the `Passwords` configuration, while\
    \ the `Notes.sqlite` persistent store uses the `Notes` configuration.\n\nThis\
    \ is a good time to take a deserved break and launch the application. Add a new\
    \ note as well as a new password entry to verify that it works. To your dismay,\
    \ you don't notice any difference. But rejoice because this is exactly what you\
    \ were aiming for: a change in the underlying persistent store structure shouldn't\
    \ affect the rest of the MyStash application. Be content that the app still works\
    \ even though you've completely changed how data is stored. To see the difference,\
    \ you need to pop the hood open and take a look at the SQLite databases. Open\
    \ a Terminal window, and go find your data stores using the following command:\n\
    \n```\nfind ~/Library/Application\\ Support/iPhone\\ Simulator/ -name \"*.sqlite\"\
    \n```\n\nYou will see your two new databases listed there, `Notes.sqlite` and\
    \ `Passwords.sqlite`. If you open the `Notes.sqlite` database and run the `.schema`\
    \ command, you will see the entire model, but although you can see that the note\
    \ has been saved correctly, the `System` table does not contain any data.\n\n\
    ```\nsqlite> .schema\nCREATE TABLE ZNOTE ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER,\
    \ Z_OPT INTEGER, ZBODY VARCHAR, ZTITLE VARCHAR );\nCREATE TABLE ZSYSTEM ( Z_PK\
    \ INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER, ZNAME VARCHAR, ZPASSWORD\
    \ VARCHAR, ZUSERID VARCHAR );\nCREATE TABLE Z_METADATA (Z_VERSION INTEGER PRIMARY\
    \ KEY, Z_UUID VARCHAR(255), Z_PLIST BLOB);\nCREATE TABLE Z_PRIMARYKEY (Z_ENT INTEGER\
    \ PRIMARY KEY, Z_NAME VARCHAR, Z_SUPER INTEGER, Z_MAX INTEGER);\nsqlite> select\
    \ * from ZNOTE;\n1|1|1|This is the note's body|This is a note\nsqlite> select\
    \ * from ZSYSTEM;\nsqlite>\n```\n\nNow do the same procedure on the `Passwords.sqlite`\
    \ database. The opposite is true: the table for the `System` entity is populated\
    \ but not the `Note`.\n\n```\nsqlite> .schema\nCREATE TABLE ZNOTE ( Z_PK INTEGER\
    \ PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER, ZBODY VARCHAR, ZTITLE VARCHAR );\n\
    CREATE TABLE ZSYSTEM ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER,\
    \ ZNAME VARCHAR, ZPASSWORD VARCHAR, ZUSERID VARCHAR );\nCREATE TABLE Z_METADATA\
    \ (Z_VERSION INTEGER PRIMARY KEY, Z_UUID VARCHAR(255), Z_PLIST BLOB);\nCREATE\
    \ TABLE Z_PRIMARYKEY (Z_ENT INTEGER PRIMARY KEY, Z_NAME VARCHAR, Z_SUPER INTEGER,\
    \ Z_MAX INTEGER);\nsqlite> select * from ZNOTE;\nsqlite> select * from ZSYSTEM;\n\
    1|2|1|My Secure System|mypassword|myuserid\nsqlite>\n```\n\nYou have successfully\
    \ split your data model into two persistent stores. The next section explains\
    \ a situation in which this might be useful.\n\n### Adding Encryption\n\nData\
    \ encryption is a big deal for any application that requires storage of sensitive\
    \ information. Core Data does not do much to help you with this task, but it doesn't\
    \ stand in your way, either. Securing data follows two schools of thought, and\
    \ you may choose to adhere to either one based on your own needs and requirements.\
    \ These two schools are either to encrypt the entire database file or to just\
    \ encrypt selected fields within your data store. The next sections explain both\
    \ options."
