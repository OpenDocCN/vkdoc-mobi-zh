  trans: '#### 模型定义类


    如第 1 章所述，所有 Core Data 应用程序都需要一个对象模型。模型定义了要持久化的实体及其属性。实体具有三种属性：


    *   属性（Attributes）

    *   关系（Relationships）

    *   获取属性（Fetched Properties）


    表 2-1 列出了不同的类及其角色的简要描述。遍历这些类以更好地理解模型实例化背后的机制是一项有趣的练习，但在实践中，在 Xcode 中创建模型通常是以图形方式完成的，无需编写一行代码。


    ![images](img/t0201.jpg)


    图 2-4 展示了定义模型所涉及的类之间的关系。`NSManagedObjectModel` 持有对零个或多个 `NSEntityDescription`
    对象的引用。每个 `NSEntityDescription` 持有对零个或多个 `NSPropertyDescription` 对象的引用。`NSPropertyDescription`
    是一个抽象类，具有三个具体实现：


    *   `NSAttributeDescription`

    *   `NSRelationshipDescription`

    *   `NSFetchedPropertyDescription`


    ![images](img/0204.jpg)


    **图 2-4.** *模型定义类*


