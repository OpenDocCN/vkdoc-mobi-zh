    #### Invoking Validation


    Core Data allows you to create objects with invalid attributes and invokes the
    validation routines when you save the managed object context. Objects with invalid
    values in their attributes or incorrect numbers of relationships can live comfortably
    in the managed object context. The validation doesn’t occur until you try to save
    the managed object, at which time the save fails with the appropriate error codes.


    If you don’t want to wait for the `save:` method to be invoked, however, you can
    invoke validation manually. To do so, simply call any of the validation methods
    that you just learned about.


    #### Default Values


    Core Data allows you to set default values for each of your attributes. You might
    have noticed that setting validation rules in your attributes without setting
    default values that pass those rules nets you compiler warnings that look something
    like this:


    `Misconfigured Property. Circle.radius has default value smaller than minimum
    value.`


    The compiler tries to protect you from creating attributes that violate your validation
    rules. You can safely ignore them and make sure to set valid values yourself,
    or you can take advantage of Core Data’s offer to help.


    Setting default values works exactly as you’d suppose: you type a valid default
    value into the Default field, and any new instance of that entity type will begin
    life with that value for that attribute. Try setting the default value for `radius`
    to 8.0, for example, and comment out the code that sets a random radius. You’ll
    find that all created circles have a radius of 8.0.


