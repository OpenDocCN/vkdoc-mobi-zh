    \ valueForKey:@\"myAttribute\"]`将检索`myAttribute`的值，而`[object setValue:@\"theValue\"\
    \ forKey:@\"myAttribute\"]`将设置`myAttribute`的值。\n\n最后，在让应用程序继续正常执行之前，向上下文添加一个新条目，并使用之前实现的`saveContext`方法将新条目保存到持久化存储中。\n\
    \n```\nNSString *launchTitle = [NSString stringWithFormat:@\"launch %d\", [results\
    \ count]];\nNSManagedObject *object = [NSEntityDescription insertNewObjectForEntityForName:[entity\
    \ name] inManagedObjectContext:context];\n[object setValue:launchTitle forKey:@\"\
    myAttribute\"];\n[self saveContext];\nNSLog(@\"Added: %@\", launchTitle);\n```\n\
    \n首次启动应用程序会产生以下输出：\n\n```\n2011–02-25 05:13:23.783 DemoApp[2299:207] Added: launch\
