    ### Splitting Data Across Multiple Persistent Stores


    Up to this point in the book, you have always associated a data model with a single
    persistent store. You may have cases, however, that would benefit from splitting
    the model into multiple stores. When multiple persistent stores are involved,
    Core Data is able to dispatch the entities to persist to the proper store and
    rebuild object graphs spawning across multiple stores. The role of the `NSPersistentStoreCoordinator`
    is to manage the multiple stores and make them appear to the Core Data API user
    as if they were a single store.


    The MyStash data model contains both notes and passwords. When you run the MyStash
    application, all notes and passwords are stored in the `MyStash.sqlite` persistent
    store. Suppose, though, that you want to split the persistent store into two so
    that notes are stored in the `Notes.sqlite` persistent store and passwords go
    into the `Passwords.sqlite` persistent store. [Figure 10–16](#Chapter10.html#fig_10_16)
    illustrates the split, showing where each type of managed object is persisted.


