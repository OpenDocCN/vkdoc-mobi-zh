    \ 方法，并在初始化每个控制器后立即设置其托管对象上下文成员。需要添加的两行代码如下：\n\n```\nnoteListViewController.managedObjectContext\
    \ = self.managedObjectContext;\n. . .\npasswordListViewController.managedObjectContext\
    \ = self.managedObjectContext;\n```\n"
- fmt: "# Creating the Interface for Adding and Editing Notes and Passwords\n\nThe\
    \ `MyStash` application can now display and delete notes and passwords, but you\
    \ can't yet add or edit any notes or passwords. This next part walks you through\
    \ adding interfaces to add and edit notes and passwords. You'll create one modal\
    \ for notes and a different modal for passwords, and `MyStash` will use the same\
    \ modal for both adding and editing.\n\nStart with the interface for adding and\
    \ editing notes. Create a `UIViewController` subclass called `NoteViewController`,\
    \ and make sure only the \"With XIB for user interface\" option is selected. This\
    \ creates three files:\n\n- `NoteViewController.h`\n- `NoteViewController.m`\n\
    - `NoteViewController.xib`\n\nOpen `NoteViewController.h`. You'll add the following:\n\
    \n- A text field to allow users to enter the note's title.\n- A text view to hold\
    \ the body of the note.\n- A pointer to the parent controller so you can ask the\
    \ parent to save any new note.\n- A managed object that represents the current\
    \ note, so the user can edit an existing note. If the current note is `nil`, the\
    \ code will create a new one.\n- An initializer that receives the parent controller\
    \ and the note object.\n- A method that responds to the user dismissing the modal\
    \ with the Save button.\n- A method that responds to the user dismissing the modal\
    \ with the Cancel button.\n\n`NoteListViewController.h` should match [Listing\
    \ 10–7](#Chapter10.html#list_10_7).\n\n**Listing 10–7.** *`NoteListViewController.h`*\n\
    \n```\n@class NoteListViewController;\n\n@interface NoteViewController : UIViewController\n\
    {\n    UITextField *titleField;\n    UITextView *body;\n    NoteListViewController\
    \ *parentController;\n    NSManagedObject *note;\n}\n@property (strong, nonatomic)\
    \ IBOutlet UITextField *titleField;\n@property (strong, nonatomic) IBOutlet UITextView\
    \ *body;\n@property (strong, nonatomic) NoteListViewController *parentController;\n\
    @property (strong, nonatomic) NSManagedObject *note;\n\n- (id)initWithParentController:(NoteListViewController\
    \ *)parentController note:(NSManagedObject *)note;\n- (IBAction)save:(id)sender;\n\
    - (IBAction)cancel:(id)sender;\n\n@end\n```\n\nThe implementation file for the\
    \ Note view, `NoteViewController.m`, is shown next, in [Listing 10–8](#Chapter10.html#list_10_8).\
    \ Note the following:\n\n- The initialization method stores the parent `NoteListViewController`\
    \ instance and the specified `NSManagedObject` instance.\n- When the view loads\
    \ and the `viewDidLoad:` method is called, the code checks whether the `note`\
    \ managed object is `nil`. If it is, the code sets the body text to \"Type text\
    \ here . . .\" so that users know what to do. If it's not `nil`, the code takes\
    \ the values from the managed object and puts them into the user interface fields.\n\
    - The `save:` method checks again if it's editing an existing note or adding a\
    \ new one. If it's editing an existing note, it updates the `note` managed object\
    \ with the values the user entered and asks the parent controller to save the\
    \ context. If it's creating a new note, it asks the parent controller to insert\
    \ a new note object, passing the user-entered values. Either way, it then dismisses\
    \ the modal.\n- The `cancel:` method simply dismisses the modal, discarding any\
    \ user input.\n\n**Listing 10–8.** *`NoteViewController.m`*\n\n```\n#import \"\
    NoteViewController.h\"\n#import \"NoteListViewController.h\"\n\n@implementation\
    \ NoteViewController\n\n@synthesize titleField, body, parentController, note;\n\
    \n- (id)initWithParentController:(NoteListViewController *)parentController_\n\
    \                        note:(NSManagedObject *)note_\n{\n    if ((self = [super\
    \ init]))\n    {\n        self.parentController = parentController_;\n       \
    \ self.note = note_;\n    }\n    return self;\n}\n\n- (void)viewDidLoad\n{\n \
    \   [super viewDidLoad];\n    if (note != nil)\n    {\n        titleField.text\
    \ = [note valueForKey:@\"title\"];\n        body.text = [note valueForKey:@\"\
    body\"];\n    }\n    else\n    {\n        body.text = @\"Type text here . . .\"\
    ;\n    }\n}\n\n- (void)viewDidUnload\n{\n    self.titleField = nil;\n    self.body\
    \ = nil;\n    [super viewDidUnload];\n}\n\n- (IBAction)save:(id)sender\n{\n  \
    \  if (parentController != nil)\n    {\n        if (note != nil)\n        {\n\
    \            [note setValue:titleField.text forKey:@\"title\"];\n            [note\
    \ setValue:body.text forKey:@\"body\"];\n            [parentController saveContext];\n\
    \        }\n        else\n        {\n            [parentController insertNoteWithTitle:titleField.text\
    \ body:body.text];\n        }\n    }\n    [self dismissModalViewControllerAnimated:YES];\n\
    }\n\n- (IBAction)cancel:(id)sender\n{\n    [self dismissModalViewControllerAnimated:YES];\n\
    }\n\n@end\n```\n\nNote that you haven't yet implemented the `insertNoteWithTitle:body:`\
    \ method in `NoteListViewController`, so this file won't yet compile.\n\nNext,\
    \ you must create the actual user interface that the `NoteViewController` instance\
    \ controls. Select the `NoteViewController.xib` file to open it in Interface Builder.\
    \ Perform the following steps:\n\n1. Drag a Navigation Bar onto the view, and\
    \ align it with the top edge of the view. Change its title to Note.\n2. Drag two\
    \ Bar Button Items onto the navigation bar—one on the left and one on the right.\n\
    3. Change the labels on the two Bar Button items you just added—the one on the\
    \ left to Cancel and the one on the right to Save.\n4. Ctrl+drag from the Cancel\
    \ Bar Button Item to the File's Owner icon and select `cancel:` from the pop-up\
    \ menu.\n5. Ctrl+drag from the Save Bar Button Item to the File's Owner icon and\
    \ select `save:` from the pop-up menu.\n6. Drag a Label onto the top left of the\
    \ view, below the navigation bar, and change its text to Title:.\n7. Drag a Text\
    \ Field onto the view, to the right of the Title: label.\n8. Drag a Text View\
    \ onto the view, below the Title: label, and make it fill the rest of the view.\n\
    9. Ctrl+drag from the File's Owner icon to the text field, and select `titleField`\
    \ from the pop-up menu.\n10. Ctrl+drag from the File's Owner icon to the Text\
    \ view, and select `body` from the pop-up menu.\n\n[Figure 10–9](#Chapter10.html#fig_10_9)\
    \ shows what your view should look like when you're done. Make sure you follow\
    \ all the previous steps, including wiring the buttons to the action methods you\
