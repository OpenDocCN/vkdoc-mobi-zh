- fmt: "#### Custom Validation\n\nIf you’ve generated your own `NSManagedObject`-derived\
    \ classes for your data model, you can easily create your own validation routines\
    \ that Core Data automatically invokes when customizing your objects. One option\
    \ is to edit your `NSManagedObject` implementation (`*.m`) file and override the\
    \ `validateValue:forKey:error` method, which has this signature:\n\n`- (BOOL)validateValue:(id\
    \ *)ioValue forKey:(NSString *)key error:(NSError **)outError`\n\nIt returns `YES`\
    \ for valid and `NO` for not valid. This method gets called for each of the properties\
    \ of your object, with the `key` value holding the property’s name for each invocation.\
    \ You are responsible for validating all the properties of your object by determining\
    \ which key has been passed and doing appropriate validation for the property\
    \ with that key.\n\nCore Data offers a second, cleaner option that allows you\
    \ to write individual validation routines for any or all of your properties and\
    \ allows the default validation to process for any properties you haven’t explicitly\
    \ written validation routines for. To use this validation option, you write methods\
    \ in your `NSManagedObject`-derived class’s implementation file that take this\
    \ form:\n\n`- (BOOL)validate<AttributeName>:(id *)ioValue error:(NSError **)outError`\n\
    \nSubstitute the name of the attribute you’re trying to validate for `<AttributeName>`.\
    \ For example, remove any validation you have on the `radius` attribute of the\
    \ `Circle` entity in the Core Data modeler, and create a method in `Circle.m`\
    \ that looks like this:\n\n```\n- (BOOL)validateRadius:(id *)ioValue error:(NSError\
    \ **)outError {\n  NSLog(@\"Validating radius using custom method\");\n\n  if\
    \ ([*ioValue floatValue] < 7.0 || [*ioValue floatValue] > 10.0) {\n    // Fill\
    \ out the error object\n    if (outError != NULL) {\n      NSString *msg = @\"\
    Radius must be between 7.0 and 10.0\";\n      NSDictionary *dict = [NSDictionary\
    \ dictionaryWithObject:msg\n                                                 \
    \      forKey:NSLocalizedDescriptionKey];\n      NSError *error = [[NSError alloc]\
    \ initWithDomain:@\"Shapes\" code:10 userInfo:\n                        dict];\n\
    \      *outError = error;\n    }\n    return NO;\n  }\n  return YES;\n}\n```\n\
    \nThis code retrieves the value passed in the `ioValue` parameter as a `float`\
    \ and then compares it to the acceptable boundaries: 7.0 and 10.0. If the comparison\
    \ fails, the code fills out an `NSError` object, if one was passed, with an arbitrary\
    \ error code of 10. The code then returns `NO` to fail the validation. If the\
    \ comparison passes, the code returns `YES`.\n\nIf you run this code and create\
    \ a few shapes that include some circles, eventually the application will crash.\
    \ You’ll see messages in the log that look something like this:\n\n`2011-03-24\
    \ 04:57:59.948 Shapes[65076:207] Validating radius using custom method`\n\nIf\
    \ any shapes fail validation, you’ll see log messages that look like this:\n\n\
    `2011-03-24 04:57:59.949 Shapes[65076:207] Unresolved error Error Domain=Shapes\
    \ Code=10`\n`\"Radius must be between 7.0 and 10.0\" UserInfo=0x590f5a0`\n\nUse\
    \ this same mechanism to create date validations that validate date ranges relative\
    \ to the current date. The following example validates that a date called `myDate`\
    \ in the Core Data model falls between a week ago and a week from now:\n\n```\n\
    - (BOOL)validateMyDate:(id *)ioValue error:(NSError **)outError {\n  // 1 week\
    \ = 60 sec/min * 60 min/hr * 24 hr/day * 7 day/week\n  static int SECONDS_IN_A_WEEK\
    \ = 60 * 60 * 24 * 7;\n\n  NSLog(@\"Validating myDate using custom method\");\n\
    \n  // Get the passed date and calculate the valid dates\n  NSDate *myDate = (NSDate\
    \ *)(*ioValue);\n  NSDate *minDate = [NSDate dateWithTimeIntervalSinceNow:-SECONDS_IN_A_WEEK];\n\
    \  NSDate *maxDate = [NSDate dateWithTimeIntervalSinceNow:SECONDS_IN_A_WEEK];\n\
    \n  // Check if it’s valid\n  if ([myDate earlierDate:minDate] == myDate || [myDate\
    \ laterDate:maxDate] == myDate) {\n    // The date isn’t valid, so construct an\
    \ NSError if one was passed and return NO\n    if (outError != NULL) {\n     \
    \ NSString *msg = @\"myDate must fall between a week ago and a week from now\"\
    ;\n      NSDictionary *dict = [NSDictionary dictionaryWithObject:msg\n       \
    \                                                forKey:NSLocalizedDescriptionKey];\n\
    \      NSError *error = [[NSError alloc] initWithDomain:@\"Shapes\" code:20 userInfo:\n\
    \                        dict];\n      *outError = error;\n    }\n    return NO;\n\
    \  }\n  return YES;\n}\n```\n\nAlthough `ioValue` is a pointer to an object reference,\
    \ which would allow you to change the input value in the object graph, Apple’s\
    \ documentation strongly discourages you from doing this because it could create\
    \ memory management issues.\n\nThe first method of validation, `validateValue:forKey:error`,\
    \ trumps the `validate<AttributeName>` way. If you’ve provided a `validateValue`\
    \ implementation, none of your `validate<AttributeName>` methods get called, and\
    \ Core Data uses the answer that `validateValue` returns to determine the validity\
    \ of an object.\n\nYou can also override the three other validation methods offered\
    \ by `NSManagedObject`:\n\n*   `validateForInsert`\n*   `validateForUpdate`\n\
    *   `validateForDelete`\n\nCore Data calls these methods to invoke validation\
    \ before inserting, updating, or deleting an object, respectively. These are the\
    \ methods that call the `validateValue` methods, whether yours or the default\
    \ `NSManagedObject` implementation. You can override these to do your own custom\
    \ validation, but be sure to call the superclass implementation first so that\
    \ you get all the appropriate validation. One tricky piece to doing this is that\
    \ if your code detects an error, it shouldn’t override any existing errors from\
    \ the validation in the superclass. Instead, it should combine any errors. Apple’s\
    \ documentation offers a method, `errorFromOriginalError`, that you can write\
    \ in your own classes to combine errors. You can use this method, listed here,\
    \ or you can write your own. Either way, be sure to combine errors and not overwrite\
    \ them.\n\n```\n- (NSError *)errorFromOriginalError:(NSError *)originalError error:(NSError\
    \ *)secondError\n{\n  NSMutableDictionary *userInfo = [NSMutableDictionary dictionary];\n\
    \  NSMutableArray *errors = [NSMutableArray arrayWithObject:secondError];\n\n\
    \  if ([originalError code] == NSValidationMultipleErrorsError) {\n    [userInfo\
    \ addEntriesFromDictionary:[originalError userInfo]];\n    [errors addObjectsFromArray:[userInfo\
    \ objectForKey:NSDetailedErrorsKey]];\n  } else {\n    [errors addObject:originalError];\n\
    \  }\n\n  [userInfo setObject:errors forKey:NSDetailedErrorsKey];\n\n  return\
    \ [NSError errorWithDomain:NSCocoaErrorDomain\n                             code:NSValidationMultipleErrorsError\n\
    \                         userInfo:userInfo];\n}\n```\n\nYou typically override\
    \ one of the `validateFor...` methods to perform validation that depends on multiple\
    \ properties. Each property might be valid on its own, but some combinations may\
    \ not be valid. Consider, for instance, that you want to make a circle invalid\
    \ for insertion if the `x` value is more than twice the `y` value. You create\
    \ a method in `Circle.m` that first calls the superclass implementation of `validateForInsert`\
    \ and then does its validation to make sure `x` isn’t more than twice `y`. It\
    \ could look like this:\n\n```\n- (BOOL)validateForInsert:(NSError **)outError\
    \ {\n  BOOL valid = [super validateForInsert:outError];\n```"
