  trans: "  \n#### 添加、编辑和删除球员  \n\n`LeagueManager` 应用基本完成，目前仅缺少添加、编辑和删除球员的功能。为实现这些功能，需创建一个新的\
    \ `UIViewController` 子类：在“Subclass of”下拉菜单中选择 `UIViewController`，并勾选“With XIB\
    \ for user interface”，将其命名为 `PlayerViewController`。此类与 `TeamViewController` 类及其界面类似，但包含三个字段：`firstName`、`lastName`\
    \ 和 `email`。它还持有对 `MasterViewController` 实例的引用，以便将所有 Core Data 的存储与检索操作委托给该类。该类中有一个成员用于记录该球员所属的球队，另一个成员用于引用球员对象。若球员对象为\
    \ `nil`，`PlayerViewController` 则创建新球员；否则，它将编辑现有球员对象。界面包含三个按钮：保存球员、取消操作（添加或编辑）以及删除球员。由于在删除球员前需显示确认操作表，因此让\
    \ `PlayerViewController` 实现 `UIActionSheetDelegate` 协议。`PlayerViewController.h`\
    \ 的内容请参见代码清单 3–4。  \n\n**代码清单 3–4.** *PlayerViewController.h*  \n\n```objc  \n\
    #import <UIKit/UIKit.h>  \n\n@class MasterViewController;  \n\n@interface PlayerViewController\
    \ : UIViewController <UIActionSheetDelegate> {  \n  IBOutlet UITextField *firstName;\
    \  \n  IBOutlet UITextField *lastName;  \n  IBOutlet UITextField *email;  \n \
    \ NSManagedObject *team;  \n  NSManagedObject *player;  \n  MasterViewController\
    \ *masterController;  \n}  \n@property (nonatomic, retain) UITextField *firstName;\
    \  \n@property (nonatomic, retain) UITextField *lastName;  \n@property (nonatomic,\
    \ retain) UITextField *email;  \n@property (nonatomic, retain) NSManagedObject\
    \ *team;  \n@property (nonatomic, retain) NSManagedObject *player;  \n@property\
    \ (nonatomic, retain) MasterViewController *masterController;  \n\n- (IBAction)save:(id)sender;\
    \  \n- (IBAction)cancel:(id)sender;  \n- (IBAction)confirmDelete:(id)sender; \
    \ \n- (id)initWithMasterController:(MasterViewController *)aMasterController team:\
    \  \n(NSManagedObject *)aTeam player:(NSManagedObject *)aPlayer;  \n\n@end  \n\
    ```  \n\n现在，打开 `PlayerViewController.m` 文件，导入 `MasterViewController.h`，并为各个属性添加\
    \ `@synthesize` 行。添加 `PlayerViewController.h` 中声明的 `initWithMasterController:`\
    \ 方法，以使用 `MasterViewController` 实例、`team` 以及可能为 `nil` 的 `player` 初始化该视图控制器。该方法如下所示：\
    \  \n\n```objc  \n- (id)initWithMasterController:(MasterViewController *)aMasterController\
    \ team:  \n(NSManagedObject *)aTeam player:(NSManagedObject *)aPlayer {  \n  if\
    \ ((self = [super init])) {  \n    self.masterController = aMasterController;\
    \  \n    self.team = aTeam;  \n    self.player = aPlayer;  \n  }  \n  return self;\
    \  \n}  \n```  \n\n使用 `viewDidLoad:` 方法从 `player` 托管对象中提取值（若不为 `nil`），并将其填入 `firstName`、`lastName`\
    \ 和 `email` 字段。该方法如下所示：  \n\n```objc  \n- (void)viewDidLoad {  \n  [super viewDidLoad];\
    \  \n  if (player != nil) {  \n    firstName.text = [player valueForKey:@\"firstName\"\
    ];  \n    lastName.text = [player valueForKey:@\"lastName\"];  \n    email.text\
    \ = [player valueForKey:@\"email\"];  \n  }  \n}  \n```  \n\n下一步是添加响应三个按钮的方法。`save:`\
    \ 和 `cancel:` 方法与 `TeamViewController` 类中的对应方法类似，具体如下：  \n\n```objc  \n- (IBAction)save:(id)sender\
    \ {  \n  if (masterController != nil) {  \n    if (player != nil) {  \n      [player\
    \ setValue:firstName.text forKey:@\"firstName\"];  \n      [player setValue:lastName.text\
    \ forKey:@\"lastName\"];  \n      [player setValue:email.text forKey:@\"email\"\
    ];  \n      [masterController saveContext];  \n    } else {  \n      [masterController\
    \ insertPlayerWithTeam:team firstName:firstName.text  \nlastName:lastName.text\
    \ email:email.text];  \n    }  \n  }  \n  [self dismissModalViewControllerAnimated:YES];\
    \  \n}  \n\n- (IBAction)cancel:(id)sender {  \n  [self dismissModalViewControllerAnimated:YES];\
    \  \n}  \n```  \n\n`MasterViewController` 中尚不存在 `insertPlayerWithTeam:` 方法，稍后将创建。但首先需要实现界面中删除按钮调用的\
    \ `confirmDelete:` 方法。该方法不会立即删除球员，而是显示一个操作表，请求用户确认其意图。实现时先检查 `player` 是否不为 `nil`，即只有已有球员才能被删除。实际上，编辑球员时才应显示删除按钮，但为了聚焦于\
    \ Core Data，此处保持简单，在添加球员时忽略删除按钮的点击。`confirmDelete:` 方法如下：  \n\n```objc  \n- (IBAction)confirmDelete:(id)sender\
    \ {  \n  if (player != nil) {  \n    UIActionSheet *confirm = [[UIActionSheet\
    \ alloc] initWithTitle:nil delegate:self  \ncancelButtonTitle:@\"Cancel\" destructiveButtonTitle:@\"\
    Delete Player\"  \notherButtonTitles:nil];  \n    confirm.actionSheetStyle = UIActionSheetStyleBlackTranslucent;\
    \  \n    [confirm showInView:self.view];  \n  }  \n}  \n```  \n\n注意，此处将 `self`\
    \ 作为 `UIActionSheet` 初始化方法的委托。Cocoa 框架会调用所传入委托的 `clickedButtonAtIndex:` 方法，因此需实现该方法。它检查被点击的按钮是否为删除按钮，然后请求主视图控制器使用\
    \ `deletePlayer:` 方法删除球员（该方法需在 `MasterViewController` 中创建）。`clickedButtonAtIndex:`\
    \ 方法如下：  \n\n```objc  \n- (void)actionSheet:(UIActionSheet *)actionSheet  \nclickedButtonAtIndex:(NSInteger)buttonIndex\
    \ {  \n  if (buttonIndex == 0 && masterController != nil) {  \n    // The Delete\
    \ button was clicked  \n    [masterController deletePlayer:player];  \n    [self\
    \ dismissModalViewControllerAnimated:YES];  \n  }  \n}  \n```  \n\n现在，回到 `MasterViewController.h`，声明\
    \ `PlayerViewController` 调用的两个方法：`insertPlayerWithTeam:` 和 `deletePlayer:`。声明如下：\
    \  \n\n```objc  \n- (void)insertPlayerWithTeam:(NSManagedObject *)team firstName:(NSString\
    \ *)firstName  \nlastName:(NSString *)lastName email:(NSString *)email;  \n- (void)deletePlayer:(NSManagedObject\
    \ *)player;  \n```  \n\n打开 `MasterViewController.m`，定义这两个方法。`insertPlayerWithTeam:`\
    \ 方法与 `insertTeamWithName:` 方法类似，但有一些重要区别。`insertTeamWithName:` 方法利用获取结果控制器及其与\
    \ `Team` 实体的关联，而 `Player` 实体与获取结果控制器并无关联。因此，`insertPlayerWithTeam:` 方法通过显式将 `Player`\
    \ 名称传递给 `insertNewObjectForEntityForName:` 方法来创建 `Player` 实体。它还必须通过将“team”键（即数据模型中关系的名称）设置为相应\
    \ `Team` 实体来建立与该实体的关系。`insertPlayerWithTeam:` 方法如下：  \n\n"
- fmt: "`- (void)insertPlayerWithTeam:(NSManagedObject *)team firstName:(NSString\
    \ *)firstName lastName:(NSString *)lastName email:(NSString *)email {\n  // Create\
    \ the player\n  NSManagedObjectContext *context = [self.fetchedResultsController\
    \ managedObjectContext];\n  NSManagedObject *player = [NSEntityDescription insertNewObjectForEntityForName:@\"\
    Player\" inManagedObjectContext:context];\n  [player setValue:firstName forKey:@\"\
    firstName\"];\n  [player setValue:lastName forKey:@\"lastName\"];\n  [player setValue:email\
    \ forKey:@\"email\"];\n  [player setValue:team forKey:@\"team\"];\n\n  // Save\
    \ the context.\n  [self saveContext];\n}\n```\n\nThe `deletePlayer:` method simply\
    \ retrieves the managed object context, calls its `deleteObject:` method, passing\
    \ in the `Player` managed object, and saves the managed object context. It looks\
    \ like this:\n\n```\n- (void)deletePlayer:(NSManagedObject *)player {\n  NSManagedObjectContext\
    \ *context = [self.fetchedResultsController managedObjectContext];\n  [context\
    \ deleteObject:player];\n  [self saveContext];\n}\n```\n\nThe final step is to\
    \ create the user interface and display it when users want to add or edit a player.\
    \ Select `PlayerViewController.xib`, select the View icon, and drag three `Label`\
    \ instances and three `Text Field` instances onto the view. Call the labels **First\
    \ Name:**, **Last Name:,** and **E-mail:**. Connect the text fields to the appropriate\
    \ properties. Drag three `Round Rect Button` instances to the view and call them\
    \ Save, Cancel, and Delete, and wire them to the appropriate methods. Your view\
    \ should look the one in [Figure 3–19](#Chapter03.html#fig_3_19).\n\n![images](images/0319.jpg)\n\
    \n**Figure 3–19.** *Player view*\n\nTo display the Player view when users summon\
    \ it, go to `PlayerListViewController.m`, import `PlayerViewController.h`, and\
    \ find the empty `showPlayerView:` method you created earlier. In that method,\
    \ you create a `PlayerViewController` instance; initialize it with the master\
    \ view controller, the team, and a `nil` player so that the application will create\
    \ a new player; and then show the view as a modal window. The code looks like\
    \ this:\n\n```\n- (void)showPlayerView {\n  PlayerViewController *playerViewController\
    \ = [[PlayerViewController alloc] initWithMasterController:masterController team:team\
    \ player:nil];\n  [self presentModalViewController:playerViewController animated:YES];\n\
    }\n```\n\nYou also must make the application respond to taps on a player's cell\
    \ so that users can edit or delete the selected player. Find the generated `didSelectRowAtIndexPath:`\
    \ method, still in `PlayerListViewController.m`, and gut it. Replace its contents\
    \ with code to get the tapped player from the sorted `players` array, create the\
    \ player view controller, initialize it as before but this time with the selected\
    \ player, and show the view. The method now looks like this:\n\n```\n- (void)tableView:(UITableView\
    \ *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath {\n  NSManagedObject\
    \ *player = [[self sortPlayers] objectAtIndex:indexPath.row];\n  PlayerViewController\
    \ *playerViewController = [[PlayerViewController alloc] initWithMasterController:masterController\
    \ team:team player:player];\n  [self presentModalViewController:playerViewController\
    \ animated:YES];\n}\n```\n\nThat finishes the League Manager application. Build\
    \ and run it. Any teams you've added should still be shown, thanks to the SQLite\
    \ persistent store. Drill down into the teams and add some players, delete some\
    \ players, and edit some players. Try deleting teams as well, and watch the players\
    \ disappear.\n\n## Seeing the Data in the Persistent Store\n\n[Chapter 2](#Chapter02.html#ch2)\
    \ shows how to use the `sqlite3` command-line tool to browse the data in the SQLite\
    \ Core Data persistent store. To finish the section on SQLite persistent stores,\
    \ find your SQLite database (`League_Manager.sqlite3`), and launch `sqlite3`,\
    \ passing the database, with a command like this:\n\n```\nsqlite3 ./5.0/Applications/CE79C20B-4CBF-47C3–9E7C-9EC24FA88/Documents/League_Manager.sqlite\n\
    ```\n\nKeep the League Manager application running in the iPhone Simulator so\
    \ that you can bounce between the application and `sqlite3` tool to see the effects\
    \ on the database.\n\nStart by showing the tables using the `.tables` command.\
    \ Your output should look like this:\n\n```\nsqlite> .tables\nZPLAYER       ZTEAM\
    \         Z_METADATA    Z_PRIMARYKEY\n```\n\nThe `ZPLAYER` table holds the `Player`\
    \ entities, and the `ZTEAM` table holds the `Team` entities. Create the three\
    \ teams: Crew, with Blue uniforms; Fire, with Red uniforms, and Revolution, with\
    \ Green uniforms. In the SQLite database, they look something like this, depending\
    \ on how many teams you've created and deleted:\n\n```\nsqlite> select * from\
    \ ZTEAM;\n1|2|3|Crew|Blue\n2|2|1|Fire|Red\n3|2|1|Revolution|Green\n```\n\nThe\
    \ League Manager application has no players, as a quick check in the database\
    \ shows:\n\n```\nsqlite> select * from ZPLAYER;\n```\n\nDrill into the Crew team\
    \ and add three players: Jordan Gordon, Pat Sprat, and Bailey Staley. Refer to\
    \ [Figure 3–20](#Chapter03.html#fig_3_20) to see how to enter a player. After\
    \ adding the three players, you should see them all in a list on the Players screen,\
    \ as in [Figure 3–21](#Chapter03.html#fig_3_21).\n\n![images](images/0320.jpg)\n\
    \n**Figure 3–20** *Adding a player*\n\n![images](images/0321.jpg)\n\n**Figure\
    \ 3–21.** *Players*\n\nRerun the select command on the `ZPLAYER` table. The output\
    \ should look something like this:\n\n```\nsqlite> select * from ZPLAYER;\n1|1|1|1|Jordan|Gordan|jgordon@example.com\n\
    2|1|1|1|Pat|Sprat|psprat@example.com\n3|1|1|1|Bailey|Staley|bstaley@example.com\n\
    ```\n\nNow add another player, but this time to the Fire team. Call this player\
    \ Terry Gary. Now, run a command to show each team with the players on it, like\
