    `property = "x"; desired type = NSNumber; given type = NSCFString; value = Books
    for`

    `Professionals by Professionals.''`


    Core Data enforces data integrity, but sometimes you want more than that. Sometimes
    you want to enforce what corporate-speak terms *business rules*, though they might
    or might not have anything to do with business. Take, for example, the `Polygon`
    instances in the Shapes application and their relationships with `Vertex` instances.
    A real-world polygon with no vertices doesn’t exist, so you set the “vertices”
    relationship to nonoptional. A polygon with one vertex isn’t a polygon, either.
    It’s a point. And a two-vertex polygon is a line. A polygon must have at least
    three vertices to make the club. For that reason, you set the value for Min Count
    in the “vertices” relationship to three. Relating a `Polygon` instance to only
    one or two `Vertex` instances prevents the managed object context from saving
    successfully. Instead, you get an error that looks like this: “Operation could
    not be completed. (Cocoa error 1580.)” The error codes come from the header file
    `CoreDataErrors.h` and are listed, along with descriptions, in [Table 5–1](#Chapter05.html#tab_5_1).
    Note that the descriptions are lifted directly from the header file. Checking
    this table reveals that error code 1580 means “to-many relationship with too few
    destination objects,” which describes exactly what you tried to do.


    ![images](images/t0501.jpg)


    The table of error codes gives you some clues about what Core Data will validate
    for you. The Core Data modeling tool for defining attributes and relationships
    gives you the same clues. For relationships, you can validate that to-many relationships
    have a valid number of destination objects—not too many and not too few. For attributes,
    however, you have a larger number of parameters you can validate, depending on
    the attribute type. For all the number types, you can specify a Min value and
    a Max value:


    *   Integer 16

    *   Integer 32

    *   Integer 64

    *   Decimal

    *   Double

    *   Float


