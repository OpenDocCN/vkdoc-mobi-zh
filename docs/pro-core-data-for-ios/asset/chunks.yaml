  trans: "\n### 创建组织架构图数据\n\n`OrgChart` 应用是一个非常简单的应用，没有花哨的用户界面——只有一个空白的灰色窗口。在本章中，你将使用\
    \ `OrgChart` 应用从持久化存储中检索数据。在 `OrgChartAppDelegate.m` 文件中，`createData` 方法用于填充数据存储。该方法用于填充数据存储的数据，如图\
    \ 6-2 所示的组织架构图。\n\n![images](img/0602.jpg)\n\n**图 6-2.** *示例组织架构图数据集*\n\n代码清单\
    \ 6-1 展示了根据图 6-2 填充数据的 `createData` 方法。打开 `OrgChartAppDelegate.m`，并将第 2 章中的 `createData`\
    \ 方法替换为代码清单 6-1 中的代码。\n\n**代码清单 6-1.** *填充组织架构图的 `createData` 方法*\n\n```\n- (void)createData\n\
    {\n  NSManagedObjectContext *context = [self managedObjectContext];\n  \n  NSEntityDescription\
    \ *orgEntity = [NSEntityDescription entityForName:@\"Organization\"\ninManagedObjectContext:context];\n\
    \  NSEntityDescription *personEntity = [NSEntityDescription entityForName:@\"\
    Person\"\ninManagedObjectContext:context];\n\n  { // 公司 A\n    NSManagedObject\
    \ *organization = [NSEntityDescription\ninsertNewObjectForEntityForName:[orgEntity\
    \ name] inManagedObjectContext:context];\n    \n    [organization setValue:@\"\
    Company A\" forKey:@\"name\"];\n    int orgId = [organization hash];\n    [organization\
    \ setValue:[NSNumber numberWithInt:orgId] forKey:@\"id\"];\n\n    NSManagedObject\
    \ *john = [NSEntityDescription\ninsertNewObjectForEntityForName:[personEntity\
    \ name] inManagedObjectContext:context];\n    [john setValue:@\"John\" forKey:@\"\
    name\"];\n    [john setValue:[NSNumber numberWithInt:32] forKey:@\"age\"];\n\n\
    \    NSManagedObject *jane = [NSEntityDescription\ninsertNewObjectForEntityForName:[personEntity\
    \ name] inManagedObjectContext:context];\n    [jane setValue:@\"Jane\" forKey:@\"\
    name\"];\n    [jane setValue:[NSNumber numberWithInt:26] forKey:@\"age\"];\n\n\
    \    NSManagedObject *tim = [NSEntityDescription\ninsertNewObjectForEntityForName:[personEntity\
    \ name] inManagedObjectContext:context];\n    [tim setValue:@\"Tim\" forKey:@\"\
    name\"];\n    [tim setValue:[NSNumber numberWithInt:22] forKey:@\"age\"];\n\n\
    \    NSManagedObject *jim = [NSEntityDescription\ninsertNewObjectForEntityForName:[personEntity\
    \ name] inManagedObjectContext:context];\n    [jim setValue:@\"Jim\" forKey:@\"\
    name\"];\n    [jim setValue:[NSNumber numberWithInt:40] forKey:@\"age\"];\n\n\
    \    NSManagedObject *kate = [NSEntityDescription\ninsertNewObjectForEntityForName:[personEntity\
    \ name] inManagedObjectContext:context];\n    [kate setValue:@\"Kate\" forKey:@\"\
    name\"];\n    [kate setValue:[NSNumber numberWithInt:40] forKey:@\"age\"];\n\n\
    \    NSManagedObject *jill = [NSEntityDescription\ninsertNewObjectForEntityForName:[personEntity\
    \ name] inManagedObjectContext:context];\n    [jill setValue:@\"Jill\" forKey:@\"\
    name\"];\n    [jill setValue:[NSNumber numberWithInt:22] forKey:@\"age\"];\n\n\
    \    NSMutableSet *johnsEmployees = [john mutableSetValueForKey:@\"employees\"\
    ];\n    [johnsEmployees addObject:jane];\n    [johnsEmployees addObject:tim];\n\
    \n    NSMutableSet *timsEmployees = [tim mutableSetValueForKey:@\"employees\"\
    ];\n\n    [timsEmployees addObject:jim];\n    [timsEmployees addObject:kate];\n\
    \    [timsEmployees addObject:jill];\n\n    [organization setValue:john forKey:@\"\
    leader\"];\n  }\n\n  { // 公司 B\n    NSManagedObject *organization = [NSEntityDescription\n\
    insertNewObjectForEntityForName:[orgEntity name] inManagedObjectContext:context];\n\
    \    \n    [organization setValue:@\"Company B\" forKey:@\"name\"];\n    int orgId\
    \ = [organization hash];\n    [organization setValue:[NSNumber numberWithInt:orgId]\
    \ forKey:@\"id\"];\n\n    NSManagedObject *mary = [NSEntityDescription\ninsertNewObjectForEntityForName:[personEntity\
    \ name] inManagedObjectContext:context];\n    [mary setValue:@\"Mary\" forKey:@\"\
    name\"];\n    [mary setValue:[NSNumber numberWithInt:36] forKey:@\"age\"];\n\n\
    \    NSManagedObject *tom = [NSEntityDescription\ninsertNewObjectForEntityForName:[personEntity\
    \ name] inManagedObjectContext:context];\n    [tom setValue:@\"Tom\" forKey:@\"\
    name\"];\n    [tom setValue:[NSNumber numberWithInt:26] forKey:@\"age\"];\n\n\
    \    [[mary mutableSetValueForKey:@\"employees\"] addObject:tom];\n\n    [organization\
    \ setValue:mary forKey:@\"leader\"];\n  }\n\n  [self saveContext];\n}\n```\n\n\
    下一步是编辑 `application:didFinishLaunchingWithOptions:` 方法，使其调用 `createData`，如下所示：\n\
    \n```\n- (BOOL)application:(UIApplication *)application\ndidFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions\n{\n  [self createData];\n\n  self.window = [[UIWindow alloc]\
    \ initWithFrame:[[UIScreen mainScreen] bounds]];\n  // 应用启动后的自定义覆盖点。\n  self.viewController\
    \ = [[OrgChartViewController alloc]\ninitWithNibName:@\"OrgChartViewController\"\
    \ bundle:nil];\n  self.window.rootViewController = self.viewController;\n  [self.window\
    \ makeKeyAndVisible];\n  return YES;\n}\n```\n\n从你在第 2 章中运行 `OrgChart` 时起，删除现有的数据存储，然后启动应用。应用应该会启动，显示灰色屏幕，并且没有输出。应用已创建持久化存储，并使用组织架构图数据将其填充完毕，你将在本章后续部分使用这些数据对结果集进行排序、过滤和聚合。你可以使用前几章概述的技术来验证应用是否已创建持久化存储：找到\
    \ SQLite 数据存储，并使用 `sqlite3` 命令行工具对其运行查询。更多信息请参见第 2 章。\n"
- fmt: "### Reading and Outputting the Data\n\nNow that you've created your persistent\
    \ store and inserted all the org chart test data, you don't need to call the `createData:`\
    \ method anymore. Stop the application and comment out the `createData:` call\
    \ in the `application:didFinishLaunchingWithOptions:` method. Right below it,\
    \ add a call to the `readData:` method so that the application reads the data\
    \ and outputs it to the Debugger Console when the application launches. Through\
    \ this chapter, you'll replace the `readData:` method multiple times to read and\
    \ output different data from your org chart data model. The `application:didFinishLaunchingWithOptions:`\
    \ method should now look like this:\n\n```\n- (BOOL)application:(UIApplication\
    \ *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n\
    {\n//[self createData];\n[self readData];\n\n  self.window = [[UIWindow alloc]\
    \ initWithFrame:[[UIScreen mainScreen] bounds]];\n  // Override point for customization\
    \ after application launch.\n  self.viewController = [[OrgChartViewController\
    \ alloc] initWithNibName:@\"OrgChartViewController\" bundle:nil];\n  self.window.rootViewController\
    \ = self.viewController;\n  [self.window makeKeyAndVisible];\n  return YES;\n\
    }\n```\n\nNext, edit the `displayPerson:withIndentation:` method to display the\
    \ person's age since you just added this new field, like so:\n\n```\n- (void)displayPerson:(NSManagedObject*)person\
    \ withIndentation:(NSString*)indentation\n{\nNSLog(@\"%@Name: %@ (%@)\", indentation,\
    \ [person valueForKey:@\"name\"], [person valueForKey:@\"age\"]);\n\n  // Increase\
    \ the indentation for sub-levels\n  indentation = [NSString stringWithFormat:@\"\
    %@  \", indentation];\n\n  NSSet *employees = [person valueForKey:@\"employees\"\
    ];\n  id employee;\n  NSEnumerator *it = [employees objectEnumerator];\n  while((employee\
    \ = [it nextObject]) != nil)\n  {        \n    [self displayPerson:employee withIndentation:indentation];\n\
    \  }\n}\n```\n\nLaunch the application again, and the log output will look similar\
    \ to the following example, showing that your two organizations are there with\
    \ the proper org charts. (The ordering in your output may differ—for example,\
    \ Company B could come before Company A—but that's not important.)\n\n```\n2011-07-31\
    \ 20:59:09.057 OrgChart[9928:f203] Organization: Company A\n2011-07-31 20:59:09.059\
    \ OrgChart[9928:f203]   Name: John (32)\n2011-07-31 20:59:09.059 OrgChart[9928:f203]\
    \     Name: Tim (22)\n2011-07-31 20:59:09.060 OrgChart[9928:f203]       Name:\
    \ Kate (40)\n2011-07-31 20:59:09.060 OrgChart[9928:f203]       Name: Jim (40)\n\
    2011-07-31 20:59:09.061 OrgChart[9928:f203]       Name: Jill (22)\n2011-07-31\
    \ 20:59:09.061 OrgChart[9928:f203]     Name: Jane (26)\n2011-07-31 20:59:09.062\
    \ OrgChart[9928:f203] Organization: Company B\n2011-07-31 20:59:09.063 OrgChart[9928:f203]\
    \   Name: Mary (36)\n2011-07-31 20:59:09.063 OrgChart[9928:f203]     Name: Tom\
    \ (26)\n```\n\nYour data set is now ready and verified. The remainder of this\
    \ chapter deals with extracting only certain objects and rearranging them based\
    \ on constraints you specify.\n\n## Filtering\n\nCore Data uses the `NSPredicate`\
    \ class from the Foundation framework to specify how to select the objects that\
    \ should be part of the result set when executing a fetch request. Predicates\
    \ can be built in two ways: either you can build the object and its graph manually\
    \ or you can use the query language `NSPredicate` implements. You will find that\
    \ most of the time you will prefer the convenience and readability of the latter\
    \ method.\n\nThis section looks at both ways of building predicates for each example\
    \ in order to help draw a parallel between the query language and the `NSPredicate`\
    \ object graph. Understanding both ways will help you determine your preferred\
    \ approach. You can also mix and match the approaches depending on your applications\
    \ and data scenarios.\n\nThe predicate query language builds an `NSPredicate`\
    \ object graph from a string representation that has similarities with a SQL `WHERE`\
    \ clause. The method that builds a predicate from the language is `+predicateWithFormat:(NSString*)`.\
    \ For instance, if you want to get the managed object that represents Jane, you\
    \ build the predicate by calling `[NSPredicate predicateWithFormat:@\"name = 'Jane'\"\
    ]`.\n\nTo test this, modify the `readData:` method as follows:\n\n```\n- (void)readData\n\
    {\n  NSManagedObjectContext *context = [self managedObjectContext];\nNSEntityDescription\
    \ *entity = [NSEntityDescription entityForName:@\"Person\" inManagedObjectContext:context];\n\
    \nNSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];\n[fetchRequest\
    \ setEntity:entity];\n\nNSPredicate *predicate = [NSPredicate predicateWithFormat:@\"\
    name='Jane'\"];\n[fetchRequest setPredicate:predicate];\n\nNSArray *persons =\
    \ [context executeFetchRequest:fetchRequest error:nil];\n\nfor (NSManagedObject\
    \ *person in persons)\n{\nNSLog(@\"name=%@ age=%@\", [person valueForKey:@\"name\"\
    ], [person valueForKey:@\"age\"]);\n}\n}\n```\n\nRunning the application again\
    \ yields the following expected output:\n\n```\nname=Jane age=26\n```\n\nIn its\
    \ simplest form, a predicate executes a test on an object. If the test succeeds,\
    \ then the object is part of the result set. If the test is negative, then the\
    \ object isn't included in the result set. In the previous example, `name='Jane'`\
    \ is an example of a simple predicate. The key path `name` and the constant string\
    \ value `'Jane'` are called *expressions*. The operator `=` is called a *comparator*.\n\
    \n### Expressions for a Single Value\n\nExpressions, represented by the `NSExpression`\
    \ class, are the basic building blocks of a predicate. They represent values that\
    \ can be compared with each other or simply evaluated by themselves. The simplest\
    \ and most common type of expression is the expression that represents a single\
    \ value (as opposed to representing a collection of values). `NSPredicate` supports\
    \ four types of single-value expressions, as shown in [Table 6–1](#Chapter06.html#tab_6_1).\n\
    \n![images](images/t0601.jpg)\n\nThe previous example using the query language\
    \ had two expressions: `name` and `Jane`. The `name` expression is a key path\
    \ into the managed object, while the `Jane` expression is a constant value. Creating\
    \ the same expressions in code looks like this:\n\n```\nNSExpression *exprName\
    \ = [NSExpression expressionForKeyPath:@\"name\"];\nNSExpression *exprJane = [NSExpression\
    \ expressionForConstantValue:@\"Jane\"];\n```\n\n### Expressions for a Collection\n\
    \nSome comparisons require more than one right-side expression. This is the case,\
    \ for example, when you want to compare a value against a range of values. In\
    \ this situation, you need to provide a lower bound value and an upper bound value.\
    \ Predicates use arrays of expressions to represent multiple values. The following\
    \ example shows how to build a range of values. First, you create the expressions\
    \ representing the single values; you then put them into an expression representing\
    \ the array using the `expressionForAggregate:` method.\n\n```\nNSExpression *lower\
    \ = [NSExpression expressionForConstantValue:[NSNumber numberWithInt:20]];\nNSExpression\
    \ *upper = [NSExpression expressionForConstantValue:[NSNumber numberWithInt:35]];\n\
    NSExpression *exprRange = [NSExpression expressionForAggregate:[NSArray arrayWithObjects:lower,\
    \ upper, nil]];\n```\n\n**NOTE:** Although the `NSExpression` class provides a\
    \ way to build an expression from a selector using the `expressionForFunction:arguments:`\
    \ method, this mechanism is not supported by Core Data."
