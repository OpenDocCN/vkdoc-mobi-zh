- fmt: "### Using the Transformable Type\n\nDespite all the efforts to hide Core Data,\
    \ it is likely that some properties of the custom objects just feel like they\
    \ are using the “wrong” type simply to satisfy Core Data. For this type of situation,\
    \ the framework allows you to use the `Transformable` type (`NSTransformableAttributeType`).\
    \ In your Shapes application, the `color` property of the `Shape` object gives\
    \ this sensation of type misuse. In the current implementation, the color is represented\
    \ by a comma-delimited string so that you could use the `NSStringAttributeType`\
    \ in the data model. It works well, but it makes using the object more complicated\
    \ because you find yourself having to decode the value back and forth between\
    \ a string and a color. The first step is to change the data model. Select the\
    \ `Shape` entity, pick the `color` attribute, and change its type to `Transformable`.\
    \ In the `Transformer` field, put the name of the custom transformer you’ll be\
    \ writing: `UIColorTransformer`.\n\n**NOTE:** Value transformers are part of the\
    \ Foundation framework in Cocoa. As the name indicates, they facilitate the transformation\
    \ of data from one format to another. In Core Data, it is typical to use `NSKeyedUnarchiveFromDataTransformerName`,\
    \ which converts objects into `NSData`. Alternatively, you may extend `NSValueTransformer`\
    \ in order to provide a custom transformer, as you do in this chapter.\n\nIn the\
    \ code, you now edit `Shape.h` to change the property type from `NSString` to\
    \ `UIColor`.\n\n`@property (nonatomic, retain) UIColor *color;`\n\nNaturally,\
    \ using the `Transformable` type isn’t all good news. Because the transformer\
    \ creates an `NSData` representation of the `color` property, the data store will\
    \ use a binary field. In the case of SQLite, for example, a BLOB column will be\
    \ created to store your data. This means that you can no longer use the data in\
    \ the query. For instance, you would no longer be able to query for all red shapes.\
    \ Note that with the string encoding you used before, it wasn’t trivial either,\
    \ but it was at least possible.\n\nSince you changed the attribute type, you need\
    \ to go back to the application code to make it use the new type. First, alter\
    \ `ShapesViewController.m` to change the implementation of the `makeRandomColor:`\
    \ method, like so:\n\n```objc\n- (UIColor *)makeRandomColor {\n  // Set the shape’s\
    \ color\n  float red = (arc4random() % 256) / 255.0;\n  float green = (arc4random()\
    \ % 256) / 255.0;\n  float blue = (arc4random() % 256) / 255.0;\n\n  return [UIColor\
    \ colorWithRed:red green:green blue:blue alpha:1.0];\n}\n```\n\nDon’t forget to\
    \ change the return type in the method definition in the category at the top of\
    \ the file, like so:\n\n```objc\n@interface ShapesViewController (private)\n-\
    \ (void)createShapeAt:(CGPoint)point;\n- (void)updateAllShapes;\n- (void)deleteAllShapes;\n\
    - (UIColor *)makeRandomColor;\n@end\n```\n\nThe next place to modify is the implementation\
    \ of the `drawRect:` method in `BasicCanvasUIView.m`. Be sure to import `Shape.h`,\
    \ `Circle.h`, `Polygon.h`, and `Vertex.h` in `BasicCanvasUIView.m` and then update\
    \ the `drawRect:` method as shown in [Listing 5–5](#Chapter05.html#list_5_5).\n\
    \n***Listing 5–5.** Modifying the `drawRect:` Method in `BasicCanvasUIView.m`.*\n\
    \n```objc\n- (void)drawRect:(CGRect)rect {\n  // Check to make sure we have data\n\
    \  if (canvas == nil) {\n    return;\n  }\n\n  // Get the current graphics context\
    \ for drawing\n  CGContextRef context = UIGraphicsGetCurrentContext();\n\n  //\
    \ Store the scale in a local variable so we don’t hit the data store twice\n \
    \ float scale = self.scale;\n\n  // Scale the context according to the stored\
    \ value\n  CGContextScaleCTM(context, scale, scale);    \n\n  // Retrieve all\
    \ the shapes that relate to this canvas and iterate through them\n  NSSet* shapes\
    \ = [canvas valueForKey:@\"shapes\"];\n  for (Shape *shape in shapes) {\n    //\
    \ Get the entity name to determine whether this is a Circle or a Polygon\n   \
    \ NSString *entityName = [[shape entity] name];\n\n    // Get the color\n    const\
    \ CGFloat *rgb = CGColorGetComponents(shape.color.CGColor);\n    CGContextSetRGBFillColor(context,\
    \ rgb[0], rgb[1], rgb[2], 1.0);\n\n    // If this shape is a circle . . .\n  \
    \  if ([entityName compare:@\"Circle\"] == NSOrderedSame) {\n      // Get the\
    \ x, y, and radius from the data store and draw the circle\n      Circle *circle\
    \ = (Circle *)shape;\n      float x = [circle.x floatValue];\n      float y =\
    \ [circle.y floatValue];\n      float radius = [circle.radius floatValue];\n \
    \     CGContextFillEllipseInRect(context, CGRectMake(x-radius, y-radius, 2*radius,\n\
    \                                                     2*radius));\n    } else\
    \ if ([entityName compare:@\"Polygon\"] == NSOrderedSame) {\n      // This is\
