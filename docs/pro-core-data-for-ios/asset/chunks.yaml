    `}`

    `  return __managedObjectContext;`

    `}`


    As you can see, the code allocates and initializes the undo manager and sets it
    into the managed object.


    Once the undo manager is set into the managed object context, it tracks any changes
    in the managed object context and adds them to the undo stack. You can undo those
    changes by calling the `undo:` method of `NSUndoManager`, and each change (actually,
    each undo group, as explained in the section “Undo Groups”) is rolled back from
    the managed object context. You can also replay changes that have been undone
    by calling `NSUndoManager`’s `redo:` method.


    The `undo:` and `redo:` methods perform their magic only if the managed object
    context has any change to undo or redo, so calling them when no changes can be
    undone or redone does nothing. You can check, however, if the undo manager can
    undo or redo any changes by calling the `canUndo:` and `canRedo:` methods, respectively.'
  trans: "\n# 排版结果\n\n```\n// x 不能超过 y 的两倍\nfloat fx = [self.x floatValue], fy = [self.y\
    \ floatValue];\nif (fx >= (2 * fy)) {\n    // 如果传入了错误对象，则创建错误\n    if (outError\
    \ != NULL) {\n      NSString *msg = @\"x 不能超过 y 的两倍\";\n      NSDictionary *dict\
    \ = [NSDictionary dictionaryWithObject:msg\n        forKey:NSLocalizedDescriptionKey];\n\
    \      NSError *error = [[NSError alloc] initWithDomain:@\"Shapes\" code:30 userInfo:\n\
    \        dict]];\n\n      // 检查 [super validateForInsert] 是否返回了错误\n      if (*outError\
    \ == nil) {\n        *outError = error;\n      } else {\n        // 将当前错误与已有错误合并\n\
    \        *outError = [self errorFromOriginalError:*outError error:error];\n  \
    \    }\n    }\n    valid = NO;\n  }\n  return valid;\n}\n```\n\n注意，它调用了前面列出的 `errorFromOriginalError`\
    \ 方法来合并所有已有的错误。\n\n运行 Shapes 应用并点击顶部视图的右上象限来测试此方法。当 Shapes 在右上象限生成一个圆时，如果 `x`\
    \ 大于 `y` 的两倍，应用在尝试保存该圆时会崩溃。\n\n## 调用验证\n\nCore Data 允许你创建包含无效属性的对象，并在保存托管对象上下文时调用验证例程。属性值无效或关系数量不正确的对象可以安然存在于托管对象上下文中。验证只会在你尝试保存托管对象时才会触发，届时保存操作会因相应的错误码而失败。\n\
    \n但是，如果你不想等待调用 `save:` 方法，也可以手动调用验证。为此，只需调用你刚刚学到的任意验证方法即可。\n\n## 默认值\n\nCore Data\
    \ 允许你为每个属性设置默认值。你可能已经注意到，如果在属性中设置了验证规则却没有设置符合这些规则的默认值，编译器会给出类似这样的警告：\n\n`Misconfigured\
    \ Property. Circle.radius 的默认值小于最小值。`\n\n编译器会尽力保护你，避免创建违反验证规则的属性。你可以安全地忽略这些警告，并自行确保设置有效的值，或者也可以利用\
    \ Core Data 提供的帮助。\n\n设置默认值的方式与你的设想完全一致：在“默认值”字段中输入一个有效的默认值，之后该实体类型的任何新实例都会以该属性的这个值开始生命。例如，尝试将\
    \ `radius` 的默认值设为 8.0，并注释掉设置随机半径的代码。你会发现所有创建的圆的半径都是 8.0。\n\n关于默认值的一个特殊之处在于 Date\
    \ 类型的属性（如前所述）。你可以使用显式的日期，或像“today”这样的自然语言字符串，但该字符串会在编译时求值而非运行时，因此通常达不到你想要的效果（除非你希望所有日期默认都纪念应用的发布日）。要创建基于运行时日期的默认日期，请在\
    \ `NSManagedObject` 派生类中添加一个方法，覆盖 `NSManagedObject` 的 `awakeFromInsert:` 方法。在该方法（在对象被插入托管对象上下文时调用）中，你可以为任意字段提供自己的默认值。以下实现将当前日期插入到属性\
    \ `myDate` 中，使该对象的任何新实例都自动拥有当前日期：\n\n```\n- (void)awakeFromInsert {\n  [super\
    \ awakeFromInsert];\n  [self setValue:[NSDate date] forKey:@\"myDate\"];\n}\n\
    ```\n\n## 撤销与重做\n\n高尔夫球手称之为“重打”。校园里的孩子们称之为“重来”。电脑用户则称之为**编辑** > **撤销**。无论你怎么称呼它，当你意识到自己犯了错误并想撤销上一步操作时，并非所有场景都能给你这个机会——许多心碎的恋人都能证明这一点——但\
    \ Core Data 允许你使用标准的 Cocoa `NSUndoManager` 机制来撤销已做的操作。本节将指导你如何使用它，让你的用户能够撤销对 Core\
    \ Data 所做的更改。\n\nCore Data 的撤销管理器是一个 `NSUndoManager` 类型的对象，它存在于托管对象上下文中，且 `NSManagedObjectContext`\
    \ 提供了撤销管理器的 getter 和 setter。然而，与 Mac OS X 上的 Core Data 不同，iOS 的 Core Data 中的托管对象上下文出于性能原因默认不提供撤销管理器。如果你需要为\
    \ Core Data 对象启用撤销功能，则必须自行在托管对象上下文中设置撤销管理器。\n\n**注意：** iOS 上的 Core Data 默认不提供撤销管理器。你必须自行设置。\n\
    \n如果你想在 iOS 应用中支持撤销操作，通常会在设置托管对象上下文时创建撤销管理器，这通常发生在托管对象上下文的 getter 方法中。例如，Shapes\
    \ 应用在应用委托中设置托管对象上下文，如下所示。请注意用粗体标记的代码，它为托管对象上下文添加了一个撤销管理器。\n\n```\n- (NSManagedObjectContext\
    \ *)managedObjectContext {\n  if (__managedObjectContext != nil) {\n    return\
    \ __managedObjectContext;\n  }\n\n  NSPersistentStoreCoordinator *coordinator\
    \ = [self persistentStoreCoordinator];\n  if (coordinator != nil) {\n    __managedObjectContext\
    \ = [[NSManagedObjectContext alloc] init];\n    [__managedObjectContext setPersistentStoreCoordinator:coordinator];\n\
    \n    NSUndoManager *undoManager = [[NSUndoManager alloc] init];\n    [__managedObjectContext\
    \ setUndoManager:undoManager];\n  }\n  return __managedObjectContext;\n}\n```\n\
    \n如你所见，代码分配并初始化了撤销管理器，并将其设置到托管对象中。\n\n一旦撤销管理器设置到托管对象上下文中，它就会跟踪托管对象上下文中的任何更改，并将其添加到撤销栈中。你可以通过调用\
    \ `NSUndoManager` 的 `undo:` 方法来撤销这些更改，每次更改（实际上是每个撤销组，如“撤销组”一节所述）都会从托管对象上下文中回滚。你还可以通过调用\
    \ `NSUndoManager` 的 `redo:` 方法来重放已撤销的更改。\n\n仅当托管对象上下文中有更改可供撤销或重做时，`undo:` 和 `redo:`\
    \ 方法才会生效；因此，在没有可撤销或重做的更改时调用它们不会产生任何效果。不过，你可以通过调用 `canUndo:` 和 `canRedo:` 方法来检查撤销管理器是否可以撤销或重做任何更改。\n"
- fmt: "### Undo Groups\n\nBy default, the undo manager groups all changes that happen\
    \ during a single pass through the application’s run loop into a single change\
    \ that can be undone or redone as a unit. This means, for example, that in the\
    \ Shapes application, each shape creation can be undone or redone individually,\
    \ because each shape is created in response to a touch event. When you shake the\
    \ device, however, a single shake event occurs, and all the shapes are deleted\
    \ in the method you call in response to that event. You can undo the deletion\
    \ of all the shapes or call `redo:` to undo the deletion of all the shapes, but\
    \ by default you can’t undo the deletion or redo the creation of single shapes.\n\
    \nYou alter this behavior by turning off automatic grouping completely and managing\
    \ the undo groups yourself. To accomplish this, pass `NO` to `setGroupsByEvent`.\
    \ You become responsible, then, for creating all undo groups, because the undo\
    \ manager will no longer create them for you. You create the undo group by calling\
    \ `beginUndoGrouping:` to start creating the group and `endUndoGrouping:` to complete\
    \ the undo group. These calls must be matched, or an exception of type `NSInternalInconsistencyException`\
    \ is raised. You could, for example, create an undo group for each shape deletion\
    \ in Shapes so that you can undo the deletion one shape at a time. You can also\
    \ span undo groups across events, so you could, for example, group three shape\
    \ creations and undo the three shapes with a single call to undo.\n\n### Limiting\
    \ the Undo Stack\n\nBy default, the undo manager tracks an unlimited number of\
    \ changes for you to undo and redo. This can cause memory issues, especially on\
    \ iOS devices. You can limit the size of the undo stack by calling `NSUndoManager`’s\
    \ `setLevelsOfUndo:` method, passing an unsigned integer that represents the number\
    \ of undo groups to retain on the undo stack. You can inspect the current undo\
    \ stack size, measured in the number of undo groups, by calling `levelsOfUndo:`,\
    \ which returns an unsigned integer. A value of 0 represents no limit. If you’ve\
    \ imposed a limit on the size of the undo stack, the oldest undo groups roll off\
    \ the stack to accommodate the newer groups.\n\n### Disabling Undo Tracking\n\n\
    Once you create an undo manager and set it into the managed object context, any\
    \ changes you make to the managed object context are tracked and can be undone.\
    \ You can disable undo tracking, however, by calling `NSUndoManager`’s `disableUndoRegistration:`\
    \ method. To reenable undo tracking, call `NSUndoManager`’s `enableUndoRegistration:`\
    \ method. Disabling and enabling undo tracking uses a reference counting mechanism,\
    \ so multiple calls to `disableUndoRegistration:` require an equal number of calls\
    \ to `enableUndoRegistration:` before undo tracking becomes enabled again.\n\n\
    Calling `enableUndoRegistration:` when undo tracking is already enabled raises\
    \ an exception of type `NSInternalInconsistencyException`, which will likely crash\
    \ your application. To avoid this embarrassment, you can call `NSUndoManager`’s\
    \ `isUndoRegistrationEnabled:`, which returns a `BOOL`, before calling `enableUndoRegistration:`.\
    \ For example, the following code checks whether undo tracking is enabled before\
    \ enabling it:\n\n```\nif (![undoManager isUndoRegistrationEnabled]) {\n  [undoManager\
    \ enableUndoRegistration];\n}\n```\n\nYou can clear the undo stack entirely by\
    \ calling the `removeAllActions:` method. This method has the side effect of reenabling\
    \ undo tracking.\n\n### Adding Undo to Shapes\n\nThe rest of this section puts\
    \ into practice the concepts explained about undo managers by adding undo and\
    \ redo support to the Shapes application. To begin, change the accessor for the\
    \ managed object context in the application delegate to create an undo manager\
    \ for the context. Set the undo stack to an arbitrary size of 10, as this code\
    \ shows:\n\n```\n- (NSManagedObjectContext *)managedObjectContext {\n    if (__managedObjectContext\
    \ != nil) {\n        return __managedObjectContext;\n    }\n\n    NSPersistentStoreCoordinator\
    \ *coordinator = [self persistentStoreCoordinator];\n    if (coordinator != nil)\
    \ {\n        __managedObjectContext = [[NSManagedObjectContext alloc] init];\n\
    \        [__managedObjectContext setPersistentStoreCoordinator:coordinator];\n\
    \n        // Set up the undo manager\n        NSUndoManager *undoManager = [[NSUndoManager\
    \ alloc] init];\n        [undoManager setLevelsOfUndo:10];\n        [__managedObjectContext\
    \ setUndoManager:undoManager];\n}\n    return managedObjectContext_;\n}\n```\n\
    \nThe typical interface for undoing actions on an iOS device is to shake the device,\
    \ but Shapes already uses that to delete all the shapes from the persistent store.\
    \ Instead, Shapes will provide two buttons, one to undo the last change and one\
    \ to redo it. Open the `ShapesViewController.h` file, and add members for the\
    \ two buttons, methods to invoke when the buttons are pressed, and a method that\
    \ hides the buttons when the managed object context has no changes to undo or\
    \ redo. The code should look like this, with the added lines in bold:\n\n```\n\
    #import <UIKit/UIKit.h>\n#import <CoreData/CoreData.h>\n#import \"BasicCanvasUIView.h\"\
    \n\n@interface ShapesViewController : UIViewController {\n  NSManagedObjectContext\
    \ *managedObjectContext;\n  IBOutlet BasicCanvasUIView *topView;\n  IBOutlet BasicCanvasUIView\
    \ *bottomView;\n  IBOutlet UIButton *undoButton;\n  IBOutlet UIButton *redoButton;\n\
    }\n@property (nonatomic, retain) NSManagedObjectContext *managedObjectContext;\n\
    @property (nonatomic, retain) BasicCanvasUIView *topView;\n@property (nonatomic,\
    \ retain) BasicCanvasUIView *bottomView;\n@property (nonatomic, retain) UIButton\
    \ *undoButton;\n@property (nonatomic, retain) UIButton *redoButton;\n\n- (IBAction)undo:(id)sender;\n\
    - (IBAction)redo:(id)sender;\n- (void)updateUndoAndRedoButtons:(NSNotification\
    \ *)notification;\n\n@end\n```\n\nAdd `@synthesize` directives to `ShapesViewController.m`\
    \ for `undoButton` and `redoButton`. Add implementations for the `undo:`, `redo:`,\
    \ and `updateUndoAndRedoButtons:` methods. The undo method should get the undo\
    \ manager from the managed object context and call the `undo:` method and then\
    \ tell the views to repaint themselves, like this:\n\n```\n- (IBAction)undo:(id)sender\
    \ {\n  [[self.managedObjectContext undoManager] undo];\n  [topView setNeedsDisplay];\n\
    \  [bottomView setNeedsDisplay];\n}\n```\n\nThe `redo:` method should do the same\
    \ thing but call the undo manager’s `redo:` method instead of its `undo:` method:\n\
    \n```\n- (IBAction)redo:(id)sender {\n  [[self.managedObjectContext undoManager]\
    \ redo];\n  [topView setNeedsDisplay];\n  [bottomView setNeedsDisplay];\n}\n```\n\
    \nTo show the Undo button only when the user can undo a change and the Redo button\
    \ only when the user can redo a change, you could insert code everywhere you make\
    \ data changes to update the buttons. Take advantage of Cocoa Touch’s notification\
    \ mechanism, however, and have the managed object context notify you whenever\
    \ its managed data changes. In the `viewDidLoad:` method, add code to call your\
    \ `updateUndoAndRedoButtons:` method any time the data changes. You also want\
    \ to call the `updateUndoAndRedoButtons:` method when the view first loads, so\
    \ tack on a call to that method. This is the code you should add to `viewDidLoad:`,\
    \ after setting the canvas instances into the views:"
  raw: '#### Undo Groups


    By default, the undo manager groups all changes that happen during a single pass
    through the application’s run loop into a single change that can be undone or
    redone as a unit. This means, for example, that in the Shapes application, each
    shape creation can be undone or redone individually, because each shape is created
    in response to a touch event. When you shake the device, however, a single shake
    event occurs, and all the shapes are deleted in the method you call in response
    to that event. You can undo the deletion of all the shapes or call `redo:` to
    undo the deletion of all the shapes, but by default you can’t undo the deletion
    or redo the creation of single shapes.


    You alter this behavior by turning off automatic grouping completely and managing
    the undo groups yourself. To accomplish this, pass `NO` to `setGroupsByEvent`.
    You become responsible, then, for creating all undo groups, because the undo manager
    will no longer create them for you. You create the undo group by calling `beginUndoGrouping:`
    to start creating the group and `endUndoGrouping:` to complete the undo group.
    These calls must be matched, or an exception of type `NSInternalInconsistencyException`
    is raised. You could, for example, create an undo group for each shape deletion
    in Shapes so that you can undo the deletion one shape at a time. You can also
    span undo groups across events, so you could, for example, group three shape creations
    and undo the three shapes with a single call to undo.


    #### Limiting the Undo Stack


    By default, the undo manager tracks an unlimited number of changes for you to
    undo and redo. This can cause memory issues, especially on iOS devices. You can
    limit the size of the undo stack by calling `NSUndoManager`’s `setLevelsOfUndo:`
    method, passing an unsigned integer that represents the number of undo groups
    to retain on the undo stack. You can inspect the current undo stack size, measured
    in the number of undo groups, by calling `levelsOfUndo:`, which returns an unsigned
    integer. A value of 0 represents no limit. If you’ve imposed a limit on the size
    of the undo stack, the oldest undo groups roll off the stack to accommodate the
    newer groups.


    #### Disabling Undo Tracking


    Once you create an undo manager and set it into the managed object context, any
    changes you make to the managed object context are tracked and can be undone.
    You can disable undo tracking, however, by calling `NSUndoManager`’s `disableUndoRegistration:`
    method. To reenable undo tracking, call `NSUndoManager`’s `enableUndoRegistration:`
    method. Disabling and enabling undo tracking uses a reference counting mechanism,
    so multiple calls to `disableUndoRegistration:` require an equal number of calls
    to `enableUndoRegistration:` before undo tracking becomes enabled again.


    Calling `enableUndoRegistration:` when undo tracking is already enabled raises
    an exception of type `NSInternalInconsistencyException`, which will likely crash
    your application. To avoid this embarrassment, you can call `NSUndoManager`’s
    `isUndoRegistrationEnabled:`, which returns a `BOOL`, before calling `enableUndoRegistration:`.
    For example, the following code checks whether undo tracking is enabled before
    enabling it:


    `if (![undoManager isUndoRegistrationEnabled]) {`

    `  [undoManager enableUndoRegistration];`

    `}`


    You can clear the undo stack entirely by calling the `removeAllActions:` method.
    This method has the side effect of reenabling undo tracking.


    #### Adding Undo to Shapes


    The rest of this section puts into practice the concepts explained about undo
    managers by adding undo and redo support to the Shapes application. To begin,
    change the accessor for the managed object context in the application delegate
    to create an undo manager for the context. Set the undo stack to an arbitrary
    size of 10, as this code shows:


    `- (NSManagedObjectContext *)managedObjectContext {`

    `    if (__managedObjectContext != nil) {`

    `        return __managedObjectContext;`

    `    }`


    `    NSPersistentStoreCoordinator *coordinator = [self persistentStoreCoordinator];`

    `    if (coordinator != nil) {`

    `        __managedObjectContext = [[NSManagedObjectContext alloc] init];`

    `        [__managedObjectContext setPersistentStoreCoordinator:coordinator];`


    **`        // Set up the undo manager`**

    **`        NSUndoManager *undoManager = [[NSUndoManager alloc] init];`**

    **`        [undoManager setLevelsOfUndo:10];`**

    **`        [__managedObjectContext setUndoManager:undoManager];`**

    `}`

    `    return managedObjectContext_;`

    `}`


    The typical interface for undoing actions on an iOS device is to shake the device,
    but Shapes already uses that to delete all the shapes from the persistent store.
    Instead, Shapes will provide two buttons, one to undo the last change and one
    to redo it. Open the `ShapesViewController.h` file, and add members for the two
    buttons, methods to invoke when the buttons are pressed, and a method that hides
    the buttons when the managed object context has no changes to undo or redo. The
    code should look like this, with the added lines in bold:


    `#import <UIKit/UIKit.h>`

    `#import <CoreData/CoreData.h>`

    `#import "BasicCanvasUIView.h"`


    `@interface ShapesViewController : UIViewController {`

    `  NSManagedObjectContext *managedObjectContext;`

    `  IBOutlet BasicCanvasUIView *topView;`

    `  IBOutlet BasicCanvasUIView *bottomView;`

    **`IBOutlet UIButton *undoButton;`**

    **`IBOutlet UIButton *redoButton;`**

    `}`

    `@property (nonatomic, retain) NSManagedObjectContext *managedObjectContext;`

    `@property (nonatomic, retain) BasicCanvasUIView *topView;`

    `@property (nonatomic, retain) BasicCanvasUIView *bottomView;`

    **`@property (nonatomic, retain) UIButton *undoButton;`**

    **`@property (nonatomic, retain) UIButton *redoButton;`**


    **`- (IBAction)undo:(id)sender;`**

    **`- (IBAction)redo:(id)sender;`**

    **`- (void)updateUndoAndRedoButtons:(NSNotification *)notification;`**


    `@end`


    Add `@synthesize` directives to `ShapesViewController.m` for `undoButton` and
    `redoButton`. Add implementations for the `undo:`, `redo:`, and `updateUndoAndRedoButtons:`
    methods. The undo method should get the undo manager from the managed object context
    and call the `undo:` method and then tell the views to repaint themselves, like
    this:


    **`- (IBAction)undo:(id)sender {`**

    **`  [[self.managedObjectContext undoManager] undo];`**

    **`  [topView setNeedsDisplay];`**

    **`  [bottomView setNeedsDisplay];`**

    **`}`**


    The `redo:` method should do the same thing but call the undo manager’s `redo:`
    method instead of its `undo:` method:


    **`- (IBAction)redo:(id)sender {`**

    **`  [[self.managedObjectContext undoManager] redo];`**

    **`  [topView setNeedsDisplay];`**

    **`  [bottomView setNeedsDisplay];`**

    **`}`**


    To show the Undo button only when the user can undo a change and the Redo button
    only when the user can redo a change, you could insert code everywhere you make
    data changes to update the buttons. Take advantage of Cocoa Touch’s notification
    mechanism, however, and have the managed object context notify you whenever its
    managed data changes. In the `viewDidLoad:` method, add code to call your `updateUndoAndRedoButtons:`
    method any time the data changes. You also want to call the `updateUndoAndRedoButtons:`
    method when the view first loads, so tack on a call to that method. This is the
    code you should add to `viewDidLoad:`, after setting the canvas instances into
    the views:'
  trans: "\n### 撤销组\n\n默认情况下，撤销管理器将应用程序运行循环单次执行过程中发生的所有变更汇总为一个可整体撤销或重做的变更。这意味着，例如在\
    \ Shapes 应用中，每次创建图形都可以单独撤销或重做，因为每个图形都是响应触摸事件而创建的。然而，当你摇动设备时，会触发一个单一的摇动事件，并且你响应该事件所调用的方法会删除所有图形。你可以撤销全部图形的删除，或调用\
    \ `redo:` 来撤销删除，但默认情况下，你无法单独撤销某个图形的删除或重做某个图形的创建。\n\n要改变这一行为，你需要完全关闭自动分组并自行管理撤销组。为此，需向\
    \ `setGroupsByEvent` 传递 `NO`。之后，你需要负责创建所有撤销组，因为撤销管理器将不再为你创建它们。通过调用 `beginUndoGrouping:`\
    \ 开始创建组，并调用 `endUndoGrouping:` 完成撤销组的创建。这两个调用必须成对出现，否则会引发 `NSInternalInconsistencyException`\
    \ 类型的异常。例如，你可以为 Shapes 应用中每次图形删除创建一个撤销组，以便能一次撤销一个图形的删除。你还可以跨事件创建撤销组，例如，可以将三次图形创建归为一组，通过单次调用撤销来撤销这三个图形。\n\
    \n### 限制撤销堆栈\n\n默认情况下，撤销管理器会追踪无限数量的变更供你撤销和重做。这可能导致内存问题，尤其是在 iOS 设备上。你可以通过调用 `NSUndoManager`\
    \ 的 `setLevelsOfUndo:` 方法来限制撤销堆栈的大小，该方法接受一个无符号整数，表示撤销堆栈上保留的撤销组数量。你可以通过调用 `levelsOfUndo:`\
    \ 来检查当前撤销堆栈的大小（以撤销组数量衡量），该方法返回一个无符号整数。值为 0 表示没有限制。如果你对撤销堆栈大小设置了限制，最旧的撤销组将从堆栈中移除，以便容纳新的组。\n\
    \n### 禁用撤销追踪\n\n一旦你创建了撤销管理器并将其设置到托管对象上下文中，你对托管对象上下文所做的任何变更都会被追踪且可撤销。但你可以通过调用 `NSUndoManager`\
    \ 的 `disableUndoRegistration:` 方法来禁用撤销追踪。要重新启用撤销追踪，请调用 `NSUndoManager` 的 `enableUndoRegistration:`\
    \ 方法。禁用和启用撤销追踪使用了引用计数机制，因此多次调用 `disableUndoRegistration:` 需要调用相同次数的 `enableUndoRegistration:`\
    \ 才能再次启用撤销追踪。\n\n在撤销追踪已启用时调用 `enableUndoRegistration:` 会引发 `NSInternalInconsistencyException`\
    \ 类型的异常，这很可能会导致你的应用崩溃。为避免这种尴尬，你可以在调用 `enableUndoRegistration:` 之前调用 `NSUndoManager`\
    \ 的 `isUndoRegistrationEnabled:`，该方法返回一个 `BOOL` 值。例如，以下代码在启用撤销追踪前检查其是否已启用：\n\n\
    ```\nif (![undoManager isUndoRegistrationEnabled]) {\n  [undoManager enableUndoRegistration];\n\
    }\n```\n\n你可以通过调用 `removeAllActions:` 方法来完全清空撤销堆栈。此方法有一个副作用，即会重新启用撤销追踪。\n\n###\
    \ 为 Shapes 添加撤销功能\n\n本节其余部分将通过向 Shapes 应用添加撤销和重做支持，将上述关于撤销管理器的概念付诸实践。首先，修改应用委托中托管对象上下文的访问器，为上下文创建一个撤销管理器。将撤销堆栈设置为一个任意大小，比如\
    \ 10，如以下代码所示：\n\n```\n- (NSManagedObjectContext *)managedObjectContext {\n   \
    \ if (__managedObjectContext != nil) {\n        return __managedObjectContext;\n\
    \    }\n\n    NSPersistentStoreCoordinator *coordinator = [self persistentStoreCoordinator];\n\
    \    if (coordinator != nil) {\n        __managedObjectContext = [[NSManagedObjectContext\
    \ alloc] init];\n        [__managedObjectContext setPersistentStoreCoordinator:coordinator];\n\
    \n        // 设置撤销管理器\n        NSUndoManager *undoManager = [[NSUndoManager alloc]\
    \ init];\n        [undoManager setLevelsOfUndo:10];\n        [__managedObjectContext\
    \ setUndoManager:undoManager];\n}\n    return managedObjectContext_;\n}\n```\n\
    \n在 iOS 设备上执行撤销操作的典型界面是摇动设备，但 Shapes 已经使用摇动操作来从持久化存储中删除所有图形。因此，Shapes 将提供两个按钮，一个用于撤销上次变更，另一个用于重做。打开\
    \ `ShapesViewController.h` 文件，为这两个按钮添加成员变量、按钮按下时调用的方法，以及一个当托管对象上下文没有可撤销或重做的变更时隐藏按钮的方法。代码应如下所示，新增的行以粗体显示：\n\
    \n```\n#import <UIKit/UIKit.h>\n#import <CoreData/CoreData.h>\n#import \"BasicCanvasUIView.h\"\
    \n\n@interface ShapesViewController : UIViewController {\n  NSManagedObjectContext\
    \ *managedObjectContext;\n  IBOutlet BasicCanvasUIView *topView;\n  IBOutlet BasicCanvasUIView\
    \ *bottomView;\n  IBOutlet UIButton *undoButton;\n  IBOutlet UIButton *redoButton;\n\
    }\n@property (nonatomic, retain) NSManagedObjectContext *managedObjectContext;\n\
    @property (nonatomic, retain) BasicCanvasUIView *topView;\n@property (nonatomic,\
    \ retain) BasicCanvasUIView *bottomView;\n@property (nonatomic, retain) UIButton\
    \ *undoButton;\n@property (nonatomic, retain) UIButton *redoButton;\n\n- (IBAction)undo:(id)sender;\n\
    - (IBAction)redo:(id)sender;\n- (void)updateUndoAndRedoButtons:(NSNotification\
    \ *)notification;\n\n@end\n```\n\n在 `ShapesViewController.m` 中为 `undoButton` 和\
    \ `redoButton` 添加 `@synthesize` 指令。为 `undo:`、`redo:` 和 `updateUndoAndRedoButtons:`\
    \ 方法添加实现。撤销方法应从托管对象上下文中获取撤销管理器，调用 `undo:` 方法，然后通知视图重新绘制自身，如下所示：\n\n```\n- (IBAction)undo:(id)sender\
    \ {\n  [[self.managedObjectContext undoManager] undo];\n  [topView setNeedsDisplay];\n\
    \  [bottomView setNeedsDisplay];\n}\n```\n\n`redo:` 方法应执行相同的操作，但调用撤销管理器的 `redo:`\
    \ 方法而非 `undo:` 方法：\n\n```\n- (IBAction)redo:(id)sender {\n  [[self.managedObjectContext\
    \ undoManager] redo];\n  [topView setNeedsDisplay];\n  [bottomView setNeedsDisplay];\n\
