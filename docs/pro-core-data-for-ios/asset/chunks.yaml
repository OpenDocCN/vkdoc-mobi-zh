    `    // Migration is needed`


    **`NSManagedObjectModel *sourceModel = [NSManagedObjectModel mergedModelFromBundles:nil
    forStoreMetadata:sourceMetadata];`**


    **`MyMigrationManager *migrationManager = [[MyMigrationManager alloc] initWithSourceModel:sourceModel
    destinationModel:destinationModel];`**


    **`NSMappingModel *mappingModel = [NSMappingModel inferredMappingModelForSourceModel:sourceModel
    destinationModel:destinationModel error:&error];`**


    **`if(mappingModel == nil) {`**

    **`NSLog(@"Could not find a mapping model");`**

    **`abort();`**

    **`}`**


    **`if(![migrationManager migrateStoreFromURL:storeURL`**

    **`type:NSSQLiteStoreType`**

    **`options:nil`**

    **`withMappingModel:mappingModel`**

    **`toDestinationURL:newStoreURL`**

    **`destinationType:NSSQLiteStoreType`**

    **`destinationOptions:nil`**

    **`error:&error]) {`**

    **`// Deal with error`**

    **`NSLog(@"Error migrating %@, %@", error, [error userInfo]);`**

    **`abort();`**

    **`}`**


    **`// Replace the old store with the new one now that it''s migrated`**

    **`NSFileManager *fm = [NSFileManager defaultManager];`**

    **`NSURL *backupURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@"Shapes-old.sqlite"];`**


    **`if(![fm moveItemAtURL:storeURL toURL:backupURL error:&error]) {`**

    **`NSLog(@"Error backing up the store");`**

    **`abort();`**

    **`}`**

    **`else if(![fm moveItemAtURL:newStoreURL toURL:storeURL error:&error]) {`**

    **`NSLog(@"Error putting the new store in place");`**

    **`abort();`**

    **`}`**

    **`else if(![fm removeItemAtURL:backupURL error:&error]) {`**

    **`NSLog(@"Error getting rid of the old store");`**

    **`}`**

    `  }`


    `  __persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:destinationModel];`


    `  if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType
    configuration:nil URL:storeURL options:nil error:&error]) {`

    `    NSLog(@"Unresolved error %@, %@", error, [error userInfo]);`

    `    abort();`

    `  }    `


    `  return __persistentStoreCoordinator;`

    `}`


    Note that the source and destination store URLs must be different so that the
    migration can run. Once it is successful, it is up to you to get rid of the old
    data store and clean up. This is done by moving the SQLite files directly using
    the `NSFileManager` class as shown in the implementation above. Upon returning
    from the method, the new and properly populated data store is in place for the
    application to use.


    Run the application to execute the custom migration and verify that the data store
    contains the right data by using the `sqlite3` command line as usual.


    ### Summary


    Although changing data models can be painful in other programming environments,
    Core Data makes changing your data models nearly painless. With its support for
    model versions, lightweight migrations, and mapping models for migrations that
    aren''t lightweight, you can change your data models with impunity and let Core
    Data make sure your users'' data stays intact.


    As with any part of your application, however, make sure you test your migrations.
    Test them extensively. Test them even more than you test your application code.
    Users can handle an occasional application crash, but if they upgrade to the latest
    version of your application and lose their data in the process, your application
    and reputation may never recover.


    ## Chapter 9


    ## Managing Table Views Using a Fetched Results Controller


    A fetched results controller, implemented by the `NSFetchedResultsController`
    class, blends Core Data results with a table view. Launch any nongame app on your
    iPhone you''ll probably find at least one table view. Apple made the table view
    an essential part of the iPhone interface and uses it to great advantage in its
    own applications. Many, if not all, of the applications you develop will have
    table views, so anything you can learn to make using table views easier will benefit
    you.


    In line with its legendary attention to detail, Apple includes a class with the
    Core Data framework that''s designed to make Core Data work better with table
    views. Called `NSFetchedResultsController`, it eases the development tasks required
    to display data from a Core Data persistent store in a table view. You saw the
    `NSFetchedResultsController` class in the League Manager application from [Chapter
    3](#Chapter03.html#ch3) in which the `MasterViewController` class uses an instance
    of `NSFetchedResultsController` to display the teams. This chapter dives deeper
    into how to use an `NSFetchedResultsController` and implements a new All-Player
    view using `NSFetchedResultsController` in League Manager.'
  trans: "\n#### 设置迁移管理器\n\n一旦确定确实需要迁移，下一步就是设置迁移管理器，它是`NSMigrationManager`的一个子类。为此，你需要获取与当前持久化存储匹配的模型：即模型的先前版本。这个模型将作为迁移过程中的源模型。可以使用`mergedModelFromBundles:forStoreMetadata:`方法获取源模型，该方法会在应用程序主包中查找与给定元数据匹配的模型。\n\
    \n通过创建一个继承自`NSMigrationManager`的新类来开始创建自定义迁移管理器。在本例中，将其命名为`MyMigrationManager`（参见代码清单\
    \ 8-5）。\n\n**代码清单 8-5.** *MyMigrationManager.h*\n\n```objc\n#import <CoreData/CoreData.h>\n\
    \n@interface MyMigrationManager : NSMigrationManager\n@end\n```\n\n该迁移的实现会为每个正在迁移的`Shape`实例生成一个新的\
    \ UUID，并在迁移过程中分配`uniqueID`属性（参见代码清单 8-6）。\n\n**代码清单 8-6.** *MyMigrationManager.m*\n\
    \n```objc\n#import \"MyMigrationManager.h\"\n\n@implementation MyMigrationManager\n\
    \n- (void)associateSourceInstance:(NSManagedObject *)sourceInstance\nwithDestinationInstance:(NSManagedObject\
    \ *)destinationInstance\nforEntityMapping:(NSEntityMapping *)entityMapping {\n\
    \n    [super associateSourceInstance:sourceInstance\n    withDestinationInstance:destinationInstance\
    \ forEntityMapping:entityMapping];\n\n    NSString *name = [entityMapping destinationEntityName];\n\
    \n    if([name compare:@\"Ellipse\"] == NSOrderedSame || [name compare:@\"Polygon\"\
    ] == NSOrderedSame)\n        // 生成 UUID\n        CFUUIDRef theUUID = CFUUIDCreate(NULL);\n\
    \        CFStringRef string = CFUUIDCreateString(NULL, theUUID);\n        CFRelease(theUUID);\n\
    \        NSString *uuid = (__bridge NSString *)string;\n\n        [destinationInstance\
    \ setValue:uuid forKey:@\"uniqueID\"];\n    }\n}\n\n@end\n```\n\n#### 运行迁移\n\n\
    在最后一步中，你需要将自己的类设置为负责执行此迁移的管理器。在`ShapesAppDelegate.m`文件顶部添加对`MyMigrationManager.h`的导入，并再次编辑`persistentStoreCoordinator`方法，如代码清单\
    \ 8-7 所示。\n\n**代码清单 8-7.** *启动自定义迁移*\n\n```objc\n- (NSPersistentStoreCoordinator\
    \ *)persistentStoreCoordinator {\n    if (__persistentStoreCoordinator != nil)\
    \ {\n        return __persistentStoreCoordinator;\n    }\n\n    NSURL *storeURL\
    \ = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"Shapes.sqlite\"\
    ];\n    NSURL *newStoreURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
    Shapes-Temp.sqlite\"];\n\n    NSError *error = nil;\n    NSDictionary *sourceMetadata\
    \ = [NSPersistentStoreCoordinator metadataForPersistentStoreOfType:NSSQLiteStoreType\
    \ URL:storeURL error:&error];\n\n    if(sourceMetadata != nil) {\n    }\n\n  \
    \  NSManagedObjectModel *destinationModel = [self managedObjectModel];\n\n   \
    \ BOOL pscCompatible = [destinationModel isConfiguration:nil compatibleWithStoreMetadata:sourceMetadata];\n\
    \n    if(!pscCompatible) {\n        NSLog(@\"需要进行迁移\");\n        // 需要迁移\n\n \
    \       NSManagedObjectModel *sourceModel = [NSManagedObjectModel mergedModelFromBundles:nil\
    \ forStoreMetadata:sourceMetadata];\n\n        MyMigrationManager *migrationManager\
    \ = [[MyMigrationManager alloc] initWithSourceModel:sourceModel destinationModel:destinationModel];\n\
    \n        NSMappingModel *mappingModel = [NSMappingModel inferredMappingModelForSourceModel:sourceModel\
    \ destinationModel:destinationModel error:&error];\n\n        if(mappingModel\
    \ == nil) {\n            NSLog(@\"找不到映射模型\");\n            abort();\n        }\n\
    \n        if(![migrationManager migrateStoreFromURL:storeURL\n            type:NSSQLiteStoreType\n\
    \            options:nil\n            withMappingModel:mappingModel\n        \
    \    toDestinationURL:newStoreURL\n            destinationType:NSSQLiteStoreType\n\
    \            destinationOptions:nil\n            error:&error]) {\n          \
    \  // 处理错误\n            NSLog(@\"迁移出错 %@, %@\", error, [error userInfo]);\n  \
    \          abort();\n        }\n\n        // 迁移完成后用新存储替换旧存储\n        NSFileManager\
    \ *fm = [NSFileManager defaultManager];\n        NSURL *backupURL = [[self applicationDocumentsDirectory]\
    \ URLByAppendingPathComponent:@\"Shapes-old.sqlite\"];\n\n        if(![fm moveItemAtURL:storeURL\
    \ toURL:backupURL error:&error]) {\n            NSLog(@\"备份存储时出错\");\n       \
    \     abort();\n        }\n        else if(![fm moveItemAtURL:newStoreURL toURL:storeURL\
    \ error:&error]) {\n            NSLog(@\"放置新存储时出错\");\n            abort();\n\
    \        }\n        else if(![fm removeItemAtURL:backupURL error:&error]) {\n\
    \            NSLog(@\"删除旧存储时出错\");\n        }\n    }\n\n    __persistentStoreCoordinator\
    \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:destinationModel];\n\
    \n    if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
    \ configuration:nil URL:storeURL options:nil error:&error]) {\n        NSLog(@\"\
    未解决的错误 %@, %@\", error, [error userInfo]);\n        abort();\n    }\n\n    return\
    \ __persistentStoreCoordinator;\n}\n```\n\n请注意，源存储和目标存储的 URL 必须不同，以便迁移能够运行。一旦迁移成功，你需要自行清理旧的数据存储。如上实现所示，这一步通过使用`NSFileManager`类直接移动\
    \ SQLite 文件来完成。方法返回后，新的、内容完整的数据存储就已就位，可供应用程序使用。\n\n运行应用程序以执行自定义迁移，并像往常一样使用`sqlite3`命令行验证数据存储是否包含正确的数据。\n\
    \n### 总结\n\n尽管在其他编程环境中更改数据模型可能很麻烦，但 Core Data 使更改数据模型几乎毫无痛苦。凭借其对模型版本、轻量级迁移以及针对非轻量级迁移的映射模型的支持，你可以放心地更改数据模型，并让\
    \ Core Data 确保用户数据的完整性。\n\n然而，与应用程序的任何其他部分一样，请务必测试你的迁移。要进行广泛测试。其测试力度甚至要超过对应用程序代码的测试。用户能容忍偶尔的应用程序崩溃，但如果在升级到最新版本时丢失了数据，你的应用程序和声誉可能永远无法恢复。\n\
    \n## 第 9 章\n\n## 使用抓取结果控制器管理表视图\n\n抓取结果控制器由`NSFetchedResultsController`类实现，它将\
    \ Core Data 结果与表视图结合在一起。在 iPhone 上启动任何非游戏应用程序，你很可能至少会看到一个表视图。Apple 将表视图作为 iPhone\
    \ 界面不可或缺的一部分，并在其自己的应用程序中充分利用了这一点。你开发的应用程序中，许多（如果不是全部的话）都会包含表视图，因此任何能让你更轻松地使用表视图的知识都会让你受益匪浅。\n\
    \n秉承其注重细节的一贯作风，Apple 在 Core Data 框架中包含了一个专门设计用于使 Core Data 与表视图更好协作的类。这个类名为`NSFetchedResultsController`，它简化了在表视图中显示来自\
    \ Core Data 持久化存储数据所需的开发任务。在第 3 章的 League Manager 应用程序中，你已经见识过`NSFetchedResultsController`类，其中`MasterViewController`类使用`NSFetchedResultsController`实例来显示球队。本章将更深入地探讨如何使用`NSFetchedResultsController，并在\
    \ League Manager 中使用`NSFetchedResultsController`实现一个全新的“所有球员”视图。\n"
- fmt: '### Understanding `NSFetchedResultsController`


    The `NSFetchedResultsController` class works closely with `UITableView` instances
    to display data from a Core Data data model in a table view. It pulls managed
    objects from the persistent store, from the entity you specify, caching them to
    improve performance, and gives the data to the table view as necessary so that
    the table can show it. It also manages adding, removing, and moving rows in the
    table in response to data changes.


    You create a fetched results controller with the following four parameters:


    - A fetch request (`NSFetchRequest` instance)

    - A managed object context

    - A section name key path

    - A cache name


    These parameters are explained in the following sections.


    ### The Fetch Request


    The fetch request is almost the same as any fetch request you''ve used throughout
    this book and in any of your Core Data development. It works with the entity in
    your data model that you specify and can optionally have a predicate (`NSPredicate`)
    to filter what it fetches. The one difference in this fetch request is that it
    must have at least one sort descriptor or your application will crash with this
    message:


    `''NSInvalidArgumentException'', reason: ''An instance of NSFetchedResultsController
    requires a fetch request with sort descriptors''`


    This is because the fetched results controller works within the constraints of
    a table, which displays cells in a predictable order, so the fetched results controller
    must also have the data in a predictable order. A sort descriptor provides the
    mechanism required to help sort the data.


    ### The Managed Object Context


    This is a normal managed object context that holds the managed objects. Saving
    the context saves all the objects in it. You typically use your application''s
    managed object context for this parameter.


    ### The Section Name Key Path


    Table views on iDevices are divided into sections, with some number of rows in
    each section. This structure is fundamental to the operation of table views. A
    fetched results controller is optimized to work in that environment and can divide
    its data into sections that correspond to the table sections. The `sectionNameKeyPath`
    parameter specifies a key path into your Core Data model that divides the managed
    objects for the fetch request''s entity into these sections.


    Typically, you''d make this `sectionNameKeyPath` parameter point to one of the
    properties of the entity this table displays. Note that if you specify a value
    for `sectionNameKeyPath` parameter, you also must sort your fetch by that value
    or your application will crash with an error. Suppose, for example, that the League
    Manager application had a table view that listed all the players for all the teams,
    grouped by team. Each team, then, would be a section in the table, and each player
    would occupy a row in their team''s section. The entity for the fetch request
    in this case would be the `Player` entity, and the section name key path would
    be the `team.name` property, which is the `name` attribute of the `Team` entity
    that''s stored in the `Player`''s team relationship. You''d also add a `SortDescriptor`
    instance to the `NSFetchRequest` that points to `team.name`. You''ll add such
    a view to the League Manager application in this chapter.


    If your table view contains only one section (in other words, if your data doesn''t
    divide into sections, so you want to display just a single list), you can pass
    `nil` for the `sectionNameKeyPath` parameter.


    ### The Cache Name


    The cache name parameter specifies a name for the cache that the fetched results
    controller uses to cache the managed objects it fetches and feeds to the table.
    In the 3.*x* versions of iOS, you were encouraged to make this cache name unique
    across fetch results controllers, but your application would still work if you
    shared the cache name with other fetch results controllers. As of iOS 4.0, however,
    your application will not work correctly if you share cache names across fetched
    results controllers. Make sure your cache names are unique.


    ### Understanding `NSFetchedResultsController` Delegates


    `NSFetchedResultsController` follows Apple''s design patterns, using a delegate
    called `NSFetchedResultsControllerDelegate` to implement key methods to make the
    table view and the fetched results controller work together. You typically make
    your table view''s view controller the delegate for its fetched results controller.
    This delegate has a method for customizing the index names if you show an index
    along the right side of your table view called `controller:sectionIndexTitleForSectionName:`.
    The delegate also has the following four methods that deal with changing the data
    displayed in the table:


    - `controllerWillChangeContent:` is called when some content is about to change.
    This is a good place to tell your table view that you''re about to make some changes
    so that it can initiate a sequence of changes through its `beginUpdates:` method.
    Table views use the `beginUpdates:` method to group changes that should be animated
    simultaneously.

    - `controller:didChangeObject:atIndexPath:forChangeType:newIndexPath:` is called
    when a managed object changes (is added, deleted, edited, or moved). In this method,
    you figure out what happened, and you add, move, delete, or refresh the content
    of the affected table rows accordingly.

    - `controller:didChangeSection:atIndex:forChangeType:` is called when a section
    changes (is added or deleted). In this method, you figure out whether a section
    was added or deleted and either insert or delete a section in the table.

    - `controllerDidChangeContent:` is called when the changes are done. This is a
    good place to tell the table view that the changes initiated by the `beginUpdates:`
    method are complete by calling the `endUpdates:` method.


    Implement these methods in your view controller, and when you create your fetched
    results controller, set its delegate to the view controller.


    ### Using `NSFetchedResultsController`


    During the execution of your Core-Data–based, table-view–based application, your
    fetched results controller becomes the liaison between your data and the table.
    The fetched results controller contains methods that return the data the table
    needs, according to section and row. This means that whether the table needs to
    display a cell, figure out which cell was tapped, determine how many rows are
    in a section, or any of the other pieces of data a table needs to display and
    function, the fetched results controller has the answers.'
