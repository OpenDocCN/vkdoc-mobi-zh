    \ compiler tries to protect you from creating attributes that violate your validation\
    \ rules. You can safely ignore them and make sure to set valid values yourself,\
    \ or you can take advantage of Core Data’s offer to help.\n\nSetting default values\
    \ works exactly as you’d suppose: you type a valid default value into the Default\
    \ field, and any new instance of that entity type will begin life with that value\
    \ for that attribute. Try setting the default value for `radius` to 8.0, for example,\
    \ and comment out the code that sets a random radius. You’ll find that all created\
