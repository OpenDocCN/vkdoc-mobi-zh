    It also calls the `makeRandomColor:` method to create a random color for this
    shape, whether circle or polygon, so implement that method. It creates three random
    color values, one each for red, green, and blue, and formats them as a comma-separated
    string, like this:


    **`- (NSString *)makeRandomColor {`**

    **`  // Generate three color values`**

    **`  int red = arc4random() % 256;`**

    **`  int green = arc4random() % 256;`**

    **`  int blue = arc4random() % 256;`**


    **`  // Put them in a comma-separated string`**

    **`  return [NSString stringWithFormat:@"%d,%d,%d", red, green, blue];`**

    **`}`**


