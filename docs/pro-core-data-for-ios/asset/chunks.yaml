    `@end`'
  trans: "\n### 创建测试视图\n\n你正在构建的应用将提供一个选择器，其中包含可运行的测试列表，以及一个用于启动选定测试的按钮。它将列出测试的开始时间、停止时间和经过时间，以及一个描述测试结果的字符串。首先打开\
    \ `PerformanceTuningViewController.h` 文件来创建此用户界面，声明该类实现了选择器视图所需的协议、声明用户界面元素的字段，并声明一个在用户点击“运行选定测试”按钮时调用的方法。以下代码包含了\
    \ `PerformanceTuningViewController.h` 的内容：\n\n```objc\n#import <UIKit/UIKit.h>\n\
    \n@interface PerformanceTuningViewController : UIViewController <UIPickerViewDataSource,\
    \ UIPickerViewDelegate> {\n    IBOutlet UILabel *startTime;\n    IBOutlet UILabel\
    \ *stopTime;\n    IBOutlet UILabel *elapsedTime;\n    IBOutlet UITextView *results;\n\
    \    IBOutlet UIPickerView *testPicker;\n}\n@property (nonatomic, retain) UILabel\
    \ *startTime;\n@property (nonatomic, retain) UILabel *stopTime;\n@property (nonatomic,\
    \ retain) UILabel *elapsedTime;\n@property (nonatomic, retain) UITextView *results;\n\
    @property (nonatomic, retain) UIPickerView *testPicker;\n\n- (IBAction)runTest:(id)sender;\n\
    \n@end\n```\n\n在 `PerformanceTuningViewController.m` 中，为你的字段添加 `@synthesize` 指令，为你承诺实现的选择器视图协议添加存根实现，并为\
    \ `runTest` 添加存根实现，如下所示：\n\n```objc\n@synthesize startTime, stopTime, elapsedTime,\
    \ results, testPicker;\n\n#pragma mark - UIPickerViewDataSource methods\n\n- (NSInteger)numberOfComponentsInPickerView:(UIPickerView\
    \ *)pickerView {\n    return 1;\n}\n\n- (NSInteger)pickerView:(UIPickerView *)pickerView\
    \ numberOfRowsInComponent:(NSInteger)component {\n    return 1;\n}\n\n#pragma\
    \ mark - UIPickerViewDelegate methods\n\n- (NSString *)pickerView:(UIPickerView\
    \ *)pickerView titleForRow:(NSInteger)row forComponent:(NSInteger)component {\n\
    \    return @\"Test\";\n}\n\n#pragma mark - Run the test\n\n- (IBAction)runTest:(id)sender\
    \ {\n}\n```\n\n打开 `PerformanceTuningViewController.xib` 文件，开始构建视图。你需要为“开始时间”、“停止时间”和“经过时间”添加标签，以及用于存储实际开始时间、停止时间和经过时间的右对齐标签；需要一个文本视图来存储任何已运行测试的结果；一个用于启动测试的按钮；以及一个显示可用测试的选择器视图。将所有控件拖到屏幕上，并排列成如图\
    \ 图 7–3 所示。\n\n![images](img/0703.jpg)\n\n**图 7–3.** *为性能调优应用构建视图*\n\n下一步是将所有控件连接到你在\
    \ `PerformanceTuningViewController` 类中创建的字段。按住 Ctrl 键从“文件所有者”图标拖拽到开始时间、停止时间和经过时间的每个标签（即显示实际时间的右对齐标签），并为每个标签选择相应的输出口。按住\
    \ Ctrl 键从“文件所有者”拖拽到文本视图，并选择 `results`。按住 Ctrl 键从“文件所有者”拖拽到选择器视图，选择 `testPicker`，然后从选择器视图向“文件所有者”拖拽两次：第一次选择\
    \ `dataSource`，第二次选择 `delegate`。如果你忘记执行此操作，运行应用时选择器视图将不会显示，你就会知道出问题了。最后，按住 Ctrl\
    \ 键从“运行选定测试”按钮拖拽到“文件所有者”，然后从弹出菜单中选择 `runTest:`。保存所有内容，构建应用并运行。你应当看到类似 图 7–4 所示的效果。\n\
    \n![images](img/0704.jpg)\n\n**图 7–4.** *性能调优应用的首次运行*\n\n### 构建测试框架\n\n为性能测试应用添加可运行测试的方法是，创建一个名为\
    \ `PerformanceTest` 的 Objective-C 协议，然后创建一个实现该协议的所有测试的数组。应用将在选择器视图中显示测试名称，并在用户点击“运行选定测试”按钮时执行所选测试。因此，该协议需要两个方法：\n\
    \n- 一个用于返回将在选择器视图中显示的测试名称。\n- 一个用于在应用的管理对象上下文中执行所选测试。\n\n为保持项目组织有序，在 `PerformanceTuning`\
    \ 文件夹下创建一个新的分组（按住 Ctrl 键点击 `PerformanceTuning`，然后从弹出菜单中选择“新建分组”），并将其命名为 `Tests`。你在本章中添加的所有测试都将放在此分组中。要创建该协议，选择“文件”\
    \ ![images](img/U001.jpg) “新建” ![images](img/U001.jpg) “新建文件”，在左侧选择“Cocoa Touch”，在右侧选择“Objective-C\
    \ 协议”，然后点击“下一步”。将协议命名为 `PerformanceTest.h`，并放入 `Tests` 分组。打开 `PerformanceTest.h`，修改其内容以匹配以下代码：\n\
    \n```objc\n#import <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n\n\
    @protocol PerformanceTest <NSObject>\n\n- (NSString *)name;\n- (NSString *)runWithContext:(NSManagedObjectContext\
    \ *)context;\n\n@end\n```\n\n在将测试框架集成到应用之前，先创建一个测试（如果你愿意，可以称之为“测试的测试”），以便你可以在选择器视图中看到某些内容并运行它。你创建的第一个测试将从持久化存储中检索所有电影、演员和工作室。创建一个名为\
    \ `FetchAllMoviesActorsAndStudiosTest` 的新 Objective-C 类，作为 `NSObject` 的子类，并将其添加到你刚刚创建的\
    \ `Tests` 分组中。以下是头文件的代码：\n\n```objc\n#import <Foundation/Foundation.h>\n#import\
    \ \"PerformanceTest.h\"\n\n@interface FetchAllMoviesActorsAndStudiosTest : NSObject\
    \ <PerformanceTest>\n\n@end\n```\n\n以下是实现文件的代码。将你的文件修改为此内容：\n\n```objc\n#import\
    \ <CoreData/CoreData.h>\n#import \"FetchAllMoviesActorsAndStudiosTest.h\"\n\n\
    @implementation FetchAllMoviesActorsAndStudiosTest\n\n- (NSString *)name {\n \
    \   return @\"Fetch all test\";\n}\n\n- (NSString *)runWithContext:(NSManagedObjectContext\
    \ *)context {\n    NSFetchRequest *request = [[NSFetchRequest alloc] init];\n\
    \    [request setEntity:[NSEntityDescription entityForName:@\"Movie\" inManagedObjectContext:context]];\n\
    \    NSArray *results = [context executeFetchRequest:request error:nil];\n\n \
    \   int actorsRead = 0, studiosRead = 0;\n    for (NSManagedObject *movie in results)\
    \ {\n        actorsRead += [[movie valueForKey:@\"actors\"] count];\n        studiosRead\
    \ += [[movie valueForKey:@\"studios\"] count];\n        [context refreshObject:movie\
    \ mergeChanges:NO];\n    }\n    return [NSString stringWithFormat:@\"Fetched %d\
    \ actors and %d studios\", actorsRead, studiosRead];\n}\n\n@end\n```\n"
- fmt: "### Adding the Testing Framework to the Application\n\nNow you must modify\
    \ the view controller to use the testing framework. Open `PerformanceTuningViewController.h`\
    \ and add an instance of `NSArray` to hold the tests. The following code is the\
    \ updated version of the file with the lines to add in bold. Save the file, and\
    \ move on to `PerformanceTuningViewController.m`.\n\n```\n#import <UIKit/UIKit.h>\n\
    \n@interface PerformanceTuningViewController : UIViewController <UIPickerViewDataSource,\
    \ UIPickerViewDelegate> {\n  IBOutlet UILabel *startTime;\n  IBOutlet UILabel\
    \ *stopTime;\n  IBOutlet UILabel *elapsedTime;\n  IBOutlet UITextView *results;\n\
    \  IBOutlet UIPickerView *testPicker;\n  NSArray *tests;\n}\n@property (nonatomic,\
    \ retain) UILabel *startTime;\n@property (nonatomic, retain) UILabel *stopTime;\n\
    @property (nonatomic, retain) UILabel *elapsedTime;\n@property (nonatomic, retain)\
    \ UITextView *results;\n@property (nonatomic, retain) UIPickerView *testPicker;\n\
    @property (nonatomic, retain) NSArray *tests;\n\n- (IBAction)runTest:(id)sender;\n\
    \n@end\n```\n\nIn `PerformanceTuningViewController.m`, add the new tests member\
    \ to your `@synthesize` line, which now looks like this:\n\n`@synthesize startTime,\
    \ stopTime, elapsedTime, results, testPicker, tests;`\n\nAdd the following import\
    \ statements to support the changes you're going to make to allow your new test,\
    \ and the subsequent tests you build in this chapter, to run:\n\n```\n#import\
    \ \"PerformanceTuningAppDelegate.h\"\n#import \"PerformanceTest.h\"\n#import \"\
    FetchAllMoviesActorsAndStudiosTest.h\"\n```\n\nNow, create a `viewDidLoad:` method\
    \ that blanks out the fields that tests will fill in after they run and adds the\
    \ new test to the `tests` array. Your implementation should match this:\n\n```\n\
    - (void)viewDidLoad {\n[super viewDidLoad];\n\nstartTime.text = @\"\";\nstopTime.text\
    \ = @\"\";\nelapsedTime.text = @\"\";\nresults.text = @\"\";\n\nFetchAllMoviesActorsAndStudiosTest\
    \ *famaasTest = [[FetchAllMoviesActorsAndStudiosTest alloc] init];\nself.tests\
    \ = [[NSArray alloc] initWithObjects:famaasTest, nil];\n}\n```\n\nSince you still\
    \ have only one component to show in the picker view, you can leave the `numberOfComponentsInPickerView:`\
    \ method alone and continue to allow it to return 1. Your `pickerView:numberOfRowsInComponent:`\
    \ method, however, should return the number of tests in your `tests` array.\n\n\
    ```\n- (NSInteger)pickerView:(UIPickerView *)pickerView numberOfRowsInComponent:(NSInteger)component\
    \ {\nreturn [self.tests count];\n}\n```\n\nThe `pickerView:titleForRow:forComponent:`\
    \ method allows you to use your new `PerformanceTest` protocol. This method should\
    \ retrieve the test for the corresponding row from the `tests` array and return\
    \ the name for the test so the picker view displays this name. The method should\
    \ now look like this:\n\n```\n- (NSString *)pickerView:(UIPickerView *)pickerView\
    \ titleForRow:(NSInteger)row forComponent:(NSInteger)component {\nid <PerformanceTest>\
    \ test = [self.tests objectAtIndex:row];\nreturn [test name];\n}\n```\n\nFinally,\
    \ you must instruct the `runTest:` method to do the following:\n\n1. Get the managed\
    \ object context from the application delegate.\n2. Determine which test is selected.\n\
    3. Get the start time.\n4. Run the selected test.\n5. Get the stop time.\n6. Update\
    \ the fields with the times and results.\n\nThat implementation looks like this:\n\
    \n```\n- (IBAction)runTest:(id)sender {\nPerformanceTuningAppDelegate *delegate\
    \ = (PerformanceTuningAppDelegate *)[[UIApplication sharedApplication] delegate];\n\
    NSManagedObjectContext *context = [delegate managedObjectContext];\nid <PerformanceTest>\
    \ test = [self.tests objectAtIndex:[testPicker selectedRowInComponent:0]];\n\n\
    NSDate *start = [NSDate date];\nresults.text = [test runWithContext:context];\n\
    NSDate *stop  = [NSDate date];\n\nstartTime.text = [start description];\nstopTime.text\
    \ = [stop description];\nelapsedTime.text = [NSString stringWithFormat:@\"%.03f\
    \ seconds\", [stop timeIntervalSinceDate:start]];\n}\n```\n\nYou have completed\
    \ the performance-tuning application—for now. As you work through this chapter,\
    \ you will add tests to cover the scenarios you read about.\n\n### Running Your\
    \ First Test\n\nBuild and run the application. One important thing to note is\
    \ that you're loading a lot of data into the managed object context and stressing\
    \ the memory handling of iOS. You will likely see some instability in the application\
    \ throughout the chapter if you run a few tests in a row. When the application\
    \ crashes, simply restart it and carry on.\n\nWhen you run the application, you\
    \ should see the iPhone Simulator with the screen shown in Figure 7–5. The only\
    \ test you've created so far, “Fetch all test,” stands alone in the picker view,\
    \ selected and ready for you to run. Click the Run Selected Test button, and wait.\
    \ Be patient. You didn't add any spinners, progress indicators, or other feedback\
    \ mechanisms to the user interface while it runs, so all you'll see for a few\
    \ moments is that the button turns blue and stays that way, but the test will\
    \ eventually complete, and you'll see something like Figure 7–6. You can see in\
    \ Figure 7–6 that the test took 1.431 seconds to run on our machine.\n\n![images](images/0705.jpg)\n\
    \n**Figure 7–5.** *The performance-tuning application with a single test available*\n\
    \n![images](images/0706.jpg)\n\n**Figure 7–6.** *The performance-tuning application\
    \ after running a test*\n\nThe rest of this chapter explains the various performance\
    \ considerations imposed by Core Data on iOS and the devices it runs on. As you\
    \ learn these performance considerations, you'll add new tests to the application.\
    \ Feel free to add your own tests as well to give the users of your applications\
    \ the best possible experience."
  raw: '#### Adding the Testing Framework to the Application


    Now you must modify the view controller to use the testing framework. Open `PerformanceTuningViewController.h`
    and add an instance of `NSArray` to hold the tests. The following code is the
    updated version of the file with the lines to add in bold. Save the file, and
    move on to `PerformanceTuningViewController.m`.


    `#import <UIKit/UIKit.h>`


    `@interface PerformanceTuningViewController : UIViewController <UIPickerViewDataSource,
    UIPickerViewDelegate> {`

    `  IBOutlet UILabel *startTime;`

    `  IBOutlet UILabel *stopTime;`

    `  IBOutlet UILabel *elapsedTime;`

    `  IBOutlet UITextView *results;`

    `  IBOutlet UIPickerView *testPicker;`

    **`NSArray *tests;`**

    `}`

    `@property (nonatomic, retain) UILabel *startTime;`

    `@property (nonatomic, retain) UILabel *stopTime;`

    `@property (nonatomic, retain) UILabel *elapsedTime;`

    `@property (nonatomic, retain) UITextView *results;`

    `@property (nonatomic, retain) UIPickerView *testPicker;`

    **`@property (nonatomic, retain) NSArray *tests;`**


    `- (IBAction)runTest:(id)sender;`


    `@end`


    In `PerformanceTuningViewController.m`, add the new tests member to your `@synthesize`
    line, which now looks like this:


    `@synthesize startTime, stopTime, elapsedTime, results, testPicker, tests;`


    Add the following import statements to support the changes you''re going to make
    to allow your new test, and the subsequent tests you build in this chapter, to
    run:


    **`#import "PerformanceTuningAppDelegate.h"`**

    **`#import "PerformanceTest.h"`**

    **`#import "FetchAllMoviesActorsAndStudiosTest.h"`**


    Now, create a `viewDidLoad:` method that blanks out the fields that tests will
    fill in after they run and adds the new test to the `tests` array. Your implementation
    should match this:


    **`- (void)viewDidLoad {`**

    **`[super viewDidLoad];`**


    **`startTime.text = @"";`**

    **`stopTime.text = @"";`**

    **`elapsedTime.text = @"";`**

    **`results.text = @"";`**


    **`FetchAllMoviesActorsAndStudiosTest *famaasTest = [[FetchAllMoviesActorsAndStudiosTest
    alloc] init];`**

    **`self.tests = [[NSArray alloc] initWithObjects:famaasTest, nil];`**

    **`}`**


    Since you still have only one component to show in the picker view, you can leave
    the `numberOfComponentsInPickerView:` method alone and continue to allow it to
    return 1\. Your `pickerView:numberOfRowsInComponent:` method, however, should
    return the number of tests in your `tests` array.


    `- (NSInteger)pickerView:(UIPickerView *)pickerView`![images](images/U002.jpg)

    `numberOfRowsInComponent:(NSInteger)component {`

    **`return [self.tests count];`**

    `}`


    The `pickerView:titleForRow:forComponent:` method allows you to use your new `PerformanceTest`
    protocol. This method should retrieve the test for the corresponding row from
    the `tests` array and return the name for the test so the picker view displays
    this name. The method should now look like this:


    `- (NSString *)pickerView:(UIPickerView *)pickerView titleForRow:(NSInteger)row
    forComponent:(NSInteger)component {`

    **`id <PerformanceTest> test = [self.tests objectAtIndex:row];`**

    **`return [test name];`**

    `}`


    Finally, you must instruct the runTest: method to do the following:


    1.  Get the managed object context from the application delegate.

    2.  Determine which test is selected.

    3.  Get the start time.

    4.  Run the selected test.

    5.  Get the stop time.

    6.  Update the fields with the times and results.


    That implementation looks like this:


    `- (IBAction)runTest:(id)sender {`

    **`PerformanceTuningAppDelegate *delegate = (PerformanceTuningAppDelegate *)[[UIApplication
    sharedApplication] delegate];`**

    **`NSManagedObjectContext *context = [delegate managedObjectContext];`**

    **`id <PerformanceTest> test = [self.tests objectAtIndex:[testPicker selectedRowInComponent:0]];`**


    **`NSDate *start = [NSDate date];`**

    **`results.text = [test runWithContext:context];`**

    **`NSDate *stop  = [NSDate date];`**


    **`startTime.text = [start description];`**

    **`stopTime.text = [stop description];`**

    **`elapsedTime.text = [NSString stringWithFormat:@"%.03f seconds", [stop`![images](images/U002.jpg)**

    **`timeIntervalSinceDate:start]];`**

    `}`


    You have completed the performance-tuning application—for now. As you work through
    this chapter, you will add tests to cover the scenarios you read about.


    #### Running Your First Test


    Build and run the application. One important thing to note is that you''re loading
    a lot of data into the managed object context and stressing the memory handling
    of iOS. You will likely see some instability in the application throughout the
    chapter if you run a few tests in a row. When the application crashes, simply
    restart it and carry on.


    When you run the application, you should see the iPhone Simulator with the screen
    shown in [Figure 7–5](#Chapter07.html#fig_7_5). The only test you''ve created
    so far, “Fetch all test,” stands alone in the picker view, selected and ready
    for you to run. Click the Run Selected Test button, and wait. Be patient. You
    didn''t add any spinners, progress indicators, or other feedback mechanisms to
    the user interface while it runs, so all you''ll see for a few moments is that
    the button turns blue and stays that way, but the test will eventually complete,
    and you''ll see something like [Figure 7–6](#Chapter07.html#fig_7_6). You can
    see in [Figure 7–6](#Chapter07.html#fig_7_6) that the test took 1.431 seconds
    to run on our machine.


    ![images](images/0705.jpg)


    **Figure 7–5.** *The performance-tuning application with a single test available*


    ![images](images/0706.jpg)


    **Figure 7–6.** *The performance-tuning application after running a test*


    The rest of this chapter explains the various performance considerations imposed
    by Core Data on iOS and the devices it runs on. As you learn these performance
    considerations, you''ll add new tests to the application. Feel free to add your
    own tests as well to give the users of your applications the best possible experience.'
