- fmt: "Next, create methods to create a shape, update all shapes, and delete all\
    \ shapes. These methods are part of `ShapeViewController`’s private interface,\
    \ which you declare in `ShapeViewController.m`. The other method to add to the\
    \ private interface is a helper method that returns a random color. The lines\
    \ to add to `ShapeViewController.m` above where the implementation begins look\
    \ like this:\n\n``` objc\n@interface ShapesViewController (private)\n- (void)createShapeAt:(CGPoint)point;\n\
    - (void)updateAllShapes;\n- (void)deleteAllShapes;\n- (NSString *)makeRandomColor;\n\
    @end\n```\n\n``` objc\n@implementation ShapesViewController\n...\n```\n\nThe implementation\
    \ for the method that creates a shape receives a parameter that describes where\
    \ on the screen to create the shape. The method creates an `NSManagedObject` of\
    \ entity type Shape and then randomly creates either a Circle type or a Polygon\
    \ type. If a circle, it generates a random value for the `radius` attribute and\
    \ uses the `x` and `y` values from the passed `CGPoint` instance. If a polygon,\
    \ it creates a random number of vertices arranged around the passed `CGPoint`\
    \ and stores them as Vertex types, creating relationships back to the `Polygon`\
    \ instance just created. The implementation looks like that in [Listing 5–3](#Chapter05.html#list_5_3).\n\
    \n***Listing 5–3.** Creating a Shape*\n\n``` objc\n- (void)createShapeAt:(CGPoint)point\
    \ {\n  // Create a managed object to store the shape\n  NSManagedObject *shape\
    \ = nil;\n\n  // Randomly choose a Circle or a Polygon\n  int type = arc4random()\
    \ % 2;\n  if (type == 0) { // Circle\n    // Create the Circle managed object\n\
    \    NSEntityDescription *entity = [NSEntityDescription entityForName:@\"Circle\"\
    \  \ninManagedObjectContext:self.managedObjectContext];\n    NSManagedObject *circle\
    \ = [NSEntityDescription  \ninsertNewObjectForEntityForName:[entity name]  \n\
    inManagedObjectContext:self.managedObjectContext];\n    shape = circle;\n\n  \
    \  // Randomly create a radius and set the attributes of the circle\n    float\
    \ radius = 10 + (arc4random() % 90);\n    [circle setValue:[NSNumber numberWithFloat:point.x]\
    \ forKey:@\"x\"];\n    [circle setValue:[NSNumber numberWithFloat:point.y] forKey:@\"\
    y\"];\n    [circle setValue:[NSNumber numberWithFloat:radius] forKey:@\"radius\"\
    ];\n\n    NSLog(@\"Made a new circle at (%f,%f) with radius %f\", point.x, point.y,\
    \ radius);\n  } else {  // Polygon\n    // Create the Polygon managed object\n\
    \    NSEntityDescription *entity = [NSEntityDescription entityForName:@\"Polygon\"\
    \  \ninManagedObjectContext:self.managedObjectContext];\n    NSManagedObject *polygon\
    \ = [NSEntityDescription  \ninsertNewObjectForEntityForName:[entity name]  \n\
    inManagedObjectContext:self.managedObjectContext];\n    shape = polygon;\n\n \
    \   // Get the vertices. At this point, no Vertex objects for this Shape exist.\n\
    \    // Anything you add to the set, however, will be added to the Vertex entity.\n\
    \    NSMutableSet *vertices = [polygon mutableSetValueForKey:@\"vertices\"];\n\
    \n    // Create a random number of vertices\n    int nVertices = 3 + (arc4random()\
    \ % 20);\n    float angleIncrement = (2 * M_PI) / nVertices;\n    int index =\
    \ 0;\n    for (float i = 0; i < nVertices; i++) {\n      // Generate random values\
    \ for each vertex\n      float a = i * angleIncrement;\n      float radius = 10\
    \ + (arc4random() % 90);\n      float x = point.x + (radius * cos(a));\n     \
    \ float y = point.y + (radius * sin(a));\n\n      // Create the Vertex managed\
    \ object\n      NSEntityDescription *vertexEntity = [NSEntityDescription entityForName:@\"\
    Vertex\"  \ninManagedObjectContext:self.managedObjectContext];\n      NSManagedObject\
    \ *vertex = [NSEntityDescription  \ninsertNewObjectForEntityForName:[vertexEntity\
    \ name]\ninManagedObjectContext:self.managedObjectContext];\n\n      // Set the\
    \ values for the vertex\n      [vertex setValue:[NSNumber numberWithFloat:x] forKey:@\"\
    x\"];\n      [vertex setValue:[NSNumber numberWithFloat:y] forKey:@\"y\"];\n \
    \     [vertex setValue:[NSNumber numberWithInt:index++] forKey:@\"index\"];\n\n\
    \      // Add the Vertex object to the relationship\n      [vertices addObject:vertex];\n\
    \    }\n    NSLog(@\"Made a new polygon with %d vertices\", nVertices);\n  }\n\
    \  // Set the shape’s color    \n  [shape setValue:[self makeRandomColor] forKey:@\"\
    color\"];\n\n  // Add the same shape to both canvases\n  [[topView.canvas mutableSetValueForKey:@\"\
    shapes\"] addObject:shape];\n  [[bottomView.canvas mutableSetValueForKey:@\"shapes\"\
    ] addObject:shape];\n\n  // Save the context\n  NSError *error = nil;\n  if (![self.managedObjectContext\
    \ save:&error]) {\n    NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n\
    \    abort();\n  }\n\n  // Tell the views to repaint themselves\n  [topView setNeedsDisplay];\n\
    \  [bottomView setNeedsDisplay];\n}\n```\n\nThough the method is long, read through\
    \ it; between the codes and the comments, you should be able to see what it’s\
    \ doing. It uses some methods from the C standard library, so include the required\
    \ headers, like so:\n\n``` c\n#include <stdlib.h>\n```\n\nIt also calls the `makeRandomColor:`\
    \ method to create a random color for this shape, whether circle or polygon, so\
    \ implement that method. It creates three random color values, one each for red,\
    \ green, and blue, and formats them as a comma-separated string, like this:\n\n\
    ``` objc\n- (NSString *)makeRandomColor {\n  // Generate three color values\n\
    \  int red = arc4random() % 256;\n  int green = arc4random() % 256;\n  int blue\
    \ = arc4random() % 256;\n\n  // Put them in a comma-separated string\n  return\
    \ [NSString stringWithFormat:@\"%d,%d,%d\", red, green, blue];\n}\n```\n\nThe\
    \ method that updates all the shapes to new random colors uses this method as\
    \ well. It retrieves all the shapes from the persistent store and updates them\
    \ with new random colors. The method looks like this:\n\n``` objc\n- (void)updateAllShapes\
    \ {\n  // Retrieve all the shapes\n  NSFetchRequest *fetchRequest = [[NSFetchRequest\
    \ alloc] init];\n  NSEntityDescription *entity = [NSEntityDescription entityForName:@\"\
    Shape\"  \ninManagedObjectContext:self.managedObjectContext];\n  [fetchRequest\
    \ setEntity:entity];\n  NSArray *shapes = [managedObjectContext executeFetchRequest:fetchRequest\
    \ error:nil];\n\n  // Go through all the shapes and update their colors randomly\n\
    \  for (NSManagedObject *shape in shapes) {\n    [shape setValue:[self makeRandomColor]\
    \ forKey:@\"color\"];\n  }\n\n  // Save the context\n  NSError *error = nil;\n\
    \  if (![self.managedObjectContext save:&error]) {\n    NSLog(@\"Unresolved error\
    \ %@, %@\", error, [error userInfo]);\n    abort();\n  }\n\n  // Tell the views\
    \ to repaint themselves\n  [topView setNeedsDisplay];\n  [bottomView setNeedsDisplay];\n\
    }\n```\n\nThe method that deletes all the shapes looks eerily similar. In fact,\
