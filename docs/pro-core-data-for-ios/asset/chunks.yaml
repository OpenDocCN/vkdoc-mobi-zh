  trans: "\n### 响应数据变化\n\n你或许已经注意到，\"所有选手\"视图对数据变化的响应并不理想。如果你在联盟管理员标签中添加、编辑或删除选手或队伍，然后切换到选手标签，你将看不到任何更改的反映。你可以通过在每次视图出现时重新加载表格数据来解决这个问题，代码如下：\n\
    \n```\n- (void)viewWillAppear:(BOOL)animated {\n    [super viewWillAppear:animated];\n\
    \    [self.tableView reloadData];\n}\n```\n\n然而，这种暴力方式与优雅的 `NSFetchedResultsController`\
    \ 形成了鲜明对比。你可以实现 `NSFetchedResultsControllerDelegate` 协议中响应底层模型变化的四个方法，以优雅地更新视图。前两个方法涵盖了数据变化的始末。当数据发生变化时，系统会调用\
    \ `controllerWillChangeContent:` 方法，标志着 `NSFetchedResultsController` 实例即将响应这些变化。在该方法中，你通常需要在表格视图上调用\
    \ `beginUpdates`，以便它能够同时执行所有动画。随后，在 `controllerDidChangeContent:` 方法（在 `NSFetchedResultsController`\
    \ 完成响应变化后调用）中，你需要对表格视图调用 `endUpdates`，以标记所有同步动画的完成。将以下代码添加到 `AllPlayerViewController.m`\
    \ 文件中：\n\n```\n- (void)controllerWillChangeContent:(NSFetchedResultsController\
    \ *)controller {\n    [self.tableView beginUpdates];\n}\n\n- (void)controllerDidChangeContent:(NSFetchedResultsController\
    \ *)controller {\n    [self.tableView endUpdates];\n}\n```\n\n协议中的另外两个方法 `controller:didChangeSection:atIndex:forChangeType:`\
    \ 和 `controller:didChangeObject:atIndexPath:forChangeType:newIndexPath:`，分别让你能够响应分区和行的变化。当这些方法被调用时，你的\
    \ `NSFetchedResultsController` 已经用最新的数据更新了自身，并为你提供了根据变化数据更新表格视图的机会。在你的实现中，你应该确定哪些数据发生了变化，然后指示你的表格视图相应地更新自身。\n\
    \n当分区发生变化时，系统会调用 `controller:didChangeSection:atIndex:forChangeType:` 方法，传入代表变化对象的\
    \ `NSFetchedResultsSectionInfo` 对象、变化分区的索引以及由 `NSFetchedResultsChangeType` 实例表示的变化类型。`controller:didChangeObject:atIndexPath:forChangeType:newIndexPath:`\
    \ 方法也使用 `NSFetchedResultsChangeType` 值来表示发生了什么变化。表 9–1 列出了 `NSFetchedResultsChangeType`\
    \ 的可能取值及其含义。\n\n![images](img/t0901.jpg)\n\n从表 9–1 可以注意到，对于分区变化，只传入了两个 `NSFetchedResultsChangeType`\
    \ 值：`NSFetchedResultsChangeInsert` 和 `NSFetchedResultsChangeDelete`。而对于对象（或行）的变化，这四种取值都可能传入。\n\
    \n在你的实现中，你通常需要确定发生的变化类型，然后告诉你的表格视图如何处理。但是，请注意你的 `NSFetchedResultsController` 实例正在获取哪些数据，以及你在分区中使用了哪些数据。例如，在联盟管理器应用程序中，`NSFetchedResultsController`\
    \ 实例从 `Player` 实体获取数据，并使用选手的队名作为分区。`NSFetchedResultsController` 完全不监视 `Team` 实体。这意味着，如果你进入联盟管理员标签并添加一支新队伍（同时向数据存储中添加了一个新的\
    \ `Team` 实体），`didChangeSection:` 方法不会被调用，并且传入的更改类型不会是 `NSFetchedResultsChangeInsert`。实际上，它根本不会被调用，因为与\
    \ `NSFetchedResultsController` 实例（即与 `Player` 实体相关的内容）相关的任何内容都没有发生变化。但是，如果你向新队伍中添加一名新选手，则\
    \ `didChangeSection:` 方法就会被调用，并传入 `NSFetchedResultsChangeInsert` 以告知你已添加了一个新的分区（即新的队伍）。\n\
    \n类似地，如果你在联盟管理员标签中编辑一个队伍（例如，重命名它），`didChangeSection:` 方法不会被调用。但是，如果你对该队伍中的选手进行了任何操作（添加、删除或编辑一个选手），那么\
    \ `didChangeSection:` 方法会被调用两次：一次传入 `NSFetchedResultsChangeInsert`，另一次传入 `NSFetchedResultsChangeDelete`，最终效果是用新的队名更新该分区。这意味着，你可以在联盟管理员标签中重命名一个队伍，然后切换到选手标签，分区名称仍然会显示旧的队名。然而，如果你返回并进行添加、编辑或删除选手操作，队名将自动更新。请务必理解这些限制及其后果，以避免不必要的困扰。\n\
    \n为了响应分区变化，请实现 `controller:didChangeSection:atIndex:forChangeType:` 方法，检查变化类型的两个有效值，并指示你的表格视图相应地插入或删除分区，如下所示：\n\
    \n```\n- (void)controller:(NSFetchedResultsController *)controller didChangeSection:(id\
    \ <NSFetchedResultsSectionInfo>)sectionInfo atIndex:(NSUInteger)sectionIndex forChangeType:(NSFetchedResultsChangeType)type\
    \ {\n    switch(type) {\n        case NSFetchedResultsChangeInsert:\n        \
    \    [self.tableView insertSections:[NSIndexSet indexSetWithIndex:sectionIndex]\
    \ withRowAnimation:UITableViewRowAnimationFade];\n            break;\n\n     \
    \   case NSFetchedResultsChangeDelete:\n            [self.tableView deleteSections:[NSIndexSet\
    \ indexSetWithIndex:sectionIndex] withRowAnimation:UITableViewRowAnimationFade];\n\
    \            break;\n    }\n}\n```\n\n需要实现的、用于响应 `NSFetchedResultsController`\
    \ 底层数据变化的最后一个方法是 `controller:didChangeObject:atIndexPath:forChangeType:newIndexPath:`，当结果集中的任何对象发生变化时，系统会调用该方法。作为参数，你会收到发生变化的对象、变化前（在表格视图中的）原始索引路径、变化类型以及（在表格视图中的）新索引路径。变化类型的可能取值即表\
    \ 9–1 中列出的值。根据传入的变化类型，你应该相应地更新表格。下面的实现正是这样做的：\n\n```\n- (void)controller:(NSFetchedResultsController\
    \ *)controller didChangeObject:(id)anObject atIndexPath:(NSIndexPath *)indexPath\
    \ forChangeType:(NSFetchedResultsChangeType)type newIndexPath:(NSIndexPath *)newIndexPath\
    \ {\n    switch(type) {\n        // 数据被插入 -- 将数据插入到表格视图中\n        case NSFetchedResultsChangeInsert:\n\
    \            [self.tableView insertRowsAtIndexPaths:[NSArray arrayWithObject:newIndexPath]\
    \ withRowAnimation:UITableViewRowAnimationFade];\n            break;\n```\n"
- fmt: "```objectivec\n// Data was deleted -- delete the data from the table view\n\
    case NSFetchedResultsChangeDelete:\n    [self.tableView deleteRowsAtIndexPaths:[NSArray\
    \ arrayWithObject:indexPath] withRowAnimation:UITableViewRowAnimationFade];\n\
    \    break;\n\n// Data was updated (changed) -- reconfigure the cell for the data\n\
    case NSFetchedResultsChangeUpdate:\n    [self configureCell:[self.tableView cellForRowAtIndexPath:indexPath]\
    \ atIndexPath:indexPath];\n    break;\n\n// Data was moved -- delete the data\
    \ from the old location and insert the data into the new location\ncase NSFetchedResultsChangeMove:\n\
    \    [self.tableView deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]\
    \ withRowAnimation:UITableViewRowAnimationFade];\n    [self.tableView insertRowsAtIndexPaths:[NSArray\
    \ arrayWithObject:newIndexPath]withRowAnimation:UITableViewRowAnimationFade];\n\
    \    break;\n}\n```\n\nLike the code for responding to section changes, this code\
    \ simply updates the table view according to what happened to the underlying data.\
    \ As you read through this code, you should understand why you moved table cell\
    \ configuration to its own method of `configureCell:atIndexPath:`. If any of the\
    \ rows in the data are updated, you call this method to update the table view\
    \ cell.\n\nBuild and run the application. You'll see that as you change the data\
    \ in the League Manager tab, the changes are immediately reflected in the Players\
    \ tab.\n\n## Summary\n\nAs long as the Core-Data–backed table views in your applications\
    \ fit the paradigm covered by the `NSFetchedResultsController` class, using `NSFetchedResultsController`\
    \ will simplify your development efforts when working with tables. Most of the\
    \ code you write when working with `NSFetchedResultsController` instances doesn't\
    \ change from application to application, so you can get new applications running\
    \ quickly.\n\nThe batching and caching of `NSFetchedResultsController` also lets\
    \ you more efficiently show the results in your table view. Rows will be loaded\
    \ as your table view needs them for display, allowing your applications to consume\
    \ less memory and perform better.\n\n# Chapter 10\n\n# Using Core Data in Advanced\
    \ Applications\n\nYou can build a lot of cool apps without using the material\
    \ in this chapter. Before you slam this book closed, however, we recommend you\
    \ keep reading. This chapter contains material that addresses some advanced Core\
    \ Data topics that your particular applications may require, especially if securing\
    \ user data is important to your application. Follow along with this chapter to\
    \ put some advanced Core Data tools in your toolbox.\n\nIn this chapter, we walk\
    \ you through building an application that illustrates each of the topics we cover.\
    \ You'll build the application incrementally and will be able to run the application\
    \ at the end of each section so you can see that section's advanced feature working.\
    \ Because each section builds on the previous ones, you shouldn't try to skip\
    \ any sections.\n\nThe application you build in this chapter, called MyStash,\
    \ stores both passwords and notes. By the time you're done building it, the passwords\
    \ will all be safely encrypted. The notes, by default, aren't encrypted, but you\
    \ can choose to encrypt individual notes. The passwords and notes live in separate\
    \ databases, though they share the same data model. When you're done, you can\
    \ make a few tweaks to the code, add an enticing icon, and who knows? You may\
    \ have an App Store hit on your hands!\n\n## Creating an Application for Note\
    \ and Password Storage and Encryption\n\nTo begin creating the application that\
    \ you'll work with throughout this chapter, create a new Xcode project called\
    \ `MyStash`. Choose the Empty Application template, as shown in [Figure 10–1](#Chapter10.html#fig_10_1),\
    \ and click Next. Type **MyStash** for Product Name, check Use Core Data, and\
    \ set Device Family to iPhone (see [Figure 10–2](#Chapter10.html#fig_10_2)). Click\
    \ Next, select the directory to save your project in, and click Create.\n\n![images](images/1001.jpg)\n\
    \n**Figure 10–1.** *Selecting the Empty Application template*\n\n![images](images/1002.jpg)\n\
    \n**Figure 10–2.** *Setting up the MyStash project*\n\nYou can build and run your\
    \ application now to view a blank, white screen. You have neither data nor a means\
    \ to view that data. You'll start by adding data to the application.\n\n### Setting\
    \ Up the Data Model\n\nThe MyStash data model will have two entities: one to hold\
    \ notes and one to hold passwords for systems (such as web sites). Open the data\
    \ model, and create an entity called `Note` and another called `System`. Add two\
    \ attributes to the `Note` entity:\n\n*   `title` (type String)\n*   `body` (type\
    \ String)\n\nAdd three attributes to the `System` entity:\n\n*   `name` (type\
    \ String)\n*   `userId` (type String)\n*   `password` (type String)\n\nYour data\
    \ model should look like [Figure 10–3](#Chapter10.html#fig_10_3).\n\n![images](images/1003.jpg)\n\
    \n**Figure 10–3.** *The MyStash data model*\n\nOnce again, you can build and run\
    \ the application, but all you'll see is a blank screen. In the next section,\
