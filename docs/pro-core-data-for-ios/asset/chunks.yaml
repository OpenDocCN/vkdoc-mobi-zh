    \ Manager 应用程序添加一个名为`CustomStore`的新 Objective-C 类，指定其为`NSAtomicStore`的子类。`CustomStore.h`的初始代码很简单：它按预期扩展了`NSAtomicStore`，如代码清单\
    \ 3–6 所示。\n\n**代码清单 3–6.** *CustomStore.h*\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface CustomStore : NSAtomicStore {\n}\n\n@end\n```\n\n实现类最初是空白模板，必须实现几个方法。它包含用于获取类型和标识符的访问器方法（本节后续会解释），一个接受持久化存储协调器及其他参数的初始化方法，以及一些待实现的方法（你将在本节的后续内容中逐步实现）。参见代码清单\
    \ 3–7。\n\n**代码清单 3–7.** *CustomStore.m*\n\n```\n#import \"CustomStore.h\"\n\n\
    @implementation CustomStore\n\n#pragma mark - NSPersistentStore\n\n- (NSString\
    \ *)type {\n    return [[self metadata] objectForKey:NSStoreTypeKey];\n}\n\n-\
    \ (NSString *)identifier {\n    return [[self metadata] objectForKey:NSStoreUUIDKey];\n\
    }\n\n- (id)initWithPersistentStoreCoordinator:(NSPersistentStoreCoordinator *)coordinator\n\
    configurationName:(NSString *)configurationName URL:(NSURL *)url options:(NSDictionary\n\
    *)options {\n    self = [super initWithPersistentStoreCoordinator:coordinator\n\
    configurationName:configurationName URL:url options:options];\n\n    return self;\n\
    }\n\n+ (NSDictionary *)metadataForPersistentStoreWithURL:(NSURL *)url error:(NSError\
    \ **)error {\n    return nil;\n}\n\n#pragma mark - NSAtomicStore\n\n- (BOOL)load:(NSError\
    \ **)error {\n    return YES;\n}\n\n- (id)newReferenceObjectForManagedObject:(NSManagedObject\
    \ *)managedObject {\n    return nil;\n}\n\n- (NSAtomicStoreCacheNode *)newCacheNodeForManagedObject:(NSManagedObject\n\
    *)managedObject {\n    return nil;\n}\n\n- (BOOL)save:(NSError **)error {\n  \
    \  return YES;\n}\n\n-(void)updateCacheNode:(NSAtomicStoreCacheNode *)node fromManagedObject:\n\
    (NSManagedObject *)managedObject {\n}\n\n@end\n```\n\n所有 Core Data 存储都包含辅助元数据，帮助持久化存储协调器管理不同的存储。元数据在`NSPersistentStore`类中具体化为`NSDictionary`对象。对于新的数据存储，有两个数据项尤其重要：`NSStoreTypeKey`和`NSStoreUUIDKey`。`NSStoreTypeKey`的值必须是唯一标识数据存储类型的字符串，而`NSStoreUUIDKey`的值必须是唯一标识数据存储本身的字符串。为了创建唯一标识符，添加一个静态工具方法，用于生成并返回通用唯一标识符（UUID）：\n\
    \n```\n+ (NSString *)makeUUID {\n    CFUUIDRef uuidRef = CFUUIDCreate(NULL);\n\
    \    CFStringRef uuidStringRef = CFUUIDCreateString(NULL, uuidRef);\n    CFRelease(uuidRef);\n\
    \    NSString* uuid = [NSString stringWithString:( __bridge NSString *)uuidStringRef];\n\
    \    CFRelease(uuidStringRef);\n    return uuid;\n}\n```\n\n在本章的示例中，两个数据文件支持自定义存储。第一个文件扩展名为`.txt`，包含数据本身；第二个文件扩展名为`.plist`，包含元数据。针对加载和保存元数据的问题，你将添加一个保存元数据的方法，并完善`metadataForPersistentStoreWithURL:error:`方法的实现，以加载元数据。\n\
    \n数据存储的初始化基于一个基础 URL。在`CustomStore`示例中，URL 指向数据文件（`.txt`文件），而元数据文件的 URL 则通过将基础\
    \ URL 中的`.txt`扩展名替换为`.plist`扩展名来派生。\n\n`writeMetadata:toURL:`方法接收元数据`NSDictionary`并将其写入文件，代码如下：\n\
    \n```\n+ (void)writeMetadata:(NSDictionary*)metadata toURL:(NSURL*)url {\n   \
    \ NSString *path = [[url relativePath] stringByAppendingString:@\".plist\"];\n\
    \    [metadata writeToFile:path atomically:YES];\n}\n```\n\n加载元数据稍显复杂，因为如果数据存储是新建且元数据文件不存在，则必须同时创建元数据文件和一个空数据文件。Core\
    \ Data 期望元数据中包含存储类型和存储 UUID，这有助于持久化存储协调器处理自定义存储，因此需要为`NSStoreTypeKey`和`NSStoreUUIDKey`设置相应值。找到`metadataForPersistentStoreWithURL:error:`方法，并将其内容修改为检查元数据文件是否存在；如果不存在，则写入包含存储类型键和\
    \ UUID 键的元数据文件，同时写入一个空白数据文件，如代码清单 3–8 所示。\n\n**代码清单 3–8.** *`metadataForPersistentStoreWithURL:error:`方法*\n\
    \n```\n+ (NSDictionary *)metadataForPersistentStoreWithURL:(NSURL *)url error:(NSError\
    \ **)error {\n    // 确定元数据文件的文件名\n    NSString *path = [[url relativePath] stringByAppendingString:@\"\
    .plist\"];\n\n    // 如果元数据文件不存在，则创建它\n    if(![[NSFileManager defaultManager]\
    \ fileExistsAtPath:path]) {\n        // 创建一个字典，存储存储类型键（CustomStore）\n        //\
    \ 和 UUID 键\n        NSMutableDictionary *metadata = [NSMutableDictionary dictionary];\n\
    \        [metadata setValue:@\"CustomStore\" forKey:NSStoreTypeKey];\n       \
    \ [metadata setValue:[CustomStore makeUUID] forKey:NSStoreUUIDKey];\n\n      \
    \  // 将元数据写入.plist 文件\n        [CustomStore writeMetadata:metadata toURL:url];\n\
    \n        // 写入一个空数据文件\n        [@\"\" writeToURL:url atomically:YES encoding:[NSString\
    \ defaultCStringEncoding] error:nil];\n\n        NSLog(@\"已创建新存储于 %@\", path);\n\
    \    }\n    return [NSDictionary dictionaryWithContentsOfFile:path];\n}\n```\n\
    \n借助检索元数据和创建空白存储的方法，你可以完善初始化方法，代码如下：\n\n```\n- (id)initWithPersistentStoreCoordinator:(NSPersistentStoreCoordinator\
    \ *)coordinator\nconfigurationName:(NSString *)configurationName URL:(NSURL *)url\
    \ options:(NSDictionary\n*)options {\n    self = [super initWithPersistentStoreCoordinator:coordinator\n\
    configurationName:configurationName URL:url options:options];\n\n    NSDictionary\
    \ *metadata = [CustomStore metadataForPersistentStoreWithURL:[self URL]\nerror:nil];\n\
    \    [self setMetadata:metadata];\n\n    return self;\n}\n```\n"
- fmt: "# Mapping Between NSManagedObject and NSAtomicStoreCacheNode\n\nTo make the\
    \ custom store function properly, you must provide implementations for three additional\
    \ utility methods. The first one creates a new reference object for a given managed\
    \ object. Reference objects represent unique identifiers for each `NSAtomicStoreCacheNode`\
    \ (similar to a database primary key). A `Reference` object is to an `NSAtomicStoreCacheNode`\
    \ what an `NSObjectID` is to an `NSManagedObject`. Since the custom data store\
    \ has to manage data transfer between `NSManagedObject`s and `NSAtomicCacheNode`s,\
    \ it must be able to create a reference object for a newly created managed object.\
    \ For this, you use the UUID again.\n\n```\n- (id)newReferenceObjectForManagedObject:(NSManagedObject\
    \ *)managedObject {\n    NSString *uuid = [CustomStore makeUUID];\n    return\
    \ uuid;\n}\n```\n\nThe second method needed creates a new `NSAtomicStoreCacheNode`\
    \ instance to match a newly created `NSManagedObject`. When a new `NSManagedObject`\
    \ is added and needs to be persisted, the framework first gets a reference object\
    \ using the `newReferenceObjectForManagedObject:` method. `NSAtomicCache` keeps\
    \ track of the mapping between `NSObjectID`s and reference objects. When Core\
    \ Data persists a managed object into the persistent store, it calls the `newCacheNodeForManagedObject:`\
    \ method, which, like its name indicates, creates a new `NSAtomicStoreCacheNode`\
    \ that will serve as a peer to the `NSManagedObject`.\n\n```\n- (NSAtomicStoreCacheNode\
    \ *)newCacheNodeForManagedObject:(NSManagedObject *)managedObject {\n    NSManagedObjectID\
    \ *oid = [managedObject objectID];\n    id referenceID = [self referenceObjectForObjectID:oid];\n\
    \n    NSAtomicStoreCacheNode* node = [self nodeForReferenceObject:referenceID\
    \ andObjectID:oid];\n    [self updateCacheNode:node fromManagedObject:managedObject];\n\
    \    return node;\n}\n```\n\nThe `newCacheNodeForManagedObject:` implementation\
    \ looks up the reference object that was created for the managed object and creates\
    \ a new cache node linked to that reference ID. Finally, the method copies the\
    \ managed object's data into the node using the `updateCacheNode:fromManagedObject:`\
    \ method. Your custom store also needs to provide an implementation for this third\
    \ method, shown in [Listing 3–9](#Chapter03.html#list_3_9).\n\n**Listing 3–9.**\
    \ *The `updateCacheNode:fromManagedObject:` Method*\n\n```\n- (void)updateCacheNode:(NSAtomicStoreCacheNode\
    \ *)node\nfromManagedObject:(NSManagedObject *)managedObject {\n    // Determine\
    \ the entity for the managed object\n    NSEntityDescription *entity = managedObject.entity;\n\
    \n    // Walk through all the attributes in the entity\n    NSDictionary *attributes\
    \ = [entity attributesByName];\n    for (NSString *name in [attributes allKeys])\
    \ {\n        // For each attribute, set the managed object's value into the node\n\
    \        [node setValue:[managedObject valueForKey:name] forKey:name];\n    }\n\
    \n    // Walk through all the relationships in the entity\n    NSDictionary *relationships\
    \ = [entity relationshipsByName];\n    for (NSString *name in [relationships allKeys])\
    \ {\n        id value = [managedObject valueForKey:name];\n        // If this\
    \ is a to-many relationship . . .\n        if ([[relationships objectForKey:name]\
    \ isToMany]) {\n            // . . . get all the destination objects\n       \
    \     NSSet *set = (NSSet*)value;\n            NSMutableSet *data = [NSMutableSet\
    \ set];\n            for (NSManagedObject *managedObject in set) {\n         \
    \       // For each destination object in the relationship,\n                //\
    \ add the cache node to the set\n                NSManagedObjectID *oid = [managedObject\
    \ objectID];\n                id referenceID = [self referenceObjectForObjectID:oid];\n\
    \                NSAtomicStoreCacheNode* n = [self nodeForReferenceObject:referenceID\
    \ andObjectID:oid];\n                [data addObject:n];\n            }\n    \
    \        [node setValue:data forKey:name];\n        } else {\n            // This\
    \ is a to-one relationship, so just get the single\n            // destination\
    \ node for the relationship\n            NSManagedObject *managedObject = (NSManagedObject*)value;\n\
    \            NSManagedObjectID *oid = [managedObject objectID];\n            id\
    \ referenceID = [self referenceObjectForObjectID:oid];\n            NSAtomicStoreCacheNode*\
    \ n = [self nodeForReferenceObject:referenceID andObjectID:oid];\n           \
    \ [node setValue:n forKey:name];\n        }\n    }\n}\n```\n\nThe implementation\
    \ finds the entity description for the given managed object and uses it to iterate\
    \ through attributes and relationships in order to copy their values into the\
    \ node.\n\nTo keep track of cache nodes, create a utility method that, given a\
    \ reference object, returns the matching `NSAtomicStoreCacheNode` if it exists\
    \ or creates a new one.\n\n```\n- (NSAtomicStoreCacheNode *)nodeForReferenceObject:(id)reference\n\
    andObjectID:(NSManagedObjectID *)oid {\n    NSAtomicStoreCacheNode *node = [nodeCacheRef\
    \ objectForKey:reference];\n    if (node == nil) {\n        node = [[NSAtomicStoreCacheNode\
    \ alloc] initWithObjectID:oid];\n        [nodeCacheRef setObject:node forKey:reference];\n\
    \    }\n    return node;\n}\n```\n\nThe implementation of `nodeForReferenceObject:andObjectID:`\
    \ uses a dictionary called `nodeCacheRef`, so declare it in the `CustomStore.h`\
    \ header file, as [Listing 3–10](#Chapter03.html#list_3_10) shows.\n\n**Listing\
    \ 3–10.** *CustomStore.h*\n\n```\n#import <Foundation/Foundation.h>\n\n@interface\
    \ CustomStore : NSAtomicStore {\n    NSMutableDictionary *nodeCacheRef;\n}\n\n\
    @end\n```\n\nInitialize `nodeCacheRef` in the `initWithPersistentStoreCoordinator:configurationName:URL:options:`\
    \ method.\n\n```\n- (id)initWithPersistentStoreCoordinator:(NSPersistentStoreCoordinator\
    \ *)coordinator\nconfigurationName:(NSString *)configurationName URL:(NSURL *)url\
    \ options:(NSDictionary *)options {\n    self = [super initWithPersistentStoreCoordinator:coordinator\n\
    configurationName:configurationName URL:url options:options];\n    NSDictionary\
    \ *metadata = [CustomStore metadataForPersistentStoreWithURL:[self URL]\nerror:nil];\n\
    \    [self setMetadata:metadata];\n    nodeCacheRef = [NSMutableDictionary dictionary];\n\
    \    return self;\n}\n```"
