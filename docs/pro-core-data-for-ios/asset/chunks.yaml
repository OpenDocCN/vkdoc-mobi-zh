  trans: "\n# 处理 Core Data 操作错误\n\n本书中的所有示例均使用 Xcode 生成的默认错误处理代码来响应 Core Data 错误，尽职尽责地将错误消息输出到\
    \ Xcode 控制台并终止应用程序。这种方法有两个优点。\n\n* 它有助于在开发和调试过程中诊断问题。\n* 它易于实现。\n\n然而，这些优点仅对作为开发者的你有帮助，对应用程序的用户没有任何益处。在公开发布使用\
    \ Core Data 的应用程序之前，你应该设计并实现一个更好的错误响应策略。好消息是，这个策略不必庞大或难以实现，因为你响应的选项是有限的。尽管应用程序各不相同，但在大多数情况下，你无法从\
    \ Core Data 错误中恢复，因此应该遵循苹果的建议，正如前面注释中所代表的：显示一个提示框，并指示用户关闭应用程序。这样做可以向用户解释发生了什么，并让他们掌控何时终止应用。虽然控制不多，但嘿——总比应用直接消失要好。\n\
    \n几乎所有 Core Data 操作错误都应在开发过程中捕获，因此仔细测试你的应用应该能防止这些情况。不过，处理它们很简单：只需遵循注释中苹果的建议。要为\
    \ `MyStash` 应用添加错误处理代码，请在 `AppDelegate.h` 中声明一个用于显示提示框的方法：\n\n```\n- (void)showCoreDataError;\n\
    ```\n\n然后，将实现添加到 `AppDelegate.m` 中。你可以对措辞有所争议，但请记住，错误消息并非对缪斯女神的赞歌，消息越长，被阅读的可能性就越小。清单\
    \ 10–27 包含了一个实现，其中消息简短明了——仅用一个多余的感叹号恳请用户阅读：\n\n**清单 10–27.** *显示 Core Data 错误的方法*\n\
    \n```\n- (void)showCoreDataError\n{\n  UIAlertView *alert = [[UIAlertView alloc]\
    \ initWithTitle:@\"错误！\" message:@\"MyStash 无法继续。\\n 请按 Home 键关闭 MyStash。\" delegate:nil\
    \ cancelButtonTitle:@\"确定\" otherButtonTitles: nil];\n  [alert show];\n}\n```\n\
    \n现在，修改 `persistentStoreCoordinator:` 访问器方法，使用这个新方法，而不是记录日志并终止。清单 10–28 展示了 `persistentStoreCoordinator:`\
    \ 的更新内容。\n\n**清单 10–28.** *更新后的 `persistentStoreCoordinator:` 方法*\n\n```\n- (NSPersistentStoreCoordinator\
    \ *)persistentStoreCoordinator\n{\n  if (__persistentStoreCoordinator != nil)\n\
    \  {\n    return __persistentStoreCoordinator;\n  }\n  __persistentStoreCoordinator\
    \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
    \  {\n    // 创建 Notes 持久化存储\n    NSURL *noteStoreURL = [[self applicationDocumentsDirectory]\
    \ URLByAppendingPathComponent:@\"Notes.sqlite\"];\n    NSError *error = nil;\n\
    \    if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
    \ configuration:@\"Notes\" URL:noteStoreURL options:nil error:&error])\n    {\n\
    \      [self showCoreDataError];\n    }\n  }\n\n  {\n    // 创建 Passwords 持久化存储\n\
    \    NSURL *passwordStoreURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
    Passwords.sqlite\"];\n    NSError *error = nil;\n    if (![__persistentStoreCoordinator\
    \ addPersistentStoreWithType:NSSQLiteStoreType configuration:@\"Passwords\" URL:passwordStoreURL\
    \ options:nil error:&error])\n    {\n      [self showCoreDataError];\n    }\n\n\
    \    // 加密密码数据库\n    NSDictionary *fileAttributes = [NSDictionary dictionaryWithObject:NSFileProtectionComplete\
    \ forKey:NSFileProtectionKey];\n    if (![[NSFileManager defaultManager] setAttributes:fileAttributes\
    \ ofItemAtPath:[passwordStoreURL path] error:&error])\n    {\n      [self showCoreDataError];\n\
    \    }\n  }\n\n  return __persistentStoreCoordinator;\n}\n```\n\n为了强制显示此错误，请运行\
    \ `MyStash` 应用程序，然后关闭它。转到数据模型，向 `Note` 实体添加一个类型为 `String` 的属性 `foo`，然后再次运行应用程序。由于模型不再匹配，持久化存储协调器将无法打开数据存储，你的新错误消息将显示出来，如图\
    \ 10–26 所示。\n\n![images](img/1001a.jpg)\n\n**图 10–1a.** *处理 Core Data 错误*\n\n\
    这可能是处理意外错误的最佳方式。然而，下一节将讨论如何处理预期错误：验证错误。\n"
- fmt: "#### Handling Validation Errors\n\nIf you've configured any properties in\
    \ your Core Data model with any validation parameters and you allow users to input\
    \ values that don't automatically meet those validation parameters, you can expect\
    \ to have validation errors. As you learned in [Chapter 4](#Chapter04.html#ch4),\
    \ you can stipulate validation parameters on the properties of the entities in\
    \ your data model. Validations ensure the integrity of your data; Core Data won't\
    \ store anything you've proclaimed invalid into the persistent store. Just because\
    \ you've created the validation rules, however, doesn't mean that users are aware\
    \ of them—or that they know that they can violate them. If you leave the Xcode-generated\
    \ error handling in place, users won't know they've violated the validation rules\
    \ even after they input invalid data. All that will happen is that your application\
    \ will crash, logging a long stack trace that the users will never see. Bewildered\
    \ users will be left with a crashing application, and they won't know why or how\
    \ to prevent its occurrence. Instead of crashing when users enter invalid data,\
    \ you should instead alert users and give them an opportunity to correct the data.\n\
    \nValidation on the database side can be a controversial topic, and for good reason.\
    \ You can protect your data's integrity at its source by putting your validation\
    \ rules in the data model, but you've probably made your coding tasks more difficult.\
    \ Validation rules in your data model are one of those things that sound good\
    \ in concept but prove less desirable in practice. Can you imagine, for example,\
    \ using Oracle to do field validation on a web application? Yes, you can do it,\
    \ but other approaches are probably simpler, more user-friendly, and architecturally\
    \ superior. Validating user-entered values in code, or even designing user interfaces\
    \ that prevent invalid entry altogether, makes your job easier and users' experiences\
    \ better.\n\nHaving said that, however, we'll go ahead and outline a possible\
    \ strategy for handling validation errors. Don't say we didn't warn you, though.\n\
    \nDetecting that users have entered invalid data is simple: just inspect the `NSError`\
    \ object that you pass to the managed object context's `save:` method if an error\
    \ occurs. The `NSError` object contains the error code that caused the `save:`\
    \ method to fail, and if that code matches one of the Core Data validation error\
    \ codes shown in [Table 10-2](#Chapter10.html#tab_10_2), you know that some part\
    \ of the data you attempted to save was invalid. You can use `NSError`'s `userInfo`\
    \ dictionary to look up more information about what caused the error. Note that\
    \ if multiple errors occurred, the error code is `1560`, `NSValidationMultipleErrorsError`,\
    \ and the `userInfo` dictionary holds the rest of the error codes in the key called\
    \ `NSDetailedErrorsKey`.\n\n![images](images/t1002.jpg)\n\n![images](images/t1002.jpg)\n\
    \nYou can choose to implement an error-handling routine that's familiar with your\
    \ data model and thus checks only for certain errors, or you can write a generic\
    \ error handling routine that will handle any of the validation errors that occur.\
    \ Though a generic routine scales better and should continue to work no matter\
    \ the changes to your data model, a more specific error-handling routine may allow\
    \ you to be more helpful to your users in your messaging and responses. Neither\
    \ is the correct answer—the choice is yours for how you want to approach validation\
    \ error handling.\n\nTo write a truly generic validation error handling routine\
    \ would be a lot of work. One thing to consider is that the `NSError` object contains\
    \ a lot of information about the error that occurred, but not necessarily enough\
    \ information to tell the user why the validation failed. Imagine, for example,\
    \ that you have an entity `Foo` with an attribute `bar` that must be at least\
    \ five characters long. If the user enters \"abc\" for `bar`, you'll get an `NSError`\
    \ message that tells you the error code (1670), the entity (`Foo`), the attribute\
    \ (`bar`), and the value (`abc`) that failed validation. The `NSError` object\
    \ doesn't tell you why `abc` is too short—it contains no information that `bar`\
    \ requires at least five characters. To arrive at that, you'd have to ask the\
    \ `Foo` entity for the `NSPropertyDescription` for the `bar` attribute, get the\
    \ validation predicates for that property description, and walk through the predicates\
    \ to see what the minimum length is for `bar`. It's a noble goal but tedious and\
    \ usually overkill. This is one place where violating DRY and letting your code\
    \ know something about the data model might be a better answer.\n\nOne other strange\
    \ thing to consider when using validations in your data model is that they aren't\
    \ enforced when you create a managed object; they're enforced only when you try\
    \ to save the managed object context that the managed object lives in. This makes\
    \ sense if you think it through, since creating a managed object and populating\
    \ its properties happens in multiple steps. First, you create the object in the\
    \ context, and then you set its attributes and relationships. So, for example,\
    \ if you were creating the managed object for the `Foo` entity in the previous\
    \ paragraph, you'd write code like this:\n\n```\nNSManagedObject *foo = [NSEntityDescription\
    \ insertNewObjectForEntityForName:@\"Foo\"\n                                inManagedObjectContext:[self\
    \ managedObjectContext]]; // foo is invalid at this point;\n// bar has fewer than\
    \ five characters\n[foo setValue:@\"abcde\" forKey:@\"bar\"];\n```\n\nThe managed\
    \ object `foo` is created and lives in the managed object context in an invalid\
    \ state, but the managed object context ignores that. The next line of code makes\
    \ the `foo` managed object valid, but it won't be validated until the managed\
    \ object context is saved.\n\n#### Handling Validation Errors in MyStash\n\nIn\
    \ this section, you implement a validation error handling routine for the MyStash\
    \ application. It's generic in that it doesn't have any knowledge of which attributes\
    \ have validation rules, but specific in that it doesn't handle all the validation\
    \ errors—just the ones that you know you set on the model. Before doing that,\
    \ however, you need to add some validation rules to MyStash's data model. Make\
    \ the following changes to the `userId` attribute of the `System` entity:\n\n\
    *   Set Min Length to 3.\n*   Set Max Length to 10.\n*   Set the regular expression\
    \ to allow only letters and numbers: `[A-Za-z0-9]*`.\n\nThe attribute fields should\
    \ match [Figure 10–27](#Chapter10.html#fig_10_27). Save the data model. Now you're\
    \ ready to implement the validation error-handling routine.\n\n![images](images/1027.jpg)\n\
    \n**Figure 10–27.** *Setting validations on the `userId` attribute of `System`*"
  raw: '#### Handling Validation Errors


    If you''ve configured any properties in your Core Data model with any validation
    parameters and you allow users to input values that don''t automatically meet
    those validation parameters, you can expect to have validation errors. As you
    learned in [Chapter 4](#Chapter04.html#ch4), you can stipulate validation parameters
    on the properties of the entities in your data model. Validations ensure the integrity
    of your data; Core Data won''t store anything you''ve proclaimed invalid into
    the persistent store. Just because you''ve created the validation rules, however,
    doesn''t mean that users are aware of them—or that they know that they can violate
    them. If you leave the Xcode-generated error handling in place, users won''t know
    they''ve violated the validation rules even after they input invalid data. All
    that will happen is that your application will crash, logging a long stack trace
    that the users will never see. Bewildered users will be left with a crashing application,
    and they won''t know why or how to prevent its occurrence. Instead of crashing
    when users enter invalid data, you should instead alert users and give them an
    opportunity to correct the data.


    Validation on the database side can be a controversial topic, and for good reason.
    You can protect your data''s integrity at its source by putting your validation
    rules in the data model, but you''ve probably made your coding tasks more difficult.
    Validation rules in your data model are one of those things that sound good in
    concept but prove less desirable in practice. Can you imagine, for example, using
    Oracle to do field validation on a web application? Yes, you can do it, but other
    approaches are probably simpler, more user-friendly, and architecturally superior.
    Validating user-entered values in code, or even designing user interfaces that
    prevent invalid entry altogether, makes your job easier and users'' experiences
    better.


    Having said that, however, we''ll go ahead and outline a possible strategy for
    handling validation errors. Don''t say we didn''t warn you, though.


    Detecting that users have entered invalid data is simple: just inspect the `NSError`
    object that you pass to the managed object context''s `save:` method if an error
    occurs. The `NSError` object contains the error code that caused the `save:` method
    to fail, and if that code matches one of the Core Data validation error codes
    shown in [Table 10-2](#Chapter10.html#tab_10_2), you know that some part of the
    data you attempted to save was invalid. You can use `NSError`''s `userInfo` dictionary
    to look up more information about what caused the error. Note that if multiple
    errors occurred, the error code is `1560`, `NSValidationMultipleErrorsError`,
    and the `userInfo` dictionary holds the rest of the error codes in the key called
    `NSDetailedErrorsKey`.


    ![images](images/t1002.jpg)


    ![images](images/t1002.jpg)


    You can choose to implement an error-handling routine that''s familiar with your
    data model and thus checks only for certain errors, or you can write a generic
    error handling routine that will handle any of the validation errors that occur.
    Though a generic routine scales better and should continue to work no matter the
    changes to your data model, a more specific error-handling routine may allow you
    to be more helpful to your users in your messaging and responses. Neither is the
    correct answer—the choice is yours for how you want to approach validation error
    handling.


    To write a truly generic validation error handling routine would be a lot of work.
    One thing to consider is that the `NSError` object contains a lot of information
    about the error that occurred, but not necessarily enough information to tell
    the user why the validation failed. Imagine, for example, that you have an entity
    `Foo` with an attribute `bar` that must be at least five characters long. If the
    user enters “abc” for bar, you''ll get an `NSError` message that tells you the
    error code (1670), the entity (`Foo`), the attribute (`bar`), and the value (`abc`)
    that failed validation. The `NSError` object doesn''t tell you why `abc` is too
    short—it contains no information that `bar` requires at least five characters.
    To arrive at that, you''d have to ask the `Foo` entity for the `NSPropertyDescription`
    for the bar attribute, get the validation predicates for that property description,
    and walk through the predicates to see what the minimum length is for bar. It''s
    a noble goal but tedious and usually overkill. This is one place where violating
    DRY and letting your code know something about the data model might be a better
    answer.


    One other strange thing to consider when using validations in your data model
    is that they aren''t enforced when you create a managed object; they''re enforced
    only when you try to save the managed object context that the managed object lives
    in. This makes sense if you think it through, since creating a managed object
    and populating its properties happens in multiple steps. First, you create the
    object in the context, and then you set its attributes and relationships. So,
    for example, if you were creating the managed object for the `Foo` entity in the
    previous paragraph, you''d write code like this:


    **`NSManagedObject *foo = [NSEntityDescription insertNewObjectForEntityForName:@"Foo"`![images](images/U002.jpg)**

    **`inManagedObjectContext:[self managedObjectContext]]; // foo is invalid at this
    point;`![images](images/U002.jpg)**

    `bar has fewer than five characters`

    `[foo setValue:@"abcde" forKey:@"bar"];`


    The managed object `foo` is created and lives in the managed object context in
    an invalid state, but the managed object context ignores that. The next line of
    code makes the `foo` managed object valid, but it won''t be validated until the
    managed object context is saved.


    #### Handling Validation Errors in MyStash


    In this section, you implement a validation error handling routine for the MyStash
    application. It''s generic in that it doesn''t have any knowledge of which attributes
    have validation rules, but specific in that it doesn''t handle all the validation
    errors—just the ones that you know you set on the model. Before doing that, however,
    you need to add some validation rules to MyStash''s data model. Make the following
    changes to the `userId` attribute of the `System` entity:


    *   Set Min Length to 3.

    *   Set Max Length to 10.

    *   Set the regular expression to allow only letters and numbers: `[A-Za-z0-9]*`.


    The attribute fields should match [Figure 10–27](#Chapter10.html#fig_10_27). Save
    the data model. Now you''re ready to implement the validation error-handling routine.


    ![images](images/1027.jpg)


    **Figure 10–27.** *Setting validations on the userId attribute of System*'
  trans: "\n#### 处理验证错误\n\n如果你在 Core Data 模型中为任何属性配置了验证参数，并且允许用户输入无法自动满足这些验证参数的值，那么你可能会遇到验证错误。正如你在第\
    \ 4 章中所学到的，你可以在数据模型的实体属性上规定验证参数。验证确保了数据的完整性；Core Data 不会将你声明为无效的任何内容存储到持久化存储中。然而，仅仅因为你创建了验证规则，并不意味着用户知道这些规则——或者知道他们可能会违反这些规则。如果你保留\
    \ Xcode 生成的错误处理方式，即使用户输入了无效数据，他们也不会知道自己违反了验证规则。唯一的结果就是你的应用程序会崩溃，并记录一长串用户永远看不到的堆栈跟踪信息。困惑的用户会面对一个崩溃的应用程序，却不知道原因以及如何避免这种情况发生。与其在用户输入无效数据时崩溃，不如提醒用户并给他们机会纠正数据。\n\
    \n数据库端的验证可能是一个有争议的话题，而且理由充分。你可以通过将验证规则放在数据模型中来从源头保护数据的完整性，但这可能会让你的编码任务变得更加困难。数据模型中的验证规则是那种听起来不错但在实践中却不那么理想的东西之一。例如，你能想象在\
    \ Web 应用程序中使用 Oracle 进行字段验证吗？是的，你可以这样做，但其他方法可能更简单、更用户友好，并且在架构上更优越。在代码中验证用户输入的值，甚至设计防止无效输入的用户界面，会让你的工作更轻松，用户体验也更好。\n\
    \n话虽如此，我们还是要继续概述一种处理验证错误的可行策略。不过，别说我们没提醒过你。\n\n检测用户是否输入了无效数据很简单：只需检查传递给托管对象上下文的\
    \ `save:` 方法的 `NSError` 对象（如果发生错误的话）。`NSError` 对象包含导致 `save:` 方法失败的错误代码，如果该代码与表\
    \ 10-2 中列出的 Core Data 验证错误代码之一匹配，你就知道尝试保存的数据的某一部分是无效的。你可以使用 `NSError` 的 `userInfo`\
    \ 字典查找更多关于错误原因的信息。请注意，如果发生了多个错误，错误代码将是 `1560`，即 `NSValidationMultipleErrorsError`，并且\
    \ `userInfo` 字典会在名为 `NSDetailedErrorsKey` 的键中保存其余的错误代码。\n\n![images](img/t1002.jpg)\n\
    \n![images](img/t1002.jpg)\n\n你可以选择实现一个熟悉你的数据模型、从而只检查特定错误的错误处理例程，或者编写一个通用的错误处理例程来处理任何发生的验证错误。虽然通用例程可扩展性更好，并且无论数据模型如何变化都能继续工作，但更具体的错误处理例程可能让你在消息传递和响应方面对用户更有帮助。没有哪种方法是绝对正确的——选择权在你手中，你可以决定如何处理验证错误。\n\
    \n要编写一个真正通用的验证错误处理例程需要大量工作。需要考虑的一点是，`NSError` 对象包含很多关于所发生错误的信息，但未必有足够的信息来告诉用户验证失败的原因。例如，假设你有一个实体\
    \ `Foo`，其属性 `bar` 必须至少有 5 个字符长。如果用户为 `bar` 输入了 \"abc\"，你会收到一条 `NSError` 消息，告诉你错误代码\
    \ (1670)、实体 (`Foo`)、属性 (`bar`) 和验证失败的值 (`abc`)。`NSError` 对象不会告诉你为什么 `abc` 太短——它不包含\
    \ `bar` 要求至少 5 个字符的信息。要得出这个结论，你必须向 `Foo` 实体请求 `bar` 属性的 `NSPropertyDescription`，获取该属性描述的验证谓词，然后遍历这些谓词以查看\
    \ `bar` 的最小长度是多少。这是一个崇高的目标，但很繁琐，而且通常有些矫枉过正。在这种情况下，违反 DRY（不要重复自己）原则，让代码了解一些数据模型的信息，可能是更好的答案。\n\
    \n在你的数据模型中使用验证时，另一个需要考虑的奇怪之处是，创建托管对象时并不会强制执行验证；只有在尝试保存托管对象所在的托管对象上下文时才会强制执行。仔细想想，这是有道理的，因为创建托管对象并填充其属性是分多个步骤完成的。首先，你在上下文中创建对象，然后设置其属性和关系。例如，如果你要为前面段落中的\
    \ `Foo` 实体创建托管对象，你会编写这样的代码：\n\n```\nNSManagedObject *foo = [NSEntityDescription\
    \ insertNewObjectForEntityForName:@\"Foo\"\n                                inManagedObjectContext:[self\
    \ managedObjectContext]]; // 此时 foo 处于无效状态；\n// bar 少于五个字符\n[foo setValue:@\"\
    abcde\" forKey:@\"bar\"];\n```\n\n托管对象 `foo` 被创建并存在于托管对象上下文中，处于无效状态，但托管对象上下文会忽略这一点。下一行代码使\
    \ `foo` 托管对象变为有效，但只有在托管对象上下文被保存时才会进行验证。\n\n#### 在 MyStash 中处理验证错误\n\n在本节中，你将为一个名为\
    \ MyStash 的应用程序实现一个验证错误处理例程。这个例程是通用的，因为它不了解哪些属性具有验证规则，但又是具体的，因为它不会处理所有验证错误——只处理你已知在模型上设置的那些错误。不过在此之前，你需要向\
    \ MyStash 的数据模型添加一些验证规则。对 `System` 实体的 `userId` 属性进行以下更改：\n\n*   将最小长度设置为 3。\n\
    *   将最大长度设置为 10。\n*   将正则表达式设置为仅允许字母和数字：`[A-Za-z0-9]*`。\n\n属性字段应与图 10-27 一致。保存数据模型。现在你可以开始实现验证错误处理例程了。\n\
    \n![images](img/1027.jpg)\n\n**图 10-27.** *在 `System` 的 `userId` 属性上设置验证*\n"
- fmt: "### Implementing the Validation Error Handling Routine\n\nThe validation error\
    \ handling routine you write should accept a pointer to an `NSError` object and\
    \ return an `NSString` that contains the error messages, separated by line feeds.\
    \ Open `PasswordListViewController.h`, and declare the routine.\n\n```\n- (NSString\
    \ *)validationErrorText:(NSError *)error;\n```\n\nThe routine itself, which goes\
    \ in `PasswordListViewController.m`, creates a mutable string to hold all the\
    \ error messages. It then creates an array that holds all the errors, which can\
    \ be multiple errors or a single error. It then iterates through all the errors,\
    \ gets the property name that was in error, and, depending on the error code,\
    \ forms a proper error message. Notice that some knowledge of the model (the minimum\
    \ and maximum lengths, 3 and 10) is hardcoded, because the error objects don't\
    \ have that information. [Listing 10–29](#Chapter10.html#list_10_29) contains\
    \ the `validationErrorText:` implementation.\n\n**Listing 10–29.** *A method for\
    \ producing error text from an `NSError` object*\n\n```\n#pragma mark - Validation\
    \ Error Handling\n\n- (NSString *)validationErrorText:(NSError *)error\n{\n  //\
    \ Create a string to hold all the error messages\n  NSMutableString *errorText\
    \ = [NSMutableString stringWithCapacity:100];\n\n  // Determine whether we're\
    \ dealing with a single error or multiples, and put them all\n  // in an array\n\
    \  NSArray *errors = [error code] == NSValidationMultipleErrorsError ? [[error\n\
    userInfo] objectForKey:NSDetailedErrorsKey] : [NSArray arrayWithObject:error];\n\
    \n  // Iterate through the errors\n  for (NSError *err in errors)\n  {\n    //\
    \ Get the property that had a validation error\n    NSString *propName = [[err\
    \ userInfo] objectForKey:@\"NSValidationErrorKey\"];\n    NSString *message;\n\
    \    // Form an appropriate error message\n    switch ([err code])\n    {\n  \
    \    case NSValidationMissingMandatoryPropertyError:\n        message = [NSString\
    \ stringWithFormat:@\"%@ required\", propName];\n        break;\n      case NSValidationStringTooShortError:\n\
    \        message = [NSString stringWithFormat:@\"%@ must be at least %d characters\"\
    ,\npropName, 3];\n        break;\n      case NSValidationStringTooLongError:\n\
    \        message = [NSString stringWithFormat:@\"%@ can't be longer than %d characters\"\
    ,\npropName, 10];\n        break;\n      case NSValidationStringPatternMatchingError:\n\
    \        message = [NSString stringWithFormat:@\"%@ can contain only letters and\n\
    numbers\", propName];\n        break;\n      default:\n        message = @\"Unknown\
    \ error. Press Home button to halt.\";\n        break;\n    }\n    // Separate\
    \ the error messages with line feeds\n    if ([errorText length] > 0)\n    {\n\
    \      [errorText appendString:@\"\\n\"];\n    }\n    [errorText appendString:message];\n\
    \  }\n  return errorText;\n}\n```\n\nYou have a fair amount of jiggling to do\
    \ to the code to incorporate this routine into the application. Start in `PasswordListViewController.h`,\
    \ and change the return types for two methods, for reasons that will become apparent\
    \ in a few moments. Change `insertPasswordWithName:` to return an `NSManagedObject*`,\
    \ and change `saveContext:` to return an `NSString*`, as shown in [Listing 10–30](#Chapter10.html#list_10_30).\n\
    \n**Listing 10–30.** *Updating return types in `PasswordListViewController.h`*\n\
    \n```\n- (NSManagedObject *)insertPasswordWithName:(NSString *)name userId:(NSString\
    \ *)userId\npassword:(NSString *)password;\n- (NSString *)saveContext;\n```\n\n\
    The reason `insertPasswordWithName:` must now return an `NSManagedObject*` is\
    \ that you may have to delete the managed object this method creates. Consider\
    \ the following sequence of events:\n\n1.  User taps + to create a new password.\n\
    2.  User enters invalid data.\n3.  User taps Save. A new managed object is created\
    \ in the context, but saving the context fails.\n4.  User dismisses the alert\
    \ that complains of invalid data.\n5.  User taps Cancel.\n\nIf you don't have\
    \ a handle to the newly created object so you can delete it, in this scenario\
    \ the invalid object would still exist in the managed object context, and subsequent\
    \ saves would fail without recourse. [Listing 10–31](#Chapter10.html#list_10_31)\
    \ shows the updated `insertPasswordWithName:` method that returns the managed\
    \ object. It also shows the updated `saveContext:` method, which will now return\
    \ the error text if the save fails. Otherwise, it will return `nil`.\n\n**Listing\
    \ 10–31.** *The `initWithPasswordWithName:` and `saveContext:` methods*\n\n```\n\
    - (NSManagedObject *)insertPasswordWithName:(NSString *)name userId:(NSString\
    \ *)userId\npassword:(NSString *)password\n{\n  NSManagedObjectContext *context\
    \ = [fetchedResultsController managedObjectContext];\n  NSEntityDescription *entity\
    \ = [[fetchedResultsController fetchRequest] entity];\n  NSManagedObject *newPassword\
    \ = [NSEntityDescription\ninsertNewObjectForEntityForName:[entity name] inManagedObjectContext:context];\n\
    \n  [newPassword setValue:name forKey:@\"name\"];\n  [newPassword setValue:userId\
    \ forKey:@\"userId\"];\n  [newPassword setValue:password forKey:@\"password\"\
    ];\n\n  return newPassword;\n}\n\n- (NSString *)saveContext\n{\n  NSString *errorText\
    \ = nil;\n  NSError *error = nil;\n  if (![[self.fetchedResultsController managedObjectContext]\
    \ save:&error])\n  {\n    errorText = [self validationErrorText:error];\n  }\n\
    \  return errorText;\n}\n```\n\nThe only thing that has to change in the `PasswordViewController`\
    \ class is the implementation of the `save:` method. Remember how simple and clean\
    \ it used to be? Well, it's simple no more. Users can now do things like edit\
    \ an existing system entry, change some values so they're invalid, tap Save (which\
    \ updates the values on the object), and then tap Cancel after dismissing the\
    \ alert. You must change this method to undo any changes if anything doesn't pass\
    \ validation, so you save state before you make any changes so you can restore\
    \ the state if any errors occur. If any errors occur, show the alert and don't\
    \ dismiss the modal. [Listing 10–32](#Chapter10.html#list_10_32) shows the new\
    \ `save:` method.\n\n**Listing 10–32.** *The updated `save:` method*\n\n```\n\
    - (IBAction)save:(id)sender\n{\n  NSString *errorText = nil;\n\n  // Create variables\
    \ to store pre-change state, so we can back out if\n  // validation errors occur\n\
    \  NSManagedObject *tempSystem = nil;\n  NSString *tempName = nil;\n  NSString\
    \ *tempUserId = nil;\n  NSString *tempPassword = nil;\n```"
