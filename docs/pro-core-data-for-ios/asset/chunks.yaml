    \n![images](images/1014.jpg)\n\n**Figure 10–14.** *Entering a new password*\n\n\
    ![images](images/1015.jpg)\n\n**Figure 10–15.** *The Password List view with three\
    \ entries*\n\n你在 MyStash 应用程序中创建的所有笔记和密码都存储在同一个持久化存储中。阅读下一节以了解如何将这些数据分散到多个持久化存储中。\n\
    \n### 跨多个持久化存储拆分数据\n\n在本书中，到目前为止，你总是将一个数据模型与单个持久化存储关联起来。然而，你可能在某些情况下需要将模型拆分为多个存储，这会带来好处。当涉及多个持久化存储时，Core\
