    name\"], [person valueForKey:@\"age\"]);\n  }\n}\n```\n\nThis time, it yields\
    \ the correct output.\n\n```\nname=Mary age=36\n```\n\n### Aggregating\n\nWhen\
    \ we think about aggregating data, we think about gathering a global statistic\
    \ on a collection. This was the case in the previous example where you wanted\
    \ to know how many items there were in the collection returned by the subquery.\
    \ Collection operators are part of the Key-Value Coding paradigm. They can be\
    \ embedded in a key path to signify that an aggregation operation should be executed.\
    \ Figure 6–3 shows the general syntax for collection operators.\n\n![images](images/0603.jpg)\n\
    \n**Figure 6–3.** *The syntax of collection operators*\n\nYou currently can't\
    \ define your own custom operators, but the most common are already available\
    \ by default, as shown in Table 6–6.\n\n![images](images/t0606.jpg)\n\nLet's play\
    \ around with these operators. Go back to your test data; this time you want to\
    \ return any managers whose direct reports' average age is 24 years old. The result\
    \ from your query should contain only John, since Jane is 26 and Tim is 22. Using\
    \ the `avg` operator, the predicate is surprisingly simple.\n\n```\n\"employees.@avg.age\
    \ = 24\"\n```\n\nReplace the `readData:` method with the following implementation:\n\
    \n```\n- (void)readData\n{\n  NSManagedObjectContext *context = [self managedObjectContext];\
    \  \n  NSEntityDescription *entity = [NSEntityDescription entityForName:@\"Person\"\
    \ninManagedObjectContext:context];\n\n  NSFetchRequest *fetchRequest = [[NSFetchRequest\
    \ alloc] init];\n  [fetchRequest setEntity:entity];\n\n  NSPredicate *predicate\
    \ = [NSPredicate predicateWithFormat:@\"employees.@avg.age = %d\", 24];\n  [fetchRequest\
    \ setPredicate:predicate];\n\n  NSArray *persons = [context executeFetchRequest:fetchRequest\
    \ error:nil];\n\n  for (NSManagedObject *person in persons)\n  {\n    NSLog(@\"\
    name=%@ age=%@\", [person valueForKey:@\"name\"], [person valueForKey:@\"age\"\
    ]);\n  }\n}\n```\n\nRunning this code returns John, as expected.\n\nThe other\
    \ operators work the same way. To pull, for example, all managers whose youngest\
    \ direct report is 22 years old, use the `min` operator and construct a predicate\
    \ like this:\n\n```\nNSPredicate *predicate = [NSPredicate predicateWithFormat:@\"\
    employees.@min.age = %d\", 22];\n```\n\nThis predicate returns John, who has Tim\
    \ (age 22) working for him, and Tim, who has Jill (age 22) working for him.\n\n\
    ```\nname=John age=32\nname=Tim age=22\n```\n\nThe one operator that behaves somewhat\
