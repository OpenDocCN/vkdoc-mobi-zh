  trans: '

    ### 理解 `NSFetchedResultsController`


    `NSFetchedResultsController` 类与 `UITableView` 实例紧密协作，以在表格视图中显示来自 Core Data 数据模型的数据。它从持久化存储中拉取您指定实体的托管对象，通过缓存来提高性能，并在必要时将数据提供给表格视图以便显示。它还能响应数据变化，自动管理表格中行的添加、删除和移动。


    创建获取结果控制器需要以下四个参数：


    -   一个获取请求（`NSFetchRequest` 实例）

    -   一个托管对象上下文

    -   一个分区名称键路径

    -   一个缓存名称


    这些参数将在以下各节中详细说明。


    ### 获取请求


    该获取请求与您在本节及所有 Core Data 开发中使用的任何获取请求几乎相同。它与您数据模型中指定的实体配合工作，并可选择性地包含一个谓词（`NSPredicate`）来过滤获取的数据。这个获取请求的一个不同之处在于，它必须至少包含一个排序描述符，否则您的应用程序将因以下消息而崩溃：


    `''NSInvalidArgumentException'', reason: ''An instance of NSFetchedResultsController
    requires a fetch request with sort descriptors''`


    这是因为获取结果控制器在表格的约束下工作，而表格的单元格以可预测的顺序显示，因此获取结果控制器也必须以可预测的顺序提供数据。排序描述符提供了对数据进行排序所需的机制。


    ### 托管对象上下文


    这是一个普通的托管对象上下文，用于持有托管对象。保存该上下文会保存其中的所有对象。通常，您会将应用程序的托管对象上下文用作此参数。


    ### 分区名称键路径


    iDevice 上的表格视图被划分为多个分区，每个分区包含一定数量的行。这种结构是表格视图操作的基础。获取结果控制器针对这种环境进行了优化，可以将数据划分为与表格分区相对应的分区。`sectionNameKeyPath`
    参数指定了 Core Data 模型中的一个键路径，该路径将获取请求实体的托管对象划分到这些分区中。


    通常，您会让 `sectionNameKeyPath` 参数指向该表格所显示实体的某个属性。请注意，如果您为 `sectionNameKeyPath` 参数指定了值，则还必须根据该值对获取结果进行排序，否则应用程序会因错误而崩溃。例如，假设
    League Manager 应用程序有一个表格视图，按球队分组列出了所有球队的所有球员。那么，每支球队就是表格中的一个分区，每个球员则占据其所在球队分区中的一行。在这种情况下，获取请求的实体将是
    `Player` 实体，分区名称键路径将是 `team.name` 属性，即存储在 `Player` 的 team 关系中的 `Team` 实体的 `name`
    属性。您还需要向 `NSFetchRequest` 添加一个指向 `team.name` 的 `SortDescriptor` 实例。在本章中，您将向 League
    Manager 应用程序添加这样一个视图。


    如果您的表格视图只包含一个分区（也就是说，如果您的数据无法划分成几个分区，因此您只想显示一个单一的列表），您可以将 `sectionNameKeyPath`
    参数设置为 `nil`。


    ### 缓存名称


    缓存名称参数为获取结果控制器用于缓存它获取并提供给表格的托管对象的缓存指定一个名称。在 iOS 3.*x* 版本中，建议让此缓存名称在获取结果控制器之间保持唯一，但即使与其他获取结果控制器共享缓存名称，您的应用程序也能正常工作。然而，从
    iOS 4.0 开始，如果您在多个获取结果控制器之间共享缓存名称，应用程序将无法正常工作。请确保您的缓存名称是唯一的。


    ### 理解 `NSFetchedResultsController` 委托


    `NSFetchedResultsController` 遵循 Apple 的设计模式，使用名为 `NSFetchedResultsControllerDelegate`
    的委托来实现关键方法，使表格视图和获取结果控制器协同工作。通常，您会让表格视图的视图控制器成为其获取结果控制器的委托。该委托有一个方法 `controller:sectionIndexTitleForSectionName:`，用于在表格视图右侧显示索引时自定义索引名称。此外，该委托还有以下四个方法用于处理表格中显示的数据变化：


    -   `controllerWillChangeContent:` 在内容即将发生更改时调用。这是告诉您的表格视图即将进行一些更改的好时机，以便它可以通过
    `beginUpdates:` 方法启动一系列更改。表格视图使用 `beginUpdates:` 方法来分组应同时进行动画处理的更改。

    -   `controller:didChangeObject:atIndexPath:forChangeType:newIndexPath:` 在托管对象发生更改（被添加、删除、编辑或移动）时调用。在此方法中，您需要判断发生了什么变化，并相应地添加、移动、删除或刷新受影响的表格行的内容。

    -   `controller:didChangeSection:atIndex:forChangeType:` 在分区发生更改（被添加或删除）时调用。在此方法中，您需要判断分区是被添加还是删除，然后在表格中插入或删除相应的分区。

    -   `controllerDidChangeContent:` 在更改完成时调用。这是告诉表格视图由 `beginUpdates:` 方法启动的更改已完成的好时机，方法是调用
    `endUpdates:` 方法。


    在您的视图控制器中实现这些方法，并在创建获取结果控制器时，将其委托设置为该视图控制器。


    ### 使用 `NSFetchedResultsController`


    在基于 Core Data 和表格视图的应用程序执行期间，获取结果控制器将成为数据与表格之间的联络人。获取结果控制器包含一些方法，这些方法能够根据分区和行返回表格所需的数据。这意味着，无论表格是需要显示单元格、确定哪个单元格被点击、计算一个分区中有多少行，还是需要其他任何显示和运行所需的数据片段，获取结果控制器都能提供答案。

    '
- fmt: "### Implementing NSFetchedResultsController in League Manager\n\nLeague Manager\
    \ already uses an `NSFetchedResultsController` instance to control data display\
    \ in its `MasterViewController` instance, which displays the teams. That instance\
    \ of `NSFetchedResultsController` was generated for you, however, and you didn't\
    \ really dive into it. To better understand `NSFetchedResultsController`, in this\
    \ section you will build a new all-player view called Players and add it as a\
    \ tab in the League Manager application. You also put the existing League Manager\
    \ view in a tab. The resulting application looks like [Figure 9–1](#Chapter09.html#fig_9_1),\
    \ which shows the existing team view in a tab, and [Figure 9–2](#Chapter09.html#fig_9_2),\
    \ which shows the new all-player view in another tab.\n\n![images](images/0901.jpg)\n\
    \n**Figure 9–1.** *The League Manager view in a tab*\n\n![images](images/0902.jpg)\n\
    \n**Figure 9–2.** *The Players view in a tab*\n\nTo get started, make a copy of\
    \ the League Manager application. When last you left League Manager, it was using\
    \ a custom store for its persistent store. You can change it back to a SQLite\
    \ store, if you'd like, but remember that Core Data abstracts the way data is\
    \ stored from the rest of the application. The downloaded source code for this\
    \ book leaves League Manager using the custom store.\n\nNext, make sure League\
    \ Manager builds and runs, and then change the view to use tabs. To do this, open\
    \ the `League_ManagerAppDelegate.m` file and change the `application:didFinishLaunchingWithOptions:`\
    \ method to create an instance of `UITabBarController`, add the existing team\
    \ view controller to it (stored in the `navigationController` member), and set\
    \ the application window's root view controller to your new `UITabBarController`\
    \ instance, like this:\n\n```\n- (BOOL)application:(UIApplication *)application\
    \ didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {\n  self.window\
    \ = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n\n  MasterViewController\
    \ *controller = [[MasterViewController alloc] initWithNibName:@\"MasterViewController\"\
    \ bundle:nil];\n  self.navigationController = [[UINavigationController alloc]\
    \ initWithRootViewController:controller];\n\n  UITabBarController *tabBarController\
    \ = [[UITabBarController alloc] init];\n  [tabBarController setViewControllers:[NSArray\
    \ arrayWithObjects:self.navigationController, nil]];\n  self.window.rootViewController\
    \ = tabBarController;\n\n  [self.window makeKeyAndVisible];\n  return YES;\n}\n\
    ```\n\nAn image for your tab, though not required, makes your application more\
    \ attractive and helps differentiate among the tabs in your application. You should\
    \ have two images for each tab: one for iDevices with retina views and one for\
    \ those without. The image for the retina view should be about 60 by 60 pixels,\
    \ and the other should be about 30 x 30 pixels. We've selected an image that looks\
    \ like a clipboard with a list, representing the teams. You can use this image,\
    \ available in the downloaded source code, or create your own. In either case,\
    \ add your image files as `teams.png` and `teams@2x.png` into your project in\
    \ a new group called Images. To add the image to the tab, go back to the `application:didFinishLaunchingWithOptions:`\
    \ method that you just edited and add this code to set the image:\n\n```\n- (BOOL)application:(UIApplication\
    \ *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {\n\
    \  self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n\
    \n  MasterViewController *controller = [[MasterViewController alloc] initWithNibName:@\"\
    MasterViewController\" bundle:nil];\n  self.navigationController = [[UINavigationController\
    \ alloc] initWithRootViewController:controller];\n\n  self.navigationController.tabBarItem.image\
    \ = [UIImage imageNamed:@\"teams.png\"];\n\n  UITabBarController *tabBarController\
    \ = [[UITabBarController alloc] init];\n  [tabBarController setViewControllers:[NSArray\
    \ arrayWithObjects:self.navigationController, nil]];\n  self.window.rootViewController\
    \ = tabBarController;\n\n  [self.window makeKeyAndVisible];\n  return YES;\n}\n\
    ```\n\nBuild and run the application. Though your data may differ, you should\
    \ see the single tab shown in [Figure 9–3](#Chapter09.html#fig_9_3).\n\n![images](images/0903.jpg)\n\
    \n**Figure 9–3.** *League Manager with the teams in a tab*\n\nNow you're ready\
    \ to add the all-players view. Start by creating a new `UITableViewController`\
    \ subclass without a XIB called `AllPlayerViewController`. Add images for the\
    \ tab called `players.png` and `players@2x.png` (we chose an image that looks\
    \ like the silhouette of a person with a list beside it, representing the list\
    \ of players) to your project. Edit the `initWithStyle:` method in `AllPlayerViewController.m`\
    \ to set the tab's title and image, like this:\n\n```\n- (id)initWithStyle:(UITableViewStyle)style\
    \ {\n  self = [super initWithStyle:style];\n  if (self) {\n    self.title = @\"\
    Players\";\n    self.tabBarItem.image = [UIImage imageNamed:@\"players.png\"];\n\
    \  }\n  return self;\n}\n```\n\nAdd the tab to your application by editing your\
    \ `application:didFinishLaunchingWithOptions:` method. In that method, create\
    \ an instance of `AllPlayerViewController` (be sure to import its header file),\
    \ wrap it in an instance of `UINavigationController`, and add it to the tab bar\
    \ controller's array of view controllers, like this:\n\n```\n- (BOOL)application:(UIApplication\
    \ *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {\n\
    \  self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n\
    \n  MasterViewController *controller = [[MasterViewController alloc] initWithNibName:@\"\
    MasterViewController\" bundle:nil];\n  self.navigationController = [[UINavigationController\
    \ alloc] initWithRootViewController:controller];\n\n  self.navigationController.tabBarItem.image\
    \ = [UIImage imageNamed:@\"teams.png\"];\n\n  AllPlayerViewController *playersController\
    \ = [[AllPlayerViewController alloc] initWithStyle:UITableViewStylePlain];\n \
    \ UINavigationController *navPlayersController = [[UINavigationController alloc]\
    \ initWithRootViewController:playersController];\n\n  UITabBarController *tabBarController\
    \ = [[UITabBarController alloc] init];\n  [tabBarController setViewControllers:[NSArray\
    \ arrayWithObjects:self.navigationController, navPlayersController, nil]];\n\n\
    \  self.window.rootViewController = tabBarController;\n  [self.window makeKeyAndVisible];\n\
    \  return YES;\n}\n```\n\nBuild and run the application. You should see a tab\
    \ called Players that you can select to see an empty list, as shown in [Figure\
    \ 9–4](#Chapter09.html#fig_9_4).\n\nWith the tab and table view for the players\
    \ set up, you're ready to implement the `NSFetchedResultsController` instance\
    \ to display the players.\n\n![images](images/0904.jpg)\n\n**Figure 9–4.** *League\
    \ Manager with the Players tab*"
  raw: '### Implementing NSFetchedResultsController in League Manager


    League Manager already uses an `NSFetchedResultsController` instance to control
    data display in its `MasterViewController` instance, which displays the teams.
    That instance of `NSFetchedResultsController` was generated for you, however,
    and you didn''t really dive into it. To better understand `NSFetchedResultsController`,
    in this section you will build a new all-player view called Players and add it
    as a tab in the League Manager application. You also put the existing League Manager
    view in a tab. The resulting application looks like [Figure 9–1](#Chapter09.html#fig_9_1),
    which shows the existing team view in a tab, and [Figure 9–2](#Chapter09.html#fig_9_2),
    which shows the new all-player view in another tab.


    ![images](images/0901.jpg)


    **Figure 9–1.** *The League Manager view in a tab*


    ![images](images/0902.jpg)


    **Figure 9–2.** *The Players view in a tab*


    To get started, make a copy of the League Manager application. When last you left
    League Manager, it was using a custom store for its persistent store. You can
    change it back to a SQLite store, if you''d like, but remember that Core Data
    abstracts the way data is stored from the rest of the application. The downloaded
    source code for this book leaves League Manager using the custom store.


    Next, make sure League Manager builds and runs, and then change the view to use
    tabs. To do this, open the `League_ManagerAppDelegate.m` file and change the `application:didFinishLaunchingWithOptions:`
    method to create an instance of `UITabBarController`, add the existing team view
    controller to it (stored in the `navigationController` member), and set the application
    window''s root view controller to your new `UITabBarController` instance, like
    this:


    `- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary
    *)launchOptions {`

    `  self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];`


    `  MasterViewController *controller = [[MasterViewController alloc] initWithNibName:@"MasterViewController"
    bundle:nil];`

    `  self.navigationController = [[UINavigationController alloc] initWithRootViewController:controller];`


    **`UITabBarController *tabBarController = [[UITabBarController alloc] init];`**

    **`[tabBarController setViewControllers:[NSArray arrayWithObjects:self.navigationController,
    nil]];`**

    **`self.window.rootViewController = tabBarController;`**


    `  [self.window makeKeyAndVisible];`

    `  return YES;`

    `}`


    An image for your tab, though not required, makes your application more attractive
    and helps differentiate among the tabs in your application. You should have two
    images for each tab: one for iDevices with retina views and one for those without.
    The image for the retina view should be about 60 by 60 pixels, and the other should
    be about 30 x 30 pixels. We''ve selected an image that looks like a clipboard
    with a list, representing the teams. You can use this image, available in the
    downloaded source code, or create your own. In either case, add your image files
    as `teams.png` and `teams@2x.png` into your project in a new group called Images.
    To add the image to the tab, go back to the `application:didFinishLaunchingWithOptions:`
    method that you just edited and add this code to set the image:


    `- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary
    *)launchOptions {`

    `  self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];`


    `  MasterViewController *controller = [[MasterViewController alloc] initWithNibName:@"MasterViewController"
    bundle:nil];`

    `  self.navigationController = [[UINavigationController alloc] initWithRootViewController:controller];`


    **`self.navigationController.tabBarItem.image = [UIImage imageNamed:@"teams.png"];`**


    `  UITabBarController *tabBarController = [[UITabBarController alloc] init];`
    `  [tabBarController setViewControllers:[NSArray arrayWithObjects:self.navigationController,
    nil]];`

    `  self.window.rootViewController = tabBarController;`


    `  [self.window makeKeyAndVisible];`

    `  return YES;`

    `}`


    Build and run the application. Though your data may differ, you should see the
    single tab shown in [Figure 9–3](#Chapter09.html#fig_9_3).


    ![images](images/0903.jpg)


    **Figure 9–3.** *League Manager with the teams in a tab*


    Now you''re ready to add the all-players view. Start by creating a new `UITableViewController`
    subclass without a XIB called `AllPlayerViewController`. Add images for the tab
    called `players.png` and `players@2x.png` (we chose an image that looks like the
    silhouette of a person with a list beside it, representing the list of players)
    to your project. Edit the `initWithStyle:` method in `AllPlayerViewController.m`
    to set the tab''s title and image, like this:


    `- (id)initWithStyle:(UITableViewStyle)style {`

    `  self = [super initWithStyle:style];`

    `  if (self) {`

    **`self.title = @"Players";`**

    **`self.tabBarItem.image = [UIImage imageNamed:@"players.png"];`**

    `  }`

    `  return self;`

    `}`


    Add the tab to your application by editing your `application:didFinishLaunchingWithOptions:`
    method. In that method, create an instance of `AllPlayerViewController` (be sure
    to import its header file), wrap it in an instance of `UINavigationController`,
    and add it to the tab bar controller''s array of view controllers, like this:


    `- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary
    *)launchOptions {`

    `  self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];`


    `  MasterViewController *controller = [[MasterViewController alloc] initWithNibName:@"MasterViewController"
    bundle:nil];`

    `  self.navigationController = [[UINavigationController alloc] initWithRootViewController:controller];`


    `  self.navigationController.tabBarItem.image = [UIImage imageNamed:@"teams.png"];`


    **`AllPlayerViewController *playersController = [[AllPlayerViewController alloc]
    initWithStyle:UITableViewStylePlain];`**

    **`UINavigationController *navPlayersController = [[UINavigationController alloc]
    initWithRootViewController:playersController];`**


    `  UITabBarController *tabBarController = [[UITabBarController alloc] init];`

    `  [tabBarController setViewControllers:[NSArray arrayWithObjects:self.navigationController,
    navPlayersController, nil]];`


    `  self.window.rootViewController = tabBarController;`

    `  [self.window makeKeyAndVisible];`

    `  return YES;`

    `}`


    Build and run the application. You should see a tab called Players that you can
    select to see an empty list, as shown in [Figure 9–4](#Chapter09.html#fig_9_4).


    With the tab and table view for the players set up, you''re ready to implement
    the `NSFetchedResultsController` instance to display the players.


    ![images](images/0904.jpg)


    **Figure 9–4.** *League Manager with the Players tab*'
  trans: "\n### 在 League Manager 中实现 NSFetchedResultsController\n\nLeague Manager\
    \ 已经使用了一个 `NSFetchedResultsController` 实例来控制其 `MasterViewController` 实例中的数据展示，该视图控制器用于显示球队。不过，这个\
    \ `NSFetchedResultsController` 实例是为您自动生成的，您并未深入探究它。为了更好地理解 `NSFetchedResultsController`，在本节中，您将构建一个名为“Players”的全新球员视图，并将其作为标签页添加到\
    \ League Manager 应用中。您还将现有的 League Manager 视图放入一个标签页中。最终的应用效果如图 Figure 9–1（显示现有球队视图的标签页）和\
    \ Figure 9–2（显示全新球员视图的另一个标签页）所示。\n\n![images](img/0901.jpg)\n\n**图 9–1** *标签页中的\
    \ League Manager 视图*\n\n![images](img/0902.jpg)\n\n**图 9–2** *标签页中的 Players 视图*\n\
    \n首先，复制一份 League Manager 应用。上一次您开发 League Manager 时，它使用的是自定义存储器作为持久化存储。如果您愿意，可以将其改回\
    \ SQLite 存储，但请记住，Core Data 将数据存储方式与应用的其他部分进行了抽象分离。本书提供的下载源码中，League Manager 仍使用自定义存储器。\n\
    \n接下来，确保 League Manager 能够构建并运行，然后将视图改为使用标签页。为此，请打开 `League_ManagerAppDelegate.m`\
    \ 文件，修改 `application:didFinishLaunchingWithOptions:` 方法，创建一个 `UITabBarController`\
    \ 实例，将现有的球队视图控制器（存储在 `navigationController` 成员变量中）添加到其中，并将应用窗口的根视图控制器设置为这个新的 `UITabBarController`\
    \ 实例，具体代码如下：\n\n```\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions {\n  self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\n\n  MasterViewController *controller = [[MasterViewController\
    \ alloc] initWithNibName:@\"MasterViewController\" bundle:nil];\n  self.navigationController\
    \ = [[UINavigationController alloc] initWithRootViewController:controller];\n\n\
    \  UITabBarController *tabBarController = [[UITabBarController alloc] init];\n\
    \  [tabBarController setViewControllers:[NSArray arrayWithObjects:self.navigationController,\
    \ nil]];\n  self.window.rootViewController = tabBarController;\n\n  [self.window\
    \ makeKeyAndVisible];\n  return YES;\n}\n```\n\n虽然并非必需，但为标签页添加图片能让您的应用更具吸引力，并有助于区分应用中的不同标签。每个标签页应准备两张图片：一张用于配备视网膜屏幕的\
    \ iDevice，另一张用于普通屏幕。视网膜屏幕的图片大小应为 60x60 像素，另一张为 30x30 像素。我们选择了一张类似带列表的剪贴板图片，用以代表球队。您可以使用下载源码中提供的这张图片，也可以自己创建。无论选择哪种方式，请将您的图片文件命名为\
    \ `teams.png` 和 `teams@2x.png`，并添加到一个名为“Images”的新分组中。要将图片添加到标签页，请回到刚才编辑的 `application:didFinishLaunchingWithOptions:`\
    \ 方法，添加如下代码来设置图片：\n\n```\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions {\n  self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\n\n  MasterViewController *controller = [[MasterViewController\
    \ alloc] initWithNibName:@\"MasterViewController\" bundle:nil];\n  self.navigationController\
    \ = [[UINavigationController alloc] initWithRootViewController:controller];\n\n\
    \  self.navigationController.tabBarItem.image = [UIImage imageNamed:@\"teams.png\"\
    ];\n\n  UITabBarController *tabBarController = [[UITabBarController alloc] init];\n\
    \  [tabBarController setViewControllers:[NSArray arrayWithObjects:self.navigationController,\
    \ nil]];\n  self.window.rootViewController = tabBarController;\n\n  [self.window\
    \ makeKeyAndVisible];\n  return YES;\n}\n```\n\n构建并运行应用。尽管您的数据可能不同，但您应该会看到如 Figure\
    \ 9–3 所示的单个标签页。\n\n![images](img/0903.jpg)\n\n**图 9–3** *带球队标签页的 League Manager*\n\
    \n现在，您已准备好添加全球员视图。首先，创建一个不带 XIB 的 `UITableViewController` 子类，命名为 `AllPlayerViewController`。为标签页添加名为\
    \ `players.png` 和 `players@2x.png` 的图片（我们选择了一张类似带列表的人形轮廓图片，用以代表球员列表）到您的项目中。编辑\
    \ `AllPlayerViewController.m` 中的 `initWithStyle:` 方法，设置标签页的标题和图片，具体代码如下：\n\n```\n\
    - (id)initWithStyle:(UITableViewStyle)style {\n  self = [super initWithStyle:style];\n\
    \  if (self) {\n    self.title = @\"Players\";\n    self.tabBarItem.image = [UIImage\
    \ imageNamed:@\"players.png\"];\n  }\n  return self;\n}\n```\n\n通过编辑 `application:didFinishLaunchingWithOptions:`\
    \ 方法，将标签页添加到应用中。在该方法中，创建一个 `AllPlayerViewController` 实例（请确保导入其头文件），将其包装到 `UINavigationController`\
    \ 实例中，并添加到标签栏控制器的视图控制器数组中，具体代码如下：\n\n```\n- (BOOL)application:(UIApplication *)application\
    \ didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {\n  self.window\
    \ = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n\n  MasterViewController\
    \ *controller = [[MasterViewController alloc] initWithNibName:@\"MasterViewController\"\
    \ bundle:nil];\n  self.navigationController = [[UINavigationController alloc]\
    \ initWithRootViewController:controller];\n\n  self.navigationController.tabBarItem.image\
    \ = [UIImage imageNamed:@\"teams.png\"];\n\n  AllPlayerViewController *playersController\
    \ = [[AllPlayerViewController alloc] initWithStyle:UITableViewStylePlain];\n \
    \ UINavigationController *navPlayersController = [[UINavigationController alloc]\
    \ initWithRootViewController:playersController];\n\n  UITabBarController *tabBarController\
    \ = [[UITabBarController alloc] init];\n  [tabBarController setViewControllers:[NSArray\
    \ arrayWithObjects:self.navigationController, navPlayersController, nil]];\n\n\
    \  self.window.rootViewController = tabBarController;\n  [self.window makeKeyAndVisible];\n\
    \  return YES;\n}\n```\n\n构建并运行应用。您应该会看到一个名为“Players”的标签页，选择它后会显示一个空列表，如 Figure\
    \ 9–4 所示。\n\n设置好球员的标签页和表格视图后，您就可以实现 `NSFetchedResultsController` 实例来显示球员数据了。\n\
    \n![images](img/0904.jpg)\n\n**图 9–4** *带 Players 标签页的 League Manager*\n"
- fmt: "### Implementing the `NSFetchedResultsController`\n\nThe `NSFetchedResultsController`'s\
    \ job is to fetch data from the persistent store and provide this data to the\
    \ table view controller as necessary. To get started, import the Core Data headers\
    \ in `AllPlayerViewController.h`, like so:\n\n`#import <CoreData/CoreData.h>`\n\
    \nCreate a property in `AllPlayerViewController.h` to store the `NSFetchedResultsController`\
    \ instance. Also, create a property to store the `NSManagedObjectContext` from\
    \ which your `NSFetchedResultsController` will fetch its data. These properties\
    \ look like this:\n\n`@property (nonatomic, retain) NSFetchedResultsController\
    \ *fetchedResultsController;`\n`@property (nonatomic, retain) NSManagedObjectContext\
    \ *managedObjectContext;`\n\nAdd code to `AllPlayerViewController.m` to synthesize\
    \ getters and setters for these properties.\n\n`@synthesize fetchedResultsController=__fetchedResultsController;`\n\
    `@synthesize managedObjectContext=__managedObjectContext;`\n\nOverride the accessor\
    \ for `fetchedResultsController` to create and configure it. In the accessor,\
    \ do the following:\n\n1.  Check to see whether it's been created and return it\
    \ if it has; although the data it fetches may change, the controller itself never\
    \ has to change once created and configured.\n2.  Create the fetch request that\
    \ the controller will use and set its entity.\n3.  Set the batch size for the\
    \ fetch request. This step isn't necessary, but can improve performance if your\
    \ `NSFetchRequest` is fetching a large number of data rows. Rows will be transparently\
    \ fetched in batches of the size you specify, lazy loading rows as your table\
    \ and `NSFetchedResultsController` need them.\n4.  Set up the sorting to sort\
    \ by team name, then player last name, then player first name.\n5.  Create the\
    \ controller, initializing it with the fetch request, the managed object context,\
    \ the key path for the sections, and the cache name.\n6.  Set the delegate for\
    \ the controller. For now, you'll set it to `nil`; you'll revisit it later.\n\
    7.  Fetch the data.\n8.  Return the newly-created controller.\n\nThe following\
    \ code, which you should add to `AllPlayerViewController.m`, performs all of these\
    \ steps:\n\n```\n#pragma mark - Fetched results controller\n\n- (NSFetchedResultsController\
    \ *)fetchedResultsController {\n    if (__fetchedResultsController != nil) {\n\
    \        return __fetchedResultsController;\n    }\n\n    // Set the entity to\
    \ retrieve Players\n    NSFetchRequest *fetchRequest = [[NSFetchRequest alloc]\
    \ init];\n    [fetchRequest setEntity:[NSEntityDescription entityForName:@\"Player\"\
    \ inManagedObjectContext:self.managedObjectContext]];\n\n    // Set the batch\
    \ size to a suitable number.\n    [fetchRequest setFetchBatchSize:20];\n\n   \
    \ // Set up the sorting: team name, then player last name, then player first name\n\
    \    NSSortDescriptor *sdTeam = [[NSSortDescriptor alloc] initWithKey:@\"team.name\"\
    \ ascending:YES];\n    NSSortDescriptor *sdLastName = [[NSSortDescriptor alloc]\
    \ initWithKey:@\"lastName\" ascending:YES];\n    NSSortDescriptor *sdFirstName\
    \ = [[NSSortDescriptor alloc] initWithKey:@\"firstName\" ascending:YES];\n   \
    \ NSArray *sortDescriptors = [[NSArray alloc] initWithObjects:sdTeam, sdLastName,\
    \ sdFirstName, nil];\n    [fetchRequest setSortDescriptors:sortDescriptors];\n\
    \n    // Create the fetched results controller\n    NSFetchedResultsController\
    \ *aFetchedResultsController = [[NSFetchedResultsController alloc] initWithFetchRequest:fetchRequest\
    \ managedObjectContext:self.managedObjectContext sectionNameKeyPath:@\"team.name\"\
    \ cacheName:@\"AllPlayer\"];\n    aFetchedResultsController.delegate = nil;\n\
    \    self.fetchedResultsController = aFetchedResultsController;\n\n    // Fetch\
    \ the data\n    NSError *error = nil;\n    if (![self.fetchedResultsController\
    \ performFetch:&error]) {\n        NSLog(@\"Unresolved error %@, %@\", error,\
    \ [error userInfo]);\n        abort();\n    }\n    return __fetchedResultsController;\n\
    }\n```\n\nYour `NSFetchedResultsController` will now be created and configured\
    \ the first time it's accessed. You might wonder, though, what accesses it so\
    \ that it's created, configured, and used. The answer: the table view data source\
    \ delegate methods, which talk directly to the `NSFetchedResultsController` instance\
    \ to determine what information to draw in the table, which are all in `AllPlayerViewController.m`\
    \ (since it's the data source delegate for this table view). Let's start with\
    \ the method to obtain the number of sections in the table, which should look\
    \ like this:\n\n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\
    \ {\n    return [[self.fetchedResultsController sections] count];\n}\n```\n\n\
    The `sections:` method of `NSFetchedResultsController` returns an `NSArray` of\
    \ objects that contain information about each section that the `NSFetchedResultsController`\
    \ has fetched. For this method, you return the count of objects in the array.\n\
    \nThe objects contained in the array returned by the `sections:` method adhere\
    \ to the `NSFetchedResultsSectionInfo` protocol, which provides methods for extracting\
    \ data necessary to properly display information in the table. You see one of\
    \ those methods, `name:`, in the method to get the section titles.\n\n```\n- (NSString\
    \ *)tableView:(UITableView *)tableView titleForHeaderInSection:(NSInteger)section\
    \ {\n    id <NSFetchedResultsSectionInfo> sectionInfo = [[self.fetchedResultsController\
    \ sections] objectAtIndex:section];\n    return [sectionInfo name];\n}\n```\n\n\
    This code grabs the object from the same array returned by `sections:` that corresponds\
    \ to the section for which the title is needed, and then returns the result of\
    \ the `name:` method. This result contains the value corresponding to the `sectionNameKeyPath`\
    \ parameter you passed to the `NSFetchedResultsController` initialize—in your\
    \ case, the value for `team.name`, which should be the name of the team that the\
    \ players in this section are on.\n\nAt this point, you've provided the number\
    \ of sections and the title for each section to the table view, but you haven't\
    \ yet provided the number of rows to display for a given section. You do this\
    \ with the following method:\n\n```\n- (NSInteger)tableView:(UITableView *)tableView\
    \ numberOfRowsInSection:(NSInteger)section {\n    id <NSFetchedResultsSectionInfo>\
    \ sectionInfo = [[self.fetchedResultsController sections] objectAtIndex:section];\n\
    \    return [sectionInfo numberOfObjects];\n}\n```\n\nLike the previous method,\
    \ this method grabs the appropriate `NSFetchedResultsSectionInfo` object from\
    \ the array returned by `sections:`. This time, however, it calls its `numberOfObjects:`\
    \ method, which returns the number of objects this section contains. This corresponds\
    \ to the number of rows in the table, since you display each object in its own\
    \ table row.\n\nThe last piece of information you must provide to the table is\
    \ the cell to display, which you do in the `tableView:cellForRowAtIndexPath:`\
    \ method. In this method, you create or retrieve an available cell of the appropriate\
    \ cell type, but you then pull the actual configuration of the cell to its own\
    \ method for reasons that will be explained later in this chapter. Here's the\
    \ `tableView:cellForRowAtIndexPath:` method:\n\n```\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath {\n    static NSString\
    \ *CellIdentifier = @\"AllPlayerCell\";\n\n    UITableViewCell *cell = [tableView\
    \ dequeueReusableCellWithIdentifier:CellIdentifier];\n    if (cell == nil) {\n\
    \        cell = [[[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\
    \ reuseIdentifier:CellIdentifier] autorelease];\n    }\n    [self configureCell:cell\
    \ atIndexPath:indexPath];\n    return cell;\n}\n```\n\nThe implementation for\
    \ `configureCell:atIndexPath:` looks like this:"
  raw: '### Implementing the NSFetchedResultsController


    The `NSFetchedResultsController`''s job is to fetch data from the persistent store
    and provide this data to the table view controller as necessary. To get started,
    import the Core Data headers in `AllPlayerViewController.h`, like so:


    **`#import <CoreData/CoreData.h>`**


    Create a property in `AllPlayerViewController.h` to store the `NSFetchedResultsController`
    instance. Also, create a property to store the `NSManagedObjectContext` from which
    your `NSFetchedResultsController` will fetch its data. These properties look like
    this:


    **`@property (nonatomic, retain) NSFetchedResultsController *fetchedResultsController;`**

    **`@property (nonatomic, retain) NSManagedObjectContext *managedObjectContext;`**


    Add code to `AllPlayerViewController.m` to synthesize getters and setters for
    these properties.


    **`@synthesize fetchedResultsController=__fetchedResultsController;`**

    **`@synthesize managedObjectContext=__managedObjectContext;`**


    Override the accessor for `fetchedResultsController` to create and configure it.
    In the accessor, do the following:


    1.  Check to see whether it''s been created and return it if it has; although
    the data it fetches may change, the controller itself never has to change once
    created and configured.

    2.  Create the fetch request that the controller will use and set its entity.

    3.  Set the batch size for the fetch request. This step isn''t necessary, but
    can improve performance if your `NSFetchRequest` is fetching a large number of
    data rows. Rows will be transparently fetched in batches of the size you specify,
    lazy loading rows as your table and `NSFetchedResultsController` need them.

    4.  Set up the sorting to sort by team name, then player last name, then player
    first name.

    5.  Create the controller, initializing it with the fetch request, the managed
    object context, the key path for the sections, and the cache name.

    6.  Set the delegate for the controller. For now, you''ll set it to `nil`; you''ll
    revisit it later.

    7.  Fetch the data.

    8.  Return the newly-created controller.


    The following code, which you should add to `AllPlayerViewController.m`, performs
    all of these steps:


    **`#pragma mark - Fetched results controller`**


    **`- (NSFetchedResultsController *)fetchedResultsController {`**

    **`if (__fetchedResultsController != nil) {`**

    **`return __fetchedResultsController;`**

    **`}`**


    **`// Set the entity to retrieve Players`**

    **`NSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];`**

    **`[fetchRequest setEntity:[NSEntityDescription entityForName:@"Player" inManagedObjectContext:self.managedObjectContext]];`**


    **`// Set the batch size to a suitable number.`**

    **`[fetchRequest setFetchBatchSize:20];`**


    **`// Set up the sorting: team name, then player last name, then player first
    name`**

    **`NSSortDescriptor *sdTeam = [[NSSortDescriptor alloc] initWithKey:@"team.name"
    ascending:YES];`**

    **`NSSortDescriptor *sdLastName = [[NSSortDescriptor alloc] initWithKey:@"lastName"
    ascending:YES];`**

    **`NSSortDescriptor *sdFirstName = [[NSSortDescriptor alloc] initWithKey:@"firstName"
    ascending:YES];`**

    **`NSArray *sortDescriptors = [[NSArray alloc] initWithObjects:sdTeam, sdLastName,
    sdFirstName, nil];`**

    **`[fetchRequest setSortDescriptors:sortDescriptors];`**


    **`// Create the fetched results controller`**

    **`NSFetchedResultsController *aFetchedResultsController = [[NSFetchedResultsController
    alloc] initWithFetchRequest:fetchRequest managedObjectContext:self.managedObjectContext
    sectionNameKeyPath:@"team.name" cacheName:@"AllPlayer"];`**

    **`aFetchedResultsController.delegate = nil;`**

    **`self.fetchedResultsController = aFetchedResultsController;`**


    **`// Fetch the data`**

    **`NSError *error = nil;`**

    **`if (![self.fetchedResultsController performFetch:&error]) {`**

    **`NSLog(@"Unresolved error %@, %@", error, [error userInfo]);`**

    **`abort();`**

    **`}`**

    **`return __fetchedResultsController;`**

    `}`


    Your `NSFetchedResultsController` will now be created and configured the first
    time it''s accessed. You might wonder, though, what accesses it so that it''s
    created, configured, and used. The answer: the table view data source delegate
    methods, which talk directly to the `NSFetchedResultsController` instance to determine
    what information to draw in the table, which are all in `AllPlayerViewController.m`
    (since it''s the data source delegate for this table view). Let''s start with
    the method to obtain the number of sections in the table, which should look like
    this:


    `- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView {`

    **`return [[self.fetchedResultsController sections] count];`**

    `}`


    The `sections:` method of `NSFetchedResultsController` returns an `NSArray` of
    objects that contain information about each section that the `NSFetchedResultsController`
    has fetched. For this method, you return the count of objects in the array.


    The objects contained in the array returned by the `sections:` method adhere to
    the `NSFetchedResultsSectionInfo` protocol, which provides methods for extracting
    data necessary to properly display information in the table. You see one of those
    methods, `name:`, in the method to get the section titles.


    **`- (NSString *)tableView:(UITableView *)tableView titleForHeaderInSection:(NSInteger)section
    {`**

    **`  id <NSFetchedResultsSectionInfo> sectionInfo = [[self.fetchedResultsController
    sections] objectAtIndex:section];`**

    **`return [sectionInfo name];`**

    **`}`**


    This code grabs the object from the same array returned by `sections:` that corresponds
    to the section for which the title is needed, and then returns the result of the
    `name:` method. This result contains the value corresponding to the `sectionNameKeyPath`
    parameter you passed to the `NSFetchedResultsController` initialize—in your case,
    the value for `team.name`, which should be the name of the team that the players
    in this section are on.


    At this point, you''ve provided the number of sections and the title for each
    section to the table view, but you haven''t yet provided the number of rows to
    display for a given section. You do this with the following method:


    `- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section
    {`

    **`id <NSFetchedResultsSectionInfo> sectionInfo = [[self.fetchedResultsController
    sections] objectAtIndex:section];`**

    **`return [sectionInfo numberOfObjects];`**

    `}`


    Like the previous method, this method grabs the appropriate `NSFetchedResultsSectionInfo`
    object from the array returned by `sections:`. This time, however, it calls its
    `numberOfObjects:` method, which returns the number of objects this section contains.
    This corresponds to the number of rows in the table, since you display each object
    in its own table row.


    The last piece of information you must provide to the table is the cell to display,
    which you do in the `tableView:cellForRowAtIndexPath:` method. In this method,
    you create or retrieve an available cell of the appropriate cell type, but you
    then pull the actual configuration of the cell to its own method for reasons that
    will be explained later in this chapter. Here''s the `tableView:cellForRowAtIndexPath:`
    method:


    `- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath
    *)indexPath {`

    `  static NSString *CellIdentifier = @"AllPlayerCell";`


    `  UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];`

    `  if (cell == nil) {`

    `    cell = [[[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault
    reuseIdentifier:CellIdentifier] autorelease];`

    `  }`

    **`[self configureCell:cell atIndexPath:indexPath];`**

    `  return cell;`

    `}`


    The implementation for `configureCell:atIndexPath:` looks like this:'
  trans: "\n### 实现 `NSFetchedResultsController`\n\n`NSFetchedResultsController` 的职责是从持久化存储中获取数据，并根据需要将这些数据提供给表视图控制器。首先，在\
    \ `AllPlayerViewController.h` 中导入 Core Data 头文件，具体操作如下：\n\n`#import <CoreData/CoreData.h>`\n\
    \n在 `AllPlayerViewController.h` 中创建一个属性来存储 `NSFetchedResultsController` 实例。同时，创建一个属性来存储\
    \ `NSManagedObjectContext`，您的 `NSFetchedResultsController` 将从中获取数据。这些属性如下所示：\n\
    \n`@property (nonatomic, retain) NSFetchedResultsController *fetchedResultsController;`\n\
    `@property (nonatomic, retain) NSManagedObjectContext *managedObjectContext;`\n\
    \n在 `AllPlayerViewController.m` 中添加代码，为这些属性合成 getter 和 setter 方法。\n\n`@synthesize\
    \ fetchedResultsController=__fetchedResultsController;`\n`@synthesize managedObjectContext=__managedObjectContext;`\n\
    \n重写 `fetchedResultsController` 的存取器方法，以创建并配置它。在存取器中，执行以下操作：\n\n1.  检查它是否已被创建，如果已创建则直接返回；尽管它获取的数据可能会改变，但控制器本身一旦创建和配置完成就无需改变。\n\
    2.  创建控制器将要使用的获取请求，并设置其实体。\n3.  设置获取请求的批量大小。这一步并非必须，但如果您的 `NSFetchRequest` 获取大量数据行，这样做可以提升性能。数据行将按照您指定的大小以透明的方式分批获取，并在表格和\
    \ `NSFetchedResultsController` 需要它们时进行懒加载。\n4.  设置排序规则：先按球队名称排序，再按球员姓氏排序，最后按球员名字排序。\n\
    5.  创建控制器，使用获取请求、托管对象上下文、分节键路径和缓存名称进行初始化。\n6.  设置控制器的委托。目前将其设置为 `nil`；稍后您会重新审视这一点。\n\
    7.  获取数据。\n8.  返回新创建的控制器。\n\n以下代码（您应将其添加到 `AllPlayerViewController.m` 中）执行了所有这些步骤：\n\
    \n```\n#pragma mark - 获取结果控制器\n\n- (NSFetchedResultsController *)fetchedResultsController\
    \ {\n    if (__fetchedResultsController != nil) {\n        return __fetchedResultsController;\n\
    \    }\n\n    // 设置要获取的实体为球员\n    NSFetchRequest *fetchRequest = [[NSFetchRequest\
    \ alloc] init];\n    [fetchRequest setEntity:[NSEntityDescription entityForName:@\"\
    Player\" inManagedObjectContext:self.managedObjectContext]];\n\n    // 将批量大小设置为一个合适的数值\n\
    \    [fetchRequest setFetchBatchSize:20];\n\n    // 设置排序：球队名称、球员姓氏、球员名字\n    NSSortDescriptor\
    \ *sdTeam = [[NSSortDescriptor alloc] initWithKey:@\"team.name\" ascending:YES];\n\
    \    NSSortDescriptor *sdLastName = [[NSSortDescriptor alloc] initWithKey:@\"\
    lastName\" ascending:YES];\n    NSSortDescriptor *sdFirstName = [[NSSortDescriptor\
    \ alloc] initWithKey:@\"firstName\" ascending:YES];\n    NSArray *sortDescriptors\
    \ = [[NSArray alloc] initWithObjects:sdTeam, sdLastName, sdFirstName, nil];\n\
    \    [fetchRequest setSortDescriptors:sortDescriptors];\n\n    // 创建获取结果控制器\n\
    \    NSFetchedResultsController *aFetchedResultsController = [[NSFetchedResultsController\
    \ alloc] initWithFetchRequest:fetchRequest managedObjectContext:self.managedObjectContext\
    \ sectionNameKeyPath:@\"team.name\" cacheName:@\"AllPlayer\"];\n    aFetchedResultsController.delegate\
    \ = nil;\n    self.fetchedResultsController = aFetchedResultsController;\n\n \
    \   // 获取数据\n    NSError *error = nil;\n    if (![self.fetchedResultsController\
    \ performFetch:&error]) {\n        NSLog(@\"未解决的错误 %@, %@\", error, [error userInfo]);\n\
    \        abort();\n    }\n    return __fetchedResultsController;\n}\n```\n\n您的\
    \ `NSFetchedResultsController` 将在首次被访问时创建并配置完成。不过，您可能会疑惑，是什么触发了它的访问，从而使其被创建、配置和使用。答案是：表视图数据源委托方法，这些方法直接与\
    \ `NSFetchedResultsController` 实例通信，以确定在表格中绘制什么信息，它们都位于 `AllPlayerViewController.m`\
    \ 中（因为它是此表视图的数据源委托）。我们先从获取表格中分节数量的方法开始，该方法应如下所示：\n\n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
    \ *)tableView {\n    return [[self.fetchedResultsController sections] count];\n\
    }\n```\n\n`NSFetchedResultsController` 的 `sections:` 方法返回一个 `NSArray`，其中包含 `NSFetchedResultsController`\
    \ 所获取的每个分节的信息对象。对于此方法，您返回的是数组中对象的数量。\n\n`sections:` 方法返回的数组中所包含的对象遵循 `NSFetchedResultsSectionInfo`\
    \ 协议，该协议提供了提取必要数据以正确显示表格信息的方法。在获取分节标题的方法中，您会看到其中一个方法 `name:`。\n\n```\n- (NSString\
    \ *)tableView:(UITableView *)tableView titleForHeaderInSection:(NSInteger)section\
    \ {\n    id <NSFetchedResultsSectionInfo> sectionInfo = [[self.fetchedResultsController\
    \ sections] objectAtIndex:section];\n    return [sectionInfo name];\n}\n```\n\n\
    这段代码从 `sections:` 返回的数组中获取与需要标题的分节相对应的对象，然后返回 `name:` 方法的结果。该结果包含的值对应于您传递给 `NSFetchedResultsController`\
    \ 初始化方法的 `sectionNameKeyPath` 参数——在您的情况下，就是 `team.name` 的值，即该分节中球员所属球队的名称。\n\n\
    此时，您已向表视图提供了分节数量以及每个分节的标题，但尚未提供指定分节应显示的行数。您可以使用以下方法来实现：\n\n```\n- (NSInteger)tableView:(UITableView\
    \ *)tableView numberOfRowsInSection:(NSInteger)section {\n    id <NSFetchedResultsSectionInfo>\
    \ sectionInfo = [[self.fetchedResultsController sections] objectAtIndex:section];\n\
    \    return [sectionInfo numberOfObjects];\n}\n```\n\n与上一个方法类似，此方法从 `sections:`\
    \ 返回的数组中获取相应的 `NSFetchedResultsSectionInfo` 对象。不过，这次它调用的是 `numberOfObjects:` 方法，该方法返回此分节包含的对象数量。这对应于表格中的行数，因为您会在每个表格行中显示一个对象。\n\
    \n您必须提供给表格的最后一项信息是要显示的单元格，这需要在 `tableView:cellForRowAtIndexPath:` 方法中完成。在此方法中，您创建或获取一个适当单元格类型的可用单元格，然后将单元格的实际配置提取到其自己的方法中，原因将在本章后面解释。以下是\
    \ `tableView:cellForRowAtIndexPath:` 方法：\n\n```\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath {\n    static NSString\
    \ *CellIdentifier = @\"AllPlayerCell\";\n\n    UITableViewCell *cell = [tableView\
    \ dequeueReusableCellWithIdentifier:CellIdentifier];\n    if (cell == nil) {\n\
