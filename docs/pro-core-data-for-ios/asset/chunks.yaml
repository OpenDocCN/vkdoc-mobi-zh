    elapsedTime.text = @\"\";\nresults.text = @\"\";\n\nFetchAllMoviesActorsAndStudiosTest\
    \ *famaasTest = [[FetchAllMoviesActorsAndStudiosTest alloc] init];\nself.tests\
    \ = [[NSArray alloc] initWithObjects:famaasTest, nil];\n}\n```\n\n由于你在选择器中仍然只显示一个组件，因此可以保留\
    \ `numberOfComponentsInPickerView:` 方法不变，继续让它返回 1。但是，你的 `pickerView:numberOfRowsInComponent:`\
    \ 方法应返回 `tests` 数组中测试的数量。\n\n```\n- (NSInteger)pickerView:(UIPickerView *)pickerView\
    \ numberOfRowsInComponent:(NSInteger)component {\nreturn [self.tests count];\n\
    }\n```\n\n`pickerView:titleForRow:forComponent:` 方法允许你使用新的 `PerformanceTest` 协议。该方法应从\
    \ `tests` 数组中检索对应行的测试，并返回该测试的名称，以便选择器视图显示此名称。该方法现在应如下所示：\n\n```\n- (NSString *)pickerView:(UIPickerView\
    \ *)pickerView titleForRow:(NSInteger)row forComponent:(NSInteger)component {\n\
    id <PerformanceTest> test = [self.tests objectAtIndex:row];\nreturn [test name];\n\
    }\n```\n\n最后，你必须指示 `runTest:` 方法执行以下操作：\n\n1.  从应用程序委托中获取托管对象上下文。\n2.  确定选择了哪个测试。\n\
    3.  获取开始时间。\n4.  运行选定的测试。\n5.  获取停止时间。\n6.  用时间和结果更新字段。\n\n该实现如下所示：\n\n```\n-\
    \ (IBAction)runTest:(id)sender {\nPerformanceTuningAppDelegate *delegate = (PerformanceTuningAppDelegate\
    \ *)[[UIApplication sharedApplication] delegate];\nNSManagedObjectContext *context\
    \ = [delegate managedObjectContext];\nid <PerformanceTest> test = [self.tests\
    \ objectAtIndex:[testPicker selectedRowInComponent:0]];\n\nNSDate *start = [NSDate\
    \ date];\nresults.text = [test runWithContext:context];\nNSDate *stop  = [NSDate\
    \ date];\n\nstartTime.text = [start description];\nstopTime.text = [stop description];\n\
    elapsedTime.text = [NSString stringWithFormat:@\"%.03f seconds\", [stop timeIntervalSinceDate:start]];\n\
    }\n```\n\n你已完成了性能调优应用程序——目前是这样。随着你学习本章，你将添加测试来覆盖你所读到的各种场景。\n\n### 运行你的第一个测试\n\n\
    构建并运行应用程序。需要注意的重要一点是，你正在向托管对象上下文加载大量数据，这会加重 iOS 的内存处理负担。如果你连续运行几个测试，在本章中你可能会看到应用程序出现一些不稳定性。当应用程序崩溃时，只需重新启动它并继续即可。\n\
    \n当你运行应用程序时，应该会看到 iPhone 模拟器显示图 7-5 所示的屏幕。你目前创建的唯一个测试“获取所有测试”独自显示在选择器中，处于选中状态，随时可以运行。点击“运行选定的测试”按钮，然后等待。请耐心等待。你没有在用户界面中添加任何旋转图标、进度指示器或其他反馈机制，因此在运行期间，你只会看到按钮变蓝并保持该状态，但测试最终会完成，你将看到类似图\
    \ 7-6 的画面。在图 7-6 中，你可以看到测试在我们的机器上运行了 1.431 秒。\n\n![images](img/0705.jpg)\n\n**图\
    \ 7-5.** *性能调优应用程序，有一个可用的测试*\n\n![images](img/0706.jpg)\n\n**图 7-6.** *运行测试后的性能调优应用程序*\n\
    \n本章的其余部分将解释 Core Data 对 iOS 及其运行设备施加的各种性能考量。当你学习这些性能考量时，你将向应用程序添加新的测试。也可以随意添加你自己的测试，为你的应用程序用户提供尽可能最佳的体验。\n"
- fmt: '### Faulting


    When you run SQL queries against a database, you know the depth and range of the
    data you''re pulling. You know if you''re joining tables, you know the columns
    you''re pulling back, and, if you''re careful, you can limit the number of rows
    you yank from the database into working memory. You may have to work harder to
    get data than you do with Core Data, but you have more control. You know about
    how much memory you''re using to hold the data you fetch.


    With Core Data, however, you''ve given up some amount of control in exchange for
    ease of use. With the Shapes application from [Chapter 5](#Chapter05.html#ch5),
    for example, each `Polygon` instance had a collection of vertices, which you accessed
    in an object-oriented, not a data-oriented, way. You didn''t have to care whether
    Core Data pulled the vertex data from the database when the application started,
    when the polygon was loaded, or when you first accessed the vertices. Core Data
    cares, however, and attempts to delay loading data from the persistent store into
    the object graph until necessary, reducing both fetch time and memory usage. It
    does this using what''s termed *faults*.


    Think of a fault like a symlink on a Unix file system, which is not the actual
    file it points to nor does it contain the file''s data. The symlink represents
    the file, though, and when called upon can get to the file and its data just as
    if it were the file itself. Like a symlink, a fault is a placeholder that can
    get to the persistent store''s data. A fault can represent either a managed object
    or, when it represents a to-many relationship, a collection of managed objects.
    As a link to or a shadow of the data, a fault occupies much less memory than the
    actual data does. See [Figure 7–7](#Chapter07.html#fig_7_7) for a depiction of
    a managed object and a fault. In this case, the managed object is an instance
    of `Shape`, and the fault points to the related collection of `Vertex` objects.
    The `Shape` is boldly depicted, representing the fact that it has been fetched
    from the persistent store and resides in memory. The vertices, however, are faint
    and grayed out, because they haven''t been fetched from the persistent store and
    do not reside in memory.


    ![images](images/0707.jpg)


    **Figure 7–7.** *A shape and its faulted vertices*


    #### Firing Faults


    Core Data uses the term *firing faults* when it must pull the data from the persistent
    store that a fault points to and then put it into memory. Core Data has “fired”
    off a request to fetch data from the data store, and the fault has been “fired”
    from its job to represent the actual data. You cause a fault to fire any time
    you request a managed object''s persistent data, whether through `valueForKey:`
    or through methods of a custom class that either return or access the object''s
    persistent data. Methods that access a managed object''s metadata and not any
    of the data stored in the persistent store don''t fire a fault. This means you
    can query a managed object''s class, hash, description, entity, and object ID,
    among other things, and not cause a fault to fire. For the complete list of which
    methods don''t fire a fault, see Apple''s documentation at [`http://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/CoreData/Articles/cdPerformance.html`](http://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/CoreData/Articles/cdPerformance.html)
    under the section “Faulting Behavior.”


    Explicitly asking a managed object for its persistent data causes a fault to fire,
    but so does calling any methods or constructs that access persistent data from
    a managed object. You can, for example, access a collection through a managed
    object''s relationships without causing a fault to fire. Sorting the collection,
    however, will fire a fault because any logical sorting will sort by some of the
    object''s persistent data. The test you build later in this section demonstrates
    this behavior.


    #### Faulting and Caching


    We fibbed a bit when we said that firing faults fetches data from the persistent
    store. That''s often true, but before Core Data treks all the way to the persistent
    store to retrieve data, it first checks its cache for the data it seeks. If Core
    Data finds its intended data in the cache, it pulls the data from cache and skips
    the longer trip to the persistent store. The “Caching” and “Expiring” sections
    discuss caching in more detail.


    #### Refaulting


    One way to take control of your application''s persistent data and memory use
    is to turn managed objects back into faults, thereby relinquishing the memory
    its data was occupying. You turn objects back into faults by calling the managed
    object context''s `refreshObject:mergeChanges:` method, passing the object you
    want to fault and `NO` for the `mergeChanges:` parameter. If, for example, you
    had a managed object called `foo` that you wanted to turn back into a fault, you
    would use code similar to this:


    ```

    [context refreshObject:foo mergeChanges:NO];

    ```


    After this call, `foo` is now a fault, and `[foo isFault]` returns `YES`. If you
    look at the code for the previous test, you''ll see a call within the loop that
    iterates over all `movie` instances to turn each `movie` instance back into a
    fault.


    ```

    [context refreshObject:movie mergeChanges:NO];

    ```


    Understanding the `mergeChanges:` parameter is important. Passing `NO`, as the
    previous code does, throws away any changed data that has not yet been saved to
    the persistent store. Take care when doing this because you lose all data changes
    in this object you''re faulting, and all the objects to which the faulted object
    relates are released. If any of the relationships have changed and the context
    is then saved, your faulted object is out of sync with its relationships and you
    have created data integrity issues in your persistent store.


    **NOTE:** Because faulting an object by calling `refreshObject:mergeChanges:NO`
    releases relationships, you can use this to prune your object graph in memory.
    Faulting a movie in the PerformanceTuning application, for example, would release
    its 200 related actors and 200 related studios.


    Passing `YES` to `mergeChanges:` doesn''t fault the object. Instead, it reloads
    all the object''s persistent data from the persistent store (or the last cached
    state) and then reapplies any changes that existed before the call to `refreshObject:`
    that have not yet been saved.


    When you turn a managed object into a fault, Core Data sends the following two
    messages to the managed object:


    * `willTurnIntoFault:` before the object faults

    * `didTurnIntoFault:` after the object faults


    If you have implemented custom classes for your managed objects, you can implement
    either or both of these methods in your classes to perform some action on the
    object. Suppose, for example, that your custom managed object performs an expensive
    calculation on some persistent values and caches the result, and you want to nullify
    that cached result if the values it depends on aren''t present. You could nullify
    the calculation in `didTurnIntoFault:`.'
