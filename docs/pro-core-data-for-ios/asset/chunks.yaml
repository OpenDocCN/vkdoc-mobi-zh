  raw: '### Caching


    Regardless of target language or platform, most data persistence frameworks and
    libraries have an internal caching mechanism. Properly implemented caches provide
    opportunities for significant performance gains, especially for applications that
    need to retrieve the same data repeatedly. Core Data is no exception. The `NSManagedObjectContext`
    class serves as a built-in cache for the Core Data framework. When you retrieve
    an object from the backing persistent store, the context keeps a reference to
    it to track its changes. If you retrieve the object again, the context can give
    the caller the same object reference as it did in the first invocation.


    The obvious trade-off that results from the use of caching is that, while improving
    performance, caching uses more memory. If no cache management scheme were in place
    to limit the memory usage of the cache, the cache could fill up with objects until
    the whole system collapses from lack of memory. To manage memory, the Core Data
    context has weak references to the managed objects it pulls out of the persistent
    store. This means that if the retain count of a managed object reaches zero because
    no other object has a reference to it, the managed object will be discarded. The
    exception to this rule is if the object has been modified in any way. In this
    case, the context keeps a strong reference (that is, sends a retain signal to
    the managed object) and keeps it until the context is either committed or rolled
    back, at which point it becomes a weak reference again.


    **NOTE:** The default retain behavior can be changed by passing `YES` to the `setRetainsRegisteredObjects`:
    of `NSManagedObjectContext`. By passing `YES`, the context will retain all registered
    objects. The default behavior retains registered objects only when they are inserted,
    updated, deleted, or locked.


    In this section, you will examine the difference between fetching objects from
    the persistent store or from the cache. You will build a test that does the following:


    1.  Resets the managed object context to flush the cache.

    2.  Retrieves all movies.

    3.  Retrieves all actors for each movie.

    4.  Displays the time it took to perform both retrievals.

    5.  Retrieves all movies (this time the objects will be cached).

    6.  Retrieves all actors for each movie.

    7.  Displays the time it took to perform both retrievals.


    To start, create a class called `CacheTest`, and add it to the Tests group in
    Xcode. Make sure that `CacheTest` implements the `PerformanceTest` protocol. The
    following code is for `CacheTest.h`:


    `#import <Foundation/Foundation.h>`

    **`#import "PerformanceTest.h"`**


    `@interface CacheTest : NSObject <PerformanceTest>`


    `@end`


    The following code is for `CacheTest.m:`


    `#import "CacheTest.h"`

    **`#import "Actor.h"`**


    `@implementation CacheTest`


    **`- (NSString *)name {`**

    **`return @"Cache Test";`**

    **`}`**


    **`- (void)loadDataFromContext:(NSManagedObjectContext *)context {`**

    **`// Fetch all the movies and all actors`**

    **`NSFetchRequest *request = [[NSFetchRequest alloc] init];`**

    **`[request setEntity:[NSEntityDescription entityForName:@"Movie"`![images](images/U002.jpg)**

    **`inManagedObjectContext:context]];`**

    **`NSArray *results = [context executeFetchRequest:request error:nil];`**


    **`// Fetch all the actors`**

    **`for (NSManagedObject *movie in results) {    `**

    **`NSSet *actors = [movie valueForKey:@"actors"];`**

    **`for (Actor *actor in actors) {`**

    **`[actor valueForKey:@"name"];`**

    **`}`**


    **`}`**

    **`}`**


    **`// Pull all the movies and verify that each of their actor objects are pointing
    to the same actors`**

    **`- (NSString *)runWithContext:(NSManagedObjectContext *)context {`**

    **`NSMutableString *result = [NSMutableString string];`**


    **`[context reset];  // Clear all potentially cached objects`**


    **`NSDate *startTest1 = [NSDate date];`**

    **`[self loadDataFromContext:context];`**

    **`NSDate *endTest1 = [NSDate date];`**

    **`NSTimeInterval test1 = [endTest1 timeIntervalSinceDate:startTest1];`**

    **`[result appendFormat:@"Without cache: %.2f s\n", test1];`**


    **`NSDate *startTest2 = [NSDate date];`**

    **`[self loadDataFromContext:context];`**

    **`NSDate *endTest2 = [NSDate date];`**


    **`NSTimeInterval test2 = [endTest2 timeIntervalSinceDate:startTest2];`**

    **`[result appendFormat:@"With cache: %.2f s\n", test2];`**


    **`return result;`**

    **`}`**


    `@end`


    Let''s examine the `runWithContext:` method. It does the same thing twice: fetch
    all the movies and all the actors. The first time, the cache is explicitly cleared
    using `[context reset]`. The second time, all the objects will be in the cache,
    and therefore the data will come back much faster. The `loadDataFromContext:`
    method is invoked to retrieve all the movies and then pulls every actor for each
    movie. You explicitly get the name property of the actors in order to force Core
    Data to load the property, firing a fault if necessary.


    Add an instance of `CacheTest` to the `tests` array, build the application, and
    run the Cache Test test. The output of the application will look similar to [Figure
    7–8](#Chapter07.html#fig_7_8), with the cached version running significantly faster
    than the version without a cache.


    ![images](images/0708.jpg)


    **Figure 7–8.** *Measuring the difference between loading cached and noncached
    objects*


    If you reset the cache between the first and second tests using `[context reset]`,
    then the time to execute the second test would be about the same as the first
    test. This is because the objects would all have to be retrieved from the persistent
    store again.


    ### Expiring


    Any time an application uses a cache, the question of cache expiration arises:
    when should objects in the cache expire and be reloaded from the persistent store?
    The difficulty in determining the expiration interval comes from juggling the
    performance gain obtained by caching objects for long intervals versus the extra
    memory consumption that entails and the potential staleness of the cached data.
    This section examines the trade-offs of the two possibilities for expiring the
    cache and freeing some memory.


    #### Memory Consumption


    As more and more objects are put into the cache, the memory usage increases. Even
    if a managed object is entirely faulted, a quick call to `NSLog(@"%d", class_getInstanceSize(NSManagedObject.class))`
    will show that the allocated size of an unpopulated managed object is 48 bytes.
    This is because it holds references (that is, 4-byte pointers) to other objects
    such as the entity description, the context, and the object ID. Even without any
    actual data, a managed object occupies a minimum of 48 bytes. This is a best-case
    scenario because this approximation does not include the memory occupied by the
    unique object ID, which is populated. This means that if you have 100,000 managed
    objects in the cache, even faulted, you are using at least 5MB of memory for things
    other than your data. If you start fetching data without faulting, you can run
    into memory issues quickly.


    The trick to this balancing act is to remove data from the cache when it''s no
    longer needed or if you can afford to pay the price of retrieving the objects
    from the persistent store when you need them again.'
  trans: "\n### 缓存\n\n无论目标语言或平台如何，大多数数据持久化框架和库都具备内部缓存机制。合理实现的缓存能显著提升性能，尤其对于需要重复检索相同数据的应用程序而言。`Core\
    \ Data` 也不例外。`NSManagedObjectContext` 类充当了 `Core Data` 框架的内置缓存。当你从底层持久化存储中检索对象时，上下文会保留对该对象的引用以跟踪其变化。如果再次检索该对象，上下文可以向调用方返回与首次调用时相同的对象引用。\n\
    \n使用缓存带来的明显权衡是：在提升性能的同时，缓存会消耗更多内存。如果没有相应的缓存管理方案来限制缓存的内存使用，缓存中的对象会不断积累，最终因内存不足导致整个系统崩溃。为了管理内存，`Core\
    \ Data` 上下文对从持久化存储中取出的托管对象持有弱引用。这意味着，如果某个托管对象的引用计数因没有其他对象引用它而降至零，该对象将被释放。此规则的例外情况是对象有任何形式的修改。在这种情况下，上下文会持有强引用（即向托管对象发送\
    \ `retain` 信号），并保持该状态直到上下文提交或回滚，此时它才会重新变为弱引用。\n\n**注意：** 可以通过向 `NSManagedObjectContext`\
    \ 的 `setRetainsRegisteredObjects:` 方法传递 `YES` 来更改默认的保留行为。传递 `YES` 后，上下文将保留所有已注册的对象。默认行为仅在对象被插入、更新、删除或锁定时才保留已注册对象。\n\
    \n在本节中，你将对比从持久化存储获取对象与从缓存获取对象的差异。你将构建一个测试，执行以下操作：\n\n1. 重置托管对象上下文以清空缓存。\n2. 检索所有电影。\n\
    3. 检索每部电影的所有演员。\n4. 显示完成两次检索所需的时间。\n5. 再次检索所有电影（此时对象将被缓存）。\n6. 再次检索每部电影的所有演员。\n\
    7. 显示完成两次检索所需的时间。\n\n首先，创建一个名为 `CacheTest` 的类，并将其添加到 Xcode 的 Tests 组中。确保 `CacheTest`\
    \ 实现了 `PerformanceTest` 协议。以下是 `CacheTest.h` 的代码：\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"PerformanceTest.h\"\n\n@interface CacheTest : NSObject <PerformanceTest>\n\
    \n@end\n```\n\n以下是 `CacheTest.m` 的代码：\n\n```\n#import \"CacheTest.h\"\n#import\
    \ \"Actor.h\"\n\n@implementation CacheTest\n\n- (NSString *)name {\n    return\
    \ @\"Cache Test\";\n}\n\n- (void)loadDataFromContext:(NSManagedObjectContext *)context\
    \ {\n    // 检索所有电影和所有演员\n    NSFetchRequest *request = [[NSFetchRequest alloc]\
    \ init];\n    [request setEntity:[NSEntityDescription entityForName:@\"Movie\"\
    \n                                   inManagedObjectContext:context]];\n    NSArray\
    \ *results = [context executeFetchRequest:request error:nil];\n\n    // 检索所有演员\n\
    \    for (NSManagedObject *movie in results) {\n        NSSet *actors = [movie\
    \ valueForKey:@\"actors\"];\n        for (Actor *actor in actors) {\n        \
    \    [actor valueForKey:@\"name\"];\n        }\n    }\n}\n\n// 提取所有电影，并验证每部电影的演员对象是否指向相同的演员对象\n\
    - (NSString *)runWithContext:(NSManagedObjectContext *)context {\n    NSMutableString\
    \ *result = [NSMutableString string];\n\n    [context reset];  // 清除所有可能被缓存的对象\n\
    \n    NSDate *startTest1 = [NSDate date];\n    [self loadDataFromContext:context];\n\
    \    NSDate *endTest1 = [NSDate date];\n    NSTimeInterval test1 = [endTest1 timeIntervalSinceDate:startTest1];\n\
    \    [result appendFormat:@\"Without cache: %.2f s\\n\", test1];\n\n    NSDate\
    \ *startTest2 = [NSDate date];\n    [self loadDataFromContext:context];\n    NSDate\
    \ *endTest2 = [NSDate date];\n\n    NSTimeInterval test2 = [endTest2 timeIntervalSinceDate:startTest2];\n\
    \    [result appendFormat:@\"With cache: %.2f s\\n\", test2];\n\n    return result;\n\
    }\n\n@end\n```\n\n让我们分析 `runWithContext:` 方法。它重复执行两次相同的操作：检索所有电影和所有演员。第一次，通过 `[context\
    \ reset]` 显式清空缓存。第二次，所有对象都位于缓存中，因此数据返回速度会快得多。`loadDataFromContext:` 方法被调用来检索所有电影，然后拉取每部电影的每个演员。你显式获取演员的\
    \ `name` 属性，以强制 `Core Data` 加载该属性，必要时触发错误（fault）。\n\n将一个 `CacheTest` 实例添加到 `tests`\
    \ 数组中，构建应用，并运行缓存测试。应用的输出将类似于图 7–8，其中使用缓存的版本比不使用缓存的版本运行速度显著更快。\n\n![images](img/0708.jpg)\n\
    \n**图 7–8.** *测量加载缓存对象与非缓存对象的时间差异*\n\n如果在第一次和第二次测试之间使用 `[context reset]` 重置缓存，那么第二次测试的执行时间将与第一次大致相同。这是因为所有对象都必须再次从持久化存储中检索。\n\
    \n### 过期\n\n任何应用程序在使用缓存时，都会面临缓存过期的问题：缓存中的对象应在何时过期并从持久化存储重新加载？确定过期间隔的难点在于，需要权衡长期缓存对象带来的性能提升，与由此产生的额外内存消耗以及缓存数据可能过时的问题。本节将探讨两种缓存过期和释放内存策略的取舍。\n\
    \n#### 内存消耗\n\n随着越来越多的对象被放入缓存，内存使用量也随之增加。即使托管对象完全处于错误状态，快速调用 `NSLog(@\"%d\", class_getInstanceSize(NSManagedObject.class))`\
    \ 也会显示，一个未填充数据的托管对象分配大小为 48 字节。这是因为它持有对其他对象（如实体描述、上下文和对象 ID）的引用（即 4 字节指针）。即使没有任何实际数据，托管对象也至少占用\
    \ 48 字节。这是最佳情况，因为该估算不包括已填充数据的唯一对象 ID 所占用的内存。这意味着，如果缓存中有 10 万个托管对象，即使处于错误状态，你也会为数据之外的内容消耗至少\
    \ 5MB 内存。如果开始加载无错误的数据，你很快就会遇到内存问题。\n\n这种平衡策略的关键在于：当不再需要数据时，或者在你能承受再次从持久化存储检索对象的代价时，及时从缓存中移除数据。\n"
- fmt: '### Brute-Force Cache Expiration


    If you don''t care about losing all the managed objects, you can reset the context
    entirely. This is rarely the option you want to choose, but it is extremely efficient.
    `NSManagedObjectContext` has a `reset` method that will wipe the cache out in
    one swoop. Once you call `[managedObjectContext reset]`, your memory footprint
    will be dramatically smaller, but you will have to pay the price of going to the
    persistent store if you want to retrieve any objects again. Please also understand
    that, as with any other kind of mass destruction mechanism, resetting the cache
    in the middle of a running application has serious side effects and collateral
    damage. For example, any managed object that you were using prior to the reset
    is now invalid. If you try to do anything with them, your efforts will be met
    with runtime errors.


    ### Expiring the Cache Through Faulting


    Faulting is a more subtle option, as the section on faulting explains. You can
    fault any managed object by calling `[context refreshObject:managedObject mergeChanges:NO]`.
    After this method call, the object is faulted, and therefore the memory it occupies
    in the cache is minimized, although not zero. A non-negligible advantage of this
    strategy, however, is that when the managed object is turned into a fault, any
    managed object it has a reference to (through relationships) is released. If those
    related managed objects have no other references to them, then they will be removed
    from the cache, further reducing the memory footprint. Faulting managed objects
    in this manner helps prune the entire object graph.


    ## Uniquing


    Both business and technology like to turn nouns into verbs, and the pseudoword
    *uniquing* testifies to this weakness. It attempts to define the action of making
    something unique or ensuring uniqueness. Usage suggests not only that Apple didn''t
    invent the term but also that it predates Core Data. Apple embraces the term in
    its Core Data documentation, however, raising fears that one day Apple will call
    the action of listening to music *iPodding*.


    The technology industry uses the term *uniquing* in conjunction with memory objects
    versus their representation in a data store. In “Core Java Data Objects” (Prentice
    Hall, 2003), it says that uniquing “ensures that no matter how many times a persistent
    object is found, it has only one in-memory representation. All references to the
    same persistent object within the scope of the same `PersistenceManager` instance
    reference the same in-memory object.”


    Martin Fowler, in “Patterns of Enterprise Application Architecture” (Addison-Wesley
    Professional, 2005), gives it a less colorful, more descriptive, and more English-compliant
    name: *identity map*. He explains that an identity map “ensures that each object
    gets loaded only once by keeping every loaded object in a map.” Whatever you call
    it or however you describe it, *uniquing* means that Core Data conserves memory
    use by ensuring the uniqueness of each object in memory and that no two memory
    instances of an object point to the same instance in the persistent store.


    Consider, for example, the Shapes application from [Chapter 5](#Chapter05.html#ch5).
    Each `Shape` instance has a relationship with two `Canvas` instances. When you
    run the Shapes application and reference the two `Canvas` instances through any
    `Shape` instances, you always get the same two `Canvas` instances, as [Figure
    7–9](#Chapter07.html#fig_7_9) depicts. If Core Data didn''t use uniquing, you
    could find yourself in the scenario shown in [Figure 7–10](#Chapter07.html#fig_7_10),
    where each `Canvas` instance is represented in memory several times, once for
    each `Shape`, and each `Shape` instance is represented in memory several times,
    once for each `Canvas`.


    ![images](images/0709.jpg)


    **Figure 7–9.** *Uniquing shapes and canvases*


    ![images](images/0710.jpg)


    **Figure 7–10.** *Nonuniquing shapes and canvases*


    Uniquing not only conserves memory but also eliminates data inconsistency issues.
    Think what could happen, for example, if Core Data didn''t employ uniquing and
    the Shapes application had two memory instances of each shape (one for each canvas).
    Suppose that `Canvas 1` changed the color of a shape to mauve and `Canvas 2` changed
    the color of the shape to lime green. What color should the shape display? When
    the application stores the shape in the persistent store, what color should it
    save? You can imagine the data inconsistency bugs you''d have to track down if
    Core Data maintained more than one instance of each data object in memory.


    Note that uniquing occurs within a single managed object context only, not across
    managed object contexts. The good news, however, is that Core Data''s default
    behavior, which you can''t change, is to unique. Uniquing comes free with Core
    Data.


    To test uniquing, you''ll create a test that fetches all the movies from the persistent
    store and then compares each of their related actors to each other movie''s related
    actors. For the test to pass, the code must verify that only 200 `Actor` instances
    live in memory and that each movie points to the same 200 actors. To begin, create
    a new class called `UniquingTest`, which should implement the `PerformanceTest`
    protocol, like so:


    ```

    #import <Foundation/Foundation.h>

    #import "PerformanceTest.h"


    @interface UniquingTest : NSObject <PerformanceTest>


    @end

    ```'
