    the in-memory persistent store. Let''s take a look at how to switch the store
    type before elaborating on why you would ever want to use this type of store.


    Changing the store type Core Data uses for your application is as simple as specifying
    the new type when creating the persistent store coordinator in the application
    delegate. The code for the `persistentStoreCoordinator:` method in `League_ManagerAppDelegate.m`
    now looks like that in [Listing 3–5](#Chapter03.html#list_3_5), with the updated
    code in bold.


    **Listing 3–5.** *The `persistentStoreCoordinator:` Method in `League_ManagerAppDelegate.m`*


    `- (NSPersistentStoreCoordinator *)persistentStoreCoordinator {`

    `  if (__persistentStoreCoordinator != nil) {`

    `    return __persistentStoreCoordinator;`

    `  }`


    **`//  NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@"League_Manager.sqlite"];`**


    `  NSError *error = nil;`

    `  __persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self
    managedObjectModel]];`

    `  if (![__persistentStoreCoordinator addPersistentStoreWithType:NSInMemoryStoreType
    configuration:nil URL:nil options:nil error:&error]) {`

    `    NSLog(@"Unresolved error %@, %@", error, [error userInfo]);`

    `    abort();`

    `  }`


    `  return __persistentStoreCoordinator;`

    `}`


    The data store has been switched to in-memory. The first thing to notice after
    launching the application again is that any data you previously had in your data
    store is gone. This happened because you switched the data store and didn''t try
