    The generated code used the name `Event`, so find the line in `fetchedResultsController`
    that looks like this


    `NSEntityDescription *entity = [NSEntityDescription entityForName:@"Event"`![images](images/U002.jpg)

    `inManagedObjectContext:self.managedObjectContext];`


    and change it to this


    `NSEntityDescription *entity = [NSEntityDescription entityForName:@"Team"`![images](images/U002.jpg)

    `inManagedObjectContext:self.managedObjectContext];`


    Also, you''ll notice another vestige of the generated model in the `fetchedResultsController`
    method: a reference to the attribute called `timeStamp`, used for sorting the
