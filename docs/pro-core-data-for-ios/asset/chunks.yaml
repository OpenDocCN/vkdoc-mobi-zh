    \ sharedApplication] delegate];\n      self.managedObjectContext = [delegate managedObjectContext];\n\
    \    }\n    return self;\n}\n```\n\n现在，可以构建并运行应用程序了。如果点击\"Players\"标签页，应该会看到持久化存储中的所有球员，按球队名称分组到各个部分（参见[图\
    \ 9-5](#Chapter09.html#fig_9_5)）。\n\n![images](images/0905.jpg)\n\n**图 9-5.**\
    \ *League Manager 显示球员列表*\n\n## 实现`NSFetchedResultsControllerDelegate`协议\n\n`NSFetchedResultsControllerDelegate`协议声明了五个可选方法，允许修改行为或响应`NSFetchedResultsController`实例的变化。其中四个方法处理底层数据的变化，另一个处理索引表中所用索引字符串。先将`AllPlayerViewController`设为其`NSFetchedResultsController`的委托，首先修改`AllPlayerViewController.h`，声明`AllPlayerViewController`实现了`NSFetchedResultsControllerDelegate`协议，如下所示：\n\
    \n```objc\n@interface AllPlayerViewController : UITableViewController\n<NSFetchedResultsControllerDelegate>\n\
    ```\n\n然后，回到`fetchedResultsController:`访问器，将`fetchedResultsController`的委托从`nil`改为`self`：\n\
    \n```objc\nNSFetchedResultsController *aFetchedResultsController = [[NSFetchedResultsController\
    \ alloc] initWithFetchRequest:fetchRequest managedObjectContext:self.managedObjectContext\
    \ sectionNameKeyPath:@\"team.name\" cacheName:@\"AllPlayer\"];\naFetchedResultsController.delegate\
    \ = self;\nself.fetchedResultsController = aFetchedResultsController;\n```\n\n\
    现在`AllPlayerViewController`实例是`fetchedResultsController`成员的委托，可以在`AllPlayerViewController`类中实现五个委托方法以更改某些行为。先来看处理索引的方法。\n\
    \n### 为表格添加索引\n\niOS 表格视图可以在表格右侧显示一个索引。点击索引可以直接跳转到表格的相应位置，无需滚动所有行。例如，联系人应用在\"\
    所有联系人\"视图右侧显示了字母表（加上搜索图标和井号）。点击该列表中的任意字母，可以直接跳转到以该字母开头的联系人部分。iOS 将这个字母列表称为*索引*，类似于书籍末尾的索引，可以查找并跳转到书中提及你要找内容的特定页面。\n\
    \n要使表格视图显示索引，需要实现`UITableViewDataSource`协议中的两个方法。第一个是`sectionIndexTitlesForTableView:`，返回一个包含表格应显示的所有索引标题的`NSArray`。在联系人应用中，这是字母\
    \ A-Z。第二个是`sectionForSectionIndexTitle:atIndex:`，返回与指定部分索引对应的部分编号；需要根据索引的标题和索引来确定返回哪个部分。当用户点击表格右侧的索引时，会调用第二个方法，以便应用程序确定在表格中跳转到何处。\n\
    \n`NSFetchedResultsController`提供了帮助实现这两个方法的方法：一个返回所有部分索引标题，称为`sectionIndexTitles:`；另一个返回指定索引标题和索引对应的部分编号，称为`sectionForSectionIndexTitle:atIndex:`。将使用这些方法在球员视图中实现索引。将以下代码添加到`AllPlayerViewController.m`中：\n\
    \n```objc\n- (NSArray *)sectionIndexTitlesForTableView:(UITableView *)tableView\
    \ {\n    return [self.fetchedResultsController sectionIndexTitles];\n}\n\n- (NSInteger)tableView:(UITableView\
    \ *)tableView sectionForSectionIndexTitle:(NSString *)title atIndex:(NSInteger)index\
    \ {\n    return [self.fetchedResultsController sectionForSectionIndexTitle:title\
    \ atIndex:index];\n}\n```\n\n再次运行应用程序，查看表格右侧的索引，如图 [9-6](#Chapter09.html#fig_9_6)\
    \ 所示。右侧边缘的字母 B-C-L-M-O 代表索引。点击底部的 O 可以直接滚动到\"O\"部分，如图 [9-7](#Chapter09.html#fig_9_7)\
    \ 所示。\n\n![images](images/0906.jpg)\n\n**图 9-6.** *显示索引的球员视图*\n\n![images](images/0907.jpg)\n\
    \n**图 9-7.** *点击索引中的 O 后的球员视图*\n\n正如刚才所见，`NSFetchedResultsController`实例默认只使用部分名称的首字母作为索引标题。如果想要显示部分名称的前三个字母，而不是仅显示首字母，该怎么办？`NSFetchedResultsControllerDelegate`协议有一个在\
    \ iOS 4.0 中添加的方法`controller:sectionIndexTitleForSectionName:`，它允许自定义部分在索引中的显示内容。在\
    \ iOS 4.0 之前，要自定义表格索引的显示，必须创建自己的`NSFetchedResultsController`子类并重写该方法。使用委托方法是一种更友好的方式。\n\
    \n当调用`controller:sectionIndexTitleForSectionName:`方法时，它会收到一个`NSString`类型的部分名称，并返回要显示的索引（也是`NSString`类型）。将以下代码添加到`AllPlayerViewController`中，以使用部分名称的前三个字母作为索引标题：\n\
    \n```objc\n- (NSString *)controller:(NSFetchedResultsController *)controller sectionIndexTitleForSectionName:(NSString\
    \ *)sectionName {\n    return [sectionName substringToIndex:MIN([sectionName length],\
    \ 3)];\n}\n```\n\n然而，iOS 似乎会积极缓存索引名称，甚至跨应用程序调用。如果构建并运行应用程序，可能仍然会看到字母索引名称，因为索引名称是从缓存中读取的，而刚刚编写的方法没有被调用。要清除缓存并修复此问题，调用`NSFetchedResultsController`的静态方法`deleteCacheWithName:`，传入缓存名称。在`fetchedResultsController:`访问器中获取结果之前添加此调用，如下所示：\n\
    \n```objc\n[NSFetchedResultsController deleteCacheWithName:@\"AllPlayer\"];\n\n\
    // Fetch the data\nNSError *error = nil;\nif (![self.fetchedResultsController\
    \ performFetch:&error]) {\n    NSLog(@\"Unresolved error %@, %@\", error, [error\
    \ userInfo]);\n    abort();\n}\n```\n\n构建并运行应用程序，应该会看到索引名称已更新为球队名称的前三个字母，如图 [9-8](#Chapter09.html#fig_9_8)\
    \ 所示。\n\n![images](images/0908.jpg)\n\n**图 9-8.** *显示三个字母索引名称的球员视图*"
