- fmt: "### How the Classes Interact\n\nYou should now have a good understanding of\
    \ the classes involved in interacting with Core Data and what is happening under\
    \ the hood. This section expands on the `OrgChart` application created in the\
    \ previous section to show some examples of interactions among Core Data classes.\
    \ Like the previous section, this chapter maintains its focus at a relatively\
    \ basic level. The goal for this chapter is to show how the classes play together.\
    \ The rest of the book consists of chapters that take each concept (data manipulation,\
    \ custom persistent store, performance enhancements, and so on) to much deeper\
    \ levels.\n\nThe data model created in the previous section should look like the\
    \ one in [Figure 2–14](#Chapter02.html#fig_2_14).\n\n![images](images/0214.jpg)\n\
    \n**Figure 2–14.** *The Organization data model*\n\nBoth the `Organization` and\
    \ `Person` entities use an attribute of type `Integer 16` to serve as unique identifiers\
    \ for each entity. Most programmers reading this have probably already thought\
    \ about autoincrement and have been clicking around the Xcode user interface to\
    \ find out by themselves how to enable autoincrement for the identifier attributes.\
    \ If you're one of these programmers and you're back to reading this chapter,\
    \ you probably became frustrated and have given up looking. The reason you couldn't\
    \ find autoincrement is because it's not there. Core Data manages an object graph\
    \ using real object references. It has no need for a unique autoincrement identifier\
    \ that can be used as a primary key in the same sense it would be used in a relational\
    \ database. If the persistent store happens to be a relational database like SQLite,\
    \ the framework will probably use some autoincrement identifiers as primary keys.\
    \ Regardless, you, as a Core Data user, should not have to worry about that; it's\
    \ an implementation detail. We have purposely introduced the notion of identifiers\
    \ in this example for two reasons:\n\n*   To raise the question of autoincrement.\n\
    *   To show examples of how to manage numeric values with Core Data.\n\nThe person\
    \ identifier is similar in meaning to a Social Security number. It isn't meant\
    \ to autoincrement because it is an identifier computed outside the data store.\
    \ In the `Organization` example, you simply derive the ID from an object hash.\
    \ Although this doesn't guarantee uniqueness, it serves this application's purpose\
    \ and is simple to implement.\n\n**NOTE:** As a programmer, you should be careful\
    \ not to focus too much on what you already know about databases. Core Data isn't\
    \ a database; it's an object graph persistence framework. Its behavior is closer\
    \ to an object-oriented database than a traditional relational database.\n\n[Listing\
    \ 2–1](#Chapter02.html#list_2_1) shows the header file for the application delegate\
    \ class, `OrgChartAppDelegate.h`. You can see the three Core Data–related properties:\n\
    \n*   `NSManagedObjectContext *managedObjectContext`\n*   `NSManagedObjectModel\
    \ *managedObjectModel`\n*   `NSPersistentStoreCoordinator *persistentStoreCoordinator`\n\
    \nYou also see the declaration for a method to return the application's document\
    \ directory, which is where the persistent store will live, and another declaration\
    \ for a method, `saveContext:`, to save the managed object context. The implementation\
    \ file, `OrgChartAppDelegate.m`, will define methods for each of these.\n\n**Listing\
    \ 2–1.** *`OrgChartAppDelegate.h`*\n\n```\n#import <UIKit/UIKit.h>\n#import <CoreData/CoreData.h>\n\
    \n@class OrgChartViewController;\n\n@interface OrgChartAppDelegate : UIResponder\
    \ <UIApplicationDelegate>\n\n@property (strong, nonatomic) UIWindow *window;\n\
    @property (strong, nonatomic) OrgChartViewController *viewController;\n@property\
    \ (readonly, strong, nonatomic) NSManagedObjectContext *managedObjectContext;\n\
    @property (readonly, strong, nonatomic) NSManagedObjectModel *managedObjectModel;\n\
    @property (readonly, strong, nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n\
    \n- (void)saveContext;\n- (NSURL *)applicationDocumentsDirectory;\n\n@end\n```\n\
    \nIn `OrgChartAppDelegate.m`, add `@synthesize` lines for the three Core Data–related\
    \ properties from `OrgChartAppDelegate.h`, like this:\n\n```\n@synthesize managedObjectContext\
    \ = __managedObjectContext;\n@synthesize managedObjectModel = __managedObjectModel;\n\
    @synthesize persistentStoreCoordinator = __persistentStoreCoordinator;\n```\n\n\
    You then write code for the accessors for the three Core Data–related properties.\
    \ Each accessor first determines whether the object it's responsible for has been\
    \ created. If it has, the accessor returns the object. If not, the accessor creates\
    \ the object using the appropriate Core Data formula, creating any of the other\
    \ member objects it requires, and returns it. The code in [Listing 2–2](#Chapter02.html#list_2_2)\
    \ to add to `OrgChartAppDelegate.m` should look familiar.\n\n**Listing 2–2.**\
    \ *Adding the Accessors for the Three Core Data–Related Properties*\n\n```\n-\
    \ (void)saveContext\n{\n    NSError *error = nil;\n    NSManagedObjectContext\
    \ *managedObjectContext = self.managedObjectContext;\n    if (managedObjectContext\
    \ != nil)\n    {\n        if ([managedObjectContext hasChanges] && ![managedObjectContext\
    \ save:&error])\n        {\n            NSLog(@\"Unresolved error %@, %@\", error,\
    \ [error userInfo]);\n            abort();\n        }\n    }\n}\n\n#pragma mark\
    \ - Core Data stack\n\n/**\n Returns the managed object context for the application.\n\
    \ If the context doesn't already exist, it is created and bound to the persistent\
    \ store coordinator for the application.\n */\n- (NSManagedObjectContext *)managedObjectContext\n\
    {\n    if (__managedObjectContext != nil)\n    {\n        return __managedObjectContext;\n\
    \    }\n\n    NSPersistentStoreCoordinator *coordinator = [self persistentStoreCoordinator];\n\
    \    if (coordinator != nil)\n    {\n        __managedObjectContext = [[NSManagedObjectContext\
    \ alloc] init];\n        [__managedObjectContext setPersistentStoreCoordinator:coordinator];\n\
    \    }\n    return __managedObjectContext;\n}\n\n/**\n Returns the managed object\
    \ model for the application.\n If the model doesn't already exist, it is created\
    \ from the application's model.\n */\n- (NSManagedObjectModel *)managedObjectModel\n\
    {\n    if (__managedObjectModel != nil)\n    {\n        return __managedObjectModel;\n\
    \    }\n    NSURL *modelURL = [[NSBundle mainBundle] URLForResource:@\"OrgChart\"\
    \ withExtension:@\"momd\"];\n    __managedObjectModel = [[NSManagedObjectModel\
    \ alloc] initWithContentsOfURL:modelURL];\n    return __managedObjectModel;\n\
    }\n\n/**\n Returns the persistent store coordinator for the application.\n If\
    \ the coordinator doesn't already exist, it is created and the application's store\
    \ added to it.\n */\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\n\
    {\n    if (__persistentStoreCoordinator != nil)\n    {\n        return __persistentStoreCoordinator;\n\
    \    }\n\n    NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
    OrgChart.sqlite\"];\n\n    NSError *error = nil;\n    __persistentStoreCoordinator\
    \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
    \    if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
    \ configuration:nil URL:storeURL options:nil error:&error])\n    {\n        NSLog(@\"\
    Unresolved error %@, %@\", error, [error userInfo]);\n        abort();\n    }\n\
    \n    return __persistentStoreCoordinator;\n}\n\n#pragma mark - Application's\
    \ Documents directory\n```"
  raw: '### How the Classes Interact


    You should now have a good understanding of the classes involved in interacting
    with Core Data and what is happening under the hood. This section expands on the
    OrgChart application created in the previous section to show some examples of
    interactions among Core Data classes. Like the previous section, this chapter
    maintains its focus at a relatively basic level. The goal for this chapter is
    to show how the classes play together. The rest of the book consists of chapters
    that take each concept (data manipulation, custom persistent store, performance
    enhancements, and so on) to much deeper levels.


    The data model created in the previous section should look like the one in [Figure
    2–14](#Chapter02.html#fig_2_14).


    ![images](images/0214.jpg)


    **Figure 2–14.** *The Organization data model*


    Both the `Organization` and `Person` entities use an attribute of type `Integer
    16` to serve as unique identifiers for each entity. Most programmers reading this
    have probably already thought about autoincrement and have been clicking around
    the Xcode user interface to find out by themselves how to enable autoincrement
    for the identifier attributes. If you''re one of these programmers and you''re
    back to reading this chapter, you probably became frustrated and have given up
    looking. The reason you couldn''t find autoincrement is because it''s not there.
    Core Data manages an object graph using real object references. It has no need
    for a unique autoincrement identifier that can be used as a primary key in the
    same sense it would be used in a relational database. If the persistent store
    happens to be a relational database like SQLite, the framework will probably use
    some autoincrement identifiers as primary keys. Regardless, you, as a Core Data
    user, should not have to worry about that; it''s an implementation detail. We
    have purposely introduced the notion of identifiers in this example for two reasons:


    *   To raise the question of autoincrement.

    *   To show examples of how to manage numeric values with Core Data.


    The person identifier is similar in meaning to a Social Security number. It isn''t
    meant to autoincrement because it is an identifier computed outside the data store.
    In the `Organization` example, you simply derive the ID from an object hash. Although
    this doesn''t guarantee uniqueness, it serves this application''s purpose and
    is simple to implement.


    **NOTE:**As a programmer, you should be careful not to focus too much on what
    you already know about databases. Core Data isn''t a database; it''s an object
    graph persistence framework. Its behavior is closer to an object-oriented database
    than a traditional relational database.


    [Listing 2–1](#Chapter02.html#list_2_1) shows the header file for the application
    delegate class, `OrgChartAppDelegate.h`. You can see the three Core Data–related
    properties:


    *   `NSManagedObjectContext *managedObjectContext`

    *   `NSManagedObjectModel *managedObjectModel`

    *   `NSPersistentStoreCoordinator *persistentStoreCoordinator`


    You also see the declaration for a method to return the application''s document
    directory, which is where the persistent store will live, and another declaration
    for a method, `saveContext:`, to save the managed object context. The implementation
    file, `OrgChartAppDelegate.m`, will define methods for each of these.


    **Listing 2–1.** *`OrgChartAppDelegate.h`*


    `#import <UIKit/UIKit.h>`

    **`#import <CoreData/CoreData.h>`**


