  trans: '

    ### 使用 Xcode 数据模型器


    有些开发者只是被动接受给予他们的工具。另一些开发者则只在认为现有工具不够好时才去构建工具。然而，还有一小部分人固执地坚持要自行构建所有工具。我们倾向于成为最后一类开发者，我们因使用自己构建的工具而自豪，同事们也因此将我们视为“自造工具”的程序员。我们以构建工具为荣，甚至在广播了这些工具节省了多少时间后还会举行庆祝活动。我们从不统计构建工具所花费的时间，而是将其归入“娱乐时间”，因为我们享受构建工具的过程。然而，令人惊讶的是，我们从未想过要为
    Core Data 编写一个数据模型器工具，这很可能是因为 Xcode 在数据建模方面已经做得相当不错了。它绝非完美无瑕，但确实能胜任工作，并且与开发环境完美集成，即便是我们自行构建的工具，也永远无法超越这一特性。事实上，Xcode
    自带了一个内置的数据建模工具，可以让你以可视化的方式轻松创建数据模型，而无需手动编写 `NSManagedObjectModel`。在前几章中，你已经多次瞥见过这个工具。在本节中，我们将花较少的时间讨论
    Core Data 的工作原理，而花更多的时间来研究这个工具及其使用方法。


    在本节中，你不会编写任何可运行的代码。相反，你将专注于数据模型器的用户界面。要在 Xcode 项目中添加一个数据模型，请从菜单中选择 **File ![image](img/U001.jpg)
    New ![image](img/U001.jpg) New File**。在左侧的 iOS 部分中，选择 Core Data 子部分。它会显示三种文件类型：Data
    Model、Mapping Model 和 `NSManagedObject` 子类。Mapping Model 用于协助跨数据模型版本的数据迁移，这将在第
    8 章中介绍；而 `NSManagedObject` 子类则从模型中的实体生成类，这将在第 5 章中介绍。选择 Data Model，如图 4–1 所示，然后点击
    Next。为数据模型选择一个名称，然后点击 Save。Xcode 就会为你创建该数据模型。


    ![images](img/0401.jpg)


    **图 4–1.** *新建数据模型文件*


    在 Xcode 中打开你新建的数据模型文件，它就会在数据模型器界面中打开。Xcode 数据模型器界面按钮和选项众多，可能会让人感到困惑。请参考图 4–2，该图对用户界面进行了注释，总结了与数据建模相关的按钮，以帮助你了解如何使用模型器来为你的数据建模。


    ![images](img/0402.jpg)


    **图 4–2.** *数据模型器界面*


    模型器允许你浏览数据模型的实体、属性、关系、请求和配置。当你选中某个构件时，会获得关于它的更多详细信息。你还可以通过按下 Xcode 窗口底部的相应 Editor
    Style 按钮，在图 4–2 所示的 Table 视图和 Xcode 称为“Graph”视图（如图 4–3 所示）的类实体-关系视图之间切换。


    ![images](img/0403.jpg)


    **图 4–3.** *Graph 视图*


    为了让模型讨论起来更有趣，请打开第 3 章中的 League Manager 数据模型。Xcode 界面看起来应该与图 4–4 类似。


    ![images](img/0404.jpg)


    **图 4–4.** *Xcode 数据模型器中的 League Manager 模型*


    你可以看到，Xcode 默认以表格形式显示实体和属性。你可能会发现使用图形形式（点击 Editor Style 上方的 Graph View 按钮即可获得）更容易操作。Graph
    View 中的 League Manager 看起来就像图 4–5 所示。


    ![images](img/0405.jpg)


    **图 4–5.** *Graph View 中的 League Manager 模型*


    图形视图类似于数据模型器熟悉的传统实体-关系图。在图形视图中，你可以轻松地看到实体之间是如何相互关联的。你可能已经注意到，从 `Team` 到 `Player`
    的关系是双头箭头。这是因为这是一个一对多关系。一支球队可能有多个球员。而从 `Player` 到 `Team` 的反向关系是单头箭头，因为这是一个一对一关系。一个球员最多只属于一支球队。我们倾向于认为
    Table View 更适合创建和修改模型，而 Graph View 更适合可视化模型，不过你可以开发出适合自己的方法。


    通过选择任何一个实体或属性，你可以获取它的更多信息。例如，图 4–4 显示了选中的 `Player` 实体。在右上角，你可以看到关于 `Player` 实体的详细信息：它名为
    `Player`，属于 `NSManagedObject` 类，没有父实体，并且不是抽象的。如果你选择一个属性，该面板会更改为显示该属性的详细信息，具体内容会因其类型而异。例如，如果你选择
    `Player` 实体的 `email` 属性，面板会变成图 4–6 所示的样子。你将看到以下内容：


    - 它名为 `email`。

    - 它是可选的。

    - 它不是瞬态属性，也没有被索引。

    - 它的类型是 `String`。

    - 它没有最小或最大长度限制。

    - 它没有默认值。

    - 它没有附加的正则表达式。

    - 它不会被 Spotlight 索引。

    - 它不会存储在外部的记录中。


    ![images](img/0406.jpg)


    **图 4–6.** *email 属性的详细信息*


    将选择切换到 `Player` 的 `team` 关系，面板会显示面向关系的详细信息，如图 4–7 所示。从这个视图中，你可以了解到关于该关系的以下信息：


    - 它名为 `team`。

    - 它的目标实体是 `Team`。

    - 它的反向关系名为 `players`。

    - 它是可选的，但不是瞬态关系。

    - 它不是一个对多关系。

    - 它的最小计数为 1，最大计数为 1。

    - 它使用的删除规则是 Nullify。

    - 它不会被 Spotlight 索引。

    - 它不会存储在外部的记录中。


    ![images](img/0407.jpg)


    **图 4–7.** *team 关系的详细信息*


    让我们看看图 4–8 中显示的 `Player` 实体的详细信息。实体由其名称定义。Core Data 也允许你创建 `NSManagedObject` 的子类，为你的托管对象提供另一个实现类。如果你创建了
    `NSManagedObject` 的子类，并希望将一个实体映射到该类，你可以在实体详细信息窗格中指定该类名。


    ![images](img/0408.jpg)


    **图 4–8.** *实体详细信息窗格*


    ### 查看和编辑属性详细信息


    从 Xcode 数据建模工具中间列的 Attributes 部分选择一个属性，以便将详细信息窗格切换为显示属性详细信息。


    表 4–1 解释了 Attribute 窗格中的各字段。第一列 Name 指的是字段的名称，而 Description 列则解释了该字段的含义及其使用方式。


    ![image](img/t0401.jpg)

