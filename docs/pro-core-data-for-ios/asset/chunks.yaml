- fmt: "*   If two threads ask for the same object, they must obtain a pointer to\
    \ the same instance.\n*   If the same object is asked for several times, the context\
    \ must be intelligent enough to not go hit the persistent store but instead return\
    \ the object from its cache.\n*   The context should be able to keep changes to\
    \ the persistent store to itself until a commit operation is requested.\n\n**NOTE:**\
    \ Apple strongly, and rightfully, discourages subclassing the `NSManagedObjectContext`\
    \ because of the complexity of what it does and the opportunities for putting\
    \ the context and the objects it manages into an unpredictable state.\n\n[Table\
    \ 2–4](#Chapter02.html#tab_2_4) lists some methods used to retrieve, create, or\
    \ delete data objects. Updating data is done on the data object by changing its\
    \ properties directly. The context keeps track of every object it pulls out of\
    \ the data store and is aware of any change you make so that changes can be persisted\
    \ to the backing store.\n\n![images](images/t0204.jpg)\n\nKeep in mind that `NSManagedObjectContext`\
    \ orchestrates data transfers both into and out of the persistent store and guarantees\
    \ the consistency of the data objects. You should think carefully about the impacts\
    \ of deleting managed objects. When deleting a managed object that has a relationship\
    \ to other managed objects, Core Data has to decide what to do with the related\
    \ objects. One of the properties of a relationship is the “Delete rule,” which\
    \ is one of the four types of delete rules explained in [Table 2–5](#Chapter02.html#tab_2_5).\
    \ [Table 2–5](#Chapter02.html#tab_2_5) calls the object being deleted the *parent\
    \ object* and the objects that are at the end of a relationship the *related objects*.\n\
    \n![images](images/t0205.jpg)\n\nIn addition to controlling access to and from\
    \ the persistent store, the managed object context allows undo and redo operations\
    \ using the same paradigm used in user interface design. [Table 2–6](#Chapter02.html#tab_2_6)\
    \ lists the important methods used in dealing with undo and redo operations.\n\
    \n![images](images/t0206.jpg)\n\n[Chapter 5](#Chapter05.html#ch5) discusses undoing\
    \ and redoing Core Data operations.\n\nThe `NSManagedObjectContext` is the gateway\
    \ into the persistent stores that all data objects must go through. To be able\
    \ to keep track of the data, Core Data forces all data objects to inherit from\
    \ the `NSManagedObject` class. You saw earlier in this chapter that `NSEntityDescription`\
    \ instances define the data objects. `NSManagedObject` instances are the data\
    \ objects. Core Data uses their entity descriptions to know what properties to\
    \ access and what types to expect.\n\nManaged objects support key-value coding,\
    \ or name-value pairs, in order to give generic accessors to the data they contain.\
    \ The simplest way of accessing data is through the `valueForKey:` method. Data\
    \ can be put into the objects using the `setValue:forKey:` method. The `key` parameter\
    \ is the name of the attribute from the data model.\n\n```\n- (id)valueForKey:(NSString\
    \ *)key\n- (void)setValue:(id)value forKey:(NSString *)key\n```\n\nNote that the\
    \ `valueForKey:` method returns an instance of `id`, which is a generic type.\
    \ The actual data type is dictated again by the data model and the type of attribute\
    \ you specified. Refer to [Table 2–2](#Chapter02.html#tab_2_2) for a list of these\
    \ types.\n\n`NSManagedObject` also provides several methods to help the `NSManagedObjectContext`\
    \ determine whether anything has changed in the object. When the time comes to\
    \ commit any changes, the context can ask the managed objects it keeps track of\
    \ if they have changed. Apple strongly discourages you from overriding these methods\
    \ in order to prevent interference with the commit sequence.\n\n**NOTE:** Each\
    \ instance of `NSManagedObject` keeps a reference to the context to which it belongs.\
    \ This can also be an inexpensive way of keeping a reference to the context without\
    \ having to pass it around all the time. As long as you have one of the managed\
    \ objects, you can get back to the context.\n\nTo create a new `NSManagedObject`\
    \ instance, you first create an appropriate `NSEntityDescription` instance from\
    \ the entity name and the managed object context that knows about that entity.\
    \ The `NSEntityDescription` instance provides the definition, or description,\
    \ for the new `NSManagedObject` instance. You then send a message to the `NSEntityDescription`\
    \ instance you just created to insert a new managed object into the context and\
    \ return it to you. The code looks like this:\n\n```\nNSEntityDescription *entity\
    \ = [NSEntityDescription entityForName:@\"Organization\"\n    inManagedObjectContext:managedObjectContext];\n\
    NSManagedObject *org = [NSEntityDescription insertNewObjectForEntityForName:[entity\n\
    \    name] inManagedObjectContext:managedObjectContext];\n```\n\nOnce you create\
    \ the managed object in the context, you can set its values. To set the `name`\
    \ property of the `NSManagedObject` instance called `org` that the previous code\
    \ creates, invoke the following code:\n\n```\n[org setValue:@\"MyCompany, Inc.\"\
    \ forKey:@\"name\"];\n```\n\n## Key-Value Observing\n\nYou can take responsibility\
    \ for discovering any changes made to managed objects by querying them. This approach\
    \ is useful in cases when some event prompts a controller to do something with\
    \ the managed objects. In many cases, however, having the managed objects themselves\
    \ take responsibility to notify you when they change allows more efficiency and\
    \ elegance in your design. To provide this notification service, the `NSManagedObject`\
    \ class supports key-value observation to send notifications immediately before\
    \ and after a value changes for a key. Key-value observation isn't a pattern specific\
    \ to Core Data but is used throughout the Cocoa frameworks.\n\nThe two main methods\
    \ involved in the notifications related to key-value observation are `willChangeValueForKey:`\
    \ and `didChangeValueForKey:`. The first method is invoked immediately before\
    \ the change and the latter immediately after the change. For an object `observerObject`\
    \ to receive notifications from changes to the value of property `theProperty`\
    \ occurring in a managed object `managedObject`, however, the observer object\
    \ must first register with that object using code like this:\n\n```\n[managedObject\
    \ addObserver:observerObject forKeyPath:@\"theProperty\"\n    options:(NSKeyValueObservingOptionNew\
    \ | NSKeyValueObservingOptionOld) context:nil];\n```\n\nAfter registering, the\
    \ observer will start receiving instant change notifications to the properties\
    \ to which it is listening. This is an extremely useful mechanism to use when\
    \ trying to keep a user interface in sync with the data it displays."
  raw: '*   If two threads ask for the same object, they must obtain a pointer to
    the same instance.

    *   If the same object is asked for several times, the context must be intelligent
    enough to not go hit the persistent store but instead return the object from its
    cache.

    *   The context should be able to keep changes to the persistent store to itself
    until a commit operation is requested.


    **NOTE:**Apple strongly, and rightfully, discourages subclassing the `NSManagedObjectContext`
    because of the complexity of what it does and the opportunities for putting the
    context and the objects it manages into an unpredictable state.


    [Table 2–4](#Chapter02.html#tab_2_4) lists some methods used to retrieve, create,
    or delete data objects. Updating data is done on the data object by changing its
    properties directly. The context keeps track of every object it pulls out of the
    data store and is aware of any change you make so that changes can be persisted
    to the backing store.


    ![images](images/t0204.jpg)


    Keep in mind that `NSManagedObjectContext` orchestrates data transfers both into
    and out of the persistent store and guarantees the consistency of the data objects.
    You should think carefully about the impacts of deleting managed objects. When
    deleting a managed object that has a relationship to other managed objects, Core
    Data has to decide what to do with the related objects. One of the properties
    of a relationship is the “Delete rule,” which is one of the four types of delete
    rules explained in [Table 2–5](#Chapter02.html#tab_2_5). [Table 2–5](#Chapter02.html#tab_2_5)
    calls the object being deleted the *parent object* and the objects that are at
    the end of a relationship the *related objects*.


    ![images](images/t0205.jpg)


    In addition to controlling access to and from the persistent store, the managed
    object context allows undo and redo operations using the same paradigm used in
    user interface design. [Table 2–6](#Chapter02.html#tab_2_6) lists the important
    methods used in dealing with undo and redo operations.


    ![images](images/t0206.jpg)


    [Chapter 5](#Chapter05.html#ch5) discusses undoing and redoing Core Data operations.


    The `NSManagedObjectContext` is the gateway into the persistent stores that all
    data objects must go through. To be able to keep track of the data, Core Data
    forces all data objects to inherit from the `NSManagedObject` class. You saw earlier
    in this chapter that `NSEntityDescription` instances define the data objects.
    `NSManagedObject` instances are the data objects. Core Data uses their entity
    descriptions to know what properties to access and what types to expect.


    Managed objects support key-value coding, or name-value pairs, in order to give
    generic accessors to the data they contain. The simplest way of accessing data
    is through the `valueForKey:` method. Data can be put into the objects using the
    `setValue:forKey:` method. The `key` parameter is the name of the attribute from
    the data model.


    `- (id)valueForKey:(NSString *)key`

    `- (void)setValue:(id)value forKey:(NSString *)key`


    Note that the `valueForKey:` method returns an instance of `id`, which is a generic
    type. The actual data type is dictated again by the data model and the type of
    attribute you specified. Refer to [Table 2–2](#Chapter02.html#tab_2_2) for a list
    of these types.


    `NSManagedObject` also provides several methods to help the `NSManagedObjectContext`
    determine whether anything has changed in the object. When the time comes to commit
    any changes, the context can ask the managed objects it keeps track of if they
    have changed. Apple strongly discourages you from overriding these methods in
    order to prevent interference with the commit sequence.


    **NOTE:**Each instance of `NSManagedObject` keeps a reference to the context to
    which it belongs. This can also be an inexpensive way of keeping a reference to
    the context without having to pass it around all the time. As long as you have
    one of the managed objects, you can get back to the context.


    To create a new `NSManagedObject` instance, you first create an appropriate `NSEntityDescription`
    instance from the entity name and the managed object context that knows about
    that entity. The `NSEntityDescription` instance provides the definition, or description,
    for the new `NSManagedObject` instance. You then send a message to the `NSEntityDescription`
    instance you just created to insert a new managed object into the context and
    return it to you. The code looks like this:


    `NSEntityDescription *entity = [NSEntityDescription entityForName:@"Organization"`![images](images/U002.jpg)

    `inManagedObjectContext:managedObjectContext];`

    `NSManagedObject *org = [NSEntityDescription insertNewObjectForEntityForName:[entity`![images](images/U002.jpg)

    `name] inManagedObjectContext:managedObjectContext];`


    Once you create the managed object in the context, you can set its values. To
    set the `name` property of the `NSManagedObject` instance called `org` that the
    previous code creates, invoke the following code:


    `[org setValue:@"MyCompany, Inc." forKey:@"name"];`


    #### Key-Value Observing


    You can take responsibility for discovering any changes made to managed objects
    by querying them. This approach is useful in cases when some event prompts a controller
    to do something with the managed objects. In many cases, however, having the managed
    objects themselves take responsibility to notify you when they change allows more
    efficiency and elegance in your design. To provide this notification service,
    the `NSManagedObject` class supports key-value observation to send notifications
    immediately before and after a value changes for a key. Key-value observation
    isn''t a pattern specific to Core Data but is used throughout the Cocoa frameworks.


    The two main methods involved in the notifications related to key-value observation
    are `willChangeValueForKey:` and `didChangeValueForKey:`. The first method is
    invoked immediately before the change and the latter immediately after the change.
    For an object `observerObject` to receive notifications from changes to the value
    of property `theProperty` occurring in a managed object `managedObject`, however,
    the observer object must first register with that object using code like this:


    `[managedObject addObserver:observerObject forKeyPath:@"theProperty"`![images](images/U002.jpg)

    `options:(NSKeyValueObservingOptionNew | NSKeyValueObservingOptionOld) context:nil];`


    After registering, the observer will start receiving instant change notifications
    to the properties to which it is listening. This is an extremely useful mechanism
    to use when trying to keep a user interface in sync with the data it displays.'
  trans: "\n*   如果有两个线程请求同一个对象，它们必须获取到指向同一个实例的指针。\n*   如果同一个对象被多次请求，上下文必须足够智能，不去访问持久化存储，而是从其缓存中返回该对象。\n\
    *   上下文应能将针对持久化存储的更改保留在自身内部，直到请求执行提交操作。\n\n**注意：** 苹果强烈（并且合理地）反对对 `NSManagedObjectContext`\
    \ 进行子类化，因为它所执行的操作非常复杂，并且有可能使上下文及其管理的对象进入不可预测的状态。\n\n表 2–4 列出了一些用于检索、创建或删除数据对象的方法。更新数据是通过直接更改数据对象的属性来完成的。上下文会跟踪它从数据存储中拉取的每一个对象，并感知你做出的任何更改，以便这些更改能够持久化到后备存储。\n\
    \n![images](img/t0204.jpg)\n\n请记住，`NSManagedObjectContext` 负责协调进出持久化存储的数据传输，并保证数据对象的一致性。你应该仔细考虑删除托管对象的影响。当删除一个与其他托管对象存在关系的托管对象时，Core\
    \ Data 必须决定如何处理这些相关对象。关系的一个属性是“删除规则”，这是表 2–5 中解释的四种删除规则之一。表 2–5 将正在被删除的对象称为*父对象*，将位于关系另一端的对象称为*相关对象*。\n\
    \n![images](img/t0205.jpg)\n\n除了控制对持久化存储的访问之外，托管对象上下文还允许使用与用户界面设计中相同的范式来执行撤销和重做操作。表\
    \ 2–6 列出了处理撤销和重做操作时使用的重要方法。\n\n![images](img/t0206.jpg)\n\n第 5 章 讨论了 Core Data\
    \ 操作的撤销和重做。\n\n`NSManagedObjectContext` 是所有数据对象必须经过的、通往持久化存储的大门。为了能够跟踪数据，Core\
    \ Data 强制所有数据对象继承自 `NSManagedObject` 类。你已经在本章前面看到，`NSEntityDescription` 实例定义了数据对象。`NSManagedObject`\
    \ 实例就是数据对象。Core Data 使用它们的实体描述来知道要访问哪些属性以及期望何种类型。\n\n托管对象支持键值编码（即名称-值对），以便为其包含的数据提供通用的访问器。访问数据的最简单方式是通过\
    \ `valueForKey:` 方法。可以使用 `setValue:forKey:` 方法将数据放入对象中。`key` 参数是数据模型中属性的名称。\n\n\
    ```\n- (id)valueForKey:(NSString *)key\n- (void)setValue:(id)value forKey:(NSString\
    \ *)key\n```\n\n注意，`valueForKey:` 方法返回一个 `id` 类型的实例，这是一种通用类型。实际的数据类型同样由数据模型和你指定的属性类型决定。请参考表\
    \ 2–2 以了解这些类型的列表。\n\n`NSManagedObject` 还提供了几种方法，帮助 `NSManagedObjectContext` 确定对象是否有任何更改。当需要提交任何更改时，上下文可以询问它跟踪的托管对象是否发生了变化。苹果强烈反对你重写这些方法，以防止干扰提交序列。\n\
    \n**注意：** 每个 `NSManagedObject` 实例都保留了一个对其所属上下文的引用。这也是一种无需到处传递上下文就能持有其引用的低成本方式。只要你拥有一个托管对象，就可以获取回其上下文。\n\
    \n要创建一个新的 `NSManagedObject` 实例，你首先需要根据实体名称和知道该实体的托管对象上下文，创建一个合适的 `NSEntityDescription`\
    \ 实例。`NSEntityDescription` 实例为新的 `NSManagedObject` 实例提供了定义（或描述）。然后，你向刚创建的 `NSEntityDescription`\
    \ 实例发送消息，以将一个新建的托管对象插入到上下文中并返回给你。代码如下所示：\n\n```\nNSEntityDescription *entity =\
    \ [NSEntityDescription entityForName:@\"Organization\"\n    inManagedObjectContext:managedObjectContext];\n\
    NSManagedObject *org = [NSEntityDescription insertNewObjectForEntityForName:[entity\n\
    \    name] inManagedObjectContext:managedObjectContext];\n```\n\n一旦你在上下文中创建了托管对象，就可以设置它的值。要为前面代码创建的名为\
    \ `org` 的 `NSManagedObject` 实例设置 `name` 属性，请调用以下代码：\n\n```\n[org setValue:@\"\
    MyCompany, Inc.\" forKey:@\"name\"];\n```\n\n## 键值观察\n\n你可以通过主动查询的方式来负责发现对托管对象所做的任何更改。当某些事件触发控制器对托管对象执行操作时，这种方法非常有用。然而，在很多情况下，让托管对象本身在你更改它们时负责通知你，可以让你的设计更加高效和优雅。为了提供这种通知服务，`NSManagedObject`\
    \ 类支持键值观察，以便在某个键的值更改之前和之后立即发送通知。键值观察并非 Core Data 特有的模式，而是贯穿 Cocoa 框架的。\n\n与键值观察通知相关的两个主要方法是\
    \ `willChangeValueForKey:` 和 `didChangeValueForKey:`。前者在更改发生前立即调用，后者在更改发生后立即调用。然而，为了让一个对象\
    \ `observerObject` 能够接收来自托管对象 `managedObject` 中属性 `theProperty` 值更改的通知，观察者对象必须首先使用如下代码向该对象注册：\n\
    \n```\n[managedObject addObserver:observerObject forKeyPath:@\"theProperty\"\n\
    \    options:(NSKeyValueObservingOptionNew | NSKeyValueObservingOptionOld) context:nil];\n\
    ```\n\n注册之后，观察者将开始即时收到它所监听的属性的更改通知。当尝试保持用户界面与其显示的数据同步时，这是一个极其有用的机制。\n"
- fmt: '# The Query Classes


    So far in this chapter, you have seen how to initialize the Core Data infrastructure
    and how to interact with the objects it creates. This section deals with the basics
    of retrieving data by sending fetch requests. Fetch requests are, not surprisingly,
    instances of `NSFetchRequest`. What might be a little more surprising to you is
    that it is almost the only class in the class structure related to retrieving
    data that is a member of the Core Data framework. Most of the other classes involved
    in formulating a request to fetch data belong to the Foundation Cocoa framework,
    also used by all other Cocoa frameworks. [Figure 2–12](#Chapter02.html#fig_2_12)
    shows the class diagram derived from `NSFetchRequest`.


    ![images](images/0212.jpg)


    **Figure 2–12.** *The NSFetchRequest class diagram*


    Fetch requests are composed of two main elements: an `NSPredicate` instance and
    an `NSSortDescriptor` instance. The `NSPredicate` helps filter the data by specifying
    constraints, and the `NSSortDescriptor` arranges the result set in a specific
    order. Both elements are optional, and if you don''t specify them, your results
    aren''t constrained if an `NSPredicate` isn''t specified or aren''t sorted if
    an `NSSortDescriptor` isn''t specified.


    Creating a simple request to retrieve all the organizations in your persistent
    store—unconstrained and unsorted—looks like this:


    ```

    NSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];

    NSEntityDescription *entity = [NSEntityDescription entityForName:@"Organization"
    inManagedObjectContext:managedObjectContext];

    [fetchRequest setEntity:entity];

    NSArray* organizations = [managedObjectContext executeFetchRequest:fetchRequest
    error:nil];

    ```


    You first reserve the memory space for the request object. You then retrieve the
    entity description of the objects to retrieve from the context and set it into
    the request object. Finally, you execute the query in the managed object context
    by calling `executeFetchRequest:`.


    Because you don''t constrain the request with an `NSPredicate` instance, the `organizations`
    array contains instances of `NSManagedObject` that represent each of the organizations
    found in the persistent store. To filter the results and return only some of the
    organizations, use the `NSPredicate` class. To create a simple predicate that
    limits the results to organizations whose names contain the string `"Inc."`, you
    call `NSPredicate`''s `predicateWithFormat:` method, passing the format string
    and the data that gets plugged into the format. You then add the predicate to
    the fetch request before executing the request in the managed object context.
    The code looks like this:


    ```

    NSPredicate *predicate = [NSPredicate predicateWithFormat:@"name contains %@",
    @"Inc."];

    [fetchRequest setPredicate:predicate];

    ```


    To sort the result set alphabetically by the name of the organization, add a sort
    descriptor to the request prior to executing it.


    ```

    NSSortDescriptor *sortByName = [[NSSortDescriptor alloc] initWithKey:@"name" ascending:YES];

    [fetchRequest setSortDescriptors:[NSArray arrayWithObject:sortByName]];

    ```


    [Chapter 6](#Chapter06.html#ch6) goes much more in depth on how to use predicates
    for simple and complex queries and sort descriptors for sorting.


    [Figure 2–13](#Chapter02.html#fig_2_13) puts all the Core Data class diagrams
    you''ve seen in this chapter together into a single class diagram that shows you
    how all these classes fit in the framework.


    Your user code, represented in the diagram by a stick figure, interacts chiefly
    with four classes:


    * `NSManagedObject` (1)

    * `NSManagedObjectContext` (2)

    * `NSFetchRequest` (3)

    * `NSFetchedResultsController` (4)


    Find these four classes, numbered 1–4, in the diagram in [Figure 2–13](#Chapter02.html#fig_2_13)
    and use them as anchor points, and you should recognize the individual class diagrams
    you''ve worked through in this chapter. The one exception is `NSFetchedResultsController`
    (4), which works closely with iOS table views. We cover `NSFetchedResultsController`
    in [Chapter 9](#Chapter09.html#ch9).


    ![images](images/0213.jpg)


    **Figure 2–13.** *The main Core Data classes*'
