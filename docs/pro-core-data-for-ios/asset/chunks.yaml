    ### The Data Access Classes


    You learned in [Chapter 1](#Chapter01.html#ch1) that the initialization of Core
    Data starts with loading the data model into the `NSManagedObjectModel` object.
    The previous section ran through an example of how `NSManagedObjectModel` represents
    that model as `NSEntityDescription` and `NSPropertyDescription` objects. The second
    step of the initialization sequence is to create and bind to the persistent store
    through the `NSPersistentStoreCoordinator`. Finally, the third step in the initialization
    sequence creates the `NSManagedObjectContext` that your code interacts with in
    order to store and retrieve data. To make things a bit clearer, [Figure 2–11](#Chapter02.html#fig_2_11)
    shows the class diagram involved in representing the context and the underlying
    persistent store.


    ![images](images/0211.jpg)

    **Figure 2–11.** *The managed object context object graph*


    Notice where the `NSManagedObjectModel` object sits in the class diagram in [Figure
    2–11](#Chapter02.html#fig_2_11). It is loaded and given to the persistent store
    coordinator (`NSPersistentStoreCoordinator`) so that the persistent store coordinator
    can figure out how to represent the data in the persistent stores. The persistent
    store coordinator acts as a mediator between the managed object context and the
    actual persistent stores where the data is written. Among other tasks, it manages
    the data migrations from one store to the other, through the `migratePersistentStore:`
    method.


    The `NSPersistentStoreCoordinator` is initialized using the `NSManagedObjectModel`
    class. Once the coordinator object is allocated, it can load and register all
    the persistent stores. The following code demonstrates the initialization of the
    persistent store coordinator. It receives the managed object model in its `initWithManagedObjectModel:`
    method and then registers the persistent store by calling its `addPersistentStoreWithType:`
    method.


    `NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@"OrgChart.sqlite"];`


    `NSError *error = nil;`

    `__persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self
    managedObjectModel]];`

