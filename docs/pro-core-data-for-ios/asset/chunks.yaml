- fmt: "# Introduction\n\nInterest in developing apps for Apple's iOS platform continues\
    \ to rise, and more great apps appear in Apple's App Store every day. As people\
    \ like you join the app-creation party, they usually discover that their apps\
    \ must store data on iOS devices to be useful. Enter *Pro Core Data for iOS*,\
    \ written for developers who have learned the basics of iOS development and are\
    \ ready to dive deeper into topics surrounding data storage to take their apps\
    \ from pretty good to great. Core Data, Apple's technology for data storage and\
    \ retrieval, is both easy to approach and difficult to master. This book spans\
    \ the gamut, starting you with the simple and taking you through the advanced.\
    \ Read each topic, understand what it means, and incorporate it into your own\
    \ Core Data apps.\n\n## Why a Second Edition?\n\nSince the publication of the\
    \ first edition of *Pro Core Data for iOS*, Apple has released Xcode 4, a major\
    \ overhaul of their programming tool. Everything has moved or changed somehow,\
    \ so the descriptions and tutorials from the first edition of this book, which\
    \ used Xcode 3, no longer apply. All the descriptions and screenshots have been\
    \ updated to the new interface.\n\nWe didn't stop at updating the book for Xcode\
    \ 4, however. We broke the discussion of `NSFetchedResultsController` into its\
    \ own chapter, giving it more treatment and coverage. We dug deeper into the tricky\
    \ topic of migrations. We took a new approach to the section on data encryption,\
    \ based on feedback from Brian Kohl. We responded to feedback we've received via\
    \ reviews and e-mail. We think both new readers and people who have already read\
    \ the first edition will profit from reading this edition.\n\n## What You'll Need\n\
    \nTo follow along with this book, you need an Intel Mac running Snow Leopard or\
    \ Lion, and you need Xcode 4, which is available from the Mac App Store or from\
    \ `developer.apple.com` for registered Apple developers. You'll also do better\
    \ if you have at least a basic understanding of Objective-C, Cocoa Touch, and\
    \ iOS development.\n\n## What You'll Find\n\nThis book starts by setting a clear\
    \ foundation for what Core Data is and how it works, and then it takes you step-by-step\
    \ through how to get the results you need from this powerful framework. You'll\
    \ learn about the components of Core Data and how they interact, how to design\
    \ your data model, how to filter your results, how to tune performance, how to\
    \ migrate your data across data model versions, and many other topics around and\
    \ between these that will separate your apps from the crowd.\n\nThis book combines\
    \ theory and code to teach its subject matter. Although you can take the book\
    \ to your Barcalounger and read it from cover to cover, you'll find the book is\
    \ more effective if you're in front of a computer, typing in and understanding\
    \ the code it explains. We also hope that, after you read the book and work through\
    \ its code, you'll keep it handy as a reference, turning to it often for answers\
    \ and clarification.\n\n## How This Book Is Organized\n\nWe've tried to arrange\
    \ the material so that it builds from beginning topics to advanced, at least in\
    \ a general sense, as the book progresses. The topics tend to build on each other,\
    \ so you'll likely benefit most by working through the book front to back, rather\
    \ than skipping around. If you're looking for guidance on a specific topic—versioning\
    \ and migrating data, say, or tuning performance and memory usage—skip ahead to\
    \ that chapter. Most chapters focus on a single topic, indicated by that chapter's\
    \ title. The final chapter covers an array of advanced topics that don't fit neatly\
    \ anywhere else.\n\n## Source Code and Errata\n\nYou can and should download the\
    \ source code for this book from the Apress web site at [`www.apress.com`](http://www.apress.com).\
    \ Feel free to use it in your own projects, whether personal or commercial. We'll\
    \ post any corrections to code as they're uncovered. We'll also post book corrections\
    \ in the errata section.\n\n## How to Contact Us\n\nWe'd love to hear from you,\
    \ whether it's questions, concerns, better ways of doing things, or triumphant\
    \ announcements of your Core Data apps landing on the App Store. You can find\
    \ us here:\n\nMichael Privat  \nE-mail: `mprivat@mac.com`  \nTwitter: `@michaelprivat`\
    \  \nBlog: [`http://michaelprivat.com`](http://michaelprivat.com)\n\nRob Warner\
    \  \nE-mail: `rwarner@grailbox.com`  \nTwitter: `@hoop33`  \nBlog: [`http://grailbox.com`](http://grailbox.com)\n\
    \n# Chapter 1\n\n# Getting Started\n\nIf you misread this book's title, thought\
    \ it discussed and deciphered core dumps, and hope it will help you debug a nasty\
    \ application crash, you got the wrong book. Get a debugger, memory tools, and\
    \ an appointment with the optometrist. Otherwise, you bought, borrowed, burglarized,\
    \ or acquired this book somehow because you want to better understand and implement\
    \ Core Data in your iOS applications. You got the right book.\n\nYou might read\
    \ these words from a paper book, stout and sturdy and smelling faintly of binding\
    \ glue. You might digitally flip through these pages on a nook, iPad, Kindle,\
    \ Sony Reader, Kobo eReader, or some other electronic book reader. You might stare\
    \ at a computer screen, whether on laptop, netbook, or monitor, reading a few\
    \ words at a time while telling yourself to ignore your Twitter feed rolling CNN-like\
    \ along the screen's edge. As you read, you know that not only can you stop at\
    \ any time but that you can resume at any time. Any time you want to read this\
    \ book, you can pick it up. If you marked the spot where you were last reading,\
    \ you can even start from where you last stopped. We take this for granted with\
    \ books.\n\nUsers take it for granted with applications.\n\nUsers expect to find\
    \ their data each time they launch their applications. Apple's Core Data framework\
    \ helps you ensure that they will. This chapter introduces you to Core Data, explaining\
    \ what it is, how it came to be, and how to build simple Core Data–based applications\
    \ for iOS. This book walks through the simplicity and complexities of Core Data.\
    \ Use the information in the book to create applications that store and retrieve\
    \ data reliably and efficiently so that users can depend on their data. Code carefully,\
    \ though—you don't want to write buggy code and have to deal with nasty application\
    \ crashes."
  raw: '## Introduction


    Interest in developing apps for Apple''s iOS platform continues to rise, and more
    great apps appear in Apple''s App Store every day. As people like you join the
    app-creation party, they usually discover that their apps must store data on iOS
    devices to be useful. Enter *Pro Core Data for iOS*, written for developers who
    have learned the basics of iOS development and are ready to dive deeper into topics
    surrounding data storage to take their apps from pretty good to great. Core Data,
    Apple''s technology for data storage and retrieval, is both easy to approach and
    difficult to master. This book spans the gamut, starting you with the simple and
    taking you through the advanced. Read each topic, understand what it means, and
    incorporate it into your own Core Data apps.


    ### Why a Second Edition?


    Since the publication of the first edition of *Pro Core Data for iOS*, Apple has
    released Xcode 4, a major overhaul of their programming tool. Everything has moved
    or changed somehow, so the descriptions and tutorials from the first edition of
    this book, which used Xcode 3, no longer apply. All the descriptions and screenshots
    have been updated to the new interface.


    We didn''t stop at updating the book for Xcode 4, however. We broke the discussion
    of `NSFetchedResultsController` into its own chapter, giving it more treatment
    and coverage. We dug deeper into the tricky topic of migrations. We took a new
    approach to the section on data encryption, based on feedback from Brian Kohl.
    We responded to feedback we''ve received via reviews and e-mail. We think both
    new readers and people who have already read the first edition will profit from
    reading this edition.


    ### What You''ll Need


    To follow along with this book, you need an Intel Mac running Snow Leopard or
    Lion, and you need Xcode 4, which is available from the Mac App Store or from
    `developer.apple.com` for registered Apple developers. You''ll also do better
    if you have at least a basic understanding of Objective-C, Cocoa Touch, and iOS
    development.


    ### What You''ll Find


    This book starts by setting a clear foundation for what Core Data is and how it
    works, and then it takes you step-by-step through how to get the results you need
    from this powerful framework. You''ll learn about the components of Core Data
    and how they interact, how to design your data model, how to filter your results,
    how to tune performance, how to migrate your data across data model versions,
    and many other topics around and between these that will separate your apps from
    the crowd.


    This book combines theory and code to teach its subject matter. Although you can
    take the book to your Barcalounger and read it from cover to cover, you''ll find
    the book is more effective if you''re in front of a computer, typing in and understanding
    the code it explains. We also hope that, after you read the book and work through
    its code, you''ll keep it handy as a reference, turning to it often for answers
    and clarification.


    ### How This Book Is Organized


    We''ve tried to arrange the material so that it builds from beginning topics to
    advanced, at least in a general sense, as the book progresses. The topics tend
    to build on each other, so you''ll likely benefit most by working through the
    book front to back, rather than skipping around. If you''re looking for guidance
    on a specific topic—versioning and migrating data, say, or tuning performance
    and memory usage—skip ahead to that chapter. Most chapters focus on a single topic,
    indicated by that chapter''s title. The final chapter covers an array of advanced
    topics that don''t fit neatly anywhere else.


    ### Source Code and Errata


    You can and should download the source code for this book from the Apress web
    site at [`www.apress.com`](http://www.apress.com). Feel free to use it in your
    own projects, whether personal or commercial. We''ll post any corrections to code
    as they''re uncovered. We''ll also post book corrections in the errata section.


    ### How to Contact Us


    We''d love to hear from you, whether it''s questions, concerns, better ways of
    doing things, or triumphant announcements of your Core Data apps landing on the
    App Store. You can find us here:


    Michael Privat


    E-mail: `mprivat@mac.com`


    Twitter: `@michaelprivat`


    Blog: [`http://michaelprivat.com`](http://michaelprivat.com)


    Rob Warner


    E-mail: `rwarner@grailbox.com`


    Twitter: `@hoop33`


    Blog: [`http://grailbox.com`](http://grailbox.com)


    ## Chapter 1


    ## Getting Started


    If you misread this book''s title, thought it discussed and deciphered core dumps,
    and hope it will help you debug a nasty application crash, you got the wrong book.
    Get a debugger, memory tools, and an appointment with the optometrist. Otherwise,
    you bought, borrowed, burglarized, or acquired this book somehow because you want
    to better understand and implement Core Data in your iOS applications. You got
    the right book.


    You might read these words from a paper book, stout and sturdy and smelling faintly
    of binding glue. You might digitally flip through these pages on a nook, iPad,
    Kindle, Sony Reader, Kobo eReader, or some other electronic book reader. You might
    stare at a computer screen, whether on laptop, netbook, or monitor, reading a
    few words at a time while telling yourself to ignore your Twitter feed rolling
    CNN-like along the screen''s edge. As you read, you know that not only can you
    stop at any time but that you can resume at any time. Any time you want to read
    this book, you can pick it up. If you marked the spot where you were last reading,
    you can even start from where you last stopped. We take this for granted with
    books.


    Users take it for granted with applications.


    Users expect to find their data each time they launch their applications. Apple''s
    Core Data framework helps you ensure that they will. This chapter introduces you
    to Core Data, explaining what it is, how it came to be, and how to build simple
    Core Data–based applications for iOS. This book walks through the simplicity and
    complexities of Core Data. Use the information in the book to create applications
    that store and retrieve data reliably and efficiently so that users can depend
    on their data. Code carefully, though—you don''t want to write buggy code and
    have to deal with nasty application crashes.'
  trans: "\n# 引言\n\n为苹果 iOS 平台开发应用的兴趣持续高涨，每天都有更多优秀应用出现在苹果的 App Store 中。当像你一样的人们加入应用创作的行列时，他们通常会发现自己的应用必须将数据存储在\
    \ iOS 设备上才能发挥作用。因此，《iOS 专业核心数据》应运而生，这本书专为那些已掌握 iOS 开发基础知识、准备深入探索数据存储相关主题、从而将应用从“还不错”提升至“卓越”的开发者而写。苹果用于数据存储与检索的技术——Core\
    \ Data，既容易上手又难以精通。本书涵盖了从入门到高级的方方面面，带你从简单内容起步，逐步深入。阅读每个主题，理解其含义，并将其融入到你的 Core Data\
    \ 应用中。\n\n## 为何推出第二版？\n\n自《iOS 专业核心数据》第一版出版以来，苹果发布了 Xcode 4，这是对其编程工具的一次重大革新。所有内容都发生了变化或调整，因此本书第一版（基于\
    \ Xcode 3）中的描述和教程已不再适用。所有描述和截图都已更新为新的界面。\n\n然而，我们并未止步于仅为 Xcode 4 更新本书。我们将对`NSFetchedResultsController`的讨论单独拆分为一章，对其进行了更深入的阐述和更全面的覆盖。我们对数据迁移这一棘手主题进行了更深入的探讨。根据\
    \ Brian Kohl 的反馈，我们采用了新的方法来编写数据加密部分。我们也回应了通过书评和电子邮件收到的反馈。我们相信，无论是新读者还是已经阅读过第一版的读者，都能从这一版中获益。\n\
    \n## 你需要准备什么\n\n要跟随本书学习，你需要一台运行 Snow Leopard 或 Lion 系统的 Intel Mac 电脑，以及 Xcode\
    \ 4（可从 Mac App Store 或`developer.apple.com`获取，后者需注册苹果开发者账号）。如果你对 Objective-C、Cocoa\
    \ Touch 和 iOS 开发有至少基本的了解，学习效果会更好。\n\n## 你将学到什么\n\n本书首先为理解 Core Data 是什么及其工作原理奠定清晰的基础，然后逐步引导你如何从这个强大的框架中获得所需的结果。你将了解\
    \ Core Data 的各个组件及其交互方式、如何设计数据模型、如何过滤结果、如何调优性能、如何跨数据模型版本迁移数据，以及许多其他相关主题，这些都将使你的应用脱颖而出。\n\
    \n本书结合理论与实践来传授知识。虽然你可以把书拿到躺椅上从头读到尾，但如果你坐在电脑前，边输入代码边理解书中讲解的内容，学习效果会更佳。我们也希望，在你阅读本书并实践其中的代码后，能把它当作一本随时可查阅的参考书，经常翻阅以寻找答案和澄清疑惑。\n\
    \n## 本书的组织结构\n\n我们尽量将材料按照从入门主题到高级主题的顺序编排，至少从整体上而言，随着书的推进，这种递进关系是成立的。各主题之间往往相互关联、层层递进，因此从头到尾通读本书，比跳跃式阅读会让你收获更多。如果你在寻找某个特定主题的指导——比如版本管理与数据迁移，或者性能与内存使用调优——可以直接跳到对应的章节。大多数章节都聚焦于某个单一主题，主题由该章节的标题指明。最后一章则涵盖了一系列在其他地方不便归类的进阶主题。\n\
    \n## 源代码与勘误\n\n你可以而且应该从 Apress 网站[`www.apress.com`](http://www.apress.com)下载本书的源代码。欢迎你在自己的项目（无论是个人项目还是商业项目）中使用这些代码。一旦发现代码中的问题，我们会发布相应的修正。我们也会在勘误部分发布图书的修正内容。\n\
    \n## 如何联系我们\n\n我们非常期待听到你的声音，无论是问题、疑虑、更好的实现方式，还是你的 Core Data 应用成功登陆 App Store 的喜讯。你可以通过以下方式找到我们：\n\
    \nMichael Privat  \n电子邮件：`mprivat@mac.com`  \nTwitter：`@michaelprivat`  \n博客：[`http://michaelprivat.com`](http://michaelprivat.com)\n\
    \nRob Warner  \n电子邮件：`rwarner@grailbox.com`  \nTwitter：`@hoop33`  \n博客：[`http://grailbox.com`](http://grailbox.com)\n\
    \n# 第 1 章\n\n# 开始入门\n\n如果你误读了本书的标题，以为它讨论和解读的是核心转储，并希望它能帮你调试一个棘手的应用崩溃问题，那你拿错了书。请去找调试器、内存工具，并预约一下验光师。否则，你购买、借阅、通过某种方式获得这本书，是因为你想更好地理解和在\
    \ iOS 应用中实现 Core Data。那么，你拿对了书。\n\n你或许正捧着一本纸质书阅读，它厚重结实，隐约散发着装订胶水的味道。你或许在 nook、iPad、Kindle、Sony\
    \ Reader、Kobo eReader 或其他电子书阅读器上翻动这些页面。你或许正盯着电脑屏幕——无论是笔记本电脑、上网本还是显示器——一边阅读几行文字，一边告诉自己别去管屏幕边缘像\
    \ CNN 滚屏一样刷新的 Twitter 信息流。在阅读时，你知道自己不仅可以随时停下来，还可以随时继续。无论何时你想读这本书，都可以拿起来。如果你标记了上次读到的位置，甚至可以从上次停下的地方重新开始。对于书籍来说，我们对此习以为常。\n\
    \n用户对于应用也抱有同样的期望。\n\n用户期望每次启动应用时都能找到他们的数据。苹果的 Core Data 框架能帮助你确保这一点。本章将向你介绍 Core\
    \ Data，解释它是什么、如何诞生，以及如何为 iOS 构建基于 Core Data 的简单应用。本书将带你走过 Core Data 的简单与复杂。请利用书中的信息，创建能够可靠、高效地存储和检索数据的应用，让用户能够信赖他们的数据。不过，请谨慎编写代码——你肯定不想写出有漏洞的代码，然后不得不处理棘手的应用崩溃问题。\n"
- fmt: '### What Is Core Data?


    When people use computers, they expect to preserve any progress they make toward
    completing their tasks. Saving progress, essential to office software, code editors,
    and games involving small plumbers, is what programmers call *persistence*. Most
    software requires persistence, or the ability to store and retrieve data, so that
    users don''t have to reenter all their data each time they use their applications.
    Some software can survive without any data storage or retrieval; calculators,
    carpenter''s levels, and apps that make annoying or obscene sounds spring to mind.
    Most useful applications, however, preserve some state, whether configuration-oriented
    data, progress toward achieving some goal, or mounds of related data that users
    create and care about. Understanding how to persist data to iDevices is critical
    to most useful iOS development.


    Apple''s Core Data provides a versatile persistence framework. Core Data isn''t
    the only data storage option, nor is it necessarily the best option in all scenarios,
    but it fits well with the rest of the Cocoa Touch development framework and maps
    well to objects. Core Data hides most of the complexities of data storage and
    allows you to focus on what makes your application fun, unique, or usable.


    Although Core Data can store data in a relational database (such as SQLite), it
    is not a database engine. It doesn''t even have to use a relational database to
    store its data. Though Core Data provides an entity-relationship diagramming tool,
    it is not a data modeler. It isn''t a data access layer like Hibernate, though
    it provides much of the same object-relational mapping functionality. Instead,
    Core Data wraps the best of all these tools into a data management framework that
    allows you to work with entities, attributes, and relationships in a way that
    resembles the object graphs you''re used to working with in normal object-oriented
    programming.


    Early iPhone programmers didn''t have the power of the Core Data framework to
    store and retrieve data. The next section shows you the history behind persistence
    in iOS.


    ### History of Persistence in iOS


    Core Data evolved from a NeXT technology called Enterprise Objects Framework (EOF)
    by way of WebObjects, another NeXT technology that still powers parts of Apple''s
    web site. It debuted in 2005 as part of Mac OS X 10.4 (“Tiger”), but didn''t appear
    on iPhones until version 3.0 of the SDK, released in June 2009. Before Core Data,
    iPhone developers had the following options in terms of persistence:


    - Use property lists, which contain nested lists of key/value pairs of various
    data types.

    - Serialize objects to files using the SDK''s `NSCoding` protocol.

    - Take advantage of the iPhone''s support for the relational database SQLite.

    - Persist data to the Internet cloud.


    Developers used all these mechanisms for data storage as they built the first
    wave of applications that flooded Apple''s App Store. Each one of these storage
    options remains viable, and developers continue to employ them as they build newer
    applications using newer SDK versions.


    None of these options, however, compares favorably to the power, ease of use,
    and Cocoa-fitness of Core Data. Despite the invention of frameworks like `FMDatabase`
    or `ActiveRecord` to make dealing with persistence on iOS easier in the pre–Core
    Data days, developers gratefully leapt to Core Data when it became available.


    Although Core Data might not solve all persistence problems best and you might
    solve some of your persistence scenarios using other means like the options listed
    earlier, you''ll turn to Core Data more often than not. As you work through this
    book and learn the problems that Core Data solves and how elegantly it solves
    them, you''ll likely use Core Data any time you can. As new persistence opportunities
    arise, you won''t ask yourself, “Should I use Core Data for this?” but rather,
    “Is there any reason *not* to use Core Data?”


    The next section shows you how to build a basic Core Data application using Xcode''s
    project templates. Even if you''ve already generated an Xcode Core Data project
    and know all the buttons and check boxes to click, don''t skip the next section.
    It explains the Core Data–related sections of code that the templates generate
    and forms a base of understanding on which the rest of the book builds.


    ### Creating a Basic Core Data Application


    The many facets, classes, and nuances of Core Data merit artful analysis and deep
    discussions to teach you all you need to know to gain mastery of Core Data''s
    complexities. Building a practical foundation to support the theory, however,
    is just as essential to mastery. This section builds a simple Core Data–based
    application using one of Xcode''s built-in templates and then dissects the most
    important parts of its Core Data–related code to show what they do and how they
    interact. At the end of this section, you will understand how this application
    interacts with Core Data to store and retrieve data.


    #### Understanding the Core Data Components


    Before building this section''s basic Core Data application, you should have a
    high-level understanding of the components of Core Data. [Figure 1–1](#Chapter01.html#fig_1_1)
    illustrates the key elements of the application you will build in this section.
    Review this figure for a bird''s-eye view of what this application accomplishes,
    where all its pieces fit, and why you need them.


    As a user of Core Data, you should never interact directly with the underlying
    persistent store. One of the fundamental principles of Core Data is that the persistent
    store should be abstracted from the user. A key advantage of that is the ability
    to seamlessly change the backing store in the future without having to modify
    the rest of your code. You should try to picture Core Data as a framework that
    manages the persistence of objects rather than thinking about databases. Not surprisingly,
    the objects managed by the framework must extend `NSManagedObject` and are typically
    referred to as, well, managed objects. Don''t think, though, that the lack of
    imagination in the naming conventions for the components of Core Data reveals
    an unimaginative or mundane framework. In fact, Core Data does an excellent job
    at keeping all the object graph interdependencies, optimizations, and caching
    in a predictable state so that you don''t have to worry about it. If you have
    ever tried to build your own object management framework, you understand all the
    intricacies of the problem Core Data solves for you.


    ![images](images/0101.jpg)


    **Figure 1–1.** *Overview of Core Data''s components*


    Much like we need a livable environment to subsist, managed objects must live
    within an environment that''s livable for them, usually referred to as a *managed
    object context*, or simply *context*. The context keeps track of the states of
    not only the object you are altering but also all the objects that depend on it
    or that it depends on. The `NSManagedObjectContext` object in your application
    provides the context and is the key property that your code must always be able
    to access. You typically accomplish exposing your `NSManagedObjectContext` object
    to your application by having your application delegate initialize it and expose
    it as one of its properties. Your application context will often give the `NSManagedObjectContext`
    object to the main view controller as well. Without the context, you will not
    be able to interact with Core Data.'
  raw: '### What Is Core Data?


    When people use computers, they expect to preserve any progress they make toward
    completing their tasks. Saving progress, essential to office software, code editors,
    and games involving small plumbers, is what programmers call *persistence*. Most
    software requires persistence, or the ability to store and retrieve data, so that
    users don''t have to reenter all their data each time they use their applications.
    Some software can survive without any data storage or retrieval; calculators,
    carpenter''s levels, and apps that make annoying or obscene sounds spring to mind.
    Most useful applications, however, preserve some state, whether configuration-oriented
    data, progress toward achieving some goal, or mounds of related data that users
    create and care about. Understanding how to persist data to iDevices is critical
    to most useful iOS development.


    Apple''s Core Data provides a versatile persistence framework. Core Data isn''t
    the only data storage option, nor is it necessarily the best option in all scenarios,
    but it fits well with the rest of the Cocoa Touch development framework and maps
    well to objects. Core Data hides most of the complexities of data storage and
    allows you to focus on what makes your application fun, unique, or usable.


