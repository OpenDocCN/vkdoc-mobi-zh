    \ done using the standard Cocoa `NSUndoManager` mechanism. This section instructs\
    \ you how to use it to allow your users to undo their Core Data changes.\n\nThe\
    \ Core Data undo manager, an object of type `NSUndoManager`, lives in your managed\
    \ object context, and `NSManagedObjectContext` provides a getter and a setter\
