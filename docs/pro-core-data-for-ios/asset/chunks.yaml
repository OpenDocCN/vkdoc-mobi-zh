    \ `NoteViewController` and initializes it with the parent view controller and\
    \ a `nil` note so that a new note will be created. The second, `insertNoteWithTitle:`,\
    \ is the method that `NoteViewController` calls when the user saves a new note.\
    \ [Listing 10–9](#Chapter10.html#list_10_9) shows these two methods.\n\n**Listing\
    \ 10–9.** *Methods for creating a note*"
  raw: '#### Creating the Interface for Adding and Editing Notes and Passwords


    The MyStash application can now display and delete notes and passwords, but you
    can''t yet add or edit any notes or passwords. This next part walks you through
    adding interfaces to add and edit notes and passwords. You''ll create one modal
    for notes and a different modal for passwords, and MyStash will use the same modal
    for both adding and editing.


    Start with the interface for adding and editing notes. Create a `UIViewController`
    subclass called `NoteViewController`, and make sure only the “With XIB for user
    interface” option is selected. This creates three files:


    *   `NoteViewController.h`

    *   NoteViewController.m

    *   NoteViewController.xib


    Open `NoteViewController.h`. You''ll add the following:


    *   A text field to allow users to enter the note''s title.

    *   A Text view to hold the body of the note.

    *   A pointer to the parent controller so you can ask the parent to save any new
    note.

    *   A managed object that represents the current note, so the user can edit an
    existing note. If the current note is `nil`, the code will create a new one.

    *   An initializer that receives the parent controller and the note object.

    *   A method that responds to the user dismissing the modal with the Save button.

    *   A method that responds to the user dismissing the modal with the Cancel button.


    `NoteListViewController.h` should match [Listing 10–7](#Chapter10.html#list_10_7).


    **Listing 10–7.** *`NoteListViewController.h`*


    `@class` **`NoteListViewController;`**


    `@interface NoteViewController : UIViewController`

    **`{`**

    **`  UITextField *titleField;`**

    **`  UITextView *body;`**

    **`  NoteListViewController *parentController;`**

    **`  NSManagedObject *note;`**

    `}`

    **`@property (strong, nonatomic) IBOutlet UITextField *titleField;`**

    **`@property (strong, nonatomic) IBOutlet UITextView *body;`**

    **`@property (strong, nonatomic) NoteListViewController *parentController;`**

    **`@property (strong, nonatomic) NSManagedObject *note;`**


    **`- (id)initWithParentController:(NoteListViewController *)parentController note:(NSManagedObject
    *)note;`**

    **`- (IBAction)save:(id)sender;`**

    **`- (IBAction)cancel:(id)sender;`**


    `@end`


    The implementation file for the Note view, `NoteViewController.m`, is shown next,
    in [Listing 10–8](#Chapter10.html#list_10_8). Note the following:


    *   The initialization method stores the parent `NoteListViewController` instance
    and the specified `NSManagedObject` instance.

    *   When the view loads and the `viewDidLoad:` method is called, the code checks
    whether the `note` managed object is `nil`. If it is, the code sets the body text
    to “Type text here . . .” so that users know what to do. If it''s not `nil`, the
    code takes the values from the managed object and puts them into the user interface
    fields.

    *   The `save:` method checks again if it''s editing an existing note or adding
    a new one. If it''s editing an existing note, it updates the `note` managed object
    with the values the user entered and asks the parent controller to save the context.
    If it''s creating a new note, it asks the parent controller to insert a new note
    object, passing the user-entered values. Either way, it then dismisses the modal.

    *   The `cancel:` method simply dismisses the modal, discarding any user input.


    **Listing 10–8.** *`NoteViewController.m`*


    `#import "NoteViewController.h"`

    **`#import "NoteListViewController.h"`**


    `@implementation NoteViewController`


    **`@synthesize titleField, body, parentController, note;`**


    **`- (id)initWithParentController:(NoteListViewController *)parentController_`![images](images/U002.jpg)**

    **`note:(NSManagedObject *)note_`**

    **`{`**

    **`  if ((self = [super init]))`**

    **`  {`**

    **`    self.parentController = parentController_;`**

    **`    self.note = note_;`**

    **`  }`**

    **`  return self;`**

    **`}`**


    `- (void)viewDidLoad`

    **`{`**

    `  [super viewDidLoad];`

    **`  if (note != nil)`**

    **`  {`**

    **`    titleField.text = [note valueForKey:@"title"];`**

    **`    body.text = [note valueForKey:@"body"];`**

    **`  }`**

    **`  else`**

    **`  {`**

    **`    body.text = @"Type text here . . .";`**

    **`  }`**

    `}`


    **`- (void)viewDidUnload`**

    **`{`**

    **`  self.titleField = nil;`**

    **`  self.body = nil;`**

    `  [super viewDidUnload];`

    **`}`**


    **`- (IBAction)save:(id)sender`**

    **`{`**

    **`  if (parentController != nil)`**

    **`  {`**

    **`    if (note != nil)`**

    **`    {`**

    **`      [note setValue:titleField.text forKey:@"title"];`**

    **`      [note setValue:body.text forKey:@"body"];`**

    **`      [parentController saveContext];`**

    **`    }`**

    **`    else`**

    **`    {`**

    **`      [parentController insertNoteWithTitle:titleField.text body:body.text];`**

    **`    }`**

    **`  }`**

    **`  [self dismissModalViewControllerAnimated:YES];`**

    **`}`**


    **`- (IBAction)cancel:(id)sender`**

    **`{`**

    **`  [self dismissModalViewControllerAnimated:YES];`**

    **`}`**


    `@end`


    Note that you haven''t yet implemented the `insertNoteWithTitle:body:` method
    in `NoteListViewController`, so this file won''t yet compile.


    Next, you must create the actual user interface that the `NoteViewController`
    instance controls. Select the `NoteViewController.xib` file to open it in Interface
    Builder. Perform the following steps:


    1.  Drag a Navigation Bar onto the view, and align it with the top edge of the
    view. Change its title to Note.

    2.  Drag two Bar Button Items onto the navigation bar—one on the left and one
    on the right.

    3.  Change the labels on the two Bar Button items you just added—the one on the
    left to Cancel and the one on the right to Save.

    4.  Ctrl+drag from the Cancel Bar Button Item to the File''s Owner icon and select
    `cancel:` from the pop-up menu.

    5.  Ctrl+drag from the Save Bar Button Item to the File''s Owner icon and select
    `save:` from the pop-up menu.

    6.  Drag a Label onto the top left of the view, below the navigation bar, and
    change its text to Title:.

    7.  Drag a Text Field onto the view, to the right of the Title: label.

    8.  Drag a Text View onto the view, below the Title: label, and make it fill the
    rest of the view.

    9.  Ctrl+drag from the File''s Owner icon to the text field, and select titleField
    from the pop-up menu.

    10.  Ctrl+drag from the File''s Owner icon to the Text view, and select body from
    the pop-up menu.


    [Figure 10–9](#Chapter10.html#fig_10_9) shows what your view should look like
    when you''re done. Make sure you follow all the previous steps, including wiring
    the buttons to the action methods you created (`save:` and `cancel:`) and the
    user interface components to the appropriate variables.


    ![images](images/1009.jpg)


    **Figure 10–9.** *Setting up the single note view*


    All that''s left for the MyStash application to be able to add and edit notes
    is to display this modal in response to two user actions from the Note List view.


    1.  Tap the + button to add a new note.

    2.  Tap the note''s title in the list to edit that note.


    Open `NoteListViewController.h`, and add the following two method declarations:
    one to show the modal when the user clicks the + button and one to insert a new
    note:


    **`- (void)showNoteView;`**

    **`- (void)insertNoteWithTitle:(NSString *)title body:(NSString *)body;`**


    Open `NoteListViewController.m`, import `NoteViewController.h`, and add definitions
    for those two methods. The first, `showNoteView:`, allocates an instance of `NoteViewController`
    and initializes it with the parent view controller and a `nil` note so that a
    new note will be created. The second, `insertNoteWithTitle:`, is the method that
    `NoteViewController` calls when the user saves a new note. [Listing 10–9](#Chapter10.html#list_10_9)
    shows these two methods.


    **Listing 10–9.** *Methods for creating a note*'
  trans: "\n# 创建添加和编辑笔记与密码的界面\n\n`MyStash` 应用目前可以显示和删除笔记与密码，但你尚无法添加或编辑任何笔记或密码。接下来的部分将引导你添加用于添加和编辑笔记与密码的界面。你将分别为笔记和密码创建不同的模态视图，并且\
    \ `MyStash` 将使用同一个模态视图来处理添加和编辑操作。\n\n从添加和编辑笔记的界面开始。创建一个名为 `NoteViewController`\
    \ 的 `UIViewController` 子类，并确保仅选中\"附带 XIB 用户界面\"选项。这将创建以下三个文件：\n\n- `NoteViewController.h`\n\
    - `NoteViewController.m`\n- `NoteViewController.xib`\n\n打开 `NoteViewController.h`。你需要添加以下内容：\n\
    \n- 一个文本字段，让用户输入笔记标题。\n- 一个文本视图，用于容纳笔记的正文。\n- 一个指向父控制器的指针，以便你可以请求父控制器保存任何新笔记。\n\
    - 一个表示当前笔记的管理对象，以便用户可以编辑现有笔记。如果当前笔记为 `nil`，代码将创建一个新笔记。\n- 一个初始化方法，用于接收父控制器和笔记对象。\n\
    - 一个方法，响应用户通过\"保存\"按钮关闭模态视图的操作。\n- 一个方法，响应用户通过\"取消\"按钮关闭模态视图的操作。\n\n`NoteListViewController.h`\
    \ 应与清单 10–7 一致。\n\n**清单 10–7.** *`NoteListViewController.h`*\n\n```\n@class NoteListViewController;\n\
    \n@interface NoteViewController : UIViewController\n{\n    UITextField *titleField;\n\
    \    UITextView *body;\n    NoteListViewController *parentController;\n    NSManagedObject\
    \ *note;\n}\n@property (strong, nonatomic) IBOutlet UITextField *titleField;\n\
    @property (strong, nonatomic) IBOutlet UITextView *body;\n@property (strong, nonatomic)\
    \ NoteListViewController *parentController;\n@property (strong, nonatomic) NSManagedObject\
    \ *note;\n\n- (id)initWithParentController:(NoteListViewController *)parentController\
    \ note:(NSManagedObject *)note;\n- (IBAction)save:(id)sender;\n- (IBAction)cancel:(id)sender;\n\
    \n@end\n```\n\n笔记视图的实现文件 `NoteViewController.m` 如下所示，见清单 10–8。请注意以下几点：\n\n- 初始化方法存储了父\
    \ `NoteListViewController` 实例和指定的 `NSManagedObject` 实例。\n- 当视图加载并调用 `viewDidLoad:`\
    \ 方法时，代码会检查 `note` 管理对象是否为 `nil`。如果是，代码将正文文本设置为\"在此处输入文本...\"，以便用户知道该怎么做。如果不是\
    \ `nil`，代码会从管理对象中取值并填充到用户界面字段中。\n- `save:` 方法再次检查当前是在编辑现有笔记还是添加新笔记。如果是编辑现有笔记，它会用用户输入的值更新\
    \ `note` 管理对象，并请求父控制器保存上下文。如果是创建新笔记，它会请求父控制器插入一个新的笔记对象，并传入用户输入的值。无论哪种情况，随后都会关闭模态视图。\n\
    - `cancel:` 方法仅关闭模态视图，丢弃所有用户输入。\n\n**清单 10–8.** *`NoteViewController.m`*\n\n```\n\
    #import \"NoteViewController.h\"\n#import \"NoteListViewController.h\"\n\n@implementation\
    \ NoteViewController\n\n@synthesize titleField, body, parentController, note;\n\
    \n- (id)initWithParentController:(NoteListViewController *)parentController_\n\
    \                        note:(NSManagedObject *)note_\n{\n    if ((self = [super\
    \ init]))\n    {\n        self.parentController = parentController_;\n       \
    \ self.note = note_;\n    }\n    return self;\n}\n\n- (void)viewDidLoad\n{\n \
    \   [super viewDidLoad];\n    if (note != nil)\n    {\n        titleField.text\
    \ = [note valueForKey:@\"title\"];\n        body.text = [note valueForKey:@\"\
    body\"];\n    }\n    else\n    {\n        body.text = @\"Type text here . . .\"\
    ;\n    }\n}\n\n- (void)viewDidUnload\n{\n    self.titleField = nil;\n    self.body\
    \ = nil;\n    [super viewDidUnload];\n}\n\n- (IBAction)save:(id)sender\n{\n  \
    \  if (parentController != nil)\n    {\n        if (note != nil)\n        {\n\
    \            [note setValue:titleField.text forKey:@\"title\"];\n            [note\
    \ setValue:body.text forKey:@\"body\"];\n            [parentController saveContext];\n\
    \        }\n        else\n        {\n            [parentController insertNoteWithTitle:titleField.text\
    \ body:body.text];\n        }\n    }\n    [self dismissModalViewControllerAnimated:YES];\n\
    }\n\n- (IBAction)cancel:(id)sender\n{\n    [self dismissModalViewControllerAnimated:YES];\n\
    }\n\n@end\n```\n\n请注意，你尚未在 `NoteListViewController` 中实现 `insertNoteWithTitle:body:`\
    \ 方法，因此该文件目前无法编译。\n\n接下来，你必须创建 `NoteViewController` 实例所控制的实际用户界面。选择 `NoteViewController.xib`\
    \ 文件，在 Interface Builder 中打开它。执行以下步骤：\n\n1. 在视图上拖入一个导航栏，并将其与视图顶部边缘对齐。将其标题改为\"\
    笔记\"。\n2. 在导航栏上拖入两个栏按钮项——一个放在左侧，一个放在右侧。\n3. 更改刚刚添加的两个栏按钮项的标签——左侧的改为\"取消\"，右侧的改为\"\
    保存\"。\n4. 按住 Ctrl 键并从\"取消\"栏按钮项拖拽到 File's Owner 图标上，然后从弹出菜单中选择 `cancel:`。\n5.\
    \ 按住 Ctrl 键并从\"保存\"栏按钮项拖拽到 File's Owner 图标上，然后从弹出菜单中选择 `save:`。\n6. 在视图左上角、导航栏下方拖入一个标签，并将其文本改为\"\
    标题：\"。\n7. 在视图上拖入一个文本字段，放在\"标题：\"标签的右侧。\n8. 在视图上拖入一个文本视图，放在\"标题：\"标签的下方，并使其填充视图的剩余部分。\n\
    9. 按住 Ctrl 键并从 File's Owner 图标拖拽到文本字段，然后从弹出菜单中选择 `titleField`。\n10. 按住 Ctrl 键并从\
    \ File's Owner 图标拖拽到文本视图，然后从弹出菜单中选择 `body`。\n\n图 10–9 展示了完成后的视图效果。请确保你完成了所有上述步骤，包括将按钮连接到你创建的操作方法（`save:`\
    \ 和 `cancel:`），以及将用户界面组件连接到相应的变量。\n\n![images](img/1009.jpg)\n\n**图 10–9.** *设置单条笔记视图*\n\
    \n为了使 `MyStash` 应用能够添加和编辑笔记，最后一步是响应用户在笔记列表视图中的两个操作来显示此模态视图。\n\n1. 点击 + 按钮以添加一条新笔记。\n\
    2. 点击列表中笔记的标题以编辑该笔记。\n\n打开 `NoteListViewController.h`，添加以下两个方法声明：一个用于在用户点击 + 按钮时显示模态视图，另一个用于插入新笔记：\n\
    \n```objectivec\n- (void)showNoteView;\n- (void)insertNoteWithTitle:(NSString\
    \ *)title body:(NSString *)body;\n```\n\n打开 `NoteListViewController.m`，导入 `NoteViewController.h`，并为这两个方法添加定义。第一个方法\
    \ `showNoteView:` 分配一个 `NoteViewController` 实例，并使用父视图控制器和一个 `nil` 的笔记进行初始化，这样将会创建一个新笔记。第二个方法\
    \ `insertNoteWithTitle:` 是 `NoteViewController` 在用户保存新笔记时调用的方法。清单 10–9 展示了这两个方法。\n\
    \n**清单 10–9.** *创建笔记的方法*\n"
- fmt: "`- (void)showNoteView`\n```\n{\n  NoteViewController *noteViewController =\
    \ [[NoteViewController alloc] \ninitWithParentController:self note:nil];\n  [self\
    \ presentModalViewController:noteViewController animated:YES];\n}\n```\n\n`- (void)insertNoteWithTitle:(NSString\
    \ *)title body:(NSString *)body`\n```\n{\n  NSManagedObjectContext *context =\
    \ [fetchedResultsController managedObjectContext];\n  NSEntityDescription *entity\
    \ = [[fetchedResultsController fetchRequest] entity];\n  NSManagedObject *newNote\
    \ = [NSEntityDescription \ninsertNewObjectForEntityForName:[entity name] inManagedObjectContext:context];\n\
    \n  [newNote setValue:title forKey:@\"title\"];\n  [newNote setValue:body forKey:@\"\
    body\"];\n\n  [self saveContext];\n}\n```\n\nNow, you need to add the + button\
    \ and the Edit button to the note list interface. Go to the `viewDidLoad:` method,\
    \ and add the Edit button on the left and the + button on the right. Wire the\
    \ + button to the `showNoteView` action. [Listing 10–10](#Chapter10.html#list_10_10)\
    \ shows the code.\n\n**Listing 10–10.** *Adding buttons in `viewDidLoad:`*\n\n\
    `- (void)viewDidLoad`\n```\n{\n  [super viewDidLoad];\n\n  // Set up the edit\
    \ and add buttons.\n  self.navigationItem.leftBarButtonItem = self.editButtonItem;\n\
    \n  UIBarButtonItem *addButton = [[UIBarButtonItem alloc] \ninitWithBarButtonSystemItem:UIBarButtonSystemItemAdd\
    \ target:self \naction:@selector(showNoteView)];\n  self.navigationItem.rightBarButtonItem\
    \ = addButton;\n}\n```\n\nAll that remains is to add support for editing a note.\
    \ When the user taps an existing note, the `tableView:didSelectRowAtIndexPath:`\
    \ method is called. In that method, grab the note that corresponds to the `indexPath`\
    \ parameter, and then allocate and initialize a `NoteViewController` instance.\
    \ This time, you pass the `note` managed object so that the existing note is edited.\
    \ The method is shown in [Listing 10–11](#Chapter10.html#list_10_11).\n\n**Listing\
    \ 10–11.** *Displaying a note when tapped*\n\n`- (void)tableView:(UITableView\
    \ *)tableView didSelectRowAtIndexPath:(NSIndexPath \n*)indexPath`\n```\n{\n  NSManagedObject\
    \ *note = [[self fetchedResultsController] objectAtIndexPath:indexPath];\n\n \
    \ NoteViewController *noteViewController = [[NoteViewController alloc] \ninitWithParentController:self\
    \ note:note];\n  [self presentModalViewController:noteViewController animated:YES];\n\
    }\n```\n\nBuild and run the application. You will see a blank screen, as before,\
    \ but now you can click the + button to add a note. If you do, you'll see the\
    \ screen shown in [Figure 10–10](#Chapter10.html#fig_10_10). Type in a note, and\
    \ click Save. Your new note should appear in the List view, as [Figure 10–11](#Chapter10.html#fig_10_11)\
    \ shows.\n\n![images](images/1010.jpg)\n\n**Figure 10–10.** *A new blank note*\n\
    \n![images](images/1011.jpg)\n\n**Figure 10–11.** *The Note List view with a note\
    \ added*\n\nYou can tap the note, and it will appear for you to edit. You can\
    \ edit it and save the changes, or you can cancel and no changes will be saved.\
    \ From the Notes List view, you can tap the Edit button to delete any notes, as\
