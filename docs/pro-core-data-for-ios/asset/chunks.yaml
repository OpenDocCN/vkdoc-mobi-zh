    \ MyStash 应用程序*\n\n### 将 NSFetchedResultsController 集成到 MyStash 中\n\n如果你现在运行 MyStash\
    \ 应用程序，你会看到预期的笔记和密码标签页。但是，你无法添加任何笔记或密码，即使你以某种方式添加了它们，也无法看到。在上一章中，你已经学习了如何使用 `NSFetchedResultsController`\
    \ 类在表格中显示数据。在本节中，你将应用相同的技术，使用两个 `NSFetchedResultsController` 实例（一个用于笔记，一个用于密码）来显示笔记和密码。\n"
- fmt: "# Creating the Fetched Results Controller\n\nTo create fetched results controllers\
    \ to display notes and passwords, start by declaring a fetched results controller\
    \ and a managed object context in `NoteListViewController.h`, shown in [Listing\
    \ 10–1](#Chapter10.html#list_10_1), and in `PasswordListViewController.h`, shown\
    \ in [Listing 10-2](#Chapter10.html#list_10_2). You'll notice that you also declare\
    \ that both controllers implement the `NSFetchedResultsControllerDelegate` protocol.\n\
    \n**Listing 10–1.** *`NoteListViewController.h`*\n\n```\n#import <UIKit/UIKit.h>\n\
    \n@interface NoteListViewController : UITableViewController<NSFetchedResultsControllerDelegate>\n\
    \n@property (strong, nonatomic) NSFetchedResultsController *fetchedResultsController;\n\
    @property (strong, nonatomic) NSManagedObjectContext *managedObjectContext;\n\n\
    @end\n```\n\n**Listing 10–2.** *`PasswordListViewController.h`*\n\n```\n#import\
    \ <UIKit/UIKit.h>\n\n@interface PasswordListViewController : UITableViewController<NSFetchedResultsControllerDelegate>\n\
    \n@property (strong, nonatomic) NSFetchedResultsController *fetchedResultsController;\n\
    @property (strong, nonatomic) NSManagedObjectContext *managedObjectContext;\n\n\
    @end\n```\n\nThe next step is to initialize the `NSFetchedResultsController` instances.\
    \ Once again, you initialize the instances in the accessors for the `fetchedResultsController`\
    \ members. Start with `NoteListViewController.m` and add `@synthesize` lines for\
    \ your two new members, like this:\n\n```\n@synthesize fetchedResultsController;\n\
    @synthesize managedObjectContext;\n```\n\nNext, add the `fetchedResultsController:`\
    \ accessor method shown in [Listing 10–3](#Chapter10.html#list_10_3).\n\n**Listing\
    \ 10–3.** *The `fetchedResultsController:` accessor*\n\n```\n#pragma mark -\n\
    #pragma mark Fetched results controller\n\n- (NSFetchedResultsController *)fetchedResultsController\n\
    {\n  if (fetchedResultsController != nil)\n  {\n    return fetchedResultsController;\n\
    \  }\n\n  // Create the fetch request for the entity.\n  NSFetchRequest *fetchRequest\
    \ = [[NSFetchRequest alloc] init];\n  NSEntityDescription *entity = [NSEntityDescription\
    \ entityForName:@\"Note\"\n                                        inManagedObjectContext:self.managedObjectContext];\n\
    \  [fetchRequest setEntity:entity];\n\n  // Set the batch size\n  [fetchRequest\
    \ setFetchBatchSize:20];\n\n  // Sort by note title, ascending\n  NSSortDescriptor\
    \ *sortDescriptor = [[NSSortDescriptor alloc] initWithKey:@\"title\"\n       \
    \                                                         ascending:YES];\n  NSArray\
    \ *sortDescriptors = [[NSArray alloc] initWithObjects:sortDescriptor, nil];\n\
    \  [fetchRequest setSortDescriptors:sortDescriptors];\n\n  // Create the fetched\
    \ results controller using the\n  // fetch request we just created, and with the\
    \ managed\n  // object context member, and set this controller to\n  // be the\
    \ delegate\n  NSFetchedResultsController *aFetchedResultsController = [[NSFetchedResultsController\n\
    \      alloc] initWithFetchRequest:fetchRequest\n            managedObjectContext:managedObjectContext\n\
    \              sectionNameKeyPath:nil\n                       cacheName:@\"Note\"\
    ];\n  aFetchedResultsController.delegate = self;\n  self.fetchedResultsController\
    \ = aFetchedResultsController;\n\n  // Fetch the results into the fetched results\
    \ controller\n  NSError *error = nil;\n  if (![[self fetchedResultsController]\
    \ performFetch:&error])\n  {\n    NSLog(@\"Unresolved error %@, %@\", error, [error\
    \ userInfo]);\n    abort();\n  }\n  return fetchedResultsController;\n}\n```\n\
    \nAdd the same `@synthesize` lines and the same method to `PasswordListViewController.m`,\
    \ changing both the entity name and the cache name from `Note` to `System` to\
    \ match the data model. Also, change the attribute used for the sort descriptor\
    \ from `title` to `name`.\n\nYour controllers can now create their fetched results\
    \ controllers. The next step is to implement the `NSFetchedResultsControllerDelegate`\
    \ protocol. Add the code in [Listing 10–4](#Chapter10.html#list_10_4) to both\
    \ `NoteListViewController.m` and `PasswordListViewController.m`.\n\n**Listing\
    \ 10–4.** *The `NSFetchedResultsControllerDelegate` protocol methods*\n\n```\n\
    #pragma mark -\n#pragma mark Fetched results controller delegate\n\n- (void)controllerWillChangeContent:(NSFetchedResultsController\
    \ *)controller\n{\n  [self.tableView beginUpdates];\n}\n\n- (void)controllerDidChangeContent:(NSFetchedResultsController\
    \ *)controller\n{\n  [self.tableView endUpdates];\n}\n\n- (void)controller:(NSFetchedResultsController\
    \ *)controller\n  didChangeSection:(id<NSFetchedResultsSectionInfo>)sectionInfo\n\
    \           atIndex:(NSUInteger)sectionIndex\n     forChangeType:(NSFetchedResultsChangeType)type\n\
    {\n  switch(type)\n  {\n    case NSFetchedResultsChangeInsert:\n      [self.tableView\
    \ insertSections:[NSIndexSet indexSetWithIndex:sectionIndex]\n               \
    \     withRowAnimation:UITableViewRowAnimationFade];\n      break;\n    case NSFetchedResultsChangeDelete:\n\
    \      [self.tableView deleteSections:[NSIndexSet indexSetWithIndex:sectionIndex]\n\
    \                    withRowAnimation:UITableViewRowAnimationFade];\n      break;\n\
    \  }\n}\n```"
