  trans: '

    ### 理解 CRUD


    无论你认为 `R` 代表读取（Read）还是检索（Retrieve），也不论你对 `D` 是更倾向于销毁（Destroy）还是删除（Delete），CRUD
    这个缩写都描述了在持久化数据存储上执行的四种操作：


    - 创建（Create）

    - 检索/读取（Retrieve/Read）

    - 更新（Update）

    - 删除/销毁（Delete/Destroy）


    这四种操作适用于所有持久化存储交互，无论你是在 iOS 应用中使用 Core Data，在 Java 企业 Web 应用中操作 Oracle 数据库，在 COBOL
    程序中处理虚拟存储存取方法（VSAM）文件，还是任何其他需要程序处理数据的场景。事实上，CRUD 概念已被扩展用于描述创建、检索、更新和删除数据的其他情形。例如，最新的
    Web 服务提供方式——表述性状态转移（REST），就被称为“Web 版的 CRUD”；HTTP 动词与 CRUD 操作的对应关系如下：


    - `POST` = 创建

    - `GET` = 检索

    - `PUT` = 更新

    - `DELETE` = 删除


    在本章中，你将构建同一个应用两次：第一次直接使用 `NSManagedObject` 实例，第二次使用继承自 `NSManagedObject` 的自定义类。本部分构建的是原始
    `NSManagedObject` 版本。借鉴 Scott Hanselman 的 Baby Smash!（[`www.hanselman.com/babysmash/`](http://www.hanselman.com/babysmash/)）的思路，这个名为
    Shapes 的应用具有以下需求和特性：


    - 每次点击屏幕，在点击位置会出现一个随机形状。

    - 该形状随机为圆形或多边形。

    - 如果是多边形，其边数随机，可以是凹形、凸形或混合形。

    - 如果是圆形，其半径随机。

    - 形状以随机颜色出现。

    - 摇动设备会删除所有形状。

    - 旋转设备会将所有形状更新为随机颜色。

    - 屏幕从中部分为两半，每个形状出现两次，每半屏幕各一次。

    - 其中一半屏幕放大 2 倍（这意味着一些形状将不会显示，因为它们会落在屏幕边界之外）。

    - Shapes 专为 iPad 构建，以利用额外的屏幕空间。


    从 Core Data 的角度来看，Shapes 演示了以下内容：


    - *创建*：每次点击屏幕时，Shapes 都会在持久化存储中创建一个形状对象。

    - *检索*：每次屏幕绘制形状时，Shapes 都会从持久化存储中检索形状。

    - *更新*：每次旋转设备时，Shapes 都会用不同的随机颜色更新持久化存储中的所有形状。

    - *删除*：每次摇动设备时，Shapes 都会从持久化存储中删除所有形状。

    - *继承*：`Polygon` 和 `Circle` 实体继承自同一个父实体 `Shape`。

    - *一对多*：一个 `Polygon` 实例关联多个 `Vertex` 实例。

    - *多对多*：多个 `Shape` 实例关联多个 `Canvas` 实例。

    - *一对一*：一个 `Canvas` 实例关联一个 `Transform` 实例，后者控制缩放。


    完成后的应用将如图 5-1 所示。


    ![images](img/0501.jpg)


    ***图 5-1.** 完成的 Shapes 应用*


    Shapes 可能无法与 BabySmash! 的趣味性相媲美，但我们也不鼓励摔砸 iPad。Shapes 展示了 Core Data 的广泛基础。不过，你会注意到
    Shapes 并未对结果进行过滤或排序，这一点将在第 6 章中介绍。


    在 Xcode 中，创建一个新项目，在 iOS 下选择 Single View Application。将其命名为 Shapes，在 Company Identifier
    中输入 `book.coredata`，并将 Device Family 设置为 iPad（如图 5-2 所示）。保存项目以便在 Xcode 中打开。


    ![images](img/0502.jpg)


    ***图 5-2.** 名为 Shapes 的新 iPad 项目*


    请注意，在 Single View Application 模板中，你无法将 Core Data 添加到应用程序，因此现在需要手动添加 Core Data。你在第
    1 章中已学习过如何操作，但这里再回顾一下：选择左侧的 Shapes 项目，转到 Build Phases 选项卡，展开 Link Binary with
    Libraries 部分，如图 5-3 所示。点击该部分下的 + 按钮，选择 `CoreData.framework`，然后点击 Add。`CoreData.framework`
    会出现在 Xcode 左侧的项目文件树中。将其拖到 Frameworks 文件夹中。


    ![images](img/0503.jpg)


    **图 5-3.** *准备将 Core Data 添加到 Shapes 应用程序*

