- fmt: '# Devices and Resolutions


    Before you start designing your app, you will need to consider where your app
    will reside and what devices will be best to run your software. The number of
    mobile devices running iOS has increased since its initial release in 2007. Today,
    designers must consider all of the various devices in Apple’s product line before
    they begin to design their apps. `Sketch` does offer templates of different sizes
    to get you started quickly with designing your app, but it’s a good idea to have
    a sense not only of the different devices, but of their resolutions as well.


    With each new release and update of the iOS operating system, Apple will occasionally
    deprecate older versions of the iPhone. With iOS8, the earliest supported device
    is now the iPhone 4S. This is not to say that the OS won’t perform on older phones,
    just that it won’t perform optimally. With iOS9’s release, the list of compatible
    devices changes somewhat. All of the currently supported iOS devices are shown
    in Figure [5-5](#A978-1-4842-1458-9_5_Chapter.html#Fig5).


    ![A978-1-4842-1458-9_5_Fig5_HTML.jpg](A978-1-4842-1458-9_5_Fig5_HTML.jpg)


    *Figure 5-5.* List of all compatible devices for iOS9


    These then represent the entire suite of devices upon which your app will operate
    when it is released. It is important to think about the different ways in which
    users interact with these devices and thus how they will interact with your app
    as well. For example, many iPad owners use the devices as a replacement for their
    desktop computers or laptops, while the iPhone is a more personal device and is
    often used on the go or while in transit. These are all conditions that will influence
    how and when users interact with your app.


    In recent years, as more devices have been released, the resolution of the devices
    has also increased, offering bigger, clearer, and crisper screens to view content.
    The very first iPhone released had a resolution of `320 × 480` pixels. However,
    when the iPhone 4S was released, it included a Retina screen. Thus while it had
    the exact same screen dimensions, its resolution was `640 × 960` pixels, roughly
    double that of the previous model. If you take the concept of squares-to-pixels
    as `1:1`, a Retina screen has double the number of pixels in the same space. As
    way of comparison, the newly released iPhone 6 Plus has a Retina HD resolution
    of `1920 × 1080` pixels on its `5.5`-inch screen. The screen resolutions of the
    iPhone 6 models are illustrated in Figure [5-6](#A978-1-4842-1458-9_5_Chapter.html#Fig6).
    When you consider all of the elements that we talked about earlier like color,
    deference, negative space, and clarity, you must consider that the level of detail
    on screens has also increased significantly.


    ![A978-1-4842-1458-9_5_Fig6_HTML.jpg](A978-1-4842-1458-9_5_Fig6_HTML.jpg)


    *Figure 5-6.* The screen resolutions and display sizes of the iPhone 6 and iPhone
    6 Plus


    With multiple devices on the market and multiple resolutions to consider for your
    designs, you will still want to create pixel-perfect designs that look great regardless
    of which device your user chooses. It’s important to understand the difference
    between points and pixels. Pixels are actually small squares that make up the
    shapes in your designs. For designers working with multiple screen sizes and resolutions,
    sharpness is important. If your designs are not crisp, the imperfections will
    show up—especially on higher-resolution screens—and they will appear blurry.


    Some designers will typically design for `1×` and then scale up to accommodate
    higher resolutions. Others will design at `2×` and then scale down to `1×` from
    there. If you start your designs at `2×`, it is always a good idea to use pair
    numbers, which will help you avoid issues if you must scale down to `1×`.


    If you are designing and the numbers of pixels in your design are not even pairs,
    you will run into issues when you attempt to export your work and also when you
    attempt to scale it for a new resolution. Here’s why: When designing for higher-resolution
    screens, the number of pixels increases exponentially. This can cause complications
    not only in design but in development for iOS. Therefore, Apple introduced the
    point system when it introduced the Retina screen with the iPhone 4S. To understand
    this better, think about the following example. The iPhone 4S and the iPhone 3G
    had the same physical dimensions. However, because of the introduction of the
    Retina screen, the resolution of the 4S essentially quadrupled the resolution
    of the screen while its dimensions remained the same. This is because Apple increased
    the number of pixels in a point. Previously, `1 point = 1 pixel`. With the advent
    of the Retina screen, `1 point = 4 pixels`. The point system makes developing
    for Retina screens easier.


    Thus if you have an image that measures `100 × 100` pixels, it will render at
    `100 × 100` pixels on a standard non-Retina screen. However, the same image on
    a Retina screen will render at `100 × 100` pixels, but it will look half the size.
    This is because the Retina screen renders the image at an increased pixel density.
    However, using the point system, the same `100 × 100` pixel image will now render
    `@2×` the size on a Retina screen in order to normalize what the user sees.


    In `Xcode`, everything is measured in points. However, in `Sketch 3`, everything
    is measured in pixels. For those who are aiming for pixel perfection in their
    designs, the number of devices and resolutions can sometimes be tricky. Designers
    are now possibly designing for three different resolutions: `@1×` (iPhone 3),
    `@2×` (iPhone 5 and iPhone 6), and `@3×` (iPhone 6 Plus).


    `Sketch` has included a feature called `Round to the Nearest Pixel Edge`. If your
    shapes do not use pairs, but use decimals or half-pixels instead, using this feature
    will help you to trim the dimensions of your design to the nearest pair value
    so that your exports and scaling can be seamless.


    Figure [5-7](#A978-1-4842-1458-9_5_Chapter.html#Fig7) shows how this works. The
    figure shows an image on the `Sketch` canvas. Note that the dimensions in the
    Inspector on the right are not paired. In fact, these dimensions include decimals.
    Assuming that the images are already `@2×`, the decimals will make it difficult
    to scale the image down to `@1×` because the dimensions will need to be divided
    yet again. This division will result in a new image that does not maintain the
    crispness of the original even-numbered design when exported for different resolutions.
    By using the `Round to the Nearest Pixel Edge` feature, you will see that the
    dimensions are rounded to whole numbers that are easily divisible to round up
    or down to additional resolutions.


    ![A978-1-4842-1458-9_5_Fig7_HTML.jpg](A978-1-4842-1458-9_5_Fig7_HTML.jpg)


    *Figure 5-7.* Using the `Round to the Nearest Pixel Edge` feature in `Sketch`'
