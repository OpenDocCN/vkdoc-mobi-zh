- fmt: 'One of the great things about Meng’s wireframing templates is that he’s a
    Sketch master and goes out of his way to ensure that his templates contain iOS
    elements in dimensions that are completely in line with the iOS guidelines. The
    templates also utilize linked styles that are great because you can easily update
    the colors to suit your taste and update the entire wireframe easily.


    Of course you can also create your own wireframes for your app by simply using
    the included iOS template that comes with Sketch or your trusty pen and paper
    to help with the process. For those who prefer to use pen and paper, you can use
    `UI Stencils`, a set of iPhone and iPad stencil kits that contain many popular
    UI elements for iOS. They also offer a line of notepads with the outline of the
    iPad and iPhones that make it easy to get started on your wireframing process.
    While not absolutely necessary, the stencils do add a layer of polish to regular
    old pen-and-paper wires. The tools are shown in Figure [7-1](#A978-1-4842-1458-9_7_Chapter.html#Fig1).
    Once you’ve crated your wires in pen and paper you can import them into `Sketch`
    to aid with the overall design process. But for now, let’s focus on actually creating
    your designs in `Sketch`.


    ![A978-1-4842-1458-9_7_Fig1a_HTML.jpg](A978-1-4842-1458-9_7_Fig1a_HTML.jpg)![A978-1-4842-1458-9_7_Fig1b_HTML.jpg](A978-1-4842-1458-9_7_Fig1b_HTML.jpg)![A978-1-4842-1458-9_7_Fig1c_HTML.jpg](A978-1-4842-1458-9_7_Fig1c_HTML.jpg)


    **Figure 7-1.** Wireframe templates in grays and blues from Meng To’s website


    ## The App


    For the purposes of this exercise, we’ve decided to create a few key screens of
    a fictional app called `PhotoBomb`. The app lets users take photographs tagged
    with geolocation information on a map of landmarks or specific locations. Users
    can view their friends’ photos and see what they did at that particular location.
    The app will use the user’s location and their camera. The users will also sign
    in using either their Facebook or Twitter accounts. We will be creating a few
    key screens of the wireframes for this app using `Sketch`. I have already made
    preliminary sketches in my notepad with pencil. I’ve made notes in terms of the
    app’s functionality, what the UI could potentially look like, and some other elements
    that are critical to the overall functionality of the app.


    From my notes


    The app is meant to be simple to use and fun, combining elements of popular social
    networking sites like Facebook and Twitter. The order of our wireframes will be
    as follows:


    The app will launch with a brief splash or intro screen containing the logo and
    introduction to the app. The user will click an `Enter` button that will take
    them to some onboarding screens that explain how the app works and how the user
    is meant to move through the various pages of the app. Users may skip the onboarding
    screens at any time and get right to the registration and authentication pages.


    A user can register via one of three ways: Facebook, Twitter, or e-mail. I’ve
    decided to show only the e-mail authentication pages in our wireframes. Users
    enter the standard e-mail and password combination and then move onto the home
    page. This is the main page in the app where the user will arrive upon entry into
    the app. Users navigate from and to all other pages in the app from here. With
    this page completed, we’ll show an example of the settings page for the app where
    users can adjust location and privacy settings, show a quick example of what the
    user’s profile page will look like, and then move onto the permissions and capture
    pages which will show custom pages for getting a user’s permission to use their
    camera and location. The last page we will wireframe will be a simple capture
    page that will illustrate our custom camera capture screen.


    The notes I’ve written out by hand are shown in Figure [7-2](#A978-1-4842-1458-9_7_Chapter.html#Fig2).
    Notes can be added to your wireframes as annotations where necessary to explain
    intended actions for your designer or your engineering team.


    ![A978-1-4842-1458-9_7_Fig2a_HTML.gif](A978-1-4842-1458-9_7_Fig2a_HTML.gif)![A978-1-4842-1458-9_7_Fig2b_HTML.gif](A978-1-4842-1458-9_7_Fig2b_HTML.gif)


    **Figure 7-2.** My notes for the PhotoBomb app. I will use these to create my
    wireframes and will add annotations where necessary


    I will refer to my pen-and-paper sketches and notes throughout the creation of
    my wireframes and use them as a guide to help me check on the screens and placement
    of specific elements, buttons, and icons along the way. If you don’t have a document
    like this, it’s a good idea to create one before you even begin your wireframes.
    You can call it your preliminary app spec and this will be a living document that
    will guide you through the creation of your wireframes.


    We will create a few specific screens from our `PhotoBomb` app to show you how
    to create wireframes before moving to the design phase.


    ### The Splash Screen


    To create our splash screen, arguably the easiest screen in the app, we only really
    need the logo and placement of the title and name of the app. Using Meng’s wireframe
    template, I duplicated an empty screen and created a new `Sketch` file called
    `PhotoBomb`. I then copied a blank screen from the template into the new file.
    This will become the splash screen of my app. Our splash screen will only have
    our logo and the name of the app on it. Human Interface Guidelines stipulate that
    the splash screen is only really on the screen for a short period of time. We
    plan to mitigate this by adding a button for registration and entry into the app.


    With the blank screen I typed the word and imported the graphic for effect to
    create the logo. Then I used a rounded rectangle shape with no fill to create
    the button. That’s the first screen as shown in Figure [7-3](#A978-1-4842-1458-9_7_Chapter.html#Fig3).
    Note that as we have learned earlier, I’ve started to name my layers appropriately
    and group elements just in case something needs to be updated on the fly later.
    All of the elements on the screen have been grouped to prevent confusion and for
    easy access.


    ![A978-1-4842-1458-9_7_Fig3_HTML.jpg](A978-1-4842-1458-9_7_Fig3_HTML.jpg)


    **Figure 7-3.** The splash screen and enter screen of our Photo Bomb app wireframes


    With our splash screen created, we can now move onto a new screen where users
    will make a choice around how they choose to authenticate and use the app.'
