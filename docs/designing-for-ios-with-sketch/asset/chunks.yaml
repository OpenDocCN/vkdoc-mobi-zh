- fmt: '# Using Standard iOS Dimensions


    We’ve already talked about using the templates that come with Sketch to begin
    designing your app, but did you also know that within those templates are standard
    elements that rarely ever change? You can make life easy for your developers once
    you hand over your Sketch files by keeping the standard elements within Apple’s
    guidelines and also by keeping your app’s UI as simple as possible. Since you
    will likely be using some of the elements from Sketch across difference artboards
    for different devices, let’s talk about how to move them across various resolutions.


    Upon opening the iOS template files, you will see that all of the iOS UI elements
    are symbols that have been created for your selection. While using these for simple
    mockups is great, a closer look will reveal that they were created `@1×` resolution,
    as shown in Figure [5-8](#A978-1-4842-1458-9_5_Chapter.html#Fig8).


    ![A978-1-4842-1458-9_5_Fig8_HTML.jpg](A978-1-4842-1458-9_5_Fig8_HTML.jpg)


    Figure 5-8. A note in the iOS UI Design Template in Sketch that lets users know
    that the symbols are created `@1×` (375pt) for designs


    This means that some adjusting will be necessary when using these standard elements
    in your designs for additional resolutions (`@2×` and `@3×`). If you attempt to
    scale the elements as is, you’ll notice that some shifting of the elements as
    a whole, as well as the individual elements that make up the symbols, will be
    needed. To do this, they will need to be ungrouped first and then scaled—first
    to 200 percent and then to 300 percent if you are also designing for the iPhone
    6 Plus. This applies to tab bars, status bars, and the like. Note that if you
    are simply creating mockups using Sketch, you can skip this exercise. However,
    if you are creating a design that will be used across multiple devices and sent
    to your developers, this is a good practice to include in your workflow. Figure
    [5-9](#A978-1-4842-1458-9_5_Chapter.html#Fig9) shows a standard UI status bar
    imported into artboards created for the iPhone 6 and iPhone 6 Plus.


    ![A978-1-4842-1458-9_5_Fig9_HTML.jpg](A978-1-4842-1458-9_5_Fig9_HTML.jpg)


    Figure 5-9. Three artboard templates with a standard UI Status bar element imported
    into each and affixed to the top. No resizing has been done on the status bar


    Looking closely at Figure [5-9](#A978-1-4842-1458-9_5_Chapter.html#Fig9), you
    will see that the status bar is at 100 percent. When untouched and unscaled, it
    fits perfectly into the iPhone 6 artboard. This version of Sketch then assumes
    that an `@1×` is 375 × 667 pixel screen dimension, but since the actual resolution
    of the screen on the iPhone 6 is much higher, resizing and scaling the elements
    for each resolution will be necessary.


    You should now be just about ready to start designing your app.


    ## Summary


    Every designer working to create apps for iOS will need to study and familiarize
    themselves with the HIGs, a set of documentation created and maintained by Apple
    to describe best practices for designers and developers. Though we’ve outlined
    the five main points as described by Apple for iOS design in this chapter, it’s
    a good idea to refer back to this documentation often as you work with the platform.


    In the next chapter, we will discuss how to set your design preferences to optimize
    your workflow. You’ll see how doing this before starting your designs will make
    it easier on you, and how it will streamline your design process.


    # 6. Optimizing Your Workflow


    If you are reading this book, you are probably new to Sketch and are either new
    to design, or coming to it from another graphics program like Photoshop or maybe
    even Fireworks. If you’re coming from another design program, you will want to
    check out this chapter because in it, I will share with you some great tips for
    optimizing your workflow.


    Typically, with graphics programs, optimizing your workflow will involve you computer’s
    hardware setup, setting preferences, saving and recovery of files, and increasing
    the overall performance of the program. But workflow also involves doing the little
    things that will help to save the most important commodity that there is—time.


    If you’re new to designing, you might still be figuring out what your workflow
    looks like. And, if you’re new to Sketch, you might have heard or read that Sketch
    will help you to complete certain design tasks quickly and shave valuable minutes
    off your workflow. Even if you’re an experienced designer, you will have an interest
    in saving time when creating your designs. This could be for your own personal
    reasons or because you need to please a client. When designing, time usually isn’t
    your friend and the faster you can get your designs done, the better.


    There are some well-known general tips, tricks, and strategies that you can use
    to speed up general tasks and there are some more specific ones that relate only
    to Sketch. In this chapter, we will focus initially on some general things you
    can do and then move onto some more Sketch-specific tips. We’ve already covered
    shortcuts back in Chapter X, so if you need to, you can add those to your list
    of things that you can do to speed things up. Once you are familiar with the list
    of shortcuts (we also cover how to create your own shortcuts), in addition to
    the tips in this chapter, you should be well on your way to speeding up your design
    process.


    It’s a good idea to mention, however, that while speed is great, it doesn’t compare
    to quality. So make sure that you’re balancing the two. No point in getting the
    work done quickly if it’ll need to be redone. Better to get it done the right
    way first.


    ## Customizing Your Workspace


    Every design program will open with defaults intact. This means that there is
    a baseline for certain settings that are in place when you open a program on first
    launch. These are set as they are to hit the lowest common denominator for designers
    using the program. It is also a blank slate upon which you can then begin to set
    things up just as you would like. You will find that most design programs are
    easily customizable. This means, you can show and hide panels and windows to your
    choosing and depending on what projects you’re working on and also what field
    you’re working in. For example, if you’re designing mainly user interfaces for
    app, your custom setup might be different from someone who is designing websites.
    Also, if you’re designing for Android, your setup just might differ from the setup
    of someone who is designing primarily for iOS or even OS X.


    You will likely be using certain tools and features more often than others and
    you can make sure that those tools are readily available to you without having
    to search for them. If you want to customize grids and rulers, you can easily
    do that so that you can set up your design to your liking as well.


    You can always refer back to [Chapter 2](#A978-1-4842-1458-9_2_Chapter.html),
    where I describe how to customize your toolbar to keep the features of Sketch
    that you use the most readily available. As you can see in Figure [6-1](#A978-1-4842-1458-9_6_Chapter.html#Fig1),
    there’s way more than meets the eye in the Sketch toolbar. The default shows icons
    and text but you can change this to show only icons or only text. You can also
    add or remove any or your favorite items to replace the ones in the default toolbar.
    This should probably be one of the first things you do to make Sketch your own.
    Set it up just the way you like and get off on the right foot with your work.
    Having frequently used icons right in the toolbar is always better than having
    them two or even three clicks away.


    ![A978-1-4842-1458-9_6_Fig1_HTML.jpg](A978-1-4842-1458-9_6_Fig1_HTML.jpg)


    Figure 6-1. Sketch lets you customize the toolbar to add your most frequently
    used items and remove the ones you don’t use as much'
