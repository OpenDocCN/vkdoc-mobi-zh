    # 使用标准 iOS 尺寸


    我们已经讨论过如何使用 Sketch 自带的模板来开始设计你的应用，但你是否也知道这些模板中包含了一些几乎一成不变的标准元素？通过遵循 Apple 的指南，并让你的应用
    UI 尽可能简单，你可以在将 Sketch 文件交给开发人员时，让他们的工作变得轻松。由于你可能会在不同设备的不同画板上使用 Sketch 中的某些元素，接下来我们来聊聊如何在不同分辨率之间移动它们。


    打开 iOS 模板文件后，你会看到所有 iOS UI 元素都是已创建好的可供选择的符号。虽然使用它们做简单的原型图很不错，但仔细看会发现，这些符号是以 `@1×`
    分辨率创建的，如图 5-8 所示。


    ![A978-1-4842-1458-9_5_Fig8_HTML.jpg](img/A978-1-4842-1458-9_5_Fig8_HTML.jpg)


    图 5-8. Sketch 的 iOS UI 设计模板中有一条注释，提示用户这些符号是按 `@1×` (375pt) 分辨率创建的


    这意味着，当你在设计中为其他分辨率（`@2×` 和 `@3×`）使用这些标准元素时，需要进行一些调整。如果你尝试直接缩放这些元素，你会注意到，需要对整个元素以及构成符号的各个元素进行位置调整。要做到这一点，你需要先取消组合，然后再缩放——先缩放到
    200%，如果你还要为 iPhone 6 Plus 做设计，再缩放到 300%。这适用于标签栏、状态栏等。注意，如果你只是用 Sketch 创建原型图，可以跳过这一步。但是，如果你正在创建一个将在多个设备上使用并交给开发人员的设计，那么这将是一个值得纳入工作流程的好习惯。图
    5-9 展示了一个标准 UI 状态栏被导入到为 iPhone 6 和 iPhone 6 Plus 创建的画板中。


    ![A978-1-4842-1458-9_5_Fig9_HTML.jpg](img/A978-1-4842-1458-9_5_Fig9_HTML.jpg)


    图 5-9. 三个画板模板，每个都导入了一个标准 UI 状态栏元素，并固定在顶部。状态栏未进行任何缩放


    仔细看图 5-9，你会看到状态栏是 100% 比例。当未进行任何调整和缩放时，它完美地适配了 iPhone 6 的画板。这个版本的 Sketch 默认 `@1×`
    对应 375 × 667 像素的屏幕尺寸，但由于 iPhone 6 屏幕的实际分辨率要高得多，因此有必要为每种分辨率调整和缩放元素。


    现在，你已经差不多可以开始设计你的应用了。


    ## 总结


    每一位为 iOS 创建应用的设计师都需要学习和熟悉 HIG——这是 Apple 创建并维护的一套文档，用于描述设计师和开发者的最佳实践。虽然我们在本章中概述了
    Apple 为 iOS 设计提出的五个要点，但在你使用该平台工作时，经常回头查阅这份文档会是个好主意。


    在下一章中，我们将讨论如何设置你的设计偏好以优化工作流程。你将看到，如何在开始设计之前做这件事会如何让你更轻松，以及它将如何简化你的设计过程。


    # 6. 优化你的工作流程


    如果你正在读这本书，那么你可能是 Sketch 的新手，要么是设计领域的新人，要么是从其他图形程序（如 Photoshop 甚至 Fireworks）转过来的。如果你是从其他设计程序转来的，你会想看看这一章，因为在这里，我将与你分享一些优化工作流程的绝佳技巧。


    通常，对于图形程序，优化工作流程涉及你的电脑硬件设置、偏好设置、文件的保存与恢复，以及提升程序的整体性能。但工作流程也包含那些能帮你节省最宝贵的资源——时间——的小事。


    如果你是设计新手，你可能还在摸索自己的工作流程是什么样子。而如果你是 Sketch 新手，你可能听说过或读到过 Sketch 能帮你快速完成某些设计任务，并为你的工作流程节省宝贵的几分钟时间。即使你是一位经验丰富的设计师，在设计时你也会对节省时间感兴趣。这可能出于个人原因，或者因为你需要取悦客户。在设计时，时间通常不是你的朋友，你能越快完成设计就越好。


    有一些众所周知的通用技巧、窍门和策略可以用来加快通用任务，也有一些更具体的技巧只适用于 Sketch。在本章中，我们将首先关注一些你可以做的通用事情，然后转向一些更针对
    Sketch 的技巧。我们已经在第 X 章中介绍过快捷键，所以如果需要，你可以将它们添加到你的提速事项清单中。一旦你熟悉了快捷键列表（我们也会介绍如何创建你自己的快捷键），再加上本章的技巧，你应该就能顺利加快你的设计过程了。


    不过，有必要提一下，虽然速度很重要，但它无法与质量相比。所以请确保你平衡了两者。如果工作需要重做，那么快速完成就没有意义了。最好一开始就用正确的方式完成。


    ## 自定义你的工作空间


    每个设计程序在打开时都会有默认设置。这意味着，当你首次启动程序时，某些设置会有一个基准线。这些设置是为了满足使用该程序的设计师们的共同基本需求而设定的。它也是一块白板，你可以在此基础上开始按照自己的喜好进行设置。你会发现大多数设计程序都很容易自定义。这意味着，你可以根据自己的选择显示或隐藏面板和窗口，具体取决于你正在进行的项目以及你从事的领域。例如，如果你主要设计应用的用户界面，你的自定义设置可能与设计网站的人不同。同样，如果你为
    Android 进行设计，你的设置可能也与主要为 iOS 甚至 OS X 进行设计的人不同。


    你可能某些工具和功能比其他用得更多，你可以确保这些工具随时可用，而无需费力去寻找。如果你想自定义网格和标尺，你也可以轻松做到，以便按照自己的喜好来设置设计。


    你可以随时回看第 2 章，我在那里描述了如何自定义你的工具栏，以便让 Sketch 中最常用的功能触手可及。如图 6-1 所示，Sketch 的工具栏远不止表面上看到的那些。默认显示图标和文本，但你可以将其改为只显示图标或只显示文本。你还可以添加或移除任何你喜欢的项目，来替换默认工具栏中的项目。这可能是让
    Sketch 为你所用的首要步骤之一。只需按照你喜欢的方式设置好，就能为你的工作开个好头。将经常使用的图标直接放在工具栏中，总比需要点击两下甚至三下才能找到要好得多。


    ![A978-1-4842-1458-9_6_Fig1_HTML.jpg](img/A978-1-4842-1458-9_6_Fig1_HTML.jpg)


    图 6-1. Sketch 允许你自定义工具栏，添加最常用的项目，并移除不常用的项目

    '
- fmt: '### Organizing Your Document


    If you are designing an app from start to finish, it is a good practice to think
    things through before you get to the design stage. Some designers use `Sketch`
    for wireframing but there are a number of tools currently on the market that allow
    you to wireframe and then import directly into `Sketch`. Others will use the old
    hand pen and paper to wireframe and iterate on an overall flow of the app before
    designing. Regardless of your approach, it is a good idea to think about how you
    will organize your document before you begin the design process. If you use pen
    and paper, you can easily take a photo of your drawing and import it directly
    into `Sketch` for reference. That way, you can use the drawing as a guide in the
    background of your designs, or side-by-side as a reference. Figure [6-3](#A978-1-4842-1458-9_6_Chapter.html#Fig3)
    shows how a paper drawing can be imported as an image into your design for reference.


    ![A978-1-4842-1458-9_6_Fig3_HTML.jpg](A978-1-4842-1458-9_6_Fig3_HTML.jpg)


    Figure 6-3.


    You can import paper drawings or wireframes for reference into `Sketch` to help
    in the design process


    With `Sketch`, you have the option of creating your entire app in ONE document
    or breaking it up into multiple documents depending on the complexity of your
    app. This is a game changer because it allows you to use `Sketch`’s infinite zoom
    feature to zoom out and see your entire app at a bird’s eye view. This is helpful
    as well when designing complex applications that have a number of different flows
    and use cases. While you can create one file for the entire app, `Sketch` allows
    you to break up your app into multiple pages so that you are able to share symbols
    across your entire document and thus your app should something change. Figure
    [6-4](#A978-1-4842-1458-9_6_Chapter.html#Fig4) shows a bird’s eye view of all
    of the screens in my app `Cast`. While `Cast` is a simple app, you can easily
    use pages to split up the major sections of your app and then use the artboards
    within those pages to outline various steps in a specific process.


    ![A978-1-4842-1458-9_6_Fig4_HTML.jpg](A978-1-4842-1458-9_6_Fig4_HTML.jpg)


    Figure 6-4.


    A bird’s eye view of multiple screens of an app laid out on one page in `Sketch`


    #### Flattening Images


    This particular process speaks to making `Sketch` as fast and efficient as possible.
    `Sketch` is a pretty lean program anyway but graphics tend to slow anything down.
    As we all know, `Sketch`’s strength isn’t in handling photographs. It can, as
    we discussed in an earlier chapter, but because `Sketch` is a vector program,
    we recommend minimal use of photographs. That being said, you may still want to
    include photographs in your designs. Apps are visual and as such there will be
    some instances where they help to bring your app a level of realism. So, creating
    a way that we can work with images is helpful.


    Because images contain significantly more information than natively created shapes
    do, they will require `Sketch` (and your computer) to use more resources when
    rendering them. Let’s say for instance, you are using a background image that
    is quite prominent in your app. This will likely mean that the image is used on
    multiple screens. But let’s complicate things by saying that there are also some
    effects that have been applied to that same layer. If you import the image, it’s
    always a good idea to make sure that the overall size has been optimized to the
    lowest file size that will maintain the best level of quality. We know that the
    larger the file size, the better the image will appear. However, you must consider
    as well whether or not there will be special effects applied to the image. If,
    for example, you will be applying the ever-popular Gaussian Blur to the image,
    you might want to consider a lower quality (and thus size) file. Once you have
    the image imported, you can then apply the effect and flatten it. This will reduce
    the overall size of your `Sketch` document and ultimately the response speed of
    your computer while the document is open. Figure [6-5](#A978-1-4842-1458-9_6_Chapter.html#Fig5)
    shows two screens using the same background image with a blur effect and that
    has been flattened prior to use. While you may not see the immediate results of
    this unless your computer’s RAM is frighteningly low, you will see the results
    in the overall file size of your document.


    ![A978-1-4842-1458-9_6_Fig5_HTML.jpg](A978-1-4842-1458-9_6_Fig5_HTML.jpg)


    Figure 6-5.


    Two files with images as backgrounds, one optimized and one not


    ### Naming Layers and Symbols


    This is a tricky one. For me, naming layers can be a real pain. I move fast when
    designing and wireframing in `Sketch`. I often don’t take the time to name layers
    as efficiently as I could. While it’s not so bad when it comes to prototyping
    or wireframing, especially if it’s just for your eyes, when you’re designing a
    product that will be shared with other designers and ultimately with developers,
    you want to make sure that you are naming your layers and symbols in a way that
    is efficient but also intuitive for others who will be using your file(s). This
    is a hard-and-fast design rule regardless of what graphics program you are working
    in. It is a best practice to create names for layers that make sense. Being witty
    or obtuse is not advised.


    If you haven’t organized your layers and they start to become unwieldy, I’ll provide
    some tips that will help you to manage them effectively. It is important to be
    able to organize your layers before you hand them off and even while you are working
    within your designs. The key is to organize your layers as you are designing before
    they get out of control.


    We talked earlier about grouping items that are related to each other in your
    designs but sometimes, it’s a good idea to group items for organization. For example,
    if you are designing an app with a tab bar, you might want to include all of the
    elements in that tab bar into one group. And, you can have a group within a group
    or nested groups as well where they make sense. So while your tab bar icons are
    in one group, if there is a group of shapes that make up a particular icon, then
    that can be a nested group within the larger tab bar group. This way, someone
    who will be working with your files can navigate to elements they need to get
    to without doing a ton of guesswork. Trust me, they will thank you for it. Figure
    [6-6](#A978-1-4842-1458-9_6_Chapter.html#Fig6) shows how I’ve organized my layers
    for the `Cast Beauty` app. The list shows major groups with their folders but
    each folder has a number of additional nested groups within and all relate to
    a singular artboard in that page.


    ![A978-1-4842-1458-9_6_Fig6_HTML.jpg](A978-1-4842-1458-9_6_Fig6_HTML.jpg)


    Figure 6-6.


    A list of named layers for an app


    When it comes to symbols, you can bet that the same is true as with layers. Using
    symbols are the key to speeding up your work when there are changes to be made
    on the fly for clients or even creative directors. If you have a document that
    consists of 10 pages and you need to update the color of a header bar, sure you
    can make the change to every artboard or screen on every page of your app. Or
    you can name the symbol something intuitive like `"header bar"` and not `"purple
    stripe"` and easily change the color once and immediately have it update everywhere
    in the document. You do not want to waste time trying to find out where the correct
    symbol is because its name doesn’t make sense. However, as with everything, be
    careful where you use them and how often. It’s a good idea if you’ve changed symbols
    across your entire design to do a bit of design QA to make sure that the changes
    you’ve made are relevant and, more importantly, accurate.'
