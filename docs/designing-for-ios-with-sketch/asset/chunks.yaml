- fmt: '### Text on a Path


    There are times when you will want to have your text aligned to something other
    than a straight line. You might want the text to follow a curve or a path. Sketch
    3 accommodates this with the `Text on a Path` feature. First you create a vector
    or path that isn’t straight. You can do this using the `Vector` tool or even using
    a shape like an oval. After you’ve created your shape, insert a text box and add
    some copy. With the copy selected, navigate to the `Type` menu and select the
    `Text on a Path` option. Once you move the text box closer to the desired shape
    or path, the copy will snap to the path along the curve, as shown in Figure [4-9](#A978-1-4842-1458-9_4_Chapter.html#Fig9).


    ![A978-1-4842-1458-9_4_Fig9_HTML.gif](A978-1-4842-1458-9_4_Fig9_HTML.gif)


    *Figure 4-9. Text on a Path feature using a vector and an oval drawing*


    ### Text Outlines


    `Text Outlines` is another great feature in Sketch that comes in handy when you’re
    looking to do something unique. Text cannot be manipulated the way that you manipulate
    shapes or to attach certain operations. With the `Text Outlines` feature in Sketch,
    you can get text to behave like shapes. To use this feature, you can add a letter
    or letters to your canvas as an example. With the letters selected, navigate to
    the `Type` menu and select the `Convert Text to Outlines` option. If you only
    typed one letter onto your canvas, when you convert that selection alone to a
    `Text Outline`, you will see that handles are attached to the letter on the screen
    and the `Layers` list will update to represent the change. What has occurred is
    that Sketch has converted the text into a shape, as shown in Figure [4-10](#A978-1-4842-1458-9_4_Chapter.html#Fig10).
    You are now able to edit that letter, just as you would any other shape.


    ![A978-1-4842-1458-9_4_Fig10_HTML.jpg](A978-1-4842-1458-9_4_Fig10_HTML.jpg)


    *Figure 4-10. The before and after states of a text layer that has been converted
    to a shape using the `Convert to Text Outlines` feature*


    If you choose to convert more than one letter or a number of letters using the
    `Text Outlines` feature, bear in mind that this can use up your computer’s resources.
    The reason for this is that converting long text items with multiple letters into
    vectors will require Sketch to create many small sub-paths. Creating sub-paths
    requires Sketch to calculate many Boolean operations on each letter in a string
    of text. If you must convert long text items, then it is always best to split
    the text into multiple layers. That way, you can convert each text item separately,
    but even this can be taxing on your computer’s resources.


    ### Anti-Aliasing and Text


    Sketch uses the native font rendering abilities of the Mac OS and, as such, there
    are some instances where the OS has no control over the appearance of text. In
    these instances, it will use sub-pixel anti-aliasing to improve the appearance
    of text on a screen. This means that red, green, and blue light are added to each
    pixel. Because each pixel is actually made up of red, blue, and green sub-pixels,
    the idea is that when observed from a normal viewing distance, such as the distance
    between you and the computer display, your eyes won’t notice the colored pixels
    and will see the text as sharply as possible.


    Sometimes, however, sub-pixel anti-aliasing and layer blending won’t work because
    it needs to be drawn on an opaque background and rendered on a transparent background.
    When Sketch can’t render fonts that are sub-pixel anti-aliased, like on an exported
    PNG, you will see it clearly because the background was transparent and could
    not be rendered.


    Since, unlike the Mac OS, the iPhone does not render text with sub-pixel anti-aliasing,
    this presents some issues when designing for iOS. Since when designing your designs
    won’t appear on the iPhone or iPad in the same way that they do your computer’s
    screen (especially if you’re designing on a Retina Mac), you will need to deactivate
    the anti-aliasing feature in your designs. (It is automatically selected by default.)
    You can disable it by navigating to the `Sketch` menu, selecting `Preferences`,
    and deselecting the option, as shown in Figure [4-11](#A978-1-4842-1458-9_4_Chapter.html#Fig11).


    ![A978-1-4842-1458-9_4_Fig11_HTML.jpg](A978-1-4842-1458-9_4_Fig11_HTML.jpg)


    *Figure 4-11. The `Preferences` pane in Sketch allows you to turn off the sub-pixel
    anti-aliasing feature for fonts*


    ### Text Styles


    Sketch also allows you to attach styles to text, which you can easily apply to
    blocks of text in your designs. For example, while you may have the same font
    in use throughout your app, you may want different weights and sizes in different
    places, such as headers, body text, and so on. This is when text styles in Sketch
    can come in handy. You can apply an unlimited number of styles to layers in your
    document and easily manage them with the `Text Inspector`.


    > **Tip:** Text styles are available within documents only. Thus they can be shared
    across pages and artboards, but NOT across different documents.


    When you initially create text on the canvas, the `Inspector` will indicate whether
    or not a style has been attributed to the selected layer on the canvas. Usually,
    when adding text initially, there is no style. Once you add properties like color,
    size, case, and so forth, you can make these attributes into a style by selecting
    the drop-down in the `Inspector`, as shown in Figure [4-12](#A978-1-4842-1458-9_4_Chapter.html#Fig12).


    ![A978-1-4842-1458-9_4_Fig12_HTML.jpg](A978-1-4842-1458-9_4_Fig12_HTML.jpg)


    *Figure 4-12. The `Text Inspector` lets you create a new text style to assign
    to any text layer in your document*


    With the drop-down selected, Sketch allows you to create a new style. By default,
    the new style will be called whatever the text reads. Thus our new style here
    will be called "WE LOVE SKETCH Text Style," and it will be highlighted so that
    you can edit the style. You are then able to change the name of the style to whatever
    you choose. In Figure [4-13](#A978-1-4842-1458-9_4_Chapter.html#Fig13), I’ve changed
    the name of the text style to "Header Text Style."


    ![A978-1-4842-1458-9_4_Fig13_HTML.jpg](A978-1-4842-1458-9_4_Fig13_HTML.jpg)


    *Figure 4-13. The `Text Inspector` lets you change the name of your style*


    Now if you are working on a completely new layer that contains text, you will
    be able to go to the `Inspector`, select the style you want to assign to it, and
    apply it.


    You can also attribute a style to text by navigating to the `Insert` menu and
    selecting `Styled Text` from the drop-down menu, as shown in Figure [4-14](#A978-1-4842-1458-9_4_Chapter.html#Fig14).


    ![A978-1-4842-1458-9_4_Fig14_HTML.jpg](A978-1-4842-1458-9_4_Fig14_HTML.jpg)


    *Figure 4-14. Sketch lets you select saved styles from the `Insert` menu as well
    as the `Text Inspector`*


    ### Summary


    Symbols are a great way to improve your workflow as you design your app. When
    designing for iOS, you can use the template included with Sketch to add native
    iOS symbols to your design. Sketch also offers the ability to manage these symbols
    as you use them across your design. Sketch also allows you to create and manage
    various text styles and effects for your designs.


    Now that we’ve covered text styles and symbols, in the next chapter we’ll talk
    about how to begin to prep for the design of your app by digging a little deeper
    into the Human Interface Guidelines created by Apple to help designers and developers
    understand best practices associated with iOS design.'
