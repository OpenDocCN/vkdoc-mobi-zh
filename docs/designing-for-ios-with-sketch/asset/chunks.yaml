- fmt: "### Noise Fill\nAn illustration of a Noise Fill style is shown in Figure [3-16](#A978-1-4842-1458-9_3_Chapter.html#Fig16).\n\
    ![A978-1-4842-1458-9_3_Fig16_HTML.jpg](A978-1-4842-1458-9_3_Fig16_HTML.jpg)\n\
    Figure 3-16. `Noise Pattern Fill on an oval`\n\nSketch allows you to add multiple\
    \ levels of fills, and it also allows you to combine fills, colors, and gradients\
    \ all on the same layer.\n\nNow notice in Figure [3-17](#A978-1-4842-1458-9_3_Chapter.html#Fig17)\
    \ that on the bottom of the pop-over in the Inspector Panel, there is a row of\
    \ fields. From left to right, they should read `Hex`, `R`, `G`, `B`, `A`. `Hex`\
    \ stands for hexadecimal code, which is a numerical representation of color in\
    \ HTML and CSS. Every color has a different Hex code. The field above the word\
    \ `Hex` is where Sketch allows you to enter the Hex code of a particular color\
    \ instead of using the color picker. The letters stand for the colors Red, Green,\
    \ and Blue. The letters below the color picker also let you know that Sketch is\
    \ in RGB mode.\n\n![A978-1-4842-1458-9_3_Fig17_HTML.jpg](A978-1-4842-1458-9_3_Fig17_HTML.jpg)\n\
    Figure 3-17. Inspector with fill attribute pop-over extended to reveal saved swatches,\
    \ Hex codes, color picker, blending, opacity options, and gradients\n\nSometimes,\
    \ you may see the letters `H`, `S`, and `B` below the color picker instead, as\
    \ is shown in Figure [3-17](#A978-1-4842-1458-9_3_Chapter.html#Fig17). `H`, `S`,\
    \ and `B` stand for Hue, Saturation, and Brightness, respectively.\n\nIf you move\
    \ your cursor around within the color picker, you will notice that the values\
    \ in the fields below (`R`, `G`, `B` or `H`, `S`, `B`) will change, as will the\
    \ Hex code. If you are in HSB mode, moving the pointer towards the top increases\
    \ the brightness, and moving the pointer left to right increases the saturation.\
    \ Typically, you will want to be in HSB mode for designs.\n\n> **Tip**  \n> You\
    \ can toggle between RGB and HSB modes by holding down the `Shift` key and clicking\
    \ the letters.\n\nYou can also save color swatches that you use often or plan\
    \ to use in the future. Sketch automatically allows you to save color swatches\
    \ right below the color picker by clicking the plus (`+`) sign at the lower-right\
    \ corner of the color picker window. Sketch will also let you save a color swatch\
    \ via the Eyedropper tool. This lets you select a color from anywhere on your\
    \ screen, even outside the program.\n\n### Gradients\nGradients are a kind of\
    \ fill that transition from one color to another. When using the Gradient tool,\
    \ Sketch will show you the points of transition, which are editable right on your\
    \ canvas.\n\n#### Linear Gradient\nAs its name suggests, the Linear Gradient tool\
    \ allows you to create a gradual blend from one color to another along a straight\
    \ line. If you select this gradient, you will see two editable points in your\
    \ layer in the canvas. Dragging each point will adjust the points on the gradient.\
    \ You can also use the gradient bar in the Inspector to adjust points in your\
    \ gradient. You may add points along the line as well simply by clicking anywhere\
    \ along the line. Each point will represent a color stop of the gradient in your\
    \ layer. These points allow you to edit and adjust the smoothness of the gradient\
    \ on your layer. To delete a stop on the line, hit the `Delete` button. The Linear\
    \ Gradient style is shown in Figure [3-18](#A978-1-4842-1458-9_3_Chapter.html#Fig18).\n\
    \n![A978-1-4842-1458-9_3_Fig18_HTML.jpg](A978-1-4842-1458-9_3_Fig18_HTML.jpg)\n\
    Figure 3-18. Linear gradient style\n\n#### Radial Gradient\nThe Radial Gradient\
    \ tool adds a larger circle to your layer. Within this larger circle, there will\
    \ be two points: one in the center that sets the center of the radius, and the\
    \ other outside of the radius, which controls its size. The Radial Gradient tool\
    \ transitions from one color to another using a circular pattern or motion. You\
    \ can expand the radius and shape of your gradient within the canvas as well.\
    \ The Radial Gradient tool is shown in Figure [3-19](#A978-1-4842-1458-9_3_Chapter.html#Fig19).\n\
    \n![A978-1-4842-1458-9_3_Fig19_HTML.jpg](A978-1-4842-1458-9_3_Fig19_HTML.jpg)\n\
    Figure 3-19. Radial Gradient tool\n\n#### Circular Gradient\nThe Circular Gradient\
    \ tool transitions clockwise around the center point of your layer. The Circular\
    \ Gradient tool is shown in Figure [3-20](#A978-1-4842-1458-9_3_Chapter.html#Fig20).\n\
    \n![A978-1-4842-1458-9_3_Fig20_HTML.jpg](A978-1-4842-1458-9_3_Fig20_HTML.jpg)\n\
    Figure 3-20. The Circular Gradient tool\n\n#### Angular Gradient\nThe Angular\
    \ Gradient tool transitions from one color to another in a counterclockwise direction\
    \ around a specific point.\n\n## Blending\nThere are a number of different blending\
    \ options available in Sketch. To see them all, you will need to click the fields\
    \ above the blending option. A drop-down menu shows you a list of all of the blending\
    \ options available for the selected shape.\n\n### Opacity\nThe opacity setting\
    \ in Sketch is layer specific, meaning that each layer can have not only its own\
    \ fill style and setting, but it can also have a different layer of opacity. You\
    \ can adjust the level of opacity for the corresponding layer by clicking the\
    \ number and adjusting the number (in percent) above the `Opacity` label.\n\n\
    One of the great things about Sketch is the ability to add a number of effects\
    \ to the same layer. Thus you can add as many fills to one layer as you choose.\
    \ They will stack up on top of each other from bottom to top. To add a fill, simply\
    \ hit the `+` button to the right of the fill section in the Inspector.\n\n###\
    \ Shadows\nShadows are great in designs because they can make your designs more\
    \ three dimensional. Even if you are working on a flat design, a shadow can help\
    \ make certain items in your design more pronounced. And even in a flat design,\
    \ you must consider elements such as light and angles, which make some elements\
    \ actually need a shadow—even if it’s subtle.\n\nWhile flat design specifically\
    \ did away with the dreaded “drop shadow,” lately the trend of using long, flat\
    \ shadows in a flat design has become popular. This effect adds depth while still\
    \ maintaining the “Flat” effect. For the most part, though, you will likely be\
    \ using shadows minimally in your designs, specifically when designing for iOS.\n\
    \nSketch has shadow settings that you will find in the Inspector that are pretty\
    \ typical for graphics programs. You can change the settings for where your shadow\
    \ appears on the `x` or `y` axis, the blur, and the spread. The same settings\
    \ apply to the inner shadows as well.\n\n> **Tip**  \n> The spread feature is\
    \ not available for text layers.\n\n## Blurs\nSketch has four different modes\
    \ for the Blurring effect: Gaussian Blur, Motion Blur, Zoom Blur, and Background\
    \ Blur. We will now discuss them in and will show you examples of a few of these\
    \ blurs.\n\n### Gaussian Blur\nThe Gaussian Blur is a staple of most graphics\
    \ programs, and it is used to reduce noise in an image as well as detail. The\
    \ effect is an even, smooth blur across the affected layer—typically an image.\
    \ The Gaussian Blur effect and all other blurs can be found at the lower-right\
    \ corner of the Inspector. It is the first selection on the list of additional\
    \ blur effects available in Sketch. You can adjust the amount of the blur in pixels\
    \ using the provided slider, which appears when you select this effect. Figure\
    \ [3-21](#A978-1-4842-1458-9_3_Chapter.html#Fig21) shows the original image on\
    \ the left and the same image with the Gaussian Blur effect applied at 4 px.\n\
    \n![A978-1-4842-1458-9_3_Fig21_HTML.jpg](A978-1-4842-1458-9_3_Fig21_HTML.jpg)\n\
    Figure 3-21. Original image on the left and the same image with the Gaussian Blur\
    \ effect applied at 4 px"
  raw: '#### Noise Fill


    An illustration of a Noise Fill style is shown in Figure [3-16](#A978-1-4842-1458-9_3_Chapter.html#Fig16).


    ![A978-1-4842-1458-9_3_Fig16_HTML.jpg](A978-1-4842-1458-9_3_Fig16_HTML.jpg)


    Figure 3-16.


    `Noise Pattern Fill on an oval`


    Sketch allows you to add multiple levels of fills, and it also allows you to combine
    fills, colors, and gradients all on the same layer.


    Now notice in Figure [3-17](#A978-1-4842-1458-9_3_Chapter.html#Fig17) that on
    the bottom of the pop-over in the Inspector Panel, there is a row of fields. From
    left to right, they should read Hex, R, G, B, A. Hex stands for hexadecimal code,
    which is a numerical representation of color in HTML and CSS. Every color has
    a different Hex code. The field above the word Hex is where Sketch allows you
    to enter the Hex code of a particular color instead of using the color picker.
    The letters stand for the colors Red, Green, and Blue. The letters below the color
    picker also let you know that Sketch is in RGB mode.


    ![A978-1-4842-1458-9_3_Fig17_HTML.jpg](A978-1-4842-1458-9_3_Fig17_HTML.jpg)


    Figure 3-17.


    Inspector with fill attribute pop-over extended to reveal saved swatches, Hex
    codes, color picker, blending, opacity options, and gradients


    Sometimes, you may see the letters H, S, and B below the color picker instead,
    as is shown in Figure [3-17](#A978-1-4842-1458-9_3_Chapter.html#Fig17). H, S,
    and B stand for Hue, Saturation, and Brightness, respectively.


    If you move your cursor around within the color picker, you will notice that the
    values in the fields below (R, G, B or H, S, B) will change, as will the Hex code.
    If you are in HSB mode, moving the pointer towards the top increases the brightness,
    and moving the pointer left to right increases the saturation. Typically, you
    will want to be in HSB mode for designs.


    Tip


    You can toggle between RGB and HSB modes by holding down the Shift key and clicking
    the letters.


    You can also save color swatches that you use often or plan to use in the future.
    Sketch automatically allows you to save color swatches right below the color picker
    by clicking the plus (+) sign at the lower-right corner of the color picker window.
    Sketch will also let you save a color swatch via the Eyedropper tool. This lets
    you select a color from anywhere on your screen, even outside the program.


    ### Gradients


    Gradients are a kind of fill that transition from one color to another. When using
    the Gradient tool, Sketch will show you the points of transition, which are editable
    right on your canvas.


    #### Linear Gradient


    As its name suggests, the Linear Gradient tool allows you to create a gradual
    blend from one color to another along a straight line. If you select this gradient,
    you will see two editable points in your layer in the canvas. Dragging each point
    will adjust the points on the gradient. You can also use the gradient bar in the
    Inspector to adjust points in your gradient. You may add points along the line
    as well simply by clicking anywhere along the line. Each point will represent
    a color stop of the gradient in your layer. These points allow you to edit and
    adjust the smoothness of the gradient on your layer. To delete a stop on the line,
    hit the Delete button. The Linear Gradient style is shown in Figure [3-18](#A978-1-4842-1458-9_3_Chapter.html#Fig18).


    ![A978-1-4842-1458-9_3_Fig18_HTML.jpg](A978-1-4842-1458-9_3_Fig18_HTML.jpg)


    Figure 3-18.


    Linear gradient style


    #### Radial Gradient


    The Radial Gradient tool adds a larger circle to your layer. Within this larger
    circle, there will be two points: one in the center that sets the center of the
    radius, and the other outside of the radius, which controls its size. The Radial
    Gradient tool transitions from one color to another using a circular pattern or
    motion. You can expand the radius and shape of your gradient within the canvas
    as well. The Radial Gradient tool is shown in Figure [3-19](#A978-1-4842-1458-9_3_Chapter.html#Fig19).


    ![A978-1-4842-1458-9_3_Fig19_HTML.jpg](A978-1-4842-1458-9_3_Fig19_HTML.jpg)


    Figure 3-19.


    Radial Gradient tool


    #### Circular Gradient


    The Circular Gradient tool transitions clockwise around the center point of your
    layer. The Circular Gradient tool is shown in Figure [3-20](#A978-1-4842-1458-9_3_Chapter.html#Fig20).


    ![A978-1-4842-1458-9_3_Fig20_HTML.jpg](A978-1-4842-1458-9_3_Fig20_HTML.jpg)


    Figure 3-20.


    The Circular Gradient tool


    #### Angular Gradient


    The Angular Gradient tool transitions from one color to another in a counterclockwise
    direction around a specific point.


    ## Blending


    There are a number of different blending options available in Sketch. To see them
    all, you will need to click the fields above the blending option. A drop-down
    menu shows you a list of all of the blending options available for the selected
    shape.


    ### Opacity


    The opacity setting in Sketch is layer specific, meaning that each layer can have
    not only its own fill style and setting, but it can also have a different layer
    of opacity. You can adjust the level of opacity for the corresponding layer by
    clicking the number and adjusting the number (in percent) above the Opacity label.


    One of the great things about Sketch is the ability to add a number of effects
    to the same layer. Thus you can add as many fills to one layer as you choose.
    They will stack up on top of each other from bottom to top. To add a fill, simply
    hit the + button to the right of the fill section in the Inspector.


    ### Shadows


    Shadows are great in designs because they can make your designs more three dimensional.
    Even if you are working on a flat design, a shadow can help make certain items
    in your design more pronounced. And even in a flat design, you must consider elements
    such as light and angles, which make some elements actually need a shadow—even
    if it’s subtle.


    While flat design specifically did away with the dreaded “drop shadow,” lately
    the trend of using long, flat shadows in a flat design has become popular. This
    effect adds depth while still maintaining the “Flat” effect. For the most part,
    though, you will likely be using shadows minimally in your designs, specifically
    when designing for iOS.


    Sketch has shadow settings that you will find in the Inspector that are pretty
    typical for graphics programs. You can change the settings for where your shadow
    appears on the x or y axis, the blur, and the spread. The same settings apply
    to the inner shadows as well.


    Tip


    The spread feature is not available for text layers.


    ## Blurs


    Sketch has four different modes for the Blurring effect: Gaussian Blur, Motion
    Blur, Zoom Blur, and Background Blur. We will now discuss them in and will show
    you examples of a few of these blurs.


    ### Gaussian Blur


    The Gaussian Blur is a staple of most graphics programs, and it is used to reduce
    noise in an image as well as detail. The effect is an even, smooth blur across
    the affected layer—typically an image. The Gaussian Blur effect and all other
    blurs can be found at the lower-right corner of the Inspector. It is the first
    selection on the list of additional blur effects available in Sketch. You can
    adjust the amount of the blur in pixels using the provided slider, which appears
    when you select this effect. Figure [3-21](#A978-1-4842-1458-9_3_Chapter.html#Fig21)
    shows the original image on the left and the same image with the Gaussian Blur
    effect applied at 4 px.


    ![A978-1-4842-1458-9_3_Fig21_HTML.jpg](A978-1-4842-1458-9_3_Fig21_HTML.jpg)


    Figure 3-21.


    Original image on the left and the same image with the Gaussian Blur effect applied
    at 4 px'
