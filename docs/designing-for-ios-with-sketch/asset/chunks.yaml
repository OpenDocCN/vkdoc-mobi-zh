- fmt: '# Be Inspired by Others


    Stealing is wrong, but when it comes to design, it’s totally ok to use other designers’
    work as inspiration for your own. For some, this may be a slippery slope and,
    to be clear, I would never advocate stealing someone else’s work. But if you’re
    new to icon design and haven’t yet developed a knack for it, then you should definitely
    spend some time on the App Store perusing some of the more popular apps, their
    design, and yes, their icons. Support these designers by downloading their apps
    and exploring their design style and aesthetic. While doing this you just might
    find some inspiration for your own app and icon. Now, let’s move onto actually
    designing our `PhotoBomb` app icon.


    ## Designing Your Icon with Sketch


    As `Sketch` is an Apple-centric product, as with other templates, the program
    comes with a template for designing your iOS icon as well. These days, it also
    offers a template for those designing for Android. But we are here to talk about
    iOS design. As such, we will further explore the template for designing your iOS
    app’s icon and subsequently use it to design our own.


    As with everything else that we’ve done so far with our fictional app, I started
    with a pencil-and-paper sketch to get the general idea out of my head. Sometimes,
    I have more than one idea and will create high-level sketches of each one. Sometimes,
    I’ll combine more than one idea into a composite. Figure [9-4](#A978-1-4842-1458-9_9_Chapter.html#Fig4)
    is a photo of a pencil-based sketch of my proposed icon for the `PhotoBomb` app.
    While it may seem rudimentary, it is enough for me to grasp the basic concepts
    that I’d like to include in the app’s icon design.


    ![A978-1-4842-1458-9_9_Fig4_HTML.gif](A978-1-4842-1458-9_9_Fig4_HTML.gif)


    Figure 9-4.


    Initial sketch for the PhotoBomb app icon


    As shown previously, the sketch shows a bomb with an image of a camera inside
    of it. The bomb is reminiscent of the bomb used in the `PhotoBomb` logo we used
    on the inside pages of the app although there are key differences in the way they
    appear. I wanted the bomb on the icon to be slightly different. So, how did I
    create the icon from this basic sketch?


    First, I started with `Sketch`’s iOS icon template. As you can see in Figure [9-5](#A978-1-4842-1458-9_9_Chapter.html#Fig5),
    the template includes all of the anticipated icon sizes once you open the template.
    There are templates for the App Store, Spotlight search, and settings. For our
    app design, we won’t use all of the other templates, so I deleted the others so
    that I could focus on the main icon. Figure [9-5](#A978-1-4842-1458-9_9_Chapter.html#Fig5)
    shows all of the templates on first launch of the App icon template.


    ![A978-1-4842-1458-9_9_Fig5_HTML.jpg](A978-1-4842-1458-9_9_Fig5_HTML.jpg)


    Figure 9-5.


    Sketch’s iOS app icon template


    ### Set the Background Color


    Once I deleted all of the other icon layers I changed the color of the background
    of the icon. I considered the lighter shade of blue we used in the app for the
    highlight color but in an effort to present a bolder icon with more contrast,
    decided to go with the darker blue used throughout the app (Hex code `4A90E2`).
    That way, whatever we do on top should stand out a bit more. One thing to note
    is that when we create an icon for inclusion in iOS, we will be submitting the
    icon as a perfect square. The rounded corners are added later by iOS. The template
    includes the rounded corners as a layer, so I will turn that layer off and focus
    on the entire artboard. From time to time, I will turn the layer on to get a sense
    of what our final icon will look like, and this toggling back and forth is represented
    in the images to follow.


    ### Creating the Bomb Icon


    Next, I set about using shapes to create the bomb icon. Here are the steps I took
    to create it.


    1. Select the `Oval` shape from the `Insert` menu.

    2. Holding down the `Shift` key, draw a perfect 700 × 700 circle.

    3. Remove the border for now and select black as the fill color.

    4. Create a rectangle of 170 × 272 by selecting it from the `Insert` menu.

    5. Give the rectangle a border radius of `11`.

    6. Move the rectangle to the upper right corner of the circle and rotate it into
    position.

    7. Create another rectangle of 322 × 158.


    ![A978-1-4842-1458-9_9_Fig6_HTML.jpg](A978-1-4842-1458-9_9_Fig6_HTML.jpg)


    Figure 9-6.


    Shows paths and shapes for each element used to create the cannonball in the PhotoBomb
    icon


    To create the fuse:


    1. Rotate the new rectangle into place so that it appears to be protruding from
    the other rectangle.

    2. Double-click the rectangle to bring up `Sketch`’s Bezier curve options.

    3. Using a combination of the straight and mirrored options, adjust the rectangle
    to add some curvature to the straight lines in the rectangle.

    4. Select all three shapes and combine them using the `Union` button from the
    `Boolean Operations` menu.


    With the steps outlined above, my icon design is shown in Figure [9-7](#A978-1-4842-1458-9_9_Chapter.html#Fig7).


    ![A978-1-4842-1458-9_9_Fig7_HTML.jpg](A978-1-4842-1458-9_9_Fig7_HTML.jpg)


    Figure 9-7.


    Basic shapes combined to create our bomb


    ### Adding Some Shine


    With our basic bomb shape created, we can move onto embellishments. I initially
    thought that I’d like to create some shine or sheen on the lower left quadrant
    of the bomb to show some light hitting it. To do this, I took the following steps:


    1. Create two identical white circles and move them a few pixels apart so that
    you are able to see both.

    2. Remove the borders for both circles.

    3. Select both and use the `Subtract` button from the `Boolean Operations` menu.

    4. Change one of the resulting shapes to a light gray color and reduce the opacity
    to 34 percent. I used Hex code `9B9B9B`.


    The results of these actions are shown in Figure [9-8](#A978-1-4842-1458-9_9_Chapter.html#Fig8).


    ![A978-1-4842-1458-9_9_Fig8_HTML.jpg](A978-1-4842-1458-9_9_Fig8_HTML.jpg)


    Figure 9-8.


    I’ve added some light hitting the bomb from the bottom'
  raw: '### Be Inspired by Others


    Stealing is wrong, but when it comes to design, it’s totally ok to use other designers’
    work as inspiration for your own. For some, this may be a slippery slope and,
    to be clear, I would never advocate stealing someone else’s work. But if you’re
    new to icon design and haven’t yet developed a knack for it, then you should definitely
    spend some time on the App Store perusing some of the more popular apps, their
    design, and yes, their icons. Support these designers by downloading their apps
    and exploring their design style and aesthetic. While doing this you just might
    find some inspiration for your own app and icon. Now, let’s move onto actually
    designing our PhotoBomb app icon.


    #### Designing Your Icon with Sketch


    As Sketch is an Apple-centric product, as with other templates, the program comes
    with a template for designing your iOS icon as well. These days, it also offers
    a template for those designing for Android. But we are here to talk about iOS
    design. As such, we will further explore the template for designing your iOS app’s
    icon and subsequently use it to design our own.


    As with everything else that we’ve done so far with our fictional app, I started
    with a pencil-and-paper sketch to get the general idea out of my head. Sometimes,
    I have more than one idea and will create high-level sketches of each one. Sometimes,
    I’ll combine more than one idea into a composite. Figure [9-4](#A978-1-4842-1458-9_9_Chapter.html#Fig4)
    is a photo of a pencil-based sketch of my proposed icon for the PhotoBomb app.
    While it may seem rudimentary, it is enough for me to grasp the basic concepts
    that I’d like to include in the app’s icon design.


    ![A978-1-4842-1458-9_9_Fig4_HTML.gif](A978-1-4842-1458-9_9_Fig4_HTML.gif)


    Figure 9-4.


    Initial sketch for the PhotoBomb app icon


    As shown previously, the sketch shows a bomb with an image of a camera in side
    of it. The bomb is reminiscent of the bomb used in the PhotoBomb logo we used
    on the inside pages of the app although there are key differences in the way they
    appear. I wanted the bomb on the icon to be slightly different. So, how did I
    create the icon from this basic sketch?


    First, I started with Sketch’s iOS icon template. As you can see in Figure [9-5](#A978-1-4842-1458-9_9_Chapter.html#Fig5),
    the template includes all of the anticipated icon sizes once you open the template.
    There are templates for the App Store, Spotlight search, and settings. For our
    app design, we won’t use all of the other templates, so I deleted the others so
    that I could focus on the main icon. Figure [9-5](#A978-1-4842-1458-9_9_Chapter.html#Fig5)
    shows all of the templates on first launch of the App icon template.


    ![A978-1-4842-1458-9_9_Fig5_HTML.jpg](A978-1-4842-1458-9_9_Fig5_HTML.jpg)


    Figure 9-5.


    Sketch’s iOS app icon template


    #### Set the Background Color


    Once I deleted all of the other icon layers I changed the color of the background
    of the icon. I considered the lighter shade of blue we used in the app for the
    highlight color but in an effort to present a bolder icon with more contrast,
    decided to go with the darker blue used throughout the app (Hex code 4A90E2).
    That way, whatever we do on top should stand out a bit more. One thing to note
    is that when we create an icon for inclusion in iOS, we will be submitting the
    icon as a perfect square. The rounded corners are added later by iOS. The template
    includes the rounded corners as a layer, so I will turn that layer off and focus
    on the entire artboard. From time to time, I will turn the layer on to get a sense
    of what our final icon will look like, and this toggling back and forth is represented
    in the images to follow.


    #### Creating the Bomb Icon


    Next, I set about using shapes to create the bomb icon. Here are the steps I took
    to create it.


    Select the Oval shape from the Insert menu.   Holding down the Shift key, and
    draw a perfect 700 × 700 circle.   Remove the border for now and select black
    as the fill color.   Create a rectangle of 170 × 272 by selecting it from the
    Insert menu.   Give the rectangle a border radius of 11.   Move the rectangle
    to the upper right corner of the circle and rotate it into position.   Create
    another rectangle of 322 × 158.


    ![A978-1-4842-1458-9_9_Fig6_HTML.jpg](A978-1-4842-1458-9_9_Fig6_HTML.jpg)


    Figure 9-6.


    shows paths and shapes for each element used to create the cannonball in the PhotoBomb
    icon  


    To create the fuse:


    Rotate the new rectangle into place so that it appears to be protruding from the
    other rectangle.   Double-click the rectangle to bring up Sketch’s Bezier curve
    options.   Using a combination of the straight and mirrored options, adjust the
    rectangle to add some curvature to the straight lines in the rectangle.   Select
    all three shapes and combine them using the Union button from the Boolean Operations
    menu.  


    With the steps outlined above, my icon design is shown in Figure [9-7](#A978-1-4842-1458-9_9_Chapter.html#Fig7).


    ![A978-1-4842-1458-9_9_Fig7_HTML.jpg](A978-1-4842-1458-9_9_Fig7_HTML.jpg)


    Figure 9-7.


    Basic shapes combined to create our bomb


    #### Adding Some Shine


    With our basic bomb shape created, we can move onto embellishments. I initially
    thought that I’d like to create some shine or sheen on the lower left quadrant
    of the bomb to show some light hitting it. To do this, I took the following steps:


    Create two identical white circles and move them a few pixels apart so that you
    are able to see both.   Remove the borders for both circles.   Select both and
    use the Subtract button from the Boolean Operations menu.   Change one of the
    resulting shapes to a light gray color and reduce the opacity to 34 percent. I
    used Hex code 9B9B9B.  


    The results of these actions are shown in Figure [9-8](#A978-1-4842-1458-9_9_Chapter.html#Fig8).


    ![A978-1-4842-1458-9_9_Fig8_HTML.jpg](A978-1-4842-1458-9_9_Fig8_HTML.jpg)


    Figure 9-8.


    I’ve added some light hitting the bomb from the bottom'
  trans: '

    # 受他人启发


    抄袭是不对的，但在设计领域，借鉴其他设计师的作品作为自己的灵感却是完全可以接受的。对有些人来说，这可能是一个危险的滑坡，需要明确的是，我绝不提倡抄袭他人的作品。但如果你刚接触图标设计，尚未培养出这方面的技巧，那么你绝对应该在
    App Store 上花些时间，仔细浏览一些更流行的应用、它们的设计，当然还有它们的图标。通过下载这些应用并探索它们的设计风格和美学来支持这些设计师。在这个过程中，你或许能为自己的应用和图标找到一些灵感。现在，我们继续来实际设计我们的
    `PhotoBomb` 应用图标。


    ## 使用 Sketch 设计你的图标


    由于 `Sketch` 是一款以苹果为中心的产品，与其他模板一样，该程序也附带一个用于设计 iOS 图标的模板。如今，它也提供了供 Android 设计师使用的模板。但我们在这里要讨论的是
    iOS 设计。因此，我们将进一步探索用于设计 iOS 应用图标的模板，并随后用它来设计我们自己的图标。


    与我们虚构应用迄今为止所做的一切一样，我也是先用铅笔和纸画出草图，把大致构思从脑子里倒出来。有时我会不止有一个想法，就会为每个想法画出粗略的草图。有时我会将多个想法融合成一个组合体。图
    9-4 是我为 `PhotoBomb` 应用提出的图标铅笔草图照片。虽然它看起来很初级，但对我而言，足以让我把握住想融入应用图标设计的基本概念。


    ![A978-1-4842-1458-9_9_Fig4_HTML.gif](img/A978-1-4842-1458-9_9_Fig4_HTML.gif)


    图 9-4.


    PhotoBomb 应用图标的初始草图


    如上所示，草图中画了一个炸弹，里面装有相机的图像。这个炸弹让人联想到我们用在应用内页面上的 `PhotoBomb` 标识中使用的炸弹，尽管它们在呈现方式上有关键差异。我想让图标上的炸弹略有不同。那么，我是如何根据这张基本草图创建出图标的呢？


    首先，我从 `Sketch` 的 iOS 图标模板开始。如图 9-5 所示，打开模板后，其中包含了所有预期的图标尺寸。这里有适用于 App Store、Spotlight
    搜索和设置等场景的模板。对于我们的应用设计，我们不会用到所有其他模板，所以我删除了它们，以便能专注于主图标。图 9-5 显示了首次打开应用图标模板时的所有模板。


    ![A978-1-4842-1458-9_9_Fig5_HTML.jpg](img/A978-1-4842-1458-9_9_Fig5_HTML.jpg)


    图 9-5.


    Sketch 的 iOS 应用图标模板


    ### 设置背景颜色


    删除所有其他图标图层后，我更改了图标背景的颜色。我考虑过使用我们在应用中用于高亮色的浅蓝色，但为了让图标更醒目、对比度更强，最终决定采用应用中从头至尾使用的深蓝色（十六进制代码
    `4A90E2`）。这样，我们在其之上做的任何设计都会更突出一些。需要注意的一点是，在创建用于 iOS 的图标时，我们会以正圆形提交图标。圆角是之后由 iOS
    系统添加的。模板中包含了一个圆角图层，所以我会先关闭该图层，专注于整个画板。我会时不时地打开该图层，以便了解最终图标的样子，接下来的图片中会展示这种来回切换的效果。


    ### 创建炸弹图标


    接下来，我开始利用形状来创建炸弹图标。以下是我创建它时采取的步骤。


    1. 从 `插入` 菜单中选择 `椭圆` 形状。

    2. 按住 `Shift` 键，绘制一个完美的 700 × 700 像素的圆。

    3. 暂时移除边框，并选择黑色作为填充颜色。

    4. 从 `插入` 菜单中选择 `矩形`，创建一个 170 × 272 像素的矩形。

    5. 将矩形的边框半径设置为 `11`。

    6. 将矩形移动到圆的右上角，并旋转到合适位置。

    7. 创建另一个 322 × 158 像素的矩形。


    ![A978-1-4842-1458-9_9_Fig6_HTML.jpg](img/A978-1-4842-1458-9_9_Fig6_HTML.jpg)


    图 9-6.


    显示用于创建 PhotoBomb 图标中炮弹的每个元素的路径和形状


    为了创建引信：


    1. 将新矩形旋转到合适位置，使其看起来是从另一个矩形中伸出来的。

    2. 双击该矩形，调出 `Sketch` 的贝塞尔曲线选项。

    3. 结合使用直线和镜像选项，调整矩形，为其直线部分增加一些弧度。

    4. 选中所有三个形状，从 `布尔运算` 菜单中选择 `联合` 按钮将它们合并。


    按照上述步骤操作后，我的图标设计如图 9-7 所示。


    ![A978-1-4842-1458-9_9_Fig7_HTML.jpg](img/A978-1-4842-1458-9_9_Fig7_HTML.jpg)


    图 9-7.


    合并基本形状以创建我们的炸弹


    ### 添加光泽


    创建完基本的炸弹形状后，我们可以继续进行点缀。我最初的想法是在炸弹的左下象限添加一些光泽或闪光，以表现出有光线照射。为此，我采取了以下步骤：


    1. 创建两个相同的白色圆形，并将它们移动几个像素的距离，以便你能同时看到两个圆。

    2. 移除两个圆的边框。

    3. 同时选中两个圆，从 `布尔运算` 菜单中选择 `减去` 按钮。

    4. 将得到的一个形状改为浅灰色，并将不透明度降低到 34%。我使用了十六进制代码 `9B9B9B`。


    这些操作的结果如图 9-8 所示。


    ![A978-1-4842-1458-9_9_Fig8_HTML.jpg](img/A978-1-4842-1458-9_9_Fig8_HTML.jpg)


    图 9-8.


    我为炸弹底部添加了一些光线照射效果

