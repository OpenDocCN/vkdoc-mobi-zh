  trans: '

    # 个人资料页面


    回顾线框图中呈现的个人资料页面，我发现它还有改进空间。目前线框图显示，页面上只有用户基本信息以及城市和州的字段。但我考虑采用与线框图中不同的设计思路。毫无疑问，在实际工作中这种情况可能会出现。在设计阶段，有时你会希望做出调整。如果你是负责线框的人，这通常不成问题。但如果不是，最好能达成共识。老实说，无论如何达成共识都是个好主意。不过我们在此假设，这个决定是由其他力量推动的，比如客户、客户经理，甚至创意总监。这意味着改动势在必行，而且宜早不宜迟。如何在设计阶段进行可能影响应用用户流程的修改？幸运的是，我们即将做出的改动不会造成这种影响，但这个问题值得探讨。如果时间允许，你可以返回线框图快速制作页面原型并修订流程。此外，获得团队全体成员的认同以快速推进也至关重要。


    同时，需要向前和向后审视几个步骤的流程，确保所做的改动不会影响整体流程和用户体验。当我审视个人资料页面的改动方案时，已经评估过这不会造成太大影响。我只是想稍微扩展页面内容。很简单，对吧？我们拭目以待。接下来讨论我打算做的改动。查看个人资料页面时，你希望了解与游戏玩法相关的用户信息。个人资料页面不仅用户本人可见，其他玩家或游戏中的好友也能查看。他们会觉得哪些信息重要？这就是我在重新设计个人资料页面时自问的一些问题。重新设计的结果如图
    8-11 所示。


    ![A978-1-4842-1458-9_8_Fig11a_HTML.jpg](img/A978-1-4842-1458-9_8_Fig11a_HTML.jpg)![A978-1-4842-1458-9_8_Fig11b_HTML.jpg](img/A978-1-4842-1458-9_8_Fig11b_HTML.jpg)


    图 8-11. 重新设计的个人资料页面，包含新内容和编辑按钮。旁边是原始线框图


    页面上的改动虽微妙，但我认为它让个人资料页面看起来更美观。我们新增了两个区域，分别显示用户关联的地点总数和好友数量，随后是个人简介信息，可置于页面底部的"关于"部分。我还为个人资料图片添加了浅蓝色边框。请记住，浅蓝色是应用主页的高亮色。这是在整个应用中保持品牌一致性的巧妙点缀。


    # 权限设置


    我提到过，如今 iOS 应用中权限页面呈现出焕然一新的外观。因此，我想在此尝试一些不同的设计。由于 PhotoBomb 需要访问用户的相机和位置信息，我添加了这些选项，让用户提前了解我们需要获取的权限。实现方式有很多种，但最成功的方法是通过有效的设计和文案。我不敢自称文案高手，所以图
    8-12 中权限页面的文案或许还需打磨，但从设计角度来看，该页面达到了预期效果。这个弹窗会在用户通过身份验证后、开始游戏前出现。用户点击确认按钮后，将看到
    iOS 提供的标准默认通知页面。


    ![A978-1-4842-1458-9_8_Fig12_HTML.jpg](img/A978-1-4842-1458-9_8_Fig12_HTML.jpg)


    图 8-12. 权限页面，带有弹窗和变暗的主页背景


    该页面的制作方法是：直接复制主页，创建一个黑色矩形覆盖屏幕，然后降低其不透明度，使主页内容透出。设计思路是：弹窗显示时主页变暗，用户关闭窗口或确认后，弹窗消失，背景恢复正常亮度。弹窗是一个圆角半径为
    11 的矩形。按钮尺寸与应用中其他按钮一致，图标来自 Pixel Love。关于图标的一点说明：我打算使用用户在与 iOS 交互时熟悉的相机图标和位置图标，因为这些图标非常接近。关闭按钮为手工绘制；我用两个长度相同、宽度为
    3 像素的矩形组成十字，然后旋转形成"X"形，再将其添加到一个圆形中。这三个形状组合成一个符号，便于重复使用。


    # 相机拍摄


    我们设计的最后一个界面是拍摄界面。根据线框图，你们还记得我们决定创建自定义相机拍摄界面，以更好地贴合应用目标。这不是必需的，但算是一个贴心设计。请注意，"X"图标为红色，对勾图标为绿色，拍照按钮采用
    PhotoBomb 专属的蓝色色调（见图 8-13）。


    ![A978-1-4842-1458-9_8_Fig13_HTML.jpg](img/A978-1-4842-1458-9_8_Fig13_HTML.jpg)


    图 8-13. PhotoBomb 相机拍摄界面


    这个最终页面标志着我们应用设计阶段的结束。我尝试挑选了对应用整体功能至关重要的页面，同时让你能够利用 Sketch 的最佳特性，使设计阶段和工作流程尽可能顺畅。现在你应该拥有了一套令人满意且得心应手的设计方案。


    下一章，我们将讨论应用图标的设计，这已成为设计阶段日益重要的环节，并且可以借助 Sketch 的优势来实现。


    # 总结


    本章我们介绍了 PhotoBomb 应用的多个页面设计。其中涉及的大部分技巧你应该已经熟悉。我们设计了欢迎界面以及构成 PhotoBomb 应用的其他主要界面。建议你回顾并熟悉每个页面各节中概述的步骤，以便能够复现它们。当然，尽管这些页面体现了一些流行效果和移动设计模式，但培养自身的设计感同样重要。因此，在复现步骤的同时，务必尝试不同的效果和自己的风格。


    形成自己的风格和视觉语言是成为设计师的重要环节。当你对自己的设计感到满意后，就可以继续设计应用图标了，这将是下一章的内容。

    '
- fmt: '# Designing Your App’s Icon


    So far, we’ve wireframed our app and designed it. You might be thinking that we’re
    just about ready to hand off the designs to be built, and in some cases, depending
    on your process and workflow, this may be true. But if you’re like me, you will
    want to continue the design process and work on your app’s icon as well. Previously
    considered an afterthought, app icon design is now pretty much its very own art
    form. For example, there are designers who focus solely on designing App icons
    as a specialty. If you do a search for app icons you’ll find lots of articles
    and discussions, some how-to’s, and even some app icon generators. A word to the
    wise: if your app’s icon is important to you, stay away from turnkey app icon
    generators.


    Your app’s icon is the first thing that users will likely see as they peruse the
    App Store. So, you want it to be unique and well designed. These days, there’s
    no excuse for a badly designed app icon. And quite honestly, having a badly designed
    icon can make the difference between a hit app with hundreds or even thousands
    of downloads and none at all. When I look through the App Store to check out new
    apps, before I read a description of what an app is or does, I look at the icon.
    If it’s not up to snuff, I keep it moving. I dare say that most consumers are
    like me. With over a million apps in the Apple App Store alone, consumers don’t
    have much time to read app descriptions and reviews. Usually, an app’s icon will
    make all the difference to them. So, it’s an important part of the design process
    and your branding and marketing for your app.


    This chapter is dedicated to app icons. We’ll discuss why an app’s icon is so
    important, what makes a great app icon, and then go through the process of designing
    an icon for our PhotoBomb app.


    First, it’s a good idea to read the Human Interface Guidelines first to see what
    Apple has to say about designing your icon. This should be your de facto go-to
    list for creating your icon. Every app needs an icon and your app will not be
    accepted into the App Store without it. So, it behooves you to think very earnestly
    about what your icon will convey about your app. The icon will be used across
    iOS to represent your app, so it will need to be reproduced in many different
    sizes.


    From the Apple’s Human Interface Guidelines, here’s a list of do’s and don’ts:


    - Use universal imagery that people will recognize.

    - Embrace simplicity.

    - Create an abstract interpretation of your app’s main idea.

    - Avoid transparency.

    - Don’t use replicas of iOS interface elements or Apple’s hardware products.


    Since icons are in use all over iOS, the Human Interface Guidelines also outline
    exactly what sizes these icons are meant to be. Since all apps must have an icon,
    there’s a handy table included for designers to reference that outlines sizes
    required for all icons and images.


    I’ve included a selection from the Human Interface Guidelines in Figure 9-1.


    ![A978-1-4842-1458-9_9_Fig1_HTML.jpg](A978-1-4842-1458-9_9_Fig1_HTML.jpg)


    **Figure 9-1.** Table from Apple’s Human Interface Guidelines showing requirements
    for icon sizes


    ## What Makes a Great App?


    With the sheer number of apps in the App Store, how do you create an app that
    grabs folks’ attention as they scroll and swipe by? Well, in addition to the points
    made by the Human Interface Guidelines, there are a few basic tenets of app icon
    design that you’ll want to bear in mind as you design your app. Let’s explore
    them.


    ### Avoid Words


    App icons are small. When a user is viewing the app charts, the size of app icons
    they see along with the app’s name are 57 × 57. That’s not very big. So, what
    can your app say without actually saying anything? Plenty. This is not to say
    that some app icons don’t have words on them. This isn’t a hard–and-fast rule.
    A scroll through the App Store will reveal that there are still plenty of app
    icons that have words on them. However, you will also note that many others don’t.
    Most of the apps with words on their icons appear to be games and whimsical apps.
    Also, consider this. Words are easy. Without words, you must really engage in
    a design exercise to think about how to convey the central idea of your app without
    telling users what to expect. Much like we discussed the overall storytelling
    involved in designing your app when we explored the onboarding pages, so too,
    we must think about how the icon engages the user visually and conveys the idea
    of the app to user before they’ve even downloaded it.


    Figure 9-2 shows some screenshots from the App Store. As you can see, this selection
    shows some of the top features and top-grossing apps in the Apple App Store at
    the time of this writing. Most of them use no words on their icons.


    ![A978-1-4842-1458-9_9_Fig2a_HTML.jpg](A978-1-4842-1458-9_9_Fig2a_HTML.jpg) ![A978-1-4842-1458-9_9_Fig2b_HTML.jpg](A978-1-4842-1458-9_9_Fig2b_HTML.jpg)
    ![A978-1-4842-1458-9_9_Fig2c_HTML.jpg](A978-1-4842-1458-9_9_Fig2c_HTML.jpg)


    **Figure 9-2.** Top charts from the Apple App Store show that most popular apps
    use no words on icons


    ### Use Colors Wisely


    The next thing you’ll want to remember when considering a design for your app
    icons is to be very careful with the colors you choose. If you have branding that
    includes a color palette already for your app, then you want to stick to that
    to be consistent. Even so, you won’t need to include all of the colors in the
    palette on your icon. Ask yourself what color represents your brand best and would
    also make your app stand out the most in the App Store. If you have a color that
    is already quite prominently used throughout your app, consider that or a shade
    of that color for use as the background for your icon.


    Contrast is great, too. If your icon features a specific or unique shape, you
    will want it to stand out against your background color. For sure, a white shape
    against a colored background is one of the more popular combinations for App Store
    icons that I’ve seen. But you can go another route if you can make it work. A
    few of my favorite app icons are shown in Figure 9-3. Among them are examples
    of some of the most popular brands we know and others which may not be as popular.
    Craftsy, for example, chose to add their name to their icon but note how it stands
    out from the background and is easy to read. Also, Green Kitchen does a great
    job of creating an icon that uses what appears to be a photograph or realistic
    design to let browsers know exactly what the brand is about.


    ![A978-1-4842-1458-9_9_Fig3_HTML.jpg](A978-1-4842-1458-9_9_Fig3_HTML.jpg)


    **Figure 9-3.** Popular app icons from the Apple App Store


    ### Keep It Simple


    Icons are small, yes. 57×57 isn’t a lot of space. But, it is still possible to
    create something that conveys your app’s main idea within that very limited space.
    The best way to do this is to keep your idea simple. The apps shown in Figure
    9-3 do the very most with the little space afforded to create an icon, and they
    do it very well. Think about how you want user to think about your app in the
    simplest of terms and then start to design around that. This will require lots
    of editing. You might start with an entire word and trim it down to one letter.
    Or you might start with a word and create an image that evokes the feeling of
    that word better than the word could. Brainstorming is helpful here and then multiple
    iterations to bring the idea down to a single visual that users will see and be
    able to associate with your app immediately. But take it from me and some of the
    best-designed apps in the App Store: simplicity is key.'
  raw: '# 9. Designing Your App’s Icon


    So far, we’ve wireframed our app and designed it. You might be thinking that we’re
    just about ready to hand off the designs to be built, and in some cases, depending
    on your process and workflow, this may be true. But if you’re like me, you will
    want to continue the design process and work on your app’s icon as well. Previously
    considered an afterthought, app icon design is now pretty much its very own art
    form. For example, there are designers who focus solely on designing App icons
    as a specialty. If you do a search for app icons you’ll find lots of articles
    and discussions, some how-to’s, and even some app icon generators. A word to the
    wise: if your app’s icon is important to you, stay away from turnkey app icon
    generators.


    Your app’s icon is the first thing that users will likely see as they peruse the
    App Store. So, you want it to be unique and well designed. These days, there’s
    no excuse for a badly designed app icon. And quite honestly, having a badly designed
    icon can make the difference between a hit app with hundreds or even thousands
    of downloads and none at all. When I look through the App Store to check out new
    apps, before I read a description of what an app is or does, I look at the icon.
    If it’s not up to snuff, I keep it moving. I dare say that most consumers are
    like me. With over a million apps in the Apple App Store alone, consumers don’t
    have much time to read app descriptions and reviews. Usually, an app’s icon will
    make all the difference to them. So, it’s an important part of the design process
    and your branding and marketing for your app.


    This chapter is dedicated to app icons. We’ll discuss why an app’s icon is so
    important, what makes a great app icon, and then go through the process of designing
    an icon for our PhotoBomb app.


    First, it’s a good idea to read the Human Interface Guidelines first to see what
    Apple has to say about designing your icon. This should be your de facto go-to
    list for creating your icon. Every app needs an icon and your app will not be
    accepted into the App Store without it. So, it behooves you to think very earnestly
    about what your icon will convey about your app. The icon will be used across
    iOS to represent your app, so it will need to be reproduced in many different
    sizes.


    From the Apple’s Human Interface Guidelines, here’s a list of do’s and don’ts:


    Use universal imagery that people will recognize.   Embrace simplicity.   Create
    an abstract interpretation of your app’s main idea.   Avoid transparency.   Don’t
    use replicas of iOS interface elements or Apple’s hardware products.  


    Since icons are in use all over iOS, the Human Interface Guidelines also outline
    exactly what sizes these icons are meant to be. Since all apps must have an icon,
    there’s a handy table included for designers to reference that outlines sizes
    requires for all icons and images.


    I’ve included a selection from the Human Interface Guidelines in Figure [9-1](#A978-1-4842-1458-9_9_Chapter.html#Fig1).


    ![A978-1-4842-1458-9_9_Fig1_HTML.jpg](A978-1-4842-1458-9_9_Fig1_HTML.jpg)


    Figure 9-1.


    Table from Apple’s Human Interface Guidelines showing requirements for icon sizes


    ## What Makes a Great App?


    With the sheer number of apps in the App Store, how do you create an app that
    grabs folks’ attention as they scroll and swipe by? Well, in addition to the points
    made by the Human Interface Guidelines, there are a few basic tenets of app icon
    design that you’ll want to bear in mind as you design your app. Let’s explore
    them.


    ### Avoid Words


    App icons are small. When a user is viewing the app charts, the size of app icons
    they see along with the app’s name are 57 × 57\. That’s not very big. So, what
    can your app say without actually saying anything? Plenty. This is not to say
    that some app icons don’t have words on them. This isn’t a hard–and-fast rule.
    A scroll through the App Store will reveal that there are still plenty of app
    icons that have words on them. However, you will also note that many others don’t.
    Most of the apps with words on their icons appear to be games and whimsical apps.
    Also, consider this. Words are easy. Without words, you must really engage in
    a design exercise to think about how to convey the central idea of your app without
    telling users what to expect. Much like we discussed the overall storytelling
    involved in designing your app when we explored the onboarding pages, so too,
    we must think about how the icon engages the user visually and conveys the idea
    of the app to user before they’ve even downloaded it.


    Figure [9-2](#A978-1-4842-1458-9_9_Chapter.html#Fig2) shows some screenshots from
    the App Store. As you can see, this selection shows some of the top features and
    top-grossing apps in the Apple App Store at the time of this writing. Most of
    them use no words on their icons.


    ![A978-1-4842-1458-9_9_Fig2a_HTML.jpg](A978-1-4842-1458-9_9_Fig2a_HTML.jpg)![A978-1-4842-1458-9_9_Fig2b_HTML.jpg](A978-1-4842-1458-9_9_Fig2b_HTML.jpg)![A978-1-4842-1458-9_9_Fig2c_HTML.jpg](A978-1-4842-1458-9_9_Fig2c_HTML.jpg)


    Figure 9-2.


    Top charts from the Apple App Store show that most popular apps use no words on
    icons


    ### Use Colors Wisely


    The next thing you’ll want to remember when considering a design for your app
    icons is to be very careful with the colors you choose. If you have branding that
    includes a color palette already for your app, then you want to stick to that
    to be consistent. Even so, you won’t need to include all of the colors in the
    palette on your icon. Ask yourself what color represents your brand best and would
    also make your app stand out the most in the App Store. If you have a color that
    is already quite prominently used throughout your app, consider that or a shade
    of that color for use as the background for your icon.


    Contrast is great, too. If your icon features a specific or unique shape, you
    will want to it to stand out against your background color. For sure, a white
    shape against a colored background is one of the more popular combinations for
    App Store icons that I’ve seen. But you can go another route if you can make it
    work. A few of my favorite app icons are shown in Figure [9-3](#A978-1-4842-1458-9_9_Chapter.html#Fig3).
    Among them are examples of some of the most popular brands we know and others
    which may not be as popular. Craftsy, for example, chose to add their name to
    their icon but note how it stands out from the background and is easy to read.
    Also, Green Kitchen does a great job of creating an icon that uses what appears
    to be a photograph or realistic design to let browsers know exactly what the brand
    is about.


    ![A978-1-4842-1458-9_9_Fig3_HTML.jpg](A978-1-4842-1458-9_9_Fig3_HTML.jpg)


    Figure 9-3.


    Popular app icons from the Apple App Store


    ### Keep It Simple


    Icons are small, yes. 57×57 isn’t a lot of space. But, it is still possible to
    create something that conveys your app’s main idea within that very limited space.
    The best way to do this is to keep your idea simple. The apps shown in Figure
    [9-3](#A978-1-4842-1458-9_9_Chapter.html#Fig3) do the very most with the little
    space afforded to create an icon, and they do it very well. Think about how you
    want user to think about your app in the simplest of terms and then start to design
    around that. This will require lots of editing. You might start with an entire
    word and trim it down to one letter. Or you might start with a word and create
    an image that evokes the felling of that word better than the word could. Brainstorming
    is helpful here and then multiple iterations to bring the idea down to a single
    visual that users will see and be able to associate with your app immediately.
    But take it from me and some of the best-designed apps in the App Store: simplicity
    is key.'
  trans: '

    # 设计你的应用图标


    到目前为止，我们已经为应用绘制了线框图并完成了设计。你可能会认为我们已准备好将设计交付开发，在某些情况下，这取决于你的流程和工作方式，确实如此。但如果你和我一样，你会希望继续设计过程，同时着手设计应用图标。过去，应用图标设计常被视为事后考虑，如今它几乎已成为一门独立的艺术形式。例如，有些设计师专门以设计应用图标为专长。如果你搜索应用图标，会发现大量文章和讨论、一些教程，甚至还有一些应用图标生成器。给你一句忠告：如果你重视应用图标，请远离那些一键式应用图标生成器。


    你的应用图标很可能是用户在浏览 App Store 时首先看到的东西。因此，你希望它既独特又设计精良。如今，设计糟糕的应用图标已毫无借口可言。坦白说，一个设计糟糕的图标可能决定你的应用是成为拥有成百上千次下载的热门应用，还是无人问津。当我在
    App Store 浏览新应用时，在阅读应用描述或功能介绍之前，我会先看图标。如果它不够格，我就会直接划走。我敢说大多数消费者都和我一样。仅 Apple App
    Store 就有超过一百万个应用，消费者没有太多时间阅读应用描述和评论。通常，应用图标对他们来说起着决定性作用。因此，它是设计过程以及应用品牌营销的重要组成部分。


    本章专门讨论应用图标。我们将探讨应用图标为何如此重要，什么造就了一个出色的应用图标，然后为我们的 PhotoBomb 应用设计一个图标。


    首先，最好先阅读《人机界面指南》，看看 Apple 对图标设计有何建议。这应当是你创建图标时实际遵循的清单。每个应用都需要图标，没有图标，你的应用将无法被
    App Store 接受。因此，你需要非常认真思考你的图标将传达关于应用的什么信息。该图标将在 iOS 系统中用于代表你的应用，因此需要以多种不同尺寸进行复制。


    以下是 Apple 《人机界面指南》中的一份“该做与不该做”清单：


    - 使用人们能识别的通用图像。

    - 追求简洁。

    - 对你应用的核心概念进行抽象诠释。

    - 避免使用透明效果。

    - 不要复制 iOS 界面元素或 Apple 硬件产品。


    由于图标在 iOS 系统中随处可见，《人机界面指南》也精确列出了这些图标应有的尺寸。由于所有应用都必须有图标，指南中附有一张便捷的表格供设计师参考，其中列出了所有图标和图像所需的尺寸。


    我在图 9-1 中收录了《人机界面指南》中的部分内容。


    ![A978-1-4842-1458-9_9_Fig1_HTML.jpg](img/A978-1-4842-1458-9_9_Fig1_HTML.jpg)


    **图 9-1.** Apple 《人机界面指南》中显示图标尺寸要求的表格


    ## 什么造就了一个出色的应用？


    面对 App Store 中海量的应用，你如何打造一款能在用户滑动浏览时抓住他们眼球的应用？除了《人机界面指南》提出的要点外，应用图标设计还有一些基本原则，你在设计应用时需要牢记在心。让我们来探讨一下。


    ### 避免使用文字


    应用图标很小。当用户查看应用排行榜时，他们看到的应用图标与应用名称的尺寸是 57 × 57 像素。这并不大。那么，你的应用如何在不使用文字的情况下传达信息呢？其实可以传达很多信息。这并不是说有些应用图标上完全没有文字，这并非硬性规定。浏览一下
    App Store 你会发现，仍然有很多应用图标带有文字。然而，你也会注意到，许多其他应用图标没有文字。大多数带有文字的应用图标似乎是游戏或趣味应用。另外，请考虑这一点：使用文字很容易。不用文字，你就必须真正投入一项设计练习，思考如何在不直接告诉用户预期内容的情况下，传达应用的核心概念。就像我们在探讨引导页时讨论的总体叙事设计一样，我们同样必须思考图标如何从视觉上吸引用户，并在用户下载应用之前就将应用的理念传达给他们。


    图 9-2 展示了 App Store 中的一些截图。如你所见，这个选集展示了撰写本文时 Apple App Store 中部分精选和收入最高的应用。它们中的大多数图标上都没有使用文字。


    ![A978-1-4842-1458-9_9_Fig2a_HTML.jpg](img/A978-1-4842-1458-9_9_Fig2a_HTML.jpg)
    ![A978-1-4842-1458-9_9_Fig2b_HTML.jpg](img/A978-1-4842-1458-9_9_Fig2b_HTML.jpg)
    ![A978-1-4842-1458-9_9_Fig2c_HTML.jpg](img/A978-1-4842-1458-9_9_Fig2c_HTML.jpg)


    **图 9-2.** Apple App Store 的热门排行榜显示，大多数流行应用的图标上没有文字


    ### 明智地使用色彩


    设计应用图标时，其次要记住的是要非常谨慎地选择颜色。如果你已有包含配色方案的品牌标识，那么应坚持使用该配色以保持一致性。即便如此，你也不必在图标中使用配色方案中的所有颜色。问问自己，哪种颜色最能代表你的品牌，同时也能让你的应用在
    App Store 中最出挑。如果你的应用已经大量使用某种颜色，可以考虑将该颜色或其色调用作图标的背景。


    对比度也很重要。如果你的图标具有特定或独特的形状，你会希望它在背景色中脱颖而出。当然，白色形状搭配彩色背景是我见过的 App Store 图标中最流行的组合之一。但如果你能驾驭，也可以选择其他路线。图
    9-3 展示了我最喜欢的一些应用图标。其中包括一些我们熟知的最受欢迎品牌的例子，以及其他可能不那么受欢迎的例子。例如，Craftsy 选择将他们的名称添加到图标中，但请注意它是如何从背景中突显出来并易于阅读的。此外，Green
    Kitchen 非常出色地创建了一个使用照片或逼真设计的图标，让浏览者一眼就能明白该品牌的定位。


    ![A978-1-4842-1458-9_9_Fig3_HTML.jpg](img/A978-1-4842-1458-9_9_Fig3_HTML.jpg)


    **图 9-3.** Apple App Store 中受欢迎的应用图标


    ### 保持简洁


    图标很小，没错。57×57 像素的空间不大。但是，仍然有可能在这个有限的空间内创造出传达应用核心概念的东西。最好的方法就是保持想法简单。图 9-3 中展示的应用在创建图标时充分利用了那点小空间，并且做得非常出色。思考你希望用户如何以最简单的方式理解你的应用，然后围绕这一点开始设计。这将需要大量修剪。你可能从整个单词开始，最终缩减到一个字母。或者从某个词开始，创建一个比这个词本身更能唤起其感觉的图像。头脑风暴在此很有帮助，然后通过多次迭代将想法浓缩成一个单一的视觉元素，用户看到它就能立即联想到你的应用。但请相信我，以及
    App Store 中一些设计最佳的应用：简洁是关键。

