- fmt: '# Raster vs. Vector


    You might be asking yourself, “So, aside from price and the user interface, how
    exactly does `Sketch` differ from `Photoshop`?” It’s important to know and understand
    the differences between the two. To be clear, there are some things that `Photoshop`
    can do that `Sketch` simply cannot and it wasn’t meant to do them. Where `Sketch`
    really shines is in interface design. In fact, it seems to be have been built
    specifically for this purpose. As such, it allows UI designers a greater feature
    set that is tailor-made for their needs.


    One of the main differences, however, is that `Sketch` is a vector-based tool
    and `Photoshop` is not. `Photoshop` is a photoediting tool and was not intended
    as an optimal Web or mobile UI design tool. As mentioned in my last book, (Learn
    Design for iOS Development, Apress, 2014) `Fireworks` came the closest as a reasonable
    alternative for UI design. But the app failed to catch on and, as a result, `Adobe`
    stopped supporting it in 2013.


    Arguably, in `Photoshop`, the percentage of its features that are really useful
    for UI design is estimated to be roughly 20 percent. This means that designers
    were downloading and using a program of almost 1GB the last time I checked in
    which 80 percent of the features were not useful to them or even created with
    them in mind. Indeed, `Photoshop` as its name implies, was intended to be a tool
    for the editing and manipulation of photos. Hence, it is raster-based, meaning
    that each image is made up of pixels that are then arranged to display an image.


    One great thing about raster images is that they can display lots of colors and
    allow editors to get beautiful lighting and shading effects using the raster format.
    Unfortunately, they can’t be displayed larger than they are without losing some
    quality. As such, they yield pretty huge files. Try blowing up a raster image,
    and you’ll lose quality fast. Zooming in will reveal each individual pixel that
    makes up the image. Designers have understood for years that `Photshop` was initially
    developed as a raster-editing tool. Indeed, `Photoshop` was created by some amateur
    photographers and programmers for the purpose of displaying their photography.
    Some would say that a more worthy comparison would be between `Fireworks` and
    `Sketch`. However, this became a moot point when `Adobe` stopped supporting `Fireworks`
    in 2013. The program is still being offered as a part of `Creative Cloud`, but
    `Adobe` has no plans to continue offering fixes for the program.


    `Sketch` is a 100-percent vector-based tool. A vector is made up of points, lines,
    curves, and, most importantly, math. In [Chapter 3](#A978-1-4842-1458-9_3_Chapter.html),
    we’ll see how `Sketch` allows designers to edit numerical values to change the
    way a shape appears on the screen. When viewing raster and vector images with
    the naked eye, they may look the same. But zooming in, you will see that, as mentioned
    previously, a raster image, because it is made up of pixels, loses its quality
    the further you enlarge it. Curves in particular will appear blurred on raster
    images. Zooming in on a vector image yields a different view. Regardless of how
    much you zoom in, a vector image will maintain its quality and will remain crisp
    and clear regardless of size on a curve.


    Why is this important? Because more and more, designers are being asked to design
    for a variety of screen sizes and resolutions, especially when it comes to mobile
    devices. With vectors created in `Sketch`, you save yourself the hassle of designing
    at `@2×` as you would in `Photoshop` to accommodate the growing number of screen
    sizes and resolutions now available on the market. Also, `Sketch` allows you to
    design in pixels, which is what most interfaces are measured in these days.


    Figure [1-5](#A978-1-4842-1458-9_1_Chapter.html#Fig5) shows the difference when
    zoomed in on how raster and vector images appear. This has huge ramifications
    for designers who must designs across platforms and for Retina screens, which
    are quickly becoming the norm in mobile displays, particularly for iOS.


    ![A978-1-4842-1458-9_1_Fig5_HTML.jpg](A978-1-4842-1458-9_1_Fig5_HTML.jpg)


    Figure 1-5.


    A vector shape viewed at 400 percent in Sketch 3


    Note in Figure [1-5](#A978-1-4842-1458-9_1_Chapter.html#Fig5) the smoothness of
    the curve of the circle shape created in `Sketch`. When not zoomed in, vectors
    and rasters look more or less the same, and it may be hard to tell them apart.
    Once you zoom in, however, you will see that the curve of the circle that is a
    vector will be razor sharp.


    In graphics, vector shapes are created using Bezier curves. Typically, vector
    shapes have two points that are controlled by handles. Each point allows the user
    to manipulate the curve. The final result is drawn based on the positions of the
    points. We will discuss Bezier curves in [Chapter 3](#A978-1-4842-1458-9_3_Chapter.html)
    when we move onto shapes, but this is the gist of working with vectors and how
    they maintain their sharpness. Vectors can be scaled to any size regardless of
    how much you zoom in or how large the image becomes. This is critical for designers,
    and it has become one of the flagship features of `Sketch`.


    Figure [1-6](#A978-1-4842-1458-9_1_Chapter.html#Fig6) shows a circle shape created
    in `Adobe Photoshop`. Note the jagged, rounded edges of the circle. The raster
    is made up of pixels, and once zoomed in, or if the image size is increased, you
    will see that pixelation is especially evident at the circle’s border.


    ![A978-1-4842-1458-9_1_Fig6_HTML.jpg](A978-1-4842-1458-9_1_Fig6_HTML.jpg)


    Figure 1-6.


    A raster shape viewed at 200 percent in Adobe Photoshop


    Because `Sketch` is vector graphic tool, any shapes created within the application
    will retain their quality when scaling.


    As a designer, it is important to have options, and having access to a tool created
    specifically with designers in mind is essential. Also, it is important to note
    that using `Sketch` does not bar one from continuing to use `Photshop` and `Creative
    Cloud`. It is entirely possible to use both, and I believe that some designers,
    in fact, do use both. What `Sketch` brings to the table for designers is a new
    level of flexibility and a more refined workflow. If, as a designer, your focus
    is on user interface or icon design, then you must consider that for some, the
    cost of `Adobe Creative cloud` can be prohibitive.


    The vast majority of designers have long opted for Macs over PCs for work, and
    indeed Apple’s focus on design and creativity has been touted for years. Johnny
    Ive is a modern-day hero for creative designers worldwide. His partnership with
    Steve Jobs led to the creation of some of the most iconic products that the world
    had ever seen. Among them, the candy-colored iMac, sleek white MacBooks, and eventually
    the iPhone and iPad. Designers have idolized Ive for years, and since Steve Jobs’
    passing, Ive has helped to keep the company at the forefront of design. `Sketch`
    caters specifically to designers, and its price point made it immediately attractive
    for those who were interested in giving it a try. Its close alignment with Apple
    made it easy for designers to explore the new tool.


    A major feature of `Sketch 3` is its speed. Coming in at only 32MB, the program
    is fast, as it takes up less processing power on newer, Intel-based Macs with
    Retina screens. Version 3 was also rebuilt especially for Macs and optimized for
    OS X and it responds well to users’ needs. It allows designers to create and view
    an entire project using its artboard system and still maintain a relatively small
    footprint. Anyone using `Photoshop` is aware that PSDs can run well into multiple-gigabyte
    sizes for complex projects with lots of screens.'
