  trans: '

    ### 智能参考线


    在画布上移动形状时，可能会注意到偶尔出现的带有数字的红色线条。这些线条被称为智能参考线。它们能帮助您在图层中测量和对齐元素。数字会显示两个图层之间的距离，如图
    2-11 所示，而参考线则能帮助您将一个图层与另一个图层对齐。


    ![A978-1-4842-1458-9_2_Fig11_HTML.jpg](img/A978-1-4842-1458-9_2_Fig11_HTML.jpg)


    图 2-11. 智能参考线显示两个图层之间的距离


    **提示：** 按住 `Option` 键的同时将鼠标悬停在两个图层上，会显示这两个图层之间的距离，以及它们是否对齐。


    ## 画板


    如果您使用过 Adobe Illustrator，可能对画板的概念很熟悉。画板允许您为 Sketch 的无限画布定义边界。它会创建与特定设备或屏幕对应的设定尺寸，供您在其中进行设计。


    您可以通过点击左上角的 `Insert` 按钮并从菜单中选择 `Artboard` 来在 Sketch 中创建画板。您可以创建自己的画板，或者幸运的是，对于为
    iOS 进行设计的人来说，Sketch 附带了一些预设尺寸的模板，让您可以轻松上手。这样，您只需为设计选择合适的尺寸，就能直接开始工作。


    您可以在 Sketch 的一个画板中创建整个应用程序，这非常有用。这是一种方便的方式，可以查看整个应用的外观，而无需为每个屏幕浏览多个不同的文件。它还为 Sketch
    的无限画布增加了一些约束。画板会根据您所针对的设备，创建一个正确尺寸的边界。


    从 `Insert` 按钮菜单中选择 `Artboard` 后，各种模板会出现在 Sketch 窗口的左侧。Sketch 提供了 iPad（竖屏、横屏和 Retina）以及
    iPhone（竖屏、横屏和 Retina）的模板，如图 2-12 所示。此外，还有 iOS 图标的模板。


    ![A978-1-4842-1458-9_2_Fig12_HTML.jpg](img/A978-1-4842-1458-9_2_Fig12_HTML.jpg)


    图 2-12. Sketch 3 中的预设画板模板


    您会注意到，选择一个画板模板后，画布上会添加相应的画板，同时左侧的图层面板中也会出现一个图层。图层的标题将与模板相对应。要更改图层名称，您可以像重命名其他文件一样，双击它然后重新命名。


    如果您为 iPhone 等设备选择了一个模板，Sketch 会创建一个尺寸与该设备匹配的画板。您还可以在一个画布上拥有多种画板。例如，如果您正在创建一个需要同时在
    iPhone 和 iPad 上运行的通用应用，这将非常有用。在这种情况下，您可以添加 iPhone 和 iPad 的模板，并展示该应用在两个设备上的显示效果。这对于呈现您的作品来说是一种很好的方式。


    您可以重新排列、复制甚至导出您的画板，以适应您的设计需求。在 Sketch 中，有几种复制画板的方法。您可以复制粘贴画板，然后使用参考线手动排列它们，或者使用
    Sketch 方便的 `Make Grid` 功能。此功能只需点击几下就能复制画板。只需从菜单中选择 `Arrange`，然后从下拉菜单中选择 `Make
    Grid`，如图 2-13 所示。通过更改 `Rows` 和 `Columns` 字段中的数值来选择要复制的画板数量，完成后点击 `Make Grid`。Sketch
    会根据您的选择自动复制画板，并将它们在画布上对齐。


    ![A978-1-4842-1458-9_2_Fig13_HTML.jpg](img/A978-1-4842-1458-9_2_Fig13_HTML.jpg)


    图 2-13. Sketch 3 中的 `Make Grid` 功能可帮助您复制和对齐画板


    画布上的画板构成了您设计的整体结构。然而，有时您会希望或需要将画板分开。例如，如果您的设计极其复杂，并且希望使用多个画板来代表特定的流程，那么将设计分解成多个页面可能会更有好处。Sketch
    支持这一功能。在画布的左上角，`Layers` 列表的上方，您会看到当前正在处理 `Page 1`。要添加页面，只需点击右侧看起来像向下箭头的按钮。点击后，该按钮会变成一个加号
    (`+`) 符号，这样您就可以为您的设计添加后续页面。


    ## 标尺和参考线


    首次打开 Sketch 时，您不会看到任何标尺或参考线。这是因为它们默认是隐藏的。您可以通过点击工具栏中的 `View` 图标来访问标尺。这会显示一个下拉菜单，允许您从标尺、网格和其他布局选项中进行选择，如图
    2-14 所示。显示像素的选项也在这个菜单中。这些工具的目的是帮助您正确地对齐设计中的元素。


    ![A978-1-4842-1458-9_2_Fig14_HTML.jpg](img/A978-1-4842-1458-9_2_Fig14_HTML.jpg)


    图 2-14. 从工具栏展开后的 `View` 菜单下拉选项


    以下是各种选择及其含义：


    ### 显示像素


    `Show Pixels` 选项将以像素模式在屏幕上显示您的元素。当您想了解基于矢量的设计在浏览器等环境中以像素形式呈现的效果时，这会很有帮助。


    ### 显示标尺和参考线


    由于 Sketch 的无限画布特性，标尺不像其他图形设计程序中那样固定。这意味着您可以移动它们以适应您的设计。例如，如果您正在为预设画板模板中未包含的屏幕尺寸进行设计，您可以在画布上创建这些尺寸，并将其用作设计中的参考。当然，如果您移动了
    Sketch 标尺的原点，原点之前的任何内容都会以负数显示。图 2-14 显示了一个调整了标尺的 Sketch 画布。如果因为某些原因需要重置标尺，只需点击水平和垂直标尺线相交的地方即可。这会将标尺恢复为其原始度量。


    您可以通过点击标尺上的任意位置来在画布上添加参考线。参考线会显示为红色线条，并在您移除它们之前一直存在。图 2-14 已激活了参考线和标尺。水平和垂直标尺的原点也已调整。


    ### 显示网格


    激活 `Show Grid` 功能后，画布上会创建网格线。这是一个典型的网格，由相交的线条绘制成方格，如同大多数图形程序中的常规设置。默认情况下，网格每 10
    个方格会显示一条粗黑线。网格的默认大小为 20 像素。图 2-15 已激活网格功能。您也可以调整此设置。您需要返回 `View` 菜单，并从菜单中选择 `Grid
    Settings`。这将打开一个窗口，允许您更改网格块的大小和颜色，以及粗线出现的频率。


    ![A978-1-4842-1458-9_2_Fig15_HTML.jpg](img/A978-1-4842-1458-9_2_Fig15_HTML.jpg)


    图 2-15. Sketch 画布上的网格线


    ### 显示布局


    `Show Layout` 网格是 Sketch 中可用的另一种网格。它允许您定义列和行。如果您正在使用 Sketch 进行网页设计，您的网格设置会有所不同，您可能需要改用布局网格。这些网格也可以根据您的需求进行修改。

