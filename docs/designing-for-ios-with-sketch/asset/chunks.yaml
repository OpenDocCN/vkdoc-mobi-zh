- fmt: '### Alpha Mask


    An Alpha mask allows you to apply a gradient effect as a mask. It works in the
    same way as the Outline mask. To see this effect, you need to select `Alpha mask`
    from your Layer drop-down, and you will need to edit the color gradient and settings
    in the Inspector at the right, since the gradient is what determines the fill,
    as opposed to the shape in the Outline mask. You can then adjust the transparency
    and select the appropriate gradient setting, depending on the effect that you
    would like to create.


    ## Flattening


    Flattening is the process by which you remove the hierarchy of paths and sub-paths
    that make up a shape. If you are familiar with other graphics programs, you may
    have gotten into the habit of flattening layers to reduce file size and possibly
    to improve performance, since large file sizes tend to slow down a computer. Sketch
    is no different in this respect. Multiple pages, artboards, and effects can slow
    things down significantly. However, if you have a number of shapes that consist
    of more than just a few sub-paths and intersects, it can be a good idea to flatten
    them in order to keep them as clean and consistent as possible, and it’s just
    good design to do so. Flattening will remove extraneous vector points and Bezier
    curves and make your exported file smaller as well.


    ## Scaling


    Scaling in Sketch happens in two very distinct ways. Let’s discuss them both since
    they will produce very different results on your shapes. If you have a particular
    shape on your canvas, arguably the easiest way to scale that shape up to make
    a bigger shape is to select and drag the handles of the shape to your desired
    size. You will notice that the dimensions in the Inspector will also adjust automatically
    as you are adjusting the corners of the shape. However, if you have a shape with
    an outline or effect attached to it, then dragging to scale will only increase
    the overall size of the total image. The actual border and any additional associated
    effects will not increase in a way that is proportional to the image. If that
    is your overall desired effect, then it is fine. However, if it is not, you might
    be wondering how to change this.


    If you’d like to scale the shape as well as its associated effects (including
    borders, shadows, and other effects), then you will need to use the `Scale` function.


    You can access the `Scale` function from the toolbar by clicking the `Scale` button.
    Once you’ve selected it, a window appears which allows you to change the dimensions
    of your shape. The window contains editable fields (`height`, `width`, and `scale`)
    which allow you to change their values, thus scaling the layer appropriately.


    Figure [3-14](#A978-1-4842-1458-9_3_Chapter.html#Fig14) shows three green rectangles
    that I created on my canvas. From left to right, the first rectangle is the original.
    The second (center) was created by dragging the handles to create a rectangle
    that is roughly twice the size of the original. The third rectangle (right) was
    created using the `Scale` function and increasing the scale size from 100 to 200
    percent. Note the difference between the second and third rectangles. The border
    around the third rectangle has increased proportionally to the size of the shape,
    whereas the border around the center rectangle is the same size as the original,
    even though the size of the rectangle has increased.


    ![A978-1-4842-1458-9_3_Fig14_HTML.jpg](A978-1-4842-1458-9_3_Fig14_HTML.jpg)


    Figure 3-14.


    `Sketch`’s scaling feature in action


    ## Styles


    Now that you’ve learned about the interface and styling, we’ll dive a little deeper
    into details and functionality of the Inspector and attaching various styles to
    the shapes and layers in your designs. Your designs will likely consist of images
    and shapes. They will also, naturally, contain a variety of fills and borders,
    so we’ll start with these.


    ### Fills


    While we briefly touched upon the fill feature in our earlier discussion of the
    Inspector, we will now explore this feature in greater detail. As mentioned earlier,
    most styling will take place in the Inspector, which is located on the right side
    of the Sketch canvas. Fill has a few additional properties associated with it.
    Specifically, when you have created a shape on your canvas, you can easily change
    the fill attribute by ensuring that the check mark next to the fill attribute
    is checked, and by clicking the default gray swatch next to it. This will reveal
    the color picker, which allows you to select pretty much any color in the spectrum
    as the fill color for the selected shape on your canvas. The shape then updates
    automatically with a solid color if none of the other selections have been activated.


    There are other types of fills, of course, and they all appear as options for
    styling your layer once you select a fill and reveal the color picker pop-up.
    Beyond `Solid Fill`, there is `Linear Gradient`, `Radial Gradient`, `Circular
    Gradient`, `Pattern Fill`, and `Noise Fill`, as shown from left to right in Figure
    [3-15](#A978-1-4842-1458-9_3_Chapter.html#Fig15). An explanation of each type
    of gradient follows.


    ![A978-1-4842-1458-9_3_Fig15_HTML.jpg](A978-1-4842-1458-9_3_Fig15_HTML.jpg)


    Figure 3-15.


    `A Pattern Fill style on an oval` Tip


    To discover the name of each type of fill, roll over the appropriate box. After
    a moment, a pop-over with the name of the fill will appear.


    #### Pattern Fill


    This feature allows you to use an image or selection with a pattern as a fill.
    It’s a nice way to give your design some texture. Sketch also comes with some
    preset textures that you can use in your design. An illustration of a `Pattern
    Fill` style is shown in Figure [3-15](#A978-1-4842-1458-9_3_Chapter.html#Fig15).'
