    \ repo.\n\n![A978-1-4842-1458-9_11_Fig4_HTML.jpg](A978-1-4842-1458-9_11_Fig4_HTML.jpg)\n\
    \nFigure 11-4. A screenshot of the Sketch Plugin Directory on GitHub, a great\
    \ resource for Sketch plug-ins\n\n### My Favorite Plug-ins\n\nThe following is\
