    ### 相机拍摄


    如今，越来越多的设计师会在应用中修改相机视图，以契合应用期望的用户体验，并加入针对应用的个性化偏好。当然，你可以直接使用 iOS 标准的相机视图进行拍摄。它运行良好，能提供所有
    iOS 用户习以为常的基础功能。但对于以图像拍摄为主要功能的 App 来说，有时会选择为用户设计独特的相机视图。在我们的应用中，我们不会这么做，但在此处提出这一点，是因为你的线框图应当在此阶段包含相机视图的任何新颖或独特的设计元素。你还需要与开发人员特别讨论这个功能，因为要实现任何非标准相机
    UI 视图，都需要特殊的编程。图 7-15 展示了一些与标准 iOS 相机视图差异显著的相机视图示例，特别是热门照片应用 Instagram 和生产力应用
    Evernote。


    ![A978-1-4842-1458-9_7_Fig15a_HTML.jpg](img/A978-1-4842-1458-9_7_Fig15a_HTML.jpg)![A978-1-4842-1458-9_7_Fig15b_HTML.jpg](img/A978-1-4842-1458-9_7_Fig15b_HTML.jpg)


    图 7-15. Instagram 和 Evernote 都创建了独特的相机拍摄视图，以紧密贴合用户需求和自身品牌


    我决定为我们的应用简化典型的相机界面。因此，我们会剥离所有无关或非必要的元素。最终只保留我们认为用户使用应用拍照所需的关键元素。在图 7-16 中，我们在屏幕顶部添加了两个特别创建的“删除”和“批准”按钮，并导入了一张图片以显示相机正在运行。屏幕下方中央的按钮允许用户拍照，底部的滑块则用于放大或缩小图像。一切从简。


    ![A978-1-4842-1458-9_7_Fig16_HTML.jpg](img/A978-1-4842-1458-9_7_Fig16_HTML.jpg)


    图 7-16. PhotoBomb 拍摄界面。用户可以拍照、批准或拒绝，以及缩放画面


    我们刚刚使用 Sketch 完成了 PhotoBomb 应用主要页面的线框图绘制。虽然这个过程需要我们额外思考应用的工作方式，但实际上创建这些页面的过程相对简单。图
    7-17 展示了在 Sketch 的一个页面中所有线框图的鸟瞰图。


    ![A978-1-4842-1458-9_7_Fig17_HTML.jpg](img/A978-1-4842-1458-9_7_Fig17_HTML.jpg)


    图 7-17. 我们在 Sketch 中为 PhotoBomb 应用绘制的线框页面


    对于使用 Sketch 创建线框图是否仍有疑虑？那么无需再寻找答案了。今年早些时候，前《纽约时报》设计总监 Khoi Vinh 对设计师进行了一项简短的调查，名为“当今设计师使用的工具”，以了解当下最受设计师欢迎的工具。这是一个很合理的问题，因为最近设计师在设计时有了更多工具可供选择。


    Khoi 询问了设计师们在从头脑风暴、线框图绘制，到界面设计和原型制作等各个环节中最喜欢的工具。当来自 200 个国家的 4000 多名参与者提交结果后，设计师们表示，他们最喜欢的线框图绘制工具是
    Sketch，获得了 27% 的选票，领先于 Omnigraffle、Illustrator 和 InDesign 等流行的线框图工具。调查网站的一张图表如图
    7-18 所示。同样重要的是，Sketch 主要被科技公司和初创公司使用，这些公司拥有大量早期采用者，而自由职业者和大型机构则构成了其余的主要用户群。


    ![A978-1-4842-1458-9_7_Fig18_HTML.jpg](img/A978-1-4842-1458-9_7_Fig18_HTML.jpg)


    图 7-18. Khoi Vinh 的设计工具调查结果显示，Sketch 是设计师进行线框图绘制的首选工具


    值得一提的是，Sketch 还以 34% 的得票率击败了所有对手，成为设计师进行界面设计的首选工具，领先于业界老牌工具 Photoshop。不过，我们将在下一章详细讨论这一点。


    ## 本章小结


    总体而言，线框图绘制是设计过程中的重要环节。如果线框图绘制得当，你的设计流程将会顺畅得多。虽然你可能很想快速推进像素级设计，但请花点时间在线框图绘制过程中仔细思考整个应用，确保你设计的应用满足目标用户的需求。这个过程有时可能会令人沮丧，但市场上有如此多的工具可供选择——无论你使用本章列出的高保真工具，还是使用经典纸笔——这都是你在设计之前深入了解应用和用户的阶段。这个话题将在下一章中讨论。


    # 8. 设计你的应用


    我们已经涵盖了所有基础知识，甚至探索了使用 Sketch 绘制应用线框图。所以现在你无疑既急切又兴奋，想要真正开始设计你的应用了。在开始为应用添加颜色、品牌标识和风格（这是任何应用设计阶段都会涉及的内容）时，你需要手边备好线框图。如果你是为客户工作，你会拥有他们的品牌指南，甚至可能有一个与其品牌相符的调色板可供选择。你线框图中的元素在设计阶段可能会被保留，也可能被更改，这意味着一旦你对某些图标应该是什么样子达成一致，你可能想要更改线框图中使用的某些图标。你甚至可能决定从头开始创建一些图标。使用我们迄今为止学到的所有技能，这将很容易实现。如果你需要退后一步复习一下，现在就可以做。如果没有，那我们就直接开始设计我们的应用吧。


    ## 色彩


    既然我们已经进入了设计阶段的核心，现在谈谈色彩是个好主意。到目前为止，我们还没有就从应用色彩方面进行过讨论，我们的线框图也排除了任何实际的调色板，或者对 PhotoBomb
    应用中最突出颜色进行真正的思考。


    色彩可以在很多方面影响你的应用。色彩心理学已有详尽记载，在本书前面部分，我提到了一些很酷的在线工具，可以帮助你为应用的整体设计挑选搭配和谐的色彩。如果你正在开发一个有明确品牌指南的应用，那么你应该参考那份文档。


    大多数主要品牌都有指南，不仅规定了在涉及该品牌的特定情况下可以使用和应该使用哪些颜色，还会规定字体、定位和其他设计元素的使用。如果你正在开发的主要是自用应用，即使你并非知名品牌，品牌标识仍然很重要。首先，查看你应用所处类别中的其他应用，了解哪些趋势流行，这会很有帮助。然而，潮流来来去去。对于色彩，你需要思考所选择的颜色将如何影响或引导你的用户，当然还有整体游戏体验。主色需要由次要的、互补的颜色来衬托，这些颜色在屏幕上（尤其是并排放置时）要表现出色。


    同时，也要思考哪些颜色能很好地突出和衬托应用内的特定操作。如果你的应用主要以照片为基础，那么不会与照片争辉的柔和颜色效果最好。对于我们的 PhotoBomb
    应用，氛围应当唤起熟悉感和愉悦感。目标是让用户每次回到主页时都感到舒适和受欢迎。我喜欢蓝色，而且众所周知蓝色对用户有镇静作用，那么我们就以蓝色为起点，并使用
    Sketch 的检查器来尝试在整个应用中将不同色调和深浅的蓝色作为点缀色。'
- fmt: '## Setting the Stage


    As we begin to set up our page for design, if you haven’t already set your preferences
    as outlined in [Chapter 6](#A978-1-4842-1458-9_6_Chapter.html), then now is a
    good time to do so. You should also be thinking about the size of the screen for
    which you will be designing. As you know, Sketch offers artboards in a variety
    of sizes that correspond to current iOS device screens. Before you start designing,
    you should decide on the target device size and select the appropriate artboard.
    When selecting the appropriate-size artboard, Sketch offers a selection of preset
    sizes, as shown in Figure [8-1](#A978-1-4842-1458-9_8_Chapter.html#Fig1).


    ![A978-1-4842-1458-9_8_Fig1_HTML.jpg](A978-1-4842-1458-9_8_Fig1_HTML.jpg)


    Figure 8-1. The list of preset artboard sizes provided in Sketch 3.3.3


    Since we’re designing mainly for the iPhone in this book, we will focus on these
    devices only. Typically, the convention is as follows:


    *   Selecting iPhone 5, 5S, or 5C is considered designing `@2×`.

    *   Designing for anything below a `@2×` resolution is considered `@1×`.


    These resolutions are for the iPhone 4 series and below. Most of these devices
    have been discontinued, so if you’re starting out, you should be designing `@2×`
    or higher. The more recent devices (iPhone 6 Plus and up) are considered `@3×`.


    The resolution or artboard in which you start your designs will depend on the
    targeted devices for your final product, as well as personal preference. I typically
    start my designs by selecting the artboard for the iPhone 6, as it allows me to
    catch all of the details. Also remember that you will need to export for multiple
    screen sizes and resolutions when you are ready to export your assets for development.


    We discuss exporting assets later in [Chapter 10](#A978-1-4842-1458-9_10_Chapter.html).
    For now, however, I will begin to design the screens for my app by using iPhone
    6 artboards.


    ## Splash Screen


    We have our wireframes standing by and will start with our splash screens. Our
    logo is luckily already intact and we can use that directly from our wireframes.
    It’s not a bad idea to group all of the elements in the logo and rename them for
    easy use. If you remember, once this is completed, we can also change the color
    of the logo easily and have it update across our designs for easy changes in the
    design phase.


    As we did when we created our wireframes, we will start out with the splash screen,
    the first page that users will see once they’ve downloaded the app. Even though
    it will be onscreen for a short time, this page sets the stage and may even influence
    whether users will continue to explore your app. Therefore, it’s pretty key to
    get this page right.


    From a design perspective, the page is relatively simple. Instead of a solid color
    background and given the theme of the app as an app where photography is a key
    theme, I’ve decided to go with a full-screen photo background. I’ve checked through
    my folder of royalty-free images and settled on one from Death to Stockphotos.
    They offer a subscription-based selection of royalty-free images that are delivered
    to your inbox once a week. This one features a photographer with his camera. I
    think that image should do for now. I’ve imported the photo onto my Sketch canvas,
    resized it, added a Gaussian Blur at `10px`, and repositioned our logo to be lower
    on the screen and to allow the user to get a better sense of the photograph. I
    also changed the color of the logo. The wireframe had the logo in black but I
    changed it to white. This allows it to stand out a bit more; remember, should
    we decide to change it later on, we can do so and have it update everywhere. See
    the key differences between the wireframe of the splash screen and the design
    I’ve just created in Figure [8-2](#A978-1-4842-1458-9_8_Chapter.html#Fig2). The
    wireframe is on the left with the design on the right. The important takeaways
    here are how the designs differ from the actual wires and how we have used and
    will continue to use the wireframes as a guide for the app but will feel free
    to deviate from them when we need to.


    ![A978-1-4842-1458-9_8_Fig2a_HTML.jpg](A978-1-4842-1458-9_8_Fig2a_HTML.jpg)![A978-1-4842-1458-9_8_Fig2b_HTML.jpg](A978-1-4842-1458-9_8_Fig2b_HTML.jpg)![A978-1-4842-1458-9_8_Fig2c_HTML.jpg](A978-1-4842-1458-9_8_Fig2c_HTML.jpg)


    Figure 8-2. The PhotoBomb splash screens in wireframe form and in design form


    The following steps were taken to create the initial screens shown in Figure [8-2](#A978-1-4842-1458-9_8_Chapter.html#Fig2).


    1.  Create a new blank artboard.

    2.  Import a desired image.

    3.  Add a Gaussian Blur by selecting the image and clicking the check box in the
    Inspector panel.

    4.  Adjust the Gaussian Blur settings to `10px`, either by using the slider or
    by typing in the number in the field.

    5.  Duplicate the PhotoBomb logo and add it to the page.

    6.  Change the logo’s color.


    To add the Enter button:


    1.  Select the rectangle shape from the Insert menu.

    2.  Create a rounded rectangle that is `298 × 65`.

    3.  Use the text tool from the Insert menu to add a label for the button.

    4.  Group these items (rectangle and label) for easy reference and to keep them
    together in case you need to edit them, as shown in Figure [8-3](#A978-1-4842-1458-9_8_Chapter.html#Fig3).


    ![A978-1-4842-1458-9_8_Fig3_HTML.jpg](A978-1-4842-1458-9_8_Fig3_HTML.jpg)


    Figure 8-3. The Enter button group contains the rectangle shape as well as the
    button’s label. The PhotoBomb logo is shown as a symbol


    With our splash screens completed, we can move on to the rest of our designs.
    One of the great advantages of working in Sketch is not only the ease of use and
    low barrier to entry as we’ve seen throughout the book, but also how cuts down
    on the time it takes to complete your designs. While I am a big fan of taking
    the time you need to properly think through wireframes, your design phase is where
    you want to really save time. Design can be tedious, especially for more complex
    designs. Once you are up to speed with Sketch, you will undoubtedly cut down on
    your design time. If your design time has not been significantly reduced when
    using Sketch compared to Photoshop and some other design tools, then as they say,
    you’re doing it wrong. Let’s move on to the authentication screens of our PhotoBomb
    app.'
