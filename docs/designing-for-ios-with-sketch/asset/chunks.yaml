- fmt: '# iOS Template Symbols


    In [Chapter 2](#A978-1-4842-1458-9_2_Chapter.html), we discussed iOS design elements
    templates by Teehan+Lax, which are now included in Sketch 3, and how they will
    make your life easier when designing for iOS. It is important to note that the
    majority of these UI elements have been added as symbols. With the exception of
    the Tab Bar and Background, all of the various iOS UI elements are all symbols,
    and they appear in the Layers list as purple folders. This means that as you build
    a page with these elements, you will also be able to edit and update these symbols
    across your design pages and artboards. Let’s go through the symbols and set up
    an artboard for a basic app using some symbols from the iOS template.


    Start with a new artboard from the iOS template by selecting the size of the device
    for which you are designing. I’ll choose the iPhone 6 Plus. After selecting the
    size of the device, Sketch will add a new artboard in the appropriate size onto
    the canvas. You can now populate it with items such as a map, tab bar, status
    bar, and so forth. These symbols can make up a basic app page, as shown in Figure
    [4-5](#A978-1-4842-1458-9_4_Chapter.html#Fig5).


    ![A978-1-4842-1458-9_4_Fig5_HTML.jpg](A978-1-4842-1458-9_4_Fig5_HTML.jpg)


    Figure 4-5. A simple UI created using symbols from the iOS template included in
    Sketch 3


    # Text and Fonts


    We mentioned how symbols are linked globally across pages, artboards, and layers,
    so it makes sense to discuss text here since text styles work much in the same
    way as symbols do across pages and artboards. You already know that it is possible
    to manage multiple symbols and make changes to them on the fly as you iterate
    through your designs. Sketch also allows you to do this with text. Moreover, since
    Sketch 3 now uses the native font rendering for OS X, it means that text (especially
    text intended for the Web) looks great. But there’s a whole lot more that you
    can do with text in Sketch 3, and this makes the difference between a good design
    and a great design.


    Generally, typography in app design is important especially because of the limited
    real estate on which users must interact with content. While a font may look cool
    in your designs, you must always keep the user in mind. Accordingly, text in apps
    must remain legible at all times. It’s also a good idea to make sure that your
    font sizes don’t change from page to page. In this respect, you may want to create
    a style guide for your app before you proceed with the heavy lifting of the design.
    While creating a style guide can be tedious for designers who prefer to “just
    get on with it,” it’s a great practice and it helps to maintain a level of consistency—particularly
    when it comes to font and sizes—when handing off to other designers and developers
    alike.


    For those designing for the Web, Sketch comes with a preloaded template that you
    can select when creating a new document. Much like the templates for icons for
    iOS (iPhone & iPad), Sketch includes a template for those who design UIs for the
    Web. There’s even one for Material Design for those individuals who are designing
    for Android devices.


    When you select a UI element from the preloaded iOS App template, associated styles
    are included, like text styles. Take for instance if you wanted to select the
    Push notification symbol and add it to one of your artboards. Once you copy the
    symbol over to your designs, you will likely need to edit the copy of the notification
    message. To do this, you select the symbol and double-click the text fields to
    edit the content.


    As you can see in Figure [4-6](#A978-1-4842-1458-9_4_Chapter.html#Fig6), selecting
    a text field reveals the style associated with it in the Inspector. You can edit
    the copy in the symbol and keep the associated style. In the figure, the Style
    is listed as “Notification Content.” However, that style can be changed to any
    other text style in the list, or even to one you create on your own. In this instance,
    you simply need to select the copy and select a new style from the drop-down menu.


    ![A978-1-4842-1458-9_4_Fig6_HTML.jpg](A978-1-4842-1458-9_4_Fig6_HTML.jpg)


    Figure 4-6. Selecting a text field highlights its associated style in the Text
    Inspector Tip


    Since many of the styles in the template adhere to Apple’s Human Interface Guidelines,
    you might want to leave them as is with minimal editing.


    To insert text into an existing design, go to the Insert menu and select Text.
    This then turns your cursor into a text tool. Once the text tool appears, you
    can begin typing. Sketch will prompt you by inserting preformatted text on the
    canvas that reads “Type something,” as shown in Figure [4-7](#A978-1-4842-1458-9_4_Chapter.html#Fig7).
    Once the text box appears, you are free to begin typing. The box will automatically
    expand to accommodate the additional text you type. What you can’t see in the
    figure, however, are the handles around the text. Like any other layer in Sketch,
    text on a canvas gets its very own box with handles. Other layers have handles
    on all four sides, but the text box will have three. While in Auto mode, you can
    adjust these handles easily to change the size of the text just as you would with
    a shape, image, or vector. Pulling on the handles on the left or right side of
    the box will expand the text box and make it wider. When dragged, the handle on
    the bottom will make the text bigger or smaller within the box. This is a handy
    way of changing font size in your text field without adjusting the numbers in
    the Inspector.


    ![A978-1-4842-1458-9_4_Fig7_HTML.jpg](A978-1-4842-1458-9_4_Fig7_HTML.jpg)


    Figure 4-7. The default text tool on a blank canvas


    Nonetheless, the text field can also be restricted by selecting the Fixed option
    in the Inspector to the right. There are a number of selections that you can make
    that will affect the text that you are typing on your canvas at that time. Currently,
    the text in the Figure [4-8](#A978-1-4842-1458-9_4_Chapter.html#Fig8) is set to
    resize the box automatically as you type, as the Auto button is highlighted. If
    the Fixed button is selected, then the size of the text box will be restricted
    and the text will wrap to fit within it.


    ![A978-1-4842-1458-9_4_Fig8_HTML.jpg](A978-1-4842-1458-9_4_Fig8_HTML.jpg)


    Figure 4-8. A closer look at the Text Inspector options for styling your text
    layers


    # The Text Inspector


    As with any other text editor, Sketch provides you with many ways to edit your
    fonts their weight, color, and size. When clicked, the Typeface option offers
    a list of all of the fonts on your computer as well as a preview of what each
    font looks like. To select one, simply click it. The weight will show the thickness
    or thinness of the font that you have selected, and there are other options, such
    as italics, light, bold, and black.


    If you’d like to create text in underline or various list types, these can be
    found by clicking the Options button next to the color picker swatch. Sketch offers
    double-underlined text, bulleted, and numbered lists as options.


    You also have the option to adjust spacing in Sketch. You can adjust the character
    spacing, or the space between each character. Line spacing refers to the amount
    of vertical space between multiple lines of text. Paragraph spacing will adjust
    the space that the program automatically assigns after you hit the return key
    to start a new paragraph.


    Tip: If you’d like to insert a line break instead of a paragraph break, hit `Shift+Return`
    instead of just `Return` when typing text.


    ## Text Alignment


    Alignment of text in Sketch is fairly straightforward, and it works mostly in
    the same way as in word processors and other graphics programs. You use the various
    settings to left or right-align your text, or to center or justify it.'
