  trans: '

    # 身份验证


    我们设计的身份验证页面将与线框页面高度一致。如果用户能深入到应用的这一步骤，那么他们就已经准备好并愿意注册了——至少我们希望如此。这些页面的核心在于展示带有品牌的
    Facebook 和 Twitter 按钮，让用户可以快速选择自己偏好的社交网络，从而尽快进入应用并开始游戏。我们还会为按钮赋予与 Twitter 和 Facebook
    匹配的特定蓝色调，使其品牌标识易于识别。


    我们将通过复制之前的某个页面并删除背景图片来创建新页面。找到适合该页面的图片后，我们会进行优化、导入并调整尺寸，使其适配屏幕，同时确保不会像照片通常那样导致文件体积过大。


    我希望应用内所有按钮的尺寸保持一致，因此我会从启动页复制按钮到当前页面，并将其复制三次，以创建所需的三个身份验证按钮。放置好之后，我们需要调整颜色（复制的按钮原本是透明的）、重命名标签，并添加相应的图标。


    由于身份验证页面代表了用户流程中的一个新阶段，我们还需要创建一个新页面，以区分这一流程与引导/启动页流程。这样在必要时，我们展示和呈现工作成果会更容易。设计时务必牢记，演示和组织的条理性在工作中至关重要。


    通过检查按钮之间的间距，我们可以轻松分布空间，确保它们使用参考线在屏幕上垂直和水平居中，然后逐一为每个按钮设置样式。我们先处理 Facebook 按钮。这个按钮将和线框一样，使用
    Facebook 的“F”标志并采用其独特的蓝色调。在我看来，拼写出完整的名称并无必要，因为如今地球上几乎所有人都知道这个社交网络。为了获得准确的 Facebook
    蓝色，我只需打开一个新的浏览器页面访问 Facebook，在检查器中选择颜色，并用吸管工具从页面上“偷取”该颜色。这是 Sketch 最便捷的功能之一，它让设计中的颜色匹配和线框制作变得异常简单。完成
    Facebook 按钮后，我们按照同样步骤处理 Twitter 按钮。目前我打算让电子邮件按钮保持透明，以便能看到其后的背景图片。不过尝试之后，我决定将电子邮件按钮设为纯色，以与上方的其他按钮保持一致。


    我已经通过 Pixel Love 导入了按钮图标，调整了大小和颜色使其匹配，并为按钮标签设置了样式以确保它们也保持统一。添加图标后，我们可以缩小画布，看看新创建的身份验证页面。效果如图
    8-5 所示。


    ![A978-1-4842-1458-9_8_Fig5_HTML.jpg](img/A978-1-4842-1458-9_8_Fig5_HTML.jpg)


    图 8-5. PhotoBomb 应用经过品牌化设计的身份验证页面


    请记住，这些页面的设计理念是在各页面之间实现无缝过渡。PhotoBomb 的标志在每个页面上应处于相同位置，并且当用户切换到新页面时，每个页面上的元素只需微妙地变化。如果用户决定返回流程中的上一步或前一页，元素应反向变化。我的目标是，让用户在每一个流程中都拥有对整个过程的最大控制权。请记住，我们的最终目标是，通过清晰地向用户展示注册并开始使用应用后能获得什么，来吸引用户。这种体验是整体应用内体验的准备，用户现在看到的内容将为他们在应用中的体验奠定基础。


    # 电子邮件注册


    我们的应用身份验证流程已经完成。现在可以进入电子邮件注册页面。该页面包含我们的标志、供用户输入用户名和密码的字段，以及一个“进入”按钮。相当直接，对吧？我们的用户名和密码标签将与上一页的标签保持相同大小——这又是一致性原则的体现。而且我们不会真的画一条线（虽然
    Sketch 支持且很容易做到），而是创建一个 1 像素的矩形用于每个字段，然后复制它来创建两个字段。


    这个页面实际上可以被视为身份验证流程的一部分。不过，我们会在此添加一些线框中没有包含的元素。例如：通常输入密码时，密码会被某种方式隐藏。在设计阶段，我们需要选择如何保护密码，以及采用何种创意技巧来遮蔽用户的密码。遮蔽密码是一种常见做法，但不同应用的处理方式可能不同。也有一种观点认为，在注册时遮蔽密码会带来糟糕的用户体验（UX），因为用户会犯更多错误，尤其是在需要输入两次密码的情况下。如果要求用户输入两次密码，且两者必须匹配才能注册，那么对于密码更复杂的用户来说，同时遮蔽两个密码可能很棘手。因此，一些设计师选择仅在用户登录时遮蔽密码，因为此时用户已经选定了密码，理论上对其很熟悉。


    尽管这是一个非常现实的问题，但我们暂时搁置，假设它不存在。这很可能是一个应该在项目的线框阶段就评估并确定的问题。如何创意地遮蔽密码是另一个议题，所以我们将专注于这一点，并假设已经就此做出了决定且大家达成一致。


    遮蔽密码的典型方式是使用星号或圆圈。在图 8-6 中，我使用圆圈来遮蔽密码。保持圆圈空心能带来不错的视觉效果，并让背景图片透出，这在应用的这一阶段至关重要。


    ![A978-1-4842-1458-9_8_Fig6_HTML.jpg](img/A978-1-4842-1458-9_8_Fig6_HTML.jpg)


    图 8-6. 在密码和用户身份验证页面中，我使用了空心圆圈作为密码遮蔽符，并沿用了 PhotoBomb 应用中的相同样式

