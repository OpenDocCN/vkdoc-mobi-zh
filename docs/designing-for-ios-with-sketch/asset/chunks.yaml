- fmt: '### Permissions


    Getting your user’s permission to use certain services and features on their phone
    is required by iOS. Users must explicitly give permission to allow third-party
    apps and software access to their microphone, camera, contact list, and location,
    among others. The way that software developers typically request this information
    has evolved over the years. Initially, a small notification asking for permission
    would pop up on a user’s screen. The user would then allow or deny the service
    from being used by the app. An example of a typical permissions-based notification
    is shown in Figure [7-12](#A978-1-4842-1458-9_7_Chapter.html#Fig12).


    ![A978-1-4842-1458-9_7_Fig12_HTML.jpg](A978-1-4842-1458-9_7_Fig12_HTML.jpg)


    Figure 7-12. Periscope app’s standard permissions notification pop-up. This is
    iOS’s standard notification format


    Recently however, designers have begun to rethink the way that apps are asking
    for permission to use their device’s services. More frequently, these permissions
    pages are cleverly worded and designed to get a user to allow usage of a particular
    service that a developer feels would enhance their overall experience with the
    app. Shown in Figure [7-12](#A978-1-4842-1458-9_7_Chapter.html#Fig12) is an example
    of how video streaming app Periscope handles asking users for permission to enable
    notifications in the app. Note that while the standard notification will still
    appear, the user is primed to allow the app to use all of the necessary services
    from their device with a cleverly designed screen. This is undoubtedly an added
    step and not wholly necessary. But with users these days being overly concerned
    about their privacy, this additional page goes the extra mile to actually get
    the permissions approved where it may be instinctive to say no. Notice how in
    Figure [7-13](#A978-1-4842-1458-9_7_Chapter.html#Fig13) the copy entices the user
    to enable notifications so as not to miss out on what’s going on. The bottom of
    the second screen in Figure [7-11](#A978-1-4842-1458-9_7_Chapter.html#Fig11) also
    reassures the user with the copy “Don’t worry, you can choose to hide your location
    before each broadcast.” This message is intentional and meant to show users that
    Periscope cares about their privacy and offers these additional controls to safeguard
    it for their users.


    ![A978-1-4842-1458-9_7_Fig13a_HTML.jpg](A978-1-4842-1458-9_7_Fig13a_HTML.jpg)![A978-1-4842-1458-9_7_Fig13b_HTML.jpg](A978-1-4842-1458-9_7_Fig13b_HTML.jpg)


    Figure 7-13. The Periscope app does a great job of disguising the permissions
    process


    To enable notifications, the user hits the “Enable Notifications” button and to
    keep them turned off, they would hit the x in the upper right hand corner of the
    app. What makes this different is the wording of the request.


    Creating a page just for asking for permissions gives the developer more control
    over the wording. The wording here is more user friendly and offers users a clearer
    explanation instead of what they would be missing should they turn off notifications.
    Here, the message reads “Enable notifications so you don’t miss broadcasts from
    people you follow.”


    It is worth noting that once a user hits the Enable button the old standard notifications
    will still pop up and will have to be accepted. The iOS notifications would say
    “Periscope” would like to send you notifications. Notifications may include alerts,
    sounds and icon badges, etc.. That wording, by the way, is fixed and cannot be
    changed.


    But this way, the user has a more eloquent explanation of what services the app
    will require before they accept or deny. If your app will require the use of more
    than one of the device’s services, you can think about how to stagger your permissions.
    For example: Do you ask for permissions all at the same time? Or do you wait until
    a user attempts to use a feature requiring a particular service? I’ve seen it
    done both ways. This is something to think about as you are working through your
    app’s wireframes since each page will likely require different copy and different
    designs.


    For our `PhotoBomb` permission page, we’ll create a simple page that asks to use
    the services that we will need for users to be able to experience the app to its
    fullest. The wireframed page is shown in Figure [7-14](#A978-1-4842-1458-9_7_Chapter.html#Fig14).


    ![A978-1-4842-1458-9_7_Fig14_HTML.jpg](A978-1-4842-1458-9_7_Fig14_HTML.jpg)


    Figure 7-14. The `PhotoBomb` permissions page


    I created the `PhotoBomb` permissions page by using a version of the previous
    new page pop-up page. Since that page already had most of the elements I needed,
    it was an easy choice. With a few adjustments for the size of the buttons and
    copy, I was able to replicate the page and make some edits to create the new permissions
    page. Additional embellishments will come in the design phase but this shows the
    structure.'
