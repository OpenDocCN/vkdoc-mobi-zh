- fmt: '# Authentication


    Our designed authentication pages will hold fairly true to the wireframed pages.
    If a user has gotten this far in the app, they are primed and ready to register,
    or so we hope. The point of these pages is to show branded buttons for Facebook
    and Twitter so that a user can choose their favorite social networks quickly,
    getting into the app and on to game play as soon as possible. We will brand the
    buttons to match the appropriate shades of blue for both Twitter and Facebook
    as well. It makes their brands easily recognizable.


    We’ll create our page by duplicating one of our previous pages and deleting the
    background images. After we find an appropriate image for this page, we’ll optimize,
    import, and resize it to fit our screen and ensure that it doesn’t make our overall
    file size too big as photographs tend to do.


    I want to keep the sizes of our buttons consistent across the app, so I’ll copy
    the button from the splash screen onto our page and duplicate it three times to
    create the three authentication buttons that we need. Once we have them in place,
    we need to adjust the colors (the duplicated buttons were clear), rename the labels,
    and add the appropriate icons.


    Since the authentication screens represent a new flow for the user, we will create
    a new page as well to differentiate this flow from the onboarding/splash screen
    flow. This will make it easier for us to present and show the work if necessary.
    When designing, it’s important to remember that presentation and organization
    are important in your work.


    We can easily distribute the space between the buttons by checking to see how
    far they are apart from each other, making sure they’re centered vertically and
    horizontally on the screen using our guidelines, and then move on to styling each
    button accordingly. We’ll handle the Facebook button first. This button will be,
    as in the wireframe, branded with a Facebook “F” logo and will be Facebook’s unique
    shade of blue. In my opinion, spelling out the name is unnecessary, as almost
    everyone on the planet by now is aware of the social network. To get the appropriate
    shade of Facebook blue, I’ll simply open up a new browser page to Facebook, select
    the color from the Inspector, and use the dropper tool to “steal” the color from
    the page. This is one of Sketch’s handiest features. It makes color matching in
    designing and wireframes so easy. With our Facebook button completed, we’ll move
    on and do the same for the Twitter button. As of this moment, I was thinking that
    the e-mail button will stay clear so that we can still see the background image
    behind it. However, after trying this approach, I’ve decided to make the e-mail
    button a solid color to match the others above.


    I’ve imported by icons for the buttons via Pixel Love, resized and colored them
    to match, and set a style for the button labels so that they, as well, are consistent.
    Once the icons have been added we can zoom out on our canvas and have a look at
    our newly created authentication page. You can see what it looks like in Figure
    [8-5](#A978-1-4842-1458-9_8_Chapter.html#Fig5).


    ![A978-1-4842-1458-9_8_Fig5_HTML.jpg](A978-1-4842-1458-9_8_Fig5_HTML.jpg)


    Figure 8-5. Our branded and designed authentication page for the PhotoBomb app


    Bear in mind that the idea with these pages is to create a seamless transition
    between each page. The PhotoBomb logo should be in the same position on each page
    and the elements on each page should subtly shift as the user transitions to a
    new page. Should a user decide to go back in the process or to the previous page,
    the elements should shift in reverse. My goal, is to afford the user ultimate
    control over the entire process in every flow. Remember that our ultimate goal
    here is to entice the user with a very clear idea of what to expect once they
    do register and begin to use our app. This experience is preparation for the overall
    in-app experience and what the user sees now will set the stage for what they
    experience in the app.


    # E-mail Registration


    Our authentication flow is complete for our app. We can now move on to the e-mail
    registration page. This consists of our logo, fields for a user to enter their
    username and password, and an Enter button. Pretty straightforward, right? Our
    username and password labels will be the same size as the previous page’s labels.
    There’s that consistency thing again. And instead of actually drawing a line (which
    Sketch allows and easily accommodates), we will create a 1-pixel rectangle that
    we will use for each field and duplicate it to create both fields.


    This page is can actually be considered to be a part of the authentication flow.
    Here, however, we will add a few things that are not included in our wireframes.
    For example: typically when passwords are typed, they are obscured somehow. Here,
    the in the design phase, we get to select how the password is protected and what
    creative technique we will use to mask the user’s password. Masking passwords
    is a common practice, but the approach can differ from app to app. There is also
    a school of thought that says that password masking on sign up or registration
    is bad user experience (UX) because users end up making more mistakes, especially
    when they are required to type a password twice. If a user is asked to type their
    password twice and both passwords need to match to register, then it makes sense
    that masking both passwords can be tricky for users who have more complicated
    passwords. So, some designers opt to only mask passwords on sign in when a user
    has already chosen their passwords and in theory know it well.


    While this is a very real issue, we’re going to forego that for now and assume
    that this issue doesn’t exist. This is likely an issue that should have been assessed
    and decided in the wireframing stage of the project. Thinking about how we will
    creatively mask the password is another issue so we’ll focus on that and assume
    that the decision has been made and we are all in agreement.


    The typical way to mask passwords is by using an asterisk or by using circles.
    I masked the password using circles in Figure [8-6](#A978-1-4842-1458-9_8_Chapter.html#Fig6).
    Keeping them empty gives it a nice touch and brings through the background image
    which again is critical at this stage in the app.


    ![A978-1-4842-1458-9_8_Fig6_HTML.jpg](A978-1-4842-1458-9_8_Fig6_HTML.jpg)


    Figure 8-6. For the password and user authentication pages, I used empty circles
    as password masks and the same style applied in the PhotoBomb app'
