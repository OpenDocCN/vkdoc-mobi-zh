  trans: '

    # 特殊形状


    其中一些形状在`检查器`中具有特殊设置。例如，`圆角矩形`形状将具有用于编辑其圆角半径的额外`检查器`设置。将`半径`设置为`0`将没有圆角从而形成一个正方形，而最大设置为`40`将生成一个具有非常圆角的长方形。


    > **提示**：要创建一个完美的正方形或圆形，请在创建形状时按住`Shift`键。这将约束形状的比例。


    `星形`形状将具有额外的设置：一个`半径`和一个`点`设置在`检查器`中可用，它们将自动更新该星形上的点数以及该形状的中心半径。星形的`半径`指的是星形中心到顶点的距离。`点`指的是星形上的角点数。然而，星形的默认点设置是`5`。将点设置更改为最大值`50`将增加星形上的点数量。图
    3-2 中的半径设置为 `50%`，点数设置为 `10`。


    ![A978-1-4842-1458-9_3_Fig2_HTML.jpg](img/A978-1-4842-1458-9_3_Fig2_HTML.jpg)


    **图 3-2.** 一个 10 角星，半径为 50%


    `多边形`形状也具有一个`点`设置，允许你将点数从默认的`5`更改到最大值`10`。


    # 编辑形状上的点


    要完全理解形状，你还必须理解点。点是形状的基本元素。也就是说，点构成了形状。连接两个点的线称为`路径`。因此路径结合两个点来创建形状。那么，一个形状就是点上的路径集合。


    Sketch 还允许你编辑画布上现有形状的点。绘制形状后，选中它，你会看到允许你变换形状的白色手柄。这些手柄位于形状的顶部、底部和角落，允许你手动调整每个形状的大小。调整这些手柄将相应地增加或减少形状的高度和宽度。调整形状角落的手柄会同时改变高度和宽度。


    但是，如果你在工作中发现想要移动形状中的实际点来改变它们该怎么办？只需双击该形状。你会注意到手柄消失，并变成点。根据形状的不同，会有多个点。当鼠标悬停在形状的交点上时，`钢笔`工具也会出现在画布上，如图
    3-3 所示。


    ![A978-1-4842-1458-9_3_Fig3_HTML.jpg](img/A978-1-4842-1458-9_3_Fig3_HTML.jpg)


    **图 3-3.** `双击形状即可调整点。请注意检查器中的贝塞尔曲线`


    这将允许你根据在右侧`检查器`中选择的工具来编辑形状的点。你还会注意到，一旦形状的点变得可编辑，`检查器`中也会出现四个新的选项。这四种不同的模式允许你以各种方式操作这些点。这些模式是：`直线`、`镜像`、`分离`和`不对称`。在图
    3-4 中，来自图 3-3 的三角形已使用`镜像`贝塞尔曲线进行了调整。


    ![A978-1-4842-1458-9_3_Fig4_HTML.jpg](img/A978-1-4842-1458-9_3_Fig4_HTML.jpg)


    **图 3-4.** 一个三角形形状的点使用`镜像`模式工具进行编辑


    ## 直线模式


    `直线`工具允许你沿直线编辑路径，控制点上没有手柄或曲线。


    ## 镜像模式


    此模式提供两个相对且镜像的点，它们与主点的距离相同且角度相同。Sketch 将移除形状上的任何角。


    ## 分离模式


    此模式创建两个相互独立的点。你可以更改每个手柄的点而不影响另一个。


    ## 不对称模式


    此模式类似于`镜像`模式，但主点与控制点之间的距离将是独立的。


    一旦你使点可编辑，你就可以单击任意两个点之间的线上的任何位置来创建一个新的编辑点，依此类推。


    > **提示**：要退出此模式或任何其他模式，请按`Esc`键。


    # 组合形状


    有时，Sketch 的现成形状并非完全符合你设计中的需求，因此有必要组合形状以获得你想要的效果。Sketch 允许你组合形状以创建非开箱即用、或非立即可用的独特形态，方法是使用`插入`菜单。你可以通过将一个形状拖到另一个形状的上方或覆盖它，用鼠标同时选中它们，然后单击工具栏中的`联合`来实现。这样做会将两个形状合并。一旦它们合并，如图
    3-5 所示，它们将像一个实心整体一样行动。


    ![A978-1-4842-1458-9_3_Fig5_HTML.gif](img/A978-1-4842-1458-9_3_Fig5_HTML.gif)


    **图 3-5.** `一个三角形和一个圆角矩形在使用联合按钮组合前后的对比`


    > **提示**：一旦两个形状被组合，它们在`图层`列表中会显示为一个组。文件夹图标表示一个组。如果你打开该文件夹，你可以再次访问这两个独立的形状并根据需要编辑它们。


    # 自定义形状


    Sketch 也让创建你自己的自定义形状变得容易。从工具栏转到`插入 ➤ 矢量`。指针将变为一个`钢笔`工具。你可以使用此工具创建自定义线条和自定义点。你可以点击画布上的任意位置为你的自定义形状创建多个点。


    你还可以使用`变换`工具通过更改其点来扭曲你的形状。当在形状上使用`变换`工具时，你会注意到对边总是会同步地向相反方向移动。`变换`工具通常用于创建矩形或正方形形状的透视图。然而，它对圆形和椭圆形则会产生更加扁平的效果。


    > **提示**：默认的`变换`模式会同时移动形状的两侧。要仅向一个方向移动一侧，请在拖动形状所需角落的同时按住`⌘`键。

