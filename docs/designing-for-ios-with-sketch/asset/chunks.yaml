- fmt: '### Camera Capture


    Increasingly, designers are changing the camera view in their apps to suit the
    desired experience of their apps and to include preferences that are specific
    to their app for users. Certainly, you can simply use the standard iOS camera
    view for capture. It works just fine and offers the same basic level of functionality
    that every iOS user is used to. But apps that have as their main functionality
    image capture sometimes opt to design their own unique camera view for users.
    For our app, we won’t be doing this but wanted to add this here as your wires
    should include any new or unique design elements for your camera view in this
    stage. You will also want to discuss this feature in particular with your developer,
    since this requires some special programming to be able to implement anything
    but the standard camera UI view. Figure [7-15](#A978-1-4842-1458-9_7_Chapter.html#Fig15)
    shows a few examples of special camera views that differ significantly from the
    standard iOS camera view, specifically, popular photo app Instagram and Evernote,
    the productivity app.


    ![A978-1-4842-1458-9_7_Fig15a_HTML.jpg](A978-1-4842-1458-9_7_Fig15a_HTML.jpg)![A978-1-4842-1458-9_7_Fig15b_HTML.jpg](A978-1-4842-1458-9_7_Fig15b_HTML.jpg)


    Figure 7-15. Instagram and Evernote have both created unique camera capture views
    to align closely with the needs of their users and their brand


    I’ve decided that for our app, we will simplify the typical camera interface somewhat.
    Therefore, everything that is extraneous, or not needed for our app, we will strip
    away. This will leave us with what we believe to be the critical elements a user
    needs to take photos with our app. In Figure [7-16](#A978-1-4842-1458-9_7_Chapter.html#Fig16),
    we’ve included two specially created Delete and Approve buttons at the top of
    the screen and imported an image to show that the camera is live. The button in
    the lower center of the screen will allow the user to take a photo and the slider
    at the bottom is for zooming in or out on the image. Simple.


    ![A978-1-4842-1458-9_7_Fig16_HTML.jpg](A978-1-4842-1458-9_7_Fig16_HTML.jpg)


    Figure 7-16. The PhotoBomb capture screen. Users can take a picture, approve or
    reject, and zoom in or out


    We’ve just completed wireframing our PhotoBomb app’s main pages using Sketch.
    While this process required some additional thinking in terms of how our app will
    work, the actual process of creating these pages was relatively simple. Figure
    [7-17](#A978-1-4842-1458-9_7_Chapter.html#Fig17) shows a bird’s-eye view of all
    of our wireframes in one page in Sketch.


    ![A978-1-4842-1458-9_7_Fig17_HTML.jpg](A978-1-4842-1458-9_7_Fig17_HTML.jpg)


    Figure 7-17. Our wireframed pages for the PhotoBomb app in Sketch


    Still have doubts about working with Sketch to create your wireframes? Well, look
    no further. Earlier this year, former New York Times design director Khoi Vinh
    conducted a brief survey of designers called “The Tools Designers Are Using Today”
    to understand the most popular tools among designers today. It’s a fair question
    to ask since as of late, there are more tools for designers to choose from when
    creating their designs.


    Khoi asked designers their favorite tools for everything from brainstorming and
    wireframing, to interface design and prototyping. When the results were in from
    over 4000 participants in 200 countries, designers stated that their favorite
    tool for wireframing was Sketch, which got 27 percent of the vote and came in
    ahead of popular wireframing tools like Omnigraffle, Illustrator, and InDesign.
    A graphic from the survey website is shown in Figure [7-18](#A978-1-4842-1458-9_7_Chapter.html#Fig18).
    It is also important to note that Sketch was in use mostly at technology companies
    and startups, which have larger numbers of early adopters with freelancers and
    larger agencies rounding out the top numbers.


    ![A978-1-4842-1458-9_7_Fig18_HTML.jpg](A978-1-4842-1458-9_7_Fig18_HTML.jpg)


    Figure 7-18. Khoi Vinh’s Design Tools Survey results in Sketch as the top choice
    for designers in wireframing


    For what it’s worth, Sketch also beats all players as a designer’s primary tool
    for interface design with 34 percent of the vote and ahead of old industry favorite
    Photoshop. But, we’ll get into that in the next chapter.


    ## Summary


    Overall, the wireframing process is an important part of the design process. If
    the wireframing process is done correctly, your design process will run much smoother.
    While it might be tempting to rush to push pixels, take the time needed to think
    through your entire app in the wireframing process and make sure that the app
    you are designing is meeting the needs of your intended user. This can sometimes
    be a frustrating process, but with so many tools available on the market, whether
    you use one of the hi-fidelity tools listed in this chapter or good old pen and
    paper, this is the stage where you get to know your app and user intimately before
    design. This topic will be covered in the next chapter.


    # 8. Designing Your App


    We’ve covered all of the basics and we’ve even explored using Sketch to wireframe
    your app. So now you’re undoubtedly anxious and excited to begin actually designing
    your app. You will need your wireframes handy when you embark on adding color,
    branding, and style that come with the design phase of any app. If you’re working
    for a client, you will have their brand guidelines and perhaps even a color palette
    that aligns with their brand to choose from. The elements in your wireframes may
    or may not carry through in your design phase, meaning that you might want to
    change certain icons used in your wires once you can agree on what they should
    be. You might even decide to create some of your icons from scratch. This will
    be easy to do using all of the skills that we’ve acquired so far. If you need
    to step back for a refresher, you can do that now. If not, let’s jump right into
    designing our app.


    ## Color


    Now that we’re really into the meat of the design phase, it’s a good idea to talk
    about color. So far, we haven’t discussed color in terms of our app, and our wireframes
    have excluded any real color palette or real thought about what colors will be
    most prominent in the PhotoBomb app.


    Color can affect your app in many ways. The psychology of color has been well
    documented, and earlier in the book I referenced some cool online tools that can
    help you pick colors that work well together for the overall design of your app.
    If you’re working on an app with clear branding guidelines, then you should refer
    to that document.


    Most major brands have guidelines that will dictate not only what colors you can
    and should use in particular situations concerning that brand. They will also
    dictate the use of fonts, positioning, and other design elements. If you’re working
    on an app that’s primarily for your own use, branding will still be important
    even though you’re not an established brand. For starters, it can be helpful to
    look at other apps in the category in which your app is positioned to see what
    trends are popular. However, trends come and go. With color, you want to think
    about how the colors you choose will affect or influence your user and, of course,
    overall game play. Major colors need to be offset by minor, complimentary colors
    that work well on the screen, especially when placed next to each other.


    Also think about what colors will work well to highlight and compliment certain
    actions within your app. If your app is mostly photo based, then muted colors
    that don’t compete with the photos will work best. For our PhotoBomb app, the
    mood should evoke familiarity and happiness. The goal is to have users feel comfortable
    and welcome whenever they arrive back at the home page. I like blue, and the color
    has been known to have calming qualities for users, so let’s use blue as a starting
    point and use Sketch’s Inspector to experiment with different hues and shades
    of blue as accents throughout the app.'
