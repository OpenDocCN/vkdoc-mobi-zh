- fmt: '# Boolean Operations


    There will be times while designing when you need to create a custom shape. Further,
    it might be a bit of a challenge to create some unique shapes using the vector
    tool. Sometimes, it is only possible to create this unique shape by combining
    two existing shapes in a unique way. This is the perfect opportunity to learn
    about another one of Sketch’s handy features called Boolean Operations.


    Boolean Operators are available in many graphics programs, including Photoshop.
    Thus if you’re fairly adept at Photoshop, you should be familiar with the term
    Boolean Operators and what it means. For those of you who are not Photoshop users,
    a simple way of thinking about Boolean Operators when it comes to design software
    is that they allow you to create more complex shapes that consist of multiple
    paths. They allow you to group multiple paths together into more complex paths
    upon which Boolean Operators can be implemented.


    Boolean terms are represented in the Sketch toolbar by buttons that have been
    conveniently grouped together in their own section, as illustrated in Figure [3-6](#A978-1-4842-1458-9_3_Chapter.html#Fig6).
    They represent actions that can be taken when using two or more shapes that must
    interact with each other in a specific way. Simply put, these actions include
    `Add`, `Subtract`, `Intersect`, and `Difference`. All four of these tasks govern
    specific interactions among particular layers, shapes, and paths.


    ![A978-1-4842-1458-9_3_Fig6_HTML.jpg](A978-1-4842-1458-9_3_Fig6_HTML.jpg)


    Figure 3-6. Boolean Operator buttons in the Sketch toolbar


    A similar concept applies to Sketch. The icons associated with these buttons,
    as well as the manner in which they are grouped in the toolbar, are great indicators
    as to their use. To illustrate the effects of Boolean Operators, we will begin
    with two circle shapes, side by side, one slightly overlapping the other, as shown
    in Figure [3-7](#A978-1-4842-1458-9_3_Chapter.html#Fig7). We will then select
    both shapes by holding down the `Shift` key and selecting each shape, or by dragging
    a container around both shapes. You should see handles around each shape.


    ![A978-1-4842-1458-9_3_Fig7_HTML.jpg](A978-1-4842-1458-9_3_Fig7_HTML.jpg)


    Figure 3-7. Two slightly overlapping circles illustrate the various Boolean Operators
    in Sketch. Note that both are selected


    ## Union


    The `Union` tool combines any two shapes. To use to the `Union` tool, select both
    shapes. Then click the `Union` button in the toolbar. As the image and its name
    implies, both shapes will be merged together to create one new shape. As shown
    in Figure [3-8](#A978-1-4842-1458-9_3_Chapter.html#Fig8), the new shape will have
    properties of both shapes. Nonetheless, you will still be able to edit both shapes
    individually if you so desire.


    ![A978-1-4842-1458-9_3_Fig8_HTML.jpg](A978-1-4842-1458-9_3_Fig8_HTML.jpg)


    Figure 3-8. The effect of the `Union` Boolean Operator on our two demonstration
    circles. Both shapes have been merged into one new shape


    ## Subtract


    The `Subtract` tool will mask an area of overlapping shapes, thereby creating
    a new shape that is the result of the shape on top being removed from the one
    underneath it. Since our bright red circle was overlapping the darker red circle,
    it has been subtracted from the resulting shape. What remains now is the darker
    red circle minus the area where it overlapped with the other, as seen in Figure
    [3-9](#A978-1-4842-1458-9_3_Chapter.html#Fig9).


    ![A978-1-4842-1458-9_3_Fig9_HTML.jpg](A978-1-4842-1458-9_3_Fig9_HTML.jpg)


    Figure 3-9. The effect of the `Subtract` Boolean Operator on two overlapping circles


    ## Intersect


    The `Intersect` tool highlights the negative space between two overlapping shapes
    to result in one new shape. Thus it appears that our two circles have disappeared,
    leaving only the space they both shared. What remains is created by the space
    where the two previously overlapped, as shown in Figure [3-10](#A978-1-4842-1458-9_3_Chapter.html#Fig10).


    ![A978-1-4842-1458-9_3_Fig10_HTML.jpg](A978-1-4842-1458-9_3_Fig10_HTML.jpg)


    Figure 3-10. The resulting shape when using the `Intersect` Boolean Operator on
    two overlapping circles


    ## Difference


    The `Difference` tool highlights the negative space between two overlapping shapes
    as well, but displays the opposite effect of the `Intersect` tool. The resulting
    shape is shown in Figure [3-11](#A978-1-4842-1458-9_3_Chapter.html#Fig11).


    ![A978-1-4842-1458-9_3_Fig11_HTML.jpg](A978-1-4842-1458-9_3_Fig11_HTML.jpg)


    Figure 3-11. The resulting shape when the `Difference` tool is applied to two
    adjoining circles


    **Tip:** Even though the icons in the Sketch toolbar represent the operations
    on squares and rectangles, a great way to think of how Boolean Operators work
    in Sketch is to visualize each operation as well as its effect on overlapping
    circles, the simplest of shapes.


    You can also switch Boolean Operators on a specific group of shapes from within
    the layers panel. Simply right-click a layer that has a Boolean Operator applied
    to it. You will see the current selection and a convenient drop-down menu of other
    Boolean Operators that you can apply.


    # Masks


    Masking is a feature that can sometimes present issues for new designers. Masks
    in Sketch are a great way to add a unique element to an otherwise drab design.
    Masks are shapes that other objects can fit within. The great thing about masks
    is that you can use pretty much any shape to make a mask. You can use a mask,
    for instance, if you want an image to appear as though its outline has been carved
    into a certain shape, like a star or a circle. In so doing, that shape dictates
    the shape of the mask and, ultimately, how the masked image will appear. This
    kind of mask is known as an Outline mask.


    When applying a mask to your canvas, every layer and shape in the selected group
    will be affected by that masking effect. Therefore, if you are attempting to mask
    specific layers but not others, it is best to move those layers out of a group.


    For example, in Figure [3-12](#A978-1-4842-1458-9_3_Chapter.html#Fig12), you will
    see three items on the canvas. When a mask is applied by going to the `Layer`
    menu and selecting `Use as Mask` from the drop-down, all of the items except for
    the one that is selected “disappear” from view.


    ![A978-1-4842-1458-9_3_Fig12_HTML.jpg](A978-1-4842-1458-9_3_Fig12_HTML.jpg)


    Figure 3-12. Selecting `Use as Mask` from the `Layer` menu lets you use one shape
    to mask others


    Rest assured they haven’t gone far. Sketch is applying the mask effect to everything
    on top of the image to be used as a mask. When this happens, they disappear. However,
    a quick check of the `Layers` list will show you that they are still on the canvas
    in their original positions. The `Layers` list will also indicate specifically
    which layers have had a mask applied to them with a small bullet to the left of
    the layer name.


    Hovering your mouse over the layer will highlight the shape on the canvas. If
    you have a layer that is in the mask group but that you don’t want to be affected
    by the mask, simply select it, go back to the `Layer` menu, and click `Ignore
    Underlying Mask`. You should then be able to see the shape without the effect
    of the mask, and the bullet will disappear from that layer.


    ## Outline Mask


    To see the masking effect in action, simply drag your new shape over the mask
    shape, as shown in Figure [3-13](#A978-1-4842-1458-9_3_Chapter.html#Fig13). You
    will see that a star mask has been applied to the image on the screen. The parts
    of the image that fall outside of the star will not be shown.


    ![A978-1-4842-1458-9_3_Fig13_HTML.jpg](A978-1-4842-1458-9_3_Fig13_HTML.jpg)


    Figure 3-13. A masked image with the star shape'
  raw: '## Boolean Operations


    There will be times while designing when you need to create a custom shape. Further,
    it might be a bit of a challenge to create some unique shapes using the vector
    tool. Sometimes, it is only possible to create this unique shape by combining
    two existing shapes in a unique way. This is the perfect opportunity to learn
    about another one of Sketch’s handy features called Boolean Operations.


    Boolean Operators are available in many graphics programs, including Photoshop.
    Thus if you’re fairly adept at Photoshop, you should be familiar with the term
    Boolean Operators and what it means. For those of you who are not Photoshop users,
    a simple way of thinking about Boolean Operators when it comes to design software
    is that they allow you to create more complex shapes that consist of multiple
    paths. They allow you to group multiple paths together into more complex paths
    upon which Boolean Operators can be implemented.


    Boolean terms are represented in the Sketch toolbar by buttons that have been
    conveniently grouped together in their own section, as illustrated in Figure [3-6](#A978-1-4842-1458-9_3_Chapter.html#Fig6).
    They represent actions that can be taken when using two or more shapes that must
    interact with each other in a specific way. Simply put, these actions include
    Add, Subtract, Intersect, and Difference. All four of these tasks govern specific
    interactions among particular layers, shapes, and paths.


    ![A978-1-4842-1458-9_3_Fig6_HTML.jpg](A978-1-4842-1458-9_3_Fig6_HTML.jpg)


    Figure 3-6.


    Boolean Operator buttons in the Sketch toolbar


    A similar concept applies to Sketch. The icons associated with these buttons,
    as well as the manner in which they are grouped in the toolbar, are great indicators
    as to their use. To illustrate the effects of Boolean Operators, we will begin
    with two circle shapes, side by side, one slightly overlapping the other, as shown
    in Figure [3-7](#A978-1-4842-1458-9_3_Chapter.html#Fig7). We will then select
    both shapes by holding down the Shift key and selecting each shape, or by dragging
    a container around both shapes. You should see handles around each shape.


    ![A978-1-4842-1458-9_3_Fig7_HTML.jpg](A978-1-4842-1458-9_3_Fig7_HTML.jpg)


    Figure 3-7.


    Two slightly overlapping circles illustrate the various Boolean Operators in Sketch.
    Note that both are selected


    ### Union


    The Union tool combines any two shapes. To use to the Union tool, select both
    shapes. Then click the Union button in the toolbar. As the image and its name
    implies, both shapes will be merged together to create one new shape. As shown
    in Figure [3-8](#A978-1-4842-1458-9_3_Chapter.html#Fig8), the new shape will have
    properties of both shapes. Nonetheless, you will still be able to edit both shapes
    individually if you so desire.


    ![A978-1-4842-1458-9_3_Fig8_HTML.jpg](A978-1-4842-1458-9_3_Fig8_HTML.jpg)


    Figure 3-8.


    The effect of the Union Boolean Operator on our two demonstration circles. Both
    shapes have been merged into one new shape


    ### Subtract


    The Subtract tool will mask an area of overlapping shapes, thereby creating a
    new shape that is the result of the shape on top being removed from the one underneath
    it. Since our bright red circle was overlapping the darker red circle, it has
    been subtracted from the resulting shape. What remains now is the darker red circle
    minus the area where it overlapped with the other, as seen in Figure [3-9](#A978-1-4842-1458-9_3_Chapter.html#Fig9).


    ![A978-1-4842-1458-9_3_Fig9_HTML.jpg](A978-1-4842-1458-9_3_Fig9_HTML.jpg)


    Figure 3-9.


    The effect of the Subtract Boolean Operator on two overlapping circles


    ### Intersect


    The Intersect tool highlights the negative space between two overlapping shapes
    to result in one new shape. Thus it appears that our two circles have disappeared,
    leaving only the space they both shared. What remains is created by the space
    where the two previously overlapped, as shown in Figure [3-10](#A978-1-4842-1458-9_3_Chapter.html#Fig10).


    ![A978-1-4842-1458-9_3_Fig10_HTML.jpg](A978-1-4842-1458-9_3_Fig10_HTML.jpg)


    Figure 3-10.


    The resulting shape when using the Intersect Boolean Operator on two overlapping
    circles


    ### Difference


    The Difference tool highlights the negative space between two overlapping shapes
    as well, but displays the opposite effect of the Intersect tool. The resulting
    shape is shown in Figure [3-11](#A978-1-4842-1458-9_3_Chapter.html#Fig11).


    ![A978-1-4842-1458-9_3_Fig11_HTML.jpg](A978-1-4842-1458-9_3_Fig11_HTML.jpg)


    Figure 3-11.


    The resulting shape when the Difference tool is applied two adjoining circles
    Tip


    Even though the icons in the Sketch toolbar represent the operations on squares
    and rectangles, a great way to think of how Boolean Operators work in Sketch is
    to visualize each operation as well as its effect on overlapping circles, the
    simplest of shapes.


    You can also switch Boolean Operators on a specific group of shapes from within
    the layers panel. Simply right-click a layer that has a Boolean Operators applied
    to it. You will see the current selection and a convenient drop-down menu of other
    Boolean Operators that you can apply.


    ## Masks


    Masking is a feature that can sometimes present issues for new designers. Masks
    in Sketch are a great way to add a unique element to an otherwise drab design.
    Masks are shapes that other objects can fit within. The great thing about masks
    is that you can use pretty much any shape to make a mask. You can use a mask,
    for instance, if you want an image to appear as though its outline has been carved
    into a certain shape, like a star or a circle. In so doing, that shape dictates
    the shape of the mask and, ultimately, how the masked image will appear. This
    kind of mask is known as an Outline mask.


    When applying a mask to your canvas, every layer and shape in the selected group
    will be affected by that masking effect. Therefore, if you are attempting to mask
    specific layers but not others, it is best to move those layers out of a group.


    For example, in Figure [3-12](#A978-1-4842-1458-9_3_Chapter.html#Fig12), you will
    see three items on the canvas. When a mask is applied by going to the Layer menu
    and selecting Use as Mask from the drop-down, all of the items except for the
    one that is selected “disappear” from view.


    ![A978-1-4842-1458-9_3_Fig12_HTML.jpg](A978-1-4842-1458-9_3_Fig12_HTML.jpg)


    Figure 3-12.


    Selecting Use as Mask from the Layer menu lets you use one shape to mask others


    Rest assured they haven’t gone far. Sketch is applying the mask effect to everything
    on top of the image to be used as a mask. When this happens, they disappear. However,
    a quick check of the Layers list will show you that they are still on the canvas
    in their original positions. The Layers list will also indicate specifically which
    layers have had a mask applied to them with a small bullet to the left of the
    layer name.


    Hovering your mouse over the layer will highlight the shape on the canvas. If
    you have a layer that is in the mask group but that you don’t want to be affected
    by the mask, simply select it, go back to the Layer menu, and click Ignore Underlying
    Mask. You should then be able to see the shape without the effect of the mask,
    and the bullet will disappear from that layer.


    ### Outline Mask


    To see the masking effect in action, simply drag your new shape over the mask
    shape, as shown in Figure [3-13](#A978-1-4842-1458-9_3_Chapter.html#Fig13). You
    will see that a star mask has been applied to the image on the screen. The parts
    of the image that fall outside of the star will not be shown.


    ![A978-1-4842-1458-9_3_Fig13_HTML.jpg](A978-1-4842-1458-9_3_Fig13_HTML.jpg)


    Figure 3-13.


    A masked image with the star shape'
