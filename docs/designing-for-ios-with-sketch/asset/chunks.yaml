  trans: '

    ## 准备工作


    在我们开始设置页面设计之前，如果你还没有按照第 6 章所述设置好偏好，那么现在正是时候。同时，你也需要考虑将要设计的屏幕尺寸。如你所知，Sketch 提供了多种尺寸的画板，这些尺寸与当前的
    iOS 设备屏幕相对应。在开始设计之前，你应该确定目标设备尺寸，并选择合适的画板。在选择合适尺寸的画板时，Sketch 提供了一系列预设尺寸，如图 8-1
    所示。


    ![A978-1-4842-1458-9_8_Fig1_HTML.jpg](img/A978-1-4842-1458-9_8_Fig1_HTML.jpg)


    图 8-1. Sketch 3.3.3 中提供的预设画板尺寸列表


    由于本书主要针对 iPhone 进行设计，因此我们将只关注这些设备。通常，约定如下：


    *   选择 iPhone 5、5S 或 5C 被视为按 `@2×` 分辨率设计。

    *   在低于 `@2×` 分辨率下进行设计被视为 `@1×`。


    这些分辨率适用于 iPhone 4 系列及更早的设备。这些设备大多已停产，因此如果你刚开始设计，你应该按 `@2×` 或更高的分辨率进行设计。较新的设备（iPhone
    6 Plus 及以上）被视为 `@3×`。


    你开始设计时所用的分辨率或画板，将取决于最终产品的目标设备以及个人偏好。我通常从选择 iPhone 6 的画板开始设计，因为它能让我捕捉到所有细节。同时请记住，当你准备导出资源用于开发时，需要为多种屏幕尺寸和分辨率进行导出。


    我们将在第 10 章讨论导出资源。不过现在，我将使用 iPhone 6 的画板开始设计我的应用界面。


    ## 启动画面


    我们已经准备好了线框图，接下来将从启动画面开始。幸运的是，我们的 Logo 已经完好无损，可以直接从线框图中使用。将 Logo 中的所有元素编组并重命名以便于使用，这是一个不错的主意。如果你还记得，完成这一步后，我们还可以轻松更改
    Logo 的颜色，并在整个设计中统一更新，从而在设计阶段方便地进行修改。


    正如我们在创建线框图时所做的那样，我们将从启动画面开始，这是用户下载应用后看到的第一个页面。尽管它在屏幕上只会显示很短的时间，但这个页面却奠定了基调，甚至可能影响用户是否会继续探索你的应用。因此，把这个页面做好非常关键。


    从设计的角度来看，这个页面相对简单。考虑到应用的主题，摄影是一个关键元素，我没有使用纯色背景，而是决定采用全屏照片作为背景。我浏览了免版税图片文件夹，最终选择了
    Death to Stockphotos 的一张图片。他们提供基于订阅的免版税图片选择，每周会发送到你的收件箱。这张图片的主角是一位摄影师和他的相机。我认为这张图片暂时够用。我将照片导入到
    Sketch 画布上，调整了大小，添加了 `10px` 的高斯模糊，并将我们的 Logo 重新定位到屏幕较低的位置，以便让用户更好地欣赏照片。我还更改了 Logo
    的颜色。线框图中的 Logo 是黑色的，但我将其改为了白色。这样能让它更突出一些；请记住，如果我们之后决定更改它，我们可以随时修改并让所有地方同步更新。请参见图
    8-2 中启动画面线框图和刚刚创建的设计图之间的关键差异。左侧是线框图，右侧是设计图。这里重要的收获是，设计图与实际线框图有何不同，以及我们如何已经并将继续把线框图作为应用的指南，同时根据需要自由地偏离它们。


    ![A978-1-4842-1458-9_8_Fig2a_HTML.jpg](img/A978-1-4842-1458-9_8_Fig2a_HTML.jpg)![A978-1-4842-1458-9_8_Fig2b_HTML.jpg](img/A978-1-4842-1458-9_8_Fig2b_HTML.jpg)![A978-1-4842-1458-9_8_Fig2c_HTML.jpg](img/A978-1-4842-1458-9_8_Fig2c_HTML.jpg)


    图 8-2. PhotoBomb 启动画面的线框图形式和设计图形式


    创建图 8-2 所示的初始界面，需执行以下步骤：


    1.  创建一个新的空白画板。

    2.  导入所需的图片。

    3.  选择图片，然后勾选检查器面板中的复选框，添加高斯模糊效果。

    4.  通过滑块或直接在字段中输入数字，将高斯模糊设置调整为 `10px`。

    5.  复制 PhotoBomb Logo 并将其添加到页面中。

    6.  更改 Logo 的颜色。


    要添加“进入”按钮：


    1.  从“插入”菜单中选择矩形形状。

    2.  创建一个尺寸为 `298 × 65` 的圆角矩形。

    3.  使用“插入”菜单中的文本工具为按钮添加标签。

    4.  将这些项目（矩形和标签）编组，以便于引用并在需要编辑时保持它们在一起，如图 8-3 所示。


    ![A978-1-4842-1458-9_8_Fig3_HTML.jpg](img/A978-1-4842-1458-9_8_Fig3_HTML.jpg)


    图 8-3. “进入”按钮组包含矩形形状以及按钮的标签。PhotoBomb Logo 以符号形式显示


    完成启动画面后，我们可以继续其余的设计。使用 Sketch 的一大优势不仅在于其易用性和低入门门槛（正如我们在本书中所看到的），还在于它能大大缩短完成设计所需的时间。虽然我非常支持花必要的时间来仔细构思线框图，但设计阶段才是你真正想要节省时间的地方。设计可能很繁琐，尤其是对于更复杂的设计。一旦你熟练使用
    Sketch，无疑会缩短你的设计时间。如果与 Photoshop 和其他一些设计工具相比，你的设计时间没有显著减少，那么正如他们所说，你的使用方法有问题。接下来，我们开始设计
    PhotoBomb 应用的认证界面。

    '
- fmt: "# Onboarding\n\nOur wireframing screens for onboarding consisted of two screens\
    \ only. But we will change things up a bit for the design phase. As mentioned,\
    \ onboarding has become very important in app design in recent years. Here, we\
    \ want to take some time to express some creativity and really also use our design\
    \ sensibilities to entice the user and tell a story about our app.\n\nWe will\
    \ duplicate our previous pages for a new screen. Once we’ve added them to the\
    \ appropriate artboard in our design canvas, we’ll then find a new image for the\
    \ background of this new page. Here in the design phase and specifically in onboarding,\
    \ we want to think of each screen of our app as a journey the user is taking.\
    \ Where the previous page was an introduction to the app and the image showed\
    \ someone with a camera, we’d love to, in some way, use the new background for\
    \ this image and the series in general as a continuation of that journey we started\
    \ on the previous page. Here, I’ve opted for a photo that would exemplify an actual\
    \ image in the app. The image is of the Golden Gate Bridge in San Francisco. I’ll\
    \ use a few other images to take the user on that journey and add some copy to\
    \ the onboarding screens where I will explain to the user what the app is all\
    \ about. The copy and the imagery combined are critical to the app and to engaging\
    \ first-time users. For most of them, this is the first and last time that they\
    \ will see these screens. Most onboarding screens are only set to be shown on\
    \ first view but can sometimes be accessible later or in the settings if a user\
    \ desires to view them again. I’m focusing here on the text and images mostly.\
    \ Here’s what I ended up with in Figure [8-4](#A978-1-4842-1458-9_8_Chapter.html#Fig4).\n\
    \n![A978-1-4842-1458-9_8_Fig4_HTML.jpg](A978-1-4842-1458-9_8_Fig4_HTML.jpg)\n\n\
    Figure 8-4.\n\nA series of three onboarding screens for the PhotoBomb app. Note\
    \ the combination of copy and text to tie the visuals together and take the user\
    \ on a journey\n\nThe onboarding screens were created using the same techniques\
    \ that we used to create the splash screens. You should now know how to import\
    \ images, copy over the logo, and add text. The page controllers at the bottom\
    \ of each screen are symbols copied over from the iOS template included with Sketch.\
    \ Finally, to increase the legibility of the copy on each screen, I created a\
    \ mask by following these steps:\n\n- Create a rectangle that is the same size\
    \ as your artboard.  \n- Select black (`FFFFF`) as the fill color.  \n- Move the\
    \ layer into position so that it covers your artboard completely.  \n- Decrease\
    \ the opacity of the rectangle to 33 percent.  \n- Position the layer just above\
    \ the image itself in the Layers list.\n\nThis is also a good place to start thinking\
    \ and talking about animations and how your elements will move on the page. Note\
    \ that the PhotoBomb logo in our initial splash screens are in a different position\
    \ than in our onboarding screens as we needed to adjust the size of the logo and\
    \ its positioning to make room for the copy on the onboarding screen. How, then,\
    \ do we transition between the two screens? This is where designer and developer\
    \ must come together to discuss these transitions. They may seem easy and simple\
    \ in thought, but timing is everything. A cut from the home screen to the other\
    \ will likely be jarring for the user and cause a \"jump-cut\"-like effect with\
    \ the logo jumping from one position on one screen to the other, and the text\
    \ simply popping into place. A more subtle and welcoming transition here would\
    \ be to have the splash screen slowly dissolve into the onboarding screen after\
    \ the user hits the Enter button. Once the background has changed, the logo can\
    \ shift and slide up in a way that does not surprise the user.\n\nAnother thing\
    \ to note here is that we’ve used the Gaussian Blur effect on the first onboarding\
    \ screen but have removed it from the subsequent screens. This shift can be handled\
    \ as well by subtly dissolving from one image to another. In some cases, the designer\
    \ must also think about how the user is interacting with the screens to move through\
    \ the app. That is to say, is the user swiping or tapping on the screen to advance\
    \ the onboarding flow? Most users will swipe or tap as these are natural touch\
    \ interface interactions. In some instances, the page will bump slightly prompting\
    \ the user to swipe to see the next screen. These are interaction and transition\
    \ details that, again, can be handled either with annotations, with the creation\
    \ of a simple prototype, or with a conversation with your developer."
  raw: '## Onboarding


    Our wireframing screens for onboarding consisted of two screens only. But we will
    change things up a bit for the design phase. As mentioned, onboarding has become
    very important in app design in recent years. Here, we want to take some time
    to express some creativity and really also use our design sensibilities to entice
    the user and tell a story about our app.


    We will duplicate our previous pages for a new screen. Once we’ve added them to
    the appropriate artboard in our design canvas, we’ll then find a new image for
    the background of this new page. Here in the design phase and specifically in
    onboarding, we want to think of each screen of our app as a journey the user is
    taking. Where the previous page was an introduction to the app and the image showed
    someone with a camera, we’d love to, in some way, use the new background for this
    image and the series in general as a continuation of that journey we started on
    the previous page. Here, I’ve opted for a photo that would exemplify an actual
    image in the app. The image is of the Golden Gate Bridge in San Francisco. I’ll
    use a few other images to take the user on that journey and add some copy to the
    onboarding screens where I will explain to the user what the app is all about.
    The copy and the imagery combined are critical to the app and to engaging first-time
    users. For most of them, this is the first and last time that they will see these
    screens. Most onboarding screens are only set to be shown on first view but can
    sometimes be accessible later or in the settings if a user desires to view them
    again. I’m focusing here on the text and images mostly. Here’s what I ended up
    with in Figure [8-4](#A978-1-4842-1458-9_8_Chapter.html#Fig4).


    ![A978-1-4842-1458-9_8_Fig4_HTML.jpg](A978-1-4842-1458-9_8_Fig4_HTML.jpg)


    Figure 8-4.


    A series of three onboarding screens for the PhotoBomb app. Note the combination
    of copy and text to tie the visuals together and take the user on a journey


    The onboarding screens were created using the same techniques that we used to
    create the splash screens. You should now know how to import images, copy over
    the logo, and add text. The page controllers at the bottom of each screen are
    symbols copied over from the iOS template included with Sketch. Finally, to increase
    the legibility of the copy on each screen, I created a mask by following the these
    steps:


    Create a rectangle that is the same size as your artboard.   Select black (FFFFF)
    as the fill color.   Move the layer into position so that it covers your artboard
    completely.   Decrease the opacity of the rectangle to 33 percent.   Position
    the layer just above the image itself in the Layers list.


    This is also a good place to start thinking and talking about animations and how
    your elements will move on the page. Note that the PhotoBomb logo in our initial
    splash screens are in a different position than in our onboarding screens as we
    needed to adjust the size of the logo and its positioning to make room for the
    copy on the onboarding screen. How, then, do we transition between the two screens?
    This is where designer and developer must come together to discuss these transitions.
    They may seem easy and simple in thought, but timing is everything. A cut from
    the home screen to the other will likely be jarring for the user and cause a “jump-cut”-like
    effect with the logo jumping from one position on one screen to the other, and
    the text simply popping into place. A more subtle and welcoming transition here
    would be to have the splash screen slowly dissolve into the onboarding screen
    after the user hits the Enter button. Once the background has changed, the logo
    can shift and slide up in a way that does not surprise the user.


    Another thing to note here is that we’ve used the Gaussian Blur effect on the
    first onboarding screen but have removed it from the subsequent screens. This
    shift can be handled as well by subtly dissolving from one image to another. In
    some cases, the designer must also think about how the user is interacting with
    the screens to move through the app. That is to say, is the user swiping or tapping
    on the screen to advance the onboarding flow? Most users will swipe or tap as
    these are natural touch interface interactions. In some instances, the page will
    bump slightly prompting the user to swipe to see the next screen. These are interaction
    and transition details that, again, can be handled either with annotations, with
    the creation of a simple prototype, or with a conversation with your developer.'
  trans: '

    # 引导页


    我们的引导页线框图最初只包含两个界面。但在设计阶段，我们会稍作调整。如前所述，近年来引导页在应用设计中变得非常重要。在此，我们想花些时间展现创意，真正运用设计感来吸引用户，并讲述一个关于我们应用的故事。


    我们将复制之前的页面来创建新界面。将它们添加到设计画布中对应的画板后，我们会为新页面寻找一张新的背景图。在设计阶段，尤其是引导页设计中，我们希望将应用的每个界面视为用户正在经历的一段旅程。之前的页面是对应用的介绍，图片展示的是手持相机的人，我们希望在某种程度上，将新背景图片以及整个系列作为上一页面所开启的旅程的延续。这里我选择了一张能够体现应用内实际图片效果的照片，画面是旧金山的金门大桥。我将使用其他几张图片带领用户继续这段旅程，并在引导页上添加一些说明文字，向用户解释应用的核心功能。文字与图像的结合对于应用以及吸引首次用户至关重要。对大多数用户而言，这是他们第一次也是最后一次看到这些界面。多数引导页只在首次打开时显示，但有时用户也可以在后续或设置中再次查看。我主要关注文本和图像。图
    8-4 展示了我最终完成的效果。


    ![A978-1-4842-1458-9_8_Fig4_HTML.jpg](img/A978-1-4842-1458-9_8_Fig4_HTML.jpg)


    图 8-4


    PhotoBomb 应用的一组三屏引导页。请注意文字与图片的结合，以串联视觉元素并引导用户踏上旅程


    这些引导页使用了与创建启动屏相同的技术。现在你应该已经知道如何导入图片、复制 Logo 并添加文字。每个界面底部的页面控制器是 Sketch 自带的 iOS
    模板中的符号。最后，为了提高每个界面文字的可读性，我按照以下步骤创建了一个遮罩：


    -  创建一个与画板尺寸相同的矩形。

    -  选择黑色（`FFFFF`）作为填充颜色。

    -  移动图层位置，使其完全覆盖画板。

    -  将矩形的透明度降低到 33%。

    -  在图层列表中将该图层置于图片上方。


    此时也是开始思考和讨论动画效果以及元素如何在页面上移动的好时机。请注意，我们启动屏中的 PhotoBomb Logo 位置与引导页中的不同，因为我们需要调整
    Logo 的大小和位置，为引导页的文字腾出空间。那么，我们如何在这两个界面之间进行过渡呢？这正是设计师和开发者必须共同讨论这些过渡效果的地方。它们可能看起来简单，但时机至关重要。从主界面直接切换到另一个界面可能会让用户感到突兀，导致
    Logo 像“跳切”一样从一个位置跳到另一个位置，而文字则突然出现。一种更微妙且友好的过渡方式是：当用户点击“进入”按钮后，启动屏缓慢溶解到引导页。背景变化后，Logo
    可以以不令用户惊讶的方式平滑上移。


    另一点需要注意的是，我们在第一个引导页上使用了高斯模糊效果，但在后续页面中移除了它。这种变化也可以通过一张图片缓慢溶解到另一张图片的方式来处理。在某些情况下，设计师还必须考虑用户如何与界面交互以在应用中导航。也就是说，用户是通过滑动还是点击屏幕来推进引导流程？大多数用户会滑动或点击，因为这些是自然的触屏交互方式。有时，页面会有轻微的弹动感，提示用户滑动以查看下一页。这些交互和过渡细节同样可以通过标注、创建简单原型，或与开发人员沟通来处理。

