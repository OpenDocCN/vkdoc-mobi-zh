    making my final adjustments in spacing, the final icon can be seen in Figure [9-12](#A978-1-4842-1458-9_9_Chapter.html#Fig12).
    It may not be the best icon in the world, but it holds fast to some of our principles
    outlined earlier in the chapter. If you have time, you may want to put the app
    before an informal focus group to see if potential users can glean what the app
    is about.


    ![A978-1-4842-1458-9_9_Fig12_HTML.jpg](A978-1-4842-1458-9_9_Fig12_HTML.jpg)


    Figure 9-12.


    The completed PhotoBomb app icon


    ### Other Changes for Consistency


    Now that the PhotoBomb icon is complete, I decided to go back and change the old
    logo we’d been using on the onboarding pages and in the header of the main app.
    To do this, I needed to create a smaller version of the bomb icon only, one that
    would fit in between the letters of our logo. To do this I made a duplicate of
    the icon and deleted the camera, as it would be too small to show. Then I resized
    the bomb icon and changed the fill color from black to white and added it to the
    logo. I grouped the layers and created a new logo symbol so that any additional
    changes or adjustments would be reflected across my designs. The new onboarding
    screens with the new bomb icon in the log are shown in Figure [9-13](#A978-1-4842-1458-9_9_Chapter.html#Fig13).


    ![A978-1-4842-1458-9_9_Fig13_HTML.jpg](A978-1-4842-1458-9_9_Fig13_HTML.jpg)


    Figure 9-13.


    Onboarding screens with redesigned bomb icon in the logo


    Our app icon is complete. The process of going back and making final adjustments
    happens in most stages of the design process. Most projects won’t easily flow
    from one phase to the other. There may be lots of backtracking and making changes
    midstream. The key to being a good designer is to always remain flexible at any
    stage in the process. Each shift or change will bring a fair amount of learning
    with it.


    We’ve wrapped up our designs, created an app icon we’re pretty happy with, and
    made our final adjustments. We’re now ready to hand off our designs to an engineer
    for development. The next chapter will take us through that process.'
  trans: '

    ### 创造火花


    每根引信都有火花，对吧？那么让我们为炸弹创造一个吧。用 Sketch 实现这个再简单不过了。以下是创建炸弹火花的步骤。


    -   从`插入`菜单选择`星形`形状，并在画布上炸弹引信的末端绘制一个星形。

    -   转到`检查器`，将星形的角点数增加到 12。

    -   移除边框，并将填充颜色更改为十六进制代码 `F5A623`。

    -   重复步骤 1 和 2 创建另一个星形。

    -   将新星形从第一个星形移开几个像素。

    -   移除第二个星形的边框，并将填充颜色更改为 `F8E71C`。


    现在，你的引信末端应该有火花了，你的图标设计应该看起来像图 9-9 中的图形。


    ![A978-1-4842-1458-9_9_Fig9_HTML.jpg](img/A978-1-4842-1458-9_9_Fig9_HTML.jpg)


    *图 9-9. 引信末端添加了新火花的 PhotoBomb 应用图标*


    添加了火花后，我们的图标开始初具雏形。回顾我们最初关于设计应用图标的建议，我希望用户看到这个应用时，能非常清楚地了解它的功能和用途。PhotoBomb 这个词通常意味着照片被另一个人闯入画面并破坏了镜头。但我们的应用不是这样的。那么，我们如何让潜在用户非常清晰地了解这款应用是做什么的呢？嗯，这就是相机派上用场的地方。但是，它真的能放进炸弹里面吗？嗯，这需要我们移除刚刚添加的光泽。但这是设计过程中必要的一步。


    让我们开始吧。首先，我们对光泽图层进行分组和隐藏，以免它们碍事。


    -   选择炸弹图像上构成光泽的所有部分。

    -   点击`页眉`菜单中的`分组`按钮，创建一个包含这些形状的新文件夹。

    -   将该组重命名为`"光泽"`或类似的变体名称，以便你能轻松找到它。

    -   将鼠标悬停在该菜单上，点击出现的眼睛图标，将其从画布上隐藏。


    结果显示在图 9-10 中。


    ![A978-1-4842-1458-9_9_Fig10_HTML.jpg](img/A978-1-4842-1458-9_9_Fig10_HTML.jpg)


    *图 9-10. 我们现在已经适当地清理并命名了图层，并隐藏了光泽，以便我们可以继续将相机添加到图标的工作*


    ### 添加相机！


    接下来，我们来添加相机。当然，我们可以导入一个相机的图标，但在此，我们希望充分利用在前几章中学到的所有技能。使用 Sketch，我们可以用易于创建的形状来制作我们自己的相机图标。以下是创建相机的步骤：


    **首先，我们将创建相机机身。**


    -   创建一个 `412 × 290` 的矩形，圆角半径为 `46`。

    -   移除填充，并将边框厚度设为 `12`。


    **接下来，我们将创建镜头。**


    -   从`插入`菜单中选择`椭圆`工具：

    -   绘制圆形时按住 `Shift` 键，使其成为 `214 × 214` 的正圆。

    -   转到`检查器`工具，将圆形的厚度设为 `12`。

    -   使用 `↑ + D` 复制第一个圆形。

    -   将第二个圆形的大小调整为 `162 × 162`，并将这个新圆形的厚度设为 `7`。

    -   将第二个圆形放置在第一个圆形内部。


    **接下来，我们将创建相机顶部的闪光灯：**


    -   通过从`插入`菜单中选择`矩形`工具来创建另一个矩形。

    -   转到`检查器`工具，将其厚度设为 `12`。

    -   双击形状以调出`贝塞尔`工具。

    -   选择`直线`工具，将两个顶角向中间拖拽，以创建闪光灯的形状。

    -   将这个新形状移动到相机机身形状的顶部。


    **为了创建拍照按钮：**


    -   从`插入`菜单中选择`椭圆`。

    -   绘制圆形时按住 `Shift` 键，使其成为 `32 × 32` 的正圆。

    -   转到`检查器`工具，将圆形的厚度设为 `7`。

    -   将圆形放置在相机机身的右上角。


    我们的相机现在创建完成了。我隐藏了图标的其他图层，包括炸弹、引信和火花，以便专注于相机。图 9-11 显示了我们在画布上刚创建的相机（没有其他元素）。


    ![A978-1-4842-1458-9_9_Fig11_HTML.jpg](img/A978-1-4842-1458-9_9_Fig11_HTML.jpg)


    *图 9-11. 完成后的相机图标，将被添加到设计的其余部分*


    相机图标完成后，我们现在可以将所有部分组合起来，看看最终的应用图标是什么样子。


    为了进行最后的调整，我需要取消隐藏画布上所有其他图层，以确保它们协同工作。为此，我只需点击每个被隐藏图层上的眼睛图标，就可以看到它们重新出现在画布上。在对间距进行最终调整后，最终的图标如图
    9-12 所示。它可能不是世界上最好的图标，但它牢牢遵循了我们本章前面概述的一些原则。如果你有时间，你可能希望将这款应用放在非正式的焦点小组面前，看看潜在用户是否能理解这款应用是做什么的。


    ![A978-1-4842-1458-9_9_Fig12_HTML.jpg](img/A978-1-4842-1458-9_9_Fig12_HTML.jpg)


    *图 9-12. 完成的 PhotoBomb 应用图标*


    ### 为保持一致性所做的其他更改


    现在 PhotoBomb 图标已经完成，我决定回去更改我们之前在引导页和主应用页眉中使用的旧标志。为此，我需要创建一个仅包含炸弹图标的较小版本，这个版本要能嵌入我们标志的字母之间。我复制了图标并删除了相机，因为它在小尺寸下会显示不清。然后我调整了炸弹图标的大小，并将填充颜色从黑色改为白色，然后将其添加到标志中。我将这些图层分组并创建了一个新的标志符号，这样任何后续的更改或调整都能在我的设计中同步反映。带有新炸弹图标标志的新引导页显示在图
    9-13 中。


    ![A978-1-4842-1458-9_9_Fig13_HTML.jpg](img/A978-1-4842-1458-9_9_Fig13_HTML.jpg)


    *图 9-13. 标志中带有重新设计的炸弹图标的引导页*


    我们的应用图标完成了。在大多数设计阶段中，都会出现回头进行最终调整的过程。大多数项目不会轻易地从一个阶段过渡到另一个阶段。可能会有大量的回溯和过程中的更改。成为一名优秀设计师的关键是在流程的任何阶段都保持灵活。每一次转变或改变都会带来大量的学习机会。


    我们完成了设计，创建了一个自己相当满意的应用图标，并进行了最终调整。现在，我们准备将设计交接给工程师进行开发。下一章将带我们了解这个过程。

