    Udemy 上的付费课程，甚至还有由`Sketch`设计师`Christopher Downer`在`TreeHouse`上教授的`Sketch`课程。


    `Meng To`创建了这些独立课程中最受欢迎的之一。`Meng`是一位设计师，也是“设计师也应该会编码”这一日益壮大思潮的坚定支持者。他撰写了`Design
    & Code`，这是一本电子书，教设计师如何通过使用`Xcode`进行一些基础编码，来掌握 iOS 设计的精妙之处。在书中，他大力称赞使用`Sketch`和名为`Flinto`的在线原型制作工具可以轻松制作原型。`Meng`现在环游世界，开设现场课程，教授设计师如何使用`Sketch`设计应用，并使用苹果的新开发语言`Swift`构建它们。`Design
    & Code`促使我再次仔细审视`Sketch`——我很高兴我这么做了。


    我一直觉得`Photoshop`的用户界面令人生畏。可用的工具数量之多，甚至成为我想要学习如何使用它的障碍。我从一些初次接触设计的设计师那里也听到了类似的故事。`Sketch`有一个精简的界面，与
    Adobe 的另一款工具`Fireworks`更为相似。我喜欢`Fireworks`，因为它似乎和`Sketch`一样，是为设计师设计的；具体来说，是那些更专注于
    Web 和移动应用用户界面设计的设计师。当我第一次打开`Sketch`时，我立刻感到舒适。我可以自定义工具栏，包含我最常用的工具。这让我能够在更少干扰的情况下花更多时间进行设计，这促使我尝试使用我所需要的特定工具。


    `Photoshop`并非是唯一可以比较的对象。市面上当然还有其他设计工具。还有一些其他的小众图形程序，可以吸引那些正在寻找`Photoshop`替代品的设计师。像`Skala`这样的应用，对于正在寻找专为他们量身打造的差异化工具的设计师来说，是值得考虑的替代品。


    特效是设计师会欣赏`Sketch`的另一个原因。此外，能够一次为一个图层添加多个效果，是对`Sketch`功能集的一个很好的补充。这包括模糊、反射、边框以及内阴影和外阴影。


    使用`Sketch`进行导出，就像进行几次选择和点击几个按钮一样简单。可以以多种分辨率导出整个画板。如果你曾尝试在其他程序中导出设计，你会欣赏这个功能。


    ## iOS 9


    `iOS 9`是 iPhone 操作系统的最新版本。关于其“引擎盖下”的改动已经说了很多，而有些人则认为这些改动基本上都是次要的。尽管如此，尽管`iOS 9`提供了一些可能不为人所见的优化，但它仍然是一个重要的更新。


    你可能还记得，2013 年，苹果彻底改革了 iOS 的用户界面，自 2007 年第一款 iPhone 发布以来首次改变了外观。`iOS 7`为 iPhone
    和 iPad 用户带来了完全不同的观感和体验。它摒弃了拟物化设计，转向了扁平化设计的趋势。它还引入了诸如“控制中心”之类的新工具，这是一个从屏幕底部向上滑动即可升起的面板，显示一个磨砂面板，提供对飞行模式、蓝牙和其他选项的便捷访问。新操作系统还为苹果引入了一种全新的“扁平化设计”语言。设计人员不得不接受，他们也确实这样做了。事实上，新的应用程序都具有`iOS
    7`特定的观感和体验。


    `iOS 8`通过添加`HealthKit`和`HomeKit`等框架进一步优化了用户界面。但这两者都没有代表设计语言的重大转变，也没有给设计师带来重大问题。


    `iOS 9`于 2015 年秋季发布，是苹果移动设备操作系统的最新迭代版本。因此，你可能会问自己该期待什么，以及在使用`Sketch`进行设计时如何应对这些变化。好消息是，从设计的角度来看，需要设计师担心的变化并不多。`iOS
    9`的核心在于为移动设备操作系统提供了更高的稳定性和修复，并对 iOS 的核心应用程序系列进行了更多更改。这些更改将为用户提供跨设备的更一致体验、错误修复、性能的显著提升，以及最引人注目的是，操作系统体积的显著减小。用户可以期待诸如多任务处理、新键盘、像`Apple
    News`这样的新应用，以及向`Apple Maps`添加公共交通信息等新功能。


    虽然从设计角度来看这些变化并不显著，但设计师需要了解几个功能特性；这些特性不仅将改变用户与其设备的交互方式，还可能影响与应用程式的交互。


    ### 应用切换器


    通过双击 Home 键仍然可以在应用之间切换；然而，这样做现在会显示所有当前打开程序的较新的垂直视图。用户可以像以前一样滑动浏览。


    ### 照片的新导航方式


    现在，当在“相机胶卷”中浏览照片时，你可以简单地在一列照片上滑动，以更详细地查看其中一张。你不再需要单独点按每张照片。


    ### 新的返回按钮


    添加一个允许用户返回上一个程序的返回按钮，标志着`iOS 9`中的一个新导航元素。该按钮允许用户无需按 Home 键即可导航回上一个程序。

