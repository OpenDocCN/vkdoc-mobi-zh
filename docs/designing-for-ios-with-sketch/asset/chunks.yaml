  trans: '

    # 开场介绍


    打开程序后，您会发现 Sketch 的界面相当简洁。它被设计得尽可能精简，以便让您能完全专注于工作。没有浮动面板，您所需的一切都可以从界面内的三个主要区域轻松访问。这三个区域分别是：


    顶部的工具栏、左侧的图层面板、右侧的属性检查器，以及屏幕中央的画布——您实际的设计工作都将在那里进行。


    Sketch 提供无限滚动功能。这让您能对屏幕上显示的内容有极高的控制权。借助此功能，您可以在任意方向上无限滚动，并向画布添加任意多的内容，如图 2-2 所示。


    ![A978-1-4842-1458-9_2_Fig2_HTML.jpg](img/A978-1-4842-1458-9_2_Fig2_HTML.jpg)


    图 2-2. Sketch 3.3.3 版本界面


    **提示**：如果您在画布上滚动到最左、最右或任何位置后迷失了方向，可以随时使用快捷键 `⌘1` 或通过 `视图` 菜单选择 `居中画布` 来返回您的设计。


    ## 画布


    屏幕的中间区域称为画布。这是您花费时间最多的地方，因为您的设计实际上就存在于这个空间。您在属性检查器中所做的调整都会在画布区域中体现出来。


    当您开始设计时，手头必须准备好 iPhone 的正确尺寸。如您所知，iOS UI 设计包含许多独特的元素，每个元素都带有苹果独特的触感。这些元素是 iOS
    设计语言不可或缺的一部分。您可能已经安装了 San Francisco 字体，但那些赋予 iOS 标志性外观和感觉，使其与众不同、在与其他移动操作系统对比时脱颖而出的其他元素呢？这包括诸如
    iOS 键盘、分段控件，以及从 iPhone 底部轻松滑出的控制中心等元素。您可能会问自己，我们需要从头设计所有这些元素吗？嗯，当然不必。


    2014 年 3 月，Sketch 宣布将附带由知名设计工作室 Teehan+Lax 创建的 iOS8 GUI。Sketch 团队此前曾为 Adobe Photoshop
    发布过 iOS 模板，因此设计师们对其精细的工作已很熟悉。


    该模板包含一个精雕细琢、分层的文件，内含多个形状和图层。所有这些形状和图层都经过精心制作，重新呈现为 Sketch 的原生格式——矢量。更令人兴奋的是，这些形状和图层都是可编辑的。只要遵循
    Sketch 的条款，设计师可以自由使用它们来创作新设计。对于有兴趣使用 Sketch 进行 iOS 设计的设计师来说，这简直是天赐之物。


    Sketch 捆绑 GUI 的好处在于，设计师不再需要上网搜索并导入程序。现在只需点击几个按钮就能轻松访问。要访问该 GUI，请转到工具栏上方的 `文件`
    菜单，选择 `从模板新建`，如图 2-3 所示。选择您设计所需的合适模板。您会看到 iOS App 图标和 iOS UI Design Mac App 图标等模板。选择
    `iOS UI Design` 模板，然后就可以开始了。


    ![A978-1-4842-1458-9_2_Fig3_HTML.jpg](img/A978-1-4842-1458-9_2_Fig3_HTML.jpg)


    图 2-3. 在 Sketch 3 中访问 Teehan+Lax iOS8 GUI


    打开菜单并选择 `iOS UI Design` 后，Sketch 将打开一个新窗口，其中包含模板以及所有元素、图层、组和矢量，如图 2-4 所示。图层和组已根据其在画布上对应的元素进行了命名。将鼠标悬停在图层列表中的某个元素上，将高亮显示画布上对应的元素。这里包含了您为
    iOS 设计应用所需的所有 UI 元素。


    ![A978-1-4842-1458-9_2_Fig4_HTML.jpg](img/A978-1-4842-1458-9_2_Fig4_HTML.jpg)


    图 2-4. Sketch 3 中的 iOS UI 设计模板


    如果您正在开始一个新的 iOS 设计或原型，可以直接从工具栏中将这些元素中的任何一个添加到您的画板，轻松上手。只需打开模板，转到：`插入` ➤ `符号`，然后选择要添加到设计中的单个符号。


    由于画布完全不受约束，在为特定设备、屏幕尺寸和分辨率进行设计时，这可能会带来问题。如何为小屏幕与大屏幕设计？如何为 iPhone 与 iPad 设计？甚至如何为显示网站的显示器设计？这引出了我们对画板的讨论与探索。


    ## 工具栏


    工具栏（如图 2-5 所示）包含了您进行设计所需的所有工具。您将使用工具栏来创建形状和添加图层。仔细查看工具栏，最左边的 `插入` 菜单是您看到的第一个按钮。`插入`
    菜单用于创建形状、添加文本、图像、画板等。所有这些元素都将成为您使用 Sketch 创建的任何设计的构建块。


    ![A978-1-4842-1458-9_2_Fig5_HTML.jpg](img/A978-1-4842-1458-9_2_Fig5_HTML.jpg)


    图 2-5. Sketch 工具栏显示在画布顶部


    从左到右，工具栏中的其他元素如下。我们将在本书后面更详细地讨论每一项：


    *   **编组** 和 **取消编组**：这些工具用于通过将选定的图层组合成组来保持文档的组织性。

    *   **创建符号**：此选项用于将图层扁平化以创建符号，这些符号可以在页面或画板之间重复使用。

    *   **缩放**：允许您按百分比指示放大或缩小画布。点击工具栏中放大镜旁边的加号或减号按钮将相应地调整画布。

    *   **编辑、变换、旋转和展平**：您可以使用此工具以多种方式操作形状。

    *   **遮罩和缩放**：此工具允许您将图层裁剪到形状，并调整其大小。

    *   **联合、减去、交集和差集**：这些是布尔运算工具。

    *   **前移和后移**：这允许您通过将各个图层置于前景或将其他图层移至背景来进一步组织设计。

    *   **镜像**：此工具允许您使用 `Sketch Mirror` 应用在 iPhone 上查看您的设计。

    *   **视图**：让您显示或隐藏各种视觉辅助工具，如标尺、网格和布局参考线。您也可以在此处调整网格和布局设置。

    *   **导出**：此工具允许您以多种不同尺寸导出设计。


    ### 自定义工具栏


    工具栏也可以根据您的喜好和工作流程进行自定义。一旦您知道哪些工具比其他工具使用得更频繁，自定义工具栏就会很有帮助。它使特定工具易于访问。


    要自定义工具栏，请转到 `视图` 菜单并选择 `自定义工具栏`。一个包含所有代表操作的图标的窗口将滑下。您只需从下拉面板中选择图标，并将其拖入工具栏中的空白区域，即可将这些图标中的任意一个添加到工具栏中，如图
    2-6 所示。将其拖入空间后，它会自动对齐到位。当您选择了所有想要的图标后，点击 `完成`，抽屉面板便会收起。不过，在本书的其余部分，我们将假定使用现有的默认工具栏。


    ![A978-1-4842-1458-9_2_Fig6_HTML.jpg](img/A978-1-4842-1458-9_2_Fig6_HTML.jpg)


    图 2-6. 通过从下拉面板中选择图标来自定义您的工具栏

