  trans: '

    # 1. 为什么选择 Sketch？


    恭喜你！你已经决定开始使用 `Sketch` 来设计 iOS 应用。这是一个重要的决定。你可能注意到，也可能没注意到，设计界目前正酝酿着一场争议。你问是什么争议？那就是：究竟是继续使用多年来作为行业标准的
    `Adobe Photoshop`，还是选择一款名为 `Sketch` 的更新、更小巧、更快速的替代软件。


    最近，许多设计师都选择了 `Sketch`，这款软件曾是由荷兰海牙软件开发公司 Bohemian Coding 开发的一款鲜为人知的图形软件。许多人已将这款应用融入了他们的设计工作流程。这些设计师包括国际知名平面设计师、曾任《*纽约时报*》设计总监的
    Khoi Vihn，以及多家设计咨询公司和诸如 `BuzzFeed`、`SEGA`、`Google` 等企业，还有像 `Pinterest` 和 `Groupon`
    这样的初创公司。`Sketch` 似乎正在席卷整个设计界。这款应用仅适用于 Mac OS，售价仅为 99 美元，比 Photoshop 更快速，体积也更小（约
    40MB）。再加上它是专门为从事移动应用和网页 UI 设计的设计师量身打造的，这一切都为选择 `Sketch` 提供了极具说服力的理由。


    本书的目的并非说服你弃用 Photoshop 而改用 `Sketch`。既然你正在阅读此书，我假设你已经决定探索如何将 `Sketch` 融入你的设计工作流程。平心而论，Photoshop
    自有其用途。你仍然需要用它来编辑照片、光栅文件以及处理其他任务，正如其名。数十年来，Photoshop 一直是平面设计师们事实上的“首选”软件，因为它在某些方面的表现优于市场上的任何其他软件。


    本书的主要目的是向你介绍 `Sketch`，并阐述为什么对于任何考虑为 iOS 设备进行界面设计的人来说，它都是一个出色的工具。在某些地方，我会指出 `Sketch`
    和 Photoshop 的差异，但我绝不是说 Photoshop 不好而 `Sketch` 就好。任何关于“`Sketch` vs. Photoshop”的搜索都会找到大量文章，论述设计师们为何认为某款软件优于另一款。其中一些观点会在本书中复述，但仅限于与本书总体目标相关的部分；也就是说，为了设计出优秀的
    iOS 界面。


    ## 一段小历史


    虽然 Photoshop 已经面世大约 25 年——其初始版本于 1990 年 2 月发布——但 `Sketch` 在设计界算是相对的新面孔。它的早期版本未能在设计界引起巨大波澜。虽然一些设计师注意到了它，但起初它的普及程度远不及今天。Adobe
    的设计软件套件，即之前的 Creative Suite，仍然是行业标准。事实上，许多设计师和机构至今仍对其深信不疑。


    接着，在 2013 年，Adobe 宣布其 Creative Suite 将仅能通过基于云端的订阅计划获取，这一举措证明了其业务模式的转变。旧版的 DVD
    版本将不再提供，用户需要注册每月 40 美元的订阅计划才能使用软件。Creative Suite 包含了全球设计专业人士使用的一些 Adobe 顶级软件——Photoshop、InDesign、Premiere
    Pro、AfterEffects、Dreamweaver、Illustrator 以及其他 Adobe 产品都将迁移至云端。该产品被重新命名为 Adobe
    Creative Cloud。


    需要明确的是，用户通过 Creative Cloud 使用软件时不会察觉到明显差异，且软件仍然需要下载并安装到他们的机器上。这种云端模式的主要区别在于，需要定期（通常每
    30 天左右）通过互联网连接来验证软件版本是否有效。如果与 Adobe 服务器进行的验证检查发现订阅已失效，那么该软件将被视为无效且无法继续使用。


    新的订阅模式提供了不同的价位——学生版每月 19.99 美元，普通版定价 49.99 美元。考虑到完整版的 Adobe Creative Suite 价格可能高达
    2500 美元左右，有些人认为这很划算。但设计界中也有人对此变革感到困扰。如今，Creative Cloud 允许访问 Adobe 全套软件程序，许多设计师已经注册了这项新服务。最近的报告显示，Adobe
    目前拥有 461 万付费 Creative Cloud 客户，并计划在 2015 年底前将其增加到 600 万。


    Creative Cloud 的最新更新将在 Photoshop 中引入画板功能（这是 `Sketch` 的一个关键特性，我们稍后将讨论）。值得注意的是，它还包含了
    Adobe Design Space，这是一个新的基于 HTML 的设计工具，拥有精简的界面，看起来与 Sketch 惊人地相似。


    长期以来，Photoshop 一直保持着为网页和移动应用创建界面的平面设计师们事实上的标准地位。多年来，它一直无人能敌，但私下里，许多设计师早已厌倦了 Photoshop
    和 Illustrator 的臃肿。这些程序体积庞大，需要大量的 RAM 资源才能运行。仅 Photoshop 就需要至少 2GB 的 RAM，推荐 8GB。


    一些设计师（包括本书作者）认为，随着网络环境的变化以及手机和平板电脑的日益普及，Adobe 在保持 Photoshop 与时俱进方面做得并不出色，它试图包揽太多，为太多人做太多事。它的渲染方式效率不高，任何创建过
    Photoshop 文件的人都知道，该程序倾向于以专有格式（PSD）生成非常巨大的文件。UI 设计师有其特殊需求，而许多人觉得这些需求并未得到满足。


    尽管如此，在相当长一段时间内，任何新来者想要挑战 Adobe 在设计领域的主导地位几乎都是不可能的。许多公司为团队投资了 Creative Suite，设计师们一边忍受着各种挫败感，一边期待能有更好的选择出现。

    '
- fmt: '# Enter Sketch 2


    `Sketch` first made its way onto my radar in late 2013, well before its current
    iteration (v3.3.3). Version 2 was already out, and some friends of mine were discussing
    the program. I took a look at the interface and thought that it seemed very simple.
    Maybe too simple, as shown in Figure [1-1](#A978-1-4842-1458-9_1_Chapter.html#Fig1).
    At that time, I was still a fan of `Fireworks` for interface design, mostly because
    it offered very focused tools and wasn’t as overwhelming as `Photoshop`. At the
    time, I didn’t care enough to dive deeper or to get a better understanding of
    what Bohemian Coding was trying to accomplish with `Sketch`.


    ![A978-1-4842-1458-9_1_Fig1_HTML.jpg](A978-1-4842-1458-9_1_Fig1_HTML.jpg)


    Figure 1-1. The `Sketch` 2 interface


    However, like the little engine that could, the scrappy software studio made steady
    and consistent improvements to the program. From the beginning, they have been
    listening and paying close attention to the feedback from designers in their growing
    community. This is apparent in every `Sketch` release.


    First off, it’s important to note that `Sketch` is a Mac OS X app. This means
    that `Sketch` was created initially to run solely and exclusively on the Mac operating
    system. As such, releases were timed and optimized to work with various releases
    of the OS by Apple. Starting with `Sketch` version 2.3, it was known as the “Snow
    Leopard” release. The team added features such as Boolean operations, background
    blur, and the ability to import PDF and EPS files into designs.


    The developers also focused on improving the program’s responsiveness and speed.
    Features like background blur were important for iOS designers, as this feature
    was prominent in Apple’s revamp of iOS. With the new look being prominently displayed
    on iPhones everywhere, the `Sketch` development team had the foresight to add
    this feature to the program. This is the kind of thinking that made designers
    take notice of `Sketch`.


    ## Sketch Mirror


    Another feature for which Bohemian Coding showed a lot of foresight was the addition
    of `Sketch Mirror` (see Figure [1-2](#A978-1-4842-1458-9_1_Chapter.html#Fig2)).
    This handy feature allowed designers to preview their work in all its glory on
    their iPhones or iPad. Distributed as a standalone iPhone app and available via
    the App Store, `Sketch Mirror` scales your designs up or down depending on resolution,
    and it allowed you to preview your designs directly on an iPhone or iPad. This
    small change demonstrated Bohemian Coding’s commitment, not only to designers
    working on mobile apps, but to iOS itself; that is, `Sketch` gave a nod to the
    dominant mobile platform at the time.


    ![A978-1-4842-1458-9_1_Fig2_HTML.jpg](A978-1-4842-1458-9_1_Fig2_HTML.jpg)


    Figure 1-2. `Sketch Mirror` allows designers to preview designs on an iPhone


    Not satisfied to sit back on their laurels, the team at Bohemian Coding kept improving
    the program. `Sketch` 2.4 brought enhancements to masking, greatly improved speed
    when grouping, resizing, moving, and ungrouping large amounts of layers, multiple
    bug fixes, as well as improved color accuracy, something that is of critical importance
    to all designers.


    ## Bye, Bye Fontcase . . .


    A critical move that proved that Bohemian Coding had the needs and desires of
    designers everywhere at heart was the retiring of `Fontcase`. For those who are
    unaware, `Fontcase` was a font management system that allowed designers and graphic
    designers to store, manage, and preview their fonts. While this might sound superfluous
    and unnecessary, for designers, something like Font Manager is incredibly important.
    Designers need to know which apps are installed on their system and what they
    look like, and Font Manager makes it very easy to browse for fonts. The program
    was built directly into iOS for a while. Citing issues with font activation in
    `Fontcase` and sandboxing, the team at Bohemian Coding wisely made the decision
    to retire `Fontcase`. Apparently, there were major issues, and `Fontcase` wasn’t
    working properly. Moreover, designers were having a hard time understanding just
    why it was needed in the first place. From the Bohemian Coding blog:


    > “We’ve come to the realization that `Fontcase`’s main features are just not
    needed or appropriate in this day and age, and the time has come to retire it.
    Therefore, we’ve made the difficult decision to remove the app from the store.
    We will offer non-sandboxed copies to anyone who’s experiencing problems, but
    this will be the last `Fontcase` release.”


    With `Fontcase` out of the way, the team continued to perfect the program. Minor
    releases followed after that, which showed that the team was paying attention
    to goings-on in the design world while working diligently to address the bugs
    in the software. It is important to note as well that releases, fixes, and updates
    of `Sketch` were timelier than those in `Photoshop`. Designers often bemoaned
    the fact that major updates and releases of `Photoshop` were spaced roughly two
    years apart. `Sketch`, on the other hand, shipped updates and releases at a clip
    of about every month or so. This speaks volumes about the advantages of having
    a leaner and more agile development team.


    So, `Sketch` had gotten the attention of the design community. Nevertheless, only
    the more daring designers would ditch `Photoshop` and make a complete transition
    to `Sketch`. Many others were watching and waiting to see how the software would
    evolve and whether it would become a true contender.


    ## Apple Design Award


    Every year since 1996, Apple announces the winner of its prestigious Design Awards
    at its annual Worldwide Developers Conference (WWDC). The Design Awards are distributed
    to best-in-class apps that exhibit the best in design and development. It is a
    high honor that Apple bestows on developers who have achieved the highest standards
    in design using the company’s software products. These are the apps that set the
    standard for the user experience that Apple expects on its platform. They are
    altogether innovative and inspiring. When selecting apps for the Apple Design
    Awards, Apple looks for apps that are: delightful, innovative, state of the art,
    engaging, enabling, and well designed. The awards celebrate what the company believes
    to be the best apps created by independent developers from all over the world.


    `Sketch` was among the Design Award winners in 2012. For designers who are attracted
    to Apple’s software and hardware products because of their high standard of design,
    this was a pretty big deal. It meant not only that `Sketch`’s developers had gotten
    the attention of the design community for creating an app that would make their
    collective lives easier, but also that they had done so while creating a beautiful
    app. Typically, software’s functionality often overshadows what it looks like
    and how it feels to use it. By winning the prestigious Design Award from Apple,
    Bohemian Coding had firmly established itself as a leading design and software
    development company. Moreover, with design becoming more of a focus for many companies,
    `Sketch` was the one to watch.'
