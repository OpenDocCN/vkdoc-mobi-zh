- fmt: '# Special Shapes


    Some of these shapes have special settings in the `Inspector`. For example, the
    `rounded rectangle` shape will have additional `Inspector` settings for editing
    its corner radius. Setting the `radius` to `0` will yield no rounded corners and
    create a square, while the maximum setting of `40` will yield a rectangle with
    very rounded corners.


    > **Tip**: To create a perfect square or circle, hold down the `Shift` key as
    you create your shape. This will constrain the proportions of the shape.


    The `star` shape will have additional settings: a `radius` and a `point` setting
    become available in the `Inspector`, which will automatically update the number
    of points on the star as well as the center radius of that shape. The `radius`
    of the star refers to the distance from the center of the star. The `points` refer
    to the number of points on the star. The default point setting for the star, however,
    is `5`. Changing the point setting to the maximum of `50` will increase the number
    of points on the star. The radius in Figure [3-2](#A978-1-4842-1458-9_3_Chapter.html#Fig2)
    is set to `50` percent, and the number of points is set to `10`.


    ![A978-1-4842-1458-9_3_Fig2_HTML.jpg](A978-1-4842-1458-9_3_Fig2_HTML.jpg)


    **Figure 3-2.** A 10-point star with a 50-percent radius


    The `polygon` shape also has a `point` setting that will allow you to change the
    number of points from the default of `5` to a maximum of `10`.


    # Editing Points on Shapes


    To understand shapes fully, you must also understand points. Points are the basic
    elements of shapes. That is to say, points make up shapes. The line that connects
    two points is called a `path`. Thus paths combine two points to create shapes.
    A shape, then, is a collection of paths on a point.


    Sketch also lets you edit the points of existing shapes on a canvas. After drawing
    your shape, select it and you will see the white handles that allow you to transform
    the shape. These handles, located at the top, bottom, and corners of the shapes,
    allow you to adjust the size of each shape manually. Adjusting these handles will
    increase or decrease the size of the shape in height and width accordingly. Adjusting
    the handles at the corners of a shape will alter both height and width.


    But what if in the course of your work you find that you’d like to move the actual
    points in shapes to change them? Simply double-click the shape. You will notice
    the handles disappear and that they change to points. There will be multiple points
    depending on the shape. The `Pen` tool will also appear on your canvas when you
    hover your mouse over the intersection points of the shape, as shown in Figure
    [3-3](#A978-1-4842-1458-9_3_Chapter.html#Fig3).


    ![A978-1-4842-1458-9_3_Fig3_HTML.jpg](A978-1-4842-1458-9_3_Fig3_HTML.jpg)


    **Figure 3-3.** `Double-clicking a shape will let you adjust the points. Note
    the Bezier curves in the Inspector`


    This will allow you to edit the shape’s points based on the tool that you select
    in the `Inspector` on the right. You will also notice that once the shape’s points
    become editable, four new selections will appear in the `Inspector` as well. These
    four different modes allow you to manipulate those points in various ways. These
    modes are: `Straight`, `Mirrored`, `Disconnected`, and `Asymmetric`. In Figure
    [3-4](#A978-1-4842-1458-9_3_Chapter.html#Fig4), the triangle from Figure [3-3](#A978-1-4842-1458-9_3_Chapter.html#Fig3)
    has been adjusted using the `Mirrored` Bezier curve.


    ![A978-1-4842-1458-9_3_Fig4_HTML.jpg](A978-1-4842-1458-9_3_Fig4_HTML.jpg)


    **Figure 3-4.** A triangle shape’s points are edited using the `Mirrored` mode
    tool


    ## Straight Mode


    The `Straight` tool allows you to edit a path along a straight line with no handles
    or curves along the control point.


    ## Mirrored Mode


    This mode provides two opposite and mirrored points that appear the same distance
    from the main point and at the same angle. Sketch will remove any corners along
    the shape.


    ## Disconnected Mode


    This mode creates two points that are independent of each other. You can change
    each handle’s point without affecting the other.


    ## Asymmetric Mode


    This mode is similar to `Mirrored` mode, but the distance between the main point
    and the control point will be independent.


    Once you have made the points editable, you can click anywhere on that line between
    any two points to create a new editing point, and so forth.


    > **Tip**: To escape this or any other mode, hit the `Esc` button.


    # Combined Shapes


    There will be times when Sketch’s ready-made shapes aren’t exactly what you need
    in your designs, and it is necessary to combine shapes to get what you want. Sketch
    lets you combine shapes to create unique forms that aren’t included right out
    of the box, or that aren’t immediately available, using the `Insert` menu. You
    can do this by dragging a shape on top or over another, selecting them both with
    your mouse, and clicking `Union` in the toolbar. Doing this will combine both
    shapes. Once they have been combined, as shown in Figure [3-5](#A978-1-4842-1458-9_3_Chapter.html#Fig5),
    they will behave as one solid unit.


    ![A978-1-4842-1458-9_3_Fig5_HTML.gif](A978-1-4842-1458-9_3_Fig5_HTML.gif)


    **Figure 3-5.** `A triangle and a rounded rectangle before and after being combined
    by using the Union button`


    > **Tip**: Once two shapes have been combined, they appear as a group in the `Layers`
    list. A folder icon indicates a group. If you open the folder, you can access
    the two separate shapes once more and edit them as needed.


    # Custom Shapes


    Sketch also makes this easy to create your very own custom shapes. Go to `Insert
    ➤ Vector` from the toolbar. The pointer will turn into a `Pen` tool. You can use
    this tool to create custom lines and custom points. You can click anywhere on
    your canvas to create multiple points for your custom shape.


    You can also use the `Transform` tool to distort your shapes by changing its points.
    When using the `Transform` tool on a shape, you will notice that the opposite
    side will always move in tandem and in the opposite direction. The `Transform`
    tool is often used to create a perspective view of rectangular or square shapes.
    It has, however, a more flattening effect on circles and ovals.


    > **Tip**: The default `Transform` mode will move both sides of your shape at
    the same time. To move only one side in one direction, hit the `⌘` key while dragging
    the desired corner of your shape.'
