  raw: '### Trimming Backgrounds


    Sometimes, when you select a slice for export, Sketch will automatically include
    the background. But most times, we aren’t really looking for the background to
    be exported with the assets. This is the case particularly with some icons and
    especially buttons. Sketch has an easy way of dealing with unwanted backgrounds
    when you really only want the asset itself. Here’s how it works. Using our PhotoBomb
    capture page as an example, let’s say that we only want to select the button on
    this page used to take the actual photograph. As explained previously, you would
    select the asset. But, when the preview appears in the Inspector as shown in Figure
    [10-8](#A978-1-4842-1458-9_10_Chapter.html#Fig8), we can see that the background
    image has been included.


    ![A978-1-4842-1458-9_10_Fig8_HTML.jpg](A978-1-4842-1458-9_10_Fig8_HTML.jpg)


    Figure 10-8.


    Sometimes Sketch will select a background image for export along with the selected
    asset


    Since we don’t want the background to be exported, we select the check boxes above
    the preview that allow us to “Export Group Contents Only.” This tells Sketch that
    we aren’t interested in background and only selects and exports the asset we want.
    The resulting exported PNG file is shown in Figure [10-9](#A978-1-4842-1458-9_10_Chapter.html#Fig9).


    ![A978-1-4842-1458-9_10_Fig9_HTML.jpg](A978-1-4842-1458-9_10_Fig9_HTML.jpg)


    Figure 10-9.


    Final exported PNG without the background image


    There you have it. You now have all of the knowledge that you need to export all
    of your assets in an easy and organized fashion for development.


    ## Summary


    With your assets exported and handoff complete, you may still need to check in
    during the development process to answer questions and do spot creative checks.
    So far in this book, we’ve outlined most of the design tasks by using the Sketch
    program to show you what Sketch can do as a design program. However, there is
    a vibrant community of developers creating plug-ins that extend Sketch’s capabilities.
    We’ll discuss some of those in the next chapter.


    # 11. Sketch Resources


    In this section of the book, we will cover resources from the every growing Sketch
    community that have been created to make designing with Sketch even easier. This
    is truly one of the great things about Sketch. The community has rallied around
    the program, encouraged by Bohemian Coding, and there are now lots of great plug-ins
    that you can add to increase Sketch’s capabilities and improve your workflow.
    I’ll attempt to add as many of them as I am aware of here.


    ## Plug-ins


    Plug-ins are great add-ons that expand the capabilities of Sketch. They are created
    by developers who are interested in expanding the capabilities of Sketch. If you
    are interested in writing your own plug-ins, you can find some resources and documentation
    on the Bohemian Coding site.


    ### Installing Plug-ins


    If you are searching the Web and come across a plug-in that you think you want
    to install, here’s how to get the plug-in working in Sketch:


    Download the plug-in and open the file. Usually the files are in a compressed
    folder.   Once you have opened this folder, open Sketch and navigate to the plug-in
    menu in the toolbar as shown in Figure [11-1](#A978-1-4842-1458-9_11_Chapter.html#Fig1)
    and select “Reveal Plugins Folder.” Sketch will automatically open a new window.


    ![A978-1-4842-1458-9_11_Fig1_HTML.jpg](A978-1-4842-1458-9_11_Fig1_HTML.jpg)


    Figure 11-1.


    The plug-in drop-down window from the Sketch menu   Drag the Sketch file into
    the plug-in folder.   Your plug-in should now be installed.


    ### Sketch Toolbox


    Arguably, the first plug-in you will want to install is Sketch Toolbox. It’s like
    a browser that lists lots of plug-ins available for Sketch. In it, you will find
    a selection of awesome plug-ins that you can install right from this one plug-in.
    It is highly recommended to be the first plug-in that you install. To download
    this plug-in, you can go directly to the website [`http://www.sketchtoolbox.com`](http://www.sketchtoolbox.com/)
    , do a search on Google, or download directly from GitHub. I’ll walk you through
    installing the plug-in first from the website. The Sketch Toolbox website is shown
    in Figure [11-2](#A978-1-4842-1458-9_11_Chapter.html#Fig2).


    ![A978-1-4842-1458-9_11_Fig2_HTML.jpg](A978-1-4842-1458-9_11_Fig2_HTML.jpg)


    Figure 11-2.


    The Sketch Toolbox website. You can download the Sketch Toolbox plug-in from here


    After clicking “Download the beta” button on the site, your download will automatically
    begin. You can install this application as you would any other Mac OS application,
    by unzipping and dragging it into your Applications folder.


    Tip


    Your Mac OS settings may need to be changed to allow applications from developers
    other than Apple to be installed on your computer.


    Once you’ve installed Sketch Toolbox, you can open it. You will see a scrollable
    window with a listing of the plug-ins available for installation. Sketch Toolbox
    allows you to install all plug-ins directly from this interface. This is a much
    simpler way to install plug-ins. If you choose to install plug-ins directly from
    GitHub, you will need to follow the directions provided previously. Now, let’s
    go through the process of installing an app via the Sketch Toolbox. Figure [11-3](#A978-1-4842-1458-9_11_Chapter.html#Fig3)
    is a screenshot of the Sketch Toolbox interface.


    ![A978-1-4842-1458-9_11_Fig3_HTML.jpg](A978-1-4842-1458-9_11_Fig3_HTML.jpg)


    Figure 11-3.


    The Sketch Toolbox interface


    As you can see, it is fairly simple. Plug-ins are listed in order alphabetically
    and there is a brief description of what it does along with the name of the developer.
    You can choose to install the plug-in by clicking the “Install” button on the
    interface or can also view the plug-in on GitHub. If you click “View on Github”
    it will open a new browser window with the plug-in’s page on GitHub. For your
    view, you can also toggle between all available plug-ins or only installed plug-ins.


    You are now ready, install all of your plug-ins for Sketch!


    Tip


    Sketch Toolbox is in beta so might be buggy. Report bugs if you find them to help
    make the product better.


    ### GitHub


    GitHub is a great resource for finding Sketch plug-ins. A Google search for “github
    sketch plug-ins” will bring up a link to Sketch Plugins (see Figure [11-4](#A978-1-4842-1458-9_11_Chapter.html#Fig4)).
    There, you will find a link to all of the Sketch plug-ins available on the GitHub
    repo.


    ![A978-1-4842-1458-9_11_Fig4_HTML.jpg](A978-1-4842-1458-9_11_Fig4_HTML.jpg)


    Figure 11-4.


    A screenshot of the Sketch Plugin Directory on GitHub, a great resource for Sketch
    plug-ins


    ### My Favorite Plug-ins


    The following is a list of some of my favorite plug-ins that I use in my design
    workflow.


    Content Generator: Content Generator for Sketch lets you generate avatars, names,
    photos, and text for any design you create.


    Sketch Icon Stamper: Automates the process of creating multiple and varied icons
    in different sizes.


    Day Player: Add placeholder images from a variety of sources.


    Duplicator: Displays objects, shapes, and elements quickly by duplicating them
    into grids and lists.


    AEiconizer: Lets you generate all of the necessary sizes for your iOS icons.


    Sketch Measure: Lets you provide measurements and specs for handing off to developers.


    Sketch Squares: Fill your layers or squares with photos from Instagram.


    Sketch Export Assets: Resizes and adds metadata to files exported for iOS and
    other platforms.


    Sketch Style Inventory: Review, import, and export your styles.


    Sketch to Xcode assets catalog: Exports assets for iOS from Sketch into Xcode
    assets catalog.'
  trans: "\n### 裁剪背景\n\n有时，当你选择切片进行导出时，Sketch 会自动包含背景。但大多数情况下，我们并不真正希望将背景与资源一同导出。尤其是一些图标和按钮会出现这种情况。当你只想要资源本身时，Sketch\
    \ 提供了一种简单的方法来处理不需要的背景。具体操作如下。以我们的 PhotoBomb 拍摄页面为例，假设我们只想选择该页面上用于实际拍照的按钮。如前所述，你需要选中该资源。但是，当预览出现在检查器中（如图\
    \ 10-8 所示）时，我们会发现背景图像也被包含了进来。\n\n![A978-1-4842-1458-9_10_Fig8_HTML.jpg](img/A978-1-4842-1458-9_10_Fig8_HTML.jpg)\n\
    \n图 10-8. 有时 Sketch 会为导出选中背景图像以及选中资源\n\n由于我们不想导出背景，因此勾选预览上方的复选框，选择“仅导出组内容”。这会告诉\
    \ Sketch 我们对背景不感兴趣，只选择并导出我们想要的资源。最终导出的 PNG 文件如图 10-9 所示。\n\n![A978-1-4842-1458-9_10_Fig9_HTML.jpg](img/A978-1-4842-1458-9_10_Fig9_HTML.jpg)\n\
    \n图 10-9. 最终导出的不含背景图像的 PNG 文件\n\n就是这样。现在你已掌握所有必要知识，能够轻松有序地导出所有资源以用于开发。\n\n## 总结\n\
    \n当资源导出和交接完成后，在开发过程中你仍可能需要参与进来回答问题，并进行创意抽查。到目前为止，本书已通过使用 Sketch 程序概述了大部分设计任务，向你展示了\
    \ Sketch 作为设计软件的能力。然而，有一个充满活力的开发者社区在创建插件来扩展 Sketch 的功能。我们将在下一章讨论其中一部分。\n\n# 11.\
    \ Sketch 资源\n\n在本书的这一部分，我们将介绍来自不断壮大的 Sketch 社区的各类资源，这些资源旨在让使用 Sketch 进行设计变得更加轻松。这确实是\
    \ Sketch 的一大优点。在 Bohemian Coding 的鼓励下，社区围绕该程序聚集起来，现在有大量优秀的插件可供添加，以增强 Sketch 的功能并改进你的工作流程。我将在此尽可能多地介绍我所了解的插件。\n\
    \n## 插件\n\n插件是扩展 Sketch 功能的绝佳附加组件。它们由对扩展 Sketch 功能感兴趣的开发者创建。如果你有兴趣编写自己的插件，可以在\
    \ Bohemian Coding 网站上找到一些资源和文档。\n\n### 安装插件\n\n如果你在网上搜索并找到了想要安装的插件，以下是在 Sketch\
    \ 中安装该插件的方法：\n\n下载插件并打开文件。通常文件会存放在压缩文件夹中。打开该文件夹后，启动 Sketch，导航至工具栏中的插件菜单（如图 11-1\
    \ 所示），然后选择“显示插件文件夹”。Sketch 将自动打开一个新窗口。\n\n![A978-1-4842-1458-9_11_Fig1_HTML.jpg](img/A978-1-4842-1458-9_11_Fig1_HTML.jpg)\n\
    \n图 11-1. Sketch 菜单中的插件下拉窗口\n\n将 Sketch 文件拖入插件文件夹。现在插件应该已安装完成。\n\n### Sketch Toolbox\n\
    \n可以说，你第一个想要安装的插件就是 Sketch Toolbox。它就像一个浏览器，列出了大量适用于 Sketch 的插件。在其中，你可以找到一系列出色的插件，并且可以直接通过这一个插件进行安装。强烈建议将其作为你安装的第一个插件。要下载此插件，你可以直接访问网站\
    \ `http://www.sketchtoolbox.com`，在 Google 上搜索，或直接从 GitHub 下载。我将首先向你演示如何从网站安装插件。Sketch\
    \ Toolbox 网站如图 11-2 所示。\n\n![A978-1-4842-1458-9_11_Fig2_HTML.jpg](img/A978-1-4842-1458-9_11_Fig2_HTML.jpg)\n\
    \n图 11-2. Sketch Toolbox 网站。你可以从此处下载 Sketch Toolbox 插件\n\n点击网站上的“下载 Beta 版”按钮后，下载将自动开始。你可以像安装任何其他\
    \ Mac OS 应用程序一样安装此应用：解压缩并将其拖入你的 `Applications` 文件夹。\n\n**提示**  \n你可能需要更改 Mac OS\
    \ 设置，以允许安装来自 Apple 以外开发者的应用程序。\n\n安装 Sketch Toolbox 后，即可打开它。你将看到一个可滚动的窗口，其中列出了可供安装的插件。Sketch\
    \ Toolbox 允许你直接从此界面安装所有插件。这是一种更简便的安装插件的方式。如果你选择直接从 GitHub 安装插件，则需要遵循前面提供的说明。现在，我们通过\
    \ Sketch Toolbox 来体验安装应用的过程。图 11-3 是 Sketch Toolbox 界面的截图。\n\n![A978-1-4842-1458-9_11_Fig3_HTML.jpg](img/A978-1-4842-1458-9_11_Fig3_HTML.jpg)\n\
    \n图 11-3. Sketch Toolbox 界面\n\n如你所见，它相当简单。插件按字母顺序列出，并附有简短的功能说明以及开发者名称。你可以点击界面上的“安装”按钮来安装插件，也可以在\
    \ GitHub 上查看该插件。如果点击“在 GitHub 上查看”，将打开一个新的浏览器窗口，显示该插件在 GitHub 上的页面。为了方便查看，你还可以在“所有可用插件”和“仅已安装插件”之间切换。\n\
    \n现在你已准备就绪，可以为 Sketch 安装所有插件了！\n\n**提示**  \nSketch Toolbox 仍处于 Beta 版，可能存在缺陷。如果你发现缺陷，请进行报告，以帮助改进产品。\n\
    \n### GitHub\n\nGitHub 是寻找 Sketch 插件的绝佳资源。在 Google 中搜索“github sketch plug-ins”将会显示\
    \ Sketch 插件的链接（见图 11-4）。在那里，你将找到指向 GitHub 仓库中所有可用 Sketch 插件的链接。\n\n![A978-1-4842-1458-9_11_Fig4_HTML.jpg](img/A978-1-4842-1458-9_11_Fig4_HTML.jpg)\n\
    \n图 11-4. GitHub 上的 Sketch 插件目录截图，这是一个寻找 Sketch 插件的绝佳资源\n\n### 我最喜欢的插件\n\n以下是我在设计工作流程中使用的一些我最喜欢的插件列表。\n\
    \n- **Content Generator**：Sketch 的 Content Generator 可为你创建的任何设计生成头像、名称、照片和文本。\n\
    - **Sketch Icon Stamper**：自动创建不同尺寸的多个多样化图标。\n- **Day Player**：从多种来源添加占位图像。\n-\
    \ **Duplicator**：通过将对象、形状和元素复制到网格和列表中，快速显示它们。\n- **AEiconizer**：让你生成 iOS 图标所需的所有尺寸。\n\
    - **Sketch Measure**：让你提供测量值和规格说明，以便交接给开发者。\n- **Sketch Squares**：用来自 Instagram\
    \ 的照片填充你的图层或方块。\n- **Sketch Export Assets**：调整导出文件大小并为 iOS 及其他平台导出的文件添加元数据。\n\
    - **Sketch Style Inventory**：审查、导入和导出你的样式。\n- **Sketch to Xcode assets catalog**：将\
    \ Sketch 中的资源导出到 Xcode 资源目录中，用于 iOS 开发。\n"
