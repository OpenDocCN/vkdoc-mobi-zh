- fmt: "## Layers\n\nThere are a few different types of layers in Sketch. Layers are\
    \ the building blocks of your apps. You will add various elements to your layers\
    \ to create the different views in your applications. Typically, a layer will\
    \ consist of a combination of shapes, text, and images. Sketch will tell you what\
    \ kind of element is included in each layer by showing you a tiny symbol next\
    \ to each. Shape layers will have a shape, text layers will show a small AA, and\
    \ layers with images in them will contain a small image of a picture. These icons\
    \ will allow you to identify easily what each layer consists of.\n\nThe Layers\
    \ list shown in Figure [2-7](#A978-1-4842-1458-9_2_Chapter.html#Fig7) displays\
    \ all of the layers in the canvas, and you can organize them there. Any layer\
    \ can be selected and moved around the canvas. The list will populate as you add\
    \ more layers. If you add a new shape onto your canvas, you will see that a new\
    \ layer will be created on top. Sketch will automatically name the layer according\
    \ to the shape that you have created. Layers can overlap each other, and you can\
    \ manipulate which layer appears on top or behind each other directly from the\
    \ Layers list. You can also do this by using the Forward and Backward buttons\
    \ in the toolbar.\n\n![A978-1-4842-1458-9_2_Fig7_HTML.jpg](A978-1-4842-1458-9_2_Fig7_HTML.jpg)\n\
    \nFigure 2-7. The Layers list shows all of the elements on your canvas.\n\n###\
    \ Selecting and Moving Layers\n\nLayers are fairly flexible, and they can be moved\
    \ around your canvas at any time. To select a layer, you can either choose the\
    \ layer’s name in the Layers list or select the specific layer on the canvas.\
    \ Once you have selected a layer, you can move it around the canvas. You will\
    \ know that a layer is selected by the appearance of white handles. These handles\
    \ allow you to change the shape and the properties of the shape in that layer.\
    \ Once you have selected a layer, you can use either the Inspector position properties,\
    \ as shown in Figure [2-8](#A978-1-4842-1458-9_2_Chapter.html#Fig8), to move it\
    \ around, or you can use your mouse to drag it around your canvas.\n\n![A978-1-4842-1458-9_2_Fig8_HTML.jpg](A978-1-4842-1458-9_2_Fig8_HTML.jpg)\n\
    \nFigure 2-8. An image and two shapes on the Sketch canvas. Note that each object\
    \ has a corresponding layer in the Layers list on the left.\n\nTip  \nTo move\
    \ a layer incrementally by a single pixel, use the arrow keys on your keyboard.\
    \ To move a shape incrementally by 10 pixels, hold down `Shift` and press the\
    \ arrow keys.\n\n### Duplicating a Layer\n\nThere are a number of ways that layers\
    \ can be duplicated in Sketch. Right-click the layer in the canvas to reveal a\
    \ new menu list, and select duplicate from that list. With this done, you will\
    \ see that a new later has appeared in the Layers list. The new shape will appear\
    \ on top of the duplicated shape in the canvas. All you need to do is to move\
    \ it. Alternatively, you can create a new layer by holding down the `Option` key\
    \ and clicking and dragging the layer to duplicate it.\n\n### Hiding and Locking\
    \ Layers\n\nWhen designing, it sometimes becomes necessary to hide layers so that\
    \ you can effectively work on a given layer without being distracted or obstructed\
    \ by others. Sketch allows you to do this easily. To hide a layer, hover your\
    \ mouse over the right side of the cell in the Layers list. A small “eye” will\
    \ appear. When it does, click it. You will see that the corresponding shape will\
    \ disappear from the canvas. However, it will remain in the Layers list. Any layer\
    \ that has been hidden will have greyed-out text and an icon of an eye next to\
    \ it.\n\nYou might have a need to lock a layer for similar reasons. Sometimes,\
    \ designers will lock their background layer to prevent it from interfering with\
    \ the work they are doing on other layers. Since it is unlikely that the background\
    \ will change, it can sometimes be locked but still remain visible to prevent\
    \ accidental editing. To lock a layer, right-click and select Lock Layer from\
    \ the menu. You will see that a Lock icon will appear next to the corresponding\
    \ layer in the Layers list. This icon denotes that the layer is locked from editing.\
    \ Simply clicking the lock again will unlock the layer and allow it to be edited.\
    \ Figure [2-9](#A978-1-4842-1458-9_2_Chapter.html#Fig9) shows a hidden image layer\
    \ and a locked text layer.\n\n![A978-1-4842-1458-9_2_Fig9_HTML.jpg](A978-1-4842-1458-9_2_Fig9_HTML.jpg)\n\
    \nFigure 2-9. The canvas with the image layer hidden and the text layer locked.\n\
    \n### Groups\n\nWithin your layers, you can also create groups. Groups are a great\
    \ way to organize you designs. For instance, if you have multiple layers that\
    \ make up the tab bar in your app, you might want to group all of the elements.\n\
    \nTo create a group, select all of the layers that you want to group. You can\
    \ select multiple layers by selecting and dragging a box around all of the elements\
    \ that you would like to group. Alternatively, you can hold down the `Shift` key\
    \ and select all of the layers in the Layers list that you would like to group.\
    \ With all of the layers selected, click the Group button in the toolbar. You\
    \ will notice that a folder has been created in the Layers list. Clicking the\
    \ folder will reveal the various layers that make up the group.\n\nGroups can\
    \ also be nested. That is to say, there can be groups of layers within other groups.\
    \ For example, if in your Tab Bar group you have five icons, you may want to create\
    \ a group of icons within that group. The icon group folder will then be located\
    \ within the Tab Bar group folder.\n\nTip  \nYou can move a group of shapes in\
    \ a layer as one by opening the group and dragging it around the canvas.\n\n###\
    \ Inspector\n\nThe Inspector, located on the far right of the user interface,\
    \ as seen in Figure [2-10](#A978-1-4842-1458-9_2_Chapter.html#Fig10), shows you\
    \ various properties of the selected layer on your canvas. Depending on what you\
    \ have selected, it will show you information such as size, color, and styles.\
    \ The Inspector contains the tools that allow you to view properties of selected\
    \ objects on the screen. If you select an image, you will see properties pertaining\
    \ to that image. If you select text, you will see properties pertaining to that\
    \ body of text. If you change anything in your document, you will notice that\
    \ the properties in the Inspector can and will change. To edit a shape, you can\
    \ work directly within the Inspector to change values. These include position\
    \ and size.\n\n![A978-1-4842-1458-9_2_Fig10_HTML.jpg](A978-1-4842-1458-9_2_Fig10_HTML.jpg)\n\
    \nFigure 2-10. Sketch canvas with a selected shape and properties appearing in\
    \ the Inspector panel on the right.\n\n### Styles\n\nYou can adjust the styles\
    \ associated with your layers in the Inspector. Take the circle in Figure [2-9](#A978-1-4842-1458-9_2_Chapter.html#Fig9).\
    \ Note that it is a solid red color. That color is associated with a Fill setting\
    \ in the Inspector. The check box next to Fill setting has been selected. The\
    \ color in that window is directly associated with the color of the circle. Clicking\
    \ the red square next to fill will bring up a pop-over with a number of different\
    \ fill options for the layer. Clicking anywhere in the area on the pop-over allows\
    \ you to change the shade of the color of the layer. You can use the sliders below\
    \ the color area to change the color, or to make it more or less opaque. The color\
    \ picker allows you to sample any color on your screen inside or outside of Sketch.\
    \ Below the color picker, you can edit the RGB or hexadecimal codes as well.\n\
    \nThe icons along the top of the pop-over represent different options for the\
    \ texture of the fill. The options range from left to right from solid fill, radial\
    \ gradient, angular gradient, pattern fill, and noise fill.\n\nBorder color can\
    \ also be edited and changed for thickness as well as other settings. There is\
    \ also an option to add a shadow (outer or inner) to your shape by making selections\
    \ in the Inspector panel."
  raw: '## Layers


    There are a few different types of layers in Sketch. Layers are the building blocks
    of your apps. You will add various elements to your layers to create the different
    views in your applications. Typically, a layer will consist of a combination of
    shapes, text, and images. Sketch will tell you what kind of element is included
    in each layer by showing you a tiny symbol next to each. Shape layers will have
    a shape, text layers will show a small AA, and layers with images in them will
    contain a small image of a picture. These icons will allow you to identify easily
    what each layer consists of.


    The Layers list shown in Figure [2-7](#A978-1-4842-1458-9_2_Chapter.html#Fig7)
    displays all of the layers in the canvas, and you can organize them there. Any
    layer can be selected and moved around the canvas. The list will populate as you
    add more layers. If you add a new shape onto your canvas, you will see that a
    new layer will be created on top. Sketch will automatically name the layer according
    to the shape that you have created. Layers can overlap each other, and you can
    manipulate which layer appears on top or behind each other directly from the Layers
    list. You can also do this by using the Forward and Backward buttons in the toolbar.


    ![A978-1-4842-1458-9_2_Fig7_HTML.jpg](A978-1-4842-1458-9_2_Fig7_HTML.jpg)


    Figure 2-7.


    The Layers list shows all of the elements on your canvas


    ### Selecting and Moving Layers


    Layers are fairly flexible, and they can be moved around your canvas at any time.
    To select a layer, you can either choose the layer’s name in the Layers list or
    select the specific layer on the canvas. Once you have selected a layer, you can
    move it around the canvas. You will know that a layer is selected by the appearance
    of white handles. These handles allow you to change the shape and the properties
    of the shape in that layer. Once you have selected a layer, you can use either
    the Inspector position properties, as shown in Figure [2-8](#A978-1-4842-1458-9_2_Chapter.html#Fig8),
    to move it around, or you can use your mouse to drag it around your canvas.


    ![A978-1-4842-1458-9_2_Fig8_HTML.jpg](A978-1-4842-1458-9_2_Fig8_HTML.jpg)


    Figure 2-8.


    An image and two shapes on the Sketch canvas. Note that each object has a corresponding
    layer in the Layers list on the left Tip


    To move a layer incrementally by a single pixel, use the arrow keys on your keyboard.
    To move a shape incrementally by 10 pixels, hold down Shift and press the arrow
    keys.


    ### Duplicating a Layer


    There are a number of ways that layers can be duplicated in Sketch. Right-click
    the layer in the canvas to reveal a new menu list, and select duplicate from that
    list. With this done, you will see that a new later has appeared in the Layers
    list. The new shape will appear on top of the duplicated shape in the canvas.
    All you need to do is to move it. Alternatively, you can create a new layer by
    holding down the Option key and clicking and dragging the layer to duplicate it.


    ### Hiding and Locking Layers


    When designing, it sometimes becomes necessary to hide layers so that you can
    effectively work on a given layer without being distracted or obstructed by others.
    Sketch allows you to do this easily. To hide a layer, hover your mouse over the
    right side of the cell in the Layers list. A small “eye” will appear. When it
    does, click it. You will see that the corresponding shape will disappear from
    the canvas. However, it will remain in the Layers list. Any layer that has been
    hidden will have greyed-out text and an icon of an eye next to it.


    You might have a need to lock a layer for similar reasons. Sometimes, designers
    will lock their background layer to prevent it from interfering with the work
    they are doing on other layers. Since it is unlikely that the background will
    change, it can sometimes be locked but still remain visible to prevent accidental
    editing. To lock a layer, right-click and select Lock Layer from the menu. You
    will see that a Lock icon will appear next to the corresponding layer in the Layers
    list. This icon denotes that the layer is locked from editing. Simply clicking
    the lock again will unlock the layer and allow it to be edited. Figure [2-9](#A978-1-4842-1458-9_2_Chapter.html#Fig9)
    shows a hidden image layer and a locked text layer.


    ![A978-1-4842-1458-9_2_Fig9_HTML.jpg](A978-1-4842-1458-9_2_Fig9_HTML.jpg)


    Figure 2-9.


    The canvas with the image layer hidden and the text layer locked


    ### Groups


    Within your layers, you can also create groups. Groups are a great way to organize
    you designs. For instance, if you have multiple layers that make up the tab bar
    in your app, you might want to group all of the elements.


    To create a group, select all of the layers that you want to group. You can select
    multiple layers by selecting and dragging a box around all of the elements that
    you would like to group. Alternatively, you can hold down the Shift key and select
    all of the layers in the Layers list that you would like to group. With all of
    the layers selected, click the Group button in the toolbar. You will notice that
    a folder has been created in the Layers list. Clicking the folder will reveal
    the various layers that make up the group.


    Groups can also be nested. That is to say, there can be groups of layers within
    other groups. For example, if in your Tab Bar group you have five icons, you may
    want to create a group of icons within that group. The icon group folder will
    then be located within the Tab Bar group folder.


    Tip


    You can move a group of shapes in a layer as one by opening the group and dragging
    it around the canvas.


    ### Inspector


    The Inspector, located on the far right of the user interface, as seen in Figure
    [2-10](#A978-1-4842-1458-9_2_Chapter.html#Fig10), shows you various properties
    of the selected layer on your canvas. Depending on what you have selected, it
    will show you information such as size, color, and styles. The Inspector contains
    the tools that allow you to view properties of selected objects on the screen.
    If you select an image, you will see properties pertaining to that image. If you
    select text, you will see properties pertaining to that body of text. If you change
    anything in your document, you will notice that the properties in the Inspector
    can and will change. To edit a shape, you can work directly within the Inspector
    to change values. These include position and size.


    ![A978-1-4842-1458-9_2_Fig10_HTML.jpg](A978-1-4842-1458-9_2_Fig10_HTML.jpg)


    Figure 2-10.


    Sketch canvas with a selected shape and properties appearing in the Inspector
    panel on the right


    ### Styles


    You can adjust the styles associated with your layers in the Inspector. Take the
    circle in the Figure [2-9](#A978-1-4842-1458-9_2_Chapter.html#Fig9). Note that
    it is a solid red color. That color is associated with a Fill setting in the Inspector.
    The check box next to Fill setting has been selected. The color in that window
    is directly associated with the color of the circle. Clicking the red square next
    to fill will bring up a pop-over with a number of different fill options for the
    layer. Clicking anywhere in the area on the pop-over allows you to change the
    shade of the color of the layer. You can use the sliders below the color area
    to change the color, or to make it more or less opaque. The color picker allows
    you to sample any color on your screen inside or outside of Sketch. Below the
    color picker, you can edit the RGB or hexadecimal codes as well.


    The icons along the top of the pop-over represent different options for the texture
    of the fill. The options range from left to right from solid fill, radial gradient,
    angular gradient, pattern fill, and noise fill.


    Border color can also be edited and changed for thickness as well as other settings.
    There is also an option to add a shadow (outer or inner) to your shape by making
    selections in the Inspector panel.'
  trans: "\n## 图层\n\nSketch 中有几种不同类型的图层。图层是您应用程序的构建块。您将向图层中添加各种元素，以在应用程序中创建不同的视图。通常，一个图层将由形状、文本和图像的组合构成。Sketch\
    \ 会在每个图层旁边显示一个小图标，告诉您该图层包含哪种元素。形状图层会有一个形状图标，文本图层会显示一个小的 AA，而包含图像的图层则会有一个小的图片图标。这些图标让您能够轻松识别每个图层的内容。\n\
    \n如图 2-7 所示的图层列表显示了画布上的所有图层，您可以在其中对它们进行组织。任何图层都可以被选中并在画布上移动。随着您添加更多图层，该列表会逐渐填充。如果您在画布上添加一个新形状，您将看到在顶部会创建一个新图层。Sketch\
    \ 会根据您创建的形状自动命名该图层。图层可以相互重叠，您可以直接在图层列表中操作哪个图层显示在最上面或最下面。您也可以使用工具栏中的“前移”和“后移”按钮来实现这一点。\n\
    \n![A978-1-4842-1458-9_2_Fig7_HTML.jpg](img/A978-1-4842-1458-9_2_Fig7_HTML.jpg)\n\
    \n图 2-7. 图层列表显示了画布上的所有元素。\n\n### 选择和移动图层\n\n图层相当灵活，您可以随时在画布上移动它们。要选择一个图层，您可以在图层列表中选择图层名称，或者在画布上选择特定的图层。一旦您选中了一个图层，就可以在画布上移动它。您可以通过出现的白色控制柄来判断图层已被选中。这些控制柄允许您更改该图层中形状的形状和属性。选中图层后，您可以使用检查器中的位置属性（如图\
    \ 2-8 所示）来移动它，或者使用鼠标在画布上拖动它。\n\n![A978-1-4842-1458-9_2_Fig8_HTML.jpg](img/A978-1-4842-1458-9_2_Fig8_HTML.jpg)\n\
    \n图 2-8. Sketch 画布上的一个图像和两个形状。请注意，每个对象在左侧的图层列表中都有一个对应的图层。\n\n提示  \n要每次以一个像素的增量移动图层，请使用键盘上的箭头键。要每次以\
    \ 10 个像素的增量移动形状，请按住 `Shift` 键并按箭头键。\n\n### 复制图层\n\n在 Sketch 中，有多种复制图层的方法。在画布上右键单击图层，会弹出一个新的菜单列表，然后从该列表中选择“复制”。完成此操作后，您将看到图层列表中出现了一个新图层。新形状将出现在画布上被复制形状的顶部。您只需移动它即可。或者，您也可以通过按住\
    \ `Option` 键并单击并拖动图层来创建新图层以复制它。\n\n### 隐藏和锁定图层\n\n在设计时，有时需要隐藏图层，以便您可以有效地在特定图层上工作，而不会受到其他图层的干扰或阻碍。Sketch\
    \ 让您可以轻松做到这一点。要隐藏一个图层，请将鼠标悬停在图层列表中单元格的右侧。会出现一个小的“眼睛”图标。出现后，点击它。您将看到对应的形状从画布上消失。但是，它仍会保留在图层列表中。任何被隐藏的图层，其文本会变灰，旁边会有一个眼睛图标。\n\
    \n出于类似的原因，您可能需要锁定图层。有时，设计师会锁定他们的背景图层，以防止它干扰他们在其他图层上的工作。由于背景不太可能改变，有时可以将其锁定，同时保持可见，以防止意外编辑。要锁定图层，请右键单击并从菜单中选择“锁定图层”。您将看到图层列表中对应的图层旁边会出现一个锁定图标。该图标表示该图层已被锁定，无法编辑。只需再次点击锁定图标即可解锁图层并允许其进行编辑。图\
    \ 2-9 显示了一个隐藏的图像图层和一个锁定的文本图层。\n\n![A978-1-4842-1458-9_2_Fig9_HTML.jpg](img/A978-1-4842-1458-9_2_Fig9_HTML.jpg)\n\
    \n图 2-9. 画布上图像图层被隐藏，文本图层被锁定。\n\n### 组\n\n在您的图层中，您还可以创建组。组是组织设计的好方法。例如，如果您有多个图层构成了应用程序中的标签栏，您可能希望将所有元素分组。\n\
    \n要创建一个组，请选择您想要分组的所有图层。您可以通过选择并拖动一个框框住所有想要分组的元素来选择多个图层。或者，您可以按住 `Shift` 键并在图层列表中选择所有想要分组的图层。选中所有图层后，点击工具栏中的“分组”按钮。您会注意到图层列表中创建了一个文件夹。点击该文件夹将显示构成该组的各个图层。\n\
    \n组也可以嵌套。也就是说，在其他组内可以包含图层组。例如，如果在您的“标签栏”组中有五个图标，您可能希望在该组内创建一个图标组。那么图标组文件夹将位于标签栏组文件夹内。\n\
    \n提示  \n您可以通过打开一个组并在画布上拖动它，将图层中的一组形状作为一个整体移动。\n\n### 检查器\n\n检查器位于用户界面的最右侧，如图 2-10\
    \ 所示，它会显示画布上所选图层的各种属性。根据您选择的内容，它会显示诸如大小、颜色和样式等信息。检查器包含允许您查看屏幕上所选对象属性的工具。如果您选择一个图像，您将看到与该图像相关的属性。如果您选择文本，您将看到与该文本主体相关的属性。如果您在文档中更改任何内容，您会注意到检查器中的属性可能会并且将会发生变化。要编辑一个形状，您可以直接在检查器中工作以更改数值。这些数值包括位置和大小。\n\
    \n![A978-1-4842-1458-9_2_Fig10_HTML.jpg](img/A978-1-4842-1458-9_2_Fig10_HTML.jpg)\n\
    \n图 2-10. 选中一个形状并在右侧检查器面板中显示其属性的 Sketch 画布。\n\n### 样式\n\n您可以在检查器中调整与图层相关的样式。以图\
    \ 2-9 中的圆形为例。请注意它是一个纯红色。该颜色与检查器中的“填充”设置相关联。“填充”设置旁边的复选框已被选中。该窗口中的颜色直接与圆形的颜色相关联。点击填充旁边的红色方块会弹出一个弹出窗口，其中包含该图层的多种不同填充选项。在弹出窗口区域内任意位置点击，即可更改图层颜色的深浅。您可以使用颜色区域下方的滑块来更改颜色，或调整其不透明度。取色器允许您对屏幕上\
    \ Sketch 内部或外部的任何颜色进行取样。在取色器下方，您还可以编辑 RGB 或十六进制颜色代码。\n\n弹出窗口顶部的图标代表了填充纹理的不同选项。这些选项从左到右依次为：纯色填充、径向渐变、角度渐变、图案填充和噪点填充。\n\
    \n边框颜色也可以编辑，并可以更改其粗细以及其他设置。此外，还可以通过检查器面板中的选择来为您的形状添加阴影（外部或内部）。\n"
- fmt: '### Smart Guides


    When moving shapes around on your canvas, you may notice some red lines with a
    number on them that appears from time to time. These lines are called smart guides.
    They are Sketch’s way of helping you to measure and align elements in your layers.
    The number will tell you how far apart two layers are from each other, as shown
    in Figure [2-11](#A978-1-4842-1458-9_2_Chapter.html#Fig11), and the guides will
    help you to align one layer with another.


    ![A978-1-4842-1458-9_2_Fig11_HTML.jpg](A978-1-4842-1458-9_2_Fig11_HTML.jpg)


    Figure 2-11. Smart Guides show the distance between two layers


    **Tip:** Holding the `Option` key down while you hover your mouse over two layers
    will show you the distance between two layers and whether or not they are aligned.


    ## Artboards


    If you’ve used Adobe Illustrator, you are probably familiar with concept of the
    artboard. An artboard allows you to define boundaries for your Sketch infinite
    canvas. It will create set dimensions that map to a specific device or screen
    for you to work within.


    You can create an artboard in Sketch by going to the `Insert` button at the top
    left and selecting `Artboard` from the menu. You can create your own artboard
    or, luckily for those designing for iOS, Sketch comes with pre-sized templates,
    which make it easy to jump right in. This way, all you need to do is to select
    the appropriate size for your design and go.


    You can create an entire application in one artboard in Sketch, which is very
    helpful. It’s a handy way to see how your entire app will look without moving
    through a number of different files for each screen. It also adds some constraints
    to Sketch’s infinite canvas. An artboard will create a boundary that is the correct
    size, depending on the device you are targeting.


    After you’ve selected `Artboard` from the `Insert` button menu, the various templates
    will appear on the left side of your Sketch window. Sketch provides templates
    for the iPad (portrait, landscape, and Retina) and iPhone (portrait, landscape,
    and Retina), as shown in Figure [2-12](#A978-1-4842-1458-9_2_Chapter.html#Fig12).
    There are also templates for iOS icons.


    ![A978-1-4842-1458-9_2_Fig12_HTML.jpg](A978-1-4842-1458-9_2_Fig12_HTML.jpg)


    Figure 2-12. Preset artboard templates in Sketch 3


    You will note that selecting an artboard template will add the appropriate artboard
    on your canvas and also place a layer in the left layer panel. The titles of the
    layer will correspond to the template. To change the name of the layer, you can
    double-click it and rename it as you would any other file.


    If you select a template for say, the iPhone, Sketch will create an artboard in
    the appropriate size to this device. You can also have multiple kinds of artboards
    in one canvas. This is helpful if you are creating, for instance, a universal
    app that will need to run on the iPhone and the iPad. In this case, you can add
    the template for an iPhone and an iPad and show how the app will appear on both
    devices. It’s a nice way to present your work.


    You can rearrange, duplicate, and even export your artboards in order to accommodate
    your designs. With Sketch, there are a few ways to duplicate artboards. You can
    copy and paste your artboard and line it up manually using the guides, or you
    can use Sketch’s handy `Make Grid` feature. This feature allows you to duplicate
    your artboards with a few clicks. Simply select `Arrange` from the menu and choose
    `Make Grid` from the drop-down, as shown in Figure [2-13](#A978-1-4842-1458-9_2_Chapter.html#Fig13).
    Select the number of artboards that you want to duplicate by changing the numbers
    in the `Rows` and `Columns` fields, and select `Make Grid` when done. Sketch will
    automatically duplicate the artboard according to your selections and align them
    on your canvas.


    ![A978-1-4842-1458-9_2_Fig13_HTML.jpg](A978-1-4842-1458-9_2_Fig13_HTML.jpg)


    Figure 2-13. The `Make Grid` feature in Sketch 3 will help you to duplicate and
    align your artboards


    Your artboards on your canvas make up the overall anatomy of your design. Sometimes,
    however, you will want or need to separate artboards. For example, if your design
    is incredibly complex and you want multiple artboards to represent a particular
    flow, it might be beneficial to break your design out into multiple pages, which
    Sketch supports. In the upper-left corner of your canvas and above the `Layers`
    list, you will see that you are currently working on `Page 1`. To add a page,
    simply click the button to the right that looks like a downward-facing arrow.
    Once you click that, the button will turn into a plus (`+`) sign, and this will
    allow you to add subsequent pages to your design.


    ## Rulers and Guides


    Upon first opening Sketch, you won’t see any rulers or guides. This is because
    they are hidden by default. You can access the rulers by going to the `View` icon
    in your toolbar. This will reveal a drop-down menu that allows you to choose from
    a selection of rulers, grids, and other layout options, as shown in Figure [2-14](#A978-1-4842-1458-9_2_Chapter.html#Fig14).
    The option to show pixels is also in this menu. The purpose of these tools is
    to help you to align the elements in your design properly.


    ![A978-1-4842-1458-9_2_Fig14_HTML.jpg](A978-1-4842-1458-9_2_Fig14_HTML.jpg)


    Figure 2-14. The `View` menu drop-down after expansion from the toolbar


    Here are the various selections and what they mean:


    ### Show Pixels


    The `Show Pixels` option will show your element on the screen in pixel mode. This
    is helpful if you want to see how vector-based design will appear in pixels, such
    as in a browser.


    ### Show Rulers and Guides


    Because of Sketch’s infinite canvas, the rulers are not fixed as in other graphic
    design programs. This means that you can move them around to accommodate your
    designs. For example, if you are designing for a screen not included in the preset
    artboard templates, you can create the dimensions on your canvas and use them
    as a guide in your design. Naturally, if you move the zero point in Sketch’s ruler,
    anything before it will be shown in negative numbers. Figure [2-14](#A978-1-4842-1458-9_2_Chapter.html#Fig14)
    shows a Sketch canvas that has its rulers adjusted. If for some reason you need
    to reset the ruler, simply click the space where the horizontal and vertical ruler
    lines intersect. This should revert the rulers back to their original measurements.


    You can add a guide to your canvas by clicking anywhere on the ruler. The guides
    will appear as red lines, and they will remain there until you remove the ruler.
    Figure [2-14](#A978-1-4842-1458-9_2_Chapter.html#Fig14) has guides and rulers
    activated. The zero point has also been adjusted on both the horizontal and vertical
    rulers.


    ### Show Grid


    When activated, the `Show Grid` function will create gridlines on your canvas.
    This is a typical grid with squares drawn by intersecting lines as is customary
    in most graphic programs. By default, the grid size will show a thick black line
    every 10 squares. The default size of the grid is 20 pixels. Figure [2-15](#A978-1-4842-1458-9_2_Chapter.html#Fig15)
    has the grid function activated. It is also possible to adjust this setting. You
    will need to return to the `View` menu and select `Grid Settings` from the menu.
    This will open a window that will allow you to change the block size and colors,
    as well as the frequency with which the thick lines appear.


    ![A978-1-4842-1458-9_2_Fig15_HTML.jpg](A978-1-4842-1458-9_2_Fig15_HTML.jpg)


    Figure 2-15. Gridlines on a canvas in Sketch


    ### Show Layout


    The `Show Layout` grid is another kind of grid available in Sketch. It allows
    you to define columns and rows. If you are using Sketch for Web design, your grid
    settings will be different and you might need to use the layout grid instead.
    These grids can also be modified to suit your needs.'
