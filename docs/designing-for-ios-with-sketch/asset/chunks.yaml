  trans: '

    # 10. 导出设计资源用于开发


    你的应用设计已完成，所有方案都已获批。客户很满意，你正与创意团队庆祝又一次圆满收官。但且慢！既然应用设计已全部完成，即将变成可供下载的真实应用，你就需要将这些设计交付给工程师或开发团队。应用的外观固然重要，但良好的运行体验同样关键。这需要设计师与开发者之间的紧密协作。


    随着设计与开发之间的界限日益模糊，两者间的整合点已成为应用开发生命周期中不可或缺的部分。设计师越来越熟悉代码，开发者也越来越了解设计，而 Sketch 正是这一趋势的重要推动者。如今，将
    Sketch 设计课程与 Swift 开发课程打包教学已不罕见，这样设计师就能在设计技能之外补充开发能力。借助 Sketch，导出资源用于 Xcode 从未如此简便。


    如果你并非亲自开发应用，而是交由开发者完成，那么你需要与其沟通，了解他倾向于以何种方式接收设计资源。这一点尤其重要，尤其当你此前未采用协作式设计方法、未让开发者参与全程的情况下。


    在本章中，我们将探讨 Sketch 3 的导出功能及其使用方法，并逐步演示如何为 iOS 执行特定的导出任务。幸运的是，Sketch 在此也能提供帮助。导出资源是设计师的常规工作，而这项功能正是
    Sketch 的强项之一。该程序提供了多种文件格式的导出选项，以及相对简便的导出操作。我们将从基础开始，讲解如何利用 Sketch 以不同方式导出 iOS
    开发所需的资源。


    由于 iOS 需要导出多种分辨率，你必须能够导出 `@2×` 甚至 `@3×` 的资源，而 Sketch 让这一切成为可能，且流程极为流畅。学完本章后，你将能够使用
    Sketch 导出设计，准备交付。


    与前面章节类似，本章所有练习仍将使用 PhotoBomb 应用。这样，我们就能用一套设计完成整个设计流程，最终为该应用导出一整套资源。


    ## 哪些需要导出，哪些无需导出


    那么，我们如何判断哪些内容需要导出给开发者呢？这就要靠沟通了。与开发者讨论他的偏好始终是明智之举。但通常情况下，你需要导出的是那些无法通过编程重新创建的资源。当应用在
    Xcode 中创建时，开发者会用代码重建你的设计。字体和文本图层这类元素可以轻松通过代码实现，但某些图形元素则需要提供给开发者。外观可能变化的元素也应导出。例如，如果工具栏上的某个项目在点击时必须高亮或发光，则应单独导出。或者，你也可以为这个元素创建“开启”和“关闭”两个版本，一并导出给开发者，以便呈现两种状态的图形表示。此外，不属于
    iOS 标准 UI 的图标也应导出。如有疑问，不妨先将元素导出。如果开发者不需要，他自然会忽略。


    在 Sketch 中导出的两种方式：

    一种是在工具栏的 "插入" 菜单中选择 "导出"。

    另一种是选中图层后，点击画布检查器窗口右下角的 "设为可导出" 按钮。如图 10-1 所示，点击 "设为可导出" 按钮后，Sketch 会在该按钮上方区域创建导出图层的预览。如果选中了多个图层，所有缩略图都会显示在此处。


    ![A978-1-4842-1458-9_10_Fig1_HTML.jpg](img/A978-1-4842-1458-9_10_Fig1_HTML.jpg)


    图 10-1. 选中图层导出前后 "设为可导出" 按钮的状态。本例中，我们选中了 PhotoBomb 应用引导页上的 "进入" 按钮


    在关注导出流程时，你需要留意画布的几个区域。图 10-2 展示了导出时需关注的三个画布区域。从上图（原图，译者注）从左至右依次为：文件菜单中的导出选项（如果你选择此路径）；检查器右下角的导出选项；以及图层列表底部的切片和图层选项。


    ![A978-1-4842-1458-9_10_Fig2_HTML.jpg](img/A978-1-4842-1458-9_10_Fig2_HTML.jpg)


    图 10-2. 从 Sketch 画布导出资源时应考虑的三个区域


    ## 小刀图标


    选中图层准备导出时，你会注意到图层列表底部的小刀图标会高亮。这个小刀图标表示有图层可供导出。任何旁边有小刀图标的图层，都会在你下次从工具栏菜单中选择"导出"时显示。下拉菜单会显示该导出中包含的所有图层，如图
    10-3 所示；该图展示了下拉菜单和选中的导出图层。


    ![A978-1-4842-1458-9_10_Fig3_HTML.jpg](img/A978-1-4842-1458-9_10_Fig3_HTML.jpg)


    图 10-3. 从工具栏菜单中选择"导出"时，下拉菜单显示可供导出的切片


    返回你的图层列表，你会看到图 10-3 中显示的所有图层旁边都有小刀图标。你可以将这些图层移至相应的分组中，以便更好地组织。


    ### 从"插入"菜单切片


    要选择切片或导出的区域，你也可以从"插入"菜单中选择"切片"选项。完成后，光标会变成一把小刀，你就可以选择画布上设计中的任意区域进行导出。选择区域后，检查器中会显示切片的预览，图层列表下方的小刀图标也会更新，显示画布上当前切片的总数。


    #### 导出的文件格式


    在 Sketch 中导出文件时，程序提供了多种输出格式选项，包括：JPEG、PNG、TIFF、PDF、EPS 和 SVG。我们来了解一下这些文件格式。


    ##### PNG


    PNG 是一种非压缩图形格式，也是导出 iOS 文件的首选格式。它基本上是一种所见即所得的格式。在导出过程中，图像不会增加或减少任何内容。PNG 的另一个优点是支持透明度，这意味着如果你的图形中包含透明背景，该格式不会将其显示出来。PNG
    是 Apple 的 IDE（Xcode）首选的文件大小格式，因为 Xcode 会在构建过程中对 PNG 进行优化。


    ##### JPEG


    JPEG 是一种压缩文件格式。这意味着你的最终图形文件及其包含的任何颜色、效果或渐变都会被压缩，其颜色数量会少于原始文件。导出后的 JPEG 文件体积也会远小于
    PNG。如果你只是想展示工作进度（此时压缩率和颜色精确度无关紧要），那么 JPEG 是个不错的选择。

