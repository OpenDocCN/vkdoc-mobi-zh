- fmt: '# Opening Sketch


    Once you open the program, you will see that the Sketch interface is fairly simple.
    It was created to be as streamlined and as minimalistic as possible in order to
    allow you to focus completely on your work. There are no floating panels, and
    everything you need is easily accessible from the three main areas within the
    interface. These areas are as follows:


    The toolbar along the top, the Layer panel on the left, the Inspector panel on
    the right, and the canvas in the center of the screen where your actual design
    work will take place.


    Sketch offers infinite scrolling. This gives you a great deal of control over
    what you see on screen. With this feature, you can scroll infinitely in any direction
    and add as much content as you’d like to your canvas, which is shown in Figure
    [2-2](#A978-1-4842-1458-9_2_Chapter.html#Fig2).


    ![A978-1-4842-1458-9_2_Fig2_HTML.jpg](A978-1-4842-1458-9_2_Fig2_HTML.jpg)


    Figure 2-2. The Sketch interface in version 3.3.3


    **Tip**: If you scroll to the far left, right, or anywhere on your canvas and
    lose your place, you can always return to your design by using the shortcut `⌘1`
    or by going to the `View` menu and selecting `Center Canvas`.


    ## The Canvas


    The middle area of the screen is called the canvas. This is where you will spend
    your time, as your design will actually live in this space. Adjustments that you
    make in the Inspector will manifest themselves in your canvas area.


    When you are beginning your design, you must have the correct dimensions for the
    iPhone handy. As you know, the iOS UI design consists of many unique elements,
    each with Apple’s own unique touch. These elements are an integral part of the
    iOS design language. You may have already installed the San Francisco font, but
    what about the other elements that give iOS its iconic look and feel, making it
    unique and allowing it to stand out when compared to other mobile operating systems?
    This includes elements such as the iOS keyboard, the segmented controls, and the
    Control Center that effortlessly slides up from the bottom of your iPhone. You
    may ask yourself, do we need to design all of these elements from scratch? Well
    no, of course.


    In March 2014, it was announced that Sketch would ship with an iOS8 GUI created
    by the popular design studio Teehan+Lax. The Sketch team had previously released
    iOS templates for Adobe Photoshop, so the designers were already familiar with
    their detailed work.


    The template contains an exquisitely detailed, layered file containing multiple
    shapes and layers. All of these shapes and layers were painstakingly recreated
    in Sketch’s native format, the vector. More exciting was the fact that these shapes
    and layers were editable. Designers were free to use them to create new designs,
    providing they followed Sketch’s terms. For designers who were interested in designing
    for iOS using Sketch, this was a blessing.


    The great thing about the GUI shipping within Sketch was that designers would
    no longer need to search the Internet to find it and then import it into the program.
    It would now be easily accessible with the click of just a few buttons. To access
    the GUI, go to `File` in the menu above the toolbar and select `New From Template`,
    as shown in Figure [2-3](#A978-1-4842-1458-9_2_Chapter.html#Fig3). Select the
    appropriate template for which you are designing. You should see the templates
    for iOS app icon and iOS UI Design Mac App icon among others. Select the `iOS
    UI Design` Template, and you should be ready to go.


    ![A978-1-4842-1458-9_2_Fig3_HTML.jpg](A978-1-4842-1458-9_2_Fig3_HTML.jpg)


    Figure 2-3. Accessing the Teehan+Lax iOS8 GUI from within Sketch 3


    Once you’ve opened the menu and selected `iOS UI Design` from the drop-down, Sketch
    will open a new window with the template and all of the elements, layers, groups,
    and vectors, as shown in Figure [2-4](#A978-1-4842-1458-9_2_Chapter.html#Fig4).
    Layers and groups have been titled according to their corresponding elements on
    the canvas. Hovering your mouse over an element in the Layers list will highlight
    the corresponding element on the canvas. Here you have all of the UI elements
    that you’ll need to design an app for iOS.


    ![A978-1-4842-1458-9_2_Fig4_HTML.jpg](A978-1-4842-1458-9_2_Fig4_HTML.jpg)


    Figure 2-4. Sketch iOS UI Design Template in Sketch 3


    If you’re starting a new design or mockup for iOS, you can easily jump right in
    by adding any of these elements onto your artboard, right from your toolbar. Simply
    open the template and go to: `Insert` ➤ `Symbols` and select an individual symbol
    that you’d like to add to your design.


    Because the canvas is completely unconstrained, when designing for particular
    devices, screen sizes, and resolutions, this could present issues. How do you
    design for a small screen versus a larger one, an iPhone as opposed to an iPad,
    or even for a monitor on which a website will be displayed? This brings us to
    our discussion and exploration of artboards.


    ## Toolbar


    The toolbar, shown in Figure [2-5](#A978-1-4842-1458-9_2_Chapter.html#Fig5), contains
    all of the tools that you need to make your designs. You’ll be using the toolbar
    to create shapes and to add layers. As you examine the toolbar, the `Insert` menu
    on the far left is the first button you’ll see. The `Insert` menu will be used
    for creating shapes, adding text, images, artboards, and so forth. All of these
    elements will become building blocks of any design that you create with Sketch.


    ![A978-1-4842-1458-9_2_Fig5_HTML.jpg](A978-1-4842-1458-9_2_Fig5_HTML.jpg)


    Figure 2-5. The Sketch toolbar appears along the top of the canvas


    From left to right, the additional elements in the toolbar are as follows. We
    will discuss each in more detail later in the book:


    *   **Group** and **Ungroup**: These tools are used for keeping your document
    organized by combining selected layers into groups.

    *   **Create Symbol**: This is used to flatten layers to create symbols, which
    can then be reused across pages or artboards.

    *   **Zoom**: This allows you to zoom in or out on your canvas as indicated by
    the percentage sign. Clicking the plus or minus button next to the magnifying
    glass in the toolbar will adjust your canvas accordingly.

    *   **Edit, Transform, Rotate & Flatten**: You can use this tool to manipulate
    your shapes in a variety of ways.

    *   **Mask & Scale**: This tool lets you clip layers to shapes and also to resize
    them.

    *   **Union, Subtract, Intersect & Difference**: These are Boolean tools.

    *   **Forward & Backward**: This allows you to organize your designs even further
    by bringing various layers to the foreground and moving others to the background.

    *   **Mirror**: This tool allows you to view your designs on your iPhone using
    the `Sketch Mirror` app.

    *   **View**: This lets you show and hide various visual aids such as rulers,
    grids, and layout guides. You can also adjust grid and layout settings here.

    *   **Export**: This tool allows you to export your designs in a variety of different
    sizes.


    ### Customizing the Toolbar


    The toolbar can also be customized depending on your taste and workflow. Customizing
    the toolbar is helpful once you know which tools you use more often than others.
    It makes specific tools easy to access.


    To customize the toolbar, go to the `View` menu and select `Customize Toolbar`.
    A window with all of the icons representing actions will slide down. You may add
    any of these icons to your toolbar simply by selecting the icon from the drop-down
    panel and dragging it into the empty spaces in your toolbar, as shown in Figure
    [2-6](#A978-1-4842-1458-9_2_Chapter.html#Fig6). Once you drag it into the space,
    it will snap into place. When you have selected all of the icons that you want,
    click `Done` and the drawer will roll up. For the remainder of this book, however,
    we will assume the existing default toolbar.


    ![A978-1-4842-1458-9_2_Fig6_HTML.jpg](A978-1-4842-1458-9_2_Fig6_HTML.jpg)


    Figure 2-6. Customize your toolbar by selecting icons from the drop-down panel'
