    ![A978-1-4842-1458-9_7_Fig5_HTML.jpg](A978-1-4842-1458-9_7_Fig5_HTML.jpg)


    Figure 7-5.


    New registration page with buttons for social media and e-mail registration


    To keep everything consistent in terms of size I have duplicated the button from
