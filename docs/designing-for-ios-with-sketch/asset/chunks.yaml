  raw: '#### Artboard-Specific Plug-ins


    The following plug-ins are for working with artboards in Sketch.


    Marvel Sketch: Export your artboards directly into your Marvel prototypes.


    Sketch Arrange Artboards: Lays all of your artboards in a grid with a user-specified
    number of rows.


    ArtboardZoom: Easily zoom into the currently selected artboard of a currently
    selected object.


    Sketch Mate: Lets you automatically resize your artboard to fit to layers and
    content.


    ### Other Resources


    Here are links to some great Sketch resources on the Web. This list is by no means
    complete, as there are great and talented people adding Sketch resources all the
    time. This is simply my attempt to share some of my favorites.


    #### Websites


    Bohemian Coding Sketch Community: [`http://bohemiancoding.com/sketch/community/`](http://bohemiancoding.com/sketch/community/)


    The official Bohemian Coding Sketch community.


    Sketchapp.tv: [`http://sketchapp.tv/`](http://sketchapp.tv/)


    Video tutorials on Sketch.


    SketchLand: [`http://sketch.land/`](http://sketch.land/)


    Index of Sketch plug-ins.


    Sketch App Sources: [http://​www.​sketchappsources​.​com/​](http://www.sketchappsources.com/)


    Catalog of free resources for Sketch. Both Web and app development.


    Sketch Tricks: [http://​sketchtricks.​com/​](http://sketchtricks.com/)


    A great collection of articles and links on Sketch.


    #### Groups


    Sketch Facebook Group: [`https://www.facebook.com/groups/sketchformac/`](https://www.facebook.com/groups/sketchformac/)


    Sketch Talk Forum: [http://​sketchtalk.​io/​](http://sketchtalk.io/)


    Sketch on Reddit: [`https://www.reddit.com/r/sketchapp/`](https://www.reddit.com/r/sketchapp/)


    Sketch Collection on Medium: [`https://medium.com/sketch-app/`](https://medium.com/sketch-app/)


    Design & Code Facebook Group: [`https://www.facebook.com/groups/designcode/`](https://www.facebook.com/groups/designcode/)


    SketchDesign.io Facebook Group: [`https://www.facebook.com/groups/sketchdesignio/`](https://www.facebook.com/groups/sketchdesignio/)


    #### Apps That Integrate with Sketch


    Avocode.com: Export and share from Photoshop and Sketch.


    Origami: [`http://facebook.github.io/origami/`](http://facebook.github.io/origami/)


    #### Design Prototyping Tools


    Invision: [`http://www.invisionapp.com/`](http://www.invisionapp.com/)


    Prototyping and workflow collaboration tool.


    Wake: [`https://wake.io/`](https://wake.io/)


    Collaborative design tool.


    Zeplin: [https://​zeplin.​io/​](https://zeplin.io/)


    Lets you generate style guides automatically.


    Flinto: [`https://www.flinto.com/`](https://www.flinto.com/)


    Design Prototyping tool for Mac.


    Marvel: [`https://marvelapp.com/`](https://marvelapp.com/)


    Mobile and Web prototyping.


    I hope that you find these websites helpful on your design journey.


    ## Summary


    The plug-ins mentioned in this chapter are meant to help to speed up your workflow
    and to assist you with the overall process of designing your app. The plug-ins
    aren’t mandatory, but they are a big part of the growing Sketch community and,
    as such, are meant to enhance your use of Sketch.


    Now that you’ve come to the end of the book and your design lesson, feel free
    to join the community, meet other designers, and contribute.


