  trans: '

    ### 整理文档


    如果你正在从头到尾设计一款应用，一个好的做法是在进入设计阶段之前对整体方案进行充分思考。有些设计师使用 `Sketch` 进行线框设计，但目前市场上也有许多工具允许你先绘制线框图，然后直接导入
    `Sketch`。其他人则会使用传统的手绘和纸张来设计线框图，并在正式设计前反复迭代应用的整体流程。无论采用何种方法，在开始设计过程之前考虑如何组织文档都是一个好主意。如果使用纸笔，你可以轻松地为你的画作拍张照片，并将其直接导入
    `Sketch` 作为参考。这样一来，你就可以将图纸作为设计背景中的指南，或者并排放置作为参考。图 6-3 展示了如何将纸质图纸作为图像导入到设计中供参考。


    ![A978-1-4842-1458-9_6_Fig3_HTML.jpg](img/A978-1-4842-1458-9_6_Fig3_HTML.jpg)


    图 6-3.


    你可以将纸质图纸或线框图导入 `Sketch` 作为参考，以辅助设计过程


    使用 `Sketch`，你可以选择将整个应用创建**在一个文档**中，或者根据应用的复杂程度将其拆分成多个文档。这是一个变革性的功能，因为它允许你利用 `Sketch`
    的无限缩放功能进行缩小，从而鸟瞰整个应用。这在设计包含多种不同流程和使用场景的复杂应用时也很有帮助。虽然你可以为整个应用创建一个文件，但 `Sketch`
    允许你将应用拆分成多个页面，这样你就可以在整个文档中共享符号，从而在发生更改时同步应用到你的应用中。图 6-4 展示了我名为 `Cast` 的应用中所有屏幕的鸟瞰图。尽管
    `Cast` 是一个简单的应用，你可以轻松地使用页面来拆分应用的主要部分，然后使用这些页面中的画板来概述特定流程中的各个步骤。


    ![A978-1-4842-1458-9_6_Fig4_HTML.jpg](img/A978-1-4842-1458-9_6_Fig4_HTML.jpg)


    图 6-4.


    应用多个屏幕在 `Sketch` 中布局于一个页面上的鸟瞰图


    #### 扁平化图像


    这个特定的过程旨在让 `Sketch` 尽可能快速高效地运行。`Sketch` 本身就是一个相当精简的程序，但图形往往会拖慢一切。众所周知，`Sketch`
    的强项不在于处理照片。正如我们在前面章节讨论过的，它可以处理照片，但因为 `Sketch` 是一个矢量程序，我们建议尽量减少照片的使用。话虽如此，你可能仍然希望在设计中包含照片。应用是视觉化的，因此在某些情况下，照片有助于为你的应用带来一定程度的真实感。因此，创造一种处理图像的方法会很有帮助。


    由于图像包含的信息量远多于原生创建的形状，它们需要 `Sketch`（以及你的计算机）在渲染时使用更多资源。例如，假设你在应用中使用了一张非常显眼的背景图像。这很可能意味着该图像会用在多个屏幕上。但让我们把情况复杂化：假设同一个图层上还应用了一些效果。导入图像时，始终确保将整体大小优化到能保持最佳质量的最小文件大小是一个好习惯。我们知道文件越大，图像显示效果越好。然而，你还必须考虑是否会对图像应用特殊效果。例如，如果你要对图像应用广受欢迎的高斯模糊效果，你可能需要考虑使用较低质量（因此也是较小尺寸）的文件。导入图像后，你可以应用效果并将其扁平化。这将减少
    `Sketch` 文档的整体大小，并最终提高文档打开时计算机的响应速度。图 6-5 展示了两个使用相同背景图像并应用了模糊效果，且在使用前已进行扁平化处理的屏幕。虽然你可能不会立即看到效果，除非你的计算机内存低得惊人，但你会在文档的整体文件大小上看到结果。


    ![A978-1-4842-1458-9_6_Fig5_HTML.jpg](img/A978-1-4842-1458-9_6_Fig5_HTML.jpg)


    图 6-5.


    两张以图像为背景的文件，一张已优化，一张未优化


    ### 命名图层和符号


    这是一个棘手的问题。对我来说，命名图层可能真的很麻烦。在使用 `Sketch` 设计和绘制线框图时，我动作很快。我常常没有花时间尽可能高效地命名图层。虽然在制作原型或线框图时这还不算太糟，特别是如果只供你自己查看的话，但当你设计一个需要与其他设计师以及最终与开发人员共享的产品时，你需要确保你命名图层和符号的方式既高效，又对其他使用你文件的人来说直观易懂。这是一个硬性设计规则，无论你使用什么图形程序都应遵守。创建有意义的图层名称是最佳实践。不建议使用晦涩或过于取巧的名称。


    如果你还没有组织好图层，它们开始变得难以管理，我会提供一些技巧来帮助你有效地管理它们。在移交文件之前，甚至在设计过程中，能够组织好图层非常重要。关键在于在设计过程中、在图层失控之前就对其进行组织。


    我们之前讨论过将设计中彼此相关的元素进行分组，但有时，为了更好的组织而对元素进行分组也是个好主意。例如，如果你正在设计一个带有标签栏的应用，你可能希望将该标签栏中的所有元素都包含在一个组中。并且，在必要的情况下，你还可以在组内创建组，即嵌套组。因此，虽然你的标签栏图标在一个组中，但如果有多个形状构成了一个特定的图标，那么这可以成为更大标签栏组内的一个嵌套组。这样一来，任何使用你文件的人都可以轻松找到他们需要的元素，而无需进行大量猜测。相信我，他们会因此感谢你。图
    6-6 展示了我如何为 `Cast Beauty` 应用组织图层。列表显示了带有文件夹的主要组，但每个文件夹内部还有许多额外的嵌套组，并且所有这些都与该页面中的一个特定画板相关。


    ![A978-1-4842-1458-9_6_Fig6_HTML.jpg](img/A978-1-4842-1458-9_6_Fig6_HTML.jpg)


    图 6-6.


    应用图层的命名列表


    说到符号，你可以确信这和图层是一样的道理。当需要为客户甚至创意总监快速修改设计时，使用符号是加快工作速度的关键。如果你的文档包含 10 个页面，你需要更新某个标题栏的颜色，当然你可以逐个修改应用每个页面中的每一个画板或屏幕。或者，你可以将符号命名为类似
    `"header bar"` 这样直观的名称，而不是 `"purple stripe"`，然后轻松地一次性修改颜色，并立即更新文档中所有地方。你不想因为符号名称没有意义而浪费时间寻找正确的符号。然而，和所有事情一样，要注意在何处以及多久使用一次符号。如果在整个设计中更改了符号，最好进行一些设计质量检查，以确保所做的更改是相关的，并且更重要的是，是准确的。

