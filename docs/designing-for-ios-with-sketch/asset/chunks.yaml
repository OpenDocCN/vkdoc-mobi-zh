    孟的线框图模板的一大亮点在于，他是一位 **Sketch** 大师，并且会特意确保其模板中包含的 iOS 元素尺寸完全符合 iOS 设计规范。这些模板还使用了链接样式，这非常棒，因为你可以轻松更新颜色以符合自己的喜好，并便捷地更新整个线框图。


    当然，你也可以直接使用 Sketch 自带的 iOS 模板，或者用你信赖的纸和笔来为你的应用创建自己的线框图。对于那些喜欢用纸和笔的人，可以使用 `UI Stencils`——这是一套包含许多常用
    iOS UI 元素的 iPhone 和 iPad 模板工具包。他们还提供一系列带有 iPad 和 iPhone 轮廓的记事本，让你能轻松开始线框图绘制过程。虽然并非绝对必要，但这些模板确实能为传统的纸笔线框图增添一丝专业感。这些工具如图
    7-1 所示。一旦你用纸笔画好线框图，就可以将它们导入 `Sketch` 以辅助整体设计流程。但现在，让我们专注于在 `Sketch` 中实际创建你的设计。


    ![A978-1-4842-1458-9_7_Fig1a_HTML.jpg](img/A978-1-4842-1458-9_7_Fig1a_HTML.jpg)![A978-1-4842-1458-9_7_Fig1b_HTML.jpg](img/A978-1-4842-1458-9_7_Fig1b_HTML.jpg)![A978-1-4842-1458-9_7_Fig1c_HTML.jpg](img/A978-1-4842-1458-9_7_Fig1c_HTML.jpg)


    **图 7-1.** 来自 Meng To 网站的灰色和蓝色线框图模板


    ## 应用


    为了本次练习的目的，我们决定为一个名为 `PhotoBomb` 的虚构应用创建几个关键界面。该应用允许用户拍摄照片，并将带有地理定位信息的照片标记在地图的
    landmarks 或特定位置上。用户可以查看朋友的照片，了解他们在特定地点做了什么。该应用将使用用户的位置信息和相机。用户还可以通过他们的 Facebook
    或 Twitter 账户登录。我们将使用 `Sketch` 为这个应用创建几个关键的线框图界面。我已经在我的记事本上用铅笔做了初步的草图。我记录了应用的功能、UI
    可能的样子，以及对应用整体功能至关重要的其他一些元素。


    根据我的笔记


    这个应用旨在简单易用且有趣，融合了 Facebook 和 Twitter 等热门社交网站的元素。我们的线框图顺序如下：


    应用启动时会显示一个简短的启动屏或介绍屏，包含应用 logo 和介绍。用户将点击一个 `Enter` 按钮，进入一些介绍性页面，解释应用的工作原理以及用户应如何在应用的各个页面之间导航。用户可以随时跳过介绍页面，直接进入注册和认证页面。


    用户可以通过三种方式之一注册：Facebook、Twitter 或电子邮件。我决定在我们的线框图中只展示电子邮件认证页面。用户输入标准的电子邮件和密码组合，然后进入主页。这是应用的主页面，用户进入应用后首先到达这里。用户从这里导航到应用的所有其他页面，并返回此处。完成此页面后，我们将展示一个设置页面的示例，用户可以在其中调整位置和隐私设置，快速展示用户个人资料页面的样子，然后进入权限和拍摄页面，这些页面将展示用于获取用户相机和位置使用权限的自定义页面。我们将绘制的最后一个页面是一个简单的拍摄页面，它将说明我们的自定义相机拍摄界面。


    我手写的笔记如图 7-2 所示。必要时，可以将笔记作为注释添加到你的线框图中，以向设计师或工程团队解释预期操作。


    ![A978-1-4842-1458-9_7_Fig2a_HTML.gif](img/A978-1-4842-1458-9_7_Fig2a_HTML.gif)![A978-1-4842-1458-9_7_Fig2b_HTML.gif](img/A978-1-4842-1458-9_7_Fig2b_HTML.gif)


    **图 7-2.** 我为 PhotoBomb 应用做的笔记。我将使用这些笔记来创建线框图，并在必要时添加注释


    在创建线框图的过程中，我将参考我的纸笔草图和笔记，并将其作为指南，帮助我检查各个界面以及特定元素、按钮和图标的位置。如果你没有这样的文档，那么最好在开始绘制线框图之前就创建一个。你可以将其称为你的初步应用规范，这将是一份动态文档，指导你完成线框图的创建过程。


    我们将从 `PhotoBomb` 应用中创建几个特定的界面，向你展示如何在进入设计阶段之前创建线框图。


    ### 启动屏


    要创建我们的启动屏，这可以说是应用中最简单的界面，我们实际上只需要 logo 以及应用标题和名称的放置。使用孟的线框图模板，我复制了一个空界面，并创建了一个名为
    `PhotoBomb` 的新 `Sketch` 文件。然后我从模板中复制了一个空白界面到新文件中。这将成为我应用的启动屏。我们的启动屏上将只放置 logo
    和应用名称。人机界面指南规定，启动屏实际上只在屏幕上显示很短的时间。我们计划通过添加一个用于注册和进入应用的按钮来缓解这一点。


    在空白界面上，我输入了文字并导入了图形以产生效果，从而创建了 logo。然后我使用了一个没有填充的圆角矩形形状来创建按钮。这就是第一个界面，如图 7-3 所示。请注意，正如我们之前学到的，我已经适当地命名了我的图层并对元素进行分组，以防之后需要快速更新。屏幕上所有元素都已分组，以防止混淆并便于访问。


    ![A978-1-4842-1458-9_7_Fig3_HTML.jpg](img/A978-1-4842-1458-9_7_Fig3_HTML.jpg)


    **图 7-3.** 我们的 PhotoBomb 应用线框图中的启动屏和进入界面


    创建好我们的启动屏后，我们现在可以进入一个新的界面，用户将在此选择他们希望如何认证和使用应用。

    '
- fmt: '### Onboarding


    `Onboarding` is a new-ish practice that essentially consists of including a few
    screens loaded before the user enters into the app that offers them—especially
    first-time users—to understand the app and to demonstrate to them how the application
    will work. Arguably, some apps do not need onboarding screens or walkthroughs.
    If your app is relatively simple, then you can choose to ignore onboarding screens
    altogether. However, if your app includes a unique way of handling a task that
    may not be immediately apparent to users, or if your app includes new user interface
    elements that users won’t be familiar with, then you should consider including
    a few onboarding screens.


    Onboarding screens are sometimes called walkthroughs. They are specifically used
    to familiarize users with a unique or completely new interaction that your app
    features. In these cases, walkthroughs are used to show users precisely how to
    interact with the more unique aspects of your app. When offering users onboarding
    or walkthrough screens, remember that it’s important to show them as opposed to
    tell them and make sure that you’re showing the entire process. Users want to
    know how to complete specific critical tasks in the app so be sure to show them
    all screens involved in that process. They also want to understand what your app
    will do for them. Meaning, what is the overall value proposition of your application?


    And while visuals are important in your onboarding and walkthrough screens, it’s
    important to ensure that the voice and tone you are using is friendly, conversational,
    and aligns with the rest of the copy in your app. Because these screens will be
    your user’s very first interaction with your app, they will often determine whether
    or not your users will continue with the process of registration and continue
    their engagement with your app. If you’re going to do onboarding, you’ve got to
    do it right. For our `PhotoBomb` app, we will include a few onboarding screens
    that explain the purpose of the app and what users can expect from it.


    The initial onboarding screen explains the purpose of the app. This screen was
    created by taking a duplicate of the splash screen, moving the logo slightly higher,
    and adding a block of text describing the app. I then imported the page controller
    symbols from `Sketch`’s iOS template and positioned it on the screen.


    The second page shows the home screen with some walkthrough copy overlaid to provide
    a user with some context on where things are and what they mean to the overall
    game play. I’ll explain how the home page was created a little later. But essentially,
    this screen was created by adding a black rectangle over the screen and decreasing
    its opacity to allow the page underneath to show through it. Once this was completed,
    I was able to add the copy as new layers on top of the screen to explain the various
    elements on the screen.


    The two onboarding screens are shown in Figure [7-4](#A978-1-4842-1458-9_7_Chapter.html#Fig4).


    ![A978-1-4842-1458-9_7_Fig4a_HTML.jpg](A978-1-4842-1458-9_7_Fig4a_HTML.jpg)![A978-1-4842-1458-9_7_Fig4b_HTML.jpg](A978-1-4842-1458-9_7_Fig4b_HTML.jpg)


    Figure 7-4.


    Two onboarding wireframed screens for our `PhotoBomb` app. On the left is the
    screen that explains the value proposition of the app, and on the right is a basic
    overlay showing placement of certain elements on the home page


    ### Authentication


    Most apps will require some kind of authentication for users to be able to enter
    and use the app’s services. These days, some apps find it easier to use popular
    social networks that most users are members of. It makes the registration process
    easier. Since social networks already authenticate users, registering with their
    APIs, and most users are familiar with this process, they only need to choose
    the appropriate social network that they want to use for authentication. If they
    choose to, they can also register using e-mail. It is rarely necessary to wireframe
    the social media registration process, so we will create two pages, one where
    users can select which social media they want to register with, and another where
    they go through the process via e-mail registration.


    We create the first page by duplicating the background and status bar from the
    previous page. We now have a blank screen upon which to build our new page. The
    new page must contain the three buttons for registration as well as the logo for
    the app. Figure [7-5](#A978-1-4842-1458-9_7_Chapter.html#Fig5) shows the newly
    created page.


    ![A978-1-4842-1458-9_7_Fig5_HTML.jpg](A978-1-4842-1458-9_7_Fig5_HTML.jpg)


    Figure 7-5.


    New registration page with buttons for social media and e-mail registration


    To keep everything consistent in terms of size I have duplicated the button from
    the splash page three times to create one each for `Facebook`, `Twitter`, and
    e-mail buttons and then import the icons for each button as PNGs from a free icons
    set from `Pixel Love`. After resizing them and lining them up, we have our new
    page. Sitting next to our original page, the two aren’t looking so bad and our
    wireframes are coming along. We now have two pages and can move on to the next
    page of our authentication process. You may want to know why I chose not to lay
    out the individual `Facebook` and `Twitter` authentication processes. It is mainly
    because those screens are mostly controlled by their respective publishers and
    designers have minimal control over how they will look. The apps require you to
    authenticate with those social media services and then return to your app so the
    popup screens for those services won’t require much or any real design or layout
    decision making from us. Therefore, I’ll choose to only show the e-mail authentication
    process, and show a few screens in the next section.


    **Tip**


    `Pixel Love` icons can be found at: [`http://www.pixellove.com/free-icons`](http://www.pixellove.com/free-icons).'
