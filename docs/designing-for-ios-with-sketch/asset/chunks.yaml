  trans: '

    # 快捷键


    在深入了解 `Sketch` 之前，你最好先学习它的一些快捷键。它们能极大地改善你的工作流程，并减少执行某些操作所需的时间。作为 Mac 用户，你很可能已经熟悉复制粘贴等通用快捷键。以下是从网络各处收集的
    `Sketch` 快捷键综合列表。除了菜单中列出的快捷键外，你可以将此列表作为参考，直到你熟悉一些更常用的快捷键为止。


    ## Sketch 通用快捷键


    *   `⌃L` 切换布局

    *   `⌃G` 切换网格

    *   `Enter` 编辑当前选中的图层

    *   `⌘2` 缩放至选中图层

    *   `⌘3` 在画布中居中选中图层

    *   `⌘+` 放大

    *   `⌘-` 缩小

    *   `⌘1` 居中画布

    *   `⌘2` 缩放选区

    *   `Z` 缩放：按住并点击，或用鼠标拖拽区域

    *   `⌥ Z` 反向缩放：按住并点击

    *   `Esc` 退出当前工具或模式

    *   `Space` 抓手工具

    *   `Tab` 在当前组的图层间循环切换

    *   `Shift + Tab` 反向循环切换


    ## 图层快捷键（插入）


    *   `R` 矩形

    *   `O` 椭圆

    *   `L` 线条

    *   `U` 圆角矩形

    *   `T` 文本图层

    *   `V` 矢量

    *   `P` 铅笔

    *   `A` 画板

    *   `S` 切片


    ## 移动、隐藏和调整图层大小的快捷键


    *   `⌥+ 拖拽` 复制图层

    *   `⌥+ 悬停` 显示图层间距离

    *   `⌥+ 缩放` 从两端缩放

    *   `⇧+ 缩放` 保持宽高比

    *   `⌘ Shift L` 锁定或解锁图层

    *   `⌘ Shift H` 隐藏或显示图层

    *   `...➔` 移动

    *   `⌘...➔` 调整大小


    ## 文本与字体快捷键


    *   `Cmd + B` 加粗

    *   `Cmd + I` 斜体

    *   `Cmd + U` 下划线

    *   `Alt + CMD (+) +` 增大字号

    *   `Alt + CMD (+) -` 减小字号


    ## 自定义快捷键


    作为 Mac 用户，你可能也熟悉自定义快捷键。


    *   `Control R` 切换标尺显示

    *   `Control G` 切换网格显示

    *   `Control P` 在像素和矢量之间切换

    *   `Control L` 切换对齐参考线


    你也可以为那些没有快捷键的操作创建自定义快捷键。因为 `Sketch` 被设计为在 Mac OS 中运行，所以你能轻松创建自己的快捷键。例如，你可能会留意到（也可能不会）`Sketch`
    中的`插入图像` 并没有快捷键。你可以通过自己的键盘组合轻松创建一个快捷键。要创建自定义快捷键，请前往**系统偏好设置**并选择`键盘`。在窗口顶部的标签页中选择`App
    快捷键`，如图 2-16 所示。


    ![A978-1-4842-1458-9_2_Fig16_HTML.jpg](img/A978-1-4842-1458-9_2_Fig16_HTML.jpg)


    *图 2-16.* 你可以从电脑的“系统偏好设置”中创建自定义快捷键


    做出以上选择后，点击窗口底部的“+”按钮。会出现一个新的下拉菜单，列出你电脑上所有应用程序。向下滚动并在该列表中找到 `Sketch`。在名为`菜单标题`的字段中，输入你想要创建快捷键的菜单项的确切名称，如图
    2-17 所示。最后，在名为`键盘快捷键`的字段中，输入你新快捷键的对应按键，然后点击`添加`按钮。如果输入错误，你的快捷键将无法使用。


    ![A978-1-4842-1458-9_2_Fig17_HTML.jpg](img/A978-1-4842-1458-9_2_Fig17_HTML.jpg)


    *图 2-17.* 为您的键盘快捷键创建菜单标题


    一旦添加上，你会在该程序的快捷键列表中看到你新创建的快捷键，如图 2-18 所示。现在，你的快捷键应该可以在 `Sketch` 中使用了。你将能够从工具栏的下拉菜单中访问它。


    ![A978-1-4842-1458-9_2_Fig18_HTML.jpg](img/A978-1-4842-1458-9_2_Fig18_HTML.jpg)


    *图 2-18.* 创建自定义键盘快捷键


    至此，我们已经了解了完整的 `Sketch` 界面。因此，对于当你打开程序时屏幕上所见的一切的基本功能，以及按自己喜好自定义工具栏，你应该都相当熟悉了。如你所见，虽然界面简洁，但
    `Sketch` 是一个功能强大的图形程序，它将使你的 iOS 应用设计成为一种愉悦的体验。


    # 总结


    恭喜！你已经安装了 `Sketch` 程序，并熟悉了画布、工具栏和检查器，甚至还学会了一些方便的键盘快捷键。这将是在 `Sketch` 中进行设计时，你花费大部分时间的地方。此后你做的所有事情都将在这个屏幕上进行，直到你的设计开始在画布上变得生动起来。


    现在，你已经准备好进入下一章，与图形一起工作了。图形是你设计的基石。请继续阅读！


    # 3. 为图形设置样式


    到目前，你已经有了一些时间与 `Sketch` 界面互动并变得更加熟悉。本章重点介绍你可以用 `Sketch` 创建的图形。图形是你在 `Sketch` 中会用到的最重要的图层，你在
    `Sketch` 中创建的每一个设计都将由你从`插入`菜单中选择的图形构成。它们是在 `Sketch` 中进行任何设计的基石。


    正如第 2 章中提到的，你可以使用菜单中的`插入`工具将图形添加到画布上，也可以用鼠标、触控板或绘图板直接在画布上绘制。`Sketch` 中可以创建八种不同类型的图形：线条、箭头、矩形、椭圆、圆角矩形、星形、多边形和三角形。所有这些选项都可以在`插入
    ➤ 图形`菜单中找到，如图 3-1 所示。有了这些图形，你几乎可以创建任何东西。


    ![A978-1-4842-1458-9_3_Fig1_HTML.jpg](img/A978-1-4842-1458-9_3_Fig1_HTML.jpg)


    *图 3-1.* 点击工具栏上的`插入 ➤ 图形`会提供 `Sketch` 中可用的预设图形列表


    一旦选择好你想要的图形，只需在希望图形出现的画布任意位置点击并拖拽鼠标。`Sketch` 将开始使用默认颜色创建该图形（通常填充为浅灰色，边框为深灰色）。当你松开鼠标按键时，完整的图形就创建完成并放在画布上了。你还会注意到图层列表会更新以反映该图层的名称（通常默认是图形名称加数字
    1）。随着你继续添加未命名的图层，数字会以 1 的增量递增。只要该图形被选中，检查器也会更新以显示与该图形关联的属性。请特别注意`位置`、`大小`、`不透明度`、`填充`和`边框`中的值。如果你在检查器中更改或编辑这些值中的任何一个，`Sketch`
    将自动更新图形以反映这些更改。

