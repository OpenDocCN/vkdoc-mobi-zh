  trans: '

    ### 运动模糊


    顾名思义，`Motion Blur` 效果能营造出物体正在运动的感觉。该效果允许你沿特定方向进行模糊。与 `Gaussian Blur` 一样，从下拉菜单中选择此效果后，你可以使用提供的滑块以像素为单位调整模糊量。选择此选项后，你还可以使用出现的转盘来调整模糊角度。`Motion
    Blur` 效果如图 3-22 所示。


    ![A978-1-4842-1458-9_3_Fig22_HTML.jpg](img/A978-1-4842-1458-9_3_Fig22_HTML.jpg)


    图 3-22. 左侧为原始图像，右侧为应用了 `Motion Blur` 效果的效果


    ### 缩放模糊


    `Zoom Blur` 效果允许你从指定点向外模糊图层。选择此模糊效果后，Sketch 会提供选项，让你编辑模糊的起始点以及模糊的像素量。`Zoom Blur`
    效果如图 3-23 所示。


    ![A978-1-4842-1458-9_3_Fig23_HTML.jpg](img/A978-1-4842-1458-9_3_Fig23_HTML.jpg)


    图 3-23. 左侧为未应用任何效果的普通图像，右侧为应用了 `Zoom Blur` 效果的同一图像


    ### 背景模糊


    `Background Blur` 效果是波西米亚编码团队在 iOS7 重新设计后特别添加的。该效果在 iOS 系统中被广泛使用，因此你完全可以在应用设计中放心使用。它会使形状后方的背景变得模糊，但形状本身保持清晰。当你降低目标图层的不透明度后，该效果的表现最佳，否则很难看清效果。


    `Background Blur` 效果会显著消耗你的计算机资源。你会发现它拖慢程序乃至整个电脑的速度。因此，明智的做法是谨慎使用它。


    **提示**：`Background blur` 功能可用于创建“磨砂玻璃”效果，就像 iPhone 主屏幕上从底部向上滑出的控制中心一样。


    ## 共享样式


    在你的设计生涯中，有时你会希望将相同的样式（如阴影、填充等）应用于特定形状或对象。使用 Sketch，只需几个简单的步骤就能实现。但首先，为什么要这样做呢？作为
    UI 设计师，你深知在设计界面时速度和效率至关重要。你无疑会遇到需要同时发挥这两点的情况，并且你不仅需要是一名熟练的设计师，还要是一位快速高效的设计师。


    共享样式可以帮助你做到这一点。例如，当你有一个已应用了某些样式的形状，并且需要将相同的样式应用于另一个不同的形状时，首先，你可以使用 `option+⌘+c`
    组合键将一个对象的样式复制到另一个对象。这将复制一个对象的样式。然后，导航到新对象，选中它，并按 `option+⌘+v` 组合键将样式附加到新对象。请注意，这仅仅是简单地将样式从一个对象复制到另一个对象。但这两个对象彼此之间仍然是独立的。


    如果由于某种原因你需要在多个对象之间共享一种样式，那么你应该使用 Sketch 的 `Shared Style` 功能。这允许你创建一个新样式，并将其归属于任何一个或一些新对象。该功能的妙处在于，一旦你创建了一种样式并将其附加到一个对象上，对该样式的任何后续更改都会更新所有附加了该样式的对象。


    要创建新样式，只需点击检查器中显示为 `No Shared Style` 的下拉菜单，如图 3-24 所示。你可以在此处创建新的共享样式，它将自动与所选对象关联。


    ![A978-1-4842-1458-9_3_Fig24_HTML.jpg](img/A978-1-4842-1458-9_3_Fig24_HTML.jpg)


    图 3-24. 点击检查器中的 `Shared Styles` 下拉菜单创建共享样式


    图 3-25 显示了两个并排的图像。一个椭圆附有样式，另一个则没有。要将样式附加到新椭圆上，你必须选中该椭圆，然后从检查器的样式下拉菜单中选择所需的样式。该椭圆将自动应用新样式，并且之后对该样式的任何其他更改也会自动更新，如图所示。这些样式可以随时更新、删除或更改。只要一种样式已归属于某个对象，它们就会随该样式的更新而更新。


    ![A978-1-4842-1458-9_3_Fig25_HTML.jpg](img/A978-1-4842-1458-9_3_Fig25_HTML.jpg)


    图 3-25. 两个对象使用同一个正在更新的样式


    ## 图像


    正如本书第一章所述，Sketch 主要是为那些希望为网页和移动设备创建用户界面的设计师而设计的。由于它允许设计师处理矢量图形，因此 Sketch 可能不是图像编辑的最佳选择。如前所述，Photoshop
    的初衷就是图像编辑。因此，在这种情况下，当你需要进行严肃的图像编辑时，我建议使用 Photoshop 或其他任何值得替代的软件。


    话虽如此，Sketch 中也有一些相当不错的基础图像编辑工具，供你临时处理与图像相关的事务。


    **提示**：选择多个图层后，可以通过从 `Layer` 菜单中选择 `Flatten Selection to Bitmap` 来将它们合并为位图。


    Sketch 在 3.X 版本中改进了其图像编辑能力（特别是针对位图），并增加了图像编辑工具的数量。当你在画布上选择一个图像或位图并双击它时，图像编辑工具就会被激活。你会注意到检查器会更新，显示专用于图像编辑的工具。图
    3-26 展示了一个选中的图像以及显示出的图像编辑工具。


    ![A978-1-4842-1458-9_3_Fig26_HTML.jpg](img/A978-1-4842-1458-9_3_Fig26_HTML.jpg)


    图 3-26. Sketch 中全新改进的位图编辑工具


    可用于编辑位图的工具如下：


    - **选择**：此工具允许你在图像上的任意位置选择一个矩形区域。

    - **魔棒**：此工具允许你通过点击并拖拽来选择图像内的一个区域。

    - **反向**：此工具允许你反转之前的任何选区。

    - **裁剪**：此工具允许你选择图像的一个区域，并排除选定区域之外的任何内容。

    - **颜色**：此工具允许你选择一个区域，并用从可用取色器中选择的任何颜色填充它。

    - **矢量化**：此工具会将选定区域转换为一个独立的形状图层。


    ## 颜色调整


    虽然 Sketch 编辑照片的能力有限，但你仍然可以进行一些微调。如果你需要调整图像或位图的颜色，Sketch 允许你通过移动 `Color Adjust`
    面板中的滑块来调整图像的 `Hue`（色相）、`Saturation`（饱和度）、`Contrast`（对比度）和 `Brightness`（亮度），该面板如图
    3-27 所示。导入图像后，点击检查器右下角 `Color Adjust` 标题旁边的复选框，即可调出 `Color Adjust` 滑块。


    ![A978-1-4842-1458-9_3_Fig27_HTML.jpg](img/A978-1-4842-1458-9_3_Fig27_HTML.jpg)


    图 3-27. 使用 `Color Adjust` 工具调整后的图像


    样式化形状是使用 Sketch 进行设计的一个重要部分，它能为你的设计赋予个性和独特的风格。请花些时间来熟悉每一种样式——实际上有很多——以了解它们如何提升你的作品。尽情实验、混合和搭配吧。

    '
- fmt: '## Summary


    Shapes are the building blocks of almost any design, and now that you understand
    how you can customize your shapes by using the available effects and styles, you
    are well on your way. Take some time to experiment with the styles and features
    that you’ve just learned about before you move on to the next chapter.


    In the next chapter, we will cover symbols and text, which will add a new exciting
    dimension to your designs.


    # 4. Symbols and Text


    In the previous chapter, you learned about sharing styles between objects, and
    you used the `option+![A978-1-4842-1458-9_4_Figa_HTML.jpg](A978-1-4842-1458-9_4_Figa_HTML.jpg)+c`
    and `option+![A978-1-4842-1458-9_4_Figa_HTML.jpg](A978-1-4842-1458-9_4_Figa_HTML.jpg)+v`
    keyboard combinations to copy and paste styles between them. This is a helpful
    and simple way to share styles between multiple objects. In this chapter, we will
    discuss Symbols, a Sketch 3 feature that takes sharing styles to a whole new level
    and that will greatly improve your workflow.


    Symbols are new to Sketch 3, and it was one of the features that designers were
    most excited about in the new release. The Symbols feature allows you to select
    and reuse groups of objects across pages and even artboards in your design. For
    designers, the Symbols feature was a game changer.


    `SmartObjects` is the Photoshop feature most like Symbols in Sketch. They make
    designing easier, and they allow you to make nondestructive changes to an image
    or object. By converting your layer to a smart object in Photoshop, you gain much
    more flexibility within your design.


    Those of you who are familiar with Fireworks will recall that everything was contextual,
    and you were able to edit layers by just clicking them. The properties panel would
    update (like in Sketch), and you could get on with the business of editing that
    layer. Fireworks also had the ability to apply styles to a master page that would
    then govern certain styles within the document, even if they were spread out over
    a number of different pages. These are the closest features that compare to Symbols
    in Sketch.


    When designing user interfaces (UI), whether for mobile use or Web applications,
    there are bound to be many repeatable elements across screens. Menu bars, icons,
    and buttons are some of the most common of these. As designers, we go through
    multiple iterations of the many elements in a design. Being forced to change every
    single element would be incredibly time-consuming and inefficient. The Symbols
    feature greatly minimizes redundancies across pages and artboards in your designs.
    I would say that the Symbols feature in Sketch is closer to the Styles feature
    in Fireworks than it is to the `SmartObjects` feature in Photoshop.


    To understand how the Symbols feature works, it helps to take a meta look at your
    design. Zoom out so that you are able to see multiple artboards in a single view.
    Look for the repeatable items across your design. What elements appear over and
    over across multiple screens, artboards, or even pages? You will find that some
    objects appear on every screen. Buttons, headers, and tab bars are common.


    While you are able to duplicate a screen with its exact elements intact, simply
    duplicating an artboard or copying a style does not update all of the elements.
    How tedious would it be to have to update all of your icons if a client requested
    a slight change in color or size?


    We discussed Groups in [Chapter 2](#A978-1-4842-1458-9_2_Chapter.html) when we
    talked about layers. You may recall that Groups consist of a number of layers
    that can be combined based on their context. You can group layers by selecting
    those that you want to group and then selecting the Group icon from the toolbar
    to complete the action. You will see that it has been completed when the layers
    are combined in the Layers list with a folder icon. Clicking this icon will reveal
    all of the layers in that Group.


    Understanding Groups is important to understanding Symbols because Symbols are
    another kind of group of layers. Like Groups, Symbols are represented by a folder
    in the Layers list. However, the folder is purple, not blue, as shown in Figure
    [4-1](#A978-1-4842-1458-9_4_Chapter.html#Fig1). The image shows a group of layers,
    indicated by the blue folder, and a Symbol, indicated by the purple folder. You
    can also see the Group, Ungroup, and Symbol buttons in the toolbar.


    ![A978-1-4842-1458-9_4_Fig1_HTML.jpg](A978-1-4842-1458-9_4_Fig1_HTML.jpg)


    Figure 4-1. The Layers list showing a grouped set of layers, as well as a set
    of layers that have been made into a symbol


    To create a symbol, you simply select all of the layers that will make up the
    symbol and click the `Create Symbol` button in the toolbar.


    **Tip:** Another way to create a symbol is to go to the `Layer` menu and select
    `Create Symbol`.


    If you are selecting multiple individual layers, Sketch will combine them into
    one group and create the purple folder in the Layers list on the right. Now that
    the symbol has been created, you are free to use and reuse that symbol across
    the various pages and artboards in your designs. Note that symbols cannot be used
    across different designs in different documents. If you’d like to use that or
    any other symbols across your design, you will need to go to the `Insert` menu
    and select `Symbols` from the drop-down, as shown in Figure [4-2](#A978-1-4842-1458-9_4_Chapter.html#Fig2).


    ![A978-1-4842-1458-9_4_Fig2_HTML.jpg](A978-1-4842-1458-9_4_Fig2_HTML.jpg)


    Figure 4-2. The Insert Symbols menu


    It is also possible to create a Symbol from an already existing Group. Simply
    select the Group from the Layers list, and choose `Create New Symbol` from the
    Inspector on the right of the screen, as shown in Figure [4-3](#A978-1-4842-1458-9_4_Chapter.html#Fig3).
    The drop-down there will let you know that the currently selected layers are not
    a symbol and also show a list of the available symbols. Once you have created
    multiple symbols, you can also organize them from this menu.


    ![A978-1-4842-1458-9_4_Fig3_HTML.jpg](A978-1-4842-1458-9_4_Fig3_HTML.jpg)


    Figure 4-3. A list of available symbols and other symbol options


    If you are working on a robust design, you may find that you have created a number
    of symbols over the course of working on the design, and the number can become
    very large. Sketch lets you organize your symbols easily with a `Manage Symbols`
    option. You access this option via the `Insert ➤ Symbol ➤ Manage Symbols` menu.
    The `Manage Symbols` option allows you to see a list of all of the symbols in
    your documents. You can then rename symbols or even delete them from this menu
    to keep track of them. There is also an option to organize all of your symbols
    from this menu. Simply select `Organize Symbols` from the `Insert ➤ Symbol` menu,
    and a window will provide you with options for organizing your symbols just the
    way that you want. The `Organize Symbols` window shown in Figure [4-4](#A978-1-4842-1458-9_4_Chapter.html#Fig4)
    is a handy tool that lets you sort all of your symbols.


    ![A978-1-4842-1458-9_4_Fig4_HTML.jpg](A978-1-4842-1458-9_4_Fig4_HTML.jpg)


    Figure 4-4. The Organize Symbols window


    **Tip:** Symbols from the `Organize Symbols` menu are listed in alphabetical order.'
