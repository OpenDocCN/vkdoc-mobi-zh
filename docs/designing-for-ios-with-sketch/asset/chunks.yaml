  trans: '

    # 5. 应用设计准备


    到目前为止，我们已经介绍了 `Sketch` 的大部分基础知识。现在你应该熟悉这个程序及其运作方式——它的界面、如何创建基本形状、以及如何执行各种设计操作，这些在你开始设计应用时会派上用场。我们目前所做的基本上是对
    `Bohemian Coding` 提供的基础指南和文档内容进行扩展。然而，这本身并不能直接构成一个应用。在本章中，我们将为你实际设计应用做好准备。


    ## 人机界面指南


    你要做的第一件事是确保你已经熟悉了苹果公司的人机界面指南（HIGs）。虽然我在之前的章节中已经提到过它们，但如果你还没有研究过，现在正是个好时机。我在之前的著作《Learn
    Design for iOS Development》（Apress 2013）中非常详细地介绍了 HIGs。这是熟悉苹果公司为那些打算为 iOS 创建应用的设计师和开发者制定的设计标准的好方法。在这些指南中，苹果提出了它的期望和原则，这些原则使其能够在整个移动设备生态系统中创造一致的体验。无论你是为
    iPhone、iPad Air、iPad Pro 还是 iPad Mini 进行设计，都应将 HIGs 视为关于所有苹果移动设备设计元素和原则的最终指南和权威标准，并加以参考和考虑。


    **提示**


    你可以通过 `http://www.developer.apple.com/` 访问 iOS 人机界面指南。


    当你设计一个符合 HIG 原则的 iOS 体验时，你增加应用成功的几率，因为你使用的是用户已经熟悉的元素和行为。虽然之前已经在一定程度上介绍过 HIGs，但在我们开始着手设计应用之前，有一些原则值得重申。


    自从第一个 iPhone SDK 发布以来，该文档已经不断演变以适应各种软件版本，尤其是 iOS7 带来的颠覆性视觉变化。建议你在每次操作系统新版本发布时都检查一下这些指南。然而，这些指南的主要宗旨——**顺从**、**清晰**和**纵深**——依然不变。它们正是赋予苹果著名设计美学的原因。


    ## 顺从


    简而言之，顺从指的是创建一个不干扰屏幕上其他内容的用户界面。这是苹果在 iOS HIGs 中提出的第一个主题，并且可以说是最重要的主题之一。在扩展和解释这个主题时，苹果鼓励设计师首先考虑应用的功能，然后再思考某个特性是否与应用的整体功能绝对相关。如果不是，那么最好将其舍弃。


    其次，确保你的应用设计能够适应生态系统中的各种设备，这样无论用户碰巧使用哪种设备，都能体验到你的应用。这个体验应该针对每种设备进行定制。


    这可能看起来要求很高，但当你意识到苹果自带的应用程序中有很多可以遵循的例子时，就不会这么认为了。苹果的应用涵盖了从实用工具到效率工具等各个类别，因此你应该能找到符合需求、说明某个原则或展示你正在考虑使用的
    UI 元素的例子。如果你觉得任何 iOS 设备预装的苹果自带应用列表没有帮助，那么查看苹果 App Store 中推荐的应用程序也是个好主意，如图 5-1
    所示。这些应用提供了出色的设计范例，它们要么严格遵守苹果的设计原则，要么在现有范式的基础上进行了优美的创新。


    ![A978-1-4842-1458-9_5_Fig1_HTML.jpg](img/A978-1-4842-1458-9_5_Fig1_HTML.jpg)


    图 5-1。Apple App Store 经常会展示一些应用，它们是设计原则的最佳实例，或者是在这些原则基础上进行了出色创新


    在设计你的应用时，你还应让你的内容优先于屏幕上的任何其他元素。本质上，这意味着你的用户界面设计应该如此无缝，以至于用户几乎注意不到它。你的内容应该闪耀光芒，并将整个屏幕作为其画布，让最重要的信息脱颖而出，高于一切——包括
    UI。事实上，HIGs 明确指出，UI 应该只为屏幕上的其他内容扮演“辅助角色”。


    如果你打算使用非常流行的**高斯模糊**（在第 3 章中讨论过），应采取这样的方法：使用模糊和透明效果来进一步引导用户了解屏幕上正在发生的事情，并为元素在屏幕上的位置提供整体上下文。半透明效果让用户知道面板后面还有其他元素，而模糊效果则可用于为整体设计增添一些上下文。'
- fmt: '# Clarity


    Clarity is extremely important when designing for mobile devices. Because of the
    limited screen space, designers are pressed to put many different options onto
    a very small screen while still being clear and user friendly. It is quite the
    challenge. However, to assist those designing for iOS with this challenge, Apple
    has elevated the need for clarity above some other design principles.


    Clarity in design centers around the way that elements are laid out on the screen
    in relation to each other so that a user can interact with the app successfully.
    If you have done your job correctly, then upon first viewing a screen or page
    in your app, the user will have an instinctive feel as to how to relate to the
    elements they see before them. If a user has to try too hard or too long to understand
    what and how the elements relate to each other, then they will lose interest and
    you will likely lose them as a user.


    One of the ways that the HIGs state that designers can offer clarity in their
    designs is through the use of negative space. Negative space is an important design
    element. Quite simply, negative space translates in to “nothing” or even white
    space in a design. It is space that is not filled with a design element or even
    content. Great designers use negative space to their advantage. Sometimes, designers,
    especially those who aren’t as experienced, tend to think it is necessary to fill
    all of the space on a screen with something. This is far from the case. A key
    characteristic of negative space is that it helps to keep the user’s focus on
    the object as opposed to what is around it. The negative space helps to focus
    the user’s attention.


    Negative space is a tool that is used fairly frequently in logo designs. Graphic
    designers will use the negative space in words or in a logo to call attention
    to a shape of some sort. But negative space can be used in website design to balance
    content as well as in app designs. Using negative space in your app designs helps
    to highlight the content further and guides the user to where you want them to
    go in your app.


    The HIGs use the `iMessages` app as a great example of the use of negative space
    in iOS design. This is an excellent example because here the negative space enhances
    readability. Since the `iMessages` app consists mainly of words on a screen, it
    is important to make sure that the content is readable and clear to the users
    of the apps and persons in a conversation.


    Let’s take a closer look at the `iMessages` app. Figure [5-2](#A978-1-4842-1458-9_5_Chapter.html#Fig2)
    shows a conversation between two people. Those of us who are familiar with the
    iPhone and `iMessages` will recognize it as a conversation where both individuals
    are on iOS. In the conversation, the blue bubble represents your messages and
    the gray bubble represents the recipient’s. If the person on the other end is
    not on iOS, the conversations appear as green and white text bubbles. Note how
    the text bubbles appear on either side of the screen to create a balance and to
    show the “flow of the conversation.” By leaving space on either side of the screen,
    the user’s eyes will follow the conversation naturally. This is the effect of
    using negative space in your app designs. Imagine the effect if the text bubbles
    were in-line and on the same side of the screen as opposed to on opposite sides
    of the screen.


    ![A978-1-4842-1458-9_5_Fig2_HTML.jpg](A978-1-4842-1458-9_5_Fig2_HTML.jpg)


    Figure 5-2. Use of negative space in the `iMessages` app


    Apple is known for its use of negative space, and so it would be expected that
    designers working to design apps for iOS also incorporate this use of negative
    space into their designs. Before you begin to design your app, think about how
    you can use negative space to improve readability, guiding users on a journey
    within a page or as they move throughout your app.


    Negative space can even be used when working with spacing and margins, or even
    with photography. All of these elements on a screen and how they are placed in
    relation to each other will affect users and their ability to navigate within
    your app in addition to their overall experience.


    Another tool that helps users relate to the content on the screen in your app
    is color. In fact, color is a powerful tool that helps users orient themselves
    to content and elements on the screen. You can use color to “speak” to your users
    by your design of your app. An entire book can be (and I’m sure has been) written
    on color and color theory in design. As we’ve already covered color specifically
    as it relates to Sketch, we won’t dwell on it here. What we will briefly discuss
    is the use of color in your app designs, and as it pertains to designing for iOS.


    The HIGs encourage designers to use color to provide visual cues to users of their
    apps. iOS specifically has system colors that are used throughout the built-in
    apps. For example, the `Notes` app features a fairly clean UI and uses a yellow
    color to highlight certain elements on the screen to guide users, as shown in
    Figure [5-3](#A978-1-4842-1458-9_5_Chapter.html#Fig3).


    ![A978-1-4842-1458-9_5_Fig3_HTML.jpg](A978-1-4842-1458-9_5_Fig3_HTML.jpg)


    Figure 5-3. The `Notes` app and its use of a highlight color to help orient users
    to the UI


    The HIGs encourage designers first to create a color palette for their app that
    consists of colors that complement each other, but that also look great against
    both light and dark backgrounds. It is also important for designers to make sure
    that they check their colors at various times of the day to ensure that each color
    (especially ones with custom tints) are viewable even in the harshest, sunniest
    conditions, or on the cloudiest of days.


    # Depth


    The last theme that Apple set forth for designers working on iOS apps is depth.
    Depth is something that really came through with the redesign of the operating
    system with iOS7 and has been a part of the look and feel of iOS ever since. It
    added much-needed layers and richness to the experience of interacting with iPhone
    and iPad screens. Depth in design is an interesting concept because it asks designers
    to add another dimension to a traditionally two-dimensional experience.


    One of the ways to bring a sense of depth to your iPhone designs is to have overlapping
    objects. Whenever there are overlapping objects on a screen, you are creating
    a sense of depth for your users. How you do this is up to you. As with other design
    themes for iOS, you can take cues from the built-in apps. And even with the advent
    and popularity of “Flat Design,” depth is still a desired design element in apps.


    When done correctly, depth will add a very clear visual hierarchy to your designs,
    and it purposefully orients users to the content on the screen. For example, once
    an app on the iPhone or iPad’s home screen is placed in a folder, accessing that
    folder brings up a window that shares the same background as the screen so that
    the user is always aware that they are in the home screen environment. The title
    of the folder appears at the top of the page to provide additional context. This
    layout is shown in Figure [5-4](#A978-1-4842-1458-9_5_Chapter.html#Fig4).


    ![A978-1-4842-1458-9_5_Fig4_HTML.jpg](A978-1-4842-1458-9_5_Fig4_HTML.jpg)


    Figure 5-4. An app folder on the iPhone’s home screen in iOS8 shows how depth
    is a natural part of the iOS design ecosystem'
