  trans: '

    ### 新系统字体：旧金山（San Francisco）


    iOS 的系统字体已更新。有些人可能还记得，iOS 曾大量使用 Helvetica 作为其官方系统字体。如今，这一字体已被苹果自创的字体“旧金山（San Francisco）”所取代。眼尖的人会注意到两种字体间的细微差别，但大多数人都认为这种差别并不显著（见图
    1-8）。在设计界，关于旧金山字体是否更具“可读性”一直存在争议。苹果公司显然对此深信不疑。


    ![A978-1-4842-1458-9_1_Fig8_HTML.jpg](img/A978-1-4842-1458-9_1_Fig8_HTML.jpg)


    **图 1-8.** 旧金山字体与 Helvetica Neue 字体


    旧金山字体源于无衬线（San Serif）字体系列，包含两种不同的字体：SF 字体和 SF Compact 字体。SF 字体应用于 iOS 和 OS X 系统，而
    SF Compact 字体则应用于 Apple Watch。两者虽有关联，但在圆角状态以及字母间距上有细微差别，后者略大，以提高旧金山字体的可读性。该字体还支持多种语言，如希腊语、越南语和波兰语。这套字型由苹果团队设计。


    ## Apple Watch


    虽然 WWDC 通常是发布新操作系统的场合，但在 2014 年 9 月的一场特别活动中，苹果发布了一款新产品——Apple Watch。这自然在设计师圈中引起了轰动，也给
    iOS 开发者带来了新的设计挑战。可以确定的是，新手表会运行在某个 iOS 版本上，事实也是如此。


    迄今为止，自 2015 年 4 月正式发布以来，已有相当数量的 Apple Watch 应用进入了苹果 App Store。包括 Target、星巴克、eBay
    和耐克在内的一些主要零售商，以及一些非主流商家，都已在该商店发布了 Apple Watch 应用。


    Apple Watch 的推出，让几乎所有科技从业者都兴奋不已。苹果正朝着可穿戴设备领域迈出传闻已久的一步，凭借其对设计的执着，全世界不仅期待着手表的外观，更关注它的运作方式以及它将为设计师带来哪些挑战（如果有的话）。


    如图 1-9 所示，Apple Watch 有两种尺寸：38mm 和 42mm（按高度计算）。因此，38mm 版本的屏幕分辨率大约为 340px x 272px，而
    42mm 版本则为 390px x 312px。


    ![A978-1-4842-1458-9_1_Fig9_HTML.jpg](img/A978-1-4842-1458-9_1_Fig9_HTML.jpg)


    **图 1-9.** Apple Watch 有两种尺寸：38mm 和 42mm


    两种尺寸的 Apple Watch 都显示相同的内容，并利用动态排版（Dynamic Type）确保元素能够自适应调整以适配可用空间。


    与苹果其他产品一样，Apple Watch 拥有自己的人类界面指南。如果你对为 Apple Watch 进行设计感兴趣，应该仔细研读这些指南。Apple Watch
    在排版、颜色、自定义、图标和动画方面有着非常具体的设计原则。


    Apple Watch 运行着名为 watchOS 的自有软件。目前版本为 2，它是 iOS 的修改版，且仅能在 Apple Watch 上运行。


    本书不会深入探讨为 Apple Watch 进行设计的细节，但可以说，手表不仅为设计师开辟了新的领域，也带来了新的挑战。而且，和往常一样，网上已有 Sketch
    的 Apple Watch 模板可供下载和使用。


    iOS9 的其他变化还包括新增了“新闻（News）”等应用，并对“地图（Maps）”和“备忘录（Notes）”应用进行了功能改进。尽管 iOS9 在操作系统的整体设计语言上可能没有具体的改变，但注意这些应用（尤其是新应用）提供了新的信息呈现方式，这很重要。在其中，你能找到苹果设计语言未来走向的线索。对于刚接触
    iOS 设计的设计师，建议仔细研究这些新应用，以了解其产品的最佳设计实践。例如，如果你刚开始学习，并好奇如何最佳实现分段控件（Segmented Control），除了人类界面指南，苹果自带的应用程序是学习如何成为一名优秀
    iOS 设计师的最佳途径（见图 1-10）。


    ![A978-1-4842-1458-9_1_Fig10_HTML.jpg](img/A978-1-4842-1458-9_1_Fig10_HTML.jpg)


    **图 1-10.** iOS9 中新旧自带的应用程序


    目前，苹果自带的应用程序数量已达 29 个。除此之外，还有 11 个用户可以从苹果下载的附加应用。


    ## 总结


    虽然 Sketch 最初是为 Mac 和 OS X 创建的，但对于有兴趣创建应用的设计师来说，Sketch 和 iOS 是一个绝佳的组合。借助 Sketch，为
    iOS、watchOS 甚至 MacOS 进行设计的设计师如今拥有了一款专门为他们开发的工具。Sketch 的开发者曾反复表示，他们没有计划推出该软件的 Windows
    版本。这意味着该程序将继续针对 Mac 用户进行演变。对于任何愿意花时间学习该程序，并深入为 iPhone 和 iPad 进行应用设计的人来说，使用 Sketch
    为 iOS 进行设计是合理的。学习 Sketch 是很好的第一步。


    在下一章中，我们将引导你安装 Sketch，并介绍其界面以及其他你在开始使用 Sketch 为 iOS 进行设计时需要了解的功能。


    # Sketch 入门


    Sketch 的最新版本是 Sketch 3（确切地说是 3.3.3 版本），本书假设你正在运行此版本。如果你使用的是旧版本，则需要更新。如前所述，Sketch
    是一款仅适用于 Mac 的应用程序，需要 OS X（Mavericks）或更高版本才能运行。如果你运行的是较旧版本的 Mac OS X，也需要进行更新。


    ## 安装


    要安装 Sketch，你可以直接从 Mac App Store 下载，或者直接从 Bohemian Coding 网站购买该应用，如图 2-1 所示。你也可以免费下载试用版。如果你使用的是试用版，试用期结束后，请前往程序中的
    Sketch 菜单并选择“注册”。程序会要求你输入许可证密钥，从而引导你完成注册流程。无论你是从 Mac OS App Store 还是直接从 Bohemian
    Coding 购买 Sketch，其价格均为 99.99 美元。


    ![A978-1-4842-1458-9_2_Fig1_HTML.jpg](img/A978-1-4842-1458-9_2_Fig1_HTML.jpg)


    **图 2-1.** 你可以直接从 Bohemian Coding 网站购买 Sketch 3


    要安装从 Bohemian Coding 购买的应用，请下载它，并将该程序从“下载”文件夹移动到“应用程序”文件夹。你也可以直接双击下载的 `.DMG` 文件并按照说明操作。无论哪种方式，该文件都必须添加到你的“应用程序”文件夹中。


    一旦文件位于该文件夹中，你就可以双击启动程序。这样就大功告成了！你现在已经安装了令人兴奋的新设计程序 Sketch，并准备好学习更多关于为 iOS 进行设计的知识了！

