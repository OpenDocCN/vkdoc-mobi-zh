    styling your layer once you select a fill and reveal the color picker pop-up.
    Beyond Solid Fill, there is Linear Gradient, Radial Gradient, Circular Gradient,
    Pattern Fill, and Noise Fill, as shown from left to right in Figure [3-15](#A978-1-4842-1458-9_3_Chapter.html#Fig15).
    An explanation of each type of gradient follows.


    ![A978-1-4842-1458-9_3_Fig15_HTML.jpg](A978-1-4842-1458-9_3_Fig15_HTML.jpg)


    Figure 3-15.


    `A Pattern Fill style on an oval` Tip


    To discover the name of each type of fill, roll over the appropriate box. After
    a moment, a pop-over with the name of the fill will appear.


    #### Pattern Fill


    This feature allows you to use an image or selection with a pattern as a fill.
    It’s a nice way to give your design some texture. Sketch also comes with some
    preset textures that you can use in your design. An illustration of a Pattern
    Fill style is shown in Figure [3-15](#A978-1-4842-1458-9_3_Chapter.html#Fig15).'
  trans: '

    ### Alpha 蒙版


    Alpha 蒙版允许您将渐变效果用作蒙版。其工作方式与轮廓蒙版相同。要查看此效果，您需要从图层下拉菜单中选择`Alpha 蒙版`，然后需要在右侧的检查器中编辑颜色渐变和设置，因为渐变决定了填充内容，这与轮廓蒙版中的形状决定填充不同。接着，您可以根据想要创建的效果调整透明度并选择合适的渐变设置。


    ## 扁平化


    扁平化是移除构成形状的路径和子路径层级的过程。如果您熟悉其他图形程序，可能已经养成了扁平化图层以减小文件大小并可能提升性能的习惯，因为较大的文件体积往往会拖慢电脑速度。在这方面，Sketch
    也不例外。多个页面、画板和效果会显著拖慢运行速度。然而，如果您有一些包含多个子路径和交叉点的形状，将它们扁平化以保持图层的整洁与一致是个好主意，而且这样做也是良好的设计习惯。扁平化会移除多余的矢量点和贝塞尔曲线，同时也会使导出的文件更小。


    ## 缩放


    在 Sketch 中，缩放有两种截然不同的方式。我们来讨论一下两者，因为它们会对您的形状产生截然不同的结果。如果画布上有一个特定形状，最直接的放大方法就是选择该形状并拖动手柄至所需大小。您会注意到，在调整形状边角时，检查器中的尺寸也会自动调整。但是，如果形状附带有轮廓或效果，那么拖拽缩放只会增加整体图像尺寸。实际的边框以及任何附加的相关效果并不会按图像比例增大。如果这正是您想要的效果，那没问题。但如果不是，您可能会想知道如何改变这一点。


    如果您希望缩放形状及其关联效果（包括边框、阴影等），则需使用`缩放`功能。


    您可以通过点击工具栏中的`缩放`按钮来访问该功能。选中后，会弹出一个窗口，允许您更改形状的尺寸。该窗口包含可编辑的字段（`高`、`宽`和`缩放比例`），您可以通过更改这些数值来相应地缩放图层。


    图 3-14 展示了我创建的三个绿色矩形。从左到右，第一个矩形是原始形状。中间第二个矩形是通过拖拽手柄创建的，大小约为原始矩形的两倍。最右边的第三个矩形是使用`缩放`功能并将缩放比例从
    100% 增加到 200% 创建的。注意第二个和第三个矩形之间的区别：第三个矩形的边框随形状大小按比例增粗，而中间矩形的边框大小与原始矩形相同，尽管矩形本身变大了。


    ![A978-1-4842-1458-9_3_Fig14_HTML.jpg](img/A978-1-4842-1458-9_3_Fig14_HTML.jpg)


    图 3-14.


    `Sketch`的缩放功能演示


    ## 样式


    现在您已经了解了界面和样式设置，我们将深入探讨检查器的细节与功能，以及如何为设计中的形状和图层应用各种样式。您的设计很可能包含图像和图形。自然地，它们也会包含多种填充和边框，所以我们先从这些开始。


    ### 填充


    虽然我们在之前讨论检查器时简单提过填充功能，但现在我们将更详细地探索它。如前所述，大多数样式设置都在位于 Sketch 画布右侧的检查器中完成。填充有一些与之关联的额外属性。具体来说，当您在画布上创建了一个形状后，只需确保填充属性旁边的复选框已勾选，并点击旁边的默认灰色色板，即可轻松更改填充属性。这将打开颜色选择器，让您能从色谱中选取几乎任何颜色作为画布上选中形状的填充色。如果未激活其他任何选择，形状会立即自动更新为纯色。


    当然，还有其他类型的填充，当您选择一个填充并打开颜色选择器弹窗时，它们都会作为图层样式的选项出现。除了`纯色填充`之外，还有`线性渐变`、`径向渐变`、`环形渐变`、`图案填充`和`噪声填充`，如图
    3-15 从左到右所示。接下来是对每种渐变类型的解释。


    ![A978-1-4842-1458-9_3_Fig15_HTML.jpg](img/A978-1-4842-1458-9_3_Fig15_HTML.jpg)


    图 3-15.


    `椭圆上的图案填充样式` 提示


    要了解每种填充类型的名称，请将鼠标悬停在对应的方框上。稍等片刻，就会弹出显示填充名称的提示框。


    #### 图案填充


    此功能允许您将图像或带有图案的选区用作填充。这是一种为设计增添纹理的好方法。Sketch 还附带了一些预设纹理，您可以直接用在设计中。图 3-15 展示了一个`图案填充`样式的示例。

