- fmt: '# Home Page


    Our home page, as we know, is the most important page in our app. As we’ve established
    in our wireframes, our home page is the page that users arrive at when they register
    and return to after completing any tasks on other pages in the app. Therefore,
    to complete the journey that we started when the user initially became familiar
    with the app, this page must, in some way, be familiar to the user. But how can
    a page that a user has never seen before be familiar? Here, it helps to step back
    and review all of our designed pages from a bird’s-eye view to fully familiarize
    ourselves with the flow so far.


    I do this often to make sure that I can continue the overall flow of the app and
    begin to think conceptually about how I want the app to continue from a creative
    standpoint.


    The home page as wireframed was lacking some critical elements and now that we’re
    designing it, we will need to add and refine them. Starting with the tab bar,
    where I used the icons used in the wireframe templating kit, I’ve decided to select
    more appropriate icons that align more closely with the actions that they represent
    and added a highlight bar that is intended to highlight the user’s current page
    with a small thin bar under the tab icon’s title that moves along the bottom of
    the screen. I selected the icons that I thought would be familiar to users to
    represent the associated actions. These are personal design choices that I made
    here—you may agree or disagree with them—so feel free to explore how or why you
    would take a different approach to your design.


    While I’m still using the map background as the main home screen and overall game
    play, I had to make some specific changes to the way that the player’s friends
    appeared on the screen. While the wires used blue map icons to show the position
    of friends and a red icon to denote the location of the player on the home screen,
    I began to feel as though both elements took up too much space on the game’s screen.
    So, I decided to combine them. It would present a cleaner interface and the screen
    would remain clutter free.


    To do this, I created a new Sketch file and imported both visuals onto the screen.
    After bringing them closer and pushing the map icon behind the profile image.
    This helped me to visualize how I wanted the new icon to look. I then created
    a new shape that replicated the map pin and shadow. I grouped all of the shapes
    together and created a symbol so I could change colors if I need to at a later
    date across all icons on the screen. The final results are shown in Figure [8-7](#A978-1-4842-1458-9_8_Chapter.html#Fig7).
    While some of the individual images could use some slight adjustments, you can
    see the general idea.


    ![A978-1-4842-1458-9_8_Fig7_HTML.jpg](A978-1-4842-1458-9_8_Fig7_HTML.jpg)


    Figure 8-7. Recreating the new markers for the player and friends for the PhotoBomb
    home page


    With the icons completed, I was able to import them back into the newly designed
    home page shown in Figure [8-8](#A978-1-4842-1458-9_8_Chapter.html#Fig8).


    ![A978-1-4842-1458-9_8_Fig8_HTML.jpg](A978-1-4842-1458-9_8_Fig8_HTML.jpg)


    Figure 8-8. Final design of the PhotoBomb home page


    The new page includes our main color of blue, our highlight color, the final icons,
    and the layout of what the user will see when they arrive at the home page of
    the app. The tab bar was brought over from the wireframes and re-edited for the
    design phase. I changed the color and also adjusted the size of the tab bar to
    accommodate the new icons, title, and the highlight bar.


    With this page complete, we can move on to our other pages from the wireframes
    that round out the rest of the PhotoBomb app.


    As an aside and in keeping with utilizing the skills we have learned so far in
    the book about how to create and organize a sketch file, I am remembering to appropriately
    name my layers, groups, and symbols as I move through the design. It makes it
    easier to find things when they need to be adjusted and will also help greatly
    when we are ready to export our designs and hand them over to a developer. I now
    have multiple pages in my Sketch document and every layer is named and titled
    for easy reference. Every phase of the app has been placed on a separate page
    to keep things clean. This also makes it easier if for some reason, a new page
    has to be added. You can see the Layers list so far in Figure [8-9](#A978-1-4842-1458-9_8_Chapter.html#Fig9).
    If you’re moving too fast in your designs, take some time to go back and group
    and title layer appropriately. It will take a few minutes to clean things up but
    it will save lots of time if you need to hand off your files to someone else.


    ![A978-1-4842-1458-9_8_Fig9a_HTML.jpg](A978-1-4842-1458-9_8_Fig9a_HTML.jpg)![A978-1-4842-1458-9_8_Fig9b_HTML.jpg](A978-1-4842-1458-9_8_Fig9b_HTML.jpg)![A978-1-4842-1458-9_8_Fig9c_HTML.jpg](A978-1-4842-1458-9_8_Fig9c_HTML.jpg)


    Figure 8-9. Layers list of the PhotoBomb app with titles and pages


    # Settings


    Up next to be designed is our Settings page. This page is where users will come
    to manage elements of their app such as privacy, the aforementioned radius of
    game play in their games, and privacy information like who can see them in the
    app. The design for this page will be relatively simple. We will use a standard
    table view as shown in the wireframes from the first level of the settings page.


    Pages with a table view are standard in iOS and should probably be one of the
    first pages that any designer for iOS learns to design. The table view is a common
    design pattern in iOS because it is a great way to display information in a hierarchy,
    and as such this is usually included in some of the more popular iOS design templates,
    including the one that is pre-packaged with Sketch. To grab the table view symbol
    that you can use, go to the File menu and select New from template. The iOS Design
    option should be listed, and you can select it from there. Once the template opens,
    you can copy the table view symbol over to your current project and customize
    it to suit your design.


    Our Settings page will be created by creating a new screen in portrait with status
    bar and background and we’ll import table view symbols from the iOS template.
    Once this is done, we must customize them to match our app’s color scheme. Using
    the eyedropper, we can update the table view symbols and change the labels on
    each one, and then our page has been created as shown in Figure [8-10](#A978-1-4842-1458-9_8_Chapter.html#Fig10).


    ![A978-1-4842-1458-9_8_Fig10_HTML.jpg](A978-1-4842-1458-9_8_Fig10_HTML.jpg)


    Figure 8-10. Settings page with table views designed'
