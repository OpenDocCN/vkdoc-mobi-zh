    included to help augment what Sketch can do. Many of them are available on a trial
    basis, so you can try them out for free until you find one that you wish to purchase.


    In the next chapter, we’ll discuss how to begin wireframing your app with Sketch
    and the tools listed previously. Then you should be ready to dive right in.


    # 7. Wireframing Your App with Sketch


    As you may already know, wireframing is a great way to map out what your app will
    do and how it will do it before we move into the design stage. Wireframes are
    the blueprint of your app. They are often devoid of color or styling and you can
    focus on the basics of what your app will do before you add beautiful colors and
    effects we discussed earlier. When you wireframe your app, your goal is to focus
    on the functionality and details of how the user will interact with all the screens
    in your app.


    If your app is fairly simple, you might be able to get away with not wireframing
    your app at all. But, I recommend always going through the wireframing process.
    It helps to clarify functionality in the early stages and gives you a clear understanding
    of how your app will behave once it’s built. There are numerous tools available
    for wireframing: Balsamiq, MockFlow, UXPin, Omnigraffle, and Axure, to name a
    few. They range in cost from totally free to a few hundred dollars for a single
    license. If you’ve been using a particular tool to wireframe out your apps and
    it works well for your workflow, then I encourage you to stick with it. But if
    you’re looking for a new tool that will help to speed up the overall process,
    then I encourage you to look no further than Sketch 3\. Since we’ll be designing
    our app in Sketch anyway, why not use it to wireframe your app as well? Many of
    the processes we’ve learned thus far in the previous chapters are well suited
    for not only designing but also for your wireframes.


    There are some who believe that the process of wireframing should be very simple
    and quick. I am not one of those people. I believe that wireframing above all,
    should be thorough. If that takes one hour or five days, then so be it. In the
    end, you will have immersed yourself in the process of creating your app and will
    also be the person most qualified and able to design it. Wireframing is where
    you really get to understand the app you are about to design, so I think that
    this process can be short or long but more importantly it should be complete and
    should never be rushed as this will inevitably lead to issues later on in the
    design and build phases of your project. You will be exploring where elements
    in your app fit on the screen to be accessed by a user, so spending this time
    to get to understand that UI is critical. Therefore, if you take some much-needed
    extra time to complete your wireframes, that’s perfectly fine.


    In this chapter we will briefly discuss various techniques and processes for using
    Sketch to create your wireframes. We already discussed that Sketch has a thriving
    community and there are now quite a few websites that have been set up for the
    sole purpose of providing Sketch resources. We will list them later on in this
    book but for the purpose of wireframing you can do a simple search on Google for
    Sketch wireframing tools to see what’s out there. You’ll find that there are wireframing
    templates galore and you should be able to find one that suits your needs.


    If you, like me, lean towards low-fidelity wires with very little or no branding,
    you might want to try to download one of the many templates that offer a sparse
    look and feel and that allow you to focus on the user experience as much as possible.
    It’s also a good idea to try to find a template that will take advantages of some
    of Sketch’s awesome features that will greatly improve your workflow. For example,
    Sketch guru Meng To has a few wireframing templates on his site that are fairly
    monochrome and use subtle shades of blue and gray. They are pretty good looking,
    are free to download, and are Sketch files that you can import right into your
    canvas and begin to work.


    Tip


    Meng To’s site has great Sketch tips: [`http://blog.mengto.com/`](http://blog.mengto.com/)
    .'
  trans: '

    ### Dropbox


    在工作流程部分，最后但同样重要的的是 `Dropbox`，这款流行的云存储工具。虽然 `Dropbox` 并非纯设计工具，但它对设计师来说是宝贵的工具，不仅能存储，还能与全世界分享他们的设计。你可能也注意到了，我在本节中已经提到的一些原型设计工具要么是基于
    `Dropbox` `API` 构建的，要么是使用它进行身份验证。这意味着，如果你已经使用 `Dropbox` 存储设计稿，你可以轻松地将它们导入到 `Flinto`
    或 `Marvel` 中，从而加快工作流程，让你更专注于工作质量，而非文件大小和类型。使用 `Flinto`，你可以将所有图像存储在 `Dropbox` 中，如果对它们进行了更改或更新，`Flinto`
    会保持同步。这两个程序都需要访问你的 `Dropbox` 帐户才能维持此功能。`Flinto` 会要求连接你的 `Dropbox` 帐户，如图 6-18 所示。


    ![A978-1-4842-1458-9_6_Fig18_HTML.jpg](img/A978-1-4842-1458-9_6_Fig18_HTML.jpg)


    图 6-18。`Dropbox` `一次性设置`窗口


    这些只是你在 `Sketch` 中设计应用时可以整合到工作流程中的一部分工具。有些你会更喜欢，有些不那么喜欢。真正重要的是尝试一些工具。这些应用大多提供免费试用期，你可以在此期间进行实验，看看哪些最适合你和你的设计需求。尝试完成特定任务，看看在哪里可以节省时间会很有帮助。如果某个工具能为你节省处理某一过程或任务的宝贵时间，那就保留它。此外，探索如何进一步定制这些程序以满足你的需求。对于其中一些程序，定制是关键，就像
    `Sketch` 一样。


    ### InVision


    `InVision` 是一款基于网页的原型设计工具，在设计界已经变得相当流行。当有大量人员需要快速对设计进行评估时（包括客户、其他设计师、项目经理，或整个团队），它非常适合与大型团队协作。`InVision`
    允许你在界面内收集反馈，并能精确跟踪设计稿的多个版本，这在大型团队协作时可能是一个问题。如图 6-19 所示，其界面相当简洁，你可以免费注册并使用一个设计进行尝试。根据你的需求，还可按月度付费获得更多设计容量。


    ![A978-1-4842-1458-9_6_Fig19_HTML.jpg](img/A978-1-4842-1458-9_6_Fig19_HTML.jpg)


    图 6-19。`InVision` 界面


    ## 本章小结


    本章列出的所有内容都是可选的。然而，你设计得越多，就越会明白速度和效率是成为优秀设计师的关键——尤其是在与客户和团队打交道时。诸如设置偏好、精确调配配色方案以及设置好文档等技巧，将极大地帮助你成为一名高效的设计师。


    但 `Sketch` 只是一个程序。本章提到的其他程序旨在增强 `Sketch` 的功能。它们中的许多都提供试用，因此你可以免费试用，直到找到你想要购买的那一个。


    在下一章中，我们将讨论如何使用 `Sketch` 和前面列出的工具开始为你的应用绘制线框图。然后，你就应该准备好深入实践了。


    # 7. 使用 Sketch 为应用绘制线框图


    你可能已经知道，在进入设计阶段之前，线框图是描绘你的应用将做什么以及如何做的好方法。线框图是应用的蓝图。它们通常没有颜色或样式，你可以先专注于应用的基本功能，然后再添加我们之前讨论过的漂亮颜色和效果。在为应用绘制线框图时，你的目标是关注应用所有屏幕中用户交互的功能和细节。


    如果你的应用相当简单，你或许可以完全不绘制线框图。但我建议始终经历线框图绘制过程。它有助于在早期阶段明确功能，并让你清楚地了解应用在构建后的行为方式。有许多可用于线框图绘制的工具：`Balsamiq`、`MockFlow`、`UXPin`、`Omnigraffle`
    和 `Axure` 等。它们的价格从完全免费到单个许可证几百美元不等。如果你一直使用某个特定工具来绘制应用的线框图，并且它对你的工作流程很有效，我建议你继续使用它。但如果你正在寻找一个能帮助加快整体流程的新工具，那么我建议你直接看看
    `Sketch 3`。既然我们无论如何都要在 `Sketch` 中设计应用，为什么不同时用它来绘制线框图呢？我们在之前章节中学到的许多流程不仅适用于设计，也同样适用于你的线框图。


    有些人认为线框图绘制过程应该非常简单快捷。我不是这种人。我认为线框图绘制，最重要的是要详尽。如果这需要一小时或五天，那就这样吧。最终，你将沉浸在创建应用的过程中，并成为最有资格和能力设计它的人。线框图绘制是你真正开始理解即将设计的应用的阶段，所以我认为这个过程可长可短，但更重要的是它应该完整，并且绝不应该仓促行事，因为仓促将不可避免地导致项目后期在设计及构建阶段出现问题。你将探索应用中的元素如何放置在屏幕上以供用户访问，因此花时间理解这个
    `UI` 至关重要。因此，如果你需要一些额外的时间来完成线框图，那完全没问题。


    在本章中，我们将简要讨论使用 `Sketch` 创建线框图的各种技巧和流程。我们已经讨论过 `Sketch` 拥有一个蓬勃发展的社区，现在有不少网站专门提供
    `Sketch` 资源。我们会在本书后面列出它们，但为了线框图绘制，你可以在谷歌上简单搜索 `Sketch 线框图工具`，看看有什么可用的。你会发现有大量的线框图模板，你应该能找到适合你需求的那一个。


    如果你和我一样，倾向于使用几乎或完全没有品牌元素的低保真线框图，你可能会想尝试下载那些提供简洁外观和感觉、能让你尽可能专注于用户体验的众多模板之一。尝试找到一个能利用
    `Sketch` 某些出色功能（这些功能将极大改进你的工作流程）的模板也是一个好主意。例如，`Sketch` 大师 `Meng To` 在他的网站上有几个线框图模板，这些模板相对单色，使用了微妙的蓝色和灰色调。它们看起来相当不错，可以免费下载，并且是
    `Sketch` 文件，你可以直接导入到你的画布中开始工作。


    提示


    `Meng To` 的网站上有很棒的 `Sketch` 技巧：[`http://blog.mengto.com/`](http://blog.mengto.com/)。

