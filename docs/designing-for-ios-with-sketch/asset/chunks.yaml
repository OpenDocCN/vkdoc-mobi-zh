- fmt: "### Creating a Custom Grid\n\nWe’ve already covered the awesomeness that is\
    \ Sketch’s layout and grid settings. So, before you set about making the greatest\
    \ app design ever, set up your layout settings by adjusting columns, width, and\
    \ gutter settings. You can then you can set this up as your default by clicking\
    \ the button shown in the lower left corner of Figure [6-7](#A978-1-4842-1458-9_6_Chapter.html#Fig7)\
    \ so that you don’t have to redo the process every time you start a new design.\n\
    \n![A978-1-4842-1458-9_6_Fig7_HTML.jpg](A978-1-4842-1458-9_6_Fig7_HTML.jpg)\n\n\
    Figure 6-7. The Layout Settings panel in Sketch. Use this to set up your canvas\
    \ and save as default for quicker startups\n\n### Presentation Mode\n\nSometimes,\
    \ it’s important to view your work without any distractions. If you will need\
    \ to show your work on your screen whether for your superiors, coworkers, or sometimes,\
    \ even clients, then Presentation Mode is the way to go. By hitting the ![A978-1-4842-1458-9_6_Figa_HTML.jpg](A978-1-4842-1458-9_6_Figa_HTML.jpg)\
    \ + `.`, it will show your screen in presentation mode. This means that the menu\
    \ bar, doc, and all extraneous items on the screen will disappear, leaving just\
    \ your designs. You will be free to move around within the specific page. You\
    \ can move through your artboards by scrolling up and down and left and right.\n\
    \n**Tip**  \nHitting ![A978-1-4842-1458-9_6_Figa_HTML.jpg](A978-1-4842-1458-9_6_Figa_HTML.jpg)\
    \ + `.` will also get you out of Presentation mode.\n\n### Setting a Default Style\n\
    \nWhenever a shape is created in Sketch, it will always appear with Sketch’s default\
    \ style. Usually, shapes in Sketch appear with a light gray fill and a darker\
    \ gray border. But, as with most things in Sketch, this can be easily changed.\
    \ If you find that you are typically working in a particular color or with a color\
    \ palette, you can always change this default color by creating a new style and\
    \ setting it as the default. Say, for example that you want to have all new shapes\
    \ appear in a specific shade of red fill with no border. First, you would create\
    \ a red shape and change the fill color from the default gray to your specific\
    \ shade of red. Then, you would remove the border setting, and last, you would\
    \ navigate to `Edit ➤ Set Style as default` as shown in Figure [6-8](#A978-1-4842-1458-9_6_Chapter.html#Fig8).\
    \ This will ensure that all newly created shapes will have the new default style\
    \ as you’ve designated. This applies to any shape: circles, stars, triangles,\
    \ etc.\n\n![A978-1-4842-1458-9_6_Fig8_HTML.jpg](A978-1-4842-1458-9_6_Fig8_HTML.jpg)\n\
    \nFigure 6-8. How to set a default style that will apply to all new shapes\n\n\
    **Tip**  \nOne thing to note, however, is that styles like border radius, shadows,\
    \ and reflections cannot be set as a default style.\n\n### Defining Your Color\
    \ Palette\n\nBefore you actually begin to design your app you’ll want to have\
    \ chosen a specific color palette that you will use. This will include your main\
    \ color, accent and highlight colors, and everything in between. There are some\
    \ great tools available for selecting color palettes. Once you have selected a\
    \ color palette, Sketch makes it easy to set this in the Inspector so that your\
    \ colors remain easily accessible throughout the course of the project. You can\
    \ get a screenshot of the palette from an online tool like Adobe’s Kuler and import\
    \ that into your Sketch canvas as shown in Figure [6-9](#A978-1-4842-1458-9_6_Chapter.html#Fig9).\n\
    \n![A978-1-4842-1458-9_6_Fig9_HTML.jpg](A978-1-4842-1458-9_6_Fig9_HTML.jpg)\n\n\
    Figure 6-9. Series of colorful swatches imported into Sketch for the purpose of\
    \ creating a color palette\n\nOnce the image has been imported, move your cursor\
    \ to the dropper icon in the Inspector panel. Click the icon to reveal a magnifier\
    \ that you can then move to the canvas and hover on the desired color in the image\
    \ of the color palette as shown in Figure [6-10](#A978-1-4842-1458-9_6_Chapter.html#Fig10).\n\
    \n![A978-1-4842-1458-9_6_Fig10_HTML.jpg](A978-1-4842-1458-9_6_Fig10_HTML.jpg)\n\
    \nFigure 6-10. Dropper tool in Sketch that extracts the color for the swatch\n\
    \nOnce you click that color, move the cursor back to the Inspector and hit the\
    \ `“+”` button. Once you have done this, Sketch will add the selected color to\
    \ your list of swatches in the area that reads `“Document Colors”` in the lower\
    \ right in Figure [6-11](#A978-1-4842-1458-9_6_Chapter.html#Fig11).\n\n![A978-1-4842-1458-9_6_Fig11_HTML.jpg](A978-1-4842-1458-9_6_Fig11_HTML.jpg)\n\
    \nFigure 6-11. New set of document colors created by using the dropper tool to\
    \ copy the colors from the color palette image on the canvas\n\nHaving all colors\
    \ of the palette easily accessible will save you time as you move through your\
    \ design. And colors can be just as easily removed from the Inspector as they\
    \ are added. To remove a color from the Inspector, simply click and drag it onto\
    \ the canvas. Upon release, it will disappear in an animated cloud of smoke and\
    \ be removed from the dock.\n\n**Tip**  \nSketch can pull colors not only from\
    \ your canvas but from anywhere in your screen including the desktop of your Mac\
    \ or even a browser window.\n\n## The Rotation Tool\n\nSketch offers a little-known\
    \ tool that can help you to save time in your designs. It’s called the Rotation\
    \ Tool, and while you may not use it often, as designers sometimes there is a\
    \ need to create an effect that, if done by hand, can be incredibly time-consuming.\
    \ You would need to evenly space every time on the path and ensure that they are\
    \ all the same size as well as equidistant from each other. This is where the\
    \ Rotation Tool comes in. Admittedly, I’ve not yet had to use this tool but I\
    \ know it will come in handy at some point. To use this tool, you would create\
    \ a shape on your canvas. This can be any shape in any color. For our example,\
    \ we’ll use a red circle. With the red circle created, navigate to the Layer menu\
    \ and select `Paths ➤ Rotate Copies` as shown in Figure [6-12](#A978-1-4842-1458-9_6_Chapter.html#Fig12).\n\
    \n![A978-1-4842-1458-9_6_Fig12_HTML.jpg](A978-1-4842-1458-9_6_Fig12_HTML.jpg)\n\
    \nFigure 6-12. Access the Rotation Tool from the Layer menu\n\nOnce you’ve selected\
    \ `Rotate Copies`, sketch will ask you how many copies you’d like to create. The\
    \ default will be six and Sketch will tell you the total number of layers that\
    \ will be generated once the task has been completed. The result of the number\
    \ of copies you select and the layers are shown in Figure [6-13](#A978-1-4842-1458-9_6_Chapter.html#Fig13).\
    \ Sketch has created multiple shapes along a round path, each in its own layer.\
    \ The distance between each layer or shape can be altered by moving the handle\
    \ attached to the original layer. Each shape can be moved closer together or further\
    \ apart.\n\n![A978-1-4842-1458-9_6_Fig13_HTML.jpg](A978-1-4842-1458-9_6_Fig13_HTML.jpg)\n\
    \nFigure 6-13. The Rotation Tool will create multiples of the same graphic along\
    \ a circular path quickly and seamlessly"
  raw: '### Creating a Custom Grid


    We’ve already covered the awesomeness that is Sketch’s layout and grid settings.
    So, before you set about making the greatest app design ever, set up your layout
    settings by adjusting columns, width, and gutter settings. You can then you can
    set this up as your default by clicking the button shown in the lower left corner
    of Figure [6-7](#A978-1-4842-1458-9_6_Chapter.html#Fig7) so that you don’t have
    to redo the process every time you start a new design.


    ![A978-1-4842-1458-9_6_Fig7_HTML.jpg](A978-1-4842-1458-9_6_Fig7_HTML.jpg)


    Figure 6-7.


    The Layout Settings panel in Sketch. Use this to set up your canvas and save as
    default for quicker startups


    ### Presentation Mode


    Sometimes, it’s important to view your work without any distractions. If you will
    need to show your work on your screen whether for your superiors, coworkers, or
    sometimes, even clients, then Presentation Mode is the way to go. By hitting the
    ![A978-1-4842-1458-9_6_Figa_HTML.jpg](A978-1-4842-1458-9_6_Figa_HTML.jpg)+. it
    will show your screen in presentation mode. This means that the menu bar, doc,
    and all extraneous items on the screen will disappear, leaving just your designs.
    You will be free to move around within the specific page. You can move through
    your artboards by scrolling up and down and left and right.


    Tip


    Hitting ![A978-1-4842-1458-9_6_Figa_HTML.jpg](A978-1-4842-1458-9_6_Figa_HTML.jpg)
    . will also get you out of Presentation mode.


    ### Setting a Default Style


    Whenever a shape is created in Sketch, it will always appear with Sketch’s default
    style. Usually, shapes in Sketch appear with a light gray fill and a darker gray
    border. But, as with most things in Sketch, this can be easily changed. If you
    find that you are typically working in a particular color or with a color palette,
    you can always change this default color by creating a new style and setting it
    as the default. Say, for example that you want to have all new shapes appear in
    a specific shade of red fill with no border. First, you would create a red shape
    and change the fill color from the default gray to your specific shade of red.
    Then, you would remove the border setting, and last, you would navigate to Edit
    ➤ Set Style as default as shown in Figure [6-8](#A978-1-4842-1458-9_6_Chapter.html#Fig8).
    This will ensure that all newly created shapes will have the new default style
    as you’ve designated. This applies to any shape: circles, stars, triangles, etc.


    ![A978-1-4842-1458-9_6_Fig8_HTML.jpg](A978-1-4842-1458-9_6_Fig8_HTML.jpg)


    Figure 6-8.


    How to set a default style that will apply to all new shapes Tip


    One thing to note, however, is that styles like border radius, shadows, and reflections
    cannot be set as a default style.


    ### Defining Your Color Palette


    Before you actually begin to design your app you’ll want to have chosen a specific
    color palette that you will use. This will include your main color, accent and
    highlight colors, and everything in between. There are some great tools available
    for selecting color palettes. Once you have selected a color palette, Sketch makes
    it easy to set this in the Inspector so that your colors remain easily accessible
    throughout the course of the project. You can get a screenshot of the palette
    from an online tool like Adobe’s Kuler and import that into your Sketch canvas
    as shown in Figure [6-9](#A978-1-4842-1458-9_6_Chapter.html#Fig9).


    ![A978-1-4842-1458-9_6_Fig9_HTML.jpg](A978-1-4842-1458-9_6_Fig9_HTML.jpg)


    Figure 6-9.


    Series of colorful swatches imported into Sketch for the purpose of creating a
    color palette


    Once the image has been imported, move your cursor to the dropper icon in the
    Inspector panel. Click the icon to reveal a magnifier that you can then move to
    the canvas and hover on the desired color in the image of the color palette as
    shown in Figure [6-10](#A978-1-4842-1458-9_6_Chapter.html#Fig10).


    ![A978-1-4842-1458-9_6_Fig10_HTML.jpg](A978-1-4842-1458-9_6_Fig10_HTML.jpg)


    Figure 6-10.


    Dropper tool in Sketch that extracts the color for the swatch


    Once you click that color, move the cursor back to the Inspector and hit the “+”
    button. Once you have done this, Sketch will add the selected color to your list
    of swatches in the area that reads “Document Colors” in the lower right in Figure
    [6-11](#A978-1-4842-1458-9_6_Chapter.html#Fig11).


    ![A978-1-4842-1458-9_6_Fig11_HTML.jpg](A978-1-4842-1458-9_6_Fig11_HTML.jpg)


    Figure 6-11.


    New set of document colors created by using the dropper tool to copy the colors
    from the color palette image on the canvas


    Having all colors of the palette easily accessible will save you time as you move
    through your design. And colors can be just as easily removed from the Inspector
    as they are added. To remove a color from the Inspector, simply click and drag
    it onto the canvas. Upon release, it will disappear in an animated cloud of smoke
    and be removed from the dock.


    Tip


    Sketch can pull colors not only from your canvas but from anywhere in your screen
    including the desktop of your Mac or even a browser window.


    ## The Rotation Tool


    Sketch offers a little-known tool that can help you to save time in your designs.
    It’s called the Rotation Tool, and while you may not use it often, as designers
    sometimes there is a need to create an effect that, if done by hand, can be incredibly
    time-consuming. You would need to evenly space every time on the path and ensure
    that they are all the same size as well as equidistant from each other. This is
    where the Rotation Tool comes in. Admittedly, I’ve not yet had to use this tool
    but I know it will come in handy at some point. To use this tool, you would create
    a shape on your canvas. This can be any shape in any color. For our example, we’ll
    use a red circle. With the red circle created, navigate to the Layer menu and
    select Paths ➤ Rotate Copies as shown in Figure [6-12](#A978-1-4842-1458-9_6_Chapter.html#Fig12).


    ![A978-1-4842-1458-9_6_Fig12_HTML.jpg](A978-1-4842-1458-9_6_Fig12_HTML.jpg)


    Figure 6-12.


    Access the Rotation Tool from the Layer menu


    Once you’ve selected Rotate Copies, sketch will ask you how many copies you’d
    like to create. The default will be six and Sketch will tell you the total number
    of layers that will be generated once the task has been completed. The result
    of the number of copies you select and the layers are shown in Figure [6-13](#A978-1-4842-1458-9_6_Chapter.html#Fig13).
    Sketch has created multiple shapes along a round path, each in its own layer.
    The distance between each layer or shape can be altered by moving the handle attached
    to the original layer. Each shape can be moved closer together or further apart.


    ![A978-1-4842-1458-9_6_Fig13_HTML.jpg](A978-1-4842-1458-9_6_Fig13_HTML.jpg)


    Figure 6-13.


    The Rotation Tool will create multiples of the same graphic along a circular path
    quickly and seamlessly'
  trans: "\n### 创建自定义网格\n\n我们已经介绍了 Sketch 布局和网格设置的强大功能。因此，在着手进行最伟大的应用设计之前，请先通过调整列数、宽度和间距来设置布局参数。然后，你可以点击图\
    \ 6-7 左下角所示的按钮，将其设为默认设置，这样每次开始新设计时就无需重复此过程。\n\n![A978-1-4842-1458-9_6_Fig7_HTML.jpg](img/A978-1-4842-1458-9_6_Fig7_HTML.jpg)\n\
    \n图 6-7. Sketch 中的布局设置面板。用于设置画布并保存为默认设置，以加快启动速度\n\n### 演示模式\n\n有时，不受干扰地查看作品至关重要。如果你需要在屏幕上向你的上级、同事，甚至客户展示工作成果，那么演示模式将是理想之选。按下\
    \ ![A978-1-4842-1458-9_6_Figa_HTML.jpg](img/A978-1-4842-1458-9_6_Figa_HTML.jpg)\
    \ + `.`，即可将屏幕切换为演示模式。这意味着菜单栏、文档以及屏幕上所有无关元素都会消失，只留下你的设计。你可以在特定页面内自由移动。通过上下左右滚动，你可以在各个画板之间切换。\n\
    \n**提示**  \n按下 ![A978-1-4842-1458-9_6_Figa_HTML.jpg](img/A978-1-4842-1458-9_6_Figa_HTML.jpg)\
    \ + `.` 同样可以退出演示模式。\n\n### 设置默认样式\n\n在 Sketch 中创建形状时，它会始终以 Sketch 的默认样式显示。通常，形状会带有浅灰色填充和深灰色边框。但与\
    \ Sketch 中的大多数功能一样，这可以轻松更改。如果你发现自己经常使用特定颜色或色板工作，你可以随时通过创建新样式并将其设为默认值来更改此默认颜色。例如，假设你希望所有新形状都显示为特定色调的红色填充且无边框。首先，创建一个红色形状，并将填充颜色从默认的灰色更改为你指定的红色色调。然后，移除边框设置。最后，导航至\
    \ `编辑 ➤ 设为默认样式`，如图 6-8 所示。这将确保所有新创建的形状都将采用你指定的新默认样式。这适用于任何形状：圆形、星形、三角形等。\n\n![A978-1-4842-1458-9_6_Fig8_HTML.jpg](img/A978-1-4842-1458-9_6_Fig8_HTML.jpg)\n\
    \n图 6-8. 如何设置默认样式以应用于所有新形状\n\n**提示**  \n但需要注意的一点是，边框圆角、阴影和反射等样式无法设置为默认样式。\n\n\
    ### 定义你的色板\n\n在实际开始设计你的应用之前，你需要选择一套特定的色板。这将包括你的主色、强调色和突出显示色等颜色。有一些出色的工具可用于选择色板。选定色板后，Sketch\
    \ 可以让你轻松地在检查器中设置这些颜色，使你的颜色在整个项目过程中始终易于访问。你可以从 Adobe 的 Kuler 等在线工具中获取色板的屏幕截图，并将其导入到你的\
    \ Sketch 画布中，如图 6-9 所示。\n\n![A978-1-4842-1458-9_6_Fig9_HTML.jpg](img/A978-1-4842-1458-9_6_Fig9_HTML.jpg)\n\
    \n图 6-9. 导入 Sketch 中的一系列彩色色块，用于创建色板\n\n导入图像后，将光标移到检查器面板中的吸管图标上。单击该图标以显示一个放大镜，然后你可以将其移到画布上，并悬停在色板图像中所需的颜色上，如图\
    \ 6-10 所示。\n\n![A978-1-4842-1458-9_6_Fig10_HTML.jpg](img/A978-1-4842-1458-9_6_Fig10_HTML.jpg)\n\
    \n图 6-10. Sketch 中的吸管工具，用于提取色块的颜色\n\n点击该颜色后，将光标移回检查器，然后点击 `“+”` 按钮。完成此操作后，Sketch\
    \ 会将所选颜色添加到你的色样列表中，显示在图 6-11 右下角的“文档颜色”区域。\n\n![A978-1-4842-1458-9_6_Fig11_HTML.jpg](img/A978-1-4842-1458-9_6_Fig11_HTML.jpg)\n\
    \n图 6-11. 使用吸管工具从画布上的色板图像中复制颜色，从而创建的新文档颜色集\n\n轻松访问色板中的所有颜色将在你进行设计时节省时间。并且，颜色可以像添加一样轻松地从检查器中移除。要从检查器中移除颜色，只需单击并将其拖到画布上即可。松开鼠标后，它会在动画烟雾效果中消失，并从面板中移除。\n\
    \n**提示**  \nSketch 不仅可以提取画布上的颜色，还可以提取屏幕上的任何位置，包括你的 Mac 桌面甚至浏览器窗口中的颜色。\n\n## 旋转工具\n\
    \nSketch 提供了一个鲜为人知的工具，可以帮助你在设计中节省时间。它被称为旋转工具，虽然你可能不常使用它，但作为设计师，有时需要创建某种效果，如果手动操作，将极其耗时。你需要沿路径均匀地间隔每个元素，并确保它们大小相同且彼此等距。这就是旋转工具的用武之地。诚然，我尚未需要使用此工具，但我知道它会在某个时候派上用场。使用此工具时，你需要在画布上创建一个形状。可以是任何颜色、任何形状。在我们的示例中，我们将使用一个红色圆形。创建红色圆形后，导航到“图层”菜单，选择\
    \ `路径 ➤ 旋转副本`，如图 6-12 所示。\n\n![A978-1-4842-1458-9_6_Fig12_HTML.jpg](img/A978-1-4842-1458-9_6_Fig12_HTML.jpg)\n\
    \n图 6-12. 从“图层”菜单访问旋转工具\n\n选择 `旋转副本` 后，Sketch 会询问你要创建多少个副本。默认数量为 6，Sketch 会告知你任务完成后将生成的总图层数。你选择的副本数量及生成的图层结果如图\
    \ 6-13 所示。Sketch 沿圆形路径创建了多个形状，每个形状都在其自己的图层中。每个图层或形状之间的距离可以通过移动附加到原始图层的控制柄来调整。每个形状可以彼此移近或移远。\n\
    \n![A978-1-4842-1458-9_6_Fig13_HTML.jpg](img/A978-1-4842-1458-9_6_Fig13_HTML.jpg)\n\
    \n图 6-13. 旋转工具将沿圆形路径快速无缝地创建同一图形的多个副本\n"
- fmt: '# Sketch Mirror


    While I briefly touched on the Sketch Mirror in [Chapter 1](#A978-1-4842-1458-9_1_Chapter.html),
    there is no mistaking that this feature is a huge time-saver when designing for
    iOS. `Sketch Mirror` is a companion app for the `Sketch` Mac app that allows you
    to preview your designs directly on a device while designing. Remember what this
    was like using another graphics program? You would usually have to export the
    image at the correct resolution, sending to yourself, and then opening it on the
    desired device for a preview. A bit tedious, indeed. Now, with `Sketch Mirror`,
    you can install the app on your iPhone or iPad, make sure that it is connected
    to the same Wi-Fi network as your computer, and be able to preview your designs
    right on the device. While viewing your designs, and depending on how your artboards
    have been set up, you can swipe between artboard and pages of your `Sketch` document
    on the device showing the preview. Another great thing about `Sketch Mirror` is
    that you can set up multiple devices upon which to view your designs. This makes
    designing universal apps much easier and seamless. `Sketch Mirror` makes the process
    of viewing and making necessary tweaks so easy for designers and its easily accessible
    right from the toolbar of the Mac app. Figure [6-14](#A978-1-4842-1458-9_6_Chapter.html#Fig14)
    shows an image of an artboard being previewed on the Mac and on the iPhone 6 using
    `Sketch Mirror`.


    ![A978-1-4842-1458-9_6_Fig14_HTML.jpg](A978-1-4842-1458-9_6_Fig14_HTML.jpg)


    Figure 6-14. `Sketch Mirror` lets you preview your designs right on your device
    while viewing on your Mac


    # Other Workflow Tools


    You will find that as a designer, you will eventually have to move outside of
    your preferred graphics program to interact with other members of your team. I’ll
    cover a few of them below that I have personally used but you might find that
    your preference is for different programs, and that’s fine. The goal here is to
    find the programs that complement your style and way of working so that you save
    time doing mundane things and spend more time doing what you love, which hopefully,
    is designing.


    ## Flinto


    `Flinto` is a prototyping tool that makes it easy to take all of your artboards,
    create links and interactions between them, and create a prototype. While there
    are quite a few prototyping tools, `Flinto`, I have found, is one of the easiest
    to use. As `Sketch`’s artboards will already be in the correct size, `Flinto`
    makes it easy to see, understand, and create the relationships between each screen
    in your app. This way, there is a shift from just designing your app to really
    focusing on how the app works and the way that users will interact with it. Thus
    is the inevitable shift from UI to UX and important shift that many designers
    are dealing with at the moment.


    Users simply have to import their screens into `Flinto` by dragging and dropping
    them or importing via Dropbox (the app offers easy Dropbox integration) into the
    `Flinto` canvas, as shown in Figure [6-15](#A978-1-4842-1458-9_6_Chapter.html#Fig15).
    Then, you add the desired connections and interactions between the screens and
    preview it either on your device or right on screen within the program. If something
    doesn’t work, it’s a quick fix to update the links or change the transition. To
    replace a screen, you can easily just drag the new screen on top of the old one
    and `Flinto` will automatically update it.


    ![A978-1-4842-1458-9_6_Fig15_HTML.jpg](A978-1-4842-1458-9_6_Fig15_HTML.jpg)


    Figure 6-15. The `Flinto` interface is easy to use and lets you drag and drop
    screens into the interface


    `Flinto` will emulate some standard iOS transitions as well and you can easily
    add a Back button to most pages. And you can even add a starter image and app
    icon so that your users have a real app experience.


    When you’re all done, you can email your prototype to potential users or even
    send as a text message. As you continue to iterate on your app, your users will
    automatically view the updated version of the app, and if for any reason you need
    to revoke access to the app, that’s a pretty simple process, too. There are quite
    a few prototyping tools on the market, but `Flinto` is definitely one of the easiest
    to use and my favorite.


    ## Flinto for Mac


    The team at `Flinto` has recently released `Flinto for Mac`, a prototyping app
    for OS X that allows designers to create simply or more comprehensive prototypes
    with more complicated interactions. While I haven’t tried `Flinto for Mac` personally
    as it’s virtually brand new at the time of this writing, it’s been given great
    reviews by designers I trust and respect. It allows you to create a series of
    complex animations with no programming and within an interface that’s just as
    intuitive and as easy to use as the `Flinto` Web app (see Figure [6-16](#A978-1-4842-1458-9_6_Chapter.html#Fig16)).
    You can drag and drop assets from any graphics program, or use the `Sketch` plug-in
    that will let you automatically import your designs from `Sketch` and right into
    `Flinto for Mac`. The app also allows you preview on a device so that you can
    test out your transitions on an app as well.


    ![A978-1-4842-1458-9_6_Fig16_HTML.jpg](A978-1-4842-1458-9_6_Fig16_HTML.jpg)


    Figure 6-16. The welcome screen for the new prototyping tool `Flinto for Mac`


    ## Marvel


    `Marvel` is another helpful prototyping tool that makes prototyping your app very
    easy (see Figure [6-17](#A978-1-4842-1458-9_6_Chapter.html#Fig17)). It works more
    or less in the same way as `Flinto` does. You import your screens into `Marvel`
    using Dropbox, add hotspots, links, and transitions, and then test. Once you’re
    ready to share your prototype with others, you can send via e-mail (unique URL),
    text, QR code, or you can even embed the prototype directly into your website.
    These days, designers are encouraged to iterate and test often. With these prototyping
    tools, the job becomes that much easier and allows you to make the needed changes
    without committing any code at all. It’s also worth noting that `Marvel` also
    has a mobile app that brings some of the functionality offered in the Web app
    to your iPhone. You actually take pictures of the sketches that you’ve created
    and link them together right within the app.


    ![A978-1-4842-1458-9_6_Fig17_HTML.jpg](A978-1-4842-1458-9_6_Fig17_HTML.jpg)


    Figure 6-17. Screen from the `Marvel` mobile app that lets you create prototypes
    on the fly'
  raw: '## Sketch Mirror


    While I briefly touched on the Sketch Mirror in [Chapter 1](#A978-1-4842-1458-9_1_Chapter.html),
    there is no mistaking that this feature is a huge time-saver when designing for
    iOS. Sketch Mirror is a companion app for the Sketch Mac app that allows you to
    preview your designs directly on a device while designing. Remember what this
    was like using another graphics program? You would usually have to export the
    image at the correct resolution, sending to yourself, and then opening it on the
    desired device for a preview. A bit tedious, indeed. Now, with Sketch Mirror,
    you can install the app on your iPhone or iPad, make sure that it is connected
    to the same Wi-Fi network as your computer, and be able to preview your designs
    right on the device. While viewing your designs, and depending on how your artboards
    have been set up, you can swipe between artboard and pages of your Sketch document
    on the device showing the preview. Another great thing about Sketch Mirror is
    that you can set up multiple devices upon which to view your designs. This makes
    designing universal apps much easier and seamless. Sketch Mirror makes the process
    of viewing and making necessary tweaks so easy for designers and its easily accessible
    right from the toolbar of the Mac app. Figure [6-14](#A978-1-4842-1458-9_6_Chapter.html#Fig14)
    shows an image of an artboard being previewed on the Mac and on the iPhone 6 using
    Sketch Mirror.


    ![A978-1-4842-1458-9_6_Fig14_HTML.jpg](A978-1-4842-1458-9_6_Fig14_HTML.jpg)


    Figure 6-14.


    Sketch Mirror lets you preview your designs right on your device while viewing
    on your Mac


    ## Other Workflow Tools


    You will find that as a designer, you will eventually have to move outside of
    your preferred graphics program to interact with other members of your team. I’ll
    cover a few of them below that I have personally used but you might find that
    your preference is for different programs, and that’s fine. The goal here is to
    find the programs that complement your style and way of working so that you save
    time doing mundane things and spend more time doing what you love, which hopefully,
    is designing.


    ### Flinto


    Flinto is a prototyping tool that makes it easy to take all of your artboards,
    create links and interactions between them, and create a prototype. While there
    are quite a few prototyping tools, Flinto, I have found, is one of the easiest
    to use. As Sketch’s artboards will already be in the correct size, Flinto makes
    it easy to see, understand, and create the relationships between each screen in
    your app. This way, there is a shift from just designing your app to really focusing
    on how the app works and the way that users will interact with it. Thus is the
    inevitable shift from UI to UX and important shift that many designers are dealing
    with at the moment.


    Users simply have to import their screens into Flinto by dragging and dropping
    them or importing via Dropbox (the app offers easy Dropbox integration) into the
    Flinto canvas, as shown in Figure [6-15](#A978-1-4842-1458-9_6_Chapter.html#Fig15).
    Then, you add the desired connections and interactions between the screens and
    preview it either on your device or right on screen within the program. If something
    doesn’t work, it’s a quick fix to update the links or change the transition. To
    replace a screen, you can easily just drag the new screen on top of the old one
    and Flinto will automatically update it.


    ![A978-1-4842-1458-9_6_Fig15_HTML.jpg](A978-1-4842-1458-9_6_Fig15_HTML.jpg)


    Figure 6-15.


    The Flinto interface is easy to use and lets you drag and drop screens into the
    interface


    Flinto will emulate some standard iOS transitions as well and you can easily add
    a Back button to most pages. And you can even add a starter image and app icon
    so that your users have a real app experience.


    When you’re all done, you can email your prototype to potential users or even
    send as a text message. As you continue to iterate on your app, your users will
    automatically view the updated version of the app, and if for any reason you need
    to revoke access to the app, that’s a pretty simple process, too. There are quite
    a few prototyping tools on the market, but Flinto is definitely one of the easiest
    to use and my favorite.


    ### Flinto for Mac


    The team at Flinto has recently released Flinto for Mac, a prototyping app for
