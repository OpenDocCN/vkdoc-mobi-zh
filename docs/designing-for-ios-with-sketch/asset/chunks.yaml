    图 3-17. 检查器中展开的填充属性弹出窗口，显示了已保存的色板、十六进制代码、取色器、混合、不透明度选项和渐变\n\n有时，你可能会看到取色器下方显示的是字母\
    \ `H`、`S` 和 `B`，如图 3-17 所示。`H`、`S` 和 `B` 分别代表色相、饱和度和明度。\n\n如果在取色器内移动光标，你会注意到下方字段（`R`、`G`、`B`\
    \ 或 `H`、`S`、`B`）中的数值会发生变化，十六进制代码也会随之改变。如果处于 HSB 模式，将指针向上移动会增加明度，从左向右移动则会增加饱和度。通常，在设计时你会希望使用\
    \ HSB 模式。\n\n> **提示**  \n> 按住 `Shift` 键并点击字母，即可在 RGB 和 HSB 模式之间切换。\n\n你也可以保存经常使用或计划在未来使用的颜色色板。Sketch\
    \ 会自动允许你通过点击取色器窗口右下角的加号（`+`）按钮，将颜色色板保存在取色器正下方。Sketch 也允许你通过取色器工具保存颜色色板。这让你可以从屏幕上的任何位置选取颜色，甚至包括程序外部。\n\
    \n### 渐变\n渐变是一种从一种颜色过渡到另一种颜色的填充类型。使用渐变工具时，Sketch 会显示过渡点，你可以在画布上直接编辑这些点。\n\n####\
    \ 线性渐变\n顾名思义，线性渐变工具允许你创建沿一条直线从一种颜色到另一种颜色的逐渐混合。如果你选择了这种渐变，你会在画布的图层上看到两个可编辑的点。拖拽每个点可以调整渐变上的点。你也可以使用检查器中的渐变条来调整渐变中的点。你还可以通过单击线条上的任意位置来添加新的点。每个点都代表图层中渐变的一个颜色停止点。这些点允许你编辑和调整图层上渐变的平滑度。要删除线条上的某个停止点，请按\
    \ `Delete` 键。线性渐变样式如图 3-18 所示。\n\n![A978-1-4842-1458-9_3_Fig18_HTML.jpg](img/A978-1-4842-1458-9_3_Fig18_HTML.jpg)\n\
    图 3-18. 线性渐变样式\n\n#### 径向渐变\n径向渐变工具会在你的图层上添加一个较大的圆形。在这个较大的圆形内，会有两个点：一个位于中心，用于设置半径的中心点；另一个位于半径之外，用于控制其大小。径向渐变工具使用圆形图案或运动方式，从一种颜色过渡到另一种颜色。你也可以在画布内扩展渐变的半径和形状。径向渐变工具如图\
    \ 3-19 所示。\n\n![A978-1-4842-1458-9_3_Fig19_HTML.jpg](img/A978-1-4842-1458-9_3_Fig19_HTML.jpg)\n\
    图 3-19. 径向渐变工具\n\n#### 环形渐变\n环形渐变工具会围绕图层的中心点顺时针进行颜色过渡。环形渐变工具如图 3-20 所示。\n\n![A978-1-4842-1458-9_3_Fig20_HTML.jpg](img/A978-1-4842-1458-9_3_Fig20_HTML.jpg)\n\
    图 3-20. 环形渐变工具\n\n#### 角度渐变\n角度渐变工具会围绕一个特定点逆时针方向从一种颜色过渡到另一种颜色。\n\n## 混合\nSketch\
    \ 中提供了多种不同的混合选项。要查看所有选项，你需要点击混合选项上方的字段。下拉菜单会显示所选形状可用的所有混合选项列表。\n\n### 不透明度\nSketch\
    \ 中的不透明度设置是图层特定的，这意味着每个图层不仅有自己的填充样式和设置，而且还可以有不同的不透明度层级。你可以通过点击数字并调整 `Opacity`\
    \ 标签上方的数值（以百分比表示）来调整相应图层的不透明度级别。\n\nSketch 的一大优势是能够为同一图层添加多种效果。因此，你可以为一个图层添加任意数量的填充。它们会从下到上层层堆叠。要添加一个填充，只需点击检查器中填充部分右侧的\
    \ `+` 按钮即可。\n\n### 阴影\n阴影在设计中的效果很棒，因为它们能让你的设计更具立体感。即使你在进行扁平设计，阴影也有助于使设计中的某些元素更加突出。即使在扁平设计中，你也必须考虑光线和角度等元素，这些元素使得某些元素实际上需要阴影——即使它很微妙。\n\
    \n虽然扁平设计明确摒弃了恼人的“投影”，但最近在扁平设计中使用长而扁平的阴影的趋势已经变得流行起来。这种效果在增加深度的同时，仍然保持了“扁平”的效果。不过，在大多数情况下，你可能会在设计中最少地使用阴影，尤其是在为\
    \ iOS 设计时。\n\nSketch 的阴影设置位于检查器中，这对图形程序来说非常典型。你可以更改阴影出现在 `x` 或 `y` 轴上的位置、模糊程度和扩展范围的设置。相同的设置也适用于内阴影。\n\
    \n> **提示**  \n> 扩展功能不适用于文本图层。\n\n## 模糊\nSketch 有四种不同的模糊效果模式：高斯模糊、动感模糊、缩放模糊和背景模糊。我们现在分别讨论它们，并将展示其中几种模糊效果的示例。\n\
    \n### 高斯模糊\n高斯模糊是大多数图形程序的基本功能，用于减少图像中的噪点和细节。该效果会在受影响的图层（通常是图像）上产生均匀、平滑的模糊效果。高斯模糊效果以及所有其他模糊效果都可以在检查器的右下角找到。它是\
    \ Sketch 可用的额外模糊效果列表中的第一个选项。你可以使用选择此效果时出现的滑块，以像素为单位调整模糊量。图 3-21 显示了左侧的原图，以及右侧应用了\
    \ 4 像素高斯模糊效果的同一张图片。\n\n![A978-1-4842-1458-9_3_Fig21_HTML.jpg](img/A978-1-4842-1458-9_3_Fig21_HTML.jpg)\n\
    图 3-21. 左侧为原图，右侧为应用了 4 像素高斯模糊效果的同一张图片\n"
- fmt: '### Motion Blur


    As its name implies, the `Motion Blur` effect produces the effect of something
    that is in motion. This effect will allow you to blur in a particular direction.
    As with the `Gaussian Blur`, you can adjust the amount of the motion in pixels
    using the provided slider once you select this effect from the drop-down. You
    can also adjust the angle of the blur using the dial that appears once this option
    has been selected. The `Motion Blur` effect is illustrated in Figure [3-22](#A978-1-4842-1458-9_3_Chapter.html#Fig22).


    ![A978-1-4842-1458-9_3_Fig22_HTML.jpg](A978-1-4842-1458-9_3_Fig22_HTML.jpg)


    Figure 3-22. Original image on the left with a `Motion Blur` effect applied on
    the right


    ### Zoom Blur


    The `Zoom Blur` effect lets you blur a layer from a specified point outward. Once
    you select this blur, Sketch will present you with options to edit the point from
    which the blur will originate as well as the amount of pixels. The `Zoom Blur`
    effect is illustrated in Figure [3-23](#A978-1-4842-1458-9_3_Chapter.html#Fig23).


    ![A978-1-4842-1458-9_3_Fig23_HTML.jpg](A978-1-4842-1458-9_3_Fig23_HTML.jpg)


    Figure 3-23. A standard image on the left with no effect applied, and the same
    image on the right with the `Zoom Blur` effect applied


    ### Background Blur


    The `Background Blur` effect was added by the Bohemian Coding team specifically
    after the iOS7 redesign. It is an effect that is used liberally throughout iOS,
    so you should feel comfortable about using it in your app designs. It blurs the
    background behind a shape but not the shape itself. The effect works best once
    you have reduced the opacity on the intended layer. Without this, the effect will
    be difficult to see.


    The `Background Blur` effect will take a considerable toll on your computer’s
    resources. You will see it slow down the program and your computer overall. Thus
    it’s wise to use it sparingly.


    **Tip**: The `Background blur` function can be used to create a “frosted glass”
    effect, much like the Control Center that slides up from the bottom of your home
    screen on the iPhone.


    ## Sharing Styles


    At some point in your design experience, you will want to apply the same styles
    (shadows, fills, and so on) to a particular shape or object. With Sketch, this
    is possible to do in a few easy steps. But first, why would you want to do this?
    As a UI designer, you understand that speed and efficiency are paramount when
    designing interfaces. You will undoubtedly find yourself in a situation where
    both will come into play, and you will be required to be not only a skillful designer,
    but a fast and efficient one as well.


    Sharing styles will help you with this. Consider for instance when you have a
    shape to which you have attached certain styles and you need to attach the same
    style or style to a different shape. First you can copy a style from one object
    to another by using the `option+⌘+c` key combination. This copies a style from
    one object. Then navigate to the new object, select it, and press the `option+⌘+v`
    key combination to attach the style to the new object. Note that this simply copies
    the style from one object to another. The objects, however, remain independent
    of each other.


    If for some reason you need to share a style among multiple objects, you would
    then use the Sketch `Shared Style` function. This allows you to create a new style
    and attribute it to any new object or objects. The great thing about this feature
    is that once you create a style and attach it to an object, any additional changes
    to the style will update all objects to which it has been attached.


    To create a new style, simply click the drop-down in the Inspector that reads
    `No Shared Style`, as shown in Figure [3-24](#A978-1-4842-1458-9_3_Chapter.html#Fig24).
    You can create a new shared style here, and it will automatically be associated
    with the selected object.


    ![A978-1-4842-1458-9_3_Fig24_HTML.jpg](A978-1-4842-1458-9_3_Fig24_HTML.jpg)


    Figure 3-24. Creating a shared style by clicking the `Shared Styles` drop-down
    in the Inspector


    Figure [3-25](#A978-1-4842-1458-9_3_Chapter.html#Fig25) shows two images side
    by side. One oval has a style attached to it and the other does not. To attach
    the style to the new oval, you must select the oval and the desired style from
    the style drop-down in the Inspector. The oval will automatically be updated with
    the new style and any additional changes moving forward, also as shown in the
    figure. The styles can be updated, deleted, or changed at any time. As long as
    a style has been attributed to an object, they will be updated with that new style.


    ![A978-1-4842-1458-9_3_Fig25_HTML.jpg](A978-1-4842-1458-9_3_Fig25_HTML.jpg)


    Figure 3-25. Two objects with a single style being updated


    ## Images


    As mentioned in the very first chapter of this book, Sketch is primarily for designers
    who want to create user interfaces for the Web and for mobile devices. Because
    it allows designers to work with vectors, Sketch is likely not the best option
    for image editing. As mentioned earlier, that was the initial purpose of Photoshop.
    Thus, in this instance, I recommend using it or any one of the other worthy alternatives
    when you need to do serious image editing.


    That being said, there are some fairly decent basic image editing tools in Sketch
    if you need to do something related to images on the fly.


    **Tip**: Any selection of more than one layer can be combined into a bitmap by
    selecting `Flatten Selection to Bitmap` from the `Layer` menu.


    Sketch has improved its image editing abilities (specifically for bitmaps) with
    version 3.X, and it has increased the number of image editing tools. The image
    editing tools are activated when you select an image or bitmap on the canvas and
    double-click it. You will notice that the Inspector updates to include tools that
    are specific to image editing. A selected image with the image editing tools on
    display is shown in Figure [3-26](#A978-1-4842-1458-9_3_Chapter.html#Fig26).


    ![A978-1-4842-1458-9_3_Fig26_HTML.jpg](A978-1-4842-1458-9_3_Fig26_HTML.jpg)


    Figure 3-26. The new and improved bitmap editing tools in Sketch


    The tools available for editing bitmaps are as follows:


    - **Selection**: This tool allows you to select a rectangular area anywhere on
    your image.

    - **Magic Wand**: This tool lets you select an area within an image by clicking
    and dragging.

    - **Invert**: This tool lets you invert any previous selection.

    - **Crop**: This tool lets you select an area of your image and exclude anything
    outside of the selected area.

    - **Color**: This tool lets you select an area and fill it with any color selected
    from the available color picker.

    - **Vectorize**: This tool will turn a selected area into a shaper layer of its
    own.


    ## Color Adjust


    While Sketch’s ability to edit photos is limited, you can still do some minor
    adjustments. If you need to adjust colors of an image or bitmap, Sketch allows
    you to adjust the `Hue`, `Saturation`, `Contrast`, and `Brightness` of an image
    by moving sliders in the `Color Adjust` panel, which is shown in Figure [3-27](#A978-1-4842-1458-9_3_Chapter.html#Fig27).
    Once your image has been imported, click the box next to the `Color Adjust` heading
    in the lower-right corner of the Inspector, which will bring up the `Color Adjust`
    sliders.


    ![A978-1-4842-1458-9_3_Fig27_HTML.jpg](A978-1-4842-1458-9_3_Fig27_HTML.jpg)


    Figure 3-27. An image altered using the `Color Adjust` tool


    Styling shapes is an important part of designing with Sketch, giving your designs
    character and your own unique touch. Take some time to become familiar with each
    style—and there are many—to understand how they can enhance your work. Experiment,
    mix, and match where you can.'
