    will require before they accept or deny. If your app will require the use of more
    than one of the device’s services, you can think about how to stagger your permissions.
    For example: Do you ask for permissions all at the same time? Or do you wait until
    a user attempts to use a feature requiring a particular service? I’ve seen it
    done both ways. This is something to think about as you are working through your
    app’s wireframes since each page will likely require different copy and different
    designs.


    For our PhotoBomb permission page, we’ll create a simple page that asks to use
    the services that we will need for users to be able to experience the app to its
    fullest. The wireframed page is shown in Figure [7-14](#A978-1-4842-1458-9_7_Chapter.html#Fig14).


    ![A978-1-4842-1458-9_7_Fig14_HTML.jpg](A978-1-4842-1458-9_7_Fig14_HTML.jpg)


    Figure 7-14.


    The PhotoBomb permissions page


    I created the PhotoBomb permissions page by using a version of the previous new
    page pop-up page. Since that page already had most of the elements I needed, it
    was an easy choice. With a few adjustments for the size of the buttons and copy,
    I was able to replicate the page and make some edits to create the new permissions
    page. Additional embellishments will come in the design phase but this shows the
    structure.'
