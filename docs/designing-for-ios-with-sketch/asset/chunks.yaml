- fmt: '# 10. Exporting Your Assets for Development


    Your app is designed, and everything has been approved. Your clients are happy
    and you’re celebrating another win with your creative team for a job well done.
    But not so fast! Now that your app is all designed and about to be made into a
    real live application available for download, you’ll need to hand off those designs
    to your engineer or development team. And while how an app looks is of great importance,
    it is also important that it works well. This requires some collaboration between
    the designer and developer.


    As the line between design and development blurs, points of integration between
    design and development have become a necessary part of the app development life
    cycle. Designers are becoming more comfortable with code and developers are becoming
    more comfortable with design, and Sketch is a big part of that. These days, it
    is not uncommon to see Sketch design classes bundled with Swift development classes
    so that designers can complement their design skills with some development as
    well. And with Sketch, it has never been easier to export your assets for use
    in Xcode.


    If you’re not developing your app yourself and you have a developer to do the
    work, you’ll want to have a conversation to understand just how your developer
    would prefer to have assets handed off. This is true especially if you haven’t
    been taking a collaborative approach to your design and including your developing
    along the way.


    In this chapter, we’ll discuss the exporting functionality in Sketch 3 and how
    to use it, and we’ll walk through how to perform specific exporting tasks for
    iOS. Luckily, Sketch can help here, too. Exporting assets is a common task for
    designers, and as a feature, this is one of Sketch’s best. The program offers
    export options to a number of different file formats and relatively easy-to-perform
    exporting operations. We’ll start with the basics and walk through the different
    ways you can use Sketch to export your assets for iOS development.


    Because there are so many different resolutions to export for with iOS, you will
    need to be able to export for `@2×` and even `@3×`, and Sketch makes all of these
    possible and incredibly seamless. At the end of this chapter, you’ll be ready
    to export your designs using Sketch for handoff.


    As we have in previous chapters, we will continue to use our PhotoBomb application
    for all exercises in this chapter. That way, we can complete the entire design
    process using one set of designs and eventually export to a complete set of assets
    for the app.


    ## What to Export and What Not to Export


    So how do we decide what to export for our developer? Well, this is where the
    conversation comes in. Talking to your developer about his preferences is always
    a good approach. But typically, you will be exporting assets that cannot be re-created
    programmatically. When an app is created in Xcode, the developer rebuilds your
    design with code. Items such as fonts and text layers can easily be recreated
    in code but certain graphical elements will need to be provided to developers.
    Elements that could possibly change in appearance should also be exported. For
    example, if any item on a toolbar must illuminate or light up, on tap, then it
    should be exported separately. Alternately, you may want to create an “on” and
    an “off” version of that element and export them both for your developer so that
    there is a graphical representation of both states. Also, icons that are not a
    standard part of the iOS UI should be exported. When in doubt, export the element
    anyway. If your developer doesn’t need it, he or she will skip it.


    When exporting in Sketch you have two ways to export elements on your canvas.
    One way is to select Export from the Insert menu in the toolbar. The other is
    to click the `Make Exportable` button in the lower right corner of your Sketch
    Canvas Inspector window while a layer is selected. When the `Make Exportable`
    button is clicked as shown in Figure [10-1](#A978-1-4842-1458-9_10_Chapter.html#Fig1),
    Sketch will create a preview of the exported layer in the area above the button.
    If more than one layer is selected, all thumbnails will appear there.


    ![A978-1-4842-1458-9_10_Fig1_HTML.jpg](A978-1-4842-1458-9_10_Fig1_HTML.jpg)


    Figure 10-1. The `Make Exportable` button before and after selecting a layer for
    export. In this case, we have selected the Enter button on an onboarding screen
    of the PhotoBomb app


    When focusing on the process of exporting, there are a few areas of the canvas
    that you will need to keep in mind. Figure [10-2](#A978-1-4842-1458-9_10_Chapter.html#Fig2)
    shows the three areas of your canvas to pay attention to when exporting. From
    left to right in the following image, they are the Export options from the file
    menu (if you choose to go this route); the second is the Export option on the
    lower right corner of the Inspector and the slice and layer options at the bottom
    of the layer list.


    ![A978-1-4842-1458-9_10_Fig2_HTML.jpg](A978-1-4842-1458-9_10_Fig2_HTML.jpg)


    Figure 10-2. Three areas to consider when exporting assets from the Sketch canvas


    ## The Knife


    When selecting a layer for export, you will notice that the icon of the knife
    at the bottom of the layer list will be highlighted. The knife simply means that
    there are layers available for export. Any layer that has a knife next to it will
    show up next time you select Export from the menu in the toolbar. A drop-down
    will show all layers included in that export as shown in Figure [10-3](#A978-1-4842-1458-9_10_Chapter.html#Fig3);
    the figure shows the drop-down and selected layers for export.


    ![A978-1-4842-1458-9_10_Fig3_HTML.jpg](A978-1-4842-1458-9_10_Fig3_HTML.jpg)


    Figure 10-3. Drop-down showing slices available for export when selecting Export
    from the menu in the toolbar


    If you go back to your layer list, you will see that all of the layers shown in
    Figure [10-3](#A978-1-4842-1458-9_10_Chapter.html#Fig3) will have the knife icon
    next to them. You can move these layers into the corresponding groups for better
    organization.


    ### Slicing from the Insert Menu


    To select an area for slicing or export, you can also select the Slice option
    from the Insert menu. Once you’ve done this, your cursor will turn into a small
    knife and you will be able to select any area in the design on your canvas for
    export. Once the area is selected, a preview of the slice will appear in the inspector
    and the knife icon below the number list will update to show the total number
    of slices currently on your canvas.


    #### File Formats for Exporting


    When exporting your files in Sketch, the program provides multiple options for
    output. They are JPEGS, PNG, TIFF, PDF, EPS, and SVG. Let’s talk a little bit
    about these file formats.


    ##### PNG


    PNG is an uncompressed graphic format that is the preferred format for exporting
    files for iOS. It is pretty much a what-you-see-is-what-you-get format. Nothing
    is really added or subtracted from the image during the exporting process. Another
    great thing about PNGs is that they support transparency, which means that this
    format won’t reveal a transparent background if one is included in your graphic.
    PNG is the preferred file size format for Apple’s IDE, Xcode, since it optimizes
    PNGs as part of the build process.


    ##### JPEG


    JPEG is a compressed file format. This means that your final graphic file and
    any colors, effects, or gradients will be compressed and will have fewer colors
    than existed in our original file. The JPEG file will also be considerably smaller
    than a PNG when exported. If you’re exporting an artboard just to show someone
    the progress of your work where compression and colors won’t matter, JPEG is a
    good choice.'
