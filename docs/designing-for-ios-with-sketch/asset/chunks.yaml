    By 2014, the team at Bohemian Coding had been working on Sketch for over two years
    and had increased from a paltry two members handling development and design to
    about five. They had also learned the value of outsourcing and used third-party
    developers to help to create a brand new Sketch website and a helpful video highlighting
    all of the latest features.


    However, it wasn’t until the release of Sketch 3.0 in April that more people in
    the design community began to take notice. Two years after the release of Sketch
    2.0, Sketch 3.0 arrived. The company had a new expanded team and a suite of new
    and improved features. As mentioned, adding team members and outsourcing some
    key elements helped the team to focus on just the product. They rebooted, redesigned
    their website, and listened to the very vocal designer community who were interested
    in seeing changes and updates, particularly in symbols, exporting, and the fledgling
    inspector feature.


    By this time, mobile apps were well on their way to leading the world, and designers
    were heavily embracing mobile paradigms that weren’t just device specific. The
    Web was quickly becoming mobile-first as well. Designers wanted and needed software
    whose developers understood that design was changing as a discipline. They’d been
    using Photoshop for years, and it seemed that Adobe wasn’t listening to the complaints
    of the designer community.


    When Sketch 3 was released, Bohemian Coding offered it as a free upgrade to those
    who’d purchased and owned Sketch 2\. For one week in April, Sketch 3 was available
    in the Mac OS App Store for $49.99\. This is when I first bought my own copy.
    After April 21, 2014, the app’s price increased to $79.99 and then later to its
    current price of $99.99\. Based on its price alone, Sketch has a huge advantage
    over the incredibly expensive Adobe Photoshop, Illustrator, or Creative Cloud.
    At $49.99 a month, this comes out to roughly $600 a year. Given its robust feature
    set, Sketch is a bargain considering the power it packs. Those who still aren’t
    sold on the software can download a free 30-day trial version.


    After Sketch 3 was released to the designer community, more frequent updates followed.
    Each subsequent update raised the bar in terms of performance improvements, new
    features, and bug fixes. As of this writing, the latest version of Sketch is Version
    3.3.3\. The Bohemian Coding team not only seems to be listening to the needs to
    designers and taking their needs into account, they also seem to be following
    one of the most notable startup edicts—listen and pay close attention to your
    customers, and iterate your product quickly.


    With a growing community of designers providing quality feedback, the team at
    Bohemian Coding made multiple changes and improvements to the program. They focused
    on making Sketch the dream “designer toolbox,” with everything a designer needs
    to make great websites and apps right at their fingertips.


    To be fair, it is important to point out that Sketch isn’t for everyone or every
    design. If you’re working with bitmaps in particular, then you likely won’t find
    a better editor than Photoshop. However, many designers have found that once they
    pick up Sketch, they can do most things that relate to UI design easily with it.


    In addition to the amazing improvements being made to the program, the developer
    community began to rally around the app, and a vibrant community of plug-ins was
    created to supplement what the app could not do. Bohemian Coding encouraged this
    third-party development and understood this as a way to build support in the development
    community. With the line between coding and design quickly being blurred, it was
    important to get developers on board as well. I cover some of the more helpful
    plug-ins later in this book.


    ### The Sketch 3 Interface


    The Sketch 3 interface is intentionally simple, minimalistic, and streamlined,
    as you can see in Figure [1-3](#A978-1-4842-1458-9_1_Chapter.html#Fig3). There
    is a toolbar across the top that allows for easy customization, and users can
    add or remove tools from this toolbar according to their personal preferences.


    ![A978-1-4842-1458-9_1_Fig3_HTML.jpg](A978-1-4842-1458-9_1_Fig3_HTML.jpg)


    Figure 1-3.


    The Sketch 3 interface


    The layers list on the left lets you name and find the layers on your design.


    The right side of the screen features the inspector, which offers you the tools
    to change the properties of items currently displayed on the screen. Every item
    on the screen can be changed or altered using the inspector.


    As you can see in Figure [1-4](#A978-1-4842-1458-9_1_Chapter.html#Fig4), compared
    to Photoshop with its massive list of tools and many windows, Sketch is barely
    there. Even after I became more comfortable with Photoshop, I was always daunted
    by the sheer number of features and tools it offered—some of which I’ve never
    used. With Sketch, virtually every feature will come in handy at some point. I
    find the interface to be welcoming. It’s bright, light, and not at all overwhelming—especially
    for a beginner. But don’t let the simplicity of the interface fool you. The simplicity
    is by design. Sketch is powerful graphic design software that allows you to create
    beautiful designs.


    ![A978-1-4842-1458-9_1_Fig4_HTML.jpg](A978-1-4842-1458-9_1_Fig4_HTML.jpg)


    Figure 1-4.


    Adobe Photoshop 6 interface'
