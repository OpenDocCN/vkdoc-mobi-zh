    \nFigure 11-2. The Sketch Toolbox website. You can download the Sketch Toolbox\
    \ plug-in from here\n\nAfter clicking \"Download the beta\" button on the site,\
    \ your download will automatically begin. You can install this application as\
    \ you would any other Mac OS application, by unzipping and dragging it into your\
    \ `Applications` folder.\n\n**Tip**  \nYour Mac OS settings may need to be changed\
    \ to allow applications from developers other than Apple to be installed on your\
    \ computer.\n\nOnce you've installed Sketch Toolbox, you can open it. You will\
    \ see a scrollable window with a listing of the plug-ins available for installation.\
    \ Sketch Toolbox allows you to install all plug-ins directly from this interface.\
    \ This is a much simpler way to install plug-ins. If you choose to install plug-ins\
    \ directly from GitHub, you will need to follow the directions provided previously.\
    \ Now, let's go through the process of installing an app via the Sketch Toolbox.\
    \ Figure [11-3](#A978-1-4842-1458-9_11_Chapter.html#Fig3) is a screenshot of the\
    \ Sketch Toolbox interface.\n\n![A978-1-4842-1458-9_11_Fig3_HTML.jpg](A978-1-4842-1458-9_11_Fig3_HTML.jpg)\n\
    \nFigure 11-3. The Sketch Toolbox interface\n\nAs you can see, it is fairly simple.\
    \ Plug-ins are listed in order alphabetically and there is a brief description\
    \ of what it does along with the name of the developer. You can choose to install\
    \ the plug-in by clicking the \"Install\" button on the interface or can also\
