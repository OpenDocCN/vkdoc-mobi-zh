    # 位图 vs. 矢量图


    你可能会问自己：“那么，除了价格和用户界面之外，`Sketch` 与 `Photoshop` 到底有何不同？”了解并理解两者的区别是很重要的。需要明确的是，有些
    `Photoshop` 能做的事 `Sketch` 根本做不到，而且它本身的设计初衷也并非去做那些事。`Sketch` 真正出色的地方在于界面设计。事实上，它似乎就是为此目的而专门构建的。因此，它为
    UI 设计师提供了更丰富的、量身定制的功能集。


    然而，一个主要区别在于，`Sketch` 是基于矢量的工具，而 `Photoshop` 不是。`Photoshop` 是一款照片编辑工具，并非为最佳的 Web
    或移动端 UI 设计而设计。正如我上一本书（*《学习 iOS 开发的设计》*，Apress，2014 年）中所提到的，`Fireworks` 是最接近 UI
    设计的合理替代品。但该应用未能流行起来，结果 `Adobe` 在 2013 年停止了对它的支持。


    可以说，在 `Photoshop` 中，真正对 UI 设计有用的功能比例估计只有大约 20%。这意味着设计师们下载并使用着一个上次我检查时大小接近 1GB
    的程序，而其中 80% 的功能对他们来说毫无用处，甚至根本不是为他们设计的。实际上，`Photoshop` 正如其名，本意是作为编辑和处理照片的工具。因此，它是基于**位图**的，意味着每张图像都由像素组成，这些像素被排列起来以显示图像。


    位图的一大优点是它们能显示大量颜色，并允许编辑人员利用位图格式获得漂亮的照明和阴影效果。不幸的是，它们在放大显示时无法不损失画质。因此，它们会产生相当大的文件。试着放大一张位图，你会很快失去画质。放大观看会显示出组成图像的每一个独立像素。设计师们多年来都明白，`Photoshop`
    最初是作为一款位图编辑工具开发的。的确，`Photoshop` 是由一些业余摄影师和程序员为了展示他们的摄影作品而创建的。有人会说，更合理的比较应该在 `Fireworks`
    和 `Sketch` 之间。然而，当 `Adobe` 在 2013 年停止支持 `Fireworks` 时，这一点就变得没有意义了。该程序仍然作为 `Creative
    Cloud` 的一部分提供，但 `Adobe` 没有计划继续为其提供修复程序。


    `Sketch` 是一款 100% 基于矢量的工具。**矢量**由点、线、曲线以及最重要的——数学构成。在第 3 章中，我们将看到 `Sketch` 如何允许设计师编辑数值来改变形状在屏幕上的显示方式。用肉眼观察位图和矢量图像时，它们看起来可能一样。但放大观看，你会发现，如前所述，位图由于是由像素构成的，放得越大，画质损失越严重。尤其是曲线，在位图上会显得模糊。而放大矢量图像则会呈现出不同的景象。无论放大多少倍，矢量图像都能保持其画质，无论尺寸如何变化，曲线都能保持清晰锐利。


    为什么这很重要？因为设计师被要求为各种屏幕尺寸和分辨率进行设计的情况越来越多，尤其是在移动设备方面。使用 `Sketch` 创建的矢量图，你可以省去像在 `Photoshop`
    中那样为适应市场上日益增多的屏幕尺寸和分辨率而进行 `@2×` 设计的麻烦。此外，`Sketch` 允许你以像素为单位进行设计，这恰恰是当今大多数界面的度量单位。


    图 1-5 展示了放大观看时位图和矢量图像显示效果的区别。这对那些必须跨平台并为 Retina 屏幕（正迅速成为移动显示标准，尤其是 iOS 设备）进行设计的设计师来说，具有重大意义。


    ![A978-1-4842-1458-9_1_Fig5_HTML.jpg](img/A978-1-4842-1458-9_1_Fig5_HTML.jpg)


    图 1-5.


    在 Sketch 3 中以 400% 比例查看的矢量形状


    请注意图 1-5 中在 `Sketch` 里创建的圆形形状曲线的平滑度。不放大时，矢量图和位图看起来差不多，可能很难区分。然而，一旦放大，你就会看到作为矢量的圆形曲线会异常锐利。


    在图形学中，矢量形状是使用**贝塞尔曲线**创建的。通常，矢量形状有两个由控制柄控制的点。每个点都允许用户操纵曲线。最终结果根据点的位置绘制而成。当我们在第
    3 章讨论形状时，会详细探讨贝塞尔曲线，但这就是处理矢量图以及它们如何保持锐利度的要点。矢量图可以缩放到任何尺寸，无论你放大多少倍或图像变得多大。这对设计师来说至关重要，并且它已成为
    `Sketch` 的标志性特性之一。


    图 1-6 展示了在 `Adobe Photoshop` 中创建的圆形形状。注意圆形那参差不齐的圆角边缘。位图是由像素构成的，一旦放大，或者如果图像尺寸增大，你会看到像素化现象在圆的边界处尤为明显。


    ![A978-1-4842-1458-9_1_Fig6_HTML.jpg](img/A978-1-4842-1458-9_1_Fig6_HTML.jpg)


    图 1-6.


    在 Adobe Photoshop 中以 200% 比例查看的位图形状


    因为 `Sketch` 是一款矢量图形工具，在该应用中创建的任何形状在缩放时都能保持其画质。


    作为设计师，拥有选择权很重要，而能够使用一款专门为设计师考虑而创建的工具至关重要。同时，需要注意的是，使用 `Sketch` 并不妨碍你继续使用 `Photoshop`
    和 `Creative Cloud`。完全有可能两者都使用，而且我相信有些设计师确实两者都用。`Sketch` 为设计师带来的是一种全新的灵活性和更精细化的工作流程。如果作为一名设计师，你的重点是用户界面或图标设计，那么你必须考虑到，对一些人来说，`Adobe
    Creative Cloud` 的成本可能过于高昂。


    长期以来，绝大多数设计师在工作中都偏爱 Mac 而非 PC，而且苹果公司对设计和创意的关注多年来一直备受赞誉。强尼·艾夫是全球创意设计师的现代英雄。他与史蒂夫·乔布斯的合作促成了世界上一些最具标志性产品的诞生。其中包括糖果色
    iMac、时尚的白色 MacBook，以及最终的 iPhone 和 iPad。设计师们多年来一直崇拜艾夫，自从史蒂夫·乔布斯去世后，艾夫帮助公司保持在设计领域的前沿。`Sketch`
    专门迎合设计师的需求，其价格点立即吸引了那些有兴趣尝试它的人。它与苹果公司的紧密契合使得设计师很容易探索这个新工具。


    `Sketch 3` 的一个主要特点是速度。该程序只有 32MB，运行速度很快，因为它在配备 Retina 屏幕的新一代英特尔 Mac 上占用的处理能力更少。第
    3 版还专门为 Mac 重新构建，并针对 OS X 进行了优化，对用户的需求响应迅速。它允许设计师使用其画板系统创建和查看整个项目，同时保持相对较小的占用量。任何使用过
    `Photoshop` 的人都知道，对于包含大量屏幕的复杂项目，PSD 文件的大小很容易达到数 GB。'
- fmt: '# Sketch 的独特优势


    通过专为 Mac OS X 构建，`Sketch`能够免费适配一些功能。例如，我之前提到过移除了`Fontcase`。`Sketch`现在可以使用 Mac
    OS 内置的字体渲染引擎。再加上自动保存功能，便形成了一个令人羡慕的组合。直接从 Mac OS App Store 下载也不会带来任何不便。


    ## 社区


    `Sketch`的另一个主要优势是它倾听广大社区的声音，这常常推动程序更新。这里有 Twitter 列表、Facebook 群组，甚至在线博客平台 Medium
    上还有一份精心策划的文章列表（见图 [1-7](#A978-1-4842-1458-9_1_Chapter.html#Fig7)）。版本更新同时解决了社区成员关心的问题以及开发者关注的问题，而这些都建立在它们已为程序创造的坚实基础上。


    ![A978-1-4842-1458-9_1_Fig7_HTML.jpg](A978-1-4842-1458-9_1_Fig7_HTML.jpg)


    图 1-7. Facebook 上的 `Sketch` 社区


    `Bohemian Coding`网站自豪地列出了其他与`Sketch`集成的应用程序、专注于该程序的群组和网站，以及为任何想学习该程序的人提供的资源。他们还提供了一种基于订阅的新闻通讯，直接回答社区提出的问题，提供常见问题的帮助，并介绍有助于用户工作流程的插件。总而言之，`Sketch`社区相当资源丰富。除了免费资源，还有
    Udemy 上的付费课程，甚至还有由`Sketch`设计师`Christopher Downer`在`TreeHouse`上教授的`Sketch`课程。


    `Meng To`创建了这些独立课程中最受欢迎的之一。`Meng`是一位设计师，也是“设计师也应该会编码”这一日益壮大思潮的坚定支持者。他撰写了`Design
    & Code`，这是一本电子书，教设计师如何通过使用`Xcode`进行一些基础编码，来掌握 iOS 设计的精妙之处。在书中，他大力称赞使用`Sketch`和名为`Flinto`的在线原型制作工具可以轻松制作原型。`Meng`现在环游世界，开设现场课程，教授设计师如何使用`Sketch`设计应用，并使用苹果的新开发语言`Swift`构建它们。`Design
    & Code`促使我再次仔细审视`Sketch`——我很高兴我这么做了。


    我一直觉得`Photoshop`的用户界面令人生畏。可用的工具数量之多，甚至成为我想要学习如何使用它的障碍。我从一些初次接触设计的设计师那里也听到了类似的故事。`Sketch`有一个精简的界面，与
    Adobe 的另一款工具`Fireworks`更为相似。我喜欢`Fireworks`，因为它似乎和`Sketch`一样，是为设计师设计的；具体来说，是那些更专注于
    Web 和移动应用用户界面设计的设计师。当我第一次打开`Sketch`时，我立刻感到舒适。我可以自定义工具栏，包含我最常用的工具。这让我能够在更少干扰的情况下花更多时间进行设计，这促使我尝试使用我所需要的特定工具。


    `Photoshop`并非是唯一可以比较的对象。市面上当然还有其他设计工具。还有一些其他的小众图形程序，可以吸引那些正在寻找`Photoshop`替代品的设计师。像`Skala`这样的应用，对于正在寻找专为他们量身打造的差异化工具的设计师来说，是值得考虑的替代品。


    特效是设计师会欣赏`Sketch`的另一个原因。此外，能够一次为一个图层添加多个效果，是对`Sketch`功能集的一个很好的补充。这包括模糊、反射、边框以及内阴影和外阴影。


    使用`Sketch`进行导出，就像进行几次选择和点击几个按钮一样简单。可以以多种分辨率导出整个画板。如果你曾尝试在其他程序中导出设计，你会欣赏这个功能。


    ## iOS 9


    `iOS 9`是 iPhone 操作系统的最新版本。关于其“引擎盖下”的改动已经说了很多，而有些人则认为这些改动基本上都是次要的。尽管如此，尽管`iOS 9`提供了一些可能不为人所见的优化，但它仍然是一个重要的更新。


    你可能还记得，2013 年，苹果彻底改革了 iOS 的用户界面，自 2007 年第一款 iPhone 发布以来首次改变了外观。`iOS 7`为 iPhone
    和 iPad 用户带来了完全不同的观感和体验。它摒弃了拟物化设计，转向了扁平化设计的趋势。它还引入了诸如“控制中心”之类的新工具，这是一个从屏幕底部向上滑动即可升起的面板，显示一个磨砂面板，提供对飞行模式、蓝牙和其他选项的便捷访问。新操作系统还为苹果引入了一种全新的“扁平化设计”语言。设计人员不得不接受，他们也确实这样做了。事实上，新的应用程序都具有`iOS
    7`特定的观感和体验。


    `iOS 8`通过添加`HealthKit`和`HomeKit`等框架进一步优化了用户界面。但这两者都没有代表设计语言的重大转变，也没有给设计师带来重大问题。


    `iOS 9`于 2015 年秋季发布，是苹果移动设备操作系统的最新迭代版本。因此，你可能会问自己该期待什么，以及在使用`Sketch`进行设计时如何应对这些变化。好消息是，从设计的角度来看，需要设计师担心的变化并不多。`iOS
    9`的核心在于为移动设备操作系统提供了更高的稳定性和修复，并对 iOS 的核心应用程序系列进行了更多更改。这些更改将为用户提供跨设备的更一致体验、错误修复、性能的显著提升，以及最引人注目的是，操作系统体积的显著减小。用户可以期待诸如多任务处理、新键盘、像`Apple
    News`这样的新应用，以及向`Apple Maps`添加公共交通信息等新功能。


    虽然从设计角度来看这些变化并不显著，但设计师需要了解几个功能特性；这些特性不仅将改变用户与其设备的交互方式，还可能影响与应用程式的交互。


    ### 应用切换器


    通过双击 Home 键仍然可以在应用之间切换；然而，这样做现在会显示所有当前打开程序的较新的垂直视图。用户可以像以前一样滑动浏览。


    ### 照片的新导航方式


    现在，当在“相机胶卷”中浏览照片时，你可以简单地在一列照片上滑动，以更详细地查看其中一张。你不再需要单独点按每张照片。


    ### 新的返回按钮


    添加一个允许用户返回上一个程序的返回按钮，标志着`iOS 9`中的一个新导航元素。该按钮允许用户无需按 Home 键即可导航回上一个程序。'
  raw: 'By being built exclusively for Mac OS X, it allows the program to adapt some
    features for free. For example, I mentioned the removal of Fontcase previously.
    Sketch now is able to use Mac OS’s built-in font rendering engine. Add auto-save
    to that, and you’ve got an enviable combination. A direct download from the Mac
    OS App Store doesn’t hurt either.


    ### Community


    Another major benefit of Sketch is that it listens to a large community which
    often drives program updates. There are Twitter lists, Facebook groups, and even
    a curated list of articles on Medium, the online blogging platform (see Figure
    [1-7](#A978-1-4842-1458-9_1_Chapter.html#Fig7)). Releases address a combination
    of concerns that are important to community members, as well as issues that are
    important to the developers, which build on the solid base that they have created
    with the program.


    ![A978-1-4842-1458-9_1_Fig7_HTML.jpg](A978-1-4842-1458-9_1_Fig7_HTML.jpg)


    Figure 1-7.


    Sketch community on Facebook


    The Bohemian Coding website proudly lists other apps that integrate with Sketch,
    groups and sites that focus on the program, as well as resources for anyone wanting
    to learn the program. They also offer a subscription-based newsletter that directly
    addresses questions from the community, offers help on common issues, and features
    plug-ins to help users with their workflow. All in all, the Sketch community is
    fairly resourceful. In addition to the free resources, there are paid courses
    on Udemy and even a Sketch class on TreeHouse taught by Sketch designer Christopher
    Downer.


    Meng To created one of the most popular of these independent courses. Meng is
    a designer and a strong proponent of the growing school of thought that designers
    should also code. He wrote Design & Code, which is an electronic book that teaches
    designers the finer points of designing for iOS with some basic coding using Xcode.
    In it, he raves about the ease of using Sketch and an online prototyping tool
    called Flinto for making easy prototypes. Meng now travels the world offering
    live classes that teach designers how to design apps using Sketch and build them
    using Swift, Apple’s new development language. Design & Code prompted me to take
    another, closer look at Sketch—and I’m glad that I did.


    I’ve always found Photoshop’s UI to be daunting. The sheer number of tools available
    was a barrier to me even wanting to learn how to use it. I’ve heard similar stories
    from some first-time designers. Sketch has a pared-down interface, and it is more
    similar to Fireworks, another Adobe tool. I liked Fireworks because it seemed
    to be created, like Sketch, with designers in mind; specifically, designers who
    were more focused on user interface design for the Web and mobile apps. When I
    opened Sketch for the first time, I immediately felt comfortable. I was able to
    customize the toolbar to include those tools that I would use most often. It allowed
    me to spend more time designing with fewer distractions, which led me to try to
    out the specific tools that I needed.


    Photoshop isn’t the only comparison to make. Surely there are other design tools
    on the market. There are other niche graphics programs on the market that could
    appeal to designers who are looking for an alternative to Photoshop. Apps like
    Skala come to mind as worthy alternatives for designers who are looking for something
    different and built with them in mind.


    Effects are another reason that designers will appreciate Sketch. Moreover, being
    able to add more than one effect to a layer at a time is a great addition to the
    feature set of Sketch. This includes blurs, reflections, borders, and inner and
    outer shadows.


    Exporting with Sketch is as easy as making a few selections and clicking a few
    buttons. It is possible to export an entire artboard at multiple resolutions.
    You will appreciate this feature if you’ve tried to export your designs in other
    programs.


    ## iOS9


    iOS9 is the latest version of the iPhone operating system. Much has been said
    of the “under-the-hood” changes that have been made, while some have claimed that
    they changes are largely minor. Nevertheless, though iOS9 offers optimizations
    that may not be apparent to the eye, it is still a significant update.


    You might recall that in 2013, Apple overhauled the user interface of iOS, changing
    the look for the first time since the original iPhone release in 2007\. iOS7 introduced
    an entirely different look and feel to iPhone and iPad users. It moved away from
    skeuomorphism and towards the trend of flat design. It also introduced new tools
    like the Control Center, a panel that rises with a swipe from the bottom of the
    screen to reveal a frosted panel offering easy access to airplane mode, Bluetooth,
    and other options. The new OS also introduced a brand-new “Flat Design” language
    for Apple. Designers had to get on board, and they did. Indeed new apps featured
    an iOS7-specific look and feel.


    iOS8 further refined the UI with the addition of frameworks like HealthKit and
    HomeKit. But neither of these represented huge shifts in the design language or
    presented major issues for designers.


    Released in the fall of 2015, iOS9 will be the latest iteration of the operating
    system for mobile devices by Apple. So, you might be asking yourself what to expect
    and how to manage these changes while designing using Sketch. The good news is
    that from a design standpoint, there haven’t been many changes that designers
    need to worry about. iOS9, at its core, offers more stability and fixes to the
    mobile device operating system and more changes to iOS’s core stable of applications.
    The changes will offer users a more a consistent experience across devices, bug
    fixes, a considerable boost in performance, and, most notably, a significant reduction
    in the size of the OS. Users can expect new features like multitasking, a new
    keyboard, new apps like Apple News, and the addition of public transit information
    to Apple Maps.


    While the changes aren’t significant from a design standpoint, there are a few
    features of which designers will need to be aware; not only will these features
    change how users interact with not only their devices, but they could also affect
    interaction with apps.


    ### App Switcher


    Switching between apps is still possible by double-clicking the Home button; however,
    doing so will now reveal a newer vertical view of all of the programs currently
    open. Users are able to swipe through as before.


    ### New Navigation for Photos


    Now when going through photos in your Camera Roll, you can simply swipe along
    a list of photos to view one in greater detail. You no longer have to tap each
    photo individually.


    ### New Back Button


    The addition of a Back button that allows users to go back to a previous program
    marks a new navigational element in iOS9\. The button allows users to navigate
    back to a previous program without hitting the Home button.'
