    \ 3-17，在检查器面板弹出窗口的底部有一行字段。从左到右依次是 `Hex`、`R`、`G`、`B`、`A`。`Hex` 代表十六进制代码，是 HTML\
    \ 和 CSS 中颜色的数字表示。每种颜色都有不同的十六进制代码。`Hex` 字样上方的字段是 Sketch 允许你输入特定颜色十六进制代码的地方，从而无需使用取色器。这些字母分别代表红、绿、蓝三种颜色。取色器下方的这些字母也表明\
