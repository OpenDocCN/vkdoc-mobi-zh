- fmt: '### New System Font: San Francisco


    The system font for iOS has been updated. Some of you might remember that iOS
    made heavy use of Helvetica as its official system font. This has been updated
    to a custom font Apple calls San Francisco. Those with a keen eye will notice
    a subtle difference between the two fonts, but most will agree that it is not
    significant (see Figure [1-8](#A978-1-4842-1458-9_1_Chapter.html#Fig8)). There
    has been some debate in the design community as to whether San Francisco is more
    “readable.” Apple sure thinks so.


    ![A978-1-4842-1458-9_1_Fig8_HTML.jpg](A978-1-4842-1458-9_1_Fig8_HTML.jpg)


    Figure 1-8. San Francisco and Helvetica Neue fonts


    San Francisco is from the San Serif family tree, and it consists of two different
    fonts: the SF and the SF Compact fonts. The SF font ships on iOS and OS X, and
    SF Compact ships with the Apple Watch. The two are related, but there are slight
    differences in the round states and slightly more space between letters to improve
    readability in the San Francisco font. The font also covers a variety of languages
    like Greek, Vietnamese, and Polish. The typeface was created by the Apple team.


    ## The Apple Watch


    While WWDC is typically when new operating systems are announced, during a special
    September event in 2014, Apple announced a new product—the Apple Watch. Naturally,
    this had the designer world buzzing. It also presented a new design challenge
    for those who work on iOS. Surely the new watch would run on a version of iOS,
    and it did.


    To date, quite a few Apple Watch apps have made it into the Apple App store since
    its official launch in April 2015. Some major retailers, including Target, Starbucks,
    eBay, and Nike have released Apple Watch apps in the store and some not-so-major
    ones have as well.


    The Apple Watch arrived with a fair amount of excitement from pretty much everyone
    working in tech. Apple was making a long-rumored venture into the world of wearables,
    and with their penchant for design, the world was waiting to see not only what
    the watch looked like but how it would work and what challenges, if any, it would
    present for designers.


    As shown in Figure [1-9](#A978-1-4842-1458-9_1_Chapter.html#Fig9), the Apple Watch
    comes in two sizes; 38mm and 42mm (measured by height). Thus the screens are roughly
    340px by 272px for the 38mm version and 390px by 312px for the 42mm version.


    ![A978-1-4842-1458-9_1_Fig9_HTML.jpg](A978-1-4842-1458-9_1_Fig9_HTML.jpg)


    Figure 1-9. The Apple Watch comes in two sizes, 38mm and 42mm


    Both Apple Watch sizes show the same content and use Dynamic Type to make sure
    that items shift to fit in the available space.


    As with every other Apple product, the Apple watch has its own Human Interface
    Guidelines. If you’re interested in designing for the Apple Watch, you should
    study and read these guidelines. The Apple Watch has very specific design principles
    when it comes to typography, color, customization, icons, and animation.


    The Apple Watch runs on its own software called watchOS. Now in version 2, it
    is a modified version of iOS, and it runs only on the Apple Watch.


    I won’t go into specifics on designing for the Apple Watch in this book, but suffice
    it to say that the watch presents not only a new frontier, but new challenges
    for designers. And, as usual, there are Sketch Apple Watch templates available
    for your download and use.


    Other changes to iOS9 include new apps, like News, and new features and improvements
    to the Maps and Notes apps. While there may not be any specific changes to the
    overall design language of the operating system in iOS9, it is important to note
    some of these apps, especially the new ones, offer a new way of presenting information.
    In them, you can find clues as to where Apple is going with their design language.
    Designers who are new to designing for iOS are encouraged to peruse these new
    apps to understand best design practices for their products. For example, if you’re
    just starting out and you are curious about the best way to implement a segmented
    control, aside from the Human Interface Guidelines, Apple’s built-in apps are
    the best way to learn how to be a great iOS designer (see Figure [1-10](#A978-1-4842-1458-9_1_Chapter.html#Fig10)).


    ![A978-1-4842-1458-9_1_Fig10_HTML.jpg](A978-1-4842-1458-9_1_Fig10_HTML.jpg)


    Figure 1-10. Old and new built-in apps in iOS9 Tip


    Currently, Apple’s built-in apps now number 29. In addition to these, there are
    an additional 11 apps that users can download from Apple.


    ## Summary


    While Sketch was originally created for the Mac and OSX, Sketch and iOS make a
    great combination for designers interested in creating apps. With Sketch, designers
    who design for iOS, watchOS, and even MacOS now have a tool specifically developed
    for them. The makers of Sketch have said repeatedly that they have no intention
    of producing a Windows version of the program. This means that the program will
    continue to evolve with Mac users in mind. Designing for iOS with Sketch makes
    sense for anyone willing to take the time to learn the program and dive into properly
    designing apps for iPhones and iPads. Learning Sketch is a great first step.


    In the next chapter, we walk you through installing Sketch and introduce you to
    the interface and other features that you will need to know as you begin your
    journey of designing for iOS with Sketch.


    # Getting Started with Sketch


    The latest version of Sketch is Sketch 3 (version 3.3.3 to be exact), and this
    book assumes that you are running this version. If you have an older version,
    you will need to update it. As mentioned, Sketch is a Mac-only application, and
    it requires OS X (Mavericks) or later to run. If you are running an older version
    of Mac OS X, you will also need to update that.


    ## Installation


    To install Sketch, you can either download it directly from the Mac App Store,
    or purchase the app directly from the Bohemian Coding website, as shown in Figure
    2-1. You can also download a trial version for free. If you have a trial version,
    once it expires, go to the Sketch menu in the program and select Registration.
    The program will take you through the registration process by asking for your
    license key. Whether you purchased Sketch from the Mac OS App Store or directly
    from Bohemian Coding, Sketch costs $99.99.


    ![A978-1-4842-1458-9_2_Fig1_HTML.jpg](A978-1-4842-1458-9_2_Fig1_HTML.jpg)


    Figure 2-1. You can purchase Sketch 3 directly from the Bohemian Coding site


    To install the app that you purchased from Bohemian Coding, download it and move
    the program from the Downloads folder to the Applications folder. You can also
    just double-click the downloaded `.DMG` file and follow the directions. Either
    way, the file must be added to your Applications folder.


    Once it’s there, you can then double-click to start the program. That should be
    it! You’ve now installed the exciting new design program Sketch, and you are ready
    to learn more about designing for iOS!'
