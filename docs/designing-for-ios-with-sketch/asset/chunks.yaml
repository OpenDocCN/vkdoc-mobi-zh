    \ and select \"Reveal Plugins Folder.\" Sketch will automatically open a new window.\n\
    \n![A978-1-4842-1458-9_11_Fig1_HTML.jpg](A978-1-4842-1458-9_11_Fig1_HTML.jpg)\n\
    \nFigure 11-1. The plug-in drop-down window from the Sketch menu\n\nDrag the Sketch\
    \ file into the plug-in folder. Your plug-in should now be installed.\n\n### Sketch\
    \ Toolbox\n\nArguably, the first plug-in you will want to install is Sketch Toolbox.\
    \ It's like a browser that lists lots of plug-ins available for Sketch. In it,\
    \ you will find a selection of awesome plug-ins that you can install right from\
    \ this one plug-in. It is highly recommended to be the first plug-in that you\
