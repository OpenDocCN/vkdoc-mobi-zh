  trans: '

    # Sketch Mirror


    虽然我在第 1 章中简要提及了 Sketch Mirror，但毫无疑问，在为 iOS 进行设计时，这项功能可以节省大量时间。`Sketch Mirror`
    是 Mac 端 `Sketch` 应用程序的配套应用，它让你在设计过程中就能直接在设备上预览设计方案。还记得使用其他图形程序时的情形吗？你通常需要以正确的分辨率导出图像，发给自己，然后在目标设备上打开预览。确实有些繁琐。现在，有了
    `Sketch Mirror`，你可以在 iPhone 或 iPad 上安装该应用，确保它与你的电脑连接到同一个 Wi-Fi 网络，就能直接在设备上预览你的设计。在查看设计时，根据你的画板设置方式，你可以在显示预览的设备上，于
    `Sketch` 文档的画板和页面之间滑动切换。`Sketch Mirror` 的另一个优点在于，你可以设置多台设备来查看你的设计。这使得通用应用的设计变得更加轻松顺畅。`Sketch
    Mirror` 让设计者查看并进行必要调整的过程变得极其简单，而且只需从 Mac 应用的工具栏中即可轻松访问。图 6-14 展示了一个画板在 Mac 上以及通过
    `Sketch Mirror` 在 iPhone 6 上预览的图像。


    ![A978-1-4842-1458-9_6_Fig14_HTML.jpg](img/A978-1-4842-1458-9_6_Fig14_HTML.jpg)


    图 6-14. `Sketch Mirror` 让你在 Mac 上查看设计的同时，也能在设备上直接预览。


    # 其他工作流工具


    你会发现，作为设计师，最终不可避免地需要跳出你偏好的图形程序，与团队其他成员进行协作。下面我将介绍一些我个人使用过的工具，但你可能会发现自己更倾向于不同的程序，这完全没问题。目标在于找到那些能与你自身风格和工作方式相辅相成的程序，从而节省处理琐事的时间，将更多精力投入到你所热爱的事情上，希望那就是设计本身。


    ## Flinto


    `Flinto` 是一款原型设计工具，它能让你轻松地将所有画板导入，在它们之间创建链接和交互，并生成一个原型。虽然市面上的原型工具不少，但我发现 `Flinto`
    是最易上手的一款。由于 `Sketch` 的画板已经是正确的尺寸，`Flinto` 能让你轻松查看、理解并创建应用中各个屏幕之间的关系。这样一来，工作重心就从单纯的设计应用，转变为真正关注应用的工作方式以及用户将如何与之交互。这便是从
    UI（用户界面）到 UX（用户体验）的必然转变，也是许多设计师当前正在应对的重要转变。


    用户只需通过拖放，或者通过 Dropbox（该应用提供了便捷的 Dropbox 集成功能）将屏幕导入 `Flinto` 画布即可，如图 6-15 所示。之后，你可以添加所需的连接和交互，并在设备上或程序界面内直接预览。如果某些功能不工作，可以快速修复，更新链接或更改过渡效果。要替换某个屏幕，只需将新屏幕拖放到旧屏幕上，`Flinto`
    便会自动更新。


    ![A978-1-4842-1458-9_6_Fig15_HTML.jpg](img/A978-1-4842-1458-9_6_Fig15_HTML.jpg)


    图 6-15. `Flinto` 界面易于使用，允许你通过拖放将屏幕导入界面。


    `Flinto` 还会模拟一些标准的 iOS 过渡效果，并且你可以轻松地为大多数页面添加返回按钮。你甚至可以添加启动图像和应用图标，让用户获得真实的应用体验。


    全部完成后，你可以通过电子邮件将原型发送给潜在用户，甚至可以通过短信发送。当你不断迭代你的应用时，你的用户会自动看到更新后的版本；如果出于任何原因你需要撤销对应用的访问权限，操作过程也非常简单。市场上有很多原型设计工具，但
    `Flinto` 无疑是其中最易上手的之一，也是我的最爱。


    ## Flinto for Mac


    `Flinto` 团队近期发布了 `Flinto for Mac`，这是一款适用于 OS X 的原型设计应用，允许设计者创建简单或更全面的、包含复杂交互的原型。尽管我个人还没有尝试过
    `Flinto for Mac`（在我撰写本文时它几乎还是全新的），但它已获得我所信任和尊敬的设计师们的高度评价。它允许你无需编程，在同样直观易用的界面内（与
    `Flinto` 网页应用类似，参见图 6-16）创建一系列复杂的动画。你可以从任何图形程序中拖放资源，或者使用 `Sketch` 插件，该插件能让你自动将设计从
    `Sketch` 导入到 `Flinto for Mac` 中。该应用还允许你在设备上进行预览，以便也能在应用上测试你的过渡效果。


    ![A978-1-4842-1458-9_6_Fig16_HTML.jpg](img/A978-1-4842-1458-9_6_Fig16_HTML.jpg)


    图 6-16. 全新原型工具 `Flinto for Mac` 的欢迎界面。


    ## Marvel


    `Marvel` 是另一款有用的原型设计工具，它让应用原型制作变得非常简单（见图 6-17）。它的工作原理与 `Flinto` 大致相同。你可以通过 Dropbox
    将屏幕导入 `Marvel`，添加热区、链接和过渡效果，然后进行测试。当你准备好与他人分享原型时，你可以通过电子邮件（唯一 URL）、短信、二维码发送，甚至可以直接将原型嵌入到你的网站中。如今，鼓励设计师频繁迭代和测试。有了这些原型设计工具，这项工作变得容易得多，让你无需编写任何代码就能进行必要的更改。同样值得注意的是，`Marvel`
    也有一款移动应用，它将网页应用的某些功能带到了你的 iPhone 上。你可以实际拍摄你绘制的草图，并直接在应用内将它们链接起来。


    ![A978-1-4842-1458-9_6_Fig17_HTML.jpg](img/A978-1-4842-1458-9_6_Fig17_HTML.jpg)


    图 6-17. `Marvel` 移动应用的屏幕截图，可以让你随时随地进行原型创建。

    '
- fmt: '### Dropbox


    Last but not at all least in the workflow sections is `Dropbox`, the popular cloud
    storage tool. While `Dropbox` is not at all a design-only tool, it is a valuable
    tool for designers to be able to not only store, but to share their designs with
    the world. As you may have already noted as well, some of the prototyping tools
    that I’ve already mentioned here in this section were either built on the `Dropbox`
    `API` or use it for authentication. This means that if you already use `Dropbox`
    to store your designs, you can easily import them into either `Flinto` or `Marvel`
    to speed up your workflow and allow you to focus less on file sizes and types
    and more on the quality of your work. With `Flinto`, you can store all of your
    images in `Dropbox` and `Flinto` keeps them in synch if you happen to make changes
    or updates to them. Both programs ask for access to your `Dropbox` account in
    order to maintain this feature. `Flinto` will ask to connect your `Dropbox` account,
    as shown in Figure [6-18](#A978-1-4842-1458-9_6_Chapter.html#Fig18).


    ![A978-1-4842-1458-9_6_Fig18_HTML.jpg](A978-1-4842-1458-9_6_Fig18_HTML.jpg)


    Figure 6-18. `Dropbox` `One-Time Setup` window


    These are just some of the tools that you can incorporate into your workflow as
    you work on your app in `Sketch`. Some you will like more than others. What’s
    really important is to try a few out. Most of these apps have a free trial period
    in which you can experiment and see what works best for you and your design needs.
    If helps to try specific tasks and see where you can save time. If something shaves
    valuable time off a process or task then keep it. Also, explore ways in which
    you can customize these programs further to suit your needs. When it comes to
    some of these programs, customization is key, as with `Sketch`.


    ### InVision


    `InVision` is a Web-based prototyping tool that has become quite popular with
    designers. It’s great for collaboration with large teams when there are many people
    who need to weigh in on designs quickly. This includes clients, other designers,
    project managers, or just the team at large. `InVision` lets you collect feedback
    from within the interface, and it allows you to track multiple versions of your
    design accurately, which can be an issue when working with large teams. The interface,
    as shown in Figure [6-19](#A978-1-4842-1458-9_6_Chapter.html#Fig19), is fairly
    simple, and you can sign up for free to try it out with one design. Additional
    designs are available, depending on your needs, for a monthly fee.


    ![A978-1-4842-1458-9_6_Fig19_HTML.jpg](A978-1-4842-1458-9_6_Fig19_HTML.jpg)


    Figure 6-19. `InVision` interface


    ## Summary


    Everything listed in this chapter is optional. However, the more that you design,
    the more you will come to know that speed and efficiency are keys to becoming
    a great designer—especially when you’re dealing with clients and a team. Tips
    like setting preferences, getting your color palette just right, and setting up
    your document will go a long way to making you a fast and efficient designer.


    But `Sketch` is just one program. The other programs mentioned in this chapter
    are included to help augment what `Sketch` can do. Many of them are available
    on a trial basis, so you can try them out for free until you find one that you
    wish to purchase.


    In the next chapter, we’ll discuss how to begin wireframing your app with `Sketch`
    and the tools listed previously. Then you should be ready to dive right in.


    # 7. Wireframing Your App with Sketch


    As you may already know, wireframing is a great way to map out what your app will
    do and how it will do it before we move into the design stage. Wireframes are
    the blueprint of your app. They are often devoid of color or styling and you can
    focus on the basics of what your app will do before you add beautiful colors and
    effects we discussed earlier. When you wireframe your app, your goal is to focus
    on the functionality and details of how the user will interact with all the screens
    in your app.


    If your app is fairly simple, you might be able to get away with not wireframing
    your app at all. But, I recommend always going through the wireframing process.
    It helps to clarify functionality in the early stages and gives you a clear understanding
    of how your app will behave once it’s built. There are numerous tools available
    for wireframing: `Balsamiq`, `MockFlow`, `UXPin`, `Omnigraffle`, and `Axure`,
    to name a few. They range in cost from totally free to a few hundred dollars for
    a single license. If you’ve been using a particular tool to wireframe out your
    apps and it works well for your workflow, then I encourage you to stick with it.
    But if you’re looking for a new tool that will help to speed up the overall process,
    then I encourage you to look no further than `Sketch 3`. Since we’ll be designing
    our app in `Sketch` anyway, why not use it to wireframe your app as well? Many
    of the processes we’ve learned thus far in the previous chapters are well suited
    for not only designing but also for your wireframes.


    There are some who believe that the process of wireframing should be very simple
    and quick. I am not one of those people. I believe that wireframing above all,
    should be thorough. If that takes one hour or five days, then so be it. In the
    end, you will have immersed yourself in the process of creating your app and will
    also be the person most qualified and able to design it. Wireframing is where
    you really get to understand the app you are about to design, so I think that
    this process can be short or long but more importantly it should be complete and
    should never be rushed as this will inevitably lead to issues later on in the
    design and build phases of your project. You will be exploring where elements
    in your app fit on the screen to be accessed by a user, so spending this time
    to get to understand that `UI` is critical. Therefore, if you take some much-needed
    extra time to complete your wireframes, that’s perfectly fine.


    In this chapter we will briefly discuss various techniques and processes for using
    `Sketch` to create your wireframes. We already discussed that `Sketch` has a thriving
    community and there are now quite a few websites that have been set up for the
    sole purpose of providing `Sketch` resources. We will list them later on in this
    book but for the purpose of wireframing you can do a simple search on Google for
    `Sketch wireframing tools` to see what’s out there. You’ll find that there are
    wireframing templates galore and you should be able to find one that suits your
    needs.


    If you, like me, lean towards low-fidelity wires with very little or no branding,
    you might want to try to download one of the many templates that offer a sparse
    look and feel and that allow you to focus on the user experience as much as possible.
    It’s also a good idea to try to find a template that will take advantages of some
    of `Sketch`’s awesome features that will greatly improve your workflow. For example,
    `Sketch` guru `Meng To` has a few wireframing templates on his site that are fairly
    monochrome and use subtle shades of blue and gray. They are pretty good looking,
    are free to download, and are `Sketch` files that you can import right into your
    canvas and begin to work.


    Tip


    `Meng To`’s site has great `Sketch` tips: [`http://blog.mengto.com/`](http://blog.mengto.com/).'
