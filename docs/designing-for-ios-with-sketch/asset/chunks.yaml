  trans: '

    ### 电子邮件注册


    接下来我将创建的页面是电子邮件注册页面。一旦用户选择使用电子邮件认证来注册我们的应用，应用将要求用户输入用户名、电子邮件地址以及用于登录应用的密码。在屏幕最底部，我们将添加一个提交按钮，该按钮将启动与后端服务器的注册流程。


    我们需要在此页面上创建三个输入字段：一个用于用户名，一个用于密码，另一个用于确认密码。然后，我们可以添加按钮。在页面上仔细排列所有元素时，我们可以参考之前的页面，以确保所有元素对齐，如图
    7-6 所示。


    ![A978-1-4842-1458-9_7_Fig6_HTML.jpg](img/A978-1-4842-1458-9_7_Fig6_HTML.jpg)


    图 7-6.


    第二个注册屏幕，包含用户名、密码、密码确认的输入字段以及一个“进入”按钮


    在设计线框图时，通常会创建一个备用屏幕，展示当键盘弹出且用户输入信息时，屏幕上的元素将如何移动。在线框设计过程中，最好展示尽可能多的视图，以便明确内容在屏幕上的放置位置，不留疑问。


    图 7-7 展示了 PhotoBomb 登录屏幕，其中键盘已弹出，光标位于用户开始输入用户名的地方。理念是页面内容及关联字段会随键盘弹出而上移。初次设计者最好与工程师讨论此功能，因为键盘遮挡文本字段在新设计中相当常见。


    ![A978-1-4842-1458-9_7_Fig7_HTML.jpg](img/A978-1-4842-1458-9_7_Fig7_HTML.jpg)


    图 7-7.


    PhotoBomb 登录屏幕，键盘和光标作为开发者的参考


    在电子邮件注册中，通常用户会收到一封发送至注册邮箱的验证邮件，以验证其身份。验证通过后，用户将被带回应用完成注册流程。通常情况下，用户会直接在移动设备上验证邮箱，因此整个过程相对顺畅。


    ### 主页


    现在，用户已完成应用注册且身份得到确认，他们正式进入应用。主页是用户在注册后看到的第一个页面，也是每次打开 PhotoBomb 应用时都会返回的页面。因此，此屏幕上的元素比应用中几乎任何其他页面都更重要。该页面必须兑现应用的承诺。无论最初是什么原因促使用户下载应用，他们都会期望在此屏幕看到这些内容。页面必须在极短时间内引导用户理解应用的完整用途。同时，页面还必须包含导航元素，以便用户从此处导航至应用的其他页面，并在需要时随时返回。在思考此页面时，我将参考图
    7-2 中的笔记。这将帮助我提醒自己应用的总体目标，并始终牢记在心，确保页面上的所有内容都易于访问和查找。这是应用主要功能所在的页面。


    参考列表后，我们决定对该页面采用直观的设计方法。作为一个基于位置的应用，该页面将在主屏幕上放置一张地图，并在底部添加一个标签栏，用于引导用户进入应用的其他区域。此外，页面上还设有区域，供用户查看附近其他用户“轰炸过”或标记过的照片位置。用户还可以看到每个用户的头像，便于识别。


    在图 7-8 中，我们展示了主页的基本线框图。如同线框图一样，图标仅用于占位，并粗略表示元素在屏幕上的位置。该页面通过导入来自 Death to Stockphotos
    的免版税图片以及 Pixel Love 的图标创建而成。标签栏中的图标是线框模板的一部分；我们只是更改了每个图标对应的标题。


    ![A978-1-4842-1458-9_7_Fig8_HTML.jpg](img/A978-1-4842-1458-9_7_Fig8_HTML.jpg)


    图 7-8.


    PhotoBomb 应用主页的线框图


    我们的地图图钉图标是通过互联网搜索随机找到的，而地图背景则从包含在 Sketch 中的 iOS 设计模板中导入。


    ### 个人资料页面


    如果用户需要注册应用并从其相册中选择照片作为头像，那么通常建议在应用中添加一个个人资料页面。这样，用户可以随时更改其个人资料。有时个人资料页面可以在“设置”页面内编辑，有时则不能。我认为展示
    PhotoBomb 用户个人资料页面的样子是有价值的，因为作为移动设计模式，该页面的呈现方式有多种。我决定尽可能保持个人资料页面的简洁，但对该页面形态进行快速线框设计，将有助于我们后续进入应用的设计阶段。


    个人资料页面是一种常见的设计模式，快速搜索 Pttrns、Mobile Patterns 或 Inspired UI 等流行设计模式网站，会发现有多种不同的方式来呈现这类信息。不过，大多数页面都有几个共同点，例如用户照片以及与应用相关的其他信息，如关注者、点赞数、访问过的地方、好友等。你可以查看并决定哪种方式最适合自己，或者创建自己的设计。但请记住，个人资料页面应提供比应用其他位置更详尽的用户信息。


    此页面是通过从早期屏幕中复制一个空白屏幕开始创建的。设计思路是，用户在上一页的线框图中点击“编辑个人资料”单元格后，会跳转至此页面。进入此页面后，用户可以点击“编辑”按钮进行任何修改。


    我从主页导入了用户图像，并将其放大并居中。通过使用不同大小的文本块创建页面的其余部分，最终形成了图 7-11 所示的个人资料页面线框图。


    ![A978-1-4842-1458-9_7_Fig11_HTML.jpg](img/A978-1-4842-1458-9_7_Fig11_HTML.jpg)


    图 7-11.


    PhotoBomb 个人资料页面

