  trans: '

    ### 新手引导


    `新手引导`是一种较新的实践，本质上包含在用户进入应用前加载的几个屏幕，旨在帮助用户——尤其是首次使用者——理解应用，并向他们展示应用将如何运作。可以说，有些应用并不需要引导界面或操作指引。如果你的应用相对简单，那么可以选择完全忽略引导界面。但如果你的应用处理任务的方式比较独特，用户可能无法立刻明白，或者包含用户不熟悉的新界面元素，那么你就应该考虑加入一些引导界面。


    引导界面有时也被称为“操作指引”。它们专门用于让用户熟悉你应用所特有的、或全新的交互方式。在这种情况下，操作指引用于精确地向用户展示如何与应用中更独特的部分进行互动。在为用户提供引导界面或操作指引时，请记住，向用户“展示”比“告诉”他们更重要，并且要确保展示的是整个过程。用户想知道如何在应用中完成特定的关键任务，所以一定要向他们展示该过程中涉及的所有界面。他们还想了解你的应用能为他们做什么，也就是说，你应用的总体价值主张是什么？


    虽然视觉元素在你的引导界面和操作指引中很重要，但确保你使用的语气和语调是友好、对话式的，并与应用中的其他文案保持一致也同样关键。因为这些界面将是用户与应用进行的第一次互动，它们通常决定了用户是否会继续注册流程并持续使用你的应用。如果要进行新手引导，就必须做好。对于我们的`PhotoBomb`应用，我们将包含几个引导界面，解释应用的目的以及用户能从中获得什么。


    初始引导界面解释了应用的目的。这个界面是通过复制启动屏幕，将 logo 稍微上移，并添加一段描述应用的文字块来创建的。然后，我从`Sketch`的 iOS
    模板中导入了页面控制器符号，并将其定位在屏幕上。


    第二页展示了主界面，并叠加了一些操作指引文案，为用户提供关于各个元素位置及其在整体游戏玩法中意义的背景信息。我稍后会解释主界面是如何创建的。但本质上，这个界面是通过在屏幕上方添加一个黑色矩形，并降低其不透明度，让底层的页面透出来。完成后，我就能在屏幕上方将文案作为新图层添加上去，以解释屏幕上的各个元素。


    两个引导界面如图 7-4 所示。


    ![A978-1-4842-1458-9_7_Fig4a_HTML.jpg](img/A978-1-4842-1458-9_7_Fig4a_HTML.jpg)![A978-1-4842-1458-9_7_Fig4b_HTML.jpg](img/A978-1-4842-1458-9_7_Fig4b_HTML.jpg)


    图 7-4.


    我们`PhotoBomb`应用的两个引导线框图界面。左侧是解释应用价值主张的界面，右侧是一个基本覆盖层，展示了主界面上某些元素的位置。


    ### 身份验证


    大多数应用都需要某种形式的身份验证，用户才能进入并使用应用的服务。如今，一些应用发现使用大多数用户都已加入的流行社交网络会更便捷。这简化了注册流程。由于社交网络已经对用户进行了身份验证，通过其
    API 进行注册，并且大多数用户对此流程都很熟悉，他们只需选择想要用于身份验证的适当社交网络即可。如果他们愿意，也可以通过电子邮件进行注册。通常没有必要为社交媒体注册流程绘制线框图，因此我们将创建两个页面：一个让用户选择他们想要使用哪个社交媒体进行注册，另一个是他们通过电子邮件注册的流程页面。


    我们通过复制上一页的背景和状态栏来创建第一页。现在我们有了一个空白屏幕来构建新页面。新页面必须包含三个注册按钮以及应用的 logo。图 7-5 显示了新创建的页面。


    ![A978-1-4842-1458-9_7_Fig5_HTML.jpg](img/A978-1-4842-1458-9_7_Fig5_HTML.jpg)


    图 7-5.


    包含社交媒体和电子邮件注册按钮的新注册页面


    为了在尺寸上保持一致性，我从启动页面复制了按钮三次，分别为`Facebook`、`Twitter`和电子邮件按钮各创建一个，然后从`Pixel Love`提供的免费图标集中导入每个按钮的图标作为
    PNG 文件。调整大小并对齐后，我们就得到了新页面。将它放在原始页面旁边，两者看起来还不错，我们的线框图进展顺利。现在我们有了两个页面，可以继续进行身份验证流程的下一步了。你可能想知道为什么我选择不布置单个的`Facebook`和`Twitter`身份验证流程。这主要是因为那些屏幕大多由其各自的发布方控制，设计人员对其外观的控制权微乎其微。这些应用要求你通过那些社交媒体服务进行身份验证，然后返回你的应用，因此这些服务的弹出屏幕不需要我们做过多的设计或布局决策。因此，我选择只展示电子邮件身份验证流程，并在下一节展示几个屏幕。


    **提示**


    `Pixel Love`图标可在以下网址找到：[`http://www.pixellove.com/free-icons`](http://www.pixellove.com/free-icons)。

    '
- fmt: '### E-mail Registration


    The next page I will create will be the e-mail registration page. Once the user
    has opted to register for our app using e-mail authentication, the app will now
    ask users to enter a username, an e-mail address, and a password with which they
    will enter the application. At the very bottom of the screen, we will add a submit
    button which will initiation the registration process with a server on the back
    end.


    We will need to create three fields on this page: one for a username, one for
    a password, and another for a confirmation of the password. Then, we can add our
    button. Taking care to line everything up on the page we can use the previous
    pages as guides to ensure that all elements are aligned, as shown in Figure [7-6](#A978-1-4842-1458-9_7_Chapter.html#Fig6).


    ![A978-1-4842-1458-9_7_Fig6_HTML.jpg](A978-1-4842-1458-9_7_Fig6_HTML.jpg)


    Figure 7-6.


    Second registration screen with input fields for a username, password, confirmation
    of password, and an Enter button


    It is sometimes customary when creating wireframes to also create an alternate
    screen that shows how the elements on the screen will shift once the keyboard
    has been introduced onto the screen and a user is entering information. When wireframing
    it’s a good idea to show as many views as possible so that there are no questions
    on placement of content on your screen.


    Figure [7-7](#A978-1-4842-1458-9_7_Chapter.html#Fig7) shows the PhotoBomb sign-in
    screen with the raised keyboard and the cursor where the user will begin to type
    their username. The idea is that the contents of the page and associated fields
    will shift up with the introduction of the keyboard. It’s a good idea for first-time
    designers to discuss this functionality with the engineer, as it’s quite common
    to see keyboards covering text fields in new designs.


    ![A978-1-4842-1458-9_7_Fig7_HTML.jpg](A978-1-4842-1458-9_7_Fig7_HTML.jpg)


    Figure 7-7.


    PhotoBomb sign-in screen with the keyboard and cursor as a guide for your developers


    With e-mail registration, typically, a user is asked to verify their identity
    when an e-mail is sent to the e-mail address they’ve used to register within the
    app. After authentication, they are brought back into the app to complete the
    process. Typically, it is expected that users will verify their e-mail directly
    from their mobile device, so the process is relatively seamless.


    ### Home Page


    Now that our users have registered for the app and their identities have been
    confirmed, they are in the app. The home page of the app is the first page they
    see after registration and is also the page they will return to every time they
    open the PhotoBomb app. Therefore, the elements on this screen are more important
    than almost any other page in our app. This page must follow through on the promise
    of the app. Whatever it was that made the user download your app is what they
    will expect on this screen. It must orient them to the entire purpose of your
    app in a very short amount of time. The page must also contain navigational elements
    so that the user is able to navigate to other pages of your app from here and
    if need be, return at any time. In thinking about this page, I will refer back
    to my notes from Figure [7-2](#A978-1-4842-1458-9_7_Chapter.html#Fig2) as a reference.
    It will help to remind me what the overall purpose of the app is and keep that
    top of mind so that I can ensure that everything on the page is accessible and
    easy to find. This is where the main task of the app is to be located.


    Once we’ve referenced our list we have decided to take a straightforward approach
    to the design of this page. The page will have, as a location-based app, a map
    on this main screen as well as a tab bar across the bottom to take users to the
    other areas of the app. Also on this page are areas where the user can see other
    locations that users near them have “bombed” or tagged other photographs. The
    user can also see profile pictures of each user so that they are easily recognizable.


    In Figure [7-8](#A978-1-4842-1458-9_7_Chapter.html#Fig8) we have the basic wireframe
    of the home page. As with wireframes, the icons are for placement only and to
    give a very basic representation of where elements go on the screen. The page
    was created by importing some royalty-free images from Death to Stockphotos and
    icons from Pixel Love. The icons in the tab bar are a part of the wireframing
    template; we simply changed the titles associated with each icon.


    ![A978-1-4842-1458-9_7_Fig8_HTML.jpg](A978-1-4842-1458-9_7_Fig8_HTML.jpg)


    Figure 7-8.


    Wireframe of the home page of the PhotoBomb app


    Our map pin icons were randomly found by doing a search on the Internet, and the
    map background was imported from our iOS Design Template included with Sketch.


    ### Profile Page


    If a user has to register for an app and select a photo from his or her camera
    roll for their profile picture, it’s usually a good idea to add a profile page
    to your app. This way, a user can make changes to their profile whenever they
    choose to. Sometimes a profile page is editable from within the Settings page
    and sometimes it isn’t. I thought it would be worth showing what the PhotoBomb
    user profile page would look like, since as a mobile design pattern, there are
    a number of different ways that this page can look. I decided to keep the profile
    page as simple as possible but a quick wireframe of what the page looks like will
    be helpful once we move into the design phase of the app.


    The profile page is a common design pattern, and a quick search of popular design
    pattern sites like Pttrns, Mobile Patterns, or Inspired UI will reveal a number
    of different ways to present this information. Most do, however, have a few things
    in common, like a user photo and other information that is pertinent to the app
    like followers, likes, places visited, friends, and so forth. Take a look and
    determine which is best for you, or create your own. Remember, however, that a
    profile page should provide more information on the user than you can provide
    elsewhere in the app.


    This page was created by starting out with another blank screen duplicated from
    one of our earlier screens. The idea for this page is that the user arrives here
    after hitting the Edit Profile cell in the previous page’s wireframe. Once here,
    the user can tap the Edit button to make any changes.


    I imported the user’s image from the home page and made it slightly larger and
    centering it. Using text blocks in various sizes creates the rest of the page
    to round out the wireframe of the Profile page shown in Figure [7-11](#A978-1-4842-1458-9_7_Chapter.html#Fig11).


    ![A978-1-4842-1458-9_7_Fig11_HTML.jpg](A978-1-4842-1458-9_7_Fig11_HTML.jpg)


    Figure 7-11.


    PhotoBomb profile page'
  raw: '### E-mail Registration


    The next page I will create will be the e-mail registration page. Once the user
    has opted to register for our app using e-mail authentication, the app will now
    ask users to enter a username, an e-mail address, and a password with which they
    will enter the application. At the very bottom of the screen, we will add a submit
    button which will initiation the registration process with a server on the back
    end.


    We will need to create three fields on this page: one for a username, one for
    a password, and another for a confirmation of the password. Then, we can add our
    button. Taking care to line everything up on the page we can use the previous
    pages as guides to ensure that all elements are aligned, as shown in Figure [7-6](#A978-1-4842-1458-9_7_Chapter.html#Fig6).


    ![A978-1-4842-1458-9_7_Fig6_HTML.jpg](A978-1-4842-1458-9_7_Fig6_HTML.jpg)


    Figure 7-6.


    Second registration screen with input fields for a username, password, confirmation
    of password, and an Enter button


    It is sometimes customary when creating wireframes to also create an alternate
    screen that shows how the elements on the screen will shift once the keyboard
    has been introduced onto the screen and a user is entering information. When wireframing
    it’s a good idea to show as many views as possible so that there are no questions
    on placement of content on your screen.


    Figure [7-7](#A978-1-4842-1458-9_7_Chapter.html#Fig7) shows the PhotoBomb sign-in
    screen with the raised keyboard and the cursor where the user will begin to type
    their username. The idea is that the contents of the page and associated fields
    will shift up with the introduction of the keyboard. It’s a good idea for first-time
    designers to discuss this functionality with the engineer, as it’s quite common
    to see keyboards covering text fields in new designs.


