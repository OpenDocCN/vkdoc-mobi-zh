- fmt: '# Shortcuts


    Before we dive deeper into `Sketch`, you will want to learn at least some of its
    shortcuts. They will greatly improve your workflow and reduce the amount of time
    it takes for you to perform certain actions. As a Mac user, you are likely already
    familiar with general shortcuts such as copy and paste. The following is a comprehensive
    list of `Sketch` shortcuts gathered from around the Web. In addition to the ones
    that are listed in the menu, you can use this as a reference until some of the
    more frequently used shortcuts become familiar to you.


    ## General Sketch Shortcuts


    * `⌃L` Toggle layout

    * `⌃G` Toggle Grid

    * `Enter` Edit currently selected layer

    * `⌘2` Zoom to selected layers

    * `⌘3` Center selected layer on canvas

    * `⌘+` Zoom in

    * `⌘-` Zoom out

    * `⌘1` Center canvas

    * `⌘2` Zoom selection

    * `Z` To zoom, hold down and click or drag area with mouse

    * `⌥ Z` To reverse zoom, hold down and click

    * `Esc` Exits current tool or mode

    * `Space` Hand tool

    * `Tab` Cycles through layers in the current group

    * `Shift + Tab` Reverse cycle


    ## Layer Shortcuts (Insert)


    * `R` Rectangle

    * `O` Oval

    * `L` Line

    * `U` Rounded rectangle

    * `T` Text layer

    * `V` Vector

    * `P` Pencil

    * `A` Artboard

    * `S` Slice


    ## Moving, Hiding, and Resizing Layer Shortcuts


    * `⌥+ Drag` Duplicate layer

    * `⌥+ Hover` Show distance between layers

    * `⌥+ Resize` Resize from both ends

    * `⇧+ Resize` Preserve aspect ratio

    * `⌘ Shift L` Lock or unlock layer

    * `⌘ Shift H` Hide or show layer

    * `...➔` Move

    * `⌘...➔` Resize


    ## Text and Type Shortcuts


    * `Cmd + B` Bold

    * `Cmd + I` Italic

    * `Cmd + U` Underline

    * `Alt + CMD (+) +` Increase font size

    * `Alt + CMD (+) -` Decrease font size


    ## Custom Shortcuts


    As a Mac user, you also may be familiar with custom shortcuts.


    * `Control R` Toggle Rulers on and off

    * `Control G` Toggle Grids on and off

    * `Control P` Toggles between pixel and vectors

    * `Control L` Toggles alignment guides


    You can also create custom shortcuts for those actions that don’t have them. Because
    `Sketch` is designed to work within the Mac OS, you can easily create your own
    shortcuts. For example, you may or may not notice that `Insert Image` has no shortcut
    in `Sketch`. You can easily create a shortcut consisting of your own keyboard
    combination. To create a custom shortcut, go to System Preferences and select
    `Keyboard`. From the tab at the top of the window, select `App Shortcuts`, as
    shown in Figure [2-16](#A978-1-4842-1458-9_2_Chapter.html#Fig16).


    ![A978-1-4842-1458-9_2_Fig16_HTML.jpg](A978-1-4842-1458-9_2_Fig16_HTML.jpg)


    *Figure 2-16.* You can create a custom shortcut from within your computer’s System
    Preferences


    Once you have made these selections, click the “+” button near the bottom of the
    widow. A new drop-down should appear with a list of all of the applications on
    your computer. Scroll down and find `Sketch` in that list. In the field entitled
    `Menu Title`, type the exact title of the menu item for which you would like to
    create a shortcut, as shown in Figure [2-17](#A978-1-4842-1458-9_2_Chapter.html#Fig17).
    Finally, in the field called `Keyboard Shortcut`, enter the appropriate keys for
    your new shortcut and click the `Add` button. Your shortcut will not work if typed
    incorrectly.


    ![A978-1-4842-1458-9_2_Fig17_HTML.jpg](A978-1-4842-1458-9_2_Fig17_HTML.jpg)


    *Figure 2-17.* Creating a menu title for your keyboard shortcut


    Once it has been added, you will see your newly created shortcut in the list of
    shortcuts for that program, as shown in Figure [2-18](#A978-1-4842-1458-9_2_Chapter.html#Fig18).
    Your shortcut should now be ready for use in `Sketch`. You will be able to access
    it from the drop-down menu in the toolbar.


    ![A978-1-4842-1458-9_2_Fig18_HTML.jpg](A978-1-4842-1458-9_2_Fig18_HTML.jpg)


    *Figure 2-18.* Creating a custom keyboard shortcut


    We’ve now been through the entire `Sketch` interface. Thus you should be fairly
    comfortable with the essential functions of everything that you see on the screen
    when you open the program and with customizing your toolbar to your liking. As
    you can see, though the interface is simple, `Sketch` is a powerful graphics program
    that will make designing your iOS app a pleasurable experience.


    # Summary


    Congratulations! You’ve installed the `Sketch` program and have familiarized yourself
    with the canvas, the toolbar, and Inspector, and you even learned a few handy
    keyboard shortcuts. This is where you will be spending the bulk of your time while
    designing in `Sketch`. Everything you do after this will happen from this screen
    before your design begins to come to life right on the canvas.


    Now you’re ready to move into working with Shapes in the next chapter. Shapes
    are the building blocks of your design. Read on!


    # 3. Styling Shapes


    By this point you’ve had some time to interact and become more familiar with the
    `Sketch` interface. This chapter focuses on the shapes that you can create with
    `Sketch`. Shapes are the most important layers that you will use in `Sketch`,
    and every design you create in `Sketch` will be made of shapes that you choose
    from the `Insert` menu. They are the building blocks of any design that you will
    work on in `Sketch`.


    As mentioned in the [Chapter 2](#A978-1-4842-1458-9_2_Chapter.html), you can use
    the `Insert` tool from the menu to add shapes to your canvas, or you can draw
    them directly onto your canvas using your mouse, trackpad, or graphics tablet.
    There are eight different kinds of shapes that can be created within `Sketch`:
    lines, arrows, rectangles, ovals, rounded rectangles, stars, polygons, and triangles.
    All of these options can be found in the `Insert ➤ Shape` menu, as shown in Figure
    [3-1](#A978-1-4842-1458-9_3_Chapter.html#Fig1). With these shapes, you can pretty
    much create anything.


    ![A978-1-4842-1458-9_3_Fig1_HTML.jpg](A978-1-4842-1458-9_3_Fig1_HTML.jpg)


    *Figure 3-1.* Clicking `Insert ➤ Shape` on the toolbar provides a list of preset
    shapes that are available within `Sketch`


    Once you select what shape you want, simply click and drag your mouse anywhere
    on your canvas that you want your shape to appear. `Sketch` will begin to create
    that shape with the default color (usually light gray for the fill and a darker
    gray for the border). When you release the mouse button, your fully formed shape
    will be complete and on the canvas. You will also notice that the Layers list
    will be updated to reflect the name of the layer (usually the name of the shape
    and the number 1 for starters). The numbers will increase in increments of one
    as you continue to add unnamed layers. As long as the shape is selected, the Inspector
    will also update to show you the properties associated with your shape. Pay particular
    attention to the values in `Position`, `Size`, `Opacity`, `Fills`, and `Borders`.
    If you change or edit any of these values in the Inspector, `Sketch` will automatically
    update the shape to reflect these changes.'
