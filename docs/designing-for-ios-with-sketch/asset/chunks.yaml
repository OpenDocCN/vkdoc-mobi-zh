- fmt: '# Profile Page


    As I look back on the profile page as presented in the wireframes, I see that
    it could use some improvements. Currently as shown in the wires, there’s simple
    information on the user as well as a field for city and state. But, I’m thinking
    of taking a different approach to this page than what is shown in the wireframes.
    Undoubtedly, this situation could arise when you are working in the real world.
    There will be times when you want to make a change in the design phase. If you’re
    the person responsible for the wires, this shouldn’t be a big problem. But if
    not, it’s always a good idea to get consensus. Honestly, it’s a good idea to get
    consensus anyway. But we’ll assume here that the decision is being driven by another
    force, perhaps a client, an account person, or even a creative director. This
    means it has to happen, and sooner rather than later. How do you make changes
    in the design phase that could potentially affect the user flow of your app? Luckily,
    the changes we will make won’t do that, but it’s worth exploring this. If time
    allows, you can go back to your wires and quickly mock up the page and revise
    the flow there. Also very important to get everyone on the team’s buy-in to be
    able move quickly.


    Also, examine the flow a few steps forward and a few steps back. This is to make
    sure that you aren’t doing anything that will affect your overall flow and user
    experience. When I look at the changes that I would like to make in my profile
    page, I’ve already assessed that this won’t really affect very much. I am just
    going to expand the content on the page a bit. Easy, right? We’ll see. Let’s discuss
    the changes I’d like to make. When viewing your profile page, you want to find
    out more about the user as it relates to game play. A profile page isn’t only
    viewable to the user; it will also be available to view by other players or friends
    in the game. What information would they find important? Those are some of the
    questions that I asked myself when considering my redesign for the profile. The
    results of my redesign are shown in Figure [8-11](#A978-1-4842-1458-9_8_Chapter.html#Fig11).


    ![A978-1-4842-1458-9_8_Fig11a_HTML.jpg](A978-1-4842-1458-9_8_Fig11a_HTML.jpg)![A978-1-4842-1458-9_8_Fig11b_HTML.jpg](A978-1-4842-1458-9_8_Fig11b_HTML.jpg)


    Figure 8-11. Newly designed profile page with new content and Edit button. Next
    to it is the original wireframe


    What changed in the page is subtle but makes, I think, for a better-looking profile
    page. We’ve added two sections that show the total number of locations that the
    user is associated with as well as the number of friends he has and then followed
    up with the biographical information which can be placed in the “About” section
    at the bottom of the page. I also added a light blue border around the profile
    image. Remember, light blue is our highlight color from the home page of the app.
    It’s a nice touch to maintain branding consistency through the app.


    # Permissions


    I’ve talked about how permissions are enjoying a new and improved look in iOS
    apps these days. So, I wanted to try something different here. Since PhotoBomb
    will need access to the user’s camera and location, I added these options to let
    users know up front what we will need from them. There are many ways to do this
    but the most successful ways are via effective design and copy. I don’t claim
    to be a copywriter so perhaps the copy on the permissions in Figure [8-12](#A978-1-4842-1458-9_8_Chapter.html#Fig12)
    could use some polish, but the page, from a design standpoint, does its job. The
    pop-up appears after a user has been authenticated and before game play. Once
    a user hits the Confirm button, they will get the standard, default notification
    page that iOS provides.


    ![A978-1-4842-1458-9_8_Fig12_HTML.jpg](A978-1-4842-1458-9_8_Fig12_HTML.jpg)


    Figure 8-12. Permissions page with pop-up and dimmed home screen in the background


    The page was created by grabbing and duplicating the home page as is, and creating
    a black rectangle to cover the screen and then decreasing its opacity to allow
    the home page to show through. The idea here is that the home page will be dimmed
    while the pop-up is onscreen. Once the user closes the window or confirms, the
    pop-up disappears and the background brightens back to its normal state. The pop-up
    window is a rectangle with a border radius of 11. Buttons are the same size as
    all of the other buttons used so far in the app with icons from Pixel Love. One
    note on the icons is that I wanted to use a camera icon and a location icon that
    users would be familiar with from their interaction with iOS, as these are pretty
    close. The Close button was created by hand; I created a cross with two rectangles
    with the same length and a width of 3 pixels. I created a cross and then rotated
    it to create the “X” and then added it to a circle shape. These three shapes are
    then combined into a symbol so that it can be easily reused.


    # Camera Capture


    Our last designed screen will be the capture screen. From the wireframes you will
    remember that we decided to create our own camera capture screen to align closer
    with the goals of the app. This is not necessary but a nice touch. Note that the
    “X” and check mark icons are red and green, respectively, and the Take Picture
    button is our branded shade of PhotoBomb blue (see Figure [8-13](#A978-1-4842-1458-9_8_Chapter.html#Fig13)).


    ![A978-1-4842-1458-9_8_Fig13_HTML.jpg](A978-1-4842-1458-9_8_Fig13_HTML.jpg)


    Figure 8-13. PhotoBomb camera capture screen


    This final page brings us to the end of our design phase for our app. I’ve attempted
    to choose pages that are critical to the overall functionality of the app and
    also that allows you to use the best features of Sketch to make your design phase
    and workflow as seamless as possible. You should now have a great set of designs
    that you can be comfortable with.


    In the next chapter, we’ll discuss designing your app’s icon, which has become
    an increasingly important facet of the design phase and one that can benefit from
    the use of Sketch.


    # Summary


    We’ve covered designing multiple pages of the PhotoBomb app in this chapter. Most
    of the techniques that we’ve covered should already be familiar to you. We designed
    our onboarding screens and some of the other main screens that make up the PhotoBomb
    application. You should review and familiarize yourself with the steps outlined
    in each section for each page so that you can recreate them. Surely, while these
    pages represent some popular effects and mobile design patterns, it is equally
    important for you to develop your own sense of design. So, while it’s great to
    replicate the steps, be sure to experiment with different effects and styles of
    your own.


    Developing your own style and visual language is an important part of becoming
    a designer. Once you are happy with your designs, you can move on to designing
    your app’s icon, which is what we will cover in the next chapter.'
