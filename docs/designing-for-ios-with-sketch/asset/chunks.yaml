- fmt: "### TIFF\n\n`TIFF` is another uncompressed graphic file format; it is considered\
    \ a standard for delivering printed images like photographs. You will likely rarely\
    \ ever deliver a `TIFF` file to someone working on interface design for the Web\
    \ or mobile. All of the three image formats shown previously are considered raster\
    \ images.\n\n> **Tip**  \n> `Photoshop` (`.psd`) and `Illustrator` (`.ai`) files\
    \ are not supported for export by `Sketch`.\n\nThe following file formats support\
    \ vector graphics and are good options if you have to send to those who will be\
    \ editing the image.\n\n### PDF\n\nThis file format is a popular format used across\
    \ the Web. `PDF`s retain the vector nature of vector objects and text in the file\
    \ and can be scaled up or down.\n\n### EPS\n\nThis file format is best if you\
    \ are sending this to someone who will be editing the file from an Adobe program\
    \ like `Illustrator`. `EPS` stands for Encapsulated Post Script, but these days,\
    \ most Adobe programs have their own proprietary file formats.\n\n### SVG\n\n\
    Typically, icons and logos and other two-dimensional graphics are created and\
    \ exported as `SVG`. `SVG` stands for Scalable Vector Graphics and typically supports\
    \ some level of animation or interactivity.\n\n## Size Options for Exporting\n\
    \n`Sketch` provides multiple options for exporting your work in different sizes.\
    \ Clicking on the size drop-down in the Inspector will reveal a number of preset\
    \ sizes in which `Sketch` can export your artboards and images. You can use a\
    \ multiplier such as any number followed by `x` to increase the exported image\
    \ by that number. Presets are `0.5×`, `1×`, `2×`, `3× 512w` and `512h`, but you\
    \ can select any number as a multiplier and any number for your height or width.\
    \ Once you’ve selected a height, `Sketch` will calculate the appropriate width,\
    \ and once you select a height, `Sketch` will calculate the appropriate height.\
    \ `Sketch` also allows you to export multiple versions and sizes of the same element\
    \ or artboard at the same time. I’ve included a screenshot of the options in Figure\
    \ [10-4](#A978-1-4842-1458-9_10_Chapter.html#Fig4).\n\n![A978-1-4842-1458-9_10_Fig4_HTML.jpg](A978-1-4842-1458-9_10_Fig4_HTML.jpg)\n\
    \n**Figure 10-4.** Export for size, suffix, and format in `Sketch`\n\nAfter you’ve\
    \ chosen your size and format, `Sketch` will add the appropriate suffix to the\
    \ end of your file name after export as well. `Xcode` will recognize the suffix\
    \ during the software development process after the images are imported into `Xcode`.\n\
    \n> **Tip**  \n> Default size and format options are `1×` and `PNG`.\n\n### Quick\
    \ and Dirty\n\nIf you are looking for a painless and easy way to immediately export\
    \ a layer without doing any of the previously described steps, `Sketch` has you\
    \ covered there, too. After you’ve selected the area that you want to export and\
    \ it shows up in the inspector as a preview, simply drag it onto your desktop\
    \ for an immediate conversion to the selected format and size. It doesn’t get\
    \ much easier than that.\n\n## Exporting Artboards\n\nExporting artboards will\
    \ be something that you do if you’re handing off assets and need to show how the\
    \ finished product will look. More often than not, however, you’ll be exporting\
    \ individual assets such as icons and layers. For now, we’ll focus on exporting\
    \ the artboard itself. The process is extremely straightforward. Let’s say that\
    \ we’d like to export the home page of the PhotoBomb app. First, you would select\
    \ the entire artboard either in the canvas or in the layer list. With that done,\
    \ click the **Make Exportable** button in the lower right corner of the Inspector\
    \ panel. You will see that the size, suffix, and format settings also appear in\
    \ the preview pane. For this example, you can leave it as is. The settings there\
    \ should be `1×` for size, no suffix, and `PNG` as the desired format. Clicking\
    \ the **Export** button again will bring up a destination window that allows you\
    \ to select where the final exported file will be saved. Figure [10-5](#A978-1-4842-1458-9_10_Chapter.html#Fig5)\
    \ shows the screen just before the export. The final export will be a flattened\
    \ `PNG` file in the designated location.\n\n![A978-1-4842-1458-9_10_Fig5_HTML.jpg](A978-1-4842-1458-9_10_Fig5_HTML.jpg)\n\
    \n**Figure 10-5.** Home page canvas with Inspector highlighted before exporting\n\
    \n## Exporting Individual Assets\n\nExporting individual assets is a process that\
    \ you will most likely be engaging in regularly. The use of icons in design, especially\
    \ for iOS, is extensive. So, it is important to understand how to export them\
    \ for iOS development. Slices can be created and stored as members of a group\
    \ folder for easy organization. As you already know, a slice is created by selecting\
    \ **Slice** from the **Insert** menu drop-down. So say for instance that I am\
    \ trying to create a slice of the Start icon in the tab bar. I would create a\
    \ slice around it. `Sketch` will intuitively create a preview of the slice. Once\
    \ it is adjusted for size, I can select the various versions of the icon that\
    \ I need to create for various resolutions as shown in Figure [10-6](#A978-1-4842-1458-9_10_Chapter.html#Fig6)\
    \ and then export all three icons as an appropriately sized `PNG` file. Only the\
    \ slice that is presented in the preview will be exported.\n\n![A978-1-4842-1458-9_10_Fig6_HTML.jpg](A978-1-4842-1458-9_10_Fig6_HTML.jpg)\n\
    \n**Figure 10-6.** Creating a slice for export in three different sizes, `@1×`,\
    \ `@2×`, and `@3×`\n\nYour slices must be precise, however, as the slice option\
    \ will slice exactly what is selected within the window. You can always use the\
    \ inspector to see what part of your image is being selected and subsequently\
    \ exported.\n\n## Creating a Folder for Your Assets\n\nExporting assets can be\
    \ a messy job and yet, just like organizing and naming your layers, it’s important.\
    \ So is organizing your assets, especially when you are handing them off to a\
    \ developer. I try to keep my layers titled intuitively and try to export to folders\
    \ where a developer can find everything they need. `Sketch` makes this process\
    \ easy, too.\n\n`Sketch` offers a handy feature. By changing the name of your\
    \ layer and adding a forward slash (`/`), `Sketch` will create a folder with your\
    \ asset in it. The convention is that whatever is before the forward slash is\
    \ the name of the folder and whatever is after will be the name of your slice\
    \ or asset. For example, to create a folder called “Button” with an asset or slice\
    \ inside called “Check Button” in Figure [10-7](#A978-1-4842-1458-9_10_Chapter.html#Fig7),\
    \ I changed the name of the group to `Button/Check Button`. `Sketch` automatically\
    \ created a folder with the asset inside.\n\n![A978-1-4842-1458-9_10_Fig7_HTML.jpg](A978-1-4842-1458-9_10_Fig7_HTML.jpg)\n\
    \n**Figure 10-7.** How to name a layer so that Sketch will automatically create\
    \ a folder for your assets"
  raw: '##### TIFF


    TIFF is another uncompressed graphic file format; it is considered a standard
    for delivering printed images like photographs. You will likely rarely ever deliver
    a TIFF file to someone working on interface design for the Web or mobile.


    All of the three image formats shown previously are considered raster images.


    Tip


    Photoshop (PSDs) and Illustrator (AI) files are not supported for export by Sketch.


    The following file formats support vector graphics and are good options if you
    have to send to those who will be editing the image.


    ##### PDF


    This file format is a popular format used across the Web. PDFs retain the vector
    nature of vector objects and text in the file and can be scaled up or down.


    ##### EPS


    This file format is best if you are sending this to someone who will be editing
    the file from an Adobe program like Illustrator. EPS stands for Encapsulated Post
    Script, but these days, most Adobe programs have their own proprietary file formats.


    ##### SVG


    Typically, icons and logos and other two-dimensional graphics are created and
    exported as SVG. SVG stands for Scalable Vector Graphics and typically supports
    some level of animation or interactivity.


    #### Size Options for Exporting


    Sketch provides multiple options for exporting your work in different sizes. Clicking
    on the size drop-down in the Inspector will reveal a number of preset sizes in
    which Sketch can export your artboards and images. You can use a multiplier such
    as any number followed by x to increase the exported image by that number. Presets
    are 0.5×, 1×, 2×, 3× 512w and 512h, but you can select any number as a multiplier
    and any number for your height or width. Once you’ve selected a height, Sketch
    will calculate the appropriate width, and once you select a height, Sketch will
    calculate the appropriate height. Sketch also allows you to export multiple versions
    and sizes of the same element or artboard at the same time. I’ve included a screenshot
    of the options in Figure [10-4](#A978-1-4842-1458-9_10_Chapter.html#Fig4).


    ![A978-1-4842-1458-9_10_Fig4_HTML.jpg](A978-1-4842-1458-9_10_Fig4_HTML.jpg)


    Figure 10-4.


    Export for size, suffix, and format in Sketch


    After you’ve chosen your size and format, Sketch will add the appropriate suffix
    to the end of your file name after export as well. Xcode will recognize the suffix
    during the software development process after the images are imported into Xcode.


    Tip


    Default size and format options are 1× and PNG.


    #### Quick and Dirty


    If you are looking for a painless and easy way to immediately export a layer without
    doing any of the previously described steps, Sketch has you covered there, too.
    After you’ve selected the area that you want to export and it shows up in the
    inspector as a preview, simply drag it onto your desktop for an immediate conversion
    to the selected format and size. It doesn’t get much easier than that.


    ## Exporting Artboards


    Exporting artboards will be something that you do if you’re handing off assets
    and need to show how the finished product will look. More often than not, however,
    you’ll be exporting individual assets such as icons and layers. For now, we’ll
    focus on exporting the artboard itself. The process is extremely straightforward.
    Let’s say that we’d like to export the home page of the PhotoBomb app. First,
    you would select the entire artboard either in the canvas or in the layer list.
    With that done, click the Make Exportable button in the lower right corner of
    the Inspector panel. You will see that the size, suffix, and format settings also
    appear in the preview pane. For this example, you can leave it as is. The settings
    there should be 1× for size, no suffix, and PNG as the desired format. Clicking
    the Export button again will bring up a destination window that allows you to
    select where the final exported file will be saved. Figure [10-5](#A978-1-4842-1458-9_10_Chapter.html#Fig5)
    shows the screen just before the export. The final export will be a flattened
    PNG file in the designated location.


    ![A978-1-4842-1458-9_10_Fig5_HTML.jpg](A978-1-4842-1458-9_10_Fig5_HTML.jpg)


    Figure 10-5.


    Home page canvas with Inspector highlighted before exporting


    ## Exporting Individual Assets


    Exporting individual assets is a process that you will most likely be engaging
    in regularly. The use of icons in design, especially for iOS is extensive. So,
    it is important to understand how to export them for iOS development. Slices can
    be created and stored as members of a group folder for easy organization. As you
    already know, a slice is created by selecting Slice from the Insert menu drop-down.
    So say for instance that I am trying to create a slice of the Start icon in the
    tab bar. I would create a slice around it. Sketch will intuitively create a preview
    of the slice. Once it is adjusted for size, I can select the various versions
    of the icon that I need to create for various resolutions as shown in Figure [10-6](#A978-1-4842-1458-9_10_Chapter.html#Fig6)
    and then export all three icons as an appropriately sized PNG file. Only the slice
    that is presented in the preview will be exported.


    ![A978-1-4842-1458-9_10_Fig6_HTML.jpg](A978-1-4842-1458-9_10_Fig6_HTML.jpg)


    Figure 10-6.


    Creating a slice for export in three different sizes, @1×, @2×, and @3×


    Your slices must be precise, however, as the slice option will slice exactly what
    is selected within the window. You can always use the inspector to see what part
    of your image is being selected and subsequently exported.


    ## Creating a Folder for Your Assets


    Exporting assets can be a messy job and yet, just like organizing and naming your
    layers, it’s important. So is organizing your assets, especially when you are
    handing them off to a developer. I try to keep my layers titled intuitively and
    try to export to folders where a developer can find everything they need. Sketch
    makes this process easy, too.


    Sketch offers a handy feature. By changing the name of your layer and adding a
    forward slash, Sketch will create a folder with your asset in it. The convention
    is that whatever is before the forward slash is the name of the folder and whatever
    is after will be the name of your slice or asset. For example, to create a folder
    called “Button” with an asset or slice inside called “Check Button” in Figure
    [10-7](#A978-1-4842-1458-9_10_Chapter.html#Fig7), I changed the name of the group
    to “Button/Check Button.” Sketch automatically created a folder with the asset
    inside.


    ![A978-1-4842-1458-9_10_Fig7_HTML.jpg](A978-1-4842-1458-9_10_Fig7_HTML.jpg)


    Figure 10-7.


    How to name a layer so that Sketch will automatically create a folder for your
    assets'
  trans: "\n### TIFF\n\n`TIFF` 是另一种无压缩的图形文件格式；它被视为传递印刷图像（如照片）的标准格式。你很可能很少需要将 `TIFF`\
    \ 文件交给从事网页或移动端界面设计的人。前面展示的三种图像格式均属于**栅格图像**。\n\n> **提示**  \n> `Sketch` 不支持导出 `Photoshop`\
    \ (`.psd`) 和 `Illustrator` (`.ai`) 文件。\n\n以下文件格式支持矢量图形，如果你需要将文件发送给将要编辑图像的人员，这些格式是不错的选择。\n\
    \n### PDF\n\n这种文件格式是网络上广泛使用的流行格式。`PDF` 文件能够保留文件中矢量对象和文本的矢量特性，并且可以任意缩放。\n\n###\
    \ EPS\n\n如果你要将文件发送给使用 `Illustrator` 等 Adobe 程序进行编辑的人员，该文件格式是最佳选择。`EPS` 代表封装的 PostScript\
    \ 语言，但如今大多数 Adobe 程序都拥有自己的专有文件格式。\n\n### SVG\n\n通常，图标、徽标以及其他二维图形都是以 `SVG` 格式创建并导出的。`SVG`\
    \ 代表可缩放矢量图形，并且通常支持一定程度的动画或交互功能。\n\n## 导出的尺寸选项\n\n`Sketch` 提供了多种选项，用于以不同尺寸导出你的作品。在检查器中点击尺寸下拉菜单，会显示\
    \ `Sketch` 可以导出画板和图像的一系列预设尺寸。你可以使用乘数（例如任何数字后跟 `x`）来将导出图像放大相应倍数。预设尺寸为 `0.5×`、`1×`、`2×`、`3×`，以及\
    \ `512w` 和 `512h`，但你也可以选择任意数字作为乘数，或为高度和宽度选择任意数值。一旦你选择了高度，`Sketch` 会自动计算出合适的宽度；同样，一旦选择了宽度，`Sketch`\
    \ 会计算出合适的高度。`Sketch` 还允许你同时导出同一元素或画板的多个版本和尺寸。图 10-4 中展示了这些选项的截图。\n\n![A978-1-4842-1458-9_10_Fig4_HTML.jpg](img/A978-1-4842-1458-9_10_Fig4_HTML.jpg)\n\
    \n**图 10-4.** 在 `Sketch` 中导出尺寸、后缀和格式\n\n选择好尺寸和格式后，`Sketch` 还会在文件名末尾自动添加相应的后缀。将图像导入\
    \ `Xcode` 后，在软件开发过程中 `Xcode` 会识别这个后缀。\n\n> **提示**  \n> 默认的尺寸和格式选项是 `1×` 和 `PNG`。\n\
    \n### 快速导出法\n\n如果你想要一种无痛且简便的方法，无需执行上述任何步骤即可立即导出一个图层，`Sketch` 同样能满足你的需求。在你选择了要导出的区域并在检查器中显示为预览后，只需将其拖拽到桌面上，即可立即转换为所选格式和尺寸。没有比这更简单的了。\n\
    \n## 导出画板\n\n如果你正在移交资源，并需要展示最终产品的样子，那么导出画板就是你将会做的事情。不过，更多情况下，你导出的是图标和图层等单个资源。目前，我们将专注于导出画板本身。这个过程非常简单。假设我们想要导出\
    \ PhotoBomb 应用的主页。首先，你需要在画布或图层列表中选中整个画板。完成后，点击检查器面板右下角的 **Make Exportable** 按钮。你会看到尺寸、后缀和格式设置也会显示在预览窗格中。对于此示例，你可以保持默认设置。那里的设置应该是尺寸为\
    \ `1×`，无后缀，以及 `PNG` 作为目标格式。再次点击 **Export** 按钮，会弹出一个目标位置窗口，让你选择最终导出文件的保存位置。图 10-5\
    \ 显示了导出前的界面。最终导出的将是一个指定位置的平面化 `PNG` 文件。\n\n![A978-1-4842-1458-9_10_Fig5_HTML.jpg](img/A978-1-4842-1458-9_10_Fig5_HTML.jpg)\n\
    \n**图 10-5.** 导出前高亮显示检查器的主页画布\n\n## 导出单个资源\n\n导出单个资源是你很可能经常要做的事情。图标在设计中的应用非常广泛，尤其是在\
    \ iOS 设计中。因此，了解如何为 iOS 开发导出图标非常重要。切片可以被创建并作为组文件夹的成员存储，以便于组织。如你所知，通过从 **Insert**\
    \ 菜单下拉中选择 **Slice** 来创建切片。例如，假设我试图为标签栏中的“开始”图标创建一个切片。我会在其周围创建一个切片。`Sketch` 会直观地创建该切片的预览。调整好大小后，我可以选择需要为该图标创建的、适用于不同分辨率的各种版本，如图\
    \ 10-6 所示，然后导出所有三个图标为尺寸合适的 `PNG` 文件。只有预览中显示的切片才会被导出。\n\n![A978-1-4842-1458-9_10_Fig6_HTML.jpg](img/A978-1-4842-1458-9_10_Fig6_HTML.jpg)\n\
    \n**图 10-6.** 创建三个不同尺寸（`@1×`、`@2×` 和 `@3×`）的切片用于导出\n\n不过，你的切片必须精确，因为切片选项会精确剪裁窗口内选中的内容。你始终可以使用检查器来查看图像的哪一部分正在被选中并随后导出。\n\
    \n## 为资源创建文件夹\n\n导出资源可能是一项混乱的工作，但就像组织和命名你的图层一样，它同样重要。组织好你的资源也很重要，尤其是在将它们交给开发者时。我努力让我的图层标题直观易懂，并尝试导出到开发者可以找到所需一切资源的文件夹中。`Sketch`\
    \ 也使得这个过程变得简单。\n\n`Sketch` 提供了一个便捷的功能。通过更改图层的名称并添加一个正斜杠（`/`），`Sketch` 会自动创建一个包含你的资源的文件夹。其约定是：正斜杠之前的部分是文件夹名称，之后的部分是你的切片或资源的名称。例如，要创建一个名为“Button”的文件夹，里面包含一个名为“Check\
    \ Button”的资源或切片，如图 10-7 所示，我将组名改为了 `Button/Check Button`。`Sketch` 自动创建了一个包含该资源的文件夹。\n\
    \n![A978-1-4842-1458-9_10_Fig7_HTML.jpg](img/A978-1-4842-1458-9_10_Fig7_HTML.jpg)\n\
    \n**图 10-7.** 如何命名图层以便 Sketch 自动为你的资源创建文件夹\n"
- fmt: "### Trimming Backgrounds\n\nSometimes, when you select a slice for export,\
    \ Sketch will automatically include the background. But most times, we aren't\
    \ really looking for the background to be exported with the assets. This is the\
    \ case particularly with some icons and especially buttons. Sketch has an easy\
    \ way of dealing with unwanted backgrounds when you really only want the asset\
    \ itself. Here's how it works. Using our PhotoBomb capture page as an example,\
    \ let's say that we only want to select the button on this page used to take the\
    \ actual photograph. As explained previously, you would select the asset. But,\
    \ when the preview appears in the Inspector as shown in Figure [10-8](#A978-1-4842-1458-9_10_Chapter.html#Fig8),\
    \ we can see that the background image has been included.\n\n![A978-1-4842-1458-9_10_Fig8_HTML.jpg](A978-1-4842-1458-9_10_Fig8_HTML.jpg)\n\
    \nFigure 10-8. Sometimes Sketch will select a background image for export along\
    \ with the selected asset\n\nSince we don't want the background to be exported,\
    \ we select the check boxes above the preview that allow us to \"Export Group\
    \ Contents Only.\" This tells Sketch that we aren't interested in background and\
    \ only selects and exports the asset we want. The resulting exported PNG file\
    \ is shown in Figure [10-9](#A978-1-4842-1458-9_10_Chapter.html#Fig9).\n\n![A978-1-4842-1458-9_10_Fig9_HTML.jpg](A978-1-4842-1458-9_10_Fig9_HTML.jpg)\n\
    \nFigure 10-9. Final exported PNG without the background image\n\nThere you have\
