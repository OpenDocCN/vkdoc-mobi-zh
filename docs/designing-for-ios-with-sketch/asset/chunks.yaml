- fmt: '### Creating the Spark


    Every fuse has a spark, right? So let’s create one for our bomb. It really doesn’t
    get easier than this with Sketch. Here are the steps to creating the spark for
    our bomb.


    - Select the `star` shape from the `Insert` menu and draw a start onto your canvas
    at the end of the fuse of the bomb.

    - Go to the `Inspector` and increase the number of points on the start to 12.

    - Remove the border and change the fill color to Hex code `F5A623`.

    - Repeat steps 1 and 2 to create a new star.

    - Move the new star a few pixels away from the first star.

    - Remove the border of the second star and change the fill color to `F8E71C`.


    You should now have a spark at the end of the fuse and your icon design should
    look like the graphic in Figure [9-9](#A978-1-4842-1458-9_9_Chapter.html#Fig9).


    ![A978-1-4842-1458-9_9_Fig9_HTML.jpg](A978-1-4842-1458-9_9_Fig9_HTML.jpg)


    *Figure 9-9. The PhotoBomb app icon with the newly added spark at the end of the
    fuse*


    Now that our spark has been added, our icon is really starting to take shape.
    Going back to our initial advice on designing app icons, I want users to be able
    to look at the app and get a very clear idea of what the app is about and what
    they can do. The word PhotoBomb typically means that a photo has been bombed or
    spoiled by another person entering into the frame and ruining the shot. Our app
    is not about that. So, how do we give potential users a very clear sense of what
    this app is about? Well, that’s where the camera comes into play. But, will it
    really fit inside the bomb? Well, it required removing the shine that we just
    added. But, this is a necessary part of the design process.


    Let’s begin. First, let’s group and hide the sheen layers so they are out of the
    way.


    - Select all that make up the sheen on the bomb image.

    - Select the `Group` button in the `Header` menu to create a new folder containing
    the shapes.

    - Rename the group `“Sheen”` or some variation of the word so you can easily find
    this group.

    - Hover over the menu and click the eye icon that appears to hide them from the
    canvas.


    The results are shown in Figure [9-10](#A978-1-4842-1458-9_9_Chapter.html#Fig10).


    ![A978-1-4842-1458-9_9_Fig10_HTML.jpg](A978-1-4842-1458-9_9_Fig10_HTML.jpg)


    *Figure 9-10. We now have cleaned up and titled layers appropriately and hidden
    the sheen so that we can continue with business of adding the camera to the icon*


    ### Adding the Camera!


    Next, let’s add the camera. Sure, we could import an icon of a camera but, here,
    we want to put to good use all of the skills we’ve developed in the previous chapters.
    With Sketch, we can create our very own camera icon using shapes we can easily
    create. Here are the steps to create the camera:


    **First, we will create the camera body.**


    - Create a `412 × 290` rectangle with a corner radius of `46`.

    - Remove the fill and give the border a thickness of `12`.


    **Next, we’ll create the lens.**


    - Select the `oval` tool from the `Insert` menu:

    - Hold the `Shift` key while drawing the circle to make it perfect circle of `214
    × 214`.

    - Go to the `Inspector` tool to give the circle a thickness of `12`.

    - Use `↑ + D` to make a duplicate of the first circle.

    - Resize the second circle to `162 × 162` and give this new circle a thickness
    of `7`.

    - Position the second circle inside the first.


    **We’ll create the flash on top of the camera next:**


    - Create another rectangle by selecting the `rectangle` tool from the `Insert`
    menu.

    - Go to the `Inspector` tool and give it a thickness of `12`.

    - Double-click the shape to bring up the `Bezier` tools.

    - Select the `Straight` tool and drag the two top corners closer together to create
    the shape of the flash.

    - Move this new shape to the top of the camera body shape.


    **To create the Take Picture button:**


    - Select the `oval` from the `Insert` menu.

    - Hold the `Shift` key while drawing the circle to make it a perfect circle of
    `32 × 32`.

    - Go to the `Inspector` tool to give the circle a thickness of `7`.

    - Position the circle in the upper right corner of the camera body.


    Our camera has now been created. I’ve hidden the other layers of the icon including
    the bomb, fuse, and spark so that I could focus on the camera. Figure [9-11](#A978-1-4842-1458-9_9_Chapter.html#Fig11)
    shows the camera we’ve just created on the canvas without the other elements.


    ![A978-1-4842-1458-9_9_Fig11_HTML.jpg](A978-1-4842-1458-9_9_Fig11_HTML.jpg)


    *Figure 9-11. The completed camera icon that will be added to the rest of the
    design*


    With the camera icon completed, we are now ready to put everything together to
    see how our final app icon will look.


    To make my final adjustments, I’ll need to unhide all of the other layers on the
    canvas to ensure that they all work well. To do this, I’ll just click the eye
    on every layer that has been hidden and watch them reappear on the canvas. After
    making my final adjustments in spacing, the final icon can be seen in Figure [9-12](#A978-1-4842-1458-9_9_Chapter.html#Fig12).
    It may not be the best icon in the world, but it holds fast to some of our principles
    outlined earlier in the chapter. If you have time, you may want to put the app
    before an informal focus group to see if potential users can glean what the app
    is about.


    ![A978-1-4842-1458-9_9_Fig12_HTML.jpg](A978-1-4842-1458-9_9_Fig12_HTML.jpg)


    *Figure 9-12. The completed PhotoBomb app icon*


    ### Other Changes for Consistency


    Now that the PhotoBomb icon is complete, I decided to go back and change the old
    logo we’d been using on the onboarding pages and in the header of the main app.
    To do this, I needed to create a smaller version of the bomb icon only, one that
    would fit in between the letters of our logo. To do this I made a duplicate of
    the icon and deleted the camera, as it would be too small to show. Then I resized
    the bomb icon and changed the fill color from black to white and added it to the
    logo. I grouped the layers and created a new logo symbol so that any additional
    changes or adjustments would be reflected across my designs. The new onboarding
    screens with the new bomb icon in the log are shown in Figure [9-13](#A978-1-4842-1458-9_9_Chapter.html#Fig13).


    ![A978-1-4842-1458-9_9_Fig13_HTML.jpg](A978-1-4842-1458-9_9_Fig13_HTML.jpg)


    *Figure 9-13. Onboarding screens with redesigned bomb icon in the logo*


    Our app icon is complete. The process of going back and making final adjustments
    happens in most stages of the design process. Most projects won’t easily flow
    from one phase to the other. There may be lots of backtracking and making changes
    midstream. The key to being a good designer is to always remain flexible at any
    stage in the process. Each shift or change will bring a fair amount of learning
    with it.


    We’ve wrapped up our designs, created an app icon we’re pretty happy with, and
    made our final adjustments. We’re now ready to hand off our designs to an engineer
    for development. The next chapter will take us through that process.'
