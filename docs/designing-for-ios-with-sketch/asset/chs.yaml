- '# 1. 为什么选择 Sketch？


  恭喜你！你已经决定开始使用 `Sketch` 来设计 iOS 应用。这是一个重要的决定。你可能注意到，也可能没注意到，设计界目前正酝酿着一场争议。你问是什么争议？那就是：究竟是继续使用多年来作为行业标准的
  `Adobe Photoshop`，还是选择一款名为 `Sketch` 的更新、更小巧、更快速的替代软件。


  最近，许多设计师都选择了 `Sketch`，这款软件曾是由荷兰海牙软件开发公司 Bohemian Coding 开发的一款鲜为人知的图形软件。许多人已将这款应用融入了他们的设计工作流程。这些设计师包括国际知名平面设计师、曾任《*纽约时报*》设计总监的
  Khoi Vihn，以及多家设计咨询公司和诸如 `BuzzFeed`、`SEGA`、`Google` 等企业，还有像 `Pinterest` 和 `Groupon`
  这样的初创公司。`Sketch` 似乎正在席卷整个设计界。这款应用仅适用于 Mac OS，售价仅为 99 美元，比 Photoshop 更快速，体积也更小（约
  40MB）。再加上它是专门为从事移动应用和网页 UI 设计的设计师量身打造的，这一切都为选择 `Sketch` 提供了极具说服力的理由。


  本书的目的并非说服你弃用 Photoshop 而改用 `Sketch`。既然你正在阅读此书，我假设你已经决定探索如何将 `Sketch` 融入你的设计工作流程。平心而论，Photoshop
  自有其用途。你仍然需要用它来编辑照片、光栅文件以及处理其他任务，正如其名。数十年来，Photoshop 一直是平面设计师们事实上的“首选”软件，因为它在某些方面的表现优于市场上的任何其他软件。


  本书的主要目的是向你介绍 `Sketch`，并阐述为什么对于任何考虑为 iOS 设备进行界面设计的人来说，它都是一个出色的工具。在某些地方，我会指出 `Sketch`
  和 Photoshop 的差异，但我绝不是说 Photoshop 不好而 `Sketch` 就好。任何关于“`Sketch` vs. Photoshop”的搜索都会找到大量文章，论述设计师们为何认为某款软件优于另一款。其中一些观点会在本书中复述，但仅限于与本书总体目标相关的部分；也就是说，为了设计出优秀的
  iOS 界面。


  ## 一段小历史


  虽然 Photoshop 已经面世大约 25 年——其初始版本于 1990 年 2 月发布——但 `Sketch` 在设计界算是相对的新面孔。它的早期版本未能在设计界引起巨大波澜。虽然一些设计师注意到了它，但起初它的普及程度远不及今天。Adobe
  的设计软件套件，即之前的 Creative Suite，仍然是行业标准。事实上，许多设计师和机构至今仍对其深信不疑。


  接着，在 2013 年，Adobe 宣布其 Creative Suite 将仅能通过基于云端的订阅计划获取，这一举措证明了其业务模式的转变。旧版的 DVD 版本将不再提供，用户需要注册每月
  40 美元的订阅计划才能使用软件。Creative Suite 包含了全球设计专业人士使用的一些 Adobe 顶级软件——Photoshop、InDesign、Premiere
  Pro、AfterEffects、Dreamweaver、Illustrator 以及其他 Adobe 产品都将迁移至云端。该产品被重新命名为 Adobe Creative
  Cloud。


  需要明确的是，用户通过 Creative Cloud 使用软件时不会察觉到明显差异，且软件仍然需要下载并安装到他们的机器上。这种云端模式的主要区别在于，需要定期（通常每
  30 天左右）通过互联网连接来验证软件版本是否有效。如果与 Adobe 服务器进行的验证检查发现订阅已失效，那么该软件将被视为无效且无法继续使用。


  新的订阅模式提供了不同的价位——学生版每月 19.99 美元，普通版定价 49.99 美元。考虑到完整版的 Adobe Creative Suite 价格可能高达
  2500 美元左右，有些人认为这很划算。但设计界中也有人对此变革感到困扰。如今，Creative Cloud 允许访问 Adobe 全套软件程序，许多设计师已经注册了这项新服务。最近的报告显示，Adobe
  目前拥有 461 万付费 Creative Cloud 客户，并计划在 2015 年底前将其增加到 600 万。


  Creative Cloud 的最新更新将在 Photoshop 中引入画板功能（这是 `Sketch` 的一个关键特性，我们稍后将讨论）。值得注意的是，它还包含了
  Adobe Design Space，这是一个新的基于 HTML 的设计工具，拥有精简的界面，看起来与 Sketch 惊人地相似。


  长期以来，Photoshop 一直保持着为网页和移动应用创建界面的平面设计师们事实上的标准地位。多年来，它一直无人能敌，但私下里，许多设计师早已厌倦了 Photoshop
  和 Illustrator 的臃肿。这些程序体积庞大，需要大量的 RAM 资源才能运行。仅 Photoshop 就需要至少 2GB 的 RAM，推荐 8GB。


  一些设计师（包括本书作者）认为，随着网络环境的变化以及手机和平板电脑的日益普及，Adobe 在保持 Photoshop 与时俱进方面做得并不出色，它试图包揽太多，为太多人做太多事。它的渲染方式效率不高，任何创建过
  Photoshop 文件的人都知道，该程序倾向于以专有格式（PSD）生成非常巨大的文件。UI 设计师有其特殊需求，而许多人觉得这些需求并未得到满足。


  尽管如此，在相当长一段时间内，任何新来者想要挑战 Adobe 在设计领域的主导地位几乎都是不可能的。许多公司为团队投资了 Creative Suite，设计师们一边忍受着各种挫败感，一边期待能有更好的选择出现。




  '
- '# 进入 Sketch 2


  `Sketch` 首次进入我的视野是在 2013 年底，远早于其当前版本（v3.3.3）。当时第二版已经发布，我的一些朋友正在讨论这个程序。我看了一下界面，觉得它看起来非常简单。也许过于简单了，如图
  1-1 所示。那时，我仍然是 `Fireworks` 的粉丝，用它来做界面设计，主要是因为它的工具非常专注，不像 `Photoshop` 那样让人不知所措。当时，我并没有足够的兴趣去深入探究或更好地理解
  Bohemian Coding 试图用 `Sketch` 实现什么目标。


  ![A978-1-4842-1458-9_1_Fig1_HTML.jpg](img/A978-1-4842-1458-9_1_Fig1_HTML.jpg)


  图 1-1. `Sketch` 2 的界面


  然而，就像那辆不懈努力的小火车头一样，这家斗志昂扬的软件工作室对程序进行了稳步且持续的改进。从一开始，他们就在倾听并密切关注着他们日益壮大的社区中设计师们的反馈。这在每一次
  `Sketch` 的发布中都显而易见。


  首先，需要重点指出的是，`Sketch` 是一款 Mac OS X 应用。这意味着 `Sketch` 最初是为在 Mac 操作系统上独立且独家运行而创建的。因此，其版本的发布时机和优化都与苹果操作系统的各个版本相协调。从
  `Sketch` 2.3 版本开始，它被称为“Snow Leopard”版本。该团队增加了布尔运算、背景模糊以及将 PDF 和 EPS 文件导入设计的功能。


  开发人员还专注于提升程序的响应性和速度。像背景模糊这样的功能对 iOS 设计师来说非常重要，因为这一特性在苹果对 iOS 的全面革新中十分突出。鉴于这种新外观在各地的
  iPhone 上广泛展示，`Sketch` 开发团队有先见之明地将此功能加入了程序中。正是这种思维方式让设计师们注意到了 `Sketch`。


  '
- '# Sketch Mirror


  Bohemian Coding 展现出远见卓识的另一个功能是增加了 `Sketch Mirror`（见图 1-2）。这个便捷的功能允许设计师在他们的 iPhone
  或 iPad 上完美预览自己的作品。`Sketch Mirror` 作为一个独立的 iPhone 应用发布，可通过应用商店获取，它能根据分辨率放大或缩小你的设计，并允许你直接在
  iPhone 或 iPad 上预览设计。这个小小的改变展示了 Bohemian Coding 不仅致力于服务移动应用的设计师，也致力于 iOS 本身；也就是说，`Sketch`
  向当时占主导地位的移动平台表示了致敬。


  ![A978-1-4842-1458-9_1_Fig2_HTML.jpg](img/A978-1-4842-1458-9_1_Fig2_HTML.jpg)


  图 1-2. `Sketch Mirror` 允许设计师在 iPhone 上预览设计


  Bohemian Coding 的团队并不满足于现状，他们持续改进这个程序。`Sketch` 2.4 改进了蒙版功能，显著提升了分组、调整大小、移动以及取消分组大量图层时的速度，修复了多个
  bug，并提高了色彩准确度——这对所有设计师来说都至关重要。


  ## 再见，Fontcase……


  Bohemian Coding 心系全球设计师需求和愿望的一个关键证明，是退役了 `Fontcase`。对于那些不了解的人来说，`Fontcase` 是一个字体管理系统，允许设计师和平面设计师存储、管理和预览他们的字体。虽然这听起来可能多余且不必要，但对设计师来说，像
  Font Manager 这样的工具极其重要。设计师需要知道系统中安装了哪些字体以及它们的外观，而 Font Manager 使得浏览字体变得非常容易。该程序一度直接内置于
  iOS 中。由于 `Fontcase` 在字体激活和沙盒机制方面存在问题，Bohemian Coding 团队明智地决定退役 `Fontcase`。显然，当时存在重大问题，`Fontcase`
  无法正常工作。此外，设计师们也很难理解最初为什么需要它。正如 Bohemian Coding 博客所述：


  > “我们认识到，`Fontcase` 的主要功能在当今时代已不再需要或不适用，是时候让它退役了。因此，我们做出了艰难的决定，将该应用从商店中移除。我们将为任何遇到问题的人提供非沙盒版本，但这将是
  `Fontcase` 的最后一个版本。”


  排除了 `Fontcase` 的干扰后，团队继续完善这个程序。随后发布了一些次要版本，这表明团队在努力修复软件中 bug 的同时，也密切关注着设计界的动态。同样重要的是要注意到，`Sketch`
  的版本发布、修复和更新比 `Photoshop` 更加及时。设计师们常常抱怨 `Photoshop` 的重大更新和版本发布间隔大约两年。而 `Sketch` 则大约每隔一个月左右就会发布一次更新。这充分说明了拥有一个更精干、更敏捷的开发团队的优势。


  就这样，`Sketch` 引起了设计界的关注。尽管如此，只有更大胆的设计师才会放弃 `Photoshop`，完全转向 `Sketch`。许多其他人则在观望和等待，看这款软件将如何发展，以及它是否会成为真正的竞争者。


  ## 苹果设计奖


  自 1996 年以来，苹果每年都会在其年度全球开发者大会（WWDC）上宣布其久负盛名的设计奖得主。设计奖颁发给在设计和开发方面表现卓越的顶级应用。这是苹果授予那些使用其软件产品达到了最高设计标准的开发者的一项崇高荣誉。这些应用为苹果期望在其平台上实现的用户体验树立了标准。它们兼具创新性和启发性。在评选苹果设计奖时，苹果会寻找那些令人愉悦、创新、领先、引人入胜、赋能且设计精良的应用。该奖项旨在表彰苹果认为由世界各地独立开发者创造的最佳应用。


  `Sketch` 是 2012 年的设计奖得主之一。对于那些因高标准的设计而被苹果软硬件产品吸引的设计师来说，这是一件了不起的大事。这不仅意味着 `Sketch`
  的开发者通过创建一款能让设计界集体生活更轻松的应用而引起了他们的注意，还意味着他们在创建一款美观的应用时做到了这一点。通常情况下，软件的功能性往往会掩盖其外观和使用感受。通过赢得苹果著名的设计奖，Bohemian
  Coding 已经牢固地确立了自己作为领先设计和软件开发公司的地位。此外，随着设计对许多公司来说变得越来越重要，`Sketch` 成为了值得关注的焦点。




