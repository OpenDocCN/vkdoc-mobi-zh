  \ 会在每个图层旁边显示一个小图标，告诉您该图层包含哪种元素。形状图层会有一个形状图标，文本图层会显示一个小的 AA，而包含图像的图层则会有一个小的图片图标。这些图标让您能够轻松识别每个图层的内容。\n\
  \n如图 2-7 所示的图层列表显示了画布上的所有图层，您可以在其中对它们进行组织。任何图层都可以被选中并在画布上移动。随着您添加更多图层，该列表会逐渐填充。如果您在画布上添加一个新形状，您将看到在顶部会创建一个新图层。Sketch\
  \ 会根据您创建的形状自动命名该图层。图层可以相互重叠，您可以直接在图层列表中操作哪个图层显示在最上面或最下面。您也可以使用工具栏中的“前移”和“后移”按钮来实现这一点。\n\
  \n![A978-1-4842-1458-9_2_Fig7_HTML.jpg](img/A978-1-4842-1458-9_2_Fig7_HTML.jpg)\n\
  \n图 2-7. 图层列表显示了画布上的所有元素。\n\n### 选择和移动图层\n\n图层相当灵活，您可以随时在画布上移动它们。要选择一个图层，您可以在图层列表中选择图层名称，或者在画布上选择特定的图层。一旦您选中了一个图层，就可以在画布上移动它。您可以通过出现的白色控制柄来判断图层已被选中。这些控制柄允许您更改该图层中形状的形状和属性。选中图层后，您可以使用检查器中的位置属性（如图\
  \ 2-8 所示）来移动它，或者使用鼠标在画布上拖动它。\n\n![A978-1-4842-1458-9_2_Fig8_HTML.jpg](img/A978-1-4842-1458-9_2_Fig8_HTML.jpg)\n\
  \n图 2-8. Sketch 画布上的一个图像和两个形状。请注意，每个对象在左侧的图层列表中都有一个对应的图层。\n\n提示  \n要每次以一个像素的增量移动图层，请使用键盘上的箭头键。要每次以\
  \ 10 个像素的增量移动形状，请按住 `Shift` 键并按箭头键。\n\n### 复制图层\n\n在 Sketch 中，有多种复制图层的方法。在画布上右键单击图层，会弹出一个新的菜单列表，然后从该列表中选择“复制”。完成此操作后，您将看到图层列表中出现了一个新图层。新形状将出现在画布上被复制形状的顶部。您只需移动它即可。或者，您也可以通过按住\
  \ `Option` 键并单击并拖动图层来创建新图层以复制它。\n\n### 隐藏和锁定图层\n\n在设计时，有时需要隐藏图层，以便您可以有效地在特定图层上工作，而不会受到其他图层的干扰或阻碍。Sketch\
  \ 让您可以轻松做到这一点。要隐藏一个图层，请将鼠标悬停在图层列表中单元格的右侧。会出现一个小的“眼睛”图标。出现后，点击它。您将看到对应的形状从画布上消失。但是，它仍会保留在图层列表中。任何被隐藏的图层，其文本会变灰，旁边会有一个眼睛图标。\n\
  \n出于类似的原因，您可能需要锁定图层。有时，设计师会锁定他们的背景图层，以防止它干扰他们在其他图层上的工作。由于背景不太可能改变，有时可以将其锁定，同时保持可见，以防止意外编辑。要锁定图层，请右键单击并从菜单中选择“锁定图层”。您将看到图层列表中对应的图层旁边会出现一个锁定图标。该图标表示该图层已被锁定，无法编辑。只需再次点击锁定图标即可解锁图层并允许其进行编辑。图\
  \ 2-9 显示了一个隐藏的图像图层和一个锁定的文本图层。\n\n![A978-1-4842-1458-9_2_Fig9_HTML.jpg](img/A978-1-4842-1458-9_2_Fig9_HTML.jpg)\n\
  \n图 2-9. 画布上图像图层被隐藏，文本图层被锁定。\n\n### 组\n\n在您的图层中，您还可以创建组。组是组织设计的好方法。例如，如果您有多个图层构成了应用程序中的标签栏，您可能希望将所有元素分组。\n\
  \n要创建一个组，请选择您想要分组的所有图层。您可以通过选择并拖动一个框框住所有想要分组的元素来选择多个图层。或者，您可以按住 `Shift` 键并在图层列表中选择所有想要分组的图层。选中所有图层后，点击工具栏中的“分组”按钮。您会注意到图层列表中创建了一个文件夹。点击该文件夹将显示构成该组的各个图层。\n\
  \n组也可以嵌套。也就是说，在其他组内可以包含图层组。例如，如果在您的“标签栏”组中有五个图标，您可能希望在该组内创建一个图标组。那么图标组文件夹将位于标签栏组文件夹内。\n\
  \n提示  \n您可以通过打开一个组并在画布上拖动它，将图层中的一组形状作为一个整体移动。\n\n### 检查器\n\n检查器位于用户界面的最右侧，如图 2-10\
  \ 所示，它会显示画布上所选图层的各种属性。根据您选择的内容，它会显示诸如大小、颜色和样式等信息。检查器包含允许您查看屏幕上所选对象属性的工具。如果您选择一个图像，您将看到与该图像相关的属性。如果您选择文本，您将看到与该文本主体相关的属性。如果您在文档中更改任何内容，您会注意到检查器中的属性可能会并且将会发生变化。要编辑一个形状，您可以直接在检查器中工作以更改数值。这些数值包括位置和大小。\n\
  \n![A978-1-4842-1458-9_2_Fig10_HTML.jpg](img/A978-1-4842-1458-9_2_Fig10_HTML.jpg)\n\
  \n图 2-10. 选中一个形状并在右侧检查器面板中显示其属性的 Sketch 画布。\n\n## 样式\n\n您可以在检查器中调整与图层相关的样式。以图 2-9\
  \ 中的圆形为例。请注意它是一个纯红色。该颜色与检查器中的“填充”设置相关联。“填充”设置旁边的复选框已被选中。该窗口中的颜色直接与圆形的颜色相关联。点击填充旁边的红色方块会弹出一个弹出窗口，其中包含该图层的多种不同填充选项。在弹出窗口区域内任意位置点击，即可更改图层颜色的深浅。您可以使用颜色区域下方的滑块来更改颜色，或调整其不透明度。取色器允许您对屏幕上\
  \ Sketch 内部或外部的任何颜色进行取样。在取色器下方，您还可以编辑 RGB 或十六进制颜色代码。\n\n弹出窗口顶部的图标代表了填充纹理的不同选项。这些选项从左到右依次为：纯色填充、径向渐变、角度渐变、图案填充和噪点填充。\n\
  \n边框颜色也可以编辑，并可以更改其粗细以及其他设置。此外，还可以通过检查器面板中的选择来为您的形状添加阴影（外部或内部）。\n\n\n\n### 智能参考线\n\
  \n在画布上移动形状时，可能会注意到偶尔出现的带有数字的红色线条。这些线条被称为智能参考线。它们能帮助您在图层中测量和对齐元素。数字会显示两个图层之间的距离，如图\
  \ 2-11 所示，而参考线则能帮助您将一个图层与另一个图层对齐。\n\n![A978-1-4842-1458-9_2_Fig11_HTML.jpg](img/A978-1-4842-1458-9_2_Fig11_HTML.jpg)\n\
  \n图 2-11. 智能参考线显示两个图层之间的距离\n\n**提示：** 按住 `Option` 键的同时将鼠标悬停在两个图层上，会显示这两个图层之间的距离，以及它们是否对齐。\n\
  \n## 画板\n\n如果您使用过 Adobe Illustrator，可能对画板的概念很熟悉。画板允许您为 Sketch 的无限画布定义边界。它会创建与特定设备或屏幕对应的设定尺寸，供您在其中进行设计。\n\
  \n您可以通过点击左上角的 `Insert` 按钮并从菜单中选择 `Artboard` 来在 Sketch 中创建画板。您可以创建自己的画板，或者幸运的是，对于为\
  \ iOS 进行设计的人来说，Sketch 附带了一些预设尺寸的模板，让您可以轻松上手。这样，您只需为设计选择合适的尺寸，就能直接开始工作。\n\n您可以在 Sketch\
  \ 的一个画板中创建整个应用程序，这非常有用。这是一种方便的方式，可以查看整个应用的外观，而无需为每个屏幕浏览多个不同的文件。它还为 Sketch 的无限画布增加了一些约束。画板会根据您所针对的设备，创建一个正确尺寸的边界。\n\
  \n从 `Insert` 按钮菜单中选择 `Artboard` 后，各种模板会出现在 Sketch 窗口的左侧。Sketch 提供了 iPad（竖屏、横屏和 Retina）以及\
  \ iPhone（竖屏、横屏和 Retina）的模板，如图 2-12 所示。此外，还有 iOS 图标的模板。\n\n![A978-1-4842-1458-9_2_Fig12_HTML.jpg](img/A978-1-4842-1458-9_2_Fig12_HTML.jpg)\n\
  \n图 2-12. Sketch 3 中的预设画板模板\n\n您会注意到，选择一个画板模板后，画布上会添加相应的画板，同时左侧的图层面板中也会出现一个图层。图层的标题将与模板相对应。要更改图层名称，您可以像重命名其他文件一样，双击它然后重新命名。\n\
  \n如果您为 iPhone 等设备选择了一个模板，Sketch 会创建一个尺寸与该设备匹配的画板。您还可以在一个画布上拥有多种画板。例如，如果您正在创建一个需要同时在\
  \ iPhone 和 iPad 上运行的通用应用，这将非常有用。在这种情况下，您可以添加 iPhone 和 iPad 的模板，并展示该应用在两个设备上的显示效果。这对于呈现您的作品来说是一种很好的方式。\n\
  \n您可以重新排列、复制甚至导出您的画板，以适应您的设计需求。在 Sketch 中，有几种复制画板的方法。您可以复制粘贴画板，然后使用参考线手动排列它们，或者使用\
  \ Sketch 方便的 `Make Grid` 功能。此功能只需点击几下就能复制画板。只需从菜单中选择 `Arrange`，然后从下拉菜单中选择 `Make\
  \ Grid`，如图 2-13 所示。通过更改 `Rows` 和 `Columns` 字段中的数值来选择要复制的画板数量，完成后点击 `Make Grid`。Sketch\
  \ 会根据您的选择自动复制画板，并将它们在画布上对齐。\n\n![A978-1-4842-1458-9_2_Fig13_HTML.jpg](img/A978-1-4842-1458-9_2_Fig13_HTML.jpg)\n\
  \n图 2-13. Sketch 3 中的 `Make Grid` 功能可帮助您复制和对齐画板\n\n画布上的画板构成了您设计的整体结构。然而，有时您会希望或需要将画板分开。例如，如果您的设计极其复杂，并且希望使用多个画板来代表特定的流程，那么将设计分解成多个页面可能会更有好处。Sketch\
  \ 支持这一功能。在画布的左上角，`Layers` 列表的上方，您会看到当前正在处理 `Page 1`。要添加页面，只需点击右侧看起来像向下箭头的按钮。点击后，该按钮会变成一个加号\
  \ (`+`) 符号，这样您就可以为您的设计添加后续页面。\n\n## 标尺和参考线\n\n首次打开 Sketch 时，您不会看到任何标尺或参考线。这是因为它们默认是隐藏的。您可以通过点击工具栏中的\
  \ `View` 图标来访问标尺。这会显示一个下拉菜单，允许您从标尺、网格和其他布局选项中进行选择，如图 2-14 所示。显示像素的选项也在这个菜单中。这些工具的目的是帮助您正确地对齐设计中的元素。\n\
  \n![A978-1-4842-1458-9_2_Fig14_HTML.jpg](img/A978-1-4842-1458-9_2_Fig14_HTML.jpg)\n\
  \n图 2-14. 从工具栏展开后的 `View` 菜单下拉选项\n\n以下是各种选择及其含义：\n\n### 显示像素\n\n`Show Pixels` 选项将以像素模式在屏幕上显示您的元素。当您想了解基于矢量的设计在浏览器等环境中以像素形式呈现的效果时，这会很有帮助。\n\
  \n### 显示标尺和参考线\n\n由于 Sketch 的无限画布特性，标尺不像其他图形设计程序中那样固定。这意味着您可以移动它们以适应您的设计。例如，如果您正在为预设画板模板中未包含的屏幕尺寸进行设计，您可以在画布上创建这些尺寸，并将其用作设计中的参考。当然，如果您移动了\
  \ Sketch 标尺的原点，原点之前的任何内容都会以负数显示。图 2-14 显示了一个调整了标尺的 Sketch 画布。如果因为某些原因需要重置标尺，只需点击水平和垂直标尺线相交的地方即可。这会将标尺恢复为其原始度量。\n\
  \n您可以通过点击标尺上的任意位置来在画布上添加参考线。参考线会显示为红色线条，并在您移除它们之前一直存在。图 2-14 已激活了参考线和标尺。水平和垂直标尺的原点也已调整。\n\
  \n### 显示网格\n\n激活 `Show Grid` 功能后，画布上会创建网格线。这是一个典型的网格，由相交的线条绘制成方格，如同大多数图形程序中的常规设置。默认情况下，网格每\
  \ 10 个方格会显示一条粗黑线。网格的默认大小为 20 像素。图 2-15 已激活网格功能。您也可以调整此设置。您需要返回 `View` 菜单，并从菜单中选择\
  \ `Grid Settings`。这将打开一个窗口，允许您更改网格块的大小和颜色，以及粗线出现的频率。\n\n![A978-1-4842-1458-9_2_Fig15_HTML.jpg](img/A978-1-4842-1458-9_2_Fig15_HTML.jpg)\n\
  \n图 2-15. Sketch 画布上的网格线\n\n### 显示布局\n\n`Show Layout` 网格是 Sketch 中可用的另一种网格。它允许您定义列和行。如果您正在使用\
  \ Sketch 进行网页设计，您的网格设置会有所不同，您可能需要改用布局网格。这些网格也可以根据您的需求进行修改。\n\n\n\n"
- '# 快捷键


  在深入了解 `Sketch` 之前，你最好先学习它的一些快捷键。它们能极大地改善你的工作流程，并减少执行某些操作所需的时间。作为 Mac 用户，你很可能已经熟悉复制粘贴等通用快捷键。以下是从网络各处收集的
  `Sketch` 快捷键综合列表。除了菜单中列出的快捷键外，你可以将此列表作为参考，直到你熟悉一些更常用的快捷键为止。


  ## Sketch 通用快捷键


  *   `⌃L` 切换布局

  *   `⌃G` 切换网格

  *   `Enter` 编辑当前选中的图层

  *   `⌘2` 缩放至选中图层

  *   `⌘3` 在画布中居中选中图层

  *   `⌘+` 放大

  *   `⌘-` 缩小

  *   `⌘1` 居中画布

  *   `⌘2` 缩放选区

  *   `Z` 缩放：按住并点击，或用鼠标拖拽区域

  *   `⌥ Z` 反向缩放：按住并点击

  *   `Esc` 退出当前工具或模式

  *   `Space` 抓手工具

  *   `Tab` 在当前组的图层间循环切换

  *   `Shift + Tab` 反向循环切换


  ## 图层快捷键（插入）


  *   `R` 矩形

  *   `O` 椭圆

  *   `L` 线条

  *   `U` 圆角矩形

  *   `T` 文本图层

  *   `V` 矢量

  *   `P` 铅笔

  *   `A` 画板

  *   `S` 切片


  ## 移动、隐藏和调整图层大小的快捷键


  *   `⌥+ 拖拽` 复制图层

  *   `⌥+ 悬停` 显示图层间距离

  *   `⌥+ 缩放` 从两端缩放

  *   `⇧+ 缩放` 保持宽高比

  *   `⌘ Shift L` 锁定或解锁图层

  *   `⌘ Shift H` 隐藏或显示图层

  *   `...➔` 移动

  *   `⌘...➔` 调整大小


  ## 文本与字体快捷键


  *   `Cmd + B` 加粗

  *   `Cmd + I` 斜体

  *   `Cmd + U` 下划线

  *   `Alt + CMD (+) +` 增大字号

  *   `Alt + CMD (+) -` 减小字号


  ## 自定义快捷键


  作为 Mac 用户，你可能也熟悉自定义快捷键。


  *   `Control R` 切换标尺显示

  *   `Control G` 切换网格显示

  *   `Control P` 在像素和矢量之间切换

  *   `Control L` 切换对齐参考线


  你也可以为那些没有快捷键的操作创建自定义快捷键。因为 `Sketch` 被设计为在 Mac OS 中运行，所以你能轻松创建自己的快捷键。例如，你可能会留意到（也可能不会）`Sketch`
  中的`插入图像` 并没有快捷键。你可以通过自己的键盘组合轻松创建一个快捷键。要创建自定义快捷键，请前往**系统偏好设置**并选择`键盘`。在窗口顶部的标签页中选择`App
  快捷键`，如图 2-16 所示。


  ![A978-1-4842-1458-9_2_Fig16_HTML.jpg](img/A978-1-4842-1458-9_2_Fig16_HTML.jpg)


  *图 2-16.* 你可以从电脑的“系统偏好设置”中创建自定义快捷键


  做出以上选择后，点击窗口底部的“+”按钮。会出现一个新的下拉菜单，列出你电脑上所有应用程序。向下滚动并在该列表中找到 `Sketch`。在名为`菜单标题`的字段中，输入你想要创建快捷键的菜单项的确切名称，如图
  2-17 所示。最后，在名为`键盘快捷键`的字段中，输入你新快捷键的对应按键，然后点击`添加`按钮。如果输入错误，你的快捷键将无法使用。


  ![A978-1-4842-1458-9_2_Fig17_HTML.jpg](img/A978-1-4842-1458-9_2_Fig17_HTML.jpg)


  *图 2-17.* 为您的键盘快捷键创建菜单标题


  一旦添加上，你会在该程序的快捷键列表中看到你新创建的快捷键，如图 2-18 所示。现在，你的快捷键应该可以在 `Sketch` 中使用了。你将能够从工具栏的下拉菜单中访问它。


  ![A978-1-4842-1458-9_2_Fig18_HTML.jpg](img/A978-1-4842-1458-9_2_Fig18_HTML.jpg)


  *图 2-18.* 创建自定义键盘快捷键


