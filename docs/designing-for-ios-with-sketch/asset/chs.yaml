- '# 文本检查器


  与任何其他文本编辑器一样，Sketch 为您提供了多种编辑字体粗细、颜色和大小的方法。点击“字体”选项会列出您计算机上的所有字体以及每种字体的预览。要选择一种字体，只需点击它即可。粗细选项会显示您所选字体的粗或细程度，还有其他选项，如斜体、纤细、粗体和黑色。


  如果您想创建带下划线或各种列表类型的文本，可以点击颜色选择器色块旁边的“选项”按钮找到这些功能。Sketch 提供双下划线文本、项目符号列表和编号列表作为选项。


  您还可以在 Sketch 中调整间距。您可以调整字符间距，即每个字符之间的空间。行间距指的是多行文本之间的垂直空间量。段落间距将调整程序在您按下回车键开始新段落后自动分配的空间。


  提示：如果您想插入换行符而不是段落分隔符，在键入文本时请按 `Shift+Return` 而非仅按 `Return`。


  ## 文本对齐


  Sketch 中的文本对齐相当直接，其工作方式与文字处理器和其他图形程序大致相同。您可以使用各种设置来左对齐或右对齐文本，或者居中或两端对齐文本。




  ### 路径文本


  有时，您可能希望文本沿非直线路径对齐。您可能希望文本跟随曲线或路径。Sketch 3 通过 `Text on a Path`（路径文本）功能实现了这一点。首先，创建一个非直线的矢量或路径。您可以使用
  `Vector`（矢量）工具，甚至可以使用椭圆等形状。创建好形状后，插入一个文本框并添加一些文字。选中文字，导航到 `Type`（类型）菜单，选择 `Text
  on a Path`（路径文本）选项。当您将文本框移近目标形状或路径时，文字将沿着曲线吸附到路径上，如图 4-9 所示。


  ![A978-1-4842-1458-9_4_Fig9_HTML.gif](img/A978-1-4842-1458-9_4_Fig9_HTML.gif)


  *图 4-9. 使用矢量和椭圆绘制的路径文本功能*


  ### 文本轮廓


  `Text Outlines`（文本轮廓）是 Sketch 中另一个强大的功能，当您希望实现一些独特效果时会派上用场。文本不能像操作形状那样被直接操纵，也不能附加某些操作。借助
  Sketch 中的 `Text Outlines` 功能，您可以让文本表现出类似于形状的特性。要使用此功能，您可以在画布上添加一个或多个字母作为示例。选中这些字母，导航到
  `Type`（类型）菜单，选择 `Convert Text to Outlines`（将文本转换为轮廓）选项。如果您只在画布上输入了一个字母，当您将该选中内容转换为
  `Text Outline`（文本轮廓）时，您会看到该字母上出现了控制手柄，并且 `Layers`（图层）列表会更新以反映此变化。这表明 Sketch 已将文本转换为一个形状，如图
  4-10 所示。现在，您就可以像编辑任何其他形状一样编辑这个字母了。


  ![A978-1-4842-1458-9_4_Fig10_HTML.jpg](img/A978-1-4842-1458-9_4_Fig10_HTML.jpg)


  *图 4-10. 使用 `Convert to Text Outlines`（转换为文本轮廓）功能将文本图层转换为形状前后的状态*


  如果您选择使用 `Text Outlines` 功能转换多个字母或一组字母，请注意这可能会占用大量计算机资源。原因在于，将包含多个字母的长文本项转换为矢量，需要
  Sketch 创建许多小的子路径。创建子路径需要 Sketch 对文本字符串中的每个字母执行大量布尔运算。如果必须转换长文本项，最好始终将文本拆分为多个图层。这样，您可以分别转换每个文本项，但这同样可能给计算机资源带来负担。


  ### 抗锯齿与文本


  Sketch 使用 macOS 的原生字体渲染能力，因此，在某些情况下，操作系统无法控制文本的外观。在这些情况下，它会使用**次像素抗锯齿**来改善文本在屏幕上的显示效果。这意味着每个像素都混入了红、绿、蓝光。由于每个像素实际上由红、蓝、绿子像素组成，其原理是，当从正常的观看距离（例如您与电脑显示器之间的距离）观察时，您的眼睛不会注意到这些彩色像素，而会看到尽可能清晰的文本。


  然而，有时次像素抗锯齿和图层混合无法生效，因为它需要在不透明背景上绘制，并在透明背景上渲染。当 Sketch 无法渲染启用次像素抗锯齿的字体时（例如在导出的 PNG
  中），您会清楚地看到这一点，因为背景是透明的，无法渲染。


  与 macOS 不同，iPhone 不会使用次像素抗锯齿来渲染文本，这在为 iOS 设计时带来了一些问题。因为您的设计在 iPhone 或 iPad 上的显示方式与在电脑屏幕上（尤其是在
  Retina Mac 上设计时）不同，所以您需要停用设计中的抗锯齿功能。（该功能默认是自动选中的。）您可以通过导航到 `Sketch` 菜单，选择 `Preferences`（偏好设置），然后取消选中该选项来禁用它，如图
  4-11 所示。


  ![A978-1-4842-1458-9_4_Fig11_HTML.jpg](img/A978-1-4842-1458-9_4_Fig11_HTML.jpg)


  *图 4-11. Sketch 中的 `Preferences`（偏好设置）面板允许您关闭字体的次像素抗锯齿功能*


  ### 文本样式


  Sketch 还允许您为文本附加样式，并可以轻松地将这些样式应用于设计中的文本块。例如，虽然您的应用中可能通篇使用同一种字体，但您可能希望在不同的地方（如标题、正文等）使用不同的字重和字号。这时，Sketch
  中的文本样式功能就派上用场了。您可以为文档中的图层应用无限数量的样式，并通过 `Text Inspector`（文本检查器）轻松管理它们。


  > **提示：** 文本样式仅在文档内可用。因此，它们可以在页面和画板之间共享，但**不能**跨不同的文档共享。


  当您在画布上创建初始文本时，`Inspector`（检查器）会指示选中的图层是否已赋予了样式。通常，在最初添加文本时，是没有样式的。一旦您添加了颜色、大小、大小写等属性，您可以通过在
  `Inspector`（检查器）中选择下拉菜单来将这些属性创建为样式，如图 4-12 所示。


  ![A978-1-4842-1458-9_4_Fig12_HTML.jpg](img/A978-1-4842-1458-9_4_Fig12_HTML.jpg)


  *图 4-12. `Text Inspector`（文本检查器）允许您创建新的文本样式，并将其分配给文档中的任何文本图层*


  选中下拉菜单后，Sketch 允许您创建一个新样式。默认情况下，新样式的名称将与文本内容一致。因此，此处的新样式将命名为“WE LOVE SKETCH Text
  Style”，并且会高亮显示，以便您编辑样式。然后，您可以将样式名称更改为您选择的任何名称。在图 4-13 中，我将文本样式的名称改为了“Header Text
  Style”。


  ![A978-1-4842-1458-9_4_Fig13_HTML.jpg](img/A978-1-4842-1458-9_4_Fig13_HTML.jpg)


  *图 4-13. `Text Inspector`（文本检查器）允许您更改样式的名称*


  现在，如果您正在处理一个包含文本的全新图层，您可以转到 `Inspector`（检查器），选择要分配给它的样式，然后应用它。


  您还可以通过导航到 `Insert`（插入）菜单，然后从下拉菜单中选择 `Styled Text`（样式文本）来为文本赋予样式，如图 4-14 所示。


  ![A978-1-4842-1458-9_4_Fig14_HTML.jpg](img/A978-1-4842-1458-9_4_Fig14_HTML.jpg)


  *图 4-14. Sketch 允许您从 `Insert`（插入）菜单以及 `Text Inspector`（文本检查器）中选择已保存的样式*


  ## 总结


  符号是在设计应用时改善工作流程的绝佳方式。在为 iOS 设计时，您可以使用 Sketch 附带的模板，将原生 iOS 符号添加到您的设计中。Sketch 还提供了在设计中跨文件使用这些符号时进行管理的能力。同时，Sketch
  也允许您为设计创建和管理各种文本样式及效果。


  既然我们已经介绍了文本样式和符号，下一章我们将深入探讨苹果公司创建的人机界面指南，帮助设计师和开发者了解与 iOS 设计相关的最佳实践，从而讲解如何开始为应用设计做准备。




  '
- '# 5. 应用设计准备


  到目前为止，我们已经介绍了 `Sketch` 的大部分基础知识。现在你应该熟悉这个程序及其运作方式——它的界面、如何创建基本形状、以及如何执行各种设计操作，这些在你开始设计应用时会派上用场。我们目前所做的基本上是对
  `Bohemian Coding` 提供的基础指南和文档内容进行扩展。然而，这本身并不能直接构成一个应用。在本章中，我们将为你实际设计应用做好准备。


  ## 人机界面指南


  你要做的第一件事是确保你已经熟悉了苹果公司的人机界面指南（HIGs）。虽然我在之前的章节中已经提到过它们，但如果你还没有研究过，现在正是个好时机。我在之前的著作《Learn
  Design for iOS Development》（Apress 2013）中非常详细地介绍了 HIGs。这是熟悉苹果公司为那些打算为 iOS 创建应用的设计师和开发者制定的设计标准的好方法。在这些指南中，苹果提出了它的期望和原则，这些原则使其能够在整个移动设备生态系统中创造一致的体验。无论你是为
  iPhone、iPad Air、iPad Pro 还是 iPad Mini 进行设计，都应将 HIGs 视为关于所有苹果移动设备设计元素和原则的最终指南和权威标准，并加以参考和考虑。


  **提示**


  你可以通过 `http://www.developer.apple.com/` 访问 iOS 人机界面指南。


  当你设计一个符合 HIG 原则的 iOS 体验时，你增加应用成功的几率，因为你使用的是用户已经熟悉的元素和行为。虽然之前已经在一定程度上介绍过 HIGs，但在我们开始着手设计应用之前，有一些原则值得重申。


  自从第一个 iPhone SDK 发布以来，该文档已经不断演变以适应各种软件版本，尤其是 iOS7 带来的颠覆性视觉变化。建议你在每次操作系统新版本发布时都检查一下这些指南。然而，这些指南的主要宗旨——**顺从**、**清晰**和**纵深**——依然不变。它们正是赋予苹果著名设计美学的原因。


  ## 顺从


  简而言之，顺从指的是创建一个不干扰屏幕上其他内容的用户界面。这是苹果在 iOS HIGs 中提出的第一个主题，并且可以说是最重要的主题之一。在扩展和解释这个主题时，苹果鼓励设计师首先考虑应用的功能，然后再思考某个特性是否与应用的整体功能绝对相关。如果不是，那么最好将其舍弃。


  其次，确保你的应用设计能够适应生态系统中的各种设备，这样无论用户碰巧使用哪种设备，都能体验到你的应用。这个体验应该针对每种设备进行定制。


  这可能看起来要求很高，但当你意识到苹果自带的应用程序中有很多可以遵循的例子时，就不会这么认为了。苹果的应用涵盖了从实用工具到效率工具等各个类别，因此你应该能找到符合需求、说明某个原则或展示你正在考虑使用的
  UI 元素的例子。如果你觉得任何 iOS 设备预装的苹果自带应用列表没有帮助，那么查看苹果 App Store 中推荐的应用程序也是个好主意，如图 5-1 所示。这些应用提供了出色的设计范例，它们要么严格遵守苹果的设计原则，要么在现有范式的基础上进行了优美的创新。


  ![A978-1-4842-1458-9_5_Fig1_HTML.jpg](img/A978-1-4842-1458-9_5_Fig1_HTML.jpg)


  图 5-1。Apple App Store 经常会展示一些应用，它们是设计原则的最佳实例，或者是在这些原则基础上进行了出色创新


  在设计你的应用时，你还应让你的内容优先于屏幕上的任何其他元素。本质上，这意味着你的用户界面设计应该如此无缝，以至于用户几乎注意不到它。你的内容应该闪耀光芒，并将整个屏幕作为其画布，让最重要的信息脱颖而出，高于一切——包括
  UI。事实上，HIGs 明确指出，UI 应该只为屏幕上的其他内容扮演“辅助角色”。


  如果你打算使用非常流行的**高斯模糊**（在第 3 章中讨论过），应采取这样的方法：使用模糊和透明效果来进一步引导用户了解屏幕上正在发生的事情，并为元素在屏幕上的位置提供整体上下文。半透明效果让用户知道面板后面还有其他元素，而模糊效果则可用于为整体设计增添一些上下文。



  '
- '# 清晰性


  在为移动设备进行设计时，清晰性至关重要。由于屏幕空间有限，设计师们被迫将众多不同的选项塞进一个非常小的屏幕，同时还要保持清晰和用户友好，这确实是一个挑战。然而，为了帮助那些为
  iOS 设计的人应对这一挑战，苹果将清晰性的需求提升到了其他一些设计原则之上。


  设计中的清晰性侧重于元素在屏幕上相互排列的方式，以便用户能成功与应用进行交互。如果你的工作做得正确，那么用户第一次看到应用中的某个屏幕或页面时，就会本能地知道如何与他们面前的元素进行互动。如果用户需要费很大力气或花很长时间才能理解元素是什么以及它们之间如何关联，那么他们就会失去兴趣，你也可能因此失去这位用户。


  《人机界面指南》（HIGs）指出，设计师可以通过使用留白在设计中提供清晰性。留白是一个重要的设计元素。简单来说，留白在设计里就是指“空白”或“留白空间”。它是未被设计元素或内容填充的空间。优秀的设计师会善用留白。有时，设计师，尤其是经验不足的，往往会认为有必要用东西填满屏幕上的所有空间。但情况远非如此。留白的一个关键特征是，它有助于将用户的注意力集中在对象本身，而非其周围的事物上。留白帮助聚焦用户的注意力。


  留白在标志设计中是一个相当常用的工具。平面设计师会利用文字或标志中的留白来吸引人们对某种形状的注意。但留白同样可以用于网站设计来平衡内容，以及用于应用设计。在你的应用设计中使用留白，有助于进一步突出内容，并引导用户到达你希望他们去往的应用区域。


  HIGs 以 `iMessages` 应用为例，展示了在 iOS 设计中运用留白的典范。这是一个极好的例子，因为这里的留白增强了可读性。由于 `iMessages`
  应用主要由屏幕上的文字构成，因此确保内容对于应用的用户和聊天中的参与者来说清晰可读至关重要。


  让我们仔细看看 `iMessages` 应用。图 5-2 显示了两个人的一段对话。我们这些熟悉 iPhone 和 `iMessages` 的人会认出这是一段双方都在使用
  iOS 的对话。在这段对话中，蓝色气泡代表你发的消息，灰色气泡代表接收方的消息。如果对方不使用 iOS，对话则显示为绿色和白色的文字气泡。注意文字气泡是如何出现在屏幕两侧以形成平衡并展示“对话流程”的。通过在屏幕两侧留出空间，用户的眼睛会自然地跟随对话。这就是在应用设计中使用留白的效果。想象一下，如果文字气泡排成一行，都出现在屏幕的同一侧，而不是分别位于两侧，那会是什么效果。


  ![A978-1-4842-1458-9_5_Fig2_HTML.jpg](img/A978-1-4842-1458-9_5_Fig2_HTML.jpg)


  图 5-2. 在 `iMessages` 应用中运用留白


  苹果以其对留白的运用而闻名，因此，为 iOS 设计应用的设计师们也应当将这种留白的使用融入自己的设计中。在你开始设计应用之前，思考一下如何利用留白来提高可读性，引导用户在页面内或在整个应用中的探索路径。


  留白甚至可以在处理间距和边距，乃至摄影时使用。屏幕上所有这些元素以及它们之间的相对位置，都会影响用户以及他们在应用中的导航能力，以及他们的整体体验。


  另一个帮助用户理解应用屏幕上内容的工具是色彩。事实上，色彩是一种强大的工具，能帮助用户在屏幕上定位内容和元素。你可以通过应用的设计，利用色彩与用户“对话”。关于设计中的色彩及色彩理论，完全可以（我相信也已经）写一整本书。由于我们已经专门讨论过与
  Sketch 相关的色彩问题，这里就不再赘述。我们将简要讨论的是在应用设计中使用色彩，以及它与为 iOS 设计的关系。


  HIGs 鼓励设计师使用色彩为应用的用户提供视觉提示。iOS 系统本身就有系统颜色，这些颜色被用于其自带的应用程序中。例如，`Notes` 应用拥有相当简洁的用户界面，并使用黄色来突出显示屏幕上的某些元素以引导用户，如图
  5-3 所示。


  ![A978-1-4842-1458-9_5_Fig3_HTML.jpg](img/A978-1-4842-1458-9_5_Fig3_HTML.jpg)


  图 5-3. `Notes` 应用及其使用高亮色帮助用户定位用户界面的示例


  HIGs 鼓励设计师首先为他们的应用创建一个调色板，其中的颜色既相互协调，又能在浅色和深色背景下都显得出色。对设计师来说，确保在不同的时间段检查他们的颜色也很重要，以保证每种颜色（尤其是那些带有自定义色调的）即使在最强烈的阳光下或最阴沉的天气里也清晰可见。


  '
- '# 纵深性


  苹果为 iOS 应用设计师设定的最后一个主题是纵深性。纵深性真正随 iOS7 的操作系统重新设计而体现出来，并自此成为 iOS 外观和感觉的一部分。它为与 iPhone
  和 iPad 屏幕交互的体验增添了亟需的层次感和丰富度。设计中的纵深性是一个有趣的概念，因为它要求设计师为传统的二维体验增加一个维度。


  为 iPhone 设计带来纵深感的方法之一是让对象相互重叠。当屏幕上有重叠的对象时，你就在为用户创造一种纵深的感觉。具体如何实现取决于你。与 iOS 的其他设计主题一样，你可以从自带的应用中获取灵感。即便在“扁平化设计”出现并流行之后，纵深感仍然是应用中一个理想的设计元素。


  如果运用得当，纵深性会为你的设计增加非常清晰的视觉层级，并有目的地引导用户关注屏幕上的内容。例如，一旦 iPhone 或 iPad 主屏幕上的某个应用被放入一个文件夹，访问该文件夹会弹出一个与屏幕共享相同背景的窗口，这样用户始终知道自己处于主屏幕环境中。文件夹的标题会出现在页面顶部以提供额外的上下文。这种布局如图
  5-4 所示。


  ![A978-1-4842-1458-9_5_Fig4_HTML.jpg](img/A978-1-4842-1458-9_5_Fig4_HTML.jpg)


  图 5-4. iOS8 中 iPhone 主屏幕上的一个应用文件夹展示了纵深性如何成为 iOS 设计生态中的自然组成部分




  '
- '# 设备与分辨率


  在开始设计应用之前，你需要考虑应用将运行在哪些平台上，以及哪些设备最适合运行你的软件。自 2007 年首次发布以来，运行 iOS 的移动设备数量持续增长。如今，设计师在开始设计应用前，必须考虑苹果产品线中的所有不同设备。`Sketch`
  确实提供了不同尺寸的模板，帮助你快速启动应用设计，但了解不同设备及其分辨率仍然是明智之举。


  随着 iOS 操作系统每次新版本发布和更新，苹果会偶尔淘汰旧款 iPhone。自 iOS8 起，支持的最早设备是 iPhone 4S。这并非意味着操作系统无法在更老的手机上运行，而是指其性能无法达到最优。随着
  iOS9 的发布，兼容设备列表有所变化。所有当前支持的 iOS 设备如图 5-5 所示。


  ![A978-1-4842-1458-9_5_Fig5_HTML.jpg](img/A978-1-4842-1458-9_5_Fig5_HTML.jpg)


  *图 5-5.* iOS9 所有兼容设备列表


  这些设备构成了应用发布后运行的全部设备体系。思考用户与这些设备交互的不同方式，以及他们将如何与应用交互，至关重要。例如，许多 iPad 用户将其用作台式电脑或笔记本电脑的替代品，而
  iPhone 则更偏个人化，常用于移动或通勤途中。这些都是会影响用户何时以及如何与应用交互的条件。


  近年来，随着更多设备的发布，设备分辨率也在提高，提供了更大、更清晰、更锐利的屏幕来呈现内容。首款 iPhone 的分辨率为 `320 × 480` 像素。然而，当
  iPhone 4S 发布时，它配备了 Retina 屏幕。因此，尽管屏幕物理尺寸完全相同，其分辨率却达到了 `640 × 960` 像素，大约是前代产品的两倍。如果将方块与像素的概念视为
  `1:1`，那么 Retina 屏幕在相同空间内像素数量翻倍。作为比较，新发布的 iPhone 6 Plus 在其 `5.5` 英寸屏幕上拥有 `1920 ×
  1080` 像素的 Retina HD 分辨率。iPhone 6 系列机型的屏幕分辨率如图 5-6 所示。当你考虑到我们之前讨论的所有元素——如色彩、谦逊、负空间和清晰度——时，必须意识到屏幕上的细节水平也显著提高了。


  ![A978-1-4842-1458-9_5_Fig6_HTML.jpg](img/A978-1-4842-1458-9_5_Fig6_HTML.jpg)


  *图 5-6.* iPhone 6 和 iPhone 6 Plus 的屏幕分辨率与显示尺寸


  市面上有众多设备，你需要为设计考虑多种分辨率，但你仍希望创造出像素完美的设计，无论用户选择哪种设备，都能呈现出色效果。理解点与像素的区别至关重要。像素实际上是组成设计中形状的小方块。对于处理多种屏幕尺寸和分辨率的设计师来说，锐利度很重要。如果你的设计不够清晰，瑕疵就会显现——尤其是在高分辨率屏幕上——并且会显得模糊。


  有些设计师通常按 `1×` 设计，然后放大以适应更高分辨率。另一些则按 `2×` 设计，然后缩小到 `1×`。如果你从 `2×` 开始设计，最好使用偶数，这有助于避免在需要缩小到
  `1×` 时出现问题。


  如果你在设计时，设计中的像素数量不是偶数，那么在尝试导出作品以及为新的分辨率缩放时，都会遇到问题。原因如下：在为更高分辨率屏幕设计时，像素数量呈指数级增长。这不仅会导致设计上的问题，也会给
  iOS 开发带来困扰。因此，苹果在推出 iPhone 4S 的 Retina 屏幕时引入了点系统。为了更好地理解这一点，请思考以下示例：iPhone 4S 和
  iPhone 3G 拥有相同的物理尺寸。然而，由于 Retina 屏幕的引入，4S 的分辨率基本上使屏幕分辨率提升了四倍，而屏幕尺寸保持不变。这是因为苹果增加了一个点内的像素数量。之前，`1
  点 = 1 像素`。随着 Retina 屏幕的出现，`1 点 = 4 像素`。点系统使 Retina 屏幕的开发变得更加容易。


  因此，如果你有一个尺寸为 `100 × 100` 像素的图像，它在标准非 Retina 屏幕上会以 `100 × 100` 像素渲染。然而，同一张图像在 Retina
  屏幕上也会渲染为 `100 × 100` 像素，但看起来会小一半。这是因为 Retina 屏幕以更高的像素密度渲染图像。但是，使用点系统，同一张 `100 ×
  100` 像素的图像现在在 Retina 屏幕上会以 `@2×` 的尺寸渲染，以便标准化用户看到的内容。


  在 `Xcode` 中，一切以点为单位。然而，在 `Sketch 3` 中，一切以像素为单位。对于追求设计中像素完美的设计师来说，设备和分辨率的数量有时会很棘手。设计师现在可能需要为三种不同的分辨率进行设计：`@1×`（iPhone
  3）、`@2×`（iPhone 5 和 iPhone 6）以及 `@3×`（iPhone 6 Plus）。


  `Sketch` 包含一个名为 `四舍五入至最近像素边缘` 的功能。如果你的形状没有使用偶数，而是使用了小数或半像素，那么使用此功能可以帮助你将设计尺寸修剪到最近的偶数值，从而确保导出和缩放无缝衔接。


  图 5-7 展示了其工作原理。该图显示了 `Sketch` 画布上的一张图片。请注意，右侧检查器中的尺寸不是偶数。事实上，这些尺寸包含小数。假设图片已经是 `@2×`，这些小数将使得将图片缩小到
  `@1×` 变得困难，因为尺寸需要再次被分割。这种分割会导致新图像在针对不同分辨率导出时，无法保持原始偶数设计的锐利度。通过使用 `四舍五入至最近像素边缘` 功能，你会看到尺寸被四舍五入为可轻松向上或向下取整到其他分辨率的整数。


  ![A978-1-4842-1458-9_5_Fig7_HTML.jpg](img/A978-1-4842-1458-9_5_Fig7_HTML.jpg)


  *图 5-7.* 在 `Sketch` 中使用 `四舍五入至最近像素边缘` 功能




  '
- '# 使用标准 iOS 尺寸


  我们已经讨论过如何使用 Sketch 自带的模板来开始设计你的应用，但你是否也知道这些模板中包含了一些几乎一成不变的标准元素？通过遵循 Apple 的指南，并让你的应用
  UI 尽可能简单，你可以在将 Sketch 文件交给开发人员时，让他们的工作变得轻松。由于你可能会在不同设备的不同画板上使用 Sketch 中的某些元素，接下来我们来聊聊如何在不同分辨率之间移动它们。


  打开 iOS 模板文件后，你会看到所有 iOS UI 元素都是已创建好的可供选择的符号。虽然使用它们做简单的原型图很不错，但仔细看会发现，这些符号是以 `@1×`
  分辨率创建的，如图 5-8 所示。


  ![A978-1-4842-1458-9_5_Fig8_HTML.jpg](img/A978-1-4842-1458-9_5_Fig8_HTML.jpg)


  图 5-8. Sketch 的 iOS UI 设计模板中有一条注释，提示用户这些符号是按 `@1×` (375pt) 分辨率创建的


  这意味着，当你在设计中为其他分辨率（`@2×` 和 `@3×`）使用这些标准元素时，需要进行一些调整。如果你尝试直接缩放这些元素，你会注意到，需要对整个元素以及构成符号的各个元素进行位置调整。要做到这一点，你需要先取消组合，然后再缩放——先缩放到
  200%，如果你还要为 iPhone 6 Plus 做设计，再缩放到 300%。这适用于标签栏、状态栏等。注意，如果你只是用 Sketch 创建原型图，可以跳过这一步。但是，如果你正在创建一个将在多个设备上使用并交给开发人员的设计，那么这将是一个值得纳入工作流程的好习惯。图
  5-9 展示了一个标准 UI 状态栏被导入到为 iPhone 6 和 iPhone 6 Plus 创建的画板中。


  ![A978-1-4842-1458-9_5_Fig9_HTML.jpg](img/A978-1-4842-1458-9_5_Fig9_HTML.jpg)


