- "# 6. 优化你的工作流程\n\n如果你正在读这本书，那么你可能是 Sketch 的新手，要么是设计领域的新人，要么是从其他图形程序（如 Photoshop\
  \ 甚至 Fireworks）转过来的。如果你是从其他设计程序转来的，你会想看看这一章，因为在这里，我将与你分享一些优化工作流程的绝佳技巧。\n\n通常，对于图形程序，优化工作流程涉及你的电脑硬件设置、偏好设置、文件的保存与恢复，以及提升程序的整体性能。但工作流程也包含那些能帮你节省最宝贵的资源——时间——的小事。\n\
  \n如果你是设计新手，你可能还在摸索自己的工作流程是什么样子。而如果你是 Sketch 新手，你可能听说过或读到过 Sketch 能帮你快速完成某些设计任务，并为你的工作流程节省宝贵的几分钟时间。即使你是一位经验丰富的设计师，在设计时你也会对节省时间感兴趣。这可能出于个人原因，或者因为你需要取悦客户。在设计时，时间通常不是你的朋友，你能越快完成设计就越好。\n\
  \n有一些众所周知的通用技巧、窍门和策略可以用来加快通用任务，也有一些更具体的技巧只适用于 Sketch。在本章中，我们将首先关注一些你可以做的通用事情，然后转向一些更针对\
  \ Sketch 的技巧。我们已经在第 X 章中介绍过快捷键，所以如果需要，你可以将它们添加到你的提速事项清单中。一旦你熟悉了快捷键列表（我们也会介绍如何创建你自己的快捷键），再加上本章的技巧，你应该就能顺利加快你的设计过程了。\n\
  \n不过，有必要提一下，虽然速度很重要，但它无法与质量相比。所以请确保你平衡了两者。如果工作需要重做，那么快速完成就没有意义了。最好一开始就用正确的方式完成。\n\
  \n## 自定义你的工作空间\n\n每个设计程序在打开时都会有默认设置。这意味着，当你首次启动程序时，某些设置会有一个基准线。这些设置是为了满足使用该程序的设计师们的共同基本需求而设定的。它也是一块白板，你可以在此基础上开始按照自己的喜好进行设置。你会发现大多数设计程序都很容易自定义。这意味着，你可以根据自己的选择显示或隐藏面板和窗口，具体取决于你正在进行的项目以及你从事的领域。例如，如果你主要设计应用的用户界面，你的自定义设置可能与设计网站的人不同。同样，如果你为\
  \ Android 进行设计，你的设置可能也与主要为 iOS 甚至 OS X 进行设计的人不同。\n\n你可能某些工具和功能比其他用得更多，你可以确保这些工具随时可用，而无需费力去寻找。如果你想自定义网格和标尺，你也可以轻松做到，以便按照自己的喜好来设置设计。\n\
  \n你可以随时回看第 2 章，我在那里描述了如何自定义你的工具栏，以便让 Sketch 中最常用的功能触手可及。如图 6-1 所示，Sketch 的工具栏远不止表面上看到的那些。默认显示图标和文本，但你可以将其改为只显示图标或只显示文本。你还可以添加或移除任何你喜欢的项目，来替换默认工具栏中的项目。这可能是让\
  \ Sketch 为你所用的首要步骤之一。只需按照你喜欢的方式设置好，就能为你的工作开个好头。将经常使用的图标直接放在工具栏中，总比需要点击两下甚至三下才能找到要好得多。\n\
  \n![A978-1-4842-1458-9_6_Fig1_HTML.jpg](img/A978-1-4842-1458-9_6_Fig1_HTML.jpg)\n\
  \n图 6-1. Sketch 允许你自定义工具栏，添加最常用的项目，并移除不常用的项目\n\n\n\n### 整理文档\n\n如果你正在从头到尾设计一款应用，一个好的做法是在进入设计阶段之前对整体方案进行充分思考。有些设计师使用\
  \ `Sketch` 进行线框设计，但目前市场上也有许多工具允许你先绘制线框图，然后直接导入 `Sketch`。其他人则会使用传统的手绘和纸张来设计线框图，并在正式设计前反复迭代应用的整体流程。无论采用何种方法，在开始设计过程之前考虑如何组织文档都是一个好主意。如果使用纸笔，你可以轻松地为你的画作拍张照片，并将其直接导入\
  \ `Sketch` 作为参考。这样一来，你就可以将图纸作为设计背景中的指南，或者并排放置作为参考。图 6-3 展示了如何将纸质图纸作为图像导入到设计中供参考。\n\
  \n![A978-1-4842-1458-9_6_Fig3_HTML.jpg](img/A978-1-4842-1458-9_6_Fig3_HTML.jpg)\n\
  \n图 6-3.\n\n你可以将纸质图纸或线框图导入 `Sketch` 作为参考，以辅助设计过程\n\n使用 `Sketch`，你可以选择将整个应用创建**在一个文档**中，或者根据应用的复杂程度将其拆分成多个文档。这是一个变革性的功能，因为它允许你利用\
  \ `Sketch` 的无限缩放功能进行缩小，从而鸟瞰整个应用。这在设计包含多种不同流程和使用场景的复杂应用时也很有帮助。虽然你可以为整个应用创建一个文件，但\
  \ `Sketch` 允许你将应用拆分成多个页面，这样你就可以在整个文档中共享符号，从而在发生更改时同步应用到你的应用中。图 6-4 展示了我名为 `Cast`\
  \ 的应用中所有屏幕的鸟瞰图。尽管 `Cast` 是一个简单的应用，你可以轻松地使用页面来拆分应用的主要部分，然后使用这些页面中的画板来概述特定流程中的各个步骤。\n\
  \n![A978-1-4842-1458-9_6_Fig4_HTML.jpg](img/A978-1-4842-1458-9_6_Fig4_HTML.jpg)\n\
  \n图 6-4.\n\n应用多个屏幕在 `Sketch` 中布局于一个页面上的鸟瞰图\n\n#### 扁平化图像\n\n这个特定的过程旨在让 `Sketch`\
  \ 尽可能快速高效地运行。`Sketch` 本身就是一个相当精简的程序，但图形往往会拖慢一切。众所周知，`Sketch` 的强项不在于处理照片。正如我们在前面章节讨论过的，它可以处理照片，但因为\
  \ `Sketch` 是一个矢量程序，我们建议尽量减少照片的使用。话虽如此，你可能仍然希望在设计中包含照片。应用是视觉化的，因此在某些情况下，照片有助于为你的应用带来一定程度的真实感。因此，创造一种处理图像的方法会很有帮助。\n\
  \n由于图像包含的信息量远多于原生创建的形状，它们需要 `Sketch`（以及你的计算机）在渲染时使用更多资源。例如，假设你在应用中使用了一张非常显眼的背景图像。这很可能意味着该图像会用在多个屏幕上。但让我们把情况复杂化：假设同一个图层上还应用了一些效果。导入图像时，始终确保将整体大小优化到能保持最佳质量的最小文件大小是一个好习惯。我们知道文件越大，图像显示效果越好。然而，你还必须考虑是否会对图像应用特殊效果。例如，如果你要对图像应用广受欢迎的高斯模糊效果，你可能需要考虑使用较低质量（因此也是较小尺寸）的文件。导入图像后，你可以应用效果并将其扁平化。这将减少\
  \ `Sketch` 文档的整体大小，并最终提高文档打开时计算机的响应速度。图 6-5 展示了两个使用相同背景图像并应用了模糊效果，且在使用前已进行扁平化处理的屏幕。虽然你可能不会立即看到效果，除非你的计算机内存低得惊人，但你会在文档的整体文件大小上看到结果。\n\
  \n![A978-1-4842-1458-9_6_Fig5_HTML.jpg](img/A978-1-4842-1458-9_6_Fig5_HTML.jpg)\n\
  \n图 6-5.\n\n两张以图像为背景的文件，一张已优化，一张未优化\n\n### 命名图层和符号\n\n这是一个棘手的问题。对我来说，命名图层可能真的很麻烦。在使用\
  \ `Sketch` 设计和绘制线框图时，我动作很快。我常常没有花时间尽可能高效地命名图层。虽然在制作原型或线框图时这还不算太糟，特别是如果只供你自己查看的话，但当你设计一个需要与其他设计师以及最终与开发人员共享的产品时，你需要确保你命名图层和符号的方式既高效，又对其他使用你文件的人来说直观易懂。这是一个硬性设计规则，无论你使用什么图形程序都应遵守。创建有意义的图层名称是最佳实践。不建议使用晦涩或过于取巧的名称。\n\
  \n如果你还没有组织好图层，它们开始变得难以管理，我会提供一些技巧来帮助你有效地管理它们。在移交文件之前，甚至在设计过程中，能够组织好图层非常重要。关键在于在设计过程中、在图层失控之前就对其进行组织。\n\
  \n我们之前讨论过将设计中彼此相关的元素进行分组，但有时，为了更好的组织而对元素进行分组也是个好主意。例如，如果你正在设计一个带有标签栏的应用，你可能希望将该标签栏中的所有元素都包含在一个组中。并且，在必要的情况下，你还可以在组内创建组，即嵌套组。因此，虽然你的标签栏图标在一个组中，但如果有多个形状构成了一个特定的图标，那么这可以成为更大标签栏组内的一个嵌套组。这样一来，任何使用你文件的人都可以轻松找到他们需要的元素，而无需进行大量猜测。相信我，他们会因此感谢你。图\
  \ 6-6 展示了我如何为 `Cast Beauty` 应用组织图层。列表显示了带有文件夹的主要组，但每个文件夹内部还有许多额外的嵌套组，并且所有这些都与该页面中的一个特定画板相关。\n\
  \n![A978-1-4842-1458-9_6_Fig6_HTML.jpg](img/A978-1-4842-1458-9_6_Fig6_HTML.jpg)\n\
