  ## 总结


  每一位为 iOS 创建应用的设计师都需要学习和熟悉 HIG——这是 Apple 创建并维护的一套文档，用于描述设计师和开发者的最佳实践。虽然我们在本章中概述了
  Apple 为 iOS 设计提出的五个要点，但在你使用该平台工作时，经常回头查阅这份文档会是个好主意。


  在下一章中，我们将讨论如何设置你的设计偏好以优化工作流程。你将看到，如何在开始设计之前做这件事会如何让你更轻松，以及它将如何简化你的设计过程。


