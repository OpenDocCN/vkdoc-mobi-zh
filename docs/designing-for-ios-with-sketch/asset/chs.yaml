  \ 6-7 左下角所示的按钮，将其设为默认设置，这样每次开始新设计时就无需重复此过程。\n\n![A978-1-4842-1458-9_6_Fig7_HTML.jpg](img/A978-1-4842-1458-9_6_Fig7_HTML.jpg)\n\
