  \ 10 个页面，你需要更新某个标题栏的颜色，当然你可以逐个修改应用每个页面中的每一个画板或屏幕。或者，你可以将符号命名为类似 `\"header bar\"\
  ` 这样直观的名称，而不是 `\"purple stripe\"`，然后轻松地一次性修改颜色，并立即更新文档中所有地方。你不想因为符号名称没有意义而浪费时间寻找正确的符号。然而，和所有事情一样，要注意在何处以及多久使用一次符号。如果在整个设计中更改了符号，最好进行一些设计质量检查，以确保所做的更改是相关的，并且更重要的是，是准确的。\n\
