  trans: '

    # 13. 使用 Apple Pay 付款


    电子补充材料 本章在线版（doi:`10.​1007/​978-1-4842-1317-9_​13`<http://dx.doi.org/10.1007/978-1-4842-1317-9_​13>）包含仅供授权用户使用的补充材料。


    作为 iOS 开发者，你可能已经听说过 Apple Pay。Apple Pay 允许 iPhone 用户通过其手机完成购物付款。对于开发者而言，在应用中集成
    Apple Pay 能带来诸多显著优势。例如，你的客户无需输入信用卡号、有效期和 CVC 安全码，某些情况下也无需在购买前填写收货地址和账单地址。这些都意味着更快捷、更便利的结账流程。另一个好处是，这被公认为处理信用卡扣款更安全的方式。本章将演示如何实现“通过
    Apple Pay 和 Stripe 付款”的功能。


    ## Apple Pay 概述


    事实上，Apple Pay 只负责整个扣款流程中的部分环节。具体而言，Apple Pay 完成了以下事项：


    -   验证用户（即 iPhone 持有者或信用卡持有人）的身份。

    -   通过用户界面展示其购买的商品。

    -   向你（开发者）提供用户的收货地址和账单地址。

    -   向你（开发者）提供一个令牌，以便你将其兑换给真实的支付处理商，例如 Stripe。


    注意：要更深入了解 Apple Pay 的工作原理，请参考[`https://developer.apple.com/apple-pay/Getting-Started-with-Apple-Pay.pdf`](https://developer.apple.com/apple-pay/Getting-Started-with-Apple-Pay.pdf)。

    '
- fmt: "# Apple Pay and Stripe\n\n**Note**: In order to use Apple Pay, you’ll need\
    \ to add the “Apple Pay” capability to your app in Xcode. This requires creating,\
    \ first, a merchant ID with Apple. You can read more about that process from the\
    \ tutorial [`https://stripe.com/docs/mobile/apple-pay`](https://stripe.com/docs/mobile/apple-pay).\n\
    \nIn [Chapter 12](#A978-1-4842-1317-9_12_Chapter.html), I have shown how to add\
    \ Stripe/ApplePay CocoaPod to your project. After you have the merchant ID and\
    \ “Apple Pay” capability set up, you can take full advantage of what the Stripe\
    \ Apple Pay SDK has to offer. These are the steps:\n\n- Generate a `PKPaymentRequest`\
    \ to submit to Apple.\n- Set the `paymentSummaryItems` property to an `NSArray`\
    \ of `PKPaymentSummaryItems`. These are analogous to line items on a receipt and\
    \ are used to explain our charges to the user.\n- After creating the request,\
    \ query the device to see if Apple Pay is available (i.e., whether the app is\
    \ running on the latest hardware and the user has added a valid credit card).\n\
    - Create and display the payment request view controller.\n- After the payment\
    \ request controller has returned a `PKPayment`, you can turn it into a single-use\
    \ Stripe token with a simple method call.\n- Once you receive the Stripe token,\
    \ call the Parse Cloud Function to make a real charge. The real charge will be\
    \ handled by our back end, as we have done with Pay with Credit Card.\n\nAs you\
    \ can see, the difference between Pay with Credit Card and Pay with Apple Pay\
    \ is that you don’t need to create an `EMABPayment` instance and save it while\
    \ dealing with Pay with Apple Pay—Apple Pay on a user’s device has the credit\
    \ card information stored. Another benefit is that you don’t need to ask for the\
    \ user’s shipping address; you can get it from the payment request.\n\nHere is\
    \ how to implement it, assuming you have registered a merchant ID through Apple\
    \ Developer portal.\n\nWrite down your merchant ID with our `EMABConstants` class\
    \ and name it `kAppleMerchantID`. Next, create a property to keep track of the\
    \ `PKPaymentRequest`.\n\n```\n@property (nonatomic, strong) PKPaymentRequest *paymentRequest;\n\
    ```\n\nAs mentioned before, you will need to use Apple’s `PKPaymentAuthorizationViewController`.\
    \ This view controller has some delegate methods you need to implement, so declare\
    \ it:\n\n```\n@interface EMABBagTableViewController()<PKPaymentAuthorizationViewControllerDelegate>\n\
    ```\n\nAlso, in order to show the items the user is purchasing, you need to set\
    \ up the item list confirming `PKPaymentAuthorizationViewController` API `PKPaymentSummaryItem`.\
    \ In other words, you need to transfer our `EMABOrderItem` to `PKPaymentSummaryItem`.\
    \ Here is the helper method for that:\n\n```\n- (NSArray *)summaryItemsForShippingMethod:(PKShippingMethod\
    \ *)shippingMethod {\n    NSMutableArray *purchasedItems = [NSMutableArray arrayWithCapacity:[self.order.items\
    \ count]];\n    for (EMABOrderItem *item in self.order.items) {\n        double\
    \ total = item.quantity * item.product.unitPrice;\n        NSString *readable\
    \ = [NSString stringWithFormat:@\"%.2f\",total];\n        NSDecimalNumber *price\
    \ = [NSDecimalNumber decimalNumberWithString:readable];\n        PKPaymentSummaryItem\
    \ *purchasedItem = [PKPaymentSummaryItem summaryItemWithLabel:item.product.name\
    \ amount:price];\n        [purchasedItems addObject:purchasedItem];\n    }\n \
    \   return [NSArray arrayWithArray:purchasedItems];\n}\n```\n\nBasically, you\
    \ create a mutable array, iterate `EMABOrderItem`, and instantiate `PKPaymentSummaryItem`\
    \ based on an instance of `EMABOrderItem`. In the end, you return an immutable\
    \ copy of the container array.\n\nTake a close look at the following two lines\
    \ of code:\n\n```\nNSString *readable = [NSString stringWithFormat:@\"%.2f\",total];\n\
    NSDecimalNumber *price = [NSDecimalNumber decimalNumberWithString:readable];\n\
    ```\n\nThis is definitely not the best way to represent the currency amount because\
    \ normally you only have a two-digit mantissa for the currency amount. The recommended\
    \ way by Apple Pay API is this:\n\n```\nNSDecimalNumber *price = [NSDecimalNumber\
    \ decimalNumberWithMantissa:total exponent:-2 isNegative:NO];\n```\n\nBefore you\
    \ can initialize `PKPaymentRequest`, you need to know whether the user’s iPhone\
    \ is configured to Pay with Apple Pay. Luckily, Stripe has a convenient method\
    \ for you: `-(BOOL) canSubmitPaymentRequest`. If yes, proceed ahead. If no, you\
    \ need to gracefully report it to the user.\n\nYou also need to have the user’s\
    \ shipping address so you can mail the package. `PKPaymentRequest` has a method\
    \ and `setRequiredShippingAddressFields:PKAddressFieldPostalAddress` for that.\n\
    \nHere is the code:\n\n```\n-(IBAction)onApplePay:(id)sender{\n    NSString *merchantId\
    \ = kAppleMerchantID;\n    self.paymentRequest = [Stripe paymentRequestWithMerchantIdentifier:merchantId];\n\
    \    if ([Stripe canSubmitPaymentRequest:self.paymentRequest]) {\n        [self.paymentRequest\
    \ setRequiredShippingAddressFields:PKAddressFieldPostalAddress];\n        [self.paymentRequest\
    \ setRequiredBillingAddressFields:PKAddressFieldPostalAddress];\n        self.paymentRequest.paymentSummaryItems\
    \ = [self summaryItemsForShippingMethod:nil];\n        PKPaymentAuthorizationViewController\
    \ *auth = [[PKPaymentAuthorizationViewController alloc] initWithPaymentRequest:self.paymentRequest];\n\
    \        auth.delegate = self;\n        if (auth) {\n            [self presentViewController:auth\
    \ animated:YES completion:nil];\n        } else\n            [SVProgressHUD showErrorWithStatus:NSLocalizedString(@\"\
    Something Wrong\", @\"Something Wrong\")];\n    } else {\n        [SVProgressHUD\
    \ showErrorWithStatus:NSLocalizedString(@\"Apple Pay is not enabled. Please enable\
    \ your Apple Pay or Pay with Credit Card.\", @\"\")];\n    }\n}\n```\n\nNext,\
    \ present the `PKPaymentAuthorizationViewController`. The user taps to pay. What\
    \ happens after the tap? Here’s how to implement the view controller’s delegate\
    \ method:\n\n```\n-(void)paymentAuthorizationViewController:(nonnull PKPaymentAuthorizationViewController\
    \ *)controller didAuthorizePayment:(nonnull PKPayment *)payment completion:(nonnull\
    \ void (^)(PKPaymentAuthorizationStatus))completion{\n    [self handlePaymentAuthorizationWithPayment:payment\
    \ completion:nil];\n}\n```\n\nCreate the helper method `handlePaymentAuthorizationWithPayment`,\
    \ then implement this method in “Creating a single-use token.” Note that you have\
    \ also been given a block that takes a `PKPaymentAuthorizationStatus`. Call this\
    \ function with either `PKPaymentAuthorizationStatusSuccess` or `PKPaymentAuthorizationStatusFailure`\
    \ after all of your asynchronous code is finished executing. This is how the `PKPaymentAuthorizationViewController`\
    \ knows when and how to update its UI.\n\n```\n- (void)handlePaymentAuthorizationWithPayment:(PKPayment\
    \ *)payment completion:(void (^)(PKPaymentAuthorizationStatus))completion {\n\
    \    [[STPAPIClient sharedClient] createTokenWithPayment:payment\n           \
    \                completion:^(STPToken *token, NSError *error) {\n           \
    \                   if (error) {\n                                 completion(PKPaymentAuthorizationStatusFailure);\n\
    \                                 return;\n                              }\n \
    \                             [self createBackendChargeWithToken:token completion:completion];\n\
    \                           }];\n}\n```\n\nOnce you receive the charge token,\
    \ call the Parse Cloud function to make a real charge:\n\n```\n- (void)createBackendChargeWithToken:(STPToken\
    \ *)token\n                          completion:(void (^)(PKPaymentAuthorizationStatus))completion\
    \ {\n    [self chargeWithToken:token.tokenId];\n}\n```\n\nHere is how to call\
    \ the Cloud function:\n\n```\n-(void)chargeWithToken:(NSString *)tokenId{\n  \
    \  [self.order saveInBackgroundWithBlock:^(BOOL success, NSError *error){\n  \
    \      if (!error) {\n            __weak typeof(self) weakSelf = self;\n     \
    \       NSDictionary *params = @{@\"chargeToken\":tokenId, @\"orderId\":weakSelf.order.objectId};\n\
    \            [PFCloud callFunctionInBackground:@\"ChargeToken\" withParameters:params\
    \ block:^(NSString *message, NSError *error){\n                if (!error) {\n\
    \                    [weakSelf queryForUnfinishedOrder];\n                }\n\
    \            }];\n        }\n    }];\n}\n```\n\nBy all means, you want to save\
    \ the current order first. After the save action is finished, pass the Stripe\
    \ token and the order ID to the back end. It’s a much safer practice. Once the\
    \ charge is successfully run through, you make another API call to check whether\
    \ the order status has been changed; also update your UI."
  raw: '## Apple Pay and Stripe


    Note


    In order to use Apple Pay, you’ll need to add the “Apple Pay” capability to your
    app in Xcode. This requires creating, first, a merchant ID with Apple. You can
    read more about that process from the tutorial [`https://stripe.com/docs/mobile/apple-pay`](https://stripe.com/docs/mobile/apple-pay)
    .


    In [Chapter 12](#A978-1-4842-1317-9_12_Chapter.html), I have shown how to add
    Stripe/ApplePay CocoaPod to your project. After you have the merchant ID and “Apple
    Pay” capability set up, you can take full advantage of what the Stripe Apple Pay
    SDK has to offer. These are the steps:


    Generate a PKPaymentRequest to submit to Apple.   Set the `paymentSummaryItems`
    property to an NSArray of PKPaymentSummaryItems. These are analogous to line items
    on a receipt and are used to explain our charges to the user.   After creating
    the request, query the device to see if Apple Pay is available (i.e., whether
    the app is running on the latest hardware and the user has added a valid credit
    card).   Create and display the payment request view controller.   After the payment
    request controller has returned a PKPayment, you can turn it into a single-use
    Stripe token with a simple method call.   Once you receive the Stripe token, call
    the Parse Cloud Function to make a real charge. The real charge will be handled
    by our back end, as we have done with Pay with Credit Card.  


    As you can see, the difference between Pay with Credit Card and Pay with Apple
    Pay is that you don’t need to create an EMABPayment instance and save it while
    dealing with Pay with Apple Pay—Apple Pay on a user’s device has the credit card
    information stored. Another benefit is that you don’t need to ask for the user’s
    shipping address; you can get it from the payment request.


    Here is how to implement it, assuming you have registered a merchant ID through
    Apple Developer portal.


    Write down your merchant ID with our EMABConstants class and name it kAppleMerchantID.
    Next, create a property to keep track of the PKPaymentRequest.


    `@property (nonatomic, strong) PKPaymentRequest *paymentRequest;`


    As mentioned before, you will need to use Apple’s PKPaymentAuthorizationViewController.
    This view controller has some delegate methods you need to implement, so declare
    it:


    `@interface EMABBagTableViewController()<PKPaymentAuthorizationViewControllerDelegate>`


    Also, in order to show the items the user is purchasing, you need to set up the
    item list confirming PKPaymentAuthorizationViewController API PKPaymentSummaryItem.
    In other words, you need to transfer our EMABOrderItem to PKPaymentSummaryItem.
    Here is the helper method for that:


    `- (NSArray *)summaryItemsForShippingMethod:(PKShippingMethod *)shippingMethod
    {`


        `NSMutableArray *purchasedItems = [NSMutableArray arrayWithCapacity:[self.order.items
    count]];`


        `for (EMABOrderItem *item in self.order.items) {`


            `double total = item.quantity * item.product.unitPrice;`


            `NSString *readable = [NSString stringWithFormat:@"%.2f",total];`


            `NSDecimalNumber *price = [NSDecimalNumber decimalNumberWithString:readable];`


            `PKPaymentSummaryItem *purchasedItem = [PKPaymentSummaryItem summaryItemWithLabel:item.product.name
    amount:price];`


            `[purchasedItems addObject:purchasedItem];`


        `}`


        `return [NSArray arrayWithArray:purchasedItems];`


    `}`


    Basically, you create a mutable array, iterate `EMABOrderItem`, and instantiate
    `PKPaymentSummaryItem` based on an instance of `EMABOrderItem`. In the end, you
    return an immutable copy of the container array.


    Take a close look at the following two lines of code:


    `NSString *readable = [NSString stringWithFormat:@"%.2f",total];`


    `NSDecimalNumber *price = [NSDecimalNumber decimalNumberWithString:readable];`


    This is definitely not the best way to represent the currency amount because normally
    you only have a two-digit mantissa for the currency amount. The recommended way
    by Apple Pay API is this:


    `NSDecimalNumber *price = [NSDecimalNumber decimalNumberWithMantissa:total exponent:-2
    isNegative:NO];`


    Before you can initialize `PKPaymentRequest`, you need to know whether the user’s
    iPhone is configured to Pay with Apple Pay. Luckily, Stripe has a convenient method
    for you: `-(BOOL) canSubmitPaymentRequest`. If yes, proceed ahead. If no, you
    need to gracefully report it to the user.


    You also need to have the user’s shipping address so you can mail the package.
    `PKPaymentRequest` has a method and `setRequiredShippingAddressFields:PKAddressFieldPostalAddress`
    for that.


    Here is the code:


    `-(IBAction)onApplePay:(id)sender{`


        `NSString *merchantId = kAppleMerchantID;`


        `self.paymentRequest = [Stripe paymentRequestWithMerchantIdentifier:merchantId];`


        `if ([Stripe canSubmitPaymentRequest:self.paymentRequest]) {`


            `[self.paymentRequest setRequiredShippingAddressFields:PKAddressFieldPostalAddress];`


            `[self.paymentRequest setRequiredBillingAddressFields:PKAddressFieldPostalAddress];`


            `self.paymentRequest.paymentSummaryItems = [self summaryItemsForShippingMethod:nil];`


            `PKPaymentAuthorizationViewController *auth = [[PKPaymentAuthorizationViewController
    alloc] initWithPaymentRequest:self.paymentRequest];`


            `auth.delegate = self;`


            `if (auth) {`


                `[self presentViewController:auth animated:YES completion:nil];`


            `} else`


                `[SVProgressHUD showErrorWithStatus:NSLocalizedString(@"Something
    Wrong", @"Something Wrong")];`


        `} else {`


            `[SVProgressHUD showErrorWithStatus:NSLocalizedString(@"Apple Pay is not
    enabled. Please enable your Apple Pay or Pay with Credit Card.", @"")];`


        `}`


    `}`


    Next, present the PKPaymentAuthorizationViewController. The user taps to pay.
    What happens after the tap? Here’s how to implement the view controller’s delegate
    method:


    `-(void)paymentAuthorizationViewController:(nonnull PKPaymentAuthorizationViewController
    *)controller didAuthorizePayment:(nonnull PKPayment *)payment completion:(nonnull
    void (^)(PKPaymentAuthorizationStatus))completion{`


        `[self handlePaymentAuthorizationWithPayment:payment completion:nil];`


    `}`


    Create the helper method `handlePaymentAuthorizationWithPayment`, then implement
    this method in “Creating a single-use token.” Note that you have also been given
    a block that takes a `PKPaymentAuthorizationStatus`. Call this function with either
    `PKPaymentAuthorizationStatusSuccess` or `PKPaymentAuthorizationStatusFailure`
    after all of your asynchronous code is finished executing. This is how the `PKPaymentAuthorizationViewController`
    knows when and how to update its UI.


    `- (void)handlePaymentAuthorizationWithPayment:(PKPayment *)payment completion:(void
    (^)(PKPaymentAuthorizationStatus))completion {`


        `[[STPAPIClient sharedClient] createTokenWithPayment:payment`


                               `completion:^(STPToken *token, NSError *error) {`


                                  `if (error) {`


                                     `completion(PKPaymentAuthorizationStatusFailure);`


                                     `return;`


                                  `}`


                                  `[self createBackendChargeWithToken:token completion:completion];`


                               `}];`


    `}`


    Once you receive the charge token, call the Parse Cloud function to make a real
    charge:


    `- (void)createBackendChargeWithToken:(STPToken *)token`


                              `completion:(void (^)(PKPaymentAuthorizationStatus))completion
    {`


        `[self chargeWithToken:token.tokenId];`


    `}`


    Here is how to call the Cloud function:


    `-(void)chargeWithToken:(NSString *)tokenId{`


        `[self.order saveInBackgroundWithBlock:^(BOOL success, NSError *error){`


            `if (!error) {`


                `__weak typeof(self) weakSelf = self;`


                `NSDictionary *params = @{@"chargeToken":tokenId, @"orderId":weakSelf.order.objectId};`


                `[PFCloud callFunctionInBackground:@"ChargeToken" withParameters:params
    block:^(NSString *message, NSError *error){`


                    `if (!error) {`


                        `[weakSelf queryForUnfinishedOrder];`


                    `}`


                `}];`


            `}`


        `}];`


    `}`


    By all means, you want to save the current order first. After the save action
    is finished, pass the Stripe token and the order ID to the back end. It’s a much
    safer practice. Once the charge is successfully run through, you make another
    API call to check whether the order status has been changed; also update your
    UI.'
  trans: "\n# Apple Pay 与 Stripe\n\n**注意**：要使用 Apple Pay，你需要在 Xcode 中为应用添加“Apple Pay”功能。这首先需要你在\
    \ Apple 处创建一个商户 ID。你可以通过教程[`https://stripe.com/docs/mobile/apple-pay`](https://stripe.com/docs/mobile/apple-pay)了解更多流程。\n\
    \n在第 12 章中，我展示了如何将 Stripe/ApplePay CocoaPod 添加到你的项目中。在设置好商户 ID 和“Apple Pay”功能后，你就可以充分利用\
    \ Stripe Apple Pay SDK 所提供的功能。具体步骤如下：\n\n-   生成一个 `PKPaymentRequest` 以提交给 Apple。\n\
    -   将 `paymentSummaryItems` 属性设置为一个由 `PKPaymentSummaryItem` 组成的 `NSArray`。这些类似于收据上的明细行，用于向用户解释我们的收费项目。\n\
    -   创建请求后，查询设备以确认 Apple Pay 是否可用（即，应用是否运行在最新的硬件上，且用户已添加有效的信用卡）。\n-   创建并显示支付请求视图控制器。\n\
    -   在支付请求控制器返回 `PKPayment` 后，你可以通过一个简单的方法调用将其转换为单次使用的 Stripe 令牌。\n-   收到 Stripe\
    \ 令牌后，调用 Parse Cloud Function 进行实际收费。实际的收费将由我们的后端处理，就像我们使用信用卡支付一样。\n\n如你所见，使用信用卡支付与使用\
    \ Apple Pay 支付的区别在于，处理 Apple Pay 支付时，你无需创建 `EMABPayment` 实例并保存它——用户设备上的 Apple\
    \ Pay 已存储了信用卡信息。另一个好处是，你无需询问用户的收货地址；你可以直接从支付请求中获取。\n\n以下是实现方法，假设你已通过 Apple Developer\
    \ 门户注册了一个商户 ID。\n\n用我们的 `EMABConstants` 类记下你的商户 ID，并将其命名为 `kAppleMerchantID`。接下来，创建一个属性来跟踪\
    \ `PKPaymentRequest`。\n\n```\n@property (nonatomic, strong) PKPaymentRequest *paymentRequest;\n\
    ```\n\n如前所述，你需要使用 Apple 的 `PKPaymentAuthorizationViewController`。这个视图控制器有一些需要你实现的代理方法，因此请声明如下：\n\
    \n```\n@interface EMABBagTableViewController()<PKPaymentAuthorizationViewControllerDelegate>\n\
    ```\n\n此外，为了显示用户正在购买的商品，你需要设置符合 `PKPaymentAuthorizationViewController` API `PKPaymentSummaryItem`\
    \ 的商品列表。换句话说，你需要将我们的 `EMABOrderItem` 转换为 `PKPaymentSummaryItem`。以下是实现这一转换的辅助方法：\n\
    \n```\n- (NSArray *)summaryItemsForShippingMethod:(PKShippingMethod *)shippingMethod\
    \ {\n    NSMutableArray *purchasedItems = [NSMutableArray arrayWithCapacity:[self.order.items\
    \ count]];\n    for (EMABOrderItem *item in self.order.items) {\n        double\
    \ total = item.quantity * item.product.unitPrice;\n        NSString *readable\
    \ = [NSString stringWithFormat:@\"%.2f\",total];\n        NSDecimalNumber *price\
    \ = [NSDecimalNumber decimalNumberWithString:readable];\n        PKPaymentSummaryItem\
    \ *purchasedItem = [PKPaymentSummaryItem summaryItemWithLabel:item.product.name\
    \ amount:price];\n        [purchasedItems addObject:purchasedItem];\n    }\n \
    \   return [NSArray arrayWithArray:purchasedItems];\n}\n```\n\n基本上，你创建一个可变数组，遍历\
    \ `EMABOrderItem`，并根据 `EMABOrderItem` 的实例实例化 `PKPaymentSummaryItem`。最后，返回该容器数组的不可变副本。\n\
    \n请仔细看下面两行代码：\n\n```\nNSString *readable = [NSString stringWithFormat:@\"%.2f\"\
    ,total];\nNSDecimalNumber *price = [NSDecimalNumber decimalNumberWithString:readable];\n\
    ```\n\n这绝对不是表示货币金额的最佳方式，因为通常货币金额只有两位尾数。Apple Pay API 推荐的做法是：\n\n```\nNSDecimalNumber\
    \ *price = [NSDecimalNumber decimalNumberWithMantissa:total exponent:-2 isNegative:NO];\n\
    ```\n\n在初始化 `PKPaymentRequest` 之前，你需要知道用户的 iPhone 是否已配置为使用 Apple Pay 支付。幸运的是，Stripe\
    \ 为你提供了一个便捷方法：`-(BOOL) canSubmitPaymentRequest`。如果是，则继续执行；如果不是，则需要优雅地向用户报告。\n\n\
    你还需要获取用户的收货地址，以便邮寄包裹。`PKPaymentRequest` 有一个方法 `setRequiredShippingAddressFields:PKAddressFieldPostalAddress`\
    \ 用于此目的。\n\n以下是代码：\n\n```\n-(IBAction)onApplePay:(id)sender{\n    NSString *merchantId\
    \ = kAppleMerchantID;\n    self.paymentRequest = [Stripe paymentRequestWithMerchantIdentifier:merchantId];\n\
    \    if ([Stripe canSubmitPaymentRequest:self.paymentRequest]) {\n        [self.paymentRequest\
    \ setRequiredShippingAddressFields:PKAddressFieldPostalAddress];\n        [self.paymentRequest\
    \ setRequiredBillingAddressFields:PKAddressFieldPostalAddress];\n        self.paymentRequest.paymentSummaryItems\
    \ = [self summaryItemsForShippingMethod:nil];\n        PKPaymentAuthorizationViewController\
    \ *auth = [[PKPaymentAuthorizationViewController alloc] initWithPaymentRequest:self.paymentRequest];\n\
    \        auth.delegate = self;\n        if (auth) {\n            [self presentViewController:auth\
    \ animated:YES completion:nil];\n        } else\n            [SVProgressHUD showErrorWithStatus:NSLocalizedString(@\"\
    Something Wrong\", @\"Something Wrong\")];\n    } else {\n        [SVProgressHUD\
    \ showErrorWithStatus:NSLocalizedString(@\"Apple Pay is not enabled. Please enable\
    \ your Apple Pay or Pay with Credit Card.\", @\"\")];\n    }\n}\n```\n\n接下来，展示\
    \ `PKPaymentAuthorizationViewController`。用户点击支付。点击后会发生什么？以下是实现视图控制器代理方法的方式：\n\n\
    ```\n-(void)paymentAuthorizationViewController:(nonnull PKPaymentAuthorizationViewController\
    \ *)controller didAuthorizePayment:(nonnull PKPayment *)payment completion:(nonnull\
    \ void (^)(PKPaymentAuthorizationStatus))completion{\n    [self handlePaymentAuthorizationWithPayment:payment\
    \ completion:nil];\n}\n```\n\n创建辅助方法 `handlePaymentAuthorizationWithPayment`，然后在“创建单次使用令牌”中实现此方法。请注意，你还获得了一个接受\
    \ `PKPaymentAuthorizationStatus` 的代码块。在所有异步代码执行完毕后，使用 `PKPaymentAuthorizationStatusSuccess`\
    \ 或 `PKPaymentAuthorizationStatusFailure` 调用此函数。这样 `PKPaymentAuthorizationViewController`\
    \ 就能知道何时以及如何更新其 UI。\n\n```\n- (void)handlePaymentAuthorizationWithPayment:(PKPayment\
    \ *)payment completion:(void (^)(PKPaymentAuthorizationStatus))completion {\n\
    \    [[STPAPIClient sharedClient] createTokenWithPayment:payment\n           \
    \                completion:^(STPToken *token, NSError *error) {\n           \
    \                   if (error) {\n                                 completion(PKPaymentAuthorizationStatusFailure);\n\
    \                                 return;\n                              }\n \
    \                             [self createBackendChargeWithToken:token completion:completion];\n\
    \                           }];\n}\n```\n\n一旦收到收费令牌，调用 Parse Cloud function 进行实际收费：\n\
    \n```\n- (void)createBackendChargeWithToken:(STPToken *)token\n              \
    \            completion:(void (^)(PKPaymentAuthorizationStatus))completion {\n\
    \    [self chargeWithToken:token.tokenId];\n}\n```\n\n以下是调用 Cloud function 的方式：\n\
    \n```\n-(void)chargeWithToken:(NSString *)tokenId{\n    [self.order saveInBackgroundWithBlock:^(BOOL\
    \ success, NSError *error){\n        if (!error) {\n            __weak typeof(self)\
    \ weakSelf = self;\n            NSDictionary *params = @{@\"chargeToken\":tokenId,\
    \ @\"orderId\":weakSelf.order.objectId};\n            [PFCloud callFunctionInBackground:@\"\
    ChargeToken\" withParameters:params block:^(NSString *message, NSError *error){\n\
    \                if (!error) {\n                    [weakSelf queryForUnfinishedOrder];\n\
    \                }\n            }];\n        }\n    }];\n}\n```\n\n你必须首先保存当前订单。保存操作完成后，将\
    \ Stripe 令牌和订单 ID 传递给后端。这是一种更安全的方式。一旦收费成功运行，你将发出另一个 API 调用来检查订单状态是否已更改，并同时更新你的\
    \ UI。\n"
- fmt: "# Summary\n\nIn this chapter, I briefly summarized how Apple Pay works and\
    \ how you can implement the \"Pay with Apple Pay\" feature with Stripe's Apple\
    \ Pay library.\n\n# 14. Charge and E-Mail\n\n**Electronic supplementary material**\
    \ The online version of this chapter (doi: [10.1007/978-1-4842-1317-9_14](http://dx.doi.org/10.1007/978-1-4842-1317-9_14))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    In [Chapter 12](#A978-1-4842-1317-9_12_Chapter.html), I showed you how to use\
    \ the cloud function to create and charge a Stripe Customer. In [Chapter 13](#A978-1-4842-1317-9_13_Chapter.html),\
    \ I showed you how to use a cloud function to pay with Apple Pay. All three methods\
    \ call functions of `\"createStripeCustomer\"`, `\"chargeCustomer\"`, and `\"\
    chargeToken\"`, respectively, in a JavaScript file with a name of `\"main.js\"\
    ` that you have written and hosted on Parse. The three functions take a dictionary\
    \ input to execute and return either a string if successful or an `NSError` object\
    \ if any error occurs. In this chapter, I will show you how you can implement\
    \ these three JavaScript functions. In addition, you will learn how to use Mailgun\
    \ to send an order confirmation once Stripe has successfully charged a user's\
    \ credit card.\n\n## Create and Charge a Customer\n\nTo recap, here are the three\
    \ JavaScript functions you will use in this chapter:\n\n**Create customer**\n\n\
    ```\n[PFCloud callFunctionInBackground:@\"createStripeCustomer\" withParameters:stripeCustomerDictionary\
    \ block:^(NSString *customerId, NSError *error) {\n\n}];\n```\n\n**Charge customer**\n\
    \n```\n[PFCloud callFunctionInBackground:@\" chargeCustomer\" withParameters:params\
    \ block:^(NSString *message, NSError *error){\n\n}];\n```\n\n**Pay with Apple\
    \ Pay**\n\n```\n[PFCloud callFunctionInBackground:@\"ChargeToken\" withParameters:params\
    \ block:^(NSString *message, NSError *error){\n\n}];\n```\n\n## Parse Cloud Code\n\
    \nFirst, here is some background on Parse Cloud Code. Parse Cloud Code is written\
    \ in JavaScript and runs in the Parse Cloud rather than running on a mobile device.\
    \ The Parse Cloud Code you write will work like your own back-end code. Obviously\
    \ when your Cloud Code is updated, it becomes available to all mobile environments\
    \ instantly. You don't have to wait for a new release of your application. This\
    \ lets you change app behavior on the fly and adds new features faster. Figure\
    \ [14-1](#A978-1-4842-1317-9_14_Chapter.html#Fig1) shows what your cloud function\
    \ `main.js` looks like in Parse.\n\n![A978-1-4842-1317-9_14_Fig1_HTML.jpg](A978-1-4842-1317-9_14_Fig1_HTML.jpg)\n\
    \n**Figure 14-1.** Cloud Code in Parse\n\n## The Parse Command-Line Tool (CLT)\n\
    \nBefore you can use the Parse Cloud Code, you will need to install the Parse\
    \ command-line tool on the computer you use for development. The command-line\
    \ tool will help you deploy your code to the Parse Cloud. To install this tool,\
    \ simply run the following command in the terminal:\n\n`curl -s` `https://www.parse.com/downloads/cloud_code/installer.sh`\
    \ `| sudo /bin/bash`\n\nOnce you have Parse CLT installed, you can start to set\
    \ up a Cloud Code directory. Open the Terminal App, `dir`, to a directory where\
    \ you want to put your Cloud Code directory, then type:\n\n`>parse configure accountKey\
    \ –d`\n\nThe CLT will respond with:\n\n```\n> Input your account key or press\
    \ enter to generate a new one.\nAccount Key: ${YOUR_ACCOUNT_KEY}\n```\n\nPress\
    \ Enter, type the following command, and then press Enter again:\n\n`> parse new`\n\
    \nThe CLT will respond with:\n\n```\nWould you like to create a new app, or add\
    \ Cloud Code to an existing app?\nType \"(n)ew\" or \"(e)xisting\": e\n1:  MyApp\n\
    2:  MyOtherApp\nSelect an App to add to config: 1\nAwesome! Now it's time to setup\
    \ some Cloud Code for the app: \"MyApp\",\nNext we will create a directory to\
    \ hold your Cloud Code.\nPlease enter the name to use for this directory,\nor\
    \ hit ENTER to use \"MyApp\" as the directory name.\n```\n\nMake your choice.\
    \ Then enter:\n\n`> parse deploy`\n\nOnce you have received a successful message\
    \ from CLT, you can move to Parse.com, and look at the Cloud Code part in your\
    \ project dashboard, as shown in Figure [14-1](#A978-1-4842-1317-9_14_Chapter.html#Fig1).\
    \ You will see a simple \"Hello World\" cloud function.\n\nFrom now on, you can\
    \ work on the `main.js` in your local directory. Once you are ready to deploy,\
    \ use:\n\n`> parse deploy`\n\nto deploy to the Parse server.\n\nIn the meantime,\
    \ you can also read any log generated by Cloud Code or every time you make a Cloud\
    \ Code function call, by tapping the \"Logs\" on Parse Dashboard, as shown in\
    \ Figure [14-2](#A978-1-4842-1317-9_14_Chapter.html#Fig2).\n\n![A978-1-4842-1317-9_14_Fig2_HTML.jpg](A978-1-4842-1317-9_14_Fig2_HTML.jpg)\n\
    \n**Figure 14-2.** Cloud Code logs\n\n> **Note:** To read more about the Parse\
    \ Command-Line Tool, please visit [`https://parse.com/apps/quickstart#cloud_code/unix`](https://parse.com/apps/quickstart#cloud_code/unix).\n\
    \n## Parse Cloud Modules\n\nTo make developers' lives easier, Parse also provides\
    \ the integration with third-party services and libraries through Cloud Modules.\
    \ The Cloud Modules work just like JavaScript libraries. For this example, you\
    \ will use Stripe Cloud Module and Mailgun Cloud Module.\n\n```\n/* Initialize\
    \ the Stripe and Mailgun Cloud Modules */\nvar Stripe = require('stripe');\nStripe.initialize('YOUR_STRIPE_TEST_SECRET');\n\
    var Mailgun = require('mailgun');\nMailgun.initialize(\"YOUR_MAILGUN_PROJECT_NAME\"\
    , \"YOUR_MAILGUN_API_KEY\");\n```\n\n## Create a Stripe Customer\n\nIn [Chapter\
    \ 12](#A978-1-4842-1317-9_12_Chapter.html), you learned how to use the `\"createStripeCustomer\"\
    ` cloud function to create a Stripe Customer. If you do use this method in your\
    \ code, you will receive an error that states there is no function named `\"createStripeCustomer\"\
    `. So the first cloud function you will implement is `\"createStripeCustomer\"\
    `.\n\n```\n[PFCloud callFunctionInBackground:@\"createStripeCustomer\" withParameters:stripeCustomerDictionary\
    \ block:^(NSString *customerId, NSError *error) {\n\n}];\n```\n\nFirst, you will\
    \ need to include Stripe Cloud Module in your code; also specify the test secret\
    \ key, as shown here:\n\n```\nvar Stripe = require('stripe');\nStripe.initialize('YOUR_TEST_STRIPE_KEY');\n\
    ```\n\nNext, define the function name by calling `Parse.Cloud.define`. Just remember\
    \ each function requires a unique name.\n\nIf you are familiar with JavaScript,\
    \ in addition to callbacks, every asynchronous method in the Parse JavaScript\
    \ SDK returns a Promise. With promises, your code can be much cleaner than the\
    \ nested code you get with callbacks.\n\n> **Note:** To read more about Parse\
    \ Promise, refer to [`https://parse.com/docs/js/guide`](https://parse.com/docs/js/guide)\
    \ `– promises.`\n\nTake a close look at the following simple Stripe Customer creation\
    \ function:\n\n```\nParse.Cloud.define(\"createStripeCustomer\",function(request,response){\n\
    \  Parse.Cloud.useMasterKey();\n  Parse.Promise.as().then(function(){\n    return\
    \ Stripe.Customers.create({\n    description: 'customer for Beauty & Me',\n  \
    \  card:request.params.tokenId,\n           email:request.params.customerEmail\n\
    \    }).then(null, function(error){\n      console.log('Creating customer with\
    \ stripe failed. Error: ' + error);\n      return Parse.Promise.error('An error\
    \ has occurred.');\n    });\n  }).then(function(customer) {\n    response.success(customer.id);\n\
    \  }, function(error) {\n    response.error(error);\n  });\n});\n```\n\nBasically,\
    \ you call the `Stripe.Customer.create` API to create a Stripe Customer. You provide\
    \ the token you received from the iOS app and the user's e-mail to create the\
    \ customer. If the customer is created successfully, you will receive the Stripe\
    \ Customer object. Since you only need the customer id, return the id in the success\
    \ response. You also let your iOS app know if there is any error."
  raw: '## Summary


    In this chapter, I briefly summarized how Apply Pay works and how you can implement
    the Pay with Apple Pay feature with Stripe’s Apple Pay library.


    # 14. Charge and E-Mail


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1317-9_​14](http://dx.doi.org/10.1007/978-1-4842-1317-9_14))
    contains supplementary material, which is available to authorized users.


    In [Chapter 12](#A978-1-4842-1317-9_12_Chapter.html), I showed you how to use
    the cloud function to create and charge a Stripe Customer. In [Chapter 13](#A978-1-4842-1317-9_13_Chapter.html),
    I showed you how to use a cloud function to pay with Apple Pay. All three methods
    call functions of “createStripeCustomer,” “chargeCustomer,” and “chargeToken,”
    respectively, in a JavaScript file with a name of “main.js” that you have written
    and hosted on Parse. The three functions take a dictionary input to execute and
    return either a string if successful or an NSError object if any error occurs.
    In this chapter, I will show you how you can implement these three JavaScript
    functions. In addition, you will learn how to use Mailgun to send an order confirmation
    once Stripe has successfully charged a user’s credit card.


    ## Create and Charge a Customer


    To recap, here are the three JavaScript functions you will use in this chapter:


    Create customer


    `[PFCloud callFunctionInBackground:@"createStripeCustomer" withParameters:stripeCustomerDictionary
    block:^(NSString *customerId, NSError *error) {`


    `}];`


    Charge customer


    `[PFCloud callFunctionInBackground:@" chargeCustomer" withParameters:params block:^(NSString
    *message, NSError *error){`


    `}];`


    Pay with Apple Pay


    `[PFCloud callFunctionInBackground:@"ChargeToken" withParameters:params block:^(NSString
    *message, NSError *error){`


    `}];`


    ## Parse Cloud Code


    First, here is some background on Parse Cloud Code. Parse Cloud Code is written
    in JavaScript and runs in the Parse Cloud rather than running on a mobile device.
    The Parse Cloud Code you write will work like your own back-end code. Obviously
    when your Cloud Code is updated, it becomes available to all mobile environments
    instantly. You don’t have to wait for a new release of your application. This
    lets you change app behavior on the fly and adds new features faster. Figure [14-1](#A978-1-4842-1317-9_14_Chapter.html#Fig1)
    shows what your cloud function main.js looks like in Parse.


    ![A978-1-4842-1317-9_14_Fig1_HTML.jpg](A978-1-4842-1317-9_14_Fig1_HTML.jpg)


    Figure 14-1.


    Cloud Code in Parse


    ## The Parse Command-Line Tool (CLT)


    Before you can use the Parse Cloud Code, you will need to install the Parse command-line
    tool on the computer you use for development. The command-line tool will help
    you deploy your code to the Parse Cloud. To install this tool, simply run the
    following command in the terminal:


    `curl -s` [`https://www.parse.com/downloads/cloud_code/installer.sh`](https://www.parse.com/downloads/cloud_code/installer.sh)
    `| sudo /bin/bash`


    Once you have Parse CLT installed, you can start to set up a Cloud Code directory.
    Open the Terminal App, `dir`, to a directory where you want to put your Cloud
    Code directory, then type:


    `>parse configure accountKey –d`


    The CLT will response with:


    `> Input your account key or press enter to generate a new one.`


    `Account Key: ${YOUR_ACCOUNT_KEY}`


    Press Enter, type the following command, and then press Enter again:


    `> parse new`


    The CLT will response with:


    `Would you like to create a new app, or add Cloud Code to an existing app?`


    `Type "(n)ew" or "(e)xisting": e`


    `1:  MyApp`


    `2:  MyOtherApp`


    `Select an App to add to config: 1`


    `Awesome! Now it’s time to setup some Cloud Code for the app: "MyApp",`


    `Next we will create a directory to hold your Cloud Code.`


    `Please enter the name to use for this directory,`


    `or hit ENTER to use "MyApp" as the directory name.`


    Make your choice. Then enter:


    `> parse deploy`


    Once you have received a successful message from CLT, you can move to Parse.com,
    and look at the Cloud Code part in your project dashboard, as shown in Figure
    [14-1](#A978-1-4842-1317-9_14_Chapter.html#Fig1). You will see a simple “Hello
    World” cloud function.


    From now on, you can work on the main.js in your local directory. Once you are
    ready to deploy, use:


    `> parse deploy`


    to deploy to the Parse server.


    In the meantime, you can also read any log generated by Cloud Code or every time
    you make a Cloud Code function call, by tapping the “Logs” on Parse Dashboard,
    as shown in Figure [14-2](#A978-1-4842-1317-9_14_Chapter.html#Fig2).


    ![A978-1-4842-1317-9_14_Fig2_HTML.jpg](A978-1-4842-1317-9_14_Fig2_HTML.jpg)


    Figure 14-2.


    Cloud Code logs Note


    To read more about the Parse Command-Line Tool, please visit [`https://parse.com/apps/quickstart#cloud_code/unix`](https://parse.com/apps/quickstart#cloud_code/unix)
    .


    ## Parse Cloud Modules


    To make developers’ lives easier, Parse also provides the integration with third-party
    services and libraries through Cloud Modules. The Cloud Modules work just like
    JavaScript libraries. For this example, you will use Stripe Cloud Module and Mailgun
    Cloud Module.


    `/* Initialize the Stripe and Mailgun Cloud Modules */`


    `var Stripe = require(''stripe'');`


    `Stripe.initialize(''YOUR_STRIPE_TEST_SECRET'');`


    `var Mailgun = require(''mailgun'');`


    `Mailgun.initialize("YOUR_MAILGUN_PROJECT_NAME", "YOUR_MAILGUN_API_KEY");`


    ## Create a Stripe Customer


    In [Chapter 12](#A978-1-4842-1317-9_12_Chapter.html), you learned how to use the
    “createStripeCustomer” cloud function to create a Stripe Customer. If you do use
    this method in your code, you will receive an error that states there is no function
    named “createStripeCustomer.” So the first cloud function you will implement is
    “createStripeCustomer.”


    `[PFCloud callFunctionInBackground:@"createStripeCustomer" withParameters:stripeCustomerDictionary
    block:^(NSString *customerId, NSError *error) {`


    `}];`


    First, you will need to include Stripe Cloud Module in your code; also specify
    the test secret key, as shown here:


    `var Stripe = require(''stripe'');`


    `Stripe.initialize(''YOUR_TEST_STRIPE_KEY);`


    Next, define the function name by calling `Parse.Cloud.define`. Just remember
    each function requires a unique name.


    If you are familiar with JavaScript, in addition to callbacks, every asynchronous
    method in the Parse JavaScript SDK returns a Promise. With promises, your code
    can be much cleaner than the nested code you get with callbacks.


    Note


    To read more about Parse Promise, refer to [`https://parse.com/docs/js/guide`](https://parse.com/docs/js/guide)
    `– promises.`


    Take a close look at the following simple Stripe Customer creation function:


    `Parse.Cloud.define("createStripeCustomer",function(request,response){`


      `Parse.Cloud.useMasterKey();`


      `Parse.Promise.as().then(function(){`


        `return Stripe.Customers.create({`


        `description: ''customer for Beauty & Me'',`


        `card:request.params.tokenId,`


               `email:request.params.customerEmail`


        `}).then(null, function(error){`


          `console.log(''Creating customer with stripe failed. Error: '' + error);`


          `return Parse.Promise.error(''An error has occurred.'');`


        `});`


      `}).then(function(customer) {`


        `response.success(customer.id);`


      `}, function(error) {`


        `response.error(error);`


      `});`


    `});`


    Basically, you call the `Stripe.Customer.create` API to create a Stripe Customer.
    You provide the token you received from the iOS app and the user’s e-mail to create
    the customer. If the customer is created successfully, you will receive the Stripe
    Customer object. Since you only need the customer id, return the id in the success
    response. You also let your iOS app know if there is any error.'
  trans: "\n# 摘要\n\n本章简要总结了 Apple Pay 的工作原理，以及如何使用 Stripe 的 Apple Pay 库实现“通过 Apple\
    \ Pay 付款”功能。\n\n# 14. 扣款与电子邮件\n\n**电子补充材料** 本章的在线版本（doi: [10.1007/978-1-4842-1317-9_14](http://dx.doi.org/10.1007/978-1-4842-1317-9_14)）包含补充材料，可供授权用户使用。\n\
    \n在第 12 章中，我向你展示了如何使用云函数创建并扣款 Stripe 客户。在第 13 章中，我向你展示了如何使用云函数通过 Apple Pay 付款。这三种方法分别调用你编写并托管在\
    \ Parse 上的 `\"main.js\"` 文件中的 `\"createStripeCustomer\"`、`\"chargeCustomer\"`\
    \ 和 `\"chargeToken\"` 函数。这三个函数接收字典输入并执行，成功时返回字符串，发生错误时返回 `NSError` 对象。在本章中，我将向你展示如何实现这三个\
    \ JavaScript 函数。此外，你还将学习如何在 Stripe 成功扣款用户信用卡后，使用 Mailgun 发送订单确认邮件。\n\n## 创建并扣款客户\n\
    \n回顾一下，本章你将使用以下三个 JavaScript 函数：\n\n**创建客户**\n\n```\n[PFCloud callFunctionInBackground:@\"\
    createStripeCustomer\" withParameters:stripeCustomerDictionary block:^(NSString\
    \ *customerId, NSError *error) {\n\n}];\n```\n\n**扣款客户**\n\n```\n[PFCloud callFunctionInBackground:@\"\
    \ chargeCustomer\" withParameters:params block:^(NSString *message, NSError *error){\n\
    \n}];\n```\n\n**通过 Apple Pay 付款**\n\n```\n[PFCloud callFunctionInBackground:@\"\
    ChargeToken\" withParameters:params block:^(NSString *message, NSError *error){\n\
    \n}];\n```\n\n## Parse 云代码\n\n首先，这里是关于 Parse 云代码的一些背景知识。Parse 云代码使用 JavaScript\
    \ 编写，运行在 Parse 云端，而非移动设备上。你编写的 Parse 云代码将像你自己的后端代码一样工作。显然，当你的云代码更新时，它会立即在所有移动环境中生效。你无需等待应用的新版本发布。这让你能够随时更改应用行为，并更快地添加新功能。图\
    \ 14-1 展示了你的云函数 `main.js` 在 Parse 中的样子。\n\n![A978-1-4842-1317-9_14_Fig1_HTML.jpg](img/A978-1-4842-1317-9_14_Fig1_HTML.jpg)\n\
    \n**图 14-1.** Parse 中的云代码\n\n## Parse 命令行工具 (CLT)\n\n在使用 Parse 云代码之前，你需要在用于开发的计算机上安装\
    \ Parse 命令行工具。该命令行工具将帮助你部署代码到 Parse 云端。要安装此工具，只需在终端中运行以下命令：\n\n`curl -s` `https://www.parse.com/downloads/cloud_code/installer.sh`\
    \ `| sudo /bin/bash`\n\n安装好 Parse CLT 后，你就可以开始设置云代码目录了。打开终端应用，`cd` 到你想放置云代码目录的路径，然后输入：\n\
    \n`>parse configure accountKey –d`\n\nCLT 会响应：\n\n```\n> Input your account key\
    \ or press enter to generate a new one.\nAccount Key: ${YOUR_ACCOUNT_KEY}\n```\n\
    \n按回车键，输入以下命令，然后再次按回车键：\n\n`> parse new`\n\nCLT 会响应：\n\n```\nWould you like to\
    \ create a new app, or add Cloud Code to an existing app?\nType \"(n)ew\" or \"\
    (e)xisting\": e\n1:  MyApp\n2:  MyOtherApp\nSelect an App to add to config: 1\n\
    Awesome! Now it's time to setup some Cloud Code for the app: \"MyApp\",\nNext\
    \ we will create a directory to hold your Cloud Code.\nPlease enter the name to\
    \ use for this directory,\nor hit ENTER to use \"MyApp\" as the directory name.\n\
    ```\n\n做出选择。然后输入：\n\n`> parse deploy`\n\n一旦你从 CLT 收到成功消息，就可以转到 Parse.com，在你的项目面板中查看云代码部分，如图\
    \ 14-1 所示。你将看到一个简单的 \"Hello World\" 云函数。\n\n从现在开始，你可以在本地目录中编写 `main.js`。准备好部署时，使用：\n\
    \n`> parse deploy`\n\n部署到 Parse 服务器。\n\n同时，你也可以通过点击 Parse 面板上的 \"Logs\"（如图 14-2\
    \ 所示）来阅读云代码生成的任何日志，或每次调用云函数时生成的日志。\n\n![A978-1-4842-1317-9_14_Fig2_HTML.jpg](img/A978-1-4842-1317-9_14_Fig2_HTML.jpg)\n\
    \n**图 14-2.** 云代码日志\n\n> **注意：** 要了解有关 Parse 命令行工具的更多信息，请访问 [`https://parse.com/apps/quickstart#cloud_code/unix`](https://parse.com/apps/quickstart#cloud_code/unix)。\n\
    \n## Parse 云模块\n\n为了让开发者的生活更轻松，Parse 还通过云模块提供了与第三方服务和库的集成。云模块的工作方式与 JavaScript\
    \ 库类似。在本例中，你将使用 Stripe 云模块和 Mailgun 云模块。\n\n```\n/* 初始化 Stripe 和 Mailgun 云模块 */\n\
    var Stripe = require('stripe');\nStripe.initialize('YOUR_STRIPE_TEST_SECRET');\n\
    var Mailgun = require('mailgun');\nMailgun.initialize(\"YOUR_MAILGUN_PROJECT_NAME\"\
    , \"YOUR_MAILGUN_API_KEY\");\n```\n\n## 创建 Stripe 客户\n\n在第 12 章中，你学习了如何使用 `\"\
    createStripeCustomer\"` 云函数创建 Stripe 客户。如果你在代码中确实使用了此方法，将会收到一个错误，提示没有名为 `\"createStripeCustomer\"\
    ` 的函数。因此，你将要实现的第一个云函数就是 `\"createStripeCustomer\"`。\n\n```\n[PFCloud callFunctionInBackground:@\"\
    createStripeCustomer\" withParameters:stripeCustomerDictionary block:^(NSString\
    \ *customerId, NSError *error) {\n\n}];\n```\n\n首先，你需要在代码中包含 Stripe 云模块；同时指定测试密钥，如下所示：\n\
    \n```\nvar Stripe = require('stripe');\nStripe.initialize('YOUR_TEST_STRIPE_KEY');\n\
    ```\n\n接下来，通过调用 `Parse.Cloud.define` 定义函数名称。请记住，每个函数都需要一个唯一的名称。\n\n如果你熟悉 JavaScript，除了回调之外，Parse\
    \ JavaScript SDK 中的每个异步方法都会返回一个 Promise。使用 Promise，你的代码可以比使用回调的嵌套代码清晰得多。\n\n>\
    \ **注意：** 要了解更多关于 Parse Promise 的信息，请参考 [`https://parse.com/docs/js/guide`](https://parse.com/docs/js/guide)\
    \ `– promises。`\n\n仔细看看下面这个简单的 Stripe 客户创建函数：\n\n```\nParse.Cloud.define(\"createStripeCustomer\"\
    ,function(request,response){\n  Parse.Cloud.useMasterKey();\n  Parse.Promise.as().then(function(){\n\
    \    return Stripe.Customers.create({\n    description: 'customer for Beauty &\
    \ Me',\n    card:request.params.tokenId,\n           email:request.params.customerEmail\n\
    \    }).then(null, function(error){\n      console.log('Creating customer with\
    \ stripe failed. Error: ' + error);\n      return Parse.Promise.error('An error\
    \ has occurred.');\n    });\n  }).then(function(customer) {\n    response.success(customer.id);\n\
    \  }, function(error) {\n    response.error(error);\n  });\n});\n```\n\n基本上，你调用了\
    \ `Stripe.Customer.create` API 来创建 Stripe 客户。你提供从 iOS 应用接收到的令牌以及用户的电子邮件来创建客户。如果客户创建成功，你将收到\
    \ Stripe 客户对象。由于你只需要客户 id，因此在成功响应中返回 id。如果出现任何错误，你也应告知你的 iOS 应用。\n"
- fmt: "# Charge Customer\n\nThe next cloud function is `charge`. What you received\
    \ for this function is an order object id and a customer id. Here are the steps\
    \ you need to follow:\n\nBased on the order object id, find the order; you also\
    \ need to include the products associated with the order and the customer. You\
    \ will need this information to generate a receipt. Charge the customer based\
    \ on the Stripe Customer id. Update the order with a new `ORDER_COMPLETED` status,\
    \ and then generate a real order id and a big integer number, based on the total\
    \ orders we have in the system. Send an e-mail to the customer by calling `Mailgun`\
    \ Parse Cloud Module. You might have to compose some e-mail content by mixing\
    \ html tag and the order’s information. Once the order confirmation e-mail is\
    \ sent successfully, send a message back to the iOS app. If any errors occur,\
    \ return the errors.\n\nHere is the code for the previous five steps:\n\n```\n\
    /* Initialize the Stripe and Mailgun Cloud Modules */\n\nvar Stripe = require('stripe');\n\
    Stripe.initialize('your_own_stripe_secret');\n\nvar Mailgun = require('mailgun');\n\
    Mailgun.initialize(\"your_mailgun_email_account\", \"your_mailgun_key\");\n\n\
    Parse.Cloud.define(\"chargeCustomer\", function(request, response) {\n    Parse.Cloud.useMasterKey();\n\
    \    var order;\n    var orderNo;\n\n    Parse.Promise.as().then(function() {\n\
    \        var orderQuery = new Parse.Query('Order');\n        orderQuery.equalTo('objectId',\
    \ request.params.orderId);\n        orderQuery.include(\"customer\");\n      \
    \  orderQuery.include([\"items.product\"]);\n        orderQuery.descending(\"\
    createdAt\");\n        return orderQuery.first().then(null, function(error) {\n\
    \            return Parse.Promise.error('Sorry, this order doesn\\'t exist.');\n\
    \        });\n    }).then(function(result) {\n        order = result;\n    }).then(function(result)\
    \ {\n        var countQuery = new Parse.Query(\"Order\");\n        return countQuery.count().then(null,\
    \ function(error) {\n            return Parse.Promise.error('Something wrong.');\n\
