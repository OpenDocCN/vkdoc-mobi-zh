    ## Product Category View


    As shown in the prototype of the sample app in [Chapter 2](#A978-1-4842-1317-9_2_Chapter.html),
    a UITableViewController is used to present all brands. While the UITableView itself
    looks pretty simple, what makes it look richer is each UITableViewCell, as shown
    in Figure [5-1](#A978-1-4842-1317-9_5_Chapter.html#Fig1). For the brand, focus
    on the UITableViewCell.


    ![A978-1-4842-1317-9_5_Fig1_HTML.jpg](A978-1-4842-1317-9_5_Fig1_HTML.jpg)


    Figure 5-1.


    Category cell in EMABCategoryTableViewController


    The EMABCategory has two properties, title and image; the EMABCategoryTableViewCell,
    a subclass of PFTableViewCell, also has two properties to hold the title and image:
    one is UILabel, the other is PFImageView.


    You also want to let an EMABCategory model object hook up with EMABCategoryTableViewCell,
    so you create a helper method: `-(void)configureItem:(EMABCategory *)item`. Here
    is the complete header file:


    EMABCategoryTableViewCell.h


    `#import "PFTableViewCell.h"`


    `@class EMABCategory;`


    `@interface EMABCategoryTableViewCell : PFTableViewCell`


    `-(void)configureItem:(EMABCategory *)item;`


    `@end`


    As you can see, you don’t define the UILabel and PFImageView properties in the
    header file—you define them in the implementation file. The reason is that the
    properties are private; there is no need to let the outside world know what you
    are using. On the other hand, your UI is fairly simple, so for the purpose of
    keeping the code clean, you will use IBOutlet to hook up the properties in your
    implementation with the Main UIStoryboard. Here is the interface category in the
    .m file:


    `@interface EMABCategoryTableViewCell()`


    `@property (nonatomic, weak) IBOutlet PFImageView *backgroundImageView;`


    `@property (nonatomic, weak) IBOutlet UILabel *titleLabel;`


    `@end;`


    The `titleLabel` will display a brand’s title. Simple enough, use `self.titleLabel.text
    = item.title`. To display a brand’s image, you use PFImageView and PFFile:


    `self.backgroundImageView.file = item.image;`


    `[self.backgroundImageView loadInBackground];`


    The magic is `[self.backgroundImageView loadInBackground]`. It automatically handles
    async image loading and displaying, as well as caching.


    Here is the complete implementation:


    EMABCategoryTableViewCell.m


    `#import "EMABCategoryTableViewCell.h"`


    `#import <ParseUI/PFImageView.h>`


    `#import "EMABCategory.h"`


    `@implementation` `EMABCategoryTableViewCell`


    `-(void)configureItem:(EMABCategory *)item`


    `{`


        `self.titleLabel.text = item.title;`


        `self.backgroundImageView.image = nil;`


        `if (item.image) {`


            `self.backgroundImageView.file = item.image;`


            `[self.backgroundImageView loadInBackground];`


        `} else {`


            `self.backgroundImageView.image = [UIImage imageNamed:@"category_cell_default_background"];`


        `}`


    `}`


    `@end`


    You may be wondering why I set `self.backgroundImageView.image = nil`. While UITableView
    reuses its UITableViewCell, the images in the old and offscreen cells will show
    before new images are loaded to replace those images. When you scroll UITableView,
    you will see the funky image refresh. There are a few different ways to solve
    this problem; one is in `-(void)prepareForReuse` in the UITableViewCell where
    you do it in `-(void)configureItem:(EMABCategory)item` for simplicity.'
  trans: "\n## 产品类别模型\n\n产品类别模型用于模拟化妆品品牌。一个品牌至少包含标题、标识、原产国以及关于该品牌的描述。在本文示例中，由于我只经营知名品牌，因此仅使用品牌标题和标识图片。\n\
    \n我已经在第 3 章中介绍了`PFObject`。你的类别模型将是`PFObject`的一个子类。继承`PFObject`需要指定一个`ParseClassName`。这个`ParseClassName`必须与你在\
    \ Parse 网站上设置的名称一致。换句话说，如果你在 Parse.com 的项目中创建了一个名为`Category`的模型类，那么你需要在子类文件中使用`\"\
    Category\"`作为`ParseClassName`。下面的示例代码展示了具体实现方法。\n\n首先，在`EMCAConstants.h`中注册一个`kCategory`字符串常量：\n\
    \n`extern NSString *const kCategory;`\n\n然后在`EMABConstants.m`文件中：\n\n`NSString\
    \ *const kCategory = @\"Category\";`\n\n接下来，创建一个`EMABCategory`子类来表示你的化妆品产品类别。该类有两个属性：`title`和`image`，分别代表品牌名称和标识。在第\
    \ 3 章中，我解释了如何创建`PFObject`子类——例如，使用`NSString`实例保存品牌标题，用`UIImage`保存标识。每个品牌的图片文件存储在\
    \ Parse 服务器上；你的 iOS 应用将获取该图片文件并转换为`UIImage`，然后通过`UIImageView`显示图片。在 iOS 开发中，从远程服务器加载图片文件始终是一项具有挑战性的任务。如果你想缓存图片文件以避免下次再次获取，还需要做更多工作。\n\
    \n由于这是 iOS 应用开发中常见的任务，Parse 通过引入一个名为`PFFile`的类简化了操作。我将很快用一个示例来演示使用该类如何让开发者的工作更轻松。目前，只需使用`PFFile`类来保存图片。\n\
    \niPhone 应用还将从 Parse 服务器获取所有产品类别。第 3 章介绍了`PFQuery`类。对于本文示例，你需要在`EMABCategory`子类中创建一个名为`+(PFQuery\
    \ *)basicQuery`的辅助类方法。\n\n以下是完整的`EMABCategory`头文件：\n\n`EMABCategory.h`\n\n```\n\
    #import <Parse/Parse.h>\n\n@interface EMABCategory : PFObject<PFSubclassing>\n\
    \n@property (nonatomic, copy) NSString *title;\n@property (nonatomic, strong)\
    \ PFFile *image;\n\n+(PFQuery *)basicQuery;\n\n@end\n```\n\n如果`PFObject`无法识别，请确认你已经包含了`#import\
    \ <Parse/Parse.h>`。\n\n`EMABCategory`的实现可能是本书中最简单的。除了导入该子类的头文件外，你还需要导入`\"EMABConstants.h\"\
    `，因为必需的`+(NSString *)ParseClassName`方法需要返回一个`NSString`。你可以这样编写：\n\n```\n+(NSString\
    \ *)parseClassName {\n    return @\"Category\";\n}\n```\n\n如果你在不同位置使用了`@\"Category\"\
    `模型类名，但后来想将其改为`@\"Brand\"`，你就需要在整个项目中查找并替换为`\"Brand\"`。使用全局常量有助于解决这个问题。你只需在`\"\
    EMABConstants.m\"`中将`\"Category\"`改为`\"Brand\"`一次即可。\n\n在`+(PFQuery *)basicQuery`的实现中，你通过使用`orderByAscending`方法按字母顺序对获取结果进行排序——这是\
    \ Parse 的另一个优势。设想你同时为 iOS、Android 或 Web 开发。如果你希望这三个平台具有相同的功能，由于后端通常没有排序功能，平台工程师需要编写自己的排序方法。\n\
    \n以下是完整的实现代码：\n\n`EMABCategory.m`\n\n```\n#import \"EMABCategory.h\"\n#import\
    \  <Parse/PFObject+Subclass.h>\n#import   \"EMABConstants.h\"\n\n@implementation\
    \ EMABCategory\n\n@dynamic title, image;\n\n+(NSString *)parseClassName\n{\n \
    \   return kCategory;\n}\n\n+(PFQuery *)basicQuery{\n    PFQuery *query = [PFQuery\
    \ queryWithClassName:[self parseClassName]];\n    [query orderByAscending:@\"\
    title\"];\n    return query;\n}\n\n@end\n```\n\n## 产品类别视图\n\n如第 2 章中示例应用的原型所示，使用`UITableViewController`来展示所有品牌。虽然`UITableView`本身看起来相当简单，但让界面更丰富的是每个`UITableViewCell`，如图\
    \ 5-1 所示。对于品牌部分，重点在于`UITableViewCell`。\n\n![A978-1-4842-1317-9_5_Fig1_HTML.jpg](img/A978-1-4842-1317-9_5_Fig1_HTML.jpg)\n\
    \n图 5-1. `EMABCategoryTableViewController`中的类别单元格\n\n`EMABCategory`有两个属性：`title`和`image`；而`EMABCategoryTableViewCell`作为`PFTableViewCell`的子类，也有两个属性来保存标题和图片：一个是`UILabel`，另一个是`PFImageView`。\n\
    \n你还希望将`EMABCategory`模型对象与`EMABCategoryTableViewCell`关联起来，因此创建一个辅助方法：`-(void)configureItem:(EMABCategory\
    \ *)item`。以下是完整的头文件：\n\n`EMABCategoryTableViewCell.h`\n\n```\n#import \"PFTableViewCell.h\"\
    \n@class EMABCategory;\n\n@interface EMABCategoryTableViewCell : PFTableViewCell\n\
    \n-(void)configureItem:(EMABCategory *)item;\n\n@end\n```\n\n如你所见，你没有在头文件中定义`UILabel`和`PFImageView`属性——而是在实现文件中定义它们。原因在于这些属性是私有的，无需让外部知道你在使用什么。另一方面，你的\
    \ UI 相当简单，为了保持代码整洁，你将使用`IBOutlet`将实现中的属性与主 UI 故事板关联起来。以下是`.m`文件中的接口类别：\n\n```\n\
    @interface EMABCategoryTableViewCell()\n\n@property (nonatomic, weak) IBOutlet\
    \ PFImageView *backgroundImageView;\n@property (nonatomic, weak) IBOutlet UILabel\
    \ *titleLabel;\n\n@end;\n```\n\n`titleLabel`将显示品牌标题。很简单，使用`self.titleLabel.text\
    \ = item.title`即可。要显示品牌图片，你使用`PFImageView`和`PFFile`：\n\n```\nself.backgroundImageView.file\
    \ = item.image;\n[self.backgroundImageView loadInBackground];\n```\n\n神奇之处在于`[self.backgroundImageView\
    \ loadInBackground]`。它自动处理异步图片加载、显示以及缓存。\n\n以下是完整的实现代码：\n\n`EMABCategoryTableViewCell.m`\n\
    \n```\n#import \"EMABCategoryTableViewCell.h\"\n#import <ParseUI/PFImageView.h>\n\
    #import \"EMABCategory.h\"\n\n@implementation EMABCategoryTableViewCell\n\n-(void)configureItem:(EMABCategory\
    \ *)item\n{\n    self.titleLabel.text = item.title;\n    self.backgroundImageView.image\
    \ = nil;\n    if (item.image) {\n        self.backgroundImageView.file = item.image;\n\
    \        [self.backgroundImageView loadInBackground];\n    } else {\n        self.backgroundImageView.image\
    \ = [UIImage imageNamed:@\"category_cell_default_background\"];\n    }\n}\n\n\
    @end\n```\n\n你可能会疑惑为什么我设置了`self.backgroundImageView.image = nil`。当`UITableView`重用其`UITableViewCell`时，旧的和屏幕外的单元格中的图片会在新图片加载替换之前显示。当你滚动`UITableView`时，你会看到奇怪的图片刷新现象。有几种不同的方法可以解决这个问题；一种方法是在`UITableViewCell`的`-(void)prepareForReuse`中处理，但为了简单起见，我们在`-(void)configureItem:(EMABCategory)item`中执行此操作。\n"
- fmt: "# Product Category Controller\n\nNext, you will be working on the controller.\n\
    \nFirst, create a new class named `EMABCategoriesTableViewController` and make\
    \ sure it is a subclass of `PFQueryTableViewController`. I have already introduced\
    \ `PFQueryTableViewController` in [Chapter 3](#A978-1-4842-1317-9_3_Chapter.html).\
    \ In this view controller, you create a one-to-one mapping between the `EMABCategory`\
    \ class and the `EMABCateogryUITableViewCell`. You will also use the features\
    \ such as pull-to-refresh, pagination, and showing and dismissing a loading activity\
    \ indicator before and after any data is loaded.\n\nHere is the automatically\
    \ generated header file:\n\n`EMABCategoriesTableViewController.h`\n\n```\n#import\
    \ <UIKit/UIKit.h>\n#import <ParseUI/PFQueryTableViewController.h>\n\n@interface\
    \ EMABCategoriesTableViewController : PFQueryTableViewController\n\n@end\n```\n\
    \nIn the `.m` implementation file, start by importing the necessary helper files\
    \ such as `EMABConstants.h`, `EMABCategory.h`, and `EMABCategoryTableViewCell.h`.\n\
    \nNext, implement the `-(void)awakeFromNib` method. `parseClassName`, `objectsPerPage`,\
    \ and `pullToRefreshEnabled` are the properties of `PFQueryTableViewController`\
    \ so you can just use them and set the values you want. In this case, the `ParseClassName`\
    \ is defined by `kCategory`. You want to show 10 objects per page and enable pull-to-refresh.\
    \ The activity loading indicator will be shown by default.\n\n```\n- (void)awakeFromNib\
    \ {\n    [super awakeFromNib];\n    self.parseClassName = kCategory;\n    self.paginationEnabled\
    \ = YES;\n    self.objectsPerPage = 10;\n    self.pullToRefreshEnabled = YES;\n\
    }\n```\n\nKeep in mind you are using Storyboard to initialize your view controller\
    \ so `-(void)awakeFromNib` method is a good place to enable pull-to-refresh, pagination,\
    \ etc. If you use a different way such as `-(instancetype)initWithStyle:(UITableViewStyle)style`,\
    \ then this method is the place for you to set `ParseClassName`, pagination, etc.\n\
    \nNext, you need to let the `PFQueryTableViewController` subclass know what kind\
    \ of query you need to perform. You implement the method `-(PFQuery *)queryForTable`.\
    \ In the `EMABCategory` class, you have defined a helper method called `+(PFQuery\
    \ *)basicQuery`. Now you can just use it.\n\n```\nPFQuery *query = [EMABCategory\
    \ basicQuery];\n```\n\nOr, you can just use the default implementation:\n\n```\n\
    PFQuery *query = [PFQuery queryWithClassName:self.parseClassName];\n[query orderByAscending:@\"\
    title\"];\n```\n\nIf you end up using the same code a few more times, implementing\
    \ it in the `EMABCategory` class makes more sense.\n\nNext, `PFQuery` also has\
    \ a method for you to manage cache policy: `kPFCachePolicyCacheThenNetwork`. This\
    \ policy is quite self-explanatory. Keep in mind, when using `kPFCachePolicyCacheThenNetwork`\
    \ as your caching policy your callback is always triggered twice. This is because\
    \ the policy is to use the cache and then to go to the network, not to use the\
    \ cache exclusively. There are other cache options such as `kPFCachePolicyIgnoreCache`,\
    \ `kPFCachePolicyCacheOnly`, `kPFCachePolicyNetworkOnly`, `kPFCachePolicyCacheElseNetwork`,\
    \ `kPFCachePolicyNetworkElseCache`, and `kPFCachePolicyCacheThenNetwork`.\n\n\
    ```\nif ([self.objects count] == 0) {\n    query.cachePolicy = kPFCachePolicyCacheThenNetwork;\n\
    }\n```\n\nThe complete implementation of `-(PFQuery *)queryForTable` looks like\
    \ this:\n\n```\n-(PFQuery *)queryForTable {\n    PFQuery *query = [EMABCategory\
    \ basicQuery];\n    if ([self.objects count] == 0) {\n        query.cachePolicy\
    \ = kPFCachePolicyCacheThenNetwork;\n    }\n    return query;\n}\n```\n\nNext,\
    \ implement the `PFQueryTableViewController` datasource method. First, you want\
    \ to extend the default cell height, so you set the height of each cell to 60\
    \ points:\n\n```\n-(CGFloat)tableView:(UITableView *)tableView heightForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    return 60.0;\n}\n```\n\n`PFQueryTableViewController` has\
    \ overridden the standard `UITableView`'s `-tableView:cellForRowAtIndexPath:`\
    \ method. Namely, `-tableView:cellForRowAtIndexPath:object:`. Traditionally, you\
    \ need the object array. Then you use `indexPath.row` to get the object for each\
    \ row. Now you have this object automatically.\n\nHowever, this override method\
    \ assumes that you will give an object to each row and there is only one section.\
    \ If you have multiple sections, this method won’t work automatically.\n\nSince\
    \ you also enable pagination, and there are 10 objects on each page, each cell\
    \ will be configured with an item. For this, you use the `EMABCategoryTableViewCell`\
    \ method `-(void)configureItem:(EMABCategory *)item`.\n\nYou also need a way to\
    \ load the next page. Here you add an extra cell after 10 objects. This cell has\
    \ a title of \"Load More…\". If a user taps this cell, the app will load another\
    \ 10 objects or one more page.\n\nHere is the complete implementation:\n\n```\n\
    - (EMABCategoryTableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath object:(EMABCategory *)object{\n    EMABCategoryTableViewCell *cell\
    \ = [tableView dequeueReusableCellWithIdentifier:@\"CategoryCell\" forIndexPath:indexPath];\n\
    \    if (indexPath.row == [[self objects] count]) {\n        cell.textLabel.text\
    \ = NSLocalizedString(@\"Load More…\", @\"\");\n    } else {\n        [cell configureItem:object];\n\
    \    }\n    return cell;\n}\n```\n\nThe last step is to handle when a user taps\
    \ \"Load more…\" and tap other `CategoryCell`. When the \"Load more…\" cell is\
    \ tapped, another 10 objects are loaded and displayed in the table. Luckily, Parse\
    \ has prepared this method for you. Simply call the method `-(void)loadNextPage`,\
    \ and you are good to go.\n\nA single tap on a brand cell displays all products\
    \ under this brand (I will talk more about this in the next chapter).\n\nHere\
    \ is the complete implementation:\n\n```\n-(void)tableView:(UITableView *)tableView\
    \ didSelectRowAtIndexPath:(NSIndexPath *)indexPath{\n    if (indexPath.row ==\
    \ [[self objects] count]) {\n        [self loadNextPage];\n    } else {\n    \
    \    //todo\n    }\n}\n```\n\nThose are all the code parts. But there is still\
    \ some more work you need to do in the `UIStoryboard`.\n\n# Putting It All Together:\
    \ UIStoryboard\n\nFirst, you need to set the brand `UITableViewController` introduced\
    \ in [Chapter 2](#A978-1-4842-1317-9_2_Chapter.html) as your `EMABCategoryTableViewController`.\
    \ Figure [5-2](#A978-1-4842-1317-9_5_Chapter.html#Fig2) shows how to do this.\n\
    \n![A978-1-4842-1317-9_5_Fig2_HTML.jpg](A978-1-4842-1317-9_5_Fig2_HTML.jpg)\n\n\
    Figure 5-2. Set the Storyboard ID for a custom class\n\nPersonally, I also like\
    \ to use the Class name as the Storyboard ID and Restoration ID to make sure they\
    \ are unique.\n\nSecond, change `TableView Content` from Static Cells to Dynamic\
    \ Prototypes as shown in Figure [5-3](#A978-1-4842-1317-9_5_Chapter.html#Fig3).\n\
    \n![A978-1-4842-1317-9_5_Fig3_HTML.jpg](A978-1-4842-1317-9_5_Fig3_HTML.jpg)\n\n\
    Figure 5-3. Use Dynamic Prototypes for the `UITableViewCell`\n\nThen set the `TableViewCell`\
    \ Style from \"Basic\" to \"Custom,\" and an Identifier \"CategoryCell\" as shown\
    \ in Figure [5-4](#A978-1-4842-1317-9_5_Chapter.html#Fig4).\n\n![A978-1-4842-1317-9_5_Fig4_HTML.jpg](A978-1-4842-1317-9_5_Fig4_HTML.jpg)\n\
    \nFigure 5-4. Use Custom Style\n\nAlso set the class of this cell `EMABCategoryTableViewCell`,\
    \ as shown in Figure [5-5](#A978-1-4842-1317-9_5_Chapter.html#Fig5).\n\n![A978-1-4842-1317-9_5_Fig5_HTML.jpg](A978-1-4842-1317-9_5_Fig5_HTML.jpg)\n\
    \nFigure 5-5. Use `EMABCategoryTableViewCell` class\n\nNext, set the cell height\
    \ to 60, as shown in Figure [5-6](#A978-1-4842-1317-9_5_Chapter.html#Fig6).\n\n\
    ![A978-1-4842-1317-9_5_Fig6_HTML.jpg](A978-1-4842-1317-9_5_Fig6_HTML.jpg)\n\n\
    Figure 5-6. Set the Row Height\n\nFinally, set the `UIImageView` to `PFImageView`,\
    \ as shown in Figure [5-7](#A978-1-4842-1317-9_5_Chapter.html#Fig7).\n\n![A978-1-4842-1317-9_5_Fig7_HTML.jpg](A978-1-4842-1317-9_5_Fig7_HTML.jpg)\n\
    \nFigure 5-7. Use `PFImageView`\n\nNow it’s time to build and run this project."
  raw: '## Product Category Controller


    Next, you will be working on the controller.


    First, create a new class named “EMABCategoriesTableViewController” and make sure
    it is a subclass of PFQueryTableViewController. I have already introduced PFQueryTableViewController
    in [Chapter 3](#A978-1-4842-1317-9_3_Chapter.html). In this view controller, you
    create a one-to-one mapping between the EMABCategory class and the EMABCateogryUITableViewCell.
    You will also use the features such as pull-to-refresh, pagination, and showing
    and dismissing a loading activity indicator before and after any data is loaded.


    Here is the automatically generated header file:


    EMABCategoriesTableViewController.h


    `#import <UIKit/UIKit.h>`


    `#import <ParseUI/PFQueryTableViewController.h>`


    `@interface EMABCategoriesTableViewController : PFQueryTableViewController`


    `@end`


    In the .m implementation file, start by importing the necessary helper files such
    as “EMABConstants.h,” “EMABCategory.h,” and “EMABCategoryTableViewCell.h.”


    Next, implement the `-(void)awakeFromNib` method. `parseClassName`, `objectsPerPage`,
    and `pullToRefreshEnabled` are the properties of PFQueryTableViewController so
    you can just use them and set the values you want. In this case, the ParseClassName
    is defined by `kCategory`. You want to show 10 objects per page and enable pull-to-refresh.
    The activity loading indicator will be shown by default.


    `- (void)awakeFromNib {`


    `[super awakeFromNib];`


    `self.parseClassName = kCategory;`


    `self.paginationEnabled = YES;`


    `self.objectsPerPage = 10;`


    `self.pullToRefreshEnabled = YES;`


    `}`


    Keep in mind you are using Storyboard to initialize your view controller so `-(void)awaeFromNib`
    method is a good place to enable pull-to-fresh, pagination, etc. If you use a
    different way such as `-(instancetype)initWithStyle:(UITableViewStyle)style`,
    then this method is the place for you to set ParseClassName, pagination, etc.


    Next, you need to let the PFQueryTableViewController subclass know what kind of
    query you need to perform. You implement the method `-(PFQuery *)queryForTable`.
    In the EMABCategory class, you have defined a helper method called `+(PFQuery
    *)basicQuery`. Now you can just use it.


    `PFQuery *query = [EMABCategory basicQuery];`


    Or, you can just use the default implementation:


    `PFQuery *query = [PFQuery queryWithClassName:self.pasreClassName];`


    `[query orderByAscending:@"title"];`


    If you end up using the same code a few more times, implementing it in the EMABCategory
    class makes more sense.


    Next, PFQuery also has a method for you to manage cache policy: `kPFCachePolicyCacheThenNetwork`.
    This policy is quite self-explanatory. Keep in mind, when using `kPFCachePolicyCacheThenNetwork`
    as your caching policy your callback is always triggered twice. This is because
    the policy is to use the cache and then to go to the network, not to use the cache
    exclusively. There are other cache options such as `kPFCachePolicyIgnoreCache`,
    `kPFCachePolicyCacheOnly`, `kPFCachePolicyNetworkOnly`, `kPFCachePolicyCacheElseNetwork`,
    `kPFCachePolicyNetworkElseCache`, and `kPFCachePolicyCacheThenNetwork`.


    if ([self.objects count] == 0) {


    `query.cachePolicy = kPFCachePolicyCacheThenNetwork;`


    `}`


    The complete implementation of +(PFQuery *)queryForTable looks like this:


    `-(PFQuery *)queryForTable {`


    `PFQuery *query = [EMABCategory basicQuery];`


    `if ([self.objects count] == 0) {`


    `query.cachePolicy = kPFCachePolicyCacheThenNetwork;`


    `}`


    `return query;`


    `}`


    Next, implement the PFQueryTableViewController datasource method. First, you want
    to extent the default cell height, so you set the height of each cell to 60 points:


    `-(CGFloat)tableView:(UITableView *)tableView heightForRowAtIndexPath:(NSIndexPath
    *)indexPath`


    `{`


    `return 60.0;`


    `}`


    PFQueryTableViewController has overridden the standard UITableView’s `-tableView:cellForRowAtIndexPath:`
    method. Namely, `-tableView:cellForRowAtIndexPath:object:`. Traditionally, you
    need the object array. Then you use indexPath.row to get the object for each row.
    Now you have this object automatically.


    However, this override method assumes that you will give an object to each row
    and there is only one section. If you have multiple sections, this method won’t
    work automatically.


    Since you also enable pagination, and there are 10 objects on each page, each
    cell will be configured with an item. For this, you use the EMABCategoryTableViewCell`-(void)configureItem:(EMABCategory
    *)item` method.


    You also need a way to load the next page. Here you add an extra cell after 10
    objects. This cell has a title of “Load More…”. If a user taps this cell, the
    app will load another 10 objects or one more page.


    Here is the complete implementation:


    `- (EMABCategoryTableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath
    *)indexPath object:(EMABCategory *)object{`


    `EMABCategoryTableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@"CategoryCell"
    forIndexPath:indexPath];`


    `if (indexPath.row == [[self objects] count]) {`


    `cell.textLabel.text = NSLocalizedString(@"Load More…", @"");`


    `} else {`


    `[cell configureItem:object];`


    `}`


    `return cell;`


    `}`


    The last step is to handle when a user taps “Load more…” and tap other CategoryCell.
    When the “Load more…” cell is tapped, another 10 objects are loaded and displayed
    in the table. Luckily, Parse has prepared this method for you. Simply call the
    method `-(void)loadNextPage`, and you are good to go.


    A single tap on a brand cell displays all products under this brand (I will talk
    more about this in the next chapter).


    Here is the complete implementation:


    `-(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath
    *)indexPath{`


    `if (indexPath.row == [[self objects] count]) {`


    `[self loadNextPage];`


    `} else {`


    `//todo`


    `}`


    `}`


    Those are all the code parts. But there is still some more work you need to do
    in the UIStoryboard.


    ## Putting It All Together: UIStoryboard


    First, you need to set the brand UITableViewController introduced in [Chapter
    2](#A978-1-4842-1317-9_2_Chapter.html) as your “EMABCategoryTableViewController.”
    Figure [5-2](#A978-1-4842-1317-9_5_Chapter.html#Fig2) shows how to do this.


    ![A978-1-4842-1317-9_5_Fig2_HTML.jpg](A978-1-4842-1317-9_5_Fig2_HTML.jpg)


    Figure 5-2.


    Set the Storyboard ID for a custom class


    Personally, I also like to use the Class name as the Storyboard ID and Restoration
    ID to make sure they are unique.


    Second, change TableView Content from Static Cells to Dynamic Protyotypes as shown
    in Figure [5-3](#A978-1-4842-1317-9_5_Chapter.html#Fig3).


    ![A978-1-4842-1317-9_5_Fig3_HTML.jpg](A978-1-4842-1317-9_5_Fig3_HTML.jpg)


    Figure 5-3.


    Use Dynamic Prototypes for the UITableViewCell


    Then set the TableViewCell Style from “Basic” to “Custom,” and an Identifier “CategoryCell”
    as shown in Figure [5-4](#A978-1-4842-1317-9_5_Chapter.html#Fig4).


    ![A978-1-4842-1317-9_5_Fig4_HTML.jpg](A978-1-4842-1317-9_5_Fig4_HTML.jpg)


    Figure 5-4.


    Use Custom Style


    Also set the class of this cell “EMABCategoryTableViewCell,” as shown in Figure
    [5-5](#A978-1-4842-1317-9_5_Chapter.html#Fig5).


    ![A978-1-4842-1317-9_5_Fig5_HTML.jpg](A978-1-4842-1317-9_5_Fig5_HTML.jpg)


    Figure 5-5.


    Use EMABCategoryTableViewCell class


    Next, set the cell height to 60, as shown in Figure [5-6](#A978-1-4842-1317-9_5_Chapter.html#Fig6).


    ![A978-1-4842-1317-9_5_Fig6_HTML.jpg](A978-1-4842-1317-9_5_Fig6_HTML.jpg)


    Figure 5-6.


    Set the Row Height


    Finally, set the UIImageView to PFImageView, as shown in Figure [5-7](#A978-1-4842-1317-9_5_Chapter.html#Fig7).


    ![A978-1-4842-1317-9_5_Fig7_HTML.jpg](A978-1-4842-1317-9_5_Fig7_HTML.jpg)


    Figure 5-7.


    Use PFImageView


    Now it’s time to build and run this project.'
  trans: "\n# 产品类别控制器\n\n接下来，你将处理控制器部分。\n\n首先，创建一个名为 `EMABCategoriesTableViewController`\
    \ 的新类，并确保它是 `PFQueryTableViewController` 的子类。我在第 3 章中已经介绍过 `PFQueryTableViewController`。在这个视图控制器中，你将在\
    \ `EMABCategory` 类和 `EMABCateogryUITableViewCell` 之间建立一对一的映射。你还将使用诸如下拉刷新、分页以及在加载数据前后显示和隐藏加载活动指示器等特性。\n\
    \n以下是自动生成的头文件：\n\n`EMABCategoriesTableViewController.h`\n\n```\n#import <UIKit/UIKit.h>\n\
    #import <ParseUI/PFQueryTableViewController.h>\n\n@interface EMABCategoriesTableViewController\
    \ : PFQueryTableViewController\n\n@end\n```\n\n在 `.m` 实现文件中，首先导入必要的辅助文件，例如 `EMABConstants.h`、`EMABCategory.h`\
    \ 和 `EMABCategoryTableViewCell.h`。\n\n接下来，实现 `-(void)awakeFromNib` 方法。`parseClassName`、`objectsPerPage`\
    \ 和 `pullToRefreshEnabled` 是 `PFQueryTableViewController` 的属性，因此你可以直接使用它们并设置你想要的值。在本例中，`ParseClassName`\
    \ 由 `kCategory` 定义。你希望每页显示 10 个对象并启用下拉刷新。加载活动指示器将默认显示。\n\n```\n- (void)awakeFromNib\
    \ {\n    [super awakeFromNib];\n    self.parseClassName = kCategory;\n    self.paginationEnabled\
    \ = YES;\n    self.objectsPerPage = 10;\n    self.pullToRefreshEnabled = YES;\n\
    }\n```\n\n请记住，你正在使用 Storyboard 初始化你的视图控制器，因此 `-(void)awakeFromNib` 方法是启用下拉刷新、分页等功能的合适位置。如果你使用其他方式，例如\
    \ `-(instancetype)initWithStyle:(UITableViewStyle)style`，那么该方法则是你设置 `ParseClassName`、分页等属性的地方。\n\
    \n接下来，你需要让 `PFQueryTableViewController` 的子类知道需要执行哪种查询。你需要实现 `-(PFQuery *)queryForTable`\
    \ 方法。在 `EMABCategory` 类中，你已经定义了一个名为 `+(PFQuery *)basicQuery` 的辅助方法。现在你可以直接使用它。\n\
    \n```\nPFQuery *query = [EMABCategory basicQuery];\n```\n\n或者，你也可以直接使用默认实现：\n\n\
    ```\nPFQuery *query = [PFQuery queryWithClassName:self.parseClassName];\n[query\
    \ orderByAscending:@\"title\"];\n```\n\n如果你最终需要多次使用相同的代码，那么在 `EMABCategory` 类中实现它更有意义。\n\
    \n接下来，`PFQuery` 还提供一个方法来管理缓存策略：`kPFCachePolicyCacheThenNetwork`。这个策略的含义不言而喻。请记住，当使用\
    \ `kPFCachePolicyCacheThenNetwork` 作为缓存策略时，你的回调总是会触发两次。这是因为该策略是先使用缓存，然后访问网络，而不是只使用缓存。还有其他缓存选项，例如\
    \ `kPFCachePolicyIgnoreCache`、`kPFCachePolicyCacheOnly`、`kPFCachePolicyNetworkOnly`、`kPFCachePolicyCacheElseNetwork`、`kPFCachePolicyNetworkElseCache`\
    \ 和 `kPFCachePolicyCacheThenNetwork`。\n\n```\nif ([self.objects count] == 0) {\n\
    \    query.cachePolicy = kPFCachePolicyCacheThenNetwork;\n}\n```\n\n`-(PFQuery\
    \ *)queryForTable` 的完整实现如下：\n\n```\n-(PFQuery *)queryForTable {\n    PFQuery *query\
    \ = [EMABCategory basicQuery];\n    if ([self.objects count] == 0) {\n       \
    \ query.cachePolicy = kPFCachePolicyCacheThenNetwork;\n    }\n    return query;\n\
    }\n```\n\n接下来，实现 `PFQueryTableViewController` 的数据源方法。首先，你想要扩展默认的单元格高度，因此将每个单元格的高度设置为\
    \ 60 点：\n\n```\n-(CGFloat)tableView:(UITableView *)tableView heightForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    return 60.0;\n}\n```\n\n`PFQueryTableViewController` 已经重写了标准\
    \ `UITableView` 的 `-tableView:cellForRowAtIndexPath:` 方法。具体来说，是 `-tableView:cellForRowAtIndexPath:object:`\
    \ 方法。传统上，你需要对象数组。然后你使用 `indexPath.row` 来获取每一行的对象。现在，你可以自动获得这个对象。\n\n然而，这个重写方法假设你将向每一行提供一个对象，并且只有一个\
    \ section。如果你有多个 section，这个方法将无法自动工作。\n\n由于你还启用了分页，并且每页有 10 个对象，因此每个单元格都将配置一个项目。为此，你使用\
    \ `EMABCategoryTableViewCell` 的方法 `-(void)configureItem:(EMABCategory *)item`。\n\
    \n你还需要一种加载下一页的方法。这里，你在 10 个对象之后添加了一个额外的单元格。这个单元格的标题是“加载更多…”。如果用户点击此单元格，应用程序将再加载\
    \ 10 个对象或一页。\n\n以下是完整的实现：\n\n```\n- (EMABCategoryTableViewCell *)tableView:(UITableView\
    \ *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath object:(EMABCategory\
    \ *)object{\n    EMABCategoryTableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@\"\
    CategoryCell\" forIndexPath:indexPath];\n    if (indexPath.row == [[self objects]\
    \ count]) {\n        cell.textLabel.text = NSLocalizedString(@\"Load More…\",\
    \ @\"\");\n    } else {\n        [cell configureItem:object];\n    }\n    return\
    \ cell;\n}\n```\n\n最后一步是处理用户点击“加载更多…”以及其他 `CategoryCell` 的情况。当“加载更多…”单元格被点击时，另外\
    \ 10 个对象将被加载并显示在表格中。幸运的是，Parse 已经为你准备好了这个方法。只需调用 `-(void)loadNextPage` 方法即可。\n\
    \n单击品牌单元格会显示该品牌下的所有产品（我将在下一章中对此进行更详细的讨论）。\n\n以下是完整的实现：\n\n```\n-(void)tableView:(UITableView\
    \ *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath{\n    if (indexPath.row\
    \ == [[self objects] count]) {\n        [self loadNextPage];\n    } else {\n \
    \       //待办\n    }\n}\n```\n\n这些就是所有的代码部分。但是你还需要在 `UIStoryboard` 中做一些额外的工作。\n\
    \n# 整合所有内容：UIStoryboard\n\n首先，你需要将在第 2 章中介绍的品牌 `UITableViewController` 设置为你的 `EMABCategoryTableViewController`。图\
    \ 5-2 展示了如何执行此操作。\n\n![A978-1-4842-1317-9_5_Fig2_HTML.jpg](img/A978-1-4842-1317-9_5_Fig2_HTML.jpg)\n\
    \n图 5-2. 为自定义类设置 Storyboard ID\n\n就个人而言，我也喜欢使用类名作为 Storyboard ID 和 Restoration\
    \ ID，以确保它们是唯一的。\n\n其次，将 `TableView Content` 从 `Static Cells` 更改为 `Dynamic Prototypes`，如图\
    \ 5-3 所示。\n\n![A978-1-4842-1317-9_5_Fig3_HTML.jpg](img/A978-1-4842-1317-9_5_Fig3_HTML.jpg)\n\
    \n图 5-3. 为 `UITableViewCell` 使用动态原型\n\n然后，将 `TableViewCell` 的 `Style` 从“Basic”设置为“Custom”，并设置标识符“CategoryCell”，如图\
    \ 5-4 所示。\n\n![A978-1-4842-1317-9_5_Fig4_HTML.jpg](img/A978-1-4842-1317-9_5_Fig4_HTML.jpg)\n\
    \n图 5-4. 使用自定义样式\n\n同时，将此单元格的类设置为 `EMABCategoryTableViewCell`，如图 5-5 所示。\n\n![A978-1-4842-1317-9_5_Fig5_HTML.jpg](img/A978-1-4842-1317-9_5_Fig5_HTML.jpg)\n\
    \n图 5-5. 使用 `EMABCategoryTableViewCell` 类\n\n接下来，将单元格高度设置为 60，如图 5-6 所示。\n\n![A978-1-4842-1317-9_5_Fig6_HTML.jpg](img/A978-1-4842-1317-9_5_Fig6_HTML.jpg)\n\
    \n图 5-6. 设置行高\n\n最后，将 `UIImageView` 设置为 `PFImageView`，如图 5-7 所示。\n\n![A978-1-4842-1317-9_5_Fig7_HTML.jpg](img/A978-1-4842-1317-9_5_Fig7_HTML.jpg)\n\
    \n图 5-7. 使用 `PFImageView`\n\n现在是时候构建并运行这个项目了。\n"
- fmt: "## Add Sample Data\n\nIf you followed along so far, the project will run just\
    \ fine; but there is nothing to show. You need to add some sample data to the\
    \ Parse back end first.\n\nGo to Parse.com, log in, and browse to the \"Core\"\
    \ page of the project. Then click \"Add Class\" and give it a name `Category.`\
    \ Click \"+Col\" and, for the first column, select the String type and set its\
    \ value to `title,` then click \"Create Column.\" Click \"+Col\" again, this time\
    \ select File type and set its value to `image`, then click \"Create Column.\"\
    \ Next, add some sample data. For this sample, I have prepared seven (7) brands,\
    \ namely, Original, Nade Skincare, Lencome, Fresh Skin, Aven, Diar, and Esta Louder.\
    \ You can also use any pictures for those brands for demo purposes. Or just use\
    \ the images I have included with the [Chapter 5](#A978-1-4842-1317-9_5_Chapter.html)\
    \ source code. Click the \"+Row\" button. Parse creates an empty row with `undefined`\
    \ placeholder for each column. For this example, you only need to care about the\
    \ `image` and `title` columns. Tap the `(undefined)` area in `Image` column. Parse\
    \ asks you to upload an image. Upload an image. And set a title such as `Origins.`\
    \ When you press \"Enter,\" Parse will automatically generate an `objectId`, `createdAt`,\
    \ `updatedAt` and `ACL` for you. (I will cover `ACL` in [Chapter 18](#A978-1-4842-1317-9_18_Chapter.html).)\
    \ Repeat steps 5 six times to add six more rows.\n\nNow when you return to your\
    \ Xcode project or open the app in the simulator or your device, you should see\
    \ the seven brands you just added when you build and run your project.\n\n## Summary\n\
    \nIn this chapter, I covered how to implement the product brands feature. I introduced\
    \ the `EMABCategory` model, `EMABCategoryTableViewCell` view, and the `EMABCategoriesTableViewController`\
    \ controller. I also demonstrated how to connect the view, view controller with\
    \ `UIStoryboard`. Finally, I talked about how to add sample data into Parse so\
    \ your app can load data dynamically.\n\n# 6. The Products Screen\n\nElectronic\
    \ supplementary material The online version of this chapter (doi:[10.1007/978-1-4842-1317-9_6](http://dx.doi.org/10.1007/978-1-4842-1317-9_6))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    In this chapter, you will learn how to implement the Products screen. More specifically,\
    \ you will learn how to display products and let users search your product list\
    \ and filter products based on certain criteria. The first thing, however, is\
    \ to create a product model.\n\n## The Product Model\n\nFollowing the pattern\
    \ introduced in earlier chapters, specify the model name in the `EMABConstants`\
    \ helper class:\n\n`NSString *const kProduct= @\"Product\";`\n\nNext, create a\
    \ new `PFObject` subclass, and name it `EMABProduct.` If you look at a typical\
    \ makeup product, you might need a lot of properties to describe a product. For\
    \ example, `EMABProduct` model has the following properties: `name`, `unit price`,\
    \ `price unit`, `detail`, `thumbnail` image, and full-size image. You also have\
    \ to build a one-to-many relationship between product category and products so\
    \ another important property is `brand`.\n\nFor this tutorial, use the following\
    \ properties: `name`, `detail` (don't use `description`), `price`, `priceUnit`,\
    \ `thumbnail` (for performance reason), and `fullsizeImage`; we have a pointer\
    \ `brand` to `EMABCategory`. You will build a one-to-many relationship between\
    \ `EMABCategory` and `EMABProduct`. One brand can have many products under this\
    \ brand. Parse provides a few options and you can just directly use a pointer.\n\
    \n`EMABProduct.h`\n\n```\n#import <Parse/Parse.h>\n\n@class EMABCategory;\n\n\
    @interface EMABProduct : PFObject<PFSubclassing>\n\n@property (nonatomic, copy)\
    \ NSString *name;\n@property (nonatomic, copy) NSString *detail;\n@property (nonatomic,\
    \ assign) float unitPrice;\n@property (nonatomic, copy) NSString *priceUnit;\n\
    @property (nonatomic, strong) PFFile *thumbnail;\n@property (nonatomic, strong)\
    \ PFFile *fullsizeImage;\n@property (nonatomic, strong) EMABCategory *brand;\n\
    ```\n\nThe last thing you need to do is to define a custom static method to query\
    \ all products under one brand:\n\n`+(PFQuery *)queryForCategory:(EMABCategory\
    \ *)brand;`\n\nWhen the properties of the `priceUnit` and the `unitPrice` are\
    \ already defined (as I have done here), it's common to display a product price\
    \ (e.g., `$3.50/ea`). You have to keep using the following format method when\
    \ presenting the price on a `UILabel`:\n\n`[NSString stringWithFormat:@%@/%.2f,\
    \ product.unitPrice, product.priceUnit];`\n\nTo make things easier for yourself,\
    \ create a helper method:\n\n`-(NSString *)friendlyPrice;`\n\nThis suffices for\
    \ now. You can add more helper methods or properties later if necessary. Next,\
    \ continue with the implementation of the `EMABProduct` class.\n\nBesides importing\
    \ the necessary header files and the dynamic properties declaration, the `+(NSString\
    \ *)parseClassName` will be:\n\n```\n+(NSString *)parseClassName\n{\n    return\
    \ kProduct;\n}\n```\n\nThe `+(PFQuery *)basicQuery` method looks like this; here\
    \ you will also sort all products by product name, as you have done with the brand.\n\
    \n```\n+(PFQuery *)basicQuery {\n    PFQuery *query = [PFQuery queryWithClassName:[self\
    \ parseClassName]];\n    [query orderByAscending:@\"name\"];\n    return query;\n\
    }\n```\n\nIf you want to sort products based on when each one is added to the\
    \ Parse data store, you can use the following:\n\n`[query orderByDescending:@\"\
    createdAt\"];`\n\nYour next query helper method is to query all products under\
    \ one brand. The implementation might look like this:\n\n```\n+(PFQuery *)queryForCategory:(EMABCategory\
    \ *)brand{\n    PFQuery  *query = [self basicQuery];\n    [query whereKey:@\"\
    brand\" equalTo:brand];\n    return query;\n}\n```\n\nIn this query method, the\
    \ input parameter is an `EMABCategory` object. Make sure the `brand` property\
    \ in `EMABProduct` is equal to this object.\n\n`[query whereKey:@\"brand\" equalTo:brand];`\n\
    \nOn the other hand, the `+(PFQuery *)basicQuery` method defines how you want\
    \ to sort query results. It helps you create all kinds of query helper methods\
    \ without having to repeat writing the same code over and over again.\n\nThe last\
    \ method is `-(NSString *)friendlyPrice`:\n\n```\n-(NSString *)friendlyPrice{\n\
    \    return [NSString localizedStringWithFormat:@\"$ %.2f/%@\", self.unitPrice,\
    \ self.priceUnit];\n}\n```"
  raw: '## Add Sample Data


    If you followed along so far, the project will run just fine; but there is nothing
    to show. You need to add some sample data to the Parse back end first.


    Go to Parse.com, log in, and browse to the “Core” page of the project. Then click
    “Add Class” and give it a name “Category.”   Click “+Col” and, for the first column,
    select the String type and set its value to “title,” then click “Create Column.”
      Click “+Col” again, this time select File type and set its value to image, then
    click “Create Column.”   Next, add some sample data. For this sample, I have prepared
    seven (7) brands, namely, Original, Nade Skincare, Lencome, Fresh Skin, Aven,
    Diar, and Esta Louder. You can also use any pictures for those brands for demo
    purposes. Or just use the images I have included with the [Chapter 5](#A978-1-4842-1317-9_5_Chapter.html)
    source code.   Click the “+Row” button. Parse creates an empty row with “undefined”
    placeholder for each column. For this example, you only need to care about the
    “image” and “title” columns. Tap the “(undefined)” area in “Image” column. Parse
    asks you to upload an image. Upload an image. And set a title such as “Origins.”
    When you press “Enter,” Parse will automatically generate an objectId, createdAt,
    updatedAt and ACL for you. (I will cover ACL in [Chapter 18](#A978-1-4842-1317-9_18_Chapter.html).)
      Repeat steps 5 six times to add six more rows.  


    Now when you return to your Xcode project or open the app in the simulator or
    your device, you should see the seven brands you just added when you build and
    run your project.


    ## Summary


    In this chapter, I covered how to implement the product brands feature. I introduced
    the EMABCategory model, EMABCategoryTableViewCell view, and the EMABCategoriesTableViewController
    controller. I also demonstrated how to connect the view, view controller with
    UIStoryboard. Finally, I talked about how to add sample data into Parse so your
    app can load data dynamically.


    # 6. The Products Screen


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1317-9_​6](http://dx.doi.org/10.1007/978-1-4842-1317-9_6))
    contains supplementary material, which is available to authorized users.


    In this chapter, you will learn how to implement the Products screen. More specifically,
    you will learn how to display products and let users search your product list
    and filter products based on certain criteria. The first thing, however, is to
    create a product model.


    ## The Product Model


    Following the pattern introduced in earlier chapters, specify the model name in
    the EMABConstants helper class:


    `NSString *const kProduct= @"Product";`


    Next, create a new PFObject subclass, and name it “EMABProduct.” If you look at
    a typical makeup product, you might need a lot of properties to describe a product.
    For example, EMABProduct model has the following properties: name, unit price,
    price unit, detail, thumbnail image, and full-size image. You also have to build
    a one-to-many relationship between product category and products so another important
    property is brand.


    For this tutorial, use the following properties: name, detail (don’t use description),
    price, priceUnit, thumbnail (for performance reason), and fullsizeImage; we have
    a pointer “brand” to EMABCategory. You will build a one-to-many relationship between
    EMABCategory and EMABProduct. One brand can have many products under this brand.
    Parse provides a few options and you can just directly use a pointer.


    EMABProduct.h


    `#import <Parse/Parse.h>`


    `@class EMABCategory;`


    `@interface EMABProduct : PFObject<PFSubclassing>`


    `@property (nonatomic, copy) NSString *name;`


    `@property (nonatomic, copy) NSString *detail;`


    `@property (nonatomic, assign) float unitPrice;`


    `@property (nonatomic, copy) NSString *priceUnit;`


    `@property (nonatomic, strong) PFFile *thumbnail;`


    `@property (nonatomic, strong) PFFile *fullsizeImage;`


    `@property (nonatomic, strong) EMABCategory *brand;`


    The last thing you need to do is to define a custom static method to query all
    products under one brand:


    `+(PFQuery *)queryForCategory:(EMABCategory *)brand;`


    When the properties of the priceUnit and the unitPrice are already defined (as
    I have done here), it’s common to display a product price (e.g., $3.50/ea). You
    have to keep using the following format method when presenting the price on a
    UILabel:


    `[NSString stringWithFormat:@%@/%.2f, product.unitPrice, product.priceUnit];`


    To make things easier for yourself, create a helper method:


    `-(NSString *)friendlyPrice;`


    This suffices for now. You can add more helper methods or properties later if
    necessary. Next, continue with the implementation of the EMABProduct class.


    Besides importing the necessary header files and the dynamic properties declaration,
    the `+(NSString *)parseClassName` will be:


    `+(NSString *)parseClassName`


    `{`


        `return kProduct;`


    `}`


    The `+(PFQuery *)basicQuery` method looks like this; here you will also sort all
    products by product name, as you have done with the brand.


    `+(PFQuery *)basicQuery {`


        `PFQuery *query = [PFQuery queryWithClassName:[self parseClassName]];`


        `[query orderByAscending:@"name"];`


        `return query;`


    `}`


    If you want to sort products based on when each one is added to the Parse data
    store, you can use the following:


    `[query orderByDescending:@"createdAt"];`


    Your next query helper method is to query all products under one brand. The implementation
    might look like this:


    `+(PFQuery *)queryForCategory:(EMABCategory *)brand{`


        `PFQuery  *query = [self basicQuery];`


        `[query whereKey:@"brand" equalTo:brand];`


        `return query;`


    `}`


    In this query method, the input parameter is an EMABCategory object. Make sure
    the brand property in EMABProduct is equal to this object.


    `[query whereKey:@"brand" equalTo:brand];`


    On the other hand, the +(PFQuery *)basicQuery method defines how you want to sort
    query results. It helps you create all kinds of query helper methods without `having
    to repeat` writing `the` same code over and over again.


    `The last method is -(NSString *)` `friendlyPrice` `:`


    `-(NSString *)friendlyPrice{`


        `return [NSString localizedStringWithFormat:@"$ %.2f/%@", self.unitPrice,
    self.priceUnit];`


    `}`'
  trans: "\n## 添加样本数据\n\n如果按照目前的操作进行下去，项目可以正常运行；但界面上仍无内容可显示。你需要先向 Parse 后端添加一些样本数据。\n\
    \n前往 Parse.com，登录后浏览至项目的 \"Core\" 页面。然后点击 \"Add Class\" 并将其命名为 `Category`。点击 \"\
    +Col\"，为第一个列选择 String 类型，将其值设为 `title`，然后点击 \"Create Column\"。再次点击 \"+Col\"，这次选择\
    \ File 类型，将值设为 `image`，然后点击 \"Create Column\"。接着，添加一些样本数据。对于这个示例，我准备了七个品牌，分别是：Original、Nade\
    \ Skincare、Lencome、Fresh Skin、Aven、Diar 和 Esta Louder。你也可以使用任意图片作为这些品牌的演示用途。或者直接使用我包含在第\
    \ 5 章源代码中的图片。点击 \"+Row\" 按钮。Parse 会创建一个空行，每一列都带有 `undefined` 占位符。对于本例，你只需关注 `image`\
    \ 和 `title` 列。点击 `Image` 列中的 `(undefined)` 区域，Parse 会要求你上传一张图片。上传图片后，设置一个标题，例如\
    \ `Origins`。当你按下 \"Enter\" 键时，Parse 会自动为你生成 `objectId`、`createdAt`、`updatedAt`\
    \ 和 `ACL`（我将在第 18 章中介绍 `ACL`）。重复步骤 5 六次，以添加另外六行。\n\n现在，当你返回 Xcode 项目，或在模拟器/真机上打开应用时，构建并运行项目后，你应该能看到刚刚添加的七个品牌。\n\
    \n## 小结\n\n在本章中，我介绍了如何实现产品品牌功能。我引入了 `EMABCategory` 模型、`EMABCategoryTableViewCell`\
    \ 视图以及 `EMABCategoriesTableViewController` 控制器。我还演示了如何通过 `UIStoryboard` 连接视图和视图控制器。最后，我讲解了如何向\
    \ Parse 添加样本数据，以便应用能够动态加载数据。\n\n# 6. 产品界面\n\n电子补充材料 本章在线版本（doi:[10.1007/978-1-4842-1317-9_6](http://dx.doi.org/10.1007/978-1-4842-1317-9_6)）包含补充材料，仅供授权用户使用。\n\
    \n本章你将学习如何实现产品界面。更具体地说，你将学习如何展示产品、让用户搜索产品列表以及根据特定条件筛选产品。但首先，需要创建一个产品模型。\n\n##\
    \ 产品模型\n\n沿用此前章节引入的模式，在 `EMABConstants` 辅助类中指定模型名称：\n\n`NSString *const kProduct=\
    \ @\"Product\";`\n\n接下来，创建一个新的 `PFObject` 子类，并将其命名为 `EMABProduct`。观察一款典型的美妆产品，你可能需要很多属性来描述它。例如，`EMABProduct`\
    \ 模型包含以下属性：`name`（名称）、`unit price`（单价）、`price unit`（价格单位）、`detail`（详情）、`thumbnail`（缩略图）以及完整尺寸的图片。此外，还需要在产品类别和产品之间建立一对多关系，因此另一个重要属性是\
    \ `brand`（品牌）。\n\n本教程使用以下属性：`name`、`detail`（不要使用 `description`）、`price`、`priceUnit`、`thumbnail`（出于性能考虑）和\
    \ `fullsizeImage`；同时有一个指向 `EMABCategory` 的指针 `brand`。你将在 `EMABCategory` 和 `EMABProduct`\
    \ 之间建立一对多关系。一个品牌下可以拥有多款产品。Parse 提供了多种选项，你可以直接使用指针。\n\n`EMABProduct.h`\n\n```\n\
    #import <Parse/Parse.h>\n\n@class EMABCategory;\n\n@interface EMABProduct : PFObject<PFSubclassing>\n\
    \n@property (nonatomic, copy) NSString *name;\n@property (nonatomic, copy) NSString\
    \ *detail;\n@property (nonatomic, assign) float unitPrice;\n@property (nonatomic,\
    \ copy) NSString *priceUnit;\n@property (nonatomic, strong) PFFile *thumbnail;\n\
    @property (nonatomic, strong) PFFile *fullsizeImage;\n@property (nonatomic, strong)\
    \ EMABCategory *brand;\n```\n\n最后需要做的是定义一个自定义静态方法，用于查询某个品牌下的所有产品：\n\n`+(PFQuery\
    \ *)queryForCategory:(EMABCategory *)brand;`\n\n当 `priceUnit` 和 `unitPrice` 属性已经定义（如我此处所做）时，通常需要显示产品价格（例如\
    \ `$3.50/ea`）。在 `UILabel` 上呈现价格时，必须持续使用以下格式化方法：\n\n`[NSString stringWithFormat:@%@/%.2f,\
    \ product.unitPrice, product.priceUnit];`\n\n为了方便起见，创建一个辅助方法：\n\n`-(NSString *)friendlyPrice;`\n\
    \n目前这样已经足够。后续如有需要，你可以添加更多辅助方法或属性。接下来，继续实现 `EMABProduct` 类。\n\n除了导入必要的头文件和动态属性声明外，`+(NSString\
    \ *)parseClassName` 方法如下：\n\n```\n+(NSString *)parseClassName\n{\n    return kProduct;\n\
    }\n```\n\n`+(PFQuery *)basicQuery` 方法如下所示；这里你也会像处理品牌一样，按产品名称对所有产品进行排序。\n\n```\n\
    +(PFQuery *)basicQuery {\n    PFQuery *query = [PFQuery queryWithClassName:[self\
    \ parseClassName]];\n    [query orderByAscending:@\"name\"];\n    return query;\n\
    }\n```\n\n如果你想根据产品添加到 Parse 数据存储的时间进行排序，可以使用以下代码：\n\n`[query orderByDescending:@\"\
    createdAt\"];`\n\n下一个查询辅助方法是查询某品牌下的所有产品。其实现可能如下：\n\n```\n+(PFQuery *)queryForCategory:(EMABCategory\
    \ *)brand{\n    PFQuery  *query = [self basicQuery];\n    [query whereKey:@\"\
    brand\" equalTo:brand];\n    return query;\n}\n```\n\n在这个查询方法中，输入参数是一个 `EMABCategory`\
    \ 对象。确保 `EMABProduct` 中的 `brand` 属性与该对象相等。\n\n`[query whereKey:@\"brand\" equalTo:brand];`\n\
    \n另一方面，`+(PFQuery *)basicQuery` 方法定义了如何对查询结果进行排序。它帮助你创建各种查询辅助方法，而无需重复编写相同的代码。\n\
    \n最后一个方法是 `-(NSString *)friendlyPrice`：\n\n```\n-(NSString *)friendlyPrice{\n\
    \    return [NSString localizedStringWithFormat:@\"$ %.2f/%@\", self.unitPrice,\
    \ self.priceUnit];\n}\n```\n"
- fmt: "### The Product View\n\nYou will use a `UITableView` to display the product\
    \ list. The key view for a `UITableView` is its cell. In Xcode, create a `PFTableViewCell`\
    \ subclass and name it `EMABProductTableViewCell`.\n\nIn the header file, add\
    \ a helper method:\n\n`-(void)configureItem:(EMABProduct *)product;`\n\nto connect\
    \ the `EMABProduct` model and this view. Here is the complete header file:\n\n\
    `EMABProductTableViewCell`\n\n```\n#import \"PFTableViewCell.h\"\n\n@class EMABProduct;\n\
    \n@interface EMABProductTableViewCell : PFTableViewCell\n\n-(void)configureItem:(EMABProduct\
    \ *)product;\n\n@end\n```\n\nFigure [6-1](#A978-1-4842-1317-9_6_Chapter.html#Fig1)\
    \ shows what the product cell looks like.\n\n![A978-1-4842-1317-9_6_Fig1_HTML.gif](A978-1-4842-1317-9_6_Fig1_HTML.gif)\n\
    \n**Figure 6-1.** The Product TableView cell\n\nThis product cell consists of\
    \ three UI elements: a `UILabel` to show the product name, a `UILabel` to show\
    \ the product price, and a `PFImage` to show the product thumbnail.\n\nAgain,\
    \ use `EMABProductTableViewCell` category to declare the properties:\n\n```\n\
    @interface EMABProductTableViewCell()\n\n@property (nonatomic, weak) IBOutlet\
    \ UILabel *nameLabel;\n@property (nonatomic, weak) IBOutlet UILabel *priceLabel;\n\
    @property (nonatomic, weak) IBOutlet PFImageView *thumbnailImageView;\n\n@end\n\
    ```\n\nIn the `EMABProductTableViewCell` cell, there is only one method `-(void)configureItem:(EMABProduct*)\
    \ product` you need to implement.\n\nAt this point, your `EMABProduct` has the\
    \ properties of `name`, `unitPrice`, `priceUnit`, and `thumbnail`; all you need\
    \ to do is to assign the value of a product object to the `EMABProductTableViewCell`\
    \ UI properties. `EMABProduct` has a helper method to generate a price with unit;\
    \ you can use it as the text of `priceLabel`. To display the product’s thumbnail,\
    \ use the `file` of `thumbnailImageView`, and call the `loadInBackground`. The\
    \ following code shows the complete implementation.\n\nAs discussed in [Chapter\
    \ 5](#A978-1-4842-1317-9_5_Chapter.html), be sure to set `thumbnailImageView`\
    \ to `nil` before you set its `file` to be the product’s thumbnail. This ensures\
    \ that `ImageView` will not show the old image before it displays the new image\
    \ due to the `UITableViewCell` reuse nature. This is not the only way you can\
    \ achieve this goal. For example, use `-(void)prepareForUse` method in `UITableViewCell`\
    \ to handle this case.\n\n```\n-(void)prepareForReuse{\n    [super prepareForReuse];\n\
    \    self.nameLabel.text = @\"\";\n    self.priceLabel.text = @\"\";\n    self.thumbnailImageView.image\
    \ = nil;\n}\n\n-(void)configureItem:(EMABProduct *)product{\n    self.nameLabel.text\
    \ = product.name;\n    self.priceLabel.text = [product friendlyPrice];\n    self.thumbnailImageView.image\
    \ = nil;\n    if (product.thumbnail) {\n        self.thumbnailImageView.file =\
    \ product.thumbnail;\n        [self.thumbnailImageView loadInBackground];\n  \
    \  } else\n        self.thumbnailImageView.image = [UIImage imageNamed:@\"default_product_thumbnail\"\
    ];\n}\n```\n\nIf there is no thumbnail file in the `EMABProduct` object, use a\
    \ default image that comes with the project.\n\n### The Product Controller\n\n\
    You finished the view part. Now you can move to building the controller. In Xcode,\
    \ create a new `PFQueryTableViewController` subclass `EMABProductsTableViewController`.\n\
    \nIn the generated header file, declare a `EMABCategory` property. When a user\
    \ selects a brand, show the product’s view controller. In this view controller,\
    \ you create a product query based on a brand. Use this `brand` property to connect\
    \ a brand table view controller and products table view controller.\n\n`@property\
    \ (nonatomic, strong) EMABCategory *brand;`\n\nHere is the complete `EMABProductsTableViewController`\
    \ header file:\n\n`EMABProductsTableViewController.h`\n\n```\n#import <UIKit/UIKit.h>\n\
    #import <ParseUI/PFQueryTableViewController.h>\n\n@class EMABCategory;\n\n@interface\
    \ EMABProductsTableViewController : PFQueryTableViewController\n\n@property (nonatomic,\
    \ strong) EMABCategory *brand;\n\n@end\n```\n\nIn the implementation file, you\
    \ need to have a brand setter method:\n\n```\n-(void)setBrand:(EMABCategory *)brand\n\
    {\n    if (_brand != brand) {\n        _brand = brand;\n    }\n}\n```\n\nThe `–(void)awakeFromNib`\
    \ method will look like this:\n\n```\n- (void)awakeFromNib {\n    [super awakeFromNib];\n\
    \    self.parseClassName = kProduct;\n    self.objectsPerPage = 20;\n    self.paginationEnabled\
    \ = YES;\n    self.pullToRefreshEnabled = YES;\n}\n```\n\nAlso, the `–(PFQuery\
    \ *)queryForTable` method needs to take `brand` property into account:\n\n```\n\
    - (PFQuery *)queryForTable {\n    PFQuery *query = [EMABProduct queryForCategory:self.brand];\n\
    \    if ([self.objects count] == 0) {\n        query.cachePolicy = kPFCachePolicyCacheThenNetwork;\n\
    \    }\n    return query;\n}\n```\n\nNext, customize the `UITableView` Datasource;\
    \ in this case, set the cell height to 80.0 point:\n\n```\n-(CGFloat)tableView:(UITableView\
    \ *)tableView heightForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    return\
    \ 80.0;\n}\n```\n\nIn the same way, use the `PFQueryTableViewController` custom\
    \ method `–tableView:cellForRowAtIndexPath:` to customize each cell based on given\
    \ `EMABProduct` object. Since we load 20 objects each page, we add “Load more…”\
    \ text on cell 21. The following code shows a complete implementation of the method.\
    \ This method will return an instance of `EMABProductTableViewCell`. You also\
    \ use the `–(void)configureItem:(EMABProduct *)object` method to connect a product\
    \ object and its view.\n\n```\n- (EMABProductTableViewCell *)tableView:(UITableView\
    \ *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath object:(EMABProduct\
    \ *)object{\n    EMABProductTableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@\"\
    ProductCell\" forIndexPath:indexPath];\n    if (indexPath.row == [[self objects]\
    \ count]) {\n        cell.textLabel.text = NSLocalizedString(@\"Load More…\",\
    \ @\"\");\n    } else {\n        [cell configureItem:object];\n    }\n    return\
    \ cell;\n}\n```\n\nThe last method handles what happens when a user taps one of\
    \ the cells. When the user taps a project cell, the app is supposed to display\
    \ a product detail page. Since I have not discussed the product detail page yet,\
    \ insert a comment (`//todo`) placeholder for now. When a user taps the “Load\
    \ more…” cell, the next 20 products are loaded. Here is the complete implementation:\n\
    \n```\n-(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
    \ *)indexPath{\n    if (indexPath.row == [[self objects] count]) {\n        [self\
    \ loadNextPage];\n    } else {\n        //todo\n    }\n}\n\n@end\n```\n\nYou are\
    \ almost ready to run the app in a simulator or on your device. Only one more\
    \ implementation in `EMABCategoriesTableViewController` is missing. After a user\
    \ taps a brand cell, the Products table view controller should be loaded. Go to\
    \ `EMABCategoriesTableViewController.m` and add the following code:\n\n```\n-(void)tableView:(UITableView\
    \ *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath{\n    if (indexPath.row\
    \ == [[self objects] count]) {\n        [self loadNextPage];\n    } else {\n \
    \       EMABProductsTableViewController *viewController = [self.storyboard instantiateViewControllerWithIdentifier:@\"\
    EMABProductsTableViewController\"];\n        NSIndexPath  *indexPath = [self.tableView\
    \ indexPathForSelectedRow];\n        [viewController setBrand:self.objects[indexPath.row]];\n\
    \        [self.navigationController pushViewController:viewController];\n    }\n\
    }\n```\n\nNow you can build and run your project, to make sure there is no error."
