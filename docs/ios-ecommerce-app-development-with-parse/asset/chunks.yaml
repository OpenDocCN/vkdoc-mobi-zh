  trans: "\n### 商店\n\n**Shop 导航控制器**的根视图控制器是 **Shop 表格视图控制器**。你将使用该控制器来展示美容产品类别。\n\
    \n在本例中，将单元格数量设置为三个（参见图 2-5）。对于每个单元格，使用 `UITableViewCell` 的 `Basic`（基本）`Style`（样式）。这意味着每个单元格只会有一个标题标签。这三个标签的文本分别为“沐浴与身体护理”、“彩妆”和“护肤”，如图\
    \ 2-6 所示。\n\n![A978-1-4842-1317-9_2_Fig6_HTML.jpg](img/A978-1-4842-1317-9_2_Fig6_HTML.jpg)\
    \  \n*图 2-6. Shop 表格视图控制器的部分用户界面*\n\n![A978-1-4842-1317-9_2_Fig5_HTML.jpg](img/A978-1-4842-1317-9_2_Fig5_HTML.jpg)\
    \  \n*图 2-5. 为 UITableView 设置三个静态行*\n\n该示例将在每个产品类别下显示产品列表，因此你需要向 `UIStoryboard`\
    \ 中添加另一个 `UITableViewController`。将其标识符设置为 `ProductsTableViewController`，标题设置为\
    \ `Products`（产品），如图 2-7 所示。\n\n![A978-1-4842-1317-9_2_Fig7_HTML.jpg](img/A978-1-4842-1317-9_2_Fig7_HTML.jpg)\
    \  \n*图 2-7. 为 UITableViewController 设置标识符*\n\n接下来，你需要将 `ShopTableViewController`\
    \ 中的“沐浴与身体护理”单元格连接到 `ProductsTableViewController`。按住 `Control` 键，在单元格和目标视图控制器之间拖放鼠标光标，以连接这两个控制器。\n\
    \n在 iPhone 模拟器上构建并运行项目。当你点击应用首页中的“沐浴与身体护理”单元格时，你应该会看到一个标题为“Products”（产品）的空表格，如图\
    \ 2-8 所示。\n\n![A978-1-4842-1317-9_2_Fig8_HTML.jpg](img/A978-1-4842-1317-9_2_Fig8_HTML.jpg)\
    \  \n*图 2-8. Products UITableViewController 的用户界面*\n\n接下来，你将处理 `Products` `UITableViewController`。该视图控制器将显示产品信息，例如产品名称和单价。你还可以为其添加搜索和过滤功能。\n\
    \n对于每个单元格，使用 `Subtitle`（副标题）样式，如图 2-9 所示，这意味着在主文本标签下方会有一个副标题标签。将“Skin So Soft\
    \ Originals 5-piece Pampering Set”作为主文本标签，并将“$10.99”作为副标题标签的内容。\n\n![A978-1-4842-1317-9_2_Fig9_HTML.jpg](img/A978-1-4842-1317-9_2_Fig9_HTML.jpg)\
    \  \n*图 2-9. 为 UITableViewCell 使用“副标题”样式*\n\n将一个 `UISearchBar` 拖拽到 `ProductsTableViewController`，并将其占位符文本设置为“产品名称”。见图\
    \ 2-10。这向用户提示，他们输入的搜索词将仅用于搜索产品名称。\n\n![A978-1-4842-1317-9_2_Fig10_HTML.jpg](img/A978-1-4842-1317-9_2_Fig10_HTML.jpg)\
    \  \n*图 2-10. 向 UITableView 添加 UISearchBar*\n\n在“Beauty & Me”示例应用中，用户可以根据价格范围过滤产品。向\
    \ `Products` `TableViewController` 添加一个 `UIBarButtonItem`，并将其标题更改为“过滤”。添加一个新的\
    \ `UIViewController`，将其标识符设置为“FilterViewController”，标题设置为“价格过滤”。将 `Filter` `UIBarButtonItem`\
    \ 连接到新的 `FilterViewController`。以模态方式呈现视图控制器能提供更好的用户体验。你还将在该视图控制器的左侧添加一个系统 `Cancel`（取消）`UIBarButtonItem`，在右侧添加一个系统\
    \ `Done`（完成）`UIBarButtonItem`。\n\n为了让用户快速更改价格范围，请使用两个 `UISlider` 控件：一个用于设置最低价格；另一个用于设置最高价格。你还需要两个\
    \ `UILabel` 控件来显示当前最低 `UISlider` 的值和当前最高 `UISlider` 的值。添加几个其他 `UILabel` 来告知用户可以调节哪些范围，如图\
    \ 2-11 所示。\n\n![A978-1-4842-1317-9_2_Fig11_HTML.jpg](img/A978-1-4842-1317-9_2_Fig11_HTML.jpg)\
    \  \n*图 2-11. FilterViewController 的用户界面*\n\n当用户点击某个产品单元格时，会显示产品的详细信息，如图 2-12\
    \ 所示。向 `UIStoryboard` 中添加一个新的标识符为“ProductDetailViewController”的 `UIViewController`，并将\
    \ `ProductsTableViewController` 上的任意单元格连接到这个新的视图控制器。`ProductDetailViewController`\
    \ 的标题应为所选的产品名称，并且需要根据用户的选择进行更改。目前，我们先将“Skin So Soft Original 5-piece Pampering\
    \ Set”设为其标题。\n\n![A978-1-4842-1317-9_2_Fig12_HTML.jpg](img/A978-1-4842-1317-9_2_Fig12_HTML.jpg)\
    \  \n*图 2-12. ProductDetailViewController 的用户界面*\n\n产品详情视图控制器将显示产品的全尺寸图像、产品名称、价格和描述；你还需要一个按钮，让用户可以将产品添加到购物袋中。最后，你希望用户能够将产品添加到收藏列表，因此再添加一个标题为“收藏”的按钮。\n\
    \n再次构建项目并在模拟器上运行。尽管你尚未添加真正的搜索、过滤、加入购物袋和收藏功能，但它仍能让你对应用的最终样貌有所了解。最重要的是，你可以在此基础上进一步完善用户界面的设计。\n\
    \n图 2-13 展示了“商店”功能的所有 `UIViewControllers`。\n\n![A978-1-4842-1317-9_2_Fig13_HTML.gif](img/A978-1-4842-1317-9_2_Fig13_HTML.gif)\
    \  \n*图 2-13. 商店中使用的视图控制器*\n"
- fmt: '### My Account


    The root view controller, `MyAccountTableViewController`, is the place to have
    all users’ activities, such as the shipping and payment address, the order history,
    and payment methods. We also use this place to show information about the app,
    privacy policy, contact information, and app version – just like the Apple Store
    iPhone app.


    For the `MyAccountTableViewController`, let make its `UITableView` the Grouped
    Style, and set three sections. For each cell, we set it as Static and Basic style.
    Figure [2-14](#A978-1-4842-1317-9_2_Chapter.html#Fig14) illustrates what the view
    controller looks like.


    ![A978-1-4842-1317-9_2_Fig14_HTML.jpg](A978-1-4842-1317-9_2_Fig14_HTML.jpg)


    Figure 2-14. Practical user interface of `MyAccountTableViewController`


    The “Sign Out” cell is to log the user out. When the cell is tapped, a screen
    is displayed to ask the user to log in again. This will involve some programming
    so we will cover it later.


    First, I will focus on prototyping in the first “Account” section.


    Add another `UITableViewController` to the main `UIStoryboard`, use `UserAddressTableViewController`
    as its identifier, and use “Shipping Address” as its title, as in Figure [2-15](#A978-1-4842-1317-9_2_Chapter.html#Fig15).


    ![A978-1-4842-1317-9_2_Fig15_HTML.jpg](A978-1-4842-1317-9_2_Fig15_HTML.jpg)


    Figure 2-15. This is part of the user interface of `UserAddressTableViewController`


    This time, customize the `UserAddressTableViewController`’s `UITableViewCell`
    a bit. Ideally, users should be able to edit their shipping address information.
    For each cell, use a `UILabel` to tell what the cell is about, and use a `UITextField`
    to take the user’s input. On the other hand, a better user experience is to make
    the `UITextField` uneditable by default if we know the user has complete address
    information. Use an Edit system `UIBarButtonItem` to ask the user to tap the button
    to edit one’s information to avoid editing this information by mistake.


    Connect the first cell of the first section on `MyAccountTableViewController`
    to the new `UserAddressTableViewController`.


    Build and run the project; then we should be able to play with the new features.


    Next, let’s work on the payment methods UI. You technically can’t store a user’s
    credit card number or CVC numbers, but you can store a credit card’s type such
    as Visa, Master Card, or American Express; the last four digits; and expiration
    month and year. Usually a user adds a few credit cards into his account. So you
    want to use a `UITableViewController` to show all cards linked to the account.


    Add a new `UITableViewController` to your main `UIStoryboard`, and name it `UserPaymentMethodsTableViewController`.
    For the `UITableView`, make it Plain style and Static Cells as its Content. You
    will need one section and two cells.


    Set each cell as “Subtitle Style.” For the first cell, set the content for its
    `TextLabel`: Visa XXXX-XXXX-XXXX-4242, 04/20 as the subtitle text; use MasterCard
    XXXX-XXXX-XXXX-XXXX-4444 and 05/18 for the second cell, as shown in Figure [2-16](#A978-1-4842-1317-9_2_Chapter.html#Fig16).


    ![A978-1-4842-1317-9_2_Fig16_HTML.jpg](A978-1-4842-1317-9_2_Fig16_HTML.jpg)


    Figure 2-16. Practical user interface of `UserPaymentMethodsTableViewController`


    Typically, when a user first signs up for an account with us, there will be no
    credit card information on file. You should provide a way for the user to add
    a new card. Drag a `UIBarButtonItem` to the left bar button item of the view controller,
    and set it to the system “Add” bar button item.


    Another use case is that you need to set a default credit card for the user to
    help speed up the checkout process. Set the first credit card as the default and
    use a checkmark representing it. But allow the user to set any card as the default.


    Next, let’s prototype a user’s order history. Add another `UITableViewController`
    to the `UIStoryboard`, name it `UserOrderHistoryTableViewController` as its identifier,
    and use “Order History” as the title of the controller.


    Typically, you will show when the order is placed; a total amount of the purchase;
    items ordered if there is enough room and an order status; or at a minimum, you
    need to highlight some canceled orders. First, make the cell height taller, 66.
    Then put three `UILabel`s on a single cell: one label is for the order date, the
    other one is for the total amount, and the other one is the product name. For
    the label, set the number of lines to 0 and the line breaks to Word Wrap. It’s
    pretty common that a user would order multiple products so the product name label
    won’t show all the product’s names. Use gray text color to represent a canceled
    order, as shown in Figure [2-17](#A978-1-4842-1317-9_2_Chapter.html#Fig17).


    ![A978-1-4842-1317-9_2_Fig17_HTML.jpg](A978-1-4842-1317-9_2_Fig17_HTML.jpg)


    Figure 2-17. This is a partial user interface of `UserOrderHistoryTableViewController`


    This is all you need for `MyAccount`. Now you can build the project and run it.
    Figure [2-18](#A978-1-4842-1317-9_2_Chapter.html#Fig18) shows each view controller
    used in My Account.


    ![A978-1-4842-1317-9_2_Fig18_HTML.gif](A978-1-4842-1317-9_2_Fig18_HTML.gif)


    Figure 2-18. Here are the My Account view controllers


    ### Shopping Bag


    The root view controller of the `BagNavigationController` is a `UITableViewController`.
    To show what’s in the user’s bag, use the `UITableViewController` and name it
    `BagTableViewController` and “Bag” as its title.


    In addition, the following requirements need to be met. The user has to be able
    to check out; the user should be able to change the quantity of an item or remove
    an item from the bag; and the bag should show the total amount, which needs to
    change automatically according to an item’s unit price and quantity.


    First, work on the `UITableViewCell`. There’s quite a lot of content to show so
    let’s make the cell taller. In this example, set it to 66.


    You also need three `UILabel`s: One is for the product name, the other is for
    the unit price, and the third is for the quantity. Also add a `UIStepper` control
    to the cell so that a user can change the quantity she wants to purchase, as shown
    in Figure [2-19](#A978-1-4842-1317-9_2_Chapter.html#Fig19).


    ![A978-1-4842-1317-9_2_Fig19_HTML.jpg](A978-1-4842-1317-9_2_Fig19_HTML.jpg)


    Figure 2-19. View hierarchy of `BagTableViewController`


    You also need a `UITableViewCell` to show the total amount the user should pay.
    Add another cell and set its style as Right Detail and set a total amount of $36.00
    as the subtitle for the cell.


    It’s quite common that the user wants to leave an instruction about the order,
    so add a Compose system `UIBarButtonItem` to the view controller. It doesn’t really
    do anything right now, but at least it shows we have this feature in mind.


    Drag two `UIView`s: one is for the header view of the `UITableView`, the other
    is the footer view.


    Add a `UILabel` to the table header view. The `UILabel` will be used to show when
    those items have been added into the bag.


    Add two `UIButton`s to the footer view. One button has a title “Buy with Credit
    Card,” and the other one is for “Buy with Apple Pay.” We need to download the
    graphic asset for the button from Apple’s web site. It comes with our chapter
    source code. Figure [2-20](#A978-1-4842-1317-9_2_Chapter.html#Fig20) illustrates
    what `BagTableViewController` looks like. Figure [2-21](#A978-1-4842-1317-9_2_Chapter.html#Fig21)
    shows all view controllers for Shopping Bag.


    ![A978-1-4842-1317-9_2_Fig21_HTML.gif](A978-1-4842-1317-9_2_Fig21_HTML.gif)


    Figure 2-21. The view controllers used in Shopping Bag


    ![A978-1-4842-1317-9_2_Fig20_HTML.jpg](A978-1-4842-1317-9_2_Fig20_HTML.jpg)


    Figure 2-20. This is the partial user interface of `BagTableViewController`'
