  trans: "\n# 会话\n\n当用户通过多个设备登录你的应用时，Parse 云会在特定设备上为你的应用分配一个唯一的、可撤销的`Session`对象。这意味着不同设备和浏览器将为同一用户分配不同的会话令牌。在移动设备和你的应用中，你无需担心会话的创建与销毁。当用户登录或注册时，Parse\
    \ 云会自动创建相应的`Session`对象。当用户退出登录时，Parse 云会自动销毁相应的`Session`对象，使之前分配给该用户设备的会话令牌失效。\n\
    \nParse 还引入了一套灵活的可撤销会话 API，让你能够轻松理解并安全地管理应用中的用户会话。你可以像处理其他 Parse 对象一样，在数据浏览器中查看应用的`Session`对象。如果用户向你反映其账户可能被盗用，你可以使用数据浏览器、REST\
    \ API 或云代码，通过主密钥强制撤销用户会话。此外，为了增强安全性，你还可以配置应用，使不活跃的用户会话自动过期。\n\n> **注：** 更多信息，请访问\
    \ Parse 官方博客系列文章：[`http://blog.parse.com/learn/engineering/parse-security-i-are-you-the-key-master/`](http://blog.parse.com/learn/engineering/parse-security-i-are-you-the-key-master/)。\n\
    \n## 小结\n\n在本章中，我讨论了 Parse 为保护你的应用和用户数据安全而提供的安全机制。即：类级权限、访问控制列表（ACL）、云代码和可撤销会话。请记住，它们并非彼此独立。在实际的生产级应用中，你很可能需要组合使用所有这些方法。\n\
    \n> **注：** 阅读更多关于 Parse 安全性的内容，请访问 [`https://parse.com/docs/data`](https://parse.com/docs/data)。\n\
    \n# 19. 深入了解 Parse\n\n在第 8 章中，我介绍了注册功能。但如何知道用户是否输入了有效的电子邮件呢？你需要进行一些验证，以确保用户输入的电子邮件地址格式正确。但实际上，你并未确认该邮件地址是否真的属于该用户。在电子商务领域，邮件营销仍被证明是有效的。因此，你需要在用户注册时提供一种验证电子邮件的方法。\n\
    \n幸运的是，Parse 也考虑到了这些常见用例，并提供了简单的解决方案。让我们深入了解电子邮件验证流程。\n\n## 电子邮件验证\n\n首先，在你的项目\
    \ Parse Dashboard 中，在“设置”>“电子邮件”下启用电子邮件验证功能，如图 19-1 所示。\n\n![A978-1-4842-1317-9_19_Fig1_HTML.jpg](img/A978-1-4842-1317-9_19_Fig1_HTML.jpg)\n\
    \n**图 19-1.** 启用“验证用户电子邮件”功能\n\n接下来，在你的`EMABUser`模型中，添加一个新的布尔属性：`emailVerified`：\n\
    \n```objc\n@property (nonatomic, assign) BOOL emailVerified;\n```\n\n同时，在`EMABUser.m`文件的`@dynamic`声明中添加该属性。\n\
    \n接下来，创建一个电子邮件验证请求的邮件模板，如图 19-2 所示。\n\n![A978-1-4842-1317-9_19_Fig2_HTML.jpg](img/A978-1-4842-1317-9_19_Fig2_HTML.jpg)\n\
    \n**图 19-2.** 这是一个电子邮件验证请求的邮件模板\n\n你可以根据需要添加或编辑内容。如果你不希望在自己的服务器上托管该模板，请确保不要更改图\
    \ 19-3 中所示的以下 URL。\n\n![A978-1-4842-1317-9_19_Fig3_HTML.jpg](img/A978-1-4842-1317-9_19_Fig3_HTML.jpg)\n\
    \n**图 19-3.** 这是一个电子邮件验证页面 URL 示例\n\n现在，当你需要检查用户是否已验证其电子邮件时，可以这样使用该属性：\n\n```objc\n\
    if (self.user.emailVerified) {\n    // 我们继续处理\n} else {\n    // 我们要求该用户进行验证\n\
    \    UIAlertView *emailAlert = [[UIAlertView alloc] initWithTitle:NSLocalizedString(@\"\
    Email Verification Request\",@\"\")\n                                        \
    \                 message:NSLocalizedString(@\"Your email has not been verified,\
    \ please verify it to finish signing up.\",@\"\")\n                          \
    \                              delegate:nil\n                                \
    \               cancelButtonTitle:NSLocalizedString(@\"OK \",@\"\")\n        \
    \                                       otherButtonTitles:nil, nil];\n    [emailAlert\
    \ show];\n}\n```\n\n你仍然需要用户来验证电子邮件。该用户可能不小心删除了验证邮件，但现在他（她）要求我们重新发送。该如何实现呢？\n\n\
    基本上，解决方案是将用户的“电子邮件”属性设置为文件中已有的相同电子邮件地址，然后保存该用户。一旦保存成功，系统将触发向该用户提供的电子邮件地址重新发送验证邮件。代码如下：\n\
    \n```objc\nif (!self.user.emailVerified) {\n    UIAlertView *emailAlert = [[UIAlertView\
    \ alloc] initWithTitle:NSLocalizedString(@\"Email Verification Request\",@\"\"\
    )\n                                                         message:NSLocalizedString(@\"\
    Your email has not been verified, please verify it to finish signing up.\",@\"\
    \")\n                                                        delegate:self\n \
    \                                              cancelButtonTitle:NSLocalizedString(@\"\
    Resent it\",@\"\")\n                                               otherButtonTitles:NSLocalizedString(@\"\
    OK\",@\"\"), nil];\n    emailAlert.tag = 99;\n    [emailAlert show];\n}\n\n-(void)alertView:(UIAlertView\
    \ *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex\n{\n    if (buttonIndex\
    \ == alertView.cancelButtonIndex) {\n        [alertView dismissWithClickedButtonIndex:buttonIndex\
    \ animated:YES];\n    } else if (alertView.tag == 99){\n        if (buttonIndex\
    \ == 1) {\n            [alertView dismissWithClickedButtonIndex:buttonIndex animated:NO];\n\
    \        } else if (buttonIndex == 0){\n            NSString *email = self.user.email;\n\
    \            [self.user setEmail:email];\n            [self.user saveEventually:^(BOOL\
    \ succeeded, NSError *error) {\n                if (!error) {\n              \
    \      [SVProgressHUD showSuccessWithStatus:[NSString stringWithFormat:@\"%@ %@.\"\
    , NSLocalizedString(@\"An verification email has been sent to\",@\"\"), self.useremail]];\n\
    \                }\n            }];\n        }\n    }\n}\n```\n"
- fmt: "# Password Reset\n\nOn the other hand, you have implemented the feature to\
    \ allow a user login in [Chapter 9](#A978-1-4842-1317-9_9_Chapter.html). What\
    \ if the user forgets his or her password? As you have noticed from the Parse\
    \ Dashboard, developers can’t see a user’s password either. You won’t be able\
    \ to tell the user his or her password. So you need a way to help the user recover\
    \ or reset his password when needed.\n\nThe flow for password reset is as follows:\n\
    \n- User requests that typing in his or her e-mail resets the password.\n- Parse\
    \ sends an e-mail to the address, with a special password reset link.\n- User\
    \ clicks on the reset link and is directed to a special Parse page that will allow\
    \ him or her to type in a new password.\n- User types in a new password. The password\
    \ has now been reset to the value specified.\n\nOn the login screen, add a new\
    \ button with the title “Forgot password?” Once a user taps this button, execute\
    \ a password reset action; bring up an `alertView` and let the user enter his\
    \ or her e-mail address; a password reset instruction will be sent to this email\
    \ address. Here is the implementation for asking for the user’s e-mail address:\n\
    \n```\n- (IBAction)onPasswordReset:(id)sender\n{\n    UIAlertView *alertView =\
    \ [[UIAlertView alloc] initWithTitle:NSLocalizedString(@\"Password Reset\",@\"\
    \") message:NSLocalizedString(@\"Enter your email to reset password\",@\"\") delegate:self\
    \ cancelButtonTitle:NSLocalizedString(@\"Cancel\",@\"\") otherButtonTitles:NSLocalizedString(@\"\
    Reset\",@\"\"), nil];\n    alertView.alertViewStyle = UIAlertViewStylePlainTextInput;\n\
    \    UITextField *emailField = (UITextField*)[alertView textFieldAtIndex:0];\n\
    \    emailField.placeholder = NSLocalizedString(@\"Email\",@\"\");\n    [alertView\
    \ show];\n}\n```\n\nNext, implement the `alertView` delegate method:\n\n```\n\
    -(void)alertView:(UIAlertView *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex\n\
    {\n    if (buttonIndex == alertView.cancelButtonIndex) {\n        [alertView dismissWithClickedButtonIndex:buttonIndex\
    \ animated:YES];\n    } else {\n        UITextField *emailField = (UITextField*)[alertView\
    \ textFieldAtIndex:0];\n        [PFUser requestPasswordResetForEmailInBackground:emailField.text\
    \ block:^(BOOL succeeded, NSError *error) {\n            if (!error) {\n     \
    \           [SVProgressHUD showSuccessWithStatus:NSLocalizedString(@\"Password\
    \ reset instruction sent\", @\"Password reset instruction sent\")];\n        \
    \    }\n        }];\n    }\n}\n```\n\nThe code above calls the `PFUser`’s `+(void)requestPasswordResetForEmailInBackground`\
    \ method. Parse will take care of sending a password reset instruction e-mail\
    \ to this user’s e-mail address.\n\nLikewise, Parse has created an e-mail template\
    \ for us, as shown in Figure 19-4.\n\n![A978-1-4842-1317-9_19_Fig4_HTML.jpg](A978-1-4842-1317-9_19_Fig4_HTML.jpg)\n\
    \n**Figure 19-4.** This is an example password reset e-mail template\n\nAlso notice\
    \ that Parse has provided the “choose password” and “password reset success” URLs,\
    \ as shown in Figure 19-5.\n\n![A978-1-4842-1317-9_19_Fig5_HTML.jpg](A978-1-4842-1317-9_19_Fig5_HTML.jpg)\n\
    \n**Figure 19-5.** Here are sample URLs for “choose a new password” and “password\
    \ changed” page\n\nIf you want to upload these templates to your own server, hide\
    \ `parse.com` from users.\n\n# Analytics\n\nParse provides a number of hooks for\
    \ you to get a glimpse into the ticking heart of your apps. Without having to\
    \ implement any client-side logic, you can view real-time graphs and breakdowns\
    \ (by device type, Parse class name, or REST verb) of our API requests in your\
    \ app’s dashboard and save these graph filters to quickly access just the data\
    \ you’re interested in.\n\nParse App-Open & Push Analytics hook allows you to\
    \ track the application being launched. By adding the following line to `applicationDidFinishLaunching:`,\
    \ you’ll begin to collect data on when and how often your application is opened.\n\
    \n```\n[PFAnalytics trackAppOpenedWithLaunchOptions:launchOptions];\n```\n\nGraphs\
    \ and breakdowns of your statistics are accessible from your app’s dashboard.\n\
    \n`PFAnalytics` also allows you to track free-form events, with a handful of `NSString`\
    \ keys and values. These extra dimensions allow segmentation of your custom events\
    \ via your app’s dashboard. Say your apps offer search functionality for apartment\
    \ listings, and you want to track how often the feature is used, with some additional\
    \ metadata. Here is the code:\n\n```\nNSDictionary *dimensions = @{\n  // Define\
    \ ranges to bucket data points into meaningful segments\n  @\"priceRange\": @\"\
    1000-1500\",\n  // Did the user filter the query?\n  @\"source\": @\"craigslist\"\
    ,\n  // Do searches happen more often on weekdays or weekends?\n  @\"dayType\"\
    : @\"weekday\"\n};\n// Send the dimensions to Parse along with the 'search' event\n\
    [PFAnalytics trackEvent:@\"search\" dimensions:dimensions];\n```\n\n# Crash Report\n\
    \nThe Parse Crash Report iOS SDK is a great way for Parse developers to understand\
    \ crashes after apps are downloaded and used by users. There are a few libraries\
    \ that existed that can help track iOS app’s crash and generate reports, namely,\
    \ Crashlytics and Apple’s Xcode Crash Report feature. The nice things about Parse’s\
    \ crash report, in my opinion, are threefold:\n\n- First, you can see all data\
    \ and analytics from one dashboard, given you have chosen Parse as your back end.\
    \ Parse has provided a nice Analytics feature, and you can directly see your app’s\
    \ crash report from the same dashboard.\n- Second, compared to Xcode’s Crash Report\
    \ feature, you can easily add members to the Parse project so a member who doesn’t\
    \ have Xcode installed still can easily browse crashes and mark them as solved.\
    \ It’s a great feature if you have a dedicated QA team. On the other hand, Xcode\
    \ is mandatory if you choose to use Xcode’s Crash Report.\n- Third, Parse tracks\
    \ crashes on a per-version basis. If you have introduced an old bug in new version\
    \ of your app, Parse lets you notice that old bug easily so you can fix it quickly,\
    \ even if you’ve marked it as “resolved.”\n\nTo include the Parse Crash Report\
    \ iOS SDK in your project, use CocoaPods by adding this line into our podfile:\n\
    \n```\npod 'ParseCrashReporting'\n```\n\nThen run `pod update`; you should have\
    \ it included into your project.\n\nNext, enable the `ParseCrashReporting` in\
    \ your `EMABAppDelegate` before setting Parse Application ID and the client key.\n\
    \n```\n// Enable Crash Reporting\n[ParseCrashReporting enable];\n// Setup Parse\n\
    [Parse setApplicationId:@\"YOUR-PARSE-APP-ID\" clientKey:@\"YOUR-PARSE-APP-CLIENT-KEY\"\
    ];\n```\n\nAfter that, configure your project to send Parse the symbol files for\
    \ each build of your apps. This allows Parse to properly aggregate crash incidents\
    \ together and show these crashes on the dashboard with proper symbols in the\
    \ stack trace. To automatically upload symbol files for your application whenever\
    \ you build your app, initialize a new Parse Cloud Code directory by running the\
    \ following (for example, in the same directory as your Xcode project):\n\n```\n\
    parse new\n```\n\nAdd a new Run Script phase to the Build Phases of your App’s\
    \ target:\n\n```\nexport PATH=/usr/local/bin:$PATH\ncd <path_to_cloudcode_folder>\
    \  \nparse symbols <app_name_from_cloud_code_config_globals> --path=\"${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}\"\
    \n```\n\nThat’s all you need to do.\n\n# Summary\n\nIn this chapter, I have introduced\
    \ e-mail verification upon a user’s sign-up, and how you could reset a user’s\
    \ password by uploading some templates to your own server. I introduce the Parse\
    \ Analytics briefly. At the end, I also introduced Parse’s crash report feature\
    \ so that you can see the crash history in Parse Dashboard."
  raw: '## Password Reset


    On the other hand, you have implemented the feature to allow a user login in [Chapter
    9](#A978-1-4842-1317-9_9_Chapter.html). What if the user forgets his or her password?
    As you have noticed from the Parse Dashboard, developers can’t see a user’s password
    either. You won’t be able to tell the user his or her password. So you need a
    way to help the user recover or reset his password when needed.


    The flow for password reset is as follows:


    User requests that typing in his or her e-mail resets the password.   Parse sends
    an e-mail to the address, with a special password reset link.   User clicks on
    the reset link and is directed to a special Parse page that will allow him or
    her to type in a new password.   User types in a new password. The password has
    now been reset to the value specified.  


    On the login screen, add a new button with the title “Forgot password?” Once a
    user taps this button, execute a password reset action; bring up an `alertView`
    and let the user enter his or her e-mail address; a password reset instruction
    will be send to this email address. Here is the implementation for asking for
    the user’s e-mail address:


    `- (IBAction)onPasswordReset:(id)sender`


    `{`


        `UIAlertView *alertView = [[UIAlertView alloc] initWithTitle:NSLocalizedString(@"Password
    Reset",@"") message:NSLocalizedString(@"Enter your email to reset password",@"")
    delegate:self cancelButtonTitle:NSLocalizedString(@"Cancel",@"") otherButtonTitles:NSLocalizedString(@"Reset",@""),
    nil];`


        `alertView.alertViewStyle = UIAlertViewStylePlainTextInput;`


        `UITextField *emailField = (UITextField*)[alertView textFieldAtIndex:0];`


        `emailField.placeholder = NSLocalizedString(@"Email",@"");`


        `[alertView show];`


    `}`


    Next, implement the `alertView` delegate method:


    `-(void)alertView:(UIAlertView *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex`


    `{`


        `if (buttonIndex == alertView.cancelButtonIndex) {`


            `[alertView dismissWithClickedButtonIndex:buttonIndex animated:YES];`


        `} else {`


            `UITextField *emailField = (UITextField*)[alertView textFieldAtIndex:0];`


            `[PFUser requestPasswordResetForEmailInBackground:emailField.text block:^(BOOL
    succeeded, NSError *error) {`


                `if (!error) {`


                    `[SVProgressHUD showSuccessWithStatus:NSLocalizedString(@"Password
    reset instruction sent", @"Password reset instruction sent")];`


                `}`


            `}];`


        `}`


    `}`


    The code above calls the PFUser’s `+(void) requestPasswordResetForEmailInBackground`
    method. Parse will take care of sending a password reset instruction e-mail to
    this user’s e-mail address.


    Likewise, Parse has created an e-mail template for us, as shown in Figure [19-4](#A978-1-4842-1317-9_19_Chapter.html#Fig4).


    ![A978-1-4842-1317-9_19_Fig4_HTML.jpg](A978-1-4842-1317-9_19_Fig4_HTML.jpg)


    Figure 19-4.


    This is an example password reset e-mail template


    Also notice that Parse has provided the “choose password” and “password reset
    success” URLs, as shown in Figure [19-5](#A978-1-4842-1317-9_19_Chapter.html#Fig5).


    ![A978-1-4842-1317-9_19_Fig5_HTML.jpg](A978-1-4842-1317-9_19_Fig5_HTML.jpg)


    Figure 19-5.


    Here are sample URLs for “choose a new password” and “password changed” page


    If you want to upload these templates to your own server, hide parse.com from
    users.


    ## Analytics


    Parse provides a number of hooks for you to get a glimpse into the ticking heart
    of your apps. Without having to implement any client-side logic, you can view
    real-time graphs and breakdowns (by device type, Parse class name, or REST verb)
    of our API requests in your app’s dashboard and save these graph filters to quickly
    access just the data you’re interested in.


    Parse App-Open & Push Analytics hook allows you to track the application being
    launched. By adding the following line to `applicationDidFinishLaunching:`, you’ll
    begin to collect data on when and how often your application is opened.


    `[PFAnalytics trackAppOpenedWithLaunchOptions:launchOptions];`


    Graphs and breakdowns of your statistics are accessible from your app’s dashboard.


    PFAnalytics also allows you to track free-form events, with a handful of NSString
    keys and values. These extra dimensions allow segmentation of your custom events
    via your app’s dashboard. Say your apps offer search functionality for apartment
    listings, and you want to track how often the feature is used, with some additional
    metadata. Here is the code:


    `NSDictionary *dimensions = @{`


      `// Define ranges to bucket data points into meaningful segments`


      `@"priceRange": @"1000-1500",`


      `// Did the user filter the query?`


      `@"source": @"craigslist",`


      `// Do searches happen more often on weekdays or weekends?`


      `@"dayType": @"weekday"`


    `};`


    `// Send the dimensions to Parse along with the ''search'' event`


    `[PFAnalytics trackEvent:@"search" dimensions:dimensions];`


    ## Crash Report


    The Parse Crash Report iOS SDK is a great way for Parse developers to understand
    crashes after apps are downloaded and used by users. There are a few libraries
    that existed that can help track iOS app’s crash and generate reports, namely,
    Crashlytics and Apple’s Xcode Crash Report feature. The nice things about Parse’s
    crash report, in my opinion, are threefold:


    *   First, you can see all data and analytics from one dashboard, given you have
    chosen Parse as your back end. Parse has provided a nice Analytics feature, and
    you can directly see your app’s crash report from the same dashboard.

    *   Second, compared to Xcode’s Crash Report feature, you can easily add members
    to the Parse project so a member who doesn’t have Xcode installed still can easily
    browse crashes and mark them as solved. It’s a great feature if you have a dedicated
    QA team. On the other hand, Xcode is mandatory if you choose to use Xcode’s Crash
    Report.

    *   Third, Parse tracks crashes on a per-version basis. If you have introduced
    an old bug in new version of your app, Parse lets you notice that old bug easily
    so you can fix it quickly, even if you’ve marked it as “resolved.”


    To include the Parse Crash Report iOS SDK in your project, use CocoaPods by adding
    this line into our podfile:


    `pod ''ParseCrashReporting''`


    Then run ‘pod update’; you should have it included into your project.


    Next, enable the ParseCrashReporting in your EMABAppDelegate before setting Parse
    Application ID and the client key.


    `// Enable Crash Reporting`


    `[ParseCrashReporting enable];`


    `// Setup Parse`


    `[Parse setApplicationId:@"YOUR-PARSE-APP-ID" clientKey:@"YOUR-PARSE-APP-CLIENT-KEY"];`


    After that, configure your project to send Parse the symbol files for each build
    of your apps. This allows Parse to properly aggregate crash incidents together
    and show these crashes on the dashboard with proper symbols in the stack trace.
    To automatically upload symbol files for your application whenever you build your
    app, initialize a new Parse Cloud Code directory by running the following (for
    example, in the same directory as your Xcode project):


    `parse new`


    Add a new Run Script phase to the Build Phases of your App’s target:


    `export PATH=/usr/local/bin:$PATH cd <path_to_cloudcode_folder>  parse symbols
    <app_name_from_cloud_code_config_globals> --path="${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}"`


    That’s all you need to do.


    ## Summary


    In this chapter, I have introduced e-mail verification upon a user’s sign-up,
    and how you could reset a user’s password by uploading some templates to your
    own server. I introduce the Parse Analytics briefly. At the end, I also introduced
    Parse’s crash report feature so that you can see the crash history in Parse Dashboard.'
  trans: "\n# 密码重置\n\n另一方面，你在第 9 章中实现了允许用户登录的功能。如果用户忘记了自己的密码怎么办？正如你从 Parse 数据面板中所注意到的，开发者也同样无法看到用户的密码。你将无法告知用户其密码。因此，当用户需要时，你需要一种方法来帮助用户找回或重置密码。\n\
    \n密码重置的流程如下：\n\n- 用户请求通过输入其电子邮件来重置密码。\n- Parse 向该地址发送一封包含特殊密码重置链接的邮件。\n- 用户点击重置链接，并被引导至一个特殊的\
    \ Parse 页面，该页面允许用户输入新密码。\n- 用户输入新密码。密码现已重置为指定的值。\n\n在登录屏幕上，添加一个标题为“忘记密码？”的新按钮。一旦用户点击此按钮，就执行密码重置操作；弹出一个\
    \ `alertView`，让用户输入其电子邮件地址；一封密码重置说明将会发送到此电子邮件地址。以下是请求用户电子邮件地址的实现代码：\n\n```\n-\
    \ (IBAction)onPasswordReset:(id)sender\n{\n    UIAlertView *alertView = [[UIAlertView\
    \ alloc] initWithTitle:NSLocalizedString(@\"Password Reset\",@\"\") message:NSLocalizedString(@\"\
    Enter your email to reset password\",@\"\") delegate:self cancelButtonTitle:NSLocalizedString(@\"\
    Cancel\",@\"\") otherButtonTitles:NSLocalizedString(@\"Reset\",@\"\"), nil];\n\
    \    alertView.alertViewStyle = UIAlertViewStylePlainTextInput;\n    UITextField\
    \ *emailField = (UITextField*)[alertView textFieldAtIndex:0];\n    emailField.placeholder\
    \ = NSLocalizedString(@\"Email\",@\"\");\n    [alertView show];\n}\n```\n\n接下来，实现\
    \ `alertView` 的委托方法：\n\n```\n-(void)alertView:(UIAlertView *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex\n\
    {\n    if (buttonIndex == alertView.cancelButtonIndex) {\n        [alertView dismissWithClickedButtonIndex:buttonIndex\
    \ animated:YES];\n    } else {\n        UITextField *emailField = (UITextField*)[alertView\
    \ textFieldAtIndex:0];\n        [PFUser requestPasswordResetForEmailInBackground:emailField.text\
    \ block:^(BOOL succeeded, NSError *error) {\n            if (!error) {\n     \
    \           [SVProgressHUD showSuccessWithStatus:NSLocalizedString(@\"Password\
    \ reset instruction sent\", @\"Password reset instruction sent\")];\n        \
    \    }\n        }];\n    }\n}\n```\n\n上述代码调用了 `PFUser` 的 `+(void)requestPasswordResetForEmailInBackground`\
    \ 方法。Parse 会负责向该用户的电子邮件地址发送一封密码重置说明邮件。\n\n同样地，Parse 已经为我们创建了一个电子邮件模板，如图 19-4 所示。\n\
    \n![A978-1-4842-1317-9_19_Fig4_HTML.jpg](img/A978-1-4842-1317-9_19_Fig4_HTML.jpg)\n\
    \n**图 19-4.** 这是一个密码重置电子邮件模板示例\n\n另请注意，Parse 提供了“选择密码”和“密码重置成功”的 URL，如图 19-5 所示。\n\
    \n![A978-1-4842-1317-9_19_Fig5_HTML.jpg](img/A978-1-4842-1317-9_19_Fig5_HTML.jpg)\n\
    \n**图 19-5.** 这里是“选择新密码”和“密码已更改”页面的示例 URL\n\n如果你想将这些模板上传到你自己的服务器上，请对用户隐藏 `parse.com`。\n\
    \n# 分析\n\nParse 提供了许多钩子，让你能够洞察应用程序的实时运行状况。无需实现任何客户端逻辑，你就可以在应用程序的数据面板中查看 API 请求的实时图表和细分数据（按设备类型、Parse\
    \ 类名或 REST 动词），并保存这些图表过滤器以快速访问你感兴趣的数据。\n\nParse 应用程序打开与推送分析钩子允许你跟踪应用程序的启动。通过在\
    \ `applicationDidFinishLaunching:` 中添加以下代码行，你将开始收集有关应用程序何时以及多久被打开的数据。\n\n```\n\
    [PFAnalytics trackAppOpenedWithLaunchOptions:launchOptions];\n```\n\n你可以从应用程序的数据面板访问你的统计数据图表和细分数据。\n\
    \n`PFAnalytics` 还允许你使用少量的 `NSString` 键和值来跟踪自由形式的事件。这些额外的维度允许你通过应用程序的数据面板对你的自定义事件进行细分。假设你的应用程序提供公寓列表搜索功能，并且你想跟踪该功能的使用频率以及一些附加的元数据。代码如下：\n\
    \n```\nNSDictionary *dimensions = @{\n  // 定义范围以将数据点分组成有意义的区间\n  @\"priceRange\"\
    : @\"1000-1500\",\n  // 用户是否筛选了查询？\n  @\"source\": @\"craigslist\",\n  // 搜索在工作日还是周末更频繁发生？\n\
    \  @\"dayType\": @\"weekday\"\n};\n// 将维度与 'search' 事件一起发送到 Parse\n[PFAnalytics\
    \ trackEvent:@\"search\" dimensions:dimensions];\n```\n\n# 崩溃报告\n\nParse 崩溃报告\
    \ iOS SDK 是 Parse 开发者在应用程序被用户下载和使用后了解崩溃情况的绝佳方式。存在一些已有的库可以帮助跟踪 iOS 应用程序的崩溃并生成报告，例如\
    \ Crashlytics 和 Apple 的 Xcode 崩溃报告功能。在我看来，Parse 崩溃报告的优点有三点：\n\n- 首先，鉴于你已选择 Parse\
    \ 作为后端，你可以从一个数据面板查看所有数据和分析。Parse 提供了很好的分析功能，你可以直接在同一数据面板中查看应用程序的崩溃报告。\n- 其次，与\
    \ Xcode 的崩溃报告功能相比，你可以轻松地将成员添加到 Parse 项目，这样即使没有安装 Xcode 的成员也可以轻松浏览崩溃并将其标记为已解决。如果你有专门的\
    \ QA 团队，这是一个很棒的功能。另一方面，如果你选择使用 Xcode 的崩溃报告，则必须使用 Xcode。\n- 第三，Parse 按版本跟踪崩溃。如果你在应用程序的新版本中引入了一个旧错误，Parse\
    \ 能让你轻松注意到该旧错误，从而可以快速修复，即使你之前已将其标记为“已解决”。\n\n要将 Parse 崩溃报告 iOS SDK 包含到你的项目中，请使用\
    \ CocoaPods，在 podfile 中添加以下行：\n\n```\npod 'ParseCrashReporting'\n```\n\n然后运行 `pod\
    \ update`；你应该已经将其包含到你的项目中。\n\n接下来，在你的 `EMABAppDelegate` 中，在设置 Parse Application\
    \ ID 和客户端密钥之前启用 `ParseCrashReporting`。\n\n```\n// 启用崩溃报告\n[ParseCrashReporting\
    \ enable];\n// 设置 Parse\n[Parse setApplicationId:@\"YOUR-PARSE-APP-ID\" clientKey:@\"\
    YOUR-PARSE-APP-CLIENT-KEY\"];\n```\n\n之后，配置你的项目，为应用程序的每个构建版本向 Parse 发送符号文件。这允许\
    \ Parse 正确地汇总崩溃事件，并在数据面板上显示包含正确栈跟踪符号的崩溃信息。要实现在每次构建应用程序时自动上传符号文件，请通过运行以下命令（例如，在你的\
    \ Xcode 项目所在目录下）初始化一个新的 Parse Cloud Code 目录：\n\n```\nparse new\n```\n\n在应用程序目标的“构建阶段”中添加一个新的“运行脚本”阶段：\n\
    \n```\nexport PATH=/usr/local/bin:$PATH\ncd <path_to_cloudcode_folder>  \nparse\
    \ symbols <app_name_from_cloud_code_config_globals> --path=\"${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}\"\
    \n```\n\n这就是你需要做的全部工作。\n\n# 总结\n\n在本章中，我介绍了用户注册时的电子邮件验证，以及如何通过上传一些模板到你自己的服务器来重置用户密码。我简要介绍了\
    \ Parse 分析。最后，我还介绍了 Parse 的崩溃报告功能，以便你可以在 Parse 数据面板中查看崩溃历史记录。\n"
