    ## Summary


    In this chapter, I covered how to use a UITableView to implement a form to collect
    a user’s address. I used a UITableView to take advantage of the scrolling feature
    of a UITableView so a UITableViewCell can be moved to the screen top so the soft
    keyboard of a user’s iPhone won’t cover the content. I also considered different
    keyboard types for different address portions for easy typing purposes. There
    are definitely other ways to achieve the same goal. However, I feel my approach
    here is easier.


