    \ with `SVProgressHud`\n\n## Keep Track of Your Keys: `EMABConstants` Class\n\n\
    Continue with the source code from [Chapter 2](#A978-1-4842-1317-9_2_Chapter.html);\
    \ create a new Cocoa Touch Class file, name it `EMABConstants`, and make it a\
    \ subclass of `NSObject`. One purpose of this class is to keep track of those\
    \ global accessible `NSStrings`, such as all keys and secrets. In this case, using\
    \ `extern NSString *const` is the preferred approach.\n\nIn addition, you used\
    \ `EMAB` as prefix for each file you created—`EMAB` stands for \"E-commerce Mobile\
    \ App Development,\" but you can name it whatever you want.\n\n## Create a New\
    \ Parse App\n\nIf you don't have a Parse account, now is the time to sign up for\
    \ one! Open [`https://parse.com`](https://parse.com/) in your favorite browser,\
    \ then follow the onscreen instructions to sign up for a Parse account. The process\
