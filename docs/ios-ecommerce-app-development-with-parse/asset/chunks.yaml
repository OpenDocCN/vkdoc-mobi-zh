  trans: "\n# 向客户收费\n\n下一个云函数是 `charge`。此函数接收一个订单对象 ID 和一个客户 ID。你需要遵循以下步骤：\n\n根据订单对象\
    \ ID 查找订单；你还需要包含与该订单关联的产品和客户信息。你将需要这些信息来生成收据。根据 Stripe 客户 ID 向客户收费。用新的 `ORDER_COMPLETED`\
    \ 状态更新订单，然后根据系统中的订单总数生成一个真实的订单 ID 和一个大整数。通过调用 `Mailgun` 解析云模块向客户发送电子邮件。你可能需要混合使用\
    \ HTML 标签和订单信息来编写一些邮件内容。一旦订单确认邮件成功发送，向 iOS 应用发回一条消息。如果发生任何错误，返回错误信息。\n\n以下是前五个步骤的代码：\n\
    \n```\n/* 初始化 Stripe 和 Mailgun 云模块 */\n\nvar Stripe = require('stripe');\nStripe.initialize('your_own_stripe_secret');\n\
    \nvar Mailgun = require('mailgun');\nMailgun.initialize(\"your_mailgun_email_account\"\
    , \"your_mailgun_key\");\n\nParse.Cloud.define(\"chargeCustomer\", function(request,\
    \ response) {\n    Parse.Cloud.useMasterKey();\n    var order;\n    var orderNo;\n\
    \n    Parse.Promise.as().then(function() {\n        var orderQuery = new Parse.Query('Order');\n\
    \        orderQuery.equalTo('objectId', request.params.orderId);\n        orderQuery.include(\"\
    customer\");\n        orderQuery.include([\"items.product\"]);\n        orderQuery.descending(\"\
    createdAt\");\n        return orderQuery.first().then(null, function(error) {\n\
    \            return Parse.Promise.error('对不起，这个订单不存在。');\n        });\n    }).then(function(result)\
    \ {\n        order = result;\n    }).then(function(result) {\n        var countQuery\
    \ = new Parse.Query(\"Order\");\n        return countQuery.count().then(null,\
    \ function(error) {\n            return Parse.Promise.error('出了点问题。');\n     \
    \   });\n    }).then(function(result) {\n        orderNo = result;\n    }).then(function(order)\
    \ {\n        return Stripe.Charges.create({\n            amount: request.params.amount,\
    \ // 以美分表示美元金额\n            currency: \"usd\",\n            customer: request.params.customerId\n\
    \        }).then(null, function(error) {\n            console.log('使用 Stripe 收费失败。错误:\
    \ ' + error);\n            return Parse.Promise.error('发生错误。您的信用卡未被扣款。');\n  \
    \      });\n    }).then(function(purchase) {\n        orderNo = 1000000 + orderNo;\n\
    \        order.set('stripePaymentId', purchase.id);\n        order.set('orderStatus',\
    \ 1);  // 订单已生成\n        order.set('orderNo', orderNo);\n        return order.save().then(null,\
    \ function(error) {\n            return Parse.Promise.error('您的订单出现严重错误。请尽快联系\
    \ info@beauty4you.co。');\n        });\n    }).then(function(result) {\n      \
    \  var greeting = \"尊敬的 \";\n        if (request.params.name !== \"N/A\")\n  \
    \          greeting += request.params.name + \"，\\n\\n\";\n        else\n    \
    \        greeting += request.params.email + \"，\\n\\n\";\n        var orderId\
    \ = \"订单号: \" + orderNo + \"\\n\";\n        var body = greeting + orderId + \"\
    \  我们已收到您对以下商品的订单：\\n\\n\" +\n            request.params.itemDesc + \"\\n\";\n\
    \        var note = \"备注: \" + request.params.note + \"\\n\\n\";\n        body\
    \ += \"\\总计: $\" + (request.params.amount / 100.00).toFixed(2) + \"\\n\\n\" +\
    \ note;\n        var thankYouNote = \"如有任何疑问，请联系我们！\\n\\n\" +\n            \"\\\
    n 谢谢，\\n\" + \"Beauty 4 You 团队\";\n        body += thankYouNote;\n\n        //\
    \ 发送邮件。\n        return Mailgun.sendEmail({\n            to: request.params.email,\n\
    \            bcc: 'CUSTOMER-EMAIL',\n            from: 'YOUR-EMAIL',\n       \
    \     subject: '',\n            text: body\n        }).then(null, function(error)\
    \ {\n            return Parse.Promise.error('您的购买已成功，但我们无法向您发送邮件。如有任何问题，请联系我们:\
    \ YOUR-EMAIL。');\n        });\n    }).then(function() {\n        // 完成！\n    \
    \    response.success('成功');\n    }, function(error) {\n        response.error(error);\n\
    \    });\n});\n```\n\n# 收费令牌\n\n此函数与 `chargeCustomer` 函数几乎相同。唯一的区别是，你需要在 `Stripe.Charges.create`\
    \ 函数中使用 `card` 属性：\n\n```\nStripe.Charges.create({\n    amount: request.params.amount,\
    \ // 以美分表示美元金额\n    currency: \"usd\",\n    card: request.params.customerId\n\
    })\n```\n\n## 总结\n\n在本章中，我向你展示了如何创建一个 Stripe 客户 ID，然后使用此客户 ID 通过 Parse 云模块对用户的信用卡进行收费。我还解释了如何使用\
    \ `Mailgun` 向此用户发送订单确认邮件。\n\n# 15. 我的账户\n\n电子补充材料 本章在线版本 (doi:[10.​1007/​978-1-4842-1317-9_​15](http://dx.doi.org/10.1007/978-1-4842-1317-9_15))\
    \ 包含补充材料，可供授权用户使用。\n\n至此，应用可以完成其主要功能——购买并支付商品。然而，要使其成为一个完整的应用，还有一些工作要做。例如，用户应该能够更改其收货地址和更新付款方式。他们还应该能够查看标记为收藏的商品、查看订单历史记录以及退出账户——这些功能都尚未实现。\n\
    \n在本章中，你将学习如何：\n\n-   实现一个静态的“我的账户”屏幕。根据是否有登录用户，此屏幕是用户注销或登录的入口；显示用户的收货地址；访问订单历史记录；管理付款方式。\n\
    -   允许用户查看和编辑其收货地址。\n-   允许用户查看其订单历史记录。\n-   允许用户管理其付款方式。\n-   使用户能够管理其收藏列表。\n"
- fmt: "# Create the My Account Screen\n\nStart by creating a `UITableViewController`\
    \ subclass and name it `EMABUserAccountTableViewController`. Next, you will organize\
    \ some static information into the `UITableView`. Define an enum type for the\
    \ cell content you need.\n\n```\ntypedef NS_OPTIONS(NSInteger, TABLE_ROW){\n \
    \   SIGNED_IN = 0,\n    CONTACT_INFO = 1,\n    PAYMENT = 2,\n    FAVORITE = 3,\n\
    \    HISTORY\n};\n```\n\nYou also need a property to represent the current logged-in\
    \ user.\n\n```\n@interface EMABUserAccountTableViewController ()\n@property (nonatomic,\
    \ strong) EMABUser *customer;\n@end\n```\n\nIn general, this screen is pretty\
    \ simple to implement. Most of the following code is self-explanatory:\n\n```\n\
    @implementation EMABUserAccountTableViewController\n\n- (void)viewDidLoad {\n\
    \    [super viewDidLoad];\n    self.customer = [EMABUser currentUser];\n}\n```\n\
    \nThe user is instantiated on `-(void)viewDidLoad`. If there is no logged-in user,\
    \ `self.customer` will be nil. You will use this information to decide how many\
    \ cells you need for the `UITableView`.\n\n```\n#pragma mark - Table view data\
    \ source\n\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\
    \ {\n    // Return the number of sections.\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView\
    \ *)tableView numberOfRowsInSection:(NSInteger)section {\n    // Return the number\
    \ of rows in the section.\n    return (self.customer)?5:1;\n}\n```\n\nIf there\
    \ is no valid user, only one cell is returned; for any valid user, five cells\
    \ are created.\n\n```\n- (UITableViewCell *)tableView:(UITableView *)tableView\
    \ cellForRowAtIndexPath:(NSIndexPath *)indexPath {\n    UITableViewCell *cell\
    \ = [tableView dequeueReusableCellWithIdentifier:@\"AccountCell\" forIndexPath:indexPath];\n\
    \    // Configure the cell…\n    NSString *title = @\"\";\n    NSString *subtitle\
    \ = @\"\";\n    switch (indexPath.row) {\n        case SIGNED_IN:\n          \
    \  title = (self.customer)?NSLocalizedString(@\"Sign In\", @\"\"): NSLocalizedString(@\"\
    Sign Out\", @\"\");\n            subtitle = self.customer.email;\n           \
    \ break;\n        case CONTACT_INFO:\n            title = NSLocalizedString(@\"\
    Contact Info\", @\"\");\n            break;\n        case PAYMENT:\n         \
    \   title = NSLocalizedString(@\"Payment\", @\"\");\n            break;\n    \
    \    case FAVORITE:\n            title = NSLocalizedString(@\"Favorite\", @\"\"\
    );\n            break;\n        case HISTORY:\n            title = NSLocalizedString(@\"\
    Order History\", @\"\");\n            break;\n        default:\n            break;\n\
    \    }\n    cell.textLabel.text = title;\n    cell.detailTextLabel.text = subtitle;\n\
    \    return cell;\n}\n```\n\nThe following `UITableView` delegate methods accomplish\
    \ two things:\n\n* The first cell is for letting users sign out if the cell is\
    \ tapped, corresponding to \"Sign Out\" text. For a user not logged in, the Signup\
    \ or Login screen is displayed, corresponding to \"Log In\" text.\n* The remaining\
    \ cells present the different view controllers based on the cell selected.\n\n\
    ```\n#pragma mark -\n\n-(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
    \ *)indexPath  {\n    NSString *viewControllerIdentifier = @\"\";\n    switch\
    \ (indexPath.row) {\n        case SIGNED_IN:\n            if (self.customer) {\n\
    \                [self signOut];\n            } else {\n                [self\
    \ presentSignupOrLogin];\n            }\n            break;\n        case CONTACT_INFO:\n\
    \            viewControllerIdentifier = @\"EMABUserProfileTableViewController\"\
    ;\n            break;\n        case FAVORITE:\n            viewControllerIdentifier\
    \ = @\"MABUserFavoriteHistoryTableViewControlle\";\n            break;\n     \
    \   case HISTORY:\n            viewControllerIdentifier = @\"EMABUserOrderHistoryTableViewController\"\
    ;\n            break;\n        case PAYMENT:\n            viewControllerIdentifier\
    \ = @\"EMABUserPaymentMethodTableViewController\";\n            break;\n     \
    \   default:\n            break;\n    }\n    if ([viewControllerIdentifier length]\
    \ > 0) {\n        UIViewController *viewController = [self.storyboard instantiateViewControllerWithIdentifier:viewControllerIdentifier];\n\
    \        [self.navigationController pushViewController:viewController animated:YES];\n\
    \    }\n}\n\n-(void)signOut {\n    [EMABUser logOut];\n    [self.tableView reloadData];\n\
    }\n\n-(void)presentSignupOrLogin {\n    UIStoryboard *dispatchStoryboard = [UIStoryboard\
    \ storyboardWithName:@\"LoginSignup\" bundle:nil];\n    UINavigationController\
    \ *navController = (UINavigationController *)[dispatchStoryboard instantiateInitialViewController];\n\
    \    [self presentViewController:navController animated:YES completion:nil];\n\
    }\n\n@end\n```\n\nFigure [15-1](#A978-1-4842-1317-9_15_Chapter.html#Fig1) shows\
    \ the final result.\n\n![A978-1-4842-1317-9_15_Fig1_HTML.jpg](A978-1-4842-1317-9_15_Fig1_HTML.jpg)\n\
    \nFigure 15-1. Screen of My Account `UITableViewController`\n\n## Contact Info\n\
    \nI have shown you how to implement `EMABUserProfileTableViewController` in [Chapter\
    \ 11](#A978-1-4842-1317-9_11_Chapter.html). When a user wants to view and edit\
    \ his or her shipping address, he or she has a chance to open `EMABUserProfileTableViewController`\
    \ from \"Contact Info\" in \"My Account,\" then view and edit if necessary.\n\n\
    ## Payment Method\n\nCustomers may use different credit cards, whether they shop\
    \ at a brick and mortar store, online, or via an app. If you save an `EMABPaymentMethod`\
    \ instance every time you see a different credit card, the user might have several\
    \ cards stored with you. You need to provide a place for the user to manage those\
    \ credit cards, such as setting one card as the default one, deleting a credit\
    \ card, or adding a new one.\n\nThis section covers how to display all credit\
    \ cards associated with a user, as well as how to let users add additional ones\
    \ and/or delete some.\n\nThe model for this section is the `EMABPaymentMethod`\
    \ model.\n\n### View\n\nUse a standard `UITableViewCell` to display the basic\
    \ credit card information such as the card's last four digits and expiration date.\
    \ Figure [15-2](#A978-1-4842-1317-9_15_Chapter.html#Fig2) shows the basic `UITableViewCell`.\n\
    \n![A978-1-4842-1317-9_15_Fig2_HTML.jpg](A978-1-4842-1317-9_15_Fig2_HTML.jpg)\n\
    \nFigure 15-2. The Payment method cell shows the last four digits and the expiration\
    \ date"
