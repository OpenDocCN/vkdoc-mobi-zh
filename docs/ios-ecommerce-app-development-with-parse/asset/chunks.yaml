    \ customize each cell using the `EMABUserProfileTableViewCell`’s helper method.\n\
    \nNext, implement the `UITextField` Delegate method.\n\n```objectivec\n#pragma\
    \ mark - UITextField Delegate methods\n\n- (BOOL)textFieldShouldBeginEditing:(UITextField\
    \ *)textField\n{\n    return YES;\n}\n\n- (BOOL)textFieldShouldEndEditing:(UITextField\
    \ *)textField\n{\n    switch (textField.tag) {\n        case 100:\n          \
