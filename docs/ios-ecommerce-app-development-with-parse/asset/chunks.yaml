    \ 101:\n            self.customer.lastName = textField.text;\n            break;\n\
    \        case 102:\n            self.customer.phone = textField.text;\n      \
    \      break;\n        case 103:\n            self.customer.email = textField.text;\n\
    \            break;\n        case 104:\n            self.customer.address1 = textField.text;\n\
    \            break;\n        case 105:\n            self.customer.address2 = textField.text;\n\
    \            break;\n        case 106:\n            self.customer.city = textField.text;\n\
    \            break;\n        case 107:\n            self.customer.state = textField.text;\n\
    \            break;\n        case 108:\n            self.customer.zipcode = textField.text;\n\
    \            break;\n        default:\n            break;\n    }\n    [textField\
    \ resignFirstResponder];\n    return YES;\n}\n\n- (BOOL)textFieldShouldReturn:(UITextField\
    \ *)textField\n{\n    [textField resignFirstResponder];\n    return YES;\n}\n\
    ```\n\nThe `-(BOOL)textFieldShouldEndEditing:(UITextField *)textField` is important.\
    \ Once a user finishes a cell, you need to send the information to this user instance.\
    \ It will be more obvious to see the reason when there are more cells, and a user\
    \ has to scroll up and down to fill up the content.\n\nAs you can see, a \"Done\"\
    \ bar button item is set up on the `UINavigationBar`. When the user taps \"Done,\"\
    \ whatever the user entered is saved and the screen is dismissed. But what if\
    \ the user doesn't really enter anything, or the information provided is not sufficiently\
    \ complete? Let’s do a little check.\n\nYou need to declare a helper method in\
    \ the header file of the `EMABUser` model:\n\n```objectivec\n-(BOOL)isShippingAddressCompleted;\n\
    ```\n\nHere is the implementation:\n\n```objectivec\n-(BOOL)isShippingAddressCompleted{\n\
    \    BOOL cont0 = self.firstName && self.lastName && [self.firstName length] >\
    \ 0 && [self.lastName length] > 0;\n    BOOL cont1 = self.address1 && [self.address1\
    \ length] > 0;\n    BOOL cont2 = self.city && [self.city length] > 0;\n    BOOL\
    \ cont3 = self.state && [self.state length] > 0;\n    BOOL cont4 = self.zipcode\
    \ && [self.zipcode length]> 0;\n    return cont0 && cont1 && cont1 && cont2 &&\
    \ cont3 && cont4;\n}\n```\n\nNow you can use this helper method when the user\
    \ taps \"Done.\" If you think all information has been provided, save the user.\
    \ If not, show an alert to notify the user that more information is needed.\n\n\
    ```objectivec\n-(IBAction)onDone:(id)sender\n{\n    [self.tableView.superview\
    \ endEditing:YES];\n    if ([self.customer isShippingAddressCompleted]) {\n  \
    \      __weak typeof(self) weakSelf = self;\n        [self.customer saveInBackgroundWithBlock:^(BOOL\
    \ succeeded, NSError *error) {\n            if (!error) {\n                [weakSelf.navigationController\
    \ popViewControllerAnimated:YES];\n            }\n        }];\n    } else {\n\
    \        [SVProgressHUD showErrorWithStatus:NSLocalizedString(@\"Please complete\
    \ the required information denoted by *\",@\"\")];\n    }\n}\n```\n\nOf course,\
    \ you also provide a bar button item to let the user skip this screen.\n\n```objectivec\n\
    -(void)onCancel:(id)sender\n{\n    [self.navigationController popViewControllerAnimated:YES];\n\
    }\n```\n\nThat’s all for this `EMABUserProfileViewController`. Return to `EMABBagsTableViewController`.\
    \ When the user taps \"Pay with Credit Card,\" we check whether the user has a\
