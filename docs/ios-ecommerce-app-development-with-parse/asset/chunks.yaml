    Once the network request is finished, the animation stops and the `UIActivityIndicator`
    instance is hidden.


    `@implementation EMABDispatchViewController`


    `- (void)viewDidLoad {`


    `[super viewDidLoad];`


    `self.activityIndicatorView.hidden = YES;`


    `}`


    The helper method `-(void)updateIndicator` updates the UI. When making a Facebook
    API request, you want to disable the left bar button item to prevent the user
    from skipping the login process. You also use this method to show or hide the
    indicator.


    `-(void)updateIndicator:(BOOL)shouldEnable{`


    `self.navigationItem.leftBarButtonItem.enabled = !shouldEnable;`


    `(shouldEnable)?[self.activityIndicatorView startAnimating]:[self.activityIndicatorView
    stopAnimating];`


    `self.activityIndicatorView.hidden = !shouldEnable;`


    `}`


    As you have done in previous chapters, use UIAlertView to show any error that
    might occur during the login process.


    `#pragma mark - helper`


    `-(void)showError:(NSString *)message {`


    `[[[UIAlertView alloc] initWithTitle:NSLocalizedString(@"Error", @"Error") message:message
    delegate:nil cancelButtonTitle:NSLocalizedString(@"OK", @"OK") otherButtonTitles:nil
    , nil] show];`


    `}`


    Next, move to the Facebook login process. First, tell Facebook what information
    is obtained from the user, and ask permission from Facebook. In this case, you
    only need some basic information “user_about_me” such as the user’s e-mail, name,
    and gender. If you need more information, you need to log in to the developer.facebook.com
    portal to request additional permission.


    Once again, Parse makes this process easy. You will use the PFFacebookUtils method
    `logInWithPermissions:block` to make this request.


    When you make this request, you might get a success or an error message. If you
    get an error, you can simply let the user know there is something wrong and indicate
    what is wrong. You use the `showError:` method for this purpose. When you get
    a success, you will get a PFUser instance. But there is no Facebook user information
    associated with this PFUser instance; this requires an extra step. That’s why
    you need another helper method, `obtainFacebookUserInfo`:


    `-(IBAction)onFacebookLogin:(id)sender{`


    `// Set permissions required from the facebook user account`


    `NSArray *permissionsArray = @[@"user_about_me"];`


    `[self updateIndicator:YES];`


    `[PFFacebookUtils logInWithPermissions:permissionsArray block:^(PFUser *user,
    NSError *error) {`


    `if (error) {`


    `NSString *facebookError = [FBErrorUtility userMessageForError:error];`


