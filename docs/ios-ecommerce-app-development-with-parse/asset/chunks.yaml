    \      __weak typeof(self) weakSelf = self;\n        [self.customer saveInBackgroundWithBlock:^(BOOL\
    \ succeeded, NSError *error) {\n            if (!error) {\n                [weakSelf.navigationController\
    \ popViewControllerAnimated:YES];\n            }\n        }];\n    } else {\n\
    \        [SVProgressHUD showErrorWithStatus:NSLocalizedString(@\"请完成带 * 号标记的必填信息\"\
    ,@\"\")];\n    }\n}\n```\n\n当然，你也提供了一个栏按钮项，让用户跳过这个屏幕。\n\n```objectivec\n-(void)onCancel:(id)sender\n\
    {\n    [self.navigationController popViewControllerAnimated:YES];\n}\n```\n\n\
    这就是`EMABUserProfileViewController`的全部内容。回到`EMABBagsTableViewController`。当用户点击“使用信用卡支付”时，我们会检查用户是否拥有完整的送货地址：\n\
    \n```objectivec\n-(IBAction)onPayWithCreditCard:(id)sender{\n    if ([[EMABUser\
    \ currentUser] isShippingAddressCompleted]) {\n        //待处理\n    } else {\n \
    \       EMABUserProfileTableViewController *viewController = [self.storyboard\
    \ instantiateViewControllerWithIdentifier:@\"EMABUserProfileTableViewController\"\
    ];\n        [self.navigationController pushViewController:viewController animated:YES];\n\
    \    }\n}\n```\n\n如果送货地址不完整，则会显示`EMABUserProfileTableViewController`。如果地址完整（`YES`），那么你将请求用户的信用卡信息——这将在下一章中介绍。\n\
    \n## 总结\n\n在本章中，我介绍了如何使用`UITableView`实现一个用于收集用户地址的表单。我利用了`UITableView`的滚动特性，使得`UITableViewCell`可以移动到屏幕顶部，这样用户的\
    \ iPhone 软键盘就不会遮挡内容。我还为不同的地址部分考虑了不同的键盘类型，以方便输入。当然，还有其他方法可以达到同样的目的。但我认为我在这里的方法更简单。\n\
    \n# 12. 使用信用卡支付\n\n电子补充材料 本章的在线版本 (doi:[10.​1007/​978-1-4842-1317-9_​12](http://dx.doi.org/10.1007/978-1-4842-1317-9_12))\
    \ 包含补充材料，仅供授权用户使用。\n\n在上一章中，我讨论了在结账前获取用户的送货地址。在本章中，我将介绍用户如何使用信用卡支付。对于这个应用，你将使用\
    \ Stripe iOS SDK 来简化流程。要集成 Stripe iOS SDK，你需要更新你的 Cocoapods Podfile，添加以下两行：\n\n\
    ```ruby\npod 'Stripe'\npod 'Stripe/ApplePay'\n```\n\n然后运行“`Pod update`”。"
- fmt: "# Payment Model\n\nYou need a new `PFObject` model for a user’s credit card.\
    \ Instead of naming it `EMABCreditCard`, name it `EMABPaymentMethod` because you\
    \ might incorporate other payment methods such as PayPal in the future. Remember\
    \ to register an `NSString` constant on the `EMABConstants` class and to register\
    \ the model in the `AppDelegate` class.\n\nIn this model class, you need properties\
    \ such as the owner of the payment method, the credit card type, the last four\
    \ digits of the credit card, and the expiration month and year, as well as the\
    \ `Stripe Customer ID`. You need the `Stripe Customer ID` property so you can\
    \ ask Stripe to make a real charge against the credit card. You also need the\
    \ `Stripe Customer ID` so that you can charge the same customer in the future\
    \ without her having to reenter the same information.\n\nIn addition, you need\
    \ some helper methods such as formatting the credit card’s last four digits, the\
    \ expiration month and year, and the credit card type (Visa, Master Card, etc.).\n\
    \nTo get all credit cards for one customer, you need to perform a query. Like\
    \ you have done before, you have a `+(PFQuery *)basicQuery` method, and the `+(PFQuery\
    \ *)queryForOwner: (EMABUser *)owner` method.\n\nHere is the header file:\n\n\
    `EMABPaymentMethod.h`\n\n```\n#import <Parse/Parse.h>\n#import \"Stripe.h\"\n\n\
    @class EMABUser;\n\n@interface EMABPaymentMethod : PFObject<PFSubclassing>\n\n\
    @property (nonatomic, copy) NSString *type;\n@property (nonatomic, copy) NSString\
    \ *stripeCustomerId;\n@property (nonatomic, copy) NSString *lastFourDigit;\n@property\
    \ (nonatomic, assign) NSUInteger_t expirationMonth;\n@property (nonatomic, assign)\
    \ NSUInteger _t expirationYear;\n@property (nonatomic, strong) EMABUser *owner;\n\
    \n-(NSString *)friendlyCreditCardNumber;\n-(NSString *)friendlyExpirationMonthYear;\n\
    +(PFQuery *)basicQuery;\n+(PFQuery *)queryForOwner:(EMABUser *)owner;\n-(NSString\
    \ *)friendlyType:(STPCardBrand)brand;\n\n@end\n```\n\nHere is the implementation\
    \ file:\n\n`EMABPaymentMethod.m`\n\n```\n#import \"EMABPaymentMethod.h\"\n#import\
    \ <Parse/PFObject+Subclass.h>\n#import \"EMABUser.h\"\n#import \"EMABConstants.h\"\
    \n\n@implementation EMABPaymentMethod\n\n@dynamic type,lastFourDigit, expirationMonth,\
    \ expirationYear,stripeCustomerId, owner;\n\n+(NSString *)parseClassName\n{\n\
    \    return kPaymentMethod;\n}\n\n-(NSString *)friendlyCreditCardNumber{\n   \
    \ return  [NSString stringWithFormat:@\"####-####-####-%@\",self. lastFourDigit];\n\
    }\n\n-(NSString *)friendlyExpirationMonthYear{\n    return [NSString stringWithFormat:@\"\
    %lld/%lld\",self.expirationMonth, self.expirationYear];\n}\n\n+(PFQuery *)basicQuery{\n\
    \    PFQuery *query = [PFQuery queryWithClassName:[self parseClassName]];\n  \
    \  [query orderByDescending:@\"createdAt\"];\n    return query;\n}\n\n+(PFQuery\
    \ *)queryForOwner:(EMABUser *)owner{\n    PFQuery *query = [self basicQuery];\n\
    \    [query whereKey:@\"owner\" equalTo:owner];\n    return query;\n}\n\n-(NSString\
    \ *)friendlyType:(STPCardBrand)brand{\n    NSString *title = @\"\";\n    switch\
    \ (brand) {\n        case STPCardBrandVisa:\n            title = @\"Visa\";\n\
    \            break;\n        case STPCardBrandAmex:\n            title = @\"American\
    \ Express\";\n            break;\n        case STPCardBrandMasterCard:\n     \
    \       title = @\"MasterCard\";\n            break;\n        case STPCardBrandDiscover:\n\
    \            title = @\"Discover\";\n            break;\n        case STPCardBrandJCB:\n\
    \            title = @\"JCB\";\n            break;\n        case STPCardBrandDinersClub:\n\
    \            title = @\"Dinner Club\";\n            break;\n        default:\n\
    \            title = @\"Unknown\";\n            break;\n    }\n    return title;\n\
    }\n\n@end\n```\n\nIn this implementation, for the helper method `-(NSString *)friendlyCreditCardNumber`,\
    \ it might be better that it is formatted based on different credit card types.\
    \ For example, American Express credit cards are normally 15 digits instead of\
    \ 16.\n\n# Payment View\n\nThe Stripe iOS SDK sample code provides a `PKView`\
    \ that you need to include in your project. It’s not part of the Stripe iOS SDK.\
    \ Figure [12-1](#A978-1-4842-1317-9_12_Chapter.html#Fig1) shows what it looks\
    \ like.\n\n![A978-1-4842-1317-9_12_Fig1_HTML.jpg](A978-1-4842-1317-9_12_Fig1_HTML.jpg)\n\
    \nFigure 12-1. The `PKView`"
  raw: '## Payment Model


    You need a new PFObject model for a user’s credit card. Instead of naming it EMABCreditCard,
    name it EMABPaymentMethod because you might incorporate other payment methods
    such as PayPal in the future. Remember to register an NSString constant on the
    EMABConstants class and to register the model in the AppDelegate class.


    In this model class, you need properties such as the owner of the payment method,
    the credit card type, the last four digits of the credit card, and the expiration
    month and year, as well as the Stripe Customer ID. You need the Stripe Customer
    ID property so you can ask Stripe to make a real charge against the credit card.
    You also need the Stripe Customer ID so that you can charge the same customer
    in the future without her having to reenter the same information.


    In addition, you need some helper methods such as formatting the credit card’s
    last four digits, the expiration month and year, and the credit card type (Visa,
    Master Card, etc.).


    To get all credit cards for one customer, you need to perform a query. Like you
    have done before, you have a `+(PFQuery *)basicQuery` method, and the `+(PFQuery
    *)queryForOwner: (EMABUser *)owner` method.


    Here is the header file:


    EMABPaymentMethod.h


    `#import <Parse/Parse.h>`


    `#import "Stripe.h"`


    `@class EMABUser;`


    `@interface EMABPaymentMethod : PFObject<PFSubclassing>`


    `@property (nonatomic, copy) NSString *type;`


    `@property (nonatomic, copy) NSString *stripeCustomerId;`


    `@property (nonatomic, copy) NSString *lastFourDigit;`


