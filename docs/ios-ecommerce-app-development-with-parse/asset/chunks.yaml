    \ can jump right in to create a new app.\n\nParse only asks for the name of the\
    \ new app you want to create. In this tutorial, your app name is `EcommerceAppBook`.\
    \ Once you confirm the project name, you will see a project overview similar to\
    \ the one shown in Figure [4-1](#A978-1-4842-1317-9_4_Chapter.html#Fig1).\n\n\
    ![A978-1-4842-1317-9_4_Fig1_HTML.jpg](A978-1-4842-1317-9_4_Fig1_HTML.jpg)\n\n\
    Figure 4-1. A new Parse app\n\nClick the icon part of the summary box, and you\
    \ will then see a dashboard screen. At this point, you only need to get your application\
    \ keys. So click the \"Settings\" tab, which is on top of the dashboard, then\
    \ click \"Keys\" in the left column. You will see a couple of application keys:\
    \ Application ID and Client Key for your iOS app (see Figure [4-2](#A978-1-4842-1317-9_4_Chapter.html#Fig2)).\n\
    \n![A978-1-4842-1317-9_4_Fig2_HTML.jpg](A978-1-4842-1317-9_4_Fig2_HTML.jpg)\n\n\
