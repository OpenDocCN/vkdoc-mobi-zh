    You will use a UITableView to display the product list. The key view for a UITableView
    is its cell. In Xcode, create a PFTableViewCell subclass and name it “EMABProductTableViewCell.”


    In the header file, add a helper method:


    `-(void)configureItem:(EMABProduct *)product;`


    to connect the EMABProduct model and this view. Here is the complete header file:


    EMABProductTableViewCell


    `#import "PFTableViewCell.h"`


    `@class EMABProduct;`


    `@interface EMABProductTableViewCell : PFTableViewCell`


    `-(void)configureItem:(EMABProduct *)product;`


    `@end`


    Figure [6-1](#A978-1-4842-1317-9_6_Chapter.html#Fig1) shows what the product cell
    looks like.


    ![A978-1-4842-1317-9_6_Fig1_HTML.gif](A978-1-4842-1317-9_6_Fig1_HTML.gif)


    Figure 6-1.


    The Product TableView cell


    This product cell consists of three UI elements: a UILabel to show the product
    name, a UILabel to show the product price, and a PFImage to show the product thumbnail.


    Again, use EMABProductTableViewCell category to declare the properties:


    `@interface EMABProductTableViewCell()`


    `@property (nonatomic, weak) IBOutlet UILabel *nameLabel;`


    `@property (nonatomic, weak) IBOutlet UILabel *priceLabel;`


    `@property (nonatomic, weak) IBOutlet PFImageView *thumbnailImageView;`


    `@end`


    In the EMABProductTableViewCell cell, there is only one method `-(void)configureItem:(EMABProduct*)
    product` you need to implement.


    At this point, your EMABProduct has the properties of name, unitPrice, priceUnit,
    and thumbnail; all you need to do is to assign the value of a product object to
    the EMABProductTableViewCell UI properties. EMABProduct has a helper method to
    generate a price with unit; you can use it as the text of priceLabel. To display
    the product’s thumbnail, use the file of thumbnailImageView, and call the loadInBackground.
    The following code shows the complete implementation.


    As discussed in [Chapter 5](#A978-1-4842-1317-9_5_Chapter.html), be sure to set
    `thumbnailImageView` to `nil` before you set its file to be the product’s thumbnail.
    This ensures that ImageView will not show the old image before it displays the
    new image due to the UITableViewCell reuse nature. This is not the only way you
    can achieve this goal. For example, use `-(void)prepareForUse` method in UITableViewCell
    to handle this case.


    `-(void)prepareForReuse{`


    `[super prepareForReuse];`


    `self.nameLabel.text = @"";`


    `self.priceLabel.text = @"";`


    `self.thumbnailImageView.image = nil;`


    `}`


    `-(void)configureItem:(EMABProduct *)product{`


        `self.nameLabel.text = product.name;`


        `self.priceLabel.text = [product friendlyPrice];`


        `self.thumbnailImageView.image = nil;`


        `if (product.thumbnail) {`


            `self.thumbnailImageView.file = product.thumbnail;`


            `[self.thumbnailImageView loadInBackground];`


        `} else`


            `self.thumbnailImageView.image = [UIImage imageNamed:@"default_product_thumbnail"];`


    `}`


    If there is no thumbnail file in the EMABProduct object, use a default image that
    comes with the project.


    ## The Product Controller


    You finished the view part. Now you can move to building the controller. In Xcode,
    create a new PFQueryTableViewController subclass EMABProductsTableViewController.


    In the generated header file, declare a EMABCategory property. When a user selects
    a brand, show the product’s view controller. In this view controller, you create
    a product query based on a brand. Use this brand property to connect a brand table
    view controller and products table view controller.


    `@property (nonatomic, strong) EMABCategory *brand;`


    Here is the complete EMABProductsTableViewController header file:


    EMABProductsTableViewController.h


    `#import <UIKit/UIKit.h>`


    `#import <ParseUI/PFQueryTableViewController.h>`


    `@class EMABCategory;`


    `@interface EMABProductsTableViewController : PFQueryTableViewController`


    `@property (nonatomic, strong) EMABCategory *brand;`


    `@end`


    In the implementation file, you need to have a brand setter method:


    `-(void)setBrand:(EMABCategory *)brand`


    `{`


    `if (_brand != brand) {`


    `_brand = brand;`


    `}`


    `}`


    The `–(void)awakeFromNib` method will look like this:


    `- (void)awakeFromNib {`


    `[super awakeFromNib];`


    `self.parseClassName = kProduct;`


    `self.objectsPerPage = 20;`


    `self.paginationEnabled = YES;`


    `self.pullToRefreshEnabled = YES;`


    `}`


    Also, the `–(PFQuery *)queryForTable` method needs to take brand property into
    account:


    `- (PFQuery *)queryForTable {`


    `PFQuery *query = [EMABProduct queryForCategory:self.brand];`


    `if ([self.objects count] == 0) {`


    `query.cachePolicy = kPFCachePolicyCacheThenNetwork;`


    `}`


    `return query;`


    `}`


    Next, customize the UITableView Datasource; in this case, set the cell height
    to 80.0 point:


    `-(CGFloat)tableView:(UITableView *)tableView heightForRowAtIndexPath:(NSIndexPath
    *)indexPath`


    `{`


    `return 80.0;`


    `}`


    In the same way, use the PFQueryTableViewController custom method`–tableView:cellForRowAtIndexPath:`
    to customize each cell based on given EMABProduct object. Since we load 20 objects
    each page, we add “Load more…” text on cell 21\. The following code shows a complete
    implementation of the method. This method will return an instance of `EMABProductTableViewCell`.
    You also use the `–(void)configureItem:(EMABProduct *)object` method to connect
    a product object and its view.


    `- (EMABProductTableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath
    *)indexPath object:(EMABProduct *)object{`


    `EMABProductTableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@"ProductCell"
    forIndexPath:indexPath];`


    `if (indexPath.row == [[self objects] count]) {`


    `cell.textLabel.text = NSLocalizedString(@"Load More…", @"");`


    `} else {`


    `[cell configureItem:object];`


    `}`


    `return cell;`


    `}`


    The last method handles what happens when a user taps one of the cells. When the
    user taps a project cell, the app is supposed to display a product detail page.
    Since I have not discussed the product detail page yet, insert a comment ( //todo)
    placeholder for now. When a user taps the “Load more…” cell, the next 20 products
    are loaded. Here is the complete implementation:


    `-(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath
    *)indexPath{`


    `if (indexPath.row == [[self objects] count]) {`


    `[self loadNextPage];`


    `} else {`


    `//todo`


    `}`


    `}`


    `@end`


    You are almost ready to run the app in a simulator or on your device. Only one
    more implementation in EMABCategoriesTableViewController is missing. After a user
    taps a brand cell, the Products table view controller should be loaded. Go to
    EMABCategoriesTableViewController.m and add the following code:


    `-(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath
    *)indexPath{`


    `if (indexPath.row == [[self objects] count]) {`


    `[self loadNextPage];`


    `} else {`


    `EMABProductsTableViewController *viewController = [self.storyboard instantiateViewControllerWithIdentifier:@"EMABProductsTableViewController"];`


    `NSIndexPath  *indexPath = [self.tableView indexPathForSelectedRow];`


    `[viewController setBrand:self.objects[indexPath.row]];`


    `[self.navigationController pushViewController:viewController];`


    `}`


    `}`


    Now you can build and run your project, to make sure there is no error.'
  trans: "\n### 产品视图\n\n你将使用 `UITableView` 来展示产品列表。`UITableView` 的关键视图是其单元格。在 Xcode\
    \ 中，创建一个 `PFTableViewCell` 的子类，并将其命名为 `EMABProductTableViewCell`。\n\n在头文件中，添加一个辅助方法：\n\
    \n`-(void)configureItem:(EMABProduct *)product;`\n\n用于连接 `EMABProduct` 模型与该视图。以下是完整的头文件：\n\
    \n`EMABProductTableViewCell`\n\n```\n#import \"PFTableViewCell.h\"\n\n@class EMABProduct;\n\
    \n@interface EMABProductTableViewCell : PFTableViewCell\n\n-(void)configureItem:(EMABProduct\
    \ *)product;\n\n@end\n```\n\n图 6-1 展示了产品单元格的外观。\n\n![A978-1-4842-1317-9_6_Fig1_HTML.gif](img/A978-1-4842-1317-9_6_Fig1_HTML.gif)\n\
    \n**图 6-1.** 产品表格视图单元格\n\n该产品单元格由三个 UI 元素组成：一个 `UILabel` 用于显示产品名称，一个 `UILabel`\
    \ 用于显示产品价格，以及一个 `PFImage` 用于显示产品缩略图。\n\n同样地，使用 `EMABProductTableViewCell` 分类来声明属性：\n\
    \n```\n@interface EMABProductTableViewCell()\n\n@property (nonatomic, weak) IBOutlet\
    \ UILabel *nameLabel;\n@property (nonatomic, weak) IBOutlet UILabel *priceLabel;\n\
    @property (nonatomic, weak) IBOutlet PFImageView *thumbnailImageView;\n\n@end\n\
    ```\n\n在 `EMABProductTableViewCell` 单元格中，你只需要实现一个方法 `-(void)configureItem:(EMABProduct*)\
    \ product`。\n\n此时，你的 `EMABProduct` 已拥有 `name`、`unitPrice`、`priceUnit` 和 `thumbnail`\
    \ 这些属性；你需要做的只是将产品对象的值赋给 `EMABProductTableViewCell` 的 UI 属性。`EMABProduct` 有一个辅助方法用于生成带单位的价格；你可以将其用作\
    \ `priceLabel` 的文本。为了显示产品的缩略图，请使用 `thumbnailImageView` 的 `file` 属性，并调用 `loadInBackground`。以下代码展示了完整的实现。\n\
    \n正如第 5 章中所讨论的，在将 `thumbnailImageView` 的 `file` 设置为产品的缩略图之前，务必将 `thumbnailImageView`\
    \ 设置为 `nil`。这可以确保由于 `UITableViewCell` 的重用特性，`ImageView` 在显示新图像之前不会显示旧图像。这并不是实现此目标的唯一方法。例如，你也可以在\
    \ `UITableViewCell` 中使用 `-(void)prepareForUse` 方法来处理这种情况。\n\n```\n-(void)prepareForReuse{\n\
    \    [super prepareForReuse];\n    self.nameLabel.text = @\"\";\n    self.priceLabel.text\
    \ = @\"\";\n    self.thumbnailImageView.image = nil;\n}\n\n-(void)configureItem:(EMABProduct\
    \ *)product{\n    self.nameLabel.text = product.name;\n    self.priceLabel.text\
    \ = [product friendlyPrice];\n    self.thumbnailImageView.image = nil;\n    if\
    \ (product.thumbnail) {\n        self.thumbnailImageView.file = product.thumbnail;\n\
    \        [self.thumbnailImageView loadInBackground];\n    } else\n        self.thumbnailImageView.image\
    \ = [UIImage imageNamed:@\"default_product_thumbnail\"];\n}\n```\n\n如果 `EMABProduct`\
    \ 对象中没有缩略图文件，则使用项目自带的默认图像。\n\n### 产品控制器\n\n你已经完成了视图部分。现在可以开始构建控制器了。在 Xcode 中，创建一个新的\
    \ `PFQueryTableViewController` 子类 `EMABProductsTableViewController`。\n\n在生成的头文件中，声明一个\
    \ `EMABCategory` 属性。当用户选择一个品牌时，显示产品的视图控制器。在此视图控制器中，你需根据品牌创建一个产品查询。使用这个 `brand`\
    \ 属性来关联品牌表格视图控制器和产品表格视图控制器。\n\n`@property (nonatomic, strong) EMABCategory *brand;`\n\
    \n以下是完整的 `EMABProductsTableViewController` 头文件：\n\n`EMABProductsTableViewController.h`\n\
    \n```\n#import <UIKit/UIKit.h>\n#import <ParseUI/PFQueryTableViewController.h>\n\
    \n@class EMABCategory;\n\n@interface EMABProductsTableViewController : PFQueryTableViewController\n\
    \n@property (nonatomic, strong) EMABCategory *brand;\n\n@end\n```\n\n在实现文件中，你需要实现一个品牌的\
    \ setter 方法：\n\n```\n-(void)setBrand:(EMABCategory *)brand\n{\n    if (_brand\
    \ != brand) {\n        _brand = brand;\n    }\n}\n```\n\n`–(void)awakeFromNib`\
    \ 方法应该如下所示：\n\n```\n- (void)awakeFromNib {\n    [super awakeFromNib];\n    self.parseClassName\
    \ = kProduct;\n    self.objectsPerPage = 20;\n    self.paginationEnabled = YES;\n\
    \    self.pullToRefreshEnabled = YES;\n}\n```\n\n同时，`–(PFQuery *)queryForTable`\
    \ 方法需要考虑 `brand` 属性：\n\n```\n- (PFQuery *)queryForTable {\n    PFQuery *query\
    \ = [EMABProduct queryForCategory:self.brand];\n    if ([self.objects count] ==\
    \ 0) {\n        query.cachePolicy = kPFCachePolicyCacheThenNetwork;\n    }\n \
    \   return query;\n}\n```\n\n接下来，自定义 `UITableView` 的数据源；在此例中，将单元格高度设置为 80.0 点：\n\
    \n```\n-(CGFloat)tableView:(UITableView *)tableView heightForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    return 80.0;\n}\n```\n\n同样地，使用 `PFQueryTableViewController`\
    \ 的自定义方法 `–tableView:cellForRowAtIndexPath:` 来根据给定的 `EMABProduct` 对象自定义每个单元格。由于我们每页加载\
    \ 20 个对象，我们将在第 21 个单元格上添加“加载更多…”文本。以下代码展示了该方法的完整实现。此方法将返回一个 `EMABProductTableViewCell`\
    \ 实例。你还使用 `–(void)configureItem:(EMABProduct *)object` 方法来连接产品对象及其视图。\n\n```\n\
    - (EMABProductTableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath object:(EMABProduct *)object{\n    EMABProductTableViewCell *cell\
    \ = [tableView dequeueReusableCellWithIdentifier:@\"ProductCell\" forIndexPath:indexPath];\n\
    \    if (indexPath.row == [[self objects] count]) {\n        cell.textLabel.text\
    \ = NSLocalizedString(@\"Load More…\", @\"\");\n    } else {\n        [cell configureItem:object];\n\
    \    }\n    return cell;\n}\n```\n\n最后一个方法处理用户点击某个单元格时发生的事件。当用户点击一个产品单元格时，应用程序应显示产品详情页面。由于我尚未讲解产品详情页面，暂时插入一个注释（`//todo`）作为占位符。当用户点击“加载更多…”单元格时，将加载接下来的\
    \ 20 个产品。以下是完整的实现代码：\n\n```\n-(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
    \ *)indexPath{\n    if (indexPath.row == [[self objects] count]) {\n        [self\
    \ loadNextPage];\n    } else {\n        //todo\n    }\n}\n\n@end\n```\n\n你现在几乎已经准备好可以在模拟器或你的设备上运行该应用了。只差在\
    \ `EMABCategoriesTableViewController` 中实现一个功能。当用户点击一个品牌单元格后，应加载产品表格视图控制器。前往 `EMABCategoriesTableViewController.m`\
    \ 并添加以下代码：\n\n```\n-(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
    \ *)indexPath{\n    if (indexPath.row == [[self objects] count]) {\n        [self\
    \ loadNextPage];\n    } else {\n        EMABProductsTableViewController *viewController\
    \ = [self.storyboard instantiateViewControllerWithIdentifier:@\"EMABProductsTableViewController\"\
    ];\n        NSIndexPath  *indexPath = [self.tableView indexPathForSelectedRow];\n\
    \        [viewController setBrand:self.objects[indexPath.row]];\n        [self.navigationController\
    \ pushViewController:viewController];\n    }\n}\n```\n\n现在你可以构建并运行你的项目，确保没有错误。\n"
- fmt: "# Add Sample Data\n\nSo far, you have not added any product for any brand\
    \ yet, so there is nothing to show after you tap a brand. You need to add some\
    \ product data to the Parse back end.\n\nGo to Parse.com, log in, and browse to\
    \ “Core” page of the sample project. Then click “Add Class” and give it a name\
    \ “Product.”\n\nNext, click “+Col”; for the first col, select the String type\
    \ and set its value to “name,” then click “Create Column.” In the same way, add\
    \ “detail” column with String type, “unitPrice” with Number type, “priceUnit”\
    \ with String type, “thumbnail” with PFFile type, and “fullsizeImage” with PFFile\
    \ type. The last one is important; we add a column with a “brand” column with\
    \ Pointer Type, which should point to “Category” class. See Figure [6-2](#A978-1-4842-1317-9_6_Chapter.html#Fig2)\
    \ to see the details.\n\n![A978-1-4842-1317-9_6_Fig2_HTML.jpg](A978-1-4842-1317-9_6_Fig2_HTML.jpg)\n\
    \nFigure 6-2.\n\nAdd a Pointer type in Parse\n\nNow it’s time to add product data.\
    \ I have prepared three Esta Louder products. You can also find images for these\
    \ brands for demo purposes. Or just use the images I have prepared for the [Chapter\
    \ 6](#A978-1-4842-1317-9_6_Chapter.html) project source code.\n\nNext, click the\
    \ “+Row” button. Parse creates an empty row with an “undefined” placeholder for\
    \ each column. You have multiple columns to fill. One of the most important ones\
    \ is the “brand” column.\n\nFirst, tap “Category” class and find the row for Esta\
    \ Louder. Copy the value of the “objectId” column for this row. Then move to “Product”\
    \ class, tap the “(undefined)” area in “brand” column, and paste the “objectId”\
    \ value. Now you can add a product name, product summary, unit price, and use\
    \ “ea” for `priceUnit`; then upload a thumbnail and full-size image for this product.\n\
    \nFollowing the previous steps, add two more rows.\n\nReturn to your Xcode project\
    \ or open the app on the simulator or your device. Now, on the brand screen, when\
    \ you tap the Esta Louder cell, you should see the three products you just added.\n\
    \n# Add a Search Feature\n\nOne of the required features for the app is that a\
    \ customer can search products based on part of a product name in the product\
    \ list view. When dealing with searching, one can implement to only search from\
    \ loaded data, or search your back-end data store to find all matches. Obviously\
    \ searching from loaded data is much quicker, but the results are also limited.\
    \ It might turn out results are not found. So the best approach is to search on\
    \ the back end.\n\nCurrently search in the app is limited. A user can only search\
    \ products based on product names. For example, an Esta Louder product name contains\
    \ the “Night Repair” string. If a user enters “Night” in a search box, the app\
    \ won’t find all products whose name or detail contains “Night.” And the search\
    \ keyword is case sensitive. If a user enters “night” instead of “Night,” all\
    \ products whose names contain “Night” won’t be returned. To get around this limitation,\
    \ you can preprocess the user’s input and capitalize each word.\n\nFirst, add\
    \ a new query method to the `EMABProduct` model class. Declare this method in\
    \ the header file:\n\n`EMABProduct.h`\n\n`+(PFQuery *)queryForCategory:(EMABCategory\
    \ *)brand keyword:(NSString *)keyword;`\n\nIn its implementation, call the `+(PFQuery\
    \ *)queryForCategory:(EMABCategory *)brand` method, and add another query condition:\n\
    `– whereKey:containsString:`\n\nHere is the complete implementation:\n\n```\n\
    +(PFQuery *)queryForCategory:(EMABCategory *)brand keyword:(NSString *)keyword\n\
    {\n    PFQuery *query = [self queryForCategory:brand];\n    [query whereKey:@\"\
    name\" containsString:keyword];\n    return query;\n}\n```\n\nNext, to the controller.\
    \ There are a few places you need to implement.\n\nFirst, you need to keep track\
    \ of the user’s search keyword; add a new property in the `EMABProductsTableViewController`\
    \ category:\n\n`@property (nonatomic, copy) NSString *keyword;`\n\nSecond, you\
    \ also need to declare `UISearchBar` delegate protocol in the class category:\n\
    \n`@interface EMABProductsTableViewController()<UISearchBarDelegate>`\n\nThird,\
    \ you need to connect the `UISearchBar` to view controller delegate (you already\
    \ added a `UISearchBar` in controller xib file in [Chapter 5](#A978-1-4842-1317-9_5_Chapter.html)).\
    \ Figure [6-3](#A978-1-4842-1317-9_6_Chapter.html#Fig3) shows how to connect it.\n\
    \n![A978-1-4842-1317-9_6_Fig3_HTML.jpg](A978-1-4842-1317-9_6_Fig3_HTML.jpg)\n\n\
    Figure 6-3.\n\nThe UISearchBar delegate\n\nHere is the complete implementation:\n\
    \n`EMABProductsTableViewController.m`\n\n```\n@interface EMABProductsTableViewController()<UISearchBarDelegate>\n\
    @property (nonatomic, weak) IBOutlet UISearchBar *searchBar;\n@property (nonatomic,\
    \ copy) NSString *keyword;\n@end;\n```\n\nFourth, implement the `UISearchBar`\
    \ delegate method:\n\n```\n- (void)searchBarSearchButtonClicked:(UISearchBar *)searchBar\n\
    {\n    if ([searchBar.text length] > 0) {\n        [searchBar resignFirstResponder];\n\
    \        self.keyword = searchBar.text;\n        [self clear];\n        [self\
    \ loadObjects];\n    }\n}\n```\n\nCheck if there is any text in the search bar\
    \ (`searchBar`). If there is, dismiss the keyboard, let the keyword be the `searchBar`’s\
    \ text, and call the `PFQueryTableViewController`’s method, `-(void)clear`, to\
    \ clear the `UITableView`. Finally, use another `PFQueryTableViewController`’s\
    \ method `-(void)loadObjects` to fire up another query. This time, use a different\
    \ query for this search purpose.\n\nFifth, modify `– (PFQuery *)queryForTable`\
    \ as shown here:\n\n```\n- (PFQuery *)queryForTable {\n    PFQuery *query = [EMABProduct\
    \ queryForCategory:self.brand];\n    if (self.keyword) {\n        query = [EMABProduct\
    \ queryForCategory:self.brand keyword:self.keyword];\n    }\n    if ([self.objects\
    \ count] == 0) {\n        query.cachePolicy = kPFCachePolicyCacheThenNetwork;\n\
    \    }\n    return query;\n}\n```\n\nIn this implementation, the default query\
    \ is `[EMABProduct queryForCategory:self.brand]`. A search query is done only\
    \ if `self.keyword` is not equal to `nil`. In step 4, `[self loadObjects]` will\
    \ use `–(PFQuery *)queryForTable` again; that’s how you use the `queryForCategory:`\
    \ keyword:\n\n```\nif (self.keyword) {\n    query = [EMABProduct queryForCategory:self.brand\
    \ keyword:self.keyword];\n}\n```\n\nFor this reason, you need to set `self.keyword`\
    \ to `nil` after we finish the search. You can do it at `–(void)viewWillAppear`\n\
    \n```\n-(void)viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
    \    self.keyword = nil;\n}\n```\n\nSometimes a user intents to perform a search,\
    \ taps the `UISearchBar`, but then decides to give up. Tapping `UISearchBar` will\
    \ bring up the soft keyboard; so you need to dismiss the keyboard."
  raw: '## Add Sample Data


    So far, you have not added any product for any brand yet, so there is nothing
    to show after you tap a brand. You need to add some product data to the Parse
    back end.


    Go to Parse.com, log in, and browse to “Core” page of the sample project. Then
    click “Add Class” and give it a name “Product.”


    Next, click “+Col”; for the first col, select the String type and set its value
    to “name,” then click “Create Column.” In the same way, add “detail” column with
    String type, “unitPrice” with Number type, “priceUnit” with String type, “thumbnail”
    with PFFile type, and “fullsizeImage” with PFFile type. The last one is important;
    we add a column with a “brand” column with Pointer Type, which should point to
    “Category” class. See Figure [6-2](#A978-1-4842-1317-9_6_Chapter.html#Fig2) to
    see the details.


    ![A978-1-4842-1317-9_6_Fig2_HTML.jpg](A978-1-4842-1317-9_6_Fig2_HTML.jpg)


    Figure 6-2.


    Add a Pointer type in Parse


    Now it’s time to add product data. I have prepared three Esta Louder products.
    You can also find images for these brands for demo purposes. Or just use the images
    I have prepared for the [Chapter 6](#A978-1-4842-1317-9_6_Chapter.html) project
    source code.


    Next, click the “+Row” button. Parse creates an empty row with an “undefined”
    placeholder for each column. You have multiple columns to fill. One of the most
    important ones is the “brand” column.


    First, tap “Category” class and find the row for Esta Louder. Copy the value of
    the “objectId” column for this row. Then move to “Product” class, tap the “(undefined)”
    area in “brand” column, and paste the “objectId” value. Now you can add a product
    name, product summary, unit price, and use “ea” for priceUnit; then upload a thumbnail
    and full-size image for this product.


    Following the previous steps, add two more rows.


    Return to your Xcode project or open the app on the simulator or your device.
    Now, on the brand screen, when you tap the Esta Louder cell, you should see the
    three products you just added.


    ## Add a Search Feature


    One of the required features for the app is that a customer can search products
    based on part of a product name in the product list view. When dealing with searching,
    one can implement to only search from loaded data, or search your back-end data
    store to find all matches. Obviously searching from loaded data is much quicker,
    but the results are also limited. It might turn out results are not found. So
    the best approach is to search on the back end.


    Currently search in the app is limited. A user can only search products based
    on product names. For example, an Esta Louder product name contains the “Night
    Repair” string. If a user enters “Night” in a search box, the app won’t find all
    products whose name or detail contains “Night.” And the search keyword is case
    sensitive. If a user enters “night” instead of “Night,” all products whose names
    contain “Night” won’t be returned. To get around this limitation, you can preprocess
    the user’s input and capitalize each word.


    First, add a new query method to the EMABProduct model class. Declare this method
    in the header file:


    EMABProduct.h


    `+(PFQuery *)queryForCategory:(EMABCategory *)brand keyword:(NSString *)keyword;`


    In its implementation, call the `+(PFQuery *)queryForCategory:(EMABCategory *)brand`
    method, and add another query condition:


    `– whereKey:containsString:`


    Here is the complete implementation:


    `+(PFQuery *)queryForCategory:(EMABCategory *)brand keyword:(NSString *)keyword`


    `{`


    `PFQuery *query = [self queryForCategory:brand];`


    `[query whereKey:@"name" containsString:keyword];`


    `return query;`


    `}`


    Next, to the controller. There are a few places you need to implement.


    First, you need to keep track of the user’s search keyword; add a new property
    in the EMABProductsTableViewController category:


    `@property (nonatomic, copy) NSString *keyword;`


    Second, you also need to declare UISearchBar delegate protocol in the class category:


    `@interface EMABProductsTableViewController()<UISearchBarDelegate>`


    Third, you need to connect the UISearchbar to view controller delegate (you already
    added a UISearchBar in controller xib file in [Chapter 5](#A978-1-4842-1317-9_5_Chapter.html)).
    Figure [6-3](#A978-1-4842-1317-9_6_Chapter.html#Fig3) shows how to connect it.


    ![A978-1-4842-1317-9_6_Fig3_HTML.jpg](A978-1-4842-1317-9_6_Fig3_HTML.jpg)


    Figure 6-3.


    The UISearchBar delegate


    Here is the complete implementation:


    EMABProductsTableViewController.m


    `@interface EMABProductsTableViewController()<UISearchBarDelegate>`


    `@property (nonatomic, weak) IBOutlet UISearchBar *searchBar;`


    `@property (nonatomic, copy) NSString *keyword;`


    `@end;`


    Fourth, implement the UISearchBar delegate method:


    `- (void)searchBarSearchButtonClicked:(UISearchBar *)searchBar`


    `{`


    `if ([searchBar.text length] > 0) {`


    `[searchBar resignFirstResponder];`


    `self.keyword = searchBar.text;`


    `[self clear];`


    `[self loadObjects];`


    `}`


    `}`


    Check if there is any text in the search bar (searchBar). If there is, dismiss
    the keyboard, let the keyword be the searchBar’s text, and call the PFQueryTableViewController’s
    method, `–(void)clear`, to clear the UITableView. Finally, use another PFQueryTableViewController’s
    method`–(void)loadObjects` to fire up another query. This time, use a different
    query for this search purpose.


    Fifth, modify `– (PFQuery *)queryForTable` as shown here:


    `- (PFQuery *)queryForTable {`


    `PFQuery *query = [EMABProduct queryForCategory:self.brand];`


    `if (self.keyword) {`


    `query = [EMABProduct queryForCategory:self.brand keyword:self.keyword];`


    `}`


    `if ([self.objects count] == 0) {`


    `query.cachePolicy = kPFCachePolicyCacheThenNetwork;`


    `}`


    `return query;`


    `}`


    In this implementation, the default query is `[EMABProduct queryForCategory:self.brand]`.
    A search query is done only if `self.keyword` is not equal to `nil`. In step 4,
    `[self loadObjects]` will use `–(PFQuery *)queryForTable` again; that’s how you
    use the `queryForCategory:` keyword:


    `if (self.keyword) {`


    `query = [EMABProduct queryForCategory:self.brand keyword:self.keyword];`


    `}`


    For this reason, you need to set `self.keyword` to `nil` after we finish the search.
    You can do it at `–(void)viewWillAppear`


    `-(void)viewWillAppear:(BOOL)animated`


    `{`


    `[super viewWillAppear:animated];`


    `self.keyword = nil;`


    `}`


    Sometimes a user intents to perform a search, taps the UISearchBar, but then decides
    to give up. Tapping UISearchBar will bring up the soft keyboard; so you need to
    dismiss the keyboard.'
  trans: "\n# 添加示例数据\n\n到目前为止，您尚未为任何品牌添加产品，因此点击品牌后不会显示任何内容。您需要向 Parse 后端添加一些产品数据。\n\
    \n前往 Parse.com，登录并浏览至示例项目的“Core”页面。然后点击“Add Class”，并将其命名为“Product”。\n\n接下来，点击“+Col”；对于第一列，选择\
    \ String 类型并将其值设为“name”，然后点击“Create Column”。以相同方式添加 String 类型的“detail”列、Number\
    \ 类型的“unitPrice”列、String 类型的“priceUnit”列、PFFile 类型的“thumbnail”列以及 PFFile 类型的“fullsizeImage”列。最后一列很重要：我们添加一个\
    \ Pointer 类型的“brand”列，它应指向“Category”类。详情请参见图 6-2。\n\n![A978-1-4842-1317-9_6_Fig2_HTML.jpg](img/A978-1-4842-1317-9_6_Fig2_HTML.jpg)\n\
    \n图 6-2.\n\n在 Parse 中添加 Pointer 类型\n\n现在该添加产品数据了。我准备了三个 Esta Louder 产品。您也可以为这些品牌找到用于演示的图片。或者直接使用我为第\
    \ 6 章项目源代码准备的图片。\n\n接着，点击“+Row”按钮。Parse 会创建一个空行，并为每一列显示“undefined”占位符。您需要填充多个列。其中最重要的列之一是“brand”列。\n\
    \n首先，点击“Category”类，找到 Esta Louder 所在的行。复制该行“objectId”列的值。然后转到“Product”类，点击“brand”列中的“(undefined)”区域，粘贴“objectId”值。现在您可以添加产品名称、产品简介、单价，并将\
    \ `priceUnit` 设为“ea”；然后为此产品上传缩略图和全尺寸图片。\n\n按照上述步骤，再添加两行。\n\n返回您的 Xcode 项目，或在模拟器或设备上打开应用。现在，在品牌页面中，当您点击\
    \ Esta Louder 单元格时，应该能看到刚刚添加的三个产品。\n\n# 添加搜索功能\n\n应用的一项必备功能是，客户能在产品列表视图中根据产品名称的一部分搜索产品。处理搜索时，可以实现仅从已加载数据中搜索，或在后端数据存储中搜索所有匹配项。显然，从已加载数据中搜索速度更快，但结果也有限，可能导致找不到结果。因此最佳方法是在后端进行搜索。\n\
    \n目前应用中的搜索功能有限。用户只能根据产品名称搜索产品。例如，一个 Esta Louder 的产品名称中包含“Night Repair”字符串。如果用户在搜索框中输入“Night”，应用不会找到所有名称或详情中包含“Night”的产品。并且搜索关键字是区分大小写的。如果用户输入“night”而非“Night”，所有名称包含“Night”的产品都不会被返回。要解决此限制，您可以预处理用户输入并将每个单词的首字母大写。\n\
    \n首先，在 `EMABProduct` 模型类中添加一个新的查询方法。在头文件中声明该方法：\n\n`EMABProduct.h`\n\n`+(PFQuery\
    \ *)queryForCategory:(EMABCategory *)brand keyword:(NSString *)keyword;`\n\n在其实现中，调用\
    \ `+(PFQuery *)queryForCategory:(EMABCategory *)brand` 方法，并添加另一个查询条件：\n`– whereKey:containsString:`\n\
    \n以下是完整的实现代码：\n\n```\n+(PFQuery *)queryForCategory:(EMABCategory *)brand keyword:(NSString\
    \ *)keyword\n{\n    PFQuery *query = [self queryForCategory:brand];\n    [query\
    \ whereKey:@\"name\" containsString:keyword];\n    return query;\n}\n```\n\n接下来，处理控制器。有几个地方需要实现。\n\
    \n首先，您需要跟踪用户的搜索关键字；在 `EMABProductsTableViewController` 类别中添加一个新属性：\n\n`@property\
    \ (nonatomic, copy) NSString *keyword;`\n\n其次，您还需要在类类别中声明 `UISearchBar` 委托协议：\n\
    \n`@interface EMABProductsTableViewController()<UISearchBarDelegate>`\n\n第三，您需要将\
    \ `UISearchBar` 连接到视图控制器委托（您在第 5 章中已在控制器 xib 文件中添加了 `UISearchBar`）。图 6-3 显示了如何连接。\n\
    \n![A978-1-4842-1317-9_6_Fig3_HTML.jpg](img/A978-1-4842-1317-9_6_Fig3_HTML.jpg)\n\
    \n图 6-3.\n\nUISearchBar 委托\n\n以下是完整的实现代码：\n\n`EMABProductsTableViewController.m`\n\
    \n```\n@interface EMABProductsTableViewController()<UISearchBarDelegate>\n@property\
    \ (nonatomic, weak) IBOutlet UISearchBar *searchBar;\n@property (nonatomic, copy)\
    \ NSString *keyword;\n@end;\n```\n\n第四，实现 `UISearchBar` 委托方法：\n\n```\n- (void)searchBarSearchButtonClicked:(UISearchBar\
    \ *)searchBar\n{\n    if ([searchBar.text length] > 0) {\n        [searchBar resignFirstResponder];\n\
    \        self.keyword = searchBar.text;\n        [self clear];\n        [self\
    \ loadObjects];\n    }\n}\n```\n\n检查搜索栏（`searchBar`）中是否有文本。如果有，则关闭键盘，将关键字设为 `searchBar`\
    \ 的文本，并调用 `PFQueryTableViewController` 的方法 `-(void)clear` 来清空 `UITableView`。最后，使用另一个\
    \ `PFQueryTableViewController` 的方法 `-(void)loadObjects` 触发新的查询。这次，为此搜索目的使用不同的查询。\n\
    \n第五，修改 `– (PFQuery *)queryForTable`，如下所示：\n\n```\n- (PFQuery *)queryForTable\
    \ {\n    PFQuery *query = [EMABProduct queryForCategory:self.brand];\n    if (self.keyword)\
    \ {\n        query = [EMABProduct queryForCategory:self.brand keyword:self.keyword];\n\
    \    }\n    if ([self.objects count] == 0) {\n        query.cachePolicy = kPFCachePolicyCacheThenNetwork;\n\
    \    }\n    return query;\n}\n```\n\n在此实现中，默认查询是 `[EMABProduct queryForCategory:self.brand]`。仅当\
    \ `self.keyword` 不等于 `nil` 时才会执行搜索查询。在第 4 步中，`[self loadObjects]` 会再次使用 `–(PFQuery\
    \ *)queryForTable`；这就是您使用 `queryForCategory:` 关键字的方式：\n\n```\nif (self.keyword)\
    \ {\n    query = [EMABProduct queryForCategory:self.brand keyword:self.keyword];\n\
    }\n```\n\n因此，您需要在搜索完成后将 `self.keyword` 设为 `nil`。这可以在 `–(void)viewWillAppear` 中完成：\n\
    \n```\n-(void)viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
    \    self.keyword = nil;\n}\n```\n\n有时用户打算执行搜索，点击了 `UISearchBar`，但随后决定放弃。点击 `UISearchBar`\
    \ 会弹出软键盘；因此您需要关闭键盘。\n"
- fmt: "# Add a Filter Option\n\nAs part of the product feature, a user can filter\
    \ products based on properties such as price. Similarly, you can filter products\
    \ from loaded results, or query the remote server to get new results based on\
    \ query criteria. In this implementation, you learn how to query your remote server.\n\
    \nIn the sample app’s UI design, when a user taps a “Filter” bar button item,\
    \ a new `UIViewController` will be shown. The user will slide two sliders to determine\
    \ the minimum and maximum price he or she is interested in. Once the price range\
    \ is set, the user taps the “Done” bar button item. This view controller will\
    \ be dismissed and the product list view controller will be updated with new search\
    \ results. Figure [6-4](#A978-1-4842-1317-9_6_Chapter.html#Fig4) shows all UI\
    \ elements.\n\n![A978-1-4842-1317-9_6_Fig4_HTML.jpg](A978-1-4842-1317-9_6_Fig4_HTML.jpg)\n\
    \n**Figure 6-4.** The `EMABProductsFilterViewController` UI elements\n\nFirst,\
    \ add a new method in the `EMABProduct` model class. In the header file, declare\
    \ this method as shown here:\n\n`EMABProduct.h`\n\n```\n+(PFQuery *)queryForCategory:(EMABCategory\
    \ *)brand minPrice:(float)min maxPrice:(float)max;\n```\n\nIn this method, you\
    \ query a brand based on the minimum price and the maximum price a user specifies.\n\
    \nFor the implementation, use `PFQuery`’s `–whereKey:lessThanOrEqualTo:` and `–whereKey:greaterThanOrEqualTo:`\
    \ to help filter products from server.\n\n`EMABProduct.m`\n\n```\n+(PFQuery *)queryForCategory:(EMABCategory\
    \ *)brand minPrice:(float)min maxPrice:(float)max{\n    PFQuery *query = [self\
    \ queryForCategory:brand];\n    [query whereKey:@\"price\" greaterThanOrEqualTo:@(min)];\n\
    \    [query whereKey:@\"price\" lessThanOrEqualTo:@(max)];\n    return query;\n\
    }\n```\n\nNext, create a new `UIViewController` subclass `EMABProductsFilterViewController`.\
    \ In its header file, create one `typedef` to make the code a bit more readable:\n\
    \n```\ntypedef void (^ViewControllerDidFinish)(EMABProductsFilterViewController\
    \ *viewController, float minPrice, float maxPrice);\n```\n\nThis one is used to\
    \ handle after a user taps the “Done” bar button item.\n\nContinue to create two\
    \ interface properties:\n\n```\n@property (nonatomic, copy) ViewControllerDidFinish\
    \ finishBlock;\n```\n\nThere are quite a few things you need to do just to handle\
    \ the set of price ranges. First, use two ivars to keep track of the minimum and\
    \ the maximum price. Since you also need to update your view controller UI of\
    \ what the current slider value is, you also need another `UILabels`. Furthermore,\
    \ to keep track of `UISlider`’s value, create two properties for them. Here is\
    \ the complete implementation:\n\n```\n@interface EMABProductsFilterViewController\
    \ (){\n    float minPrice;\n    float maxPrice;\n}\n\n@property (nonatomic, weak)\
    \ IBOutlet UILabel *minLabel;\n@property (nonatomic, weak) IBOutlet UILabel *maxLabel;\n\
    @property (nonatomic, weak) IBOutlet UISlider *minSlider;\n@property (nonatomic,\
    \ weak) IBOutlet UISlider *maxSlider;\n\n@end\n```\n\nIn the implementation, initialize\
    \ your ivars in `–(void)viewDidLoad`:\n\n```\n- (void)viewDidLoad {\n    [super\
    \ viewDidLoad];\n    minPrice = 0.0;\n    maxPrice = 0.0;\n}\n```\n\nCreate an\
    \ `IBAction` method for two `UISliders`, call it `onSlider`. When a user slides\
    \ any of the sliders, update its value to `UILabel`. Also let `minPrice` and `maxPrice`\
    \ keep track of the sliders’ value.\n\n```\n-(IBAction)onSlider:(id)sender{\n\
    \    UISlider *slider = (UISlider *)sender;\n    NSString *friendlySliderValue\
    \ = [NSString stringWithFormat:@\"%.0f\",slider.value];\n    if (slider.tag ==\
    \ 99) {\n        minPrice = slider.value;\n        self.minLabel.text = friendlySliderValue;\n\
    \    } else {\n        maxPrice = slider.value;\n        self.maxLabel.text =\
    \ friendlySliderValue;\n    }\n}\n```\n\nAdd an `IBAction` for the “Cancel” bar\
    \ button item as shown in the following snippet; basically, you just pop the current\
    \ view controller:\n\n```\n-(IBAction)onCancel:(id)sender{\n    [self.navigationController\
    \ popViewControllerAnimated:YES];\n}\n```\n\nFinally, add an `IBAction` for the\
    \ “Done” bar button item as shown in the following snippet. How do you handle\
    \ the case when a user has not done anything but just tap “Done”? In this scenario,\
    \ you will remind the user that you need more information or the user needs to\
    \ enter his or her input more accurately.\n\n```\n-(IBAction)onDone:(id)sender{\n\
    \    if (minPrice > 0 && minPrice < maxPrice) {\n        UIAlertView *alertView\
    \ = [[UIAlertView alloc] initWithTitle:NSLocalizedString(@\"Error\", @\"Error\"\
    ) message:NSLocalizedString(@\"Please make sure your max price is greater than\
    \ your min price.\", @\"\") delegate:nil cancelButtonTitle:NSLocalizedString(@\"\
    OK\", @\"OK\") otherButtonTitles:nil, nil];\n        [alertView show];\n    }\
    \ else {\n        self.finishBlock(self, minPrice, maxPrice);\n        [self.navigationController\
    \ popViewControllerAnimated:YES];\n    }\n}\n\n@end\n```\n\nFinally, return back\
    \ to `EMABProductsViewController`. In a similar fashion, add two ivars:\n\n```\n\
    @interface EMABProductsTableViewController()<UISearchBarDelegate>{\n    float\
    \ minPrice;\n    float maxPrice;\n}\n```\n\nNext, add the following `IBAction`\
    \ method to handle while a user taps “Filter” bar button item. In this method,\
    \ you will need to do a few things. First, present the `EMABProductsFilterViewController`;\
    \ then, handle the minimum and maximum price a user sets; next, clear the current\
    \ table view; and finally, perform a query. Here is the complete implementation.\n\
    \n```\n-(IBAction)onFilter:(id)sender\n{\n    EMABProductsFilterViewController\
    \ *viewController = (EMABProductsFilterViewController *)[self.storyboard instantiateViewControllerWithIdentifier:@\"\
    EMABProductsFilterViewController\"];\n    viewController.finishBlock = ^(EMABProductsFilterViewController\
    \ *viewControlle, float minValue, float maxValue){\n        minPrice = minValue;\n\
    \        maxPrice = maxValue;\n        self.keyword = nil;\n        [self clear];\n\
    \        [self loadObjects];\n    };\n    [self.navigationController presentViewController:viewController\
    \ animated:YES completion:nil];\n}\n```\n\nLastly, you need to modify `-(PFQuery\
    \ *)queryForTable` as shown here:\n\n```\n- (PFQuery *)queryForTable {\n    PFQuery\
    \ *query = [EMABProduct queryForCategory:self.brand];\n    if (self.keyword) {\n\
    \        query = [EMABProduct queryForCategory:self.brand keyword:self.keyword];\n\
    \    }\n    if (minPrice > 0 && maxPrice>0) {\n        query = [EMABProduct queryForCategory:self.brand\
    \ minPrice:minPrice maxPrice:maxPrice];\n    }\n    if ([self.objects count] ==\
    \ 0) {\n        query.cachePolicy = kPFCachePolicyCacheThenNetwork;\n    }\n \
    \   return query;\n}\n```\n\nDon’t forget to connect “Filter” `UIBarButtonItem`\
    \ to the method.\n\nNow it’s time to build and run the project.\n\n## Summary\n\
    \nIn this chapter, I covered the topics of showing a product list under a product\
    \ category, searching products based on name, and filtering products based on\
    \ price.\n\n# 7. The Product Detail Screen\n\nElectronic supplementary material\
    \ The online version of this chapter (doi:[10.1007/978-1-4842-1317-9_7](http://dx.doi.org/10.1007/978-1-4842-1317-9_7))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    In this chapter you learn how to implement the product detail screen, which includes\
    \ information such as the product name, price, detail, and full-size image; the\
    \ screen also includes a share menu as well as the option to buy a product or\
    \ add it to a favorites list."
  raw: '## Add a Filter Option


    As part of the product feature, a user can filter products based on properties
    such as price. Similarly, you can filter products from loaded results, or query
    the remote server to get new results based on query criteria. In this implementation,
    you learn how to query your remote server.


    In the sample app’s UI design, when a user taps a “Filter” bar button item, and
    a new UIViewController will be shown. The user will slide two sliders to determine
    the minimum and maximum price he or she is interested in. Once the price range
    is set, the user taps the “Done” bar button item. This view controller will be
    dismissed and the product list view controller will be updated with new search
    results. Figure [6-4](#A978-1-4842-1317-9_6_Chapter.html#Fig4) shows all UI elements.


    ![A978-1-4842-1317-9_6_Fig4_HTML.jpg](A978-1-4842-1317-9_6_Fig4_HTML.jpg)


    Figure 6-4.


    The EMABProductsFilterViewController UI elements


    First, add a new method in the EMABProduct model class. In the header file, declare
    this method as shown here:


    EMABProduct.h


    `+(PFQuery *)queryForCategory:(EMABCategory *)brand minPrice:(float)min maxPrice:(float)max;`


    In this method, you query a brand based on the minimum price and the maximum price
    a user specifies.


    For the implementation, use PFQuery’s `–whereKey:lessThanOrEqualTo:` and `–whereKey:greaterThanOrEqualTo:`
    to help filter products from server.


    EMABProduct.m


    `+(PFQuery *)queryForCategory:(EMABCategory *)brand minPrice:(float)min maxPrice:(float)max{`


        `PFQuery *query = [self queryForCategory:brand];`


        `[query whereKey:@"price" greaterThanOrEqualTo:@(min)];`


        `[query whereKey:@"price" lessThanOrEqualTo:@(max)];`


        `return query;`


    `}`


    Next, create a new UIViewController subclass “EMABProductsFilterViewController.”
    In its header file, create one typedef to make the code a bit more readable:


    `typedef void (^ViewControllerDidFinish)(EMABProductsFilterViewController *viewController,
    float minPrice, float maxPrice);`


    The one is used to handle after a user taps the “Done” bar button item.


    Continue to create two interface properties:


    `@property (nonatomic, copy) ViewControllerDidFinish finishBlock;`


    There are quite a few things you need to do just to handle the set of price ranges.
    First, use two ivars to keep track of the minimum and the maximum price. Since
    you also need to update your view controller UI of what the current slider value
    is, you also need another UILabels. Furthermore, to keep track of UISlider’s value,
    create two properties for them. Here is the complete implementation:


    `@interface EMABProductsFilterViewController (){`


        `float minPrice;`


        `float maxPrice;`


    `}`


    `@property (nonatomic, weak) IBOutlet UILabel *minLabel;`


    `@property (nonatomic, weak) IBOutlet UILabel *maxLabel;`


    `@property (nonatomic, weak) IBOutlet UISlider *minSlider;`


    `@property (nonatomic, weak) IBOutlet UISlider *maxSlider;`


    `@end`


    In the implementation, initialize your ivars in `–(void)viewDidLoad`:


    `- (void)viewDidLoad {`


        `[super viewDidLoad];`


        `minPrice = 0.0;`


        `maxPrice = 0.0;`


    `}`


    Create an IBAction method for two UISliders, call it onSlider. When a user slides
    any of the sliders, update its value to UILabel. Also let minPrice and maxPrice
    keep track of the sliders’ value.


    `-(IBAction)onSlider:(id)sender{`


        `UISlider *slider = (UISlider *)sender;`


        `NSString *friendlySliderValue = [NSString stringWithFormat:@"%.0f",slider.value];;`


        `if (slider.tag == 99) {`


            `minPrice = slider.value;`


            `self.minLabel.text = friendlySliderValue;`


        `} else {`


            `maxPrice = slider.value;`


            `self.maxLabel.text = friendlySliderValue;`


        `}`


    `}`


    Add an IBAction for the “Cancel” bar button item as shown in the following snippet;
    basically, you just pop the current view controller:


    `-(IBAction)onCancel:(id)sender{`


        `[self.navigationController popViewControllerAnimated:YES];`


    `}`


    Finally, add an IBAction for the “Done” bar button item as shown in the following
    snippet. How do you handle the case when a user has not done anything but just
    tap “Done”? In this scenario, you will remind the user that you need more information
    or the user needs to enter his or her input more accurately.


    `-(IBAction)onDone:(id)sender{`


        `if (minPrice > 0 && minPrice < maxPrice) {`


            `UIAlertView *alertView = [[UIAlertView alloc] initWithTitle:NSLocalizedString(@"Error",
    @"Error") message:NSLocalizedString(@"Please make sure your max price is greater
    than your min price.", @"") delegate:nil cancelButtonTitle:NSLocalizedString(@"OK",
    @"OK") otherButtonTitles:nil, nil];`


            `[alertView show];`


        `} else {`


            `self.finishBlock(self, minPrice, maxPrice);`


            `[self.navigationController popViewControllerAnimated:YES];`


        `}`


    `}`


    `@end`


    Finally, return back to EMABProductsViewController. In a similar fashion, add
    two ivars:


    `@interface EMABProductsTableViewController()<UISearchBarDelegate>{`


        `float minPrice;`


        `float maxPrice;`


    `}`


    Next, add the following IBAction method to handle while a user taps “Filter” bar
    button item. In this method, you will need to do a few things. First, present
    the EMABProductsFilterViewController; then, handle the minimum and maximum price
    a user sets; next, clear the current table view; and finally, perform a query.
    Here is the complete implementation.


    `-(IBAction)onFilter:(id)sender`


    `{`


        `EMABProductsFilterViewController *viewController = (EMABProductsFilterViewController
    *)[self.storyboard instantiateViewControllerWithIdentifier:@"EMABProductsFilterViewController"];`


      `viewController.finishBlock = ^(EMABProductsFilterViewController *viewControlle,
    float minValue, float maxValue){`


            `minPrice = minValue;`


            `maxPrice = maxValue;`


            `self.keyword = nil;`


            `[self clear];`


            `[self loadObjects];`


        `};`


        `[self.navigationController presentViewController:viewController animated:YES
    completion:nil];`


    `}`


    Lastly, you need to modify -(PFQuery *)queryForTable as shown here:


    `- (PFQuery *)queryForTable {`


        `PFQuery *query = [EMABProduct queryForCategory:self.brand];`


        `if (self.keyword) {`


            `query = [EMABProduct queryForCategory:self.brand keyword:self.keyword];`


        `}`


      `if (minPrice > 0 && maxPrice>0) {`


       `query = [EMABProduct queryForCategory:self.brand minPrice:minPrice maxPrice:maxPrice];`


    `}`


        `if ([self.objects count] == 0) {`


            `query.cachePolicy = kPFCachePolicyCacheThenNetwork;`


        `}`


        `return query;`


    `}`


    Don’t forget to connect “Filter” UIBarButtonItem to the method.


    Now it’s time to build and run the project.


    ## Summary


    In this chapter, I covered the topics of showing a product list under a product
    category, searching products based on name, and filtering products based on price.


    # 7. The Product Detail Screen


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1317-9_​7](http://dx.doi.org/10.1007/978-1-4842-1317-9_7))
    contains supplementary material, which is available to authorized users.


    In this chapter you learn how to implement the product detail screen, which includes
    information such as the product name, price, detail, and full-size image; the
    screen also includes a share menu as well as the option to buy a product or add
    it to a favorites list.'
  trans: "\n# 添加筛选选项\n\n作为产品功能的一部分，用户可以基于价格等属性筛选产品。同理，你也可以从已加载的结果中筛选产品，或根据查询条件向远程服务器发送请求以获取新结果。在本实现中，你将学习如何查询远程服务器。\n\
    \n在示例应用的界面设计中，当用户点击“筛选”栏按钮项时，会显示一个新的`UIViewController`。用户通过滑动两个滑块来确定自己感兴趣的最低和最高价格。设定价格范围后，用户点击“完成”栏按钮项。该视图控制器将被关闭，产品列表视图控制器会更新为新的搜索结果。图\
    \ 6-4 展示了所有界面元素。\n\n![A978-1-4842-1317-9_6_Fig4_HTML.jpg](img/A978-1-4842-1317-9_6_Fig4_HTML.jpg)\n\
    \n**图 6-4.** `EMABProductsFilterViewController` 界面元素\n\n首先，在`EMABProduct`模型类中添加一个新方法。在头文件中，按如下方式声明该方法：\n\
    \n`EMABProduct.h`\n\n```\n+(PFQuery *)queryForCategory:(EMABCategory *)brand minPrice:(float)min\
    \ maxPrice:(float)max;\n```\n\n在该方法中，你根据用户指定的最低价格和最高价格来查询品牌。\n\n在实现中，使用`PFQuery`的`–whereKey:lessThanOrEqualTo:`和`–whereKey:greaterThanOrEqualTo:`来帮助从服务器筛选产品。\n\
    \n`EMABProduct.m`\n\n```\n+(PFQuery *)queryForCategory:(EMABCategory *)brand minPrice:(float)min\
    \ maxPrice:(float)max{\n    PFQuery *query = [self queryForCategory:brand];\n\
    \    [query whereKey:@\"price\" greaterThanOrEqualTo:@(min)];\n    [query whereKey:@\"\
    price\" lessThanOrEqualTo:@(max)];\n    return query;\n}\n```\n\n接下来，创建一个新的`UIViewController`子类`EMABProductsFilterViewController`。在其头文件中，创建一个`typedef`使代码更易读：\n\
    \n```\ntypedef void (^ViewControllerDidFinish)(EMABProductsFilterViewController\
    \ *viewController, float minPrice, float maxPrice);\n```\n\n此代码块用于处理用户点击“完成”栏按钮项后的操作。\n\
    \n继续创建两个接口属性：\n\n```\n@property (nonatomic, copy) ViewControllerDidFinish finishBlock;\n\
    ```\n\n仅处理价格范围就需要完成不少工作。首先，使用两个成员变量来跟踪最低和最高价格。由于你还需要更新视图控制器界面以显示当前滑块值，因此还需要其他`UILabels`。此外，为了跟踪`UISlider`的值，为它们创建两个属性。以下是完整的实现代码：\n\
    \n```\n@interface EMABProductsFilterViewController (){\n    float minPrice;\n\
    \    float maxPrice;\n}\n\n@property (nonatomic, weak) IBOutlet UILabel *minLabel;\n\
    @property (nonatomic, weak) IBOutlet UILabel *maxLabel;\n@property (nonatomic,\
    \ weak) IBOutlet UISlider *minSlider;\n@property (nonatomic, weak) IBOutlet UISlider\
    \ *maxSlider;\n\n@end\n```\n\n在实现文件中，在`–(void)viewDidLoad`中初始化成员变量：\n\n```\n-\
    \ (void)viewDidLoad {\n    [super viewDidLoad];\n    minPrice = 0.0;\n    maxPrice\
    \ = 0.0;\n}\n```\n\n为两个`UISliders`创建一个`IBAction`方法，命名为`onSlider`。当用户滑动任意滑块时，将其值更新到`UILabel`。同时让`minPrice`和`maxPrice`跟踪滑块的值。\n\
    \n```\n-(IBAction)onSlider:(id)sender{\n    UISlider *slider = (UISlider *)sender;\n\
    \    NSString *friendlySliderValue = [NSString stringWithFormat:@\"%.0f\",slider.value];\n\
    \    if (slider.tag == 99) {\n        minPrice = slider.value;\n        self.minLabel.text\
    \ = friendlySliderValue;\n    } else {\n        maxPrice = slider.value;\n   \
    \     self.maxLabel.text = friendlySliderValue;\n    }\n}\n```\n\n为“取消”栏按钮项添加一个`IBAction`，如下面的代码片段所示；基本上，你只需弹出当前视图控制器：\n\
    \n```\n-(IBAction)onCancel:(id)sender{\n    [self.navigationController popViewControllerAnimated:YES];\n\
    }\n```\n\n最后，为“完成”栏按钮项添加一个`IBAction`，如下面的代码片段所示。如何处理用户未作任何操作就直接点击“完成”的情况？在这种情况下，你将提醒用户需要更多信息，或用户需要更准确地输入。\n\
    \n```\n-(IBAction)onDone:(id)sender{\n    if (minPrice > 0 && minPrice < maxPrice)\
    \ {\n        UIAlertView *alertView = [[UIAlertView alloc] initWithTitle:NSLocalizedString(@\"\
    Error\", @\"错误\") message:NSLocalizedString(@\"Please make sure your max price\
    \ is greater than your min price.\", @\"请确保你的最高价格大于最低价格。\") delegate:nil cancelButtonTitle:NSLocalizedString(@\"\
    OK\", @\"确定\") otherButtonTitles:nil, nil];\n        [alertView show];\n    }\
    \ else {\n        self.finishBlock(self, minPrice, maxPrice);\n        [self.navigationController\
    \ popViewControllerAnimated:YES];\n    }\n}\n\n@end\n```\n\n最后，返回到`EMABProductsViewController`。以类似的方式添加两个成员变量：\n\
    \n```\n@interface EMABProductsTableViewController()<UISearchBarDelegate>{\n  \
    \  float minPrice;\n    float maxPrice;\n}\n```\n\n接下来，添加以下`IBAction`方法来处理用户点击“筛选”栏按钮项的情况。在此方法中，你需要完成几件事：首先，呈现`EMABProductsFilterViewController`；然后，处理用户设置的最低和最高价格；接着，清空当前表格视图；最后，执行一次查询。以下是完整的实现代码。\n\
    \n```\n-(IBAction)onFilter:(id)sender\n{\n    EMABProductsFilterViewController\
    \ *viewController = (EMABProductsFilterViewController *)[self.storyboard instantiateViewControllerWithIdentifier:@\"\
    EMABProductsFilterViewController\"];\n    viewController.finishBlock = ^(EMABProductsFilterViewController\
    \ *viewControlle, float minValue, float maxValue){\n        minPrice = minValue;\n\
    \        maxPrice = maxValue;\n        self.keyword = nil;\n        [self clear];\n\
    \        [self loadObjects];\n    };\n    [self.navigationController presentViewController:viewController\
    \ animated:YES completion:nil];\n}\n```\n\n最后，需要修改`-(PFQuery *)queryForTable`，如下所示：\n\
    \n```\n- (PFQuery *)queryForTable {\n    PFQuery *query = [EMABProduct queryForCategory:self.brand];\n\
    \    if (self.keyword) {\n        query = [EMABProduct queryForCategory:self.brand\
    \ keyword:self.keyword];\n    }\n    if (minPrice > 0 && maxPrice>0) {\n     \
    \   query = [EMABProduct queryForCategory:self.brand minPrice:minPrice maxPrice:maxPrice];\n\
    \    }\n    if ([self.objects count] == 0) {\n        query.cachePolicy = kPFCachePolicyCacheThenNetwork;\n\
    \    }\n    return query;\n}\n```\n\n不要忘记将“筛选”`UIBarButtonItem`连接到该方法。\n\n现在可以构建并运行项目了。\n\
    \n## 本章小结\n\n在本章中，我介绍了在产品分类下显示产品列表、根据名称搜索产品以及根据价格筛选产品等相关主题。\n\n# 7. 产品详情界面\n\n\
    电子补充材料 本章的在线版本 (doi:[10.1007/978-1-4842-1317-9_7](http://dx.doi.org/10.1007/978-1-4842-1317-9_7))\
    \ 包含补充材料，仅供授权用户使用。\n\n在本章中，你将学习如何实现产品详情界面，该界面包含产品名称、价格、详情和全尺寸图片等信息；同时还包括分享菜单、购买产品或添加到收藏夹的选项。\n"
- fmt: "# Build the Product Detail Screen\n\nFigure [7-1](#A978-1-4842-1317-9_7_Chapter.html#Fig1)\
    \ shows the finished UI of the product detail screen. The UI uses the `UINavigationBar`\
    \ title to show the product’s name; the right bar button item to add the share\
    \ options; and a “heart” button so users can add the product to their Favorites\
    \ list. To show the product’s name and price, you use two `UILabel`s. The product\
    \ detail might be pretty lengthy, so you use a `UITextView` to hold its content.\
    \ Finally, you use a plain button labeled “Add to Bag” to let a user add this\
    \ product to the shopping bag.\n\n![A978-1-4842-1317-9_7_Fig1_HTML.jpg](A978-1-4842-1317-9_7_Fig1_HTML.jpg)\n\
    \nFigure 7-1. The finished product detail user interface\n\nHere’s how you implement\
    \ the UI. First, create a `UIViewController` subclass, `EMABProductDetailViewController`.\
    \ In the generated header file, create a property:\n\n```\n@property (nonatomic,\
    \ strong) EMABProduct *product;\n```\n\nNext, pass a selected `EMABProduct` instance\
    \ from the previous product list to this product detail. The property you created\
    \ serves this purpose. Here is the complete implementation:\n\n**EMABProductDetailViewController.h**\n\
    \n```\n#import <UIKit/UIKit.h>\n\n@class EMABProduct;\n\n@interface EMABProductDetailViewController\
    \ : UIViewController\n\n@property (nonatomic, strong) EMABProduct *product;\n\n\
    @end\n```\n\nIn the implementation file, you need a `PFImageView` property to\
    \ display the full-size image of the product, a `UILabel` to display the product’s\
    \ name, a `UILabel` to display its price, and a `UITextView` to show its detail.\
    \ You also need a custom button that a user can tap to add the product to the\
    \ Favorites list. Here is the full code:\n\n```\n@interface EMABProductDetailViewController\
    \ ()\n\n@property (nonatomic, weak) IBOutlet PFImageView *fullsizeImageView;\n\
    @property (nonatomic, weak) IBOutlet UILabel *productNameLabel;\n@property (nonatomic,\
    \ weak) IBOutlet UILabel *productPriceLabel;\n@property (nonatomic, weak) IBOutlet\
    \ UITextView *detailTextView;\n@property (nonatomic, weak) IBOutlet UIButton *heartButton;\n\
    \n@end\n```\n\nIn the implementation, first implement the `EMABProduct` property\
    \ setter:\n\n```\n-(void)setProduct:(EMABProduct *)product{\n    if (_product\
    \ !=product) {\n        _product = product;\n        [self updateUI];\n    }\n\
    }\n```\n\nIn this setter, also use a helper method, `-(void)updateUI`. You might\
    \ need to update the whole UI on multiple occasions (which is what I usually do).\
    \ Instead of handling UI updates all over the place, I use one method that is\
    \ called in the `-(void)viewDidLoad` method as shown here:\n\n```\n- (void)viewDidLoad\
    \ {\n    [super viewDidLoad];\n    [self updateUI];\n}\n```\n\nThis `updateUI`\
    \ method does one thing for right now: it connects the model and view. Here is\
    \ the full code:\n\n```\n-(void)updateUI{\n    if (self.product.fullsizeImage)\
    \ {\n        self.fullsizeImageView.file = self.product.fullsizeImage;\n     \
    \   [self.fullsizeImageView loadInBackground];\n    }\n    self.productNameLabel.text\
    \ = self.product.name;\n    self.productPriceLabel.text = [self.product friendlyPrice];\n\
    \    self.detailTextView.text = [self.product detail];\n}\n```\n\nNext, implement\
    \ the `IBAction` that is triggered when a user taps the “Add to Bag” button. When\
    \ the button is tapped, you need to check whether the customer is a valid, registered\
    \ user or just a visitor. To do so, use the Parse `[PFUser currentUser]` method.\
    \ In the case of registered user, `[PFUser currentUser]` will return an instance,\
    \ otherwise it will return a `nil`. At this point, you want to ask users to sign\
    \ up for an account or log in (if they haven’t done so already). I will discuss\
    \ how to handle the “Add to Bag” request in a later chapter. For now, here is\
    \ how you alert the user to sign up or log in:\n\n```\n-(IBAction)onBag:(id)sender\n\
    {\n    if (! [PFUser currentUser]) {\n        [self showWarning];\n    } else\
    \ {\n        //todo:\n    }\n}\n```\n\nIn this sample code, the helper method\
    \ `-(void)showWarning` reminds the user. You will use it again on another occasion,\
    \ so it’s best to create a common method:\n\n```\n-(void)showWarning\n{\n    [[[UIAlertView\
    \ alloc] initWithTitle:NSLocalizedString(@\"Warning\", @\"Warning\") message:NSLocalizedString(@\"\
    Please sign up or log in\", @\"\") delegate:nil cancelButtonTitle:NSLocalizedString(@\"\
    Later\", @\"Later\") otherButtonTitles: NSLocalizedString(@\"OK\", @\"OK\"), nil]\
    \ show];\n}\n```\n\nThis implementation only throws a warning. A better way is\
    \ to bring up the signup or login screen when the user taps “OK.”\n\n## Add Share\
    \ Options\n\nAn important feature of the app is the Share option or menu. To add\
    \ this feature, use `UIActivityViewController`. Using the `UIActivityViewController`\
    \ is pretty straightforward to use (to learn more about it, refer to the iOS documentation).\
    \ First, you create what you want to share, instantiate a `UIActivityViewController`\
    \ instance, define what services are not used for this share purpose, and then\
    \ present the instance. Figure [7-2](#A978-1-4842-1317-9_7_Chapter.html#Fig2)\
    \ shows a `UIActivityViewController` from the user’s point of view.\n\n![A978-1-4842-1317-9_7_Fig2_HTML.jpg](A978-1-4842-1317-9_7_Fig2_HTML.jpg)\n\
    \nFigure 7-2. The `UIActivityViewController` from a user’s point of view\n\nHere\
    \ is the full code:\n\n```\n-(IBAction)onShare:(id)sender {\n    NSString *textToShare\
    \ = [NSString stringWithFormat:@\"%@, %@\", self.product.name, [self.product friendlyPrice]];\n\
    \    NSURL *imageUrl = [NSURL URLWithString:self.product.fullsizeImage.url];\n\
    \    NSArray *objectsToShare = @[textToShare, imageUrl];\n    UIActivityViewController\
    \ *activityVC = [[UIActivityViewController alloc] initWithActivityItems:objectsToShare\
    \ applicationActivities:nil];\n    NSArray *excludeActivities = @[\n        UIActivityTypeAssignToContact,\n\
    \        UIActivityTypeSaveToCameraRoll,\n        UIActivityTypePostToFlickr,\n\
    \        UIActivityTypePostToVimeo\n    ];\n    activityVC.excludedActivityTypes\
    \ = excludeActivities;\n    [self presentViewController:activityVC animated:YES\
    \ completion:nil];\n}\n```\n\nKeep in mind, this is a dramatically simplified\
    \ API. All available services don’t necessarily support the data content users\
    \ may want to share. You may also want to add even more content for the services\
    \ you want to support."
  raw: '## Build the Product Detail Screen


    Figure [7-1](#A978-1-4842-1317-9_7_Chapter.html#Fig1) shows the finished UI of
    the product detail screen. The UI uses the UINavigationBar title to show the product’s
    name; the right bar button item to add the share options; and a “heart” button
    so users can add the product to their Favorites list. To show the product’s name
    and price, you use two UILabels. The product detail might be pretty lengthy, so
    you use a UITextView to hold its content. Finally, you use a plain button labeled
    “Add to Bag” to let a user add this product to the shopping bag.


    ![A978-1-4842-1317-9_7_Fig1_HTML.jpg](A978-1-4842-1317-9_7_Fig1_HTML.jpg)


    Figure 7-1.


    The finished product detail user interface


    Here’s how you implement the UI. First, create a UIViewController subclass, EMABProductDetailViewController.
    In the generated header file, create a property:


    `@property (nonatomic, strong) EMABProduct *product;`


    Next, pass a selected EMABProduct instance from the previous product list to this
    product detail. The property you created serves this purpose. Here is the complete
    implementation:


    EMABProductDetailViewController.h


    `#import <UIKit/UIKit.h>`


    `@class EMABProduct;`


    `@interface EMABProductDetailViewController : UIViewController`


    `@property (nonatomic, strong) EMABProduct *product;`


    `@end`


    In the implementation file, you need a PFImageView property to display the full-size
    image of the product, a UILabel to display the product’s name, a UILabel to display
    its price, and a UITextView to show its detail. You also need a custom button
    that a user can tap to add the product to the Favorites list. Here is the full
    code:


    `@interface EMABProductDetailViewController ()`


    `@property (nonatomic, weak) IBOutlet PFImageView *fullsizeImageView;`


    `@property (nonatomic, weak) IBOutlet UILabel *productNameLabel;`


    `@property (nonatomic, weak) IBOutlet UILabel *productPriceLabel;`


    `@property (nonatomic, weak) IBOutlet UITextView *detailTextView;`


    `@property (nonatomic, weak) IBOutlet UIButton *heartButton;`


    `@end`


    In the implementation, first implement the EMABProduct property setter:


    `-(void)setProduct:(EMABProduct *)product{`


    `if (_product !=product) {`


    `_product = product;`


    `[self updateUI];`


    `}`


    `}`


    In this setter, also use a helper method, `-(void)updateUI`. You might need to
    update the whole UI on multiple occasions (which is what I usually do). Instead
    of handling UI updates all over the place, I use one method that is called in
    the `-(void)viewDidLoad` method as shown here:


    `- (void)viewDidLoad {`


    `[super viewDidLoad];`


    `[self updateUI];`


    `}`


    This `updateUI` method does one thing for right now: it connects the model and
    view. Here is the full code:


    `-(void)updateUI{`


    `if (self.product.fullsizeImage) {`


    `self.fullsizeImageView.file = self.product.fullsizeImage;`


    `[self.fullsizeImageView loadInBackground];`


    `}`


    `self.productNameLabel.text = self.product.name;`


    `self.productPriceLabel.text = [self.product friendlyPrice];`


    `self.detailTextView.text = [self.product detail];`


    `}`


    Next, implement the IBAction that is triggered when a user taps the “Add to Bag”
    button. When the button is tapped, you need to check whether the customer is a
    valid, registered user or just a visitor. To do so, use the Parse `[PFUser currentUser]`
    method. In the case of registered user, `[PFUser currentUser]` will return an
    instance, otherwise it will return a `nil`. At this point, you want to ask users
    to sign up for an account or log in (if they haven’t done so already). I will
    discuss how to handle the “Add to Bag” request in a later chapter. For now, here
    is how you alert the user to sign up or log in:


    `-(IBAction)onBag:(id)sender`


    `{`


    `if (! [PFUser currentUser]) {`


    `[self showWarning];`


    `} else {`


    `//todo:`


    `}`


    `}`


    In this sample code, the helper method `-(void)showWarning` reminds the user.
    You will use it again on another occasion, so it’s best to create a common method:


    `-(void)showWarning`


    `{`


    `[[[UIAlertView alloc] initWithTitle:NSLocalizedString(@"Warning", @"Warning")
    message:NSLocalizedString(@"Please sign up or log in", @"") delegate:nil cancelButtonTitle:NSLocalizedString(@"Later",
    @"Later") otherButtonTitles: NSLocalizedString(@"OK", @"OK"), nil] show];`


    `}`


    This implementation only throws a warning. A better way is to bring up the signup
    or login screen when the user taps “OK.”


    ## Add Share Options


    An important feature of the app is the Share option or menu. To add this feature,
    use UIActivityViewController. Using the UIActivityViewController is pretty straightforward
    to use (to learn more about it, refer to the iOS documentation). First, you create
    what you want to share, instantiate a UIActivityViewController instance, define
    what services are not used for this share purpose, and then present the instance.
    Figure [7-2](#A978-1-4842-1317-9_7_Chapter.html#Fig2) shows a UIActivityViewController
    from the user’s point of view.


    ![A978-1-4842-1317-9_7_Fig2_HTML.jpg](A978-1-4842-1317-9_7_Fig2_HTML.jpg)


    Figure 7-2.


    The UIActivityViewController from a user’s point of view


    Here is the full code:


    `-(IBAction)onShare:(id)sender {`


        `NSString *textToShare = [NSString stringWithFormat:@"%@, %@", self.product.name,
    [self.product friendlyPrice]];`


        `NSURL *imageUrl = [NSURL URLWithString:self.product.fullsizeImage.url];`


        `NSArray *objectsToShare = @[textToShare, imageUrl];`


        `UIActivityViewController *activityVC = [[UIActivityViewController alloc]
    initWithActivityItems:objectsToShare applicationActivities:nil];`


        `NSArray *excludeActivities = @[`


    `..........................UIActivityTypeAssignToContact,`


                                       `UIActivityTypeSaveToCameraRoll,`


                                  `UIActivityTypePostToFlickr,`


                                       `UIActivityTypePostToVimeo];`


        `activityVC.excludedActivityTypes = excludeActivities;`


        `[self presentViewController:activityVC animated:YES completion:nil];`


    `}`


    Keep in mind, this is a dramatically simplified API. All available services don’t
    necessarily support the data content users may want to share. You may also want
    to add even more content for the services you want to support.'
  trans: "\n# 构建产品详情界面\n\n图 7-1 展示了产品详情界面的最终效果。该界面使用 `UINavigationBar` 标题显示产品名称；右侧栏按钮用于添加分享选项；还有一个“心形”按钮，供用户将产品添加到收藏列表。为了显示产品名称和价格，你使用了两个\
    \ `UILabel`。产品详情可能相当冗长，因此你使用 `UITextView` 来容纳其内容。最后，你使用一个标记为“加入购物袋”的普通按钮，让用户将该产品添加到购物袋中。\n\
    \n![A978-1-4842-1317-9_7_Fig1_HTML.jpg](img/A978-1-4842-1317-9_7_Fig1_HTML.jpg)\n\
    \n图 7-1. 完成后的产品详情用户界面\n\n以下是实现该界面的方式。首先，创建一个 `UIViewController` 子类 `EMABProductDetailViewController`。在生成的头文件中，创建一个属性：\n\
    \n```\n@property (nonatomic, strong) EMABProduct *product;\n```\n\n接着，将所选 `EMABProduct`\
    \ 实例从上一个产品列表传递到该产品详情。你创建的属性正用于此目的。以下是完整的实现：\n\n**EMABProductDetailViewController.h**\n\
    \n```\n#import <UIKit/UIKit.h>\n\n@class EMABProduct;\n\n@interface EMABProductDetailViewController\
    \ : UIViewController\n\n@property (nonatomic, strong) EMABProduct *product;\n\n\
    @end\n```\n\n在实现文件中，你需要一个 `PFImageView` 属性来显示产品的全尺寸图片，一个 `UILabel` 来显示产品名称，一个\
    \ `UILabel` 来显示价格，以及一个 `UITextView` 来显示详情。你还需要一个自定义按钮，供用户点击以将产品添加到收藏列表。以下是完整代码：\n\
    \n```\n@interface EMABProductDetailViewController ()\n\n@property (nonatomic,\
    \ weak) IBOutlet PFImageView *fullsizeImageView;\n@property (nonatomic, weak)\
    \ IBOutlet UILabel *productNameLabel;\n@property (nonatomic, weak) IBOutlet UILabel\
    \ *productPriceLabel;\n@property (nonatomic, weak) IBOutlet UITextView *detailTextView;\n\
    @property (nonatomic, weak) IBOutlet UIButton *heartButton;\n\n@end\n```\n\n在实现中，首先实现\
    \ `EMABProduct` 属性的 setter 方法：\n\n```\n-(void)setProduct:(EMABProduct *)product{\n\
    \    if (_product !=product) {\n        _product = product;\n        [self updateUI];\n\
    \    }\n}\n```\n\n在这个 setter 中，还使用了辅助方法 `-(void)updateUI`。你可能需要在多个场合更新整个界面（这是我通常的做法）。与其到处处理界面更新，我使用一个单一方法，在\
    \ `-(void)viewDidLoad` 方法中调用，如下所示：\n\n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\
    \    [self updateUI];\n}\n```\n\n目前，这个 `updateUI` 方法只做一件事：连接模型和视图。以下是完整代码：\n\n\
    ```\n-(void)updateUI{\n    if (self.product.fullsizeImage) {\n        self.fullsizeImageView.file\
    \ = self.product.fullsizeImage;\n        [self.fullsizeImageView loadInBackground];\n\
    \    }\n    self.productNameLabel.text = self.product.name;\n    self.productPriceLabel.text\
    \ = [self.product friendlyPrice];\n    self.detailTextView.text = [self.product\
    \ detail];\n}\n```\n\n接下来，实现当用户点击“加入购物袋”按钮时触发的 `IBAction`。当按钮被点击时，你需要检查顾客是有效的注册用户还是仅访客。为此，使用\
    \ Parse 的 `[PFUser currentUser]` 方法。如果是注册用户，`[PFUser currentUser]` 将返回一个实例，否则返回\
    \ `nil`。此时，你需要请用户注册账户或登录（如果尚未完成）。我将在后续章节讨论如何处理“加入购物袋”请求。现在，以下是提醒用户注册或登录的方式：\n\n\
    ```\n-(IBAction)onBag:(id)sender\n{\n    if (! [PFUser currentUser]) {\n     \
    \   [self showWarning];\n    } else {\n        //todo:\n    }\n}\n```\n\n在这个示例代码中，辅助方法\
    \ `-(void)showWarning` 用于提醒用户。你将在其他场合再次使用它，因此最好创建一个通用方法：\n\n```\n-(void)showWarning\n\
    {\n    [[[UIAlertView alloc] initWithTitle:NSLocalizedString(@\"Warning\", @\"\
    Warning\") message:NSLocalizedString(@\"Please sign up or log in\", @\"\") delegate:nil\
    \ cancelButtonTitle:NSLocalizedString(@\"Later\", @\"Later\") otherButtonTitles:\
    \ NSLocalizedString(@\"OK\", @\"OK\"), nil] show];\n}\n```\n\n这个实现仅弹出一个警告。更好的方式是当用户点击“确定”时，调出注册或登录界面。\n\
    \n## 添加分享选项\n\n应用的一个重要功能是分享选项或菜单。要添加此功能，请使用 `UIActivityViewController`。使用 `UIActivityViewController`\
    \ 非常简单（了解更多信息，请参考 iOS 文档）。首先，创建你想要分享的内容，实例化一个 `UIActivityViewController` 实例，定义哪些服务不用于此次分享目的，然后弹出该实例。图\
    \ 7-2 从用户角度展示了 `UIActivityViewController`。\n\n![A978-1-4842-1317-9_7_Fig2_HTML.jpg](img/A978-1-4842-1317-9_7_Fig2_HTML.jpg)\n\
    \n图 7-2. 从用户角度看到的 `UIActivityViewController`\n\n以下是完整代码：\n\n```\n-(IBAction)onShare:(id)sender\
    \ {\n    NSString *textToShare = [NSString stringWithFormat:@\"%@, %@\", self.product.name,\
    \ [self.product friendlyPrice]];\n    NSURL *imageUrl = [NSURL URLWithString:self.product.fullsizeImage.url];\n\
    \    NSArray *objectsToShare = @[textToShare, imageUrl];\n    UIActivityViewController\
    \ *activityVC = [[UIActivityViewController alloc] initWithActivityItems:objectsToShare\
    \ applicationActivities:nil];\n    NSArray *excludeActivities = @[\n        UIActivityTypeAssignToContact,\n\
    \        UIActivityTypeSaveToCameraRoll,\n        UIActivityTypePostToFlickr,\n\
    \        UIActivityTypePostToVimeo\n    ];\n    activityVC.excludedActivityTypes\
    \ = excludeActivities;\n    [self presentViewController:activityVC animated:YES\
    \ completion:nil];\n}\n```\n\n请记住，这是一个经过极大简化的 API。并非所有可用的服务都必然支持用户可能想要分享的数据内容。你可能还希望为你想要支持的服务添加更多内容。\n"
- fmt: "# Add a Favorites List\n\nTo implement the Favorites list feature, you need\
    \ a new model class.\n\nIn Xcode, create a new `PFObject` subclass and name it\
    \ `EMABFavoriteProduct`. This model has two properties—`PFUser` and `EMABProduct`—to\
    \ represent that a user liked a product. In other words, this model class is a\
    \ use case of the Parse joining tables relationship. Every time a user likes a\
    \ product, a record is created in this model class. You might think this is redundant.\
    \ You could use another approach; for instance, you could use a favorite array\
    \ for this user. After all, there is one user but many favorite products, so using\
    \ an array definitely works in this case. The advantage of using the joining tables\
    \ method, however, is that the code is quite clean.\n\nTo get a user’s Favorites\
    \ list, use `PFQuery`. Create a basic `PFQuery` method and customize it to your\
    \ needs. Here is the complete code:\n\n`EMABFavoriteProduct.h`\n\n```\n#import\
    \ <Parse/Parse.h>\n\n@class EMABProduct;\n\n@interface EMABFavoriteProduct : PFObject<PFSubclassing>\n\
    \n@property (nonatomic, strong) PFUser *customer;\n@property (nonatomic, strong)\
    \ EMABProduct *product;\n\n+(PFQuery *)basicQuery;\n+(PFQuery *)queryForCustomer:(PFUser\
    \ *)customer;\n+(PFQuery *)queryForCustomer:(PFUser *)customer product:(EMABProduct\
    \ *)product;\n\n@end\n```\n\nIn this snippet you have two extra helper queries:\
    \ `+(PFQuery *)queryForCustomer:(PFUser *)customer` gets a list of favorite products\
    \ for a user; `+(PFQuery *)queryForCustomer:(PFUser *)customer product:(EMABProduct\
    \ *)product` checks whether the user has a product in the Favorites list.\n\n\
    In `EMABConstants.h` add a new `NSString` constant, `kFavoriteProduct`, and implement\
    \ it in `EMABConstants.m` file.\n\n```\nNSString *const kFavoriteProduct = @\"\
    FavoriteProduct\";\n```\n\nIn the required `+(NSString *)parseClassName` method,\
    \ use the `NSString` constant to represent the model’s name.\n\n```\n+(NSString\
    \ *)parseClassName\n{\n    return kFavoriteProduct;\n}\n```\n\nIn the `+(PFQuery\
    \ *)basicQuery` method, sort the result based on when it is created. You can also\
    \ use the `PFQuery` `-include:` method to include the user and product data. This\
    \ is required to show either the product detail or the user’s detail.\n\n```\n\
    +(PFQuery *)basicQuery\n{\n    PFQuery *query = [PFQuery queryWithClassName:[self\
    \ parseClassName]];\n    [query orderByDescending:@\"createdAt\"];\n    [query\
    \ include:@\"customer\"];\n    [query include:@\"product\"];\n    return query;\n\
    }\n```\n\nIn the `+(PFQuery *)queryForCustomer:(PFUser *)customer` method, use\
    \ the `PFQuery` query condition method `-whereKey: equalTo:`:\n\n```\n+(PFQuery\
    \ *)queryForCustomer:(PFUser *)customer {\n    PFQuery *query = [self basicQuery];\n\
    \    [query whereKey:@\"customer\" equalTo:customer];\n    return query;\n}\n\
    ```\n\nThen implement `+(PFQuery *)queryForCustomer:(PFUser *)customer product:(EMABProduct\
    \ *)product`:\n\n```\n+(PFQuery *)queryForCustomer:(PFUser *)customer product:(EMABProduct\
    \ *)product\n{\n    PFQuery *query = [self queryForCustomer:customer];\n    [query\
    \ whereKey:@\"product\" equalTo:product];\n    return query;\n}\n\n@end\n```\n\
    \nThat’s the `EMABFavoriteProduct`. Don’t forget to register this `PFSubclass`\
    \ at `AppDelegate` by calling:\n\n```\n[EMABFavoriteProduct registerSublcass];\n\
    ```\n\nNext, go to the `EMABProductDetailViewController.m` file. In the `-(void)viewDidLoad`\
    \ method, check whether the user has already liked the product, given there is\
    \ a valid user.\n\n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    [self\
    \ updateUI];\n    [self checkIfFavorited];\n}\n```\n\nThe `checkIfFavorited` method\
    \ verifies whether there is a record on the back-end server. If true, the favorite\
    \ button is disabled. You also want to check that the server is queried only if\
    \ there is a valid user.\n\n```\n-(void)checkIfFavorited\n{\n    if (![PFUser\
    \ currentUser]) {\n        PFQuery *fPQuery = [EMABFavoriteProduct queryForCustomer:[PFUser\
    \ currentUser] product:self.product];\n        [fPQuery getFirstObjectInBackgroundWithBlock:^(PFObject\
    \ *object, NSError *error){\n            if (!error) {\n                self.heartButton.enabled\
    \ = false;\n            }\n        }];\n    }\n}\n\n@end\n```\n\nYou also want\
    \ to allow users to add the product to their Favorites lists. The “heart” button\
    \ is connecting to an IBOutlet method `-(IBAction)onFavorite:(id)sender`.\n\n\
    Only a user who signed up or logged in can add products to the shopping bag, or\
    \ like a product. So first you need to check whether there is a valid user. If\
    \ so, create a new `FavoriteProduct` object, and save it to the Parse back end.\
    \ Once saved successfully, alert the user with a success message. Here is a full\
    \ code:\n\n```\n-(IBAction)onFavorite:(id)sender{\n    if (![PFUser currentUser])\
    \ {\n        [self showWarning];\n    } else {\n        EMABFavoriteProduct *favoriteProduct\
    \ = [EMABFavoriteProduct object];\n        [favoriteProduct setCustomer:[PFUser\
    \ currentUser]];\n        [favoriteProduct setProduct:self.product];\n       \
    \ [favoriteProduct saveInBackgroundWithBlock:^(BOOL success, NSError *error){\n\
    \            if (!error) {\n                [SVProgressHud showSuccessWithStatus:NSLocalizedString(@\"\
    Successfully added\", @\"\")];\n            }\n        }];\n    }\n}\n```\n\n\
    ## Summary\n\nIn this chapter, I covered the implementation of showing a product\
    \ detail, sharing the product details to different services available on a user’s\
    \ phone, and adding a product to the user’s Favorites list (provided that it has\
    \ not been added to the list previously). The favorite product feature is implemented\
    \ using a join table model class, `EMABFavoriteProduct`. I also emphasized the\
    \ importance of the `-include:` method in `PFQuery` for fetching the user’s data\
    \ or the product’s data when fetching the user’s Favorites list.\n\n# 8. The Sign-Up\
    \ Feature\n\nElectronic supplementary material The online version of this chapter\
    \ (doi:[10.1007/978-1-4842-1317-9_8](http://dx.doi.org/10.1007/978-1-4842-1317-9_8))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    In the previous chapter, you learned how to alert a user to sign up or log in\
    \ when adding a product to the shopping bag or to the Favorites list. In this\
    \ chapter, you implement a dispatch screen that enables users to create an account,\
    \ log into an existing account, or log in with Facebook. You also learn how to\
    \ sign up customers. How to implement the direct log in and log in with Facebook\
    \ features are covered in [Chapter 9](#A978-1-4842-1317-9_9_Chapter.html).\n\n\
    ## Build a Dispatch Screen\n\nWhen you implemented the main dispatch feature,\
    \ you created a different `UIStoryboard` named `LoginSignupStoryboard` to reduce\
    \ the workload of `Main.storyboard`.\n\nThe UI of this `DispatchViewController`\
    \ is pretty simple. There are three buttons: the button labeled “Sign Up” is for\
    \ showing the sign-up screen; the buttons labeled “Log In” and “Log In with Facebook”\
    \ will be covered in [Chapter 9](#A978-1-4842-1317-9_9_Chapter.html).\n\nTo simplify\
    \ the main view controller, use the segues in the `LoginSignUpStoryboard` to connect\
    \ the “Sign Up” button to the `EMABSignUpViewController`, connect the “Log In”\
    \ button to `EMABLoginViewController`, and set up an IBAction for “Log In with\
    \ Facebook.”\n\nAlso provide a “Cancel” `UIBarButtonItem` in case the user doesn’t\
    \ want to log in or sign up for an account at this point, so he or she can leave\
    \ the screen. This `LoginSignUpStoryboard` is implemented with its own `UINavigationController`,\
    \ so you can simply use:\n\n```\n[self dismissViewControllerAnimated:YES completion:nil];\n\
    ```\n\nto dismiss the dispatch screen.\n\nHere is the full implementation:\n\n\
    ```\n@implementation EMABDispatchViewController\n\n- (void)viewDidLoad {\n   \
    \ [super viewDidLoad];\n}\n\n-(IBAction)onFacebookLogin:(id)sender{\n    //todo\n\
    }\n\n-(IBAction)onCancel:(id)sender{\n    [self dismissViewControllerAnimated:YES\
    \ completion:nil];\n}\n\n@end\n```"
  raw: '## Add a Favorites List


    To implement the Favorites list feature, you need a new model class.


    In Xcode, create a new PFObject subclass and name it “EMABFavoriteProduct.” This
    model has two properties—PFUser and EMABProduct—to represent that a user liked
    a product. In other words, this model class is a use case of the Parse joining
    tables relationship. Every time a user likes a product, a record is created in
    this model class. You might think this is redundant. You could use another approach;
    for instance, you could use a favorite array for this user. After all, there is
    one user but many favorite products, so using an array definitely works in this
    case. The advantage of using the joining tables method, however, is that the code
    is quite clean.


    To get a user’s Favorites list, use PFQuery. Create a basic PFQuery method and
    customize it to your needs. Here is the complete code:


    EMABFavoriteProduct.h


    `#import <Parse/Parse.h>`


    `@class EMABProduct;`


    `@interface EMABFavoriteProduct : PFObject<PFSubclassing>`


    `@property (nonatomic, strong) PFUser *customer;`


    `@property (nonatomic, strong) EMABProduct *product;`


    `+(PFQuery *)basicQuery;`


    `+(PFQuery *)queryForCustomer:(PFUser *)customer;`


    `+(PFQuery *)queryForCustomer:(PFUser *)customer product:(EMABProduct *)product;`


    `@end`


    In this snippet you have two extra helper queries: `+(PFQuery *)queryForCustomer:(PFUser
    *)customer` gets a list of favorite products for a user; `+(PFQuery *)queryForCustomer:(PFUser
    *)customer product:(EMABProduct *)product` checks whether the user has a product
    in the Favorites list.


    In to EMABConstants.h add a new `NSString` constant, `kFavoriteProduct`, and implement
    it in EMABConstants.m file.


    `NSString *const kFavoriteProduct = @"FavoriteProduct";`


    In the required `+(NSString *)parseClassName` method, use the NSString constant
    to represent the model’s name.


    `+(NSString *)parseClassName`


    `{`


    `return kFavoriteProduct;`


    `}`


    In the `+(PFQuery *)basicQuery` method, sort the result based on when it is created.
    You can also use the PFQuery `-include:` method to include the user and product
    data. This is required to show either the product detail or the user’s detail.


    `+(PFQuery *)basicQuery`


    `{`


    `PFQuery *query = [PFQuery queryWithClassName:[self parseClassName]];`


    `[query orderByDescending:@"createdAt"];`


    `[query include:@"customer"];`


    `[query include:@"product"];`


    `return query;`


    `}`


    In the `+(PFQuery *)queryForCustomer:(PFUser *)customer` method, use the PFQuery
    query condition method `-whereKey: equalTo`:


    `+(PFQuery *)queryForCustomer:(PFUser *)customer {`


    `PFQuery *query = [self basicQuery];`


    `[query whereKey:@"customer" equalTo:customer];`


    `return query;`


    `}`


    Then implement `+(PFQuery *)queryForCustomer:(PFUser *)customer product:(EMABProduct
    *)product`:


    `+(PFQuery *)queryForCustomer:(PFUser *)customer product:(EMABProduct *)product`


    `{`


    `PFQuery *query = [self queryForCustomer:customer];`


    `[query whereKey:@"product" equalTo:product];`


    `return query;`


    `}`


    `@end`


    That’s the EMABFavoriteProduct. Don’t forget to register this PFSubclass at AppDelegate
    by calling:


    `[EMABFavoriteProduct registerSublcass];`


    Next, go to the EMABProductDetailViewController.m file. In the `-(void)viewDidLoad`
    method, check whether the user has already liked the product, given there is a
    valid user.


    `- (void)viewDidLoad {`


    `[super viewDidLoad];`


    `[self updateUI];`


    `[ self checkIfFavorited];`


    `}`


    The `checkIfFfavorited` method verifies whether there is a record on the back-end
    server. If true, the favorite button is disabled. You also want to check that
    the server is queried only if there is a valid user.


    `-(void)checkIfFavorited`


    `{`


    `if (! [PFUser currentUser]) {`


    `PFQuery *fPQuery = [EMABFavoriteProduct queryForCustomer:[PFUser currentUser]
    product:self.product];`


    `[fPQuery getFirstObjectInBackgroundWithBlock:^(PFObject *object, NSError *error){`


    `if (!error) {`


    `self.heartButton.enabled = false;`


    `}`


    `}];`


    `}`


    `}`


    `@end`


    You also want to allow users to add the product to their Favorites lists. The
    “heart” button is connecting to an IBOutlet method `-(IBAction)onFavorite:(id)sender`.


    Only a user who signed up or logged in can add products to the shopping bag, or
    like a product. So first you need to check whether there is a valid user. If so,
    create a new FavoriteProduct object, and save it to the Parse back end. Once saved
    successfully, alert the user with a success message. Here is a full code:


    `-(IBAction)onFavorite:(id)sender{`


    `if ( ![PFUser currentUser]) {`


    `[self showWarning];`


    `} else {`


    `EMABFavoriteProduct *favoriteProduct = [EMABFavoriteProduct object];`


    `[favoriteProduct setCustomer:[PFUser currentUser]];`


    `[favoriteProduct setProduct:self.product];`


    `[favoriteProduct saveInBackgroundWithBlock:^(BOOL success, NSError *error){`


    `if (!error) {`


    `[SVProgressHud showSuccessWithStatus: :NSLocalizedString(@"Successfully added",
    @""];`


    `}`


    `}];`


    `}`


    `}`


    ## Summary


    In this chapter, I covered the implementation of showing a product detail, sharing
    the product details to different services available on a user’s phone, and adding
    a product to the user’s Favorites list (provided that it has not been added to
    the list previously). The favorite product feature is implemented using a join
    table model class, EMABFavoriteProduct. I also emphasized the importance of the
    `-include:` method in PFQuery for fetching the user’s data or the product’s data
    when fetching the user’s Favorites list.


    # 8. The Sign-Up Feature


