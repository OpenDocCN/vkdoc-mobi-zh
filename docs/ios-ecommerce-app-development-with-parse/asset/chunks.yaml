    \ `PFFile` 实例，就需要将这两个 `PFFile` 保存到 Parse。当保存操作成功完成后，你需要将这两个 `PFFile` 赋值给该产品。\n\
    \n以下是完整实现：\n\n```\n// 当从图库中选择或从相机拍摄图片时，调用此方法。\n- (void)imagePickerController:(UIImagePickerController\
    \ *)picker didFinishPickingMediaWithInfo:(NSDictionary *)info\n{\n  UIImage *image\
    \ = [info valueForKey:UIImagePickerControllerOriginalImage];\n  UIImage *fullsize\
    \ = [UIImage imageWithImage:image scaledToWidth:1632];\n  UIImage *thumbnail =\
    \ [UIImage imageWithImage:fullsize scaledToWidth:408];\n  self.productImageView.image\
    \ = image;\n  __weak typeof(self) weakSelf = self;\n\n  PFFile *fullsizeFile =\
    \ [PFFile fileWithName:@\"fullszie.jpg\" data:UIImageJPEGRepresentation(fullsize,\
    \ 0.75)];\n  [fullsizeFile saveInBackgroundWithBlock:^(BOOL success, NSError *error){\n\
    \    if (!error) {\n      weakSelf.product.fullsizeImage = fullsizeFile;\n   \
    \ } else {\n      NSLog(@\"错误：%@\",[error localizedDescription]);\n    }\n  }];\n\
    \n  PFFile *thumbnailFile = [PFFile fileWithName:@\"thumbnail.jpg\" data:UIImageJPEGRepresentation(thumbnail,\
    \ 0.75)];\n  [thumbnailFile saveInBackgroundWithBlock:^(BOOL success, NSError\
    \ *error){\n    if (!error) {\n      weakSelf.product.thumbnail = thumbnailFile;\n\
    \    } else {\n      NSLog(@\"错误：%@\",[error localizedDescription]);\n    }\n\
    \  }];\n\n  [self.navigationController dismissViewControllerAnimated:YES completion:^{\n\
    \  }];\n}\n```\n\n在实现中，使用了一个 `UIImage` 分类方法 `-(UIImage *)imageWithImage: scaledToWidth`。\n\
    \n```\n+(UIImage*)imageWithImage: (UIImage*) sourceImage scaledToWidth: (float)\
    \ i_width\n{\n  float oldWidth = sourceImage.size.width;\n  float scaleFactor\
    \ = i_width / oldWidth;\n  float newHeight = sourceImage.size.height * scaleFactor;\n\
    \  float newWidth = oldWidth * scaleFactor;\n  UIGraphicsBeginImageContext(CGSizeMake(newWidth,\
    \ newHeight));\n  [sourceImage drawInRect:CGRectMake(0, 0, newWidth, newHeight)];\n\
    \  UIImage *newImage = UIGraphicsGetImageFromCurrentImageContext();\n  UIGraphicsEndImageContext();\n\
    \  return newImage;\n}\n```\n\n## 输入产品名称、价格、单价和产品摘要\n\n通常，实现一个 `UITextField` 或\
    \ `UITextView` 来接受用户输入是件简单的事。但在实际开发中，你需要考虑到软件键盘会占据部分屏幕。为了解决这个问题，我将介绍一种方法：使用 `UIScrollView`\
    \ 作为容器视图来容纳所有其他 UI 控件。`UIScrollView` 的作用是在软键盘弹出时帮助我们整体上移视图。为此，第一步是在 `UITextView`\
    \ 的委托方法中添加方法 `-(void)moveTextViewForKeyboard:(NSNotification *)aNotification up:(BOOL)up`。当\
    \ `UITextView` 进入编辑模式时，你需要将 `UITextView` 上移以适应软键盘；当 `UITextView` 结束编辑时，再将 `UITextView`\
    \ 下移。\n\n```\n- (void)textViewDidBeginEditing:(UITextView *)textView {\n  [self\
    \ moveTextViewForKeyboard:nil up:YES];\n}\n\n- (BOOL)textViewShouldEndEditing:(UITextView\
    \ *)textView\n{\n  [self moveTextViewForKeyboard:nil up:NO];\n  return YES;\n\
    }\n```\n\n接下来，实现如何上下移动 `UITextView`。在竖屏模式下，软键盘的高度已知为 216 点。移动 `UITextView` 的核心思路是将其原点位置改变\
    \ 0.7 * 键盘高度的量，从而为软键盘腾出空间。在下面的实现中，我还考虑了设备处于横屏模式的情况。\n\n```\n#pragma mark - 键盘事件通知\n\
    - (void)moveTextViewForKeyboard:(NSNotification*)aNotification up:(BOOL)up {\n\
    \  CGRect keyboardEndFrame = CGRectMake(0.0, 0.0, self.view.frame.size.width,\
    \ KEYBOARD_HEIGHT);\n  [UIView animateWithDuration:1.0 animations:nil completion:^(BOOL\
    \ finished) {\n    CGRect newFrame = self.view.frame;\n    if (keyboardEndFrame.size.height\
    \ > keyboardEndFrame.size.width)\n    {   // 当前处于横屏模式\n      if (keyboardEndFrame.origin.x==0)\n\
    \      {   // 倒置方向，需要翻转原点\n        newFrame.origin = CGPointMake(keyboardEndFrame.size.width,\
    \ 0);\n      }\n      newFrame.size.width -= keyboardEndFrame.size.width * (up?1:-1);\n\
    \    } else\n    {   // 竖屏模式\n      if (keyboardEndFrame.origin.y==0)\n      {\n\
    \        // 倒置方向，需要翻转原点\n        newFrame.origin = CGPointMake(0, keyboardEndFrame.size.height);\n\
    \      }\n      CGPoint origin = CGPointMake(0, keyboardEndFrame.size.height*\
    \ 0.7*(up?-1:0));\n      newFrame.origin = origin;\n    }\n    self.view.frame\
    \ = newFrame;\n  }];\n}\n```\n\n最后，你还可以调用一个简单的 `UIScrollView` 方法，当管理员拖动 `UIScrollView`\
    \ 实例时，可以关闭由任何 `UITextField` 或 `UITextView` 触发的软件键盘。\n\n```\nself.scrollView.keyboardDismissMode\
    \ = UIScrollViewKeyboardDismissModeOnDrag;\n```\n"
- fmt: "### Select Brand\n\nA better user experience is one in which you let your\
    \ admin select a brand from a list; this is how you can do that. You query the\
    \ brands from the Parse back end in `viewDidLoad`. In my implementation, I use\
    \ a method for this purpose:\n\n`-(void)fireUpBrands`\n\n```\n- (void)viewDidLoad\
    \ {\n    [super viewDidLoad];\n    [self fireUpBrands];\n    // Do any additional\
    \ setup after loading the view.\n    self.title = NSLocalizedString(@\"New Product\"\
    , @\"New Product\");\n    self.scrollView.keyboardDismissMode = UIScrollViewKeyboardDismissModeOnDrag;\n\
    \    self.product = [EMABProduct object];\n}\n```\n\nYou also have to define `NSArray`\
    \ properties, `brands`, and then a way to hold the query results. This is the\
    \ implementation:\n\n```\n-(void)fireUpBrands\n{\n    __weak typeof(self) weakSelf\
    \ = self;\n    PFQuery *brandQuery = [EMABCategory basicQuery];\n    [brandQuery\
    \ findObjectsInBackgroundWithBlock:^(NSArray *objects, NSError *error) {\n   \
    \     if (!error) {\n            weakSelf.brands = objects;\n            weakSelf.brandTextField.inputView\
    \ = weakSelf.brandPickerView;\n        }\n    }];\n}\n```\n\nYou query Parse to\
    \ get all brands and let the `inputView` of the brand `UITextField`’s `inputView`\
    \ the instance of a `UIPickerView`.\n\n```\n-(UIPickerView *)brandPickerView{\n\
    \    if (_brandPickerView ==nil) {\n        _brandPickerView = [[UIPickerView\
    \ alloc] initWithFrame:CGRectZero];\n        _brandPickerView.showsSelectionIndicator\
    \ = YES;    // note this is default to NO\n        _brandPickerView.tag = 121;\n\
    \        // this view controller is the data source and delegate\n        _brandPickerView.delegate\
    \ = self;\n        _brandPickerView.dataSource = self;\n        CGRect screenRect\
    \ = [[UIScreen mainScreen] applicationFrame];\n        CGSize pickerSize = [_brandPickerView\
    \ sizeThatFits:CGSizeZero];\n        CGRect startRect = CGRectMake(0.0,\n    \
    \                                  screenRect.origin.y + screenRect.size.height,\n\
    \                                      pickerSize.width, pickerSize.height);\n\
    \        _brandPickerView.frame = startRect;\n        // compute the end frame\n\
    \        CGRect pickerRect = CGRectMake(0.0,\n                               \
    \        screenRect.origin.y + screenRect.size.height - pickerSize.height,\n \
    \                                      pickerSize.width,\n                   \
    \                    pickerSize.height);\n        // add some animation if you\
    \ like\n        _brandPickerView.frame = pickerRect;\n    }\n    return _brandPickerView;\n\
    }\n```\n\nYou have the `brands` array; now let it be the data source of `UIPickerView`.\n\
    \n```\n#pragma mark - UIPickerViewDataSource\n\n- (NSInteger)numberOfComponentsInPickerView:(UIPickerView\
    \ *)pickerView {\n    return 1;\n}\n\n- (NSInteger)pickerView:(UIPickerView *)pickerView\
    \ numberOfRowsInComponent:(NSInteger)component {\n    return [self.brands count];\n\
    }\n\n#pragma mark - UIPickerViewDelegate\n\n-(NSString *)pickerView:(UIPickerView\
    \ *)pickerView titleForRow:(NSInteger)row forComponent:(NSInteger)component\n\
    {\n    if (self.brands && [self.brands count] > 0) {\n        EMABCategory *brand\
    \ = self.brands[row];\n        return brand.title;\n    }\n    return NSLocalizedString(@\"\
    No Data\", @\"No Data\");\n}\n\n- (void)pickerView:(UIPickerView *)pickerView\
    \ didSelectRow:(NSInteger)row inComponent:(NSInteger)component {\n    EMABCategory\
    \ *brand = self.brands[row];\n    self.product.brand = brand;\n    self.brandTextField.text\
    \ = brand.title;\n}\n```\n\nThe `UIPickerView`’s data source is the brand. When\
    \ an admin selects a row, you let the row object be the brand of this product;\
    \ you also show the brand title in the brand `UITextField`.\n\n### Save\n\nIn\
    \ the view controller, you have set two bar button items on `UINavigationBar`.\
    \ One is for “Save”; the other is for “Cancel.” When an admin is ready to save\
    \ the product information, the “Save” button can be tapped. Under the hood, you\
    \ call the asynchronous method `PFObject` `-(void)saveInBackgroundWithBlock:^(BOOL\
    \ succeeded, NSError *error)` to save the product to the Parse back end, and then\
    \ leave the page. If any error occurs, you show the error.\n\n```\n-(IBAction)onDone:(id)sender\n\
    {\n    [self.desciptionTextView resignFirstResponder];\n    self.product.name\
    \ = self.nameTextField.text;\n    self.product.unitPrice  = [self.priceTextField.text\
    \ doubleValue];\n    self.product.priceUnit = self.unitTextField.text;\n    self.product.detail\
    \ = self.desciptionTextView.text;\n    [self.product saveInBackgroundWithBlock:^(BOOL\
    \ succeeded, NSError *error) {\n        if (succeeded) {\n            [self.navigationController\
    \ popViewControllerAnimated:YES];\n            [SVProgressHUD showSuccessWithStatus:NSLocalizedString(@\"\
    Saved Successfully\",@\"\")];\n        } else {\n            [SVProgressHUD showErrorWithStatus:[error\
    \ localizedDescription]];\n        }\n    }];\n}\n```\n\nIn the meantime, you\
    \ dismiss this screen while an admin taps the “Cancel” bar button item.\n\n```\n\
    -(IBAction)onCancel:(id)sender{\n    [self.navigationController popViewControllerAnimated:YES];\n\
    }\n```\n\nThose are all the steps to implement this functionality. For the sake\
    \ of completeness, I have also added the header declaration, the delegate declaration\
    \ in the class interface, and some other UI controls and properties.\n\n```\n\
    #import \"EMABAddProductViewController.h\"\n#import \"EMABProduct.h\"\n#import\
    \ \"EMABUser.h\"\n#import <ParseUI/PFImageView.h>\n#import \"EMABAppDelegate.h\"\
    \n#import \"UIImage+Resize.h\"\n#import \"EMABCategory.h\"\n#import \"SVProgressHud.h\"\
    \n\n#define KEYBOARD_HEIGHT 216.0\n\n@interface EMABAddProductViewController ()<UITextFieldDelegate,\
    \ UIGestureRecognizerDelegate, UIImagePickerControllerDelegate, UINavigationControllerDelegate,\
    \ UIPickerViewDelegate, UIPickerViewDataSource, UIScrollViewDelegate, UIAlertViewDelegate>{\n\
    \    UIImagePickerController * imagePickerController;\n}\n\n@property (nonatomic,\
    \ weak) IBOutlet UIScrollView *scrollView;\n@property (nonatomic, strong) EMABProduct\
    \ *product;\n@property (nonatomic, strong) EMABUser *owner;\n@property (nonatomic,\
    \ strong) NSArray *brands;\n@property (nonatomic, strong) UIPickerView *brandPickerView;\n\
    \n@end\n```\n\n## Summary\n\nIn this chapter, I talked about how to log in as\
    \ an admin and how to add a product or edit one.\n\n# 17. Promotion\n\nElectronic\
    \ supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1317-9_​17](http://dx.doi.org/10.1007/978-1-4842-1317-9_17))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    Push notification marketing is frequently used to promote discounts, deals, and\
    \ new products. In general, creating the feature of push notification marketing\
    \ can be quite complicated. A common use case is that once an app receives a push\
    \ notification and a user taps it, the app will bring up the product page directly\
    \ or a promotion section within this app. It will take quite an effort to establish\
    \ features like this. However, we also have seen a use case like this: The user’s\
    \ device received a push notification; the user opens the app and then sees a\
    \ promotion page. This page acts like a flyer and has content similar to “Check\
    \ out our new products.” Or “10% off for X’mas.” Since the flyer page is an overlay\
    \ on top of the main app, it can be dismissed with a tap. In this chapter, I will\
    \ show you how to implement this behavior by using Parse’s easy-to-use push notification\
    \ feature.\n\nKeep in mind though, to see this in action, you need to configure\
    \ your app to receive push notifications with Apple Developer Portal and Parse,\
    \ as introduced in [Chapter 4](#A978-1-4842-1317-9_4_Chapter.html)."
  raw: '### Select Brand


    A better user experience is one in which you let your admin select a brand from
    a list; this is how you can do that. You query the brands from the Parse back
    end in `viewDidLoad`. In my implementation, I use a method for this purpose:


    `-(void)fireUpBrands.`


    `- (void)viewDidLoad {`


        `[super viewDidLoad];`


        `[self fireUpBrands];`


        `// Do any additional setup after loading the view.`


        `self.title = NSLocalizedString(@"New Product", @"New Product");`


        `self.scrollView.keyboardDismissMode = UIScrollViewKeyboardDismissModeOnDrag;`


        `self.product = [EMABProduct object];`


    `}`


    You also have to define NSArray properties, brands, and then a way to hold the
    query results. This is the implementation:


    `-(void)fireUpBrands`


    `{`


        `__weak typeof(self) weakSelf = self;`


        `PFQuery *brandQuery = [EMABCategory basicQuery];`


        `[brandQuery findObjectsInBackgroundWithBlock:^(NSArray *objects, NSError
    *error) {`


            `if (!error) {`


                `weakSelf.brands = objects;`


                `weakSelf.brandTextField.inputView = weakSelf.brandPickerView;`


            `}`


        `}];`


    `}`


    You query Parse to get all brands and let the inputview of the brand UITextField’s
    inputView the instance of a UIPickerView.


    `-(UIPickerView *)brandPickerView{`


        `if (_brandPickerView ==nil) {`


            `_brandPickerView = [[UIPickerView alloc] initWithFrame:CGRectZero];`


            `_brandPickerView.showsSelectionIndicator = YES;    // note this is default
    to NO`


            `_brandPickerView.tag = 121;`


            `// this view controller is the data source and delegate`


            `_brandPickerView.delegate = self;`


            `_brandPickerView.dataSource = self;`


            `CGRect screenRect = [[UIScreen mainScreen] applicationFrame];`


            `CGSize pickerSize = [_brandPickerView sizeThatFits:CGSizeZero];`


            `CGRect startRect = CGRectMake(0.0,`


                                          `screenRect.origin.y + screenRect.size.height,`


                                          `pickerSize.width, pickerSize.height);`


            `_brandPickerView.frame = startRect;`


            `// compute the end frame`


            `CGRect pickerRect = CGRectMake(0.0,`


                                           `screenRect.origin.y + screenRect.size.height
    - pickerSize.height,`


                                           `pickerSize.width,`


                                           `pickerSize.height);`


            `// add some animation if you like`


            `_brandPickerView.frame = pickerRect;`


        `}`


        `return _brandPickerView;`


    `}`


    You have the brands array; now let it be the data source of UIPickerView.


    `#pragma mark - UIPickerViewDataSource`


    `- (NSInteger)numberOfComponentsInPickerView:(UIPickerView *)pickerView {`


        `return 1;`


    `}`


    `- (NSInteger)pickerView:(UIPickerView *)pickerView numberOfRowsInComponent:(NSInteger)component
    {`


    `return  [self.brands count];`


    `}`


    `#pragma mark - UIPickerViewDelegate`


    `-(NSString *)pickerView:(UIPickerView *)pickerView titleForRow:(NSInteger)row
    forComponent:(NSInteger)component`


    `{`


        `if (self.brands && s[elf.brands count] > 0) {`


            `EMABCategory *brand= self.brands[row];`


            `return brand.title;`


        `}`


        `return NSLocalizedString(@"No Data", @"No Data");`


    `}`


    `- (void)pickerView:(UIPickerView *)pickerView didSelectRow:(NSInteger)row inComponent:(NSInteger)component
    {`


            `EMABCategory *brand= self.brands[row];`


            `self.product.brand = brand;`


            `self.brandTextField.text = brand.title;`


    `}`


    The UIPickerView’s data source is the brand. When an admin selects a row, you
    let the row object be the brand of this product; you also show the brand title
    in the brand UITextField.


    ### Save


    In the view controller, you have set two bar button items on UINavigationBar.
    One is for “Save”; the other is for “Cancel.” When an admin is ready to save the
    product information, the “Save” button can be tapped. Under the hood, you call
    the asynchronous method PFObject `-(void)saveInBackgroundWithBlock:^(BOOL succeeded,
    NSError *error)` to save the product to the Parse back end, and then leave the
    page. If any error occurs, you show the error.


    `-(IBAction)onDone:(id)sender`


    `{`


        `[self.desciptionTextView resignFirstResponder];`


        `self.product.name = self.nameTextField.text;`


        `self.product.unitPrice  = [self.priceTextField.text doubleValue];`


        `self.product.priceUnit = self.unitTextField.text;`


        `self.product.detail = self.desciptionTextView.text;`


            `[self.product saveInBackgroundWithBlock:^(BOOL succeeded, NSError *error)
    {`


                `if (succeeded) {`


                    `[self.navigationController popViewControllerAnimated:YES];`


                    `[SVProgressHUD showSuccessWithStatus:NSLocalizedString(@"Saved  Successfully",@"")];`


                `} else{`


                    `[SVProgressHUD showErrorWithStatus:[error localizedDescription]];`


                `}`


            `}];`


        `}`


    `}`


    In the meantime, you dismiss this screen while an admin taps the “Cancel” bar
    button item.


    `-(IBAction)onCancel:(id)sender{`


        `[self.navigationController popViewControllerAnimated:YES];`


    `}`


    Those are all the steps to implement this functionality. For the the sake of completeness,
    I have also added the header declaration, the delegate declaration in the class
    interface, and some other UI controls and properties.


    `#import "EMABAddProductViewController.h"`


    `#import "EMABProduct.h"`


    `#import "EMABUser.h"`


    `#import <ParseUI/PFImageView.h>`


    `#import "EMABAppDelegate.h"`


    `#import "UIImage+Resize.h"`


    `#import "EMABCategory.h"`


    `#import "SVProgressHud.h"`


    `#define KEYBOARD_HEIGHT 216.0`


    `@interface EMABAddProductViewController ()<UITextFieldDelegate, UIGestureRecognizerDelegate,
    UIImagePickerControllerDelegate, UINavigationControllerDelegate, UIPickerViewDelegate,
    UIPickerViewDataSource, UIScrollViewDelegate, UIAlertViewDelegate>{`


        `UIImagePickerController * imagePickerController;`


    `}`


    `@property (nonatomic, weak) IBOutlet UIScrollView *scrollView;`


    `@property (nonatomic, strong) EMABProduct *product;`


    `@property (nonatomic, strong) EMABUser *owner;`


    `@property (nonatomic, strong) NSArray *brands;`


    `@property (nonatomic, strong) UIPickerView *brandPickerView;`


    `@end`


    ## Summary


    In this chapter, I talked about how to log in as an admin and how to add a product
    or edit one.


    # 17. Promotion


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1317-9_​17](http://dx.doi.org/10.1007/978-1-4842-1317-9_17))
    contains supplementary material, which is available to authorized users.


    Push notification marketing is frequently used to promote discounts, deals, and
    new products. In general, creating the feature of push notification marketing
    can be quite complicated. A common use case is that once an app receives a push
    notification and a user taps it, the app will bring up the product page directly
    or a promotion section within this app. It will take quite an effort to establish
    features like this. However, we also have seen a use case like this: The user’s
    device received a push notification; the user opens the app and then sees a promotion
    page. This page acts like a flyer and has content similar to “Check out our new
    products.” Or “10% off for X’mas.” Since the flyer page is an overlay on top of
    the main app, it can be dismissed with a tap. In this chapter, I will show you
    how to implement this behavior by using Parse’s easy-to-use push notification
    feature.


    Keep in mind though, to see this in action, you need to configure your app to
    receive push notifications with Apple Developer Portal and Parse, as introduced
    in [Chapter 4](#A978-1-4842-1317-9_4_Chapter.html).'
  trans: "\n### 选择品牌\n\n让管理员从列表中选择品牌能带来更好的用户体验，以下是实现方法。在 `viewDidLoad` 中，你从 Parse\
    \ 后端查询品牌。在我的实现中，我使用了一个专门的方法来完成此任务：\n\n`-(void)fireUpBrands`\n\n```\n- (void)viewDidLoad\
    \ {\n    [super viewDidLoad];\n    [self fireUpBrands];\n    // 加载视图后的其他设置\n \
    \   self.title = NSLocalizedString(@\"新产品\", @\"新产品\");\n    self.scrollView.keyboardDismissMode\
    \ = UIScrollViewKeyboardDismissModeOnDrag;\n    self.product = [EMABProduct object];\n\
    }\n```\n\n你还需要定义 `NSArray` 属性 `brands`，以及一个用于保存查询结果的变量。以下是具体实现：\n\n```\n-(void)fireUpBrands\n\
    {\n    __weak typeof(self) weakSelf = self;\n    PFQuery *brandQuery = [EMABCategory\
    \ basicQuery];\n    [brandQuery findObjectsInBackgroundWithBlock:^(NSArray *objects,\
    \ NSError *error) {\n        if (!error) {\n            weakSelf.brands = objects;\n\
    \            weakSelf.brandTextField.inputView = weakSelf.brandPickerView;\n \
    \       }\n    }];\n}\n```\n\n你查询 Parse 以获取所有品牌，并将品牌 `UITextField` 的 `inputView`\
    \ 设置为 `UIPickerView` 的实例。\n\n```\n-(UIPickerView *)brandPickerView{\n    if (_brandPickerView\
    \ ==nil) {\n        _brandPickerView = [[UIPickerView alloc] initWithFrame:CGRectZero];\n\
    \        _brandPickerView.showsSelectionIndicator = YES;    // 注意：此属性默认值为 NO\n\
    \        _brandPickerView.tag = 121;\n        // 将本视图控制器设置为数据源和代理\n        _brandPickerView.delegate\
    \ = self;\n        _brandPickerView.dataSource = self;\n        CGRect screenRect\
    \ = [[UIScreen mainScreen] applicationFrame];\n        CGSize pickerSize = [_brandPickerView\
    \ sizeThatFits:CGSizeZero];\n        CGRect startRect = CGRectMake(0.0,\n    \
    \                                  screenRect.origin.y + screenRect.size.height,\n\
    \                                      pickerSize.width, pickerSize.height);\n\
    \        _brandPickerView.frame = startRect;\n        // 计算最终位置\n        CGRect\
    \ pickerRect = CGRectMake(0.0,\n                                       screenRect.origin.y\
    \ + screenRect.size.height - pickerSize.height,\n                            \
    \           pickerSize.width,\n                                       pickerSize.height);\n\
    \        // 如果喜欢，可以添加一些动画效果\n        _brandPickerView.frame = pickerRect;\n  \
    \  }\n    return _brandPickerView;\n}\n```\n\n现在你有了 `brands` 数组，需要将它设置为 `UIPickerView`\
    \ 的数据源。\n\n```\n#pragma mark - UIPickerViewDataSource\n\n- (NSInteger)numberOfComponentsInPickerView:(UIPickerView\
    \ *)pickerView {\n    return 1;\n}\n\n- (NSInteger)pickerView:(UIPickerView *)pickerView\
    \ numberOfRowsInComponent:(NSInteger)component {\n    return [self.brands count];\n\
    }\n\n#pragma mark - UIPickerViewDelegate\n\n-(NSString *)pickerView:(UIPickerView\
    \ *)pickerView titleForRow:(NSInteger)row forComponent:(NSInteger)component\n\
    {\n    if (self.brands && [self.brands count] > 0) {\n        EMABCategory *brand\
    \ = self.brands[row];\n        return brand.title;\n    }\n    return NSLocalizedString(@\"\
    暂无数据\", @\"暂无数据\");\n}\n\n- (void)pickerView:(UIPickerView *)pickerView didSelectRow:(NSInteger)row\
    \ inComponent:(NSInteger)component {\n    EMABCategory *brand = self.brands[row];\n\
    \    self.product.brand = brand;\n    self.brandTextField.text = brand.title;\n\
    }\n```\n\n`UIPickerView` 的数据源是品牌数组。当管理员选择一行时，将该行对应的对象设置为产品的品牌，同时在品牌 `UITextField`\
    \ 中显示品牌名称。\n\n### 保存\n\n在视图控制器中，你已在 `UINavigationBar` 上设置了两个栏按钮项：一个用于“保存”，另一个用于“取消”。当管理员准备保存产品信息时，可以点击“保存”按钮。在底层，你会调用异步方法\
    \ `PFObject` 的 `-(void)saveInBackgroundWithBlock:^(BOOL succeeded, NSError *error)`\
    \ 将产品保存到 Parse 后端，然后离开当前页面。如果发生任何错误，则显示错误信息。\n\n```\n-(IBAction)onDone:(id)sender\n\
    {\n    [self.desciptionTextView resignFirstResponder];\n    self.product.name\
    \ = self.nameTextField.text;\n    self.product.unitPrice  = [self.priceTextField.text\
    \ doubleValue];\n    self.product.priceUnit = self.unitTextField.text;\n    self.product.detail\
    \ = self.desciptionTextView.text;\n    [self.product saveInBackgroundWithBlock:^(BOOL\
    \ succeeded, NSError *error) {\n        if (succeeded) {\n            [self.navigationController\
    \ popViewControllerAnimated:YES];\n            [SVProgressHUD showSuccessWithStatus:NSLocalizedString(@\"\
    保存成功\",@\"\")];\n        } else {\n            [SVProgressHUD showErrorWithStatus:[error\
    \ localizedDescription]];\n        }\n    }];\n}\n```\n\n同时，当管理员点击“取消”栏按钮项时，关闭当前界面。\n\
    \n```\n-(IBAction)onCancel:(id)sender{\n    [self.navigationController popViewControllerAnimated:YES];\n\
    }\n```\n\n以上是实现此功能所需的所有步骤。为完整起见，我还添加了头文件声明、类接口中的代理声明，以及其他一些 UI 控件和属性。\n\n```\n\
    #import \"EMABAddProductViewController.h\"\n#import \"EMABProduct.h\"\n#import\
    \ \"EMABUser.h\"\n#import <ParseUI/PFImageView.h>\n#import \"EMABAppDelegate.h\"\
    \n#import \"UIImage+Resize.h\"\n#import \"EMABCategory.h\"\n#import \"SVProgressHud.h\"\
    \n\n#define KEYBOARD_HEIGHT 216.0\n\n@interface EMABAddProductViewController ()<UITextFieldDelegate,\
    \ UIGestureRecognizerDelegate, UIImagePickerControllerDelegate, UINavigationControllerDelegate,\
    \ UIPickerViewDelegate, UIPickerViewDataSource, UIScrollViewDelegate, UIAlertViewDelegate>{\n\
    \    UIImagePickerController * imagePickerController;\n}\n\n@property (nonatomic,\
    \ weak) IBOutlet UIScrollView *scrollView;\n@property (nonatomic, strong) EMABProduct\
    \ *product;\n@property (nonatomic, strong) EMABUser *owner;\n@property (nonatomic,\
    \ strong) NSArray *brands;\n@property (nonatomic, strong) UIPickerView *brandPickerView;\n\
    \n@end\n```\n\n## 摘要\n\n在本章中，我讨论了如何以管理员身份登录，以及如何添加或编辑产品。\n\n# 17. 推广\n\n电子补充材料\
    \ 本章的在线版本（doi:[10.​1007/​978-1-4842-1317-9_​17](http://dx.doi.org/10.1007/978-1-4842-1317-9_17)）包含补充材料，仅供授权用户使用。\n\
    \n推送通知营销常用于推广折扣、优惠和新产品。一般来说，创建推送通知营销功能可能相当复杂。一个常见的用例是：当应用收到推送通知且用户点击后，应用会直接跳转到产品页面或应用内的促销专区。实现此类功能需要花费不少精力。然而，我们也见过这样的用例：用户的设备收到推送通知，用户打开应用后看到促销页面。这个页面就像一张传单，内容类似于“看看我们的新产品”或“圣诞特惠九折”。由于该传单页面是覆盖在应用主界面之上的，点击即可关闭。在本章中，我将演示如何利用\
    \ Parse 易用的推送通知功能来实现这一行为。\n\n但请注意，要实际看到效果，你需要按照第 4 章中介绍的方法，通过 Apple Developer\
    \ Portal 和 Parse 配置应用以接收推送通知。\n"
- fmt: "# Model\n\nCreate a new `PFObject` subclass for this promotion model and name\
    \ it `EMABPromotion`. It has two properties: one is for the promotion content,\
    \ and the other is for the promotion image. Here is the header file:\n\n`EMABPromotion.h`\n\
    \n```\n#import <Parse/Parse.h>\n\n@interface EMABPromotion : PFObject<PFSubclassing>\n\
    \n@property (nonatomic, copy) NSString *content;\n@property (nonatomic, strong)\
    \ PFFile *image;\n\n@end\n```\n\nNext, register a new `NSString` constant `kPromotion`\
    \ with the `EMABConstants` class. Also register the new `EMABPromotion` model\
    \ with the `AppDelegate` class. Here is the `EMABPromotion` implementation file:\n\
    \n`EMABPromotion.m`\n\n```\n#import \"EMABPromotion.h\"\n#import <Parse/PFObject+Subclass.h>\n\
    #import \"EMABConstants.h\"\n\n@implementation EMABPromotion\n\n@dynamic content,\
    \ image;\n\n+(NSString *)parseClassName\n{\n    return kPromotion;\n}\n\n@end\n\
    ```\n\n# View\n\nThe promotion flyer view is pretty simple. Use a `UILabel` to\
    \ show the content and a `PFImageView` to show the image, just like a flyer. Figure\
    \ [17-1](#A978-1-4842-1317-9_17_Chapter.html#Fig1) shows what it looks like.\n\
    \n![A978-1-4842-1317-9_17_Fig1_HTML.jpg](A978-1-4842-1317-9_17_Fig1_HTML.jpg)\n\
    \n**Figure 17-1.** This is an example of a promotion flyer\n\n# Controller\n\n\
    Create a new `UIViewController` subclass, and name it `EMABPromotionViewController`.\
    \ Here is the header file for this controller:\n\n`EMABPromotionViewController.h`\n\
    \n```\n#import <UIKit/UIKit.h>\n\n@class EMABPromotion;\n\n@interface EMABPromotionViewController\
    \ : UIViewController\n\n@property (nonatomic, strong) EMABPromotion *promotion;\n\
    \n@end\n```\n\n```\n#import \"EMABPromotionViewController.h\"\n#import \"EMABPromotion.h\"\
    \n#import <ParseUI/PFImageView.h>\n\n@interface EMABPromotionViewController ()\n\
    \n@property (nonatomic, weak) IBOutlet UILabel *contentLabel;\n@property (nonatomic,\
    \ weak) IBOutlet PFImageView *imageView;\n\n@end\n```\n\nHere is the implementation\
    \ file, and it’s pretty basic. Once you have an instance of `EMABPromotion`, connect\
    \ this model with the view. Let the content label show the promotion’s content,\
    \ and let the image view show the promotion’s image.\n\n```\n@implementation EMABPromotionViewController\n\
    \n-(void)setPromotion:(EMABPromotion *)promotion\n{\n    if (_promotion != promotion)\
    \ {\n        _promotion = promotion;\n        [self configureView];\n    }\n}\n\
    \n- (void)viewDidLoad {\n    [super viewDidLoad];\n    // Do any additional setup\
    \ after loading the view.\n    [self configureView];\n    self.navigationItem.leftBarButtonItem\
    \ = [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemDone\
    \ target:self action:@selector(onDone:)];\n}\n\n-(void)configureView {\n    self.contentLabel.text\
    \ = self.promotion.content;\n    if (self.promotion.image) {\n        self.imageView.file\
    \ = self.promotion.image;\n        [self.imageView loadInBackground];\n    }\n\
    }\n\n-(void)onDone:(id)sender {\n    [self dismissViewControllerAnimated:YES completion:nil];\n\
    }\n\n@end\n```\n\nIn the end, use a bar button item to dismiss the view controller\
    \ when a user taps it.\n\nNext, think about how to show the flyer view controller.\
    \ The content of the flyer is sent with a push notification. The screen is shown\
    \ when a user taps the notification. You need to move over to the `EMABAppDelegate`.\n\
    \nYou know `-(BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions` will be used in response to the user’s tapping on a notification\
    \ message, given that the app is in the background or has not added a helper method\
    \ `-(void)handlePromotion:(NSDictionary *)options`.\n\n```\n- (BOOL)application:(UIApplication\
    \ *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {\n\
    \    // Register EMABPromotion class\n    [EMABPromotion registerSubclass];\n\
    \    // Handle Promotion\n    [self handlePromotion:launchOptions[UIApplicationLaunchOptionsRemoteNotificationKey]];\n\
    \    return YES;\n}\n\n-(void)handlePromotion:(NSDictionary *)notificationPayload\
    \ {\n    // Create a pointer to the Photo object\n    NSString *objectId = [notificationPayload\
    \ objectForKey:@\"p\"];\n    EMABPromotion *promotion = (EMABPromotion *)[PFObject\
    \ objectWithoutDataWithClassName:kPromotion\n                                \
    \                                                 objectId:objectId];\n    [promotion\
    \ fetchIfNeededInBackgroundWithBlock:^(PFObject *object, NSError *error) {\n \
    \       // Show promotion view controller\n        if (!error) {\n           \
    \ UIStoryboard *mainStoryboard = [UIStoryboard storyboardWithName:@\"Main\" bundle:nil];\n\
    \            EMABPromotionViewController *viewController = [mainStoryboard instantiateViewControllerWithIdentifier:@\"\
    EMABPromotionViewController\"];\n            [self.window.rootViewController presentViewController:viewController\
    \ animated:YES completion:nil];\n        }\n    }];\n}\n```\n\nIn this helper\
    \ method, check for a promotion notification message. If yes, construct an `EMABPromotion`\
    \ instance promotion based on one of the keys in the message content, the `objectId`.\
    \ You need to do a little bit of remote fetching to get the entire content. Once\
    \ the fetching is done, bring up the `EMABPromotionViewController`.\n\nWith Parse,\
    \ it’s just that easy.\n\n## Summary\n\nIn this chapter, I have introduced you\
    \ to using push notifications to do a little bit of marketing. Basically, you\
    \ implement a flyer page while a user taps a promotion push notification, then\
    \ your app will query and load the promotion content from the Parse back-end server.\n\
    \n# 18. Security\n\nSo far, I have discussed all of the features for an e-commerce\
    \ iPhone app that I want to talk about except one: how secure the implementation\
    \ is, or how safe it is to use Parse. I will use this chapter to cover the Parse\
    \ security features and how you could follow some industry-standard best practices\
    \ to make this iPhone app more secure.\n\n## Keys\n\nAs you have noticed, there\
    \ are a few keys generated in the project dashboard after a Parse project is created.\
    \ You have used the client key for this iPhone app and the master key in the Parse\
    \ Cloud code. Keep in mind, the client key is not meant to be a security mechanism.\
    \ This key is shipped with your app. Anyone will know what it is by decompiling\
    \ your app and reading the source code or proxying network traffic and seeing\
    \ it on this app on another device. The same rule applies for those other keys\
    \ such as the REST key, .net key, and JavaScript key, which are in the Parse dashboard.\n\
    \nOn the other hand, you might have noticed that you need to protect the master\
    \ key, as mentioned in [Chapter 14](#A978-1-4842-1317-9_14_Chapter.html). Just\
    \ like its name sounds, a master key is like an admin password to your app’s server.\
    \ Keep in mind, don’t include this key into your source code or check-in source\
    \ control. Don’t share it with others. In the Parse Cloud code, you only need\
    \ to call the following method to use the master key:\n\n```\nParse.Cloud.useMasterKey();\n\
    ```\n\nIf your master key is compromised, you can reset it. Simply scroll down\
    \ the page where you can see all of your keys, and then you will see how to reset\
    \ your master key (see Figure [18-1](#A978-1-4842-1317-9_18_Chapter.html#Fig1)).\n\
    \n![A978-1-4842-1317-9_18_Fig1_HTML.jpg](A978-1-4842-1317-9_18_Fig1_HTML.jpg)\n\
    \n**Figure 18-1.** You can reset master key"
  raw: '## Model


    Create a new PFObject subclass for this promotion model and name it “EMABPromotion.”
    It has two properties: one is for the promotion content, and the other is for
    the promotion image. Here is the header file:


    EMABPromotion.h


    `#import <Parse/Parse.h>`


    `@interface EMABPromotion : PFObject<PFSubclassing>`


    `@property (nonatomic, copy) NSString *content;`


    `@property (nonatomic, strong)PFFile *image;`


    `@end`


    Next, register a new NSString constant `kPromotion` with the EMABConstants class.
    Also register the new EMABPromotion model with the AppDelegate class. Here is
    the EMABPromotion implementation file:


    EMABPromotion.m


    `#import "EMABPromotion.h"`


    `#import <Parse/PFObject+Subclass.h>`


    `#import "EMABConstants.h"`


    `@implementation EMABPromotion`


    `@dynamic content, image;`


    `+(NSString *)parseClassName`


    `{`


        `return kPromotion;`


    `}`


    `@end`


    ## View


    The promotion flyer view is pretty simple. Use a UILabel to show the content and
    a PFImageView to show the image, just like a flyer. Figure [17-1](#A978-1-4842-1317-9_17_Chapter.html#Fig1)
    shows what it looks like.


    ![A978-1-4842-1317-9_17_Fig1_HTML.jpg](A978-1-4842-1317-9_17_Fig1_HTML.jpg)


    Figure 17-1.


    This is an example of a promotion flyer


    ## Controller


    Create a new UIViewController subclass, and name it “EMABPromotionViewController.”
    Here is the header file for this controller:


    EMABPromotionViewController.h


    `#import <UIKit/UIKit.h>`


    `@class EMABPromotion;`


    `@interface EMABPromotionViewController : UIViewController`


    `@property (nonatomic, strong) EMABPromotion *promotion;`


    `@end`


    `#import "EMABPromotionViewController.h"`


    `#import "EMABPromotion.h"`


    `#import <ParseUI/PFImageView.h>`


    `@interface EMABPromotionViewController ()`


    `@property (nonatomic, weak) IBOutlet UILabel *contentLabel;`


    `@property (nonatomic, weak) IBOutlet PFImageView *imageView;`


    `@end`


    Here is the implementation file, and it’s pretty basic. Once you have an instance
    of EMABPromotion, connect this model with the view. Let the content label show
    the promotion’s content, and let the image view show the promotion’s image.


    `@implementation EMABPromotionViewController`


    `-(void)setPromotion:(EMABPromotion *)promotion`


    `{`


    `if (_promotion != promotion) {`


    `_promotion = promotion;`


    `[self configureView];`


    `}`


    `}`


    `- (void)viewDidLoad {`


    `[super viewDidLoad];`


    `// Do any additional setup after loading the view.`


    `[self configureView];`


    `self.navigationItem.leftBarButtonItem = [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemDone
    target:self action:@selector(onDone:)];`


    `}`


    `-(void)configureView {`


    `self.contentLabel.text = self.promotion.content;`


    `if (self.promotion.image) {`


    `self.imageView.file = self.promotion.image;`


    `[self.imageView loadInBackground];`


    `}`


    `}`


    `-(void)onDone:(id)sender {`


    `[self dismissViewControllerAnimated:YES completion:nil];`


    `}`


    `@end`


    In the end, use a bar button item to dismiss the view controller when a user taps
    it.


    Next, think about how to show the flyer view controller. The content of the flyer
    is sent with a push notification. The screen is shown when a user taps the notification.
    You need to move over to the EMABAppDelegate.


    You know `-(BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary
    *)launchOptions` will be used in response to the user’s tapping on a notification
    message, given that the app is in the background or has not added a helper method
    `-(void)handlePromotion:(NSDictionary *)options`.


    `- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary
    *)launchOptions {`


    `// Register EMABPromotion class`


    `[EMABPromotion registerSubclass];`


    `// Handle Promotion`


    `[self handlePromotion:launchOptions[UIApplicationLaunchOptionsRemoteNotificationKey]];`


    `return YES;`


    `}`


    `-(void)handlePromotion:(NSDictionary *)notificationPayload {`


    `// Create a pointer to the Photo object`


    `NSString *objectId = [notificationPayload objectForKey:@"p"];`


    `EMABPromotion *promotion = (EMABPromotion *)[PFObject objectWithoutDataWithClassName:kPromotion`


    `objectId:objectId];`


    `[promotion fetchIfNeededInBackgroundWithBlock:^(PFObject *object, NSError *error)
    {`


    `// Show promotion view controller`


    `if (!error) {`


    `UIStoryboard *mainStoryboard = [UIStoryboard storyboardWithName:@"Main" bundle:nil];`


    `EMABPromotionViewController *viewController = [mainStoryboard instantiateViewControllerWithIdentifier:@"EMABPromotionViewController"];`


    `[self.window.rootViewController presentViewController:viewController animated:YES
    completion:nil];`


    `}`


    `}];`


    `}`


    In this helper method, check for a promotion notification message. If yes, construct
    an EMABPromotion instance promotion based on one of the keys in the message content,
    the `objectId`. You need to do a little bit of remote fetching to get the entire
    content. Once the fetching is done, bring up the EMABPromotionViewController.


    With Parse, it’s just that easy.


    ### Summary


    In this chapter, I have introduced you to using push notifications to do a little
    bit of marketing. Basically, you implement a flyer page while a user taps a promotion
    push notification, then your app will query and load the promotion content from
    the Parse back-end server.


    # 18. Security


    So far, I have discussed all of the features for an e-commerce iPhone app that
    I want to talk about except one: how secure the implementation is, or how safe
    it is to use Parse. I will use this chapter to cover the Parse security features
    and how you could follow some industry-standard best practices to make this iPhone
    app more secure.


    ## Keys


    As you have noticed, there are a few keys generated in the project dashboard after
    a Parse project is created. You have used the client key for this iPhone app and
    the master key in the Parse Cloud code. Keep in mind, the client key is not meant
    to be a security mechanism. This key is shipped with your app. Anyone will know
    what it is by decompiling your app and reading the source code or proxying network
    out traffic and seeing it on this app on another device. The same rule applies
    for those other keys such as the REST key, .net key, and JavaScript key, which
    are in the Parse dashboard.


    On the other hand, you might have noticed that you need to protect the master
    key, as mentioned in [Chapter 14](#A978-1-4842-1317-9_14_Chapter.html). Just like
    its name sounds, a master key is like an admin password to your app’s server.
    Keep in mind, don’t include this key into your source code or check-in source
    control. Don’t share it with others. In the Parse Cloud code, you only need to
    call the following method to use the master key:


    `Parse.Cloud.useMasterKey();`


    If your master key is compromised, you can reset it. Simply scroll down the page
    where you can see all of your keys, and then you will see how to reset your master
    key (see Figure [18-1](#A978-1-4842-1317-9_18_Chapter.html#Fig1)).


    ![A978-1-4842-1317-9_18_Fig1_HTML.jpg](A978-1-4842-1317-9_18_Fig1_HTML.jpg)


    Figure 18-1.


    You can reset master key'
  trans: "\n# 模型\n\n为此促销模型创建一个新的`PFObject`子类，并将其命名为`EMABPromotion`。它包含两个属性：一个用于促销内容，另一个用于促销图片。以下是头文件：\n\
    \n`EMABPromotion.h`\n\n```\n#import <Parse/Parse.h>\n\n@interface EMABPromotion\
    \ : PFObject<PFSubclassing>\n\n@property (nonatomic, copy) NSString *content;\n\
    @property (nonatomic, strong) PFFile *image;\n\n@end\n```\n\n接下来，在`EMABConstants`类中注册一个新的`NSString`常量`kPromotion`。同时，在`AppDelegate`类中注册新的`EMABPromotion`模型。以下是`EMABPromotion`的实现文件：\n\
    \n`EMABPromotion.m`\n\n```\n#import \"EMABPromotion.h\"\n#import <Parse/PFObject+Subclass.h>\n\
    #import \"EMABConstants.h\"\n\n@implementation EMABPromotion\n\n@dynamic content,\
    \ image;\n\n+(NSString *)parseClassName\n{\n    return kPromotion;\n}\n\n@end\n\
    ```\n\n# 视图\n\n促销传单视图非常简单。使用`UILabel`显示内容，使用`PFImageView`显示图片，就像传单一样。图 17-1 展示了它的外观。\n\
    \n![A978-1-4842-1317-9_17_Fig1_HTML.jpg](img/A978-1-4842-1317-9_17_Fig1_HTML.jpg)\n\
    \n**图 17-1.** 促销传单示例\n\n# 控制器\n\n创建一个新的`UIViewController`子类，并将其命名为`EMABPromotionViewController`。以下是该控制器的头文件：\n\
    \n`EMABPromotionViewController.h`\n\n```\n#import <UIKit/UIKit.h>\n\n@class EMABPromotion;\n\
    \n@interface EMABPromotionViewController : UIViewController\n\n@property (nonatomic,\
    \ strong) EMABPromotion *promotion;\n\n@end\n```\n\n```\n#import \"EMABPromotionViewController.h\"\
    \n#import \"EMABPromotion.h\"\n#import <ParseUI/PFImageView.h>\n\n@interface EMABPromotionViewController\
    \ ()\n\n@property (nonatomic, weak) IBOutlet UILabel *contentLabel;\n@property\
    \ (nonatomic, weak) IBOutlet PFImageView *imageView;\n\n@end\n```\n\n以下是实现文件，逻辑非常基础。一旦获得`EMABPromotion`实例，就将此模型与视图连接起来。让内容标签显示促销内容，让图片视图显示促销图片。\n\
    \n```\n@implementation EMABPromotionViewController\n\n-(void)setPromotion:(EMABPromotion\
    \ *)promotion\n{\n    if (_promotion != promotion) {\n        _promotion = promotion;\n\
    \        [self configureView];\n    }\n}\n\n- (void)viewDidLoad {\n    [super\
    \ viewDidLoad];\n    // Do any additional setup after loading the view.\n    [self\
    \ configureView];\n    self.navigationItem.leftBarButtonItem = [[UIBarButtonItem\
    \ alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemDone target:self action:@selector(onDone:)];\n\
    }\n\n-(void)configureView {\n    self.contentLabel.text = self.promotion.content;\n\
    \    if (self.promotion.image) {\n        self.imageView.file = self.promotion.image;\n\
    \        [self.imageView loadInBackground];\n    }\n}\n\n-(void)onDone:(id)sender\
    \ {\n    [self dismissViewControllerAnimated:YES completion:nil];\n}\n\n@end\n\
    ```\n\n最后，使用一个栏按钮项，当用户点击时关闭视图控制器。\n\n接下来，思考如何显示传单视图控制器。传单的内容通过推送通知发送。当用户点击通知时，屏幕会显示。你需要转到`EMABAppDelegate`。\n\
    \n你会用到`-(BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions` 来响应用户点击通知消息的操作（假设应用处于后台），或者在没有辅助方法`-(void)handlePromotion:(NSDictionary\
    \ *)options`的情况下使用。\n\n```\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions {\n    // Register EMABPromotion class\n    [EMABPromotion registerSubclass];\n\
    \    // Handle Promotion\n    [self handlePromotion:launchOptions[UIApplicationLaunchOptionsRemoteNotificationKey]];\n\
    \    return YES;\n}\n\n-(void)handlePromotion:(NSDictionary *)notificationPayload\
    \ {\n    // Create a pointer to the Photo object\n    NSString *objectId = [notificationPayload\
    \ objectForKey:@\"p\"];\n    EMABPromotion *promotion = (EMABPromotion *)[PFObject\
    \ objectWithoutDataWithClassName:kPromotion\n                                \
    \                                                 objectId:objectId];\n    [promotion\
    \ fetchIfNeededInBackgroundWithBlock:^(PFObject *object, NSError *error) {\n \
    \       // Show promotion view controller\n        if (!error) {\n           \
    \ UIStoryboard *mainStoryboard = [UIStoryboard storyboardWithName:@\"Main\" bundle:nil];\n\
    \            EMABPromotionViewController *viewController = [mainStoryboard instantiateViewControllerWithIdentifier:@\"\
    EMABPromotionViewController\"];\n            [self.window.rootViewController presentViewController:viewController\
    \ animated:YES completion:nil];\n        }\n    }];\n}\n```\n\n在此辅助方法中，检查是否有促销通知消息。如果有，则根据消息内容中的一个键（即`objectId`）构造一个`EMABPromotion`实例。你需要执行一些远程获取操作来获取完整内容。获取完成后，弹出`EMABPromotionViewController`。\n\
    \n使用 Parse，就是这么简单。\n\n## 总结\n\n在本章中，我介绍了如何利用推送通知进行一些营销活动。基本上，当用户点击促销推送通知时，你实现一个传单页面，然后你的应用会从\
    \ Parse 后端服务器查询并加载促销内容。\n\n# 18. 安全\n\n到目前为止，我已经讨论了我想要介绍的一款电商 iPhone 应用的所有功能，除了一点：实现的安全性如何，或者说使用\
    \ Parse 有多安全。本章将介绍 Parse 的安全特性，以及你如何遵循一些行业标准最佳实践来让这款 iPhone 应用更加安全。\n\n## 密钥\n\
    \n你可能已经注意到，在创建 Parse 项目后，项目仪表板中会生成一些密钥。你在本 iPhone 应用中使用了客户端密钥，在 Parse 云代码中使用了主密钥。请记住，客户端密钥并非安全机制。此密钥随你的应用一起发布。任何人通过反编译你的应用并读取源代码，或者通过代理网络流量并在另一台设备上查看此应用，都会知道这个密钥。同样的规则也适用于\
    \ Parse 仪表板中的其他密钥，如 REST 密钥、.net 密钥和 JavaScript 密钥。\n\n另一方面，你可能已经注意到，如第 14 章所述，你需要保护主密钥。正如其名称所示，主密钥就像应用服务器的管理员密码。请记住，不要将此密钥包含在你的源代码中，也不要将其签入源代码管理。不要与他人分享。在\
    \ Parse 云代码中，你只需调用以下方法即可使用主密钥：\n\n```\nParse.Cloud.useMasterKey();\n```\n\n如果你的主密钥泄露，你可以重置它。只需向下滚动页面，直到看到所有密钥，然后你就会看到如何重置主密钥（见图\
    \ 18-1）。\n\n![A978-1-4842-1317-9_18_Fig1_HTML.jpg](img/A978-1-4842-1317-9_18_Fig1_HTML.jpg)\n\
    \n**图 18-1.** 你可以重置主密钥\n"
- fmt: "# Permissions\n\nIn this e-commerce app, most of your users can only read\
    \ brands and products information. Only a few can create, edit, or delete a brand\
    \ and a product. This is a typical use case of permissions.\n\n`Parse` makes it\
    \ easier for you to create class-level permissions. Almost every class that you\
    \ create should have some read-write permissions to some degree.\n\nTo start with\
    \ your class-level permissions, click on “Security” in the Data Browser for the\
    \ class you want to configure (see Figure [18-2](#A978-1-4842-1317-9_18_Chapter.html#Fig2)).\n\
    \n![A978-1-4842-1317-9_18_Fig2_HTML.jpg](A978-1-4842-1317-9_18_Fig2_HTML.jpg)\n\
    \nFigure 18-2. Set the class-level permission (CLP)\n\nIn the `FavoriteProduct`\
    \ class, the default permission is that everyone can read and write this class,\
    \ which fits your use case. However, the correct permission for the `Product`\
    \ class should be “Read” for everyone, and “Write” for “a few.” “A few” can be\
    \ certain predefined Roles or Users. A Role is simply a set of Users and Roles\
    \ who should share some of the same permissions. For example, you can set up a\
    \ Role called `admins` and make a table writable only by that role.\n\nWhile in\
    \ development mode, the “client class creation” is automatically on, which is\
    \ a great benefit for a developer who doesn’t needs to leave Xcode to create a\
    \ class with its properties. It’s recommended to turn this feature off while your\
    \ app is in production mode. Figure [18-3](#A978-1-4842-1317-9_18_Chapter.html#Fig3)\
    \ shows how you can disable it.\n\n![A978-1-4842-1317-9_18_Fig3_HTML.jpg](A978-1-4842-1317-9_18_Fig3_HTML.jpg)\n\
    \nFigure 18-3. App-level client class creation\n\n## Access Control List (ACL)\n\
    \nIf an object doesn’t have an ACL, it’s readable and writable by everyone. The\
    \ only exception is the `_User` class. You never allow users to write each other’s\
    \ data, but they can read it by default. To make it super easy to create user-private\
    \ ACLs for every object, you have a way to set a default ACL that will be used\
    \ for every new object you create.\n\n```\n[PFACL setDefaultACL:[PFACL ACL] withAccessForCurrentUser:YES];\n\
    ```\n\nAnd you put this line code in the method of `- (BOOL)application:(UIApplication\
    \ *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions` in\
    \ `AppDelegate.m`.\n\nLet me also go over some other common use cases you might\
    \ need to handle.\n\nThe first and quite common use case is that you can set different\
    \ read and write permissions on an object. For example, this is how you would\
    \ create an ACL for a product review posted by a user, where anyone can read it:\n\
    \n```\nPFACL *acl = [PFACL ACL];\n[acl setPublicReadAccess:true];\n[acl setWriteAccess:true\
    \ forUser:[PFUser currentUser]];\n[review setACL: acl];\n```\n\nThe second case\
    \ is a user’s data, such as e-mail addresses or phone numbers. You don’t want\
    \ to let other users see each other’s e-mail. To set an ACL on the current user’s\
    \ data that should not be publicly readable, all you have to do is this:\n\n```\n\
    PFUser *user = [PFUser currentUser];\nuser.ACL = [PFACL ACLWithUser:user];\n```\n\
    \nThe third case is that you want some data created by a user that is public and\
    \ some that is private; it’s best to have two separate objects. You can add a\
    \ pointer to the private data from the public one.\n\n```\nPFObject *privateData\
    \ = [PFObject objectWithClassName:@\"PrivateUserData\"];\nprivateData.ACL = [PFACL\
    \ ACLWithUser:[PFUser currentUser]];\n[privateData setObject:@\"555-5309\" forKey:@\"\
    phoneNumber\"];\n[PFUser setObject:privateData forKey:@\"privateData\"];\n```\n\
    \nThe fourth use case is that you only limit some super users to write other users’\
    \ data, or if you don’t want to manage permission per-user basis, you can use\
    \ a Role object. Roles are a special kind of object that let us create a group\
    \ of users that can all be assigned to the ACL. For example, you have an `admins`\
    \ role, and you can let some users have this role. While you create a Review object,\
    \ you let `admins` have the full permission of read and write. You can do the\
    \ following:\n\n```\nPFACL *acl = [PFACL ACL];\n[acl setPublicReadAccess:true];\n\
    [acl setWriteAccess:true forRoleWithName:@\"admins\"];\n```\n\nOne of the benefits\
    \ about roles is that you can add and remove users from a role without having\
    \ to update every single object that is restricted to that role.\n\nLast, if you,\
    \ as the developer, need to update other `_User` objects, you can use Cloud Code\
    \ combing with the user `MasterKey` option to do this.\n\n## Cloud Code\n\nIn\
    \ this e-commerce iPhone app, I have shown that you can leave important functionality\
    \ to the Cloud Code, which means you upload JavaScript code to your Parse project\
    \ server. You call some functions to let Parse run it for you. This is different\
    \ from the code for this iPhone app in that it is running on users’ devices. This\
    \ is much easier for people who want to modify your code. On the other hand, you\
    \ can’t always trust what a user has entered. The better practice is that you\
    \ should validate the data that a user has entered; the right place is in Cloud\
    \ Code so that you know a malicious client won’t be able to bypass the validation\
    \ logic you implemented for the client.\n\nFor instance, I have shown that you\
    \ need to verify a user’s e-mail address input before sign-up or login for this\
    \ user in this iPhone app in [Chapters 8](#A978-1-4842-1317-9_8_Chapter.html)\
    \ and [9](#A978-1-4842-1317-9_9_Chapter.html). This practice makes for a better\
    \ user experience purpose than does a security measure. In other words, you don’t\
    \ want to make an app call and then tell the user that the e-mail address entered\
    \ is not valid. However, a hacker can easily bypass the client-side e-mail validation.\
    \ The correct way to validate a user’s input, Cloud Code has `beforeSave` triggers.\
    \ These triggers can be used whenever an object is saved. You also have the chance\
    \ to modify the object or completely reject a save.\n\nFor example, this is how\
    \ you validate that a user has an e-mail address while signing up a user:\n\n\
    ```\nParse.Cloud.beforeSave(Parse.User, function(request, response) {\n  var user\
    \ = request.object;\n  if (!user.get(\"email\")) {\n    response.error(\"Every\
    \ user must have an email address.\");\n  } else {\n    response.success();\n\
    \  }\n});\n```\n\nOn the other hand, there are other cases in which your users\
    \ don’t have full permission to write an object, but you want to bypass that limitation.\
    \ For example, if you want to allow a user to “like” a `Post` object but the user\
    \ doesn’t have full write permissions on the `Post`, you can implement this feature\
    \ by using a Cloud Code function and `useMasterKey` option in your JavaScript\
    \ code. With the `useMasterKey` option, you will override the limitation of writing\
    \ or reading permission.\n\n```\nParse.Cloud.define(\"like\", function(request,\
    \ response) {\n  var post = new Parse.Object(\"Post\");\n  post.id = request.params.postId;\n\
    \  post.increment(\"likes\");\n  post.save(null, { useMasterKey: true }).then(function()\
    \ {\n    response.success();\n  }, function(error) {\n    response.error(error);\n\
    \  });\n});\n```\n\nLast but not least, Parse has provided a great feature by\
    \ allowing a client (for example, your iPhone app) to initiate sending a push\
    \ notification. It provides some flexibility while developing your app. While\
    \ your app is in production, it’s best that you turn this feature off by disabling\
    \ “client push” in your Parse project setting. The reason is the same: you can’t\
    \ trust the behavior from your app. Instead, you should validate the data that\
    \ will be sent by your Cloud Code functions."
  raw: '## Permissions


    In this e-commerce app, most of your users can only read brands and products information.
    Only a few can create, edit, or delete a brand and a product. This is a typical
    use case of permissions.


    Parse makes it easier for you to create class-level permissions. Almost every
    class that you create should have some read-write permissions to some degree.


    To start with your class-level permissions, click on “Security” in the Data Browser
    for the class you want to configure (see Figure [18-2](#A978-1-4842-1317-9_18_Chapter.html#Fig2)).


    ![A978-1-4842-1317-9_18_Fig2_HTML.jpg](A978-1-4842-1317-9_18_Fig2_HTML.jpg)


    Figure 18-2.


    Set the class-level permission (CLP)


    In the “FavoriteProduct” class, the default permission is that everyone can read
    and write this class, which fits your use case. However, the correct permission
    for the “Product” class should be “Read” for everyone, and “Write” for “a few.”
    “A few” can be certain predefined Roles or Users. A Role is simply a set of Users
    and Roles who should share some of the same permissions. For example, you can
    set up a Role called “admins” and make a table writable only by that role.


    While in development mode, the “client class creation” is automatically on, which
    is a great benefit for a developer who doesn’t needs to leave Xcode to create
    a class with its properties. It’s recommended to turn this feature off while your
    app is in production mode. Figure [18-3](#A978-1-4842-1317-9_18_Chapter.html#Fig3)
    shows how you can disable it.


    ![A978-1-4842-1317-9_18_Fig3_HTML.jpg](A978-1-4842-1317-9_18_Fig3_HTML.jpg)


    Figure 18-3.


    App-level client class creation


    ## Access Control List (ACL)


    If an object doesn’t have an ACL, it’s readable and writable by everyone. The
    only exception is the `_User` class. You never allow users to write each other’s
    data, but they can read it by default. To make it super easy to create user-private
    ACLs for every object, you have a way to set a default ACL that will be used for
    every new object you create.


    `[PFACL setDefaultACL:[PFACL ACL] withAccessForCurrentUser:YES];`


    And you put this line code in the method of `- (BOOL)application:(UIApplication
    *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions` in
    AppDelegate.m.


    Let me also go over some other common use cases you might need to handle.


    The first and quite common use case is that you can set different read and write
    permissions on an object. For example, this is how you would create an ACL for
    a product review posted by a user, where anyone can read it:


    `PFACL *acl = [PFACL ACL];`


    `[acl setPublicReadAccess:true];`


    `[acl setWriteAccess:true forUser:[PFUser currentUser]];`


    `[review setACL: acl];`


    The second case is a user’s data, such as e-mail addresses or phone numbers. You
    don’t want to let other users see each other’s e-mail. To set an ACL on the current
    user’s data that should not be publicly readable, all you have to do is this:


    `PFUser *user = [PFUser currentUser];`


    `user.ACL = [PFACL ACLWithUser:user];`


    The third case is that you want some data created by a user that is public and
    some that is private; it’s best to have two separate objects. You can add a pointer
    to the private data from the public one.


    `PFObject *privateData = [PFObject objectWithClassName:@"PrivateUserData"];`


    `privateData.ACL = [PFACL ACLWithUser:[PFUser currentUser]];`


    `[privateData setObject:@"555-5309" forKey:@"phoneNumber"];`


    `[PFUser setObject:privateData forKey:@"privateData"];`


    The fourth use case is that you only limit some super users to write other users’
    data, or if you don’t want to manage permission per-user basis, you can use a
    Role object. Roles are a special kind of object that let us create a group of
    users that can all be assigned to the ACL. For example, you have an “admins” role,
    and you can let some users have this role. While you create a Review object, you
    let “admins” have the full permission of read and write. You can do the following:


    `PFACL *acl = [PFACL ACL];`


    `[acl setPublicReadAccess:true];`


    `[acl setWriteAccess:true forRoleWithName:@"admins"];`


    One of the benefits about roles is that you can add and remove users from a role
    without having to update every single object that is restricted to that role.


    Last, if you, as the developer, need to update other `_User` objects, you can
    use Cloud Code combing with the user MasterKey option to do this.


    ## Cloud Code


    In this e-commerce iPhone app, I have shown that you can leave important functionality
    to the Cloud Code, which means you upload JavaScript code to your Parse project
    server. You call some functions to let Parse run it for you. This is different
    from the code for this iPhone app in that it is running on users’ devices. This
    is much easier for people who want to modify your code. On the other hand, you
    can’t always trust what a user has entered. The better practice is that you should
    validate the data that a user has entered; the right place is in Cloud Code so
    that you know a malicious client won’t be able to bypass the validation logic
    you implemented for the client.


    For instance, I have shown that you need to verify a user’s e-mail address input
    before sign-up or login for this user in this iPhone app in [Chapters 8](#A978-1-4842-1317-9_8_Chapter.html)
    and [9](#A978-1-4842-1317-9_9_Chapter.html). This practice makes for a better
    user experience purpose than does a security measure. In other words, you don’t
    want to make an app call and then tell the user that the e-mail address entered
    is not valid. However, a hacker can easily bypass the client-side e-mail validation.
    The correct way to validate a user’s input, Cloud Code has `beforeSave` triggers.
    These triggers can be used whenever an object is saved. You also have the chance
    to modify the object or completely reject a save.


    For example, this is how you validate that a user has an e-mail address while
    signing up a user:


    `Parse.Cloud.beforeSave(Parse.User, function(request, response) {`


      `var user = request.object;`


      `if (!user.get("email")) {`


        `response.error("Every user must have an email address.");`


      `} else {`


        `response.success();`


      `}`


    `});`


    On the other hand, there are other cases in which your users don’t have full permission
    to write an object, but you want to bypass that limitation. For example, if you
    want to allow a user to “like” a “Post” object but the user doesn’t have full
    write permissions on the “Post,” you can implement this feature by using a Cloud
    Code function and `useMasterKey` option in your JavaScript code. With the `useMasterKey`
    option, you will override the limitation of writing or reading permission.


    `Parse.Cloud.define("like", function(request, response) {`


      `var post = new Parse.Object("Post");`


      `post.id = request.params.postId;`


      `post.increment("likes");`


      `post.save(null, { useMasterKey: true }).then(function() {`


        `response.success();`


      `}, function(error) {`


        `response.error(error);`


      `});`


    `});`


    Last but not least, Parse has provided a great feature by allowing a client (for
    example, your iPhone app) to initiate sending a push notification. It provides
    some flexibility while developing your app. While your app is in production, it’s
    best that you turn this feature off by disabling “client push” in your Parse project
    setting. The reason is the same: you can’t trust the behavior from your app. Instead,
    you should validate the data that will be sent by your Cloud Code functions.'
  trans: "\n# 权限\n\n在此电商应用中，大部分用户只能读取品牌和产品信息。只有少数用户能创建、编辑或删除品牌和产品。这是权限的典型用例。\n\n`Parse`\
    \ 可让你更轻松地创建类级别的权限。你创建的几乎所有类都应在一定程度上拥有某些读写权限。\n\n要开始设置类级别权限，请点击数据浏览器中要配置类的“Security”（安全）选项（见图\
    \ 18-2）。\n\n![A978-1-4842-1317-9_18_Fig2_HTML.jpg](img/A978-1-4842-1317-9_18_Fig2_HTML.jpg)\n\
    \n图 18-2. 设置类级别权限（CLP）\n\n在 `FavoriteProduct` 类中，默认权限是所有用户均可读写该类，这符合你的用例。然而，`Product`\
    \ 类的正确权限设置应为：所有用户可“读取”，仅“少数用户”可“写入”。“少数用户”可以是某些预定义的角色或用户。角色就是一组应共享相同权限的用户和角色。例如，你可以设置一个名为\
    \ `admins` 的角色，并让某个表只有该角色可写。\n\n在开发模式下，“客户端类创建”功能是自动开启的，这对于无需离开 Xcode 就能创建类及其属性的开发者来说是一大便利。建议在应用进入生产模式时关闭此功能。图\
    \ 18-3 展示了如何禁用它。\n\n![A978-1-4842-1317-9_18_Fig3_HTML.jpg](img/A978-1-4842-1317-9_18_Fig3_HTML.jpg)\n\
    \n图 18-3. 应用级别的客户端类创建\n\n## 访问控制列表（ACL）\n\n如果一个对象没有 ACL，则所有用户都可对其进行读写。唯一的例外是 `_User`\
    \ 类。你永远不应允许用户互相写入彼此的数据，但默认情况下他们可以读取。为了非常简便地为每个对象创建用户私有 ACL，你可以设置一个默认的 ACL，该 ACL\
    \ 将用于你创建的每个新对象。\n\n```\n[PFACL setDefaultACL:[PFACL ACL] withAccessForCurrentUser:YES];\n\
    ```\n\n并且将这行代码放入 `AppDelegate.m` 的 `- (BOOL)application:(UIApplication *)application\
    \ didFinishLaunchingWithOptions:(NSDictionary *)launchOptions` 方法中。\n\n接下来，我来介绍一些你可能需要处理的其他常见用例。\n\
    \n第一个相当常见的用例是，你可以对某个对象设置不同的读写权限。例如，以下是为你创建的产品评价（由用户发布，且任何人均可阅读）创建 ACL 的方法：\n\n\
    ```\nPFACL *acl = [PFACL ACL];\n[acl setPublicReadAccess:true];\n[acl setWriteAccess:true\
    \ forUser:[PFUser currentUser]];\n[review setACL: acl];\n```\n\n第二个用例是用户的数据，例如电子邮件地址或电话号码。你不希望让其他用户看到彼此的电子邮件。要为当前用户的数据设置一个不应公开可读的\
    \ ACL，你只需这样做：\n\n```\nPFUser *user = [PFUser currentUser];\nuser.ACL = [PFACL\
    \ ACLWithUser:user];\n```\n\n第三个用例是，你希望某个用户创建的数据既有公开部分也有私有部分；最好的办法是使用两个独立的对象。你可以从公开对象中添加一个指向私有数据的指针。\n\
    \n```\nPFObject *privateData = [PFObject objectWithClassName:@\"PrivateUserData\"\
    ];\nprivateData.ACL = [PFACL ACLWithUser:[PFUser currentUser]];\n[privateData\
    \ setObject:@\"555-5309\" forKey:@\"phoneNumber\"];\n[PFUser setObject:privateData\
    \ forKey:@\"privateData\"];\n```\n\n第四个用例是，你只想限制某些超级用户写入其他用户的数据，或者如果你不想逐个用户地管理权限，可以使用角色对象。角色是一种特殊对象，它允许我们创建一个用户组，这些用户可以全部被分配到一个\
    \ ACL 中。例如，你有一个 `admins` 角色，可以允许某些用户拥有此角色。在创建 Review 对象时，你让 `admins` 拥有完全的读写权限。你可以这样做：\n\
    \n```\nPFACL *acl = [PFACL ACL];\n[acl setPublicReadAccess:true];\n[acl setWriteAccess:true\
    \ forRoleWithName:@\"admins\"];\n```\n\n角色的好处之一是，你可以在不更新受该角色限制的每个对象的情况下，向角色添加或移除用户。\n\
    \n最后，作为开发者，如果你需要更新其他的 `_User` 对象，可以使用云代码结合用户 `MasterKey` 选项来实现。\n\n## 云代码\n\n\
    在这个电商 iPhone 应用中，我已经展示过你可以将重要的功能交给云代码处理，这意味着你将 JavaScript 代码上传到你的 Parse 项目服务器。你调用某些函数，让\
    \ Parse 为你运行它们。这与 iPhone 应用的代码不同，因为它运行在用户的设备上。对于想要修改你代码的人来说，这要容易得多。另一方面，你无法总是信任用户的输入。更好的做法是，你应该验证用户的输入数据；正确的位置是在云代码中，这样恶意客户端就无法绕过你在客户端实现的验证逻辑。\n\
    \n例如，我在第 8 章和第 9 章中展示过，在这个 iPhone 应用中，你需要在该用户注册或登录前验证其电子邮件地址输入。这种做法更多是为了提升用户体验，而非作为安全措施。换句话说，你不希望在发送应用调用后才告诉用户输入的电子邮件地址无效。然而，黑客可以轻松绕过客户端的电子邮件验证。验证用户输入的正确方法是使用云代码的\
    \ `beforeSave`（保存前）触发器。只要对象被保存，这些触发器就会被触发。你还有机会修改对象或完全拒绝保存。\n\n例如，以下是在用户注册时验证其是否有电子邮件地址的方法：\n\
    \n```\nParse.Cloud.beforeSave(Parse.User, function(request, response) {\n  var\
    \ user = request.object;\n  if (!user.get(\"email\")) {\n    response.error(\"\
    每个用户必须有一个电子邮件地址。\");\n  } else {\n    response.success();\n  }\n});\n```\n\n另一方面，还有其他情况，你的用户没有写入某个对象的完全权限，但你希望绕过这个限制。例如，如果你希望允许用户“点赞”一个\
    \ `Post` 对象，但该用户没有 `Post` 对象的完全写入权限，你可以通过在你的 JavaScript 代码中使用云代码函数和 `useMasterKey`\
    \ 选项来实现此功能。使用 `useMasterKey` 选项，你将覆盖写入或读取权限的限制。\n\n```\nParse.Cloud.define(\"\
    like\", function(request, response) {\n  var post = new Parse.Object(\"Post\"\
    );\n  post.id = request.params.postId;\n  post.increment(\"likes\");\n  post.save(null,\
    \ { useMasterKey: true }).then(function() {\n    response.success();\n  }, function(error)\
    \ {\n    response.error(error);\n  });\n});\n```\n\n最后但同样重要的是，Parse 提供了一个很棒的功能，允许客户端（例如你的\
    \ iPhone 应用）发起推送通知。这在开发应用时提供了一些灵活性。当你的应用投入生产环境后，最好通过在你的 Parse 项目设置中禁用“客户端推送”来关闭此功能。原因相同：你不能信任来自应用的行为。相反，你应该验证将通过云代码函数发送的数据。\n"
- fmt: "# Sessions\n\nWhile a user is logged into your app through multiple devices,\
    \ the Parse Cloud will assign a unique revocable `Session` object on a given device\
    \ for your app. This means different devices and your browsers will have different\
    \ session tokens for the same user. On mobile and your apps, you don’t have to\
    \ worry about creating and destroying sessions. When users log in or sign up,\
    \ the Parse Cloud automatically creates the corresponding `Session` object. When\
    \ users log out, the Parse Cloud automatically destroys the corresponding `Session`\
    \ object, which invalidates the session token that was previously assigned to\
    \ that user’s device.\n\nParse also introduces a flexible Revocable Sessions API\
    \ that lets you easily understand and securely manipulate user sessions in your\
    \ app. You can see your app’s `Session` objects in Data Browser, just like any\
    \ other Parse object. If a user contacts you about his or her account being compromised,\
    \ you can use the Data Browser, REST API, or Cloud Code to forcefully revoke user\
    \ sessions using the Master Key. In addition, for increased security, you can\
    \ configure your apps to automatically expire user sessions due to inactivity.\n\
    \n> **Note:** Further information, visit an excellent blog series from Parse at\
    \ [`http://blog.parse.com/learn/engineering/parse-security-i-are-you-the-key-master/`](http://blog.parse.com/learn/engineering/parse-security-i-are-you-the-key-master/).\n\
    \n## Summary\n\nIn this chapter, I talked about the security mechanism Parse provides\
    \ to secure your apps and users’ data. Namely, they are Class-Level Permission,\
    \ Access Control List (ACL), Cloud Code, and Revocable Sessions. Keep in mind\
    \ they are not independent from each other. Most likely, you’ll need to use all\
    \ those approaches in a real-world production-ready app.\n\n> **Note:** To read\
    \ more about Parse security, please visit [`https://parse.com/docs/data`](https://parse.com/docs/data).\n\
    \n# 19. More from Parse\n\nIn Chapter 8, I introduced the sign-up feature. But\
    \ how do you know whether the user has entered a valid e-mail? You need to do\
    \ some verification to make sure the e-mail address the user entered is a valid\
    \ e-mail address format. But you don’t really do anything to make sure the e-mail\
    \ address actually belongs to the user. In the world of e-commerce, e-mail marketing\
    \ proves to still be effective. So you need a way to verify the e-mail while a\
    \ user is signing up.\n\nLuckily, Parse also thought about those common use cases\
    \ and provided easy solutions. Let’s dive into the e-mail verification process.\n\
    \n## E-Mail Verification\n\nTo begin, enable the e-mail verification feature under\
    \ Settings > Email in your project Parse Dashboard, as shown in Figure 19-1.\n\
    \n![A978-1-4842-1317-9_19_Fig1_HTML.jpg](A978-1-4842-1317-9_19_Fig1_HTML.jpg)\n\
    \n**Figure 19-1.** Enable Verify user e-mail feature\n\nNext, in your `EMABUser`\
    \ model, add a new Boolean property: `emailVerified`:\n\n```objc\n@property (nonatomic,\
    \ assign) BOOL emailVerified;\n```\n\nAlso add this property to the `@dynamic`\
    \ declaration in the `EMABUser.m` file.\n\nNext, create an e-mail verification\
    \ request e-mail template, as shown in Figure 19-2.\n\n![A978-1-4842-1317-9_19_Fig2_HTML.jpg](A978-1-4842-1317-9_19_Fig2_HTML.jpg)\n\
    \n**Figure 19-2.** This is an E-mail verification e-mail template\n\nYou can add\
    \ or edit the content as you wish. Make sure you don’t change the following URL,\
    \ shown in Figure 19-3, if you don’t want to host the template on your own server.\n\
    \n![A978-1-4842-1317-9_19_Fig3_HTML.jpg](A978-1-4842-1317-9_19_Fig3_HTML.jpg)\n\
    \n**Figure 19-3.** This is an example e-mail verified page URL\n\nNow, when you\
    \ want to check whether the user has verified his or her e-mail, use the property\
    \ in this way:\n\n```objc\nif (self.user.emailVerified) {\n    // we proceed ahead\n\
    } else {\n    // we ask this user's verify it\n    UIAlertView *emailAlert = [[UIAlertView\
    \ alloc] initWithTitle:NSLocalizedString(@\"Email Verification Request\",@\"\"\
    )\n                                                         message:NSLocalizedString(@\"\
    Your email has not been verified, please verify it to finish signing up.\",@\"\
    \")\n                                                        delegate:nil\n  \
    \                                             cancelButtonTitle:NSLocalizedString(@\"\
    OK \",@\"\")\n                                               otherButtonTitles:nil,\
    \ nil];\n    [emailAlert show];\n}\n```\n\nYou still need a user to verify the\
    \ e-mail. This user might have deleted the verification e-mail accidently, but\
    \ now he or she is asking us to resend it. How do you this?\n\nBasically, the\
    \ solution is to set the “e-mail” property of the user as the same e-mail address\
    \ you have on file, then save the user. Once saved successfully, it will trigger\
    \ a resending of a verification e-mail to the e-mail address the user has provided.\
    \ Here is the code:\n\n```objc\nif (!self.user.emailVerified) {\n    UIAlertView\
    \ *emailAlert = [[UIAlertView alloc] initWithTitle:NSLocalizedString(@\"Email\
    \ Verification Request\",@\"\")\n                                            \
    \             message:NSLocalizedString(@\"Your email has not been verified, please\
    \ verify it to finish signing up.\",@\"\")\n                                 \
    \                       delegate:self\n                                      \
    \         cancelButtonTitle:NSLocalizedString(@\"Resent it\",@\"\")\n        \
    \                                       otherButtonTitles:NSLocalizedString(@\"\
    OK\",@\"\"), nil];\n    emailAlert.tag = 99;\n    [emailAlert show];\n}\n\n-(void)alertView:(UIAlertView\
    \ *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex\n{\n    if (buttonIndex\
    \ == alertView.cancelButtonIndex) {\n        [alertView dismissWithClickedButtonIndex:buttonIndex\
    \ animated:YES];\n    } else if (alertView.tag == 99){\n        if (buttonIndex\
    \ == 1) {\n            [alertView dismissWithClickedButtonIndex:buttonIndex animated:NO];\n\
    \        } else if (buttonIndex == 0){\n            NSString *email = self.user.email;\n\
    \            [self.user setEmail:email];\n            [self.user saveEventually:^(BOOL\
    \ succeeded, NSError *error) {\n                if (!error) {\n              \
    \      [SVProgressHUD showSuccessWithStatus:[NSString stringWithFormat:@\"%@ %@.\"\
    , NSLocalizedString(@\"An verification email has been sent to\",@\"\"), self.useremail]];\n\
    \                }\n            }];\n        }\n    }\n}\n```"
  raw: '## Sessions


    While a user is logged into your app through multiple devices, the Parse Cloud
    will assign a unique revocable Session object on a given device for your app.
    This means different devices and your browsers will have different session tokens
    for the same user. On mobile and your apps, you don’t have to worry about creating
    and destroying sessions. When users log in or sign up, the Parse Cloud automatically
    creates the corresponding Session object. When users log out, the Parse Cloud
    automatically destroys the corresponding Session object, which invalidates the
    session token that was previously assigned to that user’s device.


    Parse also introduces a flexible Revocable Sessions API that lets you easily understand
    and securely manipulate user sessions in your app. You can see your app’s Session
    objects in Data Browser, just like any other Parse object. If a user contacts
    you about his or her account being compromised, you can use the Data Browser,
    REST API, or Cloud Code to forcefully revoke user sessions using the Master Key.
    In addition, for increased security, you can configure your apps to automatically
    expire user sessions due to inactivity.


    Note


    Futher information, visit an excellent blog series from Parse at [`http://blog.parse.com/learn/engineering/parse-security-i-are-you-the-key-master/`](http://blog.parse.com/learn/engineering/parse-security-i-are-you-the-key-master/)
    .


    ## Summary


    In this chapter, I talked about the security mechanism Parse provides to secure
    your apps and users’ data. Namely, they are Class-Level Permission, Access Control
    List (ACL), Cloud Code, and Revocable Sessions. Keep in mind they are not independent
    from each other. Most likely, you’ll need to use all those approaches in a real-world
    production-ready app.


    Note


    To read more about Parse security, please visit [`https://parse.com/docs/data`](https://parse.com/docs/data)


    # 19. More from Parse


    In [Chapter 8](#A978-1-4842-1317-9_8_Chapter.html), I introduced the sign-up feature.
    But how do you know whether the user has entered a valid e-mail? You need to do
    some verification to make sure the e-mail address the user entered is a valid
    e-mail address format. But you don’t really do anything to make sure the e-mail
    address actually belongs to the user. In the world of e-commerce, e-mail marketing
    proves to still be effective. So you need a way to verify the e-mail while a user
    is signing up.


    Luckily, Parse also thought about those common use cases and provided easy solutions.
    Let’s dive into the e-mail verification process.


    ## E-Mail Verification


    To begin, enable the e-mail verification feature under Settings > Email in your
    project Parse Dashboard, as shown in Figure [19-1](#A978-1-4842-1317-9_19_Chapter.html#Fig1).


    ![A978-1-4842-1317-9_19_Fig1_HTML.jpg](A978-1-4842-1317-9_19_Fig1_HTML.jpg)


    Figure 19-1.


    Enable Verify user e-mail feature


    Next, in your EMABUser model, add a new Boolean property: `emailVerified`:


    `@property (nonatomic, assign) BOOL emailVerified;`


    Also add this property to the `@dynamic` declaration in the EMABUser.m file.


    Next, create an e-mail verification request e-mail template, as shown in Figure
    [19-2](#A978-1-4842-1317-9_19_Chapter.html#Fig2).


    ![A978-1-4842-1317-9_19_Fig2_HTML.jpg](A978-1-4842-1317-9_19_Fig2_HTML.jpg)


    Figure 19-2.


    This is an E-mail verification e-mail template


    You can add or edit the content as you wish. Make sure you don’t change the following
    URL, shown in Figure [19-3](#A978-1-4842-1317-9_19_Chapter.html#Fig3), if you
    don’t want to host the template on your own server.


    ![A978-1-4842-1317-9_19_Fig3_HTML.jpg](A978-1-4842-1317-9_19_Fig3_HTML.jpg)


    Figure 19-3.


    This is an example e-mail verified page URL


