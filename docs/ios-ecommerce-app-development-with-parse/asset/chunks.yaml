    If you receive a successful result, you will map this dictionary result to the
    EMABUser instance properties. As mentioned before, the “user_about_me” permission
    will get you information about the user such as e-mail, name, gender, and profile
    image url. It’s easy to map the e-mail, name, and gender.


    `NSDictionary *userData = (NSDictionary *)result;`


    `[fbUser setEmail:userData[@"email"]];`


