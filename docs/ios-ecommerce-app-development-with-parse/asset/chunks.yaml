- fmt: "# Using Facebook Login\n\nIt’s quite typical for an iOS e-commerce app to\
    \ integrate Facebook Login for Apps. Although it can be challenging to manage\
    \ two sets of users, the Facebook SDK can be used together with the Parse SDK,\
    \ and is integrated with the `PFUser` class to make linking users to their Facebook\
    \ identities easy.\n\nThis feature requires the ParseFacebookUtilities SDK, so\
    \ you need to modify your Podfile as follows:\n\n```\npod 'ParseFacebookUtilsV4','1.7.1'\n\
    ```\n\n**Note:** Facebook and Parse change their SDKs frequently. You may need\
    \ to update the SDK version by the time you run this demo.\n\nIn this section,\
    \ you learn how to implement Facebook Login with Parse, as well as how to obtain\
    \ the user’s Facebook profile so you can save it for your own records.\n\nRemember\
    \ that you will need a Facebook Developer account for implementing this feature\
    \ (see [Chapter 4](#A978-1-4842-1317-9_4_Chapter.html) for details).\n\nFor the\
    \ model, use `EMABUser` (the same model as in [Chapter 8](#A978-1-4842-1317-9_8_Chapter.html));\
    \ for the view, use the “Log In with Facebook” button (see [Chapter 8](#A978-1-4842-1317-9_8_Chapter.html)).\
    \ Since you need to talk to the Facebook API to authorize the user, you also need\
    \ to obtain the user’s profile and save it to the Parse back end. I will introduce\
    \ a `UIActivityIndicator` to indicate the ongoing process, and also disable some\
    \ buttons in case users don’t want to wait until finished. The whole idea is to\
    \ create a friendlier user experience.\n\nHere is the header declaration:\n\n\
    ```\n#import \"EMABDispatchViewController.h\"\n#import \"EMABConstants.h\"\n#import\
    \ \"EMABUser.h\"\n#import <ParseFacebookUtils/PFFacebookUtils.h>\n\n@interface\
    \ EMABDispatchViewController ()\n@property (nonatomic, weak) IBOutlet UIActivityIndicatorView\
    \ *activityIndicatorView;\n@end\n```\n\nWhen a user sees this screen, the `c`\
    \ instance is hidden. Only when a user taps the “Log In with Facebook” button\
    \ and a network request is made will it be visible. Once the network request is\
    \ finished, the animation stops and the `UIActivityIndicator` instance is hidden.\n\
    \n```\n@implementation EMABDispatchViewController\n\n- (void)viewDidLoad {\n \
    \   [super viewDidLoad];\n    self.activityIndicatorView.hidden = YES;\n}\n```\n\
    \nThe helper method `-(void)updateIndicator` updates the UI. When making a Facebook\
    \ API request, you want to disable the left bar button item to prevent the user\
    \ from skipping the login process. You also use this method to show or hide the\
    \ indicator.\n\n```\n-(void)updateIndicator:(BOOL)shouldEnable{\n    self.navigationItem.leftBarButtonItem.enabled\
    \ = !shouldEnable;\n    (shouldEnable)?[self.activityIndicatorView startAnimating]:[self.activityIndicatorView\
    \ stopAnimating];\n    self.activityIndicatorView.hidden = !shouldEnable;\n}\n\
    ```\n\nAs you have done in previous chapters, use `UIAlertView` to show any error\
    \ that might occur during the login process.\n\n```\n#pragma mark - helper\n-(void)showError:(NSString\
    \ *)message {\n    [[[UIAlertView alloc] initWithTitle:NSLocalizedString(@\"Error\"\
    , @\"Error\") message:message delegate:nil cancelButtonTitle:NSLocalizedString(@\"\
    OK\", @\"OK\") otherButtonTitles:nil , nil] show];\n}\n```\n\nNext, move to the\
    \ Facebook login process. First, tell Facebook what information is obtained from\
    \ the user, and ask permission from Facebook. In this case, you only need some\
    \ basic information `\"user_about_me\"` such as the user’s e-mail, name, and gender.\
    \ If you need more information, you need to log in to the `developer.facebook.com`\
    \ portal to request additional permission.\n\nOnce again, Parse makes this process\
    \ easy. You will use the `PFFacebookUtils` method `logInWithPermissions:block`\
    \ to make this request.\n\nWhen you make this request, you might get a success\
    \ or an error message. If you get an error, you can simply let the user know there\
    \ is something wrong and indicate what is wrong. You use the `showError:` method\
    \ for this purpose. When you get a success, you will get a `PFUser` instance.\
    \ But there is no Facebook user information associated with this `PFUser` instance;\
    \ this requires an extra step. That’s why you need another helper method, `obtainFacebookUserInfo`:\n\
    \n```\n-(IBAction)onFacebookLogin:(id)sender{\n    // Set permissions required\
    \ from the facebook user account\n    NSArray *permissionsArray = @[@\"user_about_me\"\
    ];\n    [self updateIndicator:YES];\n    [PFFacebookUtils logInWithPermissions:permissionsArray\
    \ block:^(PFUser *user, NSError *error) {\n        if (error) {\n            NSString\
    \ *facebookError = [FBErrorUtility userMessageForError:error];\n            [self\
    \ showError:facebookError];\n        } else {\n            [self obtainFacebookUserInfo:user];\n\
    \        }\n        [self updateIndicator:NO];\n    }];\n}\n```\n\nTo start requesting\
    \ this user’s Facebook profile information, you use `[FBRequest requestForMe]`\
    \ to create a `FBRequest` instance as shown in the following code. The next method\
    \ is the `FBRequest` instance method, `startWithCompletionHandler`. This asynchronous\
    \ callback will return either an error or the result you are looking for. Similarly,\
    \ you can handle any error by showing it to the user; in the meantime, leave this\
    \ screen, and return to the main app. You don’t want the user to get stuck here.\n\
    \nIf you receive a successful result, you will map this dictionary result to the\
    \ `EMABUser` instance properties. As mentioned before, the `\"user_about_me\"\
    ` permission will get you information about the user such as e-mail, name, gender,\
    \ and profile image url. It’s easy to map the e-mail, name, and gender.\n\n```\n\
    NSDictionary *userData = (NSDictionary *)result;\n[fbUser setEmail:userData[@\"\
    email\"]];\n[fbUser setUsername:userData[@\"email\"]];\n[fbUser setName:userData[@\"\
    name\"]];\nif (userData[@\"gender\"]) {\n    [fbUser setGender:userData[@\"gender\"\
    ]];\n}\n```\n\nMapping the image URL to `PFFile` as declared in `EMABUser` requires\
    \ some additional work. First, you need to get the image URL in the correct format.\n\
    \n```\nNSString *facebookID = userData[@\"id\"];\nNSURL *pictureURL = [NSURL URLWithString:[NSString\
    \ stringWithFormat:@\"https://graph.facebook.com/%@/picture?type=square&return_ssl_resources=1\"\
    , facebookID]];\n```\n\nIn this case, you use the user’s square profile picture.\
    \ To transform from an image URL to `PFFile`, you can get the `NSData` from this\
    \ URL, then use the `[PFFile fileWithName:Data]` class method to create a `PFFile`\
    \ instance. The following code shows how to approach this problem:\n\n```\nif\
    \ ([pictureURL absoluteString]) {\n    dispatch_queue_t queue = dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_HIGH,\
    \ 0ul);\n    dispatch_async(queue, ^{\n        NSData * imageData = [NSData dataWithContentsOfURL:[NSURL\
    \ URLWithString:[pictureURL absoluteString]]];\n        dispatch_async(dispatch_get_main_queue(),\
    \ ^{\n            PFFile *iconFile = [PFFile fileWithName:@\"avatar.jpg\" data:imageData];\n\
    \            [iconFile saveInBackgroundWithBlock:^(BOOL succeeded, NSError *error)\
    \ {\n                if (!error) {\n                    fbUser.photo = iconFile;\n\
    \                }\n            }];\n        });\n    });\n}\n```\n\nFinally,\
    \ you save this `EMABUser` instance and dismiss the current screen:\n\n```\n[fbUser\
    \ saveInBackgroundWithBlock:^(BOOL succeeded, NSError *error) {\n    if (!error)\
    \ {\n        [self dismissViewControllerAnimated:YES completion:nil];\n    }\n\
    }];\n```\n\nHere is the complete implementation:\n\n```\n-(void)obtainFacebookUserInfo:(PFUser\
    \ *)user{\n    [self updateIndicator:YES];\n    EMABUser *fbUser = (EMABUser *)user;\n\
    \    FBRequest *request = [FBRequest requestForMe];\n    [request startWithCompletionHandler:^(FBRequestConnection\
    \ *connection, id result, NSError *error) {\n        [self updateIndicator:NO];\n\
    \        if (!error) {\n            // Parse the data received\n            NSString\
    \ *facebookID = userData[@\"id\"];\n            NSURL *pictureURL = [NSURL URLWithString:[NSString\
    \ stringWithFormat:@\"https://graph.facebook.com/%@/picture?type=square&return_ssl_resources=1\"\
    , facebookID]];\n            if ([pictureURL absoluteString]) {\n```"
