    When a user taps an order cell, more information about the order is displayed.
    This order detail screen might be very close to the EMABBagTableViewController.
    However, you won’t let the user change the order items, and there are no payment
    options, obviously. This can be achieved in one of two ways: you can reuse EMABBagTableViewController
    and hide the UI controls you don’t want to show, or you create another view controller.
    For this example, use the second approach. One reason is that the EMABBagTableViewController
    has already been quite messy. The other is that you might want to add more features
    later. It’s easier when you don’t have that much code to mess around with.


    Start by creating a new UITableViewController, and name it EMABOrderDetailTableViewController.
    You still want to show the order number, order date, complete description, and
    total amount of an order. In the same fashion, use a UITableView header view to
    show the order number and the order date; use UITableView footer view to show
    the complete description and the total amount.


    For each UITableViewCell, show each item’s name, unit price, and quantity. Here
    is the implementation:


    `#import "EMABOrderDetailTableViewController.h"`


    `#import "EMABOrder.h"`


    `#import "EMABOrderItem.h"`


    `#import "EMABProduct.h"`


