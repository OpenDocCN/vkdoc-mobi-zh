    `@end`'
  trans: "\n# 添加收藏列表\n\n要实现收藏列表功能，你需要创建一个新的模型类。\n\n在 Xcode 中，创建一个新的 `PFObject` 子类，并将其命名为\
    \ `EMABFavoriteProduct`。该模型有两个属性——`PFUser` 和 `EMABProduct`——用于表示用户喜欢某个产品。换句话说，这个模型类是\
    \ Parse 连接表关系的一种用例。每当用户喜欢一个产品时，就会在该模型类中创建一条记录。你可能会觉得这有些冗余。你也可以使用其他方法；例如，可以为该用户使用一个收藏数组。毕竟，一个用户对应多个收藏产品，因此在这种情况下使用数组是可行的。然而，使用连接表方法的优点是代码相当简洁。\n\
    \n要获取用户的收藏列表，请使用 `PFQuery`。创建一个基本的 `PFQuery` 方法，并根据你的需求进行定制。以下是完整的代码：\n\n`EMABFavoriteProduct.h`\n\
    \n```\n#import <Parse/Parse.h>\n\n@class EMABProduct;\n\n@interface EMABFavoriteProduct\
    \ : PFObject<PFSubclassing>\n\n@property (nonatomic, strong) PFUser *customer;\n\
    @property (nonatomic, strong) EMABProduct *product;\n\n+(PFQuery *)basicQuery;\n\
    +(PFQuery *)queryForCustomer:(PFUser *)customer;\n+(PFQuery *)queryForCustomer:(PFUser\
    \ *)customer product:(EMABProduct *)product;\n\n@end\n```\n\n在此代码段中，你有两个额外的辅助查询方法：`+(PFQuery\
    \ *)queryForCustomer:(PFUser *)customer` 用于获取用户的收藏产品列表；`+(PFQuery *)queryForCustomer:(PFUser\
    \ *)customer product:(EMABProduct *)product` 用于检查用户是否已将某个产品添加到收藏列表。\n\n在 `EMABConstants.h`\
    \ 中添加一个新的 `NSString` 常量 `kFavoriteProduct`，并在 `EMABConstants.m` 文件中实现它。\n\n```\n\
    NSString *const kFavoriteProduct = @\"FavoriteProduct\";\n```\n\n在必需的 `+(NSString\
    \ *)parseClassName` 方法中，使用该 `NSString` 常量来表示模型类的名称。\n\n```\n+(NSString *)parseClassName\n\
    {\n    return kFavoriteProduct;\n}\n```\n\n在 `+(PFQuery *)basicQuery` 方法中，根据创建时间对结果进行排序。你还可以使用\
    \ `PFQuery` 的 `-include:` 方法来包含用户和产品数据。这是显示产品详情或用户详情所必需的。\n\n```\n+(PFQuery *)basicQuery\n\
    {\n    PFQuery *query = [PFQuery queryWithClassName:[self parseClassName]];\n\
    \    [query orderByDescending:@\"createdAt\"];\n    [query include:@\"customer\"\
    ];\n    [query include:@\"product\"];\n    return query;\n}\n```\n\n在 `+(PFQuery\
    \ *)queryForCustomer:(PFUser *)customer` 方法中，使用 `PFQuery` 的查询条件方法 `-whereKey:\
    \ equalTo:`：\n\n```\n+(PFQuery *)queryForCustomer:(PFUser *)customer {\n    PFQuery\
    \ *query = [self basicQuery];\n    [query whereKey:@\"customer\" equalTo:customer];\n\
    \    return query;\n}\n```\n\n然后实现 `+(PFQuery *)queryForCustomer:(PFUser *)customer\
    \ product:(EMABProduct *)product`：\n\n```\n+(PFQuery *)queryForCustomer:(PFUser\
    \ *)customer product:(EMABProduct *)product\n{\n    PFQuery *query = [self queryForCustomer:customer];\n\
    \    [query whereKey:@\"product\" equalTo:product];\n    return query;\n}\n\n\
    @end\n```\n\n这就是 `EMABFavoriteProduct`。不要忘记在 `AppDelegate` 中通过调用以下代码来注册此 `PFSubclass`：\n\
    \n```\n[EMABFavoriteProduct registerSublcass];\n```\n\n接下来，转到 `EMABProductDetailViewController.m`\
    \ 文件。在 `-(void)viewDidLoad` 方法中，检查用户是否已经喜欢了该产品（假设存在有效用户）。\n\n```\n- (void)viewDidLoad\
    \ {\n    [super viewDidLoad];\n    [self updateUI];\n    [self checkIfFavorited];\n\
    }\n```\n\n`checkIfFavorited` 方法用于验证后端服务器上是否存在记录。如果存在，则禁用收藏按钮。你还需要确保只有在存在有效用户时才查询服务器。\n\
    \n```\n-(void)checkIfFavorited\n{\n    if (![PFUser currentUser]) {\n        PFQuery\
    \ *fPQuery = [EMABFavoriteProduct queryForCustomer:[PFUser currentUser] product:self.product];\n\
    \        [fPQuery getFirstObjectInBackgroundWithBlock:^(PFObject *object, NSError\
    \ *error){\n            if (!error) {\n                self.heartButton.enabled\
    \ = false;\n            }\n        }];\n    }\n}\n\n@end\n```\n\n你还希望允许用户将产品添加到其收藏列表中。“心形”按钮连接到一个\
    \ IBOutlet 方法 `-(IBAction)onFavorite:(id)sender`。\n\n只有注册或登录的用户才能将产品添加到购物袋或喜欢某个产品。因此，首先你需要检查是否存在有效用户。如果存在，则创建一个新的\
    \ `FavoriteProduct` 对象，并将其保存到 Parse 后端。保存成功后，向用户显示一条成功消息。以下是完整的代码：\n\n```\n-(IBAction)onFavorite:(id)sender{\n\
    \    if (![PFUser currentUser]) {\n        [self showWarning];\n    } else {\n\
    \        EMABFavoriteProduct *favoriteProduct = [EMABFavoriteProduct object];\n\
    \        [favoriteProduct setCustomer:[PFUser currentUser]];\n        [favoriteProduct\
    \ setProduct:self.product];\n        [favoriteProduct saveInBackgroundWithBlock:^(BOOL\
    \ success, NSError *error){\n            if (!error) {\n                [SVProgressHud\
    \ showSuccessWithStatus:NSLocalizedString(@\"Successfully added\", @\"\")];\n\
    \            }\n        }];\n    }\n}\n```\n\n## 本章小结\n\n在本章中，我介绍了如何实现以下功能：显示产品详情、将产品详情分享到用户手机上的不同服务，以及将产品添加到用户的收藏列表（前提是该产品之前未被添加过）。收藏产品功能是通过一个连接表模型类\
    \ `EMABFavoriteProduct` 实现的。我还强调了在获取用户收藏列表时，使用 `PFQuery` 中的 `-include:` 方法来获取用户数据或产品数据的重要性。\n\
    \n# 8. 注册功能\n\n电子补充材料 本章的在线版本 (doi:[10.1007/978-1-4842-1317-9_8](http://dx.doi.org/10.1007/978-1-4842-1317-9_8))\
    \ 包含补充材料，仅供授权用户使用。\n\n在上一章中，你学习了如何在用户将产品添加到购物袋或收藏列表时，提示用户进行注册或登录。在本章中，你将实现一个调度屏幕，使用户能够创建账户、登录现有账户或使用\
    \ Facebook 登录。你还将学习如何实现客户注册。如何实现直接登录和 Facebook 登录功能将在第 9 章中介绍。\n\n## 构建调度屏幕\n\n\
    当实现主调度功能时，你创建了一个名为 `LoginSignupStoryboard` 的不同 `UIStoryboard`，以减轻 `Main.storyboard`\
    \ 的工作量。\n\n此 `DispatchViewController` 的用户界面非常简单。有三个按钮：标记为“注册”的按钮用于显示注册屏幕；标记为“登录”和“使用\
    \ Facebook 登录”的按钮将在第 9 章中介绍。\n\n为了简化主视图控制器，请在 `LoginSignUpStoryboard` 中使用 Segue\
    \ 将“注册”按钮连接到 `EMABSignUpViewController`，将“登录”按钮连接到 `EMABLoginViewController`，并为“使用\
    \ Facebook 登录”设置一个 IBAction。\n\n同时提供一个“取消” `UIBarButtonItem`，以防用户此时不想登录或注册账户，以便其可以离开该屏幕。这个\
    \ `LoginSignUpStoryboard` 通过其自己的 `UINavigationController` 实现，因此你可以简单地使用：\n\n```\n\
    [self dismissViewControllerAnimated:YES completion:nil];\n```\n\n来关闭调度屏幕。\n\n\
    以下是完整的实现：\n\n```\n@implementation EMABDispatchViewController\n\n- (void)viewDidLoad\
    \ {\n    [super viewDidLoad];\n}\n\n-(IBAction)onFacebookLogin:(id)sender{\n \
    \   //待实现\n}\n\n-(IBAction)onCancel:(id)sender{\n    [self dismissViewControllerAnimated:YES\
    \ completion:nil];\n}\n\n@end\n```\n"
- fmt: "# The Sign-up Model\n\nLet’s jump into the `User` model, `EMABUser`, a subclass\
    \ of `PFUser`. By default, the `EMABUser` class has the properties `username`,\
    \ `password`, and `e-mail`, which are inherited from `PFUser`; you also may want\
    \ to collect a little bit more information from the user such as name, address,\
    \ and photo. Here is the full implementation:\n\n`EMABUser.h`\n\n```\n#import\
    \ <Parse/Parse.h>\n\n@interface EMABUser : PFUser<PFSubclassing>\n\n@property\
    \ (nonatomic, copy) NSString *firstName;\n@property (nonatomic, copy) NSString\
    \ *lastName;\n@property (nonatomic, assign) int gender;\n@property (nonatomic,\
    \ copy) NSString *phone;\n@property (nonatomic, copy) NSString *address1;\n@property\
    \ (nonatomic, copy) NSString *address2;\n@property (nonatomic, copy) NSString\
    \ *city;\n@property (nonatomic, copy) NSString *state;\n@property (nonatomic,\
    \ copy) NSString *zipcode;\n@property (nonatomic, copy) PFFile *photo;\n\n+(EMABUser\
    \ *)currentUser;\n\n@end\n```\n\nWhen signing up a user, you only need the user\
    \ to enter an e-mail address and password. When the user purchases something,\
    \ you need to know where to ship your products to, so you need to ask the user\
    \ to enter a shipping address until then. You also provide the Facebook login\
    \ feature so you can get more information about the user such as a profile photo,\
    \ gender, region, relationship, and interests. This requires different permissions\
    \ from the user and Facebook. For now, only ask for the user’s gender and photo.\n\
    \nYou also want to `override +(PFUser *)currentUser` method to return an `EMABUser`,\
    \ or Xcode will keep warning you about it.\n\nHere is the `EMABUser` implementation\
    \ part:\n\n`EMABUser.m`\n\n```\n#import \"EMABUser.h\"\n#import  <Parse/PFObject+Subclass.h>\n\
    \n@implementation EMABUser\n\n@dynamic firstName, lastName, gender, phone, address1,\
    \ address2, city, state, zipcode, photo;\n\n+(EMABUser *)currentUser{\n    return\
    \ (EMABUser *)[PFUser currentUser];\n}\n\n@end\n```\n\n# The Sign-up View\n\n\
    The Sign-Up screen consists of a `UITableView`, a button with a “Sign Up” title,\
    \ and a Bar Button Item with the title of “Sign Up.”\n\n`UITableView` has three\
    \ cells. For each cell, use a `UITextField` to capture a user’s input. The first\
    \ cell is for the registration e-mail, the second cell is for the registration\
    \ password, and the third cell is for the password confirmation.\n\nSince you\
    \ will show a similar `UITableView` with `UITextField` `UITableViewCell`, create\
    \ a `UITextField` subclass to eliminate redundancies.\n\nFirst, create the `EMABEmailTextField`\
    \ class.\n\n`EMABEmailTextField.h`\n\n```\n#import <UIKit/UIKit.h>\n\n@interface\
    \ EMABEmailTextField : UITextField\n\n@end\n```\n\n`EMABEmailTextField.m`\n\n\
    ```\n#import \"EMABEmailTextField.h\"\n\n@implementation EMABEmailTextField\n\n\
    -(instancetype)initWithFrame:(CGRect)frame\n{\n    self = [super initWithFrame:frame];\n\
    \    if (self) {\n        self.borderStyle = UITextBorderStyleNone;\n        self.textColor\
    \ = [UIColor blackColor];\n        self.autocapitalizationType = UITextAutocapitalizationTypeNone;\n\
    \        self.placeholder = NSLocalizedString(@\"Email\", @\"\");\n        self.backgroundColor\
    \ = [UIColor whiteColor];\n        self.autocorrectionType = UITextAutocorrectionTypeNo;\
    \ . . . // no auto correction support\n        self.keyboardType = UIKeyboardTypeEmailAddress;\
    \ . . . // use the default type input method (entire keyboard)\n        self.returnKeyType\
    \ = UIReturnKeyDone;\n        self.clearButtonMode = UITextFieldViewModeWhileEditing;\
    \ . . . // has a clear 'x' button to the right\n        // Add an accessibility\
    \ label that describes what the text field is for.\n        [self setAccessibilityLabel:NSLocalizedString(@\"\
    Email\", @\"\")];\n    }\n    return self;\n}\n\n@end\n```\n\nIn this implementation,\
    \ you set the border style, text color, placeholder text, background color, keyboard\
    \ type and auto correction type, and clear button mode to provide a better UI\
    \ and user experience.\n\nNext, create `EMABPasswordTextField` to customize the\
    \ password `TextField` look and feel. Here is the implementation:\n\n`EMABPasswordTextField.h`\n\
    \n```\n#import <UIKit/UIKit.h>\n\n@interface EMABPasswordTextField : UITextField\n\
    \n@end\n```\n\n`EMABPasswordTextField.m`\n\n```\n#import \"EMABPasswordTextField.h\"\
    \n\n@implementation EMABPasswordTextField\n\n-(instancetype)initWithFrame:(CGRect)frame\n\
    {\n    self = [super initWithFrame:frame];\n    if (self) {\n        self.borderStyle\
    \ = UITextBorderStyleNone;\n        self.textColor = [UIColor blackColor];\n \
    \       self.placeholder = NSLocalizedString(@\"Password\",@\"\");\n        self.backgroundColor\
    \ = [UIColor whiteColor];\n        self.keyboardType = UIKeyboardTypeDefault;\n\
    \        self.returnKeyType = UIReturnKeyDone;\n        self.secureTextEntry =\
    \ YES;   // make the text entry secure (bullets)\n        self.clearButtonMode\
    \ = UITextFieldViewModeWhileEditing;    // has a clear 'x' button to the right\n\
    \        [self setAccessibilityLabel:NSLocalizedString(@\"Password\", @\"\")];\n\
    \    }\n    return self;\n}\n\n@end\n```\n\nThis looks pretty similar to the `EMABEmailTextField`;\
    \ the big difference is that you need to use the `secureTextEntry` property to\
    \ hide a user’s input.\n\nNote that it’s not necessary to use a `UiTableView`\
    \ with `UITextField` in `UITableViewCell`—it just looks nicer. Some developers\
    \ choose to put three `UITextField`s on top of a background image with a few separate\
    \ lines. It also works nicely, if you can find this kind of background image."
  raw: '## The Sign-up Model


    Let’s jump into the User model, EMABUser, a subclass of PFUser. By default, the
    EMABUser class has the properties username, password, and e-mail, which are inherited
    from PFUser; you also may want to collect a little bit more information from the
    user such as name, address, and photo. Here is the full implementation:


    EMABUser.h


    `#import <Parse/Parse.h>`


    `@interface EMABUser : PFUser<PFSubclassing>`


    `@property (nonatomic, copy) NSString *firstName;`


    `@property (nonatomic, copy) NSString *lastName;`


    `@property (nonatomic, assign) int gender;`


    `@property (nonatomic, copy) NSString *phone;`


    `@property (nonatomic, copy) NSString *address1;`


    `@property (nonatomic, copy) NSString *address2;`


    `@property (nonatomic, copy) NSString *city;`


    `@property (nonatomic, copy) NSString *state;`


    `@property (nonatomic, copy) NSString *zipcode;`


    `@property (nonatomic, copy) PFFile *photo;`


    `+(EMABUser *)currentUser;`


    `@end`


    When signing up a user, you only need the user to enter an e-mail address and
    password. When the user purchases something, you need to know where to ship your
    products to, so you need to ask the user to enter a shipping address until then.
    You also provide the Facebook login feature so you can get more information about
    the user such as a profile photo, gender, region, relationship, and interests.
    This requires different permissions from the user and Facebook. For now, only
    ask for the user’s gender and photo.


    You also want to `override +(PFUser *)currentUser` method to return an EMABUser,
    or Xcode will keep warning you about it.


    Here is the EMABUser implementation part:


    EMABUser.m


    `#import "EMABUser.h"`


    `#import  <Parse/PFObject+Subclass.h>`


    `@implementation EMABUser`


    `@dynamic firstName, lastName, gender, phone, address1, address2, city, state,
    zipcode, photo;`


    `+(EMABUser *)currentUser{`


        `return (EMABUser *)[PFUser currentUser];`


    `}`


    `@end`


    ## The Sign-up View


    The Sign-Up screen consists of a UITableView, a button with a “Sign Up” title,
    and a Bar Button Item with the title of “Sign Up.”


    UITableView has three cells. For each cell, use a UITextField to capture a user’s
    input. The first cell is for the registration e-mail, the second cell is for the
    registration password, and the third cell is for the password confirmation.


    Since you will show a similar UITableView with UITextField UITableViewCell, create
    a UITextField subclass to eliminate redundancies.


    First, create the EMABEmailTextField class.


    EMABEmailTextField.h


    `#import <UIKit/UIKit.h>`


    `@interface EMABEmailTextField : UITextField`


    `@end`


    EMABEmailTextField.m


    `#import "EMABEmailTextField.h"`


    `@implementation EMABEmailTextField`


    `-(instancetype)initWithFrame:(CGRect)frame`


    `{`


        `self = [super initWithFrame:frame];`


        `if (self) {`


            `self.borderStyle = UITextBorderStyleNone;`


            `self.textColor = [UIColor blackColor];`


            `self.autocapitalizationType = UITextAutocapitalizationTypeNone;`


            `self.placeholder = NSLocalizedString(@"Email", @"");`


            `self.backgroundColor = [UIColor whiteColor];`


            `self.autocorrectionType = UITextAutocorrectionTypeNo; . . . // no auto
    correction support`


            `self.keyboardType = UIKeyboardTypeEmailAddress; . . . // use the default
    type input method (entire keyboard)`


            `self.returnKeyType = UIReturnKeyDone;`


            `self.clearButtonMode = UITextFieldViewModeWhileEditing; . . . // has
    a clear ''x'' button to the right`


            `// Add an accessibility label that describes what the text field is for.`


            `[self setAccessibilityLabel:NSLocalizedString(@"Email", @"")];`


        `}`


        `return self;`


    `}`


    `@end`


    In this implementation, you set the border style, text color, placeholder text,
    background color, keyboard type and auto correction type, and clear button mode
    to provide a better UI and user experience.


    Next, create EMABPasswordTextField to customize the password TextField look and
    feel. Here is the implementation:


    EMABPasswordTextField.h


    `#import <UIKit/UIKit.h>`


    `@interface EMABPasswordTextField : UITextField`


    `@end`


    EMABPasswordTextField.m


    `#import "EMABPasswordTextField.h"`


    `@implementation EMABPasswordTextField`


    `-(instancetype)initWithFrame:(CGRect)frame`


    `{`


        `self = [super initWithFrame:frame];`


        `if (self) {`


            `self.borderStyle = UITextBorderStyleNone;`


            `self.textColor = [UIColor blackColor];`


            `self.placeholder = NSLocalizedString(@"Password",@"");`


            `self.backgroundColor = [UIColor whiteColor];`


            `self.keyboardType = UIKeyboardTypeDefault;`


            `self.returnKeyType = UIReturnKeyDone;`


            `self.secureTextEntry = YES;   // make the text entry secure (bullets)`


            `self.clearButtonMode = UITextFieldViewModeWhileEditing;    // has a clear
    ''x'' button to the right`


            `[self setAccessibilityLabel:NSLocalizedString(@"Password", @"")];`


        `}`


        `return self;`


    `}`


    `@end`


    This looks pretty similar to the EMABEmailTextField; the big difference is that
    you need to use the secureTextEntry property to hide a user’s input.


    Note that it’s not necessary to use a UiTableView with UITextField in UITableViewCell—it
    just looks nicer. Some developers choose to put three UITextFields on top of a
    background image with a few separate lines. It also works nicely, if you can find
    this kind of background image.'
  trans: "\n# 注册模型\n\n让我们直接进入`User`模型——`EMABUser`，它是`PFUser`的子类。默认情况下，`EMABUser`类继承了`PFUser`的属性：`username`、`password`和`e-mail`；你可能还希望从用户那里收集更多信息，例如姓名、地址和照片。以下是完整的实现代码：\n\
    \n`EMABUser.h`\n\n```\n#import <Parse/Parse.h>\n\n@interface EMABUser : PFUser<PFSubclassing>\n\
    \n@property (nonatomic, copy) NSString *firstName;\n@property (nonatomic, copy)\
    \ NSString *lastName;\n@property (nonatomic, assign) int gender;\n@property (nonatomic,\
    \ copy) NSString *phone;\n@property (nonatomic, copy) NSString *address1;\n@property\
    \ (nonatomic, copy) NSString *address2;\n@property (nonatomic, copy) NSString\
    \ *city;\n@property (nonatomic, copy) NSString *state;\n@property (nonatomic,\
    \ copy) NSString *zipcode;\n@property (nonatomic, copy) PFFile *photo;\n\n+(EMABUser\
    \ *)currentUser;\n\n@end\n```\n\n在注册用户时，你只需让用户输入电子邮件地址和密码。当用户购买商品时，你需要知道将产品运送到哪里，因此你需要在此之前要求用户输入收货地址。你还提供了\
    \ Facebook 登录功能，以便获取更多用户信息，如个人资料照片、性别、地区、关系和兴趣。这需要向用户和 Facebook 申请不同的权限。目前，只需请求获取用户的性别和照片。\n\
    \n你还需要`override +(PFUser *)currentUser`方法，使其返回`EMABUser`，否则 Xcode 会一直给出警告。\n\n\
    以下是`EMABUser`的实现部分：\n\n`EMABUser.m`\n\n```\n#import \"EMABUser.h\"\n#import  <Parse/PFObject+Subclass.h>\n\
    \n@implementation EMABUser\n\n@dynamic firstName, lastName, gender, phone, address1,\
    \ address2, city, state, zipcode, photo;\n\n+(EMABUser *)currentUser{\n    return\
    \ (EMABUser *)[PFUser currentUser];\n}\n\n@end\n```\n\n# 注册视图\n\n注册界面由一个`UITableView`、一个标题为“注册”的按钮，以及一个标题同为“注册”的条形按钮项组成。\n\
    \n`UITableView`包含三个单元格。每个单元格中，使用一个`UITextField`来捕获用户的输入。第一个单元格用于注册邮箱，第二个单元格用于注册密码，第三个单元格用于确认密码。\n\
    \n由于后续你会多次使用带有`UITextField`的类似`UITableView`（即`UITextField` `UITableViewCell`），因此创建一个`UITextField`的子类来消除冗余代码。\n\
    \n首先，创建`EMABEmailTextField`类。\n\n`EMABEmailTextField.h`\n\n```\n#import <UIKit/UIKit.h>\n\
    \n@interface EMABEmailTextField : UITextField\n\n@end\n```\n\n`EMABEmailTextField.m`\n\
    \n```\n#import \"EMABEmailTextField.h\"\n\n@implementation EMABEmailTextField\n\
    \n-(instancetype)initWithFrame:(CGRect)frame\n{\n    self = [super initWithFrame:frame];\n\
    \    if (self) {\n        self.borderStyle = UITextBorderStyleNone;\n        self.textColor\
    \ = [UIColor blackColor];\n        self.autocapitalizationType = UITextAutocapitalizationTypeNone;\n\
    \        self.placeholder = NSLocalizedString(@\"邮箱\", @\"\");\n        self.backgroundColor\
    \ = [UIColor whiteColor];\n        self.autocorrectionType = UITextAutocorrectionTypeNo;\
    \ . . . // 不启用自动纠正\n        self.keyboardType = UIKeyboardTypeEmailAddress; .\
    \ . . // 使用默认输入法类型（全键盘）\n        self.returnKeyType = UIReturnKeyDone;\n     \
    \   self.clearButtonMode = UITextFieldViewModeWhileEditing; . . . // 右侧显示清除按钮“x”\n\
    \        // 添加辅助功能标签，说明文本字段的用途。\n        [self setAccessibilityLabel:NSLocalizedString(@\"\
    邮箱\", @\"\")];\n    }\n    return self;\n}\n\n@end\n```\n\n在此实现中，你设置了边框样式、文本颜色、占位符文本、背景颜色、键盘类型、自动纠正类型以及清除按钮模式，以提供更好的用户界面和体验。\n\
    \n接下来，创建`EMABPasswordTextField`来定制密码文本框的外观和感觉。实现代码如下：\n\n`EMABPasswordTextField.h`\n\
    \n```\n#import <UIKit/UIKit.h>\n\n@interface EMABPasswordTextField : UITextField\n\
    \n@end\n```\n\n`EMABPasswordTextField.m`\n\n```\n#import \"EMABPasswordTextField.h\"\
    \n\n@implementation EMABPasswordTextField\n\n-(instancetype)initWithFrame:(CGRect)frame\n\
    {\n    self = [super initWithFrame:frame];\n    if (self) {\n        self.borderStyle\
    \ = UITextBorderStyleNone;\n        self.textColor = [UIColor blackColor];\n \
    \       self.placeholder = NSLocalizedString(@\"密码\",@\"\");\n        self.backgroundColor\
    \ = [UIColor whiteColor];\n        self.keyboardType = UIKeyboardTypeDefault;\n\
    \        self.returnKeyType = UIReturnKeyDone;\n        self.secureTextEntry =\
    \ YES;   // 使文本输入安全（显示为圆点）\n        self.clearButtonMode = UITextFieldViewModeWhileEditing;\
    \    // 右侧显示清除按钮“x”\n        [self setAccessibilityLabel:NSLocalizedString(@\"\
    密码\", @\"\")];\n    }\n    return self;\n}\n\n@end\n```\n\n这段代码与`EMABEmailTextField`非常相似；主要区别在于你需要使用`secureTextEntry`属性来隐藏用户输入的密码。\n\
    \n请注意，并非一定要在`UITableViewCell`中使用`UiTableView`搭配`UITextField`——只是为了外观更美观。有些开发者会选择将三个`UITextField`放置在带有几条分隔线的背景图片之上。如果你能找到这种背景图片，这种方法同样效果不错。\n"
- fmt: "# The Sign-up Controller\n\nNext, get ready for the `EMABSignUpViewController`\
    \ implementation.\n\nFirst, create the `EMABSignUpViewController` class as a subclass\
    \ of `UIViewController`. There is not too much you need to do with its header\
    \ file; focus on the implementation file instead. Since you have used `UITableView`,\
    \ you need to put the protocol of `UITableView` in place. You also have `UITextField`\
    \ in place, so it’s a good idea to use the `UITextField Delegate` protocol; this\
    \ lets you dismiss the keyboard when the user taps the “Done” button. Here is\
    \ the implementation:\n\n`EMABSignupViewController.m`\n\n```objective-c\n#import\
    \ \"EMABSignupViewController.h\"\n#import \"EMABConstants.h\"\n#import \"EMABEmailTextField.h\"\
    \n#import \"EMABPasswordTextField.h\"\n#import \"EMABUser.h\"\n\n@interface EMABSignupViewController\
    \ ()<UITableViewDataSource, UITableViewDelegate, UITextFieldDelegate>\n\n@property\
    \ (nonatomic, strong) EMABEmailTextField *emailTextField;\n@property (nonatomic,\
    \ strong) EMABPasswordTextField *passwordTextField;\n@property (nonatomic, strong)\
    \ EMABPasswordTextField *passwordAgainTextField;\n\n@end\n```\n\nYou also need\
    \ to create three properties to reference `EMABEmailTextField` and `EMABPasswordTextfield`.\
    \ Since you still want to give some room to display each cell’s title, you want\
    \ to size and position each `UITextField`. The following code shows how to do\
    \ that using the `-(void)viewDidLoad` method.\n\n```objective-c\n- (void)viewDidLoad\
    \ {\n    [super viewDidLoad];\n    self.emailTextField = [[EMABEmailTextField\
    \ alloc] initWithFrame:CGRectMake(kLeftMargin, kTopMargin, kTextFieldWidth, kTextFieldHeight)];\n\
    \    self.emialTextField.delegate = self;\n    self.passwordTextField = [[EMABPasswordTextField\
    \ alloc] initWithFrame:CGRectMake(kLeftMargin, kTopMargin, kTextFieldWidth, kTextFieldHeight)];\n\
    \    self.passwordTextField.delegate = self;\n    self.passwordAgainTextField\
    \ = [[EMABPasswordTextField alloc] initWithFrame:CGRectMake(kLeftMargin, kTopMargin,\
    \ kTextFieldWidth, kTextFieldHeight)];\n    [self.passwordAgainTextField setPlaceholder:NSLocalizedString(@\"\
    Password Again\", @\"Password Again\")];\n    self.passwordAgainTextField.delegate\
    \ = self;\n}\n```\n\nKeep in mind that `kLeftMargin`, `kTopMargin`, `kTextFieldWidth`,\
    \ and `kTextFieldHeight` are defined in the `EMABConstants` class. You will need\
    \ them again in other instances.\n\nNext, move to the implementation of `UITableViewDataSource`\
    \ methods. You need one section and three cells for this `UITableView`.\n\n```objective-c\n\
    #pragma mark - tableview datasource\n\n-(NSInteger)tableView:(UITableView *)tableView\
    \ numberOfRowsInSection:(NSInteger)section\n{\n    return 3;\n}\n\n-(NSInteger)numberOfSectionsInTableView:(UITableView\
    \ *)tableView\n{\n    return 1;\n}\n```\n\nHaving set the identifier `\"SignUpCell\"\
    ` in the nib file on `UIStoryboard`, here is how you create three cells:\n\n```objective-c\n\
    -(UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    UITableViewCell *cell = nil;\n    cell = [tableView dequeueReusableCellWithIdentifier:@\"\
    SignupCell\" forIndexPath:indexPath];\n    UITextField *textField = nil;\n   \
    \ switch (indexPath.row) {\n        case 0:\n            textField = self.emailTextField;\n\
    \            break;\n        case 1:\n            textField = self.passwordTextField;\n\
    \            break;\n        case 2:\n            textField = self.passwordAgainTextField;\n\
    \            break;\n        default:\n            break;\n    }\n    // make\
    \ sure this textfield's width matches the width of the cell\n    CGRect newFrame\
    \ = textField.frame;\n    newFrame.size.width = CGRectGetWidth(cell.contentView.frame)\
    \ - kLeftMargin*2;\n    textField.frame = newFrame;\n    // if the cell is ever\
    \ resized, keep the textfield's width to match the cell's width\n    textField.autoresizingMask\
    \ = UIViewAutoresizingFlexibleWidth;\n    [cell.contentView addSubview:textField];\n\
    \    return cell;\n}\n```\n\nThe last piece is to handle one of the delegate methods\
    \ of `UITableView`. You don’t really have to implement it.\n\n```objective-c\n\
    -(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    [tableView deselectRowAtIndexPath:indexPath animated:NO];\n\
    }\n```\n\nAs you can see, it’s pretty easy to set up your views. However, signing\
    \ up a user requires a little bit of extra work.\n\nFirst, you need to check whether\
    \ the user provides a valid e-mail address. You can use the `-(BOOL)isValidEmail`\
    \ method:\n\n```objective-c\n#pragma mark - helper\n\n-(BOOL)isValidEmail {\n\
    \    // https://github.com/benmcredmond/DHValidation\n    NSString *emailRegex\
    \ = @\"[A-Z0-9a-z._%+-]+@[A-Za-z0-9.-]+\\\\.[A-Za-z]{2,6}\";\n    NSPredicate\
    \ *emailTest = [NSPredicate predicateWithFormat:@\"SELF MATCHES %@\", emailRegex];\n\
    \    return [emailTest evaluateWithObject:self.emailTextField.text];\n}\n```\n\
    \nNext, you want to remind the user when there is something wrong with the e-mail\
    \ entered; use `UIAlertView` for this. Later you will also show other alert information\
    \ such as the password length or sign-up errors. Let’s create a `-(void)showWarning:(NSString\
    \ *)message` helper method:\n\n```objective-c\n-(void)showWarning:(NSString *)message\
    \ {\n    [[[UIAlertView alloc] initWithTitle:NSLocalizedString(@\"Warning\", @\"\
    Warning\") message:message delegate:nil cancelButtonTitle:NSLocalizedString(@\"\
    OK\", @\"OK\") otherButtonTitles:nil , nil] show];\n}\n```\n\nLastly, you also\
    \ want to allow the user to dismiss the software keyboard, so you implement the\
    \ `UITextField` delegate method as follows:\n\n```objective-c\n#pragma mark -\
    \ UITextField Delegate\n\n-(BOOL)textFieldShouldReturn:(UITextField *)textField\n\
    {\n    [textField resignFirstResponder];\n    return YES;\n}\n\n@end\n```\n\n\
    Next, implement the `IBAction` when a user taps the “Sign Up” button. Check whether\
    \ the two password `UITextField` cells meet the minimum text length requirements;\
    \ and whether the two text fields have identical text. Also make sure the text\
    \ length in Email `UITextField` meets the requirement of minimum text length and\
    \ is a valid e-mail address. If something is wrong with the information entered,\
    \ the related warning will be provided afterward. Lastly, use `[PFUser user]`\
    \ to create a user instance and cast it to the `EMABUser`. The username and e-mail\
    \ of this user are the text in the e-mail `UITextField` text, and the password\
    \ of the user is the text in the password `UITextField` cell; then you use the\
    \ Parse `-(BFTask *)signUpInBackground` method. Here is the complete implementation:\n\
    \n```objective-c\n-(IBAction)onSignup:(id)sender{\n    BOOL cont0 = [self.passwordTextField.text\
    \ length] > kMinTextLength;\n    BOOL cont1 = [self.passwordAgainTextField.text\
    \ length] > kMinTextLength;\n    BOOL cont2 = [self.passwordTextField.text isEqualToString:self.passwordAgainTextField.text];\n\
    \    BOOL cont3 = [self.emailTextField.text length] > kMinTextLength;\n    BOOL\
    \ cont4 = [self isValidEmail];\n    \n    if (!cont0) {\n        [self showWarning:NSLocalizedString(@\"\
    Password at least 6 characters.\", @\"Password at least 6 characters.\")];\n \
    \   }\n    if (!cont1) {\n        [self showWarning:NSLocalizedString(@\"Password\
    \ at least 6 characters.\", @\"Password at least 6 characters.\")];\n    }\n \
    \   if (!cont2) {\n        [self showWarning:NSLocalizedString(@\"Passwords have\
    \ to match.\", @\"Passwords have to match.\")];\n    }\n    if (!cont3) {\n  \
    \      [self showWarning:NSLocalizedString(@\"Email at least 6 characters.\",\
    \ @\"Password at least 6 characters.\")];\n    }\n    if (!cont4) {\n        [self\
    \ showWarning:NSLocalizedString(@\"Doesn't look like a valid email.\", @\"Doesn't\
    \ look like a valid email.\")];\n    }\n    \n    if (cont0 && cont1 && cont2\
    \ && cont3 && cont4) {\n        [self.emailTextField resignFirstResponder];\n\
    \        [self.passwordTextField resignFirstResponder];\n        [self.passwordAgainTextField\
    \ resignFirstResponder];\n        EMABUser *user = (EMABUser *)[PFUser user];\n\
    \        user.username = [self.emailTextField text];\n        user.email = [self.emailTextField\
    \ text];\n        user.password = [self.passwordTextField text];\n        [user\
    \ signUpInBackgroundWithBlock:^(BOOL succeeded, NSError *error){\n           \
