    \ = enabled;\n}\n\n@end\n```\n\nThis code also adds a border to the `UITextField`\
    \ as shown in Figure [11-1](#A978-1-4842-1317-9_11_Chapter.html#Fig1)."
  raw: '## Summary


    This chapter covers the topic of how to implement a shopping bag and how to get
    it right for all kinds of use cases when dealing with customers and their shopping
    habits.


    # 11. Shipping Address


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1317-9_​11](http://dx.doi.org/10.1007/978-1-4842-1317-9_11))
    contains supplementary material, which is available to authorized users.


    In [Chapter 10](#A978-1-4842-1317-9_10_Chapter.html), you learned how to implement
    features such adding a product to the shopping bag, updating the product’s quantity,
    deleting a product from the bag, and updating the total amount. In order for customers
    to complete the checkout process, however, you also need to collect additional
    information that you don’t have yet: namely, the customer’s shipping and billing
    addresses.


    This chapter covers how to create a UITableView-based form to collect a US shipping
    address. The user interface itself might look pretty simple, but there are some
    tricks I need to cover.


    Figure [11-1](#A978-1-4842-1317-9_11_Chapter.html#Fig1) shows what a shipping
    address form looks like.


    ![A978-1-4842-1317-9_11_Fig1_HTML.jpg](A978-1-4842-1317-9_11_Fig1_HTML.jpg)


    Figure 11-1.


    The Shipping address form


    ## Shipping Address Model


    The model used in this chapter still is the EMABUser model, but you will need
    additional properties: address1, address2, city, state, and zip code. Here is
    the header file:


    EMABUser.h


    `@interface EMABUser : PFUser<PFSubclassing>`


    `@property (nonatomic, copy) NSString *firstName;`


    `@property (nonatomic, copy) NSString *lastName;`


    `@property (nonatomic, copy) NSString *name;`


    `@property (nonatomic, copy) NSString *gender;`


    `@property (nonatomic, copy) NSString *phone;`


    `@property (nonatomic, copy) NSString *address1;`


    `@property (nonatomic, copy) NSString *address2;`


    `@property (nonatomic, copy) NSString *city;`


    `@property (nonatomic, copy) NSString *state;`


    `@property (nonatomic, copy) NSString *zipcode;`


    `@property (nonatomic, copy) PFFile *photo;`


    ## Shipping Address View


    Start by creating a UITableViewCell subclass, and name it EMABUserProfileTableViewCell.
    As you can see, a UITextField has been used on this cell. You also need a helper
    method to customize the cell’s title, the UITextField’s placeholder, and the keyboard
    type.


    EMABUserProfileTableViewCell.h


    `@interface EMABUserProfileTableViewCell : UITableViewCell`


    `@property (nonatomic, strong) UITextField *textField;`


    `- (void)setContentForTableCellLabel:(NSString*)title placeHolder:(NSString *)placeHolder
    text:(NSString *)text keyBoardType:(NSNumber *)type enabled:(BOOL)enabled;`


    `@end`


    This time, you want to programmatically add this UITextField to this UITableViewCell
    as this cell’s accessory view. You still have this cell set up on the xib file.
    So you need to call a different instantiation method, `-(instancetype)initWithCoder:(NSCode
    *)aDecorder`, as shown in the following code.


    Keep in mind that you have used a constant value to position this UITextField.
    It won’t work very well for different iPhone screen sizes. Since the focus in
    this book is really about the business logic, not the UI, this implementation
    might not fit all iPhone screen sizes.


    Here is the instantiation method:


    EMABUserProfileTableViewCell.m


    `@implementation EMABUserProfileTableViewCell`


    `-(instancetype)initWithCoder:(NSCoder *)aDecoder`


    `{`


        `self = [super initWithCoder:aDecoder];`


        `if (self) {`


            `self.textLabel.font = [UIFont boldSystemFontOfSize:14.0];`


            `CGRect frame = CGRectMake(100, kTopMargin, 210.0, kTextFieldHeight);`


            `self.textField = [[UITextField alloc] initWithFrame:frame];`


            `self.textField.borderStyle = UITextBorderStyleNone;`


            `self.textField.textColor = [UIColor blackColor];`


            `self.textField.font = [UIFont systemFontOfSize:13.0];`


            `self.textField.textAlignment = NSTextAlignmentRight;`


            `self.textField.contentVerticalAlignment = UIControlContentVerticalAlignmentCenter;`


            `self.textField.enabled = NO;`


            `self.textField.backgroundColor = [UIColor clearColor];`


            `self.textField.autocorrectionType = UITextAutocorrectionTypeNo;    //
    no auto correction support`


            `self.textField.autocapitalizationType = UITextAutocapitalizationTypeWords;`


            `self.textField.returnKeyType = UIReturnKeyDone;`


            `self.textField.clearButtonMode = UITextFieldViewModeWhileEditing;  //
    has a clear ''x'' button to the right`


            `self.accessoryView = self.textField;`


            `self.selectionStyle = UITableViewCellSelectionStyleNone;`


        `}`


        `return self;`


    `}`


    The helper method, `-(void) - (void)setContentForTableCellLabel:(NSString*)title
    placeHolder:(NSString *)placeHolder :(NSString *)text keyBoardType:(NSNumber *)type
    enabled:(BOOL)enabled`, is to use dynamic content to customize each cell. Here
    is its implementation:


    `- (void)setContentForTableCellLabel:(NSString*)title placeHolder:(NSString *)placeHolder
    :(NSString *)text keyBoardType:(NSNumber *)type enabled:(BOOL)enabled`


    `{`


        `self.textLabel.text = title;`


        `self.textField.text = text;`


        `self.textField.placeholder = placeHolder;`


        `self.textField.keyboardType = [type intValue];`


        `self.textField.layer.cornerRadius = 4.0f;`


        `self.textField.layer.masksToBounds = YES;`


        `self.textField.layer.borderColor = (enabled)?[[UIColor colorWithRed:0.0 green:153.0/255.0
    blue:204.0/255.0 alpha:1] CGColor ]:[[UIColor clearColor] CGColor];`


        `self.textField.layer.borderWidth = 1.0f;`


        `self.textField.enabled = enabled;`


    `}`


    `@end`


    This code also adds a border to the UITextField as shown in Figure [11-1](#A978-1-4842-1317-9_11_Chapter.html#Fig1).'
  trans: "\n# 总结\n\n本章涵盖如何实现购物袋以及如何在处理客户及其购物习惯时，针对各种使用场景正确实现这一功能。\n\n# 11. 送货地址\n\n\
    电子补充材料 本章在线版本（doi:[10.​1007/​978-1-4842-1317-9_​11](http://dx.doi.org/10.1007/978-1-4842-1317-9_11)）包含补充材料，仅供授权用户使用。\n\
    \n在第 10 章中，您学习了如何实现将商品添加到购物袋、更新商品数量、从购物袋中删除商品以及更新总金额等功能。然而，为了让客户完成结账流程，您还需要收集尚未获取的额外信息：即客户的送货地址和账单地址。\n\
    \n本章介绍如何创建一个基于`UITableView`的表单来收集美国送货地址。用户界面本身可能看起来非常简单，但仍有一些技巧需要讲解。\n\n图 11-1\
    \ 展示了送货地址表单的外观。\n\n![A978-1-4842-1317-9_11_Fig1_HTML.jpg](img/A978-1-4842-1317-9_11_Fig1_HTML.jpg)\n\
    \n**图 11-1.** 送货地址表单\n\n## 送货地址模型\n\n本章使用的模型仍然是`EMABUser`模型，但您需要添加额外的属性：`address1`、`address2`、`city`、`state`和`zipcode`。以下是头文件：\n\
    \n**EMABUser.h**\n\n```\n@interface EMABUser : PFUser<PFSubclassing>\n\n@property\
    \ (nonatomic, copy) NSString *firstName;\n@property (nonatomic, copy) NSString\
    \ *lastName;\n@property (nonatomic, copy) NSString *name;\n@property (nonatomic,\
    \ copy) NSString *gender;\n@property (nonatomic, copy) NSString *phone;\n@property\
    \ (nonatomic, copy) NSString *address1;\n@property (nonatomic, copy) NSString\
    \ *address2;\n@property (nonatomic, copy) NSString *city;\n@property (nonatomic,\
    \ copy) NSString *state;\n@property (nonatomic, copy) NSString *zipcode;\n@property\
    \ (nonatomic, copy) PFFile *photo;\n\n@end\n```\n\n## 送货地址视图\n\n首先创建一个`UITableViewCell`的子类，并将其命名为`EMABUserProfileTableViewCell`。如您所见，该单元格上使用了`UITextField`。您还需要一个辅助方法来定制单元格的标题、`UITextField`的占位符文本以及键盘类型。\n\
    \n**EMABUserProfileTableViewCell.h**\n\n```\n@interface EMABUserProfileTableViewCell\
    \ : UITableViewCell\n\n@property (nonatomic, strong) UITextField *textField;\n\
    \n- (void)setContentForTableCellLabel:(NSString*)title placeHolder:(NSString *)placeHolder\
    \ text:(NSString *)text keyBoardType:(NSNumber *)type enabled:(BOOL)enabled;\n\
    \n@end\n```\n\n这次，您希望以编程方式将此`UITextField`添加为该`UITableViewCell`的附属视图。该单元格仍通过 xib\
    \ 文件进行设置。因此，您需要调用不同的实例化方法`-(instancetype)initWithCoder:(NSCode *)aDecorder`，如下代码所示。\n\
    \n请记住，您使用了一个常量值来定位此`UITextField`。这对于不同的 iPhone 屏幕尺寸来说效果不佳。由于本书的重点是业务逻辑而非用户界面，因此此实现可能无法适配所有\
    \ iPhone 屏幕尺寸。\n\n以下是实例化方法：\n\n**EMABUserProfileTableViewCell.m**\n\n```\n@implementation\
    \ EMABUserProfileTableViewCell\n\n-(instancetype)initWithCoder:(NSCoder *)aDecoder\n\
    {\n    self = [super initWithCoder:aDecoder];\n    if (self) {\n        self.textLabel.font\
    \ = [UIFont boldSystemFontOfSize:14.0];\n        CGRect frame = CGRectMake(100,\
    \ kTopMargin, 210.0, kTextFieldHeight);\n        self.textField = [[UITextField\
    \ alloc] initWithFrame:frame];\n        self.textField.borderStyle = UITextBorderStyleNone;\n\
    \        self.textField.textColor = [UIColor blackColor];\n        self.textField.font\
    \ = [UIFont systemFontOfSize:13.0];\n        self.textField.textAlignment = NSTextAlignmentRight;\n\
    \        self.textField.contentVerticalAlignment = UIControlContentVerticalAlignmentCenter;\n\
    \        self.textField.enabled = NO;\n        self.textField.backgroundColor\
    \ = [UIColor clearColor];\n        self.textField.autocorrectionType = UITextAutocorrectionTypeNo;\
    \    // 无自动更正支持\n        self.textField.autocapitalizationType = UITextAutocapitalizationTypeWords;\n\
    \        self.textField.returnKeyType = UIReturnKeyDone;\n        self.textField.clearButtonMode\
    \ = UITextFieldViewModeWhileEditing;  // 右侧有清除按钮 'x'\n        self.accessoryView\
    \ = self.textField;\n        self.selectionStyle = UITableViewCellSelectionStyleNone;\n\
    \    }\n    return self;\n}\n```\n\n辅助方法`-(void)setContentForTableCellLabel:(NSString*)title\
    \ placeHolder:(NSString *)placeHolder :(NSString *)text keyBoardType:(NSNumber\
    \ *)type enabled:(BOOL)enabled`用于通过动态内容定制每个单元格。以下是其实现：\n\n```\n- (void)setContentForTableCellLabel:(NSString*)title\
    \ placeHolder:(NSString *)placeHolder :(NSString *)text keyBoardType:(NSNumber\
    \ *)type enabled:(BOOL)enabled\n{\n    self.textLabel.text = title;\n    self.textField.text\
    \ = text;\n    self.textField.placeholder = placeHolder;\n    self.textField.keyboardType\
    \ = [type intValue];\n    self.textField.layer.cornerRadius = 4.0f;\n    self.textField.layer.masksToBounds\
    \ = YES;\n    self.textField.layer.borderColor = (enabled)?[[UIColor colorWithRed:0.0\
    \ green:153.0/255.0 blue:204.0/255.0 alpha:1] CGColor ]:[[UIColor clearColor]\
    \ CGColor];\n    self.textField.layer.borderWidth = 1.0f;\n    self.textField.enabled\
    \ = enabled;\n}\n\n@end\n```\n\n这段代码还为`UITextField`添加了边框，如图 11-1 所示。\n"
- fmt: "# Shipping Address Controller\n\n在 Xcode 中，创建一个新的 `UITableViewController`，并将其命名为\
    \ `EMABUserProfileTableViewController`。\n\n`EMABUserInfoViewController.m`：\n\n\
    ```objc\n#import \"EMABUserProfileTableViewController.h\"\n#import \"EMABUserProfileTableViewCell.h\"\
    \n#import \"EMABUser.h\"\n\nstatic NSString *kTitleKey = @\"titleKey\";\nstatic\
    \ NSString *kPlaceholderKey = @\"placeholderKey\";\nstatic NSString *kKeyboardKey\
    \ = @\"keyboardTypeKey\";\n\n@interface EMABUserProfileTableViewController ()<UITextFieldDelegate>\n\
    @property (nonatomic, strong) NSArray *dataSourceArray;\n@property (nonatomic,\
    \ strong) EMABUser *customer;\n@end\n```\n\n在这个 `UITableView` 中，有九个静态的 `UITableViewCell`；也就是说，这些单元格的标题是固定的，每个单元格中\
    \ `UITextField` 的占位符文本也是固定的。为了避免在每个单元格中硬编码这些内容，可以使用一个 `NSArray` 来存放所有内容，并动态地分配给每个单元格。这个\
    \ `NSArray` 中的每个元素都是一个 `NSDictionary`。每个字典有三个键。这就是为什么在 `static NSString` 中定义了\
    \ `kTitleKey`、`kPlaceholderKey` 和 `kKeyboardKey` 这些常量。\n\n你还定义了一个名为 `customer`\
    \ 的 `EMABUser` 属性。你需要用它来跟踪用户的输入，并与该用户保持一致。\n\n由于每个单元格上都有一个 `UITextField`，你需要在接口类别中声明\
    \ `UITextFieldDelegate`：\n\n```objc\n@interface EMABUserProfileTableViewController\
    \ ()<UITextFieldDelegate>\n```\n\n`EMABUserProfileTableViewController.m`：\n\n\
    ```objc\n@implementation EMABUserProfileTableViewController\n\n- (void)viewDidLoad\
    \ {\n    [super viewDidLoad];\n    self.dataSourceArray = @[\n        @{\n   \
    \         kTitleKey:NSLocalizedString(@\"First Name*\", @\"First Name\"),\n  \
    \          kPlaceholderKey:NSLocalizedString(@\"First Name\", @\"First Name\"\
    ),\n            kKeyboardKey:@(UIKeyboardTypeNamePhonePad)},\n        @{\n   \
    \         kTitleKey:NSLocalizedString(@\"Last Name*\",@\"\"),\n            kPlaceholderKey:NSLocalizedString(@\"\
    Last Name\",@\"\"),\n            kKeyboardKey:@(UIKeyboardTypeNamePhonePad)},\n\
    \        @{\n            kTitleKey:NSLocalizedString(@\"Phone*\",@\"\"),\n   \
    \         kPlaceholderKey:@\"555-555-5555\",\n            kKeyboardKey:@(UIKeyboardTypePhonePad)},\n\
    \        @{\n            kTitleKey:NSLocalizedString(@\"Email*\",@\"\"),\n   \
    \         kPlaceholderKey:@\"Email\",\n            kKeyboardKey:@(UIKeyboardTypeEmailAddress)},\n\
    \        @{\n            kTitleKey:NSLocalizedString(@\"Address 1*\",@\"\"),\n\
    \            kPlaceholderKey:@\"Address 1\",\n            kKeyboardKey:@(UIKeyboardTypeDefault)},\n\
    \        @{\n            kTitleKey:NSLocalizedString(@\"Address 2\",@\"\"),\n\
    \            kPlaceholderKey:@\"Address 2\",\n            kKeyboardKey:@(UIKeyboardTypeDefault)},\n\
    \        @{\n            kTitleKey:NSLocalizedString(@\"City*\",@\"\"),\n    \
    \        kPlaceholderKey:NSLocalizedString(@\"City\",@\"\"),\n            kKeyboardKey:@(UIKeyboardTypeDefault)},\n\
    \        @{\n            kTitleKey:NSLocalizedString(@\"State*\",@\"\"),\n   \
    \         kPlaceholderKey:NSLocalizedString(@\"State\",@\"\"),\n            kKeyboardKey:@(UIKeyboardTypeDefault)},\n\
    \        @{\n            kTitleKey:NSLocalizedString(@\"Zipcode*\",@\"\"),\n \
    \           kPlaceholderKey:@\"#####\",\n            kKeyboardKey:@(UIKeyboardTypeNumberPad)}\n\
    \    ];\n    self.customer = [EMABUser currentUser];\n}\n```\n\n设置好数据源后，你可以向 `UITableView`\
    \ 添加一些实际数据。这里有一个分区，九个单元格——也就是 `dataSourceArray` 的大小。\n\n```objc\n#pragma mark\
    \ - Table view data source\n\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
    \ *)tableView {\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView\
    \ numberOfRowsInSection:(NSInteger)section {\n    return [self.dataSourceArray\
    \ count];\n}\n\n- (EMABUserProfileTableViewCell *)tableView:(UITableView *)tableView\
    \ cellForRowAtIndexPath:(NSIndexPath *)indexPath {\n    EMABUserProfileTableViewCell\
    \ *cell = [tableView dequeueReusableCellWithIdentifier:@\"customerProfile\" forIndexPath:indexPath];\n\
    \    NSInteger row = indexPath.row;\n    cell.textField.delegate = self;\n   \
    \ cell.textField.tag = 100 + row;\n    NSString *text = @\"\";\n    switch (row)\
    \ {\n        case 0:\n            text = self.customer.firstName;\n          \
    \  break;\n        case 1:\n            text = self.customer.lastName;\n     \
    \       break;\n        case 2:\n            text = self.customer.phone;\n   \
    \         break;\n        case 3:\n            text = self.customer.email;\n \
    \           break;\n        case 4:\n            text = self.customer.address1;\n\
    \            break;\n        case 5:\n            text = self.customer.address2;\n\
    \            break;\n        case 6:\n            text = self.customer.city;\n\
    \            break;\n        case 7:\n            text = self.customer.state;\n\
    ```"
  raw: '## Shipping Address Controller


    In Xcode, create a new UITableViewController, and name it EMABUserProfileTableViewController.


    EMABUserInfoViewController.m


    `#import "EMABUserProfileTableViewController.h"`


    `#import "EMABUserProfileTableViewCell.h"`


    `#import "EMABUser.h"`


    `static NSString *kTitleKey = @"titleKey";`


    `static NSString *kPlaceholderKey = @"placeholderKey";`


    `static NSString *kKeyboardKey = @"keyboardTypeKey";`


    `@interface EMABUserProfileTableViewController ()<UITextFieldDelegate>`


    `@property (nonatomic, strong) NSArray *dataSourceArray;`


    `@property (nonatomic, strong) EMABUser *customer;`


    `@end`


    You have nine static UITableViewCells in this UITableView; that is, the titles
    of those cells are fixed, and the placeholder text of each UITextField in each
    cell is fixed. Instead of hard-coding them in each cell, use an NSArray to holder
    all contents, and assign to each cell dynamically. Each element in this NSArrray
    is an NSDictionary. Each dictionary has three keys. That’s why the `kTitleKey`,
    `kPlaceholderKey`, and `kKeyboardKey` constants are defined in the static NSString.


    You also defined an EMABUser property called `customer`. You need to use it to
    keep track of the user’s input and keep consistent with this user.


    Since there is a UITextField on each cell, you need to declare the UITextFieldDelegate
    in the interface category,


    `@interface EMABUserProfileTableViewController ()<UITextFieldDelegate>`


    EMABUserProfileTableViewController`.m`


    `@implementation EMABUserProfileTableViewController`


    `- (void)viewDidLoad {`


    `[super viewDidLoad];`


    `self.dataSourceArray = @[`


    `@{`


    `kTitleKey:NSLocalizedString(@"First Name*", @"First Name"),`


    `kPlaceholderKey:NSLocalizedString(@"First Name", @"First Name"),`


    `kKeyboardKey:@(UIKeyboardTypeNamePhonePad)},`


    `@{`


    `kTitleKey:NSLocalizedString(@"Last Name*",@""),`


    `kPlaceholderKey:NSLocalizedString(@"Last Name",@""),`


    `kKeyboardKey:@(UIKeyboardTypeNamePhonePad)},`


    `@{`


    `kTitleKey:NSLocalizedString(@"Phone*",@""),`


    `kPlaceholderKey:@"555-555-5555",`


    `kKeyboardKey:@(UIKeyboardTypePhonePad)},`


    `@{`


    `kTitleKey:NSLocalizedString(@"Email*",@""),`


    `kPlaceholderKey:@"Email",`


    `kKeyboardKey:@(UIKeyboardTypeEmailAddress)},`


    `@{`


    `kTitleKey:NSLocalizedString(@"Address 1*",@""),`


    `kPlaceholderKey:@"Address 1",`


    `kKeyboardKey:@(UIKeyboardTypeDefault)},`


    `@{`


    `kTitleKey:NSLocalizedString(@"Address 2",@""),`


    `kPlaceholderKey:@"Address 2",`


    `kKeyboardKey:@(UIKeyboardTypeDefault)},`


    `@{`


    `kTitleKey:NSLocalizedString(@"City*",@""),`


    `kPlaceholderKey:NSLocalizedString(@"City",@""),`


    `kKeyboardKey:@(UIKeyboardTypeDefault)},`


    `@{`


    `kTitleKey:NSLocalizedString(@"State*",@""),`


    `kPlaceholderKey:NSLocalizedString(@"State",@""),`


    `kKeyboardKey:@(UIKeyboardTypeDefault)},`


    `@{`


    `kTitleKey:NSLocalizedString(@"Zipcode*",@""),`


    `kPlaceholderKey:@"#####",`


    `kKeyboardKey:@(UIKeyboardTypeNumberPad)}`


    `];`


    `self.customer = [EMABUser currentUser];`


    `}`


    Having set up the data source, you can add some real data to the UITableView.
    You have one section, nine cells - the size of `dataSourceArray`.


    `#pragma mark - Table view data source`


    `- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView {`


