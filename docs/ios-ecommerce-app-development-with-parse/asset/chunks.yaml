- fmt: "### Required Features List\n\nThis quick overview of the Apple Store iPhone\
    \ app provides a good example of the features that an e-commerce app should have.\
    \ It should:\n\n- List products by categories\n- Show a product list for each\
    \ category\n- Show product details\n- Have a search feature\n- Have a shopping\
    \ cart\n- Show user’s favorite (wish list) items\n- Show user’s order history\n\
    - Show company information such as about us, contact us, privacy policy, and copyright\
    \ information\n\nA good e-commerce app also should enable users to:\n\n- Review\
    \ products\n- Mark a product as a favorite (or add it to a wish list)\n- Add a\
    \ product to a shopping cart\n- Create a user account\n- Log in and out\n- Add\
    \ and edit a shipping address\n- Add and edit a payment method\n- Log in with\
    \ third-party credentials such as Facebook or Twitter\n- Request a password reset\
    \ (in case it slipped their minds)\n\nTo run a business, you also need some way\
    \ to run a marketing campaign:\n\n- Send new product or promotion push notifications\
    \ to customers\n- Ask users to give your app a good review on App Store\n\nTo\
    \ make good business decisions and improve your app, you also need to:\n\n- Track\
    \ how users use our apps\n- Track app crashes\n\n## Prerequisites\n\nTo develop\
    \ and publish iOS apps on the App Store, you will need to enroll in the iOS Developer\
    \ Program and set up a Mac OS development environment on your computer.\n\n###\
    \ iOS Developer Program\n\nBy default, the App Store will show the name of the\
    \ developer enrolled in the iOS Developer Program for each app published under\
    \ this account. To gain users’ trust, however, it’s advisable to show the business\
    \ entity’s name instead, as shown in Figure [1-12](#A978-1-4842-1317-9_1_Chapter.html#Fig12).\
    \ To be able to publish an app under the name of a business entity, you need to\
    \ have this D-U-N-S™ number—which is a bit more time consuming than registering\
    \ with the iOS Developer Program.\n\n![A978-1-4842-1317-9_1_Fig12_HTML.jpg](A978-1-4842-1317-9_1_Fig12_HTML.jpg)\
    \  \nFigure 1-12. Apple publishes the Apple Store app\n\nObtaining a D-U-N-S™\
    \ number is free. But it can take a month for a US company and even longer if\
    \ you are not a US company to obtain the number. Once you have the number, it\
    \ can take up to two weeks for Apple to verify this number. In short, apply for\
    \ your D-U-N-S earlier rather than later.\n\n**Note**: To learn more about obtaining\
    \ a D-U-N-S number, go to [`https://developer.apple.com/support/ios/D-U-N-S.php`](https://developer.apple.com/support/ios/D-U-N-S.php).\n\
    \n### Development Environment\n\nTo build an iOS app, you also need to have a\
    \ Mac computer running the latest Mac OS. The development software is `Xcode`,\
    \ which includes the iOS SDK (see Figure [1-13](#A978-1-4842-1317-9_1_Chapter.html#Fig13)).\n\
    \n![A978-1-4842-1317-9_1_Fig13_HTML.jpg](A978-1-4842-1317-9_1_Fig13_HTML.jpg)\
    \  \nFigure 1-13. Download `Xcode` from Mac App Store\n\nEven though you can run\
    \ sample projects on an iPhone simulator, you really should have an iOS device,\
    \ such as an iPhone or iPod touch with the latest iOS installed, to ensure your\
    \ app runs properly on the device.\n\nThe sample projects in this book are developed\
    \ against the latest iOS version, and will always be updated to the latest iOS\
    \ when it’s available.\n\n**Note**: Apple updates `Xcode` and the iOS SDK frequently.\
    \ At the time of writing, I am using `Xcode` Version 6.3.1 and iOS SDK 8.1.\n\n\
    ## The Beauty & Me Sample iPhone App\n\nIn this book, you learn to build an iOS\
    \ app for selling beauty and cosmetics products, such as face wash, cleansers,\
    \ and other skin care products.\n\nAs I did with the Apple Store app, I will walk\
    \ you through most features introduced in the Apple Store app.\n\n**Note**: To\
    \ see what the app looks like, you can download it from the App Store by searching\
    \ “Beauty & Me.”\n\n## Summary\n\nIn this chapter, I gave an overview the Apple\
    \ Store iPhone app and summarized its features to provide you with some guidelines\
    \ of what to include in your own e-commerce app.\n\n# 2. Planning and Building\
    \ the Prototype\n\nElectronic supplementary material The online version of this\
    \ chapter (doi:[10.​1007/​978-1-4842-1317-9_​2](http://dx.doi.org/10.1007/978-1-4842-1317-9_2))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    Before you start to write the first line of code, it’s important to have a mock-up\
    \ to see what the app looks like, what the user experience is like, what are the\
    \ features are, and how they are organized. In this chapter, I will show you how\
    \ to prototype the sample e-commerce iPhone app by using `Xcode`.\n\nThe Apple\
    \ Store iPhone app uses a `UITTabBarController`-based user interface (UI) design\
    \ pattern. This pattern is quite standard and powerful for an e-commerce app;\
    \ other apps such as Target and EAT24 also use this UI pattern. The good thing\
    \ about the tab bar interface is that each view controller’s state of each tab\
    \ is automatically persistent. It means that whenever we leave a screen from one\
    \ tab and play around with other tabs, when we return back to the tab it will\
    \ always show the content we just left.\n\nThis chapter is largely about planning.\
    \ I won’t be giving instructions and showing you figures about how you can drag\
    \ and drop a `UIViewController` or a UI Control to `UIStoryboard`, but in some\
    \ instances, I will reveal the tricks I have used.\n\nThis chapter covers the\
    \ following:\n\n- User interface and experience\n- The proximate total amount\
    \ of view controllers\n- The view controller’s type, `UITableViewController`,\
    \ or `UIViewController`\n- Custom views\n- The appearance of the app\n\n## Designing\
    \ the User Experience\n\nThe goal for the sample app that accompanies this book\
    \ is to present users/customers with an experience that is similar to what they\
    \ get from the Apple Store iPhone app. The Apple Store app is based on a tabbed\
    \ design, so you want to use a tapped application template in `Xcode`. To get\
    \ started, launch `Xcode`, and follow these steps:\n\n1. Create a new project\
    \ based on the Tabbed Application template, and name it, for example, “[Chapter\
    \ 2](#A978-1-4842-1317-9_2_Chapter.html).” In general, the Tabbed Application\
    \ template is a good fit for an e-commerce mobile app.\n\n![A978-1-4842-1317-9_2_Fig1_HTML.jpg](A978-1-4842-1317-9_2_Fig1_HTML.jpg)\
    \  \nFigure 2-1. Create a Tabbed Application with `Xcode`\n\n2. Next, open the\
    \ `Main.storyboard` file. The default nib file is freestyle size. Let’s change\
    \ to iPhone 4-inch on Simulated Metrics, shown in Figure [2-2](#A978-1-4842-1317-9_2_Chapter.html#Fig2).\n\
    \n![A978-1-4842-1317-9_2_Fig2_HTML.jpg](A978-1-4842-1317-9_2_Fig2_HTML.jpg)  \n\
    Figure 2-2. Change Simulated Metrics to iPhone 4-inch\n\n3. Add three navigation\
    \ controllers.\n\n4. Holding “control” key, drag the root TabController to the\
    \ three navigation controllers. A `UITabBar` shows up on each `UINavigationController`,\
    \ as shown in Figure [2-3](#A978-1-4842-1317-9_2_Chapter.html#Fig3).\n\n![A978-1-4842-1317-9_2_Fig3_HTML.gif](A978-1-4842-1317-9_2_Fig3_HTML.gif)\
    \  \nFigure 2-3. Connect the three `UINavigationControllers` to the TabController\n\
    \n5. Change the title of the three `UITabBars` to “`Shop`,” “`My Account`,” and\
    \ “`Bag`,” respectively (see Figure [2-3](#A978-1-4842-1317-9_2_Chapter.html#Fig3)).\n\
    \n![A978-1-4842-1317-9_2_Fig4_HTML.jpg](A978-1-4842-1317-9_2_Fig4_HTML.jpg)  \n\
    Figure 2-4. Change the name of the Tab bar item"
  raw: '### Required Features List


    This quick overview of the Apple Store iPhone app provides a good example of the
    features that an e-commerce app should have. It should:


    *   List products by categories

    *   Show a product list for each category

    *   Show product details

    *   Have a search feature

    *   Have a shopping cart

    *   Show user’s favorite (wish list) items

    *   Show user’s order history

    *   Show company information such as about us, contact us, privacy policy, and
    copyright information


    A good e-commerce app also should enable users to:


    *   Review products

    *   Mark a product as a favorite (or add it to a wish list)

    *   Add a product to a shopping cart

    *   Create a user account

    *   Log in and out

    *   Add and edit a shipping address

    *   Add and edit a payment method

    *   Log in with third-party credentials such as Facebook or Twitter

    *   Request a password reset (in case it slipped their minds)


    To run a business, you also need some way to run a marketing campaign:


    *   Send new product or promotion push notifications to customers

    *   Ask users to give your app a good review on App Store


    To make good business decisions and improve your app, you also need to:


    *   Track how users use our apps

    *   Track app crashes


    ## Prerequisites


    To develop and publish iOS apps on the App Store, you will need to enroll in the
    iOS Developer Program and set up a Mac OS development environment on your computer.


    ### iOS Developer Program


    By default, the App Store will show the name of the developer enrolled in the
    iOS Developer Program for each app published under this account. To gain users’
    trust, however, it’s advisable to show the business entity’s name instead, as
    shown in Figure [1-12](#A978-1-4842-1317-9_1_Chapter.html#Fig12). To be able to
    publish an app under the name of a business entity, however, you need to have
    this D-U-N-S™ number—which is a bit more time consuming than registering with
    the iOS Developer Program.


    ![A978-1-4842-1317-9_1_Fig12_HTML.jpg](A978-1-4842-1317-9_1_Fig12_HTML.jpg)


    Figure 1-12.


    Apple publishes the Apple Store app


    Obtaining a D-U-N-S™ number is free. But it can take a month for a US company
    and even longer if you are not a US company to obtain the number. Once you have
    the number, it can take up to two weeks for Apple to verify this number. In short,
    apply for your D-U-N-S earlier rather than later.


    Note


    To learn more about obtaining a D-U-N-S number, go to [`https://developer.apple.com/support/ios/D-U-N-S.php`](https://developer.apple.com/support/ios/D-U-N-S.php)
    .


    ### Development Environment


    To build an iOS app, you also need to have a Mac computer running the latest Mac
    OS. The development software is Xcode, which includes the iOS SDK (see Figure
    [1-13](#A978-1-4842-1317-9_1_Chapter.html#Fig13)).


    ![A978-1-4842-1317-9_1_Fig13_HTML.jpg](A978-1-4842-1317-9_1_Fig13_HTML.jpg)


    Figure 1-13.


    Download Xcode from Mac App Store


    Even though you can run sample projects on an iPhone simulator, you really should
    have an iOS device, such as an iPhone or iPod touch with the latest iOS installed,
    to ensure your app runs properly on the device.


    The sample projects in this book are developed against the latest iOS version,
    and will always be updated to the latest iOS when it’s available.


    Note


    Apple updates Xcode and the iOS SDK frequently. At the time of writing, I am using
    Xcode Version 6.3.1 and iOS SDK 8.1.


    ## The Beauty & Me Sample iPhone App


    In this book, you learn to build an iOS app for selling beauty and cosmetics products,
    such as face wash, cleansers, and other skin care products.


    As I did with the Apple Store app, I will walk you through most features introduced
    in the Apple Store app.


    Note


    To see what the app looks like, you can download it from the App Store by searching
    “Beauty & Me.”


    ## Summary


    In this chapter, I gave an overview the Apple Store iPhone app and summarized
    its features to provide you with some guidelines of what to include in your own
    e-commerce app.


    # 2. Planning and Building the Prototype


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1317-9_​2](http://dx.doi.org/10.1007/978-1-4842-1317-9_2))
    contains supplementary material, which is available to authorized users.


    Before you start to write the first line of code, it’s important to have a mock-up
    to see what the app looks like, what the user experience is like, what are the
    features are, and how they are organized. In this chapter, I will show you how
    to prototype the sample e-commerce iPhone app by using Xcode.


    The Apple Store iPhone app uses a UITTabBarController-based user interface (UI)
    design pattern. This pattern is quite standard and powerful for an e-commerce
    app; other apps such as Target and EAT24 also use this UI pattern. The good thing
    about the tab bar interface is that each view controller’s state of each tab is
    automatically persistent. It means that whenever we leave a screen from one tab
    and play around with other tabs, when we return back to the tab it will always
    show the content we just left.


    This chapter is largely about planning. I won’t be giving instructions and showing
    you figures about how you can drag and drop a UIViewController or a UI Control
    to UIStoryboard, but in some instances, I will reveal the tricks I have used.


    This chapter covers the following:


    *   User interface and experience

    *   The proximate total amount of view controllers

    *   The view controller’s type, UITableViewController, or UIViewController

    *   Custom views

    *   The appearance of the app


    ## Designing the User Experience


    The goal for the sample app that accompanies this book is to present users/customers
    with an experience that is similar to what they get from the Apple Store iPhone
    app. The Apple Store app is based on a tabbed design, so you want to use a tapped
    application template in Xcode. To get started, launch Xcode, and follow these
    steps:


    Create a new project based on the Tabbed Application template, and name it, for
    example, “[Chapter 2](#A978-1-4842-1317-9_2_Chapter.html).” In general, the Tabbed
    Application template is a good fit for an e-commerce mobile app.


    ![A978-1-4842-1317-9_2_Fig1_HTML.jpg](A978-1-4842-1317-9_2_Fig1_HTML.jpg)


    Figure 2-1.


    Create a Tabbed Application with Xcode   Next, open the Main.storyboard file.
    The default nib file is freestyle size. Let’s change to iPhone 4-inch on Simulated
    Metrics, shown in Figure [2-2](#A978-1-4842-1317-9_2_Chapter.html#Fig2).


    ![A978-1-4842-1317-9_2_Fig2_HTML.jpg](A978-1-4842-1317-9_2_Fig2_HTML.jpg)


    Figure 2-2.


    Change Simulated Metrics to iPhone 4-inch   Add three navigation controllers.
      Holding “control” key, drag the root TabController to the three navigation controllers.
    A UITabBar shows up on each UINavigationController, as shown in Figure [2-3](#A978-1-4842-1317-9_2_Chapter.html#Fig3).


    ![A978-1-4842-1317-9_2_Fig3_HTML.gif](A978-1-4842-1317-9_2_Fig3_HTML.gif)


    Figure 2-3.


    Connect the three UINavigationControllers to the TabController   Change the title
    of the three UITabBars to “Shop,” “My Account,” and “Bag,” respectively (see Figure
    [2-3](#A978-1-4842-1317-9_2_Chapter.html#Fig3)).


    ![A978-1-4842-1317-9_2_Fig4_HTML.jpg](A978-1-4842-1317-9_2_Fig4_HTML.jpg)


    Figure 2-4.


    Change the name of the Tab bar item'
  trans: "\n### 必备功能列表\n\n通过对 Apple Store 应用的快速概览，我们可以清晰地了解到一款电商应用所应具备的核心功能。它应具备：\n\
    \n- 按类别列出产品\n- 为每个类别展示产品列表\n- 展示产品详情\n- 具备搜索功能\n- 拥有购物车\n- 展示用户的收藏（心愿单）商品\n- 展示用户的订单历史\n\
    - 展示公司信息，如关于我们、联系我们、隐私政策和版权信息\n\n一款优秀的电商应用还应允许用户：\n\n- 评论产品\n- 将产品标记为收藏（或加入心愿单）\n\
    - 将产品加入购物车\n- 创建用户账户\n- 登录和登出\n- 添加和编辑收货地址\n- 添加和编辑支付方式\n- 使用第三方凭证（如 Facebook\
    \ 或 Twitter）登录\n- 请求重置密码（以防忘记）\n\n要运营业务，你还需要一些开展营销活动的方法：\n\n- 向客户发送新产品或促销活动的推送通知\n\
    - 邀请用户在 App Store 上为你的应用撰写好评\n\n为了做出明智的商业决策并改进应用，你还需要：\n\n- 追踪用户如何使用我们的应用\n- 追踪应用崩溃情况\n\
    \n## 预备知识\n\n要在 App Store 上开发并发布 iOS 应用，你需要注册 iOS 开发者计划，并在你的电脑上搭建 Mac OS 开发环境。\n\
    \n### iOS 开发者计划\n\n默认情况下，App Store 会为该账户下发布的每个应用显示注册 iOS 开发者计划的开发者名称。然而，为了赢得用户的信任，建议改为显示商业实体的名称，如图\
    \ 1-12 所示。要以商业实体的名称发布应用，你需要拥有 D-U-N-S™ 编号——这比注册 iOS 开发者计划更耗时一些。\n\n![A978-1-4842-1317-9_1_Fig12_HTML.jpg](img/A978-1-4842-1317-9_1_Fig12_HTML.jpg)\
    \  \n图 1-12. Apple 发布 Apple Store 应用\n\n获取 D-U-N-S™ 编号是免费的。但美国公司可能需要一个月才能获得该编号，非美国公司则可能需要更长时间。一旦你获得了编号，Apple\
    \ 需要最多两周时间来验证该编号。简而言之，尽早申请你的 D-U-N-S 编号，不要拖延。\n\n**注意**：要了解更多关于获取 D-U-N-S 编号的信息，请访问\
    \ [`https://developer.apple.com/support/ios/D-U-N-S.php`](https://developer.apple.com/support/ios/D-U-N-S.php)。\n\
    \n### 开发环境\n\n要构建 iOS 应用，你还需要一台运行最新 Mac OS 的 Mac 电脑。开发软件是 `Xcode`，它包含了 iOS SDK（见图\
    \ 1-13）。\n\n![A978-1-4842-1317-9_1_Fig13_HTML.jpg](img/A978-1-4842-1317-9_1_Fig13_HTML.jpg)\
    \  \n图 1-13. 从 Mac App Store 下载 `Xcode`\n\n尽管你可以在 iPhone 模拟器上运行示例项目，但为了确保你的应用在设备上正常运行，你确实应该拥有一台安装了最新\
    \ iOS 系统的 iOS 设备，例如 iPhone 或 iPod touch。\n\n本书中的示例项目均基于最新的 iOS 版本进行开发，并且在有新版本可用时，将始终更新至最新\
    \ iOS 版本。\n\n**注意**：Apple 会频繁更新 `Xcode` 和 iOS SDK。在撰写本文时，我使用的是 `Xcode` 6.3.1 版本和\
    \ iOS SDK 8.1。\n\n## 示例 iPhone 应用：Beauty & Me\n\n在本书中，你将学习构建一个用于销售美容和化妆品（如洗面奶、洁面乳及其他护肤产品）的\
    \ iOS 应用。\n\n与 Apple Store 应用一样，我将引导你了解 Apple Store 应用中引入的大部分功能。\n\n**注意**：要查看该应用的外观，你可以从\
    \ App Store 搜索“Beauty & Me”并下载。\n\n## 总结\n\n在本章中，我对 Apple Store iPhone 应用进行了概述，并总结了其功能，为你自己的电商应用应该包含哪些内容提供了一些指导。\n\
    \n# 2. 规划与构建原型\n\n电子补充材料 本章的在线版本（doi:[10.​1007/​978-1-4842-1317-9_​2](http://dx.doi.org/10.1007/978-1-4842-1317-9_2)）包含补充材料，供授权用户使用。\n\
    \n在你开始编写第一行代码之前，制作一个原型来了解应用的外观、用户体验如何、有哪些功能以及它们如何组织，这一点非常重要。在本章中，我将向你展示如何使用 `Xcode`\
    \ 为示例电商 iPhone 应用构建原型。\n\nApple Store iPhone 应用采用了基于 `UITTabBarController` 的用户界面（UI）设计模式。这种模式对于电商应用来说非常标准且强大；其他应用如\
    \ Target 和 EAT24 也使用了这种 UI 模式。标签栏界面的优点在于，每个标签页的视图控制器状态会自动保持。这意味着，当我们离开某个标签页的屏幕并与其他标签页交互后，再返回该标签页时，它总会显示我们刚刚离开时的内容。\n\
    \n本章主要是关于规划。我不会给出详细的指令并展示如何将 `UIViewController` 或 UI 控件拖放到 `UIStoryboard` 中的图示，但在某些情况下，我会揭示我使用过的一些技巧。\n\
    \n本章涵盖以下内容：\n\n- 用户界面与体验\n- 视图控制器的大致总数\n- 视图控制器的类型，`UITableViewController` 或 `UIViewController`\n\
    - 自定义视图\n- 应用的外观\n\n## 设计用户体验\n\n本书配套示例应用的目标是为用户/顾客提供与 Apple Store iPhone 应用相似的使用体验。Apple\
    \ Store 应用基于标签式设计，因此你希望在 `Xcode` 中使用标签式应用模板。开始前，启动 `Xcode`，并按照以下步骤操作：\n\n1. 基于“标签式应用”模板创建一个新项目，并将其命名为，例如，“第\
    \ 2 章”。通常来说，标签式应用模板非常适合电商移动应用。\n\n![A978-1-4842-1317-9_2_Fig1_HTML.jpg](img/A978-1-4842-1317-9_2_Fig1_HTML.jpg)\
    \  \n图 2-1. 使用 `Xcode` 创建一个标签式应用\n\n2. 接下来，打开 `Main.storyboard` 文件。默认的 nib 文件是自由尺寸。让我们在“模拟度量”中将其更改为\
    \ iPhone 4 英寸，如图 2-2 所示。\n\n![A978-1-4842-1317-9_2_Fig2_HTML.jpg](img/A978-1-4842-1317-9_2_Fig2_HTML.jpg)\
    \  \n图 2-2. 将模拟度量更改为 iPhone 4 英寸\n\n3. 添加三个导航控制器。\n\n4. 按住“Control”键，将根 TabController\
    \ 拖拽到这三个导航控制器上。一个 `UITabBar` 会出现在每个 `UINavigationController` 上，如图 2-3 所示。\n\n\
    ![A978-1-4842-1317-9_2_Fig3_HTML.gif](img/A978-1-4842-1317-9_2_Fig3_HTML.gif)\
    \  \n图 2-3. 将三个 `UINavigationControllers` 连接到 TabController\n\n5. 将三个 `UITabBar`\
    \ 的标题分别更改为“`商店`”、“`我的账户`”和“`购物袋`”（见图 2-3）。\n\n![A978-1-4842-1317-9_2_Fig4_HTML.jpg](img/A978-1-4842-1317-9_2_Fig4_HTML.jpg)\
    \  \n图 2-4. 更改标签栏项目的名称\n"
- fmt: "### Shop\n\nThe root view controller of the `Shop` `NavigationController`\
    \ is the `Shop` `TableViewController`. You will use this controller to display\
    \ the beauty products category.\n\nFor this example, set the cell numbers to three\
    \ (see Figure [2-5](#A978-1-4842-1317-9_2_Chapter.html#Fig5)). For each cell,\
    \ use the `Basic` `Style` of `UITableViewCell`. It means that each cell will only\
    \ have a title label. The text for these three labels is \"Bath & Body\", \"Makeup\"\
    , and \"Skincare\" respectively, as shown in Figure [2-6](#A978-1-4842-1317-9_2_Chapter.html#Fig6).\n\
    \n![A978-1-4842-1317-9_2_Fig6_HTML.jpg](A978-1-4842-1317-9_2_Fig6_HTML.jpg)  \n\
    *Figure 2-6. The partial user interface of Shop TableViewController*\n\n![A978-1-4842-1317-9_2_Fig5_HTML.jpg](A978-1-4842-1317-9_2_Fig5_HTML.jpg)\
    \  \n*Figure 2-5. Set three static rows for a UITableView*\n\nThe sample will\
    \ show a list of products under each product category, so you want to add another\
    \ `UITableViewController` to the `UIStoryboard`. Give it an identifier of `ProductsTableViewController`\
    \ and a title of `Products`, as shown in Figure [2-7](#A978-1-4842-1317-9_2_Chapter.html#Fig7).\n\
    \n![A978-1-4842-1317-9_2_Fig7_HTML.jpg](A978-1-4842-1317-9_2_Fig7_HTML.jpg)  \n\
    *Figure 2-7. Set Identifier for a UITableViewController*\n\nNext, you want to\
    \ connect the \"Bath & Body\" cell of the `ShopTableViewController` to the `ProductsTableViewController`.\
    \ Hold the `Control` key and drag-and-drop mouse cursor between the cell and the\
    \ target view controller to connect the two controllers.\n\nBuild and run the\
    \ project on an iPhone simulator. When you tap the \"Bath & Body\" cell in the\
    \ first screen of the app, you should see an empty `Products` table titled \"\
    Products\", as shown in Figure [2-8](#A978-1-4842-1317-9_2_Chapter.html#Fig8).\n\
    \n![A978-1-4842-1317-9_2_Fig8_HTML.jpg](A978-1-4842-1317-9_2_Fig8_HTML.jpg)  \n\
    *Figure 2-8. The user interface of Products UITableViewController*\n\nNext, you\
    \ will work on the `Products` `UITableViewController`. The view controller will\
    \ show information about the product, such as the product name and unit price.\
    \ You can also add search and filter features to it.\n\nFor each cell, use the\
    \ `Subtitle` style, as shown in Figure [2-9](#A978-1-4842-1317-9_2_Chapter.html#Fig9),\
    \ which means there will be a subtitle label under the main text label. Use \"\
    Skin So Soft Originals 5-piece Pampering Set\" as the main text label, and \"\
    $10.99\" as the content of the subtitle label.\n\n![A978-1-4842-1317-9_2_Fig9_HTML.jpg](A978-1-4842-1317-9_2_Fig9_HTML.jpg)\
    \  \n*Figure 2-9. Use \"Subtitle\" Style for UITableViewCell*\n\nDrag a `UISearchBar`\
    \ to the `ProductsTableViewController`, and set the placeholder text to \"Product\
    \ name.\" See Figure [2-10](#A978-1-4842-1317-9_2_Chapter.html#Fig10). This provides\
    \ a hint to users that search terms entered by them will only search for product\
    \ names.\n\n![A978-1-4842-1317-9_2_Fig10_HTML.jpg](A978-1-4842-1317-9_2_Fig10_HTML.jpg)\
    \  \n*Figure 2-10. Add a UISearchBar to UITableView*\n\nIn the \"Beauty & Me\"\
    \ sample app, the user can filter products based on the price range. Add a `UIBarButtonItem`\
    \ to the `Products` `TableViewController` and change its title to \"Filter.\"\
    \ Add a new `UIViewController`, set \"FilterViewController\" as its identifier,\
    \ and set \"Price Filter\" as the title. Connect the `Filter` `UIBarButtonItem`\
    \ with the new `FilterViewController`. Presenting the view controller modally\
    \ is a better user experience. You will also want to add a system `Cancel` `UIBarButtonItem`\
    \ to the left and a system `Done` `UIBarButtonItem` to the right of the view controller.\n\
    \nIn order to let the user quickly change the price range, use two `UISlider`\
    \ controls: one is for setting the minimum price; the other is for setting the\
    \ maximum price. You also need two `UILabel` controls to show the current minimum\
    \ `UISlider`'s value and the current maximum of the `UISlider`'s value. Add a\
    \ few other `UILabels` to tell users what ranges he can adjust, as shown in Figure\
    \ [2-11](#A978-1-4842-1317-9_2_Chapter.html#Fig11).\n\n![A978-1-4842-1317-9_2_Fig11_HTML.jpg](A978-1-4842-1317-9_2_Fig11_HTML.jpg)\
    \  \n*Figure 2-11. The user interface of FilterViewController*\n\nWhen a user\
    \ taps a product cell, the product's detail is displayed, as shown in Figure [2-12](#A978-1-4842-1317-9_2_Chapter.html#Fig12).\
    \ Add a new `UIViewController` with identifier of \"ProductDetailViewController\"\
    \ to the `UIStoryboard`, and connect any cell on the `ProductsTableViewController`\
    \ to the new view controller. The title of the `ProductDetailViewController` should\
    \ be the product name you selected, and it needs to be changed based on the user's\
    \ selection. Right now, let's just put \"Skin So Soft Original 5-piece Pampering\
    \ Set\" as its title.\n\n![A978-1-4842-1317-9_2_Fig12_HTML.jpg](A978-1-4842-1317-9_2_Fig12_HTML.jpg)\
    \  \n*Figure 2-12. The user interface of ProductDetailViewController*\n\nThe product\
    \ detail view controller will show a full-size image of the product, product name,\
    \ price, and description; you also need a button to let a user add the product\
    \ to her shopping bag. Finally, you want the user to be able to add the product\
    \ to the favorites list, so add another button with a title \"Favorite it.\"\n\
    \nBuild the project and run it on the simulator again. Even though you have not\
    \ added the real search, filter, add-to-bag, and favorite-it functionality, it\
    \ still gives you some idea what the app will look like. And most important, you\
    \ can do more about the user interface design.\n\nFigure [2-13](#A978-1-4842-1317-9_2_Chapter.html#Fig13)\
    \ shows the all `UIViewControllers` for the \"Shop\" feature.\n\n![A978-1-4842-1317-9_2_Fig13_HTML.gif](A978-1-4842-1317-9_2_Fig13_HTML.gif)\
    \  \n*Figure 2-13. The view controllers used in Shop*"
