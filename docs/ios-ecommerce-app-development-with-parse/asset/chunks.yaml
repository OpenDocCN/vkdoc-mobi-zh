    `cell.textLabel.text = item.product.name;`


    `cell.detailTextLabel.text = [NSString stringWithFormat:@"%@ x %lld",[item.product
    friendlyPrice], item.quantity];`


    `}`


    `return cell;`


    `}`


    `@end`


    ## Favorite Products


    This shows you how to display a user’s list of favorite products, and it allows
    a user to remove a product from the list. You also enable the user to tap an item
    on this list to see the product detail.


    ### Model


    Use the EMABFavoriteProduct model introduced in [Chapter 7](#A978-1-4842-1317-9_7_Chapter.html).


    ### View


    Reuse the EMABProductTableViewCell, introduced in [Chapter 6](#A978-1-4842-1317-9_6_Chapter.html).
    See Figure [15-5](#A978-1-4842-1317-9_15_Chapter.html#Fig5).


