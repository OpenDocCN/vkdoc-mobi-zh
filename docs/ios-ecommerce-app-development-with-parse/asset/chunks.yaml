    3](#A978-1-4842-1317-9_3_Chapter.html) introduced the PFQuery class. For this
    example, you will need to create a helper class method called `+(PFQuery *)basicQuery`
    in your EMABCategory subclass.


    Here is the complete EMABCategory header file:


    EMABCategory.h


    `#import <Parse/Parse.h>`


    `@interface EMABCategory : PFObject<PFSubclassing>`


    `@property (nonatomic, copy) NSString *title;`


    `@property (nonatomic, strong) PFFile *image;`


    `+(PFQuery *)basicQuery;`


    `@end`


    If PFObject is not recognized, verify that you have included `#import <Parse/Parse.h>`.


