    be used.


    The `+(PFQuery *)queryForCustomer:(EMABUser *)customer` method is implemented
    based on the `basicQuery` method; you only need to add the following statement:


    `[query whereKey:@"customer" equalTo:customer];`


    `+(PFQuery *)queryForCustomer:(EMABUser *)customer {`


    `PFQuery *query = [self basicQuery];`


    `[query whereKey:@"customer" equalTo:customer];`


    `return query;`


    `}`


    Likewise, `+(PFQuery *)queryForCustomer:(EMABUser *)customer orderStatus:(ORDER_STATUS)status`
    is based on `+(PFQuery *)queryForCustomer:(EMABUser *)customer`:


    `+(PFQuery *)queryForCustomer:(EMABUser *)customer orderStatus:(ORDER_STATUS)status{`


    `PFQuery  *query = [self queryForCustomer:customer];`


    `[query whereKey:@"orderStatus" equalTo:@(status)];`


    `return query;`


    `}`


    These are all you need for now. Any other methods you may need can be added to
    this model class later.'
  trans: "```objectivec\ndispatch_queue_t queue = dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_HIGH,\
    \ 0ul);\n\ndispatch_async(queue, ^{\n    NSData *imageData = [NSData dataWithContentsOfURL:[NSURL\
    \ URLWithString:[pictureURL absoluteString]]];\n    \n    dispatch_async(dispatch_get_main_queue(),\
    \ ^{\n        PFFile *iconFile = [PFFile fileWithName:@\"avatar.jpg\" data:imageData];\n\
    \        [iconFile saveInBackgroundWithBlock:^(BOOL succeeded, NSError *error)\
    \ {\n            if (!error) {\n                fbUser.photo = iconFile;\n   \
    \         }\n        }];\n    });\n});\n\n[fbUser saveInBackgroundWithBlock:^(BOOL\
    \ succeeded, NSError *error) {\n    if (!error) {\n        [self dismissViewControllerAnimated:YES\
    \ completion:nil];\n    }\n} else if ([[[[error userInfo] objectForKey:@\"error\"\
    ] objectForKey:@\"type\"]\n            isEqualToString: @\"OAuthException\"])\
    \ {\n    [self dismissViewControllerAnimated:YES completion:^{\n        [self\
    \ showError:@\"Facebook 会话已失效\"];\n    }];\n} else {\n    [self dismissViewControllerAnimated:YES\
    \ completion:^{\n        [self showError:[error localizedDescription]];\n    }];\n\
    }];\n\n-(IBAction)onCancel:(id)sender{\n    [self dismissViewControllerAnimated:YES\
    \ completion:nil];\n}\n\n@end\n```\n\n## 本章小结\n\n在本章中，我讲解了如何在提供直观友好的用户体验的同时，实现已注册用户的登录。我还介绍了如何使用\
    \ Apps 实现 Facebook 登录、获取用户的 Facebook 个人资料，然后通过集成 Parse `ParseFacebookUtilsV4`\
    \ SDK 将这些信息保存到 Parse 后端。\n\n# 10. 购物袋\n\n至此，如果您一路跟随操作，现在应该拥有一个已注册的用户，该用户已准备好将产品添加到购物袋中。在本章中，我将向您展示如何将产品添加到购物袋、更新产品数量、从购物袋中删除单个产品或全部产品，以及更新总金额。当客户再次查看购物袋时，应能清楚看到袋中的内容。\n\
    \n## 购物袋模型\n\n首先，创建表示购物袋中某个商品的模型：创建一个 `PFObject` 的子类，将其命名为 `EMABOrderItem`。然后，通过\
    \ `EMABConstant` 注册这个类名，并提供一个 `NSString` 键：`kOrderItem`。该子类拥有两个属性：一个是数量，另一个是 `EMABProduct`\
    \ 实例。同时创建一个实例方法 `-(double)subTotal` 用于计算该商品的总价。\n\n以下是头文件：\n\n`EMABOrderItem.h`\n\
    \n```objectivec\n#import <Parse/Parse.h>\n\n@class EMABProduct;\n\n@interface\
    \ EMABOrderItem : PFObject\n\n@property (nonatomic, assign) double quantity;\n\
    @property (nonatomic, strong) EMABProduct *product;\n\n-(double)subTotal;\n\n\
    @end\n```\n\n在实现文件中，`subTotal` 方法简单地返回数量与该产品单价的乘积。\n\n以下是实现代码：\n\n`EMABOrderItem.m`\n\
    \n```objectivec\n#import \"EMABOrderItem.h\"\n#import  <Parse/PFObject+Subclass.h>\n\
    #import \"EMABConstants.h\"\n#import \"EMABProduct.h\"\n\n@implementation EMABOrderItem\n\
    \n@dynamic quantity,product;\n\n+(NSString *)parseClassName\n{\n    return kOrderItem;\n\
    }\n\n-(double)subTotal {\n    return self.quantity *self.product.unitPrice;\n\
    }\n\n@end\n```\n\n您需要的第二个模型是 `EMABOrder` 模型；通过 `EMABConstants` 类注册一个 `NSString`\
    \ 键，名称为 `kOrder`。\n\n不要忘记，您还需要在 `AppDelegate` 中注册这两个 `PFObject` 子类。\n\n对于这个模型类，您需要以下几个属性：用户、所有订单项、订单编号（稍后分配）、订单日期以及订单状态。订单状态枚举类型用于区分订单是仍在购物袋中还是已经处理完成。为使代码可读性更强，该枚举类型在\
    \ `EMABConstants` 类中声明。\n\n```objectivec\ntypedef NS_OPTIONS(NSInteger, ORDER_STATUS){\n\
    \    ORDER_NOT_MADE = 0,\n    ORDER_MADE = 1\n};\n```\n\n您还需要一些辅助方法：一个用于显示购物袋中的总金额；一个显然是您的\
    \ `basicQuery` 方法；一个用于查询特定用户；以及一个用于根据订单状态查询用户。\n\n以下是头文件：\n\n`EMABOrder.h`\n\n\
    ```objectivec\n#import <Parse/Parse.h>\n#import \"EMABConstants.h\"\n\n@class\
    \ EMABOrderItem;\n@class EMABUser;\n\n@interface EMABOrder : PFObject<PFSubclassing>\n\
    \n@property (nonatomic, strong) EMABUser *customer;\n@property (nonatomic, assign)\
    \ int64_t orderNo;\n@property (nonatomic, assign) NSDate *orderDate;\n@property\
    \ (nonatomic, strong) NSArray *items;\n@property (nonatomic, assign) ORDER_STATUS\
    \ orderStatus;\n\n-(double)total;\n+(PFQuery *)basicQuery;\n+(PFQuery *)queryForCustomer:(EMABUser\
    \ *)customer;\n+(PFQuery *)queryForCustomer:(EMABUser *)customer orderStatus:(ORDER_STATUS)status;\n\
    \n@end\n```\n\n在实现中，计算总金额的方法很简单：遍历每个订单项，并累加您在 `OrderItem` 类中创建的小计金额。\n\n```objectivec\n\
    -(double)total\n{\n    double sum = 0.0;\n    if (self.items) {\n        for (EMABOrderItem\
    \ *item in self.items) {\n            sum += [item subTotal];\n        }\n   \
    \ }\n    return sum;\n}\n```\n\n在 `+(PFQuery *)basicQuery` 方法中，您需在每个 `OrderItem`\
    \ 中关联产品信息。Parse 已预见到这种使用场景，因此提供了点表示法来实现此目的。\n\n```objectivec\n+(PFQuery *)basicQuery{\n\
    \    PFQuery *query = [PFQuery queryWithClassName:[self parseClassName]];\n  \
    \  [query includeKey:@\"items.product\"];\n    [query orderByDescending:@\"createdAt\"\
    ];\n    return query;\n}\n```\n\n请务必保持名称一致。您有一个名为 \"items\" 的属性，它是 `EMABOrderItem`\
    \ 实例的数组。每个 `EMABOrderItem` 拥有 \"product\" 属性。为了确保点表示法正常工作，应使用 \"items\" 和 \"product\"\
    。\n\n`+(PFQuery *)queryForCustomer:(EMABUser *)customer` 方法基于 `basicQuery` 方法实现；您只需添加以下语句即可：\n\
    \n`[query whereKey:@\"customer\" equalTo:customer];`\n\n```objectivec\n+(PFQuery\
    \ *)queryForCustomer:(EMABUser *)customer {\n    PFQuery *query = [self basicQuery];\n\
    \    [query whereKey:@\"customer\" equalTo:customer];\n    return query;\n}\n\
    ```\n\n同样，`+(PFQuery *)queryForCustomer:(EMABUser *)customer orderStatus:(ORDER_STATUS)status`\
    \ 基于 `+(PFQuery *)queryForCustomer:(EMABUser *)customer` 实现：\n\n```objectivec\n\
    +(PFQuery *)queryForCustomer:(EMABUser *)customer orderStatus:(ORDER_STATUS)status{\n\
    \    PFQuery  *query = [self queryForCustomer:customer];\n    [query whereKey:@\"\
    orderStatus\" equalTo:@(status)];\n    return query;\n}\n```\n\n目前您需要的就这些。之后可能需要的其他方法可以稍后添加到此模型类中。"
- fmt: "# Shopping Bag View\n\nOne of the important views for this shopping bag is\
    \ the item `UITableViewCell`, shown in Figure [10-1](#A978-1-4842-1317-9_10_Chapter.html#Fig1).\n\
    \n![A978-1-4842-1317-9_10_Fig1_HTML.jpg](A978-1-4842-1317-9_10_Fig1_HTML.jpg)\n\
    \nFigure 10-1. An order item cell\n\nThe cell consists of a `UILabel` to show\
    \ the product name, a `UILabel` to show the unit price, a `UILabel` to show the\
    \ quantity, and a `UIStepper` to give users the opportunity to change the quantity\
    \ of the item they want to purchase.\n\nThe layout of these UI elements is simple\
    \ and straightforward. Create a `PFTableViewCell` subclass, and name it `EMABOrderItemTableViewCell`.\
    \ Here is the header file:\n\n`EMABOrderItemTableViewCell.h`\n\n```\n#import \"\
    PFTableViewCell.h\"\n\n@class EMABOrderItem;\n\n@interface EMABOrderItemTableViewCell\
    \ : PFTableViewCell\n\n-(void)configureItem:(EMABOrderItem *)item;\n\n@end\n```\n\
    \nThe instance method `-(void)configureItem` in this header file works as previously\
    \ described.\n\nBelow is the implementation file of this class:\n\n`EMABOrderItemTableViewCell.m`\n\
    \n```\n#import \"EMABOrderItemTableViewCell.h\"\n#import \"EMABOrderItem.h\"\n\
    #import \"EMABProduct.h\"\n\n@interface EMABOrderItemTableViewCell()\n\n@property\
    \ (nonatomic, weak) IBOutlet UILabel *nameLabel;\n@property (nonatomic, weak)\
    \ IBOutlet UILabel *unitPriceLabel;\n@property (nonatomic, weak) IBOutlet UILabel\
    \ *quantityLabel;\n@property (nonatomic, weak) IBOutlet UIStepper *quantityStepper;\n\
    \n@end\n\n@implementation EMABOrderItemTableViewCell\n\n-(void)configureItem:(EMABOrderItem\
    \ *)item {\n    self.nameLabel.text = item.product.name;\n    self.unitPriceLabel.text\
    \ = [item.product friendlyPrice];\n    self.quantityLabel.text = [item friendlyQuantity];\n\
    }\n\n@end\n```\n\nBasically, you rely on the xib file and use `IBOutlet` to instantiate\
    \ the UI elements. You use the `configureItem` method to display item information\
    \ such as product name, price, and quantity."
