    `}`


    `- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath
    *)indexPath {`


    `UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@"OrderItemCell"
    forIndexPath:indexPath];`


    `if (self.order) {`


