  trans: "\n### 控制器\n\n对于控制器，创建一个 `PFQueryTableViewController` 子类，并命名为 `EMABUserPaymentMethodTableViewController`。以下是上一章节中介绍的如何使用\
    \ `PFQueryTableViewController` 的方法：\n\n```\n- (void)awakeFromNib {\n    [super\
    \ awakeFromNib];\n    self.parseClassName = kPaymentMethod;\n    self.objectsPerPage\
    \ = 10;\n    self.paginationEnabled = YES;\n    self.pullToRefreshEnabled = YES;\n\
    }\n\n- (PFQuery *)queryForTable {\n    PFQuery *query = [EMABPaymentMethod queryForOwner:[EMABUser\
    \ currentUser]];\n    if ([self.objects count] == 0) {\n        query.cachePolicy\
    \ = kPFCachePolicyCacheThenNetwork;\n    }\n    return query;\n}\n```\n\n`EMABPaymentMethod`\
    \ 模型使用了一个辅助查询方法 `+(PFQuery *)queryForOwner:(EMABUser *)user;`：\n\n```\n#pragma\
    \ mark - UITableView 数据源\n\n- (UITableViewCell *)tableView:(UITableView *)tableView\
    \ cellForRowAtIndexPath:(NSIndexPath *)indexPath object:(EMABPaymentMethod *)object{\n\
    \    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@\"\
    PaymentMethodCell\" forIndexPath:indexPath];\n    if (indexPath.row == [[self\
    \ objects] count]) {\n        cell.textLabel.text = NSLocalizedString(@\"加载更多…\"\
    , @\"\");\n    } else {\n        cell.textLabel.text = [object friendlyCreditCardNumber];\n\
    \        cell.detailTextLabel.text = [object friendlyExpirationMonthYear];\n \
    \   }\n    return cell;\n}\n```\n\n对于每个单元格，使用 `EMABPaymentMethod` 辅助方法显示两条信息：格式化后的最后四位数字和有效期。\n\
    \n你希望用户可以通过滑动手势删除信用卡。为此，需要在 `-(void)viewDidLoad` 中进行声明：\n\n```\nUISwipeGestureRecognizer\
    \ *leftSwipe = [[UISwipeGestureRecognizer alloc] initWithTarget:self action:@selector(onLeftSwipe:)];\n\
    [leftSwipe setDirection:UISwipeGestureRecognizerDirectionRight];\nleftSwipe.delegate\
    \ = self;\n[self.tableView addGestureRecognizer:leftSwipe];\n```\n\n当用户执行左滑手势时，根据屏幕上的触点位置确定被滑动的单元格。然后调用\
    \ `PFObject` 异步删除方法，并再次调用查询方法以更新界面：\n\n```\n-(void)onLeftSwipe:(UIGestureRecognizer\
    \ *)gestureRecognizer\n{\n    CGPoint point = [gestureRecognizer locationInView:self.tableView];\n\
    \    NSIndexPath *indexPath = [self.tableView indexPathForRowAtPoint:point];\n\
    \    if (indexPath) {\n        EMABPaymentMethod *paymentMethod = (EMABPaymentMethod\
    \ *)[self objectAtIndexPath:indexPath];\n        __weak typeof(self) weakSelf\
    \ = self;\n        [paymentMethod deleteInBackgroundWithBlock:^(BOOL succeeded,\
    \ NSError *error) {\n            if (!error) {\n                [weakSelf loadObjects];\n\
    \            }\n        }];\n    }\n}\n```\n\n如图 15-3 所示，“+” 栏按钮项（参见第 2 章）用于让用户添加新的信用卡。你已经创建了\
    \ `EMABAddCreditCardViewController`，因此只需展示它即可；在此过程中会创建一个 `EMABPayment` 实例。\n\n\
    ![A978-1-4842-1317-9_15_Fig3_HTML.jpg](img/A978-1-4842-1317-9_15_Fig3_HTML.jpg)\n\
    \n**图 15-3.** `UINavigationBar` 上的 “+” 栏按钮项让用户可以添加另一种支付方式\n\n以下是代码：\n\n```\n#pragma\
    \ mark - IBAction\n\n-(IBAction)onAdd:(id)sender\n{\n    EMABAddCreditCardViewController\
    \ *viewController = (EMABAddCreditCardViewController *)[self.storyboard instantiateViewControllerWithIdentifier:@\"\
    EMABAddCreditCardViewController\"];\n    __weak typeof(self) weakSelf = self;\n\
    \    viewController.finishBlock = ^(NSString *customerId){\n        [weakSelf\
    \ loadObjects];\n    };\n    [self.navigationController pushViewController:viewController\
    \ animated:YES];\n}\n\n@end\n```\n\n在上述代码中，`-(void)loadObjects` 是 `PFQueryTableViewController`\
    \ 的一个方法。你使用它来发起 API 请求，加载新的信用卡信息，并将其显示在表格视图上。\n\n## 我的订单历史\n\n根据需求，用户应该能够浏览所有订单历史，并查看特定订单的详情。在本节中，我将介绍如何实现这一功能。\n\
    \n### 视图\n\n图 15-4 展示了如何使用 `UITableViewCell` 显示用户的订单历史。这相当简单。依次使用一个 `UILabel`\
    \ 显示订单日期、一个 `UILabel` 显示订单总金额，以及产品名称。一个订单中可能包含多个产品。由于没有空间在一个订单中显示所有产品，因此只显示第一个产品。\n\
    \n![A978-1-4842-1317-9_15_Fig4_HTML.jpg](img/A978-1-4842-1317-9_15_Fig4_HTML.jpg)\n\
    \n**图 15-4.** 一个基本的订单历史单元格\n\n你可以使用一个辅助方法将数据模型与这个视图连接起来：\n\n`-(void)configureItem:(EMABOrder\
    \ *)item;`\n\n```\n#import \"PFTableViewCell.h\"\n@class EMABOrder;\n\n@interface\
    \ EMABOrderHistoryTableViewCell : PFTableViewCell\n-(void)configureItem:(EMABOrder\
    \ *)item;\n@end\n```\n\n以下是实现文件：\n\n```\n#import \"EMABOrderHistoryTableViewCell.h\"\
    \n#import \"EMABOrder.h\"\n\n@interface EMABOrderHistoryTableViewCell()\n@property\
    \ (nonatomic, weak) IBOutlet UILabel *dateLabel;\n@property (nonatomic, weak)\
    \ IBOutlet UILabel *totalLabel;\n@property (nonatomic, weak) IBOutlet UILabel\
    \ *nameLabel;\n@end\n\n@implementation EMABOrderHistoryTableViewCell\n\n-(void)configureItem:(EMABOrder\
    \ *)item\n{\n    if (item) {\n        NSDateFormatter *dateFormatter = [[NSDateFormatter\
    \ alloc] init];\n        [dateFormatter setDateStyle:NSDateFormatterMediumStyle];\n\
    \        [dateFormatter setTimeStyle:NSDateFormatterMediumStyle];\n        self.dateLabel.text\
    \ = [dateFormatter stringFromDate:item.updatedAt];\n        self.totalLabel.text\
    \ = [item friendlyTotal];\n        self.nameLabel.text = [item.items[0] name];\n\
    \    }\n}\n\n@end\n```\n"
- fmt: "### Controller\n\n创建一个 `PFQueryTableViewController` 的子类，并将其命名为 `EMABUserOrderHistoryViewController`。对于这个视图控制器，整个实现非常直接。\n\
    \n```\n@implementation EMABUserOrderHistoryViewController\n\n- (void)awakeFromNib\
    \ {\n    [super awakeFromNib];\n    self.parseClassName = kOrder;\n    self.objectsPerPage\
    \ = 10;\n    self.paginationEnabled = YES;\n    self.pullToRefreshEnabled = YES;\n\
    }\n\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    // Do any additional\
    \ setup after loading the view.\n    self.title = NSLocalizedString(@\"Order History\"\
    , @\"Order History\");\n}\n\n- (void)didReceiveMemoryWarning {\n    [super didReceiveMemoryWarning];\n\
    \    // Dispose of any resources that can be recreated.\n}\n\n- (PFQuery *)queryForTable\
    \ {\n    PFQuery *query = [EMABOrder queryForCustomer:[EMABUser currentUser] orderStatus:ORDER_MADE];\n\
    \    if ([self.objects count] == 0) {\n        query.cachePolicy = kPFCachePolicyCacheThenNetwork;\n\
    \    }\n    return query;\n}\n\n-(CGFloat)tableView:(UITableView *)tableView heightForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath {\n    return 60.0;\n}\n\n- (EMABOrderHistoryTableViewCell *)tableView:(UITableView\
    \ *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath object:(EMABOrder\
    \ *)object {\n    EMABOrderHistoryTableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@\"\
    HistoryCell\" forIndexPath:indexPath];\n    [cell configureItem:object];\n   \
    \ return cell;\n}\n\n#pragma mark - Navigation\n\n// In a storyboard-based application,\
    \ you will often want to do a little preparation before navigation\n- (void)prepareForSegue:(UIStoryboardSegue\
    \ *)segue sender:(id)sender {\n    // Get the new view controller using [segue\
    \ destinationViewController].\n    // Pass the selected object to the new view\
    \ controller.\n    if ([segue.identifier isEqualToString:@\"ShowOrderDetail\"\
    ]) {\n        NSIndexPath *indexPath = [self.tableView indexPathForSelectedRow];\n\
    \        EMABOrder *order = self.objects[indexPath.row];\n        EMABOrderDetailTableViewController\
    \ *viewController = segue.destinationViewController;\n        [viewController\
    \ setOrder:order];\n    }\n}\n\n@end\n```\n\n当用户点击一个订单单元格时，会显示该订单的更多信息。这个订单详情界面可能与\
    \ `EMABBagTableViewController` 非常相似。然而，你不希望用户更改订单项，并且显然没有支付选项。这可以通过两种方式之一实现：你可以重用\
    \ `EMABBagTableViewController` 并隐藏不想显示的 UI 控件，或者创建另一个视图控制器。在本例中，使用第二种方法。原因之一是\
    \ `EMABBagTableViewController` 已经相当混乱。另一个原因是你可能以后想添加更多功能。当没有那么多代码需要处理时，添加功能会更容易。\n\
    \n首先创建一个新的 `UITableViewController`，并将其命名为 `EMABOrderDetailTableViewController`。你仍然希望显示订单编号、订单日期、完整描述和订单总金额。以同样的方式，使用\
    \ `UITableView` 的头部视图来显示订单编号和订单日期；使用 `UITableView` 的尾部视图来显示完整描述和总金额。\n\n对于每个 `UITableViewCell`，显示每个商品的名称、单价和数量。以下是实现代码：\n\
    \n```\n#import \"EMABOrderDetailTableViewController.h\"\n#import \"EMABOrder.h\"\
    \n#import \"EMABOrderItem.h\"\n#import \"EMABProduct.h\"\n\n@interface EMABOrderDetailTableViewController\
    \ ()\n@property (nonatomic, weak) IBOutlet UILabel *ordeNoLabel;\n@property (nonatomic,\
    \ weak) IBOutlet UILabel *ordeDateLabel;\n@property (nonatomic, weak) IBOutlet\
    \ UILabel *totalLabel;\n@property (nonatomic, weak) IBOutlet UILabel *totalTextLabel;\n\
    @end\n\n@implementation EMABOrderDetailTableViewController\n\n-(void)setOrder:(EMABOrder\
    \ *)order {\n    if (_order != order) {\n        _order = order;\n        [self\
    \ configureView];\n    }\n}\n\n-(void)configureView {\n    self.ordeNoLabel.text\
    \ = [self.order friendlyOrderNo];\n    NSDateFormatter *dateFormatter = [[NSDateFormatter\
    \ alloc] init];\n    [dateFormatter setDateStyle:NSDateFormatterMediumStyle];\n\
    \    [dateFormatter setTimeStyle:NSDateFormatterShortStyle];\n    self.ordeDateLabel.text\
    \ = [dateFormatter stringFromDate:[NSDate date]];\n    self.totalLabel.text =\
    \ [self.order friendlyTotal];\n    [self.tableView reloadData];\n}\n\n- (void)viewDidLoad\
    \ {\n    [super viewDidLoad];\n    self.title = NSLocalizedString(@\"Order Detail\"\
    , @\"Order Detail\");\n    [self configureView];\n}\n\n- (void)didReceiveMemoryWarning\
    \ {\n    [super didReceiveMemoryWarning];\n    // Dispose of any resources that\
    \ can be recreated.\n}\n\n#pragma mark - Table view data source\n\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
    \ *)tableView {\n    // Return the number of sections.\n    return 1;\n}\n\n-\
    \ (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\
    \ {\n    // Return the number of rows in the section.\n    return [self.order.items\
    \ count];\n}\n\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath {\n    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@\"\
    OrderItemCell\" forIndexPath:indexPath];\n    if (self.order) {\n        EMABOrderItem\
    \ *item = self.order.items[indexPath.row];\n        cell.textLabel.text = item.product.name;\n\
    \        cell.detailTextLabel.text = [NSString stringWithFormat:@\"%@ x %lld\"\
    , [item.product friendlyPrice], item.quantity];\n    }\n    return cell;\n}\n\n\
    @end\n```\n\n## 收藏的商品\n\n这部分展示了如何显示用户的收藏商品列表，并允许用户从列表中删除商品。你还可以让用户点击列表中的某个商品以查看商品详情。\n\
    \n### 模型\n\n使用第 [7] 章中介绍的 `EMABFavoriteProduct` 模型。\n\n### 视图\n\n重用第 [6] 章中介绍的\
    \ `EMABProductTableViewCell`。请参见图 [15-5]。\n\n![A978-1-4842-1317-9_15_Fig5_HTML.jpg](A978-1-4842-1317-9_15_Fig5_HTML.jpg)\n\
    \n图 15-5. 收藏商品的单元格"
