  trans: "\n# 介绍特殊解析对象：PFUser\n\n`PFUser` 类是持久化到 Parse 数据中的用户的本地表示形式。该类是 `PFObject`\
    \ 的子类，具有所有相同的功能，例如灵活的模式、自动持久化和键值接口。不同之处在于 `PFUser` 具有一些特定于用户账户的特殊附加功能，包括身份验证、注册和唯一性验证。\n\
    \n值得注意的是，`username` 和 `password` 是 `PFUser` 的两个必需属性。`PFUser` 的 `e-mail` 属性始终存在，即使您可能想要为其设置值。\n\
    \n要使用用户名和密码注册用户，首先创建一个 `PFUser` 实例：\n\n```\nPFUser *user = [PFUser user];\n```\n\
    \n接下来，从两个 `UITextField` 实例中获取 `username` 和 `password`：\n\n```\nuser.username =\
    \ usernameTextField.text;\nuser.password = passwordTextField.text;\n```\n\n然后调用\
    \ `-(BOOL)signUp` 方法，或异步调用 `signUp` 方法：\n\n```\n[user signUpInBackgroundWithBlock:^(BOOL\
    \ succeeded, NSError *error) {\n    if (!error) {\n    }\n}];\n```\n\n如今，要求用户将电子邮件地址作为用户名是很常见的。您可以使用\
    \ `UITextField` 来收集用户的电子邮件：\n\n```\nuser.username = emailTextField.text;\nuser.password\
    \ = passwordTextField.text;\nuser.email = emailTextField.text;\n```\n\n接下来，您需要验证\
    \ `emailTextField` 中的文本是否为有效的电子邮件地址。Parse 为 `PFUser` 提供了 `emailVerified` 属性。只有当此用户点击\
    \ Parse 发送的验证电子邮件中的链接时（此过程在第 19 章中讨论），`emailVerified` 的值才能被设置为 `true`。\n\n您可以使用\
    \ `PFUser` 的类方法 `logInWithUsernameInBackground:password` 登录用户：\n\n```\n[PFUser\
    \ logInWithUsernameInBackground:emailTextField.text\n                        \
    \    password:passwordTextField.text\n                               block:^(PFUser\
    \ *user, NSError *error) {\n    if (!error) {\n    }\n}];\n```\n\n一旦此用户登录，使用类方法\
    \ `[PFUser currentUser]` 获取当前用户的实例。该用户会持久化在客户端上。除非用户已注销，否则您可以始终使用此方法来获取当前用户。\n\
    \n要注销用户，只需调用此方法：\n\n```\n[PFUser logOut];\n```\n\nParse 还提供了匿名用户功能。可以在没有用户名和密码的情况下创建匿名用户，同时保留与其他任何\
    \ `PFUser` 相同的所有能力。注销后，匿名用户将被弃用，并且用户的数据将不再可访问。一个典型的用例是在您的应用首次启动时创建一个匿名用户；然后您让用户将产品添加到购物袋中，并跟踪用户喜欢的内容。您稍后才会要求用户使用电子邮件和密码注册，否则用户的数据将被丢弃。\n\
    \n要启用此功能，请在 `AppDelegate.m` 的 `application:didFinishLaunchingWithOptions:` 中调用它：\n\
    \n```\n[PFUser enableAutomaticUser];\n```\n\n一旦调用了此方法，当检查 `[PFUser currentUser]`\
    \ 时，它将不会返回 `nil`。\n\n要检查当前用户是否是匿名用户，请使用 `PFAnonymousUtils` 方法 `+ (BOOL)isLinkedWithUser:(nullable\
    \ PFUser *)user`：\n\n```\nif ([PFAnonymousUtils isLinkedWithUser:[PFUser currentUser]])\
    \ {\n    NSLog(@\"这是一个匿名用户。\");\n}\n```\n\n您可以像创建 `PFObject` 子类一样创建 `PFUser` 的子类。例如，如果您有一个\
    \ `Customer` 对象，`Customer.h` 文件将如下所示：\n\n```objective-c\n#import <Parse/Parse.h>\n\
    \n@interface Customer : PFUser<PFSubclassing>\n\n@property (nonatomic, copy) NSString\
    \ *firstName;\n@property (nonatomic, copy) NSString *lastName;\n@property (nonatomic,\
    \ copy) NSString *address1;\n@property (nonatomic, copy) NSString *city;\n@property\
    \ (nonatomic, copy) NSString *state;\n@property (nonatomic, copy) NSString *zipcode;\n\
    \n@end\n```\n\n`Customer.m` 将如下所示：\n\n```objective-c\n#import \"Customer.h\"\n\
    #import <Parse/PFObject+Subclass.h>\n\n@implementation Customer\n\n@dynamic firstName,\
    \ lastName, address1, city, state, zipcode;\n\n@end\n```\n\n对于 `PFUser` 的子类，不需要实现\
    \ `+(NSString *)parseClassName` 方法，因为 Parse 类名始终是 `\"_User\"`。\n\n> **注意：** 要了解更多关于\
    \ `PFUser` 的信息，请访问 [`https://parse.com/docs/osx/api/Classes/PFUser.html`](https://parse.com/docs/osx/api/Classes/PFUser.html)。\n\
    \n## 加载和显示图像：PFImageView\n\n`PFImageView` 是 `UIimageView` 的子类。它是一个辅助类，可以更轻松地从\
    \ Parse 服务器下载图像文件。使用方式与使用 `UIimageView` 相同。要显示图像，请编写以下代码：\n\n```objective-c\n\
    PFImageView *imageView = [[PFImageView alloc] initWithFrame:CGRectMake(0.0, 0.0,\
    \ 320.0, 180.0)];\nimageView.contentMode = UIViewContentModeScaleAspectFill;\n\
    imageView.file = product.image;\n[imageView loadInBackground];\n```\n\n`PFImageView`\
    \ 有一个 `file` 属性，它是 `PFFile` 的一个实例。您的 `Product` 实例有一个属性 `image`，它也是 `PFFile` 的一个实例。\n\
    \n> **注意：** 您可以在 [`https://parse.com/docs/osx/api/Classes/PFFile.html`](https://parse.com/docs/osx/api/Classes/PFFile.html)\
    \ 上了解更多关于 `PFFile` 的信息。\n\n## 在单元格中显示图像：PFTableViewCell\n\n`PFTableViewCell` 是\
    \ `UITableViewCell` 的子类。它是一个辅助类，可以更轻松地显示从 Parse 服务器下载的任何图像。\n\n```objective-c\n\
    - (PFTableViewCell *)tableView:(UITableView * __nonnull)tableView\n         cellForRowAtIndexPath:(NSIndexPath\
    \ * __nonnull)indexPath\n                        object:(nullable Product *)object\n\
    {\n    PFTableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@\"\
    ProductCell\"];\n    cell.imageView.file = object.image;\n    [cell.imageView\
    \ loadInBackground];\n    return cell;\n}\n```\n"
- fmt: "# Querying and Showing Data: `PFQueryTableViewController`\n\nWhen you develop\
    \ an iOS application, you commonly use `UITableViewController`. In a typical network-based\
    \ app, you use `UITableViewController` to display the content that is fetched\
    \ from a remote server. Often you also need to implement some features such as\
    \ a loading indicator, pull-to-refresh, pagination, tap a cell to load and show\
    \ next page, and load and show an image on each `UITableViewCell`. Parse creates\
    \ this `PFQueryTableViewController`, a subclass of `UITableViewController`, to\
    \ make a developer's life even easier.\n\nHere is an example of how you could\
    \ use `PFQueryTableViewController`; let's say you want to implement a feature\
    \ that shows all products and name it `ProductsTableViewController` class, as\
    \ shown in Figure [3-4](#A978-1-4842-1317-9_3_Chapter.html#Fig4).\n\n![A978-1-4842-1317-9_3_Fig4_HTML.jpg](A978-1-4842-1317-9_3_Fig4_HTML.jpg)\n\
    \nFigure 3-4. Create a `PFQueryTableViewController` subclass\n\nThis is what `ProductsTableViewController.h`\
    \ looks like:\n\n```\n#import \"PFQueryTableViewController.h\"\n\n@interface ProductsTableViewController\
    \ : PFQueryTableViewController\n\n@end\n```\n\nThis is what `ProductsTableViewController.m`\
    \ looks like:\n\n```\n#import \"ProductsTableViewController.h\"\n#import \"Product.h\"\
    \n#import <ParseUI/PFTableViewCell.h>\n#import <ParseUI/PFImageView.h>\n\n@implementation\
    \ ProductsTableViewController\n\n-(void)awakeFromNib\n{\n    [super awakeFromNib];\n\
    \    self.parseClassName = @\"Product\";\n    self.pullToRefreshEnabled = YES;\n\
    \    self.paginationEnabled = YES;\n    self.objectsPerPage = 10;\n}\n\n- (PFQuery\
    \ *)queryForTable {\n    PFQuery *query = [PFQuery queryWithClassName:self.parseClassName];\n\
    \    if ([self.objects count] == 0) {\n        query.cachePolicy = kPFCachePolicyCacheThenNetwork;\n\
    \    }\n    return query;\n}\n\n#pragma mark\n\n-(PFTableViewCell *)tableView:(UITableView\
    \ * __nonnull)tableView cellForRowAtIndexPath:(NSIndexPath * __nonnull)indexPath\
    \ object:(nullable Product *)object\n{\n    PFTableViewCell *cell = [tableView\
    \ dequeueReusableCellWithIdentifier:@\"ProductCell\"];\n    cell.textLabel.text\
    \ = object.title;\n        cell.imageView.file = object.image;\n    [cell.imageView\
    \ loadInBackground];\n    return cell;\n}\n\n@end\n```\n\nFirst, you implement\
    \ the `-(void)awakeFromNib` method if you are using the XIB file in a UIStoryboard\
    \ or a separate XIB file for the `ProductsTableViewController`. Specify the Parse\
    \ class name you will use for this controller: in this case, `Product` class.\
    \ If you want to use the pull-to-refresh or pagination features, set `self.pullToRefreshEnabled`\
    \ and `self.paginationEnabled` to `YES`. Also set 10 objects for each page. Depending\
    \ on the cell height, you can set your number to provide a better user experience.\n\
    \nThe second method you need to implement is `+(PFQuery *)queryForTable`. Specify\
    \ what Parse class you will query, and the cache policy. In this case, query the\
    \ `Product` Parse class and for your cache policy use `kPFCachePolicyCacheThenNetwork`.\n\
    \nThe third method is to display your objects on each `PFTableViewCell`. In this\
    \ example, set the product title to the cell's `textLabel` and the product image\
    \ to the cell's `imageView`.\n\n## Summary\n\nIn this chapter, I have gone over\
    \ the Parse fundamentals related to building an e-commerce iOS app. I started\
    \ with the `PFObject` class and its subclasses, and then introduced four types\
    \ of relationships in `PFObjects` and `PFUser`. I also covered three basic Parse\
    \ UIs, namely, `PFImageView`, `PFTableViewCell`, and `PFQueryTableViewController`.\n\
    \n# 4. Parse Project Setup\n\nElectronic supplementary material The online version\
    \ of this chapter (doi:[10.​1007/​978-1-4842-1317-9_​4](http://dx.doi.org/10.1007/978-1-4842-1317-9_4))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    This chapter covers how to set up a Parse project. You will need to write down\
    \ a few application keys and secrets. To make the process simple, start with a\
