    \ 408 像素——并作为产品图片的缩略图上传。其次，从相机应用拍摄的图片仍然过大，因此你需要将其缩放至更小尺寸，此处宽度为 1632 像素。选择 408\
    \ 和 1632 这两个尺寸，是基于上传至 Parse 服务器的速度与图片质量的合理分辨率之间的权衡。\n\n下一步是将 `UIImage` 转换为 `PFFile`。你可以使用\
