    ## My Order History


    Per requirements, users should be able to browse all of their order history and
    also view details for a particular order. In this section, I cover how to implement
    this feature.


    ### View


    Figure [15-4](#A978-1-4842-1317-9_15_Chapter.html#Fig4) shows how you want to
    display a user’s order history in a UITableViewCell. It’s pretty simple. Use,
    in this order, a UILabel to show the order date, a UILabel to show the total amount
    of the order, and the product’s name. You might have multiple products in one
    order. Since you don’t have the space for displaying all products in an order,
    only show the first one.


    ![A978-1-4842-1317-9_15_Fig4_HTML.jpg](A978-1-4842-1317-9_15_Fig4_HTML.jpg)


    Figure 15-4.


    A basic order history cell


    You can use a helper method to connect your data model with this view:


    `-(void)configureItem:(EMABOrder *)item;`


    `#import "PFTableViewCell.h"`


    `@class EMABOrder;`


    `@interface EMABOrderHistoryTableViewCell : PFTableViewCell`


    `-(void)configureItem:(EMABOrder *)item;`


    `@end`


    Here is the implementation file:


    `#import "EMABOrderHistoryTableViewCell.h"`


    `#import "EMABOrder.h"`


    `@interface EMABOrderHistoryTableViewCell()`


    `@property (nonatomic, weak) IBOutlet UILabel *dateLabel;`


    `@property (nonatomic, weak) IBOutlet UILabel *totalLabel;`


    `@property (nonatomic, weak) IBOutlet UILabel *nameLabel;`


    `@end`


