    \ for a user; and one to query for a user with an order status.\n\nHere is the\
    \ header file:\n\n`EMABOrder.h`\n\n```objectivec\n#import <Parse/Parse.h>\n#import\
    \ \"EMABConstants.h\"\n\n@class EMABOrderItem;\n@class EMABUser;\n\n@interface\
