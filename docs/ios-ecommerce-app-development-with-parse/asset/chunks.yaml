    It’s quite typical for an iOS e-commerce app to integrate Facebook Login for Apps.
    Although it can be challenging to manage two sets of users, the Facebook SDK can
    be used together with the Parse SDK, and is integrated with the PFUser class to
    make linking users to their Facebook identities easy.


    This feature requires the ParseFacebookUtilities SDK, so you need to modify your
    Podfile as follows:


    `pod ''ParseFacebookUtilsV4'',''1.7.1''`


    Note


    Facebook and Parse change their SDKs frequently. You may need to update the SDK
    version by the time you run this demo.


    In this section, you learn how to implement Facebook Login with Parse, as well
    as how to obtain the user’s Facebook profile so you can save it for your own records.


    Remember that you will need a Facebook Developer account for implementing this
    feature (see [Chapter 4](#A978-1-4842-1317-9_4_Chapter.html) for details).


    For the model, use EMABUser (the same model as in [Chapter 8](#A978-1-4842-1317-9_8_Chapter.html));
    for the view, use the “Log In with Facebook” button (see [Chapter 8](#A978-1-4842-1317-9_8_Chapter.html)).
    Since you need to talk to the Facebook API to authorize the user, you also need
    to obtain the user’s profile and save it to the Parse back end. I will introduce
    a UIActivityIndicator to indicate the ongoing process, and also disable some buttons
    in case users don’t want to wait until finished. The whole idea is to create a
    friendlier user experience.


    Here is the header declaration:


    `#import "EMABDispatchViewController.h"`


    `#import "EMABConstants.h"`


    `#import "EMABUser.h"`


    `#import <ParseFacebookUtils/PFFacebookUtils.h>`


    `@interface EMABDispatchViewController ()`


