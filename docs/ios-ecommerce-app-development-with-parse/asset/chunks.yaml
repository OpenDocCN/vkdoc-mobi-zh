  trans: "\n# 视图\n\n在`EMABUserAccountTableViewController`中新增一个分区，如第 15 章所述，该分区仅向管理员用户显示特定内容。\n\
    \n```\n-(NSInteger)numberOfSectionsInTableView:(UITableView *)tableView {\n  \
    \  // 返回分区数量\n    return (self.customer && self.customer.isAdmin)?2:1;\n}\n```\n\
    \n此分区只需一个单元格。该单元格的标题为\"添加产品\"。点击该单元格时，将呈现产品添加界面。图 16-1 展示了该界面的外观。该界面包含一个`PFImageView`用于显示产品缩略图。当管理员点击该图像视图时，系统会询问是否从手机相册上传图片或拍摄新照片。此外，还包含一个`UITextField`用于输入产品名称，以及一个`UITextField`用于输入产品单价和价格单位。另有一个`UITextField`用于输入产品品牌，最后还有一个`UITextView`用于输入产品描述。\n\
    \n![A978-1-4842-1317-9_16_Fig1_HTML.jpg](img/A978-1-4842-1317-9_16_Fig1_HTML.jpg)\n\
    \n图 16-1. 添加产品界面\n\n以下是表示所有 UI 控件的部分属性：\n\n```\n@property (nonatomic, weak) IBOutlet\
    \ PFImageView *productImageView;\n@property (nonatomic, weak) IBOutlet UITextField\
    \ *nameTextField;\n@property (nonatomic, weak) IBOutlet UITextField *priceTextField;\n\
    @property (nonatomic, weak) IBOutlet UITextField *unitTextField;\n@property (nonatomic,\
    \ weak) IBOutlet UITextField *brandTextField;\n@property (nonatomic, weak) IBOutlet\
    \ UITextView *desciptionTextView;\n```\n\n# 控制器\n\n创建一个新的`UIViewController`子类，并将其命名为\"\
    `EMABAddProductTableViewController`\"。在深入实现之前，先思考该视图控制器的功能。\n\n- 需要实现将产品图片上传到\
    \ Parse 的功能。\n- 允许管理员输入产品名称、价格、单价和产品摘要。\n- 允许管理员输入产品品牌。由于允许管理员从列表中选择品牌，这将提供更好的用户体验。\n\
    - 需要确保管理员在点击\"保存\"按钮前已输入所有信息。\n- 当管理员开始输入时，软件键盘会弹出并占据部分屏幕。需要处理这种情况，以便管理员始终能看到正在输入的内容。\n\
    \n我将逐一处理这五个任务。\n\n## 上传产品照片\n\n首先，在产品图像视图中添加一个点击手势，如下所示：\n\n```\n-(void)setupProductImageview\n\
    {\n    UITapGestureRecognizer *portraitTap = [[UITapGestureRecognizer alloc] initWithTarget:self\
    \ action:@selector(onThumbnail:)];\n    [self.productImageView addGestureRecognizer:portraitTap];\n\
    }\n```\n\n当管理员点击图像视图时，系统会询问是从相册上传图片还是拍摄新照片。这在`onThumbnail:`方法中实现：\n\n```\n-(void)onThumbnail:(UITapGestureRecognizer\
    \ *)recognizer{\n    //询问是否添加新收据\n    UIAlertController* alert = [UIAlertController\
    \ alertControllerWithTitle:NSLocalizedString(@\"图片来源\", @\"Photo Source\")\n \
    \                                                                  message:NSLocalizedString(@\"\
    请选择\", @\"Choose One\")\n                                                    \
    \        preferredStyle:UIAlertControllerStyleActionSheet];\n    UIAlertAction*\
    \ cancelAction = [UIAlertAction actionWithTitle:@\"取消\" style:UIAlertActionStyleCancel\n\
    \                                                         handler:^(UIAlertAction\
    \ * action) {\n                                                         }];\n\
    \    UIAlertAction* photoLibraryAction = [UIAlertAction actionWithTitle:@\"相册\"\
    \ style:UIAlertActionStyleDefault\n                                          \
    \                     handler:^(UIAlertAction * action) {\n                  \
    \                                                 [self showImagePickerForSourceType:UIImagePickerControllerSourceTypePhotoLibrary];\n\
    \                                                               }];\n    UIAlertAction*\
    \ cameraAction = [UIAlertAction actionWithTitle:@\"相机\" style:UIAlertActionStyleDefault\n\
    \                                                         handler:^(UIAlertAction\
    \ * action) {\n                                                             [self\
    \ showImagePickerForSourceType:UIImagePickerControllerSourceTypeCamera];\n   \
    \                                                      }];\n    [alert addAction:cancelAction];\n\
    \    [alert addAction:photoLibraryAction];\n    [alert addAction:cameraAction];\n\
    \    [self presentViewController:alert animated:YES completion:nil];\n}\n```\n\
    \n以下是基于来源类型的图片选择器实现。如果来源类型是`UIImagePickerControllerSourceTypePhotoLibrary`，则无需过多操作。`UIImagePickerController`的代理方法会自动返回选中的图片数据。如果来源类型是`UIImagePickerControllerSourceTypeCamera`，则稍微复杂一些。首先，需要添加两个工具栏按钮：一个用于\"\
    取消\"，另一个用于\"拍照\"。其次，需要在相机预览界面上提供一个覆盖层，以便管理员裁剪覆盖区域。\n\n以下是完整实现：\n\n```\n- (void)showImagePickerForSourceType:(UIImagePickerControllerSourceType)sourceType\n\
    {\n    imagePickerController = [[UIImagePickerController alloc] init];\n    imagePickerController.modalPresentationStyle\
    \ = UIModalPresentationCurrentContext;\n    imagePickerController.sourceType =\
    \ sourceType;\n    imagePickerController.delegate = self;\n    if (sourceType\
    \ == UIImagePickerControllerSourceTypeCamera)\n    {\n        CGRect frame = \
    \ [UIScreen mainScreen].applicationFrame;\n        UIToolbar *toolBar=[[UIToolbar\
    \ alloc] initWithFrame:CGRectMake(0, frame.size.height-44, self.view.frame.size.width,\
    \ 44)];\n        toolBar.barStyle =  UIBarStyleBlackOpaque;\n        NSArray *items=@[\n\
    \            [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemCancel\
    \  target:self action:@selector(cancelPicture:)],\n            [[UIBarButtonItem\
    \ alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemFlexibleSpace  target:nil\
    \ action:nil],\n            [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemCamera\
    \  target:self action:@selector(shootPicture:)]\n        ];\n        [toolBar\
    \ setItems:items];\n        // 创建覆盖视图\n        UIView *overlayView = [[UIView\
    \ alloc] initWithFrame:CGRectMake(0.0, 64.0, frame.size.width, frame.size.height-44.0)];\n\
    \        overlayView.opaque=NO;\n        overlayView.backgroundColor=[UIColor\
    \ clearColor];\n        // 覆盖层的父视图\n        UIView *cameraView=[[UIView alloc]\
    \ initWithFrame:frame];\n        [cameraView addSubview:overlayView];\n      \
    \  [cameraView addSubview:toolBar];\n        imagePickerController.showsCameraControls\
    \ = NO;\n        imagePickerController.extendedLayoutIncludesOpaqueBars = YES;\n\
    \        [imagePickerController setCameraOverlayView:cameraView];\n        EMABAppDelegate*\
    \ appDel = (EMABAppDelegate*)[[UIApplication sharedApplication] delegate];\n \
    \       [appDel.tabBarController presentViewController:imagePickerController animated:YES\
    \ completion:^{\n        }];\n    }\n}\n```\n"
- fmt: "`} else`\n\n`[self.parentViewController presentViewController:imagePickerController\
    \ animated:YES completion:nil];`\n\n`}`\n\nIt’s pretty simple to implement the\
    \ \"Cancel\" and \"Take Photo\" bar button item methods:\n\n`#pragma mark - ImagePickerController`\n\
    \n`-(IBAction)cancelPicture:(id)sender{`\n\n`[self dismissViewControllerAnimated:YES\
    \ completion:nil];`\n\n`}`\n\n`-(IBAction)shootPicture:(id)sender{ shootPicture`\n\
    \n`[imagePickerController takePicture];`\n\n`}`\n\nIn the end, you need to implement\
    \ the delegate method of `UIImagePickerController`: `-(void)imagePickerController:\
    \ DidFinishPickingMediaWithInfo`.\n\nIn this method, you will need to do two things.\
    \ First, you crop the image to a smaller size—in this case, 408 pixels in width—and\
    \ upload it as a thumbnail of the product image. Second, the image taken from\
    \ Camera App is still too big so you scale it a little bit smaller, in this case,\
    \ 1632 pixels in width. I chose 408 and 1632 based on the tradeoff between the\
    \ speed to upload to the Parse server and the reasonable resolution of an image’s\
    \ quality.\n\nThe next step is to convert `UIImage` to `PFFile`. You can use the\
    \ `PFFile` class method, `(PFFile *)fileWithName:(NSString *)filename data:(NSData\
    \ *)data`. Once you have `PFFile` instances for a full-size image and a thumbnail\
    \ image, you need to save the two `PFFile` to Parse. When the save action is completed\
    \ successfully, you need to assign the two `PFFile` to this product.\n\nHere is\
    \ the full implementation:\n\n```\n// This method is called when an image has\
    \ been chosen from the library or taken from the camera.\n- (void)imagePickerController:(UIImagePickerController\
    \ *)picker didFinishPickingMediaWithInfo:(NSDictionary *)info\n{\n  UIImage *image\
    \ = [info valueForKey:UIImagePickerControllerOriginalImage];\n  UIImage *fullsize\
    \ = [UIImage imageWithImage:image scaledToWidth:1632];\n  UIImage *thumbnail =\
    \ [UIImage imageWithImage:fullsize scaledToWidth:408];\n  self.productImageView.image\
    \ = image;\n  __weak typeof(self) weakSelf = self;\n\n  PFFile *fullsizeFile =\
    \ [PFFile fileWithName:@\"fullszie.jpg\" data:UIImageJPEGRepresentation(fullsize,\
    \ 0.75)];\n  [fullsizeFile saveInBackgroundWithBlock:^(BOOL success, NSError *error){\n\
    \    if (!error) {\n      weakSelf.product.fullsizeImage = fullsizeFile;\n   \
    \ } else {\n      NSLog(@\"error:%@\",[error localizedDescription]);\n    }\n\
    \  }];\n\n  PFFile *thumbnailFile = [PFFile fileWithName:@\"thumbnail.jpg\" data:UIImageJPEGRepresentation(thumbnail,\
    \ 0.75)];\n  [thumbnailFile saveInBackgroundWithBlock:^(BOOL success, NSError\
    \ *error){\n    if (!error) {\n      weakSelf.product.thumbnail = thumbnailFile;\n\
    \    } else {\n      NSLog(@\"error:%@\",[error localizedDescription]);\n    }\n\
    \  }];\n\n  [self.navigationController dismissViewControllerAnimated:YES completion:^{\n\
    \  }];\n}\n```\n\nIn the implementation, a `UIImage` category method `-(UIImage\
    \ *)imageWithImage: scaledToWidth` has been used.\n\n```\n+(UIImage*)imageWithImage:\
    \ (UIImage*) sourceImage scaledToWidth: (float) i_width\n{\n  float oldWidth =\
    \ sourceImage.size.width;\n  float scaleFactor = i_width / oldWidth;\n  float\
