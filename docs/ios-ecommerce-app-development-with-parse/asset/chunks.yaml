    update the total amount whenever the user taps any UIStepper:


    `-(IBAction)onStepper:(id)sender {`


        `UIStepper *stepper = (UIStepper *)sender;`


        `NSInteger index = stepper.tag - 100;`


        `NSMutableArray *orderItems = [NSMutableArray arrayWithArray:self.order.items];`


        `EMABOrderItem *orderItem = orderItems[index];`


        `orderItem.quantity = (int)stepper.value;`


        `if ((int)stepper.value == 0) {`


            `[orderItems removeObjectAtIndex:index];`


        `} else {`


            `[orderItems replaceObjectAtIndex:index withObject:orderItem];`


        `}`


        `if ([orderItems count] == 0) {`


            `[self showDeleteAlert];`


        `} else {`


            `self.order.items = [orderItems copy];`


            `[self.tableView reloadData];`


            `self.totalLabel.text = [self.order friendlyTotal];`


        `}`


    `}`


    What if the customer changed the quantity but doesn’t check out yet? It is common
    that the user just likes exploring by moving things around. A customer may change
    the quantity in the bag, then leave the Bag screen to explore other product pages.
    In that case, save the order whenever the bag screen is about to disappear:


    `-(void)viewWillDisappear:(BOOL)animated`


    `{`


        `if (self.order && self.order.isDirty) {`


            `[self.order saveInBackground];`


        `}`


    `}`


    Here `self.order.isDirty` means the order has been changed.'
  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n# 购物袋控制器\n\n\
    回想一下，在第 7 章中，我要求你为将商品添加到购物袋的程序添加一个待办注释：\n\n```\n-(IBAction)onBag:(id)sender\n\
    {\n    if ([PFAnonymousUtils isLinkedWithUser:[PFUser currentUser]]) {\n     \
    \   [self showWarning];\n    } else {\n        //todo:\n    }\n}\n```\n\n现在是时候完成这个功能了。\n\
    \n就我个人而言，我希望这个体验尽可能简单。如果点击“添加到购物袋”，商品将被静默添加到购物袋，并通知用户商品已添加。在此过程中，用户将无法指定数量；用户可以在结账前更改数量。你不希望在两个不同的地方实现相同的功能。\n\
    \n你需要处理两种不同的情况：\n\n-   购物袋是空的。在这种情况下，你将创建一个新的 `EMABOrderItem` 和 `EMABOrder` 实例。\n\
    -   购物袋不是空的。在这种情况下，你需要查询 Parse 后端。首先，查询后端以查看用户是否有未完成的订单。如果有，则创建一个本地的 `EMABOrder`\
    \ 实例来跟踪它。再仔细想想，用户点击“添加到购物袋”后会有两种情况：(1) 现有订单不包含此商品；(2) 用户购物袋中可能已有相同的商品，现在我们将其解释为用户希望再次添加相同的商品。\n\
    \n考虑到这一点，将以下属性添加到 `EMABProductDetailViewController` 类中：\n\n```\n@property(nonatomic,\
    \ strong) EMABOrder *order;\n```\n\n设置一个辅助方法 `-(void)queryForUnfinishedOrder`。\n\
    \n```\n-(void)queryForUnfinishedOrder{\n    PFQuery *orderQuery = [EMABOrder queryForCustomer:[EMABUser\
    \ currentUser] orderStatus:ORDER_NOT_MADE];\n    __weak typeof(self) weakSelf\
    \ = self;\n    [orderQuery getFirstObjectInBackgroundWithBlock:^(PFObject *order,\
    \ NSError *error){\n        if (!error) {\n            weakSelf.order = (EMABOrder\
    \ *)order;\n        }\n    }];\n}\n```\n\n同时创建一个辅助方法来检查订单商品数组是否包含某个商品。基本上，你需要遍历这个数组并检查这个商品的\
    \ `objectId` 属性。代码如下：\n\n```\n-(int)containsProduct:(NSArray *)items target:(EMABProduct\
    \ *)product {\n    int index = -1;\n    for (int i = 0; i<[items count]; i++){\n\
    \        EMABOrderItem *item = items[i];\n        if ([item.product.objectId isEqualToString:self.product.objectId])\
    \ {\n            index = i;\n            break;\n        }\n    }\n    return\
    \ index;\n}\n```\n\n`EMABOrder` 有一个 `items` 属性，它是一个 `EMABOrderItem` 实例的数组。当向此订单添加商品时，你需要考虑以下步骤：\n\
    \n创建一个 `EMABOrderItem` 实例。让商品成为当前查看的商品，并将数量设置为 1。从订单实例中获取 `items` 数组。如果它为 null，则使用步骤\
    \ 1 中的商品创建一个新的 `NSArray`。将此 `NSArray` 实例设为此订单的 `items`。如果不为 null，则创建 `items` 的可变副本，并添加来自步骤\
    \ 1 的新元素。然后将不可变副本作为 `items` 赋予此订单。\n\n在 `EMBAOrder` 类中创建一个辅助方法，并将其命名为 `-(void)addSingleProduct:(EMABProduct\
    \ *)product`。\n\n```\n-(void)addSingleProduct:(EMABProduct *)product{\n    EMABOrderItem\
    \ *item = [EMABOrderItem object];\n    [item setProduct:product];\n    [item setQuantity:1];\n\
    \    if (self.items) {\n        NSMutableArray *existedItems = [self.items mutableCopy];\n\
    \        [existedItems addObject:item];\n        [self setItems:[existedItems\
    \ copy]];\n    } else\n        [self setItems:@[item]];\n}\n```\n\n最后，是时候实现 `onBag:`\
    \ IBAction 方法了。请遵循以下逻辑顺序：\n\n是否有注册用户？如果没有，则显示警告以提示用户注册或登录。\n是否有未完成的订单？如果没有，则创建一个新的\
    \ `EMABOrder` 实例，设置诸如 `customer` 和 `orderStatus` 之类的属性，并调用 `-(void)addSingleProduct`\
    \ 方法。如果有，则检查此未完成订单是否包含你想要添加到购物袋的商品。如果没有，则调用 `-(void)addSingleProduct`，所有繁重的工作都将由此方法处理。如果包含，则需要找到哪个商品项拥有此商品，将该商品项的数量加\
    \ 1，然后用新的商品项替换原有项。最后，异步保存此订单实例，并在保存完成后通知用户。\n\n代码如下：\n\n```\n-(IBAction)onBag:(id)sender\n\
    {\n    if (![PFUser currentUser]) {\n        [self showWarning];\n    } else {\n\
    \        if (self.order) {\n            if ([self.order.items count] > 0) {\n\
    \                if ([self containsProduct:self.order.items target:self.product]\
    \ > -1) {\n                    int index = [self containsProduct:self.order.items\
    \ target:self.product];\n                    NSMutableArray *eItems = [NSMutableArray\
    \ arrayWithArray:self.order.items];\n                    EMABOrderItem *foundItem\
    \ = eItems[index];\n                    [foundItem setQuantity:foundItem.quantity+1];\n\
    \                    [eItems replaceObjectAtIndex:index withObject:foundItem];\n\
    \                    self.order.items = [eItems copy];\n                } else\
    \ {\n                    [self.order addSingleProduct:self.product];\n       \
    \         }\n            } else {\n                [self.order addSingleProduct:self.product];\n\
    \            }\n        } else {\n            self.order = [EMABOrder object];\n\
    \            [self.order setCustomer:[EMABUser currentUser]];\n            [self.order\
    \ setOrderStatus:ORDER_NOT_MADE];\n            [self.order addSingleProduct:self.product];\n\
    \        }\n    }\n    [self.order saveInBackgroundWithBlock:^(BOOL success, NSError\
    \ *error){\n        if (!error) {\n            [self showSuccess];\n        }\n\
    \    }];\n}\n```\n\n这可能是你在本书中迄今为止处理过的最复杂的逻辑。用户不会知道你的任何实现细节。用户看到的是，点击“添加到购物袋”按钮后，弹出一个提示框显示“添加成功”。\n\
    \n接下来是 `EMABBagTableViewController`，它是 `UITableViewController` 的子类。以下是头文件：\n\n\
    ```\n#import <UIKit/UIKit.h>\n\n@interface EMABBagTableViewController : UITableViewController\n\
    \n@end\n```\n\n图 10-2 展示了购物袋界面的外观。\n\n![A978-1-4842-1317-9_10_Fig2_HTML.jpg](img/A978-1-4842-1317-9_10_Fig2_HTML.jpg)\n\
    \n图 10-2. 购物袋界面\n\n你已经为 `UITableViewCell` 准备好了 `EMABOrderItemTableViewCell`；你还需要一些其他\
    \ UI 元素来显示信息，例如订单号、订单日期、总金额，以及“用信用卡购买”和“用 Apple Pay 购买”按钮。\n\n你将使用 `UITableView`\
    \ 的页眉和页脚视图作为容器视图。页眉视图将用于容纳两个 `UILabel`：一个 `UILabel` 显示订单号，另一个 `UILabel` 显示订单日期。\n\
    \n想一下订单号的问题。你知道订单号需要在 Parse 后端创建。只有订单成功下达后才能拥有订单号。换句话说，当用户仅将商品放入购物袋时，你不应该创建订单号。那么，为什么要为订单号创建一个\
    \ `UILabel` 呢？你可以从两个方面来看待它。一是像后面显示的那样，显示一条“您的购物袋是空的”消息。你也可以在用户完成结账流程并希望重新查看订单详情时，重用此界面来显示订单详情。（我将在第\
    \ 16 章也讨论这种情况。）\n\n这个 `UITableView` 的页脚视图包含两个 `UILabel`：一个用于显示“总计：”文本，另一个用于显示此购物袋中的总金额。你还需要两个\
    \ `UIButton`：一个用于通过信用卡结账，另一个用于通过 Apple Pay 结账。如你所见，UI 布局本身非常简单。\n\n以下是 `EMABBagTableViewController`\
    \ 的头部分类：\n\n```\n@interface EMABBagTableViewController(){\n}\n@property (nonatomic,\
    \ weak) IBOutlet UILabel *ordeNoLabel;\n@property (nonatomic, weak) IBOutlet UILabel\
    \ *ordeDateLabel;\n@property (nonatomic, weak) IBOutlet UILabel *totalLabel;\n\
    @property (nonatomic, weak) IBOutlet UILabel *totalTextLabel;\n@property (nonatomic,\
    \ weak) IBOutlet UIButton *payWithCCButton;\n@property (nonatomic, weak) IBOutlet\
    \ UIButton *payWithApplePayButton;\n@property (nonatomic, strong) EMABOrder *order;\n\
    @end\n```\n\n在实现中，从 `-(void)viewWillAppear` 开始。就像你在 `EMABProductDetailViewController`\
    \ 中所做的那样，为此用户查询未完成的订单。\n\n```\n-(void)viewWillAppear:(BOOL)animated\n{\n    [super\
    \ viewWillAppear:animated];\n    if ([EMABUser currentUser]) {\n        [self\
    \ queryForUnfinishedOrder];\n    }\n}\n```\n\n在 `EMABOrder` 类中，你已经创建了辅助方法 `queryForCustomer:\
    \ orderStatus:`。客户将是当前的 `EMABUser` 实例；订单状态将是 `ORDER_NOT_MADE`。为了让 UI 更友好一些，你可以利用\
    \ `UIRefreshControl`，你可以通过 nib 文件来指定它。\n\n在进行此查询时，我们可能会找到某些内容，也可能找不到。如果没有找到任何内容，你可以假设此用户没有待处理的订单，因此向用户显示一条消息，同时隐藏所有其他\
    \ UI。根据是否有待处理的订单，或者用户是否从购物袋中删除了所有商品，你可能需要持续进行这种隐藏和显示操作。为此，创建一个辅助方法 `-(void)updateUI`。\n\
    \n如果没有 `EMABorder` 实例或其值为 `nil`，则隐藏除 `orderNo` `UILabel` 之外的所有内容，并让此 `UILabel`\
    \ 的文本显示“您的购物袋是空的。”如果存在 `EMABOrder` 实例且其值不为 `nil`，则恢复所有内容的显示。代码如下：\n\n```\n-(void)updateUI\
    \ {\n    BOOL shouldClear = self.order == nil;\n    if (shouldClear) {\n     \
    \   self.ordeNoLabel.text = NSLocalizedString(@\"您的购物袋是空的。\", @\"\");\n      \
    \  self.ordeDateLabel.text = @\"\";\n        self.totalLabel.text = @\"\";\n \
    \       self.totalTextLabel.text = @\"\";\n        self.payWithApplePayButton.hidden\
    \ = YES;\n        self.payWithCCButton.hidden = YES;\n        self.payWithApplePayButton.enabled\
    \ = NO;\n        self.payWithCCButton.enabled = NO;\n    } else {\n        self.totalTextLabel.text\
    \ = NSLocalizedString(@\"总计: \", @\"\");\n        self.payWithApplePayButton.hidden\
    \ = NO;\n        self.payWithCCButton.hidden = NO;\n        self.payWithApplePayButton.enabled\
    \ = YES;\n        self.payWithCCButton.enabled = YES;\n    }\n    [self.tableView\
    \ reloadData];\n}\n```\n\n一旦此查询返回有效的 `EMABOrder` 结果，你就需要显示每条信息，例如订单创建日期和总金额。以下是此查询的完整代码：\n\
    \n```\n-(IBAction)queryForUnfinishedOrder {\n    self.order = nil; //清除缓存\n  \
    \  PFQuery *orderQuery = [EMABOrder queryForCustomer:[EMABUser currentUser] orderStatus:ORDER_NOT_MADE];\n\
    \    __weak typeof(self) weakSelf = self;\n    [orderQuery getFirstObjectInBackgroundWithBlock:^(PFObject\
    \ *order, NSError *error){\n        if ([weakSelf.refreshControl isRefreshing])\
    \ {\n            [weakSelf.refreshControl endRefreshing];\n        }\n       \
    \ if (!error) {\n            if (order) {\n                weakSelf.order = (EMABOrder\
    \ *)order;\n                weakSelf.ordeNoLabel.text = @\"\";\n             \
    \   NSDateFormatter *dateFormatter = [[NSDateFormatter alloc] init];\n       \
    \         [dateFormatter setDateStyle:NSDateFormatterMediumStyle];\n         \
    \       [dateFormatter setTimeStyle:NSDateFormatterShortStyle];\n            \
    \    weakSelf.ordeDateLabel.text = [dateFormatter stringFromDate:[NSDate date]];\n\
    \                weakSelf.totalLabel.text = [self.order friendlyTotal];\n    \
    \            [weakSelf updateUI];\n            } else {\n                [weakSelf\
    \ updateUI];\n            }\n        } else {\n            [weakSelf updateUI];\n\
    \        }\n    }];\n}\n```\n\n你有一个 `UITableView`，`UITableView` 上的商品将是订单商品。首先，将单元格高度设置得比默认值稍高一些：\n\
    \n```\n#pragma mark - UITableView 数据源\n\n-(CGFloat)tableView:(UITableView *)tableView\
    \ heightForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    return 60.0;\n}\n```\n\
    \n只会有一个分区：\n\n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\
    \ {\n    return 1;\n}\n```\n\n总的单元格数量是该订单实例中商品项的数量。\n\n```\n- (NSInteger)tableView:(UITableView\
    \ *)tableView numberOfRowsInSection:(NSInteger)section {\n    return [self.order.items\
    \ count];\n}\n```\n\n单元格本身将是 `EMABOrderItemTableViewCell` 的一个实例。你可能注意到我为这个 `configureItem:(EMABOrderItem)item`\
    \ 方法添加了一个新参数 tag。原因是你需要监听哪个 `UIStepper` 被点击。提供一个 tag 来跟踪它。tag 编号就是行号。\n\n```\n\
    - (EMABOrderItemTableViewCell*)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath {\n    EMABOrderItemTableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@\"\
    BagItemCell\" forIndexPath:indexPath];\n    if (self.order) [cell configureItem:self.order.items[indexPath.row]\
    \ tag:indexPath.row];\n    else [cell configureItem:nil tag:100+indexPath.row];\n\
    \    return cell;\n}\n```\n\n接下来，处理用户点击任何单元格上的 `UIStepper` 的情况。当用户点击 `UIStepper`\
    \ 时，意味着需要更改此商品项的数量。“+”表示增加 1，“-”表示减去 1。如果数量为 0，则从订单中移除该商品项。如果所有商品项的数量都为 0，则意味着需要移除所有商品项。\n\
    \n根据这个逻辑，创建此订单商品项的可变副本，然后找到你需要修改的商品项。可以通过用户点击的 `UIStepper` 的 tag 索引来找到它。\n\n然而，当用户试图将最后一件或唯一一件商品的数量减少到\
    \ 0 时，你确实想提醒用户。因此，你创建一个名为 `-(void)showDeleteAlert` 的 `UIAlertController` 辅助方法，让用户确认。如果用户确认这样做，则不仅在本地删除订单，还要在远程服务器上删除。一旦订单被移除，执行另一个查询\
    \ `-(void)queryForUnfinishedOrder` 来验证删除并更新 UI。\n\n以下是实现代码：\n\n```\n-(void)showDeleteAlert\
    \ {\n    UIAlertController* alert = [UIAlertController alertControllerWithTitle:NSLocalizedString(@\"\
    清空购物袋\",@\"\")\n        message:NSLocalizedString(@\"您确定要清空您的购物袋吗？\",@\"\")\n\
    \        preferredStyle:UIAlertControllerStyleAlert];\n    __weak typeof(self)\
    \ weakSelf = self;\n    UIAlertAction* defaultAction = [UIAlertAction actionWithTitle:NSLocalizedString(@\"\
    是\",@\"\") style:UIAlertActionStyleDefault\n        handler:^(UIAlertAction *\
    \ action) {\n            [weakSelf.order deleteInBackgroundWithBlock:^(BOOL success,\
    \ NSError *error){\n                if (!error) {\n                    [weakSelf\
    \ queryForUnfinishedOrder];\n                }\n            }];\n        }];\n\
    \    UIAlertAction* cancelAction = [UIAlertAction actionWithTitle:NSLocalizedString(@\"\
    取消\",@\"\") style:UIAlertActionStyleCancel\n        handler:^(UIAlertAction *\
    \ action) {}];\n    [alert addAction:defaultAction];\n    [alert addAction:cancelAction];\n\
    \    [self presentViewController:alert animated:YES completion:nil];\n}\n```\n\
    \n以下是 `-(IBAction)onStepper` 方法——请记住，每当用户点击任何 `UIStepper` 时，你都需要更新总金额：\n\n```\n\
    -(IBAction)onStepper:(id)sender {\n    UIStepper *stepper = (UIStepper *)sender;\n\
    \    NSInteger index = stepper.tag - 100;\n    NSMutableArray *orderItems = [NSMutableArray\
    \ arrayWithArray:self.order.items];\n    EMABOrderItem *orderItem = orderItems[index];\n\
    \    orderItem.quantity = (int)stepper.value;\n    if ((int)stepper.value == 0)\
    \ {\n        [orderItems removeObjectAtIndex:index];\n    } else {\n        [orderItems\
    \ replaceObjectAtIndex:index withObject:orderItem];\n    }\n    if ([orderItems\
    \ count] == 0) {\n        [self showDeleteAlert];\n    } else {\n        self.order.items\
    \ = [orderItems copy];\n        [self.tableView reloadData];\n        self.totalLabel.text\
    \ = [self.order friendlyTotal];\n    }\n}\n```\n\n如果客户更改了数量但尚未结账怎么办？用户只是喜欢通过调整来探索，这很常见。客户可能会更改购物袋中的数量，然后离开购物袋界面去浏览其他商品页面。在这种情况下，请在购物袋界面即将消失时保存订单：\n\
    \n```\n-(void)viewWillDisappear:(BOOL)animated\n{\n    if (self.order && self.order.isDirty)\
    \ {\n        [self.order saveInBackground];\n    }\n}\n```\n\n这里的 `self.order.isDirty`\
    \ 表示订单已被更改。\n"
- fmt: "# Summary\n\nThis chapter covers the topic of how to implement a shopping\
    \ bag and how to get it right for all kinds of use cases when dealing with customers\
    \ and their shopping habits.\n\n# 11. Shipping Address\n\nElectronic supplementary\
    \ material The online version of this chapter (doi:[10.​1007/​978-1-4842-1317-9_​11](http://dx.doi.org/10.1007/978-1-4842-1317-9_11))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    In [Chapter 10](#A978-1-4842-1317-9_10_Chapter.html), you learned how to implement\
    \ features such adding a product to the shopping bag, updating the product’s quantity,\
    \ deleting a product from the bag, and updating the total amount. In order for\
    \ customers to complete the checkout process, however, you also need to collect\
    \ additional information that you don’t have yet: namely, the customer’s shipping\
    \ and billing addresses.\n\nThis chapter covers how to create a `UITableView`-based\
    \ form to collect a US shipping address. The user interface itself might look\
    \ pretty simple, but there are some tricks I need to cover.\n\nFigure [11-1](#A978-1-4842-1317-9_11_Chapter.html#Fig1)\
    \ shows what a shipping address form looks like.\n\n![A978-1-4842-1317-9_11_Fig1_HTML.jpg](A978-1-4842-1317-9_11_Fig1_HTML.jpg)\n\
    \n**Figure 11-1.** The Shipping address form\n\n## Shipping Address Model\n\n\
    The model used in this chapter still is the `EMABUser` model, but you will need\
    \ additional properties: `address1`, `address2`, `city`, `state`, and `zipcode`.\
    \ Here is the header file:\n\n**EMABUser.h**\n\n```\n@interface EMABUser : PFUser<PFSubclassing>\n\
    \n@property (nonatomic, copy) NSString *firstName;\n@property (nonatomic, copy)\
    \ NSString *lastName;\n@property (nonatomic, copy) NSString *name;\n@property\
    \ (nonatomic, copy) NSString *gender;\n@property (nonatomic, copy) NSString *phone;\n\
    @property (nonatomic, copy) NSString *address1;\n@property (nonatomic, copy) NSString\
    \ *address2;\n@property (nonatomic, copy) NSString *city;\n@property (nonatomic,\
    \ copy) NSString *state;\n@property (nonatomic, copy) NSString *zipcode;\n@property\
    \ (nonatomic, copy) PFFile *photo;\n\n@end\n```\n\n## Shipping Address View\n\n\
    Start by creating a `UITableViewCell` subclass, and name it `EMABUserProfileTableViewCell`.\
    \ As you can see, a `UITextField` has been used on this cell. You also need a\
    \ helper method to customize the cell’s title, the `UITextField`’s placeholder,\
    \ and the keyboard type.\n\n**EMABUserProfileTableViewCell.h**\n\n```\n@interface\
    \ EMABUserProfileTableViewCell : UITableViewCell\n\n@property (nonatomic, strong)\
    \ UITextField *textField;\n\n- (void)setContentForTableCellLabel:(NSString*)title\
    \ placeHolder:(NSString *)placeHolder text:(NSString *)text keyBoardType:(NSNumber\
    \ *)type enabled:(BOOL)enabled;\n\n@end\n```\n\nThis time, you want to programmatically\
    \ add this `UITextField` to this `UITableViewCell` as this cell’s accessory view.\
    \ You still have this cell set up on the xib file. So you need to call a different\
