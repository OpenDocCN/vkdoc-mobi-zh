- fmt: "# View\n\nAdd a new section in `EMABUserAccountTableViewController`, as discussed\
    \ in [Chapter 15](#A978-1-4842-1317-9_15_Chapter.html), to display some content\
    \ only for an admin user.\n\n```\n-(NSInteger)numberOfSectionsInTableView:(UITableView\
    \ *)tableView {\n    // Return the number of sections.\n    return (self.customer\
    \ && self.customer.isAdmin)?2:1;\n}\n```\n\nYou only need one cell for this section.\
    \ This cell will have a title “Add product.” When the cell is tapped, you will\
    \ present a product add screen. Figure [16-1](#A978-1-4842-1317-9_16_Chapter.html#Fig1)\
    \ shows what the screen looks like. This screen has a `PFImageView` to show the\
    \ thumbnail of this product. When an admin taps the image view, you will ask whether\
    \ he or she wants to upload an image from the phone’s camera roll or take a new\
    \ photo. You also have a `UITextField` to let the admin write the product name\
    \ and a `UITextField` to write the product’s unit price and price unit. You have\
    \ another `UITextField` for the product brand and, in the end, a `UITextView`\
    \ for the product description.\n\n![A978-1-4842-1317-9_16_Fig1_HTML.jpg](A978-1-4842-1317-9_16_Fig1_HTML.jpg)\n\
    \nFigure 16-1. Add a product screen\n\nHere are some of the properties to represent\
    \ all UI controls:\n\n```\n@property (nonatomic, weak) IBOutlet PFImageView *productImageView;\n\
    @property (nonatomic, weak) IBOutlet UITextField *nameTextField;\n@property (nonatomic,\
    \ weak) IBOutlet UITextField *priceTextField;\n@property (nonatomic, weak) IBOutlet\
    \ UITextField *unitTextField;\n@property (nonatomic, weak) IBOutlet UITextField\
    \ *brandTextField;\n@property (nonatomic, weak) IBOutlet UITextView *desciptionTextView;\n\
    ```\n\n# Controller\n\nCreate a new `UIViewController` subclass, and name it “`EMABAddProductTableViewController`.”\
    \ Before you dive into the implementation, think about what the view controller\
    \ is supposed to do.\n\n- You will need to implement a feature to upload a product\
    \ image to Parse.\n- You will let an admin enter a product’s name, price, unit\
    \ price, and product summary.\n- You will let an admin enter this product’s brand.\
    \ This will be a better user experience because you let this admin choose a brand\
    \ from a list.\n- You need to make sure that all information is entered by this\
    \ admin before one taps “Save.”\n- When an admin starts to type something, a software\
    \ keyboard will show up and occupy part of the screen. You need to handle this\
    \ case so your admin can always see everything he or she is typing.\n\nI will\
    \ address these five tasks one by one.\n\n## Upload a Product Photo\n\nFirst,\
    \ you can add a tap gesture on the product image view, as shown in the following\
    \ snippet:\n\n```\n-(void)setupProductImageview\n{\n    UITapGestureRecognizer\
    \ *portraitTap = [[UITapGestureRecognizer alloc] initWithTarget:self action:@selector(onThumbnail:)];\n\
    \    [self.productImageView addGestureRecognizer:portraitTap];\n}\n```\n\nOnce\
    \ an admin taps the image view, you ask whether to upload a photo from the Camera\
    \ Roll or take a new photo. This is implemented in the `onThumbnail:` method:\n\
    \n```\n-(void)onThumbnail:(UITapGestureRecognizer *)recognizer{\n    //ask to\
    \ add new receipt\n    UIAlertController* alert = [UIAlertController alertControllerWithTitle:NSLocalizedString(@\"\
    Photo Source\", @\"Photo Source\")\n                                         \
    \                          message:NSLocalizedString(@\"Choose One\", @\"Choose\
    \ One\")\n                                                            preferredStyle:UIAlertControllerStyleActionSheet];\n\
    \    UIAlertAction* cancelAction = [UIAlertAction actionWithTitle:@\"Cancel\"\
    \ style:UIAlertActionStyleCancel\n                                           \
    \              handler:^(UIAlertAction * action) {\n                         \
    \                                }];\n    UIAlertAction* photoLibraryAction =\
    \ [UIAlertAction actionWithTitle:@\"Photo Library\" style:UIAlertActionStyleDefault\n\
    \                                                               handler:^(UIAlertAction\
    \ * action) {\n                                                              \
    \     [self showImagePickerForSourceType:UIImagePickerControllerSourceTypePhotoLibrary];\n\
    \                                                               }];\n    UIAlertAction*\
    \ cameraAction = [UIAlertAction actionWithTitle:@\"Camera\" style:UIAlertActionStyleDefault\n\
    \                                                         handler:^(UIAlertAction\
    \ * action) {\n                                                             [self\
    \ showImagePickerForSourceType:UIImagePickerControllerSourceTypeCamera];\n   \
    \                                                      }];\n    [alert addAction:cancelAction];\n\
    \    [alert addAction:photoLibraryAction];\n    [alert addAction:cameraAction];\n\
    \    [self presentViewController:alert animated:YES completion:nil];\n}\n```\n\
    \nThe following is the implementation of the image picker based on the source\
    \ type. If the source type is `UIImagePickerControllerSourceTypePhotoLibrary`,\
    \ you don’t really need to do too much. The `UIImagePickerController` delegate\
    \ method will send back with the image data selected. If the source type is `UIImagePickerControllerSourceTypeCamera`,\
    \ it’s a little bit complicated. First, you will need to add two bar button items.\
    \ One is for “Cancel”. The other is for “Take Photo”. Second, you want to provide\
    \ an overlay over the camera overview to let the admin crop the overlay area.\n\
    \nHere is the complete implementation:\n\n```\n- (void)showImagePickerForSourceType:(UIImagePickerControllerSourceType)sourceType\n\
    {\n    imagePickerController = [[UIImagePickerController alloc] init];\n    imagePickerController.modalPresentationStyle\
    \ = UIModalPresentationCurrentContext;\n    imagePickerController.sourceType =\
    \ sourceType;\n    imagePickerController.delegate = self;\n    if (sourceType\
    \ == UIImagePickerControllerSourceTypeCamera)\n    {\n        CGRect frame = \
    \ [UIScreen mainScreen].applicationFrame;\n        UIToolbar *toolBar=[[UIToolbar\
    \ alloc] initWithFrame:CGRectMake(0, frame.size.height-44, self.view.frame.size.width,\
    \ 44)];\n        toolBar.barStyle =  UIBarStyleBlackOpaque;\n        NSArray *items=@[\n\
    \            [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemCancel\
    \  target:self action:@selector(cancelPicture:)],\n            [[UIBarButtonItem\
    \ alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemFlexibleSpace  target:nil\
    \ action:nil],\n            [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemCamera\
    \  target:self action:@selector(shootPicture:)]\n        ];\n        [toolBar\
    \ setItems:items];\n        // create the overlay view\n        UIView *overlayView\
    \ = [[UIView alloc] initWithFrame:CGRectMake(0.0, 64.0, frame.size.width, frame.size.height-44.0)];\n\
    \        overlayView.opaque=NO;\n        overlayView.backgroundColor=[UIColor\
    \ clearColor];\n        // parent view for our overlay\n        UIView *cameraView=[[UIView\
    \ alloc] initWithFrame:frame];\n        [cameraView addSubview:overlayView];\n\
    \        [cameraView addSubview:toolBar];\n        imagePickerController.showsCameraControls\
    \ = NO;\n        imagePickerController.extendedLayoutIncludesOpaqueBars = YES;\n\
    \        [imagePickerController setCameraOverlayView:cameraView];\n        EMABAppDelegate*\
    \ appDel = (EMABAppDelegate*)[[UIApplication sharedApplication] delegate];\n \
    \       [appDel.tabBarController presentViewController:imagePickerController animated:YES\
    \ completion:^{\n        }];\n    }\n}\n```"
