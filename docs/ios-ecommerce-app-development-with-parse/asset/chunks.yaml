  trans: '

    ### 我的账户


    根视图控制器 `MyAccountTableViewController` 是管理所有用户活动的地方，例如收货地址和付款地址、订单历史记录以及支付方式。我们还可以用它来显示应用信息、隐私政策、联系方式和应用版本——就像
    Apple Store iPhone 应用那样。


    对于 `MyAccountTableViewController`，我们将其 `UITableView` 设置为分组样式，并创建三个区段。每个单元格都设置为静态和基本样式。图
    2-14 展示了该视图控制器的外观。


    ![A978-1-4842-1317-9_2_Fig14_HTML.jpg](img/A978-1-4842-1317-9_2_Fig14_HTML.jpg)


    图 2-14. `MyAccountTableViewController` 的实际用户界面


    “退出登录”单元格用于用户登出。当该单元格被点击时，会显示一个屏幕，要求用户重新登录。这涉及到一些编程，我们将在后面介绍。


    首先，我将专注于第一个“账户”区段的原型设计。


    向主 `UIStoryboard` 添加另一个 `UITableViewController`，使用 `UserAddressTableViewController`
    作为其标识符，并使用“配送地址”作为其标题，如图 2-15 所示。


    ![A978-1-4842-1317-9_2_Fig15_HTML.jpg](img/A978-1-4842-1317-9_2_Fig15_HTML.jpg)


    图 2-15. 这是 `UserAddressTableViewController` 用户界面的一部分


    这次，我们对 `UserAddressTableViewController` 的 `UITableViewCell` 进行一些自定义。理想情况下，用户应该能够编辑他们的配送地址信息。对于每个单元格，使用一个
    `UILabel` 来表明该单元格的用途，并使用一个 `UITextField` 来获取用户输入。另一方面，如果我们知道用户已有完整的地址信息，更好的用户体验是让
    `UITextField` 默认不可编辑。使用一个编辑系统的 `UIBarButtonItem` 来让用户点击按钮编辑信息，以避免误编辑。


    将 `MyAccountTableViewController` 上第一个区段的第一个单元格连接到新的 `UserAddressTableViewController`。


    构建并运行项目；然后我们应该能够体验这些新功能。


    接下来，我们来处理支付方式的用户界面。从技术上讲，你无法存储用户的信用卡号或 CVC 号码，但你可以存储信用卡的类型（例如 Visa、MasterCard
    或 American Express）、卡号后四位以及到期年月。通常，用户会向自己的账户添加几张信用卡。因此，你需要使用一个 `UITableViewController`
    来显示与该账户关联的所有信用卡。


    向你的主 `UIStoryboard` 添加一个新的 `UITableViewController`，并将其命名为 `UserPaymentMethodsTableViewController`。对于
    `UITableView`，将其样式设置为 Plain，内容设置为静态单元格。你需要一个区段和两个单元格。


    将每个单元格设置为“副标题样式”。对于第一个单元格，设置其 `TextLabel` 的内容：Visa XXXX-XXXX-XXXX-4242，副标题文本设为
    04/20；对于第二个单元格，使用 MasterCard XXXX-XXXX-XXXX-XXXX-4444 和 05/18，如图 2-16 所示。


    ![A978-1-4842-1317-9_2_Fig16_HTML.jpg](img/A978-1-4842-1317-9_2_Fig16_HTML.jpg)


    图 2-16. `UserPaymentMethodsTableViewController` 的实际用户界面


    通常，当用户首次在我们这里注册账户时，系统中不会有信用卡信息。你应该提供一种让用户添加新卡的方式。将一个 `UIBarButtonItem` 拖动到视图控制器的左侧栏按钮项，并将其设置为系统的“添加”栏按钮项。


    另一个用例是，你需要为用户设置一张默认信用卡，以加快结账流程。将第一张信用卡设置为默认卡，并使用复选标记表示。但允许用户将任何卡片设置为默认卡。


    接下来，让我们设计一个用户的订单历史记录原型。向 `UIStoryboard` 添加另一个 `UITableViewController`，将其标识符命名为
    `UserOrderHistoryTableViewController`，并将控制器的标题设置为“订单历史”。


    通常，你会显示订单的下单时间、购买总金额、订单中购买的商品（如果空间足够）、订单状态；或者至少需要突出显示一些已取消的订单。首先，将单元格高度设为 66 像素。然后在一个单元格上放置三个
    `UILabel`：一个标签用于订单日期，另一个用于总金额，还有一个用于产品名称。对于标签，将行数设置为 0，换行模式设置为自动换行。用户订购多个产品是很常见的，因此产品名称标签无法显示所有产品的名称。使用灰色文本颜色来表示已取消的订单，如图
    2-17 所示。


    ![A978-1-4842-1317-9_2_Fig17_HTML.jpg](img/A978-1-4842-1317-9_2_Fig17_HTML.jpg)


    图 2-17. 这是 `UserOrderHistoryTableViewController` 的部分用户界面


    这就是 `MyAccount` 所需的全部内容。现在你可以构建项目并运行它。图 2-18 展示了“我的账户”中使用的每个视图控制器。


    ![A978-1-4842-1317-9_2_Fig18_HTML.gif](img/A978-1-4842-1317-9_2_Fig18_HTML.gif)


    图 2-18. 这里是“我的账户”视图控制器


    ### 购物袋


    `BagNavigationController` 的根视图控制器是一个 `UITableViewController`。为了显示用户的购物袋内容，使用该
    `UITableViewController` 并将其命名为 `BagTableViewController`，标题设为“购物袋”。


    此外，需要满足以下需求：用户必须能够进行结账；用户应该能够更改商品数量或从购物袋中移除商品；购物袋应显示总金额，并且该金额需要根据商品的单价和数量自动变化。


    首先，处理 `UITableViewCell`。需要显示的内容相当多，所以我们把单元格调高一些。在本例中，将其设为 66 像素。


    你还需要三个 `UILabel`：一个用于产品名称，一个用于单价，第三个用于数量。同时，在单元格中添加一个 `UIStepper` 控件，这样用户就可以改变她想要购买的数量，如图
    2-19 所示。


    ![A978-1-4842-1317-9_2_Fig19_HTML.jpg](img/A978-1-4842-1317-9_2_Fig19_HTML.jpg)


    图 2-19. `BagTableViewController` 的视图层级


    你还需要一个 `UITableViewCell` 来显示用户应付的总金额。添加另一个单元格，将其样式设置为“右侧详细信息”，并将总金额 $36.00 设置为该单元格的副标题。


    用户通常希望留下关于订单的说明，因此向视图控制器添加一个撰写系统的 `UIBarButtonItem`。目前它不会执行任何实际操作，但至少表明我们已考虑到这个功能。


    拖动两个 `UIView`：一个用于 `UITableView` 的页眉视图，另一个用于页脚视图。


    向表格页眉视图添加一个 `UILabel`。这个 `UILabel` 将用于显示这些商品何时被添加到购物袋中。


    向页脚视图添加两个 `UIButton`。一个按钮的标题为“使用信用卡购买”，另一个为“使用 Apple Pay 购买”。我们需要从 Apple 的网站下载该按钮的图形资源。它随本章的源代码一起提供。图
    2-20 展示了 `BagTableViewController` 的外观。图 2-21 展示了“购物袋”的所有视图控制器。


    ![A978-1-4842-1317-9_2_Fig21_HTML.gif](img/A978-1-4842-1317-9_2_Fig21_HTML.gif)


    图 2-21. “购物袋”中使用的视图控制器


    ![A978-1-4842-1317-9_2_Fig20_HTML.jpg](img/A978-1-4842-1317-9_2_Fig20_HTML.jpg)


    图 2-20. 这是 `BagTableViewController` 的部分用户界面

