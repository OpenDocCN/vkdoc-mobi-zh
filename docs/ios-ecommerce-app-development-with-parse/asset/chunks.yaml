    \ to use your real Parse application ID and client key."
  raw: '## Querying and Showing Data: PFQueryTableViewController


    When you develop an iOS application, you commony use UITableViewController. In
    a typical network-based app, you use UITableViewController to display the content
    that is fetched from a remote server. Often you also need to implement some features
    such as a loading indicator, pull-to-refresh, pagination, tap a cell to load and
    show next page, and load and show an image on each UITableViewCell. Parse creates
    this PFQueryTableViewController, a subclass of UITableViewController, to make
    a developer’s life even easier.


    Here is an example of how you could use PFQueryTableViewController; let’s say
    you want to implement a feature that shows all products and name it ProductsTableViewController
    class, as shown in Figure [3-4](#A978-1-4842-1317-9_3_Chapter.html#Fig4).


    ![A978-1-4842-1317-9_3_Fig4_HTML.jpg](A978-1-4842-1317-9_3_Fig4_HTML.jpg)


    Figure 3-4.


    Create a PFQueryTableViewController subclass


    This is what ProductsTableViewController.h looks like:


    `#import "PFQueryTableViewController.h"`


    `@interface ProductsTableViewController : PFQueryTableViewController`


    `@end`


    This is what the ProductsTableViewControllerm looks like:


    `#import "ProductsTableViewController.h"`


    `#import "Product.h"`


    `#import <ParseUI/PFTableViewCell.h>`


    `#import <ParseUI/PFImageView.h>`


    `@implementation ProductsTableViewController`


    `-(void)awakeFromNib`


    `{`


        `[super awakeFromNib];`


        `self.parseClassName = @"Product";`


        `self.pullToRefreshEnabled = YES;`


        `self.paginationEnabled = YES;`


        `self.objectsPerPage = 10;`


    `}`


    `- (PFQuery *)queryForTable {`


        `PFQuery *query = [PFQuery queryWithClassName:self.parseClassName];`


        `if ([self.objects count] == 0) {`


            `query.cachePolicy = kPFCachePolicyCacheThenNetwork;`


        `}`


        `return query;`


    `}`


    `#pragma mark`


    `-(PFTableViewCell *)tableView:(UITableView * __nonnull)tableView cellForRowAtIndexPath:(NSIndexPath
    * __nonnull)indexPath object:(nullable Product *)object`


    `{`


        `PFTableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@"ProductCell"];`


        `cell.textLabel.text = object.title;`


            `cell.imageView.file = object.image;`


        `[cell.imageView loadInBackground];`


        `return cell;`


    `}`


    `@end`


    First, you implement the `-(void)awakeFromNib` method if you are using the XIB
    file in a UIStoryboard or a separate XIB file for the ProductsTableViewController.
    Specify the Parse class name you will use for this controller: in this case, Product
    class. If you want to use the pull-to-fresh or pagination features, set `self.pullToRefreshEnabled`
    and `self.paginationEnabled` to `YES`. Also set 10 objects for each page. Depending
    on the cell height, you can set your number to provide a better user experience.


    The second method you need to implement is `+(PFQuery *)queryForTable`. Specify
    what Parse class you will query, and the cache policy. In this case, query the
    Product Parse class and for your cache policy use kPFCachePolicyCacheThenNetwork.


    The third method is to display your objects on each PFTableViewCell. In this example,
    set the product title to the cell’s textLabel and the product image to the cell’s
    imageView.


    ## Summary


    In this chapter, I have gone over the Parse fundamentals related to building an
    e-commerce iOS app. I started with the PFObject class and its subclasses, and
    then introduced four types of relationships in PFObjects and PFUser. I also covered
    three basic Parse UIs, namely, PFImageView, PFTableViewCell, and PFQueryTableViewController.


    # 4. Parse Project Setup


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1317-9_​4](http://dx.doi.org/10.1007/978-1-4842-1317-9_4))
    contains supplementary material, which is available to authorized users.


    This chapter covers how to set up a Parse project. You will need to write down
    a few application keys and secrets. To make the process simple, start with a helper
    class to remember these keys and secrets.


    In this chapter you learn how to:


    *   Keep track of your keys with the EMABConstants helper class

    *   Create a new Parse app

    *   Set up payment, transactional e-mails, and Facebook login

    *   Manage dependencies with Cocoapods

    *   Implement a progress indicator with SVProgressHud


    ## Keep Track of Your Keys: EMABConstants Class


    Continue with the source code from [Chapter 2](#A978-1-4842-1317-9_2_Chapter.html);
    create a new Cocoa Touch Class file, name it EMABConstants, and make it a subclass
    of NSObject. One purpose of this class is to keep track of those global accessible
    `NSStrings`, such as all keys and secrets. In this case, using “extern NSString
    *const” is the preferred approach.


    In addition, you used EMAB as prefix for each file you created—EMAB stands for
    “E-commerce Mobile App Development,” but you can name it whatever you want.


    ## Create a New Parse App


    If you don’t have a Parse account, now is the time to sign up for one! Open [`https://parse.com`](https://parse.com/)
    in your favorite browser, then follow the onscreen instructions to sign up for
    a Parse account. The process is simple. Once you verify the e-mail address you
    are asked to provide, you can jump right in to create a new app.


    Parse only asks for the name of the new app you want to create. In this tutorial,
    your app name is EcommerceAppBook. Once you confirm the project name, you will
    see a project overview similar to the one shown in Figure [4-1](#A978-1-4842-1317-9_4_Chapter.html#Fig1).


    ![A978-1-4842-1317-9_4_Fig1_HTML.jpg](A978-1-4842-1317-9_4_Fig1_HTML.jpg)


    Figure 4-1.


    A new Parse app


    Click the icon part of the summary box, and you will then see a dashboard screen.
    At this point, you only need to get your application keys. So click the “Settings”
    tab, which is on top of the dashboard, then click “Keys” in the left column. You
    will see a couple of application keys: Application ID and Client Key for your
    iOS app (see Figure [4-2](#A978-1-4842-1317-9_4_Chapter.html#Fig2)).


    ![A978-1-4842-1317-9_4_Fig2_HTML.jpg](A978-1-4842-1317-9_4_Fig2_HTML.jpg)


    Figure 4-2.


    Parse application keys


    Paste these two keys into your EMABConstants.h file:


    `extern NSString *const kParseApplicationID;`


    `extern NSString *const kParseClientKey;`


    In EMABConstants.m, implement these two keys’ content:


    `NSString *const kParseApplicationID = @"YOUR-PARSE-APPLICATION-ID";`


    `NSString *const kParseClientKey = @"YOUR-PARSE-CLIENT-KEY";`


    Remember to use your real Parse application ID and client key.'
  trans: "\n# 查询与展示数据：`PFQueryTableViewController`\n\n在开发 iOS 应用时，你通常都会使用 `UITableViewController`。在典型的网络应用中，你会通过\
    \ `UITableViewController` 来显示从远程服务器获取的内容。通常还需要实现一些功能，比如加载指示器、下拉刷新、分页、点击单元格加载并显示下一页，以及在每个\
    \ `UITableViewCell` 上加载并显示图片。Parse 创建了 `PFQueryTableViewController`（一个 `UITableViewController`\
    \ 的子类），让开发者的工作变得更加轻松。\n\n下面是一个如何使用 `PFQueryTableViewController` 的示例；假设你想要实现一个展示所有产品的功能，并将其命名为\
    \ `ProductsTableViewController` 类，如图 3-4 所示。\n\n![A978-1-4842-1317-9_3_Fig4_HTML.jpg](img/A978-1-4842-1317-9_3_Fig4_HTML.jpg)\n\
    \n图 3-4. 创建一个 `PFQueryTableViewController` 的子类\n\n这是 `ProductsTableViewController.h`\
    \ 文件的内容：\n\n```\n#import \"PFQueryTableViewController.h\"\n\n@interface ProductsTableViewController\
    \ : PFQueryTableViewController\n\n@end\n```\n\n这是 `ProductsTableViewController.m`\
    \ 文件的内容：\n\n```\n#import \"ProductsTableViewController.h\"\n#import \"Product.h\"\
    \n#import <ParseUI/PFTableViewCell.h>\n#import <ParseUI/PFImageView.h>\n\n@implementation\
    \ ProductsTableViewController\n\n-(void)awakeFromNib\n{\n    [super awakeFromNib];\n\
    \    self.parseClassName = @\"Product\";\n    self.pullToRefreshEnabled = YES;\n\
    \    self.paginationEnabled = YES;\n    self.objectsPerPage = 10;\n}\n\n- (PFQuery\
    \ *)queryForTable {\n    PFQuery *query = [PFQuery queryWithClassName:self.parseClassName];\n\
    \    if ([self.objects count] == 0) {\n        query.cachePolicy = kPFCachePolicyCacheThenNetwork;\n\
    \    }\n    return query;\n}\n\n#pragma mark\n\n-(PFTableViewCell *)tableView:(UITableView\
    \ * __nonnull)tableView cellForRowAtIndexPath:(NSIndexPath * __nonnull)indexPath\
    \ object:(nullable Product *)object\n{\n    PFTableViewCell *cell = [tableView\
    \ dequeueReusableCellWithIdentifier:@\"ProductCell\"];\n    cell.textLabel.text\
    \ = object.title;\n        cell.imageView.file = object.image;\n    [cell.imageView\
    \ loadInBackground];\n    return cell;\n}\n\n@end\n```\n\n首先，如果你在 UIStoryboard\
    \ 或独立的 XIB 文件中为 `ProductsTableViewController` 使用了 XIB 文件，你需要实现 `-(void)awakeFromNib`\
    \ 方法。指定你将在此控制器中使用的 Parse 类名：本例中为 `Product` 类。如果你希望使用下拉刷新或分页功能，请将 `self.pullToRefreshEnabled`\
    \ 和 `self.paginationEnabled` 设置为 `YES`。同时，设置每页显示 10 个对象。你可以根据单元格高度来调整这个数字，以提供更好的用户体验。\n\
    \n第二个你需要实现的方法是 `+(PFQuery *)queryForTable`。指定你要查询的 Parse 类以及缓存策略。本例中，查询 `Product`\
    \ 这个 Parse 类，并将缓存策略设置为 `kPFCachePolicyCacheThenNetwork`。\n\n第三个方法是用于在每个 `PFTableViewCell`\
    \ 上显示对象。在这个示例中，将产品标题设置为单元格的 `textLabel`，将产品图片设置为单元格的 `imageView`。\n\n## 本章小结\n\
    \n在本章中，我介绍了与构建 iOS 电商应用相关的 Parse 基础知识。我从 `PFObject` 类及其子类开始讲起，然后介绍了 `PFObjects`\
    \ 和 `PFUser` 中的四种关系类型。我还涵盖了三个基本的 Parse UI，即 `PFImageView`、`PFTableViewCell` 和\
    \ `PFQueryTableViewController`。\n\n# 4. Parse 项目设置\n\n电子补充材料 本章的在线版本（doi:[10.​1007/​978-1-4842-1317-9_​4](http://dx.doi.org/10.1007/978-1-4842-1317-9_4)）包含补充材料，仅供授权用户使用。\n\
    \n本章介绍如何设置一个 Parse 项目。你需要记下几个应用密钥和密码。为了让这个过程更简单，我们将从一个辅助类开始，用它来记住这些密钥和密码。\n\n\
    在本章中，你将学习如何：\n\n*   使用 `EMABConstants` 辅助类来管理你的密钥\n*   创建一个新的 Parse 应用\n*   设置支付、交易邮件和\
    \ Facebook 登录\n*   使用 CocoaPods 管理依赖\n*   使用 `SVProgressHud` 实现进度指示器\n\n## 管理你的密钥：`EMABConstants`\
    \ 类\n\n接着 第 2 章 的源代码继续；创建一个新的 Cocoa Touch 类文件，将其命名为 `EMABConstants`，并使其成为 `NSObject`\
    \ 的子类。这个类的一个用途是管理那些全局可访问的 `NSStrings`，例如所有的密钥和密码。在这种情况下，使用 `extern NSString *const`\
    \ 是首选的方法。\n\n此外，你为每个创建的文件都使用了 `EMAB` 作为前缀——`EMAB` 代表“电子商务移动应用开发”，但你可以随意命名。\n\n\
    ## 创建一个新的 Parse 应用\n\n如果你还没有 Parse 账户，现在正是注册的时候！在你喜欢的浏览器中打开 [`https://parse.com`](https://parse.com/)，然后按照屏幕上的指引注册一个\
    \ Parse 账户。这个过程很简单。一旦你验证了需要提供的电子邮件地址，你就可以直接开始创建新应用了。\n\nParse 只会要求你输入要创建的新应用的名称。在本教程中，你的应用名称是\
    \ `EcommerceAppBook`。确认项目名称后，你会看到一个类似图 4-1 所示的项目概览。\n\n![A978-1-4842-1317-9_4_Fig1_HTML.jpg](img/A978-1-4842-1317-9_4_Fig1_HTML.jpg)\n\
    \n图 4-1. 一个新的 Parse 应用\n\n点击摘要框内的图标，你将看到一个仪表盘界面。此时，你只需要获取你的应用密钥。因此，点击仪表盘顶部的“设置”选项卡，然后点击左侧栏中的“密钥”。你将看到几个应用密钥：用于你的\
    \ iOS 应用的 Application ID 和 Client Key（见图 4-2）。\n\n![A978-1-4842-1317-9_4_Fig2_HTML.jpg](img/A978-1-4842-1317-9_4_Fig2_HTML.jpg)\n\
    \n图 4-2. Parse 应用密钥\n\n将这两个密钥粘贴到你的 `EMABConstants.h` 文件中：\n\n```\nextern NSString\
    \ *const kParseApplicationID;\nextern NSString *const kParseClientKey;\n```\n\n\
    在 `EMABConstants.m` 文件中，实现这两个密钥的内容：\n\n```\nNSString *const kParseApplicationID\
    \ = @\"YOUR-PARSE-APPLICATION-ID\";\nNSString *const kParseClientKey = @\"YOUR-PARSE-CLIENT-KEY\"\
    ;\n```\n\n请记住使用你真实的 Parse 应用 ID 和客户端密钥。\n"
- fmt: "# Set Up Payment: Stripe\n\nWikipedia says that Stripe is a company that provides\
    \ a way for individuals and businesses to accept payments over the Internet. Stripe\
    \ says about itself: web and mobile payments, built for developers. The most important\
    \ feature of an e-commerce app is that it accepts payment. In this tutorial, after\
    \ a user enters a credit card number, you will use Stripe to process the payment.\
    \ In the end, Stripe will charge the user’s credit card and distribute the money\
    \ to your bank account, minus a small fee for the service. The amount of the fee\
    \ is calculated based on your geolocation. For example, at the time of writing,\
    \ the fee in the United States is 2.4% + 20 cents per successful charge. There\
    \ are no recurring monthly fees, no refund costs, and no hidden fees. If you haven’t\
    \ done so already, this would be a good time to sign up with Stripe.\n\n**Note**\
    \  \nFor more information about Stripe’s pricing, go to [`https://stripe.com/gb/pricing`](https://stripe.com/gb/pricing).\n\
    \nTo get started with Stripe, click the Sign Up button on the Stripe home page,\
    \ [`https://stripe.com/gb`](https://stripe.com/gb). As with most accounts these\
    \ days, you will be asked to provide an e-mail address and a password. Stripe\
    \ will send you a verification e-mail to the e-mail address you provided. Be sure\
    \ to verify your e-mail before you continue.\n\nClicking the link in the verification\
    \ e-mail will bring you back to the Stripe website. Log in with the e-mail and\
    \ password to activate your account.\n\nStripe supports multiple accounts within\
    \ the same user account. From the Your Account menu, select “Create New Account,”\
    \ and give it an account name, such as your company’s name, then click “Create\
    \ Account,” as shown in Figure [4-3](#A978-1-4842-1317-9_4_Chapter.html#Fig3).\n\
    \n![A978-1-4842-1317-9_4_Fig3_HTML.jpg](A978-1-4842-1317-9_4_Fig3_HTML.jpg)\n\n\
    Figure 4-3. Create a new Stripe account\n\nSimilar to Parse, you will see a dashboard.\
    \ Click your account name located at the top right corner, and click “Account\
    \ Settings” (see Figure [4-4](#A978-1-4842-1317-9_4_Chapter.html#Fig4)).\n\n![A978-1-4842-1317-9_4_Fig4_HTML.jpg](A978-1-4842-1317-9_4_Fig4_HTML.jpg)\n\
    \nFigure 4-4. Go to Account Settings\n\nFind the “API Keys” tab, and copy and\
    \ paste the Test Publishable Key and Live Publishable Key to your `EMBAConstants`\
    \ class.\n\nIn `EMABConstants.h`:\n\n```\nextern NSString *const kStripeTestPublishableKey;\n\
    extern NSString *const kStripeLivePublishableKey;\n```\n\nIn `EMABConstants.m`:\n\
    \n```\nNSString *const kStripeTestPublishableKey = @\"YOUR-STRIPE-TEST-PUBLISHABLE-KEY\"\
    ;\nNSString *const kStripeLivePublishableKey = @\"YOUR-STRIPE-LIVE-PUBLISHABLE-KEY\"\
    ;\n```\n\nYou won’t need the Test Secret Key and Live Secret Key in your Xcode\
    \ project; however, you will need them later on. The Live Secret Key is very important,\
    \ and you should not share it with others.\n\n**Note**  \nThe pair of Test Publishable\
    \ Key and Secret is used in development; you will need the Live Publishable Key\
    \ and Secret in production. I will cover how to use the Secret keys in [Chapter\
    \ 14](#A978-1-4842-1317-9_14_Chapter.html).\n\nWorth mentioning, Stripe will need\
    \ you to provide more information such as the legal representative’s name, date\
    \ of birth, and social security number for this account when you turn your project\
    \ into production. It also needs the legal business name, address, and EIN/Tax\
    \ ID if there is one. And it requires a bank routing and account number so the\
    \ money can be transferred into the user’s bank account.\n\n# Set Up Transactional\
    \ E-Mails: Mailgun\n\nFor this example, you will use the developer-friendly Mailgun\
    \ APIs to send transactional e-mails when an order is placed. Mailgun’s pricing\
    \ is very reasonable: the first 10,000 e-mails of the month are free. Alternatively,\
    \ you can also choose Sendgrid or other services. I chose Mailgun mainly because\
    \ Parse has a built-in Mailgun cloud module for developers.\n\n**Note**  \nFor\
    \ more information about Mailgun’s pricing go to [`http://www.mailgun.com/pricing`](http://www.mailgun.com/pricing).\n\
    \nSigning up for a Mailgun account is simple. Visit [`https://mailgun.com/signup`](https://mailgun.com/signup),\
    \ and enter your Company/Account name, personal name, e-mail address and password,\
    \ and sign up.\n\nMailgun also requires e-mail verification. Follow the verification\
    \ e-mail instructions, and you will be brought back to the Mailgun website. Log\
    \ in with your e-mail and password, and you will be sent to a dashboard screen.\
    \ Tap the “Domains” tab at the top. You will see a default sandbox domain automatically\
    \ assigned to you; use this domain in your project. Click this domain to find\
    \ out the API key (see Figure [4-5](#A978-1-4842-1317-9_4_Chapter.html#Fig5)).\n\
    \n![A978-1-4842-1317-9_4_Fig5_HTML.jpg](A978-1-4842-1317-9_4_Fig5_HTML.jpg)\n\n\
    Figure 4-5. The Domains tab in Mailgun\n\nYou won’t need this API key in your\
    \ Xcode project; but you will use it later in your Parse Cloud code.\n\n**Note**\
    \  \nIn production, you should set your own e-mail domain with Mailgun so every\
    \ e-mail sent will be seen from your company’s e-mail address.\n\n# Set Up Facebook\
    \ Login\n\nSince you will use the Facebook Login feature, it’s mandatory to create\
    \ a Facebook App with Facebook to enable this feature.\n\nGo to [`https://developers.facebook.com/apps`](https://developers.facebook.com/apps).\
    \ Click “Add a New App,” and choose iOS. You will see a “Quick Start for iOS”\
    \ screen. Choose Skip and Create App ID in the top right corner. Facebook will\
    \ ask you to provide a display name for the app and a category. Enter what describes\
    \ your business best and click “Create App ID” button. Figure [4-6](#A978-1-4842-1317-9_4_Chapter.html#Fig6)\
    \ shows the screen after you click the button.\n\n![A978-1-4842-1317-9_4_Fig6_HTML.jpg](A978-1-4842-1317-9_4_Fig6_HTML.jpg)\n\
    \nFigure 4-6. Add a new iOS app with Facebook Developer Console\n\nYou might need\
    \ to go through another security check screen before you can see the App ID, a\
    \ 16-digit number. Write down this number; you will use it in your Xcode project.\n\
    \nYou can add this key by editing the `.plist` file of the [Chapter 4](#A978-1-4842-1317-9_4_Chapter.html)\
    \ project source code, as shown in Figure [4-7](#A978-1-4842-1317-9_4_Chapter.html#Fig7).\n\
    \n![A978-1-4842-1317-9_4_Fig7_HTML.jpg](A978-1-4842-1317-9_4_Fig7_HTML.jpg)\n\n\
    Figure 4-7. Configure the Facebook Developer App ID with the Xcode project `.plist`\
    \ file\n\nCreate a key called `FacebookAppID` with a string value, and add the\
    \ 16-digit number app ID there.\n\nCreate a key called `FacebookDisplayName` with\
    \ a string value, and add the Display Name we have had in the Facebook App Dashboard.\n\
    \nCreate an array key called `URL types` with a single array subitem called `URL\
    \ Schemes`. Give this a single item with your app ID prefixed with `fb`; it should\
    \ look something like `fb1235789899153886`. Use the default parameter for Document\
    \ Role: Editor.\n\n**Note**  \nFacebook has detailed documentation about how to\
    \ create a Facebook App. To learn more, go to [`https://developers.facebook.com/docs/ios/getting-started`](https://developers.facebook.com/docs/ios/getting-started).\n\
    \n# Manage Dependencies: Cocoapods\n\nAs an iOS developer, you should be familiar\
    \ with Cocoapods. Cocoapods is the dependency manager for Swift and Objective-C\
    \ Cocoa projects. It has thousands of libraries and can help you scale your projects\
    \ elegantly.\n\nIf you have not installed Cocoapods on your Mac computer, this\
    \ is the time to do so; you will use Cocoapods to install all Parse-related SDKs\
    \ and other libraries.\n\n**Note**  \nVisit [`https://guides.cocoapods.org/using/getting-started.html#getting-started`](https://guides.cocoapods.org/using/getting-started.html#getting-started)\
    \ to get started with Cocoapods and troubleshooting tips.\n\nInstall Cocoapods\
    \ from the Terminal by running the following command:\n\n```\n$ sudo gem install\
    \ cocoapods\n```"
  raw: '## Set Up Payment: Stripe


    Wikipedia says that Stripe is a company that provides a way for individuals and
    businesses to accept payments over the Internet. Stripe says about itself: web
    and mobile payments, built for developers. The most important feature of an e-commerce
    app is that it accepts payment. In this tutorial, after a user enters a credit
    card number, you will use Stripe to process the payment. In the end, Stripe will
    charge the user’s credit card and distribute the money to your bank account, minus
    a small fee for the service. The amount of the fee is calculated based on your
    geolocation. For example, at the time of writing, the fee in the United States
    is 2.4% + 20 cents per successful charge. There are no recurring monthly fees,
    no refund costs, and no hidden fees. If you haven’t done so already, this would
    be a good time to sign up with Stripe.


    Note


    For more information about Stripe’s pricing, go to [`https://stripe.com/gb/pricing`](https://stripe.com/gb/pricing)
    .


    To get started with Stripe, click the Sign Up button on the Stripe home page,
    [`https://stripe.com/gb`](https://stripe.com/gb) . As with most accounts these
    days, you will be asked to provide an e-mail address and a password. Stripe will
    send you a verification e-mail to the e-mail address you provided. Be sure to
    verify your e-mail before you continue.


    Clicking the link in the verification e-mail will bring you back to the Stripe
    website. Log in with the e-mail and password to activate your account.


    Stripe supports multiple accounts within the same user account. From the Your
    Account menu, select “Create New Account,” and give it an account name, such as
    your company’s name, then click “Create Account,” as shown in Figure [4-3](#A978-1-4842-1317-9_4_Chapter.html#Fig3).


    ![A978-1-4842-1317-9_4_Fig3_HTML.jpg](A978-1-4842-1317-9_4_Fig3_HTML.jpg)


    Figure 4-3.


    Create a new Stripe account


    Similar to Parse, you will see a dashboard. Click your account name located at
    the top right corner, and click “Account Settings” (see Figure [4-4](#A978-1-4842-1317-9_4_Chapter.html#Fig4)).


    ![A978-1-4842-1317-9_4_Fig4_HTML.jpg](A978-1-4842-1317-9_4_Fig4_HTML.jpg)


    Figure 4-4.


    Go to Account Settings


    Find the “API Keys” tap, and copy and paste the Test Publishable Key and Live
    Publishable Key to your EMBAConstants class.


    In EMABConstants.h:


    `extern NSString *const kStripeTestPublishableKey;`


    `extern NSString *const kStripeLivePublishableKey;`


    In EMABConstants.m:


    `NSString *const kStripeTestPublishableKey = @"YOUR-STRIPE-TEST-PUBLISHABLE-KEY";`


    `NSString *const kStripeLivePublishableKey = @"YOUR-STRIPE-LIVE-PUBLISHABLE-KEY";`


    You won’t need the Test Secret Key and Live Secret Key in your Xcode project;
    however, you will need them later on. The Live Secret Key is very important, and
    you should not share it with others.


    Note


    The pair of Test Publishable Key and Secret is used in development; you will need
    the Live Publishable Key and Secret in production. I will cover how to use the
    Secret keys in [Chapter 14](#A978-1-4842-1317-9_14_Chapter.html).


    Worth mentioning, Stripe will need you to provide more information such as the
    legal representative’s name, date of birth, and social security number for this
    account when you turn your project into production. It also needs the legal business
    name, address, and EIN/Tax ID if there is one. And it requires a bank routing
    and account number so the money can be transferred into the user’s bank account.


    ## Set Up Transactional E-Mails: Mailgun


    For this example, you will use the developer-friendly Mailgun APIs to send transactional
    e-mails when an order is placed. Mailgun’s pricing is very reasonable The first
    10,000 e-mails of the month are free. Alernatively, you can also choose Sendgrid
    or other services. I chose Mailgun mainly because Parse has a built-in Mailgun
    cloud module for developers.


    Note


    For more information about Mailgun’s pricing go to [`http://www.mailgun.com/pricing`](http://www.mailgun.com/pricing)
    .


    Signing up for a Mailgun account is simple. Visit [`https://mailgun.com/signup`](https://mailgun.com/signup)
    , and enter your Company/Account name, personal name, e-mail address and password,
    and sign up.


    Mailgun also requires e-mail verification. Follow the verification e-mail instructions,
    and you will be brought back to the Mailgun website. Log in with your e-mail and
    password, and you will be sent to a dashboard screen. Tap the “Domains” tab at
    the top. You will see a default sandbox domain automatically assigned to you;
    use this domain in your project. Click this domain to find out the API key (see
    Figure [4-5](#A978-1-4842-1317-9_4_Chapter.html#Fig5)).


    ![A978-1-4842-1317-9_4_Fig5_HTML.jpg](A978-1-4842-1317-9_4_Fig5_HTML.jpg)


    Figure 4-5.


    The Domains tab in Mailgun


    You won’t need this API key in your Xcode project; but you will use it later in
    your Parse Cloud code.


    Note


    In production, you should set your own e-mail domain with Mailgun so every e-mail
    sent will be seen from your company’s e-mail address.


    ## Set Up Facebook Login


    Since you will use the Facebook Login feature, it’s mandatory to create a Facebook
    App with Facebook to enable this feature.


    Go to [`https://developers.facebook.com/apps`](https://developers.facebook.com/apps)
    . Click “Add a New App,” and choose iOS. You will see a “Quick Start for iOS”
    screen. Choose Skip and Create App ID in the top right corner. Facebook will ask
    you to provide a display name for the app and a category. Enter what describes
    your business best and click “Create App ID” button. Figure [4-6](#A978-1-4842-1317-9_4_Chapter.html#Fig6)
    shows the screen after you click the button.


    ![A978-1-4842-1317-9_4_Fig6_HTML.jpg](A978-1-4842-1317-9_4_Fig6_HTML.jpg)


    Figure 4-6.


    Add a new iOS app with Facebook Developer Console


    You might need to go through another security check screen before you can see
    the App ID, a 16-digit number. Write down this number; you will use it in our
    Xcode project.


    You can add this key by editing the PLIST file of the [Chapter 4](#A978-1-4842-1317-9_4_Chapter.html)
    project source code, as shown in Figure [4-7](#A978-1-4842-1317-9_4_Chapter.html#Fig7).


    ![A978-1-4842-1317-9_4_Fig7_HTML.jpg](A978-1-4842-1317-9_4_Fig7_HTML.jpg)


    Figure 4-7.


    Configure the Facebook Developer App ID with the Xcode project .plist file Create
    a key called FacebookAppID with a string value, and add the 16-digit number app
    ID there.   Create a key called FacebookDisplayName with a string value, and add
    the Display Name we have had in the Facebook App Dashboard.   Create an array
    key called URL types with a single array subitem called URL Schemes. Give this
    a single item with your app ID prefixed with fb; it should look something like
    fb1235789899153886\. Use the default parameter for Document Role: Editor.   Note


    Facebook has detailed documentation about how to create a Facebook App. To learn
    more, go to [`https://developers.facebook.com/docs/ios/getting-started`](https://developers.facebook.com/docs/ios/getting-started)
    .


    ## Manage Dependencies: Cocoapods


    As an iOS developer, you should be familiar with Cocoapods. Cocoapods is the dependency
    manager for Swift and Objective-C Cocoa projects. It has thousands of libraries
    and can help you scale your projects elegantly.


    If you have not installed Cocoapods on your Mac computer, this is the time to
    do so; you will use Cocopaods to install all Parse-related SDKs and other libraries.


    Note


    Visit [`https://guides.cocoapods.org/using/getting-started.html#getting-started`](https://guides.cocoapods.org/using/getting-started.html#getting-started)
    to get started with Cocoapods and troubleshooting tips.


    Install Cocoapods from the Terminal by running the following command:


    `$ sudo gem install cocoapods`'
  trans: "\n# 设置支付：Stripe\n\n维基百科称，Stripe 是一家为个人和企业提供在线支付服务的公司。Stripe 自称：专为开发者打造的网页与移动支付。电子商务应用最重要的功能就是接受付款。在本教程中，用户在输入信用卡卡号后，你将使用\
    \ Stripe 处理支付流程。最终，Stripe 会从用户的信用卡中扣款，并将资金（扣除少量服务费后）转入你的银行账户。服务费金额根据你的地理位置计算。例如，在编写本文时，美国的费用标准是每笔成功交易收取\
    \ 2.4% + 20 美分。没有月费、退款手续费或隐藏费用。如果你还没有注册，现在正是注册 Stripe 的好时机。\n\n**注意**  \n更多关于\
    \ Stripe 定价的信息，请访问 [`https://stripe.com/gb/pricing`](https://stripe.com/gb/pricing)。\n\
    \n要开始使用 Stripe，请点击 Stripe 主页上的注册按钮，网址是 [`https://stripe.com/gb`](https://stripe.com/gb)。与现在大多数账户注册流程一样，系统会要求你提供邮箱地址和密码。Stripe\
    \ 会向你提供的邮箱发送一封验证邮件。请务必在继续操作前完成邮箱验证。\n\n点击验证邮件中的链接，你会返回到 Stripe 网站。使用邮箱和密码登录以激活你的账户。\n\
    \nStripe 支持在同一用户账户下管理多个子账户。从“你的账户”菜单中选择“创建新账户”，为账户命名（例如你的公司名称），然后点击“创建账户”，如图 4-3\
    \ 所示。\n\n![A978-1-4842-1317-9_4_Fig3_HTML.jpg](img/A978-1-4842-1317-9_4_Fig3_HTML.jpg)\n\
    \n图 4-3. 创建一个新的 Stripe 账户\n\n与 Parse 类似，你会看到一个仪表盘。点击右上角的账户名称，然后点击“账户设置”（见图 4-4）。\n\
    \n![A978-1-4842-1317-9_4_Fig4_HTML.jpg](img/A978-1-4842-1317-9_4_Fig4_HTML.jpg)\n\
    \n图 4-4. 进入账户设置\n\n找到“API 密钥”选项卡，将测试可发布密钥和在线可发布密钥复制并粘贴到你的 `EMBAConstants` 类中。\n\
    \n在 `EMABConstants.h` 中：\n\n```\nextern NSString *const kStripeTestPublishableKey;\n\
    extern NSString *const kStripeLivePublishableKey;\n```\n\n在 `EMABConstants.m`\
    \ 中：\n\n```\nNSString *const kStripeTestPublishableKey = @\"YOUR-STRIPE-TEST-PUBLISHABLE-KEY\"\
    ;\nNSString *const kStripeLivePublishableKey = @\"YOUR-STRIPE-LIVE-PUBLISHABLE-KEY\"\
    ;\n```\n\n你的 Xcode 项目中不需要测试密钥和在线密钥；但后续会用到。在线密钥非常重要，请勿与他人分享。\n\n**注意**  \n测试可发布密钥和密钥对用于开发环境；你需要在生产环境中使用在线可发布密钥和密钥。我将在第\
    \ 14 章中介绍如何使用密钥。\n\n值得一提的是，当你的项目进入生产环境时，Stripe 会要求你为该账户提供更多信息，例如法定代表人的姓名、出生日期和社会安全号码。它还需要合法的企业名称、地址以及\
    \ EIN/税号（如果有的话）。并且需要一个银行路由号码和账户号码，以便资金转入用户的银行账户。\n\n# 设置事务性邮件：Mailgun\n\n本示例将使用对开发者友好的\
    \ Mailgun API，在下订单时发送事务性邮件。Mailgun 的定价非常合理：每月前 10,000 封邮件免费。你也可以选择 Sendgrid 或其他服务。我选择\
    \ Mailgun 主要是因为 Parse 为开发者内置了 Mailgun 云模块。\n\n**注意**  \n更多关于 Mailgun 定价的信息，请访问\
    \ [`http://www.mailgun.com/pricing`](http://www.mailgun.com/pricing)。\n\n注册 Mailgun\
    \ 账户很简单。访问 [`https://mailgun.com/signup`](https://mailgun.com/signup)，输入你的公司/账户名称、个人姓名、邮箱地址和密码，然后注册。\n\
    \nMailgun 也需要邮箱验证。按照验证邮件中的说明操作，你会回到 Mailgun 网站。使用邮箱和密码登录，你将进入仪表盘页面。点击顶部的“域名”选项卡。你会看到一个默认自动分配给你的沙盒域名；在项目中使用此域名。点击此域名以查找\
    \ API 密钥（见图 4-5）。\n\n![A978-1-4842-1317-9_4_Fig5_HTML.jpg](img/A978-1-4842-1317-9_4_Fig5_HTML.jpg)\n\
    \n图 4-5. Mailgun 中的域名选项卡\n\n你的 Xcode 项目中不需要这个 API 密钥；但你稍后会在 Parse 云代码中使用它。\n\n\
    **注意**  \n在生产环境中，你应该使用 Mailgun 设置自己的邮件域名，这样收到的每封邮件都将显示为你公司的邮箱地址。\n\n# 设置 Facebook\
    \ 登录\n\n由于你将使用 Facebook 登录功能，因此必须创建一个 Facebook 应用来启用此功能。\n\n访问 [`https://developers.facebook.com/apps`](https://developers.facebook.com/apps)。点击“添加新应用”，并选择\
    \ iOS。你会看到一个“iOS 快速入门”页面。选择右上角的“跳过并创建应用编号”。Facebook 会要求你提供应用的显示名称和类别。输入最能描述你业务的内容，然后点击“创建应用编号”按钮。图\
    \ 4-6 显示了点击按钮后的页面。\n\n![A978-1-4842-1317-9_4_Fig6_HTML.jpg](img/A978-1-4842-1317-9_4_Fig6_HTML.jpg)\n\
    \n图 4-6. 使用 Facebook 开发者控制台添加新的 iOS 应用\n\n在查看应用编号（一个 16 位数字）之前，你可能还需要通过另一个安全检查页面。记下这个数字；你将在\
    \ Xcode 项目中使用它。\n\n你可以通过编辑第 4 章项目源代码的 `.plist` 文件来添加此密钥，如图 4-7 所示。\n\n![A978-1-4842-1317-9_4_Fig7_HTML.jpg](img/A978-1-4842-1317-9_4_Fig7_HTML.jpg)\n\
    \n图 4-7. 使用 Xcode 项目的 `.plist` 文件配置 Facebook 开发者应用编号\n\n创建一个名为 `FacebookAppID`\
    \ 的键，其值为字符串，并将 16 位应用编号添加进去。\n\n创建一个名为 `FacebookDisplayName` 的键，其值为字符串，并将我们在 Facebook\
    \ 应用仪表盘中已有的显示名称添加进去。\n\n创建一个名为 `URL types` 的数组键，其中包含一个名为 `URL Schemes` 的数组子项。为其提供一个以\
    \ `fb` 为前缀的应用编号项；它应该看起来像 `fb1235789899153886` 这样。对于文档角色，使用默认参数：编辑器。\n\n**注意**\
    \  \nFacebook 有关于如何创建 Facebook 应用的详细文档。要了解更多信息，请访问 [`https://developers.facebook.com/docs/ios/getting-started`](https://developers.facebook.com/docs/ios/getting-started)。\n\
    \n# 管理依赖：CocoaPods\n\n作为一名 iOS 开发者，你应该熟悉 CocoaPods。CocoaPods 是 Swift 和 Objective-C\
    \ 的 Cocoa 项目的依赖管理器。它拥有数千个库，可以帮助你优雅地扩展项目。\n\n如果你还没有在 Mac 电脑上安装 CocoaPods，现在是时候安装了；你将使用\
    \ CocoaPods 安装所有 Parse 相关的 SDK 和其他库。\n\n**注意**  \n访问 [`https://guides.cocoapods.org/using/getting-started.html#getting-started`](https://guides.cocoapods.org/using/getting-started.html#getting-started)\
    \ 可以开始使用 CocoaPods 并获取故障排除提示。\n\n通过在终端中运行以下命令来安装 CocoaPods：\n\n```\n$ sudo gem\
    \ install cocoapods\n```\n"
- fmt: "# Install the Podfile\n\nYour Podfile consists of a few Parse-related libraries,\
    \ the core Parse iOS SDK, the Parse UI iOS SDK, the Facebook iOS SDK, and ParseFacebookUtility\
    \ iOS SDK. This is what your current Podfile looks like.\n\n```\nsource 'https://github.com/CocoaPods/Specs.git'\n\
    \npod 'Parse'\npod 'ParseFacebookUtils'\npod 'Facebook-iOS-SDK'\npod 'ParseUI'\n\
    ```\n\nThis Podfile comes with [Chapter 4](#A978-1-4842-1317-9_4_Chapter.html)\
    \ source code. After you have installed Cocoapods, simply run:\n\n`pod install`\n\
    \nin your project directory. All dependent SDKs will be pulled and added to our\
    \ project automatically. Remember, from now on, you will use `Xcworkspace`, which\
    \ is created during the process of adding dependent SDKs.\n\nWhen you want to\
    \ keep up those dependent SDKs with the latest ones, you run the following command\
    \ in a Terminal window whenever you set a fit:\n\n`pod update`\n\n## Implement\
    \ a Progress Indicator: SVProgressHud\n\nIn iOS development, it's common to show\
    \ a pop-up message to tell a user some simple information such as content saved,\
    \ error occurs, etc. The standard iOS way to handle this case is to use `UIAlertController`.\
    \ For instance, to indicate to a user that a saving action is successful, use\
    \ the following code:\n\n```\nUIAlertController* alert = [UIAlertController alertControllerWithTitle:@\"\
    Success\"\n                                                           message:@\"\
    Your data is saved.\"\n                                                    preferredStyle:UIAlertControllerStyleAlert];\n\
    \    UIAlertAction* defaultAction = [UIAlertAction actionWithTitle:@\"OK\" style:UIAlertActionStyleDefault\n\
    \                                                     handler:^(UIAlertAction\
    \ * action) {}];\n    [alert addAction:defaultAction];\n    [self presentViewController:alert\
    \ animated:YES completion:nil];\n```\n\nThe issue with `UIAlertViewController`\
    \ is that a user has to tap the \"OK\" button to dismiss this alert. Implementation-wise,\
    \ you have repeatedly written the same code over and over across an app.\n\nTo\
    \ emphasize the implementation of the business logic of an e-commerce iPhone app,\
    \ try to use dependent libraries as little as possible. However, I do want to\
    \ introduce the `SVProgessHud` library. `SVProgressHUD` is a clean and easy-to-use\
    \ HUD meant to display the progress of an ongoing task, or just simply display\
    \ a message. To show a success message:\n\n`[SVProgressHUD showSuccessWithStatus:@\"\
    Successfully saved\"];`\n\nTo show an error message:\n\n`[SVProgressHUD showErrorWithStatus:[error\
    \ localizedDescription]];`\n\nIn either case, the `SVProgressHud` will be automatically\
    \ dismissed after three seconds.\n\nTo show a data loading status and dismiss\
    \ the status once the data loading is finished, you can use `SVProgressHud` in\
    \ this way:\n\n```\n[SVProgressHUD show];\n[product saveInBackgroundWithBlock:^(BOOL\
    \ success, NSError *error) {\n        [SVProgressHUD dismiss];\n        if (!error)\
    \ {\n            [SVProgressHUD showSuccessWithStatus:@\"Saved\"];\n        }\
    \ else {\n            [SVProgressHUD showErrorWithStatus:[error localizedDescription]];\n\
    \        }\n}];\n```\n\nNow, you can edit your Podfile and add the `SVProgressHud`\
    \ library dependency:\n\n`pod 'SVProgressHUD'`\n\nAnd update pods again:\n\n`pod\
    \ update`\n\n> **Note:** To find more about `SVProgressHud` and how you can customize\
    \ its appearance, go to [https://github.com/TransitApp/SVProgressHUD](https://github.com/TransitApp/SVProgressHUD).\n\
    \n## Summary\n\nIn this chapter, I covered how to set up a Parse project on parse.com.\
    \ I also introduced a custom class to keep track of important keys I obtained\
    \ from Parse.com, Stripe.com, and Mailgun.com. I also gave a brief overview on\
    \ how to apply for a Facebook Developer account and then set the Facebook App\
    \ ID with the proposed app. In the last part of this chapter, I described the\
    \ Podfile that you will use in this book.\n\n# 5. Product Category\n\nElectronic\
    \ supplementary material The online version of this chapter (doi:[10.1007/978-1-4842-1317-9_5](http://dx.doi.org/10.1007/978-1-4842-1317-9_5))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    The Beauty & Me sample app that accompanies this book presents products to users\
    \ in a traditional way. First of all, we let users sell all brands we are carrying.\
    \ If you don't know any brand, I will make up some, such as Origins, NUDE Skincare,\
    \ etc. Under each brand, we have all products. When a user selects a product,\
    \ the app displays the product detail. This chapter introduces the brand, or a\
    \ more general name, product category.\n\nIn iOS app development, Model-View-Controller\
    \ (MVC) is a widely used design pattern. I have structured the remaining chapters\
    \ such that they follow this MVC pattern: first, I present the models used for\
    \ implementing the feature discussed, then the views, and finally the controllers\
    \ when applicable.\n\nIn this chapter, you learn about:\n\n- The product category\
    \ model\n- The category view (`UITableViewCell`)\n- The category controller\n\
    - Putting model, view, and controller together with `UIStoryboard`\n- Adding sample\
    \ data in Parse.com"
  raw: '## Install the Podfile


    Your Podfile consists of a few Parse-related libraries, the core Parse iOS SDK,
    the Parse UI iOS SDK, the Facebook iOS SDK, and ParseFacebookUtility iOS SDK.
    This is what your current Podfile looks like.


    `source ''` [`https://github.com/CocoaPods/Specs.git`](https://github.com/CocoaPods/Specs.git)
    `''`


    `pod ''Parse''`


    `pod ''ParseFacebookUtils''`


    `pod ''Facebook-iOS-SDK''`


    `pod ''ParseUI''`


    This Podfile comes with [Chapter 4](#A978-1-4842-1317-9_4_Chapter.html) source
    code. After you have installed Cocoapods, simply run:


    `pod install`


    in your project directory. All dependent SDKs will be pulled and added to our
    project automatically. Remember, from now on, you will use Xcworkspace, which
    is created during the process of adding dependent SDKs.


    When you want to keep up those dependent SDKs with the latest ones, you run the
    following command in a Terminal window whenever you set a fit:


    `pod update`


    ## Implement a Progress Indicator: SVProgressHud


    In iOS development, it’s common to show a pop-up message to tell a user some simple
    information such as content saved, error occurs, etc. The standard iOS way to
    handle this case is to use UIAlertController. For instance, to indicate to a user
    that a saving action is successful, use the following code:


    `UIAlertController* alert = [UIAlertController alertControllerWithTitle:@"Success"`


                                                               `message:@"Your data
    is saved."`


                                                    `preferredStyle:UIAlertControllerStyleAlert];`


        `UIAlertAction* defaultAction = [UIAlertAction actionWithTitle:@"OK" style:UIAlertActionStyleDefault`


                                                         `handler:^(UIAlertAction
    * action) {}];`


        `[alert addAction:defaultAction];`


        `[self presentViewController:alert animated:YES completion:nil];`


    The issue with UIAlertViewController is that a user has to tap the “OK” button
    to dismiss this alert. Implementation-wise, you have repeatedly written the same
    code over and over across an app.


    To emphasize the implementation of the business logic of an e-commerce iPhone
    app, try to use dependent libraries as little as possible. However, I do want
    to introduce the SVProgessHud library. SVProgressHUD is a clean and easy-to-use
    HUD meant to display the progress of an ongoing task, or just simply display a
    message. To show a success message:


    `[SVProgressHUD showSuccessWithStatus:@"Successfully saved"];`


    To show an error message:


    `[SVProgressHUD showErrorWithStatus:[error localizedDescription]];`


    In either case, the SVProgressHud will be automatically dismissed after three
    seconds.


    To show a data loading status and dismiss the status once the data loading is
    finished, you can use SVProgressHud in this way:


    `[SVProgressHUD show];`


    `[product saveInBackgroundWithBlock:^(BOOL success, NSError *error) {`


            `[SVProgressHUD dismiss];`


            `if (!error) {`


                `[SVProgressHUD showSuccessWithStatus:@"Saved"];`


            `} else {`


                `[SVProgressHUD showErrorWithStatus:[error localizedDescription]];`


            `}`


    `}];`


    Now, you can edit your Podfile and add the SVProgressHud library dependency:


    `pod ''SVProgressHUD''`


    And update pods again:


    `pod update`


    Note


    To find more about SVProgressHud and how you can customize its appearance, go
    to [`https://github.com/TransitApp/SVProgressHUD`](https://github.com/TransitApp/SVProgressHUD)
    .


    ## Summary


    In this chapter, I covered how to set up a Parse project on parse.com. I also
    introduced a custom class to keep track of important keys I obtained from Parse.com,
    Stripe.com, and Mailgun.com. I also gave a brief overview on how to apply for
    a Facebook Developer account and then set the Facebook App ID with the proposed
    app. In the last part of this chapter, I described the Podfile that you will use
    in this book.


    # 5. Product Category


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1317-9_​5](http://dx.doi.org/10.1007/978-1-4842-1317-9_5))
    contains supplementary material, which is available to authorized users.


    The Beauty & Me sample app that accompanies this book presents products to users
    in a traditional way. First of all, we let users sell all brands we are carrying.
    If you don’t know any brand, I will make up some, such as Origins, NUDE Skincare,
    etc. Under each brand, we have all products. When a user selects a product, the
    app displays the product detail. This chapter introduces the brand, or a more
    general name, product category.


    In iOS app development, Model-View-Controller (MVC) is a widely used design pattern.
    I have structured the remaining chapters such that they follow this MVC pattern:
    first, I present the models used for implementing the feature discussed, then
    the views, and finally the controllers when applicable.


    In this chapter, you learn about:


    *   The product category model

    *   The category view (UITableViewCell)

    *   The category controller

    *   Putting model, view, and controller together with UIStoryboard

    *   Adding sample data in Parse.com'
