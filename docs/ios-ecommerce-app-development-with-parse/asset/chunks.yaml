    ## Introduction


    In this comprehensive guide to creating an e-commerce iOS app using Objective-C
    and Parse, the most popular and powerful Backend as a Service (BaaS) provider.
    I will walk you through every step—from collecting requirements; prototyping the
    visual interface; setting up the project with Xcode and Parse; creating the data
    model with Parse; presenting, searching, filtering, and favoriting products; managing
    the shopping bag; processing the payment; and managing a user account—always with
    security best practices in mind.


    The book uses a complete and functioning e-commerce iPhone app as the example,
    along with various Parse products, to present the most popular use case of an
    e-commerce mobile app, such as user account creation, logging in with Facebook,
    user e-mail verification, paying with Stripe and Apple Pay, sending e-mail with
    Mailgun, and managing customer payment methods and order history.


    [Chapter 1](#A978-1-4842-1317-9_1_Chapter.html) presents a broad requirements
    overview of an e-commerce iOS app, based on the Apple Store iPhone app.


    [Chapter 2](#A978-1-4842-1317-9_2_Chapter.html) walks you through the process
    of using Xcode to prototype the e-commerce iPhone app with minimum code.


    [Chapter 3](#A978-1-4842-1317-9_3_Chapter.html) gives you an overview of what
    Parse offers, and [Chapter 4](#A978-1-4842-1317-9_4_Chapter.html) explains how
    to set up this project, including services, such as Facebook Developer, Mailgun,
    and Stripe, which you will need later.


    [Chapters 5](#A978-1-4842-1317-9_5_Chapter.html), [6](#A978-1-4842-1317-9_6_Chapter.html),
    and [7](#A978-1-4842-1317-9_7_Chapter.html) detail how to build product categories,
    product lists, and product details, along with features such as searching, filtering,
    etc.


    [Chapters 8](#A978-1-4842-1317-9_8_Chapter.html) and [9](#A978-1-4842-1317-9_9_Chapter.html)
    present the user interface and functionality of signing up and logging in a user
    and Facebook Login.


    [Chapters 10](#A978-1-4842-1317-9_10_Chapter.html)–[14](#A978-1-4842-1317-9_14_Chapter.html)
    detail how to build a shopping bag, how to charge a credit card, or how to let
    a user pay with Apple Pay. It includes some back-end code that we have to write.


    [Chapter 15](#A978-1-4842-1317-9_15_Chapter.html) focuses on a user’s account.
    This is the place that the user can log out, view an order history, and create
    a favorites product list.


    [Chapter 16](#A978-1-4842-1317-9_16_Chapter.html) demonstrates how to add products.
    This is a hidden feature available only to an admin.


    [Chapter 17](#A978-1-4842-1317-9_17_Chapter.html) is a bonus chapter. I show you
    how to use push notification as a way of promotion.


    [Chapter 18](#A978-1-4842-1317-9_18_Chapter.html) gives details about security.


    [Chapter 19](#A978-1-4842-1317-9_19_Chapter.html) lists some extra features from
    Parse that you can use to make your product better, including e-mail verification,
    password reset, Parse Analytics, and Crash Reports.


    ## Audience


    This book is for experienced iOS developers confident with Objective-C, iOS, Xcode,
    and some back-end knowledge; and for those interested in building an e-commerce
    iPhone app. In other words, intermediate knowledge of iOS development and object-oriented
    programming is assumed, and basic knowledge of e-commerce principles will also
    be of benefit.


    If you don’t have the experience of implementing a fully functional back end but
    still want to build a web services–based iPhone app, this book is for you. This
    book is also great for experienced mobile app developers wanting to enhance their
    skills and learn new tools.'
