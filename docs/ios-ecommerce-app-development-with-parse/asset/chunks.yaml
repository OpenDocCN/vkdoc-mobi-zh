    The next method is the FBRequest instance method, `startWithCompletionHandler`.
    This asynchronous callback will return either an error or the result you are looking
    for. Similarly, you can handle any error by showing it to the user; in the meantime,
    leave this screen, and return to the main app. You don’t want the user to get
