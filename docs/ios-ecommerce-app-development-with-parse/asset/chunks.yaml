    ## Summary


    In this chapter I explained how to log in a registered user while providing an
    intuitive and friendly user experience. I also covered how to implement Facebook
    Login with Apps, obtain a user’s Facebook profile, and then save the information
    to the Parse backend by incorporating the Parse ParseFacebookUtilsV4 SDK.


    # 10. Shopping Bag


    At this point, if you followed along, you have a registered user who is ready
    to add products into his or her shopping bag. In this chapter, I show you how
    to add a product to the shopping bag, update the product’s quantity, delete an
    individual product or all of them from the bag, and update the total amount. The
    customer should be able to see what’s in the bag when he or she returns to it.


