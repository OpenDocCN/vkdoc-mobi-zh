- fmt: "# Shopping Bag Controller\n\nRecall that in [Chapter 7](#A978-1-4842-1317-9_7_Chapter.html)\
    \ I instructed you to add a to-do comment for the routine that enables you to\
    \ add an item to the shopping bag:\n\n```\n-(IBAction)onBag:(id)sender\n{\n  \
    \  if ([PFAnonymousUtils isLinkedWithUser:[PFUser currentUser]]) {\n        [self\
    \ showWarning];\n    } else {\n        //todo:\n    }\n}\n```\n\nNow it’s time\
    \ to complete this feature.\n\nFor me personally, I want this experience to be\
    \ as simple as possible. If “Add to Bag” is tapped, the item is silently added\
    \ to the shopping bag and the user is informed that the item has been added. The\
    \ user won’t be able to specify the quantity during this process; users can change\
    \ the quantity before checkout. You don’t want to implement the identical features\
    \ at two different places.\n\nYou need to handle two different use cases:\n\n\
    - The shopping bag is empty. In this case, you create a new `EMABOrderItem` and\
    \ `EMABOrder` instance.\n- The shopping bag is not empty. In this case, you need\
    \ to query the Parse back end. First, query the back end to see whether the user\
    \ has an unfinished order. If so, create a local `EMABOrder` instance to keep\
    \ track of it. On second thought, there will be two cases after the user taps\
    \ “Add to the Bag”: (1) the existing order doesn’t contain this product; (2) the\
    \ user might have the same item in the bag already, and now we interpret it that\
    \ the user wants to add the same item again.\n\nWith this in mind, add the following\
    \ property to the `EMABProductDetailViewController` class:\n\n```\n@property(nonatomic,\
    \ strong) EMABOrder *order;\n```\n\nSet up a helper method `-(void)queryForUnfinishedOrder`.\n\
    \n```\n-(void)queryForUnfinishedOrder{\n    PFQuery *orderQuery = [EMABOrder queryForCustomer:[EMABUser\
    \ currentUser] orderStatus:ORDER_NOT_MADE];\n    __weak typeof(self) weakSelf\
    \ = self;\n    [orderQuery getFirstObjectInBackgroundWithBlock:^(PFObject *order,\
    \ NSError *error){\n        if (!error) {\n            weakSelf.order = (EMABOrder\
    \ *)order;\n        }\n    }];\n}\n```\n\nAlso create a helper method to check\
    \ whether an order items array contains a product. Basically, you iterate this\
    \ array and check the `objectId` property of this product. Here is the code:\n\
    \n```\n-(int)containsProduct:(NSArray *)items target:(EMABProduct *)product {\n\
    \    int index = -1;\n    for (int i = 0; i<[items count]; i++){\n        EMABOrderItem\
    \ *item = items[i];\n        if ([item.product.objectId isEqualToString:self.product.objectId])\
    \ {\n            index = i;\n            break;\n        }\n    }\n    return\
    \ index;\n}\n```\n\n`EMABOrder` has an `items` property that is an array of `EMABOrderItem`\
    \ instances. When adding a product to this order, you need to consider the following\
    \ steps:\n\nCreate an instance of `EMABOrderItem`. Let the product be the product\
    \ currently viewed, and set the quantity to 1. Get the `items` array from the\
    \ order instance. If it’s null, create a new `NSArray` with the item from step\
    \ 1. Let this `NSArray` instance be the `items` of this order. If it’s not null,\
    \ create a mutable copy of the `items`, and add a new element that is from step\
    \ 1. Then give the immutable copy to this order as its `items`.\n\nCreate a helper\
    \ method in the `EMBAOrder` class, and name it `-(void)addSingleProduct:(EMABProduct\
    \ *)product`\n\n```\n-(void)addSingleProduct:(EMABProduct *)product{\n    EMABOrderItem\
    \ *item = [EMABOrderItem object];\n    [item setProduct:product];\n    [item setQuantity:1];\n\
    \    if (self.items) {\n        NSMutableArray *existedItems = [self.items mutableCopy];\n\
    \        [existedItems addObject:item];\n        [self setItems:[existedItems\
    \ copy]];\n    } else\n        [self setItems:@[item]];\n}\n```\n\nFinally, it’s\
    \ time to implement the `onBag:` IBAction method. Follow this logic sequence:\n\
    \nDo you have a registered user? If not, show a warning to ask the user to register\
    \ or log in.\nDo you have an unfinished order? If not, create a new `EMABOrder`\
    \ instance, set properties such as `customer` and `orderStatus`, and call the\
    \ `-(void)addSingleProduct` method. If yes, check whether this unfinished order\
    \ contains the product you want to add to the bag. If not, call `-(void)addSingleProduct`\
    \ and all dirty work will be handled by this method. If affirmative, you need\
    \ to find out which item has this product, change the item’s quantity by adding\
    \ 1, then replace the items with the new one. In the end, you save this order\
    \ instance asynchronically and let the user know once the save is done.\n\nHere\
    \ is the code:\n\n```\n-(IBAction)onBag:(id)sender\n{\n    if (![PFUser currentUser])\
    \ {\n        [self showWarning];\n    } else {\n        if (self.order) {\n  \
    \          if ([self.order.items count] > 0) {\n                if ([self containsProduct:self.order.items\
    \ target:self.product] > -1) {\n                    int index = [self containsProduct:self.order.items\
    \ target:self.product];\n                    NSMutableArray *eItems = [NSMutableArray\
    \ arrayWithArray:self.order.items];\n                    EMABOrderItem *foundItem\
    \ = eItems[index];\n                    [foundItem setQuantity:foundItem.quantity+1];\n\
    \                    [eItems replaceObjectAtIndex:index withObject:foundItem];\n\
    \                    self.order.items = [eItems copy];\n                } else\
    \ {\n                    [self.order addSingleProduct:self.product];\n       \
    \         }\n            } else {\n                [self.order addSingleProduct:self.product];\n\
    \            }\n        } else {\n            self.order = [EMABOrder object];\n\
    \            [self.order setCustomer:[EMABUser currentUser]];\n            [self.order\
    \ setOrderStatus:ORDER_NOT_MADE];\n            [self.order addSingleProduct:self.product];\n\
    \        }\n    }\n    [self.order saveInBackgroundWithBlock:^(BOOL success, NSError\
    \ *error){\n        if (!error) {\n            [self showSuccess];\n        }\n\
    \    }];\n}\n```\n\nThis probably is the most complicated logic you have handled\
    \ so far in this book. The user won’t know anything about your implementation\
    \ detail. What happens is that a pop-up shows “Successfully added” once after\
    \ the user taps the “Add to Bag” button.\n\nNext, the `EMABBagTableViewController`,\
    \ which is a subclass of `UITableViewController`. Here is the header file:\n\n\
    ```\n#import <UIKit/UIKit.h>\n\n@interface EMABBagTableViewController : UITableViewController\n\
    \n@end\n```\n\nFigure [10-2](#A978-1-4842-1317-9_10_Chapter.html#Fig2) shows what\
    \ the Bag screen looks like.\n\n![A978-1-4842-1317-9_10_Fig2_HTML.jpg](A978-1-4842-1317-9_10_Fig2_HTML.jpg)\n\
    \nFigure 10-2. The Bag screen\n\nYou have already prepared `EMABOrderItemTableViewCell`\
    \ for the `UITableViewCell`; you also need some other UI elements to show information\
    \ such as order number, order date, total amount, and also the “Buy with Credit\
    \ Card” and “Buy with Apple Pay” buttons.\n\nYou will use the `UITableView` header\
    \ and footer views as the container views. The header view will be used to contain\
    \ two `UILabels`: one `UILabel` shows the order number, the other `UILabel` shows\
    \ the order date.\n\nThink about the order number for a moment. You know the order\
    \ number needs to be created on the Parse back end. And an order can have an order\
    \ number only if it has been placed successfully. In other words, you should not\
    \ create an order number when the user only puts items in the shopping bag. So\
    \ why do you create a `UILabel` for an order number? You can look at it in two\
    \ ways. One is to show a “Your bag is empty” message as shown later. You can also\
    \ reuse this screen to show an order detail after this user finishes the checkout\
    \ process and wants to revisit the order details. (I will cover this scenario\
    \ also in [Chapter 16](#A978-1-4842-1317-9_16_Chapter.html).)\n\nThe footer view\
    \ of this `UITableView` contains two `UILabels`: One is for showing “Total:” text,\
    \ the other is for showing the total amount in this bag. You also need two `UIButtons`:\
    \ One is for checking out with a credit card, the other is for checking out with\
    \ Apple Pay. As you can see, the UI layout itself is pretty straightforward.\n\
    \nHere is the `EMABBagTableViewController` header category:\n\n```\n@interface\
    \ EMABBagTableViewController(){\n}\n@property (nonatomic, weak) IBOutlet UILabel\
    \ *ordeNoLabel;\n@property (nonatomic, weak) IBOutlet UILabel *ordeDateLabel;\n\
    @property (nonatomic, weak) IBOutlet UILabel *totalLabel;\n@property (nonatomic,\
    \ weak) IBOutlet UILabel *totalTextLabel;\n@property (nonatomic, weak) IBOutlet\
    \ UIButton *payWithCCButton;\n@property (nonatomic, weak) IBOutlet UIButton *payWithApplePayButton;\n\
    @property (nonatomic, strong) EMABOrder *order;\n@end\n```\n\nIn the implementation,\
    \ start from the `-(void)viewWillAppear`. As you have done in the `EMABProductDetailViewController`,\
    \ query an unfinished order for this user.\n\n```\n-(void)viewWillAppear:(BOOL)animated\n\
    {\n    [super viewWillAppear:animated];\n    if ([EMABUser currentUser]) {\n \
