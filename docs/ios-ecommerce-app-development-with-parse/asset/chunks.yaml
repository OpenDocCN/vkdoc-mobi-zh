    \n## Summary\n\nIn this chapter I explained how to log in a registered user while\
    \ providing an intuitive and friendly user experience. I also covered how to implement\
    \ Facebook Login with Apps, obtain a user’s Facebook profile, and then save the\
    \ information to the Parse backend by incorporating the Parse `ParseFacebookUtilsV4`\
    \ SDK.\n\n# 10. Shopping Bag\n\nAt this point, if you followed along, you have\
    \ a registered user who is ready to add products into his or her shopping bag.\
