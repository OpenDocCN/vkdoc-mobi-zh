    `HISTORY`


    `};`


    You also need a property to represent the current logged-in user.


    `@interface EMABUserAccountTableViewController ()`


    `@property (nonatomic, strong) EMABUser *customer;`


    `@end`


    In general, this screen is pretty simple to implement. Most of the following code
    is self-explanatory:


    `@implementation EMABUserAccountTableViewController`


    `- (void)viewDidLoad {`


    `[super viewDidLoad];`


    `self.customer = [EMABUser currentUser];`


    `}`


    The user is instantiated on `-(void)viewDidLoad`. If there is no logged-in user,
    `self.customer` will be nil. You will use this information to decide how many
    cells you need for the UITableView.


    `#pragma mark - Table view data source`


    `- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView {`


    `// Return the number of sections.`


    `return 1;`


    `}`


    `- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section
    {`


    `// Return the number of rows in the section.`


    `return (self.customer)?5:1;`


    `}`


    If there is no valid user, only one cell is returned; for any valid user, five
    cells are created.


    `- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath
    *)indexPath {`


    `UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@"AccountCell"
    forIndexPath:indexPath];`


    `// Configure the cell…`


    `NSString *title = @"";`


    `NSString *subtitle = @"";`


    `switch (indexPath.row) {`


    `case SIGNED_IN:`


    `title = (self.customer)?NSLocalizedString(@"Sign In", @""): NSLocalizedString(@"Sign
    Out", @"");`


    `subtitle = self.customer.email;`


    `break;`


    `case CONTACT_INFO:`


    `title = NSLocalizedString(@"Contact Info", @"");`


    `break;`


    `case PAYMENT:`


    `title = NSLocalizedString(@"Payment", @"");`


    `break;`


    `case FAVORITE:`


    `title = NSLocalizedString(@"Favorite", @"");`


    `break;`


    `case HISTORY:`


    `title = NSLocalizedString(@"Order History", @"");`


    `break;`


    `default:`


    `break;`


    `}`


    `cell.textLabel.text = title;`


    `cell.detailTextLabel.text = subtitle;`


    `return cell;`


    `}`


    The following UITableView delegate methods accomplish two things:


    *   The first cell is for letting users sign out if the cell is tapped, corresponding
    to “Sign Out” text. For a user not logged in, the Signup or Login screen is displayed,
    corresponding to “Log In” text.

    *   The remaining cells present the different view controllers based on the cell
    selected.


    `#pragma mark -`


    `-(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath
    *)indexPath  {`


    `NSString *viewControllerIdentifier = @"";`


    `switch (indexPath.row) {`


    `case SIGNED_IN:`


    `if (self.customer) {`


    `[self signOut];`


    `} else {`


    `[self presentSignupOrLogin];`


    `}`


    `break;`


    `case CONTACT_INFO:`


    `viewControllerIdentifier = @"EMABUserProfileTableViewController";`


    `break;`


    `case FAVORITE:`


    `viewControllerIdentifier = @"MABUserFavoriteHistoryTableViewControlle";`


    `break;`


    `case HISTORY:`


    `viewControllerIdentifier = @"EMABUserOrderHistoryTableViewController";`


    `break;`


    `case PAYMENT:`


    `viewControllerIdentifier = @"EMABUserPaymentMethodTableViewController";`


    `break;`


    `default:`


    `break;`


    `}`


    `if ([viewControllerIdentifier length] > 0) {`


    `UIViewController *viewController = [self.storyboard instantiateViewControllerWithIdentifier:viewControllerIdentifier];`


    `[self.navigationController pushViewController:viewController animated:YES];`


    `}`


    `}`


    `-(void)signOut {`


    `[EMABUser logOut];`


    `[self.tableView reloadData];`


    `}`


    `-(void)presentSignupOrLogin {`


    `UIStoryboard *dispatchStoryboard = [UIStoryboard storyboardWithName:@"LoginSignup"
    bundle:nil];`


    `UINavigationController *navController = (UINavigationController *)[dispatchStoryboard
    instantiateInitialViewController];`


    `[self presentViewController:navController animated:YES completion:nil];`


    `}`


    `@end`


    Figure [15-1](#A978-1-4842-1317-9_15_Chapter.html#Fig1) shows the final result.


    ![A978-1-4842-1317-9_15_Fig1_HTML.jpg](A978-1-4842-1317-9_15_Fig1_HTML.jpg)


    Figure 15-1.


    Screen of My Account UITableViewController


    ## Contact Info


    I have shown you how to implement EMABUserProfileTableViewController in [Chapter
    11](#A978-1-4842-1317-9_11_Chapter.html). When a user wants to view and edit his
    or her shipping address, he or she has a chance to open EMABUserProfileTableViewController
    from “Contact Info” in “My Account,” then view and edit if necessary.


    ## Payment Method


    Customers may use different credit cards, whether they shop at a brick and mortar
    store, online, or via an app. If you save an `EMABPaymentMethod` instance every
    time you see a different credit card, the user might have several cards stored
    with you. You need to provide a place for the user to manage those credit cards,
    such as setting one card as the default one, deleting a credit card, or adding
    a new one.


    This section covers how to display all credit cards associated with a user, as
    well as how to let users add additional ones and/or delete some.


    The model for this section is the EMABPaymentMethod model.


    ### View


    Use a standard UITableViewCell to display the basic credit card information such
    as the card’s last four digits and expiration date. Figure [15-2](#A978-1-4842-1317-9_15_Chapter.html#Fig2)
    shows the basic UITableViewCell.


    ![A978-1-4842-1317-9_15_Fig2_HTML.jpg](A978-1-4842-1317-9_15_Fig2_HTML.jpg)


    Figure 15-2.


    The Payment method cell shows the last four digits and the expiration date'
  trans: "\n# 创建“我的账户”界面\n\n首先，创建一个`UITableViewController`的子类，并将其命名为`EMABUserAccountTableViewController`。接下来，你将把一些静态信息整理到`UITableView`中。为所需的单元格内容定义一个枚举类型。\n\
    \n```\ntypedef NS_OPTIONS(NSInteger, TABLE_ROW){\n    SIGNED_IN = 0,\n    CONTACT_INFO\
    \ = 1,\n    PAYMENT = 2,\n    FAVORITE = 3,\n    HISTORY\n};\n```\n\n你还需要一个属性来表示当前已登录的用户。\n\
    \n```\n@interface EMABUserAccountTableViewController ()\n@property (nonatomic,\
    \ strong) EMABUser *customer;\n@end\n```\n\n总的来说，这个界面的实现相当简单。以下大部分代码都一目了然：\n\n\
    ```\n@implementation EMABUserAccountTableViewController\n\n- (void)viewDidLoad\
    \ {\n    [super viewDidLoad];\n    self.customer = [EMABUser currentUser];\n}\n\
    ```\n\n用户在`-(void)viewDidLoad`方法中实例化。如果没有已登录的用户，`self.customer`将为 nil。你将利用这一信息来决定`UITableView`需要显示多少个单元格。\n\
    \n```\n#pragma mark - Table view data source\n\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
    \ *)tableView {\n    // 返回节（section）的数量\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView\
    \ *)tableView numberOfRowsInSection:(NSInteger)section {\n    // 返回该节中的行数\n  \
    \  return (self.customer)?5:1;\n}\n```\n\n如果没有有效用户，则只返回一个单元格；对于任何有效用户，则创建五个单元格。\n\
    \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath {\n    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@\"\
    AccountCell\" forIndexPath:indexPath];\n    // 配置单元格…\n    NSString *title = @\"\
    \";\n    NSString *subtitle = @\"\";\n    switch (indexPath.row) {\n        case\
    \ SIGNED_IN:\n            title = (self.customer)?NSLocalizedString(@\"Sign In\"\
    , @\"\"): NSLocalizedString(@\"Sign Out\", @\"\");\n            subtitle = self.customer.email;\n\
    \            break;\n        case CONTACT_INFO:\n            title = NSLocalizedString(@\"\
    Contact Info\", @\"\");\n            break;\n        case PAYMENT:\n         \
    \   title = NSLocalizedString(@\"Payment\", @\"\");\n            break;\n    \
    \    case FAVORITE:\n            title = NSLocalizedString(@\"Favorite\", @\"\"\
    );\n            break;\n        case HISTORY:\n            title = NSLocalizedString(@\"\
    Order History\", @\"\");\n            break;\n        default:\n            break;\n\
    \    }\n    cell.textLabel.text = title;\n    cell.detailTextLabel.text = subtitle;\n\
    \    return cell;\n}\n```\n\n以下`UITableView`代理方法实现了两个功能：\n\n* 第一个单元格用于让用户在点击该单元格时登出，对应“登出”文本。对于未登录的用户，则显示注册或登录界面，对应“登录”文本。\n\
    * 剩余的单元格根据所选单元格展示不同的视图控制器。\n\n```\n#pragma mark -\n\n-(void)tableView:(UITableView\
    \ *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath  {\n    NSString\
    \ *viewControllerIdentifier = @\"\";\n    switch (indexPath.row) {\n        case\
    \ SIGNED_IN:\n            if (self.customer) {\n                [self signOut];\n\
    \            } else {\n                [self presentSignupOrLogin];\n        \
    \    }\n            break;\n        case CONTACT_INFO:\n            viewControllerIdentifier\
    \ = @\"EMABUserProfileTableViewController\";\n            break;\n        case\
    \ FAVORITE:\n            viewControllerIdentifier = @\"MABUserFavoriteHistoryTableViewControlle\"\
    ;\n            break;\n        case HISTORY:\n            viewControllerIdentifier\
    \ = @\"EMABUserOrderHistoryTableViewController\";\n            break;\n      \
    \  case PAYMENT:\n            viewControllerIdentifier = @\"EMABUserPaymentMethodTableViewController\"\
    ;\n            break;\n        default:\n            break;\n    }\n    if ([viewControllerIdentifier\
    \ length] > 0) {\n        UIViewController *viewController = [self.storyboard\
    \ instantiateViewControllerWithIdentifier:viewControllerIdentifier];\n       \
    \ [self.navigationController pushViewController:viewController animated:YES];\n\
    \    }\n}\n\n-(void)signOut {\n    [EMABUser logOut];\n    [self.tableView reloadData];\n\
    }\n\n-(void)presentSignupOrLogin {\n    UIStoryboard *dispatchStoryboard = [UIStoryboard\
    \ storyboardWithName:@\"LoginSignup\" bundle:nil];\n    UINavigationController\
    \ *navController = (UINavigationController *)[dispatchStoryboard instantiateInitialViewController];\n\
    \    [self presentViewController:navController animated:YES completion:nil];\n\
    }\n\n@end\n```\n\n图 15-1 展示了最终结果。\n\n![A978-1-4842-1317-9_15_Fig1_HTML.jpg](img/A978-1-4842-1317-9_15_Fig1_HTML.jpg)\n\
    \n图 15-1. “我的账户”`UITableViewController`界面\n\n## 联系信息\n\n我在第 11 章中已经向你展示了如何实现`EMABUserProfileTableViewController`。当用户想要查看和编辑他/她的收货地址时，可以通过“我的账户”中的“联系信息”打开`EMABUserProfileTableViewController`，然后根据需要查看和编辑。\n\
    \n## 支付方式\n\n无论是在实体店、线上还是通过 App 购物，顾客可能使用不同的信用卡。如果每次遇到不同的信用卡你都保存一个`EMABPaymentMethod`实例，用户可能会在你这里存储多张卡。你需要提供一个地方让用户管理这些信用卡，例如设置一张卡为默认卡、删除一张信用卡或添加一张新卡。\n\
    \n本节介绍如何显示与用户关联的所有信用卡，以及如何让用户添加更多卡和/或删除一些卡。\n\n本节使用的模型是`EMABPaymentMethod`模型。\n\
    \n### 视图\n\n使用标准的`UITableViewCell`来显示基本的信用卡信息，例如卡号后四位和有效期。图 15-2 展示了基本的`UITableViewCell`。\n\
    \n![A978-1-4842-1317-9_15_Fig2_HTML.jpg](img/A978-1-4842-1317-9_15_Fig2_HTML.jpg)\n\
    \n图 15-2. 支付方式单元格显示卡号后四位和有效期\n"
- fmt: "### Controller\n\nFor the controller, create a `PFQueryTableViewController`\
    \ subclass and name it `EMABUserPaymentMethodTableViewController`. Here is how\
    \ to use `PFQueryTableViewController`, covered in the previous chapter:\n\n```\n\
    - (void)awakeFromNib {\n    [super awakeFromNib];\n    self.parseClassName = kPaymentMethod;\n\
    \    self.objectsPerPage = 10;\n    self.paginationEnabled = YES;\n    self.pullToRefreshEnabled\
    \ = YES;\n}\n\n- (PFQuery *)queryForTable {\n    PFQuery *query = [EMABPaymentMethod\
    \ queryForOwner:[EMABUser currentUser]];\n    if ([self.objects count] == 0) {\n\
    \        query.cachePolicy = kPFCachePolicyCacheThenNetwork;\n    }\n    return\
    \ query;\n}\n```\n\nThe `EMABPaymentMethod` model uses a helper query method,\
    \ `+(PFQuery *)queryForOwner:(EMABUser *)user;`\n\n```\n#pragma mark - UITableView\
    \ Datasource\n\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath object:(EMABPaymentMethod *)object{\n    UITableViewCell *cell =\
    \ [tableView dequeueReusableCellWithIdentifier:@\"PaymentMethodCell\" forIndexPath:indexPath];\n\
    \    if (indexPath.row == [[self objects] count]) {\n        cell.textLabel.text\
    \ = NSLocalizedString(@\"Load More…\", @\"\");\n    } else {\n        cell.textLabel.text\
    \ = [object friendlyCreditCardNumber];\n        cell.detailTextLabel.text = [object\
    \ friendlyExpirationMonthYear];\n    }\n    return cell;\n}\n```\n\nFor each cell,\
    \ use the `EMABPaymentMethod` helper method to show two pieces of information:\
    \ a formatted last four digits and the expiration date.\n\nYou want the user to\
    \ swipe to delete a credit card. To do so, you need to declare this with `-(void)viewDidLoad`.\n\
    \n```\nUISwipeGestureRecognizer *leftSwipe = [[UISwipeGestureRecognizer alloc]\
    \ initWithTarget:self action:@selector(onLeftSwipe:)];\n[leftSwipe setDirection:UISwipeGestureRecognizerDirectionRight];\n\
    leftSwipe.delegate = self;\n[self.tableView addGestureRecognizer:leftSwipe];\n\
    ```\n\nWhen a user makes a left swipe gesture, you find out which cell is swept\
    \ based on the point on the screen. Then call the `PFObject` asynchronous deletion\
    \ method, and make another query method call to update the UI:\n\n```\n-(void)onLeftSwipe:(UIGestureRecognizer\
    \ *)gestureRecognizer\n{\n    CGPoint point = [gestureRecognizer locationInView:self.tableView];\n\
    \    NSIndexPath *indexPath = [self.tableView indexPathForRowAtPoint:point];\n\
    \    if (indexPath) {\n        EMABPaymentMethod *paymentMethod = (EMABPaymentMethod\
    \ *)[self objectAtIndexPath:indexPath];\n        __weak typeof(self) weakSelf\
    \ = self;\n        [paymentMethod deleteInBackgroundWithBlock:^(BOOL succeeded,\
    \ NSError *error) {\n            if (!error) {\n                [weakSelf loadObjects];\n\
    \            }\n        }];\n    }\n}\n```\n\nAs shown in Figure 15-3, the \"\
    +\" bar button item (see [Chapter 2](#A978-1-4842-1317-9_2_Chapter.html)) is set\
    \ up to allow the user to add a new credit card. You have had `EMABAddCreditCardViewController`,\
    \ so simply present it; a `EMABPayment` instance will be created in the process.\n\
    \n![A978-1-4842-1317-9_15_Fig3_HTML.jpg](A978-1-4842-1317-9_15_Fig3_HTML.jpg)\n\
    \n**Figure 15-3.** A \"+\" bar button item on `UINavigationBar` lets users add\
    \ another payment method\n\nHere is the code:\n\n```\n#pragma mark - IBAction\n\
    \n-(IBAction)onAdd:(id)sender\n{\n    EMABAddCreditCardViewController *viewController\
    \ = (EMABAddCreditCardViewController *)[self.storyboard instantiateViewControllerWithIdentifier:@\"\
    EMABAddCreditCardViewController\"];\n    __weak typeof(self) weakSelf = self;\n\
    \    viewController.finishBlock = ^(NSString *customerId){\n        [weakSelf\
    \ loadObjects];\n    };\n    [self.navigationController pushViewController:viewController\
    \ animated:YES];\n}\n\n@end\n```\n\nIn the previous code, `-(void)loadObjects`\
    \ is a `PFQueryTableViewController` method. You use it to make an API request\
    \ to load new credit card information and show it on this table view.\n\n## My\
    \ Order History\n\nPer requirements, users should be able to browse all of their\
    \ order history and also view details for a particular order. In this section,\
    \ I cover how to implement this feature.\n\n### View\n\nFigure 15-4 shows how\
    \ you want to display a user's order history in a `UITableViewCell`. It's pretty\
    \ simple. Use, in this order, a `UILabel` to show the order date, a `UILabel`\
    \ to show the total amount of the order, and the product's name. You might have\
    \ multiple products in one order. Since you don't have the space for displaying\
    \ all products in an order, only show the first one.\n\n![A978-1-4842-1317-9_15_Fig4_HTML.jpg](A978-1-4842-1317-9_15_Fig4_HTML.jpg)\n\
    \n**Figure 15-4.** A basic order history cell\n\nYou can use a helper method to\
    \ connect your data model with this view:\n\n`-(void)configureItem:(EMABOrder\
    \ *)item;`\n\n```\n#import \"PFTableViewCell.h\"\n@class EMABOrder;\n\n@interface\
    \ EMABOrderHistoryTableViewCell : PFTableViewCell\n-(void)configureItem:(EMABOrder\
    \ *)item;\n@end\n```\n\nHere is the implementation file:\n\n```\n#import \"EMABOrderHistoryTableViewCell.h\"\
    \n#import \"EMABOrder.h\"\n\n@interface EMABOrderHistoryTableViewCell()\n@property\
    \ (nonatomic, weak) IBOutlet UILabel *dateLabel;\n@property (nonatomic, weak)\
    \ IBOutlet UILabel *totalLabel;\n@property (nonatomic, weak) IBOutlet UILabel\
    \ *nameLabel;\n@end\n\n@implementation EMABOrderHistoryTableViewCell\n\n-(void)configureItem:(EMABOrder\
    \ *)item\n{\n    if (item) {\n        NSDateFormatter *dateFormatter = [[NSDateFormatter\
    \ alloc] init];\n        [dateFormatter setDateStyle:NSDateFormatterMediumStyle];\n\
    \        [dateFormatter setTimeStyle:NSDateFormatterMediumStyle];\n        self.dateLabel.text\
    \ = [dateFormatter stringFromDate:item.updatedAt];\n        self.totalLabel.text\
    \ = [item friendlyTotal];\n        self.nameLabel.text = [item.items[0] name];\n\
    \    }\n}\n\n@end\n```"
