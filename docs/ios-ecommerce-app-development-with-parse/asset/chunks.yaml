    \            }\n        }];\n    }\n}\n```"
  raw: '## The Sign-up Controller


    Next, get ready for the EMABSignUpViewController implementation.


    First, create the EMABSignUpViewController class as a subclass of UIViewController.
    There is not too much you need to do with its header file; focus on the implementation
    file instead. Since you have used UITableView, you need to put the protocol of
    UITableView in place. You also have UITextField in place, so it’s a good idea
    to use the UITextField Delegate protocol; this lets you dismiss the keyboard when
    the user taps the “Done” button. Here is the implementation:


    EMABSignupViewController.m


    `#import "EMABSignupViewController.h"`


    `#import "EMABConstants.h"`


    `#import "EMABEmailTextField.h"`


    `#import "EMABPasswordTextField.h"`


    `#import "EMABUser.h"`


    `@interface EMABSignupViewController ()<UITableViewDataSource, UITableViewDelegate,UITextFieldDelegate>`


    `@property (nonatomic, strong) EMABEmailTextField *emailTextField;`


    `@property (nonatomic, strong) EMABPasswordTextField *passwordTextField;`


    `@property (nonatomic, strong) EMABPasswordTextField *passwordAgainTextField;`


    `@end`


    You also need to create three properties to reference EMABEmailTextField and EMABPasswordTextfield.
    Since you still want to give some room to display each cell’s title, you want
    to size and position each UITextField. The following code shows how to do that
    using the `-(void) viewDidLoad` method.


    `- (void)viewDidLoad {`


    `[super viewDidLoad];`


    `self.emailTextField = [[EMABEmailTextField alloc] initWithFrame:CGRectMake(kLeftMargin,
    kTopMargin, kTextFieldWidth, kTextFieldHeight)];`


    `self.emialTextField.delegate = self;`


    `self.passwordTextField = [[EMABPasswordTextField alloc] initWithFrame:CGRectMake(kLeftMargin,
    kTopMargin, kTextFieldWidth, kTextFieldHeight)];`


    `self.passwordTextField.delegate = self;`


    `self.passwordAgainTextField = [[EMABPasswordTextField alloc] initWithFrame:CGRectMake(kLeftMargin,
    kTopMargin, kTextFieldWidth, kTextFieldHeight)];`


    `[self.passwordAgainTextField setPlaceholder:NSLocalizedString(@"Password Again",
    @"Password Again")];`


    `self.passwordAgainTextField.delegate = self;`


    `}`


    Keep in mind that `kLeftMargin`, `kTopMargin`, `kTextFieldWidth,` and `kTextFieldHeight`
    are defined in the EMABConstants class. You will need them again in other instances.


    Next, move to the implementation of UITableViewDataSource methods. You need one
    section and three cells for this UITableView.


    `#pragma mark - tableview datasource`


    `-(NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section`


    `{`


    `return 3;`


    `}`


    `-(NSInteger)numberOfSectionsInTableView:(UITableView *)tableView`


    `{`


    `return 1;`


    `}`


    Having set the identifier “SignUpCell” in the nib file on UIStoryboard, here is
    how you create three cells:


    `-(UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath
    *)indexPath`


    `{`


    `UITableViewCell *cell = nil;`


    `cell = [tableView dequeueReusableCellWithIdentifier:@"SignupCell" forIndexPath:indexPath];`


    `UITextField *textField = nil;`


    `switch (indexPath.row) {`


    `case 0:`


    `textField = self.emailTextField;`


    `break;`


    `case 1:`


    `textField = self.passwordTextField;`


    `break;`


    `case 2:`


    `textField = self.passwordAgainTextField;`


    `break;`


    `default:`


    `break;`


    `}`


    `// make sure this textfield’s width matches the width of the cell`


    `CGRect newFrame = textField.frame;`


    `newFrame.size.width = CGRectGetWidth(cell.contentView.frame) - kLeftMargin*2;`


    `textField.frame = newFrame;`


    `// if the cell is ever resized, keep the textfield’s width to match the cell’s
    width`


    `textField.autoresizingMask = UIViewAutoresizingFlexibleWidth;`


    `[cell.contentView addSubview:textField];`


    `return cell;`


    `}`


    The last piece is to handle one of the delegate methods of UITableView. You don’t
    really have to implement it.


    `-(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath
    *)indexPath`


    `{`


    `[tableView deselectRowAtIndexPath:indexPath animated:NO];`


    `}`


    As you can see, it’s pretty easy to set up your views. However, signing up a user
    requires a little bit of extra work.


    First, you need to check whether the user provides a valid e-mail address. You
    can use the `-(BOOL)isValidEmail method`:


    `#pragma mark - helper`


    `-(BOOL)isValidEmail {`


    `//` [`https://github.com/benmcredmond/DHValidation`](https://github.com/benmcredmond/DHValidation)


    `NSString *emailRegex = @"[A-Z0-9a-z._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,6}";`


    `NSPredicate *emailTest = [NSPredicate predicateWithFormat:@"SELF MATCHES %@",
    emailRegex];`


    `return [emailTest evaluateWithObject:self.emailTextField.text];`


    `}`


    Next, you want to remind the user when there is something wrong with the e-mail
    entered; use UIAlertView for this. Later you will also show other alert information
    such as the password length or sign-up errors. Let’s create a `-(void)showWarning:(NSString
    *)message` helper method:


    `-(void)showWarning:(NSString *)message {`


    `[[[UIAlertView alloc] initWithTitle:NSLocalizedString(@"Warning", @"Warning")
    message:message delegate:nil cancelButtonTitle:NSLocalizedString(@"OK", @"OK")
    otherButtonTitles:nil , nil] show];`


    `}`


    Lastly, you also want to allow the user to dismiss the software keyboard, so you
    implement the UITextField delegate method as follows:


    `#pragma mark - UITextField Delegate`


    `-(BOOL)textFieldShouldReturn:(UITextField *)textField`


    `{`


    `[textField resignFirstResponder];`


    `return YES;`


    `}`


    `@end`


    Next, implement the IBAction when a user taps the “Sign Up” button. Check whether
    the two password UITextField cells meet the minimum text length requirements;
    and whether the two text fields have identical text. Also make sure the text length
    in Email UITextField meets the requirement of minimum text length and is a valid
    e-mail address. If something is wrong with the information entered, the related
    warning will be provided afterward. Lastly, use `[PFUser user]` to create a user
    instance and cast it to the EMABUser. The username and e-mail of this user are
    the text in the e-mail UITextField text, and the password of the user is the text
    in the password UITextfield cell; then you use the Parse `-(BFTask *)signUpInBackground`
    method. Here is the complete implementation:


    `-(IBAction)onSignup:(id)sender{`


    `BOOL cont0 = [self.passwordTextField.text length] > kMinTextLength;`


    `BOOL cont1 = [self.passwordAgainTextField.text length] > kMinTextLength;`


    `BOOL cont2 = [self.passwordTextField.text isEqualToString:self.passwordAgainTextField.text];`


    `BOOL cont3 = [self.emailTextField.text length] > kMinTextLength;`


    `BOOL cont4 = [self isValidEmail];`


    `if (!cont0) {`


    `[self showWarning:NSLocalizedString(@"Password at least 6 characters.", @"Password
    at least 6 characters.")];`


    `}`


    `if (!cont1) {`


    `[self showWarning:NSLocalizedString(@"Password at least 6 characters.", @"Password
    at least 6 characters.")];`


    `}`


    `if (!cont2) {`


    `[self showWarning:NSLocalizedString(@"Passwords have to match.", @"Passwords
    have to match.")];`


    `}`


    `if (!cont3) {`


    `[self showWarning:NSLocalizedString(@"Email at least 6 characters.", @"Password
    at least 6 characters.")];`


    `}`


    `if (!cont4) {`


    `[self showWarning:NSLocalizedString(@"Doesn’t look like a valid email.", @"Doesn’t
    look like a valid email.")];`


    `}`


    `if (cont0 && cont1 && cont2 && cont3 && cont4) {`


    `[self.emailTextField resignFirstResponder];`


    `[self.passwordTextField resignFirstResponder];`


    `[self.passwordAgainTextField resignFirstResponder];`


    `EMABUser *user = (EMABUser *)[PFUser user];`


    `user.username = [self.emailTextField text];`


    `user.email = [self.emailTextField text];`


    `user.password = [self.passwordTextField text];`


    `[user signUpInBackgroundWithBlock:^(BOOL succeeded, NSError *error){`


    `if (!error) {`


    `[self dismissViewControllerAnimated:YES completion:nil];`


    `}`


    `}];`


    `}`


    `}`'
  trans: "\n# 注册控制器\n\n接下来，准备实现 `EMABSignUpViewController`。\n\n首先，创建 `EMABSignUpViewController`\
    \ 类作为 `UIViewController` 的子类。其头文件无需过多处理，应重点关注实现文件。由于使用了 `UITableView`，需要引入 `UITableView`\
    \ 协议，同时因为使用 `UITextField`，建议采用 `UITextField Delegate` 协议，以便用户在点击“完成”按钮时关闭键盘。以下是具体实现：\n\
    \n`EMABSignupViewController.m`\n\n```objective-c\n#import \"EMABSignupViewController.h\"\
    \n#import \"EMABConstants.h\"\n#import \"EMABEmailTextField.h\"\n#import \"EMABPasswordTextField.h\"\
    \n#import \"EMABUser.h\"\n\n@interface EMABSignupViewController ()<UITableViewDataSource,\
    \ UITableViewDelegate, UITextFieldDelegate>\n\n@property (nonatomic, strong) EMABEmailTextField\
    \ *emailTextField;\n@property (nonatomic, strong) EMABPasswordTextField *passwordTextField;\n\
    @property (nonatomic, strong) EMABPasswordTextField *passwordAgainTextField;\n\
    \n@end\n```\n\n还需要创建三个属性来引用 `EMABEmailTextField` 和 `EMABPasswordTextfield`。为了给每个单元格的标题留出显示空间，需要调整每个\
    \ `UITextField` 的大小和位置。以下代码展示了如何通过 `-(void)viewDidLoad` 方法实现：\n\n```objective-c\n\
    - (void)viewDidLoad {\n    [super viewDidLoad];\n    self.emailTextField = [[EMABEmailTextField\
    \ alloc] initWithFrame:CGRectMake(kLeftMargin, kTopMargin, kTextFieldWidth, kTextFieldHeight)];\n\
    \    self.emialTextField.delegate = self;\n    self.passwordTextField = [[EMABPasswordTextField\
    \ alloc] initWithFrame:CGRectMake(kLeftMargin, kTopMargin, kTextFieldWidth, kTextFieldHeight)];\n\
    \    self.passwordTextField.delegate = self;\n    self.passwordAgainTextField\
    \ = [[EMABPasswordTextField alloc] initWithFrame:CGRectMake(kLeftMargin, kTopMargin,\
    \ kTextFieldWidth, kTextFieldHeight)];\n    [self.passwordAgainTextField setPlaceholder:NSLocalizedString(@\"\
    再次输入密码\", @\"Password Again\")];\n    self.passwordAgainTextField.delegate = self;\n\
    }\n```\n\n请注意，`kLeftMargin`、`kTopMargin`、`kTextFieldWidth` 和 `kTextFieldHeight`\
    \ 均在 `EMABConstants` 类中定义，后续其他场景也会用到。\n\n接着，实现 `UITableViewDataSource` 协议方法。该\
    \ `UITableView` 需要包含一个分区和三个单元格。\n\n```objective-c\n#pragma mark - tableview datasource\n\
    \n-(NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    return 3;\n}\n\n-(NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n\
    {\n    return 1;\n}\n```\n\n在 `UIStoryboard` 的 nib 文件中设置标识符 `\"SignUpCell\"` 后，按如下方式创建三个单元格：\n\
    \n```objective-c\n-(UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    UITableViewCell *cell = nil;\n    cell = [tableView dequeueReusableCellWithIdentifier:@\"\
    SignupCell\" forIndexPath:indexPath];\n    UITextField *textField = nil;\n   \
    \ switch (indexPath.row) {\n        case 0:\n            textField = self.emailTextField;\n\
    \            break;\n        case 1:\n            textField = self.passwordTextField;\n\
    \            break;\n        case 2:\n            textField = self.passwordAgainTextField;\n\
    \            break;\n        default:\n            break;\n    }\n    // 确保文本输入框的宽度与单元格宽度匹配\n\
    \    CGRect newFrame = textField.frame;\n    newFrame.size.width = CGRectGetWidth(cell.contentView.frame)\
    \ - kLeftMargin*2;\n    textField.frame = newFrame;\n    // 当单元格尺寸变化时，保持文本输入框宽度适应\n\
    \    textField.autoresizingMask = UIViewAutoresizingFlexibleWidth;\n    [cell.contentView\
    \ addSubview:textField];\n    return cell;\n}\n```\n\n最后需要处理 `UITableView` 的一个代理方法，但该方法的实现并非必需：\n\
    \n```objective-c\n-(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    [tableView deselectRowAtIndexPath:indexPath animated:NO];\n\
    }\n```\n\n如您所见，界面的配置相当简单。不过，用户注册还需要额外处理一些内容。\n\n首先，需验证用户提供的邮箱地址是否有效。可使用 `-(BOOL)isValidEmail`\
    \ 方法：\n\n```objective-c\n#pragma mark - helper\n\n-(BOOL)isValidEmail {\n    //\
    \ https://github.com/benmcredmond/DHValidation\n    NSString *emailRegex = @\"\
    [A-Z0-9a-z._%+-]+@[A-Za-z0-9.-]+\\\\.[A-Za-z]{2,6}\";\n    NSPredicate *emailTest\
    \ = [NSPredicate predicateWithFormat:@\"SELF MATCHES %@\", emailRegex];\n    return\
    \ [emailTest evaluateWithObject:self.emailTextField.text];\n}\n```\n\n接着，当输入的邮箱有误时需提醒用户，这里使用\
    \ `UIAlertView` 实现。后续还会展示其他警告信息，如密码长度或注册错误等。为此创建一个 `-(void)showWarning:(NSString\
    \ *)message` 辅助方法：\n\n```objective-c\n-(void)showWarning:(NSString *)message {\n\
    \    [[[UIAlertView alloc] initWithTitle:NSLocalizedString(@\"警告\", @\"Warning\"\
    ) message:message delegate:nil cancelButtonTitle:NSLocalizedString(@\"确定\", @\"\
    OK\") otherButtonTitles:nil , nil] show];\n}\n```\n\n最后，允许用户关闭软键盘，因此实现 `UITextField`\
    \ 代理方法如下：\n\n```objective-c\n#pragma mark - UITextField Delegate\n\n-(BOOL)textFieldShouldReturn:(UITextField\
    \ *)textField\n{\n    [textField resignFirstResponder];\n    return YES;\n}\n\n\
    @end\n```\n\n接下来，实现用户点击“注册”按钮时的 `IBAction` 方法。需检查两个密码 `UITextField` 单元格的文本是否达到最小长度要求，以及两个文本输入框的内容是否一致。同时确保邮箱\
    \ `UITextField` 的文本长度满足最小要求且为有效邮箱地址。若输入信息有误，将依次显示相应警告。最后，使用 `[PFUser user]` 创建用户实例并转换为\
    \ `EMABUser`。该用户的用户名和邮箱均设为邮箱 `UITextField` 中的文本，密码设为密码 `UITextField` 单元格中的文本，然后调用\
    \ Parse 的 `-(BFTask *)signUpInBackground` 方法。完整实现如下：\n\n```objective-c\n-(IBAction)onSignup:(id)sender{\n\
    \    BOOL cont0 = [self.passwordTextField.text length] > kMinTextLength;\n   \
    \ BOOL cont1 = [self.passwordAgainTextField.text length] > kMinTextLength;\n \
    \   BOOL cont2 = [self.passwordTextField.text isEqualToString:self.passwordAgainTextField.text];\n\
    \    BOOL cont3 = [self.emailTextField.text length] > kMinTextLength;\n    BOOL\
    \ cont4 = [self isValidEmail];\n    \n    if (!cont0) {\n        [self showWarning:NSLocalizedString(@\"\
    密码至少 6 个字符。\", @\"Password at least 6 characters.\")];\n    }\n    if (!cont1)\
    \ {\n        [self showWarning:NSLocalizedString(@\"密码至少 6 个字符。\", @\"Password\
    \ at least 6 characters.\")];\n    }\n    if (!cont2) {\n        [self showWarning:NSLocalizedString(@\"\
    两次密码必须一致。\", @\"Passwords have to match.\")];\n    }\n    if (!cont3) {\n    \
    \    [self showWarning:NSLocalizedString(@\"邮箱至少 6 个字符。\", @\"Password at least\
    \ 6 characters.\")];\n    }\n    if (!cont4) {\n        [self showWarning:NSLocalizedString(@\"\
    邮箱格式无效。\", @\"Doesn't look like a valid email.\")];\n    }\n    \n    if (cont0\
    \ && cont1 && cont2 && cont3 && cont4) {\n        [self.emailTextField resignFirstResponder];\n\
    \        [self.passwordTextField resignFirstResponder];\n        [self.passwordAgainTextField\
    \ resignFirstResponder];\n        EMABUser *user = (EMABUser *)[PFUser user];\n\
    \        user.username = [self.emailTextField text];\n        user.email = [self.emailTextField\
    \ text];\n        user.password = [self.passwordTextField text];\n        [user\
    \ signUpInBackgroundWithBlock:^(BOOL succeeded, NSError *error){\n           \
    \ if (!error) {\n                [self dismissViewControllerAnimated:YES completion:nil];\n\
    \            }\n        }];\n    }\n}\n```\n"
- fmt: "# Summary\n\nThis chapter explained how to create a user interface (UI) to\
    \ let a user sign up for an account with an e-mail and password. It also covered\
    \ how to develop a better user experience while developing the UI. In the end,\
    \ signing a user up with `Parse` is just an API method.\n\n# 9. The Login Feature\n\
    \nElectronic supplementary material The online version of this chapter (doi:[10.1007/978-1-4842-1317-9_9](http://dx.doi.org/10.1007/978-1-4842-1317-9_9))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    In the previous chapter, you learned how to sign up new users. In this chapter,\
    \ you will learn how to implement the log in and log in with Facebook features.\n\
    \n## Using Direct Log In\n\nSimilar to the sign-up feature, the user logs in with\
    \ an e-mail and password, so you can use the same model (`EMABUser`), similar\
    \ views (`EMABEmailTextField`, `EMABPasswordTextField`, and `UITableView`), and\
    \ a \"Log In\" button.\n\nBefore requesting `Parse` to verify the information\
    \ a user provides, you need to do some information check as you have done for\
    \ the sign-up feature; for example, you need to check whether the e-mail is valid,\
    \ the e-mail length meets the minimum length requirement, and the password length\
    \ meets the minimum length requirement. You also need to set up some helper methods,\
    \ one will repeat the e-mail verification method. For this reason, you move this\
    \ method to `EMABConstants`.\n\nThe key Login API from `Parse` is `+ (void)logInWithUsernameInBackground:(NSString\
    \ *)username password:(NSString *)password block:(PF_NULLABLE PFUserResultBlock)block`.\n\
    \nHere is the implementation:\n\n`EMABLoginViewController.m`\n\n```\n#import \"\
    EMABLoginViewController.h\"\n#import \"EMABConstants.h\"\n#import \"EMABUser.h\"\
    \n#import \"EMABEmailTextField.h\"\n#import \"EMABPasswordTextField.h\"\n\n@interface\
    \ EMABLoginViewController ()<UITableViewDataSource, UITableViewDelegate, UITextFieldDelegate>\n\
    @property (nonatomic, strong) UITextField *emailTextField;\n@property (nonatomic,\
    \ strong) UITextField *passwordTextField;\n@property (nonatomic, weak) IBOutlet\
    \ UITableView *loginTableView;\n@end\n\n@implementation EMABLoginViewController\n\
    \n- (void)viewDidLoad {\n    [super viewDidLoad];\n    self.emailTextField = [[EMABEmailTextField\
    \ alloc] initWithFrame:CGRectMake(kLeftMargin, kTopMargin, kTextFieldWidth, kTextFieldHeight)];\n\
    \    self.emailTextField.delegate = self;\n    self.passwordTextField = [[EMABPasswordTextField\
    \ alloc] initWithFrame:CGRectMake(kLeftMargin, kTopMargin, kTextFieldWidth, kTextFieldHeight)];\n\
    \    self.passwordTextField.delegate = self;\n}\n\n-(IBAction)onLogin:(id)sender{\n\
    \    BOOL cont0 = [self.passwordTextField.text length] > kMinTextLength;\n   \
    \ BOOL cont1 = [self.emailTextField.text length] > kMinTextLength;\n    BOOL cont2\
    \ = [EMABConstants isValidEmail:self.emailTextField.text];\n    if (!cont0) {\n\
    \        [self showWarning:NSLocalizedString(@\"Password at least 6 characters.\"\
    , @\"Password at least 6 characters.\")];\n    }\n    if (!cont1) {\n        [self\
    \ showWarning:NSLocalizedString(@\"Email at least 6 characters.\", @\"Password\
    \ at least 6 characters.\")];\n    }\n    if (!cont2) {\n        [self showWarning:NSLocalizedString(@\"\
    Doesn’t look like a valid email.\", @\"Doesn’t look like a valid email.\")];\n\
    \    }\n    if (cont0 && cont1 && cont2) {\n        [self.emailTextField resignFirstResponder];\n\
    \        [self.passwordTextField resignFirstResponder];\n        [PFUser logInWithUsernameInBackground:self.emailTextField.text\
    \ password:self.passwordTextField.text\n            block:^(PFUser *user, NSError\
    \ *error) {\n            if (!error) {\n                [self dismissViewControllerAnimated:YES\
    \ completion:nil];\n            } else {\n                [self showWarning:[error\
    \ localizedDescription]];\n            }\n        }];\n    }\n}\n\n#pragma mark\
    \ - tableview datasource\n\n-(NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    return 2;\n}\n\n-(NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n\
    {\n    return 1;\n}\n\n-(UITableViewCell *)tableView:(UITableView *)tableView\
    \ cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    UITableViewCell *cell\
    \ = nil;\n    cell = [tableView dequeueReusableCellWithIdentifier:@\"LoginCell\"\
    \ forIndexPath:indexPath];\n    UITextField *textField = nil;\n    switch (indexPath.row)\
    \ {\n        case 0:\n            textField = self.emailTextField;\n         \
    \   break;\n        case 1:\n            textField = self.passwordTextField;\n\
    \            break;\n        default:\n            break;\n    }\n    // make\
    \ sure this textfield's width matches the width of the cell\n    CGRect newFrame\
    \ = textField.frame;\n    newFrame.size.width = CGRectGetWidth(cell.contentView.frame)\
    \ - kLeftMargin*2;\n    textField.frame = newFrame;\n    // if the cell is ever\
    \ resized, keep the textfield's width to match the cell's width\n    textField.autoresizingMask\
    \ = UIViewAutoresizingFlexibleWidth;\n    [cell.contentView addSubview:textField];\n\
    \    return cell;\n}\n\n-(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    [tableView deselectRowAtIndexPath:indexPath animated:NO];\n\
    }\n\n#pragma mark - helper\n\n-(void)showWarning:(NSString *)message {\n    [[[UIAlertView\
    \ alloc] initWithTitle:NSLocalizedString(@\"Warning\", @\"Warning\") message:message\
    \ delegate:nil cancelButtonTitle:NSLocalizedString(@\"OK\", @\"OK\") otherButtonTitles:nil,\
    \ nil] show];\n}\n\n#pragma mark - UITextField Delegate\n\n-(BOOL)textFieldShouldReturn:(UITextField\
    \ *)textField\n{\n    [textField resignFirstResponder];\n    return YES;\n}\n\n\
    @end\n```"
  raw: '## Summary


    This chapter explained how to create a user interface (UI) to let a user sign
    up for an account with an e-mail and password. It also covered how to develop
    a better user experience while developing the UI. In the end, signing a user up
    with Parse is just an API method.


    # 9. The Login Feature


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1317-9_​9](http://dx.doi.org/10.1007/978-1-4842-1317-9_9))
    contains supplementary material, which is available to authorized users.


    In the previous chapter, you learned how to sign up new users. In this chapter,
    you will learn how to implement the log in and log in with Facebook features.


    ## Using Direct Log In


    Similar to the sign-up feature, the user logs in with an e-mail and password,
    so you can use the same model (EMABUser), similar views (EMABEmailTextField, EMABPasswordTextField,
    and UITableView), and a “Log In” button.


    Before requesting Parse to verify the information a user provides, you need to
    do some information check as you have done for the sign-up feature; for example,
    you need to check whether the e-mail is valid, the e-mail length meets the minimum
    length requirement, and the password length meets the minimum length requirement.
    You also need to set up some helper methods, one will repeat the e-mail verification
    method. For this reason, you move this method to EMABConstants.


    The key Login API from Parse is + (void)logInWithUsernameInBackground:(NSString
    *)username password:(NSString *)password block:(PF_NULLABLE PFUserResultBlock)block.


    Here is the implementation:


