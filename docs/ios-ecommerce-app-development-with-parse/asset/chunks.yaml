    `@implementation EMABUserFavoriteHistoryTableViewController`


    `- (void)awakeFromNib {`


        `[super awakeFromNib];`


        `self.parseClassName = kProduct;`


        `self.objectsPerPage = 10;`


        `self.paginationEnabled = YES;`


        `self.pullToRefreshEnabled = YES;`


    `}`


    `- (PFQuery *)queryForTable {`


        `PFQuery *query = [EMABFavoriteProduct queryForCustomer:[EMABUser currentUser]];`


        `if ([self.objects count] == 0) {`


            `query.cachePolicy = kPFCachePolicyCacheThenNetwork;`


        `}`


        `return query;`


    `}`


    `#pragma mark - UITableView Datasource`


    `-(CGFloat)tableView:(UITableView *)tableView heightForRowAtIndexPath:(NSIndexPath
    *)indexPath`


    `{`


        `return 80.0;`


    `}`


    `- (EMABProductTableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath
    *)indexPath object:(EMABFavoriteProduct *)object{`


        `EMABProductTableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@"ProductCell"
    forIndexPath:indexPath];`


        `if (indexPath.row == [[self objects] count]) {`


            `cell.textLabel.text = NSLocalizedString(@"Load More…", @"");`


        `} else {`


            `[cell configureItem:object.product];`


        `}`


        `return cell;`


    `}`


    To make this list editable, use the UITableView delegate method, `tableView:(UITableView
    *)tableView commitEditingStyle:(UITableViewCellEditingStyle)editingStyle forRowAtIndexPath:(NSIndexPath
    *)indexPath`.


    First, give the user a button so you know the user has the intention to edit.
    Add a bar button item as the right-bar button item of UINavigationItem, and use
    the system Edit button style.


    Second, enable the row’s “editing mode” by calling the following method:


    `-(BOOL)tableView:(UITableView *)tableView canEditRowAtIndexPath:(NSIndexPath
    *)indexPath{`


        `return YES;`


    `}`


    Once a user taps the “Edit” button, a red “-” appears on each cell. Tap the “-”
    icon, and the following method will be executed:


    `-(void)tableView:(UITableView *)tableView commitEditingStyle:(UITableViewCellEditingStyle)editingStyle
    forRowAtIndexPath:(NSIndexPath *)indexPath`


    `{`


        `if (editingStyle == UITableViewCellEditingStyleDelete) {`


            `EMABFavoriteProduct *fProduct = (EMABFavoriteProduct *)[self objectAtIndexPath:indexPath];`


            `[fProduct deleteInBackgroundWithBlock:^(BOOL succeeded, NSError *error)
    {`


                `if (!error) {`


                    `[self loadObjects];`


                `}`


            `}];`


        `}`


    `}`


    You will only listen to the delete action and call the PFObject asynchronous deletion
    method. Once the deletion is finished successfully, query the back-end server
    and update the UI.


    When a user taps a product on the list, the product detail is displayed. You have
    had EMABProductDetailViewController in place; you only need to pass the right
    EMABProduct instance to it. Since your PFQuery returns the list of EMABFavoriteProduct,
    you need to take an extra step to get the EMABProduct. Here is the code:


    `#pragma mark - UITableView Delegate`


    `-(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath
    *)indexPath{`


        `if (indexPath.row == [[self objects] count]) {`


            `[self loadNextPage];`


        `} else {`


            `EMABProductDetailViewController *viewController = [self.storyboard instantiateViewControllerWithIdentifier:@"EMABProductDetailViewController"];`


            `[viewController setProduct:(EMABProduct*)[self objectAtIndexPath:indexPath]];`


            `[self.navigationController pushViewController:viewController animated:YES];`


        `}`


    `}`


    `@end`


    ## Summary


    In this chapter, I have shown you how to implement a basic “My Account” screen.
    Based on whether a user is logged in or not, we presented different content for
    each scenario. I also demonstrated how a logged-in user can see one’s shipping
    address, payment methods, favorites list, and order history. On the other hand,
    I will only show “Sign In” when we don’t have a signed-in user.


    I also showed how to use PFQueryTableViewController to show a user’s credit card
    information that has previously been entered. Then I showed you who to let the
    user add a new credit card or delete an existing one, and how to view a user’s
    order history and a specific order’s detail.


    Finally, I discussed how to display a list of favotie products. Following this,
    you learned how to show the product detail while the user tapped one product on
    the list.


    # 16. Add Product


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1317-9_​16](http://dx.doi.org/10.1007/978-1-4842-1317-9_16))
    contains supplementary material, which is available to authorized users.


    So far, you have added products for your app through the Parse project dashboard
    on Parse.com. Once your app goes live, it probably isn’t a good idea to allow
    everyone to do this. A few issues might arise if you let everyone access the Parse
    Dashboard.


    *   You might expose too much information to people who are not supposed to know
    it.

    *   There is a chance that you will enter your data incorrectly.

    *   Your data could be easily deleted or altered.


    In general, Parse Dashboard is neither a user-friendly interface nor an efficient
    way to manually enter a lot of data.


    Typically you will create a web app to let some admin users add or edit products.
    Generally speaking, it’s much more efficient to use a web app to do data entry
    work. For the completeness of this book, I will introduce you to how to create
    an admin user and provide a special interface for this user to add or edit products
    from the mobile app. Some use cases for this feature might include a small shop
    that doesn’t have many products to enter or a business that needs to take a lot
    of product photos and upload them to the server.


    ## Model


    First, you need to add a new Boolean property to your EMABUser model and name
    it `isAdmin;`:


    `@property (nonatomic, assign) BOOL isAdmin;You also need to add it to the @dynamic
    list in the EMABUser implementation file.`


    By the time a user signs up with your app, as discussed in [Chapter 8](#A978-1-4842-1317-9_8_Chapter.html),
    you will update the user’s `isAdmin` property to true in the Parse Dashboard.'
