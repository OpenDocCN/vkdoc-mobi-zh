  trans: "\n# 使用 Facebook 登录\n\niOS 电商应用集成 Facebook 登录功能是很常见的做法。虽然管理两套用户体系可能颇具挑战，但\
    \ Facebook SDK 可以与 Parse SDK 配合使用，并与 `PFUser` 类集成，从而轻松地将用户与其 Facebook 身份关联起来。\n\
    \n此功能需要 `ParseFacebookUtils` 或 `ParseFacebookUtilsV4` SDK，因此你需要如下修改 Podfile：\n\
    \n```\npod 'ParseFacebookUtilsV4','1.7.1'\n```\n\n**注意：** Facebook 和 Parse 会频繁更新其\
    \ SDK。当你运行此示例时，可能需要更新 SDK 版本。\n\n在本节中，你将学习如何使用 Parse 实现 Facebook 登录，以及如何获取用户的\
    \ Facebook 资料，以便保存到自己的记录中。\n\n请记住，你需要一个 Facebook 开发者账号来实现此功能（详见第 4 章）。\n\n模型层使用\
    \ `EMABUser`（与第 8 章相同）；视图层使用“使用 Facebook 登录”按钮（见第 8 章）。由于你需要与 Facebook API 通信以授权用户，还需要获取用户资料并保存到\
    \ Parse 后端。我将引入一个 `UIActivityIndicator` 来显示进行中的过程，并在处理期间禁用某些按钮，以防用户不愿等待完成。整体思路是创造更友好的用户体验。\n\
    \n以下是头文件声明：\n\n```\n#import \"EMABDispatchViewController.h\"\n#import \"EMABConstants.h\"\
    \n#import \"EMABUser.h\"\n#import <ParseFacebookUtils/PFFacebookUtils.h>\n\n@interface\
    \ EMABDispatchViewController ()\n@property (nonatomic, weak) IBOutlet UIActivityIndicatorView\
    \ *activityIndicatorView;\n@end\n```\n\n当用户看到此界面时，`c` 实例是隐藏的。只有当用户点击“使用 Facebook\
    \ 登录”按钮并发出网络请求时，它才会变得可见。一旦网络请求完成，动画停止，`UIActivityIndicator` 实例即被隐藏。\n\n```\n@implementation\
    \ EMABDispatchViewController\n\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\
