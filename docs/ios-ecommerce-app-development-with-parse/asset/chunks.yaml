- fmt: "### Sign Up or Log In\n\nA user-friendly app doesn’t always require a user\
    \ to create an account from the beginning. It gives a user the chance to understand\
    \ what the app is about and what value the app can add to the user’s life. Our\
    \ Beauty & Me is no exception.\n\nFor this prototype, ask the user to create an\
    \ account or log in when one of the following conditions is met. The user taps\
    \ one of the following:\n\n- “My account” tab\n- “Shopping Bag” tab\n- “Add To\
    \ Bag” button on `ProductDetailViewController`\n\nLet’s create another storyboard\
    \ to handle the login and sign-up work flow.\n\nOpen the existing project. From\
    \ the Xcode File menu, select New ➤ File. A dialog window is shown as in Figure\
    \ [2-22](#A978-1-4842-1317-9_2_Chapter.html#Fig22). Next, choose User Interface\
    \ and select `Storyboard`. Name the `UIStoryboard` `LoginSignup.storyboard`.\n\
    \n![A978-1-4842-1317-9_2_Fig22_HTML.jpg](A978-1-4842-1317-9_2_Fig22_HTML.jpg)\n\
    \nFigure 2-22.\n\nCreate a `UIStoryboard` file. Add a `UINavigationController`\
    \ on the storyboard, set its identifier `“DispatchNavigationController”`, and\
    \ check “Is Initial View Controller”, as shown in Figure [2-23](#A978-1-4842-1317-9_2_Chapter.html#Fig23).\
    \ Delete its default root view controller, a `UITableViewController`.\n\n![A978-1-4842-1317-9_2_Fig23_HTML.jpg](A978-1-4842-1317-9_2_Fig23_HTML.jpg)\n\
    \nFigure 2-23.\n\nSet the `DispatchNavigationController` as an initial View Controller.\
    \ Add a `UIViewController`, and set it to the root view controller of the `DispatchNavigationController`.\
    \ Name the new root view controller with an identifier of `“DispatchViewController”`\
    \ and set “Beauty & Me” as its title. Add three buttons on the view of the `DispatchViewController`,\
    \ and give the title for each button—`“Log In with Facebook,”` `“Sign Up,”` and\
    \ `“Log In,”` respectively. The reason you want to put the `“Log In with Facebook”`\
    \ button on top is that you really want to encourage users to create an account\
    \ with us.\n\nThe `DispatchNavigationController` will be presented modally so\
    \ a user will have a chance to cancel the process. Add a system cancel `UIBarButtonItem`\
    \ to the left of the `UIBarButtonItem`. This feature will only work once you have\
    \ implemented what happens when a user taps the `“Log In with Facebook”` button.\
    \ Right now, it won’t do anything.\n\nAdd another `UIViewController`, and name\
    \ it `“SignUpViewController”` with `“Sign Up”` as the title. Connect the `“Sign\
    \ Up”` button with the `SignUpViewController`. On the view controller, let a user\
    \ enter his or her e-mail and password to sign up for an account with you. To\
    \ make sure the user can remember his password, let the user enter his or her\
    \ password one more time. A standard way to create the user experience is to use\
    \ a `UITableView` with three cells. Use each cell to hold a `UITextField`. Put\
    \ a placeholder text on each `UITextField` to indicate what the cell is for, as\
    \ seen in Figure [2-24](#A978-1-4842-1317-9_2_Chapter.html#Fig24). Add a `UIButton`\
    \ with the title `“Sign Up”` under the `UITableView`, and add a `UIBarButtonItem`\
    \ with a title `“Sign Up”` to the right bar button item so a user can tap either\
    \ one to sign up.\n\n![A978-1-4842-1317-9_2_Fig24_HTML.jpg](A978-1-4842-1317-9_2_Fig24_HTML.jpg)\n\
    \nFigure 2-24.\n\nThis is a partial user interface of `SignupViewController`.\
    \ In similar fashion, add another `UIViewController`, and name it `“LoginViewController”`\
    \ with a title `“Log In.”` Add a `UITableView` with two static cells. This time\
    \ you only need the user’s e-mail and password to log in with you. Figure [2-25](#A978-1-4842-1317-9_2_Chapter.html#Fig25)\
    \ shows what it looks like.\n\n![A978-1-4842-1317-9_2_Fig25_HTML.jpg](A978-1-4842-1317-9_2_Fig25_HTML.jpg)\n\
    \nFigure 2-25.\n\nThis is a partial user interface of `LoginViewController`. Figure\
    \ [2-26](#A978-1-4842-1317-9_2_Chapter.html#Fig26) shows the whole `LoginSignup.storyboard`.\n\
    \n![A978-1-4842-1317-9_2_Fig26_HTML.gif](A978-1-4842-1317-9_2_Fig26_HTML.gif)\n\
    \nFigure 2-26.\n\nThe view controllers used in `LoginSignup.storyboard`.\n\n##\
    \ Put It All Together\n\nTo make our prototype work like the real thing, you need\
    \ to write a little bit of code to handle cases:\n\n- A user has not created an\
    \ account but tapped “My Account” or “Add to Bag.”\n- A user logs out.\n\nYou\
    \ may wonder whether you can ask a user to register an account with you when he/she\
    \ just opens the app? Technically, yes, you can, but it’s not a good user experience.\
    \ A user doesn’t know what the app is and what it can do, and you already ask\
    \ him or her to register an account? Most likely the user will quit and delete\
    \ the app.\n\nUse `NSUserDefault` to save the login/logout status of a customer.\
    \ When the app just opens, assume the user is not a registered user. Here is the\
    \ code:\n\n```\nAppDelegate.m\n\n- (BOOL)application:(UIApplication *)application\
    \ didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {\n\n    // Override\
    \ point for customization after application launch.\n\n    UITabBarController\
    \ *tabBarController = (UITabBarController*)self.window.rootViewController;\n\n\
    \    tabBarController.delegate = self;\n\n     NSString *const kIsLoggedInfKey\
    \   = @\"kIsLoggedIn\";\n\n    [[NSUserDefaults standardUserDefaults] registerDefaults:@{kIsLoggedInfKey:@(NO)}];\n\
    \n    return YES;\n\n}\n```\n\nWhen the user taps “My Account” or “Shopping Bag”\
    \ tab, show our `DispatchViewController`. To do this, you need to do a little\
    \ bit more work.\n\nFirst, in `AppDelegate`, you need to declare `UITabBarContollerDelegate`:\n\
    \n```\nUITabBarController *tabBarController = (UITabBarController*)self.window.rootViewController;\n\
    \n    tabBarController.delegate = self;\n```\n\nWhen the user taps a tab other\
    \ than “My Account” or “Shopping Bag,” don’t ask the user to sign up or log in.\n\
    \nHere is how to implement one of `UITabBarControllerDelegates` to respond to\
    \ a tab selected:\n\n```\n- (void)tabBarController:(UITabBarController *)tabBarController\
    \ didSelectViewController:(UIViewController *)viewController{\n\n    UINavigationController\
    \ *navViewController = (UINavigationController *)viewController;\n\n    if (![navViewController.title\
    \ isEqualToString:@\"Shop\"]) {\n\n        if (!([[NSUserDefaults standardUserDefaults]\
    \ boolForKey:kIsLoggedInfKey])) {\n\n            UIStoryboard *dispatchStoryboard\
    \ = [UIStoryboard storyboardWithName:@\"LoginSignup\" bundle:nil];\n\n       \
    \     UINavigationController *navController = (UINavigationController *)[dispatchStoryboard\
    \ instantiateInitialViewController];\n\n            [self.window.rootViewController\
    \ presentViewController:navController animated:YES completion:nil];\n\n      \
    \  }\n\n    }\n\n}\n```\n\nFirst, check which tap is selected by checking the\
    \ title of navigation controllers. Then ask whether the user is logged in or not;\
    \ if not, grab the Dispatch navigation controller by its storyboard identifier,\
    \ then present it.\n\nIn Dispatch view controller, implement two `IBActions`:\
    \ A user logs in by using the `“Log In with Facebook”` feature, or a user cancels\
    \ the login or sign-up process:\n\n```\n-(IBAction)onFacebookLogin:(id)sender{\n\
    \n    [[NSUserDefaults standardUserDefaults] setBool:YES forKey:kIsLoggedInfKey];\n\
    \n    [[NSUserDefaults standardUserDefaults] synchronize];\n\n    [self dismissViewControllerAnimated:YES\
    \ completion:nil];\n\n}\n```\n\nHere you simply set the `kIsLoggedInKey` of `NSUserDefaults`\
    \ to `Yes` then dismiss the Dispatch navigation view controller.\n\n```\n-(IBAction)onCancel:(id)sender{\n\
    \n    [self dismissViewControllerAnimated:YES completion:nil];\n\n}\n```\n\nOnce\
    \ the user taps the `“Cancel”` `UIBarButtonItem`, we dismiss the Dispatch navigation\
    \ view controller.\n\n**Note:** A complete implementation can be found in the\
    \ [Chapter 2](#A978-1-4842-1317-9_2_Chapter.html) source code.\n\n## Summary\n\
    \nIn this chapter, I cover how to use `UIStoryboard` to create the prototype for\
    \ the app used in this book. I have used the Tabbed Application template. Three\
    \ tabs, namely, “Shop”, “Shopping Bag,” and “My Account” lead to three different\
    \ main features for the app. I also showed how to set up a sign-up or login `UIStoryboard`.\
    \ With some code to fake a signed-in user, I created a prototype of the app."
  raw: '### Sign Up or Log In


    A user-friendly app doesn’t always require a user to create an account from the
    beginning. It gives a user the chance to understand what the app is about and
    what value the app can add to the user’s life. Our Beauty & Me is no exception.


    For this prototype, ask the user to create an account or log in when one of the
    following conditions is met. The user taps one of the following:


    *   “My account” tab

    *   “Shopping Bag” tab

    *   “Add To Bag" button on ProductDetailViewController


    Let’s create another storyboard to handle the login and sign-up work flow.


    Open the existing project. From the Xcode File menu, select New ➤ File. A dialog
    window is shown as in Figure. [2-22](#A978-1-4842-1317-9_2_Chapter.html#Fig22).
    Next, choose User Interface and select Storyboard. Name the UIStoryboard LoginSignup.storyboard.


    ![A978-1-4842-1317-9_2_Fig22_HTML.jpg](A978-1-4842-1317-9_2_Fig22_HTML.jpg)


    Figure 2-22.


    Create a UIStoryboard file   Add a UINavigationController on the storyboard, set
    its identifier “DispatchNavigationController,” and check “Is Initial View Controller”,
    as shown in Figure [2-23](#A978-1-4842-1317-9_2_Chapter.html#Fig23). Delete its
    default root view controller, a UITableViewController.


    ![A978-1-4842-1317-9_2_Fig23_HTML.jpg](A978-1-4842-1317-9_2_Fig23_HTML.jpg)


    Figure 2-23.


    Set the DispatchNavigationController as an initial View Controller   Add a UIViewController,
    and set it to the root view controller of the DispatchNavigationController. Name
    the new root view controller with an identifier of “DispatchViewController” and
    set “Beauty & Me” as its title.   Add three buttons on the view of the DispatchViewController,
    and give the title for each button—“Log In with Facebook,” “Sign Up,” and “Log
    In,” respectively. The reason you want to put the “Log In with Facebook” button
    on top is that you really want to encourage users to create an account with us.
      The DispatchNavigationController will be presented modally so a user will have
    a chance to cancel the process. Add a system cancel UIBarButtonItem to the left
    of the UIBarButtonItem. This feature will only work once you have implemented
    what happens when a user taps the “Log In with Facebook” button. Right now, it
    won’t do anything.   Add another UIViewController, and name it “SignUpViewController”
    with “Sign Up” as the title. Connect the “Sign Up” button with the SignUpViewController.
    On the view controller, let a user enter his or her e-mail and password to sign
    up for an account with you. To make sure the user can remember his password, let
    the user enter his or her password one more time. A standard way to create the
    user experience is to use a UITableView with three cells. Use each cell to hold
    a UITextField. Put a placeholder text on each UITextField to indicate what the
    cell is for, as seen in Figure. [2-24](#A978-1-4842-1317-9_2_Chapter.html#Fig24).
    Add a UIButton with the title “Sign Up” under the UITableView, and add a UIBarButtonItem
    with a title “Sign Up” to the right bar button item so a user can tap either one
    to sign up.


    ![A978-1-4842-1317-9_2_Fig24_HTML.jpg](A978-1-4842-1317-9_2_Fig24_HTML.jpg)


    Figure 2-24.


    This is a partial user interface of SignupViewController   In similar fashion,
    add another UIViewController, and name it “LoginViewController” with a title “Log
    In.” Add a UITableView with two static cells. This time you only need the user’s
    e-mail and password to log in with you. Figure [2-25](#A978-1-4842-1317-9_2_Chapter.html#Fig25)
    shows what it looks like.


    ![A978-1-4842-1317-9_2_Fig25_HTML.jpg](A978-1-4842-1317-9_2_Fig25_HTML.jpg)


    Figure 2-25.


    This is a partial user interface of LoginViewController  


    Figure [2-26](#A978-1-4842-1317-9_2_Chapter.html#Fig26) shows the whole LoginSignup.storyboard


    ![A978-1-4842-1317-9_2_Fig26_HTML.gif](A978-1-4842-1317-9_2_Fig26_HTML.gif)


    Figure 2-26.


    The view controllers used in LoginSignup.storyboard


    ## Put It All Together


    To make our prototype work like the real thing, you need to write a little bit
    of code to handle cases:


    *   A user has not created an account but tapped “My Account” or “Add to Bag.”

    *   A user logs out.


    You may wonder whether you can ask a user to register an account with you when
    he/she just opens the app? Technically, yes, you can, but it’s not a good user
    experience. A user doesn’t know what the app is and what it can do, and you already
    ask him or her to register an account? Most likely the user will quit and delete
    the app.


    Use NSUserDefault to save the login/logout status of a customer. When the app
    just opens, assume the user is not a registered user. Here is the code:


    AppDelegate.m


    `- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary
    *)launchOptions {`


        `// Override point for customization after application launch.`


        `UITabBarController *tabBarController = (UITabBarController*)self.window.rootViewController;`


        `tabBarController.delegate = self;`


         `NSString *const kIsLoggedInfKey   = @"kIsLoggedIn";`


        `[[NSUserDefaults standardUserDefaults] registerDefaults:@{kIsLoggedInfKey:@(NO)}];`


        `return YES;`


    `}`


    When the user taps “My Account” or “Shopping Bag” tab, show our DispatchViewController.
    To do this, you need to a little bit more work.


    First, In AppDelegate, you need to declare UITabBarContollerDelegate:


    `UITabBarController *tabBarController = (UITabBarController*)self.window.rootViewController;`


        `tabBarController.delegate = self;`


    When the user taps a tab other than “My Account” or “Shopping Bag,” don’t ask
    the user to sign up or log in.


    Here is how to implement one of UITabBarControllerDelegates to respond to a tab
    selected:


    `- (void)tabBarController:(UITabBarController *)tabBarController didSelectViewController:(UIViewController
    *)viewController{`


        `UINavigationController *navViewController = (UINavigationController *)viewController;`


        `if (![navViewController.title isEqualToString:@"Shop"]) {`


            `if (!([[NSUserDefaults standardUserDefaults] boolForKey:kIsLoggedInfKey]))
    {`


                `UIStoryboard *dispatchStoryboard = [UIStoryboard storyboardWithName:@"LoginSignup"
    bundle:nil];`


                `UINavigationController *navController = (UINavigationController *)[dispatchStoryboard
    instantiateInitialViewController];`


                `[self.window.rootViewController presentViewController:navController
    animated:YES completion:nil];`


            `}`


        `}`


    `}`


    First, check which tap is selected by checking the title of navigation controllers.
    Then ask whether the user is logged in or not; If not, grab the Dispatch navigation
    controller by its storyboard identifier, then present it.


    In Dispatch view controller, implement two IBActions: A user logs in by using
    the “Log In with Facebook” feature, or a user cancels the login or sign-up process:


    `-(IBAction)onFacebookLogin:(id)sender{`


        `[[NSUserDefaults standardUserDefaults] setBool:YES forKey:kIsLoggedInfKey];`


        `[[NSUserDefaults standardUserDefaults] synchronize];`


        `[self dismissViewControllerAnimated:YES completion:nil];`


    `}`


    Here you simply set the `kIsLoggedInKey` of `NSUserDefaults` to `Yes` then dismiss
    the Dispatch navigation view controller.


    `-(IBAction)onCancel:(id)sender{`


        `[self dismissViewControllerAnimated:YES completion:nil];`


    `}`


    Once the user taps the “Cancel” UIBarButtonItem, we dismiss the Dispatch navigation
    view controller.


    Note


    A complete implementation can be found in the [Chapter 2](#A978-1-4842-1317-9_2_Chapter.html)
    source code.


    ## Summary


    In this chapter, I cover how to use UIStoryboard to create the prototype for the
    app used in this book. I have used the Tabbed Application template. Three tabs,
    namely, “Shop”, “Shopping Bag,” and “My Account” lead to three different main
    features for the app. I also showed how to set up a sign-up or login UIStoryboard.
    With some code to fake a signed-in user, I created a prototype of the app.'
  trans: "\n### 注册或登录\n\n一款用户友好的 App 并不总是要求用户从一开始就创建账户。它应当让用户有机会了解这款 App 是什么，以及它能给用户的生活带来什么价值。我们的\
    \ Beauty & Me 也不例外。\n\n对于这个原型，当满足以下任一条件时，要求用户创建账户或登录。用户点击以下任一选项：\n\n-   “我的账户”标签页\n\
    -   “购物袋”标签页\n-   `ProductDetailViewController` 上的“加入购物袋”按钮\n\n让我们创建另一个故事板来处理登录和注册工作流程。\n\
    \n打开现有项目。从 Xcode 的文件菜单中，选择 新建 ➤ 文件。此时会弹出如图 2-22 所示的对话框窗口。接下来，选择用户界面并选择 `Storyboard`。将\
    \ `UIStoryboard` 命名为 `LoginSignup.storyboard`。\n\n![A978-1-4842-1317-9_2_Fig22_HTML.jpg](img/A978-1-4842-1317-9_2_Fig22_HTML.jpg)\n\
    \n图 2-22.\n\n创建一个 `UIStoryboard` 文件。在故事板上添加一个 `UINavigationController`，将其标识符设置为\
    \ `“DispatchNavigationController”`，并勾选“作为初始视图控制器（Is Initial View Controller）”，如图\
    \ 2-23 所示。删除其默认的根视图控制器（一个 `UITableViewController`）。\n\n![A978-1-4842-1317-9_2_Fig23_HTML.jpg](img/A978-1-4842-1317-9_2_Fig23_HTML.jpg)\n\
    \n图 2-23.\n\n将 `DispatchNavigationController` 设置为初始视图控制器。添加一个 `UIViewController`，并将其设置为\
    \ `DispatchNavigationController` 的根视图控制器。将新的根视图控制器标识符命名为 `“DispatchViewController”`，并将其标题设置为“Beauty\
    \ & Me”。在 `DispatchViewController` 的视图上添加三个按钮，并分别为每个按钮设置标题——`“使用 Facebook 登录（Log\
    \ In with Facebook）”`、`“注册（Sign Up）”` 和 `“登录（Log In）”`。之所以将“使用 Facebook 登录”按钮放在顶部，是因为你确实希望鼓励用户在我们这里创建账户。\n\
    \n`DispatchNavigationController` 将以模态方式呈现，以便用户有机会取消该流程。在 `UIBarButtonItem` 的左侧添加一个系统提供的取消\
    \ `UIBarButtonItem`。此功能仅在您实现了用户点击“使用 Facebook 登录”按钮时的操作后才有效。目前，它不会执行任何操作。\n\n\
    添加另一个 `UIViewController`，并将其命名为 `“SignUpViewController”`，标题设置为 `“注册（Sign Up）”`。将“注册”按钮与\
    \ `SignUpViewController` 连接。在此视图控制器上，让用户输入其电子邮件和密码来向您注册账户。为确保用户能记住密码，让用户再输入一次密码。创建此用户体验的标准方法是使用包含三个单元格的\
    \ `UITableView`。每个单元格用于容纳一个 `UITextField`。在每个 `UITextField` 上放置占位符文本，以指示该单元格的用途，如图\
    \ 2-24 所示。在 `UITableView` 下方添加一个标题为“注册（Sign Up）”的 `UIButton`，并在右侧栏按钮项中添加一个标题为“注册（Sign\
    \ Up）”的 `UIBarButtonItem`，以便用户可以点击其中任何一个进行注册。\n\n![A978-1-4842-1317-9_2_Fig24_HTML.jpg](img/A978-1-4842-1317-9_2_Fig24_HTML.jpg)\n\
    \n图 2-24.\n\n这是 `SignupViewController` 的部分用户界面。以类似的方式，添加另一个 `UIViewController`，并将其命名为\
    \ `“LoginViewController”`，标题设置为 `“登录（Log In）”`。添加一个包含两个静态单元格的 `UITableView`。这次只需要用户的电子邮件和密码即可登录。图\
    \ 2-25 显示了其外观。\n\n![A978-1-4842-1317-9_2_Fig25_HTML.jpg](img/A978-1-4842-1317-9_2_Fig25_HTML.jpg)\n\
    \n图 2-25.\n\n这是 `LoginViewController` 的部分用户界面。图 2-26 显示了完整的 `LoginSignup.storyboard`。\n\
    \n![A978-1-4842-1317-9_2_Fig26_HTML.gif](img/A978-1-4842-1317-9_2_Fig26_HTML.gif)\n\
    \n图 2-26.\n\n在 `LoginSignup.storyboard` 中使用的视图控制器。\n\n## 整合实现\n\n为了使我们的原型像真实 App\
    \ 一样工作，您需要编写少量代码来处理以下情况：\n\n-   用户尚未创建账户，但点击了“我的账户”或“加入购物袋”。\n-   用户注销。\n\n您可能想知道是否可以在用户刚打开\
    \ App 时就要求他们注册账户？从技术上讲，可以，但这并不是良好的用户体验。用户还不知道 App 是什么以及它能做什么，您却已经要求他们注册账户？很可能用户会直接退出并删除该\
    \ App。\n\n使用 `NSUserDefault` 来保存客户的登录/注销状态。当 App 刚打开时，假设用户不是注册用户。代码如下：\n\n```\n\
    AppDelegate.m\n\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions {\n\n    // 应用程序启动后的自定义覆盖点。\n\n    UITabBarController *tabBarController\
    \ = (UITabBarController*)self.window.rootViewController;\n\n    tabBarController.delegate\
    \ = self;\n\n     NSString *const kIsLoggedInfKey   = @\"kIsLoggedIn\";\n\n  \
    \  [[NSUserDefaults standardUserDefaults] registerDefaults:@{kIsLoggedInfKey:@(NO)}];\n\
    \n    return YES;\n\n}\n```\n\n当用户点击“我的账户”或“购物袋”标签页时，显示我们的 `DispatchViewController`。要做到这一点，您需要做一些额外的工作。\n\
    \n首先，在 `AppDelegate` 中，您需要声明 `UITabBarContollerDelegate`：\n\n```\nUITabBarController\
    \ *tabBarController = (UITabBarController*)self.window.rootViewController;\n\n\
    \    tabBarController.delegate = self;\n```\n\n当用户点击除“我的账户”或“购物袋”之外的标签页时，不要求用户注册或登录。\n\
    \n以下是实现 `UITabBarControllerDelegates` 中的一个方法以响应标签页选择的方式：\n\n```\n- (void)tabBarController:(UITabBarController\
    \ *)tabBarController didSelectViewController:(UIViewController *)viewController{\n\
    \n    UINavigationController *navViewController = (UINavigationController *)viewController;\n\
    \n    if (![navViewController.title isEqualToString:@\"商店（Shop）\"]) {\n\n    \
    \    if (!([[NSUserDefaults standardUserDefaults] boolForKey:kIsLoggedInfKey]))\
    \ {\n\n            UIStoryboard *dispatchStoryboard = [UIStoryboard storyboardWithName:@\"\
    LoginSignup\" bundle:nil];\n\n            UINavigationController *navController\
    \ = (UINavigationController *)[dispatchStoryboard instantiateInitialViewController];\n\
    \n            [self.window.rootViewController presentViewController:navController\
    \ animated:YES completion:nil];\n\n        }\n\n    }\n\n}\n```\n\n首先，通过检查导航控制器的标题来判断选择了哪个标签页。然后询问用户是否已登录；如果未登录，则通过故事板标识符获取分派导航控制器，然后将其呈现出来。\n\
    \n在分派视图控制器中，实现两个 `IBActions`：用户使用“使用 Facebook 登录”功能登录，或者用户取消登录或注册流程：\n\n```\n\
    -(IBAction)onFacebookLogin:(id)sender{\n\n    [[NSUserDefaults standardUserDefaults]\
    \ setBool:YES forKey:kIsLoggedInfKey];\n\n    [[NSUserDefaults standardUserDefaults]\
    \ synchronize];\n\n    [self dismissViewControllerAnimated:YES completion:nil];\n\
    \n}\n```\n\n这里，我们只需将 `NSUserDefaults` 的 `kIsLoggedInKey` 设置为 `Yes`，然后关闭分派导航视图控制器。\n\
    \n```\n-(IBAction)onCancel:(id)sender{\n\n    [self dismissViewControllerAnimated:YES\
    \ completion:nil];\n\n}\n```\n\n一旦用户点击“取消” `UIBarButtonItem`，我们就关闭分派导航视图控制器。\n\
    \n**注意：** 完整的实现可以在第 2 章的源代码中找到。\n\n## 总结\n\n在本章中，我介绍了如何使用 `UIStoryboard` 为本书中使用的\
    \ App 创建原型。我使用了标签页应用模板。三个标签页，即“商店”、“购物袋”和“我的账户”，分别对应 App 的三个主要功能。我还展示了如何设置注册或登录的\
    \ `UIStoryboard`。通过一些代码来模拟已登录用户，我创建了该 App 的原型。\n"
- fmt: "# 3. Parse Fundamentals\n\nParse has numerous features and functionality to\
    \ help make a developer’s life easier. These features are covered throughout the\
    \ book. This chapter focuses on the Parse iOS SDK.\n\nIn this chapter you learn\
    \ about:\n\n- Interacting with the Parse `PFObject` class and subclasses\n- Retrieving\
    \ data with the `PFQuery` class\n- Creating relations between objects with pointers,\
    \ arrays, Parse relations, and joining tables\n- Loading and displaying images\
    \ with the `PFImageView` class\n- Displaying images with the `PFTableViewCell`\
    \ class\n- Querying and showing data with the `PFQueryTableViewController` class\n\
    \n## Interacting with Objects: `PFObject`\n\nIf you’re an iOS developer, you are\
    \ familiar with `NSObject`. `NSObject` is the root class of most Objective-C class\
    \ hierarchies. `PFObject` is the root Parse iOS class. When developing an iOS\
    \ app, you start with `PFObject`:\n\n```\n@interface PFObject : NSObject\n```\n\
    \nWhat makes `PFObject` so easy to work with Parse’s back end is that each `PFObject`\
    \ contains key/value pairs of JSON-compatible data. This data is schemaless, which\
    \ means that you don’t need to specify ahead of time what keys exist on each `PFObject`—you\
    \ simply set whatever key/value pairs you want, and Parse’s back end will store\
    \ it.\n\nAnother nice feature is that Parse doesn’t limit how a new class is created.\
    \ You go to your project home on the Parse web site, and add a new class from\
    \ the Data browser, by importing data, or from a client. To create a new class\
    \ from a client, remember to turn on client class creation in the settings page\
    \ of your project home (see Figure 3-1).\n\n![A978-1-4842-1317-9_3_Fig1_HTML.jpg](A978-1-4842-1317-9_3_Fig1_HTML.jpg)\n\
    \nFigure 3-1. Enable “Allow client class creation” in the Parse console\n\nFor\
    \ example, to create a `Product` class with properties such as `title`, `subtitle`,\
    \ `unitPrice`, and `priceUnit` (each, lbs, etc.), write the following code in\
    \ Xcode:\n\n```\nPFObject *product = [PFObject objectWithClassName:@\"Product\"\
    ];\n[product setObject:@\"iOS eCommerce App Development with Parse\" forKey:@\"\
    title\"];\n[product setObject:@(19.99) forKey:@\"unitPrice\"];\n[product setObject:@\"\
    ea\" forKey:@\"priceUnit\"];\n[product setObject:@\"A real world iOS app development\
    \ with Parse\" forKey:@\"subtitle\"];\n[product save];\n```\n\nTo save the class,\
    \ you call a `PFObject` `save` method. If there is no class called “Product” on\
    \ the Parse back end, Parse will create one for you. In the meantime, add a row\
    \ of data for this class, as shown in Figure 3-2.\n\n![A978-1-4842-1317-9_3_Fig2_HTML.jpg](A978-1-4842-1317-9_3_Fig2_HTML.jpg)\n\
    \nFigure 3-2. Parse created a `Product` class with a row of records\n\nIf a class\
    \ called “Product” already exists on the back end, executing the same code will\
    \ add another row of data.\n\nAlthough creating classes is easy, you can run into\
    \ problems quickly. For example, each class object has little to do with the real\
    \ business object you try to mimic. In this case, the `Product` is the real object\
    \ you want to represent, but you only call it `PFObject`, not `Product`. Also,\
    \ you have to remember all keys and set those keys with the proper values; it’s\
    \ kind of like working with `NSDictionary`. Luckily, the Parse native `PFObject`\
    \ subclass comes to the rescue.\n\nWorking with `PFObject` subclassing is even\
    \ easier than working with classes. Here is how. In Xcode, create a new file and\
    \ select Cocoa Touch Class; then name the file `Product` and make it a subclass\
    \ of `PFObject`, as shown in Figure 3-3.\n\n![A978-1-4842-1317-9_3_Fig3_HTML.jpg](A978-1-4842-1317-9_3_Fig3_HTML.jpg)\n\
    \nFigure 3-3. Create a `Product` subclass of `PFObject` with Xcode\n\nThis creates\
    \ two files: `Product.h` and `Product.m`.\n\nIn `Product.h`, you need to declare\
    \ that the `Product` class needs to conform to the `PFSubclassing` protocol; then,\
    \ create an `NSObject` with `title`, `subtitle`, `unitPrice`, and `priceUnit`\
    \ properties as usual.\n\n```\n#import <Parse/Parse.h>\n\n@interface Product :\
    \ PFObject<PFSubclassing>\n\n@property (nonatomic, copy) NSString *title;\n@property\
    \ (nonatomic, copy) NSString *subtitle;\n@property (nonatomic, assign) double\
    \ unitPrice;\n@property (nonatomic, copy) NSString *priceUnit;\n\n@end\n```\n\n\
    In `Product.m`, you need to import `<Parse/PFSubclassing.h>`:\n\n```\n#import\
    \ \"Product.h\"\n#import <Parse/PFObject+Subclass.h>\n```\n\nFor this implementation,\
    \ use the `@dynamic` keyword for your properties:\n\n```\n@dynamic title, subtitle,\
    \ priceUnit, unitPrice;\n```\n\nAnd there is another required method to implement:\n\
    \n```\n+(NSString *)parseClassName\n{\n    return @\"Product\";\n}\n```\n\nThat’s\
    \ it. Here is the complete code for the `Product.m` file:\n\n```\n#import \"Product.h\"\
    \n#import <Parse/PFObject+Subclass.h>\n\n@implementation Product\n\n@dynamic title,\
    \ subtitle, priceUnit, unitPrice;\n\n+(NSString *)parseClassName\n{\n    return\
    \ @\"Product\";\n}\n\n@end\n```\n\nThere is one more thing you need to do. In\
    \ the `AppDelegate.m` file, declare the `Product` class before declaring anything\
    \ else Parse related:\n\n```\n#import \"AppDelegate.h\"\n#import <Parse/Parse.h>\n\
    #import \"Product.h\"\n\n@implementation AppDelegate\n\n- (BOOL)application:(UIApplication\
    \ *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {\n\
    \    [Product registerSubclass];\n    [Parse setApplicationId:@\"YOUR-PARSE-APPLICATION-ID\"\
    \  clientKey:@\"YOUR-PARSE-CLIENT-KEY\"];\n    return YES;\n}\n```\n\nBasically,\
    \ this is how you create a `PFObject` subclass. Using the `Product` class is now\
    \ much easier and intuitive:\n\n```\nProduct *product = [Product object];\nproduct.title\
    \ = @\"iOS eCommerce App Development with Parse\";\nproduct.subtitle = @\"A real\
    \ world iOS app development with Parse\";\nproduct.priceUnit = @\"ea\";\nproduct.unitPrice\
    \ = 19.99;\n[product save];\n```\n\nWorking with an object constantly involves\
    \ four types of action queries: create, read, update, and delete. Parse makes\
    \ it easier for developers with its subclasses. Take the following `Product` subclass\
    \ uses cases, for example.\n\n- **Create**—As you have seen, it’s easy to create\
    \ a product object instance: `Product *product = [Product object];`\n- **Read**—Read\
    \ properties of a product object can be done as usual, using the standard way\
    \ to work with `NSObject`. For example, if you want to print the product’s title\
    \ to the console, use: `NSLog(@\"%@\", product.title);`\n- **Edit**—Editing a\
    \ product could mean changing the properties of a product, say, setting a new\
    \ price for this product: `product.unitPrice = 21.99;`\n- It is very important\
    \ to save the updated product into Parse, so you call: `[product save];`\n- Alternatively,\
    \ you can also call the `save` method asynchronously—always the recommended approach\
    \ for a better user experience: `[product saveInBackground];`\n- **Delete**—Like\
    \ an `NSObject` instance, set this object to nil. However, you also need to let\
    \ Parse know this object no longer exists, so call the `delete` method: `[product\
    \ delete];`\n- Or call it asynchronously: `[product deleteInBackground];`\n\n\
    **Note:** For more information about `PFObject` and its APIs, go to [https://parse.com/docs/ios/api/Classes/PFObject.html](https://parse.com/docs/ios/api/Classes/PFObject.html)."
  raw: '# 3. Parse Fundamentals


    Parse has numerous features and functionality to help make a developer’s life
    easier. These features are covered throughout the book. This chapter focuses on
    the Parse iOS SDK.


    In this chapter you learn about:


    *   Interacting with the Parse PFObject class and subclasses

    *   Retrieving data with the PFQuery class

    *   Creating relations between objects with pointers, arrays, Parse relations,
    and joining tables

    *   Loading and displaying images with the PFImageView class

    *   Displaying images with the PFTableViewCell class

    *   Querying and showing data with the PFQueryTableViewController class


    ## Interacting with Objects: PFObject


    If you’re an iOS developer, you are familiar with NSObject. NSObject is the root
    class of most Objective-C class hierarchies. PFObject is the root Parse iOS class.
    When developing an iOS app, you start with PFObject:


    `@interface PFObject : NSObject`


    What makes PFObject so easy to work with Parse’s back end is that each PFObject
    contains key/value pairs of JSON-compatible data. This data is schemaless, which
    means that you don’t need to specify ahead of time what keys exist on each PFObject—you
    simply set whatever key/value pairs you want, and Parse’s back end will store
    it.


    Another nice feature is that Parse doesn’t limit how a new class is created. You
    go to your project home on the Parse web site, and add a new class from the Data
    browser, by importing data, or from a client. To create a new class from a client,
    remember to turn on client class creation in the settings page of your project
    home (see Figure [3-1](#A978-1-4842-1317-9_3_Chapter.html#Fig1)).


    ![A978-1-4842-1317-9_3_Fig1_HTML.jpg](A978-1-4842-1317-9_3_Fig1_HTML.jpg)


    Figure 3-1.


    Enable “Allow client class creation” in the Parse console


    For example, to create a Product class with properties such as title, subtitle,
    unit price, and price per unit (each, lbs, etc.), write the following code in
    Xcode:


    `PFObject *product = [PFObject objectWithClassName:@"Product"];`


    `[product setObject:@"iOS eCommerce App Development with Parse" forKey:@"title"];`


    `[product setObject:@(19.99) forKey:@"unitPrice"];`


    `[product setObject:@"ea" forKey:@"priceUnit"];`


    `[product setObject:@"A real world iOS app development with Parse" forKey:@"subtitle"];`


    `[product save];`


    To save the class, you call a PFObject save method. If there is no class called
    “Product” on the Parse back end, Parse will create one for you. In the meantime,
    add a row of data for this class, as shown in Figure [3-2](#A978-1-4842-1317-9_3_Chapter.html#Fig2).


    ![A978-1-4842-1317-9_3_Fig2_HTML.jpg](A978-1-4842-1317-9_3_Fig2_HTML.jpg)


    Figure 3-2.


    Parse created a Product class with a row of records


    If a class called “Product” already exists on the back end, executing the same
    code will add another row of data.


    Although creating classes is easy, you can run into problems quickly. For example,
    each class object has little to do with the real business object you try to mimic.
    In this case, the Product is the real object you want to represent, but you only
    call it PFObject, not Product. Also, you have to remember all keys and set those
    keys with the proper values; it’s kind of like working with NSDictionary. Luckily,
    the Parse native PFObject subclass comes to the rescue.


    Working with PFObject subclassing is even easier than working with classes. Here
    is how. In Xcode, create a new file and select Cocoa Touch Class; then name the
    file Product and make it a subclass of PFObject, as shown in Figure [3-3](#A978-1-4842-1317-9_3_Chapter.html#Fig3).


    ![A978-1-4842-1317-9_3_Fig3_HTML.jpg](A978-1-4842-1317-9_3_Fig3_HTML.jpg)


    Figure 3-3.


    Create a Product subclass of PFObject with Xcode


    This creates two files: Product.h and Product.m.


    In Product.h, you need to declare that the Product class needs to conform to the
    PFSubclassing protocol; then, create an NSObject with title, subtitle, unit price,
    and price unit properties as usual.


    `#import` `<Parse/Parse.h>`


    `@interface Product : PFObject<PFSubclassing>`


    `@property (nonatomic, copy) NSString *title;`


    `@property (nonatomic, copy) NSString *subtitle;`


    `@property (nonatomic, assign) double unitPrice;`


    `@property (nonatomic, copy) NSString *priceUnit;`


    `@end`


    In Product.m, you need to import `<Parse/PFSubclassing.h>`:


    `#import "Product.h"`


    `#import <Parse/PFObject+Subclass.h>`


    For this implementation, use the `@dynamic` keyword for your properties:


    `@dynamic title, subtitle, priceUnit, unitPrice;`


    `And there is another required method to implement`


    `+(NSString *)parseClassName`


    `{`


    `return @"Product";`


    `}`


    That’s it. Here is the complete code for the Product.m file:


    `#import "Product.h"`


    `#import <Parse/PFObject+Subclass.h>`


    `@implementation Product`


    `@dynamic title, subtitle, priceUnit, unitPrice;`


    `+(NSString *)parseClassName`


    `{`


    `return @"Product";`


    `}`


    `@end`


    There is one more thing you need to do. In the AppDelegate.m file, declare the
    Product class before declaring anything else Parse related:


    `#import "AppDelegate.h"`


    `#import <Parse/Parse.h>`


    `#import "Product.h"`


    `@implementation AppDelegate`


    `- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary
    *)launchOptions {`


    `[Product registerSubclass];`


    `[Parse setApplicationId:@"YOUR-PARSE-APPLICATION-ID"  clientKey:@"YOUR-PARSE-CLIENT-KEY"];`


    `return YES;`


    `}`


    Basically, this is how you create a PFObject subclass. Using the Product class
    is now much easier and intuitive:


    `Product *product = [Product object];`


    `product.title = @"iOS eCommerce App Development with Parse";`


    `product.subtitle = @"A real world iOS app development with Parse";`


    `product.priceUnit = @"ea";`


    `product.unitPrice = 19.99;`


    `[product save];`


    Working with an object constantly involves four types of action queries: create,
    read, update, and delete. Parse makes it easier for developers with its subclasses.
    Take the following Product subclass uses cases, for example.


    *   Create—As you have seen, it’s easy to create a product object instance: `Product
    *product = [Product object];`

    *   Read—Read properties of a product object can be done as usual, using the standard
    way to work with NSObject. For example, if you want to print the product’s title
    to the console, use: `NSLog(@"%@", product.title);`

    *   Edit—Editing a product could mean changing the properties of a product, say,
    setting a new price for this product: `product.unitPrice = 21.99;`

    *   It is very important to save the updated product into Parse, so you call:
    `[product save];`

    *   Alternatively, you can also call the `save` method asynchronously—always the
    recommended approach for a better user experience: `[product saveInBackground];`

    *   Delete—Like an NSObject instance, set this object to nil. However, you also
    need to let Parse know this object no longer exists, so call the `delete` method:
    `[product delete];`

    *   Or call it asynchronously: `[product deleteInBackground];`


    Note


    For more information about PFObject and its APIs, got to [`https://parse.com/docs/ios/api/Classes/PFObject.html`](https://parse.com/docs/ios/api/Classes/PFObject.html)
    .'
  trans: "\n# 3. 解析基础\n\nParse 拥有众多特性和功能，旨在简化开发者的工作。这些特性将在本书中逐一介绍。本章将重点讲解 Parse iOS\
    \ SDK。\n\n在本章中，你将了解到：\n\n- 与 Parse `PFObject` 类及其子类进行交互\n- 使用 `PFQuery` 类检索数据\n\
    - 通过指针、数组、Parse 关系和连接表来创建对象之间的关系\n- 使用 `PFImageView` 类加载和显示图像\n- 使用 `PFTableViewCell`\
    \ 类显示图像\n- 使用 `PFQueryTableViewController` 类查询和展示数据\n\n## 与对象交互：`PFObject`\n\n\
    如果你是一名 iOS 开发者，你对 `NSObject` 应该不陌生。`NSObject` 是大多数 Objective-C 类层次结构的根类。`PFObject`\
    \ 则是 Parse iOS 的根类。在开发 iOS 应用时，你将从 `PFObject` 开始：\n\n```\n@interface PFObject\
    \ : NSObject\n```\n\n`PFObject` 之所以能如此轻松地与 Parse 后端配合使用，是因为每个 `PFObject` 都包含由\
    \ JSON 兼容数据组成的键值对。这些数据是无模式的，这意味着你无需预先指定每个 `PFObject` 上存在哪些键——只需设置你想要的任何键值对，Parse\
    \ 后端就会将其存储起来。\n\n另一个好用的特性是，Parse 不会限制新类的创建方式。你可以前往 Parse 网站上的项目主页，通过数据浏览器、导入数据或从客户端来添加新类。要从客户端创建新类，请记住在项目主页的设置页面中启用客户端类创建功能（见图\
    \ 3-1）。\n\n![A978-1-4842-1317-9_3_Fig1_HTML.jpg](img/A978-1-4842-1317-9_3_Fig1_HTML.jpg)\n\
    \n图 3-1. 在 Parse 控制台中启用“允许客户端类创建”\n\n例如，要创建一个包含 `title`、`subtitle`、`unitPrice`\
    \ 和 `priceUnit`（如个、磅等单位）等属性的 `Product` 类，请在 Xcode 中编写以下代码：\n\n```\nPFObject *product\
    \ = [PFObject objectWithClassName:@\"Product\"];\n[product setObject:@\"iOS eCommerce\
    \ App Development with Parse\" forKey:@\"title\"];\n[product setObject:@(19.99)\
    \ forKey:@\"unitPrice\"];\n[product setObject:@\"ea\" forKey:@\"priceUnit\"];\n\
    [product setObject:@\"A real world iOS app development with Parse\" forKey:@\"\
    subtitle\"];\n[product save];\n```\n\n要保存该类，你需要调用 `PFObject` 的 `save` 方法。如果 Parse\
    \ 后端上不存在名为“Product”的类，Parse 会为你创建一个。同时，还会为该类添加一行数据，如图 3-2 所示。\n\n![A978-1-4842-1317-9_3_Fig2_HTML.jpg](img/A978-1-4842-1317-9_3_Fig2_HTML.jpg)\n\
    \n图 3-2. Parse 创建了一个 `Product` 类，并带有一行记录\n\n如果后端已经存在名为“Product”的类，执行相同的代码将添加另一行数据。\n\
    \n尽管创建类很容易，但你可能很快就会遇到问题。例如，每个类对象与你试图模拟的实际业务对象关联不大。在这种情况下，`Product` 是你想要表示的实际对象，但你只称它为\
    \ `PFObject`，而不是 `Product`。此外，你还必须记住所有键，并用正确的值设置它们——这有点像使用 `NSDictionary`。幸运的是，Parse\
    \ 原生的 `PFObject` 子类功能可以解决这个问题。\n\n使用 `PFObject` 子类甚至比直接使用类还要简单。操作方法如下：在 Xcode\
    \ 中，创建一个新文件并选择 Cocoa Touch Class；然后将文件命名为 `Product`，并使其成为 `PFObject` 的子类，如图 3-3\
    \ 所示。\n\n![A978-1-4842-1317-9_3_Fig3_HTML.jpg](img/A978-1-4842-1317-9_3_Fig3_HTML.jpg)\n\
    \n图 3-3. 使用 Xcode 创建一个 `PFObject` 的 `Product` 子类\n\n这样会创建两个文件：`Product.h` 和 `Product.m`。\n\
    \n在 `Product.h` 中，你需要声明 `Product` 类必须遵循 `PFSubclassing` 协议；然后，像往常一样创建一个带有 `title`、`subtitle`、`unitPrice`\
    \ 和 `priceUnit` 属性的 `NSObject`。\n\n```\n#import <Parse/Parse.h>\n\n@interface\
    \ Product : PFObject<PFSubclassing>\n\n@property (nonatomic, copy) NSString *title;\n\
    @property (nonatomic, copy) NSString *subtitle;\n@property (nonatomic, assign)\
    \ double unitPrice;\n@property (nonatomic, copy) NSString *priceUnit;\n\n@end\n\
    ```\n\n在 `Product.m` 中，你需要导入 `<Parse/PFSubclassing.h>`：\n\n```\n#import \"Product.h\"\
    \n#import <Parse/PFObject+Subclass.h>\n```\n\n对于这个实现，请为你的属性使用 `@dynamic` 关键字：\n\
    \n```\n@dynamic title, subtitle, priceUnit, unitPrice;\n```\n\n还需要实现另一个必需的方法：\n\
    \n```\n+(NSString *)parseClassName\n{\n    return @\"Product\";\n}\n```\n\n就是这样。以下是\
    \ `Product.m` 文件的完整代码：\n\n```\n#import \"Product.h\"\n#import <Parse/PFObject+Subclass.h>\n\
    \n@implementation Product\n\n@dynamic title, subtitle, priceUnit, unitPrice;\n\
    \n+(NSString *)parseClassName\n{\n    return @\"Product\";\n}\n\n@end\n```\n\n\
    你还需要做一件事。在 `AppDelegate.m` 文件中，在声明任何与 Parse 相关的内容之前，先声明 `Product` 类：\n\n```\n\
    #import \"AppDelegate.h\"\n#import <Parse/Parse.h>\n#import \"Product.h\"\n\n\
    @implementation AppDelegate\n\n- (BOOL)application:(UIApplication *)application\
    \ didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {\n    [Product\
    \ registerSubclass];\n    [Parse setApplicationId:@\"YOUR-PARSE-APPLICATION-ID\"\
    \  clientKey:@\"YOUR-PARSE-CLIENT-KEY\"];\n    return YES;\n}\n```\n\n基本上，这就是创建\
    \ `PFObject` 子类的方法。现在，使用 `Product` 类变得更加简单和直观：\n\n```\nProduct *product = [Product\
    \ object];\nproduct.title = @\"iOS eCommerce App Development with Parse\";\nproduct.subtitle\
    \ = @\"A real world iOS app development with Parse\";\nproduct.priceUnit = @\"\
    ea\";\nproduct.unitPrice = 19.99;\n[product save];\n```\n\n与对象打交道时，通常涉及四种类型的操作：创建、读取、更新和删除。Parse\
    \ 凭借其子类简化了开发者的工作。以下面的 `Product` 子类使用场景为例。\n\n- **创建（Create）**——正如你所见，创建一个产品对象实例很容易：`Product\
    \ *product = [Product object];`\n- **读取（Read）**——可以使用标准方式处理 `NSObject` 来读取产品对象的属性。例如，如果你想把产品的标题打印到控制台，可以使用：`NSLog(@\"\
    %@\", product.title);`\n- **编辑（Edit）**——编辑产品可能意味着更改产品的属性，比如为该产品设置一个新价格：`product.unitPrice\
    \ = 21.99;`\n- 将更新后的产品保存到 Parse 中非常重要，因此你需要调用：`[product save];`\n- 或者，你也可以异步调用\
    \ `save` 方法——为了获得更好的用户体验，这通常是推荐的做法：`[product saveInBackground];`\n- **删除（Delete）**——像\
    \ `NSObject` 实例一样，将此对象设置为 nil。但是，你还需要让 Parse 知道该对象已不存在，因此调用 `delete` 方法：`[product\
    \ delete];`\n- 或者异步调用：`[product deleteInBackground];`\n\n**注意：** 有关 `PFObject`\
    \ 及其 API 的更多信息，请访问 [`parse.com/docs/ios/api/Classes/PFObject.html`](https://parse.com/docs/ios/api/Classes/PFObject.html)。\n"
- fmt: "# Retrieving Data: `PFQuery`\n\nSince all of your data is stored on Parse,\
    \ getting the data out of Parse is important. To do so, you query Parse using\
    \ the `PFQuery` helper class.\n\n`PFQuery` is a subclass of `PFObject`, and it\
    \ makes the common query-related API calls easier. Say you want to create a `PFQuery`\
    \ instance, you can use:\n\n`PFQuery *query = [PFQuery queryWithClassName:@\"\
    Product\"];`\n\nThe built-in class method `(+PFQuery *)queryWithClassName` with\
    \ a parameter of the class name indicates that the `Product` class is queried.\n\
    \nParse provides many easy-to-remember and easy-to-use methods to help keep the\
    \ query developer friendly.\n\nSay, you want to retrieve all of your products,\
    \ you can use:\n\n`NSArray *products = [query findObjects];`\n\nOr you can use\
    \ an asynchronous method:\n\n```\n__block NSArray *products;\n[query findObjectsInBackgroundWithBlock:^(NSArray\
    \ *objects, NSError *error){\n    if (!error) {\n        products = objects;\n\
    \    }\n}];\n```\n\nBy default, Parse will return the first 200 items of products\
    \ stored on Parse. If you want to customize the number of items retrieved, use\
    \ the `PFQuery` method: `-(void)setLimit: (NSInteger)limit`\n\n```\n[query setLimit:100];\n\
    ```\n\nIf you only want to get a product with the title of “iOS eCommerce App\
    \ Development with Parse,” use query constraint methods:\n\n```\n[query whereKey:@\"\
    title\" equalTo:@\"iOS eCommerce App Development with Parse\"];\n```\n\nYou can\
    \ also customize the sort order of your returned objects. The default result is\
    \ sorted with the `createdAt` property in ascending order. If you want to sort\
    \ the returned items alphabetically by product title and in ascending order, use\
    \ this:\n\n```\n[query orderByAscending:@\"title\"];\n```\n\nCombining those constraints,\
    \ you can perform very powerful queries.\n\n**Note:** For more information about\
    \ `PFQuery` and its APIs, go to [https://parse.com/docs/ios/api/Classes/PFQuery.html](https://parse.com/docs/ios/api/Classes/PFQuery.html).\n\
    \n# Creating Relations between Objects\n\nObjects can have multiple relationships\
    \ with other objects. A product normally belongs to a product category. This book\
    \ is normally put in the Computer Programming category in Barnes & Noble. The\
    \ Computer Programming category has many different programming books: a typical\
    \ one-to-many relationship scenario.\n\nProbably you have heard of other relationship\
    \ types such as one-to-one and many-to-many. Parse provides four different ways\
    \ to build relationships: pointers, arrays, Parse relations, and joining tables.\n\
    \n## Using Pointers\n\nPointers are used for one-to-one and one-to-many relationships.\
    \ For example, suppose you have a book and book category with a `Product` class\
    \ and a `ProductCategory` class; this is how you can define the relationship using\
    \ the `PFObject` subclasses in `Product.h`:\n\n```\n#import <Parse/Parse.h>\n\
    @class ProductCategory;\n@interface Product : PFObject<PFSubclassing>\n@property\
    \ (nonatomic, copy) NSString *title;\n@property (nonatomic, copy) NSString *subtitle;\n\
    @property (nonatomic, assign) double unitPrice;\n@property (nonatomic, copy) NSString\
    \ *priceUnit;\n@property (nonatomic, strong) ProductCategory *category;\n@end\n\
    ```\n\nSay you have a `ProductCategory` object with title “Programming Books,”\
    \ and you want the book to belong to this category, use this:\n\n```\nProductCategory\
    \ *category = [ProductCategory object];\ncategory.title = @\"Programming Book\"\
    ;\nProduct *product = [Product object];\nproduct.category = category;\n[product\
    \ saveInBackground];\n```\n\nThe nice thing about Parse is that if you save this\
    \ product now, the category object of `ProductCategory` will automatically be\
    \ saved to Parse without explicitly calling a `save` method.\n\nOnce you have\
    \ built the one-to-many relationship between this book and the book category,\
    \ and you want to show all books in the programming book category, use this query:\n\
    \n```\nPFQuery *query = [PFQuery queryWithClassName:@\"Product\"];\n[query whereKey:@\"\
    category\" equalTo:category];\n[query findObjectsInBackgroundWithBlock:^(NSArray\
    \ *objects, NSError *error){\n    if (!error) {\n    }\n}];\n```\n\n**Note:**\
    \ If you have a few custom query methods, it’s better to put them in the subclass\
    \ instead of in the main view controller you will work with.\n\n## Using Arrays\n\
    \nArrays are used in many-to-many relationships in much the same way that they\
    \ are for one-to-many relationships. All objects on one side of the relationship\
    \ will have an Array column containing several objects on the other side of the\
    \ relationship. In the case of a book product, several authors can write a book.\
    \ This is how to declare this relationship in the `Product` class:\n\n```\n#import\
    \ <Parse/Parse.h>\n@class ProductCategory;\n@interface Product : PFObject<PFSubclassing>\n\
    @property (nonatomic, copy) NSString *title;\n@property (nonatomic, copy) NSString\
    \ *subtitle;\n@property (nonatomic, assign) double unitPrice;\n@property (nonatomic,\
    \ copy) NSString *priceUnit;\n@property (nonatomic, strong) ProductCategory *category;\n\
    @property (nonatomic, strong) NSArray *authors;\n@end\n```\n\nSuppose you have\
    \ two `Author` objects:\n\n```\nproduct.authors = @[author1, author2];\n```\n\n\
    When performing a `Product` query, if you also want to get the related authors,\
    \ use a `-(void)include` `PFQuery` method. The following code shows how you can\
    \ get all authors from a `Product` query, and print the first author’s name:\n\
    \n```\nPFQuery *query = [PFQuery queryWithClassName:@\"Product\"];\n[query includeKey:@\"\
    authors\"];\n[query findObjectsInBackgroundWithBlock:^(NSArray *objects, NSError\
    \ *error){\n    if (!error) {\n        Product *product = objects[0];\n      \
    \  NSArray *authors = product.authors;\n        PFUser *author = authors[0];\n\
    \        NSLog(@\"%@\", [author objectForKey:@\"name\"]);\n    }\n}];\n```\n\n\
    **Note:** It’s important to use the `includeKey` method when you want to get the\
    \ object data that the array contains.\n\n## Using Parse Relations\n\nParse relations,\
    \ or `PFRelation`, works similarly to an `NSArray` of `PFObjects`. The difference\
    \ is that you don’t need to download all the objects in a relation at once. This\
    \ allows `PFRelation` to scale many more objects than the `NSArray` of the `PFObject`\
    \ approach. One example is that a user may like many products. To save the products\
    \ the user has liked, you can use `PFRelation`:\n\n```\nPFObject *user = [PFObject\
    \ object];\nPFRelation *relation = [user relationForKey:@\"likes\"];\n[relation\
    \ addObject:product];\n[user saveInBackground];\n```\n\nTo remove a product from\
    \ the user’s favorites list, use:\n\n```\n[relation removeObject:product];\n```\n\
    \nBy default, the list of products that the user has collected is not downloaded.\
    \ You can get the list of products in this way:\n\n```\n[[relation query] findObjectsInBackgroundWithBlock:^(NSArray\
    \ *objects, NSError *error){\n    if (!error) {\n        Product *product = objects[0];\n\
    \        NSLog(@\"%@\", product.title);\n    }\n}];\n```\n\n## Joining Tables\n\
    \nUsing the join tables method helps you get more information besides the relationship.\
    \ Take the following use case, for example: if you want to build a relationship\
    \ between a user and the product he reviewed, you care about who writes the review,\
    \ which product is reviewed, and the review content. The `ProductReview` `PFObject`\
    \ subclass for this use case looks like this:\n\n```\n#import <Parse/Parse.h>\n\
    @class Product;\n@interface ProductReview : PFObject\n@property (nonatomic, strong)\
    \ PFUser *user;\n@property (nonatomic, strong) Product *product;\n@property (nonatomic,\
    \ copy) NSString *content;\n@end\n```"
  raw: '## Retrieving Data: PFQuery


    Since all of your data is stored on Parse, getting the data out of Parse is important.
    To do so, you query Parse using the PFQuery helper class.


    PFQuery is a subclass of PFObject, and it makes the common query-related API calls
    easier. Say you want to create a PFQuery instance, you can use:


    `PFQuery *query = [PFQuery queryWithClassName:@"Product"];`


    The built-in class method `(+PFQuery *)queryWithClassName` with a parameter of
    the class name indicates that the `Product` class is queried.


    Parse provides many easy-to-remember and easy-to-use methods to help keep the
    query developer friendly.


    Say, you want to retrieve all of your products, you can use:


    `NSArray *products = [query findObjects];`


    Or you can use an asynchronous method:


    `__block NSArray *products;`


    `[query findObjectsInBackgroundWithBlock:^(NSArray *objects, NSError *error){`


            `if (!error) {`


                `products = objects;`


            `}`


    `}];`


    By default, Parse will return the first 200 items of products stored on Parse.
    If you want to customize the number of items retrieved, use the PFQuery method:
    `-(void)setLimit: (NSInteger)limit`


    `[query setLimit:100];`


    If you only want to get a product with the title of “iOS eCommerce App Development
    with Parse,” use query constraint methods:


    `[query whereKey:@"title" equalTo:@"iOS eCommerce App Development with Parse"];`


    You can also customize the sort order of your returned objects. The default result
    is sorted with the `createdAt` property in ascending order. If you want to sort
    the returned items alphabetically by product title and in ascending order, use
    this:


    `[query orderByAscending:@"title"];`


    Combining those constraints, you can perform very powerful queries.


    Note


    For more information about PFQuery and its APIs, go to [`https://parse.com/docs/ios/api/Classes/PFQuery.html`](https://parse.com/docs/ios/api/Classes/PFQuery.html)
    .


    ## Creating Relations between Objects


    Objects can have multiple relationships with other objects. A product normally
    belongs to a product category. This book is normally put in the Computer Programming
    category in Barnes & Noble. The Computer Programming category has many different
    programming books: a typical one-to-many relationship scenario.


    Probably you have heard of other relationship types such as one-to-one and many-to-many.
    Parse provides four different ways to build relationships: pointers, arrays, Parse
    relations, and joining tables.


    ### Using Pointers


    Pointers are used for one-to-one and one-to-many relationships. For example, suppose
    you have a book and book category with a Product class and a ProductCategory class;
    this is how you can define the relationship using the PFObject subclasses in Product.h:


    `#import <Parse/Parse.h>`


    `@class ProductCategory;`


    `@interface Product : PFObject<PFSubclassing>`


    `@property (nonatomic, copy) NSString *title;`


    `@property (nonatomic, copy) NSString *subtitle;`


    `@property (nonatomic, assign) double unitPrice;`


    `@property (nonatomic, copy) NSString *priceUnit;`


    `@property (nonatomic, strong) ProductCategory *category;`


    `@end`


    Say you have a Product Category object with title “Programming Books,” and you
    want the book to belong to this category, use this:


    `ProductCategory *category = [ProductCategory object];`


    `category.title = @"Programming Book";`


    `Product *product = [Product object];`


    `product.category = category;`


    `[product saveInBackground];`


    The nice thing about Parse is that if you save this product now, the category
    object of ProductCategory will automatically be saved to Parse without explicitly
    calling a `save` method.


    Once you have built the one-to-many relationship between this book and the book
    category, and you want to show all books in the programming book category, use
    this query:


    `PFQuery *query = [PFQuery queryWithClassName:@"Product"];`


    `[query whereKey:@"category" equalTo:category];`


    `[query findObjectsInBackgroundWithBlock:^(NSArray *objects, NSError *error){`


            `if (!error) {`


            `}`


    `}];`


    Note


    If you have a few custom query methods, it’s better to put them in the subclass
    instead of in the main view controller you will work with.


    ### Using Arrays


    Arrays are used in many-to-many relationships in much the same way that they are
    for one-to-many relationships. All objects on one side of the relationship will
    have an Array column containing several objects on the other side of the relationship.
    In the case of a book product, several authors can write a book. This is how to
    declare this relationship in the Product class:


    `#import <Parse/Parse.h>`


    `@class ProductCategory;`


    `@interface Product : PFObject<PFSubclassing>`


    `@property (nonatomic, copy) NSString *title;`


    `@property (nonatomic, copy) NSString *subtitle;`


    `@property (nonatomic, assign) double unitPrice;`


    `@property (nonatomic, copy) NSString *priceUnit;`


    `@property (nonatomic, strong) ProductCategory *category;`


    `@property (nonatomic, strong) NSArray *authors;`


    `@end`


    Suppose you have two Author objects:


    `product.authors = @[author1, author2];`


    When performing a Product query, if you also want to get the related authors,
    use a `-(void)include` PFQuery method. The following code shows how you can get
    all authors from a Product query, and print the first author’s name:


    `PFQuery *query = [PFQuery queryWithClassName:@"Product"];`


    `[query includeKey:@"authors"];`


    `[query findObjectsInBackgroundWithBlock:^(NSArray *objects, NSError *error){`


            `if (!error) {`


                `Product *product = objects[0];`


                `NSArray *authors = product.authors;`


                `PFUser *author = authors[0];`


                `NSLog(@"%@", [author objectForKey:@"name"]);`


            `}`


    `}];`


    Note


    It’s important to use the `includeKey` method when you want to get the object
    data that the array contains.


    ### Using Parse Relations


    Parse relations, or PFRelation, works similarly to an NSArray of PFObjects. The
    difference is that you don’t need to download all the objects in a relation at
    once. This allows PFRelation to scale many more objects than the NSArray of the
    PFObject approach. One example is that a user may like many products. To save
    the products the user has liked, you can use PFRelation:


    `PFObject *user = [PFObject object];`


    `PFRelation *relation = [user relationForKey:@"likes"];`


    `[relation addObject:product];`


    `[user saveInBackground];`


    To remove a product from the user’s favorites list, use:


    `[relation removeObject:product];`


    By default, the list of products that the user has collected is not downloaded.
    You can get the list of products in this way:


    `[[relation query] findObjectsInBackgroundWithBlock:^(NSArray *objects, NSError
    *error){`


            `if (!error) {`


                `Product *product = objects[0];`


                `NSLog(@"%@", product.title);`


            `}`


    `}];`


    ### Joining Tables


    Using the join tables method helps you get more information besides the relationship.
    Take the following use case, for example: if you want to build a relationship
    between a user and the product he reviewed, you care about who writes the review,
    which product is reviewed, and the review content. The ProductReview PFObject
    subclass for this use case looks like this:


    `#import <Parse/Parse.h>`


    `@class Product;`


    `@interface ProductReview : PFObject`


    `@property (nonatomic, strong) PFUser *user;`


    `@property (nonatomic, strong) Product *product;`


    `@property (nonatomic, copy) NSString *content;`


    `@end`'
  trans: "\n# 检索数据：`PFQuery`\n\n由于你的所有数据都存储在 Parse 上，从 Parse 获取这些数据就变得至关重要。为此，你可以使用\
    \ `PFQuery` 辅助类来查询 Parse。\n\n`PFQuery` 是 `PFObject` 的子类，它让常见的查询相关 API 调用变得更加简单。假设你想创建一个\
    \ `PFQuery` 实例，可以这样使用：\n\n`PFQuery *query = [PFQuery queryWithClassName:@\"Product\"\
    ];`\n\n内置的类方法 `(+PFQuery *)queryWithClassName` 以类名作为参数，表明查询的是 `Product` 类。\n\n\
    Parse 提供了许多易于记忆和使用的*方法*，以保持查询对开发者友好。\n\n比如说，你想检索所有的产品，可以这样使用：\n\n`NSArray *products\
    \ = [query findObjects];`\n\n或者你也可以使用异步方法：\n\n```\n__block NSArray *products;\n\
    [query findObjectsInBackgroundWithBlock:^(NSArray *objects, NSError *error){\n\
    \    if (!error) {\n        products = objects;\n    }\n}];\n```\n\n默认情况下，Parse\
    \ 会返回存储在 Parse 上的前 200 个产品条目。如果你想自定义检索的条目数量，可以使用 `PFQuery` 的方法：`-(void)setLimit:\
    \ (NSInteger)limit`\n\n```\n[query setLimit:100];\n```\n\n如果你只想获取标题为 “iOS eCommerce\
    \ App Development with Parse” 的产品，可以使用查询约束方法：\n\n```\n[query whereKey:@\"title\"\
    \ equalTo:@\"iOS eCommerce App Development with Parse\"];\n```\n\n你还可以自定义返回对象的排序顺序。默认结果是按\
    \ `createdAt` 属性升序排列。如果你想按产品标题的字母顺序升序排列返回的条目，可以这样使用：\n\n```\n[query orderByAscending:@\"\
    title\"];\n```\n\n结合这些约束，你可以执行非常强大的查询。\n\n**注意：** 有关 `PFQuery` 及其 API 的更多信息，请访问\
    \ [`parse.com/docs/ios/api/Classes/PFQuery.html`](https://parse.com/docs/ios/api/Classes/PFQuery.html)。\n\
    \n# 创建对象间的关系\n\n对象之间可以拥有多种关系。一个产品通常属于一个产品类别。例如，这本书通常被归入 Barnes & Noble 的“计算机编程”类别。而“计算机编程”类别包含了许多不同的编程书籍：这是一个典型的一对多关系场景。\n\
    \n你可能还听说过其他关系类型，例如一对一和多对多。Parse 提供了四种不同的方式来构建关系：指针、数组、Parse 关系和连接表。\n\n## 使用指针\n\
    \n指针用于一对一和一对多关系。例如，假设你有一个书籍和书籍类别，分别对应 `Product` 类和 `ProductCategory` 类；以下是在 `Product.h`\
    \ 中使用 `PFObject` 子类定义关系的方法：\n\n```\n#import <Parse/Parse.h>\n@class ProductCategory;\n\
    @interface Product : PFObject<PFSubclassing>\n@property (nonatomic, copy) NSString\
    \ *title;\n@property (nonatomic, copy) NSString *subtitle;\n@property (nonatomic,\
    \ assign) double unitPrice;\n@property (nonatomic, copy) NSString *priceUnit;\n\
    @property (nonatomic, strong) ProductCategory *category;\n@end\n```\n\n假设你有一个标题为\
    \ “Programming Books” 的 `ProductCategory` 对象，并且你想让这本书属于这个类别，可以这样使用：\n\n```\nProductCategory\
    \ *category = [ProductCategory object];\ncategory.title = @\"Programming Book\"\
    ;\nProduct *product = [Product object];\nproduct.category = category;\n[product\
    \ saveInBackground];\n```\n\nParse 的一个好处是，如果你现在保存这个产品，`ProductCategory` 的 category\
    \ 对象将自动保存到 Parse，而无需显式调用 `save` 方法。\n\n一旦你在这本书和书籍类别之间建立了多对一关系，并且你想展示编程书籍类别中的所有书籍，可以使用这个查询：\n\
    \n```\nPFQuery *query = [PFQuery queryWithClassName:@\"Product\"];\n[query whereKey:@\"\
    category\" equalTo:category];\n[query findObjectsInBackgroundWithBlock:^(NSArray\
    \ *objects, NSError *error){\n    if (!error) {\n    }\n}];\n```\n\n**注意：** 如果你有一些自定义的查询方法，最好将它们放在子类中，而不是放在你将使用的主视图控制器里。\n\
    \n## 使用数组\n\n数组在多对多关系中的使用方式，与在一对多关系中大致相同。关系一侧的所有对象将拥有一个数组列，其中包含关系另一侧的多个对象。以书籍产品为例，一本书可以由多位作者合著。以下是在\
    \ `Product` 类中声明这种关系的方法：\n\n```\n#import <Parse/Parse.h>\n@class ProductCategory;\n\
    @interface Product : PFObject<PFSubclassing>\n@property (nonatomic, copy) NSString\
    \ *title;\n@property (nonatomic, copy) NSString *subtitle;\n@property (nonatomic,\
    \ assign) double unitPrice;\n@property (nonatomic, copy) NSString *priceUnit;\n\
    @property (nonatomic, strong) ProductCategory *category;\n@property (nonatomic,\
    \ strong) NSArray *authors;\n@end\n```\n\n假设你有两个 `Author` 对象：\n\n```\nproduct.authors\
    \ = @[author1, author2];\n```\n\n当执行 `Product` 查询时，如果你还想获取相关的作者，可以使用 `-(void)include`\
    \ 这个 `PFQuery` 方法。以下代码展示了如何从 `Product` 查询中获取所有作者，并打印第一位作者的姓名：\n\n```\nPFQuery\
    \ *query = [PFQuery queryWithClassName:@\"Product\"];\n[query includeKey:@\"authors\"\
    ];\n[query findObjectsInBackgroundWithBlock:^(NSArray *objects, NSError *error){\n\
    \    if (!error) {\n        Product *product = objects[0];\n        NSArray *authors\
    \ = product.authors;\n        PFUser *author = authors[0];\n        NSLog(@\"\
    %@\", [author objectForKey:@\"name\"]);\n    }\n}];\n```\n\n**注意：** 当你想要获取数组所包含的对象数据时，使用\
    \ `includeKey` 方法非常重要。\n\n## 使用 Parse 关系\n\nParse 关系，即 `PFRelation`，其工作方式类似于 `PFObject`\
    \ 的 `NSArray`。不同之处在于，你不需要一次性下载关系中的所有对象。这使得 `PFRelation` 能够扩展到比 `PFObject` 的 `NSArray`\
    \ 方法更多的对象。一个例子是，一个用户可能喜欢很多产品。要保存用户已喜欢的产品，你可以使用 `PFRelation`：\n\n```\nPFObject\
    \ *user = [PFObject object];\nPFRelation *relation = [user relationForKey:@\"\
    likes\"];\n[relation addObject:product];\n[user saveInBackground];\n```\n\n要从用户的收藏列表中移除一个产品，可以这样使用：\n\
    \n```\n[relation removeObject:product];\n```\n\n默认情况下，用户已收藏的产品列表是不会被下载的。你可以通过以下方式获取产品列表：\n\
    \n```\n[[relation query] findObjectsInBackgroundWithBlock:^(NSArray *objects,\
    \ NSError *error){\n    if (!error) {\n        Product *product = objects[0];\n\
    \        NSLog(@\"%@\", product.title);\n    }\n}];\n```\n\n## 连接表\n\n使用连接表方法可以帮助你获取除关系本身之外的更多信息。以下面这个用例为例：如果你想建立用户与其评论过的产品之间的关系，你会关心谁写了评论、评论了哪个产品以及评论的内容。针对这个用例，`ProductReview`\
    \ 这个 `PFObject` 子类如下所示：\n\n```\n#import <Parse/Parse.h>\n@class Product;\n@interface\
    \ ProductReview : PFObject\n@property (nonatomic, strong) PFUser *user;\n@property\
    \ (nonatomic, strong) Product *product;\n@property (nonatomic, copy) NSString\
    \ *content;\n@end\n```\n"
- fmt: "# Introducing a Special Parse Object: PFUser\n\nThe `PFUser` class is a local\
    \ representation of a user persisted to the Parse Data. This class is a subclass\
    \ of a `PFObject` and has all the same features, such as flexible schema, automatic\
    \ persistence, and a key value interface. The difference is that `PFUser` has\
    \ some special additions specific to user accounts, including authentication,\
    \ sign up, and validation uniqueness.\n\nNotably, `username` and `password` are\
    \ two required properties for `PFUser`. The `e-mail` property of `PFUser` is always\
    \ there even though you might want to set a value for it.\n\nTo sign up a user\
    \ with a username and password, start by creating a `PFUser` instance:\n\n```\n\
    PFUser *user = [PFUser user];\n```\n\nNext, get the `username` and `password`\
    \ from two `UITextField` instances:\n\n```\nuser.username = usernameTextField.text;\n\
    user.password = passwordTextField.text;\n```\n\nThen call the `-(BOOL)signUp`\
    \ method, or asynchronically the `signUp` method:\n\n```\n[user signUpInBackgroundWithBlock:^(BOOL\
    \ succeeded, NSError *error) {\n    if (!error) {\n    }\n}];\n```\n\nIt is quite\
    \ common nowadays to require a user’s e-mail address as username. You can use\
    \ a `UITextField` to collect the user’s e-mail:\n\n```\nuser.username = emailTextField.text;\n\
    user.password = passwordTextField.text;\nuser.email = emailTextField.text;\n```\n\
    \nNext, you need to verify the text in `emailTextField` is a valid e-mail address.\
    \ Parse provides the `emailVerified` property for `PFUser`. The value of `emailVerified`\
    \ can only be set to `true` while this user clicks a link in the verification\
    \ e-mail sent by Parse (this process is discussed in [Chapter 19](#A978-1-4842-1317-9_19_Chapter.html)).\n\
    \nYou log in a user with the `PFUser` class method `logInWithUsernameInBackground:password`:\n\
    \n```\n[PFUser logInWithUsernameInBackground:emailTextField.text\n           \
    \                 password:passwordTextField.text\n                          \
    \     block:^(PFUser *user, NSError *error) {\n    if (!error) {\n    }\n}];\n\
    ```\n\nOnce this user has logged in, use the class method `[PFUser currentUser]`\
    \ to get an instance of the current user. The user is persisted on the client.\
    \ Unless the user has logged out, you can always use this method to get the current\
    \ user.\n\nTo log the user out, simply call this method:\n\n```\n[PFUser logOut];\n\
    ```\n\nParse also provides an Anonymous Users feature. An anonymous user can be\
    \ created without a username and password while still retaining all of the same\
    \ capabilities as any other `PFUser`. After logging out, an anonymous user is\
    \ abandoned, and the user’s data is no longer accessible. A typical use case is\
    \ to create an anonymous user when your app is launched for the first time; you\
    \ then let the user add products to the shopping bag, and keep track of what the\
    \ user has liked. You won’t ask the user to sign up with an e-mail and password\
    \ until later or the user’s data will be discarded.\n\nTo enable this feature,\
    \ call it in `application:didFinishLaunchingWithOptions:` in `AppDelegate.m`:\n\
    \n```\n[PFUser enableAutomaticUser];\n```\n\nOnce this method is called, when\
    \ check `[PFUser currentUser]`, it won’t return a `nil`.\n\nTo check whether the\
    \ current user is an anonymous user, use the `PFAnonymousUtils` method `+ (BOOL)isLinkedWithUser:(nullable\
    \ PFUser *)user`:\n\n```\nif ([PFAnonymousUtils isLinkedWithUser:[PFUser currentUser]])\
    \ {\n    NSLog(@\"It is an anonymous user.\");\n}\n```\n\nYou can create a subclass\
    \ of `PFUser` the same way you created a `PFObject` subclass. For example, if\
    \ you have a `Customer` object, the `Customer.h` file will look like this:\n\n\
    ```objective-c\n#import <Parse/Parse.h>\n\n@interface Customer : PFUser<PFSubclassing>\n\
    \n@property (nonatomic, copy) NSString *firstName;\n@property (nonatomic, copy)\
    \ NSString *lastName;\n@property (nonatomic, copy) NSString *address1;\n@property\
    \ (nonatomic, copy) NSString *city;\n@property (nonatomic, copy) NSString *state;\n\
    @property (nonatomic, copy) NSString *zipcode;\n\n@end\n```\n\n`Customer.m` will\
    \ look like this:\n\n```objective-c\n#import \"Customer.h\"\n#import <Parse/PFObject+Subclass.h>\n\
    \n@implementation Customer\n\n@dynamic firstName, lastName, address1, city, state,\
    \ zipcode;\n\n@end\n```\n\nThe `+(NSString *)parseClassName` method is not required\
    \ to implement for the subclass of `PFUser` because the Parse class name will\
    \ always be `\"_User\"`.\n\n> **Note:** To read more about `PFUser`, visit [`https://parse.com/docs/osx/api/Classes/PFUser.html`](https://parse.com/docs/osx/api/Classes/PFUser.html).\n\
    \n## Loading and Displaying Images: PFImageView\n\n`PFImageView` is a subclass\
    \ of `UIimageView`. It is a helper class that makes downloading image files from\
    \ the Parse server easier. You use it the same way you use `UIimageView`. To display\
    \ an image, write the following:\n\n```objective-c\nPFImageView *imageView = [[PFImageView\
    \ alloc] initWithFrame:CGRectMake(0.0, 0.0, 320.0, 180.0)];\nimageView.contentMode\
    \ = UIViewContentModeScaleAspectFill;\nimageView.file = product.image;\n[imageView\
    \ loadInBackground];\n```\n\n`PFImageview` has a `file` property that is an instance\
    \ of `PFFile`. Your `Product` instance has a property `image`, which is also the\
    \ instance of `PFFile`.\n\n> **Note:** You can read more about `PFFile` at [`https://parse.com/docs/osx/api/Classes/PFFile.html`](https://parse.com/docs/osx/api/Classes/PFFile.html).\n\
    \n## Displaying an Image in a Cell: PFTableViewCell\n\n`PFTableViewCell` is a\
    \ subclass of `UITableViewCell`. It is a helper class to display any image downloaded\
    \ from the Parse server more easily.\n\n```objective-c\n- (PFTableViewCell *)tableView:(UITableView\
    \ * __nonnull)tableView\n         cellForRowAtIndexPath:(NSIndexPath * __nonnull)indexPath\n\
    \                        object:(nullable Product *)object\n{\n    PFTableViewCell\
    \ *cell = [tableView dequeueReusableCellWithIdentifier:@\"ProductCell\"];\n  \
    \  cell.imageView.file = object.image;\n    [cell.imageView loadInBackground];\n\
    \    return cell;\n}\n```"
