    \ Summary\n\nIn general, it's an easy task to implement a `UITextField` or `UITextView`\
    \ to accept a user's input. In reality, you need to consider that a software keyboard\
    \ will occupy part of the screen. To handle this, I will introduce an approach\
    \ that you will use a `UIScrollView` as a container view to hold all other UI\
    \ controls. The purpose of `UIScrollView` is to help us move the whole view up\
    \ while a soft keyboard is being shown. To do so, the first step is to add the\
    \ method `-(void)moveTextViewForKeyboard:(NSNotification *)aNotification up:(BOOL)up`\
    \ to the delegate methods of `UITextView`. When a `UITextView` begins the editing\
    \ mode, you move the `UITextView` up for a software keyboard. When a `UITextView`\
    \ finishes the editing, you move the `UITextView` down.\n\n```\n- (void)textViewDidBeginEditing:(UITextView\
    \ *)textView {\n  [self moveTextViewForKeyboard:nil up:YES];\n}\n\n- (BOOL)textViewShouldEndEditing:(UITextView\
    \ *)textView\n{\n  [self moveTextViewForKeyboard:nil up:NO];\n  return YES;\n\
    }\n```\n\nNext, implement how you can move a `UITextView` up and down. You already\
    \ known the height of a software keyboard in portrait mode, which is 216 points.\
    \ The whole idea of moving the `UITextView` up or down is by changing its origin\
    \ by amount of 0.7 * keyboard_height so you can leave room for the software keyboard.\
    \ In the following implementation, I have also considered the case that a device\
    \ is in landscape mode.\n\n```\n#pragma mark - Keyboard Event Notifications\n\
    - (void)moveTextViewForKeyboard:(NSNotification*)aNotification up:(BOOL)up {\n\
    \  CGRect keyboardEndFrame = CGRectMake(0.0, 0.0, self.view.frame.size.width,\
    \ KEYBOARD_HEIGHT);\n  [UIView animateWithDuration:1.0 animations:nil completion:^(BOOL\
    \ finished) {\n    CGRect newFrame = self.view.frame;\n    if (keyboardEndFrame.size.height\
