- fmt: "## Product Category Model\n\nThe Product Category model is used to mimic the\
    \ makeup product brand. A brand has a title as the minimum, a logo, origin country,\
    \ and a description about this brand. For this example, since I only carry well-known\
    \ brands, I only use the brand title and logo image.\n\nI have introduced `PFObject`\
    \ in [Chapter 3](#A978-1-4842-1317-9_3_Chapter.html). Your category model will\
    \ be a subclass of `PFObject`. Subclassing `PFObject` requires giving a `ParseClassName`.\
    \ This `ParseClassName` needs to be the same you chose when setting it on the\
    \ Parse website. In other words, if you create a model class called `Category`\
    \ in your project on Parse.com, you need to use `\"Category\"` as the `ParseClassName`\
    \ in the subclass file. The following sample code shows how this is done.\n\n\
    Start by registering a `kCategory` string constant with `EMCAConstants.h`:\n\n\
    `extern NSString *const kCategory;`\n\nand in the `EMABConstants.m` file:\n\n\
    `NSString *const kCategory = @\"Category\";`\n\nNext, create an `EMABCategory`\
    \ subclass to represent your makeup product category. The class has two properties,\
    \ `title` and `image`, which represent the brand name and logo. In [Chapter 3](#A978-1-4842-1317-9_3_Chapter.html),\
    \ I explained how to create a `PFObject` subclass—for example, you use an `NSString`\
    \ instance to hold the brand title and `UIImage` for the logo. The image file\
    \ for each brand is stored on the Parse server; your iOS app will fetch the image\
    \ file and convert it into `UIImage`, and then show the image with an `UIImageView`.\
    \ Loading an image file from a remote server is always a challenging task in iOS.\
    \ If you want to cache the image file so you don’t need to fetch it again next\
    \ time, you have more work to do.\n\nSince this is a common task you are facing\
    \ while developing an iOS app, Parse makes it easier by introducing a class called\
    \ `PFFile`. I will use an example shortly to demonstrate how using this class\
    \ makes a developer's life easier. For now, just use `PFFile` class to hold the\
    \ image.\n\nThe iPhone app will also fetch all product categories from the Parse\
    \ server. [Chapter 3](#A978-1-4842-1317-9_3_Chapter.html) introduced the `PFQuery`\
    \ class. For this example, you will need to create a helper class method called\
    \ `+(PFQuery *)basicQuery` in your `EMABCategory` subclass.\n\nHere is the complete\
    \ `EMABCategory` header file:\n\n`EMABCategory.h`\n\n```\n#import <Parse/Parse.h>\n\
    \n@interface EMABCategory : PFObject<PFSubclassing>\n\n@property (nonatomic, copy)\
    \ NSString *title;\n@property (nonatomic, strong) PFFile *image;\n\n+(PFQuery\
    \ *)basicQuery;\n\n@end\n```\n\nIf `PFObject` is not recognized, verify that you\
    \ have included `#import <Parse/Parse.h>`.\n\nThe implementation of `EMABCategory`\
    \ is perhaps the simplest one in this book. Besides importing a header file of\
    \ this subclass, you import `\"EMABConstants.h\"` because the required `+(NSString\
    \ *)ParseClassName` method needs to return an `NSString`. You can write something\
    \ like this:\n\n```\n+(NSString *)parseClassName {\n    return @\"Category\";\n\
    }\n```\n\nIf you use the `@\"Category\"` model class name at different locations\
    \ but later on you want to change it to `@\"Brand\"`, you have to look for it\
    \ in the whole project and replace it with `\"Brand\"`. Using a global constant\
    \ helps to solve this issue. You just need to change it from `\"Category\"` to\
    \ `\"Brand\"` in the `\"EMABConstants.m\"` once.\n\nIn the `+(PFQuery *)basicQuery`\
    \ implementation, you sort the fetch results based on the title alphabetically\
    \ by simply using `orderByAscending` method—this is another benefit of Parse.\
    \ Imagine you develop for iOS, Android, or the Web. If you want to have the same\
    \ features for the three platforms, platform engineers need to write their own\
    \ sorting method, given the back end doesn’t have it, which is quite typical.\n\
    \nHere is the complete implementation:\n\n`EMABCategory.m`\n\n```\n#import \"\
    EMABCategory.h\"\n#import  <Parse/PFObject+Subclass.h>\n#import   \"EMABConstants.h\"\
    \n\n@implementation EMABCategory\n\n@dynamic title, image;\n\n+(NSString *)parseClassName\n\
    {\n    return kCategory;\n}\n\n+(PFQuery *)basicQuery{\n    PFQuery *query = [PFQuery\
    \ queryWithClassName:[self parseClassName]];\n    [query orderByAscending:@\"\
    title\"];\n    return query;\n}\n\n@end\n```\n\n## Product Category View\n\nAs\
    \ shown in the prototype of the sample app in [Chapter 2](#A978-1-4842-1317-9_2_Chapter.html),\
    \ a `UITableViewController` is used to present all brands. While the `UITableView`\
    \ itself looks pretty simple, what makes it look richer is each `UITableViewCell`,\
    \ as shown in Figure [5-1](#A978-1-4842-1317-9_5_Chapter.html#Fig1). For the brand,\
    \ focus on the `UITableViewCell`.\n\n![A978-1-4842-1317-9_5_Fig1_HTML.jpg](A978-1-4842-1317-9_5_Fig1_HTML.jpg)\n\
    \nFigure 5-1. Category cell in `EMABCategoryTableViewController`\n\nThe `EMABCategory`\
    \ has two properties, `title` and `image`; the `EMABCategoryTableViewCell`, a\
    \ subclass of `PFTableViewCell`, also has two properties to hold the title and\
    \ image: one is `UILabel`, the other is `PFImageView`.\n\nYou also want to let\
    \ an `EMABCategory` model object hook up with `EMABCategoryTableViewCell`, so\
    \ you create a helper method: `-(void)configureItem:(EMABCategory *)item`. Here\
    \ is the complete header file:\n\n`EMABCategoryTableViewCell.h`\n\n```\n#import\
    \ \"PFTableViewCell.h\"\n@class EMABCategory;\n\n@interface EMABCategoryTableViewCell\
    \ : PFTableViewCell\n\n-(void)configureItem:(EMABCategory *)item;\n\n@end\n```\n\
    \nAs you can see, you don’t define the `UILabel` and `PFImageView` properties\
    \ in the header file—you define them in the implementation file. The reason is\
    \ that the properties are private; there is no need to let the outside world know\
    \ what you are using. On the other hand, your UI is fairly simple, so for the\
    \ purpose of keeping the code clean, you will use `IBOutlet` to hook up the properties\
    \ in your implementation with the Main UIStoryboard. Here is the interface category\
    \ in the `.m` file:\n\n```\n@interface EMABCategoryTableViewCell()\n\n@property\
    \ (nonatomic, weak) IBOutlet PFImageView *backgroundImageView;\n@property (nonatomic,\
    \ weak) IBOutlet UILabel *titleLabel;\n\n@end;\n```\n\nThe `titleLabel` will display\
    \ a brand’s title. Simple enough, use `self.titleLabel.text = item.title`. To\
    \ display a brand’s image, you use `PFImageView` and `PFFile`:\n\n```\nself.backgroundImageView.file\
    \ = item.image;\n[self.backgroundImageView loadInBackground];\n```\n\nThe magic\
    \ is `[self.backgroundImageView loadInBackground]`. It automatically handles async\
    \ image loading and displaying, as well as caching.\n\nHere is the complete implementation:\n\
    \n`EMABCategoryTableViewCell.m`\n\n```\n#import \"EMABCategoryTableViewCell.h\"\
    \n#import <ParseUI/PFImageView.h>\n#import \"EMABCategory.h\"\n\n@implementation\
    \ EMABCategoryTableViewCell\n\n-(void)configureItem:(EMABCategory *)item\n{\n\
    \    self.titleLabel.text = item.title;\n    self.backgroundImageView.image =\
    \ nil;\n    if (item.image) {\n        self.backgroundImageView.file = item.image;\n\
    \        [self.backgroundImageView loadInBackground];\n    } else {\n        self.backgroundImageView.image\
    \ = [UIImage imageNamed:@\"category_cell_default_background\"];\n    }\n}\n\n\
    @end\n```\n\nYou may be wondering why I set `self.backgroundImageView.image =\
    \ nil`. While `UITableView` reuses its `UITableViewCell`, the images in the old\
    \ and offscreen cells will show before new images are loaded to replace those\
    \ images. When you scroll `UITableView`, you will see the funky image refresh.\
    \ There are a few different ways to solve this problem; one is in `-(void)prepareForReuse`\
    \ in the `UITableViewCell` where you do it in `-(void)configureItem:(EMABCategory)item`\
    \ for simplicity."
