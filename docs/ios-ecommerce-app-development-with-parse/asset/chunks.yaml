    and replace it with “Brand.” Using a global constant helps to solve this issue.
    You just need to change it from “Category” to “Brand’ in the “EMABConstants.m”
    once.


    In the `+(PFQuery *)basicQuery` implementation, you sort the fetch results based
    on the title alphabetically by simply using “orderByAscending” method—this is
    another benefit of Parse. Imagine you develop for iOS, Android, or the Web. If
    you want to have the same features for the three platforms, platform engineers
    needs to write their own sorting method, given the back end doesn’t have it, which
    is quite typical.


    Here is the complete implementation:


    EMABCategory.m


    `#import "EMABCategory.h"`


    `#import  <Parse/PFObject+Subclass.h>`


    `#import   "EMABConstants.h"`


    `@implementation EMABCategory`


    `@dynamic title, image;`


    `+(NSString *)parseClassName`


    `{`


    `return kCategory;`


    `}`


    `+(PFQuery *)basicQuery{`


