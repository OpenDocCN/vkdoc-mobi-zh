  trans: "\n# 支付模型\n\n你需要为用户信用卡创建一个新的 `PFObject` 模型。建议将其命名为 `EMABPaymentMethod`，而非\
    \ `EMABCreditCard`，因为未来你可能需要集成 PayPal 等其他支付方式。记得在 `EMABConstants` 类中注册一个 `NSString`\
    \ 常量，并在 `AppDelegate` 类中注册该模型。\n\n在此模型类中，你需要定义以下属性：支付方式的所有者、信用卡类型、信用卡后四位数字、到期月份和年份，以及`Stripe\
    \ Customer ID`。`Stripe Customer ID`属性是必需的，通过它你可以请求 Stripe 对信用卡进行实际扣款；同时，借助该属性，你还能在无需用户重复输入信息的情况下，对同一客户进行后续扣款。\n\
    \n此外，你还需要一些辅助方法，例如格式化信用卡后四位数字、到期月份和年份，以及信用卡类型（Visa、Master Card 等）。\n\n要获取某位客户的所有信用卡，你需要执行一次查询。参照之前的做法，你需要实现\
    \ `+(PFQuery *)basicQuery` 方法和 `+(PFQuery *)queryForOwner: (EMABUser *)owner`\
    \ 方法。\n\n以下是头文件：\n\n`EMABPaymentMethod.h`\n\n```\n#import <Parse/Parse.h>\n#import\
    \ \"Stripe.h\"\n\n@class EMABUser;\n\n@interface EMABPaymentMethod : PFObject<PFSubclassing>\n\
    \n@property (nonatomic, copy) NSString *type;\n@property (nonatomic, copy) NSString\
    \ *stripeCustomerId;\n@property (nonatomic, copy) NSString *lastFourDigit;\n@property\
    \ (nonatomic, assign) NSUInteger_t expirationMonth;\n@property (nonatomic, assign)\
    \ NSUInteger _t expirationYear;\n@property (nonatomic, strong) EMABUser *owner;\n\
    \n-(NSString *)friendlyCreditCardNumber;\n-(NSString *)friendlyExpirationMonthYear;\n\
    +(PFQuery *)basicQuery;\n+(PFQuery *)queryForOwner:(EMABUser *)owner;\n-(NSString\
    \ *)friendlyType:(STPCardBrand)brand;\n\n@end\n```\n\n以下是实现文件：\n\n`EMABPaymentMethod.m`\n\
    \n```\n#import \"EMABPaymentMethod.h\"\n#import <Parse/PFObject+Subclass.h>\n\
    #import \"EMABUser.h\"\n#import \"EMABConstants.h\"\n\n@implementation EMABPaymentMethod\n\
    \n@dynamic type,lastFourDigit, expirationMonth, expirationYear,stripeCustomerId,\
    \ owner;\n\n+(NSString *)parseClassName\n{\n    return kPaymentMethod;\n}\n\n\
    -(NSString *)friendlyCreditCardNumber{\n    return  [NSString stringWithFormat:@\"\
    ####-####-####-%@\",self. lastFourDigit];\n}\n\n-(NSString *)friendlyExpirationMonthYear{\n\
    \    return [NSString stringWithFormat:@\"%lld/%lld\",self.expirationMonth, self.expirationYear];\n\
    }\n\n+(PFQuery *)basicQuery{\n    PFQuery *query = [PFQuery queryWithClassName:[self\
    \ parseClassName]];\n    [query orderByDescending:@\"createdAt\"];\n    return\
    \ query;\n}\n\n+(PFQuery *)queryForOwner:(EMABUser *)owner{\n    PFQuery *query\
    \ = [self basicQuery];\n    [query whereKey:@\"owner\" equalTo:owner];\n    return\
    \ query;\n}\n\n-(NSString *)friendlyType:(STPCardBrand)brand{\n    NSString *title\
    \ = @\"\";\n    switch (brand) {\n        case STPCardBrandVisa:\n           \
    \ title = @\"Visa\";\n            break;\n        case STPCardBrandAmex:\n   \
    \         title = @\"American Express\";\n            break;\n        case STPCardBrandMasterCard:\n\
    \            title = @\"MasterCard\";\n            break;\n        case STPCardBrandDiscover:\n\
    \            title = @\"Discover\";\n            break;\n        case STPCardBrandJCB:\n\
    \            title = @\"JCB\";\n            break;\n        case STPCardBrandDinersClub:\n\
    \            title = @\"Dinner Club\";\n            break;\n        default:\n\
    \            title = @\"Unknown\";\n            break;\n    }\n    return title;\n\
    }\n\n@end\n```\n\n在上述实现中，对于辅助方法 `-(NSString *)friendlyCreditCardNumber`，更好的做法是使其基于不同信用卡类型进行格式化。例如，美国运通信用卡通常为\
    \ 15 位数字，而非 16 位。\n\n# 支付视图\n\nStripe iOS SDK 的示例代码提供了一个 `PKView`，你需要将其包含在项目中。它并非\
    \ Stripe iOS SDK 的组成部分。图 12-1 展示了它的外观。\n\n![A978-1-4842-1317-9_12_Fig1_HTML.jpg](img/A978-1-4842-1317-9_12_Fig1_HTML.jpg)\n\
    \n图 12-1 `PKView`\n"
- fmt: "# Payment Controller\n\nNext, create a new `UIViewController` subclass, `EMABAddCreditCardViewController`.\
    \ When this view controller is presented from `EMABBagTableViewController`, you\
    \ want the controller to send the Stripe Customer ID back to `EMABBagTableViewController`\
    \ so you can charge the customer’s credit card.\n\nTo help with the data passing\
    \ between the two controllers, you can use either the delegate or block method.\
    \ Block is the preferred approach because it makes the code both simple and readable.\n\
    \nHere is the header file of the `EMABAddCreditCardViewController`:\n\n`EMABAddCreditCardViewController.h`\n\
    \n```\n#import <UIKit/UIKit.h>\n\n@class EMABAddCreditCardViewController;\n\n\
    typedef void (^AddCreditCardViewControllerDidFinish)(NSString *customerId);\n\n\
    @interface EMABAddCreditCardViewController : UIViewController\n\n@property (nonatomic,\
    \ copy) AddCreditCardViewControllerDidFinish finishBlock;\n\n@end\n```\n\nIn the\
    \ implementation file, you want to take full advantage of `PTKView`. One important\
    \ feature is the delegate method of this `PTKView`. We declare this delegate on\
    \ our `EMABAddCreditCardViewController` category interface.\n\n`EMABAddCreditCardViewController.m`\n\
    \n```\n#import \"EMABAddCreditCardViewController.h\"\n#import \"Stripe.h\"\n#import\
    \ \"PTKView.h\"\n#import \"EMABUser.h\"\n#import \"EMABPaymentMethod.h\"\n\n@interface\
    \ EMABAddCreditCardViewController ()<PTKViewDelegate>\n\n@property (nonatomic,\
    \ weak) IBOutlet PTKView *paymentView;\n\n@end\n```\n\nYou also need a bar button\
    \ item as the right item of this `UINavigationItem`; give it the title “Authorize.”\
    \ If this user has not finished entering her credit card information, you disable\
    \ the bar button item. On the other hand, enable this button so the user can tap\
    \ to authorize the credit card information again with Stripe server. The following\
    \ two methods are used for this purpose:\n\n```\n- (void)viewDidLoad {\n    [super\
    \ viewDidLoad];\n    self.navigationItem.leftBarButtonItem = [[UIBarButtonItem\
    \ alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemCancel target:self action:@selector(onCancel:)];\n\
    \    self.navigationItem.rightBarButtonItem = [[UIBarButtonItem alloc] initWithTitle:NSLocalizedString(@\"\
    Authorize\", @\"\") style:UIBarButtonItemStylePlain target:self action:@selector(onAuthorize:)];\n\
    }\n\n- (void)paymentView:(PTKView *)paymentView withCard:(PTKCard *)card isValid:(BOOL)valid\
    \ {\n    // Enable save button if the Checkout is valid\n    self.navigationItem.rightBarButtonItem.enabled\
    \ = valid;\n}\n```\n\nNext, implement the `onAuthorize:` method. The logic is\
    \ as follows. From the `PTKView`, you obtain the credit number and the expiration\
    \ date, then you send this information to Stripe for verification. If the credit\
    \ card information is valid, Stripe will send you a token. In a typical case,\
    \ you can just use this token to charge the credit card. If you want to charge\
    \ the same credit card again in the future, you can save the token to the Parse\
    \ back end server.\n\nIn general, it’s safe and convenient to store a token. However,\
    \ it’s better to relate each charge to a `Stripe` Customer object. For this reason,\
    \ you request a Stripe Customer ID instead of a token when authorizing a credit\
    \ card; this enables you to save this customer ID to Parse and reuse the ID to\
    \ charge this credit card in the future. On the Parse back end, anyone who accesses\
    \ your control panel will only see a customer ID, not a charge token. I think\
    \ this approach is even better.\n\nBut how do you create a Stripe Customer ID?\
    \ You can use the Parse Cloud function. I will go into details about the Parse\
    \ Cloud function in [Chapter 14](#A978-1-4842-1317-9_14_Chapter.html); for now,\
    \ I pretend there is a cloud function named `createStripeCustomer` already implemented;\
    \ so just use this for right now.\n\nHere is your flow:\n\n1.  Based on the user’s\
    \ credit card information, make Stripe API call to get a Stripe token for the\
    \ credit card.\n2.  Based on the Stripe Token, call your Parse Cloud function\
    \ to get a Stripe Customer ID.\n3.  Based on partial information of the user’s\
    \ credit card, and the Stripe Customer ID you received in Step 2, create an `EMABPayment`\
    \ instance; map the last four digits, expiration month and year, and Stripe Customer\
    \ ID with the instance properties. Save this instance to Parse.\n4.  Once you\
    \ save successfully, leave this screen and return to `EMABBagViewController` with\
    \ a Stripe Customer ID, and then use this ID to charge the card.\n\nHere is the\
    \ full code:\n\n```\n- (void)onAuthorize:(id)sender {\n    if (![self.paymentView\
    \ isValid]) {\n        return;\n    }\n\n    STPCard *card = [[STPCard alloc]\
    \ init];\n    card.number = self.paymentView.card.number;\n    card.expMonth =\
    \ self.paymentView.card.expMonth;\n    card.expYear = self.paymentView.card.expYear;\n\
    \    card.cvc = self.paymentView.card.cvc;\n\n    [[STPAPIClient sharedClient]\
    \ createTokenWithCard:card\n        completion:^(STPToken *token, NSError *error)\
    \ {\n            if (error) {\n            } else {\n                EMABUser\
    \ *user = [EMABUser currentUser];\n                NSDictionary *stripeCustomerDictionary\
    \ = @{@\"tokenId\":token.tokenId,\n                                          \
    \                 @\"customerEmail\":user.email\n                            \
    \                               };\n                [PFCloud callFunctionInBackground:@\"\
    createStripeCustomer\"\n                                   withParameters:stripeCustomerDictionary\n\
    \                                           block:^(NSString *customerId, NSError\
    \ *error) {\n                    if (!error) {\n                        EMABPaymentMethod\
    \ *creditCard = [EMABPaymentMethod object];\n                        creditCard.owner\
    \ = user;\n                        creditCard.stripeCustomerId = customerId;\n\
    \                        creditCard.expirationMonth = card.expMonth;\n       \
    \                 creditCard.expirationYear = card.expYear;\n                \
    \        creditCard.type = [creditCard friendlyType:card.brand];\n           \
    \             creditCard.lastFourDigit = card.last4;\n                       \
    \ creditCard.stripeCustomerId = customerId;\n                        [creditCard\
    \ saveInBackgroundWithBlock:^(BOOL succeeded, NSError *error) {\n            \
    \                if (!error) {\n                                [self readyToCharge:customerId];\n\
    \                            }\n                        }];\n                \
    \    } else {\n                    }\n                }];\n            }\n   \
    \     }];\n}\n\n-(void)readyToCharge:(NSString *)customerId {\n    [self dismissViewControllerAnimated:YES\
    \ completion:^{\n        self.finishBlock(self, customerId);\n    }];\n}\n```\n\
    \nYou also need to provide a “Cancel” bar button item so a user can skip this\
    \ screen:\n\n```\n- (void)onCancel:(id)sender {\n    [self.navigationController\
    \ popViewControllerAnimated:YES];\n}\n```\n\nBasically, that’s all for this `EMABAddCreditCardViewController`.\n\
    \nThere is still some work left on `EMABBagsTableViewController`. After the user\
    \ taps “Buy with Credit Card,” you check whether there is a shipping address.\
    \ If not, you bring up the `EMABUserProfileTableViewController`. If yes, you need\
    \ to bring up the `EMABAddCreditCardViewController`. Here is the code:\n\n```\n\
    -(IBAction)onPayWithCreditCard:(id)sender{\n    if ([[EMABUser currentUser] isShippingAddressCompleted])\
    \ {\n        EMABAddCreditCardViewController *viewController = (EMABAddCreditCardViewController\
    \ *)[self.storyboard instantiateViewControllerWithIdentifier:@\"EMABAddCreditCardViewController\"\
    ];\n        __weak typeof(self) weakSelf = self;\n        viewController.finishBlock\
    \ = ^(NSString *customerId){\n            [weakSelf charge:customerId];\n    \
    \    };\n        [self.navigationController pushViewController:viewController\
    \ animated:YES];\n    } else {\n        EMABUserProfileTableViewController *viewController\
    \ = [self.storyboard instantiateViewControllerWithIdentifier:@\"EMABUserProfileTableViewController\"\
    ];\n        [self.navigationController pushViewController:viewController animated:YES];\n\
    \    }\n}\n```\n\nYou might have noticed the `charge:` method that has yet to\
    \ be implemented. I will cover this implementation in the next chapter.\n\n##\
    \ Summary\n\nIn this chapter, I showed how to integrate Stripe iOS SDK to collect\
    \ a user’s credit card information, authorize a charge, request a Stripe Customer\
    \ ID, and save the ID to Parse. I also discussed how to show different view controllers\
    \ based on whether the user’s shipping address is complete or not."
  raw: '## Payment Controller


    Next, create a new UIViewController subclass, EMABAddCreditCardViewController.
    When this view controller is presented from EMABBagTableViewController, you want
    the controller to send the Stripe Customer ID back to EMABBagTableViewController
    so you can charge the customer’s credit card.


    To help with the data passing between the two controllers, you can use either
    the delegate or block method. Block is the preferred approach because it makes
    the code both simple and readable.


    Here is the header file of the EMABAddCreditCardViewController:


    EMABAddCreditCardViewController.h


    `#import <UIKit/UIKit.h>`


    `@class EMABAddCreditCardViewController;`


    `typedef void (^AddCreditCardViewControllerDidFinish)(NSString *customerId);`


    `@interface EMABAddCreditCardViewController : UIViewController`


    `@property (nonatomic, copy) AddCreditCardViewControllerDidFinish finishBlock;`


    `@end`


    In the implementation file, you want to take full advantage of PTKView. One important
    feature is the delegate method of this PTKView. We declare this delegate on our
    EMABAddCreditCardViewController category interface.


    `EMABAddCreditCardViewController.m`


    `#import "EMABAddCreditCardViewController.h"`


    `#import "Stripe.h"`


    `#import "PTKView.h"`


    `#import "EMABUser.h"`


    `#import "EMABPaymentMethod.h"`


    `@interface EMABAddCreditCardViewController ()<PTKViewDelegate>`


    `@property (nonatomic, weak) IBOutlet PTKView *paymentView;`


    `@end`


    You also need a bar button item as the right item of this UINavigationItem; give
    it the title “Authorize.” If this user has not finished entering her credit card
    information, you disable the bar button item. On the other hand, enable this button
    so the user can tap to authorize the credit card information again with Stripe
    serve. The following two methods are used for this purpose:


    `- (void)viewDidLoad {`


    `[super viewDidLoad];`


    `self.navigationItem.leftBarButtonItem = [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemCancel
    target:self action:@selector(onCancel:)];`


    `self.navigationItem.rightBarButtonItem = [[UIBarButtonItem alloc] initWithTitle:NSLocalizedString(@"Authorize",
    @"") style:UIBarButtonItemStylePlain target:self action:@selector(onAuthorize:)];`


    `}`


    `- (void)paymentView:(PTKView *)paymentView withCard:(PTKCard *)card isValid:(BOOL)valid
    {`


    `// Enable save button if the Checkout is valid`


    `self.navigationItem.rightBarButtonItem.enabled = valid;`


    `}`


    Next, implement the `onAuthorize:` method. The logic is as follows. From the PTKView,
    you obtain the credit number and the expiration date, then you send this information
    to Stripe for verification. If the credit card information is valid, Stripe will
    send you a token. In a typical case, you can just use this token to charge the
    credit card. If you want to charge the same credit card again in the future, you
    can save the token to the Parse back end server.


    In general, it’s safe and convenient to store a token. However, it’s better to
    relate each charge to a Stripe Customer object. For this reason, you request a
    Stripe Customer ID instead of a token when authorizing a credit card; this enables
    you to save this customer ID to Parse and reuse the ID to charge this credit card
    in the future. On the Parse back end, anyone who accesses your control panel will
    only see a customer ID, not a charge token. I think this approach is even better.


    But how do you create a Stripe Customer ID? You can use the Parse Cloud function.
    I will go into details about the Parse Cloud function in [Chapter 14](#A978-1-4842-1317-9_14_Chapter.html);
    for now, I pretend there is a cloud function named “createStripeCustomer” already
    implement; so just use this for right now.


    Here is your flow:


    Based on the user’s credit card information, make Stripe API call to get a Stripe
    token for the credit card.   Based on the Stripe Token, call your Parse Cloud
    function to get a Stripe Customer ID.   Based on partial information of the user’s
    credit card, and the Stripe Customer ID you received in Step 2, create an EMABPayment
    instance; map the last four digits, expiration month and year, and Stripe Customer
    ID with the instance properties. Save this instance to Parse.   Once you save
    successfully, leave this screen and return to EMABBagViewController with a Stripe
    Customer ID, and then use this ID to charge the card.


    Here is the full code:


    `- (void)onAuthorize:(id)sender {`


    `if (![self.paymentView isValid]) {`


    `return;`


    `}`


    `STPCard *card = [[STPCard alloc] init];`


    `card.number = self.paymentView.card.number;`


    `card.expMonth = self.paymentView.card.expMonth;`


    `card.expYear = self.paymentView.card.expYear;`


    `card.cvc = self.paymentView.card.cvc;`


    `[[STPAPIClient sharedClient] createTokenWithCard:card`


    `completion:^(STPToken *token, NSError *error) {`


    `if (error) {`


    `} else {`


    `EMABUser *user = [EMABUser currentUser];`


    `NSDictionary *stripeCustomerDictionary = @{@"tokenId":token.tokenId,`


    `@"customerEmail":user.email`


    `};`


    `[PFCloud callFunctionInBackground:@"createStripeCustomer" withParameters:stripeCustomerDictionary
    block:^(NSString *customerId, NSError *error) {`


    `if (!error) {`


    `EMABPaymentMethod *creditCard = [EMABPaymentMethod object];`


    `creditCard.owner  = user;`


    `creditCard.stripeCustomerId = customerId;`


    `creditCard.expirationMonth = card.expMonth;`


    `creditCard.expirationYear = card.expYear;`


    `creditCard.type = [creditCard friendlyType:card.brand];`


    `creditCard.lastFourDigit = card.last4;`


    `creditCard.stripeCustomerId = customerId;`


    `[creditCard saveInBackgroundWithBlock:^(BOOL succeeded, NSError *error) {`


    `if (!error) {`


    `[self readyToCharge:customerId];`


    `}`


    `}];`


    `} else {`


    `}`


    `}];`


    `}`


    `}];`


    `}`


    `-(void)readyToCharge:(NSString *)customerId {`


    `[self dismissViewControllerAnimated:YES completion:^{`


    `self.finishBlock(self, customerId);`


    `}];`


    `}`


    You also need to provide a “Cancel” bar button item so a user can skip this screen:


    `- (void)onCancel:(id)sender {`


    `[self.navigationController popViewControllerAnimated:YES];`


    `}`


    Basically, that’s all for this EMABAddCreditCardViewController.


    There is still some work left on EMABBagsTableViewController. After the user taps
    “Buy with Credit Card,” you check whether there is a shipping address. If not,
    you bring up the EMABUserProfileTableViewController. If yes, you need to bring
    up the EMABAddCreditCardViewController. Here is the code:


    `-(IBAction)onPayWithCreditCard:(id)sender{`


    `if ([[EMABUser currentUser] isShippingAddressCompleted]) {`


    `EMABAddCreditCardViewController *viewController = (EMABAddCreditCardViewController
    *)[self.storyboard instantiateViewControllerWithIdentifier:@"EMABAddCreditCardViewController"];`


    `__weak typeof(self) weakSelf = self;`


    `viewController.finishBlock = ^(NSString *customerId){`


    `[weakSelf charge:customerId];`


    `};`


    `[self.navigationController pushViewController:viewController animated:YES];`


    `} else {`


    `EMABUserProfileTableViewController *viewController = [self.storyboard instantiateViewControllerWithIdentifier:@"EMABUserProfileTableViewController"];`


    `[self.navigationController pushViewController:viewController animated:YES];`


    `}`


    `}`


    You might have noticed the `charge:` method that has yet to be implemented. I
    will cover this implementation in the next chapter.


    ### Summary


    In this chapter, I showed how to integrate Stripe iOS SDK to collect a user’s
    credit card information, authorize a charge, request a Stripe Customer ID, and
    save the ID to Parse. I also discussed how to show different view controllers
    based on whether the user’s shipping address is complete or not.'
  trans: "\n# 支付控制器\n\n接下来，创建一个新的 `UIViewController` 子类 `EMABAddCreditCardViewController`。当此视图控制器从\
    \ `EMABBagTableViewController` 中被呈现时，你需要让该控制器将 Stripe 客户 ID 传回给 `EMABBagTableViewController`，以便能够从客户的信用卡扣款。\n\
    \n为了帮助两个控制器之间传递数据，你可以使用委托或闭包方法。闭包是首选方式，因为它能使代码既简单又易读。\n\n以下是 `EMABAddCreditCardViewController`\
    \ 的头文件：\n\n`EMABAddCreditCardViewController.h`\n\n```\n#import <UIKit/UIKit.h>\n\
    \n@class EMABAddCreditCardViewController;\n\ntypedef void (^AddCreditCardViewControllerDidFinish)(NSString\
    \ *customerId);\n\n@interface EMABAddCreditCardViewController : UIViewController\n\
    \n@property (nonatomic, copy) AddCreditCardViewControllerDidFinish finishBlock;\n\
    \n@end\n```\n\n在实现文件中，你希望充分利用 `PTKView`。其中一个重要特性是该 `PTKView` 的委托方法。我们在 `EMABAddCreditCardViewController`\
    \ 的分类接口中声明了这个委托。\n\n`EMABAddCreditCardViewController.m`\n\n```\n#import \"EMABAddCreditCardViewController.h\"\
    \n#import \"Stripe.h\"\n#import \"PTKView.h\"\n#import \"EMABUser.h\"\n#import\
    \ \"EMABPaymentMethod.h\"\n\n@interface EMABAddCreditCardViewController ()<PTKViewDelegate>\n\
    \n@property (nonatomic, weak) IBOutlet PTKView *paymentView;\n\n@end\n```\n\n\
    你还需要一个条形按钮项作为这个 `UINavigationItem` 的右侧按钮；将其标题设置为“授权”。如果用户尚未完成信用卡信息的输入，则应禁用该条形按钮项。另一方面，启用此按钮，使用户可以点击以再次通过\
    \ Stripe 服务器授权信用卡信息。以下两个方法用于此目的：\n\n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\
    \    self.navigationItem.leftBarButtonItem = [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemCancel\
    \ target:self action:@selector(onCancel:)];\n    self.navigationItem.rightBarButtonItem\
    \ = [[UIBarButtonItem alloc] initWithTitle:NSLocalizedString(@\"Authorize\", @\"\
    \") style:UIBarButtonItemStylePlain target:self action:@selector(onAuthorize:)];\n\
    }\n\n- (void)paymentView:(PTKView *)paymentView withCard:(PTKCard *)card isValid:(BOOL)valid\
    \ {\n    // 如果结账信息有效，则启用保存按钮\n    self.navigationItem.rightBarButtonItem.enabled\
    \ = valid;\n}\n```\n\n接下来，实现 `onAuthorize:` 方法。逻辑如下。从 `PTKView` 中获取信用卡号和有效期，然后将这些信息发送到\
    \ Stripe 进行验证。如果信用卡信息有效，Stripe 将返回一个令牌。在典型情况下，你可以直接使用此令牌对信用卡扣款。如果将来希望再次对同一张信用卡扣款，可以将该令牌保存到\
    \ Parse 后端服务器。\n\n通常，存储令牌既安全又方便。然而，最好将每一笔扣款关联到一个 `Stripe` 客户对象。出于这个原因，在授权信用卡时，你请求的是\
    \ Stripe 客户 ID 而非令牌；这样你就可以将此客户 ID 保存到 Parse，并将来使用该 ID 对此信用卡重复扣款。在 Parse 后端，任何访问你控制台的人都只会看到一个客户\
    \ ID，而不会看到扣款令牌。我认为这种方法更优。\n\n但是如何创建 Stripe 客户 ID 呢？你可以使用 Parse Cloud 函数。我将在第 14\
    \ 章中详细介绍 Parse Cloud 函数；现在，我先假设有一个名为 `createStripeCustomer` 的云函数已经实现好了；所以现在就直接用它吧。\n\
    \n以下是你操作的流程：\n\n1.  根据用户的信用卡信息，调用 Stripe API 获取该信用卡的 Stripe 令牌。\n2.  基于 Stripe\
    \ 令牌，调用你的 Parse Cloud 函数来获取一个 Stripe 客户 ID。\n3.  根据用户信用卡的部分信息，以及你在步骤 2 中收到的 Stripe\
    \ 客户 ID，创建一个 `EMABPayment` 实例；将信用卡最后四位数字、到期月份和年份以及 Stripe 客户 ID 映射到实例属性中。将此实例保存到\
    \ Parse。\n4.  保存成功后，离开此界面并返回 `EMABBagViewController`，同时携带 Stripe 客户 ID，然后使用此 ID\
    \ 对信用卡扣款。\n\n以下是完整的代码：\n\n```\n- (void)onAuthorize:(id)sender {\n    if (![self.paymentView\
    \ isValid]) {\n        return;\n    }\n\n    STPCard *card = [[STPCard alloc]\
    \ init];\n    card.number = self.paymentView.card.number;\n    card.expMonth =\
    \ self.paymentView.card.expMonth;\n    card.expYear = self.paymentView.card.expYear;\n\
    \    card.cvc = self.paymentView.card.cvc;\n\n    [[STPAPIClient sharedClient]\
    \ createTokenWithCard:card\n        completion:^(STPToken *token, NSError *error)\
    \ {\n            if (error) {\n            } else {\n                EMABUser\
    \ *user = [EMABUser currentUser];\n                NSDictionary *stripeCustomerDictionary\
    \ = @{@\"tokenId\":token.tokenId,\n                                          \
    \                 @\"customerEmail\":user.email\n                            \
    \                               };\n                [PFCloud callFunctionInBackground:@\"\
    createStripeCustomer\"\n                                   withParameters:stripeCustomerDictionary\n\
    \                                           block:^(NSString *customerId, NSError\
    \ *error) {\n                    if (!error) {\n                        EMABPaymentMethod\
    \ *creditCard = [EMABPaymentMethod object];\n                        creditCard.owner\
    \ = user;\n                        creditCard.stripeCustomerId = customerId;\n\
    \                        creditCard.expirationMonth = card.expMonth;\n       \
    \                 creditCard.expirationYear = card.expYear;\n                \
    \        creditCard.type = [creditCard friendlyType:card.brand];\n           \
    \             creditCard.lastFourDigit = card.last4;\n                       \
    \ creditCard.stripeCustomerId = customerId;\n                        [creditCard\
    \ saveInBackgroundWithBlock:^(BOOL succeeded, NSError *error) {\n            \
    \                if (!error) {\n                                [self readyToCharge:customerId];\n\
    \                            }\n                        }];\n                \
    \    } else {\n                    }\n                }];\n            }\n   \
    \     }];\n}\n\n-(void)readyToCharge:(NSString *)customerId {\n    [self dismissViewControllerAnimated:YES\
    \ completion:^{\n        self.finishBlock(self, customerId);\n    }];\n}\n```\n\
    \n你还需要提供一个“取消”条形按钮项，以便用户可以跳过此界面：\n\n```\n- (void)onCancel:(id)sender {\n    [self.navigationController\
    \ popViewControllerAnimated:YES];\n}\n```\n\n基本上，这就是 `EMABAddCreditCardViewController`\
    \ 的全部内容。\n\n`EMABBagsTableViewController` 中还有一些工作要做。用户点击“用信用卡购买”后，你检查是否有配送地址。如果没有，则弹出\
    \ `EMABUserProfileTableViewController`。如果有，则需要弹出 `EMABAddCreditCardViewController`。以下是代码：\n\
    \n```\n-(IBAction)onPayWithCreditCard:(id)sender{\n    if ([[EMABUser currentUser]\
    \ isShippingAddressCompleted]) {\n        EMABAddCreditCardViewController *viewController\
    \ = (EMABAddCreditCardViewController *)[self.storyboard instantiateViewControllerWithIdentifier:@\"\
    EMABAddCreditCardViewController\"];\n        __weak typeof(self) weakSelf = self;\n\
    \        viewController.finishBlock = ^(NSString *customerId){\n            [weakSelf\
    \ charge:customerId];\n        };\n        [self.navigationController pushViewController:viewController\
    \ animated:YES];\n    } else {\n        EMABUserProfileTableViewController *viewController\
    \ = [self.storyboard instantiateViewControllerWithIdentifier:@\"EMABUserProfileTableViewController\"\
    ];\n        [self.navigationController pushViewController:viewController animated:YES];\n\
    \    }\n}\n```\n\n你可能已经注意到 `charge:` 方法尚未实现。我将在下一章中介绍这个实现。\n\n## 总结\n\n在本章中，我展示了如何集成\
    \ Stripe iOS SDK 来收集用户的信用卡信息、授权扣款、请求 Stripe 客户 ID，并将该 ID 保存到 Parse。我还讨论了如何根据用户是否已填写配送地址来展示不同的视图控制器。\n"
- fmt: '# 13. Pay with Apple Pay


    Electronic supplementary material The online version of this chapter (doi:`10.​1007/​978-1-4842-1317-9_​13`<http://dx.doi.org/10.1007/978-1-4842-1317-9_​13>)
    contains supplementary material, which is available to authorized users.


    As an iOS developer, you have probably heard of Apple Pay. Apple Pay lets iPhone
    users pay for purchases by using their iPhones. There are some great benefits
    in store for a developer to integrate Apple Pay in his or her app. For example,
    your customers don’t need to enter a credit card number, expiration date, and
    CVC numbers; or in some cases, shipping address and billing address before making
    a purchase. All of this means a faster and more convenient checkout process. Another
    benefit is that it’s supposed to be a much secure way to handling credit card
    charges. In this chapter, I will show how to implement the feature of Pay with
    Apple Pay and Stripe.


    ## Overview of Apple Pay


    As a matter of fact, Apple Pay only handles part of the whole charge process.
    Namely, Apple Pay has completed the following things:


    - Authenticated a user, the iPhone owner, or a credit card holder.

    - Used a user interface to show what he or she is buying.

    - Provided you, the developer, with the shipping and billing addresses of the
    user.

    - Provided you, the developer, with a token so you can exchange it with a real
    payment processor, such as Stripe.


    Note: To understand more about how Apple Pay works, please refer to [`https://developer.apple.com/apple-pay/Getting-Started-with-Apple-Pay.pdf`](https://developer.apple.com/apple-pay/Getting-Started-with-Apple-Pay.pdf).'
