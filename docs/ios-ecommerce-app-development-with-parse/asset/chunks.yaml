    \ ()\n@property (nonatomic, weak) IBOutlet UILabel *ordeNoLabel;\n@property (nonatomic,\
    \ weak) IBOutlet UILabel *ordeDateLabel;\n@property (nonatomic, weak) IBOutlet\
    \ UILabel *totalLabel;\n@property (nonatomic, weak) IBOutlet UILabel *totalTextLabel;\n\
    @end\n\n@implementation EMABOrderDetailTableViewController\n\n-(void)setOrder:(EMABOrder\
    \ *)order {\n    if (_order != order) {\n        _order = order;\n        [self\
    \ configureView];\n    }\n}\n\n-(void)configureView {\n    self.ordeNoLabel.text\
    \ = [self.order friendlyOrderNo];\n    NSDateFormatter *dateFormatter = [[NSDateFormatter\
    \ alloc] init];\n    [dateFormatter setDateStyle:NSDateFormatterMediumStyle];\n\
    \    [dateFormatter setTimeStyle:NSDateFormatterShortStyle];\n    self.ordeDateLabel.text\
    \ = [dateFormatter stringFromDate:[NSDate date]];\n    self.totalLabel.text =\
    \ [self.order friendlyTotal];\n    [self.tableView reloadData];\n}\n\n- (void)viewDidLoad\
    \ {\n    [super viewDidLoad];\n    self.title = NSLocalizedString(@\"Order Detail\"\
    , @\"Order Detail\");\n    [self configureView];\n}\n\n- (void)didReceiveMemoryWarning\
    \ {\n    [super didReceiveMemoryWarning];\n    // Dispose of any resources that\
    \ can be recreated.\n}\n\n#pragma mark - Table view data source\n\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
    \ *)tableView {\n    // Return the number of sections.\n    return 1;\n}\n\n-\
    \ (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\
    \ {\n    // Return the number of rows in the section.\n    return [self.order.items\
    \ count];\n}\n\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath {\n    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@\"\
    OrderItemCell\" forIndexPath:indexPath];\n    if (self.order) {\n        EMABOrderItem\
    \ *item = self.order.items[indexPath.row];\n        cell.textLabel.text = item.product.name;\n\
    \        cell.detailTextLabel.text = [NSString stringWithFormat:@\"%@ x %lld\"\
    , [item.product friendlyPrice], item.quantity];\n    }\n    return cell;\n}\n\n\
    @end\n```\n\n## 收藏的商品\n\n这部分展示了如何显示用户的收藏商品列表，并允许用户从列表中删除商品。你还可以让用户点击列表中的某个商品以查看商品详情。\n\
    \n### 模型\n\n使用第 [7] 章中介绍的 `EMABFavoriteProduct` 模型。\n\n### 视图\n\n重用第 [6] 章中介绍的\
    \ `EMABProductTableViewCell`。请参见图 [15-5]。\n\n![A978-1-4842-1317-9_15_Fig5_HTML.jpg](img/A978-1-4842-1317-9_15_Fig5_HTML.jpg)\n\
    \n图 15-5. 收藏商品的单元格\n"
- fmt: "### Controller\n\n创建一个`PFQueryTableViewController`子类，并命名为`EMABUserFavoriteHistoryTableViewController`。\n\
    \n```\n#import \"EMABUserFavoriteHistoryTableViewController.h\"\n#import \"EMABConstants.h\"\
    \n#import \"EMABFavoriteProduct.h\"\n#import \"EMABProduct.h\"\n#import \"EMABUser.h\"\
    \n#import \"EMABProductTableViewCell.h\"\n#import \"EMABProductDetailViewController.h\"\
    \n\n@implementation EMABUserFavoriteHistoryTableViewController\n\n- (void)awakeFromNib\
    \ {\n    [super awakeFromNib];\n    self.parseClassName = kProduct;\n    self.objectsPerPage\
    \ = 10;\n    self.paginationEnabled = YES;\n    self.pullToRefreshEnabled = YES;\n\
    }\n\n- (PFQuery *)queryForTable {\n    PFQuery *query = [EMABFavoriteProduct queryForCustomer:[EMABUser\
    \ currentUser]];\n    if ([self.objects count] == 0) {\n        query.cachePolicy\
    \ = kPFCachePolicyCacheThenNetwork;\n    }\n    return query;\n}\n\n#pragma mark\
    \ - UITableView Datasource\n\n-(CGFloat)tableView:(UITableView *)tableView heightForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath {\n    return 80.0;\n}\n\n- (EMABProductTableViewCell *)tableView:(UITableView\
    \ *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath object:(EMABFavoriteProduct\
    \ *)object {\n    EMABProductTableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@\"\
    ProductCell\" forIndexPath:indexPath];\n    if (indexPath.row == [[self objects]\
    \ count]) {\n        cell.textLabel.text = NSLocalizedString(@\"Load More…\",\
    \ @\"\");\n    } else {\n        [cell configureItem:object.product];\n    }\n\
    \    return cell;\n}\n```\n\n要使此列表可编辑，请使用`UITableView`代理方法`tableView:(UITableView\
    \ *)tableView commitEditingStyle:(UITableViewCellEditingStyle)editingStyle forRowAtIndexPath:(NSIndexPath\
    \ *)indexPath`。\n\n首先，为用户提供一个按钮，以便您知道用户有编辑意图。为`UINavigationItem`添加一个条形按钮项作为右条形按钮项，并使用系统“编辑”按钮样式。\n\
    \n其次，通过调用以下方法启用行的“编辑模式”：\n\n```\n-(BOOL)tableView:(UITableView *)tableView canEditRowAtIndexPath:(NSIndexPath\
    \ *)indexPath {\n    return YES;\n}\n```\n\n一旦用户点击“编辑”按钮，每个单元格上会出现一个红色的“-”。点击“-”图标，将执行以下方法：\n\
    \n```\n-(void)tableView:(UITableView *)tableView commitEditingStyle:(UITableViewCellEditingStyle)editingStyle\
    \ forRowAtIndexPath:(NSIndexPath *)indexPath {\n    if (editingStyle == UITableViewCellEditingStyleDelete)\
    \ {\n        EMABFavoriteProduct *fProduct = (EMABFavoriteProduct *)[self objectAtIndexPath:indexPath];\n\
    \        [fProduct deleteInBackgroundWithBlock:^(BOOL succeeded, NSError *error)\
    \ {\n            if (!error) {\n                [self loadObjects];\n        \
    \    }\n        }];\n    }\n}\n```\n\n您将只监听删除操作，并调用`PFObject`的异步删除方法。一旦删除成功完成，查询后端服务器并更新UI。\n\
    \n当用户点击列表中的某个产品时，将显示产品详情。您已经准备好了`EMABProductDetailViewController`，只需将正确的`EMABProduct`实例传递给它即可。由于您的`PFQuery`返回的是`EMABFavoriteProduct`列表，您需要额外一步来获取`EMABProduct`。代码如下：\n\
    \n```\n#pragma mark - UITableView Delegate\n\n-(void)tableView:(UITableView *)tableView\
    \ didSelectRowAtIndexPath:(NSIndexPath *)indexPath {\n    if (indexPath.row ==\
    \ [[self objects] count]) {\n        [self loadNextPage];\n    } else {\n    \
    \    EMABProductDetailViewController *viewController = [self.storyboard instantiateViewControllerWithIdentifier:@\"\
    EMABProductDetailViewController\"];\n        [viewController setProduct:(EMABProduct\
    \ *)[self objectAtIndexPath:indexPath]];\n        [self.navigationController pushViewController:viewController\
    \ animated:YES];\n    }\n}\n\n@end\n```\n\n## 总结\n\n在本章中，我向您展示了如何实现一个基本的“我的账户”屏幕。根据用户是否登录，我们为每种场景呈现了不同的内容。我还演示了登录用户如何查看自己的收货地址、支付方式、收藏列表和订单历史。另一方面，当用户未登录时，我们只会显示“登录”。\n\
    \n我还展示了如何使用`PFQueryTableViewController`来显示用户之前输入的信用卡信息。然后，我展示了如何让用户添加新的信用卡或删除已有的信用卡，以及如何查看用户的订单历史和特定订单的详情。\n\
    \n最后，我讨论了如何显示收藏产品列表。接着，您学习了当用户点击列表中的某个产品时如何显示产品详情。\n\n# 16. 添加产品\n\n电子补充材料 本章在线版本（doi:[10.1007/978-1-4842-1317-9_16](http://dx.doi.org/10.1007/978-1-4842-1317-9_16)）包含补充材料，供授权用户使用。\n\
    \n到目前为止，您都是通过 Parse.com 上的 Parse 项目仪表板为应用添加产品。一旦您的应用上线，可能不允许所有人这样做。如果让每个人都能访问\
    \ Parse 仪表板，可能会出现一些问题：\n\n- 您可能会向不应知道信息的人泄露过多信息。\n- 您有可能会错误地输入数据。\n- 您的数据可能容易被删除或修改。\n\
    \n一般来说，Parse 仪表板既不是一个用户友好的界面，也不是手动输入大量数据的有效方式。\n\n通常，您会创建一个 Web 应用来让某些管理员用户添加或编辑产品。总的来说，使用\
    \ Web 应用进行数据输入工作更高效。为了本书的完整性，我将向您介绍如何创建一个管理员用户，并为此用户提供一个特殊界面，使其能够从移动应用添加或编辑产品。此功能的一些使用场景可能包括：一家需要输入产品数量不多的商店，或者一个需要拍摄大量产品照片并上传到服务器的企业。\n\
    \n## 模型\n\n首先，您需要在`EMABUser`模型中添加一个新的布尔属性，并命名为`isAdmin`：\n\n```\n@property (nonatomic,\
    \ assign) BOOL isAdmin;\n```\n\n您还需要在`EMABUser`实现文件中将其添加到`@dynamic`列表。\n\n当用户通过您的应用注册时，如[第8章](#A978-1-4842-1317-9_8_Chapter.html)所述，您需要在\
    \ Parse 仪表板中将用户的`isAdmin`属性更新为 true。"
