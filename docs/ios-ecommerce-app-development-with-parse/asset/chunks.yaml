    \ the product’s quantity, delete an individual product or all of them from the\
    \ bag, and update the total amount. The customer should be able to see what’s\
    \ in the bag when he or she returns to it.\n\n## Shopping Bag Model\n\nFirst,\
    \ the model to represent an item in a shopping bag: create a `PFObject` subclass,\
    \ and name it `EMABOrderItem`. Then register this class name with `EMABConstant`\
    \ by giving it an `NSString` key: `kOrderItem`. This subclass has two properties:\
    \ one is the quantity, and the other is an `EMABProduct` instance. Also create\
    \ an instance method `-(double)subTotal` to calculate the total amount of this\
    \ item.\n\nHere is the header file:\n\n`EMABOrderItem.h`\n\n```objectivec\n#import\
    \ <Parse/Parse.h>\n\n@class EMABProduct;\n\n@interface EMABOrderItem : PFObject\n\
    \n@property (nonatomic, assign) double quantity;\n@property (nonatomic, strong)\
    \ EMABProduct *product;\n\n-(double)subTotal;\n\n@end\n```\n\nIn the implementation\
    \ file, the `subTotal` method simply returns the multiple(s) of quantity and this\
    \ product’s unit price.\n\nHere is the implementation code:\n\n`EMABOrderItem.m`\n\
    \n```objectivec\n#import \"EMABOrderItem.h\"\n#import  <Parse/PFObject+Subclass.h>\n\
    #import \"EMABConstants.h\"\n#import \"EMABProduct.h\"\n\n@implementation EMABOrderItem\n\
    \n@dynamic quantity,product;\n\n+(NSString *)parseClassName\n{\n    return kOrderItem;\n\
    }\n\n-(double)subTotal {\n    return self.quantity *self.product.unitPrice;\n\
    }\n\n@end\n```\n\nThe second model you need is the `EMABOrder` model; register\
    \ an `NSString` key with the `EMABConstants` class called: `kOrder`.\n\nDon’t\
    \ forget, you also need to register these two `PFObject` subclasses with your\
