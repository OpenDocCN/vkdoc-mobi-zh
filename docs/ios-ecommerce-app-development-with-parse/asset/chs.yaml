  }\n```\n\n要使此列表可编辑，请使用`UITableView`代理方法`tableView:(UITableView *)tableView commitEditingStyle:(UITableViewCellEditingStyle)editingStyle\
  \ forRowAtIndexPath:(NSIndexPath *)indexPath`。\n\n首先，为用户提供一个按钮，以便您知道用户有编辑意图。为`UINavigationItem`添加一个条形按钮项作为右条形按钮项，并使用系统“编辑”按钮样式。\n\
  \n其次，通过调用以下方法启用行的“编辑模式”：\n\n```\n-(BOOL)tableView:(UITableView *)tableView canEditRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    return YES;\n}\n```\n\n一旦用户点击“编辑”按钮，每个单元格上会出现一个红色的“-”。点击“-”图标，将执行以下方法：\n\
  \n```\n-(void)tableView:(UITableView *)tableView commitEditingStyle:(UITableViewCellEditingStyle)editingStyle\
  \ forRowAtIndexPath:(NSIndexPath *)indexPath {\n    if (editingStyle == UITableViewCellEditingStyleDelete)\
  \ {\n        EMABFavoriteProduct *fProduct = (EMABFavoriteProduct *)[self objectAtIndexPath:indexPath];\n\
  \        [fProduct deleteInBackgroundWithBlock:^(BOOL succeeded, NSError *error)\
  \ {\n            if (!error) {\n                [self loadObjects];\n          \
  \  }\n        }];\n    }\n}\n```\n\n您将只监听删除操作，并调用`PFObject`的异步删除方法。一旦删除成功完成，查询后端服务器并更新\
  \ UI。\n\n当用户点击列表中的某个产品时，将显示产品详情。您已经准备好了`EMABProductDetailViewController`，只需将正确的`EMABProduct`实例传递给它即可。由于您的`PFQuery`返回的是`EMABFavoriteProduct`列表，您需要额外一步来获取`EMABProduct`。代码如下：\n\
  \n```\n#pragma mark - UITableView 代理\n\n-(void)tableView:(UITableView *)tableView\
  \ didSelectRowAtIndexPath:(NSIndexPath *)indexPath {\n    if (indexPath.row == [[self\
  \ objects] count]) {\n        [self loadNextPage];\n    } else {\n        EMABProductDetailViewController\
  \ *viewController = [self.storyboard instantiateViewControllerWithIdentifier:@\"\
  EMABProductDetailViewController\"];\n        [viewController setProduct:(EMABProduct\
  \ *)[self objectAtIndexPath:indexPath]];\n        [self.navigationController pushViewController:viewController\
  \ animated:YES];\n    }\n}\n\n@end\n```\n\n### 总结\n\n在本章中，我向您展示了如何实现一个基本的“我的账户”屏幕。根据用户是否登录，我们为每种场景呈现了不同的内容。我还演示了登录用户如何查看自己的收货地址、支付方式、收藏列表和订单历史。另一方面，当用户未登录时，我们只会显示“登录”。\n\
  \n我还展示了如何使用`PFQueryTableViewController`来显示用户之前输入的信用卡信息。然后，我展示了如何让用户添加新的信用卡或删除已有的信用卡，以及如何查看用户的订单历史和特定订单的详情。\n\
  \n最后，我讨论了如何显示收藏产品列表。接着，您学习了当用户点击列表中的某个产品时如何显示产品详情。\n\n## 16. 添加产品\n\n电子补充材料 本章在线版本（doi:[10.1007/978-1-4842-1317-9_16](http://dx.doi.org/10.1007/978-1-4842-1317-9_16)）包含补充材料，供授权用户使用。\n\
  \n到目前为止，您都是通过 Parse.com 上的 Parse 项目仪表板为应用添加产品。一旦您的应用上线，可能不允许所有人这样做。如果让每个人都能访问 Parse\
  \ 仪表板，可能会出现一些问题：\n\n- 您可能会向不应知道信息的人泄露过多信息。\n- 您有可能会错误地输入数据。\n- 您的数据可能容易被删除或修改。\n\
  \n一般来说，Parse 仪表板既不是一个用户友好的界面，也不是手动输入大量数据的有效方式。\n\n通常，您会创建一个 Web 应用来让某些管理员用户添加或编辑产品。总的来说，使用\
  \ Web 应用进行数据输入工作更高效。为了本书的完整性，我将向您介绍如何创建一个管理员用户，并为此用户提供一个特殊界面，使其能够从移动应用添加或编辑产品。此功能的一些使用场景可能包括：一家需要输入产品数量不多的商店，或者一个需要拍摄大量产品照片并上传到服务器的企业。\n\
  \n### 模型\n\n首先，您需要在`EMABUser`模型中添加一个新的布尔属性，并命名为`isAdmin`：\n\n```\n@property (nonatomic,\
  \ assign) BOOL isAdmin;\n```\n\n您还需要在`EMABUser`实现文件中将其添加到`@dynamic`列表。\n\n当用户通过您的应用注册时，如第\
  \ 8 章所述，您需要在 Parse 仪表板中将用户的`isAdmin`属性更新为 true。\n\n\n\n### 视图\n\n在`EMABUserAccountTableViewController`中新增一个分区，如第\
  \ 15 章所述，该分区仅向管理员用户显示特定内容。\n\n```\n-(NSInteger)numberOfSectionsInTableView:(UITableView\
  \ *)tableView {\n    // 返回分区数量\n    return (self.customer && self.customer.isAdmin)?2:1;\n\
  }\n```\n\n此分区只需一个单元格。该单元格的标题为\"添加产品\"。点击该单元格时，将呈现产品添加界面。图 16-1 展示了该界面的外观。该界面包含一个`PFImageView`用于显示产品缩略图。当管理员点击该图像视图时，系统会询问是否从手机相册上传图片或拍摄新照片。此外，还包含一个`UITextField`用于输入产品名称，以及一个`UITextField`用于输入产品单价和价格单位。另有一个`UITextField`用于输入产品品牌，最后还有一个`UITextView`用于输入产品描述。\n\
  \n![A978-1-4842-1317-9_16_Fig1_HTML.jpg](img/A978-1-4842-1317-9_16_Fig1_HTML.jpg)\n\
  \n图 16-1. 添加产品界面\n\n以下是表示所有 UI 控件的部分属性：\n\n```\n@property (nonatomic, weak) IBOutlet\
  \ PFImageView *productImageView;\n@property (nonatomic, weak) IBOutlet UITextField\
  \ *nameTextField;\n@property (nonatomic, weak) IBOutlet UITextField *priceTextField;\n\
  @property (nonatomic, weak) IBOutlet UITextField *unitTextField;\n@property (nonatomic,\
  \ weak) IBOutlet UITextField *brandTextField;\n@property (nonatomic, weak) IBOutlet\
  \ UITextView *desciptionTextView;\n```\n\n### 控制器\n\n创建一个新的`UIViewController`子类，并将其命名为\"\
  `EMABAddProductTableViewController`\"。在深入实现之前，先思考该视图控制器的功能。\n\n- 需要实现将产品图片上传到 Parse\
  \ 的功能。\n- 允许管理员输入产品名称、价格、单价和产品摘要。\n- 允许管理员输入产品品牌。由于允许管理员从列表中选择品牌，这将提供更好的用户体验。\n\
  - 需要确保管理员在点击\"保存\"按钮前已输入所有信息。\n- 当管理员开始输入时，软件键盘会弹出并占据部分屏幕。需要处理这种情况，以便管理员始终能看到正在输入的内容。\n\
  \n我将逐一处理这五个任务。\n\n### 上传产品照片\n\n首先，在产品图像视图中添加一个点击手势，如下所示：\n\n```\n-(void)setupProductImageview\n\
  {\n    UITapGestureRecognizer *portraitTap = [[UITapGestureRecognizer alloc] initWithTarget:self\
  \ action:@selector(onThumbnail:)];\n    [self.productImageView addGestureRecognizer:portraitTap];\n\
  }\n```\n\n当管理员点击图像视图时，系统会询问是从相册上传图片还是拍摄新照片。这在`onThumbnail:`方法中实现：\n\n```\n-(void)onThumbnail:(UITapGestureRecognizer\
  \ *)recognizer{\n    //询问是否添加新收据\n    UIAlertController* alert = [UIAlertController\
  \ alertControllerWithTitle:NSLocalizedString(@\"图片来源\", @\"Photo Source\")\n   \
  \                                                                message:NSLocalizedString(@\"\
  请选择\", @\"Choose One\")\n                                                      \
  \      preferredStyle:UIAlertControllerStyleActionSheet];\n    UIAlertAction* cancelAction\
  \ = [UIAlertAction actionWithTitle:@\"取消\" style:UIAlertActionStyleCancel\n    \
  \                                                     handler:^(UIAlertAction *\
  \ action) {\n                                                         }];\n    UIAlertAction*\
  \ photoLibraryAction = [UIAlertAction actionWithTitle:@\"相册\" style:UIAlertActionStyleDefault\n\
  \                                                               handler:^(UIAlertAction\
  \ * action) {\n                                                                \
  \   [self showImagePickerForSourceType:UIImagePickerControllerSourceTypePhotoLibrary];\n\
  \                                                               }];\n    UIAlertAction*\
  \ cameraAction = [UIAlertAction actionWithTitle:@\"相机\" style:UIAlertActionStyleDefault\n\
  \                                                         handler:^(UIAlertAction\
  \ * action) {\n                                                             [self\
  \ showImagePickerForSourceType:UIImagePickerControllerSourceTypeCamera];\n     \
  \                                                    }];\n    [alert addAction:cancelAction];\n\
  \    [alert addAction:photoLibraryAction];\n    [alert addAction:cameraAction];\n\
  \    [self presentViewController:alert animated:YES completion:nil];\n}\n```\n\n\
  以下是基于来源类型的图片选择器实现。如果来源类型是`UIImagePickerControllerSourceTypePhotoLibrary`，则无需过多操作。`UIImagePickerController`的代理方法会自动返回选中的图片数据。如果来源类型是`UIImagePickerControllerSourceTypeCamera`，则稍微复杂一些。首先，需要添加两个工具栏按钮：一个用于\"\
  取消\"，另一个用于\"拍照\"。其次，需要在相机预览界面上提供一个覆盖层，以便管理员裁剪覆盖区域。\n\n以下是完整实现：\n\n```\n- (void)showImagePickerForSourceType:(UIImagePickerControllerSourceType)sourceType\n\
  {\n    imagePickerController = [[UIImagePickerController alloc] init];\n    imagePickerController.modalPresentationStyle\
  \ = UIModalPresentationCurrentContext;\n    imagePickerController.sourceType = sourceType;\n\
  \    imagePickerController.delegate = self;\n    if (sourceType == UIImagePickerControllerSourceTypeCamera)\n\
  \    {\n        CGRect frame =  [UIScreen mainScreen].applicationFrame;\n      \
  \  UIToolbar *toolBar=[[UIToolbar alloc] initWithFrame:CGRectMake(0, frame.size.height-44,\
  \ self.view.frame.size.width, 44)];\n        toolBar.barStyle =  UIBarStyleBlackOpaque;\n\
