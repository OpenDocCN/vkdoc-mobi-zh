- "# 简介\n\n在这本关于使用 Objective-C 和 Parse（最流行、最强大的后端即服务平台（BaaS））创建电商 iOS 应用的全面指南中，我将引导您完成每一步——从收集需求；设计视觉界面原型；使用\
  \ Xcode 和 Parse 设置项目；使用 Parse 创建数据模型；展示、搜索、筛选和收藏商品；管理购物袋；处理支付；到管理用户账户——始终遵循安全最佳实践。\n\
  \n本书以一个完整且可运行的电商 iPhone 应用为例，结合各种 Parse 产品，呈现了电商移动应用最流行的用例，例如创建用户账户、使用 Facebook\
  \ 登录、用户邮箱验证、使用 Stripe 和 Apple Pay 支付、使用 Mailgun 发送邮件，以及管理客户支付方式和订单历史记录。\n\n第 1 章\
  \ 基于 Apple Store iPhone 应用，介绍了电商 iOS 应用的广泛需求概览。\n\n第 2 章 引导您使用 Xcode 以最少的代码为电商 iPhone\
  \ 应用设计原型。\n\n第 3 章 概述了 Parse 提供的功能，第 4 章 解释了如何设置此项目，包括您后续需要的服务，例如 Facebook Developer、Mailgun\
  \ 和 Stripe。\n\n第 5 章、第 6 章 和 第 7 章 详细介绍了如何构建商品分类、商品列表和商品详情，以及搜索、筛选等功能。\n\n第 8 章\
  \ 和 第 9 章 展示了用户注册、登录以及 Facebook 登录的用户界面和功能。\n\n第 10 章 到 第 14 章 详细介绍了如何构建购物袋、如何通过信用卡收费，或如何让用户使用\
  \ Apple Pay 支付。这包括一些我们必须编写的后端代码。\n\n第 15 章 聚焦于用户账户。这是用户可以注销、查看订单历史记录和创建收藏商品列表的地方。\n\
  \n第 16 章 演示了如何添加商品。这是一个仅对管理员开放的隐藏功能。\n\n第 17 章 是一个额外章节。我向您展示如何将推送通知用作一种促销方式。\n\n\
  第 18 章 提供了关于安全性的详细信息。\n\n第 19 章 列出了 Parse 中您可以用以改进产品的一些额外功能，包括邮箱验证、密码重置、Parse Analytics\
  \ 和 Crash Reports。\n\n## 目标读者\n\n本书面向经验丰富的 iOS 开发者，他们熟练掌握 Objective-C、iOS、Xcode\
  \ 并具备一些后端知识；也面向那些有兴趣构建电商 iPhone 应用的读者。换句话说，本书假定读者具备中级的 iOS 开发和面向对象编程知识，了解电商基本原理也将有所帮助。\n\
  \n如果您没有实现一个全功能后端的经验，但仍希望构建一个基于网络服务的 iPhone 应用，那么本书适合您。对于希望提升技能并学习新工具的资深移动应用开发者来说，本书也非常棒。\n\
  \n\n\n## 你将学到什么\n\n通过本书，你将学到以下内容：\n\n- 开发一款功能完备的电子商务 iPhone 应用所需的要素  \n- `Parse`\
  \ 及其产品，以及它如何帮助你加速应用开发  \n- 如何集成 `Stripe` 支付网关和 `Mailgun` 电子邮件服务  \n- 如何开发既易于扩展又便于维护的应用\
  \  \n- 保护应用和用户数据所需的知识  \n- 如何将书中的示例扩展，以满足你自己应用的需求\n\n## iOS SDK 版本及示例源代码\n\n本书基于最新版本的\
  \ `Xcode`、iOS、`Parse` 和 `Stripe` SDK 编写。请务必从本书的页面 [`http://apress.com/9781484213186`](http://apress.com/9781484213186)\
  \ 下载最新且最完整的示例源代码归档文件。随着新版本 SDK 的发布，我们会更新代码，因此请定期访问该网站。\n\n\n\n"
