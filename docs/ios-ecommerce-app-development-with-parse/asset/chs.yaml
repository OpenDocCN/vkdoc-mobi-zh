  ```\n\n### 总结\n\n在本章中，我向你展示了如何创建一个 Stripe 客户 ID，然后使用此客户 ID 通过 Parse 云模块对用户的信用卡进行收费。我还解释了如何使用\
  \ `Mailgun` 向此用户发送订单确认邮件。\n\n## 15. 我的账户\n\n电子补充材料 本章在线版本 (doi:[10.​1007/​978-1-4842-1317-9_​15](http://dx.doi.org/10.1007/978-1-4842-1317-9_15))\
  \ 包含补充材料，可供授权用户使用。\n\n至此，应用可以完成其主要功能——购买并支付商品。然而，要使其成为一个完整的应用，还有一些工作要做。例如，用户应该能够更改其收货地址和更新付款方式。他们还应该能够查看标记为收藏的商品、查看订单历史记录以及退出账户——这些功能都尚未实现。\n\
  \n在本章中，你将学习如何：\n\n-   实现一个静态的“我的账户”屏幕。根据是否有登录用户，此屏幕是用户注销或登录的入口；显示用户的收货地址；访问订单历史记录；管理付款方式。\n\
  -   允许用户查看和编辑其收货地址。\n-   允许用户查看其订单历史记录。\n-   允许用户管理其付款方式。\n-   使用户能够管理其收藏列表。\n\n\
  \n\n### 创建“我的账户”界面\n\n首先，创建一个`UITableViewController`的子类，并将其命名为`EMABUserAccountTableViewController`。接下来，你将把一些静态信息整理到`UITableView`中。为所需的单元格内容定义一个枚举类型。\n\
  \n```\ntypedef NS_OPTIONS(NSInteger, TABLE_ROW){\n    SIGNED_IN = 0,\n    CONTACT_INFO\
  \ = 1,\n    PAYMENT = 2,\n    FAVORITE = 3,\n    HISTORY\n};\n```\n\n你还需要一个属性来表示当前已登录的用户。\n\
  \n```\n@interface EMABUserAccountTableViewController ()\n@property (nonatomic, strong)\
  \ EMABUser *customer;\n@end\n```\n\n总的来说，这个界面的实现相当简单。以下大部分代码都一目了然：\n\n```\n@implementation\
  \ EMABUserAccountTableViewController\n\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\
  \    self.customer = [EMABUser currentUser];\n}\n```\n\n用户在`-(void)viewDidLoad`方法中实例化。如果没有已登录的用户，`self.customer`将为\
  \ nil。你将利用这一信息来决定`UITableView`需要显示多少个单元格。\n\n```\n#pragma mark - Table view data\
  \ source\n\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView {\n\
  \    // 返回节（section）的数量\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView\
  \ *)tableView numberOfRowsInSection:(NSInteger)section {\n    // 返回该节中的行数\n    return\
  \ (self.customer)?5:1;\n}\n```\n\n如果没有有效用户，则只返回一个单元格；对于任何有效用户，则创建五个单元格。\n\n```\n\
  - (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@\"\
  AccountCell\" forIndexPath:indexPath];\n    // 配置单元格…\n    NSString *title = @\"\
  \";\n    NSString *subtitle = @\"\";\n    switch (indexPath.row) {\n        case\
  \ SIGNED_IN:\n            title = (self.customer)?NSLocalizedString(@\"Sign In\"\
  , @\"\"): NSLocalizedString(@\"Sign Out\", @\"\");\n            subtitle = self.customer.email;\n\
  \            break;\n        case CONTACT_INFO:\n            title = NSLocalizedString(@\"\
  Contact Info\", @\"\");\n            break;\n        case PAYMENT:\n           \
  \ title = NSLocalizedString(@\"Payment\", @\"\");\n            break;\n        case\
  \ FAVORITE:\n            title = NSLocalizedString(@\"Favorite\", @\"\");\n    \
  \        break;\n        case HISTORY:\n            title = NSLocalizedString(@\"\
  Order History\", @\"\");\n            break;\n        default:\n            break;\n\
  \    }\n    cell.textLabel.text = title;\n    cell.detailTextLabel.text = subtitle;\n\
  \    return cell;\n}\n```\n\n以下`UITableView`代理方法实现了两个功能：\n\n* 第一个单元格用于让用户在点击该单元格时登出，对应“登出”文本。对于未登录的用户，则显示注册或登录界面，对应“登录”文本。\n\
  * 剩余的单元格根据所选单元格展示不同的视图控制器。\n\n```\n#pragma mark -\n\n-(void)tableView:(UITableView\
  \ *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath  {\n    NSString\
  \ *viewControllerIdentifier = @\"\";\n    switch (indexPath.row) {\n        case\
  \ SIGNED_IN:\n            if (self.customer) {\n                [self signOut];\n\
  \            } else {\n                [self presentSignupOrLogin];\n          \
  \  }\n            break;\n        case CONTACT_INFO:\n            viewControllerIdentifier\
  \ = @\"EMABUserProfileTableViewController\";\n            break;\n        case FAVORITE:\n\
  \            viewControllerIdentifier = @\"MABUserFavoriteHistoryTableViewControlle\"\
  ;\n            break;\n        case HISTORY:\n            viewControllerIdentifier\
  \ = @\"EMABUserOrderHistoryTableViewController\";\n            break;\n        case\
  \ PAYMENT:\n            viewControllerIdentifier = @\"EMABUserPaymentMethodTableViewController\"\
  ;\n            break;\n        default:\n            break;\n    }\n    if ([viewControllerIdentifier\
  \ length] > 0) {\n        UIViewController *viewController = [self.storyboard instantiateViewControllerWithIdentifier:viewControllerIdentifier];\n\
  \        [self.navigationController pushViewController:viewController animated:YES];\n\
  \    }\n}\n\n-(void)signOut {\n    [EMABUser logOut];\n    [self.tableView reloadData];\n\
  }\n\n-(void)presentSignupOrLogin {\n    UIStoryboard *dispatchStoryboard = [UIStoryboard\
  \ storyboardWithName:@\"LoginSignup\" bundle:nil];\n    UINavigationController *navController\
  \ = (UINavigationController *)[dispatchStoryboard instantiateInitialViewController];\n\
  \    [self presentViewController:navController animated:YES completion:nil];\n}\n\
  \n@end\n```\n\n图 15-1 展示了最终结果。\n\n![A978-1-4842-1317-9_15_Fig1_HTML.jpg](img/A978-1-4842-1317-9_15_Fig1_HTML.jpg)\n\
  \n图 15-1. “我的账户”`UITableViewController`界面\n\n#### 联系信息\n\n我在第 11 章中已经向你展示了如何实现`EMABUserProfileTableViewController`。当用户想要查看和编辑他/她的收货地址时，可以通过“我的账户”中的“联系信息”打开`EMABUserProfileTableViewController`，然后根据需要查看和编辑。\n\
  \n#### 支付方式\n\n无论是在实体店、线上还是通过 App 购物，顾客可能使用不同的信用卡。如果每次遇到不同的信用卡你都保存一个`EMABPaymentMethod`实例，用户可能会在你这里存储多张卡。你需要提供一个地方让用户管理这些信用卡，例如设置一张卡为默认卡、删除一张信用卡或添加一张新卡。\n\
  \n本节介绍如何显示与用户关联的所有信用卡，以及如何让用户添加更多卡和/或删除一些卡。\n\n本节使用的模型是`EMABPaymentMethod`模型。\n\n\
  ### 视图\n\n使用标准的`UITableViewCell`来显示基本的信用卡信息，例如卡号后四位和有效期。图 15-2 展示了基本的`UITableViewCell`。\n\
  \n![A978-1-4842-1317-9_15_Fig2_HTML.jpg](img/A978-1-4842-1317-9_15_Fig2_HTML.jpg)\n\
  \n图 15-2. 支付方式单元格显示卡号后四位和有效期\n\n\n\n### 控制器\n\n对于控制器，创建一个 `PFQueryTableViewController`\
  \ 子类，并命名为 `EMABUserPaymentMethodTableViewController`。以下是上一章节中介绍的如何使用 `PFQueryTableViewController`\
  \ 的方法：\n\n```\n- (void)awakeFromNib {\n    [super awakeFromNib];\n    self.parseClassName\
  \ = kPaymentMethod;\n    self.objectsPerPage = 10;\n    self.paginationEnabled =\
  \ YES;\n    self.pullToRefreshEnabled = YES;\n}\n\n- (PFQuery *)queryForTable {\n\
  \    PFQuery *query = [EMABPaymentMethod queryForOwner:[EMABUser currentUser]];\n\
  \    if ([self.objects count] == 0) {\n        query.cachePolicy = kPFCachePolicyCacheThenNetwork;\n\
  \    }\n    return query;\n}\n```\n\n`EMABPaymentMethod` 模型使用了一个辅助查询方法 `+(PFQuery\
  \ *)queryForOwner:(EMABUser *)user;`：\n\n```\n#pragma mark - UITableView 数据源\n\n\
  - (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath object:(EMABPaymentMethod *)object{\n    UITableViewCell *cell = [tableView\
  \ dequeueReusableCellWithIdentifier:@\"PaymentMethodCell\" forIndexPath:indexPath];\n\
  \    if (indexPath.row == [[self objects] count]) {\n        cell.textLabel.text\
  \ = NSLocalizedString(@\"加载更多…\", @\"\");\n    } else {\n        cell.textLabel.text\
  \ = [object friendlyCreditCardNumber];\n        cell.detailTextLabel.text = [object\
  \ friendlyExpirationMonthYear];\n    }\n    return cell;\n}\n```\n\n对于每个单元格，使用 `EMABPaymentMethod`\
  \ 辅助方法显示两条信息：格式化后的最后四位数字和有效期。\n\n你希望用户可以通过滑动手势删除信用卡。为此，需要在 `-(void)viewDidLoad`\
  \ 中进行声明：\n\n```\nUISwipeGestureRecognizer *leftSwipe = [[UISwipeGestureRecognizer\
  \ alloc] initWithTarget:self action:@selector(onLeftSwipe:)];\n[leftSwipe setDirection:UISwipeGestureRecognizerDirectionRight];\n\
  leftSwipe.delegate = self;\n[self.tableView addGestureRecognizer:leftSwipe];\n```\n\
  \n当用户执行左滑手势时，根据屏幕上的触点位置确定被滑动的单元格。然后调用 `PFObject` 异步删除方法，并再次调用查询方法以更新界面：\n\n```\n\
  -(void)onLeftSwipe:(UIGestureRecognizer *)gestureRecognizer\n{\n    CGPoint point\
  \ = [gestureRecognizer locationInView:self.tableView];\n    NSIndexPath *indexPath\
  \ = [self.tableView indexPathForRowAtPoint:point];\n    if (indexPath) {\n     \
  \   EMABPaymentMethod *paymentMethod = (EMABPaymentMethod *)[self objectAtIndexPath:indexPath];\n\
  \        __weak typeof(self) weakSelf = self;\n        [paymentMethod deleteInBackgroundWithBlock:^(BOOL\
  \ succeeded, NSError *error) {\n            if (!error) {\n                [weakSelf\
  \ loadObjects];\n            }\n        }];\n    }\n}\n```\n\n如图 15-3 所示，“+” 栏按钮项（参见第\
  \ 2 章）用于让用户添加新的信用卡。你已经创建了 `EMABAddCreditCardViewController`，因此只需展示它即可；在此过程中会创建一个\
  \ `EMABPayment` 实例。\n\n![A978-1-4842-1317-9_15_Fig3_HTML.jpg](img/A978-1-4842-1317-9_15_Fig3_HTML.jpg)\n\
  \n**图 15-3.** `UINavigationBar` 上的 “+” 栏按钮项让用户可以添加另一种支付方式\n\n以下是代码：\n\n```\n#pragma\
  \ mark - IBAction\n\n-(IBAction)onAdd:(id)sender\n{\n    EMABAddCreditCardViewController\
  \ *viewController = (EMABAddCreditCardViewController *)[self.storyboard instantiateViewControllerWithIdentifier:@\"\
  EMABAddCreditCardViewController\"];\n    __weak typeof(self) weakSelf = self;\n\
  \    viewController.finishBlock = ^(NSString *customerId){\n        [weakSelf loadObjects];\n\
  \    };\n    [self.navigationController pushViewController:viewController animated:YES];\n\
  }\n\n@end\n```\n\n在上述代码中，`-(void)loadObjects` 是 `PFQueryTableViewController` 的一个方法。你使用它来发起\
  \ API 请求，加载新的信用卡信息，并将其显示在表格视图上。\n\n### 我的订单历史\n\n根据需求，用户应该能够浏览所有订单历史，并查看特定订单的详情。在本节中，我将介绍如何实现这一功能。\n\
  \n### 视图\n\n图 15-4 展示了如何使用 `UITableViewCell` 显示用户的订单历史。这相当简单。依次使用一个 `UILabel` 显示订单日期、一个\
  \ `UILabel` 显示订单总金额，以及产品名称。一个订单中可能包含多个产品。由于没有空间在一个订单中显示所有产品，因此只显示第一个产品。\n\n![A978-1-4842-1317-9_15_Fig4_HTML.jpg](img/A978-1-4842-1317-9_15_Fig4_HTML.jpg)\n\
  \n**图 15-4.** 一个基本的订单历史单元格\n\n你可以使用一个辅助方法将数据模型与这个视图连接起来：\n\n`-(void)configureItem:(EMABOrder\
  \ *)item;`\n\n```\n#import \"PFTableViewCell.h\"\n@class EMABOrder;\n\n@interface\
  \ EMABOrderHistoryTableViewCell : PFTableViewCell\n-(void)configureItem:(EMABOrder\
  \ *)item;\n@end\n```\n\n以下是实现文件：\n\n```\n#import \"EMABOrderHistoryTableViewCell.h\"\
  \n#import \"EMABOrder.h\"\n\n@interface EMABOrderHistoryTableViewCell()\n@property\
  \ (nonatomic, weak) IBOutlet UILabel *dateLabel;\n@property (nonatomic, weak) IBOutlet\
  \ UILabel *totalLabel;\n@property (nonatomic, weak) IBOutlet UILabel *nameLabel;\n\
  @end\n\n@implementation EMABOrderHistoryTableViewCell\n\n-(void)configureItem:(EMABOrder\
  \ *)item\n{\n    if (item) {\n        NSDateFormatter *dateFormatter = [[NSDateFormatter\
  \ alloc] init];\n        [dateFormatter setDateStyle:NSDateFormatterMediumStyle];\n\
  \        [dateFormatter setTimeStyle:NSDateFormatterMediumStyle];\n        self.dateLabel.text\
  \ = [dateFormatter stringFromDate:item.updatedAt];\n        self.totalLabel.text\
  \ = [item friendlyTotal];\n        self.nameLabel.text = [item.items[0] name];\n\
  \    }\n}\n\n@end\n```\n\n\n\n### 控制器\n\n创建一个 `PFQueryTableViewController` 的子类，并将其命名为\
  \ `EMABUserOrderHistoryViewController`。对于这个视图控制器，整个实现非常直接。\n\n```\n@implementation\
  \ EMABUserOrderHistoryViewController\n\n- (void)awakeFromNib {\n    [super awakeFromNib];\n\
  \    self.parseClassName = kOrder;\n    self.objectsPerPage = 10;\n    self.paginationEnabled\
  \ = YES;\n    self.pullToRefreshEnabled = YES;\n}\n\n- (void)viewDidLoad {\n   \
  \ [super viewDidLoad];\n    // Do any additional setup after loading the view.\n\
  \    self.title = NSLocalizedString(@\"Order History\", @\"Order History\");\n}\n\
  \n- (void)didReceiveMemoryWarning {\n    [super didReceiveMemoryWarning];\n    //\
