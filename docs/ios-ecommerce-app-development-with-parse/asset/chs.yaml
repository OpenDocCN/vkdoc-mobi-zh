  \n#import \"EMABCategory.h\"\n#import \"SVProgressHud.h\"\n\n#define KEYBOARD_HEIGHT\
  \ 216.0\n\n@interface EMABAddProductViewController ()<UITextFieldDelegate, UIGestureRecognizerDelegate,\
  \ UIImagePickerControllerDelegate, UINavigationControllerDelegate, UIPickerViewDelegate,\
  \ UIPickerViewDataSource, UIScrollViewDelegate, UIAlertViewDelegate>{\n    UIImagePickerController\
  \ * imagePickerController;\n}\n\n@property (nonatomic, weak) IBOutlet UIScrollView\
  \ *scrollView;\n@property (nonatomic, strong) EMABProduct *product;\n@property (nonatomic,\
  \ strong) EMABUser *owner;\n@property (nonatomic, strong) NSArray *brands;\n@property\
  \ (nonatomic, strong) UIPickerView *brandPickerView;\n\n@end\n```\n\n### 摘要\n\n\
  在本章中，我讨论了如何以管理员身份登录，以及如何添加或编辑产品。\n\n## 17. 推广\n\n电子补充材料 本章的在线版本（doi:[10.​1007/​978-1-4842-1317-9_​17](http://dx.doi.org/10.1007/978-1-4842-1317-9_17)）包含补充材料，仅供授权用户使用。\n\
  \n推送通知营销常用于推广折扣、优惠和新产品。一般来说，创建推送通知营销功能可能相当复杂。一个常见的用例是：当应用收到推送通知且用户点击后，应用会直接跳转到产品页面或应用内的促销专区。实现此类功能需要花费不少精力。然而，我们也见过这样的用例：用户的设备收到推送通知，用户打开应用后看到促销页面。这个页面就像一张传单，内容类似于“看看我们的新产品”或“圣诞特惠九折”。由于该传单页面是覆盖在应用主界面之上的，点击即可关闭。在本章中，我将演示如何利用\
  \ Parse 易用的推送通知功能来实现这一行为。\n\n但请注意，要实际看到效果，你需要按照第 4 章中介绍的方法，通过 Apple Developer Portal\
  \ 和 Parse 配置应用以接收推送通知。\n\n\n\n### 模型\n\n为此促销模型创建一个新的`PFObject`子类，并将其命名为`EMABPromotion`。它包含两个属性：一个用于促销内容，另一个用于促销图片。以下是头文件：\n\
  \n`EMABPromotion.h`\n\n```\n#import <Parse/Parse.h>\n\n@interface EMABPromotion\
  \ : PFObject<PFSubclassing>\n\n@property (nonatomic, copy) NSString *content;\n\
  @property (nonatomic, strong) PFFile *image;\n\n@end\n```\n\n接下来，在`EMABConstants`类中注册一个新的`NSString`常量`kPromotion`。同时，在`AppDelegate`类中注册新的`EMABPromotion`模型。以下是`EMABPromotion`的实现文件：\n\
  \n`EMABPromotion.m`\n\n```\n#import \"EMABPromotion.h\"\n#import <Parse/PFObject+Subclass.h>\n\
  #import \"EMABConstants.h\"\n\n@implementation EMABPromotion\n\n@dynamic content,\
  \ image;\n\n+(NSString *)parseClassName\n{\n    return kPromotion;\n}\n\n@end\n\
  ```\n\n### 视图\n\n促销传单视图非常简单。使用`UILabel`显示内容，使用`PFImageView`显示图片，就像传单一样。图 17-1 展示了它的外观。\n\
  \n![A978-1-4842-1317-9_17_Fig1_HTML.jpg](img/A978-1-4842-1317-9_17_Fig1_HTML.jpg)\n\
  \n**图 17-1.** 促销传单示例\n\n### 控制器\n\n创建一个新的`UIViewController`子类，并将其命名为`EMABPromotionViewController`。以下是该控制器的头文件：\n\
  \n`EMABPromotionViewController.h`\n\n```\n#import <UIKit/UIKit.h>\n\n@class EMABPromotion;\n\
  \n@interface EMABPromotionViewController : UIViewController\n\n@property (nonatomic,\
  \ strong) EMABPromotion *promotion;\n\n@end\n```\n\n```\n#import \"EMABPromotionViewController.h\"\
  \n#import \"EMABPromotion.h\"\n#import <ParseUI/PFImageView.h>\n\n@interface EMABPromotionViewController\
  \ ()\n\n@property (nonatomic, weak) IBOutlet UILabel *contentLabel;\n@property (nonatomic,\
  \ weak) IBOutlet PFImageView *imageView;\n\n@end\n```\n\n以下是实现文件，逻辑非常基础。一旦获得`EMABPromotion`实例，就将此模型与视图连接起来。让内容标签显示促销内容，让图片视图显示促销图片。\n\
  \n```\n@implementation EMABPromotionViewController\n\n-(void)setPromotion:(EMABPromotion\
  \ *)promotion\n{\n    if (_promotion != promotion) {\n        _promotion = promotion;\n\
  \        [self configureView];\n    }\n}\n\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\
  \    // Do any additional setup after loading the view.\n    [self configureView];\n\
  \    self.navigationItem.leftBarButtonItem = [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemDone\
  \ target:self action:@selector(onDone:)];\n}\n\n-(void)configureView {\n    self.contentLabel.text\
  \ = self.promotion.content;\n    if (self.promotion.image) {\n        self.imageView.file\
  \ = self.promotion.image;\n        [self.imageView loadInBackground];\n    }\n}\n\
  \n-(void)onDone:(id)sender {\n    [self dismissViewControllerAnimated:YES completion:nil];\n\
  }\n\n@end\n```\n\n最后，使用一个栏按钮项，当用户点击时关闭视图控制器。\n\n接下来，思考如何显示传单视图控制器。传单的内容通过推送通知发送。当用户点击通知时，屏幕会显示。你需要转到`EMABAppDelegate`。\n\
  \n你会用到`-(BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions` 来响应用户点击通知消息的操作（假设应用处于后台），或者在没有辅助方法`-(void)handlePromotion:(NSDictionary\
  \ *)options`的情况下使用。\n\n```\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions {\n    // Register EMABPromotion class\n    [EMABPromotion registerSubclass];\n\
  \    // Handle Promotion\n    [self handlePromotion:launchOptions[UIApplicationLaunchOptionsRemoteNotificationKey]];\n\
  \    return YES;\n}\n\n-(void)handlePromotion:(NSDictionary *)notificationPayload\
  \ {\n    // Create a pointer to the Photo object\n    NSString *objectId = [notificationPayload\
  \ objectForKey:@\"p\"];\n    EMABPromotion *promotion = (EMABPromotion *)[PFObject\
  \ objectWithoutDataWithClassName:kPromotion\n                                  \
  \                                               objectId:objectId];\n    [promotion\
  \ fetchIfNeededInBackgroundWithBlock:^(PFObject *object, NSError *error) {\n   \
  \     // Show promotion view controller\n        if (!error) {\n            UIStoryboard\
  \ *mainStoryboard = [UIStoryboard storyboardWithName:@\"Main\" bundle:nil];\n  \
  \          EMABPromotionViewController *viewController = [mainStoryboard instantiateViewControllerWithIdentifier:@\"\
  EMABPromotionViewController\"];\n            [self.window.rootViewController presentViewController:viewController\
  \ animated:YES completion:nil];\n        }\n    }];\n}\n```\n\n在此辅助方法中，检查是否有促销通知消息。如果有，则根据消息内容中的一个键（即`objectId`）构造一个`EMABPromotion`实例。你需要执行一些远程获取操作来获取完整内容。获取完成后，弹出`EMABPromotionViewController`。\n\
  \n使用 Parse，就是这么简单。\n\n### 总结\n\n在本章中，我介绍了如何利用推送通知进行一些营销活动。基本上，当用户点击促销推送通知时，你实现一个传单页面，然后你的应用会从\
  \ Parse 后端服务器查询并加载促销内容。\n\n## 18. 安全\n\n到目前为止，我已经讨论了我想要介绍的一款电商 iPhone 应用的所有功能，除了一点：实现的安全性如何，或者说使用\
  \ Parse 有多安全。本章将介绍 Parse 的安全特性，以及你如何遵循一些行业标准最佳实践来让这款 iPhone 应用更加安全。\n\n### 密钥\n\n\
  你可能已经注意到，在创建 Parse 项目后，项目仪表板中会生成一些密钥。你在本 iPhone 应用中使用了客户端密钥，在 Parse 云代码中使用了主密钥。请记住，客户端密钥并非安全机制。此密钥随你的应用一起发布。任何人通过反编译你的应用并读取源代码，或者通过代理网络流量并在另一台设备上查看此应用，都会知道这个密钥。同样的规则也适用于\
  \ Parse 仪表板中的其他密钥，如 REST 密钥、.net 密钥和 JavaScript 密钥。\n\n另一方面，你可能已经注意到，如第 14 章所述，你需要保护主密钥。正如其名称所示，主密钥就像应用服务器的管理员密码。请记住，不要将此密钥包含在你的源代码中，也不要将其签入源代码管理。不要与他人分享。在\
  \ Parse 云代码中，你只需调用以下方法即可使用主密钥：\n\n```\nParse.Cloud.useMasterKey();\n```\n\n如果你的主密钥泄露，你可以重置它。只需向下滚动页面，直到看到所有密钥，然后你就会看到如何重置主密钥（见图\
  \ 18-1）。\n\n![A978-1-4842-1317-9_18_Fig1_HTML.jpg](img/A978-1-4842-1317-9_18_Fig1_HTML.jpg)\n\
  \n**图 18-1.** 你可以重置主密钥\n\n\n\n### 权限\n\n在此电商应用中，大部分用户只能读取品牌和产品信息。只有少数用户能创建、编辑或删除品牌和产品。这是权限的典型用例。\n\
  \n`Parse` 可让你更轻松地创建类级别的权限。你创建的几乎所有类都应在一定程度上拥有某些读写权限。\n\n要开始设置类级别权限，请点击数据浏览器中要配置类的“Security”（安全）选项（见图\
  \ 18-2）。\n\n![A978-1-4842-1317-9_18_Fig2_HTML.jpg](img/A978-1-4842-1317-9_18_Fig2_HTML.jpg)\n\
  \n图 18-2. 设置类级别权限（CLP）\n\n在 `FavoriteProduct` 类中，默认权限是所有用户均可读写该类，这符合你的用例。然而，`Product`\
  \ 类的正确权限设置应为：所有用户可“读取”，仅“少数用户”可“写入”。“少数用户”可以是某些预定义的角色或用户。角色就是一组应共享相同权限的用户和角色。例如，你可以设置一个名为\
  \ `admins` 的角色，并让某个表只有该角色可写。\n\n在开发模式下，“客户端类创建”功能是自动开启的，这对于无需离开 Xcode 就能创建类及其属性的开发者来说是一大便利。建议在应用进入生产模式时关闭此功能。图\
  \ 18-3 展示了如何禁用它。\n\n![A978-1-4842-1317-9_18_Fig3_HTML.jpg](img/A978-1-4842-1317-9_18_Fig3_HTML.jpg)\n\
  \n图 18-3. 应用级别的客户端类创建\n\n#### 访问控制列表（ACL）\n\n如果一个对象没有 ACL，则所有用户都可对其进行读写。唯一的例外是 `_User`\
  \ 类。你永远不应允许用户互相写入彼此的数据，但默认情况下他们可以读取。为了非常简便地为每个对象创建用户私有 ACL，你可以设置一个默认的 ACL，该 ACL\
  \ 将用于你创建的每个新对象。\n\n```\n[PFACL setDefaultACL:[PFACL ACL] withAccessForCurrentUser:YES];\n\
  ```\n\n并且将这行代码放入 `AppDelegate.m` 的 `- (BOOL)application:(UIApplication *)application\
  \ didFinishLaunchingWithOptions:(NSDictionary *)launchOptions` 方法中。\n\n接下来，我来介绍一些你可能需要处理的其他常见用例。\n\
  \n第一个相当常见的用例是，你可以对某个对象设置不同的读写权限。例如，以下是为你创建的产品评价（由用户发布，且任何人均可阅读）创建 ACL 的方法：\n\n```\n\
  PFACL *acl = [PFACL ACL];\n[acl setPublicReadAccess:true];\n[acl setWriteAccess:true\
  \ forUser:[PFUser currentUser]];\n[review setACL: acl];\n```\n\n第二个用例是用户的数据，例如电子邮件地址或电话号码。你不希望让其他用户看到彼此的电子邮件。要为当前用户的数据设置一个不应公开可读的\
  \ ACL，你只需这样做：\n\n```\nPFUser *user = [PFUser currentUser];\nuser.ACL = [PFACL ACLWithUser:user];\n\
  ```\n\n第三个用例是，你希望某个用户创建的数据既有公开部分也有私有部分；最好的办法是使用两个独立的对象。你可以从公开对象中添加一个指向私有数据的指针。\n\
  \n```\nPFObject *privateData = [PFObject objectWithClassName:@\"PrivateUserData\"\
  ];\nprivateData.ACL = [PFACL ACLWithUser:[PFUser currentUser]];\n[privateData setObject:@\"\
  555-5309\" forKey:@\"phoneNumber\"];\n[PFUser setObject:privateData forKey:@\"privateData\"\
  ];\n```\n\n第四个用例是，你只想限制某些超级用户写入其他用户的数据，或者如果你不想逐个用户地管理权限，可以使用角色对象。角色是一种特殊对象，它允许我们创建一个用户组，这些用户可以全部被分配到一个\
  \ ACL 中。例如，你有一个 `admins` 角色，可以允许某些用户拥有此角色。在创建 Review 对象时，你让 `admins` 拥有完全的读写权限。你可以这样做：\n\
  \n```\nPFACL *acl = [PFACL ACL];\n[acl setPublicReadAccess:true];\n[acl setWriteAccess:true\
  \ forRoleWithName:@\"admins\"];\n```\n\n角色的好处之一是，你可以在不更新受该角色限制的每个对象的情况下，向角色添加或移除用户。\n\
  \n最后，作为开发者，如果你需要更新其他的 `_User` 对象，可以使用云代码结合用户 `MasterKey` 选项来实现。\n\n### 云代码\n\n在这个电商\
  \ iPhone 应用中，我已经展示过你可以将重要的功能交给云代码处理，这意味着你将 JavaScript 代码上传到你的 Parse 项目服务器。你调用某些函数，让\
  \ Parse 为你运行它们。这与 iPhone 应用的代码不同，因为它运行在用户的设备上。对于想要修改你代码的人来说，这要容易得多。另一方面，你无法总是信任用户的输入。更好的做法是，你应该验证用户的输入数据；正确的位置是在云代码中，这样恶意客户端就无法绕过你在客户端实现的验证逻辑。\n\
  \n例如，我在第 8 章和第 9 章中展示过，在这个 iPhone 应用中，你需要在该用户注册或登录前验证其电子邮件地址输入。这种做法更多是为了提升用户体验，而非作为安全措施。换句话说，你不希望在发送应用调用后才告诉用户输入的电子邮件地址无效。然而，黑客可以轻松绕过客户端的电子邮件验证。验证用户输入的正确方法是使用云代码的\
  \ `beforeSave`（保存前）触发器。只要对象被保存，这些触发器就会被触发。你还有机会修改对象或完全拒绝保存。\n\n例如，以下是在用户注册时验证其是否有电子邮件地址的方法：\n\
  \n```\nParse.Cloud.beforeSave(Parse.User, function(request, response) {\n  var user\
  \ = request.object;\n  if (!user.get(\"email\")) {\n    response.error(\"每个用户必须有一个电子邮件地址。\"\
  );\n  } else {\n    response.success();\n  }\n});\n```\n\n另一方面，还有其他情况，你的用户没有写入某个对象的完全权限，但你希望绕过这个限制。例如，如果你希望允许用户“点赞”一个\
  \ `Post` 对象，但该用户没有 `Post` 对象的完全写入权限，你可以通过在你的 JavaScript 代码中使用云代码函数和 `useMasterKey`\
  \ 选项来实现此功能。使用 `useMasterKey` 选项，你将覆盖写入或读取权限的限制。\n\n```\nParse.Cloud.define(\"like\"\
  , function(request, response) {\n  var post = new Parse.Object(\"Post\");\n  post.id\
  \ = request.params.postId;\n  post.increment(\"likes\");\n  post.save(null, { useMasterKey:\
  \ true }).then(function() {\n    response.success();\n  }, function(error) {\n \
  \   response.error(error);\n  });\n});\n```\n\n最后但同样重要的是，Parse 提供了一个很棒的功能，允许客户端（例如你的\
  \ iPhone 应用）发起推送通知。这在开发应用时提供了一些灵活性。当你的应用投入生产环境后，最好通过在你的 Parse 项目设置中禁用“客户端推送”来关闭此功能。原因相同：你不能信任来自应用的行为。相反，你应该验证将通过云代码函数发送的数据。\n\
  \n\n\n### 会话\n\n当用户通过多个设备登录你的应用时，Parse 云会在特定设备上为你的应用分配一个唯一的、可撤销的`Session`对象。这意味着不同设备和浏览器将为同一用户分配不同的会话令牌。在移动设备和你的应用中，你无需担心会话的创建与销毁。当用户登录或注册时，Parse\
  \ 云会自动创建相应的`Session`对象。当用户退出登录时，Parse 云会自动销毁相应的`Session`对象，使之前分配给该用户设备的会话令牌失效。\n\
  \nParse 还引入了一套灵活的可撤销会话 API，让你能够轻松理解并安全地管理应用中的用户会话。你可以像处理其他 Parse 对象一样，在数据浏览器中查看应用的`Session`对象。如果用户向你反映其账户可能被盗用，你可以使用数据浏览器、REST\
  \ API 或云代码，通过主密钥强制撤销用户会话。此外，为了增强安全性，你还可以配置应用，使不活跃的用户会话自动过期。\n\n> **注：** 更多信息，请访问\
  \ Parse 官方博客系列文章：[`http://blog.parse.com/learn/engineering/parse-security-i-are-you-the-key-master/`](http://blog.parse.com/learn/engineering/parse-security-i-are-you-the-key-master/)。\n\
  \n### 小结\n\n在本章中，我讨论了 Parse 为保护你的应用和用户数据安全而提供的安全机制。即：类级权限、访问控制列表（ACL）、云代码和可撤销会话。请记住，它们并非彼此独立。在实际的生产级应用中，你很可能需要组合使用所有这些方法。\n\
  \n> **注：** 阅读更多关于 Parse 安全性的内容，请访问 [`https://parse.com/docs/data`](https://parse.com/docs/data)。\n\
  \n## 19. 深入了解 Parse\n\n在第 8 章中，我介绍了注册功能。但如何知道用户是否输入了有效的电子邮件呢？你需要进行一些验证，以确保用户输入的电子邮件地址格式正确。但实际上，你并未确认该邮件地址是否真的属于该用户。在电子商务领域，邮件营销仍被证明是有效的。因此，你需要在用户注册时提供一种验证电子邮件的方法。\n\
  \n幸运的是，Parse 也考虑到了这些常见用例，并提供了简单的解决方案。让我们深入了解电子邮件验证流程。\n\n### 电子邮件验证\n\n首先，在你的项目\
  \ Parse Dashboard 中，在“设置”>“电子邮件”下启用电子邮件验证功能，如图 19-1 所示。\n\n![A978-1-4842-1317-9_19_Fig1_HTML.jpg](img/A978-1-4842-1317-9_19_Fig1_HTML.jpg)\n\
  \n**图 19-1.** 启用“验证用户电子邮件”功能\n\n接下来，在你的`EMABUser`模型中，添加一个新的布尔属性：`emailVerified`：\n\
  \n```objc\n@property (nonatomic, assign) BOOL emailVerified;\n```\n\n同时，在`EMABUser.m`文件的`@dynamic`声明中添加该属性。\n\
  \n接下来，创建一个电子邮件验证请求的邮件模板，如图 19-2 所示。\n\n![A978-1-4842-1317-9_19_Fig2_HTML.jpg](img/A978-1-4842-1317-9_19_Fig2_HTML.jpg)\n\
  \n**图 19-2.** 这是一个电子邮件验证请求的邮件模板\n\n你可以根据需要添加或编辑内容。如果你不希望在自己的服务器上托管该模板，请确保不要更改图 19-3\
  \ 中所示的以下 URL。\n\n![A978-1-4842-1317-9_19_Fig3_HTML.jpg](img/A978-1-4842-1317-9_19_Fig3_HTML.jpg)\n\
  \n**图 19-3.** 这是一个电子邮件验证页面 URL 示例\n\n现在，当你需要检查用户是否已验证其电子邮件时，可以这样使用该属性：\n\n```objc\n\
  if (self.user.emailVerified) {\n    // 我们继续处理\n} else {\n    // 我们要求该用户进行验证\n  \
  \  UIAlertView *emailAlert = [[UIAlertView alloc] initWithTitle:NSLocalizedString(@\"\
  Email Verification Request\",@\"\")\n                                          \
  \               message:NSLocalizedString(@\"Your email has not been verified, please\
  \ verify it to finish signing up.\",@\"\")\n                                   \
  \                     delegate:nil\n                                           \
  \    cancelButtonTitle:NSLocalizedString(@\"OK \",@\"\")\n                     \
  \                          otherButtonTitles:nil, nil];\n    [emailAlert show];\n\
  }\n```\n\n你仍然需要用户来验证电子邮件。该用户可能不小心删除了验证邮件，但现在他（她）要求我们重新发送。该如何实现呢？\n\n基本上，解决方案是将用户的“电子邮件”属性设置为文件中已有的相同电子邮件地址，然后保存该用户。一旦保存成功，系统将触发向该用户提供的电子邮件地址重新发送验证邮件。代码如下：\n\
  \n```objc\nif (!self.user.emailVerified) {\n    UIAlertView *emailAlert = [[UIAlertView\
  \ alloc] initWithTitle:NSLocalizedString(@\"Email Verification Request\",@\"\")\n\
  \                                                         message:NSLocalizedString(@\"\
  Your email has not been verified, please verify it to finish signing up.\",@\"\"\
  )\n                                                        delegate:self\n     \
  \                                          cancelButtonTitle:NSLocalizedString(@\"\
  Resent it\",@\"\")\n                                               otherButtonTitles:NSLocalizedString(@\"\
  OK\",@\"\"), nil];\n    emailAlert.tag = 99;\n    [emailAlert show];\n}\n\n-(void)alertView:(UIAlertView\
  \ *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex\n{\n    if (buttonIndex\
  \ == alertView.cancelButtonIndex) {\n        [alertView dismissWithClickedButtonIndex:buttonIndex\
  \ animated:YES];\n    } else if (alertView.tag == 99){\n        if (buttonIndex\
  \ == 1) {\n            [alertView dismissWithClickedButtonIndex:buttonIndex animated:NO];\n\
  \        } else if (buttonIndex == 0){\n            NSString *email = self.user.email;\n\
  \            [self.user setEmail:email];\n            [self.user saveEventually:^(BOOL\
  \ succeeded, NSError *error) {\n                if (!error) {\n                \
  \    [SVProgressHUD showSuccessWithStatus:[NSString stringWithFormat:@\"%@ %@.\"\
  , NSLocalizedString(@\"An verification email has been sent to\",@\"\"), self.useremail]];\n\
  \                }\n            }];\n        }\n    }\n}\n```\n\n\n\n### 密码重置\n\n\
  另一方面，你在第 9 章中实现了允许用户登录的功能。如果用户忘记了自己的密码怎么办？正如你从 Parse 数据面板中所注意到的，开发者也同样无法看到用户的密码。你将无法告知用户其密码。因此，当用户需要时，你需要一种方法来帮助用户找回或重置密码。\n\
  \n密码重置的流程如下：\n\n- 用户请求通过输入其电子邮件来重置密码。\n- Parse 向该地址发送一封包含特殊密码重置链接的邮件。\n- 用户点击重置链接，并被引导至一个特殊的\
  \ Parse 页面，该页面允许用户输入新密码。\n- 用户输入新密码。密码现已重置为指定的值。\n\n在登录屏幕上，添加一个标题为“忘记密码？”的新按钮。一旦用户点击此按钮，就执行密码重置操作；弹出一个\
  \ `alertView`，让用户输入其电子邮件地址；一封密码重置说明将会发送到此电子邮件地址。以下是请求用户电子邮件地址的实现代码：\n\n```\n- (IBAction)onPasswordReset:(id)sender\n\
  {\n    UIAlertView *alertView = [[UIAlertView alloc] initWithTitle:NSLocalizedString(@\"\
  Password Reset\",@\"\") message:NSLocalizedString(@\"Enter your email to reset password\"\
  ,@\"\") delegate:self cancelButtonTitle:NSLocalizedString(@\"Cancel\",@\"\") otherButtonTitles:NSLocalizedString(@\"\
  Reset\",@\"\"), nil];\n    alertView.alertViewStyle = UIAlertViewStylePlainTextInput;\n\
  \    UITextField *emailField = (UITextField*)[alertView textFieldAtIndex:0];\n \
  \   emailField.placeholder = NSLocalizedString(@\"Email\",@\"\");\n    [alertView\
  \ show];\n}\n```\n\n接下来，实现 `alertView` 的委托方法：\n\n```\n-(void)alertView:(UIAlertView\
  \ *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex\n{\n    if (buttonIndex\
  \ == alertView.cancelButtonIndex) {\n        [alertView dismissWithClickedButtonIndex:buttonIndex\
  \ animated:YES];\n    } else {\n        UITextField *emailField = (UITextField*)[alertView\
  \ textFieldAtIndex:0];\n        [PFUser requestPasswordResetForEmailInBackground:emailField.text\
  \ block:^(BOOL succeeded, NSError *error) {\n            if (!error) {\n       \
  \         [SVProgressHUD showSuccessWithStatus:NSLocalizedString(@\"Password reset\
  \ instruction sent\", @\"Password reset instruction sent\")];\n            }\n \
  \       }];\n    }\n}\n```\n\n上述代码调用了 `PFUser` 的 `+(void)requestPasswordResetForEmailInBackground`\
  \ 方法。Parse 会负责向该用户的电子邮件地址发送一封密码重置说明邮件。\n\n同样地，Parse 已经为我们创建了一个电子邮件模板，如图 19-4 所示。\n\
  \n![A978-1-4842-1317-9_19_Fig4_HTML.jpg](img/A978-1-4842-1317-9_19_Fig4_HTML.jpg)\n\
  \n**图 19-4.** 这是一个密码重置电子邮件模板示例\n\n另请注意，Parse 提供了“选择密码”和“密码重置成功”的 URL，如图 19-5 所示。\n\
  \n![A978-1-4842-1317-9_19_Fig5_HTML.jpg](img/A978-1-4842-1317-9_19_Fig5_HTML.jpg)\n\
  \n**图 19-5.** 这里是“选择新密码”和“密码已更改”页面的示例 URL\n\n如果你想将这些模板上传到你自己的服务器上，请对用户隐藏 `parse.com`。\n\
  \n### 分析\n\nParse 提供了许多钩子，让你能够洞察应用程序的实时运行状况。无需实现任何客户端逻辑，你就可以在应用程序的数据面板中查看 API 请求的实时图表和细分数据（按设备类型、Parse\
  \ 类名或 REST 动词），并保存这些图表过滤器以快速访问你感兴趣的数据。\n\nParse 应用程序打开与推送分析钩子允许你跟踪应用程序的启动。通过在 `applicationDidFinishLaunching:`\
  \ 中添加以下代码行，你将开始收集有关应用程序何时以及多久被打开的数据。\n\n```\n[PFAnalytics trackAppOpenedWithLaunchOptions:launchOptions];\n\
  ```\n\n你可以从应用程序的数据面板访问你的统计数据图表和细分数据。\n\n`PFAnalytics` 还允许你使用少量的 `NSString` 键和值来跟踪自由形式的事件。这些额外的维度允许你通过应用程序的数据面板对你的自定义事件进行细分。假设你的应用程序提供公寓列表搜索功能，并且你想跟踪该功能的使用频率以及一些附加的元数据。代码如下：\n\
  \n```\nNSDictionary *dimensions = @{\n  // 定义范围以将数据点分组成有意义的区间\n  @\"priceRange\"\
  : @\"1000-1500\",\n  // 用户是否筛选了查询？\n  @\"source\": @\"craigslist\",\n  // 搜索在工作日还是周末更频繁发生？\n\
  \  @\"dayType\": @\"weekday\"\n};\n// 将维度与 'search' 事件一起发送到 Parse\n[PFAnalytics\
  \ trackEvent:@\"search\" dimensions:dimensions];\n```\n\n### 崩溃报告\n\nParse 崩溃报告\
  \ iOS SDK 是 Parse 开发者在应用程序被用户下载和使用后了解崩溃情况的绝佳方式。存在一些已有的库可以帮助跟踪 iOS 应用程序的崩溃并生成报告，例如\
  \ Crashlytics 和 Apple 的 Xcode 崩溃报告功能。在我看来，Parse 崩溃报告的优点有三点：\n\n- 首先，鉴于你已选择 Parse\
  \ 作为后端，你可以从一个数据面板查看所有数据和分析。Parse 提供了很好的分析功能，你可以直接在同一数据面板中查看应用程序的崩溃报告。\n- 其次，与 Xcode\
  \ 的崩溃报告功能相比，你可以轻松地将成员添加到 Parse 项目，这样即使没有安装 Xcode 的成员也可以轻松浏览崩溃并将其标记为已解决。如果你有专门的 QA\
  \ 团队，这是一个很棒的功能。另一方面，如果你选择使用 Xcode 的崩溃报告，则必须使用 Xcode。\n- 第三，Parse 按版本跟踪崩溃。如果你在应用程序的新版本中引入了一个旧错误，Parse\
  \ 能让你轻松注意到该旧错误，从而可以快速修复，即使你之前已将其标记为“已解决”。\n\n要将 Parse 崩溃报告 iOS SDK 包含到你的项目中，请使用\
  \ CocoaPods，在 podfile 中添加以下行：\n\n```\npod 'ParseCrashReporting'\n```\n\n然后运行 `pod\
  \ update`；你应该已经将其包含到你的项目中。\n\n接下来，在你的 `EMABAppDelegate` 中，在设置 Parse Application\
  \ ID 和客户端密钥之前启用 `ParseCrashReporting`。\n\n```\n// 启用崩溃报告\n[ParseCrashReporting enable];\n\
  // 设置 Parse\n[Parse setApplicationId:@\"YOUR-PARSE-APP-ID\" clientKey:@\"YOUR-PARSE-APP-CLIENT-KEY\"\
  ];\n```\n\n之后，配置你的项目，为应用程序的每个构建版本向 Parse 发送符号文件。这允许 Parse 正确地汇总崩溃事件，并在数据面板上显示包含正确栈跟踪符号的崩溃信息。要实现在每次构建应用程序时自动上传符号文件，请通过运行以下命令（例如，在你的\
  \ Xcode 项目所在目录下）初始化一个新的 Parse Cloud Code 目录：\n\n```\nparse new\n```\n\n在应用程序目标的“构建阶段”中添加一个新的“运行脚本”阶段：\n\
  \n```\nexport PATH=/usr/local/bin:$PATH\ncd <path_to_cloudcode_folder>  \nparse\
  \ symbols <app_name_from_cloud_code_config_globals> --path=\"${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}\"\
  \n```\n\n这就是你需要做的全部工作。\n\n### 总结\n\n在本章中，我介绍了用户注册时的电子邮件验证，以及如何通过上传一些模板到你自己的服务器来重置用户密码。我简要介绍了\
  \ Parse 分析。最后，我还介绍了 Parse 的崩溃报告功能，以便你可以在 Parse 数据面板中查看崩溃历史记录。\n\n\n\n"
