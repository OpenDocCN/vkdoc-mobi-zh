  \n图 2-26.\n\n在 `LoginSignup.storyboard` 中使用的视图控制器。\n\n### 整合实现\n\n为了使我们的原型像真实 App\
  \ 一样工作，您需要编写少量代码来处理以下情况：\n\n-   用户尚未创建账户，但点击了“我的账户”或“加入购物袋”。\n-   用户注销。\n\n您可能想知道是否可以在用户刚打开\
  \ App 时就要求他们注册账户？从技术上讲，可以，但这并不是良好的用户体验。用户还不知道 App 是什么以及它能做什么，您却已经要求他们注册账户？很可能用户会直接退出并删除该\
  \ App。\n\n使用 `NSUserDefault` 来保存客户的登录/注销状态。当 App 刚打开时，假设用户不是注册用户。代码如下：\n\n```\n\
  AppDelegate.m\n\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions {\n\n    // 应用程序启动后的自定义覆盖点。\n\n    UITabBarController *tabBarController\
  \ = (UITabBarController*)self.window.rootViewController;\n\n    tabBarController.delegate\
  \ = self;\n\n     NSString *const kIsLoggedInfKey   = @\"kIsLoggedIn\";\n\n    [[NSUserDefaults\
  \ standardUserDefaults] registerDefaults:@{kIsLoggedInfKey:@(NO)}];\n\n    return\
  \ YES;\n\n}\n```\n\n当用户点击“我的账户”或“购物袋”标签页时，显示我们的 `DispatchViewController`。要做到这一点，您需要做一些额外的工作。\n\
  \n首先，在 `AppDelegate` 中，您需要声明 `UITabBarContollerDelegate`：\n\n```\nUITabBarController\
  \ *tabBarController = (UITabBarController*)self.window.rootViewController;\n\n \
  \   tabBarController.delegate = self;\n```\n\n当用户点击除“我的账户”或“购物袋”之外的标签页时，不要求用户注册或登录。\n\
  \n以下是实现 `UITabBarControllerDelegates` 中的一个方法以响应标签页选择的方式：\n\n```\n- (void)tabBarController:(UITabBarController\
  \ *)tabBarController didSelectViewController:(UIViewController *)viewController{\n\
  \n    UINavigationController *navViewController = (UINavigationController *)viewController;\n\
  \n    if (![navViewController.title isEqualToString:@\"商店（Shop）\"]) {\n\n      \
  \  if (!([[NSUserDefaults standardUserDefaults] boolForKey:kIsLoggedInfKey])) {\n\
  \n            UIStoryboard *dispatchStoryboard = [UIStoryboard storyboardWithName:@\"\
  LoginSignup\" bundle:nil];\n\n            UINavigationController *navController\
  \ = (UINavigationController *)[dispatchStoryboard instantiateInitialViewController];\n\
  \n            [self.window.rootViewController presentViewController:navController\
  \ animated:YES completion:nil];\n\n        }\n\n    }\n\n}\n```\n\n首先，通过检查导航控制器的标题来判断选择了哪个标签页。然后询问用户是否已登录；如果未登录，则通过故事板标识符获取分派导航控制器，然后将其呈现出来。\n\
  \n在分派视图控制器中，实现两个 `IBActions`：用户使用“使用 Facebook 登录”功能登录，或者用户取消登录或注册流程：\n\n```\n-(IBAction)onFacebookLogin:(id)sender{\n\
  \n    [[NSUserDefaults standardUserDefaults] setBool:YES forKey:kIsLoggedInfKey];\n\
  \n    [[NSUserDefaults standardUserDefaults] synchronize];\n\n    [self dismissViewControllerAnimated:YES\
  \ completion:nil];\n\n}\n```\n\n这里，我们只需将 `NSUserDefaults` 的 `kIsLoggedInKey` 设置为\
  \ `Yes`，然后关闭分派导航视图控制器。\n\n```\n-(IBAction)onCancel:(id)sender{\n\n    [self dismissViewControllerAnimated:YES\
  \ completion:nil];\n\n}\n```\n\n一旦用户点击“取消” `UIBarButtonItem`，我们就关闭分派导航视图控制器。\n\n\
  **注意：** 完整的实现可以在第 2 章的源代码中找到。\n\n### 总结\n\n在本章中，我介绍了如何使用 `UIStoryboard` 为本书中使用的\
  \ App 创建原型。我使用了标签页应用模板。三个标签页，即“商店”、“购物袋”和“我的账户”，分别对应 App 的三个主要功能。我还展示了如何设置注册或登录的\
  \ `UIStoryboard`。通过一些代码来模拟已登录用户，我创建了该 App 的原型。\n\n\n\n## 3. 解析基础\n\nParse 拥有众多特性和功能，旨在简化开发者的工作。这些特性将在本书中逐一介绍。本章将重点讲解\
  \ Parse iOS SDK。\n\n在本章中，你将了解到：\n\n- 与 Parse `PFObject` 类及其子类进行交互\n- 使用 `PFQuery`\
  \ 类检索数据\n- 通过指针、数组、Parse 关系和连接表来创建对象之间的关系\n- 使用 `PFImageView` 类加载和显示图像\n- 使用 `PFTableViewCell`\
  \ 类显示图像\n- 使用 `PFQueryTableViewController` 类查询和展示数据\n\n### 与对象交互：`PFObject`\n\n\
  如果你是一名 iOS 开发者，你对 `NSObject` 应该不陌生。`NSObject` 是大多数 Objective-C 类层次结构的根类。`PFObject`\
  \ 则是 Parse iOS 的根类。在开发 iOS 应用时，你将从 `PFObject` 开始：\n\n```\n@interface PFObject :\
  \ NSObject\n```\n\n`PFObject` 之所以能如此轻松地与 Parse 后端配合使用，是因为每个 `PFObject` 都包含由 JSON\
  \ 兼容数据组成的键值对。这些数据是无模式的，这意味着你无需预先指定每个 `PFObject` 上存在哪些键——只需设置你想要的任何键值对，Parse 后端就会将其存储起来。\n\
  \n另一个好用的特性是，Parse 不会限制新类的创建方式。你可以前往 Parse 网站上的项目主页，通过数据浏览器、导入数据或从客户端来添加新类。要从客户端创建新类，请记住在项目主页的设置页面中启用客户端类创建功能（见图\
  \ 3-1）。\n\n![A978-1-4842-1317-9_3_Fig1_HTML.jpg](img/A978-1-4842-1317-9_3_Fig1_HTML.jpg)\n\
  \n图 3-1. 在 Parse 控制台中启用“允许客户端类创建”\n\n例如，要创建一个包含 `title`、`subtitle`、`unitPrice` 和\
  \ `priceUnit`（如个、磅等单位）等属性的 `Product` 类，请在 Xcode 中编写以下代码：\n\n```\nPFObject *product\
  \ = [PFObject objectWithClassName:@\"Product\"];\n[product setObject:@\"iOS eCommerce\
  \ App Development with Parse\" forKey:@\"title\"];\n[product setObject:@(19.99)\
  \ forKey:@\"unitPrice\"];\n[product setObject:@\"ea\" forKey:@\"priceUnit\"];\n\
  [product setObject:@\"A real world iOS app development with Parse\" forKey:@\"subtitle\"\
  ];\n[product save];\n```\n\n要保存该类，你需要调用 `PFObject` 的 `save` 方法。如果 Parse 后端上不存在名为“Product”的类，Parse\
  \ 会为你创建一个。同时，还会为该类添加一行数据，如图 3-2 所示。\n\n![A978-1-4842-1317-9_3_Fig2_HTML.jpg](img/A978-1-4842-1317-9_3_Fig2_HTML.jpg)\n\
  \n图 3-2. Parse 创建了一个 `Product` 类，并带有一行记录\n\n如果后端已经存在名为“Product”的类，执行相同的代码将添加另一行数据。\n\
  \n尽管创建类很容易，但你可能很快就会遇到问题。例如，每个类对象与你试图模拟的实际业务对象关联不大。在这种情况下，`Product` 是你想要表示的实际对象，但你只称它为\
  \ `PFObject`，而不是 `Product`。此外，你还必须记住所有键，并用正确的值设置它们——这有点像使用 `NSDictionary`。幸运的是，Parse\
  \ 原生的 `PFObject` 子类功能可以解决这个问题。\n\n使用 `PFObject` 子类甚至比直接使用类还要简单。操作方法如下：在 Xcode 中，创建一个新文件并选择\
  \ Cocoa Touch Class；然后将文件命名为 `Product`，并使其成为 `PFObject` 的子类，如图 3-3 所示。\n\n![A978-1-4842-1317-9_3_Fig3_HTML.jpg](img/A978-1-4842-1317-9_3_Fig3_HTML.jpg)\n\
  \n图 3-3. 使用 Xcode 创建一个 `PFObject` 的 `Product` 子类\n\n这样会创建两个文件：`Product.h` 和 `Product.m`。\n\
  \n在 `Product.h` 中，你需要声明 `Product` 类必须遵循 `PFSubclassing` 协议；然后，像往常一样创建一个带有 `title`、`subtitle`、`unitPrice`\
  \ 和 `priceUnit` 属性的 `NSObject`。\n\n```\n#import <Parse/Parse.h>\n\n@interface Product\
  \ : PFObject<PFSubclassing>\n\n@property (nonatomic, copy) NSString *title;\n@property\
  \ (nonatomic, copy) NSString *subtitle;\n@property (nonatomic, assign) double unitPrice;\n\
  @property (nonatomic, copy) NSString *priceUnit;\n\n@end\n```\n\n在 `Product.m` 中，你需要导入\
  \ `<Parse/PFSubclassing.h>`：\n\n```\n#import \"Product.h\"\n#import <Parse/PFObject+Subclass.h>\n\
  ```\n\n对于这个实现，请为你的属性使用 `@dynamic` 关键字：\n\n```\n@dynamic title, subtitle, priceUnit,\
  \ unitPrice;\n```\n\n还需要实现另一个必需的方法：\n\n```\n+(NSString *)parseClassName\n{\n   \
  \ return @\"Product\";\n}\n```\n\n就是这样。以下是 `Product.m` 文件的完整代码：\n\n```\n#import\
  \ \"Product.h\"\n#import <Parse/PFObject+Subclass.h>\n\n@implementation Product\n\
  \n@dynamic title, subtitle, priceUnit, unitPrice;\n\n+(NSString *)parseClassName\n\
  {\n    return @\"Product\";\n}\n\n@end\n```\n\n你还需要做一件事。在 `AppDelegate.m` 文件中，在声明任何与\
  \ Parse 相关的内容之前，先声明 `Product` 类：\n\n```\n#import \"AppDelegate.h\"\n#import <Parse/Parse.h>\n\
  #import \"Product.h\"\n\n@implementation AppDelegate\n\n- (BOOL)application:(UIApplication\
  \ *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {\n\
  \    [Product registerSubclass];\n    [Parse setApplicationId:@\"YOUR-PARSE-APPLICATION-ID\"\
  \  clientKey:@\"YOUR-PARSE-CLIENT-KEY\"];\n    return YES;\n}\n```\n\n基本上，这就是创建\
  \ `PFObject` 子类的方法。现在，使用 `Product` 类变得更加简单和直观：\n\n```\nProduct *product = [Product\
  \ object];\nproduct.title = @\"iOS eCommerce App Development with Parse\";\nproduct.subtitle\
  \ = @\"A real world iOS app development with Parse\";\nproduct.priceUnit = @\"ea\"\
  ;\nproduct.unitPrice = 19.99;\n[product save];\n```\n\n与对象打交道时，通常涉及四种类型的操作：创建、读取、更新和删除。Parse\
  \ 凭借其子类简化了开发者的工作。以下面的 `Product` 子类使用场景为例。\n\n- **创建（Create）**——正如你所见，创建一个产品对象实例很容易：`Product\
  \ *product = [Product object];`\n- **读取（Read）**——可以使用标准方式处理 `NSObject` 来读取产品对象的属性。例如，如果你想把产品的标题打印到控制台，可以使用：`NSLog(@\"\
  %@\", product.title);`\n- **编辑（Edit）**——编辑产品可能意味着更改产品的属性，比如为该产品设置一个新价格：`product.unitPrice\
  \ = 21.99;`\n- 将更新后的产品保存到 Parse 中非常重要，因此你需要调用：`[product save];`\n- 或者，你也可以异步调用 `save`\
  \ 方法——为了获得更好的用户体验，这通常是推荐的做法：`[product saveInBackground];`\n- **删除（Delete）**——像 `NSObject`\
  \ 实例一样，将此对象设置为 nil。但是，你还需要让 Parse 知道该对象已不存在，因此调用 `delete` 方法：`[product delete];`\n\
  - 或者异步调用：`[product deleteInBackground];`\n\n**注意：** 有关 `PFObject` 及其 API 的更多信息，请访问\
  \ [`parse.com/docs/ios/api/Classes/PFObject.html`](https://parse.com/docs/ios/api/Classes/PFObject.html)。\n\
  \n\n\n### 检索数据：`PFQuery`\n\n由于你的所有数据都存储在 Parse 上，从 Parse 获取这些数据就变得至关重要。为此，你可以使用\
  \ `PFQuery` 辅助类来查询 Parse。\n\n`PFQuery` 是 `PFObject` 的子类，它让常见的查询相关 API 调用变得更加简单。假设你想创建一个\
  \ `PFQuery` 实例，可以这样使用：\n\n`PFQuery *query = [PFQuery queryWithClassName:@\"Product\"\
  ];`\n\n内置的类方法 `(+PFQuery *)queryWithClassName` 以类名作为参数，表明查询的是 `Product` 类。\n\nParse\
  \ 提供了许多易于记忆和使用的*方法*，以保持查询对开发者友好。\n\n比如说，你想检索所有的产品，可以这样使用：\n\n`NSArray *products\
  \ = [query findObjects];`\n\n或者你也可以使用异步方法：\n\n```\n__block NSArray *products;\n\
  [query findObjectsInBackgroundWithBlock:^(NSArray *objects, NSError *error){\n \
  \   if (!error) {\n        products = objects;\n    }\n}];\n```\n\n默认情况下，Parse 会返回存储在\
  \ Parse 上的前 200 个产品条目。如果你想自定义检索的条目数量，可以使用 `PFQuery` 的方法：`-(void)setLimit: (NSInteger)limit`\n\
  \n```\n[query setLimit:100];\n```\n\n如果你只想获取标题为 “iOS eCommerce App Development with\
  \ Parse” 的产品，可以使用查询约束方法：\n\n```\n[query whereKey:@\"title\" equalTo:@\"iOS eCommerce\
  \ App Development with Parse\"];\n```\n\n你还可以自定义返回对象的排序顺序。默认结果是按 `createdAt` 属性升序排列。如果你想按产品标题的字母顺序升序排列返回的条目，可以这样使用：\n\
  \n```\n[query orderByAscending:@\"title\"];\n```\n\n结合这些约束，你可以执行非常强大的查询。\n\n**注意：**\
  \ 有关 `PFQuery` 及其 API 的更多信息，请访问 [`parse.com/docs/ios/api/Classes/PFQuery.html`](https://parse.com/docs/ios/api/Classes/PFQuery.html)。\n\
  \n### 创建对象间的关系\n\n对象之间可以拥有多种关系。一个产品通常属于一个产品类别。例如，这本书通常被归入 Barnes & Noble 的“计算机编程”类别。而“计算机编程”类别包含了许多不同的编程书籍：这是一个典型的一对多关系场景。\n\
  \n你可能还听说过其他关系类型，例如一对一和多对多。Parse 提供了四种不同的方式来构建关系：指针、数组、Parse 关系和连接表。\n\n#### 使用指针\n\
  \n指针用于一对一和一对多关系。例如，假设你有一个书籍和书籍类别，分别对应 `Product` 类和 `ProductCategory` 类；以下是在 `Product.h`\
  \ 中使用 `PFObject` 子类定义关系的方法：\n\n```\n#import <Parse/Parse.h>\n@class ProductCategory;\n\
  @interface Product : PFObject<PFSubclassing>\n@property (nonatomic, copy) NSString\
  \ *title;\n@property (nonatomic, copy) NSString *subtitle;\n@property (nonatomic,\
  \ assign) double unitPrice;\n@property (nonatomic, copy) NSString *priceUnit;\n\
  @property (nonatomic, strong) ProductCategory *category;\n@end\n```\n\n假设你有一个标题为\
  \ “Programming Books” 的 `ProductCategory` 对象，并且你想让这本书属于这个类别，可以这样使用：\n\n```\nProductCategory\
  \ *category = [ProductCategory object];\ncategory.title = @\"Programming Book\"\
  ;\nProduct *product = [Product object];\nproduct.category = category;\n[product\
  \ saveInBackground];\n```\n\nParse 的一个好处是，如果你现在保存这个产品，`ProductCategory` 的 category\
  \ 对象将自动保存到 Parse，而无需显式调用 `save` 方法。\n\n一旦你在这本书和书籍类别之间建立了多对一关系，并且你想展示编程书籍类别中的所有书籍，可以使用这个查询：\n\
  \n```\nPFQuery *query = [PFQuery queryWithClassName:@\"Product\"];\n[query whereKey:@\"\
  category\" equalTo:category];\n[query findObjectsInBackgroundWithBlock:^(NSArray\
  \ *objects, NSError *error){\n    if (!error) {\n    }\n}];\n```\n\n**注意：** 如果你有一些自定义的查询方法，最好将它们放在子类中，而不是放在你将使用的主视图控制器里。\n\
  \n#### 使用数组\n\n数组在多对多关系中的使用方式，与在一对多关系中大致相同。关系一侧的所有对象将拥有一个数组列，其中包含关系另一侧的多个对象。以书籍产品为例，一本书可以由多位作者合著。以下是在\
  \ `Product` 类中声明这种关系的方法：\n\n```\n#import <Parse/Parse.h>\n@class ProductCategory;\n\
  @interface Product : PFObject<PFSubclassing>\n@property (nonatomic, copy) NSString\
  \ *title;\n@property (nonatomic, copy) NSString *subtitle;\n@property (nonatomic,\
  \ assign) double unitPrice;\n@property (nonatomic, copy) NSString *priceUnit;\n\
  @property (nonatomic, strong) ProductCategory *category;\n@property (nonatomic,\
  \ strong) NSArray *authors;\n@end\n```\n\n假设你有两个 `Author` 对象：\n\n```\nproduct.authors\
  \ = @[author1, author2];\n```\n\n当执行 `Product` 查询时，如果你还想获取相关的作者，可以使用 `-(void)include`\
  \ 这个 `PFQuery` 方法。以下代码展示了如何从 `Product` 查询中获取所有作者，并打印第一位作者的姓名：\n\n```\nPFQuery *query\
  \ = [PFQuery queryWithClassName:@\"Product\"];\n[query includeKey:@\"authors\"];\n\
  [query findObjectsInBackgroundWithBlock:^(NSArray *objects, NSError *error){\n \
  \   if (!error) {\n        Product *product = objects[0];\n        NSArray *authors\
  \ = product.authors;\n        PFUser *author = authors[0];\n        NSLog(@\"%@\"\
  , [author objectForKey:@\"name\"]);\n    }\n}];\n```\n\n**注意：** 当你想要获取数组所包含的对象数据时，使用\
  \ `includeKey` 方法非常重要。\n\n#### 使用 Parse 关系\n\nParse 关系，即 `PFRelation`，其工作方式类似于 `PFObject`\
  \ 的 `NSArray`。不同之处在于，你不需要一次性下载关系中的所有对象。这使得 `PFRelation` 能够扩展到比 `PFObject` 的 `NSArray`\
  \ 方法更多的对象。一个例子是，一个用户可能喜欢很多产品。要保存用户已喜欢的产品，你可以使用 `PFRelation`：\n\n```\nPFObject *user\
  \ = [PFObject object];\nPFRelation *relation = [user relationForKey:@\"likes\"];\n\
  [relation addObject:product];\n[user saveInBackground];\n```\n\n要从用户的收藏列表中移除一个产品，可以这样使用：\n\
  \n```\n[relation removeObject:product];\n```\n\n默认情况下，用户已收藏的产品列表是不会被下载的。你可以通过以下方式获取产品列表：\n\
  \n```\n[[relation query] findObjectsInBackgroundWithBlock:^(NSArray *objects, NSError\
  \ *error){\n    if (!error) {\n        Product *product = objects[0];\n        NSLog(@\"\
  %@\", product.title);\n    }\n}];\n```\n\n#### 连接表\n\n使用连接表方法可以帮助你获取除关系本身之外的更多信息。以下面这个用例为例：如果你想建立用户与其评论过的产品之间的关系，你会关心谁写了评论、评论了哪个产品以及评论的内容。针对这个用例，`ProductReview`\
  \ 这个 `PFObject` 子类如下所示：\n\n```\n#import <Parse/Parse.h>\n@class Product;\n@interface\
  \ ProductReview : PFObject\n@property (nonatomic, strong) PFUser *user;\n@property\
  \ (nonatomic, strong) Product *product;\n@property (nonatomic, copy) NSString *content;\n\
  @end\n```\n\n\n\n### 介绍特殊解析对象：PFUser\n\n`PFUser` 类是持久化到 Parse 数据中的用户的本地表示形式。该类是\
  \ `PFObject` 的子类，具有所有相同的功能，例如灵活的模式、自动持久化和键值接口。不同之处在于 `PFUser` 具有一些特定于用户账户的特殊附加功能，包括身份验证、注册和唯一性验证。\n\
  \n值得注意的是，`username` 和 `password` 是 `PFUser` 的两个必需属性。`PFUser` 的 `e-mail` 属性始终存在，即使您可能想要为其设置值。\n\
  \n要使用用户名和密码注册用户，首先创建一个 `PFUser` 实例：\n\n```\nPFUser *user = [PFUser user];\n```\n\
  \n接下来，从两个 `UITextField` 实例中获取 `username` 和 `password`：\n\n```\nuser.username = usernameTextField.text;\n\
  user.password = passwordTextField.text;\n```\n\n然后调用 `-(BOOL)signUp` 方法，或异步调用 `signUp`\
  \ 方法：\n\n```\n[user signUpInBackgroundWithBlock:^(BOOL succeeded, NSError *error)\
  \ {\n    if (!error) {\n    }\n}];\n```\n\n如今，要求用户将电子邮件地址作为用户名是很常见的。您可以使用 `UITextField`\
  \ 来收集用户的电子邮件：\n\n```\nuser.username = emailTextField.text;\nuser.password = passwordTextField.text;\n\
  user.email = emailTextField.text;\n```\n\n接下来，您需要验证 `emailTextField` 中的文本是否为有效的电子邮件地址。Parse\
  \ 为 `PFUser` 提供了 `emailVerified` 属性。只有当此用户点击 Parse 发送的验证电子邮件中的链接时（此过程在第 19 章中讨论），`emailVerified`\
  \ 的值才能被设置为 `true`。\n\n您可以使用 `PFUser` 的类方法 `logInWithUsernameInBackground:password`\
  \ 登录用户：\n\n```\n[PFUser logInWithUsernameInBackground:emailTextField.text\n    \
  \                        password:passwordTextField.text\n                     \
  \          block:^(PFUser *user, NSError *error) {\n    if (!error) {\n    }\n}];\n\
  ```\n\n一旦此用户登录，使用类方法 `[PFUser currentUser]` 获取当前用户的实例。该用户会持久化在客户端上。除非用户已注销，否则您可以始终使用此方法来获取当前用户。\n\
  \n要注销用户，只需调用此方法：\n\n```\n[PFUser logOut];\n```\n\nParse 还提供了匿名用户功能。可以在没有用户名和密码的情况下创建匿名用户，同时保留与其他任何\
  \ `PFUser` 相同的所有能力。注销后，匿名用户将被弃用，并且用户的数据将不再可访问。一个典型的用例是在您的应用首次启动时创建一个匿名用户；然后您让用户将产品添加到购物袋中，并跟踪用户喜欢的内容。您稍后才会要求用户使用电子邮件和密码注册，否则用户的数据将被丢弃。\n\
  \n要启用此功能，请在 `AppDelegate.m` 的 `application:didFinishLaunchingWithOptions:` 中调用它：\n\
  \n```\n[PFUser enableAutomaticUser];\n```\n\n一旦调用了此方法，当检查 `[PFUser currentUser]`\
  \ 时，它将不会返回 `nil`。\n\n要检查当前用户是否是匿名用户，请使用 `PFAnonymousUtils` 方法 `+ (BOOL)isLinkedWithUser:(nullable\
  \ PFUser *)user`：\n\n```\nif ([PFAnonymousUtils isLinkedWithUser:[PFUser currentUser]])\
  \ {\n    NSLog(@\"这是一个匿名用户。\");\n}\n```\n\n您可以像创建 `PFObject` 子类一样创建 `PFUser` 的子类。例如，如果您有一个\
  \ `Customer` 对象，`Customer.h` 文件将如下所示：\n\n```objective-c\n#import <Parse/Parse.h>\n\
  \n@interface Customer : PFUser<PFSubclassing>\n\n@property (nonatomic, copy) NSString\
  \ *firstName;\n@property (nonatomic, copy) NSString *lastName;\n@property (nonatomic,\
  \ copy) NSString *address1;\n@property (nonatomic, copy) NSString *city;\n@property\
  \ (nonatomic, copy) NSString *state;\n@property (nonatomic, copy) NSString *zipcode;\n\
  \n@end\n```\n\n`Customer.m` 将如下所示：\n\n```objective-c\n#import \"Customer.h\"\n#import\
  \ <Parse/PFObject+Subclass.h>\n\n@implementation Customer\n\n@dynamic firstName,\
  \ lastName, address1, city, state, zipcode;\n\n@end\n```\n\n对于 `PFUser` 的子类，不需要实现\
  \ `+(NSString *)parseClassName` 方法，因为 Parse 类名始终是 `\"_User\"`。\n\n> **注意：** 要了解更多关于\
  \ `PFUser` 的信息，请访问 [`https://parse.com/docs/osx/api/Classes/PFUser.html`](https://parse.com/docs/osx/api/Classes/PFUser.html)。\n\
  \n### 加载和显示图像：PFImageView\n\n`PFImageView` 是 `UIimageView` 的子类。它是一个辅助类，可以更轻松地从 Parse\
  \ 服务器下载图像文件。使用方式与使用 `UIimageView` 相同。要显示图像，请编写以下代码：\n\n```objective-c\nPFImageView\
  \ *imageView = [[PFImageView alloc] initWithFrame:CGRectMake(0.0, 0.0, 320.0, 180.0)];\n\
  imageView.contentMode = UIViewContentModeScaleAspectFill;\nimageView.file = product.image;\n\
  [imageView loadInBackground];\n```\n\n`PFImageView` 有一个 `file` 属性，它是 `PFFile` 的一个实例。您的\
  \ `Product` 实例有一个属性 `image`，它也是 `PFFile` 的一个实例。\n\n> **注意：** 您可以在 [`https://parse.com/docs/osx/api/Classes/PFFile.html`](https://parse.com/docs/osx/api/Classes/PFFile.html)\
  \ 上了解更多关于 `PFFile` 的信息。\n\n### 在单元格中显示图像：PFTableViewCell\n\n`PFTableViewCell` 是\
  \ `UITableViewCell` 的子类。它是一个辅助类，可以更轻松地显示从 Parse 服务器下载的任何图像。\n\n```objective-c\n\
  - (PFTableViewCell *)tableView:(UITableView * __nonnull)tableView\n         cellForRowAtIndexPath:(NSIndexPath\
  \ * __nonnull)indexPath\n                        object:(nullable Product *)object\n\
  {\n    PFTableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@\"\
  ProductCell\"];\n    cell.imageView.file = object.image;\n    [cell.imageView loadInBackground];\n\
  \    return cell;\n}\n```\n\n\n\n### 查询与展示数据：`PFQueryTableViewController`\n\n在开发\
  \ iOS 应用时，你通常都会使用 `UITableViewController`。在典型的网络应用中，你会通过 `UITableViewController`\
  \ 来显示从远程服务器获取的内容。通常还需要实现一些功能，比如加载指示器、下拉刷新、分页、点击单元格加载并显示下一页，以及在每个 `UITableViewCell`\
  \ 上加载并显示图片。Parse 创建了 `PFQueryTableViewController`（一个 `UITableViewController` 的子类），让开发者的工作变得更加轻松。\n\
  \n下面是一个如何使用 `PFQueryTableViewController` 的示例；假设你想要实现一个展示所有产品的功能，并将其命名为 `ProductsTableViewController`\
  \ 类，如图 3-4 所示。\n\n![A978-1-4842-1317-9_3_Fig4_HTML.jpg](img/A978-1-4842-1317-9_3_Fig4_HTML.jpg)\n\
  \n图 3-4. 创建一个 `PFQueryTableViewController` 的子类\n\n这是 `ProductsTableViewController.h`\
  \ 文件的内容：\n\n```\n#import \"PFQueryTableViewController.h\"\n\n@interface ProductsTableViewController\
  \ : PFQueryTableViewController\n\n@end\n```\n\n这是 `ProductsTableViewController.m`\
  \ 文件的内容：\n\n```\n#import \"ProductsTableViewController.h\"\n#import \"Product.h\"\
  \n#import <ParseUI/PFTableViewCell.h>\n#import <ParseUI/PFImageView.h>\n\n@implementation\
  \ ProductsTableViewController\n\n-(void)awakeFromNib\n{\n    [super awakeFromNib];\n\
  \    self.parseClassName = @\"Product\";\n    self.pullToRefreshEnabled = YES;\n\
  \    self.paginationEnabled = YES;\n    self.objectsPerPage = 10;\n}\n\n- (PFQuery\
  \ *)queryForTable {\n    PFQuery *query = [PFQuery queryWithClassName:self.parseClassName];\n\
  \    if ([self.objects count] == 0) {\n        query.cachePolicy = kPFCachePolicyCacheThenNetwork;\n\
  \    }\n    return query;\n}\n\n#pragma mark\n\n-(PFTableViewCell *)tableView:(UITableView\
  \ * __nonnull)tableView cellForRowAtIndexPath:(NSIndexPath * __nonnull)indexPath\
  \ object:(nullable Product *)object\n{\n    PFTableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@\"\
  ProductCell\"];\n    cell.textLabel.text = object.title;\n        cell.imageView.file\
  \ = object.image;\n    [cell.imageView loadInBackground];\n    return cell;\n}\n\
  \n@end\n```\n\n首先，如果你在 UIStoryboard 或独立的 XIB 文件中为 `ProductsTableViewController`\
  \ 使用了 XIB 文件，你需要实现 `-(void)awakeFromNib` 方法。指定你将在此控制器中使用的 Parse 类名：本例中为 `Product`\
  \ 类。如果你希望使用下拉刷新或分页功能，请将 `self.pullToRefreshEnabled` 和 `self.paginationEnabled` 设置为\
  \ `YES`。同时，设置每页显示 10 个对象。你可以根据单元格高度来调整这个数字，以提供更好的用户体验。\n\n第二个你需要实现的方法是 `+(PFQuery\
  \ *)queryForTable`。指定你要查询的 Parse 类以及缓存策略。本例中，查询 `Product` 这个 Parse 类，并将缓存策略设置为 `kPFCachePolicyCacheThenNetwork`。\n\
  \n第三个方法是用于在每个 `PFTableViewCell` 上显示对象。在这个示例中，将产品标题设置为单元格的 `textLabel`，将产品图片设置为单元格的\
  \ `imageView`。\n\n### 本章小结\n\n在本章中，我介绍了与构建 iOS 电商应用相关的 Parse 基础知识。我从 `PFObject`\
  \ 类及其子类开始讲起，然后介绍了 `PFObjects` 和 `PFUser` 中的四种关系类型。我还涵盖了三个基本的 Parse UI，即 `PFImageView`、`PFTableViewCell`\
  \ 和 `PFQueryTableViewController`。\n\n## 4. Parse 项目设置\n\n电子补充材料 本章的在线版本（doi:[10.​1007/​978-1-4842-1317-9_​4](http://dx.doi.org/10.1007/978-1-4842-1317-9_4)）包含补充材料，仅供授权用户使用。\n\
  \n本章介绍如何设置一个 Parse 项目。你需要记下几个应用密钥和密码。为了让这个过程更简单，我们将从一个辅助类开始，用它来记住这些密钥和密码。\n\n在本章中，你将学习如何：\n\
  \n*   使用 `EMABConstants` 辅助类来管理你的密钥\n*   创建一个新的 Parse 应用\n*   设置支付、交易邮件和 Facebook\
  \ 登录\n*   使用 CocoaPods 管理依赖\n*   使用 `SVProgressHud` 实现进度指示器\n\n### 管理你的密钥：`EMABConstants`\
  \ 类\n\n接着 第 2 章 的源代码继续；创建一个新的 Cocoa Touch 类文件，将其命名为 `EMABConstants`，并使其成为 `NSObject`\
  \ 的子类。这个类的一个用途是管理那些全局可访问的 `NSStrings`，例如所有的密钥和密码。在这种情况下，使用 `extern NSString *const`\
  \ 是首选的方法。\n\n此外，你为每个创建的文件都使用了 `EMAB` 作为前缀——`EMAB` 代表“电子商务移动应用开发”，但你可以随意命名。\n\n###\
  \ 创建一个新的 Parse 应用\n\n如果你还没有 Parse 账户，现在正是注册的时候！在你喜欢的浏览器中打开 [`https://parse.com`](https://parse.com/)，然后按照屏幕上的指引注册一个\
  \ Parse 账户。这个过程很简单。一旦你验证了需要提供的电子邮件地址，你就可以直接开始创建新应用了。\n\nParse 只会要求你输入要创建的新应用的名称。在本教程中，你的应用名称是\
  \ `EcommerceAppBook`。确认项目名称后，你会看到一个类似图 4-1 所示的项目概览。\n\n![A978-1-4842-1317-9_4_Fig1_HTML.jpg](img/A978-1-4842-1317-9_4_Fig1_HTML.jpg)\n\
