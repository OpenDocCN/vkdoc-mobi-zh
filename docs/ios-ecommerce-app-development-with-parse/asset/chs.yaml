- "# 关于作者与技术审校者\n\n关于作者\n关于技术审校者\n\n\n\n## 1. 需求\n\n本书旨在阐述设计、架构、构建并发布一款电商移动应用所涉及的步骤。本书中使用的“电商”一词，特指向客户销售产品并收取款项。本书不涉及如何在移动应用中投放广告，也不涉及当客户在其他网站或移动应用上购买商品时提供推荐链接等内容。\n\
  \n本书将介绍如何构建一款能让用户购买产品的移动应用。这包括收集客户的姓名、地址和信用卡信息。所收取的款项将转入银行账户，订购的产品随后将进行运输和配送。尽管听起来很有挑战性，但这比让已注册的合法商业实体来处理这些细节要容易得多。\n\
  \n本书假设您具备一定的 iOS 编程知识。不过，如果您是一位计划通过移动应用销售产品，并正考虑聘请 iOS 开发者或咨询公司来实现目标的业务所有者，本书将帮助您了解整个流程、所需步骤以及涉及的工作量。\n\
  \n在本章中，您将了解：\n\n-   电商移动应用的常见需求\n-   构建、测试和发布 iOS 应用的先决条件\n\n### 常见的应用需求\n\n您最喜欢的\
  \ iOS 电商应用是什么？在您深入思考之前，请考虑这一点：每台 iPhone、iPad 和 iPod Touch 都内置了一个应用，那就是 Apple Store\
  \ 应用（见图 1-1）。如果您从未使用过它，现在是时候探索一番了。\n\n![A978-1-4842-1317-9_1_Fig1_HTML.jpg](img/A978-1-4842-1317-9_1_Fig1_HTML.jpg)\n\
  \n图 1-1. iPhone 上的 Apple Store 应用图标\n\n#### Apple Store 应用\n\n在撰写本书时，Apple Store\
  \ iOS 应用已收到 53,706 条评论，平均评分为 3.5 星。2015 年 9 月 24 日发布的 3.5 版本平均评分为 4 星。\n\n该应用有五个顶级内容类别（见图\
  \ 1-2）：\n\n![A978-1-4842-1317-9_1_Fig2_HTML.jpg](img/A978-1-4842-1317-9_1_Fig2_HTML.jpg)\n\
  \n图 1-2. Apple Store iPhone 应用的五个内容类别\n\n-   精选\n-   商店\n-   门店\n-   账户\n-   购物车\n\
  \n##### 精选\n\n“精选”类别用于展示主打产品（例如 Apple Watch）。点击某一主打产品会显示产品详情。\n\n#### 商店\n\n“商店”类别一览无余地展示了\
  \ Apple Store 中的所有产品类别，包括 Mac 电脑、iPhone、Apple Watch 和配件。“商店”屏幕顶部还包含一个搜索栏（见图 1-3）。\n\
  \n![A978-1-4842-1317-9_1_Fig3_HTML.jpg](img/A978-1-4842-1317-9_1_Fig3_HTML.jpg)\n\
  \n图 1-3. Apple Store iPhone 应用的“商店”类别\n\n点击一个产品类别，您将看到属于该类别的所有产品。另请注意，产品列表屏幕的标题与类别名称一致。例如，如果您在“商店”屏幕上点击“Mac”类别，则\
  \ Mac 电脑列表屏幕的标题会显示为“Mac”。\n\n在产品列表屏幕上点击一个项目会显示产品详情屏幕。除了精心挑选的产品图片外，您还会看到产品描述、价格、“加入购物车”按钮以及当前屏幕顶部的操作按钮（见图\
  \ 1-4）。您可能还会看到自定义产品的选项，这会将您引导至更多屏幕。\n\n![A978-1-4842-1317-9_1_Fig4_HTML.jpg](img/A978-1-4842-1317-9_1_Fig4_HTML.jpg)\n\
  \n图 1-4. 产品详情屏幕顶部的“加入购物车”按钮\n\n其他功能包括检查是否有货、阅读更多产品特性介绍、对产品进行评分和评论，以及提问和查找答案（问答）（见图\
  \ 1-5）。\n\n![A978-1-4842-1317-9_1_Fig5_HTML.jpg](img/A978-1-4842-1317-9_1_Fig5_HTML.jpg)\n\
  \n图 1-5. 产品详情屏幕上的更多功能\n\n##### 门店\n\n“门店”类别会引导您找到最近的 Apple Store。该应用还会检测定位服务是否已开启，如果未开启，则会通知您（见图\
  \ 1-6）。\n\n![A978-1-4842-1317-9_1_Fig6_HTML.jpg](img/A978-1-4842-1317-9_1_Fig6_HTML.jpg)\n\
  \n图 1-6. 使用 Apple Store 应用时需要开启定位服务\n\n该应用还提供搜索功能，使您能够按城市或邮政编码查找门店，并以列表形式浏览门店或在地图上查看它们（见图\
  \ 1-7）。\n\n![A978-1-4842-1317-9_1_Fig7_HTML.jpg](img/A978-1-4842-1317-9_1_Fig7_HTML.jpg)\n\
  \n图 1-7. 按城市或邮政编码查找门店，在列表视图和地图视图之间切换\n\n### 账户\n\n“账户”类别是您管理客户资料的地方，例如收藏夹、订单历史记录、与\
  \ Apple Store 天才的预约以及设置。仅当您拥有账户并已登录 Apple Store 时，才能访问此类别。如果您没有账户或尚未登录，该应用仅显示常规的关于信息，例如条款、隐私政策、应用版本以及要求您登录的按钮。\n\
  \n###### 收藏夹\n\n“收藏夹”类别列出了您之前“喜欢”的项目（通过在产品详情页面点击心形按钮）。点击“收藏夹”，您将看到一个产品列表。您还可以编辑该列表，例如删除某个产品。另一个不错的功能是，您可以切换视图，以列表或网格模式查看您的收藏夹。\n\
  \n###### 订单\n\n“订单”类别是您可以查看订单历史记录的地方（见图 1-8）。默认情况下，列表按从最新到最旧的顺序排序。\n\n![A978-1-4842-1317-9_1_Fig8_HTML.jpg](img/A978-1-4842-1317-9_1_Fig8_HTML.jpg)\n\
  \n图 1-8. 用户的订单历史记录\n\n### 账户设置\n\n“账户设置”是您可以编辑支付方式和送货地址的地方。\n\n###### 更多\n\n还有更多功能。在“通知设置”中，您可以指定是否希望接收有关订单状态的推送通知。\n\
  \n在此屏幕上，您还可以访问帮助页面以及销售与退款政策、隐私政策和版权信息。\n\n### 购物车\n\n“购物车”（在最新版本的应用中称为“购物袋”）是您的购物篮。您可以查看和编辑购物车中的内容，以及如果您要为他人的购买商品，可以留下礼品留言（见图\
  \ 1-9）。\n\n![A978-1-4842-1317-9_1_Fig9_HTML.jpg](img/A978-1-4842-1317-9_1_Fig9_HTML.jpg)\n\
  \n图 1-9. 购物车中的一件商品\n\n您还可以查看购买的小计，以及最重要的，您的支付选项（图 1-10）。\n\n![A978-1-4842-1317-9_1_Fig10_HTML.jpg](img/A978-1-4842-1317-9_1_Fig10_HTML.jpg)\n\
  \n图 1-10. 购物车中的小计和支付选项\n\n另请注意，购物车图标包含一个角标，指示购物车中有多少件商品（见图 1-11）。如果您的购物车是空的，则不会显示角标。\n\
  \n![A978-1-4842-1317-9_1_Fig11_HTML.jpg](img/A978-1-4842-1317-9_1_Fig11_HTML.jpg)\n\
  \n图 1-11. 角标显示购物车中的商品数量\n\n\n\n### 必备功能列表\n\n通过对 Apple Store 应用的快速概览，我们可以清晰地了解到一款电商应用所应具备的核心功能。它应具备：\n\
  \n- 按类别列出产品\n- 为每个类别展示产品列表\n- 展示产品详情\n- 具备搜索功能\n- 拥有购物车\n- 展示用户的收藏（心愿单）商品\n- 展示用户的订单历史\n\
  - 展示公司信息，如关于我们、联系我们、隐私政策和版权信息\n\n一款优秀的电商应用还应允许用户：\n\n- 评论产品\n- 将产品标记为收藏（或加入心愿单）\n\
  - 将产品加入购物车\n- 创建用户账户\n- 登录和登出\n- 添加和编辑收货地址\n- 添加和编辑支付方式\n- 使用第三方凭证（如 Facebook 或\
  \ Twitter）登录\n- 请求重置密码（以防忘记）\n\n要运营业务，你还需要一些开展营销活动的方法：\n\n- 向客户发送新产品或促销活动的推送通知\n\
  - 邀请用户在 App Store 上为你的应用撰写好评\n\n为了做出明智的商业决策并改进应用，你还需要：\n\n- 追踪用户如何使用我们的应用\n- 追踪应用崩溃情况\n\
  \n### 预备知识\n\n要在 App Store 上开发并发布 iOS 应用，你需要注册 iOS 开发者计划，并在你的电脑上搭建 Mac OS 开发环境。\n\
  \n### iOS 开发者计划\n\n默认情况下，App Store 会为该账户下发布的每个应用显示注册 iOS 开发者计划的开发者名称。然而，为了赢得用户的信任，建议改为显示商业实体的名称，如图\
  \ 1-12 所示。要以商业实体的名称发布应用，你需要拥有 D-U-N-S™ 编号——这比注册 iOS 开发者计划更耗时一些。\n\n![A978-1-4842-1317-9_1_Fig12_HTML.jpg](img/A978-1-4842-1317-9_1_Fig12_HTML.jpg)\
  \  \n图 1-12. Apple 发布 Apple Store 应用\n\n获取 D-U-N-S™ 编号是免费的。但美国公司可能需要一个月才能获得该编号，非美国公司则可能需要更长时间。一旦你获得了编号，Apple\
  \ 需要最多两周时间来验证该编号。简而言之，尽早申请你的 D-U-N-S 编号，不要拖延。\n\n**注意**：要了解更多关于获取 D-U-N-S 编号的信息，请访问\
  \ [`https://developer.apple.com/support/ios/D-U-N-S.php`](https://developer.apple.com/support/ios/D-U-N-S.php)。\n\
  \n#### 开发环境\n\n要构建 iOS 应用，你还需要一台运行最新 Mac OS 的 Mac 电脑。开发软件是 `Xcode`，它包含了 iOS SDK（见图\
  \ 1-13）。\n\n![A978-1-4842-1317-9_1_Fig13_HTML.jpg](img/A978-1-4842-1317-9_1_Fig13_HTML.jpg)\
  \  \n图 1-13. 从 Mac App Store 下载 `Xcode`\n\n尽管你可以在 iPhone 模拟器上运行示例项目，但为了确保你的应用在设备上正常运行，你确实应该拥有一台安装了最新\
  \ iOS 系统的 iOS 设备，例如 iPhone 或 iPod touch。\n\n本书中的示例项目均基于最新的 iOS 版本进行开发，并且在有新版本可用时，将始终更新至最新\
  \ iOS 版本。\n\n**注意**：Apple 会频繁更新 `Xcode` 和 iOS SDK。在撰写本文时，我使用的是 `Xcode` 6.3.1 版本和\
  \ iOS SDK 8.1。\n\n### 示例 iPhone 应用：Beauty & Me\n\n在本书中，你将学习构建一个用于销售美容和化妆品（如洗面奶、洁面乳及其他护肤产品）的\
  \ iOS 应用。\n\n与 Apple Store 应用一样，我将引导你了解 Apple Store 应用中引入的大部分功能。\n\n**注意**：要查看该应用的外观，你可以从\
  \ App Store 搜索“Beauty & Me”并下载。\n\n### 总结\n\n在本章中，我对 Apple Store iPhone 应用进行了概述，并总结了其功能，为你自己的电商应用应该包含哪些内容提供了一些指导。\n\
  \n## 2. 规划与构建原型\n\n电子补充材料 本章的在线版本（doi:[10.​1007/​978-1-4842-1317-9_​2](http://dx.doi.org/10.1007/978-1-4842-1317-9_2)）包含补充材料，供授权用户使用。\n\
  \n在你开始编写第一行代码之前，制作一个原型来了解应用的外观、用户体验如何、有哪些功能以及它们如何组织，这一点非常重要。在本章中，我将向你展示如何使用 `Xcode`\
  \ 为示例电商 iPhone 应用构建原型。\n\nApple Store iPhone 应用采用了基于 `UITTabBarController` 的用户界面（UI）设计模式。这种模式对于电商应用来说非常标准且强大；其他应用如\
  \ Target 和 EAT24 也使用了这种 UI 模式。标签栏界面的优点在于，每个标签页的视图控制器状态会自动保持。这意味着，当我们离开某个标签页的屏幕并与其他标签页交互后，再返回该标签页时，它总会显示我们刚刚离开时的内容。\n\
  \n本章主要是关于规划。我不会给出详细的指令并展示如何将 `UIViewController` 或 UI 控件拖放到 `UIStoryboard` 中的图示，但在某些情况下，我会揭示我使用过的一些技巧。\n\
  \n本章涵盖以下内容：\n\n- 用户界面与体验\n- 视图控制器的大致总数\n- 视图控制器的类型，`UITableViewController` 或 `UIViewController`\n\
  - 自定义视图\n- 应用的外观\n\n### 设计用户体验\n\n本书配套示例应用的目标是为用户/顾客提供与 Apple Store iPhone 应用相似的使用体验。Apple\
  \ Store 应用基于标签式设计，因此你希望在 `Xcode` 中使用标签式应用模板。开始前，启动 `Xcode`，并按照以下步骤操作：\n\n1. 基于“标签式应用”模板创建一个新项目，并将其命名为，例如，“第\
  \ 2 章”。通常来说，标签式应用模板非常适合电商移动应用。\n\n![A978-1-4842-1317-9_2_Fig1_HTML.jpg](img/A978-1-4842-1317-9_2_Fig1_HTML.jpg)\
  \  \n图 2-1. 使用 `Xcode` 创建一个标签式应用\n\n2. 接下来，打开 `Main.storyboard` 文件。默认的 nib 文件是自由尺寸。让我们在“模拟度量”中将其更改为\
  \ iPhone 4 英寸，如图 2-2 所示。\n\n![A978-1-4842-1317-9_2_Fig2_HTML.jpg](img/A978-1-4842-1317-9_2_Fig2_HTML.jpg)\
  \  \n图 2-2. 将模拟度量更改为 iPhone 4 英寸\n\n3. 添加三个导航控制器。\n\n4. 按住“Control”键，将根 TabController\
  \ 拖拽到这三个导航控制器上。一个 `UITabBar` 会出现在每个 `UINavigationController` 上，如图 2-3 所示。\n\n![A978-1-4842-1317-9_2_Fig3_HTML.gif](img/A978-1-4842-1317-9_2_Fig3_HTML.gif)\
  \  \n图 2-3. 将三个 `UINavigationControllers` 连接到 TabController\n\n5. 将三个 `UITabBar`\
  \ 的标题分别更改为“`商店`”、“`我的账户`”和“`购物袋`”（见图 2-3）。\n\n![A978-1-4842-1317-9_2_Fig4_HTML.jpg](img/A978-1-4842-1317-9_2_Fig4_HTML.jpg)\
  \  \n图 2-4. 更改标签栏项目的名称\n\n\n\n#### 商店\n\n**Shop 导航控制器**的根视图控制器是 **Shop 表格视图控制器**。你将使用该控制器来展示美容产品类别。\n\
  \n在本例中，将单元格数量设置为三个（参见图 2-5）。对于每个单元格，使用 `UITableViewCell` 的 `Basic`（基本）`Style`（样式）。这意味着每个单元格只会有一个标题标签。这三个标签的文本分别为“沐浴与身体护理”、“彩妆”和“护肤”，如图\
  \ 2-6 所示。\n\n![A978-1-4842-1317-9_2_Fig6_HTML.jpg](img/A978-1-4842-1317-9_2_Fig6_HTML.jpg)\
  \  \n*图 2-6. Shop 表格视图控制器的部分用户界面*\n\n![A978-1-4842-1317-9_2_Fig5_HTML.jpg](img/A978-1-4842-1317-9_2_Fig5_HTML.jpg)\
  \  \n*图 2-5. 为 UITableView 设置三个静态行*\n\n该示例将在每个产品类别下显示产品列表，因此你需要向 `UIStoryboard`\
  \ 中添加另一个 `UITableViewController`。将其标识符设置为 `ProductsTableViewController`，标题设置为 `Products`（产品），如图\
  \ 2-7 所示。\n\n![A978-1-4842-1317-9_2_Fig7_HTML.jpg](img/A978-1-4842-1317-9_2_Fig7_HTML.jpg)\
  \  \n*图 2-7. 为 UITableViewController 设置标识符*\n\n接下来，你需要将 `ShopTableViewController`\
  \ 中的“沐浴与身体护理”单元格连接到 `ProductsTableViewController`。按住 `Control` 键，在单元格和目标视图控制器之间拖放鼠标光标，以连接这两个控制器。\n\
  \n在 iPhone 模拟器上构建并运行项目。当你点击应用首页中的“沐浴与身体护理”单元格时，你应该会看到一个标题为“Products”（产品）的空表格，如图\
  \ 2-8 所示。\n\n![A978-1-4842-1317-9_2_Fig8_HTML.jpg](img/A978-1-4842-1317-9_2_Fig8_HTML.jpg)\
  \  \n*图 2-8. Products UITableViewController 的用户界面*\n\n接下来，你将处理 `Products` `UITableViewController`。该视图控制器将显示产品信息，例如产品名称和单价。你还可以为其添加搜索和过滤功能。\n\
  \n对于每个单元格，使用 `Subtitle`（副标题）样式，如图 2-9 所示，这意味着在主文本标签下方会有一个副标题标签。将“Skin So Soft Originals\
  \ 5-piece Pampering Set”作为主文本标签，并将“$10.99”作为副标题标签的内容。\n\n![A978-1-4842-1317-9_2_Fig9_HTML.jpg](img/A978-1-4842-1317-9_2_Fig9_HTML.jpg)\
  \  \n*图 2-9. 为 UITableViewCell 使用“副标题”样式*\n\n将一个 `UISearchBar` 拖拽到 `ProductsTableViewController`，并将其占位符文本设置为“产品名称”。见图\
  \ 2-10。这向用户提示，他们输入的搜索词将仅用于搜索产品名称。\n\n![A978-1-4842-1317-9_2_Fig10_HTML.jpg](img/A978-1-4842-1317-9_2_Fig10_HTML.jpg)\
  \  \n*图 2-10. 向 UITableView 添加 UISearchBar*\n\n在“Beauty & Me”示例应用中，用户可以根据价格范围过滤产品。向\
  \ `Products` `TableViewController` 添加一个 `UIBarButtonItem`，并将其标题更改为“过滤”。添加一个新的 `UIViewController`，将其标识符设置为“FilterViewController”，标题设置为“价格过滤”。将\
  \ `Filter` `UIBarButtonItem` 连接到新的 `FilterViewController`。以模态方式呈现视图控制器能提供更好的用户体验。你还将在该视图控制器的左侧添加一个系统\
  \ `Cancel`（取消）`UIBarButtonItem`，在右侧添加一个系统 `Done`（完成）`UIBarButtonItem`。\n\n为了让用户快速更改价格范围，请使用两个\
  \ `UISlider` 控件：一个用于设置最低价格；另一个用于设置最高价格。你还需要两个 `UILabel` 控件来显示当前最低 `UISlider` 的值和当前最高\
  \ `UISlider` 的值。添加几个其他 `UILabel` 来告知用户可以调节哪些范围，如图 2-11 所示。\n\n![A978-1-4842-1317-9_2_Fig11_HTML.jpg](img/A978-1-4842-1317-9_2_Fig11_HTML.jpg)\
  \  \n*图 2-11. FilterViewController 的用户界面*\n\n当用户点击某个产品单元格时，会显示产品的详细信息，如图 2-12 所示。向\
  \ `UIStoryboard` 中添加一个新的标识符为“ProductDetailViewController”的 `UIViewController`，并将\
  \ `ProductsTableViewController` 上的任意单元格连接到这个新的视图控制器。`ProductDetailViewController`\
  \ 的标题应为所选的产品名称，并且需要根据用户的选择进行更改。目前，我们先将“Skin So Soft Original 5-piece Pampering Set”设为其标题。\n\
  \n![A978-1-4842-1317-9_2_Fig12_HTML.jpg](img/A978-1-4842-1317-9_2_Fig12_HTML.jpg)\
  \  \n*图 2-12. ProductDetailViewController 的用户界面*\n\n产品详情视图控制器将显示产品的全尺寸图像、产品名称、价格和描述；你还需要一个按钮，让用户可以将产品添加到购物袋中。最后，你希望用户能够将产品添加到收藏列表，因此再添加一个标题为“收藏”的按钮。\n\
  \n再次构建项目并在模拟器上运行。尽管你尚未添加真正的搜索、过滤、加入购物袋和收藏功能，但它仍能让你对应用的最终样貌有所了解。最重要的是，你可以在此基础上进一步完善用户界面的设计。\n\
  \n图 2-13 展示了“商店”功能的所有 `UIViewControllers`。\n\n![A978-1-4842-1317-9_2_Fig13_HTML.gif](img/A978-1-4842-1317-9_2_Fig13_HTML.gif)\
  \  \n*图 2-13. 商店中使用的视图控制器*\n\n\n\n### 我的账户\n\n根视图控制器 `MyAccountTableViewController`\
  \ 是管理所有用户活动的地方，例如收货地址和付款地址、订单历史记录以及支付方式。我们还可以用它来显示应用信息、隐私政策、联系方式和应用版本——就像 Apple\
  \ Store iPhone 应用那样。\n\n对于 `MyAccountTableViewController`，我们将其 `UITableView` 设置为分组样式，并创建三个区段。每个单元格都设置为静态和基本样式。图\
  \ 2-14 展示了该视图控制器的外观。\n\n![A978-1-4842-1317-9_2_Fig14_HTML.jpg](img/A978-1-4842-1317-9_2_Fig14_HTML.jpg)\n\
  \n图 2-14. `MyAccountTableViewController` 的实际用户界面\n\n“退出登录”单元格用于用户登出。当该单元格被点击时，会显示一个屏幕，要求用户重新登录。这涉及到一些编程，我们将在后面介绍。\n\
  \n首先，我将专注于第一个“账户”区段的原型设计。\n\n向主 `UIStoryboard` 添加另一个 `UITableViewController`，使用\
  \ `UserAddressTableViewController` 作为其标识符，并使用“配送地址”作为其标题，如图 2-15 所示。\n\n![A978-1-4842-1317-9_2_Fig15_HTML.jpg](img/A978-1-4842-1317-9_2_Fig15_HTML.jpg)\n\
  \n图 2-15. 这是 `UserAddressTableViewController` 用户界面的一部分\n\n这次，我们对 `UserAddressTableViewController`\
  \ 的 `UITableViewCell` 进行一些自定义。理想情况下，用户应该能够编辑他们的配送地址信息。对于每个单元格，使用一个 `UILabel` 来表明该单元格的用途，并使用一个\
  \ `UITextField` 来获取用户输入。另一方面，如果我们知道用户已有完整的地址信息，更好的用户体验是让 `UITextField` 默认不可编辑。使用一个编辑系统的\
  \ `UIBarButtonItem` 来让用户点击按钮编辑信息，以避免误编辑。\n\n将 `MyAccountTableViewController` 上第一个区段的第一个单元格连接到新的\
  \ `UserAddressTableViewController`。\n\n构建并运行项目；然后我们应该能够体验这些新功能。\n\n接下来，我们来处理支付方式的用户界面。从技术上讲，你无法存储用户的信用卡号或\
  \ CVC 号码，但你可以存储信用卡的类型（例如 Visa、MasterCard 或 American Express）、卡号后四位以及到期年月。通常，用户会向自己的账户添加几张信用卡。因此，你需要使用一个\
  \ `UITableViewController` 来显示与该账户关联的所有信用卡。\n\n向你的主 `UIStoryboard` 添加一个新的 `UITableViewController`，并将其命名为\
  \ `UserPaymentMethodsTableViewController`。对于 `UITableView`，将其样式设置为 Plain，内容设置为静态单元格。你需要一个区段和两个单元格。\n\
  \n将每个单元格设置为“副标题样式”。对于第一个单元格，设置其 `TextLabel` 的内容：Visa XXXX-XXXX-XXXX-4242，副标题文本设为\
  \ 04/20；对于第二个单元格，使用 MasterCard XXXX-XXXX-XXXX-XXXX-4444 和 05/18，如图 2-16 所示。\n\n\
  ![A978-1-4842-1317-9_2_Fig16_HTML.jpg](img/A978-1-4842-1317-9_2_Fig16_HTML.jpg)\n\
  \n图 2-16. `UserPaymentMethodsTableViewController` 的实际用户界面\n\n通常，当用户首次在我们这里注册账户时，系统中不会有信用卡信息。你应该提供一种让用户添加新卡的方式。将一个\
