  \ }, function(error) {\n    response.error(error);\n  });\n});\n```\n\n基本上，你调用了\
  \ `Stripe.Customer.create` API 来创建 Stripe 客户。你提供从 iOS 应用接收到的令牌以及用户的电子邮件来创建客户。如果客户创建成功，你将收到\
  \ Stripe 客户对象。由于你只需要客户 id，因此在成功响应中返回 id。如果出现任何错误，你也应告知你的 iOS 应用。\n\n\n\n### 向客户收费\n\
  \n下一个云函数是 `charge`。此函数接收一个订单对象 ID 和一个客户 ID。你需要遵循以下步骤：\n\n根据订单对象 ID 查找订单；你还需要包含与该订单关联的产品和客户信息。你将需要这些信息来生成收据。根据\
  \ Stripe 客户 ID 向客户收费。用新的 `ORDER_COMPLETED` 状态更新订单，然后根据系统中的订单总数生成一个真实的订单 ID 和一个大整数。通过调用\
  \ `Mailgun` 解析云模块向客户发送电子邮件。你可能需要混合使用 HTML 标签和订单信息来编写一些邮件内容。一旦订单确认邮件成功发送，向 iOS 应用发回一条消息。如果发生任何错误，返回错误信息。\n\
  \n以下是前五个步骤的代码：\n\n```\n/* 初始化 Stripe 和 Mailgun 云模块 */\n\nvar Stripe = require('stripe');\n\
  Stripe.initialize('your_own_stripe_secret');\n\nvar Mailgun = require('mailgun');\n\
  Mailgun.initialize(\"your_mailgun_email_account\", \"your_mailgun_key\");\n\nParse.Cloud.define(\"\
  chargeCustomer\", function(request, response) {\n    Parse.Cloud.useMasterKey();\n\
  \    var order;\n    var orderNo;\n\n    Parse.Promise.as().then(function() {\n\
  \        var orderQuery = new Parse.Query('Order');\n        orderQuery.equalTo('objectId',\
  \ request.params.orderId);\n        orderQuery.include(\"customer\");\n        orderQuery.include([\"\
  items.product\"]);\n        orderQuery.descending(\"createdAt\");\n        return\
  \ orderQuery.first().then(null, function(error) {\n            return Parse.Promise.error('对不起，这个订单不存在。');\n\
  \        });\n    }).then(function(result) {\n        order = result;\n    }).then(function(result)\
  \ {\n        var countQuery = new Parse.Query(\"Order\");\n        return countQuery.count().then(null,\
  \ function(error) {\n            return Parse.Promise.error('出了点问题。');\n       \
  \ });\n    }).then(function(result) {\n        orderNo = result;\n    }).then(function(order)\
  \ {\n        return Stripe.Charges.create({\n            amount: request.params.amount,\
  \ // 以美分表示美元金额\n            currency: \"usd\",\n            customer: request.params.customerId\n\
  \        }).then(null, function(error) {\n            console.log('使用 Stripe 收费失败。错误:\
  \ ' + error);\n            return Parse.Promise.error('发生错误。您的信用卡未被扣款。');\n    \
  \    });\n    }).then(function(purchase) {\n        orderNo = 1000000 + orderNo;\n\
  \        order.set('stripePaymentId', purchase.id);\n        order.set('orderStatus',\
  \ 1);  // 订单已生成\n        order.set('orderNo', orderNo);\n        return order.save().then(null,\
  \ function(error) {\n            return Parse.Promise.error('您的订单出现严重错误。请尽快联系 info@beauty4you.co。');\n\
  \        });\n    }).then(function(result) {\n        var greeting = \"尊敬的 \";\n\
  \        if (request.params.name !== \"N/A\")\n            greeting += request.params.name\
  \ + \"，\\n\\n\";\n        else\n            greeting += request.params.email + \"\
  ，\\n\\n\";\n        var orderId = \"订单号: \" + orderNo + \"\\n\";\n        var body\
  \ = greeting + orderId + \"  我们已收到您对以下商品的订单：\\n\\n\" +\n            request.params.itemDesc\
  \ + \"\\n\";\n        var note = \"备注: \" + request.params.note + \"\\n\\n\";\n\
  \        body += \"\\总计: $\" + (request.params.amount / 100.00).toFixed(2) + \"\\\
  n\\n\" + note;\n        var thankYouNote = \"如有任何疑问，请联系我们！\\n\\n\" +\n         \
  \   \"\\n 谢谢，\\n\" + \"Beauty 4 You 团队\";\n        body += thankYouNote;\n\n   \
  \     // 发送邮件。\n        return Mailgun.sendEmail({\n            to: request.params.email,\n\
  \            bcc: 'CUSTOMER-EMAIL',\n            from: 'YOUR-EMAIL',\n         \
  \   subject: '',\n            text: body\n        }).then(null, function(error)\
  \ {\n            return Parse.Promise.error('您的购买已成功，但我们无法向您发送邮件。如有任何问题，请联系我们: YOUR-EMAIL。');\n\
  \        });\n    }).then(function() {\n        // 完成！\n        response.success('成功');\n\
