  \ `Parse.Cloud.define` 定义函数名称。请记住，每个函数都需要一个唯一的名称。\n\n如果你熟悉 JavaScript，除了回调之外，Parse\
  \ JavaScript SDK 中的每个异步方法都会返回一个 Promise。使用 Promise，你的代码可以比使用回调的嵌套代码清晰得多。\n\n> **注意：**\
  \ 要了解更多关于 Parse Promise 的信息，请参考 [`https://parse.com/docs/js/guide`](https://parse.com/docs/js/guide)\
  \ `– promises。`\n\n仔细看看下面这个简单的 Stripe 客户创建函数：\n\n```\nParse.Cloud.define(\"createStripeCustomer\"\
  ,function(request,response){\n  Parse.Cloud.useMasterKey();\n  Parse.Promise.as().then(function(){\n\
  \    return Stripe.Customers.create({\n    description: 'customer for Beauty & Me',\n\
