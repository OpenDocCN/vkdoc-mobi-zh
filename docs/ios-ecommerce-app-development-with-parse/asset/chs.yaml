  \ Delegate\n\n-(BOOL)textFieldShouldReturn:(UITextField *)textField\n{\n    [textField\
  \ resignFirstResponder];\n    return YES;\n}\n\n@end\n```\n\n\n\n### 使用 Facebook\
  \ 登录\n\niOS 电商应用集成 Facebook 登录功能是很常见的做法。虽然管理两套用户体系可能颇具挑战，但 Facebook SDK 可以与 Parse\
  \ SDK 配合使用，并与 `PFUser` 类集成，从而轻松地将用户与其 Facebook 身份关联起来。\n\n此功能需要 `ParseFacebookUtils`\
  \ 或 `ParseFacebookUtilsV4` SDK，因此你需要如下修改 Podfile：\n\n```\npod 'ParseFacebookUtilsV4','1.7.1'\n\
  ```\n\n**注意：** Facebook 和 Parse 会频繁更新其 SDK。当你运行此示例时，可能需要更新 SDK 版本。\n\n在本节中，你将学习如何使用\
  \ Parse 实现 Facebook 登录，以及如何获取用户的 Facebook 资料，以便保存到自己的记录中。\n\n请记住，你需要一个 Facebook\
  \ 开发者账号来实现此功能（详见第 4 章）。\n\n模型层使用 `EMABUser`（与第 8 章相同）；视图层使用“使用 Facebook 登录”按钮（见第\
  \ 8 章）。由于你需要与 Facebook API 通信以授权用户，还需要获取用户资料并保存到 Parse 后端。我将引入一个 `UIActivityIndicator`\
  \ 来显示进行中的过程，并在处理期间禁用某些按钮，以防用户不愿等待完成。整体思路是创造更友好的用户体验。\n\n以下是头文件声明：\n\n```\n#import\
  \ \"EMABDispatchViewController.h\"\n#import \"EMABConstants.h\"\n#import \"EMABUser.h\"\
  \n#import <ParseFacebookUtils/PFFacebookUtils.h>\n\n@interface EMABDispatchViewController\
  \ ()\n@property (nonatomic, weak) IBOutlet UIActivityIndicatorView *activityIndicatorView;\n\
  @end\n```\n\n当用户看到此界面时，`c` 实例是隐藏的。只有当用户点击“使用 Facebook 登录”按钮并发出网络请求时，它才会变得可见。一旦网络请求完成，动画停止，`UIActivityIndicator`\
  \ 实例即被隐藏。\n\n```\n@implementation EMABDispatchViewController\n\n- (void)viewDidLoad\
  \ {\n    [super viewDidLoad];\n    self.activityIndicatorView.hidden = YES;\n}\n\
  ```\n\n辅助方法 `-(void)updateIndicator` 用于更新 UI。当发出 Facebook API 请求时，您希望禁用左侧栏按钮项，以防止用户跳过登录过程。你也可以使用此方法来显示或隐藏指示器。\n\
  \n```\n-(void)updateIndicator:(BOOL)shouldEnable{\n    self.navigationItem.leftBarButtonItem.enabled\
  \ = !shouldEnable;\n    (shouldEnable)?[self.activityIndicatorView startAnimating]:[self.activityIndicatorView\
  \ stopAnimating];\n    self.activityIndicatorView.hidden = !shouldEnable;\n}\n```\n\
  \n正如你在前几章中所做的那样，使用 `UIAlertView` 来显示登录过程中可能出现的任何错误。\n\n```\n#pragma mark - helper\n\
  -(void)showError:(NSString *)message {\n    [[[UIAlertView alloc] initWithTitle:NSLocalizedString(@\"\
  Error\", @\"Error\") message:message delegate:nil cancelButtonTitle:NSLocalizedString(@\"\
  OK\", @\"OK\") otherButtonTitles:nil , nil] show];\n}\n```\n\n接下来，进入 Facebook 登录过程。首先，告诉\
  \ Facebook 将从用户那里获取哪些信息，并向 Facebook 请求权限。在此示例中，你只需要一些基本信息 `\"user_about_me\"`，例如用户的电子邮件、姓名和性别。如果你需要更多信息，则需要登录\
  \ `developer.facebook.com` 门户以请求额外权限。\n\n同样，Parse 简化了这一过程。你将使用 `PFFacebookUtils`\
  \ 的 `logInWithPermissions:block` 方法来发出此请求。\n\n当你发出此请求时，可能会收到成功或错误消息。如果收到错误，你可以简单地让用户知道出了问题并指出具体问题。你使用\
  \ `showError:` 方法来实现这一点。当成功时，你将获得一个 `PFUser` 实例。但此 `PFUser` 实例并未关联 Facebook 用户信息；这需要额外步骤。这就是为什么你需要另一个辅助方法\
  \ `obtainFacebookUserInfo`：\n\n```\n-(IBAction)onFacebookLogin:(id)sender{\n   \
  \ // 设置从 Facebook 用户帐户请求的权限\n    NSArray *permissionsArray = @[@\"user_about_me\"\
  ];\n    [self updateIndicator:YES];\n    [PFFacebookUtils logInWithPermissions:permissionsArray\
  \ block:^(PFUser *user, NSError *error) {\n        if (error) {\n            NSString\
  \ *facebookError = [FBErrorUtility userMessageForError:error];\n            [self\
  \ showError:facebookError];\n        } else {\n            [self obtainFacebookUserInfo:user];\n\
  \        }\n        [self updateIndicator:NO];\n    }];\n}\n```\n\n要开始请求此用户的 Facebook\
  \ 资料信息，你可以使用 `[FBRequest requestForMe]` 创建一个 `FBRequest` 实例，如下代码所示。接下来的方法是 `FBRequest`\
  \ 实例方法 `startWithCompletionHandler`。这个异步回调将返回错误或你正在寻找的结果。类似地，你可以通过向用户显示错误来处理任何错误；同时，离开此界面，返回主应用。你不希望用户卡在这里。\n\
  \n如果收到成功结果，则将此字典结果映射到 `EMABUser` 实例的属性。如前所述，`\"user_about_me\"` 权限将让你获取用户信息，例如电子邮件、姓名、性别和个人资料图片\
  \ URL。映射电子邮件、姓名和性别很容易。\n\n```\nNSDictionary *userData = (NSDictionary *)result;\n\
  [fbUser setEmail:userData[@\"email\"]];\n[fbUser setUsername:userData[@\"email\"\
  ]];\n[fbUser setName:userData[@\"name\"]];\nif (userData[@\"gender\"]) {\n    [fbUser\
  \ setGender:userData[@\"gender\"]];\n}\n```\n\n将图片 URL 映射到 `EMABUser` 中声明的 `PFFile`\
  \ 需要额外的工作。首先，你需要以正确的格式获取图片 URL。\n\n```\nNSString *facebookID = userData[@\"id\"\
  ];\nNSURL *pictureURL = [NSURL URLWithString:[NSString stringWithFormat:@\"https://graph.facebook.com/%@/picture?type=square&return_ssl_resources=1\"\
  , facebookID]];\n```\n\n在此例中，你使用用户的方形资料图片。要从图片 URL 转换为 `PFFile`，你可以从该 URL 获取 `NSData`，然后使用\
  \ `[PFFile fileWithName:Data]` 类方法创建 `PFFile` 实例。以下代码展示了如何处理此问题：\n\n```\nif ([pictureURL\
  \ absoluteString]) {\n    dispatch_queue_t queue = dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_HIGH,\
  \ 0ul);\n    dispatch_async(queue, ^{\n        NSData * imageData = [NSData dataWithContentsOfURL:[NSURL\
  \ URLWithString:[pictureURL absoluteString]]];\n        dispatch_async(dispatch_get_main_queue(),\
  \ ^{\n            PFFile *iconFile = [PFFile fileWithName:@\"avatar.jpg\" data:imageData];\n\
  \            [iconFile saveInBackgroundWithBlock:^(BOOL succeeded, NSError *error)\
  \ {\n                if (!error) {\n                    fbUser.photo = iconFile;\n\
  \                }\n            }];\n        });\n    });\n}\n```\n\n最后，保存此 `EMABUser`\
  \ 实例并关闭当前界面：\n\n```\n[fbUser saveInBackgroundWithBlock:^(BOOL succeeded, NSError\
  \ *error) {\n    if (!error) {\n        [self dismissViewControllerAnimated:YES\
  \ completion:nil];\n    }\n}];\n```\n\n以下是完整的实现：\n\n```\n-(void)obtainFacebookUserInfo:(PFUser\
  \ *)user{\n    [self updateIndicator:YES];\n    EMABUser *fbUser = (EMABUser *)user;\n\
  \    FBRequest *request = [FBRequest requestForMe];\n    [request startWithCompletionHandler:^(FBRequestConnection\
  \ *connection, id result, NSError *error) {\n        [self updateIndicator:NO];\n\
  \        if (!error) {\n            // 解析接收到的数据\n            NSString *facebookID\
  \ = userData[@\"id\"];\n            NSURL *pictureURL = [NSURL URLWithString:[NSString\
  \ stringWithFormat:@\"https://graph.facebook.com/%@/picture?type=square&return_ssl_resources=1\"\
  , facebookID]];\n            if ([pictureURL absoluteString]) {\n```\n\n\n```objectivec\n\
  dispatch_queue_t queue = dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_HIGH,\
  \ 0ul);\n\ndispatch_async(queue, ^{\n    NSData *imageData = [NSData dataWithContentsOfURL:[NSURL\
  \ URLWithString:[pictureURL absoluteString]]];\n    \n    dispatch_async(dispatch_get_main_queue(),\
  \ ^{\n        PFFile *iconFile = [PFFile fileWithName:@\"avatar.jpg\" data:imageData];\n\
  \        [iconFile saveInBackgroundWithBlock:^(BOOL succeeded, NSError *error) {\n\
  \            if (!error) {\n                fbUser.photo = iconFile;\n         \
  \   }\n        }];\n    });\n});\n\n[fbUser saveInBackgroundWithBlock:^(BOOL succeeded,\
  \ NSError *error) {\n    if (!error) {\n        [self dismissViewControllerAnimated:YES\
  \ completion:nil];\n    }\n} else if ([[[[error userInfo] objectForKey:@\"error\"\
  ] objectForKey:@\"type\"]\n            isEqualToString: @\"OAuthException\"]) {\n\
  \    [self dismissViewControllerAnimated:YES completion:^{\n        [self showError:@\"\
  Facebook 会话已失效\"];\n    }];\n} else {\n    [self dismissViewControllerAnimated:YES\
  \ completion:^{\n        [self showError:[error localizedDescription]];\n    }];\n\
  }];\n\n-(IBAction)onCancel:(id)sender{\n    [self dismissViewControllerAnimated:YES\
  \ completion:nil];\n}\n\n@end\n```\n\n### 本章小结\n\n在本章中，我讲解了如何在提供直观友好的用户体验的同时，实现已注册用户的登录。我还介绍了如何使用\
  \ Apps 实现 Facebook 登录、获取用户的 Facebook 个人资料，然后通过集成 Parse `ParseFacebookUtilsV4` SDK\
  \ 将这些信息保存到 Parse 后端。\n\n## 10. 购物袋\n\n至此，如果您一路跟随操作，现在应该拥有一个已注册的用户，该用户已准备好将产品添加到购物袋中。在本章中，我将向您展示如何将产品添加到购物袋、更新产品数量、从购物袋中删除单个产品或全部产品，以及更新总金额。当客户再次查看购物袋时，应能清楚看到袋中的内容。\n\
  \n### 购物袋模型\n\n首先，创建表示购物袋中某个商品的模型：创建一个 `PFObject` 的子类，将其命名为 `EMABOrderItem`。然后，通过\
  \ `EMABConstant` 注册这个类名，并提供一个 `NSString` 键：`kOrderItem`。该子类拥有两个属性：一个是数量，另一个是 `EMABProduct`\
  \ 实例。同时创建一个实例方法 `-(double)subTotal` 用于计算该商品的总价。\n\n以下是头文件：\n\n`EMABOrderItem.h`\n\
  \n```objectivec\n#import <Parse/Parse.h>\n\n@class EMABProduct;\n\n@interface EMABOrderItem\
  \ : PFObject\n\n@property (nonatomic, assign) double quantity;\n@property (nonatomic,\
  \ strong) EMABProduct *product;\n\n-(double)subTotal;\n\n@end\n```\n\n在实现文件中，`subTotal`\
  \ 方法简单地返回数量与该产品单价的乘积。\n\n以下是实现代码：\n\n`EMABOrderItem.m`\n\n```objectivec\n#import\
  \ \"EMABOrderItem.h\"\n#import  <Parse/PFObject+Subclass.h>\n#import \"EMABConstants.h\"\
  \n#import \"EMABProduct.h\"\n\n@implementation EMABOrderItem\n\n@dynamic quantity,product;\n\
  \n+(NSString *)parseClassName\n{\n    return kOrderItem;\n}\n\n-(double)subTotal\
  \ {\n    return self.quantity *self.product.unitPrice;\n}\n\n@end\n```\n\n您需要的第二个模型是\
  \ `EMABOrder` 模型；通过 `EMABConstants` 类注册一个 `NSString` 键，名称为 `kOrder`。\n\n不要忘记，您还需要在\
  \ `AppDelegate` 中注册这两个 `PFObject` 子类。\n\n对于这个模型类，您需要以下几个属性：用户、所有订单项、订单编号（稍后分配）、订单日期以及订单状态。订单状态枚举类型用于区分订单是仍在购物袋中还是已经处理完成。为使代码可读性更强，该枚举类型在\
  \ `EMABConstants` 类中声明。\n\n```objectivec\ntypedef NS_OPTIONS(NSInteger, ORDER_STATUS){\n\
  \    ORDER_NOT_MADE = 0,\n    ORDER_MADE = 1\n};\n```\n\n您还需要一些辅助方法：一个用于显示购物袋中的总金额；一个显然是您的\
  \ `basicQuery` 方法；一个用于查询特定用户；以及一个用于根据订单状态查询用户。\n\n以下是头文件：\n\n`EMABOrder.h`\n\n```objectivec\n\
  #import <Parse/Parse.h>\n#import \"EMABConstants.h\"\n\n@class EMABOrderItem;\n\
  @class EMABUser;\n\n@interface EMABOrder : PFObject<PFSubclassing>\n\n@property\
  \ (nonatomic, strong) EMABUser *customer;\n@property (nonatomic, assign) int64_t\
  \ orderNo;\n@property (nonatomic, assign) NSDate *orderDate;\n@property (nonatomic,\
  \ strong) NSArray *items;\n@property (nonatomic, assign) ORDER_STATUS orderStatus;\n\
  \n-(double)total;\n+(PFQuery *)basicQuery;\n+(PFQuery *)queryForCustomer:(EMABUser\
  \ *)customer;\n+(PFQuery *)queryForCustomer:(EMABUser *)customer orderStatus:(ORDER_STATUS)status;\n\
  \n@end\n```\n\n在实现中，计算总金额的方法很简单：遍历每个订单项，并累加您在 `OrderItem` 类中创建的小计金额。\n\n```objectivec\n\
  -(double)total\n{\n    double sum = 0.0;\n    if (self.items) {\n        for (EMABOrderItem\
  \ *item in self.items) {\n            sum += [item subTotal];\n        }\n    }\n\
  \    return sum;\n}\n```\n\n在 `+(PFQuery *)basicQuery` 方法中，您需在每个 `OrderItem` 中关联产品信息。Parse\
  \ 已预见到这种使用场景，因此提供了点表示法来实现此目的。\n\n```objectivec\n+(PFQuery *)basicQuery{\n    PFQuery\
  \ *query = [PFQuery queryWithClassName:[self parseClassName]];\n    [query includeKey:@\"\
  items.product\"];\n    [query orderByDescending:@\"createdAt\"];\n    return query;\n\
  }\n```\n\n请务必保持名称一致。您有一个名为 \"items\" 的属性，它是 `EMABOrderItem` 实例的数组。每个 `EMABOrderItem`\
  \ 拥有 \"product\" 属性。为了确保点表示法正常工作，应使用 \"items\" 和 \"product\"。\n\n`+(PFQuery *)queryForCustomer:(EMABUser\
  \ *)customer` 方法基于 `basicQuery` 方法实现；您只需添加以下语句即可：\n\n`[query whereKey:@\"customer\"\
  \ equalTo:customer];`\n\n```objectivec\n+(PFQuery *)queryForCustomer:(EMABUser *)customer\
  \ {\n    PFQuery *query = [self basicQuery];\n    [query whereKey:@\"customer\"\
  \ equalTo:customer];\n    return query;\n}\n```\n\n同样，`+(PFQuery *)queryForCustomer:(EMABUser\
  \ *)customer orderStatus:(ORDER_STATUS)status` 基于 `+(PFQuery *)queryForCustomer:(EMABUser\
  \ *)customer` 实现：\n\n```objectivec\n+(PFQuery *)queryForCustomer:(EMABUser *)customer\
  \ orderStatus:(ORDER_STATUS)status{\n    PFQuery  *query = [self queryForCustomer:customer];\n\
  \    [query whereKey:@\"orderStatus\" equalTo:@(status)];\n    return query;\n}\n\
  ```\n\n目前您需要的就这些。之后可能需要的其他方法可以稍后添加到此模型类中。\n\n\n### 购物袋视图\n\n此购物袋的重要视图之一是商品`UITableViewCell`，如图\
