  \n图 10-2. 购物袋界面\n\n你已经为 `UITableViewCell` 准备好了 `EMABOrderItemTableViewCell`；你还需要一些其他\
  \ UI 元素来显示信息，例如订单号、订单日期、总金额，以及“用信用卡购买”和“用 Apple Pay 购买”按钮。\n\n你将使用 `UITableView`\
  \ 的页眉和页脚视图作为容器视图。页眉视图将用于容纳两个 `UILabel`：一个 `UILabel` 显示订单号，另一个 `UILabel` 显示订单日期。\n\
  \n想一下订单号的问题。你知道订单号需要在 Parse 后端创建。只有订单成功下达后才能拥有订单号。换句话说，当用户仅将商品放入购物袋时，你不应该创建订单号。那么，为什么要为订单号创建一个\
  \ `UILabel` 呢？你可以从两个方面来看待它。一是像后面显示的那样，显示一条“您的购物袋是空的”消息。你也可以在用户完成结账流程并希望重新查看订单详情时，重用此界面来显示订单详情。（我将在第\
  \ 16 章也讨论这种情况。）\n\n这个 `UITableView` 的页脚视图包含两个 `UILabel`：一个用于显示“总计：”文本，另一个用于显示此购物袋中的总金额。你还需要两个\
  \ `UIButton`：一个用于通过信用卡结账，另一个用于通过 Apple Pay 结账。如你所见，UI 布局本身非常简单。\n\n以下是 `EMABBagTableViewController`\
  \ 的头部分类：\n\n```\n@interface EMABBagTableViewController(){\n}\n@property (nonatomic,\
  \ weak) IBOutlet UILabel *ordeNoLabel;\n@property (nonatomic, weak) IBOutlet UILabel\
  \ *ordeDateLabel;\n@property (nonatomic, weak) IBOutlet UILabel *totalLabel;\n@property\
  \ (nonatomic, weak) IBOutlet UILabel *totalTextLabel;\n@property (nonatomic, weak)\
  \ IBOutlet UIButton *payWithCCButton;\n@property (nonatomic, weak) IBOutlet UIButton\
  \ *payWithApplePayButton;\n@property (nonatomic, strong) EMABOrder *order;\n@end\n\
  ```\n\n在实现中，从 `-(void)viewWillAppear` 开始。就像你在 `EMABProductDetailViewController`\
  \ 中所做的那样，为此用户查询未完成的订单。\n\n```\n-(void)viewWillAppear:(BOOL)animated\n{\n    [super\
  \ viewWillAppear:animated];\n    if ([EMABUser currentUser]) {\n        [self queryForUnfinishedOrder];\n\
  \    }\n}\n```\n\n在 `EMABOrder` 类中，你已经创建了辅助方法 `queryForCustomer: orderStatus:`。客户将是当前的\
  \ `EMABUser` 实例；订单状态将是 `ORDER_NOT_MADE`。为了让 UI 更友好一些，你可以利用 `UIRefreshControl`，你可以通过\
  \ nib 文件来指定它。\n\n在进行此查询时，我们可能会找到某些内容，也可能找不到。如果没有找到任何内容，你可以假设此用户没有待处理的订单，因此向用户显示一条消息，同时隐藏所有其他\
  \ UI。根据是否有待处理的订单，或者用户是否从购物袋中删除了所有商品，你可能需要持续进行这种隐藏和显示操作。为此，创建一个辅助方法 `-(void)updateUI`。\n\
  \n如果没有 `EMABorder` 实例或其值为 `nil`，则隐藏除 `orderNo` `UILabel` 之外的所有内容，并让此 `UILabel` 的文本显示“您的购物袋是空的。”如果存在\
  \ `EMABOrder` 实例且其值不为 `nil`，则恢复所有内容的显示。代码如下：\n\n```\n-(void)updateUI {\n    BOOL\
  \ shouldClear = self.order == nil;\n    if (shouldClear) {\n        self.ordeNoLabel.text\
  \ = NSLocalizedString(@\"您的购物袋是空的。\", @\"\");\n        self.ordeDateLabel.text =\
  \ @\"\";\n        self.totalLabel.text = @\"\";\n        self.totalTextLabel.text\
  \ = @\"\";\n        self.payWithApplePayButton.hidden = YES;\n        self.payWithCCButton.hidden\
  \ = YES;\n        self.payWithApplePayButton.enabled = NO;\n        self.payWithCCButton.enabled\
  \ = NO;\n    } else {\n        self.totalTextLabel.text = NSLocalizedString(@\"\
  总计: \", @\"\");\n        self.payWithApplePayButton.hidden = NO;\n        self.payWithCCButton.hidden\
  \ = NO;\n        self.payWithApplePayButton.enabled = YES;\n        self.payWithCCButton.enabled\
  \ = YES;\n    }\n    [self.tableView reloadData];\n}\n```\n\n一旦此查询返回有效的 `EMABOrder`\
  \ 结果，你就需要显示每条信息，例如订单创建日期和总金额。以下是此查询的完整代码：\n\n```\n-(IBAction)queryForUnfinishedOrder\
  \ {\n    self.order = nil; //清除缓存\n    PFQuery *orderQuery = [EMABOrder queryForCustomer:[EMABUser\
  \ currentUser] orderStatus:ORDER_NOT_MADE];\n    __weak typeof(self) weakSelf =\
  \ self;\n    [orderQuery getFirstObjectInBackgroundWithBlock:^(PFObject *order,\
  \ NSError *error){\n        if ([weakSelf.refreshControl isRefreshing]) {\n    \
  \        [weakSelf.refreshControl endRefreshing];\n        }\n        if (!error)\
  \ {\n            if (order) {\n                weakSelf.order = (EMABOrder *)order;\n\
  \                weakSelf.ordeNoLabel.text = @\"\";\n                NSDateFormatter\
  \ *dateFormatter = [[NSDateFormatter alloc] init];\n                [dateFormatter\
  \ setDateStyle:NSDateFormatterMediumStyle];\n                [dateFormatter setTimeStyle:NSDateFormatterShortStyle];\n\
  \                weakSelf.ordeDateLabel.text = [dateFormatter stringFromDate:[NSDate\
  \ date]];\n                weakSelf.totalLabel.text = [self.order friendlyTotal];\n\
  \                [weakSelf updateUI];\n            } else {\n                [weakSelf\
  \ updateUI];\n            }\n        } else {\n            [weakSelf updateUI];\n\
  \        }\n    }];\n}\n```\n\n你有一个 `UITableView`，`UITableView` 上的商品将是订单商品。首先，将单元格高度设置得比默认值稍高一些：\n\
  \n```\n#pragma mark - UITableView 数据源\n\n-(CGFloat)tableView:(UITableView *)tableView\
  \ heightForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    return 60.0;\n}\n```\n\
  \n只会有一个分区：\n\n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\
  \ {\n    return 1;\n}\n```\n\n总的单元格数量是该订单实例中商品项的数量。\n\n```\n- (NSInteger)tableView:(UITableView\
  \ *)tableView numberOfRowsInSection:(NSInteger)section {\n    return [self.order.items\
  \ count];\n}\n```\n\n单元格本身将是 `EMABOrderItemTableViewCell` 的一个实例。你可能注意到我为这个 `configureItem:(EMABOrderItem)item`\
  \ 方法添加了一个新参数 tag。原因是你需要监听哪个 `UIStepper` 被点击。提供一个 tag 来跟踪它。tag 编号就是行号。\n\n```\n-\
  \ (EMABOrderItemTableViewCell*)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    EMABOrderItemTableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@\"\
  BagItemCell\" forIndexPath:indexPath];\n    if (self.order) [cell configureItem:self.order.items[indexPath.row]\
  \ tag:indexPath.row];\n    else [cell configureItem:nil tag:100+indexPath.row];\n\
  \    return cell;\n}\n```\n\n接下来，处理用户点击任何单元格上的 `UIStepper` 的情况。当用户点击 `UIStepper`\
  \ 时，意味着需要更改此商品项的数量。“+”表示增加 1，“-”表示减去 1。如果数量为 0，则从订单中移除该商品项。如果所有商品项的数量都为 0，则意味着需要移除所有商品项。\n\
  \n根据这个逻辑，创建此订单商品项的可变副本，然后找到你需要修改的商品项。可以通过用户点击的 `UIStepper` 的 tag 索引来找到它。\n\n然而，当用户试图将最后一件或唯一一件商品的数量减少到\
  \ 0 时，你确实想提醒用户。因此，你创建一个名为 `-(void)showDeleteAlert` 的 `UIAlertController` 辅助方法，让用户确认。如果用户确认这样做，则不仅在本地删除订单，还要在远程服务器上删除。一旦订单被移除，执行另一个查询\
  \ `-(void)queryForUnfinishedOrder` 来验证删除并更新 UI。\n\n以下是实现代码：\n\n```\n-(void)showDeleteAlert\
  \ {\n    UIAlertController* alert = [UIAlertController alertControllerWithTitle:NSLocalizedString(@\"\
  清空购物袋\",@\"\")\n        message:NSLocalizedString(@\"您确定要清空您的购物袋吗？\",@\"\")\n  \
  \      preferredStyle:UIAlertControllerStyleAlert];\n    __weak typeof(self) weakSelf\
  \ = self;\n    UIAlertAction* defaultAction = [UIAlertAction actionWithTitle:NSLocalizedString(@\"\
  是\",@\"\") style:UIAlertActionStyleDefault\n        handler:^(UIAlertAction * action)\
  \ {\n            [weakSelf.order deleteInBackgroundWithBlock:^(BOOL success, NSError\
  \ *error){\n                if (!error) {\n                    [weakSelf queryForUnfinishedOrder];\n\
  \                }\n            }];\n        }];\n    UIAlertAction* cancelAction\
  \ = [UIAlertAction actionWithTitle:NSLocalizedString(@\"取消\",@\"\") style:UIAlertActionStyleCancel\n\
  \        handler:^(UIAlertAction * action) {}];\n    [alert addAction:defaultAction];\n\
  \    [alert addAction:cancelAction];\n    [self presentViewController:alert animated:YES\
  \ completion:nil];\n}\n```\n\n以下是 `-(IBAction)onStepper` 方法——请记住，每当用户点击任何 `UIStepper`\
  \ 时，你都需要更新总金额：\n\n```\n-(IBAction)onStepper:(id)sender {\n    UIStepper *stepper\
  \ = (UIStepper *)sender;\n    NSInteger index = stepper.tag - 100;\n    NSMutableArray\
  \ *orderItems = [NSMutableArray arrayWithArray:self.order.items];\n    EMABOrderItem\
  \ *orderItem = orderItems[index];\n    orderItem.quantity = (int)stepper.value;\n\
  \    if ((int)stepper.value == 0) {\n        [orderItems removeObjectAtIndex:index];\n\
  \    } else {\n        [orderItems replaceObjectAtIndex:index withObject:orderItem];\n\
  \    }\n    if ([orderItems count] == 0) {\n        [self showDeleteAlert];\n  \
  \  } else {\n        self.order.items = [orderItems copy];\n        [self.tableView\
  \ reloadData];\n        self.totalLabel.text = [self.order friendlyTotal];\n   \
  \ }\n}\n```\n\n如果客户更改了数量但尚未结账怎么办？用户只是喜欢通过调整来探索，这很常见。客户可能会更改购物袋中的数量，然后离开购物袋界面去浏览其他商品页面。在这种情况下，请在购物袋界面即将消失时保存订单：\n\
  \n```\n-(void)viewWillDisappear:(BOOL)animated\n{\n    if (self.order && self.order.isDirty)\
  \ {\n        [self.order saveInBackground];\n    }\n}\n```\n\n这里的 `self.order.isDirty`\
  \ 表示订单已被更改。\n\n\n\n### 总结\n\n本章涵盖如何实现购物袋以及如何在处理客户及其购物习惯时，针对各种使用场景正确实现这一功能。\n\n##\
  \ 11. 送货地址\n\n电子补充材料 本章在线版本（doi:[10.​1007/​978-1-4842-1317-9_​11](http://dx.doi.org/10.1007/978-1-4842-1317-9_11)）包含补充材料，仅供授权用户使用。\n\
  \n在第 10 章中，您学习了如何实现将商品添加到购物袋、更新商品数量、从购物袋中删除商品以及更新总金额等功能。然而，为了让客户完成结账流程，您还需要收集尚未获取的额外信息：即客户的送货地址和账单地址。\n\
  \n本章介绍如何创建一个基于`UITableView`的表单来收集美国送货地址。用户界面本身可能看起来非常简单，但仍有一些技巧需要讲解。\n\n图 11-1 展示了送货地址表单的外观。\n\
  \n![A978-1-4842-1317-9_11_Fig1_HTML.jpg](img/A978-1-4842-1317-9_11_Fig1_HTML.jpg)\n\
  \n**图 11-1.** 送货地址表单\n\n### 送货地址模型\n\n本章使用的模型仍然是`EMABUser`模型，但您需要添加额外的属性：`address1`、`address2`、`city`、`state`和`zipcode`。以下是头文件：\n\
  \n**EMABUser.h**\n\n```\n@interface EMABUser : PFUser<PFSubclassing>\n\n@property\
  \ (nonatomic, copy) NSString *firstName;\n@property (nonatomic, copy) NSString *lastName;\n\
  @property (nonatomic, copy) NSString *name;\n@property (nonatomic, copy) NSString\
  \ *gender;\n@property (nonatomic, copy) NSString *phone;\n@property (nonatomic,\
  \ copy) NSString *address1;\n@property (nonatomic, copy) NSString *address2;\n@property\
  \ (nonatomic, copy) NSString *city;\n@property (nonatomic, copy) NSString *state;\n\
  @property (nonatomic, copy) NSString *zipcode;\n@property (nonatomic, copy) PFFile\
  \ *photo;\n\n@end\n```\n\n### 送货地址视图\n\n首先创建一个`UITableViewCell`的子类，并将其命名为`EMABUserProfileTableViewCell`。如您所见，该单元格上使用了`UITextField`。您还需要一个辅助方法来定制单元格的标题、`UITextField`的占位符文本以及键盘类型。\n\
  \n**EMABUserProfileTableViewCell.h**\n\n```\n@interface EMABUserProfileTableViewCell\
  \ : UITableViewCell\n\n@property (nonatomic, strong) UITextField *textField;\n\n\
  - (void)setContentForTableCellLabel:(NSString*)title placeHolder:(NSString *)placeHolder\
  \ text:(NSString *)text keyBoardType:(NSNumber *)type enabled:(BOOL)enabled;\n\n\
  @end\n```\n\n这次，您希望以编程方式将此`UITextField`添加为该`UITableViewCell`的附属视图。该单元格仍通过 xib 文件进行设置。因此，您需要调用不同的实例化方法`-(instancetype)initWithCoder:(NSCode\
  \ *)aDecorder`，如下代码所示。\n\n请记住，您使用了一个常量值来定位此`UITextField`。这对于不同的 iPhone 屏幕尺寸来说效果不佳。由于本书的重点是业务逻辑而非用户界面，因此此实现可能无法适配所有\
  \ iPhone 屏幕尺寸。\n\n以下是实例化方法：\n\n**EMABUserProfileTableViewCell.m**\n\n```\n@implementation\
  \ EMABUserProfileTableViewCell\n\n-(instancetype)initWithCoder:(NSCoder *)aDecoder\n\
  {\n    self = [super initWithCoder:aDecoder];\n    if (self) {\n        self.textLabel.font\
  \ = [UIFont boldSystemFontOfSize:14.0];\n        CGRect frame = CGRectMake(100,\
  \ kTopMargin, 210.0, kTextFieldHeight);\n        self.textField = [[UITextField\
  \ alloc] initWithFrame:frame];\n        self.textField.borderStyle = UITextBorderStyleNone;\n\
  \        self.textField.textColor = [UIColor blackColor];\n        self.textField.font\
  \ = [UIFont systemFontOfSize:13.0];\n        self.textField.textAlignment = NSTextAlignmentRight;\n\
  \        self.textField.contentVerticalAlignment = UIControlContentVerticalAlignmentCenter;\n\
  \        self.textField.enabled = NO;\n        self.textField.backgroundColor =\
  \ [UIColor clearColor];\n        self.textField.autocorrectionType = UITextAutocorrectionTypeNo;\
  \    // 无自动更正支持\n        self.textField.autocapitalizationType = UITextAutocapitalizationTypeWords;\n\
  \        self.textField.returnKeyType = UIReturnKeyDone;\n        self.textField.clearButtonMode\
  \ = UITextFieldViewModeWhileEditing;  // 右侧有清除按钮 'x'\n        self.accessoryView\
  \ = self.textField;\n        self.selectionStyle = UITableViewCellSelectionStyleNone;\n\
  \    }\n    return self;\n}\n```\n\n辅助方法`-(void)setContentForTableCellLabel:(NSString*)title\
  \ placeHolder:(NSString *)placeHolder :(NSString *)text keyBoardType:(NSNumber *)type\
  \ enabled:(BOOL)enabled`用于通过动态内容定制每个单元格。以下是其实现：\n\n```\n- (void)setContentForTableCellLabel:(NSString*)title\
  \ placeHolder:(NSString *)placeHolder :(NSString *)text keyBoardType:(NSNumber *)type\
  \ enabled:(BOOL)enabled\n{\n    self.textLabel.text = title;\n    self.textField.text\
  \ = text;\n    self.textField.placeholder = placeHolder;\n    self.textField.keyboardType\
  \ = [type intValue];\n    self.textField.layer.cornerRadius = 4.0f;\n    self.textField.layer.masksToBounds\
  \ = YES;\n    self.textField.layer.borderColor = (enabled)?[[UIColor colorWithRed:0.0\
  \ green:153.0/255.0 blue:204.0/255.0 alpha:1] CGColor ]:[[UIColor clearColor] CGColor];\n\
  \    self.textField.layer.borderWidth = 1.0f;\n    self.textField.enabled = enabled;\n\
  }\n\n@end\n```\n\n这段代码还为`UITextField`添加了边框，如图 11-1 所示。\n\n\n\n### 配送地址控制器\n\n在 Xcode\
  \ 中，创建一个新的 `UITableViewController`，并将其命名为 `EMABUserProfileTableViewController`。\n\
  \n`EMABUserInfoViewController.m`：\n\n```objc\n#import \"EMABUserProfileTableViewController.h\"\
  \n#import \"EMABUserProfileTableViewCell.h\"\n#import \"EMABUser.h\"\n\nstatic NSString\
  \ *kTitleKey = @\"titleKey\";\nstatic NSString *kPlaceholderKey = @\"placeholderKey\"\
  ;\nstatic NSString *kKeyboardKey = @\"keyboardTypeKey\";\n\n@interface EMABUserProfileTableViewController\
  \ ()<UITextFieldDelegate>\n@property (nonatomic, strong) NSArray *dataSourceArray;\n\
  @property (nonatomic, strong) EMABUser *customer;\n@end\n```\n\n在这个 `UITableView`\
  \ 中，有九个静态的 `UITableViewCell`；也就是说，这些单元格的标题是固定的，每个单元格中 `UITextField` 的占位符文本也是固定的。为了避免在每个单元格中硬编码这些内容，可以使用一个\
  \ `NSArray` 来存放所有内容，并动态地分配给每个单元格。这个 `NSArray` 中的每个元素都是一个 `NSDictionary`。每个字典有三个键。这就是为什么在\
  \ `static NSString` 中定义了 `kTitleKey`、`kPlaceholderKey` 和 `kKeyboardKey` 这些常量。\n\n\
  你还定义了一个名为 `customer` 的 `EMABUser` 属性。你需要用它来跟踪用户的输入，并与该用户保持一致。\n\n由于每个单元格上都有一个 `UITextField`，你需要在接口类别中声明\
  \ `UITextFieldDelegate`：\n\n```objc\n@interface EMABUserProfileTableViewController\
  \ ()<UITextFieldDelegate>\n```\n\n`EMABUserProfileTableViewController.m`：\n\n```objc\n\
  @implementation EMABUserProfileTableViewController\n\n- (void)viewDidLoad {\n  \
  \  [super viewDidLoad];\n    self.dataSourceArray = @[\n        @{\n           \
  \ kTitleKey:NSLocalizedString(@\"First Name*\", @\"名字(必填)\"),\n            kPlaceholderKey:NSLocalizedString(@\"\
  First Name\", @\"名字\"),\n            kKeyboardKey:@(UIKeyboardTypeNamePhonePad)},\n\
  \        @{\n            kTitleKey:NSLocalizedString(@\"Last Name*\",@\"\"),\n \
  \           kPlaceholderKey:NSLocalizedString(@\"Last Name\",@\"姓氏\"),\n       \
  \     kKeyboardKey:@(UIKeyboardTypeNamePhonePad)},\n        @{\n            kTitleKey:NSLocalizedString(@\"\
  Phone*\",@\"\"),\n            kPlaceholderKey:@\"555-555-5555\",\n            kKeyboardKey:@(UIKeyboardTypePhonePad)},\n\
  \        @{\n            kTitleKey:NSLocalizedString(@\"Email*\",@\"\"),\n     \
  \       kPlaceholderKey:@\"Email\",\n            kKeyboardKey:@(UIKeyboardTypeEmailAddress)},\n\
  \        @{\n            kTitleKey:NSLocalizedString(@\"Address 1*\",@\"\"),\n \
  \           kPlaceholderKey:@\"地址 1\",\n            kKeyboardKey:@(UIKeyboardTypeDefault)},\n\
  \        @{\n            kTitleKey:NSLocalizedString(@\"Address 2\",@\"\"),\n  \
  \          kPlaceholderKey:@\"地址 2\",\n            kKeyboardKey:@(UIKeyboardTypeDefault)},\n\
  \        @{\n            kTitleKey:NSLocalizedString(@\"City*\",@\"\"),\n      \
  \      kPlaceholderKey:NSLocalizedString(@\"City\",@\"城市\"),\n            kKeyboardKey:@(UIKeyboardTypeDefault)},\n\
  \        @{\n            kTitleKey:NSLocalizedString(@\"State*\",@\"\"),\n     \
  \       kPlaceholderKey:NSLocalizedString(@\"State\",@\"州/省\"),\n            kKeyboardKey:@(UIKeyboardTypeDefault)},\n\
  \        @{\n            kTitleKey:NSLocalizedString(@\"Zipcode*\",@\"\"),\n   \
  \         kPlaceholderKey:@\"#####\",\n            kKeyboardKey:@(UIKeyboardTypeNumberPad)}\n\
  \    ];\n    self.customer = [EMABUser currentUser];\n}\n```\n\n设置好数据源后，你可以向 `UITableView`\
  \ 添加一些实际数据。这里有一个分区，九个单元格——也就是 `dataSourceArray` 的大小。\n\n```objc\n#pragma mark -\
  \ Table view data source\n\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
  \ *)tableView {\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView\
  \ numberOfRowsInSection:(NSInteger)section {\n    return [self.dataSourceArray count];\n\
  }\n\n- (EMABUserProfileTableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    EMABUserProfileTableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@\"\
  customerProfile\" forIndexPath:indexPath];\n    NSInteger row = indexPath.row;\n\
  \    cell.textField.delegate = self;\n    cell.textField.tag = 100 + row;\n    NSString\
  \ *text = @\"\";\n    switch (row) {\n        case 0:\n            text = self.customer.firstName;\n\
  \            break;\n        case 1:\n            text = self.customer.lastName;\n\
  \            break;\n        case 2:\n            text = self.customer.phone;\n\
  \            break;\n        case 3:\n            text = self.customer.email;\n\
  \            break;\n        case 4:\n            text = self.customer.address1;\n\
  \            break;\n        case 5:\n            text = self.customer.address2;\n\
  \            break;\n        case 6:\n            text = self.customer.city;\n \
  \           break;\n        case 7:\n            text = self.customer.state;\n```\n\
  \n\n```objectivec\nbreak;\ncase 8:\n    text = self.customer.zipcode;\n    break;\n\
  default:\n    break;\n}\nNSString *title = self.dataSourceArray[row][kTitleKey];\n\
  NSString *placeholder = self.dataSourceArray[row][kPlaceholderKey];\nNSNumber *keyboardType\
  \ = self.dataSourceArray[row][kKeyboardKey];\n[cell setContentForTableCellLabel:title\
  \ placeHolder:placeholder text:text keyBoardType:keyboardType enabled:self.isEditing];\n\
  return cell;\n}\n```\n\n对于每个单元格，`UITextField` 的文本应该为空，因为用户尚未输入任何内容。你可能还需要提供一个选项，让用户在输入所有信息后可以编辑其地址。换句话说，你将在其他场合复用`EMABUserProfileViewController`。这就是为什么你让每个`UITextField`的文本与`EMABUser`模型中的一个地址属性相对应。\n\
  \n你还会给每个`UITextField`分配一个标签（tag），以便日后能够确定正在使用的是哪个`UITextField`。\n\n最后，使用`EMABUserProfileTableViewCell`的辅助方法自定义每个单元格。\n\
  \n接下来，实现`UITextField`的委托方法。\n\n```objectivec\n#pragma mark - UITextField Delegate\
  \ methods\n\n- (BOOL)textFieldShouldBeginEditing:(UITextField *)textField\n{\n \
  \   return YES;\n}\n\n- (BOOL)textFieldShouldEndEditing:(UITextField *)textField\n\
  {\n    switch (textField.tag) {\n        case 100:\n            self.customer.firstName\
  \ = textField.text;\n            break;\n        case 101:\n            self.customer.lastName\
  \ = textField.text;\n            break;\n        case 102:\n            self.customer.phone\
  \ = textField.text;\n            break;\n        case 103:\n            self.customer.email\
  \ = textField.text;\n            break;\n        case 104:\n            self.customer.address1\
  \ = textField.text;\n            break;\n        case 105:\n            self.customer.address2\
  \ = textField.text;\n            break;\n        case 106:\n            self.customer.city\
  \ = textField.text;\n            break;\n        case 107:\n            self.customer.state\
  \ = textField.text;\n            break;\n        case 108:\n            self.customer.zipcode\
  \ = textField.text;\n            break;\n        default:\n            break;\n\
  \    }\n    [textField resignFirstResponder];\n    return YES;\n}\n\n- (BOOL)textFieldShouldReturn:(UITextField\
  \ *)textField\n{\n    [textField resignFirstResponder];\n    return YES;\n}\n```\n\
  \n`-(BOOL)textFieldShouldEndEditing:(UITextField *)textField`这个方法很重要。一旦用户完成一个单元格的输入，你需要将信息发送给这个用户实例。当有更多单元格，并且用户需要上下滚动来填写内容时，这样做的原因会更加明显。\n\
  \n如你所见，在`UINavigationBar`上设置了一个“完成”栏按钮项。当用户点击“完成”时，用户输入的所有内容都会被保存，并且屏幕会被关闭。但如果用户实际上没有输入任何内容，或者提供的信息不够完整，该怎么办？让我们做一点检查。\n\
  \n你需要在`EMABUser`模型的头文件中声明一个辅助方法：\n\n```objectivec\n-(BOOL)isShippingAddressCompleted;\n\
  ```\n\n以下是实现：\n\n```objectivec\n-(BOOL)isShippingAddressCompleted{\n    BOOL cont0\
  \ = self.firstName && self.lastName && [self.firstName length] > 0 && [self.lastName\
  \ length] > 0;\n    BOOL cont1 = self.address1 && [self.address1 length] > 0;\n\
  \    BOOL cont2 = self.city && [self.city length] > 0;\n    BOOL cont3 = self.state\
  \ && [self.state length] > 0;\n    BOOL cont4 = self.zipcode && [self.zipcode length]>\
  \ 0;\n    return cont0 && cont1 && cont1 && cont2 && cont3 && cont4;\n}\n```\n\n\
  现在，当用户点击“完成”时，你可以使用这个辅助方法。如果你认为所有信息都已提供，则保存用户信息。如果没有，则显示一个警告，通知用户需要提供更多信息。\n\n```objectivec\n\
  -(IBAction)onDone:(id)sender\n{\n    [self.tableView.superview endEditing:YES];\n\
  \    if ([self.customer isShippingAddressCompleted]) {\n        __weak typeof(self)\
  \ weakSelf = self;\n        [self.customer saveInBackgroundWithBlock:^(BOOL succeeded,\
  \ NSError *error) {\n            if (!error) {\n                [weakSelf.navigationController\
  \ popViewControllerAnimated:YES];\n            }\n        }];\n    } else {\n  \
  \      [SVProgressHUD showErrorWithStatus:NSLocalizedString(@\"请完成带 * 号标记的必填信息\"\
  ,@\"\")];\n    }\n}\n```\n\n当然，你也提供了一个栏按钮项，让用户跳过这个屏幕。\n\n```objectivec\n-(void)onCancel:(id)sender\n\
  {\n    [self.navigationController popViewControllerAnimated:YES];\n}\n```\n\n这就是`EMABUserProfileViewController`的全部内容。回到`EMABBagsTableViewController`。当用户点击“使用信用卡支付”时，我们会检查用户是否拥有完整的送货地址：\n\
  \n```objectivec\n-(IBAction)onPayWithCreditCard:(id)sender{\n    if ([[EMABUser\
  \ currentUser] isShippingAddressCompleted]) {\n        //待处理\n    } else {\n   \
  \     EMABUserProfileTableViewController *viewController = [self.storyboard instantiateViewControllerWithIdentifier:@\"\
  EMABUserProfileTableViewController\"];\n        [self.navigationController pushViewController:viewController\
  \ animated:YES];\n    }\n}\n```\n\n如果送货地址不完整，则会显示`EMABUserProfileTableViewController`。如果地址完整（`YES`），那么你将请求用户的信用卡信息——这将在下一章中介绍。\n\
  \n### 总结\n\n在本章中，我介绍了如何使用`UITableView`实现一个用于收集用户地址的表单。我利用了`UITableView`的滚动特性，使得`UITableViewCell`可以移动到屏幕顶部，这样用户的\
  \ iPhone 软键盘就不会遮挡内容。我还为不同的地址部分考虑了不同的键盘类型，以方便输入。当然，还有其他方法可以达到同样的目的。但我认为我在这里的方法更简单。\n\
  \n## 12. 使用信用卡支付\n\n电子补充材料 本章的在线版本 (doi:[10.​1007/​978-1-4842-1317-9_​12](http://dx.doi.org/10.1007/978-1-4842-1317-9_12))\
  \ 包含补充材料，仅供授权用户使用。\n\n在上一章中，我讨论了在结账前获取用户的送货地址。在本章中，我将介绍用户如何使用信用卡支付。对于这个应用，你将使用 Stripe\
  \ iOS SDK 来简化流程。要集成 Stripe iOS SDK，你需要更新你的 Cocoapods Podfile，添加以下两行：\n\n```ruby\n\
  pod 'Stripe'\npod 'Stripe/ApplePay'\n```\n\n然后运行“`Pod update`”。\n\n\n### 支付模型\n\n\
  你需要为用户信用卡创建一个新的 `PFObject` 模型。建议将其命名为 `EMABPaymentMethod`，而非 `EMABCreditCard`，因为未来你可能需要集成\
  \ PayPal 等其他支付方式。记得在 `EMABConstants` 类中注册一个 `NSString` 常量，并在 `AppDelegate` 类中注册该模型。\n\
  \n在此模型类中，你需要定义以下属性：支付方式的所有者、信用卡类型、信用卡后四位数字、到期月份和年份，以及`Stripe Customer ID`。`Stripe\
  \ Customer ID`属性是必需的，通过它你可以请求 Stripe 对信用卡进行实际扣款；同时，借助该属性，你还能在无需用户重复输入信息的情况下，对同一客户进行后续扣款。\n\
  \n此外，你还需要一些辅助方法，例如格式化信用卡后四位数字、到期月份和年份，以及信用卡类型（Visa、Master Card 等）。\n\n要获取某位客户的所有信用卡，你需要执行一次查询。参照之前的做法，你需要实现\
  \ `+(PFQuery *)basicQuery` 方法和 `+(PFQuery *)queryForOwner: (EMABUser *)owner` 方法。\n\
  \n以下是头文件：\n\n`EMABPaymentMethod.h`\n\n```\n#import <Parse/Parse.h>\n#import \"Stripe.h\"\
  \n\n@class EMABUser;\n\n@interface EMABPaymentMethod : PFObject<PFSubclassing>\n\
  \n@property (nonatomic, copy) NSString *type;\n@property (nonatomic, copy) NSString\
  \ *stripeCustomerId;\n@property (nonatomic, copy) NSString *lastFourDigit;\n@property\
  \ (nonatomic, assign) NSUInteger_t expirationMonth;\n@property (nonatomic, assign)\
  \ NSUInteger _t expirationYear;\n@property (nonatomic, strong) EMABUser *owner;\n\
  \n-(NSString *)friendlyCreditCardNumber;\n-(NSString *)friendlyExpirationMonthYear;\n\
  +(PFQuery *)basicQuery;\n+(PFQuery *)queryForOwner:(EMABUser *)owner;\n-(NSString\
  \ *)friendlyType:(STPCardBrand)brand;\n\n@end\n```\n\n以下是实现文件：\n\n`EMABPaymentMethod.m`\n\
  \n```\n#import \"EMABPaymentMethod.h\"\n#import <Parse/PFObject+Subclass.h>\n#import\
  \ \"EMABUser.h\"\n#import \"EMABConstants.h\"\n\n@implementation EMABPaymentMethod\n\
  \n@dynamic type,lastFourDigit, expirationMonth, expirationYear,stripeCustomerId,\
  \ owner;\n\n+(NSString *)parseClassName\n{\n    return kPaymentMethod;\n}\n\n-(NSString\
  \ *)friendlyCreditCardNumber{\n    return  [NSString stringWithFormat:@\"####-####-####-%@\"\
  ,self. lastFourDigit];\n}\n\n-(NSString *)friendlyExpirationMonthYear{\n    return\
  \ [NSString stringWithFormat:@\"%lld/%lld\",self.expirationMonth, self.expirationYear];\n\
  }\n\n+(PFQuery *)basicQuery{\n    PFQuery *query = [PFQuery queryWithClassName:[self\
  \ parseClassName]];\n    [query orderByDescending:@\"createdAt\"];\n    return query;\n\
  }\n\n+(PFQuery *)queryForOwner:(EMABUser *)owner{\n    PFQuery *query = [self basicQuery];\n\
  \    [query whereKey:@\"owner\" equalTo:owner];\n    return query;\n}\n\n-(NSString\
  \ *)friendlyType:(STPCardBrand)brand{\n    NSString *title = @\"\";\n    switch\
  \ (brand) {\n        case STPCardBrandVisa:\n            title = @\"Visa\";\n  \
  \          break;\n        case STPCardBrandAmex:\n            title = @\"American\
  \ Express\";\n            break;\n        case STPCardBrandMasterCard:\n       \
  \     title = @\"MasterCard\";\n            break;\n        case STPCardBrandDiscover:\n\
  \            title = @\"Discover\";\n            break;\n        case STPCardBrandJCB:\n\
  \            title = @\"JCB\";\n            break;\n        case STPCardBrandDinersClub:\n\
  \            title = @\"Dinner Club\";\n            break;\n        default:\n \
  \           title = @\"Unknown\";\n            break;\n    }\n    return title;\n\
  }\n\n@end\n```\n\n在上述实现中，对于辅助方法 `-(NSString *)friendlyCreditCardNumber`，更好的做法是使其基于不同信用卡类型进行格式化。例如，美国运通信用卡通常为\
  \ 15 位数字，而非 16 位。\n\n### 支付视图\n\nStripe iOS SDK 的示例代码提供了一个 `PKView`，你需要将其包含在项目中。它并非\
  \ Stripe iOS SDK 的组成部分。图 12-1 展示了它的外观。\n\n![A978-1-4842-1317-9_12_Fig1_HTML.jpg](img/A978-1-4842-1317-9_12_Fig1_HTML.jpg)\n\
  \n图 12-1 `PKView`\n\n\n\n### 支付控制器\n\n接下来，创建一个新的 `UIViewController` 子类 `EMABAddCreditCardViewController`。当此视图控制器从\
  \ `EMABBagTableViewController` 中被呈现时，你需要让该控制器将 Stripe 客户 ID 传回给 `EMABBagTableViewController`，以便能够从客户的信用卡扣款。\n\
  \n为了帮助两个控制器之间传递数据，你可以使用委托或闭包方法。闭包是首选方式，因为它能使代码既简单又易读。\n\n以下是 `EMABAddCreditCardViewController`\
  \ 的头文件：\n\n`EMABAddCreditCardViewController.h`\n\n```\n#import <UIKit/UIKit.h>\n\
  \n@class EMABAddCreditCardViewController;\n\ntypedef void (^AddCreditCardViewControllerDidFinish)(NSString\
  \ *customerId);\n\n@interface EMABAddCreditCardViewController : UIViewController\n\
  \n@property (nonatomic, copy) AddCreditCardViewControllerDidFinish finishBlock;\n\
  \n@end\n```\n\n在实现文件中，你希望充分利用 `PTKView`。其中一个重要特性是该 `PTKView` 的委托方法。我们在 `EMABAddCreditCardViewController`\
  \ 的分类接口中声明了这个委托。\n\n`EMABAddCreditCardViewController.m`\n\n```\n#import \"EMABAddCreditCardViewController.h\"\
  \n#import \"Stripe.h\"\n#import \"PTKView.h\"\n#import \"EMABUser.h\"\n#import \"\
  EMABPaymentMethod.h\"\n\n@interface EMABAddCreditCardViewController ()<PTKViewDelegate>\n\
  \n@property (nonatomic, weak) IBOutlet PTKView *paymentView;\n\n@end\n```\n\n你还需要一个条形按钮项作为这个\
  \ `UINavigationItem` 的右侧按钮；将其标题设置为“授权”。如果用户尚未完成信用卡信息的输入，则应禁用该条形按钮项。另一方面，启用此按钮，使用户可以点击以再次通过\
  \ Stripe 服务器授权信用卡信息。以下两个方法用于此目的：\n\n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\
  \    self.navigationItem.leftBarButtonItem = [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemCancel\
  \ target:self action:@selector(onCancel:)];\n    self.navigationItem.rightBarButtonItem\
  \ = [[UIBarButtonItem alloc] initWithTitle:NSLocalizedString(@\"Authorize\", @\"\
  \") style:UIBarButtonItemStylePlain target:self action:@selector(onAuthorize:)];\n\
  }\n\n- (void)paymentView:(PTKView *)paymentView withCard:(PTKCard *)card isValid:(BOOL)valid\
  \ {\n    // 如果结账信息有效，则启用保存按钮\n    self.navigationItem.rightBarButtonItem.enabled\
  \ = valid;\n}\n```\n\n接下来，实现 `onAuthorize:` 方法。逻辑如下。从 `PTKView` 中获取信用卡号和有效期，然后将这些信息发送到\
  \ Stripe 进行验证。如果信用卡信息有效，Stripe 将返回一个令牌。在典型情况下，你可以直接使用此令牌对信用卡扣款。如果将来希望再次对同一张信用卡扣款，可以将该令牌保存到\
  \ Parse 后端服务器。\n\n通常，存储令牌既安全又方便。然而，最好将每一笔扣款关联到一个 `Stripe` 客户对象。出于这个原因，在授权信用卡时，你请求的是\
  \ Stripe 客户 ID 而非令牌；这样你就可以将此客户 ID 保存到 Parse，并将来使用该 ID 对此信用卡重复扣款。在 Parse 后端，任何访问你控制台的人都只会看到一个客户\
  \ ID，而不会看到扣款令牌。我认为这种方法更优。\n\n但是如何创建 Stripe 客户 ID 呢？你可以使用 Parse Cloud 函数。我将在第 14\
  \ 章中详细介绍 Parse Cloud 函数；现在，我先假设有一个名为 `createStripeCustomer` 的云函数已经实现好了；所以现在就直接用它吧。\n\
  \n以下是你操作的流程：\n\n1.  根据用户的信用卡信息，调用 Stripe API 获取该信用卡的 Stripe 令牌。\n2.  基于 Stripe 令牌，调用你的\
  \ Parse Cloud 函数来获取一个 Stripe 客户 ID。\n3.  根据用户信用卡的部分信息，以及你在步骤 2 中收到的 Stripe 客户 ID，创建一个\
  \ `EMABPayment` 实例；将信用卡最后四位数字、到期月份和年份以及 Stripe 客户 ID 映射到实例属性中。将此实例保存到 Parse。\n4.\
  \  保存成功后，离开此界面并返回 `EMABBagViewController`，同时携带 Stripe 客户 ID，然后使用此 ID 对信用卡扣款。\n\n\
  以下是完整的代码：\n\n```\n- (void)onAuthorize:(id)sender {\n    if (![self.paymentView isValid])\
  \ {\n        return;\n    }\n\n    STPCard *card = [[STPCard alloc] init];\n   \
  \ card.number = self.paymentView.card.number;\n    card.expMonth = self.paymentView.card.expMonth;\n\
  \    card.expYear = self.paymentView.card.expYear;\n    card.cvc = self.paymentView.card.cvc;\n\
  \n    [[STPAPIClient sharedClient] createTokenWithCard:card\n        completion:^(STPToken\
  \ *token, NSError *error) {\n            if (error) {\n            } else {\n  \
  \              EMABUser *user = [EMABUser currentUser];\n                NSDictionary\
  \ *stripeCustomerDictionary = @{@\"tokenId\":token.tokenId,\n                  \
  \                                         @\"customerEmail\":user.email\n      \
  \                                                     };\n                [PFCloud\
  \ callFunctionInBackground:@\"createStripeCustomer\"\n                         \
  \          withParameters:stripeCustomerDictionary\n                           \
  \                block:^(NSString *customerId, NSError *error) {\n             \
  \       if (!error) {\n                        EMABPaymentMethod *creditCard = [EMABPaymentMethod\
  \ object];\n                        creditCard.owner = user;\n                 \
  \       creditCard.stripeCustomerId = customerId;\n                        creditCard.expirationMonth\
  \ = card.expMonth;\n                        creditCard.expirationYear = card.expYear;\n\
  \                        creditCard.type = [creditCard friendlyType:card.brand];\n\
  \                        creditCard.lastFourDigit = card.last4;\n              \
  \          creditCard.stripeCustomerId = customerId;\n                        [creditCard\
  \ saveInBackgroundWithBlock:^(BOOL succeeded, NSError *error) {\n              \
  \              if (!error) {\n                                [self readyToCharge:customerId];\n\
  \                            }\n                        }];\n                  \
  \  } else {\n                    }\n                }];\n            }\n       \
  \ }];\n}\n\n-(void)readyToCharge:(NSString *)customerId {\n    [self dismissViewControllerAnimated:YES\
  \ completion:^{\n        self.finishBlock(self, customerId);\n    }];\n}\n```\n\n\
  你还需要提供一个“取消”条形按钮项，以便用户可以跳过此界面：\n\n```\n- (void)onCancel:(id)sender {\n    [self.navigationController\
  \ popViewControllerAnimated:YES];\n}\n```\n\n基本上，这就是 `EMABAddCreditCardViewController`\
  \ 的全部内容。\n\n`EMABBagsTableViewController` 中还有一些工作要做。用户点击“用信用卡购买”后，你检查是否有配送地址。如果没有，则弹出\
  \ `EMABUserProfileTableViewController`。如果有，则需要弹出 `EMABAddCreditCardViewController`。以下是代码：\n\
  \n```\n-(IBAction)onPayWithCreditCard:(id)sender{\n    if ([[EMABUser currentUser]\
  \ isShippingAddressCompleted]) {\n        EMABAddCreditCardViewController *viewController\
  \ = (EMABAddCreditCardViewController *)[self.storyboard instantiateViewControllerWithIdentifier:@\"\
  EMABAddCreditCardViewController\"];\n        __weak typeof(self) weakSelf = self;\n\
  \        viewController.finishBlock = ^(NSString *customerId){\n            [weakSelf\
  \ charge:customerId];\n        };\n        [self.navigationController pushViewController:viewController\
  \ animated:YES];\n    } else {\n        EMABUserProfileTableViewController *viewController\
  \ = [self.storyboard instantiateViewControllerWithIdentifier:@\"EMABUserProfileTableViewController\"\
  ];\n        [self.navigationController pushViewController:viewController animated:YES];\n\
  \    }\n}\n```\n\n你可能已经注意到 `charge:` 方法尚未实现。我将在下一章中介绍这个实现。\n\n### 总结\n\n在本章中，我展示了如何集成\
  \ Stripe iOS SDK 来收集用户的信用卡信息、授权扣款、请求 Stripe 客户 ID，并将该 ID 保存到 Parse。我还讨论了如何根据用户是否已填写配送地址来展示不同的视图控制器。\n\
  \n\n\n## 13. 使用 Apple Pay 付款\n\n电子补充材料 本章在线版（doi:`10.​1007/​978-1-4842-1317-9_​13`<http://dx.doi.org/10.1007/978-1-4842-1317-9_​13>）包含仅供授权用户使用的补充材料。\n\
  \n作为 iOS 开发者，你可能已经听说过 Apple Pay。Apple Pay 允许 iPhone 用户通过其手机完成购物付款。对于开发者而言，在应用中集成\
  \ Apple Pay 能带来诸多显著优势。例如，你的客户无需输入信用卡号、有效期和 CVC 安全码，某些情况下也无需在购买前填写收货地址和账单地址。这些都意味着更快捷、更便利的结账流程。另一个好处是，这被公认为处理信用卡扣款更安全的方式。本章将演示如何实现“通过\
  \ Apple Pay 和 Stripe 付款”的功能。\n\n### Apple Pay 概述\n\n事实上，Apple Pay 只负责整个扣款流程中的部分环节。具体而言，Apple\
  \ Pay 完成了以下事项：\n\n-   验证用户（即 iPhone 持有者或信用卡持有人）的身份。\n-   通过用户界面展示其购买的商品。\n-   向你（开发者）提供用户的收货地址和账单地址。\n\
  -   向你（开发者）提供一个令牌，以便你将其兑换给真实的支付处理商，例如 Stripe。\n\n注意：要更深入了解 Apple Pay 的工作原理，请参考[`https://developer.apple.com/apple-pay/Getting-Started-with-Apple-Pay.pdf`](https://developer.apple.com/apple-pay/Getting-Started-with-Apple-Pay.pdf)。\n\
  \n\n\n### Apple Pay 与 Stripe\n\n**注意**：要使用 Apple Pay，你需要在 Xcode 中为应用添加“Apple Pay”功能。这首先需要你在\
  \ Apple 处创建一个商户 ID。你可以通过教程[`https://stripe.com/docs/mobile/apple-pay`](https://stripe.com/docs/mobile/apple-pay)了解更多流程。\n\
  \n在第 12 章中，我展示了如何将 Stripe/ApplePay CocoaPod 添加到你的项目中。在设置好商户 ID 和“Apple Pay”功能后，你就可以充分利用\
  \ Stripe Apple Pay SDK 所提供的功能。具体步骤如下：\n\n-   生成一个 `PKPaymentRequest` 以提交给 Apple。\n\
  -   将 `paymentSummaryItems` 属性设置为一个由 `PKPaymentSummaryItem` 组成的 `NSArray`。这些类似于收据上的明细行，用于向用户解释我们的收费项目。\n\
  -   创建请求后，查询设备以确认 Apple Pay 是否可用（即，应用是否运行在最新的硬件上，且用户已添加有效的信用卡）。\n-   创建并显示支付请求视图控制器。\n\
  -   在支付请求控制器返回 `PKPayment` 后，你可以通过一个简单的方法调用将其转换为单次使用的 Stripe 令牌。\n-   收到 Stripe\
  \ 令牌后，调用 Parse Cloud Function 进行实际收费。实际的收费将由我们的后端处理，就像我们使用信用卡支付一样。\n\n如你所见，使用信用卡支付与使用\
  \ Apple Pay 支付的区别在于，处理 Apple Pay 支付时，你无需创建 `EMABPayment` 实例并保存它——用户设备上的 Apple Pay\
  \ 已存储了信用卡信息。另一个好处是，你无需询问用户的收货地址；你可以直接从支付请求中获取。\n\n以下是实现方法，假设你已通过 Apple Developer\
  \ 门户注册了一个商户 ID。\n\n用我们的 `EMABConstants` 类记下你的商户 ID，并将其命名为 `kAppleMerchantID`。接下来，创建一个属性来跟踪\
  \ `PKPaymentRequest`。\n\n```\n@property (nonatomic, strong) PKPaymentRequest *paymentRequest;\n\
  ```\n\n如前所述，你需要使用 Apple 的 `PKPaymentAuthorizationViewController`。这个视图控制器有一些需要你实现的代理方法，因此请声明如下：\n\
  \n```\n@interface EMABBagTableViewController()<PKPaymentAuthorizationViewControllerDelegate>\n\
  ```\n\n此外，为了显示用户正在购买的商品，你需要设置符合 `PKPaymentAuthorizationViewController` API `PKPaymentSummaryItem`\
  \ 的商品列表。换句话说，你需要将我们的 `EMABOrderItem` 转换为 `PKPaymentSummaryItem`。以下是实现这一转换的辅助方法：\n\
  \n```\n- (NSArray *)summaryItemsForShippingMethod:(PKShippingMethod *)shippingMethod\
  \ {\n    NSMutableArray *purchasedItems = [NSMutableArray arrayWithCapacity:[self.order.items\
  \ count]];\n    for (EMABOrderItem *item in self.order.items) {\n        double\
  \ total = item.quantity * item.product.unitPrice;\n        NSString *readable =\
  \ [NSString stringWithFormat:@\"%.2f\",total];\n        NSDecimalNumber *price =\
  \ [NSDecimalNumber decimalNumberWithString:readable];\n        PKPaymentSummaryItem\
  \ *purchasedItem = [PKPaymentSummaryItem summaryItemWithLabel:item.product.name\
  \ amount:price];\n        [purchasedItems addObject:purchasedItem];\n    }\n   \
  \ return [NSArray arrayWithArray:purchasedItems];\n}\n```\n\n基本上，你创建一个可变数组，遍历 `EMABOrderItem`，并根据\
  \ `EMABOrderItem` 的实例实例化 `PKPaymentSummaryItem`。最后，返回该容器数组的不可变副本。\n\n请仔细看下面两行代码：\n\
  \n```\nNSString *readable = [NSString stringWithFormat:@\"%.2f\",total];\nNSDecimalNumber\
  \ *price = [NSDecimalNumber decimalNumberWithString:readable];\n```\n\n这绝对不是表示货币金额的最佳方式，因为通常货币金额只有两位尾数。Apple\
  \ Pay API 推荐的做法是：\n\n```\nNSDecimalNumber *price = [NSDecimalNumber decimalNumberWithMantissa:total\
  \ exponent:-2 isNegative:NO];\n```\n\n在初始化 `PKPaymentRequest` 之前，你需要知道用户的 iPhone\
  \ 是否已配置为使用 Apple Pay 支付。幸运的是，Stripe 为你提供了一个便捷方法：`-(BOOL) canSubmitPaymentRequest`。如果是，则继续执行；如果不是，则需要优雅地向用户报告。\n\
  \n你还需要获取用户的收货地址，以便邮寄包裹。`PKPaymentRequest` 有一个方法 `setRequiredShippingAddressFields:PKAddressFieldPostalAddress`\
  \ 用于此目的。\n\n以下是代码：\n\n```\n-(IBAction)onApplePay:(id)sender{\n    NSString *merchantId\
  \ = kAppleMerchantID;\n    self.paymentRequest = [Stripe paymentRequestWithMerchantIdentifier:merchantId];\n\
  \    if ([Stripe canSubmitPaymentRequest:self.paymentRequest]) {\n        [self.paymentRequest\
  \ setRequiredShippingAddressFields:PKAddressFieldPostalAddress];\n        [self.paymentRequest\
  \ setRequiredBillingAddressFields:PKAddressFieldPostalAddress];\n        self.paymentRequest.paymentSummaryItems\
  \ = [self summaryItemsForShippingMethod:nil];\n        PKPaymentAuthorizationViewController\
  \ *auth = [[PKPaymentAuthorizationViewController alloc] initWithPaymentRequest:self.paymentRequest];\n\
  \        auth.delegate = self;\n        if (auth) {\n            [self presentViewController:auth\
  \ animated:YES completion:nil];\n        } else\n            [SVProgressHUD showErrorWithStatus:NSLocalizedString(@\"\
  Something Wrong\", @\"Something Wrong\")];\n    } else {\n        [SVProgressHUD\
  \ showErrorWithStatus:NSLocalizedString(@\"Apple Pay is not enabled. Please enable\
  \ your Apple Pay or Pay with Credit Card.\", @\"\")];\n    }\n}\n```\n\n接下来，展示 `PKPaymentAuthorizationViewController`。用户点击支付。点击后会发生什么？以下是实现视图控制器代理方法的方式：\n\
  \n```\n-(void)paymentAuthorizationViewController:(nonnull PKPaymentAuthorizationViewController\
  \ *)controller didAuthorizePayment:(nonnull PKPayment *)payment completion:(nonnull\
  \ void (^)(PKPaymentAuthorizationStatus))completion{\n    [self handlePaymentAuthorizationWithPayment:payment\
  \ completion:nil];\n}\n```\n\n创建辅助方法 `handlePaymentAuthorizationWithPayment`，然后在“创建单次使用令牌”中实现此方法。请注意，你还获得了一个接受\
  \ `PKPaymentAuthorizationStatus` 的代码块。在所有异步代码执行完毕后，使用 `PKPaymentAuthorizationStatusSuccess`\
  \ 或 `PKPaymentAuthorizationStatusFailure` 调用此函数。这样 `PKPaymentAuthorizationViewController`\
  \ 就能知道何时以及如何更新其 UI。\n\n```\n- (void)handlePaymentAuthorizationWithPayment:(PKPayment\
  \ *)payment completion:(void (^)(PKPaymentAuthorizationStatus))completion {\n  \
  \  [[STPAPIClient sharedClient] createTokenWithPayment:payment\n               \
  \            completion:^(STPToken *token, NSError *error) {\n                 \
  \             if (error) {\n                                 completion(PKPaymentAuthorizationStatusFailure);\n\
  \                                 return;\n                              }\n   \
  \                           [self createBackendChargeWithToken:token completion:completion];\n\
  \                           }];\n}\n```\n\n一旦收到收费令牌，调用 Parse Cloud function 进行实际收费：\n\
  \n```\n- (void)createBackendChargeWithToken:(STPToken *)token\n                \
  \          completion:(void (^)(PKPaymentAuthorizationStatus))completion {\n   \
  \ [self chargeWithToken:token.tokenId];\n}\n```\n\n以下是调用 Cloud function 的方式：\n\n\
  ```\n-(void)chargeWithToken:(NSString *)tokenId{\n    [self.order saveInBackgroundWithBlock:^(BOOL\
  \ success, NSError *error){\n        if (!error) {\n            __weak typeof(self)\
  \ weakSelf = self;\n            NSDictionary *params = @{@\"chargeToken\":tokenId,\
  \ @\"orderId\":weakSelf.order.objectId};\n            [PFCloud callFunctionInBackground:@\"\
  ChargeToken\" withParameters:params block:^(NSString *message, NSError *error){\n\
  \                if (!error) {\n                    [weakSelf queryForUnfinishedOrder];\n\
  \                }\n            }];\n        }\n    }];\n}\n```\n\n你必须首先保存当前订单。保存操作完成后，将\
  \ Stripe 令牌和订单 ID 传递给后端。这是一种更安全的方式。一旦收费成功运行，你将发出另一个 API 调用来检查订单状态是否已更改，并同时更新你的 UI。\n\
  \n\n\n### 摘要\n\n本章简要总结了 Apple Pay 的工作原理，以及如何使用 Stripe 的 Apple Pay 库实现“通过 Apple Pay\
  \ 付款”功能。\n\n## 14. 扣款与电子邮件\n\n**电子补充材料** 本章的在线版本（doi: [10.1007/978-1-4842-1317-9_14](http://dx.doi.org/10.1007/978-1-4842-1317-9_14)）包含补充材料，可供授权用户使用。\n\
  \n在第 12 章中，我向你展示了如何使用云函数创建并扣款 Stripe 客户。在第 13 章中，我向你展示了如何使用云函数通过 Apple Pay 付款。这三种方法分别调用你编写并托管在\
  \ Parse 上的 `\"main.js\"` 文件中的 `\"createStripeCustomer\"`、`\"chargeCustomer\"` 和\
  \ `\"chargeToken\"` 函数。这三个函数接收字典输入并执行，成功时返回字符串，发生错误时返回 `NSError` 对象。在本章中，我将向你展示如何实现这三个\
  \ JavaScript 函数。此外，你还将学习如何在 Stripe 成功扣款用户信用卡后，使用 Mailgun 发送订单确认邮件。\n\n### 创建并扣款客户\n\
  \n回顾一下，本章你将使用以下三个 JavaScript 函数：\n\n**创建客户**\n\n```\n[PFCloud callFunctionInBackground:@\"\
  createStripeCustomer\" withParameters:stripeCustomerDictionary block:^(NSString\
  \ *customerId, NSError *error) {\n\n}];\n```\n\n**扣款客户**\n\n```\n[PFCloud callFunctionInBackground:@\"\
  \ chargeCustomer\" withParameters:params block:^(NSString *message, NSError *error){\n\
  \n}];\n```\n\n**通过 Apple Pay 付款**\n\n```\n[PFCloud callFunctionInBackground:@\"\
  ChargeToken\" withParameters:params block:^(NSString *message, NSError *error){\n\
  \n}];\n```\n\n### Parse 云代码\n\n首先，这里是关于 Parse 云代码的一些背景知识。Parse 云代码使用 JavaScript\
