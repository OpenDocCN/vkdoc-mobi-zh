  -(void)showWarning:(NSString *)message {\n    [[[UIAlertView alloc] initWithTitle:NSLocalizedString(@\"\
  Warning\", @\"Warning\") message:message delegate:nil cancelButtonTitle:NSLocalizedString(@\"\
