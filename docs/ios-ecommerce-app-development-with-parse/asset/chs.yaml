  \n图 5-7. 使用 `PFImageView`\n\n现在是时候构建并运行这个项目了。\n\n\n\n### 添加样本数据\n\n如果按照目前的操作进行下去，项目可以正常运行；但界面上仍无内容可显示。你需要先向\
  \ Parse 后端添加一些样本数据。\n\n前往 Parse.com，登录后浏览至项目的 \"Core\" 页面。然后点击 \"Add Class\" 并将其命名为\
  \ `Category`。点击 \"+Col\"，为第一个列选择 String 类型，将其值设为 `title`，然后点击 \"Create Column\"\
  。再次点击 \"+Col\"，这次选择 File 类型，将值设为 `image`，然后点击 \"Create Column\"。接着，添加一些样本数据。对于这个示例，我准备了七个品牌，分别是：Original、Nade\
  \ Skincare、Lencome、Fresh Skin、Aven、Diar 和 Esta Louder。你也可以使用任意图片作为这些品牌的演示用途。或者直接使用我包含在第\
  \ 5 章源代码中的图片。点击 \"+Row\" 按钮。Parse 会创建一个空行，每一列都带有 `undefined` 占位符。对于本例，你只需关注 `image`\
  \ 和 `title` 列。点击 `Image` 列中的 `(undefined)` 区域，Parse 会要求你上传一张图片。上传图片后，设置一个标题，例如 `Origins`。当你按下\
  \ \"Enter\" 键时，Parse 会自动为你生成 `objectId`、`createdAt`、`updatedAt` 和 `ACL`（我将在第 18\
  \ 章中介绍 `ACL`）。重复步骤 5 六次，以添加另外六行。\n\n现在，当你返回 Xcode 项目，或在模拟器/真机上打开应用时，构建并运行项目后，你应该能看到刚刚添加的七个品牌。\n\
  \n### 小结\n\n在本章中，我介绍了如何实现产品品牌功能。我引入了 `EMABCategory` 模型、`EMABCategoryTableViewCell`\
  \ 视图以及 `EMABCategoriesTableViewController` 控制器。我还演示了如何通过 `UIStoryboard` 连接视图和视图控制器。最后，我讲解了如何向\
  \ Parse 添加样本数据，以便应用能够动态加载数据。\n\n## 6. 产品界面\n\n电子补充材料 本章在线版本（doi:[10.1007/978-1-4842-1317-9_6](http://dx.doi.org/10.1007/978-1-4842-1317-9_6)）包含补充材料，仅供授权用户使用。\n\
  \n本章你将学习如何实现产品界面。更具体地说，你将学习如何展示产品、让用户搜索产品列表以及根据特定条件筛选产品。但首先，需要创建一个产品模型。\n\n### 产品模型\n\
  \n沿用此前章节引入的模式，在 `EMABConstants` 辅助类中指定模型名称：\n\n`NSString *const kProduct= @\"Product\"\
  ;`\n\n接下来，创建一个新的 `PFObject` 子类，并将其命名为 `EMABProduct`。观察一款典型的美妆产品，你可能需要很多属性来描述它。例如，`EMABProduct`\
  \ 模型包含以下属性：`name`（名称）、`unit price`（单价）、`price unit`（价格单位）、`detail`（详情）、`thumbnail`（缩略图）以及完整尺寸的图片。此外，还需要在产品类别和产品之间建立一对多关系，因此另一个重要属性是\
  \ `brand`（品牌）。\n\n本教程使用以下属性：`name`、`detail`（不要使用 `description`）、`price`、`priceUnit`、`thumbnail`（出于性能考虑）和\
  \ `fullsizeImage`；同时有一个指向 `EMABCategory` 的指针 `brand`。你将在 `EMABCategory` 和 `EMABProduct`\
  \ 之间建立一对多关系。一个品牌下可以拥有多款产品。Parse 提供了多种选项，你可以直接使用指针。\n\n`EMABProduct.h`\n\n```\n#import\
  \ <Parse/Parse.h>\n\n@class EMABCategory;\n\n@interface EMABProduct : PFObject<PFSubclassing>\n\
  \n@property (nonatomic, copy) NSString *name;\n@property (nonatomic, copy) NSString\
  \ *detail;\n@property (nonatomic, assign) float unitPrice;\n@property (nonatomic,\
  \ copy) NSString *priceUnit;\n@property (nonatomic, strong) PFFile *thumbnail;\n\
  @property (nonatomic, strong) PFFile *fullsizeImage;\n@property (nonatomic, strong)\
  \ EMABCategory *brand;\n```\n\n最后需要做的是定义一个自定义静态方法，用于查询某个品牌下的所有产品：\n\n`+(PFQuery\
  \ *)queryForCategory:(EMABCategory *)brand;`\n\n当 `priceUnit` 和 `unitPrice` 属性已经定义（如我此处所做）时，通常需要显示产品价格（例如\
  \ `$3.50/ea`）。在 `UILabel` 上呈现价格时，必须持续使用以下格式化方法：\n\n`[NSString stringWithFormat:@%@/%.2f,\
  \ product.unitPrice, product.priceUnit];`\n\n为了方便起见，创建一个辅助方法：\n\n`-(NSString *)friendlyPrice;`\n\
  \n目前这样已经足够。后续如有需要，你可以添加更多辅助方法或属性。接下来，继续实现 `EMABProduct` 类。\n\n除了导入必要的头文件和动态属性声明外，`+(NSString\
  \ *)parseClassName` 方法如下：\n\n```\n+(NSString *)parseClassName\n{\n    return kProduct;\n\
  }\n```\n\n`+(PFQuery *)basicQuery` 方法如下所示；这里你也会像处理品牌一样，按产品名称对所有产品进行排序。\n\n```\n\
  +(PFQuery *)basicQuery {\n    PFQuery *query = [PFQuery queryWithClassName:[self\
  \ parseClassName]];\n    [query orderByAscending:@\"name\"];\n    return query;\n\
  }\n```\n\n如果你想根据产品添加到 Parse 数据存储的时间进行排序，可以使用以下代码：\n\n`[query orderByDescending:@\"\
  createdAt\"];`\n\n下一个查询辅助方法是查询某品牌下的所有产品。其实现可能如下：\n\n```\n+(PFQuery *)queryForCategory:(EMABCategory\
  \ *)brand{\n    PFQuery  *query = [self basicQuery];\n    [query whereKey:@\"brand\"\
  \ equalTo:brand];\n    return query;\n}\n```\n\n在这个查询方法中，输入参数是一个 `EMABCategory`\
  \ 对象。确保 `EMABProduct` 中的 `brand` 属性与该对象相等。\n\n`[query whereKey:@\"brand\" equalTo:brand];`\n\
  \n另一方面，`+(PFQuery *)basicQuery` 方法定义了如何对查询结果进行排序。它帮助你创建各种查询辅助方法，而无需重复编写相同的代码。\n\n\
  最后一个方法是 `-(NSString *)friendlyPrice`：\n\n```\n-(NSString *)friendlyPrice{\n    return\
  \ [NSString localizedStringWithFormat:@\"$ %.2f/%@\", self.unitPrice, self.priceUnit];\n\
  }\n```\n\n\n\n### 产品视图\n\n你将使用 `UITableView` 来展示产品列表。`UITableView` 的关键视图是其单元格。在\
  \ Xcode 中，创建一个 `PFTableViewCell` 的子类，并将其命名为 `EMABProductTableViewCell`。\n\n在头文件中，添加一个辅助方法：\n\
  \n`-(void)configureItem:(EMABProduct *)product;`\n\n用于连接 `EMABProduct` 模型与该视图。以下是完整的头文件：\n\
  \n`EMABProductTableViewCell`\n\n```\n#import \"PFTableViewCell.h\"\n\n@class EMABProduct;\n\
  \n@interface EMABProductTableViewCell : PFTableViewCell\n\n-(void)configureItem:(EMABProduct\
  \ *)product;\n\n@end\n```\n\n图 6-1 展示了产品单元格的外观。\n\n![A978-1-4842-1317-9_6_Fig1_HTML.gif](img/A978-1-4842-1317-9_6_Fig1_HTML.gif)\n\
  \n**图 6-1.** 产品表格视图单元格\n\n该产品单元格由三个 UI 元素组成：一个 `UILabel` 用于显示产品名称，一个 `UILabel` 用于显示产品价格，以及一个\
  \ `PFImage` 用于显示产品缩略图。\n\n同样地，使用 `EMABProductTableViewCell` 分类来声明属性：\n\n```\n@interface\
  \ EMABProductTableViewCell()\n\n@property (nonatomic, weak) IBOutlet UILabel *nameLabel;\n\
  @property (nonatomic, weak) IBOutlet UILabel *priceLabel;\n@property (nonatomic,\
  \ weak) IBOutlet PFImageView *thumbnailImageView;\n\n@end\n```\n\n在 `EMABProductTableViewCell`\
  \ 单元格中，你只需要实现一个方法 `-(void)configureItem:(EMABProduct*) product`。\n\n此时，你的 `EMABProduct`\
  \ 已拥有 `name`、`unitPrice`、`priceUnit` 和 `thumbnail` 这些属性；你需要做的只是将产品对象的值赋给 `EMABProductTableViewCell`\
  \ 的 UI 属性。`EMABProduct` 有一个辅助方法用于生成带单位的价格；你可以将其用作 `priceLabel` 的文本。为了显示产品的缩略图，请使用\
  \ `thumbnailImageView` 的 `file` 属性，并调用 `loadInBackground`。以下代码展示了完整的实现。\n\n正如第 5\
  \ 章中所讨论的，在将 `thumbnailImageView` 的 `file` 设置为产品的缩略图之前，务必将 `thumbnailImageView` 设置为\
  \ `nil`。这可以确保由于 `UITableViewCell` 的重用特性，`ImageView` 在显示新图像之前不会显示旧图像。这并不是实现此目标的唯一方法。例如，你也可以在\
  \ `UITableViewCell` 中使用 `-(void)prepareForUse` 方法来处理这种情况。\n\n```\n-(void)prepareForReuse{\n\
  \    [super prepareForReuse];\n    self.nameLabel.text = @\"\";\n    self.priceLabel.text\
  \ = @\"\";\n    self.thumbnailImageView.image = nil;\n}\n\n-(void)configureItem:(EMABProduct\
  \ *)product{\n    self.nameLabel.text = product.name;\n    self.priceLabel.text\
  \ = [product friendlyPrice];\n    self.thumbnailImageView.image = nil;\n    if (product.thumbnail)\
  \ {\n        self.thumbnailImageView.file = product.thumbnail;\n        [self.thumbnailImageView\
  \ loadInBackground];\n    } else\n        self.thumbnailImageView.image = [UIImage\
  \ imageNamed:@\"default_product_thumbnail\"];\n}\n```\n\n如果 `EMABProduct` 对象中没有缩略图文件，则使用项目自带的默认图像。\n\
  \n### 产品控制器\n\n你已经完成了视图部分。现在可以开始构建控制器了。在 Xcode 中，创建一个新的 `PFQueryTableViewController`\
  \ 子类 `EMABProductsTableViewController`。\n\n在生成的头文件中，声明一个 `EMABCategory` 属性。当用户选择一个品牌时，显示产品的视图控制器。在此视图控制器中，你需根据品牌创建一个产品查询。使用这个\
  \ `brand` 属性来关联品牌表格视图控制器和产品表格视图控制器。\n\n`@property (nonatomic, strong) EMABCategory\
  \ *brand;`\n\n以下是完整的 `EMABProductsTableViewController` 头文件：\n\n`EMABProductsTableViewController.h`\n\
  \n```\n#import <UIKit/UIKit.h>\n#import <ParseUI/PFQueryTableViewController.h>\n\
  \n@class EMABCategory;\n\n@interface EMABProductsTableViewController : PFQueryTableViewController\n\
  \n@property (nonatomic, strong) EMABCategory *brand;\n\n@end\n```\n\n在实现文件中，你需要实现一个品牌的\
  \ setter 方法：\n\n```\n-(void)setBrand:(EMABCategory *)brand\n{\n    if (_brand !=\
  \ brand) {\n        _brand = brand;\n    }\n}\n```\n\n`–(void)awakeFromNib` 方法应该如下所示：\n\
  \n```\n- (void)awakeFromNib {\n    [super awakeFromNib];\n    self.parseClassName\
  \ = kProduct;\n    self.objectsPerPage = 20;\n    self.paginationEnabled = YES;\n\
  \    self.pullToRefreshEnabled = YES;\n}\n```\n\n同时，`–(PFQuery *)queryForTable`\
  \ 方法需要考虑 `brand` 属性：\n\n```\n- (PFQuery *)queryForTable {\n    PFQuery *query =\
  \ [EMABProduct queryForCategory:self.brand];\n    if ([self.objects count] == 0)\
  \ {\n        query.cachePolicy = kPFCachePolicyCacheThenNetwork;\n    }\n    return\
  \ query;\n}\n```\n\n接下来，自定义 `UITableView` 的数据源；在此例中，将单元格高度设置为 80.0 点：\n\n```\n-(CGFloat)tableView:(UITableView\
  \ *)tableView heightForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    return 80.0;\n\
  }\n```\n\n同样地，使用 `PFQueryTableViewController` 的自定义方法 `–tableView:cellForRowAtIndexPath:`\
  \ 来根据给定的 `EMABProduct` 对象自定义每个单元格。由于我们每页加载 20 个对象，我们将在第 21 个单元格上添加“加载更多…”文本。以下代码展示了该方法的完整实现。此方法将返回一个\
  \ `EMABProductTableViewCell` 实例。你还使用 `–(void)configureItem:(EMABProduct *)object`\
  \ 方法来连接产品对象及其视图。\n\n```\n- (EMABProductTableViewCell *)tableView:(UITableView *)tableView\
  \ cellForRowAtIndexPath:(NSIndexPath *)indexPath object:(EMABProduct *)object{\n\
  \    EMABProductTableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@\"\
  ProductCell\" forIndexPath:indexPath];\n    if (indexPath.row == [[self objects]\
  \ count]) {\n        cell.textLabel.text = NSLocalizedString(@\"Load More…\", @\"\
  \");\n    } else {\n        [cell configureItem:object];\n    }\n    return cell;\n\
  }\n```\n\n最后一个方法处理用户点击某个单元格时发生的事件。当用户点击一个产品单元格时，应用程序应显示产品详情页面。由于我尚未讲解产品详情页面，暂时插入一个注释（`//todo`）作为占位符。当用户点击“加载更多…”单元格时，将加载接下来的\
  \ 20 个产品。以下是完整的实现代码：\n\n```\n-(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
  \ *)indexPath{\n    if (indexPath.row == [[self objects] count]) {\n        [self\
  \ loadNextPage];\n    } else {\n        //todo\n    }\n}\n\n@end\n```\n\n你现在几乎已经准备好可以在模拟器或你的设备上运行该应用了。只差在\
  \ `EMABCategoriesTableViewController` 中实现一个功能。当用户点击一个品牌单元格后，应加载产品表格视图控制器。前往 `EMABCategoriesTableViewController.m`\
  \ 并添加以下代码：\n\n```\n-(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
  \ *)indexPath{\n    if (indexPath.row == [[self objects] count]) {\n        [self\
  \ loadNextPage];\n    } else {\n        EMABProductsTableViewController *viewController\
  \ = [self.storyboard instantiateViewControllerWithIdentifier:@\"EMABProductsTableViewController\"\
  ];\n        NSIndexPath  *indexPath = [self.tableView indexPathForSelectedRow];\n\
  \        [viewController setBrand:self.objects[indexPath.row]];\n        [self.navigationController\
  \ pushViewController:viewController];\n    }\n}\n```\n\n现在你可以构建并运行你的项目，确保没有错误。\n\
  \n\n\n### 添加示例数据\n\n到目前为止，您尚未为任何品牌添加产品，因此点击品牌后不会显示任何内容。您需要向 Parse 后端添加一些产品数据。\n\n\
  前往 Parse.com，登录并浏览至示例项目的“Core”页面。然后点击“Add Class”，并将其命名为“Product”。\n\n接下来，点击“+Col”；对于第一列，选择\
  \ String 类型并将其值设为“name”，然后点击“Create Column”。以相同方式添加 String 类型的“detail”列、Number 类型的“unitPrice”列、String\
  \ 类型的“priceUnit”列、PFFile 类型的“thumbnail”列以及 PFFile 类型的“fullsizeImage”列。最后一列很重要：我们添加一个\
  \ Pointer 类型的“brand”列，它应指向“Category”类。详情请参见图 6-2。\n\n![A978-1-4842-1317-9_6_Fig2_HTML.jpg](img/A978-1-4842-1317-9_6_Fig2_HTML.jpg)\n\
  \n图 6-2.\n\n在 Parse 中添加 Pointer 类型\n\n现在该添加产品数据了。我准备了三个 Esta Louder 产品。您也可以为这些品牌找到用于演示的图片。或者直接使用我为第\
  \ 6 章项目源代码准备的图片。\n\n接着，点击“+Row”按钮。Parse 会创建一个空行，并为每一列显示“undefined”占位符。您需要填充多个列。其中最重要的列之一是“brand”列。\n\
  \n首先，点击“Category”类，找到 Esta Louder 所在的行。复制该行“objectId”列的值。然后转到“Product”类，点击“brand”列中的“(undefined)”区域，粘贴“objectId”值。现在您可以添加产品名称、产品简介、单价，并将\
  \ `priceUnit` 设为“ea”；然后为此产品上传缩略图和全尺寸图片。\n\n按照上述步骤，再添加两行。\n\n返回您的 Xcode 项目，或在模拟器或设备上打开应用。现在，在品牌页面中，当您点击\
  \ Esta Louder 单元格时，应该能看到刚刚添加的三个产品。\n\n### 添加搜索功能\n\n应用的一项必备功能是，客户能在产品列表视图中根据产品名称的一部分搜索产品。处理搜索时，可以实现仅从已加载数据中搜索，或在后端数据存储中搜索所有匹配项。显然，从已加载数据中搜索速度更快，但结果也有限，可能导致找不到结果。因此最佳方法是在后端进行搜索。\n\
  \n目前应用中的搜索功能有限。用户只能根据产品名称搜索产品。例如，一个 Esta Louder 的产品名称中包含“Night Repair”字符串。如果用户在搜索框中输入“Night”，应用不会找到所有名称或详情中包含“Night”的产品。并且搜索关键字是区分大小写的。如果用户输入“night”而非“Night”，所有名称包含“Night”的产品都不会被返回。要解决此限制，您可以预处理用户输入并将每个单词的首字母大写。\n\
  \n首先，在 `EMABProduct` 模型类中添加一个新的查询方法。在头文件中声明该方法：\n\n`EMABProduct.h`\n\n`+(PFQuery\
  \ *)queryForCategory:(EMABCategory *)brand keyword:(NSString *)keyword;`\n\n在其实现中，调用\
  \ `+(PFQuery *)queryForCategory:(EMABCategory *)brand` 方法，并添加另一个查询条件：\n`– whereKey:containsString:`\n\
  \n以下是完整的实现代码：\n\n```\n+(PFQuery *)queryForCategory:(EMABCategory *)brand keyword:(NSString\
  \ *)keyword\n{\n    PFQuery *query = [self queryForCategory:brand];\n    [query\
  \ whereKey:@\"name\" containsString:keyword];\n    return query;\n}\n```\n\n接下来，处理控制器。有几个地方需要实现。\n\
  \n首先，您需要跟踪用户的搜索关键字；在 `EMABProductsTableViewController` 类别中添加一个新属性：\n\n`@property\
  \ (nonatomic, copy) NSString *keyword;`\n\n其次，您还需要在类类别中声明 `UISearchBar` 委托协议：\n\n\
  `@interface EMABProductsTableViewController()<UISearchBarDelegate>`\n\n第三，您需要将 `UISearchBar`\
  \ 连接到视图控制器委托（您在第 5 章中已在控制器 xib 文件中添加了 `UISearchBar`）。图 6-3 显示了如何连接。\n\n![A978-1-4842-1317-9_6_Fig3_HTML.jpg](img/A978-1-4842-1317-9_6_Fig3_HTML.jpg)\n\
  \n图 6-3.\n\nUISearchBar 委托\n\n以下是完整的实现代码：\n\n`EMABProductsTableViewController.m`\n\
  \n```\n@interface EMABProductsTableViewController()<UISearchBarDelegate>\n@property\
  \ (nonatomic, weak) IBOutlet UISearchBar *searchBar;\n@property (nonatomic, copy)\
  \ NSString *keyword;\n@end;\n```\n\n第四，实现 `UISearchBar` 委托方法：\n\n```\n- (void)searchBarSearchButtonClicked:(UISearchBar\
  \ *)searchBar\n{\n    if ([searchBar.text length] > 0) {\n        [searchBar resignFirstResponder];\n\
  \        self.keyword = searchBar.text;\n        [self clear];\n        [self loadObjects];\n\
  \    }\n}\n```\n\n检查搜索栏（`searchBar`）中是否有文本。如果有，则关闭键盘，将关键字设为 `searchBar` 的文本，并调用\
  \ `PFQueryTableViewController` 的方法 `-(void)clear` 来清空 `UITableView`。最后，使用另一个 `PFQueryTableViewController`\
  \ 的方法 `-(void)loadObjects` 触发新的查询。这次，为此搜索目的使用不同的查询。\n\n第五，修改 `– (PFQuery *)queryForTable`，如下所示：\n\
  \n```\n- (PFQuery *)queryForTable {\n    PFQuery *query = [EMABProduct queryForCategory:self.brand];\n\
  \    if (self.keyword) {\n        query = [EMABProduct queryForCategory:self.brand\
  \ keyword:self.keyword];\n    }\n    if ([self.objects count] == 0) {\n        query.cachePolicy\
  \ = kPFCachePolicyCacheThenNetwork;\n    }\n    return query;\n}\n```\n\n在此实现中，默认查询是\
  \ `[EMABProduct queryForCategory:self.brand]`。仅当 `self.keyword` 不等于 `nil` 时才会执行搜索查询。在第\
  \ 4 步中，`[self loadObjects]` 会再次使用 `–(PFQuery *)queryForTable`；这就是您使用 `queryForCategory:`\
  \ 关键字的方式：\n\n```\nif (self.keyword) {\n    query = [EMABProduct queryForCategory:self.brand\
  \ keyword:self.keyword];\n}\n```\n\n因此，您需要在搜索完成后将 `self.keyword` 设为 `nil`。这可以在 `–(void)viewWillAppear`\
  \ 中完成：\n\n```\n-(void)viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
  \    self.keyword = nil;\n}\n```\n\n有时用户打算执行搜索，点击了 `UISearchBar`，但随后决定放弃。点击 `UISearchBar`\
  \ 会弹出软键盘；因此您需要关闭键盘。\n\n\n\n### 添加筛选选项\n\n作为产品功能的一部分，用户可以基于价格等属性筛选产品。同理，你也可以从已加载的结果中筛选产品，或根据查询条件向远程服务器发送请求以获取新结果。在本实现中，你将学习如何查询远程服务器。\n\
  \n在示例应用的界面设计中，当用户点击“筛选”栏按钮项时，会显示一个新的`UIViewController`。用户通过滑动两个滑块来确定自己感兴趣的最低和最高价格。设定价格范围后，用户点击“完成”栏按钮项。该视图控制器将被关闭，产品列表视图控制器会更新为新的搜索结果。图\
  \ 6-4 展示了所有界面元素。\n\n![A978-1-4842-1317-9_6_Fig4_HTML.jpg](img/A978-1-4842-1317-9_6_Fig4_HTML.jpg)\n\
  \n**图 6-4.** `EMABProductsFilterViewController` 界面元素\n\n首先，在`EMABProduct`模型类中添加一个新方法。在头文件中，按如下方式声明该方法：\n\
  \n`EMABProduct.h`\n\n```\n+(PFQuery *)queryForCategory:(EMABCategory *)brand minPrice:(float)min\
  \ maxPrice:(float)max;\n```\n\n在该方法中，你根据用户指定的最低价格和最高价格来查询品牌。\n\n在实现中，使用`PFQuery`的`–whereKey:lessThanOrEqualTo:`和`–whereKey:greaterThanOrEqualTo:`来帮助从服务器筛选产品。\n\
  \n`EMABProduct.m`\n\n```\n+(PFQuery *)queryForCategory:(EMABCategory *)brand minPrice:(float)min\
  \ maxPrice:(float)max{\n    PFQuery *query = [self queryForCategory:brand];\n  \
  \  [query whereKey:@\"price\" greaterThanOrEqualTo:@(min)];\n    [query whereKey:@\"\
  price\" lessThanOrEqualTo:@(max)];\n    return query;\n}\n```\n\n接下来，创建一个新的`UIViewController`子类`EMABProductsFilterViewController`。在其头文件中，创建一个`typedef`使代码更易读：\n\
  \n```\ntypedef void (^ViewControllerDidFinish)(EMABProductsFilterViewController\
  \ *viewController, float minPrice, float maxPrice);\n```\n\n此代码块用于处理用户点击“完成”栏按钮项后的操作。\n\
  \n继续创建两个接口属性：\n\n```\n@property (nonatomic, copy) ViewControllerDidFinish finishBlock;\n\
  ```\n\n仅处理价格范围就需要完成不少工作。首先，使用两个成员变量来跟踪最低和最高价格。由于你还需要更新视图控制器界面以显示当前滑块值，因此还需要其他`UILabels`。此外，为了跟踪`UISlider`的值，为它们创建两个属性。以下是完整的实现代码：\n\
  \n```\n@interface EMABProductsFilterViewController (){\n    float minPrice;\n  \
  \  float maxPrice;\n}\n\n@property (nonatomic, weak) IBOutlet UILabel *minLabel;\n\
  @property (nonatomic, weak) IBOutlet UILabel *maxLabel;\n@property (nonatomic, weak)\
  \ IBOutlet UISlider *minSlider;\n@property (nonatomic, weak) IBOutlet UISlider *maxSlider;\n\
  \n@end\n```\n\n在实现文件中，在`–(void)viewDidLoad`中初始化成员变量：\n\n```\n- (void)viewDidLoad\
  \ {\n    [super viewDidLoad];\n    minPrice = 0.0;\n    maxPrice = 0.0;\n}\n```\n\
  \n为两个`UISliders`创建一个`IBAction`方法，命名为`onSlider`。当用户滑动任意滑块时，将其值更新到`UILabel`。同时让`minPrice`和`maxPrice`跟踪滑块的值。\n\
  \n```\n-(IBAction)onSlider:(id)sender{\n    UISlider *slider = (UISlider *)sender;\n\
  \    NSString *friendlySliderValue = [NSString stringWithFormat:@\"%.0f\",slider.value];\n\
  \    if (slider.tag == 99) {\n        minPrice = slider.value;\n        self.minLabel.text\
  \ = friendlySliderValue;\n    } else {\n        maxPrice = slider.value;\n     \
  \   self.maxLabel.text = friendlySliderValue;\n    }\n}\n```\n\n为“取消”栏按钮项添加一个`IBAction`，如下面的代码片段所示；基本上，你只需弹出当前视图控制器：\n\
  \n```\n-(IBAction)onCancel:(id)sender{\n    [self.navigationController popViewControllerAnimated:YES];\n\
  }\n```\n\n最后，为“完成”栏按钮项添加一个`IBAction`，如下面的代码片段所示。如何处理用户未作任何操作就直接点击“完成”的情况？在这种情况下，你将提醒用户需要更多信息，或用户需要更准确地输入。\n\
  \n```\n-(IBAction)onDone:(id)sender{\n    if (minPrice > 0 && minPrice < maxPrice)\
  \ {\n        UIAlertView *alertView = [[UIAlertView alloc] initWithTitle:NSLocalizedString(@\"\
  Error\", @\"错误\") message:NSLocalizedString(@\"Please make sure your max price is\
  \ greater than your min price.\", @\"请确保你的最高价格大于最低价格。\") delegate:nil cancelButtonTitle:NSLocalizedString(@\"\
  OK\", @\"确定\") otherButtonTitles:nil, nil];\n        [alertView show];\n    } else\
  \ {\n        self.finishBlock(self, minPrice, maxPrice);\n        [self.navigationController\
  \ popViewControllerAnimated:YES];\n    }\n}\n\n@end\n```\n\n最后，返回到`EMABProductsViewController`。以类似的方式添加两个成员变量：\n\
  \n```\n@interface EMABProductsTableViewController()<UISearchBarDelegate>{\n    float\
  \ minPrice;\n    float maxPrice;\n}\n```\n\n接下来，添加以下`IBAction`方法来处理用户点击“筛选”栏按钮项的情况。在此方法中，你需要完成几件事：首先，呈现`EMABProductsFilterViewController`；然后，处理用户设置的最低和最高价格；接着，清空当前表格视图；最后，执行一次查询。以下是完整的实现代码。\n\
  \n```\n-(IBAction)onFilter:(id)sender\n{\n    EMABProductsFilterViewController *viewController\
  \ = (EMABProductsFilterViewController *)[self.storyboard instantiateViewControllerWithIdentifier:@\"\
  EMABProductsFilterViewController\"];\n    viewController.finishBlock = ^(EMABProductsFilterViewController\
  \ *viewControlle, float minValue, float maxValue){\n        minPrice = minValue;\n\
  \        maxPrice = maxValue;\n        self.keyword = nil;\n        [self clear];\n\
  \        [self loadObjects];\n    };\n    [self.navigationController presentViewController:viewController\
  \ animated:YES completion:nil];\n}\n```\n\n最后，需要修改`-(PFQuery *)queryForTable`，如下所示：\n\
  \n```\n- (PFQuery *)queryForTable {\n    PFQuery *query = [EMABProduct queryForCategory:self.brand];\n\
  \    if (self.keyword) {\n        query = [EMABProduct queryForCategory:self.brand\
  \ keyword:self.keyword];\n    }\n    if (minPrice > 0 && maxPrice>0) {\n       \
  \ query = [EMABProduct queryForCategory:self.brand minPrice:minPrice maxPrice:maxPrice];\n\
  \    }\n    if ([self.objects count] == 0) {\n        query.cachePolicy = kPFCachePolicyCacheThenNetwork;\n\
  \    }\n    return query;\n}\n```\n\n不要忘记将“筛选”`UIBarButtonItem`连接到该方法。\n\n现在可以构建并运行项目了。\n\
  \n### 本章小结\n\n在本章中，我介绍了在产品分类下显示产品列表、根据名称搜索产品以及根据价格筛选产品等相关主题。\n\n## 7. 产品详情界面\n\n\
  电子补充材料 本章的在线版本 (doi:[10.1007/978-1-4842-1317-9_7](http://dx.doi.org/10.1007/978-1-4842-1317-9_7))\
  \ 包含补充材料，仅供授权用户使用。\n\n在本章中，你将学习如何实现产品详情界面，该界面包含产品名称、价格、详情和全尺寸图片等信息；同时还包括分享菜单、购买产品或添加到收藏夹的选项。\n\
  \n\n\n### 构建产品详情界面\n\n图 7-1 展示了产品详情界面的最终效果。该界面使用 `UINavigationBar` 标题显示产品名称；右侧栏按钮用于添加分享选项；还有一个“心形”按钮，供用户将产品添加到收藏列表。为了显示产品名称和价格，你使用了两个\
  \ `UILabel`。产品详情可能相当冗长，因此你使用 `UITextView` 来容纳其内容。最后，你使用一个标记为“加入购物袋”的普通按钮，让用户将该产品添加到购物袋中。\n\
  \n![A978-1-4842-1317-9_7_Fig1_HTML.jpg](img/A978-1-4842-1317-9_7_Fig1_HTML.jpg)\n\
  \n图 7-1. 完成后的产品详情用户界面\n\n以下是实现该界面的方式。首先，创建一个 `UIViewController` 子类 `EMABProductDetailViewController`。在生成的头文件中，创建一个属性：\n\
  \n```\n@property (nonatomic, strong) EMABProduct *product;\n```\n\n接着，将所选 `EMABProduct`\
  \ 实例从上一个产品列表传递到该产品详情。你创建的属性正用于此目的。以下是完整的实现：\n\n**EMABProductDetailViewController.h**\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@class EMABProduct;\n\n@interface EMABProductDetailViewController\
  \ : UIViewController\n\n@property (nonatomic, strong) EMABProduct *product;\n\n\
  @end\n```\n\n在实现文件中，你需要一个 `PFImageView` 属性来显示产品的全尺寸图片，一个 `UILabel` 来显示产品名称，一个 `UILabel`\
  \ 来显示价格，以及一个 `UITextView` 来显示详情。你还需要一个自定义按钮，供用户点击以将产品添加到收藏列表。以下是完整代码：\n\n```\n@interface\
  \ EMABProductDetailViewController ()\n\n@property (nonatomic, weak) IBOutlet PFImageView\
  \ *fullsizeImageView;\n@property (nonatomic, weak) IBOutlet UILabel *productNameLabel;\n\
  @property (nonatomic, weak) IBOutlet UILabel *productPriceLabel;\n@property (nonatomic,\
  \ weak) IBOutlet UITextView *detailTextView;\n@property (nonatomic, weak) IBOutlet\
  \ UIButton *heartButton;\n\n@end\n```\n\n在实现中，首先实现 `EMABProduct` 属性的 setter 方法：\n\
  \n```\n-(void)setProduct:(EMABProduct *)product{\n    if (_product !=product) {\n\
  \        _product = product;\n        [self updateUI];\n    }\n}\n```\n\n在这个 setter\
  \ 中，还使用了辅助方法 `-(void)updateUI`。你可能需要在多个场合更新整个界面（这是我通常的做法）。与其到处处理界面更新，我使用一个单一方法，在\
  \ `-(void)viewDidLoad` 方法中调用，如下所示：\n\n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\
  \    [self updateUI];\n}\n```\n\n目前，这个 `updateUI` 方法只做一件事：连接模型和视图。以下是完整代码：\n\n```\n\
  -(void)updateUI{\n    if (self.product.fullsizeImage) {\n        self.fullsizeImageView.file\
  \ = self.product.fullsizeImage;\n        [self.fullsizeImageView loadInBackground];\n\
  \    }\n    self.productNameLabel.text = self.product.name;\n    self.productPriceLabel.text\
  \ = [self.product friendlyPrice];\n    self.detailTextView.text = [self.product\
  \ detail];\n}\n```\n\n接下来，实现当用户点击“加入购物袋”按钮时触发的 `IBAction`。当按钮被点击时，你需要检查顾客是有效的注册用户还是仅访客。为此，使用\
  \ Parse 的 `[PFUser currentUser]` 方法。如果是注册用户，`[PFUser currentUser]` 将返回一个实例，否则返回\
  \ `nil`。此时，你需要请用户注册账户或登录（如果尚未完成）。我将在后续章节讨论如何处理“加入购物袋”请求。现在，以下是提醒用户注册或登录的方式：\n\n\
  ```\n-(IBAction)onBag:(id)sender\n{\n    if (! [PFUser currentUser]) {\n       \
  \ [self showWarning];\n    } else {\n        //todo:\n    }\n}\n```\n\n在这个示例代码中，辅助方法\
  \ `-(void)showWarning` 用于提醒用户。你将在其他场合再次使用它，因此最好创建一个通用方法：\n\n```\n-(void)showWarning\n\
  {\n    [[[UIAlertView alloc] initWithTitle:NSLocalizedString(@\"Warning\", @\"Warning\"\
  ) message:NSLocalizedString(@\"Please sign up or log in\", @\"\") delegate:nil cancelButtonTitle:NSLocalizedString(@\"\
  Later\", @\"Later\") otherButtonTitles: NSLocalizedString(@\"OK\", @\"OK\"), nil]\
  \ show];\n}\n```\n\n这个实现仅弹出一个警告。更好的方式是当用户点击“确定”时，调出注册或登录界面。\n\n### 添加分享选项\n\n应用的一个重要功能是分享选项或菜单。要添加此功能，请使用\
  \ `UIActivityViewController`。使用 `UIActivityViewController` 非常简单（了解更多信息，请参考 iOS 文档）。首先，创建你想要分享的内容，实例化一个\
  \ `UIActivityViewController` 实例，定义哪些服务不用于此次分享目的，然后弹出该实例。图 7-2 从用户角度展示了 `UIActivityViewController`。\n\
  \n![A978-1-4842-1317-9_7_Fig2_HTML.jpg](img/A978-1-4842-1317-9_7_Fig2_HTML.jpg)\n\
  \n图 7-2. 从用户角度看到的 `UIActivityViewController`\n\n以下是完整代码：\n\n```\n-(IBAction)onShare:(id)sender\
  \ {\n    NSString *textToShare = [NSString stringWithFormat:@\"%@, %@\", self.product.name,\
  \ [self.product friendlyPrice]];\n    NSURL *imageUrl = [NSURL URLWithString:self.product.fullsizeImage.url];\n\
  \    NSArray *objectsToShare = @[textToShare, imageUrl];\n    UIActivityViewController\
  \ *activityVC = [[UIActivityViewController alloc] initWithActivityItems:objectsToShare\
  \ applicationActivities:nil];\n    NSArray *excludeActivities = @[\n        UIActivityTypeAssignToContact,\n\
  \        UIActivityTypeSaveToCameraRoll,\n        UIActivityTypePostToFlickr,\n\
  \        UIActivityTypePostToVimeo\n    ];\n    activityVC.excludedActivityTypes\
  \ = excludeActivities;\n    [self presentViewController:activityVC animated:YES\
  \ completion:nil];\n}\n```\n\n请记住，这是一个经过极大简化的 API。并非所有可用的服务都必然支持用户可能想要分享的数据内容。你可能还希望为你想要支持的服务添加更多内容。\n\
  \n\n\n### 添加收藏列表\n\n要实现收藏列表功能，你需要创建一个新的模型类。\n\n在 Xcode 中，创建一个新的 `PFObject` 子类，并将其命名为\
  \ `EMABFavoriteProduct`。该模型有两个属性——`PFUser` 和 `EMABProduct`——用于表示用户喜欢某个产品。换句话说，这个模型类是\
  \ Parse 连接表关系的一种用例。每当用户喜欢一个产品时，就会在该模型类中创建一条记录。你可能会觉得这有些冗余。你也可以使用其他方法；例如，可以为该用户使用一个收藏数组。毕竟，一个用户对应多个收藏产品，因此在这种情况下使用数组是可行的。然而，使用连接表方法的优点是代码相当简洁。\n\
  \n要获取用户的收藏列表，请使用 `PFQuery`。创建一个基本的 `PFQuery` 方法，并根据你的需求进行定制。以下是完整的代码：\n\n`EMABFavoriteProduct.h`\n\
  \n```\n#import <Parse/Parse.h>\n\n@class EMABProduct;\n\n@interface EMABFavoriteProduct\
  \ : PFObject<PFSubclassing>\n\n@property (nonatomic, strong) PFUser *customer;\n\
  @property (nonatomic, strong) EMABProduct *product;\n\n+(PFQuery *)basicQuery;\n\
  +(PFQuery *)queryForCustomer:(PFUser *)customer;\n+(PFQuery *)queryForCustomer:(PFUser\
  \ *)customer product:(EMABProduct *)product;\n\n@end\n```\n\n在此代码段中，你有两个额外的辅助查询方法：`+(PFQuery\
  \ *)queryForCustomer:(PFUser *)customer` 用于获取用户的收藏产品列表；`+(PFQuery *)queryForCustomer:(PFUser\
  \ *)customer product:(EMABProduct *)product` 用于检查用户是否已将某个产品添加到收藏列表。\n\n在 `EMABConstants.h`\
  \ 中添加一个新的 `NSString` 常量 `kFavoriteProduct`，并在 `EMABConstants.m` 文件中实现它。\n\n```\n\
  NSString *const kFavoriteProduct = @\"FavoriteProduct\";\n```\n\n在必需的 `+(NSString\
  \ *)parseClassName` 方法中，使用该 `NSString` 常量来表示模型类的名称。\n\n```\n+(NSString *)parseClassName\n\
  {\n    return kFavoriteProduct;\n}\n```\n\n在 `+(PFQuery *)basicQuery` 方法中，根据创建时间对结果进行排序。你还可以使用\
  \ `PFQuery` 的 `-include:` 方法来包含用户和产品数据。这是显示产品详情或用户详情所必需的。\n\n```\n+(PFQuery *)basicQuery\n\
  {\n    PFQuery *query = [PFQuery queryWithClassName:[self parseClassName]];\n  \
  \  [query orderByDescending:@\"createdAt\"];\n    [query include:@\"customer\"];\n\
  \    [query include:@\"product\"];\n    return query;\n}\n```\n\n在 `+(PFQuery *)queryForCustomer:(PFUser\
  \ *)customer` 方法中，使用 `PFQuery` 的查询条件方法 `-whereKey: equalTo:`：\n\n```\n+(PFQuery\
  \ *)queryForCustomer:(PFUser *)customer {\n    PFQuery *query = [self basicQuery];\n\
  \    [query whereKey:@\"customer\" equalTo:customer];\n    return query;\n}\n```\n\
  \n然后实现 `+(PFQuery *)queryForCustomer:(PFUser *)customer product:(EMABProduct *)product`：\n\
  \n```\n+(PFQuery *)queryForCustomer:(PFUser *)customer product:(EMABProduct *)product\n\
  {\n    PFQuery *query = [self queryForCustomer:customer];\n    [query whereKey:@\"\
  product\" equalTo:product];\n    return query;\n}\n\n@end\n```\n\n这就是 `EMABFavoriteProduct`。不要忘记在\
  \ `AppDelegate` 中通过调用以下代码来注册此 `PFSubclass`：\n\n```\n[EMABFavoriteProduct registerSublcass];\n\
  ```\n\n接下来，转到 `EMABProductDetailViewController.m` 文件。在 `-(void)viewDidLoad` 方法中，检查用户是否已经喜欢了该产品（假设存在有效用户）。\n\
  \n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    [self updateUI];\n \
  \   [self checkIfFavorited];\n}\n```\n\n`checkIfFavorited` 方法用于验证后端服务器上是否存在记录。如果存在，则禁用收藏按钮。你还需要确保只有在存在有效用户时才查询服务器。\n\
  \n```\n-(void)checkIfFavorited\n{\n    if (![PFUser currentUser]) {\n        PFQuery\
  \ *fPQuery = [EMABFavoriteProduct queryForCustomer:[PFUser currentUser] product:self.product];\n\
  \        [fPQuery getFirstObjectInBackgroundWithBlock:^(PFObject *object, NSError\
  \ *error){\n            if (!error) {\n                self.heartButton.enabled\
  \ = false;\n            }\n        }];\n    }\n}\n\n@end\n```\n\n你还希望允许用户将产品添加到其收藏列表中。“心形”按钮连接到一个\
  \ IBOutlet 方法 `-(IBAction)onFavorite:(id)sender`。\n\n只有注册或登录的用户才能将产品添加到购物袋或喜欢某个产品。因此，首先你需要检查是否存在有效用户。如果存在，则创建一个新的\
  \ `FavoriteProduct` 对象，并将其保存到 Parse 后端。保存成功后，向用户显示一条成功消息。以下是完整的代码：\n\n```\n-(IBAction)onFavorite:(id)sender{\n\
  \    if (![PFUser currentUser]) {\n        [self showWarning];\n    } else {\n \
  \       EMABFavoriteProduct *favoriteProduct = [EMABFavoriteProduct object];\n \
  \       [favoriteProduct setCustomer:[PFUser currentUser]];\n        [favoriteProduct\
  \ setProduct:self.product];\n        [favoriteProduct saveInBackgroundWithBlock:^(BOOL\
  \ success, NSError *error){\n            if (!error) {\n                [SVProgressHud\
  \ showSuccessWithStatus:NSLocalizedString(@\"Successfully added\", @\"\")];\n  \
  \          }\n        }];\n    }\n}\n```\n\n### 本章小结\n\n在本章中，我介绍了如何实现以下功能：显示产品详情、将产品详情分享到用户手机上的不同服务，以及将产品添加到用户的收藏列表（前提是该产品之前未被添加过）。收藏产品功能是通过一个连接表模型类\
  \ `EMABFavoriteProduct` 实现的。我还强调了在获取用户收藏列表时，使用 `PFQuery` 中的 `-include:` 方法来获取用户数据或产品数据的重要性。\n\
  \n## 8. 注册功能\n\n电子补充材料 本章的在线版本 (doi:[10.1007/978-1-4842-1317-9_8](http://dx.doi.org/10.1007/978-1-4842-1317-9_8))\
  \ 包含补充材料，仅供授权用户使用。\n\n在上一章中，你学习了如何在用户将产品添加到购物袋或收藏列表时，提示用户进行注册或登录。在本章中，你将实现一个调度屏幕，使用户能够创建账户、登录现有账户或使用\
  \ Facebook 登录。你还将学习如何实现客户注册。如何实现直接登录和 Facebook 登录功能将在第 9 章中介绍。\n\n### 构建调度屏幕\n\n\
  当实现主调度功能时，你创建了一个名为 `LoginSignupStoryboard` 的不同 `UIStoryboard`，以减轻 `Main.storyboard`\
  \ 的工作量。\n\n此 `DispatchViewController` 的用户界面非常简单。有三个按钮：标记为“注册”的按钮用于显示注册屏幕；标记为“登录”和“使用\
  \ Facebook 登录”的按钮将在第 9 章中介绍。\n\n为了简化主视图控制器，请在 `LoginSignUpStoryboard` 中使用 Segue\
  \ 将“注册”按钮连接到 `EMABSignUpViewController`，将“登录”按钮连接到 `EMABLoginViewController`，并为“使用\
  \ Facebook 登录”设置一个 IBAction。\n\n同时提供一个“取消” `UIBarButtonItem`，以防用户此时不想登录或注册账户，以便其可以离开该屏幕。这个\
  \ `LoginSignUpStoryboard` 通过其自己的 `UINavigationController` 实现，因此你可以简单地使用：\n\n```\n\
  [self dismissViewControllerAnimated:YES completion:nil];\n```\n\n来关闭调度屏幕。\n\n以下是完整的实现：\n\
  \n```\n@implementation EMABDispatchViewController\n\n- (void)viewDidLoad {\n   \
  \ [super viewDidLoad];\n}\n\n-(IBAction)onFacebookLogin:(id)sender{\n    //待实现\n\
  }\n\n-(IBAction)onCancel:(id)sender{\n    [self dismissViewControllerAnimated:YES\
  \ completion:nil];\n}\n\n@end\n```\n\n\n\n### 注册模型\n\n让我们直接进入`User`模型——`EMABUser`，它是`PFUser`的子类。默认情况下，`EMABUser`类继承了`PFUser`的属性：`username`、`password`和`e-mail`；你可能还希望从用户那里收集更多信息，例如姓名、地址和照片。以下是完整的实现代码：\n\
  \n`EMABUser.h`\n\n```\n#import <Parse/Parse.h>\n\n@interface EMABUser : PFUser<PFSubclassing>\n\
  \n@property (nonatomic, copy) NSString *firstName;\n@property (nonatomic, copy)\
  \ NSString *lastName;\n@property (nonatomic, assign) int gender;\n@property (nonatomic,\
  \ copy) NSString *phone;\n@property (nonatomic, copy) NSString *address1;\n@property\
  \ (nonatomic, copy) NSString *address2;\n@property (nonatomic, copy) NSString *city;\n\
  @property (nonatomic, copy) NSString *state;\n@property (nonatomic, copy) NSString\
  \ *zipcode;\n@property (nonatomic, copy) PFFile *photo;\n\n+(EMABUser *)currentUser;\n\
  \n@end\n```\n\n在注册用户时，你只需让用户输入电子邮件地址和密码。当用户购买商品时，你需要知道将产品运送到哪里，因此你需要在此之前要求用户输入收货地址。你还提供了\
  \ Facebook 登录功能，以便获取更多用户信息，如个人资料照片、性别、地区、关系和兴趣。这需要向用户和 Facebook 申请不同的权限。目前，只需请求获取用户的性别和照片。\n\
  \n你还需要`override +(PFUser *)currentUser`方法，使其返回`EMABUser`，否则 Xcode 会一直给出警告。\n\n以下是`EMABUser`的实现部分：\n\
  \n`EMABUser.m`\n\n```\n#import \"EMABUser.h\"\n#import  <Parse/PFObject+Subclass.h>\n\
  \n@implementation EMABUser\n\n@dynamic firstName, lastName, gender, phone, address1,\
  \ address2, city, state, zipcode, photo;\n\n+(EMABUser *)currentUser{\n    return\
  \ (EMABUser *)[PFUser currentUser];\n}\n\n@end\n```\n\n### 注册视图\n\n注册界面由一个`UITableView`、一个标题为“注册”的按钮，以及一个标题同为“注册”的条形按钮项组成。\n\
  \n`UITableView`包含三个单元格。每个单元格中，使用一个`UITextField`来捕获用户的输入。第一个单元格用于注册邮箱，第二个单元格用于注册密码，第三个单元格用于确认密码。\n\
  \n由于后续你会多次使用带有`UITextField`的类似`UITableView`（即`UITextField` `UITableViewCell`），因此创建一个`UITextField`的子类来消除冗余代码。\n\
  \n首先，创建`EMABEmailTextField`类。\n\n`EMABEmailTextField.h`\n\n```\n#import <UIKit/UIKit.h>\n\
  \n@interface EMABEmailTextField : UITextField\n\n@end\n```\n\n`EMABEmailTextField.m`\n\
  \n```\n#import \"EMABEmailTextField.h\"\n\n@implementation EMABEmailTextField\n\n\
  -(instancetype)initWithFrame:(CGRect)frame\n{\n    self = [super initWithFrame:frame];\n\
  \    if (self) {\n        self.borderStyle = UITextBorderStyleNone;\n        self.textColor\
  \ = [UIColor blackColor];\n        self.autocapitalizationType = UITextAutocapitalizationTypeNone;\n\
  \        self.placeholder = NSLocalizedString(@\"邮箱\", @\"\");\n        self.backgroundColor\
  \ = [UIColor whiteColor];\n        self.autocorrectionType = UITextAutocorrectionTypeNo;\
  \ . . . // 不启用自动纠正\n        self.keyboardType = UIKeyboardTypeEmailAddress; . .\
  \ . // 使用默认输入法类型（全键盘）\n        self.returnKeyType = UIReturnKeyDone;\n        self.clearButtonMode\
  \ = UITextFieldViewModeWhileEditing; . . . // 右侧显示清除按钮“x”\n        // 添加辅助功能标签，说明文本字段的用途。\n\
  \        [self setAccessibilityLabel:NSLocalizedString(@\"邮箱\", @\"\")];\n    }\n\
  \    return self;\n}\n\n@end\n```\n\n在此实现中，你设置了边框样式、文本颜色、占位符文本、背景颜色、键盘类型、自动纠正类型以及清除按钮模式，以提供更好的用户界面和体验。\n\
  \n接下来，创建`EMABPasswordTextField`来定制密码文本框的外观和感觉。实现代码如下：\n\n`EMABPasswordTextField.h`\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@interface EMABPasswordTextField : UITextField\n\
  \n@end\n```\n\n`EMABPasswordTextField.m`\n\n```\n#import \"EMABPasswordTextField.h\"\
  \n\n@implementation EMABPasswordTextField\n\n-(instancetype)initWithFrame:(CGRect)frame\n\
  {\n    self = [super initWithFrame:frame];\n    if (self) {\n        self.borderStyle\
  \ = UITextBorderStyleNone;\n        self.textColor = [UIColor blackColor];\n   \
  \     self.placeholder = NSLocalizedString(@\"密码\",@\"\");\n        self.backgroundColor\
  \ = [UIColor whiteColor];\n        self.keyboardType = UIKeyboardTypeDefault;\n\
  \        self.returnKeyType = UIReturnKeyDone;\n        self.secureTextEntry = YES;\
  \   // 使文本输入安全（显示为圆点）\n        self.clearButtonMode = UITextFieldViewModeWhileEditing;\
  \    // 右侧显示清除按钮“x”\n        [self setAccessibilityLabel:NSLocalizedString(@\"密码\"\
  , @\"\")];\n    }\n    return self;\n}\n\n@end\n```\n\n这段代码与`EMABEmailTextField`非常相似；主要区别在于你需要使用`secureTextEntry`属性来隐藏用户输入的密码。\n\
  \n请注意，并非一定要在`UITableViewCell`中使用`UiTableView`搭配`UITextField`——只是为了外观更美观。有些开发者会选择将三个`UITextField`放置在带有几条分隔线的背景图片之上。如果你能找到这种背景图片，这种方法同样效果不错。\n\
  \n\n\n### 注册控制器\n\n接下来，准备实现 `EMABSignUpViewController`。\n\n首先，创建 `EMABSignUpViewController`\
  \ 类作为 `UIViewController` 的子类。其头文件无需过多处理，应重点关注实现文件。由于使用了 `UITableView`，需要引入 `UITableView`\
  \ 协议，同时因为使用 `UITextField`，建议采用 `UITextField Delegate` 协议，以便用户在点击“完成”按钮时关闭键盘。以下是具体实现：\n\
  \n`EMABSignupViewController.m`\n\n```objective-c\n#import \"EMABSignupViewController.h\"\
  \n#import \"EMABConstants.h\"\n#import \"EMABEmailTextField.h\"\n#import \"EMABPasswordTextField.h\"\
  \n#import \"EMABUser.h\"\n\n@interface EMABSignupViewController ()<UITableViewDataSource,\
  \ UITableViewDelegate, UITextFieldDelegate>\n\n@property (nonatomic, strong) EMABEmailTextField\
  \ *emailTextField;\n@property (nonatomic, strong) EMABPasswordTextField *passwordTextField;\n\
  @property (nonatomic, strong) EMABPasswordTextField *passwordAgainTextField;\n\n\
  @end\n```\n\n还需要创建三个属性来引用 `EMABEmailTextField` 和 `EMABPasswordTextfield`。为了给每个单元格的标题留出显示空间，需要调整每个\
  \ `UITextField` 的大小和位置。以下代码展示了如何通过 `-(void)viewDidLoad` 方法实现：\n\n```objective-c\n\
  - (void)viewDidLoad {\n    [super viewDidLoad];\n    self.emailTextField = [[EMABEmailTextField\
  \ alloc] initWithFrame:CGRectMake(kLeftMargin, kTopMargin, kTextFieldWidth, kTextFieldHeight)];\n\
  \    self.emialTextField.delegate = self;\n    self.passwordTextField = [[EMABPasswordTextField\
  \ alloc] initWithFrame:CGRectMake(kLeftMargin, kTopMargin, kTextFieldWidth, kTextFieldHeight)];\n\
  \    self.passwordTextField.delegate = self;\n    self.passwordAgainTextField =\
  \ [[EMABPasswordTextField alloc] initWithFrame:CGRectMake(kLeftMargin, kTopMargin,\
  \ kTextFieldWidth, kTextFieldHeight)];\n    [self.passwordAgainTextField setPlaceholder:NSLocalizedString(@\"\
  再次输入密码\", @\"Password Again\")];\n    self.passwordAgainTextField.delegate = self;\n\
  }\n```\n\n请注意，`kLeftMargin`、`kTopMargin`、`kTextFieldWidth` 和 `kTextFieldHeight`\
  \ 均在 `EMABConstants` 类中定义，后续其他场景也会用到。\n\n接着，实现 `UITableViewDataSource` 协议方法。该 `UITableView`\
  \ 需要包含一个分区和三个单元格。\n\n```objective-c\n#pragma mark - tableview datasource\n\n-(NSInteger)tableView:(UITableView\
  \ *)tableView numberOfRowsInSection:(NSInteger)section\n{\n    return 3;\n}\n\n\
  -(NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n{\n    return\
  \ 1;\n}\n```\n\n在 `UIStoryboard` 的 nib 文件中设置标识符 `\"SignUpCell\"` 后，按如下方式创建三个单元格：\n\
  \n```objective-c\n-(UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    UITableViewCell *cell = nil;\n    cell = [tableView dequeueReusableCellWithIdentifier:@\"\
  SignupCell\" forIndexPath:indexPath];\n    UITextField *textField = nil;\n    switch\
  \ (indexPath.row) {\n        case 0:\n            textField = self.emailTextField;\n\
  \            break;\n        case 1:\n            textField = self.passwordTextField;\n\
  \            break;\n        case 2:\n            textField = self.passwordAgainTextField;\n\
  \            break;\n        default:\n            break;\n    }\n    // 确保文本输入框的宽度与单元格宽度匹配\n\
  \    CGRect newFrame = textField.frame;\n    newFrame.size.width = CGRectGetWidth(cell.contentView.frame)\
  \ - kLeftMargin*2;\n    textField.frame = newFrame;\n    // 当单元格尺寸变化时，保持文本输入框宽度适应\n\
  \    textField.autoresizingMask = UIViewAutoresizingFlexibleWidth;\n    [cell.contentView\
  \ addSubview:textField];\n    return cell;\n}\n```\n\n最后需要处理 `UITableView` 的一个代理方法，但该方法的实现并非必需：\n\
  \n```objective-c\n-(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    [tableView deselectRowAtIndexPath:indexPath animated:NO];\n\
  }\n```\n\n如您所见，界面的配置相当简单。不过，用户注册还需要额外处理一些内容。\n\n首先，需验证用户提供的邮箱地址是否有效。可使用 `-(BOOL)isValidEmail`\
  \ 方法：\n\n```objective-c\n#pragma mark - helper\n\n-(BOOL)isValidEmail {\n    //\
  \ https://github.com/benmcredmond/DHValidation\n    NSString *emailRegex = @\"[A-Z0-9a-z._%+-]+@[A-Za-z0-9.-]+\\\
  \\.[A-Za-z]{2,6}\";\n    NSPredicate *emailTest = [NSPredicate predicateWithFormat:@\"\
  SELF MATCHES %@\", emailRegex];\n    return [emailTest evaluateWithObject:self.emailTextField.text];\n\
  }\n```\n\n接着，当输入的邮箱有误时需提醒用户，这里使用 `UIAlertView` 实现。后续还会展示其他警告信息，如密码长度或注册错误等。为此创建一个\
  \ `-(void)showWarning:(NSString *)message` 辅助方法：\n\n```objective-c\n-(void)showWarning:(NSString\
  \ *)message {\n    [[[UIAlertView alloc] initWithTitle:NSLocalizedString(@\"警告\"\
  , @\"Warning\") message:message delegate:nil cancelButtonTitle:NSLocalizedString(@\"\
  确定\", @\"OK\") otherButtonTitles:nil , nil] show];\n}\n```\n\n最后，允许用户关闭软键盘，因此实现\
  \ `UITextField` 代理方法如下：\n\n```objective-c\n#pragma mark - UITextField Delegate\n\
  \n-(BOOL)textFieldShouldReturn:(UITextField *)textField\n{\n    [textField resignFirstResponder];\n\
  \    return YES;\n}\n\n@end\n```\n\n接下来，实现用户点击“注册”按钮时的 `IBAction` 方法。需检查两个密码 `UITextField`\
  \ 单元格的文本是否达到最小长度要求，以及两个文本输入框的内容是否一致。同时确保邮箱 `UITextField` 的文本长度满足最小要求且为有效邮箱地址。若输入信息有误，将依次显示相应警告。最后，使用\
  \ `[PFUser user]` 创建用户实例并转换为 `EMABUser`。该用户的用户名和邮箱均设为邮箱 `UITextField` 中的文本，密码设为密码\
  \ `UITextField` 单元格中的文本，然后调用 Parse 的 `-(BFTask *)signUpInBackground` 方法。完整实现如下：\n\
  \n```objective-c\n-(IBAction)onSignup:(id)sender{\n    BOOL cont0 = [self.passwordTextField.text\
  \ length] > kMinTextLength;\n    BOOL cont1 = [self.passwordAgainTextField.text\
  \ length] > kMinTextLength;\n    BOOL cont2 = [self.passwordTextField.text isEqualToString:self.passwordAgainTextField.text];\n\
  \    BOOL cont3 = [self.emailTextField.text length] > kMinTextLength;\n    BOOL\
  \ cont4 = [self isValidEmail];\n    \n    if (!cont0) {\n        [self showWarning:NSLocalizedString(@\"\
  密码至少 6 个字符。\", @\"Password at least 6 characters.\")];\n    }\n    if (!cont1) {\n\
  \        [self showWarning:NSLocalizedString(@\"密码至少 6 个字符。\", @\"Password at least\
  \ 6 characters.\")];\n    }\n    if (!cont2) {\n        [self showWarning:NSLocalizedString(@\"\
  两次密码必须一致。\", @\"Passwords have to match.\")];\n    }\n    if (!cont3) {\n      \
  \  [self showWarning:NSLocalizedString(@\"邮箱至少 6 个字符。\", @\"Password at least 6\
  \ characters.\")];\n    }\n    if (!cont4) {\n        [self showWarning:NSLocalizedString(@\"\
  邮箱格式无效。\", @\"Doesn't look like a valid email.\")];\n    }\n    \n    if (cont0\
  \ && cont1 && cont2 && cont3 && cont4) {\n        [self.emailTextField resignFirstResponder];\n\
  \        [self.passwordTextField resignFirstResponder];\n        [self.passwordAgainTextField\
  \ resignFirstResponder];\n        EMABUser *user = (EMABUser *)[PFUser user];\n\
  \        user.username = [self.emailTextField text];\n        user.email = [self.emailTextField\
  \ text];\n        user.password = [self.passwordTextField text];\n        [user\
  \ signUpInBackgroundWithBlock:^(BOOL succeeded, NSError *error){\n            if\
  \ (!error) {\n                [self dismissViewControllerAnimated:YES completion:nil];\n\
  \            }\n        }];\n    }\n}\n```\n\n\n\n### 总结\n\n本章讲解了如何创建用户界面（UI），让用户通过电子邮件和密码注册账户。同时，还介绍了如何在开发用户界面时打造更佳的用户体验。最终，利用\
  \ `Parse` 进行用户注册仅是一个 API 方法。\n\n## 9. 登录功能\n\n电子补充材料 本章在线版本（doi:[10.1007/978-1-4842-1317-9_9](http://dx.doi.org/10.1007/978-1-4842-1317-9_9)）包含补充材料，仅供授权用户使用。\n\
  \n在上一章中，您学习了如何注册新用户。本章中，您将学习如何实现登录以及使用 Facebook 登录的功能。\n\n### 使用直接登录\n\n与注册功能类似，用户通过电子邮件和密码登录，因此您可以使用相同的模型（`EMABUser`）、类似的视图（`EMABEmailTextField`、`EMABPasswordTextField`\
  \ 和 `UITableView`）以及一个“登录”按钮。\n\n在请求 `Parse` 验证用户提供的信息之前，您需要像处理注册功能那样进行一些信息检查；例如，需要检查电子邮件是否有效、电子邮件长度是否符合最小长度要求，以及密码长度是否符合最小长度要求。您还需要设置一些辅助方法，其中之一将重复电子邮件验证方法。因此，将该方法移至\
  \ `EMABConstants` 中。\n\n来自 `Parse` 的关键登录 API 是 `+ (void)logInWithUsernameInBackground:(NSString\
  \ *)username password:(NSString *)password block:(PF_NULLABLE PFUserResultBlock)block`。\n\
  \n以下是实现代码：\n\n`EMABLoginViewController.m`\n\n```\n#import \"EMABLoginViewController.h\"\
  \n#import \"EMABConstants.h\"\n#import \"EMABUser.h\"\n#import \"EMABEmailTextField.h\"\
  \n#import \"EMABPasswordTextField.h\"\n\n@interface EMABLoginViewController ()<UITableViewDataSource,\
  \ UITableViewDelegate, UITextFieldDelegate>\n@property (nonatomic, strong) UITextField\
  \ *emailTextField;\n@property (nonatomic, strong) UITextField *passwordTextField;\n\
  @property (nonatomic, weak) IBOutlet UITableView *loginTableView;\n@end\n\n@implementation\
  \ EMABLoginViewController\n\n- (void)viewDidLoad {\n    [super viewDidLoad];\n \
  \   self.emailTextField = [[EMABEmailTextField alloc] initWithFrame:CGRectMake(kLeftMargin,\
  \ kTopMargin, kTextFieldWidth, kTextFieldHeight)];\n    self.emailTextField.delegate\
  \ = self;\n    self.passwordTextField = [[EMABPasswordTextField alloc] initWithFrame:CGRectMake(kLeftMargin,\
  \ kTopMargin, kTextFieldWidth, kTextFieldHeight)];\n    self.passwordTextField.delegate\
  \ = self;\n}\n\n-(IBAction)onLogin:(id)sender{\n    BOOL cont0 = [self.passwordTextField.text\
  \ length] > kMinTextLength;\n    BOOL cont1 = [self.emailTextField.text length]\
  \ > kMinTextLength;\n    BOOL cont2 = [EMABConstants isValidEmail:self.emailTextField.text];\n\
  \    if (!cont0) {\n        [self showWarning:NSLocalizedString(@\"Password at least\
  \ 6 characters.\", @\"Password at least 6 characters.\")];\n    }\n    if (!cont1)\
  \ {\n        [self showWarning:NSLocalizedString(@\"Email at least 6 characters.\"\
  , @\"Password at least 6 characters.\")];\n    }\n    if (!cont2) {\n        [self\
  \ showWarning:NSLocalizedString(@\"Doesn’t look like a valid email.\", @\"Doesn’t\
  \ look like a valid email.\")];\n    }\n    if (cont0 && cont1 && cont2) {\n   \
  \     [self.emailTextField resignFirstResponder];\n        [self.passwordTextField\
  \ resignFirstResponder];\n        [PFUser logInWithUsernameInBackground:self.emailTextField.text\
  \ password:self.passwordTextField.text\n            block:^(PFUser *user, NSError\
  \ *error) {\n            if (!error) {\n                [self dismissViewControllerAnimated:YES\
  \ completion:nil];\n            } else {\n                [self showWarning:[error\
  \ localizedDescription]];\n            }\n        }];\n    }\n}\n\n#pragma mark\
  \ - tableview datasource\n\n-(NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
  {\n    return 2;\n}\n\n-(NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n\
  {\n    return 1;\n}\n\n-(UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    UITableViewCell *cell = nil;\n    cell = [tableView dequeueReusableCellWithIdentifier:@\"\
  LoginCell\" forIndexPath:indexPath];\n    UITextField *textField = nil;\n    switch\
  \ (indexPath.row) {\n        case 0:\n            textField = self.emailTextField;\n\
  \            break;\n        case 1:\n            textField = self.passwordTextField;\n\
  \            break;\n        default:\n            break;\n    }\n    // make sure\
  \ this textfield's width matches the width of the cell\n    CGRect newFrame = textField.frame;\n\
  \    newFrame.size.width = CGRectGetWidth(cell.contentView.frame) - kLeftMargin*2;\n\
  \    textField.frame = newFrame;\n    // if the cell is ever resized, keep the textfield's\
  \ width to match the cell's width\n    textField.autoresizingMask = UIViewAutoresizingFlexibleWidth;\n\
  \    [cell.contentView addSubview:textField];\n    return cell;\n}\n\n-(void)tableView:(UITableView\
