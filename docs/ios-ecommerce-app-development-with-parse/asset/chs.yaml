  \n### 管理依赖：CocoaPods\n\n作为一名 iOS 开发者，你应该熟悉 CocoaPods。CocoaPods 是 Swift 和 Objective-C\
  \ 的 Cocoa 项目的依赖管理器。它拥有数千个库，可以帮助你优雅地扩展项目。\n\n如果你还没有在 Mac 电脑上安装 CocoaPods，现在是时候安装了；你将使用\
  \ CocoaPods 安装所有 Parse 相关的 SDK 和其他库。\n\n**注意**  \n访问 [`https://guides.cocoapods.org/using/getting-started.html#getting-started`](https://guides.cocoapods.org/using/getting-started.html#getting-started)\
  \ 可以开始使用 CocoaPods 并获取故障排除提示。\n\n通过在终端中运行以下命令来安装 CocoaPods：\n\n```\n$ sudo gem install\
  \ cocoapods\n```\n\n\n\n### 安装 Podfile\n\n你的 Podfile 包含了一些与 Parse 相关的库：Parse iOS\
  \ 核心 SDK、Parse UI iOS SDK、Facebook iOS SDK 和 ParseFacebookUtility iOS SDK。当前 Podfile\
  \ 的内容如下所示。\n\n```\nsource 'https://github.com/CocoaPods/Specs.git'\n\npod 'Parse'\n\
  pod 'ParseFacebookUtils'\npod 'Facebook-iOS-SDK'\npod 'ParseUI'\n```\n\n该 Podfile\
  \ 随第 4 章的源代码一同提供。安装完 Cocoapods 后，只需在项目目录中运行以下命令：\n\n`pod install`\n\n所有依赖的 SDK 将被自动拉取并添加到项目中。请注意，从现在开始，你需要使用在添加依赖\
  \ SDK 过程中生成的 `Xcworkspace` 文件。\n\n当你想将这些依赖 SDK 更新到最新版本时，只需在终端窗口中随时运行以下命令（只要时机合适）：\n\
  \n`pod update`\n\n### 实现进度指示器：SVProgressHud\n\n在 iOS 开发中，通常需要弹出消息来告知用户一些简单信息，例如内容已保存、发生错误等。iOS\
  \ 标准处理方式是使用 `UIAlertController`。例如，要向用户指示保存操作成功，可以使用以下代码：\n\n```\nUIAlertController*\
  \ alert = [UIAlertController alertControllerWithTitle:@\"成功\"\n                \
  \                                           message:@\"您的数据已保存。\"\n            \
  \                                        preferredStyle:UIAlertControllerStyleAlert];\n\
  \    UIAlertAction* defaultAction = [UIAlertAction actionWithTitle:@\"确定\" style:UIAlertActionStyleDefault\n\
  \                                                     handler:^(UIAlertAction *\
  \ action) {}];\n    [alert addAction:defaultAction];\n    [self presentViewController:alert\
  \ animated:YES completion:nil];\n```\n\n`UIAlertViewController` 的问题在于用户必须点击“确定”按钮才能关闭此提示。从实现角度来看，你需要在应用中反复编写相同的代码。\n\
  \n为了突出电商 iPhone 应用业务逻辑的实现，应尽可能少用依赖库。但我还是想介绍一下 `SVProgessHud` 库。`SVProgressHUD` 是一个简洁易用的\
  \ HUD，用于显示正在进行的任务的进度，或仅显示一条消息。显示成功消息：\n\n`[SVProgressHUD showSuccessWithStatus:@\"\
  保存成功\"];`\n\n显示错误消息：\n\n`[SVProgressHUD showErrorWithStatus:[error localizedDescription]];`\n\
  \n无论哪种情况，`SVProgressHud` 都会在三秒后自动消失。\n\n要显示数据加载状态并在加载完成后取消状态，你可以这样使用 `SVProgressHud`：\n\
  \n```\n[SVProgressHUD show];\n[product saveInBackgroundWithBlock:^(BOOL success,\
  \ NSError *error) {\n        [SVProgressHUD dismiss];\n        if (!error) {\n \
  \           [SVProgressHUD showSuccessWithStatus:@\"已保存\"];\n        } else {\n\
  \            [SVProgressHUD showErrorWithStatus:[error localizedDescription]];\n\
  \        }\n}];\n```\n\n现在，你可以编辑 Podfile 并添加 `SVProgressHud` 库依赖：\n\n`pod 'SVProgressHUD'`\n\
  \n然后再次更新 pods：\n\n`pod update`\n\n> **注意：** 要了解更多关于 `SVProgressHud` 的信息以及如何自定义其外观，请访问\
  \ [`github.com/TransitApp/SVProgressHUD`](https://github.com/TransitApp/SVProgressHUD)。\n\
  \n### 总结\n\n在本章中，我介绍了如何在 parse.com 上设置 Parse 项目。我还引入了一个自定义类来跟踪从 Parse.com、Stripe.com\
  \ 和 Mailgun.com 获得的重要密钥。我还简要介绍了如何申请 Facebook 开发者账户，然后设置与提议应用关联的 Facebook App ID。在本章的最后部分，我描述了本书将使用的\
  \ Podfile。\n\n## 5. 产品类别\n\n电子补充材料 本章的在线版本 (doi:[10.1007/978-1-4842-1317-9_5](http://dx.doi.org/10.1007/978-1-4842-1317-9_5))\
  \ 包含补充材料，仅提供给授权用户。\n\n本书附带的 Beauty & Me 示例应用以传统方式向用户展示产品。首先，我们让用户销售我们提供的所有品牌。如果你不认识任何品牌，我会编造一些，例如\
  \ Origins、NUDE Skincare 等。在每个品牌下，我们都有所有产品。当用户选择某个产品时，应用会显示该产品的详细信息。本章将介绍品牌，或者更通用的名称——产品类别。\n\
  \n在 iOS 应用开发中，模型-视图-控制器 (MVC) 是一种广泛使用的设计模式。我按照此 MVC 模式构建了后续章节：首先介绍用于实现所讨论功能的模型，然后是视图，最后是控制器（如果适用）。\n\
  \n在本章中，你将学习：\n\n- 产品类别模型\n- 类别视图 (`UITableViewCell`)\n- 类别控制器\n- 使用 `UIStoryboard`\
  \ 将模型、视图和控制器整合在一起\n- 在 Parse.com 中添加示例数据\n\n\n\n### 产品类别模型\n\n产品类别模型用于模拟化妆品品牌。一个品牌至少包含标题、标识、原产国以及关于该品牌的描述。在本文示例中，由于我只经营知名品牌，因此仅使用品牌标题和标识图片。\n\
  \n我已经在第 3 章中介绍了`PFObject`。你的类别模型将是`PFObject`的一个子类。继承`PFObject`需要指定一个`ParseClassName`。这个`ParseClassName`必须与你在\
  \ Parse 网站上设置的名称一致。换句话说，如果你在 Parse.com 的项目中创建了一个名为`Category`的模型类，那么你需要在子类文件中使用`\"\
  Category\"`作为`ParseClassName`。下面的示例代码展示了具体实现方法。\n\n首先，在`EMCAConstants.h`中注册一个`kCategory`字符串常量：\n\
  \n`extern NSString *const kCategory;`\n\n然后在`EMABConstants.m`文件中：\n\n`NSString *const\
  \ kCategory = @\"Category\";`\n\n接下来，创建一个`EMABCategory`子类来表示你的化妆品产品类别。该类有两个属性：`title`和`image`，分别代表品牌名称和标识。在第\
  \ 3 章中，我解释了如何创建`PFObject`子类——例如，使用`NSString`实例保存品牌标题，用`UIImage`保存标识。每个品牌的图片文件存储在\
  \ Parse 服务器上；你的 iOS 应用将获取该图片文件并转换为`UIImage`，然后通过`UIImageView`显示图片。在 iOS 开发中，从远程服务器加载图片文件始终是一项具有挑战性的任务。如果你想缓存图片文件以避免下次再次获取，还需要做更多工作。\n\
  \n由于这是 iOS 应用开发中常见的任务，Parse 通过引入一个名为`PFFile`的类简化了操作。我将很快用一个示例来演示使用该类如何让开发者的工作更轻松。目前，只需使用`PFFile`类来保存图片。\n\
  \niPhone 应用还将从 Parse 服务器获取所有产品类别。第 3 章介绍了`PFQuery`类。对于本文示例，你需要在`EMABCategory`子类中创建一个名为`+(PFQuery\
  \ *)basicQuery`的辅助类方法。\n\n以下是完整的`EMABCategory`头文件：\n\n`EMABCategory.h`\n\n```\n\
  #import <Parse/Parse.h>\n\n@interface EMABCategory : PFObject<PFSubclassing>\n\n\
  @property (nonatomic, copy) NSString *title;\n@property (nonatomic, strong) PFFile\
  \ *image;\n\n+(PFQuery *)basicQuery;\n\n@end\n```\n\n如果`PFObject`无法识别，请确认你已经包含了`#import\
  \ <Parse/Parse.h>`。\n\n`EMABCategory`的实现可能是本书中最简单的。除了导入该子类的头文件外，你还需要导入`\"EMABConstants.h\"\
  `，因为必需的`+(NSString *)ParseClassName`方法需要返回一个`NSString`。你可以这样编写：\n\n```\n+(NSString\
  \ *)parseClassName {\n    return @\"Category\";\n}\n```\n\n如果你在不同位置使用了`@\"Category\"\
  `模型类名，但后来想将其改为`@\"Brand\"`，你就需要在整个项目中查找并替换为`\"Brand\"`。使用全局常量有助于解决这个问题。你只需在`\"EMABConstants.m\"\
  `中将`\"Category\"`改为`\"Brand\"`一次即可。\n\n在`+(PFQuery *)basicQuery`的实现中，你通过使用`orderByAscending`方法按字母顺序对获取结果进行排序——这是\
  \ Parse 的另一个优势。设想你同时为 iOS、Android 或 Web 开发。如果你希望这三个平台具有相同的功能，由于后端通常没有排序功能，平台工程师需要编写自己的排序方法。\n\
  \n以下是完整的实现代码：\n\n`EMABCategory.m`\n\n```\n#import \"EMABCategory.h\"\n#import  <Parse/PFObject+Subclass.h>\n\
  #import   \"EMABConstants.h\"\n\n@implementation EMABCategory\n\n@dynamic title,\
  \ image;\n\n+(NSString *)parseClassName\n{\n    return kCategory;\n}\n\n+(PFQuery\
  \ *)basicQuery{\n    PFQuery *query = [PFQuery queryWithClassName:[self parseClassName]];\n\
  \    [query orderByAscending:@\"title\"];\n    return query;\n}\n\n@end\n```\n\n\
  ### 产品类别视图\n\n如第 2 章中示例应用的原型所示，使用`UITableViewController`来展示所有品牌。虽然`UITableView`本身看起来相当简单，但让界面更丰富的是每个`UITableViewCell`，如图\
  \ 5-1 所示。对于品牌部分，重点在于`UITableViewCell`。\n\n![A978-1-4842-1317-9_5_Fig1_HTML.jpg](img/A978-1-4842-1317-9_5_Fig1_HTML.jpg)\n\
  \n图 5-1. `EMABCategoryTableViewController`中的类别单元格\n\n`EMABCategory`有两个属性：`title`和`image`；而`EMABCategoryTableViewCell`作为`PFTableViewCell`的子类，也有两个属性来保存标题和图片：一个是`UILabel`，另一个是`PFImageView`。\n\
  \n你还希望将`EMABCategory`模型对象与`EMABCategoryTableViewCell`关联起来，因此创建一个辅助方法：`-(void)configureItem:(EMABCategory\
  \ *)item`。以下是完整的头文件：\n\n`EMABCategoryTableViewCell.h`\n\n```\n#import \"PFTableViewCell.h\"\
  \n@class EMABCategory;\n\n@interface EMABCategoryTableViewCell : PFTableViewCell\n\
  \n-(void)configureItem:(EMABCategory *)item;\n\n@end\n```\n\n如你所见，你没有在头文件中定义`UILabel`和`PFImageView`属性——而是在实现文件中定义它们。原因在于这些属性是私有的，无需让外部知道你在使用什么。另一方面，你的\
  \ UI 相当简单，为了保持代码整洁，你将使用`IBOutlet`将实现中的属性与主 UI 故事板关联起来。以下是`.m`文件中的接口类别：\n\n```\n\
  @interface EMABCategoryTableViewCell()\n\n@property (nonatomic, weak) IBOutlet PFImageView\
  \ *backgroundImageView;\n@property (nonatomic, weak) IBOutlet UILabel *titleLabel;\n\
  \n@end;\n```\n\n`titleLabel`将显示品牌标题。很简单，使用`self.titleLabel.text = item.title`即可。要显示品牌图片，你使用`PFImageView`和`PFFile`：\n\
  \n```\nself.backgroundImageView.file = item.image;\n[self.backgroundImageView loadInBackground];\n\
  ```\n\n神奇之处在于`[self.backgroundImageView loadInBackground]`。它自动处理异步图片加载、显示以及缓存。\n\
  \n以下是完整的实现代码：\n\n`EMABCategoryTableViewCell.m`\n\n```\n#import \"EMABCategoryTableViewCell.h\"\
  \n#import <ParseUI/PFImageView.h>\n#import \"EMABCategory.h\"\n\n@implementation\
  \ EMABCategoryTableViewCell\n\n-(void)configureItem:(EMABCategory *)item\n{\n  \
  \  self.titleLabel.text = item.title;\n    self.backgroundImageView.image = nil;\n\
  \    if (item.image) {\n        self.backgroundImageView.file = item.image;\n  \
  \      [self.backgroundImageView loadInBackground];\n    } else {\n        self.backgroundImageView.image\
  \ = [UIImage imageNamed:@\"category_cell_default_background\"];\n    }\n}\n\n@end\n\
  ```\n\n你可能会疑惑为什么我设置了`self.backgroundImageView.image = nil`。当`UITableView`重用其`UITableViewCell`时，旧的和屏幕外的单元格中的图片会在新图片加载替换之前显示。当你滚动`UITableView`时，你会看到奇怪的图片刷新现象。有几种不同的方法可以解决这个问题；一种方法是在`UITableViewCell`的`-(void)prepareForReuse`中处理，但为了简单起见，我们在`-(void)configureItem:(EMABCategory)item`中执行此操作。\n\
  \n\n\n### 产品类别控制器\n\n接下来，你将处理控制器部分。\n\n首先，创建一个名为 `EMABCategoriesTableViewController`\
  \ 的新类，并确保它是 `PFQueryTableViewController` 的子类。我在第 3 章中已经介绍过 `PFQueryTableViewController`。在这个视图控制器中，你将在\
  \ `EMABCategory` 类和 `EMABCateogryUITableViewCell` 之间建立一对一的映射。你还将使用诸如下拉刷新、分页以及在加载数据前后显示和隐藏加载活动指示器等特性。\n\
  \n以下是自动生成的头文件：\n\n`EMABCategoriesTableViewController.h`\n\n```\n#import <UIKit/UIKit.h>\n\
  #import <ParseUI/PFQueryTableViewController.h>\n\n@interface EMABCategoriesTableViewController\
  \ : PFQueryTableViewController\n\n@end\n```\n\n在 `.m` 实现文件中，首先导入必要的辅助文件，例如 `EMABConstants.h`、`EMABCategory.h`\
  \ 和 `EMABCategoryTableViewCell.h`。\n\n接下来，实现 `-(void)awakeFromNib` 方法。`parseClassName`、`objectsPerPage`\
  \ 和 `pullToRefreshEnabled` 是 `PFQueryTableViewController` 的属性，因此你可以直接使用它们并设置你想要的值。在本例中，`ParseClassName`\
  \ 由 `kCategory` 定义。你希望每页显示 10 个对象并启用下拉刷新。加载活动指示器将默认显示。\n\n```\n- (void)awakeFromNib\
  \ {\n    [super awakeFromNib];\n    self.parseClassName = kCategory;\n    self.paginationEnabled\
  \ = YES;\n    self.objectsPerPage = 10;\n    self.pullToRefreshEnabled = YES;\n\
  }\n```\n\n请记住，你正在使用 Storyboard 初始化你的视图控制器，因此 `-(void)awakeFromNib` 方法是启用下拉刷新、分页等功能的合适位置。如果你使用其他方式，例如\
  \ `-(instancetype)initWithStyle:(UITableViewStyle)style`，那么该方法则是你设置 `ParseClassName`、分页等属性的地方。\n\
  \n接下来，你需要让 `PFQueryTableViewController` 的子类知道需要执行哪种查询。你需要实现 `-(PFQuery *)queryForTable`\
  \ 方法。在 `EMABCategory` 类中，你已经定义了一个名为 `+(PFQuery *)basicQuery` 的辅助方法。现在你可以直接使用它。\n\
  \n```\nPFQuery *query = [EMABCategory basicQuery];\n```\n\n或者，你也可以直接使用默认实现：\n\n\
  ```\nPFQuery *query = [PFQuery queryWithClassName:self.parseClassName];\n[query\
  \ orderByAscending:@\"title\"];\n```\n\n如果你最终需要多次使用相同的代码，那么在 `EMABCategory` 类中实现它更有意义。\n\
  \n接下来，`PFQuery` 还提供一个方法来管理缓存策略：`kPFCachePolicyCacheThenNetwork`。这个策略的含义不言而喻。请记住，当使用\
  \ `kPFCachePolicyCacheThenNetwork` 作为缓存策略时，你的回调总是会触发两次。这是因为该策略是先使用缓存，然后访问网络，而不是只使用缓存。还有其他缓存选项，例如\
  \ `kPFCachePolicyIgnoreCache`、`kPFCachePolicyCacheOnly`、`kPFCachePolicyNetworkOnly`、`kPFCachePolicyCacheElseNetwork`、`kPFCachePolicyNetworkElseCache`\
  \ 和 `kPFCachePolicyCacheThenNetwork`。\n\n```\nif ([self.objects count] == 0) {\n\
  \    query.cachePolicy = kPFCachePolicyCacheThenNetwork;\n}\n```\n\n`-(PFQuery *)queryForTable`\
  \ 的完整实现如下：\n\n```\n-(PFQuery *)queryForTable {\n    PFQuery *query = [EMABCategory\
  \ basicQuery];\n    if ([self.objects count] == 0) {\n        query.cachePolicy\
  \ = kPFCachePolicyCacheThenNetwork;\n    }\n    return query;\n}\n```\n\n接下来，实现\
  \ `PFQueryTableViewController` 的数据源方法。首先，你想要扩展默认的单元格高度，因此将每个单元格的高度设置为 60 点：\n\n\
  ```\n-(CGFloat)tableView:(UITableView *)tableView heightForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    return 60.0;\n}\n```\n\n`PFQueryTableViewController` 已经重写了标准\
  \ `UITableView` 的 `-tableView:cellForRowAtIndexPath:` 方法。具体来说，是 `-tableView:cellForRowAtIndexPath:object:`\
  \ 方法。传统上，你需要对象数组。然后你使用 `indexPath.row` 来获取每一行的对象。现在，你可以自动获得这个对象。\n\n然而，这个重写方法假设你将向每一行提供一个对象，并且只有一个\
  \ section。如果你有多个 section，这个方法将无法自动工作。\n\n由于你还启用了分页，并且每页有 10 个对象，因此每个单元格都将配置一个项目。为此，你使用\
  \ `EMABCategoryTableViewCell` 的方法 `-(void)configureItem:(EMABCategory *)item`。\n\
  \n你还需要一种加载下一页的方法。这里，你在 10 个对象之后添加了一个额外的单元格。这个单元格的标题是“加载更多…”。如果用户点击此单元格，应用程序将再加载\
  \ 10 个对象或一页。\n\n以下是完整的实现：\n\n```\n- (EMABCategoryTableViewCell *)tableView:(UITableView\
  \ *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath object:(EMABCategory\
  \ *)object{\n    EMABCategoryTableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@\"\
  CategoryCell\" forIndexPath:indexPath];\n    if (indexPath.row == [[self objects]\
  \ count]) {\n        cell.textLabel.text = NSLocalizedString(@\"Load More…\", @\"\
  \");\n    } else {\n        [cell configureItem:object];\n    }\n    return cell;\n\
  }\n```\n\n最后一步是处理用户点击“加载更多…”以及其他 `CategoryCell` 的情况。当“加载更多…”单元格被点击时，另外 10 个对象将被加载并显示在表格中。幸运的是，Parse\
  \ 已经为你准备好了这个方法。只需调用 `-(void)loadNextPage` 方法即可。\n\n单击品牌单元格会显示该品牌下的所有产品（我将在下一章中对此进行更详细的讨论）。\n\
  \n以下是完整的实现：\n\n```\n-(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
  \ *)indexPath{\n    if (indexPath.row == [[self objects] count]) {\n        [self\
  \ loadNextPage];\n    } else {\n        //待办\n    }\n}\n```\n\n这些就是所有的代码部分。但是你还需要在\
  \ `UIStoryboard` 中做一些额外的工作。\n\n### 整合所有内容：UIStoryboard\n\n首先，你需要将在第 2 章中介绍的品牌 `UITableViewController`\
