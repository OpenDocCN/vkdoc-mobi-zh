  \ 会从用户的信用卡中扣款，并将资金（扣除少量服务费后）转入你的银行账户。服务费金额根据你的地理位置计算。例如，在编写本文时，美国的费用标准是每笔成功交易收取\
  \ 2.4% + 20 美分。没有月费、退款手续费或隐藏费用。如果你还没有注册，现在正是注册 Stripe 的好时机。\n\n**注意**  \n更多关于 Stripe\
