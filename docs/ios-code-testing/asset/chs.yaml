  \            return false\n        }\n        guard let regexValidator = try? NSRegularExpression(pattern:\
  \ \"([A-Z0-9._%+-]+@[A-Z0-9.-]+\\\\.[A-Z]{2,4})\", options: .caseInsensitive) else\
  \ {\n            return false\n        }\n        if regexValidator.numberOfMatches(in:\
  \ value,\n                                        options: NSRegularExpression.MatchingOptions.reportCompletion,\n\
