  - 团队: 无

  - 组织名称: 提供一个合适的名称

  - 组织标识符: 提供一个合适的标识符

  - 语言: `Swift`

  - 设备: iPhone

  - 使用 Core Data: 取消勾选

  - 包含单元测试: 勾选

  - 包含 UI 测试: 取消勾选


  在项目位置对话框中，选择一个空文件夹，并确保已勾选**创建 Git 仓库**选项（图 11-17）。


