  \n你可能已经注意到，我没有为这个过渡创建任何单元测试。UI 过渡更适合使用 UI 测试进行验证。UI 测试将在第 13 章中介绍。\n\n## 本章小结\n\n\
  在本章中，你学习了如何使用 TDD 技术和 MVVM 模式创建视图控制器。你首先创建了用户界面和模型层对象，然后为登录和注册界面构建了视图模型，最后将视图控制器连接到了视图模型。\n\
