- "# 6. 对集合视图控制器应用 TDD\n\n本章将探讨如何使用 TDD 技术构建基于集合视图控制器的 iOS 应用。该应用将包含一个显示图片列表的单一视图控制器，并采用\
  \ MVVM 应用架构进行构建。图 6-1 展示了完成后的应用程序用户界面。\n\n![A432412_1_En_6_Fig1_HTML.jpg](img/A432412_1_En_6_Fig1_HTML.jpg)\n\
  \n**图 6-1.** PhotoBook 应用\n\n该应用的完整源代码可通过以下 URL 从 GitHub 匿名下载：\n\n[`https://github.com/asmtechnology/Lesson06.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson06.iOSTesting.2017.Apress.git)\n\
  \n## 应用架构\n\n应用架构由三个不同的层级组成（见图 6-2）。\n\n![A432412_1_En_6_Fig2_HTML.jpg](img/A432412_1_En_6_Fig2_HTML.jpg)\n\
  \n**图 6-2.** PhotoBook 应用架构\n\n以下是对各层级及其组件类的简要说明：\n\n* **模型层：** 包含 `Photo`、`City`\
  \ 和 `Album` 类，用于存储将展示给用户的数据。`Album` 是顶层对象，包含多个城市，每个城市又包含在该城市拍摄的一张或多张照片。\n* **视图模型层：**\
  \ 包含 `CollectionViewModel`、`CollectionViewCellViewModel` 和 `CollectionViewSectionHeaderViewModel`\
  \ 类。\n* **视图/视图控制器层：** 该层包含项目的用户界面，由 `CollectionViewController`、`CollectionViewCell`\
  \ 和 `CollectionViewSectionHeader` 类组成。\n\n## 创建 Xcode 项目\n\n启动 Xcode，基于**单视图应用**模板创建一个新的\
  \ iOS 项目。创建新项目时请使用以下选项（见图 6-3）：\n\n![A432412_1_En_6_Fig3_HTML.jpg](img/A432412_1_En_6_Fig3_HTML.jpg)\n\
  \n**图 6-3.** Xcode 项目选项对话框\n\n* **产品名称：** `PhotoBook`\n* **团队：** `无`\n* **组织名称：**\
  \ 提供一个合适的名称\n* **组织标识符：** 提供一个合适的标识符\n* **语言：** `Swift`\n* **设备：** `iPhone`\n* **使用\
  \ Core Data：** `取消勾选`\n* **包含单元测试：** `勾选`\n* **包含 UI 测试：** `取消勾选`\n\n> **注意：** 本章创建的项目不包含用户界面\
  \ (UI) 测试。如有需要，你可以在后续步骤中向项目添加 UI 测试。第 13 章涵盖了用户界面测试的主题。\n\n将项目保存到计算机上的合适位置，然后点击**创建**。由于该项目将包含多个新类，建议将类文件放置在项目导航器中相应的组目录下。\n\
  \n在 Xcode 项目导航器中创建以下组：\n\n* `View`\n* `Model`\n* `ViewModel`\n* `Protocols`\n\n\n\
  \n## 向项目添加资源\n\n从项目导航器中删除 `Assets.xcassets` 文件夹。当 Xcode 提示时，确保选择**移至废纸篓**选项。\n\n\
  将本课程下载内容中提供的 `Albums.plist` 和 `Assets.xcassets` 文件夹添加到项目中。在添加这些新项目时，确保在导入对话框中勾选了**如果需要则复制项目**选项（见图\
  \ 6-4）。\n\n![A432412_1_En_6_Fig4_HTML.jpg](img/A432412_1_En_6_Fig4_HTML.jpg)\n\n\
  **图 6-4.** Xcode 文件导入对话框\n\n您导入的资源包包含了按六个城市分类的照片，每个城市由资源包内的一个子文件夹表示（见图 6-5）。\n\n\
  ![A432412_1_En_6_Fig5_HTML.jpg](img/A432412_1_En_6_Fig5_HTML.jpg)\n\n**图 6-5.**\
  \ PhotoBook 资源包\n\n您可能还注意到资源未提供 1X 图片。这是因为此应用仅针对 iPhone 构建，且非 Retina 屏的 iPhone 不支持最新的\
  \ iOS 版本。\n\n## 构建用户界面层\n\n此应用程序的用户界面由一个嵌入在导航控制器中的故事板场景组成（见图 6-6）。\n\n![A432412_1_En_6_Fig6_HTML.jpg](img/A432412_1_En_6_Fig6_HTML.jpg)\n\
  \n**图 6-6.** 应用故事板\n\n### 创建新类\n\n从项目导航器中删除 `ViewController.swift` 文件，并在 **View**\
  \ 组下创建以下 Swift 类：\n\n- 一个名为 `CollectionViewController` 的 `UICollectionViewController`\
  \ 子类。\n- 一个名为 `CollectionViewCell` 的 `UICollectionViewCell` 子类。\n- 一个名为 `CollectionViewSectionHeader`\
  \ 的 `UICollectionReusableView` 子类。\n\n确保这些类同时包含在 `PhotoBook` 和 `PhotoBookTests`\
  \ 目标中。项目导航器应类似于图 6-7。\n\n![A432412_1_En_6_Fig7_HTML.jpg](img/A432412_1_En_6_Fig7_HTML.jpg)\n\
  \n**图 6-7.** PhotoBook 项目的 Xcode 项目导航器\n\n### 构建集合视图控制器场景\n\n打开 `Main.storyboard`\
  \ 文件，并删除故事板中的默认场景。从对象库中拖放一个**集合视图控制器**到故事板场景中（见图 6-8）。\n\n![A432412_1_En_6_Fig8_HTML.jpg](img/A432412_1_En_6_Fig8_HTML.jpg)\n\
  \n**图 6-8.** 包含集合视图控制器的故事板场景\n\n选中集合视图控制器场景后，使用**身份检查器**将与该场景关联的类更改为 `CollectionViewController`（见图\
  \ 6-9）。\n\n![A432412_1_En_6_Fig9_HTML.jpg](img/A432412_1_En_6_Fig9_HTML.jpg)\n\n\
  **图 6-9.** 应用于故事板场景的自定义类\n\n选中集合视图控制器场景后，切换到**属性检查器**并勾选**是初始视图控制器**选项（见图 6-10）。\n\
  \n![A432412_1_En_6_Fig10_HTML.jpg](img/A432412_1_En_6_Fig10_HTML.jpg)\n\n**图 6-10.**\
  \ Xcode 属性检查器\n\n### 添加分区头部辅助视图\n\n选择集合视图控制器场景中的集合视图，并使用**属性检查器**启用**分区头部**辅助视图（见图\
  \ 6-11）。\n\n![A432412_1_En_6_Fig11_HTML.jpg](img/A432412_1_En_6_Fig11_HTML.jpg)\n\
  \n**图 6-11.** 通过属性检查器启用分区头部辅助视图\n\n选中集合视图后，切换到**尺寸检查器**并将单元格大小更改为宽度 = 250，高度 = 200。将头部的高度更改为\
  \ 25（见图 6-12）。\n\n![A432412_1_En_6_Fig12_HTML.jpg](img/A432412_1_En_6_Fig12_HTML.jpg)\n\
  \n**图 6-12.** Xcode 尺寸检查器\n\n选择集合视图头部辅助视图（在文档大纲中标识为**集合可复用视图**），并使用**身份检查器**将与头部辅助视图关联的类更改为\
  \ `CollectionViewSectionHeader`（见图 6-13）。\n\n![A432412_1_En_6_Fig13_HTML.jpg](img/A432412_1_En_6_Fig13_HTML.jpg)\n\
  \n**图 6-13.** 头部辅助视图的自定义类设置\n\n使用**属性检查器**将头部辅助视图的背景颜色更改为灰色调，并将**标识符**属性的值更改为 `CollectionViewSectionHeader`。\n\
  \n从对象库中拖放一个标签到头部辅助视图上，并将其定位为类似图 6-14 所示。为标签使用适当的约束，以在不同屏幕尺寸上保持此位置。将标签中文本的字体大小设置为\
  \ 14 磅。见图 6-14。\n\n![A432412_1_En_6_Fig14_HTML.jpg](img/A432412_1_En_6_Fig14_HTML.jpg)\n\
  \n**图 6-14.** 头部辅助视图上的约束\n\n使用**助理编辑器**在 `CollectionViewSectionHeader.swift` 文件中为标签创建一个插座。将此插座命名为\
  \ `title`。`CollectionViewSectionHeader.swift` 中的代码应类似于代码清单 6-1。\n\n```\nimport UIKit\n\
  class CollectionViewSectionHeader: UICollectionReusableView {\n    @IBOutlet weak\
  \ var title: UILabel!\n}\n```\n\n**代码清单 6-1.** `CollectionViewSectionHeader.swift`\n\
  \n\n\n### 构建集合视图单元格\n\n返回故事板，选中集合视图单元格，然后使用身份检查器将集合视图单元格关联的类修改为 `CollectionViewCell`。切换到属性检查器，将标识属性的值更改为\
  \ `CollectionViewCell`。\n\n使用对象库，将一个图片视图拖放到空的集合视图单元格上。使用属性检查器将图片视图的内容模式设置为“Aspect\
  \ Fill”。定位图片视图并设置合适的布局约束，使其与图 6-15 相似。\n\n![A432412_1_En_6_Fig15_HTML.jpg](img/A432412_1_En_6_Fig15_HTML.jpg)\n\
  \n图 6-15. 向集合视图单元格添加图片视图\n\n使用对象库，将一个空的视图拖放到集合视图单元格中，位于图片视图的上方。使用属性检查器将该视图的背景色设置为黑色，不透明度为\
  \ 40%。定位新视图并设置合适的布局约束，使其与图 6-16 相似。\n\n![A432412_1_En_6_Fig16_HTML.jpg](img/A432412_1_En_6_Fig16_HTML.jpg)\n\
  \n图 6-16. 向集合视图单元格添加半透明视图\n\n从对象库中拖放两个标签到您刚创建的视图上。确保这两个标签被该视图包含，并将标签上下放置（见图 6-17）。\n\
  \n![A432412_1_En_6_Fig17_HTML.jpg](img/A432412_1_En_6_Fig17_HTML.jpg)\n\n图 6-17.\
  \ 向集合视图单元格添加标签\n\n使用属性检查器，为上方的标签应用以下属性：\n\n- 前景色：白色\n- 字号：14 点\n- 行数：2\n\n使用“Pin\
  \ constraints”按钮，为上方的标签应用以下约束：\n\n- 左边距：2\n- 上边距：2\n- 下边距：2\n- 右边距：2\n- 约束到边距：取消勾选\n\
  - 更新帧：无\n\n使用属性检查器，为下方的标签应用以下属性：\n\n- 前景色：蓝色\n- 字号：17 点\n- 行数：1\n- 文本对齐：右对齐\n\n\
  使用“Pin constraints”按钮，为下方的标签应用以下约束：\n\n- 左边距：2\n- 下边距：2\n- 右边距：2\n- 高度：15\n- 约束到边距：取消勾选\n\
  - 更新帧：容器内的所有帧\n\n故事板现在应类似于图 6-18。\n\n![A432412_1_En_6_Fig18_HTML.jpg](img/A432412_1_En_6_Fig18_HTML.jpg)\n\
  \n图 6-18. 添加约束后的故事板场景\n\n使用助理编辑器，在 `CollectionViewCell.swift` 文件中为图片视图和标签创建插座变量，如表\
  \ 6-1 所示。\n\n表 6-1. 集合视图单元格的插座变量\n\n| 用户界面对象 | 插座变量名称 |\n|-----------------------|-------------|\n\
  | 图片视图 | `imageView` |\n| 上方标签 | `captionLabel` |\n| 下方标签 | `shotDetailsLabel` |\n\
  \n`CollectionViewCell.swift` 中的代码应如代码清单 6-2 所示。\n\n```swift\nimport UIKit\n\nclass\
  \ CollectionViewCell: UICollectionViewCell {\n    @IBOutlet weak var imageView:\
  \ UIImageView!\n    @IBOutlet weak var captionLabel: UILabel!\n    @IBOutlet weak\
  \ var shotDetailsLabel: UILabel!\n}\n```\n\n代码清单 6-2. `CollectionViewCell.swift`\n\
  \n选中故事板的集合视图控制器场景，通过菜单项“编辑器 ➤ 嵌入 ➤ 导航控制器”将其嵌入到一个导航控制器中。最终的故事板应类似于图 6-19。\n\n![A432412_1_En_6_Fig19_HTML.jpg](img/A432412_1_En_6_Fig19_HTML.jpg)\n\
  \n图 6-19. 嵌入在导航控制器内的集合视图控制器场景\n\n## 构建模型层\n\n我们需要构建三个模型类：`Photo`、`City` 和 `Album`。这些类之间的关系如图\
  \ 6-20 所示。`Album` 对象是顶层模型对象。一个 `Album` 对象包含一个 `City` 对象数组，每个 `City` 对象又包含一个 `Photo`\
  \ 对象数组。`Photo` 对象存储单个照片的元数据，以及项目中可以从资源目录加载实际图片的资源名称。\n\n![A432412_1_En_6_Fig20_HTML.jpg](img/A432412_1_En_6_Fig20_HTML.jpg)\n\
  \n图 6-20. 模型层类\n\n### Photo 类\n\n`Photo` 类包含存储单个照片信息的属性。表 6-2 列出了 `Photo` 类预期的属性和方法。\n\
  \n表 6-2. Photo 属性和方法\n\n| 项目 | 类型 | 描述 |\n|------|------|-------------|\n| `var\
  \ imageName:String?` | 变量 | 项目资源目录中包含该图片的资源名称。 |\n| `var aperture:String?` | 变量\
  \ | 摄影师使用的光圈设置。 |\n| `var shutterSpeed:String?` | 变量 | 摄影师使用的快门速度设置。 |\n| `var iso:String?`\
  \ | 变量 | 摄影师使用的 ISO 设置。 |\n| `var comments:String?` | 变量 | 摄影师的评论。 |\n| `init?(_\
  \ dictionary:[String : AnyObject]?)` | 方法 | 允许其他代码创建 `Photo` 实例。需要一个包含特定必填键的字典作为输入。\
  \ |\n\n`init` 方法需要一个包含以下所有必填键的字典作为输入：\n\n- `imageName`\n- `aperture`\n- `shutterSpeed`\n\
  - `iso`\n- `comment`\n\n开发 `Photo` 类的方法将与第 4 章中开发的模型层类非常相似。测试将围绕 `init` 方法的行为以及它如何处理字典中缺失键的情况。\n\
  \n完整的 `Photo` 类如代码清单 6-3 所示。如果您想查看测试代码，可以通过以下 URL 从 github 匿名下载已完成的项目：\n\n[`https://github.com/asmtechnology/Lesson06.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson06.iOSTesting.2017.Apress.git)\n\
  \n```swift\nimport Foundation\n\nclass Photo: NSObject {\n    var imageName:String?\n\
  \    var aperture:String?\n    var shutterSpeed:String?\n    var iso:String?\n \
  \   var comments:String?\n\n    let imageNameKey = \"imageName\"\n    let apertureKey\
  \ = \"aperture\"\n    let shutterSpeedKey = \"shutterSpeed\"\n    let isoKey = \"\
  iso\"\n    let commentKey = \"comment\"\n\n    init?(_ dictionary:[String : AnyObject]?)\
  \ {\n        guard let dictionary = dictionary,\n            let imageName = dictionary[imageNameKey]\
  \ as? String,\n            let aperture = dictionary[apertureKey] as? String,\n\
  \            let shutterSpeed = dictionary[shutterSpeedKey] as? String,\n      \
  \      let iso = dictionary[isoKey] as? String,\n            let comments = dictionary[commentKey]\
  \  as? String else {\n                return nil\n        }\n        super.init()\n\
  \        self.imageName = imageName\n        self.aperture = aperture\n        self.shutterSpeed\
  \ = shutterSpeed\n        self.iso = iso\n        self.comments = comments\n   \
  \ }\n}\n```\n\n代码清单 6-3. `Photo.swift`\n\n\n\n### `City` 类\n\n`City` 类包含用于存储城市信息以及在该城市拍摄的照片的属性。表\
  \ 6-3 列出了 `City` 类应具备的属性和方法。\n\n**表 6-3.** City 类的属性和方法\n\n| 项目 | 类型 | 描述 |\n| ---\
  \ | --- | --- |\n| `var cityName:String?` | 变量 | 城市名称。此字段不进行任何验证。 |\n| `var photos:[Photo]?`\
  \ | 变量 | `Photo` 对象的数组。每张照片均拍摄于同一城市。 |\n| `init?(_ dictionary:[String : AnyObject]?)`\
  \ | 方法 | 允许其他代码创建 `City` 实例。需要包含某些必需键的字典作为输入。 |\n\n`init` 方法需要一个包含以下所有必需键的字典：\n\n\
  - `city`\n- `photos`\n\n完整的 `City` 类如代码清单 6-4 所示。如果您想查看测试代码，可通过以下 URL 从 GitHub 匿名下载已完成的项目：\n\
  \n[`https://github.com/asmtechnology/Lesson06.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson06.iOSTesting.2017.Apress.git)\n\
  \n```\nimport Foundation\nclass City: NSObject {\nvar cityName:String?\nvar photos:[Photo]?\n\
  let cityKey = \"city\"\nlet photosKey = \"photos\"\ninit?(_ dictionary:[String:AnyObject]?)\
  \ {\nguard let dictionary = dictionary,\nlet cityName = dictionary[cityKey] as?\
  \ String,\nlet array = dictionary[photosKey] as? [AnyObject] else {\nreturn nil\n\
  }\nsuper.init()\nself.cityName = cityName\nself.photos = [Photo]()\nfor item in\
  \ array {\nguard let dictionary = item as? [String : AnyObject] else {\ncontinue\n\
  }\nif let photo = Photo(dictionary) {\nphotos?.append(photo)\n}\n}\n}\n}\n```\n\n\
  **代码清单 6-4.** `City.swift`\n\n### `Album` 类\n\n`Album` 类包含用于存储城市实例集合信息的属性。该专辑是本项目的顶层模型对象。表\
  \ 6-4 列出了 `Album` 类应具备的属性和方法。\n\n**表 6-4.** Album 类的属性和方法\n\n| 项目 | 类型 | 描述 |\n\
  | --- | --- | --- |\n| `var cities:[City]?` | 变量 | `City` 对象的数组。 |\n| `init()` |\
  \ 方法 | 允许其他代码创建 `Album` 实例。 |\n| `func load(filePath:String?) -> Void` | 方法 | 用于加载\
  \ plist 文件并递归创建模型层对象。 |\n\n提供 `load` 方法是为了让您的应用能够加载 `Albums.plist` 文件，并根据 plist\
  \ 文件的内容创建 `City` 对象。\n\n完整的 `Album` 类如代码清单 6-5 所示。如果您想查看测试代码，可通过以下 URL 从 GitHub\
  \ 匿名下载已完成的项目：\n\n[`https://github.com/asmtechnology/Lesson06.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson06.iOSTesting.2017.Apress.git)\n\
  \n```\nimport Foundation\nclass Album: NSObject {\nvar cities:[City]?\noverride\
  \ init() {\nsuper.init()\nif cities == nil {\ncities = [City]()\n}\n}\nfunc load(filePath:String?)\
  \ -> Void {\nguard let filePath = filePath,\nlet array = NSArray(contentsOfFile:\
  \ filePath) as? [AnyObject] else {\nreturn\n}\nfor item in array {\nguard let dictionary\
  \ = item as? [String : AnyObject] else {\ncontinue\n}\nif let city = City(dictionary)\
  \ {\ncities?.append(city)\n}\n}\n}\n}\n```\n\n**代码清单 6-5.** `Album.swift`\n\n##\
  \ 构建 ViewModel 层\n\n我们需要构建三个视图模型类：\n\n- `CollectionViewModel`，\n- `CollectionViewCellViewModel`，以及\n\
  - `CollectionViewSectionHeaderViewModel`。\n\n它们分别对应于 `CollectionViewController`、`CollectionViewCell`\
  \ 和 `CollectionViewSectionHeader` 类。\n\n这些视图模型将使用协议来建立接口，以便它们能够与各自的视图控制器进行通信。\n\n\
  ### `CollectionViewModel` 类\n\n`CollectionViewModel` 类代表 `CollectionViewController`\
  \ 类与 `Album` 模型对象之间的视图模型。\n\n在项目浏览器中的 `PhotoBookTests` 组下，创建一个名为 `CollectionViewModelTests`\
  \ 的新 iOS 单元测试用例类。确保这个新文件仅属于 `PhotoBookTests` 目标。\n\n从 `CollectionViewModelTests.swift`\
  \ 中删除 `testExample` 和 `testPerformanceExample` 方法。创建一个名为 `testInit_ValidView_InstantiatesObject()`\
  \ 的新单元测试方法，放在单独的扩展中，并将以下代码添加到方法体中：\n\n```\nfunc testInit_ValidView_InstantiatesObject()\
  \ {\nlet viewModel = CollectionViewModel(view:mockCollectionViewController!)\nXCTAssertNotNil(viewModel)\n\
  }\n```\n\n在 `CollectionViewModelTests` 类的顶部添加以下变量声明：\n\n```\nfileprivate var mockCollectionViewController:MockCollectionViewController?\n\
