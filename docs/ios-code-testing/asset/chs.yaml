  \ 的新 iOS 单元测试用例类。\n\n从 `LoginViewControllerTests.swift` 中删除 `testExample` 和 `testPerformanceExample`\
  \ 方法。\n\n\n\n### 从视图控制器调用视图模型的 `performInitialSetup` 方法\n\n将以下测试用例添加到 `LoginViewControllerTests.swift`\
