  \  \n*图 9-27. Xcode 方案*\n\n为您想要共享的方案选中共享复选框，提交更改，并推送提交（如果您使用的是 `Git` 仓库）。\n\n共享方案后，您可以使用\
  \ `Product ➤ Create Bot` 菜单项创建一个 bot。输入一个有助于您识别该 bot 的名称，选择一个 `Xcode Server` 实例（图\
