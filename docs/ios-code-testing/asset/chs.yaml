  viewModel.login(userName: validUserName, password: validPassword)\nself.waitForExpectations(timeout:\
  \ 1.0, handler: nil)\n}\nfunc testLogin_ValidParameters_Calls_doLoginWithExpectedUserName_OnLoginController()\
