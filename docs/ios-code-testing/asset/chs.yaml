- "# 7. 测试 URLSession\n\n本章将探讨将 TDD 技术应用于应用网络层的流程。iOS 开发者可使用多种类型的网络技术。本章仅涵盖使用 `URLSession`\
  \ 类进行网络通信。`URLSession` 连接使你能够便捷地通过 HTTP 连接下载资源。\n\n本章将修改第 6 章中构建的 `PhotoBook` 应用。修改后的应用版本将从互联网上的服务器下载图片和元数据，而不是使用捆绑资源及\
  \ `.plist` 文件。\n\n应用的用户界面没有变化。图 7-1 展示了完成版应用的用户界面（与第 6 章末尾的 `PhotoBook` 应用相同）。\n\
  \n![A432412_1_En_7_Fig1_HTML.jpg](img/A432412_1_En_7_Fig1_HTML.jpg)\n\n图 7-1. `PhotoBook`\
  \ 应用的用户界面\n\n应用的完整源代码可通过以下 URL 从 Github 匿名下载：\n\n[`https://github.com/asmtechnology/Lesson07.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson07.iOSTesting.2017.Apress.git)\n\
  \n修改后的应用架构包含一个额外的网络层（见图 7-2）。\n\n![A432412_1_En_7_Fig2_HTML.jpg](img/A432412_1_En_7_Fig2_HTML.jpg)\n\
  \n图 7-2. 包含网络层的修改版应用架构\n\n以下是对各层及其组件类的简要说明：\n\n*   **模型层**：包含 `Photo`、`City` 和 `Album`\
  \ 类。\n*   **视图模型层**：包含 `CollectionViewModel`、`CollectionViewCellViewModel` 和 `CollectionViewSectionHeaderViewModel`\
  \ 类。\n*   **视图/视图控制器层**：包含 `CollectionViewController`、`CollectionViewCell` 和 `CollectionViewSectionHeader`\
  \ 类。\n*   **网络层**：包含 `ServiceController` 类，该类提供了便捷方法，用于从后端 RESTful JSON Web 服务异步下载图片和元数据。\n\
  \n## 测试网络层的策略\n\n有两种常见的测试网络代码的方法：\n\n*   **异步测试技术**：依赖于向服务器发起实际的网络调用，并使用 `XCTest`\
  \ 的 `waitForExpectations(timeout)` 方法等待几秒钟，让网络服务做出响应。\n*   **基于模拟/桩的测试技术**：依赖于创建模拟对象或桩对象，完全替代\
  \ HTTP 调用。\n\n异步测试技术的主要缺点是对外部组件（Web 资源）的固有依赖。一个暂时无法访问的 Web 资源，或是比平时更差的连接速度，都可能导致测试失败。依赖异步测试技术来测试网络代码的测试极其脆弱，执行时间更长，并且常常由于\
  \ Web 服务暂时不可访问的问题而失败。\n\n基于模拟/桩的技术没有异步测试技术的这些缺点。只要预先商定共同的 Web 服务规范，它们允许你在服务器端开发的同时并行创建客户端代码。基于模拟/桩的技术的主要缺点在于它们与实际的\
  \ Web 服务本质上是脱节的，Web 服务可能会完全改变，但由于桩未更新，测试仍会继续通过。\n\n测试网络层是为了确保应用以正确的参数调用正确的 API 端点，并确保应用能够处理响应。使用模拟/桩可以轻松实现这一点，这也将是本章采用的方法。\n\
  \n## 准备 `PhotoBook` 项目\n\n复制在第 6 章中创建的 `PhotoBook` Xcode 项目，并在 Xcode 中打开该副本。\n\n\
  在项目导航器中找到以下文件并将其删除（见图 7-3）。\n\n![A432412_1_En_7_Fig3_HTML.jpg](img/A432412_1_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3. 需要从项目中删除的文件\n\n*   `Albums.plist`\n*   `ValidAlbum.plist`\n*   `InvalidAlbum.plist`\n\
  *   `InvalidAlbum2.plist`\n*   `EmptyAlbum.plist`\n\n删除项目资源包中的所有资源，但不要删除资源包本身。资源包在项目导航器中称为\
  \ `Assets.xcassets`（见图 7-4）。\n\n![A432412_1_En_7_Fig4_HTML.jpg](img/A432412_1_En_7_Fig4_HTML.jpg)\n\
  \n图 7-4. 需要从项目中删除的资源\n\n\n\n### 远程内容规范\n\n为了让 PhotoBook 应用能够从互联网下载内容，你需要了解这些内容的具体形式及其存放位置。\n\
  \n假设你的服务器端团队告知你，他们将提供一个存放城市和照片元数据的 JSON 文件，以及每张照片对应的 JPEG 文件。\n\n这个 JSON 文件名为`albumlist.json`，它将与相关的\
  \ JPEG 图片一同存储在远程服务器的同一目录下。该服务器不支持 SSL，服务器上该目录的 URL 如下：\n\n[`http://www.asmtechnology.com/apress2017/`](http://www.asmtechnology.com/apress2017/)\n\
  \n包含有效数据的示例 JSON 文件已经存放在本章代码下载附带的`Resources`目录中，以下是该文件的部分内容：\n\n```\n[\n{\n\"city\"\
  : \"维也纳（奥地利）\",\n\"photos\": [\n{\n\"imageName\": \"v1.jpg\",\n\"aperture\": \"\
  f2.8\",\n\"shutterSpeed\": \"400\",\n\"iso\": \"100\",\n\"comment\": \"维也纳周末市场的\
  \ HDR 图像。\"\n}\n]\n}\n]\n```\n\n### 配置应用传输安全\n\n用于托管本项目图片和元数据的服务器不支持 HTTPS 连接。为了允许普通的\
  \ HTTP 连接，你需要配置项目的应用传输安全（ATS）设置。在实际项目中，你应始终使用 HTTPS 连接。\n\n在项目导航器中找到`PhotoBook`组下的`Info.plist`文件并点击它。向此\
  \ plist 添加一个新的字典键，命名为`App Transport Security Settings`（参见图 7-5）。在这个新字典中，添加一个名为`Allow\
  \ Arbitrary Loads`的布尔键，并将其值设为`Yes`。\n\n![A432412_1_En_7_Fig5_HTML.jpg](img/A432412_1_En_7_Fig5_HTML.jpg)\n\
  \n图 7-5.\n\n应用传输安全设置\n\n## 构建网络层\n\n本应用的网络层由一个名为`ServiceController`的类构成，该类实现了以下方法：\n\
