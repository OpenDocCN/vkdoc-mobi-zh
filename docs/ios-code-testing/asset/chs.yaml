  \ API 的接口必须定义良好。如果服务器端 API 发生变化，iOS 应用中的测试也需要相应更新。\n\n\n\n"
- "# 8. 处理遗留代码\n\n如果你从事 iOS 应用开发已有数年，很可能曾受命为某个现有应用添加新功能，该项目拥有庞大代码库，历经多年构建，由数十名开发者共同维护，而其中大多数开发者早已转投其他项目。\n\
  \n项目几乎没有文档，要么完全没有单元测试，要么只有寥寥几个过时的测试，运行时甚至有些会失败。这是行业中许多项目面临的现实困境。有时，相关开发者可能并不了解测试的益处，或者不清楚该测试什么；另一些情况下，业务方并未充分支持投入\
  \ TDD 或 BDD 技术，因此开发者只有在时间充裕时才会编写测试。\n\n通常，我们无法花费数月时间重构多年的遗留代码。作为团队新成员，你能做的最好的事就是为你编写的新代码提供适当水平的测试。\n\
  \n本章将介绍几种技术，帮助你向大型遗留代码库添加新代码，同时为新代码编写有意义的测试。单章内容无法涵盖所有重构技术——已有整本书籍专门探讨重构主题。关于重构技术（虽非专指\
  \ iOS）的佳作是迈克尔·C·费瑟斯（Michael C. Feathers）所著的《与遗留代码有效合作》¹。\n\n## 拆分大型类\n\n在许多情况下，你想要修改的类已经非常庞大。它变得如此庞大的原因，很可能是因为没有人花精力重构这个类，而到某个节点它变得过于庞大，以至于没人知道从何入手。\n\
  \n面对这个问题时，你可以采用一种方法：基于单一职责原则将类拆分为更小的类——即为每个碎片类分配单一职责。这也被称为单一职责原则：它本质上意味着任何给定的类应执行离散且定义明确的功能，而其他功能则依赖其他类。\n\
  \n举例来说，考虑一个大型视图控制器类：它通过网络请求从互联网下载 JSON 文档、解析文档，并更新屏幕上的若干 UI 元素。清单 8-1 展示了一个名为 `LargeViewController.swift`\
  \ 的类代码。\n\n```swift\nimport UIKit\nclass LargeViewController: UIViewController {\n\
  @IBOutlet weak var userNameLabel: UILabel!\n@IBOutlet weak var emailAddressLabel:\
  \ UILabel!\nprivate var session:URLSession?\nprivate var dataTask:URLSessionDataTask?\n\
  override func viewDidLoad() {\nsuper.viewDidLoad()\ndownloadUserProfile()\n}\noverride\
  \ func didReceiveMemoryWarning() {\nsuper.didReceiveMemoryWarning()\n// Dispose\
  \ of any resources that can be recreated.\n}\nfunc downloadUserProfile() {\nself.session\
  \ = URLSession(configuration: URLSessionConfiguration.default)\nguard let session\
  \ = self.session,\nlet url = URL(string: \"http://someservice.com/getuser/\") else\
  \ {\nreturn\n}\ndataTask = session.dataTask(with: url,\ncompletionHandler: { (data,\
  \ response, error) in\nif let _ = error {\nDispatchQueue.main.async {\nlet alertController\
  \ = UIAlertController(title: \"Error\",\nmessage: \"Unable to download user profile\"\
  ,\npreferredStyle: .alert)\nlet defaultAction = UIAlertAction(title: \"OK\",\nstyle:\
  \ .default, handler: nil)\nalertController.addAction(defaultAction)\nself.present(alertController,\
  \ animated: true, completion: nil)\n}\nreturn\n}\nif let response = response as?\
  \ HTTPURLResponse,\nlet data = data {\nif response.statusCode != 200 {\nDispatchQueue.main.async\
  \ {\nlet alertController = UIAlertController(title: \"Error\",\nmessage: \"Unable\
  \ to download user profile\",\npreferredStyle: .alert)\nlet defaultAction = UIAlertAction(title:\
  \ \"OK\",\nstyle: .default, handler: nil)\nalertController.addAction(defaultAction)\n\
  self.present(alertController, animated: true, completion: nil)\n}\n}\nguard let\
  \ dictionary =\ntry? JSONSerialization.jsonObject(with: data,\noptions: JSONSerialization.ReadingOptions.mutableContainers)\n\
  as? [String : AnyObject] else {\nDispatchQueue.main.async {\nlet alertController\
  \ = UIAlertController(title: \"Error\",\nmessage: \"Unable to download user profile\"\
  ,\npreferredStyle: .alert)\nlet defaultAction = UIAlertAction(title: \"OK\",\nstyle:\
  \ .default, handler: nil)\nalertController.addAction(defaultAction)\nself.present(alertController,\n\
  animated: true, completion: nil)\n}\nreturn\n}\nif let userName = dictionary?[\"\
  username\"] as? String,\nlet emailAddress = dictionary?[\"emailAddress\"] as? String\
  \ {\nDispatchQueue.main.async {\nself.userNameLabel.text = userName\nself.emailAddressLabel.text\
  \ = emailAddress\n}\n}\n}\nreturn\n})\ndataTask?.resume()\n}\n}\n```\n\n这个类的根本问题在于它承担了过多职责。它当前的责任包括：\n\
  \n- 处理视图生命周期事件。\n- 发起网络请求。\n- 处理网络错误。\n- 解析数据。\n- 更新用户界面。\n\n为了将这个类拆分为更小的类，你需要决定拆分点以及应创建多少个较小的类。你可以基于该类当前的职责来做出这些决策。\n\
  \n\n\n作为一个视图控制器，它应当处理视图生命周期事件并包含更新用户界面的代码。其他职责可以委托给其他对象。基于这一思路，可以设计以下类：\n\n- `LargeViewController.swift`：视图控制器类，处理视图生命周期事件并包含更新\
  \ UI 的逻辑。\n- `NetworkController.swift`：专门负责发起网络请求并处理相关错误的类。\n- `UserProfile.swift`：用户档案模型对象类，包含将字典内容解析为实例变量的逻辑。\n\
  - `AlertFactory.swift`：负责创建警示控制器的类。\n\n图 8-1 展示了这种新方案的类图。\n\n![A432412_1_En_8_Fig1_HTML.jpg](img/A432412_1_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1. 重构后的 `LargeViewController` 类图\n\n重构后的 `LargeViewController.swift` 类如代码清单\
  \ 8-2 所示。\n\n```swift\nimport UIKit\nclass RefactoredLargeViewController: UIViewController\
  \ {\n    @IBOutlet weak var userNameLabel: UILabel!\n    @IBOutlet weak var emailAddressLabel:\
  \ UILabel!\n    private var networkController: NetworkController?\n\n    override\
  \ func viewDidLoad() {\n        super.viewDidLoad()\n        downloadUserProfile()\n\
  \    }\n\n    override func didReceiveMemoryWarning() {\n        super.didReceiveMemoryWarning()\n\
  \        // Dispose of any resources that can be recreated.\n    }\n\n    func downloadUserProfile()\
  \ {\n        self.networkController = NetworkController()\n        networkController?.downloadUserProfile(success:\
  \ { (data) in\n            if let userProfile = UserProfile(data) {\n          \
  \      DispatchQueue.main.async {\n                    self.userNameLabel.text =\
  \ userProfile.userName\n                    self.emailAddressLabel.text = userProfile.emailAddress\n\
  \                }\n            }\n        }, failure: { (error) in\n          \
  \  self.displayErrorAlert()\n        })\n    }\n\n    func displayErrorAlert() {\n\
  \        DispatchQueue.main.async {\n            self.present(AlertFactory.networkErrorAlert(),\
  \ animated: true, completion: nil)\n        }\n    }\n}\n```\n代码清单 8-2. `RefactoredLargeViewController.swift`\n\
  \n`NetworkController.swift` 类如代码清单 8-3 所示。\n\n```swift\nimport Foundation\nclass\
  \ NetworkController: NSObject {\n    var session: URLSession?\n    var dataTask:\
  \ URLSessionDataTask?\n    let userProfileURL = \"http://someservice.com/getuser/\"\
  \n\n    override init() {\n        super.init()\n        self.session = URLSession(configuration:\n\
  \            URLSessionConfiguration.default)\n    }\n\n    func downloadUserProfile(success:\
  \ @escaping (Data) -> Void,\n                             failure: @escaping (NSError)\
  \ -> Void) -> Void {\n        guard let session = session else {\n            failure(NSError(domain:\
  \ \"NetworkController\",\n                            code:100, userInfo: nil))\n\
  \            return\n        }\n        guard let url = URL(string: userProfileURL)\
  \ else {\n            failure(NSError(domain: \"NetworkController\",\n         \
  \                   code:101, userInfo: nil))\n            return\n        }\n \
  \       dataTask = session.dataTask(with: url,\n                               \
  \     completionHandler: { (data, response, error) in\n            if let error\
  \ = error {\n                failure(error as NSError)\n                return\n\
  \            }\n            if let response = response as? HTTPURLResponse,\n  \
  \             let data = data {\n                if response.statusCode == 200 {\n\
  \                    success(data)\n                    return\n               \
  \ }\n            }\n            failure(NSError(domain: \"ServiceController\",\n\
  \                            code:102, userInfo: nil))\n            return\n   \
  \     })\n        dataTask?.resume()\n    }\n}\n```\n代码清单 8-3. `NetworkController.swift`\n\
  \n`UserProfile.swift` 类如代码清单 8-4 所示。\n\n```swift\nimport Foundation\nclass UserProfile\
  \ : NSObject {\n    var userName: String?\n    var emailAddress: String?\n\n   \
  \ init?(_ data: Data?) {\n        guard let data = data,\n              let dictionary\
  \ = try? JSONSerialization.jsonObject(with: data,\n                  options: JSONSerialization.ReadingOptions.mutableContainers)\n\
  \                  as? [String : AnyObject],\n              let userName = dictionary?[\"\
  username\"] as? String,\n              let emailAddress = dictionary?[\"emailAddress\"\
  ] as? String else {\n            return nil\n        }\n        self.userName =\
  \ userName\n        self.emailAddress = emailAddress\n    }\n}\n```\n代码清单 8-4. `UserProfile.swift`\n\
  \n`AlertFactory.swift` 类如代码清单 8-5 所示。\n\n```swift\nimport UIKit\nclass AlertFactory\
  \ : NSObject {\n    static func networkErrorAlert() -> UIAlertController {\n   \
  \     let alertController = UIAlertController(title: \"Error\",\n              \
  \                                  message: \"Unable to download user profile\"\
  ,\n                                                preferredStyle: .alert)\n   \
  \     let defaultAction = UIAlertAction(title: \"OK\",\n                       \
  \                   style: .default, handler: nil)\n        alertController.addAction(defaultAction)\n\
  \        return alertController\n    }\n}\n```\n代码清单 8-5. `AlertFactory.swift`\n\
  \n严格来说，`LargeViewController.swift` 仍然有多个职责：管理生命周期事件和更新用户界面。如果希望进一步重构该类，可以使用 MV-VM\
  \ 架构模式引入视图模型对象，将更新用户界面的职责转移到视图模型中。\n\n这个练习应该能让你了解如何处理将大类拆分为更小、更专注、更易管理的类的方法。\n\n\
  ## 向现有类添加功能\n\n将大类重构为小类在某些情况下可能涉及大量时间和精力。作为开发者，你可能被要求在现有遗留类中添加功能，却没有足够的时间先进行重构。\n\
  \n在本节中，我们将介绍一些技术，使你能够以这样一种方式向现有类添加功能——将来时间允许时，你可以重新审视该类并将代码移入单独的辅助类中。\n\n### 使用类和方法进行封装\n\
  \n在向遗留类的现有方法中添加代码时，最好将新代码封装到一个新方法中，并从现有方法中调用新方法。这种方法有几个优点：\n\n- 可以为新方法编写测试。\n- 不会向一个庞大且未经测试的遗留方法中添加更多代码。\n\
  - 这种技术可能要求你从源方法中注入一些局部变量作为新方法的依赖项；这种做法有助于为未来的进一步重构打下基础。\n\n在某些情况下，你计划添加新方法的类非常复杂，难以纳入测试。这通常发生在该类具有很长的依赖列表且需要在初始化器中提供多个参数时。\n\
  \n在这种情况下，你可以将新代码封装在新类的方法中，并在遗留方法中创建新类的对象。这种技术也称为“Break Out Method Object”。¹ 然而，以这种方式使用新类应被视为临时方案。你应当计划在不久的将来重新审视源方法/类，并进行适当的重构。如果不这样做，就有可能在代码库中创建成百上千个没有明确目的的小类。\n\
  \n作为示例，我们重新审视代码清单 8-1 中的`LargeViewController`类。假设要求你编写一些代码，对下载的用户档案中的电子邮件地址进行字段级验证，并拒绝包含无效电子邮件地址的档案。再假设当前`LargeViewController`中的任何代码都没有测试，并且你没有时间重构该类。\n\
  \n一种可能的方法是将验证逻辑写在`downloadUserProfile()`函数内部，如代码清单 8-6 中的粗体部分所示。\n\n\n\n```\nfunc\
  \ downloadUserProfile() {\nself.session = URLSession(configuration:\nURLSessionConfiguration.default)\n\
  guard let session = self.session,\nlet url = URL(string: \"http://someservice.com/getuser/\"\
  ) else {\nreturn\n}\ndataTask = session.dataTask(with: url,\ncompletionHandler:\
  \ { (data, response, error) in\nif let _ = error {\nDispatchQueue.main.async {\n\
  let alertController = UIAlertController(title: \"Error\",\nmessage: \"无法下载用户资料\"\
  ,\npreferredStyle: .alert)\nlet defaultAction = UIAlertAction(title: \"确定\",\nstyle:\
  \ .default, handler: nil)\nalertController.addAction(defaultAction)\nself.present(alertController,\
  \ animated: true,\ncompletion: nil)\n}\nreturn\n}\nif let response = response as?\
  \ HTTPURLResponse,\nlet data = data {\nif response.statusCode != 200 {\nDispatchQueue.main.async\
  \ {\nlet alertController = UIAlertController(title: \"Error\",\nmessage: \"无法下载用户资料\"\
  ,\npreferredStyle: .alert)\nlet defaultAction = UIAlertAction(title: \"确定\",\nstyle:\
  \ .default, handler: nil)\nalertController.addAction(defaultAction)\nself.present(alertController,\n\
