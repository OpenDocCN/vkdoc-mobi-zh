  \ Quick 编写一组 BDD 测试，这些测试最初可能无法编译，即使能编译，也无法通过。\n\n然后，你将转而使用 TDD 技术开发应用程序的代码，同时关注\
  \ BDD 测试。如果最初你的 BDD 测试无法编译，你将需要临时注释掉测试代码中无法编译的部分，以便专注于构建应用程序的代码。\n\n你需要定期取消注释 BDD\
  \ 测试并执行它们。经常这样做可以确保你使用 TDD 技术编写的代码正逐步满足业务提出的需求。随着时间的推移，随着更多应用程序代码及其关联的单元测试被构建完成，你的\
  \ BDD 测试也将开始通过。\n\n本章的其余部分将描述应用程序的模型层、视图模型层和视图控制器层的特性，然后我们将使用前面章节介绍的标准 TDD 技术来构建这些层。\n\
  \n## 构建模型层\n\n我们需要构建的模型类只有一个——`Restaurant`。`Restaurant` 类包含存储单个餐厅信息的属性。表 12-6 列出了\
  \ `Photo` 类的预期属性和方法。\n\n表 12-6. `Photo` 类的属性和方法\n\n| 项目 | 类型 | 描述 |\n| --- | ---\
  \ | --- |\n| `var area:String?` | 变量 | 餐厅所在的伦敦区域。 |\n| `var rating:String?` | 变量\
  \ | 0 到 5 之间的数字，代表餐厅获得的平均评分。 |\n| `var cuisine:String?` | 变量 | 餐厅提供的菜系。 |\n| `var\
  \ distance:String?` | 变量 | 餐厅与最近地铁站之间的距离。 |\n| `var tubeStation:String?` | 变量 |\
  \ 最近伦敦地铁站的名称。 |\n| `var restaurantName:String?` | 变量 | 餐厅的名称。 |\n| `init?(_ dictionary:[String\
  \ : AnyObject]?)` | 方法 | 允许其他代码创建 `Restaurant` 实例。需要传入一个包含某些必需键的字典作为输入。 |\n\n`init()`\
  \ 方法需要一个包含以下所有必需键的字典：\n\n- `restaurantName`\n- `rating`\n- `cuisine`\n- `area`\n\
  - `distance`\n- `tubeStation`\n\n完整的 `Restaurant` 类如代码清单 12-9 所示。如果你想查看验证器对象及其关联测试的代码，请使用以下\
  \ URL 从 github 匿名下载完成的项目：\n\n[`https://github.com/asmtechnology/Lesson12.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson12.iOSTesting.2017.Apress.git)\n\
  \n```\nimport Foundation\nclass Restaurant : NSObject {\nvar area:String?\nvar rating:String?\n\
  var cuisine:String?\nvar distance:String?\nvar tubeStation:String?\nvar restaurantName:String?\n\
  var restaurantNameValidator:RestaurantNameValidator?\nvar tubeStationValidator:TubeStationValidator?\n\
  var cuisineValidator:CuisineValidator?\nvar ratingValidator:RatingValidator?\nlet\
  \ areaKey = \"area\"\nlet ratingKey = \"rating\"\nlet cuisineKey = \"cuisine\"\n\
  let distanceKey = \"distance\"\nlet tubeStationKey = \"tubeStation\"\nlet restaurantNameKey\
  \ = \"restaurantName\"\ninit?(_ dictionary:[String : AnyObject]?) {\nguard let dictionary\
  \ = dictionary,\nlet area = dictionary[areaKey] as? String,\nlet rating = dictionary[ratingKey]\
  \ as? String,\nlet cuisine = dictionary[cuisineKey] as? String,\nlet distance =\
  \ dictionary[distanceKey] as? String,\nlet tubeStation = dictionary[tubeStationKey]\
  \ as? String,\nlet restaurantName = dictionary[restaurantNameKey]  as? String else\
  \ {\nreturn nil\n}\nsuper.init()\nlet restaurantNameValidator = self.restaurantNameValidator\
  \ ?? RestaurantNameValidator()\nif restaurantNameValidator.validate(restaurantName)\
  \ == false {\nreturn nil\n}\nlet tubeStationValidator = self.tubeStationValidator\
  \ ?? TubeStationValidator()\nif tubeStationValidator.validate(tubeStation) == false\
  \ {\nreturn nil\n}\nlet cuisineValidator = self.cuisineValidator ?? CuisineValidator()\n\
  if cuisineValidator.validate(cuisine) == false {\nreturn nil\n}\nlet ratingValidator\
  \ = self.ratingValidator ?? RatingValidator()\nif ratingValidator.validate(rating)\
  \ == false {\nreturn nil\n}\nself.area = area\nself.rating = rating\nself.cuisine\
  \ = cuisine\nself.distance = distance\nself.tubeStation = tubeStation\nself.restaurantName\
  \ = restaurantName\n}\n}\n代码清单 12-9. Restaurant.swift\n```\n\n## 构建视图模型层\n\n我们需要构建三个视图模型类——`SearchViewModel`、`RestaurantTableViewModel`\
  \ 和 `RestaurantTableViewCellViewModel`。它们分别对应 `SearchViewController`、`RestaurantTableViewController`\
  \ 和 `RestaurantTableViewCell` 类。\n\n视图模型将使用协议建立一个接口，通过该接口它们可以与其各自的视图控制器进行通信。\n\n\
  \n\n### SearchViewModel 类\n\n`SearchViewModel` 类代表了 `SearchViewController` 类与 `Restaurant`\
  \ 模型对象之间的视图模型。该视图模型类所需的实例变量和方法如表 12-7 所述。\n\n**表 12-7.** SearchViewModel 的实例变量和方法\n\
  \n| 名称 | 类型 | 描述 |\n| --- | --- | --- |\n| `weak var view:SearchViewControllerProtocol?`\
  \ | Ivar | 对视图控制器的引用，使用协议定义视图模型可用的方法列表。 |\n| `var selectedArea:String?` | Ivar |\
  \ 表示用户通过选择器视图交互而选定的伦敦区域位置。 |\n| `var restaurants: [String: [Restaurant]]` | Ivar\
  \ | 餐馆字典，为伦敦的每个区域保存一个条目。 |\n| `func performInitialViewSetup()` | 方法 | 由视图控制器的 `viewDidLoad()`\
