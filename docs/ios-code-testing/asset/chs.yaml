  使用 TextEdit，将以下行添加到 Podfile 中，并保存文件。完成修改后关闭 TextEdit。


  ```

  github "Quick/Quick"

  github "Quick/Nimble"

  ```


  `Cartfile` 的内容比 `Podfile` 要简单一些。每一行只是框架所在的仓库名称以及该仓库中框架的路径。


  返回终端窗口，键入以下命令，并按回车键：


  ```

  $ carthage update --platform iOS

  ```


  几分钟后，你会看到类似如下状态消息，表明 Nimble 和 Quick 的源文件已下载并构建为框架（图 11-11）。


