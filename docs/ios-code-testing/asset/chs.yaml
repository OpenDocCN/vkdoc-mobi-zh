  至此，你已经使用 Git 子模块将 `Quick` 和 `Nimble` 添加到了 Xcode 项目中，你的项目应该能够在 iOS 模拟器上毫无问题地构建和运行。


  ## 小结


  在本章中，你学习了三种不同的方法，可以将 `Quick` 和 `Nimble` 框架添加到 Xcode 项目中。你学习了如何使用两种流行的依赖管理框架 —— CocoaPods
  和 Carthage。你还学习了如何使用 Git 子模块包含 `Quick` 和 `Nimble` 框架。


