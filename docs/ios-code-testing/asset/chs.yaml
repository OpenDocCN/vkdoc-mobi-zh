  \nFigure 5-14.\n\n登录视图模型的基本测试\n\n目前编写的视图模型测试验证了视图模型可以被实例化；为了使这个测试通过，你创建了一个视图模型类、一个协议和一个模拟类。\n\
  \n接下来要编写的测试将验证视图模型在实例变量中保存了注入到初始化器的视图的引用。在前一个测试方法下创建一个名为`testInit_ValidView_CopiesViewToIvar()`的新单元测试方法，并将以下代码添加到方法体中：\n\
