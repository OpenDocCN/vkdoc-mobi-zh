  \ 12-1 中。\n\n表 12-1. 餐馆目录应用需求\n\n| 编号 | 需求 |\n| --- | --- |\n| 1 | 作为 [顾客]，我想要 [查看伦敦市内我选择区域附近的餐馆列表]，以便\
