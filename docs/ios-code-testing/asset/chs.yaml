  | `var accountName:String` | 变量 | 包含账户的文本描述。长度最多为 20 个字符，不能为空。允许使用特殊字符。 |\n| `var\
  \ accountNumber:String` | 变量 | 包含数字账户号码，必须是一个 9 位数字，不允许有空格或特殊字符。 |\n| `var sortingCode:String`\
  \ | 变量 | 包含一个标识分行/支行的六位数字。不允许有空格或特殊字符。必须以 40 或 49 开头。 |\n| `var accountType:AccountType`\
  \ | 变量 | 一个枚举值，表示账户类型。可以是 `currentAccount` 或 `savingsAccount`。 |\n| `var transactions:[Transaction]`\
  \ | 变量 | 交易数组。 |\n| `var owners:[AccountOwner]` | 变量 | 账户持有人数组。一个银行账户必须至少有一个持有人，最多可以有\
  \ 2 个账户持有人。 |\n| `init?(accountName:String, accountNumber:String, sortingCode:String,\
  \ accountType:AccountType, owners:[AccountOwner])` | 方法 | 允许其他代码创建 `BankAccount`\
  \ 实例。 |\n\n开发 `BankAccount` 类的方法将与开发 `AccountOwner` 类非常相似。您需要创建测试来验证初始化器和任何验证器对象的行为。在此特定情况下，需要为\
  \ `accountName`、`accountNumber` 和 `sortingCode` 属性提供验证器对象。\n\n完整的 `BankAccount`\
  \ 类在代码清单 4-12 中提供。如果您想检查测试和验证器对象的代码，请使用以下 URL 从 github 匿名下载完成的项目：\n\n[`https://github.com/asmtechnology/Lesson04.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson04.iOSTesting.2017.Apress.git)\n\
  \n```\nimport Foundation\nenum AccountType {\ncase currentAccount\ncase savingsAccount\n\
  }\nclass BankAccount: NSObject {\nvar accountName:String\nvar accountNumber:String\n\
  var sortingCode:String\nvar accountType:AccountType\nvar transactions:[Transaction]\n\
  var owners:[AccountOwner]\ninit?(accountName:String,\naccountNumber:String,\nsortingCode:String,\n\
  accountType:AccountType,\nowners:[AccountOwner],\naccountNameValidator:AccountNameValidator?\
  \ = nil,\naccountNumberValidator:AccountNumberValidator? = nil,\nsortingCodeValidator:SortingCodeValidator?\
  \ = nil) {\nlet validator1 = accountNameValidator ?? AccountNameValidator()\nif\
  \ validator1.validate(accountName) == false {\nreturn nil\n}\nlet validator2 = accountNumberValidator\
  \ ?? AccountNumberValidator()\nif validator2.validate(accountNumber) == false {\n\
  return nil\n}\nlet validator3 = sortingCodeValidator ?? SortingCodeValidator()\n\
  if validator3.validate(sortingCode) == false {\nreturn nil\n}\nif owners.count ==\
  \ 0 {\nreturn nil\n}\nself.accountName = accountName\nself.accountNumber = accountNumber\n\
  self.sortingCode = sortingCode\nself.accountType = accountType\nself.owners = owners\n\
  self.transactions = [Transaction]()\n}\n}\n```\n\n**代码清单 4-12.** `BankAccount.swift`\n\
  \n## 测试 Core Data\n\n本章到目前为止构建的模型对象都有一个共同点——它们都是 `NSObject` 的子类。这在许多 iOS 应用程序中非常常见；然而，越来越多的应用程序使用像\
  \ Core Data 这样的对象持久化框架来表示和持久化模型数据。\n\n对 Core Data 的详细讨论超出了本书的范围。测试模型层可能是那些在模型层中使用\
  \ Core Data 的开发者面临的最大障碍之一。\n\nCore Data 旨在将您的模型对象及其关系持久化到数据库中。为了实现其目标，Core Data\
  \ 引入了大量类，例如 `NSManagedObject`、`NSManagedObjectContext`、`NSManagedObjectModel`、`NSPersistentStoreCoordintor`，并且要求您让\
  \ Core Data 管理模型对象的生命周期。\n\n由于 Core Data 管理模型对象的生命周期，您不能简单地使用指定或便捷初始化器来实例化模型对象；相反，您需要请求一个托管对象上下文来实例化该对象。\n\
  \n虽然托管对象上下文本身可以通过指定初始化器方便地实例化，但此初始化器的参数之一是一个持久化存储协调器，它要求您提供 SQLite 数据库文件的路径。\n\n\
  在应用程序代码中实例化持久化存储协调器是非常常见的做法；但是，要在单元测试用例中实例化它，您需要在测试目标中包含一个数据库。严格来说，不鼓励在测试目标中包含数据库，因为从数据库读取和写入的测试很容易在测试用例之间创建依赖关系。\n\
  \n很容易想象一个测试用例将一些数据写入数据库，而另一个测试用例读取其中的一些数据。这种类型的行为会在测试之间创建紧密耦合，测试的确切执行顺序变得重要，并且测试不再独立。当这种类型的行为无意中发生时，情况就更糟了。\n\
  \n幸运的是，Core Data 有一个经常被忽略的功能，称为内存存储，它可以在测试中使用，而无需在测试目标中包含 SQLite 文件。内存存储是一个基于 RAM\
  \ 的数据库，通常用于实现缓存策略。内存存储的一个关键特性是它们可以在几乎没有性能开销的情况下被销毁并重新创建到初始状态。\n\n以下代码片段展示了如何创建一个使用内存持久化存储协调器的托管对象上下文：\n\
  \n```\nfunc inMemoryManagedObjectContext() -> NSManagedObjectContext? {\nguard let\
  \ managedObjectModel = NSManagedObjectModel.mergedModel(from:[Bundle.main]) else\
  \ {\nreturn nil\n}\nlet persistentStoreCoordinator = NSPersistentStoreCoordinator(managedObjectModel:\
  \ managedObjectModel)\ndo {\ntry persistentStoreCoordinator.addPersistentStore(ofType:\
  \ NSInMemoryStoreType,\nconfigurationName: nil,\nat: nil,\noptions: nil)\n} catch\
  \ {\nprint(\"Failed to create in-memory persistent store.\")\nreturn nil\n}\nlet\
  \ managedObjectContext = NSManagedObjectContext(concurrencyType:.mainQueueConcurrencyType)\n\
  managedObjectContext.persistentStoreCoordinator = persistentStoreCoordinator\nreturn\
  \ managedObjectContext\n}\n```\n\n您可以在测试用例的 setup 方法中使用此方法来创建一个由内存存储支持的托管对象上下文。然后，您可以在测试中使用此托管对象上下文来实例化\
  \ Core Data 对象。\n\n## 总结\n\n在本章中，您使用测试驱动技术创建了一个应用程序的模型层。对于模型层的每个组件，您首先创建了一组测试用例，然后构建相应的模型层类以确保测试用例通过。\n\
  \n您还学习了创建验证器对象来验证模型层对象的内容，以及如何将这些验证器对象作为依赖项注入到模型层对象中。\n\n最后，您学习了在 Swift 中创建模拟对象，并使用模拟对象来验证模型层对象与注入的验证器对象之间的集成。\n\
  \n\n\n"
- "# 5. 将 TDD 应用于视图控制器\n\n本章将探讨如何使用 TDD 技术，基于单视图控制器项目模板构建一个 iOS 应用。该应用将包含两个视图控制器，分别提供注册和登录屏幕功能。应用将采用\
  \ MVVM 应用架构进行构建。\n\n图 5-1 展示了最终应用的用户界面。\n\n![A432412_1_En_5_Fig1_HTML.jpg](img/A432412_1_En_5_Fig1_HTML.jpg)\n\
  \n**图 5-1.** 最终应用的用户界面\n\n该应用的完整源代码可通过以下 URL 从 GitHub 匿名下载：\n\n[`https://github.com/asmtechnology/Lesson05.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson05.iOSTesting.2017.Apress.git)\n\
  \n## 应用架构\n\n该应用的架构由四个不同的层级组成（见图 5-2）。\n\n![A432412_1_En_5_Fig2_HTML.jpg](img/A432412_1_En_5_Fig2_HTML.jpg)\n\
  \n**图 5-2.** LoginForm 应用架构\n\n以下是各层级及其组件类的简要说明：\n\n- **模型层（Model Layer）：** 包含 `LoginModel`\
  \ 和 `SignupModel` 类，其实例分别用于存储用户在登录和注册屏幕上输入的数据。此层还包含三个用于处理字段验证的类——`UserNameValidator`、`PasswordValidator`\
  \ 和 `EmailAddressValidator`。\n- **视图模型层（View Model Layer）：** 包含 `LoginViewModel`\
  \ 和 `SignupViewModel` 类。\n- **视图/视图控制器层（View/View Controller Layer）：** 包含 `LoginViewController`\
  \ 和 `SignupViewController` 类。这些类为应用提供用户界面。\n- **其他控制器层（Other Controllers Layer）：**\
  \ 包含执行实际登录和注册过程的 `LoginController` 和 `SignupController` 类。在本项目中，这些类是桩实现。在现实场景中，你将在这些类中编写代码，连接到后端\
  \ Web 服务，并执行登录/注册所需的必要步骤。\n\n## 创建 Xcode 项目\n\n让我们从创建一个新的 Xcode 项目开始。启动 Xcode，并基于“单视图应用”模板创建一个新的\
  \ iOS 项目（见图 5-3）。\n\n![A432412_1_En_5_Fig3_HTML.jpg](img/A432412_1_En_5_Fig3_HTML.jpg)\n\
  \n**图 5-3.** Xcode 项目模板对话框\n\n创建新项目时，请使用以下选项（见图 5-4）：\n\n![A432412_1_En_5_Fig4_HTML.jpg](img/A432412_1_En_5_Fig4_HTML.jpg)\n\
  \n**图 5-4.** Xcode 项目选项对话框\n\n- **产品名称（Product Name）：** `LoginForm`\n- **团队（Team）：**\
  \ 无\n- **组织名称（Organization Name）：** 提供一个合适的名称\n- **组织标识符（Organization Identifier）：**\
  \ 提供一个合适的标识符\n- **语言（Language）：** `Swift`\n- **设备（Devices）：** `iPhone`\n- **使用 Core\
  \ Data（Use Core Data）：** 未勾选\n- **包含单元测试（Include Unit Tests）：** 已勾选\n- **包含 UI 测试（Include\
  \ UI Tests）：** 未勾选\n\n> **注意**\n> 本章创建的项目不包含用户界面（UI）测试。如果你愿意，可以稍后向项目添加 UI 测试。第 13\
  \ 章介绍了用户界面测试的主题。\n\n将项目保存到计算机上的合适位置，然后点击“创建”。由于该项目将包含多个新类，因此最好将类文件放置在项目导航器中适当的组下。\n\
  \n在 Xcode 项目导航器中，于 `LoginForm` 文件夹下创建以下组：\n\n- `View`\n- `Model`\n- `ViewModel`\n\
  - `Protocols`\n\n## 构建用户界面层\n\n此应用的用户界面由两个故事板场景以及它们之间的一个转场构成（见图 5-5）。\n\n![A432412_1_En_5_Fig5_HTML.jpg](img/A432412_1_En_5_Fig5_HTML.jpg)\n\
  \n**图 5-5.** 应用故事板\n\n你创建的新项目中有一个默认的视图控制器，我们不会使用它。从项目导航器中删除 `ViewController.swift`\
  \ 文件，然后在 `View` 组下创建两个新的 `UIViewController` 子类，分别命名为：\n\n- `LoginViewController`\n\
  - `SignupViewController`\n\n项目导航器应类似于图 5-6。\n\n![A432412_1_En_5_Fig6_HTML.jpg](img/A432412_1_En_5_Fig6_HTML.jpg)\n\
  \n**图 5-6.** LoginForm 项目导航器\n\n\n好的，作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将以下英文文本翻译成中文。\n\
  \n\n### 构建登录视图控制器场景\n\n打开 `Main.storyboard` 文件，点击故事板中的默认场景。使用身份检查器将默认场景关联的类更改为 `LoginViewController`（参见图\
  \ 5-7）。\n\n![A432412_1_En_5_Fig7_HTML.jpg](img/A432412_1_En_5_Fig7_HTML.jpg)\n\n\
  图 5-7. 在身份检查器中设置自定义视图控制器类\n\n将两个文本字段、两个按钮和四个标签添加到默认故事板场景中，并按图 5-8 所示排列它们。为这些元素创建适当的约束，以在不同屏幕尺寸下保持此布局。\n\
  \n![A432412_1_En_5_Fig8_HTML.jpg](img/A432412_1_En_5_Fig8_HTML.jpg)\n\n图 5-8. 登录视图控制器场景上的\
  \ UI 组件\n\n使用故事板，将 `LoginViewController` 类设置为两个文本字段的委托。表 5-1 列出了需要在 `LoginViewController`\
  \ 类中创建的 Outlet 和动作方法，以及它们关联的用户界面元素。\n\n表 5-1. 登录视图控制器的 Outlet 和动作\n\n| 名称 | 类型 |\
  \ 描述 |\n| --- | --- | --- |\n| `@IBOutlet weak var userNameTextField: UITextField!`\
  \ | IB Outlet | 将此 Outlet 连接到故事板场景的用户名文本字段。 |\n| `@IBOutlet weak var passwordTextField:\
  \ UITextField!` | IB Outlet | 将此 Outlet 连接到故事板场景的密码文本字段。 |\n| `@IBOutlet weak var\
  \ loginButton: UIButton!` | IB Outlet | 将此 Outlet 连接到故事板场景的登录按钮。 |\n| `@IBOutlet\
  \ weak var createAccountButton: UIButton!` | IB Outlet | 将此 Outlet 连接到故事板场景的创建账户按钮。\
  \ |\n| `@IBAction func login(_ sender: Any)` | IB Action | 将此方法连接到登录按钮的 Touch Up\
  \ Inside 事件。 |\n| `@IBAction func createAccount(_ sender: Any)` | IB Action | 将此方法连接到创建账户按钮的\
  \ Touch Up Inside 事件。 |\n| `@IBAction func userNameDidEndOnExit(_ sender: Any)`\
  \ | IB Action | 将此方法连接到用户名文本字段的 Did End On Exit 事件。 |\n| `@IBAction func passwordDidEndOnExit(_\
  \ sender: Any)` | IB Action | 将此方法连接到密码文本字段的 Did End On Exit 事件。 |\n\n通过将以下代码添加到\
  \ `LoginViewController.swift` 文件的末尾，在 `LoginViewController` 的一个单独的类扩展中实现 `UITextFieldDelegate`\
  \ 协议：\n\n```\nextension LoginViewController: UITextFieldDelegate {\nfunc textField(_\
  \ textField: UITextField,\nshouldChangeCharactersIn range: NSRange,\nreplacementString\
  \ string: String) -> Bool {\nreturn true\n}\n}\n```\n\n上述代码段包含了来自 `UITextFieldDelegate`\
  \ 的 `textField(_, shouldChangeCharactersIn, replacementString)` 委托方法的最小化实现。`LoginViewController.swift`\
  \ 中的代码现在应该类似于代码清单 5-1。\n\n```\nimport UIKit\nclass LoginViewController: UIViewController\
  \ {\n@IBOutlet weak var userNameTextField: UITextField!\n@IBOutlet weak var passwordTextField:\
  \ UITextField!\n@IBOutlet weak var loginButton: UIButton!\n@IBOutlet weak var createAccountButton:\
  \ UIButton!\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n}\noverride func\
  \ didReceiveMemoryWarning() {\nsuper.didReceiveMemoryWarning()\n}\n@IBAction func\
  \ login(_ sender: Any) {\n}\n@IBAction func createAccount(_ sender: Any) {\n}\n\
  @IBAction func userNameDidEndOnExit(_ sender: Any) {\n}\n@IBAction func passwordDidEndOnExit(_\
  \ sender: Any) {\n}\n}\nextension LoginViewController: UITextFieldDelegate {\nfunc\
  \ textField(_ textField: UITextField,\nshouldChangeCharactersIn range: NSRange,\n\
  replacementString string: String) -> Bool {\nreturn true\n}\n}\n```\n\n代码清单 5-1.\
  \ `LoginViewController.swift`\n\n### 构建注册视图控制器场景\n\n从对象库中拖放一个新的视图控制器到故事板上，并将这个新的视图控制器场景放在默认故事板场景旁边。\n\
  \n使用身份检查器将新的视图控制器场景关联的类更改为 `SignupViewController`。\n\n将四个文本字段、四个标签和两个按钮添加到新的故事板场景中，并按图\
  \ 5-9 所示排列它们。为这些元素创建适当的约束，以在不同屏幕尺寸下保持此布局。\n\n![A432412_1_En_5_Fig9_HTML.jpg](img/A432412_1_En_5_Fig9_HTML.jpg)\n\
  \n图 5-9. 注册视图控制器场景上的 UI 组件\n\n使用故事板，将 `SignupViewController` 类设置为四个文本字段的委托。表 5-2\
  \ 列出了必须在 `SignupViewController` 类中创建的 Outlet 和动作方法，以及它们关联的用户界面元素。\n\n表 5-2. 注册视图控制器的\
  \ Outlet 和动作\n\n| 名称 | 类型 | 描述 |\n| --- | --- | --- |\n| `@IBOutlet weak var userNameTextField:\
  \ UITextField!` | IB Outlet | 将此 Outlet 连接到故事板场景的用户名文本字段。 |\n| `@IBOutlet weak var\
  \ passwordTextField: UITextField!` | IB Outlet | 将此 Outlet 连接到故事板场景的密码文本字段。 |\n\
  | `@IBOutlet weak var confirmPasswordTextField: UITextField!` | IB Outlet | 将此 Outlet\
  \ 连接到故事板场景的重新输入密码文本字段。 |\n| `@IBOutlet weak var emailAddressTextField: UITextField!`\
  \ | IB Outlet | 将此 Outlet 连接到故事板场景的电子邮件地址文本字段。 |\n| `@IBOutlet weak var createButton:\
  \ UIButton!` | IB Outlet | 将此 Outlet 连接到故事板场景的创建按钮。 |\n| `@IBOutlet weak var cancelButton:\
  \ UIButton!` | IB Outlet | 将此 Outlet 连接到故事板场景的取消按钮。 |\n| `@IBAction func create(_\
  \ sender: Any)` | IB Action | 将此方法连接到创建按钮的 Touch Up Inside 事件。 |\n| `@IBAction func\
  \ cancel(_ sender: Any)` | IB Action | 将此方法连接到取消按钮的 Touch Up Inside 事件。 |\n| `@IBAction\
  \ func userNameDidEndOnExit(_ sender: Any)` | IB Action | 将此方法连接到用户名文本字段的 Did End\
  \ On Exit 事件。 |\n| `@IBAction func passwordDidEndOnExit(_ sender: Any)` | IB Action\
  \ | 将此方法连接到密码文本字段的 Did End On Exit 事件。 |\n| `@IBAction func confirmPasswordDidEndOnExit(_\
  \ sender: Any)` | IB Action | 将此方法连接到重新输入密码文本字段的 Did End On Exit 事件。 |\n| `@IBAction\
  \ func emailAddressDidEndOnExit(_ sender: Any)` | IB Action | 将此方法连接到电子邮件地址文本字段的\
  \ Did End On Exit 事件。 |\n\n通过将以下代码添加到 `SignupViewController.swift` 文件的末尾，在 `SignupViewController`\
  \ 的一个单独的类扩展中实现 `UITextFieldDelegate` 协议：\n\n```\nextension SignupViewController:\
  \ UITextFieldDelegate {\nfunc textField(_ textField: UITextField,\nshouldChangeCharactersIn\
  \ range: NSRange,\nreplacementString string: String) -> Bool {\nreturn true\n}\n\
  }\n```\n\n上述代码段包含了来自 `UITextFieldDelegate` 的 `textField(_, shouldChangeCharactersIn,\
  \ replacementString)` 委托方法的最小化实现。`SignupViewController.swift` 中的代码现在应该类似于代码清单 5-2。\n\
  \n\n\n```swift\nimport UIKit\nclass SignupViewController: UIViewController {\n@IBOutlet\
  \ weak var userNameTextField: UITextField!\n@IBOutlet weak var passwordTextField:\
  \ UITextField!\n@IBOutlet weak var confirmPasswordTextField: UITextField!\n@IBOutlet\
  \ weak var emailAddressTextField: UITextField!\n@IBOutlet weak var createButton:\
  \ UIButton!\n@IBOutlet weak var cancelButton: UIButton!\noverride func viewDidLoad()\
  \ {\nsuper.viewDidLoad()\n}\noverride func didReceiveMemoryWarning() {\nsuper.didReceiveMemoryWarning()\n\
  }\n@IBAction func create(_ sender: Any) {\n}\n@IBAction func cancel(_ sender: Any)\
  \ {\n}\n@IBAction func userNameDidEndOnExit(_ sender: Any) {\n}\n@IBAction func\
  \ passwordDidEndOnExit(_ sender: Any) {\n}\n@IBAction func confirmPasswordDidEndOnExit(_\
  \ sender: Any) {\n}\n@IBAction func emailAddressDidEndOnExit(_ sender: Any) {\n\
  }\n}\nextension SignupViewController: UITextFieldDelegate {\nfunc textField(_ textField:\
  \ UITextField,\nshouldChangeCharactersIn range: NSRange,\nreplacementString string:\
  \ String) -> Bool {\nreturn true\n}\n}\n```\n清单 5-2. `SignupViewController.swift`\n\
  \n### 在登录场景和注册场景之间创建转场\n\n创建一个从登录视图控制器场景到故事板中创建账户视图控制器场景的 Present Modally 转场。选中该转场，切换到属性检查器，并将标识符属性的值设置为`presentCreateAccount`（见图\
  \ 5-10）。\n\n![A432412_1_En_5_Fig10_HTML.jpg](img/A432412_1_En_5_Fig10_HTML.jpg)\n\
  \n**图 5-10.** 设置转场的标识符属性\n\n关于构建应用的用户界面的话题到此结束。你可能想知道为什么在这个项目中直到此时还没有应用 TDD 技术。原因如下：\n\
  \n1.  我们使用故事板来构建应用的用户界面，并通过 Interface Builder 连接输出口和动作。Xcode 没有提供任何便捷的方法来使用测试优先的方法构建这部分应用程序。\n\
  2.  你可以选择以编程方式而非使用故事板来构建用户界面。然而，使用 TDD 技术构建用户界面几乎没有什么好处。\n3.  应用的 UI 可能会频繁更改，并且可以很容易地通过专门的\
  \ UI 测试技术或手动测试来测试。使用基于 TDD 的方法来构建 UI 是徒劳的，因为每次应用发生微小的 UI 更改时，你都需要修改测试。\n4.  如果你秉持“测试为项目创建动态文档”的理念，那么你会发现很难证明单元测试如何能比一张简单的截图更好地为应用的用户界面创建文档。\n\
  \n## 构建模型层\n\n我们需要构建两个模型类——`LoginModel`和`SignupModel`。在我们正在构建的这样一个简单的应用中，你可能会问为什么我们需要单独的模型类？我们可以简单地使用一个字符串字典来表示模型。\n\
  \n使用独立模型类的原因是为了在模型中容纳一定最低限度的数据验证。虽然验证逻辑本身可能被移到一个专门的验证器对象中，但这样的验证器对象在概念上将与模型对象一起存在于模型层中。\n\
  \n### LoginModel 类\n\n`LoginModel`类包含存储用户在应用登录屏幕字段中输入信息的属性。当用户点击用户界面上的登录按钮时，视图模型将构建一个`LoginModel`实例，并将该实例传递给一个处理登录特定逻辑的专用控制器类。这个专用的登录控制器类可能会连接到后端服务，并使用提供的凭据进行登录。\n\
  \n使用专用的模型对象来存储用户在登录屏幕字段中输入的值，可以将登录控制器中的逻辑与用户界面解耦。表 5-3 列出了`LoginModel`类的期望属性和方法。\n\
