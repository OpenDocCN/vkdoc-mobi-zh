  ### 构建 CookieController 类


  在 `CookieFactoryTests` 组下创建一个名为 `CookieControllerTests.swift` 的新单元测试用例文件，并确保该文件是测试目标的成员。将
  `CookieControllerTests.swift` 文件的内容替换为代码清单 2-4 中的代码。




