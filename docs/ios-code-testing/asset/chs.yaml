  }\n```\n\n清单 8-6. `downloadUserProfile()` 中的内联实现\n\n这种方法的缺点在于，它为一个本就代码量很大且未经测试的方法添加了更多代码。另一种方法是创建一个新类来处理邮箱地址验证，并将验证逻辑封装在该类的一个方法中。清单\
  \ 8-7 展示了名为 `EmailAddressValidator` 的类。\n\n```\nimport Foundation\nclass EmailAddressValidator:\
  \ NSObject {\nfunc validate(_ value:String) -> Bool {\nif (value.characters.count\
  \  0 {\nreturn false\n}\nlet numbers = Set(\"0123456789\".characters)\nif (value.characters.filter\
  \ {numbers.contains($0)}).count > 0 {\nreturn false\n}\nlet specialCharacters =\
  \ Set(\"+,!#$%^&*();\\\\/|\\\"\".characters)\nif (value.characters.filter {specialCharacters.contains($0)}).count\
  \ > 0 {\nreturn false\n}\nguard let regexValidator = try? NSRegularExpression(pattern:\
  \ \"([A-Z0-9._%+-]+@[A-Z0-9.-]+\\\\.[A-Z]{2,4})\", options: .caseInsensitive) else\
  \ {\nreturn false\n}\nif regexValidator.numberOfMatches(in: value,\noptions: NSRegularExpression.MatchingOptions.reportCompletion,\n\
  range: NSMakeRange(0, value.characters.count)) > 0 {\nreturn true\n}\nreturn false\n\
  }\n}\n```\n\n清单 8-7. `EmailAddressValidator.swift`\n\n由于这个类是新创建的，且不依赖于任何现有类，因此很容易对其进行测试。有了这个类，向\
  \ `downloadUserProfile()` 添加邮箱地址验证功能只需在该方法中增加三行代码：\n\n```\nif let userName = dictionary?[\"\
  username\"] as? String,\nlet emailAddress = dictionary?[\"emailAddress\"] as? String\
  \ {\nlet validator = EmailAddressValidator()\nif validator.validate(emailAddress)\
  \ == false {\nreturn\n}\nDispatchQueue.main.async {\nself.userNameLabel.text = userName\n\
  self.emailAddressLabel.text = emailAddress\n}\n}\n```\n\n### 重命名与替换\n\n如果你要对一个方法进行的修改是增加前置条件或后置条件，那么与其在源方法的开头/结尾添加代码，不如重命名源方法，并创建一个与源方法同名的新方法。现在你可以将代码添加到这个新方法中，然后从新方法调用原始方法。这种技术也称为**封装方法**。¹\n\
  \n举个例子，考虑另一个场景：要求你仅在互联网连接可用时启动下载凭据的过程，并且在成功下载有效凭据后将其保存到系统钥匙串中。\n\n这些修改要求你在开始下载之前添加一些代码，并在下载成功后添加一些代码。如果你采用本节所述的策略，那么你将创建一个名为\
  \ `downloadProfileHelper()` 的新私有方法，并将 `downloadProfile()` 中的所有现有代码移至 `downloadProfileHelper()`。\n\
  \n就类的公共接口而言，没有任何变化。在新的（当前为空的）`downloadProfile()` 方法中，你仍然会调用 `downloadProfileHelper()`；但你会用两个新方法的调用来包围这个调用，其中一个方法包含检查互联网连接的逻辑，另一个方法负责将凭据保存到钥匙串。\n\
  \n你的解决方案如下所示：\n\n```\nfunc downloadUserProfile() {\nif internetConnectionExists()\
  \ {\ndownloadUserProfileHelper()\nsaveUserCredentialsToKeychain()\n}\n}\nfunc internetConnectionExists()\
  \ -> Bool {\n// 检查互联网连接是否存在的代码\n}\nfunc saveUserCredentialsToKeychain() {\n// 将用户凭据保存到钥匙串的代码\n\
  }\nfunc downloadUserProfileHelper() {\n// downloadUserProfile 中之前存在的所有代码\n}\n```\n\
  \n\n\n### 装饰器\n\n在为遗留代码库添加新代码时，另一个巧妙的技巧是利用装饰器设计模式。装饰器设计模式允许你通过将一个类包装在另一个类中来为其添加功能，而新功能由包装类提供。\n\
  \n装饰器模式最好通过示例来解释。清单 8-8 展示了第 4 章开发的 `BankAccount` 类。\n\n```swift\nimport Foundation\n\
  class BankAccount: NSObject {\nvar accountName:String\nvar accountNumber:String\n\
  var sortingCode:String\nvar accountType:AccountType\nvar transactions:[Transaction]\n\
  var owners:[AccountOwner]\nvar accountBalance:Float {\nget {\nvar balance:Float\
  \ = 0.0\nfor transaction in self.transactions {\nif let amount = Float(transaction.amount)\
  \ {\nif transaction.isIncoming {\nbalance += amount\n} else {\nbalance -= amount\n\
  }\n}\n}\nreturn balance\n}\n}\ninit?(accountName:String,\naccountNumber:String,\n\
  sortingCode:String,\naccountType:AccountType,\nowners:[AccountOwner],\naccountNameValidator:AccountNameValidator?\
  \ = nil,\naccountNumberValidator:AccountNumberValidator? = nil,\nsortingCodeValidator:SortingCodeValidator?\
  \ = nil) {\nlet validator1 = accountNameValidator ?? AccountNameValidator()\nif\
  \ validator1.validate(accountName) == false {\nreturn nil\n}\nlet validator2 = accountNumberValidator\
  \ ?? AccountNumberValidator()\nif validator2.validate(accountNumber) == false {\n\
  return nil\n}\nlet validator3 = sortingCodeValidator ?? SortingCodeValidator()\n\
  if validator3.validate(sortingCode) == false {\nreturn nil\n}\nif (owners.count\
  \ == 0 || owners.count > 2) {\nreturn nil\n}\nself.accountName = accountName\nself.accountNumber\
  \ = accountNumber\nself.sortingCode = sortingCode\nself.accountType = accountType\n\
  self.owners = owners\nself.transactions = [Transaction]()\n}\nfunc setOpeningBalance(_\
  \ amount:Float) -> Void {\nif let openingBalanceTransaction = Transaction(txDescription:\
  \ \"Opening Balance\", date: NSDate(), isIncoming: true, amount: \"100.0\") {\n\
  self.transactions.removeAll()\nself.transactions.append(openingBalanceTransaction)\n\
  }\n}\nfunc withdraw(_ amount:Float, _ person:AccountOwner?) -> Void {\nif let newTransaction\
  \ = Transaction(txDescription: \"ATM Withdrawal\", date: NSDate(), isIncoming: false,\
  \ amount: \"\\(amount)\") {\nself.transactions.append(newTransaction)\n}\n}\nfunc\
  \ deposit(_ amount:Float, _ person:AccountOwner?) -> Void {\nif let newTransaction\
  \ = Transaction(txDescription: \"Cash Deposit\", date: NSDate(), isIncoming: true,\
  \ amount: \"\\(amount)\") {\nself.transactions.append(newTransaction)\n}\n}\n}\n\
  清单 8-8.\nBankAccount.swift\n```\n\n这个类有一个非常简单的接口，可以用来表示银行账户，并在银行系统中包含一系列交易记录。\n\n\
  现在，假设由于业务需求的变化，银行系统需要升级以区分个人账户和商业账户。两种类型的账户都需要应用每日存款和取款限额。此外，商业账户的所有存款和取款都需要记录到一个特殊的审计系统中。\n\
  \n这些需求可以通过创建名为 `PersonalBankAccount` 和 `BusinessBankAccount` 的装饰器类轻松处理，它们在现有 `BankAccount`\
  \ 类的基础上提供额外功能，从而满足这些特定账户类型的需求。\n\n首先，让我们将 `BankAccount` 类的外部接口移动到一个名为 `BankAccountProtocol`\
  \ 的协议中（见清单 8-9），并让 `BankAccount` 类实现这个协议。\n\n```swift\nprotocol BankAccountProtocol\
  \ : class {\nvar accountName:String {get set}\nvar accountNumber:String {get set}\n\
  var sortingCode:String {get set}\nvar accountType:AccountType {get set}\nvar transactions:[Transaction]\
  \ {get set}\nvar owners:[AccountOwner] {get set}\nfunc setOpeningBalance(_ amount:Float)\
  \ -> Void\nfunc withdraw(_ amount:Float, _ person:AccountOwner?) -> Void\nfunc deposit(_\
  \ amount:Float, _ person:AccountOwner?) -> Void\n}\n清单 8-9.\nBankAccountProtocol.swift\n\
  ```\n\n确保 `BankAccount` 类实现此协议所需的唯一更改是在类声明中添加协议名称：\n\n```swift\nclass BankAccount:\
  \ NSObject, BankAccountProtocol\n```\n\n完成此更改后，我们可以使用装饰器模式创建 `PersonalBankAccount`\
  \ 类，该类将施加每日存款和取款限额（清单 8-10）。\n\n```swift\nimport Foundation\nclass PersonalBankAccount\
  \ : NSObject , BankAccountProtocol {\nvar bankAccount:BankAccount\nvar accountName:String\
  \ {\nget {\nreturn bankAccount.accountName\n}\nset {\nbankAccount.accountName =\
  \ newValue\n}\n}\nvar accountNumber:String {\nget {\nreturn bankAccount.accountNumber\n\
  }\nset {\nbankAccount.accountNumber = newValue\n}\n}\nvar sortingCode:String {\n\
  get {\nreturn bankAccount.sortingCode\n}\nset {\nbankAccount.sortingCode = newValue\n\
  }\n}\nvar accountType:AccountType {\nget {\nreturn bankAccount.accountType\n}\n\
  set {\nbankAccount.accountType = newValue\n}\n}\nvar transactions:[Transaction]\
  \ {\nget {\nreturn bankAccount.transactions\n}\nset {\nbankAccount.transactions\
  \ = newValue\n}\n}\nvar owners:[AccountOwner] {\nget {\nreturn bankAccount.owners\n\
  }\nset {\nbankAccount.owners = newValue\n}\n}\nvar accountBalance:Float {\nget {\n\
  return bankAccount.accountBalance\n}\n}\ninit(_ bankAccount:BankAccount) {\nself.bankAccount\
  \ = bankAccount\nsuper.init()\n}\nfunc setOpeningBalance(_ amount:Float) -> Void\
  \ {\nbankAccount.setOpeningBalance(amount)\n}\nfunc withdraw(_ amount:Float, _ person:AccountOwner?)\
  \ -> Void {\nif withinDailyWithdrawalLimit(amount) {\nbankAccount.withdraw(amount,\
  \ person)\n}\n}\nfunc deposit(_ amount:Float, _ person:AccountOwner?) -> Void {\n\
  if withinDailyDepositlLimit(amount) {\nbankAccount.deposit(amount, person)\n}\n\
  }\n}\nextension PersonalBankAccount {\nfunc withinDailyWithdrawalLimit(_ amount:Float)\
  \ -> Bool {\n// 添加代码以确保此交易不超过每日取款限额。\nreturn true\n}\nfunc withinDailyDepositlLimit(_\
  \ amount:Float) -> Bool {\n// 添加代码以确保此交易不超过每日存款限额。\nreturn true\n}\n}\n清单 8-10.\n\
  PersonalBankAccount.swift\n```\n\n关于 `PersonalBankAccount` 类，需要注意的一些关键点如下：\n\n1.\
  \  创建了一个类型为 `BankAccount` 的实例变量，初始化器接受一个要注入的 `BankAccount` 实例。实际上，`PersonalBankAccount`\
  \ 类包装了一个 `BankAccount` 类：\n\n```swift\nvar bankAccount:BankAccount\ninit(_ bankAccount:BankAccount)\
  \ {\nself.bankAccount = bankAccount\nsuper.init()\n}\n```\n\n2.  装饰器类中的所有属性声明都会调用被包装类的对应属性：\n\
  \n```swift\nvar accountName:String {\nget {\nreturn bankAccount.accountName\n}\n\
  set {\nbankAccount.accountName = newValue\n}\n}\n```\n\n3.  `deposit` 和 `withdraw`\
  \ 方法在调用被包装类的对应方法之前实现了额外的逻辑：\n\n```swift\nfunc withdraw(_ amount:Float, _ person:AccountOwner?)\
  \ -> Void {\nif withinDailyWithdrawalLimit(amount) {\nbankAccount.withdraw(amount,\
  \ person)\n}\n}\nfunc deposit(_ amount:Float, _ person:AccountOwner?) -> Void {\n\
  if withinDailyDepositlLimit(amount) {\nbankAccount.deposit(amount, person)\n}\n\
  }\n```\n\n\n\n"
- "# 这就是装饰器模式的精髓。\n\n`PersonalBankAccount` 类装饰了 `BankAccount` 类，在 `BankAccount` 提供的功能基础上增加了一些额外的功能。你可以在代码中的任何位置使用\
  \ `PersonalBankAcccount` 实例来代替 `BankAccount` 实例。你也可以通过继承 `BankAccount` 并修改子类中实现的方法来实现此模式。延续用于创建\
  \ `PersonalBankAccount` 类的方法，`BusinessBankAccount` 类将与 `PersonalBankAccount` 类非常相似，唯一的区别在于\
  \ `deposit()` 和 `withdraw()` 方法的实现：\n\n```\nfunc withdraw(_ amount:Float, _ person:AccountOwner?)\
  \ -> Void {\n    if withinDailyWithdrawalLimit(amount) {\n        bankAccount.withdraw(amount,\
  \ person)\n        logWidthdrawalForAudit(amount, person)\n    }\n}\nfunc deposit(_\
  \ amount:Float, _ person:AccountOwner?) -> Void {\n    if withinDailyDepositlLimit(amount)\
  \ {\n        bankAccount.deposit(amount, person)\n        logDepositForAudit(amount,\
  \ person)\n    }\n}\n```\n\n## 使用协议解耦类\n\n在上一节中，我们研究了一些可用于向遗留类添加代码的技术，以便能够为这些新代码编写测试，同时对现有遗留代码的影响最小。\n\
  \n随着时间的推移，当你决定开始为遗留代码编写测试时，你可能会尝试一次为一个类编写单元测试。然而，遗留代码库中的类通常是紧密耦合的，并且无法孤立地实例化单个类。\n\
  \n这种紧密耦合表现为一棵依赖类树，为了实例化你真正感兴趣的类，需要实例化所有这些依赖类。\n\n当你将遗留类引入测试环境时，管理类之间的依赖关系将成为你将面临的最大挑战之一。在本节中，我们将研究如何使用协议来打破遗留代码库中常见的类之间的紧密耦合。\n\
  \n暂时考虑一下 `BankAccount` 类的实例变量，部分内容如下所示：\n\n```\nclass BankAccount: NSObject {\n\
  \    var accountName:String\n    var accountNumber:String\n    var sortingCode:String\n\
  \    var accountType:AccountType\n    var transactions:[Transaction]\n    var owners:[AccountOwner]\n\
  \    ...\n    ...\n}\n```\n\n`transactions` 和 `owners` 变量在该类与 `Transaction` 和 `AccountOwner`\
  \ 类之间建立了强耦合关系。在不引入其他两个类的情况下，无法在测试中实例化 `BankAccount`。\n\n你可以通过如下使用协议的方式来打破这些类之间的紧密耦合：\n\
  \n1.  创建两个新协议：`TransactionProtocol` 和 `AccountOwnerProtocol`。\n2.  在 `TransactionProtocol`\
  \ 协议中声明 `Transaction` 类所有的公开方法和公开实例变量。\n3.  在 `AccountOwnerProtocol` 协议中声明 `AccountOwner`\
  \ 类所有的公开方法和公开实例变量。\n4.  修改 `Transaction` 类的声明，使其实现 `TransactionProtocol` 协议。\n5.\
  \  修改 `AccountOwner` 类的声明，使其实现 `AccountOwnerProtocol` 协议。\n6.  修改 `BankAccount`\
  \ 类的声明，使其使用协议代替具体的类：\n\n```\nclass BankAccount: NSObject {\n    ...\n    ...\n \
  \   var transactions:[TransactionProtocol]\n    var owners:[AccountOwnerProtocol]\n\
  \    ...\n    ...\n}\n```\n\n通过为实例变量使用协议而不是具体的类名，你打破了 `BankAccount` 类先前存在的紧密耦合。现在可以轻松地将\
  \ `BankAccount` 类纳入测试，而无需引入 `Transaction` 和 `AccountOwner` 类。你可以使用存根对象来代替 `Transaction`\
  \ 和 `AccountOwner` 类。\n\n## 使用依赖注入创建更可测试的代码\n\n依赖注入（DI）背后的思想是使类和方法之间的依赖关系更加明确。考虑以下添加到\
  \ `BankAccount` 类中的看似无害的方法，该方法用于提供某个特定时间点的账户余额。\n\n```\nfunc accountBalanceDescription()\
  \ -> String {\n    let dateFormatter = DateFormatter()\n    dateFormatter.dateFormat\
  \ = \"MMMM dd yyyy\"\n    return \"The balance in your account as of \\(dateFormatter.string(from:\n\
  Date())) is \\(accountBalance)\"\n}\n```\n\n这个方法存在两个问题：\n\n1.  每次调用此方法时都会创建一个新的\
  \ `DateFormatter` 实例。这是非常低效的。\n2.  方法签名本身没有任何内容表明该方法会创建一个具有特定日期格式的日期格式化器。\n\n该方法显然依赖于一个\
  \ `DateFormatter` 实例，并且这种依赖是隐藏的，因为你需要查看方法的实现才能意识到它的存在。在这种情况下，为了使其更加明确，你可以简单地将日期格式化器作为参数注入到方法中：\n\
  \n```\nfunc accountBalanceDescription(_ dateFormatter:DateFormatter) -> String {\n\
  \    return \"The balance in your account as of \\(dateFormatter.string(from:\n\
  Date())) is \\(accountBalance)\"\n}\n```\n\n如果隐藏的依赖是资源或类的多个方法之间共享的数据源，那么问题会严重得多。例如，考虑以下一对方法：\n\
  \n```\nfunc deposit(_ amount:Float, _ person:AccountOwner) -> Void {\n    let transactionDate\
  \ = NSDate()\n    if let newTransaction = Transaction(txDescription: \"Cash Deposit\"\
  ,\n                                        date: transactionDate,\n            \
  \                            isIncoming: true,\n                               \
  \         amount: \"\\(amount)\") {\n        self.transactions.append(newTransaction)\n\
  \        UserDefaults.standard.set(transactionDate,\n                          \
  \        forKey: \"lastDepositDate\")\n    }\n}\nfunc lastDepositDate() -> NSDate?\
  \ {\n    return UserDefaults.standard.object(forKey: \"lastDepositDate\")\n    \
  \    as? NSDate\n}\n```\n\n这些方法的问题在于它们对共享的 `UserDefaults` 实例存在隐藏依赖。这种代码非常难以测试。同样，你可以通过将依赖关系暴露在作为方法输入的参数列表中来打破这些方法与\
  \ `UserDefaults` 类之间的紧密耦合：\n\n```\nfunc deposit(_ amount:Float, _ person:AccountOwner?,\n\
  \             _ defaults:UserDefaults) -> Void {\n    let transactionDate = NSDate()\n\
  \    if let newTransaction = Transaction(txDescription: \"Cash Deposit\",\n    \
  \                                    date: transactionDate,\n                  \
  \                      isIncoming: true,\n                                     \
  \   amount: \"\\(amount)\") {\n        self.transactions.append(newTransaction)\n\
  \        defaults.set(transactionDate, forKey: \"lastDepositDate\")\n    }\n}\n\
  func lastDepositDate(_ defaults:UserDefaults) -> NSDate? {\n    return defaults.object(forKey:\
  \ \"lastDepositDate\") as? NSDate\n}\n```\n\n然而，这个方案给我们带来了一个新问题——这两个方法旨在访问同一个 `UserDefaults`\
  \ 实例。通过将 `UserDefaults` 实例暴露在参数列表中，你现在允许用户可能将不同的 `UserDefaults` 实例注入到这些方法中。\n\n\
  在这种情况下，更好的解决方案是将 `UserDefaults` 实例设置为同时包含这两个方法的类的实例变量，并且不在方法签名中暴露 `UserDefaults`\
  \ 对象：\n\n```\nclass BankAccount: NSObject {\n    var defaults:UserDefaults?\n  \
  \  ...\n    ...\n    ...\n    func deposit(_ amount:Float, _ person:AccountOwner?)\
  \ -> Void {\n        let transactionDate = NSDate()\n        if let newTransaction\
  \ = Transaction(txDescription: \"Cash Deposit\",\n                             \
  \               date: transactionDate,\n                                       \
  \     isIncoming: true,\n                                            amount: \"\\\
  (amount)\") {\n            self.transactions.append(newTransaction)\n          \
  \  self.defaults?.set(transactionDate, forKey: \"lastDepositDate\")\n        }\n\
  \    }\n    func lastDepositDate() -> NSDate? {\n        return self.defaults?.object(forKey:\
  \ \"lastDepositDate\") as? NSDate\n    }\n    ...\n    ...\n    ...\n}\n```\n\n\
  明确依赖关系会导致对象之间的耦合更松散，并使隔离测试方法变得更容易。\n\n\n\n## 总结\n\n在本章中，你学习了重构遗留代码或将经过良好测试的代码添加到遗留代码库的不同方法。你学会了运用**单一职责原则**将大型类拆分为更小的类，并将新代码封装到方法或新类中。\n\
  \n你还学习了使用协议作为解耦类的方式，应用装饰器模式，以及通过依赖注入来创建更易于测试的代码。\n\n## 备注\n\n1. 《重构遗留代码》，Michael\
  \ C. Feathers 著，Prentice Hall Professional Technical Reference 出版。ISBN 0-13-117705-2。\n\
  \n"
- "# 持续集成\n\n持续集成（CI）是一种软件开发方法，要求开发者频繁地将代码推送到共享仓库，并在专用的构建计算机上触发自动化的测试和构建流程。构建周期可以定时触发，也可以在每次代码推送后触发。\n\
  \n当在构建周期中包含了单元（或用户界面）测试套件时，CI 系统只会在所有测试通过的情况下生成构建。测试失败通常会向开发团队的所有成员发送电子邮件通知。\n\n\
  虽然 CI 系统并不强制要求在构建过程之前运行一套自动化测试，但拥有这些测试的关键优势在于能够尽早发现并捕获问题。如果团队中的某位开发者进行了更改，并且在将更改推送到仓库后构建立即失败，那么很可能是推送的文件中存在问题导致了构建失败。\n\
  \n当 CI 系统成功创建了一个构建时，该构建会存储在 CI 系统中，供团队成员下载。测试人员可以随时直接从 CI 系统获取最新的构建版本。\n\n为了使 CI\
  \ 系统正常运行，团队中的开发者必须同意以下原则：\n\n-   频繁地将代码推送到仓库。\n-   不要将损坏的代码推送到仓库。\n-   在推送到仓库之前，务必在其开发机器上运行一套测试。\n\
  \n苹果公司提供了自己的 CI 系统，名为 **Xcode Server**，它与 Xcode 开发环境无缝集成。Xcode Server 是 macOS Server\
  \ 的一部分，安装 Xcode 时不会自动安装它。要使用 Xcode Server，你需要在 Mac 上安装并配置 macOS Server 应用和 Xcode。\n\
  \n## 备注\n\n一个典型的持续集成工作流程是，开发者使用开发用 Mac，并需要一个单独的专用 Mac 作为构建服务器。构建服务器上同时安装了 Xcode\
  \ 和 Xcode Server。构建计算机也可以托管你的源代码仓库，或者连接到托管在 GitHub/BitBucket 上的远程仓库。如果你没有专用的构建计算机，可以在你的开发用\
  \ Mac 上安装 macOS Server 应用。\n\n## 安装 macOS Server\n\n安装 macOS Server 是一个直接了当的过程。正如本章前面所述，公司通常会在网络上使用一台专用\
  \ Mac 作为持续集成服务器。本章中的说明与你安装 macOS Server 的 Mac 无关。\n\n## 注释\n\n在你的 Mac 上安装 macOS\
  \ Server 之前，必须确保以下几点：\n\n-   你的 Mac 上已安装最新版本的 Xcode。\n-   你已经下载并安装了相关的配置文件、模拟器和证书。\n\
  -   拥有该 Mac 的管理员凭证。\n-   拥有一个 iTunes 账户（用于 Mac App Store）。\n-   拥有访问存放源代码的 Git 仓库的凭证。\n\
  \n要在你打算使用 Xcode Server 的 Mac 上开始安装过程，请在 Mac App Store 中找到 macOS Server 应用，然后点击“安装”（见图\
  \ 9-1）。\n\n![A432412_1_En_9_Fig1_HTML.jpg](img/A432412_1_En_9_Fig1_HTML.jpg)\n\n\
  图 9-1. Mac App Store 中的 macOS Server\n\n### 启动 macOS Server\n\n一旦在你的 Mac 上安装了 macOS\
  \ Server，可以通过从“应用程序”目录启动 `Server.app`、在聚焦搜索中输入 `Server`、或点击程序坞中的启动台图标然后点击 `Server`\
  \ 来启动它。首次启动 macOS Server 应用时，会提示你进行配置（见图 9-2）。\n\n![A432412_1_En_9_Fig2_HTML.jpg](img/A432412_1_En_9_Fig2_HTML.jpg)\n\
  \n图 9-2. macOS Server 配置界面\n\n点击“继续”后，会要求你接受许可协议的条款。接受许可协议后，系统会提示你提供 Mac 上管理员账户的凭证。提供正确的凭证后，macOS\
  \ Server 将花费几分钟时间在 Mac 上安装和配置各种服务（见图 9-3）。\n\n![A432412_1_En_9_Fig3_HTML.jpg](img/A432412_1_En_9_Fig3_HTML.jpg)\n\
  \n图 9-3. macOS Server 安装设置流程\n\n在后续启动时，系统会要求你选择一个要管理的服务器实例（见图 9-4）。如果你同时在开发用 Mac\
  \ 和专用构建 Mac 上安装了 macOS Server，那么你可以选择管理开发 Mac 上的本地服务器实例，或者构建 Mac 上的服务器实例。选择适当的选项，然后点击“继续”。\n\
  \n![A432412_1_En_9_Fig4_HTML.jpg](img/A432412_1_En_9_Fig4_HTML.jpg)\n\n图 9-4. 选择要管理的服务器实例\n\
  \n仅当远程 Mac 安装了 macOS Server，并且其 Server 应用的“设置”选项卡中启用了“在远程电脑上使用 Server 应用”选项时，你才能管理远程\
  \ Mac。（见图 9-5。）\n\n![A432412_1_En_9_Fig5_HTML.jpg](img/A432412_1_En_9_Fig5_HTML.jpg)\n\
  \n图 9-5. 远程管理 macOS Server 实例所需的设置\n\n### 设置团队成员访问权限\n\n如果你在专用 Mac 上运行 macOS Server，则应创建用户账户，以允许其他\
  \ Mac 上的用户连接到该服务器并访问可用服务。\n\n在侧边栏中，点击“账户”部分下的“用户”（见图 9-6）。这将弹出可以访问 macOS Server\
  \ 的用户列表。使用添加（`+`）按钮为你网络上的其他 Mac 用户创建账户。你在此处创建的凭证将供其他用户从其 Mac 连接到该服务器实例时使用，与他们用于登录自己\
  \ Mac 的凭证无关。\n\n![A432412_1_En_9_Fig6_HTML.jpg](img/A432412_1_En_9_Fig6_HTML.jpg)\n\
  \n图 9-6. 为其他团队成员创建用户账户\n\n当你的团队成员从 Xcode 连接到 Xcode Server 时，他们需要提供这些凭证。这将在本章后面的“向\
  \ Xcode 添加 Xcode Server 凭证”主题中介绍。\n\n\n\n### 启动 Xcode Server\n\n启动 macOS 服务器应用，在侧边栏的\
  \ `Services` 部分下，找到 `Xcode` 选项。（见图 9-7。）\n\n![A432412_1_En_9_Fig7_HTML.jpg](img/A432412_1_En_9_Fig7_HTML.jpg)\n\
  \n图 9-7. 启动 Xcode Server\n\n您可以使用窗口右上角的开关来启动/停止 Xcode Server 进程。默认情况下，macOS 服务器应用提供的所有服务都是关闭的。\n\
  \n如果这是您首次在电脑上运行 Xcode Server，系统会要求您提供本地电脑上 Xcode 的路径，用于创建构建。如果您尚未安装 Xcode，请退出 macOS\
  \ 服务器应用，从 Mac App Store 安装最新版本的 Xcode，然后从中断处继续学习。\n\n点击 `Choose Xcode…` 按钮，在您的 `Applications`\
  \ 目录中选择 `Xcode.app` 应用程序。将来，您可以从 Xcode server 设置页面选择使用不同版本的 Xcode 来创建构建。\n\nXcode\
  \ Server 在其自己的用户账户中运行。在之前的版本中，这是在 Mac 上创建的一个隐藏用户账户。自 Xcode Server 5.2 版本起，此账户与您系统上的任何其他账户一样，您甚至可以登录此账户。\n\
  \n当系统要求为 Xcode Server 提供一个账户时（见图 9-8），您可以选择创建一个新账户或使用现有账户。最佳实践是为 Xcode server 保留一个专用的非管理账户，而不要使用您的日常账户。\n\
  \n![A432412_1_En_9_Fig8_HTML.jpg](img/A432412_1_En_9_Fig8_HTML.jpg)\n\n图 9-8. Xcode\
  \ Server 用户账户\n\n如果您使用的是单台 Mac 设置，且 Xcode server 与日常开发运行在同一台电脑上，则必须登录为您为 Xcode server\
  \ 创建的专用用户账户。然后，您可以使用快速用户切换功能，从 Xcode Server 用户账户切换回您的日常使用账户，并让 Xcode Server 进程在后台继续运行。\n\
  \n**注意：** Xcode server 将“构建”称为“集成”。\n\n一旦您为 Xcode server 提供了可用的用户账户，系统将提示您以该用户身份登录（见图\
  \ 9-9）。\n\n![A432412_1_En_9_Fig9_HTML.jpg](img/A432412_1_En_9_Fig9_HTML.jpg)\n\n\
  图 9-9. 使用专用用户账户登录\n\n您可以选择立即登录，或稍后登录。如果您选择稍后登录，可以通过多种方式完成，包括使用 Xcode Server 配置页面内置的\
  \ `Login` 选项（见图 9-10）。\n\n![A432412_1_En_9_Fig10_HTML.jpg](img/A432412_1_En_9_Fig10_HTML.jpg)\n\
  \n图 9-10. Xcode Server 配置页面内的登录选项\n\n**注意：** 您无需登录指定账户，仍可继续配置 Xcode server。但是，在登录您提供的专用用户账户之前，您将无法进行集成。\n\
  \n### 配置 Xcode Server\n\nXcode Server 允许您通过设置页面配置各种参数，包括：\n\n-   用于集成的 Xcode 版本。\n\
  -   开发者团队\n-   权限\n-   代码仓库\n\n可以通过 `View` ➤ `Xcode` 菜单项访问此设置页面。该设置页面有两个标签页，分别标记为\
  \ `Settings` 和 `Repositories`（见图 9-11）。\n\n![A432412_1_En_9_Fig11_HTML.jpg](img/A432412_1_En_9_Fig11_HTML.jpg)\n\
  \n图 9-11. Xcode Server 配置页面\n\nXcode 版本、权限和开发者团队可以在标记为 `Settings` 的标签页下进行配置，而代码仓库可以在标记为\
  \ `Repositories` 的标签页下进行配置。\n\n#### Xcode 版本\n\n要更改用于后续集成的 Xcode 版本，请点击 Xcode 服务设置页面中的\
  \ `Choose Xcode…` 按钮，然后选择与您要使用的 Xcode 版本对应的 `.app` 文件。\n\n### Apple 开发者团队\n\n如果您想使用\
  \ Xcode Server 在配置好的开发设备上部署构建并运行测试，则需要将服务器添加到您的 Apple 开发者账户所用的某个开发者团队中。\n\n将服务器添加到开发者团队，将允许\
  \ Xcode Server 下载为您的设备准备构建所需的配置文件（provisioning profiles）和签名证书（signing certificates）。\n\
  \n要将服务器添加到您的开发者团队，请点击 Xcode 服务设置页面中的 `Add Team…` 按钮（见图 9-12）。\n\n![A432412_1_En_9_Fig12_HTML.jpg](img/A432412_1_En_9_Fig12_HTML.jpg)\n\
  \n图 9-12. 将 Xcode Server 添加到您的 Apple 开发者账户\n\n系统将要求您登录 iOS 开发者账户并选择一个开发者团队。输入您的\
  \ iOS 开发者账户凭据，然后点击 `Sign-In`（见图 9-13）。\n\n![A432412_1_En_9_Fig13_HTML.jpg](img/A432412_1_En_9_Fig13_HTML.jpg)\n\
  \n图 9-13. 使用 Apple 开发者凭据登录\n\n#### 开发设备\n\n在将开发者团队添加到 Xcode server 后，您可以将已配置的开发设备连接到运行\
  \ Xcode Server 的 Mac。此设备可用于运行自动化测试。您将在“开发设备”列表中看到所有已连接的设备（见图 9-14）。如果断开设备与 Mac 的连接，它将从此列表中移除。\n\
  \n![A432412_1_En_9_Fig14_HTML.jpg](img/A432412_1_En_9_Fig14_HTML.jpg)\n\n图 9-14.\
  \ 已连接的设备在“开发设备”部分可见\n\n#### 代码仓库\n\nXcode Server 要求您将其连接到一个或多个源代码仓库。这些代码仓库本身可以远程托管，也可以在\
  \ Xcode Server 内托管。对于远程托管的代码仓库，Xcode Server 支持 Git 和 Subversion；但对于本地托管的代码仓库，Xcode\
  \ Server 仅支持 Git。\n\n如果您的代码仓库托管在远程服务器（例如 BitBucket 或 GitHub）上，则无需使用代码仓库标签页中的任何选项。相反，您需要在开发机的\
  \ Xcode 中配置适当的访问凭据，并且在从 Xcode 内部在 Xcode server 上创建构建作业（也称为 Bot）时，也需要提供这些凭据。\n\n\
  如果您的代码仓库没有托管在远程服务器上，您可以使用代码仓库标签页中的选项来创建将在 Xcode Server 内托管的 Git 代码仓库。\n\n\n\n###\
  \ 在 Xcode Server 上创建新的 Git 仓库\n\n图 9-15 展示了仓库标签页中可用的选项。在此标签页中，你可以管理托管在 Xcode Server\
  \ 中的仓库，配置安全协议，以及设置可以访问这些仓库的用户列表。\n\n![A432412_1_En_9_Fig15_HTML.jpg](img/A432412_1_En_9_Fig15_HTML.jpg)\n\
  \n图 9-15. Xcode Server 仓库标签页\n\n要配置可用于验证连接到 Xcode Server 中托管的仓库的用户的安全协议，请点击“编辑仓库访问…”按钮。系统会弹出一个对话框，要求你选择允许的协议。可选的协议有\
  \ `HTTPS` 和 `SSH`（见图 9-16）。\n\n![A432412_1_En_9_Fig16_HTML.jpg](img/A432412_1_En_9_Fig16_HTML.jpg)\n\
  \n图 9-16. Xcode Server 中托管仓库的安全协议设置\n\n要配置可以访问 Xcode Server 中托管的仓库的用户列表，请点击“编辑仓库创建者”。默认情况下，任何已在\
  \ Xcode 中登录 Xcode Server 的用户都可以访问你的仓库并创建 Bot。\n\n希望连接到这些仓库的用户需要在其开发 Mac 上的 Xcode\
  \ 中添加账户凭据，以便 Xcode 能够访问这些仓库。这通常通过 Xcode 中的“账户”偏好设置部分完成，本章稍后会对此进行介绍。\n\n要创建新仓库，请点击仓库列表下方的“添加\
  \ (+)”按钮（见图 9-17）。\n\n![A432412_1_En_9_Fig17_HTML.jpg](img/A432412_1_En_9_Fig17_HTML.jpg)\n\
  \n图 9-17. 在 Xcode Server 中创建新仓库\n\n输入仓库名称，该名称将出现在“托管的仓库”列表中，并成为访问 URL 的一部分。\n\n\
  点击“编辑”按钮，指定能够通过 `SSH` 访问仓库的用户。要启用 `HTTPS` 访问，请选中“允许已登录用户读写”复选框。\n\n点击“创建”完成新 Git\
  \ 仓库的创建。新仓库将出现在仓库列表中。要更改谁有权访问该仓库，请从仓库列表中选择该仓库，然后点击列表下方的“编辑”按钮（见图 9-18）。\n\n![A432412_1_En_9_Fig18_HTML.jpg](img/A432412_1_En_9_Fig18_HTML.jpg)\n\
  \n图 9-18. 编辑有权访问现有仓库的用户\n\n## 配置 Xcode\n\n在本节中，我们将介绍如何将开发 Mac 上的 Xcode 连接到 Xcode\
  \ Server 实例并克隆仓库。\n\n### 向 Xcode 添加 Xcode Server 凭据\n\n要在你的开发 Mac 上访问托管在 Xcode Server\
  \ 上的 Git 仓库，以及在 Xcode Server 上创建 Bot，你需要将开发 Mac 上的 Xcode 连接到 Xcode Server。\n\n在你的开发\
  \ Mac 上启动 Xcode，然后选择 `Xcode ➤ 偏好设置` 菜单项。切换到“账户”标签页（见图 9-19）。\n\n![A432412_1_En_9_Fig19_HTML.jpg](img/A432412_1_En_9_Fig19_HTML.jpg)\n\
  \n图 9-19. Xcode 账户偏好设置\n\n此标签页列出了你的开发账户、远程托管的仓库以及 Xcode Server 实例。要将 Xcode 连接到你的\
  \ Xcode Server 实例，请点击列表底部的“添加 (+)”按钮，然后从选项列表中选择“添加服务器…”。\n\n从服务器列表中选择一个 Xcode Server\
  \ 实例，然后点击“添加”（见图 9-20）。\n\n![A432412_1_En_9_Fig20_HTML.jpg](img/A432412_1_En_9_Fig20_HTML.jpg)\n\
  \n图 9-20. 在 Xcode 中添加指向远程 Xcode Server 实例的书签\n\n当提示输入访问凭据时，请输入用户名和密码（这应该由你的 Xcode\
  \ Server 管理员提供给你）。\n\n现在，你将在“账户”标签页的“服务器”部分下看到列出的构建服务器（见图 9-21）。\n\n![A432412_1_En_9_Fig21_HTML.jpg](img/A432412_1_En_9_Fig21_HTML.jpg)\n\
  \n图 9-21. 显示 Xcode Server 实例的 Xcode 账户页面\n\n### 创建新的 Xcode 项目并将其仓库托管在 Xcode Server\
  \ 上\n\n一旦你在 Xcode 中添加了访问 Xcode Server 的凭据，就可以将你创建的每个新项目的仓库托管在服务器上。为此，当系统要求你选择新项目的位置时，请启用“源代码控制”复选框，并从可用选项列表中选择服务器名称（见图\
  \ 9-22）。\n\n![A432412_1_En_9_Fig22_HTML.jpg](img/A432412_1_En_9_Fig22_HTML.jpg)\n\
  \n图 9-22. 在 Xcode Server 上托管新项目的仓库\n\n如果服务器没有出现在列表中，请确保已将服务器添加到 Xcode，并且你的用户帐户具有在\
  \ Xcode Server 上创建仓库的权限。\n\n### 将现有的本地仓库克隆到 Xcode Server\n\n如果你在开发 Mac 上的 Git 仓库中有一个现有的\
  \ Xcode 项目，并希望将该仓库克隆到 Xcode Server，请打开 Xcode 项目并点击 `源代码控制 ➤ 你的项目名称 ➤ 配置` 菜单项。`你的项目名称`\
  \ 是你的 Xcode 项目名称的占位符（见图 9-23）。\n\n![A432412_1_En_9_Fig23_HTML.jpg](img/A432412_1_En_9_Fig23_HTML.jpg)\n\
  \n图 9-23. 为现有 Xcode 项目配置源代码控制选项\n\n切换到“远程”标签页，点击“添加 (+)”按钮，然后从上下文菜单中选择“创建新的远程”（见图\
  \ 9-24）。\n\n![A432412_1_En_9_Fig24_HTML.jpg](img/A432412_1_En_9_Fig24_HTML.jpg)\n\
  \n图 9-24. 仓库配置对话框\n\n选择一个正在运行的 Xcode Server 实例，输入一个有助于你识别远程仓库的名称，然后点击“创建”。\n\n\n\
  \n### 从 Xcode Server 克隆 Git 仓库\n\n如果你在 Xcode Server 上有一个现有仓库，并希望将其克隆到你的开发用 Mac 上，请在此\
  \ Mac 上启动 Xcode，然后选择 **“Xcode”** ➤ **“偏好设置”** 菜单项。\n\n切换到 **“账户”** 标签，点击 **“账户/仓库/服务器”**\
  \ 列表底部的 **“添加 (+)”** 按钮，然后从选项列表中选择 **“添加仓库…”**。\n\n系统将弹出一个对话框，让你提供新仓库的详细信息（见图 9-25）。\n\
  \n![A432412_1_En_9_Fig25_HTML.jpg](img/A432412_1_En_9_Fig25_HTML.jpg)\n\n图 9-25.\
  \ 从 Xcode Server 克隆仓库\n\n在 **“地址”** 字段中，输入 Xcode Server 上仓库的 URL。该 URL 以 `https`\
  \ 或 `ssh` 开头，具体取决于你希望使用的安全协议。该 URL 可以从 Xcode Server 内的仓库设置中获取。\n\n例如，以下 URL 表示一个名为\
  \ **“TestGitRepositoryHostedOnXcodeServer”** 的仓库，它托管在名为 **“Abhisheks-MacBook”**\
  \ 的 Mac 上运行的 Xcode Server 中，并通过 HTTPS 访问。\n\n`https://Abhisheks-MacBook.local/git/TestGitRepositoryHostedOnXcodeServer.git`\n\
  \n在仓库类型组合框中指定 **“Git”**，并将身份验证设置为 **“用户名和密码”**。输入访问该仓库所需的凭据，然后点击 **“添加”**。\n\n你的仓库现在将出现在账户对话框的仓库列表中（见图\
  \ 9-26）。至此，你已成功在 Xcode 中为 Git 仓库添加了一个书签。\n\n![A432412_1_En_9_Fig26_HTML.jpg](img/A432412_1_En_9_Fig26_HTML.jpg)\n\
  \n图 9-26. Xcode 账户对话框中列出的远程仓库\n\n要在你的开发用 Mac 上签出仓库，请关闭账户对话框，然后使用 **“源代码控制”** ➤ **“签出”**\
  \ 菜单项。从可用的仓库名称列表中选择该仓库，然后点击 **“下一步”**。在硬盘上指定一个位置来保存仓库克隆，然后点击 **“下载”**。\n\n### 从\
  \ GitHub 克隆 Git 仓库\n\n如果你在 GitHub/BitBucket 上托管了一个现有仓库，并希望将其克隆到你的开发用 Mac 上，请在此 Mac\
  \ 上启动 Xcode，然后选择 **“Xcode”** ➤ **“偏好设置”** 菜单项。\n\n切换到 **“账户”** 标签，点击 **“账户/仓库/服务器”**\
  \ 列表底部的 **“添加 (+)”** 按钮，然后从选项列表中选择 **“添加仓库…”**。\n\n在 **“地址”** 字段中，输入远程仓库的 URL。在仓库类型组合框中指定\
  \ **“Git”**，并将身份验证设置为 **“用户名和密码”**。输入访问该仓库所需的凭据，然后点击 **“添加”**。该仓库现在将出现在账户对话框的仓库列表中。\n\
  \n要在你的开发用 Mac 上签出仓库，请关闭账户对话框，然后使用 **“源代码控制”** ➤ **“签出”** 菜单项。从可用的仓库名称列表中选择该仓库，然后点击\
  \ **“下一步”**。在硬盘上指定一个位置来保存仓库克隆，然后点击 **“下载”**。\n\n## 创建与集成 Bot\n\nBot 是一种在服务器端运行的进程（在\
  \ Xcode Server 上执行），用于对项目的当前版本执行集成。Bot 的单次运行称为一次集成，包括从仓库拉取项目代码的最新版本、构建项目、运行测试、创建构建产物（`.ipa`\
  \ 文件）以及归档构建产物。\n\n你可以将 bot 配置为按需执行集成、按计划执行集成，或在代码每次被推送到仓库时执行集成。创建能够在开发团队成员推送代码时自动执行集成的\
  \ bot，使得 bot（以及 Xcode Server）在任何持续集成流水线中都成为一项宝贵的工具。\n\n除了按计划集成和按需集成之外，当你更新已安装的 Xcode\
  \ 版本时，bot 也会自动执行集成。这些集成会在任何常规计划集成之前立即运行。你可以将这些集成与之前的集成进行比较，以识别可能因升级而遇到的问题。\n\n>\
  \ **注**  \n> 本章本节中的截图基于从 GitHub 上的现有仓库签出现有项目。你需要使用自己仓库中托管的项目来执行这些步骤。\n\n\n\n###\
  \ 创建 Bot\n\n要在 `Xcode Server` 上为项目创建一个 bot，项目的代码必须先提交到仓库，并且必须使用本章前面列举的技术之一将该仓库添加到\
  \ `Xcode` 或 `Xcode Server` 中。\n\n除了将项目保存在仓库中外，您还需要共享项目的构建方案。构建方案汇集了有关特定构建配置和目标的信息。共享方案是发布到仓库的方案，从而使它对\
  \ `Xcode Server` 可见。\n\n当您创建新的 `iOS` 项目时，`Xcode` 会创建一个默认方案，该方案执行以下操作：\n\n- `Analyze`：执行静态代码分析。\n\
  - `Test`：运行单元测试和/或 UI 测试。\n- `Archive`：创建一个 `.ipa` 可执行文件。\n\n> **注意**  \n> 调试方案中的归档操作默认设置为归档一个发布版本。创建发布版本需要在项目中设置适当的配置文件（provisioning\
  \ profiles）和证书。您还需要确保这些配置文件和证书已安装在构建 Mac 上。\n\n然而，默认的构建方案并未共享。要共享构建方案，请在 `Xcode`\
  \ 中打开包含该构建方案的项目，并使用 `Product ➤ Scheme ➤ Manage Schemes` 菜单项。这将显示为项目定义的所有构建方案的列表（见图\
