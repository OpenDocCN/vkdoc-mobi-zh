  此时你会收到几个编译器错误，因为 `CookieController` 类还不存在。这些测试为 `CookieController` 类定义了以下期望的特征：


  *   `CookieController` 类必须有一个不接受任何参数的初始化器。

  *   `CookieController` 类必须有三个数组，每种类型的饼干对应一个。

  *   `CookieController` 类必须有一个名为 `addGingerbreadCookie()` 的方法，调用该方法会向相应的数组中添加一块姜饼饼干。

  *   `CookieController` 类必须有一个名为 `addShortbreadCookie()` 的方法，调用该方法会向相应的数组中添加一块黄油饼干。

  *   `CookieController` 类必须有一个名为 `addChocolateChipCookie()` 的方法，调用该方法会向相应的数组中添加一块巧克力饼干。

  *   `CookieController` 类必须有一个名为 `reset()` 的方法，调用该方法会清空所有数组。


  我使用了类扩展来分组测试每个方法。这样做唯一的好处是提高了可读性；如果你愿意，完全可以将所有测试从扩展移到主类中。你可能也注意到了，我使用了较长的描述性名称来命名测试方法。你应该尝试创建描述性的名称，明确描述所测试的方法名称、初始条件和预期输出。


  在 `CookieFactory` 组下创建一个名为 `CookieController` 的新 Swift 类，并将其内容更新为与清单 2-5 一致。


  ```swift

  import Foundation

  class CookieController : NSObject {

  var shortbreadCookies:[Cookie]?

  var gingerbreadCookies:[Cookie]?

  var chocolateChipCookies:[Cookie]?

  override init() {

  self.shortbreadCookies = [Cookie]()

  self.gingerbreadCookies = [Cookie]()

  self.chocolateChipCookies = [Cookie]()

  super.init()

  }

  func reset() {

  self.shortbreadCookies?.removeAll()

  self.gingerbreadCookies?.removeAll()

  self.chocolateChipCookies?.removeAll()

  }

  func addShortbreadCookie() -> Void {

  let cookie = Cookie(.shortbread)

  shortbreadCookies?.append(cookie)

  }

  func addGingerbreadCookie() -> Void {

  let cookie = Cookie(.gingerbread)

  gingerbreadCookies?.append(cookie)

  }

  func addChocolateChipCookie() -> Void {

  let cookie = Cookie(.chocolateChip)

  chocolateChipCookies?.append(cookie)

  }

  }

  清单 2-5.

  CookieController.swift

  ```


  保存文件，然后使用 **Product ➤ Test** 菜单项运行所有测试。你应该会看到所有测试都通过了（见图 2-22）。


  ![A432412_1_En_2_Fig22_HTML.jpg](img/A432412_1_En_2_Fig22_HTML.jpg)


  图 2-22. 显示所有测试通过的测试检查器




  ### 更新视图控制器类


  至此，你已经使用测试驱动开发技术构建了 `Cookie` 和 `CookieFactory` 两个类。现在，是时候将 `CookieFactory` 类集成到视图控制器中了。


  虽然你也可以使用测试驱动技术来执行集成，但为简化本章内容，我选择在视图控制器类上不使用 TDD 技术。第 5 章将详细阐述如何将 TDD 技术应用于视图控制器。


  请将 `ViewController.swift` 文件的内容更新为清单 2-6 所示。


  ```swift

  import UIKit

  class ViewController: UIViewController {

  var cookiejar:CookieController?

  @IBOutlet weak var totalCookies: UILabel!

  @IBOutlet weak var gingerbreadCookies: UILabel!

  @IBOutlet weak var shortbreadCookies: UILabel!

  @IBOutlet weak var chocolateChipCookies: UILabel!

  override func viewDidLoad() {

  super.viewDidLoad()

  cookiejar = CookieController()

  refreshUI()

  }

  override func didReceiveMemoryWarning() {

  super.didReceiveMemoryWarning()

  }

  @IBAction func onGenerateGingerbreadCookies(_ sender: Any) {

  cookiejar?.addGingerbreadCookie()

  refreshUI()

  }

  @IBAction func onGenerateChocolateChipCookies(_ sender: Any) {

  cookiejar?.addChocolateChipCookie()

  refreshUI()

  }

  @IBAction func onGenerateShortbreadCookies(_ sender: Any) {

  cookiejar?.addShortbreadCookie()

  refreshUI()

  }

  @IBAction func onClearAllCookies(_ sender: Any) {

  cookiejar?.reset()

  refreshUI()

  }

  private func refreshUI() -> Void {

  let totalGinger = cookiejar!.gingerbreadCookies!.count

  let totalShort = cookiejar!.shortbreadCookies!.count

  let totalChocolate = cookiejar!.chocolateChipCookies!.count

  let total = totalGinger + totalShort + totalChocolate

  gingerbreadCookies.text = "Gingerbread cookies: \(totalGinger)"

  shortbreadCookies.text = "Shortbread cookies: \(totalShort)"

  chocolateChipCookies.text = "Chocolate chip cookies: \(totalChocolate)"

  totalCookies.text = "Total cookies: \(total)"

  }

  }

  清单 2-6.

  ViewController.swift

  ```


  保存项目，并使用 **Product** ➤ **Run** 菜单项在模拟器上运行它。在你有机会试用该应用程序并验证其正常运行后，你可能想进一步探究单元测试的有效性。


  评估单元测试有效性的一种方法是使用代码覆盖率报告。该报告将提供关于测试代码执行了多少行应用程序代码的信息。


  下一节将介绍 Xcode 的代码覆盖率报告工具。在查看代码覆盖率报告之前，必须确保已至少执行过一次单元测试。


  关闭 Xcode 时，代码覆盖率数据会被删除。如果在 Xcode 中重新打开项目，你需要使用 **Product** ➤ **Test** 菜单项运行所有单元测试，以便
  Xcode 生成代码覆盖率数据。


  ### 查看代码覆盖率数据


  如果你在方案设置对话框中启用了代码覆盖率报告，你将看到代码覆盖率条出现在源代码编辑器的右侧。点击项目导航器中的 `CookieFactory.swift` 文件，观察代码覆盖率条中的数字（见图
  2-23）。


  ![A432412_1_En_2_Fig23_HTML.jpg](img/A432412_1_En_2_Fig23_HTML.jpg)


  图 2-23. Xcode 代码覆盖率信息


  你会注意到，代码覆盖率条在 `CookieFactory` 类的每个方法旁边都列出了一个数字。该数字表示运行测试套件时该方法被调用的次数。


  将鼠标指针悬停在代码覆盖率条中的数字上，相关方法将以红色或绿色高亮显示。绿色高亮表示该方法已被测试至少调用一次，红色高亮表示该方法目前未被测试套件覆盖。


  代码覆盖率是一个有用的工具，可以让你了解生产代码中被测试覆盖的部分，但必须谨慎使用。许多开发团队试图通过编写无意义的测试或覆盖 iOS 框架代码的测试来实现高代码覆盖率。与其拥有大量难以维护或新团队成员难以理解的测试，不如拥有少量更有意义的测试。


  ## 摘要


  本章向你介绍了 Xcode 用户界面中与单元测试相关的部分。你还使用基本的 TDD 技术构建了一个简单的单视图应用程序，并学会了查看代码覆盖率报告。


  下一章将讨论 MVVM 架构模式，以及使用此模式构建的应用程序如何更易于测试。


  '
- "# 3. MVVM 架构模式\n\n本章将探讨一种常用的架构模式，即模型-视图-控制器（MVC），及其在 iOS 中的等效形式模型-视图控制器（M-VC），以及使用这种常见模式时出现的可测试性问题。接着，你将了解一种名为模型、视图、视图模型（MVVM）的新架构模式，以及这种模式在代码可重用性和可测试性方面的优势。\n\
  \n为避免本章出现混淆，在讨论 iOS 版本时我将拼写出“Model-ViewController”（模型-视图控制器），在指代常见模式时则使用缩写“MVC”。\n\
  \n## MVC 架构模式\n\n模型-视图-控制器是当今在各种编程语言（Java、.NET、Objective-C、Swift）中使用最广泛的应用程序架构模式之一。它旨在帮助开发人员在计算机上实现用户界面，并致力于将数据的表示方式与向用户呈现的方式分离开来。图\
  \ 3-1 描绘了标准的 MVC 模式。\n\n![A432412_1_En_3_Fig1_HTML.jpg](img/A432412_1_En_3_Fig1_HTML.jpg)\n\
  \n图 3-1. 标准模型-视图-控制器模式\n\n此模式包含三个关键组件（有时也称为层）：\n\n- **模型**：模型组件负责处理应用程序使用的数据存储，并接受来自控制器的命令以读取或更新数据。它可以是单个类或一组相关类。\n\
  - **视图**：视图组件从模型读取数据，并处理模型的渲染/呈现。视图可以被视为模型的视觉表示，并且可以有选择地呈现模型的某些部分。\n- **控制器**：控制器组件位于模型和视图之间，处理用户输入，更新模型，并根据需要更新视图。业务逻辑和网络代码位于一个或多个控制器中，并且控制器可以与其他控制器通信。换句话说，控制器构成了应用程序的大脑。\n\
  \n\n\n### 模型-视图-控制器架构模式\n\n`Cocoa Touch`、`UIKit`以及其他 Apple 框架提供了在 iOS 应用中实现模型-视图-控制器架构所需的所有基础设施：\n\
  \n-   `模型`：可以是任何 `NSObject` 子类，甚至是 `NSManagedObjectModel` 子类。\n-   `视图`：可以是任何 `UIView`\
  \ 子类，例如 `UILabel`、`UIButton` 和 `UIScrollView`。\n-   `控制器`：可以是任何 `NSObject` 子类。\n\
  \n然而，Apple 还创建了“视图控制器”的概念，它将视图和控制器合并到一个单一的类中。事实上，视图控制器非常普遍，以至于许多刚接触 iOS 开发的开发者并未意识到完全可以独立创建控制器。\n\
  \n图 3-2 展示了模型-视图-控制器架构模式在典型 iOS 应用中的样子，其中视图控制器同时拥有模型和视图。三个组件的角色总结如下：\n\n![A432412_1_En_3_Fig2_HTML.jpg](img/A432412_1_En_3_Fig2_HTML.jpg)\n\
  \n**图 3-2.** 模型-视图-控制器模式\n\n-   `视图`：负责渲染模型，向视图控制器请求数据，将用户交互事件传递给视图控制器。\n-   `模型`：负责存储数据。\n\
  -   `视图控制器`：从模型读取数据并提供给视图，更新模型，处理用户交互事件。\n\n然而，由于视图和视图控制器紧密耦合，且视图控制器拥有视图，这种架构模式开始变得类似于图\
  \ 3-3。事实上，一个视图与不同的视图控制器配对的情况极为罕见。\n\n![A432412_1_En_3_Fig3_HTML.jpg](img/A432412_1_En_3_Fig3_HTML.jpg)\n\
  \n**图 3-3.** 视图、视图控制器与模型对象之间的交互\n\n如果你已经开发 iOS 应用几个月，你很快就会发现，就代码行数而言，视图控制器通常是项目中最大的文件。这是因为视图控制器通常充当代理、数据源，包含网络代码、视图管理逻辑以及发起网络调用等。视图控制器还通常实现多个协议，这导致控制器逻辑与支持协议的代码混杂在一起。这些臃肿的视图控制器通常被称为“巨型视图控制器”。\n\
  \n巨型视图控制器中的某些逻辑确实属于视图控制器，但其中有很大一部分是展示逻辑、模型转换逻辑和网络逻辑，这些逻辑理想情况下应该放在独立的辅助对象或控制器中。\n\
  \n## 模型-视图-控制器的可测试性问题\n\n虽然测试模型-视图-控制器模式中的模型层不会带来重大挑战，但另一方面，测试视图控制器却存在一些问题：\n\n\
  -   **难以实例化**：在测试中实例化视图控制器可能并不简单；所有 `IBOutlet` 都需要使用合适的子类进行桩接。你需要将 XIB 或 storyboard（故事板）包含在测试目标中，并可能最终实例化一个复杂的\
  \ UI 层对象栈，例如导航控制器和表格视图。仅仅为了能够实例化一个视图控制器而将 storyboard 添加到测试目标，会使你的测试非常脆弱，最终你可能会质疑这些测试本身的价值。\n\
  -   **难以模拟**：由于视图控制器中代码的紧密耦合特性，通常很难单独测试某一个方法。\n-   **在单元测试中测试 UI 层**：单元测试不应该测试 UI\
  \ 层；视图控制器模糊了执行 UI 逻辑的代码与执行业务逻辑的代码之间的界限。\n\n## 模型-视图-视图模型架构模式\n\n模型-视图-视图模型（MVVM）架构模式由微软开发，旨在帮助开发者构建基于\
  \ XAML 的 WPF 应用程序，但正如你将很快了解到的，MVVM 可以很容易地适配使用在 iOS/Swift 应用中。MVVM 是 MVC 的一种扩展，我们将视图和控制器正式耦合在一起，但将所有展示逻辑从控制器中移出，放入一个名为\
  \ `viewModel` 的新对象中。\n\n在 iOS/Swift 环境中，视图的角色由视图与视图控制器的组合来承担（见图 3-4）。\n\n![A432412_1_En_3_Fig4_HTML.jpg](img/A432412_1_En_3_Fig4_HTML.jpg)\n\
  \n**图 3-4.** iOS 上的模型-视图-视图模型模式\n\n三个组件的角色总结如下：\n\n-   `模型`：负责存储数据，与 `viewModel`\
  \ 保持双向通信。\n-   `视图`/`视图控制器`：代表模式中的视图部分，处理用户交互事件。与 `viewModel` 保持双向通信。\n-   `视图模型`：处理展示逻辑，与模型和视图/视图控制器均保持双向通信。处理与可能提供特定功能（如复杂业务逻辑和网络请求）的其他控制器的通信。\n\
  \n微软最初的 MVVM 模式广泛使用 XAML 绑定来连接该模式的三个主要组件。在 iOS/Swift 应用中，有两种可用的选项来连接此模式的各个主要组件：\n\
  \n-   **使用 Swift 协议**：该模式的主要组件通过一组定义良好的协议进行交互。每个组件实现相关的一组协议。\n-   **使用 ReactiveCocoa\
  \ / RxSwift**：现已出现第三方库，允许 Swift 开发者应用响应式编程原理，在该模式的主要组件之间创建绑定。\n\n> **注**：响应式编程不在本书的讨论范围内。本书中的所有示例都使用基于协议的方法。\n\
  \n## MVVM 的优势\n\n本节列出了 MVVM 模式相对于 M-VC 模式的一些关键优势：\n\n-   MVVM 模式将代码从单个视图控制器类中移出，并将这些代码分布到一组更细粒度的类上；这减小了任何单个类的大小，从而解决了巨型视图控制器的问题。\n\
  -   视图/视图控制器组件与模型松散耦合；并且通过 `viewModel`，团队中的开发者可以独立且并行地构建这些组件。适应 UI 变更也显著更容易，而对模型或视图模型层没有重大影响。\n\
  -   如果实现得当，`viewModel` 中不应直接引用 `UIKit`。视图和 `viewModel` 是松散耦合的。这使得在测试用例中实例化视图模型变得容易。一个合适的模拟或桩视图只需要实现视图所需的相关协议。\n\
  -   将视图层与视图模型层解耦带来的好处是，视图层可以使用不同的 UI 技术来实现。例如，视图模型和模型代码可以通过简单地替换视图层，在 MacOS 应用中重复使用。\n\
  -   MVVM 基于松散耦合的类，提高了可测试性。一层的类可以独立于其他层进行实例化。使用协议来定义参与类之间的契约，使得桩接/模拟依赖关系的任务显著更容易。\n\
  -   MVVM 促进了对象之间的关注点分离。当对象没有紧密耦合时，产生的代码更易于应对变更，并且从长远来看更易于维护。\n\n## 视图模型实例化\n\n你可以使用多种策略来实例化视图模型。本节将探讨你在使用\
  \ MVVM 模式创建 iOS 应用时会遇到的几个常见场景。\n\n\n\n### 独立的视图控制器\n\n当处理独立的视图控制器时，一种常见策略是在视图控制器的\
  \ `viewDidLoad()` 方法中实例化视图模型。以下代码片段演示了这一策略：\n\n```\nclass CountriesViewController:\
  \ UIViewController {\n    private var viewModel: CountriesViewModel?\n    \n   \
  \ override func viewDidLoad() {\n        super.viewDidLoad()\n        self.viewModel\
  \ = CountriesViewModel(view: self, title: \"Select a country\")\n    }\n}\n```\n\
  \n关于此策略的几点注意事项：\n- 视图控制器通过强引用的 `private var` 拥有视图模型。\n- 视图模型在初始化时被注入了对视图/视图控制器的引用。视图模型将持有一个对视图/视图控制器的弱引用。\n\
  - 视图模型的初始化器也可用于注入设置时所需的其他参数。\n\n第五章 5 将探讨如何使用 TDD 技术和 MVVM 模式创建基于独立视图控制器的应用。\n\n\
  ### 表视图控制器\n\n当处理表视图控制器时，表视图控制器的视图模型将提供行数和分区数的信息。视图模型还可用于维护当前选中单元格的索引。但每个单元格中的数据从何而来？\n\
  \n每个表视图单元格本身也是一个视图，因此 MVVM 模式必须同时应用于单个表视图单元格及其所在的表视图。你可能会考虑对表视图和单个单元格使用相同的视图模型，但这种方法会使视图模型承担过多职责。\n\
  \n更好的方法是为表视图和单个表视图单元格使用不同的视图模型。这种方法能保持每个视图模型的规模较小，因为每个视图模型仅负责单个视图，而不是其子视图。\n\n实例化表视图控制器的视图模型很简单，只需在表视图控制器的\
  \ `viewDidLoad()` 方法中添加几行代码即可。那么，如何以及在何时为单个单元格实例化视图模型呢？\n\n一个好的方法是在表视图控制器的视图模型内部构建一个工厂方法，并用此工厂方法来获取单个单元格的视图模型。\n\
  \n工厂方法可以封装为单元格创建视图模型的具体细节，并为单元格视图模型提供相关的模型对象。工厂方法也可以从表视图控制器的视图模型中移出，放到其自己的类中，这种情况下，你将使用一个专用对象来构建视图模型。\n\
  \n调用视图模型工厂（无论是方法还是对象）的理想位置是在表视图控制器的 `tableView(_ tableView:, cellForRowAt:)` 方法中。以下代码片段演示了这一方法：\n\
  \n```\noverride func tableView(_ tableView: UITableView, cellForRowAt indexPath:\
  \ IndexPath) -> UITableViewCell {\n    let cell = tableView.dequeueReusableCell(withIdentifier:\
  \ \"CountryCell\", for: indexPath) as? CountriesTableViewCell\n    guard let viewModel\
  \ = tableViewModel,\n          let countriesTableViewCell = cell else {\n      \
  \  return UITableViewCell()\n    }\n    let cellViewModel = viewModel.cellViewModel(forIndexPath:\
  \ indexPath)\n    countriesTableViewCell.viewModel = cellViewModel\n    return countriesTableViewCell\n\
  }\n```\n\n在此代码片段中，通过表视图的 `dequeueReusableCell(withIdentifier:, for)` 方法获取了一个自定义的\
  \ `UITableViewCell` 实例：\n\n```\nlet cell = tableView.dequeueReusableCell(withIdentifier:\
  \ \"CountryCell\", for: indexPath) as? CountriesTableViewCell\n```\n\n在表视图控制器的视图模型上调用了名为\
  \ `cellViewModel(forIndexPath:)` 的工厂方法：\n\n```\nlet cellViewModel = viewModel.cellViewModel(forIndexPath:\
  \ indexPath)\n```\n\n该方法返回用于表视图单元格的视图模型，随后该视图模型被赋值给表视图单元格的一个属性，最后返回该单元格：\n\n```\n\
  countriesTableViewCell.viewModel = cellViewModel\nreturn countriesTableViewCell\n\
  ```\n\n此代码片段假设表视图单元格将拥有单元格的视图模型。\n\n### 基于导航控制器的应用\n\n主从式应用在 iOS 中非常常见。这类应用通常通过在导航控制器中嵌入表视图控制器来实现。当用户点击表视图中的某个单元格时，会触发一个\
  \ push 跳转，从右侧滑入详情视图。呈现的详情视图控制器通常显示与表视图中被点击单元格相关的信息。\n\n当使用 MVVM 模式构建此类应用时，显然表视图控制器（主视图）应拥有自己的视图模型，而随后被推入导航栈的详情视图控制器也应拥有自己的视图模型。\n\
  \n此处的挑战在于如何用正确的模型对象构建详情视图模型，以确保详情视图包含正确的信息。\n\n如上一节所述，你可以使用工厂方法来实例化其中一个或全部两个视图模型。该工厂方法需要在主表视图控制器的\
  \ `prepare(for segue: UIStoryboardSegue, sender: Any?)` 方法中被调用。\n\n你还需要确保主视图模型能够跟踪选中的单元格索引。这样，才能将适当的详情模型关联到详情视图模型。\n\
  \n这种方法同样适用于集合视图控制器，因为集合视图控制器在许多方面与表视图控制器相似。第六章 6 涵盖了使用 TDD 技术构建基于 MVVM 的集合视图控制器这一主题。\n\
  \n清单 3-1 至 3-5 演示了如何将 MVVM 模式应用于表视图控制器。这些清单共同构成了一个展示几种常见颜色名称列表的应用。当用户从列表中选中一种颜色时，会呈现一个用所选颜色绘制的详情视图（见图\
  \ 3-5）。\n\n![A432412_1_En_3_Fig5_HTML.jpg](img/A432412_1_En_3_Fig5_HTML.jpg)\n\n\
  **图 3-5. ColorList 应用**\n\n该项目的完整源代码（包含单元测试）可通过以下 URL 从 github 匿名下载：\n\n[`https://github.com/asmtechnology/Lesson03.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson03.iOSTesting.2017.Apress.git)\n\
  \n此代码片段中涉及五个关键类：\n- `ColorListTableViewController`：这是 `UITableViewController` 的子类，向用户展示颜色列表。\n\
  - `ColorDetailViewController`：这是 `UIViewController` 的子类，当用户从颜色列表中选择一种颜色时显示。\n- `ColorTableViewModel`：这是颜色列表表视图控制器类的视图模型。\n\
  - `ColorDetailViewModel`：这是颜色详情视图控制器类的视图模型。\n- `Color`：代表此项目的模型。\n\n为简洁起见，此代码片段中未列出协议。不过，您可以下载项目并详细查看协议。\n\
  \n让我们先来检查 `ColorListTableViewController` 类的代码：\n\n\n```swift\nclass ColorListTableViewController:\
  \ UITableViewController {\n    private var viewModel:TableViewModel?\n    override\
  \ func viewDidLoad() {\n        super.viewDidLoad()\n        self.clearsSelectionOnViewWillAppear\
  \ = false\n        self.viewModel = ColorTableViewModel(view: self, title:\"Select\
  \ a color\")\n    }\n    // MARK: - Table view data source\n    override func tableView(_\
  \ tableView: UITableView, numberOfRowsInSection section: Int) -> Int {\n       \
  \ guard let viewModel = viewModel else {\n            return 0\n        }\n    \
  \    return viewModel.numberOfRows()\n    }\n    override func tableView(_ tableView:\
  \ UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell {\n       \
  \ let cell = tableView.dequeueReusableCell(withIdentifier: \"ColorListtCell\", for:\
  \ indexPath) as? ColorListTableViewCell\n        guard let viewModel = viewModel\
  \ ,\n            let colorListTableViewCell = cell else {\n                return\
  \ UITableViewCell()\n        }\n        let detailViewModel = viewModel.cellViewModel(forIndexPath:\
  \ indexPath)\n        colorListTableViewCell.viewModel = detailViewModel\n     \
  \   return colorListTableViewCell\n    }\n    override func tableView(_ tableView:\
  \ UITableView, didSelectRowAt indexPath: IndexPath) {\n        guard let viewModel\
  \ = viewModel else {\n            return\n        }\n        viewModel.selectRow(atIndexPath:indexPath)\n\
  \        self.performSegue(withIdentifier: \"colorDetailSegue\", sender: nil)\n\
  \    }\n    override func prepare(for segue: UIStoryboardSegue, sender: Any?) {\n\
  \        guard let identifier = segue.identifier, let viewModel = viewModel else\
  \ {\n            return\n        }\n        if identifier.compare(\"colorDetailSegue\"\
  ) != .orderedSame {\n            return\n        }\n        if let colorDetailViewController\
  \ = segue.destination as? ColorDetailViewController,\n            let destinationViewModel\
  \ = viewModel.viewModelForSelectedRow() {\n            destinationViewModel.setView(delegate:\
  \ colorDetailViewController)\n            colorDetailViewController.viewModel =\
  \ destinationViewModel\n        }\n    }\n}\n```\n列表 3-1. `ColorListTableViewController`\n\
  \n在列表 3-1 中，表视图控制器持有表视图模型。该视图模型是 `ColorTableViewModel` 的一个实例，并在表视图控制器的 `viewDidLoad()`\
  \ 方法中实例化：\n\n```swift\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
  \    self.clearsSelectionOnViewWillAppear = false\n    self.viewModel = ColorTableViewModel(view:\
  \ self, title:\"Select a color\")\n}\n```\n\n`tableView(_ tableView:, cellForRowAt:)\
  \ -> UITableViewCell` 方法创建表视图单元格，并将视图模型传递给每个表视图单元格。每个单元格的视图模型通过 `ColorTableViewModel`\
  \ 提供的名为 `cellViewModel(forIndexPath) -> CellViewModel?` 的工厂方法创建。\n\n```swift\noverride\
  \ func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath) ->\
  \ UITableViewCell {\n    let cell = tableView.dequeueReusableCell(withIdentifier:\
  \ \"ColorListtCell\", for: indexPath) as? ColorListTableViewCell\n    guard let\
  \ viewModel = viewModel,\n        let colorListTableViewCell = cell else {\n   \
  \         return UITableViewCell()\n    }\n    let detailViewModel = viewModel.cellViewModel(forIndexPath:\
  \ indexPath)\n    colorListTableViewCell.viewModel = detailViewModel\n    return\
  \ colorListTableViewCell\n}\n```\n\n点击表视图中的单元格会记录视图模型中所选单元格的索引位置，并执行一个转场，以动画方式将详情视图控制器显示到屏幕上：\n\
  \n```swift\noverride func tableView(_ tableView: UITableView, didSelectRowAt indexPath:\
  \ IndexPath) {\n    guard let viewModel = viewModel else {\n        return\n   \
  \ }\n    viewModel.selectRow(atIndexPath:indexPath)\n    self.performSegue(withIdentifier:\
  \ \"colorDetailSegue\", sender: nil)\n}\n```\n\n**注意**：如果你已从表视图单元格到故事板中的详情视图控制器创建了转场，则无需调用\
  \ `performSegue(withIdentifier:, sender:)`。然而，如果转场是从表视图控制器到详情视图控制器创建的，那么你需要调用 `performSegue(withIdentifier:,\
  \ sender:)` 来触发转场。\n\n为详情视图控制器生成视图模型，并将该视图模型分配给详情视图控制器属性的代码，可以在 `prepare(for, sender:)`\
  \ 方法中找到：\n\n```swift\noverride func prepare(for segue: UIStoryboardSegue, sender:\
  \ Any?) {\n    guard let identifier = segue.identifier, let viewModel = viewModel\
  \ else {\n        return\n    }\n    if identifier.compare(\"colorDetailSegue\"\
  ) != .orderedSame {\n        return\n    }\n    if let colorDetailViewController\
  \ = segue.destination as? ColorDetailViewController,\n        let destinationViewModel\
  \ = viewModel.viewModelForSelectedRow() {\n        destinationViewModel.setView(delegate:\
  \ colorDetailViewController)\n        colorDetailViewController.viewModel = destinationViewModel\n\
  \    }\n}\n```\n\n现在让我们检查 `ColorDetailViewController` 类：\n\n```swift\nclass ColorDetailViewController:\
  \ UIViewController {\n    var viewModel:ColorDetailViewModel?\n    override func\
  \ viewDidAppear(_ animated: Bool) {\n        if let viewModel = viewModel {\n  \
  \          viewModel.viewDidAppear(animated)\n        }\n    }\n}\nextension ColorDetailViewController\
  \ : ColorDetailViewControllerDelegate {\n    func setNavigationTitle(_ title:String)\
  \ -> Void {\n        self.title = title\n    }\n    func setBackgroundColor(red:Float,\
  \ blue:Float, green:Float, alpha:Float) -> Void {\n        self.view.backgroundColor\
  \ = UIColor(red: CGFloat(red), green: CGFloat(green), blue: CGFloat(blue), alpha:\
  \ CGFloat(alpha))\n    }\n}\n```\n列表 3-2. `ColorDetailViewController`\n\n这是一个非常简单直接的类。它对视图模型持有一个强引用，并让视图模型有机会在\
  \ `viewDidAppear()` 方法中处理展示逻辑：\n\n```swift\noverride func viewDidAppear(_ animated:\
  \ Bool) {\n    if let viewModel = viewModel {\n        viewModel.viewDidAppear(animated)\n\
  \    }\n}\n```\n\n响应此事件时，视图模型将通过视图控制器实现的一组委托方法来更改视图的背景颜色和标题。\n\n现在让我们检查 `ColorTableViewModel`\
  \ 类的代码：\n\n```swift\nclass ColorTableViewModel: NSObject {\n    var tableTitle:String\n\
  \    fileprivate var coulorData:[Color]\n    fileprivate var selectedIndexPath:IndexPath?\n\
  \    fileprivate weak var view:ColorListTableViewControllerDelegate?\n    init (view:ColorListTableViewControllerDelegate?,\
  \ title:String) {\n        self.view = view\n        self.tableTitle = title\n \
  \       self.coulorData = []\n        if let redModel = Color(name: \"Red\", red:\
  \ 1.0, green: 0.0, blue: 0.0, alpha: 1.0),\n            let blueModel = Color(name:\
  \ \"Blue\", red: 0.0, green: 0.0, blue: 1.0, alpha: 1.0),\n            let greenModel\
  \ = Color(name: \"Green\", red: 0.0, green: 1.0, blue: 0.0, alpha: 1.0) {\n    \
  \        self.coulorData.append(redModel)\n            self.coulorData.append(blueModel)\n\
  \            self.coulorData.append(greenModel)\n        }\n    }\n}\nextension\
  \ ColorTableViewModel : TableViewModel {\n    func setView(delegate:AnyObject?)\
  \ -> Void {\n        self.view = delegate as? ColorListTableViewControllerDelegate\n\
  \    }\n    func numberOfRows() -> Int {\n        return coulorData.count\n    }\n\
  \    func cellViewModel(forIndexPath indexPath:IndexPath) -> CellViewModel? {\n\
  \        let row = indexPath.row\n        if row = self.coulorData.count {\n   \
  \         return nil\n        }\n        let cellText = coulorData[row].name\n \
  \       return TableViewCellViewModel(view:nil, cellText: cellText)\n    }\n   \
  \ func selectRow(atIndexPath indexPath:IndexPath) {\n        self.selectedIndexPath\
  \ = indexPath\n    }\n    func viewModelForSelectedRow() -> ColorDetailViewModel?\
  \ {\n        guard let selectedIndexPath = selectedIndexPath else {\n          \
  \  return nil\n        }\n        if selectedIndexPath.row = coulorData.count {\n\
  \            return nil\n        }\n        return ColorDetailViewModel(view:nil,\
  \ model:coulorData[selectedIndexPath.row])\n    }\n    func viewDidAppear(_ animated:\
  \ Bool) {\n        guard let view = view else {\n            return\n        }\n\
  \        view.setNavigationTitle(tableTitle)\n    }\n    func model(forIndexPath\
  \ indexPath:IndexPath) -> AnyObject? {\n        let row = indexPath.row\n      \
  \  if row = self.coulorData.count {\n            return nil\n        }\n       \
  \ return coulorData[row] as AnyObject\n    }\n}\n```\n列表 3-3. `ColorListTableViewModel`\n\
  \n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将以下英文文本翻译成中文。\n\n\n清单 3-3 中的代码处理了表视图的呈现方面，以及为单元格和详细信息视图控制器构建视图模型。`ColorListTableViewModel`\
  \ 实例持有对视图层的弱引用以及对模型对象数组的强引用。该数组代表了此应用程序的模型层：\n\n```\nfileprivate weak var view:ColorListTableViewControllerDelegate?\n\
  fileprivate var coulorData:[Color]\n```\n\n现在让我们检查 `ColorDetailViewModel` 类的代码：\n\
  \n```\nimport Foundation\nclass ColorDetailViewModel : NSObject {\n    weak var\
  \ view:ColorDetailViewControllerDelegate?\n    var model:Color?\n    init(view:ColorDetailViewControllerDelegate?,\
  \ model:Color?) {\n        self.view = view\n        self.model = model\n      \
  \  super.init()\n    }\n}\nextension ColorDetailViewModel : ViewModel {\n    func\
  \ viewDidAppear(_ animated: Bool) {\n        if let view = self.view, let model\
  \ = self.model {\n            view.setBackgroundColor(red: model.red, blue: model.blue,\
  \ green: model.green, alpha: model.alpha)\n            view.setNavigationTitle(model.name)\n\
  \        }\n    }\n    func setView(delegate:AnyObject?) -> Void {\n        self.view\
  \ = delegate as? ColorDetailViewControllerDelegate\n    }\n}\n清单 3-4。\nColorDetailViewMoel\n\
  ```\n\n清单 3-4 中的代码代表了详细信息视图控制器的视图模型。该视图模型持有对视图层的弱引用以及对模型对象的强引用。该模型对象是一个 `Color`\
  \ 类的实例。\n\n```\nweak var view:ColorDetailViewControllerDelegate?\nvar model:Color?\n\
  ```\n\n视图模型的 `viewDidAppear` 事件被绑定到由视图控制器调用匹配事件时触发。视图模型使用此事件来设置视图的背景颜色和标题：\n\n```\n\
  func viewDidAppear(_ animated: Bool) {\n    if let view = self.view, let model =\
  \ self.model {\n        view.setBackgroundColor(red: model.red, blue: model.blue,\
  \ green: model.green, alpha: model.alpha)\n        view.setNavigationTitle(model.name)\n\
  \    }\n}\n```\n\n接下来让我们检查 `Color` 类的代码：\n\n```\nimport Foundation\nclass Color\
  \ {\n    private static let zero = Float(floatLiteral: 0.0)\n    private static\
  \ let one = Float(floatLiteral: 1.0)\n    var name:String\n    var red:Float\n \
  \   var green:Float\n    var blue:Float\n    var alpha:Float\n    init?(name:String,\
  \ red:Float, green:Float, blue:Float, alpha:Float) {\n        if (red < Color.zero\
  \ || red > Color.one) {\n            return nil\n        }\n        if (green <\
  \ Color.zero || green > Color.one) {\n            return nil\n        }\n      \
  \  if (blue < Color.zero || blue > Color.one) {\n            return nil\n      \
  \  }\n        if (alpha < Color.zero || alpha > Color.one) {\n            return\
  \ nil\n        }\n        self.name = name\n        self.red = red\n        self.green\
  \ = green\n        self.blue = blue\n        self.alpha = alpha\n    }\n}\n清单 3-5。\n\
  Color.swift\n```\n\n清单 3-5 中的代码代表了一个单一的模型对象。该模型对象包含描述颜色名称以及单独的 R、G、B、A 分量值的属性：\n\
  \n```\nvar name:String\nvar red:Float\nvar green:Float\nvar blue:Float\nvar alpha:Float\n\
  ```\n\n## 总结\n\n在本章中，您了解了无处不在的模型-视图-控制器（MVC）模式及其 iOS 等效的模型-视图控制器（M-VC）模式。使用 M-VC\
  \ 模式构建的应用程序往往拥有庞大且难以测试的视图控制器类。\n\n您还了解了微软替代 MVC 模式的模式，即模型-视图-视图模型（MVVM）模式。该模式起源于\
  \ WPF/XAML 应用程序，但可以轻松改编并用于 iOS 应用程序。\n\n使用 MVVM 模式构建的应用程序比使用 MVC 或 M-VC 模式构建的应用程序更容易测试。\n\
  \n"
- "# 4. 将 TDD 应用于模型\n\n本章将探讨使用 TDD 技术构建应用程序模型层的过程。由于本章专注于模型层，因此您不会构建用户界面或任何表示逻辑。\n\
  \n测试应用程序模型层的组件与测试应用程序中的其他组件同样重要。在一个非常简单的应用中，模型层可能只包含一个具有几个实例变量的类。即使在这种简化场景下，单元测试也可以用来确认模型类具有应用程序其他部分期望其拥有的成员变量。\n\
  \n在更复杂的应用中，模型层可能包含几个具有复杂关系和职责的类。模型层中的各个类可能执行数据转换、持久化和验证。在这种情况下，单元测试有助于建立（并维护）类之间的关系，并提供对转换、持久化和验证逻辑按预期工作的信心。\n\
  \n本章介绍的模型层旨在表示一个银行账户以及该账户中的一组交易。我们将创建类来表示银行账户、账户所有者以及账户内的交易。图 4-1 描绘了模型层的类图。\n\n\
  ![A432412_1_En_4_Fig1_HTML.jpg](img/A432412_1_En_4_Fig1_HTML.jpg)\n\n图 4-1. 模型层类\n\
  \n以下是构成模型层的类的简要描述：\n\n*   `BankAccount`：代表一个单独的银行账户。一个 `BankAccount` 对象可以表示储蓄账户或活期账户。\n\
  *   `Transaction`：代表一笔单独的交易。一个 `Transaction` 对象可以表示资金存入账户或资金从账户转出。\n*   `AccountOwner`：代表拥有银行账户的个人（或实体）。一个账户最多可以有两个所有者。\n\
  \n该应用程序的完整源代码可以通过以下 URL 从 GitHub 匿名下载：\n\n[`https://github.com/asmtechnology/Lesson04.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson04.iOSTesting.2017.Apress.git)\n\
  \n## 创建 Xcode 项目\n\n启动 Xcode 并基于“单视图应用程序”模板创建一个新的 iOS 项目（见图 4-2）。\n\n![A432412_1_En_4_Fig2_HTML.jpg](img/A432412_1_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2. Xcode 项目模板对话框\n\n在创建新项目时使用以下选项（见图 4-3）：\n\n![A432412_1_En_4_Fig3_HTML.jpg](img/A432412_1_En_4_Fig3_HTML.jpg)\n\
  \n图 4-3. Xcode 项目选项对话框\n\n*   产品名称：`BankAccount`\n*   团队：无\n*   组织名称：提供一个合适的名称\n\
  *   组织标识符：提供一个合适的标识符\n*   语言：`Swift`\n*   设备：`iPhone`\n*   使用 Core Data：未选中\n* \
  \  包含单元测试：已选中\n*   包含 UI 测试：未选中\n\n注意\n\n即使我们在创建此项目时使用了“单视图应用程序”模板，项目中也不会添加任何用户界面/表示代码。在第\
  \ 6 章中，您将构建一个应用程序来显示银行账户详情以及集合视图中的交易列表。第 6 章中的项目将基于本章创建的文件进行构建。\n\n将项目保存到计算机上的合适位置，然后点击“创建”。由于此项目将包含多个新类，因此最好将类文件放在项目导航器中的适当组下。\n\
  \n在 Xcode 项目导航器中创建一个名为 `Model` 的组。您将在此组中创建特定于模型层的类。\n\n## 构建模型层\n\n我们需要构建三个模型类：\n\
  \n*   `AccountOwner`\n*   `Transaction`\n*   `BankAccount`\n\n这些类将在本章后续部分使用 TDD\
  \ 技术进行构建。\n\n\n\n### `AccountOwner` 类\n\n`AccountOwner` 类的实例代表拥有账户的个人或实体。表 4-1 列出了\
  \ `AccountOwner` 类所需的成员变量和方法。\n\n**表 4-1.** `AccountOwner` 变量和方法\n\n| 项目 | 类型 |\
  \ 描述 |\n| --- | --- | --- |\n| `var firstName:String` | 变量 | 长度应在 2 到 10 个字符之间，且不包含数字或空格。\
  \ |\n| `var lastName:String` | 变量 | 长度应在 2 到 10 个字符之间，且不包含数字或空格。 |\n| `var emailAddress:String`\
  \ | 变量 | 必须是有效的电子邮件地址。 |\n| `init?(firstName:String, lastName:String, emailAddress:String)`\
  \ | 方法 | 允许其他代码创建 `AccountOwner` 实例。 |\n\n在项目浏览器的 `BankAccountTests` 组下创建一个名为 `AccountOwnerTests`\
  \ 的新 iOS 单元测试用例类（见图 4-4）。\n\n![A432412_1_En_4_Fig4_HTML.jpg](img/A432412_1_En_4_Fig4_HTML.jpg)\n\
  \n**图 4-4.** Xcode 文件模板对话框\n\n在项目浏览器中选择 `AccountOwnerTests.swift` 文件，并使用文件检查器确保该文件包含在\
  \ `BankAccountTests` 目标中，而非 `BankAccount` 目标中（见图 4-5）。如果文件检查器不可见，请使用 **View ➤ Utilities\
  \ ➤ Show File Inspector** 菜单项。\n\n![A432412_1_En_4_Fig5_HTML.jpg](img/A432412_1_En_4_Fig5_HTML.jpg)\n\
  \n**图 4-5.** `AccountOwnerTests.swift` 的目标成员资格\n\n测试用例文件包含两个空的存根方法，名为 `testExample`\
  \ 和 `testPerformanceExample`。这些方法旨在帮助你开始编写测试。我们不会在本章中使用这些存根方法，因此可以随意删除它们。\n\n创建一个名为\
  \ `testAccountOwner_ValidFirstName_ValidLastName_ValidEmail_CanBeInstantiated()`\
  \ 的新单元测试方法，并将以下代码添加到方法体中：\n\n```\nfunc testAccountOwner_ValidFirstName_ValidLastName_ValidEmail_CanBeInstantiated()\
  \ {\n    let accountOwner = AccountOwner(firstName: validFirstName,\n          \
  \                          lastName: validLastName,\n                          \
