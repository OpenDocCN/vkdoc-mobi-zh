  \ TDD 和 BDD 技术构建一个应用。\n\n你将构建一个简单的应用，让用户浏览伦敦的餐厅列表。用户可以从伦敦内的地点列表中进行选择，应用将展示所选地点的餐厅列表。该应用的所有餐厅数据都包含在应用包内，无需调用网络服务来获取这些数据。\n\
