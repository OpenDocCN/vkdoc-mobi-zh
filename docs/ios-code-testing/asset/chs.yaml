  \ RestaurantTableViewCellViewModel?\n```\n\n实例变量声明之后紧接着是一对方法，用于执行必要的对象实例化并将其赋值给实例变量。这些方法命名如下：\n\
  \n*   `prepareForSearchViewControllerTests()`，以及\n*   `prepareForRestaurantTableViewCellTests()`\n\
  \n该类还有另一个名为 `spec()` 的方法，Quick 测试就写在其中。如第 10 章所述，每个 BDD 测试的格式如下：\n\n```\noverride\
  \ func spec() {\nbeforeEach {\n}\ndescribe(/* 场景语句的 \"Given\" 部分 */) {\ncontext(/*\
  \ 场景语句的 \"When\" 部分 */){\nit(/* 场景语句的 \"Then\" 部分 */) {\n// 测试逻辑写在这里\n}\n}\n}\n\
  }\n```\n\nQuick 测试用例的 `beforeEach()` 方法等同于 `XCTestCase` 的 `setUp()` 方法。调用 `beforeEach()`\
  \ 方法后，会通过嵌套调用三个函数（`describe()`、`context()`、`it()`）来编写多个 BDD 风格的测试。\n\n让我们逐一检查表 12-3\
  \ 中列出的每个可测试的 BDD 场景及其对应的 BDD 测试代码（场景 1 和 2 无法使用 Quick 测试，因为它们依赖于用户界面的视觉检查）。\n\n\
  ### 检查场景 3 的 BDD 测试\n\n我们来看场景 3，这是第一个可以使用 BDD 技术测试的测试场景：\n\n*   Given [应用主屏幕已加载]，\n\
  *   When [未选择任何区域]，\n*   Then [“下一步”按钮处于未启用状态]。\n\n测试该场景的 BDD 风格测试用例如下：\n\n```\n\
  describe(\"the main screen of the app is loaded\") {\ncontext(\"no area has been\
  \ selected\") {\nit(\"the Next button is not enabled\") {\nself.prepareForSearchViewControllerTests()\n\
  self.searchViewController!.viewDidLoad()\nexpect(self.viewRestaurantButtonStub!.isEnabled).\n\
  to(equal(false))\n}\n}\n}\n```\n\n该应用的主屏幕由 `SearchViewController` 类的实例表示，其中包含一个带有地点列表的拾取器，以及一个允许用户查看拾取器中所选地点餐厅列表的按钮。\n\
  \n该场景的目标是确保在用户从拾取器中选择地点之前，按钮处于未启用状态。\n\n为了测试该场景定义的条件是否满足，你只需调用 `SearchViewController`\
  \ 实例上的 `viewDidLoad` 方法，并检查按钮的 `isEnabled` 属性是否为 `false`。\n\n在测试中实例化视图控制器需要为视图控制器中定义的插座分配桩对象。这通过在测试开始时调用\
  \ `prepareForSearchViewControllerTests()` 来实现。\n\n### 检查场景 4 的 BDD 测试\n\n我们来看场景\
  \ 4，这是下一个可以使用 BDD 技术测试的测试场景：\n\n*   Given [应用主屏幕已加载]，\n*   When [已选择伦敦的一个区域]，\n\
  *   Then [“下一步”按钮处于启用状态]。\n\n测试该场景的 BDD 风格测试用例如下：\n\n```\ndescribe(\"the main screen\
  \ of the app is loaded\") {\ncontext(\"an area in London has been selected\") {\n\
  it(\"the Next button is enabled\") {\nself.prepareForSearchViewControllerTests()\n\
  self.searchViewController!.pickerView(\nself.locationPickerStub!, didSelectRow:\
  \ 0,\ninComponent: 0)\nexpect(self.viewRestaurantButtonStub!.isEnabled).\nto(equal(true))\n\
  }\n}\n}\n```\n\n该场景也描述了 `SearchViewController` 类的行为。该场景的目标是确保当用户从拾取器中选择地点后，视图控制器上的按钮处于启用状态。\n\
  \n为了测试该场景定义的条件是否满足，你只需调用 `SearchViewController` 实例上的 `pickerView(picker, didSelectRow,\
  \ inComponent)` 方法，并检查按钮的 `isEnabled` 属性是否为 `true`。\n\n### 检查场景 5 的 BDD 测试\n\n我们来看场景\
  \ 5，这是下一个可以使用 BDD 技术测试的测试场景：\n\n*   Given [用户已选择一个地点]，\n*   When [点击了“下一步”按钮]，\n\
  *   Then [出现一个新屏幕，显示该地点的餐厅列表]。\n\n测试该场景的 BDD 风格测试用例如下：\n\n```\ndescribe(\"the user\
  \ has selected a location\") {\ncontext(\"the Next button is tapped\") {\nit(\"\
  a new screen appears with a list of restaurants in that\nlocation\") {\nself.prepareForSearchViewControllerTests()\n\
  self.searchViewController!.pickerView(\nself.locationPickerStub!, didSelectRow:\
  \ 0,\ninComponent: 0)\nself.searchViewController!.onViewListings(self)\nexpect(self.searchViewController!.displayResultsScreenCalled).\n\
  to(equal(true))\n}\n}\n}\n```\n\n该场景描述了用户在 `SearchViewController` 中点击“查看餐厅列表”按钮后发生的情况。预期行为是出现结果屏幕，显示餐厅列表。结果屏幕由\
  \ `RestaurantListTableViewController` 类的实例表示。\n\n尝试确认结果屏幕是否在视觉上出现属于用户界面测试，更适合由 QA\
  \ 团队使用的工具来完成。从代码角度来看，我们可以测试点击按钮是否会调用一个方法，而该方法又包含显示下一个屏幕的逻辑。\n\n该项目将使用 MV-VM 架构模式构建，因此\
  \ `SearchViewController` 类将有一个名为 `SearchViewModel` 的关联视图模型类。视图模型类将包含展示逻辑，为了支持该逻辑，视图控制器类将提供一个名为\
  \ `displayResultsScreen()` 的方法，供视图模型调用。\n\n为了测试该场景定义的条件是否满足，你只需在拾取器中选择一行，然后调用 `onViewListings()`\
  \ 操作方法，并检查视图控制器上是否调用了 `displayResultsScreen()` 方法。\n\n但你如何检查 `displayResultsScreen()`\
  \ 是否被调用？在本项目中，我将创建一个名为 `MockSearchViewController` 的 `SearchViewController` 子类，该类包含一个布尔型实例变量，当\
  \ `displayResultsScreen()` 方法被调用时，该变量会被设置为 `true`。\n\n\n\n\n### 检查场景 6 的 BDD 测试\n\
  \n让我们检查场景 6，这是下一个可以使用 BDD 技术进行测试的场景：\n\n*   假设 [屏幕上显示了餐厅列表]，\n*   当 [该列表中显示了餐厅名称]\
