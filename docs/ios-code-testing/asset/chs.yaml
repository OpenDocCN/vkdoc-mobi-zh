  \n*   `ServiceController`\n*   `MockURLSession`\n*   `MockURLSessionDataTask`\n\n\
  \n\n### 创建 `ServiceController` 类\n\n在项目导航器中新建一个名为 `Controllers` 的分组，并确保该分组位于 `PhotoBook`\
  \ 分组下。在 `Controllers` 分组下创建一个名为 `ServiceController` 的新 Swift 类。确保该新类同时包含在构建目标（build\
  \ target）和测试目标（test target）中。（参见图 7-6。）\n\n![A432412_1_En_7_Fig6_HTML.jpg](img/A432412_1_En_7_Fig6_HTML.jpg)\n\
  \n图 7-6. `ServiceController.swift` 文件的目标成员身份（Target Membership）\n\n将 `ServiceController.swift`\
  \ 的内容更新为与代码清单 7-2 一致。\n\n```\nimport Foundation\nclass ServiceController : NSObject\
  \ {\nvar session:URLSessionProtocol?\nprivate var dataTask:URLSessionDataTask?\n\
  override init() {\nsuper.init()\nself.session =\nURLSession(configuration:\nURLSessionConfiguration.default)\n\
  }\nfunc fetchFromURL(urlString:String?,\nsuccess:@escaping (Data) -> Void,\nfailure:@escaping\
  \ (NSError) -> Void)\n-> Void {\nguard let session = session else {\nfailure(NSError(\n\
  domain: \"ServiceController\",\ncode:100,\nuserInfo: nil))\nreturn\n}\nguard let\
  \ urlString = urlString,\nlet url = URL(string: urlString)\nelse {\nfailure(NSError(\n\
  domain: \"ServiceController\",\ncode:101,\nuserInfo: nil))\nreturn\n}\ndataTask\
  \ = session.dataTask(\nwith: url,\ncompletionHandler: {\n(data, response, error)\
  \ in\nif let error = error {\nfailure(error as NSError)\nreturn\n}\nif let response\
  \ = response as?\nHTTPURLResponse,\nlet data = data {\nif response.statusCode ==\
  \ 200 {\nsuccess(data)\nreturn\n}\n}\nfailure(NSError(\ndomain: \"ServiceController\"\
  , code:102,\nuserInfo: nil))\nreturn\n})\ndataTask?.resume()\n}\n}\n```\n\n代码清单\
  \ 7-2. `ServiceController.swift`\n\n这个类包含一个 `init` 方法、`fetchFromURL` 方法以及几个实例变量。我想请你留意一下\
  \ `session` 变量，它被声明为：\n\n```\nvar session:URLSessionProtocol?\n```\n\n在您过去构建的大多数应用中，`session`\
  \ 变量通常是 `URLSession` 类型，而不是 `URLSessionProtocol` 类型。事实上，Apple 并未提供名为 `URLSessionProtocol`\
  \ 的协议。之所以使用协议而非具体类型，是为了便于从单元测试中注入模拟/桩对象（mock/stub object）。\n\n在 `Protocols` 分组下创建一个名为\
  \ `URLSessionProtocol.swift` 的新 Swift 文件，并确保该文件同时是构建目标和测试目标的成员。将该新文件的内容更新为与代码清单\
  \ 7-3 一致。\n\n```\nimport Foundation\nprotocol URLSessionProtocol : class {\nfunc\
  \ dataTask(with url: URL,\ncompletionHandler: @escaping (Data?,\nURLResponse?, Error?)\
  \ -> Swift.Void) -> URLSessionDataTask\n}\nextension URLSession : URLSessionProtocol\
  \ {\n}\n```\n\n代码清单 7-3. `URLSessionProtocol.swift`\n\n### 创建 `MockURLSession` 类\n\
  \n在项目浏览器的 `Mocks` 分组下创建一个新的 Swift 类。将该类命名为 `MockURLSession`，并确保新文件仅包含在测试目标中（参见图\
  \ 7-7）。\n\n![A432412_1_En_7_Fig7_HTML.jpg](img/A432412_1_En_7_Fig7_HTML.jpg)\n\n\
  图 7-7. `MockURLSession.swift` 文件的目标成员身份\n\n将 `MockURLSession.swift` 的内容更新为与代码清单\
  \ 7-4 一致。\n\n```\nimport Foundation\nimport XCTest\nclass MockURLSession : URLSessionProtocol\
  \ {\nvar dataTaskExpectation:\n(XCTestExpectation, expectedURL:URL)?\nvar dataTaskToReturn:MockURLSessionDataTask?\n\
  init() {\nself.dataTaskToReturn =\nMockURLSessionDataTask()\n}\nfunc dataTask(with\
  \ url: URL,\ncompletionHandler: @escaping (Data?,\nURLResponse?,\nError?) -> Swift.Void)\n\
  -> URLSessionDataTask {\nif let (expectation, expectedValue) =\nself.dataTaskExpectation\
  \ {\nif    expectedValue.absoluteString.compare(\nurl.absoluteString) == .orderedSame\
  \ {\nexpectation.fulfill()\n}\n}\nself.dataTaskToReturn?.completionHandler =\ncompletionHandler\n\
  return self.dataTaskToReturn!\n}\n}\n```\n\n代码清单 7-4. `MockURLSession.swift`\n\n\
  ### 创建 `MockURLSessionDataTask` 类\n\n在项目浏览器的 `Mocks` 分组下创建一个新的 Swift 类。将该类命名为 `MockURLSessionDataTask`，并确保新文件仅包含在测试目标中。\n\
  \n将 `MockURLSessionDataTask.swift` 的内容更新为与代码清单 7-5 一致。\n\n```\nimport Foundation\n\
  import XCTest\nclass MockURLSessionDataTask : URLSessionDataTask {\nvar resumeExpectation:\
  \ XCTestExpectation?\nvar completionHandler:((Data?, URLResponse?, Error?) -> Swift.Void)?\n\
  var dataToReturn:Data?\nvar urlResponseToReturn:URLResponse?\nvar errorToReturn:Error?\n\
  override func resume() {\nresumeExpectation?.fulfill()\nif let\ncompletionHandler\
  \ = completionHandler\n{\nDispatchQueue.main.asyncAfter(\ndeadline: .now() + 0.1)\
  \ {\ncompletionHandler(\nself.dataToReturn,\nself.urlResponseToReturn,\nself.errorToReturn)\n\
  }\n}\n}\n}\n```\n\n代码清单 7-5. `MockURLSessionDataTask.swift`\n\n保存文件，并使用测试导航器（Test\
