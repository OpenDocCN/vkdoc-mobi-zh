  }\n}\n```\n**代码清单 5-15.** `SignupViewController.swift`\n\n### 从登录视图控制器过渡到注册视图控制器\n\
  \n此项目中的最后一项任务是，在登录界面点击**创建账户**按钮时，从登录视图控制器过渡到注册视图控制器。\n\n在本章前面部分，你已在相应的故事板场景之间创建了一个名为\
