  \ plist 文件路径。\n\n对 `Album` 类所做的更改现在允许专辑类从互联网上的 JSON 文件下载专辑元数据。\n\n将 `CollectionViewModel`\
  \ 类的初始化器替换为以下更新版本：\n\n```\ninit(view:CollectionViewControllerProtocol,\n     album:Album?\
  \ = nil) {\n    super.init()\n    self.view = view\n    photoAlbum = album ?? Album()\n\
  \    photoAlbum?.load(urlString: \"http://www.asmtechnology.com/apress2017/albumlist.json\"\
  ,\n                     success: { () in\n                        DispatchQueue.main.async\
  \ {\n                            self.view?.\n                                reloadCollectionView()\n\
  \                        }\n        },\n                     failure: { (error)\
  \ in\n                        print(error.description)\n    })\n}\n```\n\n更新后的初始化器接受一个可选的\
  \ `Album` 参数，测试可以在需要时通过该参数注入模拟对象或桩对象，并调用 `Album` 对象上的新 `load()` 方法。\n\n向 `CollectionViewControllerProtocol.swift`\
  \ 文件添加以下方法声明：\n\n```\nfunc reloadCollectionView() -> Void\n```\n\n虽然我们不会在本章中编写任何新的测试来涵盖此功能，但确实需要删除过时的测试并修复有问题的测试。大多数为集合视图模型编写的旧测试仍会通过；然而，有些测试需要更新。\n\
  \n需要更新测试的主要原因在于 `photoAlbum` 类的 `load()` 方法现在是异步的，而之前的测试是为同步版本的 `load()` 编写的。\n\n\
  为了修复这些测试，我们需要向 `CollectionViewModel` 注入一个修改过的 `Album` 实例，该实例在内部使用一个带有桩的服务控制器实例。由于这个修改过的专辑实例可能会在多个测试中使用，因此创建此实例的代码将放在测试用例类的\
  \ `setUp()` 方法中：\n\n```\nlet bundle = Bundle(for: type(of:self))\nlet filePath =\
  \ bundle.path(\n    forResource: \"ValidAlbumList\",\n    ofType: \"json\")\nstubResponseData\
  \ = try!\n    Data(contentsOf:\n        URL(fileURLWithPath: filePath!))\nstubServiceController\
  \ = MockServiceController()\nstubServiceController!.shouldFailOnFetch =\n    false\n\
