- "# 1. 测试驱动开发简介\n\n自 iOS 平台诞生以来，已有超过十亿款应用被开发出来。早期的大多数应用都相当简单，通常由单个开发者完成。多年来，iOS 应用已变成日益复杂的软件，往往涉及庞大且分布式的开发团队，在敏捷环境中工作，并拥有复杂的构建与发布流水线。\n\
  \n现代应用通常执行多项复杂操作，包括（但不限于）呈现复杂的用户界面、多线程处理、在本地数据库中存储数据、与多种传感器交互、媒体录制与播放，以及使用 RESTful\
  \ Web API。\n\n考虑到应用各组件之间的复杂交互，以及分散在数百个类中的数千行源代码，我们如何确切地知道自己编写的代码是否按照预期工作？我们如何确保代码能够处理边缘场景？最后，我们如何知道构建的软件正确满足了业务需求？前两个问题的答案由单元测试实践来解决，而行为驱动开发（BDD）则针对“一开始就构建正确软件”这一问题给出了答案。第\
  \ 10 章将介绍 BDD。本章及下一章中，你将学习单元测试及其相关学科——测试驱动开发（TDD）。\n\n## 什么是测试驱动开发？\n\n测试驱动开发（TDD）源于一种名为极限编程¹（XP）的编程范式，由\
  \ Kent Beck 于 1996 年创建。“极端”一词的使用，标志着它与当时标准编程实践的根本性背离。\n\nTDD 旨在为开发者提供一种切实可行的方法，以证明他们编写的代码按预期工作，并确保新代码不会对现有代码产生任何潜在的副作用。\n\
  \nTDD 方法的核心在于，开发者不仅需要编写实现应用功能的实际代码，还要编写测试代码来确保应用代码按预期运行。这些测试代码不会随产品一起发布。\n\n尽管在编写实现应用预期功能的代码之外，再编写测试代码确实是额外的工作，但这应被视为一种前期投入，旨在提高交付给客户的产品质量。一个实践\
  \ TDD 技术的团队，随着时间的推移，将观察到回归缺陷数量的减少。\n\n> 注意\n>\n> TDD 常与“单元测试”一词互换使用；然而，这两个术语并非同一回事。TDD\
  \ 是一种软件开发方法，其中测试代码先于功能代码编写：本质上，测试驱动开发。\n>\n> 单元测试只是孤立看待的一段测试代码。单元测试是采用 TDD 方法的副产品之一。\n\
  >\n> 然而，仅凭存在一个或多个单元测试，并不一定意味着开发者遵循了 TDD 方法。例如，单元测试可能是事后为现有代码添加的。\n\n如果你觉得处理大型问题难以招架，你可能会发现\
  \ TDD 是一种有用的技术，可以将大问题分解成更小的部分，利用测试解决这些小问题，并在此过程中最终解决大问题。你很快就会意识到，一旦你用 TDD 的思维方式去处理问题，大型问题就不再那么令人畏惧。\n\
  \n## TDD 术语\n\n本节将探讨与测试驱动开发相关的一些常见术语。\n\n### 被测对象\n\n这通常是你希望测试的一段代码或功能单元。在大多数情况下，被测对象通常是\
  \ Swift 类中的单个方法。然而，你也可能遇到需要将一组小方法或类一起测试的场景。在这种情况下，被测对象通常代表一个完整的功能或用户旅程。被测对象有时也被称为“系统被测试对象”。\n\
  \n### 单元测试\n\n这是用于测试被测对象的代码片段。单元测试也被称为“测试用例”。单元测试的工作原理是，在受控条件下调用被测对象，并验证某种预期行为。一个应用通常会有成百上千个单元测试，每个测试只测试功能的极小一部分。\n\
  \n单个单元测试作为 Swift 类中的独立方法实现，该类继承自 `XCTestCase`。这个 Swift 类通常也被称为测试类。\n\n在大多数情况下，你会为每个想要测试的类创建一个测试类。`XCTestCase`\
  \ 类是 `XCTest` 框架的一部分，需要通过 `import` 语句导入该框架。以下代码清单包含一个包含单个单元测试的简单测试类：\n\n```\nimport\
  \ XCTest\n@testable import LoginService\nclass LoginServiceTests: XCTestCase {\n\
  func testExample() {\n// 在此插入测试代码。\n}\n}\n```\n\n> 注意\n>\n> 构成这些单元测试的代码不属于将交付给客户的代码库。单元测试通常在开发者每次尝试创建构建时执行，并且只有在所有测试通过的情况下才会生成构建。\n\
  \n单元测试的方法签名与不接受参数且不返回值的方法类似。然而，单元测试方法的名称总是以关键字“test”开头。单元测试方法通常有严格的命名约定；这些将在下一课中讨论。\n\
  \n### 状态验证测试\n\n状态验证测试是一种单元测试，它在对象（被测对象）上调用方法，并在调用方法后验证对象的状态。此类测试不关心实现细节，即使被测方法的内部实现在未来发生变化，它们仍能继续通过。状态验证测试通常依赖断言来执行实际验证。断言将在本课稍后介绍。\n\
  \n### 交互测试\n\n交互测试是一种单元测试，它试图验证调用方法时对象之间的特定交互顺序。此类测试也被称为行为验证测试。交互测试不一定涉及多个对象。你也可以使用交互测试来验证对同一对象方法的调用顺序。\n\
  \n在一个复杂的面向对象系统中，当调用一个方法时，单个对象可能需要与多个其他对象交互。对于交互测试而言，被测对象仍然是单个类，而不是整个类组。通常的做法是实例化被测对象，并使用交互测试范围内涉及的所有其他对象的特殊模拟（mock）或桩（stub）版本。模拟和桩对象将在本课稍后介绍。\n\
  \n> 注意\n>\n> 由于交互测试验证的是类组的行为，它们本质上比状态验证测试更脆弱。例如，方法调用顺序的改变很容易导致交互测试失败。减少交互测试脆弱性的一种方法是缩小测试所覆盖的类范围。\n\
  \n\n\n### 负面测试\n\n负面单元测试用于验证某个事件**没有**发生。这在某些情况下很有用，但绝不能仅依赖负面测试。因为虽然负面测试能验证某事未发生，但它对实际发生的各种变化毫无反应。代码库可能发生巨大变动，而单个负面测试却依然通过。如果所有单元测试都是负面测试，那么你的测试集合所提供价值将非常有限。\n\
  \nSwift 中的负面单元测试几乎总是状态验证测试。尽管可以创建交互测试类的负面单元测试，但所需的复杂设置往往会让编写此类测试变得得不偿失。\n\n以实际的负面单元测试为例，考虑以下可用于表示银行账户的\
  \ Swift 类：\n\n```\nenum AccountType {\n    case currentAccount\n    case savingsAccount\n\
  }\n\nclass BankAccount {\n    var accountName: String\n    var accountNumber: String\n\
  \    var accountType: AccountType\n    private var transactions: [Transaction]\n\
  \n    init(accountName: String,\n         accountNumber: String,\n         accountType:\
  \ AccountType) {\n        self.accountName = accountName\n        self.accountNumber\
  \ = accountNumber\n        self.accountType = accountType\n        self.transactions\
  \ = [Transaction]()\n    }\n\n    func addTransaction(_ transaction: Transaction)\
  \ {\n        transactions.append(transaction)\n    }\n\n    func accountBalance()\
  \ -> Float {\n        var balance: Float = 0\n        for transaction in self.transactions\
  \ {\n            if transaction.isCredit {\n                balance = balance +\
  \ transaction.amount\n            } else {\n                balance = balance +\
  \ transaction.amount\n            }\n        }\n        return balance\n    }\n\
  }\n```\n\n`BankAccount` 对象中的单笔交易通过 `Transaction` 对象来表示。接下来展示一个简单 `Transaction` 类的定义：\n\
  \n```\nclass Transaction {\n    var description: String\n    var amount: Float\n\
  \    var isCredit: Bool\n\n    init(description: String,\n         amount: Float,\n\
  \         isCredit: Bool) {\n        self.description = description\n        self.amount\
  \ = amount\n        self.isCredit = isCredit\n    }\n}\n```\n\n结合这两个类，一个负面单元测试可用于验证调用\
  \ `BankAccount` 类的 `addTransaction()` 方法不会修改账户名称。该测试可编写如下：\n\n```\nfunc testAddTransaction_DoesNotChangeAccountName()\
  \ {\n    let bankAccount = BankAccount(accountName: \"John Smith\",\n          \
  \                        accountNumber: \"14918\",\n                           \
  \       accountType: .savingsAccount)\n    let transaction = Transaction(description:\
  \ \"Salary\",\n                                  amount: 100.0,\n              \
  \                    isCredit: true)\n    bankAccount.addTransaction(transaction)\n\
  \    XCTAssertTrue(bankAccount.accountName.compare(\"John Smith\") == .orderedSame,\n\
  \                  \"Call to addTransaction should have no effect on account name.\"\
  )\n}\n```\n\n断言功能尚未介绍，但稍后会提到。此测试确保调用 `addTransaction` 时，`BankAccount` 实例的 `accountName`\
  \ 变量值不会改变。\n\n### 测试套件\n\n测试套件即测试用例文件的集合。测试套件通常在 Xcode 项目导航器中拥有独立分组，并包含在与应用其余代码分离的独立构建目标中（图\
  \ 1-1）。\n\n![A432412_1_En_1_Fig1_HTML.jpg](img/A432412_1_En_1_Fig1_HTML.jpg)\n\n\
  **图 1-1.** Xcode 中测试套件的独立文件夹分组\n\n单个 Xcode 项目可以包含多个测试套件，例如，一个测试套件可能包含单元测试，另一个则包含交互测试。在下一课中，你将学习配置\
  \ Xcode 构建方案，将特定测试套件纳入构建过程。\n\n### 断言\n\n断言是状态验证测试和交互测试的核心。断言代表单元测试的失败。通常，你的单元测试会调用对象上的某个方法，该方法可能执行一系列操作，例如返回值、修改对象中的某些值或调用其他方法。\n\
  \n如果你知道所调用方法的预期结果，就可以构建一个单元测试，用已知输入调用该方法并期望得到特定结果。如果调用方法的结果与预期值不符，测试将触发断言来指示失败。\n\
  \nXcode 自带的**标准单元测试框架**名为 `XCTest`，它包含多个宏，用于在单元测试中创建断言。表 1-1 列出了其中部分宏。\n\n**表 1-1.**\
  \ XCTest 断言宏\n\n| 宏 | 说明 |\n| --- | --- |\n| `XCTAssert(expression, message)` |\
  \ 如果 `expression` 的计算结果为 `false`，则生成失败。可提供可选的字符串 `message` 来说明失败原因。 |\n| `XCTAssertEqualObjects(expression1,\
  \ expression2, message)` | 当 `expression1` 不等于 `expression2` 时生成失败，其中 `expression1`\
  \ 和 `expression2` 均为对象。涉及的两个对象都必须实现 `Equatable`。可提供可选的字符串 `message` 来说明失败原因。 |\n\
  | `XCTAssertNotEqualObjects(expression1, expression2, message)` | 当 `expression1`\
  \ 等于 `expression2` 时生成失败，其中 `expression1` 和 `expression2` 均为对象。涉及的两个对象都必须实现 `Equatable`。可提供可选的字符串\
  \ `message` 来说明失败原因。 |\n| `XCTAssertEqual(expression1, expression2, message)` |\
  \ 当 `expression1` 不等于 `expression2` 时生成失败。此测试适用于**原始数据类型**。可提供可选的字符串 `message` 来说明失败原因。\
  \ |\n| `XCTAssertNotEqual(expression1, expression2, message)` | 当 `expression1`\
  \ 等于 `expression2` 时生成失败。`expression1` 和 `expression2` 均为原始数据类型。可提供可选的字符串 `message`\
  \ 来说明失败原因。 |\n| `XCTAssertNil(expression, message)` | 当 `expression` 不是 `nil` 时生成失败。可提供可选的字符串\
  \ `message` 来说明失败原因。 |\n| `XCTAssertNotNil(expression, message)` | 当 `expression`\
  \ 是 `nil` 时生成失败。可提供可选的字符串 `message` 来说明失败原因。 |\n| `XCTAssertTrue(expression, message)`\
  \ | 当 `expression` 的计算结果为 `false` 时生成失败。与 `XCTAssert()` 相同，提供此宏是为了创建更易读的测试。可提供可选的字符串\
  \ `message` 来说明失败原因。 |\n| `XCTAssertFalse(expression, message)` | 当 `expression`\
  \ 的计算结果为 `true` 时生成失败。可提供可选的字符串 `message` 来说明失败原因。 |\n\n以下代码片段展示了一个使用 `XCTAssertTrue`\
  \ 宏将会失败的单元测试。图 1-2 是 Xcode 测试导航器中显示测试失败的截图。\n\n![A432412_1_En_1_Fig2_HTML.jpg](img/A432412_1_En_1_Fig2_HTML.jpg)\n\
  \n**图 1-2.** 失败的单元测试\n\n```\nfunc testNumber1IsGreaterThanNumber2() {\n    let number1\
  \ = 9218\n    let number2 = 673666\n    XCTAssertTrue(number1 > number2,\n     \
  \             \"number1 should be greater than number2\")\n}\n```\n\n该测试失败是因为它期望\
  \ `number1` 大于 `number2`。修复方法很简单，只需将 `number1` 的值修改为大于 `number2` 即可：\n\n```\nfunc\
  \ testNumber1IsGreaterThanNumber2() {\n    let number1 = 921800\n    let number2\
  \ = 673666\n    XCTAssertTrue(number1 > number2,\n                  \"number1 should\
  \ be greater than number2\")\n}\n```\n\n这个特定的测试显然没有太大实际用途；它没有调用其他对象的方法，也没有改变对象的状态。在此仅作为演示断言工作方式的示例。\n\
  \n\n\n### 实例化用于测试的类\n\n单独实例化类有时会变得非常棘手。类的初始化方法可能需要多个参数，而每个参数本身又可能是对象。如果你正在实例化的某个依赖类需要访问系统资源（如网络连接、文件或数据库），问题就会更加复杂。\n\
  \n为了编写有意义且简洁的单元测试，你需要能够实例化被测对象，而无需过多担心如何构建其依赖项。\n\n解决实例化对象依赖关系最常见的方法是创建依赖项的“替身”假对象。要使这种方法有效，这些假对象应该看起来像真实对象，并且更容易实例化。例如，这些假对象可以实现与它们试图模拟的对象相同的协议，并在方法实现中执行无害的功能。\n\
  \n这类对象可以轻松地用作被测类的依赖项，并帮助你创建有意义的测试。在单元测试中，通常可以找到两种类型的假对象：\n\n-   **桩对象**。桩对象（也称为\
  \ Stub）是一种假对象，可用于替代真实的依赖项，它明显更容易实例化，并提供所模拟对象的无害方法实现。\n-   **模拟对象**。模拟对象（也称为 Mock）与桩类似。然而，关键区别在于，模拟对象用于测试断言，或作为断言的目标。\n\
  \n例如，如果你正在编写一个测试，该测试调用对象 `A` 上的一个方法，并预期对象 `A` 会调用对象 `B` 上的另一个方法，那么对象 `B` 就是一个模拟对象，因为你的测试方法预期会在对象\
  \ `B` 上调用某个方法。任何其他可能为了辅助编写测试而实例化的对象 `C`、`D`、`E`，只要不是测试期望的目标，都将被称为桩对象。\n\n## 测试驱动开发的原则\n\
  \n在本节中，你将学习 TDD 的一些关键原则。这些原则适用于任何编程语言、目标平台或 IDE 选择。\n\n### 测试先行\n\n为了让单元测试真正驱动开发，它们需要在被测试的代码之前编写。事实上，TDD\
  \ 的关键原则之一是：测试先写，然后开发人员专注于编写使所有测试通过所需的最少量代码。当测试先写时，最终的软件往往更模块化，因为开发人员被迫从独立构建且相互交互的小组件的角度来思考软件。\n\
  \n这些测试共同定义了项目的验收标准。如果你拥有一套全面的测试套件，那么一旦所有测试通过，代码就被视为准备就绪，无需对代码库进行进一步修改。在实践中，开发人员会先编写一个测试，然后运行它以检查是否失败。接着，开发人员会编写代码以使这个测试通过。这是一个迭代过程，随着时间的推移，开发人员会创建一套全面的测试，这套测试既作为验收标准，也作为代码库的活文档。\n\
  \n一旦所有测试都通过了，相关的功能特性就被认为已完成。这个过程是迭代的，每次迭代都会创建新的测试和代码来使这些测试通过。\n\n同一个开发人员同时编写被测对象和单元测试并非必要。事实上，由高级开发人员使用单元测试来为初级开发人员指定类的行为是很常见的。有了这些测试，初级开发人员就可以实现这个类，并且当所有单元测试通过时，就知道他的工作完成了。\n\
  \n### 红 – 绿 – 重构\n\n测试先行的原则要求你预先编写测试。如果你遵循这个原则，为尚不存在的代码编写测试，那么这个测试很可能无法编译，或者即使能编译也会失败。\n\
  \n这个涉及创建封装了被测系统预期结果的失败测试的开发阶段被称为**红**阶段。红色与流行的 IDE（如 `Xcode` 和 `Visual Studio`）在摘要视图中使用红色表示测试失败有关。\n\
  \n没有人喜欢失败的测试。一旦你创建了一个失败的测试，下一步就是通过编写最少量代码来使测试通过。这第二个阶段被称为**绿**阶段。绿色与流行的 IDE 在摘要视图中使用绿色表示测试通过有关。\n\
  \n达到绿阶段可能涉及创建新代码以及修改现有代码。编码工作侧重于进行最小限度的更改来修复测试。换句话说，做得“足够好”就行了。\n\n很常见的情况是，为了修复一个失败的测试，你需要创建一个新的类或方法，并开始对这个子问题采用测试先行的方式，从而产生一系列失败的测试。这完全正常，一旦你修复了最内层的测试，所有问题都将得到解决。\n\
  \n在成功修复一组失败的测试后，你可能会审视自己编写的代码，并决定需要进行重构。红-绿-重构方法的最后阶段是关于选择性地重构第二阶段编写的代码，同时确保不破坏任何现有的测试。\n\
  \n### 编写最少量的代码\n\n这条实践要求你不编写任何不需要的代码。当你正在构建一个方法来满足失败的测试时，很容易想给方法添加额外的参数，或者创建额外的方法以预判未来需求。必须避免这种做法，你一定要确保自己已经编写了覆盖你所构建的、暂时多余功能的测试。\n\
  \n### 消除重复\n\n这是你在重构练习中会发现自己经常进行的一项活动。其思想是消除类中的重复功能。始终记住，在开始重构之前要准备好一套单元测试，这样你才能确保没有改变类的行为。\n\
  \n将这一原则应用于测试本身也很常见。随着时间的推移，随着项目中单元测试数量的增加，你会发现自己在重构测试本身，将测试之间的共同功能提取到独立的测试中。\n\n\
  ## 总结\n\n本章向你介绍了测试驱动开发的思想、TDD 与单元测试的区别、不同类型的单元测试、断言以及 TDD 的通用原则。在下一章中，你将更详细地探讨其中的一些主题。\n\
  \n## 注释\n\n1.  《解析极限编程》，Kent Beck，1999 年。Addison Wesley 出版。ISBN：0201616416。\n\n\n\
  \n"
- '# 使用 Xcode 编写你的第一组单元测试


  在本章中，你将下载 Xcode 并学习如何使用测试驱动开发技术来创建一个简单的应用程序。你将构建的应用程序将使用**单视图应用模板**，并允许用户通过点击用户界面中的按钮来创建不同类型的曲奇。该应用程序将显示每种已创建曲奇的实时总数以及已创建曲奇的总数。图
  2-1 展示了完成后的应用程序的用户界面。


  ![A432412_1_En_2_Fig1_HTML.jpg](img/A432412_1_En_2_Fig1_HTML.jpg)


  图 2-1. iOS 模拟器中的 `CookieFactory` 应用


  本章的目的是让你熟悉创建单元测试、运行测试以及查看结果的过程。因此，你在本章中创建的测试将不包含所有方面，某些代码部分在本章结束时将不进行测试。本书的第 3、4
  和 5 章将讨论特定主题，例如 MVVM 应用程序架构、测试模型对象以及测试视图控制器。


  该应用程序的完整源代码可以通过以下 URL 从 Github 匿名下载：


  [`https://github.com/asmtechnology/Lesson02.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson02.iOSTesting.2017.Apress.git)


  如果你是一位经验丰富的开发者，你可能希望跳过阅读本章的内容，直接查看最终项目。


  ## 下载并安装 Xcode


  如果你尚未安装，请使用 Mac App Store 为你的 Mac 下载并安装最新版本的 Xcode（见图 2-2）。


  ![A432412_1_En_2_Fig2_HTML.jpg](img/A432412_1_En_2_Fig2_HTML.jpg)


  图 2-2. Mac App Store 应用中的 Xcode 页面


  撰写本章时，Xcode 8 是 Mac OS X Sierra 的最新版本。Xcode 应用的大小超过 10 Gb，下载过程可能需要 15 到 45 分钟，具体取决于你的互联网连接速度。


  ## 创建支持单元测试的新项目


  在创建新的 iOS 应用程序项目时，你可以选择创建内置支持单元测试的项目。通过启动 Xcode 并选择 `File` ➤ `New` ➤ `Project` 菜单项，开始创建新
  Xcode 项目的过程。


  系统将要求你为新项目选择一个模板。Xcode 8 允许你为 iOS、macOS、tvOS 和 watchOS 平台构建项目，并为每个平台提供了一系列模板（见图
  2-3）。


  ![A432412_1_En_2_Fig3_HTML.jpg](img/A432412_1_En_2_Fig3_HTML.jpg)


  图 2-3. iOS 项目模板对话框


  选择一个合适的 iOS 模板并点击 `Next`。在本节中，我将使用 iOS **单视图应用模板**，这是最常用的 iOS 应用模板之一。


  选择项目模板后，将出现一个选项对话框，你可以在其中选择一些选项来自定义模板的某些方面（图 2-4）。


  ![A432412_1_En_2_Fig4_HTML.jpg](img/A432412_1_En_2_Fig4_HTML.jpg)


  图 2-4. 项目选项对话框


  某些字段是必填项，因此在你填写它们之前，`Next` 按钮将不可用。本书中的项目是使用 Swift 构建的，并针对 iPhone。这是 Xcode 中新 iOS
  项目的默认设置。


  在“为你新项目选择选项：”屏幕中，如果你想创建一个支持单元测试的项目，请确保选中 `Include Unit Tests` 选项。一个相关的选项 `Include
  UI Tests` 将添加对用户界面测试的支持。


  点击 `Next` 按钮，并将项目保存到你 Mac 硬盘上的合适文件夹中。你创建的项目将具有一个专门为单元测试配置的额外构建目标，以及一个包含样板代码的示例单元测试文件。


  默认情况下，创建新项目后，Xcode 会为你打开该项目。现在先关闭 Xcode 项目。下一节将讨论为现有项目添加单元测试支持所涉及的过程。


  ## 为现有项目添加单元测试支持


  要为现有 iOS 应用程序项目添加单元测试支持，请在 Xcode 中打开该项目，并选择 `File` ➤ `New` ➤ `Target` 菜单项。在目标模板对话框中选择
  `iOS Unit Testing Bundle` 选项（图 2-5）。


  ![A432412_1_En_2_Fig5_HTML.jpg](img/A432412_1_En_2_Fig5_HTML.jpg)


  图 2-5. 目标模板对话框


  选择目标模板后，将出现一个选项对话框，你可以在其中选择一些选项来自定义模板的某些方面（见图 2-6）。


  ![A432412_1_En_2_Fig6_HTML.jpg](img/A432412_1_En_2_Fig6_HTML.jpg)


  图 2-6. 目标选项对话框


  在大多数情况下，你可以直接接受选项的默认值并点击 `Finish`。一个特殊的构建目标（称为测试目标）将被添加到你的项目中，并已预先配置为支持单元测试。除了测试目标之外，一个包含样板代码的示例单元测试文件也会被添加到你的项目中。


  ## Xcode 导览


  在你开始用 Xcode 编写单元测试之前，你需要熟悉 Xcode 用户界面中处理单元测试的一些区域。随着你编写更多的测试，你很可能会用到此处讨论的用户界面的一个或多个部分。首先，在
  Xcode 中打开 `CookieFactory` 项目。




  ### 项目导航器


  项目导航器位于 Xcode 用户界面的左侧（见图 2-7）。如果项目导航器不可见，请使用 `View ➤ Navigators ➤ Show Project Navigator`
  菜单项。


  ![A432412_1_En_2_Fig7_HTML.jpg](img/A432412_1_En_2_Fig7_HTML.jpg)


  图 2-7. 打开项目导航器的 Xcode 应用程序


  项目导航器列出了构成项目的文件。这些文件以树状结构分层组织，根节点代表项目本身。项目节点下有许多称为组的文件夹。图 2-8 显示了 `CookieFactory`
  项目的项目导航器内容。你可以在项目导航器中看到三个文件夹组：


  *   `CookieFactory`：此组包含构成将交付给客户的应用程序的文件。

  *   `CookieFactoryTests`：此组包含包含测试代码的文件，以及测试代码所需的任何资源。此组中的文件不包含在将交付给客户的应用程序中。

  *   `Products`：此组包含最终的构建产品。


  ![A432412_1_En_2_Fig8_HTML.jpg](img/A432412_1_En_2_Fig8_HTML.jpg)


  图 2-8. 项目导航器中的 `CookieFactory` 项目


  可以通过拖放操作在项目导航器中移动文件。你可能会认为，在测试组下创建/移动文件的操作会自动意味着该文件将不属于交付给客户的产品的一部分。


  事实并非如此；组仅作为帮助理清和整理项目文件列表的辅助工具。文件是否包含在交付给客户的应用程序中，取决于该文件所包含的构建目标。一个支持单元测试的新 iOS 项目将有两个构建目标；一个文件可以是任一目标、两者都不是或两者的成员。


  你可以选择项目导航器中的一个文件，并使用文件检查器查看/更改该文件所属的构建目标（见图 2-9）。要显示文件检查器，请使用 `View ➤ Utilities
  ➤ Show File Inspector` 菜单项。


  ![A432412_1_En_2_Fig9_HTML.jpg](img/A432412_1_En_2_Fig9_HTML.jpg)


  图 2-9. 使用文件检查器设置文件目标


  ### 测试用例类


  在项目导航器的测试文件夹组下，你将创建单元测试用例类。单元测试用例类是一个派生自 `XCTestCase` 并包含多个方法的 Swift 类。当你创建一个支持单元测试的新项目时，会为你创建一个包含样板代码的默认测试用例类（见图
  2-10）。


  ![A432412_1_En_2_Fig10_HTML.jpg](img/A432412_1_En_2_Fig10_HTML.jpg)


  图 2-10. 默认测试用例文件和目标成员资格


  测试用例类包含测试代码，即测试主应用程序代码的代码。测试用例类可能包含五种类型的方法：


  *   **设置方法**：此方法名为 `setUp()`，在测试类中每个测试方法执行之前调用一次。它通常用于放置跨多个单元测试使用的任何公共设置代码。

  *   **拆卸方法**：此方法名为 `tearDown()`，在测试类中每个测试方法执行之后调用。

  *   **测试方法**：这些方法封装了单个单元测试，其名称均以单词 "test" 开头。

  *   **性能测试方法**：这些方法封装了单个性能测试，其名称均以 `testPerformance` 开头。

  *   **Swift 方法**：测试用例类，如同其他任何 Swift 类一样，可以有它自己的方法。在测试用例类中，不封装单元测试的方法通常是编写来包含支持逻辑，并会从单元测试中调用。


  除了与项目一起创建的默认测试用例文件外，你还可以使用 `File ➤ New ➤ File` 菜单项并选择 `iOS Unit Test Case File`
  模板来创建额外的测试用例文件（见图 2-11）。


  ![A432412_1_En_2_Fig11_HTML.jpg](img/A432412_1_En_2_Fig11_HTML.jpg)


  图 2-11. 文件模板对话框


  当创建一个新的测试用例文件时，Xcode 会提供样板化的 `setUp()` 和 `tearDown()` 方法以及几个空的单元测试方法来帮助你开始。清单 2-1
  列出了由 Xcode 创建的一个新的单元测试用例类。


  ```

  import XCTest

  class CookieFactoryTests: XCTestCase {

  override func setUp() {

  super.setUp()

  // 在这里放置设置代码。此方法在类中每个测试方法的调用之前被调用。

  }

  override func tearDown() {

  // 在这里放置拆卸代码。此方法在类中每个测试方法的调用之后被调用。

  super.tearDown()

  }

  func testExample() {

  // 这是一个功能测试用例的示例。

  // 使用 XCTAssert 及相关函数来验证你的测试产生正确的结果。

  }

  func testPerformanceExample() {

  // 这是一个性能测试用例的示例。

  self.measure {

  // 在这里放置你想要测量时间的代码。

  }

  }

  }

  ```


  清单 2-1. `CookieFactoryTests.swift`


