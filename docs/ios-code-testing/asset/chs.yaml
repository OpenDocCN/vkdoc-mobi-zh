  **代码清单 5-4.** `SignupModel.swift`\n\n## 构建视图模型层\n\n我们需要构建两个视图模型类 —— `LoginViewModel`\
  \ 和 `SignupViewModel`。它们分别对应 `LoginViewController` 和 `SignupViewController` 类。视图模型将持有对模型层对象的强引用，并使用协议建立接口，通过该接口与视图控制器进行通信。\n\
  \n### `LoginViewModel` 类\n\n`LoginViewModel` 类代表了 `LoginViewController` 类和 `LoginModel`\
  \ 类之间的视图模型。\n\n我们将采用 TDD 方法来开发登录视图模型类。在项目浏览器的 `LoginFormTests` 组下创建一个名为 `LoginViewModelTests`\
  \ 的新 iOS 单元测试用例类（见图 5-11）。\n\n![A432412_1_En_5_Fig11_HTML.jpg](img/A432412_1_En_5_Fig11_HTML.jpg)\n\
  \n**图 5-11.** Xcode 项目模板对话框\n\n在项目浏览器中选择 `LoginViewModelTests.swift` 文件，并使用文件检查器确保该文件包含在\
  \ `LoginFormTests` 目标中，而不是 `LoginForm` 目标中（见图 5-12）。如果文件检查器不可见，请导航至 **View ➤ Utilities\
  \ ➤ Show File Inspector** 菜单项。\n\n![A432412_1_En_5_Fig12_HTML.jpg](img/A432412_1_En_5_Fig12_HTML.jpg)\n\
  \n**图 5-12.** `LoginViewModelTests` 目标成员资格\n\n从 `LoginViewModelTests.swift` 中删除\
  \ `testExample` 和 `testPerformanceExample` 方法。在单独的扩展中创建一个名为 `testInit_ValidView_InstantiatesObject()`\
  \ 的新单元测试方法，并将以下代码添加到方法体中：\n\n```swift\nfunc testInit_ValidView_InstantiatesObject()\
  \ {\n    let viewModel = LoginViewModel(view:mockLoginViewController!)\n    XCTAssertNotNil(viewModel)\n\
  }\n```\n\n将以下变量声明添加到 `LoginViewModelTests` 类的顶部：\n\n```swift\nfileprivate var mockLoginViewController:MockLoginViewController?\n\
  ```\n\n你会注意到这段代码无法编译；这是因为 `LoginViewModel` 类尚未创建。要修复此问题，请在项目导航器的 `ViewModel` 组下创建一个名为\
  \ `LoginViewModel` 的新类。确保 `LoginViewModel` 类同时是 `LoginForm` 和 `LoginFormTests` 目标的成员。将\
  \ `LoginViewModel.swift` 文件的内容更新为与代码清单 5-5 一致。\n\n```swift\nimport Foundation\n\
  class LoginViewModel: NSObject {\n    weak var view:LoginViewControllerProtocol?\n\
  \    init(view:LoginViewControllerProtocol) {\n        super.init()\n        self.view\
  \ = view\n    }\n}\n```\n**代码清单 5-5.** `LoginViewModel.swift`\n\n`LoginViewModel`\
  \ 类的初始化器接受一个对视图的引用。请注意，`view` 参数的类型是 `LoginViewControllerProtocol`，而不是 `LoginViewController`。\n\
  \n视图模型使用协议与视图建立松散耦合的关系。就视图模型而言，任何实现了 `LoginViewControllerProtocol` 协议的类都可以用作视图。这种与视图的松散耦合使得视图模型易于在单元测试中实例化，而无需依赖视图控制器。\n\
  \n在项目浏览器的 `Protocols` 组下创建一个名为 `LoginViewControllerProtocol` 的新 Swift 文件（见图 5-13），并确保新文件同时是\
