    \ makes use of a protocol to create a loosely coupled relationship with the view.\
    \ As far as the view model is concerned, any class that implements the `LoginViewControllerProtocol`\
    \ protocol can be used as the view. This loose coupling with the view makes the\
    \ view model easy to instantiate in a unit test, independent of a view controller.\n\
    \nCreate a new Swift file called `LoginViewControllerProtocol` (see Figure [5-13](#A432412_1_En_5_Chapter.html#Fig13))\
    \ under the `Protocols` group of the project explorer, and ensure the new file\
    \ is a member of both the `LoginFormTests` and `LoginForm` targets.\n\n![A432412_1_En_5_Fig13_HTML.jpg](A432412_1_En_5_Fig13_HTML.jpg)\n\
    \n**Figure 5-13.** Xcode File Template Dialog Box\n\nUpdate the code in `LoginViewControllerProtocol`\
    \ to resemble the following:\n\n```swift\nimport Foundation\nprotocol LoginViewControllerProtocol\
    \ : class {\n}\n```\n\nCreate a new group called `Mocks` under the `LoginFormTests`\
