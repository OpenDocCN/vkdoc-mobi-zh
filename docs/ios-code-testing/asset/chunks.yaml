    ### Building the `login` Method


    The `login(userName, password)` method of the view model is called when the user
    taps on the Login button. The contents of the username and password text fields
    are passed into the `login` method. The `login` method will create a `LoginModel`
    object and call the `doLogin` method on an instance of a controller class that
    will encapsulate the logic needed to authenticate the user.


    In a real-world application, this login controller class would contain logic to
    send a request to a back-end server. For the purposes of this chapter, however,
    we will build a bare-bones login controller class that uses hard-coded credentials
    to authenticate users.


    Add the tests in Listing [5-10](#A432412_1_En_5_Chapter.html#Par164) to the bottom
    of the `LoginViewModelTests.swift` file:


    ```

    // MARK: login tests

    extension LoginViewModelTests {

    func testLogin_ValidParameters_Calls_doLogin_OnLoginController() {

    let expectation = self.expectation(description: "expected doLogin() to be called")

    let mockLoginController = MockLoginController(expectation, expectedUserName:validUserName,
    expectedPassword:validPassword)

    mockLoginController.shouldReturnTrueOnLogin = true

    let viewModel = LoginViewModel(view:mockLoginViewController!)

    viewModel.loginController = mockLoginController

    mockLoginController.loginControllerDelegate = viewModel

    viewModel.login(userName: validUserName, password: validPassword)

    self.waitForExpectations(timeout: 1.0, handler: nil)

    }

    func testLogin_ValidParameters_Calls_doLoginWithExpectedUserName_OnLoginController()
    {

    let expectation = self.expectation(description: "expected doLogin() to be called")

    let mockLoginController = MockLoginController(expectation, expectedUserName:validUserName,
    expectedPassword:validPassword)

    mockLoginController.shouldReturnTrueOnLogin = true

    let viewModel = LoginViewModel(view:mockLoginViewController!)

    viewModel.loginController = mockLoginController

    mockLoginController.loginControllerDelegate = viewModel

    viewModel.login(userName: validUserName, password: validPassword)

    self.waitForExpectations(timeout: 1.0, handler: nil)

    }

    func testLogin_ValidParameters_Calls_doLoginWithExpectedPassword_OnLoginController()
    {

    let expectation = self.expectation(description: "expected doLogin() to be called")

    let mockLoginController = MockLoginController(expectation, expectedUserName:validUserName,
    expectedPassword:validPassword)

    mockLoginController.shouldReturnTrueOnLogin = true

    let viewModel = LoginViewModel(view:mockLoginViewController!)

    viewModel.loginController = mockLoginController

    mockLoginController.loginControllerDelegate = viewModel

    viewModel.login(userName: validUserName, password: validPassword)

    self.waitForExpectations(timeout: 1.0, handler: nil)

    }

    }

