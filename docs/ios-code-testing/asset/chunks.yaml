    that Xcode can generate code coverage data.


    ### Viewing Code Coverage Data


    If you have enabled code coverage reports in the scheme settings dialog box, you
    will see the code coverage ribbon appear to the right side of the source code
    editor. Click on the CookieFactory.swift file in the project navigator and observe
    the numbers in the code coverage ribbon (see Figure [2-23](#A432412_1_En_2_Chapter.html#Fig23)).


    ![A432412_1_En_2_Fig23_HTML.jpg](A432412_1_En_2_Fig23_HTML.jpg)


    Figure 2-23.


    Xcode Code Coverage Information


    You will notice that the code coverage ribbon lists a number beside each of the
    methods of the CookieFactory class. The number indicates the number of times the
    method was called when you ran your test suite.


    Hovering your mouse pointer over a number in the code coverage ribbon will highlight
    the associated method in red or green. A green highlight means that the method
    has been called at least once by your tests, and a red highlight means that the
    method is not currently being covered by your test suite.


    Code coverage is a useful tool to get an idea of the parts of your production
    code that are covered by your tests, but must be used with caution. Many development
    teams try to achieve high code coverage by writing meaningless tests, or tests
    that cover iOS framework code. It is better to have fewer and more meaningful
    tests than a large number of tests that are difficult to maintain or understand
    by new members of the team.


    ## Summary


    This chapter has introduced you to sections of the Xcode user interface that deal
    with unit testing. You have also built a simple single view application using
    basic TDD techniques and have learned to examine code coverage reports.


    The next chapter will discuss the MVVM architectural pattern and how applications
    that are built using this pattern are easier to test.


    # 3. The MVVM Architectural Pattern


    This chapter will examine a commonly used architectural pattern called Model-View-Controller
    (MVC), its iOS equivalent Model–ViewController (M-VC), and the testability issues
    that arise when using this common pattern. You will then be introduced to a new
    architectural pattern called Model, View, ViewModel (MVVM) and the advantages
    of this pattern from a code reusability and testability perspective.


    To avoid confusion in the chapter, I spell out “Model-ViewController” when discussing
    the iOS version and the abbreviation “MVC” when referring to a common pattern.


    ## The MVC Architectural Pattern


    The Model-View-Controller is one of the most common application architectural
    patterns in use today, across a variety of programming languages (Java, .NET,
    Objective-C, Swift). It was designed to help developers implement user interfaces
    on computers and aims to separate the representation of data from the manner in
    which it is presented to the user. Figure [3-1](#A432412_1_En_3_Chapter.html#Fig1)
    depicts the standard MVC pattern.


    ![A432412_1_En_3_Fig1_HTML.jpg](A432412_1_En_3_Fig1_HTML.jpg)


    Figure 3-1.


    Standard Model-View-Controller Pattern


    This pattern has three key components (sometimes called layers):


    *   Model: The model component handles the storage of data used by the application
    and accepts commands to read or update the data from the controller. It could
    be a single class or a group of related classes.

    *   View: The view component reads data from the model and handles the rendering/presentation
    of the model. The view can be thought to be the visual representation of the model,
    and it can selectively present certain parts of the model.

    *   Controller: The controller component sits in between the model and the view,
    handles user input, updates the model, and updates the view as necessary. Business
    logic and networking code resides in one or more controllers, and controllers
    can communicate with other controllers. In other words, controllers make the brain
    of the application.'
