    \ {\n            self.present(AlertFactory.networkErrorAlert(), animated: true,\
    \ completion: nil)\n        }\n    }\n}\n```\n代码清单8-2. `RefactoredLargeViewController.swift`\n\
    \n`NetworkController.swift` 类如代码清单[8-3](#A432412_1_En_8_Chapter.html#Par25)所示。\n\
    \n```swift\nimport Foundation\nclass NetworkController: NSObject {\n    var session:\
