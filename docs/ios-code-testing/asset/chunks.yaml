    # 远程内容规范


    为了让 PhotoBook 应用能够从互联网下载内容，你需要了解这些内容的具体形式及其存放位置。


    假设你的服务器端团队告知你，他们将提供一个存放城市和照片元数据的 JSON 文件，以及每张照片对应的 JPEG 文件。


    这个 JSON 文件名为`albumlist.json`，它将与相关的 JPEG 图片一同存储在远程服务器的同一目录下。该服务器不支持 SSL，服务器上该目录的
    URL 如下：


    [`http://www.asmtechnology.com/apress2017/`](http://www.asmtechnology.com/apress2017/)


    包含有效数据的示例 JSON 文件已经存放在本章代码下载附带的`Resources`目录中，以下是该文件的部分内容：


    ```

    [

    {

    "city": "维也纳（奥地利）",

    "photos": [

    {

    "imageName": "v1.jpg",

    "aperture": "f2.8",

    "shutterSpeed": "400",

    "iso": "100",

    "comment": "维也纳周末市场的 HDR 图像。"

    }

    ]

    }

    ]

    ```


    # 配置应用传输安全


    用于托管本项目图片和元数据的服务器不支持 HTTPS 连接。为了允许普通的 HTTP 连接，你需要配置项目的应用传输安全（ATS）设置。在实际项目中，你应始终使用
    HTTPS 连接。


    在项目导航器中找到`PhotoBook`组下的`Info.plist`文件并点击它。向此 plist 添加一个新的字典键，命名为`App Transport
    Security Settings`（参见图 7-5）。在这个新字典中，添加一个名为`Allow Arbitrary Loads`的布尔键，并将其值设为`Yes`。


