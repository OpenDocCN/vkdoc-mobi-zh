    \ | Method | Allows other code to create `AccountOwner` instances. |\n\nCreate\
    \ a new iOS Unit Test Case class called `AccountOwnerTests` under the `BankAccountTests`\
    \ group of the project explorer (see Figure [4-4](#A432412_1_En_4_Chapter.html#Fig4)).\n\
    \n![A432412_1_En_4_Fig4_HTML.jpg](A432412_1_En_4_Fig4_HTML.jpg)\n\nFigure 4-4.\
    \ Xcode File Template Dialog Box\n\nSelect the `AccountOwnerTests.swift` file\
    \ in the project explorer and use the file inspector to ensure that the file is\
    \ included in the `BankAccountTests` target and not the `BankAccount` target (see\
    \ Figure [4-5](#A432412_1_En_4_Chapter.html#Fig5)). If the file inspector is not\
    \ visible, use the **View ➤ Utilities ➤ Show File Inspector** menu item.\n\n![A432412_1_En_4_Fig5_HTML.jpg](A432412_1_En_4_Fig5_HTML.jpg)\n\
    \nFigure 4-5. Target Membership for `AccountOwnerTests.swift`\n\nA test case file\
    \ contains a couple of empty stub methods called `testExample` and `testPerformanceExample`.\
    \ These methods are there to help you get started writing your tests. We will\
    \ not be using these stub methods in this chapter, so feel free to delete them.\n\
    \nCreate a new unit test method called `testAccountOwner_ValidFirstName_ValidLastName_ValidEmail_CanBeInstantiated()`\
    \ and add the following code to the method body:\n\n```\nfunc testAccountOwner_ValidFirstName_ValidLastName_ValidEmail_CanBeInstantiated()\
    \ {\n    let accountOwner = AccountOwner(firstName: validFirstName,\n        \
    \                            lastName: validLastName,\n                      \
    \              emailAddress: validEmailAddress)\n    XCTAssertNotNil(accountOwner)\n\
    }\n```\n\nAdd the following private constant declarations to the top of the `AccountOwnerTests.swift`\
    \ file:\n\n```\nprivate let validFirstName = \"Andrew\"\nprivate let validLastName\
    \ = \"Hill\"\nprivate let validEmailAddress = \"a.hill@abcfinancial.com\"\nprivate\
    \ let invalidFirstName = \"A\"\nprivate let invalidLastName = \"h\"\nprivate let\
    \ invalidEmailAddress = \"abcfinancial.com\"\nprivate let emptyString = \"\"\n\
    ```\n\nThese constants represent a set of valid and invalid first names, last\
    \ names, and email addresses, and will be used within the test cases in this class.\
    \ It is a good practice to declare all the constants used in test cases at the\
    \ top of the file that contains the test cases, and not create ad hoc constants\
    \ within test cases.\n\nYou will notice that this code fails to compile; that\
