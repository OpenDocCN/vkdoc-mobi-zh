    * **设备：** `iPhone`

    * **使用 Core Data：** `取消勾选`

    * **包含单元测试：** `勾选`

    * **包含 UI 测试：** `取消勾选`


    > **注意：** 本章创建的项目不包含用户界面 (UI) 测试。如有需要，你可以在后续步骤中向项目添加 UI 测试。第 13 章涵盖了用户界面测试的主题。


    将项目保存到计算机上的合适位置，然后点击**创建**。由于该项目将包含多个新类，建议将类文件放置在项目导航器中相应的组目录下。


