    the class `MockURLSession` and ensure that the new file is only included in the
    test target (see Figure [7-7](#A432412_1_En_7_Chapter.html#Fig7)).


    ![A432412_1_En_7_Fig7_HTML.jpg](A432412_1_En_7_Fig7_HTML.jpg)


