- fmt: '### Decorators


    Another neat trick when it comes to adding new code to a legacy code base is to
    make use of the decorator design pattern. The decorator design pattern allows
    you to add functionality to a class by wrapping that class within another class,
    with new functionality being provided by the wrapping class.


    The decorator pattern is best explained using an example. Listing [8-8](#A432412_1_En_8_Chapter.html#Par55)
    presents the `BankAccount` class that was developed in Chapter [4](#A432412_1_En_8_Chapter.html).


    ```swift

    import Foundation

    class BankAccount: NSObject {

    var accountName:String

    var accountNumber:String

    var sortingCode:String

    var accountType:AccountType

    var transactions:[Transaction]

    var owners:[AccountOwner]

    var accountBalance:Float {

    get {

    var balance:Float = 0.0

    for transaction in self.transactions {

    if let amount = Float(transaction.amount) {

    if transaction.isIncoming {

    balance += amount

    } else {

    balance -= amount

    }

    }

    }

    return balance

    }

    }

    init?(accountName:String,

    accountNumber:String,

    sortingCode:String,

    accountType:AccountType,

    owners:[AccountOwner],

    accountNameValidator:AccountNameValidator? = nil,

    accountNumberValidator:AccountNumberValidator? = nil,

    sortingCodeValidator:SortingCodeValidator? = nil) {

    let validator1 = accountNameValidator ?? AccountNameValidator()

    if validator1.validate(accountName) == false {

    return nil

    }

    let validator2 = accountNumberValidator ?? AccountNumberValidator()

    if validator2.validate(accountNumber) == false {

    return nil

    }

    let validator3 = sortingCodeValidator ?? SortingCodeValidator()

    if validator3.validate(sortingCode) == false {

    return nil

    }

    if (owners.count == 0 || owners.count > 2) {

    return nil

    }

    self.accountName = accountName

    self.accountNumber = accountNumber

    self.sortingCode = sortingCode

    self.accountType = accountType

    self.owners = owners

    self.transactions = [Transaction]()

    }

    func setOpeningBalance(_ amount:Float) -> Void {

    if let openingBalanceTransaction = Transaction(txDescription: "Opening Balance",
    date: NSDate(), isIncoming: true, amount: "100.0") {

    self.transactions.removeAll()

    self.transactions.append(openingBalanceTransaction)

    }

    }

    func withdraw(_ amount:Float, _ person:AccountOwner?) -> Void {

    if let newTransaction = Transaction(txDescription: "ATM Withdrawal", date: NSDate(),
    isIncoming: false, amount: "\(amount)") {

    self.transactions.append(newTransaction)

    }

    }

    func deposit(_ amount:Float, _ person:AccountOwner?) -> Void {

    if let newTransaction = Transaction(txDescription: "Cash Deposit", date: NSDate(),
    isIncoming: true, amount: "\(amount)") {

    self.transactions.append(newTransaction)

    }

    }

    }

    Listing 8-8.

    BankAccount.swift

    ```


    This class has a very simple interface and can be used to represent a bank account,
    with a list of transactions in a banking system.


    Now, let us assume that due to changing business needs, the banking system needs
    to be upgraded to differentiate between personal accounts and business accounts.
    Daily deposit and withdrawal limits are to be applied to both types of accounts.
    Additionally, all deposits and withdrawals for business accounts need to be logged
    into a special auditing system.


    These requirements can easily be handled by creating decorator classes called
    `PersonalBankAccount` and `BusinessBankAccount`, which provide additional features
    over what currently exists in the `BankAccount` class, so that the needs of these
    specific account types can be met.


    To start with, let us move the external interface of the `BankAccount` class to
    a protocol called `BankAccountProtocol` (see Listing [8-9](#A432412_1_En_8_Chapter.html#Par60)),
    and have the `BankAccount` class implement this protocol.


    ```swift

    protocol BankAccountProtocol : class {

    var accountName:String {get set}

    var accountNumber:String {get set}

    var sortingCode:String {get set}

    var accountType:AccountType {get set}

    var transactions:[Transaction] {get set}

    var owners:[AccountOwner] {get set}

    func setOpeningBalance(_ amount:Float) -> Void

    func withdraw(_ amount:Float, _ person:AccountOwner?) -> Void

    func deposit(_ amount:Float, _ person:AccountOwner?) -> Void

    }

    Listing 8-9.

    BankAccountProtocol.swift

    ```


    The only change needed to ensure the `BankAccount` class implements this protocol
    is to add the name of the protocol to the class declaration:


    ```swift

    class BankAccount: NSObject, BankAccountProtocol

    ```


    With this change in place, we can use the decorator pattern to create the `PersonalBankAccount`
    class, which will impose daily deposit and withdrawal limits (Listing [8-10](#A432412_1_En_8_Chapter.html#Par64)).


    ```swift

    import Foundation

    class PersonalBankAccount : NSObject , BankAccountProtocol {

    var bankAccount:BankAccount

    var accountName:String {

    get {

    return bankAccount.accountName

    }

    set {

    bankAccount.accountName = newValue

    }

    }

    var accountNumber:String {

    get {

    return bankAccount.accountNumber

    }

    set {

    bankAccount.accountNumber = newValue

    }

    }

    var sortingCode:String {

    get {

    return bankAccount.sortingCode

    }

    set {

    bankAccount.sortingCode = newValue

    }

    }

    var accountType:AccountType {

    get {

    return bankAccount.accountType

    }

    set {

    bankAccount.accountType = newValue

    }

    }

    var transactions:[Transaction] {

    get {

    return bankAccount.transactions

    }

    set {

    bankAccount.transactions = newValue

    }

    }

    var owners:[AccountOwner] {

    get {

    return bankAccount.owners

    }

    set {

    bankAccount.owners = newValue

    }

    }

    var accountBalance:Float {

    get {

    return bankAccount.accountBalance

    }

    }

    init(_ bankAccount:BankAccount) {

    self.bankAccount = bankAccount

    super.init()

    }

    func setOpeningBalance(_ amount:Float) -> Void {

    bankAccount.setOpeningBalance(amount)

    }

    func withdraw(_ amount:Float, _ person:AccountOwner?) -> Void {

    if withinDailyWithdrawalLimit(amount) {

    bankAccount.withdraw(amount, person)

    }

    }

    func deposit(_ amount:Float, _ person:AccountOwner?) -> Void {

    if withinDailyDepositlLimit(amount) {

    bankAccount.deposit(amount, person)

    }

    }

    }

    extension PersonalBankAccount {

    func withinDailyWithdrawalLimit(_ amount:Float) -> Bool {

    // add code to ensure this transaction does not exceed daily

    // withrawal limits.

    return true

    }

    func withinDailyDepositlLimit(_ amount:Float) -> Bool {

    // add code to ensure this transaction does not exceed daily

    // deposit limits.

    return true

    }

    }

    Listing 8-10.

    PersonalBankAccount.swift

    ```


    Some of the key points to note about the `PersonalBankAccount` class are the following:


    1. An instance variable of type `BankAccount` has been created, and the initializer
    accepts a `BankAccount` instance to be injected. The `PersonalBankAccount` class,
    in effect, wraps around a `BankAccount` class:


    ```swift

    var bankAccount:BankAccount

    init(_ bankAccount:BankAccount) {

    self.bankAccount = bankAccount

    super.init()

    }

    ```


    2. All the property declarations in the decorator class call the corresponding
    properties of the wrapped class:


    ```swift

    var accountName:String {

    get {

    return bankAccount.accountName

    }

    set {

    bankAccount.accountName = newValue

    }

    }

    ```


    3. The `deposit` and `withdraw` methods implement additional logic before calling
    the corresponding methods of the wrapped class:


    ```swift

    func withdraw(_ amount:Float, _ person:AccountOwner?) -> Void {

    if withinDailyWithdrawalLimit(amount) {

    bankAccount.withdraw(amount, person)

    }

    }

    func deposit(_ amount:Float, _ person:AccountOwner?) -> Void {

    if withinDailyDepositlLimit(amount) {

    bankAccount.deposit(amount, person)

    }

    }

