- fmt: '### Creating the Login Controller Class


    We will create a bare-bones class to represent the login controller – a class
    that in a real-world example would encapsulate logic to authenticate the user
    with a back-end server.


    We will not use TDD techniques while creating the login controller class. Create
    a new group in the Xcode project navigator called `"Controllers"`, and under that
    group create a new Swift file called `LoginController.swift`. Ensure that the
    new file is a member of both the `LoginForm` and `LoginFormTests` targets (see
    Figure [5-17](#A432412_1_En_5_Chapter.html#Fig17)).


    ![A432412_1_En_5_Fig17_HTML.jpg](A432412_1_En_5_Fig17_HTML.jpg)


    **Figure 5-17.** `LoginController.swift` Target Membership


    Update the contents of `LoginController.swift` to match the contents of Listing
    [5-11](#A432412_1_En_5_Chapter.html#Par169).


    ```

    import Foundation

    protocol LoginControllerDelegate : class {

    func loginResult(result:Bool)

    }

    class LoginController : NSObject {

    let dummyUsername = "Alibaba"

    let dummyPassword = "Abracadabra"

    weak var loginControllerDelegate : LoginControllerDelegate?

    init(delegate:LoginControllerDelegate?) {

    self.loginControllerDelegate = delegate

    super.init()

    }

    func doLogin(model:LoginModel) {

    let userName = model.userName

    let password = model.password

    if ((userName.compare(dummyUsername) == .orderedSame) &&

    (password.compare(dummyPassword) == .orderedSame)) {

    loginControllerDelegate?.loginResult(result: true)

    return

    }

    loginControllerDelegate?.loginResult(result: false)

    }

    }

    ```


    **Listing 5-11.** `LoginController.swift`


    The login controller class that is presented in Listing [5-11](#A432412_1_En_5_Chapter.html#Par169)
    requires a delegate object that will be informed of the results of the login attempt.
    The delegate object must conform to the `LoginControllerDelegate` protocol. The
    protocol defines a single method:


    ```

    func loginResult(result:Bool)

    ```


    The view model will act as the delegate object for the login controller. We will
    update the `LoginViewModel` class to implement this protocol in a later section
    of this chapter.


    ### Creating the Mock Login Controller Class


    Create a new Swift file called `MockLoginController.swift` under the `Mocks` group
    of the Xcode project navigator. Ensure that the new file is a member of the `LoginFormTests`
    target only (see Figure [5-18](#A432412_1_En_5_Chapter.html#Fig18)).


    ![A432412_1_En_5_Fig18_HTML.jpg](A432412_1_En_5_Fig18_HTML.jpg)


    **Figure 5-18.** `MockLoginController` Target Membership


    Update the contents of `MockLoginController.swift` to match the contents of Listing
    [5-12](#A432412_1_En_5_Chapter.html#Par175).


    ```

    import Foundation

    import XCTest

    class MockLoginController : LoginController {

    private var expectation:XCTestExpectation?

    private var expectedUserName:String?

    private var expectedPassword:String?

    var shouldReturnTrueOnLogin:Bool

    init(_ expectation:XCTestExpectation, expectedUserName:String, expectedPassword:String)
    {

    self.expectation = expectation

    self.expectedUserName = expectedUserName

    self.expectedPassword = expectedPassword

    self.shouldReturnTrueOnLogin = false

    super.init(delegate:nil)

    }

    override func doLogin(model:LoginModel) {

    if let expectation = self.expectation,

    let expectedUserName = self.expectedUserName,

    let expectedPassword = expectedPassword {

    if ((model.userName.compare(expectedUserName) == .orderedSame) &&

    (model.password.compare(expectedPassword) == .orderedSame)){

    expectation.fulfill()

    }

    }

    loginControllerDelegate?.loginResult(result:shouldReturnTrueOnLogin)

