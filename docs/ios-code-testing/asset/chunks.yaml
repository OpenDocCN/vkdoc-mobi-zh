  raw: '#### Calling the Login Method of the View Model from the View Controller


    Add the following test cases to the LoginViewControllerTests .swift file:


    ```

    func testLogin_ValidUserNameAndPassword_Calls_Login_OnViewModel_WithExpectedUserName()
    {

    let expectation = self.expectation(description: "expected login() to be called")

    let userNameTextFieldStub = UITextFieldStub(text:validUserName)

    let passwordTextFieldStub = UITextFieldStub(text:"")

    let loginViewController = LoginViewController()

    loginViewController.userNameTextField = userNameTextFieldStub

    loginViewController.passwordTextField = passwordTextFieldStub

    let viewModel = MockLoginViewModel(view:loginViewController)

    viewModel.loginExpectation = (expectation, expectedUserName:validUserName, expectedPassword:"")

    loginViewController.viewModel = viewModel

    loginViewController.login(self)

    self.waitForExpectations(timeout: 1.0, handler: nil)

    }

    func testLogin_ValidUserNameAndPassword_Calls_Login_OnViewModel_WithExpectedPassword()
    {

    let expectation = self.expectation(description: "expected login() to be called")

    let userNameTextFieldStub = UITextFieldStub(text:"")

    let passwordTextFieldStub = UITextFieldStub(text:validPassword)

    let loginViewController = LoginViewController()

    loginViewController.userNameTextField = userNameTextFieldStub

    loginViewController.passwordTextField = passwordTextFieldStub

    let viewModel = MockLoginViewModel(view:loginViewController)

    viewModel.loginExpectation = (expectation, expectedUserName:"", expectedPassword:validPassword)

    loginViewController.viewModel = viewModel

    loginViewController.login(self)

    self.waitForExpectations(timeout: 1.0, handler: nil)

    }

    ```


    The aim of these test cases is to ensure that the view model’s login() method
    is called by the login action method of the view controller. The view model’s
    login method requires the username and password, both of which are read from UITextField
    instances in the view.


    Since these values are read from text fields that are created using a storyboard,
    you will need to create stub text fields and set the values of the corresponding
    outlets manually.


    In each of the above test cases, stub objects are created for the text fields
    and applied to the view controller’s outlets, using code similar to the following
    snippet:


    ```

    let userNameTextFieldStub = UITextFieldStub(text:"")

    let passwordTextFieldStub = UITextFieldStub(text:validPassword)

    let loginViewController = LoginViewController()

    loginViewController.userNameTextField = userNameTextFieldStub

    loginViewController.passwordTextField = passwordTextFieldStub

    ```


    Create a new group called Stubs under the LoginFormTests group, and create a new
    Swift class called UITextFieldStub under the Stubs group. Ensure the UITextFieldStub.swift
    file is only a member of the LoginFormTests target.


    Update the code in UITextFieldStub .swift to resemble the following:


    ```

    import UIKit

    class UITextFieldStub : UITextField {

    init(text:String) {

    super.init(frame: CGRect.zero)

    super.text = text

    }

    required init?(coder aDecoder: NSCoder) {

    super.init(coder: aDecoder)

    }

    }

    ```


    Add the following variable declaration to the LoginViewControllerTests class:


    ```

    fileprivate var validUserName = "abcdefghij"

    fileprivate let validPassword = "D%io7AFn9Y"

    ```


    Update the implementation of the login action method of the LoginViewController
    class to match:


    ```

    @IBAction func login(_ sender: Any) {

    viewModel?.login(userName: userNameTextField.text, password: passwordTextField.text)

    }

    ```


    Save the file and run all unit tests using the Product ➤ Test menu item. You will
    see that the unit test you have just created has passed.


    #### Calling the userNameUpdated and passwordUpdated Methods of the View Model
    from the View Controller


    Add the following test cases to the LoginViewControllerTests.swift file:


    ```

    func testTextFieldShouldChangeCharacters_userNameTextField_Calls_UserNameUpdated_OnViewModel_WithExpectedUsername()
    {

    let expectation = self.expectation(description: "expected userNameUpdated() to
    be called")

    let userNameTextFieldStub = UITextFieldStub(text:validUserName)

    let passwordTextFieldStub = UITextFieldStub(text:validPassword)

    let loginViewController = LoginViewController()

    loginViewController.userNameTextField = userNameTextFieldStub

    loginViewController.passwordTextField = passwordTextFieldStub

    let viewModel = MockLoginViewModel(view:loginViewController)

    viewModel.userNameUpdatedExpectation = (expectation, expectedValue:validUserName)

    loginViewController.viewModel = viewModel

    let _ = loginViewController.textField(userNameTextFieldStub,

    shouldChangeCharactersIn: NSMakeRange(0, 1),

    replacementString: "A")

    self.waitForExpectations(timeout: 1.0, handler: nil)

    }

    func testTextFieldShouldChangeCharacters_passwordTextField_Calls_PasswordUpdated_OnViewModel_WithExpectedUsername()
    {

    let expectation = self.expectation(description: "expected passwordUpdated() to
    be called")

    let userNameTextFieldStub = UITextFieldStub(text:validUserName)

    let passwordTextFieldStub = UITextFieldStub(text:validPassword)

    let loginViewController = LoginViewController()

    loginViewController.userNameTextField = userNameTextFieldStub

    loginViewController.passwordTextField = passwordTextFieldStub

    let viewModel = MockLoginViewModel(view:loginViewController)

    viewModel.passwordUpdatedExpectation = (expectation, expectedValue:validPassword)

    loginViewController.viewModel = viewModel

    let _ = loginViewController.textField(passwordTextFieldStub,

    shouldChangeCharactersIn: NSMakeRange(0, 1),

    replacementString: "A")

    self.waitForExpectations(timeout: 1.0, handler: nil)

    }

    ```


    The aim of these test cases is to ensure that either the view model’s userNameUpdated()
    method or the passwordUpdated() method is called by the `textField(shouldChangeCharactersIn,
    replacementString)` method of the view controller.


    Update the implementation of the `textField(shouldChangeCharactersIn, replacementString)`
    method of the LoginViewController class to match:


    ```

    extension LoginViewController: UITextFieldDelegate {

    func textField(_ textField: UITextField,

    shouldChangeCharactersIn range: NSRange,

    replacementString string: String) -> Bool {

    if textField == self.userNameTextField {

    self.viewModel?.userNameUpdated(textField.text)

    }

    if textField == self.passwordTextField {

    self.viewModel?.passwordUpdated(textField.text)

    }

    return true

    }

    }

    ```


    Save the file and run all unit tests using the Product ➤ Test menu item. You will
    see that the unit tests you have just created have passed .'
