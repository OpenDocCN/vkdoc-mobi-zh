    ## Summary


    In this chapter you have learned to combine BDD and TDD techniques while building
    an iOS App. You started by reviewing the business reuirements and creating a set
    of user stories to cover the requirements. You then determined that not all user
    stories were testable by BDD techniques; some scenarios would be better tested
    using visual inspection techniques.


    For the scenarios that could be tested using BDD techniques, you learned to create
    BDD tests using Quick. The BDD tests were failing initially, and you determined
    that you will need to create the required application functionality to make the
    BDD tests pass.


    Since BDD tests do not dictate the manner in which you write the underlying code,
    you opted to use TDD techniques and the application architecture to build the
    underlying application functionality.


    By doing so, you used a combination of both BDD and TDD techniques to build the
    application.


    # 13. Testing the User Interface


    User Interface (UI) tests allow you to test your application from the outside,
    just as your users would see the application. Every time you decide to run your
    application on the simulator or device, you are, in effect, testing the UI of
    your application. Since Xcode 7, Apple has provided the ability to create automated
    UI tests. These automated UI tests are great at finding regression defects, and
    used correctly can reduce the regression testing effort for your apps.


    UI tests are built using a set of classes in XCTest . Unlike unit tests that derive
    from XCTest, UI tests derive from XCUITest. UI tests are typically assigned their
    own group and build target in an Xcode project as shown in Figure [13-1](#A432412_1_En_13_Chapter.html#Fig1).


    ![A432412_1_En_13_Fig1_HTML.jpg](A432412_1_En_13_Fig1_HTML.jpg)


    Figure 13-1.


    Separate Folder Group and Build Targets for UI Tests


    As you can see from Figure [13-1](#A432412_1_En_13_Chapter.html#Fig1), the code
    that makes your app, its associated unit tests, and user interface tests is part
    of the same Xcode project. However, unlike unit tests, UI tests are packaged and
    deployed into a separate application called the Test Runner.


    The code that makes up your UI test cases executes within the test runner app
    and not the main app being tested (subject under test). Naturally, the first order
    of business for the test runner is to launch an instance of the app to be tested.


    How does the test runner app interact with the UI of the subject under test programmatically?
    The answer is through the use of proxy user interface elements that are set up
    by Xcode during the test session. This is depicted in Figure [13-2](#A432412_1_En_13_Chapter.html#Fig2).


    ![A432412_1_En_13_Fig2_HTML.jpg](A432412_1_En_13_Fig2_HTML.jpg)


    Figure 13-2.


    The Test Runner and the Application Under Test


    The code in a typical UI test case attempts to find a proxy user interface element
    in the subject under test, and creates assertions based on the state of the proxy
    element. Proxy elements are instances of XCUIElement and have a very limited list
    of properties and methods that you can use within your UI test.


    Xcode also provides a related feature called UI recording . UI recording is a
    tool to help you create UI tests. When UI recording is enabled, an instance of
    the subject under test is launched in the iOS simulator and you can interact with
    it as you normally would. Xcode records your interaction with the app and builds
    a user interface test that can perform the same sequence of interactions for you.


    ## Adding Support for UI Testing to Your Project


    Adding support for UI testing involves linking XCTest, making a new file group
    in the Xcode project, and creating a new build target.


    ## New Projects


    The process is slightly simpler if you are creating a new project. Simply ensure
    the Include UI Tests check box is selected in the project options dialog box (see
    Figure [13-3](#A432412_1_En_13_Chapter.html#Fig3)).


    ![A432412_1_En_13_Fig3_HTML.jpg](A432412_1_En_13_Fig3_HTML.jpg)


    Figure 13-3.


    Xcode Project Options Dialog Box


    When you do this, you will notice a few changes:


    *   A new group has been added to the Xcode project. This group will be used to
    contain your UI test files.

    *   A new build target, also known as the UI test target, is added to the project.

    *   The test target is preconfigured to test the host application.


    All of these points are visible in Figure [13-4](#A432412_1_En_13_Chapter.html#Fig4).


    ![A432412_1_En_13_Fig4_HTML.jpg](A432412_1_En_13_Fig4_HTML.jpg)


    Figure 13-4.


    New Folder Group and Build Target For UI Tests'
