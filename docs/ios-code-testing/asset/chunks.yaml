- fmt: '# Assertions


    Once you have located the user interface element of interest in your UI test,
    you will either inspect one of its attributes and compare the results to an expected
    value, or interact with the user interface element to display a new view and inspect
    one of the attributes of the new view.


    Just like unit tests, UI tests also use assertions to compare the state of an
    object with an expected value. Table 13-6 lists some of these assertion functions
    used within UI tests.


    **Table 13-6.** XCTest Assertion Macros


    | Macro | Description |

    | --- | --- |

    | `XCTAssert(expression, message)` | Generates a failure if the expression evaluates
    to false. An optional string message may be provided to indicate the reason for
    failure. |

    | `XCTAssertEqualObjects(expression1, expression2, message)` | Generates a failure
    when `expression1` is not equal to `expression2`, where both `expression1` and
    `expression2` are objects. Both objects involved must implement `Equatable`. An
    optional string message may be provided to indicate the reason for failure. |

    | `XCTAssertNotEqualObjects(expression1, expression2, message)` | Generates a
    failure when `expression1` is equal to `expression2`, where both `expression1`
    and `expression2` are objects. Both objects involved must implement `Equatable`.
    An optional string message may be provided to indicate the reason for failure.
    |

    | `XCTAssertEqual(expression1, expression2, message)` | Generates a failure when
    `expression1` is not equal to `expression2`. This test is for primitive data types.
    An optional string message may be provided to indicate the reason for failure.
    |

    | `XCTAssertNotEqual(expression1, expression2, message)` | Generates a failure
    when `expression1` is equal to `expression2`. Both `expression1` and `expression2`
    are primitive data types. An optional string message may be provided to indicate
    the reason for failure. |

    | `XCTAssertNil(expression, message)` | Generates a failure when the expression
    is not nil. An optional string message may be provided to indicate the reason
    for failure. |

    | `XCTAssertNotNil(expression, message)` | Generates a failure when the expression
    is nil. An optional string message may be provided to indicate the reason for
    failure. |

    | `XCTAssertTrue(expression, message)` | Generates a failure when the expression
    evaluates to false. Identical to `XCTAssert()`, provided to create more readable
    tests. An optional string message may be provided to indicate the reason for failure.
    |

    | `XCTAssertFalse(expression, message)` | Generates a failure when the expression
    evaluates to true. An optional string message may be provided to indicate the
    reason for failure. |


    The following code snippet lists a UI test case that will try to locate a button
    with the accessibility identifier `"FacebookLoginButton"` and assert if the button
    was not found:


    ```

    func testFacebookLoginButtonExists() {

    let application = XCUIApplication()

    let query = application.buttons

    let button = query.element(matching: .button, identifier: "FacebookLoginButton")

    XCTAssert(button.exists)

    }

    ```


    Note that `XCTAssert` was used instead of `XCTAssertNotNil`. This is because `button`
    is an instance of `XCUIElement`, which is just a proxy object. Proxy objects just
    contain the information needed by the test runner to try and locate a user interface
    element.


    Only when you try to access the underlying element (by calling `exists()` on the
    `XCUIElement`) will the test runner try to resolve the `XCUIElement` into an actual
    user interface element.


    The following snippet builds on the previous test and asserts if the text displayed
    on the button does not match a specific value. The text displayed on the button
    is not the same as its accessibility identifier.


    ```

    func testFacebookLoginButtonDisplaysCorrectLabel(){

    let application = XCUIApplication()

    let query = application.buttons

    let button = query.element(matching: .button, identifier: "FacebookLoginButton")

    let buttonLabel = button.label

    XCTAssertEqual(buttonLabel, "Login With Facebook")

    }

    ```


    # UI Recording


    Composing UI test scripts one line at a time is not something you would like to
    do if the user journey was long and involved and consisted of several interactions
    to bring up the object you want to test.


    The good news is that you do not have to create UI test scripts one line at a
    time. Xcode provides a feature called UI recording, which can be used to help
    create UI test scripts. With UI recording, you can launch an instance of your
    application and interact with it as normal. While you interact with your app,
    Xcode records your taps, gestures, selections, and key strokes and generates an
    appropriate UI test script.


    UI recording is tightly coupled with UI testing. To begin UI recording, simply
    place the text cursor within a UI test case and tap the red record button at the
    bottom of the Xcode editor (see Figure 13-14).


    ![A432412_1_En_13_Fig14_HTML.jpg](A432412_1_En_13_Fig14_HTML.jpg)


    **Figure 13-14.** The UI Recording Button


    To stop recording, simply tap the stop button, which replaces the record button
    during a recording session. UI recording is not foolproof, and often you may find
    that you can generate a more efficient script to achieve the same objective. However,
    UI recording can be used as a starting point to build UI tests that you can fine-tune
    and add appropriate test assertions.'
