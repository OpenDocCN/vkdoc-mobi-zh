  trans: '

    ### 使用 CocoaPods 将 Quick 添加到 Xcode 项目


    `CocoaPods` 是 Swift 和 Objective-C 项目的依赖管理解决方案。它能简化在项目中添加第三方框架及其依赖项的过程。


    如果你从未在 Mac 上使用过 `CocoaPods`，则需要先进行安装。安装 `CocoaPods` 需要你拥有 Mac 的管理员权限。


    启动 Mac 上的“终端”应用，并在 shell 提示符下输入以下命令：


    ```

    $ sudo gem install cocoapods

    ```


    系统会要求你输入密码。下载过程可能需要几分钟，之后安装将自动开始。在安装过程中，会显示大量状态信息（图 11-1）。


    ![A432412_1_En_11_Fig1_HTML.jpg](img/A432412_1_En_11_Fig1_HTML.jpg)


    图 11-1. 终端中的 CocoaPods 安装过程


    在安装过程结束时，你应该会在终端窗口中看到类似这样的一行信息：


    ```

    13 gems installed

    ```


    要测试你的 `CocoaPods` 安装，请在终端窗口中输入以下命令，输出结果应类似图 11-2。


    ![A432412_1_En_11_Fig2_HTML.jpg](img/A432412_1_En_11_Fig2_HTML.jpg)


    图 11-2. 测试 CocoaPods 安装


    ```

    $ pod

    ```


    现在你已经验证了 `CocoaPods` 安装成功，可以继续创建新的 Xcode 项目，并使用 `CocoaPods` 将 Quick 库及其依赖项添加到项目中。


    启动 Xcode，基于“Single View Application”模板创建一个新的 iOS 项目。在创建新项目时，请使用以下选项（参见图 11-3）：


    ![A432412_1_En_11_Fig3_HTML.jpg](img/A432412_1_En_11_Fig3_HTML.jpg)


    图 11-3. Xcode 项目选项对话框


    *   Product Name：`TryQuickWithCocoaPods`

    *   Team：`None`

    *   Organization Name：提供一个合适的名称

    *   Organization Identifier：提供一个合适的标识符

    *   Language：`Swift`

    *   Devices：`iPhone`

    *   Use Core Data：取消勾选

    *   Include Unit Tests：勾选

    *   Include UI Tests：取消勾选


    项目创建完成后，退出 Xcode，返回终端窗口，并导航到你创建新 Xcode 项目的文件夹。使用以下命令在此目录中创建一个名为 `Podfile` 的新文件（无扩展名）：


    ```

    $ touch Podfile

    ```


    在终端窗口中输入以下命令并回车，用 TextEdit 打开新文件。


    ```

    $ open –e Podfile

    ```


    使用 TextEdit，将以下行添加到 `Podfile` 中，并保存文件。完成修改后关闭 TextEdit。


    ```

    # Podfile

    use_frameworks!

    def testing_pods

    pod ''Quick''

    pod ''Nimble''

    end

    target ''TryQuickWithCocoaPodsTests'' do

    testing_pods

    end

    ```


    返回终端窗口，输入以下命令并回车：


    ```

    $ pod install

    ```


    几分钟后，你将看到类似如下的信息，表明安装和设置已完成（图 11-4）。


    ![A432412_1_En_11_Fig4_HTML.jpg](img/A432412_1_En_11_Fig4_HTML.jpg)


    图 11-4. Pod Install 命令的结果


    ```

    Pod installation complete! There are two dependencies from the Podfile and two
    total pods installed.

    ```


    在项目目录中查找由 `CocoaPods` 创建的新工作区文件。从现在起，你必须使用这个工作区文件，而不是原始的 `.xcodeproj` 文件（图 11-5）。


    ![A432412_1_En_11_Fig5_HTML.jpg](img/A432412_1_En_11_Fig5_HTML.jpg)


    图 11-5. Cocoapods 创建的新工作区


    当你打开新的工作区文件（扩展名为 `.xcworkspace`）时，应该会在工作区中看到两个项目：


    *   `TryQuickWithCocoaPods`

    *   `Pods`


    如果你展开 `Pods` 项目，你将看到 `Quick` 和 `Nimble` 的文件夹（图 11-6）。需要注意的是，你无需对 `Pods` 项目中的任何文件进行更改。你编写的所有代码（包括测试）都将位于
    `TryQuickWithCocoaPods` 项目中。


    ![A432412_1_En_11_Fig6_HTML.jpg](img/A432412_1_En_11_Fig6_HTML.jpg)


    图 11-6. 包含 Quick 和 Nimble 的 Pods 项目


    至此，你已经将 Quick（以及 Nimble）添加到了 Xcode 项目中，你的项目应该能够在 iOS 模拟器上毫无问题地构建和运行。

    '
- fmt: '### Adding Quick to an Xcode Project Using Carthage


    Carthage is another dependency management solution that is designed to simplify
    the process of adding third-party frameworks and their dependencies into an iOS
    project.


    The merits of using one dependency management solution over the other are beyond
    the scope of this chapter. Often it comes down to individual preference. One of
    the key differences between CocoaPods and Carthage is that Carthage downloads
    and builds frameworks for you, but you need to add the frameworks to your project
    manually.


    If you do not have Carthage installed on your Mac, the easiest way to install
    it is by visiting the following URL and downloading the latest `Carthage.pkg`
    file (Figure [11-7](#A432412_1_En_11_Chapter.html#Fig7)).


    ![A432412_1_En_11_Fig7_HTML.jpg](A432412_1_En_11_Fig7_HTML.jpg)


    Figure 11-7. Downloading the Carthage Installer


    ```

    https://github.com/Carthage/Carthage/releases

    ```


    Once the file has downloaded, locate it in your Downloads folder and double-click
    it to launch the installer. Follow the on-screen instructions to install Carthage
    (Figure [11-8](#A432412_1_En_11_Chapter.html#Fig8)).


    ![A432412_1_En_11_Fig8_HTML.jpg](A432412_1_En_11_Fig8_HTML.jpg)


    Figure 11-8. The Carthage Installer Welcome Screen


    You will need administrative access on your Mac to finish the installation process.


    To test your Carthage installation, type the following command into the Terminal
    window, and the output should resemble Figure [11-9](#A432412_1_En_11_Chapter.html#Fig9).


    ![A432412_1_En_11_Fig9_HTML.jpg](A432412_1_En_11_Fig9_HTML.jpg)


    Figure 11-9. Testing Your Carthage Installation


    ```

    $ carthage

    ```


    Now that you have verified your Carthage installation, you can proceed with creating
    a new Xcode project and using Carthage to add the Quick library and its dependencies
    to the project.


    Launch Xcode and create a new iOS project based on the Single View Application
    template. Use the following options while creating the new project (see Figure
    [11-10](#A432412_1_En_11_Chapter.html#Fig10)):


    ![A432412_1_En_11_Fig10_HTML.jpg](A432412_1_En_11_Fig10_HTML.jpg)


    Figure 11-10. Xcode Project Options Dialog Box


    *   Product Name: `TryQuickWithCarthage`

    *   Team: None

    *   Organization Name: Provide a suitable name

    *   Organization Identifier: Provide a suitable identifier

    *   Language: `Swift`

    *   Devices: `iPhone`

    *   Use Core Data: Unchecked

    *   Include Unit Tests: Checked

    *   Include UI Tests: Unchecked


    Once the project is created, quit Xcode and go back to the Terminal window and
    navigate to the folder on your Mac where you have created the new Xcode project.
    Create a new file called `Cartfile` in this directory (with no extension) using
    the following command:


    ```

    $ touch Cartfile

    ```


    Open the new file in TextEdit by typing the following command in the Terminal
    window and hitting Enter.


    ```

    $ open –e Carfile

    ```


    Using TextEdit, add the following lines to the Podfile, and save the file. Close
    TextEdit when you are finished making the changes.


    ```

    github "Quick/Quick"

    github "Quick/Nimble"

    ```


    The content of a `Cartfile` is somewhat simpler than that of `Podfile`. Each line
    is just the name of the repository in which the framework resides and the path
    to the framework on that repository.


    Return to the Terminal window and type the following command, and hit Enter:


    ```

    $ carthage update --platform iOS

    ```


    After a few minutes, you will see status messages similar to the following indicating
    that both the Nimble and Quick source files have been downloaded and built into
    frameworks (Figure [11-11](#A432412_1_En_11_Chapter.html#Fig11)).


    ![A432412_1_En_11_Fig11_HTML.jpg](A432412_1_En_11_Fig11_HTML.jpg)


    Figure 11-11. Successful Build of Quick and Nimble


    ```

    *** Cloning Nimble

    *** Cloning Quick

    *** Checking out Nimble at "v5.1.1"

    *** Checking out Quick at "v1.0.0"

    *** xcodebuild output can be found in /var/folders/zz/40885yyd4sj5y_1c4d4q8dn40000gn/T/carthage-xcodebuild.xO1qbs.log

    *** Building scheme "Nimble-iOS" in Nimble.xcodeproj

    *** Building scheme "Quick-iOS" in Quick.xcworkspace

    ```


    When Carthage finishes, you will find a new folder called `Carthage` created alongside
    your Xcode project in finder (Figure [11-12](#A432412_1_En_11_Chapter.html#Fig12)).


    ![A432412_1_En_11_Fig12_HTML.jpg](A432412_1_En_11_Fig12_HTML.jpg)


    Figure 11-12. `Carthage` Folder in Your Project Directory


    Inside the `Carthage` folder, you will find two additional folders:


    *   `Checkouts`: This is where Carthage checks out the source code for each library
    that you added into the `Cartfile`.

    *   `Build`: This folder contains the frameworks built from the sources in the
    `Checkouts` folder.


    Unlike CocoaPods, Carthage does not modify the Xcode project. You will need to
    add the frameworks into your project manually.


    Open the `TryQuickWithCarthage` project that you have created earlier and add
    both the `Quick.framework` and `Nimble.framework` files from the `Build` directory
    into your project’s test target (Figure [11-13](#A432412_1_En_11_Chapter.html#Fig13)).


    ![A432412_1_En_11_Fig13_HTML.jpg](A432412_1_En_11_Fig13_HTML.jpg)


    Figure 11-13. Ensure the `Quick` and `Nimble` Frameworks are Added to the Test
    Target


    Add a new Copy Files Phase to the test target by clicking on the `+` button and
    selecting `New Copy File Phase` from the drop-down menu (Figure [11-14](#A432412_1_En_11_Chapter.html#Fig14)).


    ![A432412_1_En_11_Fig14_HTML.jpg](A432412_1_En_11_Fig14_HTML.jpg)


    Figure 11-14. Adding a New Copy Files Phase


    Set the value of the `Destination` combo box of the new build phase to `Frameworks`
    and add both frameworks to the list (Figure [11-15](#A432412_1_En_11_Chapter.html#Fig15)).


    ![A432412_1_En_11_Fig15_HTML.jpg](A432412_1_En_11_Fig15_HTML.jpg)


    Figure 11-15. New Build Phase Added to the Test Target


    At this point you have added Quick and Nimble to your Xcode project using Carthage,
    and your project should be able to build and run on the iOS Simulator without
    any issues.'
