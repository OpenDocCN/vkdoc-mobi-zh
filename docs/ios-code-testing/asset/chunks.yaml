    \    var green:Float\n    var blue:Float\n    var alpha:Float\n    init?(name:String,\
    \ red:Float, green:Float, blue:Float, alpha:Float) {\n        if (red < Color.zero\
    \ || red > Color.one) {\n            return nil\n        }\n        if (green\
    \ < Color.zero || green > Color.one) {\n            return nil\n        }\n  \
    \      if (blue < Color.zero || blue > Color.one) {\n            return nil\n\
    \        }\n        if (alpha < Color.zero || alpha > Color.one) {\n         \
    \   return nil\n        }\n        self.name = name\n        self.red = red\n\
    \        self.green = green\n        self.blue = blue\n        self.alpha = alpha\n\
    \    }\n}\n清单 3-5。\nColor.swift\n```\n\n清单 3-5 中的代码代表了一个单一的模型对象。该模型对象包含描述颜色名称以及单独的\
    \ R、G、B、A 分量值的属性：\n\n```\nvar name:String\nvar red:Float\nvar green:Float\nvar\
    \ blue:Float\nvar alpha:Float\n```\n\n## 总结\n\n在本章中，您了解了无处不在的模型-视图-控制器（MVC）模式及其\
    \ iOS 等效的模型-视图控制器（M-VC）模式。使用 M-VC 模式构建的应用程序往往拥有庞大且难以测试的视图控制器类。\n\n您还了解了微软替代 MVC\
    \ 模式的模式，即模型-视图-视图模型（MVVM）模式。该模式起源于 WPF/XAML 应用程序，但可以轻松改编并用于 iOS 应用程序。\n\n使用 MVVM\
    \ 模式构建的应用程序比使用 MVC 或 M-VC 模式构建的应用程序更容易测试。\n\n# 4. 将 TDD 应用于模型\n\n本章将探讨使用 TDD 技术构建应用程序模型层的过程。由于本章专注于模型层，因此您不会构建用户界面或任何表示逻辑。\n\
    \n测试应用程序模型层的组件与测试应用程序中的其他组件同样重要。在一个非常简单的应用中，模型层可能只包含一个具有几个实例变量的类。即使在这种简化场景下，单元测试也可以用来确认模型类具有应用程序其他部分期望其拥有的成员变量。\n\
    \n在更复杂的应用中，模型层可能包含几个具有复杂关系和职责的类。模型层中的各个类可能执行数据转换、持久化和验证。在这种情况下，单元测试有助于建立（并维护）类之间的关系，并提供对转换、持久化和验证逻辑按预期工作的信心。\n\
    \n本章介绍的模型层旨在表示一个银行账户以及该账户中的一组交易。我们将创建类来表示银行账户、账户所有者以及账户内的交易。图 4-1 描绘了模型层的类图。\n\
    \n![A432412_1_En_4_Fig1_HTML.jpg](img/A432412_1_En_4_Fig1_HTML.jpg)\n\n图 4-1.\
    \ 模型层类\n\n以下是构成模型层的类的简要描述：\n\n*   `BankAccount`：代表一个单独的银行账户。一个 `BankAccount` 对象可以表示储蓄账户或活期账户。\n\
    *   `Transaction`：代表一笔单独的交易。一个 `Transaction` 对象可以表示资金存入账户或资金从账户转出。\n*   `AccountOwner`：代表拥有银行账户的个人（或实体）。一个账户最多可以有两个所有者。\n\
    \n该应用程序的完整源代码可以通过以下 URL 从 GitHub 匿名下载：\n\n[`https://github.com/asmtechnology/Lesson04.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson04.iOSTesting.2017.Apress.git)\n\
    \n## 创建 Xcode 项目\n\n启动 Xcode 并基于“单视图应用程序”模板创建一个新的 iOS 项目（见图 4-2）。\n\n![A432412_1_En_4_Fig2_HTML.jpg](img/A432412_1_En_4_Fig2_HTML.jpg)\n\
    \n图 4-2. Xcode 项目模板对话框\n\n在创建新项目时使用以下选项（见图 4-3）：\n\n![A432412_1_En_4_Fig3_HTML.jpg](img/A432412_1_En_4_Fig3_HTML.jpg)\n\
    \n图 4-3. Xcode 项目选项对话框\n\n*   产品名称：`BankAccount`\n*   团队：无\n*   组织名称：提供一个合适的名称\n\
    *   组织标识符：提供一个合适的标识符\n*   语言：`Swift`\n*   设备：`iPhone`\n*   使用 Core Data：未选中\n\
    *   包含单元测试：已选中\n*   包含 UI 测试：未选中\n\n注意\n\n即使我们在创建此项目时使用了“单视图应用程序”模板，项目中也不会添加任何用户界面/表示代码。在第\
    \ 6 章中，您将构建一个应用程序来显示银行账户详情以及集合视图中的交易列表。第 6 章中的项目将基于本章创建的文件进行构建。\n\n将项目保存到计算机上的合适位置，然后点击“创建”。由于此项目将包含多个新类，因此最好将类文件放在项目导航器中的适当组下。\n\
    \n在 Xcode 项目导航器中创建一个名为 `Model` 的组。您将在此组中创建特定于模型层的类。\n\n## 构建模型层\n\n我们需要构建三个模型类：\n\
    \n*   `AccountOwner`\n*   `Transaction`\n*   `BankAccount`\n\n这些类将在本章后续部分使用 TDD\
    \ 技术进行构建。\n"
- fmt: "### The `AccountOwner` Class\n\nAn instance of the `AccountOwner` class represents\
