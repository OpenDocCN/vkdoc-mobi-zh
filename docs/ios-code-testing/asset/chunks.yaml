  trans: '

    ### 启动 Xcode Server


    启动 macOS 服务器应用，在侧边栏的 `Services` 部分下，找到 `Xcode` 选项。（见图 9-7。）


    ![A432412_1_En_9_Fig7_HTML.jpg](img/A432412_1_En_9_Fig7_HTML.jpg)


    图 9-7. 启动 Xcode Server


    您可以使用窗口右上角的开关来启动/停止 Xcode Server 进程。默认情况下，macOS 服务器应用提供的所有服务都是关闭的。


    如果这是您首次在电脑上运行 Xcode Server，系统会要求您提供本地电脑上 Xcode 的路径，用于创建构建。如果您尚未安装 Xcode，请退出 macOS
    服务器应用，从 Mac App Store 安装最新版本的 Xcode，然后从中断处继续学习。


    点击 `Choose Xcode…` 按钮，在您的 `Applications` 目录中选择 `Xcode.app` 应用程序。将来，您可以从 Xcode
    server 设置页面选择使用不同版本的 Xcode 来创建构建。


    Xcode Server 在其自己的用户账户中运行。在之前的版本中，这是在 Mac 上创建的一个隐藏用户账户。自 Xcode Server 5.2 版本起，此账户与您系统上的任何其他账户一样，您甚至可以登录此账户。


    当系统要求为 Xcode Server 提供一个账户时（见图 9-8），您可以选择创建一个新账户或使用现有账户。最佳实践是为 Xcode server 保留一个专用的非管理账户，而不要使用您的日常账户。


    ![A432412_1_En_9_Fig8_HTML.jpg](img/A432412_1_En_9_Fig8_HTML.jpg)


    图 9-8. Xcode Server 用户账户


    如果您使用的是单台 Mac 设置，且 Xcode server 与日常开发运行在同一台电脑上，则必须登录为您为 Xcode server 创建的专用用户账户。然后，您可以使用快速用户切换功能，从
    Xcode Server 用户账户切换回您的日常使用账户，并让 Xcode Server 进程在后台继续运行。


    **注意：** Xcode server 将“构建”称为“集成”。


    一旦您为 Xcode server 提供了可用的用户账户，系统将提示您以该用户身份登录（见图 9-9）。


    ![A432412_1_En_9_Fig9_HTML.jpg](img/A432412_1_En_9_Fig9_HTML.jpg)


    图 9-9. 使用专用用户账户登录


    您可以选择立即登录，或稍后登录。如果您选择稍后登录，可以通过多种方式完成，包括使用 Xcode Server 配置页面内置的 `Login` 选项（见图 9-10）。


    ![A432412_1_En_9_Fig10_HTML.jpg](img/A432412_1_En_9_Fig10_HTML.jpg)


    图 9-10. Xcode Server 配置页面内的登录选项


    **注意：** 您无需登录指定账户，仍可继续配置 Xcode server。但是，在登录您提供的专用用户账户之前，您将无法进行集成。


    ### 配置 Xcode Server


    Xcode Server 允许您通过设置页面配置各种参数，包括：


    -   用于集成的 Xcode 版本。

    -   开发者团队

    -   权限

    -   代码仓库


    可以通过 `View` ➤ `Xcode` 菜单项访问此设置页面。该设置页面有两个标签页，分别标记为 `Settings` 和 `Repositories`（见图
    9-11）。


    ![A432412_1_En_9_Fig11_HTML.jpg](img/A432412_1_En_9_Fig11_HTML.jpg)


    图 9-11. Xcode Server 配置页面


    Xcode 版本、权限和开发者团队可以在标记为 `Settings` 的标签页下进行配置，而代码仓库可以在标记为 `Repositories` 的标签页下进行配置。


    ### Xcode 版本


    要更改用于后续集成的 Xcode 版本，请点击 Xcode 服务设置页面中的 `Choose Xcode…` 按钮，然后选择与您要使用的 Xcode 版本对应的
    `.app` 文件。


    ### Apple 开发者团队


    如果您想使用 Xcode Server 在配置好的开发设备上部署构建并运行测试，则需要将服务器添加到您的 Apple 开发者账户所用的某个开发者团队中。


    将服务器添加到开发者团队，将允许 Xcode Server 下载为您的设备准备构建所需的配置文件（provisioning profiles）和签名证书（signing
    certificates）。


    要将服务器添加到您的开发者团队，请点击 Xcode 服务设置页面中的 `Add Team…` 按钮（见图 9-12）。


    ![A432412_1_En_9_Fig12_HTML.jpg](img/A432412_1_En_9_Fig12_HTML.jpg)


    图 9-12. 将 Xcode Server 添加到您的 Apple 开发者账户


    系统将要求您登录 iOS 开发者账户并选择一个开发者团队。输入您的 iOS 开发者账户凭据，然后点击 `Sign-In`（见图 9-13）。


    ![A432412_1_En_9_Fig13_HTML.jpg](img/A432412_1_En_9_Fig13_HTML.jpg)


    图 9-13. 使用 Apple 开发者凭据登录


    ### 开发设备


    在将开发者团队添加到 Xcode server 后，您可以将已配置的开发设备连接到运行 Xcode Server 的 Mac。此设备可用于运行自动化测试。您将在“开发设备”列表中看到所有已连接的设备（见图
    9-14）。如果断开设备与 Mac 的连接，它将从此列表中移除。


    ![A432412_1_En_9_Fig14_HTML.jpg](img/A432412_1_En_9_Fig14_HTML.jpg)


    图 9-14. 已连接的设备在“开发设备”部分可见


    ### 代码仓库


    Xcode Server 要求您将其连接到一个或多个源代码仓库。这些代码仓库本身可以远程托管，也可以在 Xcode Server 内托管。对于远程托管的代码仓库，Xcode
    Server 支持 Git 和 Subversion；但对于本地托管的代码仓库，Xcode Server 仅支持 Git。


    如果您的代码仓库托管在远程服务器（例如 BitBucket 或 GitHub）上，则无需使用代码仓库标签页中的任何选项。相反，您需要在开发机的 Xcode
    中配置适当的访问凭据，并且在从 Xcode 内部在 Xcode server 上创建构建作业（也称为 Bot）时，也需要提供这些凭据。


    如果您的代码仓库没有托管在远程服务器上，您可以使用代码仓库标签页中的选项来创建将在 Xcode Server 内托管的 Git 代码仓库。

    '
- fmt: '### Creating a New Git Repository on Xcode Server


    Figure [9-15](#A432412_1_En_9_Chapter.html#Fig15) depicts the options available
    in the repositories tab. On this tab you can manage the repositories that are
    hosted within Xcode Server, configure security protocols, as well as set up a
    list of users who can access these repositories.


    ![A432412_1_En_9_Fig15_HTML.jpg](A432412_1_En_9_Fig15_HTML.jpg)


    Figure 9-15. Xcode Server Repositories Tab


    To configure the security protocols that can be used to authenticate users connecting
    to your repositories hosted within Xcode server, click on the “Edit Repository
    Access…” button. You will be presented with a dialog box that asks you to select
    the protocols to allow. Choices available are `HTTPS` and `SSH` (see Figure [9-16](#A432412_1_En_9_Chapter.html#Fig16)).


    ![A432412_1_En_9_Fig16_HTML.jpg](A432412_1_En_9_Fig16_HTML.jpg)


    Figure 9-16. Security Protocol Settings for Repositories Hosted Within Xcode Server


    To configure the list of users who can access your repositories hosted within
    Xcode Server, click on “Edit Repository Creators.” By default, any users who have
    logged in to Xcode Server from within Xcode can access your repositories and create
    Bots.


    Users who wish to connect to these repositories will need to add account credentials
    into Xcode on their development Mac so that Xocde can access these repositories.
    This is typically done using the Account preferences section within Xcode and
    is covered later in this chapter.


    To create a new repository, click on the Add (+) button under the list of repositories
    (see Figure [9-17](#A432412_1_En_9_Chapter.html#Fig17)).


    ![A432412_1_En_9_Fig17_HTML.jpg](A432412_1_En_9_Fig17_HTML.jpg)


    Figure 9-17. Creating a New Repository Within Xcode Server


    Type in the name of the repository, and this name will appear in the Hosted Repositories
    list and will be part of the access URL.


    Click the Edit button to specify the users that will be able to access the repository
    via `SSH`. To enable `HTTPS` access, select the “Allow logged in users to read
    and write” check box.


    Click on Create to finish creating the new Git repository. The new repository
    will appear in the list of repositories. To make changes to who can access the
    repository, select the repository from the list of repositories, and click on
    the Edit button located below the list (see Figure [9-18](#A432412_1_En_9_Chapter.html#Fig18)).


    ![A432412_1_En_9_Fig18_HTML.jpg](A432412_1_En_9_Fig18_HTML.jpg)


    Figure 9-18. Edit Who Can Access an Existing Repository


    ## Configuring Xcode


    In this section we will look at connecting Xcode on a development Mac to an instance
    of Xcode server and cloning repositories.


    ### Adding Xcode Server Credentials to Xcode


    To access Git repositories hosted on Xcode Server on your development Mac, and
    to create bots on Xcode Server, you need to connect Xcode on your development
    Mac to Xcode Server.


    Launch Xcode on your development Mac and select the `Xcode ➤ Preferences` menu
    item. Switch to the Accounts tab (see Figure [9-19](#A432412_1_En_9_Chapter.html#Fig19)).


    ![A432412_1_En_9_Fig19_HTML.jpg](A432412_1_En_9_Fig19_HTML.jpg)


    Figure 9-19. Xcode Accounts Preferences


    This tab lists your development accounts, remotely hosted repositories, as well
    as Xcode server instances. To connect Xcode to your Xcode Server instance, click
    on the Add (+) button at the bottom of the list and select “Add Server…” from
    the list of options.


    Choose a Xcode Server instance from the list of servers and click on Add (see
    Figure [9-20](#A432412_1_En_9_Chapter.html#Fig20)).


    ![A432412_1_En_9_Fig20_HTML.jpg](A432412_1_En_9_Fig20_HTML.jpg)


    Figure 9-20. Add a Bookmark to a Remote Xcode Server Instance in Xcode


    When prompted for access credentials, type user name and password (this should
    have been provided to you by your Xcode Server administrator).


    You will now see the build server listed under the Servers section of the Accounts
    tab (see Figure [9-21](#A432412_1_En_9_Chapter.html#Fig21)).


    ![A432412_1_En_9_Fig21_HTML.jpg](A432412_1_En_9_Fig21_HTML.jpg)


    Figure 9-21. Xcode Accounts Page Showing Xcode Server Instance


    ### Create a New Xcode Project and Host Its Repository on Xcode Server


    Once you have added credentials into Xcode to access Xcode Server, you can host
    the repository for every new project you create on the server. To do this, enable
    the “Source control” check box when you are asked to select a location for the
    new project, and select the name of the server from the list of available options
    (see Figure [9-22](#A432412_1_En_9_Chapter.html#Fig22)).


    ![A432412_1_En_9_Fig22_HTML.jpg](A432412_1_En_9_Fig22_HTML.jpg)


    Figure 9-22. Hosting the Repository for a new Project on Xcode Server


    If the server doesn’t appear in the list, ensure you have added the server to
    Xcode, and that your user account has permission to create a repository on Xcode
    Server.


    ### Clone an Existing Local Repository to Xcode Server


    If you have an existing Xcode project within a Git repository on your development
    Mac and want to clone the repository to Xcode server, open the Xcode project and
    click on the `Source Control ➤ YourProjectName ➤ Configure` menu item. `YourProjectName`
    is a placeholder for the name of your Xcode project (see Figure [9-23](#A432412_1_En_9_Chapter.html#Fig23)).


    ![A432412_1_En_9_Fig23_HTML.jpg](A432412_1_En_9_Fig23_HTML.jpg)


    Figure 9-23. Configuring Source Control Options for an Existing Xcode Project


    Switch to the Remotes tab and click on the Add (+) button and select “Create New
    Remote” from the context menu (see Figure [9-24](#A432412_1_En_9_Chapter.html#Fig24)).


    ![A432412_1_En_9_Fig24_HTML.jpg](A432412_1_En_9_Fig24_HTML.jpg)


    Figure 9-24. Repository Configuration Dialog


    Select a running instance of Xcode Server, type a name that helps you identify
    the remote repository, and click on Create.'
  raw: '### Creating a New Git Repository on Xcode Server


    Figure [9-15](#A432412_1_En_9_Chapter.html#Fig15) depicts the options available
