    ## Advantages and Disadvantages of BDD


    After having being introduced to behavior-driven development, you might be wondering
    whether BDD is a replacement for TDD. Both TDD and BDD have their own uses: test-driven
    development focuses on how your code is structured and operates at a lower level
    than BDD. Behavior-driven development helps ensure that the code you are writing
    fulfills business objectives.


    As with any technique, behavior-driven development has its own advantages and
    disadvantages. Some of the advantages of BDD over TDD are the following:


    - Tests are more verbose.

    - Each passing test proves that the product is closer to what the customer wants.

    - BDD tests are useful to business analysts and product owners as well as developers.

    - BDD tests are not as fragile as TDD tests. If you change the manner in which
    a scenario is implemented, BDD tests are less likely to break.


    Some of the disadvantages of BDD are the following:


    - BDD requires product owners, testers, and business analysts to buy into the
    process. All too often teams start out with good intentions, but after a few weeks
    the business loses interest in writing specifications, and it becomes the responsibility
    to the developer to write the scenarios as well as the code to make those scenarios
    pass.

    - User requirements change as the project evolves, and BDD requires that user
    requirements are documented in a usable format before the developers start developing.
    For this to work, the project has a well-defined road map of upcoming features.
    Having up-front, well-defined requirements before development does not necessarily
    mean that the project has to follow the waterfall model. BDD can be used in Agile
    Scrum projects, but the business will need to commit to making sure those requirements
    for all the stories that are picked up in a sprint are well defined before the
    sprint begins.

    - BDD works best in a team where iterative development is practiced.

    - BDD requires collaboration between the business and the development team. The
    business has to factor the technical constraints of the current system before
    creating new user stories. All too often the business analysts and product owners
    work in their own camps and hand over their requirements to the developers in
    a sprint planning session.


