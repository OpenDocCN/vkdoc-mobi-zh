    a reference to this new instance in the mockLoginViewController private variable.
    The code in LoginViewModelTests.swift should now resemble Listing [5-6](#A432412_1_En_5_Chapter.html#Par89).


    ```

    import XCTest

    class LoginViewModelTests: XCTestCase {

    fileprivate var mockLoginViewController:MockLoginViewController?

    override func setUp() {

    super.setUp()

    mockLoginViewController = MockLoginViewController()

    }

    override func tearDown() {

    super.tearDown()

    }

    }

    // MARK: initialization tests

    extension LoginViewModelTests {

    func testInit_ValidView_InstantiatesObject() {

    let viewModel = LoginViewModel(view:mockLoginViewController!)

    XCTAssertNotNil(viewModel)

    }

    }

    Listing 5-6.

    LoginViewModelTests.swift

    ```


    Save the file and run all unit tests using the Product ➤ Test menu item. You will
    see that the unit test you have added in LoginViewModelTests.swift has passed
    (see Figure [5-14](#A432412_1_En_5_Chapter.html#Fig14)).


    ![A432412_1_En_5_Fig14_HTML.jpg](A432412_1_En_5_Fig14_HTML.jpg)


    Figure 5-14.


    Basic tests for the Login View Model


    The view model test created so far verifies that a view model can be instantiated;
    and in order to make this test pass you created a view model class, a protocol,
    and a mock class.


    The next test you will write will verify that the view model saves a reference
    to the view that was injected into the initializer, in an instance variable. Create
    a new unit test method called `testInit_ValidView_CopiesViewToIvar()` under the
    previous test method and add the following code to the method body:


    ```

    func testInit_ValidView_CopiesViewToIvar() {

    let viewModel = LoginViewModel(view:mockLoginViewController!)

    if let lhs = mockLoginViewController, let rhs = viewModel.view as? MockLoginViewController
    {

    XCTAssertTrue(lhs === rhs)

    }

    }

    ```


    Save the file and run all unit tests using the Product ➤ Test menu item. You will
    notice that all tests written so far continue to pass.


    ### View Model – View Controller Binding


    The login view model we have built so far does not do anything useful. You can
    instantiate it, but it has no methods that can be called. To work out what methods
    should be added to the view model, let us take a look at the user interface of
    the login view controller (see Figure [5-15](#A432412_1_En_5_Chapter.html#Fig15)).


    ![A432412_1_En_5_Fig15_HTML.jpg](A432412_1_En_5_Fig15_HTML.jpg)


    Figure 5-15.


    User Interface of the Login View Controller


    You can see that the user interface of the login view controller consists of a
    couple of text fields and buttons. A user can use the text fields to specify his
    credentials and tap on the Login button, or the user can tap on the Create account
    button to go to a different screen of the app.


    In order to make the view model useful for the view controller, you need to add
    methods to the view model that can be called from various life-cycle methods and
    event handlers in the view controller. Table [5-5](#A432412_1_En_5_Chapter.html#Tab5)
    lists the methods we will add to the LoginViewModel class.


    Table 5-5.


    LoginViewModel Methods


    | Item | Description |

    | --- | --- |

    | `func performInitialViewSetup()` | Should be called from the viewDidLoad() method
    of the view controller class. Resets user interface elements to their initial
    states. |

    | `func login(userName:String?, password:String?)` | Called by the login view
    controller when the user taps on the Login button. Creates a LoginModel instance
    and displays an alert to the user. |

    | `func userNameDidEndOnExit()` | Called by the login view controller when the
    didEndOnExit event is received by the user name text field. Dismisses the keyboard
    if it was visible. |

    | `func passwordDidEndOnExit()` | Called by the login view controller when the
    didEndOnExit event is received by the password text field. Dismisses the keyboard
    if it was visible. |

    | `func userNameUpdated(_ value:String?)` | Called by the login view controller
    as the user updates the text in the user name field. Calls a validator object
    to check if the text in the user name field is valid. If both the user name and
    password fields are valid, then the Login button will be enabled. |

    | `func passwordUpdated(_ value:String?)` | Called by the login view controller
    as the user updates the text in the user name field. Calls a validator object
    to check if the text in the password field is valid. If both the user name and
    password fields are valid, then the Login button will be enabled. |


    The view model will also need to be able to update UI elements on the view controller
    to reflect changes in the application state or model data. Since the view model
    uses a protocol to bind with the view controller, you will need to add methods
    to the protocol that will allow the view model to request the view controller
    to update user interface elements. Table [5-6](#A432412_1_En_5_Chapter.html#Tab6)
    lists the methods that will be added to LoginViewControllerProtocol.


    Table 5-6.


    LoginViewControllerProtocol Methods


    | Item | Description |

    | --- | --- |

    | `func clearUserNameField()` | Called by the view model. The view controller
    should clear the contents of the user name field. |

    | `func clearPasswordField()` | Called by the view model. The view controller
    should clear the contents of the password field. |

    | `func enableLoginButton(_ status:Bool)` | Called by the view model. The view
    controller should enable or disable the Login button depending on the value of
    status. |

    | `func enableCreateAccountButton(_ status:Bool)` | Called by the view model.
    The view controller should enable or disable the Create Account button depending
    on the value of status. |

    | `func hideKeyboard()` | Called by the view model. The view controller should
    hide the keyboard if it is visible. |


    You will now add the desired methods to the LoginViewModel class using TDD techniques
    .'
