    \ : LoginViewControllerProtocol {\n}\n```\n\nOpen the `LoginViewModelTests.swift`\
    \ file and update the `setUp()` method to resemble the following:\n\n```swift\n\
    override func setUp() {\n    super.setUp()\n    mockLoginViewController = MockLoginViewController()\n\
    }\n```"
  raw: '### The SignupModel Class


    The SignupModel class contains properties that store the information that the
    user has entered into the fields of the create account screen. When the user taps
    the create button on the user interface, the view model will build a SignupModel
    instance and pass this instance to a specialized controller class that contains
    signup logic. The specialized signup controller class may perhaps connect to back-end
    services and create a new account on a server-side database using the credentials
    provided. Table [5-4](#A432412_1_En_5_Chapter.html#Tab4) lists the desired properties
    and methods of the SignupModel class.


    Table 5-4.


    SignupModel Properties and Methods


    | Item | Type | Description |

    | --- | --- | --- |

    | `var userName:String` | Variable | Should be between 2 and 10 characters in
    length, with no numbers or white space. Underscores are allowed. Special characters
    are not permitted. |

    | `var password:String` | Variable | Should be between 2 and 10 characters in
    length, with no white space. |

    | `var emailAddress:String` | Variable | Must be a valid email address. |

    | `init?(userName:String, password:String, emailAddress:String)` | Method | Allows
    other code to create SignupModel instances. |


    The approach to developing the SignupModel class will be very similar to the model
    layer classes that were developed in Chapter [4](#A432412_1_En_4_Chapter.html).
    You will need to create tests that test verify the behavior of the initializer
    and any validator objects .


    The complete SignupModel class is provided in Listing [5-4](#A432412_1_En_5_Chapter.html#Par67).
    If you would like to examine the code for the tests and the validator objects,
    download the finished project anonymously from github using the following URL:


    [`https://github.com/asmtechnology/Lesson05.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson05.iOSTesting.2017.Apress.git)


    ```

    import Foundation

    class SignupModel: NSObject {

    var userName:String

    var password:String

    var emailAddress:String

    init?(userName:String, password:String, emailAddress:String,

    userNameValidator:UserNameValidator? = nil,

    passwordValidator:PasswordValidator? = nil,

    emailAddressValidator:EmailAddressValidator? = nil) {

    let validator1 = userNameValidator ?? UserNameValidator()

    if validator1.validate(userName) == false {

    return nil

    }

    let validator2 = passwordValidator ?? PasswordValidator()

    if validator2.validate(password) == false {

    return nil

    }

    let validator3 = emailAddressValidator ?? EmailAddressValidator()

    if validator3.validate(emailAddress) == false {

    return nil

    }

    self.userName = userName

    self.password = password

    self.emailAddress = emailAddress

    super.init()

    }

    }

    Listing 5-4.

    SignupModel.swift

    ```


    ## Building the ViewModel Layer


    There are two view model classes that we need to build - LoginViewModel and SignupViewModel.
    These correspond to the LoginViewController and SignupViewController classes respectively.
    The view model will hold a strong reference to model layer objects and use protocols
    to establish an interface through which it can communicate with the view controller.


    ### The LoginViewModel Class


    The LoginViewModel class represents the view model between the LoginViewController
    class and the LoginModel class.


    We will adopt a TDD approach to developing the login view model class. Create
    a new iOS Unit Test Case class called LoginViewModelTests under the LoginFormTests
    group of the project explorer (see Figure [5-11](#A432412_1_En_5_Chapter.html#Fig11)).


    ![A432412_1_En_5_Fig11_HTML.jpg](A432412_1_En_5_Fig11_HTML.jpg)


    Figure 5-11.


    Xcode Project Template Dialog Box


    Select the LoginViewModelTests.swift file in the project explorer and use the
    file inspector to ensure that the file is included in the LoginFormTests target
    and not the LoginForm target (see Figure [5-12](#A432412_1_En_5_Chapter.html#Fig12)).
    If the file inspector is not visible, View ➤ Utilities ➤ Show File Inspector menu
    item.


    ![A432412_1_En_5_Fig12_HTML.jpg](A432412_1_En_5_Fig12_HTML.jpg)


    Figure 5-12.


    LoginViewModelTests Target Membership


    Delete the testExample and testPerformanceExample methods from LoginViewModelTests.swift.
    Create a new unit test method called `testInit_ValidView_InstantiatesObject()`in
    a separate extension and add the following code to the method body:


    ```

    func testInit_ValidView_InstantiatesObject() {

    let viewModel = LoginViewModel(view:mockLoginViewController!)

    XCTAssertNotNil(viewModel)

    }

    ```


    Add the following variable declaration to the top of the LoginViewModelTests class:


    ```

    fileprivate var mockLoginViewController:MockLoginViewController?

    ```


    You will notice that this code fails to compile; that is because the LoginViewModel
    class has not been created yet. To fix this failure, create a new class called
    LoginViewModel under the ViewModel group in the project navigator. Ensure the
    LoginViewModel class is a member of both the LoginForm and LoginFormTests target.
    Update the contents of the LoginViewModel.swift file to match Listing [5-5](#A432412_1_En_5_Chapter.html#Par77).


    ```

    import Foundation

    class LoginViewModel: NSObject {

    weak var view:LoginViewControllerProtocol?

    init(view:LoginViewControllerProtocol) {

    super.init()

    self.view = view

    }

    }

    Listing 5-5.

    LoginViewModel.swift

    ```


    The initializer for the LoginViewModel class takes a reference to the view. Note
    that the type of the view parameter is LoginViewControllerProtocol and not LoginViewController.


    The view model makes use of a protocol to create a loosely coupled relationship
    with the view. As far as the view model is concerned, any class that implements
    the LoginViewControllerProtocol protocol can be used as the view. This loose coupling
    with the view makes the view model easy to instantiate in a unit test, independent
    of a view controller.


    Create a new Swift file called LoginViewControllerProtocol (see Figure [5-13](#A432412_1_En_5_Chapter.html#Fig13))
    under the Protocols group of the project explorer, and ensure the new file is
    a member of both the LoginFormTests and LoginForm targets.


    ![A432412_1_En_5_Fig13_HTML.jpg](A432412_1_En_5_Fig13_HTML.jpg)


    Figure 5-13.


    Xcode File Template Dialog Box


    Update the code in LoginViewControllerProtocol to resemble the following:


    ```

    import Foundation

    protocol LoginViewControllerProtocol : class {

    }

    ```


    Create a new group called Mocks under the LoginFormTests group, and create a new
    Swift class called MockLoginViewController under the Mocks group. Ensure the MockLoginViewController.swift
    file is only a member of the LoginFormTests target.


    Update the code in MockLoginViewController.swift to resemble the following:


    ```

    import UIKit

    import XCTest

    class MockLoginViewController : LoginViewControllerProtocol {

    }

    ```


    Open the LoginViewModelTests.swift file and update the setUp() method to resemble
    the following:


    ```

    override func setUp() {

    super.setUp()

    mockLoginViewController = MockLoginViewController()

    }

    ```'
  trans: "\n### `SignupModel` 类\n\n`SignupModel` 类包含的属性用于存储用户在创建账户界面各字段中输入的信息。当用户点击用户界面上的创建按钮时，视图模型将构建一个\
    \ `SignupModel` 实例，并将其传递给一个包含注册逻辑的专用控制器类。该专用注册控制器类可能会连接到后端服务，并使用所提供的凭据在服务器端数据库中创建一个新账户。表\
    \ 5-4 列出了 `SignupModel` 类的预期属性和方法。\n\n**表 5-4.** `SignupModel` 属性和方法\n\n| 项目 |\
    \ 类型 | 描述 |\n| --- | --- | --- |\n| `var userName:String` | 变量 | 长度应在 2 到 10 个字符之间，不包含数字或空格。允许使用下划线。不允许使用特殊字符。\
    \ |\n| `var password:String` | 变量 | 长度应在 2 到 10 个字符之间，不包含空格。 |\n| `var emailAddress:String`\
    \ | 变量 | 必须是有效的电子邮件地址。 |\n| `init?(userName:String, password:String, emailAddress:String)`\
    \ | 方法 | 允许其他代码创建 `SignupModel` 实例。 |\n\n开发 `SignupModel` 类的方法将与第 4 章中开发的模型层类非常相似。你需要创建测试来验证初始化器和任何验证器对象的行为。\n\
    \n完整的 `SignupModel` 类在代码清单 5-4 中给出。如果你想查看测试和验证器对象的代码，可以使用以下 URL 从 github 匿名下载完成的项目：\n\
    \n[`https://github.com/asmtechnology/Lesson05.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson05.iOSTesting.2017.Apress.git)\n\
    \n```swift\nimport Foundation\nclass SignupModel: NSObject {\n    var userName:String\n\
    \    var password:String\n    var emailAddress:String\n    init?(userName:String,\
    \ password:String, emailAddress:String,\n          userNameValidator:UserNameValidator?\
    \ = nil,\n          passwordValidator:PasswordValidator? = nil,\n          emailAddressValidator:EmailAddressValidator?\
    \ = nil) {\n        let validator1 = userNameValidator ?? UserNameValidator()\n\
    \        if validator1.validate(userName) == false {\n            return nil\n\
    \        }\n        let validator2 = passwordValidator ?? PasswordValidator()\n\
    \        if validator2.validate(password) == false {\n            return nil\n\
    \        }\n        let validator3 = emailAddressValidator ?? EmailAddressValidator()\n\
    \        if validator3.validate(emailAddress) == false {\n            return nil\n\
    \        }\n        self.userName = userName\n        self.password = password\n\
    \        self.emailAddress = emailAddress\n        super.init()\n    }\n}\n```\n\
    **代码清单 5-4.** `SignupModel.swift`\n\n## 构建视图模型层\n\n我们需要构建两个视图模型类 —— `LoginViewModel`\
    \ 和 `SignupViewModel`。它们分别对应 `LoginViewController` 和 `SignupViewController` 类。视图模型将持有对模型层对象的强引用，并使用协议建立接口，通过该接口与视图控制器进行通信。\n\
    \n### `LoginViewModel` 类\n\n`LoginViewModel` 类代表了 `LoginViewController` 类和 `LoginModel`\
    \ 类之间的视图模型。\n\n我们将采用 TDD 方法来开发登录视图模型类。在项目浏览器的 `LoginFormTests` 组下创建一个名为 `LoginViewModelTests`\
    \ 的新 iOS 单元测试用例类（见图 5-11）。\n\n![A432412_1_En_5_Fig11_HTML.jpg](img/A432412_1_En_5_Fig11_HTML.jpg)\n\
    \n**图 5-11.** Xcode 项目模板对话框\n\n在项目浏览器中选择 `LoginViewModelTests.swift` 文件，并使用文件检查器确保该文件包含在\
    \ `LoginFormTests` 目标中，而不是 `LoginForm` 目标中（见图 5-12）。如果文件检查器不可见，请导航至 **View ➤ Utilities\
    \ ➤ Show File Inspector** 菜单项。\n\n![A432412_1_En_5_Fig12_HTML.jpg](img/A432412_1_En_5_Fig12_HTML.jpg)\n\
    \n**图 5-12.** `LoginViewModelTests` 目标成员资格\n\n从 `LoginViewModelTests.swift` 中删除\
    \ `testExample` 和 `testPerformanceExample` 方法。在单独的扩展中创建一个名为 `testInit_ValidView_InstantiatesObject()`\
    \ 的新单元测试方法，并将以下代码添加到方法体中：\n\n```swift\nfunc testInit_ValidView_InstantiatesObject()\
    \ {\n    let viewModel = LoginViewModel(view:mockLoginViewController!)\n    XCTAssertNotNil(viewModel)\n\
    }\n```\n\n将以下变量声明添加到 `LoginViewModelTests` 类的顶部：\n\n```swift\nfileprivate var\
    \ mockLoginViewController:MockLoginViewController?\n```\n\n你会注意到这段代码无法编译；这是因为\
    \ `LoginViewModel` 类尚未创建。要修复此问题，请在项目导航器的 `ViewModel` 组下创建一个名为 `LoginViewModel`\
    \ 的新类。确保 `LoginViewModel` 类同时是 `LoginForm` 和 `LoginFormTests` 目标的成员。将 `LoginViewModel.swift`\
    \ 文件的内容更新为与代码清单 5-5 一致。\n\n```swift\nimport Foundation\nclass LoginViewModel:\
    \ NSObject {\n    weak var view:LoginViewControllerProtocol?\n    init(view:LoginViewControllerProtocol)\
    \ {\n        super.init()\n        self.view = view\n    }\n}\n```\n**代码清单 5-5.**\
    \ `LoginViewModel.swift`\n\n`LoginViewModel` 类的初始化器接受一个对视图的引用。请注意，`view` 参数的类型是\
    \ `LoginViewControllerProtocol`，而不是 `LoginViewController`。\n\n视图模型使用协议与视图建立松散耦合的关系。就视图模型而言，任何实现了\
    \ `LoginViewControllerProtocol` 协议的类都可以用作视图。这种与视图的松散耦合使得视图模型易于在单元测试中实例化，而无需依赖视图控制器。\n\
    \n在项目浏览器的 `Protocols` 组下创建一个名为 `LoginViewControllerProtocol` 的新 Swift 文件（见图 5-13），并确保新文件同时是\
    \ `LoginFormTests` 和 `LoginForm` 目标的成员。\n\n![A432412_1_En_5_Fig13_HTML.jpg](img/A432412_1_En_5_Fig13_HTML.jpg)\n\
    \n**图 5-13.** Xcode 文件模板对话框\n\n将 `LoginViewControllerProtocol` 中的代码更新为类似以下内容：\n\
    \n```swift\nimport Foundation\nprotocol LoginViewControllerProtocol : class {\n\
    }\n```\n\n在 `LoginFormTests` 组下创建一个名为 `Mocks` 的新组，并在 `Mocks` 组下创建一个名为 `MockLoginViewController`\
    \ 的新 Swift 类。确保 `MockLoginViewController.swift` 文件仅是 `LoginFormTests` 目标的成员。\n\
    \n将 `MockLoginViewController.swift` 中的代码更新为类似以下内容：\n\n```swift\nimport UIKit\n\
    import XCTest\nclass MockLoginViewController : LoginViewControllerProtocol {\n\
    }\n```\n\n打开 `LoginViewModelTests.swift` 文件，并将 `setUp()` 方法更新为类似以下内容：\n\n```swift\n\
    override func setUp() {\n    super.setUp()\n    mockLoginViewController = MockLoginViewController()\n\
    }\n```\n"
- fmt: "更新后的`setup()`方法实例化了一个`MockLoginViewController`，并将对这个新实例的引用保存在`mockLoginViewController`私有变量中。`LoginViewModelTests.swift`中的代码现在应类似于清单[5-6](#A432412_1_En_5_Chapter.html#Par89)。\n\
    \n```swift\nimport XCTest\nclass LoginViewModelTests: XCTestCase {\n    fileprivate\
    \ var mockLoginViewController: MockLoginViewController?\n    override func setUp()\
    \ {\n        super.setUp()\n        mockLoginViewController = MockLoginViewController()\n\
    \    }\n    override func tearDown() {\n        super.tearDown()\n    }\n}\n//\
    \ MARK: initialization tests\nextension LoginViewModelTests {\n    func testInit_ValidView_InstantiatesObject()\
    \ {\n        let viewModel = LoginViewModel(view: mockLoginViewController!)\n\
    \        XCTAssertNotNil(viewModel)\n    }\n}\nListing 5-6.\nLoginViewModelTests.swift\n\
    ```\n\n保存文件并通过`Product` ➤ `Test`菜单项运行所有单元测试。你将看到在`LoginViewModelTests.swift`中添加的单元测试已通过（见图[5-14](#A432412_1_En_5_Chapter.html#Fig14)）。\n\
    \n![A432412_1_En_5_Fig14_HTML.jpg](A432412_1_En_5_Fig14_HTML.jpg)\n\nFigure 5-14.\n\
    \nBasic tests for the Login View Model\n\n目前编写的视图模型测试验证了视图模型可以被实例化；为了使这个测试通过，你创建了一个视图模型类、一个协议和一个模拟类。\n\
    \n接下来要编写的测试将验证视图模型在实例变量中保存了注入到初始化器的视图的引用。在前一个测试方法下创建一个名为`testInit_ValidView_CopiesViewToIvar()`的新单元测试方法，并将以下代码添加到方法体中：\n\
    \n```swift\nfunc testInit_ValidView_CopiesViewToIvar() {\n    let viewModel =\
    \ LoginViewModel(view: mockLoginViewController!)\n    if let lhs = mockLoginViewController,\
    \ let rhs = viewModel.view as? MockLoginViewController {\n        XCTAssertTrue(lhs\
    \ === rhs)\n    }\n}\n```\n\n保存文件并通过`Product` ➤ `Test`菜单项运行所有单元测试。你会注意到到目前为止编写的所有测试都继续通过。\n\
    \n### 视图模型 – 视图控制器绑定\n\n我们迄今为止构建的登录视图模型没有做任何有用的事情。你可以实例化它，但它没有任何可调用的方法。为了确定应该向视图模型添加哪些方法，让我们看一下登录视图控制器的用户界面（见图[5-15](#A432412_1_En_5_Chapter.html#Fig15)）。\n\
    \n![A432412_1_En_5_Fig15_HTML.jpg](A432412_1_En_5_Fig15_HTML.jpg)\n\nFigure 5-15.\n\
    \nUser Interface of the Login View Controller\n\n你可以看到登录视图控制器的用户界面由几个文本字段和按钮组成。用户可以使用文本字段输入凭据并点击`Login`按钮，或者用户可以点击`Create\
    \ account`按钮进入应用的不同屏幕。\n\n为了使视图模型对视图控制器有用，你需要向视图模型添加一些方法，这些方法可以在视图控制器的各种生命周期方法和事件处理器中被调用。表[5-5](#A432412_1_En_5_Chapter.html#Tab5)列出了我们将添加到`LoginViewModel`类中的方法。\n\
    \nTable 5-5.\n\nLoginViewModel Methods\n\n| Item | Description |\n| --- | ---\
    \ |\n| `func performInitialViewSetup()` | 应从视图控制器类的`viewDidLoad()`方法中调用。将用户界面元素重置为其初始状态。\
    \ |\n| `func login(userName: String?, password: String?)` | 当用户点击`Login`按钮时，由登录视图控制器调用。创建一个`LoginModel`实例并向用户显示一个提示。\
    \ |\n| `func userNameDidEndOnExit()` | 当用户名字段接收到`didEndOnExit`事件时，由登录视图控制器调用。如果键盘可见，则将其关闭。\
    \ |\n| `func passwordDidEndOnExit()` | 当密码字段接收到`didEndOnExit`事件时，由登录视图控制器调用。如果键盘可见，则将其关闭。\
    \ |\n| `func userNameUpdated(_ value: String?)` | 当用户更新用户名字段的文本时，由登录视图控制器调用。调用一个验证器对象检查用户名字段中的文本是否有效。如果用户名和密码字段都有效，则启用`Login`按钮。\
