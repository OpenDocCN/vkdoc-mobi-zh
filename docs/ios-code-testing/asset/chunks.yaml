    Strictly speaking, LargeViewController.swift still has multiple responsibilities:
    that of managing lifecycle events, and that of updating the user interface. If
    you would like to refactor this class even further, you could use the MV-VM architectural
    pattern to introduce a view model object and move the responsibility of updating
    the user interface to the view model.


    This exercise should give you an idea of how to approach the problem of splitting
    large classes into smaller, more focused, and more manageable classes.


    ## Adding Functionality to an Existing Class


    Refactoring a large class into smaller classes can in some cases involve a significant
    amount of time and effort. As a developer, you may be asked to add features to
    an existing legacy class without being given sufficient time to refactor the class
    first.


    In this section we will look at techniques that will allow you to add functionality
    to existing classes in such a way that you could revisit the class in the future,
    when time permits, and move code into separate helper classes.


    ### Encapsulate Using Classes and Methods


    When adding code to an existing method in a legacy class, it is best to try and
    encapsulate your new code in a new method, and call the new method from the existing
    method. There are a few advantages to this approach:


    *   You could write tests for the new method.

    *   You would not be adding more code to a large untested legacy method.

    *   This technique may require you to inject some of the local variables from
    the source method as dependencies into the new method; this practice helps lay
    the foundation for more refactoring in the future.


    In some situations, the class into which you are planning on adding a new method
    is very complex and is difficult to bring under test. This will typically occur
    when the class has a long list of dependencies and requires several parameters
    to be provided in its initializer.


    In such a situation, you could encapsulate your new code within a method of a
    new class, and create an object of the new class within the legacy method. This
    technique is also known as Break Out Method Object. [¹](#A432412_1_En_8_Chapter.html#Sec99)
    Using new classes in this manner, however, should be treated as a stop-gap arrangement.
    You should aim to revisit the source method/class and refactor it properly in
    the near future. If you do not do so then you risk creating hundreds of small
    classes in your code base with no clearly defined purpose.


    As an example, let us revisit the LargeViewController class from Listing [8-1](#A432412_1_En_8_Chapter.html#Par8).
    Let us assume you were asked to write some code to perform field-level validation
    on the email address of the downloaded user profile and reject profiles that contain
    invalid email addresses. Let us also assume that there are no tests for any of
    the current code in LargeViewController, and that you do not have the time to
    refactor the class.


    One possible approach is to write the validation logic inside the downloadUserProfile()
    function, as shown in boldface in Listing [8-6](#A432412_1_En_8_Chapter.html#Par42).'
