    ### Rename and Replace


    If the change you wish to make to a method is such that it adds either a precondition
    or a post condition, then instead of adding code to the beginning/end of the source
    method, you could rename the source method and create a new method with the same
    name as the source method. You can now add your code to this new method, and make
    a call to the original method from your new method. This technique is also known
    as Wrap Method. [¹](#A432412_1_En_8_Chapter.html#Sec99)


    As an example, consider another scenario where you have been asked to initiate
    the process of downloading credentials only if an Internet connection is available,
    and save the credentials to the system keychain if valid credentials were downloaded.


    These modifications will require you to add some code before you start the download,
    and then some code if the download was successful. If you were to use the strategy
    described in this section, then you would create a new private method called `downloadProfileHelper()`
    and move all the existing code from `downloadProfile()` into `downloadProfileHelper()`.


    As far as the public interface of the class is concerned, there are no changes.
    From the new (currently empty) `downloadProfile()` method, you would still make
    a call to `downloadProfileHelper()`; however, you would surround this call with
    calls to two new methods, one which contains the logic to check for an Internet
    connection, and the other that saves credentials to the keychain.


    Your solution would resemble the following:


    ```

    func downloadUserProfile() {

    if internetConnectionExists() {

    downloadUserProfileHelper()

    saveUserCredentialsToKeychain()

    }

    }

    func internetConnectionExists() -> Bool {

    // code to check if an internet connection exists

    }

    func saveUserCredentialsToKeychain() {

    // code to save user credentials to the keychain

    }

    func downloadUserProfileHelper() {

    // all the code that was previously present in downloadUserProfile

    }

