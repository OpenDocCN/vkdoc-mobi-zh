    \n**图 4-4.** Xcode 文件模板对话框\n\n在项目浏览器中选择 `AccountOwnerTests.swift` 文件，并使用文件检查器确保该文件包含在\
    \ `BankAccountTests` 目标中，而非 `BankAccount` 目标中（见图 4-5）。如果文件检查器不可见，请使用 **View ➤\
    \ Utilities ➤ Show File Inspector** 菜单项。\n\n![A432412_1_En_4_Fig5_HTML.jpg](img/A432412_1_En_4_Fig5_HTML.jpg)\n\
    \n**图 4-5.** `AccountOwnerTests.swift` 的目标成员资格\n\n测试用例文件包含两个空的存根方法，名为 `testExample`\
    \ 和 `testPerformanceExample`。这些方法旨在帮助你开始编写测试。我们不会在本章中使用这些存根方法，因此可以随意删除它们。\n\n\
