    \ data)\n            self.listener?.didDownloadImage()\n        }, failure: {\
    \ (error) in\n            // 不执行任何操作。\n    })\n}\n```\n\n### 创建 `DownloadListenerProtocol.swift`\
    \ 文件\n\n在 Protocols 组下创建一个名为 `DownloadListenerProtocol` 的新文件。确保该文件同时包含在构建目标和测试目标中（参见图\
