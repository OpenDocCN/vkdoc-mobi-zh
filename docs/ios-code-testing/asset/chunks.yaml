    ## Summary


    In this chapter you have created a collection view controller-based application
    using TDD techniques and the MVVM application architecture. The app that you have
    built loads photos from the application bundle and displays the photos in collection
    view cells.


    In the next chapter you will modify this example to download images over a network
    connection, instead of reading them from a property list file.


    # 7. Testing URLSession


    This chapter will examine the process of applying TDD techniques to the networking
    layer of your application. There are various types of networking technologies
    available to iOS developers. This chapter will only cover networking with the
    `URLSession` class. The `URLSession` connection allows you to conveniently download
    resources over HTTP connections.


    This chapter will modify the `PhotoBook` app that was built in Chapter [6](#A432412_1_En_6_Chapter.html).
    The modified version of the app will download images and metadata from a server
    on the Internet, as opposed to using bundled assets and `.plist` files.


    There are no changes to the user interface of the application. Figure [7-1](#A432412_1_En_7_Chapter.html#Fig1)
    depicts the user interface of the finished application (which is the same as the
    `PhotoBook` app at the end of Chapter [6](#A432412_1_En_6_Chapter.html)).


    ![A432412_1_En_7_Fig1_HTML.jpg](A432412_1_En_7_Fig1_HTML.jpg)


    Figure 7-1. User Interface of the `PhotoBook` Application


    The complete source code for the app can be downloaded anonymously from github
    using the following URL:


    [`https://github.com/asmtechnology/Lesson07.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson07.iOSTesting.2017.Apress.git)


    The modified application architecture consists of an additional networking layer
    (see Figure [7-2](#A432412_1_En_7_Chapter.html#Fig2)).


    ![A432412_1_En_7_Fig2_HTML.jpg](A432412_1_En_7_Fig2_HTML.jpg)


    Figure 7-2. Modified Application Architecture with Networking Layer


    A brief description of the layers and the component classes follows:


    *   **Model Layer**: Consists of the `Photo`, `City`, and `Album` classes.

    *   **View Model Layer**: Consists of the `CollectionViewModel`, `CollectionViewCellViewModel`,
    and `CollectionViewSectionHeaderViewModel` classes.

    *   **View/View Controller Layer**: Consists of the `CollectionViewController`,
    `CollectionViewCell`, and `CollectionViewSectionHeader` classes.

    *   **Networking Layer**: Consists of the `ServiceController` class, which provides
    convenient methods that can be used to download images and metadata asynchronously
    from back-end RESTful JSON web services.


    ## Strategies for Testing the Networking Layer


    There are two common approaches to testing networking code:


    *   **Asynchronous testing techniques**: These rely on making actual network calls
    to a server and using the `waitForExpectations(timeout)` method of `XCTest` to
    wait a few seconds for the network service to respond.

    *   **Mock/Stub based testing techniques**: These rely on creating mock or stub
    objects that replace HTTP calls altogether.


    The primary drawback of asynchronous testing techniques is the inherent dependency
    on an external component (the web resource). A web-based resource that is temporarily
    unreachable, or a poorer-than-usual connection speed may be all it takes for the
    test to fail. Tests that test networking code and rely on asynchronous testing
    techniques are extremely brittle, take longer to execute, and more often than
    not fail due to a problem with the web service being temporarily unreachable.


    Mock/Stub based techniques do not suffer the drawbacks of asynchronous testing
    techniques, and allow you to create client-side code in parallel with server-side
    development so long as a common web service specification is agreed upon in advance.
    The main drawback with mock/stub based techniques is that they are inherently
    disconnected from the actual web service, the web service could potentially completely
    change, and the tests would still continue to pass because the stubs were not
    updated.


    Testing the network layer is about ensuring that the app calls the correct API
    endpoints with the right parameters, and ensuring that the app can deal with the
    response. This is something that can be easily achieved using mocks/stubs and
    will be the approach taken in this chapter.


