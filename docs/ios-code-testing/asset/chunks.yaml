    \ {\n        bankAccount.withdraw(amount, person)\n        logWidthdrawalForAudit(amount,\
    \ person)\n    }\n}\nfunc deposit(_ amount:Float, _ person:AccountOwner?) -> Void\
    \ {\n    if withinDailyDepositlLimit(amount) {\n        bankAccount.deposit(amount,\
    \ person)\n        logDepositForAudit(amount, person)\n    }\n}\n```\n\n## 使用协议解耦类\n\
    \n在上一节中，我们研究了一些可用于向遗留类添加代码的技术，以便能够为这些新代码编写测试，同时对现有遗留代码的影响最小。\n\n随着时间的推移，当你决定开始为遗留代码编写测试时，你可能会尝试一次为一个类编写单元测试。然而，遗留代码库中的类通常是紧密耦合的，并且无法孤立地实例化单个类。\n\
    \n这种紧密耦合表现为一棵依赖类树，为了实例化你真正感兴趣的类，需要实例化所有这些依赖类。\n\n当你将遗留类引入测试环境时，管理类之间的依赖关系将成为你将面临的最大挑战之一。在本节中，我们将研究如何使用协议来打破遗留代码库中常见的类之间的紧密耦合。\n\
    \n暂时考虑一下 `BankAccount` 类的实例变量，部分内容如下所示：\n\n```\nclass BankAccount: NSObject {\n\
    \    var accountName:String\n    var accountNumber:String\n    var sortingCode:String\n\
    \    var accountType:AccountType\n    var transactions:[Transaction]\n    var\
    \ owners:[AccountOwner]\n    ...\n    ...\n}\n```\n\n`transactions` 和 `owners`\
    \ 变量在该类与 `Transaction` 和 `AccountOwner` 类之间建立了强耦合关系。在不引入其他两个类的情况下，无法在测试中实例化 `BankAccount`。\n\
    \n你可以通过如下使用协议的方式来打破这些类之间的紧密耦合：\n\n1.  创建两个新协议：`TransactionProtocol` 和 `AccountOwnerProtocol`。\n\
    2.  在 `TransactionProtocol` 协议中声明 `Transaction` 类所有的公开方法和公开实例变量。\n3.  在 `AccountOwnerProtocol`\
    \ 协议中声明 `AccountOwner` 类所有的公开方法和公开实例变量。\n4.  修改 `Transaction` 类的声明，使其实现 `TransactionProtocol`\
    \ 协议。\n5.  修改 `AccountOwner` 类的声明，使其实现 `AccountOwnerProtocol` 协议。\n6.  修改 `BankAccount`\
    \ 类的声明，使其使用协议代替具体的类：\n\n```\nclass BankAccount: NSObject {\n    ...\n    ...\n\
    \    var transactions:[TransactionProtocol]\n    var owners:[AccountOwnerProtocol]\n\
    \    ...\n    ...\n}\n```\n\n通过为实例变量使用协议而不是具体的类名，你打破了 `BankAccount` 类先前存在的紧密耦合。现在可以轻松地将\
    \ `BankAccount` 类纳入测试，而无需引入 `Transaction` 和 `AccountOwner` 类。你可以使用存根对象来代替 `Transaction`\
    \ 和 `AccountOwner` 类。\n\n## 使用依赖注入创建更可测试的代码\n\n依赖注入（DI）背后的思想是使类和方法之间的依赖关系更加明确。考虑以下添加到\
    \ `BankAccount` 类中的看似无害的方法，该方法用于提供某个特定时间点的账户余额。\n\n```\nfunc accountBalanceDescription()\
    \ -> String {\n    let dateFormatter = DateFormatter()\n    dateFormatter.dateFormat\
    \ = \"MMMM dd yyyy\"\n    return \"The balance in your account as of \\(dateFormatter.string(from:\n\
    Date())) is \\(accountBalance)\"\n}\n```\n\n这个方法存在两个问题：\n\n1.  每次调用此方法时都会创建一个新的\
    \ `DateFormatter` 实例。这是非常低效的。\n2.  方法签名本身没有任何内容表明该方法会创建一个具有特定日期格式的日期格式化器。\n\n\
    该方法显然依赖于一个 `DateFormatter` 实例，并且这种依赖是隐藏的，因为你需要查看方法的实现才能意识到它的存在。在这种情况下，为了使其更加明确，你可以简单地将日期格式化器作为参数注入到方法中：\n\
    \n```\nfunc accountBalanceDescription(_ dateFormatter:DateFormatter) -> String\
    \ {\n    return \"The balance in your account as of \\(dateFormatter.string(from:\n\
    Date())) is \\(accountBalance)\"\n}\n```\n\n如果隐藏的依赖是资源或类的多个方法之间共享的数据源，那么问题会严重得多。例如，考虑以下一对方法：\n\
    \n```\nfunc deposit(_ amount:Float, _ person:AccountOwner) -> Void {\n    let\
    \ transactionDate = NSDate()\n    if let newTransaction = Transaction(txDescription:\
    \ \"Cash Deposit\",\n                                        date: transactionDate,\n\
    \                                        isIncoming: true,\n                 \
    \                       amount: \"\\(amount)\") {\n        self.transactions.append(newTransaction)\n\
    \        UserDefaults.standard.set(transactionDate,\n                        \
    \          forKey: \"lastDepositDate\")\n    }\n}\nfunc lastDepositDate() -> NSDate?\
    \ {\n    return UserDefaults.standard.object(forKey: \"lastDepositDate\")\n  \
    \      as? NSDate\n}\n```\n\n这些方法的问题在于它们对共享的 `UserDefaults` 实例存在隐藏依赖。这种代码非常难以测试。同样，你可以通过将依赖关系暴露在作为方法输入的参数列表中来打破这些方法与\
    \ `UserDefaults` 类之间的紧密耦合：\n\n```\nfunc deposit(_ amount:Float, _ person:AccountOwner?,\n\
    \             _ defaults:UserDefaults) -> Void {\n    let transactionDate = NSDate()\n\
    \    if let newTransaction = Transaction(txDescription: \"Cash Deposit\",\n  \
    \                                      date: transactionDate,\n              \
    \                          isIncoming: true,\n                               \
    \         amount: \"\\(amount)\") {\n        self.transactions.append(newTransaction)\n\
    \        defaults.set(transactionDate, forKey: \"lastDepositDate\")\n    }\n}\n\
    func lastDepositDate(_ defaults:UserDefaults) -> NSDate? {\n    return defaults.object(forKey:\
    \ \"lastDepositDate\") as? NSDate\n}\n```\n\n然而，这个方案给我们带来了一个新问题——这两个方法旨在访问同一个\
    \ `UserDefaults` 实例。通过将 `UserDefaults` 实例暴露在参数列表中，你现在允许用户可能将不同的 `UserDefaults`\
    \ 实例注入到这些方法中。\n\n在这种情况下，更好的解决方案是将 `UserDefaults` 实例设置为同时包含这两个方法的类的实例变量，并且不在方法签名中暴露\
    \ `UserDefaults` 对象：\n\n```\nclass BankAccount: NSObject {\n    var defaults:UserDefaults?\n\
    \    ...\n    ...\n    ...\n    func deposit(_ amount:Float, _ person:AccountOwner?)\
    \ -> Void {\n        let transactionDate = NSDate()\n        if let newTransaction\
    \ = Transaction(txDescription: \"Cash Deposit\",\n                           \
    \                 date: transactionDate,\n                                   \
    \         isIncoming: true,\n                                            amount:\
    \ \"\\(amount)\") {\n            self.transactions.append(newTransaction)\n  \
    \          self.defaults?.set(transactionDate, forKey: \"lastDepositDate\")\n\
    \        }\n    }\n    func lastDepositDate() -> NSDate? {\n        return self.defaults?.object(forKey:\
    \ \"lastDepositDate\") as? NSDate\n    }\n    ...\n    ...\n    ...\n}\n```\n\n\
    明确依赖关系会导致对象之间的耦合更松散，并使隔离测试方法变得更容易。\n"
- fmt: '# Summary


    In this chapter you have looked at different ways to refactor legacy code, or
    add well-tested code to a legacy code base. You have learned to split large classes
    into smaller classes using the Single Responsibility Principle and encapsulate
    new code into methods or new classes.


    You have also learned to use protocols as a way to decouple classes, use the decorator
    pattern, and inject dependencies to create more testable code.


    ## Note


    1. Refactoring Legacy Code, Michael C. Feathers, Prentice Hall Professional Technical
    Reference. ISBN 0-13-117705-2.


    # Continuous Integration


    Continuous Integration (CI) is an approach to software development that requires
    developers to push their code into a shared repository frequently, triggering
    an automated test and build cycle on a dedicated build computer. Build cycles
    can be triggered either periodically or after each code push.


    When suites of unit (or user interface) tests are included in the build cycle,
    a CI system will only produce a build if all the tests pass. Failing tests usually
    send out email notifications to all members of the development team.


    While a CI system does not mandate having a suite of automated tests run before
    as part of the build process, the key advantage to having the tests is the ability
    to catch issues early. If a developer on the team makes a change and the build
    breaks immediately after he pushes his change to the repository, chances are there
    is something in the files pushed that broke the build.


    When a build is created successfully by a CI system, the build is stored on the
    CI system and is available for team members to download. Testers can always get
    the latest build straight from the CI system.


    For a CI system to work, developers on the team must agree to the following principles:


    - Push code frequently to the repository.

    - Do Not push broken code to the repository.

    - Do Not push to the repository before running a set of tests on their development
    machines.


    Apple provides their own CI system called Xcode server, which integrates seamlessly
    with the Xcode development environment. Xcode server is part of macOS Server,
    and it is not installed automatically when you install Xcode. To use Xcode Server,
    you need to install and configure both the macOS Server application and Xcode
    on a Mac.


    ## Note


    A continuous integration workflow typically has developers use development Macs
    and a separate dedicated Mac called the build server. The build server has both
    Xcode installed as well as Xcode Server on it. The build computer can also host
    your source repositories, or it can connect to remote repositories hosted on GitHub/BitBucket.
    If you do not have a dedicated build computer, you can install the macOS Server
    app on your development Mac.


    ## Installing macOS Server


    Installing the macOS server is a straightforward process. As mentioned earlier
    in this chapter, it is quite common for companies to use a dedicated Mac on the
    network as the continuous integration server. The instructions in this chapter
    are agnostic to the Mac on which you install macOS server.


    ## Note


    Before you install macOS server on your Mac, you must ensure the following:


    - You have the latest version of Xcode installed on the Mac.

    - You have downloaded and installed relevant provisioning profiles, simulators,
    and certificates.

    - Have administrator credentials for the Mac.

    - Have an iTunes account (for the Mac App Store).

    - Have credentials to access a Git repository where your source code is staged.


    To begin the installation process on the Mac on which you intend to use Xcode
    server, locate the macOS Server application in the Mac App Store and click Install
    (see Figure 9-1).


    ![A432412_1_En_9_Fig1_HTML.jpg](A432412_1_En_9_Fig1_HTML.jpg)


    Figure 9-1. macOS Server on the Mac App Store


    ### Launching macOS Server


    Once macOS server has been installed on your Mac, launch it by launching the `Server.app`
    application from your Applications directory, or typing `Server` in spotlight,
    or clicking on the Launchpad icon in the dock and clicking on `Server`. The first
    time you launch the macOS server application, you will be asked to configure it
    (see Figure 9-2).


    ![A432412_1_En_9_Fig2_HTML.jpg](A432412_1_En_9_Fig2_HTML.jpg)


    Figure 9-2. macOS Server Configuration Screen


    Clicking on Continue will ask you to accept the terms of a license agreement.
    Once you have accepted the license agreement, you will then be prompted to provide
    credentials for an Administrator account on the Mac. Once appropriate credentials
    are provided, macOS server will take a few minutes to install and configure various
    services on the Mac (See Figure 9-3).


    ![A432412_1_En_9_Fig3_HTML.jpg](A432412_1_En_9_Fig3_HTML.jpg)


    Figure 9-3. macOS Server Set Up Procedure


    On subsequent launches, you will be asked to select a server instance to administer
    (see Figure 9-4). If you have installed macOS Server on both development Macs
    as well as a dedicated build Mac, then you can choose to administer the local
    server instance on the development Mac, or the server instance on the build Mac.
    Select the appropriate option and click Continue.


    ![A432412_1_En_9_Fig4_HTML.jpg](A432412_1_En_9_Fig4_HTML.jpg)


    Figure 9-4. Choose a Server Instance to Administer


    You can administer remote Macs only if the remote Mac has macOS Server installed
    and the `Using Server app on a remote computer` option is enabled in the settings
    tab of the Server app on the remote computer. (See Figure 9-5.)


    ![A432412_1_En_9_Fig5_HTML.jpg](A432412_1_En_9_Fig5_HTML.jpg)


    Figure 9-5. Settings Required to Administer a macOS Server Instance Remotely


    ### Setting Up Access for Team Members


    If you are running macOS Server on a dedicated Mac, you should create user accounts
    to allow other users on other Macs to connect to the server and access available
    services.


    Click on Users under the Accounts section in the sidebar (see Figure 9-6). This
    will bring up a list of users who can access the macOS Server. Use the Add (`+`)
    button to create accounts for other Mac users on your network. The credentials
    you create here will be used by other users to connect to this server instance
    from their Macs, and are not related to the credentials they use to log in to
    their Macs.


    ![A432412_1_En_9_Fig6_HTML.jpg](A432412_1_En_9_Fig6_HTML.jpg)


    Figure 9-6. Creating User Accounts for Other Team Members


    Your team members will need to provide these credentials when connecting to Xcode
    Server from Xcode. This is covered later in this chapter under the topic `Adding
    Xcode Server Credentials to Xcode`.'
