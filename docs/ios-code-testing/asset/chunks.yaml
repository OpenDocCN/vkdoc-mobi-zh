    ### 创建登录控制器类


    我们将创建一个基础类来表示登录控制器——在真实场景中，该类会封装用于通过后端服务器对用户进行身份验证的逻辑。


    在创建登录控制器类时，我们不会使用 TDD 技术。在 Xcode 项目导航器中新建一个名为`"Controllers"`的组，然后在该组下新建一个名为`LoginController.swift`的
    Swift 文件。确保该新文件同时属于`LoginForm`和`LoginFormTests`两个目标（见图 5-17）。


