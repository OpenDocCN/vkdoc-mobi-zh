    ```\n\n该测试使用有效字典创建了一个 `Photo` 实例，并访问 `downloadedImage` 实例变量。该测试期望通过尝试访问此实例变量（根据上一个测试，其为\
    \ `nil`），会调用 `downloadImage` 方法。`downloadImage` 方法是一个将添加到 `Photo` 类中的新方法，它将包含使用\
    \ `ServiceController` 实例下载图片的代码。\n\n```\ntestBuildImageDownloadURL_nilImageName_returnsNil()\n\
    ```\n\n该测试在 `imageName` 实例变量为 `nil` 的 `Photo` 实例上调用 `buildImageDownloadURL` 方法。测试期望\
    \ `buildImageDownloadURL` 方法返回 `nil`。`buildImageDownloadURL` 方法是一个将添加到 `Photo`\
    \ 类中的新方法，它将包含根据基础 URL 和图片文件名组成服务器上图片 URL 的代码。\n\n```\ntestBuildImageDownloadURL_validBaseURL_validImageName_returnsCorrectImageURL()\n\
    ```\n\n该测试在 `baseURL` 和 `imageName` 实例变量都有有效值的 `Photo` 实例上调用 `buildImageDownloadURL`\
    \ 方法。测试期望 `buildImageDownloadURL` 方法返回一个格式正确的 URL。`baseURL` 实例变量是 `Photo` 类的新增项，它将包含服务器上存储图片的文件夹的\
    \ URL。\n\n```\ntestDownloadImage_validImageURL_callsFromFetchURLonServiceController_withExpectedURL()\n\
    ```\n\n该测试在 `Photo` 实例上调用 `downloadImage` 方法，并期望在 `ServiceController` 实例上调用 `fetchURL`\
    \ 方法。`downloadImage` 方法是一个将添加到 `Photo` 类中的新方法。`Photo` 类还将有一个新的 `ServiceController`\
    \ 实例变量。\n\n```\ntestDownloadImage_validImageURL_serviceControllerReturnsValidData_updatesImage()\n\
    ```\n\n该测试在 `Photo` 实例上调用 `downloadImage` 方法，并在服务控制器类中模拟了一次成功的下载操作。测试期望 `downloadedImage`\
    \ 实例变量不为 `nil`。通过在 `Photo` 类中注入一个 `MockServiceController` 对象，并将 `MockServiceController`\
    \ 配置为返回模拟响应，来实现服务控制器类中的成功下载操作模拟：\n\n```\nlet bundle = Bundle(for: type(of:self))\n\
    let filePath = bundle.path(forResource: \"bar1\", ofType: \"jpg\")\nlet stubResponseData\
    \ = try! Data(contentsOf: URL(fileURLWithPath: filePath!))\nlet mockServiceController\
    \ = MockServiceController()\nmockServiceController.shouldFailOnFetch = false\n\
    mockServiceController.dataToReturnOnSuccess = stubResponseData\nlet photo = Photo(validPhotoDictionary1)\n\
    photo?.serviceController = mockServiceController\n```\n\n不出所料，这些测试目前还无法编译，因为需要创建几个模拟对象，并且需要向\
    \ `Photo` 类添加几个实例变量和方法。\n\n将 `bar1.jpg` 文件添加到 `TestData` 组中。确保该文件仅包含在测试目标中。你可以从本章随附的可下载代码所提供的资源目录中获取此文件（参见图\
    \ 7-12）。\n\n![A432412_1_En_7_Fig12_HTML.jpg](img/A432412_1_En_7_Fig12_HTML.jpg)\n\
    \n图 7-12.\n\nXcode 文件导入对话框\n"
- fmt: "### Creating the `MockPhoto` Class\n\nCreate a new class under the Mocks group\
    \ called `MockPhoto`. Ensure that this new class is only included in the test\
    \ target. Update the contents of `MockPhoto.swift` to resemble Listing [7-9](#A432412_1_En_7_Chapter.html#Par167).\n\
    \n```\nimport Foundation\nimport XCTest\nclass MockPhoto : Photo {\n    var downloadImageExpectation:\
    \ XCTestExpectation?\n    override func downloadImage() -> Void {\n        downloadImageExpectation?.fulfill()\n\
    \        super.downloadImage()\n    }\n}\n```\n\n### Modifying the `Photo` Class\n\
    \nImport the UIKit framework in the `Photo.swift` file and add the following instance\
    \ variables to the `Photo.swift` class:\n\n```\nweak var listener:DownloadListenerProtocol?\n\
    var serviceController = ServiceController()\nvar baseURL = \"http://www.asmtechnology.com/apress2017/\"\
    \nprivate var image: UIImage?\n```\n\nAdd a computed `UIImage` property to the\
    \ `Photo` class called `downloadedImage` and implement it as follows:\n\n```\n\
    var downloadedImage: UIImage? {\n    get {\n        if image == nil {\n      \
    \      downloadImage()\n        }\n        return image\n    }\n}\n```\n\nAdd\
    \ the following implementation for the `buildImageDownloadURL` method to the `Photo`\
    \ class:\n\n```\nfunc buildImageDownloadURL() -> String? {\n    guard let imageName\
    \ = imageName else {\n        return nil\n    }\n    return \"\\(baseURL)\\(imageName)\"\
    \n}\n```\n\nAdd the following implementation of the `downloadImage` method to\
    \ the `Photo` class:\n\n```\nfunc downloadImage() -> Void {\n    guard let urlToFetch\
    \  =\n        buildImageDownloadURL() else {\n            return\n    }\n    serviceController.fetchFromURL(\n\
    \        urlString: urlToFetch,\n        success: { (data) in\n            self.image\
    \ = UIImage(data: data)\n            self.listener?.didDownloadImage()\n     \
    \   }, failure: { (error) in\n            // do nothing.\n    })\n}\n```\n\n###\
    \ Creating the `DownloadListenerProtocol.swift` File\n\nCreate a new file under\
    \ the Protocols group called `DownloadListenerProtocol`. Ensure the file is included\
    \ in both the build and test targets (see Figure [7-13](#A432412_1_En_7_Chapter.html#Fig13)).\n\
    \n![A432412_1_En_7_Fig13_HTML.jpg](A432412_1_En_7_Fig13_HTML.jpg)\n\nUpdate the\
    \ contents of the `DownloadListenerProtocol.swift` file to match Listing [7-10](#A432412_1_En_7_Chapter.html#Par178).\n\
    \n```\nimport Foundation\nprotocol DownloadListenerProtocol : class {\n    func\
    \ didDownloadImage() -> Void\n}\n```\n\n### Creating the `MockDownloadListener`\
    \ Class\n\nCreate a new class under the Mocks group called `MockDownloadListener`.\
    \ Ensure that this new class is only included in the test target. Update the contents\
    \ of `MockDownloadListener.swift` to resemble Listing [7-11](#A432412_1_En_7_Chapter.html#Par180).\n\
    \n```\nimport Foundation\nimport XCTest\nclass MockDownloadListener : DownloadListenerProtocol\
    \ {\n    var didDownloadImageExpectation:XCTestExpectation?\n    func didDownloadImage()\
    \ -> Void {\n        didDownloadImageExpectation?.fulfill()\n    }\n}\n```\n\n\
    Save the file and use the Test Navigator to run all the tests in the `PhotoTests`\
    \ test case (see Figure [7-14](#A432412_1_En_7_Chapter.html#Fig14)). You should\
    \ see all the tests in `PhotoTests.swift` pass.\n\n![A432412_1_En_7_Fig14_HTML.jpg](A432412_1_En_7_Fig14_HTML.jpg)\n\
    \n## Updating the View Model Layer\n\nBoth the collection view model and the collection\
    \ view cell view model classes require minor updates. As this chapter is about\
    \ testing networking code, this section and the next one will not adopt a test-driven\
    \ approach. Several examples of testing the view model and view controller layers\
    \ have been presented in previous chapters.\n\n### Updates to the Collection View\
    \ Model\n\nEarlier in the chapter, you have commented out two lines from the initializer\
    \ of the `CollectionViewModel.swift` class to get your test code to compile:\n\
    \n```\n//let path = Bundle.main.path(\n//     forResource:\"Albums\", ofType:\
    \ \"plist\")\n//photoAlbum?.load(filePath:path)\n```\n\nThese lines were calling\
    \ the `load` method on the album object with the path to a plist file bundled\
    \ into the application.\n\nThe changes that have been made to the `Album` class\
    \ now allow the album class to download album meta data from a JSON file on the\
    \ Internet.\n\nReplace the initializer of the `CollectionViewModel` class with\
    \ the following updated version:\n\n```\ninit(view:CollectionViewControllerProtocol,\n\
    \     album:Album? = nil) {\n    super.init()\n    self.view = view\n    photoAlbum\
    \ = album ?? Album()\n    photoAlbum?.load(urlString: \"http://www.asmtechnology.com/apress2017/albumlist.json\"\
    ,\n                     success: { () in\n                        DispatchQueue.main.async\
    \ {\n                            self.view?.\n                               \
    \ reloadCollectionView()\n                        }\n        },\n            \
    \         failure: { (error) in\n                        print(error.description)\n\
    \    })\n}\n```\n\nThe updated initializer takes an optional `Album` parameter\
    \ that can be used to inject a mock or stub object by a test if needed and calls\
    \ the new `load()` method on the `Album` object.\n\nAdd the following method declaration\
    \ to the `CollectionViewControllerProtocol.swift` file:\n\n```\nfunc reloadCollectionView()\
    \ -> Void\n```\n\nAlthough we are not writing any new tests to cover this functionality\
    \ in this chapter, we do need to delete obsolete tests and fix broken tests. Most\
    \ of the old tests written for the collection view model will continue to pass;\
    \ however, some will need updating.\n\nThe main reason the tests need updating\
    \ is that the `load()` method of the `photoAlbum` class is now asynchronous, and\
    \ the previous tests were written for a synchronous version of `load()`.\n\nTo\
    \ fix these tests, we will need to inject a modified `Album` instance into the\
    \ `CollectionViewModel` that uses a stubbed service controller instance internally.\
    \ Since this modified album instance is likely to be used in several tests, the\
    \ code to create this instance will be placed in the `setUp()` method of the test\
    \ case class:\n\n```\nlet bundle = Bundle(for: type(of:self))\nlet filePath =\
    \ bundle.path(\n    forResource: \"ValidAlbumList\",\n    ofType: \"json\")\n\
    stubResponseData = try!\n    Data(contentsOf:\n        URL(fileURLWithPath: filePath!))\n\
    stubServiceController = MockServiceController()\nstubServiceController!.shouldFailOnFetch\
    \ =\n    false\nstubServiceController!.dataToReturnOnSuccess =\n    stubResponseData!\n\
    albumWithStubbedServiceController = Album()\nalbumWithStubbedServiceController!.\n\
    \    serviceController = stubServiceController!\n```\n\nThe rest of this section\
    \ lists the tests that need to be updated; the updated versions of these tests\
    \ can be found in the finished project that accompanies this chapter.\n\n- `testNumberOfItemsInSection_ValidSectionIndex_ReturnsExpectedValue()`\n\
    - `testCellViewModel_ValidViewModelNilPhotos_ReturnsNil ()`\n- `testCellViewModel_ValidSectionIndex_DoesNotReturnNil\
    \ ()`\n- `testCellViewModel_ValidSectionIndex_ReturnsViewModelWithExpectedModelObject()`\n\
    - `testHeaderViewModel_ValidSectionIndex_DoesNotReturnNil()`"
  raw: '#### Creating the MockPhoto Class


    Create a new class under the Mocks group called MockPhoto. Ensure that this new
    class is only included in the test target. Update the contents of MockPhoto.swift
    to resemble Listing [7-9](#A432412_1_En_7_Chapter.html#Par167).


    ```

    import Foundation

    import XCTest

    class MockPhoto : Photo {

    var downloadImageExpectation: XCTestExpectation?

    override func downloadImage() -> Void {

    downloadImageExpectation?.fulfill()

    super.downloadImage()

    }

    }

    Listing 7-9.

    MockPhoto.swift

    ```


    #### Modifying the Photo Class


    Import the UIKit framework in the Photo.swift file and add the following instance
    variables to the Photo.swift class:


    ```

    weak var listener:DownloadListenerProtocol?

    var serviceController = ServiceController()

    var baseURL = "http://www.asmtechnology.com/apress2017/"

    private var image: UIImage?

    ```


    Add a computed UIImage property to the Photo class called downloadedImage and
    implement it as follows:


    ```

    var downloadedImage: UIImage? {

    get {

    if image == nil {

    downloadImage()

    }

    return image

    }

    }

    ```


    Add the following implementation for the buildImageDownloadURL method to the Photo
    class:


    ```

    func buildImageDownloadURL() -> String? {

    guard let imageName = imageName else {

    return nil

    }

    return "\(baseURL)\(imageName)"

    }

    ```


    Add the following implementation of the downloadImage method to the Photo class:


    ```

    func downloadImage() -> Void {

    guard let urlToFetch  =

    buildImageDownloadURL() else {

    return

    }

    serviceController.fetchFromURL(

    urlString: urlToFetch,

    success: { (data) in

    self.image = UIImage(data: data)

    self.listener?.didDownloadImage()

    }, failure: { (error) in

    // do nothing.

    })

    }

    ```


    #### Creating the DownloadListenerProtocol.swift File


    Create a new file under the Protocols group called DownloadListenerProtocol .
    Ensure the file is included in both the build and test targets (see Figure [7-13](#A432412_1_En_7_Chapter.html#Fig13)).


    ![A432412_1_En_7_Fig13_HTML.jpg](A432412_1_En_7_Fig13_HTML.jpg)


    Figure 7-13.


    Xcode New File Options Dialog Showing Target Membership Settings for the DownloadListenterProtocol.swift
    File


    Update the contents of the DownloadListenerProtocol.swift file to match Listing
    [7-10](#A432412_1_En_7_Chapter.html#Par178).


    ```

    import Foundation

    protocol DownloadListenerProtocol : class {

    func didDownloadImage() -> Void

    }

    Listing 7-10.

    DownloadListenerProtocol.swift

    ```


    #### Creating the MockDownloadListener Class


    Create a new class under the Mocks group called MockDownloadListener. Ensure that
    this new class is only included in the test target. Update the contents of MockDownloadListener.swift
    to resemble Listing [7-11](#A432412_1_En_7_Chapter.html#Par180).


    ```

    import Foundation

    import XCTest

    class MockDownloadListener : DownloadListenerProtocol {

    var didDownloadImageExpectation:XCTestExpectation?

    func didDownloadImage() -> Void {

    didDownloadImageExpectation?.fulfill()

    }

    }

    Listing 7-11.

    MockDownloadListener.swift

    ```


    Save the file and use the Test Navigator to run all the tests in the PhotoTests
    test case (see Figure [7-14](#A432412_1_En_7_Chapter.html#Fig14)). You should
    see all the tests in PhotoTests.swift pass.


    ![A432412_1_En_7_Fig14_HTML.jpg](A432412_1_En_7_Fig14_HTML.jpg)


    Figure 7-14.


    All Test Cases in PhotoTests.swift Pass


    ## Updating the View Model Layer


    Both the collection view model and the collection view cell view model classes
    require minor updates. As this chapter is about testing networking code, this
    section and the next one will not adopt a test-driven approach. Several examples
    of testing the view model and view controller layers have been presented in previous
    chapters.


    ### Updates to the Collection View Model


    Earlier in the chapter, you have commented out two lines from the initializer
    of the CollectionViewModel.swift class to get your test code to compile:


    ```

    //let path = Bundle.main.path(

    //     forResource:"Albums", ofType: "plist")

    //photoAlbum?.load(filePath:path)

    ```


    These lines were calling the load method on the album object with the path to
    a plist file bundled into the application.


    The changes that have been made to the Album class now allow the album class to
    download album meta data from a JSON file on the Internet.


    Replace the initializer of the CollectionViewModel class with the following updated
    version:


    ```

    init(view:CollectionViewControllerProtocol,

    album:Album? = nil) {

    super.init()

    self.view = view

    photoAlbum = album ?? Album()

    photoAlbum?.load(urlString: "http://www.asmtechnology.com/apress2017/albumlist.json",

    success: { () in

    DispatchQueue.main.async {

    self.view?.

    reloadCollectionView()

    }

    },

    failure: { (error) in

    print(error.description)

    })

    }

    ```


    The updated initializer takes an optional Album parameter that can be used to
    inject a mock or stub object by a test if needed and calls the new load() method
    on the Album object.


    Add the following method declaration to the CollectionViewControllerProtocol.swift
    file:


    ```

    func reloadCollectionView() -> Void

    ```


    Although we are not writing any new tests to cover this functionality in this
    chapter, we do need to delete obsolete tests and fix broken tests. Most of the
    old tests written for the collection view model will continue to pass; however,
    some will need updating.


    The main reason the tests need updating is that the load() method of the photoAlbum
    class is now asynchronous, and the previous tests were written for a synchronous
    version of load().


    To fix these tests, we will need to inject a modified Album instance into the
    CollectionViewModel that uses a stubbed service controller instance internally.
    Since this modified album instance is likely to be used in several tests, the
    code to create this instance will be placed in the setUp() method of the test
    case class:


    ```

    let bundle = Bundle(for: type(of:self))

    let filePath = bundle.path(

    forResource: "ValidAlbumList",

    ofType: "json")

    stubResponseData = try!

    Data(contentsOf:

    URL(fileURLWithPath: filePath!))

    stubServiceController = MockServiceController()

    stubServiceController!.shouldFailOnFetch =

    false

    stubServiceController!.dataToReturnOnSuccess =

    stubResponseData!

    albumWithStubbedServiceController = Album()

    albumWithStubbedServiceController!.

    serviceController = stubServiceController!

    ```


    The rest of this section lists the tests that need to be updated; the updated
    versions of these tests can be found in the finished project that accompanies
    this chapter.


    *   `testNumberOfItemsInSection_ValidSectionIndex_ReturnsExpectedValue()`

    *   `testCellViewModel_ValidViewModelNilPhotos_ReturnsNil ()`

    *   `testCellViewModel_ValidSectionIndex_DoesNotReturnNil ()`

    *   `testCellViewModel_ValidSectionIndex_ReturnsViewModelWithExpectedModelObject()`

    *   `testHeaderViewModel_ValidSectionIndex_DoesNotReturnNil()`'
