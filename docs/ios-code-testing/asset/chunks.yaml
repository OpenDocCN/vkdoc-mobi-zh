    ## The Transaction Class


    A `Transaction` object represents a sum of money either entering or leaving the
    bank account. Table [4-2](#A432412_1_En_4_Chapter.html#Tab2) lists the desired
    member variables and methods of the `Transaction` class:


    Table 4-2. Transaction variables and methods


    | Item | Type | Description |

    | --- | --- | --- |

    | `var txDescription:String` | Variable | Contains a textual description of the
    transaction. Should be up to 20 characters in length, cannot be empty. |

    | `var date:NSDate` | Variable | Represents a valid date. |

    | `var isIncoming:Bool` | Variable | True if the transaction represents a sum
    of money being credited into the account. |

    | `var amount:String` | Variable | Represents the transaction amount. Can only
    include numbers and the period (`.`) character. |

    | `init?(description:String, date:NSDate, isIncoming:Bool, amount:String)` | Method
    | Allows other code to create `Transaction` instances. |


    The approach to developing the `Transaction` class will be very similar to the
    `AccountOwner` class. You will need to create tests that verify the behavior of
    the initializer and any validator objects. In this particular case, validator
    objects will be needed for the description and the amount. There is no need to
    validate the `isIncoming` property. You may wish to add some validation around
    the range of dates that may be allowed.


    The complete `Transaction` class is provided in Listing [4-11](#A432412_1_En_4_Chapter.html#Par141).
