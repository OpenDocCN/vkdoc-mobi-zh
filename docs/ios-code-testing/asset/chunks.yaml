    \ `CollectionViewModel` 对象上调用适当的方法来实例化。\n\n我们尚未讨论集合视图单元格和区段页眉的视图模型。为了首先构建 `CollectionViewModel`\
    \ 对象，您将创建其他视图模型对象的精简版本。构建完 `CollectionViewModel` 类后，您将在本章后续章节中构建其他视图模型对象。\n\n\
