    var name:String

    var red:Float

    var green:Float

    var blue:Float

    var alpha:Float

    ```


    ## Summary


    In this chapter you have learned about the ubiquitous Model-View-Controller (MVC)
    pattern and its iOS equivalent Model-ViewController (M-VC) pattern. Applications
    built using the M-VC pattern tend to have massive view controller classes that
    are very difficult to test.


    You have also been introduced to Microsoft’s alternative to the MVC pattern, known
    as the Model-View-ViewModel (MVVM) pattern. This pattern has its roots in WPF/XAML
    applications but can be easily adapted and used in iOS applications.


    Applications built with the MVVM pattern are significantly easier to test than
    applications built using the MVC or M-VC patterns.


    # 4. Applying TDD to the Model


    This chapter will examine the process of building the model layer of an app using
    TDD techniques. Since this chapter focuses on the model layer, you will not be
    building a user interface or any presentation logic.


    Testing the components of the model layer of an application is just as important
    as testing other components in the app. In a very simple app, the model layer
    may consist of a single class that has a few instance variables. Even in this
    simplified scenario, unit tests can be used to establish that the model class
    has the member variables that other parts of the application expect it to have.


    In more complex apps , the model layer may consist of several classes with complex
    relationships and responsibilities. Individual classes within the model layer
    may perform data transformation, persistence, and validation. In such scenarios,
    unit tests help establish (and maintain) the relationships between the classes,
    and provide a measure of confidence that the transformation, persistence, and
    validation logic are working as expected.


    The model layer that is presented in this chapter is designed to represent a bank
    account along with a set of transactions in that account. We will create classes
    to represent bank accounts, individuals who own the account, and transactions
    within the account. Figure [4-1](#A432412_1_En_4_Chapter.html#Fig1) depicts the
    class diagram of the model layer.


    ![A432412_1_En_4_Fig1_HTML.jpg](A432412_1_En_4_Fig1_HTML.jpg)


    Figure 4-1.


    Model Layer Classes


    A brief description of the classes that make up the model layer follows:


    *   BankAccount: Represents a single bank account. A bank account object can represent
    either a savings account or a current account.

    *   Transaction: Represents a single transaction. A transaction object can represent
    either money coming into the account or money leaving the account.

    *   AccountOwner: Represents an individual (or entity) that owns the bank account.
    An account may have up to two owners.


    The complete source code for the app can be downloaded anonymously from github
    using the following URL:


    [`https://github.com/asmtechnology/Lesson04.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson04.iOSTesting.2017.Apress.git)


    ## Creating the Xcode Project


    Launch Xcode and create a new iOS project based on the Single View Application
    template (see Figure [4-2](#A432412_1_En_4_Chapter.html#Fig2)).


    ![A432412_1_En_4_Fig2_HTML.jpg](A432412_1_En_4_Fig2_HTML.jpg)


    Figure 4-2.


    Xcode Project Template Dialog Box


    Use the following options while creating the new project (see Figure [4-3](#A432412_1_En_4_Chapter.html#Fig3)):


    ![A432412_1_En_4_Fig3_HTML.jpg](A432412_1_En_4_Fig3_HTML.jpg)


    Figure 4-3.


    Xcode Project Options Dialog Box


    *   Product Name: BankAccount

    *   Team: None

    *   Organization Name: Provide a suitable name

    *   Organization Identifier: Provide a suitable identifier

    *   Language: Swift

    *   Devices: iPhone

    *   Use Core Data: Unchecked

    *   Include Unit Tests: Checked

    *   Include UI Tests: Unchecked


    Note


    Even though we have used the Single View Application Template while creating this
    project, there will be no user interface/presentation code added into the project.
    In Chapter [6](#A432412_1_En_6_Chapter.html), you will build an app to display
    bank account details, and a list of transactions in a collection view. The project
    in Chapter [6](#A432412_1_En_6_Chapter.html) will build on the files created in
    this chapter.


    Save the project to a suitable location on your computer and click Create. Since
    this project will contain several new classes, it will be a good idea to place
    class files under appropriate groups within the project navigator.


    Create a group called Model in the Xcode project navigator. You will create model
    layer specific classes within this group.


    ## Building the Model Layer


    There are three model classes that we need to build:


    *   AccountOwner

    *   Transaction

    *   BankAccount


    Each of these will be built using TDD techniques in subsequent sections of this
    chapter.'
