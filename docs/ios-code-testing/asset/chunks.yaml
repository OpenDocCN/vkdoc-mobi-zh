    \ \"http://someservice.com/getuser/\"\n\n    override init() {\n        super.init()\n\
    \        self.session = URLSession(configuration:\n            URLSessionConfiguration.default)\n\
    \    }\n\n    func downloadUserProfile(success: @escaping (Data) -> Void,\n  \
