    Access…” button. You will be presented with a dialog box that asks you to select
    the protocols to allow. Choices available are HTTPS and SSH (see Figure [9-16](#A432412_1_En_9_Chapter.html#Fig16)).


    ![A432412_1_En_9_Fig16_HTML.jpg](A432412_1_En_9_Fig16_HTML.jpg)


    Figure 9-16.


    Security Protocol Settings for Repositories Hosted Within Xcode Server


    To configure the list of users who can access your repositories hosted within
    Xcode Server, click on “Edit Repository Creators.” By default, any users who have
    logged in to Xcode Server from within Xcode can access your repositories and create
    Bots.


    Users who wish to connect to these repositories will need to add account credentials
    into Xcode on their development Mac so that Xocde can access these repositories.
