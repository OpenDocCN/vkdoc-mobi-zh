- fmt: '# Reviewing the Business Requirements


    While building this app, your business has decided to try a behavior-driven approach.
    The product owners and business analyst have interviewed various users groups
    and studied reports on user trends in the target demographic. After a few weeks
    of collective analysis and documentation, they have come up with a set of business
    requirements listed in Table [12-1](#A432412_1_En_12_Chapter.html#Tab1).


    Table 12-1. RestaurantDirectory Application Requirements


    | Number | Requirement |

    | --- | --- |

    | 1 | As a [customer], I want to [view a list of restaurants near my chosen area
    within London], So that [I can plan my next meal]. |

    | 2 | As a [customer], I want to [get an idea of the distance between my chosen
    restaurant and the closest underground station], So that [I can make my travel
    plans]. |

    | 3 | As a [customer], I want to [get an idea of the quality of food served at
    a restaurant], So that [I can make a well informed decision to eat there]. |

    | 4 | As a [customer], I want to [know the type of cuisine served at a restaurant],
    So that [I can make a well informed decision to eat there]. |


    These requirements were then handed over to the development team. The business
    analyst who documented these requirements then sat down with a developer and a
    tester and prepared a set of user scenarios based on these requirements. The user
    scenarios are listed in Table [12-2](#A432412_1_En_12_Chapter.html#Tab2).


    Table 12-2. RestaurantDirectory User Scenarios


    | Number | User Scenario |

    | --- | --- |

    | 1 | Given [the app is launched], When [the main screen of the app is loaded],
    Then [there is an option in the user interface to select an area of London from
    a list]. |

    | 2 | Given [the app is launched], When [the main screen of the app is loaded],
    Then [there is a Next button in the user interface]. |

    | 3 | Given [the main screen of the app is loaded], When [no area has been selected],
    Then [the Next button is not enabled]. |

    | 4 | Given [the main screen of the app is loaded], When [an area in London has
    been selected], Then [the Next button is enabled]. |

    | 5 | Given [the user has selected a location], When [the Next button is tapped],
    Then [a new screen appears with a list of restaurants in that location]. |

    | 6 | Given [the list of restaurants is visible on the screen], When [a restaurant’s
    name is displayed in that list], Then [the listing should be accompanied by the
    name of the nearest tube station]. |

    | 7 | Given [the list of restaurants is visible on the screen], When [a restaurant’s
    name is displayed in that list], Then [the listing should be accompanied by the
    approximate distance in miles to the nearest tube station]. |

    | 8 | Given [the list of restaurants is visible on the screen], When [a restaurant’s
    name is displayed in that list], Then [the listing should be accompanied by an
    integer between 1 to 5 that indicates the quality of the restaurant, with 1 being
    the poorest and 5 the best]. |

    | 9 | Given [the list of restaurants is visible on the screen], When [a restaurant’s
    name is displayed in that list], Then [the listing should be accompanied by the
    cuisine served at the restaurant]. |


    From the perspective of the QA team, each of these user stories is testable by
    running the app and inspecting the results visually. However, from the perspective
    of an app developer, many of these requirements are visual in nature and cannot
    be tested using TDD or BDD techniques.


    Take, for instance, Scenario 1, which requires a UI element, is visible on the
    screen. This scenario is easy to test using visual inspection, but is not easy
    to test programmatically.


    Therefore, while the QA team will test each of these scenarios using a variety
    of techniques available to them, the developers will only be able to create Quick
    tests for a subset of the scenarios. Table [12-3](#A432412_1_En_12_Chapter.html#Tab3)
    lists the subset of scenarios that will be tested by the developers using Quick.


    Table 12-3. RestaurantDirectory User Scenarios Testable with Quick


    | Number | User Scenario | Notes |

    | --- | --- | --- |

    | 1 | Given [the app is launched], When [the main screen of the app is loaded],
    Then [there is an option in the user interface to select an area of London from
    a list]. | Not testable using Quick as it requires visual verification. |

    | 2 | Given [the app is launched], When [the main screen of the app is loaded],
    Then [there is a Next button in the user interface]. | Not testable using Quick
    as it requires visual verification. |

    | 3 | Given [the main screen of the app is loaded], When [no area has been selected],
    Then [the Next button is not enabled]. |  |

    | 4 | Given [the main screen of the app is loaded], When [an area in London has
    been selected], Then [the Next button is enabled]. |  |

    | 5 | Given [the user has selected a location], When [the Next button is tapped],
    Then [a new screen appears with a list of restaurants in that location]. | Partially
    testable. The developer can test that tapping the button initiates the process
    of displaying a new screen, but cannot test that the new screen has actually appeared.
    |

    | 6 | Given [the list of restaurants is visible on the screen], When [a restaurant’s
    name is displayed in that list], Then [the listing should be accompanied by the
    name of the nearest tube station]. | Partially testable. The developer can test
    that a specific method is being called on the view controller with an expected
    value. The developer, however, cannot test that the text has actually updated
    on the screen without visual inspection of the results. |

    | 7 | Given [the list of restaurants is visible on the screen], When [a restaurant’s
    name is displayed in that list], Then [the listing should be accompanied by the
    approximate distance in miles to the nearest tube station]. | Partially testable.
    The developer can test that a specific method is being called on the view controller
    with an expected value. The developer, however, cannot test that the text has
    actually updated on the screen without visual inspection of the results. |

    | 8 | Given [the list of restaurants is visible on the screen], When [a restaurant’s
    name is displayed in that list], Then [the listing should be accompanied by an
    integer between 1 to 5 that indicates the quality of the restaurant, with 1 being
    the poorest and 5 the best]. | Partially testable. The developer can test that
    a specific method is being called on the view controller with an expected value.
    The developer, however, cannot test that the text has actually updated on the
    screen without visual inspection of the results. |

    | 9 | Given [the list of restaurants is visible on the screen], When [a restaurant’s
    name is displayed in that list], Then [the listing should be accompanied by the
    cuisine served at the restaurant]. | Partially testable. The developer can test
    that a specific method is being called on the view controller with an expected
    value. The developer, however, cannot test that the text has actually updated
    on the screen without visual inspection of the results. |


    The contents of Table [12-3](#A432412_1_En_12_Chapter.html#Tab3) are clearly communicated
    across the team so that all parties have clear expectations on who will test what
    aspects of the system. In addition to that, it has been agreed that the following
    field validation criteria will apply to restaurant listings:


    - Restaurant name: Between 2 to 30 characters in length, cannot have numbers or
    special characters. The ampersand (`&`) character is allowed.

    - Cuisine type: Between 4 to 10 characters in length, cannot have numbers, special
    characters, or white space. A restaurant can have up only one cuisine.

    - Nearest Tube station name: Between 4 to 30 characters in length, cannot contain
    numbers or special characters. The ampersand (`&`) character is allowed.

    - Rating: A number between 0 and 5 inclusive. Cannot contain white space, alphanumeric,
    or special characters.'
