  trans: "\n### `SignupViewModel` 类\n\n`SignupViewModel` 类代表了 `SignupViewController`\
    \ 类与 `SignupModel` 类之间的视图模型。构建 `SignupViewModel` 类的过程与构建 `LoginViewModel` 类完全相同。\n\
    \n完整的 `SignupViewModel` 类如列表 5-13 所示。如果您想查看测试代码及相关的模拟对象，请使用以下 URL 从 github 匿名下载完成的项目：\n\
    \n[`https://github.com/asmtechnology/Lesson05.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson05.iOSTesting.2017.Apress.git)\n\
    \n```\nimport Foundation\nclass SignupViewModel: NSObject {\nweak var view:SignupViewControllerProtocol?\n\
    var userNameValidator:UserNameValidator?\nvar passwordValidator:PasswordValidator?\n\
    var emailAddressValidator:EmailAddressValidator?\nvar userNameValidated:Bool\n\
    var password1Validated:Bool\nvar password2Validated:Bool\nvar password1:String?\n\
    var password2:String?\nvar passwordsAreIdentical:Bool\nvar signupController:SignupController?\n\
    init(view:SignupViewControllerProtocol) {\nself.userNameValidated = false\nself.password1Validated\
    \ = false\nself.password2Validated = false\nself.passwordsAreIdentical = false\n\
    super.init()\nself.view = view\n}\nfunc performInitialViewSetup() {\nview?.clearUserNameField()\n\
    view?.clearPasswordField()\nview?.clearConfirmPasswordField()\nview?.enableCreateButton(false)\n\
    view?.enableCancelButton(true)\n}\nfunc userNameDidEndOnExit() {\nview?.hideKeyboard()\n\
    }\nfunc passwordDidEndOnExit() {\nview?.hideKeyboard()\n}\nfunc confirmPasswordDidEndOnExit()\
    \ {\nview?.hideKeyboard()\n}\nfunc userNameUpdated(_ value:String?) {\nguard let\
    \ value = value else {\nview?.enableCreateButton(false)\nreturn\n}\nlet validator\
    \ = self.userNameValidator ?? UserNameValidator()\nuserNameValidated = validator.validate(value)\n\
    if userNameValidated == false {\nview?.enableCreateButton(false)\nreturn\n}\n\
    if password1Validated == true &&\npassword2Validated == true &&\npasswordsAreIdentical\
    \ == true {\nview?.enableCreateButton(true)\nreturn\n}\nview?.enableCreateButton(false)\n\
    }\nfunc passwordUpdated(_ value:String?) {\nself.password1 = value\nguard let\
    \ password1 = self.password1 else {\nview?.enableCreateButton(false)\nreturn\n\
    }\nif let password2 = password2 {\npasswordsAreIdentical = password1.compare(password2)\
    \ == .orderedSame\n} else {\npasswordsAreIdentical = false\n}\nlet validator =\
    \ self.passwordValidator ?? PasswordValidator()\npassword1Validated = validator.validate(password1)\n\
    if userNameValidated == false {\nview?.enableCreateButton(false)\nreturn\n}\n\
    if password1Validated == true &&\npassword2Validated == true &&\npasswordsAreIdentical\
    \ == true {\nview?.enableCreateButton(true)\nreturn\n}\nview?.enableCreateButton(false)\n\
    }\nfunc confirmPasswordUpdated(_ value:String?) {\nself.password2 = value\nguard\
    \ let password2 = self.password2 else {\nview?.enableCreateButton(false)\nreturn\n\
    }\nif let password1 = password1 {\npasswordsAreIdentical = password1.compare(password2)\
    \ == .orderedSame\n} else {\npasswordsAreIdentical = false\n}\nlet validator =\
    \ self.passwordValidator ?? PasswordValidator()\npassword2Validated = validator.validate(password2)\n\
    if userNameValidated == false {\nview?.enableCreateButton(false)\nreturn\n}\n\
    if password1Validated == true &&\npassword2Validated == true &&\npasswordsAreIdentical\
    \ == true {\nview?.enableCreateButton(true)\nreturn\n}\nview?.enableCreateButton(false)\n\
    }\nfunc signup(userName:String?, password:String?, emailAddress:String?) {\nlet\
    \ controller = self.signupController ?? SignupController(delegate:self)\nif let\
    \ userName = userName,\nlet password = password,\nlet emailAddress = emailAddress,\n\
    let model = SignupModel(userName: userName, password: password, emailAddress:emailAddress)\
    \ {\ncontroller.doSignup(model: model)\n}\n}\n}\nextension LoginViewModel : SignupControllerDelegate\
    \ {\nfunc signupResult(result: Bool) {\n// 对结果进行处理，\n// 例如跳转到应用的其他界面。\n}\n}\n\
    ```\n\n`列表 5-13.`  \n`SignupViewModel.swift`\n\n## 将视图控制器连接到视图模型\n\n到目前为止，本章我们采用测试驱动的方法，为两个视图控制器构建了模型层和视图模型层。现在，我们需要从视图控制器中调用视图模型。\n\
    \n你是否应该采用测试驱动的方法来创建视图控制器与视图模型之间的绑定？答案是：“这取决于你认为这些测试在长期内有多大的价值。”\n\nMVVM 架构模式的核心目的，是使视图控制器变得轻量且更易于测试。然而，视图控制器仍然与呈现给用户的视图紧密耦合，因此在测试目标中实例化它可能会比较困难。\n\
    \n为了在单元测试中实例化视图控制器，你需要对测试中涉及到的视图控制器的出口（outlets）进行桩处理。`LoginForm` 项目包含两个视图控制器，每个都有自己的视图模型。视图模型在设计时，假设视图控制器会在某些关键节点调用视图模型。本章接下来的部分，将探讨如何利用测试驱动技术来创建视图控制器与视图模型之间的绑定。\n\
    \n### 将登录视图控制器类绑定到视图模型\n\n表 5-7 列出了 `LoginViewController` 类中的方法及其对应的视图模型绑定。\n\n\
    `表 5-7.`  \n登录视图控制器与视图模型绑定\n\n| 登录视图控制器方法 | 登录视图模型方法 |\n| --- | --- |\n| `func\
    \ viewDidLoad()` | `func performInitialViewSetup()` |\n| `@IBAction func login(_\
    \ sender: Any)` | `func login(userName:String?, password:String?)` |\n| `@IBAction\
    \ func userNameDidEndOnExit(_ sender: Any)` | `func userNameDidEndOnExit()` |\n\
    | `@IBAction func passwordDidEndOnExit(_ sender: Any)` | `func passwordDidEndOnExit()`\
    \ |\n| `func textField(_ textField: UITextField, shouldChangeCharactersIn range:\
    \ NSRange, replacementString string: String) -> Bool` | `func userNameUpdated(_\
    \ value:String?)` 和 `func passwordUpdated (_ value:String?)` |\n\n在项目导航器的 `LoginFormTests`\
    \ 分组下，创建一个名为 `LoginViewControllerTests` 的新 iOS 单元测试用例类。\n\n从 `LoginViewControllerTests.swift`\
    \ 中删除 `testExample` 和 `testPerformanceExample` 方法。\n"
- fmt: "### Calling the `performInitialSetup` Method of the View Model from the View\
    \ Controller\n\nAdd the following test case to the `LoginViewControllerTests.swift`\
    \ file:\n\n```\nfunc testViewDidLoad_Calls_PerformInitialSetup_OnViewModel() {\n\
    \    let expectation = self.expectation(description: \"expected performInitialViewSetup()\
    \ to be called\")\n    let loginViewController = LoginViewController()\n    let\
    \ viewModel = MockLoginViewModel(view:loginViewController)\n    viewModel.performInitialViewSetupExpectation\
    \ = expectation\n    loginViewController.viewModel = viewModel\n    loginViewController.viewDidLoad()\n\
    \    self.waitForExpectations(timeout: 1.0, handler: nil)\n}\n```\n\nThe aim of\
    \ this test case is to ensure that the view model’s `performInitialViewSetup()`\
    \ method is called by the `viewDidLoad` method of the view controller. The test\
    \ has be built around injecting a mock view model object into the view controller\
    \ and fulfilling a test expectation when the `performInitialViewSetup()` method\
    \ on the mock object is called.\n\nCreate a new class called `MockLoginViewModel`\
    \ under the `Mocks` group in the project navigator. Ensure this new class is only\
    \ included in the test target and update its implementation to match the contents\
    \ of Listing 5-14.\n\n```\nimport Foundation\nimport XCTest\n\nclass MockLoginViewModel\
    \ : LoginViewModel {\n    var performInitialViewSetupExpectation:XCTestExpectation?\n\
    \    var userNameDidEndOnExitExpectation:XCTestExpectation?\n    var passwordDidEndOnExitExpectation:XCTestExpectation?\n\
    \    var userNameUpdatedExpectation:(XCTestExpectation, expectedValue:String)?\n\
    \    var passwordUpdatedExpectation:(XCTestExpectation, expectedValue:String)?\n\
    \    var loginExpectation:(XCTestExpectation, expectedUserName:String, expectedPassword:String)?\n\
    \    \n    override func performInitialViewSetup() {\n        performInitialViewSetupExpectation?.fulfill()\n\
    \    }\n    \n    override func userNameDidEndOnExit() {\n        userNameDidEndOnExitExpectation?.fulfill()\n\
    \    }\n    \n    override func passwordDidEndOnExit() {\n        passwordDidEndOnExitExpectation?.fulfill()\n\
    \    }\n    \n    override func userNameUpdated(_ value:String?) {\n        if\
    \ let (expectation, expectedValue) = self.userNameUpdatedExpectation,\n      \
    \      let value = value {\n            if value.compare(expectedValue) == .orderedSame\
    \ {\n                expectation.fulfill()\n            }\n        }\n    }\n\
    \    \n    override func passwordUpdated(_ value:String?) {\n        if let (expectation,\
    \ expectedValue) = self.passwordUpdatedExpectation,\n            let value = value\
    \ {\n            if value.compare(expectedValue) == .orderedSame {\n         \
    \       expectation.fulfill()\n            }\n        }\n    }\n    \n    override\
    \ func login(userName:String?, password:String?) {\n        if let (expectation,\
    \ expectedUserName, expectedPassword) = self.loginExpectation,\n            let\
    \ userName = userName,\n            let password = password {\n            if\
    \ ((userName.compare(expectedUserName) == .orderedSame) &&\n                (password.compare(expectedPassword)\
    \ == .orderedSame)) {\n                expectation.fulfill()\n            }\n\
    \        }\n    }\n}\n\nListing 5-14.\nMockLoginViewModel.swift\n```\n\nYou need\
    \ to modify the `LoginViewController` class to allow you to inject the view model\
    \ as a dependency. While testing, you will want to inject a mock or stub view\
    \ model. In the release version of your app, you will want to create an instance\
    \ of a real view model. Add the following variable declaration to the `LoginViewController`\
    \ class:\n\n```\nvar viewModel:LoginViewModel?\n```\n\nUpdate the implementation\
    \ of the `viewDidLoad()` method of the `LoginViewController` class to match the\
    \ following snippet:\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    if self.viewModel == nil {\n        self.viewModel = LoginViewModel(view:\
    \ self)\n    }\n    self.viewModel?.performInitialViewSetup()\n}\n```\n\nIn this\
    \ modified `viewDidLoad` implementation, you instantiate a view model if one hasn’t\
    \ been instantiated already and then call the `performInitialViewSetup()` method\
    \ on the view model instance.\n\nIt is important to note that the view model instance\
    \ is public, and we can therefore provide a mock view model instance from our\
    \ tests.\n\nSave the file and run all unit tests using the `Product ➤ Test` menu\
    \ item. You will see that the unit test you have just created has passed (see\
    \ Figure [5-20](#A432412_1_En_5_Chapter.html#Fig20)).\n\n![A432412_1_En_5_Fig20_HTML.jpg](A432412_1_En_5_Fig20_HTML.jpg)\n\
    \nFigure 5-20.\n\nAll LoginViewControllerTests are Passing.\n\n### Calling the\
    \ `userNameDidEndOnExit` Method of the View Model from the View Controller\n\n\
    Add the following test case to the `LoginViewControllerTests.swift` file:\n\n\
    ```\nfunc testUserNameDidEndOnExit_Calls_UserNameDidEndOnExit_OnViewModel() {\n\
    \    let expectation = self.expectation(description: \"expected userNameDidEndOnExit()\
    \ to be called\")\n    let loginViewController = LoginViewController()\n    let\
    \ viewModel = MockLoginViewModel(view:loginViewController)\n    viewModel.userNameDidEndOnExitExpectation\
    \ = expectation\n    loginViewController.viewModel = viewModel\n    loginViewController.userNameDidEndOnExit(self)\n\
    \    self.waitForExpectations(timeout: 1.0, handler: nil)\n}\n```\n\nThe aim of\
    \ this test case is to ensure that the view model’s `userNameDidEndOnExit()` method\
    \ is called by the `userNameDidEndOnExit` method of the view controller.\n\nUpdate\
    \ the implementation of the `userNameDidEndOnExit` method of the `LoginViewController`\
    \ class to match:\n\n```\n@IBAction func userNameDidEndOnExit(_ sender: Any) {\n\
    \    viewModel?.userNameDidEndOnExit()\n}\n```\n\nSave the file and run all unit\
    \ tests using the `Product ➤ Test` menu item. You will see that the unit test\
    \ you have just created has passed.\n\n### Calling the `passwordDidEndOnExit`\
    \ Method of the View Model from the View Controller\n\nAdd the following test\
    \ case to the `LoginViewControllerTests.swift` file:\n\n```\nfunc testPasswordDidEndOnExit_Calls_PasswordDidEndOnExit_OnViewModel()\
    \ {\n    let expectation = self.expectation(description: \"expected passwordDidEndOnExit()\
    \ to be called\")\n    let loginViewController = LoginViewController()\n    let\
    \ viewModel = MockLoginViewModel(view:loginViewController)\n    viewModel.passwordDidEndOnExitExpectation\
    \ = expectation\n    loginViewController.viewModel = viewModel\n    loginViewController.passwordDidEndOnExit(self)\n\
    \    self.waitForExpectations(timeout: 1.0, handler: nil)\n}\n```\n\nThe aim of\
    \ this test case is to ensure that the view model’s `passwordDidEndOnExit()` method\
    \ is called by the `passwordDidEndOnExit` method of the view controller.\n\nUpdate\
    \ the implementation of the `passwordDidEndOnExit` method of the `LoginViewController`\
    \ class to match:\n\n```\n@IBAction func passwordDidEndOnExit(_ sender: Any) {\n\
    \    viewModel?.passwordDidEndOnExit()\n}\n```\n\nSave the file and run all unit\
    \ tests using the `Product ➤ Test` menu item. You will see that the unit test\
    \ you have just created has passed."
  raw: '#### Calling the performInitialSetup Method of the View Model from the View
    Controller


    Add the following test case to the LoginViewControllerTests.swift file:


    ```

    func testViewDidLoad_Calls_PerformInitialSetup_OnViewModel() {

    let expectation = self.expectation(description: "expected performInitialViewSetup()
    to be called")

    let loginViewController = LoginViewController()

    let viewModel = MockLoginViewModel(view:loginViewController)

    viewModel.performInitialViewSetupExpectation = expectation

    loginViewController.viewModel = viewModel

    loginViewController.viewDidLoad()

    self.waitForExpectations(timeout: 1.0, handler: nil)

    }

    ```


    The aim of this test case is to ensure that the view model’s performInitialViewSetup()
    method is called by the viewDidLoad method of the view controller. The test has
    be built around injecting a mock view model object into the view controller and
    fulfilling a test expectation when the performInitalViewSetup() method on the
    mock object is called.


    Create a new class called MockLoginViewModel under the Mocks group in the project
    navigator. Ensure this new class is only included in the test target and update
    its implementation to match the contents of Listing 5-14.


    ```

    import Foundation

    import XCTest

    class MockLoginViewModel : LoginViewModel {

    var performInitialViewSetupExpectation:XCTestExpectation?

    var userNameDidEndOnExitExpectation:XCTestExpectation?

    var passwordDidEndOnExitExpectation:XCTestExpectation?

    var userNameUpdatedExpectation:(XCTestExpectation, expectedValue:String)?

    var passwordUpdatedExpectation:(XCTestExpectation, expectedValue:String)?

    var loginExpectation:(XCTestExpectation, expectedUserName:String, expectedPassword:String)?

    override func performInitialViewSetup() {

    performInitialViewSetupExpectation?.fulfill()

    }

    override func userNameDidEndOnExit() {

    userNameDidEndOnExitExpectation?.fulfill()

    }

    override func passwordDidEndOnExit() {

    passwordDidEndOnExitExpectation?.fulfill()

    }

    override func userNameUpdated(_ value:String?) {

    if let (expectation, expectedValue) = self.userNameUpdatedExpectation,

    let value = value {

    if value.compare(expectedValue) == .orderedSame {

    expectation.fulfill()

    }

    }

    }

    override func passwordUpdated(_ value:String?) {

    if let (expectation, expectedValue) = self.passwordUpdatedExpectation,

    let value = value {

    if value.compare(expectedValue) == .orderedSame {

    expectation.fulfill()

    }

    }

    }

    override func login(userName:String?, password:String?) {

    if let (expectation, expectedUserName, expectedPassword) = self.loginExpectation,

    let userName = userName,

    let password = password {

    if ((userName.compare(expectedUserName) == .orderedSame) &&

    (password.compare(expectedPassword) == .orderedSame)) {

    expectation.fulfill()

    }

    }

    }

    }

    Listing 5-14.

    MockLoginViewModel.swift

    ```


    You need to modify the LoginViewController class to allow you to inject the view
    model as a dependency. While testing, you will want to inject a mock or stub view
    model. In the release version of your app, you will want to create an instance
    of a real view model. Add the following variable declaration to the LoginViewController
    class:


    ```

    var viewModel:LoginViewModel?

    ```


    Update the implementation of the viewDidLoad() method of the LoginViewController
    class to match the following snippet:


    ```

    override func viewDidLoad() {

    super.viewDidLoad()

    if self.viewModel == nil {

    self.viewModel = LoginViewModel(view: self)

    }

    self.viewModel?.performInitialViewSetup()

    }

    ```


    In this modified viewDidLoad implementation, you instantiate a view model if one
    hasn’t been instantiated already and then call the performInitialViewSetup() method
    on the view model instance.


    It is important to note that the view model instance is public, and we can therefore
    provide a mock view model instance from our tests.


    Save the file and run all unit tests using the Product ➤ Test menu item. You will
    see that the unit test you have just created has passed (see Figure [5-20](#A432412_1_En_5_Chapter.html#Fig20)).


    ![A432412_1_En_5_Fig20_HTML.jpg](A432412_1_En_5_Fig20_HTML.jpg)


    Figure 5-20.


    All LoginViewControllerTests are Passing.


    #### Calling the userNameDidEndOnExit Method of the View Model from the View Controller


    Add the following test case to the LoginViewControllerTests.swift file:


    ```

    func testUserNameDidEndOnExit_Calls_UserNameDidEndOnExit_OnViewModel() {

    let expectation = self.expectation(description: "expected userNameDidEndOnExit()
    to be called")

    let loginViewController = LoginViewController()

    let viewModel = MockLoginViewModel(view:loginViewController)

    viewModel.userNameDidEndOnExitExpectation = expectation

    loginViewController.viewModel = viewModel

    loginViewController.userNameDidEndOnExit(self)

    self.waitForExpectations(timeout: 1.0, handler: nil)

    }

    ```


    The aim of this test case is to ensure that the view model’s userNameDidEndOnExit()
    method is called by the userNameDidEndOnExit method of the view controller.


    Update the implementation of the userNameDidEndOnExit method of the LoginViewController
    class to match:


    ```

    @IBAction func userNameDidEndOnExit(_ sender: Any) {

    viewModel?.userNameDidEndOnExit()

    }

    ```


    Save the file and run all unit tests using the Product ➤ Test menu item. You will
    see that the unit test you have just created has passed.


    #### Calling the passwordDidEndOnExit Method of the View Model from the View Controller


    Add the following test case to the LoginViewControllerTests.swift file:


    ```

    func testPasswordDidEndOnExit_Calls_PasswordDidEndOnExit_OnViewModel() {

    let expectation = self.expectation(description: "expected passwordDidEndOnExit()
    to be called")

    let loginViewController = LoginViewController()

    let viewModel = MockLoginViewModel(view:loginViewController)

    viewModel.passwordDidEndOnExitExpectation = expectation

    loginViewController.viewModel = viewModel

    loginViewController.passwordDidEndOnExit(self)

    self.waitForExpectations(timeout: 1.0, handler: nil)

    }

    ```


    The aim of this test case is to ensure that the view model’s passwordDidEndOnExit()
    method is called by the passwordDidEndOnExit method of the view controller.


    Update the implementation of the passwordDidEndOnExit method of the LoginViewController
    class to match:


    ```

    @IBAction func passwordDidEndOnExit(_ sender: Any) {

    viewModel?.passwordDidEndOnExit()

    }

    ```


    Save the file and run all unit tests using the Product ➤ Test menu item. You will
    see that the unit test you have just created has passed .'
