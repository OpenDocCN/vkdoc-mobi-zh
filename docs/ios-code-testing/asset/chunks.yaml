- fmt: '# The Model-ViewController Architectural Pattern


    `Cocoa Touch`, `UIKit`, and other Apple frameworks provide all the necessary infrastructure
    to implement the Model-ViewController architecture in iOS Apps:


    - `Model`: Can be any `NSObject` subclass, or even an `NSManagedObjectModel` subclass.

    - `View`: Can be any `UIView` subclass, for example, `UILabel`, `UIButton`, and
    `UIScrollView`.

    - `Controller`: Can be any `NSObject` subclass.


    However, Apple has also created the concept of a “View Controller” that combines
    both the view and controller into a single class. In fact, view controllers are
    so common that many developers new to iOS development don’t realize that it is
    possible to create controllers independently.


    Figure [3-2](#A432412_1_En_3_Chapter.html#Fig2) shows what the Model-ViewController
    architectural pattern looks like in a typical iOS application, with the view controller
    owning both the model and the view. The roles of the three components are summarized
    below:


    ![A432412_1_En_3_Fig2_HTML.jpg](A432412_1_En_3_Fig2_HTML.jpg)


    Figure 3-2. The Model-View-Controller Pattern


    - `View`: Responsible for rendering the model, requests data from the view controller,
    passes user interaction events to the view controller.

    - `Model`: Responsible for storing data.

    - `View controller`: Reads from the model and provides data to the view, updates
    the model, handles user interaction events.


    However, since the view and the view controller are tightly coupled, with the
    view controller owning the view, the architectural pattern begins to resemble
    Figure [3-3](#A432412_1_En_3_Chapter.html#Fig3). In fact, it is extremely rare
    for a view to be paired with different view controllers.


    ![A432412_1_En_3_Fig3_HTML.jpg](A432412_1_En_3_Fig3_HTML.jpg)


    Figure 3-3. Interaction between View, View Controller, and Model objects


    If you have been developing iOS applications for a few months, you will soon realize
    that in terms of lines of code, view controllers are often the largest files in
    the project. This is due to the fact that view controllers commonly act as delegates,
    data sources, contain networking code, contain view management logic, and make
    network calls, etc. View controllers also commonly implement multiple protocols,
    which results in controller logic being mixed up with the code that supports protocols.
    These bloated view controllers are often called “Massive View Controllers.”


    Some of the logic in massive view controllers belongs in the view controller,
    but a lot of it is presentation, model transformation, and networking logic, which
    should ideally go in a separate helper objects/controllers.


    ## Model-ViewController Testability Issues


    While testing the model layer of the model-view controller pattern does not present
    any significant challenge; testing the view controller, on the other hand, presents
    a few issues:


    - **Difficult to instantiate**: Instantiating a view controller under a test may
    not be trivial; all `IBOutlet`s will need to be stubbed using appropriate subclasses.
    You will need to include the XIB or storyboard in the test target, and potentially
    end up instantiating a complex stack of UI layer objects like navigation controllers,
    and table views. Adding storyboards to the test target, just to be able to instantiate
    a view controller, will make your tests very fragile and you may end up questioning
    the value of the tests themselves.

    - **Difficult to mock**: Due to the tightly coupled nature of the code in a view
    controller, it is often difficult to test a single method in isolation.

    - **Testing the UI layer in a unit test**: Unit tests should not test the UI layer;
    a view controller blurs the lines between code that performs UI logic and code
    that performs business logic.


    # The Model-View-ViewModel Architectural Pattern


    The Model-View-ViewModel (MVVM) architectural pattern was developed by Microsoft
    to help developers build XAML-based WPF applications, but as you will soon learn,
    MVVM can be easily adapted to be used within iOS/Swift applications. MVVM is an
    expansion of MVC where we formally couple the view and the controller, but move
    all the presentation logic out of the controller into a new object called the
    `viewModel`.


    Within an iOS/Swift context, the role of the view is fulfilled by the view+view
    controller combination (see Figure [3-4](#A432412_1_En_3_Chapter.html#Fig4)).


    ![A432412_1_En_3_Fig4_HTML.jpg](A432412_1_En_3_Fig4_HTML.jpg)


    Figure 3-4. Model-View View-Model pattern on iOS


    The roles of the three components are summarized below:


    - `Model`: Responsible for storing data, maintains two-way communication with
    the `viewModel`.

    - `View`/`View controller`: Represents the view part of the pattern, and handles
    user interaction events. Maintains two-way communication with the `viewModel`.

    - `View model`: Handles presentation logic, maintains two-way communication with
    both the model and the view/view controller. Handles communication with other
    controllers that may provide specific functionality like complex business logic,
    and network requests.


    Microsoft’s original MVVM pattern makes extensive use of XAML bindings to link
    the three principal components of this pattern. On iOS/Swift applications, there
    are two options available to link the principal components of this pattern:


    - **Using Swift protocols**: The principal components of the pattern interact
    with each other through a well-defined set of protocols. Each component implements
    the relevant set of protocols.

    - **Using ReactiveCocoa / RxSwift**: Third-party libraries have now emerged that
    allow Swift developers to apply reactive-programming principles to create bindings
    between the principal components of the pattern.


    > **Note**: Reactive programming is outside the scope of this book. All examples
    in this book use the protocol-based approach.


    ## Advantages of MVVM


    This section lists some of the key advantages of the MVVM pattern over the M-VC
    pattern:


    - The MVVM pattern moves code out of a single view controller class and distributes
    this code over a more granular set of classes; this reduces the size of any individual
    class and therefore addresses the massive view controller problem.

    - The view/view controller component is loosely coupled with the model; and with
    the `viewModel`, developers in a team can build these components independently
    and concurrently. It is also significantly easier to accommodate UI changes without
    having any significant impact on either the model, or the view model layers.

    - When implemented properly, there should be no direct reference to `UIKit` in
    the `viewModel`. The view and the `viewModel` are loosely coupled. This makes
    it easy to instantiate view models in test cases. A suitable mock or stub view
    needs only to implement the relevant protocols required by the view.

    - Decoupling the view layer from the view-model layer gives the advantage that
    the view layer can be implemented using different UI technologies. The view model
    and model code can, for instance, be reused in a MacOS application by simply substituting
    the view layer.

    - MVVM being based on loosely coupled classes increases testability. A class in
    one layer can be instantiated independently of the other layers. Using protocols
    to define the contracts between participating classes makes the task of stubbing/mocking
    dependencies significantly easier.

    - MVVM promotes separation of concerns between objects. When objects are not tightly
    coupled, the resulting code is more change resistant and easier to maintain over
    the long term.


    ## ViewModel Instantiation


    There are various strategies that you can use to instantiate view models. This
    section examines a few common scenarios that you will encounter while creating
    iOS apps with the MVVM pattern.'
