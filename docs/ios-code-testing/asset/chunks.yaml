  trans: '

    # 使用 Xcode 编写你的第一组单元测试


    在本章中，你将下载 Xcode 并学习如何使用测试驱动开发技术来创建一个简单的应用程序。你将构建的应用程序将使用**单视图应用模板**，并允许用户通过点击用户界面中的按钮来创建不同类型的曲奇。该应用程序将显示每种已创建曲奇的实时总数以及已创建曲奇的总数。图
    2-1 展示了完成后的应用程序的用户界面。


    ![A432412_1_En_2_Fig1_HTML.jpg](img/A432412_1_En_2_Fig1_HTML.jpg)


    图 2-1. iOS 模拟器中的 `CookieFactory` 应用


    本章的目的是让你熟悉创建单元测试、运行测试以及查看结果的过程。因此，你在本章中创建的测试将不包含所有方面，某些代码部分在本章结束时将不进行测试。本书的第 3、4
    和 5 章将讨论特定主题，例如 MVVM 应用程序架构、测试模型对象以及测试视图控制器。


    该应用程序的完整源代码可以通过以下 URL 从 Github 匿名下载：


    [`https://github.com/asmtechnology/Lesson02.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson02.iOSTesting.2017.Apress.git)


    如果你是一位经验丰富的开发者，你可能希望跳过阅读本章的内容，直接查看最终项目。


    ## 下载并安装 Xcode


    如果你尚未安装，请使用 Mac App Store 为你的 Mac 下载并安装最新版本的 Xcode（见图 2-2）。


    ![A432412_1_En_2_Fig2_HTML.jpg](img/A432412_1_En_2_Fig2_HTML.jpg)


    图 2-2. Mac App Store 应用中的 Xcode 页面


    撰写本章时，Xcode 8 是 Mac OS X Sierra 的最新版本。Xcode 应用的大小超过 10 Gb，下载过程可能需要 15 到 45 分钟，具体取决于你的互联网连接速度。


    ## 创建支持单元测试的新项目


    在创建新的 iOS 应用程序项目时，你可以选择创建内置支持单元测试的项目。通过启动 Xcode 并选择 `File` ➤ `New` ➤ `Project`
    菜单项，开始创建新 Xcode 项目的过程。


    系统将要求你为新项目选择一个模板。Xcode 8 允许你为 iOS、macOS、tvOS 和 watchOS 平台构建项目，并为每个平台提供了一系列模板（见图
    2-3）。


    ![A432412_1_En_2_Fig3_HTML.jpg](img/A432412_1_En_2_Fig3_HTML.jpg)


    图 2-3. iOS 项目模板对话框


    选择一个合适的 iOS 模板并点击 `Next`。在本节中，我将使用 iOS **单视图应用模板**，这是最常用的 iOS 应用模板之一。


    选择项目模板后，将出现一个选项对话框，你可以在其中选择一些选项来自定义模板的某些方面（图 2-4）。


    ![A432412_1_En_2_Fig4_HTML.jpg](img/A432412_1_En_2_Fig4_HTML.jpg)


    图 2-4. 项目选项对话框


    某些字段是必填项，因此在你填写它们之前，`Next` 按钮将不可用。本书中的项目是使用 Swift 构建的，并针对 iPhone。这是 Xcode 中新 iOS
    项目的默认设置。


    在“为你新项目选择选项：”屏幕中，如果你想创建一个支持单元测试的项目，请确保选中 `Include Unit Tests` 选项。一个相关的选项 `Include
    UI Tests` 将添加对用户界面测试的支持。


    点击 `Next` 按钮，并将项目保存到你 Mac 硬盘上的合适文件夹中。你创建的项目将具有一个专门为单元测试配置的额外构建目标，以及一个包含样板代码的示例单元测试文件。


    默认情况下，创建新项目后，Xcode 会为你打开该项目。现在先关闭 Xcode 项目。下一节将讨论为现有项目添加单元测试支持所涉及的过程。


    ## 为现有项目添加单元测试支持


    要为现有 iOS 应用程序项目添加单元测试支持，请在 Xcode 中打开该项目，并选择 `File` ➤ `New` ➤ `Target` 菜单项。在目标模板对话框中选择
    `iOS Unit Testing Bundle` 选项（图 2-5）。


    ![A432412_1_En_2_Fig5_HTML.jpg](img/A432412_1_En_2_Fig5_HTML.jpg)


    图 2-5. 目标模板对话框


    选择目标模板后，将出现一个选项对话框，你可以在其中选择一些选项来自定义模板的某些方面（见图 2-6）。


    ![A432412_1_En_2_Fig6_HTML.jpg](img/A432412_1_En_2_Fig6_HTML.jpg)


    图 2-6. 目标选项对话框


    在大多数情况下，你可以直接接受选项的默认值并点击 `Finish`。一个特殊的构建目标（称为测试目标）将被添加到你的项目中，并已预先配置为支持单元测试。除了测试目标之外，一个包含样板代码的示例单元测试文件也会被添加到你的项目中。


    ## Xcode 导览


    在你开始用 Xcode 编写单元测试之前，你需要熟悉 Xcode 用户界面中处理单元测试的一些区域。随着你编写更多的测试，你很可能会用到此处讨论的用户界面的一个或多个部分。首先，在
    Xcode 中打开 `CookieFactory` 项目。

    '
- fmt: '# The Project Navigator


    The project navigator is located on the left-hand side of the Xcode user interface
    (see Figure [2-7](#A432412_1_En_2_Chapter.html#Fig7)). If the project navigator
    is not visible, use the `View ➤ Navigators ➤ Show Project Navigator` menu item.


    ![A432412_1_En_2_Fig7_HTML.jpg](A432412_1_En_2_Fig7_HTML.jpg)


    Figure 2-7. The Xcode Application with the Project Navigator Open


    The project navigator lists the files that make up your project. The files in
    the project navigator are organized hierarchically in a tree-like structure with
    the root node representing the project itself. Beneath the project node sits a
    number of folders called groups. Figure [2-8](#A432412_1_En_2_Chapter.html#Fig8)
    shows the contents of the project navigator for the `CookieFactory` project. You
    can see three folder groups in the project navigator:


    *   `CookieFactory`: This group contains the files that make up the app that will
    ship to customers.

    *   `CookieFactoryTests`: This group contains the files that contain the test
    code, and any resources needed by the test code. The files in this group are not
    included in the app that will ship to customers.

    *   `Products`: This group contains the final build products.


    ![A432412_1_En_2_Fig8_HTML.jpg](A432412_1_En_2_Fig8_HTML.jpg)


    Figure 2-8. The `CookieFactory` Project in the Project Navigator


    Files can be moved around in the project navigator using drag-and-drop operations.
    You may be tempted to think that the act of creating/moving a file under the test
    group will automatically imply that the file will not be part of the product that
    is shipped to the customer.


    This is not the case; groups just serve as an aid to unclutter and organize a
    list of files in the project. Whether or not the file will be included with the
    app that is shipped to customers depends on the build target(s) that the file
    is included in. A new iOS project with unit test support will have two build targets;
    a file can be a member of either, neither, or both targets.


    You can select a file in the project navigator and use the file inspector to view/change
    the build targets to which the file belongs (see Figure [2-9](#A432412_1_En_2_Chapter.html#Fig9)).
    To show the file inspector, use the `View ➤ Utilities ➤ Show File Inspector` menu
    item.


    ![A432412_1_En_2_Fig9_HTML.jpg](A432412_1_En_2_Fig9_HTML.jpg)


    Figure 2-9. Using the File Inspector to Set Up File Targets


    # Test Case Classes


    Under the test folder group of the project navigator, you will create your unit
    test case classes. A unit test case class is a Swift class that derives from `XCTestCase`
    and has a number of methods. When you create a new project with support for unit
    testing, a default test case class is created for you with boilerplate code (see
    Figure [2-10](#A432412_1_En_2_Chapter.html#Fig10)).


    ![A432412_1_En_2_Fig10_HTML.jpg](A432412_1_En_2_Fig10_HTML.jpg)


    Figure 2-10. Default Test Case File and Target Membership


    Test case classes contain test code, that is, code that will test your main application’s
    code. Test case classes may contain five types of methods:


    *   **Setup method**: This method is called `setUp()` and is called once before
    each test method is executed in the test class. It is commonly used to put any
    common setup code used across multiple unit tests.

    *   **Teardown method**: This method is called `tearDown()` and is called after
    each test method is executed in the test class.

    *   **Test methods**: These methods encapsulate individual unit tests and their
    names all begin with the word "test."

    *   **Performance testing methods**: These methods encapsulate individual performance
    tests and their names all begin with `testPerformance`.

    *   **Swift methods**: A test case class, like any other Swift class, can have
    its own methods. In a test case class, methods that do not encapsulate unit tests
    are usually written to contain support logic and will be called from a unit test.


    Besides the default test case file that was created with the project, you can
    create additional test case files using the `File ➤ New ➤ File` menu item and
    choosing the `iOS Unit Test Case File` template (see Figure [2-11](#A432412_1_En_2_Chapter.html#Fig11)).


    ![A432412_1_En_2_Fig11_HTML.jpg](A432412_1_En_2_Fig11_HTML.jpg)


    Figure 2-11. File Template Dialog Box


    When a new test case file is created, Xcode provides a boilerplate `setUp()` and
    `tearDown()` methods and a couple of empty unit test methods to help you get started.
    Listing [2-1](#A432412_1_En_2_Chapter.html#Par37) lists a new unit test case class
    created by Xcode.


    ```

    import XCTest

    class CookieFactoryTests: XCTestCase {

    override func setUp() {

    super.setUp()

    // Put setup code here. This method is called before the invocation of each test
    method in the class.

    }

    override func tearDown() {

    // Put teardown code here. This method is called after the invocation of each
    test method in the class.

    super.tearDown()

    }

    func testExample() {

    // This is an example of a functional test case.

    // Use XCTAssert and related functions to verify your tests produce the correct
    results.

    }

    func testPerformanceExample() {

    // This is an example of a performance test case.

    self.measure {

    // Put the code you want to measure the time of here.

    }

    }

    }

    ```


    Listing 2-1. `CookieFactoryTests.swift`


    # The Test Navigator


    The test navigator is an area of the Xcode user interface that displays a hierarchical
    view of all the test case files in the test target and all the unit tests within
    these test case files (see Figure [2-12](#A432412_1_En_2_Chapter.html#Fig12)).


    ![A432412_1_En_2_Fig12_HTML.jpg](A432412_1_En_2_Fig12_HTML.jpg)


    Figure 2-12. Xcode Test Navigator


    To show the test navigator, use the `View ➤ Navigators ➤ Show Test Navigator`
    menu item. If you hover your mouse pointer over a unit test you will see a button
    appear toward the right of the test name; clicking on that button will run the
    selected test (see Figure [2-13](#A432412_1_En_2_Chapter.html#Fig13)).


    ![A432412_1_En_2_Fig13_HTML.jpg](A432412_1_En_2_Fig13_HTML.jpg)


    Figure 2-13. Unit Tests within the Xcode Test Navigator


    You will also see the same button appear when you hover your mouse pointer over
    the name of a test case file and the test target. In the former situation, clicking
    on the button will run all unit tests in the test case file sequentially, and
    in the latter situation, it will run all unit tests in the target.


    Another way to run all tests in the project is to use the `Product ➤ Test` menu
    item. Once you have run a test, the test navigator will display a green tick or
    red cross beside the test name to indicate success or failure (see Figure [2-14](#A432412_1_En_2_Chapter.html#Fig14)).


    ![A432412_1_En_2_Fig14_HTML.jpg](A432412_1_En_2_Fig14_HTML.jpg)


    Figure 2-14. Passed and Failed Unit Tests


    Clicking on the name of the test in the test navigator will open up the code for
    the test in the source editor. It is important to note that the test code is also
    code and must be able to compile before the tests can be executed. If your project
    has compilation errors in either the test code or the code being tested, you will
    need to fix these before the tests can run.


    # Viewing Test Reports


    You can use the report navigator to access a report of all tests in the project
    (see Figure [2-15](#A432412_1_En_2_Chapter.html#Fig15)). To show the report navigator
    use the `View ➤ Navigators ➤ Show Report Navigator`.


    ![A432412_1_En_2_Fig15_HTML.jpg](A432412_1_En_2_Fig15_HTML.jpg)


    Figure 2-15. Xcode Test Report Navigator


    The report navigator can be used to access project logs and build reports as well
    as test reports. Click on the latest test activity node in the list of reports
    to view the test report.'
  raw: '### The Project Navigator


    The project navigator is located on the left-hand side of the Xcode user interface
    (see Figure [2-7](#A432412_1_En_2_Chapter.html#Fig7)). If the project navigator
    is not visible, use the View ➤ Navigators ➤ Show Project Navigator menu item.


    ![A432412_1_En_2_Fig7_HTML.jpg](A432412_1_En_2_Fig7_HTML.jpg)


    Figure 2-7.


    The Xcode Application with the Project Navigator Open


    The project navigator lists the files that make up your project. The files in
    the project navigator are organized hierarchically in a tree-like structure with
    the root node representing the project itself. Beneath the project node sits a
    number of folders called groups. Figure [2-8](#A432412_1_En_2_Chapter.html#Fig8)
    shows the contents of the project navigator for the CookieFactory project. You
    can see three folder groups in the project navigator:


    *   CookieFactory: This group contains the files that make up the app that will
    ship to customers .

    *   CookieFactoryTests: This group contains the files that contain the test code,
    and any resources needed by the test code. The files in this group are not included
    in the app that will ship to customers.

    *   Products: This group contains the final build products.


    ![A432412_1_En_2_Fig8_HTML.jpg](A432412_1_En_2_Fig8_HTML.jpg)


    Figure 2-8.


    The CookieFactory Project in the Project Navigator


    Files can be moved around in the project navigator using drag-and-drop operations.
    You my be tempted to think that the act of creating/moving a file under the test
    group will automatically imply that the file will not be part of the product that
    is shipped to the customer.


    This is not the case; groups just serve as an aid to unclutter and organize a
    list of files in the project. Whether or not the file will be included with the
    app that is shipped to customers depends on the build target(s) that the file
    is included in. A new iOS project with unit test support will have two build targets;
    a file can be a member of either, neither, or both targets .


    You can select a file in the project navigator and use the file inspector to view/change
    the build targets to which the file belongs (see Figure [2-9](#A432412_1_En_2_Chapter.html#Fig9)).
    To show the file inspector, use the View ➤ Utilities ➤ Show File Inspector menu
    item.


    ![A432412_1_En_2_Fig9_HTML.jpg](A432412_1_En_2_Fig9_HTML.jpg)


    Figure 2-9.


    Using the File Inspector to Set Up File Targets


    ### Test Case Classes


    Under the test folder group of the project navigator, you will create your unit
    test case classes. A unit test case class is a Swift class that derives from `XCTestCase`
    and has a number of methods. When you create a new project with support for unit
    testing, a default test case class is created for you with boilerplate code (see
    Figure [2-10](#A432412_1_En_2_Chapter.html#Fig10)).


    ![A432412_1_En_2_Fig10_HTML.jpg](A432412_1_En_2_Fig10_HTML.jpg)


    Figure 2-10.


    Default Test Case File and Target Membership


    Test case classes contain test code, that is, code that will test your main application’s
    code. Test case classes may contain five types of methods:


    *   Setup method : This method is called `setUp()` and is called once before each
    test method is executed in the test class. It is commonly used to put any common
    setup code used across multiple unit tests.

    *   Teardown method : This method is called `tearDown()` and is called after each
    test method is executed in the test class.

    *   Test methods : These methods encapsulate individual unit tests and their names
    all begin with the word “test.”

    *   Performance testing methods : These methods encapsulate individual performance
    tests and their names all begin with “`testPerformance.`”

    *   Swift methods : A test case class, like any other Swift class, can have its
    own methods. In a test case class, methods that do not encapsulate unit tests
    are usually written to contain support logic and will be called from a unit test.


    Besides the default test case file that was created with the project, you can
    create additional test case files using the File ➤ New ➤ File menu item and choosing
    the iOS Unit Test Case File template (see Figure [2-11](#A432412_1_En_2_Chapter.html#Fig11)).


    ![A432412_1_En_2_Fig11_HTML.jpg](A432412_1_En_2_Fig11_HTML.jpg)


    Figure 2-11.


    File Template Dialog Box


    When a new test case file is created, Xcode provides a boilerplate setup and teardown
    methods and a couple of empty unit test methods to help you get started. Listing
    [2-1](#A432412_1_En_2_Chapter.html#Par37) lists a new unit test case class created
    by Xcode.


    ```

    import XCTest

    class CookieFactoryTests: XCTestCase {

    override func setUp() {

    super.setUp()

    // Put setup code here. This method is called before the invocation of each test
    method in the class .

    }

    override func tearDown() {

    // Put teardown code here. This method is called after the invocation of each
    test method in the class.

    super.tearDown()

    }

    func testExample() {

    // This is an example of a functional test case.

    // Use XCTAssert and related functions to verify your tests produce the correct
    results.

    }

    func testPerformanceExample() {

    // This is an example of a performance test case.

    self.measure {

    // Put the code you want to measure the time of here.

    }

    }

    }

    Listing 2-1.

    CookieFactoryTests.swift

    ```


    ### The Test Navigator


    The test navigator is an area of the Xcode user interface that displays a hierarchical
    view of all the test case files in the test target and all the unit tests within
    these test case files (see Figure [2-12](#A432412_1_En_2_Chapter.html#Fig12)).


    ![A432412_1_En_2_Fig12_HTML.jpg](A432412_1_En_2_Fig12_HTML.jpg)


    Figure 2-12.


    Xcode Test Navigator


    To show the test navigator , use the View ➤ Navigators ➤ Show Test Navigator menu
    item. If you hover your mouse pointer over a unit test you will see a button appear
    toward the right of the test name; clicking on that button will run the selected
    test (see Figure [2-13](#A432412_1_En_2_Chapter.html#Fig13)).


    ![A432412_1_En_2_Fig13_HTML.jpg](A432412_1_En_2_Fig13_HTML.jpg)


    Figure 2-13.


    Unit Tests within the Xcode Test Navigator


    You will also see the same button appear when you hover your mouse pointer over
    the name of a test case file and the test target. In the former situation, clicking
    on the button will run all unit tests in the test case file sequentially, and
    in the latter situation, it will run all unit tests in the target.


    Another way to run all tests in the project is to use the Product ➤ Test menu
    item. Once you have run a test, the test navigator will display a green tick or
    red cross beside the test name to indicate success or failure (see Figure [2-14](#A432412_1_En_2_Chapter.html#Fig14)).


    ![A432412_1_En_2_Fig14_HTML.jpg](A432412_1_En_2_Fig14_HTML.jpg)


    Figure 2-14.


    Passed and Failed Unit Tests


    Clicking on the name of the test in the test navigator will open up the code for
    the test in the source editor . It is important to note that the test code is
    also code and must be able to compile before the tests can be executed. If your
    project has compilation errors in either the test code or the code being tested,
    you will need to fix these before the tests can run.


    ### Viewing Test Reports


    You can use the report navigator to access a report of all tests in the project
    (see Figure [2-15](#A432412_1_En_2_Chapter.html#Fig15)). To show the report navigator
    use the View ➤ Navigators ➤ Show Report Navigator.


    ![A432412_1_En_2_Fig15_HTML.jpg](A432412_1_En_2_Fig15_HTML.jpg)


    Figure 2-15.


    Xcode Test Report Navigator


    The report navigator can be used to access project logs and build reports as well
    as test reports . Click on the latest test activity node in the list of reports
    to view the test report.'
  trans: '

    # 项目导航器


    项目导航器位于 Xcode 用户界面的左侧（见图 2-7）。如果项目导航器不可见，请使用 `View ➤ Navigators ➤ Show Project
    Navigator` 菜单项。


    ![A432412_1_En_2_Fig7_HTML.jpg](img/A432412_1_En_2_Fig7_HTML.jpg)


    图 2-7. 打开项目导航器的 Xcode 应用程序


    项目导航器列出了构成项目的文件。这些文件以树状结构分层组织，根节点代表项目本身。项目节点下有许多称为组的文件夹。图 2-8 显示了 `CookieFactory`
    项目的项目导航器内容。你可以在项目导航器中看到三个文件夹组：


    *   `CookieFactory`：此组包含构成将交付给客户的应用程序的文件。

    *   `CookieFactoryTests`：此组包含包含测试代码的文件，以及测试代码所需的任何资源。此组中的文件不包含在将交付给客户的应用程序中。

    *   `Products`：此组包含最终的构建产品。


    ![A432412_1_En_2_Fig8_HTML.jpg](img/A432412_1_En_2_Fig8_HTML.jpg)


    图 2-8. 项目导航器中的 `CookieFactory` 项目


    可以通过拖放操作在项目导航器中移动文件。你可能会认为，在测试组下创建/移动文件的操作会自动意味着该文件将不属于交付给客户的产品的一部分。


    事实并非如此；组仅作为帮助理清和整理项目文件列表的辅助工具。文件是否包含在交付给客户的应用程序中，取决于该文件所包含的构建目标。一个支持单元测试的新 iOS
    项目将有两个构建目标；一个文件可以是任一目标、两者都不是或两者的成员。


    你可以选择项目导航器中的一个文件，并使用文件检查器查看/更改该文件所属的构建目标（见图 2-9）。要显示文件检查器，请使用 `View ➤ Utilities
    ➤ Show File Inspector` 菜单项。


    ![A432412_1_En_2_Fig9_HTML.jpg](img/A432412_1_En_2_Fig9_HTML.jpg)


    图 2-9. 使用文件检查器设置文件目标


    # 测试用例类


    在项目导航器的测试文件夹组下，你将创建单元测试用例类。单元测试用例类是一个派生自 `XCTestCase` 并包含多个方法的 Swift 类。当你创建一个支持单元测试的新项目时，会为你创建一个包含样板代码的默认测试用例类（见图
    2-10）。


    ![A432412_1_En_2_Fig10_HTML.jpg](img/A432412_1_En_2_Fig10_HTML.jpg)


    图 2-10. 默认测试用例文件和目标成员资格


    测试用例类包含测试代码，即测试主应用程序代码的代码。测试用例类可能包含五种类型的方法：


    *   **设置方法**：此方法名为 `setUp()`，在测试类中每个测试方法执行之前调用一次。它通常用于放置跨多个单元测试使用的任何公共设置代码。

    *   **拆卸方法**：此方法名为 `tearDown()`，在测试类中每个测试方法执行之后调用。

    *   **测试方法**：这些方法封装了单个单元测试，其名称均以单词 "test" 开头。

    *   **性能测试方法**：这些方法封装了单个性能测试，其名称均以 `testPerformance` 开头。

    *   **Swift 方法**：测试用例类，如同其他任何 Swift 类一样，可以有它自己的方法。在测试用例类中，不封装单元测试的方法通常是编写来包含支持逻辑，并会从单元测试中调用。


    除了与项目一起创建的默认测试用例文件外，你还可以使用 `File ➤ New ➤ File` 菜单项并选择 `iOS Unit Test Case File`
    模板来创建额外的测试用例文件（见图 2-11）。


    ![A432412_1_En_2_Fig11_HTML.jpg](img/A432412_1_En_2_Fig11_HTML.jpg)


    图 2-11. 文件模板对话框


    当创建一个新的测试用例文件时，Xcode 会提供样板化的 `setUp()` 和 `tearDown()` 方法以及几个空的单元测试方法来帮助你开始。清单
    2-1 列出了由 Xcode 创建的一个新的单元测试用例类。


    ```

    import XCTest

    class CookieFactoryTests: XCTestCase {

    override func setUp() {

    super.setUp()

    // 在这里放置设置代码。此方法在类中每个测试方法的调用之前被调用。

    }

    override func tearDown() {

    // 在这里放置拆卸代码。此方法在类中每个测试方法的调用之后被调用。

    super.tearDown()

    }

    func testExample() {

    // 这是一个功能测试用例的示例。

    // 使用 XCTAssert 及相关函数来验证你的测试产生正确的结果。

    }

    func testPerformanceExample() {

    // 这是一个性能测试用例的示例。

    self.measure {

    // 在这里放置你想要测量时间的代码。

    }

    }

    }

    ```


    清单 2-1. `CookieFactoryTests.swift`


    # 测试导航器


    测试导航器是 Xcode 用户界面的一个区域，它显示了测试目标中所有测试用例文件以及这些测试用例文件中所有单元测试的分层视图（见图 2-12）。


    ![A432412_1_En_2_Fig12_HTML.jpg](img/A432412_1_En_2_Fig12_HTML.jpg)


    图 2-12. Xcode 测试导航器


    要显示测试导航器，请使用 `View ➤ Navigators ➤ Show Test Navigator` 菜单项。如果将鼠标指针悬停在一个单元测试上，你将看到在该测试名称右侧出现一个按钮；点击该按钮将运行选中的测试（见图
    2-13）。


    ![A432412_1_En_2_Fig13_HTML.jpg](img/A432412_1_En_2_Fig13_HTML.jpg)


    图 2-13. Xcode 测试导航器中的单元测试


    当将鼠标指针悬停在测试用例文件名称和测试目标上时，你也会看到相同的按钮出现。在前一种情况下，点击该按钮将顺序运行该测试用例文件中的所有单元测试；在后一种情况下，它将运行该目标中的所有单元测试。


    运行项目中所有测试的另一种方法是使用 `Product ➤ Test` 菜单项。运行测试后，测试导航器将在测试名称旁边显示绿色勾选或红色叉号，以指示成功或失败（见图
    2-14）。


    ![A432412_1_En_2_Fig14_HTML.jpg](img/A432412_1_En_2_Fig14_HTML.jpg)


    图 2-14. 通过和失败的单元测试


    在测试导航器中点击测试的名称，将在源代码编辑器中打开该测试的代码。需要特别注意，测试代码也是代码，在测试执行之前必须能够编译。如果你的项目在测试代码或被测试的代码中存在编译错误，你需要在测试运行之前修复这些问题。


    # 查看测试报告


    你可以使用报告导航器访问项目中所有测试的报告（见图 2-15）。要显示报告导航器，请使用 `View ➤ Navigators ➤ Show Report
    Navigator`。


    ![A432412_1_En_2_Fig15_HTML.jpg](img/A432412_1_En_2_Fig15_HTML.jpg)


    图 2-15. Xcode 测试报告导航器


    报告导航器可用于访问项目日志、构建报告以及测试报告。点击报告列表中最新的测试活动节点以查看测试报告。

