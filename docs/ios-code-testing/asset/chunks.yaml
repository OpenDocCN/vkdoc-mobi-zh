  raw: 'The code in Listing [3-3](#A432412_1_En_3_Chapter.html#Par95) handles the
    presentational aspects of the table view, as well as building view models for
    cells and the detail view controller. The ColorListTableViewModel instance holds
    a weak reference to the view layer as well as a strong reference to an array of
    model objects. This array represents the model layer for this application:


    ```

    fileprivate weak var view:ColorListTableViewControllerDelegate?

    fileprivate var coulorData:[Color]

    ```


    Let us now examine the code for the ColorDetailViewModel class:


    ```

    import Foundation

    class ColorDetailViewModel : NSObject {

    weak var view:ColorDetailViewControllerDelegate?

    var model:Color?

    init(view:ColorDetailViewControllerDelegate?, model:Color?) {

    self.view = view

    self.model = model

    super.init()

    }

    }

    extension ColorDetailViewModel : ViewModel {

    func viewDidAppear(_ animated: Bool) {

    if let view = self.view, let model = self.model {

    view.setBackgroundColor(red: model.red, blue: model.blue, green: model.green,
    alpha: model.alpha)

    view.setNavigationTitle(model.name)

    }

    }

    func setView(delegate:AnyObject?) -> Void {

    self.view = delegate as? ColorDetailViewControllerDelegate

    }

    }

    Listing 3-4.

    ColorDetailViewMoel

    ```


    The code in Listing [3-4](#A432412_1_En_3_Chapter.html#Par98) represents the view
    model for the detail view controller . The view model holds a weak reference to
    the view layer, as well as a strong reference to a model object. The model object
    is an instance of a Color class.


    ```

    weak var view:ColorDetailViewControllerDelegate?

    var model:Color?

    ```


    The view model’s viewDidAppear event is wired to be called by the matching event
    of the view controller call. The view model uses this event to set the background
    color and title of the view:


    ```

    func viewDidAppear(_ animated: Bool) {

    if let view = self.view, let model = self.model {

    view.setBackgroundColor(red: model.red, blue: model.blue, green: model.green,
    alpha: model.alpha)

    view.setNavigationTitle(model.name)

    }

    }

    ```


