    The SearchViewModel class represents the view model between the SearchViewController
    class and the Restaurant model object. The desired instance variables and methods
    of the view model class are described in Table [12-7](#A432412_1_En_12_Chapter.html#Tab7).


    Table 12-7.


    SearchViewModel instance variables and methods


    | Name | Type | Description |

    | --- | --- | --- |

    | `weak var view:SearchViewControllerProtocol?` | Ivar | Reference to the view
    controller, uses a protocol to define a list of methods that the view model can
    use. |

    | `var selectedArea:String?` | Ivar | Represents the location within London selected
    by the user by interacting with the picker view. |

    | `var restaurants: [String: [Restaurant]]` | Ivar | A dictionary of restaurants,
    with one entry for each location of London. |

    | `func performInitialViewSetup()` | Method | Called from the `viewDidLoad()`
    method of the view controller. |

    | `func numberOfComponents() -> Int` | Method | Called from the `numberOfComponents(in
    pickerView: UIPickerView)` method of the view controller. |

    | `func numberOfRowsInComponent(_ component:Int) -> Int` | Method | Called from
    the `pickerView(_ pickerView: UIPickerView, numberOfRowsInComponent component:
    Int)` method of the view controller. |

    | `func titleForRow(_ row:Int, component:Int) -> String?` | Method | Called from
    the `pickerView(_ pickerView: UIPickerView, titleForRow row: Int, forComponent
    component: Int)` method of the view controller. |

    | `func didSelectRow(_ row:Int, component:Int) -> Void` | Method | Called from
    the `pickerView(_ pickerView: UIPickerView, didSelectRow row: Int, inComponent
    component: Int)` method of the view controller. |

    | `func onViewListings() -> Void` | Method | Called from the `onViewListings(_
    sender: Any)` method of the view controller. |

    | `func viewModelForSelectedArea() -> RestaurantTableViewModel?` | Method | Called
    from the `prepare(for segue: UIStoryboardSegue, sender: Any?)` method of the view
    controller. |

    | `func loadRestaurantData(filePath:String?) -> Void` | Method | Called from the
    `init()` method of the view model class. |

    | `init(view:SearchViewControllerProtocol)` | Method | Called from the `viewDidLoad()`
    method of the view controller. |


    The SearchViewModel class requires that a protocol called SearchViewControllerProtocol
    is defined and implemented by the SearchViewController class . Listing [12-10](#A432412_1_En_12_Chapter.html#Par183)
    decribes the protocol.


    ```

    import Foundation

    protocol SearchViewControllerProtocol : class {

    func setNavigationTitle(_ title:String)

    func enableRestaurantListingsButton(_ state:Bool)

    func displayResultsScreen()

    }

    Listing 12-10.

    SearchViewControllerProtocol.swift

    ```


    These methods are implemented in SearchViewController.swift by adding the following
    class extension to the end of the file:


    ```

    extension SearchViewController : SearchViewControllerProtocol {

    func setNavigationTitle(_ title:String) {

    self.title = title

    }

    func enableRestaurantListingsButton(_ state:Bool) {

    self.viewRestaurantButton.isEnabled = state

    }

    func displayResultsScreen() {

    self.performSegue(withIdentifier: "presentSearchResults", sender: self)

    }

    }

    ```


    The complete SearchViewModel class is provided in Listing [12-11](#A432412_1_En_12_Chapter.html#Par188).
    If you would like to examine the code for the associated tests, download the finished
    project anonymously from github using the following URL:


    [`https://github.com/asmtechnology/Lesson12.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson12.iOSTesting.2017.Apress.git)


    ```

    import Foundation

    class SearchViewModel : NSObject {

    var restaurants: [String: [Restaurant]]

    var selectedArea:String?

    weak var view:SearchViewControllerProtocol?

    init(view:SearchViewControllerProtocol) {

    self.view = view

    self.restaurants = [String: [Restaurant]]()

    super.init()

    let path = Bundle.main.path(forResource: "RestaurantData", ofType: "json")

    loadRestaurantData(filePath:path)

    }

    func loadRestaurantData(filePath:String?) -> Void {

    guard let filePath = filePath,

    let fileData = try? Data(contentsOf: URL(fileURLWithPath: filePath)),

    let array = try? JSONSerialization.jsonObject(with: fileData, options: JSONSerialization.ReadingOptions.mutableContainers)
    as? NSArray else {

    return

    }

    for item in array! {

    guard let dictionary = item as? [String : AnyObject] else {

    continue

    }

    if let restaurant = Restaurant(dictionary),

    let area = restaurant.area {

    if self.restaurants[area] == nil {

    self.restaurants[area] = [Restaurant]()

    }

    self.restaurants[area]?.append(restaurant)

    }

    }

    }

    func performInitialViewSetup() {

    view?.setNavigationTitle("Restaurant Finder")

    view?.enableRestaurantListingsButton(false)

    }

    func numberOfComponents() -> Int {

    return 1

    }

    func numberOfRowsInComponent(_ component:Int) -> Int {

    return self.restaurants.count

    }

    func titleForRow(_ row:Int, component:Int) -> String? {

    let keys = [String](self.restaurants.keys)

    if row = keys.count {

    return nil

    }

    return keys[row]

    }

    func didSelectRow(_ row:Int, component:Int) -> Void {

    let keys = [String](self.restaurants.keys)

    if row = keys.count {

    return

    }

    self.selectedArea = keys[row]

    self.view?.enableRestaurantListingsButton(true)

    }

    func onViewListings() -> Void {

    self.view?.displayResultsScreen()

    }

    func viewModelForSelectedArea() -> RestaurantTableViewModel? {

    guard let selectedArea = self.selectedArea else {

    return nil

    }

    let keys = [String](self.restaurants.keys)

    if keys.contains(selectedArea) == false {

    return nil

    }

    return RestaurantTableViewModel(selectedArea, restaurantList:self.restaurants[selectedArea])

    }

    }

    Listing 12-11.

    SearchViewModel.swift

    ```


    While building the SearchViewModel class using a test-driven approach, you will
    need to create a mock view controller object to instantiate the view model, and
    to test the binding between the view model and the view controller .


    As it turns out, a mock search view controller class was also one of the missing
    classes needed to make the Quick BDD tests compile. Listing [12-12](#A432412_1_En_12_Chapter.html#Par191)
    contains the code in a class called MockSearchViewController that will be used
    by both unit tests and Quick BDD tests.


    ```

    import Foundation

    import XCTest

    class MockSearchViewController : SearchViewController {

    var expectationForSetNavigationTitle:XCTestExpectation?

    var expectationForEnableRestaurantListingsButton:(XCTestExpectation, Bool)?

    var expectationForDisplayResultsScreen:XCTestExpectation?

    var displayResultsScreenCalled:Bool

    init() {

    displayResultsScreenCalled = false

    super.init(nibName: nil, bundle: nil)

    }

    required init?(coder aDecoder: NSCoder) {

    displayResultsScreenCalled = false

    super.init(coder: aDecoder)

    }

    override func setNavigationTitle(_ title:String) {

    expectationForSetNavigationTitle?.fulfill()

    super.setNavigationTitle(title)

    }

    override func enableRestaurantListingsButton(_ state:Bool) {

    guard let (expectation, expectedValue) = self.expectationForEnableRestaurantListingsButton
    else {

    super.enableRestaurantListingsButton(state)

    return

    }

    if state == expectedValue {

    expectation.fulfill()

    }

    super.enableRestaurantListingsButton(state)

    }

    override func displayResultsScreen() {

    expectationForDisplayResultsScreen?.fulfill()

    displayResultsScreenCalled = true

    }

    }

