    ## Building the ViewModel Layer


    There are three view model classes that we need to build:


    - `CollectionViewModel`,

    - `CollectionViewCellViewModel`, and

    - `CollectionViewSectionHeaderViewModel`.


    These correspond to the `CollectionViewController`, `CollectionViewCell`, and
    `CollectionViewSectionHeader` classes respectively.


    The view models will use protocols to establish an interface through which they
    can communicate with their respective view controllers.


    ### The `CollectionViewModel` Class


    The `CollectionViewModel` class represents the view model between the `CollectionViewController`
    class and the `Album` model object.


    Create a new iOS Unit Test Case class called `CollectionViewModelTests` under
    the `PhotoBookTests` group of the project explorer. Ensure this new file is part
    of the `PhotoBookTests` target only.


    Delete the `testExample` and `testPerformanceExample` methods from `CollectionViewModelTests.swift`.
    Create a new unit test method called the following:


    `testInit_ValidView_InstantiatesObject()`in a separate extension and add following
    code to the method body:


    ```

    func testInit_ValidView_InstantiatesObject() {

    let viewModel = CollectionViewModel(view:mockCollectionViewController!)

    XCTAssertNotNil(viewModel)

    }

    ```


    Add the following variable declaration to the top of the `CollectionViewModelTests`
    class:


    ```

    fileprivate var mockCollectionViewController:MockCollectionViewController?

    ```


    You will notice that this code fails to compile; this is because the `CollectionViewModel`
    class has not been created yet. To fix this failure, create a new class called
    `CollectionViewModel` under the `ViewModel` group in the project navigator. In
    the file location dialog box, ensure both the `PhotoBook` and `PhotoBookTests`
    targets are checked (see Figure [6-21](#A432412_1_En_6_Chapter.html#Fig21)).


    ![A432412_1_En_6_Fig21_HTML.jpg](A432412_1_En_6_Fig21_HTML.jpg)


    **Figure 6-21.** `CollectionViewModel.swift` Target Membership


    Update the contents of the `CollectionViewModel.swift` file to match the following
    code snippet:


    ```

    import Foundation

    class CollectionViewModel : NSObject {

    init(view:CollectionViewControllerProtocol) {

    super.init()

    }

    }

    ```


    The initializer for the `CollectionViewModel` class takes a reference to the view.
    Note that the type of the view parameter is `CollectionViewControllerProtocol`
    and not `CollectionViewController`.


    The view model makes use of a protocol to create a loosely coupled relationship
    with the view. As far as the view model is concerned, any class that implements
    the `CollectionViewControllerProtocol` protocol can be used as the view. This
    loose coupling with the view makes the view model easy to instantiate in a unit
    test, independent of a view controller.


    Create a new Swift file called `CollectionViewControllerProtocol` under the `Protocols`
    group of the project explorer, and ensure the new file is a member of both the
    `PhotoBook` and `PhotoBookTests` targets. Update the code in `CollectionViewControllerProtocol.swift`
    to resemble the following:


    ```

    import Foundation

    protocol CollectionViewControllerProtocol : class {

    }

    ```


    Create a new group called `Mocks` under the `PhotoBookTests` group, and create
    a new Swift class called `MockCollectionViewController` under the `Mocks` group.
    Ensure the `MockCollectionViewController.swift` file is only a member of the `PhotoBookTests`
    target.


    Update the code in `MockCollectionViewController.swift` to resemble the following:


    ```

    import UIKit

    import XCTest

    class MockCollectionViewController : CollectionViewControllerProtocol {

    }

    ```


    Open the `CollectionViewModelTests.swift` file and update the `setUp()` method
    to resemble the following:


    ```

    override func setUp() {

    super.setUp()

    mockCollectionViewController = MockCollectionViewController()

    }

    ```


    The updated `setup()` method instantiates a `MockCollectionViewController` object
    and saves a reference to this new instance in the `mockCollectionViewController`
    private variable. The code in `CollectionViewModelTests.swift` should now resemble
    Listing [6-6](#A432412_1_En_6_Chapter.html#Par128).'
