    #### View Model – View Controller Binding


    Table [6-5](#A432412_1_En_6_Chapter.html#Tab5) lists the methods we will add to
    the CollectionViewModel class. Most of these methods will be called from the collection
    view delegate and data source methods of the view controller .


    Table 6-5.


    CollectionViewModel Methods


    | Item | Description |

    | --- | --- |

    | `func performInitialViewSetup()` | Should be called from the `viewDidLoad()`
    method of the collection view controller class. Resets user interface elements
    to their initial states. |

    | `func numberOfSections() -> Int` | Called from the `numberOfSections(in collectionView:
    UICollectionView) -> Int` collection view data source method. Returns the number
    of City object in the Album. |

    | `func numberOfItemsInSection(_ section: Int) -> Int` | Called from the `collectionView(_
    collectionView: UICollectionView, numberOfItemsInSection section: Int) -> Int`
    collection view data source method. Returns the number of Photo objects in a given
    City object. |

    | `func cellViewModel(indexPath:IndexPath) -> CellViewModelProtocol?` | Called
    from the `collectionView(_ collectionView: UICollectionView, cellForItemAt indexPath:
    IndexPath) -> UICollectionViewCell` collection view data source method. Returns
    a view model that can be used by a collection view cell. |

    | `func headerViewModel(indexPath:IndexPath) -> HeaderViewModelProtocol?` | Called
    from the `collectionView(_ collectionView: UICollectionView, viewForSupplementaryElementOfKind
    kind: String, at indexPath: IndexPath) -> UICollectionReusableView` collection
    view data source method. Returns a view model that can be used by a collection
    view cell. |


    It is worth noting that both the collection view cell and collection view section
    header use their own view models. Both these view models can be instantiated by
    calling the appropriate method on a CollectionViewModel object.


    We haven’t discussed the view models for the collection view cell and section
    header yet. For the purposes of building the CollectionViewModel object first,
    you will create a bare-bones version of the other view model objects. Once the
    CollectionViewModel class has been built, you will build other view model objects
    in subsequent sections of this chapter.


    Since the collection view model uses a protocol to bind with the collection view
    controller, you will need to add methods to the protocol that will allow the view
    model to request the view controller to update user interface elements. Table
    [6-6](#A432412_1_En_6_Chapter.html#Tab6) lists the methods that will be added
    to CollectionViewControllerProtocol.


    Table 6-6.


    CollectionViewControllerProtocol Methods


    | Item | Description |

    | --- | --- |

    | `func setNavigationTitle(_ title:String) -> Void` | Called by the view model.
    The collection view controller should set up for the appropriate title for the
    navigation controller. |

    | `func setSectionInset(top:Float, left:Float, bottom:Float, right:Float) -> Void`
    | Called by the view model. The collection view controller should set up the section
    insets for the collection view. |

    | `func setupCollectionViewCellToUseMaxWidth() -> Void` | Called by the view model.
    The collection view controller should ensure that each cell occupies all of the
    available screen width. |


