- fmt: '# Creating the First Name Validator Class


    For the purposes of the project being developed in this chapter, let us assume
    the following validation criteria are to be applied to the first name:


    - Should be between 2 and 10 characters in length.

    - Should not include numbers.

    - Should not include white space.


    Let us first create a set of tests for a class called `FirstNameValidator`. The
    `FirstNameValidator` class does not exist yet, hence these tests will not compile.
    However, the tests we are about to write ensure that the `FirstNameValidator`
    class will encapsulate all the validation criteria listed above in a method called
    `validate()`.


    Create a new iOS Unit Test Case class called `FirstNameValidatorTests` under the
    `BankAccountTests` group of the project explorer and ensure the `FirstNameValidatorTests.swift`
    file is included in the `BankAccountTests` target and not the `BankAccount` target.


    Replace the contents of the `FirstNameValidatorTests.swift` file with Listing
    [4-2](#A432412_1_En_4_Chapter.html#Par58).


    ```

    import XCTest

    class FirstNameValidatorTests: XCTestCase {

    fileprivate let emptyString = ""

    fileprivate let singleCharachterName = "a"

    fileprivate let twoCharachterName = "ab"

    fileprivate let tenCharachterName = "abcdefghij"

    fileprivate let elevenCharachterName = "abcdefghijk"

    fileprivate let nameWithWhitespace = "abc def"

    fileprivate let nameWithDigit0 = "abc00"

    fileprivate let nameWithDigit1 = "abc11"

    fileprivate let nameWithDigit2 = "abc22"

    fileprivate let nameWithDigit3 = "abc33"

    fileprivate let nameWithDigit4 = "abc44"

    fileprivate let nameWithDigit5 = "abc55"

    fileprivate let nameWithDigit6 = "abc66"

    fileprivate let nameWithDigit7 = "abc77"

    fileprivate let nameWithDigit8 = "abc88"

    fileprivate let nameWithDigit9 = "abc99"

    override func setUp() {

    super.setUp()

    // Put setup code here. This method is called before the invocation of each test
    method in the class.

    }

    override func tearDown() {

    // Put teardown code here. This method is called after the invocation of each
    test method in the class.

    super.tearDown()

    }

    }

    // MARK: Empty string validation

    extension FirstNameValidatorTests {

    func testValidate_EmptyString_ReturnsFalse() {

    let validator = FirstNameValidator()

    XCTAssertFalse(validator.validate(emptyString), "string can not be empty.")

    }

    }

    // MARK: String length validation

    extension FirstNameValidatorTests {

    func testValidate_InputLessThanTwoCharachtersInLength_ReturnsFalse() {

    let validator = FirstNameValidator()

    XCTAssertFalse(validator.validate(singleCharachterName), "string can not have
    less than 2 characters.")

    }

    func testValidate_InputGreaterThanTenCharachtersInLength_ReturnsFalse() {

    let validator = FirstNameValidator()

    XCTAssertFalse(validator.validate(elevenCharachterName), "string can not have
    more than 11 characters.")

    }

    func testValidate_InputTwoCharachtersInLength_ReturnsTrue() {

    let validator = FirstNameValidator()

    XCTAssertTrue(validator.validate(twoCharachterName), "string with 2 charachters
    should have been valid.")

    }

    func testValidate_InputTenCharachtersInLength_ReturnsTrue() {

    let validator = FirstNameValidator()

    XCTAssertTrue(validator.validate(tenCharachterName), "string with 10 charachters
    should have been valid.")

    }

    }

    // MARK: white space validation

    extension FirstNameValidatorTests {

    func testValidate_InputWithWhitespace_ReturnsFalse() {

    let validator = FirstNameValidator()

    XCTAssertFalse(validator.validate(nameWithWhitespace), "string can not have white
    space.")

    }

    }

    // MARK: Numeric digit validation

    extension FirstNameValidatorTests {

    func testValidate_InputWithDigit0_ReturnsFalse() {

    let validator = FirstNameValidator()

    XCTAssertFalse(validator.validate(nameWithDigit0), "string can not have digit
    0 in it.")

    }

    func testValidate_InputWithDigit1_ReturnsFalse() {

    let validator = FirstNameValidator()

    XCTAssertFalse(validator.validate(nameWithDigit1), "string can not have digit
    1 in it.")

    }

    func testValidate_InputWithDigit2_ReturnsFalse() {

    let validator = FirstNameValidator()

    XCTAssertFalse(validator.validate(nameWithDigit2), "string can not have digit
    2 in it.")

    }

    func testValidate_InputWithDigit3_ReturnsFalse() {

    let validator = FirstNameValidator()

    XCTAssertFalse(validator.validate(nameWithDigit3), "string can not have digit
    3 in it.")

    }

    func testValidate_InputWithDigit4_ReturnsFalse() {

    let validator = FirstNameValidator()

    XCTAssertFalse(validator.validate(nameWithDigit4), "string can not have digit
    4 in it.")

    }

    func testValidate_InputWithDigit5_ReturnsFalse() {

    let validator = FirstNameValidator()

    XCTAssertFalse(validator.validate(nameWithDigit5), "string can not have digit
    5 in it.")

    }

    func testValidate_InputWithDigit6_ReturnsFalse() {

    let validator = FirstNameValidator()

    XCTAssertFalse(validator.validate(nameWithDigit6), "string can not have digit
    6 in it.")

    }

    func testValidate_InputWithDigit7_ReturnsFalse() {

    let validator = FirstNameValidator()

    XCTAssertFalse(validator.validate(nameWithDigit7), "string can not have digit
    7 in it.")

    }

    func testValidate_InputWithDigit8_ReturnsFalse() {

    let validator = FirstNameValidator()

    XCTAssertFalse(validator.validate(nameWithDigit8), "string can not have digit
    8 in it.")

    }

    func testValidate_InputWithDigit9_ReturnsFalse() {

    let validator = FirstNameValidator()

    XCTAssertFalse(validator.validate(nameWithDigit9), "string can not have digit
    9 in it.")

    }

    }

    Listing 4-2.

    FirstNameValidatorTests.swift

    ```


    The tests in Listing [4-2](#A432412_1_En_4_Chapter.html#Par58) assume that the
    validator class will implement a method called `validate()` that will return true
    or false. When you approach a problem with TDD techniques, your tests will define
    the interface of the class that will be built to make the tests pass.


    You may also have noticed that class extensions have been used to group similar
    tests. This is a commonly used approach to segregate a large number of tests in
    a single class.


    You will once again notice that the tests we have just written do not compile.
    This is because the `FirstNameValidator` class has not been created yet.


    To make the test code compile, create a new class called `FirstNameValidator`
    under the `Model` group in the project navigator, and update its implementation
    to match Listing [4-3](#A432412_1_En_4_Chapter.html#Par63).


    ```

    import Foundation

    class FirstNameValidator: NSObject {

    func validate(_ value:String) -> Bool {

    if ((value.characters.count  10)) {

    return false

    }

    let whitespace = Set(" ".characters)

    if (value.characters.filter {whitespace.contains($0)}).count > 0 {

    return false

    }

    let numbers = Set("0123456789".characters)

    if (value.characters.filter {numbers.contains($0)}).count > 0 {

    return false

    }

    guard let regexValidator = try? NSRegularExpression(pattern: "([A-Za-z''])", options:
    .caseInsensitive) else {

    return false

    }

    if regexValidator.numberOfMatches(in: value,

    options: NSRegularExpression.MatchingOptions.reportCompletion,

    range: NSMakeRange(0, value.characters.count)) > 0 {

    return true

    }

    return false

    }

    }

    Listing 4-3.

    FirstNameValidator.swift

    ```


    This code in Listing [4-3](#A432412_1_En_4_Chapter.html#Par63) declares the `FirstNameValidator`
    class as a subclass of `NSObject`, with a single method called `validate` that
    returns a Boolean. Save the file and run all unit tests using the **Product >
    Test** menu item. All the tests around `FirstNameValidator` should pass; however
    you should still see test failures around the `AccountOwner` class (see Figure
    [4-8](#A432412_1_En_4_Chapter.html#Fig8)).


    ![A432412_1_En_4_Fig8_HTML.jpg](A432412_1_En_4_Fig8_HTML.jpg)


    **Figure 4-8.** Xcode Test Navigator with Passing and Failing Tests


    These failing tests are fine for now and will be made to pass once we build the
    other validator objects and integrate these validator objects with the `AccountOwner`
    class.'
