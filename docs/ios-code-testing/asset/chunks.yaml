    # 总结


    在本章中，你学习了重构遗留代码或将经过良好测试的代码添加到遗留代码库的不同方法。你学会了运用**单一职责原则**将大型类拆分为更小的类，并将新代码封装到方法或新类中。


    你还学习了使用协议作为解耦类的方式，应用装饰器模式，以及通过依赖注入来创建更易于测试的代码。


    ## 备注


    1. 《重构遗留代码》，Michael C. Feathers 著，Prentice Hall Professional Technical Reference
    出版。ISBN 0-13-117705-2。


    # 持续集成


    持续集成（CI）是一种软件开发方法，要求开发者频繁地将代码推送到共享仓库，并在专用的构建计算机上触发自动化的测试和构建流程。构建周期可以定时触发，也可以在每次代码推送后触发。


    当在构建周期中包含了单元（或用户界面）测试套件时，CI 系统只会在所有测试通过的情况下生成构建。测试失败通常会向开发团队的所有成员发送电子邮件通知。


    虽然 CI 系统并不强制要求在构建过程之前运行一套自动化测试，但拥有这些测试的关键优势在于能够尽早发现并捕获问题。如果团队中的某位开发者进行了更改，并且在将更改推送到仓库后构建立即失败，那么很可能是推送的文件中存在问题导致了构建失败。


    当 CI 系统成功创建了一个构建时，该构建会存储在 CI 系统中，供团队成员下载。测试人员可以随时直接从 CI 系统获取最新的构建版本。


    为了使 CI 系统正常运行，团队中的开发者必须同意以下原则：


    -   频繁地将代码推送到仓库。

    -   不要将损坏的代码推送到仓库。

    -   在推送到仓库之前，务必在其开发机器上运行一套测试。


    苹果公司提供了自己的 CI 系统，名为 **Xcode Server**，它与 Xcode 开发环境无缝集成。Xcode Server 是 macOS Server
    的一部分，安装 Xcode 时不会自动安装它。要使用 Xcode Server，你需要在 Mac 上安装并配置 macOS Server 应用和 Xcode。


    ## 备注


    一个典型的持续集成工作流程是，开发者使用开发用 Mac，并需要一个单独的专用 Mac 作为构建服务器。构建服务器上同时安装了 Xcode 和 Xcode Server。构建计算机也可以托管你的源代码仓库，或者连接到托管在
    GitHub/BitBucket 上的远程仓库。如果你没有专用的构建计算机，可以在你的开发用 Mac 上安装 macOS Server 应用。


    ## 安装 macOS Server


    安装 macOS Server 是一个直接了当的过程。正如本章前面所述，公司通常会在网络上使用一台专用 Mac 作为持续集成服务器。本章中的说明与你安装 macOS
    Server 的 Mac 无关。


    ## 注释


    在你的 Mac 上安装 macOS Server 之前，必须确保以下几点：


    -   你的 Mac 上已安装最新版本的 Xcode。

    -   你已经下载并安装了相关的配置文件、模拟器和证书。

    -   拥有该 Mac 的管理员凭证。

    -   拥有一个 iTunes 账户（用于 Mac App Store）。

    -   拥有访问存放源代码的 Git 仓库的凭证。


    要在你打算使用 Xcode Server 的 Mac 上开始安装过程，请在 Mac App Store 中找到 macOS Server 应用，然后点击“安装”（见图
    9-1）。


    ![A432412_1_En_9_Fig1_HTML.jpg](img/A432412_1_En_9_Fig1_HTML.jpg)


    图 9-1. Mac App Store 中的 macOS Server


    ### 启动 macOS Server


    一旦在你的 Mac 上安装了 macOS Server，可以通过从“应用程序”目录启动 `Server.app`、在聚焦搜索中输入 `Server`、或点击程序坞中的启动台图标然后点击
    `Server` 来启动它。首次启动 macOS Server 应用时，会提示你进行配置（见图 9-2）。


    ![A432412_1_En_9_Fig2_HTML.jpg](img/A432412_1_En_9_Fig2_HTML.jpg)


    图 9-2. macOS Server 配置界面


    点击“继续”后，会要求你接受许可协议的条款。接受许可协议后，系统会提示你提供 Mac 上管理员账户的凭证。提供正确的凭证后，macOS Server 将花费几分钟时间在
    Mac 上安装和配置各种服务（见图 9-3）。


    ![A432412_1_En_9_Fig3_HTML.jpg](img/A432412_1_En_9_Fig3_HTML.jpg)


    图 9-3. macOS Server 安装设置流程


    在后续启动时，系统会要求你选择一个要管理的服务器实例（见图 9-4）。如果你同时在开发用 Mac 和专用构建 Mac 上安装了 macOS Server，那么你可以选择管理开发
    Mac 上的本地服务器实例，或者构建 Mac 上的服务器实例。选择适当的选项，然后点击“继续”。


    ![A432412_1_En_9_Fig4_HTML.jpg](img/A432412_1_En_9_Fig4_HTML.jpg)


    图 9-4. 选择要管理的服务器实例


    仅当远程 Mac 安装了 macOS Server，并且其 Server 应用的“设置”选项卡中启用了“在远程电脑上使用 Server 应用”选项时，你才能管理远程
    Mac。（见图 9-5。）


    ![A432412_1_En_9_Fig5_HTML.jpg](img/A432412_1_En_9_Fig5_HTML.jpg)


    图 9-5. 远程管理 macOS Server 实例所需的设置


    ### 设置团队成员访问权限


    如果你在专用 Mac 上运行 macOS Server，则应创建用户账户，以允许其他 Mac 上的用户连接到该服务器并访问可用服务。


    在侧边栏中，点击“账户”部分下的“用户”（见图 9-6）。这将弹出可以访问 macOS Server 的用户列表。使用添加（`+`）按钮为你网络上的其他 Mac
    用户创建账户。你在此处创建的凭证将供其他用户从其 Mac 连接到该服务器实例时使用，与他们用于登录自己 Mac 的凭证无关。


    ![A432412_1_En_9_Fig6_HTML.jpg](img/A432412_1_En_9_Fig6_HTML.jpg)


    图 9-6. 为其他团队成员创建用户账户


    当你的团队成员从 Xcode 连接到 Xcode Server 时，他们需要提供这些凭证。这将在本章后面的“向 Xcode 添加 Xcode Server
    凭证”主题中介绍。

    '
- fmt: '### Starting Xcode Server


    Launch the macOS server app and navigate to the `Xcode` option under the `Services`
    section in the sidebar. (See Figure [9-7](#A432412_1_En_9_Chapter.html#Fig7).)


    ![A432412_1_En_9_Fig7_HTML.jpg](A432412_1_En_9_Fig7_HTML.jpg)


    Figure 9-7. Starting Xcode Server


    You can use the on/off switch on the top right corner of the window to start/stop
    the Xcode Server process. By default, all services provided by the macOS server
    app are turned off.


    If this is the first time you are running Xcode Server on the computer, you will
    be asked to provide a path to Xcode on the local computer that can be used to
    create builds. If you have not installed Xcode, quit the macOS server app, install
    the latest version of Xcode from the Mac App Store, and resume the lesson from
    this point.


    Click on the `Choose Xcode…` button and select the `Xcode.app` application in
    your `Applications` directory. You can, in the future, choose to use a different
    version of Xcode to create builds from the Xcode server settings page.


    Xcode Server runs in its own user account. In previous versions this was a hidden
    user account created on the Mac. Since version 5.2 of Xcode Server, this account
    is just like any other account on your system and you can even log in to this
    account.


    When asked to provide an account for Xcode Server (see Figure [9-8](#A432412_1_En_9_Chapter.html#Fig8)),
    you can choose to create a new account or use an existing one. It is best practice
    to keep a dedicated non-administrative account for Xcode server, and not use your
    everyday account.


    ![A432412_1_En_9_Fig8_HTML.jpg](A432412_1_En_9_Fig8_HTML.jpg)


    Figure 9-8. Xcode Server User Account


    If you are using a single Mac setup that has Xcode server running on the same
    computer that you use for everyday development, you must log in to the dedicated
    user account that you have created for Xcode server. You can then use fast user
    switching to switch from the Xcode Server user account back to your everyday use
    account, and keep the Xcode Server process running in the background.


    **Note:** Xcode server refers to “builds” as “integrations.”


    Once you provide a user account to the Xcode server that it can use, you will
    be prompted to log in as that user (See Figure [9-9](#A432412_1_En_9_Chapter.html#Fig9)).


    ![A432412_1_En_9_Fig9_HTML.jpg](A432412_1_En_9_Fig9_HTML.jpg)


    Figure 9-9. Log in using a Dedicated User Account


    You can either choose to log in now, or do so later. If you chose to log in later
    then you can do so in a number of ways, including using the `Login` option built
    into the Xcode Server configuration page (see Figure [9-10](#A432412_1_En_9_Chapter.html#Fig10)).


    ![A432412_1_En_9_Fig10_HTML.jpg](A432412_1_En_9_Fig10_HTML.jpg)


    Figure 9-10. Login Option Within the Xcode Server Configuration Page


    **Note:** You can still proceed to configure the Xcode server without logging
    in to the designated account. However, you will not be able to integrate until
    you log in to the dedicated user account you have provided.


    ### Configuring Xcode Server


    Xcode Server allows you to configure various parameters, through a settings page
    including the following:


    - The Xcode version to use for integrations.

    - Developer Teams

    - Permissions

    - Repositories


    This settings page can be accessed using the `View` ➤ `Xcode` menu item. The settings
    page has two tabs labeled `Settings` and `Repositories` (see Figure [9-11](#A432412_1_En_9_Chapter.html#Fig11)).


    ![A432412_1_En_9_Fig11_HTML.jpg](A432412_1_En_9_Fig11_HTML.jpg)


    Figure 9-11. Xcode Server Configuration Page


    Xcode versions, permissions, and developer teams can be configured under the tab
    labeled `Settings`, and repositories can be configured under the tab labeled `Repositories`.


    ### Xcode Version


    To change the Xcode version that will be used for subsequent integrations, click
    on the `Choose Xcode…` button in the Xcode service settings page and select the
    `.app` file corresponding to the version of Xcode that you would like to use.


    ### Apple Developer Teams


    If you would like to use Xcode Server to deploy builds and run tests on provisioned
    development devices, you will need to add the server to one of the development
    teams that you use with your Apple developer account.


    Adding the server to a development team will allow Xcode Server to download the
    provisioning profiles and signing certificates it needs to prepare builds for
    your devices.


    To add the server to your development team, click on the `Add Team…` button in
    the Xcode service settings page (see Figure [9-12](#A432412_1_En_9_Chapter.html#Fig12)).


    ![A432412_1_En_9_Fig12_HTML.jpg](A432412_1_En_9_Fig12_HTML.jpg)


    Figure 9-12. Adding Xcode Server to your Apple Developer Account


    You will be asked to log in to your iOS developer account and select a developer
    team. Enter your iOS developer account credentials and click on `Sign-In` (see
    Figure [9-13](#A432412_1_En_9_Chapter.html#Fig13)).


    ![A432412_1_En_9_Fig13_HTML.jpg](A432412_1_En_9_Fig13_HTML.jpg)


    Figure 9-13. Sign In With Apple Developer Credentials


    ### Development Devices


    After having added a developer team to Xcode server, you can connect a provisioned
    development device to the Mac that is running Xcode Server. This device can be
    used to run automated tests. You will see all connected devices in the Development
    Devices list (see Figure [9-14](#A432412_1_En_9_Chapter.html#Fig14)). If you disconnect
    a device from the Mac, it will be removed from this list.


    ![A432412_1_En_9_Fig14_HTML.jpg](A432412_1_En_9_Fig14_HTML.jpg)


    Figure 9-14. Connected Devices are Visible in the Development Devices Section


    ### Repositories


    Xcode Server requires you to connect it to one or more source code repositories.
    The repositories themselves can be hosted remotely, or hosted within Xcode Server.
    For remotely hosted repositories, Xcode Server supports both Git and Subversion;
    however for locally hosted repositories, Xcode Server supports Git only.


    If your repositories are hosted on a remote server (such as BitBucket or GitHub),
    then you do not need to use any of the options within the repositories tab. Instead
    you will need to configure appropriate access credentials within Xcode on your
    development machine and these credentials will also need to be provided when creating
    a build job (also known as a Bot) on Xcode server from within Xcode.


    If your repositories are not hosted on a remote server, you can use the options
    in the repositories tab to create Git repositories that will be hosted within
    Xcode Server.'
