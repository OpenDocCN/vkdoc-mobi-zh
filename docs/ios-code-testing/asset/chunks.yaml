    # Configuring Application Transport Security


    The server that is used to host the images and metadata for this project does
    not support HTTPS connections. To allow plain vanilla HTTP connections, you will
    need to configure the project''s Application Transport Security (ATS) settings.
    In a real-world scenario you should always use HTTPS connections.


    Locate the`Info.plist`file under the`PhotoBook`group in the project navigator
    and click on it. Add a new dictionary key to this plist called`App Transport Security
    Settings`(see Figure [7-5](#A432412_1_En_7_Chapter.html#Fig5)). In this new dictionary,
    add a new Boolean key called`Allow Arbitrary Loads`with the value of`Yes`.


    ![A432412_1_En_7_Fig5_HTML.jpg](A432412_1_En_7_Fig5_HTML.jpg)


