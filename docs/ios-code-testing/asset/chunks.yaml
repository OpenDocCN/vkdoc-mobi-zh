    template. Use the following options while creating the new project (see Figure
    [11-3](#A432412_1_En_11_Chapter.html#Fig3)):


    ![A432412_1_En_11_Fig3_HTML.jpg](A432412_1_En_11_Fig3_HTML.jpg)


    Figure 11-3. Xcode Project Options Dialog


    *   Product Name: `TryQuickWithCocoaPods`

    *   Team: `None`

    *   Organization Name: Provide a suitable name

    *   Organization Identifier: Provide a suitable identifier

    *   Language: `Swift`

    *   Devices: `iPhone`

    *   Use Core Data: Unchecked

    *   Include Unit Tests: Checked

    *   Include UI Tests: Unchecked


    Once the project is created, quit Xcode and go back to the Terminal window and
    navigate to the folder on your Mac where you have created the new Xcode project.
    Create a new file called `Podfile` in this directory (with no extension) using
    the following command:


    ```

    $ touch Podfile

    ```


    Open the new file in TextEdit by typing the following command in the Terminal
    window and hitting Enter.


    ```

    $ open –e Podfile

    ```


    Using TextEdit, add the following lines to the `Podfile`, and save the file. Close
    TextEdit when you are finished making the changes.


    ```

    # Podfile

    use_frameworks!

    def testing_pods

    pod ''Quick''

    pod ''Nimble''

    end

    target ''TryQuickWithCocoaPodsTests'' do

    testing_pods

    end

    ```


    Return to the Terminal window and type the following command, and hit Enter:


    ```

    $ pod install

    ```


    After a few minutes, you will see a message similar to the following indicating
    that the installation and setup is complete (Figure [11-4](#A432412_1_En_11_Chapter.html#Fig4)).


    ![A432412_1_En_11_Fig4_HTML.jpg](A432412_1_En_11_Fig4_HTML.jpg)


    Figure 11-4. Result of the Pod Install Command


    ```

    Pod installation complete! There are two dependencies from the Podfile and two
    total pods installed.

    ```


    Look in the project directory for a new workspace file that has been created by
    `CocoaPods`. From now on you will have to use this workspace file and not the
    original `.xcodeproj` file (Figure [11-5](#A432412_1_En_11_Chapter.html#Fig5)).


    ![A432412_1_En_11_Fig5_HTML.jpg](A432412_1_En_11_Fig5_HTML.jpg)


    Figure 11-5. New Workspace Created by Cocoapods


    When you open the new workspace file (with extension `.xcode workspace`), you
    should see two projects in the workspace:


    *   `TryQuickWithCocoaPods`

    *   `Pods`


    If you expand the `Pods` project you will see folders for both `Quick` and `Nimble`
    (Figure [11-6](#A432412_1_En_11_Chapter.html#Fig6)). It is important to note that
    you will not make any changes to any of the files in the `Pods` project. All the
