    \ |\n\n视图模型还需要能够更新视图控制器上的UI元素，以反映应用状态或模型数据的变化。由于视图模型使用协议与视图控制器绑定，你需要向协议中添加一些方法，允许视图模型请求视图控制器更新用户界面元素。表[5-6](#A432412_1_En_5_Chapter.html#Tab6)列出了将要添加到`LoginViewControllerProtocol`中的方法。\n\
