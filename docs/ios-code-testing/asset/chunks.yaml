    You will receive several compiler errors at this point because the `CookieController`
    class does not exist yet. These tests define the following desired characteristics
    for the `CookieController` class:


    *   The `CookieController` class must have an initializer that does not accept
    any parameters.

    *   The `CookieController` class must have three arrays, one for each type of
    cookie.

    *   The `CookieController` class must have a method called `addGingerbreadCookie()`,
    which when called will add one gingerbread cookie to the relevant array.

    *   The `CookieController` class must have a method called `addShortbreadCookie()`,
    which when called will add one shortbread cookie to the relevant array.

    *   The `CookieController` class must have a method called `addChocolateChipCookie()`,
    which when called will add one chocolate chip cookie to the relevant array.

    *   The `CookieController` class must have a method called `reset()`, which when
    called will clear all the arrays.


    I have used class extensions to group tests for each method. The only advantage
    this provides is readability; feel free to move all the tests from extensions
    to the main class if you prefer. You may also have noticed that I have used long
    descriptive names for test methods. You should try to create descriptive names
    that describe the name of the method being tested, the initial conditions, and
    expected output.


    Create a new Swift class called `CookieController` under the `CookieFactory` group
    and update its contents to match Listing 2-5.


    ```swift

    import Foundation

    class CookieController : NSObject {

    var shortbreadCookies:[Cookie]?

    var gingerbreadCookies:[Cookie]?

    var chocolateChipCookies:[Cookie]?

    override init() {

    self.shortbreadCookies = [Cookie]()

    self.gingerbreadCookies = [Cookie]()

    self.chocolateChipCookies = [Cookie]()

    super.init()

    }

    func reset() {

    self.shortbreadCookies?.removeAll()

    self.gingerbreadCookies?.removeAll()

    self.chocolateChipCookies?.removeAll()

    }

    func addShortbreadCookie() -> Void {

    let cookie = Cookie(.shortbread)

    shortbreadCookies?.append(cookie)

    }

    func addGingerbreadCookie() -> Void {

    let cookie = Cookie(.gingerbread)

    gingerbreadCookies?.append(cookie)

    }

    func addChocolateChipCookie() -> Void {

    let cookie = Cookie(.chocolateChip)

    chocolateChipCookies?.append(cookie)

    }

    }

    Listing 2-5.

    CookieController.swift

    ```


    Save the file and use the **Product ➤ Test** menu item to run all tests. You should
    see all tests pass (see Figure 2-22).


