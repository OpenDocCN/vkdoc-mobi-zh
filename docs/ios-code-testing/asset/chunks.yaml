    \ + transaction.amount\n            } else {\n                balance = balance\
    \ + transaction.amount\n            }\n        }\n        return balance\n   \
    \ }\n}\n```\n\n`BankAccount` 对象中的单笔交易通过 `Transaction` 对象来表示。接下来展示一个简单 `Transaction`\
    \ 类的定义：\n\n```\nclass Transaction {\n    var description: String\n    var amount:\
    \ Float\n    var isCredit: Bool\n\n    init(description: String,\n         amount:\
    \ Float,\n         isCredit: Bool) {\n        self.description = description\n\
    \        self.amount = amount\n        self.isCredit = isCredit\n    }\n}\n```\n\
    \n结合这两个类，一个负面单元测试可用于验证调用 `BankAccount` 类的 `addTransaction()` 方法不会修改账户名称。该测试可编写如下：\n\
    \n```\nfunc testAddTransaction_DoesNotChangeAccountName() {\n    let bankAccount\
    \ = BankAccount(accountName: \"John Smith\",\n                               \
    \   accountNumber: \"14918\",\n                                  accountType:\
    \ .savingsAccount)\n    let transaction = Transaction(description: \"Salary\"\
    ,\n                                  amount: 100.0,\n                        \
    \          isCredit: true)\n    bankAccount.addTransaction(transaction)\n    XCTAssertTrue(bankAccount.accountName.compare(\"\
    John Smith\") == .orderedSame,\n                  \"Call to addTransaction should\
    \ have no effect on account name.\")\n}\n```\n\n断言功能尚未介绍，但稍后会提到。此测试确保调用 `addTransaction`\
    \ 时，`BankAccount` 实例的 `accountName` 变量值不会改变。\n\n### 测试套件\n\n测试套件即测试用例文件的集合。测试套件通常在\
    \ Xcode 项目导航器中拥有独立分组，并包含在与应用其余代码分离的独立构建目标中（图 1-1）。\n\n![A432412_1_En_1_Fig1_HTML.jpg](img/A432412_1_En_1_Fig1_HTML.jpg)\n\
    \n**图 1-1.** Xcode 中测试套件的独立文件夹分组\n\n单个 Xcode 项目可以包含多个测试套件，例如，一个测试套件可能包含单元测试，另一个则包含交互测试。在下一课中，你将学习配置\
    \ Xcode 构建方案，将特定测试套件纳入构建过程。\n\n### 断言\n\n断言是状态验证测试和交互测试的核心。断言代表单元测试的失败。通常，你的单元测试会调用对象上的某个方法，该方法可能执行一系列操作，例如返回值、修改对象中的某些值或调用其他方法。\n\
    \n如果你知道所调用方法的预期结果，就可以构建一个单元测试，用已知输入调用该方法并期望得到特定结果。如果调用方法的结果与预期值不符，测试将触发断言来指示失败。\n\
    \nXcode 自带的**标准单元测试框架**名为 `XCTest`，它包含多个宏，用于在单元测试中创建断言。表 1-1 列出了其中部分宏。\n\n**表\
    \ 1-1.** XCTest 断言宏\n\n| 宏 | 说明 |\n| --- | --- |\n| `XCTAssert(expression, message)`\
    \ | 如果 `expression` 的计算结果为 `false`，则生成失败。可提供可选的字符串 `message` 来说明失败原因。 |\n| `XCTAssertEqualObjects(expression1,\
    \ expression2, message)` | 当 `expression1` 不等于 `expression2` 时生成失败，其中 `expression1`\
    \ 和 `expression2` 均为对象。涉及的两个对象都必须实现 `Equatable`。可提供可选的字符串 `message` 来说明失败原因。 |\n\
    | `XCTAssertNotEqualObjects(expression1, expression2, message)` | 当 `expression1`\
    \ 等于 `expression2` 时生成失败，其中 `expression1` 和 `expression2` 均为对象。涉及的两个对象都必须实现 `Equatable`。可提供可选的字符串\
    \ `message` 来说明失败原因。 |\n| `XCTAssertEqual(expression1, expression2, message)`\
    \ | 当 `expression1` 不等于 `expression2` 时生成失败。此测试适用于**原始数据类型**。可提供可选的字符串 `message`\
    \ 来说明失败原因。 |\n| `XCTAssertNotEqual(expression1, expression2, message)` | 当 `expression1`\
    \ 等于 `expression2` 时生成失败。`expression1` 和 `expression2` 均为原始数据类型。可提供可选的字符串 `message`\
    \ 来说明失败原因。 |\n| `XCTAssertNil(expression, message)` | 当 `expression` 不是 `nil`\
    \ 时生成失败。可提供可选的字符串 `message` 来说明失败原因。 |\n| `XCTAssertNotNil(expression, message)`\
    \ | 当 `expression` 是 `nil` 时生成失败。可提供可选的字符串 `message` 来说明失败原因。 |\n| `XCTAssertTrue(expression,\
    \ message)` | 当 `expression` 的计算结果为 `false` 时生成失败。与 `XCTAssert()` 相同，提供此宏是为了创建更易读的测试。可提供可选的字符串\
    \ `message` 来说明失败原因。 |\n| `XCTAssertFalse(expression, message)` | 当 `expression`\
    \ 的计算结果为 `true` 时生成失败。可提供可选的字符串 `message` 来说明失败原因。 |\n\n以下代码片段展示了一个使用 `XCTAssertTrue`\
    \ 宏将会失败的单元测试。图 1-2 是 Xcode 测试导航器中显示测试失败的截图。\n\n![A432412_1_En_1_Fig2_HTML.jpg](img/A432412_1_En_1_Fig2_HTML.jpg)\n\
    \n**图 1-2.** 失败的单元测试\n\n```\nfunc testNumber1IsGreaterThanNumber2() {\n    let\
    \ number1 = 9218\n    let number2 = 673666\n    XCTAssertTrue(number1 > number2,\n\
    \                  \"number1 should be greater than number2\")\n}\n```\n\n该测试失败是因为它期望\
    \ `number1` 大于 `number2`。修复方法很简单，只需将 `number1` 的值修改为大于 `number2` 即可：\n\n```\n\
    func testNumber1IsGreaterThanNumber2() {\n    let number1 = 921800\n    let number2\
    \ = 673666\n    XCTAssertTrue(number1 > number2,\n                  \"number1\
    \ should be greater than number2\")\n}\n```\n\n这个特定的测试显然没有太大实际用途；它没有调用其他对象的方法，也没有改变对象的状态。在此仅作为演示断言工作方式的示例。\n"
- fmt: '### Instantiating Classes for Testing


    Instantiating classes in isolation can sometimes get very tricky. A class’s initializer
    may require several parameters, each of which may be objects themselves. The problem
    is compounded if one of the dependent classes you are instantiating requires access
    to a system resource such as a network connection, file, or database.


    To be able to write meaningful and succinct unit tests, you need to be able to
    instantiate your subject under test without having to worry too much about building
    its dependencies.


    The most common solution to the problem of instantiating an object’s dependencies
    is to create fake “stunt double” versions of the dependencies. For this approach
    to work, these fake objects should look like the real object, and be much easier
    to instantiate. These fake objects could, for instance, implement the same protocols
    as the objects they are trying to emulate and perform harmless functionality within
    method implementations.


    Such objects could easily be used as dependencies for the class under test, and
    allow you to create meaningful tests. Two types of fake objects are commonly found
    with unit tests:


    - **Stub object**. A stub object (also known as a stub), is a fake object that
    can be used in place of a real dependency, is significantly easier to instantiate,
    and provides harmless method implementations of the object it is trying to emulate.

    - **Mock object**. A mock object (also known as a mock), is similar to a stub.
    However, the key difference is that a mock is used in a test assertion, or asserted
    against.


    For example, if you were writing a test that calls a method on object `A` and
    expects a different method on object `B` to be called by object `A`, then object
    `B` is a mock object because your test method expects a method to be called on
    object `B`. Any other objects `C`, `D`, `E` that may have been instantiated to
    assist writing the test, but are not the target of your test’s expectations will
    be called stubs.


    ## Principles of Test-Driven Development


    In this section you will learn about some of the key principles of TDD. These
    principles are applicable regardless of the programming language, target platform,
    or IDE choice.


    ### Test First


    For unit tests to truly drive development, they need to be written before the
    code that they will test. In fact, one of the key principles of TDD is that the
    tests are written first, and the developer then focuses on writing the minimum
    amount of code needed to make all tests pass. When tests are written first, the
    resulting software tends to be more modularized because developers are forced
    to think of the software in terms of small components that are built independently
    and interact with each other.


    The tests collectively define the acceptance criteria of the project. If you have
    a comprehensive suite of tests, the code is considered ready as soon as all tests
    pass and no further changes to the code base are required. In practice, a developer
    writes a single test, and then runs it to check if it fails. The developer then
    proceeds to write the code to make this one test pass. This is an iterative process,
    and over time a comprehensive set of tests is created by the developer, which
    serves as both the acceptance criteria as well as living documentation for the
    code base.


    Once all tests pass, the feature in question is deemed to be complete. This process
    is iterative, with each iteration creating new tests and code to make these tests
    pass.


    It is not necessary for the same developer to write both the subject under test
    as well as the unit tests. In fact, it is quite common for a senior developer
    to use unit tests to specify the behavior of a class for a junior developer. Given
    these tests, the junior developer can implement the class and knows his work is
    done when all the unit tests pass.


    ### Red – Green – Refactor


    The test first principle requires you to write tests up front. If you were to
    follow this principle and write a test for code that does not yet exist, chances
    are that the test will not compile, or it will compile and it will fail.


    This stage of development that involves creating a failing test that encapsulates
    the expected outcome of the system under test is called the **Red** stage. The
    color red has to do with the use of the red color by popular IDEs like `Xcode`
    and `Visual Studio` to indicate failed tests in a summary view.


    No one likes a failing test. Once you have created a failing test, then the next
    step is to fix the failing test by writing the minimum amount of code to make
    the test pass. This second stage is called the **Green** stage. The color green
    has to do with its use by popular IDEs to indicate passing tests in a summary
    view.


    Reaching the green stage may involve both creating new code as well as modifying
    existing code. The coding effort focuses on making the bare minimum change to
    fix the test. To put it another way, something that is “good enough” will be fine.


    It is quite common to find that in order to fix one failing test, you need to
    create a new class, or method, and begin a test first approach to this sub problem,
    thus creating a series of failing tests. This is perfectly normal and will all
    be resolved once you have fixed the innermost layer of tests.


    After having successfully fixed a set of failing tests, you may look at the code
    you have written and decide that it needs refactoring. The final stage of the
    red-green-refactor approach is about optionally refactoring the code that was
    written in the second stage while ensuring that you do not break any existing
    tests.


    ### Write the Minimum Amount of Code


    This practice requires that you do not write any code that is not needed. When
    you are in the process of building a method to satisfy a failing test, it is tempting
    to add extra parameters to the method, or create an additional method anticipating
    future needs. This practice must be avoided, and you really must then always make
    sure you have tests covering the momentarily superfluous functionality that you
    have built.


    ### Remove Duplication


    This is an activity that you will find yourself undertaking as part of a refactoring
    exercise. The idea is to remove duplicate functionality from your classes. Always
    remember to have a set of unit tests in place before you begin refactoring so
    that you can be sure that you are not changing the behavior of the class.


    It is also common to apply this principle to the tests themselves. Over time as
    the number of unit tests in your project increases, you will find yourself refactoring
    the tests themselves, removing common functionality between tests into its own
    independent test.


    ## Summary


    In this chapter you have been introduced to the idea of Test-Driven Development,
    the difference between TDD and Unit Tests, different types of unit tests, assertions,
    and general principles of TDD. In the next chapter you will explore some of these
    topics in more detail.


    ## Note


    1. Extreme Programming Explained, Kent Beck, 1999. Addison Wesley. ISBN: 0201616416.'
