    \ component:Int) -> Int` | 方法 | 由视图控制器的 `pickerView(_ pickerView: UIPickerView,\
    \ numberOfRowsInComponent component: Int)` 方法调用。 |\n| `func titleForRow(_ row:Int,\
    \ component:Int) -> String?` | 方法 | 由视图控制器的 `pickerView(_ pickerView: UIPickerView,\
    \ titleForRow row: Int, forComponent component: Int)` 方法调用。 |\n| `func didSelectRow(_\
    \ row:Int, component:Int) -> Void` | 方法 | 由视图控制器的 `pickerView(_ pickerView: UIPickerView,\
    \ didSelectRow row: Int, inComponent component: Int)` 方法调用。 |\n| `func onViewListings()\
    \ -> Void` | 方法 | 由视图控制器的 `onViewListings(_ sender: Any)` 方法调用。 |\n| `func viewModelForSelectedArea()\
    \ -> RestaurantTableViewModel?` | 方法 | 由视图控制器的 `prepare(for segue: UIStoryboardSegue,\
    \ sender: Any?)` 方法调用。 |\n| `func loadRestaurantData(filePath:String?) -> Void`\
    \ | 方法 | 由视图模型类的 `init()` 方法调用。 |\n| `init(view:SearchViewControllerProtocol)`\
    \ | 方法 | 由视图控制器的 `viewDidLoad()` 方法调用。 |\n\n`SearchViewModel` 类要求定义一个名为 `SearchViewControllerProtocol`\
    \ 的协议，并由 `SearchViewController` 类实现。清单 12-10 描述了该协议。\n\n```swift\nimport Foundation\n\
    protocol SearchViewControllerProtocol : class {\n    func setNavigationTitle(_\
    \ title:String)\n    func enableRestaurantListingsButton(_ state:Bool)\n    func\
    \ displayResultsScreen()\n}\n```\n\n**清单 12-10.** `SearchViewControllerProtocol.swift`\n\
    \n这些方法在 `SearchViewController.swift` 中通过将以下类扩展添加到文件末尾来实现：\n\n```swift\nextension\
    \ SearchViewController : SearchViewControllerProtocol {\n    func setNavigationTitle(_\
    \ title:String) {\n        self.title = title\n    }\n    func enableRestaurantListingsButton(_\
    \ state:Bool) {\n        self.viewRestaurantButton.isEnabled = state\n    }\n\
    \    func displayResultsScreen() {\n        self.performSegue(withIdentifier:\
    \ \"presentSearchResults\", sender: self)\n    }\n}\n```\n\n完整的 `SearchViewModel`\
    \ 类在清单 12-11 中提供。如果您想检查相关测试的代码，请使用以下 URL 从 GitHub 匿名下载完成的项目：\n\n[`https://github.com/asmtechnology/Lesson12.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson12.iOSTesting.2017.Apress.git)\n\
    \n```swift\nimport Foundation\nclass SearchViewModel : NSObject {\n    var restaurants:\
    \ [String: [Restaurant]]\n    var selectedArea:String?\n    weak var view:SearchViewControllerProtocol?\n\
    \    \n    init(view:SearchViewControllerProtocol) {\n        self.view = view\n\
    \        self.restaurants = [String: [Restaurant]]()\n        super.init()\n \
    \       let path = Bundle.main.path(forResource: \"RestaurantData\", ofType: \"\
    json\")\n        loadRestaurantData(filePath:path)\n    }\n    \n    func loadRestaurantData(filePath:String?)\
    \ -> Void {\n        guard let filePath = filePath,\n              let fileData\
    \ = try? Data(contentsOf: URL(fileURLWithPath: filePath)),\n              let\
    \ array = try? JSONSerialization.jsonObject(with: fileData, options: JSONSerialization.ReadingOptions.mutableContainers)\
    \ as? NSArray else {\n            return\n        }\n        for item in array!\
    \ {\n            guard let dictionary = item as? [String : AnyObject] else {\n\
    \                continue\n            }\n            if let restaurant = Restaurant(dictionary),\n\
    \               let area = restaurant.area {\n                if self.restaurants[area]\
    \ == nil {\n                    self.restaurants[area] = [Restaurant]()\n    \
    \            }\n                self.restaurants[area]?.append(restaurant)\n \
    \           }\n        }\n    }\n    \n    func performInitialViewSetup() {\n\
    \        view?.setNavigationTitle(\"Restaurant Finder\")\n        view?.enableRestaurantListingsButton(false)\n\
    \    }\n    \n    func numberOfComponents() -> Int {\n        return 1\n    }\n\
    \    \n    func numberOfRowsInComponent(_ component:Int) -> Int {\n        return\
    \ self.restaurants.count\n    }\n    \n    func titleForRow(_ row:Int, component:Int)\
    \ -> String? {\n        let keys = String\n        if row = keys.count {\n   \
    \         return nil\n        }\n        return keys[row]\n    }\n    \n    func\
    \ didSelectRow(_ row:Int, component:Int) -> Void {\n        let keys = String\n\
    \        if row = keys.count {\n            return\n        }\n        self.selectedArea\
    \ = keys[row]\n        self.view?.enableRestaurantListingsButton(true)\n    }\n\
    \    \n    func onViewListings() -> Void {\n        self.view?.displayResultsScreen()\n\
    \    }\n    \n    func viewModelForSelectedArea() -> RestaurantTableViewModel?\
    \ {\n        guard let selectedArea = self.selectedArea else {\n            return\
    \ nil\n        }\n        let keys = String\n        if keys.contains(selectedArea)\
    \ == false {\n            return nil\n        }\n        return RestaurantTableViewModel(selectedArea,\
    \ restaurantList:self.restaurants[selectedArea])\n    }\n}\n```\n\n**清单 12-11.**\
    \ `SearchViewModel.swift`\n\n在采用测试驱动方法构建 `SearchViewModel` 类时，您需要创建一个模拟视图控制器对象来实例化视图模型，并测试视图模型与视图控制器之间的绑定。\n\
