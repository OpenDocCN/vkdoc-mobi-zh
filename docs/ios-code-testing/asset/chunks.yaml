    This test calls the`fetchFromURL(urlString, success, failure)`method of the`ServiceController`class.
    The`ServiceController`class is set up to have a nil`URLSession`, and the test
    expects the failure closure will be called with a specific error code.


    ```

    testfetchFromURL_nilURL_fails_WithErrorCode101()

    ```


    This test calls the`fetchFromURL(urlString, success, failure)`method of the`ServiceController`class
    with a nil value for the`urlString`parameter. The test expects the failure closure
    will be called with a specific error code.


