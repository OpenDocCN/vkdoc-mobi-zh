    # 模型-视图-控制器架构模式


    `Cocoa Touch`、`UIKit`以及其他 Apple 框架提供了在 iOS 应用中实现模型-视图-控制器架构所需的所有基础设施：


    -   `模型`：可以是任何 `NSObject` 子类，甚至是 `NSManagedObjectModel` 子类。

    -   `视图`：可以是任何 `UIView` 子类，例如 `UILabel`、`UIButton` 和 `UIScrollView`。

    -   `控制器`：可以是任何 `NSObject` 子类。


    然而，Apple 还创建了“视图控制器”的概念，它将视图和控制器合并到一个单一的类中。事实上，视图控制器非常普遍，以至于许多刚接触 iOS 开发的开发者并未意识到完全可以独立创建控制器。


    图 3-2 展示了模型-视图-控制器架构模式在典型 iOS 应用中的样子，其中视图控制器同时拥有模型和视图。三个组件的角色总结如下：


    ![A432412_1_En_3_Fig2_HTML.jpg](img/A432412_1_En_3_Fig2_HTML.jpg)


    **图 3-2.** 模型-视图-控制器模式


    -   `视图`：负责渲染模型，向视图控制器请求数据，将用户交互事件传递给视图控制器。

    -   `模型`：负责存储数据。

    -   `视图控制器`：从模型读取数据并提供给视图，更新模型，处理用户交互事件。


    然而，由于视图和视图控制器紧密耦合，且视图控制器拥有视图，这种架构模式开始变得类似于图 3-3。事实上，一个视图与不同的视图控制器配对的情况极为罕见。


    ![A432412_1_En_3_Fig3_HTML.jpg](img/A432412_1_En_3_Fig3_HTML.jpg)


    **图 3-3.** 视图、视图控制器与模型对象之间的交互


    如果你已经开发 iOS 应用几个月，你很快就会发现，就代码行数而言，视图控制器通常是项目中最大的文件。这是因为视图控制器通常充当代理、数据源，包含网络代码、视图管理逻辑以及发起网络调用等。视图控制器还通常实现多个协议，这导致控制器逻辑与支持协议的代码混杂在一起。这些臃肿的视图控制器通常被称为“巨型视图控制器”。


    巨型视图控制器中的某些逻辑确实属于视图控制器，但其中有很大一部分是展示逻辑、模型转换逻辑和网络逻辑，这些逻辑理想情况下应该放在独立的辅助对象或控制器中。


    ## 模型-视图-控制器的可测试性问题


    虽然测试模型-视图-控制器模式中的模型层不会带来重大挑战，但另一方面，测试视图控制器却存在一些问题：


    -   **难以实例化**：在测试中实例化视图控制器可能并不简单；所有 `IBOutlet` 都需要使用合适的子类进行桩接。你需要将 XIB 或 storyboard（故事板）包含在测试目标中，并可能最终实例化一个复杂的
    UI 层对象栈，例如导航控制器和表格视图。仅仅为了能够实例化一个视图控制器而将 storyboard 添加到测试目标，会使你的测试非常脆弱，最终你可能会质疑这些测试本身的价值。

    -   **难以模拟**：由于视图控制器中代码的紧密耦合特性，通常很难单独测试某一个方法。

    -   **在单元测试中测试 UI 层**：单元测试不应该测试 UI 层；视图控制器模糊了执行 UI 逻辑的代码与执行业务逻辑的代码之间的界限。


    # 模型-视图-视图模型架构模式


    模型-视图-视图模型（MVVM）架构模式由微软开发，旨在帮助开发者构建基于 XAML 的 WPF 应用程序，但正如你将很快了解到的，MVVM 可以很容易地适配使用在
    iOS/Swift 应用中。MVVM 是 MVC 的一种扩展，我们将视图和控制器正式耦合在一起，但将所有展示逻辑从控制器中移出，放入一个名为 `viewModel`
    的新对象中。


    在 iOS/Swift 环境中，视图的角色由视图与视图控制器的组合来承担（见图 3-4）。


    ![A432412_1_En_3_Fig4_HTML.jpg](img/A432412_1_En_3_Fig4_HTML.jpg)


    **图 3-4.** iOS 上的模型-视图-视图模型模式


    三个组件的角色总结如下：


    -   `模型`：负责存储数据，与 `viewModel` 保持双向通信。

    -   `视图`/`视图控制器`：代表模式中的视图部分，处理用户交互事件。与 `viewModel` 保持双向通信。

    -   `视图模型`：处理展示逻辑，与模型和视图/视图控制器均保持双向通信。处理与可能提供特定功能（如复杂业务逻辑和网络请求）的其他控制器的通信。


    微软最初的 MVVM 模式广泛使用 XAML 绑定来连接该模式的三个主要组件。在 iOS/Swift 应用中，有两种可用的选项来连接此模式的各个主要组件：


    -   **使用 Swift 协议**：该模式的主要组件通过一组定义良好的协议进行交互。每个组件实现相关的一组协议。

    -   **使用 ReactiveCocoa / RxSwift**：现已出现第三方库，允许 Swift 开发者应用响应式编程原理，在该模式的主要组件之间创建绑定。


    > **注**：响应式编程不在本书的讨论范围内。本书中的所有示例都使用基于协议的方法。


    ## MVVM 的优势


    本节列出了 MVVM 模式相对于 M-VC 模式的一些关键优势：


    -   MVVM 模式将代码从单个视图控制器类中移出，并将这些代码分布到一组更细粒度的类上；这减小了任何单个类的大小，从而解决了巨型视图控制器的问题。

    -   视图/视图控制器组件与模型松散耦合；并且通过 `viewModel`，团队中的开发者可以独立且并行地构建这些组件。适应 UI 变更也显著更容易，而对模型或视图模型层没有重大影响。

    -   如果实现得当，`viewModel` 中不应直接引用 `UIKit`。视图和 `viewModel` 是松散耦合的。这使得在测试用例中实例化视图模型变得容易。一个合适的模拟或桩视图只需要实现视图所需的相关协议。

    -   将视图层与视图模型层解耦带来的好处是，视图层可以使用不同的 UI 技术来实现。例如，视图模型和模型代码可以通过简单地替换视图层，在 MacOS 应用中重复使用。

    -   MVVM 基于松散耦合的类，提高了可测试性。一层的类可以独立于其他层进行实例化。使用协议来定义参与类之间的契约，使得桩接/模拟依赖关系的任务显著更容易。

    -   MVVM 促进了对象之间的关注点分离。当对象没有紧密耦合时，产生的代码更易于应对变更，并且从长远来看更易于维护。


    ## 视图模型实例化


    你可以使用多种策略来实例化视图模型。本节将探讨你在使用 MVVM 模式创建 iOS 应用时会遇到的几个常见场景。

    '
- fmt: "### Isolated View Controller\n\nIn case you are dealing with an isolated view\
    \ controller, a common strategy is to instantiate the view model inside the `viewDidLoad()`\
    \ method of the view controller class. The following code snippet demonstrates\
    \ this strategy:\n\n```\nclass CountriesViewController: UIViewController {\n \
    \   private var viewModel: CountriesViewModel?\n    \n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        self.viewModel = CountriesViewModel(view:\
    \ self, title: \"Select a country\")\n    }\n}\n```\n\nA few noteworthy points\
    \ about this strategy:\n- The view controller owns the view model via a strong\
    \ `private var`.\n- The view model is injected with a reference to the view/view\
    \ controller in the initializer. The view model will hold a weak reference to\
    \ the view/view controller.\n- The view model's initializer can also be used to\
    \ inject other parameters that are required to set it up.\n\nChapter [5](#A432412_1_En_5_Chapter.html)\
    \ will examine techniques to create isolated view controller-based applications\
    \ using TDD techniques and the MVVM pattern.\n\n### Table View Controllers\n\n\
    When you are dealing with a table view controller, the view model for the table\
    \ view controller will provide information on the number of rows and sections.\
    \ The view model can also be used to maintain the index of the currently selected\
    \ cell. But where does the data within each cell come from?\n\nEach table view\
    \ cell is also a view in its own right, and the MVVM pattern must be applied to\
    \ the individual table view cells as well as the enclosing table view. You could\
    \ potentially use the same view model for both the table view as well as individual\
    \ cells, but this approach overloads the view model with multiple responsibilities.\n\
    \nA better approach is to use different view models for the table view and the\
    \ individual table view cells. This approach keeps the size of each view model\
    \ small, as each view model is only going to be responsible for a single view,\
    \ and not child views.\n\nInstantiating the view model for the table view controller\
    \ is a simple matter of putting a few lines of code in the `viewDidLoad()` method\
    \ of the table view controller. How and when does one instantiate view models\
    \ for the individual cells?\n\nA good approach is to build a factory method within\
    \ the view model of the table view controller, and use this factory method to\
    \ get view models for the individual cells.\n\nThe factory method can encapsulate\
    \ the nitty gritty of creating a view model for a cell, and giving the cell view\
    \ model a relevant model object. The factory method could also be moved out of\
    \ the table view controller's view model into its own class, in which case you\
    \ are using a dedicated object for a view model construction.\n\nAn ideal place\
    \ to call the view model factory (either method or object), would be within the\
    \ `tableView(_ tableView:, cellForRowAt:)` method of the table view controller.\
    \ This approach is demonstrated in the following snippet:\n\n```\noverride func\
    \ tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell\
    \ {\n    let cell = tableView.dequeueReusableCell(withIdentifier: \"CountryCell\"\
    , for: indexPath) as? CountriesTableViewCell\n    guard let viewModel = tableViewModel,\n\
    \          let countriesTableViewCell = cell else {\n        return UITableViewCell()\n\
    \    }\n    let cellViewModel = viewModel.cellViewModel(forIndexPath: indexPath)\n\
    \    countriesTableViewCell.viewModel = cellViewModel\n    return countriesTableViewCell\n\
    }\n```\n\nIn this snippet a custom `UITableViewCell` instance is obtained by using\
    \ the `dequeueReusableCell(withIdentifier:, for)` method of the table view:\n\n\
    ```\nlet cell = tableView.dequeueReusableCell(withIdentifier: \"CountryCell\"\
    , for: indexPath) as? CountriesTableViewCell\n```\n\nA factory method called `cellViewModel(forIndexPath:)`\
    \ is called on the table view controller's view model:\n\n```\nlet cellViewModel\
    \ = viewModel.cellViewModel(forIndexPath: indexPath)\n```\n\nThis method returns\
    \ a view model for the table view cell, which is then assigned to a property of\
    \ the table view cell, before returning the cell:\n\n```\ncountriesTableViewCell.viewModel\
    \ = cellViewModel\nreturn countriesTableViewCell\n```\n\nThis snippet assumes\
    \ that the table view cell will own the cell view model.\n\n### Navigation Controller-Based\
    \ Apps\n\nMaster-detail apps are quite common on iOS. These applications are usually\
    \ implemented using a table view controller within a navigation controller. When\
    \ a user taps on a cell in the table view, a push segue is triggered to slide\
    \ the detail view from the right. The detail view controller that appears usually\
    \ displays information that is related to the cell that was tapped in the table\
    \ view.\n\nWhen building such an application using the MVVM pattern, it should\
    \ be quite obvious by now that the table view controller (master view) will have\
    \ its own view model, and the detail view controller that is subsequently pushed\
    \ onto the navigation stack will also have its own view model.\n\nThe challenge\
    \ in this case is building the detail view model with the correct model object\
    \ so that the detail view will contain the correct information.\n\nAs in the previous\
    \ section, you can use the factory method approach to instantiate either, or both\
    \ view models. The factory method will need to be called from the `prepare(for\
    \ segue: UIStoryboardSegue, sender: Any?)` method of the master table view controller\
    \ class.\n\nYou will also need to ensure that the master view model is capable\
    \ of tracking the selected cell index. This is so that the appropriate detail\
    \ model can be linked to the detail view model.\n\nThis approach can also be applied\
    \ to collection view controllers as collection view controllers are similar in\
    \ many respects to table view controllers. Chapter [6](#A432412_1_En_6_Chapter.html)\
    \ covers the topic of building MVVM-based collection view controllers using TDD\
    \ techniques.\n\nListings [3-1](#A432412_1_En_3_Chapter.html#Par80) – [3-5](#A432412_1_En_3_Chapter.html#Par103)\
    \ demonstrate how the MVVM pattern can be applied to a table view controller.\
    \ The listings collectively form parts of an application that displays a list\
    \ with the names of a few common colors. When a user selects a color from this\
    \ list, a detail view, painted with the selected color is presented (see Figure\
    \ [3-5](#A432412_1_En_3_Chapter.html#Fig5)).\n\n![A432412_1_En_3_Fig5_HTML.jpg](A432412_1_En_3_Fig5_HTML.jpg)\n\
    \n**Figure 3-5.** The ColorList App\n\nThe complete source code for the project,\
    \ along with unit tests, can be downloaded anonymously from github using the following\
    \ URL:\n\n[`https://github.com/asmtechnology/Lesson03.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson03.iOSTesting.2017.Apress.git)\n\
    \nThere are five key classes involved in this snippet:\n- `ColorListTableViewController`:\
    \ This is a subclass of `UITableViewController` and presents the user with a list\
    \ of colors.\n- `ColorDetailViewController`: This is a subclass of `UIViewController`\
    \ and is displayed when the user selects a color from the list of colors.\n- `ColorTableViewModel`:\
    \ This is the view model for the color list table view controller class.\n- `ColorDetailViewModel`:\
    \ This is the view model for the color detail view controller class.\n- `Color`:\
    \ Represents the model for this project.\n\nFor the purpose of brevity, protocols\
    \ are not listed in this snippet. You can, however, download the project and examine\
    \ the protocols in detail.\n\nLet us begin by examining the code for the `ColorListTableViewController`\
    \ class:"
  raw: '### Isolated View Controller


    In case you are dealing with an isolated view controller, a common strategy is
    to instantiate the view model inside the viewDidLoad() method of the view controller
    class. The following code snippet demonstrates this strategy:


    ```

    class CountriesViewController: UIViewController {

    private var viewModel:CountriesViewModel?

    override func viewDidLoad() {

    super.viewDidLoad()

    self.viewModel = CountriesViewModel(view: self,

    title:"Select a country")

    }

    }

    ```


    A few noteworthy points about this strategy:


    *   The view controller owns the view model via a strong private var.

    *   The view model is injected with a reference to the view/view controller in
    the initializer. The view model will hold a weak reference to the view/view controller.

    *   The view model’s initializer can also be used to inject other parameters that
    are required to set it up.


    Chapter [5](#A432412_1_En_5_Chapter.html) will examine techniques to create isolated
    view controller-based applications using TDD techniques and the MVVM pattern.


    ### Table View Controllers


    When you are dealing with a table view controller, the view model for the table
    view controller will provide information on the number of rows and sections. The
    view model can also be used to maintain the index of the currently selected cell.
    But where does the data within each cell come from?


    Each table view cell is also a view in its own right, and the MVVM pattern must
    be applied to the individual table view cells as well as the enclosing table view.
    You could potentially use the same view model for both the table view as well
    as individual cells, but this approach overloads the view model with multiple
    responsibilities.


    A better approach is to use different view models for the table view and the individual
    table view cells. This approach keeps the size of each view model small, as each
    view model is only going to be response responsible for a single view, and not
    child views.


    Instantiating the view model for the table view controller is a simple matter
    of putting a few lines of code in the viewDidLoad() method of the table view controller.
    How and when does one instantiate view models for the individual cells?


    A good approach is to build a factory method within the view model of the table
    view controller, and use this factory method to get view models for the individual
    cells.


    The factory method can encapsulate the nitty gritty of creating a view model for
    a cell, and giving the cell view model a relevant model object. The factory method
    could also be moved out of the table view controller’s view model into its own
    class, in which case you are using a dedicated object for a view model construction.


    An ideal place to call the view model factory (either method or object), would
    be within the `tableView(_ tableView:, cellForRowAt:)`method of the table view
    controller. This approach is demonstrated in the following snippet:


    ```

    override func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath)
    -> UITableViewCell {

    let cell = tableView.dequeueReusableCell(withIdentifier: "CountryCell", for: indexPath)
    as? CountriesTableViewCell

    guard let viewModel = tableViewModel,

    let countriesTableViewCell = cell else {

    return UITableViewCell()

    }

    let cellViewModel =

    viewModel.cellViewModel(forIndexPath: indexPath)

    countriesTableViewCell.viewModel = cellViewModel

    return countriesTableViewCell

    }

    ```


    In this snippet a custom UITableViewCell instance is obtained by using the dequeReusableCell(withIdentifier:,
    for) method of the table view:


    ```

    let cell = tableView.dequeueReusableCell(withIdentifier: "CountryCell", for: indexPath)
    as? CountriesTableViewCell

    ```


    A factory method called cellViewModel(forIndexPath:) is called on the table view
    controller’s view model :


    ```

    let cellViewModel = viewModel.cellViewModel(forIndexPath: indexPath)

    ```


    This method returns a view model for the table view cell, which is then assigned
    to a property of the table view cell, before returning the cell:


    ```

    countriesTableViewCell.viewModel = cellViewModel

    return countriesTableViewCell

    ```


    This snippet assumes that the table view cell will own the cell view model.


    ### Navigation Controller-Based Apps


    Master-detail apps are quite common on iOS. These applications are usually implemented
    using a table view controller within a navigation controller. When a user taps
    on a cell in the table view, a push segue is triggered to slide the detail view
    from the right. The detail view controller that appears usually displays information
    that is related to the cell that was tapped in the table view.


    When building such an application using the MVVM pattern , it should be quite
    obvious by now that the table view controller (master view) will have its own
    view model , and the detail view controller that is subsequently pushed onto the
    navigation stack will also have its own view model.


    The challenge in this case is building the detail view model with the correct
    model object so that the detail view will contain the correct information.


    As in the previous section, you can use the factory method approach to instantiate
    either, or both view models. The factory method will need to be called from the
    prepare(for segue: UIStoryboardSegue, sender: Any?) method of the master table
    view controller class.


    You will also need to ensure that the master view model is capable of tracking
    the selected cell index. This is so that the appropriate detail model can be linked
    to the detail view model .


    This approach can also be applied to collection view controllers as collection
    view controllers are similar in many respects to table view controllers. Chapter
    [6](#A432412_1_En_6_Chapter.html) covers the topic of building MVVM-based collection
    view controllers using TDD techniques.


    Listings [3-1](#A432412_1_En_3_Chapter.html#Par80) – [3-5](#A432412_1_En_3_Chapter.html#Par103)
    demonstrate how the MVVM pattern can be applied to a table view controller. The
    listings collectively form parts of an application that displays a list with the
    names of a few common colors. When a user selects a color from this list, a detail
    view, painted with the selected color is presented (see Figure [3-5](#A432412_1_En_3_Chapter.html#Fig5)).


    ![A432412_1_En_3_Fig5_HTML.jpg](A432412_1_En_3_Fig5_HTML.jpg)


    Figure 3-5.


    The ColorList App


    The complete source code for the project, along with unit tests, can be downloaded
    anonymously from github using the following URL:


    [`https://github.com/asmtechnology/Lesson03.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson03.iOSTesting.2017.Apress.git)


    There are five key classes involved in this snippet :


    *   ColorListTableViewController : This is a subclass of UITableViewController
    and presents the user with a list of colors.

    *   ColorDetailViewController : This is a subclass of UIViewController and is
    displayed when the user selects a color from the list of colors.

    *   ColorTableViewModel : This is the view model for the color list table view
    controller class.

    *   ColorDetailViewModel : This is the view model for the color detail view controller
    class.

    *   Color : Represents the model for this project.


    For the purpose of brevity, protocols are not listed in this snippet. You can,
    however, download the project and examine the protocols in detail.


    Let us begin by examining the code or the ColorListTableViewController class:'
  trans: "\n### 独立的视图控制器\n\n当处理独立的视图控制器时，一种常见策略是在视图控制器的 `viewDidLoad()` 方法中实例化视图模型。以下代码片段演示了这一策略：\n\
    \n```\nclass CountriesViewController: UIViewController {\n    private var viewModel:\
    \ CountriesViewModel?\n    \n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        self.viewModel = CountriesViewModel(view: self, title: \"Select a country\"\
    )\n    }\n}\n```\n\n关于此策略的几点注意事项：\n- 视图控制器通过强引用的 `private var` 拥有视图模型。\n- 视图模型在初始化时被注入了对视图/视图控制器的引用。视图模型将持有一个对视图/视图控制器的弱引用。\n\
    - 视图模型的初始化器也可用于注入设置时所需的其他参数。\n\n第五章 5 将探讨如何使用 TDD 技术和 MVVM 模式创建基于独立视图控制器的应用。\n\
    \n### 表视图控制器\n\n当处理表视图控制器时，表视图控制器的视图模型将提供行数和分区数的信息。视图模型还可用于维护当前选中单元格的索引。但每个单元格中的数据从何而来？\n\
    \n每个表视图单元格本身也是一个视图，因此 MVVM 模式必须同时应用于单个表视图单元格及其所在的表视图。你可能会考虑对表视图和单个单元格使用相同的视图模型，但这种方法会使视图模型承担过多职责。\n\
    \n更好的方法是为表视图和单个表视图单元格使用不同的视图模型。这种方法能保持每个视图模型的规模较小，因为每个视图模型仅负责单个视图，而不是其子视图。\n\n\
    实例化表视图控制器的视图模型很简单，只需在表视图控制器的 `viewDidLoad()` 方法中添加几行代码即可。那么，如何以及在何时为单个单元格实例化视图模型呢？\n\
    \n一个好的方法是在表视图控制器的视图模型内部构建一个工厂方法，并用此工厂方法来获取单个单元格的视图模型。\n\n工厂方法可以封装为单元格创建视图模型的具体细节，并为单元格视图模型提供相关的模型对象。工厂方法也可以从表视图控制器的视图模型中移出，放到其自己的类中，这种情况下，你将使用一个专用对象来构建视图模型。\n\
    \n调用视图模型工厂（无论是方法还是对象）的理想位置是在表视图控制器的 `tableView(_ tableView:, cellForRowAt:)` 方法中。以下代码片段演示了这一方法：\n\
    \n```\noverride func tableView(_ tableView: UITableView, cellForRowAt indexPath:\
    \ IndexPath) -> UITableViewCell {\n    let cell = tableView.dequeueReusableCell(withIdentifier:\
    \ \"CountryCell\", for: indexPath) as? CountriesTableViewCell\n    guard let viewModel\
    \ = tableViewModel,\n          let countriesTableViewCell = cell else {\n    \
    \    return UITableViewCell()\n    }\n    let cellViewModel = viewModel.cellViewModel(forIndexPath:\
    \ indexPath)\n    countriesTableViewCell.viewModel = cellViewModel\n    return\
    \ countriesTableViewCell\n}\n```\n\n在此代码片段中，通过表视图的 `dequeueReusableCell(withIdentifier:,\
    \ for)` 方法获取了一个自定义的 `UITableViewCell` 实例：\n\n```\nlet cell = tableView.dequeueReusableCell(withIdentifier:\
    \ \"CountryCell\", for: indexPath) as? CountriesTableViewCell\n```\n\n在表视图控制器的视图模型上调用了名为\
    \ `cellViewModel(forIndexPath:)` 的工厂方法：\n\n```\nlet cellViewModel = viewModel.cellViewModel(forIndexPath:\
    \ indexPath)\n```\n\n该方法返回用于表视图单元格的视图模型，随后该视图模型被赋值给表视图单元格的一个属性，最后返回该单元格：\n\n```\n\
    countriesTableViewCell.viewModel = cellViewModel\nreturn countriesTableViewCell\n\
    ```\n\n此代码片段假设表视图单元格将拥有单元格的视图模型。\n\n### 基于导航控制器的应用\n\n主从式应用在 iOS 中非常常见。这类应用通常通过在导航控制器中嵌入表视图控制器来实现。当用户点击表视图中的某个单元格时，会触发一个\
    \ push 跳转，从右侧滑入详情视图。呈现的详情视图控制器通常显示与表视图中被点击单元格相关的信息。\n\n当使用 MVVM 模式构建此类应用时，显然表视图控制器（主视图）应拥有自己的视图模型，而随后被推入导航栈的详情视图控制器也应拥有自己的视图模型。\n\
    \n此处的挑战在于如何用正确的模型对象构建详情视图模型，以确保详情视图包含正确的信息。\n\n如上一节所述，你可以使用工厂方法来实例化其中一个或全部两个视图模型。该工厂方法需要在主表视图控制器的\
    \ `prepare(for segue: UIStoryboardSegue, sender: Any?)` 方法中被调用。\n\n你还需要确保主视图模型能够跟踪选中的单元格索引。这样，才能将适当的详情模型关联到详情视图模型。\n\
    \n这种方法同样适用于集合视图控制器，因为集合视图控制器在许多方面与表视图控制器相似。第六章 6 涵盖了使用 TDD 技术构建基于 MVVM 的集合视图控制器这一主题。\n\
    \n清单 3-1 至 3-5 演示了如何将 MVVM 模式应用于表视图控制器。这些清单共同构成了一个展示几种常见颜色名称列表的应用。当用户从列表中选中一种颜色时，会呈现一个用所选颜色绘制的详情视图（见图\
    \ 3-5）。\n\n![A432412_1_En_3_Fig5_HTML.jpg](img/A432412_1_En_3_Fig5_HTML.jpg)\n\
