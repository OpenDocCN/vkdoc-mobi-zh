  trans: '

    ### 实例化用于测试的类


    单独实例化类有时会变得非常棘手。类的初始化方法可能需要多个参数，而每个参数本身又可能是对象。如果你正在实例化的某个依赖类需要访问系统资源（如网络连接、文件或数据库），问题就会更加复杂。


    为了编写有意义且简洁的单元测试，你需要能够实例化被测对象，而无需过多担心如何构建其依赖项。


    解决实例化对象依赖关系最常见的方法是创建依赖项的“替身”假对象。要使这种方法有效，这些假对象应该看起来像真实对象，并且更容易实例化。例如，这些假对象可以实现与它们试图模拟的对象相同的协议，并在方法实现中执行无害的功能。


    这类对象可以轻松地用作被测类的依赖项，并帮助你创建有意义的测试。在单元测试中，通常可以找到两种类型的假对象：


    -   **桩对象**。桩对象（也称为 Stub）是一种假对象，可用于替代真实的依赖项，它明显更容易实例化，并提供所模拟对象的无害方法实现。

    -   **模拟对象**。模拟对象（也称为 Mock）与桩类似。然而，关键区别在于，模拟对象用于测试断言，或作为断言的目标。


    例如，如果你正在编写一个测试，该测试调用对象 `A` 上的一个方法，并预期对象 `A` 会调用对象 `B` 上的另一个方法，那么对象 `B` 就是一个模拟对象，因为你的测试方法预期会在对象
    `B` 上调用某个方法。任何其他可能为了辅助编写测试而实例化的对象 `C`、`D`、`E`，只要不是测试期望的目标，都将被称为桩对象。


    ## 测试驱动开发的原则


    在本节中，你将学习 TDD 的一些关键原则。这些原则适用于任何编程语言、目标平台或 IDE 选择。


    ### 测试先行


    为了让单元测试真正驱动开发，它们需要在被测试的代码之前编写。事实上，TDD 的关键原则之一是：测试先写，然后开发人员专注于编写使所有测试通过所需的最少量代码。当测试先写时，最终的软件往往更模块化，因为开发人员被迫从独立构建且相互交互的小组件的角度来思考软件。


    这些测试共同定义了项目的验收标准。如果你拥有一套全面的测试套件，那么一旦所有测试通过，代码就被视为准备就绪，无需对代码库进行进一步修改。在实践中，开发人员会先编写一个测试，然后运行它以检查是否失败。接着，开发人员会编写代码以使这个测试通过。这是一个迭代过程，随着时间的推移，开发人员会创建一套全面的测试，这套测试既作为验收标准，也作为代码库的活文档。


    一旦所有测试都通过了，相关的功能特性就被认为已完成。这个过程是迭代的，每次迭代都会创建新的测试和代码来使这些测试通过。


    同一个开发人员同时编写被测对象和单元测试并非必要。事实上，由高级开发人员使用单元测试来为初级开发人员指定类的行为是很常见的。有了这些测试，初级开发人员就可以实现这个类，并且当所有单元测试通过时，就知道他的工作完成了。


    ### 红 – 绿 – 重构


    测试先行的原则要求你预先编写测试。如果你遵循这个原则，为尚不存在的代码编写测试，那么这个测试很可能无法编译，或者即使能编译也会失败。


    这个涉及创建封装了被测系统预期结果的失败测试的开发阶段被称为**红**阶段。红色与流行的 IDE（如 `Xcode` 和 `Visual Studio`）在摘要视图中使用红色表示测试失败有关。


    没有人喜欢失败的测试。一旦你创建了一个失败的测试，下一步就是通过编写最少量代码来使测试通过。这第二个阶段被称为**绿**阶段。绿色与流行的 IDE 在摘要视图中使用绿色表示测试通过有关。


    达到绿阶段可能涉及创建新代码以及修改现有代码。编码工作侧重于进行最小限度的更改来修复测试。换句话说，做得“足够好”就行了。


    很常见的情况是，为了修复一个失败的测试，你需要创建一个新的类或方法，并开始对这个子问题采用测试先行的方式，从而产生一系列失败的测试。这完全正常，一旦你修复了最内层的测试，所有问题都将得到解决。


    在成功修复一组失败的测试后，你可能会审视自己编写的代码，并决定需要进行重构。红-绿-重构方法的最后阶段是关于选择性地重构第二阶段编写的代码，同时确保不破坏任何现有的测试。


    ### 编写最少量的代码


    这条实践要求你不编写任何不需要的代码。当你正在构建一个方法来满足失败的测试时，很容易想给方法添加额外的参数，或者创建额外的方法以预判未来需求。必须避免这种做法，你一定要确保自己已经编写了覆盖你所构建的、暂时多余功能的测试。


    ### 消除重复


    这是你在重构练习中会发现自己经常进行的一项活动。其思想是消除类中的重复功能。始终记住，在开始重构之前要准备好一套单元测试，这样你才能确保没有改变类的行为。


    将这一原则应用于测试本身也很常见。随着时间的推移，随着项目中单元测试数量的增加，你会发现自己在重构测试本身，将测试之间的共同功能提取到独立的测试中。


    ## 总结


    本章向你介绍了测试驱动开发的思想、TDD 与单元测试的区别、不同类型的单元测试、断言以及 TDD 的通用原则。在下一章中，你将更详细地探讨其中的一些主题。


    ## 注释


    1.  《解析极限编程》，Kent Beck，1999 年。Addison Wesley 出版。ISBN：0201616416。

    '
- fmt: '# Writing Your First Set of Unit Tests with Xcode


    In this chapter you will download Xcode and learn to use it to create a simple
    app using test-driven development techniques. The app you will build will use
    the Single View Application template and allow the user to create different types
    of cookies by tapping on buttons in the user interface. The app will present a
    running total of each type of cookie created as well as the total number of cookies
    created. Figure 2-1 depicts the user interface of the finished application.


    ![A432412_1_En_2_Fig1_HTML.jpg](A432412_1_En_2_Fig1_HTML.jpg)


    Figure 2-1. The `CookieFactory` App in the iOS Simulator


    The aim of this chapter is to get you familiar with the process of creating unit
    tests, running them, and viewing results. Therefore, the tests that you create
    in this chapter will not be exhaustive, and some portions of code will be left
    untested at the end of the chapter. Chapters 3, 4, and 5 of this book discuss
    specific topics such as the MVVM application architecture, testing model objects,
    and testing view controllers.


    The complete source code for the app can be downloaded anonymously from github
    using the following URL:


    [`https://github.com/asmtechnology/Lesson02.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson02.iOSTesting.2017.Apress.git)


    If you are an experienced developer you may wish to skip reading the contents
    of this chapter and examine the final project directly.


    ## Downloading and Installing Xcode


    If you have not done so already, use the Mac App Store to download and install
    the latest version of Xcode for your Mac (see Figure 2-2).


    ![A432412_1_En_2_Fig2_HTML.jpg](A432412_1_En_2_Fig2_HTML.jpg)


    Figure 2-2. Xcode page in the Mac App Store Application


    As of writing this chapter, Xcode 8 is the latest version of Mac OS X Sierra.
    The Xcode app is over 10Gb in size and the download process can take anywhere
    from 15 – 45 minutes depending on your Internet connection speed.


    ## Creating a New Project with Unit Test Support


    When creating new iOS application projects, you have the option to create projects
    with built-in support for unit testing. Start the process of creating a new Xcode
    project by launching Xcode and selecting the `File` ➤ `New` ➤ `Project` menu item.


    You will be asked to choose a template for your new project. Xcode 8 allows you
    to build projects for the iOS, macOS, tvOS, and watchOS platforms and provides
    a selection of templates for each platform (see Figure 2-3).


    ![A432412_1_En_2_Fig3_HTML.jpg](A432412_1_En_2_Fig3_HTML.jpg)


    Figure 2-3. iOS Project Template Dialog Box


    Select a suitable iOS template and click on `Next`. In this section, I am going
    to use the iOS Single View Application Template, which is one of the most commonly
    used iOS application templates.


    After selecting the project template, you will be presented with an options dialog
    where you can select some options to customize certain aspects of the template
    (Figure 2-4).


    ![A432412_1_En_2_Fig4_HTML.jpg](A432412_1_En_2_Fig4_HTML.jpg)


    Figure 2-4. Project Options Dialog Box


    Some fields are mandatory, so the `Next` button will not be enabled until you
    fill them. The projects in this book are built using Swift and will target iPhones.
    This is the default setup for new iOS projects in Xcode.


    In the “Choose options for your new project:” screen, ensure the `Include Unit
    Tests` option is selected if you want to create a project that has support for
    unit testing. A related option called `Include UI Tests` will add support for
    user interface testing.


    Click the `Next` button and save the project in a suitable folder on your Mac’s
    hard disk. The project that you have created will have an additional build target
    setup specifically for unit testing as well as a sample unit test file with boilerplate
    code.


    After creating a new project Xcode by default, Xcode opens the project for you.
    Close the Xcode project for now. The next section discusses the process involved
    in adding support for unit testing to an existing project.


    ## Adding Support for Unit Tests to an Existing Project


    To add support for unit tests to an existing iOS application project, open the
    project in Xcode and select the `File` ➤ `New` ➤ `Target` menu item. Select the
    `iOS Unit Testing Bundle` option in the target template dialog box (Figure 2-5).


    ![A432412_1_En_2_Fig5_HTML.jpg](A432412_1_En_2_Fig5_HTML.jpg)


    Figure 2-5. Target Template Dialog Box


    After selecting the target template, you will be presented with an options dialog
    where you can select some options to customize certain aspects of the template
    (see Figure 2-6).


    ![A432412_1_En_2_Fig6_HTML.jpg](A432412_1_En_2_Fig6_HTML.jpg)


    Figure 2-6. Target Options Dialog Box


    In most cases you can simply accept the default values for the options and click
    `Finish`. A special build target (called a test target) will be added to your
    project preconfigured to support unit tests. In addition to the test target, a
    sample unit test file with boilerplate code will be added to your project.


    ## A Tour of Xcode


    Before you can begin to write unit tests in Xcode, you need to become familiar
    with some of the areas of the Xcode user interface that deal with unit tests.
    As you write more tests, you are likely to use one or more sections of the user
    interface discussed here. To start with, open the `CookieFactory` project in Xcode.'
