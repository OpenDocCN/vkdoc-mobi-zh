    \ class is a member of both the `LoginForm` and `LoginFormTests` target. Update\
    \ the contents of the `LoginViewModel.swift` file to match Listing [5-5](#A432412_1_En_5_Chapter.html#Par77).\n\
    \n```swift\nimport Foundation\nclass LoginViewModel: NSObject {\n    weak var\
    \ view:LoginViewControllerProtocol?\n    init(view:LoginViewControllerProtocol)\
    \ {\n        super.init()\n        self.view = view\n    }\n}\n```\n**Listing\
    \ 5-5.** `LoginViewModel.swift`\n\nThe initializer for the `LoginViewModel` class\
    \ takes a reference to the view. Note that the type of the `view` parameter is\
