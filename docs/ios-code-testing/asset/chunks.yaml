    \    var expectationForDisplayResultsScreen:XCTestExpectation?\n    var displayResultsScreenCalled:Bool\n\
    \    \n    init() {\n        displayResultsScreenCalled = false\n        super.init(nibName:\
    \ nil, bundle: nil)\n    }\n    \n    required init?(coder aDecoder: NSCoder)\
    \ {\n        displayResultsScreenCalled = false\n        super.init(coder: aDecoder)\n\
