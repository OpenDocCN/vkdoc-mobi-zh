    \        }\n        let validator2 = passwordValidator ?? PasswordValidator()\n\
    \        if validator2.validate(password) == false {\n            return nil\n\
    \        }\n        let validator3 = emailAddressValidator ?? EmailAddressValidator()\n\
    \        if validator3.validate(emailAddress) == false {\n            return nil\n\
    \        }\n        self.userName = userName\n        self.password = password\n\
    \        self.emailAddress = emailAddress\n        super.init()\n    }\n}\n```\n\
    **Listing 5-4.** `SignupModel.swift`\n\n## Building the ViewModel Layer\n\nThere\
    \ are two view model classes that we need to build - `LoginViewModel` and `SignupViewModel`.\
    \ These correspond to the `LoginViewController` and `SignupViewController` classes\
    \ respectively. The view model will hold a strong reference to model layer objects\
    \ and use protocols to establish an interface through which it can communicate\
    \ with the view controller.\n\n### The `LoginViewModel` Class\n\nThe `LoginViewModel`\
    \ class represents the view model between the `LoginViewController` class and\
    \ the `LoginModel` class.\n\nWe will adopt a TDD approach to developing the login\
    \ view model class. Create a new iOS Unit Test Case class called `LoginViewModelTests`\
    \ under the `LoginFormTests` group of the project explorer (see Figure [5-11](#A432412_1_En_5_Chapter.html#Fig11)).\n\
    \n![A432412_1_En_5_Fig11_HTML.jpg](A432412_1_En_5_Fig11_HTML.jpg)\n\n**Figure\
    \ 5-11.** Xcode Project Template Dialog Box\n\nSelect the `LoginViewModelTests.swift`\
    \ file in the project explorer and use the file inspector to ensure that the file\
    \ is included in the `LoginFormTests` target and not the `LoginForm` target (see\
    \ Figure [5-12](#A432412_1_En_5_Chapter.html#Fig12)). If the file inspector is\
    \ not visible, navigate to **View ➤ Utilities ➤ Show File Inspector** menu item.\n\
    \n![A432412_1_En_5_Fig12_HTML.jpg](A432412_1_En_5_Fig12_HTML.jpg)\n\n**Figure\
    \ 5-12.** `LoginViewModelTests` Target Membership\n\nDelete the `testExample`\
    \ and `testPerformanceExample` methods from `LoginViewModelTests.swift`. Create\
    \ a new unit test method called `testInit_ValidView_InstantiatesObject()` in a\
    \ separate extension and add the following code to the method body:\n\n```swift\n\
    func testInit_ValidView_InstantiatesObject() {\n    let viewModel = LoginViewModel(view:mockLoginViewController!)\n\
    \    XCTAssertNotNil(viewModel)\n}\n```\n\nAdd the following variable declaration\
    \ to the top of the `LoginViewModelTests` class:\n\n```swift\nfileprivate var\
    \ mockLoginViewController:MockLoginViewController?\n```\n\nYou will notice that\
    \ this code fails to compile; that is because the `LoginViewModel` class has not\
    \ been created yet. To fix this failure, create a new class called `LoginViewModel`\
