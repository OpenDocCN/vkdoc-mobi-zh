- fmt: '### Creating the `ServiceController` Class


    Create a new group in the project navigator called `Controllers`, and ensure this
    group is under the `PhotoBook` group. Create a new Swift class called `ServiceController`
    under the `Controllers` group. Ensure that the new class is included in both the
    build as well as the test target. (See Figure [7-6](#A432412_1_En_7_Chapter.html#Fig6).)


    ![A432412_1_En_7_Fig6_HTML.jpg](A432412_1_En_7_Fig6_HTML.jpg)


    Figure 7-6. Target Membership for the `ServiceController.swift` File


    Update the contents of `ServiceController.swift` to resemble Listing [7-2](#A432412_1_En_7_Chapter.html#Par60).


    ```

    import Foundation

    class ServiceController : NSObject {

    var session:URLSessionProtocol?

    private var dataTask:URLSessionDataTask?

    override init() {

    super.init()

    self.session =

    URLSession(configuration:

    URLSessionConfiguration.default)

    }

    func fetchFromURL(urlString:String?,

    success:@escaping (Data) -> Void,

    failure:@escaping (NSError) -> Void)

    -> Void {

    guard let session = session else {

    failure(NSError(

    domain: "ServiceController",

    code:100,

    userInfo: nil))

    return

    }

    guard let urlString = urlString,

    let url = URL(string: urlString)

    else {

    failure(NSError(

    domain: "ServiceController",

    code:101,

    userInfo: nil))

    return

    }

    dataTask = session.dataTask(

    with: url,

    completionHandler: {

    (data, response, error) in

    if let error = error {

    failure(error as NSError)

    return

    }

    if let response = response as?

    HTTPURLResponse,

    let data = data {

    if response.statusCode == 200 {

    success(data)

    return

    }

    }

    failure(NSError(

    domain: "ServiceController", code:102,

    userInfo: nil))

    return

    })

    dataTask?.resume()

    }

    }

    ```


    Listing 7-2. `ServiceController.swift`


    This class has an `init` method, the `fetchFromURL` method, and a couple of instance
    variables. I would like to draw your attention to the `session` variable, which
    is declared as:


    ```

    var session:URLSessionProtocol?

    ```


    In most apps you may have built in the past, the `session` variable would be of
    type `URLSession` and not `URLSessionProtocol`. In fact there is no protocol provided
    by Apple by that name. The reason for using a protocol instead of a concrete type
    is to facilitate injecting a mock/stub object from a unit test.


    Create a new Swift file called `URLSessionProtocol.swift` under the `Protocols`
    group and ensure the file is a member of both the build and test targets. Update
    the contents of the new file to resemble Listing [7-3](#A432412_1_En_7_Chapter.html#Par65).


    ```

    import Foundation

    protocol URLSessionProtocol : class {

    func dataTask(with url: URL,

    completionHandler: @escaping (Data?,

    URLResponse?, Error?) -> Swift.Void) -> URLSessionDataTask

    }

    extension URLSession : URLSessionProtocol {

    }

    ```


    Listing 7-3. `URLSessionProtocol.swift`


