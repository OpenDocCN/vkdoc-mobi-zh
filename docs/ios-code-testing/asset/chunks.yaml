    ## Summary


    In this chapter you have been introduced to the concept of continuous integration
    and have learned to install and configure `Xcode Server` to act as a continuous
    integration server in your development pipeline.


    You have also learned how to link `Xcode` and `Xcode Server` so that you can create
    and integrate Bots using `Xcode`.


    # 10. Introduction to Behavior-Driven Development


    Behavior-Driven Development (`BDD`) is an approach to software development that
    was built with the aim of formalizing the best practices followed by Test-Driven
    Development practitioners. `BDD` as we know it today is the result of the efforts
    of Dan North and numerous others over the years. To read a detailed introduction
    to `BDD`, visit Dan North’s website at [https://dannorth.net/introducing-bdd/](https://dannorth.net/introducing-bdd/).
    This chapter will introduce you to `BDD` concepts and techniques.


    ## What Is Behavior Driven Development


    One of the key issues faced by people who are new to `TDD` is deciding what to
    test. Unfortunately `TDD` leaves this aspect open to the practitioner to decide.
    While experienced `TDD` practitioners know from experience what to test (and what
    not to), newcomers to `TDD` often do not know and, in some cases, give up on `TDD`
    altogether.


    Behavior-driven development is about testing the behavior of a system, and not
    the implementation details. A system could be either an individual class or a
    group of classes that make up an aggregate unit of functionality.


    As an example, consider the bank account project discussed in Chapter [4](#A432412_1_En_4_Chapter.html)
    with three key classes – `BankAccount`, `AccountOwner`, and `Transaction`. In
    terms of relationships, a `BankAccount` can have up to two `AccountOwners` and
    a variable number of `Transactions` (Figure [10-1](#A432412_1_En_10_Chapter.html#Fig1)).


    ![A432412_1_En_10_Fig1_HTML.jpg](A432412_1_En_10_Fig1_HTML.jpg)


    Figure 10-1. Relationship Between Model Layer Objects


    These model objects in isolation are not very useful from a business perspective.
    We have followed a rigid test-driven approach to developing these components in
    Chapter [4](#A432412_1_En_4_Chapter.html). The tests that we wrote verified that
    a number of validator objects worked as expected, and that creating a Model layer
    object makes calls to a number of validator objects. These tests, however, are
    of little value to a product owner as they don’t directly tell him whether a business
    requirement is met.


    The business requirement could, for instance, be something like this: *As a joint
    account customer, I want to be able to withdraw money from my account if there
    is money in the account, so that I can use the cash to make a purchase.*


    To put it another way, the tests that we have written while following a test-driven
    approach are too detailed to be useful for a product owner to be able to verify
    that the developers have built the system that was asked of them.


    ## The Difference between BDD and TDD


    The key difference between behavior-driven development and test-driven development
    is that `BDD` tests are written at a different level of detail than `TDD` tests.


    `BDD`-style tests system behavior is where the acceptable behavior of the system
    is defined by a set of scenarios, which are, in turn, derived from business requirements.


    `BDD`-style tests are generally more descriptive and meaningful to the business.
    They are described in a language called Domain Specific Language (`DSL`) that
    contains terms and concepts encountered in the business domain.


    `BDD`-style tests could, in theory, be written using the existing `XCTest` framework
    with cleverly thought of method names, and a fair bit of mocking and stubbing.
    In practice, `BDD`-style tests are written using a special framework. One such
    framework for iOS developers using `Swift` is called `Quick`.


    ### Business Requirements and User Scenarios


    The best way to understand how `BDD` works is to examine a concrete example. Let
    us assume that your company has been contracted to build a new banking system
    for retail operations, and after a few weeks of analysis, the business analyst
    has documented the following two requirements:


    - As a [customer]

    - I want to [deposit money in my savings bank account]

    - So that [I can reach my savings goals]

    - As a [customer].

    - I want to [withdraw money from my savings bank account].

    - So that [I can meet a financial obligation].


    This is obviously an oversimplification of a real-world scenario where the business
    analyst has probably documented a few hundred requirements, but it serves to illustrate
    how a team practicing `BDD` would approach this problem.


    A developer would then sit with the business analyst and a member of the QA team
    to agree on a set of user scenarios. Let us assume the team has been able to come
    up with the following two scenarios (again an oversimplification; in real life
    each requirement would expand into multiple scenarios):


    - Given [A joint savings account has a credit balance of $100]

    - When [An account holder withdraws $50 from the account]

    - Then [The account should have a credit balance of $50]

    - Given [A joint savings account has a credit balance of $100]

    - When [An account holder deposits $50 into the account]

    - Then [The account should have a credit balance of $150]


    Once a set of user scenarios has been mutually agreed upon, the QA team will proceed
    to write QA scripts to test the scenarios when the system is testable using either
    automated testing techniques or manual testing techniques.'
