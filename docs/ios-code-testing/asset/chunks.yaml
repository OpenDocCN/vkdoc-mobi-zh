    \    collectionViewCell.setCaption(captionText: comments)\n    collectionViewCell.setShotDetails(shotDetailsText:\
    \ \"\\(aperture), \\(shutterSpeed), ISO \\(iso)\")\n}\n```\n\nAdd the following\
    \ class extension to the `CollectionViewCellViewModel.swift` file:\n\n```\nextension\
