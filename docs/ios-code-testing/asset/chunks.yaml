  trans: '

    ### 在 Xcode Server 上创建新的 Git 仓库


    图 9-15 展示了仓库标签页中可用的选项。在此标签页中，你可以管理托管在 Xcode Server 中的仓库，配置安全协议，以及设置可以访问这些仓库的用户列表。


    ![A432412_1_En_9_Fig15_HTML.jpg](img/A432412_1_En_9_Fig15_HTML.jpg)


    图 9-15. Xcode Server 仓库标签页


    要配置可用于验证连接到 Xcode Server 中托管的仓库的用户的安全协议，请点击“编辑仓库访问…”按钮。系统会弹出一个对话框，要求你选择允许的协议。可选的协议有
    `HTTPS` 和 `SSH`（见图 9-16）。


    ![A432412_1_En_9_Fig16_HTML.jpg](img/A432412_1_En_9_Fig16_HTML.jpg)


    图 9-16. Xcode Server 中托管仓库的安全协议设置


    要配置可以访问 Xcode Server 中托管的仓库的用户列表，请点击“编辑仓库创建者”。默认情况下，任何已在 Xcode 中登录 Xcode Server
    的用户都可以访问你的仓库并创建 Bot。


    希望连接到这些仓库的用户需要在其开发 Mac 上的 Xcode 中添加账户凭据，以便 Xcode 能够访问这些仓库。这通常通过 Xcode 中的“账户”偏好设置部分完成，本章稍后会对此进行介绍。


    要创建新仓库，请点击仓库列表下方的“添加 (+)”按钮（见图 9-17）。


    ![A432412_1_En_9_Fig17_HTML.jpg](img/A432412_1_En_9_Fig17_HTML.jpg)


    图 9-17. 在 Xcode Server 中创建新仓库


    输入仓库名称，该名称将出现在“托管的仓库”列表中，并成为访问 URL 的一部分。


    点击“编辑”按钮，指定能够通过 `SSH` 访问仓库的用户。要启用 `HTTPS` 访问，请选中“允许已登录用户读写”复选框。


    点击“创建”完成新 Git 仓库的创建。新仓库将出现在仓库列表中。要更改谁有权访问该仓库，请从仓库列表中选择该仓库，然后点击列表下方的“编辑”按钮（见图 9-18）。


    ![A432412_1_En_9_Fig18_HTML.jpg](img/A432412_1_En_9_Fig18_HTML.jpg)


    图 9-18. 编辑有权访问现有仓库的用户


    ## 配置 Xcode


    在本节中，我们将介绍如何将开发 Mac 上的 Xcode 连接到 Xcode Server 实例并克隆仓库。


    ### 向 Xcode 添加 Xcode Server 凭据


    要在你的开发 Mac 上访问托管在 Xcode Server 上的 Git 仓库，以及在 Xcode Server 上创建 Bot，你需要将开发 Mac 上的
    Xcode 连接到 Xcode Server。


    在你的开发 Mac 上启动 Xcode，然后选择 `Xcode ➤ 偏好设置` 菜单项。切换到“账户”标签页（见图 9-19）。


    ![A432412_1_En_9_Fig19_HTML.jpg](img/A432412_1_En_9_Fig19_HTML.jpg)


    图 9-19. Xcode 账户偏好设置


    此标签页列出了你的开发账户、远程托管的仓库以及 Xcode Server 实例。要将 Xcode 连接到你的 Xcode Server 实例，请点击列表底部的“添加
    (+)”按钮，然后从选项列表中选择“添加服务器…”。


    从服务器列表中选择一个 Xcode Server 实例，然后点击“添加”（见图 9-20）。


    ![A432412_1_En_9_Fig20_HTML.jpg](img/A432412_1_En_9_Fig20_HTML.jpg)


    图 9-20. 在 Xcode 中添加指向远程 Xcode Server 实例的书签


    当提示输入访问凭据时，请输入用户名和密码（这应该由你的 Xcode Server 管理员提供给你）。


    现在，你将在“账户”标签页的“服务器”部分下看到列出的构建服务器（见图 9-21）。


    ![A432412_1_En_9_Fig21_HTML.jpg](img/A432412_1_En_9_Fig21_HTML.jpg)


    图 9-21. 显示 Xcode Server 实例的 Xcode 账户页面


    ### 创建新的 Xcode 项目并将其仓库托管在 Xcode Server 上


    一旦你在 Xcode 中添加了访问 Xcode Server 的凭据，就可以将你创建的每个新项目的仓库托管在服务器上。为此，当系统要求你选择新项目的位置时，请启用“源代码控制”复选框，并从可用选项列表中选择服务器名称（见图
    9-22）。


    ![A432412_1_En_9_Fig22_HTML.jpg](img/A432412_1_En_9_Fig22_HTML.jpg)


    图 9-22. 在 Xcode Server 上托管新项目的仓库


    如果服务器没有出现在列表中，请确保已将服务器添加到 Xcode，并且你的用户帐户具有在 Xcode Server 上创建仓库的权限。


    ### 将现有的本地仓库克隆到 Xcode Server


    如果你在开发 Mac 上的 Git 仓库中有一个现有的 Xcode 项目，并希望将该仓库克隆到 Xcode Server，请打开 Xcode 项目并点击 `源代码控制
    ➤ 你的项目名称 ➤ 配置` 菜单项。`你的项目名称` 是你的 Xcode 项目名称的占位符（见图 9-23）。


    ![A432412_1_En_9_Fig23_HTML.jpg](img/A432412_1_En_9_Fig23_HTML.jpg)


    图 9-23. 为现有 Xcode 项目配置源代码控制选项


    切换到“远程”标签页，点击“添加 (+)”按钮，然后从上下文菜单中选择“创建新的远程”（见图 9-24）。


    ![A432412_1_En_9_Fig24_HTML.jpg](img/A432412_1_En_9_Fig24_HTML.jpg)


    图 9-24. 仓库配置对话框


    选择一个正在运行的 Xcode Server 实例，输入一个有助于你识别远程仓库的名称，然后点击“创建”。

