    Table 5-1. Login view controller outlets and actions


    | Name | Type | Description |

    | --- | --- | --- |

    | `@IBOutlet weak var userNameTextField: UITextField!` | IB Outlet | Connect this
    outlet to the User name text field of the storyboard scene. |

    | `@IBOutlet weak var passwordTextField: UITextField!` | IB Outlet | Connect this
    outlet to the Password text field of the storyboard scene. |

    | `@IBOutlet weak var loginButton: UIButton!` | IB Outlet | Connect this outlet
    to the Login button of the storyboard scene. |

    | `@IBOutlet weak var createAccountButton: UIButton!` | IB Outlet | Connect this
    outlet to the Create Account button of the storyboard scene. |

    | `@IBAction func login(_ sender: Any)` | IB Action | Connect this method to the
    Touch Up Inside event of the Login button. |

    | `@IBAction func createAccount(_ sender: Any)` | IB Action | Connect this method
    to the Touch Up Inside event of the Create Account button. |

    | `@IBAction func userNameDidEndOnExit(_ sender: Any)` | IB Action | Connect this
    method to the Did End On Exit event of the User name text field. |

    | `@IBAction func passwordDidEndOnExit(_ sender: Any)` | IB Action | Connect this
    method to the Did End On Exit event of the Password text field. |


    Implement the `UITextFieldDelegate` protocol in a separate class extension on
    `LoginViewController` by adding the following code to the end of the `LoginViewController.swift`
    file:


    ```

    extension LoginViewController: UITextFieldDelegate {

    func textField(_ textField: UITextField,

    shouldChangeCharactersIn range: NSRange,

    replacementString string: String) -> Bool {

    return true

    }

    }

    ```


    The above snippet contains a bare-bones implementation of the `textField(_, shouldChangeCharactersIn,
    replacementString)` delegate method from `UITextFieldDelegate`. The code in `LoginViewController.swift`
    should now resemble Listing [5-1](#A432412_1_En_5_Chapter.html#Par40).


    ```

