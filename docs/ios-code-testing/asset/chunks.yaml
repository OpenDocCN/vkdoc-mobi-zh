    ![A432412_1_En_11_Fig6_HTML.jpg](A432412_1_En_11_Fig6_HTML.jpg)


    Figure 11-6. The Pods Project with Quick and Nimble


    At this point you have added Quick (and Nimble) to your Xcode project, and your
    project should be able to build and run on the iOS Simulator without any issues.'
