    # 7. 测试 URLSession


    本章将探讨将 TDD 技术应用于应用网络层的流程。iOS 开发者可使用多种类型的网络技术。本章仅涵盖使用 `URLSession` 类进行网络通信。`URLSession`
    连接使你能够便捷地通过 HTTP 连接下载资源。


    本章将修改第 6 章中构建的 `PhotoBook` 应用。修改后的应用版本将从互联网上的服务器下载图片和元数据，而不是使用捆绑资源及 `.plist` 文件。


