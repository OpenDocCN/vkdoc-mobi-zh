    \n如果你使用 `Product > Test` 菜单项执行所有测试，你会看到所有 BDD 和 TDD 测试都通过了。\n\n## 总结\n\n在本章中，你学习了如何在构建\
    \ iOS 应用时结合 BDD 和 TDD 技术。你首先回顾了业务需求，并创建了一组用户故事来覆盖这些需求。然后你发现并非所有用户故事都可以通过 BDD 技术进行测试；有些场景更适合使用视觉检查技术来测试。\n\
    \n对于那些可以使用 BDD 技术测试的场景，你学习了如何使用 Quick 创建 BDD 测试。BDD 测试最初是失败的，你确定需要创建所需的应用程序功能才能使\
    \ BDD 测试通过。\n\n由于 BDD 测试并不规定底层代码的编写方式，你选择使用 TDD 技术和应用程序架构来构建底层的应用程序功能。\n\n通过这种方式，你结合使用了\
    \ BDD 和 TDD 两种技术来构建应用程序。\n\n# 13. 测试用户界面\n\n用户界面（UI）测试允许你从外部测试应用程序，就像用户会看到的那样。每次你决定在模拟器或设备上运行你的应用程序时，实际上就是在测试应用程序的\
    \ UI。自 Xcode 7 以来，Apple 提供了创建自动化 UI 测试的能力。这些自动化 UI 测试在发现回归缺陷方面非常出色，如果使用得当，可以减少应用的回归测试工作量。\n\
    \nUI 测试是使用 `XCTest` 中的一组类构建的。与源自 `XCTest` 的单元测试不同，UI 测试源自 `XCUITest`。UI 测试通常在\
    \ Xcode 项目中拥有自己的组和构建目标，如图 13-1 所示。\n\n![A432412_1_En_13_Fig1_HTML.jpg](img/A432412_1_En_13_Fig1_HTML.jpg)\n\
    \n*图 13-1.* UI 测试的单独文件夹组和构建目标\n\n如图 13-1 所示，构成应用程序的代码、其相关的单元测试和用户界面测试都是同一个 Xcode\
    \ 项目的一部分。然而，与单元测试不同，UI 测试被打包并部署到一个名为测试运行器的单独应用程序中。\n\n构成 UI 测试用例的代码在测试运行器应用内执行，而不是在被测试的主应用（受测对象）中。自然，测试运行器的首要任务是启动一个待测试应用的实例。\n\
    \n测试运行器应用如何以编程方式与受测对象的 UI 交互？答案是通过 Xcode 在测试会话期间设置的代理用户界面元素。如图 13-2 所示。\n\n![A432412_1_En_13_Fig2_HTML.jpg](img/A432412_1_En_13_Fig2_HTML.jpg)\n\
    \n*图 13-2.* 测试运行器和被测试应用\n\n典型 UI 测试用例中的代码会尝试在受测对象中找到一个代理用户界面元素，并根据代理元素的状态创建断言。代理元素是\
    \ `XCUIElement` 的实例，在 UI 测试中可使用的属性和方法非常有限。\n\nXcode 还提供了一个相关功能，称为 UI 录制。UI 录制是一个帮助你创建\
    \ UI 测试的工具。启用 UI 录制时，受测对象的一个实例会在 iOS 模拟器中启动，你可以像平常一样与其交互。Xcode 会记录你与应用的交互，并构建一个用户界面测试，以便为你执行相同顺序的交互操作。\n\
    \n## 向项目添加 UI 测试支持\n\n添加 UI 测试支持涉及链接 `XCTest`、在 Xcode 项目中新建一个文件组，以及创建一个新的构建目标。\n\
    \n## 新项目\n\n如果你正在创建新项目，过程会稍微简单一些。只需确保在项目选项对话框中选中 `Include UI Tests` 复选框即可（见图 13-3）。\n\
    \n![A432412_1_En_13_Fig3_HTML.jpg](img/A432412_1_En_13_Fig3_HTML.jpg)\n\n*图 13-3.*\
    \ Xcode 项目选项对话框\n\n当你这样做时，会注意到一些变化：\n\n- Xcode 项目中添加了一个新组。这个组将用于存放你的 UI 测试文件。\n\
    - 项目中添加了一个新的构建目标，也称为 UI 测试目标。\n- 该测试目标已预先配置为测试宿主应用。\n\n所有这些点在图 13-4 中都有体现。\n\n\
    ![A432412_1_En_13_Fig4_HTML.jpg](img/A432412_1_En_13_Fig4_HTML.jpg)\n\n*图 13-4.*\
    \ UI 测试的新文件夹组和构建目标\n"
- fmt: "## Existing Projects\n\nAdding support for UI testing to an existing project\
    \ requires that you add a new test target to your Xcode project by selecting `File\
    \ ➤ New ➤ Target`.\n\nIn the target template dialog box, select `iOS UI Testing\
    \ Bundle` under the `Test` category (Figure [13-5](#A432412_1_En_13_Chapter.html#Fig5)).\n\
    \n![A432412_1_En_13_Fig5_HTML.jpg](A432412_1_En_13_Fig5_HTML.jpg)\n\nFigure 13-5.\
    \ Xcode Target Template Dialog Box\n\nAccept the default values in the target\
    \ options dialog box and click `Finish` (Figure [13-6](#A432412_1_En_13_Chapter.html#Fig6)).\n\
    \n![A432412_1_En_13_Fig6_HTML.jpg](A432412_1_En_13_Fig6_HTML.jpg)\n\nFigure 13-6.\
    \ Xcode Target Options Dialog Box\n\n## UI Test Classes\n\nA UI test class is\
    \ just a Swift class that inherits from `XCUITestCase`. Similar in many respects\
    \ to unit test classes, UI test classes also contain `setup`, `teardown`, and\
    \ `test` methods.\n\n**Setup method**: There is only one setup method in a UI\
    \ test class. The signature of the setup method is this:\n\n```\noverride func\
    \ setUp()\n```\n\nThe `setUp()` is called before each UI test method is executed\
    \ in the UI test class. Note the use of the `override` keyword to indicate that\
    \ the base method definition is in the super class (`XCUITestCase`).\n\n**Teardown\
    \ method**: There is only one teardown method in a UI test class. The signature\
    \ of the teardown method is this:\n\n```\noverride func tearDown()\n```\n\nThe\
    \ `tearDown()` method is also prefixed with the `override` keyword, and is called\
    \ after each UI test method has finished executing in the UI test class.\n\n**Test\
    \ methods**: A UI test class usually has multiple test methods, and each method\
    \ contains a single UI test. The names of test methods all begin with the word\
    \ `test`, for example:\n\n```\nfunc testTappingOnDeleteButtonDisplaysAlert() {\n\
    }\n```\n\nThe names of test methods should describe the user interaction they\
    \ intend to test, and the length of the user journey being tested in a single\
    \ method should be kept as short as possible.\n\nThe following code snippet shows\
    \ what a typical UI test class looks like:\n\n```\nimport XCTest\nclass CountriesAndCitiesUITests:\
    \ XCTestCase {\n    override func setUp() {\n        super.setUp()\n        XCUIApplication().launch()\n\
    \    }\n    override func tearDown() {\n        super.tearDown()\n    }\n    func\
    \ testTappingOnDeleteButtonDisplaysAlert() {\n    }\n    func testCountryListAppearsOnAppLaunch()\
    \ {\n    }\n}\n```\n\n**Note**\n\nYou may choose to create a single UI test class\
    \ per view controller of your app, but sometimes it may be better to create UI\
    \ test classes that represent user journeys. View controllers seldom exist in\
    \ isolation; usually your users will start on an initial view controller and move\
    \ on to other view controllers by interacting with your app. If your UI tests\
    \ involve multiple view controllers, it may be better to name them based on the\
    \ user journeys they represent.\n\nTo execute all tests (in all test classes)\
    \ in a project, use the `Product ➤ Test` menu item. This will launch the app on\
    \ the iOS Simulator (or device) and execute all test cases sequentially.\n\nIf\
    \ your project has both unit tests and UI tests, then the unit tests will execute\
    \ first and the UI tests will be executed only after all unit tests finish. If\
    \ you want to execute UI tests without waiting for unit tests, you need to create\
    \ a new build scheme that does not include unit tests.\n\nThe most common approach\
    \ when it comes to creating new build schemes is to duplicate an existing one,\
    \ and make changes on the copy. To duplicate an existing build scheme, begin by\
    \ selecting the `Product ➤ Schemes ➤ Manage Schemes` menu item.\n\nYou will be\
    \ presented with a list of build schemes in your project. Ensure that the scheme\
    \ you wish to duplicate is selected, and click on the settings icon at the bottom-left\
    \ corner of the scheme list (Figure [13-7](#A432412_1_En_13_Chapter.html#Fig7)).\n\
    \n![A432412_1_En_13_Fig7_HTML.jpg](A432412_1_En_13_Fig7_HTML.jpg)\n\nFigure 13-7.\
    \ Duplicating an Existing Build Scheme\n\nSelecting the `Duplicate` option from\
    \ the context menu that appears when you click on the settings icon will create\
    \ a copy of the scheme, and open the scheme properties dialog box. Specify a meaningful\
    \ name for the new scheme and then ensure the unit test target is unchecked under\
    \ the `Test` section of the scheme properties dialog box (Figure [13-8](#A432412_1_En_13_Chapter.html#Fig8)).\n\
    \n![A432412_1_En_13_Fig8_HTML.jpg](A432412_1_En_13_Fig8_HTML.jpg)\n\nFigure 13-8.\
    \ Unchecking the Unit Test Target From the Scheme Built for UI Testing\n\nAs with\
    \ unit tests, the result of the UI testing phase is also visible in the Test Navigator,\
    \ which can be accessed by selecting `View ➤ Navigators ➤ Show Test Navigator`\
    \ (Figure [13-9](#A432412_1_En_13_Chapter.html#Fig9)).\n\n![A432412_1_En_13_Fig9_HTML.jpg](A432412_1_En_13_Fig9_HTML.jpg)\n\
    \nFigure 13-9. Results of UI Tests are Visible in the Test Navigator\n\nTests\
    \ that have passed have a green tick box next to their names. A red tick box beside\
    \ the name of a test means that the test did not pass. Keep in mind that Xcode\
    \ needs to compile your test code before it can run the tests, so this means that\
    \ you will need to fix any compilation errors in your project before any tests\
    \ can run.\n\n## Creating New Test Classes\n\nYou can add new UI test classes\
    \ to your project in one of two ways:\n\n1. `Command-Click` on the UI test group\
    \ in the project navigator and select the `New File…` option from the context\
    \ menu. This will present a dialog box with a list of file templates to choose\
    \ from. Select the `UI Test Case class` template under the `iOS` Category (Figure\
    \ [13-10](#A432412_1_En_13_Chapter.html#Fig10)).\n\n   ![A432412_1_En_13_Fig10_HTML.jpg](A432412_1_En_13_Fig10_HTML.jpg)\n\
    \n   Figure 13-10. Xcode File Template Dialog Box\n\n2. With the Test Navigator\
    \ visible, click on the Add button (`+`) at the bottom of the navigator and select\
    \ the `New UI Test Class` menu item from the context menu (Figure [13-11](#A432412_1_En_13_Chapter.html#Fig11)).\n\
    \n   ![A432412_1_En_13_Fig11_HTML.jpg](A432412_1_En_13_Fig11_HTML.jpg)\n\n   Figure\
    \ 13-11. Creating a New UI Test Class\n\n## Changes to XCTest to Support UI Testing\n\
    \nIn order to support UI testing, four new classes and two new protocols have\
    \ been added to `XCTest`. These are discussed in this section."
  raw: "## Existing Projects\n\nAdding support for UI testing to an existing project\
    \ requires that you add a new test target to your Xcode project by selecting File\
    \ ➤ New ➤ Target.\n\nIn the target template dialog box, select iOS UI Testing\
    \ Bundle under the Test category (Figure [13-5](#A432412_1_En_13_Chapter.html#Fig5)).\n\
    \n![A432412_1_En_13_Fig5_HTML.jpg](A432412_1_En_13_Fig5_HTML.jpg)\n\nFigure 13-5.\n\
    \nXcode Target Template Dialog Box\n\nAccept the default values in the target\
    \ options dialog box and click Finish (Figure [13-6](#A432412_1_En_13_Chapter.html#Fig6)).\n\
    \n![A432412_1_En_13_Fig6_HTML.jpg](A432412_1_En_13_Fig6_HTML.jpg)\n\nFigure 13-6.\n\
    \nXcode Target Options Dialog Box\n\n## UI Test Classes\n\nA UI test class is\
    \ just a Swift class that inherits from XCUITestCase. Similar in many respects\
    \ to unit test classes, UI test classes also contain setup, teardown, and test\
    \ methods.\n\nSetup method : There is only one setup method in a UI test class.\
    \ The signature of the setup method is this:\n\n```\noverride func setUp()\n```\n\
    \nThe setup is called before each UI test method is executed in the UI test class.\
    \ Note the use of the override keyword to indicate that the base method definition\
    \ is in the super class (XCUITestCase).\n\nTeardown method : There is only one\
    \ teardown method in a UI test class. The signature of the setup method is this:\n\
    \n```\noverride func tearDown()\n```\n\nThe teardown method is also prefixed with\
    \ the override keyword, and is called after each UI test method has finished executing\
    \ in the UI test class.\n\nTest methods : A UI test class usually has multiple\
    \ test methods, and each method contains a single UI test. The names of Test methods\
    \ all begin with the word test, for example:\n\n```\nfunc testTappingOnDeleteButtonDisplaysAlert()\
    \ {\n}\n```\n\nThe names of test methods should describe the user interaction\
    \ they intend to test, and the length of the user journey being tested in a single\
    \ method should be kept as short as possible.\n\nThe following code snippet shows\
    \ what a typical UI test class looks like:\n\n```\nimport XCTest\nclass CountriesAndCitiesUITests:\
    \ XCTestCase {\noverride func setUp() {\nsuper.setUp()\nXCUIApplication().launch()\n\
    }\noverride func tearDown() {\nsuper.tearDown()\n}\nfunc testTappingOnDeleteButtonDisplaysAlert()\
    \ {\n}\nfunc testCountryListAppearsOnAppLaunch() {\n}\n}\n```\n\nNote\n\nYou may\
    \ choose to create a single UI test class per view controller of your app, but\
    \ sometimes it may be better to create UI test classes that represent user journeys.\
    \ View controllers seldom exist in isolation; usually your users will start on\
    \ an initial view controller and move on to other view controllers by interacting\
    \ with your app. If your UI tests involve multiple view controllers, it may be\
    \ better to name them based on the user journeys they represent.\n\nTo execute\
    \ all tests (in all test classes) in a project, use the Product ➤ Test menu item.\
    \ This will launch the app on the iOS Simulator (or device) and execute all test\
    \ cases sequentially.\n\nIf your project has both unit tests and UI tests, then\
    \ the unit tests will execute first and the UI tests will be executed only after\
    \ all unit tests finish. If you want to execute UI tests without waiting for unit\
    \ tests, you need to create a new build scheme that does not include unit tests.\n\
    \nThe most common approach when it comes to creating new build schemes is to duplicate\
    \ an existing one, and make changes on the copy. To duplicate an existing build\
    \ scheme, begin by selecting the Product ➤ Schemes ➤ Manage Schemes menu item.\n\
    \nYou will be presented with a list of build schemes in your project. Ensure that\
    \ the scheme you wish to duplicate is selected, and click on the settings icon\
    \ at the bottom-left corner of the scheme list (Figure [13-7](#A432412_1_En_13_Chapter.html#Fig7)).\n\
    \n![A432412_1_En_13_Fig7_HTML.jpg](A432412_1_En_13_Fig7_HTML.jpg)\n\nFigure 13-7.\n\
    \nDuplicating an Existing Build Scheme\n\nSelecting the “Duplicate” option from\
    \ the context menu that appears when you click on the settings icon will create\
    \ a copy of the scheme, and open the scheme properties dialog box. Specify a meaningful\
    \ name for the new scheme and then ensure the unit test target is unchecked under\
    \ the Test section of the scheme properties dialog box (Figure [13-8](#A432412_1_En_13_Chapter.html#Fig8)).\n\
    \n![A432412_1_En_13_Fig8_HTML.jpg](A432412_1_En_13_Fig8_HTML.jpg)\n\nFigure 13-8.\n\
    \nUnchecking the Unit Test Target From the Scheme Built for UI Testing\n\nAs with\
    \ unit tests, the result of the UI testing phase is also visible in the Test Navigator,\
    \ which can be accessed by selecting View ➤ Navigators ➤ Show Test Navigator (Figure\
    \ [13-9](#A432412_1_En_13_Chapter.html#Fig9)).\n\n![A432412_1_En_13_Fig9_HTML.jpg](A432412_1_En_13_Fig9_HTML.jpg)\n\
    \nFigure 13-9.\n\nResults of UI Tests are Visible in the Test Navigator\n\nTests\
    \ that have passed have a green tick box next to their names. A Red tick box beside\
    \ the name of a test means that the test did not pass. Keep in mind that Xcode\
    \ needs to compile your test code before it can run the tests, so this means that\
    \ you will need to fix any compilation errors in your project before any tests\
    \ can run.\n\n## Creating New Test Classes\n\nYou can add new UI test classes\
    \ to your project in one of two ways:\n\n1.  Command-Click on the UI test group\
    \ in the project navigator and select the “New File…” option from the context\
    \ menu. This will present a dialog box with a list of file templates to choose\
    \ from. Select the “UI Test Case class” template under the iOS Category (Figure\
    \ [13-10](#A432412_1_En_13_Chapter.html#Fig10)).\n\n    ![A432412_1_En_13_Fig10_HTML.jpg](A432412_1_En_13_Fig10_HTML.jpg)\n\
    \n    Figure 13-10.\n\n    Xcode File Template Dialog Box  \n2.  With the Test\
    \ Navigator visible, click on the Add button (+) at the bottom of the navigator\
    \ and select the “New UI Test Class” menu item from the context menu (Figure [13-11](#A432412_1_En_13_Chapter.html#Fig11)).\n\
    \n    ![A432412_1_En_13_Fig11_HTML.jpg](A432412_1_En_13_Fig11_HTML.jpg)\n\n  \
    \  Figure 13-11.\n\n    Creating a New UI Test Class\n\n## Changes to XCTest to\
    \ Support UI Testing\n\nIn order to support UI testing, four new classes and two\
    \ new protocols have been added to XCTest. These are discussed in this section."
  trans: "\n## 现有项目\n\n要为现有项目添加 UI 测试支持，需要通过在 Xcode 项目中选择 `File ➤ New ➤ Target` 来添加一个新的测试目标。\n\
    \n在目标模板对话框中，在 `Test` 类别下选择 `iOS UI Testing Bundle`（图 13-5）。\n\n![A432412_1_En_13_Fig5_HTML.jpg](img/A432412_1_En_13_Fig5_HTML.jpg)\n\
    \n图 13-5. Xcode 目标模板对话框\n\n在目标选项对话框中接受默认值，然后点击 `Finish`（图 13-6）。\n\n![A432412_1_En_13_Fig6_HTML.jpg](img/A432412_1_En_13_Fig6_HTML.jpg)\n\
    \n图 13-6. Xcode 目标选项对话框\n\n## UI 测试类\n\nUI 测试类就是一个继承自 `XCUITestCase` 的 Swift 类。UI\
    \ 测试类与单元测试类在许多方面类似，同样包含 `setup`、`teardown` 和 `test` 方法。\n\n**Setup 方法**：UI 测试类中只有一个\
    \ setup 方法。其方法签名如下：\n\n```\noverride func setUp()\n```\n\n`setUp()` 会在 UI 测试类中每个\
    \ UI 测试方法执行之前被调用。注意使用 `override` 关键字来表示基类方法定义在父类（`XCUITestCase`）中。\n\n**Teardown\
    \ 方法**：UI 测试类中只有一个 teardown 方法。其方法签名如下：\n\n```\noverride func tearDown()\n```\n\
    \n`tearDown()` 方法同样带有 `override` 关键字前缀，并在 UI 测试类中每个 UI 测试方法执行完毕后被调用。\n\n**测试方法**：UI\
    \ 测试类通常包含多个测试方法，每个方法包含一个独立的 UI 测试。测试方法的方法名都以 `test` 开头，例如：\n\n```\nfunc testTappingOnDeleteButtonDisplaysAlert()\
    \ {\n}\n```\n\n测试方法的方法名应描述它们旨在测试的用户交互，并且单个方法中测试的用户操作路径长度应尽可能短。\n\n以下代码片段展示了一个典型的\
    \ UI 测试类：\n\n```\nimport XCTest\nclass CountriesAndCitiesUITests: XCTestCase {\n\
    \    override func setUp() {\n        super.setUp()\n        XCUIApplication().launch()\n\
    \    }\n    override func tearDown() {\n        super.tearDown()\n    }\n    func\
    \ testTappingOnDeleteButtonDisplaysAlert() {\n    }\n    func testCountryListAppearsOnAppLaunch()\
    \ {\n    }\n}\n```\n\n**注意**\n\n您可以选择为应用的每个视图控制器创建一个单独的 UI 测试类，但有时更好的做法是创建代表用户操作路径的\
    \ UI 测试类。视图控制器很少独立存在；通常，用户会从一个初始视图控制器开始，通过与您的应用交互，移动到其他视图控制器。如果您的 UI 测试涉及多个视图控制器，最好根据它们所代表的用户操作路径来命名。\n\
    \n要执行项目中（所有测试类中的）所有测试，请使用 `Product ➤ Test` 菜单项。这将启动 iOS 模拟器（或真机）上的应用，并按顺序执行所有测试用例。\n\
    \n如果您的项目同时包含单元测试和 UI 测试，那么单元测试将先执行，UI 测试将仅在所有单元测试完成后才执行。如果您想在不等待单元测试的情况下执行 UI\
    \ 测试，则需要创建一个不包含单元测试的新构建配置。\n\n创建新构建配置最常见的方法是复制一个现有配置，然后在副本上进行修改。要复制现有构建配置，请先选择\
    \ `Product ➤ Schemes ➤ Manage Schemes` 菜单项。\n\n您将看到项目中构建配置的列表。确保您要复制的配置已被选中，然后点击配置列表左下角的设置图标（图\
    \ 13-7）。\n\n![A432412_1_En_13_Fig7_HTML.jpg](img/A432412_1_En_13_Fig7_HTML.jpg)\n\
    \n图 13-7. 复制现有构建配置\n\n点击设置图标后出现的上下文菜单中选择 `Duplicate` 选项，将创建该配置的副本，并打开配置属性对话框。为新配置指定一个有意义的名称，然后在配置属性对话框的\
    \ `Test` 部分下，确保单元测试目标未被选中（图 13-8）。\n\n![A432412_1_En_13_Fig8_HTML.jpg](img/A432412_1_En_13_Fig8_HTML.jpg)\n\
    \n图 13-8. 从为 UI 测试构建的配置中取消选中单元测试目标\n\n与单元测试一样，UI 测试阶段的结果也可以在测试导航器中看到，可以通过选择 `View\
    \ ➤ Navigators ➤ Show Test Navigator` 来访问（图 13-9）。\n\n![A432412_1_En_13_Fig9_HTML.jpg](img/A432412_1_En_13_Fig9_HTML.jpg)\n\
    \n图 13-9. UI 测试的结果在测试导航器中可见\n\n通过的测试名称旁会有一个绿色的勾选框。测试名称旁出现红色勾选框表示该测试未通过。请记住，Xcode\
    \ 需要先编译测试代码才能运行测试，这意味着您需要先修复项目中的所有编译错误，然后才能运行任何测试。\n\n## 创建新的测试类\n\n您可以通过以下两种方式之一向项目添加新的\
    \ UI 测试类：\n\n1. 在项目导航器中 `Command-点击` UI 测试组，然后从上下文菜单中选择 `New File…` 选项。这将弹出一个对话框，其中包含要选择的文件模板列表。在\
    \ `iOS` 类别下选择 `UI Test Case class` 模板（图 13-10）。\n\n   ![A432412_1_En_13_Fig10_HTML.jpg](img/A432412_1_En_13_Fig10_HTML.jpg)\n\
    \n   图 13-10. Xcode 文件模板对话框\n\n2. 在测试导航器可见的情况下，点击导航器底部的添加按钮（`+`），然后从上下文菜单中选择 `New\
    \ UI Test Class` 菜单项（图 13-11）。\n\n   ![A432412_1_En_13_Fig11_HTML.jpg](img/A432412_1_En_13_Fig11_HTML.jpg)\n\
    \n   图 13-11. 创建新的 UI 测试类\n\n## 对 XCTest 的改动以支持 UI 测试\n\n为了支持 UI 测试，`XCTest` 中新增了四个新类和新协议。本节将讨论这些内容。\n"
- fmt: "\nXCUIApplication\n \nXCUIApplication 实例是一个代理对象，代表正在被测试的应用。目标应用在 UI 测试目标设置的“目标应用”字段中指定（图\
    \ [13-12](#A432412_1_En_13_Chapter.html#Fig12)）。\n\n![A432412_1_En_13_Fig12_HTML.jpg](A432412_1_En_13_Fig12_HTML.jpg)\n\
    \n**图 13-12.** UI 测试目标中的“目标应用”设置\n\n回顾一下，UI 测试是在一个与被测试应用不同的应用上下文中运行的，并通过代理对象与测试主体进行通信。\n\
    \n`XCUIApplication` 最常用的两个方法是 `launch()` 和 `terminate()`。通常，你会在测试类的 `setup()`\
    \ 方法中实例化一个 `XCUIApplication` 实例并调用 `launch` 方法：\n\n```swift\noverride func setUp()\
    \ {\n    super.setUp()\n    XCUIApplication().launch()\n}\n```\n\n对 `launch` 的调用是同步的，当被测试的应用启动完毕并准备好进行用户交互时返回。如果被测试的应用无法启动，将会产生一个测试失败。\n\
    \n你可以通过设置 `launchArguments` 属性来传递一个启动参数数组。例如，以下代码片段通过 `XCUIApplication` 代理向 `UIApplication`\
    \ 实例传递了一个启动参数 `ENABLE_CLIENT_SIDE_MOCKS`。\n\n```swift\noverride func setUp() {\n\
    \    super.setUp()\n    let application = XCUIApplication()\n    application.launchArguments\
    \ = [\"ENABLE_CLIENT_SIDE_MOCKS\"]\n    application.launch()\n}\n```\n\n被测试的应用需要负责检查这些参数并做出相应的处理。你提供给\
    \ `XCUIApplication.launchArguments` 的值数组可以在被测试的应用中通过 `CommandLine.arguments` 进行访问。\n\
    \n以下代码片段演示了如何通过调用 `CommandLine.arguments` 在被测试的应用中检索启动参数。该数组的第一个元素总是应用的完整路径，因此代码从索引\
    \ 1 开始检查元素：\n\n```swift\nfunc application(_ application: UIApplication, didFinishLaunchingWithOptions\
    \ launchOptions: [UIApplicationLaunchOptionsKey: Any]?) -> Bool {\n    let launchArguments\
    \ = CommandLine.arguments\n    for index in 1...launchArguments.count {\n    \
    \    let argument = launchArguments[index] as String\n        if argument.compare(\"\
    ENABLE_CLIENT_SIDE_MOCKS\") == .orderedSame {\n            // 在此处执行某些操作以启用客户端模拟。\n\
    \        }\n    }\n    return true\n}\n```\n\n要终止应用，你可以调用 `XCUIApplication` 代理对象上的\
    \ `terminate()` 方法。这不是绝对必要的，因为每次 UI 测试执行完毕后，`XCTest` 会自动终止应用实例。\n\n## XCUIDevice\n\
    \n这个类的实例代表运行 UI 测试的设备。`XCUIDevice` 是一个单例，并且始终只有一个实例，可以按如下方式访问：\n\n```swift\nlet\
    \ device = XCUIDevice.shared()\n```\n\n`XCUIDevice` 有一个名为 `orientation` 的属性，可用于获取或设置运行\
    \ UI 测试的设备的屏幕方向。表 [13-1](#A432412_1_En_13_Chapter.html#Tab1) 列出了 `orientation`\
    \ 属性最常用的值。\n\n**表 13-1.** 屏幕方向值\n\n| 值 | 描述 |\n| --- | --- |\n| `portrait` | 设备垂直定向，home\
    \ 键在底部。 |\n| `portraitUpsideDown` | 设备垂直定向，home 键在顶部。 |\n| `landscapeLeft` | 设备水平定向，home\
    \ 键在右侧。 |\n| `landscapeRight` | 设备水平定向，home 键在左侧。 |\n\n在运行 UI 测试之前，最好在 `setUp()`\
    \ 方法中显式设置设备的屏幕方向。以下代码片段演示了这一点，在被测试的应用启动后，将设备屏幕方向设置为 `portrait`。\n\n```swift\n\
    override func setUp() {\n    super.setUp()\n    XCUIApplication().launch()\n \
    \   let device = XCUIDevice.shared()\n    device.orientation = .portrait\n}\n\
    ```\n\n### XCUIElement, XCUIElementAttributes\n\n`XCUIElement` 实例是被测试应用中用户界面元素的代理。它几乎总是通过调用\
    \ `XCUIElementQuery` 实例的方法来获得。\n\n可以为被测试应用的用户界面上尚不存在的元素创建代理。这是因为 `XCUIElement`\
    \ 仅在其方法被调用时才进行求值。在求值时，如果 `XCUIElement` 未解析为实际的元素，将会产生一个测试失败。\n\n请务必记住，`XCUIElement`\
    \ 只是一个代理，提供的方法集非常有限。`XCUIElement` 实例不允许你直接访问底层的用户元素。例如，如果你有一个代表视图上某个按钮实例的 `XCUIElement`\
    \ 代理，你无法解引用该 `XCUIElement` 来获取底层的 `UIButton` 对象。\n\n表 [13-2](#A432412_1_En_13_Chapter.html#Tab2)\
    \ 列出了可在 `XCUIElement` 实例上调用的部分方法。这些方法旨在让你能够以类似于应用最终用户操作的方式，与底层用户界面元素进行交互。\n\n\
    **表 13-2.** XCUIElement 方法\n\n| 属性/方法名称 | 描述 |\n| --- | --- |\n| `var exists:\
    \ Bool { get }` | 如果 `XCUIElement` 代理解析为被测试应用中的实际 UI 元素，则返回 `true`。 |\n| `func\
    \ tap()` | 向被测试应用中的底层 UI 元素发送一个轻点事件。 |\n| `func doubleTap()` | 向被测试应用中的底层 UI 元素发送一个双击事件。\
    \ |\n| `func press(forDuration duration: TimeInterval)` | 向被测试应用中的底层 UI 元素发送一个长按手势事件，并持续指定的时长。\
    \ |\n| `func press(forDuration duration: TimeInterval, thenDragTo otherElement:\
    \ XCUIElement)` | 向被测试应用中的底层 UI 元素发送一个按住并拖拽到另一个元素的手势。用于表格单元格重新排序测试。 |\n| `func\
    \ swipeUp()` | 向被测试应用中的底层 UI 元素发送一个向上轻扫手势。 |\n| `func swipeDown()` | 向被测试应用中的底层\
    \ UI 元素发送一个向下轻扫手势。 |\n| `func swipeLeft()` | 向被测试应用中的底层 UI 元素发送一个向左轻扫手势。 |\n|\
    \ `func swipeRight()` | 向被测试应用中的底层 UI 元素发送一个向右轻扫手势。 |\n| `func pinch(withScale\
    \ scale: CGFloat, velocity: CGFloat)` | 向被测试应用中的底层 UI 元素发送一个捏合手势。 |\n| `func rotate(_\
    \ rotation: CGFloat, withVelocity velocity: CGFloat)` | 向被测试应用中的底层 UI 元素发送一个旋转手势。\
    \ |\n| `func adjust(toNormalizedSliderPosition normalizedSliderPosition: CGFloat)`\
    \ | 调整被测试应用中滑块的值。所需的滑块位置以归一化值 `[0.0, 1.0]` 的形式发送。 |\n| `func adjust(toPickerWheelValue\
    \ pickerWheelValue: String)` | 调整被测试应用中滚轮的值。 |\n\n`XCUIElement` 遵循 `XCUIElementAttributes`\
    \ 协议。该协议定义了多个属性，这些属性返回 UI 元素常用属性的值，具体将在下面讨论。\n\n**注意**\n\n`XCUIElement` 也遵循 `XCUIElementTypeQueryProvider`\
    \ 协议，这将在本章后面讨论。"
  raw: '## XCUIApplication


    An XCUIApplication instance is a proxy object that represents the application
    being tested. The Target application is specified in the “Target Application”
    field of the UI test target settings (Figure [13-12](#A432412_1_En_13_Chapter.html#Fig12)).


    ![A432412_1_En_13_Fig12_HTML.jpg](A432412_1_En_13_Fig12_HTML.jpg)


    Figure 13-12.


    The Target Application Setting Within the UI Test Target


    Recall that UI tests are run within the context of a separate app from the one
    you are testing, and they communicate with the subject under test using proxy
    opbjects.


    The two most commonly used methods of XCUIApplication are launch() and terminate().
    Typically, you instantiate an XCUIApplication instance in your test class’s setup()
    method and call the launch method:


    ```

    override func setUp() {

    super.setUp()

    XCUIApplication().launch()

    }

    ```


    The call to launch is synchronous , and returns when the application to be tested
    is launched and ready for user interaction. If the application to be tested could
    not be launched, then a test failure will be generated.


    You can optionally pass an array of launch arguments by setting the launchArguments
    properties. For example, the following snippet passes a launch argument ENABLE_CLIENT_SIDE_MOCKS
    to the UIApplication instance, via the XCUIApplication proxy.


    ```

    override func setUp() {

    super.setUp()

    let application = XCUIApplication()

    application.launchArguments = ["ENABLE_CLIENT_SIDE_MOCKS"]

    application.launch()

    }

    ```


    It is up to the application under test to look out for these arguments and do
    something meaningful with them. The array of values you provide to XCUIApplication.launchArguments
    can be accessed in the application under test using CommandLine.arguments.


    The following code snippet demonstrates how to retrieve launch arguments in the
    application under test by calling CommandLine.arguments. The first element in
    this array is always the full path to the application, which is why it examines
    elements from index 1 onward:


    ```

    func application(_ application: UIApplication, didFinishLaunchingWithOptions

    launchOptions: [UIApplicationLaunchOptionsKey: Any]?) -> Bool {

    let launchArguments = CommandLine.arguments

    for index in 1...launchArguments.count {

    let argument = launchArguments[index] as String

    if argument.compare("ENABLE_CLIENT_SIDE_MOCKS") == .orderedSame {

    // do something here to enable client side mocks.

    }

    }

    return true

    }

    ```


    To terminate an app, you could call the terminate() method on the XCUIApplication
    proxy object. This is not strictly necessary as XCTest will terminate the application
    instance automatically every time a UI test finishes executing.


    ## XCUIDevice


    An instance of this class represents the device on which the UI test is running.
    XCUIDevice is a singleton, and there is always only one instance of this class,
    which can be accessed as follows:


    ```

    let device = XCUIDevice.shared()

    ```


    XCUIDevice has one property called orientation that can be used to get or set
    the orientation of the device on which UI tests are executing. Table [13-1](#A432412_1_En_13_Chapter.html#Tab1)
    lists the most commonly used values of the orientation property.


    Table 13-1.


    Orientation values


    | Value | Description |

    | --- | --- |

    | `portrait` | The device is oriented vertically with the home button at the bottom.
    |

    | `portraitUpsideDown` | The device is oriented vertically with the home button
    at the top. |

    | `landscapeLeft` | The device is oriented horizontally with the home button on
    the right. |

    | `landscapeRight` | The device is oriented horizontally with the home button
    on the left. |


    It is a good idea to set the orientation of the device explicitly in the setUp()
    method before running a UI test. This is demonstrated in the following code snippet
    where the device orientation is set to portrait after the application under test
    is launched:


    ```

    override func setUp() {

    super.setUp()

    XCUIApplication().launch()

    let device = XCUIDevice.shared()

    device.orientation = .portrait

    }

    ```


    ### XCUIElement , XCUIElementAttributes


    An XCUIElement instance is a proxy for a user interface element in the application
    under test. It is almost always obtained by calling one of the methods on an XCUIElementQuery
    instance.


    It is possible to create proxies for elements that do not yet exist on the user
    interface of the application under test. This is because an XCUIElement is only
    evaluated when a method is called on it. At the time of evaluation, if the XCUIElement
    does not resolve into an actual element, a test failure will be generated.


    It is important to keep in mind that the XCUIElement is just a proxy and provides
    a very limited set of methods. XCUIElement instances do not let you access the
    underlying user element directly. For instance, if you had an XCUIElement proxy
    that represents a button instance on a view, you cannot dereference the XCUIElement
    to arrive at the underlying UIButton object.


    Table [13-2](#A432412_1_En_13_Chapter.html#Tab2) lists some of the methods available
    to call on XCUIElement instances. These methods are designed to provide the ability
    to interact with the underlying user interface element in a manner similar to
    how the end user of your app would.


    Table 13-2.


    XCUIElement Methods


    | Property/Method Name | Description |

    | --- | --- |

    | `var exists: Bool { get }` | Returns true if the XCUIElement proxy resolves
    into an actual UI element in the application being tested. |

    | `func tap()` | Sends a tap event to the underlying UI element in the application
    being tested. |

    | `func doubleTap()` | Sends a double tap event to the underlying UI element in
    the application being tested. |

    | `func press(forDuration duration: TimeInterval)` | Sends a long press gesture
    event to the underlying UI element in the application being tested, holding for
    the specified duration. |

    | `func press(forDuration duration: TimeInterval, thenDragTo otherElement: XCUIElement)`
    | Sends a press and hold gesture to the underlying UI element in the application
    being tested that then drags to another element. Useful for table cell reordering
    tests. |

    | `func swipeUp()` | Sends a swipe up gesture to the underlying UI element in
    the application being tested. |

    | `func swipeDown()` | Sends a swipe down gesture to the underlying UI element
    in the application being tested. |

    | `func swipeLeft()` | Sends a swipe left gesture to the underlying UI element
    in the application being tested. |

    | `func swipeRight()` | Sends a swipe left gesture to the underlying UI element
    in the application being tested. |

    | `func pinch(withScale scale: CGFloat, velocity: CGFloat)` | Sends a pinch gesture
    to the underlying UI element in the application being tested. |

    | `func rotate(_ rotation: CGFloat, withVelocity velocity: CGFloat)` | Sends a
    rotate gesture to the underlying UI element in the application being tested. |

    | `func adjust(toNormalizedSliderPosition normalizedSliderPosition: CGFloat)`
    | Adjusts the value of a slider in the application being tested. The desired slider
    position is sent as a normalized value [0.0, 1.0]. |

    | `func adjust(toPickerWheelValue pickerWheelValue: String)` | Adjusts the value
    of a picker wheel in the application being tested. |


    XCUIElement conforms to the XCUIElementAttributes protocol. This protocol defines
    several properties that return the values of commonly used attributes of UI elements,
    and is discussed next.


    Note


    XCUIElement also conforms to the XCUIElementTypeQueryProvider protocols, which
    are discussed later in this chapter.'
  trans: "\n\nXCUIApplication\n\nXCUIApplication 实例是一个代理对象，代表正在被测试的应用。目标应用在 UI 测试目标设置的“目标应用”字段中指定（图\
    \ 13-12）。\n\n![A432412_1_En_13_Fig12_HTML.jpg](img/A432412_1_En_13_Fig12_HTML.jpg)\n\
    \n**图 13-12.** UI 测试目标中的“目标应用”设置\n\n回顾一下，UI 测试是在一个与被测试应用不同的应用上下文中运行的，并通过代理对象与测试主体进行通信。\n\
    \n`XCUIApplication` 最常用的两个方法是 `launch()` 和 `terminate()`。通常，你会在测试类的 `setup()`\
    \ 方法中实例化一个 `XCUIApplication` 实例并调用 `launch` 方法：\n\n```swift\noverride func setUp()\
    \ {\n    super.setUp()\n    XCUIApplication().launch()\n}\n```\n\n对 `launch` 的调用是同步的，当被测试的应用启动完毕并准备好进行用户交互时返回。如果被测试的应用无法启动，将会产生一个测试失败。\n\
    \n你可以通过设置 `launchArguments` 属性来传递一个启动参数数组。例如，以下代码片段通过 `XCUIApplication` 代理向 `UIApplication`\
    \ 实例传递了一个启动参数 `ENABLE_CLIENT_SIDE_MOCKS`。\n\n```swift\noverride func setUp() {\n\
    \    super.setUp()\n    let application = XCUIApplication()\n    application.launchArguments\
    \ = [\"ENABLE_CLIENT_SIDE_MOCKS\"]\n    application.launch()\n}\n```\n\n被测试的应用需要负责检查这些参数并做出相应的处理。你提供给\
    \ `XCUIApplication.launchArguments` 的值数组可以在被测试的应用中通过 `CommandLine.arguments` 进行访问。\n\
    \n以下代码片段演示了如何通过调用 `CommandLine.arguments` 在被测试的应用中检索启动参数。该数组的第一个元素总是应用的完整路径，因此代码从索引\
    \ 1 开始检查元素：\n\n```swift\nfunc application(_ application: UIApplication, didFinishLaunchingWithOptions\
    \ launchOptions: [UIApplicationLaunchOptionsKey: Any]?) -> Bool {\n    let launchArguments\
    \ = CommandLine.arguments\n    for index in 1...launchArguments.count {\n    \
    \    let argument = launchArguments[index] as String\n        if argument.compare(\"\
    ENABLE_CLIENT_SIDE_MOCKS\") == .orderedSame {\n            // 在此处执行某些操作以启用客户端模拟。\n\
    \        }\n    }\n    return true\n}\n```\n\n要终止应用，你可以调用 `XCUIApplication` 代理对象上的\
    \ `terminate()` 方法。这不是绝对必要的，因为每次 UI 测试执行完毕后，`XCTest` 会自动终止应用实例。\n\n## XCUIDevice\n\
    \n这个类的实例代表运行 UI 测试的设备。`XCUIDevice` 是一个单例，并且始终只有一个实例，可以按如下方式访问：\n\n```swift\nlet\
    \ device = XCUIDevice.shared()\n```\n\n`XCUIDevice` 有一个名为 `orientation` 的属性，可用于获取或设置运行\
    \ UI 测试的设备的屏幕方向。表 13-1 列出了 `orientation` 属性最常用的值。\n\n**表 13-1.** 屏幕方向值\n\n| 值\
    \ | 描述 |\n| --- | --- |\n| `portrait` | 设备垂直定向，home 键在底部。 |\n| `portraitUpsideDown`\
    \ | 设备垂直定向，home 键在顶部。 |\n| `landscapeLeft` | 设备水平定向，home 键在右侧。 |\n| `landscapeRight`\
    \ | 设备水平定向，home 键在左侧。 |\n\n在运行 UI 测试之前，最好在 `setUp()` 方法中显式设置设备的屏幕方向。以下代码片段演示了这一点，在被测试的应用启动后，将设备屏幕方向设置为\
    \ `portrait`。\n\n```swift\noverride func setUp() {\n    super.setUp()\n    XCUIApplication().launch()\n\
    \    let device = XCUIDevice.shared()\n    device.orientation = .portrait\n}\n\
    ```\n\n### XCUIElement, XCUIElementAttributes\n\n`XCUIElement` 实例是被测试应用中用户界面元素的代理。它几乎总是通过调用\
    \ `XCUIElementQuery` 实例的方法来获得。\n\n可以为被测试应用的用户界面上尚不存在的元素创建代理。这是因为 `XCUIElement`\
    \ 仅在其方法被调用时才进行求值。在求值时，如果 `XCUIElement` 未解析为实际的元素，将会产生一个测试失败。\n\n请务必记住，`XCUIElement`\
    \ 只是一个代理，提供的方法集非常有限。`XCUIElement` 实例不允许你直接访问底层的用户元素。例如，如果你有一个代表视图上某个按钮实例的 `XCUIElement`\
    \ 代理，你无法解引用该 `XCUIElement` 来获取底层的 `UIButton` 对象。\n\n表 13-2 列出了可在 `XCUIElement`\
    \ 实例上调用的部分方法。这些方法旨在让你能够以类似于应用最终用户操作的方式，与底层用户界面元素进行交互。\n\n**表 13-2.** XCUIElement\
    \ 方法\n\n| 属性/方法名称 | 描述 |\n| --- | --- |\n| `var exists: Bool { get }` | 如果 `XCUIElement`\
    \ 代理解析为被测试应用中的实际 UI 元素，则返回 `true`。 |\n| `func tap()` | 向被测试应用中的底层 UI 元素发送一个轻点事件。\
    \ |\n| `func doubleTap()` | 向被测试应用中的底层 UI 元素发送一个双击事件。 |\n| `func press(forDuration\
    \ duration: TimeInterval)` | 向被测试应用中的底层 UI 元素发送一个长按手势事件，并持续指定的时长。 |\n| `func press(forDuration\
    \ duration: TimeInterval, thenDragTo otherElement: XCUIElement)` | 向被测试应用中的底层\
    \ UI 元素发送一个按住并拖拽到另一个元素的手势。用于表格单元格重新排序测试。 |\n| `func swipeUp()` | 向被测试应用中的底层 UI\
    \ 元素发送一个向上轻扫手势。 |\n| `func swipeDown()` | 向被测试应用中的底层 UI 元素发送一个向下轻扫手势。 |\n| `func\
    \ swipeLeft()` | 向被测试应用中的底层 UI 元素发送一个向左轻扫手势。 |\n| `func swipeRight()` | 向被测试应用中的底层\
    \ UI 元素发送一个向右轻扫手势。 |\n| `func pinch(withScale scale: CGFloat, velocity: CGFloat)`\
    \ | 向被测试应用中的底层 UI 元素发送一个捏合手势。 |\n| `func rotate(_ rotation: CGFloat, withVelocity\
    \ velocity: CGFloat)` | 向被测试应用中的底层 UI 元素发送一个旋转手势。 |\n| `func adjust(toNormalizedSliderPosition\
    \ normalizedSliderPosition: CGFloat)` | 调整被测试应用中滑块的值。所需的滑块位置以归一化值 `[0.0, 1.0]`\
    \ 的形式发送。 |\n| `func adjust(toPickerWheelValue pickerWheelValue: String)` | 调整被测试应用中滚轮的值。\
    \ |\n\n`XCUIElement` 遵循 `XCUIElementAttributes` 协议。该协议定义了多个属性，这些属性返回 UI 元素常用属性的值，具体将在下面讨论。\n\
    \n**注意**\n\n`XCUIElement` 也遵循 `XCUIElementTypeQueryProvider` 协议，这将在本章后面讨论。\n"
- fmt: '# XCUIElementAttributes


    `XCUIElementAttributes`协议定义了多个属性，这些属性返回常用的属性值。表13-3列出了一些在`XCUIElementAttributes`中定义的常用属性。


    **表13-3.** `XCUIElementAttribute`属性


    | 属性名称 | 描述 |

    | --- | --- |

    | `var identifier: String { get }` | 返回元素的辅助功能标识符。 |

    | `var frame: CGRect { get }` | 返回元素在屏幕坐标空间中的`frame`属性。 |

    | `var title: String { get }` | 返回元素的辅助功能标题。 |

    | `var label: String { get }` | 返回元素的标题（如果适用）。 |

    | `var elementType: XCUIElementType` | 返回一个枚举值，表示元素的类型。 |

    | `var isEnabled: Bool { get }` | 如果元素已启用以供用户交互，则返回`true`。 |

    | `var placeholderValue: String? { get }` | 返回当元素没有值时显示的占位符值。当代理元素指向`UITextField`时通常使用。
    |


    `elementType`属性的类型为`XCUIElementType`，它是一个大型枚举值。以下列出了一些更常用的值：


    *   `XCUIElementType.Alert`

    *   `XCUIElementType.Button`

    *   `XCUIElementType.NavigationBar`

    *   `XCUIElementType.TabBar`

    *   `XCUIElementType.ToolBar`

    *   `XCUIElementType.ActivityIndicator`

    *   `XCUIElementType.SegmentedControl`

    *   `XCUIElementType.Picker`

    *   `XCUIElementType.Image`

    *   `XCUIElementType.StaticText`

    *   `XCUIElementType.TextField`

    *   `XCUIElementType.DatePicker`

    *   `XCUIElementType.TextView`

    *   `XCUIElementType.WebView`

    *   `XCUIElementTypeQueryProvider`


    # XCUIElementQuery 和 XCUIElementTypeQueryProvider


    与迄今讨论的其他类不同，`XCUIElementQuery`并不代表一个代理用户界面元素。相反，此类的实例表示用于获取`XCUIElement`代理的查询。


    表13-4列出了一些由`XCUIElementQuery`提供的属性和方法。其中一些方法返回一个`XCUIElement`，而其他方法则返回另一个`XCUIElementQuery`实例。在后一种情况下，返回的`XCUIElementQuery`实例通常用于获取更小的元素子集。


    **表13-4.** `XCUIElementQuery`方法


    | 属性/方法名称 | 描述 |

    | --- | --- |

    | `var count: UInt { get }` | 在调用此属性时评估查询，并返回找到的匹配数。 |

    | `func element(boundBy index: UInt) -> XCUIElement` | 在调用此方法时解析查询，并返回指定索引处的元素。
    |

    | `func element(matching elementType: XCUIElementType, identifier: String?) ->
    XCUIElement` | 在调用此方法时解析查询，并返回匹配特定类型和辅助功能标识符的元素。 |

    | `func children(matching type: XCUIElementType) -> XCUIElementQuery` | 返回一个新查询，可用于提取特定类型的子元素。
    |


    您不会直接实例化`XCUIElementQuery`；相反，您可以在实现了`XCUIElementTypeQueryProvider`协议的对象上使用该协议定义的方法之一来获取合适的查询。以下对象实现了`XCUIElementTypeQueryProvider`：


    *   `XCUIApplication`

    *   `XCUIElement`

    *   `XCUIElementQuery`


    表13-5列出了`XCUIElementTypeQueryProvider`协议的一些常用方法。通常，您会在`XCUIApplication`实例上使用这些方法之一来返回一个初始的`XCUIElementQuery`，然后使用`XCUIElementQuery`中定义的方法递归地过滤到特定的用户界面元素。


    **表13-5.** `XCUIElementTypeQueryProvider`方法


    | 属性/方法名称 | 描述 |

    | --- | --- |

    | `var windows: XCUIElementQuery { get }` | 返回一个查询，提供对应用程序中当前可见的所有窗口的访问。iOS应用程序只有一个窗口。
    |

    | `var alerts: XCUIElementQuery { get }` | 返回一个查询，提供对应用程序中当前可见的所有警告的访问。应用程序中通常一次只显示一个警告。
    |

    | `var buttons: XCUIElementQuery { get }` | 返回一个查询，提供对应用程序中当前可见的所有按钮的访问。 |

    | `var navigationBars: XCUIElementQuery { get }` | 返回一个查询，提供对应用程序中当前可见的所有导航栏的访问。
    |

    | `tables: XCUIElementQuery { get }` | 返回一个查询，提供对应用程序中当前可见的所有表格视图的访问。 |

    | `var collectionViews: XCUIElementQuery { get }` | 返回一个查询，提供对应用程序中当前可见的所有集合视图的访问。
    |

    | `var staticTexts: XCUIElementQuery { get }` | 返回一个查询，提供对应用程序中当前可见的所有标签的访问。 |

    | `var textFields: XCUIElementQuery { get }` | 返回一个查询，提供对应用程序中当前可见的所有文本字段的访问。
    |

    | `textViews: XCUIElementQuery { get }` | 返回一个查询，提供对应用程序中当前可见的所有文本视图的访问。 |

    | `var maps: XCUIElementQuery { get }` | 返回一个查询，提供对应用程序中当前可见的所有地图视图的访问。 |

    | `var otherElements: XCUIElementQuery { get }` | 返回一个查询，提供对应用程序中当前可见的所有视图控制器的访问。
    |


    以下代码片段使用`application.staticTexts`创建了一个查询，该查询可以返回设备屏幕上所有可见的静态文本标签。


    ```

    let allLabels = XCUIApplication().staticTexts

    print (allLabels.count)

    ```


    如果您想获取第二个静态文本标签的`XCUIElement`代理（假设它存在），可以使用查询的`element(boundBy:)`方法，如下述语句所示：


    ```

    let secondLabel = allLabels.element(boundBy: 1)

    ```


    要检索静态文本标签上显示的实际文本，您可以在代理上使用`label`属性，如下所示：


    ```

    let caption = secondLabel.label

    ```


    使用`element(boundBy:)`方法对用户界面的布局很敏感。更好的方法是为您希望在UI测试中访问的用户界面元素设置辅助功能标识符，并获取这些元素的代理，而不论它们在屏幕上的布局如何。


    要为用户界面元素设置辅助功能标识符，请在故事板中选择该用户界面元素，并使用标识检查器（图13-13）。


    ![A432412_1_En_13_Fig13_HTML.jpg](A432412_1_En_13_Fig13_HTML.jpg)


    **图13-13.** 设置辅助功能标识符


    设置好辅助功能标识符后，您可以使用`element(matching:, identifier:)`方法来定位特定的用户界面元素，而不论用户界面是如何布局的。


    ```

    let application = XCUIApplication()

    let query = application.staticTexts

    let welcomeLabel =  query.element(matching: .staticText, identifier: "WelcomeMessage")

    ```'
  raw: '## XCUIElementAttributes


    The XCUIElementAttributes protocol defines several properties that return commonly
    used attributes. Table [13-3](#A432412_1_En_13_Chapter.html#Tab3) lists some of
    the commonly used properties defined in XCUIElementAttributes.


    Table 13-3.


    XCUIElementAttribute Properties


    | Property Name | Description |

    | --- | --- |

    | `var identifier: String { get }` | Returns the accessibility identifier of the
    element. |

    | `var frame: CGRect { get }` | Returns the frame property of the element in screen
    coordinate space. |

    | `var title: String { get }` | Returns the accessibility title of the element.
    |

    | `var label: String { get }` | Returns the caption of the element (if applicable)
    . |

    | `var elementType: XCUIElementType` | Returns an enumeration value that represents
    the type of the element. |

    | `var isEnabled: Bool { get }` | Returns true if the element is enabled for user
    interaction. |

    | `var placeholderValue: String? { get }` | Returns the placeholder value that
    is displayed when the element has no value. Commonly used when the proxy element
    refers to a UITextField. |


    The elementType property is of type XCUIElementType and is a large enumeration
    of values. Some of the more commonly used values are listed here:


    *   XCUIElementType.Alert

    *   XCUIElementType.Button

    *   XCUIElementType.NavigationBar

    *   XCUIElementType.TabBar

    *   XCUIElementType.ToolBar

    *   XCUIElementType.ActivityIndicator

    *   XCUIElementType.SegmentedControl

    *   XCUIElementType.Picker

    *   XCUIElementType.Image

    *   XCUIElementType.StaticText

    *   XCUIElementType.TextField

    *   XCUIElementType.DatePicker

    *   XCUIElementType.TextView

    *   XCUIElementType.WebView

    *   XCUIElementTypeQueryProvider


    ## XCUIElementQuery and XCUIElementTypeQueryProvider


    Unlike the other classes discussed so far, an XCUIElementQuery does not represent
    a proxy user interface element. Instead, an instance of this class represents
    a query used to obtain a XCUIElement proxy.


    Table [13-4](#A432412_1_En_13_Chapter.html#Tab4) lists some of the properties
    and methods provided by XCUIElementQuery. Some of these methods return an XCUIElement,
    while others return yet another XCUIElementQuery instance. In the latter case,
    the returned XCUIElementQuery instance is usually used to obtain a smaller subset
    of elements.


    Table 13-4.


    XCUIElementQuery Methods


    | Property/Method Name | Description |

    | --- | --- |

    | `var count: UInt { get }` | Evaluates the query at the time this property is
    called and returns the number of matches found. |

    | `func element(boundBy index: UInt) -> XCUIElement` | Resolves the query at the
    time this method is called and returns an element at the specified index. |

    | `func element(matching elementType: XCUIElementType, identifier: String?) ->
    XCUIElement` | Resolves the query at the time this method is called and returns
    an element that matches a specific type and accessibility identifier. |

    | `func children(matching type: XCUIElementType) -> XCUIElementQuery` | Returns
    a new query that can be used to extract children of a specific type. |


    You do not instantiate an XCUIElementQuery directly; instead you use one of the
    methods defined by the XCUIElementTypeQueryProvider protocol on an object that
    implements it to get a suitable query. The following objects implement XCUIElementTypeQueryProvider:


    *   XCUIApplication,

    *   XCUIElement, and

    *   XCUIElementQuery.


    Table [13-5](#A432412_1_En_13_Chapter.html#Tab5) lists some of the commonly used
    methods of the XCUIElementTypeQueryProvider  protocol. Typically, you will use
    one of these methods on the XCUIApplication instance to return an initial XCUIElementQuery,
    and you will then use the methods defined in XCUIElementQuery to recursively filter
    down to a specific user interface element.


    Table 13-5.


    XCUIElementTypeQueryProvider Methods


    | Property/Method name | Description |

    | --- | --- |

    | `var windows: XCUIElementQuery { get }` | Returns a query that provides access
    to all windows that are currently visible in app. iOS applications have just a
    single window. |

    | `var alerts: XCUIElementQuery { get }` | Returns a query that provides access
    to all alerts that are currently visible in app. Usually there is only one alert
    visible in an app at a time. |

    | `var buttons: XCUIElementQuery { get }` | Returns an query that provides access
    to all buttons that are currently visible in app. |

    | `var navigationBars: XCUIElementQuery { get }` | Returns a query that provides
    access to all navigation bars that are currently visible in app. |

    | `tables: XCUIElementQuery { get }` | Returns a query that provides access to
    all table views that are currently visible in app. |

    | `var collectionViews: XCUIElementQuery { get }` | Returns a query that provides
    access to all collection views that are currently visible in app. |

    | `var staticTexts: XCUIElementQuery { get }` | Returns a query that provides
    access to all labels that are currently visible in app. |

    | `var textFields: XCUIElementQuery { get }` | Returns a query that provides access
    to all text fields that are currently visible in app. |

    | `textViews: XCUIElementQuery { get }` | Returns a query that provides access
    to all text views that are currently visible in app. |

    | `var maps: XCUIElementQuery { get }` | Returns a query that provides access
    to all map views that are currently visible in app. |

    | `var otherElements: XCUIElementQuery { get }` | Returns a query that provides
    access to all view controllers that are currently visible in app. |


    The following snippet uses application.staticTexts to create a query that can
    return all the visible static labels on the device’s screen.


    ```

    let allLabels = XCUIApplication().staticTexts

    print (allLabels.count)

    ```


    If you want to retrieve a XCUIElement proxy for the second static label (assuming
    it exists), you can use the element(boundBy:) method of the query as shown in
    the following statement:


    ```

    let secondLabel = allLabels.element(boundBy: 1)

    ```


    To retrieve the actual text displayed on the static label, you can use the label
    property on the proxy as follows:


    ```

    let caption = secondLabel.label

    ```


    Using the element(boundBy:) method is sensitive to the layout of the user interface.
    A better approach would be to set up accessibility identifiers for the user interface
    elements that you wish to access in your UI tests and retrieve proxies to these
    elements regardless of how they are laid out on the screen.


    To set up an accessibility identifier for a user interface element, select the
    user interface element in the storyboard and use the Identity Inspector (Figure
    [13-13](#A432412_1_En_13_Chapter.html#Fig13)) .


    ![A432412_1_En_13_Fig13_HTML.jpg](A432412_1_En_13_Fig13_HTML.jpg)


    Figure 13-13.


    Setting Up an Accessibility Identifier


    After setting up accessibility identifiers, you can use the element(matching:,
    identifier:) method to locate a particular user interface element, regardless
    of how the user interface is laid out.


    ```

    let application = XCUIApplication()

    let query = application.staticTexts

    let welcomeLabel =  query.element(matching: .staticText, identifier: "WelcomeMessage")

    ```'
