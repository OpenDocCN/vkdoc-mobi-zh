- fmt: '### Binding the Signup View Controller Class to the View Model


    Table [5-8](A432412_1_En_5_Chapter.html#Tab8) lists the methods in the `SignupViewController`
    class along with their associated view model bindings.


    **Table 5-8.** Signup view controller and view model bindings


    | Signup View Controller Method | Signup View Model Method |

    | --- | --- |

    | `func viewDidLoad()` | `func performInitialViewSetup()` |

    | `@IBAction func login(_ sender: Any)` | `func login(userName:String?, password:String?)`
    |

    | `@IBAction func userNameDidEndOnExit(_ sender: Any)` | `func userNameDidEndOnExit()`
    |

    | `@IBAction func passwordDidEndOnExit(_ sender: Any)` | `func passwordDidEndOnExit()`
    |

    | `func textField(_ textField: UITextField, shouldChangeCharactersIn range: NSRange,
    replacementString string: String) -> Bool` | `func userNameUpdated(_ value:String?)`
    and `func passwordUpdated(_ value:String?)` |


    The complete `SignupViewController` class is presented in Listing [5-15](A432412_1_En_5_Chapter.html#Par243).
    If you would like to examine the code for the tests, download the finished project
    anonymously from github using the following URL:


    [`https://github.com/asmtechnology/Lesson05.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson05.iOSTesting.2017.Apress.git)


    ```

    import UIKit

    class SignupViewController: UIViewController {

    @IBOutlet weak var userNameTextField: UITextField!

    @IBOutlet weak var passwordTextField: UITextField!

    @IBOutlet weak var confirmPasswordTextField: UITextField!

    @IBOutlet weak var emailAddressTextField: UITextField!

    @IBOutlet weak var createButton: UIButton!

    @IBOutlet weak var cancelButton: UIButton!

    var viewModel:SignupViewModel?

    override func viewDidLoad() {

    super.viewDidLoad()

    if self.viewModel == nil {

