    ## 测试 Core Data


    本章到目前为止构建的模型对象都有一个共同点——它们都是 `NSObject` 的子类。这在许多 iOS 应用程序中非常常见；然而，越来越多的应用程序使用像
    Core Data 这样的对象持久化框架来表示和持久化模型数据。


    对 Core Data 的详细讨论超出了本书的范围。测试模型层可能是那些在模型层中使用 Core Data 的开发者面临的最大障碍之一。


    Core Data 旨在将您的模型对象及其关系持久化到数据库中。为了实现其目标，Core Data 引入了大量类，例如 `NSManagedObject`、`NSManagedObjectContext`、`NSManagedObjectModel`、`NSPersistentStoreCoordintor`，并且要求您让
    Core Data 管理模型对象的生命周期。


    由于 Core Data 管理模型对象的生命周期，您不能简单地使用指定或便捷初始化器来实例化模型对象；相反，您需要请求一个托管对象上下文来实例化该对象。


    虽然托管对象上下文本身可以通过指定初始化器方便地实例化，但此初始化器的参数之一是一个持久化存储协调器，它要求您提供 SQLite 数据库文件的路径。


    在应用程序代码中实例化持久化存储协调器是非常常见的做法；但是，要在单元测试用例中实例化它，您需要在测试目标中包含一个数据库。严格来说，不鼓励在测试目标中包含数据库，因为从数据库读取和写入的测试很容易在测试用例之间创建依赖关系。


    很容易想象一个测试用例将一些数据写入数据库，而另一个测试用例读取其中的一些数据。这种类型的行为会在测试之间创建紧密耦合，测试的确切执行顺序变得重要，并且测试不再独立。当这种类型的行为无意中发生时，情况就更糟了。


    幸运的是，Core Data 有一个经常被忽略的功能，称为内存存储，它可以在测试中使用，而无需在测试目标中包含 SQLite 文件。内存存储是一个基于 RAM
    的数据库，通常用于实现缓存策略。内存存储的一个关键特性是它们可以在几乎没有性能开销的情况下被销毁并重新创建到初始状态。


    以下代码片段展示了如何创建一个使用内存持久化存储协调器的托管对象上下文：


    ```

    func inMemoryManagedObjectContext() -> NSManagedObjectContext? {

    guard let managedObjectModel = NSManagedObjectModel.mergedModel(from:[Bundle.main])
    else {

    return nil

    }

    let persistentStoreCoordinator = NSPersistentStoreCoordinator(managedObjectModel:
    managedObjectModel)

    do {

    try persistentStoreCoordinator.addPersistentStore(ofType: NSInMemoryStoreType,

    configurationName: nil,

    at: nil,

    options: nil)

    } catch {

    print("Failed to create in-memory persistent store.")

    return nil

    }

    let managedObjectContext = NSManagedObjectContext(concurrencyType:.mainQueueConcurrencyType)

    managedObjectContext.persistentStoreCoordinator = persistentStoreCoordinator

    return managedObjectContext

    }

    ```


    您可以在测试用例的 setup 方法中使用此方法来创建一个由内存存储支持的托管对象上下文。然后，您可以在测试中使用此托管对象上下文来实例化 Core Data
    对象。


    ## 总结


    在本章中，您使用测试驱动技术创建了一个应用程序的模型层。对于模型层的每个组件，您首先创建了一组测试用例，然后构建相应的模型层类以确保测试用例通过。


    您还学习了创建验证器对象来验证模型层对象的内容，以及如何将这些验证器对象作为依赖项注入到模型层对象中。


    最后，您学习了在 Swift 中创建模拟对象，并使用模拟对象来验证模型层对象与注入的验证器对象之间的集成。

    '
- fmt: '# 5. Applying TDD to View Controllers


    This chapter will examine the process of building an iOS app based on the Single
    View Controller project template using TDD techniques. The app will have two view
    controllers that provide sign up and login screen functionality. This app will
    be built using the MVVM application architecture.


    Figure [5-1](#A432412_1_En_5_Chapter.html#Fig1) depicts the user interface of
    the finished application.


    ![A432412_1_En_5_Fig1_HTML.jpg](A432412_1_En_5_Fig1_HTML.jpg)


    **Figure 5-1.** User Interface of Finished application


    The complete source code for the app can be downloaded anonymously from github
    using the following URL:


    [`https://github.com/asmtechnology/Lesson05.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson05.iOSTesting.2017.Apress.git)


    ## Application Architecture


    The application architecture consists of four distinct layers (see Figure [5-2](#A432412_1_En_5_Chapter.html#Fig2)).


    ![A432412_1_En_5_Fig2_HTML.jpg](A432412_1_En_5_Fig2_HTML.jpg)


    **Figure 5-2.** LoginForm Application Architecture


    Following is a brief description of the layers and the component classes:


    - **Model Layer:** Consists of the `LoginModel` and `SignupModel` classes, instances
    of which are used to store the data entered by the user on the Login and Signup
    screens respectively. This layer also contains three classes to handle field validation
    – `UserNameValidator`, `PasswordValidator`, and `EmailAddressValidator`.

    - **View Model Layer:** Consists of the `LoginViewModel` and `SignupViewModel`
    classes.

    - **View/View Controller Layer:** Consists of the `LoginViewController` and `SignupViewController`
    classes. These classes provide the user interface for the app.

    - **Other Controllers Layer:** Consists of the `LoginController` and `SignupController`
    classes that carry out the actual process of login and signup. In this project,
    these classes are stub implementations. In a real-world scenario, you will write
    code in these classes to connect to your back-end web services and perform the
    necessary steps required to log in/sign up.


    ## Creating the Xcode Project


    Let us start by creating a new Xcode project. Launch Xcode and create a new iOS
    project based on the Single View Application template (see Figure [5-3](#A432412_1_En_5_Chapter.html#Fig3)).


    ![A432412_1_En_5_Fig3_HTML.jpg](A432412_1_En_5_Fig3_HTML.jpg)


    **Figure 5-3.** Xcode Project Template Dialog Box


    Use the following options while creating the new project (see Figure [5-4](#A432412_1_En_5_Chapter.html#Fig4)):


    ![A432412_1_En_5_Fig4_HTML.jpg](A432412_1_En_5_Fig4_HTML.jpg)


    **Figure 5-4.** Xcode Project Options Dialog Box


    - **Product Name:** `LoginForm`

    - **Team:** None

    - **Organization Name:** Provide a suitable name

    - **Organization Identifier:** Provide a suitable identifier

    - **Language:** `Swift`

    - **Devices:** `iPhone`

    - **Use Core Data:** Unchecked

    - **Include Unit Tests:** Checked

    - **Include UI Tests:** Unchecked


    > **Note**

    > The project being created in this chapter does not include user interface (UI)
    tests. If you wish, you can add UI tests to a project retrospectively. Chapter
    [13](#A432412_1_En_13_Chapter.html) covers the topic of user interface testing.


    Save the project to a suitable location on your computer and click Create. Since
    this project will contain several new classes, it will be a good idea to place
    class files under appropriate groups within the project navigator.


    Create the following groups in the Xcode project navigator, under the `LoginForm`
    folder:


    - `View`

    - `Model`

    - `ViewModel`

    - `Protocols`


    ## Building the User Interface Layer


    The user interface for this application consists of two storyboard scenes and
    a segue between the scenes (see Figure [5-5](#A432412_1_En_5_Chapter.html#Fig5)).


    ![A432412_1_En_5_Fig5_HTML.jpg](A432412_1_En_5_Fig5_HTML.jpg)


    **Figure 5-5.** Application Storyboard


    The new project that you have created has a default view controller that we will
    not use. Delete the `ViewController.swift` file from the project navigator, and
    create two new `UIViewController` subclasses under the `View` group called:


    - `LoginViewController`

    - `SignupViewController`


    The project navigator should resemble Figure [5-6](#A432412_1_En_5_Chapter.html#Fig6).


    ![A432412_1_En_5_Fig6_HTML.jpg](A432412_1_En_5_Fig6_HTML.jpg)


    **Figure 5-6.** LoginForm Project Navigator'
