  trans: '

    # 审阅业务需求


    在构建此应用的过程中，您的业务团队已决定尝试采用行为驱动开发的方法。产品负责人和业务分析师访谈了不同的用户群体，并研究了目标人群的用户趋势报告。经过数周的集体分析与文档整理，他们提出了一套业务需求，列于表
    12-1 中。


    表 12-1. 餐馆目录应用需求


    | 编号 | 需求 |

    | --- | --- |

    | 1 | 作为 [顾客]，我想要 [查看伦敦市内我选择区域附近的餐馆列表]，以便 [我可以计划我的下一餐]。 |

    | 2 | 作为 [顾客]，我想要 [了解所选餐馆与最近地铁站之间的距离]，以便 [我可以制定出行计划]。 |

    | 3 | 作为 [顾客]，我想要 [了解餐馆的食品质量信息]，以便 [我可以做出明智的就餐决定]。 |

    | 4 | 作为 [顾客]，我想要 [了解餐馆提供的菜系类型]，以便 [我可以做出明智的就餐决定]。 |


    随后，这些需求被移交给了开发团队。记录这些需求的业务分析师与一名开发人员和一名测试人员共同协作，基于这些需求准备了一套用户场景。用户场景列于表 12-2 中。


    表 12-2. 餐馆目录用户场景


    | 编号 | 用户场景 |

    | --- | --- |

    | 1 | 假设 [应用已启动]，当 [应用的首页加载完成] 时，那么 [用户界面上应有一个选项，可从列表中选择伦敦的一个区域]。 |

    | 2 | 假设 [应用已启动]，当 [应用的首页加载完成] 时，那么 [用户界面上应有一个“下一步”按钮]。 |

    | 3 | 假设 [应用的首页加载完成]，当 [未选择任何区域] 时，那么 [“下一步”按钮应处于禁用状态]。 |

    | 4 | 假设 [应用的首页加载完成]，当 [已选择伦敦的一个区域] 时，那么 [“下一步”按钮应处于启用状态]。 |

    | 5 | 假设 [用户已选择一个位置]，当 [点击“下一步”按钮] 时，那么 [应出现一个新屏幕，显示该位置的餐馆列表]。 |

    | 6 | 假设 [餐馆列表在屏幕上可见]，当 [列表中显示餐馆名称] 时，那么 [该列表项应附带最近地铁站名称]。 |

    | 7 | 假设 [餐馆列表在屏幕上可见]，当 [列表中显示餐馆名称] 时，那么 [该列表项应附带到最近地铁站的大致英里距离]。 |

    | 8 | 假设 [餐馆列表在屏幕上可见]，当 [列表中显示餐馆名称] 时，那么 [该列表项应附带一个 1 到 5 之间的整数，表示该餐馆的质量，其中 1
    为最差，5 为最佳]。 |

    | 9 | 假设 [餐馆列表在屏幕上可见]，当 [列表中显示餐馆名称] 时，那么 [该列表项应附带该餐馆提供的菜系信息]。 |


    从 QA（质量保证）团队的角度来看，每个用户故事都可以通过运行应用并目视检查结果来测试。然而，从应用开发者的角度来看，许多这些需求本质上是可视化的，无法使用
    TDD（测试驱动开发）或 BDD（行为驱动开发）技术进行测试。


    例如，场景 1 要求一个 UI（用户界面）元素在屏幕上可见。这个场景很容易通过目视检查来测试，但不容易通过编程方式测试。


    因此，虽然 QA 团队将使用他们可用的各种技术来测试每个场景，但开发者只能为其中一部分场景创建 Quick 测试。表 12-3 列出了开发者将使用 Quick
    进行测试的那部分场景。


    表 12-3. 可使用 Quick 测试的餐馆目录用户场景


    | 编号 | 用户场景 | 备注 |

    | --- | --- | --- |

    | 1 | 假设 [应用已启动]，当 [应用的首页加载完成] 时，那么 [用户界面上应有一个选项，可从列表中选择伦敦的一个区域]。 | 无法使用 Quick
    测试，因为它需要视觉验证。 |

    | 2 | 假设 [应用已启动]，当 [应用的首页加载完成] 时，那么 [用户界面上应有一个“下一步”按钮]。 | 无法使用 Quick 测试，因为它需要视觉验证。
    |

    | 3 | 假设 [应用的首页加载完成]，当 [未选择任何区域] 时，那么 [“下一步”按钮应处于禁用状态]。 |  |

    | 4 | 假设 [应用的首页加载完成]，当 [已选择伦敦的一个区域] 时，那么 [“下一步”按钮应处于启用状态]。 |  |

    | 5 | 假设 [用户已选择一个位置]，当 [点击“下一步”按钮] 时，那么 [应出现一个新屏幕，显示该位置的餐馆列表]。 | 部分可测试。开发者可以测试点击按钮会触发显示新屏幕的过程，但无法测试新屏幕是否真的出现了。
    |

    | 6 | 假设 [餐馆列表在屏幕上可见]，当 [列表中显示餐馆名称] 时，那么 [该列表项应附带最近地铁站名称]。 | 部分可测试。开发者可以测试视图控制器上是否调用了一个带有预期值的特定方法。然而，如果不进行视觉检查结果，开发者无法测试屏幕上的文本是否真的更新了。
    |

    | 7 | 假设 [餐馆列表在屏幕上可见]，当 [列表中显示餐馆名称] 时，那么 [该列表项应附带到最近地铁站的大致英里距离]。 | 部分可测试。开发者可以测试视图控制器上是否调用了一个带有预期值的特定方法。然而，如果不进行视觉检查结果，开发者无法测试屏幕上的文本是否真的更新了。
    |

    | 8 | 假设 [餐馆列表在屏幕上可见]，当 [列表中显示餐馆名称] 时，那么 [该列表项应附带一个 1 到 5 之间的整数，表示该餐馆的质量，其中 1
    为最差，5 为最佳]。 | 部分可测试。开发者可以测试视图控制器上是否调用了一个带有预期值的特定方法。然而，如果不进行视觉检查结果，开发者无法测试屏幕上的文本是否真的更新了。
    |

    | 9 | 假设 [餐馆列表在屏幕上可见]，当 [列表中显示餐馆名称] 时，那么 [该列表项应附带该餐馆提供的菜系信息]。 | 部分可测试。开发者可以测试视图控制器上是否调用了一个带有预期值的特定方法。然而，如果不进行视觉检查结果，开发者无法测试屏幕上的文本是否真的更新了。
    |


    表 12-3 的内容在整个团队中已明确沟通，以便所有成员都能清楚地了解谁将测试系统的哪些方面。除此之外，团队已同意将对餐馆列表应用以下字段验证标准：


    -   餐馆名称：长度在 2 到 30 个字符之间，不能包含数字或特殊字符。允许使用与号（`&`）字符。

    -   菜系类型：长度在 4 到 10 个字符之间，不能包含数字、特殊字符或空白字符。一家餐馆最多只能有一种菜系。

    -   最近地铁站名称：长度在 4 到 30 个字符之间，不能包含数字或特殊字符。允许使用与号（`&`）字符。

    -   评分：一个介于 0 到 5 之间的数字（含两端）。不能包含空白字符、字母数字或特殊字符。

    '
- fmt: '## High-Level Application Architecture


    The application architecture consists of three distinct layers (see Figure [12-1](#A432412_1_En_12_Chapter.html#Fig1)).


    ![A432412_1_En_12_Fig1_HTML.jpg](A432412_1_En_12_Fig1_HTML.jpg)


    Figure 12-1. High-Level Application Architecture


    A brief description of the layers and the component classes follows:


    * **Model Layer** : Consists of the `Restaurant` class, instances of which are
    used to hold the data that will be displayed to the user. The model layer also
    contains validator objects that encapsulate the validation logic for the fields
    of the `Restaurant` object.

    * **View Model Layer** : Consists of the `SearchViewModel`, `RestaurantTableViewModel`,
    `RestaurantTableViewCellViewModel` classes.

    * **View/View Controller Layer** : Consists of the `SearchViewController`, `RestaurantTableViewController`,
    and classes.


    Figure [12-2](#A432412_1_En_12_Chapter.html#Fig2) depicts the user interface of
    the finished application.


    ![A432412_1_En_12_Fig2_HTML.jpg](A432412_1_En_12_Fig2_HTML.jpg)


    Figure 12-2. User Interface of the `RestaurantFinder` Application


    The complete source code for the app can be downloaded anonymously from github
    using the following URL:


    [`https://github.com/asmtechnology/Lesson12.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson12.iOSTesting.2017.Apress.git)


    ## Creating the Xcode Project


    Launch Xcode and create a new iOS project based on the Single View Application
    template. Use the following options while creating the new project (see Figure
    [12-3](#A432412_1_En_12_Chapter.html#Fig3)):


    ![A432412_1_En_12_Fig3_HTML.jpg](A432412_1_En_12_Fig3_HTML.jpg)


    Figure 12-3. Xcode Project Options Dialog


    * **Product Name**: `RestaurantDirectory`

    * **Team**: None

    * **Organization Name**: Provide a suitable name

    * **Organization Identifier**: Provide a suitable identifier

    * **Language**: Swift

    * **Devices**: iPhone

    * **Use Core Data**: Unchecked

    * **Include Unit Tests**: Checked

    * **Include UI Tests**: Unchecked


    **Note**: The project being created in this chapter does not include user interface
    (UI) tests. If you wish, you can add UI tests to a project retrospectively. Chapter
    [13](#A432412_1_En_13_Chapter.html) covers the topic of user interface testing.


    Save the project to a suitable location on your computer and click Create. Since
    this project will contain several new classes, it will be a good idea to place
    class files under appropriate groups within the project navigator.


    Create the following groups in the Xcode project navigator, nested under the `RestaurantDirectory`
    folder:


    * `View`

    * `Model`

    * `ViewModel`

    * `Protocols`


    ## Adding Resources to the Project


    Add the `RestaurantData.json` file included with this lesson’s downloads into
    the project. While adding this file, ensure the “Copy Items if Needed” option
    is checked in the import dialog box (see Figure [12-4](#A432412_1_En_12_Chapter.html#Fig4)).


    ![A432412_1_En_12_Fig4_HTML.jpg](A432412_1_En_12_Fig4_HTML.jpg)


    Figure 12-4. Xcode File Import Dialog


    The JSON file you have imported contains data on restaurants, and a sample of
    the contents of the JSON file is presented in Listing [12-1](#A432412_1_En_12_Chapter.html#Par40).


    ```

    [

    {

    "area": "Notting Hill",

    "rating": "4",

    "cuisine": "Persian",

    "distance": "0.3",

    "tubeStation": "Notting Hill Gate",

    "restaurantName": "Alibaba''s"

    }

    ]

    Listing 12-1. RestaurantData.json

    ```


    ## Building the User Interface Layer


    The user interface for this application consists of two storyboard scenes embedded
    within a navigation controller (see Figure [12-5](#A432412_1_En_12_Chapter.html#Fig5)).


    ![A432412_1_En_12_Fig5_HTML.jpg](A432412_1_En_12_Fig5_HTML.jpg)


    Figure 12-5. Storyboard Layout for the `RestaurantFinder` Application


    Delete the `ViewController.swift` file from the project navigator, and create
    the following Swift classes under the `View` group:


    * A `UIViewController` subclass called `SearchViewController`.

    * A `UITableViewController` subclass called `RestaurantTableViewController`.

    * A `UITableViewCell` subclass called `RestaurantTableViewCell`.


    Ensure these classes are included in both the `RestaurantDirectory` and `RestaurantDirectoryTests`
    targets. The project navigator should resemble Figure [12-6](#A432412_1_En_12_Chapter.html#Fig6).


    ![A432412_1_En_12_Fig6_HTML.jpg](A432412_1_En_12_Fig6_HTML.jpg)


    Figure 12-6. Target Membership for New Classes Added to the Project


    Open the `Main.storyboard` file and select the default scene in the storyboard.
    Switch to the Identity Inspector and change the class associated with the scene
    to `SearchViewController` (see Figure [12-7](#A432412_1_En_12_Chapter.html#Fig7)).


    ![A432412_1_En_12_Fig7_HTML.jpg](A432412_1_En_12_Fig7_HTML.jpg)


    Figure 12-7. Using the Identity Inspector to Change the Class Associated with
    a Storyboard Scene


    Drag and drop a label, picker view, and button from the Object Library onto the
    search view controller scene. Set the text displayed in the label to “Select a
    location in London” and the font size of the text in the label to 14 points. Set
    the text displayed in the button to “View Restaurant Listings” and the background
    color to a shade of gray. Position the objects on the scene to resemble Figure
    [12-8](#A432412_1_En_12_Chapter.html#Fig8). Use appropriate constraints for the
    object to maintain their relative position on different screen sizes.


    ![A432412_1_En_12_Fig8_HTML.jpg](A432412_1_En_12_Fig8_HTML.jpg)


    Figure 12-8. User Interface Elements Added to Default Storyboard Scene


    Using the storyboard, set up the `SearchViewController` class to act as the delegate
    and data source for the picker view. Table [12-4](#A432412_1_En_12_Chapter.html#Tab4)
    lists the outlets and action methods that you need to create in the `SearchViewController`
    class along with their associated user interface elements.


    Table 12-4. Search view controller outlets and actions


    | Name | Type | Description |

    | --- | --- | --- |

    | `@IBOutlet weak var locationPicker: UIPickerView!` | IB Outlet | Connect this
    outlet to the picker view in the storyboard scene. |

    | `@IBOutlet weak var viewRestaurantButton: UIButton!` | IB Outlet | Connect this
    outlet to the View Restaurant Listings button of the storyboard scene. |

    | `@IBAction func onViewListings(_ sender: Any)` | IB Action | Connect this method
    to the Touch Up Inside event of the View Restaurant Listings button. |


    Implement the `UIPickerViewDelegate` protocol in a separate class extension on
    `SearchViewController` by adding the following code to the end of the `SearchViewController.swift`
    file:


    ```

    extension SearchViewController : UIPickerViewDelegate {

    func pickerView(_ pickerView: UIPickerView,

    titleForRow row: Int,

    forComponent component: Int) -> String? {

    return nil

    }

    func pickerView(_ pickerView: UIPickerView,

    didSelectRow row: Int, inComponent component: Int) {

    }

    }

    ```


    Implement the `UIPickerViewDataSource` protocol in a separate class extension
    on `SearchViewController` by adding the following code to the end of the `SearchViewController.swift`
    file:


    ```

    extension SearchViewController : UIPickerViewDataSource {

    func numberOfComponents(in pickerView: UIPickerView) -> Int {

    return 0

    }

    func pickerView(_ pickerView: UIPickerView,

    numberOfRowsInComponent component: Int) -> Int {

    return 0

    }

    }

    ```'
