    清单 12-3 中的代码定义了一个名为 `RestaurantDirectorySpecification` 的 BDD 规范类，它是 `QuickSpec`
    的子类，包含多个 BDD 风格的测试，每个测试对应表 12-3（我们之前见过）中描述的一个用户场景。接下来对该文件的内容进行分析。


    文件顶部有三个导入语句，导入了 `Foundation`、`Quick` 和 `Nimble` 框架：


    ```

    import Foundation

    import Quick

    import Nimble

    ```


    `RestaurantDirectorySpecification` 类声明为 `QuickSpec`（而非 `XCTest`）的子类，因为我们打算编写 BDD
    风格的测试：


    ```

    class RestaurantDirectorySpecification : QuickSpec

    ```


    该类包含多个实例变量，用于创建 `SearchViewController` 和 `RestaurantTableViewCell` 类的桩版本：


    ```

    // 针对 SearchViewController 功能的测试的模拟和桩

