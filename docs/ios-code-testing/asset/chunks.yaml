- fmt: "# Binding the View Layer to the View Model\n\nSo far in this chapter, we have\
    \ used a test-driven approach to build the model and view model layers. The view\
    \ model objects have made use of protocols to describe an interface to the view\
    \ layer, and for the purposes of testing the view model objects, you have used\
    \ mock objects for the view layer.\n\nThe tests have all passed, which indicates\
    \ the view model and model layers are working as expected, using mock view layer\
    \ objects. It is now time to implement the view layer protocols on the actual\
    \ view layer classes. Table [6-7](#A432412_1_En_6_Chapter.html#Tab7) lists the\
    \ view layer classes and the corresponding protocols that we need to implement.\n\
    \n**Table 6-7.** View Layer Protocols\n\n| View Layer Class | Protocol |\n| ---\
    \ | --- |\n| `CollectionViewController` | `CollectionViewControllerProtocol` |\n\
    | `CollectionViewCell` | `CollectionViewCellProtocol` |\n| `CollectionViewSectionHeader`\
    \ | `CollectionViewSectionHeaderProtocol` |\n\nWhile implementing these protocols\
    \ in the view layer, we are not going to use a test-driven approach as UI tests\
    \ will be better suited to testing visual changes on the view layer.\n\nPreviously\
    \ in this chapter, you have implemented the methods defined in `CollectionViewControllerProtocol`\
    \ in the `CollectionViewController` class; therefore there is no need to make\
    \ any changes to the `CollectionViewController` class in this section.\n\nAdd\
    \ the following code to the end of the `CollectionViewCell` class to implement\
    \ the methods of the `CollectionViewCellProtocol` protocol.\n\n```\nextension\
    \ CollectionViewCell : CollectionViewCellProtocol {\n    func loadImage(resourceName:String)\
    \ {\n        imageView.image = UIImage(named: resourceName)\n    }\n    func setCaption(captionText:String)\
    \ {\n        captionLabel.text = captionText\n    }\n    func setShotDetails(shotDetailsText:String)\
    \ {\n        shotDetailsLabel.text = shotDetailsText\n    }\n}\n```\n\nAdd the\
    \ following code to the end of the `CollectionViewSectionHeader` class to implement\
    \ the methods of the `CollectionViewSectionHeaderProtocol` protocol.\n\n```\n\
    extension CollectionViewSectionHeader : CollectionViewSectionHeaderProtocol {\n\
    \    func setHeaderText(text:String) {\n        title?.text = text\n    }\n}\n\
    ```\n\nNow all that is remaining is to bind the view controller classes to their\
    \ respective view models; this will involve instantiating a view model (if one\
    \ is not being passed in the initializer) and calling out to methods on the view\
    \ model.\n\nThe process of using a test-driven approach to binding a view controller\
    \ class to a view model has been covered in Chapter [5](#A432412_1_En_5_Chapter.html).\
    \ The rest of the sections in this chapter will list the bindings and present\
    \ the final code for the view controller class.\n\n## Binding the Collection View\
    \ Controller Class to the View Model\n\nTable [6-8](#A432412_1_En_6_Chapter.html#Tab8)\
    \ lists the methods in the `CollectionViewController` class along with their associated\
    \ view model bindings.\n\n**Table 6-8.** Collection view controller and view model\
    \ bindings\n\n| Collection View Controller Method | Collection View Model Method\
    \ |\n| --- | --- |\n| `func viewDidLoad()` | `func performInitialViewSetup()`\
    \ |\n| `func numberOfSections(in collectionView: UICollectionView) -> Int` | `func\
    \ numberOfSections() -> Int` |\n| `func collectionView(_ collectionView: UICollectionView,\
    \ numberOfItemsInSection section: Int) -> Int` | `func numberOfItemsInSection(_\
    \ section: Int) -> Int` |\n| `func collectionView(_ collectionView: UICollectionView,\
    \ cellForItemAt indexPath: IndexPath) -> UICollectionViewCell` | `func cellViewModel(indexPath:IndexPath)\
    \ -> CellViewModelProtocol?` |\n| `func collectionView(_ collectionView: UICollectionView,\
    \ viewForSupplementaryElementOfKind kind: String, at indexPath: IndexPath) ->\
    \ UICollectionReusableView` | `func headerViewModel(indexPath:IndexPath) -> HeaderViewModelProtocol?`\
    \ |\n\nThe finished `CollectionViewController` class is provided in Listing [6-11](#A432412_1_En_6_Chapter.html#Par224).\
    \ If you would like to examine the code for the tests and related mock objects,\
    \ download the finished project anonymously from github using the following URL:\n\
    \n[`https://github.com/asmtechnology/Lesson06.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson06.iOSTesting.2017.Apress.git)\n\
    \n```\nimport UIKit\n\nprivate let cellReuseIdentifier = \"CollectionViewCell\"\
    \nprivate let headerReuseIdentifier = \"CollectionViewSectionHeader\"\n\nclass\
    \ CollectionViewController: UICollectionViewController {\n    var viewModel:CollectionViewModel?\n\
    \n    override func viewDidLoad() {\n        super.viewDidLoad()\n        if self.viewModel\
    \ == nil {\n            self.viewModel = CollectionViewModel(view: self)\n   \
    \     }\n        self.viewModel?.performInitialViewSetup()\n    }\n\n    override\
    \ func didReceiveMemoryWarning() {\n        super.didReceiveMemoryWarning()\n\
    \        // Dispose of any resources that can be recreated.\n    }\n\n    // MARK:\
    \ UICollectionViewDataSource\n\n    override func numberOfSections(in collectionView:\
    \ UICollectionView) -> Int {\n        guard let viewModel = viewModel else {\n\
    \            return 0\n        }\n        return viewModel.numberOfSections()\n\
    \    }\n\n    override func collectionView(_ collectionView: UICollectionView,\
    \ numberOfItemsInSection section: Int) -> Int {\n        guard let viewModel =\
    \ viewModel else {\n            return 0\n        }\n        return viewModel.numberOfItemsInSection(section)\n\
    \    }\n\n    override func collectionView(_ collectionView: UICollectionView,\
    \ cellForItemAt indexPath: IndexPath) -> UICollectionViewCell {\n        let cell\
    \ = collectionView.dequeueReusableCell(withReuseIdentifier: cellReuseIdentifier,\
    \ for: indexPath)\n        guard let viewModel = viewModel,\n            let collectionViewCell\
    \ = cell as? CollectionViewCell,\n            let cellViewModel = viewModel.cellViewModel(indexPath:indexPath)\
    \ else {\n            return cell\n        }\n        collectionViewCell.viewModel\
    \ = cellViewModel\n        cellViewModel.setView(collectionViewCell)\n       \
    \ collectionViewCell.setup()\n        return collectionViewCell\n    }\n\n   \
    \ override func collectionView(_ collectionView: UICollectionView, viewForSupplementaryElementOfKind\
    \ kind: String, at indexPath: IndexPath) -> UICollectionReusableView {\n     \
    \   let header = collectionView.dequeueReusableSupplementaryView(ofKind: kind,\
    \ withReuseIdentifier: headerReuseIdentifier, for: indexPath)\n        guard let\
    \ viewModel = viewModel,\n            let sectionHeader = header as? CollectionViewSectionHeader,\n\
    \            let sectionHeaderViewModel = viewModel.headerViewModel(indexPath:indexPath)\
    \ else {\n            return header\n        }\n        sectionHeader.viewModel\
    \ = sectionHeaderViewModel\n        sectionHeaderViewModel.setView(sectionHeader)\n\
    \        sectionHeader.setup()\n        return sectionHeader\n    }\n}\n\nextension\
    \ CollectionViewController : CollectionViewControllerProtocol {\n    func setNavigationTitle(_\
