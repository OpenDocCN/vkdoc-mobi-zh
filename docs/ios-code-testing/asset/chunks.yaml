- fmt: '### Building the `performInitialViewSetup` Method


    The `performInitialViewSetup()` method should perform the following tasks:


    - Clear the contents of the username field.

    - Clear the contents of the password field.

    - Disable the Login button.

    - Enable the Create Account button.


    Add the tests in Listing [5-7](#A432412_1_En_5_Chapter.html#Par106) to the bottom
    of the `LoginViewModelTests.swift` file:


    ```swift

    // MARK: performInitialViewSetup tests

    extension LoginViewModelTests {

    func testPerformInitialViewSetup_Calls_ClearUserNameField_OnViewController() {

    let expectation = self.expectation(description: "expected clearUserNameField()
    to be called")

    mockLoginViewController!.expectationForClearUserNameField = expectation

    let viewModel = LoginViewModel(view:mockLoginViewController!)

    viewModel.performInitialViewSetup()

    self.waitForExpectations(timeout: 1.0, handler: nil)

    }

    func testPerformInitialViewSetup_Calls_ClearPasswordField_OnViewController() {

    let expectation = self.expectation(description: "expected clearPasswordField()
    to be called")

    mockLoginViewController!.expectationForClearPasswordField = expectation

    let viewModel = LoginViewModel(view:mockLoginViewController!)

    viewModel.performInitialViewSetup()

    self.waitForExpectations(timeout: 1.0, handler: nil)

    }

    func testPerformInitialViewSetup_DisablesLoginButton_OnViewController() {

    let expectation = self.expectation(description: "expected enableLoginButton(false)
    to be called")

    mockLoginViewController!.expectationForEnableLoginButton = (expectation, false)

    let viewModel = LoginViewModel(view:mockLoginViewController!)

    viewModel.performInitialViewSetup()

    self.waitForExpectations(timeout: 1.0, handler: nil)

    }

    func testPerformInitialViewSetup_EnablesCreateAccountButton_OnViewController()
    {

    let expectation = self.expectation(description: "expected enableCreateAccountButton(true)
    to be called")

    mockLoginViewController!.expectationForCreateAccountButton = (expectation, true)

    let viewModel = LoginViewModel(view:mockLoginViewController!)

    viewModel.performInitialViewSetup()

    self.waitForExpectations(timeout: 1.0, handler: nil)

    }

    }

    Listing 5-7.

    Tests for the performInitialViewSetup method

    ```


    Listing [5-7](#A432412_1_En_5_Chapter.html#Par106) adds four new test cases, one
    for each task that must be performed by `performInitialViewSetup()`. Since all
    four cases test parts of the same method, I have grouped them into in a class
    extension; however you can add all four test methods to the main test class definition
    instead of a separate extension.


    To get this code to compile, you will need to make a few code changes to the project.


    Add a few variable declarations and method implementations to the `MockLoginViewController.swift`
    file:


    ```swift

    var expectationForClearUserNameField:XCTestExpectation?

    var expectationForClearPasswordField:XCTestExpectation?

    var expectationForEnableLoginButton:(XCTestExpectation, Bool)?

    var expectationForCreateAccountButton:(XCTestExpectation, Bool)?

    var expectationForHideKeyboard:XCTestExpectation?

    func clearUserNameField() {

    self.expectationForClearUserNameField?.fulfill()

    }

    func clearPasswordField() {

    self.expectationForClearPasswordField?.fulfill()

    }

    func enableLoginButton(_ status:Bool) {

    if let (expectation, expectedValue) = self.expectationForEnableLoginButton {

    if status == expectedValue {

    expectation.fulfill()

    }

    }

    }

    func enableCreateAccountButton(_ status:Bool) {

    if let (expectation, expectedValue) = self.expectationForCreateAccountButton {

    if status == expectedValue {

    expectation.fulfill()

    }

    }

    }

    ```


    Add the following method implementation to the `LoginViewModel.swift` file:


    ```swift

    func performInitialViewSetup() {

    view?.clearUserNameField()

    view?.clearPasswordField()

    view?.enableLoginButton(false)

    view?.enableCreateAccountButton(true)

    }

    ```


    Add the following method definitions to the `LoginViewControllerProtocol.swift`
    file:


    ```swift

    func clearUserNameField()

    func clearPasswordField()

    func enableLoginButton(_ status:Bool)

    func enableCreateAccountButton(_ status:Bool)

    ```


    Add the following method implementations to the `LoginViewController.swift` file
    in a class extension:


    ```swift

    extension LoginViewController : LoginViewControllerProtocol {

    func clearUserNameField() {

    self.userNameTextField.text = ""

    }

    func clearPasswordField() {

    self.passwordTextField.text = ""

    }

    func enableLoginButton(_ status:Bool) {

    self.loginButton.isEnabled = status

    }

    func enableCreateAccountButton(_ status:Bool) {

    self.loginButton.isEnabled = status

    }

    }

    ```


    Save the file and run all unit tests using the **Product** ➤ **Test** menu item.
    You will see that the unit tests you have added in `LoginViewModelTests.swift`
    have passed (see Figure [5-16](#A432412_1_En_5_Chapter.html#Fig16)).


    ![A432412_1_En_5_Fig16_HTML.jpg](A432412_1_En_5_Fig16_HTML.jpg)


    Figure 5-16. All Tests for the `performInitialViewSetup` Method are Passing.


    ### Building the `userNameDidEndOnExit` Method


    The `userNameDidEndOnExit()` method of the view model is called by the login view
    controller when the `didEndOnExit` event is received from the username text field.
    When this method is called, the view model asks the view controller to dismiss
    the keyboard if it was visible.


    You may be tempted to skip the view model entirely in this scenario and simply
    place the code to dismiss the keyboard in the `func userNameDidEndOnExit(_ sender:
    Any)` action method of the view controller class. The proper use of the MVVM pattern
    requires you to remove presentation logic from the view controller and put it
    in the view model. Hiding the keyboard is presentation logic, and the view model
    dictates when the keyboard should be hidden.


    Add the following code snippet to the bottom of the `LoginViewModelTests.swift`
    file:


    ```swift

    // MARK: userNameDidEndOnExit tests

    extension LoginViewModelTests {

    func testUserNameDidEndOnExit_Calls_HideKeyboard_OnViewController() {

    let expectation = self.expectation(description: "expected hideKeyboard() to be
    called")

    mockLoginViewController!.expectationForHideKeyboard = expectation

    let viewModel = LoginViewModel(view:mockLoginViewController!)

    viewModel.userNameDidEndOnExit()

    self.waitForExpectations(timeout: 1.0, handler: nil)

    }

    }

    ```


    Add the following method implementation to the `LoginViewModel.swift` file:


    ```swift

    func userNameDidEndOnExit() {

    view?.hideKeyboard()

    }

    ```


    Add the following method definition to the `LoginViewControllerProtocol.swift`
    file:


    ```swift

    func hideKeyboard()

    ```


    Add the following method implementation to the `LoginViewController.swift` file
    in the `LoginViewControllerProtocol` extension:


    ```swift

    func hideKeyboard() {

    self.userNameTextField.resignFirstResponder()

    self.passwordTextField.resignFirstResponder()

    }

    ```


    Add the following method implementation to the `MockLoginViewController.swift`
    file:


    ```swift

    func hideKeyboard() {

    self.expectationForHideKeyboard?.fulfill()

    }

    ```


    Save the file and run all unit tests using the **Product** ➤ **Test** menu item.
    You will see that the unit tests you have added in `LoginViewModelTests.swift`
    have passed.'
