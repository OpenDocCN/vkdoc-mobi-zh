- fmt: '### The `RestaurantTableViewModel` Class


    The `RestaurantTableViewModel` class represents the view model between the `RestaurantTableViewController`
    class and an array of `Restaurant` model objects. The desired instance variables
    and methods of the view model class are described in Table [12-8](#A432412_1_En_12_Chapter.html#Tab8).


    **Table 12-8.** `RestaurantTableViewModel` instance variables and methods


    | Name | Type | Description |

    | --- | --- | --- |

    | `var view:RestaurantTableViewControllerProtocol?` | Ivar | Reference to the
    view controller, uses a protocol to define a list of methods that the view model
    can use. |

    | `var area:String` | Ivar | Represents the location within London selected by
    the user. This will be displayed as the title in the navigation bar. |

    | `var restaurantList:[Restaurant]` | Ivar | An array of `Restaurant` objects.
    |

    | `func performInitialViewSetup()` | Method | Called from the `viewDidLoad()`
    method of the view controller. |

    | `func numberOfSections() -> Int` | Method | Called from the `numberOfSections(in
    tableView: UITableView) -> Int` method of the view controller. |

    | `func numberOfRowsInSection(_ section:Int) -> Int` | Method | Called from the
    `tableView(_ tableView: UITableView, numberOfRowsInSection section: Int) -> Int`
    method of the view controller. |

    | `func cellViewModel(forIndexPath indexPath:IndexPath) -> RestaurantTableViewCellViewModel?`
    | Method | Called from the `tableView(_ tableView: UITableView, cellForRowAt indexPath:
    IndexPath) -> UITableViewCell` method of the view controller. |

    | `init? (_ area:String, restaurantList:[Restaurant]?)` | Method | Called from
    the `viewDidLoad()` method of the view controller. |


    The `RestaurantTableViewModel` class requires that a protocol called `RestaurantTableViewControllerProtocol`
    is defined in the project, and implemented by the `RestaurantTableViewController`
    class. Listing [12-13](#A432412_1_En_12_Chapter.html#Par194) decribes the protocol:


    ```

    import Foundation

    protocol RestaurantTableViewControllerProtocol : class {

    func setNavigationTitle(_ title:String)

    }

    ```


    Listing 12-13. `RestaurantTableViewControllerProtocol.swift`


    These methods are implemented in `RestaurantTableViewController.swift` by adding
    the following class extension to the end of the file:


    ```

    extension RestaurantTableViewController : RestaurantTableViewControllerProtocol
    {

    func setNavigationTitle(_ title:String) {

    self.title = title

    }

    }

    ```


    Listing [12-14](#A432412_1_En_12_Chapter.html#Par199) provides the complete `RestaurantTableViewModel`
    class and is listed below. If you would like to examine the code for the associated
    tests, download the finished project anonymously from github using the following
    URL:


    [`https://github.com/asmtechnology/Lesson12.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson12.iOSTesting.2017.Apress.git)


    ```

    import Foundation

    class RestaurantTableViewModel : NSObject {

    var area:String

    var restaurantList:[Restaurant]

    var view:RestaurantTableViewControllerProtocol?


    init? (_ area:String, restaurantList:[Restaurant]?) {

    guard let restaurantList = restaurantList else {

    return nil

    }

    self.area = area

    self.restaurantList = restaurantList

    super.init()

    }


    func performInitialViewSetup() {

    view?.setNavigationTitle("Restaurants in \(area).")

    }


    func numberOfSections() -> Int {

    return 1

    }


    func numberOfRowsInSection(_ section:Int) -> Int {

    return restaurantList.count

    }


    func cellViewModel(forIndexPath indexPath:IndexPath) -> RestaurantTableViewCellViewModel?
    {

    let row = indexPath.row

    if row = self.restaurantList.count {

    return nil

    }

    let restaurant = restaurantList[row]

    return RestaurantTableViewCellViewModel(model:restaurant)

    }

    }

    ```


    Listing 12-14. `RestaurantTableViewModel.swift`


    ### The `RestaurantTableViewCellViewModel` Class


    The `RestaurantTableViewCellViewModel` class represents the view model between
    the `RestaurantTableViewCell` class and a single `Restaurant` model object. The
    desired instance variables and methods of the view model class are described in
    Table [12-9](#A432412_1_En_12_Chapter.html#Tab9).


    **Table 12-9.** `RestaurantTableViewCellViewModel` instance variables and methods


    | Name | Type | Description |

    | --- | --- | --- |

    | `var view:RestaurantTableViewCellProtocol?` | Ivar | Reference to the view controller,
    uses a protocol to define a list of methods that the view model can use. |

    | `var model:Restaurant?` | Ivar | Represents the data for a restaurant in London.
    |

    | `func setup()` | Method | Called from the `setup ()` method of the table view
    cell, which in turn is called from the `tableView(_ tableView: UITableView, cellForRowAt
    indexPath: IndexPath) -> UITableViewCell` method of the table view controller.
    |

    | `init(model:Restaurant?)` | Method | Used to create an instance of the view
    model. |


    The `RestaurantTableViewCellViewModel` class requires that a protocol called `RestaurantTableViewCellProtocol`
    is defined in the project, and implemented by the `RestaurantTableViewCellr` class.
    Listing [12-15](#A432412_1_En_12_Chapter.html#Par202) describes the protocol:


    ```

    import Foundation

    protocol RestaurantTableViewCellProtocol : class {

    func setRestaurantLocation(_ location:String)

    func setRestaurantRating(_ rating:String)

    func setRestaurantCuisine(_ cuisine:String)

    func setRestarantDistance(_ distance:String)

    func setRestaurantName(_ restaurantName:String)

    }

    ```


    Listing 12-15. `RestaurantTableViewCellProtocol.swift`


    These methods are implemented in `RestaurantTableViewCellr.swift` by adding the
    following class extension to the end of the file:


    ```

    extension RestaurantTableViewCell : RestaurantTableViewCellProtocol {

    func setRestaurantLocation(_ location:String) {

    self.location.text = location

    }

    func setRestaurantRating(_ rating:String) {

    self.rating.text = rating

    }

    func setRestaurantCuisine(_ cuisine:String) {

    self.cuisine.text = cuisine

    }

    func setRestarantDistance(_ distance:String) {

    self.distance.text = distance

    }

    func setRestaurantName(_ restaurantName:String) {

    self.name.text = restaurantName

    }

    }

    ```


    The complete `RestaurantTableViewCellViewModel` class is provided in Listing [12-16](#A432412_1_En_12_Chapter.html#Par207).
    If you would like to examine the code for the associated tests, download the finished
    project anonymously from github using the following URL:


    [`https://github.com/asmtechnology/Lesson12.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson12.iOSTesting.2017.Apress.git)


    ```

    import Foundation

    class RestaurantTableViewCellViewModel : NSObject {

    var model:Restaurant?

    var view:RestaurantTableViewCellProtocol?


    init(model:Restaurant?) {

    self.model = model

    super.init()

    }


    func setup() {

    guard let view = view ,

    let model = model,

    let area = model.area,

    let rating = model.rating,

    let cuisine = model.cuisine,

    let distance = model.distance,

    let tubeStation = model.tubeStation,

    let restaurantName = model.restaurantName else {

    return

    }

    view.setRestaurantLocation(area)

    view.setRestaurantRating("\(rating) stars")

    view.setRestaurantCuisine(cuisine)

    view.setRestarantDistance("\(distance) miles(s) from \(tubeStation)")

    view.setRestaurantName(restaurantName)

    }

    }

    ```


    Listing 12-16. `RestaurantTableViewCellViewModel.swift`


    While building the `RestaurantTableViewCellViewModel` class using a test-driven
    approach, you will need to create a mock table view cell object to test the binding
    between the view model and the cell.


    As it turns out a mock table view cell class was one of the missing classes needed
    to make the Quick BDD tests compile. Listing [12-17](#A432412_1_En_12_Chapter.html#Par210)
    contains the code in a class called `MockRestaurantTableViewCell` that will be
    used by both unit tests and Quick BDD tests.'
