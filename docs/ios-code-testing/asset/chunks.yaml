    UI recording can be used as a starting point to build UI tests that you can fine-tune
    and add appropriate test assertions.'
  trans: '

    # 断言


    在 UI 测试中定位到感兴趣的用户界面元素后，您要么检查其某个属性并将结果与期望值进行比较，要么与该用户界面元素进行交互以显示一个新视图，然后检查新视图的某个属性。


    与单元测试一样，UI 测试也使用断言来比较对象的状态与期望值。表 13-6 列出了 UI 测试中使用的一些断言函数。


    **表 13-6.** XCTest 断言宏


    | 宏 | 描述 |

    | --- | --- |

    | `XCTAssert(表达式, 消息)` | 如果表达式计算结果为`假(false)`，则生成一个失败。可以提供一个可选的字符串消息来指示失败原因。 |

    | `XCTAssertEqualObjects(表达式 1, 表达式 2, 消息)` | 当`表达式 1`不等于`表达式 2`时生成一个失败，其中`表达式
    1`和`表达式 2`都是对象。涉及的两个对象都必须实现`Equatable`协议。可以提供一个可选的字符串消息来指示失败原因。 |

    | `XCTAssertNotEqualObjects(表达式 1, 表达式 2, 消息)` | 当`表达式 1`等于`表达式 2`时生成一个失败，其中`表达式
    1`和`表达式 2`都是对象。涉及的两个对象都必须实现`Equatable`协议。可以提供一个可选的字符串消息来指示失败原因。 |

    | `XCTAssertEqual(表达式 1, 表达式 2, 消息)` | 当`表达式 1`不等于`表达式 2`时生成一个失败。此测试适用于原始数据类型。可以提供一个可选的字符串消息来指示失败原因。
    |

    | `XCTAssertNotEqual(表达式 1, 表达式 2, 消息)` | 当`表达式 1`等于`表达式 2`时生成一个失败。`表达式 1`和`表达式
    2`都是原始数据类型。可以提供一个可选的字符串消息来指示失败原因。 |

    | `XCTAssertNil(表达式, 消息)` | 当表达式不为`空(nil)`时生成一个失败。可以提供一个可选的字符串消息来指示失败原因。 |

    | `XCTAssertNotNil(表达式, 消息)` | 当表达式为`空(nil)`时生成一个失败。可以提供一个可选的字符串消息来指示失败原因。 |

    | `XCTAssertTrue(表达式, 消息)` | 当表达式计算结果为`假(false)`时生成一个失败。与`XCTAssert()`相同，提供此函数是为了创建更具可读性的测试。可以提供一个可选的字符串消息来指示失败原因。
    |

    | `XCTAssertFalse(表达式, 消息)` | 当表达式计算结果为`真(true)`时生成一个失败。可以提供一个可选的字符串消息来指示失败原因。
    |


    以下代码片段列出了一个 UI 测试用例，该用例将尝试定位一个辅助功能标识符为`"FacebookLoginButton"`的按钮，并断言该按钮是否未被找到：


    ```

    func testFacebookLoginButtonExists() {

    let application = XCUIApplication()

    let query = application.buttons

    let button = query.element(matching: .button, identifier: "FacebookLoginButton")

    XCTAssert(button.exists)

    }

    ```


    请注意，这里使用了`XCTAssert`而不是`XCTAssertNotNil`。这是因为`button`是`XCUIElement`的一个实例，而后者只是一个代理对象。代理对象仅包含测试运行器尝试定位用户界面元素所需的信息。


    只有当你尝试访问底层元素（通过在`XCUIElement`上调用`exists()`）时，测试运行器才会尝试将`XCUIElement`解析为一个实际的用户界面元素。


    以下代码片段基于上一个测试进行了扩展，并断言按钮上显示的文本是否与特定值不匹配。按钮上显示的文本与其辅助功能标识符不同。


    ```

    func testFacebookLoginButtonDisplaysCorrectLabel(){

    let application = XCUIApplication()

    let query = application.buttons

    let button = query.element(matching: .button, identifier: "FacebookLoginButton")

    let buttonLabel = button.label

    XCTAssertEqual(buttonLabel, "Login With Facebook")

    }

    ```


    # UI 录制


    如果用户操作路径很长且复杂，并且需要多次交互才能显示出你要测试的对象，那么逐行编写 UI 测试脚本并非你所愿。


    好消息是，你不必逐行创建 UI 测试脚本。Xcode 提供了一个名为 UI 录制的功能，可用于帮助创建 UI 测试脚本。使用 UI 录制，你可以启动一个应用程序实例，并像平常一样与之交互。在你与应用程序交互时，Xcode
    会记录你的点击、手势、选择和按键操作，并生成相应的 UI 测试脚本。


    UI 录制与 UI 测试紧密耦合。要开始 UI 录制，只需将文本光标放在一个 UI 测试用例中，然后点击 Xcode 编辑器底部的红色录制按钮（见图 13-14）。


    ![A432412_1_En_13_Fig14_HTML.jpg](img/A432412_1_En_13_Fig14_HTML.jpg)


    **图 13-14.** UI 录制按钮


    要停止录制，只需点击停止按钮，该按钮在录制会话期间会替换录制按钮。UI 录制并非万无一失，你可能会发现可以编写出更高效的脚本来达到相同目的。但是，UI 录制可以作为构建
    UI 测试的起点，之后你可以微调并添加适当的测试断言。

    '
- fmt: "# Waiting Before Asserting\n\nSometimes it is necessary to wait for an operation\
    \ to complete before you can use your assertion. This is usually the case when\
    \ an animation is involved and you need to wait for the animation to complete\
    \ before the UI element you are interested in appears on the screen. Take, for\
    \ instance, a simple table view-based application in which the user taps on a\
    \ row to drill down to the next screen.\n\nYou could easily simulate a tap on\
    \ a row using a simple statement such as this:\n\n```\nXCUIApplication().tables.cells.staticTexts[\"\
    United Kingdom\"].tap()\n```\n\nHowever, you will need to wait for the next screen\
    \ to appear before you can create any assertions that are based on UI elements\
    \ of that screen. Fortunately, `XCTest` has just the thing in the form of test\
    \ expectations.\n\nA test expectation is an instance of `XCTestExpectation` and\
    \ represents an expected result. For example, to set up an expectation that indicates\
    \ a text label with the caption \"Hello World!\" exists, you could use the following\
    \ snippet:\n\n```\nlet label = XCUIApplication().staticTexts[\"Hello World!\"\
    ]\nlet predicate = NSPredicate(format: \"exists == 1\", argumentArray: nil)\n\
    self.expectation(for: predicate, evaluatedWith: label, handler: nil)\n```\n\n\
    The preceding snippet starts out by retrieving an `XCUIElement` proxy object for\
    \ a label with text \"Hello World!\"\n\n```\nlet label = XCUIApplication().staticTexts[\"\
    Hello World!\"]\n```\n\nRecall that `XCUIElement` is a proxy object and just represents\
    \ the information needed to locate a UI element in the app being tested. It is\
    \ therefore possible to create `XCUIElement` instances even when the user interface\
    \ elements are not on screen. Only when you call a method on the `XCUIElement`\
    \ instance does the test runner check to see if the proxy can be resolved to an\
    \ existing object on the screen.\n\nOnce an `XCUIElement` instance has been obtained,\
    \ an expectation is set up using the `expectation(for:, evaluatedWith:, handler:)`\
    \ method of the `XCTestCase` class.\n\n```\nlet predicate = NSPredicate(format:\
    \ \"exists == 1\", argumentArray: nil)\nself.expectation(for: predicate, evaluatedWith:\
    \ label, handler: nil)\n```\n\nThe expectation is expressed as a predicate that\
    \ is evaluated on an object. The object in this case is the label, and the predicate\
    \ is set up to call the `exists()` method and ensure the result is `1`.\n\nThe\
    \ net result is that the expectation represents a situation where a label with\
    \ the caption \"Hello World!\" exists.\n\nOnce an expectation has been set up,\
    \ you need to call the `waitForExpectations(timeout:, handler:)` method on an\
    \ `XCTestCase` instance:\n\n```\nself.waitForExpectations(timeout: 5, handler:\
    \ nil)\n```\n\nThe `waitForExpectations(timeout:, handler:)` method waits a specified\
    \ amount of time (in seconds) and fails the test if one or more expectations are\
    \ unfulfilled. `XCTestExpectation` objects have an internal timer-based mechanism\
    \ by which they periodically check if they can be moved to the fulfilled state.\
    \ This is a built-in mechanism in an expectation object and you do not need to\
    \ do anything to kick off the timer.\n\n# Putting It All Together\n\nIn this section\
    \ you will write a few user interface tests for an existing application. The application\
    \ is called `CountriesAndCities` and can be downloaded from this book's website.\n\
    \nDownload the project, open it in Xcode, and try it out on a simulator. As you\
    \ can see, the app is a master-detail type app with two simple screens: the first\
    \ lists three countries, and when you select a country from this list, a list\
    \ of cities in that country are displayed in the second screen (see Figure 13-15).\n\
    \n![A432412_1_En_13_Fig15_HTML.jpg](A432412_1_En_13_Fig15_HTML.jpg)\n\nFigure\
    \ 13-15. Finished User Interface of Sample Application\n\nTo begin writing a few\
    \ UI tests, open the project in Xcode and open the `CountriesAndCitiesUITests.swift`\
    \ file in the project explorer (see Figure 13-16).\n\n![A432412_1_En_13_Fig16_HTML.jpg](A432412_1_En_13_Fig16_HTML.jpg)\n\
    \nFigure 13-16. `CountriesAndCitiesUITests.swift` File in the Project Explorer\n\
    \nModify the `setUp()` method to resemble the following snippet:\n\n```\noverride\
    \ func setUp() {\n    super.setUp()\n    continueAfterFailure = false\n    XCUIApplication().launch()\n\
    \    let device = XCUIDevice.shared()\n    device.orientation = .portrait\n}\n\
    ```\n\nThis snippet first calls the `setUp()` method of the superclass, and then\
    \ sets the `continueAfterFailure` variable (inherited from `XCTestCase`) to `false`.\
    \ Setting this variable to `false` will ensure that UI testing will stop immediately\
    \ when a test fails. The default behavior is to skip over the failed test and\
    \ continue with the next test.\n\nThe next line in the snippet calls the `launch()`\
    \ method of `XCUIApplication`, thereby launching the subject under test. Finally,\
    \ the snippet sets the device orientation to portrait. It is a good idea to specify\
    \ device orientation in the `setUp()` method of UI tests.\n\nThe first test you\
    \ will create will ensure that the list of countries view controller is visible\
    \ onscreen after the app is launched. To do so, add a test method called `testCountryListAppearsOnAppLaunch`\
    \ and implement it as shown in the following snippet:\n\n```\nfunc testCountryListAppearsOnAppLaunch()\
    \ {\n    let navBarTitle = XCUIApplication().navigationBars[\"Select a country\"\
    ].staticTexts[\"Select a country\"]\n    XCTAssert(navBarTitle.exists)\n}\n```\n\
    \nSince this particular app displays a title in the navigation bar, this test\
    \ checks to see if the title displayed in the navigation bar matches the text\
    \ \"Select a country.\" Had this app not made use of navigation controllers, or\
    \ did not set a specific navigation bar title, then you would have to use other\
    \ means to determine the correct view was on screen. One possible solution would\
    \ be to examine if specific user interface elements, unique to the view you expect\
    \ to appear, exist on the screen.\n\nTo run this test, click on the hollow diamond\
    \ symbol next to the name of the test (see Figure 13-17). If you do not see the\
    \ hollow diamond symbol next to the test name, make sure you have saved the file.\n\
    \n![A432412_1_En_13_Fig17_HTML.jpg](A432412_1_En_13_Fig17_HTML.jpg)\n\nFigure\
    \ 13-17. Executing a Single UI Test\n\nAnother useful test would be one that counts\
    \ the number of countries displayed in the app when it is launched. The following\
    \ code snippet shows how such a test could be written:\n\n```\nfunc testCountryListHasThreeItemsOnAppLaunch()\
    \ {\n    let countryTable = XCUIApplication().tables.element\n    let rows = countryTable.staticTexts\n\
    \    XCTAssertEqual(rows.count, 3)\n}\n```\n\nThis test makes use of some internal\
    \ knowledge of the way the app has been built. For instance, it assumes there\
    \ is only one table on the screen. This test will be labeled \"too specific\"\
    \ by most people, and to be honest, it is. Counting the number of items makes\
    \ it very specific, and somewhat fragile."
  raw: '## Waiting Before Asserting


    Sometimes it is necessary to wait for an operation to complete before you can
    use your assertion. This is usually the case when an animation is involved and
    you need to wait for the animation to complete before the UI element you are interested
    in appears on the screen. Take, for instance, a simple table view-based application
    in which the user taps on a row to drill down to the next screen.


    You could easily simulate a tap on a row using a simple statement such as this:


    ```

    XCUIApplication().tables.cells.staticTexts["United Kingdom"].tap()

    ```


    However, you will need to wait for the next screen to appear before you can create
    any assertions that are based on UI elements of that screen. Fortunately, XCTest
    has just the thing in the form of test expectations.


    A test expectation is an instance of XCTestExpectation and represents an expected
    result. For example, to set up an expectation that indicates a text label with
    the caption “Hello World!” exists, you could use the following snippet:


    ```

    let label = XCUIApplication().staticTexts["Hello World!"]

    let predicate = NSPredicate(format: "exists == 1", argumentArray: nil)

    self.expectation(for: predicate, evaluatedWith: label, handler: nil)

    ```


    The preceding snippet starts out by retrieving an XCUIElement proxy object for
    a label with text “Hello World!”


    ```

    let label = XCUIApplication().staticTexts["Hello World!"]

    ```


    Recall that XCUIElement is a proxy object and just represents the information
    needed to locate a UI element in the app being tested. It is therefore possible
    to create XCUIElement instances even when the user interface elements are not
    on screen. Only when you call a method on the XCUIElement instance does the test
    runner check to see if the proxy can be resolved to an existing object on the
    screen.


    Once an XCUIElement instance has been obtained, an expectation is set up using
    the expectation (for:, evaluatedWith:, handler:) method of the XCTestCase class.


    ```

    let predicate = NSPredicate(format: "exists == 1", argumentArray: nil)

    self.expectation(for: predicate, evaluatedWith: label, handler: nil)

    ```


    The expectation is expressed as a predicate that is evaluated on an object. The
    object in this case is the label, and the predicate is set up to call the exists()
    method and ensure the result is 1.


    The net result is that the expectation represents a situation where a label with
    the caption “Hello World!” exists.


    Once an expectation has been set up, you need to call the waitForExpectations
    (timeout:, handler:) method on an XCTestCase instance:


    ```

    self.waitForExpectations(timeout: 5, handler: nil)

    ```


    The waitForExpectations (timeout:, handler:) method waits a specified amount of
    time (in seconds) and fails the test if one or more expectations are unfulfilled.
    XCTestExpectation objects have an internal timer-based mechanism by which they
    periodically check if they can be moved to the fulfilled state. This is a built-in
    mechanism in an expectation object and you do not need to do anything to kick
    off the timer.


    ## Putting It All Together


    In this section you will write a few user interface tests for an existing application.
    The application is called CountriesAndCities and can be downloaded from this book’s
    website.


    Download the project, open it in Xcode, and try it out on a simulator. As you
    can see, the app is a master-detail type app with two simple screens: the first
    lists three countries, and when you select a country from this list, a list of
    cities in that country are displayed in the second screen (see Figure [13-15](#A432412_1_En_13_Chapter.html#Fig15)).


    ![A432412_1_En_13_Fig15_HTML.jpg](A432412_1_En_13_Fig15_HTML.jpg)


    Figure 13-15.


    Finished User Interface of Sample Application


    To begin writing a few UI tests, open the project in Xcode and open the CountriesAndCitiesUITests.swift
    file in the project explorer (see Figure [13-16](#A432412_1_En_13_Chapter.html#Fig16)).


    ![A432412_1_En_13_Fig16_HTML.jpg](A432412_1_En_13_Fig16_HTML.jpg)


    Figure 13-16.


    CountriesAndCitiesUITests.swift File in the Project Explorer


    Modify the setUp() method to resemble the following snippet:


    ```

    override func setUp() {

    super.setUp()

    continueAfterFailure = false

    XCUIApplication().launch()

    let device = XCUIDevice.shared()

    device.orientation = .portrait

    }

    ```


    This snippet first calls the setUp() method of the superclass, and then sets the
    continueAfterFailure variable (inheritied from XCTestCase) to false. Setting this
    variable to false will ensure that UI testing will stop immediately when a test
    fails. The default behavior is to skip over the failed test and continue with
    the next test .


    The next line in the snippet calls the launch() method of XCUIApplication, thereby
    launching the subject under test. Finally, the snippet sets the device orientation
    to portrait. It is a good idea to specify device orientation in the setUp() method
    of UI tests.


    The first test you will create will ensure that the list of countries view controller
    is visible onscreen after the app is launched. To do so, add a test method called
    testCountryListAppearsOnAppLaunch and implement it as shown in the following snippet:


    ```

    func testCountryListAppearsOnAppLaunch() {

    let navBarTitle = XCUIApplication().navigationBars["Select a country"].staticTexts["Select
    a country"]

    XCTAssert(navBarTitle.exists)

    }

    ```


    Since this particular app displays a title in the navigation bar, this test checks
    to see if the title displayed in the navigation bar matches the text “Select a
    country.” Had this app not made use of navigation controllers, or did not set
    a specific navigation bar title, then you would have to use other means to determine
    the correct view was on screen. One possible solution would be to examine if specific
    user interface elements, unique to the view you expect to appear, exist on the
    screen.


    To run this test, click on the hollow diamond symbol next to the name of the test
    (see Figure [13-17](#A432412_1_En_13_Chapter.html#Fig17)). If you do not see the
    hollow diamond symbol next to the test name, make sure you have saved the file.


    ![A432412_1_En_13_Fig17_HTML.jpg](A432412_1_En_13_Fig17_HTML.jpg)


    Figure 13-17.


    Executing a Single UI Test


    Another useful test would be one that counts the number of countries displayed
    in the app when it is launched. The following code snippet shows how such a test
    could be written:


    ```

    func testCountryListHasThreeItemsOnAppLaunch() {

    let countryTable = XCUIApplication().tables.element

    let rows = countryTable.staticTexts

    XCTAssertEqual(rows.count, 3)

    }

    ```


    This test makes use of some internal knowledge of the way the app has been built.
    For instance, it assumes there is only one table on the screen. This test will
    be labeled “too specific” by most people, and to be honest, it is. Counting the
    number of items makes it very specific, and somewhat fragile.'
  trans: "\n# 断言前的等待\n\n有时，在执行断言之前，你需要等待某个操作完成。当涉及动画时尤其如此，你需要等待动画结束，待你感兴趣的 UI 元素出现在屏幕上后才能进行后续操作。例如，在一个基于表格视图的简单应用中，用户点击某一行后会跳转到下一个屏幕。\n\
    \n你可以通过如下简单的语句模拟点击表格中的一行：\n\n```\nXCUIApplication().tables.cells.staticTexts[\"\
    United Kingdom\"].tap()\n```\n\n然而，在基于该屏幕的 UI 元素创建任何断言之前，你需要等待下一个屏幕出现。幸运的是，`XCTest`\
    \ 恰好提供了测试预期（test expectations）这一机制。\n\n测试预期是 `XCTestExpectation` 的一个实例，代表一个期望的结果。例如，要设置一个期望，表明存在一个标题为“Hello\
    \ World!”的文本标签，你可以使用以下代码片段：\n\n```\nlet label = XCUIApplication().staticTexts[\"\
    Hello World!\"]\nlet predicate = NSPredicate(format: \"exists == 1\", argumentArray:\
    \ nil)\nself.expectation(for: predicate, evaluatedWith: label, handler: nil)\n\
    ```\n\n上述代码片段首先针对标题为“Hello World!”的标签，获取一个 `XCUIElement` 代理对象。\n\n```\nlet label\
    \ = XCUIApplication().staticTexts[\"Hello World!\"]\n```\n\n回顾一下，`XCUIElement`\
    \ 是一个代理对象，仅代表在待测试应用中定位 UI 元素所需的信息。因此，即使界面元素不在屏幕上，也可以创建 `XCUIElement` 实例。只有当你在\
    \ `XCUIElement` 实例上调用方法时，测试运行器才会检查该代理是否能解析为屏幕上已有的对象。\n\n获取到 `XCUIElement` 实例后，使用\
    \ `XCTestCase` 类的 `expectation(for:, evaluatedWith:, handler:)` 方法来设置预期。\n\n```\n\
    let predicate = NSPredicate(format: \"exists == 1\", argumentArray: nil)\nself.expectation(for:\
    \ predicate, evaluatedWith: label, handler: nil)\n```\n\n该预期被表示为一个针对对象进行求值的谓词。本例中的对象是标签，谓词被设置为调用\
    \ `exists()` 方法并确保结果为 `1`。\n\n最终结果是，该预期代表了一种情况：存在一个标题为“Hello World!”的标签。\n\n设置好预期后，你需要在\
    \ `XCTestCase` 实例上调用 `waitForExpectations(timeout:, handler:)` 方法：\n\n```\nself.waitForExpectations(timeout:\
    \ 5, handler: nil)\n```\n\n`waitForExpectations(timeout:, handler:)` 方法会等待指定的时间（以秒为单位），如果有一个或多个预期未满足，则测试失败。`XCTestExpectation`\
    \ 对象具有一个基于计时器的内部机制，通过该机制定期检查是否可以将自身状态转为“已满足”。这是预期对象的内置机制，你无需做任何操作来启动计时器。\n\n#\
    \ 综合应用\n\n在本节中，你将为一个现有应用编写几个用户界面测试。该应用名为 `CountriesAndCities`，可从本书网站下载。\n\n下载项目，在\
    \ Xcode 中打开它，并在模拟器上试用。如你所见，该应用是一个主从类型的应用，包含两个简单的屏幕：第一个屏幕列出三个国家；当你从该列表中选择一个国家后，该国家的城市列表会显示在第二个屏幕中（见图\
    \ 13-15）。\n\n![A432412_1_En_13_Fig15_HTML.jpg](img/A432412_1_En_13_Fig15_HTML.jpg)\n\
    \n图 13-15. 示例应用的最终用户界面\n\n要开始编写一些 UI 测试，请在 Xcode 中打开项目，然后在项目资源管理器中打开 `CountriesAndCitiesUITests.swift`\
    \ 文件（见图 13-16）。\n\n![A432412_1_En_13_Fig16_HTML.jpg](img/A432412_1_En_13_Fig16_HTML.jpg)\n\
    \n图 13-16. 项目资源管理器中的 `CountriesAndCitiesUITests.swift` 文件\n\n修改 `setUp()` 方法，使其类似于以下代码片段：\n\
    \n```\noverride func setUp() {\n    super.setUp()\n    continueAfterFailure =\
    \ false\n    XCUIApplication().launch()\n    let device = XCUIDevice.shared()\n\
    \    device.orientation = .portrait\n}\n```\n\n此代码片段首先调用父类的 `setUp()` 方法，然后将 `continueAfterFailure`\
    \ 变量（继承自 `XCTestCase`）设置为 `false`。将此变量设为 `false` 将确保当测试失败时，UI 测试会立即停止。默认行为是跳过失败的测试并继续执行下一个测试。\n\
    \n代码片段的下一行调用 `XCUIApplication` 的 `launch()` 方法，从而启动被测试的应用。最后，代码片段将设备方向设置为竖屏。在\
    \ UI 测试的 `setUp()` 方法中指定设备方向是一个好习惯。\n\n你要创建的第一个测试将确保应用启动后，国家列表视图控制器可见。为此，添加一个名为\
    \ `testCountryListAppearsOnAppLaunch` 的测试方法，并按如下代码片段实现：\n\n```\nfunc testCountryListAppearsOnAppLaunch()\
    \ {\n    let navBarTitle = XCUIApplication().navigationBars[\"Select a country\"\
    ].staticTexts[\"Select a country\"]\n    XCTAssert(navBarTitle.exists)\n}\n```\n\
    \n由于该特定应用在导航栏中显示标题，此测试检查导航栏中显示的标题是否与文本“Select a country”匹配。如果该应用未使用导航控制器，或者未设置特定的导航栏标题，那么你将不得不使用其他方法来确定正确的视图已显示在屏幕上。一种可能的解决方案是检查屏幕上是否存在预期的、视图特有的\
    \ UI 元素。\n\n要运行此测试，请点击测试名称旁边的空心菱形符号（见图 13-17）。如果测试名称旁边没有空心菱形符号，请确保已保存文件。\n\n![A432412_1_En_13_Fig17_HTML.jpg](img/A432412_1_En_13_Fig17_HTML.jpg)\n\
    \n图 13-17. 执行单个 UI 测试\n\n另一个有用的测试是统计应用启动时显示的国家数量。以下代码片段展示了如何编写这样的测试：\n\n```\n\
    func testCountryListHasThreeItemsOnAppLaunch() {\n    let countryTable = XCUIApplication().tables.element\n\
    \    let rows = countryTable.staticTexts\n    XCTAssertEqual(rows.count, 3)\n\
    }\n```\n\n此测试利用了应用构建方式的一些内部知识。例如，它假设屏幕上只有一个表格。大多数人会将此测试标记为“过于具体”，坦率地说，确实如此。统计项目数量使其非常具体，并且有些脆弱。\n"
- fmt: "This test could, for instance, easily break if an extra row was added to the\
    \ table, or if the test was run on a device with a smaller screen size. The later\
    \ situation can be of particular importance if your test is counting the number\
    \ of rows that are visible on a full-screen table view on a plus-sized iPhone.\
    \ Running such a test on a device with a smaller screen implies fewer rows will\
    \ be visible, and the test will break.\n\n> **Note**  \n> You can use `UIDevice`\
    \ and `UIScreen` methods within the test to work out what type of device you are\
    \ running the test on, and use that information to work out the number of rows\
    \ you can expect to find onscreen.\n\nWhether this type has business value depends\
    \ on how critical is the number of initial items that are visible on screen. This\
    \ is something you will need to decide, keeping in mind the needs of the business,\
    \ and the inherent fragility of the test.\n\nThe final test for this example will\
    \ involve verifying that tapping on a country name from the list of countries\
    \ will drill down to a list of cities within that country. The following code\
    \ snippet shows how such a test could be written:\n\n```swift\nfunc testTappingOnCountryDisplaysDetailViewWithExpectedTitle()\
    \ {\nlet app = XCUIApplication()\napp.tables.staticTexts[\"United Kingdom\"].tap()\n\
    let label = app.navigationBars[\"United Kingdom\"].staticTexts[\"United Kingdom\"\
    ]\nlet predicate = NSPredicate(format: \"exists == 1\", argumentArray: nil)\n\
    self.expectation(for: predicate, evaluatedWith: label.exists, handler: nil)\n\
    self.waitForExpectations(timeout: 5, handler: nil)\n}\n```\n\nThere are quite\
    \ a few things going on in this test. The tests starts by simulating a tap on\
    \ one of the countries in the list of countries shown when the app is launched:\n\
    \n```swift\nlet app = XCUIApplication()\napp.tables.staticTexts[\"United Kingdom\"\
    ].tap()\n```\n\nTapping on a row in a table will result in the list of cities\
    \ being animated on screen (sliding in from the right). This is standard behavior\
    \ in a master-detail type of app build with table view controllers and navigation\
    \ controllers.\n\nThe slide-from-right animation implies that the list of countries\
    \ will not be visible instantly, and the test will need to wait for a few milliseconds\
    \ before if can proceed to inspect the view that has been animated on screen.\n\
    \nThe code in the test achieves the wait, using expectations. An expectation is\
    \ set up to expect the existence of a navigation bar with the title of the country\
    \ that was tapped on the first screen.\n\n```swift\nlet label = app.navigationBars[\"\
    United Kingdom\"].staticTexts[\"United Kingdom\"]\nlet predicate = NSPredicate(format:\
    \ \"exists == 1\", argumentArray: nil)\nself.expectation(for: predicate, evaluatedWith:\
    \ label.exists, handler: nil)\n```\n\nThis expectation will be fulfilled when\
    \ the slide-from-right animation finishes animating the list of cities on screen.\
    \ This expectation also makes use of a subtle design fact of the application:\
    \ the name of the country that was selected on the first screen becomes the title\
    \ of the second screen.\n\nWith the expectation set up, the test uses the `waitForExpectation(timeout:,\
    \ handler:)` method to wait up to 5 seconds for the animation to complete, and\
    \ the expectation to be fulfilled.\n\n```swift\nself.waitForExpectations(timeout:\
    \ 5, handler: nil)\n```\n\nTo try all units and tests, select the **Product**\
    \ ➤ **Test** menu item.\n\n## Summary\n\nIn this chapter you have learned how\
    \ to add support for UI Testing to new and existing Xcode projects. You have also\
    \ learned how to write UI tests using the `XCUITest` framework and how to use\
    \ the UI Recording tool to help create UI Tests."
  raw: 'This test could, for instance, easily break if an extra row was added to the
    table, or if the test was run on a device with a smaller screen size. The later
    situation can be of particular importance if your test is counting the number
    of rows that are visible on a full-screen table view on a plus-sized iPhone. Running
    such a test on a device with a smaller screen implies fewer rows will be visible,
    and the test will break.


    Note


    You can use UIDevice and UIScreen methods within the test to work out what type
    of device you are running the test on, and use that information to work out the
    number of rows you can expect to find onscreen.


    Whether this type has business value depends on how critical is the number of
    initial items that are visible on screen. This is something you will need to decide,
    keeping in mind the needs of the business, and the inherent fragility of the test.


    The final test for this example will involve verifying that tapping on a country
    name from the list of countries will drill down to a list of cities within that
    country. The following code snippet shows how such a test could be written:


    ```

    func testTappingOnCountryDisplaysDetailViewWithExpectedTitle() {

    let app = XCUIApplication()

    app.tables.staticTexts["United Kingdom"].tap()

    let label = app.navigationBars["United Kingdom"].staticTexts["United Kingdom"]

    let predicate = NSPredicate(format: "exists == 1", argumentArray: nil)

    self.expectation(for: predicate, evaluatedWith: label.exists, handler: nil)

    self.waitForExpectations(timeout: 5, handler: nil)

    }

    ```


    There are quite a few things going on in this test. The tests starts by simulating
    a tap on one of the countries in the list of countries shown when the app is launched:


    ```

    let app = XCUIApplication()

    app.tables.staticTexts["United Kingdom"].tap()

    ```


    Tapping on a row in a table will result in the list of cities being animated on
    screen (sliding in from the right). This is standard behavior in a master-detail
    type of app build with table view controllers and navigation controllers.


    The slide-from-right animation implies that the list of countries will not be
    visible instantly, and the test will need to wait for a few milliseconds before
    if can proceed to inspect the view that has been animated on screen.


    The code in the test achieves the wait, using expectations. An expectation is
    set up to expect the existence of a navigation bar with the title of the country
    that was tapped on the first screen.


    ```

    let label = app.navigationBars["United Kingdom"].staticTexts["United Kingdom"]

    let predicate = NSPredicate(format: "exists == 1", argumentArray: nil)

    self.expectation(for: predicate, evaluatedWith: label.exists, handler: nil)

    ```


    This expectation will be fulfilled when the slide-from-right animation finishes
    animating the list of cities on screen. This expectation also makes use of a subtle
    design fact of the application: the name of the country that was selected on the
    first screen becomes the title of the second screen.


    With the expectation set up, the test uses the waitForExpectation(timeout:, handler:)
    method to wait up to 5 seconds for the animation to complete, and the expectation
    to be fulfilled.


    ```

    self.waitForExpectations(timeout: 5, handler: nil)

    ```


    To try all units and tests, select the Product ➤ Test menu item.


    ## Summary


    In this chapter you have learned how to add support for UI Testing to new and
    existing Xcode projects. You have also learned how to write UI tests using the
    XCUITest framework and how to use the UI Recording tool to help create UI Tests.'
  trans: "\n例如，如果表格中增加了一行，或者在屏幕尺寸较小的设备上运行测试，这项测试就很容易失败。后一种情况尤其值得注意，如果你的测试是在 plus 尺寸的\
    \ iPhone 上计算全屏表格视图中可见的行数。在屏幕较小的设备上运行同样的测试，意味着可见行数会减少，测试便会失败。\n\n> **注意**  \n>\
    \ 你可以在测试中使用 `UIDevice` 和 `UIScreen` 方法来识别当前运行测试的设备类型，并根据这些信息计算屏幕上预期的可见行数。\n\n\
    这种测试类型是否具有业务价值，取决于屏幕上初始可见项的数量有多关键。你需要结合业务需求以及测试本身的脆弱性来决定。\n\n本示例的最后一个测试将验证：从国家列表中点击某个国家名称后，能否下钻到该国家下的城市列表。以下代码片段展示了如何编写此类测试：\n\
    \n```swift\nfunc testTappingOnCountryDisplaysDetailViewWithExpectedTitle() {\n\
    let app = XCUIApplication()\napp.tables.staticTexts[\"United Kingdom\"].tap()\n\
    let label = app.navigationBars[\"United Kingdom\"].staticTexts[\"United Kingdom\"\
    ]\nlet predicate = NSPredicate(format: \"exists == 1\", argumentArray: nil)\n\
    self.expectation(for: predicate, evaluatedWith: label.exists, handler: nil)\n\
    self.waitForExpectations(timeout: 5, handler: nil)\n}\n```\n\n这个测试涉及不少细节。测试首先模拟点击应用启动时显示的国家列表中的某个国家：\n\
    \n```swift\nlet app = XCUIApplication()\napp.tables.staticTexts[\"United Kingdom\"\
    ].tap()\n```\n\n点击表格中的某一行后，城市列表会以动画形式（从右侧滑入）呈现在屏幕上。这是使用表视图控制器和导航控制器构建的主从类型应用的典型行为。\n\
    \n从右侧滑入的动画意味着国家列表不会立即消失，测试需要等待几毫秒后才能继续检查已动画显示的视图。\n\n测试中的代码通过使用预期（expectations）来实现等待。它设置了一个预期，期望存在一个导航栏，其标题为在第一屏点击的国家名称。\n\
    \n```swift\nlet label = app.navigationBars[\"United Kingdom\"].staticTexts[\"\
    United Kingdom\"]\nlet predicate = NSPredicate(format: \"exists == 1\", argumentArray:\
    \ nil)\nself.expectation(for: predicate, evaluatedWith: label.exists, handler:\
    \ nil)\n```\n\n当从右侧滑入的动画完成城市列表的显示后，这个预期就会被满足。该预期还利用了应用的一个细微设计：在第一屏选中的国家名称会成为第二屏的标题。\n\
    \n预期设置完成后，测试使用 `waitForExpectation(timeout:, handler:)` 方法等待最多 5 秒，直到动画完成且预期被满足。\n\
    \n```swift\nself.waitForExpectations(timeout: 5, handler: nil)\n```\n\n要运行所有单元和测试，请选择\
    \ **Product** ➤ **Test** 菜单项。\n\n## 总结\n\n在本章中，你学习了如何为新建及现有的 Xcode 项目添加 UI 测试支持。你还学习了如何使用\
    \ `XCUITest` 框架编写 UI 测试，以及如何利用 UI Recording 工具来辅助创建 UI 测试。\n"
