  raw: '## Integrating the Validator Classes into the AccountOwner Class


    The AccountOwner class has a failable initializer that takes three parameters:
    a first name, last name, and email address. This initializer should return nil
    if any of its three parameters are invalid.


    ```

    init?(firstName:String, lastName:String, emailAddress:String) {

    super.init()

    }

    ```


    We have already built classes to validate first names, last names, and email addresses
    . We need to now integrate these classes into the initializer of AccountOwner.
    Integrating these validator classes into AccountOwner’s init? method implies three
    things:


    1.  Validator objects for the first name, last name, and email address need to
    be injected into the AccountOwner class.  

    2.  The validate method on the individual validator objects will be called when
    the AccountOwner’s init? method is called .  

    3.  The validate method on the validator object will be called with the correct
    value that was provided into AccountOwner’s init? method.


    There are various techniques we can use to inject dependencies into a class, and
    these techniques have been covered in Chapter [2](#A432412_1_En_2_Chapter.html).
    In this case, I will inject the validator classes as parameters into AccountOwner’s
    initializer.


    Modify the init? method in AccountOwner.swift to match the following snippet:


    ```

    init?(firstName:String, lastName:String, emailAddress:String,

    firstNameValidator:FirstNameValidator?=nil,

    lastNameValidator:LastNameValidator? = nil,

    emailAddressValidator:EmailAddressValidator? = nil) {

    super.init()

    }

    ```


    I have added three optional parameters to the initializer, each with a default
    value of nil. The reason I have done this is so that I can inject mock objects
    into the initializer when called from a test case, and use real objects when called
    otherwise.


    You need to make sure this small refactoring effort has not broken any tests that
    were previously passing. Save the file and run all unit tests using the Product
    ➤ Test menu item. You will observe that no new tests are broken as a result of
    this refactoring.


    Now that we have the means to inject our validators into AccountOwner, let us
    inject a mock first name validator object and write a test that ensures that the
    validate method on the mock object is called when an AccountOwner object is instantiated.


    Add the following test case to the AccountOwnerTest.swift file:


    ```

    func testAccountOwner_ValidFirstName_ValidLastName_ValidEmailAddress_ValidFirstNameValidator_CallsValidateOnValidator()
    {

    let expectation = self.expectation(description: "Expected validate to be called
    on validator.")

    let mockFirstNameValidator = MockFirstNameValidator(expectation, expectedValue:validFirstName)

    let _ = AccountOwner(firstName: validFirstName,

    lastName: validLastName,

    emailAddress: validEmailAddress,

    firstNameValidator:mockFirstNameValidator)

    self.waitForExpectations(timeout: 1.0, handler: nil)

    }

    ```


    This test case first creates an XCTestExpectation instance


    ```

    let expectation = self.expectation(description: "Expected validate to be called
    on validator.")

    ```


    The test case then instantiates a mock first name validator object. This mock
    validator is an instance of a class called MockFirstNameValidator (which will
    be built shortly).


    ```

    let mockFirstNameValidator = MockFirstNameValidator(expectation, expectedValue:validFirstName)

    ```


    Recall that the validator objects that have been created previously all have a
    single validate method:


    ```

    class func validate(_ value:String) -> Bool

    ```


    The mock validator is given a reference to the expectation object as well as the
    string we expect will be injected into the validate method by AccountOwner’s init?
    method. The mock validator object will fulfill the expectation when its validate
    method is called with the expected value.


    The test case then instantiates an AccountOwner with a valid first name, last
    name, email address, and first name validator.


    ```

    let _ = AccountOwner(firstName: validFirstName,

    lastName: validLastName,

    emailAddress: validEmailAddress,

    firstNameValidator:mockFirstNameValidator)

    ```


    Finally, the test case waits for up to one second for the test expectation to
    be fulfilled.


    ```

    self.waitForExpectations(timeout: 1.0, handler: nil)

    ```


    Create a new group in the project explorer under the BankAccountTests group, called
    Mocks . Create a new class called MockFirstNameValidator under the Mocks group
    in the project navigator (see Figure [4-10](#A432412_1_En_4_Chapter.html#Fig10)).
    This new class does not need to be a member of the BankAccount target, as it is
    only used in the unit test target.


    ![A432412_1_En_4_Fig10_HTML.jpg](A432412_1_En_4_Fig10_HTML.jpg)


    Figure 4-10.


    MockFirstNameValidator.swift Target Membership


    Update the implementation of the MockFirstNameValidator class to match Listing
    [4-8](#A432412_1_En_4_Chapter.html#Par114).


    ```

    import Foundation

    import XCTest

    class MockFirstNameValidator: FirstNameValidator {

    private var expectation:XCTestExpectation?

    private var expectedValue:String?

    init(_ expectation:XCTestExpectation, expectedValue:String) {

    self.expectation = expectation

    self.expectedValue = expectedValue

    super.init()

    }

    override func validate(_ value:String) -> Bool {

    if let expectation = self.expectation,

    let expectedValue = self.expectedValue {

    if value.compare(expectedValue) == .orderedSame {

    expectation.fulfill()

    }

    }

    return super.validate(value)

    }

    }

    Listing 4-8.

    MockFirstNameValidator.swift

    ```


    Save the file and run all unit tests using the Product ➤ Test menu item. Your
    new test case should compile, but will not pass. This is because the validator
    has not been integrated into the init? method of the AccountOwner object.


    Modify the implementation of the init? method of the AccountOwner class to match:


    ```

    init?(firstName:String, lastName:String, emailAddress:String,

    firstNameValidator:FirstNameValidator? = nil,

    lastNameValidator:LastNameValidator? = nil,

    emailAddressValidator:EmailAddressValidator? = nil) {

    let validator1 = firstNameValidator ?? FirstNameValidator()

    if validator1.validate(firstName) == false {

    return nil

    }

    super.init()

    }

    ```


    Save the file and run all unit tests using the Product ➤ Test menu item. Your
    new test case will now pass (see Figure [4-11](#A432412_1_En_4_Chapter.html#Fig11)).


    ![A432412_1_En_4_Fig11_HTML.jpg](A432412_1_En_4_Fig11_HTML.jpg)


    Figure 4-11.


    Xcode Test Navigator with Passing and Failing Tests


    This new test case that you have just completed verifies that the first name validator
    object integrates correctly with the AccountOwner object .


    Now, let us create a couple of additional test cases to verify the integration
    of the last name and email address validator objects with the AccountOwner object.
    Add the following two additional test cases to the AccountOwnerTests.swift file:


    ```

    func testAccountOwner_ValidFirstName_ValidLastName_ValidEmailAddress_ValidLastNameValidator_CallsValidateOnValidator()
    {

    let expectation = self.expectation(description: "Expected validate to be called
    on validator.")

    let mockLastNameValidator = MockLastNameValidator(expectation, expectedValue:validLastName)

    let _ = AccountOwner(firstName: validFirstName,

    lastName: validLastName,

    emailAddress: validEmailAddress,

    firstNameValidator:nil,

    lastNameValidator:mockLastNameValidator)

    self.waitForExpectations(timeout: 1.0, handler: nil)

    }

    func testAccountOwner_ValidFirstName_ValidLastName_ValidEmailAddress_ValidEmailAddressValidator_CallsValidateOnValidator()
    {

    let expectation = self.expectation(description: "Expected validate to be called
    on validator.")

    let mockEmailAddressValidator = MockEmailAddressValidator(expectation, expectedValue:validEmailAddress)

    let _ = AccountOwner(firstName: validFirstName,

    lastName: validLastName,

    emailAddress: validEmailAddress,

    firstNameValidator:nil,

    lastNameValidator:nil,

    emailAddressValidator:mockEmailAddressValidator)

    self.waitForExpectations(timeout: 1.0, handler: nil)

    }

    ```'
