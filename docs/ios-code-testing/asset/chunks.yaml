    \ the `PhotoBook` and `PhotoBookTests` targets. The project navigator should resemble\
    \ Figure [6-7](#A432412_1_En_6_Chapter.html#Fig7).\n\n![A432412_1_En_6_Fig7_HTML.jpg](A432412_1_En_6_Fig7_HTML.jpg)\n\
    \n**Figure 6-7.** Xcode Project Navigator for the PhotoBook Project\n\n## Building\
    \ the Collection View Controller Scene\n\nOpen the `Main.storyboard` file and\
    \ delete the default scene in the storyboard. Drag and drop a **Collection View\
    \ Controller** from the Object Library onto the storyboard scene (see Figure [6-8](#A432412_1_En_6_Chapter.html#Fig8)).\n\
    \n![A432412_1_En_6_Fig8_HTML.jpg](A432412_1_En_6_Fig8_HTML.jpg)\n\n**Figure 6-8.**\
    \ Storyboard Scene with a Collection View Controller\n\nWith the collection view\
    \ controller scene selected, use the **Identity Inspector** to change the class\
    \ associated with the collection view controller scene to `CollectionViewController`\
    \ (see Figure [6-9](#A432412_1_En_6_Chapter.html#Fig9)).\n\n![A432412_1_En_6_Fig9_HTML.jpg](A432412_1_En_6_Fig9_HTML.jpg)\n\
    \n**Figure 6-9.** Custom Class Applied to Storyboard Scene\n\nWith the collection\
    \ view controller scene selected, switch to the **Attributes Inspector** and check\
    \ the **Is Initial View Controller** option (see Figure [6-10](#A432412_1_En_6_Chapter.html#Fig10)).\n\
    \n![A432412_1_En_6_Fig10_HTML.jpg](A432412_1_En_6_Fig10_HTML.jpg)\n\n**Figure\
    \ 6-10.** Xcode Attributes Inspector\n\n## Adding a Section Header Accessory View\n\
    \nSelect the collection view within the collection view controller scene, and\
    \ use the **Attributes Inspector** to enable the **Section Header** accessory\
    \ view (see Figure [6-11](#A432412_1_En_6_Chapter.html#Fig11)).\n\n![A432412_1_En_6_Fig11_HTML.jpg](A432412_1_En_6_Fig11_HTML.jpg)\n\
    \n**Figure 6-11.** Section Header Accessory View Enabled using the Attributes\
    \ Inspector\n\nWith the collection view selected, switch to the **Size Inspector**\
    \ and change the cell size to width = 250, height = 200. Change the height of\
    \ the header to 25 (see Figure [6-12](#A432412_1_En_6_Chapter.html#Fig12)).\n\n\
    ![A432412_1_En_6_Fig12_HTML.jpg](A432412_1_En_6_Fig12_HTML.jpg)\n\n**Figure 6-12.**\
    \ Xcode Size Inspector\n\nSelect the collection view header accessory view (this\
    \ will be identified as the **Collection Reusable View** in the document outline),\
    \ and use the **Identity Inspector** to change the class associated with the header\
    \ accessory view to `CollectionViewSectionHeader` (see Figure [6-13](#A432412_1_En_6_Chapter.html#Fig13)).\n\
    \n![A432412_1_En_6_Fig13_HTML.jpg](A432412_1_En_6_Fig13_HTML.jpg)\n\n**Figure\
    \ 6-13.** Custom Class Setup for the Header Accessory View\n\nUse the **Attributes\
    \ Inspector** to change the background color of the header accessory view to a\
    \ shade of gray, and the value of the **Identifier** attribute to `CollectionViewSectionHeader`.\n\
    \nDrag and drop a label from the Object Library onto the header accessory view\
    \ and position it to resemble Figure [6-14](#A432412_1_En_6_Chapter.html#Fig14).\
    \ Use appropriate constraints for the label to maintain this position on different\
    \ screen sizes. Set the font size of the text in the label to 14 points. See Figure\
    \ [6-14](#A432412_1_En_6_Chapter.html#Fig14).\n\n![A432412_1_En_6_Fig14_HTML.jpg](A432412_1_En_6_Fig14_HTML.jpg)\n\
    \n**Figure 6-14.** Constraints on the Header Accessory View\n\nUsing the **Assistant\
    \ Editor**, create an outlet for the label in the `CollectionViewSectionHeader.swift`\
    \ file. Name this outlet `title`. The code in `CollectionViewSectionHeader.swift`\
    \ should resemble Listing [6-1](#A432412_1_En_6_Chapter.html#Par45).\n\n```\n\
    import UIKit\nclass CollectionViewSectionHeader: UICollectionReusableView {\n\
    \    @IBOutlet weak var title: UILabel!\n}\n```\n\n**Listing 6-1.** `CollectionViewSectionHeader.swift`"
  raw: '## Adding Resources to the Project


    Delete the Assets.xcassets folder from the project navigator. Ensure that you
    select the Move to Trash option when prompted by Xcode.


    Add the Albums.plist and the Assets.xcassets folder provided with this lesson’s
    downloads into the project. While adding these new items, ensure the Copy Items
    if Needed option is checked in the import dialog box (see Figure [6-4](#A432412_1_En_6_Chapter.html#Fig4)).


    ![A432412_1_En_6_Fig4_HTML.jpg](A432412_1_En_6_Fig4_HTML.jpg)


    Figure 6-4.


    Xcode File Import Dialog


    The asset bundle you have imported contains photos categorized under six cities,
    and each city is represented by a subfolder within the asset bundle (see Figure
    [6-5](#A432412_1_En_6_Chapter.html#Fig5)).


    ![A432412_1_En_6_Fig5_HTML.jpg](A432412_1_En_6_Fig5_HTML.jpg)


    Figure 6-5.


    PhotoBook Asset Bundle


    You may also have noticed that no 1X images have been provided for the assets.
    This is because this app is built for iPhone’s only and the latest iOS version
    is not supported on non-retina iPhones .


    ## Building the User Interface Layer


    The user interface for this application consists of a single storyboard scene
    embedded within a navigation controller (see Figure [6-6](#A432412_1_En_6_Chapter.html#Fig6)).


    ![A432412_1_En_6_Fig6_HTML.jpg](A432412_1_En_6_Fig6_HTML.jpg)


    Figure 6-6.


    Application Storyboard


    ### Creating New Classes


    Delete the ViewController.swift file from the project navigator, and create the
    following Swift classes under the View group :


    *   A UICollectionViewController subclass called CollectionViewController.

    *   A UICollectionViewCell subclass called CollectionViewCell.

    *   A UICollectionReusableView subclass called CollectionViewSectionHeader.


    Ensure these classes are included in both the PhotoBook and PhotoBookTests targets.
    The project navigator should resemble Figure [6-7](#A432412_1_En_6_Chapter.html#Fig7).


    ![A432412_1_En_6_Fig7_HTML.jpg](A432412_1_En_6_Fig7_HTML.jpg)


    Figure 6-7.


    Xcode Project Navigator for the PhotoBook Project


    ### Building the Collection View Controller Scene


    Open the Main.storyboard file and delete the default scene in the storyboard.
    Drag and drop a Collection View Controller from the Object Library onto the storyboard
    scene (see Figure [6-8](#A432412_1_En_6_Chapter.html#Fig8)).


    ![A432412_1_En_6_Fig8_HTML.jpg](A432412_1_En_6_Fig8_HTML.jpg)


    Figure 6-8.


    Storyboard Scene with a Collection View Controller


    With the collection view controller scene selected, use the Identity Inspector
    to change the class associated with the collection view controller scene to CollectionViewController
    (see Figure [6-9](#A432412_1_En_6_Chapter.html#Fig9)).


    ![A432412_1_En_6_Fig9_HTML.jpg](A432412_1_En_6_Fig9_HTML.jpg)


    Figure 6-9.


    Custom Class Applied to Storyboard Scene


    With the collection view controller scene selected, switch to the Attributes Inspector
    and check the Is Initial View Controller option (see Figure [6-10](#A432412_1_En_6_Chapter.html#Fig10)).


    ![A432412_1_En_6_Fig10_HTML.jpg](A432412_1_En_6_Fig10_HTML.jpg)


    Figure 6-10.


    Xcode Attributes Inspector


    ### Adding a Section Header Accessory View


    Select the collection view within the collection view controller scene, and use
    the Attributes Inspector to enable the Section Header accessory view (see Figure
    [6-11](#A432412_1_En_6_Chapter.html#Fig11)).


    ![A432412_1_En_6_Fig11_HTML.jpg](A432412_1_En_6_Fig11_HTML.jpg)


    Figure 6-11.


    Section Header Accessory View Enabled using the Attributes Inspector


    With the collection view selected, switch to the Size Inspector and change the
    cell size to width = 250, height = 200\. Change the height of the header to 25
    (see Figure [6-12](#A432412_1_En_6_Chapter.html#Fig12)).


    ![A432412_1_En_6_Fig12_HTML.jpg](A432412_1_En_6_Fig12_HTML.jpg)


    Figure 6-12.


    Xcode Size Inspector


    Select the collection view header accessory view (this will be identified as the
    Collection Reusable View in the document outline), and use the Identity Inspector
    to change the class associated with the header accessory view to CollectionViewSectionHeader
    (see Figure [6-13](#A432412_1_En_6_Chapter.html#Fig13)).


    ![A432412_1_En_6_Fig13_HTML.jpg](A432412_1_En_6_Fig13_HTML.jpg)


    Figure 6-13.


    Custom Class Setup for the Header Accessory View


    Use the Attributes Inspector to change the background color of the header accessory
    view to a shade of gray, and the value of the Identifier attribute to CollectionViewSectionHeader.


    Drag and drop a label from the Object Library onto the header accessory view and
    position it to resemble Figure [6-14](#A432412_1_En_6_Chapter.html#Fig14). Use
    appropriate constraints for the label to maintain this position on different screen
    sizes . Set the font size of the text in the label to 14 points. See Figure [6-14](#A432412_1_En_6_Chapter.html#Fig14).


    ![A432412_1_En_6_Fig14_HTML.jpg](A432412_1_En_6_Fig14_HTML.jpg)


    Figure 6-14.


    Constraints on the Header Accessory View


    Using the Assistant Editor, create an outlet for the label in the CollectionViewSectionHeader.swift
    file. Name this outlet title. The code in CollectionViewSectionHeader.swift should
    resemble Listing [6-1](#A432412_1_En_6_Chapter.html#Par45).


    ```

    import UIKit

    class CollectionViewSectionHeader: UICollectionReusableView {

    @IBOutlet weak var title: UILabel!

    }

    Listing 6-1.

    CollectionViewSectionHeader.swift

    ```'
  trans: "\n# 向项目添加资源\n\n从项目导航器中删除 `Assets.xcassets` 文件夹。当 Xcode 提示时，确保选择**移至废纸篓**选项。\n\
    \n将本课程下载内容中提供的 `Albums.plist` 和 `Assets.xcassets` 文件夹添加到项目中。在添加这些新项目时，确保在导入对话框中勾选了**如果需要则复制项目**选项（见图\
    \ 6-4）。\n\n![A432412_1_En_6_Fig4_HTML.jpg](img/A432412_1_En_6_Fig4_HTML.jpg)\n\
    \n**图 6-4.** Xcode 文件导入对话框\n\n您导入的资源包包含了按六个城市分类的照片，每个城市由资源包内的一个子文件夹表示（见图 6-5）。\n\
    \n![A432412_1_En_6_Fig5_HTML.jpg](img/A432412_1_En_6_Fig5_HTML.jpg)\n\n**图 6-5.**\
    \ PhotoBook 资源包\n\n您可能还注意到资源未提供 1X 图片。这是因为此应用仅针对 iPhone 构建，且非 Retina 屏的 iPhone\
    \ 不支持最新的 iOS 版本。\n\n# 构建用户界面层\n\n此应用程序的用户界面由一个嵌入在导航控制器中的故事板场景组成（见图 6-6）。\n\n![A432412_1_En_6_Fig6_HTML.jpg](img/A432412_1_En_6_Fig6_HTML.jpg)\n\
    \n**图 6-6.** 应用故事板\n\n## 创建新类\n\n从项目导航器中删除 `ViewController.swift` 文件，并在 **View**\
    \ 组下创建以下 Swift 类：\n\n- 一个名为 `CollectionViewController` 的 `UICollectionViewController`\
    \ 子类。\n- 一个名为 `CollectionViewCell` 的 `UICollectionViewCell` 子类。\n- 一个名为 `CollectionViewSectionHeader`\
    \ 的 `UICollectionReusableView` 子类。\n\n确保这些类同时包含在 `PhotoBook` 和 `PhotoBookTests`\
    \ 目标中。项目导航器应类似于图 6-7。\n\n![A432412_1_En_6_Fig7_HTML.jpg](img/A432412_1_En_6_Fig7_HTML.jpg)\n\
    \n**图 6-7.** PhotoBook 项目的 Xcode 项目导航器\n\n## 构建集合视图控制器场景\n\n打开 `Main.storyboard`\
    \ 文件，并删除故事板中的默认场景。从对象库中拖放一个**集合视图控制器**到故事板场景中（见图 6-8）。\n\n![A432412_1_En_6_Fig8_HTML.jpg](img/A432412_1_En_6_Fig8_HTML.jpg)\n\
    \n**图 6-8.** 包含集合视图控制器的故事板场景\n\n选中集合视图控制器场景后，使用**身份检查器**将与该场景关联的类更改为 `CollectionViewController`（见图\
    \ 6-9）。\n\n![A432412_1_En_6_Fig9_HTML.jpg](img/A432412_1_En_6_Fig9_HTML.jpg)\n\
    \n**图 6-9.** 应用于故事板场景的自定义类\n\n选中集合视图控制器场景后，切换到**属性检查器**并勾选**是初始视图控制器**选项（见图 6-10）。\n\
    \n![A432412_1_En_6_Fig10_HTML.jpg](img/A432412_1_En_6_Fig10_HTML.jpg)\n\n**图 6-10.**\
    \ Xcode 属性检查器\n\n## 添加分区头部辅助视图\n\n选择集合视图控制器场景中的集合视图，并使用**属性检查器**启用**分区头部**辅助视图（见图\
    \ 6-11）。\n\n![A432412_1_En_6_Fig11_HTML.jpg](img/A432412_1_En_6_Fig11_HTML.jpg)\n\
    \n**图 6-11.** 通过属性检查器启用分区头部辅助视图\n\n选中集合视图后，切换到**尺寸检查器**并将单元格大小更改为宽度 = 250，高度 =\
    \ 200。将头部的高度更改为 25（见图 6-12）。\n\n![A432412_1_En_6_Fig12_HTML.jpg](img/A432412_1_En_6_Fig12_HTML.jpg)\n\
    \n**图 6-12.** Xcode 尺寸检查器\n\n选择集合视图头部辅助视图（在文档大纲中标识为**集合可复用视图**），并使用**身份检查器**将与头部辅助视图关联的类更改为\
    \ `CollectionViewSectionHeader`（见图 6-13）。\n\n![A432412_1_En_6_Fig13_HTML.jpg](img/A432412_1_En_6_Fig13_HTML.jpg)\n\
    \n**图 6-13.** 头部辅助视图的自定义类设置\n\n使用**属性检查器**将头部辅助视图的背景颜色更改为灰色调，并将**标识符**属性的值更改为\
    \ `CollectionViewSectionHeader`。\n\n从对象库中拖放一个标签到头部辅助视图上，并将其定位为类似图 6-14 所示。为标签使用适当的约束，以在不同屏幕尺寸上保持此位置。将标签中文本的字体大小设置为\
    \ 14 磅。见图 6-14。\n\n![A432412_1_En_6_Fig14_HTML.jpg](img/A432412_1_En_6_Fig14_HTML.jpg)\n\
    \n**图 6-14.** 头部辅助视图上的约束\n\n使用**助理编辑器**在 `CollectionViewSectionHeader.swift` 文件中为标签创建一个插座。将此插座命名为\
    \ `title`。`CollectionViewSectionHeader.swift` 中的代码应类似于代码清单 6-1。\n\n```\nimport\
    \ UIKit\nclass CollectionViewSectionHeader: UICollectionReusableView {\n    @IBOutlet\
    \ weak var title: UILabel!\n}\n```\n\n**代码清单 6-1.** `CollectionViewSectionHeader.swift`\n"
- fmt: "### Building the Collection View Cell\n\nGo back to the storyboard, select\
    \ the collection view cell, and use the Identity Inspector to change the class\
    \ associated with the collection view cell to `CollectionViewCell`. Switch to\
    \ the Attributes Inspector and change the value of the Identity attribute to `CollectionViewCell`.\n\
    \nUsing the Object Library, drag and drop an image view onto the empty collection\
    \ view cell. Use the Attributes Inspector to set the content mode of the image\
    \ view to Aspect Fill. Position the image view and set up appropriate layout constraints\
    \ to resemble Figure [6-15](#A432412_1_En_6_Chapter.html#Fig15).\n\n![A432412_1_En_6_Fig15_HTML.jpg](A432412_1_En_6_Fig15_HTML.jpg)\n\
    \nFigure 6-15. Adding an Image View to the Collection View Cell\n\nUsing the Object\
    \ Library, drag and drop an empty view onto the collection view cell, on top of\
    \ the image view. Use the Attributes Inspector to set the background color of\
    \ the view to black with an opacity of 40%. Position the new view and set up appropriate\
    \ layout constraints to resemble Figure [6-16](#A432412_1_En_6_Chapter.html#Fig16).\n\
    \n![A432412_1_En_6_Fig16_HTML.jpg](A432412_1_En_6_Fig16_HTML.jpg)\n\nFigure 6-16.\
    \ Adding a Translucent View to the Collection View Cell\n\nDrag and drop two labels\
    \ from the Object Library onto the new view you have just created. Make sure these\
    \ two labels are encompassed by the view and place the labels one below the other\
    \ (see Figure [6-17](#A432412_1_En_6_Chapter.html#Fig17)).\n\n![A432412_1_En_6_Fig17_HTML.jpg](A432412_1_En_6_Fig17_HTML.jpg)\n\
    \nFigure 6-17. Adding Labels to the Collection View Cell\n\nUsing the Attributes\
    \ Inspector, apply the following properties to the upper label:\n\n- Foreground\
    \ Color: White\n- Font Size: 14 point\n- Number of Lines: 2\n\nUsing the Pin constraints\
    \ button, apply the following constraints to the upper label:\n\n- Left: 2\n-\
    \ Top: 2\n- Bottom: 2\n- Right: 2\n- Constrain to Margins: Unchecked\n- Update\
    \ Frames: None\n\nUsing the Attributes Inspector, apply the following properties\
    \ to the lower label:\n\n- Foreground Color: Blue\n- Font Size: 17 point\n- Number\
    \ of Lines: 1\n- Text Alignment: Right\n\nUsing the Pin constraints button, apply\
    \ the following constraints to the lower label:\n\n- Left: 2\n- Bottom: 2\n- Right:\
    \ 2\n- Height: 15\n- Constrain to Margins: Unchecked\n- Update Frames: All Frames\
    \ In Container\n\nThe storyboard should now resemble Figure [6-18](#A432412_1_En_6_Chapter.html#Fig18).\n\
    \n![A432412_1_En_6_Fig18_HTML.jpg](A432412_1_En_6_Fig18_HTML.jpg)\n\nFigure 6-18.\
    \ Updated Storyboard Scene With Constraints\n\nUsing the Assistant Editor, create\
    \ outlets for the image view and the labels in the `CollectionViewCell.swift`\
    \ file, as per Table [6-1](#A432412_1_En_6_Chapter.html#Tab1).\n\nTable 6-1. Collection\
    \ View Cell Outlets\n\n| User Interface Object | Outlet Name |\n|-----------------------|-------------|\n\
    | Image View | `imageView` |\n| Upper Label | `captionLabel` |\n| Lower Label\
    \ | `shotDetailsLabel` |\n\nThe code in `CollectionViewCell.swift` should resemble\
    \ Listing [6-2](#A432412_1_En_6_Chapter.html#Par76).\n\n```swift\nimport UIKit\n\
    \nclass CollectionViewCell: UICollectionViewCell {\n    @IBOutlet weak var imageView:\
    \ UIImageView!\n    @IBOutlet weak var captionLabel: UILabel!\n    @IBOutlet weak\
    \ var shotDetailsLabel: UILabel!\n}\n```\n\nListing 6-2. `CollectionViewCell.swift`\n\
    \nSelect the collection view controller scene of the story board and embed it\
    \ within a navigation controller using the Editor ➤ Embed In ➤ Navigation Controller\
    \ menu item. The final storyboard should resemble Figure [6-19](#A432412_1_En_6_Chapter.html#Fig19).\n\
    \n![A432412_1_En_6_Fig19_HTML.jpg](A432412_1_En_6_Fig19_HTML.jpg)\n\nFigure 6-19.\
    \ Collection View Controller Scene Embedded Within a Navigation Controller\n\n\
    ## Building the Model Layer\n\nThere are three model classes that we need to build\
    \ – `Photo`, `City`, and `Album`. The relationship between these classes is depicted\
    \ in Figure [6-20](#A432412_1_En_6_Chapter.html#Fig20). The `Album` object is\
    \ the top-level model object. An `Album` object contains an array of `City` objects,\
    \ and each `City` object contains an array of `Photo` objects. `Photo` objects\
    \ store metadata for individual photos along with the name of a resource in the\
    \ project’s asset catalog from where the actual image can be loaded.\n\n![A432412_1_En_6_Fig20_HTML.jpg](A432412_1_En_6_Fig20_HTML.jpg)\n\
    \nFigure 6-20. Model Layer Classes\n\n### The Photo Class\n\nThe `Photo` class\
    \ contains properties that store the information for a single photo. Table [6-2](#A432412_1_En_6_Chapter.html#Tab2)\
    \ lists the desired properties and methods of the `Photo` class.\n\nTable 6-2.\
    \ Photo Properties and Methods\n\n| Item | Type | Description |\n|------|------|-------------|\n\
    | `var imageName:String?` | Variable | The name of the resource in the project’s\
    \ asset catalog that contains the image. |\n| `var aperture:String?` | Variable\
    \ | Aperture setting used by the photographer. |\n| `var shutterSpeed:String?`\
    \ | Variable | Shutter speed setting used by the photographer. |\n| `var iso:String?`\
    \ | Variable | ISO setting used by the photographer. |\n| `var comments:String?`\
    \ | Variable | Photographer’s comments. |\n| `init?(_ dictionary:[String : AnyObject]?)`\
    \ | Method | Allows other code to create `Photo` instances. Requires a dictionary\
    \ with certain mandatory keys as input. |\n\nThe `init` method will require a\
    \ dictionary with all of the following mandatory keys to be present:\n\n- `imageName`\n\
    - `aperture`\n- `shutterSpeed`\n- `iso`\n- `comment`\n\nThe approach to developing\
    \ the `Photo` class will be very similar to the model layer classes that were\
    \ developed in Chapter [4](#A432412_1_En_4_Chapter.html). The tests will be around\
    \ the behavior of the `init` method and how it handles missing keys in the dictionary.\n\
    \nThe complete `Photo` class is shown in Listing [6-3](#A432412_1_En_6_Chapter.html#Par89).\
    \ If you would like to examine the code for the tests, download the finished project\
    \ anonymously from github using the following URL:\n\n[`https://github.com/asmtechnology/Lesson06.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson06.iOSTesting.2017.Apress.git)\n\
    \n```swift\nimport Foundation\n\nclass Photo: NSObject {\n    var imageName:String?\n\
    \    var aperture:String?\n    var shutterSpeed:String?\n    var iso:String?\n\
    \    var comments:String?\n\n    let imageNameKey = \"imageName\"\n    let apertureKey\
    \ = \"aperture\"\n    let shutterSpeedKey = \"shutterSpeed\"\n    let isoKey =\
    \ \"iso\"\n    let commentKey = \"comment\"\n\n    init?(_ dictionary:[String\
    \ : AnyObject]?) {\n        guard let dictionary = dictionary,\n            let\
    \ imageName = dictionary[imageNameKey] as? String,\n            let aperture =\
    \ dictionary[apertureKey] as? String,\n            let shutterSpeed = dictionary[shutterSpeedKey]\
    \ as? String,\n            let iso = dictionary[isoKey] as? String,\n        \
    \    let comments = dictionary[commentKey]  as? String else {\n              \
    \  return nil\n        }\n        super.init()\n        self.imageName = imageName\n\
    \        self.aperture = aperture\n        self.shutterSpeed = shutterSpeed\n\
    \        self.iso = iso\n        self.comments = comments\n    }\n}\n```\n\nListing\
    \ 6-3. `Photo.swift`"
  raw: '### Building the Collection View Cell


    Go back to the storyboard, select the collection view cell , and use the Identity
    Inspector to change the class associated with the collection view cell to CollectionViewCell.
    Switch to the Attributes Inspector and change the value of the Identity attribute
    to CollectionViewCell.


    Using the Object Library, drag and drop an image view onto the empty collection
    view cell. Use the Attributes Inspector to set the content mode of the image view
    to Aspect Fill. Position the image view and set up appropriate layout constraints
    to resemble Figure [6-15](#A432412_1_En_6_Chapter.html#Fig15).


    ![A432412_1_En_6_Fig15_HTML.jpg](A432412_1_En_6_Fig15_HTML.jpg)


