  raw: '## Binding the View Layer to the View Model


    So far in this chapter, we have used a test-driven approach to build the model
    and view model layers . The view model objects have made use of protocols to describe
    an interface to the view layer, and for the purposes of testing the view model
    objects, you have used mock objects for the view layer.


    The tests have all passed, which indicates the view model and model layers are
    working as expected, using mock view layer objects. It is now time to implement
    the view layer protocols on the actual view layer classes. Table [6-7](#A432412_1_En_6_Chapter.html#Tab7)
    lists the view layer classes and the corresponding protocols that we need to implement.


    Table 6-7.


    View Layer Protocols


    | View Layer Class | Protocol |

    | --- | --- |

    | `CollectionViewController` | `CollectionViewControllerProtocol` |

    | `CollectionViewCell` | `CollectionViewCellProtocol` |

    | `CollectionViewSectionHeader` | `CollectionViewSectionHeaderProtocol` |


    While implementing these protocols in the view layer, we are not going to use
    a test-driven approach as UI tests will be better suited to testing visual changes
    on the view layer.


    Previously in this chapter, you have implemented the methods defined in CollectionViewControllerProtocol
    in the CollectionViewController class; therefore there is no need to make any
    changes to the CollectionViewController class in this section.


    Add the following code to the end of the CollectionViewCell class to implement
    the methods of the CollectionViewCellProtocol protocol .


    ```

    extension CollectionViewCell : CollectionViewCellProtocol {

    func loadImage(resourceName:String) {

    imageView.image = UIImage(named: resourceName)

    }

    func setCaption(captionText:String) {

    captionLabel.text = captionText

    }

    func setShotDetails(shotDetailsText:String) {

    shotDetailsLabel.text = shotDetailsText

    }

    }

    ```


    Add the following code to the end of the CollectionViewSectionHeader class to
    implement the methods of the CollectionViewSectionHeaderProtocol protocol.


    ```

    extension CollectionViewSectionHeader : CollectionViewSectionHeaderProtocol {

    func setHeaderText(text:String) {

    title?.text = text

    }

    }

    ```


    Now all that is remaining is to bind the view controller classes to their respective
    view models; this will involve instantiating a view model (if one is not being
    passed in the initializer) and calling out to methods on the view model.


    The process of using a test-driven approach to binding a view controller class
    to a view model has been covered in Chapter [5](#A432412_1_En_5_Chapter.html).
    The rest of the sections in this chapter will list the bindings and present the
    final code for the view controller class.


    ### Binding the Collection View Controller Class to the View Model


    Table [6-8](#A432412_1_En_6_Chapter.html#Tab8) lists the methods in the CollectionViewController
    class along with their associated view model bindings.


    Table 6-8.


    Collection view controller and view model bindings


    | Collection View Controller Method | Collection View Model Method |

    | --- | --- |

    | `func viewDidLoad()` | `func performInitialViewSetup()` |

    | `func numberOfSections(in collectionView: UICollectionView) -> Int` | `func
    numberOfSections() -> Int` |

    | `func collectionView(_ collectionView: UICollectionView, numberOfItemsInSection
    section: Int) -> Int` | `func numberOfItemsInSection(_ section: Int) -> Int` |

    | `func collectionView(_ collectionView: UICollectionView, cellForItemAt indexPath:
    IndexPath) -> UICollectionViewCell` | `func cellViewModel(indexPath:IndexPath)
    -> CellViewModelProtocol?` |

    | `func collectionView(_ collectionView: UICollectionView, viewForSupplementaryElementOfKind
    kind: String, at indexPath: IndexPath) -> UICollectionReusableView` | `func headerViewModel(indexPath:IndexPath)
    -> HeaderViewModelProtocol?` |


    The finished CollectionViewController class is provided in Listing [6-11](#A432412_1_En_6_Chapter.html#Par224).
    If you would like to examine the code for the tests and related mock objects,
    download the finished project anonymously from github using the following URL:


    [`https://github.com/asmtechnology/Lesson06.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson06.iOSTesting.2017.Apress.git)


    ```

    import UIKit

    private let cellReuseIdentifier = "CollectionViewCell"

    private let headerReuseIdentifier = "CollectionViewSectionHeader"

    class CollectionViewController: UICollectionViewController {

    var viewModel:CollectionViewModel?

    override func viewDidLoad() {

    super.viewDidLoad()

    if self.viewModel == nil {

    self.viewModel = CollectionViewModel(view: self)

    }

    self.viewModel?.performInitialViewSetup()

    }

    override func didReceiveMemoryWarning() {

    super.didReceiveMemoryWarning()

    // Dispose of any resources that can be recreated.

    }

    // MARK: UICollectionViewDataSource

    override func numberOfSections(in collectionView: UICollectionView) -> Int {

    guard let viewModel = viewModel else {

    return 0

    }

    return viewModel.numberOfSections()

    }

    override func collectionView(_ collectionView: UICollectionView, numberOfItemsInSection
    section: Int) -> Int {

    guard let viewModel = viewModel else {

    return 0

    }

    return viewModel.numberOfItemsInSection(section)

    }

    override func collectionView(_ collectionView: UICollectionView, cellForItemAt
    indexPath: IndexPath) -> UICollectionViewCell {

    let cell = collectionView.dequeueReusableCell(withReuseIdentifier: cellReuseIdentifier,
    for: indexPath)

    guard let viewModel = viewModel,

    let collectionViewCell = cell as? CollectionViewCell,

    let cellViewModel = viewModel.cellViewModel(indexPath:indexPath) else {

    return cell

    }

    collectionViewCell.viewModel = cellViewModel

    cellViewModel.setView(collectionViewCell)

    collectionViewCell.setup()

    return collectionViewCell

    }

    override func collectionView(_ collectionView: UICollectionView, viewForSupplementaryElementOfKind
    kind: String, at indexPath: IndexPath) -> UICollectionReusableView {

    let header = collectionView.dequeueReusableSupplementaryView(ofKind: kind, withReuseIdentifier:
    headerReuseIdentifier, for: indexPath)

    guard let viewModel = viewModel,

    let sectionHeader = header as? CollectionViewSectionHeader,

    let sectionHeaderViewModel = viewModel.headerViewModel(indexPath:indexPath) else
    {

    return header

    }

    sectionHeader.viewModel = sectionHeaderViewModel

    sectionHeaderViewModel.setView(sectionHeader)

    sectionHeader.setup()

    return sectionHeader

    }

    }

    extension CollectionViewController : CollectionViewControllerProtocol {

    func setNavigationTitle(_ title:String) -> Void {

    self.title = title

    }

    func setSectionInset(top:Float, left:Float, bottom:Float, right:Float) -> Void
    {

    if let collectionView = self.collectionView,

    let collectionViewLayout = collectionView.collectionViewLayout as? UICollectionViewFlowLayout
    {

    collectionViewLayout.sectionInset = UIEdgeInsetsMake(20, 0, 20, 0)

    }

    }

    func setupCollectionViewCellToUseMaxWidth() -> Void {

    if let collectionView = self.collectionView,

    let collectionViewLayout = collectionView.collectionViewLayout as? UICollectionViewFlowLayout
    {

    collectionViewLayout.itemSize = CGSize(width: collectionView.bounds.width, height:
    collectionView.bounds.width * 0.6)

    }

    }

    }

