    The code in Listing [12-3](#A432412_1_En_12_Chapter.html#Par67) defines a BDD
    specification class called `RestaurantDirectorySpecification` that is a subclass
    of `QuickSpec` and has a number of BDD-style tests, one for each user scenario
    described in Table [12-3](#A432412_1_En_12_Chapter.html#Tab3), which we saw earlier.
    An analysis of the contents of the file is presented next.


    At the top of the file are three import statements that import the `Foundation`,
    `Quick`, and `Nimble` frameworks:


    ```

    import Foundation

    import Quick

    import Nimble

    ```


    The `RestaurantDirectorySpecification` class is declared as a subclass of `QuickSpec`
    (and not `XCTest`) as we intend to write BDD-style tests:


    ```

    class RestaurantDirectorySpecification : QuickSpec

    ```


    The class contains a number of Ivars that are used to create stubbed versions
    of the `SearchViewController` and the `RestaurantTableViewCell` classes:


    ```

    // mocks and stubs for tests around SearchViewController funcationality

    var locationPickerStub:UIPickerViewStub?

    var viewRestaurantButtonStub:UIButtonStub?

    var searchViewController:MockSearchViewController?

    var searchViewModel:SearchViewModel?

    // mocks and stubs for tests around RestaurantTableViewCell funcationality

    var restaurantNameLabelStub:UILabelStub?

    var restaurantRatingLabelStub:UILabelStub?

    var restaurantDistanceLabelStub:UILabelStub?

    var restaurantLocationLabelStub:UILabelStub?

    var restaurantCuisineLabelStub:UILabelStub?

    var restaurantTableViewCell:MockRestaurantTableViewCell?

    var validRestaurantDataFile1:String?

    var validRestaurant: Restaurant?

    var cellViewModel: RestaurantTableViewCellViewModel?

    ```


    Immediately following the instance variable declarations are a couple of methods
    that perform the necessary object instantiation and assignment into the instance
    variables. These methods are named the following:


    *   `prepareForSearchViewControllerTests()`, and

    *   `prepareForRestaurantTableViewCellTests()`


    The class has one other method called `spec()`, which is where the Quick tests
    are written. As described in Chapter [10](#A432412_1_En_10_Chapter.html), each
    BDD test is written in the following format:


    ```

    override func spec() {

    beforeEach {

    }

    describe(/* the "Given" part of a scenario statement*/) {

    context(/* the "When" part of a scenario statement*/){

    it(/* the "Then" part of a scenario statement */) {

    // test logic goes here

    }

    }

    }

    }

    ```


    The `beforeEach()` method of a Quick test case is equivalent to the `setUp()`
    method of an `XCTestCase`. After the call to the `beforeEach()` method, a number
    of BDD-style tests are written using nested calls to three functions: `describe()`,
    `context()`, `it()`.


    Let us examine each testable BDD scenario listed in Table [12-3](#A432412_1_En_12_Chapter.html#Tab3)
    and the corresponding BDD test code (scenarios 1 and 2 are not testable using
    Quick as they rely on visual inspection of the user interface).


    ### Examining the BDD Test for Scenario Number 3


    Let us examine Scenario number 3, which is the first test scenario that can be
    tested using BDD techniques:


    *   Given [the main screen of the app is loaded],

    *   When [no area has been selected],

    *   Then [the Next button is not enabled].


    The BDD-style test case to test this scenario is presented below:


    ```

    describe("the main screen of the app is loaded") {

    context("no area has been selected") {

    it("the Next button is not enabled") {

    self.prepareForSearchViewControllerTests()

    self.searchViewController!.viewDidLoad()

    expect(self.viewRestaurantButtonStub!.isEnabled).

    to(equal(false))

    }

    }

    }

    ```


    The main screen of this app is represented by an instance of the `SearchViewController`
    class, which has a picker with a list of locations, and a button that will allow
    a user to view a list of restaurants in the location selected in the picker.


    The aim of this scenario is to ensure that the button is not enabled before the
    user has selected a location in the picker.


    In order to test that the criteria defined in this scenario are met, all you need
    to do is call the `viewDidLoad` method on a `SearchViewController` instance, and
    check that the `isEnabled` property of the button is `false`.


    Instantiating the view controller within a test requires that stub objects are
    assigned to the outlets defined in the view controller. This is achieved using
    a call to `prepareForSearchViewControllerTests()` at the beginning of the test.


    ### Examining the BDD Test for Scenario Number 4


    Let us examine Scenario number 4, which is the next test scenario that can be
    tested using BDD techniques:


    *   Given [the main screen of the app is loaded],

    *   When [an area in London has been selected],

    *   Then [the Next button is enabled].


    The BDD-style test case to test this scenario is presented below:


    ```

    describe("the main screen of the app is loaded") {

    context("an area in London has been selected") {

    it("the Next button is enabled") {

    self.prepareForSearchViewControllerTests()

    self.searchViewController!.pickerView(

    self.locationPickerStub!, didSelectRow: 0,

    inComponent: 0)

    expect(self.viewRestaurantButtonStub!.isEnabled).

    to(equal(true))

    }

    }

    }

    ```


    This scenario also describes the behavior of the `SearchViewController` class.
    The aim of this scenario is to ensure that the button on the view controller is
    enabled when the user has selected a location in the picker.


    In order to test that the criteria defined in this scenario are met, all you need
    to do is call the `pickerView(picker, didSelectRow, inComponent)` method on a
    `SearchViewController` instance, and check that the `isEnabled` property of the
    button is `true`.


    ### Examining the BDD Test for Scenario Number 5


    Let us examine Scenario number 5, which is the next test scenario that can be
    tested using BDD techniques:


    *   Given [the user has selected a location],

    *   When [the Next button is tapped],

    *   Then [a new screen appears with a list of restaurants in that location].


    The BDD-style test case to test this scenario is presented below:


    ```

    describe("the user has selected a location") {

    context("the Next button is tapped") {

    it("a new screen appears with a list of restaurants in that

    location") {

    self.prepareForSearchViewControllerTests()

    self.searchViewController!.pickerView(

    self.locationPickerStub!, didSelectRow: 0,

    inComponent: 0)

    self.searchViewController!.onViewListings(self)

    expect(self.searchViewController!.displayResultsScreenCalled).

    to(equal(true))

    }

    }

    }

    ```


    This scenario describes what happens after the user taps on the View Restaurant
    Listings button in the `SearchViewController`. The expected behavior is that the
    results screen appears with a list of restaurants. The result screen is represented
    by an instance of the `RestaurantListTableViewController` class.


    Trying to confirm that the result screen has visually appeared would be a user
    interface test and will be better suited to tools used by the QA team. From a
    code perspective, we could test that tapping on the button will call a method,
    which, in turn, would have the logic to display the next screen.


    This project will be built using the MV-VM architectural pattern; therefore the
    `SearchViewController` class will have an associated view model class called `SearchViewModel`.
    The view model class will contain the presentation logic, and to support this
    logic, the view controller class will provide a method called `displayResultsScreen()`
    that the view model can call.


    In order to test that the criteria defined in this scenario are met, all you need
    to do is select a row in the picker, then call the `onViewListings()` action method,
    and check that the `displayResultsScreen()` method is called on the view controller.


    But how do you check if the `displayResultsScreen()` is called? In this project
    I will create a subclass of `SearchViewController` called `MockSearchViewController`
    that will contain a Boolean instance variable that will be set to `true` when
    the `displayResultsScreen()` method is called.

