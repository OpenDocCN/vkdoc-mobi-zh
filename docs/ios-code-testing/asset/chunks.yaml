- fmt: '### Building the `passwordUpdated` Method


    The `passwordUpdated(_ value:String?)` method of the view model is called by the
    login view controller when the user updates the contents of the password field.


    When this method is called, the view model checks to see if the text entered by
    the user represents a valid password. If it does, and the content of the user
    name text field is also valid, then the view model asks the view controller to
    enable the “Login” button.


    Add the tests in Listing [5-9](#A432412_1_En_5_Chapter.html#Par153) to the bottom
    of the `LoginViewModelTests.swift` file:


    ```

    // MARK: passwordUpdated tests

    extension LoginViewModelTests {

    func testPasswordUpdated_Calls_Validate_OnPasswordValidator() {

    let expectation = self.expectation(description: "expected validate() to be called")

    let viewModel = LoginViewModel(view:mockLoginViewController!)

    viewModel.passwordValidator = MockPasswordValidator(expectation, expectedValue:
    validPassword)

    viewModel.passwordUpdated(validPassword)

    self.waitForExpectations(timeout: 1.0, handler: nil)

    }

    func testPasswordUpdated_ValidPassword_UserNameValidated_EnablesLoginButton_OnViewController()
    {

    let expectation = self.expectation(description: "expected enableLogin(true) to
    be called")

    mockLoginViewController!.expectationForEnableLoginButton = (expectation, true)

    let viewModel = LoginViewModel(view:mockLoginViewController!)

    viewModel.userNameValidated = true

    viewModel.passwordUpdated(validPassword)

    self.waitForExpectations(timeout: 1.0, handler: nil)

    }

    func testPasswordUpdated_ValidPassword_UserNameNotValidated_DisablesLoginButton_OnViewController()
    {

    let expectation = self.expectation(description: "expected enableLogin(false) to
    be called")

