    \ 项目模板对话框\n\n在创建新项目时使用以下选项（见图 [4-3](#A432412_1_En_4_Chapter.html#Fig3)）：\n\n![A432412_1_En_4_Fig3_HTML.jpg](A432412_1_En_4_Fig3_HTML.jpg)\n\
    \n图 4-3. Xcode 项目选项对话框\n\n*   产品名称：`BankAccount`\n*   团队：无\n*   组织名称：提供一个合适的名称\n\
    *   组织标识符：提供一个合适的标识符\n*   语言：`Swift`\n*   设备：`iPhone`\n*   使用 Core Data：未选中\n\
    *   包含单元测试：已选中\n*   包含 UI 测试：未选中\n\n注意\n\n即使我们在创建此项目时使用了“单视图应用程序”模板，项目中也不会添加任何用户界面/表示代码。在第\
    \ 6 章中，您将构建一个应用程序来显示银行账户详情以及集合视图中的交易列表。第 6 章中的项目将基于本章创建的文件进行构建。\n\n将项目保存到计算机上的合适位置，然后点击“创建”。由于此项目将包含多个新类，因此最好将类文件放在项目导航器中的适当组下。\n\
