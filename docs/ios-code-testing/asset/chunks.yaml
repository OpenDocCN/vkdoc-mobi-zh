    \n**Figure 6-23.** LoginViewModel Tests are all Passing\n\n### Testing the `numberOfSections`\
    \ Method\n\nThe `numberOfSections()` method of the view model is called by the\
    \ collection view controller's `numberOfSections(in collectionView: UICollectionView)\
    \ -> Int` method. When this method is called, the view model returns the number\
    \ of City objects in the Album.\n\nAdd the following code snippet to the bottom\
    \ of the `CollectionViewModelTests.swift` file:\n\n```swift\n// MARK: numberOfSections\
    \  tests\nextension CollectionViewModelTests {\n    func testNumberOfSections_ValidViewModelWithAlbum_ReturnsNumberOfCitiesInAlbum()\
    \ {\n        let viewModel = CollectionViewModel(view:mockCollectionViewController!)\n\
    \        XCTAssertEqual(viewModel.numberOfSections(), viewModel.photoAlbum!.cities!.count)\n\
    \    }\n    func testNumberOfSections_ValidViewModelNilAlbum_ReturnsZero() {\n\
    \        let viewModel = CollectionViewModel(view:mockCollectionViewController!)\n\
    \        viewModel.photoAlbum = nil\n        XCTAssertEqual(viewModel.numberOfSections(),\
    \ 0)\n    }\n}\n```\n\nAdd the following method implementation to the `CollectionViewModel.swift`\
    \ file:\n\n```swift\nfunc numberOfSections() -> Int {\n    guard let photoAlbum\
