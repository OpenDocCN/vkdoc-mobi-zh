    评估单元测试有效性的一种方法是使用代码覆盖率报告。该报告将提供关于测试代码执行了多少行应用程序代码的信息。


    下一节将介绍 Xcode 的代码覆盖率报告工具。在查看代码覆盖率报告之前，必须确保已至少执行过一次单元测试。


    关闭 Xcode 时，代码覆盖率数据会被删除。如果在 Xcode 中重新打开项目，你需要使用 **Product** ➤ **Test** 菜单项运行所有单元测试，以便
    Xcode 生成代码覆盖率数据。


    ### 查看代码覆盖率数据


    如果你在方案设置对话框中启用了代码覆盖率报告，你将看到代码覆盖率条出现在源代码编辑器的右侧。点击项目导航器中的 `CookieFactory.swift`
    文件，观察代码覆盖率条中的数字（见图 2-23）。


    ![A432412_1_En_2_Fig23_HTML.jpg](img/A432412_1_En_2_Fig23_HTML.jpg)


    图 2-23. Xcode 代码覆盖率信息


    你会注意到，代码覆盖率条在 `CookieFactory` 类的每个方法旁边都列出了一个数字。该数字表示运行测试套件时该方法被调用的次数。


    将鼠标指针悬停在代码覆盖率条中的数字上，相关方法将以红色或绿色高亮显示。绿色高亮表示该方法已被测试至少调用一次，红色高亮表示该方法目前未被测试套件覆盖。


    代码覆盖率是一个有用的工具，可以让你了解生产代码中被测试覆盖的部分，但必须谨慎使用。许多开发团队试图通过编写无意义的测试或覆盖 iOS 框架代码的测试来实现高代码覆盖率。与其拥有大量难以维护或新团队成员难以理解的测试，不如拥有少量更有意义的测试。


    ## 摘要


    本章向你介绍了 Xcode 用户界面中与单元测试相关的部分。你还使用基本的 TDD 技术构建了一个简单的单视图应用程序，并学会了查看代码覆盖率报告。


    下一章将讨论 MVVM 架构模式，以及使用此模式构建的应用程序如何更易于测试。


    # 3. MVVM 架构模式


    本章将探讨一种常用的架构模式，即模型-视图-控制器（MVC），及其在 iOS 中的等效形式模型-视图控制器（M-VC），以及使用这种常见模式时出现的可测试性问题。接着，你将了解一种名为模型、视图、视图模型（MVVM）的新架构模式，以及这种模式在代码可重用性和可测试性方面的优势。


    为避免本章出现混淆，在讨论 iOS 版本时我将拼写出“Model-ViewController”（模型-视图控制器），在指代常见模式时则使用缩写“MVC”。


    ### MVC 架构模式


    模型-视图-控制器是当今在各种编程语言（Java、.NET、Objective-C、Swift）中使用最广泛的应用程序架构模式之一。它旨在帮助开发人员在计算机上实现用户界面，并致力于将数据的表示方式与向用户呈现的方式分离开来。图
    3-1 描绘了标准的 MVC 模式。


    ![A432412_1_En_3_Fig1_HTML.jpg](img/A432412_1_En_3_Fig1_HTML.jpg)


    图 3-1. 标准模型-视图-控制器模式


    此模式包含三个关键组件（有时也称为层）：


    - **模型**：模型组件负责处理应用程序使用的数据存储，并接受来自控制器的命令以读取或更新数据。它可以是单个类或一组相关类。

    - **视图**：视图组件从模型读取数据，并处理模型的渲染/呈现。视图可以被视为模型的视觉表示，并且可以有选择地呈现模型的某些部分。

    - **控制器**：控制器组件位于模型和视图之间，处理用户输入，更新模型，并根据需要更新视图。业务逻辑和网络代码位于一个或多个控制器中，并且控制器可以与其他控制器通信。换句话说，控制器构成了应用程序的大脑。

