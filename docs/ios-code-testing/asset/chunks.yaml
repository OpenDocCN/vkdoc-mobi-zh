    ### Updating the Photo Class


    The `Photo` class will be updated to use the `ServiceController` to download an
    image from the Internet. The current version of the `Photo` class only stores
    the name of the image resource. Prior to the update of the `Album` class, this
    was the name of an image asset in the project’s asset catalog. With the update
    of the `Album` class, this will now be the path of jpeg file on the server relative
    to the path of the `albumlist.json` file.


    The new version of the `Photo` class will contain the following changes:


    *   The code to build an absolute URL of an image on the server given the base
    URL of the `albumlist.json` file and the filename of the image.

    *   A new method called `downloadImage` that will initiate the download of an
    image using a `ServiceController` instance.

    *   A `UIImage` instance that contains the image after it has been downloaded.

    *   A reference to a listener object that is notified when the image has finished
    downloading. The listener object will be an instance of `CollectionViewCellViewModel`.

    *   Call a method on the listener object once the image has finished downloading.
    The listener will, in turn, update the Collection view cell with the downloaded
    image.'
