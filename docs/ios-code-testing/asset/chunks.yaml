    This concludes the topic of building the user interface for the app. You may be
    wondering why TDD techniques have not been applied until this point in this project.
    There are a couple of reasons for this:


    1.  We are building the user interface of the app using storyboards, and wiring
    up outlets and actions through interface builder. Xcode does not provide any convenient
    method to build this part of the application using a test-first approach.  

    2.  You could opt to build the user interface programmatically instead of using
    storyboards. However, there is very little benefit to be gained from building
    the user interface with TDD techniques.  

    3.  The UI of an app can change frequently and can easily be tested using specialized
    UI test techniques or manual testing. Using a TDD-based approach to building the
    UI is wasted effort as you will need to modify your tests with every small UI
    change made to the app.  

    4.  If you come from a “tests create living documentation for a project” mindset,
    then you will find it hard to justify how unit tests can create better documentation
    for the user interface of the app over a simple screen shot.


    ## Building the Model Layer


    There are two model classes that we need to build - LoginModel and SignupModel.
    In an app as simple as the one we are building you may be tempted to ask why do
    we need separate model classes at all? We could simply choose to use a simple
    dictionary of strings to represent the model.


    The reason to have separate model classes is to accommodate a certain minimal
    level of data validation into the model. While the validation logic itself may
    be moved to a separate specialized validator object, such validator objects will
    conceptually reside in the model layer alongside the model objects.


    ### The LoginModel Class


    The LoginModel class contains properties that store the information the user has
    entered into the fields of the login screen of the app. When a user taps the login
    button on the user interface, the view model will build a LoginModel instance
    and pass this instance to a specialized controller class that handles login-specific
    logic. The specialized login controller class may perhaps connect to back-end
    services and log in using the credentials provided.


    Using a dedicated model object to store the values entered by the user in the
    fields of the login screen decouples the logic in the login controller from the
    user interface. Table [5-3](#A432412_1_En_5_Chapter.html#Tab3) lists the desired
    properties and methods of the LoginModel class.


    Table 5-3.


    LoginModel Properties and Methods


    | Item | Type | Description |

    | --- | --- | --- |

    | `var userName:String` | Variable | Should be between 2 and 10 characters in
    length, with no white space. Underscores are allowed. Special characters are not
    permitted. |

    | `var password:String` | Variable | Should be between 6 and 10 characters in
    length, with no white space. Must have at least one uppercase letter, one lowercase
    letter, and one number. |

    | `init?(userName:String, password:String)` | Method | Allows other code to create
    LoginModel instances. |


    The approach to developing the LoginModel class will be very similar to the model
    layer classes that were developed in Chapter [4](#A432412_1_En_4_Chapter.html).
    You will need to create tests that test verify the behavior of the initializer
    and any validator objects.


    The complete LoginModel class is shown in Listing [5-3](#A432412_1_En_5_Chapter.html#Par62).
