- fmt: "### Clone a Git Repository from Xcode Server\n\nIf you have an existing repository\
    \ on Xcode Server that you would like to clone on your development Mac, launch\
    \ Xcode on your development Mac and select the `Xcode` ➤ `Preferences` menu item.\n\
    \nSwitch to the `Accounts` tab, and click on the `Add(+)` button at the bottom\
    \ of the list of `Accounts/Repositories/Servers` and select “Add Repository…”\
    \ from the list of options.\n\nYou will be presented with a dialog box where you\
    \ need to provide details on the new repository (see Figure [9-25](#A432412_1_En_9_Chapter.html#Fig25)).\n\
    \n![A432412_1_En_9_Fig25_HTML.jpg](A432412_1_En_9_Fig25_HTML.jpg)\n\nFigure 9-25.\
    \ Cloning a Repository From Xcode Server\n\nIn the “Address” field, type the URL\
    \ of the repository within Xcode Server. The URL will begin with either `https`\
    \ or `ssh` depending on the security protocol you wish to use. The URL can be\
    \ obtained from the repository settings within Xcode Server.\n\nFor example the\
    \ following URL represents a repository called “TestGitRepositoryHostedOnXcodeServer”\
    \ hosted within Xcode Server running on the Mac called “Abhisheks-MacBook,” accessed\
    \ via HTTPS.\n\n`https://Abhisheks-MacBook.local/git/TestGitRepositoryHostedOnXcodeServer.git`\n\
    \nSpecify “Git” in the repository type combo box, and set authentication to “User\
    \ Name and Password.” Type the credentials required to access this repository\
    \ and click on `Add`.\n\nYour repository will now appear in the list of repositories\
    \ in the accounts dialog box (see Figure [9-26](#A432412_1_En_9_Chapter.html#Fig26)).\
    \ You have now successfully added a bookmark to the Git repository in Xcode.\n\
    \n![A432412_1_En_9_Fig26_HTML.jpg](A432412_1_En_9_Fig26_HTML.jpg)\n\nFigure 9-26.\
    \ Remote Repository Listed in the Xcode Accounts Dialog Box\n\nTo check out the\
    \ repository on your development Mac, close the accounts dialog box, and use the\
    \ `Source Control` ➤ `Check Out` menu item. Select the repository from the list\
    \ of available repository names and click on `Next`. Specify a location on your\
    \ hard disk where you would like to save the repository clone and click `Download`.\n\
    \n### Cloning a Git Repository from GitHub\n\nIf you have an existing repository\
    \ hosted on GitHub/BitBucket that you would like to clone on your development\
    \ Mac, launch Xcode on your development Mac and select the `Xcode` ➤ `Preferences`\
    \ menu item.\n\nSwitch to the `Accounts` tab, and click on the `Add(+)` button\
    \ at the bottom of the list of `Accounts/Repositories/Servers` and select “Add\
    \ Repository…” from the list of options.\n\nIn the “Address” field, type the URL\
    \ of the remote repository. Specify “Git” in the repository type combo box, and\
    \ set authentication to “User Name and Password”. Type the credentials required\
    \ to access this repository and click on `Add`. The repository will now appear\
    \ in the list of repositories in the accounts dialog box.\n\nTo check out the\
    \ repository on your development Mac, close the accounts dialog box, and use the\
    \ `Source Control` ➤ `Check Out` menu item. Select the repository from the list\
    \ of available repository names and click on `Next`. Specify a location on your\
    \ hard disk where you would like to save the repository clone and click `Download`.\n\
    \n## Creating and Integrating Bots\n\nA Bot is a server-side process (one which\
    \ executes on Xcode Server) that performs integrations on the current version\
    \ of your project. A single run of a bot is called an Integration and consists\
    \ of pulling the latest version of your project’s code from a repository, building\
    \ the project, running tests, creating the build artifact (`.ipa` file), and archiving\
    \ the build artifact.\n\nYou can configure a bot to perform integrations on-demand,\
    \ or based on a schedule, or each time some code is pushed to the repository.\
    \ The ability to create a bot that can perform an integration when any member\
    \ of your development team pushes code to the repository make bots (and Xcode\
    \ Server) a valuable tool in any continuous integration pipeline.\n\nIn addition\
    \ to scheduled and on-demand integrations, a bot will also integrate automatically\
    \ whenever you update the installed version of Xcode. These integrations run immediately,\
    \ prior to running any normally scheduled integrations. You can compare these\
    \ integrations with previous integrations to identify issues that may have been\
    \ encountered as a result of the upgrade.\n\n> **Note**  \n> The screenshots in\
    \ this section of the chapter are based on checking out an existing project from\
    \ an existing repository from GitHub. You will need to use your own project hosted\
    \ in your own repository to follow these steps."
  raw: '### Clone a Git Repository from Xcode Server


    If you have an existing repository on Xcode Server that you would like to clone
    on your development Mac, launch Xcode on your development Mac and select the Xcode
    ➤ Preferences menu item.


    Switch to the Accounts tab, and click on the Add(+) button at the bottom of the
    list of Accounts/Repositories/Servers and select “Add Repository…” from the list
    of options.


    You will be presented with a dialog box where you need to provide details on the
    new repository (see Figure [9-25](#A432412_1_En_9_Chapter.html#Fig25)).


    ![A432412_1_En_9_Fig25_HTML.jpg](A432412_1_En_9_Fig25_HTML.jpg)


    Figure 9-25.


    Cloning a Repository From Xcode Server


    In the “Address” field, type the URL of the repository within Xcode Server. The
    URL will begin with either https or ssh depending on the security protocol you
    wish to use. The URL can be obtained from the repository settings within Xcode
    Server.


    For example the following URL represents a repository called “TestGitRepositoryHostedOnXcodeServer
    ” hosted within Xcode Server running on the Mac called “Abhisheks-MacBook,” accessed
    via HTTPS .


    [`https://Abhisheks-MacBook.local/git/TestGitRepositoryHostedOnXcodeServer.git`](https://Abhisheks-MacBook.local/git/TestGitRepositoryHostedOnXcodeServer.git)


    Specify “Git” in the repository type combo box, and set authentication to “User
    Name and Password.” Type the credentials required to access this repository and
    click on Add.


    Your repository will now appear in the list of repositories in the accounts dialog
    box (see Figure [9-26](#A432412_1_En_9_Chapter.html#Fig26)). You have now successfully
    added a bookmark to the Git repository in Xcode.


    ![A432412_1_En_9_Fig26_HTML.jpg](A432412_1_En_9_Fig26_HTML.jpg)


    Figure 9-26.


    Remote Repository Listed in the Xcode Accounts Dialog Box


    To check out the repository on your development Mac, close the accounts dialog
    box, and use the Source Control ➤ Check Out menu item. Select the repository from
    the list of available repository names and click on Next. Specify a location on
    your hard disk where you would like to save the repository clone and click Download.


    ### Cloning a Git Repository from GitHub


    If you have an existing repository hosted on GitHub/BitBucket that you would like
    to clone on your development Mac, launch Xcode on your development Mac and select
    the Xcode ➤ Preferences menu item .


    Switch to the Accounts tab, and click on the Add(+) button at the bottom of the
    list of Accounts/Repositories/Servers and select “Add Repository…” from the list
    of options.


    In the “Address” field, type the URL of the remote repository, Specify “Git” in
    the repository type combo box, and set authentication to “User Name and Password”.
    Type the credentials required to access this repository and click on Add. The
    repository will now appear in the list of repositories in the accounts dialog
    box.


    To check out the repository on your development Mac, close the accounts dialog
    box, and use the Source Control ➤ Check Out menu item. Select the repository from
    the list of available repository names and click on Next. Specify a location on
    your hard disk where you would like to save the repository clone and click Download
    .


    ## Creating and Integrating Bots


    A Bot is a server-side process (one which executes on Xcode Server) that performs
    integrations on the current version of your project. A single run of a bot is
    called an Integration and consists of pulling the latest version of your project’s
    code from a repository, building the project, running tests, creating the build
    artifact (.ipa file), and archiving the build artifact.


    You can configure a bot to perform integrations on-demand, or based on a schedule,
    or each time some code is pushed to the repository. The ability to create a bot
    that can perform an integration when any member of your development team pushes
    code to the repository make bots (and Xcode Server) a valuable tool in any continuous
    integration pipeline.


    In addition to scheduled and on-demand integrations, a bot will also integrate
    automatically whenever you update the installed version of Xcode. These integrations
    run immediately, prior to running any normally scheduled integrations. You can
    compare these integrations with previous integrations to identify issues that
    may have been encountered as a result of the upgrade.


    Note


    The screenshots in this section of the chapter are based on checking out an existing
    project from an existing repository from GitHub. You will need to use your own
    project hosted in your own repository to follow these steps.'
  trans: "\n### 从 Xcode Server 克隆 Git 仓库\n\n如果你在 Xcode Server 上有一个现有仓库，并希望将其克隆到你的开发用\
    \ Mac 上，请在此 Mac 上启动 Xcode，然后选择 **“Xcode”** ➤ **“偏好设置”** 菜单项。\n\n切换到 **“账户”** 标签，点击\
    \ **“账户/仓库/服务器”** 列表底部的 **“添加 (+)”** 按钮，然后从选项列表中选择 **“添加仓库…”**。\n\n系统将弹出一个对话框，让你提供新仓库的详细信息（见图\
    \ 9-25）。\n\n![A432412_1_En_9_Fig25_HTML.jpg](img/A432412_1_En_9_Fig25_HTML.jpg)\n\
    \n图 9-25. 从 Xcode Server 克隆仓库\n\n在 **“地址”** 字段中，输入 Xcode Server 上仓库的 URL。该 URL\
    \ 以 `https` 或 `ssh` 开头，具体取决于你希望使用的安全协议。该 URL 可以从 Xcode Server 内的仓库设置中获取。\n\n例如，以下\
    \ URL 表示一个名为 **“TestGitRepositoryHostedOnXcodeServer”** 的仓库，它托管在名为 **“Abhisheks-MacBook”**\
    \ 的 Mac 上运行的 Xcode Server 中，并通过 HTTPS 访问。\n\n`https://Abhisheks-MacBook.local/git/TestGitRepositoryHostedOnXcodeServer.git`\n\
    \n在仓库类型组合框中指定 **“Git”**，并将身份验证设置为 **“用户名和密码”**。输入访问该仓库所需的凭据，然后点击 **“添加”**。\n\n\
    你的仓库现在将出现在账户对话框的仓库列表中（见图 9-26）。至此，你已成功在 Xcode 中为 Git 仓库添加了一个书签。\n\n![A432412_1_En_9_Fig26_HTML.jpg](img/A432412_1_En_9_Fig26_HTML.jpg)\n\
    \n图 9-26. Xcode 账户对话框中列出的远程仓库\n\n要在你的开发用 Mac 上签出仓库，请关闭账户对话框，然后使用 **“源代码控制”** ➤\
    \ **“签出”** 菜单项。从可用的仓库名称列表中选择该仓库，然后点击 **“下一步”**。在硬盘上指定一个位置来保存仓库克隆，然后点击 **“下载”**。\n\
    \n### 从 GitHub 克隆 Git 仓库\n\n如果你在 GitHub/BitBucket 上托管了一个现有仓库，并希望将其克隆到你的开发用 Mac\
    \ 上，请在此 Mac 上启动 Xcode，然后选择 **“Xcode”** ➤ **“偏好设置”** 菜单项。\n\n切换到 **“账户”** 标签，点击\
    \ **“账户/仓库/服务器”** 列表底部的 **“添加 (+)”** 按钮，然后从选项列表中选择 **“添加仓库…”**。\n\n在 **“地址”**\
    \ 字段中，输入远程仓库的 URL。在仓库类型组合框中指定 **“Git”**，并将身份验证设置为 **“用户名和密码”**。输入访问该仓库所需的凭据，然后点击\
    \ **“添加”**。该仓库现在将出现在账户对话框的仓库列表中。\n\n要在你的开发用 Mac 上签出仓库，请关闭账户对话框，然后使用 **“源代码控制”**\
    \ ➤ **“签出”** 菜单项。从可用的仓库名称列表中选择该仓库，然后点击 **“下一步”**。在硬盘上指定一个位置来保存仓库克隆，然后点击 **“下载”**。\n\
    \n## 创建与集成 Bot\n\nBot 是一种在服务器端运行的进程（在 Xcode Server 上执行），用于对项目的当前版本执行集成。Bot 的单次运行称为一次集成，包括从仓库拉取项目代码的最新版本、构建项目、运行测试、创建构建产物（`.ipa`\
    \ 文件）以及归档构建产物。\n\n你可以将 bot 配置为按需执行集成、按计划执行集成，或在代码每次被推送到仓库时执行集成。创建能够在开发团队成员推送代码时自动执行集成的\
    \ bot，使得 bot（以及 Xcode Server）在任何持续集成流水线中都成为一项宝贵的工具。\n\n除了按计划集成和按需集成之外，当你更新已安装的\
    \ Xcode 版本时，bot 也会自动执行集成。这些集成会在任何常规计划集成之前立即运行。你可以将这些集成与之前的集成进行比较，以识别可能因升级而遇到的问题。\n\
    \n> **注**  \n> 本章本节中的截图基于从 GitHub 上的现有仓库签出现有项目。你需要使用自己仓库中托管的项目来执行这些步骤。\n"
- fmt: "### Create a Bot\n\nTo create a bot on `Xcode Server` for a project, your\
    \ project’s code must be committed to a repository, and the repository must be\
    \ added to `Xcode` or `Xcode Server` using one of the techniques listed earlier\
    \ in this chapter.\n\nIn addition to having your project in a repository, you\
    \ will also need to share the project’s build scheme. A build scheme collates\
    \ information about specific build configurations and targets. A shared scheme\
    \ is one that is published to the repository, thus making it visible to `Xcode\
    \ Server`.\n\nWhen you create a new `iOS` project, `Xcode` creates a default scheme\
    \ that performs the following actions:\n\n- `Analyze`: Perform static code analysis.\n\
    - `Test`: Run unit and/or UI tests.\n- `Archive`: Create an `.ipa` executable\
    \ file.\n\n> **Note**  \n> The archive action in the debug scheme is set up by\
    \ default to archive a release build. Creating a release build requires that appropriate\
    \ provisioning profiles and certificates are setup in the project. You will also\
    \ need to make sure these profiles and certificates are installed on the build\
    \ Mac.\n\nThe default build scheme is, however, not shared. To share a build scheme,\
    \ open the project that contains the build scheme in `Xcode` and use the `Product\
    \ ➤ Scheme ➤ Manage Schemes` menu item. This will present a list of all build\
    \ schemes defined for the project (see Figure [9-27](#A432412_1_En_9_Chapter.html#Fig27)).\n\
    \n![A432412_1_En_9_Fig27_HTML.jpg](A432412_1_En_9_Fig27_HTML.jpg)  \n*Figure 9-27.\
    \ Xcode Schemes*\n\nSelect the shared check box for the schemes you want to share,\
    \ commit the changes, and push the commit (if you are using a `Git` repository).\n\
    \nAfter sharing the scheme, you can create a bot using the `Product ➤ Create Bot`\
    \ menu item. Type in a name that helps you identify the bot, select an instance\
    \ of `Xcode Server` (Figure [9-28](#A432412_1_En_9_Chapter.html#Fig28)), and click\
    \ **Next**.\n\n![A432412_1_En_9_Fig28_HTML.jpg](A432412_1_En_9_Fig28_HTML.jpg)\
    \  \n*Figure 9-28. Creating a New Bot*\n\nYou will be asked to log in to the `Xcode\
    \ Server` instance using credentials provided by your server administrator. Each\
    \ bot stores its own set of credentials securely in the keychain.\n\nNext, select\
    \ the branch in your repository that you wish to create a bot for (see Figure\
    \ [9-29](#A432412_1_En_9_Chapter.html#Fig29)). The branch that is currently checked\
    \ out will be selected by default. Select the appropriate branch and click on\
    \ **Next**.\n\n![A432412_1_En_9_Fig29_HTML.jpg](A432412_1_En_9_Fig29_HTML.jpg)\
    \  \n*Figure 9-29. Configuring Source Control for a Bot*\n\nYou will now be presented\
    \ with the first of five configuration pages (see Figure [9-30](#A432412_1_En_9_Chapter.html#Fig30)).\
    \ In the first configuration page, you specify the scheme, and build actions you\
    \ wish to perform. Available choices for actions are `Analyze`, `Test`, and `Archive`.\n\
    \n![A432412_1_En_9_Fig30_HTML.jpg](A432412_1_En_9_Fig30_HTML.jpg)  \n*Figure 9-30.\
    \ Configuring Build Configuration for a Bot*\n\nIf you would like to perform a\
    \ clean build, select the appropriate option under the `Cleaning` drop-down. Available\
    \ options are:\n\n- `Always`\n- `Once a day`\n- `Once a week`\n- `Never`\n\nA\
    \ clean build involves a cleanup operation prior to the building operation. During\
    \ the cleanup operation, temporary build files left over from previous builds\
    \ are deleted.\n\nIf you would like to override the build configuration defined\
    \ in the scheme, you can use the options in the `Configuration` drop-down. Available\
    \ options are these:\n\n- `Use Scheme Setting`\n- `Debug`\n- `Release`\n\nWhen\
    \ you have finished setting up the options on this page, click on **Next** to\
    \ go to the second configuration page (see Figure [9-31](#A432412_1_En_9_Chapter.html#Fig31)).\n\
    \n![A432412_1_En_9_Fig31_HTML.jpg](A432412_1_En_9_Fig31_HTML.jpg)  \n*Figure 9-31.\
    \ Configuring an Integration Schedule*\n\nOn this page, you configure the integration\
    \ schedule for the bot. You can create three types of schedules:\n\n- `Periodic`:\
    \ `Xcode Server` will integrate the bot as per a specific recurring schedule.\n\
    - `On commit`: `Xcode Server` will integrate the bot after each commit/push by\
    \ any team member.\n- `Manual`: The bot will only be integrated when you request\
    \ it manually.\n\nIn addition to the specified schedule, if you would also like\
    \ to have `Xcode Server` integrate the bot whenever `Xcode` is upgraded on the\
    \ build Mac, ensure the “`Automatically integrate when Xcode is upgraded`” check\
    \ box is selected.\n\nWhen you have finished setting up the options on this page,\
    \ click on **Next** to go to the third configuration page (see Figure [9-32](#A432412_1_En_9_Chapter.html#Fig32)).\n\
    \n![A432412_1_En_9_Fig32_HTML.jpg](A432412_1_En_9_Fig32_HTML.jpg)  \n*Figure 9-32.\
    \ Configuring Test Devices*\n\nOn this page, you configure the devices (or simulators)\
    \ on which the test build action should be executed. You will only be presented\
    \ with this page if you opted to enable the test action while creating the bot.\
    \ Available options are the following:\n\n- `All iOS Devices and Simulators`\n\
    - `All iOS Devices`\n- `All iOS Simulators`\n- `Specific iOS Devices`\n\n> **Note**\
    \  \n> When you select a simulator, you must ensure the simulator is also installed\
    \ on the build Mac.\n\nWhen you have finished setting up the options on this page,\
    \ click on **Next** to go to the fourth configuration page (see Figure [9-33](#A432412_1_En_9_Chapter.html#Fig33)).\n\
    \n![A432412_1_En_9_Fig33_HTML.jpg](A432412_1_En_9_Fig33_HTML.jpg)  \n*Figure 9-33.\
    \ Configuring Environment Variables*\n\nOn this page, you can provide a dictionary\
    \ of environment variables that can be used by pre-integration and post-integration\
    \ scripts. The scripts themselves, however, are defined in the next step.\n\n\
    Each environment variable consists of a key and a value. Both the key and the\
    \ value are strings. To add an environment variable, use the `Add (+)` button.\n\
    \nWhen you have finished setting up environment variables on this page, click\
    \ on **Next** to go to the fifth configuration page (see Figure [9-34](#A432412_1_En_9_Chapter.html#Fig34)).\n\
    \n![A432412_1_En_9_Fig34_HTML.jpg](A432412_1_En_9_Fig34_HTML.jpg)  \n*Figure 9-34.\
    \ Configuring Triggers*\n\nOn this page you can provide custom triggers for the\
    \ bot. To create a trigger, click on the `Add (+)` button.\n\nA trigger is an\
    \ optional action that can be performed by a bot. By default no triggers are defined.\
    \ You can define three types of triggers:\n\n- **Pre-Integration script**: A bash\
    \ shell script that is executed before the bot is integrated (see Figure [9-35](#A432412_1_En_9_Chapter.html#Fig35)).\
    \ The most common task that some developers like to perform at this step is to\
    \ remove any files from the project that they do not wish to ship with the app.\
    \ Examples could be files with customer data, or files used to create client-side\
    \ web service stubs. Any user-defined environment variables (defined in the previous\
    \ step), as well as standard `Xcode` environment variables are accessible by the\
    \ pre-integration script.\n\n![A432412_1_En_9_Fig35_HTML.jpg](A432412_1_En_9_Fig35_HTML.jpg)\
    \  \n*Figure 9-35. Configuring a Pre-Integration Script*\n\n- **Post-Integration\
    \ script**: A bash shell script that is executed after the application has been\
    \ built successfully (see Figure [9-36](#A432412_1_En_9_Chapter.html#Fig36)).\
    \ The most common tasks performed by developers at this step include submitting\
    \ the app to a security audit service, or submitting the app to a third-party\
    \ build repository. Any user-defined environment variables (defined in the previous\
    \ step), as well as standard `Xcode` environment variables are accessible by the\
    \ post-integration script. The post-integration script may be configured to run\
    \ conditionally on success, test failures, build errors, build warnings, or static\
    \ analysis warnings.\n\n![A432412_1_En_9_Fig36_HTML.jpg](A432412_1_En_9_Fig36_HTML.jpg)\
    \  \n*Figure 9-36. Configuring a Post-Integration Script*"
  raw: '### Create a Bot


    To create a bot on Xcode Server for a project, your project’s code must be committed
    to a repository, and the repository must be added to Xcode or Xcode Server using
    one of the techniques listed earlier in this chapter.


    In addition to having your project in a repository, you will also need to share
    the project’s build scheme. A build scheme collates information about specific
    build configurations and targets. A shared scheme is one that is published to
    the repository, thus making it visible to Xcode Server.


    When you create a new iOS project, Xcode creates a default scheme that performs
    the following actions:


    *   Analyze:Perform static code analysis.

    *   Test: Run unit and/or UI tests.

    *   Archive: Create a .ipa executable file.


    Note


    The archive action in the debug scheme is set up by default to archive a release
    build. Creating a release build requires that appropriate provisioning profiles
    and certificates are setup in the project. You will also need to make sure these
    profiles and certificates are installed on the build Mac.


    The default build scheme is, however, not shared. To share a build scheme, open
    the project that contains the build scheme in Xcode and use the Product ➤ Scheme
    ➤ Manage Schemes menu item. This will present a list of all build schemes defined
    for the project (see Figure [9-27](#A432412_1_En_9_Chapter.html#Fig27)).


    ![A432412_1_En_9_Fig27_HTML.jpg](A432412_1_En_9_Fig27_HTML.jpg)


    Figure 9-27.


    Xcode Schemes


    Select the shared check box for the schemes you want to share, commit the changes,
    and push the commit (if you are using a Git repository .)


    After sharing the scheme, you can create a bot using the Product ➤ Create Bot
    menu item. Type in a name that helps you identify the bot, select an instance
    of Xcode server (Figure [9-28](#A432412_1_En_9_Chapter.html#Fig28)), and click
    Next.


    ![A432412_1_En_9_Fig28_HTML.jpg](A432412_1_En_9_Fig28_HTML.jpg)


    Figure 9-28.


    Creating a New Bot


    You will be asked to log in to the Xcode server instance using credentials provided
    by your server administrator. Each bot stores its own set of credentials securely
    in the keychain


    Next, select the branch in your repository that you wish to create a bot for (see
    Figure [9-29](#A432412_1_En_9_Chapter.html#Fig29)). The branch that is currently
    checked out will be selected by default. Select the appropriate branch and click
    on Next .


    ![A432412_1_En_9_Fig29_HTML.jpg](A432412_1_En_9_Fig29_HTML.jpg)


    Figure 9-29.


    Configuring Source Control for a Bot


    You will now be presented with the first of five configuration pages (see Figure
    [9-30](#A432412_1_En_9_Chapter.html#Fig30)). In the first configuration page,
    you specify the scheme, and build actions you wish to perform. Available choices
    for actions are Analyze, Test, and Archive.


    ![A432412_1_En_9_Fig30_HTML.jpg](A432412_1_En_9_Fig30_HTML.jpg)


    Figure 9-30.


    Configuring Build Configuration for a Bot


    If you would like to perform a clean build, select the appropriate option under
    the Cleaning drop-down. Available options are:


    *   Always

    *   Once a day

    *   Once a week

    *   Never


    A clean build involves a cleanup operation prior to the building operation. During
    the cleanup operation, temporary build files left over from previous builds are
    deleted.


    If you would like to override the build configuration defined in the scheme, you
    can use the options in the Configuration drop-down. Available options are these:


    *   Use Scheme Setting

    *   Debug

    *   Release


    When you have finished setting up the options on this page, click on next to go
    to the second configuration page (see Figure [9-31](#A432412_1_En_9_Chapter.html#Fig31)).


    ![A432412_1_En_9_Fig31_HTML.jpg](A432412_1_En_9_Fig31_HTML.jpg)


    Figure 9-31.


    Configuring an Integration Schedule


    On this page, you configure the integration schedule for the bot. You can create
    three types of schedules:


    *   Periodic: Xcode Server will integrate the bot as per a specific recurring
    schedule.

    *   On commit: Xcode Server will integrate the bot after each commit/push by any
    team member.

    *   Manual: The bot will only be integrated when you request it manually.


    In addition to the specified schedule, if you would also like to have Xcode Server
    integrate the bot whenever Xcode is upgraded on the build Mac, ensure the “Automatically
    integrate when Xcode is upgraded” check box is selected.


    When you have finished setting up the options on this page, click on next to go
    to the third configuration page (see Figure [9-32](#A432412_1_En_9_Chapter.html#Fig32)).


    ![A432412_1_En_9_Fig32_HTML.jpg](A432412_1_En_9_Fig32_HTML.jpg)


    Figure 9-32.


    Configuring Test Devices


    On this page, you configure the devices (or simulators) on which the test build
    action should be executed. You will only be presented with this page if you opted
    to enable the test action while creating the bot. Available options are the following:


    *   All iOS Devices and Simulators

    *   All iOS Devices

    *   All iOS Simulators

    *   Specific iOS Devices


    Note


    When you select a simulator, you must ensure the simulator is also installed on
    the build Mac.


    When you have finished setting up the options on this page, click on next to go
    to the fourth configuration page (see Figure [9-33](#A432412_1_En_9_Chapter.html#Fig33)).


    ![A432412_1_En_9_Fig33_HTML.jpg](A432412_1_En_9_Fig33_HTML.jpg)


    Figure 9-33.


    Configuring Environment Variables


    On this page, you can provide a dictionary of environment variables that can be
    used by pre-integration and post-integration scripts. The scripts themselves,
    however, are defined in the next step.


    Each environment variable consists of a key and a value. Both the key and the
    value are strings. To add an environment variable, use the Add(+) button .


    When you have finished setting up environment variables on this page, click on
    next to go to the fifth configuration page (see Figure [9-34](#A432412_1_En_9_Chapter.html#Fig34)).


    ![A432412_1_En_9_Fig34_HTML.jpg](A432412_1_En_9_Fig34_HTML.jpg)


    Figure 9-34.


    Configuring Triggers


    On this page you can provide custom triggers for the bot. To create a trigger,
    click on the Add(+) button.


    A trigger is an optional action that can be performed by a bot. By default no
    triggers are defined. You can define three types of triggers:


    Pre-Integraton script: A bash shell script that is executed before the bot is
    integrated (see Figure [9-35](#A432412_1_En_9_Chapter.html#Fig35)). The most common
    task that some developers like to perform at this step is to remove any files
    from the project that they do not wish to ship with the app. Examples could be
    files with customer data, or files used to create client-side web service stubs.
    Any user-defined environment variables (defined in the previous step), as well
    as standard Xcode environment variables are accessible by the pre-integration
    script.


    ![A432412_1_En_9_Fig35_HTML.jpg](A432412_1_En_9_Fig35_HTML.jpg)


    Figure 9-35.


    Configuring a Pre-Integration Script


    Post-Integration script: A bash shell script that is executed after the application
    has been built successfully (see Figure [9-36](#A432412_1_En_9_Chapter.html#Fig36)).
    The most common tasks performed by developers at this step include submitting
    the app to a security audit service, or submitting the app to a third-party build
    repository. Any user-defined environment variables (defined in the previous step),
    as well as standard Xcode environment variables are accessible by the post-integration
    script. The post-integration script may be configured to run conditionally on
    success, test failures, build errors, build warnings, or static analysis warnings.


    ![A432412_1_En_9_Fig36_HTML.jpg](A432412_1_En_9_Fig36_HTML.jpg)


    Figure 9-36.


    Configuring a Post-Integration Script'
  trans: "\n### 创建 Bot\n\n要在 `Xcode Server` 上为项目创建一个 bot，项目的代码必须先提交到仓库，并且必须使用本章前面列举的技术之一将该仓库添加到\
    \ `Xcode` 或 `Xcode Server` 中。\n\n除了将项目保存在仓库中外，您还需要共享项目的构建方案。构建方案汇集了有关特定构建配置和目标的信息。共享方案是发布到仓库的方案，从而使它对\
    \ `Xcode Server` 可见。\n\n当您创建新的 `iOS` 项目时，`Xcode` 会创建一个默认方案，该方案执行以下操作：\n\n- `Analyze`：执行静态代码分析。\n\
    - `Test`：运行单元测试和/或 UI 测试。\n- `Archive`：创建一个 `.ipa` 可执行文件。\n\n> **注意**  \n> 调试方案中的归档操作默认设置为归档一个发布版本。创建发布版本需要在项目中设置适当的配置文件（provisioning\
    \ profiles）和证书。您还需要确保这些配置文件和证书已安装在构建 Mac 上。\n\n然而，默认的构建方案并未共享。要共享构建方案，请在 `Xcode`\
    \ 中打开包含该构建方案的项目，并使用 `Product ➤ Scheme ➤ Manage Schemes` 菜单项。这将显示为项目定义的所有构建方案的列表（见图\
    \ 9-27）。\n\n![A432412_1_En_9_Fig27_HTML.jpg](img/A432412_1_En_9_Fig27_HTML.jpg)\
    \  \n*图 9-27. Xcode 方案*\n\n为您想要共享的方案选中共享复选框，提交更改，并推送提交（如果您使用的是 `Git` 仓库）。\n\n\
    共享方案后，您可以使用 `Product ➤ Create Bot` 菜单项创建一个 bot。输入一个有助于您识别该 bot 的名称，选择一个 `Xcode\
    \ Server` 实例（图 9-28），然后点击**下一步**。\n\n![A432412_1_En_9_Fig28_HTML.jpg](img/A432412_1_En_9_Fig28_HTML.jpg)\
    \  \n*图 9-28. 创建新 Bot*\n\n系统会要求您使用服务器管理员提供的凭据登录到 `Xcode Server` 实例。每个 bot 都会将其自己的凭据安全地存储在钥匙串中。\n\
    \n接下来，选择您希望为其创建 bot 的仓库分支（见图 9-29）。当前检出的分支将被默认选中。选择合适的分支并点击**下一步**。\n\n![A432412_1_En_9_Fig29_HTML.jpg](img/A432412_1_En_9_Fig29_HTML.jpg)\
    \  \n*图 9-29. 为 Bot 配置源代码管理*\n\n现在您将看到五个配置页面中的第一个（见图 9-30）。在第一个配置页面中，您可以指定方案以及希望执行的构建操作。可用的操作选项包括\
    \ `Analyze`、`Test` 和 `Archive`。\n\n![A432412_1_En_9_Fig30_HTML.jpg](img/A432412_1_En_9_Fig30_HTML.jpg)\
    \  \n*图 9-30. 为 Bot 配置构建配置*\n\n如果您希望执行干净构建，请在 `Cleaning` 下拉菜单中选择相应的选项。可用选项包括：\n\
    \n- `Always`（总是）\n- `Once a day`（每天一次）\n- `Once a week`（每周一次）\n- `Never`（从不）\n\
    \n干净构建涉及在构建操作之前执行清理操作。在清理操作期间，将删除之前构建遗留的临时构建文件。\n\n如果您希望覆盖方案中定义的构建配置，可以使用 `Configuration`\
    \ 下拉菜单中的选项。可用选项如下：\n\n- `Use Scheme Setting`（使用方案设置）\n- `Debug`\n- `Release`\n\
    \n当您完成此页面上的选项设置后，点击**下一步**进入第二个配置页面（见图 9-31）。\n\n![A432412_1_En_9_Fig31_HTML.jpg](img/A432412_1_En_9_Fig31_HTML.jpg)\
    \  \n*图 9-31. 配置集成计划*\n\n在此页面上，您可以为 bot 配置集成计划。您可以创建三种类型的计划：\n\n- `Periodic`（定期）：`Xcode\
    \ Server` 将按照特定的重复计划集成 bot。\n- `On commit`（提交时）：`Xcode Server` 将在任何团队成员每次提交/推送后集成\
    \ bot。\n- `Manual`（手动）：仅当您手动请求时才集成 bot。\n\n除了指定的计划外，如果您还希望每当构建 Mac 上的 `Xcode`\
    \ 升级时 `Xcode Server` 能自动集成该 bot，请确保选中“`Automatically integrate when Xcode is upgraded`”（`Xcode\
    \ 升级时自动集成`）复选框。\n\n当您完成此页面上的选项设置后，点击**下一步**进入第三个配置页面（见图 9-32）。\n\n![A432412_1_En_9_Fig32_HTML.jpg](img/A432412_1_En_9_Fig32_HTML.jpg)\
    \  \n*图 9-32. 配置测试设备*\n\n在此页面上，您可以配置应在哪些设备（或模拟器）上执行测试构建操作。只有当您在创建 bot 时选择启用测试操作，才会显示此页面。可用选项如下：\n\
    \n- `All iOS Devices and Simulators`（所有 iOS 设备和模拟器）\n- `All iOS Devices`（所有 iOS\
    \ 设备）\n- `All iOS Simulators`（所有 iOS 模拟器）\n- `Specific iOS Devices`（特定 iOS 设备）\n\
    \n> **注意**  \n> 当您选择模拟器时，必须确保该模拟器也已安装在构建 Mac 上。\n\n当您完成此页面上的选项设置后，点击**下一步**进入第四个配置页面（见图\
    \ 9-33）。\n\n![A432412_1_En_9_Fig33_HTML.jpg](img/A432412_1_En_9_Fig33_HTML.jpg)\
    \  \n*图 9-33. 配置环境变量*\n\n在此页面上，您可以提供一个环境变量字典，供预集成和后集成脚本使用。然而，脚本本身将在下一步中定义。\n\n\
    每个环境变量由一个键（key）和一个值（value）组成。键和值都是字符串。要添加环境变量，请使用 `Add (+)` 按钮。\n\n当您完成此页面上的环境变量设置后，点击**下一步**进入第五个配置页面（见图\
    \ 9-34）。\n\n![A432412_1_En_9_Fig34_HTML.jpg](img/A432412_1_En_9_Fig34_HTML.jpg)\
    \  \n*图 9-34. 配置触发器*\n\n在此页面上，您可以为 bot 提供自定义触发器。要创建触发器，请点击 `Add (+)` 按钮。\n\n触发器是\
    \ bot 可以执行的可选操作。默认情况下，未定义任何触发器。您可以定义三种类型的触发器：\n\n- **Pre-Integration script**（预集成脚本）：在\
    \ bot 集成之前执行的 bash shell 脚本（见图 9-35）。一些开发者喜欢在此步骤执行的最常见任务是从项目中移除任何他们不希望随应用一起发布的文件。例如，包含客户数据的文件，或用于创建客户端\
    \ Web 服务存根的文件。任何用户自定义的环境变量（在上一步中定义）以及标准的 `Xcode` 环境变量都可以被预集成脚本访问。\n\n![A432412_1_En_9_Fig35_HTML.jpg](img/A432412_1_En_9_Fig35_HTML.jpg)\
    \  \n*图 9-35. 配置预集成脚本*\n\n- **Post-Integration script**（后集成脚本）：在应用成功构建后执行的 bash\
    \ shell 脚本（见图 9-36）。开发者在此步骤执行的最常见任务包括将应用提交给安全审计服务，或将应用提交给第三方构建仓库。任何用户自定义的环境变量（在上一步中定义）以及标准的\
    \ `Xcode` 环境变量都可以被后集成脚本访问。后集成脚本可以配置为根据成功、测试失败、构建错误、构建警告或静态分析警告等条件来有条件地运行。\n\n\
    ![A432412_1_En_9_Fig36_HTML.jpg](img/A432412_1_En_9_Fig36_HTML.jpg)  \n*图 9-36.\
    \ 配置后集成脚本*\n"
