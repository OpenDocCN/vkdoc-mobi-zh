- fmt: '# 8. Working with Legacy Code


    If you have been developing iOS applications for a few years, chances are that
    you have been brought on to add new features to an existing app with a large code
    base that has been built over a few years and has been worked on by dozens of
    developers, most of whom have moved on to other projects.


    There is little to no documentation, and there are either no unit tests at all,
    or just a handful of obsolete tests, some of which fail when run. This is an unfortunate
    reality on many projects in the industry. In some cases the developers involved
    may not have known of the benefits of testing, or what to test. In other cases
    there isn’t sufficient buy-in from the business to invest into TDD or BDD techniques,
    and so developers only write tests when they have the time.


    It is often not possible to spend months refactoring years of legacy code, and
    the best you can do as a new member of the team is to cover any new code you write
    with an appropriate level of tests.


    This chapter will examine a few techniques that you can use to add new code to
    a large legacy code base, and, at the same time, write meaningful tests for the
    new code. It is not possible to cover every possible refactoring technique in
    a single chapter. There are entire books dedicated to the topic of refactoring.
    An excellent book on refactoring techniques (though not specific to iOS) is Working
    Effectively With Legacy Code by Michael C. Feathers. [¹](#A432412_1_En_8_Chapter.html#Sec99)


    ## Splitting a Large Class


    In many situations, the class in which you wish to make changes is already very
    large. The reason it may have become so large is probably that no one took the
    effort to refactor the class, and at some point it became so large that nobody
    quite knew where to begin.


    When faced with this problem, an approach that you can apply is to split the class
    into smaller classes based on assigning a single responsibility to each of the
    fragment classes. This is also known as the single responsibility principle: it
    basically means that any given class should perform a discrete and well-defined
    function, and rely on other classes for other functions.


    As an example, consider a large view controller class that makes a network request
    to download a JSON document from the Internet, parse the document, and update
    a few UI elements on the screen. Listing [8-1](#A432412_1_En_8_Chapter.html#Par8)
    presents the code for a class called `LargeViewController.swift`.


    ```swift

    import UIKit

    class LargeViewController: UIViewController {

    @IBOutlet weak var userNameLabel: UILabel!

    @IBOutlet weak var emailAddressLabel: UILabel!

    private var session:URLSession?

    private var dataTask:URLSessionDataTask?

    override func viewDidLoad() {

    super.viewDidLoad()

    downloadUserProfile()

    }

    override func didReceiveMemoryWarning() {

    super.didReceiveMemoryWarning()

    // Dispose of any resources that can be recreated.

    }

    func downloadUserProfile() {

    self.session = URLSession(configuration: URLSessionConfiguration.default)

    guard let session = self.session,

    let url = URL(string: "http://someservice.com/getuser/") else {

    return

    }

    dataTask = session.dataTask(with: url,

    completionHandler: { (data, response, error) in

    if let _ = error {

    DispatchQueue.main.async {

    let alertController = UIAlertController(title: "Error",

    message: "Unable to download user profile",

    preferredStyle: .alert)

    let defaultAction = UIAlertAction(title: "OK",

    style: .default, handler: nil)

    alertController.addAction(defaultAction)

    self.present(alertController, animated: true, completion: nil)

    }

    return

    }

    if let response = response as? HTTPURLResponse,

    let data = data {

    if response.statusCode != 200 {

    DispatchQueue.main.async {

    let alertController = UIAlertController(title: "Error",

    message: "Unable to download user profile",

    preferredStyle: .alert)

    let defaultAction = UIAlertAction(title: "OK",

    style: .default, handler: nil)

    alertController.addAction(defaultAction)

    self.present(alertController, animated: true, completion: nil)

    }

    }

    guard let dictionary =

    try? JSONSerialization.jsonObject(with: data,

    options: JSONSerialization.ReadingOptions.mutableContainers)

    as? [String : AnyObject] else {

    DispatchQueue.main.async {

    let alertController = UIAlertController(title: "Error",

    message: "Unable to download user profile",

    preferredStyle: .alert)

    let defaultAction = UIAlertAction(title: "OK",

    style: .default, handler: nil)

    alertController.addAction(defaultAction)

    self.present(alertController,

    animated: true, completion: nil)

    }

    return

    }

    if let userName = dictionary?["username"] as? String,

    let emailAddress = dictionary?["emailAddress"] as? String {

    DispatchQueue.main.async {

    self.userNameLabel.text = userName

    self.emailAddressLabel.text = emailAddress

    }

    }

    }

    return

    })

    dataTask?.resume()

    }

    }

    ```


    The fundamental problem with this class is that it is doing too much. Its responsibilities
    currently include the following:


    - Handling view lifecycle events.

    - Making network requests.

    - Handling network errors.

    - Parsing data.

    - Updating the user interface.


    In order to split this class into smaller classes, you need to decide where to
    make the split, and how many smaller classes to create. You could base these decisions
    on the current responsibilities of the class.'
