- fmt: "### Negative Test\n\nA negative unit test is one that verifies something did\
    \ not happen. This can be useful in some cases. However, one must never solely\
    \ rely on negative tests. This is because while a negative test can verify that\
    \ something did not happen, it is immune to any number of things that did happen.\
    \ The code base could change considerably without having a single negative test\
    \ fail. If all your unit tests were negative tests, then your tests collectively\
    \ are providing limited value.\n\nNegative unit tests in Swift are almost always\
    \ state verification tests. Although it is possible to create negative unit tests\
    \ that are interaction tests, the relevant setup required is quite complicated\
    \ and often outweighs the value of writing the negative test.\n\nAs an example\
    \ of a negative unit test in action, consider the following Swift class that could\
    \ be used to represent a bank account:\n\n```\nenum AccountType {\n    case currentAccount\n\
    \    case savingsAccount\n}\n\nclass BankAccount {\n    var accountName: String\n\
    \    var accountNumber: String\n    var accountType: AccountType\n    private\
    \ var transactions: [Transaction]\n\n    init(accountName: String,\n         accountNumber:\
    \ String,\n         accountType: AccountType) {\n        self.accountName = accountName\n\
    \        self.accountNumber = accountNumber\n        self.accountType = accountType\n\
    \        self.transactions = [Transaction]()\n    }\n\n    func addTransaction(_\
    \ transaction: Transaction) {\n        transactions.append(transaction)\n    }\n\
    \n    func accountBalance() -> Float {\n        var balance: Float = 0\n     \
    \   for transaction in self.transactions {\n            if transaction.isCredit\
    \ {\n                balance = balance + transaction.amount\n            } else\
    \ {\n                balance = balance + transaction.amount\n            }\n \
    \       }\n        return balance\n    }\n}\n```\n\nIndividual transactions within\
    \ a `BankAccount` object are represented using `Transaction` objects. The definition\
    \ of a simple `Transaction` class is presented next:\n\n```\nclass Transaction\
    \ {\n    var description: String\n    var amount: Float\n    var isCredit: Bool\n\
    \n    init(description: String,\n         amount: Float,\n         isCredit: Bool)\
    \ {\n        self.description = description\n        self.amount = amount\n  \
    \      self.isCredit = isCredit\n    }\n}\n```\n\nWith these two classes in mind,\
    \ a negative unit test could be used to verify that a call to the `addTransaction()`\
    \ method of the `BankAccount` class does not change the account name. This test\
    \ could be written as follows:\n\n```\nfunc testAddTransaction_DoesNotChangeAccountName()\
    \ {\n    let bankAccount = BankAccount(accountName: \"John Smith\",\n        \
    \                          accountNumber: \"14918\",\n                       \
    \           accountType: .savingsAccount)\n    let transaction = Transaction(description:\
    \ \"Salary\",\n                                  amount: 100.0,\n            \
    \                      isCredit: true)\n    bankAccount.addTransaction(transaction)\n\
    \    XCTAssertTrue(bankAccount.accountName.compare(\"John Smith\") == .orderedSame,\n\
    \                  \"Call to addTransaction should have no effect on account name.\"\
    )\n}\n```\n\nAssertions haven’t been covered yet, but they will be shortly. This\
    \ test ensures that the value of the `accountName` variable of the `BankAccount`\
    \ instance does not change when `addTransaction` is called.\n\n### Test Suite\n\
    \nA test suite is simply a collection of test case files. Test suites usually\
    \ have their own group in the Xcode project explorer and are included in a separate\
    \ build target from the rest of the application’s code (Figure 1-1).\n\n![A432412_1_En_1_Fig1_HTML.jpg](A432412_1_En_1_Fig1_HTML.jpg)\n\
    \n**Figure 1-1.** Separate Folder Groups for Test Suites in Xcode\n\nA single\
    \ Xcode project can have multiple test suites, for example, one test suite may\
    \ contain unit tests, and another may contain interaction tests. In the next lesson,\
    \ you will learn to configure Xcode build schemes to include specific test suites\
    \ as part of the build process.\n\n### Assertions\n\nAssertions are the bread\
    \ and butter of both state verification and interaction tests. An assertion represents\
    \ a failure of a unit test. Typically, your unit test will call a method on an\
    \ object, and this method may perform a number of activities such as returning\
    \ a value, changing some values in the object, or calling out to other methods.\n\
    \nIf you know the expected result of the method you are calling, you can build\
    \ a unit test that calls the method with known inputs and expects a specific result.\
    \ If the result of calling the method does not match the expected value, the test\
    \ will indicate failure by firing an assertion.\n\nThe standard unit-testing framework\
    \ that ships with Xcode is called `XCTest` and contains several macros to help\
    \ create assertions within a unit test. Table 1-1 lists some of these macros.\n\
    \n**Table 1-1.** XCTest Assertion Macros\n\n| Macro | Description |\n| --- | ---\
    \ |\n| `XCTAssert(expression, message)` | Generates a failure if the `expression`\
    \ evaluates to `false`. An optional string `message` may be provided to indicate\
    \ the reason for failure. |\n| `XCTAssertEqualObjects(expression1, expression2,\
