- fmt: '### Adding The Restaurant Data File to the Project


    Create a new group called `TestData` under the `RestaurantDirectoryTests` group
    in the Project Navigator, and add the `ValidRestaurantDataFile1.json` file included
    with this lesson’s downloads into the project. While adding this file, ensure
    the “Copy Items if Needed” option is checked in the import dialog box and that
    the file is only included in the test target (Figure [12-16](#A432412_1_En_12_Chapter.html#Fig16)).


    ![A432412_1_En_12_Fig16_HTML.jpg](A432412_1_En_12_Fig16_HTML.jpg)


    Figure 12-16. Xcode File Import Dialog


    ### Examining the Remaining Compilation Errors


    If you switch to the `RestaurantDirectorySpecification.swift` file, you will notice
    that several compilation error messages that were previously visible have disappeared;
    however, there are still 10 errors remaining (Figure [12-17](#A432412_1_En_12_Chapter.html#Fig17)).


    ![A432412_1_En_12_Fig17_HTML.jpg](A432412_1_En_12_Fig17_HTML.jpg)


    Figure 12-17. `RestaurantDirectorySpecification.Swift` Compilation Errors


    The reason for these errors is that there are still quite a few classes that are
    being referenced in these BDD tests but do not yet exist:


    - `SearchViewModel`

    - `Restaurant`

    - `RestaurantTableViewCellViewModel`

    - `MockSearchViewController`

    - `MockRestaurantTableViewCell`


    These classes will be created as we build the code for the app using the MV-VM
    application architecture.


    You may have noticed that the BDD tests themselves do not impose any particular
    application architecture. For instance, there is nothing in these tests that suggest
    how the model layer should be built, whether there should be validator objects,
    where you should use view models, etc.


    This is because BDD tests operate at a higher level of abstraction. To help define
    the architecture of your code, you will need to revert to TDD techniques in the
    same project.


    At the start of a project that uses both BDD and TDD techniques, you will write
    a set of BDD tests using Quick, which may not initially compile, and if they do,
    will not pass.


    You will then move on to develop your application’s code using TDD techniques,
    while at the same time keeping an eye on the BDD tests. If initially your BDD
    tests were not compiling, you will need to temporarily comment out the portions
    of the test code that do not compile so that you can focus on building your application’s
    code.


    Periodically, you will need to uncomment the BDD tests and execute the BDD tests.
    Doing so frequently will ensure that the code you are writing using TDD techniques
    is moving toward satisfying the requirements provided by the business. In time,
    as more of your application’s code is built along with their associated unit tests,
    your BDD tests will begin to pass as well.


    The rest of this chapter will describe the characteristics of the model, view
    model, and view controller layers of the application, and then we will build these
    using standard TDD techniques that have been covered in earlier chapters.


    ## Building the Model Layer


    There is only one model class that we need to build – `Restaurant`. The `Restaurant`
    class contains properties that store the information for a single restaurant.
    Table [12-6](#A432412_1_En_12_Chapter.html#Tab6) lists the desired properties
    and methods of the `Photo` class.


    Table 12-6. Properties and Methods of the `Photo` Class


    | Item | Type | Description |

    | --- | --- | --- |

    | `var area:String?` | Variable | The location in London where the restaurant
    is based. |

    | `var rating:String?` | Variable | A number between 0 and 5, which represented
    the average rating received by the restaurant. |

    | `var cuisine:String?` | Variable | The cuisine served at the restaurant. |

    | `var distance:String?` | Variable | The distance between the restaurant and
    the nearest tube station. |

    | `var tubeStation:String?` | Variable | The name of the nearest London underground
    station. |

    | `var restaurantName:String?` | Variable | The name of the restaurant. |

    | `init?(_ dictionary:[String : AnyObject]?)` | Method | Allows other code to
    create `Restaurant` instances. Requires a dictionary with certain mandatory keys
    as input. |


    The `init()` method will require a dictionary with all of the following mandatory
    keys to be present:


    - `restaurantName`

    - `rating`

    - `cuisine`

    - `area`

    - `distance`

    - `tubeStation`


    The complete `Restaurant` class is shown in Listing [12-9](#A432412_1_En_12_Chapter.html#Par178).
    If you would like to examine the code for the validator objects and associated
    tests, download the finished project anonymously from github using the following
    URL:


    [`https://github.com/asmtechnology/Lesson12.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson12.iOSTesting.2017.Apress.git)


    ```

    import Foundation

    class Restaurant : NSObject {

    var area:String?

    var rating:String?

    var cuisine:String?

    var distance:String?

    var tubeStation:String?

    var restaurantName:String?

    var restaurantNameValidator:RestaurantNameValidator?

    var tubeStationValidator:TubeStationValidator?

    var cuisineValidator:CuisineValidator?

    var ratingValidator:RatingValidator?

    let areaKey = "area"

    let ratingKey = "rating"

    let cuisineKey = "cuisine"

    let distanceKey = "distance"

    let tubeStationKey = "tubeStation"

    let restaurantNameKey = "restaurantName"

    init?(_ dictionary:[String : AnyObject]?) {

    guard let dictionary = dictionary,

    let area = dictionary[areaKey] as? String,

    let rating = dictionary[ratingKey] as? String,

    let cuisine = dictionary[cuisineKey] as? String,

    let distance = dictionary[distanceKey] as? String,

    let tubeStation = dictionary[tubeStationKey] as? String,

    let restaurantName = dictionary[restaurantNameKey]  as? String else {

    return nil

    }

    super.init()

    let restaurantNameValidator = self.restaurantNameValidator ?? RestaurantNameValidator()

    if restaurantNameValidator.validate(restaurantName) == false {

    return nil

    }

    let tubeStationValidator = self.tubeStationValidator ?? TubeStationValidator()

    if tubeStationValidator.validate(tubeStation) == false {

    return nil

    }

    let cuisineValidator = self.cuisineValidator ?? CuisineValidator()

    if cuisineValidator.validate(cuisine) == false {

    return nil

    }

    let ratingValidator = self.ratingValidator ?? RatingValidator()

    if ratingValidator.validate(rating) == false {

    return nil

    }

    self.area = area

    self.rating = rating

    self.cuisine = cuisine

    self.distance = distance

    self.tubeStation = tubeStation

    self.restaurantName = restaurantName

    }

    }

    Listing 12-9. Restaurant.swift

    ```


    ## Building the ViewModel Layer


    There are three view model classes that we need to build - `SearchViewModel`,
    `RestaurantTableViewModel`, and `RestaurantTableViewCellViewModel`. These correspond
    to the `SearchViewController`, `RestaurantTableViewController`, and `RestaurantTableViewCell`
    classes respectively.


    The view models will use protocols to establish an interface through which they
    can communicate with their respective view controllers.'
