    ## Building the Model Layer


    There are three model classes that we need to build – Photo, City, and Album.
    The relationship between these classes is depicted in Figure [6-20](#A432412_1_En_6_Chapter.html#Fig20).
    The Album object is the top-level model object. An Album object contains an array
    of City objects, and each City object contains an array of Photo objects. Photo
    objects store metadata for individual photos along with the name of a resource
    in the project’s asset catalog from where the actual image can be loaded.


    ![A432412_1_En_6_Fig20_HTML.jpg](A432412_1_En_6_Fig20_HTML.jpg)


    Figure 6-20.


    Model Layer Classes


    ### The Photo Class


    The Photo class contains properties that store the information for a single photo.
    Table [6-2](#A432412_1_En_6_Chapter.html#Tab2) lists the desired properties and
    methods of the Photo class.


    Table 6-2.


    Photo Properties and Methods


    | Item | Type | Description |

    | --- | --- | --- |

    | `var imageName:String?` | Variable | The name of the resource in the project’s
    asset catalog that contains the image. |

    | `var aperture:String?` | Variable | Aperture setting used by the photographer.
    |

    | `var shutterSpeed:String?` | Variable | Shutter speed setting used by the photographer.
    |

    | `var iso:String?` | Variable | ISO setting used by the photographer. |

    | `var comments:String?` | Variable | Photographer’s comments. |

    | `init?(_ dictionary:[String : AnyObject]?)` | Method | Allows other code to
    create Photo instances. Requires a dictionary with certain mandatory keys as input.
    |


    The init method will require a dictionary with all of the following mandatory
    keys to be present:


    *   imageName

    *   aperture

    *   shutterSpeed

    *   iso

    *   comment


    The approach to developing the Photo class will be very similar to the model layer
    classes that were developed in Chapter [4](#A432412_1_En_4_Chapter.html). The
    tests will be around the behavior of the init method and how it handles missing
    keys in the dictionary.


    The complete Photo class is shown in Listing [6-3](#A432412_1_En_6_Chapter.html#Par89).
    If you would like to examine the code for the tests, download the finished project
    anonymously from github using the following URL:


    [`https://github.com/asmtechnology/Lesson06.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson06.iOSTesting.2017.Apress.git)


    ```

    import Foundation

    class Photo: NSObject {

    var imageName:String?

    var aperture:String?

    var shutterSpeed:String?

    var iso:String?

    var comments:String?

    let imageNameKey = "imageName"

    let apertureKey = "aperture"

    let shutterSpeedKey = "shutterSpeed"

    let isoKey = "iso"

    let commentKey = "comment"

    init?(_ dictionary:[String : AnyObject]?) {

    guard let dictionary = dictionary,

    let imageName = dictionary[imageNameKey] as? String,

    let aperture = dictionary[apertureKey] as? String,

    let shutterSpeed = dictionary[shutterSpeedKey] as? String,

    let iso = dictionary[isoKey] as? String,

    let comments = dictionary[commentKey]  as? String else {

    return nil

    }

    super.init()

    self.imageName = imageName

    self.aperture = aperture

    self.shutterSpeed = shutterSpeed

    self.iso = iso

    self.comments = comments

    }

    }

    Listing 6-3.

    Photo.swift

