    \ = expectation\n        let viewModel = CollectionViewModel(view:mockCollectionViewController!)\n\
    \        viewModel.performInitialViewSetup()\n        self.waitForExpectations(timeout:\
    \ 1.0, handler: nil)\n    }\n}\n```\n\nThis code snippet adds three new test cases,\
    \ one for each task that must be performed by `performInitialViewSetup()`. Since\
    \ all three test cases test parts of a single method, I have grouped them into\
    \ in a class extension; however you can add all four test methods to the class\
    \ definition instead of a separate extension.\n\nTo get this code to compile,\
    \ you will need to make a few code changes to the project:\n\nAdd a few variable\
    \ declarations and method implementations to the `MockCollectionViewController.swift`\
    \ file:\n\n```swift\nvar expectationForSetNavigationTitle:XCTestExpectation?\n\
    var expectationForSetSectionInset:XCTestExpectation?\nvar expectationForSetupCollectionViewCellToUseMaxWidth:XCTestExpectation?\n\
    func setNavigationTitle(_ title:String) -> Void {\n    expectationForSetNavigationTitle?.fulfill()\n\
    }\nfunc setSectionInset(top:Float, left:Float, bottom:Float, right:Float) -> Void\
    \ {\n    expectationForSetSectionInset?.fulfill()\n}\nfunc setupCollectionViewCellToUseMaxWidth()\
    \ -> Void {\n    expectationForSetupCollectionViewCellToUseMaxWidth?.fulfill()\n\
    }\n```\n\nAdd the following method implementation to the `CollectionViewModel.swift`\
    \ file:\n\n```swift\nfunc performInitialViewSetup() {\n    view?.setNavigationTitle(\"\
    Photo Album\")\n    view?.setSectionInset(top: 20, left: 0, bottom: 0, right:\
    \ 0)\n    view?.setupCollectionViewCellToUseMaxWidth()\n}\n```\n\nAdd the following\
    \ method definitions to the `CollectionViewControllerProtocol.swift` file:\n\n\
    ```swift\nfunc setNavigationTitle(_ title:String) -> Void\nfunc setSectionInset(top:Float,\
    \ left:Float, bottom:Float, right:Float) -> Void\nfunc setupCollectionViewCellToUseMaxWidth()\
    \ -> Void\n```\n\nAdd the following method implementations to the `CollectionViewController.swift`\
    \ file in a class extension:\n\n```swift\nextension CollectionViewController :\
    \ CollectionViewControllerProtocol {\n    func setNavigationTitle(_ title:String)\
    \ -> Void {\n        self.title = title\n    }\n    func setSectionInset(top:Float,\
    \ left:Float, bottom:Float, right:Float) -> Void {\n        if let collectionView\
    \ = self.collectionView,\n            let collectionViewLayout = collectionView.collectionViewLayout\
    \ as? UICollectionViewFlowLayout {\n            collectionViewLayout.sectionInset\
    \ = UIEdgeInsetsMake(20, 0, 20, 0)\n        }\n    }\n    func setupCollectionViewCellToUseMaxWidth()\
