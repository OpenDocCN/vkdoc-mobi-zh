- fmt: '### The `City` Class


    The `City` class contains properties that store the information on a city and
    the photos that were taken in that city. Table [6-3](#A432412_1_En_6_Chapter.html#Tab3)
    lists the desired properties and methods of the `City` class.


    **Table 6-3.** City Properties and Methods


    | Item | Type | Description |

    | --- | --- | --- |

    | `var cityName:String?` | Variable | The name of a city. No validation is applied
    to this field. |

    | `var photos:[Photo]?` | Variable | Array of `Photo` objects. Each of these photos
    was taken in the same city. |

    | `init?(_ dictionary:[String : AnyObject]?)` | Method | Allows other code to
    create `City` instances. Requires a dictionary with certain mandatory keys as
    input. |


    The `init` method will require a dictionary with all of the following mandatory
    keys to be present:


    - `city`

    - `photos`


    The complete `City` class is presented in Listing [6-4](#A432412_1_En_6_Chapter.html#Par96).
    If you would like to examine the code for the tests, download the finished project
    anonymously from GitHub using the following URL:


    [`https://github.com/asmtechnology/Lesson06.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson06.iOSTesting.2017.Apress.git)


    ```

    import Foundation

    class City: NSObject {

    var cityName:String?

    var photos:[Photo]?

    let cityKey = "city"

    let photosKey = "photos"

    init?(_ dictionary:[String:AnyObject]?) {

    guard let dictionary = dictionary,

    let cityName = dictionary[cityKey] as? String,

    let array = dictionary[photosKey] as? [AnyObject] else {

    return nil

    }

    super.init()

    self.cityName = cityName

    self.photos = [Photo]()

    for item in array {

    guard let dictionary = item as? [String : AnyObject] else {

    continue

    }

    if let photo = Photo(dictionary) {

    photos?.append(photo)

    }

    }

    }

    }

    ```


    **Listing 6-4.** `City.swift`


    ### The `Album` Class


    The `Album` class contains properties that store the information on a collection
    of city instances. The album is the top-level model object for this project. Table
    [6-4](#A432412_1_En_6_Chapter.html#Tab4) lists the desired properties and methods
    of the `Album` class.


    **Table 6-4.** City Properties and Methods


    | Item | Type | Description |

    | --- | --- | --- |

    | `var cities:[City]?` | Variable | Array of `City` objects. |

    | `init()` | Method | Allows other code to create `Album` instances. |

    | `func load(filePath:String?) -> Void` | Method | Used to load a plist file and
    recursively create model layer objects. |


    The `load` method is provided to allow your app to load the `Albums.plist` file
    and create `City` objects from the contents of the plist file.


    The complete `Album` class is presented in Listing [6-5](#A432412_1_En_6_Chapter.html#Par101).
    If you would like to examine the code for the tests, download the finished project
    anonymously from GitHub using the following URL:


    [`https://github.com/asmtechnology/Lesson06.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson06.iOSTesting.2017.Apress.git)


    ```

    import Foundation

    class Album: NSObject {

    var cities:[City]?

    override init() {

    super.init()

    if cities == nil {

    cities = [City]()

    }

    }

    func load(filePath:String?) -> Void {

    guard let filePath = filePath,

    let array = NSArray(contentsOfFile: filePath) as? [AnyObject] else {

    return

    }

    for item in array {

    guard let dictionary = item as? [String : AnyObject] else {

    continue

    }

    if let city = City(dictionary) {

    cities?.append(city)

    }

    }

    }

    }

    ```


