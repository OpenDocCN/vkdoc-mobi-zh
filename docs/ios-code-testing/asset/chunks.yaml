- fmt: '### Adding Quick to an Xcode Project Using Git Submodules


    Adding the `Quick` and `Nimble` repositories as submodules of your Xcode project’s
    repository does not require you to install any additional tools beforehand.


    Launch Xcode and create a new iOS project based on the Single View Application
    template. Use the following options while creating the new project (see Figure
    [11-16](#A432412_1_En_11_Chapter.html#Fig16)):


    ![A432412_1_En_11_Fig16_HTML.jpg](A432412_1_En_11_Fig16_HTML.jpg)


    **Figure 11-16.** Xcode Project Options Dialog


    - Product Name: `TryQuickWithSubmodules`

    - Team: None

    - Organization Name: Provide a suitable name

    - Organization Identifier: Provide a suitable identifier

    - Language: `Swift`

    - Devices: iPhone

    - Use Core Data: Unchecked

    - Include Unit Tests: Checked

    - Include UI Tests: Unchecked


    In the Project location dialog box, select an empty folder and ensure you have
    checked the **Create Git repository** option (Figure [11-17](#A432412_1_En_11_Chapter.html#Fig17)).


    ![A432412_1_En_11_Fig17_HTML.jpg](A432412_1_En_11_Fig17_HTML.jpg)


    **Figure 11-17.** Xcode Project Location Dialog Box


    Once the project is created, quit Xcode and go back to the Terminal window and
    navigate to the folder on your Mac where you have created the new Xcode project.


    Type the following command into the Terminal window and press Enter to add the
    `Quick` Git repository as a submodule of your project’s Git repository:


    ```

    $ git submodule add https://github.com/Quick/Quick.git Vendor/Quick

    ```


    The output in your Terminal window should resemble the following:


    ```

    Cloning into ''/Users/abhishekmishra/Desktop/TryQuickWithSubmodules/Vendor/Quick''...

    remote: Counting objects: 6736, done.

    remote: Compressing objects: 100% (71/71), done.

    remote: Total 6736 (delta 23), reused 0 (delta 0), pack-reused 6664

    Receiving objects: 100% (6736/6736), 1.93 MiB | 1.74 MiB/s, done.

    Resolving deltas: 100% (4026/4026), done.

    ```


    Type the following command into the Terminal window and press Enter to add the
    `Nimble` Git repository as a submodule of your project’s Git repository:


    ```

    $ git submodule add https://github.com/Quick/Nimble.git Vendor/Nimble

    ```


    The output in your Terminal window should resemble the following:


    ```

    Cloning into ''/Users/abhishekmishra/Desktop/TryQuickWithSubmodules/Vendor/Nimble''...

    remote: Counting objects: 6782, done.

    remote: Total 6782 (delta 0), reused 0 (delta 0), pack-reused 6782

    Receiving objects: 100% (6782/6782), 1.39 MiB | 1.03 MiB/s, done.

    Resolving deltas: 100% (4575/4575), done.

    ```


    You will now create a new Xcode workspace, and include your Xcode project into
    this workspace along with Xcode projects for the `Quick` and `Nimble` submodules
    that you have just cloned.


    Open your project in Xcode and use the **File ➤ New ➤ Workspace** menu item to
    create a new Xcode workspace. Name the workspace `TryQuickWithSubmodules.xcworkspace`
    and save it in the same directory as your Xcode project (Figure [11-18](#A432412_1_En_11_Chapter.html#Fig18)).


    ![A432412_1_En_11_Fig18_HTML.jpg](A432412_1_En_11_Fig18_HTML.jpg)


    **Figure 11-18.** Saving the Workspace to the Same Directory as the Xcode Project


    Xcode will create an empty workspace for you. Close the `TryQuickWithSubmodules`
    Xcode project window (not the empty workspace) if it is open, and use the **File
    ➤ Add Files to “TryQuickWithSubmodules”…** menu item (Figure [11-19](#A432412_1_En_11_Chapter.html#Fig19)).


    ![A432412_1_En_11_Fig19_HTML.jpg](A432412_1_En_11_Fig19_HTML.jpg)


    **Figure 11-19.** Adding a Project to a Workspace


    Navigate to the `TryQuickWithSubmodules.xcodeproj` file to add the Xcode project
    to the workspace (Figure [11-20](#A432412_1_En_11_Chapter.html#Fig20)).


    ![A432412_1_En_11_Fig20_HTML.jpg](A432412_1_En_11_Fig20_HTML.jpg)


    **Figure 11-20.** Locating the Xcode Project That Will be Added to the Workspace


    You will see a new node appear in the Project Navigator that contains the entire
    `TryQuickWithSubmodules` project under the workspace (Figure [11-21](#A432412_1_En_11_Chapter.html#Fig21)).


    ![A432412_1_En_11_Fig21_HTML.jpg](A432412_1_En_11_Fig21_HTML.jpg)


    **Figure 11-21.** `TryQuickWithSubmodules` Project in the Xcode Workspace


    Drag and drop the `Quick.xcodeproj` file onto the Project Navigator. The `Quick.xcodeproj`
    file will be located in the `Vendor/Quick` subdirectory of your project’s directory
    in Finder. While dropping the `.xcodeproj` file onto the Project Navigator, make
    sure to drop it above the `TryQuickWithSubmodules` node so as to make the new
    node a sibling node and not a child node (Figure [11-22](#A432412_1_En_11_Chapter.html#Fig22)).


    ![A432412_1_En_11_Fig22_HTML.jpg](A432412_1_En_11_Fig22_HTML.jpg)


    **Figure 11-22.** Using Drag-and-Drop Operations to Add the Quick Xcode Project
    to the Workspace


    Using drag-and-drop operations, add the `Nimble.xcodeproj` file into the Project
    Navigator. Make sure to drop it above the `TryQuickWithSubmodules` node so as
    to make the new node a sibling node and not a child node. The Project Navigator
    should now contain nodes for each project in the workspace (Figure [11-23](#A432412_1_En_11_Chapter.html#Fig23)).


    ![A432412_1_En_11_Fig23_HTML.jpg](A432412_1_En_11_Fig23_HTML.jpg)


    **Figure 11-23.** Xcode Project Navigator Showing the Workspace with Three Projects


    Open the Project settings page for the `TryQuickWithSubmodules` project, select
    the test target, and add the `Quick.framework` and `Nimble.framework` files to
    the **Link Binaries with Libraries** list (Figure [11-24](#A432412_1_En_11_Chapter.html#Fig24)).


    ![A432412_1_En_11_Fig24_HTML.jpg](A432412_1_En_11_Fig24_HTML.jpg)


    **Figure 11-24.** Adding the Quick and Nimble Framework Files to the Test Target


    At this point you have added `Quick` and `Nimble` to your Xcode project using
    Git submodules, and your project should be able to build and run on the iOS Simulator
    without any issues.


    ## Summary


    In this chapter you have learned three different ways by which you can add the
    `Quick` and `Nimble` frameworks to an Xcode project. You have learned to use two
    popular dependency management frameworks – CocoaPods and Carthage. You have also
    learned to include the `Quick` and `Nimble` frameworks using Git submodules.


    # 12. Applying TDD and BDD Techniques


    In the previous chapter you learned how to add `Quick` and `Nimble` to an Xcode
    project. In this chapter you will build an app using a combination of TDD and
    BDD techniques.


    You will build a simple app that lets users browse restaurant listings in London.
    Users will be able to select from a list of locations within London, and the app
    will present a list of restaurants in the selected locations. The app will have
    the data for all the restaurants included within the app bundle and will not need
    to make calls to a web service to fetch this data.'
