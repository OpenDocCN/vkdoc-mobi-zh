    \ optional string `message` may be provided to indicate the reason for failure.\
    \ |\n\nThe following code snippet lists a unit test that will fail using the `XCTAssertTrue`\
    \ macro. Figure 1-2 is a snapshot of the Xcode test navigator showing a failed\
    \ test.\n\n![A432412_1_En_1_Fig2_HTML.jpg](A432412_1_En_1_Fig2_HTML.jpg)\n\n**Figure\
    \ 1-2.** Failed Unit Test\n\n```\nfunc testNumber1IsGreaterThanNumber2() {\n \
    \   let number1 = 9218\n    let number2 = 673666\n    XCTAssertTrue(number1 >\
    \ number2,\n                  \"number1 should be greater than number2\")\n}\n\
    ```\n\nThis test fails because the test expects `number1` to be greater than `number2`.\
    \ Fixing it is a simple matter of editing the value of `number1` to be greater\
    \ than `number2`:\n\n```\nfunc testNumber1IsGreaterThanNumber2() {\n    let number1\
    \ = 921800\n    let number2 = 673666\n    XCTAssertTrue(number1 > number2,\n \
    \                 \"number1 should be greater than number2\")\n}\n```\n\nThis\
    \ particular test obviously does not have much utility; it does not call any methods\
    \ on other objects, or change the state of an object. It is only presented to\
    \ serve as an example of how assertions work."
  raw: '### Negative Test


    A negative unit test is one that verifies something did not happen. This can be
    useful in some cases. However, one must never solely rely on negative tests. This
    is because while a negative test can verify that something did not happen, it
    is immune to any number of things that did happen. The code base could change
    considerably without have a single negative test fail. If all your unit tests
    were negative tests, then your tests collectively are providing limited value.


    Negative unit tests in Swift are almost always state verification tests. Although
    it is possible to create negative unit tests that are interaction tests, the relevant
    setup required is quite complicated and often outweighs the value of writing the
    negative test.


    As an example of a negative unit test in action, consider the following Swift
    class that could be used to represent a bank account:


    ```

    enum AccountType {

    case currentAccount

    case savingsAccount

    }

    class BankAccount {

    var accountName:String

    var accountNumber:String

    var accountType:AccountType

    private var transactions:[Transaction]

    init(accountName:String,

    accountNumber:String,

    accountType:AccountType) {

    self.accountName = accountName

    self.accountNumber = accountNumber

    self.accountType = accountType

    self.transactions = [Transaction]()

    }

    func addTransaction(_ transaction:Transaction) {

    transactions.append(transaction)

    }

    func accountBalance() -> Float {

    var balance:Float = 0

    for transaction in self.transactions {

    if transaction.isCredit {

    balance = balance + transaction.amount

    } else {

    balance = balance + transaction.amount

    }

    }

    return balance

    }

    }

    ```


    Individual transactions within a BankAccount object are represented using Transaction
    objects. The definition of a simple Transaction class is presented next:


    ```

    class Transaction {

    var description:String

    var amount:Float

    var isCredit:Bool

    init(description:String,

    amount:Float,

    isCredit:Bool) {

    self.description = description

    self.amount = amount

    self.isCredit = isCredit

    }

    }

    ```


    With these two classes in mind, a negative unit test could be used to verify that
    a call to the addTransaction() method of the BankAccount class does not change
    the account name. This test could be written as follows:


    ```

    func testAddTransaction_DoesNotChangeAccountName() {

    let bankAccount = BankAccount(accountName: "John Smith",

    accountNumber: "14918",

    accountType: .savingsAccount)

    let transaction = Transaction(description: "Salary",

    amount: 100.0,

    isCredit: true)

    bankAccount.addTransaction(transaction)

    XCTAssertTrue(bankAccount.accountName.compare("John Smith") == .orderedSame,

    "Call to addTransaction should have no effect on account name.")

    }

    ```


    Assertions haven’t been covered yet, but they will be shortly. This test ensures
    that the value of the accountName variable of the BankAccount instance does not
    change when addTransaction is called.


    ### Test Suite


    A test suite is simply a collection of test case files. Test suites usually have
    their own group in the Xcode project explorer and are included in a separate build
    target from the rest of the application’s code (Figure [1-1](#A432412_1_En_1_Chapter.html#Fig1)).


    ![A432412_1_En_1_Fig1_HTML.jpg](A432412_1_En_1_Fig1_HTML.jpg)


    Figure 1-1.


    Separate Folder Groups for Test Suites in Xcode


    A single Xcode project can have multiple test suites, for example, one test suite
    may contain unit tests, and another may contain interaction tests. In the next
    lesson, you will learn to configure Xcode build schemes to include specific test
    suites as part of the build process.


    ### Assertions


    Assertions are the bread and butter of both state verification and interaction
    tests. An assertion represents a failure of a unit test . Typically, your unit
    test will call a method on an object, and this method may perform a number of
    activities such as returning a value, changing some values in the object, or calling
    out to other methods.


    If you know the expected result of the method you are calling, you can build a
    unit test that calls the method with known inputs and expects a specific result.
    If the result of calling the method does not match the expected value, the test
    will indicate failure by firing an assertion.


    The standard unit-testing framework that ships with Xcode is called XCTest and
    contains several macros to help create assertions within a unit test. Table [1-1](#A432412_1_En_1_Chapter.html#Tab1)
    lists some of these macros.


    Table 1-1.


    XCTest Assertion Macros


    | Macro | Description |

    | --- | --- |

    | XCTAssert(expression, message) | Generates a failure if the expression evaluates
    to false. An optional string message may be provided to indicate the reason for
    failure. |

    | XCTAssertEqualObjects(expression1, expression2, message) | Generates a failure
    when expression1 is not equal to expression 2, where both expression 1 and expression
    2 are objects. Both objects involved must implement Equatable. An optional string
    message may be provided to indicate the reason for failure. |

    | XCTAssertNotEqualObjects(expression1, expression2, message) | Generates a failure
    when expression1 is equal to expression 2, where both expression 1 and expression
    2 are objects. Both objects involved must implement Equatable. An optional string
    message may be provided to indicate the reason for failure. |

    | XCTAssertEqual(expression1, expression2, message) | Generates a failure when
    expression1 is not equal to expression 2\. This test is for primitive data types.
    An optional string message may be provided to indicate the reason for failure.
    |

    | XCTAssertNotEqual(expression1, expression2, message) | Generates a failure when
    expression1 is equal to expression 2\. Both expression1 and expression 2 are primitive
    data types. An optional string message may be provided to indicate the reason
    for failure. |

    | XCTAssertNil (expression, message ) | Generates a failure when the expression
    is not nil. An optional string message may be provided to indicate the reason
    for failure. |

    | XCTAssertNotNil(expression, message ) | Generates a failure when the expression
    is nil. An optional string message may be provided to indicate the reason for
    failure. |

    | XCTAssertTrue (expression, message ) | Generates a failure when the expression
    evaluates to false. Identical to XCTAssert(), provided to create more readable
    tests. An optional string message may be provided to indicate the reason for failure.
    |

    | XCTAssertFalse (expression, message) | Generates a failure when the expression
    evaluates to true. An optional string message may be provided to indicate the
    reason for failure. |


    The following code snippet lists a unit test that will fail using the XCTAssertTrue
    macro. Figure [1-2](#A432412_1_En_1_Chapter.html#Fig2) is a snapshot of the Xcode
    test navigator showing a failed test.


    ![A432412_1_En_1_Fig2_HTML.jpg](A432412_1_En_1_Fig2_HTML.jpg)


    Figure 1-2.


    Failed Unit Test


    ```

    func testNumber1IsGreaterThanNumber2() {

    let number1 = 9218

    let number2 = 673666

    XCTAssertTrue(number1 > number2,

    "number1 should be greater than number2")

    }

    ```


    This test fails because the test expects number1 to be greater than number2 .
    Fixing it is a simple matter of editing the value of number1 to be greater than
    `number2`:


    ```

    func testNumber1IsGreaterThanNumber2() {

    let number1 = 921800

    let number2 = 673666

    XCTAssertTrue(number1 > number2,

    "number1 should be greater than number2")

    }

    ```


    This particular test obviously does not have much utility; it does not call any
    methods on other objects, or change the state of an object. It is only presented
    to serve as an example of how assertions work.'
