    - `NetworkController.swift`：专门负责发起网络请求并处理相关错误的类。\n- `UserProfile.swift`：用户档案模型对象类，包含将字典内容解析为实例变量的逻辑。\n\
    - `AlertFactory.swift`：负责创建警示控制器的类。\n\n图[8-1](#A432412_1_En_8_Chapter.html#Fig1)展示了这种新方案的类图。\n\
    \n![A432412_1_En_8_Fig1_HTML.jpg](A432412_1_En_8_Fig1_HTML.jpg)\n\n图8-1. 重构后的\
    \ `LargeViewController` 类图\n\n重构后的 `LargeViewController.swift` 类如代码清单[8-2](#A432412_1_En_8_Chapter.html#Par23)所示。\n\
    \n```swift\nimport UIKit\nclass RefactoredLargeViewController: UIViewController\
    \ {\n    @IBOutlet weak var userNameLabel: UILabel!\n    @IBOutlet weak var emailAddressLabel:\
