    # 6. Applying TDD to Collection View Controllers


    This chapter will examine the process of building a collection view controller-based
    iOS app using TDD techniques. The app will have a single view controller that
    presents a list of pictures and will be built using the MVVM application architecture.
    Figure [6-1](A432412_1_En_6_Chapter.html#Fig1) depicts the user interface of the
    finished application.


    ![A432412_1_En_6_Fig1_HTML.jpg](A432412_1_En_6_Fig1_HTML.jpg)


    **Figure 6-1.** The PhotoBook Application


    The complete source code for the app can be downloaded anonymously from github
    using the following URL:


    [`https://github.com/asmtechnology/Lesson06.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson06.iOSTesting.2017.Apress.git)


    ## Application Architecture


    The application architecture consists of three distinct layers (see Figure [6-2](A432412_1_En_6_Chapter.html#Fig2)).


    ![A432412_1_En_6_Fig2_HTML.jpg](A432412_1_En_6_Fig2_HTML.jpg)


    **Figure 6-2.** PhotoBook Application Architecture


    A brief description of the layers and the component classes follows:


    * **Model Layer:** Consists of the `Photo`, `City`, and `Album` classes that are
    used to hold the data that will be displayed to the user. `Album` is the top-level
    object and consist of multiple cities, with each city containing one or more photos
    that were taken in that city.

    * **View Model Layer:** Consists of the `CollectionViewModel`, `CollectionViewCellViewModel`,
    and `CollectionViewSectionHeaderViewModel` classes.

    * **View/View Controller Layer:** This layer contains the user interface of the
    project and consists of the `CollectionViewController`, `CollectionViewCell`,
    and `CollectionViewSectionHeader` classes.


