    OK\",\n                                          style: .default, handler: nil)\n\
    \        alertController.addAction(defaultAction)\n        return alertController\n\
    \    }\n}\n```\n代码清单8-5. `AlertFactory.swift`\n\n严格来说，`LargeViewController.swift`\
    \ 仍然有多个职责：管理生命周期事件和更新用户界面。如果希望进一步重构该类，可以使用MV-VM架构模式引入视图模型对象，将更新用户界面的职责转移到视图模型中。\n\
    \n这个练习应该能让你了解如何处理将大类拆分为更小、更专注、更易管理的类的方法。\n\n## 向现有类添加功能\n\n将大类重构为小类在某些情况下可能涉及大量时间和精力。作为开发者，你可能被要求在现有遗留类中添加功能，却没有足够的时间先进行重构。\n\
    \n在本节中，我们将介绍一些技术，使你能够以这样一种方式向现有类添加功能——将来时间允许时，你可以重新审视该类并将代码移入单独的辅助类中。\n\n### 使用类和方法进行封装\n\
    \n在向遗留类的现有方法中添加代码时，最好将新代码封装到一个新方法中，并从现有方法中调用新方法。这种方法有几个优点：\n\n- 可以为新方法编写测试。\n\
    - 不会向一个庞大且未经测试的遗留方法中添加更多代码。\n- 这种技术可能要求你从源方法中注入一些局部变量作为新方法的依赖项；这种做法有助于为未来的进一步重构打下基础。\n\
    \n在某些情况下，你计划添加新方法的类非常复杂，难以纳入测试。这通常发生在该类具有很长的依赖列表且需要在初始化器中提供多个参数时。\n\n在这种情况下，你可以将新代码封装在新类的方法中，并在遗留方法中创建新类的对象。这种技术也称为“Break\
    \ Out Method Object”。[¹](#A432412_1_En_8_Chapter.html#Sec99) 然而，以这种方式使用新类应被视为临时方案。你应当计划在不久的将来重新审视源方法/类，并进行适当的重构。如果不这样做，就有可能在代码库中创建成百上千个没有明确目的的小类。\n\
    \n作为示例，我们重新审视代码清单[8-1](#A432412_1_En_8_Chapter.html#Par8)中的`LargeViewController`类。假设要求你编写一些代码，对下载的用户档案中的电子邮件地址进行字段级验证，并拒绝包含无效电子邮件地址的档案。再假设当前`LargeViewController`中的任何代码都没有测试，并且你没有时间重构该类。\n\
    \n一种可能的方法是将验证逻辑写在`downloadUserProfile()`函数内部，如代码清单[8-6](#A432412_1_En_8_Chapter.html#Par42)中的粗体部分所示。"
  raw: 'Being a view controller, it can be expected to handle view life cycle events
    and contain the code to update the user interface. The other responsibilities
    can be farmed out to other objects. Using this line of reasoning, you can come
    up with the following classes:


    *   LargeViewController.swift: This is the view controller class and handles view
    lifecycle events and contains logic to update the UI.

    *   NetworkController.swift: This is a class dedicated to making network requests
    and handling relevant errors.

    *   UserProfile.swift: This class represents a user profile model object, and
    contains the logic to parse the contents of a dictionary into instance variables.

    *   AlertFactory.swift: This class handles the task of creating an alert controller.


