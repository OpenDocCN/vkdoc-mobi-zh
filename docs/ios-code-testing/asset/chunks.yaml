- fmt: "# This is the essence of the decorator pattern.\n\nThe `PersonalBankAccount`\
    \ class decorates the `BankAccount` class by adding some additional functionality\
    \ on top of what is offered by `BankAccount`. You can use an instance of a `PersonalBankAcccount`\
    \ anywhere in your code in place of a `BankAccount` instance. You could also implement\
    \ this pattern by sub classing `BankAccount`, and modifying the methods implemented\
    \ by the subclass. Continuing with the approach used to create the `PersonalBankAccount`\
    \ class, the `BusinessBankAccount` class will be very similar to the `PersonalBankAccount`\
    \ class, with the only difference being the implementation of the `deposit()`\
    \ and `withdraw()` methods:\n\n```\nfunc withdraw(_ amount:Float, _ person:AccountOwner?)\
    \ -> Void {\n    if withinDailyWithdrawalLimit(amount) {\n        bankAccount.withdraw(amount,\
    \ person)\n        logWidthdrawalForAudit(amount, person)\n    }\n}\nfunc deposit(_\
    \ amount:Float, _ person:AccountOwner?) -> Void {\n    if withinDailyDepositlLimit(amount)\
    \ {\n        bankAccount.deposit(amount, person)\n        logDepositForAudit(amount,\
    \ person)\n    }\n}\n```\n\n## Decoupling Classes Using Protocols\n\nIn the previous\
    \ section we looked at techniques you can use to add code to legacy classes so\
    \ as to be able to write tests for the new code, with minimal impact on the existing\
    \ legacy code.\n\nIn time, when you decide to start writing tests for your legacy\
    \ code, you are likely to try and write unit tests for one class at a time. However,\
    \ classes in legacy code bases are often tightly coupled, and it is impossible\
    \ to instantiate a single class in isolation.\n\nThis tight coupling manifests\
    \ itself as a tree of of dependent classes, all of which need to be instantiated\
    \ just in order to instantiate the one class you are truly interested in.\n\n\
    Managing the dependencies between classes will be one of the biggest challenges\
    \ you will face when you bring legacy classes in to test. In this section we will\
    \ look at using Protocols to break the tight coupling between classes often found\
    \ in legacy code bases.\n\nConsider for a moment, the instance variables of the\
    \ `BankAccount` class, part of which is reproduced below:\n\n```\nclass BankAccount:\
    \ NSObject {\n    var accountName:String\n    var accountNumber:String\n    var\
    \ sortingCode:String\n    var accountType:AccountType\n    var transactions:[Transaction]\n\
    \    var owners:[AccountOwner]\n    ...\n    ...\n}\n```\n\nThe `transactions`\
    \ and `owners` variables create a strong coupling between the this class and the\
    \ `Transaction` and `AccountOwner` classes. It is not possible to instantiate\
    \ `BankAccount` under test without bringing in the other two classes as well.\n\
    \nYou can break the tight coupling between these classes by using protocols as\
    \ follows:\n\n1.  Create two new protocols: `TransactionProtocol` and `AccountOwnerProtocol`.\n\
    2.  Declare all the methods and public instance variables of the `Transaction`\
    \ class in the `TransactionProtocol` protocol.\n3.  Declare all the methods and\
    \ public instance variables of the `AccountOwner` class in the `AccountOwnerProtocol`\
    \ protocol.\n4.  Modify the declaration of the `Transaction` class to implement\
    \ the `TransactionProtocol` protocol.\n5.  Modify the declaration of the `AccountOwner`\
    \ class to implement the `AccountOwnerProtocol` protocol.\n6.  Modify the declaration\
    \ of the `BankAccount` class to use protocols instead of the respective classes:\n\
    \n```\nclass BankAccount: NSObject {\n    ...\n    ...\n    var transactions:[TransactionProtocol]\n\
    \    var owners:[AccountOwnerProtocol]\n    ...\n    ...\n}\n```\n\nBy using protocols\
    \ for instance variables, instead of concrete class names you have broken the\
    \ tight coupling that previously existed in the `BankAccount` class. The `BankAccount`\
    \ class can now easily be brought under test, without bringing in the `Transaction`\
    \ and `AccountOwner` classes. You can use stub objects in place of the `Transaction`\
    \ and `AccountOwner` classes.\n\n## Using Dependency Injection to Create More\
    \ Testable Code\n\nThe idea behind dependency injection (DI) is to make dependencies\
    \ between classes and methods more explicit. Consider the following seemingly\
    \ innocent method added to the `BankAccount` class to provide the balance of the\
    \ class at a particular instance in time.\n\n```\nfunc accountBalanceDescription()\
    \ -> String {\n    let dateFormatter = DateFormatter()\n    dateFormatter.dateFormat\
    \ = \"MMMM dd yyyy\"\n    return \"The balance in your account as of \\(dateFormatter.string(from:\n\
    Date())) is \\(accountBalance)\"\n}\n```\n\nThere are two problems with this method:\n\
    \n1.  A new `DateFormatter` instance is created every time this method is called.\
    \ This is very inefficient.\n2.  There is nothing in the method signature itself\
    \ that suggests the method will create a date formatter, with a specific date\
    \ format.\n\nThe method clearly has a dependency on a `DateFormatter` instance,\
    \ and the dependency is hidden because you need to look into the implementation\
    \ of the method to realize that it exists. In this case to make it more explicit,\
    \ you could simply inject the date formatter as a parameter into the method:\n\
    \n```\nfunc accountBalanceDescription(_ dateFormatter:DateFormatter) -> String\
    \ {\n    return \"The balance in your account as of \\(dateFormatter.string(from:\n\
    Date())) is \\(accountBalance)\"\n}\n```\n\nThe problem is far worse if the hidden\
    \ dependency is on a resource, or a data source that is shared between methods\
    \ of the class. Consider, for example, the following pair of methods:\n\n```\n\
    func deposit(_ amount:Float, _ person:AccountOwner) -> Void {\n    let transactionDate\
    \ = NSDate()\n    if let newTransaction = Transaction(txDescription: \"Cash Deposit\"\
    ,\n                                        date: transactionDate,\n          \
    \                              isIncoming: true,\n                           \
    \             amount: \"\\(amount)\") {\n        self.transactions.append(newTransaction)\n\
    \        UserDefaults.standard.set(transactionDate,\n                        \
    \          forKey: \"lastDepositDate\")\n    }\n}\nfunc lastDepositDate() -> NSDate?\
    \ {\n    return UserDefaults.standard.object(forKey: \"lastDepositDate\")\n  \
    \      as? NSDate\n}\n```\n\nThe problem with these methods is the hidden dependency\
    \ on a `UserDefaults` instance shared between the methods. This kind of code is\
    \ very difficult to test. Once again, you could break the tight coupling between\
    \ these methods and the `UserDefaults` class by exposing the dependency in the\
    \ list of parameters provided as input to the methods:\n\n```\nfunc deposit(_\
    \ amount:Float, _ person:AccountOwner?,\n             _ defaults:UserDefaults)\
    \ -> Void {\n    let transactionDate = NSDate()\n    if let newTransaction = Transaction(txDescription:\
    \ \"Cash Deposit\",\n                                        date: transactionDate,\n\
    \                                        isIncoming: true,\n                 \
    \                       amount: \"\\(amount)\") {\n        self.transactions.append(newTransaction)\n\
    \        defaults.set(transactionDate, forKey: \"lastDepositDate\")\n    }\n}\n\
    func lastDepositDate(_ defaults:UserDefaults) -> NSDate? {\n    return defaults.object(forKey:\
    \ \"lastDepositDate\") as? NSDate\n}\n```\n\nHowever, this solution presents us\
    \ with a new problem - the two methods were designed to access the same `UserDefaults`\
    \ instance. By exposing the `UserDefaults` instance in the parameter list, you\
    \ are now allowing a user to potentially inject different `UserDefaults` instances\
    \ into these methods.\n\nA better solution in this situation would be to make\
    \ the `UserDefaults` instance an instance variable of the class in which both\
    \ these methods exist, and not expose the `UserDefaults` object in the method\
    \ signatures:\n\n```\nclass BankAccount: NSObject {\n    var defaults:UserDefaults?\n\
    \    ...\n    ...\n    ...\n    func deposit(_ amount:Float, _ person:AccountOwner?)\
    \ -> Void {\n        let transactionDate = NSDate()\n        if let newTransaction\
    \ = Transaction(txDescription: \"Cash Deposit\",\n                           \
    \                 date: transactionDate,\n                                   \
    \         isIncoming: true,\n                                            amount:\
    \ \"\\(amount)\") {\n            self.transactions.append(newTransaction)\n  \
    \          self.defaults?.set(transactionDate, forKey: \"lastDepositDate\")\n\
    \        }\n    }\n    func lastDepositDate() -> NSDate? {\n        return self.defaults?.object(forKey:\
    \ \"lastDepositDate\") as? NSDate\n    }\n    ...\n    ...\n    ...\n}\n```\n\n\
    Making dependencies explicit leads to looser coupling between objects, and makes\
    \ it easier to test methods in isolation."
