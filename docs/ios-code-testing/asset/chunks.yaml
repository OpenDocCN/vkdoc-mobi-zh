- fmt: '# The BankAccount Class


    A `BankAccount` object represents a current or savings bank account in the context
    of our app. Table [4-3](#A432412_1_En_4_Chapter.html#Tab3) lists the desired member
    variables and methods of the `BankAccount` class.


    **Table 4-3.** Transaction variables and methods


    | Item | Type | Description |

    | --- | --- | --- |

    | `var accountName:String` | Variable | Contains a textual description of the
    account. Should be up to 20 characters in length, cannot be empty. Special characters
    are allowed. |

    | `var accountNumber:String` | Variable | Contains a numeric account number, must
    be a 9-digit number, no white space or special characters are permitted. |

    | `var sortingCode:String` | Variable | Contains a six digit number that identifies
    a branch. No white space or special characters are permitted. Must begin with
    either 40 or 49. |

    | `var accountType:AccountType` | Variable | An enumerated value that represents
    the account type. Can be either `currentAccount` or `savingsAccount`. |

    | `var transactions:[Transaction]` | Variable | An array of transactions. |

    | `var owners:[AccountOwner]` | Variable | An array of account owners. A bank
    account must have at least one owner, and can have up to 2 account owners. |

    | `init?(accountName:String, accountNumber:String, sortingCode:String, accountType:AccountType,
    owners:[AccountOwner])` | Method | Allows other code to create `BankAccount` instances.
    |


    The approach to developing the `BankAccount` class will be very similar to the
    `AccountOwner` class. You will need to create tests that verify the behavior of
    the initializer and any validator objects. In this particular case, validator
    objects will be needed for the `accountName`, `accountNumber`, and `sortingCode`
    properties.


    The complete `BankAccount` class is provided in Listing [4-12](#A432412_1_En_4_Chapter.html#Par146).
    If you would like to examine the code for the tests and the validator objects,
    download the finished project anonymously from github using the following URL:


    [`https://github.com/asmtechnology/Lesson04.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson04.iOSTesting.2017.Apress.git)


    ```

    import Foundation

    enum AccountType {

    case currentAccount

    case savingsAccount

    }

    class BankAccount: NSObject {

    var accountName:String

    var accountNumber:String

    var sortingCode:String

    var accountType:AccountType

    var transactions:[Transaction]

    var owners:[AccountOwner]

    init?(accountName:String,

    accountNumber:String,

    sortingCode:String,

    accountType:AccountType,

    owners:[AccountOwner],

    accountNameValidator:AccountNameValidator? = nil,

    accountNumberValidator:AccountNumberValidator? = nil,

    sortingCodeValidator:SortingCodeValidator? = nil) {

    let validator1 = accountNameValidator ?? AccountNameValidator()

    if validator1.validate(accountName) == false {

    return nil

    }

    let validator2 = accountNumberValidator ?? AccountNumberValidator()

    if validator2.validate(accountNumber) == false {

    return nil

    }

    let validator3 = sortingCodeValidator ?? SortingCodeValidator()

    if validator3.validate(sortingCode) == false {

    return nil

    }

    if owners.count == 0 {

    return nil

    }

    self.accountName = accountName

    self.accountNumber = accountNumber

    self.sortingCode = sortingCode

    self.accountType = accountType

    self.owners = owners

    self.transactions = [Transaction]()

    }

    }

    ```


    **Listing 4-12.** `BankAccount.swift`


    ## Testing Core Data


    The model objects built so far in this chapter all have one thing in common –
    they are all `NSObject` subclasses. This is quite common in many iOS Apps; however,
    an increasing number of apps are using object persistence frameworks like Core
    Data to both represent and persist the model data.


    A detailed discussion of Core Data is outside the scope of this book. Testing
    the model layer is perhaps one of the biggest hurdles faced by developers who
    have used Core Data in the model layer.


    Core Data is designed to persist your model objects along with their relationships
    into a database. For Core Data to be able to achieve its objectives, it introduces
    a plethora of classes such as `NSManagedObject`, `NSManagedObjectContext`, `NSManagedObjectModel`,
    `NSPersistentStoreCoordintor`, and also requires that you let Core Data manage
    the life cycle of your model objects.


    With Core Data managing the life cycle of your model objects, you cannot simply
    instantiate your model objects using a designated or convenience initializers;
    instead you need to request a managed object context to instantiate the object.


    While the managed object context itself can be conveniently instantiated with
    a designated initializer, one of the parameters to this initializer is a persistent
    store coordinator that requires you to provide the path to a SQLite database file.


    Instantiating persistent store coordinators in your application''s code is a very
    common thing to do; however to instantiate one of these in a unit test case, you
    will need to include a database in the test target. Including a database in a
    test target is strictly frowned upon because tests that read and write from a
    database can easily create dependencies between test cases.


    It is easy to imagine a test case writing some data into a database, and another
    reading some of the data. This type of behavior creates tight coupling between
    tests, the precise execution order of the tests becomes important, and the tests
    are not independent anymore. It is far worse when this type of behavior occurs
    inadvertently.


    Fortunately Core Data has an often overlooked feature called in-memory stores
    that can be used within tests without including an SQLite file in the test target.
    An in-memory store is a RAM-based database, and is commonly used to implement
    caching strategies. One of the key properties of an in-memory store is that they
    can be destroyed and re-created to an initial state with little performance overhead.


    The following code snippet shows how you can create a managed object context that
    uses an in-memory persistent store coordinator:


    ```

    func inMemoryManagedObjectContext() -> NSManagedObjectContext? {

    guard let managedObjectModel = NSManagedObjectModel.mergedModel(from:[Bundle.main])
    else {

    return nil

    }

    let persistentStoreCoordinator = NSPersistentStoreCoordinator(managedObjectModel:
    managedObjectModel)

    do {

    try persistentStoreCoordinator.addPersistentStore(ofType: NSInMemoryStoreType,

    configurationName: nil,

    at: nil,

    options: nil)

    } catch {

    print("Failed to create in-memory persistent store.")

    return nil

    }

    let managedObjectContext = NSManagedObjectContext(concurrencyType:.mainQueueConcurrencyType)

    managedObjectContext.persistentStoreCoordinator = persistentStoreCoordinator

    return managedObjectContext

    }

    ```


    You can make use of this method in your test case''s setup method to create a
    managed object context backed by an in-memory store. You can then use this managed
    object context to instantiate Core Data objects within your tests.


    ## Summary


    In this chapter you have created the model layer of an application using Test-Driven
    techniques. For each component of the model layer, you first created a set of
    test cases, and then built the corresponding model layer class to ensure the test
    cases pass.


    You have also learned to create validator objects that validate the content of
    the model layer objects, and how to inject these validator objects as dependencies
    into model layer objects.


    Finally, you learned to create mock objects in Swift and use the mock objects
    to verify the integration between model layer objects and injected validator objects.'
  raw: '## The BankAccount Class


    A BankAccount object represents a current or savings bank account in the context
    of our app. Table [4-3](#A432412_1_En_4_Chapter.html#Tab3) lists the desired member
    variables and methods of the BankAccount class.


    Table 4-3.


    Transaction variables and methods


    | Item | Type | Description |

    | --- | --- | --- |

    | `var accountName:String` | Variable | Contains a textual description of the
    account. Should be up to 20 characters in length, cannot be empty. Special characters
    are allowed. |

    | `var accountNumber:String` | Variable | Contains a numeric account number, must
    be a 9-digit number, no white space or special characters are permitted. |

    | `var sortingCode:` `String` | Variable | Contains a six digit number that identifies
    a branch. No white space or special characters are permitted. Must begin with
    either 40 or 49. |

    | `var accountType:AccountType` | Variable | An enumerated value that represents
    the account type. Can be either currentAccount or savingsAccount. |

    | `var transactions:[Transaction]` | Variable | An array of transactions. |

    | `var owners:[AccountOwner]` | Variable | An array of account owners. A bank
    account must have at least one owner, and can have up to 2 account owners. |

    | `init?(accountName:String,` `accountNumber:String,` `sortingCode:String,` `accountType:AccountType,`
    `owners:[AccountOwner])` | Method | Allows other code to create BankAccount instances.
    |


    The approach to developing the BankAccount class will be very similar to the AccountOwner
    class. You will need to create tests that test verify the behavior of the initializer
    and any validator objects. In this particular case, validator objects will be
    needed for the accountName, accountNumber, and sortingCode properties.


    The complete BankAccount class is provided in Listing [4-12](#A432412_1_En_4_Chapter.html#Par146).
    If you would like to examine the code for the tests and the validator objects,
    download the finished project anonymously from github using the following URL:


    [`https://github.com/asmtechnology/Lesson04.iOSTesting.2017.Apress.git`](https://github.com/asmtechnology/Lesson04.iOSTesting.2017.Apress.git)


    ```

    import Foundation

    enum AccountType {

    case currentAccount

    case savingsAccount

    }

    class BankAccount: NSObject {

    var accountName:String

    var accountNumber:String

    var sortingCode:String

    var accountType:AccountType

    var transactions:[Transaction]

    var owners:[AccountOwner]

    init?(accountName:String,

    accountNumber:String,

    sortingCode:String,

    accountType:AccountType,

    owners:[AccountOwner],

    accountNameValidator:AccountNameValidator? = nil,

    accountNumberValidator:AccountNumberValidator? = nil,

    sortingCodeValidator:SortingCodeValidator? = nil) {

    let validator1 = accountNameValidator ?? AccountNameValidator()

    if validator1.validate(accountName) == false {

    return nil

    }

    let validator2 = accountNumberValidator ?? AccountNumberValidator()

    if validator2.validate(accountNumber) == false {

    return nil

    }

    let validator3 = sortingCodeValidator ?? SortingCodeValidator()

    if validator3.validate(sortingCode) == false {

    return nil

    }

    if owners.count == 0 {

    return nil

    }

    self.accountName = accountName

    self.accountNumber = accountNumber

    self.sortingCode = sortingCode

    self.accountType = accountType

    self.owners = owners

    self.transactions = [Transaction]()

    }

    }

    Listing 4-12.

    BankAccount.swift

    ```


