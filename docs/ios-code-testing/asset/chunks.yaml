    \ where both `expression1` and `expression2` are objects. Both objects involved\
    \ must implement `Equatable`. An optional string `message` may be provided to\
    \ indicate the reason for failure. |\n| `XCTAssertNotEqualObjects(expression1,\
    \ expression2, message)` | Generates a failure when `expression1` is equal to\
    \ `expression2`, where both `expression1` and `expression2` are objects. Both\
    \ objects involved must implement `Equatable`. An optional string `message` may\
    \ be provided to indicate the reason for failure. |\n| `XCTAssertEqual(expression1,\
    \ expression2, message)` | Generates a failure when `expression1` is not equal\
    \ to `expression2`. This test is for primitive data types. An optional string\
    \ `message` may be provided to indicate the reason for failure. |\n| `XCTAssertNotEqual(expression1,\
    \ expression2, message)` | Generates a failure when `expression1` is equal to\
    \ `expression2`. Both `expression1` and `expression2` are primitive data types.\
    \ An optional string `message` may be provided to indicate the reason for failure.\
    \ |\n| `XCTAssertNil(expression, message)` | Generates a failure when the `expression`\
    \ is not `nil`. An optional string `message` may be provided to indicate the reason\
    \ for failure. |\n| `XCTAssertNotNil(expression, message)` | Generates a failure\
