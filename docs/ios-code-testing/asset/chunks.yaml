    \n**图 6-22.** CollectionViewModel 测试通过\n\n到目前为止创建的视图模型测试验证了视图模型可以被实例化，为了使此测试通过，您创建了一个视图模型类、一个协议和一个模拟类。\n\
    \n接下来要编写的测试将验证视图模型在实例变量中保存了注入到初始值设定项的视图引用。在前一个测试方法下方创建一个名为 `testInit_ValidView_CopiesViewToIvar()`\
