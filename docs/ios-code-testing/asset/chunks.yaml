- fmt: '### From User Scenarios to BDD Tests


    The developer will then create a Swift class in the test target and write BDD-style
    tests using `Quick`. The name of the class will have the word "Specification"
    (or `Spec`) in it, as BDD tests are written to a specification provided by the
    business. Listing [10-1](#A432412_1_En_10_Chapter.html#Par29) presents a BDD-style
    test class called `BankAccountSpecification.swift`.


    ```swift

    import Foundation

    import Quick

    import Nimble

    class BankAccountSpecification : QuickSpec {

    override func spec() {

    var mary:AccountOwner?

    var phil:AccountOwner?

    var maryAndPhil:[AccountOwner] = [AccountOwner]()

    var jointSavingsAccount:BankAccount?

    beforeEach {

    mary = AccountOwner(firstName: "Mary",

    lastName: "Daniels",

    emailAddress: "mdaniels@domain.com")

    phil = AccountOwner(firstName: "Phil",

    lastName: "Burlington",

    emailAddress: "p.burlington@domain.com")

    maryAndPhil.removeAll()

    maryAndPhil.append(mary!)

    maryAndPhil.append(phil!)

    jointSavingsAccount =

    BankAccount(accountName: "Savings Account",

    accountNumber: "87548390",

    sortingCode: "498711",

    accountType: .savingsAccount,

    owners: maryAndPhil)

    }

    describe("A joint savings account has a credit balance of $100") {

    context("An account holder withdraws $50 from the account") {

    it("The account should have a credit balance of $50") {

    jointSavingsAccount?.setOpeningBalance(100)

    jointSavingsAccount?.withdraw(50, mary)

    expect(jointSavingsAccount!.accountBalance).to(equal(50))

    }

    }

    }

    describe("A joint savings account has a credit balance of $100") {

    context("An account holder deposits $50 into the account") {

    it("The account should have a credit balance of $150") {

    jointSavingsAccount?.setOpeningBalance(100)

    jointSavingsAccount?.deposit(50, mary)

    expect(jointSavingsAccount!.accountBalance).to(equal(150))

    }

    }

    }

    }

    }

    Listing 10-1.

    BankAccountSpecification.swift

    ```


    The test case file starts out by importing the `Quick` and `Nimble` frameworks:


    ```swift

    import Foundation

    import Quick

    import Nimble

    ```


    `Quick` is a framework that allows you to write BDD-style tests in Swift. `Nimble`
    is a framework that lets you create assertions that are more verbose than the
    standard `XCTAssert` macros provide by Xcode.


    ### Anatomy of a Quick Test Case


    A `Quick` test case class is always a subclass of `QuickSpec`, and must have a
    method called `spec` in it. Tests for all user scenarios that define the specification
    are placed within the body of the `spec()` method:


    ```swift

    class BankAccountSpecification : QuickSpec {

    override func spec() {

    // All test code goes here.

    }

    }

    ```


    Inside the `spec()` method, you will find call to a function called `beforeEach`
    with a single closure as the function argument:


    ```swift

    class BankAccountSpecification : QuickSpec {

    override func spec() {

    beforeEach {

    // Setup code goes here

    }

    }

    }

    ```


    The `beforeEach` method of a `Quick` test case is equivalent to the `setUp()`
    method of an `XCTestCase`. `Quick` test cases can also have an `afterEach` method
    that would be the equivalent of the `teardown()` method of a unit test.


    After the call to the `beforeEach` method (and before the call to the `afterEach`
    method if the test class has one), a number of BDD-style tests are written using
    nested calls to three functions: `describe()`, `context()`, `it()`:


    ```swift

    override func spec() {

    beforeEach {

    }

    describe(/* the "Given" part of a scenario statement*/) {

    context(/* the "When" part of a scenario statement*/){

    it(/* the "Then" part of a scenario statement */) {

    // test logic goes here

    }

    }

    }

    }

    ```


    The `describe()` function takes a string argument that corresponds to the "Given"
    part of the scenario that you are testing and a trailing closure that contains
    statements to be executed by `Quick` when testing the scenario.


    The `context()` function takes a string argument that corresponds to the "When"
    part of the scenario you are testing and a trailing closure that contains statements
    to be executed by `Quick` when testing the scenario.


    The `it()` function also takes a string argument that corresponds to the "Then"
    part of the scenario you are testing and a trailing closure that contains the
    actual statements that will test your production code.


    There is a one-to-one correspondence between a user scenario and a `Quick` BDD
    test. To make things easier to understand, Listing [10-2](#A432412_1_En_10_Chapter.html#Par47)
    presents a user scenario and its corresponding BDD test, written using `Quick`.


    *   Given [A joint savings account has a credit balance of $100]

    *   When [An account holder withdraws $50 from the account]

    *   Then [The account should have a credit balance of $50]


    ```swift

    describe("A joint savings account has a credit balance of $100") {

    context("An account holder withdraws $50 from the account") {

    it("The account should have a credit balance of $50") {

    jointSavingsAccount?.setOpeningBalance(100)

    jointSavingsAccount?.withdraw(50, mary)

    expect(jointSavingsAccount!.accountBalance).to(equal(50))

    }

    }

    }

    Listing 10-2.

    User Scenario and Corresponding Quick BDD Test

    ```


    From a business perspective, if this test passes it means that some tangible unit
    of functionality has been built – something that a customer can relate to.


    Your test statements go in the `it()` block of a `Quick` BDD test. In the case
    of Listing [10-1](#A432412_1_En_10_Chapter.html#Par29), the test statements are
    the following:


    ```swift

    jointSavingsAccount?.setOpeningBalance(100)

    jointSavingsAccount?.withdraw(50, mary)

    expect(jointSavingsAccount!.accountBalance).to(equal(50))

    ```


    These tests are built assuming that a `BankAccount` object has methods called
    `setOpeningBalance`, `withdraw()`, and a computed property called `accountBalance`,
    which will behave in a manner consistent with the scenario being described.


    To ensure that the `BankAccount` class behaves as expected, a test expectation
    statement is used:


    ```swift

    expect(jointSavingsAccount!.accountBalance).to(equal(50))

    ```


    The expectation statement is expressed using constructs available in the `Nimble`
    framework. `Nimble` is included with `Quick` and provides a more verbose method
    of creating an expectation.


    However, there is nothing stopping you from using `XCTest` assert macros to make
    these expectations; the equivalent statement using the `XCTAssertEqual` macro
    would be this:'
