    }

    }

    }

    ```


    该场景也描述了 `SearchViewController` 类的行为。该场景的目标是确保当用户从拾取器中选择地点后，视图控制器上的按钮处于启用状态。


    为了测试该场景定义的条件是否满足，你只需调用 `SearchViewController` 实例上的 `pickerView(picker, didSelectRow,
    inComponent)` 方法，并检查按钮的 `isEnabled` 属性是否为 `true`。


    ### 检查场景 5 的 BDD 测试


    我们来看场景 5，这是下一个可以使用 BDD 技术测试的测试场景：


    *   Given [用户已选择一个地点]，

    *   When [点击了“下一步”按钮]，

    *   Then [出现一个新屏幕，显示该地点的餐厅列表]。


    测试该场景的 BDD 风格测试用例如下：


    ```

    describe("the user has selected a location") {

    context("the Next button is tapped") {

    it("a new screen appears with a list of restaurants in that

    location") {

    self.prepareForSearchViewControllerTests()

    self.searchViewController!.pickerView(

    self.locationPickerStub!, didSelectRow: 0,

    inComponent: 0)

    self.searchViewController!.onViewListings(self)

    expect(self.searchViewController!.displayResultsScreenCalled).

    to(equal(true))

    }

    }

    }

    ```


    该场景描述了用户在 `SearchViewController` 中点击“查看餐厅列表”按钮后发生的情况。预期行为是出现结果屏幕，显示餐厅列表。结果屏幕由
    `RestaurantListTableViewController` 类的实例表示。


    尝试确认结果屏幕是否在视觉上出现属于用户界面测试，更适合由 QA 团队使用的工具来完成。从代码角度来看，我们可以测试点击按钮是否会调用一个方法，而该方法又包含显示下一个屏幕的逻辑。


    该项目将使用 MV-VM 架构模式构建，因此 `SearchViewController` 类将有一个名为 `SearchViewModel` 的关联视图模型类。视图模型类将包含展示逻辑，为了支持该逻辑，视图控制器类将提供一个名为
    `displayResultsScreen()` 的方法，供视图模型调用。


    为了测试该场景定义的条件是否满足，你只需在拾取器中选择一行，然后调用 `onViewListings()` 操作方法，并检查视图控制器上是否调用了 `displayResultsScreen()`
    方法。


    但你如何检查 `displayResultsScreen()` 是否被调用？在本项目中，我将创建一个名为 `MockSearchViewController`
    的 `SearchViewController` 子类，该类包含一个布尔型实例变量，当 `displayResultsScreen()` 方法被调用时，该变量会被设置为
    `true`。


