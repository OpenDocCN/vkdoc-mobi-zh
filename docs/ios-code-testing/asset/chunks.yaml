    There are seven unit tests in the preceding snippet, and each of them are briefly
    described below:


    ```

    testInit_ValidDictionary_downloadedImage_IsNil()

    ```


    This test creates a Photo instance with a valid dictionary and expects that the
    downloadedImage instance variable is nil. This is a new instance variable that
    will be added to the Photo class and will contain the image after it has been
    downloaded.


    ```

    testInit_ValidDictionary_whenDownloadedImageIsCalled_callsDownloadImage()

    ```


    This test creates a Photo instance with a valid dictionary and accesses the downloadedImage
    instance variable . The test expects that by trying to access this instance variable
    (which is nil as proven by the previous test), the downloadImage method will be
    called.


    The downloadImage method is a new method that will be added to the Photo class
    and will contain the code to use a ServiceController instance to download an image.


    ```

    testBuildImageDownloadURL_nilImageName_returnsNil()

    ```


    This test calls the buildImageDownloadURL method on a Photo instance whose imageName
    instance variable is nil. The test expects that the buildImageDownloadURL method
    will return nil.


    The buildImageDownloadURL method is a new method that will be added to the Photo
    class and will contain the code to compose the URL of the image on the server
    from a base URL and the filename of the image.


    ```

    testBuildImageDownloadURL_validBaseURL_validImageName_returnsCorrectImageURL()

    ```


    This test calls the buildImageDownloadURL method on a Photo instance that has
    valid values for the baseURL and imageName instance variables. The test expects
    that the buildImageDownloadURL method will return a correctly formed URL.


    The baseURL instance variable is a new addition to the Photo class and will contain
    the URL to a folder on the server where images are stored.


    ```

    testDownloadImage_validImageURL_callsFromFetchURLonServiceController_withExpectedURL()

    ```


    This test calls the downloadImage method on a Photo instance and expects that
    the fetchURL method will be called on a ServiceController instance.


    The downloadImage method is a new method that will be added to the Photo class.
    The photo class will also have a new ServiceController instance variable.


    ```

    testDownloadImage_validImageURL_serviceControllerReturnsValidData_updatesImage()

    ```


    This test calls the downloadImage method on a Photo instance and simulates a successful
    download operation in the service controller class. The test expects the downloadedImage
    instance variable to be non-nil.


    Simulating a successful download operation in the service controller class is
    achieved by injecting a MockServiceController object into the Photo class, and
    configuring the MockServiceController to return a stubbed response:


    ```

    let bundle = Bundle(for: type(of:self))

    let filePath = bundle.path(

    forResource: "bar1", ofType: "jpg")

    let stubResponseData = try!

    Data(contentsOf:

    URL(fileURLWithPath: filePath!))

    let mockServiceController =

    MockServiceController()

    mockServiceController.shouldFailOnFetch = false

    mockServiceController.dataToReturnOnSuccess =

    stubResponseData

    let photo = Photo(validPhotoDictionary1)

    photo?.serviceController =

    mockServiceController

    ```


    As expected, these tests will not compile just yet as a few mock objects need
    to be created and a few instance variables and methods need to be added to the
    Photo class.


    Add the bar1.jpg file into the TestData group. Ensure the file is included with
    the test target only. You can get this file from the resource directory provided
    with the downloadable code that accompanies this chapter (see Figure [7-12](#A432412_1_En_7_Chapter.html#Fig12)).


