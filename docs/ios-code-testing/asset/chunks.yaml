- fmt: '### Code Coverage Reports


    A code coverage report can be used to get a measure of the number of lines of
    source code that are executed after a group of tests have run. Code coverage reports
    are not enabled by default in Xcode 8. To enable code coverage reports, access
    the scheme settings dialog box by using the `Product ➤ Scheme ➤ Edit Scheme` menu
    item (see Figure [2-16](#A432412_1_En_2_Chapter.html#Fig16)).


    ![A432412_1_En_2_Fig16_HTML.jpg](A432412_1_En_2_Fig16_HTML.jpg)


    Figure 2-16. Xcode Scheme Settings


    Click on the `Test` action, enable the `Gather Coverage Data` option, and click
    on `Close`. Code coverage reports can also be accessed via the report navigator.
    To generate code coverage reports, `Xcode` will have to collect data as your tests
    are being executed. Each subsequent run of your test code will update the coverage
    report although you may need to run your tests a couple of times before initial
    coverage reports are available.


    ### Building the Cookie Factory App


    In the previous section you were introduced to the different aspects of the `Xcode`
    user interface that pertain to unit testing. In this section you add features
    to the `CookieFactory` project that you have created earlier. The user interface
    for the finished app has been presented in Figure [2-1](#A432412_1_En_2_Chapter.html#Fig1).


    Each time the user taps on one of the buttons, a cookie of a specific type is
    created and appropriate labels are updated on the user interface.


    To get started, ensure the `CookieFactory` project is opened in `Xcode` and the
    application’s main storyboard file is open for editing. Add four buttons and four
    labels to the default scene of the application’s storyboard and position them
    to resemble Figure [2-17](#A432412_1_En_2_Chapter.html#Fig17).


    ![A432412_1_En_2_Fig17_HTML.jpg](A432412_1_En_2_Fig17_HTML.jpg)


    Figure 2-17. View Controller Scene from the Main Storyboard File


    Create outlets and actions in the `ViewController.swift` file and connect them
    to their respective user interface elements as described in Table [2-1](#A432412_1_En_2_Chapter.html#Tab1).


    **Table 2-1.** View Controller Outlets and Actions


    | Name | Type | User Interface Element |

    | --- | --- | --- |

    | `@IBOutlet weak var shortbreadCookies: UILabel!` | `IBOutlet` | Shortbread cookie
    label. |

    | `@IBOutlet weak var chocolateChipCookies: UILabel!` | `IBOutlet` | Chocolate
    chip cookie label. |

    | `@IBOutlet weak var gingerbreadCookies: UILabel!` | `IBOutlet` | Gingerbread
    cookie label. |

    | `@IBOutlet weak var totalCookies: UILabel!` | `IBOutlet` | Total cookie label.
    |

    | `@IBAction func onGenerateShortbreadCookies(_ sender: Any)` | `IBAction` | Touch
    Up Inside event of the Generate Shortbread Cookie button. |

    | `@IBAction func onGenerateChocolateChipCookies(_ sender: Any)` | `IBAction`
    | Touch Up Inside event of the Generate Chocolate chip Cookie button. |

    | `@IBAction func onGenerateGingerbreadCookies(_ sender: Any)` | `IBAction` |
    Touch Up Inside event of the Generate Gingerbread Cookie button. |

    | `@IBAction func onClearAllCookies(_ sender: Any)` | `IBAction` | Touch Up Inside
    event of the Clear All Cookies button. |


    The model layer for this project will contain a single class called `Cookie`,
    which will have a member variable `type` that can be used to differentiate between
    different types of cookies (see Figure [2-18](#A432412_1_En_2_Chapter.html#Fig18)).
    A dedicated controller class called `CookieController` will be used to manage
    the creation and storage of cookies.


    ![A432412_1_En_2_Fig18_HTML.jpg](A432412_1_En_2_Fig18_HTML.jpg)


    Figure 2-18. Model Layer


    In a more complex application, you may want to move the responsibility of creating
    cookies out of the `CookieController` class and into its own factory class.


    The view controller will make calls to relevant methods of `CookieController`
    class and update the text in the labels.


    ### Building the Cookie Class


    Delete the `CookieFactoryTests.swift` file under the `CookieFactoryTests` group
    that was created by `Xcode` when you created the project.


    Create a new Unit Test Case file called `CookieTests.swift` under the `CookieFactoryTests`
    group, and ensure that the file is a member of the `CookieFactory` test target
    (see Figure [2-19](#A432412_1_En_2_Chapter.html#Fig19)).


    ![A432412_1_En_2_Fig19_HTML.jpg](A432412_1_En_2_Fig19_HTML.jpg)


    Figure 2-19. The default `CookieTests.swift` File


    Replace the contents of the `CookieTests.swift` file with the code in Listing
    2-2.


    ```

    import XCTest

    class CookieTests: XCTestCase {

    override func setUp() {

    super.setUp()

    }

    override func tearDown() {

    super.tearDown()

    }

    func testInit_GingerbreadCookieType_DoesNotReturnNil() {

    let cookie = Cookie(.gingerbread)

    XCTAssertNotNil(cookie)

    }

    func testInit_ShortbreadCookieType_DoesNotReturnNil() {

    let cookie = Cookie(.shortbread)

    XCTAssertNotNil(cookie)

    }

    func testInit_ChocolateChipCookieType_DoesNotReturnNil() {

    let cookie = Cookie(.chocolateChip)

    XCTAssertNotNil(cookie)

    }

    func testInit_GingerbreadCookieType_SetsCookieTypeIvarCorrectly() {

    let cookie = Cookie(.gingerbread)

    XCTAssertEqual(cookie.type, .gingerbread)

    }

    func testInit_ShortbreadCookieType_SetsCookieTypeIvarCorrectly() {

    let cookie = Cookie(.shortbread)

    XCTAssertEqual(cookie.type, .shortbread)

    }

    func testInit_ChocolateChipCookieType_SetsCookieTypeIvarCorrectly() {

    let cookie = Cookie(.chocolateChip)

    XCTAssertEqual(cookie.type, .chocolateChip)

    }

    }

    ```


    Listing 2-2. `CookieTests.swift`


    You will receive several compiler errors at this point because the `Cookie` class
    does not exist yet. Observe how the tests have defined the desired interface of
    the `Cookie` class. In this particular case, the tests mandate the following:


    *   The `Cookie` class must have an initializer that accepts a type identifier.

    *   The `Cookie` class must have an instance variable called `type`.

    *   The type identifier can have one of three possible values: `.chocolateChip`,
    `.gingerbread`, and `.shortbread`.


    Create a new Swift class called `Cookie` under the `CookieFactory` group and update
    its contents to match Listing 2-3.


    ```

    import Foundation

    enum cookieType {

    case shortbread

    case gingerbread

    case chocolateChip

    }

    class Cookie : NSObject {

    var type:cookieType

    init(_ type:cookieType) {

    self.type = type

    super.init()

    }

    }

    ```


    Listing 2-3. `Cookie.swift`


    Ensure that `Cookie.swift` is a member of both the main and test targets. This
    is because you intend to use `Cookie.swift` in both the app that you are building
    as well as the unit tests (see Figure [2-20](#A432412_1_En_2_Chapter.html#Fig20)).


    ![A432412_1_En_2_Fig20_HTML.jpg](A432412_1_En_2_Fig20_HTML.jpg)


    Figure 2-20. Inspecting the Target Membership of the `Cookie.swift` file


    Save the file and use the `Product ➤ Test` menu item to run all tests. You should
    see all tests pass (see Figure [2-21](#A432412_1_En_2_Chapter.html#Fig21)).


    ![A432412_1_En_2_Fig21_HTML.jpg](A432412_1_En_2_Fig21_HTML.jpg)


    Figure 2-21. Test Inspector Showing All Tests Passing


    ### Building the CookieController Class


    Create a new Unit Test Case file called `CookieControllerTests.swift` under the
    `CookieFactoryTests` group, and ensure that the file is a member of the test target.
    Replace the contents of the `CookieControllerTests.swift` file with the code in
    Listing 2-4.'
  raw: '### Code Coverage Reports


    A code coverage report can be used to get a measure of the number of lines of
    source code that are executed after a group of tests have run. Code coverage reports
    are not enabled by default in Xcode 8 . To enable code coverage reports, access
    the scheme settings dialog box by using the Product ➤ Scheme ➤ Edit Scheme menu
    item (see Figure [2-16](#A432412_1_En_2_Chapter.html#Fig16)).


    ![A432412_1_En_2_Fig16_HTML.jpg](A432412_1_En_2_Fig16_HTML.jpg)


    Figure 2-16.


    Xcode Scheme Settings


    Click on the Test action, enable the Gather Coverage Data option, and click on
    Close. Code coverage reports can also be accessed via the report navigator. To
    generate code coverage reports, Xcode will have to collect data as your tests
    are being executed. Each subsequent run of your test code will update the coverage
    report although you may need to run your tests a couple of times before initial
    coverage reports are available.


    ## Building the Cookie Factory App


    In the previous section you were introduced to the different aspects of the Xcode
    user interface that pertain to unit testing. In this section you add features
    to the CookieFactory project that you have created earlier. The user interface
    for the finished app has been presented in Figure [2-1](#A432412_1_En_2_Chapter.html#Fig1).


    Each time the user taps on one of the buttons, a cookie of a specific type is
    created and appropriate labels are updated on the user interface.


    To get started, ensure the CookieFactory project is opened in Xcode and the application’s
    main storyboard file is open for editing. Add four buttons and four labels to
    the default scene of the application’s storyboard and position them to resemble
    Figure [2-17](#A432412_1_En_2_Chapter.html#Fig17).


    ![A432412_1_En_2_Fig17_HTML.jpg](A432412_1_En_2_Fig17_HTML.jpg)


    Figure 2-17.


    View Controller Scene from the Main Storyboard File


    Create outlets and actions in the ViewController.swift file and connect them to
    their respective user interface elements as described in Table [2-1](#A432412_1_En_2_Chapter.html#Tab1).


    Table 2-1.


    View Controller Outlets and Actions


    | Name | Type | User Interface Element |

    | --- | --- | --- |

    | `@IBOutlet weak var shortbreadCookies: UILabel!` | IBOutlet | Shortbread cookie
    label. |

    | `@IBOutlet weak var chocolateChipCookies: UILabel!` | IBOutlet | Chocolate chip
    cookie label. |

    | `@IBOutlet weak var gingerbreadCookies: UILabel!` | IBOutlet | Gingerbread cookie
    label. |

    | `@IBOutlet weak var totalCookies: UILabel!` | IBOutlet | Total cookie label.
    |

    | `@IBAction func onGenerateShortbreadCookies(_ sender: Any)` | IBAction | Touch
    Up Inside event of the Generate Shortbread Cookie button. |

    | `@IBAction func onGenerateChocolateChipCookies(_ sender: Any)` | IBAction |
    Touch Up Inside event of the Generate Chocolate chip Cookie button. |

    | `@IBAction func onGenerateGingerbreadCookies(_ sender: Any)` | IBAction | Touch
    Up Inside event of the Generate Gingerbread Cookie button. |

    | `@IBAction func onClearAllCookies(_ sender: Any)` | IBAction | Touch Up Inside
    event of the Clear All Cookies button. |


    The model layer for this project will contain a single class called `Cookie`,
    which will have a member variable type that can be used to differentiate between
    different types of cookies (see Figure [2-18](#A432412_1_En_2_Chapter.html#Fig18)).
    A dedicated controller class called `CookieController` will be used to manage
    the creation and storage of cookies.


    ![A432412_1_En_2_Fig18_HTML.jpg](A432412_1_En_2_Fig18_HTML.jpg)


    Figure 2-18.


    Model Layer


    In a more complex application, you may want to move the responsibility of creating
    cookies out of the `CookieController` class and into its own factory class.


    The view controller will make calls to relevant methods of `CookieController`
    class and update the text in the labels.


    ### Building the Cookie Class


    Delete the CookieFactoryTests.swift file under the CookieFactoryTests group that
    was created by Xcode when you created the project.


    Create a new Unit Test Case file called CookieTests.swift under the CookieFactoryTestsGroup,
    and ensure that the file is a member of the CookieFactory test target (see Figure
    [2-19](#A432412_1_En_2_Chapter.html#Fig19)).


    ![A432412_1_En_2_Fig19_HTML.jpg](A432412_1_En_2_Fig19_HTML.jpg)


    Figure 2-19.


    The default CookieTests.Swift File


    Replace the contents of the CookieTests.swift file with the code in Listing [2-2](#A432412_1_En_2_Chapter.html#Par37).


    ```

    import XCTest

    class CookieTests: XCTestCase {

    override func setUp() {

    super.setUp()

    }

    override func tearDown() {

    super.tearDown()

    }

    func testInit_GingerbreadCookieType_DoesNotReturnNil() {

    let cookie = Cookie(.gingerbread)

    XCTAssertNotNil(cookie)

    }

    func testInit_ShortbreadCookieType_DoesNotReturnNil() {

    let cookie = Cookie(.shortbread)

    XCTAssertNotNil(cookie)

    }

    func testInit_ChocolateChipCookieType_DoesNotReturnNil() {

    let cookie = Cookie(.chocolateChip)

    XCTAssertNotNil(cookie)

    }

    func testInit_GingerbreadCookieType_SetsCookieTypeIvarCorrectly() {

    let cookie = Cookie(.gingerbread)

    XCTAssertEqual(cookie.type, .gingerbread)

    }

    func testInit_ShortbreadCookieType_SetsCookieTypeIvarCorrectly() {

    let cookie = Cookie(.shortbread)

    XCTAssertEqual(cookie.type, .shortbread)

    }

    func testInit_ChocolateChipCookieType_SetsCookieTypeIvarCorrectly() {

    let cookie = Cookie(.chocolateChip)

    XCTAssertEqual(cookie.type, .chocolateChip)

    }

    }

    Listing 2-2.

    CookieTests.swift

    ```


    You will receive several compiler errors at this point because the Cookie class
    does not exist yet. Observe how the tests have defined the desired interface of
    the Cookie class. In this particular case, the tests mandate the following:


    *   The Cookie class must have an initializer that accepts a type identifier.

    *   The Cookie class must have an instance variable called type.

    *   The Type identifier can have one of three possible values: `.chocolateChip`,
    `.gingerbread`, and `.shortbread`.


    Create a new Swift class called Cookie under the CookieFactory group and update
    its contents to match Listing [2-3](#A432412_1_En_2_Chapter.html#Par63).


    ```

    import Foundation

    enum cookieType {

    case shortbread

    case gingerbread

    case chocolateChip

    }

    class Cookie : NSObject {

    var type:cookieType

    init(_ type:cookieType) {

    self.type = type

    super.init()

    }

    }

    Listing 2-3.

    Cookie.swift

    ```


    Ensure that Cookie.swift is a member of both the main and test targets . This
    is because you intend to use CookieClass.swift in both the app that you are building
    as well as the unit tests (see Figure [2-20](#A432412_1_En_2_Chapter.html#Fig20)).


    ![A432412_1_En_2_Fig20_HTML.jpg](A432412_1_En_2_Fig20_HTML.jpg)


    Figure 2-20.


    Inspecting the Target Membership of the Cookie.swift file


    Save the file and use the Product ➤ Test menu item to run all tests. You should
    see all tests pass (see Figure [2-21](#A432412_1_En_2_Chapter.html#Fig21)).


    ![A432412_1_En_2_Fig21_HTML.jpg](A432412_1_En_2_Fig21_HTML.jpg)


    Figure 2-21.


    Test Inspector Showing All Tests Passing


    ### Building the CookieController Class


    Create a new Unit Test Case file called CookieControllerTests.swift under the
    CookieFactoryTests group, and ensure that the file is a member of the test target.
    Replace the contents of the CookieControllerTests.swift file with the code in
    Listing [2-4](#A432412_1_En_2_Chapter.html#Par67).'
