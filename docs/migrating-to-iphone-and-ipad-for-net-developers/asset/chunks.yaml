  trans: '

    ### 发布你的应用


    在你的本地设备上测试完应用后，就可以准备将其发布到其他设备上了。这里有两种选择：即席部署或通过 App Store 部署。首先需要注意的是，你需要为每种方式准备预置描述文件，这些文件可以通过预置描述文件页面轻松设置，如图
    9-24 所示。


    ![images](img/0924.jpg)


    **图 9-24.** *预置描述文件页面上的分发描述文件*


    如图所示，我已经为即席部署和 App Store 部署都创建了一个分发描述文件。稍后我将在 Xcode 中使用它们。


    #### 通过即席机制发布


    即席机制允许你通过电子邮件或互联网作为分发机制，将应用分发给多达 100 名其他 iPad、iPhone 或 iPod Touch 用户。用户可以从那里下载并安装应用。


    首先要注意的是，你的应用必须使用配置为即席部署的描述文件进行构建。你可以通过预置描述文件页面来完成此操作。在应用的代码签名构建配置中，选择即席描述文件进行构建，然后像之前一样构建应用。


    构建完成后，你需要同时分发应用（通常是归档文件）和即席分发描述文件（`.mobileprovision` 文件），以便其他用户安装。


    安装用户将这些文件拖入 iTunes 的“应用”文件夹。如果应用是归档文件，他们需要解压文件以得到 `.app` 二进制文件，然后将该文件拖入。


    之后，应用便可以通过 iTunes 的同步功能像往常一样与设备同步。此时应用应已准备就绪，可以在设备上运行。


    #### 通过 App Store 发布


    要将应用发布到 App Store，你需要遵循类似的流程：应用必须使用 App Store 预置描述文件进行构建和签名。为此，你需遵循相同的说明，在 Xcode
    中更改构建设置，使其在编译时对你的应用进行签名，但这次请选择 App Store 预置描述文件。


    构建完成后，你就可以准备向 App Store 提交应用了。为此，请从 Apple 开发者页面进入“成员中心”。在主页上，预置门户链接正下方，你会看到 iTunes
    Connect 的链接。如果你想直接跳转，可以在你常用的浏览器中访问 [`https://itunesconnect.apple.com`](https://itunesconnect.apple.com)。


    **但是等等！**


    ##### 准备提交应用到 App Store


    在提交应用之前，为了最大程度确保成功通过审核，我建议你最后再仔细阅读一遍 iOS App Store 审核指南。这份资源不薄，但苹果公司保留拒绝任何不符合要求的应用的权利。你可以通过
    [`https://developer.apple.com/appstore/resources/approval/guidelines.html`](https://developer.apple.com/appstore/resources/approval/guidelines.html)
    或成员中心找到这份指南。事实上，有一个非常好的资源中心，提供了各种帮助你向 App Store 提交应用的信息，地址是 [`https://developer.apple.com/appstore/`](https://developer.apple.com/appstore/)。


    除了应用二进制文件，你还需要填写许多与应用相关的属性信息。你最好提前准备好这些信息，因为后面都会用到。它们是：


    *   应用名称

    *   应用描述

    *   主要和次要类别

    *   子类别

    *   版权信息

    *   应用评级

    *   关键词

    *   SKU 编号

    *   应用 URL

    *   屏幕截图

    *   支持 URL

    *   支持邮箱地址

    *   最终用户许可协议

    *   定价、可用日期、销售区域

    *   OS 二进制文件：包括适用于 iPhone 和 iPod touch 的 57px 和可选的 114px 高清图标，或通过 iTunes Connect
    提交的适用于 iPad 的 50px 和 72px 图标


    iTunes Connect 是一套基于 Web 的工具，供你通过 App Store 提交和管理应用。在 iTunes Connect 中，你可以检查合同状态、管理
    iTunes Connect 和测试用户、获取销售和财务报告、查看应用崩溃日志、申请促销代码等等。


    这套工具非常全面，因此我不打算详细讲解其所有功能。有一份非常优秀的开发者指南可以为你代劳，下载地址是 [`https://itunesconnect.apple.com/docs/iTunesConnect_DeveloperGuide.pdf`](https://itunesconnect.apple.com/docs/iTunesConnect_DeveloperGuide.pdf)。


    不过，在假设你已经完成了前面提到的所有准备工作后，我将带你了解向 App Store 提交应用的基本流程。


    所以，再次访问 [`https://itunesconnect.apple.com`](https://itunesconnect.apple.com) 并登录。登录后，你将看到
    iTunes Connect 主页，如图 9-25 所示。


    ![images](img/0925.jpg)


    **图 9-25.** *iTunes Connect 主页*


    进入主页后，选择“管理你的应用”链接。这允许你管理 App Store 中的应用并添加新应用。首次进入此页面时，列表将是空的。这是因为你还没有上传任何应用。你可以在图
    9-26 中看到这一点。


    ![images](img/0926.jpg)


    **图 9-26.** *空的应用列表*


    点击“添加新应用”按钮。系统会提示你输入与应用相关的信息。需要提醒的是，他们要求的信息非常多，因此我建议你在开始上传之前就准备好这些信息。


    我不打算列出所有字段及其含义，因为数量很多，而且如前所述，iTunes Connect 开发者指南对这些信息及其用途做了非常详尽的描述。


    输入所需信息后，系统会要求你上传一些二进制文件。这些文件包括与应用相关的各种图片，例如应用图标和屏幕截图。当所有信息输入完毕、图片资源上传完成后，你将进入应用摘要页面。在此页面的右侧还有一些额外的按钮，允许你管理关于应用的进一步信息，例如本地化和定价。

    '
- fmt: '### Uploading Your Application Binary


    On the Version Details page, click the `Ready to Upload Binary` button. You''ll
    have to answer some final questions about Export Compliance. Then, depending on
    whether you are adding a new application or updating one already uploaded, you''ll
    be taken to the Application Loader Instruction page or the Version Release Control
    page accordingly.


    If you are using iOS SDK 3.2 or later, you already have `Application Loader` stored
    on your computer in your Utilities folder at `/Developer/Applications/Utilities/Application
    Loader.app`.


    You also have the option of delivering from Xcode, which also happens to utilize
    the same `Application Loader` technology. See the `Using Application Loader` section
    in the developer guide to learn more about how to deliver your binary using this
    mechanism.


    Once the `Application Loader` has been started, you be presented with a screen
    like the one in [Figure 9–27](#Chapter09.html#fig_9_27).


    ![images](images/0927.jpg)


    **Figure 9–27.** *Application Loader start screen*


    Once you hit `Next`, you''ll be asked to enter your login details, and then the
    application will provide you with a list of applications it is expecting an upload
    for. If you didn''t successfully complete the process of adding your application
    via the `iTunes Connect` page, you''ll see a screen similar to that in [Figure
    9–28](#Chapter09.html#fig_9_28).


    ![images](images/0928.jpg)


    **Figure 9–28.** *No eligible applications were found.*


    This indicates that you''ve not added your application through `iTunes Connect`,
    or if you thought you had, it failed. If you did upload the list correctly, you
    will be prompted to choose an application from the drop-down list, which contains
    all the applications you''ve uploaded. Choose the appropriate application from
    the list, as shown in [Figure 9–29](#Chapter09.html#fig_9_29).


    ![images](images/0929.jpg)


    **Figure 9–29.** *Choosing your App Store application binary to upload*


    Once you''ve chosen the application you''re adding to the App Store and click
    `Next`, you''ll be asked to complete a series of questions. These include confirmation
    that you''ve tested and qualified the binary on iOS, and then you will be asked
    to choose the binary for the application to upload. Using the `Choose` button,
    select your application package (this is your application compressed into a single
    `.zip` file), as shown in [Figure 9–30](#Chapter09.html#fig_9_30).


    ![images](images/0930.jpg)


    **Figure 9–30.** *Choosing your application package to upload*


    Once chosen, you will be presented with the summary screen shown in [Figure 9–31](#Chapter09.html#fig_9_31).
    You''ll have the option to submit the application by selecting the `Send` button
    or cancel the whole process. Select the `Send` button.


    ![images](images/0931.jpg)


    **Figure 9–31.** *Summary Application submission screen*


    This will then submit your application to the App Store, showing a screen similar
    to that in [Figure 9–32](#Chapter09.html#fig_9_32).


    ![images](images/0932.jpg)


    **Figure 9–32.** *Submitting your application to the App Store*


    Once uploaded successfully, you will see a screen confirming this and reminding
    you that you will receive an e-mail confirming the upload and at any point, you
    can use `iTunes Connect` to track its process through the Apple approval process.


    ### Additional Resources


    The process of submitting your application is now complete. You have tested your
    application using Xcode features such as unit testing, the iOS Simulator, and
    real-world device testing. You have also submitted your application to the App
    Store. However, the themes of testing and iPhone marketing/submission are significant
    topics, so I''ve highlighted some additional reading material that explores these
    topics in much more detail.


    *   *Design Driven Testing: Test Smarter, Not harder* (ISBN13: 978-1-4302-2943-8)
    brings sanity back to software development by restoring the concept of using testing
    to verify a design instead of pretending that unit tests are a replacement for
    design.

    *   *The Business of iPhone and iPad App Development: Making and Marketing Apps
    that Succeed* (ISBN13: 978-1-4302-3300-8) shows you how to incorporate marketing
    and business savvy into every aspect of your iPhone and iPad apps design and development
    process.


    These resources are in addition to those included as part of the Apple Developer
    Program and iOS Development Centre (see [`http://developer.apple.com`](http://developer.apple.com)).


    ### Summary


    In this chapter you learned how to test your application using features found
    in both Xcode and the Simulator. You also learned how to get your machine, including
    your Xcode installation, ready for provisioning applications to your own device
    as well as provisioning using the two mechanisms recognized by Apple: Adhoc and
    the App Store.


    You looked at how to set up local certificates and Provisioning Profiles to make
    this possible and how to use both the Provisioning Portal and iTunes Connect on
    the home page of the Member Center. After successfully deploying to your local
    device, you briefly looked at how to provision using the Adhoc method and then
    you looked in detail at using iTunes Connect to provision an application to the
    App Store.


    You are now ready to make millions of dollars (hopefully!) using the guidance
    provided in this book to both create your iOS-based application and submit it
    to the App Store for others to purchase.


    ## Chapter 10


    ## Extend Your Skills: Advanced Features


    In this chapter you take a look at some of the more advanced features available
    through the SDK and as part of the associated Apple tools. These features build
    on the experience you''ve gained so far but look at capabilities specific to certain
    devices and, in some cases, how you can target more than one iOS-based device
    with a single code base. You also consider the future for iOS development technologies.


    Specifically in this chapter you look at the following:


    *   Using your device''s Global Positioning System (GPS)

    *   Exploiting your device''s camera

    *   Using the accelerometer

    *   Detecting gestures

    *   Writing multidevice-compatible code

    *   What''s on the horizon for iOS development


    ### Using the Global Positioning System


    Your iOS device, when fitted with a Global Positioning System (GPS), has the ability
    to determine its location anywhere in the world. There are other methods available
    for determining your location, but GPS is by far the most accurate. The iOS SDK
    exposes a variety of location-based services and determines which mechanisms to
    use under the hood. This means you don''t have to concern yourself with the different
    technologies; you simply state some characteristics such as desired accuracy,
    and the device does its best.'
