- fmt: "**Figure 2–14.** *Changing the label control's name*\n\nIn addition to adding\
    \ this label control to our canvas, we need to be able to reference it within\
    \ our code. To do this, we must bind an object to this control object. In the\
    \ `HellowWorldViewController` header file, add a `UILabel` object reference called\
    \ `label`, as follows:\n\n```\nUILabel *label;\n```\n\nNow let's create a property\
    \ of the same name to point at the object. We'll make this a synthesized property\
    \ to ensure that Xcode creates our getters and setters automatically.\n\n```\n\
    @property (nonatomic, retain) IBOutlet UILabel *label;\n```\n\nNote the `IBOutlet`\
    \ markup in this property definition. This acts as a marker for Interface Builder\
    \ to identify properties, which can be linked to user interface elements, and\
    \ Interface Builder will use these elements to display in the Outlets pane. So,\
    \ our `HellowWorldViewController.h` file should now have the following implementation:\n\
    \n```\n#import <UIKit/UIKit.h>\n\n@interface HelloWorldViewController : UIViewController\
    \ {\n\n    UILabel *label;\n}\n\n@property (nonatomic, retain) IBOutlet UILabel\
    \ *label;\n\n@end\n```\n\nOf course, this isn't enough. We've simply provided\
    \ the code for our header and defined our intent. Now we need to add the actual\
    \ implementation in the `HelloWorldViewController` implementation file. We start\
    \ by completing our property and ensuring that it is synthesized with the following\
    \ line of code after the `@implementation` tag:\n\n```\n@synthesize label;\n```\n\
    \nWe also need to ensure that when our view controller object is removed from\
    \ memory, we deallocate the memory taken up by the label. This is achieved by\
    \ sending the `release` message to the `label` object. Your `dealloc` method should\
    \ look like the following (with our new line highlighted):\n\n```\n- (void)dealloc\n\
    {\n    [label release];\n    [super dealloc];\n}\n```\n\nFinally, we want to set\
    \ the label's value to the text \"Hello, World.\" A convenient event in which\
    \ to do this is `viewDidLoad`, which is fired after the application has been initialized\
    \ and the view loaded, but before it's displayed. We need to add a line of code\
    \ to set the label's value in our `viewDidLoad` method. After the comments around\
    \ it are removed, your code should look as follows (with the new line highlighted):\n\
    \n```\n- (void)viewDidLoad\n{\n    label.text = @\"Hello, World\";\n    [super\
    \ viewDidLoad];\n}\n```\n\nIf you built your application now and ran it, it would\
    \ work, but the label's text wouldn't change. Why?\n\nWe've defined our internal\
    \ `UILabel` object called `label`, created a property to reference it by, and\
    \ even set this property's text value to \"Hello, World.\" But we have not yet\
    \ associated the label on our user interface with our classes object. So it works,\
    \ but it isn't pointing to our visible label.\n\nThis is easily fixed (in fact,\
    \ even more easily fixed in Xcode 4 and the new Interface Builder than previous\
    \ versions). You simply need to associate the two together graphically by dragging\
    \ the outlet for the control to the actual control on the canvas, as shown in\
    \ [Figure 2–15](#Chapter02.html#fig_2_15).\n\n![images](images/0215.jpg)\n\n**Figure\
    \ 2–15.** *Linking UI elements to your code*\n\nThis completes our application.\
    \ We are safe in the knowledge that not only does it display the required text,\
    \ but it is also behaving as a \"good citizen\" by releasing memory and object\
    \ references when they are no longer required.\n\nLet's build and run the application\
    \ by using the ⌘R hotkey, which will launch the iPhone simulator to test it. It\
    \ should compile without any problems, and the iPhone simulator should start with\
    \ your new iPhone application running in it, as shown in [Figure 2–16](#Chapter02.html#fig_2_16).\n\
    \nOK, so it's not going to make you rich if submitted to the App Store, since\
    \ it doesn't do much. But what it does do is cover the basic principles of writing\
    \ an iPhone application. This will provide a great foundation for upcoming chapters\
    \ in the book, where you'll discover more about creating iOS applications with\
    \ different tools and technologies.\n\n![images](images/0216.jpg)\n\n**Figure\
    \ 2–16.** *Running your first iPhone application*\n\n### Using Automatic Reference\
    \ Counting\n\nThe example presented in this chapter has taken the traditional\
    \ approach to memory management and has left the onus on the programmer to `retain`\
    \ and `release` (or `autorelease`) the objects and the memory they consume. Xcode\
    \ 4.2 and iOS 5 offer a new feature called *automatic reference counting* (ARC),\
    \ which simplifies memory management.\n\nInstead of you having to remember when\
    \ to use `retain`, `release`, and `autorelease`, ARC evaluates the lifetime requirements\
    \ of your objects and automatically inserts the appropriate method calls for you\
    \ at compile time. The compiler also generates the appropriate `dealloc` methods\
    \ to free up memory that is no longer required. Essentially, ARC is a precompilation\
    \ stage that adds the necessary code you previously would have had to insert manually.\n\
    \n#### Why Use It?\n\nIf you're new to Objective-C, you will welcome ARC, because\
    \ it greatly simplifies memory management. There is more than enough to learn\
    \ without worrying about the complexities of memory management.\n\nHowever, if\
    \ you are comfortable with self-memory management, perhaps from experience in\
    \ lower-level languages such as C or C++, then you might want to stick with it.\
    \ One reason is that libraries that have yet to be converted to using ARC don't\
    \ always play well with ARC-based code. In addition, manually managing memory,\
    \ providing you know what you're doing, can be more performant.\n\n#### Enabling\
    \ ARC\n\nTo enable ARC, you must either choose it when you first create your project\
    \ or add the appropriate compiler flag found by setting the value Objective-C\
    \ Automatic Reference Counting in the compiler's build settings. It is possible\
    \ to selectively choose which files use the ARC compiler features through the\
    \ Compile Sources section under the project's Build Phases tab, although I don't\
    \ recommend it unless you want to highly tune your application's performance.\n\
    \n#### Migrating to ARC\n\nIf you already have projects, or source code, you want\
    \ to convert to using ARC but don't want to trawl through the source code removing\
    \ all the memory management keyword references, then thankfully Xcode provides\
    \ a migration tool to do the conversion for you. Open your project for conversion,\
    \ select Edit ![images](images/U001.jpg) Refactor, and then choose the Convert\
    \ to Objective-C ARC… option. This will refactor (convert) your code so that it\
    \ uses ARC features. Easy!\n\n#### Programming with ARC\n\nOnce you've switched\
    \ on ARC, you must follow certain rules. The rules can get quite complex, but\
    \ the Apple documentation does a good job of explaining them. In summary, either\
    \ you use ARC or you don't; you can mix flavors of memory management. For example,\
    \ don't switch on ARC and then start to sporadically `retain` or `dealloc` memory.\
    \ You can define whether your property is strongly or weakly typed. `strong` (the\
    \ default) is a reference that is retained for the lifetime of its scope (typically\
    \ defined as the curly braces), and `weak` means it can be released at any time\
    \ when no longer considered as used (and set to `nil` when released)."
