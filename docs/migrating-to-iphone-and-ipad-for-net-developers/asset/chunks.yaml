    \ UILabel *label;\n```\n\n请注意此属性定义中的`IBOutlet`标记。它作为 Interface Builder 的标记，用于识别那些可以与用户界面元素关联的属性，并且\
    \ Interface Builder 会使用这些元素在“插座变量 (Outlets)”窗格中显示。因此，我们的`HellowWorldViewController.h`文件现在应该包含以下实现：\n\
    \n```\n#import <UIKit/UIKit.h>\n\n@interface HelloWorldViewController : UIViewController\
    \ {\n\n    UILabel *label;\n}\n\n@property (nonatomic, retain) IBOutlet UILabel\
    \ *label;\n\n@end\n```\n\n当然，这还不够。我们只是为头文件提供了代码并定义了意图。现在我们需要在`HelloWorldViewController`实现文件中添加实际的实现。首先，我们在`@implementation`标记之后添加下面这行代码来完成属性声明，并确保它被合成：\n\
    \n```\n@synthesize label;\n```\n\n我们还需要确保当视图控制器对象从内存中移除时，能够释放标签所占用的内存。这可以通过向`label`对象发送`release`消息来实现。你的`dealloc`方法应该如下所示（我们新添加的行已高亮显示）：\n\
    \n```\n- (void)dealloc\n{\n    [label release];\n    [super dealloc];\n}\n```\n\
    \n最后，我们想要将标签的值设置为文本 \"Hello, World.\"。一个方便执行此操作的时机是`viewDidLoad`方法，它在应用程序初始化完毕且视图加载后、显示前被触发。我们需要在`viewDidLoad`方法中添加一行代码来设置标签的值。移除其周围的注释后，你的代码应该如下所示（新添加的行已高亮显示）：\n\
    \n```\n- (void)viewDidLoad\n{\n    label.text = @\"Hello, World\";\n    [super\
    \ viewDidLoad];\n}\n```\n\n如果你现在构建并运行你的应用程序，它虽然能工作，但标签的文本不会改变。为什么呢？\n\n我们已经定义了一个名为`label`的内部`UILabel`对象，创建了一个属性来引用它，甚至将这个属性的文本值设置为了\
    \ \"Hello, World.\"。但我们还没有将用户界面上的标签与我们的类对象关联起来。所以代码虽然能运行，但它并没有指向我们可见的标签。\n\n这个问题很容易解决（实际上，在\
    \ Xcode 4 和新的 Interface Builder 中比旧版本更容易）。你只需通过图形化的方式将控件的插座变量拖拽到画布上的实际控件，将两者关联起来，如图\
    \ 2-15 所示。\n\n![images](img/0215.jpg)\n\n**图 2-15.** *将 UI 元素链接到代码*\n\n至此，我们的应用程序就完成了。我们很放心，因为它不仅显示了所需的文本，而且通过在不需时释放内存和对象引用，表现得像一个“好公民”。\n\
    \n让我们使用 ⌘R 热键构建并运行应用程序，这将启动 iPhone 模拟器进行测试。它应该能毫无问题地编译通过，并且 iPhone 模拟器启动后，你的新\
    \ iPhone 应用程序会在其中运行，如图 2-16 所示。\n\n好吧，如果将它提交到 App Store，它不太可能让你发财，因为它功能不多。但它确实涵盖了编写\
    \ iPhone 应用程序的基本原则。这将为本书后续章节打下良好基础，你将在其中探索更多使用不同工具和技术创建 iOS 应用的知识。\n\n![images](img/0216.jpg)\n\
    \n**图 2-16.** *运行你的第一个 iPhone 应用程序*\n\n### 使用自动引用计数\n\n本章提供的示例采用了传统的内存管理方法，将`retain`和`release`（或`autorelease`）对象及其所占内存的责任留给了程序员。Xcode\
    \ 4.2 和 iOS 5 提供了一个名为*自动引用计数* (ARC) 的新特性，它简化了内存管理。\n\n你无需再记住何时使用`retain`、`release`和`autorelease`，ARC\
    \ 会评估你的对象的生命周期需求，并在编译时自动为你插入适当的方法调用。编译器还会生成适当的`dealloc`方法来释放不再需要的内存。本质上，ARC 是一个预编译阶段，它会添加你之前必须手动插入的必要代码。\n\
    \n#### 为什么要使用它？\n\n如果你是 Objective-C 新手，你会欢迎 ARC，因为它极大地简化了内存管理。要学的东西已经够多了，不用再为内存管理的复杂性而烦恼。\n\
    \n然而，如果你熟悉手动内存管理（也许是因为有 C 或 C++ 等底层语言的经验），那么你可能更愿意坚持使用它。一个原因是，那些尚未转换到 ARC 的库并不总是能与基于\
    \ ARC 的代码良好协作。此外，如果你知道自己在做什么，手动管理内存可能性能更优。\n\n#### 启用 ARC\n\n要启用 ARC，你可以在首次创建项目时选择它，或者在编译器的构建设置中，将“Objective-C\
    \ Automatic Reference Counting”的值设置为“Yes”来添加相应的编译器标志。通过项目的“Build Phases”标签下的“Compile\
    \ Sources”部分，你可以有选择性地决定哪些文件使用 ARC 编译器特性，但我不推荐这样做，除非你想高度优化应用程序的性能。\n\n#### 迁移到\
    \ ARC\n\n如果你已有项目或源代码想要转换到 ARC，但又不想费力地在源代码中删除所有内存管理关键字引用，那么幸运的是，Xcode 提供了一个迁移工具来为你完成转换。打开要转换的项目，选择\
    \ Edit ![images](img/U001.jpg) Refactor，然后选择 Convert to Objective-C ARC… 选项。这将重构（转换）你的代码，使其使用\
    \ ARC 特性。很简单！\n\n#### 使用 ARC 进行编程\n\n一旦你启用了 ARC，就必须遵循某些规则。这些规则可能相当复杂，但苹果的文档对它们进行了很好的解释。总之，要么你使用\
    \ ARC，要么你不使用；你不能混合使用不同的内存管理风格。例如，不要启用 ARC 后又开始零散地`retain`或`dealloc`内存。你可以定义你的属性是强类型还是弱类型。`strong`（默认值）是一个引用，在其作用域（通常定义为花括号）内被持有；而`weak`意味着当它被认为不再被使用时，可以在任何时候被释放（并在释放时被设置为`nil`）。"
- fmt: '### Summary


    In this chapter, we began by taking a look at the requirements for running `Xcode`
    4, by far the easiest method for developing iOS applications. We considered what
    kind of hardware you might need, and then proceeded to explore how to obtain and
    install the `Xcode` suite of applications.


    Next, the chapter provided an overview of the `Xcode` suite and a primer in Objective-C,
    covering the basic tenets you should know for developing your first iPhone application.
    We even looked at some of the more recent features such as Automatic Reference
    Counting.


    We then built an iPhone application. We used `Xcode`''s project templates to get
    a head start. We also used some of `Xcode`''s new features to link user interface
    components to code objects. Once everything was wired up together, we were able
    to build the application and test it within the iPhone simulator.


    Phew! Now you''re an iOS application developer using Apple''s native tools such
    as the iOS SDK and `Xcode` 4\. In the next chapters, you''ll discover that this
    isn''t the only development option. Now that you have a foundation in writing
    basic applications, we''ll proceed to develop more functionally rich applications
    using some of the other options available.


    ## Chapter 3


    ## Understand Your Options: Using Third-Party Solutions and MonoTouch


    In previous chapters, we''ve looked at the iOS operating system, the SDK and associated
    tools, and how you can use `Xcode` 4 with the iOS SDK to develop your first iPhone
    application. But as described in [Chapter 1](#Chapter01.html#ch1), options other
    than Apple''s native tools are available for developing applications. This chapter
    elaborates on some of the third-party options introduced in [Chapter 1](#Chapter01.html#ch1)
    and describes how to create the Hello, World application using them.


    We won''t cover all of the third-party options available, not least because of
    space considerations, but also because it''s a constantly changing environment,
    with new options being introduced all the time. In this chapter, we''ll focus
    on some of the more common and longer-standing options:


    *   Using the .NET Framework with `MonoTouch`

    *   Using JavaScript with Appcelerator''s `Titanium Studio` and Mobile SDK

    *   Using `Xcode` with the `Marmalade SDK`


    After you''ve become comfortable with developing our Hello, World application
    using each of the options covered in this chapter, we can then look at different
    elements of the iOS and a more advanced application in more detail in the remainder
    of the book.


    ### Understanding the Constraints


    Before we get started with the third-party options, it''s worth understanding
    some principle constraints:


    *   **Native apps require a Mac**: To write and execute native iOS applications,
    you will need a Mac.

    *   **SDK completeness**: Third-party options such as `Mono` provide a layer on
    top of the existing iOS SDK, but often have not gotten around to implementing
    *all* of its functionality. So if you want to have a complete implementation of
    the API, you need to either work around gaps in a third-party''s implementation
    or attempt to write your own implementation.

    *   **Speed**: If you want to fully exploit the power of your iOS device, there
    is no substitute for writing your application in Objective-C directly on top of
    the SDK. While other options work, they introduce layers of abstraction that will
    slow down your application.


    Having painted a relatively bleak picture of the third-party options, it is important
    to point out that some are extremely viable. This is especially true of the `Mono`
    implementation, which offers the most complete implementation of the iOS SDK''s
    API in a familiar language. Speed is typically not an issue.


    ### Developing with Mono and MonoTouch


    You should know by now that the focus of this book is to support you in developing
    applications for Apple''s mobile devices using a variety of methods, but with
    an emphasis on reusing your existing .NET knowledge and skills.


    The success of the .NET Framework on the Microsoft Windows operating system didn''t
    go unnoticed within the open source community. There are many who wished that
    .NET was available for not only Windows, but also for other operating systems,
    such as Linux and Mac OS X. Thankfully, someone did something about this. Miguel
    de Icaza took it upon himself, and then with community support, to bring .NET
    to these operating systems, allowing you write .NET applications for a multitude
    of platforms. And it didn''t stop there. Soon the `SharpDevelop` IDE was ported
    to `Mono`, and `MonoDevelop` was formed, creating a Visual Studio-type IDE that
    is able to target not only .NET applications, but also C, C++, Python, and Java.


    So, you have the .NET Framework, support for .NET languages such as C#, and a
    powerful IDE, and it was only logical for the mobile revolution to be supported!
    In fact, they went further. Not only was `MonoTouch` introduced, providing a mechanism
    to create C#- and .NET-based applications for the iPhone, but they also introduced
    `MonoMac`. `MonoMac` is an interesting development for creating Cocoa applications
    on Mac OS X using `Mono`. (For more information, visit [`http://www.mono-project.com/MonoMac`](http://www.mono-project.com/MonoMac).)
    `MonoDroid` has also been released, based on the same principles as `MonoTouch`
    but to target the Android operating system.


    Enough of `MonoMac` and `MonoDroid`; let''s look at `MonoTouch`. As stated, it
    allows you to use `Mono` to develop applications for the iPhone, iPad, and iPod
    touch with the API bindings to the iOS APIs.


    Given that it''s based on the .NET Framework and supports the C# programming language,
    you .NET guys and girls should be right at home! Let''s take a look at obtaining,
    installing, and using the necessary components to write our Hello, World iPhone
    app using the `Mono` tools.


    #### Installing Mono, MonoDevelop, and MonoTouch


    To get started, you''ll need to download and install the following components.
    These components can be accessed from the Mono projects home page ([`http://www.mono-project.com/`](http://www.mono-project.com/)).


    *   **Mono**: This is the actual `Mono` framework. It includes the open source
    implementation of the .NET Framework, language support, and supporting tools.
    You can download `Mono` from [`http://www.go-mono.com/mono-downloads/download.html`](http://www.go-mono.com/mono-downloads/download.html).

    *   **MonoDevelop**: This is the IDE primarily designed for .NET and its languages
    such as C#. We''ll be using this in the same way as we used `Xcode` in the previous
    chapter, or indeed, as you would probably use Visual Studio to help build your
    applications. You can download `MonoDevelop` from [`http://monodevelop.com/Download`](http://monodevelop.com/Download).

    *   **MonoTouch**: This is where the magic happens. `MonoTouch` is an SDK for
    developing applications for the iPhone using `Mono`. Using it, you will be able
    to write applications and test them on the iPhone simulator. You can download
    the trial version or purchase the full version from [`http://monotouch.net/Store`](http://monotouch.net/Store).'
