- fmt: '### Targeting Multiple Devices with Your Code


    If you want to write a single application that targets both the iPhone and the
    iPad, it''s certainly possible—especially given that they both use iOS and the
    SDK framework. You need to detect the device and adapt your application dynamically
    to some obvious differences such as screen size; otherwise, your application will
    look very strange. You can also target more specific capabilities such as the
    iPad''s ability to use popover view controllers, but again you need to detect
    this in code in order for your application to adapt.


    There are a number of options to achieve this. You can of course use iOS SDK to
    target multiple iOS devices such as the iPhone and iPad. Additionally, if you
    want to target non–iOS-based devices, you can use one of the multiplatform third-party
    solutions discussed in [Chapter 3](#Chapter03.html#ch3)—these even target non-Apple
    devices, but, as discussed, have their limitations. Another option is to write
    a web application, which is delivered to the device through the browser; but this
    limits the functionality available to you and doesn''t work if you don''t have
    connectivity to the web server hosting the application, unless you use some of
    the more advanced offline features of HTML 5.


    Throughout the book, you''ve touched on a variety of mechanisms used for targeting
    different devices. Let''s recap them:


    - **Orientation:** Typically, all iPad applications support different orientations,
    and you should cater to this in your code. However, on the iPhone, it''s not essential
    but advisable for your application to support different orientations.

    - **Layout:** The large screen of the iPad provides more real estate for your
    application to use, and it should.

    - **Split views:** An iPad-specific view controller allows you to split your application
    into two views, each of which is configurable.

    - **Popovers:** In the same vein as split views, a popover is a unique way of
    presenting data on the iPad.

    - **Device features:** Both devices have different hardware characteristics, and
    you should remember these when designing your application.


    Here is a summary of considerations and techniques to keep in mind when you''re
    writing code that is universal for both the iPhone and the iPad:


    - **Device:** The iPad is the odd one out compared to other iOS devices, at least
    at the moment, because its screen is much larger than the iPhone or iPod Touch.
    Always consider how best to use this real estate.

    - **User interface:** To create a user interface in your code that can target
    both devices, it''s often easier to create an Interface Builder file (`.nib`)
    for each device type and dynamically load the appropriate file for each device.

    - **Classes:** You should check to see whether a particular class exists for the
    device you are targeting before going ahead and using it. You can use the `NSClassFromString()`
    method to see if a class exists in your device''s library. It returns `nil` if
    the class doesn''t exist.

    - **API capabilities:** In some cases, classes exist on both devices but their
    capabilities differ. For example, `UIGraphics` on an iPad has support for Portable
    Document Format (PDF), whereas the iPhone does not.

    - **Publishing multidevice-capable apps:** It''s important to highlight to your
    customer base that your application is multidevice capable. You can do this when
    you submit your application. A plus sign (`+`) is shown in the App Store next
    to such applications.

    - **Images:** The iPhone 4, the latest iPod Touch, and future iOS generations
    have the Retina display built in, which has increased resolution. This means apps
    look much sharper. iOS does everything it can to use the higher resolution; for
    example, text is automatically upscaled properly, as are all built-in UI components
    (buttons, sliders, navigation bars, toolbars, and so on). But it can''t upscale
    images and graphics that you provide without help. Either use specific graphics
    for both devices and add the `@2x` suffix to graphics for Retina displays (for
    example, `MyGraphic.png` for non-Retina and `MyGraphic@2x.png` for Retina), or
    in your code use manual upscaling based on points.


    ### What''s New and on the Horizon?


    So what''s next? It''s a million-dollar question, and Apple fans are always keen
    to find out. Even if Steve Jobs has decided to step down as CEO, you can bet that
    as Chairman he will still be involved in the future direction of the company.


    This section considers what might be on the horizon for Apple and for general
    development on both the iPhone and iPad. There are no guarantees, of course, but
    I hope you find it an interesting insight into what may come next. Other sources
    for such information include Apple''s World Wide Developer Conference (WWDC) 2011
    and the industry press.


    #### The iCloud


    As is the case in most of the industry, the *cloud* is playing far more of a part
    in Apple solutions today. No longer are the capabilities of the device the only
    thing your application can use—if you''re connected to a network of some description,
    including the Internet, then you can consume and use capabilities provided via
    the network on your device. For example, this might be storage, or a network-based
    service that streams video content. Your application can use the cloud to extend
    its reach beyond the local device''s capabilities to embrace such technologies
    and, for example, bring a catalogue of thousands of films onto your device.


    Apple''s iCloud contains a suite of applications that represents Apple''s functionality
    in the cloud. iTunes in the cloud is one such application, allowing you to stream
    content. It can store all your content and push it to all your devices, all from
    the cloud.


    One way of using the iCloud is to enable your code to take advantage of the user''s
    iCloud account (they need to be logged in) to synchronize data from the local
    device to the storage provided by iCloud, allowing your application to carry state
    between devices. For example, the Safari Reader stores articles you''ve saved
    for offline reading in the iCloud, making them available to both the iPhone and
    iPad you may be lucky enough to own.


    #### iOS 5


    It''s not like iOS 4 is a slouch—it''s still a very good mobile operating system.
    However, as is true for the entire industry, there is always somebody trying to
    do better. In the case of mobile devices, that is Microsoft and Google—especially
    Microsoft, with the release of its new Windows Phone 7 platform. Apple hasn''t
    sat back and relaxed; it''s been working on iOS 5, which despite an increase in
    features can still run on all the same devices as iOS 4.3.


    A major change is in the space of notifications, which instead of interrupting
    the flow of your application are now captured centrally on the device''s Notification
    Center. Here you can view all your notifications at your convenience with a downward
    swipe of the screen, clearing them when you''re finished.


    Another cool feature is the Newsstand, an application that is very similar to
    iBook but allows you to manage digital publications such as magazines and newspapers.


    Social networking is certainly nothing new, but native integration into iOS 5
    of features such as Twitter has been introduced. A single application supports
    all the features you''d expect, such as uploading photos and videos, tweeting,
    and so on, and integrates them into other iOS applications such as your contacts.
    Yes, Twitter existed as an app on previous versions of iOS, but not with such
    tight integration.


    Other applications have been upgraded to better compete with Apple''s competitors
    and to allow better use of the device''s capabilities. The Camera app is one such
    example, with more editing features, and the Mail application has been enhanced.


    Some of the other device-wide features introduced include an OS-wide dictionary,
    wireless syncing with iTunes, and split keyboards for ease of use.


    Let''s take a look at some of the new additions to the iOS family in a little
    more detail.'
  raw: '### Targeting Multiple Devices with Your Code


    If you want to write a single application that targets both the iPhone and the
