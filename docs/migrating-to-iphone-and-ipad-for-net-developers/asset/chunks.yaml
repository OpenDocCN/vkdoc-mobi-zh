- fmt: '# Get to Work: Creating Your First Application


    In the chapters so far, we''ve covered a multitude of topics, including an introduction
    to the iOS, the iOS SDK, the different devices available, and how to use development
    tools such as `Xcode` and `MonoDevelop` to create your initial application. But
    it''s going to take more than a `Hello, World` application to satisfy your users.


    Now we will begin to build on the knowledge you''ve gained so far and create a
    compelling application that is more feature-rich and functional. We will delve
    into the details of objects contained within the frameworks you''ve read about
    in previous chapters and how to use those objects. You''ll also learn how to structure
    your application within `Xcode` to better support the build, debug, and deploy
    phases of your project, along with a more detailed look at the simulator for predeployment
    testing.


    To demonstrate all of these features and capabilities, we will create a copy of
    the simple Lunar Lander app, using a similar style of graphics and physics that
    made it famous in the 1980s. We''ll start the app in this chapter and continue
    to enhance it throughout this book.


    To get started, we will cover the following topics in this chapter:


    * Designing your application, considering the key issues to address before you
    start to build it

    * Setting up your project and its structure in `Xcode`, including the settings
    that are most relevant in building and debugging your application

    * Understanding the options for presenting the user interface to the user, including
    how to render simple graphics with collision detection

    * Exploring the different methods for navigating the features of your application,
    such as difficulty level and high scores

    * Interacting with the outside world, both through the Internet and through interactions
    from the user

    * Exploring the iPhone simulator to test your application


    As we work through the construction of the application, I''ll continue to highlight
    the features found in the `.NET Framework` for comparison. I''ll also point out
    common "gotchas" and how to avoid them.


    ## The App Planning and Design Process


    In the previous chapters, we looked at a few factors to consider before designing
    your application. For example, we compared the features of each device, which
    you need to consider when deciding which is best suited to your application. You
    need to understand some of the key differences that will need to be accommodated
    in your application. Such considerations are important, but there are also many
    more aspects you should think about before you start to write code.


    In most professional organizations, the process of building an application usually
    starts with the *requirements capture stage*. This involves collecting the requirements
    of the users, or in the case of an undetermined audience, the features of your
    application. These are then prioritized, enabling you to drop those features you
    consider to be less important if time runs out.


    The nonfunctional requirements are equally important as the functional requirements.
    An example of a nonfunctional requirement is how fast certain actions are expected
    to perform, or how much data you want your application to be able to handle. The
    actual devices you wish to target are also noted at this point, along with the
    features of the devices you wish to use.


    Once you''ve captured and documented the requirements, the next phase is to start
    the design process. This involves defining how the core structure of your application
    will look—which aspects you will write in your own bespoke code, and which frameworks
    you will integrate together to achieve the desired functionality. This is known
    as the application''s *architecture*.


    The application''s architecture is like the foundation and frame of your house.
    It provides the necessary structure, and from there, you can create your rooms
    and install the wiring, water, and heating. An application is no different.


    You then build up the architecture with detailed implementation of your application''s
    functionality using code. The end result is a working application that realizes
    the requirements you defined—much like your house, built with the features you
    expected.


    Capturing the requirements for your application and designing the structure of
    your application will provide valuable guidance for when you write code, and will
    ensure that your application is more flexible and robust. You won''t need to keep
    bolting bits of code on to accommodate features you had not considered earlier.
    So, while it''s not mandatory, following a pragmatic version of the planning and
    design process, as described here, is considered good practice.


    ### Apple iOS Design Resources


    The process of designing your application relies heavily on your own imagination
    and brainpower—that''s part of the fun. However, if you''re confused when it comes
    to understanding how to best design your user interface or use the frameworks
    provided in the way in which they were intended, you are not alone!


    The iOS operating system exposes the core features of the devices on which it
    runs. Therefore, understanding the characteristics of the device and knowing how
    Apple intended it to be used are important. Apple has also spent a lot of time
    creating and tailoring user-interface elements to particular tasks, exploiting
    the touch and gesture user interface.


    For example, date and time entry are achieved by using the `Date and Time Picker`
    control, for which a more generic `Picker` control is available. This allows you
    to spin the wheel (or wheels) of the picker until the value you want is displayed.
    In the case of the date, the day, then the month, then the year appear. This is
    a good example of a control that has been specifically developed to suit the touch
    and swipe gestures of the device.


    This really isn''t that different to the principles adopted by Microsoft when
    it created the Windows SDK, and the existence of different user-interface controls
    as part of the `.NET framework`. Initially, these controls were suited to the
    mouse and keyboard as input, and then extended to cope with the introduction of
    tablet devices, such as the electronic-ink (e-ink) concept. And with the introduction
    of Windows Mobile 7, the process continues.


    Apple provides a number of helpful guides at [`http://developer.apple.com`](http://developer.apple.com).
    For user interface design, the main resource is the *iOS Human Interface Guidelines*.
    Its guidance includes the following:


    * **User-Interface guidelines**: For example, a focus on building applications
    where the emphasis is on user experience and user collaboration

    * **Usage guidelines on iOS user-interface controls**: A breakdown of the different
    user-interface controls, in which scenarios they are best used, and how to use
    them.


    *iOS Human Interface Guidelines* does cover many more topics. I recommend you
    familiarize yourself with this guide. Also, take the time to browse the site and
    its associated content.'
