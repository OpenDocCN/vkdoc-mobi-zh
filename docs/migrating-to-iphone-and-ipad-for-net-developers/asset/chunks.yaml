- fmt: "### Overview of iPad-specific Controllers\n\nBefore you move on from view\
    \ controllers, let's highlight some view controllers that are provided as part\
    \ of the iOS SDK but are specific to the iPad device. The iPad form factor differs\
    \ from the iPhone's in that it's larger and behaves slightly differently when\
    \ the orientation is changed. For this reason, some specialized view controllers\
    \ have been created to take advantage of the iPad's form factor; but this book's\
    \ examples are focused on the iPhone only, so playing with the view controllers\
    \ is left to those of you with iPad devices.\n\n#### Popover View Controllers\n\
    \nAlthough the Popover controller is not strictly speaking a view controller,\
    \ it does provide a useful mechanism for displaying additional content in your\
    \ application's window. If you're looking for similar functionality in .NET, I'm\
    \ afraid you'll be disappointed. Nothing exists currently, but it's possible for\
    \ you to create your own equivalent using .NET code, or maybe Ajax-based source\
    \ code. You can see an example in the iPad simulator shown in [Figure 6–19](#Chapter06.html#fig_6_19).\
    \ You build this later; let's look at the component parts first.\n\n![images](images/0619.jpg)\n\
    \n**Figure 6–19.** *iPad popover example*\n\nTo implement a popover, you need\
    \ to use the `UIPopoverController` class and have a good idea what condition needs\
    \ to be met for your popover to be displayed. After all, it's essentially a wrapper\
    \ for an existing view controller that then displays your floating view over your\
    \ application. For example, you may have a selection of items the user can choose\
    \ from, and you wish to use a popover to display the description when a particular\
    \ option is chosen. It also usefully displays an arrow connecting the popover\
    \ window with the item to which it relates—in the case of a toolbar button, the\
    \ button itself. Having made these basic decisions, you're ready to implement\
    \ your popover.\n\nLet's create a simple popover example to demonstrate these\
    \ concepts. First, create a view-based application using Xcode 4 for an iPad device.\
    \ Once created, you notice as before that a view controller is created for the\
    \ main view. To this view, add a toolbar with a single item, which is the trigger\
    \ for your popover: do this by editing the associated XIB in Interface Builder\
    \ and adding the Toolbar object. Your screen in Xcode should look similar to that\
    \ shown in [Figure 6–20](#Chapter06.html#fig_6_20).\n\n![images](images/0620.jpg)\n\
    \n**Figure 6–20.** *Your example iPad view controller with single toolbar item*\n\
    \nIf you were to execute this, you'd have a pretty bland application with the\
    \ single toolbar item at the bottom. It's blank because in the real world you're\
    \ more likely to have multiple toolbar items, and it has no functionality behind\
    \ it yet. Let's create your popover. A popover needs a view controller to manage\
    \ how the data is displayed; in this case, you provide the opportunity to display\
    \ data in a tabular format, which is pretty typical for popovers. Add a file to\
    \ your project (I called it `PopoverSelection`), ensuring that it's compatible\
    \ with an iPad and that an XIB is created for it. Critically, it must also inherit\
    \ from the view controller required to display your data. In this case, the popover\
    \ displays tabular data, so you use `UITableViewController` as the subclass. See\
    \ [Figure 6–21](#Chapter06.html#fig_6_21).\n\n![images](images/0621.jpg)\n\n**Figure\
    \ 6–21.** *Creating your popover view controller class using the table view base\
    \ class*\n\nThis creates three files in your project: `PopOverSelection.h` (the\
    \ header file), `PopOverSelection.m` (its implementation), and `PopOverSelection.xib`\
    \ (the view). If you open the associated XIB file in Interface Builder, it should\
    \ look like the one in [Figure 6–22](#Chapter06.html#fig_6_22).\n\n![images](images/0622.jpg)\n\
    \n**Figure 6–22.** *Your tabular popover view controller*\n\nYou need to wire\
    \ this class into your code, so you must define the relevant properties and actions\
    \ to allow you to both wire up the popover controller action and present the popover.\
    \ You do this in your main view controller, called `PopOverExampleViewController`.\
    \ See [Listing 6-2](#Chapter06.html#list_6_2).\n\n**Listing 6-2.** *`PopOverExampleViewController.h`*\n\
    \n```\n#import <UIKit/UIKit.h>\n#include \"PopOverSelection.h\"\n\n@interface\
    \ PopoverExampleViewController : UIViewController {\n    UIPopoverController *popCtrl;\n\
    \    PopOverSelection    *selection;\n    IBOutlet UIBarButtonItem *bbitem;\n\
    }\n```"
  raw: '### Overview of iPad-specific Controllers


    Before you move on from view controllers, let''s highlight some view controllers
    that are provided as part of the iOS SDK but are specific to the iPad device.
    The iPad form factor differs from the iPhone''s in that it''s larger and behaves
    slightly differently when the orientation is changed. For this reason, some specialized
    view controllers have been created to take advantage of the iPad''s form factor;
    but this book''s examples are focused on the iPhone only, so playing with the
    view controllers is left to those of you with iPad devices.


    #### Popover View Controllers


    Although the Popover controller is not strictly speaking a view controller, it
    does provide a useful mechanism for displaying additional content in your application''s
    window. If you''re looking for similar functionality in .NET, I''m afraid you''ll
    be disappointed. Nothing exists currently, but it''s possible for you to create
    your own equivalent using .NET code, or maybe Ajax-based source code. You can
    see an example in the iPad simulator shown in [Figure 6–19](#Chapter06.html#fig_6_19).
    You build this later; let''s look at the component parts first.


    ![images](images/0619.jpg)


    **Figure 6–19.** *iPad popover example*


    To implement a popover, you need to use the `UIPopoverController` class and have
    a good idea what condition needs to be met for your popover to be displayed. After
    all, it''s essentially a wrapper for an existing view controller that then displays
    your floating view over your application. For example, you may have a selection
    of items the user can choose from, and you wish to use a popover to display the
    description when a particular option is chosen. It also usefully displays an arrow
    connecting the popover window with the item to which it relates—in the case of
    a toolbar button, the button itself. Having made these basic decisions, you''re
    ready to implement your popover.


    Let''s create a simple popover example to demonstrate these concepts. First, create
    a view-based application using Xcode 4 for an iPad device. Once created, you notice
    as before that a view controller is created for the main view. To this view, add
    a toolbar with a single item, which is the trigger for your popover: do this by
    editing the associated XIB in Interface Builder and adding the Toolbar object.
    Your screen in Xcode should look similar to that shown in [Figure 6–20](#Chapter06.html#fig_6_20).


    ![images](images/0620.jpg)


    **Figure 6–20.** *Your example iPad view controller with single toolbar item*


    If you were to execute this, you''d have a pretty bland application with the single
    toolbar item at the bottom. It''s blank because in the real world you''re more
    likely to have multiple toolbar items, and it has no functionality behind it yet.
    Let''s create your popover. A popover needs a view controller to manage how the
    data is displayed; in this case, you provide the opportunity to display data in
    a tabular format, which is pretty typical for popovers. Add a file to your project
    (I called it `PopoverSelection`), ensuring that it''s compatible with an iPad
    and that an XIB is created for it. Critically, it must also inherit from the view
    controller required to display your data. In this case, the popover displays tabular
    data, so you use `UITableViewController` as the subclass. See [Figure 6–21](#Chapter06.html#fig_6_21).


    ![images](images/0621.jpg)


    **Figure 6–21.** *Creating your popover view controller class using the table
    view base class*


    This creates three files in your project: `PopOverSelection.h` (the header file),
    `PopOverSelection.m` (its implementation), and `PopOverSelection.xib` (the view).
    If you open the associated XIB file in Interface Builder, it should look like
    the one in [Figure 6–22](#Chapter06.html#fig_6_22).


    ![images](images/0622.jpg)


    **Figure 6–22.** *Your tabular popover view controller*


    You need to wire this class into your code, so you must define the relevant properties
    and actions to allow you to both wire up the popover controller action and present
    the popover. You do this in your main view controller, called PopOverExampleViewController.
    See [Listing 6-2](#Chapter06.html#list_6_2).


