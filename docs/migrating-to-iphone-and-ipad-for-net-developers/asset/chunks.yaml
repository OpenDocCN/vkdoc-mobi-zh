    `NSMutableArray *highscores = [[NSMutableArray alloc] initWithContentsOfFile:`![images](images/U002.jpg)

    ` @"/some/file/location/output.plist"];`


    #### Using the Internet to Store Data


    For persisting data, we''ve looked at property lists and using methods available
    as part of some of the serializableObjective-C types. However, what if you want
    to use the Internet in some form to serialize your data?What if you want to store
    this information in some kind of central location, rather than locally on the
    device?


    The first and most obvious solution is to still use the property list method,
    except that the path to the file is the fully qualified URL of a file that exists
    on some internal-based storage—one of the many digital-storage platforms, such
    as Dropbox and DigitalVault.


    But there is an alternative. The serializable collections such as `NSMutableArray`
    have a method called `writeToURL`, which instead of taking an `NSString` argument
    takes an `NSUrl` argument. However, if when writing to a file your argument is
    a `file://` reference, then there is no real difference to the behavior of these
    methods. Therefore the following:


    `[myArray writeToURL: @"file://www.mamone.org/highscore.plist" atomically:YES];`


