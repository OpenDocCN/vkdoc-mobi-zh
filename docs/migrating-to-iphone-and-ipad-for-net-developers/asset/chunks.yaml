  raw: '###### Unit Testing


    To ensure a baseline of understanding, let''s briefly recap the term *unit test*.
    A unit test is code written specifically to test a particular part of your application''s
    code. In the world of testing you''ll have a series of test cases that assert
    that the module you are running is behaving as expected. For example, if a method
    was written to add two numbers, you may have test cases that check if the addition
    is performed correctly and that if you pass invalid parameters it handles such
    a circumstance elegantly.


    This is no different in any other language, certainly not when writing .NET based
    applications. In the days before Visual Studio supported unit testing or before
    it even existed, it was common practice to use tools such as NUnit to implement
    unit tests (Java uses JUnit). Thankfully, Visual Studio has caught up and has
    a plethora of testing capability including a Unit Test framework with unit tests
    much like Xcode 4 (but I would argue even more advanced).


    ###### Integration Testing


    Unit testing is, of course, only the start of your testing journey. It helps to
    test discrete units of code, but when your application starts to link these together,
    you''re into the realm of integration testing. The key distinction between integration
    and unit testing is that unit testing usually supposes the quite simplistic stand-alone
    testing of single “units” and does not require more complex test environments
    or tools. Xcode doesn''t make any specific provision for integration testing,
    other than writing your own unit tests that integrate other unit tests, but other
    options are available to you. For example, iCuke allows you to write integration
    tests without any changes to your application. iCuke uses Cucumber, a behavior-driven
    test environment (see more in the “Test Driven Development” section) to implement
    its functionality. Both are fairly complex products and not the core scope of
    this book, but I recommend you take a look at them. You can find more information
    on iCuke at [`https://github.com/unboxed/icuke`](https://github.com/unboxed/icuke),
    and Cucumber at [`http://cukes.info/`](http://cukes.info/).


    ###### Test Driven Development


    You''ve now looked at tools that support concepts such as integration testing
    but rather than focus on testing the code''s implementation, an alternative is
    to look at the functionality or behavior expected. In this example, you start
    by writing the test case in the first instance, articulating its behavior. Specialist
    products such as iCuke and Cucumber do this, but you can achieve a more limited
    Test Driven Development approach using Xcode.


    Again, Test Driven Development (TDD) involves writing test cases before any production
    code. In Xcode, you''d achieve this by generating your class with unit testing
    support included, but focus on writing your unit tests in the first instance by
    calling your empty class implementations. These tests will fail initially, but
    as you implement your class, these should pass if they demonstrate the required
    behavior.


    Given the importance of using unit tests as building blocks for a number of test
    strategies, let''s take a look at how to implement them usingXcode.


    ##### Writing and Running Your Unit Tests


    So, having created your project with unit tests, you need to perform a series
    of steps to implement your tests. If you examine the example implementation file
    provided, you''ll notice two methods for processing code before the test begins
    (`setup`) and then after the test has concluded (`teardown`). It also provides
    an example method for you to change as its default implementation— the method
    `STFail()`, indicating that tests have yet to be implemented.


    At this point, rather than creating unit tests for the Lunary Lander game, let''s
    focus on a much simpler example to convey the methods and tools. For this simple
    example, you create a very simple Calculator class with a Header and Implementation
    file and a single method called `add()` that returns the addition of the two numbers
    passed. First you''ll define your class declaration as shown in [Listing 9-1](#Chapter09.html#list_9_1).


    **Listing 9-1** *. Calc.h*


    `#import <Foundation/Foundation.h>`


    `@interface Calc : NSObject {`

    `}`

    `- (int) add:(int)num1 to:(int)num2;`


    `@end`


    Next you''ll add your implementation of the class, as shown in [Listing 9-2](#Chapter09.html#list_9_2).


    **Listing 9-2.** *Calc.m*


    `#import "Calc.h"`


    `@implementation Calc`


    `- (int) Add:(int)num1:(int)num2`

    `{`

    `    return (num1+num2);`

    `}`


    `@end`


    You then implement your unit tests by providing an implementation for the test
    cases, changing the `testExample()` method to test the `add()` method. You can
    see the example implementation in [Listing 9-3](#Chapter09.html#list_9_3).


    **Listing 9-3.** *UnitTest Implementation*


    `#import "CalculatorTests.h"`


    `@implementation CalculatorTests`


    `- (void)setUp`

    `{`


    `    [super setUp];`


    `    // Set-up code here.`

    `}`


    `- (void)tearDown`

    `{`

    `    // Tear-down code here.    `


    `    [super tearDown];`

    `}`


    `- (void)testExample`

    `{`

    `    Calc *calculator = [[Calc alloc] init];`

    `    int v = [calculator add:5 to:5];`

    `    if (v != 10)`

    `        NSLog(@"add is not working");`

    `    else`

    `        NSLog(@"add is working");`

    `    [calculator release];`

    `}`


    So, ensuring that you''re building against the iOS Simulator, you can now choose
    to test your product by choosing “Build for Testing” from the Product menu or
    using the shortcut key combination (![images](images/U007.jpg)U). This will build
    your application and include the necessary debug information, which when executed
    for testing using the Test option or shortcut combination of (![images](images/U007.jpg)U)
    will execute your application and the unit test cases selected (more on this in
    a minute), outputting a whole bunch of diagnostic information to your debug log
    from the unit test code. In the example, using the Log navigator (![images](images/U007.jpg)7),
    you can jump to the log file for your executed tests. The log should display something
    similar to the following output. Your testExample method''s specific output is
    in **bold**.


    `Test Suite ''All tests'' started at 2011-08-20 11:06:32 +0000`

    `Test Suite ''/Developer/Platforms/iPhoneSimulator.platform/Developer/SDKs/`![images](images/U002.jpg)

    `iPhoneSimulator4.3.sdk/Developer/Library/Frameworks/SenTestingKit.framework(Tests)''`![images](images/U002.jpg)

    ` started at 2011-08-20 11:06:32 +0000`

    `Test Suite ''SenInterfaceTestCase'' started at 2011-08-20 11:06:32 +0000`

    `Test Suite ''SenInterfaceTestCase'' finished at 2011-08-20 11:06:32 +0000.`

    `Executed 0 tests, with 0 failures (0 unexpected) in 0.000 (0.000) seconds`


