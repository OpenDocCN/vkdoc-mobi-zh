- fmt: '##### Using a Timer to Invoke Key Core Events


    The first thing to notice in [Listing 5-6](#Chapter05.html#list_5_6) is that as
    part of the `ViewController` class, we defined a timer that will implement our
    game''s core loop. Our timer uses the iOS `NSTimer` class, which is similar in
    functionality to the `System.Threading.Timer` class in the .NET Framework. The
    full definition is as follows:


    `NSTimer *gameLoop;  // Core game timer`


    In the `GameView` class, we won''t need the time initialized until the view is
    loaded. Remember that our `GameView` class encapsulates the essence of the game.
    While we could initialize it in other places, the `viewDidLoad` event is as good
    as any other, as it''s executed after the view successfully loads (as its name
    suggests). Our implementation of this is as follows:


    ```

    - (void)viewDidLoad

    {

        // Create an instance of the timer every (0.025) 1/4 of a second, to fire
    the ''timerLoop'' function

        gameLoop = [NSTimer scheduledTimerWithTimeInterval: 0.025 target:self selector:@selector(timerLoop:)
    userInfo:nil repeats:YES];    


        [super viewDidLoad];

        // Do any additional setup after loading the view from its nib.

    }

    ```


    Examining the code further, you can see that we use the `scheduledTimerWithTimeInterval`
    method. We pass it the interval at which the timer is fired (in seconds, and you
    can use fractions), the target for the callback, and the callback method we''ll
    use to host the bespoke code we''ll execute every time the event is fired. The
    remaining parameters allow bespoke information to be passed in the form of `userInfo`
    and specify whether the timer event repeats or is a one-off. In our case, we won''t
    pass custom information and the timer is repeating.


    You''ll notice that for the callback method, we use the `selector` parameter and
    the `@selector` notation, passing the name of our method. It returns an object
    type of `SEL`, expected by the method for the callback. In .NET, delegates are
    used to provide type-safe function pointers, equivalent to our functionality here.


    The end result after being successfully initialized is that the `gameLoop` member
    variable now points to an instance of an `NSTimer`, which when fired at the prescribed
    interval, will call our `timerLoop` class method in the `ViewController` class.
    Let''s take a quick look at the implementation of this method, which is pretty
    straightforward.


    ```

    // timerLoop - main Timer event function

    -(void)timerLoop:(NSTimer *)timerObj

    {

        // Update the lander''s position

        [(GameView *)self.view updateLander];


        // Redisplay the whole view

        [self.view setNeedsDisplay];


    }

    ```


    In our game engine''s main loop, whose implementation is encapsulated within the
    `timerLoop` method, we do a number of things. First, we call a method that handles
    the game''s physics and recognizes user interaction detected by further events
    being called. This method will simulate the effects of gravity, fire the engines
    if you''re telling it to, and rotate the craft as you dictate. It will also decrease
    the fuel being used and look for either a collision or a successful landing.


    You''ll notice that the method to handle all of this magic is called `updateLander`,
    but because `self` in this instance points to a `UIView` (look at your XIB file),
    we''re going to cast it into the `GameView` class of which we know it''s an instance.
    In order for the cast to work, with the `GameView` view open in Xcode''s Interface
    Builder, ensure that in the Identity Inspector, the Custom Class class name is
    set to `GameView`. We can then do the cast, because the `UIView` class is used
    in the Interface Builder to define the view. In our code, we extend the functionality
    of this class and call it `GameView`. If you reexamine `GameView.h`, you''ll see
    code like the following, so we know it''s safe for us to perform such a type cast:


    ```

    @interface GameView : UIView {

    // Implementation goes here

    }

    @end

    ```


    The notation in .NET depends on the language. But using C# as a comparator, the
    syntax is similar, using the colon and then the parent class to denote class inheritance.
    So, use a cast `(GameView *)` to type cast the `view` property of our view controller,
    this then allows us to refer to the defined `updateLander()` method.


    The final point to note, and not really related to timers per se, is that once
    we''ve updated the game''s physics, we will need to update the display to reflect
    the change in the lander''s position or state. To do this, we use the `setNeedsDisplay`
    method and pass this message to the `view` object—in this case, our `GameView`
    object. This will force a refresh of the display (the whole display), during which
    we will do updates such as redrawing the lander.


    #### Self-Documenting Code


    Before we continue with the `GameView` class''s implementation, I want to touch
    on the concept of *self-documenting code*. The principle behind this term is that
    your code should be self-explanatory through its implementation. A good example
    is the use of well-named variables and methods, employing the camelCase convention
    we discussed earlier in the book. Another concept is that while you can hard-code
    values into your code, they won''t necessarily mean anything to the person who
    picks up the code for debugging or to extend it. To improve readability, where
    possible, avoid the use of hard-coded literal values by replacing them with a
    constant or an enumerated type.


    ##### Using Constants


    An example is the best way to demonstrate the use of constants. Imagine we''re
    setting our initial fuel tank value to its full capacity, which is actually 200
    liters. We could do this by assigning the literal value of `200` to our variable,
    like this:


    ```

    int fuel = 200;

    ```


    Or, we could define a constant, like this:


    ```

    static const int FUEL_INITIAL = 200;

    ```


    And then use this constant to assign a value to our variable, like so:


    ```

    int fuel = FUEL_INITIAL;

    ```


    Notice that while it takes an extra line to define the constant, it makes our
    code more readable without the use of comments. Also, if we need to reset the
    value to use this same value within the same context, we can simply use the constant
    again. The syntax for C# is exactly the same.'
