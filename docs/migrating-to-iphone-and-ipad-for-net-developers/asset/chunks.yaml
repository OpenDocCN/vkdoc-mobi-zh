    #### What Is a Library?


    A *library* is a set of routines and variables that may exist locally, or remotely,
    to realize a prescribed set of functionality—at least in the computer-science
    sense (just in case you were thinking of a place to go to read books!). These
    routines and variables are realized in code, irrespective of the programming language
    used. The way you reference them and the way they are used may differ, and this
    is what identifies the different types of libraries.


    #### What Types of Libraries Exist?


    The types of libraries can essentially be categorized as follows, regardless of
    whether they are local or remote.


    *   Static library

    *   Dynamic library


    Let''s look at these in turn.


    #### Static Library


    A*static library* is a collection of routines and variables that are held in a
    single file and are referenced within your code. An associated header file provides
    the method signatures and sometimes variables. At compiletime, your library is
    referenced, which enables the code that implements the required functionality
    to be included in your executable. This is usually handled by a program called
    the *linker*, which is why they are sometimes called *statically linked libraries*.


    On iOS devices, static libraries have an extension of `.a`. On Windows, the extension
    is typically `.lib`.


    #### Dynamic Library


    A*dynamic library*, as its name suggests, is dynamic in the way it works. The
    library is still referenced through the use of a header file, but it isn''t included
    into the executable during compilation; it is referenced at runtime. This means
    that the library is loaded on first use, or before, to resolve the call and execute
    the referenced functionality.


    On iOS, dynamic libraries have an extension of `.dynlib`. On Windows, they have
    an extension of `.dll`.


    Use of dynamic libraries has the added advantages of making your executables smaller
    and allowing common functionality to be more efficiently shared. However, it does
    introduce some penalties, some of which caused big problems in the early days
    for Microsoft Windows. These problems were related to version control of different
    libraries with the same methods but whose implementation was different. In Windows,
    this was called *DLL hell*.


    While the iPhone and the iPad are quite capable of producing and using dynamic
    libraries, the Apple Developer Agreement specifically prohibits the use of dynamic
    libraries other than those provided by the system or official SDKs. This is why
    the embedded SQLite library is supported. However, if you try to create your own
    and submit your application to the App Store, it will be rejected.


    Why has Apple done this? This has been the source of much debate for many years.
    Indeed, the Developer Agreement was only recently updated to list some of the
    restrictions around interpreted code, but it is still quite rigid, and I highly
    recommend you read it carefully. We''ll talk more about the Apple Developer Agreement
    later in the chapter. For now, either use system-provided dynamic libraries or
    stick to static libraries, especially if you want your application to be approved
    upon submission to the App Store.'
  trans: '

    ### 将序列化示例与 .NET 进行比较


    在本章中，我们了解了使用 Objective-C 和 iOS SDK 进行基本数据持久化的选项，甚至还了解了 .NET 的一些持久化属性。但此示例与 .NET
    实现相比如何呢？


    实际上，使用自定义类来存储高分名称和分数在 .NET 中依然可行。我们会使用非常相似的机制（仅语法不同），将名称存储为 `String`，将分数存储为 `int`。我们甚至可以沿用相同的方法名称和思路。


    `NSMutableArray` 可以在 .NET 中实现为 `ArrayList`，允许你使用方法 `Insert()` 或 `Remove()` 项目。它还有一个
    `Sort()` 方法，类似于我们的 `sortArrayUsingSelector` 方法，该方法接受一个比较器作为参数。


    最后，序列化可以使用与我们示例类似的方法来完成：遍历条目并写入某个持久化存储，例如使用 ODBC 驱动程序或类似数据库 API 的数据库。或者，如果你想写入文件，可以使用
    `XMLSerializer` 类，通过 `StreamWriter` 对类进行序列化。考虑以下 列表 7-7 中的 C# 示例，该示例假设我们有一个 `HighScoreClass`，其行为与我们的示例相同，但还在我们想要序列化的那些成员周围定义了
    `[Serializable()]` 属性。


    **列表 7-7.** *在 C# 中序列化一个类*


    ```

    // 创建我们的高分记录类（注意，此代码不会编译，因为我们为了简洁省略了其定义）

    HighScoreClass hs = new HighScoreClass()

    // 使用高分记录类的类型创建一个新的 XmlSerializer 实例

    XmlSerializer so = new XmlSerializer(typeof(HighScoreClass));


    // 创建一个新的文件流，用于写入序列化后的对象

    TextWriter WriteFileStream = new StreamWriter(@"C:\output.xml");

    so.Serialize(WriteFileStream, hs);


    // 清理资源

    WriteFileStream.Close();

    ```


    列表 7-7 中的示例与我们之前使用 Objective-C 的 `plist` 示例非常相似，它都将类的内容序列化到 XML 文件中。这是在 .NET 框架中对类进行序列化最常用的方法。在
    .NET 中，使用嵌入式 SQL 语句对数据库执行操作也非常相似。


    ### 总结


    在本章中，我们探讨了将数据持久化到移动设备易失性内存之外的其他存储方式的选项；也就是说，当设备关机或应用程序关闭时，内存及其所有相关数据都会丢失。


    我们研究了将数据持久化到文件、数据库和互联网的技术。我们还探讨了 iOS 为此提供的功能，例如应用程序沙盒。接着，我们了解了语言和 SDK 对存储数据以及将其写入不同存储类型（包括
    `plist` 文件和嵌入式数据库）的支持。


    最后，我们通过实现几个简单的类来测试相关理论，为我们的 Lunar Lander 游戏提供了一个可持久化存储的高分表支持。现在，在应用程序的不同运行实例之间，我们可以保留一个最高分列表，从而增加游戏的竞争乐趣。


    ## 第 8 章


    ## 扩展你的应用程序：使用库扩展你的 iOS 应用


    扩展应用程序功能使其超越 iOS 本身及 iOS SDK 所提供的能力，这在大多数操作系统中都相当常见。Microsoft Windows 操作系统在设计之初就具备了通过提供静态链接库和动态链接库来扩展其功能的能力。这并不仅限于
    Windows 操作系统。Unix、Linux 以及许多其他操作系统也提供相同的功能，而苹果的 iOS 也不例外。


    基于第 3 章中讨论的关于使用其他选项的一些示例，本章提供了一些关于如何构建你自己的库以及如何使用其他库来补充 iOS 操作系统的指导。具体来说，我们将讨论以下内容：


    *   库的工作原理概述以及不同类型的库

    *   iOS 如何使用库

    *   如何在你的应用程序中使用库

    *   第三方库及其优势


    ### 库概述


    首先，我们将提供一些背景信息，介绍不同类型的库、它们的用途以及它们在 iOS 环境下的工作方式。我们将讨论什么是库、存在哪些类型，以及为什么你可能会使用一种类型而不是另一种——或者两者兼用！


    #### 什么是库？


    *库*是一组例程和变量，它们可以存在于本地或远程，用于实现一组预定义的功能——至少从计算机科学的角度是这样理解的（以防你想到的是去图书馆读书）。这些例程和变量通过代码实现，与所使用的编程语言无关。引用它们的方式以及它们的使用方式可能有所不同，而这正是区分不同类型库的关键所在。


    #### 存在哪些类型的库？


    库的类型基本上可以分为以下几类，无论它们是本地的还是远程的：


    *   静态库

    *   动态库


    我们依次来看看它们。


    #### 静态库


    *静态库*是保存在单个文件中的一组例程和变量，并在你的代码中被引用。一个关联的头文件提供了方法签名，有时也提供变量。在编译时，你的库被引用，这使得实现所需功能的代码能够被包含在你的可执行文件中。这通常由一个称为*链接器*的程序处理，因此它们有时被称为*静态链接库*。


    在 iOS 设备上，静态库的扩展名为 `.a`。在 Windows 上，扩展名通常是 `.lib`。


    #### 动态库


    顾名思义，*动态库*的工作方式是动态的。库仍然通过头文件来引用，但它不会在编译时被包含到可执行文件中；而是在运行时被引用。这意味着库在首次使用时（或在此之前）被加载，以解析调用并执行所引用的功能。


    在 iOS 上，动态库的扩展名为 `.dynlib`。在 Windows 上，它们的扩展名为 `.dll`。


    使用动态库具有额外的优势，可以使你的可执行文件更小，并允许更高效地共享通用功能。然而，这确实也引入了一些弊端，其中一些问题在早期给 Microsoft Windows
    带来了很大的麻烦。这些问题与具有相同方法但实现方式不同的不同库的版本控制有关。在 Windows 中，这被称为 *DLL 地狱*。


    虽然 iPhone 和 iPad 完全能够生成和使用动态库，但苹果开发者协议明确禁止使用除系统或官方 SDK 提供的动态库之外的任何动态库。这就是为什么嵌入式
    SQLite 库被支持的原因。但是，如果你试图创建自己的动态库并将你的应用程序提交到 App Store，它将被拒绝。


    苹果为什么要这样做？多年来，这一直是争议的源头。事实上，开发者协议最近才更新，列出了关于解释代码的一些限制，但它仍然相当严格，我强烈建议你仔细阅读。本章稍后我们将更多地讨论苹果开发者协议。目前，要么使用系统提供的动态库，要么坚持使用静态库，特别是如果你希望你的应用程序在提交到
    App Store 后获得批准。

    '
- fmt: '#### Comparing iOS Libraries with .NET Equivalents


    Before we move on to creating your own libraries and taking advantage of third-party
    options, let''s take a look at some of the more common iOS libraries. Not surprisingly,
    the iOS SDK, like most SDKs, provides a set of libraries as part of its installation.
    I won''t list all the iOS libraries, as you''ll quickly find that iOS frameworks
    are a suite of libraries, with associated header files and supporting documentation.
    Instead, I''ll note several particularly useful libraries available as part of
    the iOS SDK but not published as iOS frameworks. [Table 8-1](#Chapter08.html#tab_8_1)
    lists those libraries, along with brief descriptions and comments about how they
    compare with .NET.


    ![images](images/t0801.jpg)


    Many more libraries than those listed in [Table 8-1](#Chapter08.html#tab_8_1)
    are available, but with the iOS frameworks and those listed, you should have most
    of the capability required. Then you always have the option of using third-party
    libraries or your own custom libraries to extend your application''s capability
    further.


    ### Creating Your Own Static Libraries


    You can create your own static libraries for iOS. In this section, we''ll cover
    how to create one using Xcode 4, and then we''ll look at creating a comparable
    library, or assembly, in .NET.


    #### Creating a Static Library with Xcode 4


    Xcode 4 makes it easy to create your own static libraries. Start by choosing the
    Cocoa Touch Static Library template from the Framework & Library iOS category,
    as shown in [Figure 8–1](#Chapter08.html#fig_8_1), and then click Next.


    ![images](images/0801.jpg)


    **Figure 8–1.** *Selecting a static library template*


    On the following screen, choose the product name for your project, as shown in
    [Figure 8–2](#Chapter08.html#fig_8_2). At this point, you may want to introduce
    a version number in your file name to help manage different versions of the same
    library, or you could be really clever and start to use the snapshot feature and
    source code control within Xcode (see [`http://developer.apple.com/library/mac/#documentation/ToolsLanguages/Conceptual/Xcode4UserGuide/SCM/SCM.html`](http://developer.apple.com/library/mac/#documentation/ToolsLanguages/Conceptual/Xcode4UserGuide/SCM/SCM.html)).
    Once you''ve decided on the file name, hit the Next button again.


    ![images](images/0802.jpg)


    **Figure 8–2.** *Choosing your static library''s product name*


    Finally, choose the location for your project (see [Figure 8–3](#Chapter08.html#fig_8_3)),
    and then click Create.


    ![images](images/0803.jpg)


    **Figure 8–3.** *Choosing your project location*


    This will create your project structure in a manner similar to the other projects
    we''ve built, except the number of predefined files created is reduced. This is
    because the functionality is for you to define. This framework will simply create
    an empty static library under the name defined in your `Products` structure—`MyStaticLibrary.a`
    in this example.


    Now we need to add some functionality to our library. You could go ahead and create
    classes and constants for your library. But to keep things simple for our example,
    let''s just add the files we created to support our high-score functionality in
    [Chapter 7](#Chapter07.html#ch7) to create our static library.


    In Xcode, choose `File` ![images](images/U001.jpg) `Add Files` and navigate to
    where you stored your high-score source code. In our example, the header code
    is in a file called `HighScore.h`, and the implementation is in `HighScore.m`.


    Highlight the two files and select the "Copy items into destination group''s folder
    (if needed)" checkbox, as shown in [Figure 8–4](#Chapter08.html#fig_8_4). Then
    click the Add button.


    ![images](images/0804.jpg)


    **Figure 8–4.** *Adding files to the static library project*


    This will add the files to your static library and create a static library with
    this functionality contained within it. To locate the library produced, assuming
    you have not changed the default target destination, you can select the library
    under the `Products` folder and choose `File` ![images](images/U001.jpg) `Show
    in Finder`. The Xcode default is to place it in the `/Library/Developer/Xcode/DerivedData`
    folder, and then in subfolders beneath that per project, as shown in [Figure 8–5](#Chapter08.html#fig_8_5).


    ![images](images/0805.jpg)


    **Figure 8–5.** *Locating your static library*


    **NOTE:** In our example, you''ll notice the folder name is `Debug-iphoneos`.
    This is deliberate to highlight the fact that when building a static library,
    it defaults to the iPhone operating system, which has an ARM-based CPU. You will
    need to ensure you change your build settings to compile for the iPhone simulator
    theme; otherwise, it won''t compile, as the simulator runs on the i386 CPU. You
    can tell if you have it right because the directory will change to `Debug-iphonesimulator`,
    and it is from here that you should reference your static library.


    Let''s test the library by creating a very simple application. For my test, I
    created a utility application. Once you''ve created a test application, select
    the top-level project entry in the Build Phases tab, as shown in [Figure 8–6](#Chapter08.html#fig_8_6).


    ![images](images/0806.jpg)


    **Figure 8–6.** *Configuring the build phases of your project*'
