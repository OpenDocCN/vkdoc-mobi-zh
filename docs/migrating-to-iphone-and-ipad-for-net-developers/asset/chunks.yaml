  trans: "\n### iPad 专用控制器概述\n\n在结束视图控制器的讨论之前，我们先来重点了解一些 iOS SDK 中提供的、但专属于 iPad 设备的视图控制器。iPad\
    \ 的外形尺寸与 iPhone 不同，它更大，并且在屏幕方向改变时的表现也略有差异。正因如此，人们创建了一些专门的视图控制器来充分利用 iPad 的外形优势；但本书的示例仅专注于\
    \ iPhone，因此对这些视图控制器的探索就留给拥有 iPad 设备的读者们了。\n\n#### 弹出视图控制器\n\n虽然弹出控制器严格来说并非视图控制器，但它确实提供了一种有用的机制，可以在应用程序窗口中显示额外内容。如果你正在\
    \ .NET 中寻找类似的功能，恐怕要失望了。目前 .NET 中并没有这样的功能，但你可以使用 .NET 代码，或者基于 Ajax 的源代码，创建自己对应的实现。你可以在\
    \ 图 6–19 所示的 iPad 模拟器中看到一个示例。稍后我们会构建它；现在先来看看它的组成部分。\n\n![images](img/0619.jpg)\n\
    \n**图 6–19.** *iPad 弹出示例*\n\n要实现一个弹出窗口，你需要使用 `UIPopoverController` 类，并且清楚地知道触发弹出窗口显示需要满足什么条件。毕竟，它本质上是对现有视图控制器的一个封装，然后在你应用程序之上显示一个浮动的视图。例如，你可能有一系列选项供用户选择，并且你希望在用户选择某个特定选项时，使用弹出窗口来显示其描述。此外，它还能很实用地显示一个箭头，将弹出窗口与其关联的项目连接起来——如果关联的是工具栏按钮，箭头就会指向该按钮本身。在做出这些基本决策后，你就可以开始实现弹出窗口了。\n\
    \n让我们创建一个简单的弹出窗口示例来演示这些概念。首先，使用 Xcode 4 为 iPad 设备创建一个基于视图的应用程序。创建完成后，你会像之前一样注意到，系统为主视图创建了一个视图控制器。为这个视图添加一个包含单个项目的工具栏，该工具栏项目将是触发弹出窗口的控件：通过\
    \ Interface Builder 编辑关联的 XIB 文件并添加工具栏对象来实现。你在 Xcode 中的屏幕应该类似于 图 6–20 所示。\n\n\
    ![images](img/0620.jpg)\n\n**图 6–20.** *你的示例 iPad 视图控制器，带有一个工具栏项目*\n\n如果此时运行这个程序，你将得到一个相当单调的应用程序，底部只有一个工具栏项目。它之所以是空白，是因为在真实场景中，你更可能拥有多个工具栏项目，而且目前它背后还没有任何功能。现在我们来创建弹出窗口。弹出窗口需要一个视图控制器来管理数据如何显示；在这个例子中，我们提供以表格格式显示数据的机会，这对于弹出窗口来说非常典型。为你的项目添加一个文件（我将其命名为\
    \ `PopoverSelection`），确保它与 iPad 兼容，并且为其创建一个 XIB 文件。关键是，它还必须继承自显示数据所需的视图控制器。在本例中，弹出窗口显示表格数据，因此你使用\
    \ `UITableViewController` 作为子类。参见 图 6–21。\n\n![images](img/0621.jpg)\n\n**图 6–21.**\
    \ *使用表格视图基类创建弹出视图控制器类*\n\n这会在你的项目中创建三个文件：`PopOverSelection.h`（头文件）、`PopOverSelection.m`（实现文件）以及\
    \ `PopOverSelection.xib`（视图文件）。如果你在 Interface Builder 中打开关联的 XIB 文件，它应该看起来像 图\
    \ 6–22 所示。\n\n![images](img/0622.jpg)\n\n**图 6–22.** *你的表格形式弹出视图控制器*\n\n你需要将这个类集成到你的代码中，因此必须定义相关的属性和操作，以便连接弹出控制器操作并展示弹出窗口。你可以在主视图控制器中完成这些操作，该控制器名为\
    \ `PopOverExampleViewController`。参见 代码清单 6-2。\n\n**代码清单 6-2.** *`PopOverExampleViewController.h`*\n\
    \n```\n#import <UIKit/UIKit.h>\n#include \"PopOverSelection.h\"\n\n@interface\
    \ PopoverExampleViewController : UIViewController {\n    UIPopoverController *popCtrl;\n\
    \    PopOverSelection    *selection;\n    IBOutlet UIBarButtonItem *bbitem;\n\
    }\n```\n"
- fmt: "```objectivec\n@property (nonatomic, retain) UIBarButtonItem *bbitem;\n@property\
    \ (nonatomic, retain) UIPopoverController *popCtrl;\n@property (nonatomic, retain)\
    \ PopOverSelection *selection;\n\n- (IBAction)togglePopOverController;\n\n@end\n\
    ```\n\nIf you break this down, the first thing you need is a pointer to your toolbar\
    \ button item. You do this by defining an `IBOutlet` property in your class whose\
    \ name matches the toolbar button on your item. I changed it to `bbitem` using\
    \ the Identity inspector:\n\n```objectivec\nIBOutlet UIBarButtonItem *bbitem;\n\
    ```\n\nYou need a corresponding `@property` statement, shown next, and of course\
    \ the `@synthesize` statement in the implementation file (you see these soon):\n\
    \n```objectivec\n@property (nonatomic, retain) UIBarButtonItem *bbitem;\n```\n\
    \nWith your toolbar button exposed via properties, you also need to define an\
    \ action that your button can be connected to through the Interface Builder—this\
    \ serves to toggle the popover between being visible or not. This is a simple\
    \ `IBAction` like those you've used in previous chapters, the definition for which\
    \ you can see here:\n\n```objectivec\n-(IBAction)togglePopOverController;\n```\n\
    \nFinally, you need both a property that points to the popover view controller\
    \ and the `UIPopOverController` singleton class that provides the required SDK\
    \ code to implement popover functionality. The following lines define these member\
    \ variables. Notice that you have to include your `PopOverSelection.h` file to\
    \ bring in the popover view controller:\n\n```objectivec\nUIPopoverController\
    \ *popCtrl;\nPopOverSelection    *selection;\n```\n\nAnd of course you follow\
    \ these with the appropriate `@property` and `@synthesize` statements.\n\nYou\
    \ are now in a good position to connect your action to the toolbar button to invoke\
    \ the popover selection, and you have the other necessary properties to implement\
    \ the displaying/hiding of your popover. First you connect the action, as you've\
    \ done in previous chapters. Using Interface Builder, and with your main view\
    \ controller open and displaying the toolbar button, open the Connections Inspector\
    \ for the main file owner. Now drag your `togglePopOverController` action to the\
    \ toolbar button and your `bbitem` `IBOUTLET` to the same button item. This allows\
    \ you to reference the button and trap the action when it's clicked. You can see\
    \ these connections in [Figure 6–23](#Chapter06.html#fig_6_23).\n\n![images](images/0623.jpg)\n\
    \n**Figure 6–23.** *Connecting the toolbar button item to your actions in code*\n\
    \nThe only thing remaining is to provide the implementation for the popover functionality.\
    \ The code in [Listing 6-3](#Chapter06.html#list_6_3) shows the core implementation\
    \ code, and then you walk through it.\n\n**Listing 6-3.** *Popover's Core Implementation\
    \ Code*\n\n```objectivec\n#import \"PopoverExampleViewController.h\"\n\n@implementation\
    \ PopoverExampleViewController\n\n@synthesize popCtrl;\n@synthesize selection;\n\
    @synthesize bbitem;\n\n- (void)dealloc\n{\n    [super dealloc];\n}\n\n- (void)didReceiveMemoryWarning\n\
    {\n    // Releases the view if it doesn't have a superview.\n    [super didReceiveMemoryWarning];\n\
    \n    // Release any cached data, images, etc that aren't in use.\n}\n\n#pragma\
    \ mark - View lifecycle\n\n// Implement viewDidLoad to do additional setup after\
    \ loading the view, typically from\n// a nib.\n- (void)viewDidLoad\n{\n    selection\
    \ = [[PopOverSelection alloc] init];\n    popCtrl = [[UIPopoverController alloc]\
    \ initWithContentViewController:selection];\n    popCtrl.popoverContentSize =\
    \ CGSizeMake(250, 300);\n\n    [super viewDidLoad];\n}\n\n- (void)viewDidUnload\n\
    {\n    [super viewDidUnload];\n\n    // Release any retained subviews of the main\
    \ view.\n    // e.g. self.myOutlet = nil;\n    [selection release];\n    [popCtrl\
    \ release];\n}\n\n- (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation\n\
    {\n    // Return YES for supported orientations\n    return YES;\n}\n\n-(IBAction)togglePopOverController\n\
    {\n    if ([popCtrl isPopoverVisible]) {\n        [popCtrl dismissPopoverAnimated:YES];\n\
    \    } else {\n        [popCtrl presentPopoverFromBarButtonItem:bbitem permittedArrowDirections:UIPopoverArrowDirectionAny\
    \ animated:YES];\n    }\n}\n\n@end\n```\n\nNow let's take a look at the various\
    \ parts of [Listing 6-3](#Chapter06.html#list_6_3). First, you need to synthesize\
    \ your properties with the following code:\n\n```objectivec\n@synthesize popCtrl;\n\
    @synthesize selection;\n@synthesize bbitem;\n```\n\nYou also need to ensure that\
    \ the view controller for your selection popover window (in this case, the view\
    \ controller class called `PopOverSelection` with the property `selection`) and\
    \ the `UIPopoverController` class are allocated and initialized. You do this in\
    \ the `viewDidLoad` event as shown here:\n\n```objectivec\n// Implement viewDidLoad\
    \ to do additional setup after loading the view, typically from\n// a nib.\n-\
    \ (void)viewDidLoad\n{\n    selection = [[PopOverSelection alloc] init];\n   \
    \ popCtrl = [[UIPopoverController alloc] initWithContentViewController:selection];\n\
    \    popCtrl.popoverContentSize = CGSizeMake(250, 300);\n\n    [super viewDidLoad];\n\
    }\n```\n\nFirst your window's view controller is initialized. Then the `UIPopoverController`\
    \ class instance is initialized with your custom view controller object (`selection`),\
    \ and you set the default size to 250 × 300 points. The initialization is complete,\
    \ so let's not forget to release your resources; this is done in the `viewDidUnload`\
    \ method, tidying up after yourself:\n\n```objectivec\n[selection release];\n\
    [popCtrl release];\n```\n\nFinally, you come to the meat on the bones, as they\
    \ say. The code associated with the button-click action toggles the popover between\
    \ being visible or not, depending on its status. If it's visible, you can simply\
    \ pass the `dismissPopoverAnimated` message; if not, you use the `presentPopoverFromBarButtonItem`\
    \ message, passing the button both its popover and any constraints on the arrow\
    \ being shown. Simple:\n\n```objectivec\nif ([popCtrl isPopoverVisible]) {\n \
    \   [popCtrl dismissPopoverAnimated:YES];\n} else {\n    [popCtrl presentPopoverFromBarButtonItem:bbitem\
    \ permittedArrowDirections:UIPopoverArrowDirectionAny animated:YES];\n}\n```\n\
    \nIf you build and execute this code, your main window is shown with the toolbar\
    \ at the bottom. Clicking the toolbar button displays and then hides the popover.\
    \ This popover is now ready to use and present the data you require. The presentation\
    \ depends on what you've used for the view controller. In this case, it's a table\
    \ view using `UITableViewController`, which itself is an extensive control. Although\
    \ the book doesn't cover this in detail, the Apple Developer Program does extensively\
    \ in the \"Table View Programming Guide for iOS\" found in the iOS Developer Library\
    \ ([http://developer.apple.com/library/ios](http://developer.apple.com/library/ios)).\
    \ If you build and run the application, the popover is visible, as shown in [Figure\
    \ 6–24](#Chapter06.html#fig_6_24).\n\n![images](images/0624.jpg)\n\n**Figure 6–24.**\
    \ *iPad simulator running the application with the popover visible*"
