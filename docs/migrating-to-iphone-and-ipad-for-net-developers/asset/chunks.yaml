  trans: '

    ### 信息按钮


    信息按钮用于提供对应用程序配置屏幕的访问。它通过 `UIButton` 类实现，并使用 `buttonType` 属性将其标记为信息按钮，从而提供如图 6–31
    所示的正确图像。


    ![images](img/0631.jpg)


    **图 6–31.** *信息按钮*


    同样，.NET 框架中没有与之等效的控件，但你可以使用 `Button` 类和合适的图像实现类似的功能。


    ### 页面指示器


    页面指示器由 `UIPageControl` 类实现，它提供了一种有用的视觉指示，显示在当前可用视图总数范围内哪个视图是打开的，如图 6–32 所示。


    ![images](img/0632.jpg)


    **图 6–32.** *页面指示器*


    当你打开一个视图时，会添加一个圆点来表示该活动或已显示视图在序列中的位置。当圆点数量达到 20 个后，控件会截断多余的圆点，使其不再显示。（我认为，如果你需要显示这么多圆点，那就应该重新考虑你的用户界面设计了。）


    .NET 中没有与此等效的控件。


    ### 搜索栏


    搜索栏控件通过 `UISearchBar` 类实现，允许用户输入文本字符串，并通过点击放大镜图标来执行搜索。它还允许你使用书签图标呈现常用信息。请参见图 6–33。


    ![images](img/0633.jpg)


    **图 6–33.** *搜索栏控件*


    .NET 中没有直接等效的控件。


    ### 开关


    开关控件通过 `UISwitch` 类实现，允许用户在互斥的选项（如开或关）之间进行选择。请参见图 6–34。


    ![images](img/0634.jpg)


    **图 6–34.** *开关控件*


    .NET 中没有等效的控件，至少在视觉和感觉上是如此，尽管复选框执行相同的功能：它可以被选中（开）或取消选中（关）。


    ### 分段控件


    分段控件通过 `UISegmentedControl` 类实现，提供了一种显示一组分段的方法，每个分段的行为都像一个按钮，并且可以显示对应的视图。示例如图
    6–35 所示。


    ![images](img/0635.jpg)


    **图 6–35.** *分段控件*


    分段控件提供了一种便捷的方式来分组相关按钮，并且每个按钮的表面可以显示文本或图像。这些按钮是互斥的，并且你可以拥有任意数量的分段，这使其与开关控件有所区别。


    同样，.NET 中没有等效的控件，尽管在 .NET 中使用互斥的单选按钮提供了类似的功能。


    ### 常用控件


    iOS UIKit 框架中有许多常用控件，它们都有直接的 .NET 等效控件。它们的用法和行为与 .NET 对应控件几乎相同，因此为简洁起见，此处不作详细描述。这些控件如表
    6-2 所示。


    ![images](img/t0602.jpg)


    让我们看看 UIKit 中包含的其他用户界面元素。别忘了，你可以使用 Apple 开发者资源来探索 SDK 中 UIKit 框架里丰富的用户界面控件；并且，正如你从本节的示例中所见，将它们与
    .NET 控件进行关联（如果存在关联）是相当直接的。


    ## 导航栏和信息栏


    有一些用户界面元素通常不用于定义你的应用程序，而是用于向用户提供信息或管理你在应用程序中的导航方式。这些元素被称为*栏*，包括状态栏、工具栏、导航栏和标签栏——后者你在本章前面已经见过。


    ### 状态栏


    状态栏用于向用户显示重要信息，并且无论设备方向如何，它始终出现在设备屏幕的顶部边缘。此外，虽然在 iPhone 上你可以对状态栏的颜色进行一些控制，但在 iPad
    上其颜色固定为黑色。你可以在图 6–36 中看到 iPhone 的状态栏。


    ![images](img/0636.jpg)


    **图 6–36.** *状态栏*


    你可以通过为 `UIApplication` 设置 `UIStatusBarStyle` 或使用 `Info.plist` 的值（`UIStatusBarHidden`）来隐藏状态栏，从而实现状态栏。Apple
    开发者使用指南非常具体：如果你的应用程序是游戏或全屏应用，那么状态栏通常可以隐藏；否则，建议将其显示出来，特别是考虑到它占用的空间很小。


    .NET 框架中的 `StatusBar` 类提供了类似的功能。


    ### 工具栏


    工具栏由 `UIToolbar` 类实现，在大多数图形用户界面中都被广泛理解，其在 iOS 设备上的行为也不例外。它用于提供图形图像，点击这些图像时可在应用程序中执行操作。为了便于使用，通常会将常用操作放置在工具栏上。你可以在图
    6–37 中看到一个工具栏。


    ![images](img/0637.jpg)


    **图 6–37.** *工具栏*


    对于 iPhone 应用程序，工具栏位于屏幕底部边缘；对于 iPad 应用程序，则根据方向以及控件吸附到的边缘，工具栏位于屏幕的顶部或底部边缘。工具栏上的项目是上下文相关的，这意味着它们反映了通常针对关联视图执行的操作，因此在不同视图之间可能会发生变化。


    .NET 框架中的 `Toolbar` 类提供了等效的功能。


    ### 导航栏


    导航栏由 `UINavigationBar` 类实现，用于管理视图层次结构中的导航，并且通常与导航控制器关联。如图 6–38 所示。


    ![images](img/0638.jpg)


    **图 6–38.** *导航栏*


    当你在 iOS 应用程序中处理不同的视图，或者标签栏不适用时，导航栏是很常见的。然而，尽管它们的用法相对简单，但这超出了本章的范围，iOS 开发者网站对此有很好的描述。因此，导航栏及其关联控制器的实现就留给你自己，并辅以
    iOS 开发者网站：[`http://developer.apple.com/library/ios/#featuredarticles/ViewControllerPGforiPhoneOS/NavigationControllers/`](http://developer.apple.com/library/ios/#featuredarticles/ViewControllerPGforiPhoneOS/NavigationControllers/)。


    .NET 框架中没有与导航栏等效的控件。


    ## 内容视图


    iOS SDK 提供了许多用户界面元素，旨在向用户展示来自你应用程序的自定义内容。你已经看到了两种 iPad 特有的视图：分割视图和弹出视图，但 iPhone
    上也有许多此类元素。


    我们将逐一介绍它们；它们在 iPhone 应用程序中很常用，因为它们提供了有用的功能。

