  trans: '

    ### 导航器


    Xcode IDE 引入了多种*导航器*，它们在主窗口中显示不同的工作区，让您能够轻松跳转到项目的不同区域。导航器是浏览 Xcode 界面的实用工具，了解如何使用它们将使您在
    Xcode 中开发应用程序变得更加简单。


    共有七个导航器可帮助您浏览项目的各个方面：


    *   **项目导航器**：该导航器提供文件和组的标准视图。它显示您的类、框架、资源、产品等。Xcode 4 相比之前版本有一些不错的改进。底部是一个过滤栏，包含三个预设过滤器，分别用于最近修改的文件、未保存的文件以及具有
    SCM 状态的文件。它还包含一个搜索字段，您可以用它来过滤工作区中所有项目内的文件。

    *   **符号导航器**：顾名思义，该导航器允许您查看和浏览应用程序中创建的各种符号。它可以让您以层级格式（父级和子级）或扁平格式查看符号，显示类、方法、属性等内容。

    *   **搜索**：此导航器提供工作区范围内的查找和替换功能。导航器本身就是一个标准的查找和替换面板。它还通过“预览”按钮提供了进行批量替换的功能。使用此功能会滑出一个表单，显示每个更改的差异，并让您选择要生效的更改。

    *   **问题**：顾名思义，此导航器会显示编译器或语法检查器检测到的问题，并允许您查看完整的问题文本。

    *   **调试**：当您在调试器中停止时，此导航器会显示程序的执行信息，包括堆栈。您可以同时查看多个线程，并让 Xcode 过滤掉不相关的线程。它还具有一个堆栈压缩功能，由调试导航器底部的滑块提供。当您从右向左滑动滑块时，Xcode
    会移除可能不相关的堆栈帧，因此您可以调整滑块，以显示您想要的详细程度的信息。

    *   **断点**：此导航器显示应用程序中设置的所有断点，包括激活和未激活的断点。如果您设置了一个断点但它是未激活状态，您会看到其符号，从而可以在代码中将其激活。这不会造成任何损害，因为它不影响您的代码。但是，如果您想彻底移除调试断点曾经存在的痕迹，请从导航器列表中删除它。

    *   **日志**：此导航器显示项目运行和调试会话的历史记录。它可以用来查看使用`NSLog`方法发送到调试控制台的输出。


    图 4-5 显示了导航器工具栏。


    ![images](img/0405.jpg)


    **图 4-5.** *导航器工具栏，包含（从左到右）项目、符号、搜索、问题、调试、断点和日志按钮*


    每次选择导航器时，导航窗口会出现在窗口左侧，同时相关的检查器会出现在窗口右侧，并显示导航树中所选对象（如果有）的详细信息。导航树和检查器窗口仅在您已关闭导航器视图（**⌘**0
    切换）时才显示。您也可以使用 表 4-7 中显示的快捷键来选择导航器。


    ![images](img/t0407.jpg)


    ### 视图


    除了不同的导航器之外，您还可以管理显示的不同视图：


    *   **导航器视图**：提供对导航器的访问，让您可以浏览项目结构或对象层级。

    *   **调试区视图**：允许您访问断点和对象监视点，这是 Xcode 4 调试功能的一部分。

    *   **工具视图**：提供对帮助页面和对象检查器等内容的访问。


    您可以打开和关闭这些视图，以释放屏幕空间。


    表 4-8 显示了访问这三种视图的方式。


    ![images](img/t0408.jpg)


    ### 使用其他 Xcode 工具


    Xcode 提供了许多其他工具来帮助您开发代码。在这里，我们将介绍两个：一个用于对代码进行静态分析，另一个用于拖放代码片段。


    #### 静态分析


    静态分析可以帮助您减少代码中的错误和低效之处。Xcode 4 IDE 允许您在同一个工作区窗口内执行分析、检查代码并根据需要采取纠正措施。一旦选定了要分析的项目，只需选择
    `Product` ![images](img/U001.jpg) `Analyze` 即可开始分析。


    分析完成后，Xcode 会打开问题分析器窗口来突出显示分析结果。任何问题都会用蓝色标注并标记。当您单击其中一个时，Xcode 会高亮显示有问题的代码，供您分析和修正。


    #### 代码片段


    一个有用且已得到扩展的功能是能够将代码片段拖入您的项目，从而为常见代码功能（如实现协议）提供默认实现。


    此 Interface Builder 功能可用于选择项目库，包括代码片段。然后，您可以突出显示一个项目并将其拖到源文件上。例如，对于协议代码片段，这将在您的编辑器中实现默认代码，供您完成后续编写。


    ### 总结


    在本章中，我们首先探讨了 Apple 移动设备的相关特性。您会注意到 iPhone 和 iPod touch 非常相似，而 iPad 则由于其主要采用平板电脑形态，开始引入一些关键差异。


    接着，我们研究了用作应用程序开发方法的设计模式，包括代码是如何组织的。我们讨论了 iOS 应用程序的生命周期，并将其映射到 MVC 模式上，您应该开始注意到这与
    Microsoft Windows 运行基于 GUI 的应用程序的方法有一些相似之处。


    然后，我们比较了类框架（在特性上即使结构不同也很相似），并将 Objective-C 语言和 Xcode 工具与它们对应的 .NET 同类产品进行了比较。Objective-C
    在许多方面与 C# 相似。然而，一个关键区别源于 iOS 应用程序不是托管应用程序。由于该语言基于 C，您会看到内存管理、指针和非类型一致是该语言中的常态。


    现在，您应该对 Xcode 4 环境、Objective-C 语言以及它们与 Microsoft .NET 在代码、框架和工具方面的相似性（至少在关键领域）有了更深入的了解。我们没有对所有内容进行一步步的比较——语言和类框架的广度实在太大了——但这也没有必要。通过结合使用
    Xcode 开发环境、在线资源以及后续章节，我们将开始深入探讨细节。您将看到更多具体示例，展示如何使用该语言和 SDK 的功能，使与 .NET 类的比较更加清晰。这样一来，向
    Objective-C 和 iOS SDK 的过渡将变得更加容易和明显。


    ## 第五章

