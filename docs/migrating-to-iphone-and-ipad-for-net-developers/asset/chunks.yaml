    方法。只需继续添加更多的方法，每个方法代表一个特定的测试用例即可。


    但是，如果你不想每次测试应用时都执行**所有**测试用例，该怎么办？如果你只想测试一两个测试用例呢？这是预料之中的需求，并且在 Xcode 中可以轻松实现。只需使用方案编辑器（![images](img/U007.jpg)）编辑你的项目方案，它会弹出一个对话框，让你管理应用的多个方面，包括要执行的测试。在左侧面板中选择“测试”项，你就可以看到可供选择的测试用例（参见图
    9–2）。


    ![images](img/0902.jpg)


    **图 9–2.** *从方案编辑器中选择要执行的测试*


    使用此对话框，你可以选择在测试应用时要执行哪些单元测试。使用每个测试用例旁的复选框，选择你想要运行的测试。选定完成后，点击“OK”按钮；这将保存你的方案，这意味着在运行你的应用时，这些单元测试将会被执行。然后，你可以使用日志导航器来检查输出和测试结果。


    ## 使用 Xcode 4 调试器


    现在，你已经通过生成和使用单元测试，了解了 Xcode 4 的一些调试功能。然而，它的能力远不止于此。像性能分析这样的高级特性将在本章稍后部分介绍，因此我们首先来看看其他一些对测试应用非常有用的、略低阶一些的功能。


    Xcode 4 的调试器功能与 Visual Studio 或其他集成开发环境非常相似。它允许你在代码中设置断点——程序执行会在这些特定点暂停，以便你检查应用的运行状态。断点允许你逐行遍历代码，并检查应用执行的各个方面，包括变量及其值等。这在运行应用或测试应用时都有效。


    **注意：** 调试应用时，你必须以调试模式编译应用。这让编译器可以向你的代码添加额外信息，从而支持调试功能。同时，这也会显著增加编译后代码的体积，因此在部署应用时，请记得切换为发布模式进行编译以关闭此项。


    那么，让我们沿用之前的示例，确保你是在调试模式下构建。在 `CalculatorTest.m` 实现文件中，我们来添加一个断点。只需点击源代码窗口左侧的装订线区域即可完成此操作。点击后，装订线中会出现一个深蓝色的断点指示器，表示调试时代码会在此处停止。在图
    9–3 中，你可以看到装订线中的断点；同时还可以看到之前添加但已停用（不活跃）的其他断点。这些断点由浅蓝色的断点指示器表示，点击它们即可重新激活。


    ![images](img/0903.jpg)


    **图 9–3.** *代码窗口装订线中的活动和非活动断点*


    添加断点后，你可以像之前一样构建用于测试的应用（⌘U），然后测试你的应用（⌘U）。你的应用会像之前一样在模拟器中启动。你的单元测试会开始向日志文件输出调试文本，但你的应用会在断点处停止。当应用停止时，Debug
    窗口会自动显示在屏幕底部。如图 9–4 所示。


    ![images](img/0904.jpg)


    **图 9–4.** *应用在断点处停止并显示 Debug 窗口*


    最左侧的窗格是导航器窗口，调试时默认显示“线程”窗格，其中展示了应用的线程（即并行的代码执行单元）及其调用堆栈，而 Debug 窗口则位于代码窗格下方。Debug
    窗口在“局部变量”窗格中显示局部变量，你可以通过浏览它们来查看。应用的输出会发送到“控制台”窗口，并存储在日志文件中，但会显示在“输出”窗格中。输出可以是不经过滤的（所有输出），也可以按“调试器输出”或“目标输出”进行过滤。


    Debug 窗口的标题栏提供了控制代码导航方式的选项。当命中断点后，各图标的含义如表 9-1 所示。


    ![images](img/t0901.jpg)


    你还可以使用搜索框来查找或过滤你想要检查的变量。


    通过使用调试器、设置策略性断点以及检查变量值，你可以快速判断应用的执行路径是否符合预期；更重要的是，你还可以查看变量是如何初始化的，以及是否符合你的意图。


    最后，如果你想移除所有断点（无论是活跃的还是非活跃的），请使用断点导航器（⌘6），它可以在一个地方查看所有定义的断点，并对其进行移除或激活操作。如图 9–5
    所示。


    ![images](img/0905.jpg)


    **图 9–5.** *断点导航器*


    ### 其他调试选项


    在调试应用时，还有其他选项可供你使用——不仅是使用控制台输出调试文本这类传统技术，还有如性能分析等高级功能。接下来我们来看看这些内容。'
- fmt: '### Using `NSLog` to Capture Diagnostics


    Using the Xcode 4 tool to debug your application is easy and feature rich—much
    the same as using tools in the .NET environment, such as in Visual Studio. Before
    such tools were available, you were far more limited, but some of the older tools
    can still be useful. For example, you may still find it convenient to add some
    debug code to your application that simply outputs some diagnostic information
    to the Debug window. This might be appropriate if you don''t want to go to the
    extent of creating unit tests and simply want some detail diagnostics in real
    time.


    In Objective-C, you can use the `NSLog` command to send diagnostic text to the
    Debug window (also known as the Console window) and include variable values through
    parameter substitution.


    `NSLog` works like `sprintf()` works in C/C++ languages, or like `Debug.WriteLine`
    in .NET within the `System.Diagnostics` namespace. This method takes a string,
    within which "specifiers" are defined and substituted by the parameters you pass
    to the method following the string declaration. Substitution of the specifiers
    occurs in the order you pass them. The specifiers are show in [Table 9-2](#Chapter09.html#tab_9_2).


    ![images](images/t0902.jpg)


    ### Profiling Your Application


    Profiling goes beyond simple testing and allows you to use the advanced features
    of Xcode 4 to find detailed code errors such as memory leaks or why a particular
    piece of code may be running slowly. A full explanation of the Profiler is beyond
    the scope of this chapter as it''s a complex topic and feature-rich tool. However,
    it''s worth considering it at a high level. You can refer to a more advanced reference
    guide or the iOS Developer Library if you choose to implement profiling in your
    applications.


    Your application should be built for profiling (⌘I) beforehand to ensure that
    all the necessary instrumentation is available. To launch the profile, you can
    choose Profile from the Product menu or use the ⌘I shortcut with the application
    open in Xcode. Once launched, the Profiler will look like that shown in [Figure
    9–6](#Chapter09.html#fig_9_6).


    ![images](images/0906.jpg)


    **Figure 9–6.** *Profiling with all its options visible*


    The tool provides a number of templates that are tailored to understanding your
    application in a specific manner, whether looking for memory leaks, timing the
    execution of your code, or looking at how memory is allocated. The amount of data
    it collects and makes available is immense—comparable with the many .NET-based
    profiling tools on the market—and it''s free in Xcode 4.


    Let''s take a quick look at one profile template as an example; the most obvious
    would be the Leaks profile, a common one to use. Select this template for a simple
    project (see [Figure 9–6](#Chapter09.html#fig_9_6)), such as the Calculator application,
    and select Profile (the screen in [Figure 9–7](#Chapter09.html#fig_9_7)). The
    application is running in the Profiler and all allocations are displayed.


    **NOTE:** While profiling provides a number of useful templated instruments such
    as Memory Leaks, if you''re using Automatic Reference Counting (ARC), memory leaks
    will be a thing of the past.


    ![images](images/0907.jpg)


    **Figure 9–7.** *Profiler with All Allocations displayed*


    If you switch to the Leaks view, you will be presented with a specific view of
    where memory leaks have been detected. In [Figure 9–8](#Chapter09.html#fig_9_8),
    you''ll see that the default Calculator application has no leaks, as a good program
    shouldn''t.


    ![images](images/0908.jpg)


    **Figure 9–8.** *Leaks view within the Profiler with no leaks*


    Not much of a test, so let''s be naughty! Let''s declare a simple `UIImage` member
    variable, allocate memory, and initialize the object with this line:


    ```

    UIImage *img = [[UIImage alloc] init ];

    ```


    But don''t add the corresponding release statement. Now rebuild your application
    for profiling and view the Profiler. It should present a screen similar to that
    in [Figure 9–9](#Chapter09.html#fig_9_9) when you select the same Leaks view.


    ![images](images/0909.jpg)


    **Figure 9–9.** *Profiler displaying memory leaks*


    You can clearly see that memory leaks have been detected, as expected; it highlights
    what type of object is leaking, how much is being leaked, and which library and
    which view is leaking it. All of this information is invaluable in tracing the
    fault.


    The Profiler and its other templates provide similar detailed information allowing
    you to fine tune or just understand how your application is executing in minute
    detail.


    Play around some more. This is a great tool for learning the inners of your code,
    the iOS, and its SDK.


    **NOTE:** You may find profiling useful if you choose to complete your Lunar Lander
    application. See Appendix A for a discussion on how to complete the game.


    ### Using the Simulator''s Debug Features


    So, you can do quite a lot with Xcode 4 around debugging, but there are some things
    that are not possible, especially if they are specific to the device. For example,
    how do you test how your application behaves to a change in orientation, or how
    your application scopes with lack of memory? The features of Xcode 4 don''t help
    you with simulating such things. Thankfully, however, the simulator itself has
    a number of debugging features of its own.


    When the simulator is open, the debugging features are located under the Hardware
    menu. Let''s go through them one by one.


    #### Changing the Device


    An obvious but useful feature is the ability to change the actual device type.
    Under the Device menu are options to simulate the iPad and the iPhone, including
    iPhone 4 Retina versions and other iOS versions provided as part of the iOS SDK,
    although excluding the iPod Touch. Simply choose the device type you want and
    the simulator will respond by displaying the relevant device and simulating it.


    #### Changing the iOS Version


    The next useful feature is to simulate different versions of the iOS. The SDK
    comes with the different supported versions of the iOS up to the point the SDK
    was released, so SDK 4.3 includes all versions of the iOS from 3.2 to 4.3. This
    is useful for backward compatibility testing against the device and iOS combinations
    your application targets.


    #### Simulating Movement


    Clearly, if you had the physical device, then you could test rotating it and shaking
    it. This is not so easy with a simulated device. You can rotate your Mac and shake
    it all you want—it won''t help. However, the simulator provides menu options to
    both rotate the device to the left and right, and to simulate a shake gesture,
    all so that you can cope with such events in your application and test them in
    the simulator.


    #### Triggering Low Memory


    Your mobile device has a finite amount of memory, and every time you open an application,
    it will consume some of that memory. Unless you specifically choose to close the
    application down using the double-click of the Home button, that memory will remain
    used if you''re using iOS 4.0 or above. On the older versions of the iOS, the
    applications did not retain memory as multitasking wasn''t supported. So at some
    point your application might hit low memory, and it knows this because the iOS
    sends a low memory event (the `didReceiveMemoryWarning` event) to your application
    for it to handle. On receiving this event, you may choose to cope with it by releasing
    resources you no longer need or can afford to reload, for example.


    To trigger such an event in the simulator, you can select the Simulate Memory
    Warning menu item to fire the event into your application so you can test its
    response.'
