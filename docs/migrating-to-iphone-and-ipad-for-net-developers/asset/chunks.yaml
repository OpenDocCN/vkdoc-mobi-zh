  trans: '

    ### 应用程序生命周期


    一旦你启动应用程序（通常通过点按屏幕上的图标），就会触发一系列事件，最终在移动设备上显示你的应用程序（你可以在图 4-1 的应用程序生命周期图中看到这一点）。这被称为应用程序的*生命周期*。


    在第 2 章编写“Hello, World”应用程序时，我们已经初步接触了这一生命周期中涉及的一些关键函数。在调用 `main()` 函数之后，`UIApplicationMain()`
    会被执行，并且直到应用程序退出时才会返回。该类会创建应用程序对象，确保应用程序委托被实例化，然后加载定义应用程序主窗口的主要 `.nib` 文件。


    应用程序通过查看信息属性列表文件 `Info.plist` 来确定要加载哪个主要的 `.nib` 文件。该文件包含存储在 XML 文件中的许多键/值对，每个键/值对用于表示一个可配置参数。如果你使用
    Xcode 打开 `Info.plist`，你会看到类似图 4-2 所示的屏幕。


    ![images](img/0402.jpg)


    **图 4-2.** *Info.plist 值*


    你可以清楚地看到，“Main nib file base name”条目被定义为 `MainWindow`。因此，如果我们查看目录，会看到一个名为 `MainWindow.xib`
    的文件，这是默认加载的主窗口资源文件。你可以更改它，但几乎没有必要这样做。


    加载资源文件会为其包含的任何对象创建类，并通过反序列化资源文件中保存的值来分配它们的相关属性。`.xib` 文件本质上是主窗口、用户界面和对象的序列化（保存到磁盘）版本，可以在任何时候重新构建（反序列化）（很像给干面条加水）。


    **注意：** 你可以使用 `Info.plist` 文件来存储你自己的应用程序配置值。只需通过用户友好的 Xcode 编辑器或其他文件编辑器添加你的值即可。


    在你的主应用程序运行后，它会由应用程序委托来管理，该委托使用*委托*模式来克服子类化带来的一些复杂性。这通常涉及创建一个继承自父类的新类，然后可能重写其父类中提供的方法。我们的应用程序委托实现了
    `UIApplicationDelegate` *协议*，用 C# 的术语来说，这相当于实现一个*接口*。我们不需要使用具有继承方法和重写方法的对象层次结构，而是直接实现接口中明确标识的方法。


    应用程序启动过程的最后阶段，它将进入*活跃*状态——这是应用程序将呈现的多种状态之一。这由 `applicationDidBecomeActive` 方法指示。


    应用程序生命周期有一系列由 iOS SDK 定义的*状态*，你可以根据应用程序的状态来管理其行为。让我们看看存在哪些不同的应用程序状态，以及如何管理它们。


    ### 管理应用程序状态


    应用程序委托的一个关键职责是管理应用程序在运行时所经历的不同状态转换。iOS 4.0 引入了两种新的应用程序状态：应用程序可以在后台运行或处于挂起状态。


    任何状态转换都需要你的应用程序做出响应，以确认其行为正确。例如，如果因启动新应用程序而将应用程序状态设置为后台，那么停止更新其用户界面是合理的。


    当应用程序状态发生变化时，你使用应用程序委托中调用的方法做出相应响应。同样值得注意的是，应用程序的启动可能不是用户直接请求的结果，而是通过间接请求触发的。例如，你的应用程序可能会被调用来处理推送通知。


    在所有情况下，都会调用 `didFinishLaunchingWithOptions` 方法，并通过选项提供其被调用的原因，并且在某些情况下（例如由于推送通知），还会提供相关的数据有效载荷。


    iOS 4.0 及以上版本支持的所有状态如表 4-3 所示。


    ![images](img/t0403.jpg)


    应用程序不会在未经历过渡状态的情况下，就简单地从一种状态直接转移到另一种状态。例如，如果应用程序因来电而被中断，应用程序会通过调用 `applicationWillResignActive`
    方法被告知即将变为非活跃状态。这是你准备将应用程序发送到后台的机会。如果你接听了电话，应用程序将通过调用 `applicationDidEnterBackground`
    方法被发送到后台。然而，如果你决定忽略呼叫，应用程序将重新获得前台焦点并再次触发 `applicationDidBecomeActive` 方法，以便你进行相应处理。同样的情况也适用于之前在后台上运行并被发送到前台的应用程序。在这种情况下，会在进入前台之前调用
    `applicationWillEnterForeground` 方法，并在应用程序进入前台时调用 `applicationDidBecomeActive`
    方法。这些状态如图 4-3 所示。


    ![images](img/0403.jpg)


    **图 4-3.** *应用程序状态图*


    ### 管理应用程序的行为


    正如你所看到的，应用程序通常会花费时间在不同状态之间移动，尤其是在典型使用场景下。例如，用户经常会在多个应用程序之间切换，前一分钟还在查看邮件，下一分钟接听电话，然后上网浏览。我们已经探讨了处理状态变化的方式，以及
    iOS SDK 如何巧妙地使用 Objective-C 的委托技术来调用一个方法，从而让你能够提供自己的实现。


    显然，你的应用程序如何响应这些状态变化在很大程度上取决于你的应用程序本身，因为每个应用程序都不同。但有些应用程序任务对所有应用程序来说都是相同的。在本节中，我们将简要介绍这些任务，这将帮助你入门。


    #### 处理方向变化


    苹果的移动设备内置了水银开关，可以感知设备的方向，从而也了解你的应用程序的方向。大多数 iOS 应用程序最初以竖屏模式启动，然后会旋转你的应用程序以匹配设备的方向；如果合理的话，有些应用程序会以横屏模式启动。对于你的应用程序来说，在不同方向下工作可能并不合适，这需要你来管理。例如，观看电影可能只适合横屏方向。


    在你开始惊慌并思考究竟如何编写那些不可避免的复杂代码来旋转你的应用程序之前，请停下来！幸运的是，*自动旋转*（正如其名）可以通过 iOS 和 UIKit 框架的组合方便地处理——前提是你希望你的应用程序进行旋转。iOS
    SDK 通过一个方法来支持自动旋转，该方法定义设备是否已旋转以及你的应用程序是否应支持该旋转，同时也通过 Interface Builder 来支持，你可以在其中定义视图如何管理用户界面的方向。我们将在本书后面进一步探讨这个主题。

    '
- fmt: '##### Files Within Your Application and the Application Sandbox


    As with most operating systems, the filesystem is usually accessible by the application,
    although with some restrictions to ensure the security of your device. The iOS
    provides your application with access to an area of the filesystem that is accessible
    only by that application. It does this through the use of an *application sandbox*,
    which is implemented through the iOS as a security mechanism. The sandbox provides
    fine-grained control, limiting areas that it thinks could present a security problem
    if exploited, such as the filesystem and access to network resources.


    The sandbox for an application is implemented when the application is first installed.
    The path to the Simulator''s home directory is in the form `<//ApplicationRoot>/Applications/ApplicationID`,
    where `<Root>` is the following directory from the users home directory `/Library/Application
    Support/iPhone Simulator/<iOS Version>/` is an area on the filesystem where the
    applications are installed. The *`ApplicationID`* uniquely identifies the specific
    application. When combined, this is called the *application home directory*.


    A number of important application subdirectories are created, allowing your application
    to write data and its preferences within the constraints provided by the iOS security
    system. These subdirectores are installed from the application''s home directory.
    For example, `<Root>/Applications /ApplicationID/Documents` is where application
    data and documents are stored. The `/tmp` directory is for files that do not need
    to persist between application launches.


    **NOTE:** For more details about the sandbox, see the section “The File System”
    in the *iOS Application Programming Guide*.


    ##### Multitasking


    We won''t cover multitasking in this book, but this brief introduction of the
    capabilities made available in the iOS 4.0 may help you explore further using
    the online resources available.


    The use of multitasking has long been supported in the .NET Framework, although
    for the iOS, it wasn''t until version 4.0 that multitasking support was properly
    introduced to application developers.


    Note that not all devices support multitasking. You can query the `multitaskingSupported`
    property of `UIDevice` to see whether the device on which the application is running
    supports it.


    An application may process certain tasks in the background, although these are
    carefully controlled. The following types of background behavior are supported:


    - Tracking a user''s location, either continuously or periodically monitoring
    for updates. This is useful for location-based applications.

    - Playing background audio. This is common for fitness-type applications.

    - Completing finite-length background tasks. An example is saving data to disk
    to avoid corruption.

    - Timed local notifications. This is used in alarm clock-type applications, for
    example.


    ### Comparing the .NET Framework with iOS and the iOS SDK


    Let''s start with a comparison of the two environments and their frameworks, positioning
    the runtime and design-time aspects of each relative to one another. This context
    will be useful when understanding the architecture of your application and how
    the APIs are used. Take a moment to consider the diagram in [Figure 4–4](#Chapter04.html#fig_4_4).


    ![images](images/0404.jpg)


    **Figure 4–4.** *.NET and iOS framework comparison*


    If we consider the generic layers and which elements are covered by both the .NET
    Framework and the iOS operating system and SDK, you''ll notice the following similarities:


    - **User-interface services**: These are the services responsible for delivering
    the user interface and looking after user interactions, such as device input.
    The iOS SDK uses the Cocoa Touch extensions as well as aspects of other layers
    such as the Media Layer to accomplish this, especially the multitouch input. The
    .NET Framework includes both Windows Presentation Foundation (WPF) and Windows
    Forms to achieve this.

    - **Application services**: This category consolidates a number of component parts
    in both .NET and Apple''s frameworks, such as the iOS SDK. In iOS, the Cocoa API,
    Cocoa Touch, and Media layer are included, whereas for .NET, elements such as
    Foundation Services, Data Services, and communications and workflow would be included.
    Any API aspects that deal with the user interface and user input have deliberately
    been separated out into user-interface services.

    - **Runtime services**: This is functionality that is provided to an application
    at runtime, and is typically contained within the operating system or runtime
    environments that run on top of the operating system. The .NET or Java runtime
    environments are good examples of runtime services sitting on top of an operating
    system. Runtime services include memory management, disk access, graphic card
    APIs, and so on.

    - **Hardware**: This remains a constant in all our architectures, although the
    specification of it will change depending on the device, as will its capabilities.
    The software-based layers above the hardware enable an abstracted way of using
    it.


    These similarities shouldn''t be surprising. Over many years of device, operating
    system, and application evolution, best practices have surfaced leading to such
    similarities. So at a high level, it''s easy to draw the comparison. But the devil
    is in the details. If we drop down a level, we''ll start to see the nuances of
    each framework''s implementation. We''ll see features included in one framework
    but completely excluded from the other, or in other cases, implemented through
    different mechanisms.


    Starting at the top of the stack, let''s look at the different layers, comparing
    the frameworks and libraries within them. This will help you to understand the
    terms and structure in .NET and how its counterparts work in Apple''s world.


    We won''t delve into the specifics of classes and methods within classes, which
    you can find in Apple''s online iOS reference. By highlighting through comparison
    the equivalent capabilities in the iOS SDK, the usage of these should be straightforward.
    This will lay the foundation for upcoming chapters, where we will walk through
    some working examples.'
