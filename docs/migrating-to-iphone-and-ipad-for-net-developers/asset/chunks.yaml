  trans: '

    #### 使用 iOS 嵌入式数据库


    我们之前的示例虽然完全适用，但仅限于使用可序列化为本地或网络文件系统的对象来创建数据。您可能希望采用更全面的机制来持久化数据，特别是当您希望操作数据而无需在代码中进行复杂的文件或对象操作时——使用简单的基于文件系统的存储机制来存储数据会带来这种副作用。在这种情况下，您可以使用
    iPhone 的嵌入式数据库，名为 `SQLite`。


    `SQLite` 是一个嵌入式关系型数据库管理系统（RDBMS），在许多方面与您可能熟悉的更传统的基于服务器的数据库（如 Oracle 和 Microsoft
    SQL Server）相似，您都可以使用结构化查询语言（SQL）来访问和操作数据库中保存的数据。但是，它不需要您运行任何应用程序。您只需在应用程序中使用提供的
    API 代码来调用作为 iOS 一部分提供的 `SQLite` 功能。


    让我们看看如何在移动 iOS 设备上使用 `SQLite` 功能来访问数据库功能。


    **注意：** 如果您不熟悉 SQL 语言，有很多关于此主题的资源可供参考。例如，请参阅 *Beginning SQL Server 2008 for Developers*
    以及 Apress 出版的其他书籍。


    在开始之前，您需要通过对支持库代码的库进行引用来为应用程序添加对 `SQLite` 的支持，然后包含相关的头文件。因此，首先使用项目摘要的 Build Phases
    标签页，选择“+”按钮，将名为 `libsqlite3.dylib` 的库添加到项目中。对话框应该类似于图 7-1 所示。


    ![images](img/0701.jpg)


    **图 7-1.** *将 SQLite 库添加到项目的构建阶段*


    然后，您需要在包含 SQLite 代码的源代码文件中通过下面的 `#import` 指令来包含对支持头文件的引用：


    `#import "/usr/include/sqlite3.h"`


    ##### iOS SDK 有哪些选项？


    使用 SQLite API 并不是访问 iOS 设备数据库的唯一选择。`Core Data` 是一个框架，它被描述为“模式驱动的对象图管理和持久化框架”，这可能会让人感到困惑。这实际上意味着
    `Core Data` API 不仅管理数据的存储位置、存储方式以及如何为性能目的管理这些数据，还允许开发者在无需 SQL 的条件下创建和使用关系型数据库。它允许您用
    Objective-C 与 `SQLite` 进行交互，而无需担心连接或管理数据库模式。对于 ADO.NET 开发者来说，这些特性中的大部分类似于抽象了数据库访问的
    .NET Framework。


    但是，我们不会在本章同时涵盖 `SQLite` 和 `Core Data`。我的目标是通一个使用 SQLite API 的工作示例，带您了解其原理。这将为您应用这些知识打下良好的基础，无论您选择哪种方法：`SQLite`
    还是 `Core Data`。


    我建议您利用在线资源探索 `Core Data`，特别是位于 [`http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/CoreData/cdProgrammingGuide.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/CoreData/cdProgrammingGuide.html)
    的 *Core Data 编程指南*。


    ##### 创建或打开您的数据库


    `SQLite` 是用可移植的 C 语言编写的，而不是 Objective-C。因此，我们需要用 C 语言编写代码，并在必要时进行类型之间的转换。


    让我们首先使用 `sqlite_open()` 方法打开数据库，并使用提供的常量来检查成功（`SQLITE_OK`），如果失败则记录错误。以下代码实现了这一点：


    ```

        sqlite3 *db;

        int result = sqlite3_open("/documents/file", &db);

        if (result == SQLITE_OK)

        {


        } else NSLog(@"Failed to open database");

    ```


    在这个例子中，如果数据库存在，它将被打开；如果不存在，它将被创建。


    **注意：** `sqlite_open()` 方法需要一个 UTF-* 字符串作为参数——即一个 8 位编码的字符串。这与 `NSString` 不同，但您可以使用
    `UTF8String` 方法将 `NSString` 转换为 UTF-8 字符串。


    请注意，在尝试打开数据库时（尤其是当它不位于您本地机器上时），您几乎肯定会遇到数据库连接超时的问题。这通常是由于访问非本地资源时的延迟（或时延）造成的，尤其是在通过互联网连接时。因此，您应该始终拦截所有错误消息并适当处理它们。例如，如果请求超时，您可能需要重试。


    ##### 在数据库中创建表


    打开数据库并准备好使用后，下一步是创建一个表来存储数据。SQL 命令 `CREATE TABLE` 可以与可选条件一起使用，仅在表不存在时创建它。以下代码执行
    `CREATE TABLE` 命令，并创建一个名为 `NAME` 和 `SCORE` 的两列的表，两者的类型都是 `text`。


    ```

           char *errMsg;

           const char *sql = "CREATE TABLE IF NOT EXISTS HIGHSCORE (NAME TEXT, SCORE
    TEXT)";

           if (sqlite3_exec(db, sql, NULL, NULL, &errMsg) == SQLITE_OK)

           {

             // code to write here

           } else NSLog(@"Failed to create table");

    ```


    现在表将被创建（如果它之前不存在的话），我们就可以开始用数组中的数据来填充它了。

