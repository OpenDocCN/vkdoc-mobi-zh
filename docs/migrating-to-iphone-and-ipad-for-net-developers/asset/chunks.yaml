    of online resources to help you get started, asshown in [Figure 3–13](#Chapter03.html#fig_3_13).


    ![images](images/0313.jpg)


    **Figure 3–13.** *Empty project Dashboard in Titanium Mobile*


    If you jump straight to the Test & Package option tab, you''ll see the screen
    shown in [Figure 3–14](#Chapter03.html#fig_3_14). One of the options is the Launch
    button, which will build and run your application within the mobile device simulator
    matching the project type chosen, which is the iPhone simulator in our example.


    ![images](images/0314.jpg)


    **Figure 3–14.** *Test & Package tab in Titanium Mobile*


    The default application generated by Titanium Mobile provides two tabs with a
    text label on each tab. We will modify this to show only one tab with our chosen
    text (“Hello, World”) on it.


    First, let''s take a look at the folder structure and files created. In addition
    to the files created, the following folders were added:


    *   **`\build`**: This folder contains the files imported from the SDK and automatically
    generated files that typically are not modified, such as the `main.m` file. The
    binaries and libraries are also located here.

    *   **`\resources`**: This folder contains the resources that support your application,
    including source code. Here, you will find the `app.js` file, the main JavaScript
    application file used to start your application. We will make our modifications
    in this file.


    Take a little time to examine the `app.js` file. It''s pretty straightforward.
    As noted, the default implementation is to create two tabs, each containing a
    label, and add these to the main application window, and we''re going to adjust
    this to display just the one tab and label.


    Let''s examine some of the highlights of the code. First, the most obvious thing
    to note is that an initial reference is made to the `Titanium.UI` namespace. This
    namespace contains the classes that provide access to the user-interface objects.
    It uses this information to initially set the background and also to create a
    tab group, as follows:


    `var tabGroup = Titanium.UI.createTabGroup();`


    The new `Tab` objects will be added to this group, with each `Tab` pointing to
    a window that will be displayed when chosen (although our code will implement
    only a single tab to show the “Hello, World” text). Consider the following code:


    `//`

    `// create base UI tab and root window`

    `//`

    `var win1 = Titanium.UI.createWindow({  `

    `    title:''Tab 1'',`

    `    backgroundColor:''#fff''`

    `});`

    `var tab1 = Titanium.UI.createTab({  `

    `    icon:''KS_nav_views.png'',`

    `    title:''Tab 1'',`

    `    window:win1`

    `});`


    This creates the main window and assigns it the caption of Tab 1, using a `Tab`
    object to which this window is assigned. When selected in the application, this
    tab will display this window.


    Let''s skip to the code that creates the new label, after creating a new window
    and assigning this to the new tab. Consider the following segment:


    `var label1 = Titanium.UI.createLabel({`

    `        color:''#999'',`

    `        text:''Hello, World'',`

    `        font:{fontSize:20,fontFamily:''Helvetica Neue''},`

    `        textAlign:''center'',`

    `        width:''auto''`

    `});`


    `win1.add(label1);`


    We simply create a label object and assign it the “Hello, World” text. We can
    then add this to the main window, referenced by the `win1` variable.


    Finally, we add our tab to the tab group and open the tab group, displaying the
    window and our tabs on the main application.


    `//`

    `//  add tabs`

    `//`

    `tabGroup.addTab(tab1);`


    `// open tab group`

    `tabGroup.open();`


    In carrying out these actions, the application will also display our “Hello, World”
    text. And since it''s built within the Titanium Developer IDE, it will also launch
    the iPhone simulator, as shown in our running application in [Figure 3–15](#Chapter03.html#fig_3_15).


    ![images](images/0315.jpg)


    **Figure 3–15.** *Titanium Mobile HelloWorld application*


    As you can see, the Titanium IDE is easy to work with and has a complete API.
    I''ll leave further discovery for you to try out with the help of the online reference
    material and the Kitchen Sink application, which provides out-of-the-box examples
    to examine and modify.


    ### Using the Marmalade SDK


    The Marmalade SDK has the same goal as Titanium Mobile, which is to enable you
    to build your application against an API that is agnostic of the mobile device
    and its operating system. With it, you can develop cross-platform applications
    in a single hit!


    The Marmalade SDK supports single-click deployment to a number of operating systems,
    including iOS, Android, Symbian, Windows Mobile, and more. We''ll be using the
    Xcode IDE to create our Marmalade-based application.


    **NOTE:** While the Marmalade API supports core features for all types of applications,
    it has a bias toward games development. You will find a rich set of APIs that
    enable you to write compelling mobile games.


    The Marmalade SDK can be thought of as the following two components:


    *   **MarmaladeSystem**: This provides the operating system abstraction API, which
    when used with the associated libraries, allows you to build mobile applications
    for a variety of operating systems. It provides a suite of tools and the C API
    called the S3E API.

    *   **MarmaladeStudio**: This provides a suite of tools and runtime components
    to allow a focused development on high-performance 2D and 3D graphics and animations.'
