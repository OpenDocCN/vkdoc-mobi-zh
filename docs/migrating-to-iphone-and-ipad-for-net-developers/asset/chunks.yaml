    #### Testing the High-Score Class


    Doesn''t our class look lovely? Well, at least it''s better than holding a sequence
    of strings that you then need to interpret. Now let''s see if it works.


    The code in [Listing 7-5](#Chapter07.html#list_7_5) represents a test harness
    to execute our high-score code and see if it works. Where you place it in your
    project is pretty much up to you, but you would see something like this in the
    initialization of your game—for example, to preload the default high scores if
    none exist in a table.


    **Listing 7-5.** *Test Harness for the High-Score Code*


    `// Initialize our high score`

    `HighScore *hs = [[HighScore alloc]init];`

    `// Create 5 default entries`

    `HighScoreEntry *e1 = [[HighScoreEntry alloc]initWithParameters:@"Mark":900];`

    `    [hs addHighScoreEntry:(e1)];`


    `HighScoreEntry *e2 = [[HighScoreEntry alloc]initWithParameters:@"Rachel":700];`

    `    [hs addHighScoreEntry:(e2)];`


    `HighScoreEntry *e3 = [[HighScoreEntry alloc]initWithParameters:@"Oliver":500];`

    `    [hs addHighScoreEntry:(e3)];`


    `HighScoreEntry *e4 = [[HighScoreEntry alloc]initWithParameters:@"Harry":300];`

    `    [hs addHighScoreEntry:(e4)];`


    `HighScoreEntry *e5 = [[HighScoreEntry alloc]initWithParameters:@"Tanya":100];`

    `    [hs addHighScoreEntry:(e5)];`


    `// Persist our initial high score to the database`

    `[hs persist];`


    If you execute the code in [Listing 7-5](#Chapter07.html#list_7_5) with the debug
    code that rereads the data after persisting it, you should see debug output similar
    to the following:


    `2011-08-17 19:59:37.237 DataStorage[676:207] NAME: Mark SCORE: 900`

    `2011-08-17 19:59:37.237 DataStorage[676:207] NAME: Rachel SCORE: 700`

    `2011-08-17 19:59:37.238 DataStorage[676:207] NAME: Oliver SCORE: 500`

    `2011-08-17 19:59:37.238 DataStorage[676:207] NAME: Harry SCORE: 300`

    `2011-08-17 19:59:37.239 DataStorage[676:207] NAME: Tanya SCORE: 100`


    In your game, you would hold the instance variable for the high scores with a
    class that has suitable visibility, and you would initialize it with the default
    values only if the table didn''t exist. You would also want to release the high-score
    class variable at a suitable point when your application terminates.


    But what about reading the high-score data if your application isn''t being run
    for the first time? This requires a few changes. First, when persisting the data,
    we need to clear the table''s contents so the table is ready to receive the new
    data. This is easily done by adding the following code between the table being
    created (if it needs to be created) and before we start writing any content:


    `// DELETE from the table`

    `const char *sqldelete = "DELETE FROM HIGHSCORE";`

    `sqlite3_exec(db, sqldelete, NULL, NULL, &errMsg);`


    We can also use the code we wrote to read the table and dump it to the log file
    to help us implement a method that reads the data from the table to initialize
    the high score. We''ll call this method `readHighScores`, and its implementation
    is shown in [Listing 7-6](#Chapter07.html#list_7_6).


    **Listing 7-6.** *Reading the High-Score Data from the Table*


    `#import "MainViewController.h"`

    `#import "HighScore.h"`


    `// readHighScores method`

    `-(void)readHighScores`

    `{`

    `    // Open our database`

    `    sqlite3 *db;`

    `    int result = sqlite3_open("mydb.sqlite3", &db);`

    `    if (result == SQLITE_OK)`

    `    {`

    `        // We''ve opened the database, so let''s clear our array`

    `        [scores removeAllObjects];`


    `        // READ FROM TABLE`

    `        sqlite3_stmt *readstmt;`

    `        const char *readSQL = "SELECT NAME, SCORE FROM HIGHSCORE";`

    `        sqlite3_prepare_v2(db, readSQL, -1, &readstmt, NULL);`

    `        while (sqlite3_step(readstmt) == SQLITE_ROW)`

    `        {`

    `            NSString *name = [[NSString alloc] initWithUTF8String:(const char`![images](images/U002.jpg)

    ` *)sqlite3_column_text(readstmt,0)];`

    `            int score = (const int)sqlite3_column_int(readstmt,1);`

    `            HighScoreEntry *e = [[HighScoreEntry alloc]initWithParameters:name:score];`

    `            [self addHighScoreEntry:(e)];`

    `            [e release];`

    `        }`

    `    } else NSLog(@"Failed to open database");`

    `}`


    This should be pretty easy to follow, as it uses a lot of the code we''ve used
    previously. We use a `SELECT` statement to read the data from the table and cycle
    through the data while rows of data still exist. In doing so, we then extract
    the data—in this case, the name as text (converting to UTF-8 to comply with the
    `NSString` class) and the score as an integer. We then use these as parameters
    in creating a `HighScoreEntry` class instance, which is added to our high-scores
    array and then released.


    #### Completing the Class


    Almost complete, our class can now be initialized with a default high-score table.
    We can persist this to a local database on our iOS mobile device using SQLite,
    and we can reread this data back into our high-score display. The presentation
    of this high score is left to you, but you might consider using a Table view,
    something we''ll touch on in [Chapter 10](#Chapter10.html#ch10), as we''ll be
    looking at impressive user interface transformations there.


    At the moment, there is nothing to limit your number of high-score entries. This
    is by design, as you can decide what a suitable limit is and use the knowledge
    gained so far to create a method that implements that constraint when it adds
    a high-score entry. Also, you will want to sort your high scores, typically in
    order of score, with the highest first, assuming a bigger score is better.


    As this chapter''s focus is on persistence, not sorting arrays, we won''t go over
    the complete implementation. But to help you get started, I will provide some
    pointers on how to approach sorting.


    First, to sort an `NSMutableArray` that contains custom objects (that is, a class
    that inherits from `NSObject`), you use the `sortArrayUsingSelector` method, which
    performs the sort, but asks that you provide as a parameter the method to use
    as the comparator, called the *selector*.


    Next, you to need to implement your own comparator that can make sense of the
    objects in your array. In our case, we would compare the `score` member variable
    and sort with the highest first. The beginning of such a method is shown here
    for you to experiment with and complete.


    `(NSComparisonResult)compare(HighScoreEntry* otherObject`

    `{`

    `  return ( // DO YOUR COMPARISON HERE between self and otherObject)`

    `}`'
