- fmt: '#### Submitting an App to the Store


    Here are the steps for submitting an app to the App Store:


    1. Complete the development and testing for your app.

    2. Create the supporting `info.plist` file for your app (more on this later).

    3. Write a description for your app.

    4. Choose a unique numeric SKU for your app.

    5. Assemble your screenshots to be displayed on the App Store.

    6. Prepare your iTunes artwork.

    7. Submit through iTunes Connect.


    Any application submitted is subject to approval by Apple, as outlined in the
    SDK agreement, for basic reliability testing and other analysis. Apple has a process
    for appeals, but it ultimately has the final decision. If your app is rejected,
    you can still distribute it ad hoc by manually submitting a request to Apple to
    license the application to individual iPhones (although Apple may withdraw the
    ability for you to do this at a later date).


    The official *App Store Review Guidelines* for developers is a good source of
    material. We''ll also discuss the details of submitting an application for approval
    and distribution rights in [Chapter 9](#Chapter09.html#ch9).


    ### Summary


    This chapter introduced the concepts of developing applications for Apple''s mobile
    devices, specifically the iPhone, iPod touch, and iPad. We''ve looked at how to
    register as an Apple Developer, and why this is recommended, as well as some of
    the principles surrounding mobile application development. We then discussed the
    iOS operating system, which powers these mobile devices, and the iOS SDK and Xcode.


    Following the introduction of these concepts, we took a look at some of the different
    options available to develop applications. These include not only Apple''s own
    native languages and tools, but also a number of other third-party options, both
    open source and commercial.


    We concluded with an introduction to the App Store—its purpose, revenue model,
    and support of various devices. You learned the mechanics of submitting a new
    application to the App Store for review and if approved, publication.


    The next chapter provides a crash course in creating a simple application using
    Apple''s native tools, the iOS SDK and Xcode. By the end of that chapter, not
    only will you have created your first iPhone application, but you will also have
    a better appreciation for some of the fundamental concepts in developing a mobile
    application, which you can reuse when you look at some of the other options available.


    In [Chapter 3](#Chapter03.html#ch3), you will learn more about the third-party
    tools, such as the Mono family. After that, we''ll focus again on the Apple tools
    and use these throughout the rest of the book to demonstrate how to apply your
    .NET knowledge and experience to creating compelling apps.


    ## Chapter 2


    ## Jump In: A Crash Course on Development Using the iOS SDK


    The first chapter introduced both Apple''s mobile operating system (iOS) and options
    for developing your own mobile applications. In this chapter, we''ll get started
    with Apple''s own software development tools: `Xcode` and the iOS SDK.


    This chapter covers the following topics:


    - The hardware and software you need to get started

    - A guide to installing the relevant components

    - An Objective-C primer

    - An overview of `Xcode` and how to start your first project

    - How to create your first iPhone application using the iOS SDK


    ### Getting Started


    Let''s begin by taking a look at what you''ll require to get started—not just
    the software components, but also the hardware you will need.


    You''ll also need to sign up to become a registered Apple Developer. Apple requires
    this step before you''re allowed to download the iOS SDK. In [Chapter 1](#Chapter01.html#ch1),
    we discussed why you''ll need to do this, the benefits, and how to go about it.
    As a reminder, you need to visit [`http://developer.apple.com/`](http://developer.apple.com/)
    to sign up.


    **NOTE:** In [Chapter 1](#Chapter01.html#ch1), I mentioned some of the benefits
    of becoming a registered Apple Developer. One of these is a useful list of *Getting
    Started* guides that provide short introductions to a number of topics, such as
    graphics and animation, data management, and so on. You can find them and much
    more in the iOS Developer Library at [`http://developer.apple.com/library/ios/navigation/index.html`](http://developer.apple.com/library/ios/navigation/index.html).


    #### Choosing the Right Machine


    You will need an Apple Mac to get started. You may already have an old device
    and are wondering whether it is still suitable for developing modern mobile applications.
    The news is good: some of the older Apple Mac machines will run the required software.
    The important bit is the operating system.


    To support development for the iPhone, iPod touch, and iPad, you will need `Xcode`
    3.2.6 or higher (this includes iOS SDK 4.3). This version also provides support
    for packaging and submission of your apps to the App Store. This version of Xcode/iOS
    SDK requires Mac OS X Snow Leopard version 10.6.6 or later and an Intel-based
    Apple Mac machine. The important distinction here is the Intel processor.


    In 2006, Apple discontinued the use of the PowerPC processor and announced the
    move for all future Macs to run on the x86 processor made by Intel. So, Mac devices
    made in 2006—specifically, the Mac mini, iMac, MacBook, MacBook Pro, and Mac Pro—will
    happily run Mac OS X Snow Leopard, or the more recently released Lion operating
    system, and development tools, provided that you have sufficient memory and hard
    disk space. The memory and space you need vary depending on the version of the
    operating system you are installing.


    **CAN I USE A PC?**


    What if you don''t want to use an Apple device? What if you want to use a PC running
    an operating system like Windows? Well, this really depends on which tools you
    are planning to use to develop your mobile apps.


    A number of the third-party options introduced in [Chapter 1](#Chapter01.html#ch1)
    are actually designed to run on a Windows-based PC, using languages other than
    Objective-C. But what if you want to use native Apple tools such as `Xcode`? That
    is not so straightforward. These tools will run only on Mac OS X Snow Leopard
    and Lion, and therefore you will need an Intel-based Mac. However, technically
    all is not lost! Through the use of virtualization software, such as commercial
    products like VMware or freeware such as `VirtualBox`, you could run Mac OS X
    Snow Leopard on an Intel-based PC within a virtual machine.


    But wait! While running the operating system on a virtual machine is technically
    possible, and there are many examples of people successfully doing this (called
    Hackintosh) it is not permitted within Apple''s license agreement for Mac OS X
    and is therefore illegal.


    #### Choosing the iOS SDK


    So you have a suitable machine, running Mac OS X Snow Leopard or Lion, which will
    allow you to download and install the required software. But what software? [Chapter
    1](#Chapter01.html#ch1) introduced `Xcode`, which includes the iOS SDK and provides
    a complete tool set for building iOS applications. If you haven''t already done
    so, you will need to download it from [`http://developer.apple.com/xcode/`](http://developer.apple.com/xcode/).


    Since the release of `Xcode` 4, you currently have two options for obtaining and
    installing `Xcode`. As you''ve learned, `Xcode` 3.2.6 or higher supports development
    for Apple''s mobile devices and is available free of charge. However, you may
    wish to use the most recent version, `Xcode` 4, which is available free to members
    of the iOS or Mac Developer Program or can be purchased from the App Store.'
