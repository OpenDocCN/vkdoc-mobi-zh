    \ 开发者协议，该章节涉及部署。\n\n### 第三方库\n\n我们已经确认 Apple 最终清醒过来并解除了之前的限制，这意味着第三方库得到了更广泛的支持。我们还了解了存在哪些类型的库，以及如何根据\
    \ Apple 开发者协议使用它们。\n\n在第 3 章中，我们研究了用于编写应用的第三方解决方案。这些第三方框架附带了一系列提供所需功能的库，因此它们总是一个选择。但如果你想要一个更小、更具体的库来提供扩展应用的功能呢？那么，你会很高兴听到它们确实存在。实际上，利用你学到的关于编写库的知识，你甚至可以发布自己的第三方库并从中获利。\n\
    \n首先，我们将介绍第三方库的两个类别，然后回顾一些目前可用的更有用的库。\n```"
- fmt: '# Categories of Third-Party Libraries


    Third-party libraries fall into two general categories: commercial and open source.


    As its name suggests, a *commercial library* is one that is owned by an organization
    that places restrictions on its use and typically charges a fee for obtaining
    it, using it, or both. For example, in the .NET world, it is common for developers
    to buy extensions to the .NET library in the form of assemblies that do things
    like draw fancy graphics or compress files. The same is true of Apple, and many
    commercial organizations sell libraries for use on the iOS platform. But be sure
    to check the license agreements associated with any libraries and their use of
    such licenses.


    An *open source library* is a library whose use is restricted to a degree, for
    example, under the GNU General Public License (GPL), but it is free to use.


    Apple does, however, have its Developer Agreement, and your library must be conformant.
    It also still reserves the right to refuse or to revoke any application in the
    App Store. Again, this hasn''t won any favors in the community, but as you can
    see from the App Store, it certainly has not put off people from writing applications
    with libraries, free or otherwise.


    ## Useful Third-Party Libraries


    So we''ve touched on writing your own library, and consider the different types
    of libraries you might find on the Internet. Let''s take a look at some example
    third party libraries that exist and provide both a brief synopsis and an Internet
    URL for you to access them.


    **NOTE:** I do not recommend or imply any warranty on the use of these libraries.
    If you choose to use them, this is your choice, and I cannot guarantee their functionality,
    performance, or that they will be accepted by Apple for the App Store.


    * **ZBar–Barcode Reader:** This can be found at [`http://zbar.sourceforge.net/iphone/index.html`](http://zbar.sourceforge.net/iphone/index.html)
    and is both a Library and Example Application (available from the App Store) that
    enables you to write software to read a variety of different bar codes using the
    iPhone''s camera and even link them to stores such as Amazon or search engines
    such as Google.

    * **GData - Google Data:** This can be found at [`http://code.google.com/p/gdata-objectivec-client/`](http://code.google.com/p/gdata-objectivec-client/)
    and provides an API as an Objective-C based static library that allows access
    to a variety of Google-based services and for you to read and write data. For
    example, Google Analytics, Google Books, Blogger, and Google Docs are all supported.

    * **Three20 – Facebook API:** This can be found at [`http://three20.info/`](http://three20.info/),
    and while known as the Facebook API, this isn''t strictly accurate. However, it
    is used by the Facebook Application and many others to provide powerful view controllers,
    a photo browser, and an Internet-aware table.

    * **iPhone Analyzer:** This can be found at [`http://sourceforge.net/projects/iphoneanalyzer/`](http://sourceforge.net/projects/iphoneanalyzer/)
    and allows you to analyze the contents of your iPhone device in great detail,
    including plists, databases, and the internal file structure of your device. However,
    at present iOS 4 is not supported.

    * **Leaves:** This can be found at [`https://github.com/brow/leaves`](https://github.com/brow/leaves)
    and is a library for both the iPhone and iPad that provides page-turning functionality
    like iBooks.

    * **Core-plot:** This can be found at [`http://code.google.com/p/core-plot/`](http://code.google.com/p/core-plot/)
    and provides a plotting framework for the 2D visualization of data on both the
    iOS and Max OSX.


    ## Looking Elsewhere for Libraries


    While I''ve highlighted some third-party libraries, many more exist in common
    repositories for not just iPhone- or iPad-based libraries and source code, but
    also to support other platforms, such as Mac OS X, Windows, and Linux. Here are
    two popular sites:


    * **SourceForge:** This is a library for sharing free open source software. It
    supports many different platforms, including mobile iOS devices like the iPhone
    and iPad. It can be found at [`http://sourceforge.net/`](http://sourceforge.net/).

    * **Github:** Using the Git repository, GitHub is the home of many libraries,
    including a lot of useful mobile iOS-based libraries. It can be found at [`https://github.com/`](https://github.com/).


    # Summary


    In this chapter, we''ve explored the concept of libraries, including iOS-provided
    libraries, third-party libraries, and your own creations. We looked at the different
    types of libraries and similarities to the .NET Framework and how to create your
    own static library, either for use within your application or for distribution.


    The different types of third-party libraries were then introduced, and we''ve
    provided some examples of both the libraries, as well as popular repositories
    for libraries and source code for iOS-based devices. Now we clearly didn''t list
    every library available. There are far too many to list, and the number is growing
    by the day. However, this introduction should help you to explore and discover
    libraries that suit your needs.


    If you wish to write your own libraries, you can share these with others across
    the Internet. However, as per the Apple Developer Agreement, please do be cognizant
    of the restrictions applied to any application you write for a mobile device,
    and be conscious of the powers that Apple has when submitting your application
    to the App Store.


    # Chapter 9


    # Get Published: Testing, Deploying and Distributing Your Applications


    The chapters thus far have taken you through everything from introducing the devices,
    the software development kits, the language, and the tools to a series of chapters
    on how to write your first iOS mobile device-based application. This knowledge
    culminates with you having an application, or even a library, that you will want
    to test, deploy, and publish — typically in that order. In this chapter you''ll
    use the features of Xcode 4 and the iOS Simulator to thoroughly test your application.
    You''ll also test it on a real device before you learn how to deploy and publish
    your application through the App Store. Specifically, you''ll be looking at the
    following:


    * Introduction to the testing features available to you.

    * Overview of Xcode 4 and the iOS Simulator''s testing capabilities.

    * How to deploy your application.

    * Preparing to publish your application.

    * Publishing via the App Store.


    ## Available Test Features


    There are a number of tools and techniques available to you for testing your application,
    some with very advanced features. At a high level, you typically use a combination
    of discrete unit based tests plus broader system-wide testing on both virtual
    (the simulator) and physical (a real one) devices to ensure that your applications
    work. You''ll look at these in turn.


    ### Unit Testing


    While creating your example projects and source code files, you may have noticed
    a checkbox titled "Include Unit Tests." An example is shown in [Figure 9–1](#Chapter09.html#fig_9_1)
    when creating a simple utility-based application called `Calculator`.


    ![images](images/0901.jpg)


    **Figure 9–1.** *Creating a project with unit tests*


    After your project has been created, you''ll notice a folder (in addition to those
    that are typically created) with the format of `<project name>Tests`. In this
    case, that folder is called `CalculatorTests`; exploring this folder will display
    a header and implementation file of the same name, which is provided for you to
    implement your unit tests.


    #### Defining Your Testing Approach


    As you''re already a seasoned .NET professional, the concept of unit testing will
    be familiar to you. However, how Xcode embraces this will not, and perhaps other
    testing concepts such as integration testing or even Test Driven Development may
    be new to you also. Let''s take a brief tour through these terms before you look
    at Xcode''s support.'
