- fmt: '# Registering As an Apple Developer


    Before we discuss any of the software development kits (SDKs) or tools, you''ll
    need to register as an Apple Developer. This is necessary not only to provide
    you with useful access to technical sources and information about developing applications
    that run on iOS-based mobile devices (the iPhone, iPad, and iPod touch), but also
    to download the tools you need, such as the iOS SDK and Xcode. These downloads
    are required for the [Chapter 2](#Chapter02.html#ch2) examples, so registering
    as an Apple Developer now is highly recommended.


    To sign up, start up a browser session and navigate to [`http://developer.apple.com/programs/register`](http://developer.apple.com/programs/register),
    which presents you with a screen similar to the one shown in [Figure 1–1](#Chapter01.html#fig_1_1).


    ![images](images/0101.jpg)


    **Figure 1–1.** *Apple Developer registration home page*


    On this home page, you''ll notice the option to Get Started, and register as an
    Apple Developer for free. Choose this link, and then proceed to follow the instructions
    to either create a new Apple ID or use an existing Apple ID (which you may already
    have through the use of iTunes, for example). Complete the steps required to register
    as an Apple Developer.


    After successfully registering as an Apple Developer, you''ll be able to gain
    access to a number of online resources that will provide you with some of the
    necessary tools and support. A couple of these resources are listed in [Table
    1-1](#Chapter01.html#tab_1_1).


    ![images](images/t0101.jpg)


    You should now proceed to the iOS Dev Center and download the free iOS SDK, which
    provides the essential tools and libraries for starting to design and develop
    applications for your mobile Apple device. This disk image (with a `.dmg` extension)
    includes both the Xcode and the iOS SDK, so it is quite large, and you might want
    to make a drink while you are waiting for it to download. Alternatively, you may
    choose to download an older version of Xcode, which is free, although it does
    have limitations as to which Apple iOS versions it can target.


    At this point, you may be wondering what the difference is between registering
    for an Apple ID and downloading the free SDK, and registering as an official iOS
    Developer, at a cost of $99, and gaining access to the very latest version of
    Xcode. Since the release of Xcode 4, Apple has mandated that you must be registered
    as an iOS Developer on the Apple Developer Connection (ADC) web site to gain access
    to it, which is covered by the annual $99 fee.


    **NOTE:** If you just want to experiment with Xcode 4 before making a commitment,
    you can install Xcode 4 through the Mac App Store at a cost of $4.99—much cheaper.
    However, the key difference between the two options is that with the App Store
    version, you cannot deploy your software to physical devices for testing, submit
    your apps to the App Store for publication, or access certain online resources.
    So, once you''re comfortable and have plans for your “must-have” Apple application,
    you might want to commit to the full version.


    But which version do you need? Well, that very much depends on which mechanism
    you''re going to use to write your iPhone or iPad applications. We''ll be looking
    at writing applications using a number of different methods, but we''ll focus
    mainly on the Objective-C language.


    My plan for this book is to target the latest Apple mobile devices, and I want
    to showcase the latest tooling options. So, the examples here use the latest version
    of Xcode available at the time of writing: Xcode 4\. This version is improved
    significantly in usability, and so productivity. Such improvements result in it
    comparing more closely to Microsoft''s own Visual Studio. So, while older versions
    of Xcode might work and be free, I recommend that you pursue more recent versions
    and invest the fee required to get started.


    # Application Development Considerations


    Whether you are using Apple''s own native tools or a third-party tool, there are
    certain principles to keep in mind as you develop. These principles will help
    to ensure your road to writing your award-winning application is smooth, or at
    least smoother. Each of the options we''ll discuss is developed around some overarching
    principles, which both guide and constrain the way they work and how the resulting
    applications might execute, especially in the case of the third-party options.


    ## Generic Development Principles


    The following principles are common, irrespective of whether you are using Apple''s
    own native resources or a third-party resource:


    *   *Design patterns*: Many of the frameworks use well-known design patterns for
    implementing your application. For example, the Model-View-Controller (MVC) design
    pattern is very common, and so an understanding of how this pattern works will
    help you enormously.

    *   *Licensing:* It''s also worth understanding how the licensing model works
    for the third-party applications, and any limitations or conditions that may be
    enforced when you sign up to use the tools these applications provide. Also be
    aware of any restrictions that Apple''s App Store policy might enforce.

    *   *Device compatibility*: Writing an application for one device doesn''t mean
    it will automatically run or behave the same on another device. Take some time
    to understand the constraints and differences, and design your application for
    a multi-device scenario, if applicable. These differences are highlighted in upcoming
    chapters when relevant. For example, the iPad has more real estate that an iPhone,
    and we''ll explore this in [Chapter 6](#Chapter06.html#ch6), where we look at
    enhancing your user interface.


    ## Third-Party Development Principles


    The following principles are generally common to all nonnative mobile application
    development solutions, as described later in this chapter:


    *   *API limits*: As with many operating system abstraction techniques, the API
    exposed by the tool you are using to write your mobile application is very often
    incomplete, and so will either implement a subset of the APIs available to the
    native iOS SDK or even provide different API calls. Take the time to understand
    the API, its constraints, and how it should be used by following the documentation
    and guidance provided.

    *   *Prerequisites*: It''s important to note that not all of the third-party products
    work with the latest versions of Apple''s native tools. Take some time to understand
    any prerequisites and ensure you download the components required by your tool
    and as indicated in the supporting documentation. The prerequisites go for hardware,
    too. Some of the options run only on the Mac OS X operating system. So, ensure
    you have the correct hardware, especially before spending money!

    *   *Cost*: Not all of the options are free, and some of the options have limitations.
    You may need to buy additional “bundles” as your application development progresses.


    You need to be aware of these principles and understand not only how they work,
    but also the types of applications they output and the application model paradigms
    they use.


    **NOTE:** Third-party tools may simplify the development process, but sometimes
    at the cost of not supporting native applications or to the detriment of performance.
    In this chapter, and in the more detailed coverage in [Chapter 3](#Chapter03.html#ch3),
    I will provide information that will help you determine which options best suit
    your needs.


    ## Application Approaches


    Application development can be classified as one of two application paradigms:
    a *web application* or a *native application*. Understanding these types will
    better prepare you for the development of your application. You''ll want to know
    the constraints of each and the implications they have on stages of development,
    such as debugging and distribution.'
  raw: '### Registering As an Apple Developer


    Before we discuss any of the software development kits (SDKs) or tools, you''ll
    need to register as an Apple Developer. This is necessary not only to provide
    you with useful access to technical sources and information about developing applications
    that run on iOS-based mobile devices (the iPhone, iPad, and iPod touch), but also
    to download the tools you need, such as the iOS SDK and Xcode. These downloads
    are required for the [Chapter 2](#Chapter02.html#ch2) examples, so registering
    as an Apple Developer now is highly recommended.


    To sign up, start up a browser session and navigate to [`http://developer.apple.com/programs/register`](http://developer.apple.com/programs/register),
    which presents you with a screen similar to the one shown in [Figure 1–1](#Chapter01.html#fig_1_1).


    ![images](images/0101.jpg)


    **Figure 1–1.** *Apple Developer registration home page*


    On this home page, you''ll notice the option to Get Started, and register as an
    Apple Developer for free. Choose this link, and then proceed to follow the instructions
    to either create a new Apple ID or use an existing Apple ID (which you may already
    have through the use of iTunes, for example). Complete the steps required to register
    as an Apple Developer.


    After successfully registering as an Apple Developer, you''ll be able to gain
    access to a number of online resources that will provide you with some of the
    necessary tools and support. A couple of these resources are listed in [Table
    1-1](#Chapter01.html#tab_1_1).


    ![images](images/t0101.jpg)


    You should now proceed to the iOS Dev Center and download the free iOS SDK, which
    provides the essential tools and libraries for starting to design and develop
    applications for your mobile Apple device. This disk image (with a `.dmg` extension)
    includes both the Xcode and the iOS SDK, so it is quite large, and you might want
    to make a drink while you are waiting for it to download. Alternatively, you may
    choose to download an older version of Xcode, which is free, although it does
    have limitations as to which Apple iOS versions it can target.


    At this point, you may be wondering what the difference is between registering
    for an Apple ID and downloading the free SDK, and registering as an official iOS
    Developer, at a cost of $99, and gaining access to the very latest version of
    Xcode. Since the release of Xcode 4, Apple has mandated that you must be registered
    as an iOS Developer on the Apple Developer Connection (ADC) web site to gain access
    to it, which is covered by the annual $99 fee.


    **NOTE:** If you just want to experiment with Xcode 4 before making a commitment,
    you can install Xcode 4 through the Mac App Store at a cost of $4.99—much cheaper.
    However, the key difference between the two options is that with the App Store
    version, you cannot deploy your software to physical devices for testing, submit
    your apps to the App Store for publication, or access certain online resources.
    So, once you''re comfortable and have plans for your “must-have” Apple application,
    you might want to commit to the full version.


    But which version do you need? Well, that very much depends on which mechanism
    you''re going to use to write your iPhone or iPad applications. We''ll be looking
    at writing applications using a number of different methods, but we''ll focus
    mainly on the Objective-C language.


    My plan for this book is to target the latest Apple mobile devices, and I want
    to showcase the latest tooling options. So, the examples here use the latest version
    of Xcode available at the time of writing: Xcode 4\. This version is improved
    significantly in usability, and so productivity. Such improvements result in it
    comparing more closely to Microsoft''s own Visual Studio. So, while older versions
    of Xcode might work and be free, I recommend that you pursue more recent versions
    and invest the fee required to get started.


    ### Application Development Considerations


    Whether you are using Apple''s own native tools or a third-party tool, there are
    certain principles to keep in mind as you develop. These principles will help
    to ensure your road to writing your award-winning application is smooth, or at
    least smoother. Each of the options we''ll discuss is developed around some overarching
    principles, which both guide and constrain the way they work and how the resulting
    applications might execute, especially in the case of the third-party options.


    #### Generic Development Principles


    The following principles are common, irrespective of whether you are using Apple''s
    own native resources or a third-party resource:


    *   *Design patterns*: Many of the frameworks use well-known design patterns for
    implementing your application. For example, the Model-View-Controller (MVC) design
    pattern is very common, and so an understanding of how this pattern works will
