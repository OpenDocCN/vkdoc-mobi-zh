    # Marmalade SDK


    当开始介绍 Marmalade SDK 时，你会发现这些应用开发平台（无论是商业的还是开源的）在实现方式上呈现出一种共同的主题。Marmalade 与 `Mono`
    和 `Titanium Mobile` 包在许多方面相似，区别在于它只支持 C++。不过，它确实支持在 Windows 和 Mac OS X 操作系统上进行开发，并允许你为
    iOS 操作系统创建原生移动应用。事实上，该产品还允许你编译适用于其他操作系统的应用，例如 Android、Symbian、Windows Mobile 6.*x*
    以及游戏主机！


    Marmalade 包由两个主要组件构成：


    *   *Marmalade System*：Marmalade System 是一个操作系统抽象 API，连同相关的运行时库和应用构建系统。它提供了原生操作系统
    API 与你编写的代码之间的绑定，其方式与 `Mono` 和 `Titanium Mobile` 相同。

    *   *Marmalade Studio*：这是一套专注于高性能 2D/3D 图形和动画的工具与运行时组件集。


    该包允许你在 Windows 上使用 Visual C++ 或在 Mac OS X 上使用 Xcode，利用所提供的 API 编写应用程序。然后，它支持一个两阶段的部署流程。在第一阶段，你编译用于调试的应用程序。这会创建一个
    DLL（`.dll` 文件），需要 Marmalade 模拟器来执行。然后，当你的应用程序令你满意时，你可以将代码编译成原生可执行文件以供分发。


    图 1-8 展示了 Marmalade 架构与我们目前讨论过的其他包的关联。


    ![images](img/0108.jpg)


    **图 1-8.** *Marmalade SDK 框架*


    为了使用该 SDK，你必须在网站上注册一个账户，届时你将获得一个评估许可证。然后，任何注册用户都可以下载功能齐全的 Marmalade SDK 评估版本。评估版本允许部署到所有平台，但不允许公开发布应用程序。你可以从
    [`http://www.madewithmarmalade.com`](http://www.madewithmarmalade.com) 购买最新版本的
    Marmalade SDK。


    # Flash Professional Creative Studio 5


    最后但同样重要的是 Adobe 的 Flash 平台，这可以说是这里给出的最完整的解决方案，部分原因在于其在市场上的成熟度以及早在 2010 年 Apple
    解除对其第三方开发者指南的限制时，为支持 iPhone 所做的工作。它允许你使用附带的 Packager for iPhone（包含在 Adobe Flash
    Professional Creative Studio (CS) 5 中以及 Adobe Labs 的 AIR SDK 中）为 iPhone、iPod touch
    和 iPad 构建独立应用程序。


    Flash Professional CS5 的工作方式与其他包类似，允许你使用熟悉的语言（在此例中是 ActionScript）开发应用程序。你针对附带的
    API（AIR 和 Flash Player API）对其进行编译，生成原生的 iPhone 应用程序，这些程序即可用于测试和部署。


    图 1-9 展示了 Flash Professional CS5 架构，同样与本章中我们讨论过的其他架构进行比较。


    ![images](img/0109.jpg)


    **图 1-9.** *Adobe Creative Suite 5 框架*


    这个选项是迄今为止最全面的解决方案，但也是有代价的——无论是财务上，因为 Adobe 的 Creative Studio 并不便宜，还是复杂度上，因为该产品及其庞大的
    API 并非易于理解。出于这个原因，本书不涵盖此选项。但在了解了其他可用选项后，如果你愿意，你应该已经做好了尝试 Flash Professional CS5
    的充分准备。


    # App Store 概述


    App Store 是由 Apple 开发和维护的、针对 iOS 设备的数字应用分发平台。通过 iTunes Store（可通过互联网或设备本身访问），Apple
    允许服务用户浏览和下载应用程序，并按需付费。应用程序可以直接下载到设备，或者如果合适，可以先下载到桌面再传输。


    App Store 可通过多种设备访问，包括 iPhone（如图 1-10 所示）、iPod touch 和 iPad。对于 Mac 笔记本和桌面用户，Mac
    App Store 在更晚些时候推出，以服务于非移动应用程序。


    ![images](img/0110.jpg)


    **图 1-10.** *iPhone 4 上的 App Store*


    App Store 对 Apple 和应用程序生产商来说都取得了巨大的成功，第 10 亿次应用下载的里程碑早在 2009 年就已突破。如前所述，这一概念已被其他组织模仿，最显著的是其他主要的移动服务提供商。图
    1-11 展示了这些平台的全球收入份额。Apple 的主导地位显而易见。


    ![images](img/0111.jpg)


    **图 1-11.** *全球移动应用商店收入*


    ## 在 App Store 销售应用


    App Store 的收入模式是分摊销售额：Apple 获得 30%，应用发布商获得 70%（此比例随时可能变更）。事实证明，这一模式对 Apple 和许多应用生产商都极其有利可图。术语
    *app*（application 的简称）也被更广泛地使用，尽管 Apple 已为该术语获得商标权，但其他人（如 Google 的 *Google Apps*
    和 Amazon）也在类似语境中使用它。


    **注意：** 所有原生应用只能通过 App Store 合法地下载到 Apple 移动设备上，除非设备已越狱。*越狱* 设备指的是使用能够访问设备根文件系统的过程，从而允许修改和安装第三方软件组件。这并不违法，尽管
    Apple 对此话题很敏感，并声明可能会“使设备的保修失效”。越狱不需要对硬件进行任何更改，并且很容易撤销。


    最近，Apple 宣布了其新的基于订阅的服务，允许应用发布商设置订阅的时长和价格。此前，这是不可能的，你必须以逐个版本的方式销售每个版本。新服务允许发布商通过其应用销售内容，用户可以在指定时间段内接收新内容。


    一个更重要的变化是，不仅传统的通过 iTunes 销售的模式仍然可用，Apple 还允许应用发布商直接从自己的网站分发其订阅，在这些网站上，iTunes 的收入模式不适用，因此无需与
    Apple 分成。这显然具有免除向 Apple 上缴部分应用收入的义务的优势，但这确实意味着你失去了 App Store 带来的好处，例如受众覆盖面和可访问性，并且必须依赖你自己的营销活动。

