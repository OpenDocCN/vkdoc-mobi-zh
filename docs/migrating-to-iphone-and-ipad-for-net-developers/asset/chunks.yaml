    ### Using Automatic Reference Counting


    The example presented in this chapter has taken the traditional approach to memory
    management and has left the onus on the programmer to `retain` and `release` (or
    `autorelease`) the objects and the memory they consume. Xcode 4.2 and iOS 5 offer
    a new feature called *automatic reference counting* (ARC), which simplifies memory
    management.


    Instead of you having to remember when to use `retain`, `release`, and `autorelease`,
    ARC evaluates the lifetime requirements of your objects and automatically inserts
    the appropriate method calls for you at compile time. The compiler also generates
    the appropriate `dealloc` methods to free up memory that is no longer required.
    Essentially, ARC is a precompilation stage that adds the necessary code you previously
    would have had to insert manually.


    #### Why Use It?


    If you''re new to Objective-C, you will welcome ARC, because it greatly simplifies
    memory management. There is more than enough to learn without worrying about the
    complexities of memory management.


    However, if you are comfortable with self-memory management, perhaps from experience
    in lower-level languages such as C or C++, then you might want to stick with it.
    One reason is that libraries that have yet to be converted to using ARC don''t
    always play well with ARC-based code. In addition, manually managing memory, providing
    you know what you''re doing, can be moreperformant.


    #### Enabling ARC


    To enable ARC, you must either choose it when you first create your project or
    add the appropriate compiler flag found by setting the value Objective-C Automatic
    Reference Counting in the compiler''s build settings. It is possible to selectively
    choose which files use the ARC compiler features through the Compile Sources section
    under the project''s Build Phases tab, although I don''t recommend it unless you
    want to highly tune your application''s performance.


    #### Migrating to ARC


    If you already have projects, or source code, you want to convert to using ARC
    but don''t want to trawl through the source code removing all the memory management
    keyword references, then thankfully Xcode provides a migration tool to do the
    conversion for you. Open your project for conversion, select Edit ![images](images/U001.jpg)
    Refactor, and then choose the Convert to Objective-C ARC… option. This will refactor
    (convert) your code so that it uses ARC features. Easy!


    #### Programming with ARC


    Once you''ve switched on ARC, you must follow certain rules. The rules can get
    quite complex, but the Apple documentation does a good job of explaining them.
    In summary, either you use ARC or you don''t; you can mix flavors of memory management.
    For example, don''t switch on ARC and then start to sporadically `retain` or `dealloc`
    memory. You can defined whether your property is strongly or weakly typed. `strong`
    (the default) is a reference that is retained for the lifetime of its scope (typically
    defined as the curly braces), and `weak` means it can be released at any time
    when no longer considered as used (and set to `nil` when released).'
