- fmt: '### Comparing the Serialization Example with .NET


    In this chapter, we''ve taken a look at the options for basic data persistence
    using Objective-C and the iOS SDK, and even looked at some of the persistency
    properties of .NET. But how would this example compare with a .NET implementation?


    Well, the use of a custom class to hold the high-score names and scores would
    still be valid in .NET. We would use a very similar mechanism, with the exception
    of syntax differences, and hold the name as a `String` and the score as an `int`.
    We could even have the same method names and approach.


    `NSMutableArray` could be implemented in .NET as an `ArrayList`, allowing you
    to `Insert()` or `Remove()` items using methods. It also has a `Sort()` method,
    similar to our `sortArrayUsingSelector` method, which takes a comparator as an
    argument.


    Finally, serializing could be done using a similar method to our example, cycling
    through the entries and writing to some persistency storage, such as a database
    using an ODBC driver or a similar database API. Alternatively, you could use the
    `XMLSerializer` class to serialize the class using a `StreamWriter` if you wanted
    to write to a file. Consider the C# example in [Listing 7-7](#Chapter07.html#list_7_7),
    which assumes we have a `HighScoreClass` that behaves as in our example, but also
    defines the `[Serializable()]` attribute surrounding those members we want to
    serialize.


    **Listing 7-7.** *Serializing a Class in C#*


    ```

    // Create our High Score class (note that this won''t compile, as we''ve excluded

    // the definition of this for brevity)

    HighScoreClass hs = new HighScoreClass()

    // Create a new XmlSerializer instance with the type of our high score class

    XmlSerializer so = new XmlSerializer(typeof(HighScoreClass));


    // Create a new file stream to write the serialized object to

    TextWriter WriteFileStream = new StreamWriter(@"C:\output.xml");

    so.Serialize(WriteFileStream, hs);


    // Clean up

    WriteFileStream.Close();

    ```


    The example in [Listing 7-7](#Chapter07.html#list_7_7) is very similar to our
    earlier `plist` example using Objective-C, in that it serializes a class''s content
    to an XML file. This is the most common method within the .NET Framework for serializing
    a class. The use of embedded SQL statements executed against the database is also
    very similar in .NET.


    ### Summary


    In this chapter, we''ve taken a tour of the options for persisting data to storage
    other than the mobile device''s memory, which is volatile; that is, when the device
    is switched off or the application is closed, the memory and any data associated
    with it is lost.


    We''ve looked at the techniques for persisting data to a file, to a database,
    and to the Internet. We''ve also explored the features provided by the iOS to
    help with this, such as the application''s sandbox. We then took a look at the
    language and SDK support for storing data and writing it to different storage
    types, including to a `plist` file and to the embedded database.


    We concluded by implementing a couple of simple classes to test the theory, providing
    support for a table of high scores that could be persisted to storage for our
    Lunar Lander game. Now between application instances, we can retain a list of
    the highest scores, thus increasing the competitive enjoyment of our game.


    ## Chapter 8


    ## Extend Your Apps: Extending Your iOS Application with Libraries


    The ability to extend your application''s functionality beyond that provided through
    the iOS itself and the iOS SDK is fairly typical of most operating systems. The
    Microsoft Windows operating system was built with the ability to extend its functionality
    through the provision of both static and dynamically linked libraries. And this
    isn''t limited to the Windows operating system. Unix, Linux, and many other operating
    systems offer the same abilities, and Apple''s iOS is no different.


    Building on some of the examples of using other options discussed in [Chapter
    3](#Chapter03.html#ch3), this chapter provides some guidance on how to build your
    own libraries and how to use other libraries that complement the iOS operating
    system. Specifically, we''ll look at the following:


    *   An overview of how libraries work and the different types of libraries

    *   How libraries are used by the iOS

    *   How you can use libraries within your applications

    *   Third-party libraries and their benefits


    ### Overview of Libraries


    We''ll start by providing some context around the different types of libraries,
    their purpose, and how they work within the context of the iOS. We''ll discuss
    what a library is, what types exist, and why you may use one rather than the other–or
    both!


    #### What Is a Library?


    A *library* is a set of routines and variables that may exist locally, or remotely,
    to realize a prescribed set of functionality—at least in the computer-science
    sense (just in case you were thinking of a place to go to read books!). These
    routines and variables are realized in code, irrespective of the programming language
    used. The way you reference them and the way they are used may differ, and this
    is what identifies the different types of libraries.


    #### What Types of Libraries Exist?


    The types of libraries can essentially be categorized as follows, regardless of
    whether they are local or remote.


    *   Static library

    *   Dynamic library


    Let''s look at these in turn.


    #### Static Library


    A *static library* is a collection of routines and variables that are held in
    a single file and are referenced within your code. An associated header file provides
    the method signatures and sometimes variables. At compile time, your library is
    referenced, which enables the code that implements the required functionality
    to be included in your executable. This is usually handled by a program called
    the *linker*, which is why they are sometimes called *statically linked libraries*.


    On iOS devices, static libraries have an extension of `.a`. On Windows, the extension
    is typically `.lib`.


    #### Dynamic Library


    A *dynamic library*, as its name suggests, is dynamic in the way it works. The
    library is still referenced through the use of a header file, but it isn''t included
    into the executable during compilation; it is referenced at runtime. This means
    that the library is loaded on first use, or before, to resolve the call and execute
    the referenced functionality.


    On iOS, dynamic libraries have an extension of `.dynlib`. On Windows, they have
    an extension of `.dll`.


    Use of dynamic libraries has the added advantages of making your executables smaller
    and allowing common functionality to be more efficiently shared. However, it does
    introduce some penalties, some of which caused big problems in the early days
    for Microsoft Windows. These problems were related to version control of different
    libraries with the same methods but whose implementation was different. In Windows,
    this was called *DLL hell*.


    While the iPhone and the iPad are quite capable of producing and using dynamic
    libraries, the Apple Developer Agreement specifically prohibits the use of dynamic
    libraries other than those provided by the system or official SDKs. This is why
    the embedded SQLite library is supported. However, if you try to create your own
    and submit your application to the App Store, it will be rejected.


    Why has Apple done this? This has been the source of much debate for many years.
    Indeed, the Developer Agreement was only recently updated to list some of the
    restrictions around interpreted code, but it is still quite rigid, and I highly
    recommend you read it carefully. We''ll talk more about the Apple Developer Agreement
    later in the chapter. For now, either use system-provided dynamic libraries or
    stick to static libraries, especially if you want your application to be approved
    upon submission to the App Store.'
