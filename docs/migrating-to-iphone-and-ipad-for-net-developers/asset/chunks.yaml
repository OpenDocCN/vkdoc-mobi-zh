    game''s physics before we look at more advanced user-interaction mechanisms in
    later chapters.) The labels are placeholders for the moment, and while we won''t
    update their values yet, they start to make the game take shape.


    ### Building the Core Game Engine and Enabling User Interaction


    So far, we''ve displayed our initial game screen with the button that will start
    our game. Now we need to create the main game''s mechanics. Next, we''ll add to
    our application''s functionality by starting to implement the core game engine.
    We will build on the `GameView` class, and explore some further iOS and Objective-C
    concepts in the process.


    #### Examining the Game View Header


    The `GameView` XIB files and the associated `GameViewController` class provide
    the implementation of our core game engine. First, consider the `GameView.h` file
    shown in [Listing 5-5](#Chapter05.html#list_5_5). I''ll highlight the key segments
    of the code before we look at the code (a complete explanation follows the listing).
    In the header file, we do the following:


    *   Define our class with an `NSTimer` class member to provide a timer.

    *   Declare a number of methods that we will use to respond to on-screen button
    presses, namely Quit, Rotate Left, Rotate Right, and Thrust.

    *   Declare a method that our timer will execute at the desired frequency.

    *   Define a number of enumerated types to hold state, and a number of constants,
    which will be used within the game''s physics.

    *   Declare our `GameView` that will hold three images to map onto the state of
    our thruster: Thrust, No-Thrust, and Crashed.

    *   Declare instance variables that represent state or instance variables, for
    which we will use our already definedenumerated types and constants.

    *   Declare a property to hold our lunar lander image and `IBAction`s for each
    of the buttons so that we can wire them up to the methods that provide the implementation.


    Phew. Now take a look at the code and see if you can spot all of these features
    in [Listing 5-5](#Chapter05.html#list_5_5).


    **Listing 5-5.** *GameView.h*


    `#import <UIKit/UIKit.h>`


    `// GameView class manages the game''s view controller`

    `//`

    `@interface GameViewController : UIViewController {`


    `    NSTimer *gameLoop;  // Core game timer`

    `}`


    `// Declare class events for our view controller`

    `- (void)timerLoop:(NSTimer *)timeObj;   // Timer event loop`

    `-(IBAction)quitGame:(id)sender;`

    `-(IBAction)rotateLeft:(id)sender;`

    `-(IBAction)rotateRight:(id)sender;`

    `-(IBAction)thrust:(id)sender;`


    `@end`


    `// Declaration of some enumerated types to avoid lots of messy constant definitions`

    `typedef enum { NOTREADY, READY, RUNNING, WON, LOST, PAUSED } GameState;`

    `typedef enum { EASY, MEDIUM, HARD } GameDifficulty;`

    `typedef enum { THRUSTERS_ON, THRUSTERS_OFF } ThrusterState;`


    `// Declaration of other constants used to manage the physics`

    `static const int FUEL_INITIAL = 200;`

    `static const int FUEL_MAX = 200;`

    `static const int FUEL_BURN = 10;`

    `static const int MAX_INIT = 30;`

    `static const int MAX_SPEED = 120;`

    `static const int ACCELERATION_DOWN = 35;`

    `static const int ACCELERATION_UP = 80;`

    `static const double GRAVITY = 9.8;`


    `// GameView class manages the main game`

    `//`

    `@interface GameView : UIView {`


    `    // Images to hold the lander state`

    `    @private UIImage            *plander_thrust;`

    `    @private UIImage            *plander_nothrust;`

    `    @private UIImage            *plander_crashed;`


    `    // Other game member variables`

    `    @private GameState          gstate;`

    `    @private GameDifficulty     level;`

    `    @private ThrusterState      thrusters;`

    `    @private int                fuel;`

    `    @private int                speed_x;`

    `    @private int                speed_y;`

    `    @private double             rotation;`


    `    // Define our lander''s X and Y on-screen coordinates`

    `    @private int loc_x;`

    `    @private int loc_y;`

    `}`


    `// Declare our member properties`

    `@property (nonatomic, retain) UIImage *lander_nothrust;`


    `// Declare our class methods`

    `- (void) newGame;`

    `- (void) updateLander;`

