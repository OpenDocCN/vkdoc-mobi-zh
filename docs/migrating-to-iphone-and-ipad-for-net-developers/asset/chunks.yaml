    You are now ready to begin development of your first iPhone application using
    Xcode 4.


    ![images](images/0205.jpg)


    **Figure 2–5.** *Repository organizer*


    Xcode''s support for Subversion is built-in, provided that you''re using version
    1.5 or later. However, you must create your Subversion repository and import your
    project into Subversion on the command line before managing it in Xcode. For simplicity,
    our examples will not use a source code control subsystem. We''re simply going
    to be using the filesystem. For detailed instructions on the use of Subversion,
    see the online book *Version Control with Subversion* ([`http://svnbook.red-bean.com/`](http://svnbook.red-bean.com/)),
    which is endorsed by Subversion''s developers.


    **NOTE:** You don''t typically create the `svn` repository in the same directory
    from which you want to manage the project''s source code. Instead, you can checkout
    the repository “trunk,” and that becomes a type of special folder on the filesystem
    (it has dot files that let Subversion know it is checked out). You can then create
    project files in that folder, and they can be added to the repository via Xcode''suser
    interface.


    Whatever you''ve decided to do, you should have now installed Xcode and selected
    your repository preference. You are ready to start your project and write code.
    But before we start building an application, let''s take a brief look at the Objective-C
    language, focusing on some of the key tenets you will encounter in building your
    application.


    ### An Objective-C Primer


    Apple''s Objective-C is the de facto standard language for app development on
    the iPhone, iPod touch, and iPad. Although new languages, such as those provided
    within .NET, are supported through the Mono implementation, the reality is that
    using Objective-C offers the fastest performing option. This becomes important
    if you''re writing a particularly performant app, such as a game or computationally
    intensive app.


    So what''s Objective-C, and how does it compare with .NET languages, and specifically
    its closest .NET cousin, the C# language? Providing an exhaustive guide warrants
    a book in its own right. To get you started, we''ll take a look at some of the
    most important concepts and immediate differences you should be aware of before
    writing your first program. As we progress through the book, some of the differences
    will be pointed out as we encounter them


    The following list represents the key tenets for any Objective-C primer for .NET
    developers and those used by the application we''ll create in this chapter. A
    brief introduction here will help you to understand some important aspects of
    your first application.


    *   Object model

    *   Square brackets

    *   Naming conventions

    *   Importing

    *   Class definition and implementation

    *   Exception handling

    *   Nil objects

    *   Memory management


    **NOTE:** This primer provides you with an introduction biased toward your existing
    .NET experience, but it cannot do justice to a comprehensive language such as
    Objective-C. If you''re looking for further details, I recommend the book *Learn
    Objective-C on the Mac* by Scott Knaster and Mark Dalrymple (Apress, 2009), which
    can be found at [`http://www.apress.com/9781430218159`](http://www.apress.com/9781430218159).


    Let''s start with a brief introduction to some terminology.


    #### Objective-C Terminology


    [Table 2-1](#Chapter02.html#tab_2_1) compares some of the NET C# programming language
    and Objective-Ckeywords. As you can see, they are different but still quite similar.


    ![images](images/t0201.jpg)


    #### Object Model


    The object model in Objective-C bears a close resemblance to languages such as
    Smalltalk and C++. It is an object-oriented language that extends the C language
    by providing a strict superset of C. This means it is possible to include any
    C within your class, and it will compile quite happily (providing it is syntactically
    correct and libraries and other dependencies have been handled).


    The object model''s resemblance to Smalltalk will be instantly recognizable to
    those of you who are familiar with it (although its relevance goes back many years
    now). Essentially, it provides messaging-style syntax that involves passing messages
    to object instances, rather than calling methods on objects. It''s a subtle difference
    but with implications.


    This mechanism achieves the same goal as other object-oriented languages that
    are not loosely coupled, such as .NET. The main difference is that the association
    between the message being passed and the object is not resolved at compile time
    by being bound in code, but at runtime. Therefore, you need to be cautious about
    how this receiving object will handle the message. The object that is being sent
    the message (the *Receiver*) is not guaranteed to respond to the message, especially
    if it wasn''t expecting it or doesn''t understand it. In that case, at best the
    app will raise an exception. At worst, it will continue silently, making debugging
    applications a more laborious task. For this reason, you should also take note
    of the exception handling and `Nil` object tips provided later in this chapter.


    #### Square Brackets and Methods


    You will soon discover that square brackets are an important feature of the Objective-C
    language. As you''ve learned, the object model is based around the concept that
    objects are sent messages in order to invoke a method. Conversely, if you want
    to query a property of a method, the recommended route is to ask the object for
    a property value by sending a message, rather than by peeking inside it (which
    is seen as bad practice anyway). The square brackets indicate that you are sending
    a message to an object.


    **NOTE:** The examples here reflect the syntax and do not represent complete,
    compilable source code. You''ll see the examples in working source code listings
    as the book progresses.


    ##### Calling a Method


    So, if we had an object called `Engine`, we could “start the engine” by using
    its `start` method after first creating an instance of `Engine`. In Objective-C,
    the code would look like this:


    `// Create reference to an object of type Engine class called diesel.`

    `Engine* diesel;`


    `// Create an instance of the Engine object and point the diesel reference at
    it`

    `diesel = [[ Engine alloc] init];`


    `// Call the start method by passing the Engine object the start message`

    `[ diesel start];`


    The same code in C# (without the comments) would look as follows:


    `Engine diesel;`

    `diesel = new Engine();`

    `diesel.start();`


    **NOTE:** In the C# example here, notice that the `new()` command both allocates
    and initializes the object in a single call.


    ##### Passing and Retrieving


    A similar syntax is used to both pass parameters when calling an object''s method
    and to retrieve a value that might be returned by a called method. For example,
    to pass a flag or value indicating how much gas to apply when starting the engine,
    we would use the following syntax:


    `[diesel start: gas];`


    Alternatively, if we wanted to return the number of revs the engine is currently
    outputting, we could use the following syntax, presuming that we created a getter
    called `revs` to return such a value:


    `currentRevs = [ diesel revs ];`


    #### Naming Conventions


    The naming convention used by Objective-C is much like other languages, using
    PascalCase for classes and camelCase for methods and properties. For those of
    you not familiar with either of these, PascalCase is concatenating capitalized
    words, always starting with a capital letter, as in PascalCase. The camelCase
    form is similar, with capitalized words being concatenated, but the first letter
    may be either uppercase or lowercase, as in camelCase. PascalCase is also known
    as UpperCamelCase.


    If you were wondering, Microsoft''s C# standard is PascalCase, which may be why
    the notation looked familiar.'
