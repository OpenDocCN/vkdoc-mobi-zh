    interfaceOrientation\n{\n    // 返回 YES 表示支持的朝向\n    return (interfaceOrientation\
    \ == UIInterfaceOrientationPortrait);\n}\n\n// timerLoop - 主计时器事件函数\n-(void)timerLoop:(NSTimer\
    \ *)timerObj\n{\n    // 更新着陆器的位置\n    [(GameView *)self.view updateLander];\n\n\
    \    // 重新显示整个视图\n    [self.view setNeedsDisplay];\n\n}\n\n// 用户已指示想要点燃推进器引擎；将此信息传递给游戏\n\
