    In summary, we will have achieved the following parts of our game''s functionality:


    *   Created a `GameViewController` property and managed its memory

    *   Wrote an event handler for the Start Game button click that loads and displays
    modally the game view interface


    These essentially allow the main game screen to be displayed. To that screen,
    we''ll attach the menu and display the high score. We will react to the Start
    Game button click by displaying and starting the game.


    So, creating the property uses the same method as described in previous chapters.
    However, here we are specific about assigning the property to the class member
    variable, allowing us to use different names for each.


    Let''s start at the beginning, in the header file:


    `@class GameViewController;`


    This tells the compiler that `GameViewController` is a class, and it means we
    don''t need to include the full class declaration at this point. We just need
    to inform the compiler that it is a class. The semantics of the messages and attributes
    it supports will be provided at runtime by the iOS framework.


    Next, we define our internal class member variables with the following line:


    `    @private GameViewController *pgameViewController;`


    Most of this is similar to previous examples, but notice the `@private` declaration.
    This is a *visibility modifier*, and it defines the visibility (or *scope*) of
    the member variable. A number of options are available for specifying the visibility
    of the variables, which you place after the declaration. Also available are `@public`
    and `@protected`, which behave the same as the .NET equivalents with the same
    names and syntax (preceding the variable), but without the `@` symbol.


    Having a property allows us to control elements of that variable, such as its
    ability to be retained in memory until we decide it''s no longer required. But
    we do need to remember to release it. In the `dealloc()` method, we release our
    `gameViewController` variable and its associated memory by sending it the `release`
    message. Also note that we call the inherited `dealloc()` method with the `[super
    dealloc]` call. This is known as *passing the call along the chain*, and using
    it is called being a *good citizen*. This behavior is provided for within the
    default implementation of methods created by Xcode. You can see all of this happening
    in the following code:


    `- (void)dealloc`

    `{`

    `    // Release the custom controller`

    `    [self.gameViewController release];`


    `    // Call inherited`

    `    [super dealloc];`

    `}`


    We need to react to the Start Button being pressed. So, if you have not already
    added the Start Game button, do that now.


    Within the XIB file, you need to ensure the Start Game button''s Start Touch Down
    event is hooked up to the `startGame` event property we created in code. You can
    do this using the drag-and-drop feature within the Connections Inspector. With
    the `LunarLanderViewController.xib` file open and the view visible (you''ll see
    the Start Game button), you need to show the Connections Inspector to see the
    outlets available. From there, simply drag the `StartGameIBAction` (rember our
    definition in code) onto the Start Game button. This will wire it to the button''s
    Start Touch Down event, which will fire when we first click the button.


    The definition for the `IBAction` required to be visible on the Outlets page within
    the Interface Builder is as follows:


    `-(IBAction)startGame:(id)sender;`


    The `(IBAction)` declaration is key to telling Xcode 4''s Interface Builder it''s
    an action available for wiring up to an event.


    Finally, we need to provide an implementation for the event, which, in our case,
    will load and display the `GameView` interface and its associated controller.
    This will manage the game-play mechanics for our Lunar Lander game. Here is the
    code:


    `-(void)startGame:(id)sender{`

    `    // Set up our gameViewController pointer to our loaded GameView class`

    `    self.gameViewController = [[GameViewController alloc] initWithNibName:@"GameView"`![images](images/U002.jpg)

    ` bundle:nil];`

    `    // and display it modally.`

    `    [self presentModalViewController:self.gameViewController animated:YES];`

    `}`


    Our first line allocates the memory for our `GameViewController` class `[GameViewControlleralloc]`,
    and then we embed this within a message call to the `initWithNibName` method,
    passing the name of our XIB file. Finally, we display the window by sending the
    message `presentModalViewController` with a pointer to the view controller—in
    this case, `gameViewController`.


    The syntax of this code will be more familiar to C++ developers than to .NET developers;
    the allocation of the `GameView` class is the same as calling `new` in C#. Indeed,
    the following syntax is also valid in Objective-C: `[GameViewController new]`.
    Once the class has been created, invoke the `ShowDialog()` method in .NET, using
    code similar to the following—this is the equivalent to the preceding objective-c
    code:


    `// C# Form creation and display using Windows Forms`

    `Form MyForm = new MyForm;`

    `MyForm.ShowDialog();`


    After implementing the event, go ahead and build the executable and start your
    application. It will display the main window with the Start Game button. If you
    select this button, a blank game window will be displayed. To help me make sure
    it was being displayed properly, I added a simple label to the game window user
    interface.'
