- fmt: "#### Importing\n\n使用 Objective-C 时，有两种导入方式，与 C/C++ 类似。区别在于，一种语法会强制编译器的预处理器在系统头文件目录中查找文件，而使用引号的语法则会在当前目录中查找（如果未指定其他位置）。\n\
    \n要在当前目录或特定目录中查找自己的头文件，请使用以下语法：\n\n`#import \"myfile.h\"`\n\n要在系统头文件目录中查找，请使用以下语法：\n\
    \n`#import <Foundation/foundation.h>`\n\n#### Class Definition and Implementation\n\
    \n与大多数面向对象语言一样，对象由其类定义，并且可以创建该对象的多个实例。每个类由一个接口（定义类的结构并允许实现其功能）和一个对应的实现（实际提供功能）组成。通常，这些实现保存在不同的文件中：接口代码包含在头文件（扩展名为`.h`）中，而实现则保存在消息文件（扩展名为`.m`）中。\n\
    \n**注意：** 我听说（或许是一个事实）当 Objective-C 语言的发明者被问及为什么使用`.m`扩展名时，他只是简单地说，因为`.o`和`.c`已经被占用了！\n\
    \n因此，以我们的`Engine`示例为例，各文件中的源代码可能如下所示：\n\n**Listing 2-1.** *Engine.h*\n\n```\n\
    @interface\n- (int) revs;\n@end\n```\n\n**Listing 2-2.** *Engine.m*\n\n```\n@implementation\n\
    - (int) revs {\n        return revs;\n}\n\n- (void) start {\n        // Start\
    \ the engine at an idle speed of 900 rpm\n        // – NOTE This is a comment\n\
    \        revs=900;\n}\n@end\n```\n\n如您所见，在这两种情况下，代码前面都带有相应的`@interface`或`@implementation`，并以`@end`标记结束。所有接口和方法必须分别出现在这两个语句之间。\n\
    \n#### Nil Objects\n\nObjective-C 中实现面向对象特性的方式意味着对方法的调用被实现为在运行时解析正确标识的消息传递到对象。如前所述，这意味着通常会在编译时进行的类型检查（通常会抛出错误）将不会发生。\n\
    \n在运行时出现不匹配的情况下，要么会抛出异常（最佳情况），要么对象会静默忽略消息（最坏情况）。因此，请格外小心，确保您的消息/对象交互有效，并在整个过程中添加良好的异常处理。在\
    \ .NET 中复制后期绑定并没有简单或明显的方法。\n\n#### Exception Handling\n\n对于使用过 C# 或其他语言中异常处理的人来说，Objective-C\
    \ 的异常处理语法会很熟悉。\n\n```\n@try\n{\n        // 要执行并希望捕获异常的代码\n}\n@catch ()\n{\n  \
    \      // 捕获异常后执行的操作\n}\n@finally\n{\n        // 在此处进行清理代码\n}\n```\n\n鉴于其相似性，我在此不再重复\
    \ C# 的等效代码。您应该能立即识别出该语法并轻松使用它。然而，如前所述，需要牢记的重要一点是：由于在 Objective-C 中消息以运行时方式传递并解析给对象，因此确保采用防御性编码方法至关重要。您应该预见异常，并像前面的示例所示那样妥善捕获和处理它们。\n\
    \n#### Memory Management\n\n就像 .NET 中的公共语言运行时 (CLR) 一样，运行时环境会为您处理 Objective-C\
    \ 应用程序的内存管理。Objective-C 使用引用计数系统。这意味着，如果您跟踪自己的引用，一旦引用计数归零，运行时将自动回收对象使用的任何内存。\n\
    \n这听起来仍然复杂吗？只要遵循一些简单的原则，它并不复杂。在为移动设备编写应用程序时，即使这些设备如今拥有更大的内存容量，内存管理的重要性也不容低估。\n\
    \n如果您使用`alloc()`分配了内存，请记得调用`release`，除非您正在使用自动释放机制。您可能还想探索使用`@property`和`@synthesize`功能，这将自动创建您的\
    \ setter 和 getter，尽管这并不能消除您为对象分配空间的需求。\n\n在 iOS 5 中，新的自动引用计数 (ARC) 功能可自动管理 Objective-C\
    \ 对象的内存管理。ARC 使内存管理变得更加容易，大大降低了程序出现内存泄漏的可能性。\n\n### Creating Your First iPhone\
    \ Application\n\n使用 Xcode 4 启动新项目的第一步是创建一个单一的 Xcode 项目。事实上，在 Xcode 中使用项目是强制性的，因为您的文件和资源是在这个项目下收集的。可以拥有多个但相关的项目，我们将在本书后面介绍这种方法，但本质上，本书的示例不需要它。正如您稍后将看到的，iOS\
    \ SDK 提供了一些项目模板来帮助您入门。\n\n以下是使用 Xcode 创建 iPhone 应用程序的高级步骤：\n\n1.  创建您的项目。\n2.\
    \  设计您的应用程序。\n3.  编写代码。\n4.  构建并运行您的应用程序。\n5.  测试、测量和调优您的应用程序。\n\nXcode 工具套件可以在所有这些步骤中为您提供支持，从创建项目和管理与其关联的文件，到使用提供的仪器工具来微调您的应用程序性能。"
  raw: '#### Importing


    With Objective-C, there are two ways of importing, just as with C/C++. The difference
    is that the syntax of one will force the compiler''s preprocessor to look for
    the file in the system header directory, whereas the syntax using quotes will
    look in the current directory if you haven''t specified an alternative location.


    To look for your own header file in the current or specific directory, use the
    following syntax:


    `#import "myfile.h”`


    To look in the system header directory, use the following syntax:


    `#import <Foundation/foundation.h>`


    #### Class Definition and Implementation


    As with most object-oriented languages, an object is defined by its class, and
    many instances of that object may be created. Every class consists of an interface,
    which defines the structure of the class and allows its functionality to be implemented.
    Additionally, each class has a corresponding implementation that actually provides
    the functionality. Typically, these implementations are held in separate files,
    with the interface code contained in a header file (`.h` extension) and the implementation
    held in a message file (`.m` extension).


    **NOTE:** A rumor (or fact maybe) I heard was that when the inventor of the Objective-C
    language was asked why the `.m` extension was used, he simply stated because `.o`
    and `.c` were already taken!


    So, using our same `Engine` example, our source code in the respective files may
    look like the following:


    **Listing 2-1.** *Engine.h*


    `@interface`


    `- (int) revs;`


    `@end`


    **Listing 2-2.** *Engine.m*


    `@implementation`


    `- (int) revs (`

    `        return revs;`

    `}`


    `- (void) start {`

    `        // Start the engine at an idle speed of 900 rpm`

    `        // – NOTE This is a comment`

    `        revs=900;`

    `{`

    `@end`


    As you can see, in both cases, the code is preceded with either `@interface` or
    `@implementation` as appropriate, and concludes with an `@end` token. All interfaces
    and methods, respectively, must appear between these two statements.


    #### Nil Objects


    The way in which the object-oriented features are implemented in Objective-C means
    that calls to methods are implemented as messages being passed to objects whose
    correct identity is resolved at runtime. As discussed, this means that the type
    checking normally done at compile time, which would (usually) throw an error,
    will not occur.


    In the case of a mismatch during runtime, either an exception will be thrown (best-case
    scenario) or the object will silently ignore the message (worst-case scenario).
    So, be extra careful about both ensuring your message\object interaction is valid
    and that good exception handling is added throughout. There is no easy or obvious
    way of replicating late binding in .NET.


    #### Exception Handling


    The exception handling syntax for Objective-C will be familiar to those of you
    who have used C# or exception handling in other languages.


    `@try`

    `{`

    `        // Code to execute and for which you wish to catch the exception`

    `}`

    `@catch ()`

    `{`

    `        // Do something after an exception has been caught`

    `}`

    `@finally`

    `{`

    `        // Clean up code here`

    `}`


    Given the similarity, I won''t replicate the C# equivalent code here. You should
    immediately recognize the syntax and be comfortable with its use. However, as
    noted earlier, the important thing to remember is that because of the way messages
    are passed to objects and resolved at runtime in Objective-C, it is critically
    important to ensure a defensive approach to coding is taken. You should anticipate
    exceptions, catching and handling them elegantly, as shown in the preceding example.


    #### Memory Management


    Just like the Common Language Runtime (CLR) in .NET, the runtime environment handles
    memory management for Objective-C applications for you. A reference-counting system
    is used by Objective-C. This means that if you keep track of your references,
    the runtime will automatically reclaim any memory used by objects once the reference
    count returns to zero.


    Does this still sound complicated? Well it''s not, providing you follow some simple
    principles. When writing applications for mobile devices, even with the larger
    memory footprints these devices have nowadays, the importance of memory management
    can''t be understated.


    If you''ve allocated memory using `alloc()`, remember to call `release`, unless
    you''re using the autorelease mechanism. You may also wish to explore the use
    of `@property` and use the `@synthesize` feature, which will automatically create
    your setters and getters, although this doesn''t remove the need for you to allocate
    space for your object.


    In iOS 5, the new automatic reference counting (ARC) functionality automates memory
    management for Objective-C objects. ARC makes memory management much easier, greatly
    reducing the chance for your program to have memory leaks.


    ### Creating Your First iPhone Application


    The first step in starting a new project using Xcode 4 is to create a single Xcode
    project. In fact, it''s compulsory to use a project with Xcode, as its under this
    project that your files and resources are collected. It is possible to have multiple
    but related projects, and we''ll touch on this approach later in the book, but
    essentially, our book examples don''t require it. The iOS SDK usefully provides
    a number of project templates to get you started, as you''ll see shortly.


    The following are the high-level steps for creating your iPhone application using
    Xcode:


    1.  Create your project.

    2.  Design your application.

    3.  Write code.

    4.  Build and run your app.

    5.  Test, measure, and tune your app.


    The Xcode suite of tools can support you during all of these steps, from creating
    your project and managing the files associated with it to using the instruments
    provided to fine-tune your application''s performance.'
