  trans: '

    ##### 应用程序内的文件与应用程序沙盒


    与大多数操作系统一样，应用程序通常可以访问文件系统，但为了确保设备安全，会存在一些限制。iOS 为你的应用程序提供了对文件系统中某个仅由该应用程序访问的区域的访问权限。它通过使用*应用程序沙盒*来实现这一点，沙盒作为安全机制在
    iOS 中实现。沙盒提供了细粒度的控制，限制了可能被利用而引发安全问题的区域，例如文件系统和网络资源访问。


    应用程序的沙盒在应用首次安装时建立。模拟器主目录的路径形式为 `<//应用程序根目录>/Applications/应用程序 ID>`，其中 `<根目录>`
    是用户主目录下的以下目录：`/Library/Application Support/iPhone Simulator/<iOS 版本>/`，这是文件系统中安装应用程序的区域。*`应用程序
    ID`* 唯一标识了特定应用程序。两者组合起来，被称为*应用程序主目录*。


    系统会创建多个重要的应用程序子目录，允许你的应用程序在 iOS 安全系统的约束范围内写入数据及其偏好设置。这些子目录是从应用程序主目录安装而来的。例如，`<根目录>/Applications
    /应用程序 ID/Documents` 是存储应用程序数据和文档的位置。`/tmp` 目录则用于存放无需在应用程序启动之间持久保存的文件。


    **注意：** 有关沙盒的更多详细信息，请参阅 *《iOS 应用程序编程指南》* 中的“文件系统”部分。


    ##### 多任务处理


    本书不会涉及多任务处理，但此处简要介绍 iOS 4.0 中引入的功能，可帮助你利用在线资源进一步探索。


    .NET Framework 长期以来一直支持多任务处理，但在 iOS 中，直到 4.0 版本才正式向应用程序开发者引入多任务支持。


    请注意，并非所有设备都支持多任务处理。你可以查询 `UIDevice` 的 `multitaskingSupported` 属性，以判断运行应用程序的设备是否支持多任务。


    应用程序可以在后台处理某些任务，但这些任务受到严格控制。支持以下类型的后台行为：


    -   跟踪用户位置，可连续或定期监听更新。这对基于位置的应用程序非常有用。

    -   播放后台音频。这在健身类应用程序中很常见。

    -   完成有限长度的后台任务。例如，将数据保存到磁盘以避免损坏。

    -   定时本地通知。例如，这用于闹钟类应用程序。


    ### 比较 .NET Framework 与 iOS 及 iOS SDK


    首先，我们比较一下这两个环境及其框架，定位各自在运行时和设计时方面的特性。在理解应用程序架构以及 API 的使用方式时，这些背景信息会很有用。花点时间看一下图
    4-4 中的示意图。


    ![images](img/0404.jpg)


    **图 4-4.** *.NET 与 iOS 框架对比*


    如果我们考虑通用层以及 .NET Framework 和 iOS 操作系统及 SDK 所涵盖的要素，你会注意到以下相似之处：


    -   **用户界面服务**：这些服务负责呈现用户界面和处理用户交互，例如设备输入。iOS SDK 使用 Cocoa Touch 扩展以及其他层（如媒体层）的方面来实现这一点，特别是多点触控输入。.NET
    Framework 则包含 Windows Presentation Foundation (WPF) 和 Windows Forms 来实现此功能。

    -   **应用程序服务**：此类服务整合了 .NET 和 Apple 框架（如 iOS SDK）中的多个组件部分。在 iOS 中，包括 Cocoa API、Cocoa
    Touch 和媒体层；而对于 .NET，则包括基础服务、数据服务、通信和工作流等元素。涉及用户界面和用户输入的 API 部分被特意分离到用户界面服务中。

    -   **运行时服务**：这是在运行时提供给应用程序的功能，通常包含在操作系统或运行在操作系统之上的运行时环境中。.NET 或 Java 运行时环境是运行在操作系统之上的运行时服务的好例子。运行时服务包括内存管理、磁盘访问、图形卡
    API 等。

    -   **硬件**：在所有架构中，硬件保持不变，但其规格和性能会根据设备而变化。硬件之上的软件层提供了使用硬件的抽象方式。


    这些相似之处并不令人意外。经过多年的设备、操作系统和应用程序演变，最佳实践逐渐浮现，导致了这些相似性。因此，从高层看，很容易进行对比。但细节决定成败。如果我们深入一层，就会开始看到每个框架实现中的细微差别。我们会看到一些框架中包含的功能在另一个框架中完全不存在，或者通过不同的机制实现。


    从堆栈顶部开始，让我们看看不同的层，比较其中的框架和库。这将帮助你理解 .NET 中的术语和结构，以及它在 Apple 世界中的对应部分如何工作。


    我们不会深入探讨类及其方法的具体细节，这些你可以在 Apple 的在线 iOS 参考文档中找到。通过比较突出 iOS SDK 中的等效功能，这些功能的使用应该会变得简单明了。这将为后续章节奠定基础，届时我们将通过一些实际示例进行讲解。

    '
- fmt: '#### User-Interface Services


    The explosion of Web 2.0-based applications has significantly raised user expectations
    of how applications will perform. The gap between native applications and the
    capabilities of web-based applications has narrowed significantly. The same is
    true of mobile applications. The user experience associated with early mobile
    applications, including new protocols at the time, such as the Wireless Access
    Protocol (`WAP`), is vastly different from the intuitive, interactive, high-definition
    capabilities exposed by some of today''s mobile devices, blending native functionality
    with Internet-based web or even cloud-based services.


    This is possible in no small part due to the improved capabilities of the physical
    hardware, which now has faster processors, more memory, and higher-resolution
    screens that support touch-based input. However, software is at the heart of such
    functionality, and how this is organized and used is where key differences appear.


    `.NET` makes provisions for user-interface design and implementation by providing
    the following runtime services through which functionality is exposed:


    - **WPF**: This provides a complete API to creating highly visual user interfaces.
    It was introduced some time after Windows Forms to provide support for additional
    areas such as 2D and 3D graphics and video and audio.

    - **Windows Forms**: This is the name given to the API that encapsulates Microsoft
    Window''s native Windows API. Other APIs are required to deal with more advanced
    aspects, such as 2D and 3D graphics.

    - **ASP.NET**: This includes `ASP.NET`, `ASP.NET MVC`, `ASP.NET`, and Ajax. It
    is Microsoft''s Active Server Pages (`ASP`) technology that allows you to develop
    web sites using server-side programming.


    We''ll exclude `ASP.NET` from our comparison, as this is Microsoft''s `ASP` technology
    used to deliver web-based applications, and our focus is on native applications.
    So, we are left with `WPF` and Windows Forms. Given that `WPF` effectively supersedes
    Windows Forms, we could easily exclude Windows Forms also, but given its popularity
    and the relatively recent introduction of `WPF`, we''ll cover both in our comparison.


    `WPF` exists as a subset of `.NET Framework` types that are for the most part
    located in the `System.Windows` namespace, just as Windows Forms does. But you''ll
    notice that to accomplish more advanced graphical applications in Windows Forms,
    you need to step outside this API into things like the Windows Media Player and
    the Graphics Display Interface (`GDI+`).


    Based on the assumption that `WPF` at least in part can be seen as a container
    for Windows Forms, the closest comparison for `WPF`, and Windows Forms for that
    matter, is Cocoa and Cocoa Touch. We''ll start with Cocoa Touch, which includes
    the following frameworks:


    - **UIKit (`UIKit.framework`)**: Provides the capabilities necessary to implement
    graphical, event-driven applications.

    - **Message UI (`MessageUI.framework`)**: Provides support for composing and queuing
    email messages. In `iOS 4.0`, this extends to include Short Message Service (`SMS`)
    support.

    - **Map Kit (`MapKit.framework`)**: Provides support for a scrollable map interface
    that can be integrated into your application.

    - **iAd (`iAd.framework`)**: Provides support for banner-based advertisements
    within your application.

    - **Game Kit (`GameKit.framework`)**: Provides support for peer-to-peer networking
    capabilities. It allows you to create complex multiplayer networking games.

    - **Event Kit (`EventKitUI.framework`)**: Provides support for viewing and editing
    calendar-based events.

    - **Address Book UI (`AddressBookUI.framework`)**: Provides support for viewing,
    editing, and creating new contacts.


    #### Application Services


    The applications of today not only require a more intuitive and interactive user
    interface, but are generally more demanding in the features and functionality
    they provide. The day has long gone where an application ran on the device, isolated
    from the rest of the world, or where the application''s interactive features were
    based on text and simplistic graphics.


    Today''s applications demand video, music, high-definition graphics, parallel
    processing in the form of multitasking, and a speed and responsiveness that was
    unheard of only a few years ago—and this is on a *mobile* device! Such functionality
    is exposed, in part, through the application services provided within the iOS,
    which include the following features:


    - Multimedia capabilities

    - Storage and management of data

    - Network and communication access

    - Workflow and communication

    - Access to device-specific features such as the GPS


    Such features are provided for within `.NET` through the `.NET Framework Class
    Library`. These include some of the class libraries we''ve already mentioned in
    the discussion of `.NET`''s user-interface capabilities. The following features
    support application services:


    - **Windows Communication Foundation (`WCF`)**: Provides functionality to support
    service-oriented applications, which collaborate over a network connection.

    - **ActiveX Data Objects for .NET (`ADO.NET`)**: Provides support for accessing
    data and data services, such as native database libraries, or abstracted drivers,
    such as `ODBC`.

    - **Windows Forms and `WPF`**: in the context of application services, `WPF` provides
    similar user-interface capabilities to those in the `iOSUIKit` framework, as well
    as multimedia and audio capabilities, along with 3D and animation support.

    - **Language Integrated Query (`LINQ`)**: New to `.NET Framework 3.5`, `LINQ`
    provides native data-querying capabilities.


    In the iOS SDK, such services (and others) are encapsulated within the Media and
    Core Services layers. Let''s take a look at the key frameworks provided within
    these layers to map onto the capabilities we''ve touched upon in the `.NET Framework
    Class Library`.


    ##### Media Layer


    The Media layer contains the graphics, audio, and video technologies that support
    you in building applications that look and sound great. It contains the following
    frameworks:


    - **AV Foundation (`AVFoundation.framework`)**: A comprehensive set of APIs that
    support playing, recording, and managing audio content in iOS. In `iOS 4.0`, this
    includes movie-editing support and precision controls for playback.

    - **Core Graphics (`CoreGraphics.framework`)**: Supplies support for 2D graphics
    by providing a vector-based drawing engine.

    - **Core Text (`CoreText.framework`)**: Provides a comprehensive and performant
    set of APIs for laying out text and using fonts.

    - **Image I/O (`ImageIO.framework`)**: Supports importing and exporting image
    data and its associated metadata.

    - **Media Player (`MediaPlayer.framework`)**: Allows you to embed support to play
    audio and video content from within your application. This includes support for
    accessing the iTunes library and for coping with resizable video.

    - **OpenAL and OpenGL ES (`OpenAL.framework` and `OpenGLES.framework`)**: Cross-platform
    frameworks included within iOS to provide close-to-hardware, high-performance
    audio and video functionality.'
