    value rather than decrease it.


    ### Enabling User Interaction


    The user is obviously required to interact with the game, although how you do
    this is up to you. Some options are to detect keypresses, or use onscreen images
    to detect a tap, or even use the accelerometer to detect the device being tipped
    left or right. In any case, you need to interpret the actions, and the following
    keys are used to interact with the lander. Doing nothing simply lets the lander
    drop to the ground as gravity is applied. For your lander, you do the following.


    *   If the up arrow is pressed, onscreen or on the keyboard, the thruster is being
    fired.

    *   If the left arrow is pressed, onscreen or on the keyboard, the lander is rotating
    left.

    *   If the right arrow is pressed, onscreen or on the keyboard, the lander is
    rotating right.


    ### Catching Game Events


    You need to monitor some additional game events: for example, detecting when you
    hit the ground and the speed at which you hit. This is fairly straightforward
    using a combination of lunar lander y position and ground height and using the
    speed of the lander as an indicator of whether you''re moving too fast.


    The method only works when the ground is flat. If you decide to implement a Moon
    surface that has different gradients, you need to detect this in your game—maybe
    looking at the pixel values surrounding the lander.


    ### Handling the Graphics


    Your Lunar Lander implementation has already made provision to draw the graphics
    for the game by implementing the `drawRect` method, although the default implementation
    simply draws the same graphic (the nonthrusting lander) at the x and y location.


    You need to adjust this code to be representative of the other states, including
    when the game is running, looking for when it should be thrusting or just dropping,
    and drawing at the angle appropriate for the lander. The angle is obviously in
    relation to the rotate-left or -right keypresses.


    To rotate your image, you could use the `rotateAt()` method in Microsoft .NET,
    but such a method doesn''t exist in Objective-C. Instead, you can use a simple
    macro to convert between degrees and radians, the measure used by the `UImagerotate`
    equivalent called `transform`. First define a macro something like the following:


    `#define degreesToRadians(x) (M_PI * (x) / 180.0)`


    Then add the following line, assuming the `deg` variable represents the degrees
    you wish to rotate by:


    `myView.transform = CGAffineTransformMakeRotation(degreesToRadians(deg) );`


    If you''re interested in knowing more, the post at [`www.platinumball.net/blog/2010/01/31/iphone-uiimage-rotation-and-scaling/`](http://www.platinumball.net/blog/2010/01/31/iphone-uiimage-rotation-and-scaling/)
    has a lot of detail about how to do image rotation and scaling.


    ### Displaying a High Score


    This should be straightforward because you covered how to create high-score code
    in [Chapter 8](#Chapter08.html), and you also looked at different mechanisms for
    displaying a dynamic user interface in Chapter 6\. Combining these with the high-score
    mechanics of your game allows you to create a high-score chart that can be displayed
    when the game is at the main menu.


    ### Resources


    In addition to the information provided in this appendix to help you complete
    the Lunar Lander game, and the additional code supplied with the book, the following
    resources may help you complete and/or customize your game:


    *   *PhET Lunar Lander:*Anumber of resources including an online version of the
    game, provided as part of a teaching aid. [`http://phet.colorado.edu/en/simulation/lunar-lander`](http://phet.colorado.edu/en/simulation/lunar-lander).

    *   *LunarView.java:*A Java-based implementation of the Lunar Lander game for
    the Android mobile device. [`http://developer.android.com/resources/samples/LunarLander/src/com/example/android/lunarlander/LunarView.html`](http://developer.android.com/resources/samples/LunarLander/src/com/example/android/lunarlander/LunarView.html).

    *   *Code Project:*A .NET-based implementation of the Lunar Lander game, written
    in C#. [`http://www.codeproject.com/KB/game/lunarlander.aspx`](http://www.codeproject.com/KB/game/lunarlander.aspx).

    *   *History of Lunar Lander:* Wikipedia''s history of the Lunar Lander game.
    [`http://en.wikipedia.org/wiki/Lunar_Lander_(video_game)`](http://en.wikipedia.org/wiki/Lunar_Lander_(video_game)).


