    You can see from the diagnostic information there are many performance-related
    timings, allowing you to see how performant your methods are. Additionally, you
    can implement many test cases within your code and are not limited to the single
    `testExample()` method. Just go ahead add more methods, each representing a particular
    test case.


    But what if you don''t want to execute ALL the test cases every time you test
    your application? What if you want to test only one or two? This is expected and
    easily provided for within Xcode. Simply edit your project scheme using the Scheme
    editor (![images](images/U007.jpg)), which will display the dialog box that allows
    you to manage a number of aspects of your application, including the tests performed.
    Choose the test item in the left-hand panel, and you''ll see the tests you can
    choose from (see [Figure 9–2](#Chapter09.html#fig_9_2)).


    ![images](images/0902.jpg)


    **Figure 9–2.** *Choosing which tests to execute from the Scheme editor*


    Using this dialogue box, you can choose which of the unit tests are executed when
    you test your application. Select those that you wish to run using the checkbox
    provided against each test. When you''ve selected those tests you wish to take
    place, select the OK button; this will save your scheme, meaning that when executing
    your application, these unit tests will be executed. You can then use the Log
    navigator to examine the output and the test results.


    ## Using the Xcode 4 Debugger


    So now you know some of the debugging capabilities of Xcode 4 through the generation
    and use of unit tests. However, it can do much, much more. The really advanced
    features such as profiling will be covered a little further into the chapter,
    so let''s take a look at some other slightly less advanced features that are incredibly
    useful when testing your application.


    Xcode 4 features a debugger with very similar capabilities to that of Visual Studio
    or other integrated development environments. It allows you to place breakpoints
    in your code—specific points at which execution stops for you to examine your
    application''s state. Breakpoints allow you to walk through your code line by
    line and examine all aspects of your application''s execution including variables,
    their values, etc. This works when running your application or testing it.


    **NOTE:** When debugging your application, you must compile it for debug output.
    This lets the compiler add additional information to your code that allows you
    to perform the debugging features. It also adds a considerable size to your compiled
    code, so remember to switch it off by compiling your application for Release when
    you deploy your application.


    So, let''s use the previous example and ensure that you are building for debug.
    In the `CalculatorTest.m` implementation file, let''s add a breakpoint. This can
    be done by simply clicking in the gutter to the left of your source code window.
    Doing so will place a dark blue breakpoint indicator in the gutter, indicating
    that your code will stop here when debugging. In [Figure 9–3](#Chapter09.html#fig_9_3)
    you can see a breakpoint in the gutter; you can also see other breakpoints that
    were previously been added but are switched off and inactive. These are indicated
    by a lighter blue breakpoint indicator and can be re-activated simply by clicking
    them.


    ![images](images/0903.jpg)


    **Figure 9–3.** *Breakpoints, both active and inactive, in the code window gutter*


    Once breakpoints have been added, you can build your application for testing (⌘U)
    as before and then test your application (⌘U). Your application will launch in
    the simulator as before. Your unit tests will start to output debug text to the
    log file, but your application will stop at the breakpoint. When it does this,
    it will also display the Debug window automatically at the bottom of your screen.
    This is shown in [Figure 9–4](#Chapter09.html#fig_9_4).


    ![images](images/0904.jpg)


    **Figure 9–4.** *Application stopping at a breakpoint and showing the Debug window*


    The left-most pane shows the navigator windows, which when debugging default to
    the Thread pane, showing threads (that is parallel units of code execution) of
    your application and their call stack, with the Debug window below the code pane.
    The Debug window shows the local variables in the Local pane, which can be explored
    simply by navigating through them. The application''s output is sent to the Console
    window, stored in a log file, but shown in the Output pane, which can be unfiltered
    (All Output), of filtered by Debugger output or the Target output.


    The header bar for the debug window allows you control how you navigate through
    your code. Having hit the breakpoint, the icons have the meanings defined in [Table
    9-1](#Chapter09.html#tab_9_1).


    ![images](images/t0901.jpg)


    You can also use the search box to look for/filter the variables you may wish
    to examine.


    Using the debugger, defining strategic breakpoints, and examining variable values,
    you can quickly decide whether the path of execution your application takes is
    as expected; more importantly, you can also look how variables are being initialized
    and whether this is as you intended.


    Finally, if you wish to remove all breakpoints, active or inactive, use the Breakpoint
    Navigator (⌘6) to see all breakpoints defined in one place and remove them or
    activate them. This can be seen in [Figure 9–5](#Chapter09.html#fig_9_5).


    ![images](images/0905.jpg)


    **Figure 9–5.** *Breakpoint Navigator*


    ### Other Debugging Options


    There are other options available to you when debugging your application—not just
    traditional techniques such as using the console to output debug text, but advanced
    features such as Profiling. Let''s look at them next.'
