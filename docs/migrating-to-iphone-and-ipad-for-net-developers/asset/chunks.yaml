  trans: "\n### 管理应用程序中的数据\n\n首要难题是，你需要在应用程序自身内部存储数据。虽然可以使用大量独立变量，但这并不优雅，并且在读写存储数据时会导致代码非常混乱。幸运的是，iOS\
    \ SDK 与 .NET Framework 类似，提供了简化此任务的机制。毕竟，在应用程序中处理数据是常见需求，因此大多数现代编程语言和框架都对其提供了支持。有几种机制可用于在应用程序内部存储数据。\n\
    \n第 4 章介绍了序列化和反序列化的概念。iOS SDK（以及 .NET Framework）提供了对象可序列化的能力。这意味着对象的结构及其内部持有的数据或状态信息，可以被持久化（或写入）到存储介质中，这种存储介质能在应用程序终止和移动设备关机后依然存在。当应用程序重新启动时，你可以从该存储介质中将数据反序列化回对象实例，该实例将拥有与序列化时完全相同的结构和数据，从而实现了状态的持久化。\n\
    \n在 Objective-C 中，可以序列化任何对象，将其转换为一系列可以写入存储的字节。然而，Objective-C 还提供了所谓的*集合类*，这些类允许你存储多个对象，然后序列化整个集合——这样做也能序列化集合中的所有数据。\n\
    \n在 .NET 中，具体来说在 C# 中，你可以将对象标记为 `[serializable]`，这意味着它可以在 .NET 中被转换为二进制、简单对象访问协议\
    \ (SOAP) 或 XML。.NET Framework 将数据的表示与其传输机制分开，例如通过在 .NET 中为你的类添加 `[serializable()]`\
    \ 属性，并确保你的类派生自 `ISerializable` 类。然后，你可以使用适当的方法将类写入目标位置。这可能是一个使用 `System.IO` 命名空间的文件，或者你可能使用\
    \ `System.Runtime.Serialization.Formatters.Binary` 等格式化器写入二进制流。\n\nObjective-C\
    \ 中默认的可序列化对象如表 7-2 所示，并附有注释。\n\n![images](img/t0701aa.jpg)\n\n为了使其更具体，让我们看一个实际示例，该示例允许我们使用这些类型之一来创建一个用于保存数据的值数组，然后我们将此数组序列化为属性列表。\n\
    \n首先，让我们使用 `NSMutableMutable` 类设置一个动态数组：\n\n```\nNSMutableArray *highscores =\
    \ [[NSMutableArray alloc] init];\n// 最高分 1\n[highscores addObject:@\"Mark\"];\n\
    [highscores addObject:@\"200\"];\n// 最高分 2\n[highscores addObject:@\"Rachel\"\
    ];\n[highscores addObject:@\"300\"];\n// .. 可以继续添加其他数据\n```\n\n至此，我们可以将其写入到我们选择的持久化存储中（正如我们接下来要做的），然后使用以下命令释放该数组：\n\
    \n```\n  [highscores release];\n```\n\n### 使用属性列表作为存储\n\n在本书前面部分，我们提到了 iOS 中的属性列表，以及它们在文件系统中以\
    \ `.plist` 扩展名文件的形式存在，称为 *plist 文件*。属性列表提供了一种持久化应用程序数据的方法。在 Objective-C 中，`NSArray`\
    \ 和 `NSDictionary` 集合类提供了一种将内容序列化为 plist 文件的方法。这些集合类还提供了一种简单的机制来从 plist 文件中存储和检索值。\n\
    \n使用我们刚刚设置的 `NSMutableArray`（实际上，任何可序列化的集合都可以），我们可以使用 `writeToFile` 方法将此字符串序列化为\
    \ plist 文件，以便后续读取和解释。只需使用文件的目标路径执行该方法，如下例所示：\n\n```\n[myArray writeToFile:@”/some/file/location/output.plist”\
    \ atomically:YES];\n```\n\n如果你在应用程序中执行包含这段代码的片段，然后检查生成的文件，你会发现它看起来像这样：\n\n```\n\
    <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist PUBLIC \"-//Apple//DTD\
    \ PLIST 1.0//EN\" \"httpfhighscor://www.apple.com/DTDs/PropertyList-1.0.dtd\"\
    >\n<plist version=\"1.0\">\n<array>\n        <string>Mark</string>\n        <string>200</string>\n\
    \        <string>Rachel</string>\n        <string>300</string>\n</array>\n</plist>\n\
    ```\n\n请注意，它是作为 XML 文件序列化的，符合属性列表模式，并使用字符串。\n\n然后，可以使用 `initWithContentsOfFile`\
    \ 方法将此文件读取回数组以供操作或使用。以下代码将我们刚刚创建的文件反序列化为一个包含相同值的新 `NSMutableArray`：\n\n```\nNSMutableArray\
    \ *highscores = [[NSMutableArray alloc] initWithContentsOfFile: @\"/some/file/location/output.plist\"\
    ];\n```\n\n### 使用互联网存储数据\n\n对于持久化数据，我们已经研究了属性列表以及使用部分可序列化 Objective-C 类型所提供的方法。但是，如果你想以某种形式使用互联网来序列化数据，该怎么办？如果你想将这些信息存储在某种中心位置，而不是本地设备上，又该怎么办？\n\
    \n第一个也是最明显的解决方案仍然是使用属性列表方法，只是文件的路径是一个位于某种内部存储（比如众多数字存储平台之一，如 Dropbox 和 DigitalVault）上文件的完整\
    \ URL。\n\n但还有另一种替代方案。`NSMutableArray` 等可序列化集合有一个名为 `writeToURL` 的方法，该方法不接收 `NSString`\
    \ 参数，而是接收 `NSUrl` 参数。然而，如果写入文件时你的参数是 `file://` 引用，那么这些方法的行为实际上没有区别。因此，下面的代码：\n\
    \n```\n[myArray writeToURL: @\"file://www.mamone.org/highscore.plist\" atomically:YES];\n\
    ```\n\n与下面的代码完全相同：\n\n```\nNSURL *url = [NSURL URLWithString:@\"http://www.mamone.org/highscore.plist\"\
    ];\n[myArray writeToURL:url atomically:YES];\n```\n"
- fmt: '#### Using the iOS-Embedded Database


    Our previous examples, while perfectly adequate, have been restricted to creating
    data using objects that are serializable to either locally held or Internet-based
    filesystems. You may want to persist data using a more comprehensive mechanism,
    especially if you want to manipulate the data without needing to resort to complex
    file or object manipulation in code, which would be a by-product of storing data
    using a simple filesystem-based storage mechanism. In these cases, you can use
    the iPhone''s embedded database, which is called `SQLite`.


    `SQLite` is an embedded relational database management system (RDBMS), which is
    similar in many ways to the more traditional server-based database servers you
    may be familiar with, such as Oracle and Microsoft SQL Server, in that you can
    use the Structured Query Language (SQL) to access and manipulate the data held
    within the database. However, there is no application you need to run. You simply
    use the API code provided within your application to invoke the `SQLite` functionality
    provided as part of the iOS.


    Let''s take a look at how you might use the `SQLite` capability within your mobile
    iOS device to access database functionality.


    **NOTE:** If you''re not familiar with the SQL language, many resources are available
    on this topic. For example, see *Beginning SQL Server 2008 for Developers* and
    other titles from Apress.


    Before we get started, you need to add support to your application for `SQLite`
    by referencing the library with the supporting library code, and then including
    the relevant header file. So, first add the library called `libsqlite3.dylib`
    to your project using the Build Phases tab of your project summary and choosing
    the + button. The dialog box should look similar to that shown in [Figure 7–1](#Chapter07.html#fig_7_1).


    ![images](images/0701.jpg)


    **Figure 7–1.** *Adding the SQLite library to the build phase of a project*


    Then you''ll need to include a reference to the supporting header file with the
    following `#import` directive in the source code file containing your SQLite code:


    `#import "/usr/include/sqlite3.h"`


    ##### What are the iOS SDK Options?


    Using the SQLite API isn''t the only option for accessing the iOS device database.
    `Core Data` is a framework that is confusingly described as a "Schema-driven object
    graph management and persistence framework." This essentially means that not only
    does the `Core Data` API manage where data is stored, how it is stored, and how
    management of that data for performance reasons is handled, but it also allows
    developers to create and use a relational database under SQL-less conditions.
    It allows you to interact with `SQLite` in Objective-C and not need to worry about
    connections or managing the database schema. Most of these features will be familiar
    to ADO.NET developers as a .NET Framework that abstracts access to the database.


    However, we won''t cover both `SQLite` and `Core Data` in this chapter. My goal
    is to take you through the principles with a working example using the SQLite
    API. This will provide a good foundation for you to apply this knowledge to whichever
    approach you take: `SQLite` or `Core Data`.


    I recommend that you explore `Core Data` using the online resources available,
    specifically the *Core Data Programming Guide* at [`http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/CoreData/cdProgrammingGuide.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/CoreData/cdProgrammingGuide.html).


    ##### Creating or Opening Your Database


    `SQLite` is written in portable C, not Objective-C. Therefore, we''ll need to
    write in the C language and use conversion between types where necessary.


    Let''s start by opening the database using the `sqlite_open()` method, and using
    the provided constants to look for success (`SQLITE_OK`) and log an error if it
    fails. The following code achieves this:


    ```

        sqlite3 *db;

        int result = sqlite3_open("/documents/file", &db);

        if (result == SQLITE_OK)

        {


        } else NSLog(@"Failed to open database");

    ```


    In this example, if the database exists, it will be opened. If it doesn''t exist,
    it will be created.


    **NOTE:** The `sqlite_open()` method expects a UTF-* string as an argument—that
    is, an 8-bit encoded string. This isn''t the same as an `NSString`, but you can
    use the `UTF8String` method to convert from an `NSString` to a UTF-8 string.


    Note that at some point when trying to open a database—especially when it''s not
    located locally on your machine—you will almost certainly encounter the problem
    of your database connection timing out. This is usually because of the delay (or
    latency) involved in accessing a resource that is not local, especially when you
    are connecting over the Internet. Therefore you should always intercept any error
    messages and deal with them as appropriate. For example, you might want to retry
    if the request has timed out.


    ##### Creating a Table in the Database


    With our database open and ready for use, the next step is to create a table in
    which we will store our data. The SQL command `CREATE TABLE` can be used with
    the optional condition to create the table only it if doesn''t already exist.
    The following code executes the `CREATE TABLE` command and creates a table with
    two columns called `NAME` and `SCORE`, both of type `text`.


    ```

           char *errMsg;

           const char *sql = "CREATE TABLE IF NOT EXISTS HIGHSCORE (NAME TEXT, SCORE
    TEXT)";

           if (sqlite3_exec(db, sql, NULL, NULL, &errMsg) == SQLITE_OK)

           {

             // code to write here

           } else NSLog(@"Failed to create table");

    ```


    Now the table will be created (if it didn''t already exist), and we can begin
    to populate it with data from our array.'
