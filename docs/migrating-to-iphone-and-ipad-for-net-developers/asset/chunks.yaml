    UIPopoverController *popCtrl;\nPopOverSelection    *selection;\n```\n\n当然，你还需要为这些变量编写相应的\
    \ `@property` 和 `@synthesize` 语句。\n\n现在，你已经具备了将操作连接到工具栏按钮以调用弹出框选择的条件，同时也拥有了实现弹出框显示/隐藏所需的其他属性。首先，按照前几章的做法连接操作。使用\
    \ Interface Builder，在主视图控制器打开并显示工具栏按钮的情况下，为主文件所有者打开连接检查器。然后将 `togglePopOverController`\
    \ 操作拖到工具栏按钮上，并将 `bbitem` 的 `IBOUTLET` 连接到同一按钮项。这样，你就可以引用该按钮并在其被点击时捕获该操作。你可以在图\
    \ 6-23 中看到这些连接。\n\n![images](img/0623.jpg)\n\n**图 6-23.** *将工具栏按钮项连接到代码中的操作*\n\
    \n剩下的唯一工作就是提供弹出框功能的实现代码。代码清单 6-3 展示了核心实现代码，随后我们将逐一讲解。\n\n**代码清单 6-3.** *弹出框的核心实现代码*\n\
    \n```objectivec\n#import \"PopoverExampleViewController.h\"\n\n@implementation\
    \ PopoverExampleViewController\n\n@synthesize popCtrl;\n@synthesize selection;\n\
    @synthesize bbitem;\n\n- (void)dealloc\n{\n    [super dealloc];\n}\n\n- (void)didReceiveMemoryWarning\n\
    {\n    // 如果视图没有父视图，则释放该视图。\n    [super didReceiveMemoryWarning];\n\n    // 释放任何未使用的缓存数据、图像等。\n\
    }\n\n#pragma mark - 视图生命周期\n\n// 实现 viewDidLoad 以在加载视图后执行额外设置，通常来自 nib 文件。\n-\
    \ (void)viewDidLoad\n{\n    selection = [[PopOverSelection alloc] init];\n   \
    \ popCtrl = [[UIPopoverController alloc] initWithContentViewController:selection];\n\
    \    popCtrl.popoverContentSize = CGSizeMake(250, 300);\n\n    [super viewDidLoad];\n\
    }\n\n- (void)viewDidUnload\n{\n    [super viewDidUnload];\n\n    // 释放主视图的任何保留子视图。\n\
    \    // 例如 self.myOutlet = nil;\n    [selection release];\n    [popCtrl release];\n\
    }\n\n- (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation\n\
    {\n    // 对于支持的旋转方向返回 YES\n    return YES;\n}\n\n-(IBAction)togglePopOverController\n\
    {\n    if ([popCtrl isPopoverVisible]) {\n        [popCtrl dismissPopoverAnimated:YES];\n\
    \    } else {\n        [popCtrl presentPopoverFromBarButtonItem:bbitem permittedArrowDirections:UIPopoverArrowDirectionAny\
    \ animated:YES];\n    }\n}\n\n@end\n```\n\n现在我们来分析代码清单 6-3 的各部分。首先，你需要使用以下代码合成（synthesize）你的属性：\n\
    \n```objectivec\n@synthesize popCtrl;\n@synthesize selection;\n@synthesize bbitem;\n\
    ```\n\n你还需要确保选择弹出框窗口的视图控制器（本例中为名为 `PopOverSelection` 的视图控制器类，其属性为 `selection`）和\
    \ `UIPopoverController` 类被分配并初始化。这需要在 `viewDidLoad` 事件中完成，如下所示：\n\n```objectivec\n\
    // 实现 viewDidLoad 以在加载视图后执行额外设置，通常来自 nib 文件。\n- (void)viewDidLoad\n{\n    selection\
    \ = [[PopOverSelection alloc] init];\n    popCtrl = [[UIPopoverController alloc]\
    \ initWithContentViewController:selection];\n    popCtrl.popoverContentSize =\
    \ CGSizeMake(250, 300);\n\n    [super viewDidLoad];\n}\n```\n\n首先初始化窗口的视图控制器。然后，使用自定义视图控制器对象（`selection`）初始化\
    \ `UIPopoverController` 类实例，并将默认大小设置为 250 x 300 点。初始化已完成，所以别忘了释放资源；这需要在 `viewDidUnload`\
    \ 方法中完成，做好清理工作：\n\n```objectivec\n[selection release];\n[popCtrl release];\n```\n\
    \n最后，正如人们所说，你触及了核心内容。与按钮点击操作关联的代码根据弹出框的状态切换其显示或隐藏。如果弹出框可见，你只需传递 `dismissPopoverAnimated`\
    \ 消息；如果不可见，则使用 `presentPopoverFromBarButtonItem` 消息，将弹出框以及箭头显示的任何约束传递给按钮。非常简单：\n\
    \n```objectivec\nif ([popCtrl isPopoverVisible]) {\n    [popCtrl dismissPopoverAnimated:YES];\n\
    } else {\n    [popCtrl presentPopoverFromBarButtonItem:bbitem permittedArrowDirections:UIPopoverArrowDirectionAny\
    \ animated:YES];\n}\n```\n\n如果你构建并运行这段代码，主窗口底部会显示工具栏。点击工具栏按钮会显示弹出框，再次点击则会隐藏该弹出框。这个弹出框现在已经可以用于展示你所需的数据。展示效果取决于你使用的视图控制器。在本例中，它使用了一个基于\
    \ `UITableViewController` 的表格视图（这是一个功能丰富的控件）。虽然本书不对此进行详细阐述，但 Apple Developer Program\
    \ 在 iOS 开发者库中的“iOS 表格视图编程指南”中提供了全面的介绍（[`developer.apple.com/library/ios`](http://developer.apple.com/library/ios)）。如果你构建并运行该应用程序，弹出框将如图\
    \ 6-24 所示。\n\n![images](img/0624.jpg)\n\n**图 6-24.** *iPad 模拟器运行应用程序，弹出框可见*\n"
- fmt: '#### Split-View Controllers


    `UISplitView`控制器允许两个窗格：左侧窗格（此处称为**索引**窗格）是固定的，右侧窗格（**详细**窗格）是可调整大小的。在竖屏模式下，只有详细窗格可见，索引窗格被替换为一个工具栏按钮，该按钮以弹出框的形式显示。在横屏模式下，你有更多空间，因此索引窗格和详细窗格会并排显示。你可以在[图
    6-25](#Chapter06.html#fig_6_25) 中看到它们并排显示。


    ![images](images/0625.jpg)


    **图 6-25.** *管理 iPad 方向的分割视图控制器*


    `UISplitViewController`类用于在单个视图控制器中管理两个视图，但它必须是您创建的任何界面的根。Xcode 中有一个基于分割视图的应用程序模板，这是一个很好的起点，我建议您在开始探索时使用它。您可以在[图
    6-26](#Chapter06.html#fig_6_26) 中看到它在横屏模式下运行，两个窗格清晰可见。


    ![images](images/0626.jpg)


    **图 6-26.** *iPad 分割视图控制器模板*


    深入了解默认实现的底层机制，当应用程序启动完成后，您将`rootViewController`分配给您的`UISplitViewController`实例，这与其他任何视图控制器非常相似：


    `self.window.rootViewController = self.splitViewController;`


    现在，您可以在 Xcode 中使用分割视图控制器对象，并在 Interface Builder 中为其分配视图控制器和关联的 NIB 文件，或者您也可以通过编程方式实现。如果您使用
    Xcode 模板检查分割视图示例，您可以看到 Interface Builder 被用来完成繁重的工作——创建一个作为表格视图控制器（呈现其数据列表）的左窗格，以及一个作为标准视图控制器的详细视图。


    如果您要以编程方式实现这一点，您可以简单地创建两个您偏好的视图控制器，并将它们添加到`UISplitViewController`类的`viewControllers`数组属性中；第一个元素是索引，第二个是详细视图。因此，类似于以下的代码应该可以解决问题：


    ```

    // 根据需要创建您的两个视图控制器，分别为它们命名为 firstVC 和第二 VC。

    // firstVC 和 secondVC 将在此处创建


    // 创建您的 SplitViewController 实例

    UISplitViewController* splitVC = [[UISplitViewController alloc] init];

    // 将您创建的视图控制器作为两个控制器的数组添加到 viewControllers 属性中。

    splitVC.viewControllers = [NSArray arrayWithObjects:firstVC, secondVC, nil];

    // 添加到 rootViewController 并使其可见。

    self.window.rootViewController = splitVC;

    [window makeKeyAndVisible];

    ```


    在 Microsoft .NET 中，有多种方法可以实现与分割视图类似但不完全相同的功能，从 .NET 框架早期实现中引入的分割器控件，到最近的`SplitContainer`类（请参见[`http://msdn.microsoft.com/en-you/library/system.windows.forms.splitcontainer.aspx`](http://msdn.microsoft.com/en-you/library/system.windows.forms.splitcontainer.aspx)），在
    WPF 中，其替代品称为`GridSplitter`。


    iPad 特定的乐趣就到此为止。让我们看看您可以在用户界面中获得的其他乐趣。


    ### 用户界面控件


    您已经详细介绍了视图和视图控制器，但仅触及了可用于构建应用程序用户界面的一些元素。作为 iOS SDK 的一部分提供的 UIKit 框架，为您提供了大量的
    UI 元素供您在设计应用程序时使用。.NET 框架也是如此。您可能熟悉通常被称为**用户界面控件**的那些控件，它们可供您拖放到 Windows 窗体中，或作为其他
    Microsoft 技术（如 ASP.NET 和 Windows Presentation Foundation）的一部分使用。本节介绍 Apple UI
    元素，并在可用时提及它们对应的 Microsoft 控件。


    #### 控件


    用户可以与之交互或向用户呈现信息的界面元素称为**控件**。与 .NET 框架一样，iOS 工具集提供了大量可在您的应用程序中使用的控件。对于每个控件，本节将简要概述其用途，并尽可能简要介绍其最佳使用时机。您还将介绍
    .NET 框架中的类似控件。让我们从一些使用频率较低的控件开始，然后是那些具有直接 .NET 对应物的控件。


    ##### 活动和进度指示器


    这些控件用于向用户指示特定任务正在进展中。它们通过显示旋转齿轮图标或进度条来提供任务正在进行的视觉反馈。


    对于活动指示器，您使用`UIActivityIndicatorView`类，并在任务开始时调用`startAnimating`方法，在任务完成时调用`stopAnimating`方法。该控件的外观类似于[图
    6-27](#Chapter06.html#fig_6_27) 所示。


    ![images](images/0627.jpg)


    **图 6-27.** *活动指示器*


    iOS 工具集还提供了一个进度指示器，它与 .NET 中的 Windows Forms `ProgressBar` 类类似。iOS 版本如[图 6-28](#Chapter06.html#fig_6_28)
    所示。


    ![images](images/0628.jpg)


    **图 6-28.** *进度条*


    它通过`UIProgressView`类实现，正如您所期望的那样，随着进度的推进，进度条会开始填充。此控件通常用于任务有预定范围的情况：例如，下载 50 封电子邮件。如果您无法衡量进度，则应改用活动指示器。


    ##### 日期、时间和通用选择器


    日期和时间选择器控件由`UIDatePicker`类实现，通过代表日期或时间每个元素的滑动轮盘，提供了一种触控友好的方式来选择特定的日期和/或时间。您可以在[图
    6-29](#Chapter06.html#fig_6_29) 所示的控件上看到这一点。


    ![images](images/0629.jpg)


    **图 6-29.** *日期和时间选择器*


    当然，您可以提供一个允许用户输入值或从下拉框中选择的控件来呈现日期和时间，这是 .NET 框架期望您输入日期/时间的方式。然而，在 iPhone 上，为了充分利用基于触摸的界面，这提供了一种更直观的方法。在
    iPad 上，此控件通常以弹出框的形式呈现。


    尽管 .NET 中的`DateTimePicker`类提供了一个很好的替代方案，但没有行为完全相同的 .NET 等价物；它通常以日历格式呈现日期，显示月份，每个元素作为下拉框和/或直接输入。iOS
    的`Picker`类使用了类似的方法，但通过一个单选轮盘向用户呈现一个自定义列表，用户可以从中进行选择。


    ##### 详细信息展开按钮


    一个详细信息展开按钮，由`UITableViewCellAccessoryDetailDisclosureButton`实现，允许您在屏幕上指示一个感兴趣的项目。蓝色圆圈中的箭头表示有更多信息可用。点击它时，它会像超链接一样显示附加信息。此控件可能因其在您
    iPhone 或 iPad 的“地图”应用中用作地图标注而为人熟知，如[图 6-30](#Chapter06.html#fig_6_30) 所示。


    ![images](images/0630.jpg)


    **图 6-30.** *详细信息展开按钮*


    在 .NET 框架中没有等价物，但像往常一样，没有什么能阻止您自己编写一个（尽管这样做并非易事）。'
  raw: '#### Split-View Controllers


    The `UISplitView` controller allows for two panes: the left pane (here called
    the *index* pane) is fixed, and the right pane (the *detail* pane) is resizable.
    In portrait mode, the detail pane is the only pane visible, with the index pane
    replaced by a toolbar button that displays as a popover. In landscape mode you
    have more space, so the index and detail panes are shown alongside each other.
    You can see them side by side in [Figure 6–25](#Chapter06.html#fig_6_25).


    ![images](images/0625.jpg)


    **Figure 6–25.** *Split-view controller managing orientation on an iPad*


    The `UISplitViewController` class is used to manage both views in a single view
    controller, but it must be the root of any interface you create. There is a split
    view–based application template in Xcode that is a good starting point, and I
    recommend that you use it as you start to explore. You can see it running in [Figure
    6–26](#Chapter06.html#fig_6_26) in landscape mode, with the two panes clearly
    visible.


    ![images](images/0626.jpg)


    **Figure 6–26.** *The iPad split-view controller template*


    Looking under the hood of the default implementation, when the application has
    finished launching, you assign the `rootViewController` to the instance of your
    `UISplitViewController`, much the same as any view controller:


    `self.window.rootViewController = self.splitViewController;`


    Now you can use the split-view controller object in Xcode and assign it the view
    controllers and associated NIB files all in Interface builder, or you can do it
    programmatically. If you examine the split-view example using the Xcode template,
    you can see Interface Builder was used to do the hard work—creating a left pane
    as a table view controller (given the list of data it presents) and the detail
    view as a standard view controller.


    If you were to do this programmatically, you could simply create the two view
    controllers of your preference and add them to the `viewControllers` array property
    of the `UISplitViewController` class; the first element is the index, and the
    second is the detail. So, code similar to this should do the trick:


    `// Create your two view controllers as required, giving them the name firstVC
    and`![images](images/U002.jpg)

    ` secondVC accordingly.`

    `// firstVC and secondVC would be created here`


    `// Create your SplitViewController instance`

    `UISplitViewController* splitVC = [[UISplitViewController alloc] init];`

    `// Add the view controllers you''ve created to the viewControllers property as
    an array`![images](images/U002.jpg)

    `of the two controllers.`

    `splitVC.viewControllers = [NSArray arrayWithObjects:firstVC, secondVC, nil];`

    `// Add to the rootViewController and make visible.`

    `self.window.rootViewController = splitVC;`

    `[window makeKeyAndVisible];`


    In Microsoft .NET, there are a number of ways you can implement functionality
    similar to but not exactly the same as a split view, starting with the splitter
    controls introduced in early implementations of the .NET framework and more recently
    the `SplitContainer` class (see [`http://msdn.microsoft.com/en-you/library/system.windows.forms.splitcontainer.aspx`](http://msdn.microsoft.com/en-you/library/system.windows.forms.splitcontainer.aspx)),
    the replacement for which in WPF is called `GridSplitter`.


    Enough iPad-specific fun. Let''s look at what other fun you can have in your user
    interface.


    ### User Interface Controls


    You''ve covered views and view controllers at length but only touched on some
    of the elements available to build the user interface for your application. The
    UIKit framework, provided as part of the iOS SDK, provides an extensive set of
    UI elements for you to use when designing your application. The same is true of
    the .NET framework. You likely are familiar with the *user interface controls*,
    as they are typically called, that are provided for you to drag and drop onto
    your Windows Forms, or for you to use as part of other Microsoft technologies
    such as ASP.NET and the Windows Presentation Foundation. This section introduces
    the Apple UI elements and also refers to their Microsoft counterparts where available.


    #### Controls


    An interface element that a user can interact with, or that presents information
    back to the user, is called a *control*. As in the .NET framework, the iOS toolset
    provides a large number of controls available for use in your application. For
    each control, this section provides a brief overview of its purpose and, as space
    permits, a quick introduction to when to best use it. You also cover similar controls
    in the .NET framework. Let''s start with controls that are used a little less
    often, followed by those that have a direct .NET counterpart.


    ##### Activity and Progress Indicators


    These controls are used to indicate to the user that a particular task is progressing.
    They provide visual feedback that the task is working by showing a spinning gear
    icon or a progress bar.


    For the activity indicator, you use the **`UIActivityIndicatorView`** class and
    call the `startAnimating` method when you being your task and `stopAnimating`
    when it''s completed. The control looks similar to that in [Figure 6–27](#Chapter06.html#fig_6_27).


    ![images](images/0627.jpg)


    **Figure 6–27.** *Activity indicator*


    The iOS toolset also provides a progress indicator, which is similar to its .NET
    counterpart the Windows Forms `ProgressBar` class. The iOS version is shown in
    [Figure 6–28](#Chapter06.html#fig_6_28).


    ![images](images/0628.jpg)


    **Figure 6–28.** *Progress bar*


    It is implemented through the **`UIProgressView`** class, and as you''d expect,
    as progress is made, the bar starts to fill. This control is typically used when
    the task has a predetermined scope: for example, downloading 50 e-mails. If you
    cannot measure the progress, you should use the activity indicator instead.


    ##### Date, Time, and General Pickers


    The date and time picker control, implemented by the **`UIDatePicker`** class,
    provides a touch-friendly way of choosing a particular date and/or time by using
    sliding wheels representing each element of the date or time. You can see this
    on the control shown in [Figure 6–29](#Chapter06.html#fig_6_29).


    ![images](images/0629.jpg)


    **Figure 6–29.** *Date and time picker*


    You could of course present the date and time in a control that allows you to
    type in the values, or choose from drop-down boxes, which is the way the .NET
    framework expects you to enter a date/time. However, on the iPhone, to take full
    advantage of the touch-based interface, this presents a far more intuitive method.
    On the iPad, this control is normally presented as a popover.


    There is no .NET equivalent that behaves in the same way, although the `DateTimePicker`
    class in .NET does provide a good alternative; it presents the date in a calendar-type
    format, typically with the month displayed and each element as a drop-down box
    and/or direct input. The iOS **`Picker`** class uses a similar approach but presents
    the user with a custom list in a single wheel that the user can then select from.


    ##### Detail Disclosure Button


    A detail disclosure button, implemented by **`UITableViewCellAccessoryDetailDisclosureButton`**,
    allows you to indicate an item of interest on your screen. An arrow in a blue
    circle indicates that more information is available. When tapped, it displays
    the additional information as if it were a hyperlink. This control may be familiar
    from its use as a map annotation on your iPhone or iPad Maps application, as shown
    in [Figure 6–30](#Chapter06.html#fig_6_30).


    ![images](images/0630.jpg)


    **Figure 6–30.** *Detail disclosure button*


    There is no equivalent in the .NET framework, but as usual, nothing is stopping
    you from writing your own (although doing so isn''t trivial).'
