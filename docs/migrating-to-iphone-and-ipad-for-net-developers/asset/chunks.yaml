  trans: '好的，作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，对给定的英文文本进行专业、准确的中文翻译。



    ### 比较 iOS 设备的性能


    我们之前已经简单介绍过可以使用 iOS SDK 为其编写应用程序的苹果设备类型，并指出并非所有设备都性能相同。因此，仔细考量您打算支持的目标设备、它们各自的优缺点以及操作系统所暴露的功能特性至关重要。这种审慎的评估将确保客户获得您预期的用户体验，并确保您在开发应用程序时，能够充分利用目标设备的性能，从而打造出稳健可靠的应用程序。


    本书的重点是移动应用程序的开发（尽管部分工具和技术也可用于桌面应用程序）。就现有的移动设备而言，我们的目标对象是 iPhone、iPod touch 和 iPad。表
    4-1 列出了基于各设备最新一代型号的一些特性。


    ![images](img/t0401.jpg)


    ### iOS 应用设计


    在开始考虑应用程序设计时，除了考察目标设备的性能外，还有其他几个重要因素需要注意，例如兼容性和性能调优。此外，在使用 iOS SDK 和 Objective-C
    进行开发时，您还应该了解某些设计模式，这将让您深刻理解为何类和 API 会以特定的方式实现。设计模式也为确保您自己应用程序的简洁与优雅提供了一种绝佳方法。


    我们将在接下来的章节中进一步深入探讨设计考量和设计模式。


    #### 设计考量


    在规划和开发应用程序时，遵循一套总体原则不仅有助于确保应用程序设计良好、符合其目的，还能让您充分利用目标设备上的可用性能。在阅读本书的过程中，请务必考虑以下原则：


    -   设计您的应用程序，使其尽可能与最广泛的设备兼容。这将最大限度地扩大您的市场机会。

    -   使用设备的高级功能是可以的，但如果可能，请提供自动和/或手动关闭这些功能的选项。

    -   尽可能在多种设备上进行测试，而不仅仅是使用模拟器——如果可能，请在真实设备上进行测试。我们将在第 9 章中更详细地探讨测试这个主题。

    -   在跨越重大外形尺寸（例如从 iPhone 到 iPad）时，不要贪图方便而不更改您的应用程序。

    -   注重性能调优。要留意内存限制和多线程能力。

    -   谨记考虑成本。如果您的应用需要网络连接，请考虑在使用 3G 网络时定期搜索 Wi-Fi。


    在构建应用程序时，您应始终牢记这些基本考量。现在，让我们继续学习一些具体的 iOS 设计模式。


    #### 设计模式


    在使用 iOS SDK 和 Objective-C 设计和实现应用程序时，首先要注意的是苹果对设计模式的运用。设计模式并非一个新概念，但并非所有操作系统或
    SDK 都忠实地实现了它们。例如，.NET 的 Windows Forms 处理用户界面设计的方式，并没有定义或规定任何类型的设计模式。这完全取决于开发者个人，如果该开发者选择这样做的话。


    *设计模式*描述了一种解决常见问题的方法，并为此创建了优雅的解决方案设计。这种设计以书面形式表达，通常配以描述对象、对象关系及其行为的图表。


    单例模式是一个很好的设计模式例子。它将类的实例化限制为单个对象。第一次调用时，会创建一个对象，但后续调用会返回对现有对象的引用。它通常用于`Application`对象，每个应用程序只能存在该类的一个实例。


    苹果对设计模式的使用，从根本上帮助构建了一个框架，您的应用程序可以在此框架内编写，并在此过程中，帮助强化苹果所竭力维护的用户体验。此外，使用设计模式也是一种良好的实践。它使应用程序的实现更加容易，因为围绕如何设计应用程序的一些决策已经为您做好了。


    使用设计模式的做法并非 .NET Framework 的固有要求。它提供了一个带有 API 的类库，但应用程序的架构结构以及设计模式的实现都留给您自己——嗯，几乎如此！可以想象，.NET
    社区总是乐意提供支持，无论是微软自己通过 Microsoft Developer Network (MSDN) 在 [`http://msdn.microsoft.com`](http://msdn.microsoft.com)
    提供的支持，还是诸如 dofactory 在 [`http://www.dofactory.com/Framework/Framework.aspx`](http://www.dofactory.com/Framework/Framework.aspx)
    等第三方站点提供的支持。


    表 4-2 描述了您将在应用程序中使用的一些重要 iOS 设计模式。


    ![images](img/t0402.jpg)


    现在，您已经对基本的设计考量和设计模式有了一个概述，我们将深入探讨应用程序在 iOS 上运行时的结构和生命周期。


    ### 深入探究应用程序的内部结构


    因此，您已经选择了想要支持的一个或多个设备，并对其性能有了大致了解。现在，让我们看看应用程序在 iOS 操作系统上是如何构建的，设计它们时需要考虑什么，以及它们是如何构建的基本原理。


    一旦您设计好了应用程序，就可以开始研究如何实现它。在此阶段，理解 iOS 应用程序是如何构建并在内部运行的至关重要。请考虑 图 4-1 中展示的核心应用程序生命周期。


    ![images](img/0401.jpg)


    **图 4-1.** *iOS 应用生命周期*


    正如您在图中所见，MVC 模式是 iOS 应用程序的核心，考虑到应用程序需要显示用户界面并需要人工交互，这一点并不令人意外。


    一旦您的应用程序启动，UIKit 框架将负责管理其行为。它从操作系统接收事件，而您的应用程序必须响应这些事件，这些事件可能是系统生成的，也可能是用户生成的。这种行为类似于
    Microsoft Windows 的消息模式，即通过一个消息队列来检索和处理事件。


    您无需亲自处理每一条消息。许多消息都有默认的实现，因此框架会自动处理它们。但是，当您需要替代行为，或者想以某种方式更改默认行为时，您可以为这些事件提供自己的实现。


    接下来，让我们看看作为应用程序生命周期一部分的事件序列。

    '
- fmt: '### The Application Life Cycle


    Once you have started your application, usually by tapping the icon on the screen,
    a sequence of events is started that should display your application on the mobile
    device (you can see this in the application lifecycle diagram in [Figure 4–1](#Chapter04.html#fig_4_1)).
    This is known as the application''s *life cycle*.


    We touched on some of the key functions involved in this life cycle when writing
    our Hello, World application in [Chapter 2](#Chapter02.html#ch2). After the `main()`
    function has been invoked, `UIApplicationMain()` is executed, and it won''t return
    until your application exits. This class creates the application object and ensures
    the application delegate is instantiated, and then it looks to load the main `.nib`
    file that defines the application''s main window.


    The application knows which main `.nib` file to load by looking in the information
    property list file, `Info.plist`. This file contains a number of key/value pairs
    held in an XML file, each used to denote a configurable parameter. If you were
    to open `Info.plist` using Xcode, you would see something like the screen shown
    in [Figure 4–2](#Chapter04.html#fig_4_2).


    ![images](images/0402.jpg)


    **Figure 4–2.** *Info.plist values*


    You can clearly see that the "Main nib file base name" entry is defined as `MainWindow`.
    So, if we look in our directory, we will see a file called `MainWindow.xib`, which
    is the main window resource file loaded by default. You could change this, but
    there is rarely a need to do so.


    Loading the resource file will create classes for any objects that are contained
    within it and assign their associated properties by deserializing their values
    held in the resource file. The `.xib` file is essentially a serialized (saved-to-disk)
    version of your main window, user interfaces, and objects, which can be reconstituted
    (deserialized) at any time (much like adding water to dried noodles).


    **NOTE:** You can use the `Info.plist` file to store your own application configuration
    values. Just add your values, either through the user-friendly Xcode editor or
    some other file editor.


    After your main application is running, it is looked after by the application
    delegate, which uses *delegation* to overcome some of the complexities introduced
    by subclassing. This typically involves creating a new class that inherits from
    a parent class, and then maybe overriding methods provided within its parent.
    Our application delegate implements the `UIApplicationDelegate` *protocol*, which
    in C# terms, is the same as implementing an *interface*. Instead of a hierarchy
    of objects with inherited methods and overridden methods, we simply implement
    the methods specifically identified in the interfaces.


    The final stage of the application launch process will see it entering the *active*
    state—one of many states the application will take on. This is indicated by the
    `applicationDidBecomeActive` method.


    The application life cycle has a series of *states* that are defined by the iOS
    SDK, and you can manage your application''s behavior based on its state. Let''s
    take a look at the different application states that exist and how you should
    manage them.


    ### Managing Application States


    A key job of the application delegate is to manage the different state transitions
    the application goes through while it is running. Two new application states were
    introduced in iOS 4.0: the application can be running in the background or suspended.


    Any state transitions require a response from your application as confirmation
    it is behaving correctly. For example, if the application state were set to the
    background by starting a new application, then it would make sense to stop updating
    its user interface.


    When the application state changes, you respond accordingly using the method called
    within the application delegate. It is also worth noting that an application may
    be launched not as a direct result of the user asking it to, but through an indirect
    request. For example, your application might be invoked to deal with a push notification.


    In all of these cases, the `didFinishLaunchingWithOptions` method is called with
    options providing a reason why it was invoked, and in some cases, such as due
    to a push notification, the payload of data relating to it.


    All the states supported in iOS 4.0 and above are shown in [Table 4-3](#Chapter04.html#tab_4_3).


    ![images](images/t0403.jpg)


    An application doesn''t just move from one state to another without sometimes
    going through transitory states. For example, if an application is interrupted
    because of an incoming phone call, the application will be told it''s about to
    become inactive by calling the `applicationWillResignActive` method. This is your
    opportunity to prepare your application for being sent to the background. If you
    answered the phone call, the application would be sent to the background with
    the `applicationDidEnterBackground` method called. However, if you decided to
    ignore the call, the application would resume foreground focus and fire the `applicationDidBecomeActive`
    method again for you to handle accordingly. The same is true of an application
    that was previously running in the background and is sent to the foreground. In
    that case, the `applicationWillEnterForeground` method is called prior to moving
    to the foreground, and the `applicationDidBecomeActive` method is called when
    the application enters the foreground. These states are shown in [Figure 4–3](#Chapter04.html#fig_4_3).


    ![images](images/0403.jpg)


    **Figure 4–3.** *Application state diagram*


    ### Managing an Application''s Behaviors


    As you''ve seen, an application will typically spend time moving between different
    states, especially given typical usage. For example, it is common for a user to
    move between applications, checking email one minute, taking a telephone call
    the next, and surfing the Web after that. We''ve looked at handing state changes
    and the way the iOS SDK cleverly uses the Objective-C technique of delegation
    to have a method called, enabling you to provide your own implementation.


    Clearly, how your application reacts to these state changes very much depends
    on your application, as each is different. But there are some application tasks
    that are the same for all applications. In this section, we''ll take a brief look
    at these tasks, which will allow you to get started.


    #### Dealing with Orientation Changes


    Apple''s mobile devices have mercury switches that understand the orientation
    of the device and so your application. Most iOS applications launch in portrait
    mode initially, and then will rotate your application to match the device''s orientation;
    some will start in landscape mode if it makes sense for them to do so. It might
    not be appropriate for your application to work in different orientations, and
    it is up to you to manage this. For example, watching movies might suit only landscape
    orientation.


    Before you start panicking and wondering how on earth you''re going write all
    that inevitably complex code to rotate your application, stop! Thankfully *autorotation*,
    as it''s called, is conveniently handled through a combination of the iOS and
    the UIKit framework—assuming you want your application to rotate. The iOS SDK
    supports autorotation through a method, which defines if the device has been rotated
    and whether your application should support it, and also through the Interface
    Builder, where you can define how the view manages the orientation of your user
    interface. We''ll look further into this subject later in the book.'
