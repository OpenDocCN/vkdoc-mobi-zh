  trans: '

    #### 注册你的设备


    接下来，你需要注册你的移动设备以进行开发。同样，这可以通过配置门户完成。首先，你需要获取设备的唯一 ID。你可以使用 Xcode 4“管理器”中的“设备”部分来获取此
    ID。将设备连接到电脑后，启动 Xcode 4，它会自动带你进入此页面，并显示你需要的唯一 ID。你可以在图 9-13 中看到这一点。


    ![images](img/0913.jpg)


    **图 9-13.** *使用 Xcode 的 Organizer 获取设备的唯一 ID*


    记下这个设备 ID，然后返回配置门户的“设备”页面。在这里你可以点击图 9-14 中显示的“添加设备”按钮，为设备输入一个名称（可以是任意名称），并输入从
    Xcode 屏幕获取的唯一 ID。完成此页面后，你的设备将在配置门户中注册成功。


    ![images](img/0914.jpg)


    **图 9-14.** *注册设备*


    你可能注意到 Xcode 管理器屏幕上的“用于开发”按钮，它提示你可以使用该设备进行开发。Xcode 能够一键为你创建、下载并安装开发者证书、分发证书以及基本的开发者配置文件（也称为团队配置文件）。


    因此，返回管理器屏幕，选择此按钮并按照屏幕上的简单说明操作（这些说明仅在某些阶段提示你输入密码）。完成后，你的设备将在 Xcode 中注册用于开发。


    #### 使用配置门户入门


    配置门户还提供了一个“启动助手”，帮助你安装必要的证书并创建所需的配置文件，使你能够开始构建应用程序。它非常直观，可以从配置门户的主页访问，但为了完整起见并解释一些要点，我将带你逐步操作。首先，在配置门户中选择“主页”，然后选择“开发配置助手”。你将看到图
    9-15 所示的屏幕，在这里你需要创建一个 App ID。


    ![images](img/0915.jpg)


    **图 9-15.** *创建 App ID*


    第一步是创建一个 App ID，这是与应用程序关联的唯一标识。你可以选择在此处手动创建 App ID，或者从列表中选择通配符选项，它会自动为你部署的任何应用选择一个
    App ID。除非你特别想将单个 App ID 与多个应用关联，否则我建议你选择此选项。


    点击“继续”将进入下一阶段，如图 9-16 所示。


    ![images](img/0916.jpg)


    **图 9-16.** *选择 Apple 设备*


    此阶段涉及选择你希望使用的设备。由于我已经注册了我的设备，它会出现在“使用现有的 Apple 设备”列表中。如果这是你唯一注册的设备，它会自动被选中。因此保持原样，然后继续点击“继续”按钮。


    图 9-17 中的开发证书屏幕将打开。


    ![images](img/0917.jpg)


    **图 9-17.** *选择开发证书*


    此步骤涉及选择你的 iOS 开发证书，该证书应该已经从前面的步骤中存在。保持此屏幕，选择现有的开发证书，然后再次点击“继续”按钮。接下来将显示配置文件页面，见图
    9-18。


    ![images](img/0918.jpg)


    **图 9-18.** *配置文件页面*


    配置文件是在命名配置文件下收集的数据集合，是在你的设备上安装应用程序所必需的。在此屏幕上，为你的配置文件命名，其余内容将自动填充。然后选择“生成”按钮，系统将生成配置文件。完成后，你将看到类似图
    9-19 的屏幕。


    ![images](img/0919.jpg)


    **图 9-19.** *配置文件已生成*


    然后你可以继续。你将看到如何安装配置文件的说明，如图 9-20 所示。


    ![images](img/0920.jpg)


    **图 9-20.** *安装你的配置文件*


    按照这些说明操作，你的配置文件将被安装。最后，通过查看 Xcode 的 Organizer 确认配置文件是否存在，从而检查安装是否完成。根据 Xcode 已完成的工作，它应该已经存在。


    #### 构建并部署你的应用程序


    至此，你已经完成了所有准备工作。现在让我们构建一个应用程序并将其部署到你的设备上。在 Xcode 中打开一个你想要部署的应用程序。我最初创建了 Hello
    World 程序，而你的情况则是你想部署的应用程序。在 Xcode 中，你需要做的主要事情是对应用程序进行签名。还记得你为了创建证书和配置文件所经历的所有步骤吗？


    因此，打开你的应用程序，在主窗格中选择“构建设置”（参见图 9-21）。在“代码签名”部分，选择合适的配置文件；鉴于我仍在开发阶段，我选择了开发配置文件，但如果你目标是
    App Store 或 Adhoc 分发（稍后会详细介绍），则应选择相应的配置文件。


    ![images](img/0921.jpg)


    **图 9-21.** *在 Xcode 中对应用程序进行签名*


    此时，在构建应用程序之前，请检查“摘要”下的应用程序标识符是否正确。这标识了设备上的应用程序。在图 9-22 中，你可以看到我添加了一个包含我的域名和应用程序标题的标识符。


    ![images](img/0922.jpg)


    **图 9-22.** *添加你的应用程序标识符*


    现在继续构建你的应用程序，确保 Xcode 中的目标方案是针对你的目标设备，而不是停留在模拟器上。同时检查你的应用程序图标是否作为`icon.png`文件包含在内，并且该文件名是否通过“信息”选项卡下的“图标文件”设置包含在你的`info.plist`文件中。当你开始构建应用程序时，系统会提示你接受使用
    Keychain 证书对应用程序进行签名的请求。接受此请求，让构建完成并让应用程序签名生效。现在你已经构建了一个应用程序，并准备好进行部署。


    要将应用程序部署到设备上，请打开 Xcode 的 Organizer，并在左侧窗格中选择你的设备；你会注意到有一个“应用程序”选项。你可以在图 9-23 中看到这一点以及已安装的应用程序。


    ![images](img/0923.jpg)


    **图 9-23.** *Xcode 的 Organizer 显示设备和应用程序*


    在“应用程序”窗格的底部，你会注意到两个选项：“添加”和“删除”。这些允许你在设备上添加或删除应用程序。选择“添加”。在要求你定位要添加的应用程序的对话框中，将其指向你刚刚在
    Xcode 中构建的 Hello World 应用程序二进制文件。或者，你也可以将可执行文件拖放到此页面上。无论哪种方式，这都会将应用程序安装到你的设备上。完成后查看你的移动设备，你应该会看到应用程序就在那里，准备进行测试！


    现在你已经成功构建并部署了你的第一个 Apple 移动设备应用程序。你可以用它进行一些真实世界的测试，如果对结果满意，就可以进入下一阶段，即部署到 App
    Store 或通过另一种称为 Adhoc 分发的机制进行部署。

    '
- fmt: '### Publishing Your Application


    Once you’ve tested your application on your local device, you are ready to publish
    it to other devices. Here you have two options: Adhoc deployment or deployment
    via the App Store. The first thing to note is you’ll need Provisioning Profiles
    for each, and these are easily set up through the Provisioning Profile page, as
    shown in [Figure 9–24](#Chapter09.html#fig_9_24).


    ![images](images/0924.jpg)


    **Figure 9–24.** *Distribution profiles on the Provisioning Profile page*


    As you can see, I’ve created one distribution profile for both Adhoc and App Store
    deployment. I’ll use these later in Xcode.


    #### Publishing via the Adhoc Mechanism


    The Adhoc mechanism allows you to distribute your application to up to 100 other
    iPad, iPhone, or iPod Touch users using e-mail or the Internet as a distribution
    mechanism. From there the user can download and install the application.


    The first thing to note is that your application must be built against a profile
    that is configured for Adhoc deployment. You do this through the Provisioning
    Profile page. In the Build configuration for your application under Code Signing,
    choose the Adhoc profile for your build and build the application as before.


    Once built, you will need to distribute both the application (usually archived)
    and the Adhoc Distribution profile (`.mobileprovision` file) to allow the other
    users to install it.


    The installing user drags these onto the `Applications` folder in iTunes. If the
    application has been archived, they will need to unarchive the file to leave the
    `.app` binary, and drag this across.


    The application can then be synced as normal with the device using the iTunes
    sync feature. The application should be then ready to run on the device.


    #### Publishing via the App Store


    To publish your application to the App Store, you have to follow a similar routine
    in that your application must be built and signed against an App Store Provisioning
    Profile. To do this, you follow the same instructions and change your build settings
    in Xcode to sign your application on compilation but in this instance, choose
    the App Store Provisioning Profile.


    Once built, you’re ready to submit your application to the App Store. To do this,
    go to the Member Center from the Apple Developer page. On the home page, just
    beneath the Provisioning Portal link, you will see a link to iTunes Connect. If
    you wish to jump straight there, navigate to [`https://itunesconnect.apple.com`](https://itunesconnect.apple.com)
    in your favorite browser.


    **But wait!**


    ##### Preparing for Your App Store Submission


    Just before you submit your application, to ensure the best possible chances of
    a successful acceptance, I recommend you review the App Store Review Guidelines
    for iOS just one last time. It’s not a small resource, but Apple reserves the
    right to refuse any application that doesn’t comply. You can find a copy at [`https://developer.apple.com/appstore/resources/approval/guidelines.html`](https://developer.apple.com/appstore/resources/approval/guidelines.html)
    or via the Member Center. In fact, there is a very good resource center that provides
    all manner of information to help you submit your application to the App Store,
    which can be found at [`https://developer.apple.com/appstore/`](https://developer.apple.com/appstore/).


    In addition to your application binary, you will need to complete information
    for a number of attributes that accompany your application. You might as well
    get these ready, because you’re going to need them. They are:


    * Application name

    * Application description

    * Primary and secondary category

    * Subcategories

    * Copyright

    * App rating

    * Keywords

    * SKU number

    * Application URL

    * Screenshots

    * Support URL

    * Support e-mail address

    * End user license agreement

    * Pricing, available date, territories

    * OS binaries: Includes 57px and an optional 114px hi-res icon for iPhone and
    iPod touch or a 50px and 72px icon for iPad using iTunes Connect


    iTunes Connect is a suite of web-based tools created for you to submit and manage
    apps via the App Store. In iTunes Connect you will be able to check the status
    of your contracts, manage iTunes Connect and test users, obtain sales and finance
    reports, view app crash logs, request promotional codes, and much more.


    It’s a pretty comprehensive suite so I’m not going to cover the whole suite in
    fine detail. There is a very good developer guide that does that for you at [`https://itunesconnect.apple.com/docs/iTunesConnect_DeveloperGuide.pdf`](https://itunesconnect.apple.com/docs/iTunesConnect_DeveloperGuide.pdf).


    However, I will take you through the basics of submitting an application to the
    App Store, assuming that you’ve already completed all of the preparatory work
    mentioned earlier.


    So, once again, visit [`https://itunesconnect.apple.com`](https://itunesconnect.apple.com)
    and log in. Once you’ve done this, you will be presented with the iTunes Connect
    Home Page, as shown in [Figure 9–25](#Chapter09.html#fig_9_25).


    ![images](images/0925.jpg)


    **Figure 9–25.** *iTunes Connect home page*


    Once you’re at the home page, choose the Manage Your Applications link. This allows
    you to manage your applications within the App Store and add new applications.
    The first time you enter this page, the list will be empty. That’s because you
    haven’t uploaded any apps yet. You can see this in [Figure 9–26](#Chapter09.html#fig_9_26).


    ![images](images/0926.jpg)


    **Figure 9–26.** *Empty Application list*


    Choose the Add New App button. This will prompt you to enter information relating
    to your application. Be warned; they require a lot of information, hence my recommendation
    for you to get it ready before you commence your upload.


    I’m not going to list all the fields and their meanings. There are many, and as
    mentioned, the iTunes Connect Developer Guide does a great job of describing this
    information and its purpose.


    Once you’ve entered the information required, you will be asked to upload some
    binaries. These include the various images to accompany your application, including
    icons for the application and screenshots. Once all of this information is entered
    and the image resources are uploaded, you will be taken to the App Summary page.
    On this page are additional buttons to the right of the page that allow you to
    manage further information about your app, such as localization and pricing.'
