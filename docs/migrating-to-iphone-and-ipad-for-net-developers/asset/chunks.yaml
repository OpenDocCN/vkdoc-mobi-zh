- fmt: "##### Table View\n\nThe table view element, implemented through the `UITableView`\
    \ class, is used as its name suggests, to present data in tabular format (rows\
    \ and columns of information). An example is shown in [Figure 6–39](#Chapter06.html#fig_6_39).\n\
    \n![images](images/0639.jpg)\n\n**Figure 6–39.** *Table view*\n\nThe table view\
    \ control is highly configurable and used extensively in many iPhone applications.\
    \ For example, the Contacts List is a table view implementation, as is the Language\
    \ selection screen when choosing your device's international settings. Such diverse\
    \ examples show the flexibility of the control. Remember the table view, because\
    \ you'll use it to display your Lunar Lander game's High Score table.\n\nThe `DataView`\
    \ control, when bound to a data source, provides similar functionality in the\
    \ .NET framework. In the Windows Presentation Foundation, the `DataView` control\
    \ has been replaced with a table view capability that offers similar functionality\
    \ to the iOS table view element.\n\n##### Text View\n\nThe text view control,\
    \ implemented by the `UITextView` class, is used to present and allow the input\
    \ of several lines of text in your application. An example is shown in [Figure\
    \ 6–40](#Chapter06.html#fig_6_40).\n\n![images](images/0640.jpg)\n\n**Figure 6–40.**\
    \ *Text view*\n\nThe equivalent in the .NET framework is the `TextBox` control.\n\
    \n##### Web View\n\nThe web view control, implemented by the `UIWebView` class,\
    \ allows your application to display rich HTML content. It isn't recommended that\
    \ you create an iOS application that behaves like a web page—that's what the Safari\
    \ browser is for—but if you need to wrap a web page of any description in your\
    \ iOS application, this is the control to use. An example loading the [`www.bbc.co.uk`](http://www.bbc.co.uk)\
    \ home page is shown in [Figure 6–41](#Chapter06.html#fig_6_41).\n\nThis example\
    \ can be easily created using a view-based template in Xcode 4 and adding a web\
    \ view control along with an associated property. You then simply add the code\
    \ snippet in [Listing 6-4](#Chapter06.html#list_6_4) to the `viewDidLoad` event\
    \ for the view that loads the home page using the `loadRequest` WebView message.\
    \ As you can see, the web view control is acting as a wrapper to the existing\
    \ web-based content, in this case the BBC's home page.\n\n![images](images/0641.jpg)\n\
    \n**Figure 6–41.** *A web view example showing the BBC home page*\n\n**Listing\
    \ 6-4.** *Web View Example*\n\n```\n// Load the WWW.BBC.CO.UK homepage within\
    \ the WebView\nNSString *urlString = @\"http://www.bbc.co.uk\";\n[wvBrowser loadRequest:[NSURLRequest\
    \ requestWithURL:[NSURL URLWithString:urlString]]];\n```\n\nThe equivalent in\
    \ the .NET framework is the `WebBrowser` class, using the `Navigate()` method\
    \ as an equivalent `loadRequest` message.\n\n#### Other Elements\n\nAlthough the\
    \ last few pages have introduced quite a few UI elements, there are still more\
    \ left for you to discover. However, I didn't want to leave a few other useful\
    \ UI elements untouched, specifically alerts and action sheets.\n\n##### Alerts\n\
    \nAlerts are designed to provide important information to the user of your application.\
    \ When invoked, the alert presents a pop-up window over your existing views, and\
    \ you cannot continue with your application until it is closed.\n\nIn .NET it\
    \ is very similar to a `MessageBox`, invoked by a method of the same name. In\
    \ iOS, you use the `UIAlertView` class to implement an alert and to display the\
    \ short alerting text along with one or two buttons.\n\nAn alert is typically\
    \ used to inform the user that something of significance has happened and may\
    \ not be associated with their most recent actions. For example, if you kicked\
    \ off a background task as part of your application and then moved on to do something\
    \ else, you could use an alert to signify its completion. An example is shown\
    \ in [Figure 6–42](#Chapter06.html#fig_6_42).\n\n![images](images/0642.jpg)\n\n\
    **Figure 6–42.** *Alert view example*\n\nYou can easily create this alert view\
    \ example using the code snippet in [Listing 6-5](#Chapter06.html#list_6_5). The\
    \ parameters are pretty self-explanatory.\n\n**Listing 6-5.** *Alert View Example*\n\
    \n```\nUIAlertView *alert = [[ UIAlertView alloc]\n                      initWithTitle:\
    \ @\"Important Fact\"\n                      message: @\"Something important has\
    \ happened\"\n                      delegate: nil\n                      cancelButtonTitle\
    \ :@\"OK\"\n                      otherButtonTitles: nil];\n[alert show];\n[alert\
    \ release];\n```\n\n##### Action Sheets\n\nThe final UI element introduced here\
    \ is the action sheet, implemented by the `UIActionSheet` class and providing\
    \ a mechanism for presenting a set of choices in relation to a particular user\
    \ action. For example, the Safari browser provides an action button that, when\
    \ chosen, presents a number of choices based on the web page being displayed—for\
    \ example, you can add it as a bookmark, make it your home screen, and so on.\
    \ This window with multiple choices is called an *alert sheet* and is shown in\
    \ [Figure 6–43](#Chapter06.html#fig_6_43).\n\n![images](images/0643.jpg)\n\n**Figure\
    \ 6–43.** *Alert sheet example*\n\nOn the iPhone, the alert sheet appears from\
    \ the bottom of the screen, and on the iPad it appears as a popover. There is\
    \ no direct equivalent in .NET, although you could argue that a `ContextMenu`\
    \ provides similar functionality.\n\n### Apple's User Interface Resources\n\n\
    Apple provides a number of resources that are essential reading when designing\
    \ your own user interface. Some of these are listed here:\n\n*   *iOS Human Interface\
    \ Guidelines:* Provides guidelines and describes principles for designing that\
    \ superlative user experience. [`http://developer.apple.com/library/ios/#documentation/userexperience/conceptual/mobilehig/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#documentation/userexperience/conceptual/mobilehig/Introduction/Introduction.html).\n\
    *   *View Controller Programming Guide for iOS:* Provides guidance about structuring\
    \ and managing your application's user interface. `http://developer.apple.com/library/ios/#featuredarticles/ViewControllerPGforiPhoneOS/Introduction/Introduction.html`.\n\
    *   *View Programming Guide for iOS:* Provides guidance for presenting and animating\
    \ your user interface. [`http://developer.apple.com/library/ios/#documentation/WindowsViews/Conceptual/ViewPG_iPhoneOS/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#documentation/WindowsViews/Conceptual/ViewPG_iPhoneOS/Introduction/Introduction.html).\n\
    *   *Drawing and Printing Guide for iOS:* Provides guidance on drawing custom\
    \ content and printing information. [`http://developer.apple.com/library/ios/#documentation/iPhone/Conceptual/iPhoneOSProgrammingGuide/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#documentation/iPhone/Conceptual/iPhoneOSProgrammingGuide/Introduction/Introduction.html)."
  raw: '##### Table View


    The table view element, implemented through the `UITableView` class, is used as
    its name suggests, to present data in tabular format (rows and columns of information).
    An example is shown in [Figure 6–39](#Chapter06.html#fig_6_39).


    ![images](images/0639.jpg)


    **Figure 6–39.** *Table view*


    The table view control is highly configurable and used extensively in many iPhone
    applications. For example, the Contacts List is a table view implementation, as
    is the Language selection screen when choosing your device''s international settings.
    Such diverse examples show the flexibility of the control. Remember the table
    view, because you''ll use it to display your Lunar Lander game''s High Score table.


    The DataView control, when bound to a data source, provides similar functionality
    in the .NET framework. In the Windows Presentation Foundation, the DataView control
    has been replaced with a table view capability that offers similar functionality
    to the iOS table view element.


    ##### Text View


    The text view control, implemented by the `UITextView` class, is used to present
    and allow the input of several lines of text in your application. An example is
    shown in [Figure 6–40](#Chapter06.html#fig_6_40).


    ![images](images/0640.jpg)


    **Figure 6–40.** *Text view*


    The equivalent in the .NET framework is the TextBox control.


    ##### Web View


    The web view control, implemented by the `UIWebView` class, allows your application
    to display rich HTML content. It isn''t recommended that you create an iOS application
    that behaves like a web page—that''s what the Safari browser is for—but if you
    need to wrap a web page of any description in your iOS application, this is the
    control to use. An example loading the [`www.bbc.co.uk`](http://www.bbc.co.uk)
    home page is shown in [Figure 6–41](#Chapter06.html#fig_6_41).


    This example can be easily created using a view-based template in Xcode 4 and
    adding a web view control along with an associated property. You then simply add
    the code snippet in [Listing 6-4](#Chapter06.html#list_6_4) to the `viewDidLoad`
    event for the view that loads the home page using the `loadRequest` WebView message.
    As you can see, the web view control is acting as a wrapper to the existing web-based
    content, in this case the BBC''s home page.


    ![images](images/0641.jpg)


    **Figure 6–41.** *A web view example showing the BBC home page*


    **Listing 6-4.** *Web View Example*


    `// Load the WWW.BBC.CO.UK homepage within the WebView`

    `NSString *urlString = @"http://www.bbc.co.uk";`

    `[wvBrowser loadRequest:[NSURLRequest requestWithURL:[NSURL URLWithString:urlString]]];`


    The equivalent in the .NET framework is the `WebBrowser` class, using the `Navigate()`
    method as an equivalent `loadRequest` message.


    #### Other Elements


    Although the last few pages have introduced quite a few UI elements, there are
    still more left for you to discover. However, I didn''t want to leave a few other
    useful UI elements untouched, specifically alerts and action sheets.


    ##### Alerts


    Alerts are designed to provide important information to the user of your application.
    When invoked, the alert presents a pop-up window over your existing views, and
    you cannot continue with your application until it is closed.


    In .NET it is very similar to a MessageBox, invoked by a method of the same name.
    In iOS, you use the `UIAlertView` class to implement an alert and to display the
    short alerting text along with one or two buttons.


    An alert is typically used to inform the user that something of significance has
    happened and may not be associated with their most recent actions. For example,
    if you kicked off a background task as part of your application and then moved
    on to do something else, you could use an alert to signify its completion. An
    example is shown in [Figure 6–42](#Chapter06.html#fig_6_42).


    ![images](images/0642.jpg)


    **Figure 6–42.** *Alert view example*


    You can easily create this alert view example using the code snippet in [Listing
    6-5](#Chapter06.html#list_6_5). The parameters are pretty self-explanatory.


    **Listing 6-5.** *Alert View Example*


    `UIAlertView *alert = [[ UIAlertView alloc]`

    `                      initWithTitle: @"Important Fact"`

    `                      message: @"Something important has happened"`

    `                      delegate: nil`

    `                      cancelButtonTitle :@"OK"`

    `                      otherButtonTitles: nil];`

    `[alert show];`

    `[alert release];`


    ##### Action Sheets


    The final UI element introduced here is the action sheet, implemented by the `UIActionSheet`
    class and providing a mechanism for presenting a set of choices in relation to
    a particular user action. For example, the Safari browser provides an action button
    that, when chosen, presents a number of choices based on the web page being displayed—for
    example, you can add it as a bookmark, make it your home screen, and so on. This
    window with multiple choices is called an *alert sheet* and is shown in [Figure
    6–43](#Chapter06.html#fig_6_43).


    ![images](images/0643.jpg)


    **Figure 6–43.** *Alert sheet example*


    On the iPhone, the alert sheet appears from the bottom of the screen, and on the
    iPad it appears as a popover. There is no direct equivalent in .NET, although
    you could argue that a `ContextMenu` provides similar functionality.


    ### Apple''s User Interface Resources


    Apple provides a number of resources that are essential reading when designing
    your own user interface. Some of these are listed here:


    *   *iOS Human Interface Guidelines:* Provides guidelines and describes principles
    for designing that superlative user experience. [`http://developer.apple.com/library/ios/#documentation/userexperience/conceptual/mobilehig/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#documentation/userexperience/conceptual/mobilehig/Introduction/Introduction.html).

    *   *View Controller Programming Guide for iOS:* Provides guidance about structuring
    and managing your application''s user interface. http://developer.apple.com/library/ios/#featuredarticles/ViewControllerPGforiPhoneOS/Introduction/Introduction.html.

    *   *View Programming Guide for iOS:* Provides guidance for presenting and animating
    your user interface. [`http://developer.apple.com/library/ios/#documentation/WindowsViews/Conceptual/ViewPG_iPhoneOS/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#documentation/WindowsViews/Conceptual/ViewPG_iPhoneOS/Introduction/Introduction.html).

    *   *Drawing and Printing Guide for iOS:* Provides guidance on drawing custom
    content and printing information. [`http://developer.apple.com/library/ios/#documentation/iPhone/Conceptual/iPhoneOSProgrammingGuide/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#documentation/iPhone/Conceptual/iPhoneOSProgrammingGuide/Introduction/Introduction.html).'
  trans: "\n##### 表格视图\n\n表格视图元素通过 `UITableView` 类实现，顾名思义，用于以表格格式（行和列的信息）呈现数据。示例如\
    \ 图 6-39 所示。\n\n![images](img/0639.jpg)\n\n**图 6-39.** *表格视图*\n\n表格视图控件具有高度可配置性，并在许多\
    \ iPhone 应用程序中广泛使用。例如，通讯录列表就是一个表格视图的实现，同样还有在选择设备国际设置时的语言选择屏幕。这些多样化的示例展示了该控件的灵活性。请记住表格视图，因为你将用它来显示你的《月球着陆器》游戏的高分表。\n\
    \n`DataView` 控件在绑定到数据源时，在 .NET 框架中提供了类似的功能。在 Windows Presentation Foundation 中，`DataView`\
    \ 控件已被表格视图功能取代，该功能提供了与 iOS 表格视图元素类似的功能。\n\n##### 文本视图\n\n文本视图控件通过 `UITextView`\
    \ 类实现，用于在你的应用程序中呈现并允许输入多行文本。示例如 图 6-40 所示。\n\n![images](img/0640.jpg)\n\n**图 6-40.**\
    \ *文本视图*\n\n在 .NET 框架中的等效控件是 `TextBox`。\n\n##### 网页视图\n\n网页视图控件通过 `UIWebView`\
    \ 类实现，允许你的应用程序显示丰富的 HTML 内容。不建议你创建一个行为类似于网页的 iOS 应用程序——那是 Safari 浏览器的用途——但如果需要在\
    \ iOS 应用程序中包装任何类型的网页，这就是要使用的控件。加载 [`www.bbc.co.uk`](http://www.bbc.co.uk) 主页的示例如\
    \ 图 6-41 所示。\n\n这个示例可以很容易地通过在 Xcode 4 中使用基于视图的模板，并添加一个网页视图控件及其关联属性来创建。然后，你只需将\
    \ 代码清单 6-4 中的代码片段添加到加载主页的视图的 `viewDidLoad` 事件中，该事件使用 `loadRequest` WebView 消息。如你所见，网页视图控件充当了现有网页内容的包装器，在本例中是\
    \ BBC 的主页。\n\n![images](img/0641.jpg)\n\n**图 6-41.** *显示 BBC 主页的网页视图示例*\n\n**代码清单\
    \ 6-4.** *网页视图示例*\n\n```\n// 在 WebView 中加载 WWW.BBC.CO.UK 主页\nNSString *urlString\
    \ = @\"http://www.bbc.co.uk\";\n[wvBrowser loadRequest:[NSURLRequest requestWithURL:[NSURL\
    \ URLWithString:urlString]]];\n```\n\n在 .NET 框架中的等效控件是 `WebBrowser` 类，使用 `Navigate()`\
    \ 方法作为等效的 `loadRequest` 消息。\n\n#### 其他元素\n\n尽管前几页介绍了相当多的 UI 元素，但仍有更多元素等待你去发现。然而，我不想忽略其他一些有用的\
    \ UI 元素，特别是警告框和操作表。\n\n##### 警告框\n\n警告框旨在为你的应用程序用户提供重要信息。调用时，警告框会在现有视图上弹出一个弹出窗口，只有关闭它才能继续使用你的应用程序。\n\
    \n在 .NET 中，它非常类似于 `MessageBox`，通过同名方法调用。在 iOS 中，你使用 `UIAlertView` 类来实现警告框，并显示简短的警告文本以及一两个按钮。\n\
    \n警告框通常用于通知用户发生了某些重要事件，这些事件可能与他们的近期操作无关。例如，如果你在应用程序中启动了一个后台任务然后去做别的事情，你可以使用警告框来通知任务完成。示例如\
    \ 图 6-42 所示。\n\n![images](img/0642.jpg)\n\n**图 6-42.** *警告框视图示例*\n\n你可以使用 代码清单\
    \ 6-5 中的代码片段轻松创建这个警告框视图示例。这些参数的含义不言自明。\n\n**代码清单 6-5.** *警告框视图示例*\n\n```\nUIAlertView\
    \ *alert = [[ UIAlertView alloc]\n                      initWithTitle: @\"重要事实\"\
    \n                      message: @\"发生了重要的事情\"\n                      delegate:\
    \ nil\n                      cancelButtonTitle :@\"确定\"\n                    \
    \  otherButtonTitles: nil];\n[alert show];\n[alert release];\n```\n\n##### 操作表\n\
    \n这里介绍的最后一个 UI 元素是操作表，通过 `UIActionSheet` 类实现，提供了一种根据特定用户操作呈现一组选项的机制。例如，Safari\
    \ 浏览器提供一个操作按钮，选择后会根据当前显示的网页呈现多个选项——例如，你可以将其添加为书签、设为主屏幕等。这个包含多个选项的窗口称为*操作表*，如 图\
    \ 6-43 所示。\n\n![images](img/0643.jpg)\n\n**图 6-43.** *操作表示例*\n\n在 iPhone 上，操作表从屏幕底部出现，而在\
    \ iPad 上则显示为弹出窗口。在 .NET 中没有直接等效的控件，尽管你可以认为 `ContextMenu` 提供了类似的功能。\n\n### Apple\
    \ 的用户界面资源\n\nApple 提供了许多资源，这些资源在设计自己的用户界面时是必读的。以下列出其中一些：\n\n*   *iOS 人机界面指南：*\
    \ 提供设计卓越用户体验的指南和原则。 [`http://developer.apple.com/library/ios/#documentation/userexperience/conceptual/mobilehig/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#documentation/userexperience/conceptual/mobilehig/Introduction/Introduction.html)\n\
    *   *iOS 视图控制器编程指南：* 提供有关构建和管理应用程序用户界面的指导。 `http://developer.apple.com/library/ios/#featuredarticles/ViewControllerPGforiPhoneOS/Introduction/Introduction.html`\n\
    *   *iOS 视图编程指南：* 提供有关呈现和动画化用户界面的指导。 [`http://developer.apple.com/library/ios/#documentation/WindowsViews/Conceptual/ViewPG_iPhoneOS/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#documentation/WindowsViews/Conceptual/ViewPG_iPhoneOS/Introduction/Introduction.html)\n\
    *   *iOS 绘图和打印指南：* 提供有关绘制自定义内容和打印信息的指导。 [`http://developer.apple.com/library/ios/#documentation/iPhone/Conceptual/iPhoneOSProgrammingGuide/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#documentation/iPhone/Conceptual/iPhoneOSProgrammingGuide/Introduction/Introduction.html)\n"
- fmt: '### Summary


    This chapter started by taking a look at the different device types and their
    capabilities from a user interface perspective. You should always be cognizant
    of the device or devices to which you are targeting your application when designing
    its user interface.


    You then examined the different application types, and specifically the view controller
    and view combinations possible. You already looked at presenting single views,
    including one modal-based view, using the Lunar Lander example, but many other
    options exist. There are too many options to cover in a single chapter, so you
    looked at a tab bar example (which might be appropriate for your game) and then
    some of the other view controller types.


    After you saw the different view controllers and the mechanisms for managing the
    presentation of different views, you looked at the user interface elements available
    with which you can design your actual view. In the Lunar Lander game, you are
    painting a number of graphics in real time. But if you have developed .NET applications
    using Window Forms, or even ASP.NET, the use of UI controls to design your user
    interface will be familiar—and some of the iOS controls should be well-known to
    you. The chapter provided examples of how you might use some of the controls that
    are slightly more unusual.


    You should now be armed with enough knowledge to navigate view controllers, views,
    and user interface controls, and map your .NET knowledge onto the iOS equivalents
    where they exist. This chapter has reiterated a number of times the importance
    of the user experience when building an iOS mobile device application, and it''s
    no surprise that Apple provides numerous resources you can use to support the
    knowledge you''ve built so far, to help understand the examples in this chapter,
    and to provide a reference for your own exploration. Enjoy!


    ## Chapter 7: Get the Data: Storing and Retrieving Data and Configuring your Applications


    So far, we''ve covered a number of topics, all designed to introduce how to create
    iOS-based mobile applications running on iOS-based mobile devices, using the iOS
    SDK and supporting languages and tools. However, while we have walked through
    how to build an application, one key thing has been missing: the application''s
    ability to hold what is known as *state*.


    State can be thought of as the equivalent to a human''s memory. If we didn''t
    have a memory, doing the simplest of tasks would require us to discover how to
    do it every time. Since we do have a memory and can remember how to perform a
    particular action, doing it again is far easier, faster, and arguably enjoyable—skiing
    is a good example.


    Computers have memory in the form of volatile memory (RAM), which is lost when
    you switch off the computer, and a mobile device is no different. But if you want
    to persist state between application instances—that is, you want the application
    to remember where it left off—you''re going to need to store state somewhere else,
    like a hard disk.


    In this chapter, we''ll look at how you can store information as data either on
    your mobile device or other sources, and how you can use this data to configure
    your application. Specifically we''ll take a look at the following:


    - An overview of the options for storing data

    - Guidance on how to store information

    - Guidance on how to retrieve information

    - How to use data to configure your application between instances


    ### What Are Our Options for Storing Data?


    You may want to store various types of data, such as dynamic data that is entered
    by the application user, or parameterized data that the user does not influence
    but may want some flexibility in configuring (kind of like the Registry in Microsoft
    Windows). The following options are available for storing data:


    - Filesystem storage

    - Property lists

    - Internet storage

    - Database storage


    Let''s look at each of these options in turn.


    #### Using the Sandbox to Provide Filesystem-Based Storage


    In Chapter 4, we touched on the concept of the application''s sandbox. Recall
    that one of its primary purposes is to provide security mechanisms for both your
    application and your device. Let''s revisit the sandbox briefly, focusing on how
    it can help you store data.


    When your application is installed on a mobile device, by default, it establishes
    a number of folders that have constraints on how they are used. The Apple developer
    documentation provides some guidance on these folders, and it is important to
    understand the guidelines before you proceed to use any of these folders. The
    folders, their typical purpose, and relevant notes are listed in Table 7-1.


    ![images](images/t0701.jpg)

    ![images](images/t0701a.jpg)


    Even when using the simulator you can see these folders. Using Finder, you can
    navigate to this folder, as it exists on the simulator, by going to `\Library\Application
    Support\iPhone Simulator\4.3.2` (or whatever version of the simulator you are
    using) and look in the `Applications` folder. You will see folders with the application
    IDs we touched on in Chapter 4, with the structure shown in Table 7-1.


    **NOTE:** The folder names may change depending on what your application has specified
    it will use. Also, different SDKs will have their own folder roots.


    You can use the folders listed in Table 7-1 to store persistent data (or state)
    for your application, although you will need to take into account the constraints
    highlighted. Given it is a filesystem, you will need to store the data in one
    or more files, and your application must be able to interpret them.


    Although adding a simple file to act as your data store may seem like the easiest
    approach, the job of storing and retrieving the data you want from it may actually
    make your application''s data-handling code more complex than it needs to be.
    Therefore, it''s worth checking out the other options before you decide to use
    a simple file for all your application''s data storage needs. For example, you
    may want to investigate using the embedded database approach discussed later in
    this chapter if your data storage and retrieval needs are not that simple and
    require more than one file.'
  raw: '### Summary


    This chapter started by taking a look at the different device types and their
    capabilities from a user interface perspective. You should always be cognizant
    of the device or devices to which you are targeting your application when designing
    its user interface.


    You then examined the different application types, and specifically the view controller
    and view combinations possible. You already looked at presenting single views,
    including one modal-based view, using the Lunar Lander example, but many other
    options exist. There are too many options to cover in a single chapter, so you
    looked at a tab bar example (which might be appropriate for your game) and then
    some of the other view controller types.


    After you saw the different view controllers and the mechanisms for managing the
    presentation of different views, you looked at the user interface elements available
    with which you can design your actual view. In the Lunar Lander game, you are
    painting a number of graphics in real time. But if you have developed .NET applications
    using Window Forms, or even ASP.NET, the use of UI controls to design your user
    interface will be familiar—and some of the iOS controls should be well-known to
    you. The chapter provided examples of how you might use some of the controls that
    are slightly more unusual.


    You should now be armed with enough knowledge to navigate view controllers, views,
    and user interface controls, and map your .NET knowledge onto the iOS equivalents
    where they exist. This chapter has reiterated a number of times the importance
    of the user experience when building an iOS mobile device application, and it''s
    no surprise that Apple provides numerous resources you can use to support the
    knowledge you''ve built so far, to help understand the examples in this chapter,
    and to provide a reference for your own exploration. Enjoy!


    ## Chapter 7


    ## Get the Data: Storing and Retrieving Data and Configuring your Applications


    So far, we''ve covered a number of topics, all designed to introduce how to create
    iOS-based mobile applications running on iOS-based mobile devices, using the iOS
    SDK and supporting languages and tools. However, while we have walked through
    how to build an application, one key thing has been missing: the application''s
    ability to hold what is known as *state*.


    State can be thought of as the equivalent to a human''s memory. If we didn''t
    have a memory, doing the simplest of tasks would require us to discover how to
    do it every time. Since we do have a memory and can remember how to perform a
    particular action, doing it again is far easier, faster, and arguably enjoyable—skiing
    is a good example.


    Computers have memory in the form of volatile memory (RAM), which is lost when
    you switch off the computer, and a mobile device is no different. But if you want
    to persist state between application instances—that is, you want the application
    to remember where it left off—you''re going to need to store state somewhere else,
    like a hard disk.


    In this chapter, we''ll look at how you can store information as data either on
    your mobile device or other sources, and how you can use this data to configure
    your application. Specifically we''ll take a look at the following:


    *   An overview of the options for storing data

    *   Guidance on how to store information

    *   Guidance on how to retrieve information

    *   How to use data to configure your application between instances


    ### What Are Our Options for Storing Data?


    You may want to store various types of data, such as dynamic data that is entered
    by the application user, or parameterized data that the user does not influence
    but may want some flexibility in configuring (kind of like the Registry in Microsoft
    Windows). The following options are available for storing data:


    *   Filesystem storage

    *   Property lists

    *   Internet storage

    *   Database storage


    Let''s look at each of these options in turn.


    #### Using the Sandbox to Provide Filesystem-Based Storage


    In[Chapter 4](#Chapter04.html#ch4), we touched on the concept of the application''s
    sandbox. Recall that one of its primary purposes is to provide security mechanisms
    for both your application and your device. Let''s revisit the sandbox briefly,
    focusing on how it can help you store data.


    When your application is installed on a mobile device, by default, it establishes
    a number of folders that have constraints on how they are used. The Apple developer
    documentation provides some guidance on these folders, and it is important to
    understand the guidelines before you proceed to use any of these folders. The
    folders, their typical purpose, and relevant notes are listed in [Table 7-1](#Chapter07.html#tab_7_1).


    ![images](images/t0701.jpg)

    ![images](images/t0701a.jpg)


    Even when using the simulator you can see these folders. Using Finder, you can
    navigate to this folder, as it exists on the simulator, by going to `\Library\Application
    Support\iPhone Simulator\4.3.2` (or whatever version of the simulator you are
    using) and look in the `Applications` folder. You will see folders with the application
    IDs we touched on in [Chapter 4](#Chapter04.html#ch4), with the structure shown
    in [Table 7-1](#Chapter07.html#tab_7_1).


    **NOTE:** The folder names may change depending on what your application has specified
    it will use. Also, different SDKs will have their own folder roots.


    You can use the folders listed in [Table 7-1](#Chapter07.html#tab_7_1) to store
    persistent data (or state) for your application, although you will need to take
    into account the constraints highlighted. Given it is a filesystem, you will need
    to store the data in one or more files, and your application must be able to interpret
    them.


    Although adding a simple file to act as your data store may seem like the easiest
    approach, the job of storing and retrieving the data you want from it may actually
    make your application''s data-handling code more complex than it needs to be.
    Therefore, it''s worth checking out the other options before you decide to use
    a simple file for all your application''s data storage needs. For example, you
    may want to investigate using the embedded database approach discussed later in
    this chapter if your data storage and retrieval needs are not that simple and
    require more than one file.'
  trans: '好的，这是根据您的指示翻译的中文版本：



    ### 总结


    本章首先从用户界面的角度审视了不同的设备类型及其功能。在设计用户界面时，您应始终清楚目标应用程序所面向的设备。


    接着，您研究了不同的应用程序类型，特别是视图控制器和视图的可能组合。我们已经通过 Lunar Lander 示例查看了如何呈现单个视图，包括一个基于模态的视图，但还有许多其他选项可供选择。由于单个章节无法涵盖所有选项，因此我们查看了一个标签栏示例（这可能适用于您的游戏），然后是其他几种视图控制器类型。


    在了解了不同的视图控制器以及管理不同视图呈现的机制后，我们审视了可用于设计实际视图的用户界面元素。在 Lunar Lander 游戏中，您需要实时绘制大量图形。但如果您曾使用
    Windows Forms 甚至 ASP.NET 开发过 .NET 应用程序，那么使用 UI 控件设计用户界面的方式您应该不会陌生——而且其中一些 iOS
    控件对您来说应该也很熟悉。本章提供了一些关于如何使用一些稍微特殊的控件的示例。


    现在，您应该已经掌握了足够的知识来驾驭视图控制器、视图和用户界面控件，并将您的 .NET 知识映射到 iOS 对应的部分。本章多次强调了在构建 iOS 移动设备应用程序时用户体验的重要性，而且毫不意外的是，Apple
    提供了大量资源，您可以利用这些资源来巩固目前已建立的知识体系，帮助理解本章中的示例，并为您的自主探索提供参考。祝您愉快！


    ## 第 7 章：获取数据：存储和检索数据以及配置您的应用程序


    到目前为止，我们已经涵盖了许多主题，所有这些主题都旨在介绍如何使用 iOS SDK 以及支持的语言和工具，创建在基于 iOS 的移动设备上运行的应用程序。然而，虽然我们已经逐步演示了如何构建一个应用程序，但有一个关键部分始终缺失：应用程序保持所谓*状态*的能力。


    状态可以被视为相当于人类的记忆。如果我们没有记忆，那么完成最简单的任务也需要我们每次都重新发现如何去做。因为我们确实拥有记忆，并且能够记住如何执行特定操作，所以再次执行它会更容易、更快捷，甚至可以说更有趣——滑雪就是一个很好的例子。


    计算机拥有易失性存储器（RAM）形式的记忆，当您关闭计算机时，其中的内容就会丢失，移动设备也不例外。但是，如果您希望在应用程序实例之间持久化状态——也就是说，希望应用程序记住它上次运行到哪里——您需要将状态存储在其他地方，例如硬盘上。


    在本章中，我们将探讨如何将信息作为数据存储在您的移动设备或其他来源上，以及如何使用这些数据来配置您的应用程序。具体来说，我们将研究以下内容：


    -   数据存储方案的概述

    -   关于如何存储信息的指导

    -   关于如何检索信息的指导

    -   如何在应用程序实例之间使用数据来配置应用程序


    ### 我们有哪些数据存储方案？


    您可能希望存储各种类型的数据，例如应用程序用户输入的动态数据，或者用户无法影响但可能希望在配置上有一定灵活性的参数化数据（有点像 Microsoft Windows
    中的注册表）。以下方案可用于存储数据：


    -   文件系统存储

    -   属性列表

    -   网络存储

    -   数据库存储


    让我们依次看看这些方案。


    #### 使用沙盒提供基于文件系统的存储


    在第 4 章中，我们提到了应用程序沙盒的概念。回想一下，它的主要目的之一是为您的应用程序和设备提供安全机制。让我们简要地重新审视一下沙盒，重点关注它如何帮助您存储数据。


    当您的应用程序安装在移动设备上时，默认情况下，它会创建一些文件夹，这些文件夹对其使用方式有约束。Apple 开发者文档对这些文件夹提供了一些指导，在您开始使用任何这些文件夹之前，了解这些指导非常重要。这些文件夹、它们的主要用途以及相关说明列于表
    7-1 中。


    ![图片](img/t0701.jpg)

    ![图片](img/t0701a.jpg)


    即使在使用模拟器时，您也可以看到这些文件夹。使用 Finder，您可以导航到模拟器上存在的此文件夹，方法是转到 `\Library\Application
    Support\iPhone Simulator\4.3.2`（或您正在使用的模拟器版本），然后查看 `Applications` 文件夹。您会看到我们第
    4 章中提到的带有应用程序 ID 的文件夹，其结构如表 7-1 所示。


    **注意：** 文件夹名称可能会根据您的应用程序指定使用的内容而改变。此外，不同的 SDK 会有自己的文件夹根目录。


    您可以使用表 7-1 中列出的文件夹来存储应用程序的持久数据（或状态），尽管您需要考虑到所强调的那些约束。由于它是文件系统，您需要将数据存储在一个或多个文件中，并且您的应用程序必须能够解释这些文件。


    尽管添加一个简单的文件作为数据存储似乎是最简单的方法，但从文件中存储和检索所需数据的工作实际上可能会使应用程序的数据处理代码比需要的更复杂。因此，在决定为所有应用程序的数据存储需求使用简单文件之前，值得先检查一下其他方案。例如，如果您对数据存储和检索的需求不那么简单，并且需要多个文件，那么您可能需要研究使用本章后面讨论的嵌入式数据库方法。

