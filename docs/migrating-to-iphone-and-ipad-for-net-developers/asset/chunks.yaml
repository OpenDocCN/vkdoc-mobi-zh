    ### Using the Accelerometer


    The iPhone and the iPad are capable of measuring both gravity and device acceleration
    by detecting the inertial force on a device in a given direction. In layman''s
    terms, this means you can tell the orientation of the device, the speed of change,
    and whether the force of change is greater on one axis than the other, and therefore
    direction.


