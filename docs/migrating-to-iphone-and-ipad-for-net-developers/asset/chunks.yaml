  trans: '

    #### 其他设计资源


    互联网上提供了大量示例应用的资源——其中一些简单，另一些则非常复杂。我个人特别喜欢将《毁灭战士》游戏移植到 iPhone 的源代码及其开发历程叙述，可访问
    [`http://www.idsoftware.com/doom-classic/`](http://www.idsoftware.com/doom-classic/)
    获取（虽然用如此复杂的内容作为我们的示例应用会很有趣，但可惜的是，这不可能。希望“月球着陆器”是次优之选。）


    以下是一些你可能希望参考的其他有用资源：


    *  *《绝对零基础学 Objective-C》*（ISBN 978-1-4302-2832-5）是一本极佳的书，它会带你详细了解 Objective-C
    的细节。在你熟悉这门语言的过程中，它是一份有用的参考。

    * Pttrns.com ([`http://pttrns.com/`](http://pttrns.com/)) 是一个用于展示用户界面模式的实用资源——并非从编程角度，而是从视觉角度。它能为你的可视化设计提供灵感。

    *  *《Pro Objective-C iOS 设计模式》*（ISBN 978-14302-3330-5）提供了设计模式，帮助你实现可能在应用程序中用到的一些更复杂的设计（更偏向高级内容）。

    * 有许多资源管理工具可用，其中一些是开源的。如果你的应用程序涉及大量需求，你可能会发现这些工具很有用。例如，可在 [`http://sourceforge.net/projects/osrmt/`](http://sourceforge.net/projects/osrmt/)
    找到这样一个工具。


    ### 规划与设计“月球着陆器”应用


    那么，让我们践行之前所说的内容。我们将遵循上一节中描述的设计过程阶段。首先，我们会捕获并记录需求，然后设计应用程序。


    #### 需求规格说明


    需求规格说明定义了应用程序的范围，并提供了设计所依据的细节。通常还需要根据优先级对需求进行分类，以便在时间不足时能够做出艰难的决定。一种常用的做法是使用所谓的莫斯科表示法，即对于需求，分别标记为**必须**有、**应该**有、**可以**有和**想要**有。这是一种简单但有效的方法。


    表 5-1 展示了我们“月球着陆器”游戏的需求规格说明摘要。


    ![图片](img/t0501.jpg)


    显然，需求可以进一步细化以提供更多细节，但为了简洁起见，我将规格说明缩减为关键需求及其相关数据。这些信息足以让我们创建游戏，而这正是本章的重点。


    #### “月球着陆器”应用设计


    一旦你确定了要开发的应用程序类型以及哪些属性最有意义，就可以开始考虑一些细节了。例如，一个生产力工具（如计算器）、一个游戏（图形化）和一个消息应用（文本化）都需要不同的外观和感觉。


    ##### 用户界面


    该应用程序将呈现两个不同的用户界面：


    *   **主菜单**：这将是应用程序启动时的默认屏幕，并提供一个菜单，可以从中选择诸如难度等设置。此外，游戏可以通过此菜单系统启动。它会在屏幕中央显示最高分，并以月球着陆器座舱的图形图片作为背景。

    *   **游戏视图**：这是游戏的主视图，由其自身的控制器支持。在这个屏幕上，将绘制地形并显示着陆器，同时显示游戏状态、得分和剩余燃料等统计数据。


    ##### 游戏状态


    游戏可以处于以下五种状态之一，每种状态都会根据其状态对用户输入做出相应响应：


    *   **菜单**：处于主菜单，等待用户退出、选择难度级别或开始新游戏。

    *   **运行中**：游戏已启动，正在响应用户输入。

    *   **已暂停**：游戏已暂停或挂起，等待用户发出重新开始的信号。

    *   **已坠毁**：游戏正在运行，但用户已坠毁。可以从此菜单开始新游戏。

    *   **已获胜**：游戏正在运行，用户已成功着陆着陆器。当用户按下某个键时，下一关即可开始。


    ##### 其他游戏设计元素


    游戏设计中包含的其他元素如下：


    *   游戏将使用一个简单的计时器来管理屏幕上的图形更新。不过，这之后可以改为使用多线程，从而提供更流畅的游戏体验。

    *   “月球着陆器”图形将具有三个核心状态：无推力飞行、带推力飞行和已坠毁。旋转功能通过使用 iOS 的图形 API 进行管理。

    *   地形被预定义为一系列点，在运行时使用简单的线条图形绘制。

    *   最初将使用屏幕上的工具栏按钮作为用户输入。左右箭头键旋转月球着陆器飞船，向上箭头键表示施加推力。这可以改为使用触摸和手势界面，这些主题将在第 10
    章中探讨。


    ### 构建“月球着陆器”应用


    需求和设计阶段完成后，我们准备深入并构建“月球着陆器”游戏。


    “月球着陆器”应用最初将编写为针对 iPhone 设备的 iOS 应用程序。我们将在第 7 章中讨论如何利用 iOS 的方向特性更改它以适配其他设备。


    我们将使用 iOS 基于视图的应用程序项目模板，让其为主菜单创建初始视图和视图控制器。然后，我们将创建一个单独的视图及其关联的视图控制器来管理游戏的视图。这将提供一个良好的开端，并且也建立在我们已涵盖的早期示例之上。


    我们还将项目内包含其他资源，例如用于月球着陆器图像的图形文件。那么，让我们开始吧。

    '
- fmt: "#### Creating the Application Project\n\nYou know the drill: Choose a location\
    \ on your disk for the project and fire up Xcode. Create a project using the View-based\
    \ Application project template. I named the project `LunarLander`. Create the\
    \ following files:\n\n* `LunarLanderAppDelegate` (`.h` and `.m` files)\n* `LunarLanderViewController`\
    \ (`.h`, `.m`, and `.xib` files)\n* `MainWindow.xib` (which will use the `LunarLanderViewController.xib`\
    \ view)\n\nThese will provide our single application delegate, which will launch\
    \ the view controller that will use the `LunarLanderViewController.xib` as the\
    \ view for the game's main menu. Your project structure should look like that\
    \ shown in [Figure 5–1](#Chapter05.html#fig_5_1).\n\n![images](images/0501.jpg)\n\
    \n**Figure 5–1.** *Initial LunarLander project files*\n\nBefore we go any further,\
    \ let's add the main game view—again, a view controller and a view. To do this,\
    \ choose `File` ![images](images/U001.jpg) `New` (or use the ⌘N shortcut), and\
    \ from the Cocoa Touch iOS templates, choose a `UIViewController` subclass. On\
    \ the next few screens presented, ensure it subclasses the `UIViewController`\
    \ class and is given the name `GameViewController`. Also remember to check the\
    \ “With XIB for user interface” option. We'll use a NIB file to handle the game's\
    \ main user interface—at least the view canvas and static items. After doing this,\
    \ your folder structure should resemble that shown in [Figure 5–2](#Chapter05.html#fig_5_2).\n\
    \n![images](images/0502.jpg)\n\n**Figure 5–2.** *LunarLander project with GameView\
    \ class*\n\nThese files will provide a sufficient foundation to start the core\
    \ mechanics of our Lunar Lander application. Before we add any more files, let's\
    \ work with these initial files to start our game's implementation. We'll begin\
    \ with the main menu view and some elements of our foundation architecture. Other\
    \ resources will be added to the project as required, and we'll extend the application's\
    \ logic as specific topics are introduced later in the book.\n\n#### Building\
    \ the User Interface and Flow Logic\n\nThe user interface uses the initial window,\
    \ with a simple button that starts the game. We could also use this screen to\
    \ display the high score and decorate it with pretty graphics. The main Lunar\
    \ Lander view controller and XIB file will be used to manage this view. When the\
    \ Start Game button is selected, it will load and display modally the game view\
    \ with its own controller. This initial game screen is shown in [Figure 5–3](#Chapter05.html#fig_5_3),\
    \ with the Start Game button already added.\n\n![images](images/0503.jpg)\n\n\
    **Figure 5–3.** *Initial Start Game screen*\n\nOur application delegate will be\
    \ used to load this screen. As shown in [Listing 5-1](#Chapter05.html#list_5_1),\
    \ in the header file, we declare two properties (highlighted in bold): one of\
    \ type `Window` and the other a pointer to the `LunarLanderViewController` class\
    \ instance. We'll use these in the application delegate code to display the window.\n\
    \n**Listing 5-1.** *`LunarLanderAppDelegate.h`*\n\n``` \n#import <UIKit/UIKit.h>\n\
