  trans: '

    #### 了解 iOS


    iOS 最初为 iPhone 开发，源自 Mac OS X，是苹果移动设备（包括 iPhone、iPod touch 以及后来的 iPad）的核心操作系统。与大多数操作系统一样，iOS
    采用分层方式来提供必要的功能。每一层都构建在另一层之上，并在各层之间提供了清晰的抽象边界。iOS 内部的分层结构如图 1-3 所示。


    ![images](img/0103.jpg)


    **图 1-3.** *iOS 架构*


    让我们从堆栈的底部开始，首先处理底层服务，然后逐步向上，直至那些我们将直接与之交互并用于构建 iOS 应用程序的要素。


    **核心 OS**：该层提供了对物理硬件的抽象，并包含了供其上层使用的底层特性。该层的每个元素都以一系列框架的形式提供：Accelerate 框架、External
    Accessory 框架、Security 框架和 System 框架。在此语境下，*框架* 是一组提供该框架功能的关联 API 的集合。随着本书的深入，我们将更详细地探索这些框架及其暴露的
    API，并演示如何使用它们的示例。


    **核心服务**：核心服务层构建于核心 OS 层之上，包含了应用程序所需的基本系统服务。该层被划分为一组核心服务，它们共同提供一系列必要的高级特性。其中一些服务提供编程支持（语言支持、数据类型等）、数据管理支持以及电话功能。


    **媒体层**：顾名思义，该层提供图形、音频和视频支持。其任务是提供通过所用设备可获得的最佳多媒体支持。这一层包含的框架提供了核心音频、图形、文本、视频和
    MIDI 支持，以及动画、媒体播放等更多功能。


    **Cocoa Touch 层**：该层为构建应用程序提供支持和关键构建模块，包括多任务处理、基于触摸的输入、通知以及用户界面支持。该层还支持文件共享和打印，以及用于无线连接的点对点服务。


    尽管大部分此类功能都被打包到被称为*框架*的特定库中，但并非所有层和所有功能都如此。例如，核心 OS 和核心服务层中的某些专用库是作为动态链接库（DLL）提供的，并带有符号链接，用于将
    iOS 指向设备上的最新版本。这类技术对于管理代码很常见，我们将在第 2 章讨论版本控制时更详细地探讨它们。


    **注意：** 在此，我将介绍每个框架中的关键概念，并提供工作示例来说明其用法。有关 iOS 框架及其支持的 iOS 版本的更多详细信息，可在 iOS 开发者库文档中找到。


    #### 使用苹果组件进行应用程序开发


    现在，您应该对操作系统、构成它的各个层次及其提供的功能有了大致的了解。在深入探讨 iOS SDK 的细节之前，让我们先回顾一下使用苹果组件进行软件开发的一些历史。


    当 iPhone 最初发布时，您有两个选择：使用原生工具和语言，如 Objective-C 和 Mac OS X；或者使用在移动版 Safari 浏览器中执行的基于
    Web 的应用程序。后者自然局限于 HTML、层叠样式表（CSS）和 JavaScript 等语言。如今这仍然是一个有效的开发选择，但在可实现的功能和用户体验方面有所限制。


    第二代 iPhone 的发布引入了 iOS SDK、苹果 App Store，以及使用 Xcode 和 Objective-C 编写原生应用程序的能力。这实际上提供了对
    iOS（进而对 iPhone 功能）的完全访问权限，也满足了在 App Store 分发时强制要求使用原生二进制文件的选项。


    使用 iOS SDK（以及 Xcode 和 Objective-C）仍然是可行的，并且确实被一些人视为应用程序开发的标准机制。然而，开发人员可能也希望创建能在许多移动设备（不仅仅是苹果设备）上运行的应用程序。或者，他们可能偏爱苹果移动设备但不喜欢
    Mac OS X，又或者他们不喜欢被强制的开发工具和语言。鉴于这些原因，正如我们将在本书中讨论的，已经引入了许多替代方案。在某些情况下，这些选项至少部分依赖于
    iOS SDK。


    好了，历史讲得够多了。现在让我们来看看使用苹果提供的工具进行应用程序开发的可用选项。苹果提供了以下用于开发应用程序的核心组件：


    *   **Xcode**：这是一套由苹果开发的工具套件，用于为 Mac OS X（用于 iMac、MacBook 等）和 iOS 创建软件。

    *   **iOS SDK**：这是苹果发布的 SDK，允许开发人员为苹果移动设备和 Apple TV 制作应用程序。


    ##### Xcode


    在撰写本文时，Xcode 的最新版本是 Xcode 4，可在 Mac App Store 上以 4.99 美元的价格购买，已注册为苹果开发者的用户也可从苹果开发者连接网站获取，但需支付
    99 美元的年费。Xcode 3 版本仍然免费提供（不过，可以预见，其支持的 iOS 版本是受限的）。


    Xcode 自带以下组件：


    *   **IDE**：`Xcode` 是苹果的标准 IDE，允许您为 Mac OS X 和 iOS 操作系统开发软件。它支持多种编程语言，并提供专业 IDE
    所应有的许多功能，例如语法高亮、自动补全、调试和源代码控制。它可以与业界其他广受青睐的 IDE（如 Eclipse 和微软的 Visual Studio）相媲美。

    *   **Interface Builder**：自从 Xcode 4 发布以来，Interface Builder 已从一个单独的应用程序完全集成到 `Xcode`
    IDE 中，但其目的保持不变：提供一个辅助创建用户界面的工具。它通过一个支持 Cocoa 等框架的 GUI 来实现这一点，并提供一个用户界面对象和控件的调色板，供您根据需要拖放到画布上。您甚至可以更进一步，为这些控件（例如按钮点击）的事件提供源代码实现。

    *   **编译器**：编译器是一个基本组件。它接收您的源代码并生成为在移动设备上执行以及为在 App Store 上执行所需的二进制文件。苹果的 `LLVM`（来自
    LLVM.org 项目）是一个快速、功能丰富的编译器，可为您的移动设备创建优化的应用程序。它支持多种语言，包括 C、C++ 和 Objective-C。

    *   **调试器**：这是苹果对 LLVM.org 开源项目的另一贡献，作为 `Xcode` 一部分提供的这个调试器快速高效。它提供了一个集成的调试界面，包含栈跟踪和逐步调试等常见功能，同时也支持全面的多线程调试。'
- fmt: "### iOS SDK\n\nThe iOS SDK is the SDK launched by Apple in 2008 to enable\
    \ you to develop native applications for the iOS operating system. The iOS SDK\
    \ is broken down into sets that match the layers provided within the iOS framework\
    \ (see [Figure 1–3](#Chapter01.html#fig_1_3) earlier in the chapter). This includes\
    \ the following:\n\n*   Cocoa Touch\n    *   Multitouch events and controls\n\
    \    *   Accelerometer support\n    *   View hierarchy\n    *   Localization\n\
    \    *   Camera support\n*   Media\n    *   OpenAL\n    *   Audio mixing and recording\n\
    \    *   Video playback\n    *   Image file formats\n    *   Quartz\n    *   Core\
    \ animation\n    *   OpenGL ES\n*   Core Services\n    *   Networking\n    * \
    \  Embedded SQLite database\n    *   Core Location\n    *   Concurrency\n    *\
    \   Core Motion\n*   OS X kernel\n    *   TCP/IP\n    *   Sockets\n    *   Power\
    \ management\n    *   Threads\n    *   Filesystem\n    *   Security\n\nAlong with\
    \ the Xcode toolchain, the SDK contains the iPhone simulator, a program used to\
    \ emulate the look and feel of the iPhone on the developer's desktop. The SDK\
    \ requires an Intel Mac running Mac OS X Snow Leopard or later. Other operating\
    \ systems, including Microsoft Windows and older versions of Mac OS X, are not\
    \ supported. More information can be found on the iOS Dev Center web site.\n\n\
    ### Third-Party Options\n\nThe reliance on Apple-only tooling for application\
    \ development on Apple's mobile devices has long been a sore point for a number\
    \ of people. This is not a reflection on the quality or features provided within\
    \ the Apple options—quite the contrary. They are extremely powerful and productive\
    \ tools that enable you to develop for both Apple's desktop and laptop devices\
    \ (iMac, MacBook, and MacBook Pro) and mobile devices (the iPhone, iPod touch,\
    \ and iPad) individually or as a team, using its team development features.\n\n\
    But, humans being humans, we get comfortable with what we know. We like familiarity.\
    \ Those who have been brought up on different operating systems, different technologies,\
    \ and different tools may be reluctant to change, and might not see the need to\
    \ do so. For example, if you're a Java developer, you may love the Java programming\
    \ language and the Eclipse (or similar) IDE you are using. Given you're a .NET\
    \ developer, chances are you've been exposed to other languages. While this book\
    \ focuses on bridging the gap between .NET and Apple's tool set, understanding\
    \ the third-party options available to you is likely to provide relevant context.\
    \ If you've been exposed to only Microsoft .NET, your familiarity with tools such\
    \ as Visual Studio and the .NET Framework will stand you in good stead in making\
    \ the transition.\n\nWhether your experience is Microsoft-based or more mixed,\
    \ you may also be more comfortable with the Windows or Linux operating system,\
    \ and so are hesitant to learn a new operating system on which to develop your\
    \ applications. “After all,” I hear many people argue, “it's the mobile device\
    \ and its operating system that are of most relevance, not how you get there.”\n\
    \nSo, how do you best use the experience you have and what exists to make your\
    \ transition easier? My guess is you are not afraid to learn something new—after\
    \ all, it's fun— but would rather reuse elements of the development environment\
    \ that you are already familiar with—specifically, .NET. This hasn't gone unnoticed,\
    \ and open source initiatives and commercial organizations have attempted to tackle\
    \ and capitalize on the problem. There are many options available, and some scenarios\
    \ may suit you more than others, such as Mono providing an open source and Apple-friendly\
    \ implementation of .NET. Other options, while not .NET-focused, are relevant\
    \ in helping you make the transition, even if you choose to ignore them and stick\
    \ with Apple's own SDK and tools. Here, we'll take a quick look at the following\
    \ third-party options:\n\n*   Mono\n*   Appcelerator's Titanium Mobile\n*   Marmalade\
    \ SDK\n*   Flash Professional CS5\n\n#### Mono Family\n\nMono is an open source\
    \ (community-built) implementation of the .NET Framework and associated components\
    \ for platforms other than Windows. The Mono environment can be classified as\
    \ the Core Mono environment and additional components that offer enhanced functionality.\
    \ When looking at the development of applications for Apple's mobile devices,\
    \ you can think of Core Mono as the foundation with additional components, such\
    \ as MonoTouch, built on top, completing the family.\n\nThe Mono family includes\
    \ a number of components of significance when developing applications: the compiler,\
    \ the framework, and the supporting tools. These components are called Core Mono\
    \ (the compiler and runtime), MonoTouch (the .NET implementation of Cocoa Touch),\
    \ and MonoDevelop (the IDE).\n\n##### Core Mono\n\nAs a core part of the Mono\
    \ development environment, Core Mono provides a compiler that supports a number\
    \ of programming languages, including C#. It includes an implementation of the\
    \ Common Language Runtime, and more important, provides a comprehensive set of\
    \ APIs to implement the .NET Framework. Specifically, Core Mono includes the .NET\
    \ Framework Class Library implementation, which is a set of libraries that provides\
    \ the Mono implementation of the .NET Framework Class Library.\n\n##### MonoTouch\n\
    \nMonoTouch provides a .NET-based implementation of Apple's own Cocoa Touch library.\
    \ It allows developers to create C#- and .NET-based applications that run on Apple's\
    \ iPhone, iPad, and iPod touch devices, while taking advantage of the iPhone APIs\
    \ and reusing code and libraries built for .NET, as well as existing skills. It\
    \ seems obvious now, but the introduction of MonoTouch was a touch of genius.\
    \ It binds the Objective-C and C APIs from the Cocoa Touch API provided by Apple\
    \ to the C#/Common Intermediate Language (CIL) APIs. In addition to the core base\
    \ class libraries that are part of Mono, MonoTouch ships with bindings for various\
    \ iPhone APIs to allow developers to create native iPhone applications with Mono.\
    \ How does MonoTouch do this?\n\nAt the core of MonoTouch is an interoperability\
    \ (interop) engine, which provides the bindings for the Cocoa Touch API, including\
    \ Foundation, Core Foundation, and UIKit. This also includes graphical APIs such\
    \ as Core Graphics and OpenGL ES.\n\nAlthough MonoTouch provides bridges to the\
    \ Cocoa Touch API, there is also an implementation of Mono targeted at allowing\
    \ you to write applications for the Mac OS X operating system calling MonoMac,\
    \ which uses the same principles. In fact, at the time of writing, a new version\
    \ of Mono allows you to employ the same principles to write Android operating\
    \ system applications using MonoDroid (although this is at a much earlier stage\
    \ of its development)."
