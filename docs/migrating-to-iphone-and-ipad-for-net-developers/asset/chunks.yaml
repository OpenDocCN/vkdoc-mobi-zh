  trans: '

    ### 本章概要


    在本章中，我们首先了解了运行 `Xcode` 4 所需的系统要求，这是目前开发 iOS 应用程序最为简便的方法。我们讨论了可能需要的硬件类型，并接着探讨了如何获取和安装
    `Xcode` 工具套件。


    随后，本章概述了 `Xcode` 工具套件，并提供了 Objective-C 入门指南，涵盖了开发你的第一款 iPhone 应用程序所需掌握的基本原理。我们甚至了解了一些较新的特性，例如自动引用计数。


    接着，我们实际构建了一款 iPhone 应用程序。我们利用 `Xcode` 的项目模板来快速上手。我们还使用了 `Xcode` 的一些新功能，将用户界面组件与代码对象进行关联。当一切连接就绪后，我们便能够构建该应用程序并在
    iPhone 模拟器中进行测试。


    呼！现在你已经成为一名使用 Apple 原生工具（如 iOS SDK 和 `Xcode` 4）的 iOS 应用程序开发者了。在接下来的章节中，你会发现这并不是唯一的开发选项。既然你已经掌握了编写基础应用程序的基础，我们将继续使用其他可用的选项来开发功能更丰富的应用程序。


    ## 第 3 章


    ## 了解你的选项：使用第三方解决方案与 MonoTouch


    在前面的章节中，我们探讨了 iOS 操作系统、SDK 及相关的工具，以及如何使用 `Xcode` 4 和 iOS SDK 来开发你的第一款 iPhone 应用程序。但正如第
    1 章所述，除了 Apple 的原生工具之外，还有其他开发应用程序的选项。本章将详细阐述第 1 章中介绍的一些第三方选项，并描述如何使用它们来创建 Hello,
    World 应用程序。


    我们不会涵盖所有可用的第三方选项，这不仅是由于篇幅限制，更因为这个环境在不断变化，新的选项层出不穷。在本章中，我们将重点关注一些较为常见且历史悠久的选项：


    *   结合 `.NET Framework` 使用 `MonoTouch`

    *   使用 JavaScript 配合 Appcelerator 的 `Titanium Studio` 和 Mobile SDK

    *   结合 `Marmalade SDK` 使用 `Xcode`


    在熟悉了如何使用本章涵盖的每一种选项开发 Hello, World 应用程序之后，我们将可以在本书的剩余部分中更详细地探讨 iOS 的不同元素以及更高级的应用程序。


    ### 了解限制条件


    在开始使用第三方选项之前，有必要了解一些基本原则性限制：


    *   **原生应用需要 Mac**：要编写和执行原生 iOS 应用程序，你将需要一台 Mac。

    *   **SDK 的完整性**：诸如 `Mono` 之类的第三方选项在现有 iOS SDK 之上提供了一层抽象，但通常未能完全实现 iOS SDK *所有*
    的功能。因此，如果你想要完整的 API 实现，要么需要绕开第三方实现中的缺口，要么尝试编写自己的实现。

    *   **速度**：如果你想充分利用 iOS 设备的性能，直接基于 SDK 使用 Objective-C 编写应用程序是无法被取代的。其他选项虽然可行，但它们引入的抽象层会拖慢你的应用程序速度。


    在描绘了第三方选项相对暗淡的前景之后，有必要指出其中一些方案是非常可行的。`Mono` 的实现尤其如此，它使用一种熟悉的语言提供了 iOS SDK API
    最完整的实现。速度通常也不是问题。


    ### 使用 Mono 与 MonoTouch 进行开发


    你现在应该已经知道，本书的重点是支持你使用多种方法为 Apple 移动设备开发应用程序，并着重强调重用你现有的 .NET 知识和技能。


    .NET Framework 在微软 Windows 操作系统上的成功并未被开源社区忽视。许多人希望 .NET 不仅能在 Windows 上使用，也能在其他操作系统（如
    Linux 和 Mac OS X）上使用。值得庆幸的是，有人为此付诸了行动。Miguel de Icaza 主动承担起这份责任，并在社区的支持下，将 .NET
    带到了这些操作系统上，使你能够为众多平台编写 .NET 应用程序。而且这并未止步。很快，`SharpDevelop` IDE 被移植到了 `Mono` 上，并由此诞生了
    `MonoDevelop`，创建了一个类似 Visual Studio 的 IDE，它不仅能针对 .NET 应用程序，还能针对 C、C++、Python 和
    Java。


    因此，你拥有了 .NET Framework、对 C# 等 .NET 语言的支持，以及一个强大的 IDE，而支持移动革命自然是顺理成章的事！事实上，他们走得更远。他们不仅推出了
    `MonoTouch`，提供了一种为 iPhone 创建基于 C# 和 .NET 的应用程序的机制，还推出了 `MonoMac`。`MonoMac` 是一项有趣的进展，用于在
    Mac OS X 上使用 `Mono` 创建 Cocoa 应用程序。（更多信息，请访问 [`http://www.mono-project.com/MonoMac`](http://www.mono-project.com/MonoMac)。）此外，基于与
    `MonoTouch` 相同的原理，`MonoDroid` 也已发布，但其目标是 Android 操作系统。


    关于 `MonoMac` 和 `MonoDroid` 就先说到这里；让我们来看看 `MonoTouch`。如上所述，它允许你使用 `Mono`，通过 API
    绑定 iOS API 来为 iPhone、iPad 和 iPod touch 开发应用程序。


    鉴于它基于 .NET Framework 并支持 C# 编程语言，你们这些 .NET 开发者应该会感到得心应手！让我们来看看如何获取、安装并使用必要的组件，以利用
    `Mono` 工具编写我们的 Hello, World iPhone 应用程序。


    #### 安装 Mono、MonoDevelop 与 MonoTouch


    要开始，你需要下载并安装以下组件。这些组件可以从 Mono 项目主页 ([`http://www.mono-project.com/`](http://www.mono-project.com/))
    获取。


    *   **Mono**：这是实际的 `Mono` 框架。它包括 .NET Framework 的开源实现、语言支持以及辅助工具。你可以从 [`http://www.go-mono.com/mono-downloads/download.html`](http://www.go-mono.com/mono-downloads/download.html)
    下载 `Mono`。

    *   **MonoDevelop**：这是一个主要为 .NET 及其语言（如 C#）设计的 IDE。我们将使用它，就像上一章使用 `Xcode` 一样，或者就像你可能使用
    Visual Studio 来构建应用程序那样。你可以从 [`http://monodevelop.com/Download`](http://monodevelop.com/Download)
    下载 `MonoDevelop`。

    *   **MonoTouch**：这是魔法发生的地方。`MonoTouch` 是一个使用 `Mono` 为 iPhone 开发应用程序的 SDK。使用它，你将能够编写应用程序并在
    iPhone 模拟器上进行测试。你可以从 [`http://monotouch.net/Store`](http://monotouch.net/Store)
    下载试用版或购买完整版。

    '
- fmt: "### Installing Mono\n\nFirst, start by visiting the Mono project download\
    \ page and downloading the Mono distribution appropriate for the platform on which\
    \ you're developing. We'll be running Mono on the Mac OS X platform, as this is\
    \ a requirement for developing iOS-based applications, but as you'll notice, Windows\
    \ and a number of Linux and Unix distributions are also supported. Also notice\
    \ that Mono conveniently separates the download options into both stable and long-term\
    \ supported versions. The difference is essentially that the latest and greatest\
    \ features are in the latest stable version.\n\n**NOTE:** At the time of writing,\
    \ the latest stable version is 2.10.5 and requires either Mac OS X Leopard (10.5),\
    \ Snow Leopard (10.6) and Lion (10.7).\n\nAt the Mono downloads page, shown in\
    \ [Figure 3–1](#Chapter03.html#fig_3_1), select your platform and choose the SDK\
    \ package appropriate for your chipset (for example, Intel or PowerPC) or choose\
    \ the Universal option if you're unsure.\n\n![images](images/0301.jpg)\n\n**Figure\
    \ 3–1.** *Selecting a Mono SDK package from the Downloads page*\n\nYou'll notice\
    \ options for both the runtime and the SDK. The runtime is used if you simply\
    \ want to execute applications written for Mono, and the SDK is used if you want\
    \ to execute applications and also write your own apps using the Mono API. It\
    \ includes both the runtime and SDK development platform.\n\nOnce downloaded,\
    \ clicking the icon in your downloads folder will start the installation, as shown\
    \ in [Figure 3–2](#Chapter03.html#fig_3_2).\n\n![images](images/0302.jpg)\n\n\
    **Figure 3–2.** *Mono framework installation startup screen*\n\nFollow the on-screen\
    \ instructions to complete the installation. The software is not that large, and\
    \ the installation should complete pretty quickly. After it's installed, you won't\
    \ see any obvious desktop or toolbar icons.\n\nLet's test the installation. We\
    \ will create a console version of the Hello, World app and use the command line\
    \ and a terminal window to do this (on the Mac).\n\nStart by creating a folder\
    \ to contain your source code and create a single file named `HelloWorld.cs`,\
    \ with the following source code:\n\n```\nusing System;\n\npublic class HelloWorld\n\
    {\n        static public void Main ()\n        {\n                Console.WriteLine(\"\
    Hello, World\");\n        }\n}\n```\n\nThis code's construct should be immediately\
    \ obvious to any .NET developer. We are simply writing a text string out to the\
    \ control that will display the text.\n\nAfter this example is written to disk,\
    \ you can attempt a compilation using the Mono compiler. While in the same directory\
    \ as your source code, simply enter the following command at the command prompt:\n\
    \n`gmcs HelloWorld.cs`\n\nIf no errors are present, this will compile your source\
    \ code silently, leaving `HelloWorld.exe` in the directory. Run this compiled\
    \ executable by sending it to the Mono runtime (indicated by the `mono` command\
    \ prefix):\n\n`mono HelloWorld.exe`\n\nThis should output the text \"Hello, World.\"\
    \n\nIf all of this worked, your Mono installation was successful, and we can move\
    \ on to installing the MonoDevelop application. If it didn't, the mono support\
    \ or community pages should help you find a resolution.\n\n### Installing MonoDevelop\n\
    \nNow you're ready to download MonoDevelop. Make sure that the version you're\
    \ downloading matches the version of Mono you've installed. For example, MonoDevelop\
    \ 2.4.2 requires at least Mono 2.4 to run.\n\nAt the home page, shown in [Figure\
    \ 3–3](#Chapter03.html#fig_3_3), select the version you require. Again, the choices\
    \ usually include the latest stable release and the more recent, but unproven,\
    \ beta release. Choose the Mac OS X platform and start the download for whichever\
    \ installation mechanism you prefer (I used packages, as they are simple to get\
    \ going).\n\n![images](images/0303.jpg)\n\n**Figure 3–3.** *MonoDevelop home page*\n\
    \nAfter you've downloaded MonoDevelop, click the disk image. You will be prompted\
    \ to complete the installation by dragging MonoDevelop to your `Applications`\
    \ folder, as shown in [Figure 3–4](#Chapter03.html#fig_3_4). This will complete\
    \ your installation.\n\n![images](images/0304.jpg)\n\n**Figure 3–4.** *MonoDevelop\
    \ package installation*\n\nClicking the newly installed icon will launch the MonoDevelop\
    \ application. This launches the MonoDevelop IDE, as shown in [Figure 3–5](#Chapter03.html#fig_3_5).\n\
    \n**NOTE:** The installer may suggest that further MonoDevelop updates exist.\
    \ If this is the case, installing them is optional, but if they are marked as\
    \ stable, I recommend that you do so.\n\n![images](images/0305.jpg)\n\n**Figure\
    \ 3–5.** *Running MonoDevelop*\n\nI recommend that you explore the application,\
    \ taking a look at some of the links available. After you've done this, we can\
    \ quickly create a console application similar to the one we used to test the\
    \ Mono installation.\n\nStart by selecting the Start a New Solution link, which\
    \ will present you with a Project Template dialog box, in which you'll notice\
    \ a C# Console project. Follow the on-screen instructions to create your project,\
    \ selecting the location of your project and giving it a name. You'll be presented\
    \ with an empty project and a default `main.cs` file with an implementation of\
    \ Hello, World very similar to ours. Simply choose `Build` ![images](images/U001.jpg)\
    \ `Run`, and a terminal window will be displayed showing the text \"Hello, World.\"\
    \n\nNow wasn't that easier!"
  raw: '##### Installing Mono


    First, start by visiting the Mono project download page and downloading the Mono
    distribution appropriate for the platform on which you''re developing. We''ll
    be running Mono on the Mac OS X platform, as this is a requirement for developing
    iOS-based applications, but as you''ll notice, Windows and a number of Linux and
    Unix distributions are also supported. Also notice that Mono conveniently separates
    the download options into both stable and long-term supported versions. The difference
    is essentially that the latest and greatest features are in the latest stable
    version.


    **NOTE:** At the time of writing, the latest stable version is 2.10.5 and requires
    either Mac OS X Leopard (10.5), Snow Leopard (10.6) and Lion (10.7).


    At the Mono downloads page, shown in [Figure 3–1](#Chapter03.html#fig_3_1), select
    your platform and choose the SDK package appropriate for your chipset (for example,
    Intel or PowerPC) or choose the Universal option if you''re unsure.


    ![images](images/0301.jpg)


    **Figure 3–1.** *Selecting a Mono SDK package from the Downloads page*


    You''ll notice options for both the runtime and the SDK. The runtime is used if
    you simply want to execute applications written for Mono, and the SDK is used
    if you want to execute applications and also write your own apps using the Mono
    API. It includes both the runtime and SDK development platform.


    Once downloaded, clicking the icon in your downloads folder will start the installation,
    as shown in [Figure 3–2](#Chapter03.html#fig_3_2).


    ![images](images/0302.jpg)


    **Figure 3–2.** *Mono framework installation startup screen*


    Follow the on-screen instructions to complete the installation. The software is
    not that large, and the installation should complete pretty quickly. After it''s
    installed, you won''t see any obvious desktop or toolbar icons.


    Let''s test the installation. We will create a console version of the Hello, World
    app and use the command line and a terminal window to do this (on the Mac).


    Start by creating a folder to contain your source code and create a single file
    named `HelloWorld.cs`, withthe following source code:


    `using System;`


    `public class HelloWorld`

    `{`

    `        static public void Main ()`

    `        {`

    `                Console.WriteLine("Hello, World");`

    `        }`

    `}`


    This code''s construct should be immediately obvious to any .NET developer. We
    are simply writing a text string out to the control that will display the text.


    After this example is written to disk, you can attempt a compilation using the
    Mono compiler. While in the same directory as your source code, simply enter the
    following command at the command prompt:


    `gmcs HelloWorld.cs`


    If no errors are present, this will compile your source code silently, leaving
    `HelloWorld.exe` in the directory. Run this compiled executable by sending it
    to the Mono runtime (indicated by the `mono` command prefix):


    `mono HelloWorld.exe`


    This should output the text “Hello, World.”


    If all of this worked, your Mono installation was successful, and we can move
    on to installing the MonoDevelop application. If it didn''t, the mono support
    or community pages should help you find a resolution.


    ##### Installing MonoDevelop


    Now you''re ready to download MonoDevelop. Make sure that the version you''re
    downloading matches the version of Mono you''ve installed. For example, MonoDevelop
    2.4.2 requires at least Mono 2.4 to run.


    At the home page, shown in [Figure 3–3](#Chapter03.html#fig_3_3), select the version
    you require. Again, the choices usually include the latest stable release and
    the more recent, but unproven, beta release. Choose the Mac OS X platform and
    start the download for whichever installation mechanism you prefer (I used packages,
    as they are simple to get going).


    ![images](images/0303.jpg)


    **Figure 3–3.** *MonoDevelop home page*


    After you''ve downloaded MonoDevelop, click the disk image. You will be prompted
    to complete the installation by dragging MonoDevelop to your `Applications` folder,
    as shown in [Figure 3–4](#Chapter03.html#fig_3_4). This will complete your installation.


    ![images](images/0304.jpg)


    **Figure 3–4.** *MonoDevelop package installation*


    Clicking the newly installed icon will launch the MonoDevelop application. This
    launches the MonoDevelop IDE, as shown in [Figure 3–5](#Chapter03.html#fig_3_5).


    **NOTE:** The installer may suggest that further MonoDevelop updates exist. If
    this is the case, installing them is optional, but if they are marked as stable,
    I recommend that you do so.


    ![images](images/0305.jpg)


    **Figure 3–5.** *Running MonoDevelop*


    I recommend that you explore the application, taking a look at some of the links
    available. After you''ve done this, we can quickly create a console application
    similar to the one we used to test the Mono installation.


    Start by selecting the Start a New Solution link, which will present you with
    a Project Template dialog box, in which you''ll notice a C# Console project. Follow
    the on-screen instructions to create your project, selecting the location of your
    project and giving it a name. You''ll be presented with an empty project and a
    default `main.cs` file with an implementation of Hello, World very similar to
    ours. Simply choose `Build` ![images](images/U001.jpg) `Run`, and a terminal window
    will be displayed showing the text “Hello, World.”


    Now wasn''t that easier!'
  trans: "\n### 安装 Mono\n\n首先，访问 Mono 项目下载页面，下载适合您开发平台的 Mono 发行版。由于开发基于 iOS 的应用程序要求使用\
    \ Mac OS X 平台，我们将在此平台上运行 Mono，但您会发现，Windows 以及许多 Linux 和 Unix 发行版也支持。另外请注意，Mono\
    \ 已将下载选项方便地分为稳定版和长期支持版。二者的区别本质在于，最新最强大的功能都包含在最新的稳定版中。\n\n**注意：** 在撰写本文时，最新的稳定版本是\
    \ 2.10.5，需要 Mac OS X Leopard (10.5)、Snow Leopard (10.6) 或 Lion (10.7)。\n\n在 图\
    \ 3–1 所示的 Mono 下载页面中，选择您的平台，然后选择合适的芯片组（例如 Intel 或 PowerPC）对应的 SDK 包，如果不确定，则选择通用选项。\n\
    \n![images](img/0301.jpg)\n\n**图 3–1.** *从下载页面选择 Mono SDK 包*\n\n您会注意到有运行时和 SDK\
    \ 两种选项。如果您只想运行为 Mono 编写的应用程序，请使用运行时；如果您想运行应用程序并使用 Mono API 编写自己的应用程序，请使用 SDK。它同时包含运行时和\
    \ SDK 开发平台。\n\n下载完成后，点击下载文件夹中的图标即可开始安装，如 图 3–2 所示。\n\n![images](img/0302.jpg)\n\
    \n**图 3–2.** *Mono 框架安装启动画面*\n\n按照屏幕上的说明完成安装。该软件不大，安装过程应能很快完成。安装完成后，您不会看到任何明显的桌面或工具栏图标。\n\
    \n我们来测试一下安装。我们将创建一个控制台版本的“Hello, World”应用程序，并使用命令行和终端窗口（在 Mac 上）来完成此操作。\n\n首先，创建一个文件夹来存放源代码，并创建一个名为\
    \ `HelloWorld.cs` 的文件，内容如下：\n\n```\nusing System;\n\npublic class HelloWorld\n\
    {\n        static public void Main ()\n        {\n                Console.WriteLine(\"\
    Hello, World\");\n        }\n}\n```\n\n任何 .NET 开发者都应该能立刻明白这段代码的结构。我们只是简单地将一个文本字符串输出到将显示文本的控件。\n\
    \n将此示例保存到磁盘后，您可以尝试使用 Mono 编译器进行编译。在源代码所在的同一目录下，只需在命令提示符中输入以下命令：\n\n`gmcs HelloWorld.cs`\n\
    \n如果没有错误，这将静默地编译您的源代码，并在目录中生成 `HelloWorld.exe`。通过将其发送到 Mono 运行时（由 `mono` 命令前缀表示）来运行这个编译好的可执行文件：\n\
    \n`mono HelloWorld.exe`\n\n这应输出文本 \"Hello, World.\"\n\n如果一切正常，则说明您已成功安装 Mono，我们可以继续安装\
    \ MonoDevelop 应用程序了。如果未成功，Mono 支持页面或社区页面应该能帮助您找到解决方案。\n\n### 安装 MonoDevelop\n\n\
    现在您可以下载 MonoDevelop 了。请确保您下载的版本与已安装的 Mono 版本相匹配。例如，MonoDevelop 2.4.2 至少需要 Mono\
    \ 2.4 才能运行。\n\n在 图 3–3 所示的主页上，选择您需要的版本。同样，选择通常包括最新的稳定版和更新但未经测试的测试版。选择 Mac OS X\
    \ 平台，然后根据您偏好的安装机制开始下载（我使用了包，因为它们易于上手）。\n\n![images](img/0303.jpg)\n\n**图 3–3.**\
    \ *MonoDevelop 主页*\n\n下载 MonoDevelop 后，点击磁盘映像文件。系统将提示您通过将 MonoDevelop 拖拽到 `Applications`\
    \ 文件夹来完成安装，如 图 3–4 所示。这将完成您的安装。\n\n![images](img/0304.jpg)\n\n**图 3–4.** *MonoDevelop\
    \ 包安装*\n\n点击新安装的图标将启动 MonoDevelop 应用程序。这将启动 MonoDevelop IDE，如 图 3–5 所示。\n\n**注意：**\
    \ 安装程序可能会提示有可用的 MonoDevelop 更新。如果是这种情况，安装它们是可选的，但如果它们被标记为稳定版，我建议您进行安装。\n\n![images](img/0305.jpg)\n\
    \n**图 3–5.** *运行 MonoDevelop*\n\n我建议您探索一下这个应用程序，查看一些可用的链接。完成此操作后，我们可以快速创建一个与我们用来测试\
    \ Mono 安装的控制台应用程序类似的应用程序。\n\n首先选择“Start a New Solution”链接，这将弹出一个“Project Template”对话框，您会注意到其中有一个\
    \ C# 控制台项目。按照屏幕上的说明创建您的项目，选择项目的位置并为其命名。您将看到一个空项目和一个默认的 `main.cs` 文件，其中包含一个与我们的非常相似的“Hello,\
    \ World”实现。只需选择 `Build` ![images](img/U001.jpg) `Run`，就会显示一个终端窗口，其中显示文本 \"Hello,\
    \ World.\"\n\n是不是简单多了！\n"
- fmt: "### Installing MonoTouch\n\nFinally, to complete the “Mono trilogy,” we'll\
    \ look at how to obtain and install MonoTouch. The first thing to note is that\
    \ MonoTouch is not free. Depending the version you require, it can cost anything\
    \ from $99 to $3,999! Consider the chart in [Figure 3–6](#Chapter03.html#fig_3_6),\
    \ taken from the MonoTouch web site, which details the different features and\
    \ the associated prices.\n\n![images](images/0306.jpg)\n\n**Figure 3–6.** *MonoTouch\
    \ version feature comparison*\n\nThe key takeaway point here is that for you to\
    \ use MonoTouch to create applications that are distributable via Apple's App\
    \ Store, you need the Professional edition, which costs $399. A Student edition\
    \ also is available, at a cost of $79. This edition allows you to create applications,\
    \ but distribution onto Apple devices is possible only via ad hoc deployment—not\
    \ the App Store. We'll discuss distributing your applications in [Chapter 9](#Chapter09.html#ch9).\n\
    \nFor the moment, let's start with the trial version, which doesn't cost anything.\
    \ Although it doesn't allow distribution via the App Store, it does permit you\
    \ to test your application on the iPhone/iPad simulator. Visit [`http://monotouch.net/DownloadTrial`](http://monotouch.net/DownloadTrial),\
    \ enter your email address, and click the Download button to obtain the trial\
    \ version.\n\nStart the installation by clicking the downloaded package. This\
    \ will launch the installer, as shown in [Figure 3–7](#Chapter03.html#fig_3_7).\
    \ Follow the installation instructions. When installation is complete, the installer\
    \ should take you to a web page containing the release notes for the version of\
    \ MonoTouch just installed.\n\n![images](images/0307.jpg)\n\n**Figure 3–7.** *Running\
    \ the MonoTouch installer*\n\nYou can start to use MonoTouch immediately, but\
    \ this requires that you use the command-line functions to ensure that the applications\
    \ you develop are built against the MonoTouch licenses. If you prefer to use MonoDevelop,\
    \ that is possible. However, you'll notice that within the version of MonoDevelop\
    \ we installed, there are no such MonoTouch templates. At the time of writing,\
    \ you will need to download and install a special version of MonoDevelop, updated\
    \ to recognize the MonoTouch SDK. This is available from [`http://monodevelop.com/Download/Mac_MonoTouch`](http://monodevelop.com/Download/Mac_MonoTouch).\
    \ After it's downloaded and selected for installation, installing it follows a\
    \ similar process to the installation of the other version of MonoDevelop you\
    \ installed previously. You simply need to drag the new version onto your `Applications`\
    \ folder, and after being prompted to replace the version you have, the new version\
    \ of MonoDevelop will be installed.\n\nStart MonoDevelop and choose Start a New\
    \ Solution as before. This time, when you expand either the C# or VBNet projects,\
    \ you will notice options for the iPhone and iPad projects of different types,\
    \ as shown in [Figure 3–8](#Chapter03.html#fig_3_8).\n\n![images](images/0308.jpg)\n\
    \n**Figure 3–8.** *MonoDevelop with MonoTouch project templates added*\n\n###\
    \ Creating Hello, World Using MonoTouch\n\nLet's build our Hello, World application.\
    \ Just as you did when we used Xcode 4 in the previous chapter, start by selecting\
    \ the iPhone Window-based Project and enter the name and location as you prefer.\
    \ After you select Forward, a project with the default files and implementation\
    \ for an iPhone Windows-based project will be created, as shown in [Figure 3–9](#Chapter03.html#fig_3_9).\n\
    \n![images](images/0309.jpg)\n\n**Figure 3–9.** *Default iPhone Windows-based\
    \ application in MonoDevelop*\n\nA quick inspection will show some similarities\
    \ to the Xcode project we created in [Chapter 2](#Chapter02.html#ch2). Both have\
    \ a `main.cs` file with an `AppDelegate` instance created, making the default\
    \ window key and visible. This shouldn't surprise you. It's using the Cocoa API,\
    \ but with a .NET implementation.\n\nGo ahead and build and run this application.\
    \ It's not as fast as Xcode, but then again, it wouldn't be given the additional\
    \ levels of abstraction. Your application will eventually launch in the iPhone\
    \ simulator. Although it's a blank window (at the moment), it's your first iPhone\
    \ app in .NET!\n\nIn keeping with our Xcode example, let's add a specific view\
    \ and associated view controller to display our label and allow us to initialize\
    \ it with the text “Hello, World.” The key difference is that in this instance,\
    \ we'll be working in .NET.\n\nThankfully, adding a view and view controller to\
    \ our project is really easy in MonoDevelop. With the project selected, select\
    \ the `File` ![images](images/U001.jpg) `New` ![images](images/U001.jpg) `File`\
    \ menu option to open the New File dialog. Expand the C# tree, and then select\
    \ iPad View with Controller, as shown in [Figure 3–10](#Chapter03.html#fig_3_10).\
    \ Then choose New to add these files to your project, again with a default structure\
    \ and implementation for you to complete.\n\n![images](images/0310.jpg)\n\n**Figure\
    \ 3–10.** *MonoDevelop New File dialog*\n\nAs you did in the Xcode example, select\
    \ the `HelloWorldView.xib` file. This will launch Interface Builder. Continue\
    \ to add a label and hook it up as an outlet, as per the Xcode 4 example in the\
    \ previous chapter.\n\nNow we can set the text value. Once our code is hooked\
    \ up, we can simply override the `ViewDidLoad()` method of the `ViewController`\
    \ class, and within this, access the label user object by name, like so:\n\n```\n\
    public override void ViewDidLoad ()\n{\n        base.ViewDidLoad();\n        lbl.Text\
    \ = @\"Hello, World\";\n}\n```\n\nIf you now run the application, your MonoTouch-based\
    \ iPhone app will behave exactly the same as your Xcode 4 iPhone app, and display\
    \ “Hello, World” on the device.\n\nWe've taken a look at how to install and create\
    \ applications—including our now infamous Hello, World application—running on\
    \ an iPhone (well, the simulator) using MonoTouch. But there are many more options\
    \ available. In the rest of the chapter, we'll concentrate on how to create the\
    \ same test application with a couple of the more stable and popular options available,\
    \ using languages other than Objective-C and .NET that might be familiar to you,\
    \ and in some cases, even running on a Microsoft Windows-based PC.\n\n### Using\
    \ Appcelerator's Titanium Mobile\n\nThe Appcelerator Titanium Mobile platform\
    \ was created to support the cross-platform development of native applications\
    \ for mobile, tablet, and desktop devices using languages that are perhaps more\
    \ common and leveraging the JavaScript-based API. The Titanium Mobile SDK works\
    \ with the native SDK toolchains (in Apple's case, the iOS SDK) to combine your\
    \ JavaScript source code, a JavaScript interpreter, and your static assets into\
    \ an application executable that can be installed on an emulator or mobile device.\n\
    \nNote that, due to Apple's licensing agreement, Titanium Mobile has restrictions\
    \ on which platforms can be used to target which mobile devices and operating\
    \ systems. [Table 3-1](#Chapter03.html#tab_3_1) summarizes the support options.\n\
    \n![images](images/t0301.jpg)\n\nDespite these restrictions, it is worth noting\
    \ that it's free to get started, and we'll be focusing on the Mac OS X operating\
    \ system. As with our MonoTouch example, we'll install Titanium Mobile and then\
    \ use it to create our Hello, World iPhone application. The difference is that\
    \ this time, we'll be writing our code in JavaScript."
  raw: '##### Installing MonoTouch


    Finally, to complete the “Mono trilogy,” we''ll look at how to obtain and install
    MonoTouch. The first thing to note is that MonoTouch is not free. Depending the
    version you require, it can cost anything from $99 to $3,999! Consider the chart
    in [Figure 3–6](#Chapter03.html#fig_3_6), taken from the MonoTouch web site, which
    details the different features and the associated prices.


    ![images](images/0306.jpg)


    **Figure 3–6.** *MonoTouch version feature comparison*


    The key takeaway point here is that for you to use MonoTouch to create applications
    that are distributable via Apple''s App Store, you need the Professional edition,
    which costs $399\. A Student edition also is available, at a cost of $79\. This
    edition allows you to create applications, but distribution onto Apple devices
    is possible only via ad hoc deployment—not the App Store." We''ll discuss distributing
    your applications in [Chapter 9](#Chapter09.html#ch9).


    For the moment, let''s start with the trial version, which doesn''t cost anything.
    Although it doesn''t allow distribution via the App Store, it does permit you
    to test your application on the iPhone/iPad simulator. Visit [`http://monotouch.net/DownloadTrial`](http://monotouch.net/DownloadTrial),
    enter your email address, and click the Download button to obtain the trial version.


    Start the installation by clicking the downloaded package. This will launch the
    installer, as shown in [Figure 3–7](#Chapter03.html#fig_3_7). Follow the installation
    instructions. When installation is complete, the installer should take you to
    a web page containing the release notes for the version of MonoTouch just installed.


    ![images](images/0307.jpg)


    **Figure 3–7.** *Running the MonoTouch installer*


    You can start to use MonoTouch immediately, but this requires that you use the
    command-line functions to ensure that the applications you develop are built against
    the MonoTouch licenses. If you prefer to use MonoDevelop, that is possible. However,
    you''ll notice that within the version of MonoDevelop we installed, there are
    no such MonoTouch templates. At the time of writing, you will need to download
    and install a special version of MonoDevelop, updated to recognize the MonoTouch
    SDK. This is available from [`http://monodevelop.com/Download/Mac_MonoTouch`](http://monodevelop.com/Download/Mac_MonoTouch).
    After it''s downloaded and selected for installation, installing it follows a
    similar process to the installation of the other version of MonoDevelop you installed
    previously. You simply need to drag the new version onto your `Applications` folder,
    and after being prompted to replace the version you have, the new version of MonoDevelop
    will be installed.


    Start MonoDevelop and choose Start a New Solution as before. This time, when you
    expand either the C# or VBNet projects, you will notice options for the iPhone
    and iPad projects of different types, as shown in [Figure 3–8](#Chapter03.html#fig_3_8).


    ![images](images/0308.jpg)


    **Figure 3–8.** *MonoDevelop with MonoTouch project templates added*


    #### Creating Hello, World Using MonoTouch


    Let''s build our Hello, World application. Just as you did when we used Xcode
    4 in the previous chapter, start by selecting the iPhone Window-based Project
    and enter the name and location as you prefer. After you select Forward, a project
    with the default files and implementation for an iPhone Windows-based project
    will be created, as shown in [Figure 3–9](#Chapter03.html#fig_3_9).


    ![images](images/0309.jpg)


    **Figure 3–9.** *Default iPhone Windows-based application in MonoDevelop*


    A quick inspection will show some similarities to the Xcode project we created
    in [Chapter 2](#Chapter02.html#ch2). Both have a `main.cs` file with an `AppDelegate`
    instance created, making the default window key and visible. This shouldn''t surprise
    you. It''s using the Cocoa API, but with a .NET implementation.


    Go ahead and build and run this application. It''s not as fast as Xcode, but then
    again, it wouldn''t be given the additional levels of abstraction. Your application
    will eventually launch in the iPhone simulator. Although it''s a blank window
    (at the moment), it''s your first iPhone app in .NET!


    In keeping with our Xcode example, let''s add a specific view and associated view
    controller to display our label and allow us to initialize it with the text “Hello,
    World.” The key difference is that in this instance, we''ll being working in .NET.


    Thankfully, adding a view and view controller to our project is really easy in
    MonoDevelop. With the project selected, select the `File` ![images](images/U001.jpg)
    `New` ![images](images/U001.jpg) `File` menu option to open the New File dialog.
    Expand the C# tree, and then select iPad View with Controller, as shown in [Figure
    3–10](#Chapter03.html#fig_3_10). Then choose New to add these files to your project,
    again with a default structure and implementation for you to complete.


    ![images](images/0310.jpg)


    **Figure 3–10.** *MonoDevelop New File dialog*


    As you did in the Xcode example, select the `HellowWorldView.xib` file. This will
    launch Interface Builder. Continue to add a label and hook it up as an outlet,
    as per the Xcode 4 example in the previous chapter.


    Now we can set the text value. Once our code is hooked up, we can simply override
    the `ViewDidLoad()` method of the `ViewController` class, and within this, access
    the label user object by name, like so:


    `public override void ViewDidLoad ()`

    `{`

    `        base.ViewDidLoad();`

    `        lbl.Text = @"Hello, World";`

    `}`


    If you now run the application, your MonoTouch-based iPhone app will behave exactly
    the same as your Xcode 4 iPhone app, and display “Hello, World” on the device.


    We''ve taken a look at how to install and create applications—including our now
    infamous Hello, World application—running on an iPhone (well, the simulator) using
    MonoTouch. But there are many more options available. In the rest of the chapter,
    we''ll concentrate on how to create the same test application with a couple of
    the more stable and popular options available, using languages other than Objective-C
    and .NET that might be familiar to you, and in some cases, even running on a Microsoft
    Windows-based PC.


    ### Using Appcelerator''s Titanium Mobile


    The Appcelerator Titanium Mobile platform was created to support the cross-platform
    development of native applications for mobile, tablet, and desktop devices using
    languages that are perhaps more common and leveraging the JavaScript-based API.
    The Titanium Mobile SDK works with the native SDK toolchains (in Apple''s case,
    the iOS SDK) to combine your JavaScript source code, a JavaScript interpreter,
    and your static assets into an application executable that can be installed on
    an emulator or mobile device.


    Note that, due to Apple''s licensing agreement, Titanium Mobile has restrictions
    on which platforms can be used to target which mobile devices and operating systems.
    [Table 3-1](#Chapter03.html#tab_3_1) summarizes the support options.


    ![images](images/t0301.jpg)


    Despite these restrictions, it is worth noting that it''s free to get started,
    and we''ll be focusing on the Mac OS X operating system. As with our MonoTouch
    example, we''ll install Titanium Mobile and then use it to create our Hello, World
    iPhone application. The difference is that this time, we''ll be writing our code
    in JavaScript.'
