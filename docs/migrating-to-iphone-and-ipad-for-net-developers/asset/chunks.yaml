- fmt: '# Core Services


    Core Services provides fundamental system services that all applications use,
    either directly or through other frameworks. Its key frameworks are as follows:


    - **AddressBook (`AddressBook.framework`)**: Provides an API that allows programmatic
    access to the contacts stored in the mobile device.

    - **CFNetwork (`CFNetwork.framework`)**: Provides high-performance and low-level
    access to the network protocols available to the device.

    - **Core Data (`CoreData.framework`)**: Provides functionality along with Xcode
    to manage your application data using a schema that is visually defined in Xcode
    and a support API to manage the data. This is ideally suited to the MVC pattern
    and can significantly reduce the amount of code required.

    - **Core Telephony (`CoreTelephony.framework`)**: Provides functionality for interacting
    with the telephony features of a compatible mobile device.

    - **Event Kit (`EventKit.framework`)**: Provides support for accessing calendar
    events on your device.

    - **Foundation (`Foundation.framework`)**: Provides an Objective-C–based API around
    support for core data types and functions.

    - **Store Kit (`StoreKit.framework`)**: Provides support for purchasing content
    and services from within your application, such as additional content.

    - **Systems Configuration (`SystemsConfiguration.framework`)**: Provides access
    to network configuration details of your device such as Wi-Fi or cellular connection
    capabilities.


    ## Runtime Services


    The frameworks and class libraries we''ve discussed so far can''t exist without
    the support of a core platform on which they run. In the case of the .NET Framework,
    low-level runtime services are provided through a combination of the CLR, low-level
    Core Services, and the operating system. In the iOS SDK, such capabilities are
    provided by the iOS and the Core OS layer that exposes the same kind of low-level
    functionality supported in the low-level runtime services and the CLR.


    Here, we start to see some of the key differences. For example, the .NET Framework
    creates applications that run in a managed environment provided by the CLR. They
    are not native applications, but interpreted applications. Using the iOS SDK,
    this creates native applications that are not interpreted by any kind of runtime,
    but instead rely on the operating system- and SDK-provided services directly to
    support the application''s execution.


    The following are examples of the capabilities provided within the CLR:


    - **Memory management:** Provides the automatic allocation and reclaiming of memory
    used by applications. This kind of memory management goes a step further than
    the reference counting provided within the iOS, where you programmatically free
    up resources no longer required.

    - **Type management**: Ensures the runtime type safety of core data types and
    is an essential ingredient in cross-platform, multilanguage capabilities.

    - **Security:** Provides security features, such as the signing of code and access-control
    features.

    - **Multitasking:** Supports multithreaded applications where multiple tasks can
    appear to run simultaneously and be scheduled across multiple processors.

    - **Exception handling:** Provides support for exception trapping and handing.

    - **Delegation:** Improves on the existing inheritance and interface capabilities
    to provide delegation enabling you to implement pointers to functions for runtime
    execution.


    Similar capabilities to those just listed are provided for within the iOS SDK,
    but they do not completely match. This is partly due to the fact that we are dealing
    with native applications that run directly on top of the operating system rather
    than a container/runtime like the CLR—unless you''re using Mono and MonoTouch!


    Let''s take a look at some of the key frameworks within the iOS SDK:


    - **System:** Provides the lowest level capabilities above the operating system
    and exposes the kernel environment, drivers, and the UNIX interfaces of the operating
    system. This includes memory allocation, threading, filesystem access, math computations,
    locale information, and more.

    - **Security (`Security.framework`):** Enhances the built-in features of the device
    to provide programmatic and application security features, such as signing applications
    for authenticity, cryptographic key management, and support for keychain sharing.

    - **External Accessory (`ExternalAccessory.framework`):** Supports communicating
    with external hardware connected to your device.

    - **Accelerate Framework (`Accelerate.framework`):** Provides support for computationally
    intensive applications by providing interfaces for complex math, big number calculations,
    and so on.


    ### Objective-C Primer, Part 2


    [Chapter 2](#Chapter02.html#ch2) provided a short introduction to some of the
    essentials required to start developing your mobile application. Before we start
    to really put the iOS SDK to work and focus on the specific aspects of mobile
    applications, you''ll need to understand a few more essentials of the Objective-C
    language. Learning about some of these slightly more advanced features will better
    prepare you to not only write your own applications, but also to understand how
    the iOS SDK itself is constructed.


    In the following sections, in order to assist your transition from .NET, I''ll
    introduce each by its .NET language term, rather than the Objective-C term, and
    make comparisons between the languages.


    #### Class Declaration


    Both .NET and Objective-C are object-oriented languages, and so the definition
    of a class is a key construct for the language. Consider the following Objective-C
    and .NET C# examples, shown together.


    | **.NET C#** | `Class AClass : Object` `{`

    `intaValue;`


    `void doNothing();`

    `StringreturnString();`

    `}` |

    |-------------|---------------------------------------------------------------------------------------------------------|

    | **Objective-C** | `@interfaceAClass : NSObject` `{`

    `intaValue;`

    `}`

    `- (void)doNothing();`

    `+ (NSString)returnString();`

    `@end` |


    Both of these code segments declare a new class object that inherits from an object
    class. It has a default integer member variable called `aValue`, and two methods.
    One method is called `doNothing()` and returns nothing and takes no parameters.
    The other method is `returnString()`, which returns a string but also takes no
    parameters.


    You may also notice that different characters precede the method declarations.
    This is significant, as you''ll learn in the next section.'
