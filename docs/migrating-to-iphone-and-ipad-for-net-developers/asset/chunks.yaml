- fmt: "在展开的“Link Binary with Libraries”选项下，你会注意到默认已引用了三个库：`UIKit.framework`、`Foundation.framework`和`CoreGraphic.framework`。点击“+”图标将显示一个对话框，允许你选择其他库。如[图8-7](#Chapter08.html#fig_8_7)所示，你可以从默认的iOS\
    \ SDK列表中选择，或点击“Add Other”。\n\n![images](images/0807.jpg)\n\n**Figure 8-7.** 向构建阶段添加库\n\
    \n选择“Add Other”，你将看到一个对话框，允许你导航到要包含的库的位置。如[图8-8](#Chapter08.html#fig_8_8)所示，导航到之前静态库项目构建的库。\n\
    \n![images](images/0808.jpg)\n\n**Figure 8-8.** 选择要添加的库\n\n选择该库并点击“Open”。这将把该库添加到与应用构建链接的库列表中，如[图8-9](#Chapter08.html#fig_8_9)所示。\n\
    \n![images](images/0809.jpg)\n\n**Figure 8-9.** 链接到项目构建的库列表\n\n现在，我们可以完成项目以测试我们的库。首先，将`HighScore.h`头文件添加到你的项目中。接下来，我们可以添加一些测试代码。为此，复制我们在前一个示例中使用的代码，并将其放置在主视图控制器的`viewDidLoad`事件方法中（位于`MainViewController.m`中）。这意味着当应用启动且视图加载时，测试代码将执行。你需要取消注释事件代码，并确保它看起来与[列表8-1](#Chapter08.html#list_8_1)中所示类似。\n\
    \n**Listing 8-1.** 测试代码\n\n```\n// Implement viewDidLoad to do additional setup\
    \ after loading the view, typically from a nib.\n- (void)viewDidLoad\n{\n    [super\
    \ viewDidLoad];\n    HighScore *hs = [[HighScore alloc]init];\n\n    HighScoreEntry\
    \ *e1 = [[HighScoreEntry alloc]initWithParameters:@\"Mark\":900];\n    [hs addHighScoreEntry:(e1)];\n\
    \n    HighScoreEntry *e2 = [[HighScoreEntry alloc]initWithParameters:@\"Rachel\"\
    :700];\n    [hs addHighScoreEntry:(e2)];\n\n    HighScoreEntry *e3 = [[HighScoreEntry\
    \ alloc]initWithParameters:@\"Oliver\":500];\n    [hs addHighScoreEntry:(e3)];\n\
    \n    HighScoreEntry *e4 = [[HighScoreEntry alloc]initWithParameters:@\"Harry\"\
    :300];\n    [hs addHighScoreEntry:(e4)];\n\n    HighScoreEntry *e5 = [[HighScoreEntry\
    \ alloc]initWithParameters:@\"Tanya\": ];\n    [hs addHighScoreEntry:(e5)];\n\n\
    \    [hs persist];\n\n    [hs readHighScores];\n\n    [hs release];\n}\n```\n\n\
    别忘了为数据库支持添加对`libsqlite3.dylib`的引用，然后构建并执行你的应用。你应该在调试窗口中看到与之前相同的输出，因为我们没有移除这段测试代码。输出应与以下内容类似：\n\
    \n```\n2011-08-18 21:29:39.639 StaticLibraryHarness[1034:207] NAME: Mark SCORE:\
    \ 900\n2011-08-18 21:29:39.641 StaticLibraryHarness[1034:207] NAME: Rachel SCORE:\
    \ 700\n2011-08-18 21:29:39.641 StaticLibraryHarness[1034:207] NAME: Oliver SCORE:\
    \ 500\n2011-08-18 21:29:39.642 StaticLibraryHarness[1034:207] NAME: Harry SCORE:\
    \ 300\n```\n\n现在，你已经创建了第一个静态库，并从另一个应用引用了它。如果你的静态库包含某些“必备”功能，那么只需分发该库和头文件即可供其他人使用。第三方库制造商正是使用这种机制来共享和部署他们的库，通常通过配置文件（provisioning\
    \ profile）进行。\n\n### 在.NET中创建程序集\n\n在.NET中创建程序集很简单，并且与Xcode 4中展示的方法类似。你可以直接创建一个空白的Visual\
    \ Studio C#解决方案，并添加定义类及其功能的库代码，代码位于给定的命名空间中，如下所示：\n\n```\nUsing System;\nUsing\
    \ System.Text;\nUsing System.Windows.Forms;\nNamespace TestLibrary\n{\n      \
    \  public static class Test\n{\n        public static void TestMethod()\n    \
    \    {\n                MessageBox.Show(\"You are in my library\");\n        }\n\
    }\n}\n```\n\n构建这个简单的示例将生成一个`.dll`文件，这是一个动态库，你可以在另一个项目中引用它，然后从`Test`类的实例调用`TestMethod()`。确保在你的项目引用中引用了该库。\n\
    \n注意，这是一个私有程序集，类似于静态库，与你的应用链接。如果你希望它在多个程序之间共享（存储在.NET环境的全局程序集缓存中），则需要做一些额外的工作，使其成为一个强名称程序集。这将允许它进行版本控制和身份验证。我们不会在此详述，但这里有一个提示：请查看名为`sn.exe`的命令行实用工具。\n\
    \n### Apple开发者协议\n\n当你注册并支付订阅费用成为Apple开发者计划的一员时，你将获得一份Apple开发者协议。该文档描述了Apple允许你在使用其工具和技术时的行为。该文档受保密协议（NDA）保护，这意味着你在加入之前不允许了解其内容，加入后也不允许分享其内容！然而，通过信息自由法案请求，已有副本泄露到互联网上。\n\
    \n关于库的更广泛使用，该协议在较为宽松的形式下（于2010年生效）在第3.3节（应用的程序要求）中定义了某些条件，描述了编写应用时需要考虑的一些限制。这些条件如下：\n\
    \n-   使用iOS SDK制作的应用只能通过App Store分发，这实质上意味着像Cydia这样的黑市应用分发网络违反了协议。\n-   不允许逆向工程，也不允许使他人能够进行逆向工程。\n\
    -   Apple可以随时撤销你的应用在App Store中的成员资格，即使应用已经获得批准。\n-   你只能按规定方式使用文档化的API。不得调用任何私有API。\n\
    \n**注意：** 直到2010年晚些时候，这里总结的要求才生效。此前，Apple对支持的语言有具体规定，这意味着像MonoTouch这样的第三方框架存在不合规的风险。\n\
    \n如果你不遵守这些限制，将违反协议，Apple可能会拒绝任何提交到App Store的应用。但只要生成的软件不下载任何代码且符合API使用规范，就应该是允许的。\n\
    \n我们将在[第9章](#Chapter09.html#ch9)中进一步讨论Apple开发者协议，该章节涉及部署。\n\n### 第三方库\n\n我们已经确认Apple最终清醒过来并解除了之前的限制，这意味着第三方库得到了更广泛的支持。我们还了解了存在哪些类型的库，以及如何根据Apple开发者协议使用它们。\n\
    \n在[第3章](#Chapter03.html#ch3)中，我们研究了用于编写应用的第三方解决方案。这些第三方框架附带了一系列提供所需功能的库，因此它们总是一个选择。但如果你想要一个更小、更具体的库来提供扩展应用的功能呢？那么，你会很高兴听到它们确实存在。实际上，利用你学到的关于编写库的知识，你甚至可以发布自己的第三方库并从中获利。\n\
    \n首先，我们将介绍第三方库的两个类别，然后回顾一些目前可用的更有用的库。"
  raw: 'Under the expanded Link Binary with Libraries selection, you will notice that
    three libraries are already referenced by default: `UIKit.framework`, `Foundation.framework`,
    and `CoreGraphic.framework`. Choosing the + icon will display a dialog box allowing
    you to choose another library. As shown in [Figure 8–7](#Chapter08.html#fig_8_7),
    you can select from the default iOS SDK list or click Add Other.


    ![images](images/0807.jpg)


    **Figure 8–7.** *Adding a library to your build phase*


    Choose Add Other, and you''ll see a dialog box that allows you to navigate to
    the location of the library you wish to include. As shown in [Figure 8–8](#Chapter08.html#fig_8_8),
    navigate to the library built by the previous static library project.


    ![images](images/0808.jpg)


    **Figure 8–8.** *Choosing the library to add*


    Select the library and choose Open. This will add the library to the list of libraries
    linked with the build of your application, as shown in [Figure 8–9](#Chapter08.html#fig_8_9).


    ![images](images/0809.jpg)


    **Figure 8–9.** *List of libraries to be linked to your project build*


    Now we can complete the project in order to test our library. First, add the `HighScore.h`
    header file to your project. Next, we can add some test harness code. For this,
    copy the code we used in the previous example and place it in the `viewDidLoad`
    event method of our main view controller (in `MainViewController.m`). This means
    when the application is started and the view loaded, our test harness code will
    execute. You''ll need to uncomment the event code and ensure it looks similar
    to that shown in [Listing 8-1](#Chapter08.html#list_8_1).


    **Listing 8-1.** *Test Harness Code*


    `// Implement viewDidLoad to do additional setup after loading the view, typically
    from`![images](images/U002.jpg)

    `a nib.`

    `- (void)viewDidLoad`

    `{`

    `    [super viewDidLoad];`

    `    HighScore *hs = [[HighScore alloc]init];`


    `    HighScoreEntry *e1 = [[HighScoreEntry alloc]initWithParameters:@"Mark":900];`

    `    [hs addHighScoreEntry:(e1)];`


    `    HighScoreEntry *e2 = [[HighScoreEntry alloc]initWithParameters:@"Rachel":700];`

    `    [hs addHighScoreEntry:(e2)];`


    `    HighScoreEntry *e3 = [[HighScoreEntry alloc]initWithParameters:@"Oliver":500];`

    `    [hs addHighScoreEntry:(e3)];`


    `    HighScoreEntry *e4 = [[HighScoreEntry alloc]initWithParameters:@"Harry":300];`

    `    [hs addHighScoreEntry:(e4)];`


    `    HighScoreEntry *e5 = [[HighScoreEntry alloc]initWithParameters:@"Tanya":
    ];`

    `    [hs addHighScoreEntry:(e5)];`


    `    [hs persist];`


    `    [hs readHighScores];`


    `    [hs release];`


    `}`


    Don''t forget to also add a reference to the `libsqlite3.dylib` for our database
    support, and then build and execute your application. You should see the same
    output in the debug window as before, because we didn''t remove this test code.
    It should look similar to the following:


    `2011-08–18 21:29:39.639 StaticLibraryHarness[1034:207] NAME: Mark SCORE: 900`

    `2011-08–18 21:29:39.641 StaticLibraryHarness[1034:207] NAME: Rachel SCORE: 700`

    `2011-08–18 21:29:39.641 StaticLibraryHarness[1034:207] NAME: Oliver SCORE: 500`

    `2011-08–18 21:29:39.642 StaticLibraryHarness[1034:207] NAME: Harry SCORE: 300`


    You have now created your first static library and referenced it from another
    application. If your static library contained some “must-have” functionality,
    simply distributing this library and the header file is all that would be required
    for another person to use it. It''s this mechanism that third-party library makers
    use to share and deploy their libraries, usually in a provisioning profile.


    #### Creating an Assembly in .NET


    Creating an assembly in .NET is straightforward and similar to the method shown
    for Xcode 4\. You can simply start by creating a blank Visual Studio C# solution
    and adding your library code that defines a class and its functionality within
    a given namespace, as follows:


    `Using System;`

    `Using System.Text;`

    `Using System.Windows.Forms;`

    `Namespace TestLibrary`

    `{`

    `        public static class Test`

    `{`

    `        public static void TestMethod()`

    `        {`

    `                MessageBox.Show("You are in my library");`

    `        }`

    `}`

    `}`


    Building this simple example will result in a `.dll` file, which is a dynamic
    library that you can reference in another project, and then call the `TestMethod()`
    from a class instance of `Test`. Make sure you reference the library in your project
    references.


    Note that this is a private assembly and is linked to your application, a bit
    like a static library. If you wanted this to be shared among many programs (stored
    in the Global Assembly Cache of your .NET environment), then you would need to
    do a little more work and make it a strong-named assembly. This allows it to be
    versioned and authenticated. We won''t go into the details here, but here''s a
    hint: look at the command-line utility called `sn.exe`.


    ### The Apple Developer Agreement


    When registering and paying for your subscription to be part of the Apple Developer
    Program, you will be provided with a copy of the Apple Developer Agreement, a
    document that describes what is permissible by Apple when using their tools and
    technologies. The document is protected by a nondisclosure agreement (NDA), which
    means you are not allowed to know what''s in it before you join. And when you
    have joined, you''re not allowed to share its content! However, copies have been
    leaked to the Internet through Freedom of Information Act requests.


    Around the use of libraries more broadly, the Agreement in its more relaxed form
    (which was put into effect in 2010), defines certain conditions under paragraph
    3.3 (Program Requirements for Applications), which describes some restrictions
    to consider when writing your application. These conditions are as follows:


    *   Applications made with the iOS SDK can be distributed only through the App
    Store, essentially meaning that black-market application distribution networks
    such as Cydia are in breach of the agreement.

    *   Reverse-engineering is not permitted. Also, enabling others to do reverse-engineering
    is not permitted.

    *   Apple may revoke your application''s membership from the App Store at any
    time, even after it has already been approved.

    *   You may use only document APIs and in the manner prescribed. You must not
    call any private APIs.


    **NOTE:** It wasn''t until much later in 2010 that the requirements summarized
    here went into effect. Previously, Apple was specific about the languages supported,
    which meant third-party frameworks such as MonoTouch were in danger of being noncompliant.


    If you don''t follow these restrictions, you''ll be in breach of the Agreement,
    and Apple may choose to reject any application submitted to Apple''s App Store.
    But as long as the resulting application does not download any code and conforms
    to API usage, it should be permissible.


    We''ll talk more about the Apple Developer Agreement in [Chapter 9](#Chapter09.html#ch9),
    which covers deployment.


    ### Third-Party Libraries


    We''ve established that Apple finally saw sense and lifted previous restrictions,
    which means that third-party libraries are more broadly supported. We''ve also
    established which kinds of libraries exist and how you can use them under the
    Apple Developer Agreement.


    In [Chapter 3](#Chapter03.html#ch3), we looked at third-party solutions for writing
    applications. These third-party frameworks come with a suite of libraries that
    provide the required functionality, so they are always an option. But what if
    you want a smaller, more specific library to provide functionality that will extend
    your application? Well, you''ll be pleased to hear that they exist. Indeed, using
    the information you garnered about writing libraries, you could even publish and
    make money from your own third-party libraries.


    First, we''ll look at the two categories of third-party libraries, and then we''ll
    review some of the more useful libraries currently available.'
