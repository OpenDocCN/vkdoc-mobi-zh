- fmt: '### Info Button


    The info button is used to provide access to a configuration screen for your application.
    It''s implemented using a `UIButton` class and the `buttonType` property to indicate
    it''s an info button, which thus provides the right image as shown in [Figure
    6–31](#Chapter06.html#fig_6_31).


    ![images](images/0631.jpg)


    **Figure 6–31.** *Info button*


    Again, there is no equivalent in the .NET framework, but you could implement similar
    functionality using the `Button` class and a suitable image.


    ### Page Indicator


    The page indicator, implemented by the `UIPageControl` class, provides a useful
    visual indicator of which view is currently open within the bounds of the totals
    views available, as shown in [Figure 6–32](#Chapter06.html#fig_6_32).


    ![images](images/0632.jpg)


    **Figure 6–32.** *Page indicator*


    As you open a view, a dot is added to represent the active or displayed view''s
    place in the sequence. After 20 dots, the control clips any more dots so they
    aren''t displayed. (I would argue that if you''re displaying this many dots, you
    should rethink your user interface design.)


    There is no .NET equivalent.


    ### Search Bar


    The search bar control, implemented through the `UISearchBar` class, allows the
    user to enter a text string and choose to execute a search by tapping the magnifying
    glass. It also lets you present common information using the bookmark icon. See
    [Figure 6–33](#Chapter06.html#fig_6_33).


    ![images](images/0633.jpg)


    **Figure 6–33.** *Search bar control*


    There is no direct .NET equivalent control.


    ### Switch


    The switch control, implemented through the `UISwitch` class, allows the user
    to choose between options that are mutually exclusive, such as ON or OFF. See
    [Figure 6–34](#Chapter06.html#fig_6_34).


    ![images](images/0634.jpg)


    **Figure 6–34.** *Switch control*


    There is no equivalent control in .NET, at least not in look and feel, although
    a Checkbox performs the same function: it can be checked (ON) or unchecked (OFF).


    ### Segmented Control


    A segmented control, implemented through the `UISegmentedControl` class, provides
    a method for displaying a set of segments, each of which behaves like a button
    and can display a corresponding view. An example is shown in [Figure 6–35](#Chapter06.html#fig_6_35).


    ![images](images/0635.jpg)


    **Figure 6–35.** *Segmented control*


    The segmented control provides a convenient way to group related buttons and can
    display either text or an image as the face of each button. The buttons are mutually
    exclusive, and you can have as many segments as you wish, differentiating it from
    the switch control.


    Again, there is no .NET equivalent control, although the use of mutually exclusive
    radio buttons in .NET offers similar functionality.


    ### Common Controls


    A number of common controls are available in the iOS UIKit framework for which
    a direct .NET equivalent is available. Their usage and behavior are almost identical
    to their .NET counterparts, so for brevity I don''t describe them in detail. These
    controls are shown in [Table 6-2](#Chapter06.html#tab_6_2).


    ![images](images/t0602.jpg)


    Let''s take a look at other user interface elements included in the UIKit. Don''t
    forget that you can use the Apple Developer resources to explore the vast array
    of user interface controls in the UIKit framework of the SDK; and making the correlation
    (where one exists) to .NET controls is pretty straightforward, as you''ve seen
    from the examples in this section.


    ## Navigation and Information Bars


    There are a number of user interface elements that are not typically used to define
    your application but either provide information to the user or manage how you
    navigate your way around your application. These elements are called *bars,* and
    they include status bars, toolbars, navigation bars, and tab bars—the latter of
    which you saw earlier in the chapter.


    ### Status Bar


    The status bar is used to display important information to the user and always
    appears in the upper edge of your device screen, regardless of the orientation
    of your device. Additionally, although on the iPhone you have some control over
    the color of your status bar, on the iPad the color is fixed as black. You can
    see the iPhone status bar in [Figure 6–36](#Chapter06.html#fig_6_36).


    ![images](images/0636.jpg)


    **Figure 6–36.** *Status Bar*


    You implement the status bar by setting the `UIStatusBarStyle` for your `UIApplication`
    or using an `Info.plist` value (`UIStatusBarHidden`) to hide it. The Apple Developer
    usage guidelines are quite specific: if your application is a game or full-screen,
    then the status bar typically may be hidden; otherwise the recommendation is that
    it be displayed, especially given the small amount of space it takes.


    The `StatusBar` class in the .NET framework offers similar functionality.


    ### Toolbar


    A toolbar, implemented by the `UIToolbar` class, is pretty well understood in
    most graphical user interfaces, and the behavior for iOS devices is no different.
    It''s used to provide graphical images that, when tapped, perform actions in your
    application. You typically place common actions on the toolbar for ease of use.
    You can see a toolbar in [Figure 6–37](#Chapter06.html#fig_6_37).


    ![images](images/0637.jpg)


    **Figure 6–37.** *Toolbar*


    The toolbar is located on the bottom edge of the screen for iPhone applications
    and at either edge for iPad applications, depending on the orientation and which
    edge you snap the control to. The items on the toolbar are context sensitive,
    which means they reflect actions that are typically performed against the associated
    view and for that reason may change between views.


    The `Toolbar` class in the .NET framework provides equivalent functionality.


    ### Navigation Bar


    The navigation bar, implemented by the `UINavigationBar` class, is used to manage
    navigation through a hierarchy of views and is usually associated with the navigation
    controller. It''s shown in [Figure 6–38](#Chapter06.html#fig_6_38).


    ![images](images/0638.jpg)


    **Figure 6–38.** *Navigation bar*


    Navigation bars are common in iOS applications when you''re dealing with different
    views or a tab bar isn''t appropriate. However, although their use is relatively
    straightforward, it''s beyond this chapter, and the iOS Developer web site does
    a good job of describing it. So, the implementation of the navigation bar and
    associated controller is left to you, armed with the iOS developer web site: [`http://developer.apple.com/library/ios/#featuredarticles/ViewControllerPGforiPhoneOS/NavigationControllers/`](http://developer.apple.com/library/ios/#featuredarticles/ViewControllerPGforiPhoneOS/NavigationControllers/).


    There is no equivalent to the navigation bar in the .NET framework.


    ## Content Views


    The iOS SDK provides a number of user interface elements intended to present custom
    content back to the user from your application. You''ve seen two iPad-specific
    views, the split view and the popover, but a number exist for the iPhone too.


    You walk through these in turn; they are commonly used in iPhone applications
    because of the useful capabilities they provide.'
