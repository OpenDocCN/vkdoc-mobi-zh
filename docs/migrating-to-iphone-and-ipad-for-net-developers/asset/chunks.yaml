    in [Figure 1–10](#Chapter01.html#fig_1_10)), iPod touch, and iPad. For Mac laptop
    and desktop users, the Mac App Store was launched more recently to cater to nonmobile
    applications.


    ![images](images/0110.jpg)


    **Figure 1–10.** *App Store on the iPhone 4*


    The App Store has been tremendously successful for both Apple and application
    producers, with the billionth application download boundary broken back in 2009\.
    As mentioned, the concept has been mimicked by other organizations, most notably
    the other major mobile service providers. [Figure 1–11](#Chapter01.html#fig_1_11)
    shows the global revenue share among these platforms. Apple''s dominance is obvious.


    ![images](images/0111.jpg)


    **Figure 1–11.** *Global mobile application store revenues*


    #### Selling Apps at the App Store


    The App Store revenue model is to split the proceeds from any sale: 30% to Apple
    and 70% to the app publisher (this is subject to change at any time). The model
    has proven immensely profitable for both Apple and many application producers.
    The term *app* (short for application) has also been used more broadly, and despite
    Apple being awarded a trademark for the term, it has been used in a similar context
    by others, such as Google (*Google Apps*) and Amazon.


    **NOTE:** All native apps can be legitimately downloaded onto a mobile Apple device
    only through the App Store, unless the device has been jailbroken. *Jailbreaking*
    a device refers to using the process that gives access to the device''s root filesystem,
    allowing modification and installation of third-party software components. It''s
    not illegal, although Apple is sensitive to the topic and has stated that it may
    “void the warranty” for the device. Jailbreaking doesn''t require any changes
    to the hardware and can be easily reversed.


    More recently, Apple announced its new subscription-based service that allows
    application publishers to set the length and price of a subscription. Previously,
    this wasn''t possible, and you were forced to sell each release on a per-release
    basis. The new service allows publishers to sell their content through their apps,
    and users can receive new content over a specified period of time.


    A more significant change is that not only is the traditional model of selling
    through iTunes available, but Apple is also allowing app publishers to distribute
    their subscriptions directly from their own web sites, where the iTunes revenue
    model doesn''t apply and so no revenue is shared with Apple. This obviously has
    the advantage of removing the obligation of contributing some of your application
    earnings to Apple, but it does mean that you lose the benefits of the App Store,
    such as audience reach and accessibility, and must rely on your own marketing
    campaigns.'
