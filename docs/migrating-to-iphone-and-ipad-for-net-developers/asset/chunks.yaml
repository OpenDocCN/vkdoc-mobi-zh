- fmt: "### Rotation\n\nYou won’t cover rotating both left and right because they\
    \ mirror each other. Let’s look at what you need to do to rotate left. This method\
    \ does of course assume the existence of a fuel tank, initialized with an initial\
    \ value (here the value 1000) and that you pass the total number of seconds the\
    \ rotation key was held down. Your method looks as follows:\n\n```\n// rotateLeft\
    \ - rotate the lander left\n- (void)rotateLeft:(float) totalseconds\n{\n    //\
    \ You can't thrust if you've no fuel\n    if (fuel <0)\n        return;\n\n  \
    \  // Rotate left\n    rotationMomentum -= M_PI / 2.0f * totalseconds;\n\n   \
    \ // Burn fuel\n    fuel -= 0.5 // fuel burn evey time you thrust\n}\n```\n\n\
    The obvious difference for rotating right is that you increase the `rotationMomentum`\
    \ value rather than decrease it.\n\n### Enabling User Interaction\n\nThe user\
    \ is obviously required to interact with the game, although how you do this is\
    \ up to you. Some options are to detect keypresses, or use onscreen images to\
    \ detect a tap, or even use the accelerometer to detect the device being tipped\
    \ left or right. In any case, you need to interpret the actions, and the following\
    \ keys are used to interact with the lander. Doing nothing simply lets the lander\
    \ drop to the ground as gravity is applied. For your lander, you do the following.\n\
    \n*   If the up arrow is pressed, onscreen or on the keyboard, the thruster is\
    \ being fired.\n*   If the left arrow is pressed, onscreen or on the keyboard,\
    \ the lander is rotating left.\n*   If the right arrow is pressed, onscreen or\
    \ on the keyboard, the lander is rotating right.\n\n### Catching Game Events\n\
    \nYou need to monitor some additional game events: for example, detecting when\
    \ you hit the ground and the speed at which you hit. This is fairly straightforward\
    \ using a combination of lunar lander y position and ground height and using the\
    \ speed of the lander as an indicator of whether you're moving too fast.\n\nThe\
    \ method only works when the ground is flat. If you decide to implement a Moon\
    \ surface that has different gradients, you need to detect this in your game—maybe\
    \ looking at the pixel values surrounding the lander.\n\n### Handling the Graphics\n\
    \nYour Lunar Lander implementation has already made provision to draw the graphics\
    \ for the game by implementing the `drawRect` method, although the default implementation\
    \ simply draws the same graphic (the nonthrusting lander) at the x and y location.\n\
    \nYou need to adjust this code to be representative of the other states, including\
    \ when the game is running, looking for when it should be thrusting or just dropping,\
    \ and drawing at the angle appropriate for the lander. The angle is obviously\
    \ in relation to the rotate-left or -right keypresses.\n\nTo rotate your image,\
    \ you could use the `rotateAt()` method in Microsoft .NET, but such a method doesn't\
    \ exist in Objective-C. Instead, you can use a simple macro to convert between\
    \ degrees and radians, the measure used by the `UImagerotate` equivalent called\
    \ `transform`. First define a macro something like the following:\n\n```\n#define\
    \ degreesToRadians(x) (M_PI * (x) / 180.0)\n```\n\nThen add the following line,\
    \ assuming the `deg` variable represents the degrees you wish to rotate by:\n\n\
    ```\nmyView.transform = CGAffineTransformMakeRotation(degreesToRadians(deg) );\n\
    ```\n\nIf you're interested in knowing more, the post at [`www.platinumball.net/blog/2010/01/31/iphone-uiimage-rotation-and-scaling/`](http://www.platinumball.net/blog/2010/01/31/iphone-uiimage-rotation-and-scaling/)\
    \ has a lot of detail about how to do image rotation and scaling.\n\n### Displaying\
    \ a High Score\n\nThis should be straightforward because you covered how to create\
    \ high-score code in [Chapter 8](#Chapter08.html), and you also looked at different\
    \ mechanisms for displaying a dynamic user interface in Chapter 6. Combining these\
    \ with the high-score mechanics of your game allows you to create a high-score\
    \ chart that can be displayed when the game is at the main menu.\n\n### Resources\n\
    \nIn addition to the information provided in this appendix to help you complete\
    \ the Lunar Lander game, and the additional code supplied with the book, the following\
    \ resources may help you complete and/or customize your game:\n\n*   *PhET Lunar\
    \ Lander:* Anumber of resources including an online version of the game, provided\
    \ as part of a teaching aid. [`http://phet.colorado.edu/en/simulation/lunar-lander`](http://phet.colorado.edu/en/simulation/lunar-lander).\n\
    *   *LunarView.java:* A Java-based implementation of the Lunar Lander game for\
    \ the Android mobile device. [`http://developer.android.com/resources/samples/LunarLander/src/com/example/android/lunarlander/LunarView.html`](http://developer.android.com/resources/samples/LunarLander/src/com/example/android/lunarlander/LunarView.html).\n\
    *   *Code Project:* A .NET-based implementation of the Lunar Lander game, written\
    \ in C#. [`http://www.codeproject.com/KB/game/lunarlander.aspx`](http://www.codeproject.com/KB/game/lunarlander.aspx).\n\
    *   *History of Lunar Lander:* Wikipedia's history of the Lunar Lander game. [`http://en.wikipedia.org/wiki/Lunar_Lander_(video_game)`](http://en.wikipedia.org/wiki/Lunar_Lander_(video_game))."
