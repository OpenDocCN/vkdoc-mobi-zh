    ![images](images/1001.jpg)


    **Figure 10–1.** *Using Google Maps to test the simulated GPS*


    You can do other things when the event is fired, using the `CLLocation` class.
    For example, you can calculate speed:


    `double gpsSpeed = newLocation.speed;`


    You can also look up the timestamp at which the coordinate was taken, or view
    the altitude in meters above (positive) or below (negative) sea level.


    The .NET framework provides for similar capabilities as part of its `System.Device.Location`
    namespace, although as you''d expect, its implementation differs slightly. For
    example, you use the `GeoCoordinateWatcher` object to acquire data from the .NET
    location service, similar to your delegate class. The `CLLocation` class is replicated
    by the `GeoCoordinate` class in .NET, providing similar properties relating to
    location. Finally, the `GeoPositionAccuracy` property in .NET controls accuracy
    with the same effect on device performance, but it has two options: default (optimized
    for accuracy and device performance) and high accuracy.


    As you can see, both SDKs have comparable features, and converting the code semantics
    from one to the other is relatively straightforward. You can find the .NET documentation
    at [`http://msdn.microsoft.com/en-you/library/system.device.location.aspx`](http://msdn.microsoft.com/en-you/library/system.device.location.aspx).


    The iOS SDK''s equivalent is at [`http://developer.apple.com/library/ios/#documentation/UserExperience/Conceptual/LocationAwarenessPG/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#documentation/UserExperience/Conceptual/LocationAwarenessPG/Introduction/Introduction.html).


    These are SDK-based capabilities, but other options always exist. If you are developing
    a web-based application, you can also consider HTML 5''sGeoLocationcapabilities.'
  trans: "\n# 定位服务概述\n\nSDK 提供一个名为 `LocationManager` 的类，它通过简单的 API 公开基于位置的服务，同时隐藏其使用的技术。不过，你仍应仔细考虑使用这些服务的方式。例如，不应允许应用程序持续轮询位置，因为这不仅会影响应用性能，还会影响电池续航。因此，你的应用实现应按需轮询位置更新；但如果不需要连续更新，你可以先等待位置更新事件触发，然后停止更新，直到准备好再次启动并确定位置。\n\
    \n如你所想，你可以控制位置管理器是否发送关于位置变化的更新。只需在需要开始更新时调用 `startUpdatingLocation`，在需要停止事件更新时调用\
    \ `stopUpdatingLocation` 即可。\n\n创建该类的实例并启动位置事件轮询后，会触发两个事件之一：`didUpdateToLocation`，或者如果遇到错误，则触发\
    \ `didFailWithError`。\n\n当新位置事件触发时，它会传递两个变量，每个变量的类型均为 `CLLocation`——一个用于旧位置，一个用于新位置。这为你提供了当前位置，并带来了额外好处：你可以利用旧位置计算行进距离。\n\
    \n每个 `CLLocation` 参数都包含位置坐标、海拔高度和行进速度。它还提供了计算距离所需的方法。\n\n我们来看看如何使用这个类。\n\n# 实现基于位置的服务\n\
    \n首先，创建 `LocationManager` 类的一个实例。该类封装了 SDK 提供的部分基于位置的服务。语法如下所示：\n\n```\nCLLocationManager\
    \ *lm = [[CLLocationManager alloc]init];\n```\n\n为了提供通知事件的挂钩，你还需要提供一个委托来接收关键的基于位置的事件，例如位置变化。本质上，你使用委托来承载回调方法，以接收事件并处理它。为此，你需要使用\
    \ `CLLocationManagerDelegate`，确保它符合定义了两种可选方法的协议签名（稍后详述）。因此，最简单的机制是为此目的创建一个容器类，如代码清单\
    \ 10-1（头文件）和代码清单 10-2（实现）所示。\n\n**代码清单 10-1.** `LocationManager.h`\n\n```\n#import\
    \ <Foundation/Foundation.h>\n#import <CoreLocation/CoreLocation.h>\n\n@interface\
    \ LocationManager : NSObject <CLLocationManagerDelegate> {\n    CLLocationManager*\
    \ lm;\n        CLLocation* l;\n}\n\n@property (nonatomic, retain) CLLocationManager*\
    \ lm;\n@property (nonatomic, retain) CLLocation* l;\n\n@end\n```\n\n**代码清单 10-2.**\
    \ `LocationManager.m`\n\n```\n#import \"LocationManager.h\"\n\n@implementation\
    \ LocationManager\n@synthesize lm,l;\n\n// 默认构造函数，分配 CLLocationManager 实例\n//\
    \ 将委托分配给自己，并设置最高精度\n//\n- (id)init\n{\n    self = [super init];\n    if (self\
    \ != nil) {\n        self.lm = [[[CLLocationManager alloc] init] autorelease];\n\
    \        self.lm.delegate = self;\n        self.lm.desiredAccuracy = kCLLocationAccuracyBest;\n\
    \    }\n    return self;\n}\n\n// 事件：didUpdateToLocation\n//\n- (void)locationManager:(CLLocationManager*)manager\n\
    didUpdateToLocation:(CLLocation*)newLocation\nfromLocation:(CLLocation*)oldLocation\n\
    {\n    // 在此处根据需求处理事件\n}\n\n// 事件：didFailWithError\n// TODO：此方法留待你在本示例中实现\n\n\
    @end\n```\n\n因此，你可以更改类的实例化，改用此类而非 `CLLocationManager`，如下所示：\n\n```\nLocationManager*\
    \        lm = [[LocationManager init] alloc];\n```\n\n在你的构造函数中，你不仅将委托设置指向自身，还通过使用\
    \ `desiredAccuracy` 属性并配合预定义的常量来设置服务的精度，该常量指示你所需的精度级别。将其设置为 `kCLLocationAccuracyBest`\
    \ 可提供 10 米内的最佳位置；另有精度为 100 米、1 公里和 3 公里的其他设置。尽管你可以设置所需的精度，但精度并不保证；而且精度设置越高，对电池电量和设备性能的影响就越大。\n\
    \n# 位置信息包含什么？\n\n位置更新事件触发时，会传递新位置和旧位置，它们都是 `CLLocation` 类的实例。该类包含许多感兴趣的属性。假设在你的应用中，你声明了一个名为\
    \ `lm` 的 `LocationManager` 类实例，然后在合适的位置创建该对象的实例并开始更新位置，如下所示：\n\n```\nLocationManager*\
    \ lm =[[LocationManager alloc] init];\n[lm.lmstartUpdatingLocation];\n```\n\n\
    然后，你可以在代码中为该事件提供实现。例如，我们使用以下示例代码将位置输出到日志文件：\n\n```\n// 在此处根据需求处理事件\nNSLog(@\"\
    经度 %f 纬度 %f\",newLocation.coordinate.longitude,\n newLocation.coordinate.latitude);\n\
    ```\n\n如果你在模拟器中执行应用，稍等片刻后，应会看到如下输出：\n\n```\n2011-08-24 15:50:51.133 locationExample[607:207]\n\
    经度 115.848930 纬度 -31.952769\n```\n\n每次位置变化时它都会更新。我的模拟器没有配备 GPS，但如果你能访问网络，则模拟器会确定你的位置。我使用谷歌地图测试了此功能，将纬度和经度作为搜索字符串输入，如下所示：\n\
    \n```\n-31.952769, 115.848930\n```\n\n这正确返回了我在澳大利亚的当前位置，如图 10-1 所示。\n\n![images](img/1001.jpg)\n\
    \n**图 10-1.** 使用谷歌地图测试模拟 GPS\n\n当事件触发时，你可以使用 `CLLocation` 类执行其他操作。例如，你可以计算速度：\n\
    \n```\ndouble gpsSpeed = newLocation.speed;\n```\n\n你还可以查找坐标记录的时间戳，或查看海平面以上（正值）或以下（负值）的海拔高度（以米为单位）。\n\
    \n.NET 框架在其 `System.Device.Location` 命名空间中提供了类似的功能，尽管如你所料，其实现略有不同。例如，你使用 `GeoCoordinateWatcher`\
    \ 对象从 .NET 定位服务获取数据，类似于你的委托类。`CLLocation` 类在 .NET 中由 `GeoCoordinate` 类替代，提供与位置相关的类似属性。最后，.NET\
    \ 中的 `GeoPositionAccuracy` 属性控制精度，对设备性能有相同影响，但它有两个选项：默认（针对精度和设备性能优化）和高精度。\n\n\
    如你所见，两个 SDK 具有可比较的特性，并且将代码语义从一种转换为另一种相对简单。你可以在 [`msdn.microsoft.com/en-you/library/system.device.location.aspx`](http://msdn.microsoft.com/en-you/library/system.device.location.aspx)\
    \ 找到 .NET 文档。\n\niOS SDK 的等效文档位于 [`developer.apple.com/library/ios/#documentation/UserExperience/Conceptual/LocationAwarenessPG/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#documentation/UserExperience/Conceptual/LocationAwarenessPG/Introduction/Introduction.html)。\n\
    \n这些都是基于 SDK 的能力，但始终存在其他选项。如果你正在开发基于 Web 的应用程序，还可以考虑 HTML 5 的 `GeoLocation` 功能。\n"
- fmt: '### Using the Camera


    Another much-used capability in the iPhone and iPad is the device camera. In the
    case of more recent devices, there are two cameras—one front facing and one rear
    facing to support videoconferencing. Thankfully, as with the location-based services
    you''ve seen, the SDK provides methods for accessing these features. It is very
    easy to create an application to take advantage of the camera; the SDK provides
    a class called `UIImagePickerController` that provides access to the camera and
    the ability to take a photo and preview the results.


    Let''s take a look at the basics of implementing the camera and then walk through
    an example application.


    #### Camera Basics


    Create a simple project that employs a view controller, and then, in the `didLoad`
    method, enter the following code:


    ```

    if (([UIImagePickerController isSourceTypeAvailable:

          UIImagePickerControllerSourceTypeCamera] == YES))

    {

            UIImagePickerController *cameraUI = [[UIImagePickerController alloc] init];

            cameraUI.delegate = self;        

            cameraUI.sourceType = UIImagePickerControllerSourceTypeCamera;    

            cameraUI.allowsEditing = NO;


             [self presentModalViewController: cameraUI animated: YES];


    } else NSLog(@"Camera not available");

    ```


    This presents the camera, assuming one is available, and allows you to use the
    dialog to take photos—or video, if you switch to video using the picker. The `mediatypes`
    property controls which options the picker presents to you, and this can be set
    to `kUTTypeMovie` for movies, `kUTTypeImage` for camera, or as follows for a choice
    of both (where supported):


    ```

    cameraUI.mediaTypes = [UIImagePickerController

     availableMediaTypesForSourceType:

    UIImagePickerControllerSourceTypeCamera];

    ```


    **NOTE:** On the iPad 2, you can also use a popover as the view controller.


    The controller provides you with basic editing features such as scaling and cropping.
    Also, you can pass back to the delegate an image the user takes or selects from
    the library. It is then the responsibility of the delegate to dismiss the controller
    and process the image.


    The following example provides a delegate method that retrieves the original image
    as passed back from the picker:


    ```

    - (void)imagePickerController:(UIImagePickerController *)

     didFinishPickingImage:(UIImage *)image

    editingInfo:(NSDictionary *)editingInfo

    {

    // Your processing code goes here

            // processing code


            // Dismiss the picker

             [p dismissModalViewControllerAnimated:YES];

    }

    ```


    You manage the same functionality on a camera-enabled Windows Mobile device in
    a similar way using the `Microsoft.Devices.PhotoCamera` class, along with a `MediaLibrary`
    object to hold the video/images captured from the camera. It''s more complex than
    it is on the iPhone because a single class isn''t provided, but you can argue
    that it gives you more flexibility.


    ### Writing an Example Camera Application


    You can easily piece together the example code fragments for a camera application.
    Start by creating a new project that uses the view-based template. This creates
    a project with the standard view controller and interface as you''ve done before
    many times in this book.


    You need to add the appropriate framework to use your camera, so again as you''ve
    done before, go to the project''s Build Phases tab (accessed from the root project
    settings) and add `MobileCoreServices.framework` to the Link Binary with Libraries
    setting. This provides access to the library that contains your camera code. Before
    you create your user interface, include the `UTCoreTypes.h` file in your header,
    ensure that two delegates are implemented for your image picker and navigation,
    and add the `IBAction`s and `IBOutlet`s for your `Image` property and the Camera
    and Roll buttons. Your code should resemble [Listing 10-3], all of which should
    be familiar to you.


    **Listing 10-3.** *Camera Example `ViewController.h` File*


    ```

    #import <UIKit/UIKit.h>

    #import <MobileCoreServices/UTCoreTypes.h>


    @interface CameraExampleViewController : UIViewController

    <UIImagePickerControllerDelegate, UINavigationControllerDelegate>

    {


        UIImageView *imageView;

        BOOL newMediaAvailable;

    }

    @property (nonatomic, retain) IBOutlet UIImageView *imageView;

    - (IBAction)useCamera;

    - (IBAction)useCameraRoll;

    @end

    ```


    Open the view controller''s Interface Builder file, and add your `UIImageView`
    control along with a toolbar that has two items: Camera and Roll. After you open
    the Connections Inspector in Xcode and connect the image and the Camera and Roll
    buttons, it should resemble the screen shown in [Figure 10.2].


    ![images](images/1002.jpg)


    **Figure 10–2** *. The camera example user interface with connections made*


    You can now implement the code against both your Camera and Roll buttons, but
    don''t forget to `@synthesize` your `newMediaAvailable` in your implementation.
    Let''s start with the Camera button, using the code in [Listing 10-4].


    ***Listing 10-4\. Implementing the `useCamera` Method Attached to the Camera Button***


    ```

    - (void) useCamera

    {

        if ([UIImagePickerController isSourceTypeAvailable:

             UIImagePickerControllerSourceTypeCamera])

        {

            UIImagePickerController *imagePicker = [[UIImagePickerController alloc]
    init];

            imagePicker.delegate = self;

            imagePicker.sourceType = UIImagePickerControllerSourceTypeCamera;

    imagePicker.mediaTypes = [NSArray arrayWithObjects:

    (NSString *)kUTTypeImage, nil];

            imagePicker.allowsEditing = NO;

            [self presentModalViewController:imagePicker animated:YES];

            [imagePicker release];

            newMediaAvailable = YES;

        }

    }

    ```


    Its implementation is pretty straightforward. The `useCamera` method checks that
    the device on which the application is running has a camera. On the simulator
    this isn''t the case, so you need to run this application on a real device to
    test it thoroughly. It creates a `UIImagePickerController` instance, assigns the
    `cameraViewController` as the delegate for the object, and defines the media source
    as the camera. The property that specifies supported media types is set to images
    only. Finally, the camera interface is displayed and the `UIImagePickerController`
    object is released. You set the `newMediaAvailable` flag to `YES` to indicate
    that the image is new; this is used to differentiate a dirty camera roll.


    You next need to provide an implementation for the camera roll functionality,
    accessed from the Roll button. See [Listing 10-5].


    **Listing 10-5.** *Implementing the Camera Roll Code Attached to the Roll Button*'
