- fmt: '# Marmalade SDK


    As I start to introduce the Marmalade SDK, you''ll see a theme emerging in the
    way these application development platforms—whether commercial or open source—are
    implemented. Marmalade is similar to the `Mono` and `Titanium Mobile` packages
    in many ways, except that it supports only C++. However, it does support development
    on both the Windows and Mac OS X operating systems, and allows you to create native
    mobile applications for the iOS operating system. In fact, the product lets you
    compile for other operating systems, such as Android, Symbian, Windows Mobile
    6.*x*, and game consoles!


    The Marmalade package consists of two major components:


    *   *Marmalade System*: The Marmalade System is an operating system abstraction
    API, together with the associated runtime libraries and application build system.
    It provides the binding between the native operating system API and the code you
    write, in the same way as `Mono` and `Titanium Mobile` do.

    *   *Marmalade Studio*: This is a suite of tools and runtime components, focused
    on high-performance 2D/3D graphics and animation.


    The package allows you to use Visual C++ on Windows or Xcode on Mac OS X to write
    your application using the API provided. It then supports a two-stage deployment
    process. In the first stage, you compile your application for debugging. This
    creates a DLL (`.dll` file), which requires the Marmalade Simulator to execute.
    Then when you are happy with your application, you can compile your code into
    a native executable for distribution.


    [Figure 1–8](#Chapter01.html#fig_1_8) illustrates the Marmalade architecture in
    relation to the other packages we''ve discussed so far.


    ![images](images/0108.jpg)


    **Figure 1–8.** *Marmalade SDK framework*


    In order to use the SDK, you must register an account on the web site, at which
    point you will be supplied with an evaluation license. Any registered user can
    then download a fully functional evaluation version of the Marmalade SDK. The
    evaluation version allows deployment to all platforms, but does not allow public
    distribution of applications. You can purchase the latest version of the Marmalade
    SDK from [`http://www.madewithmarmalade.com`](http://www.madewithmarmalade.com).


    # Flash Professional Creative Studio 5


    Last, but definitely not least, is Adobe''s Flash platform, which is arguably
    the most complete solution given here, in part due to its maturity in both the
    market and its work to support the iPhone back in 2010, when Apple lifted its
    restriction on its third-party developer guidelines. It allows you to build stand-alone
    applications for the iPhone, iPod touch, and iPad using the updated Packager for
    iPhone, which is included with Adobe Flash Professional Creative Studio (CS) 5
    and with the AIR SDK on Adobe Labs.


    Flash Professional CS5 works in a similar way to the other packages, allowing
    you to develop your application using the language you are familiar with (in this
    case, ActionScript). You compile this against the included APIs (the AIR and Flash
    Player APIs) into native iPhone applications, which are then ready for testing
    and deployment.


    [Figure 1–9](#Chapter01.html#fig_1_9) shows the Flash Professional CS5 architecture,
    again relative to the others we''ve discussed in this chapter.


    ![images](images/0109.jpg)


    **Figure 1–9.** *Adobe Creative Suite 5 framework*


    This option is by far the most comprehensive solution, but at a cost—both financially,
    as Adobe''s Creative Studio is not cheap, and in complexity, as the product and
    its extensive API are not trivial to understand. For this reason, this option
    is not covered in this book. But after looking at the other options available,
    you should be well prepared to try out Flash Professional CS5 should you desire.


    # Overview of the App Store


    The App Store is a digital application distribution platform for iOS devices,
    developed and maintained by Apple. Through the iTunes Store, accessed from either
    the Internet or the device itself, Apple allows service users to browse and download
    applications, paying for them as required. Applications can be downloaded to the
    device directly or to a desktop and subsequently transferred, if appropriate.


    The App Store is accessible from a number of devices, including the iPhone (shown
    in [Figure 1–10](#Chapter01.html#fig_1_10)), iPod touch, and iPad. For Mac laptop
    and desktop users, the Mac App Store was launched more recently to cater to nonmobile
    applications.


    ![images](images/0110.jpg)


    **Figure 1–10.** *App Store on the iPhone 4*


    The App Store has been tremendously successful for both Apple and application
    producers, with the billionth application download boundary broken back in 2009.
    As mentioned, the concept has been mimicked by other organizations, most notably
    the other major mobile service providers. [Figure 1–11](#Chapter01.html#fig_1_11)
    shows the global revenue share among these platforms. Apple''s dominance is obvious.


    ![images](images/0111.jpg)


    **Figure 1–11.** *Global mobile application store revenues*


    ## Selling Apps at the App Store


    The App Store revenue model is to split the proceeds from any sale: 30% to Apple
    and 70% to the app publisher (this is subject to change at any time). The model
    has proven immensely profitable for both Apple and many application producers.
    The term *app* (short for application) has also been used more broadly, and despite
    Apple being awarded a trademark for the term, it has been used in a similar context
    by others, such as Google (*Google Apps*) and Amazon.


    **NOTE:** All native apps can be legitimately downloaded onto a mobile Apple device
    only through the App Store, unless the device has been jailbroken. *Jailbreaking*
    a device refers to using the process that gives access to the device''s root filesystem,
    allowing modification and installation of third-party software components. It''s
    not illegal, although Apple is sensitive to the topic and has stated that it may
    “void the warranty” for the device. Jailbreaking doesn''t require any changes
    to the hardware and can be easily reversed.


    More recently, Apple announced its new subscription-based service that allows
    application publishers to set the length and price of a subscription. Previously,
    this wasn''t possible, and you were forced to sell each release on a per-release
    basis. The new service allows publishers to sell their content through their apps,
    and users can receive new content over a specified period of time.


    A more significant change is that not only is the traditional model of selling
    through iTunes available, but Apple is also allowing app publishers to distribute
    their subscriptions directly from their own web sites, where the iTunes revenue
    model doesn''t apply and so no revenue is shared with Apple. This obviously has
    the advantage of removing the obligation of contributing some of your application
    earnings to Apple, but it does mean that you lose the benefits of the App Store,
    such as audience reach and accessibility, and must rely on your own marketing
    campaigns.'
