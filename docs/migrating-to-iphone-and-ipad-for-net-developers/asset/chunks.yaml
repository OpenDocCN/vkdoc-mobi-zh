  trans: '

    ### 用你的代码支持多种设备


    如果你想编写一个能同时支持 iPhone 和 iPad 的单一应用程序，这当然是可行的——特别是考虑到它们都使用 iOS 和 SDK 框架。你需要检测设备，并动态调整你的应用程序以适应一些明显的差异，例如屏幕尺寸；否则，你的应用程序会看起来非常奇怪。你还可以针对更具体的能力进行适配，例如
    iPad 能够使用弹出视图控制器，但你同样需要在代码中进行检测，以便你的应用程序进行适配。


    有多种方法可以实现这一点。当然，你可以使用 iOS SDK 来支持多种 iOS 设备，例如 iPhone 和 iPad。此外，如果你想支持非 iOS 设备，可以使用第
    3 章中讨论的某个多平台第三方解决方案——这些方案甚至能支持非 Apple 设备，但如前所述，它们存在局限性。另一种选择是编写一个 Web 应用程序，通过浏览器交付到设备上；但这样会限制你可用的功能，而且如果你无法连接到托管应用程序的
    Web 服务器，应用程序将无法工作，除非你使用 HTML 5 中某些更高级的离线功能。


    在本书中，你已经接触过多种用于支持不同设备的机制。让我们回顾一下：


    - **方向：** 通常，所有 iPad 应用程序都支持不同的方向，你应在代码中处理这种情况。然而，在 iPhone 上，虽非必需，但建议你的应用程序也支持不同的方向。

    - **布局：** iPad 的大屏幕为你的应用程序提供了更多可用空间，并且你应该充分利用它。

    - **分屏视图：** 一个 iPad 特有的视图控制器，允许你将应用程序分成两个视图，每个视图都是可配置的。

    - **弹出视图：** 与分屏视图类似，弹出视图是在 iPad 上呈现数据的一种独特方式。

    - **设备特性：** 这两种设备具有不同的硬件特性，在设计应用程序时应牢记这一点。


    以下是当你编写同时适用于 iPhone 和 iPad 的通用代码时需要牢记的一些考虑因素和技术总结：


    - **设备：** 与其他 iOS 设备相比，iPad 当前是特例，因为它的屏幕比 iPhone 或 iPod Touch 大得多。始终要考虑如何最好地利用这些空间。

    - **用户界面：** 要在代码中创建能够支持这两种设备的用户界面，通常更简单的方法是为每种设备类型创建一个 Interface Builder 文件（`.nib`），并为每种设备动态加载相应的文件。

    - **类：** 在使用某个特定的类之前，你应该先检查它是否存在于你所针对的设备上。你可以使用 `NSClassFromString()` 方法来查看某个类是否存在于设备库中。如果该类不存在，它会返回
    `nil`。

    - **API 功能：** 在某些情况下，两种设备上都有某些类，但它们的功能不同。例如，iPad 上的 `UIGraphics` 支持便携式文档格式（PDF），而
    iPhone 不支持。

    - **发布支持多设备的应用程序：** 向你的用户群体强调你的应用程序支持多设备非常重要。你可以在提交应用程序时进行此操作。在 App Store 中，此类应用程序旁边会显示一个加号（`+`）。

    - **图像：** iPhone 4、最新的 iPod Touch 以及未来的 iOS 版本都内置了 Retina 显示屏，其分辨率更高。这意味着应用程序看起来更清晰。iOS
    会尽力使用更高的分辨率；例如，文本会自动正确缩放，所有内置的 UI 组件（按钮、滑块、导航栏、工具栏等）也是如此。但它无法在未经辅助的情况下对你自己提供的图像和图形进行缩放。要么为两种设备使用特定的图形，并为
    Retina 显示屏的图形添加 `@2x` 后缀（例如，非 Retina 使用 `MyGraphic.png`，Retina 使用 `MyGraphic@2x.png`），要么在你的代码中基于点进行手动缩放。


    ### 最新动态与未来展望


    那么接下来会怎样？这是一个价值百万美元的问题，Apple 粉丝们总是渴望知道答案。即使史蒂夫·乔布斯已决定辞去 CEO 一职，但可以肯定的是，作为董事会主席，他仍将参与公司未来的发展方向。


    本节将探讨 Apple 以及 iPhone 和 iPad 上通用开发的未来可能趋势。当然，没人能保证这些一定会发生，但我希望你能从中获得关于未来走向的有趣洞见。其他信息源包括
    Apple 的 2011 年全球开发者大会（WWDC）以及行业媒体。


    #### iCloud


    与行业内大多数情况一样，*云*如今在 Apple 的解决方案中扮演着更重要的角色。你的应用程序能利用的已不仅仅是设备本身的能力——如果你连接到某种网络（包括互联网），那么你可以在设备上消费和使用通过网络提供的能力。例如，这可能是存储，或者是一个基于网络的流媒体视频服务。你的应用程序可以利用云来扩展其能力，超越本地设备的限制，拥抱这些技术，例如，将成千上万部电影目录带到你的设备上。


    Apple 的 iCloud 包含一套应用程序，代表了 Apple 在云中的功能。云中的 iTunes 就是其中之一，允许你流式传输内容。它可以存储你的所有内容，并从云端将其推送到你的所有设备上。


    使用 iCloud 的一种方式是，让你的代码能够利用用户的 iCloud 帐户（他们需要登录），将数据从本地设备同步到 iCloud 提供的存储空间，从而使你的应用程序能够在设备之间传递状态。例如，Safari
    阅读器会将你保存供离线阅读的文章存储在 iCloud 中，使其在你可能拥有的 iPhone 和 iPad 上都可用。


    #### iOS 5


    iOS 4 并不差劲——它仍然是一个非常出色的移动操作系统。然而，整个行业都是如此，总有人试图做得更好。在移动设备领域，那就是微软和谷歌——尤其是微软，随着其新的
    Windows Phone 7 平台的发布而更具竞争力。Apple 并没有安于现状；它一直在开发 iOS 5，尽管功能增加了，但它仍然可以在所有与 iOS
    4.3 相同的设备上运行。


    一个重大的变化体现在通知方面，现在通知不再打断应用程序的运行流程，而是集中收集在设备的通知中心。在这里，你可以通过向下滑动屏幕，在方便的时候查看所有通知，并在完成后清除它们。


    另一个很酷的功能是报亭，这是一个与 iBook 非常相似的应用程序，但它允许你管理数字出版物，例如杂志和报纸。


    社交网络当然不是什么新鲜事，但 iOS 5 中引入了对 Twitter 等功能的本机集成。一个单一的应用程序支持你期望的所有功能，例如上传照片和视频、发推文等，并将它们集成到其他
    iOS 应用程序（如通讯录）中。没错，Twitter 在之前的 iOS 版本中作为应用程序存在，但集成度没有这么高。


    其他应用程序也进行了升级，以更好地与 Apple 的竞争对手竞争，并更好地利用设备的能力。相机应用程序就是其中之一，它增加了更多编辑功能，邮件应用程序也得到了增强。


    引入的其他一些覆盖整个设备的功能包括：操作系统级别的字典、与 iTunes 的无线同步，以及便于使用的分体式键盘。


    让我们更详细地看看 iOS 系列中的一些新成员。'
- fmt: '# Notification Center


    Both a unique feature and an irritation for many is the fact your iOS device raises
    notifications for all kinds of events and against all kinds of applications. Whether
    it''s a new e-mail, an SMS message, or a Facebook update, notifications are the
    way of the world on your iOS device. The Notification Center doesn''t remove this
    functionality—far from it. It simply allows you to keep track of your notifications
    in one convenient location. You can still configure which ones you are interested
    in, but they present themselves subtly on your screen, much like the iAds in applications
    of today; and they fade if you do nothing with them—or you can swipe to interact
    with them.


    # iMessage


    This new messaging service, built into the existing Messaging App, lets you hold
    single or group-based conversations and exchange text, photos, and video as part
    of those conversations. You can see when someone is typing at the other end of
    your conversation, recover delivery and read receipts, and even hold conversations
    that span devices—for example, starting on an iPhone and picking up on an iPad.


    # Newsstand


    The use of the iPhone, and especially the iPad, for reading magazines and newspapers
    has grown significantly, and it''s no surprise that Apple has released an app
    that helps you manage these different subscriptions. Your subscriptions are updated
    automatically in the background, so the Newsstand looks just like a shelf in a
    magazine store with each subscription showing the cover of the latest issue. Very
    neat!


    # Reminders


    This simple little app enables you to manage your to-do list, allowing you to
    set reminders and due dates. It even works with iCloud and Outlook, meaning you
    can ensure that updates are reflected on any other devices you may have.


    # Twitter


    The growth of social media has taken many by surprise, and Twitter''s popularity
    has been recognized by Apple via its inclusion in iOS 5. It''s no longer just
    an app, but an integrated capability. Once you''ve logged on, you can tweet from
    many of the default iOS apps including Safari, Photos, the Camera, and more.


    # Other Updated Features


    The updates just mentioned are a taster of the features introduced in iOS 5. Many
    other improvements are included, such as the following:


    *   **Camera:** This is now available from the Lock Screen, allowing you to capture
    moments you might previously have missed while unlocking the device. You can also
    synchronize your photos with the iCloud if you have Photo Stream enabled; it''s
    a cloud-based photo storage capability in iCloud.

    *   **Photos:** You can now frame, crop, and rotate your photos, allowing you
    greater on-device control of the photos you''ve taken. A red-eye reduction feature
    has been included as well, as well as integration with iCloud, so you can synchronize
    your photos in the iCloud.

    *   **Safari:** The browser has been upgraded with features that allow you to
    focus on web surfing and not be distracted. Safari Reader lets you read articles
    offline and even keep them in the iCloud for storage, so you can access this information
    from any of your devices that have access.


    # Summary


    In this chapter, you looked at some of the more advanced features found in iOS
    and the SDK. You took a tour of how to use the GPS on your device to create location-aware
    applications. You saw how to use the accelerometer to detect movement and orientation
    of the device. You also looked at the camera and what support has been included
    in the SDK for you to embrace its capabilities for taking photos and video.


    The ability to target multiple devices without writing two different applications
    may be important to you, and you looked at the ways you can do this and the considerations
    involved when undertaking this task. Finally, you examined what Apple may have
    in store in the future.


    At the beginning of the book, I took you from understanding the capabilities of
    iOS-based devices such as the iPhone and iPad to the features available through
    Apple''s own native toolset, such as the iOS SDK and Xcode. You also looked at
    third-party tool options and even built simple “Hello World” apps with some of
    them. You then stepped through an Objective-C primer, drawing parallels with the
    .NET C# language; and over a series of chapters, you walked through numerous iOS
    SDK frameworks that implement functionality similar to that found in the .NET
    Framework. Examples in the chapters got you started building a Lunar Lander example
    application, and you looked at means of extending that application''s features
    through libraries. You finished with overviews of testing, deploying, and publishing
    iOS applications, and considered several advanced features in this chapter.


    Now that you''ve completed the main body of the book, please take a look at Appendix
    A for suggestions for completing the Lunar Lander example app on your own. I look
    forward to seeing the App Store full of Lunar Lander variants built on the back
    of this book. Good luck!


    # Appendix


    ## Completing the Lunar Lander Application


    As you''ve gone through the book, I''ve slowly been contributing toward your Lunar
    Lander game where it has made sense. I haven''t completed it, though, and this
    is deliberate. Where would be the fun in providing you with the finished game?!
    The knowledge you''ve gained through the book in iOS, its SDK, and Xcode will
    allow you to complete the game and publish it—or you may want to start a completely
    different game.


    However, it wouldn''t be fair to leave you hanging, so in this appendix I discuss
    some of the elements you may want to consider adding to the game. The source code
    associated with the book includes code fragments that complement this chapter
    to help you complete your game.


    ### Implementing the Game Physics


    To ensure that your lander observes the laws of physics, you need to implement
    a simple physics engine for it. You can find a reference describing the physics
    required at [`www.physicsclassroom.com/class/newtlaws/u2l4a.cfm`](http://www.physicsclassroom.com/class/newtlaws/u2l4a.cfm).
    Don''t worry; I take you through the basics next.


    #### Gravity


    This simulation is quite simple. First the forces of gravity are applied:


    ```

    Y = Y + Gravity * TotaleSecondsOfThrust;

    ```


    Here the `Y` value that controls the lander''s height is adjusted by multiplying
    the `Gravity` figure (a double value of 9.8) by the number of seconds that thrust
    is applied, calculated by detecting the timestamp when the thrust key is held
    down, and the seconds elapsed from when it is released. You can use the `NSTimeInterval()`
    method to achieve this.


    #### Thrust


    You then need to apply the force of the thrust according to thrust and rotation.
    You need to use the `Math.h` include for this, but you have to implement your
    own angle-normalization macro, because the equivalent of `NormalizeAngle()` in
    .NET doesn''t exist in Objective-C. No matter, it''s easily done. First define
    this macro:


    ```

    #define NormalizeAngle(x) ((return x % 360)+(x < 0 ? 360 : 0))

    ```


    Then adjust your x and x axis according to the force of thrust:


    ```

    Y = Y – Math.sin(NormalizeAngle(rotation + M_PI / 2)) * totalseconds * thrustspeed;

    X = X – Math.cos(NormalizeAngle(rotation + M_PI / 2)) * totalseconds * thrustspeed;

    ```


    The variable `rotation` obviously represents the angle of rotation for the lander,
    as affected by the user pressing the left and right keys and the `totalseconds`
    values (the number of seconds the thrust key is held down). The `thrustspeed`
    value is a constant value of 20 indicating how powerful the thrust is.


    Finally, don''t forget to reduce your fuel figure as the engine is thrusting.'
  raw: '##### Notification Center


    Both a unique feature and an irritation for many is the fact your iOS device raises
    notifications for all kinds of events and against all kinds of applications. Whether
    it''s a new e-mail, an SMS message, or a Facebook update, notifications are the
    way of the world on your iOS device. The Notification Center doesn''t remove this
    functionality—far from it. It simply allows you to keep track of your notifications
    in one convenient location. You can still configure which ones you are interested
    in, but they present themselves subtly on your screen, much like the iAds in applications
    of today; and they fade if you do nothing with them—or you can swipe to interact
    with them.


    ##### iMessage


    This new messaging service, built into the existing Messaging App, lets you hold
    single or group-based conversations and exchange text, photos, and video as part
    of those conversations. You can see when someone is typing at the other end of
    your conversation, recover delivery and read receipts, and even hold conversations
    that span devices—for example, starting on an iPhone and picking up on aniPad.


    ##### Newsstand


    The use of the iPhone, and especially the iPad, for reading magazines and newspapers
    has grown significantly, and it''s no surprise that Apple has released an app
    that helps you manage these different subscriptions. Your subscriptions are updated
    automatically in the background, so the Newsstand looks just like a shelf in a
    magazine store with each subscription showing the cover of the latest issue. Very
    neat!


    ##### Reminders


    This simple little app enables you to manage your to-do list, allowing you to
    set reminders and due dates. It even works with iCloud and Outlook, meaning you
    can ensure that updates are reflected on any other devices you may have.


    ##### Twitter


    The growth of social media has taken many by surprise, and Twitter''s popularity
    has been recognized by Apple via its inclusion in iOS 5\. It''s no longer just
    an app, but an integrated capability. Once you''ve logged on, you can tweet from
    many of the default iOS apps including Safari, Photos, the Camera, and more.


    ##### Other Updated Features


    The updates just mentioned are a taster of the features introduced in iOS 5\.
    Many other improvements are included, such as the following:


    *   *Camera:* This is now available from the Lock Screen, allowing you to capture
    moments you might previously have missed while unlocking the device. You can also
    synchronize your photos with the iCloud if you have Photo Stream enabled; it''s
    a cloud-based photo storage capability in iCloud.

    *   *Photos:* You can now frame, crop, and rotate your photos, allowing you greater
    on-device control of the photos you''ve taken. A red-eye reduction feature has
    been included as well, as well as integration with iCloud, so you can synchronize
    your photos in the iCloud.

    *   *Safari:* The browser has been upgraded with features that allow you to focus
    on web surfing and not be distracted. Safari Reader lets you read articles offline
    and even keep them in the iCloud for storage, so you can access this information
    from any of your devices that have access.


    ### Summary


    In this chapter, you looked at some of the more advanced features found in iOS
    and the SDK. You took a tour of how to use the GPS on your device to create location-aware
    applications. You saw how to use the accelerometer to detect movement and orientation
    of the device. You also looked at the camera and what support has been included
    in the SDK for you to embrace its capabilities for taking photos and video.


    The ability to target multiple devices without writing two different applications
    may be important to you, and you looked at the ways you can do this and the considerations
    involved when undertaking this task. Finally, you examined what Apple may have
    in store in the future.


    At the beginning of the book, I took you from understanding the capabilities of
    iOS-based devices such as the iPhone and iPad to the features available through
    Apple''s own native toolset, such as the iOS SDK and Xcode. You also looked at
    third-party tool options and even built simple “Hello World” apps with some of
    them. You then stepped through an Objective-C primer, drawing parallels with the
    .NET C# language; and over a series of chapters, you walked through numerous iOS
    SDK frameworks that implement functionality similar to that found in the .NET
    Framework. Examples in the chapters got you started building a Lunar Lander example
    application, and you looked at means of extending that application''s features
    through libraries. You finished with overviews of testing, deploying, and publishing
    iOS applications, and considered several advanced features in this chapter.


    Now that you''ve completed the main body of the book, please take a look at Appendix
    A for suggestions for completing the Lunar Lander example app on your own. I look
    forward to seeing the App Store full of Lunar Lander variants built on the back
    of this book. Good luck!


    ## Appendix


    ## Completing the Lunar Lander Application


    As you''ve gone through the book, I''ve slowly been contributing toward your Lunar
    Lander game where it has made sense. I haven''t completed it, though, and this
    is deliberate. Where would be the fun in providing you with the finished game?!
    The knowledge you''ve gained through the book in iOS, its SDK, and Xcode will
    allow you to complete the game and publish it—or you may want to start a completely
    different game.


    However, it wouldn''t be fair to leave you hanging, so in this appendix I discuss
    some of the elements you may want to consider adding to the game. The source code
    associated with the book includes code fragments that complement this chapter
    to help you complete your game.


    ### Implementing the Game Physics


    To ensure that your lander observes the laws of physics, you need to implement
    a simple physics engine for it. You can find a reference describing the physics
    required at [`www.physicsclassroom.com/class/newtlaws/u2l4a.cfm`](http://www.physicsclassroom.com/class/newtlaws/u2l4a.cfm).
    Don''t worry; I take you through the basics next.


    #### Gravity


    This simulation is quite simple. First the forces of gravity are applied:


    `Y = Y + Gravity * TotaleSecondsOfThrust;`


    Here the `Y` value that controls the lander''s height is adjusted by multiplying
    the `Gravity` figure (a double value of 9.8) by the number of seconds that thrust
    is applied, calculated by detecting the timestamp when the thrust key is held
    down, and the seconds elapsed from when it is released. You can use the `NSTimeInterval()`
    method to achieve this.


    #### Thrust


    You then need to apply the force of the thrust according to thrust and rotation.
    You need to use the `Math.h` include for this, but you have to implement your
    own angle-normalization macro, because the equivalent of `NormalizeAngle()` in
    .NET doesn''t exist in Objective-C. No matter, it''s easily done. First define
    this macro:


    `#define NormalizeAngle(x) ((return x % 360)+(x < 0 ? 360 : 0))`


    Then adjust your x and x axis according to the force of thrust:


    `Y = Y – Math.sin(NormalizeAngle(rotation + M_PI / 2)) * totalseconds * thrustspeed;
    X = X – Math.cos(NormalizeAngle(rotation + M_PI / 2)) * totalseconds * thrustspeed;`


    The variable rotation obviously represents the angle of rotation for the lander,
    as affected by the user pressing the left and right keys and the `totalseconds`
    values (the number of seconds the thrust key is held down). The `thrustspeed`
    value is a constant value of 20 indicating how powerful the thrust is.


    Finally, don''t forget to reduce your fuel figure as the engine is thrusting.'
  trans: '

    # 通知中心


    你的 iOS 设备会针对各类事件和应用程序弹出通知，这既是一个独特功能，也让许多用户感到困扰。无论是新邮件、短信消息还是 Facebook 动态更新，通知已成为
    iOS 设备上的常态。通知中心并非要移除这一功能——恰恰相反，它只是让你能在一个便捷的位置集中查看所有通知。你仍然可以配置自己感兴趣的通知类型，但它们的显示方式会更为优雅，如同当前应用中的
    iAd 广告；若你不做处理，它们便会自动淡出——你也可以通过滑动来与之交互。


    # iMessage


    这项内置在现有“信息”应用中的全新消息服务，支持一对一或群组对话，并可在对话中发送文本、照片和视频。你能看到对方正在输入的状态，获取送达和已读回执，甚至可以在不同设备间延续对话——例如在
    iPhone 上开始对话，再转到 iPad 上继续。


    # 书报摊


    使用 iPhone（尤其是 iPad）阅读杂志和报纸的需求显著增长，苹果推出这款帮助管理各类订阅的应用也就不足为奇了。你的订阅内容会在后台自动更新，因此书报摊看起来就像杂志店里的书架，每份订阅都展示着最新一期的封面。非常精巧！


    # 提醒事项


    这款小巧的应用能让你管理待办事项清单，设置提醒和截止日期。它还支持与 iCloud 和 Outlook 同步，确保你在其他设备上也能看到更新的内容。


    # Twitter


    社交媒体的蓬勃发展令许多人感到意外，而苹果在 iOS 5 中整合 Twitter 功能，也体现了对其流行程度的认可。它不再仅仅是一个应用，而是一项系统级功能。登录后，你就可以从
    Safari、照片、相机等众多原生 iOS 应用中直接发送推文。


    # 其他更新功能


    上述更新仅是对 iOS 5 新功能的初步介绍。系统还包含了诸多其他改进，列举如下：


    *   **相机：** 现在可直接从锁定屏幕启动，让你捕捉到以往可能因解锁设备而错过的瞬间。如果开启了“照片流”，照片还能与 iCloud 同步；这是 iCloud
    中的一项云端照片存储功能。

    *   **照片：** 现在你可以直接对照片进行裁剪、旋转等操作，在设备上对拍摄的照片拥有更强的控制力。同时还加入了红眼消除功能，并整合了 iCloud，方便同步照片。

    *   **Safari：** 浏览器进行了升级，新增功能让你能专注于网页浏览而不受干扰。Safari 阅读器支持离线阅读文章，甚至可将文章保存在 iCloud
    中，方便你从任何已授权的设备访问。


    # 总结


    本章，我们探讨了 iOS 及其 SDK 中的一些高级功能。我们学习了如何在设备上使用 GPS 来创建基于位置的应用，了解了如何使用加速计检测设备的移动和方向，并考察了相机功能以及
    SDK 中提供的相应支持，以便你充分利用其拍照和摄像能力。


    如果你希望针对多种设备开发应用而又不必编写两套不同的代码，这一能力或许对你至关重要。我们探讨了实现这一目标的方法以及需要考虑的因素。最后，我们展望了苹果未来的可能动向。


    在本书开头，我带你从理解 iPhone 和 iPad 等 iOS 设备的功能，逐步深入到苹果原生工具集（如 iOS SDK 和 Xcode）所提供的特性。我们还了解了第三方工具选项，并用其中一些工具构建了简单的“Hello
    World”应用。接着，我们通过 Objective-C 入门教程，将其与.NET C#语言进行了类比；并在随后的章节中，循序渐进地介绍了众多 iOS SDK
    框架，这些框架实现了与.NET 框架类似的功能。各章节中的示例代码引导你着手构建了“月球着陆器”示例应用，并探讨了如何通过库来扩展该应用的功能。最后，我们概述了
    iOS 应用的测试、部署和发布流程，并在本章探讨了几项高级功能。


    现在，你已经完成了本书的主体内容，请查阅附录 A 以获取自行完成“月球着陆器”示例应用的建议。我期待看到 App Store 里充满基于本书原理开发的各类月球着陆器变体。祝你好运！


    # 附录


    ## 完成“月球着陆器”应用


    在阅读本书的过程中，我一直在逐步为你搭建“月球着陆器”游戏的相关功能，但并未将它彻底完成，这是我刻意为之。直接把成品游戏交给你，乐趣何在呢？通过本书学习到的
    iOS、其 SDK 以及 Xcode 的知识，将使你具备自行完成并发布这款游戏的能力——或者，你或许想从头开始创作一款完全不同的游戏。


    不过，让你悬而未决也非公平之举。因此，在本附录中，我将讨论一些你可能会考虑添加到游戏中的元素。随书提供的源代码包含与本章配套的代码片段，可以帮助你完成游戏开发。


    ### 实现游戏物理引擎


    为确保你的着陆器遵循物理定律，你需要为其实现一个简单的物理引擎。你可以在[`www.physicsclassroom.com/class/newtlaws/u2l4a.cfm`](http://www.physicsclassroom.com/class/newtlaws/u2l4a.cfm)找到描述所需物理原理的参考资料。别担心，接下来我会带你了解基础知识。


    #### 重力


    这个模拟相当简单。首先施加重力：


    ```

    Y = Y + Gravity * TotaleSecondsOfThrust;

    ```


    这里，通过将`Gravity`值（双精度浮点数 9.8）乘以施加推力的秒数，来调整控制着陆器高度的`Y`值。推力秒数的计算方法为：检测按下推力键时的时间戳，并计算从松开按键起所经过的秒数。你可以使用`NSTimeInterval()`方法来实现。


    #### 推力


    接着，你需要根据推力和旋转角度来施加推力作用。为此，你需要引入`Math.h`头文件，但必须自行实现角度归一化宏，因为 Objective-C 中没有与.NET
    中`NormalizeAngle()`等效的函数。不过没关系，这很容易实现。首先定义这个宏：


    ```

    #define NormalizeAngle(x) ((return x % 360)+(x < 0 ? 360 : 0))

    ```


    然后根据推力大小调整 x 和 Y 轴：


    ```

    Y = Y – Math.sin(NormalizeAngle(rotation + M_PI / 2)) * totalseconds * thrustspeed;

    X = X – Math.cos(NormalizeAngle(rotation + M_PI / 2)) * totalseconds * thrustspeed;

    ```


    变量`rotation`显然代表了着陆器的旋转角度，该角度受用户按下左右方向键的影响；`totalseconds`值则表示推力键按下的持续秒数。`thrustspeed`是一个常量值
    20，代表推力的大小。


    最后，别忘了在引擎推进时减少燃料量。

