- fmt: '### Navigators


    The Xcode IDE introduces a number of *navigators*, which display different workspaces
    within the main window and allow you to jump to different areas of your project
    with ease. Navigators are a useful tool for navigating the Xcode interface, and
    understanding how to use them will make developing applications within Xcode far
    easier.


    Seven navigators are available to help you navigate to various aspects of your
    project:


    *   **Project navigator**: This navigator provides a standard view of your files
    and groups. It shows your classes, frameworks, resources, products, and so on.
    Xcode 4 offers some nice improvements over the previous version. At the bottom
    is a filter bar with three preset filters for recently changed files, unsaved
    files, and files with an SCM status. It also includes a search field that you
    can use to filter files across all projects in the workspace.

    *   **Symbol navigator**: As its name suggests, this navigator allows you to view
    and navigate the various symbols created within your application. It lets you
    view the symbol in a hierarchical format (parents and children) or a flat format,
    displaying classes, methods, attributes, and so on.

    *   **Search**: This navigator provides a workspace-wide find-and-replace feature.
    The navigator itself is a standard find-and-replace panel. It also provides a
    feature for doing mass replacements, through the Preview button. Using this feature
    slides down a sheet that gives you the differences for every change and lets you
    select which changes to put into effect.

    *   **Issue**: As its name suggests, this navigator shows you issues that the
    compiler or syntax checker has detected and allows you to view the complete issue
    text.

    *   **Debug**: This navigator displays your program-execution information, including
    the stack, when you stop in the debugger. You can view multiple threads at once
    and have Xcode filter out threads that are not relevant. It also has a stack-compression
    feature, provided by a slider at the bottom of the debug navigator. When you slide
    it from right to left, Xcode takes out stack frames that may not be relevant,
    so you can adjust the slider to show information to the level of detail you want.

    *   **Breakpoint**: This navigator displays all breakpoints set within your application,
    both active and inactive. If you have set a breakpoint and it is inactive, you
    will see the symbol, allowing you to switch it on in the code. This doesn''t do
    any harm, since it''s not affecting your code. However, if you want to remove
    the fact that the debug breakpoint ever existed, delete it from the navigator
    list.

    *   **Log**: This navigator displays the history surrounding the project''s run
    and debug sessions. It can be used to view output sent to the debug console using
    the `NSLog` method.


    [Figure 4–5](#Chapter04.html#fig_4_5) shows the Navigator toolbar.


    ![images](images/0405.jpg)


    **Figure 4–5.** *The Navigator toolbar, with (from the left) Project, Symbol,
    Search, Issue, Debug, Breakpoint, and Log buttons*


    Each time you choose a navigator, the navigation window will appear on the left
    side of the window, along with the relevant inspector on the right side of the
    window, with the details displayed for the object selected (if any) in the navigation
    tree. The navigation tree and the inspector window are only displayed if you have
    already switched off the Navigator view (**⌘**0 to toggle). You also can choose
    a navigator with the shortcut keys shown in [Table 4-7](#Chapter04.html#tab_4_7).


    ![images](images/t0407.jpg)


    ### Views


    In addition to the different navigators, you can manage the different views that
    are displayed:


    *   **Navigator view**: Provides access to navigators that let you navigate your
    project structure, or object hierarchy.

    *   **Debug area view**: Allows you access to breakpoints and object watchpoints
    as part of Xcode 4''s debug functionality.

    *   **Utilities view**: Provides access to things like the help pages and object
    inspectors.


    You can switch these views on and off, in order to free up screen space.


    [Table 4-8](#Chapter04.html#tab_4_8) shows ways for accessing the three views.


    ![images](images/t0408.jpg)


    ### Using Other Xcode Tools


    Xcode provides a number of other tools to assist in the development of your code.
    Here, we''ll look at two: one that enables static analysis of your code and another
    that enables you to drag and drop code snippets.


    #### Static Analysis


    Static analysis can help you to reduce bugs and inefficiencies within your code.
    The Xcode 4 IDE allows you to perform the analysis, examine your code, and take
    corrective actions as necessary—all within the same workspace window. Once the
    project you wish to analyze is selected, simply choose `Product` ![images](images/U001.jpg)
    `Analyze` to start the analysis.


    Once complete, Xcode opens the issues analyzer window to highlight the results
    of the analysis. Any problems are labeled in blue and marked. When you click one
    of these, Xcode will highlight the faulty code for your analysis and correction.


    #### Code Snippets


    A useful feature, and one that has been extended, is the ability to drag code
    snippets into your project, thus providing a default implementation for common
    code features such as implementing a protocol.


    This Interface Builder feature can be used to select the library of items, including
    code snippets. Then you can highlight and drag an item onto your source file.
    For example, in the case of a protocol code snippet, this will implement the default
    code in your editor for you to complete.


    ### Summary


    In this chapter, we began by considering the relative features of Apple''s mobile
    devices. You''ll notice that the iPhone and iPod touch are very similar, whereas
    the iPad starts to introduce some key differences, mainly due to its tablet form
    factor.


    We next took a look at design patterns that are used as approaches to application
    development, including how the code is structured. We considered an iOS application''s
    life cycle, mapping this on the MVC pattern, and you should have started to notice
    some similarities with the Microsoft Windows method of running GUI-based applications.


    Then we compared the class frameworks, which again are similar in features if
    not in structure, and compared the Objective-C language and the Xcode tools with
    their .NET counterparts. Objective-C is similar to C# in many respects. However,
    one of the key differences stems from the fact that iOS apps are not managed applications.
    Because the language is based on C, you see memory management, pointers, and non-same-typing
    being the norm within the language.


    You should now be more familiar with the Xcode 4 environment, Objective-C as a
    language, and the similarities with Microsoft .NET in code, framework, and tools—at
    least in the key areas. We didn''t go through a step-by-step comparison of everything—the
    breadth of the language and the class frameworks is far too large—but it isn''t
    necessary. Using a combination of the Xcode development environment, online resources,
    and the following chapters, we''ll start to dig into the details. You''ll see
    more specific examples of how to use both the language and the SDK''s features,
    making the comparison with .NET''s classes clearer. In doing so, the transition
    to Objective-C and the iOS SDK will become easier and more apparent.


    ## Chapter 5'
