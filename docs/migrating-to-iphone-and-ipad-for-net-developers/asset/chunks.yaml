    on Mac OS X using Mono. (For more information, visit [`http://www.mono-project.com/MonoMac`](http://www.mono-project.com/MonoMac).)
    MonoDroid has also been released, based on the same principles as MonoTouch but
    to target the Android operating system.


    Enough of MonoMac and MonoDroid; let''s look at MonoTouch. As stated, it allows
    you to use Mono to develop applications for the iPhone, iPad, and iPod touch with
