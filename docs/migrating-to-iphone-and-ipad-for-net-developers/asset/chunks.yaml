- fmt: "### Unit Testing\n\nTo ensure a baseline of understanding, let's briefly recap\
    \ the term *unit test*. A unit test is code written specifically to test a particular\
    \ part of your application's code. In the world of testing you'll have a series\
    \ of test cases that assert that the module you are running is behaving as expected.\
    \ For example, if a method was written to add two numbers, you may have test cases\
    \ that check if the addition is performed correctly and that if you pass invalid\
    \ parameters it handles such a circumstance elegantly.\n\nThis is no different\
    \ in any other language, certainly not when writing .NET based applications. In\
    \ the days before Visual Studio supported unit testing or before it even existed,\
    \ it was common practice to use tools such as `NUnit` to implement unit tests\
    \ (Java uses `JUnit`). Thankfully, Visual Studio has caught up and has a plethora\
    \ of testing capability including a Unit Test framework with unit tests much like\
    \ Xcode 4 (but I would argue even more advanced).\n\n### Integration Testing\n\
    \nUnit testing is, of course, only the start of your testing journey. It helps\
    \ to test discrete units of code, but when your application starts to link these\
    \ together, you're into the realm of integration testing. The key distinction\
    \ between integration and unit testing is that unit testing usually supposes the\
    \ quite simplistic stand-alone testing of single \"units\" and does not require\
    \ more complex test environments or tools. Xcode doesn't make any specific provision\
    \ for integration testing, other than writing your own unit tests that integrate\
