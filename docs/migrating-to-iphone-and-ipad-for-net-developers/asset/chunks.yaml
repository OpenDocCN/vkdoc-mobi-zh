  trans: '

    ### 其他功能


    还有一些与调试应用程序关系不大，但能作为整个测试过程的快捷操作或辅助工具的功能。为了完整起见，我将在此一并提及。


    - `Home` 模拟按下主屏幕按钮。

    - `Lock` 模拟锁定设备。

    - `Toggle In-Call Status Bar` 开启通话中状态栏，从而减少用户界面空间。

    - `Simulate Hardware Keyboard` 将你的 Mac 键盘切换为 iPhone 设备的键盘。这对于在你的应用程序中输入文本非常有用。

    - `TV Out` 使用此选项下选择的分辨率，将输出内容发送到 Mac 的电视输出端口。


    ### 在真实设备上测试


    `iOS Simulator` 是一个非常有用的工具，尤其是在多种不同设备和 iOS 版本上快速测试应用程序时。但有一点很重要：仅依赖模拟器进行测试是不够的。例如，如果你想测试设备在多个应用程序同时运行、以及外部条件（如信号强度差——无论是
    Wi-Fi、GPRS、3G 还是 GSM）变化下的真实性能，那么在真实设备上进行测试是无可替代的。


    因此，虽然我鼓励你使用模拟器，但务必在你计划支持的所有设备上，并在各种真实场景下测试你的应用程序。你可以按照后续关于应用程序部署的说明进行操作，但这需要你成为已注册并付费的
    `Apple Developer Program` 成员。


    在测试应用程序时，你可能需要考虑的一些实际因素如下：


    - `信号强度`：我前面已提过这一点，但你的无线网络连接（Wi-Fi）或移动信号，无论你使用哪种，并非总是满格。如果你的应用程序依赖此类网络连接，你应该测试不同的信号强度场景。

    - `用户界面`：考量应用程序用户界面的外观和感觉，尤其是在使用手势操作时，同时还要考虑不同人类测试者的特点。例如，让不同的人来使用它（有时称为可用性测试）。

    - `速度`：测试你的应用程序时，不仅要让它单独运行，还要在同时运行其他应用程序的情况下进行测试。你可以在模拟器中触发低内存警告，但你可以主动将设备内存限制得更低。正因如此，真实环境下的性能测试至关重要。


    此外，还要考虑超越你个人测试范围的测试。例如，提供 Beta 测试计划并不罕见，即你向 Beta 测试者有限分发你的应用程序，他们可以免费使用但需要向你提供反馈。


    ### 部署你的应用程序


    要将你的应用程序部署到任何设备上，你都需要为其签名；也就是说，你需要向你的应用程序添加一个数字证书来证明其真实性。你设备上的 `iOS` 会在所有应用程序执行前检查其真实性。这是一项安全措施，确保没有任何可能造成损害的应用程序进入你的设备。


    因此，你需要为你的应用程序签名，但事情并非这么简单。正如本书前面所述，Apple 要求你必须是已注册并付费的 `iOS Developer Program`
    成员，才能签名并提交你的应用程序。因此，为了将你的应用程序部署到你的 `iOS` 设备上并提交到 Apple 的 `App Store`，你需要加入该计划，费用为
    `$99`。这将允许你直接在 `iPhone` 设备上测试你的应用程序，并且还能支持 Ad Hoc 分发以及向 Apple 的 `App Store` 发布。


    **注意：** 你可能知道可以越狱你的 `iPhone` 设备；这能解除此类限制，并允许你使用各种工具将应用程序直接安装到你的设备上。然而，由于 Apple
    不赞成此类行为，我们在本书中不会推广它。如果你对此感兴趣，我们将留给你自己去研究。需要提醒的是：要求使用 `越狱后的 iOS` 设备会限制你的分发选择。


    让我们继续完成一些剩余的任务，以便你能将应用程序配置到你的移动设备和 `App Store` 上。这些大部分都可以在 `Provisioning` 页面完成，你可以通过选择
    `Member Center` 中的 `iOS Provisioning Portal` 来访问该页面，如图 9–10 所示。


    ![images](img/0910.jpg)


    **图 9–10.** *Apple 会员中心*


    `Member Center` 还提供许多有用的资源，包括技术支持。


    #### 创建证书以签名你的应用程序


    配置页面允许你上传来自电脑的证书请求以供其授权。你随后可以使用此证书来签名你的应用程序。要创建此请求，请从你的 `Applications` 文件夹中的 `Utilities`
    文件夹内打开 `Keychain` 应用程序。启动后，从菜单中选择“从证书颁发机构请求证书”选项，如图 9–11 所示。


    按照屏幕上的指示操作，输入你的姓名和电子邮件地址，并选择将请求保存到磁盘。你将在配置页面中需要此文件。


    保存后，回到 `Provisioning Portal` 的 `Certificates` 部分。在 `Development` 标签页下，你会看到完成该流程的说明，以及一个带有
    `Choose File` 按钮的上传请求选项。选择此按钮，然后指向你刚从 `Keychain` 请求中保存的文件。这将上传请求至 Apple 进行处理。初始时它将显示为
    `Pending`，但很快它就会被处理，状态将变为 `Issued`，如图 9–12 所示。


    ![images](img/0911.jpg)


    **图 9–11.** *使用 Keychain 请求证书*


    ![images](img/0912.jpg)


    **图 9–12.** *配置页面上已颁发的证书*


    现在你可以下载此证书，并通过双击它并按照屏幕上的指示操作，将其安装到你的 `Keychain` 中。

    '
- fmt: '#### Registering Your Device


    Next, you will need to register your mobile device for development. Again, this
    can be done through the Provisioning Portal. First, you''ll need the Unique ID
    of your device. You can use the `Devices` section in Xcode 4''s `Organizer` to
    retrieve this ID. With your device connected to your computer, launch Xcode 4
    and it will automatically take you to this page, showing the Unique ID that you
    need. You can see this in [Figure 9–13](#Chapter09.html#fig_9_13).


    ![images](images/0913.jpg)


    **Figure 9–13.** *Using Xcode''s Organizer to retrieve your device''s Unique ID*


    Make a note of this device ID, and then go back to the Provisioning Portal and
    the `Devices` page. Here you can choose the `Add Devices` button, shown in [Figure
    9–14](#Chapter09.html#fig_9_14), and enter a name for the device (which can be
    whatever you want) and the Unique ID, taken from the Xcode screen. Complete this
    screen and your device will be registered within the Provisioning Portal.


    ![images](images/0914.jpg)


    **Figure 9–14.** *Registering a device*


    You may have noticed the `Use for Development` button on the Xcode Organizer screen,
    suggesting it will allow you to use the device for development. Xcode has the
    ability to create, download, and install on your behalf a Developer Certificate,
    Distribution Certificate, and a basic Developer Provisioning Profile (known as
    the Team Provisioning Profile), all with the click of a button.


    So, go back to the Organizer screen and choose this option by selecting this button
    and following the simple on-screen instructions, which simply prompt you for passwords
    at certain stages. Once complete, your device will be registered under Xcode for
    development.


    #### Using the Provisioning Portal to Get Started


    The Provisioning Portal also provides a `Launch Assistant` to help you to install
    the necessary certificates and create the required provisioning profiles, allowing
    you to start to build applications. It''s pretty straightforward and accessed
    from the Provisioning Portal''s home page, but I''ll take you through it for completeness
    and to explain some points. First, select `Home` on the Provisioning Portal and
    choose the `Development Provisioning Assistant`. You''ll be presented with the
    screen shown in [Figure 9–15](#Chapter09.html#fig_9_15) where you will create
    an App ID.


    ![images](images/0915.jpg)


    **Figure 9–15.** *Creating an App ID*


    The first step is to create an App ID, a unique ID associated with your application.
    You can choose to create an App ID here manually or select the wildcard option
    from the list that automatically chooses an App ID for any app you deploy. Unless
    you specifically want to associate a single App ID with multiple apps, I suggest
    you choose this option.


    Pressing `Continue` will take you to the next stage, shown in [Figure 9–16](#Chapter09.html#fig_9_16).


    ![images](images/0916.jpg)


    **Figure 9–16.** *Choosing an Apple Device*


    This stage involves choosing the device you wish to use. Because I''ve already
    registered mine, it appears in the `Use an existing Apple device` list. If it''s
    your only registered device, it is automatically selected. So leave it as is and
    move on using the `Continue` button.


    The Development Certificate screen in [Figure 9–17](#Chapter09.html#fig_9_17)
    opens.


    ![images](images/0917.jpg)


    **Figure 9–17.** *Choosing a Development Certificate*


    This step involves choosing your iOS Development Certificate, which again should
    already exist from the previous steps. Leave this screen with your existing Development
    Certificate selected and again move on using the `Continue` button. The Provisioning
    Profile page will be displayed next, seen in [Figure 9–18](#Chapter09.html#fig_9_18).


    ![images](images/0918.jpg)


    **Figure 9–18.** *Provisioning Profile page*


    A Provisioning Profile is a collection of data collected under a named profile
    and required for you to install applications on your device. On this screen, give
    your profile a name and the rest is auto-populated. Then choose the `Generate`
    button, which will generate the profile. When complete, you''ll see a screen similar
    to that in [Figure 9–19](#Chapter09.html#fig_9_19).


    ![images](images/0919.jpg)


    **Figure 9–19.** *Provisioning Profile generated*


    You can then continue. You''ll be presented with instructions on how to install
    the Provisioning Profile, shown in [Figure 9–20](#Chapter09.html#fig_9_20).


    ![images](images/0920.jpg)


    **Figure 9–20.** *Installing your Provisioning Profile*


    Follow these instructions and your Provisioning Profile will be installed. Finally,
    check that the installation has completed by looking in Xcode''s Organizer to
    see that the profile is present. It should be from the work Xcode has already
    done anyway.


    #### Build and Deploy Your Application


    So you''ve done all the preparatory work. Now let''s build an application and
    deploy it on your device. Open up an application you wish to deploy in Xcode.
    I started with the initial Hello World program, but in your case it will be the
    application you wish to deploy. In Xcode, the main thing you need to do is to
    sign the application. Remember all the steps you went through to create the certificates
    and Provisioning Profile?


    So, open up your application and select `Build Settings` in the main pane (see
    [Figure 9–21](#Chapter09.html#fig_9_21)). In the `Code Signing` section, choose
    an appropriate profile; given I''m still developing, I chose my development profile
    but if you were targeting the App Store or Adhoc provisioning (more on these later),
    then you would choose profiles that reflect this.


    ![images](images/0921.jpg)


    **Figure 9–21.** *Signing your application in Xcode*


    At this point, before you build your application, check that your application
    identifier is correct under `Summary`. This identifies the application on your
    device. In [Figure 9–22](#Chapter09.html#fig_9_22) you can see I''ve added one
    that includes my domain and the application''s title.


    ![images](images/0922.jpg)


    **Figure 9–22.** *Adding your Application''s Identifier*


    Now go ahead and build your application, ensuring that your target scheme in Xcode
    is for your target device and not left on the simulator. Also check that your
    application icon is included as an `icon.png` file and the filename is included
    within your `info.plist` file by using the `Icon file` setting under the `Info`
    tab. When you start to build your application, you will be prompted to accept
    its request to sign the application using your Keychain certificate. Accept this
    request, and allow the build to complete and the signing of your application to
    happen. You now have an application built and ready for deployment.


    To deploy your application on your device, open up the Xcode Organizer and select
    your device in the left hand pane; you''ll notice that an `Applications` option
    exists. You can see this and the installed application in [Figure 9–23](#Chapter09.html#fig_9_23).


    ![images](images/0923.jpg)


    **Figure 9–23.** *Xcode''s Organizer with Device and Applications*


    At the bottom of the `Applications` pane you will notice two options, `Add` and
    `Delete`. These allow you to add or delete an application from your device. Choose
    `Add`. At the dialogue that requests you locate application to add, point it at
    the Hello World application binary that you just built in Xcode. Alternatively,
    you can drag the executable onto this page. In either case, this will install
    the application to your device. Take a look at your mobile device when complete
    and you should see your application there, ready to test!


    You have now built and deployed your first Apple mobile device application. You
    can use this to do some real-world testing and when happy with it, move to the
    next stage, which is deployment to either the App Store or via another mechanism
    called Adhocdeployment.'
