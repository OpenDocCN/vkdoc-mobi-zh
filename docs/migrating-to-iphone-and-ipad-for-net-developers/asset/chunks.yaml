  trans: '

    # 核心服务


    核心服务提供了所有应用（无论是直接使用还是通过其他框架间接使用）所依赖的基础系统服务。其主要框架如下：


    -   **通讯录（`AddressBook.framework`）**：提供了一套 API，允许以编程方式访问存储在移动设备中的联系人。

    -   **CFNetwork（`CFNetwork.framework`）**：提供了对设备可用网络协议的高性能、底层访问能力。

    -   **Core Data（`CoreData.framework`）**：结合 Xcode 提供了管理应用数据的功能，其原理是利用在 Xcode 中可视化定义的模式以及一套支持性的数据管理
    API。该框架非常适合 MVC 模式，并能显著减少所需的代码量。

    -   **Core Telephony（`CoreTelephony.framework`）**：提供了与兼容移动设备电话功能进行交互的能力。

    -   **Event Kit（`EventKit.framework`）**：提供了访问设备上日历事件的支持。

    -   **Foundation（`Foundation.framework`）**：为核心数据类型和函数提供了基于 Objective-C 的 API 支持。

    -   **Store Kit（`StoreKit.framework`）**：提供了在应用内购买内容和服务的支持，例如附加内容。

    -   **系统配置（`SystemConfiguration.framework`）**：提供了对设备网络配置细节的访问，例如 Wi-Fi 或蜂窝网络连接能力。


    ## 运行时服务


    我们目前所讨论的框架和类库，如果没有其运行所依赖的核心平台的支持，就无法存在。就.NET Framework 而言，底层运行时服务是由 CLR、底层核心服务以及操作系统共同提供的。而在
    iOS SDK 中，此类能力由 iOS 系统和 Core OS 层提供，这些层暴露了与底层运行时服务和 CLR 所支持的同类底层功能。


    在这里，我们开始看到一些关键差异。例如，.NET Framework 创建的应用运行在由 CLR 提供的托管环境中。它们不是原生应用，而是解释型应用。而使用
    iOS SDK 创建的是原生应用，它们不由任何类型的运行时解释，而是直接依赖操作系统和 SDK 提供的服务来支持应用的执行。


    以下是 CLR 所提供能力的一些示例：


    -   **内存管理**：提供应用所用内存的自动分配和回收。这种内存管理比 iOS 中提供的引用计数更进一步，在 iOS 中，你需要通过编程方式释放不再需要的资源。

    -   **类型管理**：确保核心数据类型的运行时类型安全，是跨平台、多语言能力的关键要素。

    -   **安全性**：提供安全特性，例如代码签名和访问控制功能。

    -   **多任务处理**：支持多线程应用，允许多个任务看似同时运行，并可跨多个处理器进行调度。

    -   **异常处理**：提供异常捕获和处理的支持。

    -   **委托**：在现有继承和接口能力的基础上进行了改进，提供了委托功能，使你能够实现指向函数的指针以便在运行时执行。


    iOS SDK 内部也提供了与上述列表类似的能力，但它们并不完全匹配。部分原因在于，我们处理的是直接运行在操作系统之上的原生应用，而不是像 CLR 那样的容器/运行时——除非你使用的是
    Mono 和 MonoTouch！


    让我们看看 iOS SDK 中的一些关键框架：


    -   **System**：提供操作系统之上的最底层能力，并暴露内核环境、驱动程序以及操作系统的 UNIX 接口。这包括内存分配、线程、文件系统访问、数学计算、区域信息等等。

    -   **安全（`Security.framework`）**：增强设备的内置功能，以提供程序化和应用层安全特性，例如对应用进行签名以验证其真实性、加密密钥管理以及对钥匙串共享的支持。

    -   **外部配件（`ExternalAccessory.framework`）**：支持与连接到你设备的外部硬件进行通信。

    -   **Accelerate 框架（`Accelerate.framework`）**：通过提供复杂数学计算、大数计算等接口，为计算密集型应用提供支持。


    ### Objective-C 入门，第二部分


    第 2 章对开始开发移动应用所需的一些基本要素做了简短介绍。在我们真正开始运用 iOS SDK，并专注于移动应用的特定方面之前，你需要了解 Objective-C
    语言的更多基础内容。学习一些这些稍显高级的特性，不仅能让你更好地编写自己的应用，也能让你更好地理解 iOS SDK 本身的构建方式。


    在接下来的章节中，为了帮助你从.NET 过渡，我将使用.NET 语言的术语（而非 Objective-C 的术语）来介绍每一个概念，并在两种语言之间进行比较。


    #### 类声明


    .NET 和 Objective-C 都是面向对象语言，因此类的定义是语言的一个关键结构。请看下面的 Objective-C 和.NET C#示例，并排展示。


    | **.NET C#** | `Class AClass : Object` `{`

    `intaValue;`


    `void doNothing();`

    `StringreturnString();`

    `}` |

    |-------------|---------------------------------------------------------------------------------------------------------|

    | **Objective-C** | `@interfaceAClass : NSObject` `{`

    `intaValue;`

    `}`

    `- (void)doNothing();`

    `+ (NSString)returnString();`

    `@end` |


    这两个代码段都声明了一个继承自对象类的新类对象。它有一个名为`aValue`的默认整型成员变量，以及两个方法。一个方法名为`doNothing()`，不返回任何值且不接受参数。另一个方法是`returnString()`，它返回一个字符串，但也不接受参数。


    你可能还会注意到，方法声明前面有不同字符。这很有意义，你将在下一节中了解。'
- fmt: "### Method Declaration\n\nAn obvious companion to the class is the methods\
    \ that provide the necessary functionality for the class. Methods may be defined\
    \ as *instance methods* or *class methods*, as indicated by the character that\
    \ precedes their declaration, as follows:\n\n- A class method is indicated by\
    \ a plus (`+`) character. It is the same as a C# static method. Only a single\
    \ implementation exists, and it is associated with the class type.\n- An instance\
    \ method is indicated by a minus (`-`) character. Here, the method is associated\
    \ with an instance object associated with the class.\n\nThe following are .NET\
    \ C# and Objective-C examples.\n\n| **.NET C#** | `public static void aClassMethod();`\
    \ `public void anInstanceMethod();` |\n|-------------|----------------------------------------------------------------------|\n\
    | **Objective-C** | `+ (void) aClassMethod;` `- (void) anInstanceMethod;`    \
    \          |\n\nNow let's look at how to pass parameters to the method. Consider\
    \ the following examples.\n\n| **.NET C#** | `String addStrings( String a, String\
    \ b);` |\n|-------------|-------------------------------------------|\n| **Objective-C**\
    \ | `- (NSString) addStrings (NSString *) a secondParm2:(NSString *) b;` |\n\n\
    This syntax creates a method called `addStrings`, which concatenates strings given\
    \ as two parameters and returns a string value. The way you invoke the method\
    \ is important, too. The parameters are *order-sensitive*, and so the following\
    \ call is invalid because the second parameter, indicated by the name `secondParm`,\
    \ must be the second value passed.\n\n```\n// This is invalid\n[ addStrings secondParm:s1,\
    \ s2) ];\n```\n\nHowever, the following example demonstrates the correct invocation\
    \ syntax.\n\n```\n// Correct invocation\n[ addStrings s1, secondParm:s2 ];\n```\n\
    \nBecause you're working with a reflective message-driven programming language,\
    \ the sequence and type of parameters passed are important.\n\n### Properties\n\
    \nThe use of properties has long been the mainstay for accessing class objects,\
    \ and in doing so, managing how they are accessed and what they return. Such class\
    \ members are known as *instancevariables*, as the property manages access to\
    \ the actual value associated when an instance of the class is created. They can\
    \ also be used to control scope and to hide any complexities associated with returning\
    \ the property value.\n\nObjective-C can also help by *synthesizing* (automatically\
    \ creating behind the scenes) the accessor methods (the *getter* and *setter*)\
    \ and creating the instance variable required. It also ensures that the memory\
    \ management surrounding instance variables is handled appropriately. Consider\
    \ the following examples.\n\n| **.NET C#** | `// Definition of your instance variable\
    \ either within the class, or as` `a minimum, in the scope of the class`\n`string\
    \ _name;`\n\n`// Definition of your property accessor methods are within the class`\n\
    `public string name`\n`{`\n`    get { return _name; }`\n`    set { _name = value;\
    \ }`\n`}` |\n|-------------|-------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|\n\
    | **Objective-C** | `// Definition of your property within your class header file\
    \ (.h)` `@property (nonatomic, retain) NSString *name;`\n\n`// Synthesis of your\
    \ property in the implementation file (.m)`\n`@synthesize name = _name;` |\n\n\
    You'll notice in the C# example that C# has no equivalent to the synthesis model\
    \ for accessing an instance variable. You must write accessor methods manually.\
    \ This is reminiscent of the Objective-C found in Xcode 3.*x*, which is still\
    \ valid for Xcode 4 but not the best practice. I recommend writing accessor methods\
    \ in Xcode 4 only when necessary, usually in cases where more complex processing\
    \ is required when returning property values.\n\n### Strings\n\nBecause Objective-C\
    \ is based on the C programming language, you are free to use and manipulate strings\
    \ in the C way, through the use of pointers and strings essentially being character\
    \ arrays. There is no C# comparison, as C# doesn't support pointers, so we'll\
    \ use strings, string constants, and more advanced features, such as string localization\
    \ as comparisons.\n\nConsider the following examples for representing a string\
    \ constant, which is a static string value that cannot be changed.\n\n| **.NET\
    \ C#** | `// Define a constant string using the following syntax.` `const string  example=\"\
    This is a constant string\"`\n\n`// Using this syntax to set a string attribute`\n\
    `window.title = example;` |\n|-------------|----------------------------------------------------------------------------------------------------------------------------------------------------------|\n\
    | **Objective-C** | `// Define a constant string using the following syntax.`\
    \ `// @\"This is a constant string\"`\n\n`// Using this syntax to set a string\
    \ attribute`\n`window.title = @\"Main Window Title\";` |\n\nThe following examples\
    \ show the definition of a string using the respective string class provided within\
    \ the language. Note that using the class with the `@` symbol creates an *immutable*\
    \ string—that is, a string that cannot be changed.\n\n| **.NET C#** | `String\
    \ string1 = @\"This is an immutable string\";` \n`// Both of these statements\
    \ are the same`\n`String string2 = \"This is a mutable string\";`\n`String string3\
    \ = new string(\"This is a mutable string\");` |\n|-------------|----------------------------------------------------------------------------------------------------------------------------------------------------------|\n\
    | **Objective-C** | `NSString *string1 = @\"This is an immutable string\";` `NSString\
    \ *string2 = \"This is a mutable string\";` |\n\nIn Xcode 4, you can also create\
    \ a `Localizable.string` file that contains the string resources, assigned both\
    \ a name and value, which then are referenced at runtime in your code. This allows\
    \ your string values to be configured for the locale in which you're deploying\
    \ your application. Store the values in your `Localizable.string` file in the\
    \ following format:\n\n```\n\"LOCAL_MAIN_MENU_TITLE\" = Main Menu\";\n```\n\n\
    And then reference the string in your code using the following syntax:\n\n```\n\
    NSLocalizedString(@\"LOCAL_MAIN_MENU_TITLE\", @\"\");\n```"
