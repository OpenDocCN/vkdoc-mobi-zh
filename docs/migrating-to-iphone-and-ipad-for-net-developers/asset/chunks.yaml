- fmt: '### Comparing iOS Device Capabilities


    We have already touched on the types of Apple devices you are able write applications
    for using the iOS SDK, and noted that not all devices are equal. It is important
    to consider the device or devices you intend to target, their respective strengths
    and weaknesses, and the capabilities exposed through the operating system. Such
    due diligence will ensure that the customer has the user experience you intend,
    and that you approach your application development in a way that embraces the
    capabilities the target device has and ensures you have a robust and dependable
    application.


    The focus of this book is application development for mobile applications (although
    some of the tools and techniques can also be used for desktop applications). When
    considering the mobile devices available, our targets are the iPhone, the iPod
    touch, and the iPad. [Table 4-1](#Chapter04.html#tab_4_1) lists some of their
    features based on the latest generation of each device.


    ![images](images/t0401.jpg)


    ### iOS Application Design


    When starting to think about your application''s design, in addition to looking
    at the capabilities of the devices you wish to target several other considerations,
    such as compatibility and tuning, are important when designing your application.
    Additionally, you should have an understanding of certain design patterns when
    working with the iOS SDK and Objective-C, as that will give you valuable insight
    as to why classes and APIs might be implemented in a given way. Design patterns
    also provide an excellent method of ensuring simplicity and elegance in your own
    applications.


    We''ll dig a little further into design considerations and design patterns in
    the following sections.


    #### Design Considerations


    In planning and developing your application, following a set of overarching principles
    not only helps to ensure that your application is well designed for its purpose,
    but also allows you to make the best use of the capabilities available on the
    device you target. As you move through this book, be sure to consider the following
    principles:


    - Design your application to be as compatible with the broadest spectrum of devices
    as possible. This will maximize your market opportunity.

    - Using the advanced capabilities of a device is OK, but if you can, provide options
    to automatically and/or manually turn off these features.

    - Test on as many devices as you can, and not just using the simulator—test with
    real devices, if possible. We will explore the topic of testing in more detail
    in [Chapter 9](#Chapter09.html#ch9).

    - Don''t be tempted to leave your application unchanged when moving between significant
    form factors, such as iPhone to iPad.

    - Tune for performance. Be aware of memory constraints and multithreading capabilities.

    - Remember to consider costs. If your app requires a network connection, consider
    periodically scanning for Wi-Fi when using 3G.


    As you build your applications, you should always be cognizant of these basic
    considerations. Now let''s move on to some design specifics in the form of iOS
    design patterns.


    #### Design Patterns


    The first thing to note when designing and implementing applications using the
    iOS SDK and Objective-C is Apple''s use of design patterns. Design patterns are
    not a new concept, but not all operating systems or SDKs faithfully implement
    them. For example, the way that .NET''s Windows Forms addresses user-interface
    design doesn''t define or prescribe any kind of design pattern. This is left to
    the individual designing and implementing the application, if that developer chooses
    to do so.


    A *design pattern* describes an approach to a common problem for which an elegant
    solution design has been created. The design is expressed in written form, often
    with diagrams depicting objects, their relationships, and their behavior.


    A good example of a design pattern is the Singleton pattern. This restricts the
    instantiation of a class to a single object. The first time it is called, an object
    is created, but subsequent calls return a reference to the existing object. Its
    typical usage is for an `Application` object, where only one instance of the class
    can exist per application.


    The use of design patterns by Apple is fundamental in helping to provide a framework
    around which your applications are written, and in doing so, helping to reinforce
    the user experience Apple is so protective of. Additionally, the use of patterns
    is good practice. It makes the implementation of applications easier, as some
    of the decisions around how to approach designing your application are already
    made for you.


    The practice of using design patterns isn''t implicit within the .NET Framework.
    It provides a Class Library with a set of APIs, but the architectural structure
    of your application and the implementation of design patterns are left to you—well,
    almost! As you can imagine, the .NET community is always happy to offer support,
    whether this is Microsoft itself through the Microsoft Developer Network (MSDN)
    at [`http://msdn.microsoft.com`](http://msdn.microsoft.com) or third-party sites
    such as the dofactory at [`http://www.dofactory.com/Framework/Framework.aspx`](http://www.dofactory.com/Framework/Framework.aspx).


    [Table 4-2](#Chapter04.html#tab_4_2) describes some important iOS design patterns
    that you will use with your applications.


    ![images](images/t0402.jpg)


    Now that you have had an overview of basic design considerations and design patterns,
    we''ll delve into an application''s structure and life cycle when running on iOS.


    ### Looking Under the Hood of an Application


    So, you''ve chosen which device or devices you wish to target and have an overview
    of their capabilities. Now let''s take a look at how applications are structured
    on the iOS operating system, what to consider when designing them, and the fundamentals
    of how they are built.


    Once you''ve designed your application, you can start to look at how to implement
    it. At this stage, it is important to understand how an iOS application is structured
    and runs internally. Consider the core application life cycle shown in [Figure
    4–1](#Chapter04.html#fig_4_1).


    ![images](images/0401.jpg)


    **Figure 4–1.** *iOS application life cycle*


    As you can see in the diagram, the MVC pattern is at the heart of an iOS application,
    which is no surprise, given a user interface is displayed and human interaction
    is required.


    Once your application has launched, the UIKit framework is responsible for managing
    the behavior of your application. It receives events from the operating system,
    and your application must respond to these events, which may be system-generated
    or user-generated. The behavior is similar to the Microsoft Windows messaging
    pattern, with a message queue from which events are retrieved and processed.


    You don''t need to physically process every message. A default implementation
    is provided for many messages, and the framework will therefore just process them.
    But when you require alternative behavior, or you want to change the default behavior
    in some way, then you can provide your own implementation for these events.


    Next, let''s take a look at the sequence of events that happen as part of the
    application''s life cycle.'
