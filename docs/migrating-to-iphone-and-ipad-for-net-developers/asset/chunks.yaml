- fmt: '### What''s New in Xcode 4?


    If you''re familiar with Visual Studio as a development environment, you''ll find
    yourself far more at home with Xcode 4 than with previous versions. So what are
    these new features?


    - **New user interface**: The new integrated development environment (IDE) combines
    the separate windows from previous versions into a single window with different
    navigation panes, making it far easier to use. This includes the Interface Builder
    for creating new GUIs for your applications.

    - **Assistance:** The software provides inline context-sensitive help as you write
    your source code—for example, prompting you with code for the class from which
    you may be inheriting. It''s similar to Microsoft''s IntelliSense, best known
    for its use within the Microsoft Visual Studio IDE.

    - **New debugger:** This version provides an integrated debugging interface that
    allows you to step through your code and associated variables as you execute your
    application.

    - **Instruments**: These allow you to gather information about how your application
    is performing and what effect it may be having on your operating system. For example,
    you can use some of the instruments provided to understand how your application
    consumes memory.


    ### Apple iOS Dev Center Resources


    [Chapter 1](#Chapter01.html#ch1) also referenced the iOSDev Center (see [`http://developer.apple.com/devcenter/ios/index.action`](http://developer.apple.com/devcenter/ios/index.action))
    and a number of other resources. Now is probably a good time to take a look at
    some of these. The following are some resources that will support you through
    this chapter (and the rest of the book):


    - **iOS Human Interface Guidelines**: Describes the considerations you should
    make when designing your interface and provides guidelines on how to create the
    best user experience.

    - **App Design Strategies**: This is a particularly useful subsection of the guidelines,
    as it helps you to codify your thinking about the idea you have for your application,
    such as the features that you might include.

    - **Getting Started**: A number of short but very useful guides on how to get
    started with a number of facilities, including the tools, the iOS SDK, and the
    programming language. I recommend the “iOS Starting Point” section ([`http://developer.apple.com/library/ios/#referencelibrary/GettingStarted/GS_iPhoneGeneral/_index.html`](http://developer.apple.com/library/ios/#referencelibrary/GettingStarted/GS_iPhoneGeneral/_index.html))
    as a good place to get started.


    ### Installing Xcode and the iOS SDK


    You should have decided by now which version of Xcode you''ll be using, and therefore
    the associated iOS SDK. Given that we''re looking to target the latest Apple mobile
    devices in this book, and I want to showcase the latest tooling options, I will
    use the latest version of Xcode available at the time of writing: Xcode 4. All
    of the examples in this book use Xcode 4, partly because of some of its improvements,
    and I recommend that you do the same.


    One method for obtaining Xcode 4 is to take a look at the CD or DVD provided within
    your Mac. Xcode and the iOS SDK are often provided on separate media, and it''s
    simply a matter of finding the CD or DVD, inserting it into the drive, locating
    the file `devtools.mpkg`, and double-clicking it to start the installation.


    Another route is to download the app from the App Store, which is the most cost-effective
    solution for obtaining the very latest version. Simply open the App Store application
    on your desktop and search for Xcode. Finally, you could visit Apple''s iOSDev
    Center to obtain the developer preview of Xcode 4.2 and iOS 5. This is what we''ll
    use in our book. Either by navigating to [`https://developer.apple.com/devcenter/ios/index.action`](https://developer.apple.com/devcenter/ios/index.action),
    or by visiting Xcode on the App Store, you will see a screen similar to that shown
    in [Figure 2–1](#Chapter02.html#fig_2_1).


    ![images](images/0201.jpg)


    **Figure 2–1.** *Xcode available within the App Store*


    Scroll down and select to download Xcode 4.2. Be warned: the file is large in
    size, so for all but the fastest of Internet connections, it will take a while
    to download. This is a sore point for many users, but once it''s installed, the
    benefits you''ll gain outweigh the wait.


    After downloading Xcode, start it up to begin the installation. You should be
    presented with the screen shown in [Figure 2–2](#Chapter02.html#fig_2_2).


    ![images](images/0202.jpg)


    **Figure 2–2.** *Xcode 4 installation startup screen*


    Follow the on-screen instructions and complete the installation of Xcode 4. Once
    the installation is complete, you should find the Xcode 4 application icon at
    the bottom of your screen. Click this icon to launch the program, as shown in
    [Figure 2–3](#Chapter02.html#fig_2_3).


    ![images](images/0203.jpg)


    **Figure 2–3.** *Running the Xcode 4 application*


    It''s also a good idea to store all of your source code in a specific folder or
    repository of your choice. This should be somewhere in your own `Home` area. Set
    up this folder now, so it''s ready to receive your first iPhone application. Create
    the folder in the Finder as preferred, and name it `Projects`.


    When creating new projects in Xcode, you can direct your project location to this
    folder or create a local repository in this location instead, and use the version-control
    system to manage the changes you make as you develop your application. For version
    control, you have two options. You can use either Git or Subversion—both are installed
    as part of the Xcode installation. Subversion is typically server-based, although
    you could run the server on your local computer and create a local repository
    using the command-line interface, similar to the following:


    ```

    svnadmin create <repositoryname>

    ```


    Once you''ve successfully created the repository in your desired location, you
    can add this to your Xcode repository list. To add the new repository, select
    `File` ![images](images/U001.jpg) `Repositories`. On the screen presented, click
    the plus (+) symbol to display a pop-up menu, and then choose the `Add Repository`
    option. This will present the screen shown in [Figure 2–4](#Chapter02.html#fig_2_4).
    Complete the fields, pointing at the repository you''ve just created. Click the
    Next button, and follow the on-screen instructions to complete the registration
    of your repository.


    ![images](images/0204.jpg)


    **Figure 2–4.** *Adding a repository*'
