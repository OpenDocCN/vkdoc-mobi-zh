    Let''s take a quick look at some of the project files created for you:


    *   `HelloWorldAppDelegate`: The *application delegate* is the controller that
    handles application initialization, including displaying the initial view for
    your user interface. It is also responsible for handling application termination
    when you exit your application. There is normally only one application delegate
    of object type `UIApplication`. This is called a *singleton* object.

    *   `MainWindow.xib`: This file represents the structure and resources for your
    user interface. It''s the Mac OS X Interface Builder file, hence the `.xib` extension.
    In a typical application, `mainwindow.xib` is really a container for multiple
    views that you might have within your application, so it''s common, and indeed
    Apple Best Practice, to have additional view controllers (and so `.xib` files)
    associated for every view. In our example, we have `HellowWorldViewController`
    to manage this view, and we''ll reserve our main window for navigation across
    different views.

    *   `HelloWorldViewController`: The view controller class is always associated
    with a view, and this is where the logic for the user interface is implemented.
    This class completes the model-view-controller design pattern used by the iOS
    device to implement its GUIs. A view controller itself will contain properties
    that may be linked to the controls on your interface. For example, you may ask
    the user to enter text in a text field and wish to store this information somewhere
    using property getters and setters. You''ll see examples of this in the source
    code we use throughout the book.


    For each category, you will find you might have one or more of the following files,
    with some logically grouped. For example, an Implementation file will normally
    have an associated header file and vice versa. The key file types are as follows:


    *   **Header (**.h**)**: This is the header file that will contain references
    and interface definitions but not the actual. One reason for having a header file
    is that if your code references objects and their interfaces for which you don''t
    have the source code, but you do have their implementation in a static library,
    you would simply include the appropriate header file for the implementation to
    be resolved at build time.

    *   **Implementation (**.m**)**: This is the implementation file, and essentially
    the same as a `.c` file in the C programming language or the `.cs` file in the
    C# programming language. The implementations for your interfaces and other items
    are provided within these files and referenced at build time.

    *   **UI resource file (**.xib**)**: This is a Mac OS X Interface Builder resource
    file, represented in XML. It is not a deployable file, but something used in the
    build of your application to create your executable. It profiles the XML representation
    of your user interface, and it is loosely coupled to your user-interface logic
    through the view controller.


    In addition to these files, a number of supporting files complete an application.
    For example, you will find in the `\Supporting Files` folder a number of core
    files, including the main module with the starting function `main()`, which is
    described in the next section. Also included are references to the required precompiled
    headers to speed up the build stage of the application.'
  trans: '

    #### 创建项目


    让我们首先使用 Xcode，通过 iOS SDK 提供的其中一个模板来创建一个项目，这样能让我们有个良好的开端。以这种方式提供项目模板，与你在 Microsoft
    Visual Studio 以及其他 IDE（如 Eclipse）中看到的类似。这些模板默认定义了与你所选项目类型相关的一些特性、文件和资源。你可以在图 2–6
    和图 2–7 中看到 Visual Studio 与 Xcode 4 之间的相似性。


    ![images](img/0206.jpg)


    **图 2–6.** *Visual Studio 2010 项目模板*


    ![images](img/0207.jpg)


    **图 2–7.** *Xcode 4 项目模板*


    有许多模板可供选择，而“正确”的模板实际上取决于你在构建的应用类型。模板也并不仅限于应用程序。请注意，在 图 2–7 的左侧窗格中，Xcode 提供了创建库以及应用程序的模板，而且针对
    Mac OS X 平台的选择甚至更加广泛！


    对于本例，请选择基于视图的应用程序模板，该模板使用单个视图来实现其用户界面。（在本章稍后介绍如何创建用户界面时，我们会更详细地讨论视图。）此时你将看到如图
    2–8 所示的屏幕，要求你为应用程序设置一些选项，包括你希望针对的设备系列。如图所示，将产品命名为 `HelloWorld`，并选择 iPhone 作为设备系列。然后点击“下一步”按钮。


    ![images](img/0208.jpg)


    **图 2–8.** *创建新项目*


    现在可以继续创建项目及其相关文件和资源了。完成之后，你将获得一个新的 Xcode 项目，其中显示的项目及其文件结构如图 2–9 所示。


    ![images](img/0209.jpg)


    **图 2–9.** *在 Xcode 中打开 HelloWorld 项目*


    花些时间探索一下，查看项目结构、创建的文件以及一些菜单。你会注意到有些文件包含提供默认实现的源代码。现在不必理解所有内容。


    #### 探索项目与文件结构


    正如我所提到的，一旦创建完成，你的空项目将拥有许多为你创建的默认文件。这些文件为针对你所选设备（本例中为 iPhone）的基于视图的空项目提供了默认实现。


    让我们快速浏览一下为你创建的一些项目文件：


    *   `HelloWorldAppDelegate`：*应用程序委托* 是负责处理应用程序初始化的控制器，包括显示用户界面的初始视图。它还负责在退出应用程序时处理应用程序终止。通常只有一个
    `UIApplication` 对象类型的应用程序委托。这被称为*单例*对象。

    *   `MainWindow.xib`：该文件表示用户界面的结构和资源。它是 Mac OS X 的 Interface Builder 文件，因此扩展名为
    `.xib`。在典型的应用程序中，`mainwindow.xib` 实际上是你应用程序中可能包含的多个视图的容器，因此，为每个视图关联额外的视图控制器（以及
    `.xib` 文件）是常见的做法，实际上也是苹果的最佳实践。在我们的示例中，我们有 `HellowWorldViewController` 来管理此视图，我们会保留主窗口用于在不同视图之间进行导航。

    *   `HelloWorldViewController`：视图控制器类始终与一个视图关联，并且这是实现用户界面逻辑的地方。该类完善了 iOS 设备用于实现其
    GUI 的模型-视图-控制器设计模式。视图控制器本身将包含可能与界面上的控件相关联的属性。例如，你可能要求用户在文本字段中输入文本，并希望使用属性 getter
    和 setter 将信息存储在某处。你将在本书中使用的源代码中看到这样的例子。


    对于每个类别，你可能会发现有一个或多个以下文件，其中一些文件按逻辑分组。例如，一个实现文件通常会有一个关联的头文件，反之亦然。关键的文件类型如下：


    *   **头文件 (`.h`)**：这是将包含引用和接口定义但不包含实际实现代码的头文件。拥有头文件的一个原因是，如果你的代码引用了你没有源代码的对象及其接口，但在静态库中有它们的实现，你只需包含相应的头文件，即可在构建时解析实现。

    *   **实现文件 (`.m`)**：这是实现文件，本质上与 C 编程语言中的 `.c` 文件或 C# 编程语言中的 `.cs` 文件相同。你的接口和其他项目的实现代码将包含在这些文件中，并在构建时被引用。

    *   **UI 资源文件 (`.xib`)**：这是一个以 XML 表示的 Mac OS X Interface Builder 资源文件。它不是一个可部署的文件，而是在构建应用程序时用于生成可执行文件的文件。它描述了用户界面的
    XML 表示，并通过视图控制器与你的用户界面逻辑松散耦合。


    除了这些文件之外，许多支持文件共同构成了一个完整的应用程序。例如，你会在 `\Supporting Files` 文件夹中找到一些核心文件，包括包含起始函数
    `main()` 的主模块（下一个章节将对其进行描述）。此外，还包含了对必需的预编译头文件的引用，以加快应用程序的构建阶段。

