    reuse your experience. Clearly, the use of MonoTouch makes this far easier, but
    you will be dependent on the support MonoTouch has for the iOS and Cocoa Touch
    SDKs. If support is not provided, or features are incomplete, you will not be
    able to use this option—unless you write your own implementation!


    So, apart from contributing toward the Mono project yourself, the other option
    is to map your C# and .NET Framework knowledge onto the iOS SDK and use Objective-C.
    The rest of the book will focus on doing just that and bridging the gap in your
    knowledge.


    ## Chapter 4


    ## Going Deeper: .NET, Objective-C, and the iOS SDK


    Understanding the capabilities of Apple''s mobile devices, the features of the
    iOS operating system, and the different options available to you for application
    development is only part of the story. Creating the Hello, World application using
    both native Apple development tools and numerous third-party options was cool,
    and the submission of it to Apple''s App Store is possible, but it''s not going
    to earn you million of dollars. It is very unlikely to attract good reviews, or
    even any downloads!


    Now we need to look at how to create a more compelling application—one that will
    be the next “must-have” mobile app that *will* help you make some money. To do
    this, we need to explore the runtime frameworks in more detail, and the supporting
    design-time frameworks in even more detail. This will help you to create a rich
    user experience within your application.


    We''ll take the existing knowledge you have in .NET and apply that to Apple''s
    own native tooling and SDKs. This will not only allow you to create the applications
    you desire, but will also give you a great head start in exploiting Apple''s devices
    to full effect. The goal is to make the transition from .NET to Apple''s native
    development environment much easier and faster.


    In this chapter, we will take a more detailed look at the iOS SDK when compared
    with .NET''s capabilities and the different languages supported. Specifically,
    we''ll cover the following topics:


    *   Compare the relative capabilities of Apple''s mobile devices

    *   Take a look under the hood of an application, reviewing its structure and
    life cycle

    *   Consider how you should approach designing an application and what Apple has
    done to help

    *   Compare the iOS SDK and the .NET Framework, both in approach and implementation

    *   Compare the development tools to support application development

    *   Review an Objective-C and Xcode 4 primer


    We will start by building on the introductions given so far, and take a more detailed
    look at iOS and the iOS SDK side by side with the .NET Framework and programming
    model.'
