    其实现非常直接。`useCamera` 方法会检查运行应用程序的设备是否拥有相机。在模拟器上通常没有，因此你需要在真实设备上运行此应用以进行彻底测试。它会创建一个
    `UIImagePickerController` 实例，将 `cameraViewController` 分配为该对象的委托，并将媒体源定义为相机。指定支持的媒体类型的属性被设置为仅限图像。最后，显示相机界面并释放
    `UIImagePickerController` 对象。你将 `newMediaAvailable` 标志设置为 `YES`，表示该图像是新的；这用于区分未使用的相机胶卷。


