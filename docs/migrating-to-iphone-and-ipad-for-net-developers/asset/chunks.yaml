- fmt: "## Writing Data to the Database\n\nTo write data to the database, you have\
    \ two options:\n\n- Construct an `INSERT` SQL statement from your string and traverse\
    \ the array you have created.\n- Bind your variables to your SQL statement, which\
    \ has each of the parameters replaced with a `?` symbol. This approach has the\
    \ added advantage of ensuring that the data you insert matches the format of the\
    \ data expected in the table.\n\nSo, first we need to loop through our array extracting\
    \ the values held within it. This is simply done in our example by using a loop\
    \ and an integer-based index, which starts at 0 (the first element) and continues\
    \ while it is less than the count of all items in the array, determined by the\
    \ `count` attribute.\n\n```\nint count = [highscore count];\nint idx = 0;\nwhile\
    \ (idx < count)\n{\n        // loop through the array, increasing idx\n}\n```\n\
    \nExtending this to cycle through the array, accessing its elements and using\
    \ the SQL binding feature to replace the `?` parameter indicators with values\
    \ from the array and then finalizing the statement, has the effect of writing\
    \ the row to the database. Here is the extended code:\n\n```\nsqlite3 *db;\nint\
    \ result = sqlite3_open(\"/documents/file\", &db);\nif (result == SQLITE_OK)\n\
    {\n    int count=[highscore count];\n    int idx = 0;\n    char *insert_sql =\
    \ \"INSERT INTO HIGHSCORE VALUES(?, ?);\";\n    sqlite3_stmt *stmt;\n    while\
    \ (idx < count)\n    {\n        // Prepare our statement for binding\n       \
    \ if (sqlite3_prepare_v2(db, insert_sql, -1, &stmt, nil) == SQLITE_OK) {\n   \
    \         // Bind the name\n            sqlite3_bind_text(stmt, 1, [[highscore\
    \ objectAtIndex: idx++] UTF8String],\n-1, NULL);   // NAME\n            // Bind\
    \ the score\n            sqlite3_bind_text(stmt, 2, [[highscore objectAtIndex:\
    \ idx++] UTF8String],\n-1, NULL);   // SCORE\n            // Step and finalize\
    \ the write\n            sqlite3_step(stmt);\n            sqlite3_finalize(stmt);\n\
    \        }\n    }\n} else NSLog(@\"Failed to open database\");\n```\n\nIn this\
    \ example, we prepare the SQL statement with the parameters using the `sqlite3_prepare()`\
    \ statement. Then while within the loop, we use the `sqlite3_bind_text()` method\
    \ to bind a variable's value—in this instance, the array index to the parameter\
    \ in the SQL statement referenced by its index position, starting at 0.\n\nAfter\
    \ each pair of array entries completes, we finalize the statement, which writes\
    \ the row to the database. We continue until all array entries have been covered.\n\
    \n## Reading Data from the Database\n\nTo check that our code works, we can now\
    \ use a simple SQL `SELECT` statement to read back the rows we've just written\
    \ to our database. For simplicity, we will use the `NSLog()` method to write the\
    \ data to the debug output view within Xcode.\n\nJust as in the previous example,\
    \ we need to prepare a SQL statement and execute it, using the `sqlite3_step()`\
    \ method to cycle through the rows until no more are found, and using the `NSLog()`\
    \ method to output each row's data. This is shown in the following example:\n\n\
    ```\n// READ FROM TABLE\nsqlite3_stmt *readstmt;\nconst char *readSQL = \"SELECT\
    \ NAME, SCORE FROM HIGHSCORE\";\nsqlite3_prepare_v2(db, readSQL, -1, &readstmt,\
    \ NULL);\nwhile (sqlite3_step(readstmt) == SQLITE_ROW)\n{\n        NSString *name\
    \ = [[NSString alloc] initWithUTF8String:(const char\n*)sqlite3_column_text(readstmt,0)];\n\
    \        NSString *score = [[NSString alloc] initWithUTF8String:(const char\n\
    *)sqlite3_column_text(readstmt,1)];\n        NSLog (@\"NAME: %@ SCORE: %@\", name,\
    \ score );\n}\n```\n\nIf you execute the complete set of code and examine the\
    \ output in the debug window of your Xcode application, it should resemble something\
    \ similar to the following (excluding all of the other debug output associated\
    \ with the running application):\n\n```\n2011-08-15 22:19:05.251 DataStorage[953:207]\
    \ NAME: Mark SCORE: 200\n2011-08-15 22:19:05.253 DataStorage[953:207] NAME: Rachel\
    \ SCORE: 300\n```\n\nThis example should have given you some insight into using\
    \ the embedded database as a more comprehensive way of persisting data to a database\
    \ represented as a local file.\n\n### Connecting to Other Databases\n\nWe've explored\
    \ the use of the embedded database found in the iOS, SQLite, but what if you have\
    \ a different database and it's held remotely? For example, what if you want to\
    \ access a remote MySQL or Microsoft SQL Server database from your device? You\
    \ have several options:\n\n- You can use a third-party client for your database.\
    \ For example, Flipper (found at [`http://www.driventree.com/flipper`](http://www.driventree.com/flipper))\
    \ is a MySQL client for the iPhone that allows you to connect to MySQL databases.\n\
    - If you have a Microsoft SQL Server database, you might want to access it by\
    \ using a database-agnostic API, such as an Open Database Connectivity (ODBC)\
    \ driver.\n- You can access the database by sourcing a similar local client API,\
    \ or exposing a services layer from SQL Server and using an XML-based API over\
    \ HTTP, like SOAP.\n\n## Creating the High-Score Example\n\nSo far, we've looked\
    \ at persisting our application's data using a number of different techniques.\
    \ Now let's explore how we can put this to use in our example application, the\
    \ Lunar Lander game we started in `Chapter 5`. The one thing that jumps out in\
    \ a game like ours is the need to persist our scores in a high score table, providing\
    \ the players with another competitive dimension to the game. So, we'll apply\
    \ our data persistence knowledge and look at creating an internal high-score structure\
    \ that is available to be displayed on the start screen and persists between application\
    \ instances."
  raw: '##### Writing Data to the Database


