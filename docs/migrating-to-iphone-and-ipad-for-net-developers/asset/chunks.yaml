  trans: '

    #### 向 App Store 提交应用


    以下是将应用提交至 App Store 的步骤：


    1. 完成应用的开发与测试。

    2. 为应用创建支持性 `info.plist` 文件（稍后将详细介绍）。

    3. 编写应用描述。

    4. 为应用选择一个唯一的数字 SKU。

    5. 整理要在 App Store 中显示的截图。

    6. 准备 iTunes 艺术图稿。

    7. 通过 iTunes Connect 提交。


    提交的任何应用都需经 Apple 审批，这包括 SDK 协议中规定的基本可靠性测试及其他分析。Apple 设有申诉流程，但仍拥有最终决定权。如果你的应用被拒，你仍可通过手动向
    Apple 提交请求，申请将应用许可给特定 iPhone 设备进行临时分发（尽管 Apple 日后可能取消此权限）。


    官方的《*App Store 审核指南*》是开发者的重要参考资料。我们将在第 9 章 进一步讨论提交应用以获取审批与分发权的相关细节。


    ### 本章小结


    本章介绍了为 Apple 移动设备（特别是 iPhone、iPod touch 和 iPad）开发应用的概念。我们探讨了如何注册为 Apple Developer
    及其推荐理由，以及移动应用开发的一些基本原则。随后讨论了驱动这些移动设备的 iOS 操作系统、iOS SDK 和 Xcode。


    介绍完这些概念后，我们了解了开发应用可用的几种不同方案。这些方案不仅包括 Apple 原生的语言与工具，还包括众多第三方选项（既有开源的，也有商业的）。


    最后，我们介绍了 App Store 的目的、收入模型以及对各种设备的支持。你学习了向 App Store 提交新应用以供审核并在获批后发布的整个流程。


    下一章将提供一个速成课程，教你使用 Apple 原生工具（iOS SDK 和 Xcode）创建简单应用。学完那一章后，你不仅将创建出第一个 iPhone 应用，还会更深入地体会移动应用开发中的一些基本概念——在接触其他可选方案时，这些概念也能复用。


    在第 3 章中，你将进一步了解第三方工具（如 Mono 系列）。之后，我们将重新聚焦于 Apple 工具，并在本书剩余部分使用它们演示如何运用你的 .NET
    知识与经验来创建引人入胜的应用。


    ## 第 2 章


    ## 即刻上手：iOS SDK 开发速成课


    第一章介绍了 Apple 的移动操作系统（iOS）以及开发移动应用的各种方案。在本章中，我们将正式开始使用 Apple 自己的软件开发工具：`Xcode`
    和 iOS SDK。


    本章将涵盖以下主题：


    - 入门所需的硬件与软件

    - 安装相关组件的指南

    - Objective-C 入门

    - `Xcode` 概览及如何启动你的第一个项目

    - 如何使用 iOS SDK 创建你的第一个 iPhone 应用


    ### 开始之前


    我们先来看看入门所需的条件——不仅包括软件组件，还有你需要的硬件。


    你还需要注册成为已注册的 Apple Developer。在允许下载 iOS SDK 之前，Apple 要求完成此步骤。在第 1 章中，我们讨论了为何需要这么做、其益处以及具体操作方法。在此提醒，你需要访问
    [`http://developer.apple.com/`](http://developer.apple.com/) 进行注册。


    **注意：** 在第 1 章中，我提到了成为已注册 Apple Developer 的一些益处。其中之一是丰富的《*入门指南*》列表，这些指南提供了关于图形与动画、数据管理等众多主题的简短介绍。你可以在
    iOS Developer Library 中找到它们及更多资源，网址为 [`http://developer.apple.com/library/ios/navigation/index.html`](http://developer.apple.com/library/ios/navigation/index.html)。


    #### 选择合适的机器


    你需要一台 Apple Mac 才能开始。你可能已经有一台旧设备，并想知道它是否仍适合开发现代移动应用。好消息是：部分较旧的 Apple Mac 机型也能运行所需软件。关键在于操作系统。


    为了支持 iPhone、iPod touch 和 iPad 的开发，你需要 `Xcode` 3.2.6 或更高版本（包括 iOS SDK 4.3）。该版本还提供对应用打包和提交至
    App Store 的支持。该版本的 Xcode/iOS SDK 需要 Mac OS X Snow Leopard 10.6.6 或更高版本，以及基于 Intel
    处理器的 Apple Mac 机器。这里的重点是 Intel 处理器。


    2006 年，Apple 停止了 PowerPC 处理器的使用，并宣布未来所有 Mac 都将采用 Intel 制造的 x86 处理器。因此，2006 年生产的
    Mac 设备（具体包括 Mac mini、iMac、MacBook、MacBook Pro 和 Mac Pro），只要具备足够的内存和硬盘空间，都可以顺畅运行
    Mac OS X Snow Leopard 或更新的 Lion 操作系统以及开发工具。所需的内存量与空间大小取决于你所安装的操作系统版本。


    **能否使用 PC？**


    如果你不想使用 Apple 设备呢？如果你希望使用运行 Windows 等操作系统的 PC 呢？这实际上取决于你计划使用哪些工具来开发移动应用。


    第 1 章中介绍的许多第三方方案，实际上是设计在基于 Windows 的 PC 上运行的，它们使用 Objective-C 以外的语言。但如果你希望使用 Apple
    的原生工具（如 `Xcode`）呢？这就没那么直接了。这些工具只能在 Mac OS X Snow Leopard 和 Lion 上运行，因此你需要一台基于
    Intel 的 Mac。不过，从技术上讲，并非毫无希望！通过使用虚拟化软件（如商业产品 VMware 或免费软件 `VirtualBox`），你可以在基于
    Intel 的 PC 上的虚拟机内运行 Mac OS X Snow Leopard。


    但请注意！虽然在虚拟机上运行该操作系统在技术上是可行的，并且有许多人成功做到了这一点（称为 Hackintosh），但这不被 Apple 的 Mac OS
    X 许可协议所允许，因此是非法的。


    #### 选择 iOS SDK


    现在你已拥有合适的机器，运行着 Mac OS X Snow Leopard 或 Lion，可以下载并安装所需软件了。但该安装什么软件呢？第 1 章介绍了 `Xcode`，它包含
    iOS SDK，并提供了构建 iOS 应用的完整工具集。如果你尚未安装，需要从 [`http://developer.apple.com/xcode/`](http://developer.apple.com/xcode/)
    下载。


    自 `Xcode` 4 发布以来，目前有两种方式获取和安装 `Xcode`。如你所知，`Xcode` 3.2.6 或更高版本支持 Apple 移动设备的开发，并且免费提供。不过，你也许想使用最新版本
    `Xcode` 4，它对 iOS 或 Mac Developer Program 的成员免费开放，也可从 App Store 购买。

