- fmt: '### Other Features


    There are some additional features that aren''t really related to debugging your
    application but act as shortcuts or assistants to the whole testing process. For
    this reason, I''ll mention them for completeness.


    - `Home` simulates pressing the home button.

    - `Lock` simulates locking your device.

    - `Toggle In-Call Status Bar` switches on the in-call status bar, thus reducing
    the user interface space.

    - `Simulate Hardware Keyboard` switches your Mac keyboard to the keyboard for
    your iPhone device. It''s good for entering text into your application.

    - `TV Out` sends the output to the TV Out port of your Mac using the resolution
    chosen under this option.


    ### Testing on Real Devices


    The `iOS Simulator` is an amazingly useful tool, especially for quickly testing
    your applications on a number of different devices and iOS versions. But it''s
    important to understand that testing on the simulator alone is insufficient. For
    example, if you want to test the real-world performance of a device with multiple
    applications running and varying external conditions such as poor signal strength
    (whether it be Wi-Fi, GPRS, 3G or GSM), then there really is no substitute for
    testing on a real device.


    So, while I encourage you to use the simulator, be sure to test your applications
    on all devices you intend to target and under a variety of real-world scenarios.
    You can do this by following the instructions that follow on application deployment,
    but this does require you to be a signed up and paid member of the `Apple Developer
    Program`.


    Some of the real-world considerations you might consider when testing your application
    are as follows:


    - `Signal Strength`: I''ve touched on this but your wireless network connection
    (Wi-Fi) or your mobile signal, whatever you might be using, will not always be
    at full strength, and if your application relies on this kind of network connectivity,
    you should test different signal-strength scenarios.

    - `User Interface`: Consider what your application''s user interface looks and
    feels like, especially when using gestures, and consider the different characteristics
    of the human tester. For example, get different people to use it (sometimes called
    usability testing).

    - `Speed`: Try your application out, not just running on its own, but with other
    applications running. You can trigger low memory within the simulator, but you
    can proactively restrict device memory above this. Real-world performance testing
    is important for this very reason.


    Also consider testing your application beyond your own individual testing. For
    example, it''s not unusual to offer a beta program where you offer a limited distribution
    of your application to beta testers who get the application for free but provide
    you with feedback.


    ### Deploying Your Application


    To deploy your application to a device, any device, you need to sign it; that
    is, you need to add a digital certificate to your application that proves its
    authenticity. The `iOS` on your device will check all applications'' authenticity
    before they are executed. This is a security measure to make sure that no applications
    make their way onto your device that might cause harm.


    So, you need to sign your application, but it''s not quite as straightforward
    as that. As explained earlier in the book, Apple requires that you are a registered
    and paid-up member of its `iOS Developer Program` in order for you to sign and
    submit your application. Thus, in order for you to deploy your application to
    your `iOS` device and submit it to Apple''s `App Store`, you will need to join
    the program at a cost of `$99`. This will allow you to test your applications
    directly on the `iPhone` device and also enables support for ad hoc distribution
    and for you to publish to Apple''s `App Store`.


    **NOTE:** You will probably know that you can jailbreak your `iPhone` device;
    this removes such restrictions and allows you to install applications directly
    onto your device using a variety of different tools. However, since Apple frowns
    on such activity, we are not going to promote it in this book. We will leave this
    for you to investigate if it''s something you are interested in. Be warned: requiring
    a `jailbroken iOS` device will limit your distribution options.


    Let''s go ahead and complete some of the remaining tasks in order to allow you
    to provision applications to both your mobile device and the `App Store`. Most
    of this can be done from the `Provisioning` page, which you access by selecting
    the `iOS Provisioning Portal` in the `Member Center`, shown in [Figure 9–10](#Chapter09.html#fig_9_10).


    ![images](images/0910.jpg)


    **Figure 9–10.** *Apple Member Center*


    The `Member Center` also provides a number of useful resources, including technical
    support.


    #### Creating a Certificate to Sign Your Application


    The provisioning page allows you to upload a certificate request from your computer
    for it to authorize. You can subsequently use this certificate to sign your applications.
    To create this request, open the `Keychain` application from the `Utilities` folder
    within your `Applications`. Once launched, select the "Request a Certificate from
    a Certificate Authority" option from the menu, as shown in [Figure 9–11](#Chapter09.html#fig_9_11).


    Follow the on-screen instructions and enter your name and e-mail address, choosing
    to save the request to disk. You''ll need this file for the Provisioning page.


    Once saved, go back to the `Certificates` section of the `Provisioning Portal`.
    Under the `Development` tab, you''ll notice instructions on how to complete the
    process and an option to upload your request complete with a `Choose File` button.
    Select this, and then point it at the file you just saved from the `Keychain`
    request. This will upload the request to Apple for processing. Initially it will
    show as `Pending`, but in a relatively short space of time, it will be processed
    and its status changed to `Issued`, as shown in [Figure 9–12](#Chapter09.html#fig_9_12).


    ![images](images/0911.jpg)


    **Figure 9–11.** *Requesting a certificate using Keychain*


    ![images](images/0912.jpg)


    **Figure 9–12.** *Issued Certificate on the provisioning page*


    You can now download this certificate and install it within your `Keychain` by
    simply double-clicking it and following the on-screen instructions.'
