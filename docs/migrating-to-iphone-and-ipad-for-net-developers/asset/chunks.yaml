  trans: "\n### 方法声明\n\n类的一个明显伴侣是提供类所需功能的方法。方法可以定义为*实例方法*或*类方法*，由其声明前的字符表示，具体如下：\n\
    \n- 类方法由加号（`+`）字符表示。它与 C# 静态方法相同。仅存在单一实现，并与类类型关联。\n- 实例方法由减号（`-`）字符表示。此方法与该类相关的实例对象关联。\n\
    \n以下是 .NET C# 和 Objective-C 的示例。\n\n| **.NET C#** | `public static void aClassMethod();`\
    \ `public void anInstanceMethod();` |\n|-------------|----------------------------------------------------------------------|\n\
    | **Objective-C** | `+ (void) aClassMethod;` `- (void) anInstanceMethod;`    \
    \          |\n\n现在让我们看看如何向方法传递参数。请考虑以下示例。\n\n| **.NET C#** | `String addStrings(\
    \ String a, String b);` |\n|-------------|-------------------------------------------|\n\
    | **Objective-C** | `- (NSString) addStrings (NSString *) a secondParm2:(NSString\
    \ *) b;` |\n\n这种语法创建了一个名为 `addStrings` 的方法，该方法连接两个参数给出的字符串并返回一个字符串值。调用方法的方式也很重要。参数是*顺序敏感的*，因此以下调用无效，因为第二个由名称\
    \ `secondParm` 指示的参数必须是传入的第二个值。\n\n```\n// 这是无效的\n[ addStrings secondParm:s1,\
    \ s2) ];\n```\n\n然而，以下示例演示了正确的调用语法。\n\n```\n// 正确调用\n[ addStrings s1, secondParm:s2\
    \ ];\n```\n\n由于你正在使用一种反射型、消息驱动的编程语言，因此传入参数的顺序和类型非常重要。\n\n### 属性\n\n属性的使用长期以来一直是访问类对象的主要方式，并以此管理它们的访问方式及其返回值。此类类成员被称为*实例变量*，因为属性管理对创建类实例时关联实际值的访问。它们也可用于控制作用域并隐藏与返回属性值相关的任何复杂性。\n\
    \nObjective-C 还可以通过*合成*（在后台自动创建）访问器方法（*getter* 和 *setter*）并创建所需的实例变量来提供帮助。它还确保妥善处理围绕实例变量的内存管理。请考虑以下示例。\n\
    \n| **.NET C#** | `// 在类内部或至少在类作用域内定义实例变量`\n`string _name;`\n\n`// 在类内部定义属性访问器方法`\n\
    `public string name`\n`{`\n`    get { return _name; }`\n`    set { _name = value;\
    \ }`\n`}` |\n|-------------|---------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|\n\
    | **Objective-C** | `// 在类头文件 (.h) 中定义属性`\n`@property (nonatomic, retain) NSString\
    \ *name;`\n\n`// 在实现文件 (.m) 中合成属性`\n`@synthesize name = _name;` |\n\n你会注意到，在 C#\
    \ 示例中，C# 没有与用于访问实例变量的合成模型等效的功能。你必须手动编写访问器方法。这让人想起 Xcode 3.*x* 中的 Objective-C，这在\
    \ Xcode 4 中仍然有效，但并非最佳实践。我建议仅在必要时才在 Xcode 4 中编写访问器方法，通常是在返回属性值需要更复杂处理的情况下。\n\n\
    ### 字符串\n\n由于 Objective-C 基于 C 编程语言，你可以自由地以 C 方式使用和操作字符串，通过使用指针以及本质上为字符数组的字符串实现。这里没有\
    \ C# 的对应项，因为 C# 不支持指针，因此我们将使用字符串、字符串常量以及更高级的功能（例如字符串本地化）作为比较。\n\n请考虑以下表示字符串常量的示例，字符串常量是一个无法更改的静态字符串值。\n\
    \n| **.NET C#** | `// 使用以下语法定义常量字符串。`\n`const string  example=\"这是一个常量字符串\"`\n\
    \n`// 使用此语法设置字符串属性`\n`window.title = example;` |\n|-------------|----------------------------------------------------------------------------------------------------------------------------------------------|\n\
    | **Objective-C** | `// 使用以下语法定义常量字符串。`\n`// @\"这是一个常量字符串\"`\n\n`// 使用此语法设置字符串属性`\n\
    `window.title = @\"主窗口标题\";` |\n\n以下示例展示了使用该语言提供的相应字符串类来定义字符串。请注意，使用带有 `@` 符号的类会创建一个*不可变*字符串——即无法更改的字符串。\n\
    \n| **.NET C#** | `String string1 = @\"这是一个不可变字符串\";` \n`// 以下两个语句相同`\n`String\
    \ string2 = \"这是一个可变字符串\";`\n`String string3 = new string(\"这是一个可变字符串\");` |\n\
    |-------------|--------------------------------------------------------------------------------------------------------------------------------------------------------------|\n\
    | **Objective-C** | `NSString *string1 = @\"这是一个不可变字符串\";` `NSString *string2\
    \ = \"这是一个可变字符串\";` |\n\n在 Xcode 4 中，你还可以创建一个包含字符串资源的 `Localizable.string` 文件，为每个资源分配名称和值，然后在运行时于代码中引用它们。这使你的字符串值能够根据你部署应用程序的区域设置进行配置。请按以下格式将值存储在\
    \ `Localizable.string` 文件中：\n\n```\n\"LOCAL_MAIN_MENU_TITLE\" = \"主菜单\";\n```\n\
    \n然后使用以下语法在代码中引用该字符串：\n\n```\nNSLocalizedString(@\"LOCAL_MAIN_MENU_TITLE\", @\"\
    \");\n```\n"
- fmt: "#### Interfaces and Protocols\n\nAn Objective-C *interface* is actually a\
    \ C# class, and an Objective-C *protocol* is actually a C# interface—confusing,\
    \ eh? Let's put these into context with some examples, and in doing so, remove\
    \ the confusion.\n\nWe'll start with a C# and the definition of a class, with\
    \ member variables and methods. C# uses the `class` keyword and syntax to define\
    \ a class; Objective-C uses the `@interface` compiler directive. We looked at\
    \ this earlier within the class declaration section.\n\nIf we focus on what C#\
    \ calls an *interface*, which Objective-C refers to as a *protocol*, this uses\
    \ a different syntax. In Objective-C, a protocol declares methods that can be\
    \ implemented by any class, or indeed, be used as a variable.\n\nConsider the\
    \ following example. It defines an interface, which is then implemented by a class.\
    \ You use angled brackets within the interface declaration to declare your class\
    \ implements the named type for implementation or specialization.\n\n| **.NET\
    \ C#** | `// Definition of your interface template` `interface IEquatable<T>`\
    \ `{` `bool Equals(T obj);` `}` `// Implementation of your class` `// which realizes\
    \ the interface` `// defined above` `public class MyClass : IEquatable<MyClass>`\
    \ `{` `    // Implementation of IEquatable<T> interface` `    public bool Equals(MyClass\
    \ c)` `    {` `      // implementation here` `    }` `}` |\n|---|---|\n\n| **Objective-C**\
    \ | `// Definition of your interface template` `@protocol IEquatable` `- (bool)\
    \ Equals : (NSObject*) a ;` `@end` `@interface MyClass : NSObject<IEquatable>`\
    \ `{` `    // Some methods here` `}` `@end` `// Implementation of your class`\
    \ `// which realizes the interface` `// defined above` `@implementation MyClass`\
    \ `// Implementation of IEquatable<T> interface` `- (bool) Equals : (NSObject*)\
    \ a` `{` `    // implementation here` `}` `@end` |\n|---|---|\n\nA class definition\
    \ can declare an implementation of more than one interface simply by separating\
    \ the interfaces by a comma, like so:\n\n`Public class MyClass : NSObject<IEquatable,\
    \ AnotherProtocol>`\n\nAs you can see, it's quite similar. One key difference\
    \ is where Objective-C uses protocols as variables or as an argument to a method,\
    \ which is often the case when an interface's implementation is used as a callback\
    \ function. Consider the example in [Listing 4-1](#Chapter04.html#list_4_1), which\
    \ defines a protocol that in turn defines a method that will indicate via a Boolean\
    \ value whether success was achieved.\n\n**Listing 4-1. Protocol Declaration Code**\n\
    \n```\n#import <Foundation/Foundation.h>\n\n// Define our protocol, with a single\
    \ method\n@protocol ProcessDataDelegate <NSObject>\n@required\n- (void) processSuccessful:\
    \ (BOOL)success;\n@end\n\n// Create an Interface using the Protocol, and notice\
    \ the use of the ID type that points\n// to a generic type that will be unknown\
    \ at compile time and resolved at run-time\n@interface ClassWithProtocol : NSObject\n\
    {\n id <ProcessDataDelegate> delegate;\n}\n\n@property (retain) id delegate;\n\
    \n-(void)startSomeProcess;\n\n@end\n```\n\nThe implementation section for the\
    \ interface defined in [Listing 4-1](#Chapter04.html#list_4_1) synthesizes the\
    \ delegate instance variable and then calls the method defined in the protocol\
    \ as needed. Its implementation is shown in [Listing 4-2](#Chapter04.html#list_4_2).\n\
    \n**Listing 4-2. Using a Protocol Declaration in the Class Example**\n\n```\n\
    #import \"ClassWithProtocol.h\"\n\n@implementation ClassWithProtocol\n\n@synthesize\
    \ delegate;\n\n- (void)processComplete\n{\n  [[self delegate] processSuccessful:YES];\n\
    }\n\n-(void)startSomeProcess\n{\n  // Create a time which uses the processComplete\
    \ interface to signal when complete\n  [NSTimer scheduledTimerWithTimeInterval:5.0\
    \ target:self\n    selector:@selector(processComplete) userInfo:nil repeats:YES];\n\
    }\n\n@end\n```\n\nFor the sake of brevity, assume you have a class that is performing\
    \ some kind of action. Further, assume this class is called from another class\
    \ to begin the processing. At some point, the caller will want to be notified\
    \ that the class processing the data is finished, and the protocol is used for\
    \ this very purpose, as shown in [Listing 4-3](#Chapter04.html#list_4_3).\n\n\
    **Listing 4-3. Using the Class in the Example**\n\n```\n@interface MyDelegate\
    \ : NSObject <UIApplicationDelegate, ProcessDataDelegate>\n{\n        ClassWithProtocol\
    \ *test;\n}\n@end\n\n@implementation MyDelegate\n-(void) processSuccessful:(BOOL)success\n\
    {\nNSLog(@\"Finished\");\n}\n@end\n```\n\n#### Delegation\n\nThe use of delegation\
    \ in the iOS SDK is common, predominately because it is introduced as an elegant\
    \ solution to the problem of complex subclassing. Instead of having complex object\
    \ hierarchies, where you need to create many more classes whose behavior may change\
    \ only slightly from one another, you can pass delegates to an object to perform\
    \ the modified behavior on your behalf. Modern best practice in today's programming\
    \ languages is to avoid deeply nested class hierarchies, and Objective-C helps\
    \ with this through delegation.\n\nThe general rule is that delegation is an alternative\
    \ to subclassing, good practice is to use it, as it creates far cleaner code.\
    \ Let's start by defining our protocol in Objective-C, as in the following examples.\n\
    \n| **.NET C#** | `// Defining the delegate in C# is different` `public delegate\
    \ void jobComplete();` |\n|---|---|\n\n| **Objective-C** | `// Definition of your\
    \ interface template` `@protocol jobComplete` `    (void)jobFinished;` `@end`\
    \ |\n|---|---|\n\nWe next define an object variable within our class pointing\
    \ to the protocol defined for our delegate and name it. We'll also expose a property\
    \ of the same name that we can call to reference our protocol, as follows.\n\n\
    | **.NET C#** | `public class MyClass` `{` `// Create our delegate` `    jobComplete\
    \ jc = new jobComplete(jobFinished);` `}` |\n|---|---|\n\n| **Objective-C** |\
    \ `@interface MyClass : NSObject {` `        id <jobComplete> delegate;` `}` `@property\
    \ (nonatomic, retain) id <jobComplete> delegate;` `@end` |\n|---|---|\n\nOur class\
    \ would then invoke the delegate as a suitable point, using the following syntax,\
    \ and must `@synthesize` the delegate property as part of its implementation.\n\
    \n| **.NET C#** | `public void SomeMethod()` `{` `    // Invoke our job complete\
    \ delegate` `     jc();` `}` |\n|---|---|\n\n| **Objective-C** | `-(void) SomeMethod`\
    \ `{` `    // Signal that the job is complete by calling the delegate` `    [delegate\
    \ JobComplete];` `}` |\n|---|---|\n\nThe only thing left to do in our class is\
    \ implement the delegate's `jobFinished` method, as in the following, which will\
    \ be called as shown previously.\n\n| **.NET C#** | `public void jobFinished()`\
    \ `{` `    // do something to signal the job has finished` `}` |\n|---|---|\n\n\
    | **Objective-C** | `-(void) jobFinished` `{` `    // do something to signal the\
    \ job has finished` `}` |\n|---|---|\n\nI encourage you to play around with some\
    \ sample code to test your understanding of delegates.\n\n**NOTE:** On the Apple\
    \ Developer Program web site, you will find some more information about how to\
    \ use delegates and delegation. If you're interested, take a look at [`http://developer.apple.com/library/mac/#documentation/General/Conceptual/DevPedia-CocoaCore/Delegation.html`](http://developer.apple.com/library/mac/#documentation/General/Conceptual/DevPedia-CocoaCore/Delegation.html)."
  raw: '#### Interfaces and Protocols


    An Objective-C *interface* is actually a C# class, and an Objective-C *protocol*
    is actually a C# interface—confusing, eh? Let''s put these into context with some
    examples, and in doing so, remove the confusion.


    We''ll start with a C# and the definition of a class, with member variables and
    methods. C# uses the `class` keyword and syntax to define a class; Objective-C
    uses the `@interface` compiler directive. We looked at this earlier within the
    class declaration section.


    If we focus on what C# calls an *interface*, which Objective-C refers to as a
    *protocol*, this uses a different syntax. In Objective-C, a protocol declares
    methods that can be implemented by any class, or indeed, be used as a variable.


    Consider the following example. It defines an interface, which is then implemented
    by a class. You use angled brackets within the interface declaration to declare
    your class implements the named type for implementation or specialization.


    * * *


    | **.NET C#** | `// Definition of your interface template` `interface IEquatable<T>`

    `{`

    `bool Equals(T obj);`

    `}`


    `// Implementation of your class`

    `// which realizes the interface`

    `// defined above`

    `public class MyClass : IEquatable<MyClass>`

    `{`

    `    // Implementation of IEquatable<T> interface`

    `    public bool Equals(MyClass c)`

    `    {`

    `      // implementation here`

    `    }`

    `}` |


    * * *


    | **Objective-C** | `// Definition of your interface template` `@protocol IEquatable`

    `- (bool) Equals : (NSObject*) a ;`

    `@end`


    `@interface MyClass : NSObject<IEquatable>`

    `{`

    `    // Some methods here`

    `}`

    `@end`


    `// Implementation of your class`

    `// which realizes the interface`

    `// defined above`

    `@implementation MyClass`


    `// Implementation of IEquatable<T> interface`

    `- (bool) Equals : (NSObject*) a`

    `{`

    `    // implementation here`

    `}`


    `@end` |


    * * *


    A class definition can declare an implementation of more than one interface simply
    by separating the interfaces by a comma, like so:


    `Public classMyClass :NSObject<IEquatable, AnotherProtocol>`


    As you can see, it''s quite similar. One key difference is where Objective-C uses
    protocols as variables or as an argument to a method, which is often the case
    when an interface''s implementation is used as a callback function. Consider the
    example in [Listing 4-1](#Chapter04.html#list_4_1), which defines a protocol that
    in turn defines a method that will indicate via a Boolean value whether success
    was achieved.


    *Listing 4-1. **Protocol Declaration Code***


    `#import <Foundation/Foundation.h>`


    `// Define our protocol, with a single method`

    `@protocol ProcessDataDelegate <NSObject>`

    `@required`

    `- (void) processSuccessful: (BOOL)success;`

    `@end`


    `// Create an Interface using the Protocol, and notice the use of the ID type
    that points`

    `// to a generic type that will be unknown at compile time and resolved at run-time`

    `@interface ClassWithProtocol : NSObject`

    `{`

    ` id <ProcessDataDelegate> delegate;`

    `}`


    `@property (retain) id delegate;`


    `-(void)startSomeProcess;`


    `@end`


    The implementation section for the interface defined in [Listing 4-1](#Chapter04.html#list_4_1)
    synthesizes the delegate instance variable and then calls the method defined in
    the protocol as needed. Its implementation is shown in [Listing 4-2](#Chapter04.html#list_4_2).


    *Listing 4-2\. **Using a Protocol Declaration in the Class Example***


    `#import "ClassWithProtocol.h"`


    `@implementation ClassWithProtocol`


    `@synthesize delegate;`


    `- (void)processComplete`

    `{`

    `  [[self delegate] processSuccessful:YES];`

    `}`


    `-(void)startSomeProcess`

    `{`

    `  // Create a time which uses the processComplete interface to signal when complete`

    `  [NSTimer scheduledTimerWithTimeInterval:5.0 target:self`

    `    selector:@selector(processComplete) userInfo:nil repeats:YES];`

    `}`


    `@end`


    For the sake of brevity, assume you have a class that is performing some kind
    of action. Further, assume this class is called from another class to begin the
    processing. At some point, the caller will want to be notified that the class
    processing the data is finished, and the protocol is used for this very purpose,
    as shown in [Listing 4-3](#Chapter04.html#list_4_3).


    *Listing 4-3\. **Using the Class in the Example***


    `@interface MyDelegate : NSObject <UIApplicationDelegate, ProcessDataDelegate>`

    `{`

    `        ClassWithProtocol *test;`

    `}`

    `@end`


    `@implementation MyDelegate`

    `-(void) processSuccessful:(BOOL)success`

    `{`

    `NSLog(@"Finished");`

    `}`

    `@end`


    #### Delegation


    The use of delegation in the iOS SDK is common, predominately because it is introduced
    as an elegant solution to the problem of complex subclassing. Instead of having
    complex object hierarchies, where you need to create many more classes whose behavior
    may change only slightly from one another, you can pass delegates to an object
    to perform the modified behavior on your behalf. Modern best practice in today''s
    programming languages is to avoid deeply nested class hierarchies, and Objective-C
    helps with this through delegation.


    The general rule is that delegation is an alternative to subclassing, good practice
    is to use it, as it creates far cleaner code. Let''s start by defining our protocol
    in Objective-C, as in the following examples.


    | **.NET C#** | `// Defining the delegate in C# is different` `public delegate
    void jobComplete();` |


    * * *


    | **Objective-C** | `// Definition of your interface template` `@protocol jobComplete`

    `    (void)jobFinished;`

    `@end` |


    * * *


    We next define an object variable within our class pointing to the protocol defined
    for our delegate and name it. We''ll also expose a property of the same name that
    we can call to reference our protocol, as follows.


    * * *


    | **.NET C#** | `public class MyClass` `{`

    `// Create our delegate`

    `    jobCompletejc = new jobComplete(jobFinished);`

    `}` |


    * * *


    | **Objective-C** | `@interfaceMyClass : NSObject {` `        id <jobComplete>
    delegate;`

    `}`

    `@property (nonatomic, retain) id <jobComplete> delegate;`

    `@end` |


    * * *


    Our class would then invoke the delegate as a suitable point, using the following
    syntax, and must `@synthesize` the delegate property as part of its implementation.


    * * *


    | **.NET C#** | `public void SomeMethod()` `{`

    `    // Invoke our job complete delegate`

    `     jc();`

    `}` |


    * * *


    | **Objective-C** | `-(void) SomeMethod` `{`

    `    // Signal that the job is complete by calling the delegate`

    `    [delegate JobComplete];`

    `}` |


    * * *


    The only thing left to do in our class is implement the delegate''s `jobFinished`
    method, as in the following, which will be called as shown previously.


    * * *


    | **.NET C#** | `public void jobFinished()` `{`

    `    // do something to signal the job has finished`

    `}` |


    * * *


    | **Objective-C** | `-(void) jobFinished` `{`

    `    // do something to signal the job has finished`

    `}` |


    * * *


    I encourage you to play around with some sample code to test your understanding
    of delegates.


    **NOTE:** On the Apple Developer Program web site, you will find some more information
    about how to use delegates and delegation. If you''re interested, take a look
    at [`http://developer.apple.com/library/mac/#documentation/General/Conceptual/DevPedia-CocoaCore/Delegation.html`](http://developer.apple.com/library/mac/#documentation/General/Conceptual/DevPedia-CocoaCore/Delegation.html).'
  trans: "\n#### 接口与协议\n\nObjective-C 的*接口*实际上对应 C# 的类，而 Objective-C 的*协议*则对应 C# 的接口——有点令人困惑，对吧？让我们通过一些示例将它们置于上下文中，从而消除这种困惑。\n\
    \n我们从 C# 开始，定义一个包含成员变量和方法的类。C# 使用 `class` 关键字和语法来定义类；Objective-C 则使用 `@interface`\
    \ 编译器指令。我们在之前的类声明部分已经看到过这一点。\n\n如果我们将重点放在 C# 称之为*接口*、而 Objective-C 称之为*协议*的概念上，它使用的语法有所不同。在\
    \ Objective-C 中，协议声明了任何类都可以实现的方法，或者实际上，可以作为变量使用。\n\n请考虑以下示例。它定义了一个接口，然后由一个类实现。你可以在接口声明的尖括号中声明你的类实现了指定的类型，以便进行实现或特化。\n\
    \n| **.NET C#** | `// 定义你的接口模板` `interface IEquatable<T>` `{` `bool Equals(T obj);`\
    \ `}` `// 实现你的类` `// 该类实现了上面定义的接口` `public class MyClass : IEquatable<MyClass>`\
    \ `{` `    // 实现 IEquatable<T> 接口` `    public bool Equals(MyClass c)` `    {`\
    \ `      // 此处为实现代码` `    }` `}` |\n|---|---|\n\n| **Objective-C** | `// 定义你的接口模板`\
    \ `@protocol IEquatable` `- (bool) Equals : (NSObject*) a ;` `@end` `@interface\
    \ MyClass : NSObject<IEquatable>` `{` `    // 此处为一些方法` `}` `@end` `// 实现你的类` `//\
    \ 该类实现了上面定义的接口` `@implementation MyClass` `// 实现 IEquatable<T> 接口` `- (bool) Equals\
    \ : (NSObject*) a` `{` `    // 此处为实现代码` `}` `@end` |\n|---|---|\n\n一个类定义可以通过逗号分隔多个接口来声明实现了多个接口，如下所示：\n\
    \n`Public class MyClass : NSObject<IEquatable, AnotherProtocol>`\n\n如你所见，这非常相似。一个关键区别在于，Objective-C\
    \ 将协议用作变量或方法的参数，这在接口的实现被用作回调函数时经常发生。请考虑代码清单 4-1 中的示例，它定义了一个协议，而该协议又定义了一个方法，该方法将通过一个布尔值指示是否成功。\n\
    \n**代码清单 4-1. 协议声明代码**\n\n```\n#import <Foundation/Foundation.h>\n\n// 定义我们的协议，包含一个方法\n\
    @protocol ProcessDataDelegate <NSObject>\n@required\n- (void) processSuccessful:\
    \ (BOOL)success;\n@end\n\n// 使用协议创建接口，注意 ID 类型的使用，它指向一个泛型，\n// 该类型在编译时未知，将在运行时解析\n\
    @interface ClassWithProtocol : NSObject\n{\n id <ProcessDataDelegate> delegate;\n\
    }\n\n@property (retain) id delegate;\n\n-(void)startSomeProcess;\n\n@end\n```\n\
    \n在代码清单 4-1 中定义的接口的实现部分，综合了委托实例变量，然后根据需要调用协议中定义的方法。其实现如代码清单 4-2 所示。\n\n**代码清单\
    \ 4-2. 在类示例中使用协议声明**\n\n```\n#import \"ClassWithProtocol.h\"\n\n@implementation\
    \ ClassWithProtocol\n\n@synthesize delegate;\n\n- (void)processComplete\n{\n \
    \ [[self delegate] processSuccessful:YES];\n}\n\n-(void)startSomeProcess\n{\n\
    \  // 创建一个定时器，使用 processComplete 接口在完成时发出信号\n  [NSTimer scheduledTimerWithTimeInterval:5.0\
    \ target:self\n    selector:@selector(processComplete) userInfo:nil repeats:YES];\n\
    }\n\n@end\n```\n\n为了简洁起见，假设你有一个正在执行某种操作的类。进一步假设，这个类被另一个类调用以开始处理。在某个时刻，调用者会希望收到数据处理类已完成的通知，而协议正是为此目的而使用的，如代码清单\
    \ 4-3 所示。\n\n**代码清单 4-3. 在示例中使用该类**\n\n```\n@interface MyDelegate : NSObject <UIApplicationDelegate,\
    \ ProcessDataDelegate>\n{\n        ClassWithProtocol *test;\n}\n@end\n\n@implementation\
    \ MyDelegate\n-(void) processSuccessful:(BOOL)success\n{\nNSLog(@\"Finished\"\
    );\n}\n@end\n```\n\n#### 委托\n\n在 iOS SDK 中，委托的使用非常普遍，主要是因为它是作为解决复杂子类化问题的一种优雅方案而被引入的。不需要拥有复杂的对象层级结构，无需创建许多彼此行为可能只有细微差别的类，你可以将委托传递给对象，让它代表你来执行修改后的行为。当今编程语言的现代最佳实践是避免深层嵌套的类层次结构，而\
    \ Objective-C 通过委托机制对此提供了支持。\n\n一般规则是，委托是子类化的一种替代方案，使用它是一种好的实践，因为它能产生更加清晰的代码。让我们从在\
    \ Objective-C 中定义协议开始，如下面的示例所示。\n\n| **.NET C#** | `// 在 C# 中定义委托方式不同` `public\
    \ delegate void jobComplete();` |\n|---|---|\n\n| **Objective-C** | `// 定义你的接口模板`\
    \ `@protocol jobComplete` `    (void)jobFinished;` `@end` |\n|---|---|\n\n接下来，我们在类中定义一个对象变量，指向为委托定义的协议，并为其命名。我们还会暴露一个同名属性，以便引用我们的协议，如下所示。\n\
    \n| **.NET C#** | `public class MyClass` `{` `// 创建我们的委托` `    jobComplete jc\
    \ = new jobComplete(jobFinished);` `}` |\n|---|---|\n\n| **Objective-C** | `@interface\
    \ MyClass : NSObject {` `        id <jobComplete> delegate;` `}` `@property (nonatomic,\
    \ retain) id <jobComplete> delegate;` `@end` |\n|---|---|\n\n然后，我们的类会在合适的时机使用以下语法调用委托，并且必须在实现中\
    \ `@synthesize` 该委托属性。\n\n| **.NET C#** | `public void SomeMethod()` `{` `    //\
    \ 调用我们的任务完成委托` `     jc();` `}` |\n|---|---|\n\n| **Objective-C** | `-(void) SomeMethod`\
    \ `{` `    // 通过调用委托来通知任务已完成` `    [delegate JobComplete];` `}` |\n|---|---|\n\
    \n在我们的类中，剩下的唯一一件事就是实现委托的 `jobFinished` 方法，如下所示，该方法将按之前所示的方式被调用。\n\n| **.NET C#**\
    \ | `public void jobFinished()` `{` `    // 执行某些操作以通知任务已完成` `}` |\n|---|---|\n\
    \n| **Objective-C** | `-(void) jobFinished` `{` `    // 执行某些操作以通知任务已完成` `}` |\n\
    |---|---|\n\n我鼓励你尝试一些示例代码来测试你对委托的理解。\n\n**注意：** 在 Apple 开发者计划网站上，你可以找到更多关于如何使用委托和委托机制的信息。如果你感兴趣，请查看\
    \ [`http://developer.apple.com/library/mac/#documentation/General/Conceptual/DevPedia-CocoaCore/Delegation.html`](http://developer.apple.com/library/mac/#documentation/General/Conceptual/DevPedia-CocoaCore/Delegation.html)。\n"
- fmt: '### Comments


    Last, but definitely not least, is the syntax used to embed comments within your
    code.


    The use of naming conventions like `camelCase` helps, but there really is no substitute
    for good comments within your code. The syntax needs to conform to the form described
    here, but it''s also important that the comments themselves describe the intent
    and approach taken by the developer, and not just a verbatim narrative of the
    syntax (the code and its naming should do that).


    For single-line comment, you can use the following structure.


    ---


    | **.NET C#** | `// this is a comment` or `/* this is a comment */` |


    ---


    | **Objective-C** | `// this is a comment` or `/* this is a comment */` |


    ---


    For multiple lines, in Objective-C, you can use the `/*` `(open comment)` and
    `*/` `(close comment)` structure, but not in C#, as follows.


    ---


    | **.NET C#** | `// this is the starting line` `// this is a second comment line`
    `// this is a terminating third comment line` |


    ---


    | **Objective-C** | `/* this is the starting line` `** this is a second comment
    line` `*/ this is a terminating third comment line` |


    ---


    ### Comparing .NET and Xcode Tools


    So far, we''ve compared the Apple devices, the application lifecycle, and the
    respective class libraries in both .NET and the iOS SDK. But as we''ve covered
    in previous chapters, tooling is equally important, and `Xcode` is a worthy equivalent
    to `Visual Studio`, as is `MonoDevelop` if you decide to pursue the MonoTouch
    path. But there are other tools to consider as you start your development journey,
    as listed in [Table 4-4](#Chapter04.html#tab_4_4).


    ![images](images/t0404.jpg)


    The tools listed in [Table 4-4](#Chapter04.html#tab_4_4) are provided out of the
    box. `Visual Studio` and `Xcode` can be extended with additional tools, both commercial
    and open source.


    ### Xcode 4 Primer


    We''ve already taken a very simplistic look at the new `Xcode 4` editor in [Chapter
    2](#Chapter02.html#ch2) when creating our Hello, World application. If you were
    familiar with previous versions of `Xcode`, you''ll have noticed a big difference:
    `Xcode 4` now works within a single window and is far more integrated. If you''re
    familiar with `Visual Studio`, you''ll be far less impressed, and may need to
    take some of Xcode''s features in stride.


    In this section, as in the Objective-C primer, we''ll dig a little deeper into
    `Xcode 4`''s features, so that you are better prepared to start coding in earnest
    in future chapters.


    We''ve already looked at the general structure of the `Xcode` interface, with
    its various functional panes, and we''ve created a new project, which highlights
    both the project templates available and the project explorer tree, which is the
    name given to `Xcode 4`''s project structure view.


    As noted, the IDE shipped with `Xcode 4` is a substantial improvement on previous
    versions, and a real comparison to Microsoft''s `Visual Studio` IDE. It includes
    a number of new features. One is the way in which you navigate around the application.
    The multiple windows of `Xcode 3.x` are replaced with a single window that has
    different workspaces and other areas. The following sections describe the key
    aspects of the IDE.


    #### The IDE Workspace and Its Editors


    In `Xcode`, every window within the IDE is a workspace, and as such, provides
    an elegant solution to supporting multiple projects. Each workspace has tabs,
    which represent a given context and, when selected, adjust the windows that appear
    below it, showing what you need to see.


    In supporting workspaces, `Xcode` has also introduced a number of editors, including
    ones for source code, property list files, rich text files, and NIB files, among
    others. (*Editor* refers to the dialog box that allows you to edit the values
    given against certain parameters.) To open or display any of these editors, select
    a file of that type in the project navigator (see the upcoming “Navigators” section).
    The editor opens automatically in the editor area of the workspace window. [Table
    4-5](#Chapter04.html#tab_4_5) shows how to access the different editors.


    ![images](images/t0405.jpg)


    ##### Code Completion and Support


    Those of you familiar with `Visual Studio` will be right at home here, because
    the code-completion capabilities in `Xcode 4` have been enhanced. The IDE prompts
    you to not only complete the statement you are typing, but if options exist, it
    already provides you with the options available—complete with Quick Help documentation
    to support any highlighted option, should you have the `Quick Help Inspector`
    open.


    A useful shortcut is `control-spacebar`, which toggles the code-completion feature
    on and off. Press the `escape` key to cancel any operation.


    If you''re using the `LLVM` compiler to build your code, the Fix-It feature will
    also be enabled. As you are typing, the Fix-It feature will look for errors in
    your code. If it finds something that seems like an error, it will highlight the
    problem using a red underbar and an error symbol in the gutter bar, in the left
    pane of your IDE. It will also provide some suggestions on how to fix the problem,
    offering to repair it for you.


    ##### Schemes and Scheme Editors


    A useful addition to `Xcode 4` is the concept of a *scheme*, which can be used
    to define a collection of targets to build, a configuration to use when building,
    and a collection of tests to execute. Each scheme is associated with a debug or
    release build, and changed using the scheme popup window. From this same menu,
    you can manage the schemes you have—editing an existing scheme or creating a new
    scheme.


    Essentially, the creation of a scheme allows you to associate a set of configuration
    items to the scheme name and select it at the click of a button. The scheme editor
    then allows you to configure the schemes and their settings.


    You can have as many schemes as you want, but only one can be active at a time.
    The schemes you create can be stored in a project and be available in every workspace
    that includes that project. Alternatively, schemes can be stored in the workspace
    and be available only in that workspace.


    Schemes are a powerful feature. I recommend that you spend a little time playing
    with different scheme configurations using the scheme editor.


    ##### Project Editor


    The project editor window allows you to adjust core configuration information
    about the project itself, under the Summary tab. You can also adjust the build
    settings, phases, and rules.


    In most instances, the values such as those found in the summary information will
    not need to be changed from the default settings provided with the template. But
    if you do need to make any changes, you can do it here.


    As noted in the previous section, you can set the target, build configuration,
    and executable settings using schemes. In `Xcode 4`, selecting a scheme will automatically
    provide default settings for all three areas.


    #### Inspectors


    In `Xcode`, *inspectors* are panes in the utility area that you can use to read
    or enter data about files and Interface Builder objects. These inspectors are
    listed in [Table 4-6](#Chapter04.html#tab_4_6) along with their shortcut keys.


    ![images](images/t0406.jpg)


    These inspectors also are available under the `Utilities` menu item within `Xcode`.
    Note that the menu is context-sensitive, and all of the inspectors are relevant
    only when you''re viewing user interfaces provided in an XIB file. When viewing
    code, fewer inspectors are available.'
  raw: '#### Comments


    Last, but definitely not least, is the syntax used to embed comments within your
    code.


    The use of naming conventions like camelCase helps, but there really is no substitute
    for good comments within your code. The syntax needs to conform to the form described
    here, but it''s also important that the comments themselves describe the intent
    and approach taken by the developer, and not just a verbatim narrative of the
    syntax (the code and its naming should do that).


    For single-line comment, you can use the following structure.


    * * *


    | **.NET C#** | `// this is a comment` or

    `/* this is a comment */` |


    * * *


    | **Objective-C** | `// this is a comment` or `/* this is a comment */` |


    * * *


    For multiple lines, in Objective-C, you can use the `/*` *`(open comment)`* and
    `*/` *`(close comment)`* structure, but not in C#, as follows.


    * * *


    | **.NET C#** | `// this is the starting line` `// this is a second comment line`

    `// this is a terminating third comment line` |


    * * *


    | **Objective-C** | `/* this is the starting line` `** this is a second comment
    line`

    `*/ this is a terminating third comment line` |


    * * *


    ### Comparing .NET and Xcode Tools


    So far, we''ve compared the Apple devices, the application lifecycle, and the
    respective class libraries in both .NET and the iOS SDK. But as we''ve covered
    in previous chapters, tooling is equally important, and Xcode is a worthy equivalent
    to Visual Studio, as is MonoDevelop if you decide to pursue the MonoTouch path.
    But there are other tools to consideras you start your development journey, as
    listed in [Table 4-4](#Chapter04.html#tab_4_4).


    ![images](images/t0404.jpg)


    The tools listed in [Table 4-4](#Chapter04.html#tab_4_4) are provided out of the
    box. Visual Studio and Xcode can be extended with additional tools, both commercial
    and opensource.


    ### XCode 4 Primer


    We''ve already taken a very simplistic look at the new Xcode 4 editor in [Chapter
    2](#Chapter02.html#ch2) when creating our Hello, World application. If you were
    familiar with previous versions of Xcode, you''ll have noticed a big difference:Xcode
    4 now works within a single window and is far more integrated. If you''re familiar
    with Visual Studio, you''ll be far less impressed, and may need to take some of
    Xcode''sfeatures in stride.


    In this section, as in the Objective-C primer, we''ll dig a little deeper into
    Xcode 4''s features, so that you are better prepared to start coding in earnest
    in future chapters.


    We''ve already looked at the general structure of the Xcodeinterface, with its
    various functional panes, and we''ve created a new project, which highlights both
    the project templates available and the project explorer tree, which is the name
    given to Xcode 4''s project structure view.


    As noted, the IDE shipped with Xcode 4 is a substantial improvement on previous
    versions, and a real comparison to Microsoft''s Visual Studio IDE. It includes
    a number of new features. One is the way in which you navigate around the application.
    The multiple windows of Xcode version 3.*x* are replaced with a single window
    that has different workspaces and other areas. The following sections describe
    the key aspects of the IDE.


    #### The IDE Workspace and Its Editors


    InXcode, every window within the IDE is a workspace, and as such, provides an
    elegant solution to supporting multiple projects. Each workspace has tabs, which
    represent a given context and, when selected, adjust the windows that appear below
    it, showing what you need to see.


    In supporting workspaces, Xcode has also introduced a number of editors, including
    ones for source code, property list files, rich text files, and NIB files, among
    others. (*Editor* refers to the dialog box that allows you to edit the values
    given against certain parameters.) To open or display any of these editors, select
    a file of that type in the project navigator (see the upcoming “Navigators” section).
    The editor opens automatically in the editor area of the workspace window. [Table
    4-5](#Chapter04.html#tab_4_5) shows how to access the different editors.


    ![images](images/t0405.jpg)


    ##### Code Completion and Support


    Those of you familiar with VisualStudio will be right at home here, because the
    code-completion capabilities in Xcode 4 have been enhanced. The IDE prompts you
    to not only complete the statement you are typing, but if options exist, it already
    provides you with the options available—complete with Quick Help documentation
    to support any highlighted option, should you have the Quick Help Inspector open.


    A useful shortcut is control-spacebar, which toggles the code-completion feature
    on and off. Press the escape key to cancel any operation.


    If you''re using the LLVM compiler to build your code, the Fix-It feature will
    also be enabled. As you are typing, the Fix-It feature will look for errors in
    your code. If it finds something that seems like an error, it will highlight the
    problem using a red underbar and an error symbol in the gutter bar, in the left
    pane of your IDE. It will also provide some suggestions on how to fix the problem,
    offering to repair it for you.


    ##### Schemes and Scheme Editors


    Auseful addition to Xcode 4 is the concept of a *scheme*, which can be used to
    define a collection of targets to build, a configuration to use when building,
    and a collection of tests to execute. Each scheme is associated with a debug or
    release build, and changed using the scheme popup window. From this same menu,
    you can manage the schemes you have—editing an existing scheme or creating a new
    scheme.


    Essentially, the creation of a scheme allows you to associate a set of configuration
    items to the scheme name and select it at the click of a button. The scheme editor
    then allows you to configure the schemes and their settings.


    You can have as many schemes as you want, but only one can be active at a time.
    The schemes you create can be stored in a project and be available in every workspace
    that includes that project. Alternatively, schemes can be stored in the workspace
    and be available only in that workspace.


    Schemes are a powerful feature. I recommend that you spend a little time playing
    with different scheme configurations using the scheme editor.


    ##### Project Editor


    The project editor window allows you to adjust core configuration information
    about the project itself, under the Summary tab. You can also adjust the build
    settings, phases, and rules.


    In most instances, the values such as those found in the summary information will
    not need to be changed from the default settings provided with the template. But
    if you do need to make any changes, you can do it here.


    As noted in the previous section, you can set the target, build configuration,
    and executable settings using schemes. In Xcode 4, selecting a scheme will automatically
    provide default settings for all three areas.


    #### Inspectors


    InXcode, *inspectors* are panes in the utility area that you can use to read or
    enter data about files and Interface Builder objects. These inspectors are listed
    in [Table 4-6](#Chapter04.html#tab_4_6) along with their shortcut keys.


    ![images](images/t0406.jpg)


    These inspectors also are available under the `Utilities` menu item within Xcode.
    Note that the menu is context-sensitive, and all of the inspectors are relevant
    only when you''re viewing user interfaces provided in an XIB file. When viewing
    code, fewer inspectors are available.'
  trans: '好的，作为一名高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例格式，将给定的英文文本翻译成中文。



    ### 注释


    最后但同样重要的是，用于在代码中嵌入注释的语法。


    使用像 `camelCase` 这样的命名约定会有所帮助，但在代码中写好注释确实无可替代。注释的语法需要遵循此处描述的形式，但同样重要的是，注释本身应该描述开发者的意图和所采用的方法，而不仅仅是对语法的逐字复述（代码及其命名应该完成此任务）。


    对于单行注释，您可以使用以下结构。


    ---


    | **.NET C#** | `// this is a comment` 或 `/* this is a comment */` |


    ---


    | **Objective-C** | `// this is a comment` 或 `/* this is a comment */` |


    ---


    对于多行注释，在 Objective-C 中，您可以使用 `/*` `(开始注释)` 和 `*/` `(结束注释)` 结构，但在 C# 中不能，如下所示。


    ---


    | **.NET C#** | `// this is the starting line` `// this is a second comment line`
    `// this is a terminating third comment line` |


    ---


    | **Objective-C** | `/* this is the starting line` `** this is a second comment
    line` `*/ this is a terminating third comment line` |


    ---


    ### 比较 .NET 与 Xcode 工具


    到目前为止，我们已经比较了 Apple 设备、应用程序生命周期以及 .NET 和 iOS SDK 中各自的类库。但是，正如我们在前几章中介绍的那样，工具同样重要，`Xcode`
    是 `Visual Studio` 的强力对应工具，如果您决定走 MonoTouch 路线，`MonoDevelop` 也是如此。但是，当您开始开发之旅时，还有其他工具需要考虑，如表
    4-4 所列。


    ![images](img/t0404.jpg)


    表 4-4 中列出的工具是开箱即用的。可以通过附加工具（包括商业和开源工具）来扩展 `Visual Studio` 和 `Xcode`。


    ### Xcode 4 入门


    我们在第 2 章创建“Hello， World”应用程序时，已经非常简单地看了一下新的 `Xcode 4` 编辑器。如果您熟悉以前版本的 `Xcode`，您会注意到一个巨大的差异：`Xcode
    4` 现在在一个窗口中工作，并且集成度更高。如果您熟悉 `Visual Studio`，那么您的印象不会那么深刻，并且可能需要适应 Xcode 的一些特性。


    在本节中，就像在 Objective-C 入门中一样，我们将更深入地挖掘 `Xcode 4` 的功能，以便您更好地为在后续章节中正式开始编码做好准备。


    我们已经了解了 `Xcode` 界面的一般结构及其各种功能窗格，并且我们创建了一个新项目，该项目突出了可用的项目模板和项目浏览器树，这是 `Xcode 4`
    项目结构视图的名称。


    如前所述，`Xcode 4` 附带的 IDE 比以前的版本有实质性的改进，可以与微软的 `Visual Studio` IDE 进行真正的比较。它包含许多新功能。其中之一是您在应用程序中导航的方式。`Xcode
    3.x` 的多个窗口被一个单一的窗口所取代，该窗口具有不同的工作区和其他区域。以下各节描述了 IDE 的关键方面。


    #### IDE 工作区及其编辑器


    在 `Xcode` 中，IDE 中的每个窗口都是一个工作区，因此为支持多个项目提供了一个优雅的解决方案。每个工作区都有标签，代表一个给定的上下文，当被选中时，它会调整下面出现的窗口，显示您需要看到的内容。


    在支持工作区的同时，`Xcode` 还引入了许多编辑器，包括用于源代码、属性列表文件、富文本文件和 NIB 文件的编辑器等。（*编辑器* 指的是允许您编辑针对某些参数给出的值的对话框。）要打开或显示其中任何一个编辑器，请在项目导航器中（请参见接下来的“导航器”部分）选择该类型的文件。编辑器会在工作区窗口的编辑器区域中自动打开。表
    4-5 显示了如何访问不同的编辑器。


    ![images](img/t0405.jpg)


    ##### 代码补全和支持


    如果您熟悉 `Visual Studio`，您会感觉像在家里一样，因为 `Xcode 4` 中的代码补全功能得到了增强。IDE 不仅会提示您完成正在键入的语句，而且如果存在选项，它还会为您提供可用的选项——并附带“快速帮助”文档以支持任何高亮显示的选项（前提是您已打开
    `Quick Help Inspector`）。


    一个有用的快捷键是 `control-spacebar`，它可以打开和关闭代码补全功能。按 `escape` 键可取消任何操作。


    如果您使用 `LLVM` 编译器来构建代码，那么 Fix-It 功能也将被启用。当您键入时，Fix-It 功能会查找代码中的错误。如果它发现了看起来像是错误的东西，它会使用红色下划线和
    IDE 左侧窗格装订线中的错误符号来突出显示问题。它还会提供一些关于如何修复该问题的建议，并提供为您修复它的选项。


    ##### 方案和方案编辑器


    对于 `Xcode 4` 来说，*方案* 的概念是一个有用的补充，它可以用来定义要构建的目标集合、构建时要使用的配置以及要执行的测试集合。每个方案都与调试或发布构建相关联，并使用方案弹出窗口进行更改。从同一个菜单中，您可以管理您拥有的方案——编辑现有方案或创建新方案。


    本质上，创建方案允许您将一组配置项关联到方案名称，并只需单击一个按钮即可选择它。然后，方案编辑器允许您配置方案及其设置。


    您可以根据需要创建任意数量的方案，但一次只能有一个方案处于活动状态。您创建的方案可以存储在一个项目中，并且可以在包含该项目的每个工作区中使用。或者，方案可以存储在工作区中，并且仅在该工作区中可用。


    方案是一个强大的功能。我建议您花一点时间，使用方案编辑器尝试不同的方案配置。


    ##### 项目编辑器


    项目编辑器窗口允许您在“摘要”选项卡下调整项目本身的核心配置信息。您还可以调整构建设置、阶段和规则。


    在大多数情况下，诸如摘要信息中的值不需要从模板提供的默认设置更改。但是，如果您确实需要做出任何更改，您可以在此处进行。


    正如上一节所述，您可以使用方案来设置目标、构建配置和可执行文件设置。在 `Xcode 4` 中，选择一个方案将自动为所有这三个领域提供默认设置。


    #### 检查器


    在 `Xcode` 中，*检查器* 是实用区域中的窗格，您可以使用它们来读取或输入有关文件和 Interface Builder 对象的数据。这些检查器列在表
    4-6 中，并附有它们的快捷键。


    ![images](img/t0406.jpg)


    这些检查器也可以在 `Xcode` 中的 `Utilities` 菜单项下找到。请注意，该菜单是上下文相关的，并且所有检查器仅在您查看 XIB 文件提供的用户界面时才相关。查看代码时，可用的检查器较少。

