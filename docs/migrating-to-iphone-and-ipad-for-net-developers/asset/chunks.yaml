  raw: '#### Manually Drawing the User Interface


    In most cases, you won''t need to worry about drawing your user interface, because
    it''s typically handled automatically by the iOS framework as part of the control''s
    functionality. However, in some instances, you might want fine-grained control
    over your user interface. This is especially the case if your application is a
    game, because the controls provided as part of the iOS framework provide only
    some of the functionality required.


    In such circumstances, you can override the method called whenever your application''s
    window requires a refresh. This method is called `drawRect` and passes the region
    that requires redrawing as a `CGRect` structure. This structure contains the starting
    point and size of the rectangular area that requires redrawing. This area is known
    as *dirty* if it requires redrawing. Redrawing is necessary when something has
    changed, such as an area previously being obscured by a window or a control updating
    the way it looks. Consider the following method and its implementation:


    `// drawRect - Redraw the screen`

    `-(void)drawRect:(CGRect)rect`

    `{`

    `    // Only draw when we''re ready to draw`

    `    if (gstate != RUNNING)`

    `        return;`


    `    [self.lander_nothrust drawAtPoint:CGPointMake(loc_x, loc_y)];`


    `}`


    You''ll notice that we query the state of the application first—if it''s not running,
    there is no need to update the screen. Assuming that it is running, at this stage,
    we simply draw our lunar lander image at the x and y location defined during game
    initialization and using the `lander_nothrust` image. At this stage, that''s all
    we''re doing. However, as the game''s physics are reflected and the user interactions
    are taken into account, we''ll update the location of the lunar lander, check
