    `- (void) rotateRight:(id)sender;`

    `- (void) thrustEngine:(id)sender;`


    `@end`


    Did you spot them all? If not, don''t worry. We''ll walk through the important
    parts of the implementation.


    The game will support a number of states. These will be used to invoke functionality
    that is appropriate for its state. For example, when the game is running, we''ll
    update the screen with the on-screen graphics. However, if the game has yet to
    start or a recent game has just finished, there will be no need to constantly
    update the screen. We will also use a timer to drive the core game, update the
    game physics, and invoke the code necessary to update the on-screen graphics and
    detect user interactions.


    A more detailed view of the game''s engine flow is shown in [Figure 5–6](#Chapter05.html#fig_5_6).


    ![images](images/0506.jpg)


    **Figure 5–6.** *Following the core game engine flow*


    You can see from the flow that once the `GameView` is initialized, we will initialize
    the game settings, such as loading graphics and setting default values. Then we
    proceed to detect user input, update the game''s physics, and check collision
    detection, which may indicate a successful landing or a crash.


    At this point, we''ll force the screen to be repainted. But this screen painting
    actually happens automatically by linking such updates to a timer, which will
    fire every one-quarter second. If the game isn''t in the correct state—it''s yet
    to start or you have crashed and it''s waiting for you to reset the game—then
    the screen will not be updated.


    As with most designs, we could improve on this application, and we''ll do this
    as the book progresses. For now, our current design is sufficient to introduce
    some key topics.'
  trans: "\n#### 在应用程序中实现导航\n\n到目前为止，我们已经构建了一个包含两个简单表单的应用程序，通过按钮点击将两者链接起来。但如果完成游戏后无法返回主菜单重新开始或退出，那么这个游戏就没什么用。因此，我们需要继续完善游戏界面的实现，提供一种返回主菜单或父窗口的机制。\n\
    \n我们将从扩展现有的游戏界面开始。首先添加一个工具栏，方便我们在上面放置按钮。同时，我们还会添加一些屏幕标签，用于显示状态信息。\n\n请继续添加 `Toolbar`、`Button`\
    \ 和 `Label` 控件，以创建如图 5-5 所示的界面。使用 Xcode 4 的 Interface Builder 标准功能，就像你在之前的示例中所做的那样。这些控件相关的代码会自动生成。\n\
    \n![images](img/0505.jpg)\n\n**图 5-5.** *游戏界面*\n\n我们稍后会改进这个界面，但目前它已经达到了目的：提供了一个可以返回主菜单的\
    \ `Quit` 按钮。为此，我们将使用之前类似的技术。\n\n我们需要一个 `IBAction` 属性，用于提供选中时触发的事件属性。此外，我们需要像之前一样在\
    \ Connections Inspector 选项卡中连接该操作，并提供以下事件实现代码：\n\n```\n-(void)quitGame:(id)sender\n\
    {\n    // 不再需要游戏窗口，返回父窗口\n    [ self dismissModalViewControllerAnimated:YES ];\n\
    }\n```\n\n这段代码的作用与最初将 `GameView` 作为对话框显示的代码相反。它会向视图发送 `dismissModalViewControllerAnimated`\
    \ 消息。这将导致窗口被卸载，焦点返回到启动它的父视图——在本例中为 `LunarLanderViewController`。在 .NET 中，这相当于调用窗体的\
    \ `Close()` 方法，但关闭窗口时不会有动画效果，这与 iOS SDK 的情况不同。\n\n我们暂时不会对其他按钮做任何操作。（它们将用于测试游戏的物理效果，我们会在后续章节中探讨更高级的用户交互机制。）标签目前只是占位符，虽然我们暂时不会更新它们的值，但它们已经开始让游戏初具雏形。\n\
    \n### 构建核心游戏引擎并启用用户交互\n\n到目前为止，我们已经显示了初始游戏界面，其中包含启动游戏的按钮。现在我们需要创建游戏的主要机制。接下来，我们将通过开始实现核心游戏引擎来增强应用程序的功能。我们将基于\
    \ `GameView` 类，并在此过程中探索更多 iOS 和 Objective-C 的概念。\n\n#### 检查游戏视图头文件\n\n`GameView`\
    \ 的 XIB 文件以及关联的 `GameViewController` 类提供了核心游戏引擎的实现。首先，考虑代码清单 5-5 中显示的 `GameView.h`\
    \ 文件。在看代码之前，我会先强调代码的关键部分（清单后有完整解释）。在头文件中，我们做了以下工作：\n\n*   使用 `NSTimer` 类成员定义我们的类，以提供定时器功能。\n\
    *   声明一系列方法，用于响应用户的按钮操作，包括 `Quit`、`Rotate Left`、`Rotate Right` 和 `Thrust`。\n*\
    \   声明一个定时器将按所需频率执行的方法。\n*   定义多个枚举类型以保存状态，以及多个将用于游戏物理计算的常量。\n*   声明我们的 `GameView`，它将包含三张映射推进器状态的图片：`Thrust`（推进）、`No-Thrust`（无推进）和\
    \ `Crashed`（坠毁）。\n*   声明代表状态或实例变量的实例变量，将使用已定义的枚举类型和常量。\n*   声明一个属性来保存登月舱图像，并为每个按钮声明\
    \ `IBAction`，以便将它们连接到提供实现的方法上。\n\n呼，接下来看看代码，看看你是否能找出代码清单 5-5 中的所有上述特性。\n\n**代码清单\
    \ 5-5.** *GameView.h*\n\n```\n#import <UIKit/UIKit.h>\n\n// GameView 类管理游戏的视图控制器\n\
    //\n@interface GameViewController : UIViewController {\n\n    NSTimer *gameLoop;\
    \  // 核心游戏定时器\n}\n\n// 为视图控制器声明类事件\n- (void)timerLoop:(NSTimer *)timeObj;   //\
    \ 定时器事件循环\n-(IBAction)quitGame:(id)sender;\n-(IBAction)rotateLeft:(id)sender;\n\
    -(IBAction)rotateRight:(id)sender;\n-(IBAction)thrust:(id)sender;\n\n@end\n\n\
    // 声明一些枚举类型，避免大量混乱的常量定义\ntypedef enum { NOTREADY, READY, RUNNING, WON, LOST, PAUSED\
    \ } GameState;\ntypedef enum { EASY, MEDIUM, HARD } GameDifficulty;\ntypedef enum\
    \ { THRUSTERS_ON, THRUSTERS_OFF } ThrusterState;\n\n// 声明用于管理物理的其他常量\nstatic const\
    \ int FUEL_INITIAL = 200;\nstatic const int FUEL_MAX = 200;\nstatic const int\
    \ FUEL_BURN = 10;\nstatic const int MAX_INIT = 30;\nstatic const int MAX_SPEED\
    \ = 120;\nstatic const int ACCELERATION_DOWN = 35;\nstatic const int ACCELERATION_UP\
    \ = 80;\nstatic const double GRAVITY = 9.8;\n\n// GameView 类管理主游戏\n//\n@interface\
    \ GameView : UIView {\n\n    // 用于保存登月舱状态的图片\n    @private UIImage           \
    \ *plander_thrust;\n    @private UIImage            *plander_nothrust;\n    @private\
    \ UIImage            *plander_crashed;\n\n    // 其他游戏成员变量\n    @private GameState\
    \          gstate;\n    @private GameDifficulty     level;\n    @private ThrusterState\
    \      thrusters;\n    @private int                fuel;\n    @private int   \
    \             speed_x;\n    @private int                speed_y;\n    @private\
    \ double             rotation;\n\n    // 定义登月舱在屏幕上的 X 和 Y 坐标\n    @private int\
    \ loc_x;\n    @private int loc_y;\n}\n\n// 声明成员属性\n@property (nonatomic, retain)\
    \ UIImage *lander_nothrust;\n\n// 声明类方法\n- (void) newGame;\n- (void) updateLander;\n\
    - (void) rotateLeft:(id)sender;\n- (void) rotateRight:(id)sender;\n- (void) thrustEngine:(id)sender;\n\
    \n@end\n```\n\n你都找到了吗？如果没找到，别担心。我们将逐步讲解实现中的重要部分。\n\n游戏将支持多种状态。这些状态将用于调用适合当前状态的功能。例如，当游戏正在运行时，我们会更新屏幕上的图形。然而，如果游戏尚未开始，或者上一局游戏刚刚结束，则无需持续更新屏幕。我们还会使用一个定时器来驱动核心游戏、更新游戏物理效果，并调用必要的代码来更新屏幕图形和检测用户交互。\n\
    \n游戏引擎流程的更详细视图如图 5-6 所示。\n\n![images](img/0506.jpg)\n\n**图 5-6.** *核心游戏引擎流程*\n\
    \n从流程中可以看出，一旦 `GameView` 被初始化，我们将初始化游戏设置，例如加载图形和设置默认值。然后我们继续检测用户输入、更新游戏物理效果，并检查碰撞检测，这可能会指示成功着陆或坠毁。\n\
    \n此时，我们将强制屏幕重新绘制。但屏幕绘制实际上是自动发生的，因为我们将此类更新绑定到一个定时器上，该定时器每四分之一秒触发一次。如果游戏未处于正确的状态——比如尚未开始，或者你已坠毁并等待重置游戏——则屏幕不会更新。\n\
    \n与大多数设计一样，我们可以改进这个应用程序，随着本书的深入我们会逐步实现。目前，我们当前的设计足以介绍一些关键主题。\n"
