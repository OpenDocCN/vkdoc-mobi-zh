  trans: "\n### iOS SDK\n\niOS SDK 是苹果公司于 2008 年推出的软件开发工具包，旨在让你能够为 iOS 操作系统开发原生应用。iOS\
    \ SDK 被划分为若干集合，分别对应 iOS 框架中提供的各层（见本章前面的图 1-3）。具体包括以下内容：\n\n*   Cocoa Touch\n \
    \   *   多点触控事件与控制\n    *   加速计支持\n    *   视图层级\n    *   本地化\n    *   相机支持\n* \
    \  媒体\n    *   OpenAL\n    *   音频混合与录制\n    *   视频播放\n    *   图像文件格式\n    *  \
    \ Quartz\n    *   核心动画\n    *   OpenGL ES\n*   核心服务\n    *   网络\n    *   嵌入式 SQLite\
    \ 数据库\n    *   核心定位\n    *   并发\n    *   核心运动\n*   OS X 内核\n    *   TCP/IP\n \
    \   *   套接字\n    *   电源管理\n    *   线程\n    *   文件系统\n    *   安全\n\n除了 Xcode 工具链，该\
    \ SDK 还包含 iPhone 模拟器，这是一个用于在开发者桌面上模拟 iPhone 外观和操作体验的程序。该 SDK 要求使用运行 Mac OS X Snow\
    \ Leopard 或更高版本的 Intel Mac。其他操作系统，包括 Microsoft Windows 和更早版本的 Mac OS X，均不受支持。更多信息可在\
    \ iOS Dev Center 网站上找到。\n\n### 第三方选项\n\n长期以来，在苹果移动设备上开发应用程序却只能依赖苹果公司的工具，这让许多人感到不满。这并非反映苹果提供的工具在质量或功能上有何不足——事实恰恰相反。它们是极其强大和高效的工具，能让你利用其团队开发功能，无论是单独开发还是团队协作，都可以为苹果的桌面和笔记本电脑（iMac、MacBook\
    \ 和 MacBook Pro）以及移动设备（iPhone、iPod touch 和 iPad）进行开发。\n\n但是，人毕竟是人，我们会对熟悉的事物感到舒适。我们喜欢熟悉感。那些在截然不同的操作系统、技术和工具环境下成长起来的人，可能不愿改变，也看不到改变的必要。例如，如果你是一名\
    \ Java 开发者，你可能会热爱 Java 编程语言以及你正在使用的 Eclipse（或类似）IDE。假设你是一名 .NET 开发者，那么你很可能会接触到其他语言。虽然本书的重点是弥合\
    \ .NET 与苹果工具集之间的差距，但了解你可以使用的第三方选项，很可能会为你提供相关的背景知识。如果你只接触过 Microsoft .NET，那么你对\
    \ Visual Studio 和 .NET Framework 等工具的熟悉程度，将有助于你顺利完成这次转型。\n\n无论你的经验是基于微软平台还是更为混杂，你或许也对\
    \ Windows 或 Linux 操作系统感觉更自在，因此对于为了开发应用程序而去学习一个新的操作系统感到犹豫。“毕竟，”我听到许多人争辩道，“最重要的始终是移动设备及其操作系统，而不是你通过什么方式去开发它们。”\n\
    \n那么，如何才能最好地利用你已有的经验以及现有的一切，让你的转型更加顺利呢？我猜你并不害怕学习新东西——毕竟，这很有趣——但你更愿意重用你已经熟悉的开发环境中的某些元素，具体来说，就是\
    \ .NET。这一点并未被忽视，一些开源项目和商业组织已经尝试解决这个问题并从中获利。现在有很多可选的方案，有些场景可能比其他场景更适合你，例如 Mono\
    \ 就提供了一个开源且对苹果友好的 .NET 实现。其他方案，虽然并非专注于 .NET，但对于帮助你完成转型也很有意义，即使你最终选择忽略它们而坚持使用苹果自己的\
    \ SDK 和工具。在此，我们将快速了解以下第三方选项：\n\n*   Mono\n*   Appcelerator 的 Titanium Mobile\n\
    *   Marmalade SDK\n*   Flash Professional CS5\n\n#### Mono 家族\n\nMono 是一个开源（由社区构建）的\
    \ .NET Framework 及相关组件的实现，适用于 Windows 以外的平台。Mono 环境可分为核心 Mono 环境以及提供增强功能的附加组件。在为苹果移动设备开发应用程序时，你可以将\
    \ Core Mono 视为基础，而 MonoTouch 等附加组件构建于此基础之上，从而构成完整的家族。\n\nMono 家族包含多个在开发应用程序时至关重要的组件：编译器、框架和支持工具。这些组件分别被称为\
    \ Core Mono（编译器和运行时）、MonoTouch（Cocoa Touch 的 .NET 实现）和 MonoDevelop（IDE）。\n\n#####\
    \ Core Mono\n\n作为 Mono 开发环境的核心部分，Core Mono 提供了一个支持多种编程语言的编译器，包括 C#。它包含一个通用语言运行时（CLR）的实现，更重要的是，它提供了一套全面的\
    \ API 来实现 .NET Framework。具体来说，Core Mono 包含了 .NET Framework 类库的实现，这是一组提供 Mono 版\
    \ .NET Framework 类库的库。\n\n##### MonoTouch\n\nMonoTouch 提供了苹果自家 Cocoa Touch 库的\
    \ .NET 实现。它允许开发者创建基于 C# 和 .NET 的应用程序，这些应用程序可以运行在苹果的 iPhone、iPad 和 iPod touch 设备上，同时还能利用\
    \ iPhone API、重用为 .NET 构建的代码和库以及已有的开发技能。现在看来显而易见，但 MonoTouch 的推出堪称神来之笔。它将苹果提供的\
    \ Cocoa Touch API 中的 Objective-C 和 C API 绑定到了 C#/通用中间语言（CIL）API 上。除了作为 Mono 一部分的核心基类库之外，MonoTouch\
    \ 还为各种 iPhone API 提供了绑定，使开发者能够使用 Mono 创建原生 iPhone 应用程序。MonoTouch 是如何做到这一点的呢？\n\
    \nMonoTouch 的核心是一个互操作（interop）引擎，它为 Cocoa Touch API 提供了绑定，包括 Foundation、Core Foundation\
    \ 和 UIKit。这还包括图形 API，例如 Core Graphics 和 OpenGL ES。\n\n尽管 MonoTouch 为 Cocoa Touch\
    \ API 提供了桥梁，但还有一个名为 MonoMac 的 Mono 实现，旨在让你能够为 Mac OS X 操作系统编写应用程序，它采用了相同的原理。事实上，在撰写本文时，一个新版本的\
    \ Mono 让你能够运用相同的原理，使用 MonoDroid 来编写 Android 操作系统应用程序（尽管这还处于非常早期的开发阶段）。\n"
- fmt: '### MonoDevelop


    虽然完全可以使用 Core Mono 附带的命令行工具，而且有人会认为硬核程序员只使用命令行工具，但我个人很感激增强工具带来的一些帮助。如今，以某种图形化工具形式出现的
    IDE 已经无处不在。那些看过或使用过微软开发工具 Visual Studio 的人会知道，通过此类工具，编写应用程序的整个体验变得更容易、更快捷。幸运的是，Mono
    也不例外，`MonoDevelop` 工具作为一款出色的 IDE，非常适合我们的需求。


    如图 [Figure 1–4](#Chapter01.html#fig_1_4) 所示，`MonoDevelop` 在 Mac OS X 操作系统上运行。实际上，它可以在多种操作系统上运行，包括各种
    Linux 发行版和 Windows。


    ![images](images/0104.jpg)


    **Figure 1–4.** *A MonoDevelop application running on Mac OS X*


    在[第 3 章](#Chapter03.html#ch3)中，我们将探讨 `MonoDevelop`，以及 Mono 框架和 `MonoTouch`。您将获得一个教程，了解如何使用这些组件和
    .NET Framework 为 Apple 的移动设备安装、使用和开发您自己的应用程序。


    `MonoTouch`（包括 Core Mono）可以从[`http://www.monotouch.net`](http://www.monotouch.net)
    下载，`MonoDevelop` 可以从[`http://www.monodevelop.com`](http://www.monodevelop.com)
    获取。


    ### DragonFire SDK


    我们已经了解了 Apple 的原生开发环境以及 Mono 对使用 .NET Framework 进行应用程序开发的支持，但这可能仍然对您有限制。例如，如果您选择的编程语言是
    C 或 C++ 怎么办？虽然 `Objective-C` 是 Mac 操作系统的一部分，但从语法上讲，它相当不同，而且您可能不想局限于 Mac OS X。`DragonFire
    SDK` 产品正是为此目的而创建的。


    `DragonFire` 的目标是那些希望使用 `Visual C++`、其调试器和 C/C++ 语言编写原生 iPhone 应用程序的 Windows 开发人员。它不需要任何类型的
    Mac，也不需要熟悉 `Objective-C`。正如其网站上所说：“用标准的 C/C++ 将您的应用创意变为现实，并且永远无需离开您的 Windows 平台。”


    [Figure 1–5](#Chapter01.html#fig_1_5) 展示了 `Dragonfire SDK` 与 Apple 现有移动应用程序开发框架的比较。


    ![images](images/0105.jpg)


    **Figure 1–5.** *DragonFire SDK framework*


    其目标是允许在 Windows 中编写和调试 2D 游戏，并且完全符合通过 Apple App Store 进行分发的标准。虽然这对于编写游戏来说很棒，但您可能会发现该
    API 在其他方面有所欠缺。例如，作为一个 API，它不如 Apple 自己的 API 完整——例如，它缺乏对基于位置的 API 的完整支持——但它正在不断增强。`DragonFire
    SDK Enterprise Edition` 正在推出（在撰写本文时，建议该版本将于 2011 年底推出），此版本将支持数据库，以及更多的拖放功能和用于显示文本和图形的选项。


    `DragonFire` SDK 的独特之处在于，一旦您使用其 API 编写了应用程序并使用屏幕模拟器（记住，所有这些都在 Windows 操作系统上）进行了测试，那么您就可以按照说明打包您的应用程序，并通过网站上传以进行编译，如果需要，还可以进行
    iTunes App Store 捆绑。


    `DragonFire SDK` 可从其官方网站 [`http://www.dragonfiresdk.com/`](http://www.dragonfiresdk.com/)
