- fmt: "### Using Enumerated Types\n\nAnother coding method, similar but subtly different\
    \ from using a constant, is to use an enumerated type. This not only provides\
    \ predefined literal values with a more meaningful name, but it also supplies\
    \ an object type that can only be a value in the set of values defined. This ensures\
    \ your code is more reliable and robust by keeping it type-safe.\n\nAgain, let's\
    \ use an example. Consider the requirement that our game can be in six different\
    \ states: Not Ready, Ready, Running, Won, Lost, and Paused. We could use literal\
    \ values, or even define six different constants. But, highlighting the value\
    \ of type safety, if we used numbers stored in an `int`, as is the case with constants,\
    \ nothing would stop us from setting it to a value that was an invalid state,\
    \ thus causing an error. So, rather than that, we'll use an enumerated type:\n\
    \n```\ntypedef enum { NOTREADY, READY, RUNNING, WON, LOST, PAUSED } GameState;\n\
    ```\n\nWhen placed in the header file (not within a class definition), this will\
    \ define a new type (hence the `typedef` command) of enumerated values (hence\
    \ the `enum` syntax) with valid values of `NOTREADY`, `READY`, `RUNNING`, `WON`,\
    \ `LOST`, and `PAUSED`. The incremental order of the set values means that `NOTREADY`\
    \ will automatically be assigned a value of 0 (zero), with `PAUSED` holding a\
    \ value of 5. This is then given a tagname of `GameState`, meaning we can use\
    \ this to refer to the type.\n\nSo, after defining our enumerated type, we can\
    \ create objects of that type that can only hold values defined in the set we've\
    \ defined—that is, valid states. Here's an example:\n\n```\nGameState state =\
    \ NOTREADY;\n```\n\nYou'll notice that within our application, we use both constants\
    \ and enumerated types to help create more readable code—*self-documenting code*.\
    \ We do so not just for the `GameState`, but also the game's difficulty level\
    \ (as `GameDifficulty`) and the lunar lander thruster's state (as `ThrusterState`).\n\
    \nThe C# equivalent of enumerated types is very similar and uses almost exactly\
    \ the same syntax. The following code line shows this, with a small difference\
    \ in the exclusion of the `typedef` specified and the tagname in a different place:\n\
    \n```\nenum GameState { NOTREADY, READY, RUNNING, WON, LOST, PAUSED }\n```\n\n\
    ### Programmatically Initializing an XIB Resource\n\nYou know that the `GameView`\
    \ user interface, contained within our `GameView.xib` file, is displayed as a\
    \ result of starting the game. In our case, we want finer-grained control over\
    \ this process, and so we used the `initWithNibName` command to load the `GameView.xib`\
    \ programmatically. This has the effect of calling the `initWithCoder` method,\
    \ kind of like a constructor, which we'll use to not only load the XIB file, but\
    \ to also do some application initialization. Consider the following implementation\
    \ of this method:\n\n```\n- (id) initWithCoder:(NSCoder *)aDecoder\n{\n    if\
    \ (self == [super initWithCoder:aDecoder]) {\n\n        //// Initialize the sprites\n\
    \        //\n        NSString *imagePath = [[ NSBundle mainBundle] pathForResource:@\"\
    lander\"\n                                                              ofType:@\"\
    tiff\"];\n        self.lander_nothrust = [UIImage new];\n        self.lander_nothrust\
    \ = [UIImage imageWithContentsOfFile:imagePath];\n\n        // Set initial game\
    \ state\n        [self newGame];\n\n    }\n    return self;\n}\n```\n\nOur implementation\
    \ is pretty simple. Although it's incomplete at this stage, it's starting to take\
    \ shape.\n\nFirst, we call the parent method using the `[super initWithCoder:aDecoder]`\
    \ command, which will ensure the inherited foundation object is created first\
    \ and assigned to the calling class, referenced by `self`. If this works, and\
    \ is not nil, then we move into our bespoke code and finally return the newly\
    \ created object. This is typical object initialization code, and you'll see it\
    \ repeated with many other objects that use inheritance to provide their own implementation.\n\
    \nOur initialization code does two things. First, we initialize a property of\
    \ type `UIImage`, which will hold one of the many thruster states. In this case,\
    \ it's the image of the lunar lander with no thruster being fired, hence the property\
    \ called `lander_nothrust`. Remember in [Listing 5-5](#Chapter05.html#list_5_5)\
    \ we defined our property as follows:\n\n```\n// Declare our member properties\n\
    @property (nonatomic, retain) UIImage *lander_nothrust;\n```\n\nAnd remember to\
    \ synthesize it in our implementation, as we did in [Listing 5-6](#Chapter05.html#list_5_6):\n\
    \n```\n@synthesize lander_nothrust = plander_nothrust;\n```\n\nHowever, this is\
    \ an empty property and needs initializing. Once the image has been initialized,\
    \ we'll also call one of our own bespoke methods called `newGame`, which as its\
    \ name suggests, initializes the application to start a new game. This is achieved\
    \ with the `[self newGame]` command.\n\nLet's take a closer look at the image\
    \ initialization code. At this point, we're using three separate `UIImage` objects\
    \ to hold the different states of our lunar lander craft: with the engine thrusting,\
    \ without the engine thrusting, and crashed. We could use an array of images or\
    \ one of the bespoke iOS classes to achieve this, but at this point, we're keeping\
    \ it simple.\n\nSo, after we've added our `Lander.tiff` image to the project (go\
    \ ahead and do this), we can reference this resource using the `pathForResource`\
    \ method, passing the file name, including its extension. The following command\
    \ achieves this, returning a string to our image resource:\n\n```\nNSString *imagePath\
    \ = [[ NSBundle mainBundle] pathForResource:@\"lander\" ofType:@\"tiff\"];\n```\n\
    \nWe can then create an instance of our `UIImage` using the slightly different\
    \ notation of `new`, as follows:\n\n```\nself.lander_nothrust = [UIImage new];\n\
    ```\n\nYou'll notice that this syntax is similar to C#, in that we're using the\
    \ `new` keyword to instantiate a new object. We can then use the `imageWithContentsOfFile`\
    \ method to load our image using the fully qualified path to the resource. Here's\
    \ the full line:\n\n```\nself.lander_nothrust = [UIImage imageWithContentsOfFile:imagePath];\n\
    ```\n\nIf you examine the `newGame` method's implementation, you'll see that it's\
    \ straightforward. It simply starts to initialize some of the class member variables\
    \ to their default values for a new game."
  raw: '##### Using Enumerated Types


    Another coding method, similar but subtly different from using a constant, is
    to use an enumerated type. This not only provides predefined literal values with
    a more meaningful name, but it also supplies an object type that can only be a
    value in the set of values defined. This ensures your code is more reliable and
    robust by keeping it type-safe.


    Again, let''s use an example. Consider the requirement that our game can be in
    six different states: Not Ready, Ready, Running, Won, Lost, and Paused. We could
    use literal values, or even define six different constants. But, highlighting
    the value of type safety, if we used numbers stored in an `int`, as is the case
    with constants, nothing would stop us from setting it to a value that was an invalid
    state, thus causing an error. So, rather than that, we''ll use an enumerated type:


    `typedef enum { NOTREADY, READY, RUNNING, WON, LOST, PAUSED } GameState;`


    When placed in the header file (not within a class definition), this will define
    a new type (hence the `typedef` command) of enumerated values (hence the `enum`
    syntax) with valid values of `NOTREADY`, `READY`, `RUNNING`, `WON`, `LOST`, and
    `PAUSED`. The incremental order of the set values means that `NOTREADY` will automatically
    be assigned a value of 0 (zero), with `PAUSED` holding a value of 5\. This is
    then given a tagname of `GameState`, meaning we can use this to refer to the type.


    So, after defining our enumerated type, we can create objects of that type that
    can only hold values defined in the set we''ve defined—that is, valid states.
    Here''s an example:


    `GameState state = NOTREADY;`


    You''ll notice that within our application, we use both constants and enumerated
    types to help create more readable code—*self-documenting code*. We do so not
    just for the `GameState`, but also the game''s difficulty level (as `GameDifficulty`)
    and the lunar lander thruster''s state (as `ThrusterState`).


    The C# equivalent of enumerated types is very similar and uses almost exactly
    the same syntax. The following code line shows this, with a small difference in
    the exclusion of the `typedef` specified and the tagname in a different place:


    `enum GameState { NOTREADY, READY, RUNNING, WON, LOST, PAUSED }`


    #### Programmatically Initializing an XIB Resource


    You know that the `GameView` user interface, contained within our `GameView.xib`
    file, is displayed as a result of starting the game. In our case, we want finer-grained
    control over this process, and so we used the `initWithNibName` command to load
    the `GameView.xib` programmatically. This has the effect of calling the `initWithCoder`
    method, kind of like a constructor, which we''ll use to not only load the XIB
    file, but to also do some application initialization. Consider the following implementation
    of this method:


    `- (id) initWithCoder:(NSCoder *)aDecoder`

    `{`

    `    if (self == [super initWithCoder:aDecoder]) {`


    `        //// Initialize the sprites`

    `        //`

    `        NSString *imagePath = [[ NSBundle mainBundle] pathForResource:@"lander"`![images](images/U002.jpg)

    `ofType:@"tiff"];`

    `        self.lander_nothrust = [UIImage new];`

    `        self.lander_nothrust = [UIImage imageWithContentsOfFile:imagePath];`


    `        // Set initial game state`

    `        [self newGame];`


    `    }`

    `    return self;`

    `}`


    Our implementation is pretty simple. Although it''s incomplete at this stage,
    it''s starting to take shape.


    First, we call the parent method using the `[super initWithCoder:aDecoder]` command,
    which will ensure the inherited foundation object is created first and assigned
    to the calling class, referenced by `self`. If this works, and is not nil, then
    we move into our bespoke code and finally return the newly created object. This
    is typical object initialization code, and you''ll see it repeated with many other
    objects that use inheritance to provide their own implementation.


    Our initialization code does two things. First, we initialize a property of type
    `UIImage`, which will hold one of the many thruster states. In this case, it''s
    the image of the lunar lander with no thruster being fired, hence the property
    called `lander_nothrust`. Remember in [Listing 5-5](#Chapter05.html#list_5_5)
    we defined our property as follows:


    `// Declare our member properties`

    `@property (nonatomic, retain) UIImage *lander_nothrust;`


    And remember to synthesize it in our implementation, as we did in [Listing 5-6](#Chapter05.html#list_5_6):


    `@synthesize lander_nothrust = plander_nothrust;`


    However, this is an empty property and needs initializing. Once the image has
    been initialized, we''ll also call one of our own bespoke methods called `newGame`,
    which as its name suggests, initializes the application to start a new game. This
    is achieved with the `[self newGame]` command.


    Let''s take a closer look at the image initialization code. At this point, we''re
    using three separate `UIImage` objects to hold the different states of our lunar
    lander craft: with the engine thrusting, without the engine thrusting, and crashed.
    We could use an array of images or one of the bespoke iOS classes to achieve this,
    but at this point, we''re keeping it simple.


    So, after we''ve added our `Lander.tiff` image to the project (go ahead and do
    this), we can reference this resource using the `pathForResource` method, passing
    the file name, including its extension. The following command achieves this, returning
    a string to our image resource:


    `NSString *imagePath = [[ NSBundle mainBundle] pathForResource:@"lander" ofType:@"tiff"];`


    We can then create an instance of our `UIImage` using the slightly different notation
    of `new`, as follows:


    `self.lander_nothrust = [UIImage new];`


    You''ll notice that this syntax is similar to C#, in that were using the `new`
    keyword to instantiate a new object. We can then use the `imageWithContentsOfFile`
    method to load our image using the fully qualified path to the resource. Here''s
    the full line:


    `self.lander_nothrust = [UIImage imageWithContentsOfFile:imagePath];`


    If you examine the `newGame` method''s implementation, you''ll see that it''sstraightforward,
    It simply starts to initialize some of the class member variables to their default
    values for a new game.'
  trans: "\n### 使用枚举类型\n\n另一种编码方式与使用常量类似但略有不同，即采用枚举类型。它不仅为预定义的文字值赋予了更有意义的名称，还提供了一种对象类型，该类型只能取已定义值集合中的值。通过保持类型安全，这能确保你的代码更加可靠和健壮。\n\
    \n同样，我们用一个例子来说明。假设我们的游戏可以有六种不同的状态：未就绪、就绪、运行中、胜利、失败和暂停。我们可以使用文字值，甚至可以定义六个不同的常量。但是，为了突显类型安全的价值，如果我们像使用常量那样，将数字存储在\
    \ `int` 中，那么没有什么能阻止我们将其设置为一个无效状态的值，从而导致错误。因此，我们转而使用枚举类型：\n\n```\ntypedef enum\
    \ { NOTREADY, READY, RUNNING, WON, LOST, PAUSED } GameState;\n```\n\n当放在头文件中（不在类定义内）时，这将定义一个新类型（因此使用\
    \ `typedef` 命令），该类型由枚举值组成（因此使用 `enum` 语法），其有效值为 `NOTREADY`、`READY`、`RUNNING`、`WON`、`LOST`\
    \ 和 `PAUSED`。集合值的递增顺序意味着 `NOTREADY` 将被自动赋值为 0（零），而 `PAUSED` 的值为 5。然后给它一个标签名 `GameState`，意味着我们可以用此来引用该类型。\n\
    \n因此，在定义我们的枚举类型之后，我们可以创建该类型的对象，这些对象只能保存我们已定义的集合中的值——即有效状态。示例如下：\n\n```\nGameState\
    \ state = NOTREADY;\n```\n\n你会注意到，在我们的应用程序中，我们同时使用常量和枚举类型来帮助创建更具可读性的代码——*自文档化代码*。我们不仅对\
    \ `GameState` 这样做，还对游戏的难度等级（作为 `GameDifficulty`）和月球着陆器推进器的状态（作为 `ThrusterState`）也如此处理。\n\
    \nC# 中枚举类型的对应实现非常相似，并使用了几乎完全相同的语法。以下代码行展示了这一点，其细微差别在于省略了 `typedef` 关键字且标签名的位置不同：\n\
    \n```\nenum GameState { NOTREADY, READY, RUNNING, WON, LOST, PAUSED }\n```\n\n\
    ### 以编程方式初始化 XIB 资源\n\n你知道，包含在 `GameView.xib` 文件中的 `GameView` 用户界面，会在游戏启动时显示。在我们的案例中，我们希望对此过程进行更精细的控制，因此我们使用\
    \ `initWithNibName` 命令以编程方式加载 `GameView.xib`。这会调用 `initWithCoder` 方法，它有点像构造函数，我们将用它不仅来加载\
    \ XIB 文件，还进行一些应用程序初始化。请考虑此方法的以下实现：\n\n```\n- (id) initWithCoder:(NSCoder *)aDecoder\n\
    {\n    if (self == [super initWithCoder:aDecoder]) {\n\n        //// 初始化精灵\n \
    \       //\n        NSString *imagePath = [[ NSBundle mainBundle] pathForResource:@\"\
    lander\"\n                                                              ofType:@\"\
    tiff\"];\n        self.lander_nothrust = [UIImage new];\n        self.lander_nothrust\
    \ = [UIImage imageWithContentsOfFile:imagePath];\n\n        // 设置初始游戏状态\n    \
    \    [self newGame];\n\n    }\n    return self;\n}\n```\n\n我们的实现非常简单。尽管在此阶段还不完整，但已初具雏形。\n\
    \n首先，我们使用 `[super initWithCoder:aDecoder]` 命令调用父类方法，这将确保先创建继承的基类对象，并将其赋值给调用类（由\
    \ `self` 引用）。如果此操作成功且不为 nil，则我们进入自定义代码，并最终返回新创建的对象。这是典型的对象初始化代码，你会看到许多其他使用继承来提供自身实现的对象也重复这种模式。\n\
    \n我们的初始化代码做了两件事。首先，我们初始化一个类型为 `UIImage` 的属性，该属性将保存多个推进器状态其中之一。本例中，它是不发射推进器时的月球着陆器图像，因此属性名为\
    \ `lander_nothrust`。回想一下在列表 5-5 中，我们如下定义了属性：\n\n```\n// 声明成员属性\n@property (nonatomic,\
    \ retain) UIImage *lander_nothrust;\n```\n\n并且记得像在列表 5-6 中那样，在我们的实现中对其进行合成：\n\n\
    ```\n@synthesize lander_nothrust = plander_nothrust;\n```\n\n然而，这是一个空的属性，需要进行初始化。一旦图像被初始化，我们还将调用一个我们自己的自定义方法\
    \ `newGame`，顾名思义，该方法初始化应用程序以开始一个新游戏。这是通过 `[self newGame]` 命令实现的。\n\n让我们仔细看看图像初始化代码。此时，我们使用三个独立的\
    \ `UIImage` 对象来保存月球着陆器飞船的不同状态：引擎推进中、引擎未推进、以及坠毁。我们可以使用图像数组或一个专门的 iOS 类来实现这一点，但在此阶段，我们保持简单。\n\
    \n因此，在我们向项目添加了 `Lander.tiff` 图像后（请继续添加），我们可以使用 `pathForResource` 方法引用该资源，传入文件名及其扩展名。以下命令实现了这一点，并返回一个指向我们图像资源的字符串：\n\
    \n```\nNSString *imagePath = [[ NSBundle mainBundle] pathForResource:@\"lander\"\
    \ ofType:@\"tiff\"];\n```\n\n然后，我们可以使用略有不同的 `new` 表示法来创建 `UIImage` 的实例，如下所示：\n\
    \n```\nself.lander_nothrust = [UIImage new];\n```\n\n你会注意到，这个语法类似于 C#，因为我们使用了\
    \ `new` 关键字来实例化一个新对象。然后，我们可以使用 `imageWithContentsOfFile` 方法，通过资源的完整路径来加载图像。以下是完整的一行代码：\n\
    \n```\nself.lander_nothrust = [UIImage imageWithContentsOfFile:imagePath];\n```\n\
    \n如果你检查 `newGame` 方法的实现，你会发现它很简单。它只是开始将一些类成员变量初始化为新游戏的默认值。\n"
- fmt: '#### Manually Drawing the User Interface


    In most cases, you won''t need to worry about drawing your user interface, because
    it''s typically handled automatically by the iOS framework as part of the control''s
    functionality. However, in some instances, you might want fine-grained control
    over your user interface. This is especially the case if your application is a
    game, because the controls provided as part of the iOS framework provide only
    some of the functionality required.


    In such circumstances, you can override the method called whenever your application''s
    window requires a refresh. This method is called `drawRect` and passes the region
    that requires redrawing as a `CGRect` structure. This structure contains the starting
    point and size of the rectangular area that requires redrawing. This area is known
    as *dirty* if it requires redrawing. Redrawing is necessary when something has
    changed, such as an area previously being obscured by a window or a control updating
    the way it looks. Consider the following method and its implementation:


    ```

    // drawRect - Redraw the screen

    -(void)drawRect:(CGRect)rect

    {

        // Only draw when we''re ready to draw

        if (gstate != RUNNING)

            return;


        [self.lander_nothrust drawAtPoint:CGPointMake(loc_x, loc_y)];


    }

    ```


    You''ll notice that we query the state of the application first—if it''s not running,
    there is no need to update the screen. Assuming that it is running, at this stage,
    we simply draw our lunar lander image at the `x` and `y` location defined during
    game initialization and using the `lander_nothrust` image. At this stage, that''s
    all we''re doing. However, as the game''s physics are reflected and the user interactions
    are taken into account, we''ll update the location of the lunar lander, check
    for collisions, and so on—all within this method—and draw the visuals that make
    sense. This will mean the lander will fall if no thrust is applied, climb if thrust
    is applied, and so on. So, it''s pretty straightforward, but effective!


    #### Using Bespoke Methods


    As with most programming languages, the structure of your application typically
    uses subroutines, or class methods in an object-oriented world to define bespoke
    functionality. When called in the correct order, this functionality implements
    your application—in our case, the Lunar Lander game. The structure and naming
    of these routines are part of your application''s architecture.


    Our game provides placeholders as follows:


    *   `newGame`: Initializes the game. This method is called after the user interface
    has been initialized.

    *   `rotateLeft`: Rotates the lunar lander craft to the left. This is in response
    to the user indicating he wants to rotate left. In the first instance, this is
    achieved by a toolbar button. Discussed in [Chapter 7](#Chapter07.html#ch7), and
    later on, we''ll look at swipes and gestures, discussed in [Chapter 10](#Chapter10.html#ch10).

    *   `rotateRight`: Rotates the lunar lander craft to the right. This is in response
    to the user indicating he wants to rotate right. Again, here we''re using a toolbar
    button; later, we''ll look at swipes and gestures.

    *   `thrustEngine:` Fires the lunar lander''s thruster engine, which in turn will
    slow down the rate of ascent, and even increase altitude if held down for long
    enough. It will also indicate a change in the engine''s state, allowing our drawing
    method to reflect this in what the user sees.

    *   `quitGame`: Quits the game by dismissing the modal `GameView` displayed. This
    method and `newGame` are the only ones we''ll implement in this chapter.


    ### Using Simulators to Test Your Application


    Given that we are now starting to develop our application in earnest, we''ll be
    using the simulator much more. We could start looking at deployment and testing
    on a real device, but we''ll leave that complication for the moment, partly because
    it''s not yet necessary.


    Targeting the simulator during the early stages of application development can
    save you a great deal of time. You don''t need to wait for applications to be
    installed on your physical device before seeing the effects of changes in your
    code. It also is not necessary to buy and install a developer certificate to run
    code in the simulator.


    Don''t get me wrong—using the simulator is not perfect and has its own challenges.
    For example, it can''t display OpenGL graphics, simulate multitouch events, or
    provide readings from some of the iPhone sensors such as the GPS. That said, for
    most apps, it has enough features to be a valuable part of your development process.


    One gotcha to be aware of is that you can''t guarantee that your simulated app
    performance will resemble your real application performance. The simulator tends
    to run silky smooth, helped by the power of your Mac on which it runs. Real applications
    will almost certainly have more limited resources, affecting the user experience.
    Be sure to test your app on all the physical devices it targets, so that you know
    your expectations are in line with reality.


    The following are some of the simulator''s features:


    *   **User input**: The mouse can be used to simulate a fingertip. Holding down
    the option key (![images](images/U006.jpg)) will display two circles, which then
    can be used to simulate multitouch events.

    *   **Rotation**: This can be achieved using the hardware menu.

    *   **iOS versions**: You can choose different iOS versions to test your application.

    *   **Low memory**: This can be simulated, so you can send this status to your
    application to see how it behaves.

    *   **Hardware keyboard**: The simulator allows you to use your Mac''s keyboard
    to provide keyboard input.


    So, after all that hard work, what does your game look like running? In [Figure
    5–7](#Chapter05.html#fig_5_7), you can see the game running within the simulator,
    with the two circles representing the touch gestures in the simulator.


    ![images](images/0507.jpg)


    **Figure 5–7.** *Game running within the simulator*


    ### Summary


    In this chapter, we''ve taken the foundation provided by previous chapters and
    started to develop a real application—something closer to fulfilling the rich
    user experience expected by most iPhone and iPad users. OK, so our Lunar Lander
    game won''t suit everyone, and yes, I''m still hankering after my youth, but mobile
    game applications should be fun. It also gives you a chance to build on some of
    the lessons you''ve learned so far and elaborate on them.


    We covered some recommendations on how to begin application development, starting
    with the basics, such as capturing the requirements and thinking about application
    design. We then started to build on the visual and programmatic aspects of our
    application.


    While building the application, you were introduced to the use of more than one
    view in presenting user interfaces, including the programmatic display of our
    game application. We added some navigation controls and tapped into the events
    these controls provide. We also looked at using utility type classes, such as
    the `NSTimer` class and the `UImage` class, to start to implement our functionality.


    We also looked at how to write more readable, self-documenting code, as well as
    how to use our own bespoke methods to implement a meaningful architecture whose
    structure should be easily understood by most developers. Finally, we considered
    the simulator as a good test resource.


    In the next chapters, we''ll build on this application, fleshing out its functionality.
    In doing so, we''ll explore other aspects of the iOS, such as more advanced user
    interfaces and data persistence.


