  trans: "\n## 向数据库写入数据\n\n向数据库写入数据时，你有两种选择：\n\n- 通过字符串构造一条 `INSERT` SQL 语句，并遍历你创建的数组。\n\
    - 将变量绑定到 SQL 语句，该语句中的每个参数都用 `?` 符号代替。这种方法还有一个额外优势，即能确保你插入的数据与表中预期的数据格式相匹配。\n\n\
    因此，首先我们需要遍历数组，提取其中存储的值。在我们的示例中，只需使用循环和一个从 0（第一个元素）开始的整数索引，在索引小于数组总项数（由 `count`\
    \ 属性决定）时持续进行即可。\n\n```\nint count = [highscore count];\nint idx = 0;\nwhile (idx\
    \ < count)\n{\n        // 遍历数组，递增 idx\n}\n```\n\n通过扩展这段代码来循环遍历数组、访问其元素，并利用 SQL\
    \ 绑定功能将 `?` 参数指示符替换为数组中的值，然后完成语句，即可将行写入数据库。以下是扩展后的代码：\n\n```\nsqlite3 *db;\nint\
    \ result = sqlite3_open(\"/documents/file\", &db);\nif (result == SQLITE_OK)\n\
    {\n    int count=[highscore count];\n    int idx = 0;\n    char *insert_sql =\
    \ \"INSERT INTO HIGHSCORE VALUES(?, ?);\";\n    sqlite3_stmt *stmt;\n    while\
    \ (idx < count)\n    {\n        // 准备语句以便绑定\n        if (sqlite3_prepare_v2(db,\
    \ insert_sql, -1, &stmt, nil) == SQLITE_OK) {\n            // 绑定姓名\n         \
    \   sqlite3_bind_text(stmt, 1, [[highscore objectAtIndex: idx++] UTF8String],\n\
    -1, NULL);   // 姓名\n            // 绑定分数\n            sqlite3_bind_text(stmt, 2,\
    \ [[highscore objectAtIndex: idx++] UTF8String],\n-1, NULL);   // 分数\n       \
    \     // 执行并完成写入\n            sqlite3_step(stmt);\n            sqlite3_finalize(stmt);\n\
    \        }\n    }\n} else NSLog(@\"打开数据库失败\");\n```\n\n在这个示例中，我们使用 `sqlite3_prepare()`\
    \ 语句准备了带参数的 SQL 语句。然后在循环内部，使用 `sqlite3_bind_text()` 方法绑定变量的值——在这里，就是将数组索引绑定到 SQL\
    \ 语句中由其索引位置（从 0 开始）引用的参数上。\n\n每完成一对数组条目的绑定后，我们通过执行语句完成写入，将行写入数据库。我们继续循环，直到处理完所有数组条目。\n\
    \n## 从数据库读取数据\n\n为了检查我们的代码是否正常工作，现在可以使用一条简单的 SQL `SELECT` 语句来回读我们刚刚写入数据库的行。为简单起见，我们将使用\
    \ `NSLog()` 方法将数据写入 Xcode 中的调试输出视图。\n\n与上一个示例类似，我们需要准备一条 SQL 语句并执行它，使用 `sqlite3_step()`\
    \ 方法遍历所有行，直到没有更多数据，并使用 `NSLog()` 方法输出每一行的数据。具体如下例所示：\n\n```\n// 从表中读取数据\nsqlite3_stmt\
    \ *readstmt;\nconst char *readSQL = \"SELECT NAME, SCORE FROM HIGHSCORE\";\nsqlite3_prepare_v2(db,\
    \ readSQL, -1, &readstmt, NULL);\nwhile (sqlite3_step(readstmt) == SQLITE_ROW)\n\
    {\n        NSString *name = [[NSString alloc] initWithUTF8String:(const char\n\
    *)sqlite3_column_text(readstmt,0)];\n        NSString *score = [[NSString alloc]\
    \ initWithUTF8String:(const char\n*)sqlite3_column_text(readstmt,1)];\n      \
    \  NSLog (@\"姓名: %@ 分数: %@\", name, score );\n}\n```\n\n如果你执行完整的代码并在 Xcode 应用程序的调试窗口中检查输出，它应该类似于以下内容（排除与运行应用程序相关的所有其他调试输出）：\n\
    \n```\n2011-08-15 22:19:05.251 DataStorage[953:207] 姓名: Mark 分数: 200\n2011-08-15\
    \ 22:19:05.253 DataStorage[953:207] 姓名: Rachel 分数: 300\n```\n\n这个示例应该让你对如何使用嵌入式数据库有了更深入的了解，这是一种将数据持久化到表示为本地文件的数据库中的更全面的方法。\n\
    \n### 连接到其他数据库\n\n我们已经探索了 iOS 中嵌入式数据库 SQLite 的使用，但如果你有另一个不同的数据库并且它位于远程呢？例如，如果你想从你的设备访问远程的\
    \ MySQL 或 Microsoft SQL Server 数据库，该怎么办？你有以下几种选择：\n\n- 你可以为你的数据库使用第三方客户端。例如，Flipper（可在\
    \ [`http://www.driventree.com/flipper`](http://www.driventree.com/flipper) 找到）是一个适用于\
    \ iPhone 的 MySQL 客户端，允许你连接到 MySQL 数据库。\n- 如果你有 Microsoft SQL Server 数据库，你可能想通过使用与数据库无关的\
    \ API（例如开放数据库连接（ODBC）驱动程序）来访问它。\n- 你可以通过寻找类似的本地客户端 API 来访问数据库，或者从 SQL Server 暴露一个服务层，并通过基于\
    \ HTTP 的 XML 风格 API（如 SOAP）进行访问。\n\n## 创建高分示例\n\n到目前为止，我们已经研究了使用多种不同技术来持久化应用程序数据的方法。现在让我们探索如何在我们示例应用程序（即从\
    \ `第 5 章` 开始的《月球着陆器》游戏）中应用这些知识。像我们这样的游戏中一个突出的需求是，需要将分数持久化到高分表中，为玩家提供另一个竞争维度。因此，我们将运用数据持久化知识，创建一个内部的高分结构，该结构可在开始屏幕上显示，并在应用实例之间保持持久性。\n"
- fmt: "#### Creating a Persistent High-Score Class\n\nOur high-score feature is pretty\
    \ straightforward. It will hold five entries, each with the name of the person\
    \ who attained the high score and the score itself. We could carry on as in the\
    \ previous example, and use standard Objective-C object types like `NSString`.\
    \ This would have the advantage of being written to a plist file, but would incur\
    \ complexity in how we interpret the file. Instead, we'll use a custom object\
    \ that inherits from `NSObject` to store the actual high-score entries.\n\nTo\
    \ build on our Objective-C foundation, let's create a class that holds an individual\
    \ high-score entry with properties that reference its values. This will then be\
    \ contained within an `NSMutableArray`, which we will use to write the storage\
    \ of our local high score to the local device using SQL Server. However, this\
    \ does present a problem when trying to serialize the object to a plist file,\
    \ as the `writeToFile` method doesn't support serializing custom objects. In our\
    \ example, we'll look at how to solve this problem.\n\nFirst, let's create our\
    \ high-score entry class, called `HighScoreEntry`. [Listing 7-1](#Chapter07.html#list_7_1)\
    \ shows the code for the header file.\n\n**Listing 7-1.** *HighScoreEntry Class\
    \ Header*\n\n```\n// HighScoreEntry class\n//\n@interface HighScoreEntry : NSObject\
    \ {\n    NSString * name;\n    int score;\n}\n-(id)initWithParameters:(NSString*)aName:(int)Score;\n\
    @property (readwrite, retain) NSString* name;\n@property (readwrite) int score;\n\
    \n@end\n```\n\n**NOTE:** Remember that the `readwrite` attribute of a property\
    \ means you can both access the property's value and set the property's value.\
    \ Additionally, `retain` ensures that a strong reference is created, meaning as\
    \ a resource, it will not be released until you explicitly release it.\n\nThis\
    \ is pretty straightforward, and with the material we've covered, it should be\
    \ familiar. The code simply implements a class that contains a string and an integer\
    \ using the class member names of `name` and `score`, respectively. We have two\
    \ properties of the same name that will reference these class member variables,\
    \ and we've implemented an initialization method that takes two parameters of\
    \ type `NSString` and `int`, which are used to initialize the class. [Listing\
    \ 7-2](#Chapter07.html#list_7_2) shows the source code for its implementation.\n\
    \n**Listing 7–2.** *HighScoreEntry Class Implementation*\n\n```\n// HighScoreEntry\
    \ class\n//\n@implementation HighScoreEntry\n\n-(id)initWithParameters:(NSString*)aName:(int)aScore\n\
    {\n    self = [super init];\n    if (self)\n    {\n        name = [aName copy];\n\
    \        score = aScore;\n    }\n    return self;\n}\n\n@synthesize name;\n@synthesize\
    \ score;\n\n@end\n```\n\nAgain, this is pretty straightforward. Our implementation\
    \ provides the `initWithParameters` method to initialize the class member variables\
    \ with values passed, and, of course, we synthesize our two properties.\n\nNow\
    \ let's take a look at the actual collection. We'll call this our `HighScore`\
    \ class. Again, we'll start with the source code for the header file, as shown\
    \ in [Listing 7-3](#Chapter07.html#list_7_3).\n\n**Listing 7–3.** *HighScore Class\
    \ Header*\n\n```\n// HighScore class\n//\n@interface HighScore : NSObject {\n\
    \    NSMutableArray *scores;\n}\n-(void)addHighScoreEntry:(HighScoreEntry *)score;\n\
    -(void)persist;\n@end\n```\n\nThis contains a single member variable for our scores,\
    \ held in a member variable of the same name and using the `NSMutableArray` type\
    \ to allow flexibility. We also declare two class methods: one that will add a\
    \ high-score entry to the list called `addHighScoreEntry`, and the other to persist\
    \ the high score to storage—in our case, a local database. The implementation\
    \ for the class is a little more complex, as shown in [Listing 7-4](#Chapter07.html#list_7_4).\n\
    \n**Listing 7–4.** *HighScore Class Implementation*\n\n```\n// HighScore class\n\
    //\n@implementation HighScore\n-(void)addHighScoreEntry:(HighScoreEntry *)score\n\
    {\n    if (scores == nil)\n        scores = [[NSMutableArray alloc] init];\n\n\
    \    [scores addObject:(score)];\n}\n\n-(void)persist\n{\n    // Open our database\n\
    \    sqlite3 *db;\n    int result = sqlite3_open(\"mydb.sqlite3\", &db);\n   \
    \ if (result == SQLITE_OK)\n    {\n        // CREATE TABLE\n        char *errMsg;\n\
    \        const char *sql = \"CREATE TABLE IF NOT EXISTS HIGHSCORE (NAME TEXT,\
    \ SCORE INTEGER)\";\n        if (sqlite3_exec(db, sql, NULL, NULL, &errMsg) ==\
    \ SQLITE_OK)\n        {\n            // WRITE ARRAY TO TABLE\n            int\
    \ idx = 0;\n            char *insert_sql = \"INSERT INTO HIGHSCORE VALUES(?, ?);\"\
    ;\n            sqlite3_stmt *stmt;\n            while (idx < [scores count])\n\
    \            {\n                // Prepare our statement for binding\n       \
    \         if (sqlite3_prepare_v2(db, insert_sql, -1, &stmt, nil) == SQLITE_OK)\
    \ {\n                    // Get entry\n                    HighScoreEntry *hse\
    \ = [scores objectAtIndex:(idx)];\n\n                    // Bind the name\n  \
    \                  sqlite3_bind_text(stmt, 1, [hse.name UTF8String], -1, NULL);\
    \   // NAME\n                    // Bind the score\n                    sqlite3_bind_int(stmt,\
    \ 2, hse.score);   // SCORE\n                    // Step and finalize the write\n\
    \                    sqlite3_step(stmt);\n                    sqlite3_finalize(stmt);\n\
    \                    // Next item\n                    idx++;\n              \
    \  }\n            }\n            // READ FROM TABLE\n            sqlite3_stmt\
    \ *readstmt;\n            const char *readSQL = \"SELECT NAME, SCORE FROM HIGHSCORE\
    \ ORDER BY SCORE\";\n            sqlite3_prepare_v2(db, readSQL, -1, &readstmt,\
    \ NULL);\n            while (sqlite3_step(readstmt) == SQLITE_ROW)\n         \
    \   {\n                NSString *name = [[NSString alloc] initWithUTF8String:(const\
    \ char *)sqlite3_column_text(readstmt,0)];\n                NSString *score =\
    \ [[NSString alloc] initWithUTF8String:(const char *)sqlite3_column_text(readstmt,1)];\n\
    \                NSLog (@\"NAME: %@ SCORE: %@\", name, score );\n\n          \
    \  }\n        } else NSLog(@\"Failed to create table\");\n\n    } else NSLog(@\"\
    Failed to open database\");\n}\n@end\n```\n\nFirst, let's consider the `addHighScoreEntry`\
    \ method, which should be pretty self-explanatory. If the `scores` array is null,\
    \ we create it. We then add the object passed to the array using its `addObject`\
    \ method.\n\nThe `persist` method, although lengthy, should again be familiar.\
    \ We walked through the code earlier. However, I will point out some of the key\
    \ differences:\n\n* **Using an integer for the score**: In our table, we now use\
    \ an integer type rather than a string to store the actual score value.\n* **Counting\
    \ array count**: When looping around the array, we use the `count` attribute of\
    \ `NSMutableArray` to return how many objects are in the array, and when we reach\
    \ the maximum, we exit the loop.\n* **Extracting an object**: We extract the high-score\
    \ entry object from the class using its index, and we can then use this to reference\
    \ the object's values through the properties provided—specifically, `name` and\
    \ `score`.\n* **Binding**: We bind the name as text and the score as an integer\
    \ to the parameters in our SQL statement. This is virtually identical to our previous\
    \ example, except we are using the `sqlite3_bind_int` method for our integer.\n\
    * **Moving along the array:** As we are looping through the array's members, we\
    \ must remember to increase the index that not only selects the next object in\
    \ the list, but is also used when determining whether to exit the loop."
