- fmt: "### Managing the Data Within Your Application\n\nThe first hurdle is that\
    \ you need to store the data in the application itself. You could use a lot of\
    \ individual variables, but that wouldn't be particularly elegant, and the result\
    \ would be very messy code when it comes to reading and writing the data to storage.\
    \ Fortunately, the iOS SDK, much like the .NET Framework, makes provisions for\
    \ simplifying this task. After all, working with data in your application is commonplace,\
    \ and therefore expected in most modern programming languages and frameworks.\
    \ Several mechanisms are available for storing data within your application.\n\
    \n[Chapter 4](#Chapter04.html#ch4) introduced the concepts of serialization and\
    \ deserialization. The iOS SDK—and the .NET Framework, for that matter—provides\
    \ the ability for objects to be serializable. This means that the object's structure\
    \ and the data, or state information, it holds within it can be persisted (or\
    \ written) to a storage medium that will survive the application being terminated\
    \ and the mobile device being switched off. When the application is restarted,\
    \ you can deserialize this data from your storage medium back into an object instance\
    \ that has exactly the same structure and data as it did when it was serialized,\
    \ therefore persisting state.\n\nIn Objective-C, it is possible to serialize any\
    \ object, converting it into a series of bytes that can be written to storage.\
    \ However, Objective-C also provides what are called *collection classes*, which\
    \ enable you to store multiple objects and then serialize the whole collection—and\
    \ in doing so, serializing all the data within it.\n\nIn .NET—specifically, C#—you\
    \ mark an object as `[serializable]`, which means it can be converted into binary,\
    \ Simple Object Access Protocol (SOAP), or XML within .NET. The .NET Framework\
    \ separates the representation of the data from mechanisms for transporting it,\
    \ such as by tagging your class in .NET with the `[serializable()]` attribute\
    \ and ensuring your class derives from the `ISerializable` class. You can then\
    \ use the appropriate method for writing your class to the destination. This may\
    \ be a file using the `System.IO` namespace, or you may be using formatters such\
    \ as `System.Runtime.Serialization.Formatters.Binary` to write to a binary stream.\n\
    \nThe default serializable objects in Objective-C are shown in [Table 7-2](#Chapter07.html#tab_7_2)\
    \ with commentary.\n\n![images](images/t0701aa.jpg)\n\nTo bring this to life,\
    \ let's look at a working example that allows us to use one of these types to\
    \ create an array of values that we can use to hold our data, and then we'll serialize\
    \ this array as a property list.\n\nFirst, let's set up a dynamic array using\
    \ the `NSMutableMutable` class:\n\n```\nNSMutableArray *highscores = [[NSMutableArray\
    \ alloc] init];\n// High score 1\n[highscores addObject:@\"Mark\"];\n[highscores\
    \ addObject:@\"200\"];\n// High score 2\n[highscores addObject:@\"Rachel\"];\n\
    [highscores addObject:@\"300\"];\n// .. others could be added\n```\n\nAt this\
    \ point we can write this to the persistent storage of our choice (as we'll do\
    \ next), and then finally release the array with the following command:\n\n```\n\
    \  [highscores release];\n```\n\n### Using Property Lists As Storage\n\nEarlier\
    \ in the book we touched on property lists within iOS and their existence in the\
    \ filesystem as files with the `.plist` extension, known as *plist files*. Property\
    \ lists offer a way to persist application data. Within Objective-C, the `NSArray`\
    \ and `NSDictionary` collection classes provide a method that serializes their\
    \ content to plist files. These collection classes also provide an easy mechanism\
    \ to store and retrieve values from plist files.\n\nUsing the `NSMutableArray`\
    \ we just setup (or indeed, any serializable collection), we can then use the\
    \ `writeToFile` method to serialize this string to a plist file for later reading\
    \ and interpretation. Simply execute the method with the destination of your file,\
    \ as in this example:\n\n```\n[myArray writeToFile:@”/some/file/location/output.plist”\
    \ atomically:YES];\n```\n\nIf you execute an application with this snippet of\
    \ code in place and then examine the file produced, you'll find it looks like\
    \ this:\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist PUBLIC\
    \ \"-//Apple//DTD PLIST 1.0//EN\" \"httpfhighscor://www.apple.com/DTDs/PropertyList-1.0.dtd\"\
    >\n<plist version=\"1.0\">\n<array>\n        <string>Mark</string>\n        <string>200</string>\n\
    \        <string>Rachel</string>\n        <string>300</string>\n</array>\n</plist>\n\
    ```\n\nNotice that it is serialized as an XML file, against the property list\
    \ schema and using strings.\n\nThis file can then be read back into an array for\
    \ manipulation or use using the `initWithContentsOfFile` method. The following\
    \ deserializes the file we just created into a new `NSMutableArray` with the same\
    \ values:\n\n```\nNSMutableArray *highscores = [[NSMutableArray alloc] initWithContentsOfFile:\
    \ @\"/some/file/location/output.plist\"];\n```\n\n### Using the Internet to Store\
    \ Data\n\nFor persisting data, we've looked at property lists and using methods\
    \ available as part of some of the serializable Objective-C types. However, what\
    \ if you want to use the Internet in some form to serialize your data? What if\
    \ you want to store this information in some kind of central location, rather\
    \ than locally on the device?\n\nThe first and most obvious solution is to still\
    \ use the property list method, except that the path to the file is the fully\
    \ qualified URL of a file that exists on some internal-based storage—one of the\
    \ many digital-storage platforms, such as Dropbox and DigitalVault.\n\nBut there\
    \ is an alternative. The serializable collections such as `NSMutableArray` have\
    \ a method called `writeToURL`, which instead of taking an `NSString` argument\
    \ takes an `NSUrl` argument. However, if when writing to a file your argument\
    \ is a `file://` reference, then there is no real difference to the behavior of\
    \ these methods. Therefore the following:\n\n```\n[myArray writeToURL: @\"file://www.mamone.org/highscore.plist\"\
    \ atomically:YES];\n```\n\nis exactly the same as this:\n\n```\nNSURL *url = [NSURL\
    \ URLWithString:@\"http://www.mamone.org/highscore.plist\"];\n[myArray writeToURL:url\
    \ atomically:YES];\n```"
  raw: '#### Managing the Data Within Your Application


    The first hurdle is that you need to store the data in the application itself.
    You could use a lot of individual variables, but that wouldn''t be particularly
    elegant, and the result would be very messy code when it comes to reading and
    writing the data to storage. Fortunately, the iOS SDK, much like the .NET Framework,
    makes provisions for simplifying this task. After all, working with data in your
    application is commonplace, and therefore expected in most modern programming
    languages and frameworks. Several mechanisms are available for storing data within
    your application.


    [Chapter 4](#Chapter04.html#ch4) introduced the concepts of serialization and
    deserialization. The iOS SDK—and the .NET Framework, for that matter—provides
    the ability for objects to be serializable. This means that the object''s structure
    and the data, or state information, it holds within it can be persisted (or written)
    to a storage medium that will survive the application being terminated and the
    mobile device being switched off. When the application is restarted, you can deserialize
    this data from your storage medium back into an object instance that has exactly
    the same structure and data as it did when it was serialized, therefore persisting
    state.


    In Objective-C, it is possible to serialize any object, converting it into a series
    of bytes that can be written to storage. However, Objective-C also provides what
    are called *collection classes*, which enable you to store multiple objects and
    then serialize the whole collection—and in doing so, serializing all the data
    within it.


    In .NET—specifically, C#—you mark an object as `[serializable]`, which means it
    can be converted into binary, Simple Object Access Protocol (SOAP), or XML within
    .NET. The .NET Framework separates the representation of the data from mechanisms
    for transporting it, such as by tagging your class in .NET with the `[serializable()]`
    attribute and ensuring your class derives from the `ISerializable` class. You
    can then use the appropriate method for writing your class to the destination.
    This may be a file using the `System.IO` namespace, or you may be using formatters
    such as `System.Runtime.Serialization.Formatters.Binary` to write to a binary
    stream.


    The default serializable objects in Objective-C are shown in [Table 7-2](#Chapter07.html#tab_7_2)
    with commentary.


    ![images](images/t0701aa.jpg)


    To bring this to life, let''s look at a working example that allows us to use
    one of these types to create an array of values that we can use to hold our data,
    and then we''ll serialize this array as a property list.


    First, let''s set up a dynamic array using the `NSMutableMutable` class:


    `NSMutableArray *highscores = [[NSMutableArray alloc] init];`

    `// High score 1`

    `[highscores addObject:@"Mark"];`

    `[highscores addObject:@"200"];`

    `// High score 2`

    `[highscores addObject:@"Rachel"];`

    `[highscores addObject:@"300"];`

    `// .. others could be added`


    At this point.wecan write this to the persistent storage of our choice (as we''ll
    do next), and then finally release the array with the following command:


    `  [highscores release];`


    #### Using Property Lists As Storage


    Earlier in the book we touched on property lists within iOS and their existence
    in the filesystem as files with the `.plist` extension, known as *plist files*.
    Property lists offer a way to persist application data. Within Objective-C, the
    `NSArray` and `NSDictionary` collection classes provide a method that serializes
    their content to plist files. These collection classes also provide an easy mechanism
    to store and retrieve values from plist files.


    Using the `NSMutableArray` we just setup (or indeed, any serializable collection),
    we can then use the `writeToFile` method to serialize this string to a plist file
    for later reading and interpretation. Simply execute the method with the destination
    of your file, as in this example:


    `[myArray writeToFile:@”/some/file/location/output.plist” atomically:YES];`


    If you execute an application with this snippet of code inplace and then examine
    the file produced, you''ll find it looks like this:


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "httpfhighscor://www.apple.com/DTDs/PropertyList-1.0.dtd">`

    `<plist version="1.0">`

    `<array>`

    `        <string>Mark</string>`

    `        <string>200</string>`

    `        <string>Rachel</string>`

