  trans: '

    # 开始行动：创建你的首个应用程序


    在前面的章节中，我们涵盖了众多主题，包括 iOS 简介、iOS SDK、可用的不同设备，以及如何使用 `Xcode` 和 `MonoDevelop` 等开发工具来创建你的初始应用程序。然而，仅靠一个
    `Hello, World` 级别的应用是无法满足用户需求的。


    现在，我们将基于你目前掌握的知识开始构建一个更具吸引力的应用程序，它功能更丰富、实用性更强。我们将深入探讨你在前几章节中读到的框架内包含的对象细节，以及如何使用这些对象。你还将学习如何在
    `Xcode` 中组织你的应用程序，以便更好地支持项目的构建、调试和部署阶段，同时我们还会更详细地了解模拟器，用于部署前的测试。


    为了演示所有这些特性和能力，我们将创建一个简单的登月者（Lunar Lander）的复制版应用，采用使其在 20 世纪 80 年代声名大噪的类似图形和物理风格。我们将在本章启动这个应用，并在本书后续内容中持续对其进行增强。


    为了开始行动，我们将在本章中涵盖以下主题：


    *   设计你的应用程序，考虑在开始构建之前需要解决的关键问题

    *   在 `Xcode` 中设置你的项目及其结构，包括与构建和调试应用程序最相关的设置

    *   理解向用户呈现用户界面的各种选项，包括如何渲染带有碰撞检测的简单图形

    *   探索导航应用程序功能（如难度级别和最高分）的不同方法

    *   与外部世界交互，既包括通过互联网，也包括通过用户的交互

    *   探索 iPhone 模拟器来测试你的应用程序


    在我们逐步构建应用程序的过程中，我将持续指出 `.NET Framework` 中的特性以便对比。我还会指出常见的"陷阱"以及如何避免它们。


    ## 应用程序规划与设计过程


    在前面的章节中，我们探讨了在设计应用程序之前需要考虑的几个因素。例如，我们比较了每款设备的特性，在决定哪款设备最适合你的应用时需要权衡这些因素。你需要理解应用程序中需要适配的一些关键差异。这些考虑因素固然重要，但在你开始编写代码之前，还有更多方面需要思考。


    在大多数专业组织中，构建应用程序的过程通常始于**需求获取阶段**。这包括收集用户的需求，或者当目标受众不明确时，则收集你应用的功能需求。然后对这些需求进行优先级排序，这样如果时间不足，你可以舍弃那些你认为不那么重要的功能。


    非功能性需求与功能性需求同样重要。非功能性需求的一个示例是某些操作预期需要多快完成，或者你希望应用程序能够处理多少数据。在此阶段，你还需要记录下希望定位的实际设备，以及你希望使用的设备特性。


    一旦你捕获并记录了需求，下一阶段就是开始设计过程。这包括定义应用程序核心结构的外观——哪些方面你将用自己定制的代码编写，哪些框架你将整合在一起以实现所需的功能。这被称为应用程序的**架构**。


    应用程序的架构就如同你房子的地基和框架。它提供了必要的结构，在此基础上，你可以创建房间并安装布线、供水和供暖系统。应用程序也是如此。


    然后，你通过使用代码详细实现应用程序的功能来构建这个架构。最终结果是一个可运行的应用程序，实现了你定义的需求——就像你的房子，按照你期望的特性建造而成。


    捕获应用程序的需求并设计应用程序的结构，将为你编写代码时提供宝贵的指导，并确保你的应用程序更加灵活和健壮。你无需不断地拼凑代码来容纳之前未曾考虑到的功能。因此，尽管这不是强制性的，但按照此处描述的方式，遵循一个务实的规划和设计过程，被认为是良好的实践。


    ### Apple iOS 设计资源


    设计应用程序的过程在很大程度上依赖于你自己的想象力和脑力——这也是乐趣的一部分。然而，如果你在理解如何最佳设计用户界面或按预期方式使用所提供的框架时感到困惑，你并非孤例！


    iOS 操作系统展现了其运行设备的核心特性。因此，理解设备的特性并了解苹果公司希望如何使用它至关重要。苹果公司还花费了大量时间，针对特定任务创建和定制用户界面元素，充分利用了触控和手势用户界面。


    例如，日期和时间的输入是通过使用**日期和时间选择器**控件实现的，还有一个更通用的**选择器**控件可用。这允许你旋转选择器的轮盘，直到显示你想要的值。就日期而言，先是日，然后是月，最后是年。这是一个很好的示例，展示了专门为适应设备的触摸和滑动手势而开发的控件。


    这与微软在创建 Windows SDK 时所采用的原则以及作为 `.NET framework` 一部分而存在的不同用户界面控件并没有太大区别。最初，这些控件适合使用鼠标和键盘作为输入，随后进行了扩展以应对平板设备的引入，例如电子墨水（e-ink）概念。而随着
    Windows Mobile 7 的引入，这一过程仍在继续。


    苹果公司在 [`http://developer.apple.com`](http://developer.apple.com) 上提供了许多有用的指南。对于用户界面设计，主要资源是
    **iOS 人机界面指南**。其指导内容包括：


    *   **用户界面指南**：例如，专注于构建以用户体验和用户协作为重点的应用程序

    *   **iOS 用户界面控件使用指南**：详细分解不同的用户界面控件，说明它们在哪些场景下最适用，以及如何使用它们。


    **iOS 人机界面指南** 确实涵盖了更多主题。我建议你熟悉这份指南。同时，花点时间浏览该网站及其相关内容。

    '
- fmt: '#### Other Design Resources


    Many resources on the Internet provide example applications—some simple and some
    very complex. A particular favorite of mine is the source code and narrative of
    the journey taken to port the Doom game to the iPhone, available at [`http://www.idsoftware.com/doom-classic/`](http://www.idsoftware.com/doom-classic/).
    (Using something as complex as that as our example application would be fun, but
    unfortunately, impossible. I hope Lunar Lander is the next best thing.)


    The following are some other useful resources you may wish to reference:


    * *Objective-C for Absolute Beginners* (ISBN 978-1-4302-2832-5) is a great book
    that takes you through the details of Objective-C. It serves as a useful reference
    as you familiarize yourself with the language.

    * Pttrns.com ([`http://pttrns.com/`](http://pttrns.com/)) is a useful resource
    for demonstrating user-interface patterns—not in a programmatic sense, but in
    a visual sense. It''s a useful resource for giving you visualization ideas.

    * *Pro Objective-C Design Patterns for iOS* (ISBN 978-14302-3330-5) provides design
    patterns to help you implement some of the more complex designs that you may want
    to use in your applications (it''s more on the advanced side).

    * Many resource management tools are available, some of them open source. If you''re
    dealing with a large number of requirements for your application, you may find
    these tools useful. An example is available at [`http://sourceforge.net/projects/osrmt/`](http://sourceforge.net/projects/osrmt/).


    ### Planning and Designing the Lunar Lander Application


    So, let''s practice what we preach. We will follow the phases of the design process
    described in the previous section. First, we''ll capture and document the requirements,
    and then we''ll design the application.


    #### Requirements Specification


    The requirements specification defines the scope of the application and provides
    the details on which the design is based. It is also usual to classify your requirements
    in terms of priority, allowing you to make the hard decisions should you run out
    of time. A common mechanism for doing this is to use what is known as the MOSCOW
    notation, for those requirements you **M**ust have, **S**hould have, **C**ould
    have, and **W**ould like to have. This is a simple but effective approach.


    [Table 5-1](#Chapter05.html#tab_5_1) shows a summary of requirements specification
    for our Lunar Lander game.


    ![images](images/t0501.jpg)


    Clearly, the requirements could be elaborated to provide further details, but
    for brevity, I''ve reduced the specification to the key requirements and associated
    data. This is enough information to allow us to create the game, which is the
    focus of this chapter.


    #### Lunar Lander Application Design


    Once you''ve decided the type of application you''re developing, and what attributes
    make the most sense, you are ready consider some of the details. For example,
    a productivity tool (such as a calculator), a game (graphical), and a messaging
    (textual) app will all need a different look and feel.


    ##### User Interfaces


    The application will present two distinct user interfaces:


    * **Main menu**: This will be the default screen when the application is launched,
    and will provide a menu from which settings such as difficulty can be chosen.
    Also, the game can be started through this menu system. It will show the high
    scores in the middle of the screen and present a graphical picture of the lunar
    lander cabinet as a backdrop.

    * **Game view**: This is the main view for the game, supported by its own controller.
    On this screen, the terrain will be drawn and the lander will be displayed, along
    with the game, statistics such as score and fuel remaining, and so on.


    ##### Game States


    The game can be in one of the following five states, each of which responds to
    user input as relevant to its state:


    * **Menu**: At the main menu, waiting for the user to quit, select a difficulty
    level, or start a new game.

    * **Running**: The game has started and is responding to any user input.

    * **Paused**: The game has either been paused or suspended and is waiting for
    the user to signal a restart.

    * **Crashed**: The game has been running but the user has crashed. A new game
    can be started from this menu.

    * **Won**: The game has been running and the user has successfully landed the
    lander. The next level is ready to commence when the user presses a key.


    ##### Other Game Design Elements


    Other elements included in the game design are as follows:


    * The game will use a simple timer to manage the on-screen graphic updates. However,
    this could be changed later to use multiple threads, which would provide for smoother
    game play.

    * The Lunar Lander graphic will have three core states: flying with no thrust,
    flying with thrust, and crashed. The rotation is managed by using the iOS''s graphic
    API.

    * The terrain is predefined as a series of points, drawn at runtime using simple
    line graphics.

    * On-screen toolbar buttons will initially be used as user input. The left and
    right arrow keys rotate the lunar lander ship, and the up arrow key signals thrust.
    This could be changed to use the touch and gesture interface, topics that are
    explored in [Chapter 10](#Chapter10.html#ch10).


    ### Building the Lunar Lander Application


    With the requirements and design phases complete, we''re ready to dive in and
    build the Lunar Lander game.


    The Lunar Lander application will be written initially as an iOS application that
    targets the iPhone device. We''ll talk about how you would change this to suit
    other devices using the iOS orientation features in [Chapter 7](#Chapter07.html#ch7).


    We''ll use the iOS View-based Application project template, allowing it to create
    the initial view and view controller for the main menu. We''ll then create a separate
    view and associated view controller to manage the game''s view. This will provide
    a head start and also build on the earlier examples we''ve already covered.


    We''ll also include other resources within the project, such as graphical images
    for the lunar lander image. So, let''s get started.'
