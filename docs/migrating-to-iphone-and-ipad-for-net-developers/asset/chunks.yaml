    调用了继承的 `dealloc()` 方法。这被称为*沿着链向上传递调用*，使用它被称为*遵守规范*。此行为由 Xcode 创建的方法的默认实现提供。你可以在以下代码中看到这一切：


    `- (void)dealloc`

