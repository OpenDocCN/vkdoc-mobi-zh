  trans: '

    ##### Web 应用


    利用 Web 范式开发应用程序的选项依然存在，并且始终是一种选择。在此范式下，应用程序托管在移动设备之外，并利用苹果移动浏览器 Safari 的隐含功能来执行代码，提供所需的用户界面和功能。当然，这限制了你能构建的应用程序类型、其功能的丰富程度、可实现的功能，以及应用程序的访问和分发方式。


    例如，基于浏览器的应用程序仅在具备网络连接时可用，但在某些情况下，这可能是相当合适的。假设你想面向众多设备，而又不必过分依赖它们操作系统所提供的功能。这种情况下，你可能会考虑基于
    Web 的应用程序。是的，它可能需要网络连接，但如果你的应用程序需要通常仅由 Web 浏览器提供的功能，例如 `HTML` 或 `JavaScript`，那么
    Web 应用可能就足够了。然而，苹果以其丰富、直观且交互性强的用户体验为傲，而利用苹果设备及其操作系统的能力来提供这种体验要容易得多。但需要注意的是，公平地说，随着浏览器体验的不断发展和新技术的引入，Web
    应用与原生应用之间的差距正在显著缩小！


    ##### 原生应用


    基于 Web 的应用程序的替代方案是原生应用，这也是本书的重点。我们将探讨那些下载并驻留在移动设备本身上的应用程序，它们使用苹果自己的工具（`Xcode`
    和 `iOS SDK`）或第三方供应商的工具编写而成。


    既然我们已经介绍了基本的开发原则和方法，接下来我们将关注一些围绕使用苹果工具进行应用程序开发的核心概念，然后查看可用于应用程序开发的第三方选项。我们将在本书中讨论这些选项，并指导你通过不同的机制来创建应用程序。


    ### Apple 平台与技术


    苹果提供了多种开发资源，让你能够面向其众多设备或平台。这些包括 Mac（通过 Mac OS X 操作系统）、Safari 浏览器，当然还有苹果的移动设备。本节将介绍基本概念，然后更详细地讨论
    iOS 和苹果工具集。


    #### Apple 术语与概念


    让我们从你在开始旅程之前应该认识到的一些关键术语开始，为你后续章节将了解的细节提供一些背景。我希望在你了解第三方选项（如果有的话）如何与苹果的核心平台和技术进行交互之前，你能够在脑海中建立起关于这些核心概念的整体图景。


    ![images](img/t0102.jpg)

    ![images](img/t0102a.jpg)


    图 1-2 是一个以逻辑顺序呈现这些概念的示意图（俗语说，“一图胜千言”）。随着本章内容的推进，我将以此图为基础，将我们遇到的每个概念相互关联起来，并解释它们的目的和关系。该图代表了所提供的各个“层”，而方框的边界不应被视为你唯一可用的接口。随着我介绍每个核心层，这一点将变得更加清晰。


    ![images](img/0102.jpg)


    **图 1-2.** *苹果移动应用程序开发框架*


    正如你在图 1-2 中所见，在 iOS 之上的是 `iOS SDK` 和带有 Touch 扩展的 `Cocoa API`。Bridge 技术是另一个 API，它提供了将这些资源与非苹果的及解释型语言（如
    Perl、Python 和 Ruby）链接起来的框架。最后，Xcode 工具套件提供了图形用户界面（GUI），用于使用通过集成开发环境（IDE）提供的编程语言、API
    和库——所有这一切都运行在你的 Apple Mac 计算机之上。


    现在，即使还没有掌握开发的方法或模式，你也应该对与苹果移动设备开发相关的一些高级概念感到熟悉，并理解这些核心组件之间的某些关系。你还应该已经下载了 `iOS
    SDK`，尽管我们要到下一章才会使用它。


    构建和运行移动应用程序需要 iOS 及其相关的 SDK。让我们从高层次上来审视它们。这将帮助你理解不同移动设备的一些复杂性，并为你进一步了解操作系统功能如何被其上的
    API 和 SDK 所访问提供背景信息。

