    \n- 为计时器提供实现，该计时器将使用`UpdateLander()`方法更新着陆器的位置，并将屏幕标记为脏状态以强制重绘。\n- 提供`QuitGame()`的实现，该实现用于关闭模态对话框，将我们带回到显示该对话框的“开始游戏”屏幕。\n\
