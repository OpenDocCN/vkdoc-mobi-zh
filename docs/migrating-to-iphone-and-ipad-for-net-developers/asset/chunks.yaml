- fmt: "#### Implementing Navigation in Your Application\n\nSo we've built our application\
    \ to display two simple forms, with a button click linking the two. But the game\
    \ isn't much use if once you've completed it, you cannot get back to the main\
    \ menu to start again or exit. So, we need to continue building our game screen\
    \ implementation to provide a mechanism for returning to the main menu or the\
    \ parent window.\n\nWe'll start by building on our existing game interface screen.\
    \ We'll add a toolbar to conveniently allow us to place buttons on it. We'll also\
    \ add some on-screen labels, which we'll use to display status information.\n\n\
    Go ahead and add the `Toolbar`, `Button`, and `Label` controls to create the interface\
    \ shown in [Figure 5–5](#Chapter05.html#fig_5_5). Use the standard features of\
    \ Xcode 4's Interface Builder, as you've done in previous examples. Any code surrounding\
    \ these items is automatically generated.\n\n![images](images/0505.jpg)\n\n**Figure\
    \ 5–5.** *Game interface screen*\n\nWe will improve this screen, but for the moment.\
    \ It serves its purpose: to provide a `Quit` button that will return us to the\
    \ main menu. To do this, we'll use techniques similar to those we've employed\
    \ previously.\n\nWe need an `IBAction` property, which is used to provide the\
    \ event property that is fired when selected. Also, we need to hook up the action\
    \ on the Connections Inspector tab as before and provide the following event implementation\
    \ code:\n\n```\n-(void)quitGame:(id)sender\n{\n    // No longer require the game\
    \ window, go back to parent\n    [ self dismissModalViewControllerAnimated:YES\
    \ ];\n}\n```\n\nThis code will do the reverse of what the code that initially\
    \ displayed the `GameView` view as a dialog box did. It will send the `dismissModalViewControllerAnimated`\
    \ message to the view. This will cause the window to be unloaded and focus returned\
    \ to the parent view from which it was launched—in our case, `LunarLanderViewController`.\
    \ In .NET, this would be the same as calling the `Close()` method on the form,\
    \ although no animation would be performed on the closing window, as is the case\
    \ with the iOS SDK.\n\nWe won't do anything with the other buttons yet. (They\
    \ will be used to test our game's physics before we look at more advanced user-interaction\
    \ mechanisms in later chapters.) The labels are placeholders for the moment, and\
    \ while we won't update their values yet, they start to make the game take shape.\n\
    \n### Building the Core Game Engine and Enabling User Interaction\n\nSo far, we've\
    \ displayed our initial game screen with the button that will start our game.\
    \ Now we need to create the main game's mechanics. Next, we'll add to our application's\
    \ functionality by starting to implement the core game engine. We will build on\
    \ the `GameView` class, and explore some further iOS and Objective-C concepts\
    \ in the process.\n\n#### Examining the Game View Header\n\nThe `GameView` XIB\
    \ files and the associated `GameViewController` class provide the implementation\
    \ of our core game engine. First, consider the `GameView.h` file shown in [Listing\
    \ 5-5](#Chapter05.html#list_5_5). I'll highlight the key segments of the code\
    \ before we look at the code (a complete explanation follows the listing). In\
    \ the header file, we do the following:\n\n*   Define our class with an `NSTimer`\
    \ class member to provide a timer.\n*   Declare a number of methods that we will\
    \ use to respond to on-screen button presses, namely `Quit`, `Rotate Left`, `Rotate\
    \ Right`, and `Thrust`.\n*   Declare a method that our timer will execute at the\
    \ desired frequency.\n*   Define a number of enumerated types to hold state, and\
    \ a number of constants, which will be used within the game's physics.\n*   Declare\
    \ our `GameView` that will hold three images to map onto the state of our thruster:\
    \ `Thrust`, `No-Thrust`, and `Crashed`.\n*   Declare instance variables that represent\
    \ state or instance variables, for which we will use our already defined enumerated\
    \ types and constants.\n*   Declare a property to hold our lunar lander image\
    \ and `IBAction`s for each of the buttons so that we can wire them up to the methods\
    \ that provide the implementation.\n\nPhew. Now take a look at the code and see\
    \ if you can spot all of these features in [Listing 5-5](#Chapter05.html#list_5_5).\n\
    \n**Listing 5-5.** *GameView.h*\n\n```\n#import <UIKit/UIKit.h>\n\n// GameView\
    \ class manages the game's view controller\n//\n@interface GameViewController\
    \ : UIViewController {\n\n    NSTimer *gameLoop;  // Core game timer\n}\n\n//\
    \ Declare class events for our view controller\n- (void)timerLoop:(NSTimer *)timeObj;\
    \   // Timer event loop\n-(IBAction)quitGame:(id)sender;\n-(IBAction)rotateLeft:(id)sender;\n\
    -(IBAction)rotateRight:(id)sender;\n-(IBAction)thrust:(id)sender;\n\n@end\n\n\
    // Declaration of some enumerated types to avoid lots of messy constant definitions\n\
    typedef enum { NOTREADY, READY, RUNNING, WON, LOST, PAUSED } GameState;\ntypedef\
    \ enum { EASY, MEDIUM, HARD } GameDifficulty;\ntypedef enum { THRUSTERS_ON, THRUSTERS_OFF\
    \ } ThrusterState;\n\n// Declaration of other constants used to manage the physics\n\
    static const int FUEL_INITIAL = 200;\nstatic const int FUEL_MAX = 200;\nstatic\
    \ const int FUEL_BURN = 10;\nstatic const int MAX_INIT = 30;\nstatic const int\
    \ MAX_SPEED = 120;\nstatic const int ACCELERATION_DOWN = 35;\nstatic const int\
    \ ACCELERATION_UP = 80;\nstatic const double GRAVITY = 9.8;\n\n// GameView class\
    \ manages the main game\n//\n@interface GameView : UIView {\n\n    // Images to\
    \ hold the lander state\n    @private UIImage            *plander_thrust;\n  \
    \  @private UIImage            *plander_nothrust;\n    @private UIImage      \
    \      *plander_crashed;\n\n    // Other game member variables\n    @private GameState\
    \          gstate;\n    @private GameDifficulty     level;\n    @private ThrusterState\
    \      thrusters;\n    @private int                fuel;\n    @private int   \
    \             speed_x;\n    @private int                speed_y;\n    @private\
    \ double             rotation;\n\n    // Define our lander's X and Y on-screen\
    \ coordinates\n    @private int loc_x;\n    @private int loc_y;\n}\n\n// Declare\
    \ our member properties\n@property (nonatomic, retain) UIImage *lander_nothrust;\n\
    \n// Declare our class methods\n- (void) newGame;\n- (void) updateLander;\n- (void)\
    \ rotateLeft:(id)sender;\n- (void) rotateRight:(id)sender;\n- (void) thrustEngine:(id)sender;\n\
    \n@end\n```\n\nDid you spot them all? If not, don't worry. We'll walk through\
    \ the important parts of the implementation.\n\nThe game will support a number\
    \ of states. These will be used to invoke functionality that is appropriate for\
    \ its state. For example, when the game is running, we'll update the screen with\
    \ the on-screen graphics. However, if the game has yet to start or a recent game\
    \ has just finished, there will be no need to constantly update the screen. We\
    \ will also use a timer to drive the core game, update the game physics, and invoke\
    \ the code necessary to update the on-screen graphics and detect user interactions.\n\
    \nA more detailed view of the game's engine flow is shown in [Figure 5–6](#Chapter05.html#fig_5_6).\n\
    \n![images](images/0506.jpg)\n\n**Figure 5–6.** *Following the core game engine\
    \ flow*\n\nYou can see from the flow that once the `GameView` is initialized,\
    \ we will initialize the game settings, such as loading graphics and setting default\
    \ values. Then we proceed to detect user input, update the game's physics, and\
    \ check collision detection, which may indicate a successful landing or a crash.\n\
    \nAt this point, we'll force the screen to be repainted. But this screen painting\
    \ actually happens automatically by linking such updates to a timer, which will\
    \ fire every one-quarter second. If the game isn't in the correct state—it's yet\
    \ to start or you have crashed and it's waiting for you to reset the game—then\
    \ the screen will not be updated.\n\nAs with most designs, we could improve on\
    \ this application, and we'll do this as the book progresses. For now, our current\
    \ design is sufficient to introduce some key topics."
