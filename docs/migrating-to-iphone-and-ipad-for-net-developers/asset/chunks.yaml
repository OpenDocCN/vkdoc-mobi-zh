    to give the user a familiar but rich experience.'
  trans: "\n# 处理设备方向\n\n你可能已经猜到，iOS SDK 会触发一个事件来通知你的代码设备方向发生了变化。来看看这个事件的签名：\n\n`(void)\
    \ didRotateFromInterfaceOrientation(UIInterfaceOrientation)fromInterfaceOrientation`\n\
    \n当这个事件被触发，并且你的应用程序通过在代码中实现这个方法签名来捕获该事件时，它会传入设备旋转前的方向。所以你只需要实现这个事件，对吗？不对——除了为旋转方法提供实现外，你还需要首先告诉你的应用程序支持不同的方向并触发该事件。如果你检查构建视图控制器时生成的代码，会发现以下代码被注释掉了：\n\
    \n```\n/*\n// Override to allow orientations other than the default portrait orientation.\n\
    - (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation\
    \ {\n    // Return YES for supported orientations\n    return (interfaceOrientation\
    \ == UIInterfaceOrientationPortrait);\n}\n*/\n```\n\n你需要同时取消这段代码的注释，向应用程序表明它现在支持不同的方向，并且确保如果触发的方向（在示例中为竖屏方向）受支持则返回\
    \ `YES`，如果所有方向都受支持则无条件返回 `YES`。你还需要实现前面讨论过的旋转事件。\n\n如果你想知道设备是否已旋转为竖屏方向，可以检查它是否从横屏方向旋转而来，并通过使用针对该方向定向的视图控制器来反映这一变化：\n\
    \n```\nif((fromInterfaceOrientation == UIInterfaceOrientationLandscapeLeft) ||\n\
    \     (fromInterfaceOrientation == UIInterfaceOrientationLandscapeRight))\n  {\n\
    \    //  Load the view controller oriented to the Portrait mode\n  }\n```\n\n\
    你还可以测试 `UIInterfaceOrientationPortrait` 和 `UIInterfaceOrientationPortraitUpsideDown`，在所有情况下根据你的应用程序是否已编写为支持特定旋转来返回\
    \ `YES` 或 `NO`。\n\n我们来测试一下。如果你让代码保持注释状态或直接返回 `NO`，那么你的应用程序只支持竖屏方向，不支持横屏方向。因此，如果你在模拟器中运行应用程序，并从\
    \ `Hardware` 菜单中使用向左旋转（![images](img/U003.jpg)![images](img/U004.jpg)）或向右旋转（![images](img/U003.jpg)![images](img/U005.jpg)）命令，设备会旋转。将其向左旋转，你应该会看到类似图\
    \ 6-5 的屏幕。\n\n![images](img/0605.jpg)\n\n**图 6-5.** *设备向左旋转*\n\n这显然看起来不对，而且毫不意外，因为你已经指出应用程序不支持竖屏之外的任何方向。为了说明这一点，让我们取消代码注释，并无论方向如何都返回\
    \ `YES` 作为值。更改代码后，重新运行应用程序，并按照相同的向左方向旋转，你应该会看到类似图 6-6 的屏幕。\n\n![images](img/0606.jpg)\n\
    \n**图 6-6.** *支持横屏的设备旋转*\n\n好多了，但还不正确。正如你所看到的，按钮不像在竖屏模式下那样在屏幕上居中。没关系：这个问题很容易解决，因为\
    \ Xcode 和 iOS SDK 支持使用控件属性进行自动调整大小。打开你的项目并打开 `LunarLanderViewController.xib` 以显示起始屏幕。使用尺寸检查器（![images](img/U006.jpg)![images](img/U007.jpg)5）选择按钮，你就会看到图\
    \ 6-7 中显示的尺寸检查器。\n\n![images](img/0607.jpg)\n\n**图 6-7.** *尺寸检查器*\n\n首先，不要被这个显示界面搞糊涂；它相当直观。让我们关注自动调整大小窗格。左边的框是修改属性值的地方；右边的框是一个示例动画，描绘了你所做更改的效果——这是一个非常有用的视觉工具，可以确认你做了正确的更改。\n\
    \n仔细观察，你会发现两件事：\n\n*   内方块中的一组红色箭头，代表所选对象内部的水平和垂直空间\n*   内框外侧的一组 *I* 形图标，代表所选对象与其所在视图外部之间的距离\n\
    \n在这两种情况下，虚线表示该空间是灵活的：也就是说，它会根据屏幕的方向进行调整。实线表示该空间是固定的。因此，如果你希望按钮在水平轴上是灵活的并能自动居中，你需要确保左侧的\
    \ *I* 形图标是虚线，而不是默认的实线。这一更改如图 6-7 所示，动画显示旋转时按钮会移动到横屏屏幕的中心——这正是你想要的。进行更改并运行应用程序，你应该会看到类似图\
    \ 6-8 的屏幕。好多了！\n\n![images](img/0608.jpg)\n\n**图 6-8.** *通过调整自动调整大小设置，屏幕向左旋转*\n\
    \n自动调整大小并不是你唯一可用的选项。iOS SDK 提供了一种方法，让你可以通过代码在旋转完成前调整控件的属性，从而精确控制控件的外观和感觉。需要更改的方法签名如下：\n\
    \n`(void)willAnimateRotationToInterfaceOrientation:(UIInterfaceOrientation)`\n\
    \n最后一个可用的选项让你无需通过编程方式即可精确控制屏幕在特定方向上的外观。要实现这一点，你需要为每个要支持的方向准备一个视图，并在刚才描述的那个方法中使用\
    \ `self.view` 属性来调整视图。这意味着你的视图可以在设计时针对某个方向定义用户界面的外观和感觉，而无需通过代码以编程方式调整用户界面控件。简单吧！\n\
    \n关于旋转和方向的讨论就到此为止。虽然它们很重要，但并非本章的主要焦点。让我们将目光投放到设备的属性之外，考虑你可能正在构建的应用程序类型，以及 SDK\
    \ 提供的支持，以给用户带来熟悉而丰富的体验。\n"
- fmt: '### Application Types and Associated View Controllers


    So far, this book has introduced the concepts of views and view controllers, and
    even suggested how an application might have multiple views that are programmatically
    displayed as a result of the user interface. I make distinctions between *application
    types*: that is, applications that exhibit certain behaviors and so use view controllers
    in a certain way. Consider the following application types:


    - Utility applications

    - Tab bar applications

    - Navigation applications


    In this context, I class the Lunar Lander as a utility application. The game is
    played predominately from a single view, and it also shows a configuration or
    startup screen. However, this is the simplest of user interfaces. It also displays
    the view controller modally, because the design of the application displays the
    main game screen as the only screen available while the game is being played or
    is terminated. Displaying a view modally is typically implemented to stop the
    flow of your application and force it to return before flow continues. Another
    typical example is to obtain key information required before you can continue.
    The alternative is that flow doesn''t stop, and views are coordinated through
    controls such as tab bars.


    As you can see, there are many innovative and often complex ways for users to
    interact with your application, typically controlled through gestures. To take
    you through working examples for all the different application types and their
    associated view controllers isn''t possible in the constraints of this book. You
    can explore a number of options independently via the Apple guide, such as [`http://developer.apple.com/library/ios/#featuredarticles/ViewControllerPGforiPhoneOS`](http://developer.apple.com/library/ios/#featuredarticles/ViewControllerPGforiPhoneOS)
    or comprehensive iOS development books. Here you focus on some specific, useful
    alternatives that have .NET parallels, and learn how to use them.


    Let''s take a look at the different application types and their associated view
    controllers before you delve into the tab bar example.


    ### Utility-Based Applications


    In a utility-based application, the user''s interaction revolves around a single
    view. Other views may exist, but they are typically limited to supporting the
    configuration of the application. A great example is the Stocks application, shown
    in [Figure 6–9](#Chapter06.html#fig_6_9), which when invoked displays the stocks
    you have chosen (or that it defaults to) and their performance. The Compass is
    another great example, as is the Calculator application.


    ![images](images/0609.jpg)


    **Figure 6–9.** *The Stocks iPhone application is an example of a utility-based
    application.*


    There isn''t a specific view-controller class to manage this kind of application;
    instead, you present views modally in a programmatic fashion. This is exactly
    what you have done with the Lunar Lander application. In .NET, a utility application
    might be a console-based application or a Windows Form application with a single
    window that uses modal dialog boxes to retrieve key information.


    ### Tab Bar–Based Applications


    A tab bar application is an application supporting multiple views, whose context
    is chosen based on the user''s interactions and typically shown as tabs. A good
    example is the Clock application, shown in [Figure 6–10](#Chapter06.html#fig_6_10),
    which has many views, accessed through a tab bar at the bottom of the screen.
    Choosing a tab typically changes the active view controller; a new corresponding
    view becomes active, thus displaying the new screen.


    ![images](images/0610.jpg)


    **Figure 6–10.** *The Clock iPhone application is a multiview tab bar application.*


    It''s worth highlighting a common cause of confusion. A toolbar looks very much
    the same as a tab bar, in that the horizontal bar is used to display icons that
    can be tapped. The key difference is that the toolbar can contain buttons and
    other controls, but their selection isn''t mutually exclusive. The user can tap
    more than one, and they don''t act as binary switches—instead they simply fire
    an event for you to capture and process. Conversely, because the tab bar selection
    determines the view, the tabs are mutually exclusive.


    A tab bar application is typically implemented using the tab bar view controller,
    provided by the `UITabBarController` class. This class is used directly and not
    subclassed; you use this as the focus for a more detailed example. In .NET, the
    tab bar is one of the few view-controller type controls that has a comparable
    direct .NET control in the form of a `TabControl` in Windows Forms (in the `System.Windows.Forms.TabControl`
    namespace).


    It''s also worth mentioning that the tab bar is usually combined with a tabular
    type view, which the table view controller, implemented through the `UITableViewController`
    class, is designed for. It provides support for behavior that you expect when
    implementing a table, such as editing rows of data and or managing the selection
    of cells, rows, and columns.


    ### Navigation-Based Applications


    A navigation-based application is typically used to present a series of views
    that have a natural hierarchy. For example, if you consider the Mail application,
    shown in [Figure 6–11](#Chapter06.html#fig_6_11), each user interaction builds
    on the previous one and allows you to drill down into your Mail Account, then
    your Inbox, then your e-mail messages, and then a specific e-mail. Each step is
    represented by a view, and you can reverse your way out of the hierarchy by choosing
    the back button.


    ![images](images/0611.jpg)


    **Figure 6–11.** *The Mail application is a hierarchical, multiview navigation-based
    application.*


    The navigation controller functionality is contained in the `UINavigationController`
    interface. This is very similar to the `UITabBarController` interface touched
    on earlier, with the key difference being that the navigation controller works
    by implementing a stack of views. For example, think of taking a pile of books
    and placing them on top of each other—you build a stack of books, and when it''s
    complete, the easiest book to take off the stack is the last one you put on. You
    can then uncover the stack of books, finishing with the first one you put down.
    This is known as *last-in-first-out* (LIFO).'
