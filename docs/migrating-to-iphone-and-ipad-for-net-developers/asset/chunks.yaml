  trans: "\n### 单元测试\n\n为了确保基本理解，我们先简要回顾一下*单元测试*这个术语。单元测试是为测试应用程序代码的特定部分而专门编写的代码。在测试领域，你会有一系列测试用例，用于断言所运行的模块行为符合预期。例如，如果一个方法用于计算两个数字之和，你可能会编写测试用例来检查加法是否执行正确，以及如果传入无效参数，该方法是否能妥善处理这种情况。\n\
    \n这一点在任何其他语言中都没有区别，尤其是在编写基于.NET 的应用程序时。在 Visual Studio 支持单元测试之前，甚至在其诞生之前，通常的做法是使用`NUnit`等工具来实现单元测试（Java\
    \ 使用`JUnit`）。值得庆幸的是，Visual Studio 已经迎头赶上，拥有了强大的测试能力，包括一个单元测试框架，其单元测试功能与 Xcode\
    \ 4 非常相似（但我认为甚至更高级）。\n\n### 集成测试\n\n当然，单元测试只是你测试之旅的起点。它有助于测试离散的代码单元，但当你的应用程序开始将这些单元链接在一起时，你就进入了集成测试的领域。集成测试与单元测试的关键区别在于，单元测试通常假设对单个“单元”进行非常简单的独立测试，并且不需要更复杂的测试环境或工具。Xcode\
    \ 除了让你编写集成其他单元测试的单元测试之外，并没有为集成测试提供任何特定的支持，但你还有其他选择。例如，`iCuke`允许你在无需对应用程序做任何修改的情况下编写集成测试。`iCuke`使用`Cucumber`，一种行为驱动测试环境（更多信息请参见“测试驱动开发”部分）来实现其功能。两者都是相当复杂的产品，并非本书的核心范围，但我建议你了解一下它们。你可以在[`https://github.com/unboxed/icuke`](https://github.com/unboxed/icuke)找到关于`iCuke`的更多信息，在[`http://cukes.info/`](http://cukes.info/)找到关于`Cucumber`的更多信息。\n\
    \n### 测试驱动开发\n\n你已经了解了支持集成测试等概念的工具，但除了关注测试代码的实现之外，另一种方法是关注预期的功能或行为。在这个例子中，你首先编写测试用例来阐述其行为。`iCuke`和`Cucumber`等专业产品可以做到这一点，但你也可以使用\
    \ Xcode 实现更有限制的测试驱动开发方法。\n\n同样，测试驱动开发（TDD）涉及在任何生产代码之前编写测试用例。在 Xcode 中，你可以通过生成包含单元测试支持的类来实现这一点，但重点是先通过调用空类实现来编写单元测试。这些测试最初会失败，但在你实现类时，如果它们展示了所需的行为，这些测试应该会通过。\n\
    \n鉴于单元测试作为多种测试策略基础的重要性，让我们来看看如何使用 Xcode 实现它们。\n\n## 编写和运行你的单元测试\n\n现在，既然你已经创建了包含单元测试的项目，你需要执行一系列步骤来实现你的测试。如果你查看提供的示例实现文件，你会注意到两个方法：一个用于在测试开始前处理代码（`setup`），另一个用于在测试结束后处理代码（`teardown`）。它还提供了一个示例方法供你修改其默认实现——即`STFail()`方法，该方法表示测试尚未实现。\n\
    \n此时，我们暂且不为 Lunary Lander 游戏创建单元测试，而是专注于一个更简单的示例来演示方法和工具。在这个简单示例中，你将创建一个非常简单的`Calculator`类，包含一个头文件和一个实现文件，以及一个名为`add()`的方法，该方法返回传入的两个数字之和。首先，你将定义类的声明，如列表\
    \ 9-1 所示。\n\n**列表 9-1**. `Calc.h`\n\n```\n#import <Foundation/Foundation.h>\n\n\
    @interface Calc : NSObject {\n}\n- (int) add:(int)num1 to:(int)num2;\n\n@end\n\
    ```\n\n接下来，你将添加类的实现，如列表 9-2 所示。\n\n**列表 9-2**. `Calc.m`\n\n```\n#import \"Calc.h\"\
    \n\n@implementation Calc\n\n- (int) Add:(int)num1:(int)num2\n{\n    return (num1+num2);\n\
    }\n\n@end\n```\n\n然后，你通过提供测试用例的实现来实现单元测试，将`testExample()`方法修改为测试`add()`方法。你可以在列表\
    \ 9-3 中看到示例实现。\n\n**列表 9-3**. 单元测试实现\n\n```\n#import \"CalculatorTests.h\"\n\n\
    @implementation CalculatorTests\n\n- (void)setUp\n{\n    [super setUp];\n    //\
    \ 这里设置代码。\n}\n\n- (void)tearDown\n{\n    // 这里进行清理工作。\n    [super tearDown];\n\
    }\n\n- (void)testExample\n{\n    Calc *calculator = [[Calc alloc] init];\n   \
    \ int v = [calculator add:5 to:5];\n    if (v != 10)\n        NSLog(@\"add is\
    \ not working\");\n    else\n        NSLog(@\"add is working\");\n    [calculator\
    \ release];\n}\n```\n\n因此，确保你正在针对 iOS 模拟器进行构建，现在你可以通过从“产品”菜单中选择“为测试而构建”或使用快捷键组合（⌘U）来测试你的产品。这将构建你的应用程序并包含必要的调试信息，当你使用测试选项或快捷键组合（⌘U）执行测试时，它将运行你的应用程序和选定的单元测试用例（稍后会详细说明），并从单元测试代码向调试日志输出大量诊断信息。在本例中，使用日志导航器（⌘7），你可以跳转到已执行测试的日志文件。日志应显示类似于以下输出。你的`testExample`方法的特定输出以**粗体**显示。\n\
    \n```\nTest Suite 'All tests' started at 2011-08-20 11:06:32 +0000\nTest Suite\
    \ '/Developer/Platforms/iPhoneSimulator.platform/Developer/SDKs/\niPhoneSimulator4.3.sdk/Developer/Library/Frameworks/SenTestingKit.framework(Tests)'\n\
    \ started at 2011-08-20 11:06:32 +0000\nTest Suite 'SenInterfaceTestCase' started\
    \ at 2011-08-20 11:06:32 +0000\nTest Suite 'SenInterfaceTestCase' finished at\
    \ 2011-08-20 11:06:32 +0000.\nExecuted 0 tests, with 0 failures (0 unexpected)\
    \ in 0.000 (0.000) seconds\n\nTest Suite '/Developer/Platforms/iPhoneSimulator.platform/Developer/SDKs/\n\
    iPhoneSimulator4.3.sdk/Developer/Library/Frameworks/SenTestingKit.framework(Tests)'\n\
    finished at 2011-08-20 11:06:32 +0000.\nExecuted 0 tests, with 0 failures (0 unexpected)\
    \ in 0.000 (0.001) seconds\n```\n"
