- fmt: "#### Initializing Your Application\n\nEvery mobile application running on\
    \ an iOS-based device—the iPhone, iPod touch, or iPod—shares some common characteristics\
    \ that set an expectation with the user, but also are strengths of the platform\
    \ that have helped to make it so successful. For example, consider the immediacy\
    \ of using your device to check your email, view any Facebook updates, or quickly\
    \ check your current location on Google Maps. You don't need to wait; you simply\
    \ unlock your device (if required), click the application's icon, and pow—it works!\n\
    \nSuch an experience isn't by accident—it's by design, and your application should\
    \ carefully consider this expectation. It should reflect the same sense of immediacy\
    \ by not taking too long to launch, having an intuitive and response user interface,\
    \ and so on.\n\nLet's consider the structure of an iOS application, which will\
    \ help you understand the roles some of the files created within our Xcode project\
    \ play in implementing the application.\n\nAt the heart of your application is\
    \ the main event loop, used to interpret events, either as a result of internal\
    \ events being raised or user stimuli (such as touching the screen). These events\
    \ are queued, and the queue is processed in a first-in/first-out basis, with each\
    \ event being dispatched to the most appropriate event handler. In the case of\
    \ user-interface controls, this is the window in which the user event occurred.\
    \ The diagram from the iOS Developer Library shown in [Figure 2–10](#Chapter02.html#fig_2_10)\
    \ illustrates this perfectly.\n\n![images](images/0210.jpg)\n\n**Figure 2–10.**\
    \ *Event processing sequence*\n\nThe diagram shows that user input is captured\
    \ by the operating system framework and passed as a series of events to the application,\
    \ along with its inherent objects. These objects then react to the events as required\
    \ and provide the application's functionality.\n\nThe entry point for your iOS\
    \ application is the same as that for any other application based on the C programming\
    \ language: the `main()` function. Under the `\\Supporting Files` folder, you\
    \ will find the `main.m` implementation file, which contains the `main()` function,\
    \ with the following implementation:\n\n```\nint main(int argc, char *argv[])\n\
    {\n    NSAutoreleasePool * pool = [[NSAutoreleasePool alloc] init];\n    int retVal\
    \ = UIApplicationMain(argc, argv, nil, nil);\n    [pool release];\n    return\
    \ retVal;\n}\n```\n\nLet's examine the code it has created and its purpose. The\
    \ first thing to note is that an object instance called `pool` is created based\
    \ on the `NSAutoRelease` class. This provides the application's top-level memory\
    \ pool from which objects can be associated and released. Every Cocoa-based application\
    \ (Cocoa is one of the iOS SDK frameworks) always has an autorelease pool available.\
    \ If it didn't, memory wouldn't be managed correctly, and your application would\
    \ leak memory.\n\nThe next observation is the `UIApplicationMain()` function,\
    \ which passes the argument count (`argc`) and arguments themselves (`argv`) to\
    \ the `main()` function. The `UIApplicationMain()` function is used to create\
    \ and initialize the application's key objects and start the event-processing\
    \ loop. The application will not return from this function until the application\
    \ quits. At that point, the `pool` instance is released itself, and the main function\
    \ exits, returning the return value passed back from the `UIApplicationMain()`\
    \ function.\n\n#### Creating Your User Interface\n\nIn Xcode 3, the Interface\
    \ Builder capability was implemented as a separate application, but with the release\
    \ of Xcode 4, Interface Builder is fully integrated within the Xcode 4 IDE, so\
    \ there is no need to swap applications. There are a few other improvements, especially\
    \ tighter integration between the Interface Builder objects and source-code generation,\
    \ which means fewer synchronization issues. This is especially evident in how\
    \ the `.xib` files are now managed, or even more advanced features such as Storyboards.\
    \ For more information about the differences between Xcode versions, see the excellent\
    \ documentation on the [`http://developer.apple.com`](http://developer.apple.com)\
    \ web site, which explain the details to a good standard. In addition, [Chapter\
    \ 10](#Chapter10.html#ch10) of this book covers some of the more advanced features\
    \ of Xcode 4 and iOS 5, such as Storyboards, used to manage the workflow of your\
    \ application.\n\n##### Using Interface Builder\n\nLet's borrow the diagram from\
    \ Apple's own web site, as shown in [Figure 2–11](#Chapter02.html#fig_2_11). This\
    \ does an admirable job of showing the different panes within Interface Builder\
    \ and their purpose.\n\n![images](images/0211.jpg)\n\n**Figure 2–11.** *Interface\
    \ Builder*\n\nThe Interface Builder application is split into the following areas:\n\
    \n* **Editor area**: This contains the canvas and other elements that essentially\
    \ present the graphical view of what your user interface will look like.\n* **Inspector\
    \ pane**: This displays the properties of a given object that is selected within\
    \ the editor area, in keeping with the inspector chosen. Numerous inspectors provide\
    \ a view of different properties. For example, the size inspector displays size,\
    \ position, and related properties.\n* **Library pane**: This provides access\
    \ to a resource library available for you to use within your project. You can\
    \ use the library selector bar to choose between the different types of resources\
    \ such as code, objects, and media files.\n\nYou have already created your first\
    \ iPhone application using the project template feature, although it's an empty\
    \ shell. Some default implementations are provided, but it doesn't do anything\
    \ functionally useful—yet!\n\nOur application is going to be really simple. It\
    \ will just display the text “Hello, World” in the middle of the user interface's\
    \ canvas. So, building on our empty project and the default files, let's construct\
    \ the rest of our application."
  raw: '#### Initializing Your Application


    Every mobile application running on an iOS-based device—the iPhone, iPod touch,
    or iPod—shares some common characteristics that set an expectation with the user,
    but also are strengths of the platform that have helped to make it so successful.
    For example, consider the immediacy of using your device to check your email,
    view any Facebook updates, or quickly check your current location on Google Maps.
    You don''t need to wait; you simply unlock your device (if required), click the
    application''s icon, and pow—it works!


    Such an experience isn''t by accident—it''s by design, and your application should
    carefully consider this expectation. It should reflect the same sense of immediacy
    by not taking too long to launch, having an intuitive and response user interface,
    and so on.


    Let''s consider the structure of an iOS application, which will help you understand
    the roles some of the files created within our Xcode project play in implementing
    the application.


    At the heart of your application is the main event loop, used to interpret events,
    either as a result of internal events being raised or user stimuli (such as touching
    the screen). These events are queued, and the queue is processed in a first-in/first-out
    basis, with each event being dispatched to the most appropriate event handler.
    In the case of user-interface controls, this is the window in which the user event
    occurred. The diagram from the iOS Developer Library shown in [Figure 2–10](#Chapter02.html#fig_2_10)
    illustrates this perfectly.


    ![images](images/0210.jpg)


    **Figure 2–10.** *Event processing sequence*


    The diagram shows that user input is captured by the operating system framework
    and passed as a series of events to the application, along with its inherent objects.
    These objects then react to the events as required and provide the application''s
    functionality.


    The entry point for your iOS application is the same as that for any other application
    based on the C programming language: the `main()` function. Under the `\Supporting
    Files` folder, you will find the `main.m` implementation file, which contains
    the `main()` function, with the following implementation:


    `int main(int argc, char *argv[])`

    `{`

    `    NSAutoreleasePool * pool = [[NSAutoreleasePool alloc] init];`

    `    int retVal = UIApplicationMain(argc, argv, nil, nil);`

    `    [pool release];`

    `    return retVal;`

    `}`


    Let''s examine the code it has created and its purpose. The first thing to note
    is that an object instance called `pool` is created based on the `NSAutoRelease`
    class. This provides the application''s top-level memory pool from which objects
    can be associated and released. Every Cocoa -based application (Cocoa is one of
    the iOS SDK frameworks) always has an autorelease pool available. If it didn''t,
    memory wouldn''t be managed correctly, and your application would leak memory.


    The next observation is the `UIApplicationMain()` function, which passes the argument
    count (`argc`) and arguments themselves (`argv`) to the `main()` function. The
    `UIApplicationMain()` function is used to create and initialize the application''s
    key objects and start the event-processing loop. The application will not return
    from this function until the application quits. At that point, the pool instance
    is released itself, and the main function exits, returning the return value passed
    back from the `UIApplicationMain()` function.


    #### Creating Your User Interface


    In Xcode 3, the Interface Builder capability was implemented as a separate application,
    but with the release of Xcode 4, Interface Builder is fully integrated within
    the Xcode 4 IDE, so there is no need to swap applications. There are a few other
    improvements, especially tighter integration between the Interface Builder objects
    and source-code generation, which means fewer synchronization issues. This is
    especially evident in how the `.xib` files are now managed, or even more advanced
    features such as Storyboards. For more information about the differences between
    Xcode versions, see the excellent documentation on the [`http://developer.apple.com`](http://developer.apple.com)
    web site, which explain the details to a good standard. In addition, [Chapter
    10](#Chapter10.html#ch10) of this book covers some of the more advanced features
    of Xcode 4 and iOS 5, such as Storyboards, used to manage the workflow of your
    application.


    ##### Using Interface Builder


    Let''s borrow the diagram from Apple''s own web site, as shown in [Figure 2–11](#Chapter02.html#fig_2_11).
    This does an admirable job of showing the different panes within Interface Builder
    and their purpose.


    ![images](images/0211.jpg)


    **Figure 2–11.** *Interface Builder*


    The Interface Builder application is split into the following areas:


    *   **Editor area**: This contains the canvas and other elements that essentially
    present the graphical view of what your user interface will look like.

    *   **Inspector pane**: This displays the properties of a given object that is
    selected within the editor area, in keeping with the inspector chosen. Numerous
    inspectors provide a view of different properties. For example, the size inspector
    displays size, position, and related properties.

    *   **Library pane**: This provides access to a resource library available for
    you to use within your project. You can use the library selector bar to choose
    between the different types of resources such as code, objects, and media files.


    You have already created your first iPhone application using the project template
    feature, although it''s an empty shell. Some default implementations are provided,
    but it doesn''t do anything functionally useful—yet!


    Our application is going to be really simple. It will just display the text “Hello,
    World” in the middle of the user interface''s canvas. So, building on our empty
    project and the default files, let''s construct the rest of our application.'
  trans: "\n#### 初始化你的应用程序\n\n每款运行于 iOS 设备（iPhone、iPod touch 或 iPod）上的移动应用，都具备一些共同特征，这些特征不仅为用户设定了预期，也是该平台得以如此成功的优势所在。例如，想想你用设备查收邮件、查看\
    \ Facebook 更新，或快速在 Google 地图上确认当前位置的便捷体验。你无需等待；只需解锁设备（如果需要），点击应用图标，瞬间——它就启动了！\n\
    \n这种体验并非偶然——而是精心设计的，你的应用也应认真考虑这一预期。它应当反映同样的即时性，比如启动时间不宜过长、拥有直观且响应迅速的用户界面等。\n\n\
    我们来看看 iOS 应用的结构，这将帮助你理解 Xcode 项目中创建的一些文件在实现应用时所扮演的角色。\n\n应用的核心是**主事件循环**，用于解释事件，无论是内部事件引发的结果，还是用户操作（如触摸屏幕）引起的。这些事件被排入队列，并按先进先出的原则处理，每个事件被分派到最合适的事件处理器。对于用户界面控件而言，这个处理器就是用户事件发生的窗口。来自\
    \ iOS Developer Library 的 图 2–10 中的示意图完美地展示了这一点。\n\n![images](img/0210.jpg)\n\n\
    **图 2–10.** *事件处理序列*\n\n该图显示，用户输入由操作系统框架捕获，并作为一系列事件连同其固有对象传递给应用。然后，这些对象根据需要响应事件，并提供应用的功能。\n\
    \niOS 应用的入口点与任何其他基于 C 编程语言的应用相同：`main()` 函数。在 `\\Supporting Files` 文件夹下，你可以找到\
    \ `main.m` 实现文件，其中包含 `main()` 函数，实现如下：\n\n```\nint main(int argc, char *argv[])\n\
    {\n    NSAutoreleasePool * pool = [[NSAutoreleasePool alloc] init];\n    int retVal\
    \ = UIApplicationMain(argc, argv, nil, nil);\n    [pool release];\n    return\
    \ retVal;\n}\n```\n\n我们来分析一下它创建的代码及其用途。首先要注意的是，基于 `NSAutoRelease` 类创建了一个名为 `pool`\
    \ 的对象实例。这提供了应用顶级的内存池，对象可以与之关联并释放。每个基于 Cocoa 的应用（Cocoa 是 iOS SDK 框架之一）始终都有可用的自动释放池。如果没有，内存将无法正确管理，你的应用就会发生内存泄漏。\n\
    \n接下来观察 `UIApplicationMain()` 函数，它将参数计数（`argc`）和参数本身（`argv`）传递给 `main()` 函数。`UIApplicationMain()`\
    \ 函数用于创建并初始化应用的关键对象，并启动事件处理循环。在应用退出之前，该函数不会返回。此时，`pool` 实例本身会被释放，`main` 函数退出，并返回\
    \ `UIApplicationMain()` 函数传回的返回值。\n\n#### 创建你的用户界面\n\n在 Xcode 3 中，Interface Builder\
    \ 功能是作为一个独立应用实现的，但随着 Xcode 4 的发布，Interface Builder 已完全集成到 Xcode 4 IDE 中，因此无需切换应用。此外还有一些其他改进，特别是\
    \ Interface Builder 对象与源代码生成之间的集成更加紧密，这意味着同步问题更少。这在 `.xib` 文件的管理方式上尤为明显，甚至体现在诸如\
    \ Storyboard 等更高级的功能上。有关 Xcode 版本差异的更多信息，请参阅 [`http://developer.apple.com`](http://developer.apple.com)\
    \ 网站上的优秀文档，这些文档详细说明了相关细节。此外，本书的第 10 章介绍了 Xcode 4 和 iOS 5 的一些更高级功能，例如用于管理应用工作流程的\
    \ Storyboard。\n\n##### 使用 Interface Builder\n\n我们借用 Apple 网站上的示意图，如图 2–11 所示。这张图出色地展示了\
    \ Interface Builder 中的不同窗格及其用途。\n\n![images](img/0211.jpg)\n\n**图 2–11.** *Interface\
    \ Builder*\n\nInterface Builder 应用分为以下几个区域：\n\n* **编辑区域**：包含画布和其他元素，主要呈现用户界面外观的图形视图。\n\
    * **检查器面板**：根据所选检查器的不同，显示编辑区域内选定对象的属性。多种检查器提供了不同属性的视图。例如，大小检查器显示大小、位置及相关属性。\n\
    * **库面板**：提供对可在项目中使用的资源库的访问。你可以使用库选择器栏在代码、对象和媒体文件等不同类型的资源之间进行切换。\n\n你已经使用项目模板功能创建了第一个\
    \ iPhone 应用，尽管它只是一个空壳。提供了一些默认实现，但它目前还没有任何实际功能——不过别急！\n\n我们的应用将非常简单。它只会在用户界面画布的中央显示文本“Hello,\
    \ World”。因此，基于我们的空项目和默认文件，让我们来构建应用的其余部分。\n"
- fmt: '# Initializing Your View


    Our initial focus is the application delegate, which is responsible for a number
    of coordinating tasks, including initializing your user interface when the application
    has finished launching. This involves ensuring that you create an instance of
    the view, which implements your user interface, adding it to the list of available
    views within your application. In our case, we have only one view.


    To initialize your view, the application delegate needs to be aware of your view
    class, which is accomplished by including the view controller header file, as
    follows:


    ```

    #import "HelloWorldViewController.h"

    ```


    The application delegate also ensures that the view is initialized after your
    application has finished launching. This is easily done by using the `didFinishLaunchingWithOptions()`
    method. For our example, our project has the following code added:


    ```

    self.window.rootViewController = self.viewController;

    [self.window makeKeyAndVisible];

    ```


    The `self.window` reference points to the main `UIWindow` object referenced by
    the `window` property and automatically initialized by `MainWindow.xib`. When
    your application starts, this `.xib` file is loaded. Then the viewcontroller and
    window are unarchived and loaded, mapping the XML key reference to your interface
    instance variable—in this case, `*viewController`.


    The use of a synthesized property ensures that the getters and setters are provided
    automatically. We''re telling our application that the main window for our application
    should point to the view controller for the view to which we''ll be adding our
    controls.


    This method finishes by passing the `makeKeyAndVisible` message to the window,
    making the view visible. It will be the main window through which to accept user
    input.


    The application will now execute and display a blank window, so we''re getting
    there. To complete the picture, we want to display the infamous text "Hello, World,"
    well known to application developers across the world as one of the first apps
    anyone might write!


    To display this text, we will place a `UILabel` object on our canvas and intercept
    an event that is called after the application has been loaded and the view initialized.
    This event will be used to set the label text to "Hello, World," which will display
    it on the screen. (Of course, we could display the text directly onto the canvas
    of the window using some iOS SDK objects and commands, but that would spoil the
    fun of later chapters.)


    We will begin by adding the `UILabel` to our view. In Xcode, select the `HelloWorldViewController.xib`
    file (our view). This will display a visual representation of our view. From here,
    we can access the Controls Library to add our label control, as shown in [Figure
    2–12](#Chapter02.html#fig_2_12).


    ![images](images/0212.jpg)


    **Figure 2–12.** *Interface Builder canvas*


    **NOTE:** To match the setup shown in [Figure 2–12](#Chapter02.html#fig_2_12),
    make sure that the standard editor view is shown, along with the Object Library
    utility and Project Navigator. Both of these can be displayed by selecting them
    from the View menu within Xcode.


    You may have noticed that the Library pane can show different library types. You
    can expand and collapse the sections using the arrow icons. This allows you to
    navigate the many controls available in the library. For this example, we''re
    using the `UILabel` control, which is toward the top.


    [Figure 2–13](#Chapter02.html#fig_2_13) shows the Object Library pane. From here,
    you can drag the label control to the view canvas and drop it into the position
    you wish.


    It will show the default text of the label, which is the value we will change
    to display the "Hello, World" text.


    ![images](images/0213.jpg)


    **Figure 2–13.** *Object Library*


    Before we finish, let''s change the label''s name to something we can reference
    within our code. Select the Identity tab, and in the Label box, change the label
    name to `lbl`, as shown in [Figure 2–14](#Chapter02.html#fig_2_14).


    ![images](images/0214.jpg)


    **Figure 2–14.** *Label name set to `lbl`*'
