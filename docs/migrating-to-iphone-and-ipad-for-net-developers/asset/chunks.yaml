    We could carry on as in the previous example, and use standard Objective-C object
    types like `NSString`. This would have the advantage of being written to a plist
    file, but would incur complexity in how we interpret the file. Instead, we''ll
    use a custom object that inherits from `NSObject` to store the actual high-score
    entries.


    To build on our Objective-C foundation, let''s create a class that holds an individual
    high-score entry with properties that reference its values. This will then be
    contained within an `NSMutableArray`, which we will use to write the storage of
    our local high score to the local device using SQL Server. However, this does
    present a problem when trying to serialize the object to a plist file, as the
    `writeToFile` method doesn''t support serializing custom objects. In our example,
    we''ll look at how to solve this problem.


    First, let''s create our high-score entry class, called `HighScoreEntry`. [Listing
    7-1](#Chapter07.html#list_7_1) shows the code for the header file.


    **Listing 7-1.** *HighScoreEntry Class Header*


    `// HighScoreEntry class`

    `//`

    `@interface HighScoreEntry : NSObject {`

    `    NSString * name;`

    `    int score;`

    `}`

    `-(id)initWithParameters:(NSString*)aName:(int)Score;`

    `@property (readwrite, retain) NSString* name;`

    `@property (readwrite) int score;`


    `@end`


    **NOTE:** Remember that the `readwrite` attribute of a property means you can
    both access the property''s value and set the property''s value. Additionally,
    `retain` ensures that a strong reference is created, meaning as a resource, it
    will not be released until you explicitly release it.


    This is pretty straightforward, and with the material we''ve covered, it should
    be familiar. The code simply implements a class that contains a string and an
    integer using the class member names of `name` and `score`, respectively. We have
    two properties of the same name that will reference these class member variables,
    and we''ve implemented an initialization method that takes two parameters of type
    `NSString` and `int`, which are used to initialize the class. [Listing 7-2](#Chapter07.html#list_7_2)
    shows the source code for its implementation.


    **Listing 7–2.** *HighScoreEntry Class Implementation*


    `// HighScoreEntry class`

    `//`

    `@implementation HighScoreEntry`


    `-(id)initWithParameters:(NSString*)aName:(int)aScore`

    `{`

    `    self = [super init];`

    `    if (self)`

    `    {`

    `        name = [aName copy];`

    `        score = aScore;`

    `    }`

    `    return self;`

    `}`


    `@synthesize name;`

    `@synthesize score;`


    `@end`


    Again, this is pretty straightforward. Our implementation provides the `initWithParameters`
    method to initialize the class member variables with values passed, and, of course,
    we synthesize our two properties.


    Now let''s take a look at the actual collection. We''ll call this our `HighScore`
    class. Again, we''ll start with the source code for the header file, as shown
    in [Listing 7-3](#Chapter07.html#list_7_3).


    **Listing 7–3.** *HighScore Class Header*


    `// HighScore class`

    `//`

    `@interface HighScore : NSObject {`

    `    NSMutableArray *scores;`

    `}`

    `-(void)addHighScoreEntry:(HighScoreEntry *)score;`

    `-(void)persist;`

    `@end`


    This contains a single member variable for our scores, held in a member variable
    of the same name and using the `NSMutableArray` type to allow flexibility. We
    also declare two class methods: one that will add a high-score entry to the list
    called `addHighScoreEntry`, and the other to persist the high score to storage—in
    our case, a local database. The implementation for the class is a little more
    complex, as shown in [Listing 7-4](#Chapter07.html#list_7_4).


    **Listing 7–4.** *HighScore Class Implementation*


    `// HighScore class`

    `//`

    `@implementation HighScore`

    `-(void)addHighScoreEntry:(HighScoreEntry *)score`

    `{`

    `    if (scores == nil)`

    `        scores = [[NSMutableArray alloc] init];`


    `    [scores addObject:(score)];`

    `}`


    `-(void)persist`

    `{`

    `    // Open our database`

    `    sqlite3 *db;`

    `    int result = sqlite3_open("mydb.sqlite3", &db);`

    `    if (result == SQLITE_OK)`

    `    {`

    `        // CREATE TABLE`

    `        char *errMsg;`

    `        const char *sql = "CREATE TABLE IF NOT EXISTS HIGHSCORE (NAME TEXT, SCORE`![images](images/U002.jpg)

    `INTEGER)";`

    `        if (sqlite3_exec(db, sql, NULL, NULL, &errMsg) == SQLITE_OK)`

    `        {`

    `            // WRITE ARRAY TO TABLE`

    `            int idx = 0;`

    `            char *insert_sql = "INSERT INTO HIGHSCORE VALUES(?, ?);";`

    `            sqlite3_stmt *stmt;`

    `            while (idx < [scores count])`

    `            {`

    `                // Prepare our statement for binding`

    `                if (sqlite3_prepare_v2(db, insert_sql, -1, &stmt, nil) == SQLITE_OK)
    {`

    `                    // Get entry`

    `                    HighScoreEntry *hse = [scores objectAtIndex:(idx)];`


    `                    // Bind the name`

    `                    sqlite3_bind_text(stmt, 1, [hse.name UTF8String], -1, NULL);   //`![images](images/U002.jpg)

    `NAME`

    `                    // Bind the score`

    `                    sqlite3_bind_int(stmt, 2, hse.score);   // SCORE`

    `                    // Step and finalize the write`

    `                    sqlite3_step(stmt);`

    `                    sqlite3_finalize(stmt);`

    `                    // Next item`

    `                    idx++;`

    `                }`

    `            }`

    `            // READ FROM TABLE`

    `            sqlite3_stmt *readstmt;`

    `            const char *readSQL = "SELECT NAME, SCORE FROM HIGHSCORE ORDER BY
    SCORE";`

    `            sqlite3_prepare_v2(db, readSQL, -1, &readstmt, NULL);`

    `            while (sqlite3_step(readstmt) == SQLITE_ROW)`

    `            {`

    `                NSString *name = [[NSString alloc] initWithUTF8String:(const
    char`![images](images/U002.jpg)

    `*)sqlite3_column_text(readstmt,0)];`

    `                NSString *score = [[NSString alloc] initWithUTF8String:(const
    char`![images](images/U002.jpg)

    `*)sqlite3_column_text(readstmt,1)];`

    `                NSLog (@"NAME: %@ SCORE: %@", name, score );`


    `            }`

    `        } else NSLog(@"Failed to create table");`


    `    } else NSLog(@"Failed to open database");`

    `}`

    `@end`


    First, let''s consider the `addHighScoreEntry` method, which should be pretty
    self-explanatory. If the `scores` array is null, we create it. We then add the
    object passed to the array using its `addObject` method.


    The `persist` method, although lengthy, should again be familiar. We walked through
    the code earlier. However, I will point out some of the key differences:


    *   **Using an integer for the score**: In our table, we now use an integer type
    rather than a string to store the actual score value.

    *   **Counting array count**: When looping around the array, we use the `count`
    attribute of `NSMutableArray` to return how many objects are in the array, and
    when we reach the maximum, we exit the loop.

    *   **Extracting an object**: We extract the high-score entry object from the
    class using its index, and we can then use this to reference the object''s values
    through the properties provided—specifically, `name` and `score`.

    *   **Binding**: We bind the name as text and the score as an integer to the parameters
    in our SQL statement. This is virtually identical to our previous example, except
    we are using the `sqlite3_bind_int` method for our integer.

    *   **Moving along the array:** As we are looping through the array''s members,
    we must remember to increase the index that not only selects the next object in
    the list, but is also used when determining whether to exit the loop.'
  trans: "\n#### 创建持久化高分记录类\n\n我们的高分功能相当直接了当。它将保存五条记录，每条记录包含获得高分者的姓名和对应的分数。我们可以像之前的示例那样，使用标准的\
    \ Objective-C 对象类型（例如 `NSString`）。这样做的好处是能够写入 plist 文件，但会增加解析文件的复杂性。因此，我们将使用一个继承自\
    \ `NSObject` 的自定义对象来存储实际的高分记录。\n\n为了以 Objective-C 为基础进行构建，让我们创建一个包含单个高分记录的类，并通过属性来引用其值。随后，这个类将被包含在一个\
    \ `NSMutableArray` 中，我们将利用该数组通过 SQL Server 将本地高分数据写入本地设备。然而，当尝试将该对象序列化为 plist\
    \ 文件时，这会产生一个问题，因为 `writeToFile` 方法不支持序列化自定义对象。在本示例中，我们将探讨如何解决此问题。\n\n首先，让我们创建一个名为\
    \ `HighScoreEntry` 的高分记录类。代码清单 7-1 显示了头文件的代码。\n\n**代码清单 7-1.** *HighScoreEntry\
    \ 类头文件*\n\n```\n// HighScoreEntry class\n//\n@interface HighScoreEntry : NSObject\
    \ {\n    NSString * name;\n    int score;\n}\n-(id)initWithParameters:(NSString*)aName:(int)Score;\n\
    @property (readwrite, retain) NSString* name;\n@property (readwrite) int score;\n\
    \n@end\n```\n\n**注意：** 请记住，属性的 `readwrite` 属性意味着您既能访问该属性的值，也能设置该属性的值。此外，`retain`\
    \ 确保了强引用的创建，这意味着作为资源，它在您明确释放之前不会被释放。\n\n这段代码非常直接，根据我们已讲解过的材料，它应该是熟悉的。该代码只是实现了一个包含字符串和整数的类，类成员名称分别为\
    \ `name` 和 `score`。我们拥有两个同名的属性来引用这些类成员变量，并且实现了一个初始化方法，该方法接受两个参数（类型分别为 `NSString`\
    \ 和 `int`），用于初始化该类。代码清单 7-2 显示了其实现的源代码。\n\n**代码清单 7–2.** *HighScoreEntry 类实现*\n\
    \n```\n// HighScoreEntry class\n//\n@implementation HighScoreEntry\n\n-(id)initWithParameters:(NSString*)aName:(int)aScore\n\
    {\n    self = [super init];\n    if (self)\n    {\n        name = [aName copy];\n\
    \        score = aScore;\n    }\n    return self;\n}\n\n@synthesize name;\n@synthesize\
    \ score;\n\n@end\n```\n\n同样，这段代码非常直接。我们的实现提供了 `initWithParameters` 方法，用于使用传入的值初始化类成员变量，当然，我们还合成了这两个属性。\n\
    \n现在，让我们来看看实际的集合类。我们将其称为 `HighScore` 类。同样，我们从头文件的源代码开始，如代码清单 7-3 所示。\n\n**代码清单\
    \ 7–3.** *HighScore 类头文件*\n\n```\n// HighScore class\n//\n@interface HighScore\
    \ : NSObject {\n    NSMutableArray *scores;\n}\n-(void)addHighScoreEntry:(HighScoreEntry\
    \ *)score;\n-(void)persist;\n@end\n```\n\n该类包含一个用于存放成绩的成员变量，变量名与类名相同，并使用 `NSMutableArray`\
    \ 类型以提供灵活性。我们还声明了两个类方法：一个用于将高分记录添加到列表，名为 `addHighScoreEntry`；另一个用于将高分记录持久化保存到存储中——在本例中，是一个本地数据库。该类的实现稍微复杂一些，如代码清单\
    \ 7-4 所示。\n\n**代码清单 7–4.** *HighScore 类实现*\n\n```\n// HighScore class\n//\n@implementation\
    \ HighScore\n-(void)addHighScoreEntry:(HighScoreEntry *)score\n{\n    if (scores\
    \ == nil)\n        scores = [[NSMutableArray alloc] init];\n\n    [scores addObject:(score)];\n\
    }\n\n-(void)persist\n{\n    // Open our database\n    sqlite3 *db;\n    int result\
    \ = sqlite3_open(\"mydb.sqlite3\", &db);\n    if (result == SQLITE_OK)\n    {\n\
    \        // CREATE TABLE\n        char *errMsg;\n        const char *sql = \"\
    CREATE TABLE IF NOT EXISTS HIGHSCORE (NAME TEXT, SCORE INTEGER)\";\n        if\
    \ (sqlite3_exec(db, sql, NULL, NULL, &errMsg) == SQLITE_OK)\n        {\n     \
    \       // WRITE ARRAY TO TABLE\n            int idx = 0;\n            char *insert_sql\
    \ = \"INSERT INTO HIGHSCORE VALUES(?, ?);\";\n            sqlite3_stmt *stmt;\n\
    \            while (idx < [scores count])\n            {\n                // Prepare\
    \ our statement for binding\n                if (sqlite3_prepare_v2(db, insert_sql,\
    \ -1, &stmt, nil) == SQLITE_OK) {\n                    // Get entry\n        \
    \            HighScoreEntry *hse = [scores objectAtIndex:(idx)];\n\n         \
    \           // Bind the name\n                    sqlite3_bind_text(stmt, 1, [hse.name\
    \ UTF8String], -1, NULL);   // NAME\n                    // Bind the score\n \
    \                   sqlite3_bind_int(stmt, 2, hse.score);   // SCORE\n       \
    \             // Step and finalize the write\n                    sqlite3_step(stmt);\n\
    \                    sqlite3_finalize(stmt);\n                    // Next item\n\
    \                    idx++;\n                }\n            }\n            //\
    \ READ FROM TABLE\n            sqlite3_stmt *readstmt;\n            const char\
    \ *readSQL = \"SELECT NAME, SCORE FROM HIGHSCORE ORDER BY SCORE\";\n         \
    \   sqlite3_prepare_v2(db, readSQL, -1, &readstmt, NULL);\n            while (sqlite3_step(readstmt)\
    \ == SQLITE_ROW)\n            {\n                NSString *name = [[NSString alloc]\
    \ initWithUTF8String:(const char *)sqlite3_column_text(readstmt,0)];\n       \
    \         NSString *score = [[NSString alloc] initWithUTF8String:(const char *)sqlite3_column_text(readstmt,1)];\n\
    \                NSLog (@\"NAME: %@ SCORE: %@\", name, score );\n\n          \
    \  }\n        } else NSLog(@\"Failed to create table\");\n\n    } else NSLog(@\"\
    Failed to open database\");\n}\n@end\n```\n\n首先，我们来考虑一下 `addHighScoreEntry` 方法，它应该不言自明。如果\
    \ `scores` 数组为空，我们就创建它。然后，我们通过数组的 `addObject` 方法将传入的对象添加到数组中。\n\n`persist` 方法虽然冗长，但同样应该熟悉。我们之前已经逐行讲解过代码。不过，我还是会指出一些关键区别：\n\
    \n* **使用整型存储分数**：在我们的表中，现在使用整型而非字符串来存储实际的分值。\n* **计算数组的 count**：在循环遍历数组时，我们使用\
    \ `NSMutableArray` 的 `count` 属性来返回数组中对象的数量，当达到最大值时，我们退出循环。\n* **提取对象**：我们通过索引从类中提取高分记录对象，然后就可以利用所提供的属性（特别是\
    \ `name` 和 `score`）来引用该对象的值。\n* **绑定**：我们将姓名作为文本，分数作为整数，绑定到 SQL 语句中的参数。这与我们之前的示例几乎完全相同，只是我们改用\
    \ `sqlite3_bind_int` 方法来处理整数。\n* **数组遍历**：在循环遍历数组成员时，必须记得增加索引，该索引不仅用于选择列表中的下一个对象，还用于判断是否退出循环。\n"
- fmt: "Also notice that the same code exists to reread the data and output it to\
    \ the log file, which, in the case of Xcode 4, is the debug window. This obviously\
    \ isn’t required for the actual implementation and is left in only for testing\
    \ purposes. For clarity, here’s the code that does this:\n\n```c\n// READ FROM\
    \ TABLE\nsqlite3_stmt *readstmt;\nconst char *readSQL = \"SELECT NAME, SCORE FROM\
    \ HIGHSCORE\";\nsqlite3_prepare_v2(db, readSQL, -1, &readstmt, NULL);\nwhile (sqlite3_step(readstmt)\
    \ == SQLITE_ROW)\n{\n        NSString *name = [[NSString alloc] initWithUTF8String:(const\
    \ char\n*)sqlite3_column_text(readstmt,0)];\n        NSString *score = [[NSString\
    \ alloc] initWithUTF8String:(const char\n*)sqlite3_column_text(readstmt,1)];\n\
    NSLog (@\"NAME: %@ SCORE: %@\", name, score );\n}\n```\n\n### Testing the High-Score\
    \ Class\n\nDoesn’t our class look lovely? Well, at least it’s better than holding\
    \ a sequence of strings that you then need to interpret. Now let’s see if it works.\n\
    \nThe code in [Listing 7-5](#Chapter07.html#list_7_5) represents a test harness\
    \ to execute our high-score code and see if it works. Where you place it in your\
    \ project is pretty much up to you, but you would see something like this in the\
    \ initialization of your game—for example, to preload the default high scores\
    \ if none exist in a table.\n\n**Listing 7-5.** *Test Harness for the High-Score\
    \ Code*\n\n```c\n// Initialize our high score\nHighScore *hs = [[HighScore alloc]init];\n\
    // Create 5 default entries\nHighScoreEntry *e1 = [[HighScoreEntry alloc]initWithParameters:@\"\
    Mark\":900];\n    [hs addHighScoreEntry:(e1)];\n\nHighScoreEntry *e2 = [[HighScoreEntry\
    \ alloc]initWithParameters:@\"Rachel\":700];\n    [hs addHighScoreEntry:(e2)];\n\
    \nHighScoreEntry *e3 = [[HighScoreEntry alloc]initWithParameters:@\"Oliver\":500];\n\
    \    [hs addHighScoreEntry:(e3)];\n\nHighScoreEntry *e4 = [[HighScoreEntry alloc]initWithParameters:@\"\
    Harry\":300];\n    [hs addHighScoreEntry:(e4)];\n\nHighScoreEntry *e5 = [[HighScoreEntry\
    \ alloc]initWithParameters:@\"Tanya\":100];\n    [hs addHighScoreEntry:(e5)];\n\
    \n// Persist our initial high score to the database\n[hs persist];\n```\n\nIf\
    \ you execute the code in [Listing 7-5](#Chapter07.html#list_7_5) with the debug\
    \ code that rereads the data after persisting it, you should see debug output\
    \ similar to the following:\n\n```\n2011-08-17 19:59:37.237 DataStorage[676:207]\
    \ NAME: Mark SCORE: 900\n2011-08-17 19:59:37.237 DataStorage[676:207] NAME: Rachel\
    \ SCORE: 700\n2011-08-17 19:59:37.238 DataStorage[676:207] NAME: Oliver SCORE:\
    \ 500\n2011-08-17 19:59:37.238 DataStorage[676:207] NAME: Harry SCORE: 300\n2011-08-17\
    \ 19:59:37.239 DataStorage[676:207] NAME: Tanya SCORE: 100\n```\n\nIn your game,\
    \ you would hold the instance variable for the high scores with a class that has\
    \ suitable visibility, and you would initialize it with the default values only\
    \ if the table didn’t exist. You would also want to release the high-score class\
    \ variable at a suitable point when your application terminates.\n\nBut what about\
    \ reading the high-score data if your application isn’t being run for the first\
    \ time? This requires a few changes. First, when persisting the data, we need\
    \ to clear the table’s contents so the table is ready to receive the new data.\
    \ This is easily done by adding the following code between the table being created\
    \ (if it needs to be created) and before we start writing any content:\n\n```c\n\
    // DELETE from the table\nconst char *sqldelete = \"DELETE FROM HIGHSCORE\";\n\
    sqlite3_exec(db, sqldelete, NULL, NULL, &errMsg);\n```\n\nWe can also use the\
    \ code we wrote to read the table and dump it to the log file to help us implement\
    \ a method that reads the data from the table to initialize the high score. We’ll\
    \ call this method `readHighScores`, and its implementation is shown in [Listing\
    \ 7-6](#Chapter07.html#list_7_6).\n\n**Listing 7-6.** *Reading the High-Score\
    \ Data from the Table*\n\n```c\n#import \"MainViewController.h\"\n#import \"HighScore.h\"\
    \n\n// readHighScores method\n-(void)readHighScores\n{\n    // Open our database\n\
    \    sqlite3 *db;\n    int result = sqlite3_open(\"mydb.sqlite3\", &db);\n   \
    \ if (result == SQLITE_OK)\n    {\n        // We've opened the database, so let's\
    \ clear our array\n        [scores removeAllObjects];\n\n        // READ FROM\
    \ TABLE\n        sqlite3_stmt *readstmt;\n        const char *readSQL = \"SELECT\
    \ NAME, SCORE FROM HIGHSCORE\";\n        sqlite3_prepare_v2(db, readSQL, -1, &readstmt,\
    \ NULL);\n        while (sqlite3_step(readstmt) == SQLITE_ROW)\n        {\n  \
    \          NSString *name = [[NSString alloc] initWithUTF8String:(const char\n\
    \ *)sqlite3_column_text(readstmt,0)];\n            int score = (const int)sqlite3_column_int(readstmt,1);\n\
    \            HighScoreEntry *e = [[HighScoreEntry alloc]initWithParameters:name:score];\n\
    \            [self addHighScoreEntry:(e)];\n            [e release];\n       \
    \ }\n    } else NSLog(@\"Failed to open database\");\n}\n```\n\nThis should be\
    \ pretty easy to follow, as it uses a lot of the code we’ve used previously. We\
    \ use a `SELECT` statement to read the data from the table and cycle through the\
    \ data while rows of data still exist. In doing so, we then extract the data—in\
    \ this case, the name as text (converting to UTF-8 to comply with the `NSString`\
    \ class) and the score as an integer. We then use these as parameters in creating\
    \ a `HighScoreEntry` class instance, which is added to our high-scores array and\
    \ then released.\n\n### Completing the Class\n\nAlmost complete, our class can\
    \ now be initialized with a default high-score table. We can persist this to a\
    \ local database on our iOS mobile device using SQLite, and we can reread this\
    \ data back into our high-score display. The presentation of this high score is\
    \ left to you, but you might consider using a Table view, something we’ll touch\
    \ on in [Chapter 10](#Chapter10.html#ch10), as we’ll be looking at impressive\
    \ user interface transformations there.\n\nAt the moment, there is nothing to\
    \ limit your number of high-score entries. This is by design, as you can decide\
    \ what a suitable limit is and use the knowledge gained so far to create a method\
    \ that implements that constraint when it adds a high-score entry. Also, you will\
    \ want to sort your high scores, typically in order of score, with the highest\
    \ first, assuming a bigger score is better.\n\nAs this chapter’s focus is on persistence,\
    \ not sorting arrays, we won’t go over the complete implementation. But to help\
    \ you get started, I will provide some pointers on how to approach sorting.\n\n\
    First, to sort an `NSMutableArray` that contains custom objects (that is, a class\
    \ that inherits from `NSObject`), you use the `sortArrayUsingSelector` method,\
    \ which performs the sort, but asks that you provide as a parameter the method\
    \ to use as the comparator, called the *selector*.\n\nNext, you to need to implement\
    \ your own comparator that can make sense of the objects in your array. In our\
    \ case, we would compare the `score` member variable and sort with the highest\
    \ first. The beginning of such a method is shown here for you to experiment with\
    \ and complete.\n\n```c\n(NSComparisonResult)compare(HighScoreEntry* otherObject\n\
    {\n  return ( // DO YOUR COMPARISON HERE between self and otherObject)\n}\n```"
