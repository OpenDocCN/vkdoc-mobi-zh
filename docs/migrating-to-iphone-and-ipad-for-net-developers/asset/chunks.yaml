- fmt: '# About the Author


    ![image](images/mark_mamone.jpg) `Mark Mamone` is Global Head of Professional
    Services for Local Government & Commercial at Serco. He has 23 years of IT experience
    and has been involved with Microsoft .NET since its beta, Mono since its inception,
    and Objective-C and iPhone development since launch. A Certified Enterprise Architect
    and experienced chief technology officer, Mark has authored and coauthored several
    books on topics that include Linux, .NET, Mono, and databases.


    # About the Technical Reviewer


    ![image](images/john_allen.jpg) `John Allen` is a Senior Manager and Enterprise
    Architect with BAE Systems Detica. He has over 15 years experience in the design
    and development of large-scale enterprise systems and is an expert in the field
    of software engineering and modern delivery methodologies. John has been involved
    in a number of open source projects and IT startups and continues to program for
    fun and profit, with his current focus being mobile applications, big data, and
    real-time analytics.


    # Introduction


    Ever since I spotted and started reading my first computer book in 1981, I knew
    Information Technology (IT) was going to be an important part of my life. I feel
    privileged to have been able to make a career out of something I enjoy, and the
    fact that it changes on what seems to be a monthly basis means it never gets boring.
    It still astounds me that mobile telephones have come so far in such a short time;
    and when the iPhone was launched, I knew the role of smartphones would be pivotal
    in all that we do—both in our private and our corporate lives. They are not only
    useful tools for managing your contacts or calendar, they are now a mechanism
    for doing all sorts of things such as buying a cinema ticket, keeping in touch
    with your friends through social media, and playing games.


    However, why should those who don''t know Objective-C or Xcode not be able to
    take advantage of such a wonderful world, especially if you have come to know
    and love Microsoft''s .NET and C# but don''t want to be exclusive to Microsoft
    Mobile–based smartphones? It doesn''t have to be that way—a plethora of options
    exist, including using this book to understand the similarities and differences
    between C# and Objective-C, Visual Studio and Xcode 4, and the .NET Framework
    and the iOS SDK, and also how to exploit third-party options such as Mono and
    MonoTouch.


    This book has been created to do just that. It provides you with all the information
    you need to make that transition, leaving you empowered and capable of using your
    experience to create world-class iOS-based applications. I even take you through
    the process of publishing your application to Apple''s App Store.


    I hope you enjoy this book and the opportunities it may afford you. Thank you
    for reading it.


    # Chapter 1


    ## Get Set Up: Tools and Development on Apple’s Platforms and Technologies


    In 2007, during a keynote speech at Macworld Expo, Steve Jobs (CEO of Apple) announced
    both a change of name to the organization (from Apple Computers, Inc., to just
    Apple, Inc.) and a change of product emphasis, moving from a focus on personal
    computers to an emphasis on mobile electronic devices. During the same announcement,
    Steve Jobs introduced two new devices: the iPhone and the Apple TV. The former
    has changed the face of the mobile landscape and consumer experience for mobile
    devices forever. Apple has gone on to launch its fifth generation iPhone and repeat
    its success with the introduction of its second-generation tablet, selling millions
    of devices and creating billions of dollars of revenue.


    Apple''s success can be attributed to the quality of the devices, the “coolness”
    associated with owning them, and the intuitive interface. But much more significantly
    than those factors is the introduction of the App Store in 2008, and the subsequent
    and growing availability of cheap (often free) fun and productive applications,
    which has skyrocketed Apple into a world leader in the mobile marketplace. Apple
    announced in July 2011 that the App Store now has almost half a million applications
    downloaded billions of times, and more important, anyone can write and submit
    applications for sale and distribution. So, **you** could make the next best-selling
    mobile application that everyone is playing, such as Angry Birds!


    So, what''s stopping you? Nothing, provided that you''re familiar with development
    tool sets such as Apple''s Xcode and its default programming language, Objective-C.
    For .NET developers and others, this has sometimes been a barrier for entry. After
    all, while everyone likes to learn something new, it doesn''t mean you won''t
    want to reuse that experience to get up and running more quickly.


    In this book, you will learn how to transfer your skills from .NET to the Apple
    development framework, using both the tools provided and the comprehensive iOS
    SDK library. You also will learn about some of the third-party tools that leverage
    .NET and other non-Apple technology that might be more familiar and thus more
    comfortable to use. These third-party tools were introduced into the market to
    provide alternatives to the Apple-only tool set. Although using these tools is
    not the focus of this book, I''ll introduce some of the key third-party tools,
    providing you with an overview on how to get up and running with them.


    This chapter provides key information about the Apple development framework, as
    well as some of the alternative options. The following topics are covered:


    - A description of how to register as an Apple Developer and why you would want
    to do that

    - An overview of the Application development models

    - An introduction to Apple''s mobile operating system (iOS) and development tools

    - A tour of third-party options, including the Mono family, DragonFire SDK, Titanium
    Mobile, Marmalade SDK, and Flash Professional CS5

    - An introduction to the App Store and how to sell your new application'
