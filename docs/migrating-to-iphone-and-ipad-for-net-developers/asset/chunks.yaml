    ## 第 10 章


    ## 拓展技能：高级特性


    在本章中，你将了解 SDK 和相关苹果工具提供的一些更高级的特性。这些特性建立在你目前已获得的经验之上，但着眼于特定设备的能力，以及在某些情况下，如何用一个代码库针对多款
    iOS 设备。你还将展望 iOS 开发技术的未来。


    具体来说，本章你将学习以下内容：


    *   使用设备的全球定位系统（GPS）

    *   利用设备的相机

    *   使用加速计

    *   检测手势

    *   编写多设备兼容代码

    *   iOS 开发的前沿趋势


    ### 使用全球定位系统


    你的 iOS 设备如果配备了全球定位系统（GPS），便能够确定其在地球上任何位置。还有其他方法可用于确定位置，但 GPS 是目前最精确的。iOS SDK 提供了多种基于位置的服务，并在底层决定使用哪种机制。这意味着你无需关心不同的技术；你只需声明一些特性（例如期望的精度），设备会尽力而为。


