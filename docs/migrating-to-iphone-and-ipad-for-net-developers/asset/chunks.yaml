- fmt: '### Installing Marmalade


    To start, you will need to register at the Marmalade SDK web site (`http://www.madewithmarmalade.com/downloads`).
    Once registration is complete, you will be sent an activation email message. After
    you''ve activated your account, you''ll be able to download an evaluation copy
    of the software to try out. (Of course, you could purchase a copy, but I''m assuming
    you want to try it out first.) The evaluation version allows you to do everything
    apart from publicly distribute the applications you have written.


    After you''ve downloaded the package, start the installation by selecting the
    icon. You will be presented with the installer, as shown in [Figure 3–16](#Chapter03.html#fig_3_16).


    ![images](images/0316.jpg)


    **Figure 3–16.** *Marmalade installer*


    Follow the on-screen instructions, including entering your Marmalade account credentials
    in order to install under the 30-day evaluation license, which you obtained previously
    on the web site.


    The default installation location is `/Developer/Marmalade-SDK/<`*`version`*`>`,
    where <*`version`*> is the version of the SDK you installed. After installation,
    you won''t see any new icons, but you will find new files installed in the target
    location. The following are the key folders installed:


    * **`\Applications`**: This folder contains the SDK''s top-level applications.

    * **`\docs`**: This folder contains documentation, including user manuals.

    * **`\examples`**: This folder contains example applications.

    * **`\extensions`**: This folder contains the Extensions Development Kit.

    * **`\Marmalade`**: This folder contains additional tools used by Marmalade.

    * **`\s3e`**: This folder contains the Marmalade System header files and runtime
    libraries.

    * **`\modules`**: This folder contains all Marmalade Studio header files and runtime
    libraries.


    ### Creating Hello, World Using Marmalade


    Now that you''ve installed Marmalade, and perhaps had a look around its folders
    and the files, let''s create our application.


    Start by firing up Xcode (we could, of course, use the command line, but IDEs
    were invented to make our lives easier, so let''s use them). We will use one of
    the examples provided, as they supply all the configuration necessary for Xcode
    4 to deploy to the Marmalade simulator. This simulator is the tool used to debug
    native Marmalade executable files (with an `.s3e` extension).


    The `.s3e` files are essentially dynamic-link libraries that are platform-agnostic.
    The Marmalade SDK allows you to build the same application for a number of different
    platforms, simply by reconfiguring the IDE. For the moment, we''ll stick with
    deploying it to the Marmalade simulator, as we''re just interested in how you
    might get started with such a feature.


    Using the Finder application, locate the Hello, World example, which is under
    `\examples\s3e\s3eHelloWord`. In this folder, you will see the `s3dHelloWorld.mkb`
    file, which is essentially the project file. Open it by choosing `Open With` from
    the menu and selecting the `Mkb` application provided within the Marmalade SDK
    (in the `\Applications` folder), as shown in [Figure 3–17](#Chapter03.html#fig_3_17).


    ![images](images/0317.jpg)


    **Figure 3–17.** *Opening a Marmalade SDK project using Mkb*


    This will launch Xcode, from which can choose the Debug Simulator option scheme
    from the top of the window, and then choose Build. Next, choose Run. This executes
    the application within the simulator, displaying our “Hello, World” text, as shown
    in [Figure 3–18](#Chapter03.html#fig_3_18). From here, you can use the Marmalade
    SDK to target different platforms, including the iOS, to develop your apps.


    ![images](images/0318.jpg)


    **Figure 3–18.** *Marmalade simulator running our application*


    ## Summary


    This chapter built on the knowledge you have gained about using native tools in
    previous chapters by looking at the available third-party options. One of the
    most popular alternatives is Mono and MonoTouch, providing a .NET implementation
    of the Cocoa and Cocoa Touch APIs, but in the .NET language. This option provides
    you free and native-feeling access to iPhone and iPad development resources, complete
    with a Visual Studio-like IDE in the form of MonoDevelop.


    As you learned, MonoTouch is not the only option, provided that you''re happy
    to use languages other than .NET, such as JavaScript or C/C++. Other options available
    to you include Titanium Mobile and the Marmalade SDK. Each of these options allows
    you to write native applications, not only for the iPhone and iPad, but also for
    other devices. In fact, these platforms are built specifically to target cross-platform
    development, allowing you to develop against a single API but build applications
    that can target numerous mobile devices with different operating systems, including
    Apple, Android, and Symbian.


    As useful as these third-party options are, apart from MonoTouch, the lack of
    support for the .NET language makes it more difficult to make the transition and
    reuse your experience. Clearly, the use of MonoTouch makes this far easier, but
    you will be dependent on the support MonoTouch has for the iOS and Cocoa Touch
    SDKs. If support is not provided, or features are incomplete, you will not be
    able to use this option—unless you write your own implementation!


    So, apart from contributing toward the Mono project yourself, the other option
    is to map your C# and .NET Framework knowledge onto the iOS SDK and use Objective-C.
    The rest of the book will focus on doing just that and bridging the gap in your
    knowledge.


    ## Chapter 4


    ## Going Deeper: .NET, Objective-C, and the iOS SDK


    Understanding the capabilities of Apple''s mobile devices, the features of the
    iOS operating system, and the different options available to you for application
    development is only part of the story. Creating the Hello, World application using
    both native Apple development tools and numerous third-party options was cool,
    and the submission of it to Apple''s App Store is possible, but it''s not going
    to earn you million of dollars. It is very unlikely to attract good reviews, or
    even any downloads!


    Now we need to look at how to create a more compelling application—one that will
    be the next “must-have” mobile app that *will* help you make some money. To do
    this, we need to explore the runtime frameworks in more detail, and the supporting
    design-time frameworks in even more detail. This will help you to create a rich
    user experience within your application.


    We''ll take the existing knowledge you have in .NET and apply that to Apple''s
    own native tooling and SDKs. This will not only allow you to create the applications
    you desire, but will also give you a great head start in exploiting Apple''s devices
    to full effect. The goal is to make the transition from .NET to Apple''s native
    development environment much easier and faster.


    In this chapter, we will take a more detailed look at the iOS SDK when compared
    with .NET''s capabilities and the different languages supported. Specifically,
    we''ll cover the following topics:


    * Compare the relative capabilities of Apple''s mobile devices

    * Take a look under the hood of an application, reviewing its structure and life
    cycle

    * Consider how you should approach designing an application and what Apple has
    done to help

    * Compare the iOS SDK and the .NET Framework, both in approach and implementation

    * Compare the development tools to support application development

    * Review an Objective-C and Xcode 4 primer


    We will start by building on the introductions given so far, and take a more detailed
    look at iOS and the iOS SDK side by side with the .NET Framework and programming
    model.'
