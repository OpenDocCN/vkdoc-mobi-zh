  trans: '

    ### 应用类型及其关联的视图控制器


    到目前为止，本书介绍了视图和视图控制器的概念，甚至还提出了一种应用如何拥有多个视图，这些视图会根据用户界面以编程方式显示。我对*应用类型*进行了区分：即某些表现出特定行为并以特定方式使用视图控制器的应用。请考虑以下应用类型：


    - 实用工具应用

    - 标签栏应用

    - 导航应用


    在此上下文中，我将月球着陆器归类为实用工具应用。该游戏主要在一个单一视图上进行，并且还会显示一个配置或启动屏幕。然而，这是最简单的用户界面。它还以模态方式显示视图控制器，因为应用的设计在主游戏进行或终止时，仅将主游戏屏幕显示为唯一可用的屏幕。模态显示视图通常是为了中断应用的流程，并强制其在流程继续之前返回。另一个典型示例是在继续之前获取所需的关键信息。另一种方式则不中断流程，视图通过标签栏等控件进行协调。


    正如你所见，用户与你的应用进行交互的方式有很多创新且通常很复杂，这些交互通常通过手势来控制。要在本书的篇幅限制内，为你介绍所有不同应用类型及其相关视图控制器的工作示例是不可能的。你可以通过
    Apple 指南（例如[`http://developer.apple.com/library/ios/#featuredarticles/ViewControllerPGforiPhoneOS`](http://developer.apple.com/library/ios/#featuredarticles/ViewControllerPGforiPhoneOS)）或全面的
    iOS 开发书籍独立探索多种方案。在此，我们将专注于一些与.NET 有对应关系的特定、有用的替代方案，并学习如何使用它们。


    在深入探讨标签栏示例之前，让我们先来看看不同的应用类型及其关联的视图控制器。


    ### 基于实用工具的应用


    在基于实用工具的应用中，用户的交互围绕单个视图展开。可能存在其他视图，但它们通常仅限于支持应用的配置。一个很好的例子是股票应用，如图 6-9 所示，调用时会显示你选择的股票（或默认股票）及其表现。指南针和计算器应用也是很好的例子。


    ![images](img/0609.jpg)


    **图 6-9.** *iPhone 股票应用是一个基于实用工具的应用示例。*


    并没有特定的视图控制器类来管理这种应用；相反，你会以编程方式模态地呈现视图。这正是你在月球着陆器应用中所做的。在.NET 中，实用工具应用可能是基于控制台的应用，或是具有单个窗口并使用模态对话框来检索关键信息的
    Windows 窗体应用。


    ### 基于标签栏的应用


    标签栏应用是一种支持多个视图的应用，其上下文根据用户交互选择，通常以标签形式显示。一个很好的例子是时钟应用，如图 6-10 所示，它拥有多个视图，通过屏幕底部的标签栏访问。选择一个标签通常会改变活动的视图控制器；一个新的对应视图变为活动状态，从而显示新屏幕。


    ![images](img/0610.jpg)


    **图 6-10.** *iPhone 时钟应用是一个多视图标签栏应用。*


    值得强调的是，有一个常见的混淆点。工具栏看起来与标签栏非常相似，两者都是用于显示可点按图标水平条。关键区别在于，工具栏可以包含按钮和其他控件，但这些控件的选择并非互斥的。用户可以点击多个，它们不会像二元开关那样工作——相反，它们只是触发一个供你捕获和处理的事件。反之，由于标签栏的选择决定了视图，因此标签是互斥的。


    标签栏应用通常使用由`UITabBarController`类提供的标签栏视图控制器来实现。该类直接使用，而不进行子类化；你将以此作为更详细示例的核心。在.NET
    中，标签栏是为数不多的在 Windows 窗体中具有可直接比较的.NET 控件（`TabControl`，位于`System.Windows.Forms.TabControl`命名空间）的视图控制器类型之一。


    另外值得一提的是，标签栏通常与表格类型的视图结合使用，而表格视图控制器（通过`UITableViewController`类实现）正是为此设计的。它提供了在实现表格时所需的预期行为支持，例如编辑数据行或管理单元格、行和列的选择。


    ### 基于导航的应用


    基于导航的应用通常用于呈现一系列具有自然层次结构的视图。例如，考虑邮件应用，如图 6-11 所示，每个用户交互都建立在前一个交互之上，允许你深入你的邮件账户，然后是收件箱，然后是电子邮件，最后是特定的邮件。每一步都由一个视图表示，你可以通过选择返回按钮反向退出层次结构。


    ![images](img/0611.jpg)


    **图 6-11.** *邮件应用是一个层次化的、多视图基于导航的应用。*


    导航控制器的功能包含在`UINavigationController`接口中。这与前面提到的`UITabBarController`接口非常相似，关键区别在于导航控制器通过实现视图栈来工作。例如，想象拿起一堆书，将它们一本本叠放在一起——你构建了一个书堆，完成后，从书堆中最容易拿出的书就是你最后放上去的那本。然后你可以揭开书堆，最后拿到你最初放下的那本书。这被称为*后进先出*（LIFO）。

    '
- fmt: '### Implementing a Tab Bar–Based Application


    If you cast your mind back to previous chapters, you saw the feature that Xcode
    provided for project templates, something you''ll find very familiar if you''ve
    used Visual Studio. Usefully, Xcode provides just such a template for tab bar–based
    applications, so let''s deviate from the Lunar Lander application for the moment
    and use this template to create another sample application to illustrate the features
    of a tab bar view controller. Begin by starting Xcode, and follow the procedure
    to create a new template, this time selecting the Tab Bar template as shown in
    [Figure 6–12](#Chapter06.html#fig_6_12).


    ![images](images/0612.jpg)


    **Figure 6–12.** *New tab bar application*


    Click Next, and provide your application with a name. I''ve used `TabBarExample`—not
    very imaginative, I know! In order for you to understand what Xcode has constructed,
    let''s look at the application when it''s running in the simulator straight out
    of the box. It''s also worth reiterating at this point that the .NET platform
    doesn''t have a concept of a view controller or, specifically, a tab bar view
    controller; but it does have the individual controls that, when combined with
    your own MVC Pattern implementation, can easily be used to replicate the same
    functionality. You compare the controls provided in the user interface libraries
    of the iOS SDK and .NET a little later in the chapter.


    First, consider the screens captured from the simulator, in [Figure 6–13](#Chapter06.html#fig_6_13),
    showing the two views displayed when you select the tabs provided in the default
    project implementation.


    ![images](images/0613.jpg)


    **Figure 6–13.** *Default tab bar application running*


    Let''s look at the implementation that results from having created the default
    application complete with its view/controller switching functionality. Use the
    project navigator (![images](images/U007.jpg)1) to view the project''s structure;
    you see something similar to [Figure 6–14](#Chapter06.html#fig_6_14) when each
    of the three folders (`TabBarExample`, `Frameworks`, and `Products`) is expanded.


    ![images](images/0614.jpg)


    **Figure 6–14.** *Tab bar default project structure*


    Let''s start with the easy bits. `Products` is a single application binary called
    `TabBarExample.app`, which uses the `UIKit`, `Foundation`, and `CoreGraphics`
    frameworks. In Microsoft .NET, as explained in [Chapter 4](#Chapter04.html#ch4),
    these are equivalent to libraries of functionality that provide objects and their
    attributes and methods, all in their representative namespaces.


    Working down the list, let''s look at the Application Delegate implementation.
    If you look in both the header and implementation files, they''re very similar
    to those you''ve seen before but with a few key differences. Consider the `TabBarExampleAppDelegate.h`
    file in [Listing 6-1](#Chapter06.html#list_6_1).


    **Listing 6-1.** *`TabBarExampleAppDelegate.h`*


    ```

    #import <UIKit/UIKit.h>


    @interface TabBarExampleAppDelegate : NSObject <UIApplicationDelegate,

    UITabBarControllerDelegate> {


    }


    @property (nonatomic, retain) IBOutlet UIWindow *window;


    @property (nonatomic, retain) IBOutlet UITabBarController *tabBarController;


    @end

    ```


    The key things to notice are that it inherits from `NSObject` like previous examples,
    but it implements not only the `UIApplicationDelegate` protocol but also the `UITabControllerDelegate`
    protocol. Among the options available with this protocol''s methods, for example,
    is the capability to perform post-tab selection actions. You see that it also
    creates a property pointing to a `UITabBarController` class, which is the instance
    reference to your tab controller object that is used by the application. Remember
    that the `UITabController` class isn''t subclassed; you use the class as it is.


    I won''t go into the details of the `TabBarExampleAppDelegate.m` file, but it
    is worth noticing that the `rootViewController` for the window is set to the `tabBarController`
    property as the main view controller to use. This is shown in the following code:


    ```

    self.window.rootViewController = self.tabBarController

    ```


    So far, so good. If you turn your attention to the `MainWindow.xib` file and double-tap
    it, it loads in the Interface Builder. Choose the Tab Bar controller view, and
    you see a screen like the one shown in [Figure 6–15](#Chapter06.html#fig_6_15)
    in Interface-Builder.


    ![images](images/0615.jpg)


    **Figure 6–15.** *The Tab Bar MainWindow view open in Interface Builder*


    In this case, I''ve clicked the Second button on the tab bar, and you can see
    that Interface Builder is indicating that `SecondView` is loaded. If you click
    the first tab bar button, it predictably says that `FirstView` is loaded. This
    control is indicated in the tab bar properties, which you can display using the
    Attributes Inspector (![images](images/U006.jpg)![images](images/U007.jpg)4),
    something like that shown in [Figure 6–16](#Chapter06.html#fig_6_16).


    ![images](images/0616.jpg)


    **Figure 6–16.** *Attributes Inspector for a tab bar control*


    Notice the correlation between the tab bar button and the view it selects. This
    is indicated by the `NIB Name` property, which points to the NIB file that contains
    the view to load—in this instance, the first tab bar button displays the view
    from the `FirstView.xib` file. If you locate this file in the project and select
    it, you see a familiar view, shown in [Figure 6–17](#Chapter06.html#fig_6_17).


    ![images](images/0617.jpg)


    **Figure 6–17.** *FirstView associated with the first tab bar button*


    Each of the views associated with each tab creates a class and its associated
    files, both the header and implementation files. Each view (`FirstView` and `SecondView`)
    provides you with the opportunity to complete custom view-controller code; you
    can build on the default behavior and implementation, which are pretty vanilla,
    doing very little other than the typical method implementations you''ve seen.
    For example, they return `YES` or `NO` depending on whether the orientation is
    supported (in this case by default only if it''s portrait).


    However, this demonstrates the ability to have different tab bar items associated
    with different views and view controllers, and exercise flexibility about how
    the tab bar items look and behave. For example, you can modify tab bar items by
    removing the text and adding a logo to the project and to the tab bar item. [Figure
    6–18](#Chapter06.html#fig_6_18) shows an example using the Attribute Inspector
    for the tab bar item selected.


    ![images](images/0618.jpg)


    **Figure 6–18.** *Adding a logo using the tab bar item Attribute Inspector*


    If you were to apply this to your game, you could use this mechanism to have a
    tab for the main game view displaying the actual game, along with a tab for the
    view used to display the high score. You won''t pursue this for your Lunar Lander
    game because it typically uses modal views until each game session is finished—but
    you could. You should also now see the correlation between views and their associated
    view controllers, allowing you to customize these or add additional ones as suits
    your application''s design.


    Another useful technique is to use one tab to provide a means of displaying different
    perspectives of the same data. So your application may present a list of audio
    files on your device, with tabs relating to views from different perspectives:
    a tab for albums, a tab for genres, a tab for track names, and so on.'
