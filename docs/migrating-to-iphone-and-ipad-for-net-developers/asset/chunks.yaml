    *   **ActiveX Data Objects for .NET (ADO.NET)**: Provides support for accessing
    data and data services, such as native database libraries, or abstracted drivers,
    such as ODBC.

    *   **Windows Forms and WPF**: in the context of application services, WPF provides
    similar user-interface capabilities to those in the iOSUIKit framework, as well
    as multimedia and audio capabilities, along with 3D and animation support.

    *   **Language Integrated Query (LINQ)**: New to .NET Framework 3.5, LINQ provides
    native data-querying capabilities.


    In the iOS SDK, such services (and others) are encapsulated within the Media and
    Core Services layers. Let''s take a look at the key frameworks provided within
    these layers to map onto the capabilities we''ve touched upon in the .NET Framework
    Class Library.


    ##### Media Layer


    The Media layer contains the graphics, audio, and video technologies that support
    you in building applications that look and sound great. It contains the following
    frameworks:


    *   **AV Foundation (`AVFoundation.framework`)**: A comprehensive set of APIs
    that support playing, recording, and managing audio content in iOS. In iOS 4.0,
    this includes movie-editing support and precision controls for playback.

    *   **Core Graphics (`CoreGraphics.framework`)**: Supplies support for 2D graphics
    by providing a vector-based drawing engine.

    *   **Core Text (`CoreText.framework`)**: Provides a comprehensive and performant
    set of APIs for laying out text and using fonts.

    *   **Image I/O (`ImageIO.framework`)**: Supports importing and exporting image
    data and its associated metadata.

    *   **Media Player (`MediaPlayer.framework`)**: Allows you to embed support to
    play audio and video content from within your application. This includes support
    for accessing the iTunes library and for coping with resizable video.

    *   **OpenAL and OpenGL ES (`OpenAL.framework` and `OpenGLES.framework`)**: Cross-platform
    frameworks included within iOS to provide close-to-hardware, high-performance
    audio and video functionality.'
  trans: '

    #### 用户界面服务


    基于 Web 2.0 的应用程序的爆发式增长显著提升了用户对应用性能的期望。原生应用与基于 Web 的应用之间的能力差距已大幅缩小，移动应用领域亦是如此。早期移动应用（包括当时的新协议，如无线访问协议
    `WAP`）带来的用户体验，与当今某些移动设备所展现的直观、交互式、高清能力相比，已截然不同——这些设备将原生功能与基于互联网的 Web 乃至云服务融合在了一起。


    这很大程度上要归功于物理硬件性能的提升，如今处理器速度更快、内存更大，且支持触控输入的高分辨率屏幕。然而，软件才是此类功能的核心，而软件的组织与使用方式则是关键差异所在。


    `.NET` 通过提供以下运行时服务来支持用户界面的设计与实现，这些服务将功能暴露给开发者：


    -   **WPF**：提供了一整套用于创建高度可视化用户界面的 API。它是在 Windows Forms 之后引入的，旨在为 2D/3D 图形、视频和音频等额外领域提供支持。

    -   **Windows Forms**：这是封装了 Microsoft Windows 原生 Windows API 的 API 名称。处理更高级的方面（如
    2D/3D 图形）则需要其他 API。

    -   **ASP.NET**：包括 `ASP.NET`、`ASP.NET MVC`、`ASP.NET` 和 Ajax。这是微软的 Active Server
    Pages（`ASP`）技术，允许你使用服务器端编程来开发网站。


    我们将 `ASP.NET` 排除在比较之外，因为这是微软用于交付基于 Web 应用的 `ASP` 技术，而我们的重点在于原生应用。因此，剩下的比较对象是 `WPF`
    和 Windows Forms。鉴于 `WPF` 实际上已取代 Windows Forms，我们本可以轻松地将 Windows Forms 也排除在外，但考虑到其流行度以及
    `WPF` 相对较晚才引入，我们将在比较中涵盖两者。


    `WPF` 是 `.NET Framework` 类型的一个子集，这些类型大部分位于 `System.Windows` 命名空间中，这与 Windows Forms
    类似。但你会注意到，要在 Windows Forms 中实现更高级的图形应用，你需要跳出此 API，转而使用 Windows Media Player 和图形显示接口（`GDI+`）等组件。


    基于 `WPF` 至少可以部分视为 Windows Forms 容器这一假设，与之最为接近的比较对象，就 `WPF` 和 Windows Forms 而言，是
    Cocoa 和 Cocoa Touch。我们先从 Cocoa Touch 开始，它包含以下框架：


    -   **UIKit（`UIKit.framework`）**：提供了实现图形化、事件驱动型应用所必需的能力。

    -   **Message UI（`MessageUI.framework`）**：提供编写和排队发送电子邮件消息的支持。在 `iOS 4.0` 中，这扩展到了包括短信服务（`SMS`）支持。

    -   **Map Kit（`MapKit.framework`）**：提供对可滚动地图界面的支持，该界面可集成到你的应用中。

    -   **iAd（`iAd.framework`）**：提供在应用内展示横幅广告的支持。

    -   **Game Kit（`GameKit.framework`）**：提供对点对点网络能力的支持。它允许你创建复杂的多人网络游戏。

    -   **Event Kit（`EventKitUI.framework`）**：提供查看和编辑基于日历的事件的支持。

    -   **Address Book UI（`AddressBookUI.framework`）**：提供查看、编辑和创建新联系人的支持。


    #### 应用服务


    当今的应用不仅需要更直观、更具交互性的用户界面，而且通常对它们提供的特性和功能有更高的要求。应用在设备上孤立运行、与外界隔离，或者应用的交互特性仅基于文本和简单图形的时代早已一去不复返。


    如今的应用需要视频、音乐、高清图形、多任务形式的并行处理，以及仅在几年前还闻所未闻的速度和响应性——而这还是在 *移动* 设备上！此类功能部分是通过 iOS
    内提供的应用服务暴露出来的，这些服务包括以下特性：


    -   多媒体能力

    -   数据的存储与管理

    -   网络与通信访问

    -   工作流与通信

    -   访问设备特定功能，如 GPS


    在 `.NET` 中，此类功能通过 `.NET Framework 类库` 提供。其中包括我们在讨论 `.NET` 的用户界面能力时已经提到的一些类库。以下特性支持应用服务：


    -   **Windows Communication Foundation（`WCF`）**：提供对面向服务应用的支持，这些应用通过网络连接进行协作。

    -   **用于 .NET 的 ActiveX 数据对象（`ADO.NET`）**：提供对访问数据及数据服务的支持，例如原生数据库库或抽象驱动程序（如 `ODBC`）。

    -   **Windows Forms 和 `WPF`**：在应用服务的上下文中，`WPF` 提供了与 `iOSUIKit` 框架类似的用户界面能力，以及多媒体和音频能力，外加
    3D 和动画支持。

    -   **语言集成查询（`LINQ`）**：`LINQ` 是 `.NET Framework 3.5` 的新增内容，提供了原生的数据查询能力。


    在 iOS SDK 中，此类服务（及其他服务）被封装在媒体层和核心服务层中。让我们看看这些层提供的关键框架，以便映射到我们在 `.NET Framework
    类库` 中提及的能力。


    ##### 媒体层


    媒体层包含图形、音频和视频技术，支持你构建外观精美、音效出色的应用。它包含以下框架：


    -   **AV Foundation（`AVFoundation.framework`）**：一套全面的 API，支持在 iOS 中播放、录制和管理音频内容。在
    `iOS 4.0` 中，这包括电影编辑支持和播放的精确控制。

    -   **Core Graphics（`CoreGraphics.framework`）**：通过提供基于矢量的绘制引擎来支持 2D 图形。

    -   **Core Text（`CoreText.framework`）**：提供一套功能全面、性能卓越的 API，用于排版文本和使用字体。

    -   **Image I/O（`ImageIO.framework`）**：支持导入和导出图像数据及其相关的元数据。

    -   **Media Player（`MediaPlayer.framework`）**：允许你在应用内嵌入播放音频和视频内容的支持。这包括支持访问 iTunes
    资料库和处理可调整大小的视频。

    -   **OpenAL 和 OpenGL ES（`OpenAL.framework` 和 `OpenGLES.framework`）**：包含在 iOS
    内的跨平台框架，用于提供贴近硬件、高性能的音频和视频功能。

