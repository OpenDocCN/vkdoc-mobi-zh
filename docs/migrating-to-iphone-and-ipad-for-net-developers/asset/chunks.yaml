    \ iOS 模拟器中查看相机胶卷*\n\n## 使用加速计\n\niPhone 和 iPad 能够通过检测设备在特定方向上的惯性力来测量重力和设备加速度。通俗来说，这意味着你可以判断设备的方向、变化的速度，以及变化的力量是否在一个轴上大于另一个轴，从而确定方向。\n\
    \n这种三轴检测能力意味着设备可以检测到所有方向上的这些运动。因此，如果你将设备正对自己，左右移动是 `x` 轴，上下移动是 `y` 轴，前后倾斜是 `z`\
    \ 轴。你可以在图 10-4 中看到这如何影响 `x`、`y` 和 `z` 轴的值。（注意箭头指向设备的顶部。）零代表没有运动，正数或负数代表在特定方向上的力。图表的问题在于表示\
    \ `z` 轴有点困难，所以我把它描述为你的设备所展现的加速度大小。静止时，它代表重力；当你向上或向下举起设备时，它是一个与加速度成正比的正面或负面的值。\n\
    \n![images](img/1004.jpg)\n\n**图 10-4.** *旋转时的轴值*\n\nSDK 提供了使用 Quartz 2D 框架访问加速计功能的途径，尽管你也有使用\
    \ OpenGL ES API 的选项，后者提供了更精细的控制级别。模拟器不支持加速计功能，因此，我不会带你一步步地演练示例，而是让你使用提供的示例代码和真实设备来探索其功能。\n\
    \n使用默认的 SDK 实现，你可以将 `UIAccelerometer` 类实例实现为单例（仅一个实例）。要获取这个类，你可以使用如下代码：\n\n```objc\n\
    UIAccelerometer *accelerometer = [UIAccelerometer sharedAccelerometer];\n```\n\
    \n为了接收反映方向变化的事件，你可以使用类似于 GPS 的模式。你将这个类的委托设置为指向一个遵循 `UIAccelerometerDelegate` 协议的类。然而，一个不同之处在于，你可以通过\
    \ `updateInterval` 属性来控制更新的频率，该属性定义了每秒轮询设备的次数，并因此触发事件，尽管它并不精确且不能保证。这种缺乏精确性是硬件工程以及设备以足够低的延迟触发事件以便你捕获和解释的副产品。但在大多数情况下，包括像道路导航这样基于复杂\
    \ GPS 的应用程序中，它也完全适用。有一个解决方案，但并不简单，它涉及捕获事件并使用算法函数对数据进行采样，从而以更高的保真度预测位置。你可以在 [`http://en.wikipedia.org/wiki/Low-pass_filter#Algorithmic_implementation`](http://en.wikipedia.org/wiki/Low-pass_filter#Algorithmic_implementation)\
    \ 找到更多关于此类滤波器的信息。\n\n让我们从代码层面来看，首先，你实现一个使用所需协议的类；这可以是你的 `viewController`。它看起来像这样：\n\
    \n```objc\n@interface MainViewController : UIViewController<UIAccelerometerDelegate>\n\
    {\n        // 在此处声明头文件\n}\n```\n\n然后你提供其实现，特别是用于捕获事件的 `didAccelerate` 方法，如下所示：\n\
    \n```objc\n- (void)accelerometer:(UIAccelerometer *)accelerometer\ndidAccelerate:(UIAcceleration\
    \ *)acceleration\n{\n        // 处理事件的实现代码写在这里\n        NSLog(@\"%@%f\", @\"X:\
    \ \", acceleration.x);\n        NSLog(@\"%@%f\", @\"Y: \", acceleration.y);\n\
    \        NSLog(@\"%@%f\", @\"Z: \", acceleration.z);\n}\n```\n"
- fmt: "你已经了解了如何实例化加速计类，以及如何定义委托来捕获事件，但还需要启用加速计才能实现这一功能。在你的代码中选择一个合适的位置来初始化委托和更新频率——例如，在应用视图控制器的`DidLoad`事件中。当你如上所述获取到单例类的引用后，可以使用以下代码来设置委托和更新间隔：\n\
    \n```\naccelerometer.delegate = self;          // 实现 UIAccelerometerDelegate\n\
    accelerometer.updateInterval = 1.0f/60.0f; // 每60秒更新一次\n```\n\n除此之外，只需在代码中按要求解释数据即可。很明显，尝试将这段代码与\
    \ .NET 对应部分进行桥接会面临两个困难：它依赖于设备，因此 SDK 会发生变化。然而，Windows Mobile 设备已加入 iPhone 和 iPad\
    \ 的行列，提供了让开发者能够做各种事情的能力，从判断用户掉手机的频率到允许用户控制应用和游戏。如果你使用的是基于 HTC 的设备以及托管代码（如 C#），你可以直接访问相应动态链接库中的\
    \ API，但这不太友好；或者，如果你使用的是 Windows Mobile 7，你可以使用`Microsoft.Devices.Sensors`命名空间和`Accelerometer`类，这要好得多。其实现与\
    \ iOS 非常相似，并通过`Microsoft.Devices.Sensors`命名空间暴露出来。与 iOS 加速计框架一样，.NET 实现也使用了`Accelerometer`类，该类通过`Compass`和`Gyroscope`属性分别向其内部的指南针和陀螺仪传感器提供数据。然后使用`Motion`类从传感器捕获数据，使用不同的结构体分别存储加速计、指南针、陀螺仪和运动的数据。\n\
    \n## 手势检测概述\n\niPod Touch、iPhone 和 iPad 最具创新性的功能之一是用户界面能够检测手势。这使设备吸引了所有年龄段的用户，并让电影中看到的虚拟现实界面更近了一步。Cocoa\
    \ Touch 提供了 UIKit 框架，允许你通过`UIGestureRecognizer`类及其启用的事件来利用此功能。让我们来看看。\n\n### 检测触摸事件\n\
    \n起点是捕获用户界面在你触摸屏幕时发送的触摸事件。使用标准视图控制器（`UIViewController`）或视图（`UIView`），首先实现`touchesBegan`方法：\n\
    \n```\n-(void)touchesBegan:(NSSet *)touches withEvent:(UIEvent *)event\n{\n  \
    \  UITouch *touch = [touches anyObject];\n    NSUInteger notouches = [touches\
    \ count];\n    gestureStartPoint = [touch locationInView:self.view];\n}\n```\n\
    \n所有与触摸相关的方法（包括这个方法）都会收到一个名为`touches`的`NSSet`实例和一个`UIEvent`实例。当前按在屏幕上的手指数量可以通过获取`touches`中的对象数量来确定。`touches`中的每个对象都是一个代表一根手指触摸屏幕的`UITouch`事件。\n\
    \n触摸事件机制将不同控件的触摸事件串联起来：这意味着你可能会收到一组触摸事件，其中并非所有事件都属于你的视图。在这种情况下，你可以使用类似于以下的命令来检索与你的视图相关的一组触摸事件：\n\
    \n```\nNSSet* touches = [event touchesForView:self.view];\n```\n\n当手指从屏幕上移开时，会触发相反的事件：`touchesEnded:withEvent`。如果发生了干扰手势的事件（例如电话响铃），则会触发`touchesCancelled:withEvent`。以下代码捕获这些触摸事件，并向调试控制台写入一些文本以指示发生了哪个事件：\n\
    \n```\n- (void)touchesBegan:(NSSet *)touches withEvent:(UIEvent *)event\n{\n \
    \   NSLog(@\"Touches Began\");\n}\n\n- (void)touchesCancelled:(NSSet *)touches\
    \ withEvent:(UIEvent *)event\n{\n    NSLog(@\"Touches Cancelled\");\n}\n\n- (void)touchesEnded:(NSSet\
    \ *)touches withEvent:(UIEvent *)event\n{\n    NSLog(@\"Touches Ended\");\n}\n\
    ```\n\n当我第一次触摸屏幕时，我看到以下输出：\n\n`2011-08-25 21:47:23.044 Gestures[350:207] Touches\
    \ Began`\n\n然后，当我松开手指时，我看到此事件：\n\n`2011-08-25 21:47:23.116 Gestures[350:207] Touches\
    \ Ended`\n\n### 检测滑动\n\n检测滑动与检测触摸非常相似。首先，所需的代码同样包含在`UIViewController`或`UIView`类中。在你的视图中，实现与滑动匹配的两个事件：\n\
    \n```\n-(void)touchesBegan:(NSSet *)touches withEvent:(UIEvent *)event\n{\n  \
    \      // 事件处理将在此处进行\n}\n\n-(void)touchesMoved:(NSSet *)touches withEvent:(UIEvent\
    \ *)event\n{\n        // 事件处理将在此处进行\n}\n```\n\n一旦你捕获了起始事件，你就可以回溯到 iOS SDK 来捕获当前位置，然后执行一些计算以确定滑动的方向。例如：\n\
    \n```\nUITouch *touch = [touches anyObject];\nCGPoint currentPosition = [touch\
    \ locationInView:self.view];\n\nCGFloat deltaX = fabsf(gestureStartPoint.x - currentPosition.x);\n\
    CGFloat deltaY = fabsf(gestureStartPoint.y - currentPosition.y);\n\nif (deltaX\
    \ >= kMinimumGestureLength && deltaY <= kMaximumVariance)\n{\n        NSLog(@\"\
    Horizontal swipe detected\");\n}\nelse if (deltaY >= kMinimumGestureLength &&\n\
    \  deltaX <= kMaximumVariance)\n{\nlabel.text = @\"Vertical swipe detected\";\n\
    \       NSLog(@\"Vertical swipe detected\");\n}\n```\n\n执行时，你可以利用这些信息来检测方向，并像处理其他任何应用程序事件一样对其做出反应。试试看吧！"
  raw: 'You''ve looked at instantiating your accelerometer class and seen how to define
    the delegate to capture the events, but you need to enable the accelerometer to
    do so. Choose a suitable location within your code to initialize the delegate
    and the update frequency—for example, in the application''s view controller''s
    `DidLoad` event. When you have a reference to the singleton class as shown earlier,
    you can use the following code to set the delegate and the update interval:


    `accelerometer.delegate = self;         // imps. UIAccelerometerDelegate`

    `accelerometer.updateInterval = 1.0f/60.0f;        // every 60 seconds`


    There''s not much more too it, other than to interpret the data as required in
    your code. Clearly, trying to bridge this code against a .NET counterpart is going
    to be difficult for two reasons: it is device dependent, and therefore the SDK
    will change. However, Windows Mobile devices have joined the iPhone and iPad in
    offering capabilities that let developers do everything from determining how often
    someone drops their phone to allowing users to control applications and games.
    If you were using an HTC-based device and managed code such as C#, you might access
    the API in the appropriate dynamic link library directly, which isn''t nice; or
    if you were using Windows Mobile 7, you could use `Microsoft.Devices.Sensors`
    and the `Accelerometer` class, which is much better. Its implementation is very
    similar to that in iOS and is exposed through the `Microsoft.Devices.Sensors`
    namespace. As with the iOS accelerometer framework, the .NET implementation uses
    the `Accelerometer` class, which provides to its internal compass and gyroscope
    sensors through the `Compass` and `Gyroscope` properties, respectively. The `Motion`
    class is then used to capture data from the sensors, with different structures
    holding the data for the accelerometer, compass, gyroscope, and motion.


    ### Overview of Gesture Detection


    One of the most innovative features of the iPod Touch, iPhone, and iPad is the
    user interface''s ability to detect gestures. This has given the device appeal
    to users of all ages and has brought one step closer the virtual-reality interface
    seen in movies. Cocoa Touch provides the UIKit framework that allows you to take
    advantage of this capability through features such as the `UIGestureRecognizer`
    class and the events it enables. Let''s take a look.


    #### Detecting Touch Events


    The starting point is to capture the touch events sent by the user interface as
    you touch the screen. Using a standard view controller (`UIViewController`) or
    view (`UIView`), start by implementing the `touchesBegan` method:


    `-(void)touchesBegan:(NSSet *)touches withEvent:(UIEvent *)event`

    `{`

    `UITouch *touch = [touches anyObject];`

    `NSUInteger        notouches = [tounches count];`

    `gestureStartPoint = [touch locationInView:self.view];`

    `}`


    All of the touch-related methods, including this one, are passed an `NSSet` instance
    called `touches` and an instance of `UIEvent`. The number of fingers currently
    pressed against the screen can be determined by getting a count of the objects
    in `touches`. Every object in `touches` is a `UITouch` event that represents one
    finger touching the screen.


    The touch-event mechanism chains the touch events from different controls: this
    means you may receive a set of touches among which not all belong to your view.
    In this instance, you can retrieve a subset of touches that are relevant to your
    view by using a command similar to the following:


    `NSSet*        touches = [event touchesForView:self.view];`


    When the fingers are removed from the screen, the reverse event is fired: `touchesEnded:withEvent`.
    Or if an event occurs that distracts the gesture, such as the phone ringing, then
    the `touchesCancelled:withEvent` is fired. The following code traps these touch
    events and writes some text to the debug console to suggest which one has taken
    place:


    `- (void)touchesBegan:(NSSet *)touches withEvent:(UIEvent *)event`

    `{`

    `    NSLog(@"Touches Began");`

    `}`


    `- (void)touchesCancelled:(NSSet *)touches withEvent:(UIEvent *)event`

    `{`

    `    NSLog(@"Touches Cancelled");`

    `}`


    `- (void)touchesEnded:(NSSet *)touches withEvent:(UIEvent *)event`

    `{`

    `    NSLog(@"Touches Ended");`

    `}`


    When I first touch the screen, I see the following:


    `2011-08-25 21:47:23.044 Gestures[350:207] Touches Began`


    Then, when I let go, I see this event:


    `2011-08-25 21:47:23.116 Gestures[350:207] Touches Ended`


    #### Detecting Swipes


    Detecting swipes is very similar to detecting touches. For a start, the code required
    is again included in the `UIViewController` or `UIView` class. In your view, implement
    the two events matched to swipes:


    `-(void)touchesBegan:(NSSet *)touches withEvent:(UIEvent *)event`

    `{`

    `        // Event processing to go here`

    `}`


    `-(void)touchesMoved:(NSSet *)touches withEvent:(UIEvent *)event`

    `{`

    `        // Event processing to go here`

    `}`


    Once you have trapped the starting event, you can revert to the iOS SDK to capture
    the existing positions and then perform some calculations to determine the direction
    of the swipe. For example:


    `UITouch *touch = [touches anyObject];`

    `CGPoint currentPosition = [touch locationInView:self.view];`


    `CGFloat deltaX = fabsf(gestureStartPoint.x - currentPosition.x);`

    `CGFloat deltaY = fabsf(gestureStartPoint.y - currentPosition.y);`


    `if (deltaX >= kMinimumGestureLength && deltaY <= kMaximumVariance)`

    `{`

    `        NSLOG(@"Horizontal swipe detected");`

    `}`

    `else if (deltaY >= kMinimumGestureLength &&`

    `  deltaX <= kMaximumVariance)`

    `{`

    `label.text = @"Vertical swipe detected";`

    `       NSLOG(@"Vertical swipe detected");`

    `}`


    Upon execution, you can use this information to detect direction and react to
    it as you would any other application event. Give ita try!'
