- fmt: '#### Understanding the iOS


    Originally developed for the iPhone and derived from Mac OS X, iOS is the operating
    system at the heart of Apple''s mobile devices, including the iPhone, iPod touch,
    and more recently, iPad devices. As with most operating systems, iOS takes a layered
    approach to providing the necessary functionality. Each layer builds upon another
    and provides clean lines of abstraction between them. The layers provided within
    iOS are shown in [Figure 1–3](#Chapter01.html#fig_1_3).


    ![images](images/0103.jpg)


    **Figure 1–3.** *iOS architecture*


    Let''s start at the bottom of the stack, dealing with the low-level services first
    and working our way up to those elements that we as humans will interact with
    directly and use for building iOS applications.


    **Core OS**: This provides a layer of abstraction from the physical hardware and
    contains the low-level features used by the layers above it. Each element of the
    layer is provided as a series of frameworks: the Accelerate framework, External
    Accessory framework, Security framework, and System framework. A *framework* in
    this context is a collection of associated APIs that provide the framework''s
    functionality. As we progress through the book, we''ll explore these frameworks
    and the APIs they expose in more detail, and demonstrate examples of how to use
    them.


    **Core Services**: Building on the Core OS layer, the Core Services layer contains
    the fundamental system services for applications. This layer is split into a set
    of Core Services, which combine to provide a number of essential high-level features.
    Some of the services provided are for programmatic support (language support,
    data types, and so on), data management support, and telephony.


    **Media**: This layer, as its name suggests, provides graphic, audio, and video
    support. It is tasked with providing the best multimedia support available through
    the device being used. This layer includes frameworks that provide core audio,
    graphics, text, video, and MIDI support, as well as support for animation, media
    playing, and much more.


    **Cocoa Touch**: This layer provides support and the key building blocks for building
    applications, including multitasking, touch-based input, notifications, and user-interface
    support. This layer also provides support for file sharing and printing, as well
    as peer-to-peer services for wireless connectivity.


    While most of this functionality is packed into special libraries known as *frameworks*,
    this is not the case for all layers and all functionality. For example, some of
    the specialized libraries within the Core OS and Core Services layers are provided
    as dynamic link libraries (DLLs) with symbolic links used to point the iOS to
    the latest version on your device. Such techniques are common for managing code,
    and we''ll look at them in more detail when talking about version control in [Chapter
    2](#Chapter02.html#ch2).


    **NOTE:** Here, I will introduce the key concepts within each framework and present
    working examples to illustrate their use. More detail on the iOS frameworks and
    the versions of iOS in which they are supported can be found in the iOS Developer
    Library documentation.


    #### Application Development Using Apple Components


    You should now have a general appreciation for the operating system, the layers
    from which it is constructed, and the functionality it provides. Before we delve
    into the details of the iOS SDK, let''s look at some of the history surrounding
    software development using Apple components.


    When the iPhone was originally launched, you had two options: use the native tools
    and languages, such as Objective-C and the Mac OS X, or use web-based applications
    that are executed within the mobile Safari browser. The latter is naturally limited
    to languages such as HTML, Cascading Style Sheets (CSS), and JavaScript. Now this
    is still a valid development option today, but limiting in the kind of functionality
    and user experience possible.


    The release of the second-generation iPhone introduced the iOS SDK, the Apple
    App Store, and the ability to use Xcode and Objective-C to write native applications.
    This provided virtually complete access to the iOS, and thus to the iPhone features,
    and also satisfied the mandated native-binaries-only option for distribution through
    the App Store.


    Using the iOS SDK, and so Xcode and Objective-C, is still possible, and indeed
    favored by some individuals as the standard mechanism to use for application development.
    However, it is also true that developers may want to create applications that
    run on many mobile devices, not just Apple''s. Or indeed, they may favor the Apple
    mobile devices but not Mac OS X, or maybe they do not like the development tools
    and languages mandated. For these reasons, a number of alternatives have been
    introduced, as we''ll discuss in the book. In some cases, the options depend,
    at least in part, on the iOS SDK.


    So, enough history. Now let''s look at the options available for developing applications
    using the Apple-provided tools. Apple provides the following core components for
    developing applications:


    *   **Xcode**: This is a suite of tools, developed by Apple, for creating software
    both for the Mac OS X (as used in iMacs, MacBooks, and so on) and iOS.

    *   **iOS SDK**: This is the SDK released to allow developers to make applications
    for Apple''s mobile devices and the Apple TV.


    ##### Xcode


    At the time of writing, the most recent release of Xcode is Xcode 4, available
    from the Mac App Store for $4.99 and from the Apple Developer Connection web site
    for those registered as an Apple Developer, but at a cost of $99 for annual membership.
    Xcode version 3 is still available, free of charge (although, as you would expect,
    the versions of iOS supported are constrained).


    Xcode comes with the following:


    *   **IDE**: `Xcode` is the standard IDE from Apple, which allows you to develop
    software for both the Mac OS X and iOS operating systems. It supports many programming
    languages, and provides many of the features you expect from a professional IDE,
    such as syntax highlighting, autocomplete, debugging, and source-code control.
    It''s comparable with other industry-favored IDEs such as Eclipse and Microsoft''s
    Visual Studio.

    *   **Interface Builder**: Since the introduction of Xcode 4, Interface Builder
    has moved from being a separate application to being completely integrated into
    the `Xcode` IDE, but its purpose remains the same: to provide a tool to aid the
    creation of user interfaces. It does this through a GUI supporting frameworks
    such as Cocoa and presents a palette of user interface objects and controls for
    you to drag and drop onto your canvas as required. You can even go a step further
    and provide the source-code implementation for events from these controls, such
    as a button click.

    *   **Compiler**: The compiler is an essential component. It takes your source
    code and generates the binaries required for execution of your mobile device and
    for App Store execution. Apple''s `LLVM` (from the LLVM.org project) is a fast,
    feature-rich compiler that creates optimized applications for your mobile devices.
    It supports a number of languages, including C, C++, and Objective-C.

    *   **Debugger**: Another contribution from Apple to the LLVM.org open source
    project, the debugger provided as part of `Xcode` is fast and efficient. It supplies
    an integrated debugging interface that includes the usual features, such as stack
    tracing and step-by-step debugging, and also comprehensive multithreading support.'
