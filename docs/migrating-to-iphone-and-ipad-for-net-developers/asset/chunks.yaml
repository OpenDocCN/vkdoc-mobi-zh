  raw: '##### MonoDevelop


    While it''s perfectly possible to use the command-line tools provided with Core
    Mono, and there are those who would argue that hard-core programmers deal only
    with command-line tools, I for one am grateful for a little help from enhanced
    tools. Nowadays, the IDE in the form of some graphical tool is ubiquitous. Those
    of you who have seen or used Microsoft''s development tool, Visual Studio, will
    know how the whole experience of writing applications is made easier and faster
    through the use of such tools. Thankfully, Mono is no different, and the MonoDevelop
    tool suits our needs nicely as a great IDE.


    As shown in [Figure 1–4](#Chapter01.html#fig_1_4), MonoDevelop runs on the Mac
    OS X operating system. In fact, it runs on a number of operating systems, including
    various Linux distributions and Windows.


    ![images](images/0104.jpg)


    **Figure 1–4.** *A MonoDevelop application running on Mac OS X*


    In [Chapter 3](#Chapter03.html#ch3), we''ll look at MonoDevelop, along with the
    Mono framework and MonoTouch. You''ll get a tutorial on how to install, use, and
    develop your own application for Apple''s mobile devices using these components
    and the .NET Framework.


    MonoTouch (including Core Mono) can be downloaded from [`http://www.monotouch.net`](http://www.monotouch.net),
    and MonoDevelop is available from [`http://www.monodevelop.com`](http://www.monodevelop.com).


    #### DragonFire SDK


    We''ve looked at both Apple''s native development environment and the support
    Mono provides for application development using the .NET Framework, but this may
    still be limiting for you. For example, what if your programming language of choice
    is C or C++. While Objective-C is provided as part of the Mac operating system,
    syntactically, it''s quite different, and again, you may not want to be restricted
    to Mac OS X. The DragonFire SDK product was created for this very purpose.


    DragonFire''s target is Windows developers who wish to write native iPhone applications
    using Visual C++, its debugger, and the C/C++ language. It doesn''t require a
    Mac of any description nor familiarity with Objective-C. As it says on the web
    site, “Bring your App idea to life in standard C/C++ and never leave your Windows
    platform.”


    [Figure 1–5](#Chapter01.html#fig_1_5) illustrates how the Dragonfire SDK compares
    with Apple''s existing mobile application development framework.


    ![images](images/0105.jpg)


    **Figure 1–5.** *DragonFire SDK framework*


    The goal was to allow 2D games to be written and debugged in Windows, and be fully
    compliant for distribution via Apple''s App Store. Although this is great if you''re
    writing a game, you may find the API lacking in other areas. For example, as an
    API, it''s not as complete as Apple''s own API—for example, it lacks complete
    support for the Location-based API—but it is constantly being enhanced. The DragonFire
    SDK Enterprise Edition is being launched (at the time of writing, it is suggested
    that this version will launch toward the end of 2011), and this version will feature
    database support, as well as more drag-and-drop functionality and options for
    displaying text and graphics.


    The unique aspect of DragonFire''s SDK is that once you have written your application
    using its API and tested it using the on-screen simulator (all on the Windows
    operating system, remember), then you package up your application as instructed
    and upload this via the web site for compilation, and if requested, iTunes App
    Store bundling.


    The DragonFire SDK is commercially available from its own web site at [`http://www.dragonfiresdk.com/`](http://www.dragonfiresdk.com/).
    It''s relatively inexpensive and aimed at “weekend projects,” according to its
    authors. I''ll let you decide if you like it, but it certainly removes some of
    the complexity of the other options. And it is the only option that allows full
    iPhone, iPod touch, and iPad development on the Windows platform.


    **NOTE:** I won''t be covering the DragonFire SDK in detail in this book. Its
    construct is similar to some of the other third-party tools I''ll introduce and
    demonstrate. I''ll leave playing with the DragonFire SDK to you to have some fun.


    #### Appcelerator''s Titanium Mobile


    Appcelerator''s Titanium Mobile is an open source application development platform.
    In the same way as the DragonFire SDK can be used to write native iPhone applications
    using C/C++, Appcelerator''s Titanium Mobile product allows you to write iPhone,
    iPad, and Android applications using languages other than Objective-C (iPhone
    and iPad) and Java (Android).


    Titanium Mobile has an approach similar to Mono, in that it takes well-known languages
    (in this case, various languages including HTML, CSS, and JavaScript) and provides
    an API that binds these languages to native APIs (in this case, the iOS SDK).
    [Figure 1–6](#Chapter01.html#fig_1_6) illustrates its architecture in comparison
    to the other options.


    ![images](images/0106.jpg)


    **Figure 1–6.** *Titanium Mobile framework*


    Titanium Mobile differs from Mono in the process that it takes with your bespoke
    code in the language you love. Your original code is processed and eventually
    converted into native, executable code through a series of steps that involve
    preprocessing and compilation against first its own API into native code, and
    then native code into a native executable. These steps are illustrated in [Figure
    1–7](#Chapter01.html#fig_1_7), which shows the life cycle from written code to
    an executable ready for testing and, eventually, distribution via the App Store.


    ![images](images/0107.jpg)


    **Figure 1–7.** *Titanium Mobile processing stages*


    Appcelerator''s Titanium Mobile is available from its own web site at [`http://www.appcelerator.com/`](http://www.appcelerator.com/).
    It''s free for individuals using it personally or within small organizations (fewer
    than 25 employees), and has editions for corporate users of 25 and over and 100
    and over. It has versions not only for mobile development, but also for desktop,
    commerce, analytics, and more.


    [Chapter 3](#Chapter03.html#ch3) provides a tutorial on how to download, install,
    and use the product to create an iPhone application. In that chapter, we''ll take
    a closer look at what the Titanium Mobile package can do, and discuss its advantages
    and disadvantages.'
