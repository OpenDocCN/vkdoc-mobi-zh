    So we''ve built our application to display two simple forms, with a button click
    linking the two. But the game isn''t much use if once you''ve completed it, you
    cannot get back to the main menu to start again or exit. So, we need to continue
    building our game screen implementation to provide a mechanism for returning to
    the main menu or the parent window.


    We''ll start by building on our existing game interface screen. We''ll add a toolbar
    to conveniently allow us to place buttons on it. We''ll also add some on-screen
    labels, which we''ll use to display status information.


    Go ahead and add the Toolbar, Button, and Label controls to create the interface
    shown in [Figure 5–5](#Chapter05.html#fig_5_5). Use the standard features of Xcode
    4''s Interface Builder, as you''ve done in previous examples. Any code surrounding
    these items is automatically generated.


    ![images](images/0505.jpg)


    **Figure 5–5.** *Game interface screen*


    We will improve this screen, but for the moment. It serves its purpose: to provide
    a Quit button that will return us to the main menu. To do this, we''ll use techniques
    similar to those we''ve employed previously.


    We need an `IBAction` property, which is used to provide the event property that
    is fired when selected. Also, we need to hook up the action on the Connections
    Inspector tab as before and provide the following event implementation code:


    `-(void)quitGame:(id)sender`

    `{`

    `    // No longer require the game window, go back to parent`

    `    [ self dismissModalViewControllerAnimated:YES ];`

    `}`


    This code will do the reverse of what the code that initially displayed the `GameView`
    view as a dialog box did. It will send the `dismissModalViewControllerAnimated`
    message to the view. This will cause the window to be unloaded and focus returned
    to the parent view from which it was launched—in our case, `LunarLanderViewController`.
    In .NET, this would be the same as calling the `Close()` method on the form, although
    no animation would be performed on the closing window, as is the case with the
