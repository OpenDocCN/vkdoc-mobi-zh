    ### Objective-C Primer, Part 2


    [Chapter 2](#Chapter02.html#ch2) provided a short introduction to some of the
    essentials required to start developing your mobile application. Before we start
    to really put the iOS SDK to work and focus on the specific aspects of mobile
    applications, you''ll need to understand a few more essentials of the Objective-C
    language. Learning about some of these slightly more advanced features will better
    prepare you to not only write your own applications, but also to understand how
    the iOS SDK itself is constructed.


    In the following sections, in order to assist your transition from .NET, I''ll
    introduce each by its .NET language term, rather than the Objective-C term, and
    make comparisons between the languages.


    #### Class Declaration


    Both .NET and Objective-C are object-oriented languages, and so the definition
    of a class is a key construct for the language. Consider the following Objective-C
    and .NET C# examples, shown together.


    * * *


    | **.NET C#** | `Class AClass : Object` `{`

    `intaValue;`


    `  void doNothing();`

    `StringreturnString();`

    `}` |


    * * *


    | **Objective-C** | `@interfaceAClass : NSObject` `{`

