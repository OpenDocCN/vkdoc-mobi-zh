  trans: '

    # 注册成为 Apple 开发者


    在我们讨论任何软件开发工具包（SDK）或工具之前，你需要先注册成为 Apple 开发者。这不仅是必要的，因为你需要访问技术资源并获取关于开发运行在 iOS
    移动设备（iPhone、iPad 和 iPod touch）上的应用程序的信息，而且还因为你需要下载所需的工具，例如 iOS SDK 和 Xcode。**第
    2 章**的示例需要这些下载，因此强烈建议你现在就注册成为 Apple 开发者。


    要注册，请打开浏览器并导航至 [`http://developer.apple.com/programs/register`](http://developer.apple.com/programs/register)，你将看到与**图
    1–1** 类似的界面。


    ![images](img/0101.jpg)


    **图 1–1.** *Apple 开发者注册主页*


    在此主页上，你会注意到“开始使用”的选项，并可以免费注册成为 Apple 开发者。选择此链接，然后按照说明创建一个新的 Apple ID 或使用现有的 Apple
    ID（例如，你可能已经通过使用 iTunes 拥有一个）。完成注册成为 Apple 开发者所需的步骤。


    成功注册成为 Apple 开发者后，你将能够访问许多在线资源，这些资源将为你提供一些必要的工具和支持。**表 1-1** 列出了其中一些资源。


    ![images](img/t0101.jpg)


    现在，你应该前往 iOS Dev Center 并下载免费的 iOS SDK，它包含了为你的 Apple 移动设备设计和开发应用程序所需的基本工具和库。这个磁盘映像（扩展名为
    `.dmg`）同时包含了 Xcode 和 iOS SDK，因此文件非常大，你可能需要在等待下载时去喝杯饮料。或者，你也可以选择下载较旧版本的 Xcode，这是免费的，尽管它对于可以支持的
    Apple iOS 版本有一定限制。


    此时，你可能会想知道注册 Apple ID 并下载免费 SDK，与支付 99 美元注册成为官方 iOS 开发者并访问最新版本 Xcode 之间的区别。自 Xcode
    4 发布以来，Apple 已规定你必须在 Apple Developer Connection (ADC) 网站上注册为 iOS 开发者才能访问它，而这需要每年支付
    99 美元的费用。


    **注意：** 如果你只是想先尝试一下 Xcode 4，再决定是否投入，你可以通过 Mac App Store 安装 Xcode 4，费用仅为 4.99 美元——便宜得多。然而，这两种方案的关键区别在于，使用
    App Store 版本，你无法将软件部署到物理设备上进行测试、无法将应用提交到 App Store 发布，也无法访问某些在线资源。因此，一旦你感到熟悉，并计划开发你的“必备”Apple
    应用时，你可能就想要投入完整版本了。


    但你需要哪个版本？嗯，这在很大程度上取决于你将使用哪种机制来编写你的 iPhone 或 iPad 应用程序。我们将研究使用多种不同方法编写应用程序，但主要关注
    Objective-C 语言。


    我编写这本书的计划是针对最新的 Apple 移动设备，并且我想展示最新的工具选项。因此，此处的示例使用的是撰写时可用的最新版本 Xcode：Xcode 4。该版本在可用性和生产力方面有显著改进。这些改进使其与微软自家的
    Visual Studio 更加接近。因此，虽然旧版本的 Xcode 可能也能用并且免费，但我建议你使用更新的版本，并投资支付所需的费用来开始。


    # 应用开发注意事项


    无论你是使用 Apple 自有的原生工具还是第三方工具，在开发过程中都需要牢记某些原则。这些原则将有助于确保你编写获奖应用的之路顺畅，或者至少更顺畅。我们将讨论的每个选项都是围绕一些总体原则开发的，这些原则既指导又限制了它们的工作方式以及最终应用的执行方式，尤其是在第三方选项的情况下。


    ## 通用开发原则


    无论你使用的是 Apple 自身的原生资源还是第三方资源，以下原则都是通用的：


    *   **设计模式**：许多框架都使用众所周知的设计模式来实现你的应用程序。例如，模型-视图-控制器 (MVC) 设计模式非常常见，因此理解这种模式的工作原理将对你大有帮助。

    *   **许可**：了解第三方应用的许可模式如何运作，以及当你注册使用这些应用提供的工具时可能强加的任何限制或条件，也是值得的。同时也要注意 Apple
    的 App Store 政策可能施加的任何限制。

    *   **设备兼容性**：为某款设备编写应用程序并不意味着它能自动在另一款设备上运行或以相同方式运行。花些时间去了解这些限制和差异，并在适用的情况下为多设备场景设计你的应用。这些差异将在后续章节中相关内容处加以强调。例如，iPad
    的屏幕空间比 iPhone 更大，我们将在 **第 6 章** 中探讨这一点，届时我们将研究如何增强用户界面。


    ## 第三方开发原则


    以下原则通常适用于所有非原生的移动应用开发解决方案，本章稍后将对此进行描述：


    *   **API 限制**：与许多操作系统抽象技术一样，你用于编写移动应用的工具所暴露的 API 通常是不完整的，因此它要么只实现了原生 iOS SDK
    可用 API 的一个子集，要么甚至提供了不同的 API 调用。通过遵循所提供的文档和指导，花时间了解 API、其限制以及应如何使用它。

    *   **前提条件**：重要的是要注意，并非所有第三方产品都能与最新版本的 Apple 原生工具配合使用。花些时间了解任何前提条件，并确保下载你的工具所需且支持文档中指明的组件。硬件也有前提条件。某些选项仅在
    Mac OS X 操作系统上运行。因此，请确保你拥有正确的硬件，尤其是在花钱之前！

    *   **成本**：并非所有选项都是免费的，有些选项有局限性。随着应用程序开发的进行，你可能需要购买额外的“捆绑包”。


    你需要了解这些原则，不仅要理解它们如何运作，还要理解它们输出的应用类型以及它们使用的应用模型范式。


    **注意：** 第三方工具可能会简化开发过程，但有时会以不支持原生应用或损害性能为代价。在本章，以及在 **第 3 章** 更详细的介绍中，我将提供信息，帮助你决定哪些选项最适合你的需求。


    ## 应用方法


    应用开发可分为两种应用范式之一：**Web 应用** 或 **原生应用**。理解这些类型将让你更好地为应用开发做准备。你需要了解每一种的限制以及对调试和分发等开发阶段的影响。

    '
- fmt: '##### Web Applications


    The option to develop an application using the web paradigm still remains and
    is always an option. In this paradigm, the app is hosted outside the mobile device
    and uses the implicit features of Apple''s mobile browser, Safari, to execute
    the code and provide the required user interface and functionality. Of course,
    this constrains the kind of application you can build, the richness of its features,
    the functionality possible, and the way in which the application is accessed and
    made available.


    For example, a browser-based application is available only when you have online
    connectivity, but in some cases, this might be quite appropriate. Suppose that
    you wanted to target many devices without being as dependent on the functionality
    provided by their operating system. In that case, you might consider a web-based
    application. Yes, it may require online connectivity, but if your application
    requires capabilities typically only provided by a web browser, such as `HTML`
    or `JavaScript`, then a web application may do just fine. However, Apple prides
    itself on a rich, intuitive, and interactive user experience, which is far easier
    to provide when exploiting the capabilities of Apple devices and their operating
    systems. But note that it is fair to say that, as the browser experience grows
    and as new technologies are introduced, the gap between web and native is definitely
    closing!


    ##### Native Applications


    The alternative to a web-based application is a native application, and this type
    is the thrust of this book. We''ll be looking at applications that are downloaded
    to and reside on the mobile device itself, and are written using Apple''s own
    tools (`Xcode` and the `iOS SDK`) or those from a third-party provider.


    Now that we''ve covered the basic development principles and approaches, we''ll
    look at some core concepts surrounding application development using Apple tools,
    and then take a look at the third-party options available for application development.
    We''ll be discussing these options throughout the book, and I will guide you through
    creating applications using the different mechanisms.


    ### Apple Platforms and Technologies


    Apple provides a variety of development resources that allow you to target a number
    of its devices or platforms. These include the Mac (via the Max OS X operating
    system), the Safari browser, and of course, Apple''s mobile devices. This section
    introduces the underlying concepts, and then discusses the iOS and Apple tool
    set in more detail.


    #### Apple Terminology and Concepts


    Let''s start with some of the key terms you should recognize before starting your
    journey, to provide some context for subsequent details provided in later sections.
    I want you to be able to build up a mental picture of the key concepts provided
    as part of Apple''s core platforms and technologies before I introduce how, if
    at all, third-party options interface to them.


    ![images](images/t0102.jpg)

    ![images](images/t0102a.jpg)


    [Figure 1–2](#Chapter01.html#fig_1_2) is a diagram that presents these concepts
    in a logical order (as they say, “a picture paints a thousand words”). I will
    build on this diagram as the chapter progresses, placing each of the concepts
    we encounter in relation to one another, and explaining their purpose and relationship.
    The diagram represents the “layers” provided, and the boundaries of the boxes
    shouldn''t be seen as the only interfaces available to you. As I introduce each
    of the core layers, this will become clearer.


    ![images](images/0102.jpg)


    **Figure 1–2.** *Apple''s mobile application development framework*


    As you can see in [Figure 1–2](#Chapter01.html#fig_1_2), on top of the iOS sits
    both the `iOS SDK` and the `Cocoa API` with the Touch extensions. The Bridge technology
    is another API, which provides the framework to link these resources to non-Apple
    and interpreted languages such as Perl, Python, and Ruby. Finally, the Xcode suite
    of tools provides graphical user interfaces (GUIs) to use the program languages,
    APIs, and libraries supplied through an integrated development environment (IDE)—all
    sitting on top of your Apple Mac computer.


    You should now be comfortable with some of the high-level concepts associated
    with developing for Apple''s mobile devices, if not the approaches or patterns
    of development yet, and have an understanding of some of the relationships among
    these core components. You should have also downloaded the `iOS SDK`, although
    we won''t use it until the next chapter.


    Both the iOS and the associated SDK are required to build and run mobile applications.
    Let''s take a look at them at a high level. This will help you to understand some
    of the intricacies of the different mobile devices and also provide further background
    on how the operating system''s features are accessed by the APIs and SDKs above
    them.'
