    ### 使用 `NSLog` 捕获诊断信息


    使用 Xcode 4 工具调试应用程序既简单又功能丰富——这与在 .NET 环境（如 Visual Studio）中使用工具非常相似。在拥有此类工具之前，你的选择非常有限，但一些较老的工具仍然有用。例如，你可能仍然觉得在应用程序中添加一些调试代码很方便，这些代码只是简单地将一些诊断信息输出到“调试”窗口。如果你不想费心创建单元测试，而只是想实时获取一些详细的诊断信息，那么这样做是合适的。


    在 Objective-C 中，你可以使用 `NSLog` 命令将诊断文本发送到“调试”窗口（也称为“控制台”窗口），并通过参数替换包含变量值。


    `NSLog` 的工作方式类似于 C/C++ 语言中的 `sprintf()`，或者 .NET 中 `System.Diagnostics` 命名空间下的
    `Debug.WriteLine`。该方法接收一个字符串，其中定义了“说明符”，这些说明符会被你在字符串声明之后传递给该方法的参数所替换。说明符的替换顺序与你传递它们的顺序一致。这些说明符如表
    9-2 所示。


    ![images](img/t0902.jpg)


    ### 分析你的应用程序


    分析超越了简单的测试，它允许你使用 Xcode 4 的高级功能来查找详细的代码错误，例如内存泄漏或某段特定代码运行缓慢的原因。对分析器（Profiler）的完整解释超出了本章的范围，因为它是一个复杂的主题和功能丰富的工具。然而，值得从高层次上对其进行了解。如果你选择在应用程序中实施分析，可以参阅更高级的参考指南或
    iOS 开发者库。


    你的应用程序应先为分析而构建（⌘I），以确保所有必要的仪表化功能可用。要启动分析，你可以从“产品”菜单中选择“分析”，或者在 Xcode 中打开应用程序后使用
    ⌘I 快捷键。启动后，分析器将如图 9–6 所示。


    ![images](img/0906.jpg)


    **图 9–6.** *显示所有分析选项的分析器*


    该工具提供了许多模板，这些模板专为以特定方式理解你的应用程序而定制，无论是查找内存泄漏、计时代码执行，还是查看内存如何分配。它收集和提供的数据量非常巨大——可与市场上许多基于
    .NET 的分析工具相媲美——而且在 Xcode 4 中它是免费的。


    让我们快速看一个分析模板作为示例；最明显的可能是“泄漏”模板，这是一个常用的模板。为一个简单项目（参见图 9–6），比如计算器应用程序，选择此模板，然后选择“分析”（参见图
    9–7 中的屏幕）。应用程序正在分析器中运行，并且显示了所有分配。


    **注意：** 虽然分析提供了许多有用的模板化工具（如内存泄漏），但如果你使用自动引用计数（ARC），内存泄漏将成为过去。


    ![images](img/0907.jpg)


    **图 9–7.** *显示所有分配的分析器*


    如果切换到“泄漏”视图，你将看到一个特定视图，显示了已检测到内存泄漏的位置。在图 9–8 中，你会看到默认的计算器应用程序没有泄漏，正如一个好程序所应呈现的那样。


    ![images](img/0908.jpg)


    **图 9–8.** *分析器中的“泄漏”视图，无泄漏*


    这算不上什么测试，所以让我们调皮一下！让我们声明一个简单的 `UIImage` 成员变量，分配内存，并用下面这行代码初始化该对象：


    ```

    UIImage *img = [[UIImage alloc] init ];

    ```


    但不要添加相应的释放语句。现在为分析而重新构建你的应用程序并查看分析器。当你选择相同的“泄漏”视图时，它应该显示一个类似于图 9–9 的屏幕。


    ![images](img/0909.jpg)


    **图 9–9.** *显示内存泄漏的分析器*


    你可以清楚地看到，正如预期的那样，已检测到内存泄漏；它突出显示了什么类型的对象在泄漏、泄漏了多少内存，以及是哪个库和哪个视图在泄漏。所有这些信息对于追踪故障都是无价的。


    分析器及其其他模板提供了类似的详细信息，使你能够微调应用程序，或者仅仅了解你的应用程序是如何以极细致的程度执行的。


    多尝试一下。这是一个很好的工具，用于学习你的代码、iOS 及其 SDK 的内部原理。


    **注意：** 如果你选择完成你的“月球着陆器”应用程序，你可能会发现分析很有用。有关如何完成该游戏的讨论，请参阅附录 A。


    ### 使用模拟器的调试功能


    因此，使用 Xcode 4 可以进行大量的调试工作，但有些事情是不可能的，特别是那些特定于设备的事情。例如，你如何测试你的应用程序在方向改变时的行为，或者你的应用程序在内存不足时如何应对？Xcode
    4 的功能无法帮助你模拟此类情况。不过，幸运的是，模拟器本身具有许多自己的调试功能。


    当模拟器打开时，调试功能位于“硬件”菜单下。让我们逐一过一遍。


    #### 更改设备


    一个显而易见但有用的功能是能够更改实际的设备类型。在“设备”菜单下，有选项可以模拟 iPad 和 iPhone，包括 iPhone 4 Retina 版本以及作为
    iOS SDK 一部分的其他 iOS 版本，尽管不包括 iPod Touch。只需选择你想要的设备类型，模拟器就会通过显示相关设备并进行模拟来响应。


    #### 更改 iOS 版本


    下一个有用的功能是模拟不同版本的 iOS。SDK 附带 SDK 发布时支持的不同版本的 iOS，因此 SDK 4.3 包含从 3.2 到 4.3 的所有 iOS
    版本。这对于针对你的应用程序所针对的设备与 iOS 组合进行向后兼容性测试非常有用。


    #### 模拟动作


    显然，如果你拥有物理设备，那么你可以测试旋转和摇晃它。但对于模拟设备来说，这并不容易。你可以旋转你的 Mac 并随意摇晃它——这不会有任何帮助。然而，模拟器提供了菜单选项，既可以向左和向右旋转设备，也可以模拟摇晃手势，这一切都是为了让你能够在应用程序中处理此类事件并在模拟器中测试它们。


    #### 触发低内存


    你的移动设备的内存是有限的，每次你打开一个应用程序，它都会消耗一些内存。除非你特意双击主屏幕按钮选择关闭应用程序，否则如果你使用 iOS 4.0 或更高版本，该内存将保持被使用状态。在较旧版本的
    iOS 上，应用程序不会保留内存，因为不支持多任务。因此，在某些时候，你的应用程序可能会遇到低内存情况，它知道这一点是因为 iOS 会向你的应用程序发送一个低内存事件（`didReceiveMemoryWarning`
    事件）供其处理。收到此事件时，你可能会选择通过释放不再需要或可以重新加载的资源来应对，例如。


    要在模拟器中触发此类事件，你可以选择“模拟内存警告”菜单项，将该事件触发到你的应用程序中，以便你可以测试其响应。

