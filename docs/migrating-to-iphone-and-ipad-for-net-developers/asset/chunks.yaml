    \       lbl.Text = @\"Hello, World\";\n}\n```\n\n现在运行应用程序，您基于 MonoTouch 的 iPhone\
    \ 应用将表现得与 Xcode 4 的 iPhone 应用完全相同，并在设备上显示“Hello, World”。\n\n我们已经了解了如何安装和创建应用程序——包括我们大名鼎鼎的“Hello,\
    \ World”应用程序——并使用 MonoTouch 在 iPhone（确切说是模拟器）上运行。但还有更多可用选项。在本章的剩余部分，我们将集中讨论如何使用几种更稳定且受欢迎的可用选项创建相同的测试应用程序，这些选项使用你可能熟悉的\
    \ Objective-C 和 .NET 之外的语言，在某些情况下甚至可以在基于 Microsoft Windows 的 PC 上运行。\n\n### 使用\
    \ Appcelerator 的 Titanium Mobile\n\nAppcelerator Titanium Mobile 平台的创建目的是支持使用更常见的语言并利用基于\
    \ JavaScript 的 API，为移动设备、平板电脑和桌面设备进行跨平台原生应用开发。Titanium Mobile SDK 与原生 SDK 工具链（在\
    \ Apple 情况下是 iOS SDK）协同工作，将您的 JavaScript 源代码、JavaScript 解释器和静态资源组合成一个可执行的应用程序，该程序可以安装在模拟器或移动设备上。\n\
    \n请注意，由于 Apple 的许可协议，Titanium Mobile 在哪些平台可用于哪些移动设备和操作系统方面存在限制。表 3-1 总结了支持选项。\n\
    \n![images](img/t0301.jpg)\n\n尽管存在这些限制，但值得注意的是，入门是免费的，我们将重点关注 Mac OS X 操作系统。与我们的\
    \ MonoTouch 示例类似，我们将安装 Titanium Mobile，然后使用它来创建我们的“Hello, World”iPhone 应用程序。区别在于，这次我们将使用\
    \ JavaScript 编写代码。\n"
- fmt: "### Installing Titanium\n\nThe first step is to download the required software\
    \ from the Appcelerator's Titanium home page at [`http://www.appcelerator.com/products/download/`](http://www.appcelerator.com/products/download/).\
    \ After it's downloaded, install the application in the traditional Mac manner\
    \ by dragging the `Titanium Developer` icon onto your `Applications` folder, which\
    \ will invoke its installation. Follow the on-screen instructions provided by\
    \ the installer, as shown in [Figure 3–11](#Chapter03.html#fig_3_11).\n\n**NOTE:**\
    \ `Titanium Developer` is the overarching GUI, which sits across the various SDKs\
    \ that exist and acts as your single reference point. Once `Titanium Developer`\
    \ is installed, the different mobile SDKs are installed within it. The first time\
    \ it is run, it will automatically attempt to download the current versions of\
    \ the Mobile and Desktop SDKs.\n\n![images](images/0311.jpg)\n\n**Figure 3–11.**\
    \ *Titanium Developer installer*\n\nAfter you've installed Titanium, it is also\
    \ worth registering as a Titanium developer, as this will grant you access to\
    \ online resources to help you when developing your application.\n\n### Creating\
    \ Hello, World Using Titanium\n\nStart up the `Titanium Desktop` and allow it\
    \ to update the Mobile SDK. Then you'll be presented with an empty GUI. The iOS\
    \ SDK was automatically detected by the installation, so there was no need to\
    \ install that package (unless you want to use a more current version). Let's\
    \ get cracking.\n\nStart by choosing the `New Project` option. This will present\
    \ you with a dialog with some standard project properties to fill in, as shown\
    \ in [Figure 3–12](#Chapter03.html#fig_3_12). When completing the on-screen form,\
    \ you may notice that under the `Project Type` drop-down list, the iPhone option\
    \ uses the `Mobile` project type, whereas there is a specific option for the iPad.\
    \ Once you've completed the form, choose the `Create Project` option to create\
    \ the Mobile application.\n\n![images](images/0312.jpg)\n\n**Figure 3–12.** *Titanium\
    \ Mobile New Project dialog*\n\n**NOTE:** Notice that on my installation, I chose\
    \ not to install the Android SDK. If you want to give that a try, the online resources\
    \ provide you with instructions on how to do so.\n\nThe blank `HelloWorld` project\
    \ will be shown, with options to visit the `Dashboard`, `Edit`, or `Test & Package`\
    \ your application. On the `Dashboard`, you'll see a number of online resources\
    \ to help you get started, as shown in [Figure 3–13](#Chapter03.html#fig_3_13).\n\
    \n![images](images/0313.jpg)\n\n**Figure 3–13.** *Empty project Dashboard in Titanium\
    \ Mobile*\n\nIf you jump straight to the `Test & Package` option tab, you'll see\
    \ the screen shown in [Figure 3–14](#Chapter03.html#fig_3_14). One of the options\
    \ is the `Launch` button, which will build and run your application within the\
    \ mobile device simulator matching the project type chosen, which is the iPhone\
    \ simulator in our example.\n\n![images](images/0314.jpg)\n\n**Figure 3–14.**\
    \ *Test & Package tab in Titanium Mobile*\n\nThe default application generated\
    \ by Titanium Mobile provides two tabs with a text label on each tab. We will\
    \ modify this to show only one tab with our chosen text (“Hello, World”) on it.\n\
    \nFirst, let's take a look at the folder structure and files created. In addition\
    \ to the files created, the following folders were added:\n\n*   **`\\build`**:\
    \ This folder contains the files imported from the SDK and automatically generated\
    \ files that typically are not modified, such as the `main.m` file. The binaries\
    \ and libraries are also located here.\n*   **`\\resources`**: This folder contains\
    \ the resources that support your application, including source code. Here, you\
    \ will find the `app.js` file, the main JavaScript application file used to start\
    \ your application. We will make our modifications in this file.\n\nTake a little\
    \ time to examine the `app.js` file. It's pretty straightforward. As noted, the\
    \ default implementation is to create two tabs, each containing a label, and add\
    \ these to the main application window, and we're going to adjust this to display\
    \ just the one tab and label.\n\nLet's examine some of the highlights of the code.\
    \ First, the most obvious thing to note is that an initial reference is made to\
    \ the `Titanium.UI` namespace. This namespace contains the classes that provide\
    \ access to the user-interface objects. It uses this information to initially\
    \ set the background and also to create a tab group, as follows:\n\n```\nvar tabGroup\
    \ = Titanium.UI.createTabGroup();\n```\n\nThe new `Tab` objects will be added\
    \ to this group, with each `Tab` pointing to a window that will be displayed when\
    \ chosen (although our code will implement only a single tab to show the “Hello,\
    \ World” text). Consider the following code:\n\n```\n//\n// create base UI tab\
    \ and root window\n//\nvar win1 = Titanium.UI.createWindow({  \n    title:'Tab\
    \ 1',\n    backgroundColor:'#fff'\n});\nvar tab1 = Titanium.UI.createTab({  \n\
    \    icon:'KS_nav_views.png',\n    title:'Tab 1',\n    window:win1\n});\n```\n\
    \nThis creates the main window and assigns it the caption of `Tab 1`, using a\
    \ `Tab` object to which this window is assigned. When selected in the application,\
    \ this tab will display this window.\n\nLet's skip to the code that creates the\
    \ new label, after creating a new window and assigning this to the new tab. Consider\
    \ the following segment:\n\n```\nvar label1 = Titanium.UI.createLabel({\n    \
    \    color:'#999',\n        text:'Hello, World',\n        font:{fontSize:20,fontFamily:'Helvetica\
    \ Neue'},\n        textAlign:'center',\n        width:'auto'\n});\n\nwin1.add(label1);\n\
    ```\n\nWe simply create a label object and assign it the “Hello, World” text.\
    \ We can then add this to the main window, referenced by the `win1` variable.\n\
    \nFinally, we add our tab to the tab group and open the tab group, displaying\
    \ the window and our tabs on the main application.\n\n```\n//\n//  add tabs\n\
    //\ntabGroup.addTab(tab1);\n\n// open tab group\ntabGroup.open();\n```\n\nIn carrying\
    \ out these actions, the application will also display our “Hello, World” text.\
    \ And since it's built within the Titanium Developer IDE, it will also launch\
    \ the iPhone simulator, as shown in our running application in [Figure 3–15](#Chapter03.html#fig_3_15).\n\
    \n![images](images/0315.jpg)\n\n**Figure 3–15.** *Titanium Mobile HelloWorld application*\n\
    \nAs you can see, the Titanium IDE is easy to work with and has a complete API.\
    \ I'll leave further discovery for you to try out with the help of the online\
    \ reference material and the `Kitchen Sink` application, which provides out-of-the-box\
    \ examples to examine and modify.\n\n### Using the Marmalade SDK\n\nThe Marmalade\
    \ SDK has the same goal as Titanium Mobile, which is to enable you to build your\
    \ application against an API that is agnostic of the mobile device and its operating\
    \ system. With it, you can develop cross-platform applications in a single hit!\n\
    \nThe Marmalade SDK supports single-click deployment to a number of operating\
    \ systems, including iOS, Android, Symbian, Windows Mobile, and more. We'll be\
    \ using the Xcode IDE to create our Marmalade-based application.\n\n**NOTE:**\
    \ While the Marmalade API supports core features for all types of applications,\
    \ it has a bias toward games development. You will find a rich set of APIs that\
    \ enable you to write compelling mobile games.\n\nThe Marmalade SDK can be thought\
    \ of as the following two components:\n\n*   **MarmaladeSystem**: This provides\
    \ the operating system abstraction API, which when used with the associated libraries,\
    \ allows you to build mobile applications for a variety of operating systems.\
    \ It provides a suite of tools and the C API called the `S3E API`.\n*   **MarmaladeStudio**:\
    \ This provides a suite of tools and runtime components to allow a focused development\
    \ on high-performance 2D and 3D graphics and animations."
