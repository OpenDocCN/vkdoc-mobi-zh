    ### 使用相机


    iPhone 和 iPad 中另一个常用的功能是设备相机。在较新的设备上，通常会配备两个摄像头——一个前置摄像头和一个后置摄像头，用于支持视频通话。幸运的是，与你之前了解的基于位置的服务一样，SDK
    提供了访问这些功能的方法。创建利用相机的应用程序非常简单；SDK 提供了一个名为 `UIImagePickerController` 的类，它可以访问相机，并支持拍照和预览结果。


    我们来了解一下实现相机功能的基础知识，然后通过一个示例应用程序进行实践。


    #### 相机基础


    创建一个使用视图控制器的简单项目，然后在 `didLoad` 方法中输入以下代码：


    ```

    if (([UIImagePickerController isSourceTypeAvailable:

          UIImagePickerControllerSourceTypeCamera] == YES))

    {

            UIImagePickerController *cameraUI = [[UIImagePickerController alloc] init];

            cameraUI.delegate = self;        

            cameraUI.sourceType = UIImagePickerControllerSourceTypeCamera;    

            cameraUI.allowsEditing = NO;


             [self presentModalViewController: cameraUI animated: YES];


    } else NSLog(@"Camera not available");

    ```


    这段代码会显示相机界面（假设设备有相机），并允许你使用对话框拍照——或者录制视频，如果你通过选择器切换到视频模式的话。`mediatypes` 属性控制选择器向你呈现哪些选项，可设置为
    `kUTTypeMovie`（用于视频）、`kUTTypeImage`（用于照片），或者按如下方式同时提供两者（在支持的情况下）：


    ```

    cameraUI.mediaTypes = [UIImagePickerController

     availableMediaTypesForSourceType:

    UIImagePickerControllerSourceTypeCamera];

    ```


    **注意：** 在 iPad 2 上，你也可以使用弹出窗口作为视图控制器。


    该控制器为你提供了基本的编辑功能，例如缩放和裁剪。此外，你可以将用户拍摄或从相册中选择的图像回传给委托。委托负责关闭控制器并处理图像。


    以下示例提供了一个委托方法，用于获取从选择器回传的原始图像：


    ```

    - (void)imagePickerController:(UIImagePickerController *)

     didFinishPickingImage:(UIImage *)image

    editingInfo:(NSDictionary *)editingInfo

    {

    // Your processing code goes here

            // processing code


            // Dismiss the picker

             [p dismissModalViewControllerAnimated:YES];

    }

    ```


    在支持相机的 Windows Mobile 设备上，你可以使用 `Microsoft.Devices.PhotoCamera` 类以及 `MediaLibrary`
    对象（用于保存从相机捕获的视频/图像）以类似方式管理相同的功能。这比在 iPhone 上要复杂一些，因为没有提供单一类，但可以说这种方式提供了更大的灵活性。


    ### 编写一个相机示例应用


    你可以轻松地将相机应用的示例代码片段组合起来。首先，创建一个使用基于视图模板的新项目。这将创建一个包含标准视图控制器和界面的项目，正如你在本书中多次操作过的那样。


    你需要添加相应的框架来使用相机，因此，像之前一样，转到项目的 Build Phases 选项卡（通过项目根设置进入），并在“Link Binary with
    Libraries”设置中添加 `MobileCoreServices.framework`。这将提供对包含相机代码的库的访问。在创建用户界面之前，请在头文件中引入
    `UTCoreTypes.h` 文件，确保为图像选择器和导航实现了两个委托，并为你的 `Image` 属性以及“相机”和“相册”按钮添加 `IBAction`
    和 `IBOutlet`。你的代码应类似于[代码清单 10-3]，这些内容你应该都很熟悉。


    **代码清单 10-3.** *相机示例 `ViewController.h` 文件*


