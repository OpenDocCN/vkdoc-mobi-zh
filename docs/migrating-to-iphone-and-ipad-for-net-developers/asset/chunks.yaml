    The SDK provides a class called the `LocationManager`, which through a simple
    API exposes location-based services while hiding which technologies it uses. However,
    you should still carefully consider the way you use these services. For example,
    you should not allow your application to constantly poll for your location, because
    this affects not only application performance but also battery performance. Your
    application''s implementation should therefore poll for location updates as required;
    but if you do not need continuous updates, you can simply wait for the location
    update event to be fired and then stop updates until you are ready to start and
    determine the location again.


    As you may have guess by now, you can control whether the location manager sends
    updates about location changes. You do so by calling `startUpdatingLocation` when
    you want updates to start and `stopUpdatingLocation` when you want the event updates
    to stop.


    Once you''ve created an instance of the class and started the location-event polling,
    one of two events is fired: either `didUpdateToLocation` or, if an error is encountered,
    `didFailWithError`.


