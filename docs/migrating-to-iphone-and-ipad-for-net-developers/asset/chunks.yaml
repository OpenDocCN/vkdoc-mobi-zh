  trans: "\n#### 手动绘制用户界面\n\n大多数情况下，你无需担心用户界面的绘制问题，因为 iOS 框架通常会自动处理这部分工作，作为控件功能的一部分。然而，在某些情况下，你可能希望对用户界面进行更精细的控制。如果你的应用是游戏，尤其如此，因为\
    \ iOS 框架提供的控件仅能实现部分所需功能。\n\n在这种情况下，你可以重写应用窗口需要刷新时调用的方法。这个方法名为 `drawRect`，它接收一个需要重绘的区域，该区域以\
    \ `CGRect` 结构体形式传递。该结构体包含需要重绘的矩形区域的起点和大小。如果该区域需要重绘，则被称为*脏区域*。当某些内容发生变化时（例如，某个区域之前被窗口遮挡，或控件的外观更新），就必须进行重绘。请考虑以下方法及其实现：\n\
    \n```\n// drawRect - 重绘屏幕\n-(void)drawRect:(CGRect)rect\n{\n    // 仅在准备就绪时进行绘制\n\
    \    if (gstate != RUNNING)\n        return;\n\n    [self.lander_nothrust drawAtPoint:CGPointMake(loc_x,\
    \ loc_y)];\n\n}\n```\n\n你会注意到，我们首先查询应用程序的状态——如果它没有运行，则无需更新屏幕。假设它正在运行，此时我们只需在游戏初始化时定义的\
    \ `x` 和 `y` 位置，使用 `lander_nothrust` 图像绘制我们的月球着陆器图像。目前，我们仅做这些。然而，随着游戏物理效果的体现和用户交互的纳入，我们将更新月球着陆器的位置、检测碰撞等——所有这些都在此方法内完成——并绘制相应的视觉效果。这意味着，如果没有施加推力，着陆器会下降；如果施加推力，它会上升，等等。因此，这相当直接，但很有效！\n\
    \n#### 使用自定义方法\n\n与大多数编程语言一样，你的应用程序结构通常使用子程序，或在面向对象的世界中使用类方法来定义自定义功能。当按正确顺序调用时，这些功能就能实现你的应用程序——在我们的案例中，就是《月球着陆器》游戏。这些子程序的结构和命名是你应用程序架构的一部分。\n\
    \n我们的游戏提供了以下占位方法：\n\n*   `newGame`：初始化游戏。此方法在用户界面初始化后被调用。\n*   `rotateLeft`：将月球着陆器飞船向左旋转。这是响应用户想要向左旋转的操作。在初步实现中，这是通过一个工具栏按钮完成的。详见第\
    \ 7 章，稍后我们将在第 10 章中讨论轻扫和手势。\n*   `rotateRight`：将月球着陆器飞船向右旋转。这是响应用户想要向右旋转的操作。同样，这里我们使用了一个工具栏按钮；稍后，我们将研究轻扫和手势。\n\
    *   `thrustEngine:`：点燃月球着陆器的推进器引擎，这将减缓上升速率，如果按住足够长时间，甚至能增加高度。它还会指示引擎状态的变化，让我们的绘制方法在用户所见内容中反映出这一点。\n\
    *   `quitGame`：通过关闭模态显示的 `GameView` 来退出游戏。本章中，我们将仅实现此方法和 `newGame`。\n\n### 使用模拟器测试你的应用\n\
    \n鉴于我们现在开始认真开发应用程序，我们将更多地使用模拟器。我们可以开始考虑在真实设备上部署和测试，但我们先暂且搁置这一复杂问题，部分原因是目前还没有必要。\n\
    \n在应用开发的早期阶段，以模拟器为目标可以节省大量时间。你无需等待应用安装到物理设备上，就能看到代码更改的效果。而且，在模拟器中运行代码也不需要购买和安装开发者证书。\n\
    \n请不要误会——使用模拟器并非完美无缺，它也有自己的挑战。例如，它无法显示 OpenGL 图形、无法模拟多点触控事件，也无法提供来自 iPhone 某些传感器（如\
    \ GPS）的读数。尽管如此，对于大多数应用而言，它已具备足够的功能，成为你开发过程中有价值的一部分。\n\n需要注意的一个陷阱是，你无法保证模拟应用性能会与实际应用性能相似。模拟器往往运行得非常流畅，这得益于其运行所在\
    \ Mac 的强大性能。而真实应用几乎肯定会受到更有限的资源限制，从而影响用户体验。请务必在你应用所针对的所有物理设备上进行测试，以确保你的期望与现实相符。\n\
    \n以下是模拟器的一些功能：\n\n*   **用户输入**：鼠标可用于模拟指尖。按住 Option 键（![images](img/U006.jpg)）将显示两个圆点，可用于模拟多点触控事件。\n\
    *   **旋转**：可以通过硬件菜单实现。\n*   **iOS 版本**：你可以选择不同的 iOS 版本来测试你的应用。\n*   **低内存**：可以模拟低内存情况，以便你向应用发送此状态，观察其行为。\n\
    *   **硬件键盘**：模拟器允许你使用 Mac 的键盘来提供键盘输入。\n\n那么，经过所有这些辛苦工作之后，你的游戏运行起来是什么样子呢？在 图 5–7\
    \ 中，你可以看到游戏在模拟器中运行的情况，两个圆圈代表模拟器中的触摸手势。\n\n![images](img/0507.jpg)\n\n**图 5–7.**\
    \ *在模拟器中运行的游戏*\n\n### 总结\n\n在本章中，我们利用了前几章提供的基础，开始开发一个真正的应用程序——更接近于实现大多数 iPhone\
    \ 和 iPad 用户所期望的丰富用户体验。好吧，我们的《月球着陆器》游戏可能不适合所有人，是的，我仍然在怀念我的青春时光，但手机游戏应用应该有趣。它也让你有机会在你迄今为止所学到的知识基础上进行构建并加以阐述。\n\
    \n我们介绍了一些关于如何开始应用程序开发的建议，从基础知识入手，例如捕获需求和思考应用设计。然后，我们开始构建应用程序的视觉和程序化方面。\n\n在构建应用程序的同时，你了解了如何在呈现用户界面时使用多个视图，包括我们游戏应用程序的程序化显示。我们添加了一些导航控件，并利用这些控件提供的事件。我们还研究了如何使用实用工具类，例如\
    \ `NSTimer` 类和 `UImage` 类，来实现我们的功能。\n\n我们还研究了如何编写更具可读性、自我文档化的代码，以及如何使用我们自己的自定义方法来实现一个有意义的架构，其结构应能被大多数开发人员轻松理解。最后，我们将模拟器视为一个良好的测试资源。\n\
    \n在接下来的章节中，我们将基于此应用程序进行构建，充实其功能。在此过程中，我们将探索 iOS 的其他方面，例如更高级的用户界面和数据持久化。\n\n##\
    \ 第 6 章\n"
- fmt: '# Build Your Skills: Enhancing Your Application with a Dynamic User Interface


    Apple has always placed an important emphasis on the experience a user has when
    using an Apple iOS-based device, especially because it was one of the first companies
    to implement an operating system that used a graphical user interface (GUI) as
    its focus for user interaction. The Macintosh wasn''t the first personal computer
    to use a GUI but was the first to provide such comprehensive support to the developer
    community. This included Interface Guidelines, which you''ve already discovered
    exist in the OS X of today through some of the Apple Developer resources provided.
    Apple''s take on user experience isn''t just the graphical user interface, of
    course. It also includes things like the physical characteristics of the device
    and touch-based user input. However, the design of your application''s user interface
    is pivotal in providing the engaging user interface Apple expects and which works
    harmoniously with the other attributes that make iOS devices some of the world''s
    leading mobile devices.


    So with your iOS device in hand, and limited only by your imagination, the only
    hurdle is unlocking the magic held in your device and converting your ideas to
    reality through the application. This chapter focuses on how the iOS SDK helps
    you do just that. Specifically, you look at the following:


    - The capabilities of your device and how to embrace them, such as autosizing

    - Different application types, and view controllers available to support them

    - The user-interface elements provided by the iOS SDK to help you build your user
    interface

    - Working examples of how to use the iOS SDK to implement typical UI Element application
    features

    - Apple resources provided to support you, and some tips of how to get the best
    from them


    You start by exploring some of the key features of the iOS devices and typical
    applications.


    ## Understanding Platform and Device Constraints


    The user experience starts with the device being used, and therefore the devices
    you target and the physical characteristics of each device your application is
    written to exploit. Note that I deliberately use the words *target* and *exploit*
    because certain features such as device orientation and the ability of your application
    to rotate its user-interface are not automatically adopted by your application—you
    need to specifically write your application to be aware of them. You cover this
    later in the book.


    Let''s take a look at some relevant platform characteristics.


    ### Display Size and Resolution


    The screen resolution of the different iOS devices is very relevant when designing
    your application. There is an important distinction between a unit of measure
    used to describe the size of a device''s screen (a *pixel*) and the measure used
    to describe the area that is drawn onscreen (a *point*). [Table 6-1](#Chapter06.html#tab_6_1)
    details the screen resolutions available for the different iOS devices in pixels.


    ![images](images/t0601.jpg)


    At this point, it''s worth noting that when you look at the graphical system frameworks
    provided as part of iOS SDK, they require you to use a logical coordinate system
    that uses points, not pixels. You look at why, but the conversion between pixel
    and point depends on your display type. A standard display has is a 1:1 ratio;
    but on the Retina display, a 1:2 ratio is used.


    #### Example Applications That Take Full Advantage of the Device''s Form Factor


    Good examples exist of applications that take advantage of the different device
    sizes and format. Some example applications change the display orientation to
    one that makes more sense for its usage. For example, in [Figure 6–1](#Chapter06.html#fig_6_1),
    the YouTube application on the iPhone uses portrait to display its lists because
    landscape mode adds little value.


    ![images](images/0601.jpg)


    **Figure 6–1.** *YouTube video list represented in portrait orientation*


    But when you play a particular video, the landscape orientation is better suited.
    You see the application switch to playing the video in landscape mode, as shown
    in [Figure 6–2](#Chapter06.html#fig_6_2). It still has the option for portrait,
    but that mode is less effective.


    ![images](images/0602.jpg)


    **Figure 6–2.** *YouTube defaulting to landscape mode to play a video*


    The iPad in particular gives you even more opportunity to take advantage of its
    dimensions. The *Financial Times* iPad app uses the device''s form factor to present
    the look and feel of the newspaper that it''s digitally emulating, as you can
    see in [Figure 6–3](#Chapter06.html#fig_6_3).


    ![images](images/0603.jpg)


    **Figure 6–3.** *The* Financial Times *iPad application in all its portrait glory*


    An alternative is the BBC''s iPad application, which takes full advantage of landscape
    mode to display news and corresponding video side by side using a Split View controller
    (something you build an example of later in the chapter). You can see the application
    in [Figure 6–4](#Chapter06.html#fig_6_4).


    ![images](images/0604.jpg)


    **Figure 6–4.** *BBC''s News iPad application taking advantage of Landscape mode*


    #### Points Compared to Pixels


    The point measurement unit is used to describe the area that is drawn onscreen,
    whereas pixels describe the size of a screen or the size of an image such as an
    icon. Why bother? Apple provides you with support to enable your application to
    be consistently presented regardless of the device on which it is running. It
    does this through the use of points and a logical coordinate system that, when
    also used by the iOS system frameworks to interpret a physical device location,
    ensures the content you draw appears the same size regardless of device. Microsoft
    employs a similar logical coordinate system as part of its GDI+ framework. You''ll
    soon find it''s as easy to deal with points as pixels, and the logical equivalence
    across devices often means it''s easier.


    #### Other Considerations


    There are some obvious considerations when looking at screen size. An iPad clearly
    has a much larger screen than an iPhone, so your application can make use of this
    and your artwork quality can also reflect that the size difference. For example,
    don''t just use the same size graphical content and scale it up unless you are
    happy to sacrifice the quality of your artwork.


    Also keep in mind that the Apple Human Interface Guidelines suggest that certain
    user interface elements remain the same despite the size of the screen. For example,
    the guidelines suggest that tappable elements in your user interface are most
    comfortable for users at a size of 44 × 44 points.


    **NOTE:** Typically, the pixel density on a mobile device is higher where it is
    designed to be viewed up close. This is true of an iPhone 4, which has a pixel
    density of 326 pixels per inch (PPI), vs. an iPad 2, which has 132 PPI.


    ### Supporting Device Orientation


    The iOS provides support for rotating your application based on the device''s
    orientation. Whether your application chooses to support this is of course a design
    consideration. In some cases it makes no sense for your application to rotate
    into a certain orientation because the user experience would be sacrificed. For
    example, a game with some kind of scrolling landscape would look squashed and
    compromised if rotated to portrait mode.'
  raw: '## Build Your Skills: Enhancing Your Application with a Dynamic User Interface


    Apple has always placed an important emphasis on the experience a user has when
    using an Apple iOS-based device, especially because it was one of the first companies
    to implement an operating system that used a graphical user interface (GUI) as
    its focus for user interaction. The Macintosh wasn''t the first personal computer
    to use a GUI but was the first to provide such comprehensive support to the developer
    community. This included Interface Guidelines, which you''ve already discovered
    exist in the OS X of today through some of the Apple Developer resources provided.
    Apple''s take on user experience isn''t just the graphical user interface, of
    course. It also includes things like the physical characteristics of the device
    and touch-based user input. However, the design of your application''s user interface
    is pivotal in providing the engaging user interface Apple expects and which works
    harmoniously with the other attributes that make iOS devices some of the world''s
    leading mobile devices.


    So with your iOS device in hand, and limited only by your imagination, the only
    hurdle is unlocking the magic held in your device and converting your ideas to
    reality through the application. This chapter focuses on how the iOS SDK helps
    you do just that. Specifically, you look at the following:


    *   The capabilities of your device and how to embrace them, such as autosizing

    *   Different application types, and view controllers available to support them

    *   The user-interface elements provided by the iOS SDK to help you build your
    user interface

    *   Working examples of how to use the iOS SDK to implement typical UI Element
    application features

    *   Apple resources provided to support you, and some tips of how to get the best
    from them


    You start by exploring some of the key features of the iOS devices and typical
    applications.


    ### Understanding Platform and Device Constraints


    The user experience starts with the device being used, and therefore the devices
    you target and the physical characteristics of each device your application is
    written to exploit. Note that I deliberately use the words *target* and *exploit*
    because certain features such as device orientation and the ability of your application
    to rotate its user-interface are not automatically adopted by your application—you
    need to specifically write your application to be aware of them. You cover this
    later in the book.


    Let''s take a look at some relevant platform characteristics.


    #### Display Size and Resolution


    The screen resolution of the different iOS devices is very relevant when designing
    your application. There is an important distinction between a unit of measure
    used to describe the size of a device''s screen (a *pixel*) and the measure used
    to describe the area that is drawn onscreen (a *point*). [Table 6-1](#Chapter06.html#tab_6_1)
    details the screen resolutions available for the different iOS devices in pixels.


    ![images](images/t0601.jpg)


    At this point, it''s worth noting that when you look at the graphical system frameworks
    provided as part of iOS SDK, they require you to use a logical coordinate system
    that uses points, not pixels. You look at why, but the conversion between pixel
    and point depends on your display type. A standard display has is a 1:1 ratio;
    but on the Retina display, a 1:2 ratio is used.


    ##### Example Applications That Take Full Advantage of the Device''s Form Factor


    Good examples exist of applications that take advantage of the different device
    sizes and format. Some example applications change the display orientation to
    one that makes more sense for its usage. For example, in [Figure 6–1](#Chapter06.html#fig_6_1),
    the YouTube application on the iPhone uses portrait to display its lists because
    landscape mode adds little value.


    ![images](images/0601.jpg)


    **Figure 6–1.** *YouTube video list represented in portrait orientation*


    But when you play a particular video, the landscape orientation is better suited.
    You see the application switch to playing the video in landscape mode, as shown
    in [Figure 6–2](#Chapter06.html#fig_6_2). It still has the option for portrait,
    but that mode is less effective.


    ![images](images/0602.jpg)


    **Figure 6–2.** *YouTube defaulting to landscape mode to play a video*


    The iPad in particular gives you even more opportunity to take advantage of its
    dimensions. The *Financial Times* iPad app uses the device''s form factor to present
    the look and feel of the newspaper that it''s digitally emulating, as you can
    see in [Figure 6–3](#Chapter06.html#fig_6_3).


    ![images](images/0603.jpg)


    **Figure 6–3.** *The* Financial Times *iPad application in all its portrait glory*


    An alternative is the BBC''s iPad application, which takes full advantage of landscape
    mode to display news and corresponding video side by side using a Split View controller
    (something you build an example of later in the chapter). You can see the application
    in [Figure 6–4](#Chapter06.html#fig_6_4).


    ![images](images/0604.jpg)


    **Figure 6–4.** *BBC''s News iPad application taking advantage of Landscape mode*


    ##### Points Compared to Pixels


    The point measurement unit is used to describe the area that is drawn onscreen,
    whereas pixels describe the size of a screen or the size of an image such as an
    icon. Why bother? Apple provides you with support to enable your application to
    be consistently presented regardless of the device on which it is running. It
    does this through the use of points and a logical coordinate system that, when
    also used by the iOS system frameworks to interpret a physical device location,
    ensures the content you draw appears the same size regardless of device. Microsoft
    employs a similar logical coordinate system as part of its GDI+ framework. You''ll
    soon find it''s as easy to deal with points as pixels, and the logical equivalence
    across devices often means it''s easier.


    ##### Other Considerations


    There are some obvious considerations when looking at screen size. An iPad clearly
    has a much larger screen than an iPhone, so your application can make use of this
    and your artwork quality can also reflect that the size difference. For example,
    don''t just use the same size graphical content and scale it up unless you are
    happy to sacrifice the quality of your artwork.


    Also keep in mind that the Apple Human Interface Guidelines suggest that certain
    user interface elements remain the same despite the size of the screen. For example,
    the guidelines suggest that tappable elements in your user interface are most
    comfortable for users at a size of 44 × 44 points.


    **NOTE:** Typically, the pixel density on a mobile device is higher where it is
    designed to be viewed up close. This is true of an iPhone 4, which has a pixel
    density of 326 pixels per inch (PPI), vs. an iPad 2, which has 132 PPI.


    #### Supporting Device Orientation


    The iOS provides support for rotating your application based on the device''s
    orientation. Whether your application chooses to support this is of course a design
    consideration. In some cases it makes no sense for your application to rotate
    into a certain orientation because the user experience would be sacrificed. For
    example, a game with some kind of scrolling landscape would look squashed and
    compromised if rotated to portrait mode.'
  trans: '

    # 提升技能：用动态用户界面增强你的应用


    苹果公司始终高度重视用户在 iOS 设备上的使用体验，这尤其因为它是最早实现以图形用户界面（GUI）为核心用户交互方式的操作系统的公司之一。Macintosh
    并非首款采用 GUI 的个人电脑，但却是首个为开发者社区提供如此全面支持的产品。这包括《界面设计指南》，通过苹果提供的一些开发者资源，你会发现这些指南至今仍存在于
    OS X 系统中。当然，苹果对用户体验的理解并不仅限于图形用户界面，它还包括设备的物理特性和基于触摸的用户输入等方面。不过，应用的用户界面设计在提供苹果所期望的、且能与
    iOS 设备其他特性（使其成为全球领先移动设备的关键因素）和谐共存的交互体验中，起着至关重要的作用。


    因此，手握 iOS 设备，唯一限制你的是想象力，而唯一的障碍则是如何解锁设备中的魔法，通过应用将想法转化为现实。本章重点介绍 iOS SDK 如何帮助你实现这一目标。具体来说，你将了解以下内容：


    -   设备的功能特性以及如何利用它们，例如自动调整大小

    -   不同的应用类型，以及支持它们的视图控制器

    -   iOS SDK 提供的用于构建用户界面的界面元素

    -   如何使用 iOS SDK 实现典型 UI 元素应用功能的工作示例

    -   苹果提供的支持资源，以及一些如何充分利用它们的小技巧


    我们首先探索 iOS 设备的一些关键特性以及典型的应用场景。


    ## 理解平台与设备的限制条件


    用户体验始于所使用的设备，因此你的目标设备以及你为利用每个设备的物理特性而编写的代码至关重要。请注意，我特意使用了*目标*和*利用*这两个词，因为某些特性（如设备方向和应用旋转其用户界面的能力）并不会被应用自动采用——你需要专门编写代码来支持它们。本书后面会详细介绍这一点。


    让我们来看看一些相关的平台特性。


    ### 屏幕尺寸与分辨率


    在设计应用时，不同 iOS 设备的屏幕分辨率非常重要。描述设备屏幕尺寸的度量单位（*像素*）和描述屏幕上绘制区域的度量单位（*点*）之间存在重要区别。表 6-1
    详细列出了不同 iOS 设备以像素为单位的屏幕分辨率。


    ![images](img/t0601.jpg)


    值得注意的是，当你查看 iOS SDK 提供的图形系统框架时，它们要求你使用基于点的逻辑坐标系统，而非像素。稍后会解释原因，但像素与点之间的转换取决于你的显示类型。标准显示器采用
    1:1 的比例；而视网膜显示屏则采用 1:2 的比例。


    #### 充分利用设备形态的示例应用


    有许多优秀应用能够充分利用不同设备的尺寸和形态。一些示例应用会将显示方向调整为更适合其用途的模式。例如，在图 6–1 中，iPhone 上的 YouTube
    应用使用竖屏模式显示列表，因为横屏模式带来的价值不大。


    ![images](img/0601.jpg)


    **图 6–1.** *竖屏模式下的 YouTube 视频列表*


    但在播放特定视频时，横屏方向更为合适。你会看到应用切换到横屏模式播放视频，如图 6–2 所示。它仍然提供竖屏选项，但该模式效果较差。


    ![images](img/0602.jpg)


    **图 6–2.** *YouTube 默认使用横屏模式播放视频*


    特别是 iPad，它为你提供了更多利用其大屏幕的机会。如图 6–3 所示，《金融时报》的 iPad 应用利用设备的形态，呈现了其数字仿真报纸的外观和感觉。


    ![images](img/0603.jpg)


    **图 6–3.** *竖屏模式下展现的《金融时报》iPad 应用*


    另一个例子是 BBC 的 iPad 应用，它充分利用横屏模式，通过分裂视图控制器（Split View Controller，你将在本章稍后构建一个示例）并排显示新闻和相应的视频。你可以在图
    6–4 中看到该应用。


    ![images](img/0604.jpg)


    **图 6–4.** *BBC 新闻 iPad 应用充分利用横屏模式*


    #### 点与像素的比较


    点这个度量单位用于描述屏幕上绘制的区域，而像素则描述屏幕或图像（如图标）的大小。为什么要区分两者？苹果提供支持，使你的应用无论运行在何种设备上，都能一致地呈现。它通过使用点和逻辑坐标系统来实现这一点，当
    iOS 系统框架也使用该系统来解释物理设备位置时，能确保你绘制的内容在不同设备上显示为相同大小。微软在其 GDI+ 框架中也采用了类似的逻辑坐标系统。你很快就会发现，处理点和处理像素一样简单，而且设备间的逻辑等效性通常意味着操作更简便。


    #### 其他考虑因素


    在考虑屏幕尺寸时，还有一些明显的因素。iPad 的屏幕显然比 iPhone 大得多，因此你的应用可以利用这一点，你的图片质量也应能体现这种尺寸差异。例如，除非你愿意牺牲图片质量，否则不要简单地使用相同大小的图形内容并直接放大。


    另外请记住，苹果的《人机界面指南》建议，某些用户界面元素无论屏幕大小如何，都应保持相同尺寸。例如，指南建议用户界面中可点击的元素在 44 × 44 点的尺寸下最舒适。


    **注意：** 通常，移动设备的像素密度较高，因其设计用于近距离观看。iPhone 4 就是如此，其像素密度为 326 PPI（每英寸像素数），而 iPad
    2 则为 132 PPI。


    ### 支持设备方向


    iOS 支持基于设备方向旋转你的应用。你的应用是否支持此功能当然是一个设计考量。在某些情况下，将应用旋转到特定方向毫无意义，因为这会牺牲用户体验。例如，一个带有某种横向滚动场景的游戏，如果旋转到竖屏模式，看起来会显得被压缩和妥协。'
- fmt: "# Handling Device Orientation\n\nAs you may have come to expect, the iOS SDK\
    \ fires an event to notify your code of a device orientation change. Take a look\
    \ at the event's signature:\n\n`(void) didRotateFromInterfaceOrientation(UIInterfaceOrientation)fromInterfaceOrientation`\n\
    \nWhen this event is fired and your application catches the event by implementing\
    \ this method signature in your code, it is passed the orientation from which\
    \ the device has been rotated. So you just have to implement the event, right?\
    \ Wrong—in addition to providing an implementation for the rotation method, you\
    \ also need to tell your application to support different orientations and fire\
    \ the event in the first place. If you examine the code created when you build\
    \ your view controllers, you notice the following code commented out:\n\n```\n\
    /*\n// Override to allow orientations other than the default portrait orientation.\n\
    - (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation\
    \ {\n    // Return YES for supported orientations\n    return (interfaceOrientation\
    \ == UIInterfaceOrientationPortrait);\n}\n*/\n```\n\nYou need to both uncomment\
    \ this code, indicating to the application that it now supports different orientations,\
    \ and ensure that you return the value `YES` if the orientation fired (in the\
    \ example, portrait) is supported or an unconditional `YES` if all orientations\
    \ are supported. You also need to implement the rotation event discussed earlier.\n\
    \nIf you want to know whether the device has been rotated into portrait orientation,\
    \ you look to see if it has moved from landscape orientation and reflect the change\
    \ by using a view controller that is oriented to that orientation:\n\n```\nif((fromInterfaceOrientation\
    \ == UIInterfaceOrientationLandscapeLeft) ||\n     (fromInterfaceOrientation ==\
    \ UIInterfaceOrientationLandscapeRight))\n  {\n    //  Load the view controller\
    \ oriented to the Portrait mode\n  }\n```\n\nYou can also test for `UIInterfaceOrientationPortrait`\
    \ and `UIInterfaceOrientationPortraitUpsideDown`, in all cases returning `YES`\
    \ or `NO` depending on whether your application has been written to support a\
    \ particular rotation.\n\nLet's test it. If you leave your code commented out\
    \ or return a flat `NO`, your application supports only portrait and not landscape\
    \ orientation. So, if you run the application in the simulator and use either\
    \ the rotate left (![images](images/U003.jpg)![images](images/U004.jpg)) or rotate\
    \ right (![images](images/U003.jpg)![images](images/U005.jpg)) command from the\
    \ `Hardware` menu, the device rotates. Rotate it to the left, and you should see\
    \ a screen similar to the one in [Figure 6–5](#Chapter06.html#fig_6_5).\n\n![images](images/0605.jpg)\n\
    \n**Figure 6–5.** *Device rotated left*\n\nThis clearly doesn't look right, and\
    \ it's no surprise because you've indicated that your application doesn't support\
    \ any orientation other than portrait. Just to illustrate the point, let's uncomment\
    \ the code and return `YES` as the value regardless of the orientation. After\
    \ you change the code, re-run the application, and follow the same left orientation,\
    \ you should see a screen similar to the one in [Figure 6–6](#Chapter06.html#fig_6_6).\n\
    \n![images](images/0606.jpg)\n\n**Figure 6–6.** *Device rotated with landscape\
    \ support*\n\nBetter, but not right. As you can see, the button isn't centered\
    \ on the screen as it was in portrait mode. No matter: this is easily fixed because\
    \ Xcode and the iOS SDK support autosizing using control attributes. Open your\
    \ project and `LunarLanderViewController.xib` to display the start screen. Select\
    \ button using Size Inspector (![images](images/U006.jpg)![images](images/U007.jpg)5),\
    \ and you're presented with the Size Inspector shown in [Figure 6–7](#Chapter06.html#fig_6_7).\n\
    \n![images](images/0607.jpg)\n\n**Figure 6–7.** *Size Inspector*\n\nFirst, don't\
    \ be baffled by the display; it's pretty straightforward. Let's focus on the Autosizing\
    \ pane. The box on the left is where you modify the attribute's values; the box\
    \ on the right is an example animation depicting the effect of your change—a really\
    \ useful visual tool to confirm you're making the right changes.\n\nLooking more\
    \ closely, notice two things:\n\n*   A set of red arrows in the inner square that\
    \ represent horizontal and vertical space inside the selected object\n*   A set\
    \ of *I* shapes outside the inner box that represent the distance between the\
    \ object selected and the outside of the view that contains it\n\nIn both cases,\
    \ a dashed line means the space is flexible: that is, it adjusts based on the\
    \ orientation of the screen. A solid line means the space is fixed. So, if you\
    \ want your button to be flexible along the horizontal axis and center itself,\
    \ you need to ensure that the left *I* shape is dashed, not solid, as it is by\
    \ default. This change is shown in [Figure 6–7](#Chapter06.html#fig_6_7), and\
    \ the animation shows the button moving to be centered on the landscape screen\
    \ when rotated—exactly what you want. Make the change and run the application,\
    \ and you should see a screen similar to that in [Figure 6–8](#Chapter06.html#fig_6_8).\
    \ Much better!\n\n![images](images/0608.jpg)\n\n**Figure 6–8.** *The screen rotated\
    \ left with autosizing adjusted*\n\nAutosizing isn't the only option available\
    \ to you. The iOS SDK provides a method that gives you precise control over the\
    \ control's look and feel through code by adjusting its properties just before\
    \ the rotation has completed. The method signature to change is as follows:\n\n\
    `(void)willAnimateRotationToInterfaceOrientation:(UIInterfaceOrientation)`\n\n\
    The final option available gives you exact control over what your screen looks\
    \ like in a given orientation but without the effort of doing it programmatically.\
    \ To achieve this, you have a view for each orientation you want to support, and\
    \ in the same method just described you adjust the view using the `self.view`\
    \ property. This means your view can define the look and feel of your user interface\
    \ at design time for a given orientation, without you having to programmatically\
    \ adjust the user-interface controls in code. Simple!\n\nEnough of rotation and\
    \ orientation. Although they're important, they aren't the main focus of this\
    \ chapter. Let's look beyond the attributes of the device and consider the type\
    \ of application you may be building and the SDK support provided to give the\
    \ user a familiar but rich experience."
