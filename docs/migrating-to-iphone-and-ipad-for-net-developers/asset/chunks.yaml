    for the old position and one for the new position. This provides you with the
    current location and has the added benefit of giving you the ability to calculate
    the distance travelled by using the old position.


    Each `CLLocation` parameter contains the location coordinates, the altitude, and
    the speed of travel. It also provides the methods necessary to calculate distance.


    Let''s look at how to use this class.


