- fmt: "# Overview of Location Services\n\nThe SDK provides a class called the `LocationManager`,\
    \ which through a simple API exposes location-based services while hiding which\
    \ technologies it uses. However, you should still carefully consider the way you\
    \ use these services. For example, you should not allow your application to constantly\
    \ poll for your location, because this affects not only application performance\
    \ but also battery performance. Your application's implementation should therefore\
    \ poll for location updates as required; but if you do not need continuous updates,\
    \ you can simply wait for the location update event to be fired and then stop\
    \ updates until you are ready to start and determine the location again.\n\nAs\
    \ you may have guess by now, you can control whether the location manager sends\
    \ updates about location changes. You do so by calling `startUpdatingLocation`\
    \ when you want updates to start and `stopUpdatingLocation` when you want the\
    \ event updates to stop.\n\nOnce you've created an instance of the class and started\
    \ the location-event polling, one of two events is fired: either `didUpdateToLocation`\
    \ or, if an error is encountered, `didFailWithError`.\n\nWhen a new location event\
    \ is fired, it passes two variables, each of type `CLLocation`—one for the old\
    \ position and one for the new position. This provides you with the current location\
    \ and has the added benefit of giving you the ability to calculate the distance\
    \ travelled by using the old position.\n\nEach `CLLocation` parameter contains\
    \ the location coordinates, the altitude, and the speed of travel. It also provides\
    \ the methods necessary to calculate distance.\n\nLet's look at how to use this\
    \ class.\n\n# Implementing Location-Based Services\n\nStart by creating an instance\
    \ of the `LocationManager` class. This class encapsulates some of the location-based\
    \ services provided by the SDK. The syntax is shown here:\n\n```\nCLLocationManager\
    \ *lm = [[CLLocationManager alloc]init];\n```\n\nTo provide a hook for notification\
    \ events, you also need to provide a delegate to receive key location-based events,\
    \ such as a location change. You essentially use the delegate to host callback\
    \ methods to receive the event and process it. In order for this to work, you\
    \ use `CLLocationManagerDelegate`, ensuring that it conforms to the protocol signature\
    \ that defines two optional methods (more on these later). So, the easiest mechanism\
    \ is to create a container class for this purpose, as shown in [Listing 10-1](#Chapter10.html#list_10_1)\
    \ (the header file) and [Listing 10-2](#Chapter10.html#list_10_2) (implementation).\n\
    \n**Listing 10-1.** `LocationManager.h`\n\n```\n#import <Foundation/Foundation.h>\n\
    #import <CoreLocation/CoreLocation.h>\n\n@interface LocationManager : NSObject\
    \ <CLLocationManagerDelegate> {\n    CLLocationManager* lm;\n        CLLocation*\
    \ l;\n}\n\n@property (nonatomic, retain) CLLocationManager* lm;\n@property (nonatomic,\
    \ retain) CLLocation* l;\n\n@end\n```\n\n**Listing 10-2.** `LocationManager.m`\n\
    \n```\n#import \"LocationManager.h\"\n\n@implementation LocationManager\n@synthesize\
    \ lm,l;\n\n// Default Constructor which allocates the CLLocationManager instance\n\
    // assigns the delegate to itself and sets maximum accuracy\n//\n- (id)init\n\
    {\n    self = [super init];\n    if (self != nil) {\n        self.lm = [[[CLLocationManager\
    \ alloc] init] autorelease];\n        self.lm.delegate = self;\n        self.lm.desiredAccuracy\
    \ = kCLLocationAccuracyBest;\n    }\n    return self;\n}\n\n// Event : didUpdateToLocation\n\
    //\n- (void)locationManager:(CLLocationManager*)manager\ndidUpdateToLocation:(CLLocation*)newLocation\n\
    fromLocation:(CLLocation*)oldLocation\n{\n    // Handle your events as required\
    \ here\n}\n\n// Event: didFailWithError\n// TODO: This is left for you to implement\
    \ in this example\n\n@end\n```\n\nYou can therefore change your class instantiation\
    \ to use this class instead of `CLLocationManager`, as follows:\n\n```\nLocationManager*\
    \        lm = [[LocationManager init] alloc];\n```\n\nIn your constructor you\
    \ not only set up the delegate to point to itself but also set the accuracy for\
    \ the services by using the `desiredAccuracy` property with one of the predefined\
    \ constants that indicates the level of accuracy you desire. Setting this to a\
    \ value of `kCLLocationAccuracyBest` gives you the best location within 10 meters;\
    \ additional settings are available to an accuracy of 100 meters, 1 kilometer,\
    \ and 3 kilometers. Although you have the option of setting a desired accuracy,\
    \ the accuracy is not guaranteed; and the higher the accuracy setting, the more\
    \ battery power and device performance are impacted.\n\n# What's in a Location?\n\
    \nThe location-update event is fired with the new and old locations passed as\
    \ instances of the `CLLocation` class. This class contains a number of properties\
    \ of interest. Suppose that, in your application, you declare an instance of the\
    \ `LocationManager` class called `lm`, and then at a suitable point you create\
    \ an instance of the object and start updating the location as shown:\n\n```\n\
    LocationManager* lm =[[LocationManager alloc] init];\n[lm.lmstartUpdatingLocation];\n\
    ```\n\nYou can then provide an implementation for this event in your code. For\
    \ example, let's output the location to the log file using the following example\
    \ code:\n\n```\n// Handle your events as required here\nNSLog(@\"Long %f Lat %f\"\
    ,newLocation.coordinate.longitude,\n newLocation.coordinate.latitude);\n```\n\n\
    If you execute your application in the simulator, after a short delay you should\
    \ see output like this:\n\n```\n2011-08-24 15:50:51.133 locationExample[607:207]\n\
    Long 115.848930 Lat -31.952769\n```\n\nIt updates every time your location changes.\
    \ My simulator isn't fitted with a GPS, but if you have access to a network, then\
    \ the simulator determines the location where you are. I used Google Maps to test\
    \ this functionality, entering the latitude and longitude as a search string as\
    \ follows:\n\n```\n-31.952769, 115.848930\n```\n\nThis correctly returned my current\
    \ location in Australia, as shown in [Figure 10–1](#Chapter10.html#fig_10_1).\n\
    \n![images](images/1001.jpg)\n\n**Figure 10–1.** Using Google Maps to test the\
    \ simulated GPS\n\nYou can do other things when the event is fired, using the\
    \ `CLLocation` class. For example, you can calculate speed:\n\n```\ndouble gpsSpeed\
    \ = newLocation.speed;\n```\n\nYou can also look up the timestamp at which the\
    \ coordinate was taken, or view the altitude in meters above (positive) or below\
    \ (negative) sea level.\n\nThe .NET framework provides for similar capabilities\
    \ as part of its `System.Device.Location` namespace, although as you'd expect,\
    \ its implementation differs slightly. For example, you use the `GeoCoordinateWatcher`\
    \ object to acquire data from the .NET location service, similar to your delegate\
    \ class. The `CLLocation` class is replicated by the `GeoCoordinate` class in\
    \ .NET, providing similar properties relating to location. Finally, the `GeoPositionAccuracy`\
    \ property in .NET controls accuracy with the same effect on device performance,\
    \ but it has two options: default (optimized for accuracy and device performance)\
    \ and high accuracy.\n\nAs you can see, both SDKs have comparable features, and\
    \ converting the code semantics from one to the other is relatively straightforward.\
    \ You can find the .NET documentation at [http://msdn.microsoft.com/en-you/library/system.device.location.aspx](http://msdn.microsoft.com/en-you/library/system.device.location.aspx).\n\
    \nThe iOS SDK's equivalent is at [http://developer.apple.com/library/ios/#documentation/UserExperience/Conceptual/LocationAwarenessPG/Introduction/Introduction.html](http://developer.apple.com/library/ios/#documentation/UserExperience/Conceptual/LocationAwarenessPG/Introduction/Introduction.html).\n\
    \nThese are SDK-based capabilities, but other options always exist. If you are\
    \ developing a web-based application, you can also consider HTML 5's `GeoLocation`\
    \ capabilities."
