  raw: '#### Creating the Application Project


    You know the drill: Choose a location on your disk for the project and fire up
    Xcode. Create a project using the View-based Application project template. I named
    the project `LunarLander`. Create the following files:


    *   `LunarLanderAppDelegate` (`.h` and `.m` files)

    *   `LunarLanderViewController` (`.h`, `.m`, and `.xib` files)

    *   `MainWindow.xib` (which will use the `LundarLanderViewController.xib` view)


    These will provide our single application delegate, which will launch the view
    controller that will use the `LunarLanderViewController.xib` as the view for the
    game''s main menu. Your project structure should look like that shown in [Figure
    5–1](#Chapter05.html#fig_5_1).


    ![images](images/0501.jpg)


    **Figure 5–1.** *Initial LunarLander project files*


    Before we go any further, let''s add the main game view—again, a view controller
    and a view. To do this, choose `File` ![images](images/U001.jpg) `New` (or use
    the ⌘N shortcut), and from the Cocoa Touch iOS templates, choose a `UIViewController`
    subclass. On the next few screens presented, ensure it subclasses the `UIViewController`
    class and is given the name `GameViewController`. Also remember to check the “With
    XIB for user interface” option. We''ll use a NIB file to handle the game''s main
    user interface—at least the view canvas and static items. After doing this, your
    folder structure should resemble that shown in [Figure 5–2](#Chapter05.html#fig_5_2).


    ![images](images/0502.jpg)


    **Figure 5–2.** *LunarLander project with GameView class*


    These files will provide a sufficient foundation to start the core mechanics of
    our Lunar Lander application. Before we add any more files, let''s work with these
    initial files to start our game''s implementation. We''ll begin with the main
    menu view and some elements of our foundation architecture. Other resources will
    be added to the project as required, and we''ll extend the application''s logic
    as specific topics are introduced later in the book.


    #### Building the User Interface and Flow Logic


    The user interface uses the initial window, with a simple button that starts the
    game. We could also use this screen to display the high score and decorate it
    with pretty graphics. The main Lunar Lander view controller and XIB file will
    be used to manage this view. When the Start Game button is selected, it will load
    and display modally the game view with its own controller. This initial game screen
    is shown in [Figure 5–3](#Chapter05.html#fig_5_3), with the Start Game button
    already added.


    ![images](images/0503.jpg)


    **Figure 5–3.** *Initial Start Game screen*


    Our application delegate will be used to load this screen. As shown in [Listing
    5-1](#Chapter05.html#list_5_1), in the header file, we declare two properties(highlighted
    in bold): one of type `Window` and the other a pointer to the `LunarLanderViewController`
    class instance. We''ll use these in the application delegate code to display the
    window.


    **Listing 5-1.** *LunarLanderAppDelegate.h*


    `#import <UIKit/UIKit.h>`


    `@class LunarLanderViewController;`


    `@interface LunarLanderAppDelegate : NSObject <UIApplicationDelegate> {`


    `}`


    `@property (nonatomic, retain) IBOutlet UIWindow *window;`

    `@property (nonatomic, retain) IBOutlet LunarLanderViewController *viewController;`


    `@end`


    And then we provide a supporting implementation file, in the form of `LunarLanderAppDelegate.m`,
    as shown in [Listing 5-2](#Chapter05.html#list_5_2) (relevant code in bold). Here,
    you''ll notice we synthesize the properties, and in the `dealloc()` method, we
    free the member these resources are occupying.


    **Listing 5-2.** *LunarLanderAppDelegate.m*


    `#import "LunarLanderAppDelegate.h"`


    `#import "LunarLanderViewController.h"`


    `@implementation LunarLanderAppDelegate`


    `@synthesize window=_window;`

    `@synthesize viewController=_viewController;`


    `- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:`![images](images/U002.jpg)

    `(NSDictionary *)launchOptions`

    `{`

    `    // Override point for customization after application launch.`

    `    self.window.rootViewController = self.viewController;`

    `    [self.window makeKeyAndVisible];`

    `    return YES;`

    `}`


    `….. default implementation code goes here and is unmodified`


    `- (void)dealloc`

    `{`

    `    [_window release];`

    `    [_viewController release];`

    `    [super dealloc];`

    `}`


    `@end`


    The interesting part is in the `didFinishLaunchingWithOptions()` method, where
    we set the `rootViewController` instance variable of the main window to be that
    of our Start Game view controller (that is, the `LunarLanderViewController` class),
    and this is then made visible as per the default implementation.


    Although we start with this initial screen, it is the game view that will be used
    to manage the actual game playing. This very simple flow is shown in the diagram
    in [Figure 5–4](#Chapter05.html#fig_5_4).


    ![images](images/0504.jpg)


    **Figure 5–4.** *Game state flow*


    So, the `LunarLanderViewController.xib` file that we created earlier will have
    a simple user interface like that shown in [Figure 5–3](#Chapter05.html#fig_5_3).
    This screen has nothing other than a view (of type `UIView`) and a button (of
    type `UIButton`), with the text of the button saying “Start Game.” In .NET, this
    would be exactly the same as creating a form using `Windows.Forms` and placing
    a button on the screen.


    We will also need to attach an action for the button click to display and start
    the game. This is no different from how we started our simple actions in the previous
    chapters.


    Let''s now look at hooking up the Start Game button to an action that is meaningful—that
    is, loading our main game view so that you can provide a location for the actual
    game mechanics. First, take a look at [Listing 5-3](#Chapter05.html#list_5_3),
    which is the header file for the view controller that handles the start game interaction.


    **Listing 5-3.** *LunarLanderViewController.h*


    `#import <UIKit/UIKit.h>`'
  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n#### 创建应用程序项目\n\n\
    流程您应该很熟悉了：在磁盘上为项目选择一个位置，然后启动 Xcode。使用“基于视图的应用程序”项目模板创建一个项目。我将项目命名为 `LunarLander`。创建以下文件：\n\
    \n*   `LunarLanderAppDelegate`（`.h` 和 `.m` 文件）\n*   `LunarLanderViewController`（`.h`、`.m`\
    \ 和 `.xib` 文件）\n*   `MainWindow.xib`（它将使用 `LunarLanderViewController.xib` 视图）\n\
    \n这些文件将提供我们唯一的应用程序委托，它将启动视图控制器，该控制器将使用 `LunarLanderViewController.xib` 作为游戏主菜单的视图。您的项目结构应类似于图\
    \ 5-1 所示。\n\n![images](img/0501.jpg)\n\n**图 5-1.** *初始 LunarLander 项目文件*\n\n在继续之前，让我们添加主游戏视图——同样，一个视图控制器和一个视图。为此，请选择\
    \ `File` ![images](img/U001.jpg) `New`（或使用 ⌘N 快捷键），然后从 Cocoa Touch iOS 模板中选择一个\
    \ `UIViewController` 子类。在接下来的几个屏幕中，确保它继承自 `UIViewController` 类，并命名为 `GameViewController`。同时记得勾选“With\
    \ XIB for user interface”选项。我们将使用一个 NIB 文件来处理游戏的主用户界面——至少是视图画布和静态项。完成此操作后，您的文件夹结构应类似于图\
    \ 5-2 所示。\n\n![images](img/0502.jpg)\n\n**图 5-2.** *包含 GameView 类的 LunarLander\
    \ 项目*\n\n这些文件将为启动我们的 Lunar Lander 应用程序的核心机制提供足够的基础。在添加更多文件之前，让我们先使用这些初始文件来开始实现我们的游戏。我们将从主菜单视图和我们基础架构的一些元素开始。其他资源将根据需要添加到项目中，并且我们将在本书后续介绍特定主题时扩展应用程序的逻辑。\n\
    \n#### 构建用户界面和流程逻辑\n\n用户界面使用初始窗口，其中包含一个启动游戏的简单按钮。我们也可以使用此屏幕来显示最高分并用精美的图形装饰它。主\
    \ Lunar Lander 视图控制器和 XIB 文件将用于管理此视图。当选择“开始游戏”按钮时，它将加载并模态显示带有其自己控制器的游戏视图。这个初始游戏屏幕如图\
    \ 5-3 所示，其中已经添加了“开始游戏”按钮。\n\n![images](img/0503.jpg)\n\n**图 5-3.** *初始“开始游戏”屏幕*\n\
    \n我们的应用程序委托将用于加载此屏幕。如代码清单 5-1 所示，在头文件中，我们声明了两个属性（以粗体突出显示）：一个类型为 `Window`，另一个是指向\
    \ `LunarLanderViewController` 类实例的指针。我们将在应用程序委托代码中使用它们来显示窗口。\n\n**代码清单 5-1.**\
    \ *`LunarLanderAppDelegate.h`*\n\n```\n#import <UIKit/UIKit.h>\n\n@class LunarLanderViewController;\n\
    \n@interface LunarLanderAppDelegate : NSObject <UIApplicationDelegate> {\n\n}\n\
    \n@property (nonatomic, retain) IBOutlet UIWindow *window;\n@property (nonatomic,\
    \ retain) IBOutlet LunarLanderViewController *viewController;\n\n@end\n```\n\n\
    然后，我们提供一个支持性实现文件，即 `LunarLanderAppDelegate.m`，如代码清单 5-2 所示（相关代码以粗体显示）。在这里，您会注意到我们合成了这些属性，并在\
    \ `dealloc()` 方法中释放了这些资源所占用的成员。\n\n**代码清单 5-2.** *`LunarLanderAppDelegate.m`*\n\
    \n```\n#import \"LunarLanderAppDelegate.h\"\n#import \"LunarLanderViewController.h\"\
    \n\n@implementation LunarLanderAppDelegate\n\n@synthesize window=_window;\n@synthesize\
    \ viewController=_viewController;\n\n- (BOOL)application:(UIApplication *)application\
    \ didFinishLaunchingWithOptions:\n(NSDictionary *)launchOptions\n{\n    // 应用程序启动后的自定义覆盖点。\n\
    \    self.window.rootViewController = self.viewController;\n    [self.window makeKeyAndVisible];\n\
    \    return YES;\n}\n\n….. 默认实现代码在此，未经修改\n\n- (void)dealloc\n{\n    [_window release];\n\
    \    [_viewController release];\n    [super dealloc];\n}\n\n@end\n```\n\n有趣的部分在\
    \ `didFinishLaunchingWithOptions()` 方法中，我们将主窗口的 `rootViewController` 实例变量设置为我们的“开始游戏”视图控制器（即\
    \ `LunarLanderViewController` 类），然后按照默认实现使其可见。\n\n虽然我们从初始屏幕开始，但实际游戏玩法将由游戏视图来管理。这个非常简单的流程如图\
    \ 5-4 中的图表所示。\n\n![images](img/0504.jpg)\n\n**图 5-4.** *游戏状态流程*\n\n因此，我们之前创建的\
    \ `LunarLanderViewController.xib` 文件将有一个简单的用户界面，如图 5-3 所示。此屏幕除了一个视图（类型为 `UIView`）和一个按钮（类型为\
    \ `UIButton`）之外没有其他内容，按钮的文本显示为“Start Game”。在 .NET 中，这完全等同于使用 `Windows.Forms` 创建一个窗体并在屏幕上放置一个按钮。\n\
    \n我们还需要为按钮点击附加一个动作，以显示并启动游戏。这与我们在前几章中启动简单操作的方式完全相同。\n\n现在，让我们将“开始游戏”按钮连接到一个有意义的操作上——即加载我们的主游戏视图，以便您可以提供一个位置来处理实际的游戏机制。首先，请查看代码清单\
    \ 5-3，它是处理开始游戏交互的视图控制器的头文件。\n\n**代码清单 5-3.** *`LunarLanderViewController.h`*\n\
    \n```\n#import <UIKit/UIKit.h>\n```\n"
- fmt: '`// Inform the compiler that our GameViewController reference is to a class`

    `@class GameViewController;`


    `// Define the main class, or interface as it''s known in Objective-C, inheriting
    from`

    `UIViewController`

    `@interface LunarLanderViewController : UIViewController {`


    `    @private GameViewController *pgameViewController;`

    `}`


    `// Property we''ll use to refer to our ViewController`

    `@property (nonatomic, retain) GameViewController *gameViewController;`


    `// Event we''ll use to attach to the Start Game button for the user to commence
    game play`

    `-(IBAction)startGame:(id)sender;`


    `@end`


    The implementation is held in `LunarLanderViewController.m`, as shown in [Listing
    5-4](#Chapter05.html#list_5_4).


    **Listing 5-4.** *LunarLanderViewController.m*


    `#import "LunarLanderViewController.h"`

