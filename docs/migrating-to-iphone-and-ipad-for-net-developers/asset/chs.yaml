- '# 引言


  自从 1981 年我偶然发现并开始阅读第一本计算机书籍以来，我就知道信息技术（IT）将成为我生命中重要的一部分。能够将自己的热爱发展成事业，我感到无比荣幸；而
  IT 领域几乎每月都在变化，这意味着它永远不会变得乏味。至今我仍对移动电话在如此短的时间内取得的飞速进步感到惊叹；当 iPhone 问世时，我便意识到智能手机将在我们个人生活和职场生活的方方面面扮演关键角色。它们不仅是管理联系人列表或日历的有用工具，更已成为一种能完成各种事务的机制，比如购买电影票、通过社交媒体与朋友保持联系，以及玩游戏。


  然而，那些不了解 Objective-C 或 Xcode 的人，为何就无法享受这个精彩的世界呢？尤其是当你已经熟悉并热爱微软的.NET 和 C#，却不想局限于微软移动智能手机平台的时候。事情并非如此绝对——有大量选择摆在你面前，包括：通过本书了解
  C#与 Objective-C、Visual Studio 与 Xcode 4、.NET 框架与 iOS SDK 之间的异同；以及如何利用像 Mono 和 MonoTouch
  这样的第三方解决方案。


  本书正是为此而生。它将为你提供完成转型所需的一切信息，让你能够运用自身经验，自信地创建世界级的 iOS 应用程序。我甚至还会带你一步步完成将应用发布到苹果 App
  Store 的全过程。


  希望你喜欢这本书，并从中获得机遇。感谢你的阅读。


  '
- "# 第 1 章\n\n## 准备工作：苹果平台与技术上的工具与开发\n\n2007 年，在 Macworld Expo 的主题演讲中，苹果公司 CEO 史蒂夫·乔布斯宣布了两项重大改变：公司名称（从苹果电脑公司改为苹果公司）以及产品重心（从个人电脑转向移动电子设备）。在同一场发布会上，乔布斯还推出了两款新设备：iPhone\
  \ 和 Apple TV。前者永久性地改变了移动设备的格局以及消费者的移动设备体验。此后，苹果相继推出了第五代 iPhone，并凭借第二代平板电脑再次复制成功，销售了数百万台设备，创造了数十亿美元的收入。\n\
  \n苹果的成功可归因于设备的品质、拥有它们所带来的“酷感”以及直观的界面。但远比这些因素更重要的是 2008 年 App Store 的推出，以及随后日益丰富的廉价（通常免费）且有趣实用的应用程序，这使得苹果一跃成为移动市场的世界领导者。苹果在\
  \ 2011 年 7 月宣布，App Store 当时已拥有近 50 万款应用，下载次数达数十亿次；更重要的是，任何人都可以编写并提交应用以供销售和分发。所以，**你**也有可能创造出下一个像《愤怒的小鸟》那样人人都在玩的畅销移动应用！\n\
  \n那么，是什么阻止了你呢？只要熟悉苹果的 Xcode 开发工具集及其默认编程语言 Objective-C，就没有任何障碍。对于.NET 开发者及其他技术人员而言，这有时会成为入门壁垒。毕竟，虽然每个人都喜欢学习新事物，但这并不意味着你不想复用已有经验来更快地起步并上手。\n\
  \n在本书中，你将学习如何将你的技能从.NET 迁移到苹果开发框架，既使用苹果提供的工具，也利用全面的 iOS SDK 库。你还将了解一些利用.NET 及其他非苹果技术的第三方工具，这些工具可能更熟悉、更易于使用。这些第三方工具被引入市场，是为了给仅限苹果的工具集提供替代方案。虽然使用这些工具并非本书的重点，但我将介绍一些关键的第三方工具，并提供它们的基本入门概览。\n\
  \n本章提供了关于苹果开发框架的关键信息，以及一些替代方案。涵盖的主题包括：\n\n- 如何注册成为苹果开发者以及这样做的原因\n- 应用程序开发模型概述\n\
  - 苹果移动操作系统（iOS）及开发工具简介\n- 第三方方案巡览，包括 Mono 家族、DragonFire SDK、Titanium Mobile、Marmalade\
  \ SDK 和 Flash Professional CS5\n- App Store 简介以及如何销售你的新应用\n\n\n\n## 注册成为 Apple 开发者\n\
  \n在我们讨论任何软件开发工具包（SDK）或工具之前，你需要先注册成为 Apple 开发者。这不仅是必要的，因为你需要访问技术资源并获取关于开发运行在 iOS\
  \ 移动设备（iPhone、iPad 和 iPod touch）上的应用程序的信息，而且还因为你需要下载所需的工具，例如 iOS SDK 和 Xcode。**第\
  \ 2 章**的示例需要这些下载，因此强烈建议你现在就注册成为 Apple 开发者。\n\n要注册，请打开浏览器并导航至 [`http://developer.apple.com/programs/register`](http://developer.apple.com/programs/register)，你将看到与**图\
  \ 1–1** 类似的界面。\n\n![images](img/0101.jpg)\n\n**图 1–1.** *Apple 开发者注册主页*\n\n在此主页上，你会注意到“开始使用”的选项，并可以免费注册成为\
  \ Apple 开发者。选择此链接，然后按照说明创建一个新的 Apple ID 或使用现有的 Apple ID（例如，你可能已经通过使用 iTunes 拥有一个）。完成注册成为\
  \ Apple 开发者所需的步骤。\n\n成功注册成为 Apple 开发者后，你将能够访问许多在线资源，这些资源将为你提供一些必要的工具和支持。**表 1-1**\
  \ 列出了其中一些资源。\n\n![images](img/t0101.jpg)\n\n现在，你应该前往 iOS Dev Center 并下载免费的 iOS SDK，它包含了为你的\
  \ Apple 移动设备设计和开发应用程序所需的基本工具和库。这个磁盘映像（扩展名为 `.dmg`）同时包含了 Xcode 和 iOS SDK，因此文件非常大，你可能需要在等待下载时去喝杯饮料。或者，你也可以选择下载较旧版本的\
  \ Xcode，这是免费的，尽管它对于可以支持的 Apple iOS 版本有一定限制。\n\n此时，你可能会想知道注册 Apple ID 并下载免费 SDK，与支付\
  \ 99 美元注册成为官方 iOS 开发者并访问最新版本 Xcode 之间的区别。自 Xcode 4 发布以来，Apple 已规定你必须在 Apple Developer\
  \ Connection (ADC) 网站上注册为 iOS 开发者才能访问它，而这需要每年支付 99 美元的费用。\n\n**注意：** 如果你只是想先尝试一下\
  \ Xcode 4，再决定是否投入，你可以通过 Mac App Store 安装 Xcode 4，费用仅为 4.99 美元——便宜得多。然而，这两种方案的关键区别在于，使用\
  \ App Store 版本，你无法将软件部署到物理设备上进行测试、无法将应用提交到 App Store 发布，也无法访问某些在线资源。因此，一旦你感到熟悉，并计划开发你的“必备”Apple\
  \ 应用时，你可能就想要投入完整版本了。\n\n但你需要哪个版本？嗯，这在很大程度上取决于你将使用哪种机制来编写你的 iPhone 或 iPad 应用程序。我们将研究使用多种不同方法编写应用程序，但主要关注\
  \ Objective-C 语言。\n\n我编写这本书的计划是针对最新的 Apple 移动设备，并且我想展示最新的工具选项。因此，此处的示例使用的是撰写时可用的最新版本\
  \ Xcode：Xcode 4。该版本在可用性和生产力方面有显著改进。这些改进使其与微软自家的 Visual Studio 更加接近。因此，虽然旧版本的 Xcode\
  \ 可能也能用并且免费，但我建议你使用更新的版本，并投资支付所需的费用来开始。\n\n## 应用开发注意事项\n\n无论你是使用 Apple 自有的原生工具还是第三方工具，在开发过程中都需要牢记某些原则。这些原则将有助于确保你编写获奖应用的之路顺畅，或者至少更顺畅。我们将讨论的每个选项都是围绕一些总体原则开发的，这些原则既指导又限制了它们的工作方式以及最终应用的执行方式，尤其是在第三方选项的情况下。\n\
  \n### 通用开发原则\n\n无论你使用的是 Apple 自身的原生资源还是第三方资源，以下原则都是通用的：\n\n*   **设计模式**：许多框架都使用众所周知的设计模式来实现你的应用程序。例如，模型-视图-控制器\
  \ (MVC) 设计模式非常常见，因此理解这种模式的工作原理将对你大有帮助。\n*   **许可**：了解第三方应用的许可模式如何运作，以及当你注册使用这些应用提供的工具时可能强加的任何限制或条件，也是值得的。同时也要注意\
  \ Apple 的 App Store 政策可能施加的任何限制。\n*   **设备兼容性**：为某款设备编写应用程序并不意味着它能自动在另一款设备上运行或以相同方式运行。花些时间去了解这些限制和差异，并在适用的情况下为多设备场景设计你的应用。这些差异将在后续章节中相关内容处加以强调。例如，iPad\
  \ 的屏幕空间比 iPhone 更大，我们将在 **第 6 章** 中探讨这一点，届时我们将研究如何增强用户界面。\n\n### 第三方开发原则\n\n以下原则通常适用于所有非原生的移动应用开发解决方案，本章稍后将对此进行描述：\n\
  \n*   **API 限制**：与许多操作系统抽象技术一样，你用于编写移动应用的工具所暴露的 API 通常是不完整的，因此它要么只实现了原生 iOS SDK\
  \ 可用 API 的一个子集，要么甚至提供了不同的 API 调用。通过遵循所提供的文档和指导，花时间了解 API、其限制以及应如何使用它。\n*   **前提条件**：重要的是要注意，并非所有第三方产品都能与最新版本的\
  \ Apple 原生工具配合使用。花些时间了解任何前提条件，并确保下载你的工具所需且支持文档中指明的组件。硬件也有前提条件。某些选项仅在 Mac OS X 操作系统上运行。因此，请确保你拥有正确的硬件，尤其是在花钱之前！\n\
  *   **成本**：并非所有选项都是免费的，有些选项有局限性。随着应用程序开发的进行，你可能需要购买额外的“捆绑包”。\n\n你需要了解这些原则，不仅要理解它们如何运作，还要理解它们输出的应用类型以及它们使用的应用模型范式。\n\
  \n**注意：** 第三方工具可能会简化开发过程，但有时会以不支持原生应用或损害性能为代价。在本章，以及在 **第 3 章** 更详细的介绍中，我将提供信息，帮助你决定哪些选项最适合你的需求。\n\
  \n### 应用方法\n\n应用开发可分为两种应用范式之一：**Web 应用** 或 **原生应用**。理解这些类型将让你更好地为应用开发做准备。你需要了解每一种的限制以及对调试和分发等开发阶段的影响。\n\
  \n\n\n#### Web 应用\n\n利用 Web 范式开发应用程序的选项依然存在，并且始终是一种选择。在此范式下，应用程序托管在移动设备之外，并利用苹果移动浏览器\
  \ Safari 的隐含功能来执行代码，提供所需的用户界面和功能。当然，这限制了你能构建的应用程序类型、其功能的丰富程度、可实现的功能，以及应用程序的访问和分发方式。\n\
  \n例如，基于浏览器的应用程序仅在具备网络连接时可用，但在某些情况下，这可能是相当合适的。假设你想面向众多设备，而又不必过分依赖它们操作系统所提供的功能。这种情况下，你可能会考虑基于\
  \ Web 的应用程序。是的，它可能需要网络连接，但如果你的应用程序需要通常仅由 Web 浏览器提供的功能，例如 `HTML` 或 `JavaScript`，那么\
  \ Web 应用可能就足够了。然而，苹果以其丰富、直观且交互性强的用户体验为傲，而利用苹果设备及其操作系统的能力来提供这种体验要容易得多。但需要注意的是，公平地说，随着浏览器体验的不断发展和新技术的引入，Web\
  \ 应用与原生应用之间的差距正在显著缩小！\n\n#### 原生应用\n\n基于 Web 的应用程序的替代方案是原生应用，这也是本书的重点。我们将探讨那些下载并驻留在移动设备本身上的应用程序，它们使用苹果自己的工具（`Xcode`\
  \ 和 `iOS SDK`）或第三方供应商的工具编写而成。\n\n既然我们已经介绍了基本的开发原则和方法，接下来我们将关注一些围绕使用苹果工具进行应用程序开发的核心概念，然后查看可用于应用程序开发的第三方选项。我们将在本书中讨论这些选项，并指导你通过不同的机制来创建应用程序。\n\
  \n## Apple 平台与技术\n\n苹果提供了多种开发资源，让你能够面向其众多设备或平台。这些包括 Mac（通过 Mac OS X 操作系统）、Safari\
  \ 浏览器，当然还有苹果的移动设备。本节将介绍基本概念，然后更详细地讨论 iOS 和苹果工具集。\n\n### Apple 术语与概念\n\n让我们从你在开始旅程之前应该认识到的一些关键术语开始，为你后续章节将了解的细节提供一些背景。我希望在你了解第三方选项（如果有的话）如何与苹果的核心平台和技术进行交互之前，你能够在脑海中建立起关于这些核心概念的整体图景。\n\
  \n![images](img/t0102.jpg)\n![images](img/t0102a.jpg)\n\n图 1-2 是一个以逻辑顺序呈现这些概念的示意图（俗语说，“一图胜千言”）。随着本章内容的推进，我将以此图为基础，将我们遇到的每个概念相互关联起来，并解释它们的目的和关系。该图代表了所提供的各个“层”，而方框的边界不应被视为你唯一可用的接口。随着我介绍每个核心层，这一点将变得更加清晰。\n\
  \n![images](img/0102.jpg)\n\n**图 1-2.** *苹果移动应用程序开发框架*\n\n正如你在图 1-2 中所见，在 iOS 之上的是\
  \ `iOS SDK` 和带有 Touch 扩展的 `Cocoa API`。Bridge 技术是另一个 API，它提供了将这些资源与非苹果的及解释型语言（如 Perl、Python\
  \ 和 Ruby）链接起来的框架。最后，Xcode 工具套件提供了图形用户界面（GUI），用于使用通过集成开发环境（IDE）提供的编程语言、API 和库——所有这一切都运行在你的\
  \ Apple Mac 计算机之上。\n\n现在，即使还没有掌握开发的方法或模式，你也应该对与苹果移动设备开发相关的一些高级概念感到熟悉，并理解这些核心组件之间的某些关系。你还应该已经下载了\
  \ `iOS SDK`，尽管我们要到下一章才会使用它。\n\n构建和运行移动应用程序需要 iOS 及其相关的 SDK。让我们从高层次上来审视它们。这将帮助你理解不同移动设备的一些复杂性，并为你进一步了解操作系统功能如何被其上的\
  \ API 和 SDK 所访问提供背景信息。\n\n\n\n### 了解 iOS\n\niOS 最初为 iPhone 开发，源自 Mac OS X，是苹果移动设备（包括\
  \ iPhone、iPod touch 以及后来的 iPad）的核心操作系统。与大多数操作系统一样，iOS 采用分层方式来提供必要的功能。每一层都构建在另一层之上，并在各层之间提供了清晰的抽象边界。iOS\
  \ 内部的分层结构如图 1-3 所示。\n\n![images](img/0103.jpg)\n\n**图 1-3.** *iOS 架构*\n\n让我们从堆栈的底部开始，首先处理底层服务，然后逐步向上，直至那些我们将直接与之交互并用于构建\
  \ iOS 应用程序的要素。\n\n**核心 OS**：该层提供了对物理硬件的抽象，并包含了供其上层使用的底层特性。该层的每个元素都以一系列框架的形式提供：Accelerate\
  \ 框架、External Accessory 框架、Security 框架和 System 框架。在此语境下，*框架* 是一组提供该框架功能的关联 API 的集合。随着本书的深入，我们将更详细地探索这些框架及其暴露的\
  \ API，并演示如何使用它们的示例。\n\n**核心服务**：核心服务层构建于核心 OS 层之上，包含了应用程序所需的基本系统服务。该层被划分为一组核心服务，它们共同提供一系列必要的高级特性。其中一些服务提供编程支持（语言支持、数据类型等）、数据管理支持以及电话功能。\n\
  \n**媒体层**：顾名思义，该层提供图形、音频和视频支持。其任务是提供通过所用设备可获得的最佳多媒体支持。这一层包含的框架提供了核心音频、图形、文本、视频和\
  \ MIDI 支持，以及动画、媒体播放等更多功能。\n\n**Cocoa Touch 层**：该层为构建应用程序提供支持和关键构建模块，包括多任务处理、基于触摸的输入、通知以及用户界面支持。该层还支持文件共享和打印，以及用于无线连接的点对点服务。\n\
  \n尽管大部分此类功能都被打包到被称为*框架*的特定库中，但并非所有层和所有功能都如此。例如，核心 OS 和核心服务层中的某些专用库是作为动态链接库（DLL）提供的，并带有符号链接，用于将\
  \ iOS 指向设备上的最新版本。这类技术对于管理代码很常见，我们将在第 2 章讨论版本控制时更详细地探讨它们。\n\n**注意：** 在此，我将介绍每个框架中的关键概念，并提供工作示例来说明其用法。有关\
  \ iOS 框架及其支持的 iOS 版本的更多详细信息，可在 iOS 开发者库文档中找到。\n\n### 使用苹果组件进行应用程序开发\n\n现在，您应该对操作系统、构成它的各个层次及其提供的功能有了大致的了解。在深入探讨\
  \ iOS SDK 的细节之前，让我们先回顾一下使用苹果组件进行软件开发的一些历史。\n\n当 iPhone 最初发布时，您有两个选择：使用原生工具和语言，如\
  \ Objective-C 和 Mac OS X；或者使用在移动版 Safari 浏览器中执行的基于 Web 的应用程序。后者自然局限于 HTML、层叠样式表（CSS）和\
  \ JavaScript 等语言。如今这仍然是一个有效的开发选择，但在可实现的功能和用户体验方面有所限制。\n\n第二代 iPhone 的发布引入了 iOS SDK、苹果\
  \ App Store，以及使用 Xcode 和 Objective-C 编写原生应用程序的能力。这实际上提供了对 iOS（进而对 iPhone 功能）的完全访问权限，也满足了在\
  \ App Store 分发时强制要求使用原生二进制文件的选项。\n\n使用 iOS SDK（以及 Xcode 和 Objective-C）仍然是可行的，并且确实被一些人视为应用程序开发的标准机制。然而，开发人员可能也希望创建能在许多移动设备（不仅仅是苹果设备）上运行的应用程序。或者，他们可能偏爱苹果移动设备但不喜欢\
  \ Mac OS X，又或者他们不喜欢被强制的开发工具和语言。鉴于这些原因，正如我们将在本书中讨论的，已经引入了许多替代方案。在某些情况下，这些选项至少部分依赖于\
  \ iOS SDK。\n\n好了，历史讲得够多了。现在让我们来看看使用苹果提供的工具进行应用程序开发的可用选项。苹果提供了以下用于开发应用程序的核心组件：\n\n\
  *   **Xcode**：这是一套由苹果开发的工具套件，用于为 Mac OS X（用于 iMac、MacBook 等）和 iOS 创建软件。\n*   **iOS\
  \ SDK**：这是苹果发布的 SDK，允许开发人员为苹果移动设备和 Apple TV 制作应用程序。\n\n#### Xcode\n\n在撰写本文时，Xcode\
  \ 的最新版本是 Xcode 4，可在 Mac App Store 上以 4.99 美元的价格购买，已注册为苹果开发者的用户也可从苹果开发者连接网站获取，但需支付\
  \ 99 美元的年费。Xcode 3 版本仍然免费提供（不过，可以预见，其支持的 iOS 版本是受限的）。\n\nXcode 自带以下组件：\n\n*   **IDE**：`Xcode`\
  \ 是苹果的标准 IDE，允许您为 Mac OS X 和 iOS 操作系统开发软件。它支持多种编程语言，并提供专业 IDE 所应有的许多功能，例如语法高亮、自动补全、调试和源代码控制。它可以与业界其他广受青睐的\
  \ IDE（如 Eclipse 和微软的 Visual Studio）相媲美。\n*   **Interface Builder**：自从 Xcode 4 发布以来，Interface\
  \ Builder 已从一个单独的应用程序完全集成到 `Xcode` IDE 中，但其目的保持不变：提供一个辅助创建用户界面的工具。它通过一个支持 Cocoa\
  \ 等框架的 GUI 来实现这一点，并提供一个用户界面对象和控件的调色板，供您根据需要拖放到画布上。您甚至可以更进一步，为这些控件（例如按钮点击）的事件提供源代码实现。\n\
  *   **编译器**：编译器是一个基本组件。它接收您的源代码并生成为在移动设备上执行以及为在 App Store 上执行所需的二进制文件。苹果的 `LLVM`（来自\
  \ LLVM.org 项目）是一个快速、功能丰富的编译器，可为您的移动设备创建优化的应用程序。它支持多种语言，包括 C、C++ 和 Objective-C。\n\
  *   **调试器**：这是苹果对 LLVM.org 开源项目的另一贡献，作为 `Xcode` 一部分提供的这个调试器快速高效。它提供了一个集成的调试界面，包含栈跟踪和逐步调试等常见功能，同时也支持全面的多线程调试。\n\
  \n\n### iOS SDK\n\niOS SDK 是苹果公司于 2008 年推出的软件开发工具包，旨在让你能够为 iOS 操作系统开发原生应用。iOS SDK\
  \ 被划分为若干集合，分别对应 iOS 框架中提供的各层（见本章前面的图 1-3）。具体包括以下内容：\n\n*   Cocoa Touch\n    *  \
  \ 多点触控事件与控制\n    *   加速计支持\n    *   视图层级\n    *   本地化\n    *   相机支持\n*   媒体\n  \
  \  *   OpenAL\n    *   音频混合与录制\n    *   视频播放\n    *   图像文件格式\n    *   Quartz\n \
  \   *   核心动画\n    *   OpenGL ES\n*   核心服务\n    *   网络\n    *   嵌入式 SQLite 数据库\n\
  \    *   核心定位\n    *   并发\n    *   核心运动\n*   OS X 内核\n    *   TCP/IP\n    *   套接字\n\
  \    *   电源管理\n    *   线程\n    *   文件系统\n    *   安全\n\n除了 Xcode 工具链，该 SDK 还包含 iPhone\
  \ 模拟器，这是一个用于在开发者桌面上模拟 iPhone 外观和操作体验的程序。该 SDK 要求使用运行 Mac OS X Snow Leopard 或更高版本的\
  \ Intel Mac。其他操作系统，包括 Microsoft Windows 和更早版本的 Mac OS X，均不受支持。更多信息可在 iOS Dev Center\
  \ 网站上找到。\n\n### 第三方选项\n\n长期以来，在苹果移动设备上开发应用程序却只能依赖苹果公司的工具，这让许多人感到不满。这并非反映苹果提供的工具在质量或功能上有何不足——事实恰恰相反。它们是极其强大和高效的工具，能让你利用其团队开发功能，无论是单独开发还是团队协作，都可以为苹果的桌面和笔记本电脑（iMac、MacBook\
  \ 和 MacBook Pro）以及移动设备（iPhone、iPod touch 和 iPad）进行开发。\n\n但是，人毕竟是人，我们会对熟悉的事物感到舒适。我们喜欢熟悉感。那些在截然不同的操作系统、技术和工具环境下成长起来的人，可能不愿改变，也看不到改变的必要。例如，如果你是一名\
  \ Java 开发者，你可能会热爱 Java 编程语言以及你正在使用的 Eclipse（或类似）IDE。假设你是一名 .NET 开发者，那么你很可能会接触到其他语言。虽然本书的重点是弥合\
  \ .NET 与苹果工具集之间的差距，但了解你可以使用的第三方选项，很可能会为你提供相关的背景知识。如果你只接触过 Microsoft .NET，那么你对 Visual\
  \ Studio 和 .NET Framework 等工具的熟悉程度，将有助于你顺利完成这次转型。\n\n无论你的经验是基于微软平台还是更为混杂，你或许也对 Windows\
  \ 或 Linux 操作系统感觉更自在，因此对于为了开发应用程序而去学习一个新的操作系统感到犹豫。“毕竟，”我听到许多人争辩道，“最重要的始终是移动设备及其操作系统，而不是你通过什么方式去开发它们。”\n\
  \n那么，如何才能最好地利用你已有的经验以及现有的一切，让你的转型更加顺利呢？我猜你并不害怕学习新东西——毕竟，这很有趣——但你更愿意重用你已经熟悉的开发环境中的某些元素，具体来说，就是\
  \ .NET。这一点并未被忽视，一些开源项目和商业组织已经尝试解决这个问题并从中获利。现在有很多可选的方案，有些场景可能比其他场景更适合你，例如 Mono 就提供了一个开源且对苹果友好的\
  \ .NET 实现。其他方案，虽然并非专注于 .NET，但对于帮助你完成转型也很有意义，即使你最终选择忽略它们而坚持使用苹果自己的 SDK 和工具。在此，我们将快速了解以下第三方选项：\n\
  \n*   Mono\n*   Appcelerator 的 Titanium Mobile\n*   Marmalade SDK\n*   Flash Professional\
  \ CS5\n\n#### Mono 家族\n\nMono 是一个开源（由社区构建）的 .NET Framework 及相关组件的实现，适用于 Windows\
  \ 以外的平台。Mono 环境可分为核心 Mono 环境以及提供增强功能的附加组件。在为苹果移动设备开发应用程序时，你可以将 Core Mono 视为基础，而\
  \ MonoTouch 等附加组件构建于此基础之上，从而构成完整的家族。\n\nMono 家族包含多个在开发应用程序时至关重要的组件：编译器、框架和支持工具。这些组件分别被称为\
  \ Core Mono（编译器和运行时）、MonoTouch（Cocoa Touch 的 .NET 实现）和 MonoDevelop（IDE）。\n\n#####\
  \ Core Mono\n\n作为 Mono 开发环境的核心部分，Core Mono 提供了一个支持多种编程语言的编译器，包括 C#。它包含一个通用语言运行时（CLR）的实现，更重要的是，它提供了一套全面的\
  \ API 来实现 .NET Framework。具体来说，Core Mono 包含了 .NET Framework 类库的实现，这是一组提供 Mono 版 .NET\
  \ Framework 类库的库。\n\n##### MonoTouch\n\nMonoTouch 提供了苹果自家 Cocoa Touch 库的 .NET 实现。它允许开发者创建基于\
  \ C# 和 .NET 的应用程序，这些应用程序可以运行在苹果的 iPhone、iPad 和 iPod touch 设备上，同时还能利用 iPhone API、重用为\
  \ .NET 构建的代码和库以及已有的开发技能。现在看来显而易见，但 MonoTouch 的推出堪称神来之笔。它将苹果提供的 Cocoa Touch API 中的\
  \ Objective-C 和 C API 绑定到了 C#/通用中间语言（CIL）API 上。除了作为 Mono 一部分的核心基类库之外，MonoTouch 还为各种\
  \ iPhone API 提供了绑定，使开发者能够使用 Mono 创建原生 iPhone 应用程序。MonoTouch 是如何做到这一点的呢？\n\nMonoTouch\
  \ 的核心是一个互操作（interop）引擎，它为 Cocoa Touch API 提供了绑定，包括 Foundation、Core Foundation 和\
  \ UIKit。这还包括图形 API，例如 Core Graphics 和 OpenGL ES。\n\n尽管 MonoTouch 为 Cocoa Touch API\
  \ 提供了桥梁，但还有一个名为 MonoMac 的 Mono 实现，旨在让你能够为 Mac OS X 操作系统编写应用程序，它采用了相同的原理。事实上，在撰写本文时，一个新版本的\
  \ Mono 让你能够运用相同的原理，使用 MonoDroid 来编写 Android 操作系统应用程序（尽管这还处于非常早期的开发阶段）。\n\n\n\n###\
  \ MonoDevelop\n\n虽然完全可以使用 Core Mono 附带的命令行工具，而且有人会认为硬核程序员只使用命令行工具，但我个人很感激增强工具带来的一些帮助。如今，以某种图形化工具形式出现的\
  \ IDE 已经无处不在。那些看过或使用过微软开发工具 Visual Studio 的人会知道，通过此类工具，编写应用程序的整个体验变得更容易、更快捷。幸运的是，Mono\
  \ 也不例外，`MonoDevelop` 工具作为一款出色的 IDE，非常适合我们的需求。\n\n如图 Figure 1–4 所示，`MonoDevelop`\
  \ 在 Mac OS X 操作系统上运行。实际上，它可以在多种操作系统上运行，包括各种 Linux 发行版和 Windows。\n\n![images](img/0104.jpg)\n\
  \n**Figure 1–4.** *在 Mac OS X 上运行的 MonoDevelop 应用程序*\n\n在第 3 章中，我们将探讨 `MonoDevelop`，以及\
  \ Mono 框架和 `MonoTouch`。您将获得一个教程，了解如何使用这些组件和 .NET Framework 为 Apple 的移动设备安装、使用和开发您自己的应用程序。\n\
  \n`MonoTouch`（包括 Core Mono）可以从[`http://www.monotouch.net`](http://www.monotouch.net)\
  \ 下载，`MonoDevelop` 可以从[`http://www.monodevelop.com`](http://www.monodevelop.com)\
  \ 获取。\n\n### DragonFire SDK\n\n我们已经了解了 Apple 的原生开发环境以及 Mono 对使用 .NET Framework 进行应用程序开发的支持，但这可能仍然对您有限制。例如，如果您选择的编程语言是\
  \ C 或 C++ 怎么办？虽然 `Objective-C` 是 Mac 操作系统的一部分，但从语法上讲，它相当不同，而且您可能不想局限于 Mac OS X。`DragonFire\
  \ SDK` 产品正是为此目的而创建的。\n\n`DragonFire` 的目标是那些希望使用 `Visual C++`、其调试器和 C/C++ 语言编写原生\
  \ iPhone 应用程序的 Windows 开发人员。它不需要任何类型的 Mac，也不需要熟悉 `Objective-C`。正如其网站上所说：“用标准的 C/C++\
  \ 将您的应用创意变为现实，并且永远无需离开您的 Windows 平台。”\n\nFigure 1–5 展示了 `Dragonfire SDK` 与 Apple\
  \ 现有移动应用程序开发框架的比较。\n\n![images](img/0105.jpg)\n\n**Figure 1–5.** *DragonFire SDK\
  \ 框架*\n\n其目标是允许在 Windows 中编写和调试 2D 游戏，并且完全符合通过 Apple App Store 进行分发的标准。虽然这对于编写游戏来说很棒，但您可能会发现该\
  \ API 在其他方面有所欠缺。例如，作为一个 API，它不如 Apple 自己的 API 完整——例如，它缺乏对基于位置的 API 的完整支持——但它正在不断增强。`DragonFire\
  \ SDK Enterprise Edition` 正在推出（在撰写本文时，建议该版本将于 2011 年底推出），此版本将支持数据库，以及更多的拖放功能和用于显示文本和图形的选项。\n\
  \n`DragonFire` SDK 的独特之处在于，一旦您使用其 API 编写了应用程序并使用屏幕模拟器（记住，所有这些都在 Windows 操作系统上）进行了测试，那么您就可以按照说明打包您的应用程序，并通过网站上传以进行编译，如果需要，还可以进行\
  \ iTunes App Store 捆绑。\n\n`DragonFire SDK` 可从其官方网站 [`http://www.dragonfiresdk.com/`](http://www.dragonfiresdk.com/)\
  \ 商业购买。据其作者称，它相对便宜，并且针对“周末项目”。我让您自己决定是否喜欢它，但它确实消除了其他选项的一些复杂性。并且它是唯一一个允许在 Windows\
  \ 平台上进行完整的 iPhone、iPod touch 和 iPad 开发的选项。\n\n**注意：** 我不会在本书中详细介绍 `DragonFire SDK`。它的结构与我将介绍和演示的其他一些第三方工具类似。我将把玩\
  \ `DragonFire SDK` 的乐趣留给您。\n\n### Appcelerator 的 Titanium Mobile\n\nAppcelerator\
  \ 的 `Titanium Mobile` 是一个开源应用程序开发平台。与 `DragonFire SDK` 可用于使用 C/C++ 编写原生 iPhone 应用程序类似，Appcelerator\
  \ 的 `Titanium Mobile` 产品允许您使用 Objective-C（iPhone 和 iPad）和 Java（Android）以外的语言编写 iPhone、iPad\
  \ 和 Android 应用程序。\n\n`Titanium Mobile` 具有类似于 Mono 的方法，即采用众所周知的语言（在这种情况下，包括 HTML、CSS\
  \ 和 JavaScript 在内的各种语言）并提供将这些语言绑定到原生 API（在这种情况下是 iOS SDK）的 API。Figure 1–6 说明了其与其他选项相比的架构。\n\
  \n![images](img/0106.jpg)\n\n**Figure 1–6.** *Titanium Mobile 框架*\n\n`Titanium Mobile`\
  \ 与 Mono 的不同之处在于它处理您用喜爱的语言编写的定制代码的过程。您的原始代码经过处理，并最终通过一系列步骤转换为本机可执行代码，这些步骤涉及针对其自身\
  \ API 进行预处理和编译为本机代码，然后将本机代码编译为本机可执行文件。这些步骤在 Figure 1–7 中进行了说明，该图显示了从编写代码到可执行文件的生命周期，该可执行文件已准备好进行测试，并最终通过\
  \ App Store 分发。\n\n![images](img/0107.jpg)\n\n**Figure 1–7.** *Titanium Mobile 处理阶段*\n\
  \nAppcelerator 的 `Titanium Mobile` 可从其官方网站 [`http://www.appcelerator.com/`](http://www.appcelerator.com/)\
  \ 获取。对于个人使用或在小型组织（少于 25 名员工）内使用它是免费的，并且针对 25 人及以上和 100 人及以上的企业用户提供不同版本。它不仅有针对移动开发的版本，还有针对桌面、商业、分析等领域的版本。\n\
  \n第 3 章提供了一个教程，介绍如何下载、安装和使用该产品来创建 iPhone 应用程序。在该章中，我们将更深入地了解 `Titanium Mobile` 包的功能，并讨论其优缺点。\n\
  \n\n\n## Marmalade SDK\n\n当开始介绍 Marmalade SDK 时，你会发现这些应用开发平台（无论是商业的还是开源的）在实现方式上呈现出一种共同的主题。Marmalade\
  \ 与 `Mono` 和 `Titanium Mobile` 包在许多方面相似，区别在于它只支持 C++。不过，它确实支持在 Windows 和 Mac OS\
  \ X 操作系统上进行开发，并允许你为 iOS 操作系统创建原生移动应用。事实上，该产品还允许你编译适用于其他操作系统的应用，例如 Android、Symbian、Windows\
  \ Mobile 6.*x* 以及游戏主机！\n\nMarmalade 包由两个主要组件构成：\n\n*   *Marmalade System*：Marmalade\
  \ System 是一个操作系统抽象 API，连同相关的运行时库和应用构建系统。它提供了原生操作系统 API 与你编写的代码之间的绑定，其方式与 `Mono`\
  \ 和 `Titanium Mobile` 相同。\n*   *Marmalade Studio*：这是一套专注于高性能 2D/3D 图形和动画的工具与运行时组件集。\n\
  \n该包允许你在 Windows 上使用 Visual C++ 或在 Mac OS X 上使用 Xcode，利用所提供的 API 编写应用程序。然后，它支持一个两阶段的部署流程。在第一阶段，你编译用于调试的应用程序。这会创建一个\
  \ DLL（`.dll` 文件），需要 Marmalade 模拟器来执行。然后，当你的应用程序令你满意时，你可以将代码编译成原生可执行文件以供分发。\n\n图\
  \ 1-8 展示了 Marmalade 架构与我们目前讨论过的其他包的关联。\n\n![images](img/0108.jpg)\n\n**图 1-8.**\
  \ *Marmalade SDK 框架*\n\n为了使用该 SDK，你必须在网站上注册一个账户，届时你将获得一个评估许可证。然后，任何注册用户都可以下载功能齐全的\
  \ Marmalade SDK 评估版本。评估版本允许部署到所有平台，但不允许公开发布应用程序。你可以从 [`http://www.madewithmarmalade.com`](http://www.madewithmarmalade.com)\
  \ 购买最新版本的 Marmalade SDK。\n\n## Flash Professional Creative Studio 5\n\n最后但同样重要的是\
  \ Adobe 的 Flash 平台，这可以说是这里给出的最完整的解决方案，部分原因在于其在市场上的成熟度以及早在 2010 年 Apple 解除对其第三方开发者指南的限制时，为支持\
  \ iPhone 所做的工作。它允许你使用附带的 Packager for iPhone（包含在 Adobe Flash Professional Creative\
  \ Studio (CS) 5 中以及 Adobe Labs 的 AIR SDK 中）为 iPhone、iPod touch 和 iPad 构建独立应用程序。\n\
  \nFlash Professional CS5 的工作方式与其他包类似，允许你使用熟悉的语言（在此例中是 ActionScript）开发应用程序。你针对附带的\
  \ API（AIR 和 Flash Player API）对其进行编译，生成原生的 iPhone 应用程序，这些程序即可用于测试和部署。\n\n图 1-9 展示了\
  \ Flash Professional CS5 架构，同样与本章中我们讨论过的其他架构进行比较。\n\n![images](img/0109.jpg)\n\n\
  **图 1-9.** *Adobe Creative Suite 5 框架*\n\n这个选项是迄今为止最全面的解决方案，但也是有代价的——无论是财务上，因为 Adobe\
  \ 的 Creative Studio 并不便宜，还是复杂度上，因为该产品及其庞大的 API 并非易于理解。出于这个原因，本书不涵盖此选项。但在了解了其他可用选项后，如果你愿意，你应该已经做好了尝试\
  \ Flash Professional CS5 的充分准备。\n\n## App Store 概述\n\nApp Store 是由 Apple 开发和维护的、针对\
  \ iOS 设备的数字应用分发平台。通过 iTunes Store（可通过互联网或设备本身访问），Apple 允许服务用户浏览和下载应用程序，并按需付费。应用程序可以直接下载到设备，或者如果合适，可以先下载到桌面再传输。\n\
  \nApp Store 可通过多种设备访问，包括 iPhone（如图 1-10 所示）、iPod touch 和 iPad。对于 Mac 笔记本和桌面用户，Mac\
  \ App Store 在更晚些时候推出，以服务于非移动应用程序。\n\n![images](img/0110.jpg)\n\n**图 1-10.** *iPhone\
  \ 4 上的 App Store*\n\nApp Store 对 Apple 和应用程序生产商来说都取得了巨大的成功，第 10 亿次应用下载的里程碑早在 2009\
  \ 年就已突破。如前所述，这一概念已被其他组织模仿，最显著的是其他主要的移动服务提供商。图 1-11 展示了这些平台的全球收入份额。Apple 的主导地位显而易见。\n\
  \n![images](img/0111.jpg)\n\n**图 1-11.** *全球移动应用商店收入*\n\n### 在 App Store 销售应用\n\n\
  App Store 的收入模式是分摊销售额：Apple 获得 30%，应用发布商获得 70%（此比例随时可能变更）。事实证明，这一模式对 Apple 和许多应用生产商都极其有利可图。术语\
  \ *app*（application 的简称）也被更广泛地使用，尽管 Apple 已为该术语获得商标权，但其他人（如 Google 的 *Google Apps*\
  \ 和 Amazon）也在类似语境中使用它。\n\n**注意：** 所有原生应用只能通过 App Store 合法地下载到 Apple 移动设备上，除非设备已越狱。*越狱*\
  \ 设备指的是使用能够访问设备根文件系统的过程，从而允许修改和安装第三方软件组件。这并不违法，尽管 Apple 对此话题很敏感，并声明可能会“使设备的保修失效”。越狱不需要对硬件进行任何更改，并且很容易撤销。\n\
  \n最近，Apple 宣布了其新的基于订阅的服务，允许应用发布商设置订阅的时长和价格。此前，这是不可能的，你必须以逐个版本的方式销售每个版本。新服务允许发布商通过其应用销售内容，用户可以在指定时间段内接收新内容。\n\
  \n一个更重要的变化是，不仅传统的通过 iTunes 销售的模式仍然可用，Apple 还允许应用发布商直接从自己的网站分发其订阅，在这些网站上，iTunes 的收入模式不适用，因此无需与\
  \ Apple 分成。这显然具有免除向 Apple 上缴部分应用收入的义务的优势，但这确实意味着你失去了 App Store 带来的好处，例如受众覆盖面和可访问性，并且必须依赖你自己的营销活动。\n\
  \n\n\n#### 向 App Store 提交应用\n\n以下是将应用提交至 App Store 的步骤：\n\n1. 完成应用的开发与测试。\n2. 为应用创建支持性\
  \ `info.plist` 文件（稍后将详细介绍）。\n3. 编写应用描述。\n4. 为应用选择一个唯一的数字 SKU。\n5. 整理要在 App Store\
  \ 中显示的截图。\n6. 准备 iTunes 艺术图稿。\n7. 通过 iTunes Connect 提交。\n\n提交的任何应用都需经 Apple 审批，这包括\
  \ SDK 协议中规定的基本可靠性测试及其他分析。Apple 设有申诉流程，但仍拥有最终决定权。如果你的应用被拒，你仍可通过手动向 Apple 提交请求，申请将应用许可给特定\
  \ iPhone 设备进行临时分发（尽管 Apple 日后可能取消此权限）。\n\n官方的《*App Store 审核指南*》是开发者的重要参考资料。我们将在第\
  \ 9 章 进一步讨论提交应用以获取审批与分发权的相关细节。\n\n### 本章小结\n\n本章介绍了为 Apple 移动设备（特别是 iPhone、iPod\
  \ touch 和 iPad）开发应用的概念。我们探讨了如何注册为 Apple Developer 及其推荐理由，以及移动应用开发的一些基本原则。随后讨论了驱动这些移动设备的\
  \ iOS 操作系统、iOS SDK 和 Xcode。\n\n介绍完这些概念后，我们了解了开发应用可用的几种不同方案。这些方案不仅包括 Apple 原生的语言与工具，还包括众多第三方选项（既有开源的，也有商业的）。\n\
  \n最后，我们介绍了 App Store 的目的、收入模型以及对各种设备的支持。你学习了向 App Store 提交新应用以供审核并在获批后发布的整个流程。\n\
  \n下一章将提供一个速成课程，教你使用 Apple 原生工具（iOS SDK 和 Xcode）创建简单应用。学完那一章后，你不仅将创建出第一个 iPhone 应用，还会更深入地体会移动应用开发中的一些基本概念——在接触其他可选方案时，这些概念也能复用。\n\
  \n在第 3 章中，你将进一步了解第三方工具（如 Mono 系列）。之后，我们将重新聚焦于 Apple 工具，并在本书剩余部分使用它们演示如何运用你的 .NET\
  \ 知识与经验来创建引人入胜的应用。\n\n## 第 2 章\n\n## 即刻上手：iOS SDK 开发速成课\n\n第一章介绍了 Apple 的移动操作系统（iOS）以及开发移动应用的各种方案。在本章中，我们将正式开始使用\
  \ Apple 自己的软件开发工具：`Xcode` 和 iOS SDK。\n\n本章将涵盖以下主题：\n\n- 入门所需的硬件与软件\n- 安装相关组件的指南\n\
  - Objective-C 入门\n- `Xcode` 概览及如何启动你的第一个项目\n- 如何使用 iOS SDK 创建你的第一个 iPhone 应用\n\n\
  ## 开始之前\n\n我们先来看看入门所需的条件——不仅包括软件组件，还有你需要的硬件。\n\n你还需要注册成为已注册的 Apple Developer。在允许下载\
  \ iOS SDK 之前，Apple 要求完成此步骤。在第 1 章中，我们讨论了为何需要这么做、其益处以及具体操作方法。在此提醒，你需要访问 [`http://developer.apple.com/`](http://developer.apple.com/)\
  \ 进行注册。\n\n**注意：** 在第 1 章中，我提到了成为已注册 Apple Developer 的一些益处。其中之一是丰富的《*入门指南*》列表，这些指南提供了关于图形与动画、数据管理等众多主题的简短介绍。你可以在\
  \ iOS Developer Library 中找到它们及更多资源，网址为 [`http://developer.apple.com/library/ios/navigation/index.html`](http://developer.apple.com/library/ios/navigation/index.html)。\n\
  \n### 选择合适的机器\n\n你需要一台 Apple Mac 才能开始。你可能已经有一台旧设备，并想知道它是否仍适合开发现代移动应用。好消息是：部分较旧的\
  \ Apple Mac 机型也能运行所需软件。关键在于操作系统。\n\n为了支持 iPhone、iPod touch 和 iPad 的开发，你需要 `Xcode`\
  \ 3.2.6 或更高版本（包括 iOS SDK 4.3）。该版本还提供对应用打包和提交至 App Store 的支持。该版本的 Xcode/iOS SDK 需要\
  \ Mac OS X Snow Leopard 10.6.6 或更高版本，以及基于 Intel 处理器的 Apple Mac 机器。这里的重点是 Intel 处理器。\n\
  \n2006 年，Apple 停止了 PowerPC 处理器的使用，并宣布未来所有 Mac 都将采用 Intel 制造的 x86 处理器。因此，2006 年生产的\
  \ Mac 设备（具体包括 Mac mini、iMac、MacBook、MacBook Pro 和 Mac Pro），只要具备足够的内存和硬盘空间，都可以顺畅运行\
  \ Mac OS X Snow Leopard 或更新的 Lion 操作系统以及开发工具。所需的内存量与空间大小取决于你所安装的操作系统版本。\n\n**能否使用\
  \ PC？**\n\n如果你不想使用 Apple 设备呢？如果你希望使用运行 Windows 等操作系统的 PC 呢？这实际上取决于你计划使用哪些工具来开发移动应用。\n\
  \n第 1 章中介绍的许多第三方方案，实际上是设计在基于 Windows 的 PC 上运行的，它们使用 Objective-C 以外的语言。但如果你希望使用 Apple\
  \ 的原生工具（如 `Xcode`）呢？这就没那么直接了。这些工具只能在 Mac OS X Snow Leopard 和 Lion 上运行，因此你需要一台基于\
  \ Intel 的 Mac。不过，从技术上讲，并非毫无希望！通过使用虚拟化软件（如商业产品 VMware 或免费软件 `VirtualBox`），你可以在基于\
  \ Intel 的 PC 上的虚拟机内运行 Mac OS X Snow Leopard。\n\n但请注意！虽然在虚拟机上运行该操作系统在技术上是可行的，并且有许多人成功做到了这一点（称为\
  \ Hackintosh），但这不被 Apple 的 Mac OS X 许可协议所允许，因此是非法的。\n\n### 选择 iOS SDK\n\n现在你已拥有合适的机器，运行着\
  \ Mac OS X Snow Leopard 或 Lion，可以下载并安装所需软件了。但该安装什么软件呢？第 1 章介绍了 `Xcode`，它包含 iOS SDK，并提供了构建\
  \ iOS 应用的完整工具集。如果你尚未安装，需要从 [`http://developer.apple.com/xcode/`](http://developer.apple.com/xcode/)\
  \ 下载。\n\n自 `Xcode` 4 发布以来，目前有两种方式获取和安装 `Xcode`。如你所知，`Xcode` 3.2.6 或更高版本支持 Apple\
  \ 移动设备的开发，并且免费提供。不过，你也许想使用最新版本 `Xcode` 4，它对 iOS 或 Mac Developer Program 的成员免费开放，也可从\
  \ App Store 购买。\n\n\n\n## Xcode 4 有哪些新功能？\n\n如果你熟悉将 Visual Studio 作为开发环境，那么你会发现自己在使用\
  \ Xcode 4 时，远比使用之前的版本得心应手。那么，这些新功能是什么呢？\n\n- **新的用户界面**：新的集成开发环境（IDE）将先前版本中分散的多个窗口合并为拥有不同导航面板的单一窗口，使其更易于使用。其中包含用于为应用程序创建新图形用户界面的\
  \ Interface Builder。\n- **辅助功能**：该软件在你编写源代码时提供内联的上下文相关帮助——例如，提示你正在继承的类的代码。这类似于微软的\
  \ IntelliSense，后者因其在 Microsoft Visual Studio IDE 中的应用而广为人知。\n- **新的调试器**：此版本提供了一个集成的调试界面，允许你在执行应用程序时单步执行代码并查看相关变量。\n\
  - **分析工具**：这些工具允许你收集有关应用程序性能的信息，以及它可能对操作系统产生的影响。例如，你可以使用提供的一些分析工具来了解应用程序是如何消耗内存的。\n\
  \n## Apple iOS 开发中心资源\n\n第 1 章 也提到了 iOS 开发中心（参见 [`http://developer.apple.com/devcenter/ios/index.action`](http://developer.apple.com/devcenter/ios/index.action)）以及许多其他资源。现在可能是查看其中一些资源的好时机。以下是一些将在本章（以及本书其余部分）中为你提供支持的资源：\n\
  \n- **iOS 人机界面指南**：描述了在设计界面时应考虑的要素，并提供了关于如何创造最佳用户体验的指导原则。\n- **应用设计策略**：这是指南中一个特别有用的子部分，因为它帮助你系统化地思考你的应用创意，比如你可能包含的功能。\n\
  - **入门指南**：一系列简短但非常有用的指南，介绍如何开始使用各种功能，包括工具、iOS SDK 和编程语言。我推荐从“iOS 起点”部分（[`http://developer.apple.com/library/ios/#referencelibrary/GettingStarted/GS_iPhoneGeneral/_index.html`](http://developer.apple.com/library/ios/#referencelibrary/GettingStarted/GS_iPhoneGeneral/_index.html)）开始，这是一个很好的起点。\n\
  \n## 安装 Xcode 和 iOS SDK\n\n现在你应该已经决定要使用哪个版本的 Xcode，以及相应的 iOS SDK。鉴于本书的目标是最新的 Apple\
  \ 移动设备，并且我想展示最新的工具选项，我将使用撰写本书时可用的最新版本 Xcode：Xcode 4。本书中的所有示例均使用 Xcode 4，部分原因是其一些改进之处，我建议你也这样做。\n\
  \n获取 Xcode 4 的一种方法是查看 Mac 随附的 CD 或 DVD。Xcode 和 iOS SDK 通常分开放置在不同的介质上，只需找到 CD 或 DVD，将其插入驱动器，定位到文件\
  \ `devtools.mpkg`，然后双击它即可开始安装。\n\n另一种途径是从 App Store 下载该应用，这是获取最新版本最具成本效益的解决方案。只需打开桌面上的\
  \ App Store 应用并搜索 Xcode。最后，你可以访问 Apple 的 iOS 开发中心获取 Xcode 4.2 和 iOS 5 的开发者预览版。这就是我们将在本书中使用的版本。通过导航到\
  \ [`https://developer.apple.com/devcenter/ios/index.action`](https://developer.apple.com/devcenter/ios/index.action)，或访问\
  \ App Store 上的 Xcode，你将看到一个类似于图 2–1 所示的屏幕。\n\n![images](img/0201.jpg)\n\n**图 2–1.**\
  \ *App Store 中提供的 Xcode*\n\n向下滚动并选择下载 Xcode 4.2。请注意：该文件体积很大，所以除非网速极快，否则下载需要一段时间。这对许多用户来说是一个痛点，但一旦安装完毕，你获得的收益将值得等待。\n\
  \n下载 Xcode 后，启动它以开始安装。你应该会看到如 图 2–2 所示的屏幕。\n\n![images](img/0202.jpg)\n\n**图 2–2.**\
  \ *Xcode 4 安装启动屏幕*\n\n按照屏幕上的说明完成 Xcode 4 的安装。安装完成后，你会在屏幕底部看到 Xcode 4 应用程序图标。单击此图标启动程序，如图\
  \ 2–3 所示。\n\n![images](img/0203.jpg)\n\n**图 2–3.** *运行 Xcode 4 应用程序*\n\n将你的所有源代码存储在你选择的特定文件夹或仓库中也是一个好主意。这应该位于你自己的\
  \ `Home` 区域内的某个位置。现在就设置好这个文件夹，以便随时准备接收你的第一个 iPhone 应用程序。按照你喜欢的方式在 Finder 中创建该文件夹，并将其命名为\
  \ `Projects`。\n\n在 Xcode 中创建新项目时，你可以将项目位置指向此文件夹，或者在此位置创建一个本地仓库，并使用版本控制系统来管理你在开发应用过程中所做的更改。对于版本控制，你有两个选择。你可以使用\
  \ Git 或 Subversion——两者都作为 Xcode 安装的一部分被安装。Subversion 通常是基于服务器的，尽管你也可以在本地计算机上运行服务器，并使用命令行界面创建一个本地仓库，类似于以下命令：\n\
  \n```\nsvnadmin create <仓库名称>\n```\n\n一旦你在所需位置成功创建了仓库，就可以将其添加到你的 Xcode 仓库列表中。要添加新仓库，请选择\
  \ `File` ![images](img/U001.jpg) `Repositories`。在出现的屏幕上，单击加号 (+) 符号以显示弹出菜单，然后选择\
  \ `Add Repository` 选项。这将显示如图 2–4 所示的屏幕。填写各字段，指向你刚刚创建的仓库。单击 Next 按钮，并按照屏幕上的说明完成仓库的注册。\n\
  \n![images](img/0204.jpg)\n\n**图 2–4.** *添加仓库*\n\n\n\n### 版本库管理器\n\n您的空版本库管理器将显示，如图\
  \ 2-5 所示。现在，您已准备好使用 Xcode 4 开始开发您的第一个 iPhone 应用程序。\n\n![images](img/0205.jpg)\n\n\
  **图 2-5.** 版本库管理器\n\nXcode 对 Subversion 的支持是内置的，前提是您使用的是 1.5 或更高版本。但是，您必须先在命令行上创建\
  \ Subversion 版本库并将项目导入 Subversion，然后才能在 Xcode 中管理它。为简单起见，我们的示例将不使用源代码控制子系统。我们只使用文件系统。有关使用\
  \ Subversion 的详细说明，请参阅在线书籍 *Version Control with Subversion*（[`http://svnbook.red-bean.com/`](http://svnbook.red-bean.com/)），该书已得到\
  \ Subversion 开发者的认可。\n\n**注意：** 您通常不会在要管理项目源代码的同一目录中创建 `svn` 版本库。相反，您可以检出版本库的“主干”（trunk），它将成为文件系统上的一种特殊文件夹（它包含一些点文件，让\
  \ Subversion 知道它已被检出）。然后，您可以在该文件夹中创建项目文件，并且可以通过 Xcode 的用户界面将它们添加到版本库中。\n\n无论您做出何种决定，现在都应已安装\
  \ Xcode 并选择了版本库偏好设置。您已准备好启动项目并编写代码。但在开始构建应用程序之前，让我们先简要了解一下 Objective-C 语言，重点关注您在构建应用程序时会遇到的一些关键原则。\n\
  \n## Objective-C 入门\n\nApple 的 Objective-C 是在 iPhone、iPod touch 和 iPad 上进行应用程序开发的事实标准语言。尽管通过\
  \ Mono 实现支持了诸如 .NET 中提供的新语言，但实际上使用 Objective-C 提供了性能最佳的选项。如果您正在编写一个特别高性能的应用程序（例如游戏或计算密集型应用程序），这一点就变得尤为重要。\n\
  \n那么什么是 Objective-C，它与 .NET 语言（特别是与其最接近的 .NET “表亲” C# 语言）相比如何？提供一份详尽的指南本身就需要一本专著。为了让您入门，我们将介绍一些最重要的概念以及在编写第一个程序之前您应该了解的直接差异。随着本书的深入，我们会在遇到这些差异时指出它们。\n\
  \n以下是针对 .NET 开发者的任何 Objective-C 入门指南以及本章我们将创建的应用程序所使用的关键原则列表。此处简要介绍将帮助您理解第一个应用程序的一些重要方面。\n\
  \n*   对象模型\n*   方括号\n*   命名约定\n*   导入\n*   类定义和实现\n*   异常处理\n*   `Nil` 对象\n*   内存管理\n\
  \n**注意：** 本入门指南从您现有的 .NET 经验出发提供介绍，但无法全面涵盖像 Objective-C 这样的综合语言。如果您需要更多详细信息，我推荐\
  \ Scott Knaster 和 Mark Dalrymple 所著的书籍 *Learn Objective-C on the Mac*（Apress，2009\
  \ 年），可在 [`http://www.apress.com/9781430218159`](http://www.apress.com/9781430218159)\
  \ 找到该书。\n\n让我们从一些术语的简要介绍开始。\n\n### Objective-C 术语\n\n表 2-1 比较了 .NET C# 编程语言和 Objective-C\
  \ 关键字。如您所见，它们不同，但依然非常相似。\n\n![images](img/t0201.jpg)\n\n### 对象模型\n\nObjective-C\
  \ 中的对象模型与 Smalltalk 和 C++ 等语言非常相似。它是一种面向对象的语言，通过提供 C 语言的严格超集来扩展 C 语言。这意味着您可以在类中包含任何\
  \ C 代码，并且它能够愉快地编译（前提是语法正确并且已处理库和其他依赖项）。\n\n对于那些熟悉 Smalltalk 的人来说，对象模型与 Smalltalk\
  \ 的相似性会立即被识别（尽管它的相关性现在已过去很多年）。本质上，它提供了一种消息传递风格的语法，涉及将消息传递给对象实例，而不是在对象上调用方法。这是一个微妙的区别，但有深远的影响。\n\
  \n这种机制实现了与其他非松散耦合的面向对象语言（如 .NET）相同的目标。主要区别在于，传递的消息与对象之间的关联不是在编译时通过代码绑定解析的，而是在运行时解析。因此，您需要谨慎对待此接收对象将如何处理消息。正在接收消息的对象（*接收者*）不保证会响应消息，尤其是当它未预期到或不理解该消息时。在这种情况下，最好的情况下应用程序会引发异常。最坏的情况下，它会静默继续，使调试应用程序变得更加费力。因此，您还应注意本章后面提供的异常处理和\
  \ `Nil` 对象提示。\n\n### 方括号和方法\n\n您很快就会发现，方括号是 Objective-C 语言的一个重要特性。正如您所学到的，对象模型基于这样一个概念：对象接收消息以调用方法。相反，如果您想查询一个方法的属性，建议的方式是通过发送消息向对象请求属性值，而不是窥探其内部（这无论如何都被视为不良做法）。方括号表示您正在向对象发送消息。\n\
  \n**注意：** 此处的示例仅反映语法，并不代表完整、可编译的源代码。随着本书的深入，您将在可工作的源代码列表中看到这些示例。\n\n#### 调用方法\n\n\
  那么，如果我们有一个名为 `Engine` 的对象，我们可以在首先创建 `Engine` 的实例后，通过使用其 `start` 方法来“启动引擎”。在 Objective-C\
  \ 中，代码如下所示：\n\n```\n// 创建指向 Engine 类类型对象 diesel 的引用。\nEngine* diesel;\n\n// 创建 Engine\
  \ 对象的实例，并让 diesel 引用指向它\ndiesel = [[ Engine alloc] init];\n\n// 通过向 Engine 对象发送\
  \ start 消息来调用 start 方法\n[ diesel start];\n```\n\n相同的代码在 C# 中（不带注释）如下所示：\n\n```\n\
  Engine diesel;\ndiesel = new Engine();\ndiesel.start();\n```\n\n**注意：** 在此 C# 示例中，请注意\
  \ `new()` 命令在单个调用中同时分配和初始化对象。\n\n#### 传递和检索\n\n当调用对象的方法时，传递参数以及检索被调用方法可能返回的值时，使用类似的语法。例如，要传递一个标志或值来指示启动引擎时应施加多少油门，我们将使用以下语法：\n\
  \n```\n[diesel start: gas];\n```\n\n或者，如果我们想返回引擎当前输出的转速数，我们可以使用以下语法，假设我们创建了一个名为\
  \ `revs` 的 getter 来返回这样的值：\n\n```\ncurrentRevs = [ diesel revs ];\n```\n\n### 命名约定\n\
  \nObjective-C 使用的命名约定与许多其他语言非常相似，对类使用 `PascalCase`，对方法和属性使用 `camelCase`。对于那些不熟悉这两种约定的人，`PascalCase`\
  \ 是连接首字母大写的单词，始终以大写字母开头，如 `PascalCase`。`camelCase` 形式类似，连接首字母大写的单词，但第一个字母可以是大写或小写，如\
  \ `camelCase`。`PascalCase` 也称为 `UpperCamelCase`。\n\n如果您想知道，微软的 C# 标准是 `PascalCase`，这可能是该表示法看起来眼熟的原因。\n\
  \n\n\n#### 导入\n\n使用 Objective-C 时，有两种导入方式，与 C/C++ 类似。区别在于，一种语法会强制编译器的预处理器在系统头文件目录中查找文件，而使用引号的语法则会在当前目录中查找（如果未指定其他位置）。\n\
  \n要在当前目录或特定目录中查找自己的头文件，请使用以下语法：\n\n`#import \"myfile.h\"`\n\n要在系统头文件目录中查找，请使用以下语法：\n\
  \n`#import <Foundation/foundation.h>`\n\n#### 类定义与实现\n\n与大多数面向对象语言一样，对象由其类定义，并且可以创建该对象的多个实例。每个类由一个接口（定义类的结构并允许实现其功能）和一个对应的实现（实际提供功能）组成。通常，这些实现保存在不同的文件中：接口代码包含在头文件（扩展名为`.h`）中，而实现则保存在消息文件（扩展名为`.m`）中。\n\
  \n**注意：** 我听说（或许是一个事实）当 Objective-C 语言的发明者被问及为什么使用`.m`扩展名时，他只是简单地说，因为`.o`和`.c`已经被占用了！\n\
  \n因此，以我们的`Engine`示例为例，各文件中的源代码可能如下所示：\n\n**清单 2-1.** *Engine.h*\n\n```\n@interface\n\
  - (int) revs;\n@end\n```\n\n**清单 2-2.** *Engine.m*\n\n```\n@implementation\n- (int)\
  \ revs {\n        return revs;\n}\n\n- (void) start {\n        // 以 900 转/分的怠速启动引擎\n\
  \        // – 注意：这是一条注释\n        revs=900;\n}\n@end\n```\n\n如您所见，在这两种情况下，代码前面都带有相应的`@interface`或`@implementation`，并以`@end`标记结束。所有接口和方法必须分别出现在这两个语句之间。\n\
  \n#### 空对象\n\nObjective-C 中实现面向对象特性的方式意味着对方法的调用被实现为在运行时解析正确标识的消息传递到对象。如前所述，这意味着通常会在编译时进行的类型检查（通常会抛出错误）将不会发生。\n\
  \n在运行时出现不匹配的情况下，要么会抛出异常（最佳情况），要么对象会静默忽略消息（最坏情况）。因此，请格外小心，确保您的消息/对象交互有效，并在整个过程中添加良好的异常处理。在\
  \ .NET 中复制后期绑定并没有简单或明显的方法。\n\n#### 异常处理\n\n对于使用过 C# 或其他语言中异常处理的人来说，Objective-C 的异常处理语法会很熟悉。\n\
  \n```\n@try\n{\n        // 要执行并希望捕获异常的代码\n}\n@catch ()\n{\n        // 捕获异常后执行的操作\n\
  }\n@finally\n{\n        // 在此处进行清理代码\n}\n```\n\n鉴于其相似性，我在此不再重复 C# 的等效代码。您应该能立即识别出该语法并轻松使用它。然而，如前所述，需要牢记的重要一点是：由于在\
  \ Objective-C 中消息以运行时方式传递并解析给对象，因此确保采用防御性编码方法至关重要。您应该预见异常，并像前面的示例所示那样妥善捕获和处理它们。\n\
  \n#### 内存管理\n\n就像 .NET 中的公共语言运行时 (CLR) 一样，运行时环境会为您处理 Objective-C 应用程序的内存管理。Objective-C\
  \ 使用引用计数系统。这意味着，如果您跟踪自己的引用，一旦引用计数归零，运行时将自动回收对象使用的任何内存。\n\n这听起来仍然复杂吗？只要遵循一些简单的原则，它并不复杂。在为移动设备编写应用程序时，即使这些设备如今拥有更大的内存容量，内存管理的重要性也不容低估。\n\
  \n如果您使用`alloc()`分配了内存，请记得调用`release`，除非您正在使用自动释放机制。您可能还想探索使用`@property`和`@synthesize`功能，这将自动创建您的\
  \ setter 和 getter，尽管这并不能消除您为对象分配空间的需求。\n\n在 iOS 5 中，新的自动引用计数 (ARC) 功能可自动管理 Objective-C\
  \ 对象的内存管理。ARC 使内存管理变得更加容易，大大降低了程序出现内存泄漏的可能性。\n\n## 创建您的第一个 iPhone 应用程序\n\n使用 Xcode\
  \ 4 启动新项目的第一步是创建一个单一的 Xcode 项目。事实上，在 Xcode 中使用项目是强制性的，因为您的文件和资源是在这个项目下收集的。可以拥有多个但相关的项目，我们将在本书后面介绍这种方法，但本质上，本书的示例不需要它。正如您稍后将看到的，iOS\
  \ SDK 提供了一些项目模板来帮助您入门。\n\n以下是使用 Xcode 创建 iPhone 应用程序的高级步骤：\n\n1.  创建您的项目。\n2.  设计您的应用程序。\n\
  3.  编写代码。\n4.  构建并运行您的应用程序。\n5.  测试、测量和调优您的应用程序。\n\nXcode 工具套件可以在所有这些步骤中为您提供支持，从创建项目和管理与其关联的文件，到使用提供的仪器工具来微调您的应用程序性能。\n\
  \n\n\n### 创建项目\n\n让我们首先使用 Xcode，通过 iOS SDK 提供的其中一个模板来创建一个项目，这样能让我们有个良好的开端。以这种方式提供项目模板，与你在\
  \ Microsoft Visual Studio 以及其他 IDE（如 Eclipse）中看到的类似。这些模板默认定义了与你所选项目类型相关的一些特性、文件和资源。你可以在图\
  \ 2–6 和图 2–7 中看到 Visual Studio 与 Xcode 4 之间的相似性。\n\n![images](img/0206.jpg)\n\n\
  **图 2–6.** *Visual Studio 2010 项目模板*\n\n![images](img/0207.jpg)\n\n**图 2–7.** *Xcode\
  \ 4 项目模板*\n\n有许多模板可供选择，而“正确”的模板实际上取决于你在构建的应用类型。模板也并不仅限于应用程序。请注意，在 图 2–7 的左侧窗格中，Xcode\
  \ 提供了创建库以及应用程序的模板，而且针对 Mac OS X 平台的选择甚至更加广泛！\n\n对于本例，请选择基于视图的应用程序模板，该模板使用单个视图来实现其用户界面。（在本章稍后介绍如何创建用户界面时，我们会更详细地讨论视图。）此时你将看到如图\
  \ 2–8 所示的屏幕，要求你为应用程序设置一些选项，包括你希望针对的设备系列。如图所示，将产品命名为 `HelloWorld`，并选择 iPhone 作为设备系列。然后点击“下一步”按钮。\n\
  \n![images](img/0208.jpg)\n\n**图 2–8.** *创建新项目*\n\n现在可以继续创建项目及其相关文件和资源了。完成之后，你将获得一个新的\
  \ Xcode 项目，其中显示的项目及其文件结构如图 2–9 所示。\n\n![images](img/0209.jpg)\n\n**图 2–9.** *在 Xcode\
  \ 中打开 HelloWorld 项目*\n\n花些时间探索一下，查看项目结构、创建的文件以及一些菜单。你会注意到有些文件包含提供默认实现的源代码。现在不必理解所有内容。\n\
  \n### 探索项目与文件结构\n\n正如我所提到的，一旦创建完成，你的空项目将拥有许多为你创建的默认文件。这些文件为针对你所选设备（本例中为 iPhone）的基于视图的空项目提供了默认实现。\n\
  \n让我们快速浏览一下为你创建的一些项目文件：\n\n*   `HelloWorldAppDelegate`：*应用程序委托* 是负责处理应用程序初始化的控制器，包括显示用户界面的初始视图。它还负责在退出应用程序时处理应用程序终止。通常只有一个\
  \ `UIApplication` 对象类型的应用程序委托。这被称为*单例*对象。\n*   `MainWindow.xib`：该文件表示用户界面的结构和资源。它是\
  \ Mac OS X 的 Interface Builder 文件，因此扩展名为 `.xib`。在典型的应用程序中，`mainwindow.xib` 实际上是你应用程序中可能包含的多个视图的容器，因此，为每个视图关联额外的视图控制器（以及\
  \ `.xib` 文件）是常见的做法，实际上也是苹果的最佳实践。在我们的示例中，我们有 `HellowWorldViewController` 来管理此视图，我们会保留主窗口用于在不同视图之间进行导航。\n\
  *   `HelloWorldViewController`：视图控制器类始终与一个视图关联，并且这是实现用户界面逻辑的地方。该类完善了 iOS 设备用于实现其\
  \ GUI 的模型-视图-控制器设计模式。视图控制器本身将包含可能与界面上的控件相关联的属性。例如，你可能要求用户在文本字段中输入文本，并希望使用属性 getter\
  \ 和 setter 将信息存储在某处。你将在本书中使用的源代码中看到这样的例子。\n\n对于每个类别，你可能会发现有一个或多个以下文件，其中一些文件按逻辑分组。例如，一个实现文件通常会有一个关联的头文件，反之亦然。关键的文件类型如下：\n\
  \n*   **头文件 (`.h`)**：这是将包含引用和接口定义但不包含实际实现代码的头文件。拥有头文件的一个原因是，如果你的代码引用了你没有源代码的对象及其接口，但在静态库中有它们的实现，你只需包含相应的头文件，即可在构建时解析实现。\n\
  *   **实现文件 (`.m`)**：这是实现文件，本质上与 C 编程语言中的 `.c` 文件或 C# 编程语言中的 `.cs` 文件相同。你的接口和其他项目的实现代码将包含在这些文件中，并在构建时被引用。\n\
  *   **UI 资源文件 (`.xib`)**：这是一个以 XML 表示的 Mac OS X Interface Builder 资源文件。它不是一个可部署的文件，而是在构建应用程序时用于生成可执行文件的文件。它描述了用户界面的\
  \ XML 表示，并通过视图控制器与你的用户界面逻辑松散耦合。\n\n除了这些文件之外，许多支持文件共同构成了一个完整的应用程序。例如，你会在 `\\Supporting\
  \ Files` 文件夹中找到一些核心文件，包括包含起始函数 `main()` 的主模块（下一个章节将对其进行描述）。此外，还包含了对必需的预编译头文件的引用，以加快应用程序的构建阶段。\n\
  \n\n\n### 初始化你的应用程序\n\n每款运行于 iOS 设备（iPhone、iPod touch 或 iPod）上的移动应用，都具备一些共同特征，这些特征不仅为用户设定了预期，也是该平台得以如此成功的优势所在。例如，想想你用设备查收邮件、查看\
  \ Facebook 更新，或快速在 Google 地图上确认当前位置的便捷体验。你无需等待；只需解锁设备（如果需要），点击应用图标，瞬间——它就启动了！\n\n\
  这种体验并非偶然——而是精心设计的，你的应用也应认真考虑这一预期。它应当反映同样的即时性，比如启动时间不宜过长、拥有直观且响应迅速的用户界面等。\n\n我们来看看\
  \ iOS 应用的结构，这将帮助你理解 Xcode 项目中创建的一些文件在实现应用时所扮演的角色。\n\n应用的核心是**主事件循环**，用于解释事件，无论是内部事件引发的结果，还是用户操作（如触摸屏幕）引起的。这些事件被排入队列，并按先进先出的原则处理，每个事件被分派到最合适的事件处理器。对于用户界面控件而言，这个处理器就是用户事件发生的窗口。来自\
  \ iOS Developer Library 的 图 2–10 中的示意图完美地展示了这一点。\n\n![images](img/0210.jpg)\n\n\
  **图 2–10.** *事件处理序列*\n\n该图显示，用户输入由操作系统框架捕获，并作为一系列事件连同其固有对象传递给应用。然后，这些对象根据需要响应事件，并提供应用的功能。\n\
  \niOS 应用的入口点与任何其他基于 C 编程语言的应用相同：`main()` 函数。在 `\\Supporting Files` 文件夹下，你可以找到 `main.m`\
  \ 实现文件，其中包含 `main()` 函数，实现如下：\n\n```\nint main(int argc, char *argv[])\n{\n    NSAutoreleasePool\
  \ * pool = [[NSAutoreleasePool alloc] init];\n    int retVal = UIApplicationMain(argc,\
  \ argv, nil, nil);\n    [pool release];\n    return retVal;\n}\n```\n\n我们来分析一下它创建的代码及其用途。首先要注意的是，基于\
  \ `NSAutoRelease` 类创建了一个名为 `pool` 的对象实例。这提供了应用顶级的内存池，对象可以与之关联并释放。每个基于 Cocoa 的应用（Cocoa\
  \ 是 iOS SDK 框架之一）始终都有可用的自动释放池。如果没有，内存将无法正确管理，你的应用就会发生内存泄漏。\n\n接下来观察 `UIApplicationMain()`\
  \ 函数，它将参数计数（`argc`）和参数本身（`argv`）传递给 `main()` 函数。`UIApplicationMain()` 函数用于创建并初始化应用的关键对象，并启动事件处理循环。在应用退出之前，该函数不会返回。此时，`pool`\
  \ 实例本身会被释放，`main` 函数退出，并返回 `UIApplicationMain()` 函数传回的返回值。\n\n### 创建你的用户界面\n\n在\
  \ Xcode 3 中，Interface Builder 功能是作为一个独立应用实现的，但随着 Xcode 4 的发布，Interface Builder 已完全集成到\
  \ Xcode 4 IDE 中，因此无需切换应用。此外还有一些其他改进，特别是 Interface Builder 对象与源代码生成之间的集成更加紧密，这意味着同步问题更少。这在\
  \ `.xib` 文件的管理方式上尤为明显，甚至体现在诸如 Storyboard 等更高级的功能上。有关 Xcode 版本差异的更多信息，请参阅 [`http://developer.apple.com`](http://developer.apple.com)\
  \ 网站上的优秀文档，这些文档详细说明了相关细节。此外，本书的第 10 章介绍了 Xcode 4 和 iOS 5 的一些更高级功能，例如用于管理应用工作流程的\
  \ Storyboard。\n\n#### 使用 Interface Builder\n\n我们借用 Apple 网站上的示意图，如图 2–11 所示。这张图出色地展示了\
  \ Interface Builder 中的不同窗格及其用途。\n\n![images](img/0211.jpg)\n\n**图 2–11.** *Interface\
  \ Builder*\n\nInterface Builder 应用分为以下几个区域：\n\n* **编辑区域**：包含画布和其他元素，主要呈现用户界面外观的图形视图。\n\
  * **检查器面板**：根据所选检查器的不同，显示编辑区域内选定对象的属性。多种检查器提供了不同属性的视图。例如，大小检查器显示大小、位置及相关属性。\n* **库面板**：提供对可在项目中使用的资源库的访问。你可以使用库选择器栏在代码、对象和媒体文件等不同类型的资源之间进行切换。\n\
  \n你已经使用项目模板功能创建了第一个 iPhone 应用，尽管它只是一个空壳。提供了一些默认实现，但它目前还没有任何实际功能——不过别急！\n\n我们的应用将非常简单。它只会在用户界面画布的中央显示文本“Hello,\
  \ World”。因此，基于我们的空项目和默认文件，让我们来构建应用的其余部分。\n\n\n\n### 初始化视图\n\n我们首先关注的是应用程序委托，它负责多项协调任务，包括在应用程序启动完成后初始化用户界面。这涉及到确保创建视图实例（即实现用户界面的部分），并将其添加到应用程序内的可用视图列表中。在本例中，我们只有一个视图。\n\
  \n为了初始化视图，应用程序委托需要知道视图类，这可以通过包含视图控制器头文件来实现，具体如下：\n\n```\n#import \"HelloWorldViewController.h\"\
  \n```\n\n应用程序委托还要确保在应用程序启动完成后初始化视图。这可以通过使用 `didFinishLaunchingWithOptions()` 方法轻松完成。在我们的示例中，项目添加了以下代码：\n\
  \n```\nself.window.rootViewController = self.viewController;\n[self.window makeKeyAndVisible];\n\
  ```\n\n`self.window` 引用指向由 `window` 属性引用的主 `UIWindow` 对象，该对象由 `MainWindow.xib` 自动初始化。当应用程序启动时，会加载这个\
  \ `.xib` 文件。随后，视图控制器和窗口被解档并加载，将 XML 键引用映射到你的界面实例变量——在本例中，即 `*viewController`。\n\n\
  使用合成的属性可以确保自动提供 getter 和 setter 方法。我们告诉应用程序，应用程序的主窗口应指向视图控制器，而该视图控制器对应我们将要添加控件的视图。\n\
  \n该方法最后向窗口传递 `makeKeyAndVisible` 消息，使视图可见。它将成为接受用户输入的主窗口。\n\n现在应用程序将执行并显示一个空白窗口，所以我们已经迈出了第一步。为了完整实现效果，我们想要显示著名的文本“Hello,\
  \ World”，这是全球应用程序开发者所熟知的、几乎人人都可能写出的第一个应用之一！\n\n为了显示这段文本，我们将在画布上放置一个 `UILabel` 对象，并拦截一个在应用程序加载完成且视图初始化后调用的事件。这个事件将用于将标签文本设置为“Hello,\
  \ World”，从而在屏幕上显示它。（当然，我们也可以使用一些 iOS SDK 对象和命令直接在窗口画布上显示文本，但这会破坏后续章节的乐趣。）\n\n我们首先将\
  \ `UILabel` 添加到视图中。在 Xcode 中，选择 `HelloWorldViewController.xib` 文件（即我们的视图）。这将显示视图的可视化表示。在这里，我们可以访问控件库来添加标签控件，如图\
  \ 2-12 所示。\n\n![images](img/0212.jpg)\n\n**图 2-12.** *Interface Builder 画布*\n\n\
  **注意：** 要匹配图 2-12 所示布局，请确保标准编辑器视图已显示，同时打开了对象库工具和项目导航器。这两者都可以在 Xcode 的“视图”菜单中选择显示。\n\
  \n你可能已经注意到，库面板可以显示不同的库类型。你可以使用箭头图标展开或折叠各个部分。这使你可以浏览库中可用的许多控件。在本例中，我们使用的是 `UILabel`\
  \ 控件，它位于顶部附近。\n\n图 2-13 显示了对象库面板。在这里，你可以将标签控件拖到视图画布上，并放置到所需位置。\n\n它会显示标签的默认文本，我们将更改该值以显示“Hello,\
  \ World”文本。\n\n![images](img/0213.jpg)\n\n**图 2-13.** *对象库*\n\n在完成之前，让我们将标签的名称改为可以在代码中引用的内容。选择“标识”标签，在“标签”框中，将标签名称改为\
  \ `lbl`，如图 2-14 所示。\n\n![images](img/0214.jpg)\n\n**图 2-14.** *标签名称设置为 `lbl`*\n\n\
  \n**图 2-14.** *更改标签控件的名称*\n\n除了将标签控件添加到画布上，我们还需要能够在代码中引用它。为此，我们必须将`UILabel`对象绑定到该控件对象。在`HellowWorldViewController`头文件中，添加一个名为`label`的\
  \ `UILabel` 对象引用，如下所示：\n\n```\nUILabel *label;\n```\n\n现在，我们创建一个同名的属性来指向该对象。我们将把它设置为一个合成属性，以确保\
  \ Xcode 能自动创建我们的 getter 和 setter 方法。\n\n```\n@property (nonatomic, retain) IBOutlet\
  \ UILabel *label;\n```\n\n请注意此属性定义中的`IBOutlet`标记。它作为 Interface Builder 的标记，用于识别那些可以与用户界面元素关联的属性，并且\
  \ Interface Builder 会使用这些元素在“插座变量 (Outlets)”窗格中显示。因此，我们的`HellowWorldViewController.h`文件现在应该包含以下实现：\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@interface HelloWorldViewController : UIViewController\
  \ {\n\n    UILabel *label;\n}\n\n@property (nonatomic, retain) IBOutlet UILabel\
  \ *label;\n\n@end\n```\n\n当然，这还不够。我们只是为头文件提供了代码并定义了意图。现在我们需要在`HelloWorldViewController`实现文件中添加实际的实现。首先，我们在`@implementation`标记之后添加下面这行代码来完成属性声明，并确保它被合成：\n\
  \n```\n@synthesize label;\n```\n\n我们还需要确保当视图控制器对象从内存中移除时，能够释放标签所占用的内存。这可以通过向`label`对象发送`release`消息来实现。你的`dealloc`方法应该如下所示（我们新添加的行已高亮显示）：\n\
  \n```\n- (void)dealloc\n{\n    [label release];\n    [super dealloc];\n}\n```\n\n\
  最后，我们想要将标签的值设置为文本 \"Hello, World.\"。一个方便执行此操作的时机是`viewDidLoad`方法，它在应用程序初始化完毕且视图加载后、显示前被触发。我们需要在`viewDidLoad`方法中添加一行代码来设置标签的值。移除其周围的注释后，你的代码应该如下所示（新添加的行已高亮显示）：\n\
  \n```\n- (void)viewDidLoad\n{\n    label.text = @\"Hello, World\";\n    [super viewDidLoad];\n\
  }\n```\n\n如果你现在构建并运行你的应用程序，它虽然能工作，但标签的文本不会改变。为什么呢？\n\n我们已经定义了一个名为`label`的内部`UILabel`对象，创建了一个属性来引用它，甚至将这个属性的文本值设置为了\
  \ \"Hello, World.\"。但我们还没有将用户界面上的标签与我们的类对象关联起来。所以代码虽然能运行，但它并没有指向我们可见的标签。\n\n这个问题很容易解决（实际上，在\
  \ Xcode 4 和新的 Interface Builder 中比旧版本更容易）。你只需通过图形化的方式将控件的插座变量拖拽到画布上的实际控件，将两者关联起来，如图\
  \ 2-15 所示。\n\n![images](img/0215.jpg)\n\n**图 2-15.** *将 UI 元素链接到代码*\n\n至此，我们的应用程序就完成了。我们很放心，因为它不仅显示了所需的文本，而且通过在不需时释放内存和对象引用，表现得像一个“好公民”。\n\
  \n让我们使用 ⌘R 热键构建并运行应用程序，这将启动 iPhone 模拟器进行测试。它应该能毫无问题地编译通过，并且 iPhone 模拟器启动后，你的新 iPhone\
  \ 应用程序会在其中运行，如图 2-16 所示。\n\n好吧，如果将它提交到 App Store，它不太可能让你发财，因为它功能不多。但它确实涵盖了编写 iPhone\
  \ 应用程序的基本原则。这将为本书后续章节打下良好基础，你将在其中探索更多使用不同工具和技术创建 iOS 应用的知识。\n\n![images](img/0216.jpg)\n\
  \n**图 2-16.** *运行你的第一个 iPhone 应用程序*\n\n### 使用自动引用计数\n\n本章提供的示例采用了传统的内存管理方法，将`retain`和`release`（或`autorelease`）对象及其所占内存的责任留给了程序员。Xcode\
  \ 4.2 和 iOS 5 提供了一个名为*自动引用计数* (ARC) 的新特性，它简化了内存管理。\n\n你无需再记住何时使用`retain`、`release`和`autorelease`，ARC\
  \ 会评估你的对象的生命周期需求，并在编译时自动为你插入适当的方法调用。编译器还会生成适当的`dealloc`方法来释放不再需要的内存。本质上，ARC 是一个预编译阶段，它会添加你之前必须手动插入的必要代码。\n\
  \n#### 为什么要使用它？\n\n如果你是 Objective-C 新手，你会欢迎 ARC，因为它极大地简化了内存管理。要学的东西已经够多了，不用再为内存管理的复杂性而烦恼。\n\
  \n然而，如果你熟悉手动内存管理（也许是因为有 C 或 C++ 等底层语言的经验），那么你可能更愿意坚持使用它。一个原因是，那些尚未转换到 ARC 的库并不总是能与基于\
  \ ARC 的代码良好协作。此外，如果你知道自己在做什么，手动管理内存可能性能更优。\n\n#### 启用 ARC\n\n要启用 ARC，你可以在首次创建项目时选择它，或者在编译器的构建设置中，将“Objective-C\
  \ Automatic Reference Counting”的值设置为“Yes”来添加相应的编译器标志。通过项目的“Build Phases”标签下的“Compile\
  \ Sources”部分，你可以有选择性地决定哪些文件使用 ARC 编译器特性，但我不推荐这样做，除非你想高度优化应用程序的性能。\n\n#### 迁移到 ARC\n\
  \n如果你已有项目或源代码想要转换到 ARC，但又不想费力地在源代码中删除所有内存管理关键字引用，那么幸运的是，Xcode 提供了一个迁移工具来为你完成转换。打开要转换的项目，选择\
  \ Edit ![images](img/U001.jpg) Refactor，然后选择 Convert to Objective-C ARC… 选项。这将重构（转换）你的代码，使其使用\
  \ ARC 特性。很简单！\n\n#### 使用 ARC 进行编程\n\n一旦你启用了 ARC，就必须遵循某些规则。这些规则可能相当复杂，但苹果的文档对它们进行了很好的解释。总之，要么你使用\
  \ ARC，要么你不使用；你不能混合使用不同的内存管理风格。例如，不要启用 ARC 后又开始零散地`retain`或`dealloc`内存。你可以定义你的属性是强类型还是弱类型。`strong`（默认值）是一个引用，在其作用域（通常定义为花括号）内被持有；而`weak`意味着当它被认为不再被使用时，可以在任何时候被释放（并在释放时被设置为`nil`）。\n\
  \n\n### 本章概要\n\n在本章中，我们首先了解了运行 `Xcode` 4 所需的系统要求，这是目前开发 iOS 应用程序最为简便的方法。我们讨论了可能需要的硬件类型，并接着探讨了如何获取和安装\
  \ `Xcode` 工具套件。\n\n随后，本章概述了 `Xcode` 工具套件，并提供了 Objective-C 入门指南，涵盖了开发你的第一款 iPhone\
  \ 应用程序所需掌握的基本原理。我们甚至了解了一些较新的特性，例如自动引用计数。\n\n接着，我们实际构建了一款 iPhone 应用程序。我们利用 `Xcode`\
  \ 的项目模板来快速上手。我们还使用了 `Xcode` 的一些新功能，将用户界面组件与代码对象进行关联。当一切连接就绪后，我们便能够构建该应用程序并在 iPhone\
  \ 模拟器中进行测试。\n\n呼！现在你已经成为一名使用 Apple 原生工具（如 iOS SDK 和 `Xcode` 4）的 iOS 应用程序开发者了。在接下来的章节中，你会发现这并不是唯一的开发选项。既然你已经掌握了编写基础应用程序的基础，我们将继续使用其他可用的选项来开发功能更丰富的应用程序。\n\
  \n## 第 3 章\n\n## 了解你的选项：使用第三方解决方案与 MonoTouch\n\n在前面的章节中，我们探讨了 iOS 操作系统、SDK 及相关的工具，以及如何使用\
  \ `Xcode` 4 和 iOS SDK 来开发你的第一款 iPhone 应用程序。但正如第 1 章所述，除了 Apple 的原生工具之外，还有其他开发应用程序的选项。本章将详细阐述第\
  \ 1 章中介绍的一些第三方选项，并描述如何使用它们来创建 Hello, World 应用程序。\n\n我们不会涵盖所有可用的第三方选项，这不仅是由于篇幅限制，更因为这个环境在不断变化，新的选项层出不穷。在本章中，我们将重点关注一些较为常见且历史悠久的选项：\n\
  \n*   结合 `.NET Framework` 使用 `MonoTouch`\n*   使用 JavaScript 配合 Appcelerator 的 `Titanium\
  \ Studio` 和 Mobile SDK\n*   结合 `Marmalade SDK` 使用 `Xcode`\n\n在熟悉了如何使用本章涵盖的每一种选项开发\
  \ Hello, World 应用程序之后，我们将可以在本书的剩余部分中更详细地探讨 iOS 的不同元素以及更高级的应用程序。\n\n## 了解限制条件\n\n\
  在开始使用第三方选项之前，有必要了解一些基本原则性限制：\n\n*   **原生应用需要 Mac**：要编写和执行原生 iOS 应用程序，你将需要一台 Mac。\n\
  *   **SDK 的完整性**：诸如 `Mono` 之类的第三方选项在现有 iOS SDK 之上提供了一层抽象，但通常未能完全实现 iOS SDK *所有*\
  \ 的功能。因此，如果你想要完整的 API 实现，要么需要绕开第三方实现中的缺口，要么尝试编写自己的实现。\n*   **速度**：如果你想充分利用 iOS 设备的性能，直接基于\
  \ SDK 使用 Objective-C 编写应用程序是无法被取代的。其他选项虽然可行，但它们引入的抽象层会拖慢你的应用程序速度。\n\n在描绘了第三方选项相对暗淡的前景之后，有必要指出其中一些方案是非常可行的。`Mono`\
  \ 的实现尤其如此，它使用一种熟悉的语言提供了 iOS SDK API 最完整的实现。速度通常也不是问题。\n\n## 使用 Mono 与 MonoTouch\
  \ 进行开发\n\n你现在应该已经知道，本书的重点是支持你使用多种方法为 Apple 移动设备开发应用程序，并着重强调重用你现有的 .NET 知识和技能。\n\n\
  .NET Framework 在微软 Windows 操作系统上的成功并未被开源社区忽视。许多人希望 .NET 不仅能在 Windows 上使用，也能在其他操作系统（如\
  \ Linux 和 Mac OS X）上使用。值得庆幸的是，有人为此付诸了行动。Miguel de Icaza 主动承担起这份责任，并在社区的支持下，将 .NET\
  \ 带到了这些操作系统上，使你能够为众多平台编写 .NET 应用程序。而且这并未止步。很快，`SharpDevelop` IDE 被移植到了 `Mono` 上，并由此诞生了\
  \ `MonoDevelop`，创建了一个类似 Visual Studio 的 IDE，它不仅能针对 .NET 应用程序，还能针对 C、C++、Python 和\
  \ Java。\n\n因此，你拥有了 .NET Framework、对 C# 等 .NET 语言的支持，以及一个强大的 IDE，而支持移动革命自然是顺理成章的事！事实上，他们走得更远。他们不仅推出了\
  \ `MonoTouch`，提供了一种为 iPhone 创建基于 C# 和 .NET 的应用程序的机制，还推出了 `MonoMac`。`MonoMac` 是一项有趣的进展，用于在\
  \ Mac OS X 上使用 `Mono` 创建 Cocoa 应用程序。（更多信息，请访问 [`http://www.mono-project.com/MonoMac`](http://www.mono-project.com/MonoMac)。）此外，基于与\
  \ `MonoTouch` 相同的原理，`MonoDroid` 也已发布，但其目标是 Android 操作系统。\n\n关于 `MonoMac` 和 `MonoDroid`\
  \ 就先说到这里；让我们来看看 `MonoTouch`。如上所述，它允许你使用 `Mono`，通过 API 绑定 iOS API 来为 iPhone、iPad\
  \ 和 iPod touch 开发应用程序。\n\n鉴于它基于 .NET Framework 并支持 C# 编程语言，你们这些 .NET 开发者应该会感到得心应手！让我们来看看如何获取、安装并使用必要的组件，以利用\
  \ `Mono` 工具编写我们的 Hello, World iPhone 应用程序。\n\n### 安装 Mono、MonoDevelop 与 MonoTouch\n\
  \n要开始，你需要下载并安装以下组件。这些组件可以从 Mono 项目主页 ([`http://www.mono-project.com/`](http://www.mono-project.com/))\
  \ 获取。\n\n*   **Mono**：这是实际的 `Mono` 框架。它包括 .NET Framework 的开源实现、语言支持以及辅助工具。你可以从 [`http://www.go-mono.com/mono-downloads/download.html`](http://www.go-mono.com/mono-downloads/download.html)\
  \ 下载 `Mono`。\n*   **MonoDevelop**：这是一个主要为 .NET 及其语言（如 C#）设计的 IDE。我们将使用它，就像上一章使用\
  \ `Xcode` 一样，或者就像你可能使用 Visual Studio 来构建应用程序那样。你可以从 [`http://monodevelop.com/Download`](http://monodevelop.com/Download)\
  \ 下载 `MonoDevelop`。\n*   **MonoTouch**：这是魔法发生的地方。`MonoTouch` 是一个使用 `Mono` 为 iPhone\
  \ 开发应用程序的 SDK。使用它，你将能够编写应用程序并在 iPhone 模拟器上进行测试。你可以从 [`http://monotouch.net/Store`](http://monotouch.net/Store)\
  \ 下载试用版或购买完整版。\n\n\n\n## 安装 Mono\n\n首先，访问 Mono 项目下载页面，下载适合您开发平台的 Mono 发行版。由于开发基于\
  \ iOS 的应用程序要求使用 Mac OS X 平台，我们将在此平台上运行 Mono，但您会发现，Windows 以及许多 Linux 和 Unix 发行版也支持。另外请注意，Mono\
  \ 已将下载选项方便地分为稳定版和长期支持版。二者的区别本质在于，最新最强大的功能都包含在最新的稳定版中。\n\n**注意：** 在撰写本文时，最新的稳定版本是\
  \ 2.10.5，需要 Mac OS X Leopard (10.5)、Snow Leopard (10.6) 或 Lion (10.7)。\n\n在 图 3–1\
  \ 所示的 Mono 下载页面中，选择您的平台，然后选择合适的芯片组（例如 Intel 或 PowerPC）对应的 SDK 包，如果不确定，则选择通用选项。\n\
  \n![images](img/0301.jpg)\n\n**图 3–1.** *从下载页面选择 Mono SDK 包*\n\n您会注意到有运行时和 SDK 两种选项。如果您只想运行为\
  \ Mono 编写的应用程序，请使用运行时；如果您想运行应用程序并使用 Mono API 编写自己的应用程序，请使用 SDK。它同时包含运行时和 SDK 开发平台。\n\
  \n下载完成后，点击下载文件夹中的图标即可开始安装，如 图 3–2 所示。\n\n![images](img/0302.jpg)\n\n**图 3–2.** *Mono\
  \ 框架安装启动画面*\n\n按照屏幕上的说明完成安装。该软件不大，安装过程应能很快完成。安装完成后，您不会看到任何明显的桌面或工具栏图标。\n\n我们来测试一下安装。我们将创建一个控制台版本的“Hello,\
  \ World”应用程序，并使用命令行和终端窗口（在 Mac 上）来完成此操作。\n\n首先，创建一个文件夹来存放源代码，并创建一个名为 `HelloWorld.cs`\
  \ 的文件，内容如下：\n\n```\nusing System;\n\npublic class HelloWorld\n{\n        static\
  \ public void Main ()\n        {\n                Console.WriteLine(\"Hello, World\"\
  );\n        }\n}\n```\n\n任何 .NET 开发者都应该能立刻明白这段代码的结构。我们只是简单地将一个文本字符串输出到将显示文本的控件。\n\
  \n将此示例保存到磁盘后，您可以尝试使用 Mono 编译器进行编译。在源代码所在的同一目录下，只需在命令提示符中输入以下命令：\n\n`gmcs HelloWorld.cs`\n\
  \n如果没有错误，这将静默地编译您的源代码，并在目录中生成 `HelloWorld.exe`。通过将其发送到 Mono 运行时（由 `mono` 命令前缀表示）来运行这个编译好的可执行文件：\n\
  \n`mono HelloWorld.exe`\n\n这应输出文本 \"Hello, World.\"\n\n如果一切正常，则说明您已成功安装 Mono，我们可以继续安装\
  \ MonoDevelop 应用程序了。如果未成功，Mono 支持页面或社区页面应该能帮助您找到解决方案。\n\n## 安装 MonoDevelop\n\n现在您可以下载\
  \ MonoDevelop 了。请确保您下载的版本与已安装的 Mono 版本相匹配。例如，MonoDevelop 2.4.2 至少需要 Mono 2.4 才能运行。\n\
  \n在 图 3–3 所示的主页上，选择您需要的版本。同样，选择通常包括最新的稳定版和更新但未经测试的测试版。选择 Mac OS X 平台，然后根据您偏好的安装机制开始下载（我使用了包，因为它们易于上手）。\n\
  \n![images](img/0303.jpg)\n\n**图 3–3.** *MonoDevelop 主页*\n\n下载 MonoDevelop 后，点击磁盘映像文件。系统将提示您通过将\
  \ MonoDevelop 拖拽到 `Applications` 文件夹来完成安装，如 图 3–4 所示。这将完成您的安装。\n\n![images](img/0304.jpg)\n\
  \n**图 3–4.** *MonoDevelop 包安装*\n\n点击新安装的图标将启动 MonoDevelop 应用程序。这将启动 MonoDevelop\
  \ IDE，如 图 3–5 所示。\n\n**注意：** 安装程序可能会提示有可用的 MonoDevelop 更新。如果是这种情况，安装它们是可选的，但如果它们被标记为稳定版，我建议您进行安装。\n\
  \n![images](img/0305.jpg)\n\n**图 3–5.** *运行 MonoDevelop*\n\n我建议您探索一下这个应用程序，查看一些可用的链接。完成此操作后，我们可以快速创建一个与我们用来测试\
  \ Mono 安装的控制台应用程序类似的应用程序。\n\n首先选择“Start a New Solution”链接，这将弹出一个“Project Template”对话框，您会注意到其中有一个\
  \ C# 控制台项目。按照屏幕上的说明创建您的项目，选择项目的位置并为其命名。您将看到一个空项目和一个默认的 `main.cs` 文件，其中包含一个与我们的非常相似的“Hello,\
  \ World”实现。只需选择 `Build` ![images](img/U001.jpg) `Run`，就会显示一个终端窗口，其中显示文本 \"Hello,\
  \ World.\"\n\n是不是简单多了！\n\n\n\n## 安装 MonoTouch\n\n最后，为了完成“Mono 三部曲”，我们来了解一下如何获取并安装\
  \ MonoTouch。首先需要注意的是，MonoTouch 并非免费产品。根据您所需的版本，价格从 99 美元到 3,999 美元不等！请参考来自 MonoTouch\
  \ 网站的图 3-6 中的表格，其中详细列出了不同功能及对应价格。\n\n![images](img/0306.jpg)\n\n**图 3-6.** *MonoTouch\
  \ 版本功能对比*\n\n此处的关键要点是：若要通过 Apple App Store 分发使用 MonoTouch 创建的应用程序，您需要价格为 399 美元的\
  \ Professional 版本。同时还有价格 79 美元的学生版，允许您创建应用程序，但只能通过临时部署（ad hoc）分发到 Apple 设备，而无法上架\
  \ App Store。我们将在第 9 章中讨论应用程序的分发问题。\n\n现在，让我们先使用免费的试用版。虽然它不允许通过 App Store 分发，但允许您在\
  \ iPhone/iPad 模拟器上测试应用程序。请访问 [`http://monotouch.net/DownloadTrial`](http://monotouch.net/DownloadTrial)，输入您的电子邮件地址，然后点击下载按钮获取试用版。\n\
  \n点击下载的安装包开始安装。这将启动安装程序，如图 3-7 所示。按照安装说明进行操作。安装完成后，安装程序应会自动跳转到包含刚安装的 MonoTouch 版本发布说明的网页。\n\
  \n![images](img/0307.jpg)\n\n**图 3-7.** *运行 MonoTouch 安装程序*\n\n您可以立即开始使用 MonoTouch，但这需要使用命令行功能，以确保您开发的应用程序是基于\
  \ MonoTouch 许可证构建的。如果您更喜欢使用 MonoDevelop，那也是可以的。不过，您会发现我们安装的 MonoDevelop 版本中没有 MonoTouch\
  \ 模板。在撰写本文时，您需要下载并安装一个特殊版本的 MonoDevelop，该版本已更新以识别 MonoTouch SDK。可以从 [`http://monodevelop.com/Download/Mac_MonoTouch`](http://monodevelop.com/Download/Mac_MonoTouch)\
  \ 获取。下载并选择安装后，其安装过程与您之前安装的另一个 MonoDevelop 版本类似。只需将新版本拖入您的 `Applications` 文件夹，在提示替换现有版本后，新版本的\
  \ MonoDevelop 即可安装完成。\n\n启动 MonoDevelop 并像之前一样选择“创建新解决方案”。这次，当您展开 C# 或 VBNet 项目时，会看到不同类型的\
  \ iPhone 和 iPad 项目选项，如图 3-8 所示。\n\n![images](img/0308.jpg)\n\n**图 3-8.** *添加了 MonoTouch\
  \ 项目模板的 MonoDevelop*\n\n## 使用 MonoTouch 创建“Hello, World”应用\n\n现在我们来构建“Hello, World”应用程序。就像上一章使用\
  \ Xcode 4 时一样，首先选择“基于窗口的 iPhone 项目”，然后按照您的偏好输入名称和位置。点击“下一步”后，将会创建一个包含默认文件和实现代码的\
  \ iPhone 基于窗口的项目，如图 3-9 所示。\n\n![images](img/0309.jpg)\n\n**图 3-9.** *MonoDevelop\
  \ 中的默认 iPhone 基于窗口的应用程序*\n\n快速查看会发现，它与我们在第 2 章中创建的 Xcode 项目有一些相似之处。两者都有一个包含 `AppDelegate`\
  \ 实例的 `main.cs` 文件，该实例使默认窗口成为关键窗口并可见。这不足为奇。它使用了 Cocoa API，但采用的是 .NET 实现。\n\n继续构建并运行此应用程序。它不如\
  \ Xcode 快，但考虑到额外的抽象层级，这也是意料之中的。您的应用程序最终会在 iPhone 模拟器中启动。虽然目前是一个空窗口，但这是您的第一个 .NET\
  \ iPhone 应用！\n\n为了与我们的 Xcode 示例保持一致，让我们添加一个特定的视图及其关联的视图控制器，以显示我们的标签，并允许我们将其初始化为文本“Hello,\
  \ World”。关键区别在于，这次我们将使用 .NET 进行开发。\n\n值得庆幸的是，在 MonoDevelop 中为项目添加视图和视图控制器非常容易。选中项目后，选择\
  \ `File` ![images](img/U001.jpg) `New` ![images](img/U001.jpg) `File` 菜单选项，打开“新建文件”对话框。展开\
  \ C# 树，然后选择“带控制器的 iPad 视图”，如图 3-10 所示。然后点击“新建”将这些文件添加到您的项目中，同样带有可供您完成的默认结构和实现代码。\n\
  \n![images](img/0310.jpg)\n\n**图 3-10.** *MonoDevelop 新建文件对话框*\n\n像在 Xcode 示例中一样，选择\
  \ `HelloWorldView.xib` 文件。这将启动 Interface Builder。继续添加一个标签并将其作为输出口连接，方法同上一章的 Xcode\
  \ 4 示例。\n\n现在我们可以设置文本值。一旦代码连接好，我们只需重写 `ViewController` 类的 `ViewDidLoad()` 方法，并在其中通过名称访问标签用户对象，如下所示：\n\
