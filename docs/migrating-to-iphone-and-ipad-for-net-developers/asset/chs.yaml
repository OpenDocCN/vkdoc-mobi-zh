- '# 关于技术审校


  ![图片](img/john_allen.jpg) `约翰·艾伦`是 BAE Systems Detica 公司的高级经理兼企业架构师。他在大型企业系统的设计与开发领域拥有超过
  15 年经验，是软件工程和现代交付方法领域的专家。约翰曾参与多个开源项目和 IT 初创公司，并持续为了乐趣与收益而编程，目前专注于移动应用、大数据和实时分析领域。


