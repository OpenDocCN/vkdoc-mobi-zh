- '# 关于作者


  ![图片](img/mark_mamone.jpg) `马克·马蒙`是 Serco 公司地方政府与商业领域的全球专业服务主管。他拥有 23 年的 IT 从业经验，自微软.NET
  发布测试版起便参与其中，自 Mono 诞生之初就投入研究，并在 Objective-C 与 iPhone 开发问世时便已涉足。作为认证企业架构师和经验丰富的首席技术官，马克撰写或合著了多本关于
  Linux、.NET、Mono 及数据库等主题的书籍。


