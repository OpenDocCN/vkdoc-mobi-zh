  - 为`NewGame()`提供默认实现，该实现会重置我们的游戏变量。\n- 为`UpdateLander()`方法提供一个占位符，我们将在其中应用游戏物理机制，以响应推进器点火时长和按键操作。\n\
  - 为`RotateLeft()`、`RotateRight()`和`Thrust()`方法提供空实现，这些方法将实现游戏机制。\n\n再次请你在代码清单 5-6\
  \ 中找出所有这些特性。\n\n**代码清单 5-6.** *GameView.m*\n\n```\n#import \"GameView.h\"\n\n@implementation\
