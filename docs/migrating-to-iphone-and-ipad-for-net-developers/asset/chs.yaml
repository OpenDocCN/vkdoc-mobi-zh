  \ World”应用程序——并使用 MonoTouch 在 iPhone（确切说是模拟器）上运行。但还有更多可用选项。在本章的剩余部分，我们将集中讨论如何使用几种更稳定且受欢迎的可用选项创建相同的测试应用程序，这些选项使用你可能熟悉的\
  \ Objective-C 和 .NET 之外的语言，在某些情况下甚至可以在基于 Microsoft Windows 的 PC 上运行。\n\n## 使用 Appcelerator\
  \ 的 Titanium Mobile\n\nAppcelerator Titanium Mobile 平台的创建目的是支持使用更常见的语言并利用基于 JavaScript\
  \ 的 API，为移动设备、平板电脑和桌面设备进行跨平台原生应用开发。Titanium Mobile SDK 与原生 SDK 工具链（在 Apple 情况下是\
  \ iOS SDK）协同工作，将您的 JavaScript 源代码、JavaScript 解释器和静态资源组合成一个可执行的应用程序，该程序可以安装在模拟器或移动设备上。\n\
  \n请注意，由于 Apple 的许可协议，Titanium Mobile 在哪些平台可用于哪些移动设备和操作系统方面存在限制。表 3-1 总结了支持选项。\n\n\
  ![images](img/t0301.jpg)\n\n尽管存在这些限制，但值得注意的是，入门是免费的，我们将重点关注 Mac OS X 操作系统。与我们的 MonoTouch\
  \ 示例类似，我们将安装 Titanium Mobile，然后使用它来创建我们的“Hello, World”iPhone 应用程序。区别在于，这次我们将使用 JavaScript\
  \ 编写代码。\n\n\n\n### 安装 Titanium\n\n第一步是从 Appcelerator 的 Titanium 主页 [`http://www.appcelerator.com/products/download/`](http://www.appcelerator.com/products/download/)\
  \ 下载所需软件。下载完成后，按照传统的 Mac 方式安装该应用程序：将 `Titanium Developer` 图标拖入 `Applications` 文件夹，即可启动安装程序。请按照安装程序提供的屏幕提示进行操作，如图\
  \ 3–11 所示。\n\n**注意：** `Titanium Developer` 是一个全局图形用户界面，它位于现有的各种 SDK 之上，并充当您的统一参考点。一旦安装了\
  \ `Titanium Developer`，不同的移动 SDK 都可以在其中安装。首次运行时，它将自动尝试下载移动版和桌面版 SDK 的当前版本。\n\n![images](img/0311.jpg)\n\
  \n**图 3–11.** *Titanium Developer 安装程序*\n\n安装好 Titanium 后，建议您注册成为 Titanium 开发者，这样您就能访问在线资源，帮助您进行应用程序开发。\n\
  \n### 使用 Titanium 创建 Hello, World\n\n启动 `Titanium Desktop`，让它更新移动 SDK。随后您将看到一个空白的图形用户界面。安装程序已自动检测到\
  \ iOS SDK，因此无需再安装该包（除非您想使用更新的版本）。让我们开始行动吧。\n\n首先选择 `New Project` 选项。这将弹出一个对话框，让您填写一些标准项目属性，如图\
  \ 3–12 所示。在填写屏幕表单时，您可能会注意到，在 `Project Type` 下拉列表中，iPhone 选项使用的是 `Mobile` 项目类型，而\
  \ iPad 则有专门的选项。填写完毕后，选择 `Create Project` 选项来创建移动应用程序。\n\n![images](img/0312.jpg)\n\
  \n**图 3–12.** *Titanium Mobile 新建项目对话框*\n\n**注意：** 请注意，在我的安装中，我选择不安装 Android SDK。如果您想尝试安装，在线资源会为您提供相关说明。\n\
  \n将显示空白的 `HelloWorld` 项目，并提供访问 `Dashboard`、`Edit` 或 `Test & Package` 应用程序的选项。在 `Dashboard`\
  \ 上，您会看到许多帮助您入门的在线资源，如图 3–13 所示。\n\n![images](img/0313.jpg)\n\n**图 3–13.** *Titanium\
  \ Mobile 中的空白项目 Dashboard*\n\n如果您直接切换到 `Test & Package` 选项标签，就会看到如图 3–14 所示的界面。其中一个选项是\
  \ `Launch` 按钮，它会根据所选的项目类型（在我们的示例中为 iPhone 模拟器），在移动设备模拟器中构建并运行您的应用程序。\n\n![images](img/0314.jpg)\n\
  \n**图 3–14.** *Titanium Mobile 中的 Test & Package 标签*\n\n由 Titanium Mobile 生成的默认应用程序提供了两个标签，每个标签上有一个文本标签。我们将对其进行修改，使其只显示一个标签，并显示我们选择的文本（“Hello,\
  \ World”）。\n\n首先，让我们看看创建的文件和文件夹结构。除了创建的文件外，还添加了以下文件夹：\n\n*   **`\\build`**：此文件夹包含从\
  \ SDK 导入的文件以及通常无需修改的自动生成文件，例如 `main.m` 文件。二进制文件和库文件也位于此处。\n*   **`\\resources`**：此文件夹包含支持您应用程序的资源，包括源代码。在这里，您会找到\
  \ `app.js` 文件，这是用于启动应用程序的主要 JavaScript 应用程序文件。我们将在此文件中进行修改。\n\n花点时间检查一下 `app.js`\
  \ 文件。它相当简单明了。如前所述，默认实现是创建两个标签，每个标签包含一个文本标签，并将它们添加到主应用程序窗口中，我们将对此进行调整，使其只显示一个标签和文本标签。\n\
  \n让我们检查一下代码的一些重点。首先，最明显的一点是，代码首先引用了 `Titanium.UI` 命名空间。此命名空间包含用于访问用户界面对象的类。它利用这些信息来初始设置背景，并创建一个标签组，如下所示：\n\
  \n```\nvar tabGroup = Titanium.UI.createTabGroup();\n```\n\n新的 `Tab` 对象将添加到此组中，每个\
  \ `Tab` 指向一个在选中时显示的窗口（尽管我们的代码将只实现一个标签来显示“Hello, World”文本）。请考虑以下代码：\n\n```\n//\n\
  // 创建基本的 UI 标签和根窗口\n//\nvar win1 = Titanium.UI.createWindow({  \n    title:'Tab\
  \ 1',\n    backgroundColor:'#fff'\n});\nvar tab1 = Titanium.UI.createTab({  \n \
  \   icon:'KS_nav_views.png',\n    title:'Tab 1',\n    window:win1\n});\n```\n\n\
  这段代码创建了主窗口，并将其标题设置为 `Tab 1`，使用一个 `Tab` 对象来分配此窗口。在应用程序中选中此标签时，它将显示此窗口。\n\n让我们跳到创建新标签的代码部分，这部分代码是在创建新窗口并将其分配给新标签之后执行的。请考虑以下片段：\n\
  \n```\nvar label1 = Titanium.UI.createLabel({\n        color:'#999',\n        text:'Hello,\
  \ World',\n        font:{fontSize:20,fontFamily:'Helvetica Neue'},\n        textAlign:'center',\n\
  \        width:'auto'\n});\n\nwin1.add(label1);\n```\n\n我们只是创建了一个标签对象，并为其设置了“Hello,\
  \ World”文本。然后我们可以将其添加到由 `win1` 变量引用的主窗口中。\n\n最后，我们将标签添加到标签组，并打开标签组，在主应用程序中显示窗口和标签。\n\
  \n```\n//\n//  添加标签\n//\ntabGroup.addTab(tab1);\n\n// 打开标签组\ntabGroup.open();\n\
  ```\n\n执行这些操作后，应用程序将显示我们的“Hello, World”文本。并且由于它是在 Titanium Developer IDE 中构建的，它还将启动\
  \ iPhone 模拟器，如我们正在运行的应用程序图 3–15 所示。\n\n![images](img/0315.jpg)\n\n**图 3–15.** *Titanium\
  \ Mobile HelloWorld 应用程序*\n\n如您所见，Titanium IDE 易于使用，并且拥有完整的 API。我将把进一步的探索留给您，您可以借助在线参考资料和\
  \ `Kitchen Sink` 应用程序（它提供现成的示例供您研究和修改）来尝试。\n\n## 使用 Marmalade SDK\n\nMarmalade SDK\
  \ 与 Titanium Mobile 有着相同目标，即让您能够针对一个与移动设备及其操作系统无关的 API 来构建应用程序。使用它，您可以一次性开发跨平台应用程序！\n\
  \nMarmalade SDK 支持一键部署到多种操作系统，包括 iOS、Android、Symbian、Windows Mobile 等。我们将使用 Xcode\
  \ IDE 来创建基于 Marmalade 的应用程序。\n\n**注意：** 虽然 Marmalade API 支持所有类型应用程序的核心功能，但它偏向于游戏开发。您将发现一套丰富的\
  \ API，可以助您编写引人入胜的移动游戏。\n\nMarmalade SDK 可以被视为以下两个组件：\n\n*   **MarmaladeSystem**：它提供操作系统抽象\
  \ API，与相关库结合使用时，您可以构建适用于多种操作系统的移动应用程序。它提供了一套工具以及名为 `S3E API` 的 C API。\n*   **MarmaladeStudio**：它提供了一套工具和运行时组件，允许专注于高性能\
  \ 2D 和 3D 图形与动画的开发。\n\n\n\n### 安装 Marmalade\n\n首先，您需要在 Marmalade SDK 网站（`http://www.madewithmarmalade.com/downloads`）注册。注册完成后，您将收到一封激活邮件。激活账户后，您便可以下载评估版软件进行试用。（当然，您也可以直接购买，但我假设您想先试用一下。）评估版允许您进行除公开发布所编写应用程序之外的所有操作。\n\
  \n下载软件包后，点击图标开始安装。您将看到安装程序，如图 3–16 所示。\n\n![images](img/0316.jpg)\n\n**图 3–16.**\
  \ *Marmalade 安装程序*\n\n按照屏幕提示操作，包括输入您的 Marmalade 账户凭据，以便在之前从网站上获取的 30 天评估许可下进行安装。\n\
  \n默认安装位置为 `/Developer/Marmalade-SDK/<`*`版本号`*`>`，其中 <*`版本号`*> 是您安装的 SDK 版本。安装完成后，您不会看到任何新图标，但会在目标位置找到新安装的文件。以下为安装的关键文件夹：\n\
  \n* **`\\Applications`**：此文件夹包含 SDK 的顶级应用程序。\n* **`\\docs`**：此文件夹包含文档，包括用户手册。\n\
  * **`\\examples`**：此文件夹包含示例应用程序。\n* **`\\extensions`**：此文件夹包含扩展开发工具包。\n* **`\\Marmalade`**：此文件夹包含\
  \ Marmalade 使用的其他工具。\n* **`\\s3e`**：此文件夹包含 Marmalade 系统头文件和运行时库。\n* **`\\modules`**：此文件夹包含所有\
  \ Marmalade Studio 头文件和运行时库。\n\n### 使用 Marmalade 创建 Hello, World\n\n现在您已经安装了 Marmalade，或许还浏览了一下它的文件夹和文件，让我们开始创建应用程序。\n\
  \n首先启动 Xcode（当然，我们也可以使用命令行，但 IDE 的存在是为了让我们的生活更轻松，所以让我们使用它们）。我们将使用提供的其中一个示例，因为它们提供了\
  \ Xcode 4 部署到 Marmalade 模拟器所需的所有配置。该模拟器是用于调试原生 Marmalade 可执行文件（扩展名为 `.s3e`）的工具。\n\
  \n`.s3e` 文件本质上是与平台无关的动态链接库。Marmalade SDK 允许您通过简单地重新配置 IDE，为多个不同平台构建同一个应用程序。目前，我们只关注如何开始使用此类功能，因此我们先将它部署到\
  \ Marmalade 模拟器。\n\n使用 Finder 应用程序，找到 Hello, World 示例，该示例位于 `\\examples\\s3e\\s3eHelloWord`\
  \ 目录下。在此文件夹中，您会看到 `s3dHelloWorld.mkb` 文件，它本质上就是项目文件。通过菜单选择“打开方式”，然后选择 Marmalade\
  \ SDK 中提供的 `Mkb` 应用程序（位于 `\\Applications` 文件夹），即可打开它，如图 3–17 所示。\n\n![images](img/0317.jpg)\n\
  \n**图 3–17.** *使用 Mkb 打开 Marmalade SDK 项目*\n\n这将启动 Xcode，您可以在窗口顶部选择“调试模拟器”方案，然后点击“构建”。接着，选择“运行”。这将在模拟器中执行应用程序，并显示我们的“Hello,\
  \ World”文本，如图 3–18 所示。由此，您可以使用 Marmalade SDK 针对不同平台（包括 iOS）来开发您的应用程序。\n\n![images](img/0318.jpg)\n\
  \n**图 3–18.** *运行我们的应用程序的 Marmalade 模拟器*\n\n## 总结\n\n本章通过探讨可用的第三方选项，在前几章关于使用原生工具的知识基础上进行了扩展。其中最流行的替代方案之一是\
  \ Mono 和 MonoTouch，它提供了 Cocoa 和 Cocoa Touch API 的 .NET 实现，但使用的是 .NET 语言。该方案让您可以免费且获得原生使用体验地访问\
  \ iPhone 和 iPad 开发资源，并提供了一个类似 Visual Studio 的 IDE——MonoDevelop。\n\n正如您所学到的，只要您愿意使用\
  \ .NET 之外的语言（例如 JavaScript 或 C/C++），MonoTouch 并非唯一选择。其他可用的选项包括 Titanium Mobile 和\
  \ Marmalade SDK。这些选项都允许您编写原生应用程序，不仅适用于 iPhone 和 iPad，也适用于其他设备。实际上，这些平台正是为跨平台开发而构建的，允许您针对单一\
  \ API 进行开发，却能构建出可面向众多不同操作系统（包括 Apple、Android 和 Symbian）移动设备的应用程序。\n\n尽管这些第三方选项非常有用，但除了\
  \ MonoTouch 之外，它们对 .NET 语言支持的缺失使得过渡和复用现有经验变得更加困难。显然，使用 MonoTouch 会让这一过程简单得多，但您将依赖于\
  \ MonoTouch 对 iOS 和 Cocoa Touch SDK 的支持。如果支持不足或功能不完整，您将无法使用该选项——除非您自己编写实现！\n\n因此，除了亲自为\
  \ Mono 项目贡献代码外，另一种选择是将您的 C# 和 .NET Framework 知识映射到 iOS SDK 并使用 Objective-C。本书的其余部分将重点讨论如何做到这一点，并弥合您知识上的差距。\n\
  \n## 第 4 章\n\n## 深入探讨：.NET、Objective-C 和 iOS SDK\n\n理解 Apple 移动设备的能力、iOS 操作系统的特性以及可用于应用程序开发的不同选项，只是故事的一部分。使用原生\
  \ Apple 开发工具和众多第三方选项创建 Hello, World 应用程序固然酷炫，并且可以提交到 Apple 的 App Store，但这并不会为您带来数百万美元的收入。它很可能无法获得好评，甚至不会有任何下载量！\n\
  \n现在，我们需要研究如何创建一个更具吸引力的应用程序——一个将成为下一个“必备”移动应用并能*帮您*赚到钱的程序。为此，我们需要更详细地探讨运行时框架，并更加深入地研究支持设计时框架的细节。这将帮助您在应用程序中打造丰富的用户体验。\n\
  \n我们将利用您现有的 .NET 知识，并将其应用到 Apple 自己的原生工具和 SDK 中。这不仅能让您创建出心仪的应用程序，还能让您在充分发挥 Apple\
  \ 设备功能方面抢占先机。目标是让从 .NET 到 Apple 原生开发环境的过渡变得更轻松、更快捷。\n\n在本章中，我们将更详细地比较 iOS SDK 与\
  \ .NET 的功能以及所支持的不同语言。具体来说，我们将涵盖以下主题：\n\n* 比较 Apple 移动设备的相对能力\n* 深入应用程序内部，审视其结构和生命周期\n\
  * 思考应如何设计应用程序，以及 Apple 为此提供了哪些帮助\n* 从方法和实现上比较 iOS SDK 与 .NET Framework\n* 比较用于支持应用程序开发的开发工具\n\
  * 回顾 Objective-C 和 Xcode 4 入门知识\n\n我们将从目前为止的介绍基础上开始，通过将 iOS 和 iOS SDK 与 .NET Framework\
  \ 及编程模型并列审视，进行更详细的探讨。\n\n\n好的，作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，对给定的英文文本进行专业、准确的中文翻译。\n\
  \n\n## 比较 iOS 设备的性能\n\n我们之前已经简单介绍过可以使用 iOS SDK 为其编写应用程序的苹果设备类型，并指出并非所有设备都性能相同。因此，仔细考量您打算支持的目标设备、它们各自的优缺点以及操作系统所暴露的功能特性至关重要。这种审慎的评估将确保客户获得您预期的用户体验，并确保您在开发应用程序时，能够充分利用目标设备的性能，从而打造出稳健可靠的应用程序。\n\
  \n本书的重点是移动应用程序的开发（尽管部分工具和技术也可用于桌面应用程序）。就现有的移动设备而言，我们的目标对象是 iPhone、iPod touch 和 iPad。表\
  \ 4-1 列出了基于各设备最新一代型号的一些特性。\n\n![images](img/t0401.jpg)\n\n## iOS 应用设计\n\n在开始考虑应用程序设计时，除了考察目标设备的性能外，还有其他几个重要因素需要注意，例如兼容性和性能调优。此外，在使用\
  \ iOS SDK 和 Objective-C 进行开发时，您还应该了解某些设计模式，这将让您深刻理解为何类和 API 会以特定的方式实现。设计模式也为确保您自己应用程序的简洁与优雅提供了一种绝佳方法。\n\
  \n我们将在接下来的章节中进一步深入探讨设计考量和设计模式。\n\n### 设计考量\n\n在规划和开发应用程序时，遵循一套总体原则不仅有助于确保应用程序设计良好、符合其目的，还能让您充分利用目标设备上的可用性能。在阅读本书的过程中，请务必考虑以下原则：\n\
  \n-   设计您的应用程序，使其尽可能与最广泛的设备兼容。这将最大限度地扩大您的市场机会。\n-   使用设备的高级功能是可以的，但如果可能，请提供自动和/或手动关闭这些功能的选项。\n\
  -   尽可能在多种设备上进行测试，而不仅仅是使用模拟器——如果可能，请在真实设备上进行测试。我们将在第 9 章中更详细地探讨测试这个主题。\n-   在跨越重大外形尺寸（例如从\
  \ iPhone 到 iPad）时，不要贪图方便而不更改您的应用程序。\n-   注重性能调优。要留意内存限制和多线程能力。\n-   谨记考虑成本。如果您的应用需要网络连接，请考虑在使用\
  \ 3G 网络时定期搜索 Wi-Fi。\n\n在构建应用程序时，您应始终牢记这些基本考量。现在，让我们继续学习一些具体的 iOS 设计模式。\n\n### 设计模式\n\
  \n在使用 iOS SDK 和 Objective-C 设计和实现应用程序时，首先要注意的是苹果对设计模式的运用。设计模式并非一个新概念，但并非所有操作系统或\
  \ SDK 都忠实地实现了它们。例如，.NET 的 Windows Forms 处理用户界面设计的方式，并没有定义或规定任何类型的设计模式。这完全取决于开发者个人，如果该开发者选择这样做的话。\n\
  \n*设计模式*描述了一种解决常见问题的方法，并为此创建了优雅的解决方案设计。这种设计以书面形式表达，通常配以描述对象、对象关系及其行为的图表。\n\n单例模式是一个很好的设计模式例子。它将类的实例化限制为单个对象。第一次调用时，会创建一个对象，但后续调用会返回对现有对象的引用。它通常用于`Application`对象，每个应用程序只能存在该类的一个实例。\n\
  \n苹果对设计模式的使用，从根本上帮助构建了一个框架，您的应用程序可以在此框架内编写，并在此过程中，帮助强化苹果所竭力维护的用户体验。此外，使用设计模式也是一种良好的实践。它使应用程序的实现更加容易，因为围绕如何设计应用程序的一些决策已经为您做好了。\n\
  \n使用设计模式的做法并非 .NET Framework 的固有要求。它提供了一个带有 API 的类库，但应用程序的架构结构以及设计模式的实现都留给您自己——嗯，几乎如此！可以想象，.NET\
  \ 社区总是乐意提供支持，无论是微软自己通过 Microsoft Developer Network (MSDN) 在 [`http://msdn.microsoft.com`](http://msdn.microsoft.com)\
  \ 提供的支持，还是诸如 dofactory 在 [`http://www.dofactory.com/Framework/Framework.aspx`](http://www.dofactory.com/Framework/Framework.aspx)\
  \ 等第三方站点提供的支持。\n\n表 4-2 描述了您将在应用程序中使用的一些重要 iOS 设计模式。\n\n![images](img/t0402.jpg)\n\
  \n现在，您已经对基本的设计考量和设计模式有了一个概述，我们将深入探讨应用程序在 iOS 上运行时的结构和生命周期。\n\n## 深入探究应用程序的内部结构\n\
  \n因此，您已经选择了想要支持的一个或多个设备，并对其性能有了大致了解。现在，让我们看看应用程序在 iOS 操作系统上是如何构建的，设计它们时需要考虑什么，以及它们是如何构建的基本原理。\n\
  \n一旦您设计好了应用程序，就可以开始研究如何实现它。在此阶段，理解 iOS 应用程序是如何构建并在内部运行的至关重要。请考虑 图 4-1 中展示的核心应用程序生命周期。\n\
  \n![images](img/0401.jpg)\n\n**图 4-1.** *iOS 应用生命周期*\n\n正如您在图中所见，MVC 模式是 iOS 应用程序的核心，考虑到应用程序需要显示用户界面并需要人工交互，这一点并不令人意外。\n\
  \n一旦您的应用程序启动，UIKit 框架将负责管理其行为。它从操作系统接收事件，而您的应用程序必须响应这些事件，这些事件可能是系统生成的，也可能是用户生成的。这种行为类似于\
  \ Microsoft Windows 的消息模式，即通过一个消息队列来检索和处理事件。\n\n您无需亲自处理每一条消息。许多消息都有默认的实现，因此框架会自动处理它们。但是，当您需要替代行为，或者想以某种方式更改默认行为时，您可以为这些事件提供自己的实现。\n\
  \n接下来，让我们看看作为应用程序生命周期一部分的事件序列。\n\n\n\n## 应用程序生命周期\n\n一旦你启动应用程序（通常通过点按屏幕上的图标），就会触发一系列事件，最终在移动设备上显示你的应用程序（你可以在图\
  \ 4-1 的应用程序生命周期图中看到这一点）。这被称为应用程序的*生命周期*。\n\n在第 2 章编写“Hello, World”应用程序时，我们已经初步接触了这一生命周期中涉及的一些关键函数。在调用\
  \ `main()` 函数之后，`UIApplicationMain()` 会被执行，并且直到应用程序退出时才会返回。该类会创建应用程序对象，确保应用程序委托被实例化，然后加载定义应用程序主窗口的主要\
  \ `.nib` 文件。\n\n应用程序通过查看信息属性列表文件 `Info.plist` 来确定要加载哪个主要的 `.nib` 文件。该文件包含存储在 XML\
  \ 文件中的许多键/值对，每个键/值对用于表示一个可配置参数。如果你使用 Xcode 打开 `Info.plist`，你会看到类似图 4-2 所示的屏幕。\n\n\
  ![images](img/0402.jpg)\n\n**图 4-2.** *Info.plist 值*\n\n你可以清楚地看到，“Main nib file\
  \ base name”条目被定义为 `MainWindow`。因此，如果我们查看目录，会看到一个名为 `MainWindow.xib` 的文件，这是默认加载的主窗口资源文件。你可以更改它，但几乎没有必要这样做。\n\
  \n加载资源文件会为其包含的任何对象创建类，并通过反序列化资源文件中保存的值来分配它们的相关属性。`.xib` 文件本质上是主窗口、用户界面和对象的序列化（保存到磁盘）版本，可以在任何时候重新构建（反序列化）（很像给干面条加水）。\n\
  \n**注意：** 你可以使用 `Info.plist` 文件来存储你自己的应用程序配置值。只需通过用户友好的 Xcode 编辑器或其他文件编辑器添加你的值即可。\n\
  \n在你的主应用程序运行后，它会由应用程序委托来管理，该委托使用*委托*模式来克服子类化带来的一些复杂性。这通常涉及创建一个继承自父类的新类，然后可能重写其父类中提供的方法。我们的应用程序委托实现了\
  \ `UIApplicationDelegate` *协议*，用 C# 的术语来说，这相当于实现一个*接口*。我们不需要使用具有继承方法和重写方法的对象层次结构，而是直接实现接口中明确标识的方法。\n\
  \n应用程序启动过程的最后阶段，它将进入*活跃*状态——这是应用程序将呈现的多种状态之一。这由 `applicationDidBecomeActive` 方法指示。\n\
  \n应用程序生命周期有一系列由 iOS SDK 定义的*状态*，你可以根据应用程序的状态来管理其行为。让我们看看存在哪些不同的应用程序状态，以及如何管理它们。\n\
  \n## 管理应用程序状态\n\n应用程序委托的一个关键职责是管理应用程序在运行时所经历的不同状态转换。iOS 4.0 引入了两种新的应用程序状态：应用程序可以在后台运行或处于挂起状态。\n\
  \n任何状态转换都需要你的应用程序做出响应，以确认其行为正确。例如，如果因启动新应用程序而将应用程序状态设置为后台，那么停止更新其用户界面是合理的。\n\n当应用程序状态发生变化时，你使用应用程序委托中调用的方法做出相应响应。同样值得注意的是，应用程序的启动可能不是用户直接请求的结果，而是通过间接请求触发的。例如，你的应用程序可能会被调用来处理推送通知。\n\
  \n在所有情况下，都会调用 `didFinishLaunchingWithOptions` 方法，并通过选项提供其被调用的原因，并且在某些情况下（例如由于推送通知），还会提供相关的数据有效载荷。\n\
  \niOS 4.0 及以上版本支持的所有状态如表 4-3 所示。\n\n![images](img/t0403.jpg)\n\n应用程序不会在未经历过渡状态的情况下，就简单地从一种状态直接转移到另一种状态。例如，如果应用程序因来电而被中断，应用程序会通过调用\
  \ `applicationWillResignActive` 方法被告知即将变为非活跃状态。这是你准备将应用程序发送到后台的机会。如果你接听了电话，应用程序将通过调用\
  \ `applicationDidEnterBackground` 方法被发送到后台。然而，如果你决定忽略呼叫，应用程序将重新获得前台焦点并再次触发 `applicationDidBecomeActive`\
  \ 方法，以便你进行相应处理。同样的情况也适用于之前在后台上运行并被发送到前台的应用程序。在这种情况下，会在进入前台之前调用 `applicationWillEnterForeground`\
  \ 方法，并在应用程序进入前台时调用 `applicationDidBecomeActive` 方法。这些状态如图 4-3 所示。\n\n![images](img/0403.jpg)\n\
  \n**图 4-3.** *应用程序状态图*\n\n## 管理应用程序的行为\n\n正如你所看到的，应用程序通常会花费时间在不同状态之间移动，尤其是在典型使用场景下。例如，用户经常会在多个应用程序之间切换，前一分钟还在查看邮件，下一分钟接听电话，然后上网浏览。我们已经探讨了处理状态变化的方式，以及\
  \ iOS SDK 如何巧妙地使用 Objective-C 的委托技术来调用一个方法，从而让你能够提供自己的实现。\n\n显然，你的应用程序如何响应这些状态变化在很大程度上取决于你的应用程序本身，因为每个应用程序都不同。但有些应用程序任务对所有应用程序来说都是相同的。在本节中，我们将简要介绍这些任务，这将帮助你入门。\n\
  \n### 处理方向变化\n\n苹果的移动设备内置了水银开关，可以感知设备的方向，从而也了解你的应用程序的方向。大多数 iOS 应用程序最初以竖屏模式启动，然后会旋转你的应用程序以匹配设备的方向；如果合理的话，有些应用程序会以横屏模式启动。对于你的应用程序来说，在不同方向下工作可能并不合适，这需要你来管理。例如，观看电影可能只适合横屏方向。\n\
  \n在你开始惊慌并思考究竟如何编写那些不可避免的复杂代码来旋转你的应用程序之前，请停下来！幸运的是，*自动旋转*（正如其名）可以通过 iOS 和 UIKit 框架的组合方便地处理——前提是你希望你的应用程序进行旋转。iOS\
  \ SDK 通过一个方法来支持自动旋转，该方法定义设备是否已旋转以及你的应用程序是否应支持该旋转，同时也通过 Interface Builder 来支持，你可以在其中定义视图如何管理用户界面的方向。我们将在本书后面进一步探讨这个主题。\n\
  \n\n\n#### 应用程序内的文件与应用程序沙盒\n\n与大多数操作系统一样，应用程序通常可以访问文件系统，但为了确保设备安全，会存在一些限制。iOS 为你的应用程序提供了对文件系统中某个仅由该应用程序访问的区域的访问权限。它通过使用*应用程序沙盒*来实现这一点，沙盒作为安全机制在\
  \ iOS 中实现。沙盒提供了细粒度的控制，限制了可能被利用而引发安全问题的区域，例如文件系统和网络资源访问。\n\n应用程序的沙盒在应用首次安装时建立。模拟器主目录的路径形式为\
  \ `<//应用程序根目录>/Applications/应用程序 ID>`，其中 `<根目录>` 是用户主目录下的以下目录：`/Library/Application\
  \ Support/iPhone Simulator/<iOS 版本>/`，这是文件系统中安装应用程序的区域。*`应用程序 ID`* 唯一标识了特定应用程序。两者组合起来，被称为*应用程序主目录*。\n\
  \n系统会创建多个重要的应用程序子目录，允许你的应用程序在 iOS 安全系统的约束范围内写入数据及其偏好设置。这些子目录是从应用程序主目录安装而来的。例如，`<根目录>/Applications\
  \ /应用程序 ID/Documents` 是存储应用程序数据和文档的位置。`/tmp` 目录则用于存放无需在应用程序启动之间持久保存的文件。\n\n**注意：**\
  \ 有关沙盒的更多详细信息，请参阅 *《iOS 应用程序编程指南》* 中的“文件系统”部分。\n\n#### 多任务处理\n\n本书不会涉及多任务处理，但此处简要介绍\
  \ iOS 4.0 中引入的功能，可帮助你利用在线资源进一步探索。\n\n.NET Framework 长期以来一直支持多任务处理，但在 iOS 中，直到 4.0\
  \ 版本才正式向应用程序开发者引入多任务支持。\n\n请注意，并非所有设备都支持多任务处理。你可以查询 `UIDevice` 的 `multitaskingSupported`\
  \ 属性，以判断运行应用程序的设备是否支持多任务。\n\n应用程序可以在后台处理某些任务，但这些任务受到严格控制。支持以下类型的后台行为：\n\n-   跟踪用户位置，可连续或定期监听更新。这对基于位置的应用程序非常有用。\n\
  -   播放后台音频。这在健身类应用程序中很常见。\n-   完成有限长度的后台任务。例如，将数据保存到磁盘以避免损坏。\n-   定时本地通知。例如，这用于闹钟类应用程序。\n\
  \n## 比较 .NET Framework 与 iOS 及 iOS SDK\n\n首先，我们比较一下这两个环境及其框架，定位各自在运行时和设计时方面的特性。在理解应用程序架构以及\
  \ API 的使用方式时，这些背景信息会很有用。花点时间看一下图 4-4 中的示意图。\n\n![images](img/0404.jpg)\n\n**图 4-4.**\
  \ *.NET 与 iOS 框架对比*\n\n如果我们考虑通用层以及 .NET Framework 和 iOS 操作系统及 SDK 所涵盖的要素，你会注意到以下相似之处：\n\
  \n-   **用户界面服务**：这些服务负责呈现用户界面和处理用户交互，例如设备输入。iOS SDK 使用 Cocoa Touch 扩展以及其他层（如媒体层）的方面来实现这一点，特别是多点触控输入。.NET\
  \ Framework 则包含 Windows Presentation Foundation (WPF) 和 Windows Forms 来实现此功能。\n\
  -   **应用程序服务**：此类服务整合了 .NET 和 Apple 框架（如 iOS SDK）中的多个组件部分。在 iOS 中，包括 Cocoa API、Cocoa\
  \ Touch 和媒体层；而对于 .NET，则包括基础服务、数据服务、通信和工作流等元素。涉及用户界面和用户输入的 API 部分被特意分离到用户界面服务中。\n\
  -   **运行时服务**：这是在运行时提供给应用程序的功能，通常包含在操作系统或运行在操作系统之上的运行时环境中。.NET 或 Java 运行时环境是运行在操作系统之上的运行时服务的好例子。运行时服务包括内存管理、磁盘访问、图形卡\
  \ API 等。\n-   **硬件**：在所有架构中，硬件保持不变，但其规格和性能会根据设备而变化。硬件之上的软件层提供了使用硬件的抽象方式。\n\n这些相似之处并不令人意外。经过多年的设备、操作系统和应用程序演变，最佳实践逐渐浮现，导致了这些相似性。因此，从高层看，很容易进行对比。但细节决定成败。如果我们深入一层，就会开始看到每个框架实现中的细微差别。我们会看到一些框架中包含的功能在另一个框架中完全不存在，或者通过不同的机制实现。\n\
  \n从堆栈顶部开始，让我们看看不同的层，比较其中的框架和库。这将帮助你理解 .NET 中的术语和结构，以及它在 Apple 世界中的对应部分如何工作。\n\n\
  我们不会深入探讨类及其方法的具体细节，这些你可以在 Apple 的在线 iOS 参考文档中找到。通过比较突出 iOS SDK 中的等效功能，这些功能的使用应该会变得简单明了。这将为后续章节奠定基础，届时我们将通过一些实际示例进行讲解。\n\
  \n\n\n### 用户界面服务\n\n基于 Web 2.0 的应用程序的爆发式增长显著提升了用户对应用性能的期望。原生应用与基于 Web 的应用之间的能力差距已大幅缩小，移动应用领域亦是如此。早期移动应用（包括当时的新协议，如无线访问协议\
  \ `WAP`）带来的用户体验，与当今某些移动设备所展现的直观、交互式、高清能力相比，已截然不同——这些设备将原生功能与基于互联网的 Web 乃至云服务融合在了一起。\n\
  \n这很大程度上要归功于物理硬件性能的提升，如今处理器速度更快、内存更大，且支持触控输入的高分辨率屏幕。然而，软件才是此类功能的核心，而软件的组织与使用方式则是关键差异所在。\n\
  \n`.NET` 通过提供以下运行时服务来支持用户界面的设计与实现，这些服务将功能暴露给开发者：\n\n-   **WPF**：提供了一整套用于创建高度可视化用户界面的\
  \ API。它是在 Windows Forms 之后引入的，旨在为 2D/3D 图形、视频和音频等额外领域提供支持。\n-   **Windows Forms**：这是封装了\
  \ Microsoft Windows 原生 Windows API 的 API 名称。处理更高级的方面（如 2D/3D 图形）则需要其他 API。\n-  \
  \ **ASP.NET**：包括 `ASP.NET`、`ASP.NET MVC`、`ASP.NET` 和 Ajax。这是微软的 Active Server Pages（`ASP`）技术，允许你使用服务器端编程来开发网站。\n\
  \n我们将 `ASP.NET` 排除在比较之外，因为这是微软用于交付基于 Web 应用的 `ASP` 技术，而我们的重点在于原生应用。因此，剩下的比较对象是 `WPF`\
  \ 和 Windows Forms。鉴于 `WPF` 实际上已取代 Windows Forms，我们本可以轻松地将 Windows Forms 也排除在外，但考虑到其流行度以及\
  \ `WPF` 相对较晚才引入，我们将在比较中涵盖两者。\n\n`WPF` 是 `.NET Framework` 类型的一个子集，这些类型大部分位于 `System.Windows`\
  \ 命名空间中，这与 Windows Forms 类似。但你会注意到，要在 Windows Forms 中实现更高级的图形应用，你需要跳出此 API，转而使用\
  \ Windows Media Player 和图形显示接口（`GDI+`）等组件。\n\n基于 `WPF` 至少可以部分视为 Windows Forms 容器这一假设，与之最为接近的比较对象，就\
  \ `WPF` 和 Windows Forms 而言，是 Cocoa 和 Cocoa Touch。我们先从 Cocoa Touch 开始，它包含以下框架：\n\n\
  -   **UIKit（`UIKit.framework`）**：提供了实现图形化、事件驱动型应用所必需的能力。\n-   **Message UI（`MessageUI.framework`）**：提供编写和排队发送电子邮件消息的支持。在\
  \ `iOS 4.0` 中，这扩展到了包括短信服务（`SMS`）支持。\n-   **Map Kit（`MapKit.framework`）**：提供对可滚动地图界面的支持，该界面可集成到你的应用中。\n\
  -   **iAd（`iAd.framework`）**：提供在应用内展示横幅广告的支持。\n-   **Game Kit（`GameKit.framework`）**：提供对点对点网络能力的支持。它允许你创建复杂的多人网络游戏。\n\
  -   **Event Kit（`EventKitUI.framework`）**：提供查看和编辑基于日历的事件的支持。\n-   **Address Book\
  \ UI（`AddressBookUI.framework`）**：提供查看、编辑和创建新联系人的支持。\n\n### 应用服务\n\n当今的应用不仅需要更直观、更具交互性的用户界面，而且通常对它们提供的特性和功能有更高的要求。应用在设备上孤立运行、与外界隔离，或者应用的交互特性仅基于文本和简单图形的时代早已一去不复返。\n\
  \n如今的应用需要视频、音乐、高清图形、多任务形式的并行处理，以及仅在几年前还闻所未闻的速度和响应性——而这还是在 *移动* 设备上！此类功能部分是通过 iOS\
  \ 内提供的应用服务暴露出来的，这些服务包括以下特性：\n\n-   多媒体能力\n-   数据的存储与管理\n-   网络与通信访问\n-   工作流与通信\n\
  -   访问设备特定功能，如 GPS\n\n在 `.NET` 中，此类功能通过 `.NET Framework 类库` 提供。其中包括我们在讨论 `.NET`\
  \ 的用户界面能力时已经提到的一些类库。以下特性支持应用服务：\n\n-   **Windows Communication Foundation（`WCF`）**：提供对面向服务应用的支持，这些应用通过网络连接进行协作。\n\
  -   **用于 .NET 的 ActiveX 数据对象（`ADO.NET`）**：提供对访问数据及数据服务的支持，例如原生数据库库或抽象驱动程序（如 `ODBC`）。\n\
  -   **Windows Forms 和 `WPF`**：在应用服务的上下文中，`WPF` 提供了与 `iOSUIKit` 框架类似的用户界面能力，以及多媒体和音频能力，外加\
  \ 3D 和动画支持。\n-   **语言集成查询（`LINQ`）**：`LINQ` 是 `.NET Framework 3.5` 的新增内容，提供了原生的数据查询能力。\n\
  \n在 iOS SDK 中，此类服务（及其他服务）被封装在媒体层和核心服务层中。让我们看看这些层提供的关键框架，以便映射到我们在 `.NET Framework\
  \ 类库` 中提及的能力。\n\n#### 媒体层\n\n媒体层包含图形、音频和视频技术，支持你构建外观精美、音效出色的应用。它包含以下框架：\n\n-   **AV\
  \ Foundation（`AVFoundation.framework`）**：一套全面的 API，支持在 iOS 中播放、录制和管理音频内容。在 `iOS\
  \ 4.0` 中，这包括电影编辑支持和播放的精确控制。\n-   **Core Graphics（`CoreGraphics.framework`）**：通过提供基于矢量的绘制引擎来支持\
  \ 2D 图形。\n-   **Core Text（`CoreText.framework`）**：提供一套功能全面、性能卓越的 API，用于排版文本和使用字体。\n\
  -   **Image I/O（`ImageIO.framework`）**：支持导入和导出图像数据及其相关的元数据。\n-   **Media Player（`MediaPlayer.framework`）**：允许你在应用内嵌入播放音频和视频内容的支持。这包括支持访问\
  \ iTunes 资料库和处理可调整大小的视频。\n-   **OpenAL 和 OpenGL ES（`OpenAL.framework` 和 `OpenGLES.framework`）**：包含在\
  \ iOS 内的跨平台框架，用于提供贴近硬件、高性能的音频和视频功能。\n\n\n\n### 核心服务\n\n核心服务提供了所有应用（无论是直接使用还是通过其他框架间接使用）所依赖的基础系统服务。其主要框架如下：\n\
  \n-   **通讯录（`AddressBook.framework`）**：提供了一套 API，允许以编程方式访问存储在移动设备中的联系人。\n-   **CFNetwork（`CFNetwork.framework`）**：提供了对设备可用网络协议的高性能、底层访问能力。\n\
  -   **Core Data（`CoreData.framework`）**：结合 Xcode 提供了管理应用数据的功能，其原理是利用在 Xcode 中可视化定义的模式以及一套支持性的数据管理\
  \ API。该框架非常适合 MVC 模式，并能显著减少所需的代码量。\n-   **Core Telephony（`CoreTelephony.framework`）**：提供了与兼容移动设备电话功能进行交互的能力。\n\
  -   **Event Kit（`EventKit.framework`）**：提供了访问设备上日历事件的支持。\n-   **Foundation（`Foundation.framework`）**：为核心数据类型和函数提供了基于\
  \ Objective-C 的 API 支持。\n-   **Store Kit（`StoreKit.framework`）**：提供了在应用内购买内容和服务的支持，例如附加内容。\n\
  -   **系统配置（`SystemConfiguration.framework`）**：提供了对设备网络配置细节的访问，例如 Wi-Fi 或蜂窝网络连接能力。\n\
  \n## 运行时服务\n\n我们目前所讨论的框架和类库，如果没有其运行所依赖的核心平台的支持，就无法存在。就.NET Framework 而言，底层运行时服务是由\
  \ CLR、底层核心服务以及操作系统共同提供的。而在 iOS SDK 中，此类能力由 iOS 系统和 Core OS 层提供，这些层暴露了与底层运行时服务和 CLR\
  \ 所支持的同类底层功能。\n\n在这里，我们开始看到一些关键差异。例如，.NET Framework 创建的应用运行在由 CLR 提供的托管环境中。它们不是原生应用，而是解释型应用。而使用\
  \ iOS SDK 创建的是原生应用，它们不由任何类型的运行时解释，而是直接依赖操作系统和 SDK 提供的服务来支持应用的执行。\n\n以下是 CLR 所提供能力的一些示例：\n\
  \n-   **内存管理**：提供应用所用内存的自动分配和回收。这种内存管理比 iOS 中提供的引用计数更进一步，在 iOS 中，你需要通过编程方式释放不再需要的资源。\n\
  -   **类型管理**：确保核心数据类型的运行时类型安全，是跨平台、多语言能力的关键要素。\n-   **安全性**：提供安全特性，例如代码签名和访问控制功能。\n\
  -   **多任务处理**：支持多线程应用，允许多个任务看似同时运行，并可跨多个处理器进行调度。\n-   **异常处理**：提供异常捕获和处理的支持。\n-\
  \   **委托**：在现有继承和接口能力的基础上进行了改进，提供了委托功能，使你能够实现指向函数的指针以便在运行时执行。\n\niOS SDK 内部也提供了与上述列表类似的能力，但它们并不完全匹配。部分原因在于，我们处理的是直接运行在操作系统之上的原生应用，而不是像\
  \ CLR 那样的容器/运行时——除非你使用的是 Mono 和 MonoTouch！\n\n让我们看看 iOS SDK 中的一些关键框架：\n\n-   **System**：提供操作系统之上的最底层能力，并暴露内核环境、驱动程序以及操作系统的\
  \ UNIX 接口。这包括内存分配、线程、文件系统访问、数学计算、区域信息等等。\n-   **安全（`Security.framework`）**：增强设备的内置功能，以提供程序化和应用层安全特性，例如对应用进行签名以验证其真实性、加密密钥管理以及对钥匙串共享的支持。\n\
  -   **外部配件（`ExternalAccessory.framework`）**：支持与连接到你设备的外部硬件进行通信。\n-   **Accelerate\
  \ 框架（`Accelerate.framework`）**：通过提供复杂数学计算、大数计算等接口，为计算密集型应用提供支持。\n\n## Objective-C\
  \ 入门，第二部分\n\n第 2 章对开始开发移动应用所需的一些基本要素做了简短介绍。在我们真正开始运用 iOS SDK，并专注于移动应用的特定方面之前，你需要了解\
  \ Objective-C 语言的更多基础内容。学习一些这些稍显高级的特性，不仅能让你更好地编写自己的应用，也能让你更好地理解 iOS SDK 本身的构建方式。\n\
  \n在接下来的章节中，为了帮助你从.NET 过渡，我将使用.NET 语言的术语（而非 Objective-C 的术语）来介绍每一个概念，并在两种语言之间进行比较。\n\
  \n### 类声明\n\n.NET 和 Objective-C 都是面向对象语言，因此类的定义是语言的一个关键结构。请看下面的 Objective-C 和.NET\
  \ C#示例，并排展示。\n\n| **.NET C#** | `Class AClass : Object` `{`\n`intaValue;`\n\n`void\
  \ doNothing();`\n`StringreturnString();`\n`}` |\n|-------------|---------------------------------------------------------------------------------------------------------|\n\
  | **Objective-C** | `@interfaceAClass : NSObject` `{`\n`intaValue;`\n`}`\n`- (void)doNothing();`\n\
  `+ (NSString)returnString();`\n`@end` |\n\n这两个代码段都声明了一个继承自对象类的新类对象。它有一个名为`aValue`的默认整型成员变量，以及两个方法。一个方法名为`doNothing()`，不返回任何值且不接受参数。另一个方法是`returnString()`，它返回一个字符串，但也不接受参数。\n\
  \n你可能还会注意到，方法声明前面有不同字符。这很有意义，你将在下一节中了解。\n\n\n## 方法声明\n\n类的一个明显伴侣是提供类所需功能的方法。方法可以定义为*实例方法*或*类方法*，由其声明前的字符表示，具体如下：\n\
  \n- 类方法由加号（`+`）字符表示。它与 C# 静态方法相同。仅存在单一实现，并与类类型关联。\n- 实例方法由减号（`-`）字符表示。此方法与该类相关的实例对象关联。\n\
  \n以下是 .NET C# 和 Objective-C 的示例。\n\n| **.NET C#** | `public static void aClassMethod();`\
  \ `public void anInstanceMethod();` |\n|-------------|----------------------------------------------------------------------|\n\
  | **Objective-C** | `+ (void) aClassMethod;` `- (void) anInstanceMethod;`      \
  \        |\n\n现在让我们看看如何向方法传递参数。请考虑以下示例。\n\n| **.NET C#** | `String addStrings( String\
  \ a, String b);` |\n|-------------|-------------------------------------------|\n\
  | **Objective-C** | `- (NSString) addStrings (NSString *) a secondParm2:(NSString\
  \ *) b;` |\n\n这种语法创建了一个名为 `addStrings` 的方法，该方法连接两个参数给出的字符串并返回一个字符串值。调用方法的方式也很重要。参数是*顺序敏感的*，因此以下调用无效，因为第二个由名称\
  \ `secondParm` 指示的参数必须是传入的第二个值。\n\n```\n// 这是无效的\n[ addStrings secondParm:s1, s2)\
  \ ];\n```\n\n然而，以下示例演示了正确的调用语法。\n\n```\n// 正确调用\n[ addStrings s1, secondParm:s2\
  \ ];\n```\n\n由于你正在使用一种反射型、消息驱动的编程语言，因此传入参数的顺序和类型非常重要。\n\n## 属性\n\n属性的使用长期以来一直是访问类对象的主要方式，并以此管理它们的访问方式及其返回值。此类类成员被称为*实例变量*，因为属性管理对创建类实例时关联实际值的访问。它们也可用于控制作用域并隐藏与返回属性值相关的任何复杂性。\n\
  \nObjective-C 还可以通过*合成*（在后台自动创建）访问器方法（*getter* 和 *setter*）并创建所需的实例变量来提供帮助。它还确保妥善处理围绕实例变量的内存管理。请考虑以下示例。\n\
  \n| **.NET C#** | `// 在类内部或至少在类作用域内定义实例变量`\n`string _name;`\n\n`// 在类内部定义属性访问器方法`\n\
  `public string name`\n`{`\n`    get { return _name; }`\n`    set { _name = value;\
  \ }`\n`}` |\n|-------------|---------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|\n\
  | **Objective-C** | `// 在类头文件 (.h) 中定义属性`\n`@property (nonatomic, retain) NSString\
  \ *name;`\n\n`// 在实现文件 (.m) 中合成属性`\n`@synthesize name = _name;` |\n\n你会注意到，在 C#\
  \ 示例中，C# 没有与用于访问实例变量的合成模型等效的功能。你必须手动编写访问器方法。这让人想起 Xcode 3.*x* 中的 Objective-C，这在\
  \ Xcode 4 中仍然有效，但并非最佳实践。我建议仅在必要时才在 Xcode 4 中编写访问器方法，通常是在返回属性值需要更复杂处理的情况下。\n\n##\
  \ 字符串\n\n由于 Objective-C 基于 C 编程语言，你可以自由地以 C 方式使用和操作字符串，通过使用指针以及本质上为字符数组的字符串实现。这里没有\
  \ C# 的对应项，因为 C# 不支持指针，因此我们将使用字符串、字符串常量以及更高级的功能（例如字符串本地化）作为比较。\n\n请考虑以下表示字符串常量的示例，字符串常量是一个无法更改的静态字符串值。\n\
  \n| **.NET C#** | `// 使用以下语法定义常量字符串。`\n`const string  example=\"这是一个常量字符串\"`\n\n\
  `// 使用此语法设置字符串属性`\n`window.title = example;` |\n|-------------|----------------------------------------------------------------------------------------------------------------------------------------------|\n\
  | **Objective-C** | `// 使用以下语法定义常量字符串。`\n`// @\"这是一个常量字符串\"`\n\n`// 使用此语法设置字符串属性`\n\
  `window.title = @\"主窗口标题\";` |\n\n以下示例展示了使用该语言提供的相应字符串类来定义字符串。请注意，使用带有 `@` 符号的类会创建一个*不可变*字符串——即无法更改的字符串。\n\
  \n| **.NET C#** | `String string1 = @\"这是一个不可变字符串\";` \n`// 以下两个语句相同`\n`String string2\
  \ = \"这是一个可变字符串\";`\n`String string3 = new string(\"这是一个可变字符串\");` |\n|-------------|--------------------------------------------------------------------------------------------------------------------------------------------------------------|\n\
  | **Objective-C** | `NSString *string1 = @\"这是一个不可变字符串\";` `NSString *string2 =\
  \ \"这是一个可变字符串\";` |\n\n在 Xcode 4 中，你还可以创建一个包含字符串资源的 `Localizable.string` 文件，为每个资源分配名称和值，然后在运行时于代码中引用它们。这使你的字符串值能够根据你部署应用程序的区域设置进行配置。请按以下格式将值存储在\
  \ `Localizable.string` 文件中：\n\n```\n\"LOCAL_MAIN_MENU_TITLE\" = \"主菜单\";\n```\n\n\
  然后使用以下语法在代码中引用该字符串：\n\n```\nNSLocalizedString(@\"LOCAL_MAIN_MENU_TITLE\", @\"\"\
  );\n```\n\n\n\n### 接口与协议\n\nObjective-C 的*接口*实际上对应 C# 的类，而 Objective-C 的*协议*则对应\
  \ C# 的接口——有点令人困惑，对吧？让我们通过一些示例将它们置于上下文中，从而消除这种困惑。\n\n我们从 C# 开始，定义一个包含成员变量和方法的类。C#\
  \ 使用 `class` 关键字和语法来定义类；Objective-C 则使用 `@interface` 编译器指令。我们在之前的类声明部分已经看到过这一点。\n\
  \n如果我们将重点放在 C# 称之为*接口*、而 Objective-C 称之为*协议*的概念上，它使用的语法有所不同。在 Objective-C 中，协议声明了任何类都可以实现的方法，或者实际上，可以作为变量使用。\n\
  \n请考虑以下示例。它定义了一个接口，然后由一个类实现。你可以在接口声明的尖括号中声明你的类实现了指定的类型，以便进行实现或特化。\n\n| **.NET C#**\
  \ | `// 定义你的接口模板` `interface IEquatable<T>` `{` `bool Equals(T obj);` `}` `// 实现你的类`\
  \ `// 该类实现了上面定义的接口` `public class MyClass : IEquatable<MyClass>` `{` `    // 实现\
  \ IEquatable<T> 接口` `    public bool Equals(MyClass c)` `    {` `      // 此处为实现代码`\
  \ `    }` `}` |\n|---|---|\n\n| **Objective-C** | `// 定义你的接口模板` `@protocol IEquatable`\
  \ `- (bool) Equals : (NSObject*) a ;` `@end` `@interface MyClass : NSObject<IEquatable>`\
  \ `{` `    // 此处为一些方法` `}` `@end` `// 实现你的类` `// 该类实现了上面定义的接口` `@implementation\
  \ MyClass` `// 实现 IEquatable<T> 接口` `- (bool) Equals : (NSObject*) a` `{` `    //\
  \ 此处为实现代码` `}` `@end` |\n|---|---|\n\n一个类定义可以通过逗号分隔多个接口来声明实现了多个接口，如下所示：\n\n`Public\
  \ class MyClass : NSObject<IEquatable, AnotherProtocol>`\n\n如你所见，这非常相似。一个关键区别在于，Objective-C\
  \ 将协议用作变量或方法的参数，这在接口的实现被用作回调函数时经常发生。请考虑代码清单 4-1 中的示例，它定义了一个协议，而该协议又定义了一个方法，该方法将通过一个布尔值指示是否成功。\n\
  \n**代码清单 4-1. 协议声明代码**\n\n```\n#import <Foundation/Foundation.h>\n\n// 定义我们的协议，包含一个方法\n\
  @protocol ProcessDataDelegate <NSObject>\n@required\n- (void) processSuccessful:\
  \ (BOOL)success;\n@end\n\n// 使用协议创建接口，注意 ID 类型的使用，它指向一个泛型，\n// 该类型在编译时未知，将在运行时解析\n\
  @interface ClassWithProtocol : NSObject\n{\n id <ProcessDataDelegate> delegate;\n\
  }\n\n@property (retain) id delegate;\n\n-(void)startSomeProcess;\n\n@end\n```\n\n\
  在代码清单 4-1 中定义的接口的实现部分，综合了委托实例变量，然后根据需要调用协议中定义的方法。其实现如代码清单 4-2 所示。\n\n**代码清单 4-2.\
  \ 在类示例中使用协议声明**\n\n```\n#import \"ClassWithProtocol.h\"\n\n@implementation ClassWithProtocol\n\
  \n@synthesize delegate;\n\n- (void)processComplete\n{\n  [[self delegate] processSuccessful:YES];\n\
  }\n\n-(void)startSomeProcess\n{\n  // 创建一个定时器，使用 processComplete 接口在完成时发出信号\n  [NSTimer\
  \ scheduledTimerWithTimeInterval:5.0 target:self\n    selector:@selector(processComplete)\
  \ userInfo:nil repeats:YES];\n}\n\n@end\n```\n\n为了简洁起见，假设你有一个正在执行某种操作的类。进一步假设，这个类被另一个类调用以开始处理。在某个时刻，调用者会希望收到数据处理类已完成的通知，而协议正是为此目的而使用的，如代码清单\
  \ 4-3 所示。\n\n**代码清单 4-3. 在示例中使用该类**\n\n```\n@interface MyDelegate : NSObject <UIApplicationDelegate,\
  \ ProcessDataDelegate>\n{\n        ClassWithProtocol *test;\n}\n@end\n\n@implementation\
  \ MyDelegate\n-(void) processSuccessful:(BOOL)success\n{\nNSLog(@\"Finished\");\n\
  }\n@end\n```\n\n### 委托\n\n在 iOS SDK 中，委托的使用非常普遍，主要是因为它是作为解决复杂子类化问题的一种优雅方案而被引入的。不需要拥有复杂的对象层级结构，无需创建许多彼此行为可能只有细微差别的类，你可以将委托传递给对象，让它代表你来执行修改后的行为。当今编程语言的现代最佳实践是避免深层嵌套的类层次结构，而\
  \ Objective-C 通过委托机制对此提供了支持。\n\n一般规则是，委托是子类化的一种替代方案，使用它是一种好的实践，因为它能产生更加清晰的代码。让我们从在\
  \ Objective-C 中定义协议开始，如下面的示例所示。\n\n| **.NET C#** | `// 在 C# 中定义委托方式不同` `public delegate\
  \ void jobComplete();` |\n|---|---|\n\n| **Objective-C** | `// 定义你的接口模板` `@protocol\
  \ jobComplete` `    (void)jobFinished;` `@end` |\n|---|---|\n\n接下来，我们在类中定义一个对象变量，指向为委托定义的协议，并为其命名。我们还会暴露一个同名属性，以便引用我们的协议，如下所示。\n\
  \n| **.NET C#** | `public class MyClass` `{` `// 创建我们的委托` `    jobComplete jc =\
  \ new jobComplete(jobFinished);` `}` |\n|---|---|\n\n| **Objective-C** | `@interface\
  \ MyClass : NSObject {` `        id <jobComplete> delegate;` `}` `@property (nonatomic,\
  \ retain) id <jobComplete> delegate;` `@end` |\n|---|---|\n\n然后，我们的类会在合适的时机使用以下语法调用委托，并且必须在实现中\
  \ `@synthesize` 该委托属性。\n\n| **.NET C#** | `public void SomeMethod()` `{` `    //\
  \ 调用我们的任务完成委托` `     jc();` `}` |\n|---|---|\n\n| **Objective-C** | `-(void) SomeMethod`\
  \ `{` `    // 通过调用委托来通知任务已完成` `    [delegate JobComplete];` `}` |\n|---|---|\n\n\
  在我们的类中，剩下的唯一一件事就是实现委托的 `jobFinished` 方法，如下所示，该方法将按之前所示的方式被调用。\n\n| **.NET C#** |\
  \ `public void jobFinished()` `{` `    // 执行某些操作以通知任务已完成` `}` |\n|---|---|\n\n|\
  \ **Objective-C** | `-(void) jobFinished` `{` `    // 执行某些操作以通知任务已完成` `}` |\n|---|---|\n\
  \n我鼓励你尝试一些示例代码来测试你对委托的理解。\n\n**注意：** 在 Apple 开发者计划网站上，你可以找到更多关于如何使用委托和委托机制的信息。如果你感兴趣，请查看\
  \ [`http://developer.apple.com/library/mac/#documentation/General/Conceptual/DevPedia-CocoaCore/Delegation.html`](http://developer.apple.com/library/mac/#documentation/General/Conceptual/DevPedia-CocoaCore/Delegation.html)。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n## 注释\n\n最后但同样重要的是，用于在代码中嵌入注释的语法。\n\
  \n使用像 `camelCase` 这样的命名约定会有所帮助，但在代码中写好注释确实无可替代。注释的语法需要遵循此处描述的形式，但同样重要的是，注释本身应该描述开发者的意图和所采用的方法，而不仅仅是对语法的逐字复述（代码及其命名应该完成此任务）。\n\
  \n对于单行注释，您可以使用以下结构。\n\n---\n\n| **.NET C#** | `// this is a comment` 或 `/* this\
  \ is a comment */` |\n\n---\n\n| **Objective-C** | `// this is a comment` 或 `/*\
  \ this is a comment */` |\n\n---\n\n对于多行注释，在 Objective-C 中，您可以使用 `/*` `(开始注释)` 和\
  \ `*/` `(结束注释)` 结构，但在 C# 中不能，如下所示。\n\n---\n\n| **.NET C#** | `// this is the starting\
  \ line` `// this is a second comment line` `// this is a terminating third comment\
  \ line` |\n\n---\n\n| **Objective-C** | `/* this is the starting line` `** this\
  \ is a second comment line` `*/ this is a terminating third comment line` |\n\n\
  ---\n\n## 比较 .NET 与 Xcode 工具\n\n到目前为止，我们已经比较了 Apple 设备、应用程序生命周期以及 .NET 和 iOS SDK\
  \ 中各自的类库。但是，正如我们在前几章中介绍的那样，工具同样重要，`Xcode` 是 `Visual Studio` 的强力对应工具，如果您决定走 MonoTouch\
  \ 路线，`MonoDevelop` 也是如此。但是，当您开始开发之旅时，还有其他工具需要考虑，如表 4-4 所列。\n\n![images](img/t0404.jpg)\n\
  \n表 4-4 中列出的工具是开箱即用的。可以通过附加工具（包括商业和开源工具）来扩展 `Visual Studio` 和 `Xcode`。\n\n## Xcode\
  \ 4 入门\n\n我们在第 2 章创建“Hello， World”应用程序时，已经非常简单地看了一下新的 `Xcode 4` 编辑器。如果您熟悉以前版本的 `Xcode`，您会注意到一个巨大的差异：`Xcode\
  \ 4` 现在在一个窗口中工作，并且集成度更高。如果您熟悉 `Visual Studio`，那么您的印象不会那么深刻，并且可能需要适应 Xcode 的一些特性。\n\
  \n在本节中，就像在 Objective-C 入门中一样，我们将更深入地挖掘 `Xcode 4` 的功能，以便您更好地为在后续章节中正式开始编码做好准备。\n\n\
  我们已经了解了 `Xcode` 界面的一般结构及其各种功能窗格，并且我们创建了一个新项目，该项目突出了可用的项目模板和项目浏览器树，这是 `Xcode 4` 项目结构视图的名称。\n\
  \n如前所述，`Xcode 4` 附带的 IDE 比以前的版本有实质性的改进，可以与微软的 `Visual Studio` IDE 进行真正的比较。它包含许多新功能。其中之一是您在应用程序中导航的方式。`Xcode\
  \ 3.x` 的多个窗口被一个单一的窗口所取代，该窗口具有不同的工作区和其他区域。以下各节描述了 IDE 的关键方面。\n\n### IDE 工作区及其编辑器\n\
  \n在 `Xcode` 中，IDE 中的每个窗口都是一个工作区，因此为支持多个项目提供了一个优雅的解决方案。每个工作区都有标签，代表一个给定的上下文，当被选中时，它会调整下面出现的窗口，显示您需要看到的内容。\n\
  \n在支持工作区的同时，`Xcode` 还引入了许多编辑器，包括用于源代码、属性列表文件、富文本文件和 NIB 文件的编辑器等。（*编辑器* 指的是允许您编辑针对某些参数给出的值的对话框。）要打开或显示其中任何一个编辑器，请在项目导航器中（请参见接下来的“导航器”部分）选择该类型的文件。编辑器会在工作区窗口的编辑器区域中自动打开。表\
  \ 4-5 显示了如何访问不同的编辑器。\n\n![images](img/t0405.jpg)\n\n#### 代码补全和支持\n\n如果您熟悉 `Visual\
  \ Studio`，您会感觉像在家里一样，因为 `Xcode 4` 中的代码补全功能得到了增强。IDE 不仅会提示您完成正在键入的语句，而且如果存在选项，它还会为您提供可用的选项——并附带“快速帮助”文档以支持任何高亮显示的选项（前提是您已打开\
  \ `Quick Help Inspector`）。\n\n一个有用的快捷键是 `control-spacebar`，它可以打开和关闭代码补全功能。按 `escape`\
  \ 键可取消任何操作。\n\n如果您使用 `LLVM` 编译器来构建代码，那么 Fix-It 功能也将被启用。当您键入时，Fix-It 功能会查找代码中的错误。如果它发现了看起来像是错误的东西，它会使用红色下划线和\
  \ IDE 左侧窗格装订线中的错误符号来突出显示问题。它还会提供一些关于如何修复该问题的建议，并提供为您修复它的选项。\n\n#### 方案和方案编辑器\n\n\
  对于 `Xcode 4` 来说，*方案* 的概念是一个有用的补充，它可以用来定义要构建的目标集合、构建时要使用的配置以及要执行的测试集合。每个方案都与调试或发布构建相关联，并使用方案弹出窗口进行更改。从同一个菜单中，您可以管理您拥有的方案——编辑现有方案或创建新方案。\n\
  \n本质上，创建方案允许您将一组配置项关联到方案名称，并只需单击一个按钮即可选择它。然后，方案编辑器允许您配置方案及其设置。\n\n您可以根据需要创建任意数量的方案，但一次只能有一个方案处于活动状态。您创建的方案可以存储在一个项目中，并且可以在包含该项目的每个工作区中使用。或者，方案可以存储在工作区中，并且仅在该工作区中可用。\n\
  \n方案是一个强大的功能。我建议您花一点时间，使用方案编辑器尝试不同的方案配置。\n\n#### 项目编辑器\n\n项目编辑器窗口允许您在“摘要”选项卡下调整项目本身的核心配置信息。您还可以调整构建设置、阶段和规则。\n\
  \n在大多数情况下，诸如摘要信息中的值不需要从模板提供的默认设置更改。但是，如果您确实需要做出任何更改，您可以在此处进行。\n\n正如上一节所述，您可以使用方案来设置目标、构建配置和可执行文件设置。在\
  \ `Xcode 4` 中，选择一个方案将自动为所有这三个领域提供默认设置。\n\n### 检查器\n\n在 `Xcode` 中，*检查器* 是实用区域中的窗格，您可以使用它们来读取或输入有关文件和\
  \ Interface Builder 对象的数据。这些检查器列在表 4-6 中，并附有它们的快捷键。\n\n![images](img/t0406.jpg)\n\
  \n这些检查器也可以在 `Xcode` 中的 `Utilities` 菜单项下找到。请注意，该菜单是上下文相关的，并且所有检查器仅在您查看 XIB 文件提供的用户界面时才相关。查看代码时，可用的检查器较少。\n\
  \n\n\n## 导航器\n\nXcode IDE 引入了多种*导航器*，它们在主窗口中显示不同的工作区，让您能够轻松跳转到项目的不同区域。导航器是浏览 Xcode\
  \ 界面的实用工具，了解如何使用它们将使您在 Xcode 中开发应用程序变得更加简单。\n\n共有七个导航器可帮助您浏览项目的各个方面：\n\n*   **项目导航器**：该导航器提供文件和组的标准视图。它显示您的类、框架、资源、产品等。Xcode\
  \ 4 相比之前版本有一些不错的改进。底部是一个过滤栏，包含三个预设过滤器，分别用于最近修改的文件、未保存的文件以及具有 SCM 状态的文件。它还包含一个搜索字段，您可以用它来过滤工作区中所有项目内的文件。\n\
  *   **符号导航器**：顾名思义，该导航器允许您查看和浏览应用程序中创建的各种符号。它可以让您以层级格式（父级和子级）或扁平格式查看符号，显示类、方法、属性等内容。\n\
  *   **搜索**：此导航器提供工作区范围内的查找和替换功能。导航器本身就是一个标准的查找和替换面板。它还通过“预览”按钮提供了进行批量替换的功能。使用此功能会滑出一个表单，显示每个更改的差异，并让您选择要生效的更改。\n\
  *   **问题**：顾名思义，此导航器会显示编译器或语法检查器检测到的问题，并允许您查看完整的问题文本。\n*   **调试**：当您在调试器中停止时，此导航器会显示程序的执行信息，包括堆栈。您可以同时查看多个线程，并让\
  \ Xcode 过滤掉不相关的线程。它还具有一个堆栈压缩功能，由调试导航器底部的滑块提供。当您从右向左滑动滑块时，Xcode 会移除可能不相关的堆栈帧，因此您可以调整滑块，以显示您想要的详细程度的信息。\n\
  *   **断点**：此导航器显示应用程序中设置的所有断点，包括激活和未激活的断点。如果您设置了一个断点但它是未激活状态，您会看到其符号，从而可以在代码中将其激活。这不会造成任何损害，因为它不影响您的代码。但是，如果您想彻底移除调试断点曾经存在的痕迹，请从导航器列表中删除它。\n\
  *   **日志**：此导航器显示项目运行和调试会话的历史记录。它可以用来查看使用`NSLog`方法发送到调试控制台的输出。\n\n图 4-5 显示了导航器工具栏。\n\
  \n![images](img/0405.jpg)\n\n**图 4-5.** *导航器工具栏，包含（从左到右）项目、符号、搜索、问题、调试、断点和日志按钮*\n\
  \n每次选择导航器时，导航窗口会出现在窗口左侧，同时相关的检查器会出现在窗口右侧，并显示导航树中所选对象（如果有）的详细信息。导航树和检查器窗口仅在您已关闭导航器视图（**⌘**0\
  \ 切换）时才显示。您也可以使用 表 4-7 中显示的快捷键来选择导航器。\n\n![images](img/t0407.jpg)\n\n## 视图\n\n除了不同的导航器之外，您还可以管理显示的不同视图：\n\
  \n*   **导航器视图**：提供对导航器的访问，让您可以浏览项目结构或对象层级。\n*   **调试区视图**：允许您访问断点和对象监视点，这是 Xcode\
  \ 4 调试功能的一部分。\n*   **工具视图**：提供对帮助页面和对象检查器等内容的访问。\n\n您可以打开和关闭这些视图，以释放屏幕空间。\n\n表 4-8\
  \ 显示了访问这三种视图的方式。\n\n![images](img/t0408.jpg)\n\n## 使用其他 Xcode 工具\n\nXcode 提供了许多其他工具来帮助您开发代码。在这里，我们将介绍两个：一个用于对代码进行静态分析，另一个用于拖放代码片段。\n\
  \n### 静态分析\n\n静态分析可以帮助您减少代码中的错误和低效之处。Xcode 4 IDE 允许您在同一个工作区窗口内执行分析、检查代码并根据需要采取纠正措施。一旦选定了要分析的项目，只需选择\
  \ `Product` ![images](img/U001.jpg) `Analyze` 即可开始分析。\n\n分析完成后，Xcode 会打开问题分析器窗口来突出显示分析结果。任何问题都会用蓝色标注并标记。当您单击其中一个时，Xcode\
  \ 会高亮显示有问题的代码，供您分析和修正。\n\n### 代码片段\n\n一个有用且已得到扩展的功能是能够将代码片段拖入您的项目，从而为常见代码功能（如实现协议）提供默认实现。\n\
  \n此 Interface Builder 功能可用于选择项目库，包括代码片段。然后，您可以突出显示一个项目并将其拖到源文件上。例如，对于协议代码片段，这将在您的编辑器中实现默认代码，供您完成后续编写。\n\
  \n## 总结\n\n在本章中，我们首先探讨了 Apple 移动设备的相关特性。您会注意到 iPhone 和 iPod touch 非常相似，而 iPad 则由于其主要采用平板电脑形态，开始引入一些关键差异。\n\
  \n接着，我们研究了用作应用程序开发方法的设计模式，包括代码是如何组织的。我们讨论了 iOS 应用程序的生命周期，并将其映射到 MVC 模式上，您应该开始注意到这与\
  \ Microsoft Windows 运行基于 GUI 的应用程序的方法有一些相似之处。\n\n然后，我们比较了类框架（在特性上即使结构不同也很相似），并将\
  \ Objective-C 语言和 Xcode 工具与它们对应的 .NET 同类产品进行了比较。Objective-C 在许多方面与 C# 相似。然而，一个关键区别源于\
  \ iOS 应用程序不是托管应用程序。由于该语言基于 C，您会看到内存管理、指针和非类型一致是该语言中的常态。\n\n现在，您应该对 Xcode 4 环境、Objective-C\
  \ 语言以及它们与 Microsoft .NET 在代码、框架和工具方面的相似性（至少在关键领域）有了更深入的了解。我们没有对所有内容进行一步步的比较——语言和类框架的广度实在太大了——但这也没有必要。通过结合使用\
  \ Xcode 开发环境、在线资源以及后续章节，我们将开始深入探讨细节。您将看到更多具体示例，展示如何使用该语言和 SDK 的功能，使与 .NET 类的比较更加清晰。这样一来，向\
  \ Objective-C 和 iOS SDK 的过渡将变得更加容易和明显。\n\n## 第五章\n\n\n\n"
- "# 开始行动：创建你的首个应用程序\n\n在前面的章节中，我们涵盖了众多主题，包括 iOS 简介、iOS SDK、可用的不同设备，以及如何使用 `Xcode`\
  \ 和 `MonoDevelop` 等开发工具来创建你的初始应用程序。然而，仅靠一个 `Hello, World` 级别的应用是无法满足用户需求的。\n\n现在，我们将基于你目前掌握的知识开始构建一个更具吸引力的应用程序，它功能更丰富、实用性更强。我们将深入探讨你在前几章节中读到的框架内包含的对象细节，以及如何使用这些对象。你还将学习如何在\
  \ `Xcode` 中组织你的应用程序，以便更好地支持项目的构建、调试和部署阶段，同时我们还会更详细地了解模拟器，用于部署前的测试。\n\n为了演示所有这些特性和能力，我们将创建一个简单的登月者（Lunar\
  \ Lander）的复制版应用，采用使其在 20 世纪 80 年代声名大噪的类似图形和物理风格。我们将在本章启动这个应用，并在本书后续内容中持续对其进行增强。\n\
  \n为了开始行动，我们将在本章中涵盖以下主题：\n\n*   设计你的应用程序，考虑在开始构建之前需要解决的关键问题\n*   在 `Xcode` 中设置你的项目及其结构，包括与构建和调试应用程序最相关的设置\n\
  *   理解向用户呈现用户界面的各种选项，包括如何渲染带有碰撞检测的简单图形\n*   探索导航应用程序功能（如难度级别和最高分）的不同方法\n*   与外部世界交互，既包括通过互联网，也包括通过用户的交互\n\
  *   探索 iPhone 模拟器来测试你的应用程序\n\n在我们逐步构建应用程序的过程中，我将持续指出 `.NET Framework` 中的特性以便对比。我还会指出常见的\"\
  陷阱\"以及如何避免它们。\n\n## 应用程序规划与设计过程\n\n在前面的章节中，我们探讨了在设计应用程序之前需要考虑的几个因素。例如，我们比较了每款设备的特性，在决定哪款设备最适合你的应用时需要权衡这些因素。你需要理解应用程序中需要适配的一些关键差异。这些考虑因素固然重要，但在你开始编写代码之前，还有更多方面需要思考。\n\
  \n在大多数专业组织中，构建应用程序的过程通常始于**需求获取阶段**。这包括收集用户的需求，或者当目标受众不明确时，则收集你应用的功能需求。然后对这些需求进行优先级排序，这样如果时间不足，你可以舍弃那些你认为不那么重要的功能。\n\
  \n非功能性需求与功能性需求同样重要。非功能性需求的一个示例是某些操作预期需要多快完成，或者你希望应用程序能够处理多少数据。在此阶段，你还需要记录下希望定位的实际设备，以及你希望使用的设备特性。\n\
  \n一旦你捕获并记录了需求，下一阶段就是开始设计过程。这包括定义应用程序核心结构的外观——哪些方面你将用自己定制的代码编写，哪些框架你将整合在一起以实现所需的功能。这被称为应用程序的**架构**。\n\
  \n应用程序的架构就如同你房子的地基和框架。它提供了必要的结构，在此基础上，你可以创建房间并安装布线、供水和供暖系统。应用程序也是如此。\n\n然后，你通过使用代码详细实现应用程序的功能来构建这个架构。最终结果是一个可运行的应用程序，实现了你定义的需求——就像你的房子，按照你期望的特性建造而成。\n\
  \n捕获应用程序的需求并设计应用程序的结构，将为你编写代码时提供宝贵的指导，并确保你的应用程序更加灵活和健壮。你无需不断地拼凑代码来容纳之前未曾考虑到的功能。因此，尽管这不是强制性的，但按照此处描述的方式，遵循一个务实的规划和设计过程，被认为是良好的实践。\n\
  \n### Apple iOS 设计资源\n\n设计应用程序的过程在很大程度上依赖于你自己的想象力和脑力——这也是乐趣的一部分。然而，如果你在理解如何最佳设计用户界面或按预期方式使用所提供的框架时感到困惑，你并非孤例！\n\
  \niOS 操作系统展现了其运行设备的核心特性。因此，理解设备的特性并了解苹果公司希望如何使用它至关重要。苹果公司还花费了大量时间，针对特定任务创建和定制用户界面元素，充分利用了触控和手势用户界面。\n\
  \n例如，日期和时间的输入是通过使用**日期和时间选择器**控件实现的，还有一个更通用的**选择器**控件可用。这允许你旋转选择器的轮盘，直到显示你想要的值。就日期而言，先是日，然后是月，最后是年。这是一个很好的示例，展示了专门为适应设备的触摸和滑动手势而开发的控件。\n\
  \n这与微软在创建 Windows SDK 时所采用的原则以及作为 `.NET framework` 一部分而存在的不同用户界面控件并没有太大区别。最初，这些控件适合使用鼠标和键盘作为输入，随后进行了扩展以应对平板设备的引入，例如电子墨水（e-ink）概念。而随着\
  \ Windows Mobile 7 的引入，这一过程仍在继续。\n\n苹果公司在 [`http://developer.apple.com`](http://developer.apple.com)\
  \ 上提供了许多有用的指南。对于用户界面设计，主要资源是 **iOS 人机界面指南**。其指导内容包括：\n\n*   **用户界面指南**：例如，专注于构建以用户体验和用户协作为重点的应用程序\n\
  *   **iOS 用户界面控件使用指南**：详细分解不同的用户界面控件，说明它们在哪些场景下最适用，以及如何使用它们。\n\n**iOS 人机界面指南** 确实涵盖了更多主题。我建议你熟悉这份指南。同时，花点时间浏览该网站及其相关内容。\n\
  \n\n\n#### 其他设计资源\n\n互联网上提供了大量示例应用的资源——其中一些简单，另一些则非常复杂。我个人特别喜欢将《毁灭战士》游戏移植到 iPhone\
  \ 的源代码及其开发历程叙述，可访问 [`http://www.idsoftware.com/doom-classic/`](http://www.idsoftware.com/doom-classic/)\
  \ 获取（虽然用如此复杂的内容作为我们的示例应用会很有趣，但可惜的是，这不可能。希望“月球着陆器”是次优之选。）\n\n以下是一些你可能希望参考的其他有用资源：\n\
  \n*  *《绝对零基础学 Objective-C》*（ISBN 978-1-4302-2832-5）是一本极佳的书，它会带你详细了解 Objective-C\
  \ 的细节。在你熟悉这门语言的过程中，它是一份有用的参考。\n* Pttrns.com ([`http://pttrns.com/`](http://pttrns.com/))\
  \ 是一个用于展示用户界面模式的实用资源——并非从编程角度，而是从视觉角度。它能为你的可视化设计提供灵感。\n*  *《Pro Objective-C iOS\
  \ 设计模式》*（ISBN 978-14302-3330-5）提供了设计模式，帮助你实现可能在应用程序中用到的一些更复杂的设计（更偏向高级内容）。\n* 有许多资源管理工具可用，其中一些是开源的。如果你的应用程序涉及大量需求，你可能会发现这些工具很有用。例如，可在\
  \ [`http://sourceforge.net/projects/osrmt/`](http://sourceforge.net/projects/osrmt/)\
  \ 找到这样一个工具。\n\n### 规划与设计“月球着陆器”应用\n\n那么，让我们践行之前所说的内容。我们将遵循上一节中描述的设计过程阶段。首先，我们会捕获并记录需求，然后设计应用程序。\n\
  \n#### 需求规格说明\n\n需求规格说明定义了应用程序的范围，并提供了设计所依据的细节。通常还需要根据优先级对需求进行分类，以便在时间不足时能够做出艰难的决定。一种常用的做法是使用所谓的莫斯科表示法，即对于需求，分别标记为**必须**有、**应该**有、**可以**有和**想要**有。这是一种简单但有效的方法。\n\
  \n表 5-1 展示了我们“月球着陆器”游戏的需求规格说明摘要。\n\n![图片](img/t0501.jpg)\n\n显然，需求可以进一步细化以提供更多细节，但为了简洁起见，我将规格说明缩减为关键需求及其相关数据。这些信息足以让我们创建游戏，而这正是本章的重点。\n\
  \n#### “月球着陆器”应用设计\n\n一旦你确定了要开发的应用程序类型以及哪些属性最有意义，就可以开始考虑一些细节了。例如，一个生产力工具（如计算器）、一个游戏（图形化）和一个消息应用（文本化）都需要不同的外观和感觉。\n\
  \n##### 用户界面\n\n该应用程序将呈现两个不同的用户界面：\n\n*   **主菜单**：这将是应用程序启动时的默认屏幕，并提供一个菜单，可以从中选择诸如难度等设置。此外，游戏可以通过此菜单系统启动。它会在屏幕中央显示最高分，并以月球着陆器座舱的图形图片作为背景。\n\
  *   **游戏视图**：这是游戏的主视图，由其自身的控制器支持。在这个屏幕上，将绘制地形并显示着陆器，同时显示游戏状态、得分和剩余燃料等统计数据。\n\n#####\
  \ 游戏状态\n\n游戏可以处于以下五种状态之一，每种状态都会根据其状态对用户输入做出相应响应：\n\n*   **菜单**：处于主菜单，等待用户退出、选择难度级别或开始新游戏。\n\
  *   **运行中**：游戏已启动，正在响应用户输入。\n*   **已暂停**：游戏已暂停或挂起，等待用户发出重新开始的信号。\n*   **已坠毁**：游戏正在运行，但用户已坠毁。可以从此菜单开始新游戏。\n\
  *   **已获胜**：游戏正在运行，用户已成功着陆着陆器。当用户按下某个键时，下一关即可开始。\n\n##### 其他游戏设计元素\n\n游戏设计中包含的其他元素如下：\n\
  \n*   游戏将使用一个简单的计时器来管理屏幕上的图形更新。不过，这之后可以改为使用多线程，从而提供更流畅的游戏体验。\n*   “月球着陆器”图形将具有三个核心状态：无推力飞行、带推力飞行和已坠毁。旋转功能通过使用\
  \ iOS 的图形 API 进行管理。\n*   地形被预定义为一系列点，在运行时使用简单的线条图形绘制。\n*   最初将使用屏幕上的工具栏按钮作为用户输入。左右箭头键旋转月球着陆器飞船，向上箭头键表示施加推力。这可以改为使用触摸和手势界面，这些主题将在第\
  \ 10 章中探讨。\n\n## 构建“月球着陆器”应用\n\n需求和设计阶段完成后，我们准备深入并构建“月球着陆器”游戏。\n\n“月球着陆器”应用最初将编写为针对\
  \ iPhone 设备的 iOS 应用程序。我们将在第 7 章中讨论如何利用 iOS 的方向特性更改它以适配其他设备。\n\n我们将使用 iOS 基于视图的应用程序项目模板，让其为主菜单创建初始视图和视图控制器。然后，我们将创建一个单独的视图及其关联的视图控制器来管理游戏的视图。这将提供一个良好的开端，并且也建立在我们已涵盖的早期示例之上。\n\
  \n我们还将项目内包含其他资源，例如用于月球着陆器图像的图形文件。那么，让我们开始吧。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n### 创建应用程序项目\n\n流程您应该很熟悉了：在磁盘上为项目选择一个位置，然后启动 Xcode。使用“基于视图的应用程序”项目模板创建一个项目。我将项目命名为\
  \ `LunarLander`。创建以下文件：\n\n*   `LunarLanderAppDelegate`（`.h` 和 `.m` 文件）\n*   `LunarLanderViewController`（`.h`、`.m`\
  \ 和 `.xib` 文件）\n*   `MainWindow.xib`（它将使用 `LunarLanderViewController.xib` 视图）\n\n\
  这些文件将提供我们唯一的应用程序委托，它将启动视图控制器，该控制器将使用 `LunarLanderViewController.xib` 作为游戏主菜单的视图。您的项目结构应类似于图\
  \ 5-1 所示。\n\n![images](img/0501.jpg)\n\n**图 5-1.** *初始 LunarLander 项目文件*\n\n在继续之前，让我们添加主游戏视图——同样，一个视图控制器和一个视图。为此，请选择\
  \ `File` ![images](img/U001.jpg) `New`（或使用 ⌘N 快捷键），然后从 Cocoa Touch iOS 模板中选择一个 `UIViewController`\
  \ 子类。在接下来的几个屏幕中，确保它继承自 `UIViewController` 类，并命名为 `GameViewController`。同时记得勾选“With\
  \ XIB for user interface”选项。我们将使用一个 NIB 文件来处理游戏的主用户界面——至少是视图画布和静态项。完成此操作后，您的文件夹结构应类似于图\
  \ 5-2 所示。\n\n![images](img/0502.jpg)\n\n**图 5-2.** *包含 GameView 类的 LunarLander 项目*\n\
  \n这些文件将为启动我们的 Lunar Lander 应用程序的核心机制提供足够的基础。在添加更多文件之前，让我们先使用这些初始文件来开始实现我们的游戏。我们将从主菜单视图和我们基础架构的一些元素开始。其他资源将根据需要添加到项目中，并且我们将在本书后续介绍特定主题时扩展应用程序的逻辑。\n\
  \n### 构建用户界面和流程逻辑\n\n用户界面使用初始窗口，其中包含一个启动游戏的简单按钮。我们也可以使用此屏幕来显示最高分并用精美的图形装饰它。主 Lunar\
  \ Lander 视图控制器和 XIB 文件将用于管理此视图。当选择“开始游戏”按钮时，它将加载并模态显示带有其自己控制器的游戏视图。这个初始游戏屏幕如图 5-3\
  \ 所示，其中已经添加了“开始游戏”按钮。\n\n![images](img/0503.jpg)\n\n**图 5-3.** *初始“开始游戏”屏幕*\n\n\
  我们的应用程序委托将用于加载此屏幕。如代码清单 5-1 所示，在头文件中，我们声明了两个属性（以粗体突出显示）：一个类型为 `Window`，另一个是指向 `LunarLanderViewController`\
  \ 类实例的指针。我们将在应用程序委托代码中使用它们来显示窗口。\n\n**代码清单 5-1.** *`LunarLanderAppDelegate.h`*\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@class LunarLanderViewController;\n\n@interface\
  \ LunarLanderAppDelegate : NSObject <UIApplicationDelegate> {\n\n}\n\n@property\
  \ (nonatomic, retain) IBOutlet UIWindow *window;\n@property (nonatomic, retain)\
  \ IBOutlet LunarLanderViewController *viewController;\n\n@end\n```\n\n然后，我们提供一个支持性实现文件，即\
  \ `LunarLanderAppDelegate.m`，如代码清单 5-2 所示（相关代码以粗体显示）。在这里，您会注意到我们合成了这些属性，并在 `dealloc()`\
  \ 方法中释放了这些资源所占用的成员。\n\n**代码清单 5-2.** *`LunarLanderAppDelegate.m`*\n\n```\n#import\
  \ \"LunarLanderAppDelegate.h\"\n#import \"LunarLanderViewController.h\"\n\n@implementation\
  \ LunarLanderAppDelegate\n\n@synthesize window=_window;\n@synthesize viewController=_viewController;\n\
  \n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:\n\
  (NSDictionary *)launchOptions\n{\n    // 应用程序启动后的自定义覆盖点。\n    self.window.rootViewController\
  \ = self.viewController;\n    [self.window makeKeyAndVisible];\n    return YES;\n\
  }\n\n….. 默认实现代码在此，未经修改\n\n- (void)dealloc\n{\n    [_window release];\n    [_viewController\
  \ release];\n    [super dealloc];\n}\n\n@end\n```\n\n有趣的部分在 `didFinishLaunchingWithOptions()`\
  \ 方法中，我们将主窗口的 `rootViewController` 实例变量设置为我们的“开始游戏”视图控制器（即 `LunarLanderViewController`\
  \ 类），然后按照默认实现使其可见。\n\n虽然我们从初始屏幕开始，但实际游戏玩法将由游戏视图来管理。这个非常简单的流程如图 5-4 中的图表所示。\n\n![images](img/0504.jpg)\n\
  \n**图 5-4.** *游戏状态流程*\n\n因此，我们之前创建的 `LunarLanderViewController.xib` 文件将有一个简单的用户界面，如图\
  \ 5-3 所示。此屏幕除了一个视图（类型为 `UIView`）和一个按钮（类型为 `UIButton`）之外没有其他内容，按钮的文本显示为“Start Game”。在\
  \ .NET 中，这完全等同于使用 `Windows.Forms` 创建一个窗体并在屏幕上放置一个按钮。\n\n我们还需要为按钮点击附加一个动作，以显示并启动游戏。这与我们在前几章中启动简单操作的方式完全相同。\n\
  \n现在，让我们将“开始游戏”按钮连接到一个有意义的操作上——即加载我们的主游戏视图，以便您可以提供一个位置来处理实际的游戏机制。首先，请查看代码清单 5-3，它是处理开始游戏交互的视图控制器的头文件。\n\
  \n**代码清单 5-3.** *`LunarLanderViewController.h`*\n\n```\n#import <UIKit/UIKit.h>\n\
  ```\n\n\n\n`// 通知编译器，我们的 GameViewController 引用指向一个类`\n`@class GameViewController;`\n\
  \n`// 定义主类（即 Objective-C 中所说的接口），继承自`\n`UIViewController`\n`@interface LunarLanderViewController\
  \ : UIViewController {`\n\n`    @private GameViewController *pgameViewController;`\n\
  `}`\n\n`// 用于引用我们的 ViewController 的属性`\n`@property (nonatomic, retain) GameViewController\
  \ *gameViewController;`\n\n`// 用于附加到“开始游戏”按钮，供用户开始游戏的事件`\n`-(IBAction)startGame:(id)sender;`\n\
  \n`@end`\n\n实现部分保存在 `LunarLanderViewController.m` 文件中，如代码清单 5-4 所示。\n\n**代码清单 5-4.**\
  \ *LunarLanderViewController.m*\n\n`#import \"LunarLanderViewController.h\"`\n`#import\
  \ \"GameView.h\"`\n`#import \"LunarLanderAppDelegate.h\"`\n\n`@implementation LunarLanderViewController`\n\
  \n`// 将 GameViewController 指针合成为内部持有的变量`\n`@synthesize gameViewController = pgameViewController;`\n\
  \n`- (void)dealloc`\n`{`\n`    // 释放自定义控制器`\n`    [self.gameViewController release];`\n\
  \n`    // 调用继承的方法`\n`    [super dealloc];`\n`}`\n\n`- (void)didReceiveMemoryWarning`\n\
  `{`\n`    // 如果视图没有父视图，则释放它`\n`    [super didReceiveMemoryWarning];`\n\n`    //\
  \ 释放任何未使用的缓存数据、图像等`\n`}`\n\n`#pragma mark - 视图生命周期`\n\n`// 实现 viewDidLoad 以在加载视图后执行额外设置，通常来自`\n\
  `nib 文件`\n`- (void)viewDidLoad`\n`{`\n`    [super viewDidLoad];`\n`}`\n\n`- (void)viewDidUnload`\n\
  `{`\n`    [super viewDidUnload];`\n`    // 释放主视图的任何保留子视图`\n`    // 例如：self.myOutlet\
  \ = nil;`\n`}`\n\n`- (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)`\n\
  `interfaceOrientation`\n`{`\n`    // 对于支持的旋转方向返回 YES`\n`    return (interfaceOrientation\
  \ == UIInterfaceOrientationPortrait);`\n`}`\n`-(void)startGame:(id)sender{`\n` \
  \   // 执行操作`\n\n`    self.gameViewController = [[GameViewController alloc] initWithNibName:@\"\
  GameView\"`\n`bundle:nil];`\n`    [self presentModalViewController:self.gameViewController\
  \ animated:YES];`\n\n`}`\n`@end`\n\n总结来说，我们将实现游戏功能的以下部分：\n\n*   创建了一个 `GameViewController`\
  \ 属性并管理其内存\n*   编写了“开始游戏”按钮点击的事件处理程序，该程序加载并以模态方式显示游戏视图界面\n\n这些步骤本质上允许显示主游戏屏幕。我们将把菜单附加到该屏幕，并显示最高分。我们将通过显示并开始游戏来响应“开始游戏”按钮的点击。\n\
  \n因此，创建属性使用的方法与前面章节描述的方法相同。不过，在这里我们明确地将属性赋值给类成员变量，从而允许我们为每个变量使用不同的名称。\n\n让我们从头开始，在头文件中：\n\
  \n`@class GameViewController;`\n\n这告诉编译器 `GameViewController` 是一个类，这意味着我们此时不需要包含完整的类声明。我们只需要通知编译器它是一个类即可。它所支持的消息和属性的语义将在运行时由\
  \ iOS 框架提供。\n\n接下来，我们使用以下行定义内部类成员变量：\n\n`    @private GameViewController *pgameViewController;`\n\
  \n这部分与前面的示例类似，但请注意 `@private` 声明。这是一个*可见性修饰符*，用于定义成员变量的可见性（或*作用域*）。有多种选项可用于指定变量的可见性，你需要将它们放在声明之后。此外，还有\
  \ `@public` 和 `@protected`，它们的行为与 .NET 中同名的语法等效项相同（位于变量之前），但没有 `@` 符号。\n\n拥有属性使我们能够控制该变量的要素，例如在其被认为不再需要之前在内存中保留的能力。但我们确实需要记住释放它。在\
  \ `dealloc()` 方法中，我们通过向 `gameViewController` 变量发送 `release` 消息来释放它及其关联的内存。另请注意，我们使用\
  \ `[super dealloc]` 调用了继承的 `dealloc()` 方法。这被称为*沿着链向上传递调用*，使用它被称为*遵守规范*。此行为由 Xcode\
  \ 创建的方法的默认实现提供。你可以在以下代码中看到这一切：\n\n`- (void)dealloc`\n`{`\n`    // 释放自定义控制器`\n` \
  \   [self.gameViewController release];`\n\n`    // 调用继承的方法`\n`    [super dealloc];`\n\
  `}`\n\n我们需要响应“开始”按钮被按下的事件。因此，如果你尚未添加“开始游戏”按钮，请立即添加。\n\n在 XIB 文件中，你需要确保“开始游戏”按钮的“触摸开始”事件已连接到我们在代码中创建的\
  \ `startGame` 事件属性。你可以使用 Connections Inspector 中的拖放功能执行此操作。打开 `LunarLanderViewController.xib`\
  \ 文件并显示视图（你将看到“开始游戏”按钮）后，你需要显示 Connections Inspector 以查看可用的插座。在那里，只需将 `StartGameIBAction`（记住我们在代码中的定义）拖放到“开始游戏”按钮上。这将把它连接到按钮的“触摸开始”事件，该事件在我们首次点击按钮时触发。\n\
  \n需要在 Interface Builder 的 Outlets 页面上可见的 `IBAction` 定义如下：\n\n`-(IBAction)startGame:(id)sender;`\n\
  \n`(IBAction)` 声明是告诉 Xcode 4 的 Interface Builder 这是一个可用于连接事件的*操作*的关键。\n\n最后，我们需要为事件提供实现，在我们的示例中，该实现将加载并显示\
  \ `GameView` 界面及其关联的控制器。这将管理我们的 Lunar Lander 游戏的游戏机制。代码如下：\n\n`-(void)startGame:(id)sender{`\n\
  `    // 设置我们的 gameViewController 指针，指向已加载的 GameView 类`\n`    self.gameViewController\
  \ = [[GameViewController alloc] initWithNibName:@\"GameView\"`\n` bundle:nil];`\n\
  `    // 并以模态方式显示它`\n`    [self presentModalViewController:self.gameViewController\
  \ animated:YES];`\n`}`\n\n我们的第一行为 `GameViewController` 类分配内存 `[GameViewController\
  \ alloc]`，然后将其嵌入到对 `initWithNibName` 方法的消息调用中，并传入我们的 XIB 文件名。最后，我们通过发送 `presentModalViewController`\
  \ 消息并传入视图控制器的指针（此处为 `gameViewController`）来显示窗口。\n\n对于 C++ 开发者来说，这段代码的语法比 .NET 开发者更为熟悉；`GameView`\
  \ 类的分配与在 C# 中调用 `new` 相同。事实上，以下语法在 Objective-C 中也是有效的：`[GameViewController new]`。一旦类被创建，在\
  \ .NET 中调用 `ShowDialog()` 方法可以使用类似于以下的代码——这等效于之前的 Objective-C 代码：\n\n```\n// 使用\
  \ Windows Forms 创建并显示 C# 表单\nForm MyForm = new MyForm;\nMyForm.ShowDialog();\n```\n\
  \n实现事件后，继续构建可执行文件并启动你的应用程序。它将显示带有“开始游戏”按钮的主窗口。如果你选择此按钮，将显示一个空白游戏窗口。为了确保它正确显示，我在游戏窗口用户界面上添加了一个简单的标签。\n\
  \n\n\n### 在应用程序中实现导航\n\n到目前为止，我们已经构建了一个包含两个简单表单的应用程序，通过按钮点击将两者链接起来。但如果完成游戏后无法返回主菜单重新开始或退出，那么这个游戏就没什么用。因此，我们需要继续完善游戏界面的实现，提供一种返回主菜单或父窗口的机制。\n\
  \n我们将从扩展现有的游戏界面开始。首先添加一个工具栏，方便我们在上面放置按钮。同时，我们还会添加一些屏幕标签，用于显示状态信息。\n\n请继续添加 `Toolbar`、`Button`\
  \ 和 `Label` 控件，以创建如图 5-5 所示的界面。使用 Xcode 4 的 Interface Builder 标准功能，就像你在之前的示例中所做的那样。这些控件相关的代码会自动生成。\n\
  \n![images](img/0505.jpg)\n\n**图 5-5.** *游戏界面*\n\n我们稍后会改进这个界面，但目前它已经达到了目的：提供了一个可以返回主菜单的\
  \ `Quit` 按钮。为此，我们将使用之前类似的技术。\n\n我们需要一个 `IBAction` 属性，用于提供选中时触发的事件属性。此外，我们需要像之前一样在\
  \ Connections Inspector 选项卡中连接该操作，并提供以下事件实现代码：\n\n```\n-(void)quitGame:(id)sender\n\
  {\n    // 不再需要游戏窗口，返回父窗口\n    [ self dismissModalViewControllerAnimated:YES ];\n\
  }\n```\n\n这段代码的作用与最初将 `GameView` 作为对话框显示的代码相反。它会向视图发送 `dismissModalViewControllerAnimated`\
  \ 消息。这将导致窗口被卸载，焦点返回到启动它的父视图——在本例中为 `LunarLanderViewController`。在 .NET 中，这相当于调用窗体的\
  \ `Close()` 方法，但关闭窗口时不会有动画效果，这与 iOS SDK 的情况不同。\n\n我们暂时不会对其他按钮做任何操作。（它们将用于测试游戏的物理效果，我们会在后续章节中探讨更高级的用户交互机制。）标签目前只是占位符，虽然我们暂时不会更新它们的值，但它们已经开始让游戏初具雏形。\n\
  \n## 构建核心游戏引擎并启用用户交互\n\n到目前为止，我们已经显示了初始游戏界面，其中包含启动游戏的按钮。现在我们需要创建游戏的主要机制。接下来，我们将通过开始实现核心游戏引擎来增强应用程序的功能。我们将基于\
  \ `GameView` 类，并在此过程中探索更多 iOS 和 Objective-C 的概念。\n\n### 检查游戏视图头文件\n\n`GameView`\
  \ 的 XIB 文件以及关联的 `GameViewController` 类提供了核心游戏引擎的实现。首先，考虑代码清单 5-5 中显示的 `GameView.h`\
  \ 文件。在看代码之前，我会先强调代码的关键部分（清单后有完整解释）。在头文件中，我们做了以下工作：\n\n*   使用 `NSTimer` 类成员定义我们的类，以提供定时器功能。\n\
  *   声明一系列方法，用于响应用户的按钮操作，包括 `Quit`、`Rotate Left`、`Rotate Right` 和 `Thrust`。\n*  \
  \ 声明一个定时器将按所需频率执行的方法。\n*   定义多个枚举类型以保存状态，以及多个将用于游戏物理计算的常量。\n*   声明我们的 `GameView`，它将包含三张映射推进器状态的图片：`Thrust`（推进）、`No-Thrust`（无推进）和\
  \ `Crashed`（坠毁）。\n*   声明代表状态或实例变量的实例变量，将使用已定义的枚举类型和常量。\n*   声明一个属性来保存登月舱图像，并为每个按钮声明\
  \ `IBAction`，以便将它们连接到提供实现的方法上。\n\n呼，接下来看看代码，看看你是否能找出代码清单 5-5 中的所有上述特性。\n\n**代码清单\
  \ 5-5.** *GameView.h*\n\n```\n#import <UIKit/UIKit.h>\n\n// GameView 类管理游戏的视图控制器\n\
  //\n@interface GameViewController : UIViewController {\n\n    NSTimer *gameLoop;\
  \  // 核心游戏定时器\n}\n\n// 为视图控制器声明类事件\n- (void)timerLoop:(NSTimer *)timeObj;   // 定时器事件循环\n\
  -(IBAction)quitGame:(id)sender;\n-(IBAction)rotateLeft:(id)sender;\n-(IBAction)rotateRight:(id)sender;\n\
  -(IBAction)thrust:(id)sender;\n\n@end\n\n// 声明一些枚举类型，避免大量混乱的常量定义\ntypedef enum {\
  \ NOTREADY, READY, RUNNING, WON, LOST, PAUSED } GameState;\ntypedef enum { EASY,\
  \ MEDIUM, HARD } GameDifficulty;\ntypedef enum { THRUSTERS_ON, THRUSTERS_OFF } ThrusterState;\n\
  \n// 声明用于管理物理的其他常量\nstatic const int FUEL_INITIAL = 200;\nstatic const int FUEL_MAX\
  \ = 200;\nstatic const int FUEL_BURN = 10;\nstatic const int MAX_INIT = 30;\nstatic\
  \ const int MAX_SPEED = 120;\nstatic const int ACCELERATION_DOWN = 35;\nstatic const\
  \ int ACCELERATION_UP = 80;\nstatic const double GRAVITY = 9.8;\n\n// GameView 类管理主游戏\n\
  //\n@interface GameView : UIView {\n\n    // 用于保存登月舱状态的图片\n    @private UIImage\
