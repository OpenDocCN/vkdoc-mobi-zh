  \ - 向右旋转着陆器\n- (void)rotateRight:(id)sender\n{\n    // 执行某些操作\n}\n\n// thrustEngine\
  \ - 点燃引擎的推进器\n- (void)thrustEngine:(id)sender\n{\n    // 执行某些操作\n}\n\n@end\n```\n\
  \n\n\n#### 使用定时器触发核心事件\n\n在代码清单 5-6 中，首先需要注意的是，作为`ViewController`类的一部分，我们定义了一个用于实现游戏主循环的定时器。该定时器使用了\
  \ iOS 的 `NSTimer` 类，其功能与 .NET Framework 中的 `System.Threading.Timer` 类类似。完整定义如下：\n\
  \n`NSTimer *gameLoop;  // 核心游戏定时器`\n\n在 `GameView` 类中，我们需要等到视图加载完成后才初始化定时器。请记住，`GameView`\
  \ 类封装了游戏的核心逻辑。虽然我们可以在其他地方进行初始化，但 `viewDidLoad` 事件与其他时机同样合适，因为它会在视图成功加载后执行（如其名称所示）。我们的实现如下：\n\
  \n```\n- (void)viewDidLoad\n{\n    // 创建一个每 1/4 秒（0.025 秒）触发一次 'timerLoop' 函数的定时器实例\n\
      gameLoop = [NSTimer scheduledTimerWithTimeInterval: 0.025 target:self selector:@selector(timerLoop:)\
  \ userInfo:nil repeats:YES];    \n\n    [super viewDidLoad];\n    // 视图从 nib 文件加载后，在此处执行任何额外的设置。\n\
  }\n```\n\n进一步分析代码，可以看到我们使用了 `scheduledTimerWithTimeInterval` 方法。我们向其传递了定时器的触发间隔（以秒为单位，可使用小数）、回调的目标对象，以及回调方法——该方法将承载我们每次事件触发时执行的定制代码。其余参数允许以\
  \ `userInfo` 形式传入定制信息，并指定定时器事件是重复执行还是一次性触发。在我们的例子中，不传入定制信息，且定时器是重复执行的。\n\n你会注意到，对于回调方法，我们使用了\
  \ `selector` 参数和 `@selector` 语法，并传入了方法名。该方法返回一个`SEL`类型的对象，这是回调方法所期望的参数类型。在 .NET\
  \ 中，委托用于提供类型安全的函数指针，其功能与这里的实现等效。\n\n成功初始化后的最终结果是，`gameLoop` 成员变量现在指向一个 `NSTimer`\
  \ 实例，该实例在指定的时间间隔触发时，会调用 `ViewController` 类中的 `timerLoop` 类方法。让我们快速看一下这个方法的实现，它相当直观。\n\
  \n```\n// timerLoop - 主要的定时器事件函数\n-(void)timerLoop:(NSTimer *)timerObj\n{\n    //\
  \ 更新着陆器的位置\n    [(GameView *)self.view updateLander];\n\n    // 重新显示整个视图\n    [self.view\
  \ setNeedsDisplay];\n\n}\n```\n\n在我们的游戏引擎主循环中，其实现封装在 `timerLoop` 方法内，我们执行了多项操作。首先，我们调用一个方法来处理游戏物理逻辑，并识别由后续事件触发的用户交互。该方法将模拟重力效应、根据指令启动引擎，并按照你的操控旋转飞行器。它还会减少消耗的燃料，并检测是否发生碰撞或成功着陆。\n\
  \n你会注意到，处理所有这些神奇逻辑的方法名为 `updateLander`。但由于此处的 `self` 指向一个 `UIView`（查看你的 XIB 文件），我们需要将其转换为已知的\
  \ `GameView` 类实例。为了使类型转换生效，请确保在 Xcode 的 Interface Builder 中打开 `GameView` 视图，并在身份检查器中将自定义类的类名设置为\
  \ `GameView`。然后我们可以进行类型转换，因为 Interface Builder 中使用的是 `UIView` 类来定义视图。在我们的代码中，我们扩展了该类功能并命名为\
  \ `GameView`。如果重新查看 `GameView.h`，你会看到类似如下的代码，因此我们知道执行此类类型转换是安全的：\n\n```\n@interface\
  \ GameView : UIView {\n// 实现代码写在这里\n}\n@end\n```\n\n在 .NET 中，语法表示取决于具体语言。但以 C# 作为对比，其语法类似，使用冒号后跟父类来表示类继承。因此，使用\
  \ `(GameView *)` 类型转换来转换视图控制器的 `view` 属性，这样我们就可以引用已定义的 `updateLander()` 方法了。\n\n\
  最后需要注意的一点是，与定时器本身关系不大：当我们更新了游戏物理状态后，需要更新显示以反映着陆器位置或状态的变化。为此，我们使用 `setNeedsDisplay`\
  \ 方法，并将此消息传递给 `view` 对象——在此例中为我们的 `GameView` 对象。这将强制刷新显示（整个显示区域），期间我们会执行诸如重新绘制着陆器之类的更新。\n\
  \n### 自文档化代码\n\n在继续实现 `GameView` 类之前，我想谈谈*自文档化代码*的概念。这一术语背后的原则是，你的代码应该通过其实现本身就能说明问题。一个好的例子是使用命名良好的变量和方法，并采用我们之前在本书中讨论过的驼峰命名法约定。另一个概念是，虽然你可以将值硬编码到代码中，但这些值对于接手代码进行调试或扩展的人来说可能毫无意义。为了提高可读性，应尽可能避免使用硬编码的字面量，代之以常量或枚举类型。\n\
  \n#### 使用常量\n\n通过一个例子最能说明常量的用途。假设我们要将初始燃料箱值设为其满容量，即 200 升。我们可以通过将字面量 `200` 赋值给变量来实现，如下所示：\n\
  \n```\nint fuel = 200;\n```\n\n或者，我们可以定义一个常量，如下所示：\n\n```\nstatic const int FUEL_INITIAL\
  \ = 200;\n```\n\n然后使用这个常量将值赋给变量，如下所示：\n\n```\nint fuel = FUEL_INITIAL;\n```\n\n\
  请注意，虽然定义常量多了一行代码，但它使我们的代码无需注释就更加易读。此外，如果在相同上下文中需要重置为这个相同的值，我们可以直接再次使用这个常量。C# 中的语法完全相同。\n\
  \n\n\n### 使用枚举类型\n\n另一种编码方式与使用常量类似但略有不同，即采用枚举类型。它不仅为预定义的文字值赋予了更有意义的名称，还提供了一种对象类型，该类型只能取已定义值集合中的值。通过保持类型安全，这能确保你的代码更加可靠和健壮。\n\
  \n同样，我们用一个例子来说明。假设我们的游戏可以有六种不同的状态：未就绪、就绪、运行中、胜利、失败和暂停。我们可以使用文字值，甚至可以定义六个不同的常量。但是，为了突显类型安全的价值，如果我们像使用常量那样，将数字存储在\
  \ `int` 中，那么没有什么能阻止我们将其设置为一个无效状态的值，从而导致错误。因此，我们转而使用枚举类型：\n\n```\ntypedef enum {\
  \ NOTREADY, READY, RUNNING, WON, LOST, PAUSED } GameState;\n```\n\n当放在头文件中（不在类定义内）时，这将定义一个新类型（因此使用\
  \ `typedef` 命令），该类型由枚举值组成（因此使用 `enum` 语法），其有效值为 `NOTREADY`、`READY`、`RUNNING`、`WON`、`LOST`\
  \ 和 `PAUSED`。集合值的递增顺序意味着 `NOTREADY` 将被自动赋值为 0（零），而 `PAUSED` 的值为 5。然后给它一个标签名 `GameState`，意味着我们可以用此来引用该类型。\n\
  \n因此，在定义我们的枚举类型之后，我们可以创建该类型的对象，这些对象只能保存我们已定义的集合中的值——即有效状态。示例如下：\n\n```\nGameState\
  \ state = NOTREADY;\n```\n\n你会注意到，在我们的应用程序中，我们同时使用常量和枚举类型来帮助创建更具可读性的代码——*自文档化代码*。我们不仅对\
  \ `GameState` 这样做，还对游戏的难度等级（作为 `GameDifficulty`）和月球着陆器推进器的状态（作为 `ThrusterState`）也如此处理。\n\
  \nC# 中枚举类型的对应实现非常相似，并使用了几乎完全相同的语法。以下代码行展示了这一点，其细微差别在于省略了 `typedef` 关键字且标签名的位置不同：\n\
  \n```\nenum GameState { NOTREADY, READY, RUNNING, WON, LOST, PAUSED }\n```\n\n###\
  \ 以编程方式初始化 XIB 资源\n\n你知道，包含在 `GameView.xib` 文件中的 `GameView` 用户界面，会在游戏启动时显示。在我们的案例中，我们希望对此过程进行更精细的控制，因此我们使用\
  \ `initWithNibName` 命令以编程方式加载 `GameView.xib`。这会调用 `initWithCoder` 方法，它有点像构造函数，我们将用它不仅来加载\
  \ XIB 文件，还进行一些应用程序初始化。请考虑此方法的以下实现：\n\n```\n- (id) initWithCoder:(NSCoder *)aDecoder\n\
  {\n    if (self == [super initWithCoder:aDecoder]) {\n\n        //// 初始化精灵\n   \
  \     //\n        NSString *imagePath = [[ NSBundle mainBundle] pathForResource:@\"\
  lander\"\n                                                              ofType:@\"\
  tiff\"];\n        self.lander_nothrust = [UIImage new];\n        self.lander_nothrust\
  \ = [UIImage imageWithContentsOfFile:imagePath];\n\n        // 设置初始游戏状态\n      \
  \  [self newGame];\n\n    }\n    return self;\n}\n```\n\n我们的实现非常简单。尽管在此阶段还不完整，但已初具雏形。\n\
  \n首先，我们使用 `[super initWithCoder:aDecoder]` 命令调用父类方法，这将确保先创建继承的基类对象，并将其赋值给调用类（由 `self`\
  \ 引用）。如果此操作成功且不为 nil，则我们进入自定义代码，并最终返回新创建的对象。这是典型的对象初始化代码，你会看到许多其他使用继承来提供自身实现的对象也重复这种模式。\n\
  \n我们的初始化代码做了两件事。首先，我们初始化一个类型为 `UIImage` 的属性，该属性将保存多个推进器状态其中之一。本例中，它是不发射推进器时的月球着陆器图像，因此属性名为\
  \ `lander_nothrust`。回想一下在列表 5-5 中，我们如下定义了属性：\n\n```\n// 声明成员属性\n@property (nonatomic,\
  \ retain) UIImage *lander_nothrust;\n```\n\n并且记得像在列表 5-6 中那样，在我们的实现中对其进行合成：\n\n\
  ```\n@synthesize lander_nothrust = plander_nothrust;\n```\n\n然而，这是一个空的属性，需要进行初始化。一旦图像被初始化，我们还将调用一个我们自己的自定义方法\
  \ `newGame`，顾名思义，该方法初始化应用程序以开始一个新游戏。这是通过 `[self newGame]` 命令实现的。\n\n让我们仔细看看图像初始化代码。此时，我们使用三个独立的\
  \ `UIImage` 对象来保存月球着陆器飞船的不同状态：引擎推进中、引擎未推进、以及坠毁。我们可以使用图像数组或一个专门的 iOS 类来实现这一点，但在此阶段，我们保持简单。\n\
  \n因此，在我们向项目添加了 `Lander.tiff` 图像后（请继续添加），我们可以使用 `pathForResource` 方法引用该资源，传入文件名及其扩展名。以下命令实现了这一点，并返回一个指向我们图像资源的字符串：\n\
  \n```\nNSString *imagePath = [[ NSBundle mainBundle] pathForResource:@\"lander\"\
  \ ofType:@\"tiff\"];\n```\n\n然后，我们可以使用略有不同的 `new` 表示法来创建 `UIImage` 的实例，如下所示：\n\n\
  ```\nself.lander_nothrust = [UIImage new];\n```\n\n你会注意到，这个语法类似于 C#，因为我们使用了 `new`\
  \ 关键字来实例化一个新对象。然后，我们可以使用 `imageWithContentsOfFile` 方法，通过资源的完整路径来加载图像。以下是完整的一行代码：\n\
  \n```\nself.lander_nothrust = [UIImage imageWithContentsOfFile:imagePath];\n```\n\
  \n如果你检查 `newGame` 方法的实现，你会发现它很简单。它只是开始将一些类成员变量初始化为新游戏的默认值。\n\n\n\n#### 手动绘制用户界面\n\
  \n大多数情况下，你无需担心用户界面的绘制问题，因为 iOS 框架通常会自动处理这部分工作，作为控件功能的一部分。然而，在某些情况下，你可能希望对用户界面进行更精细的控制。如果你的应用是游戏，尤其如此，因为\
  \ iOS 框架提供的控件仅能实现部分所需功能。\n\n在这种情况下，你可以重写应用窗口需要刷新时调用的方法。这个方法名为 `drawRect`，它接收一个需要重绘的区域，该区域以\
  \ `CGRect` 结构体形式传递。该结构体包含需要重绘的矩形区域的起点和大小。如果该区域需要重绘，则被称为*脏区域*。当某些内容发生变化时（例如，某个区域之前被窗口遮挡，或控件的外观更新），就必须进行重绘。请考虑以下方法及其实现：\n\
  \n```\n// drawRect - 重绘屏幕\n-(void)drawRect:(CGRect)rect\n{\n    // 仅在准备就绪时进行绘制\n\
  \    if (gstate != RUNNING)\n        return;\n\n    [self.lander_nothrust drawAtPoint:CGPointMake(loc_x,\
  \ loc_y)];\n\n}\n```\n\n你会注意到，我们首先查询应用程序的状态——如果它没有运行，则无需更新屏幕。假设它正在运行，此时我们只需在游戏初始化时定义的\
  \ `x` 和 `y` 位置，使用 `lander_nothrust` 图像绘制我们的月球着陆器图像。目前，我们仅做这些。然而，随着游戏物理效果的体现和用户交互的纳入，我们将更新月球着陆器的位置、检测碰撞等——所有这些都在此方法内完成——并绘制相应的视觉效果。这意味着，如果没有施加推力，着陆器会下降；如果施加推力，它会上升，等等。因此，这相当直接，但很有效！\n\
  \n#### 使用自定义方法\n\n与大多数编程语言一样，你的应用程序结构通常使用子程序，或在面向对象的世界中使用类方法来定义自定义功能。当按正确顺序调用时，这些功能就能实现你的应用程序——在我们的案例中，就是《月球着陆器》游戏。这些子程序的结构和命名是你应用程序架构的一部分。\n\
  \n我们的游戏提供了以下占位方法：\n\n*   `newGame`：初始化游戏。此方法在用户界面初始化后被调用。\n*   `rotateLeft`：将月球着陆器飞船向左旋转。这是响应用户想要向左旋转的操作。在初步实现中，这是通过一个工具栏按钮完成的。详见第\
  \ 7 章，稍后我们将在第 10 章中讨论轻扫和手势。\n*   `rotateRight`：将月球着陆器飞船向右旋转。这是响应用户想要向右旋转的操作。同样，这里我们使用了一个工具栏按钮；稍后，我们将研究轻扫和手势。\n\
  *   `thrustEngine:`：点燃月球着陆器的推进器引擎，这将减缓上升速率，如果按住足够长时间，甚至能增加高度。它还会指示引擎状态的变化，让我们的绘制方法在用户所见内容中反映出这一点。\n\
  *   `quitGame`：通过关闭模态显示的 `GameView` 来退出游戏。本章中，我们将仅实现此方法和 `newGame`。\n\n### 使用模拟器测试你的应用\n\
  \n鉴于我们现在开始认真开发应用程序，我们将更多地使用模拟器。我们可以开始考虑在真实设备上部署和测试，但我们先暂且搁置这一复杂问题，部分原因是目前还没有必要。\n\
  \n在应用开发的早期阶段，以模拟器为目标可以节省大量时间。你无需等待应用安装到物理设备上，就能看到代码更改的效果。而且，在模拟器中运行代码也不需要购买和安装开发者证书。\n\
  \n请不要误会——使用模拟器并非完美无缺，它也有自己的挑战。例如，它无法显示 OpenGL 图形、无法模拟多点触控事件，也无法提供来自 iPhone 某些传感器（如\
  \ GPS）的读数。尽管如此，对于大多数应用而言，它已具备足够的功能，成为你开发过程中有价值的一部分。\n\n需要注意的一个陷阱是，你无法保证模拟应用性能会与实际应用性能相似。模拟器往往运行得非常流畅，这得益于其运行所在\
  \ Mac 的强大性能。而真实应用几乎肯定会受到更有限的资源限制，从而影响用户体验。请务必在你应用所针对的所有物理设备上进行测试，以确保你的期望与现实相符。\n\
  \n以下是模拟器的一些功能：\n\n*   **用户输入**：鼠标可用于模拟指尖。按住 Option 键（![images](img/U006.jpg)）将显示两个圆点，可用于模拟多点触控事件。\n\
  *   **旋转**：可以通过硬件菜单实现。\n*   **iOS 版本**：你可以选择不同的 iOS 版本来测试你的应用。\n*   **低内存**：可以模拟低内存情况，以便你向应用发送此状态，观察其行为。\n\
  *   **硬件键盘**：模拟器允许你使用 Mac 的键盘来提供键盘输入。\n\n那么，经过所有这些辛苦工作之后，你的游戏运行起来是什么样子呢？在 图 5–7\
  \ 中，你可以看到游戏在模拟器中运行的情况，两个圆圈代表模拟器中的触摸手势。\n\n![images](img/0507.jpg)\n\n**图 5–7.**\
  \ *在模拟器中运行的游戏*\n\n## 总结\n\n在本章中，我们利用了前几章提供的基础，开始开发一个真正的应用程序——更接近于实现大多数 iPhone 和\
  \ iPad 用户所期望的丰富用户体验。好吧，我们的《月球着陆器》游戏可能不适合所有人，是的，我仍然在怀念我的青春时光，但手机游戏应用应该有趣。它也让你有机会在你迄今为止所学到的知识基础上进行构建并加以阐述。\n\
  \n我们介绍了一些关于如何开始应用程序开发的建议，从基础知识入手，例如捕获需求和思考应用设计。然后，我们开始构建应用程序的视觉和程序化方面。\n\n在构建应用程序的同时，你了解了如何在呈现用户界面时使用多个视图，包括我们游戏应用程序的程序化显示。我们添加了一些导航控件，并利用这些控件提供的事件。我们还研究了如何使用实用工具类，例如\
  \ `NSTimer` 类和 `UImage` 类，来实现我们的功能。\n\n我们还研究了如何编写更具可读性、自我文档化的代码，以及如何使用我们自己的自定义方法来实现一个有意义的架构，其结构应能被大多数开发人员轻松理解。最后，我们将模拟器视为一个良好的测试资源。\n\
  \n在接下来的章节中，我们将基于此应用程序进行构建，充实其功能。在此过程中，我们将探索 iOS 的其他方面，例如更高级的用户界面和数据持久化。\n\n## 第\
  \ 6 章\n\n\n\n"
- "# 提升技能：用动态用户界面增强你的应用\n\n苹果公司始终高度重视用户在 iOS 设备上的使用体验，这尤其因为它是最早实现以图形用户界面（GUI）为核心用户交互方式的操作系统的公司之一。Macintosh\
  \ 并非首款采用 GUI 的个人电脑，但却是首个为开发者社区提供如此全面支持的产品。这包括《界面设计指南》，通过苹果提供的一些开发者资源，你会发现这些指南至今仍存在于\
  \ OS X 系统中。当然，苹果对用户体验的理解并不仅限于图形用户界面，它还包括设备的物理特性和基于触摸的用户输入等方面。不过，应用的用户界面设计在提供苹果所期望的、且能与\
  \ iOS 设备其他特性（使其成为全球领先移动设备的关键因素）和谐共存的交互体验中，起着至关重要的作用。\n\n因此，手握 iOS 设备，唯一限制你的是想象力，而唯一的障碍则是如何解锁设备中的魔法，通过应用将想法转化为现实。本章重点介绍\
  \ iOS SDK 如何帮助你实现这一目标。具体来说，你将了解以下内容：\n\n-   设备的功能特性以及如何利用它们，例如自动调整大小\n-   不同的应用类型，以及支持它们的视图控制器\n\
  -   iOS SDK 提供的用于构建用户界面的界面元素\n-   如何使用 iOS SDK 实现典型 UI 元素应用功能的工作示例\n-   苹果提供的支持资源，以及一些如何充分利用它们的小技巧\n\
  \n我们首先探索 iOS 设备的一些关键特性以及典型的应用场景。\n\n## 理解平台与设备的限制条件\n\n用户体验始于所使用的设备，因此你的目标设备以及你为利用每个设备的物理特性而编写的代码至关重要。请注意，我特意使用了*目标*和*利用*这两个词，因为某些特性（如设备方向和应用旋转其用户界面的能力）并不会被应用自动采用——你需要专门编写代码来支持它们。本书后面会详细介绍这一点。\n\
  \n让我们来看看一些相关的平台特性。\n\n### 屏幕尺寸与分辨率\n\n在设计应用时，不同 iOS 设备的屏幕分辨率非常重要。描述设备屏幕尺寸的度量单位（*像素*）和描述屏幕上绘制区域的度量单位（*点*）之间存在重要区别。表\
  \ 6-1 详细列出了不同 iOS 设备以像素为单位的屏幕分辨率。\n\n![images](img/t0601.jpg)\n\n值得注意的是，当你查看 iOS\
  \ SDK 提供的图形系统框架时，它们要求你使用基于点的逻辑坐标系统，而非像素。稍后会解释原因，但像素与点之间的转换取决于你的显示类型。标准显示器采用 1:1\
  \ 的比例；而视网膜显示屏则采用 1:2 的比例。\n\n#### 充分利用设备形态的示例应用\n\n有许多优秀应用能够充分利用不同设备的尺寸和形态。一些示例应用会将显示方向调整为更适合其用途的模式。例如，在图\
  \ 6–1 中，iPhone 上的 YouTube 应用使用竖屏模式显示列表，因为横屏模式带来的价值不大。\n\n![images](img/0601.jpg)\n\
  \n**图 6–1.** *竖屏模式下的 YouTube 视频列表*\n\n但在播放特定视频时，横屏方向更为合适。你会看到应用切换到横屏模式播放视频，如图 6–2\
  \ 所示。它仍然提供竖屏选项，但该模式效果较差。\n\n![images](img/0602.jpg)\n\n**图 6–2.** *YouTube 默认使用横屏模式播放视频*\n\
  \n特别是 iPad，它为你提供了更多利用其大屏幕的机会。如图 6–3 所示，《金融时报》的 iPad 应用利用设备的形态，呈现了其数字仿真报纸的外观和感觉。\n\
  \n![images](img/0603.jpg)\n\n**图 6–3.** *竖屏模式下展现的《金融时报》iPad 应用*\n\n另一个例子是 BBC 的\
  \ iPad 应用，它充分利用横屏模式，通过分裂视图控制器（Split View Controller，你将在本章稍后构建一个示例）并排显示新闻和相应的视频。你可以在图\
  \ 6–4 中看到该应用。\n\n![images](img/0604.jpg)\n\n**图 6–4.** *BBC 新闻 iPad 应用充分利用横屏模式*\n\
  \n#### 点与像素的比较\n\n点这个度量单位用于描述屏幕上绘制的区域，而像素则描述屏幕或图像（如图标）的大小。为什么要区分两者？苹果提供支持，使你的应用无论运行在何种设备上，都能一致地呈现。它通过使用点和逻辑坐标系统来实现这一点，当\
  \ iOS 系统框架也使用该系统来解释物理设备位置时，能确保你绘制的内容在不同设备上显示为相同大小。微软在其 GDI+ 框架中也采用了类似的逻辑坐标系统。你很快就会发现，处理点和处理像素一样简单，而且设备间的逻辑等效性通常意味着操作更简便。\n\
  \n#### 其他考虑因素\n\n在考虑屏幕尺寸时，还有一些明显的因素。iPad 的屏幕显然比 iPhone 大得多，因此你的应用可以利用这一点，你的图片质量也应能体现这种尺寸差异。例如，除非你愿意牺牲图片质量，否则不要简单地使用相同大小的图形内容并直接放大。\n\
  \n另外请记住，苹果的《人机界面指南》建议，某些用户界面元素无论屏幕大小如何，都应保持相同尺寸。例如，指南建议用户界面中可点击的元素在 44 × 44 点的尺寸下最舒适。\n\
  \n**注意：** 通常，移动设备的像素密度较高，因其设计用于近距离观看。iPhone 4 就是如此，其像素密度为 326 PPI（每英寸像素数），而 iPad\
  \ 2 则为 132 PPI。\n\n### 支持设备方向\n\niOS 支持基于设备方向旋转你的应用。你的应用是否支持此功能当然是一个设计考量。在某些情况下，将应用旋转到特定方向毫无意义，因为这会牺牲用户体验。例如，一个带有某种横向滚动场景的游戏，如果旋转到竖屏模式，看起来会显得被压缩和妥协。\n\
  \n\n### 处理设备方向\n\n你可能已经猜到，iOS SDK 会触发一个事件来通知你的代码设备方向发生了变化。来看看这个事件的签名：\n\n`(void)\
  \ didRotateFromInterfaceOrientation(UIInterfaceOrientation)fromInterfaceOrientation`\n\
  \n当这个事件被触发，并且你的应用程序通过在代码中实现这个方法签名来捕获该事件时，它会传入设备旋转前的方向。所以你只需要实现这个事件，对吗？不对——除了为旋转方法提供实现外，你还需要首先告诉你的应用程序支持不同的方向并触发该事件。如果你检查构建视图控制器时生成的代码，会发现以下代码被注释掉了：\n\
  \n```\n/*\n// Override to allow orientations other than the default portrait orientation.\n\
  - (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation\
  \ {\n    // Return YES for supported orientations\n    return (interfaceOrientation\
  \ == UIInterfaceOrientationPortrait);\n}\n*/\n```\n\n你需要同时取消这段代码的注释，向应用程序表明它现在支持不同的方向，并且确保如果触发的方向（在示例中为竖屏方向）受支持则返回\
  \ `YES`，如果所有方向都受支持则无条件返回 `YES`。你还需要实现前面讨论过的旋转事件。\n\n如果你想知道设备是否已旋转为竖屏方向，可以检查它是否从横屏方向旋转而来，并通过使用针对该方向定向的视图控制器来反映这一变化：\n\
  \n```\nif((fromInterfaceOrientation == UIInterfaceOrientationLandscapeLeft) ||\n\
  \     (fromInterfaceOrientation == UIInterfaceOrientationLandscapeRight))\n  {\n\
  \    //  Load the view controller oriented to the Portrait mode\n  }\n```\n\n你还可以测试\
  \ `UIInterfaceOrientationPortrait` 和 `UIInterfaceOrientationPortraitUpsideDown`，在所有情况下根据你的应用程序是否已编写为支持特定旋转来返回\
  \ `YES` 或 `NO`。\n\n我们来测试一下。如果你让代码保持注释状态或直接返回 `NO`，那么你的应用程序只支持竖屏方向，不支持横屏方向。因此，如果你在模拟器中运行应用程序，并从\
  \ `Hardware` 菜单中使用向左旋转（![images](img/U003.jpg)![images](img/U004.jpg)）或向右旋转（![images](img/U003.jpg)![images](img/U005.jpg)）命令，设备会旋转。将其向左旋转，你应该会看到类似图\
  \ 6-5 的屏幕。\n\n![images](img/0605.jpg)\n\n**图 6-5.** *设备向左旋转*\n\n这显然看起来不对，而且毫不意外，因为你已经指出应用程序不支持竖屏之外的任何方向。为了说明这一点，让我们取消代码注释，并无论方向如何都返回\
  \ `YES` 作为值。更改代码后，重新运行应用程序，并按照相同的向左方向旋转，你应该会看到类似图 6-6 的屏幕。\n\n![images](img/0606.jpg)\n\
  \n**图 6-6.** *支持横屏的设备旋转*\n\n好多了，但还不正确。正如你所看到的，按钮不像在竖屏模式下那样在屏幕上居中。没关系：这个问题很容易解决，因为\
  \ Xcode 和 iOS SDK 支持使用控件属性进行自动调整大小。打开你的项目并打开 `LunarLanderViewController.xib` 以显示起始屏幕。使用尺寸检查器（![images](img/U006.jpg)![images](img/U007.jpg)5）选择按钮，你就会看到图\
  \ 6-7 中显示的尺寸检查器。\n\n![images](img/0607.jpg)\n\n**图 6-7.** *尺寸检查器*\n\n首先，不要被这个显示界面搞糊涂；它相当直观。让我们关注自动调整大小窗格。左边的框是修改属性值的地方；右边的框是一个示例动画，描绘了你所做更改的效果——这是一个非常有用的视觉工具，可以确认你做了正确的更改。\n\
  \n仔细观察，你会发现两件事：\n\n*   内方块中的一组红色箭头，代表所选对象内部的水平和垂直空间\n*   内框外侧的一组 *I* 形图标，代表所选对象与其所在视图外部之间的距离\n\
  \n在这两种情况下，虚线表示该空间是灵活的：也就是说，它会根据屏幕的方向进行调整。实线表示该空间是固定的。因此，如果你希望按钮在水平轴上是灵活的并能自动居中，你需要确保左侧的\
  \ *I* 形图标是虚线，而不是默认的实线。这一更改如图 6-7 所示，动画显示旋转时按钮会移动到横屏屏幕的中心——这正是你想要的。进行更改并运行应用程序，你应该会看到类似图\
  \ 6-8 的屏幕。好多了！\n\n![images](img/0608.jpg)\n\n**图 6-8.** *通过调整自动调整大小设置，屏幕向左旋转*\n\n\
  自动调整大小并不是你唯一可用的选项。iOS SDK 提供了一种方法，让你可以通过代码在旋转完成前调整控件的属性，从而精确控制控件的外观和感觉。需要更改的方法签名如下：\n\
  \n`(void)willAnimateRotationToInterfaceOrientation:(UIInterfaceOrientation)`\n\n\
  最后一个可用的选项让你无需通过编程方式即可精确控制屏幕在特定方向上的外观。要实现这一点，你需要为每个要支持的方向准备一个视图，并在刚才描述的那个方法中使用 `self.view`\
  \ 属性来调整视图。这意味着你的视图可以在设计时针对某个方向定义用户界面的外观和感觉，而无需通过代码以编程方式调整用户界面控件。简单吧！\n\n关于旋转和方向的讨论就到此为止。虽然它们很重要，但并非本章的主要焦点。让我们将目光投放到设备的属性之外，考虑你可能正在构建的应用程序类型，以及\
  \ SDK 提供的支持，以给用户带来熟悉而丰富的体验。\n\n\n\n## 应用类型及其关联的视图控制器\n\n到目前为止，本书介绍了视图和视图控制器的概念，甚至还提出了一种应用如何拥有多个视图，这些视图会根据用户界面以编程方式显示。我对*应用类型*进行了区分：即某些表现出特定行为并以特定方式使用视图控制器的应用。请考虑以下应用类型：\n\
  \n- 实用工具应用\n- 标签栏应用\n- 导航应用\n\n在此上下文中，我将月球着陆器归类为实用工具应用。该游戏主要在一个单一视图上进行，并且还会显示一个配置或启动屏幕。然而，这是最简单的用户界面。它还以模态方式显示视图控制器，因为应用的设计在主游戏进行或终止时，仅将主游戏屏幕显示为唯一可用的屏幕。模态显示视图通常是为了中断应用的流程，并强制其在流程继续之前返回。另一个典型示例是在继续之前获取所需的关键信息。另一种方式则不中断流程，视图通过标签栏等控件进行协调。\n\
  \n正如你所见，用户与你的应用进行交互的方式有很多创新且通常很复杂，这些交互通常通过手势来控制。要在本书的篇幅限制内，为你介绍所有不同应用类型及其相关视图控制器的工作示例是不可能的。你可以通过\
  \ Apple 指南（例如[`http://developer.apple.com/library/ios/#featuredarticles/ViewControllerPGforiPhoneOS`](http://developer.apple.com/library/ios/#featuredarticles/ViewControllerPGforiPhoneOS)）或全面的\
  \ iOS 开发书籍独立探索多种方案。在此，我们将专注于一些与.NET 有对应关系的特定、有用的替代方案，并学习如何使用它们。\n\n在深入探讨标签栏示例之前，让我们先来看看不同的应用类型及其关联的视图控制器。\n\
  \n### 基于实用工具的应用\n\n在基于实用工具的应用中，用户的交互围绕单个视图展开。可能存在其他视图，但它们通常仅限于支持应用的配置。一个很好的例子是股票应用，如图\
  \ 6-9 所示，调用时会显示你选择的股票（或默认股票）及其表现。指南针和计算器应用也是很好的例子。\n\n![images](img/0609.jpg)\n\n\
  **图 6-9.** *iPhone 股票应用是一个基于实用工具的应用示例。*\n\n并没有特定的视图控制器类来管理这种应用；相反，你会以编程方式模态地呈现视图。这正是你在月球着陆器应用中所做的。在.NET\
  \ 中，实用工具应用可能是基于控制台的应用，或是具有单个窗口并使用模态对话框来检索关键信息的 Windows 窗体应用。\n\n### 基于标签栏的应用\n\n\
  标签栏应用是一种支持多个视图的应用，其上下文根据用户交互选择，通常以标签形式显示。一个很好的例子是时钟应用，如图 6-10 所示，它拥有多个视图，通过屏幕底部的标签栏访问。选择一个标签通常会改变活动的视图控制器；一个新的对应视图变为活动状态，从而显示新屏幕。\n\
  \n![images](img/0610.jpg)\n\n**图 6-10.** *iPhone 时钟应用是一个多视图标签栏应用。*\n\n值得强调的是，有一个常见的混淆点。工具栏看起来与标签栏非常相似，两者都是用于显示可点按图标水平条。关键区别在于，工具栏可以包含按钮和其他控件，但这些控件的选择并非互斥的。用户可以点击多个，它们不会像二元开关那样工作——相反，它们只是触发一个供你捕获和处理的事件。反之，由于标签栏的选择决定了视图，因此标签是互斥的。\n\
  \n标签栏应用通常使用由`UITabBarController`类提供的标签栏视图控制器来实现。该类直接使用，而不进行子类化；你将以此作为更详细示例的核心。在.NET\
  \ 中，标签栏是为数不多的在 Windows 窗体中具有可直接比较的.NET 控件（`TabControl`，位于`System.Windows.Forms.TabControl`命名空间）的视图控制器类型之一。\n\
  \n另外值得一提的是，标签栏通常与表格类型的视图结合使用，而表格视图控制器（通过`UITableViewController`类实现）正是为此设计的。它提供了在实现表格时所需的预期行为支持，例如编辑数据行或管理单元格、行和列的选择。\n\
  \n### 基于导航的应用\n\n基于导航的应用通常用于呈现一系列具有自然层次结构的视图。例如，考虑邮件应用，如图 6-11 所示，每个用户交互都建立在前一个交互之上，允许你深入你的邮件账户，然后是收件箱，然后是电子邮件，最后是特定的邮件。每一步都由一个视图表示，你可以通过选择返回按钮反向退出层次结构。\n\
  \n![images](img/0611.jpg)\n\n**图 6-11.** *邮件应用是一个层次化的、多视图基于导航的应用。*\n\n导航控制器的功能包含在`UINavigationController`接口中。这与前面提到的`UITabBarController`接口非常相似，关键区别在于导航控制器通过实现视图栈来工作。例如，想象拿起一堆书，将它们一本本叠放在一起——你构建了一个书堆，完成后，从书堆中最容易拿出的书就是你最后放上去的那本。然后你可以揭开书堆，最后拿到你最初放下的那本书。这被称为*后进先出*（LIFO）。\n\
  \n\n\n### 实现基于标签栏的应用\n\n回顾之前的章节，你已了解 Xcode 提供的项目模板功能——如果你用过 Visual Studio，会对这些模板感到非常熟悉。Xcode\
  \ 恰好为基于标签栏的应用提供了这样一个模板，因此我们暂时搁置《登月者》项目，利用该模板创建另一个示例应用，以演示标签栏视图控制器的特性。首先启动 Xcode，按照步骤创建新模板，此操作选择如图\
  \ 6–12 所示的标签栏模板。\n\n![images](img/0612.jpg)\n\n**图 6–12.** *新建标签栏应用*\n\n点击“下一步”，为应用命名。我将其命名为\
  \ `TabBarExample`——我知道这名字缺乏创意！为了让你理解 Xcode 构建的内容，我们先直接在模拟器中运行这个刚创建的应用，观察其效果。此时有必要重申一点：.NET\
  \ 平台没有“视图控制器”或“标签栏视图控制器”的概念；但它提供了独立的控件，当这些控件与你自己实现的 MVC 模式结合时，同样能轻松复制相同的功能。本章稍后部分将对比\
  \ iOS SDK 和 .NET 用户界面库中提供的控件。\n\n首先，查看从模拟器截取的图 6–13，图中展示了在默认项目实现中点击标签按钮时显示的两个视图。\n\
  \n![images](img/0613.jpg)\n\n**图 6–13.** *运行中的默认标签栏应用*\n\n接下来，我们分析创建默认应用（自带视图与控制器切换功能）后生成的实现代码。使用项目导航器（![images](img/U007.jpg)1）查看项目结构；当展开三个文件夹（`TabBarExample`、`Frameworks`\
  \ 和 `Products`）时，你会看到类似于图 6–14 的结构。\n\n![images](img/0614.jpg)\n\n**图 6–14.** *标签栏默认项目结构*\n\
  \n首先从简单的部分入手。`Products` 是一个名为 `TabBarExample.app` 的单一应用程序二进制文件，它使用了 `UIKit`、`Foundation`\
  \ 和 `CoreGraphics` 框架。如第 4 章所述，在 Microsoft .NET 中，这些框架相当于功能库，提供对象及其属性和方法，所有内容均位于各自对应的命名空间中。\n\
  \n沿着列表向下查看，我们来看应用委托的实现。查看头文件和实现文件，你会发现它们与之前看到的非常相似，但存在一些关键差异。请参考代码清单 6-1 中的 `TabBarExampleAppDelegate.h`\
  \ 文件。\n\n**代码清单 6-1.** *`TabBarExampleAppDelegate.h`*\n\n```\n#import <UIKit/UIKit.h>\n\
  \n@interface TabBarExampleAppDelegate : NSObject <UIApplicationDelegate,\nUITabBarControllerDelegate>\
  \ {\n\n}\n\n@property (nonatomic, retain) IBOutlet UIWindow *window;\n\n@property\
  \ (nonatomic, retain) IBOutlet UITabBarController *tabBarController;\n\n@end\n```\n\
  \n需要关注的关键点是：与之前的示例一样，它继承自 `NSObject`，但不仅实现了 `UIApplicationDelegate` 协议，还实现了 `UITabControllerDelegate`\
  \ 协议。该协议的方法提供了一些选项，例如，可以在标签被选中后执行某些操作。可以看到，它还创建了一个指向 `UITabBarController` 类的属性，这是应用中使用的标签控制器对象的实例引用。请记住，`UITabController`\
  \ 类不会被继承；你直接使用该类本身。\n\n我不会深入讲解 `TabBarExampleAppDelegate.m` 文件的细节，但值得注意的一点是：窗口的\
  \ `rootViewController` 被设置为 `tabBarController` 属性，作为要使用的主视图控制器。如下代码所示：\n\n```\n\
  self.window.rootViewController = self.tabBarController\n```\n\n到目前为止一切顺利。如果双击 `MainWindow.xib`\
  \ 文件，它将在 Interface Builder 中加载。选择“标签栏控制器”视图，你会看到 Interface Builder 中显示的界面，如图 6–15\
  \ 所示。\n\n![images](img/0615.jpg)\n\n**图 6–15.** *在 Interface Builder 中打开的标签栏 MainWindow\
  \ 视图*\n\n在此示例中，我点击了标签栏上的“第二个”按钮，可以看到 Interface Builder 显示 `SecondView` 已加载。如果点击第一个标签栏按钮，它会显示\
  \ `FirstView` 已加载。在标签栏属性中可以找到此控件的设置，你可以通过属性检查器（![images](img/U006.jpg)![images](img/U007.jpg)4）显示该面板，如图\
  \ 6–16 所示。\n\n![images](img/0616.jpg)\n\n**图 6–16.** *标签栏控件的属性检查器*\n\n注意标签栏按钮与其所选视图之间的关联关系。这是通过\
  \ `NIB Name` 属性指定的，该属性指向包含要加载视图的 NIB 文件——在本例中，第一个标签栏按钮显示来自 `FirstView.xib` 文件的视图。如果在项目中找到该文件并选中它，你会看到一个熟悉的视图，如图\
  \ 6–17 所示。\n\n![images](img/0617.jpg)\n\n**图 6–17.** *与第一个标签栏按钮关联的 FirstView*\n\n\
  与每个标签关联的视图都会创建一个类及其关联文件（包括头文件和实现文件）。每个视图（`FirstView` 和 `SecondView`）都为你提供了编写自定义视图控制器代码的机会；你可以在默认行为和实现基础上进行构建，这些默认实现非常简单，除了你已见过的典型方法实现外，几乎不做其他事情。例如，它们会根据是否支持特定方向返回\
  \ `YES` 或 `NO`（默认情况下仅支持竖屏方向）。\n\n但这展示了将不同标签栏项与不同视图和视图控制器关联的能力，并灵活地控制标签栏项的外观和行为。例如，你可以修改标签栏项：移除文本、向项目添加\
  \ Logo，并将 Logo 应用于标签栏项。图 6–18 展示了使用属性检查器选中标签栏项的示例。\n\n![images](img/0618.jpg)\n\n\
  **图 6–18.** *使用标签栏项属性检查器添加 Logo*\n\n如果将此机制应用于你的游戏，你可以使用一个标签显示主游戏视图（展示实际游戏），再使用另一个标签显示高分数视图。虽然《登月者》游戏通常会在每个游戏回合结束前使用模态视图，所以你不会采用这种方式——但理论上你可以这样做。现在你应该也明白了视图与关联视图控制器之间的关系，从而能够根据应用设计需求自定义它们或添加更多视图。\n\
  \n另一项有用的技术是：使用一个标签以不同视角显示同一组数据。例如，你的应用可以列出设备上的音频文件，并通过多个标签从不同视角展示视图：专辑标签、流派标签、曲目名称标签等。\n\
  \n\n\n### iPad 专用控制器概述\n\n在结束视图控制器的讨论之前，我们先来重点了解一些 iOS SDK 中提供的、但专属于 iPad 设备的视图控制器。iPad\
  \ 的外形尺寸与 iPhone 不同，它更大，并且在屏幕方向改变时的表现也略有差异。正因如此，人们创建了一些专门的视图控制器来充分利用 iPad 的外形优势；但本书的示例仅专注于\
  \ iPhone，因此对这些视图控制器的探索就留给拥有 iPad 设备的读者们了。\n\n#### 弹出视图控制器\n\n虽然弹出控制器严格来说并非视图控制器，但它确实提供了一种有用的机制，可以在应用程序窗口中显示额外内容。如果你正在\
  \ .NET 中寻找类似的功能，恐怕要失望了。目前 .NET 中并没有这样的功能，但你可以使用 .NET 代码，或者基于 Ajax 的源代码，创建自己对应的实现。你可以在\
  \ 图 6–19 所示的 iPad 模拟器中看到一个示例。稍后我们会构建它；现在先来看看它的组成部分。\n\n![images](img/0619.jpg)\n\
  \n**图 6–19.** *iPad 弹出示例*\n\n要实现一个弹出窗口，你需要使用 `UIPopoverController` 类，并且清楚地知道触发弹出窗口显示需要满足什么条件。毕竟，它本质上是对现有视图控制器的一个封装，然后在你应用程序之上显示一个浮动的视图。例如，你可能有一系列选项供用户选择，并且你希望在用户选择某个特定选项时，使用弹出窗口来显示其描述。此外，它还能很实用地显示一个箭头，将弹出窗口与其关联的项目连接起来——如果关联的是工具栏按钮，箭头就会指向该按钮本身。在做出这些基本决策后，你就可以开始实现弹出窗口了。\n\
  \n让我们创建一个简单的弹出窗口示例来演示这些概念。首先，使用 Xcode 4 为 iPad 设备创建一个基于视图的应用程序。创建完成后，你会像之前一样注意到，系统为主视图创建了一个视图控制器。为这个视图添加一个包含单个项目的工具栏，该工具栏项目将是触发弹出窗口的控件：通过\
  \ Interface Builder 编辑关联的 XIB 文件并添加工具栏对象来实现。你在 Xcode 中的屏幕应该类似于 图 6–20 所示。\n\n![images](img/0620.jpg)\n\
  \n**图 6–20.** *你的示例 iPad 视图控制器，带有一个工具栏项目*\n\n如果此时运行这个程序，你将得到一个相当单调的应用程序，底部只有一个工具栏项目。它之所以是空白，是因为在真实场景中，你更可能拥有多个工具栏项目，而且目前它背后还没有任何功能。现在我们来创建弹出窗口。弹出窗口需要一个视图控制器来管理数据如何显示；在这个例子中，我们提供以表格格式显示数据的机会，这对于弹出窗口来说非常典型。为你的项目添加一个文件（我将其命名为\
  \ `PopoverSelection`），确保它与 iPad 兼容，并且为其创建一个 XIB 文件。关键是，它还必须继承自显示数据所需的视图控制器。在本例中，弹出窗口显示表格数据，因此你使用\
  \ `UITableViewController` 作为子类。参见 图 6–21。\n\n![images](img/0621.jpg)\n\n**图 6–21.**\
  \ *使用表格视图基类创建弹出视图控制器类*\n\n这会在你的项目中创建三个文件：`PopOverSelection.h`（头文件）、`PopOverSelection.m`（实现文件）以及\
  \ `PopOverSelection.xib`（视图文件）。如果你在 Interface Builder 中打开关联的 XIB 文件，它应该看起来像 图 6–22\
  \ 所示。\n\n![images](img/0622.jpg)\n\n**图 6–22.** *你的表格形式弹出视图控制器*\n\n你需要将这个类集成到你的代码中，因此必须定义相关的属性和操作，以便连接弹出控制器操作并展示弹出窗口。你可以在主视图控制器中完成这些操作，该控制器名为\
  \ `PopOverExampleViewController`。参见 代码清单 6-2。\n\n**代码清单 6-2.** *`PopOverExampleViewController.h`*\n\
  \n```\n#import <UIKit/UIKit.h>\n#include \"PopOverSelection.h\"\n\n@interface PopoverExampleViewController\
  \ : UIViewController {\n    UIPopoverController *popCtrl;\n    PopOverSelection\
  \    *selection;\n    IBOutlet UIBarButtonItem *bbitem;\n}\n```\n\n\n\n```objectivec\n\
  @property (nonatomic, retain) UIBarButtonItem *bbitem;\n@property (nonatomic, retain)\
  \ UIPopoverController *popCtrl;\n@property (nonatomic, retain) PopOverSelection\
  \ *selection;\n\n- (IBAction)togglePopOverController;\n\n@end\n```\n\n如果分解来看，首先需要的是一个指向工具栏按钮项的指针。为此，你需要在类中定义一个与工具栏按钮项名称匹配的\
  \ `IBOutlet` 属性。使用标识检查器将其改为 `bbitem`：\n\n```objectivec\nIBOutlet UIBarButtonItem\
  \ *bbitem;\n```\n\n接下来需要一个对应的 `@property` 语句（如下所示），当然，还需要在实现文件中编写 `@synthesize`\
  \ 语句（稍后你将看到这些内容）：\n\n```objectivec\n@property (nonatomic, retain) UIBarButtonItem\
  \ *bbitem;\n```\n\n通过属性暴露工具栏按钮后，你还需要定义一个操作，以便通过 Interface Builder 将按钮与该操作连接起来——该操作用于切换弹出框的显示或隐藏状态。这是一个简单的\
  \ `IBAction`，与你在前几章中使用过的类似，其定义如下：\n\n```objectivec\n-(IBAction)togglePopOverController;\n\
  ```\n\n最后，你需要一个指向弹出框视图控制器的属性，以及 `UIPopOverController` 单例类（该类提供了实现弹出框功能所需的 SDK 代码）。以下代码定义了这些成员变量。请注意，你需要引入\
  \ `PopOverSelection.h` 文件才能获取弹出框视图控制器：\n\n```objectivec\nUIPopoverController *popCtrl;\n\
  PopOverSelection    *selection;\n```\n\n当然，你还需要为这些变量编写相应的 `@property` 和 `@synthesize`\
  \ 语句。\n\n现在，你已经具备了将操作连接到工具栏按钮以调用弹出框选择的条件，同时也拥有了实现弹出框显示/隐藏所需的其他属性。首先，按照前几章的做法连接操作。使用\
  \ Interface Builder，在主视图控制器打开并显示工具栏按钮的情况下，为主文件所有者打开连接检查器。然后将 `togglePopOverController`\
  \ 操作拖到工具栏按钮上，并将 `bbitem` 的 `IBOUTLET` 连接到同一按钮项。这样，你就可以引用该按钮并在其被点击时捕获该操作。你可以在图 6-23\
  \ 中看到这些连接。\n\n![images](img/0623.jpg)\n\n**图 6-23.** *将工具栏按钮项连接到代码中的操作*\n\n剩下的唯一工作就是提供弹出框功能的实现代码。代码清单\
  \ 6-3 展示了核心实现代码，随后我们将逐一讲解。\n\n**代码清单 6-3.** *弹出框的核心实现代码*\n\n```objectivec\n#import\
  \ \"PopoverExampleViewController.h\"\n\n@implementation PopoverExampleViewController\n\
  \n@synthesize popCtrl;\n@synthesize selection;\n@synthesize bbitem;\n\n- (void)dealloc\n\
  {\n    [super dealloc];\n}\n\n- (void)didReceiveMemoryWarning\n{\n    // 如果视图没有父视图，则释放该视图。\n\
  \    [super didReceiveMemoryWarning];\n\n    // 释放任何未使用的缓存数据、图像等。\n}\n\n#pragma\
  \ mark - 视图生命周期\n\n// 实现 viewDidLoad 以在加载视图后执行额外设置，通常来自 nib 文件。\n- (void)viewDidLoad\n\
  {\n    selection = [[PopOverSelection alloc] init];\n    popCtrl = [[UIPopoverController\
  \ alloc] initWithContentViewController:selection];\n    popCtrl.popoverContentSize\
  \ = CGSizeMake(250, 300);\n\n    [super viewDidLoad];\n}\n\n- (void)viewDidUnload\n\
  {\n    [super viewDidUnload];\n\n    // 释放主视图的任何保留子视图。\n    // 例如 self.myOutlet\
  \ = nil;\n    [selection release];\n    [popCtrl release];\n}\n\n- (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation\n\
  {\n    // 对于支持的旋转方向返回 YES\n    return YES;\n}\n\n-(IBAction)togglePopOverController\n\
  {\n    if ([popCtrl isPopoverVisible]) {\n        [popCtrl dismissPopoverAnimated:YES];\n\
  \    } else {\n        [popCtrl presentPopoverFromBarButtonItem:bbitem permittedArrowDirections:UIPopoverArrowDirectionAny\
  \ animated:YES];\n    }\n}\n\n@end\n```\n\n现在我们来分析代码清单 6-3 的各部分。首先，你需要使用以下代码合成（synthesize）你的属性：\n\
  \n```objectivec\n@synthesize popCtrl;\n@synthesize selection;\n@synthesize bbitem;\n\
  ```\n\n你还需要确保选择弹出框窗口的视图控制器（本例中为名为 `PopOverSelection` 的视图控制器类，其属性为 `selection`）和\
  \ `UIPopoverController` 类被分配并初始化。这需要在 `viewDidLoad` 事件中完成，如下所示：\n\n```objectivec\n\
  // 实现 viewDidLoad 以在加载视图后执行额外设置，通常来自 nib 文件。\n- (void)viewDidLoad\n{\n    selection\
  \ = [[PopOverSelection alloc] init];\n    popCtrl = [[UIPopoverController alloc]\
  \ initWithContentViewController:selection];\n    popCtrl.popoverContentSize = CGSizeMake(250,\
  \ 300);\n\n    [super viewDidLoad];\n}\n```\n\n首先初始化窗口的视图控制器。然后，使用自定义视图控制器对象（`selection`）初始化\
  \ `UIPopoverController` 类实例，并将默认大小设置为 250 x 300 点。初始化已完成，所以别忘了释放资源；这需要在 `viewDidUnload`\
  \ 方法中完成，做好清理工作：\n\n```objectivec\n[selection release];\n[popCtrl release];\n```\n\
  \n最后，正如人们所说，你触及了核心内容。与按钮点击操作关联的代码根据弹出框的状态切换其显示或隐藏。如果弹出框可见，你只需传递 `dismissPopoverAnimated`\
  \ 消息；如果不可见，则使用 `presentPopoverFromBarButtonItem` 消息，将弹出框以及箭头显示的任何约束传递给按钮。非常简单：\n\
  \n```objectivec\nif ([popCtrl isPopoverVisible]) {\n    [popCtrl dismissPopoverAnimated:YES];\n\
  } else {\n    [popCtrl presentPopoverFromBarButtonItem:bbitem permittedArrowDirections:UIPopoverArrowDirectionAny\
  \ animated:YES];\n}\n```\n\n如果你构建并运行这段代码，主窗口底部会显示工具栏。点击工具栏按钮会显示弹出框，再次点击则会隐藏该弹出框。这个弹出框现在已经可以用于展示你所需的数据。展示效果取决于你使用的视图控制器。在本例中，它使用了一个基于\
  \ `UITableViewController` 的表格视图（这是一个功能丰富的控件）。虽然本书不对此进行详细阐述，但 Apple Developer Program\
  \ 在 iOS 开发者库中的“iOS 表格视图编程指南”中提供了全面的介绍（[`developer.apple.com/library/ios`](http://developer.apple.com/library/ios)）。如果你构建并运行该应用程序，弹出框将如图\
  \ 6-24 所示。\n\n![images](img/0624.jpg)\n\n**图 6-24.** *iPad 模拟器运行应用程序，弹出框可见*\n\n\n\
  \n#### 分割视图控制器\n\n`UISplitView`控制器允许两个窗格：左侧窗格（此处称为**索引**窗格）是固定的，右侧窗格（**详细**窗格）是可调整大小的。在竖屏模式下，只有详细窗格可见，索引窗格被替换为一个工具栏按钮，该按钮以弹出框的形式显示。在横屏模式下，你有更多空间，因此索引窗格和详细窗格会并排显示。你可以在图\
  \ 6-25 中看到它们并排显示。\n\n![images](img/0625.jpg)\n\n**图 6-25.** *管理 iPad 方向的分割视图控制器*\n\
  \n`UISplitViewController`类用于在单个视图控制器中管理两个视图，但它必须是您创建的任何界面的根。Xcode 中有一个基于分割视图的应用程序模板，这是一个很好的起点，我建议您在开始探索时使用它。您可以在图\
  \ 6-26 中看到它在横屏模式下运行，两个窗格清晰可见。\n\n![images](img/0626.jpg)\n\n**图 6-26.** *iPad 分割视图控制器模板*\n\
  \n深入了解默认实现的底层机制，当应用程序启动完成后，您将`rootViewController`分配给您的`UISplitViewController`实例，这与其他任何视图控制器非常相似：\n\
  \n`self.window.rootViewController = self.splitViewController;`\n\n现在，您可以在 Xcode\
  \ 中使用分割视图控制器对象，并在 Interface Builder 中为其分配视图控制器和关联的 NIB 文件，或者您也可以通过编程方式实现。如果您使用 Xcode\
  \ 模板检查分割视图示例，您可以看到 Interface Builder 被用来完成繁重的工作——创建一个作为表格视图控制器（呈现其数据列表）的左窗格，以及一个作为标准视图控制器的详细视图。\n\
  \n如果您要以编程方式实现这一点，您可以简单地创建两个您偏好的视图控制器，并将它们添加到`UISplitViewController`类的`viewControllers`数组属性中；第一个元素是索引，第二个是详细视图。因此，类似于以下的代码应该可以解决问题：\n\
  \n```\n// 根据需要创建您的两个视图控制器，分别为它们命名为 firstVC 和第二 VC。\n// firstVC 和 secondVC 将在此处创建\n\
  \n// 创建您的 SplitViewController 实例\nUISplitViewController* splitVC = [[UISplitViewController\
  \ alloc] init];\n// 将您创建的视图控制器作为两个控制器的数组添加到 viewControllers 属性中。\nsplitVC.viewControllers\
  \ = [NSArray arrayWithObjects:firstVC, secondVC, nil];\n// 添加到 rootViewController\
  \ 并使其可见。\nself.window.rootViewController = splitVC;\n[window makeKeyAndVisible];\n\
  ```\n\n在 Microsoft .NET 中，有多种方法可以实现与分割视图类似但不完全相同的功能，从 .NET 框架早期实现中引入的分割器控件，到最近的`SplitContainer`类（请参见[`http://msdn.microsoft.com/en-you/library/system.windows.forms.splitcontainer.aspx`](http://msdn.microsoft.com/en-you/library/system.windows.forms.splitcontainer.aspx)），在\
  \ WPF 中，其替代品称为`GridSplitter`。\n\niPad 特定的乐趣就到此为止。让我们看看您可以在用户界面中获得的其他乐趣。\n\n## 用户界面控件\n\
  \n您已经详细介绍了视图和视图控制器，但仅触及了可用于构建应用程序用户界面的一些元素。作为 iOS SDK 的一部分提供的 UIKit 框架，为您提供了大量的\
  \ UI 元素供您在设计应用程序时使用。.NET 框架也是如此。您可能熟悉通常被称为**用户界面控件**的那些控件，它们可供您拖放到 Windows 窗体中，或作为其他\
  \ Microsoft 技术（如 ASP.NET 和 Windows Presentation Foundation）的一部分使用。本节介绍 Apple UI\
  \ 元素，并在可用时提及它们对应的 Microsoft 控件。\n\n### 控件\n\n用户可以与之交互或向用户呈现信息的界面元素称为**控件**。与 .NET\
  \ 框架一样，iOS 工具集提供了大量可在您的应用程序中使用的控件。对于每个控件，本节将简要概述其用途，并尽可能简要介绍其最佳使用时机。您还将介绍 .NET 框架中的类似控件。让我们从一些使用频率较低的控件开始，然后是那些具有直接\
  \ .NET 对应物的控件。\n\n#### 活动和进度指示器\n\n这些控件用于向用户指示特定任务正在进展中。它们通过显示旋转齿轮图标或进度条来提供任务正在进行的视觉反馈。\n\
  \n对于活动指示器，您使用`UIActivityIndicatorView`类，并在任务开始时调用`startAnimating`方法，在任务完成时调用`stopAnimating`方法。该控件的外观类似于图\
  \ 6-27 所示。\n\n![images](img/0627.jpg)\n\n**图 6-27.** *活动指示器*\n\niOS 工具集还提供了一个进度指示器，它与\
  \ .NET 中的 Windows Forms `ProgressBar` 类类似。iOS 版本如图 6-28 所示。\n\n![images](img/0628.jpg)\n\
  \n**图 6-28.** *进度条*\n\n它通过`UIProgressView`类实现，正如您所期望的那样，随着进度的推进，进度条会开始填充。此控件通常用于任务有预定范围的情况：例如，下载\
  \ 50 封电子邮件。如果您无法衡量进度，则应改用活动指示器。\n\n#### 日期、时间和通用选择器\n\n日期和时间选择器控件由`UIDatePicker`类实现，通过代表日期或时间每个元素的滑动轮盘，提供了一种触控友好的方式来选择特定的日期和/或时间。您可以在图\
  \ 6-29 所示的控件上看到这一点。\n\n![images](img/0629.jpg)\n\n**图 6-29.** *日期和时间选择器*\n\n当然，您可以提供一个允许用户输入值或从下拉框中选择的控件来呈现日期和时间，这是\
  \ .NET 框架期望您输入日期/时间的方式。然而，在 iPhone 上，为了充分利用基于触摸的界面，这提供了一种更直观的方法。在 iPad 上，此控件通常以弹出框的形式呈现。\n\
  \n尽管 .NET 中的`DateTimePicker`类提供了一个很好的替代方案，但没有行为完全相同的 .NET 等价物；它通常以日历格式呈现日期，显示月份，每个元素作为下拉框和/或直接输入。iOS\
  \ 的`Picker`类使用了类似的方法，但通过一个单选轮盘向用户呈现一个自定义列表，用户可以从中进行选择。\n\n#### 详细信息展开按钮\n\n一个详细信息展开按钮，由`UITableViewCellAccessoryDetailDisclosureButton`实现，允许您在屏幕上指示一个感兴趣的项目。蓝色圆圈中的箭头表示有更多信息可用。点击它时，它会像超链接一样显示附加信息。此控件可能因其在您\
  \ iPhone 或 iPad 的“地图”应用中用作地图标注而为人熟知，如图 6-30 所示。\n\n![images](img/0630.jpg)\n\n**图\
  \ 6-30.** *详细信息展开按钮*\n\n在 .NET 框架中没有等价物，但像往常一样，没有什么能阻止您自己编写一个（尽管这样做并非易事）。\n\n\n\n\
  ### 信息按钮\n\n信息按钮用于提供对应用程序配置屏幕的访问。它通过 `UIButton` 类实现，并使用 `buttonType` 属性将其标记为信息按钮，从而提供如图\
  \ 6–31 所示的正确图像。\n\n![images](img/0631.jpg)\n\n**图 6–31.** *信息按钮*\n\n同样，.NET 框架中没有与之等效的控件，但你可以使用\
  \ `Button` 类和合适的图像实现类似的功能。\n\n### 页面指示器\n\n页面指示器由 `UIPageControl` 类实现，它提供了一种有用的视觉指示，显示在当前可用视图总数范围内哪个视图是打开的，如图\
  \ 6–32 所示。\n\n![images](img/0632.jpg)\n\n**图 6–32.** *页面指示器*\n\n当你打开一个视图时，会添加一个圆点来表示该活动或已显示视图在序列中的位置。当圆点数量达到\
  \ 20 个后，控件会截断多余的圆点，使其不再显示。（我认为，如果你需要显示这么多圆点，那就应该重新考虑你的用户界面设计了。）\n\n.NET 中没有与此等效的控件。\n\
  \n### 搜索栏\n\n搜索栏控件通过 `UISearchBar` 类实现，允许用户输入文本字符串，并通过点击放大镜图标来执行搜索。它还允许你使用书签图标呈现常用信息。请参见图\
  \ 6–33。\n\n![images](img/0633.jpg)\n\n**图 6–33.** *搜索栏控件*\n\n.NET 中没有直接等效的控件。\n\n\
  ### 开关\n\n开关控件通过 `UISwitch` 类实现，允许用户在互斥的选项（如开或关）之间进行选择。请参见图 6–34。\n\n![images](img/0634.jpg)\n\
  \n**图 6–34.** *开关控件*\n\n.NET 中没有等效的控件，至少在视觉和感觉上是如此，尽管复选框执行相同的功能：它可以被选中（开）或取消选中（关）。\n\
  \n### 分段控件\n\n分段控件通过 `UISegmentedControl` 类实现，提供了一种显示一组分段的方法，每个分段的行为都像一个按钮，并且可以显示对应的视图。示例如图\
  \ 6–35 所示。\n\n![images](img/0635.jpg)\n\n**图 6–35.** *分段控件*\n\n分段控件提供了一种便捷的方式来分组相关按钮，并且每个按钮的表面可以显示文本或图像。这些按钮是互斥的，并且你可以拥有任意数量的分段，这使其与开关控件有所区别。\n\
  \n同样，.NET 中没有等效的控件，尽管在 .NET 中使用互斥的单选按钮提供了类似的功能。\n\n### 常用控件\n\niOS UIKit 框架中有许多常用控件，它们都有直接的\
  \ .NET 等效控件。它们的用法和行为与 .NET 对应控件几乎相同，因此为简洁起见，此处不作详细描述。这些控件如表 6-2 所示。\n\n![images](img/t0602.jpg)\n\
  \n让我们看看 UIKit 中包含的其他用户界面元素。别忘了，你可以使用 Apple 开发者资源来探索 SDK 中 UIKit 框架里丰富的用户界面控件；并且，正如你从本节的示例中所见，将它们与\
  \ .NET 控件进行关联（如果存在关联）是相当直接的。\n\n## 导航栏和信息栏\n\n有一些用户界面元素通常不用于定义你的应用程序，而是用于向用户提供信息或管理你在应用程序中的导航方式。这些元素被称为*栏*，包括状态栏、工具栏、导航栏和标签栏——后者你在本章前面已经见过。\n\
  \n### 状态栏\n\n状态栏用于向用户显示重要信息，并且无论设备方向如何，它始终出现在设备屏幕的顶部边缘。此外，虽然在 iPhone 上你可以对状态栏的颜色进行一些控制，但在\
  \ iPad 上其颜色固定为黑色。你可以在图 6–36 中看到 iPhone 的状态栏。\n\n![images](img/0636.jpg)\n\n**图 6–36.**\
  \ *状态栏*\n\n你可以通过为 `UIApplication` 设置 `UIStatusBarStyle` 或使用 `Info.plist` 的值（`UIStatusBarHidden`）来隐藏状态栏，从而实现状态栏。Apple\
  \ 开发者使用指南非常具体：如果你的应用程序是游戏或全屏应用，那么状态栏通常可以隐藏；否则，建议将其显示出来，特别是考虑到它占用的空间很小。\n\n.NET 框架中的\
  \ `StatusBar` 类提供了类似的功能。\n\n### 工具栏\n\n工具栏由 `UIToolbar` 类实现，在大多数图形用户界面中都被广泛理解，其在\
  \ iOS 设备上的行为也不例外。它用于提供图形图像，点击这些图像时可在应用程序中执行操作。为了便于使用，通常会将常用操作放置在工具栏上。你可以在图 6–37\
  \ 中看到一个工具栏。\n\n![images](img/0637.jpg)\n\n**图 6–37.** *工具栏*\n\n对于 iPhone 应用程序，工具栏位于屏幕底部边缘；对于\
  \ iPad 应用程序，则根据方向以及控件吸附到的边缘，工具栏位于屏幕的顶部或底部边缘。工具栏上的项目是上下文相关的，这意味着它们反映了通常针对关联视图执行的操作，因此在不同视图之间可能会发生变化。\n\
  \n.NET 框架中的 `Toolbar` 类提供了等效的功能。\n\n### 导航栏\n\n导航栏由 `UINavigationBar` 类实现，用于管理视图层次结构中的导航，并且通常与导航控制器关联。如图\
  \ 6–38 所示。\n\n![images](img/0638.jpg)\n\n**图 6–38.** *导航栏*\n\n当你在 iOS 应用程序中处理不同的视图，或者标签栏不适用时，导航栏是很常见的。然而，尽管它们的用法相对简单，但这超出了本章的范围，iOS\
  \ 开发者网站对此有很好的描述。因此，导航栏及其关联控制器的实现就留给你自己，并辅以 iOS 开发者网站：[`http://developer.apple.com/library/ios/#featuredarticles/ViewControllerPGforiPhoneOS/NavigationControllers/`](http://developer.apple.com/library/ios/#featuredarticles/ViewControllerPGforiPhoneOS/NavigationControllers/)。\n\
  \n.NET 框架中没有与导航栏等效的控件。\n\n## 内容视图\n\niOS SDK 提供了许多用户界面元素，旨在向用户展示来自你应用程序的自定义内容。你已经看到了两种\
  \ iPad 特有的视图：分割视图和弹出视图，但 iPhone 上也有许多此类元素。\n\n我们将逐一介绍它们；它们在 iPhone 应用程序中很常用，因为它们提供了有用的功能。\n\
  \n\n\n### 表格视图\n\n表格视图元素通过 `UITableView` 类实现，顾名思义，用于以表格格式（行和列的信息）呈现数据。示例如 图 6-39\
  \ 所示。\n\n![images](img/0639.jpg)\n\n**图 6-39.** *表格视图*\n\n表格视图控件具有高度可配置性，并在许多 iPhone\
  \ 应用程序中广泛使用。例如，通讯录列表就是一个表格视图的实现，同样还有在选择设备国际设置时的语言选择屏幕。这些多样化的示例展示了该控件的灵活性。请记住表格视图，因为你将用它来显示你的《月球着陆器》游戏的高分表。\n\
  \n`DataView` 控件在绑定到数据源时，在 .NET 框架中提供了类似的功能。在 Windows Presentation Foundation 中，`DataView`\
  \ 控件已被表格视图功能取代，该功能提供了与 iOS 表格视图元素类似的功能。\n\n### 文本视图\n\n文本视图控件通过 `UITextView` 类实现，用于在你的应用程序中呈现并允许输入多行文本。示例如\
  \ 图 6-40 所示。\n\n![images](img/0640.jpg)\n\n**图 6-40.** *文本视图*\n\n在 .NET 框架中的等效控件是\
  \ `TextBox`。\n\n### 网页视图\n\n网页视图控件通过 `UIWebView` 类实现，允许你的应用程序显示丰富的 HTML 内容。不建议你创建一个行为类似于网页的\
  \ iOS 应用程序——那是 Safari 浏览器的用途——但如果需要在 iOS 应用程序中包装任何类型的网页，这就是要使用的控件。加载 [`www.bbc.co.uk`](http://www.bbc.co.uk)\
  \ 主页的示例如 图 6-41 所示。\n\n这个示例可以很容易地通过在 Xcode 4 中使用基于视图的模板，并添加一个网页视图控件及其关联属性来创建。然后，你只需将\
  \ 代码清单 6-4 中的代码片段添加到加载主页的视图的 `viewDidLoad` 事件中，该事件使用 `loadRequest` WebView 消息。如你所见，网页视图控件充当了现有网页内容的包装器，在本例中是\
  \ BBC 的主页。\n\n![images](img/0641.jpg)\n\n**图 6-41.** *显示 BBC 主页的网页视图示例*\n\n**代码清单\
  \ 6-4.** *网页视图示例*\n\n```\n// 在 WebView 中加载 WWW.BBC.CO.UK 主页\nNSString *urlString\
  \ = @\"http://www.bbc.co.uk\";\n[wvBrowser loadRequest:[NSURLRequest requestWithURL:[NSURL\
  \ URLWithString:urlString]]];\n```\n\n在 .NET 框架中的等效控件是 `WebBrowser` 类，使用 `Navigate()`\
  \ 方法作为等效的 `loadRequest` 消息。\n\n### 其他元素\n\n尽管前几页介绍了相当多的 UI 元素，但仍有更多元素等待你去发现。然而，我不想忽略其他一些有用的\
  \ UI 元素，特别是警告框和操作表。\n\n#### 警告框\n\n警告框旨在为你的应用程序用户提供重要信息。调用时，警告框会在现有视图上弹出一个弹出窗口，只有关闭它才能继续使用你的应用程序。\n\
  \n在 .NET 中，它非常类似于 `MessageBox`，通过同名方法调用。在 iOS 中，你使用 `UIAlertView` 类来实现警告框，并显示简短的警告文本以及一两个按钮。\n\
  \n警告框通常用于通知用户发生了某些重要事件，这些事件可能与他们的近期操作无关。例如，如果你在应用程序中启动了一个后台任务然后去做别的事情，你可以使用警告框来通知任务完成。示例如\
  \ 图 6-42 所示。\n\n![images](img/0642.jpg)\n\n**图 6-42.** *警告框视图示例*\n\n你可以使用 代码清单 6-5\
  \ 中的代码片段轻松创建这个警告框视图示例。这些参数的含义不言自明。\n\n**代码清单 6-5.** *警告框视图示例*\n\n```\nUIAlertView\
  \ *alert = [[ UIAlertView alloc]\n                      initWithTitle: @\"重要事实\"\
  \n                      message: @\"发生了重要的事情\"\n                      delegate:\
  \ nil\n                      cancelButtonTitle :@\"确定\"\n                      otherButtonTitles:\
  \ nil];\n[alert show];\n[alert release];\n```\n\n#### 操作表\n\n这里介绍的最后一个 UI 元素是操作表，通过\
  \ `UIActionSheet` 类实现，提供了一种根据特定用户操作呈现一组选项的机制。例如，Safari 浏览器提供一个操作按钮，选择后会根据当前显示的网页呈现多个选项——例如，你可以将其添加为书签、设为主屏幕等。这个包含多个选项的窗口称为*操作表*，如\
  \ 图 6-43 所示。\n\n![images](img/0643.jpg)\n\n**图 6-43.** *操作表示例*\n\n在 iPhone 上，操作表从屏幕底部出现，而在\
  \ iPad 上则显示为弹出窗口。在 .NET 中没有直接等效的控件，尽管你可以认为 `ContextMenu` 提供了类似的功能。\n\n## Apple 的用户界面资源\n\
  \nApple 提供了许多资源，这些资源在设计自己的用户界面时是必读的。以下列出其中一些：\n\n*   *iOS 人机界面指南：* 提供设计卓越用户体验的指南和原则。\
  \ [`http://developer.apple.com/library/ios/#documentation/userexperience/conceptual/mobilehig/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#documentation/userexperience/conceptual/mobilehig/Introduction/Introduction.html)\n\
  *   *iOS 视图控制器编程指南：* 提供有关构建和管理应用程序用户界面的指导。 `http://developer.apple.com/library/ios/#featuredarticles/ViewControllerPGforiPhoneOS/Introduction/Introduction.html`\n\
  *   *iOS 视图编程指南：* 提供有关呈现和动画化用户界面的指导。 [`http://developer.apple.com/library/ios/#documentation/WindowsViews/Conceptual/ViewPG_iPhoneOS/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#documentation/WindowsViews/Conceptual/ViewPG_iPhoneOS/Introduction/Introduction.html)\n\
  *   *iOS 绘图和打印指南：* 提供有关绘制自定义内容和打印信息的指导。 [`http://developer.apple.com/library/ios/#documentation/iPhone/Conceptual/iPhoneOSProgrammingGuide/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#documentation/iPhone/Conceptual/iPhoneOSProgrammingGuide/Introduction/Introduction.html)\n\
  \n\n好的，这是根据您的指示翻译的中文版本：\n\n\n## 总结\n\n本章首先从用户界面的角度审视了不同的设备类型及其功能。在设计用户界面时，您应始终清楚目标应用程序所面向的设备。\n\
  \n接着，您研究了不同的应用程序类型，特别是视图控制器和视图的可能组合。我们已经通过 Lunar Lander 示例查看了如何呈现单个视图，包括一个基于模态的视图，但还有许多其他选项可供选择。由于单个章节无法涵盖所有选项，因此我们查看了一个标签栏示例（这可能适用于您的游戏），然后是其他几种视图控制器类型。\n\
  \n在了解了不同的视图控制器以及管理不同视图呈现的机制后，我们审视了可用于设计实际视图的用户界面元素。在 Lunar Lander 游戏中，您需要实时绘制大量图形。但如果您曾使用\
  \ Windows Forms 甚至 ASP.NET 开发过 .NET 应用程序，那么使用 UI 控件设计用户界面的方式您应该不会陌生——而且其中一些 iOS\
  \ 控件对您来说应该也很熟悉。本章提供了一些关于如何使用一些稍微特殊的控件的示例。\n\n现在，您应该已经掌握了足够的知识来驾驭视图控制器、视图和用户界面控件，并将您的\
  \ .NET 知识映射到 iOS 对应的部分。本章多次强调了在构建 iOS 移动设备应用程序时用户体验的重要性，而且毫不意外的是，Apple 提供了大量资源，您可以利用这些资源来巩固目前已建立的知识体系，帮助理解本章中的示例，并为您的自主探索提供参考。祝您愉快！\n\
  \n"
- "# 第 7 章：获取数据：存储和检索数据以及配置您的应用程序\n\n到目前为止，我们已经涵盖了许多主题，所有这些主题都旨在介绍如何使用 iOS SDK 以及支持的语言和工具，创建在基于\
  \ iOS 的移动设备上运行的应用程序。然而，虽然我们已经逐步演示了如何构建一个应用程序，但有一个关键部分始终缺失：应用程序保持所谓*状态*的能力。\n\n状态可以被视为相当于人类的记忆。如果我们没有记忆，那么完成最简单的任务也需要我们每次都重新发现如何去做。因为我们确实拥有记忆，并且能够记住如何执行特定操作，所以再次执行它会更容易、更快捷，甚至可以说更有趣——滑雪就是一个很好的例子。\n\
  \n计算机拥有易失性存储器（RAM）形式的记忆，当您关闭计算机时，其中的内容就会丢失，移动设备也不例外。但是，如果您希望在应用程序实例之间持久化状态——也就是说，希望应用程序记住它上次运行到哪里——您需要将状态存储在其他地方，例如硬盘上。\n\
  \n在本章中，我们将探讨如何将信息作为数据存储在您的移动设备或其他来源上，以及如何使用这些数据来配置您的应用程序。具体来说，我们将研究以下内容：\n\n-  \
  \ 数据存储方案的概述\n-   关于如何存储信息的指导\n-   关于如何检索信息的指导\n-   如何在应用程序实例之间使用数据来配置应用程序\n\n##\
  \ 我们有哪些数据存储方案？\n\n您可能希望存储各种类型的数据，例如应用程序用户输入的动态数据，或者用户无法影响但可能希望在配置上有一定灵活性的参数化数据（有点像\
  \ Microsoft Windows 中的注册表）。以下方案可用于存储数据：\n\n-   文件系统存储\n-   属性列表\n-   网络存储\n-   数据库存储\n\
  \n让我们依次看看这些方案。\n\n### 使用沙盒提供基于文件系统的存储\n\n在第 4 章中，我们提到了应用程序沙盒的概念。回想一下，它的主要目的之一是为您的应用程序和设备提供安全机制。让我们简要地重新审视一下沙盒，重点关注它如何帮助您存储数据。\n\
  \n当您的应用程序安装在移动设备上时，默认情况下，它会创建一些文件夹，这些文件夹对其使用方式有约束。Apple 开发者文档对这些文件夹提供了一些指导，在您开始使用任何这些文件夹之前，了解这些指导非常重要。这些文件夹、它们的主要用途以及相关说明列于表\
  \ 7-1 中。\n\n![图片](img/t0701.jpg)\n![图片](img/t0701a.jpg)\n\n即使在使用模拟器时，您也可以看到这些文件夹。使用\
  \ Finder，您可以导航到模拟器上存在的此文件夹，方法是转到 `\\Library\\Application Support\\iPhone Simulator\\\
  4.3.2`（或您正在使用的模拟器版本），然后查看 `Applications` 文件夹。您会看到我们第 4 章中提到的带有应用程序 ID 的文件夹，其结构如表\
  \ 7-1 所示。\n\n**注意：** 文件夹名称可能会根据您的应用程序指定使用的内容而改变。此外，不同的 SDK 会有自己的文件夹根目录。\n\n您可以使用表\
  \ 7-1 中列出的文件夹来存储应用程序的持久数据（或状态），尽管您需要考虑到所强调的那些约束。由于它是文件系统，您需要将数据存储在一个或多个文件中，并且您的应用程序必须能够解释这些文件。\n\
  \n尽管添加一个简单的文件作为数据存储似乎是最简单的方法，但从文件中存储和检索所需数据的工作实际上可能会使应用程序的数据处理代码比需要的更复杂。因此，在决定为所有应用程序的数据存储需求使用简单文件之前，值得先检查一下其他方案。例如，如果您对数据存储和检索的需求不那么简单，并且需要多个文件，那么您可能需要研究使用本章后面讨论的嵌入式数据库方法。\n\
  \n\n\n## 管理应用程序中的数据\n\n首要难题是，你需要在应用程序自身内部存储数据。虽然可以使用大量独立变量，但这并不优雅，并且在读写存储数据时会导致代码非常混乱。幸运的是，iOS\
  \ SDK 与 .NET Framework 类似，提供了简化此任务的机制。毕竟，在应用程序中处理数据是常见需求，因此大多数现代编程语言和框架都对其提供了支持。有几种机制可用于在应用程序内部存储数据。\n\
  \n第 4 章介绍了序列化和反序列化的概念。iOS SDK（以及 .NET Framework）提供了对象可序列化的能力。这意味着对象的结构及其内部持有的数据或状态信息，可以被持久化（或写入）到存储介质中，这种存储介质能在应用程序终止和移动设备关机后依然存在。当应用程序重新启动时，你可以从该存储介质中将数据反序列化回对象实例，该实例将拥有与序列化时完全相同的结构和数据，从而实现了状态的持久化。\n\
  \n在 Objective-C 中，可以序列化任何对象，将其转换为一系列可以写入存储的字节。然而，Objective-C 还提供了所谓的*集合类*，这些类允许你存储多个对象，然后序列化整个集合——这样做也能序列化集合中的所有数据。\n\
  \n在 .NET 中，具体来说在 C# 中，你可以将对象标记为 `[serializable]`，这意味着它可以在 .NET 中被转换为二进制、简单对象访问协议\
  \ (SOAP) 或 XML。.NET Framework 将数据的表示与其传输机制分开，例如通过在 .NET 中为你的类添加 `[serializable()]`\
  \ 属性，并确保你的类派生自 `ISerializable` 类。然后，你可以使用适当的方法将类写入目标位置。这可能是一个使用 `System.IO` 命名空间的文件，或者你可能使用\
  \ `System.Runtime.Serialization.Formatters.Binary` 等格式化器写入二进制流。\n\nObjective-C 中默认的可序列化对象如表\
  \ 7-2 所示，并附有注释。\n\n![images](img/t0701aa.jpg)\n\n为了使其更具体，让我们看一个实际示例，该示例允许我们使用这些类型之一来创建一个用于保存数据的值数组，然后我们将此数组序列化为属性列表。\n\
  \n首先，让我们使用 `NSMutableMutable` 类设置一个动态数组：\n\n```\nNSMutableArray *highscores = [[NSMutableArray\
  \ alloc] init];\n// 最高分 1\n[highscores addObject:@\"Mark\"];\n[highscores addObject:@\"\
  200\"];\n// 最高分 2\n[highscores addObject:@\"Rachel\"];\n[highscores addObject:@\"\
  300\"];\n// .. 可以继续添加其他数据\n```\n\n至此，我们可以将其写入到我们选择的持久化存储中（正如我们接下来要做的），然后使用以下命令释放该数组：\n\
  \n```\n  [highscores release];\n```\n\n## 使用属性列表作为存储\n\n在本书前面部分，我们提到了 iOS 中的属性列表，以及它们在文件系统中以\
  \ `.plist` 扩展名文件的形式存在，称为 *plist 文件*。属性列表提供了一种持久化应用程序数据的方法。在 Objective-C 中，`NSArray`\
  \ 和 `NSDictionary` 集合类提供了一种将内容序列化为 plist 文件的方法。这些集合类还提供了一种简单的机制来从 plist 文件中存储和检索值。\n\
  \n使用我们刚刚设置的 `NSMutableArray`（实际上，任何可序列化的集合都可以），我们可以使用 `writeToFile` 方法将此字符串序列化为\
  \ plist 文件，以便后续读取和解释。只需使用文件的目标路径执行该方法，如下例所示：\n\n```\n[myArray writeToFile:@”/some/file/location/output.plist”\
  \ atomically:YES];\n```\n\n如果你在应用程序中执行包含这段代码的片段，然后检查生成的文件，你会发现它看起来像这样：\n\n```\n\
  <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist PUBLIC \"-//Apple//DTD\
  \ PLIST 1.0//EN\" \"httpfhighscor://www.apple.com/DTDs/PropertyList-1.0.dtd\">\n\
  <plist version=\"1.0\">\n<array>\n        <string>Mark</string>\n        <string>200</string>\n\
  \        <string>Rachel</string>\n        <string>300</string>\n</array>\n</plist>\n\
  ```\n\n请注意，它是作为 XML 文件序列化的，符合属性列表模式，并使用字符串。\n\n然后，可以使用 `initWithContentsOfFile`\
  \ 方法将此文件读取回数组以供操作或使用。以下代码将我们刚刚创建的文件反序列化为一个包含相同值的新 `NSMutableArray`：\n\n```\nNSMutableArray\
  \ *highscores = [[NSMutableArray alloc] initWithContentsOfFile: @\"/some/file/location/output.plist\"\
  ];\n```\n\n## 使用互联网存储数据\n\n对于持久化数据，我们已经研究了属性列表以及使用部分可序列化 Objective-C 类型所提供的方法。但是，如果你想以某种形式使用互联网来序列化数据，该怎么办？如果你想将这些信息存储在某种中心位置，而不是本地设备上，又该怎么办？\n\
  \n第一个也是最明显的解决方案仍然是使用属性列表方法，只是文件的路径是一个位于某种内部存储（比如众多数字存储平台之一，如 Dropbox 和 DigitalVault）上文件的完整\
  \ URL。\n\n但还有另一种替代方案。`NSMutableArray` 等可序列化集合有一个名为 `writeToURL` 的方法，该方法不接收 `NSString`\
  \ 参数，而是接收 `NSUrl` 参数。然而，如果写入文件时你的参数是 `file://` 引用，那么这些方法的行为实际上没有区别。因此，下面的代码：\n\n\
  ```\n[myArray writeToURL: @\"file://www.mamone.org/highscore.plist\" atomically:YES];\n\
  ```\n\n与下面的代码完全相同：\n\n```\nNSURL *url = [NSURL URLWithString:@\"http://www.mamone.org/highscore.plist\"\
  ];\n[myArray writeToURL:url atomically:YES];\n```\n\n\n\n### 使用 iOS 嵌入式数据库\n\n我们之前的示例虽然完全适用，但仅限于使用可序列化为本地或网络文件系统的对象来创建数据。您可能希望采用更全面的机制来持久化数据，特别是当您希望操作数据而无需在代码中进行复杂的文件或对象操作时——使用简单的基于文件系统的存储机制来存储数据会带来这种副作用。在这种情况下，您可以使用\
  \ iPhone 的嵌入式数据库，名为 `SQLite`。\n\n`SQLite` 是一个嵌入式关系型数据库管理系统（RDBMS），在许多方面与您可能熟悉的更传统的基于服务器的数据库（如\
  \ Oracle 和 Microsoft SQL Server）相似，您都可以使用结构化查询语言（SQL）来访问和操作数据库中保存的数据。但是，它不需要您运行任何应用程序。您只需在应用程序中使用提供的\
  \ API 代码来调用作为 iOS 一部分提供的 `SQLite` 功能。\n\n让我们看看如何在移动 iOS 设备上使用 `SQLite` 功能来访问数据库功能。\n\
  \n**注意：** 如果您不熟悉 SQL 语言，有很多关于此主题的资源可供参考。例如，请参阅 *Beginning SQL Server 2008 for Developers*\
  \ 以及 Apress 出版的其他书籍。\n\n在开始之前，您需要通过对支持库代码的库进行引用来为应用程序添加对 `SQLite` 的支持，然后包含相关的头文件。因此，首先使用项目摘要的\
  \ Build Phases 标签页，选择“+”按钮，将名为 `libsqlite3.dylib` 的库添加到项目中。对话框应该类似于图 7-1 所示。\n\n\
  ![images](img/0701.jpg)\n\n**图 7-1.** *将 SQLite 库添加到项目的构建阶段*\n\n然后，您需要在包含 SQLite\
  \ 代码的源代码文件中通过下面的 `#import` 指令来包含对支持头文件的引用：\n\n`#import \"/usr/include/sqlite3.h\"\
  `\n\n#### iOS SDK 有哪些选项？\n\n使用 SQLite API 并不是访问 iOS 设备数据库的唯一选择。`Core Data` 是一个框架，它被描述为“模式驱动的对象图管理和持久化框架”，这可能会让人感到困惑。这实际上意味着\
  \ `Core Data` API 不仅管理数据的存储位置、存储方式以及如何为性能目的管理这些数据，还允许开发者在无需 SQL 的条件下创建和使用关系型数据库。它允许您用\
  \ Objective-C 与 `SQLite` 进行交互，而无需担心连接或管理数据库模式。对于 ADO.NET 开发者来说，这些特性中的大部分类似于抽象了数据库访问的\
  \ .NET Framework。\n\n但是，我们不会在本章同时涵盖 `SQLite` 和 `Core Data`。我的目标是通一个使用 SQLite API\
  \ 的工作示例，带您了解其原理。这将为您应用这些知识打下良好的基础，无论您选择哪种方法：`SQLite` 还是 `Core Data`。\n\n我建议您利用在线资源探索\
  \ `Core Data`，特别是位于 [`http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/CoreData/cdProgrammingGuide.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/CoreData/cdProgrammingGuide.html)\
  \ 的 *Core Data 编程指南*。\n\n#### 创建或打开您的数据库\n\n`SQLite` 是用可移植的 C 语言编写的，而不是 Objective-C。因此，我们需要用\
  \ C 语言编写代码，并在必要时进行类型之间的转换。\n\n让我们首先使用 `sqlite_open()` 方法打开数据库，并使用提供的常量来检查成功（`SQLITE_OK`），如果失败则记录错误。以下代码实现了这一点：\n\
  \n```\n    sqlite3 *db;\n    int result = sqlite3_open(\"/documents/file\", &db);\n\
      if (result == SQLITE_OK)\n    {\n\n    } else NSLog(@\"Failed to open database\"\
  );\n```\n\n在这个例子中，如果数据库存在，它将被打开；如果不存在，它将被创建。\n\n**注意：** `sqlite_open()` 方法需要一个 UTF-*\
  \ 字符串作为参数——即一个 8 位编码的字符串。这与 `NSString` 不同，但您可以使用 `UTF8String` 方法将 `NSString` 转换为\
  \ UTF-8 字符串。\n\n请注意，在尝试打开数据库时（尤其是当它不位于您本地机器上时），您几乎肯定会遇到数据库连接超时的问题。这通常是由于访问非本地资源时的延迟（或时延）造成的，尤其是在通过互联网连接时。因此，您应该始终拦截所有错误消息并适当处理它们。例如，如果请求超时，您可能需要重试。\n\
  \n#### 在数据库中创建表\n\n打开数据库并准备好使用后，下一步是创建一个表来存储数据。SQL 命令 `CREATE TABLE` 可以与可选条件一起使用，仅在表不存在时创建它。以下代码执行\
  \ `CREATE TABLE` 命令，并创建一个名为 `NAME` 和 `SCORE` 的两列的表，两者的类型都是 `text`。\n\n```\n       char\
  \ *errMsg;\n       const char *sql = \"CREATE TABLE IF NOT EXISTS HIGHSCORE (NAME\
  \ TEXT, SCORE TEXT)\";\n       if (sqlite3_exec(db, sql, NULL, NULL, &errMsg) ==\
  \ SQLITE_OK)\n       {\n         // code to write here\n       } else NSLog(@\"\
  Failed to create table\");\n```\n\n现在表将被创建（如果它之前不存在的话），我们就可以开始用数组中的数据来填充它了。\n\n\n\
  \n## 向数据库写入数据\n\n向数据库写入数据时，你有两种选择：\n\n- 通过字符串构造一条 `INSERT` SQL 语句，并遍历你创建的数组。\n-\
  \ 将变量绑定到 SQL 语句，该语句中的每个参数都用 `?` 符号代替。这种方法还有一个额外优势，即能确保你插入的数据与表中预期的数据格式相匹配。\n\n因此，首先我们需要遍历数组，提取其中存储的值。在我们的示例中，只需使用循环和一个从\
  \ 0（第一个元素）开始的整数索引，在索引小于数组总项数（由 `count` 属性决定）时持续进行即可。\n\n```\nint count = [highscore\
  \ count];\nint idx = 0;\nwhile (idx < count)\n{\n        // 遍历数组，递增 idx\n}\n```\n\
  \n通过扩展这段代码来循环遍历数组、访问其元素，并利用 SQL 绑定功能将 `?` 参数指示符替换为数组中的值，然后完成语句，即可将行写入数据库。以下是扩展后的代码：\n\
  \n```\nsqlite3 *db;\nint result = sqlite3_open(\"/documents/file\", &db);\nif (result\
  \ == SQLITE_OK)\n{\n    int count=[highscore count];\n    int idx = 0;\n    char\
  \ *insert_sql = \"INSERT INTO HIGHSCORE VALUES(?, ?);\";\n    sqlite3_stmt *stmt;\n\
  \    while (idx < count)\n    {\n        // 准备语句以便绑定\n        if (sqlite3_prepare_v2(db,\
  \ insert_sql, -1, &stmt, nil) == SQLITE_OK) {\n            // 绑定姓名\n           \
  \ sqlite3_bind_text(stmt, 1, [[highscore objectAtIndex: idx++] UTF8String],\n-1,\
  \ NULL);   // 姓名\n            // 绑定分数\n            sqlite3_bind_text(stmt, 2, [[highscore\
  \ objectAtIndex: idx++] UTF8String],\n-1, NULL);   // 分数\n            // 执行并完成写入\n\
  \            sqlite3_step(stmt);\n            sqlite3_finalize(stmt);\n        }\n\
  \    }\n} else NSLog(@\"打开数据库失败\");\n```\n\n在这个示例中，我们使用 `sqlite3_prepare()` 语句准备了带参数的\
  \ SQL 语句。然后在循环内部，使用 `sqlite3_bind_text()` 方法绑定变量的值——在这里，就是将数组索引绑定到 SQL 语句中由其索引位置（从\
  \ 0 开始）引用的参数上。\n\n每完成一对数组条目的绑定后，我们通过执行语句完成写入，将行写入数据库。我们继续循环，直到处理完所有数组条目。\n\n## 从数据库读取数据\n\
  \n为了检查我们的代码是否正常工作，现在可以使用一条简单的 SQL `SELECT` 语句来回读我们刚刚写入数据库的行。为简单起见，我们将使用 `NSLog()`\
  \ 方法将数据写入 Xcode 中的调试输出视图。\n\n与上一个示例类似，我们需要准备一条 SQL 语句并执行它，使用 `sqlite3_step()` 方法遍历所有行，直到没有更多数据，并使用\
  \ `NSLog()` 方法输出每一行的数据。具体如下例所示：\n\n```\n// 从表中读取数据\nsqlite3_stmt *readstmt;\nconst\
  \ char *readSQL = \"SELECT NAME, SCORE FROM HIGHSCORE\";\nsqlite3_prepare_v2(db,\
  \ readSQL, -1, &readstmt, NULL);\nwhile (sqlite3_step(readstmt) == SQLITE_ROW)\n\
  {\n        NSString *name = [[NSString alloc] initWithUTF8String:(const char\n*)sqlite3_column_text(readstmt,0)];\n\
  \        NSString *score = [[NSString alloc] initWithUTF8String:(const char\n*)sqlite3_column_text(readstmt,1)];\n\
  \        NSLog (@\"姓名: %@ 分数: %@\", name, score );\n}\n```\n\n如果你执行完整的代码并在 Xcode\
  \ 应用程序的调试窗口中检查输出，它应该类似于以下内容（排除与运行应用程序相关的所有其他调试输出）：\n\n```\n2011-08-15 22:19:05.251\
  \ DataStorage[953:207] 姓名: Mark 分数: 200\n2011-08-15 22:19:05.253 DataStorage[953:207]\
  \ 姓名: Rachel 分数: 300\n```\n\n这个示例应该让你对如何使用嵌入式数据库有了更深入的了解，这是一种将数据持久化到表示为本地文件的数据库中的更全面的方法。\n\
  \n### 连接到其他数据库\n\n我们已经探索了 iOS 中嵌入式数据库 SQLite 的使用，但如果你有另一个不同的数据库并且它位于远程呢？例如，如果你想从你的设备访问远程的\
  \ MySQL 或 Microsoft SQL Server 数据库，该怎么办？你有以下几种选择：\n\n- 你可以为你的数据库使用第三方客户端。例如，Flipper（可在\
  \ [`http://www.driventree.com/flipper`](http://www.driventree.com/flipper) 找到）是一个适用于\
  \ iPhone 的 MySQL 客户端，允许你连接到 MySQL 数据库。\n- 如果你有 Microsoft SQL Server 数据库，你可能想通过使用与数据库无关的\
  \ API（例如开放数据库连接（ODBC）驱动程序）来访问它。\n- 你可以通过寻找类似的本地客户端 API 来访问数据库，或者从 SQL Server 暴露一个服务层，并通过基于\
  \ HTTP 的 XML 风格 API（如 SOAP）进行访问。\n\n## 创建高分示例\n\n到目前为止，我们已经研究了使用多种不同技术来持久化应用程序数据的方法。现在让我们探索如何在我们示例应用程序（即从\
  \ `第 5 章` 开始的《月球着陆器》游戏）中应用这些知识。像我们这样的游戏中一个突出的需求是，需要将分数持久化到高分表中，为玩家提供另一个竞争维度。因此，我们将运用数据持久化知识，创建一个内部的高分结构，该结构可在开始屏幕上显示，并在应用实例之间保持持久性。\n\
  \n\n\n### 创建持久化高分记录类\n\n我们的高分功能相当直接了当。它将保存五条记录，每条记录包含获得高分者的姓名和对应的分数。我们可以像之前的示例那样，使用标准的\
  \ Objective-C 对象类型（例如 `NSString`）。这样做的好处是能够写入 plist 文件，但会增加解析文件的复杂性。因此，我们将使用一个继承自\
  \ `NSObject` 的自定义对象来存储实际的高分记录。\n\n为了以 Objective-C 为基础进行构建，让我们创建一个包含单个高分记录的类，并通过属性来引用其值。随后，这个类将被包含在一个\
  \ `NSMutableArray` 中，我们将利用该数组通过 SQL Server 将本地高分数据写入本地设备。然而，当尝试将该对象序列化为 plist 文件时，这会产生一个问题，因为\
  \ `writeToFile` 方法不支持序列化自定义对象。在本示例中，我们将探讨如何解决此问题。\n\n首先，让我们创建一个名为 `HighScoreEntry`\
  \ 的高分记录类。代码清单 7-1 显示了头文件的代码。\n\n**代码清单 7-1.** *HighScoreEntry 类头文件*\n\n```\n// HighScoreEntry\
  \ class\n//\n@interface HighScoreEntry : NSObject {\n    NSString * name;\n    int\
  \ score;\n}\n-(id)initWithParameters:(NSString*)aName:(int)Score;\n@property (readwrite,\
  \ retain) NSString* name;\n@property (readwrite) int score;\n\n@end\n```\n\n**注意：**\
  \ 请记住，属性的 `readwrite` 属性意味着您既能访问该属性的值，也能设置该属性的值。此外，`retain` 确保了强引用的创建，这意味着作为资源，它在您明确释放之前不会被释放。\n\
  \n这段代码非常直接，根据我们已讲解过的材料，它应该是熟悉的。该代码只是实现了一个包含字符串和整数的类，类成员名称分别为 `name` 和 `score`。我们拥有两个同名的属性来引用这些类成员变量，并且实现了一个初始化方法，该方法接受两个参数（类型分别为\
  \ `NSString` 和 `int`），用于初始化该类。代码清单 7-2 显示了其实现的源代码。\n\n**代码清单 7–2.** *HighScoreEntry\
  \ 类实现*\n\n```\n// HighScoreEntry class\n//\n@implementation HighScoreEntry\n\n-(id)initWithParameters:(NSString*)aName:(int)aScore\n\
  {\n    self = [super init];\n    if (self)\n    {\n        name = [aName copy];\n\
  \        score = aScore;\n    }\n    return self;\n}\n\n@synthesize name;\n@synthesize\
  \ score;\n\n@end\n```\n\n同样，这段代码非常直接。我们的实现提供了 `initWithParameters` 方法，用于使用传入的值初始化类成员变量，当然，我们还合成了这两个属性。\n\
  \n现在，让我们来看看实际的集合类。我们将其称为 `HighScore` 类。同样，我们从头文件的源代码开始，如代码清单 7-3 所示。\n\n**代码清单 7–3.**\
  \ *HighScore 类头文件*\n\n```\n// HighScore class\n//\n@interface HighScore : NSObject\
  \ {\n    NSMutableArray *scores;\n}\n-(void)addHighScoreEntry:(HighScoreEntry *)score;\n\
  -(void)persist;\n@end\n```\n\n该类包含一个用于存放成绩的成员变量，变量名与类名相同，并使用 `NSMutableArray` 类型以提供灵活性。我们还声明了两个类方法：一个用于将高分记录添加到列表，名为\
  \ `addHighScoreEntry`；另一个用于将高分记录持久化保存到存储中——在本例中，是一个本地数据库。该类的实现稍微复杂一些，如代码清单 7-4 所示。\n\
  \n**代码清单 7–4.** *HighScore 类实现*\n\n```\n// HighScore class\n//\n@implementation\
  \ HighScore\n-(void)addHighScoreEntry:(HighScoreEntry *)score\n{\n    if (scores\
  \ == nil)\n        scores = [[NSMutableArray alloc] init];\n\n    [scores addObject:(score)];\n\
  }\n\n-(void)persist\n{\n    // Open our database\n    sqlite3 *db;\n    int result\
  \ = sqlite3_open(\"mydb.sqlite3\", &db);\n    if (result == SQLITE_OK)\n    {\n\
  \        // CREATE TABLE\n        char *errMsg;\n        const char *sql = \"CREATE\
  \ TABLE IF NOT EXISTS HIGHSCORE (NAME TEXT, SCORE INTEGER)\";\n        if (sqlite3_exec(db,\
  \ sql, NULL, NULL, &errMsg) == SQLITE_OK)\n        {\n            // WRITE ARRAY\
  \ TO TABLE\n            int idx = 0;\n            char *insert_sql = \"INSERT INTO\
  \ HIGHSCORE VALUES(?, ?);\";\n            sqlite3_stmt *stmt;\n            while\
  \ (idx < [scores count])\n            {\n                // Prepare our statement\
  \ for binding\n                if (sqlite3_prepare_v2(db, insert_sql, -1, &stmt,\
  \ nil) == SQLITE_OK) {\n                    // Get entry\n                    HighScoreEntry\
  \ *hse = [scores objectAtIndex:(idx)];\n\n                    // Bind the name\n\
  \                    sqlite3_bind_text(stmt, 1, [hse.name UTF8String], -1, NULL);\
  \   // NAME\n                    // Bind the score\n                    sqlite3_bind_int(stmt,\
  \ 2, hse.score);   // SCORE\n                    // Step and finalize the write\n\
  \                    sqlite3_step(stmt);\n                    sqlite3_finalize(stmt);\n\
  \                    // Next item\n                    idx++;\n                }\n\
  \            }\n            // READ FROM TABLE\n            sqlite3_stmt *readstmt;\n\
  \            const char *readSQL = \"SELECT NAME, SCORE FROM HIGHSCORE ORDER BY\
  \ SCORE\";\n            sqlite3_prepare_v2(db, readSQL, -1, &readstmt, NULL);\n\
  \            while (sqlite3_step(readstmt) == SQLITE_ROW)\n            {\n     \
  \           NSString *name = [[NSString alloc] initWithUTF8String:(const char *)sqlite3_column_text(readstmt,0)];\n\
  \                NSString *score = [[NSString alloc] initWithUTF8String:(const char\
  \ *)sqlite3_column_text(readstmt,1)];\n                NSLog (@\"NAME: %@ SCORE:\
  \ %@\", name, score );\n\n            }\n        } else NSLog(@\"Failed to create\
  \ table\");\n\n    } else NSLog(@\"Failed to open database\");\n}\n@end\n```\n\n\
  首先，我们来考虑一下 `addHighScoreEntry` 方法，它应该不言自明。如果 `scores` 数组为空，我们就创建它。然后，我们通过数组的 `addObject`\
  \ 方法将传入的对象添加到数组中。\n\n`persist` 方法虽然冗长，但同样应该熟悉。我们之前已经逐行讲解过代码。不过，我还是会指出一些关键区别：\n\n\
  * **使用整型存储分数**：在我们的表中，现在使用整型而非字符串来存储实际的分值。\n* **计算数组的 count**：在循环遍历数组时，我们使用 `NSMutableArray`\
  \ 的 `count` 属性来返回数组中对象的数量，当达到最大值时，我们退出循环。\n* **提取对象**：我们通过索引从类中提取高分记录对象，然后就可以利用所提供的属性（特别是\
  \ `name` 和 `score`）来引用该对象的值。\n* **绑定**：我们将姓名作为文本，分数作为整数，绑定到 SQL 语句中的参数。这与我们之前的示例几乎完全相同，只是我们改用\
  \ `sqlite3_bind_int` 方法来处理整数。\n* **数组遍历**：在循环遍历数组成员时，必须记得增加索引，该索引不仅用于选择列表中的下一个对象，还用于判断是否退出循环。\n\
  \n\n\n另请注意，相同的代码用于重新读取数据并输出到日志文件，在 Xcode 4 中，这个日志文件就是调试窗口。显然，实际实现中并不需要这部分代码，保留它仅用于测试目的。为清晰起见，以下是执行此操作的代码：\n\
  \n```c\n// READ FROM TABLE\nsqlite3_stmt *readstmt;\nconst char *readSQL = \"SELECT\
  \ NAME, SCORE FROM HIGHSCORE\";\nsqlite3_prepare_v2(db, readSQL, -1, &readstmt,\
  \ NULL);\nwhile (sqlite3_step(readstmt) == SQLITE_ROW)\n{\n        NSString *name\
  \ = [[NSString alloc] initWithUTF8String:(const char\n*)sqlite3_column_text(readstmt,0)];\n\
  \        NSString *score = [[NSString alloc] initWithUTF8String:(const char\n*)sqlite3_column_text(readstmt,1)];\n\
  NSLog (@\"NAME: %@ SCORE: %@\", name, score );\n}\n```\n\n### 测试高分榜类\n\n我们的类看起来是不是很可爱？好吧，至少比保存一串需要解析的字符串要好。现在让我们看看它是否有效。\n\
  \n代码清单 7-5 中的代码代表了一个测试框架，用于执行我们的高分榜代码并检查其效果。将这段代码放在项目中的位置完全由你决定，但通常你会在游戏初始化时看到类似的内容——例如，如果表中不存在默认高分，则预加载它们。\n\
  \n**代码清单 7-5.** *高分榜代码的测试框架*\n\n```c\n// Initialize our high score\nHighScore *hs\
  \ = [[HighScore alloc]init];\n// Create 5 default entries\nHighScoreEntry *e1 =\
  \ [[HighScoreEntry alloc]initWithParameters:@\"Mark\":900];\n    [hs addHighScoreEntry:(e1)];\n\
  \nHighScoreEntry *e2 = [[HighScoreEntry alloc]initWithParameters:@\"Rachel\":700];\n\
  \    [hs addHighScoreEntry:(e2)];\n\nHighScoreEntry *e3 = [[HighScoreEntry alloc]initWithParameters:@\"\
  Oliver\":500];\n    [hs addHighScoreEntry:(e3)];\n\nHighScoreEntry *e4 = [[HighScoreEntry\
  \ alloc]initWithParameters:@\"Harry\":300];\n    [hs addHighScoreEntry:(e4)];\n\n\
  HighScoreEntry *e5 = [[HighScoreEntry alloc]initWithParameters:@\"Tanya\":100];\n\
  \    [hs addHighScoreEntry:(e5)];\n\n// Persist our initial high score to the database\n\
  [hs persist];\n```\n\n如果你在持久化数据后使用重新读取数据的调试代码来执行代码清单 7-5 中的代码，你应该会看到类似如下的调试输出：\n\
  \n```\n2011-08-17 19:59:37.237 DataStorage[676:207] NAME: Mark SCORE: 900\n2011-08-17\
  \ 19:59:37.237 DataStorage[676:207] NAME: Rachel SCORE: 700\n2011-08-17 19:59:37.238\
  \ DataStorage[676:207] NAME: Oliver SCORE: 500\n2011-08-17 19:59:37.238 DataStorage[676:207]\
  \ NAME: Harry SCORE: 300\n2011-08-17 19:59:37.239 DataStorage[676:207] NAME: Tanya\
  \ SCORE: 100\n```\n\n在你的游戏中，你会用一个具有适当可见性的类来持有高分榜的实例变量，并且仅当表不存在时才会使用默认值对其进行初始化。当应用程序终止时，你也需要在合适的时机释放高分榜类变量。\n\
  \n但是，如果应用程序不是第一次运行，该如何读取高分榜数据呢？这需要做一些修改。首先，在持久化数据时，我们需要清空表的内容，以便表准备好接收新数据。只需在创建表（如果需要创建的话）之后、开始写入任何内容之前添加以下代码，即可轻松完成此操作：\n\
  \n```c\n// DELETE from the table\nconst char *sqldelete = \"DELETE FROM HIGHSCORE\"\
  ;\nsqlite3_exec(db, sqldelete, NULL, NULL, &errMsg);\n```\n\n我们还可以使用之前编写的读取表并将数据转储到日志文件的代码，来帮助我们实现一个从表中读取数据以初始化高分榜的方法。我们将这个方法命名为\
  \ `readHighScores`，其实现如代码清单 7-6 所示。\n\n**代码清单 7-6.** *从表中读取高分榜数据*\n\n```c\n#import\
  \ \"MainViewController.h\"\n#import \"HighScore.h\"\n\n// readHighScores method\n\
  -(void)readHighScores\n{\n    // Open our database\n    sqlite3 *db;\n    int result\
  \ = sqlite3_open(\"mydb.sqlite3\", &db);\n    if (result == SQLITE_OK)\n    {\n\
  \        // We've opened the database, so let's clear our array\n        [scores\
  \ removeAllObjects];\n\n        // READ FROM TABLE\n        sqlite3_stmt *readstmt;\n\
  \        const char *readSQL = \"SELECT NAME, SCORE FROM HIGHSCORE\";\n        sqlite3_prepare_v2(db,\
  \ readSQL, -1, &readstmt, NULL);\n        while (sqlite3_step(readstmt) == SQLITE_ROW)\n\
  \        {\n            NSString *name = [[NSString alloc] initWithUTF8String:(const\
  \ char\n *)sqlite3_column_text(readstmt,0)];\n            int score = (const int)sqlite3_column_int(readstmt,1);\n\
  \            HighScoreEntry *e = [[HighScoreEntry alloc]initWithParameters:name:score];\n\
  \            [self addHighScoreEntry:(e)];\n            [e release];\n        }\n\
  \    } else NSLog(@\"Failed to open database\");\n}\n```\n\n这段代码应该很容易理解，因为它大量使用了我们之前用过的代码。我们使用\
  \ `SELECT` 语句从表中读取数据，并在数据行仍然存在时循环遍历数据。在此过程中，我们提取数据——这里是名称（作为文本，转换为 UTF-8 以符合 `NSString`\
  \ 类）和分数（作为整数）。然后，我们将这些数据作为参数来创建一个 `HighScoreEntry` 类实例，将其添加到高分榜数组中，然后释放。\n\n###\
  \ 完成类\n\n我们的类几乎完成了，现在可以用默认高分榜表格进行初始化。我们可以使用 SQLite 将这些数据持久化到 iOS 移动设备的本地数据库中，并且可以重新读取这些数据以显示在排行榜上。高分榜的呈现方式留给你自己决定，但你可以考虑使用`表视图`，我们将在第\
  \ 10 章中提及这一点，因为届时我们将研究令人印象深刻的用户界面转换。\n\n目前，没有任何限制来约束高分榜条目的数量。这是有意为之的，因为你可以自行决定一个合适的限制数量，并利用到目前为止学到的知识，创建一个在添加高分榜条目时实施该约束的方法。此外，你还需要对高分榜进行排序，通常是按分数排序，假设分数越高越好，则将最高分排在最前面。\n\
  \n由于本章的重点是持久化而非数组排序，我们不会详细讨论完整的实现。但为了帮助你入门，我将提供一些关于如何进行排序的指引。\n\n首先，要排序一个包含自定义对象（即继承自\
  \ `NSObject` 的类）的 `NSMutableArray`，你需要使用 `sortArrayUsingSelector` 方法。该方法执行排序，但要求你提供一个参数，即用作比较器的方法，称为\
  \ *选择器（selector）*。\n\n接下来，你需要实现自己的比较器，该比较器能够理解数组中的对象。在我们的例子中，我们会比较 `score` 成员变量，并将最高分排在最前面。下面展示了这样一个方法的开头部分，供你试验并完成。\n\
  \n```c\n(NSComparisonResult)compare(HighScoreEntry* otherObject\n{\n  return ( //\
  \ DO YOUR COMPARISON HERE between self and otherObject)\n}\n```\n\n\n\n### 将序列化示例与\
  \ .NET 进行比较\n\n在本章中，我们了解了使用 Objective-C 和 iOS SDK 进行基本数据持久化的选项，甚至还了解了 .NET 的一些持久化属性。但此示例与\
  \ .NET 实现相比如何呢？\n\n实际上，使用自定义类来存储高分名称和分数在 .NET 中依然可行。我们会使用非常相似的机制（仅语法不同），将名称存储为 `String`，将分数存储为\
  \ `int`。我们甚至可以沿用相同的方法名称和思路。\n\n`NSMutableArray` 可以在 .NET 中实现为 `ArrayList`，允许你使用方法\
  \ `Insert()` 或 `Remove()` 项目。它还有一个 `Sort()` 方法，类似于我们的 `sortArrayUsingSelector` 方法，该方法接受一个比较器作为参数。\n\
  \n最后，序列化可以使用与我们示例类似的方法来完成：遍历条目并写入某个持久化存储，例如使用 ODBC 驱动程序或类似数据库 API 的数据库。或者，如果你想写入文件，可以使用\
  \ `XMLSerializer` 类，通过 `StreamWriter` 对类进行序列化。考虑以下 列表 7-7 中的 C# 示例，该示例假设我们有一个 `HighScoreClass`，其行为与我们的示例相同，但还在我们想要序列化的那些成员周围定义了\
  \ `[Serializable()]` 属性。\n\n**列表 7-7.** *在 C# 中序列化一个类*\n\n```\n// 创建我们的高分记录类（注意，此代码不会编译，因为我们为了简洁省略了其定义）\n\
  HighScoreClass hs = new HighScoreClass()\n// 使用高分记录类的类型创建一个新的 XmlSerializer 实例\n\
  XmlSerializer so = new XmlSerializer(typeof(HighScoreClass));\n\n// 创建一个新的文件流，用于写入序列化后的对象\n\
  TextWriter WriteFileStream = new StreamWriter(@\"C:\\output.xml\");\nso.Serialize(WriteFileStream,\
  \ hs);\n\n// 清理资源\nWriteFileStream.Close();\n```\n\n列表 7-7 中的示例与我们之前使用 Objective-C\
  \ 的 `plist` 示例非常相似，它都将类的内容序列化到 XML 文件中。这是在 .NET 框架中对类进行序列化最常用的方法。在 .NET 中，使用嵌入式\
  \ SQL 语句对数据库执行操作也非常相似。\n\n## 总结\n\n在本章中，我们探讨了将数据持久化到移动设备易失性内存之外的其他存储方式的选项；也就是说，当设备关机或应用程序关闭时，内存及其所有相关数据都会丢失。\n\
  \n我们研究了将数据持久化到文件、数据库和互联网的技术。我们还探讨了 iOS 为此提供的功能，例如应用程序沙盒。接着，我们了解了语言和 SDK 对存储数据以及将其写入不同存储类型（包括\
  \ `plist` 文件和嵌入式数据库）的支持。\n\n最后，我们通过实现几个简单的类来测试相关理论，为我们的 Lunar Lander 游戏提供了一个可持久化存储的高分表支持。现在，在应用程序的不同运行实例之间，我们可以保留一个最高分列表，从而增加游戏的竞争乐趣。\n\
  \n## 第 8 章\n\n## 扩展你的应用程序：使用库扩展你的 iOS 应用\n\n扩展应用程序功能使其超越 iOS 本身及 iOS SDK 所提供的能力，这在大多数操作系统中都相当常见。Microsoft\
  \ Windows 操作系统在设计之初就具备了通过提供静态链接库和动态链接库来扩展其功能的能力。这并不仅限于 Windows 操作系统。Unix、Linux 以及许多其他操作系统也提供相同的功能，而苹果的\
  \ iOS 也不例外。\n\n基于第 3 章中讨论的关于使用其他选项的一些示例，本章提供了一些关于如何构建你自己的库以及如何使用其他库来补充 iOS 操作系统的指导。具体来说，我们将讨论以下内容：\n\
  \n*   库的工作原理概述以及不同类型的库\n*   iOS 如何使用库\n*   如何在你的应用程序中使用库\n*   第三方库及其优势\n\n## 库概述\n\
  \n首先，我们将提供一些背景信息，介绍不同类型的库、它们的用途以及它们在 iOS 环境下的工作方式。我们将讨论什么是库、存在哪些类型，以及为什么你可能会使用一种类型而不是另一种——或者两者兼用！\n\
  \n### 什么是库？\n\n*库*是一组例程和变量，它们可以存在于本地或远程，用于实现一组预定义的功能——至少从计算机科学的角度是这样理解的（以防你想到的是去图书馆读书）。这些例程和变量通过代码实现，与所使用的编程语言无关。引用它们的方式以及它们的使用方式可能有所不同，而这正是区分不同类型库的关键所在。\n\
  \n### 存在哪些类型的库？\n\n库的类型基本上可以分为以下几类，无论它们是本地的还是远程的：\n\n*   静态库\n*   动态库\n\n我们依次来看看它们。\n\
  \n### 静态库\n\n*静态库*是保存在单个文件中的一组例程和变量，并在你的代码中被引用。一个关联的头文件提供了方法签名，有时也提供变量。在编译时，你的库被引用，这使得实现所需功能的代码能够被包含在你的可执行文件中。这通常由一个称为*链接器*的程序处理，因此它们有时被称为*静态链接库*。\n\
  \n在 iOS 设备上，静态库的扩展名为 `.a`。在 Windows 上，扩展名通常是 `.lib`。\n\n### 动态库\n\n顾名思义，*动态库*的工作方式是动态的。库仍然通过头文件来引用，但它不会在编译时被包含到可执行文件中；而是在运行时被引用。这意味着库在首次使用时（或在此之前）被加载，以解析调用并执行所引用的功能。\n\
  \n在 iOS 上，动态库的扩展名为 `.dynlib`。在 Windows 上，它们的扩展名为 `.dll`。\n\n使用动态库具有额外的优势，可以使你的可执行文件更小，并允许更高效地共享通用功能。然而，这确实也引入了一些弊端，其中一些问题在早期给\
  \ Microsoft Windows 带来了很大的麻烦。这些问题与具有相同方法但实现方式不同的不同库的版本控制有关。在 Windows 中，这被称为 *DLL\
  \ 地狱*。\n\n虽然 iPhone 和 iPad 完全能够生成和使用动态库，但苹果开发者协议明确禁止使用除系统或官方 SDK 提供的动态库之外的任何动态库。这就是为什么嵌入式\
  \ SQLite 库被支持的原因。但是，如果你试图创建自己的动态库并将你的应用程序提交到 App Store，它将被拒绝。\n\n苹果为什么要这样做？多年来，这一直是争议的源头。事实上，开发者协议最近才更新，列出了关于解释代码的一些限制，但它仍然相当严格，我强烈建议你仔细阅读。本章稍后我们将更多地讨论苹果开发者协议。目前，要么使用系统提供的动态库，要么坚持使用静态库，特别是如果你希望你的应用程序在提交到\
  \ App Store 后获得批准。\n\n\n\n#### iOS 库与.NET 等效库的比较\n\n在继续创建自己的库并利用第三方选项之前，我们先来看看一些常见的\
  \ iOS 库。与大多数 SDK 一样，iOS SDK 在其安装包中提供了多个库，这并不令人意外。我不会列举所有的 iOS 库，因为你很快会发现 iOS 框架是一套库，包含相关的头文件和配套文档。相反，我将重点介绍几个作为\
  \ iOS SDK 的一部分提供、但并未作为 iOS 框架发布的特别有用的库。表 8-1 列出了这些库，并附有简要说明，以及与.NET 库的对比评论。\n\n\
  ![images](img/t0801.jpg)\n\n可用的库远不止表 8-1 中列出的这些，但结合 iOS 框架和表中列出的库，你应该已经具备了大部分所需的功能。此外，你始终可以选择使用第三方库或自定义库来进一步扩展应用程序的功能。\n\
  \n## 创建你自己的静态库\n\n你可以为 iOS 创建自己的静态库。在本节中，我们将介绍如何使用 Xcode 4 创建静态库，然后探讨如何在.NET 中创建类似的库（即程序集）。\n\
  \n### 使用 Xcode 4 创建静态库\n\nXcode 4 使得创建你自己的静态库变得非常容易。首先，从\"Framework & Library\"\
  \ iOS 类别中选择\"Cocoa Touch Static Library\"模板，如图 8-1 所示，然后点击\"Next\"。\n\n![images](img/0801.jpg)\n\
  \n**图 8-1.** *选择静态库模板*\n\n在接下来的屏幕上，为你的项目选择产品名称，如图 8-2 所示。此时，你可能希望在文件名中引入版本号，以帮助管理同一库的不同版本；或者，你可以更聪明地开始使用\
  \ Xcode 的快照功能和源代码控制（参见[`http://developer.apple.com/library/mac/#documentation/ToolsLanguages/Conceptual/Xcode4UserGuide/SCM/SCM.html`](http://developer.apple.com/library/mac/#documentation/ToolsLanguages/Conceptual/Xcode4UserGuide/SCM/SCM.html)）。确定文件名后，再次点击\"\
  Next\"按钮。\n\n![images](img/0802.jpg)\n\n**图 8-2.** *选择你的静态库的产品名称*\n\n最后，选择项目的位置（参见图\
  \ 8-3），然后点击\"Create\"。\n\n![images](img/0803.jpg)\n\n**图 8-3.** *选择你的项目位置*\n\n这将创建你的项目结构，与我们之前构建的其他项目类似，只是预定义文件的数量减少了。这是因为功能需要由你自行定义。该框架将简单地创建一个以`Products`结构中定义的名称命名的空静态库——在此示例中为`MyStaticLibrary.a`。\n\
  \n现在我们需要向库中添加一些功能。你可以继续为库创建类和常量。但为了简化示例，我们只需添加在第 7 章中创建的支持高分功能的文件，来构建我们的静态库。\n\n\
  在 Xcode 中，选择`File` ![images](img/U001.jpg) `Add Files`，然后导航到存储高分源代码的位置。在我们的示例中，头代码位于名为`HighScore.h`的文件中，实现代码位于`HighScore.m`中。\n\
  \n选中这两个文件，并勾选\"Copy items into destination group's folder (if needed)\"复选框，如图 8-4\
  \ 所示。然后点击\"Add\"按钮。\n\n![images](img/0804.jpg)\n\n**图 8-4.** *向静态库项目添加文件*\n\n这将把文件添加到你的静态库中，并创建一个包含此功能的静态库。要找到生成的库（假设你没有更改默认的目标路径），你可以在`Products`文件夹下选择该库，然后选择`File`\
  \ ![images](img/U001.jpg) `Show in Finder`。Xcode 默认将其放置在`/Library/Developer/Xcode/DerivedData`文件夹中，然后根据项目存放在该文件夹下的子文件夹中，如图\
  \ 8-5 所示。\n\n![images](img/0805.jpg)\n\n**图 8-5.** *定位你的静态库*\n\n**注意：** 在我们的示例中，你会注意到文件夹名称是`Debug-iphoneos`。这是特意设计的，以强调在构建静态库时，它默认针对\
  \ iPhone 操作系统，该操作系统使用基于 ARM 的 CPU。你需要确保更改你的构建设置，使其编译为适用于 iPhone 模拟器的主题；否则，由于模拟器运行在\
  \ i386 CPU 上，将无法编译。如果设置正确，你会发现目录会变为`Debug-iphonesimulator`，你应该从这个位置引用你的静态库。\n\n\
  让我们通过创建一个非常简单的应用程序来测试该库。在测试中，我创建了一个实用工具应用程序。创建测试应用程序后，在\"Build Phases\"选项卡中选择顶层的项目条目，如图\
  \ 8-6 所示。\n\n![images](img/0806.jpg)\n\n**图 8-6.** *配置项目的构建阶段*\n\n\n```markdown\n\
  在展开的“Link Binary with Libraries”选项下，你会注意到默认已引用了三个库：`UIKit.framework`、`Foundation.framework`和`CoreGraphic.framework`。点击“+”图标将显示一个对话框，允许你选择其他库。如图\
  \ 8-7 所示，你可以从默认的 iOS SDK 列表中选择，或点击“Add Other”。\n\n![images](img/0807.jpg)\n\n**图\
  \ 8-7.** 向构建阶段添加库\n\n选择“Add Other”，你将看到一个对话框，允许你导航到要包含的库的位置。如图 8-8 所示，导航到之前静态库项目构建的库。\n\
  \n![images](img/0808.jpg)\n\n**图 8-8.** 选择要添加的库\n\n选择该库并点击“Open”。这将把该库添加到与应用构建链接的库列表中，如图\
  \ 8-9 所示。\n\n![images](img/0809.jpg)\n\n**图 8-9.** 链接到项目构建的库列表\n\n现在，我们可以完成项目以测试我们的库。首先，将`HighScore.h`头文件添加到你的项目中。接下来，我们可以添加一些测试代码。为此，复制我们在前一个示例中使用的代码，并将其放置在主视图控制器的`viewDidLoad`事件方法中（位于`MainViewController.m`中）。这意味着当应用启动且视图加载时，测试代码将执行。你需要取消注释事件代码，并确保它看起来与列表\
  \ 8-1 中所示类似。\n\n**列表 8-1.** 测试代码\n\n```\n// Implement viewDidLoad to do additional\
  \ setup after loading the view, typically from a nib.\n- (void)viewDidLoad\n{\n\
  \    [super viewDidLoad];\n    HighScore *hs = [[HighScore alloc]init];\n\n    HighScoreEntry\
  \ *e1 = [[HighScoreEntry alloc]initWithParameters:@\"Mark\":900];\n    [hs addHighScoreEntry:(e1)];\n\
  \n    HighScoreEntry *e2 = [[HighScoreEntry alloc]initWithParameters:@\"Rachel\"\
  :700];\n    [hs addHighScoreEntry:(e2)];\n\n    HighScoreEntry *e3 = [[HighScoreEntry\
  \ alloc]initWithParameters:@\"Oliver\":500];\n    [hs addHighScoreEntry:(e3)];\n\
  \n    HighScoreEntry *e4 = [[HighScoreEntry alloc]initWithParameters:@\"Harry\"\
  :300];\n    [hs addHighScoreEntry:(e4)];\n\n    HighScoreEntry *e5 = [[HighScoreEntry\
  \ alloc]initWithParameters:@\"Tanya\": ];\n    [hs addHighScoreEntry:(e5)];\n\n\
  \    [hs persist];\n\n    [hs readHighScores];\n\n    [hs release];\n}\n```\n\n\
  别忘了为数据库支持添加对`libsqlite3.dylib`的引用，然后构建并执行你的应用。你应该在调试窗口中看到与之前相同的输出，因为我们没有移除这段测试代码。输出应与以下内容类似：\n\
  \n```\n2011-08-18 21:29:39.639 StaticLibraryHarness[1034:207] NAME: Mark SCORE:\
  \ 900\n2011-08-18 21:29:39.641 StaticLibraryHarness[1034:207] NAME: Rachel SCORE:\
  \ 700\n2011-08-18 21:29:39.641 StaticLibraryHarness[1034:207] NAME: Oliver SCORE:\
  \ 500\n2011-08-18 21:29:39.642 StaticLibraryHarness[1034:207] NAME: Harry SCORE:\
  \ 300\n```\n\n现在，你已经创建了第一个静态库，并从另一个应用引用了它。如果你的静态库包含某些“必备”功能，那么只需分发该库和头文件即可供其他人使用。第三方库制造商正是使用这种机制来共享和部署他们的库，通常通过配置文件（provisioning\
  \ profile）进行。\n\n### 在.NET 中创建程序集\n\n在.NET 中创建程序集很简单，并且与 Xcode 4 中展示的方法类似。你可以直接创建一个空白的\
  \ Visual Studio C#解决方案，并添加定义类及其功能的库代码，代码位于给定的命名空间中，如下所示：\n\n```\nUsing System;\n\
  Using System.Text;\nUsing System.Windows.Forms;\nNamespace TestLibrary\n{\n    \
  \    public static class Test\n{\n        public static void TestMethod()\n    \
  \    {\n                MessageBox.Show(\"You are in my library\");\n        }\n\
  }\n}\n```\n\n构建这个简单的示例将生成一个`.dll`文件，这是一个动态库，你可以在另一个项目中引用它，然后从`Test`类的实例调用`TestMethod()`。确保在你的项目引用中引用了该库。\n\
  \n注意，这是一个私有程序集，类似于静态库，与你的应用链接。如果你希望它在多个程序之间共享（存储在.NET 环境的全局程序集缓存中），则需要做一些额外的工作，使其成为一个强名称程序集。这将允许它进行版本控制和身份验证。我们不会在此详述，但这里有一个提示：请查看名为`sn.exe`的命令行实用工具。\n\
  \n### Apple 开发者协议\n\n当你注册并支付订阅费用成为 Apple 开发者计划的一员时，你将获得一份 Apple 开发者协议。该文档描述了 Apple\
  \ 允许你在使用其工具和技术时的行为。该文档受保密协议（NDA）保护，这意味着你在加入之前不允许了解其内容，加入后也不允许分享其内容！然而，通过信息自由法案请求，已有副本泄露到互联网上。\n\
  \n关于库的更广泛使用，该协议在较为宽松的形式下（于 2010 年生效）在第 3.3 节（应用的程序要求）中定义了某些条件，描述了编写应用时需要考虑的一些限制。这些条件如下：\n\
  \n-   使用 iOS SDK 制作的应用只能通过 App Store 分发，这实质上意味着像 Cydia 这样的黑市应用分发网络违反了协议。\n-   不允许逆向工程，也不允许使他人能够进行逆向工程。\n\
  -   Apple 可以随时撤销你的应用在 App Store 中的成员资格，即使应用已经获得批准。\n-   你只能按规定方式使用文档化的 API。不得调用任何私有\
  \ API。\n\n**注意：** 直到 2010 年晚些时候，这里总结的要求才生效。此前，Apple 对支持的语言有具体规定，这意味着像 MonoTouch\
  \ 这样的第三方框架存在不合规的风险。\n\n如果你不遵守这些限制，将违反协议，Apple 可能会拒绝任何提交到 App Store 的应用。但只要生成的软件不下载任何代码且符合\
  \ API 使用规范，就应该是允许的。\n\n我们将在第 9 章中进一步讨论 Apple 开发者协议，该章节涉及部署。\n\n## 第三方库\n\n我们已经确认\
  \ Apple 最终清醒过来并解除了之前的限制，这意味着第三方库得到了更广泛的支持。我们还了解了存在哪些类型的库，以及如何根据 Apple 开发者协议使用它们。\n\
  \n在第 3 章中，我们研究了用于编写应用的第三方解决方案。这些第三方框架附带了一系列提供所需功能的库，因此它们总是一个选择。但如果你想要一个更小、更具体的库来提供扩展应用的功能呢？那么，你会很高兴听到它们确实存在。实际上，利用你学到的关于编写库的知识，你甚至可以发布自己的第三方库并从中获利。\n\
  \n首先，我们将介绍第三方库的两个类别，然后回顾一些目前可用的更有用的库。\n```\n\n\n### 第三方库的分类\n\n第三方库通常分为两大类：商业库和开源库。\n\
  \n顾名思义，*商业库*是指由某个组织拥有，并对使用方式施加限制，通常需要付费才能获取和使用（或两者兼需）的库。例如，在 .NET 世界中，开发者通常会购买以程序集形式扩展\
  \ .NET 库功能的组件，用于绘制精美图形或压缩文件。苹果平台也是如此，许多商业公司销售用于 iOS 平台的库。但请务必检查与这些库相关的许可协议，以及它们使用此类许可证的合规性。\n\
  \n*开源库*是指使用受到一定限制的库，例如在 GNU 通用公共许可证（GPL）下，但使用是免费的。\n\n不过，苹果确实有开发者协议，你的库必须符合该协议。苹果仍保留拒绝或撤销\
  \ App Store 中任何应用程序的权利。再次重申，这并未赢得社区的青睐，但从 App Store 的情况来看，这显然并没有阻止人们使用库（无论是免费还是其他形式）来编写应用程序。\n\
  \n### 有用的第三方库\n\n我们已经讨论了编写自己的库，并考虑了互联网上可能遇到的不同类型的库。接下来让我们看一些现有的第三方库示例，并提供简要介绍以及访问它们的互联网网址。\n\
  \n**注意：** 我不对使用这些库提供任何推荐或暗示性保证。如果你选择使用它们，这是你个人的选择，我无法保证它们的功能、性能，也无法保证它们能被苹果接受进入\
  \ App Store。\n\n*   **ZBar – 条形码阅读器：** 可在 [`http://zbar.sourceforge.net/iphone/index.html`](http://zbar.sourceforge.net/iphone/index.html)\
  \ 找到。它既是一个库，也是一个示例应用（可从 App Store 获取），使你能编写软件，利用 iPhone 摄像头读取各种不同的条形码，甚至可以将其链接到亚马逊等商店或谷歌等搜索引擎。\n\
  *   **GData – Google 数据接口：** 可在 [`http://code.google.com/p/gdata-objectivec-client/`](http://code.google.com/p/gdata-objectivec-client/)\
  \ 找到。它提供了一个基于 Objective-C 静态库的 API，允许访问各种 Google 服务，并让你能够读取和写入数据。例如，它支持 Google Analytics、Google\
  \ Books、Blogger 和 Google Docs。\n*   **Three20 – Facebook API：** 可在 [`http://three20.info/`](http://three20.info/)\
  \ 找到。虽然它被称为 Facebook API，但这并不完全准确。然而，它被 Facebook 应用和其他许多应用用于提供强大的视图控制器、图片浏览器和网络感知表格。\n\
  *   **iPhone Analyzer：** 可在 [`http://sourceforge.net/projects/iphoneanalyzer/`](http://sourceforge.net/projects/iphoneanalyzer/)\
  \ 找到。它允许你非常详细地分析 iPhone 设备的内容，包括 plist 文件、数据库以及设备的内部文件结构。但请注意，目前它不支持 iOS 4。\n* \
  \  **Leaves：** 可在 [`https://github.com/brow/leaves`](https://github.com/brow/leaves)\
  \ 找到。这是一个适用于 iPhone 和 iPad 的库，提供类似 iBooks 的翻页功能。\n*   **Core-plot：** 可在 [`http://code.google.com/p/core-plot/`](http://code.google.com/p/core-plot/)\
  \ 找到。它提供了一个绘图框架，用于在 iOS 和 Mac OS X 平台上进行数据的二维可视化。\n\n## 在其他地方寻找库\n\n虽然我重点介绍了一些第三方库，但在常见的代码仓库中还存在更多，不仅限于基于\
  \ iPhone 或 iPad 的库和源代码，也支持其他平台，如 Mac OS X、Windows 和 Linux。这里有两个流行的网站：\n\n*   **SourceForge：**\
  \ 这是一个用于共享免费开源软件的代码库。它支持许多不同的平台，包括 iPhone 和 iPad 等移动 iOS 设备。网址为 [`http://sourceforge.net/`](http://sourceforge.net/)。\n\
  *   **Github：** 使用 Git 代码仓库，GitHub 是众多库的家园，包括许多有用的基于 iOS 的移动库。网址为 [`https://github.com/`](https://github.com/)。\n\
  \n## 总结\n\n在本章中，我们探讨了库的概念，包括 iOS 提供的库、第三方库以及你自己的创作。我们研究了不同类型的库及其与 .NET Framework\
  \ 的相似之处，以及如何创建你自己的静态库，以便在你的应用程序中使用或进行分发。\n\n接着介绍了不同类型的第三方库，并提供了一些库的示例，以及用于 iOS 设备的库和源代码的流行仓库。显然我们没有列出所有可用的库。数量太多，无法一一列举，而且数量还在与日俱增。不过，这些介绍应该能帮助你探索和发现适合你需求的库。\n\
  \n如果你想编写自己的库，可以通过互联网与他人分享。然而，根据苹果开发者协议，请务必注意应用于你为移动设备编写的任何应用程序的限制，并在向 App Store\
  \ 提交应用程序时，意识到苹果所拥有的权限。\n\n"
