    # 商业秘密法概述


    商业秘密法各州规定不同，但通常为信息所有者提供保护，使其信息在市场上相对于竞争对手具有优势，且所有者采取的保密措施可合理预期能防止他人获取该信息（除非存在违约、盗窃等不当行为）。简而言之，如果你掌握一项能带来竞争优势的秘密，并已采取充分措施保密，那么当该秘密被盗用时，你可以提起诉讼。


    ## 如何确立商业秘密？


    商业秘密保护无需向政府提交任何申请或备案。事实上，你只需采取合理步骤维护秘密的机密性即可。保护源代码时，这可能意味着将代码保存在安全的服务器上；保护未公开的产品创意时，这意味着不向未签署保密协议的人透露你的应用构想。


    以下是维护拟作为商业秘密保护的机密信息时应采取的最低限度措施：


    *   **教育培训：** 务必对所有员工和承包商进行教育，使其了解维护公司信息机密性的重要性。能够证明你已采取措施确保每个人都知晓自身责任，将有助于表明你的公司行事合理。

    *   **合同保护：** 每位全职、兼职员工及所有顾问（包括创始人及高管）均应在开始工作及公司商业秘密向其披露前，签署包含保护公司机密信息条款的雇佣协议。使用保密协议保护向任何其他第三方披露的机密信息。

    *   **有形材料管控：** 机密文件和有形材料应标注为"机密"。这些文件和材料的访问权限应仅限于那些因履行对公司职责而需要知晓此类信息的员工和承包商。

    *   **电子数据与代码管控：** 确保源代码及其他机密数据存储于需要登录名和密码才能访问的受控计算机上。


    ## 保密协议


    *保密协议*，也称为*机密性协议*，用于建立保密关系，在法律上约束一方保护另一方的商业秘密信息。尽管保密关系可通过口头协议建立或由双方行为默示形成，但我建议在披露机密信息时始终使用保密协议。口头或默示协议比书面协议更难证明。


    大多数保密协议的核心义务是不使用或披露另一方的机密信息。


    如果你和另一方将相互披露机密信息，则适用的协议应为*相互保密协议*。由于权利和义务对双方平等适用，相互保密协议的起草往往更显公平。


    如果你预计仅披露机密信息而不会接收对方的机密信息，则应考虑使用单方保密协议，该协议保护你的机密信息，但不会为你的公司设定与从对方接收信息相关的任何义务。例如，当你向另一家公司推销产品创意或雇佣承包商为你工作时，单方保密协议是合适的。在这些情况下，你可能不希望在使用从对方接收的信息方面受到限制，因为这些信息很可能适用于你所推销的产品或你雇佣承包商所执行的工作。


    保密协议是维护商业秘密保护的关键部分。商业秘密只有在保持秘密的前提下才受保护，因此，即使在披露商业秘密前仅有一次未能与第三方签订保密协议，也可能导致商业秘密权的丧失。


    ## 商业秘密保护的限制


    一个需重点考虑的限制是：商业秘密保护仅适用于非公开信息，这意味着他人通过简单检查你的产品就能获取的信息不受保护。可口可乐的秘方是著名的商业秘密，但它的商业秘密保护并不能阻止可口可乐的竞争对手购买一罐可乐并尝试对成品进行逆向工程。这一限制同样适用于你
    iOS 应用中可被观察的元素。用户通过分析你的应用所能访问的信息不受商业秘密法保护，因为一旦你发布应用，这些信息就不再是秘密了。


    为帮助阐明这一区别，假设你创建了一个在 iPhone 上运行的全新搜索引擎。再假设该搜索引擎由你发明的一个绝密且高效的算法驱动，该算法用于确定哪些搜索结果与用户最相关。如果该算法有效，它很可能成为你公司最有价值的知识产权资产。那么关键就在于，你在发布应用时，既要让用户受益于该算法，又不能暴露其具体工作原理。


    现在假设谷歌获悉了你这款惊人的应用，并希望将该技术整合到其搜索引擎中。作为这项技术的开发者，你显然希望谷歌需要向你获得许可或购买该技术，或者更好的是，通过收购你的公司来获取这一秘密。在谷歌采取行动之前，你可以假设它很可能会购买一份你的应用副本，并试图弄清该算法的工作原理。假设你没有为算法申请专利，如果谷歌的工程师能通过测试和观察你的程序来弄清算法的工作原理，那么谷歌很可能无需收购你的公司就能实现类似的功能。


    如果你采取足够努力保护该算法，且该算法无法通过简单观察你的产品而得知，那么你就能阻止竞争对手使用它。如果他们入侵你的电脑或贿赂你的员工以泄露算法，你可以就商业秘密盗用起诉他们。


    商业秘密法仅涵盖你能保密的事物——这是一个需要重点考虑的限制。这意味着你需要寻求其他形式的知识产权保护（例如版权和/或专利）来保护你对用户可见的产品方面。


    ## 专利


    如果你将各种形式的知识产权保护视为武器，那么专利保护就是末日装置。专利的获取成本高昂，诉讼费用也高，但它能为创新思想提供极其强大的保护，足以让竞争对手胆寒。整个商业模式或核心技术可能因一项覆盖公司现有业务的已有技术专利而遭受重创。出于这个原因，许多大中型公司纯粹为了防御目的而积累大量专利，这样在遭到诉讼时就能有反击的武器。


    尽管专利强大，但对于大多数 iOS 开发者来说往往不太适用。费用各不相同，但通常聘请律师提交专利申请并完成发布流程的费用超过 1 万美元。整个过程通常需要两到三年，因此你的
    iOS 应用需要是一项长期事业，专利才能产生实际意义。

    '
- fmt: '# 专利保护与iOS应用开发


    游戏在App Store中拥有相当独特的销售曲线。如果一款游戏成功，它在发布时或发布前后会出现销售高峰，随后销售额通常会随时间推移而下降。要使一项专利物有所值，你的发明创意在三年后必须仍然有价值。


    与此同时，正在申请中的专利在正式授权之前并不赋予你可强制执行的权利。告诉你的竞争对手，一旦你获得专利就会找他们算账，这或许能阻止他们在竞争性应用上投入过多。然而，如果开发竞争性应用的成本很低（或者竞争对手已经开发了它），他们很可能会继续销售该应用，直到你的专利正式授权。再结合一个事实：iOS开发者遍布全球。你的专利可能吓不倒一个在印度的14岁孩子，他正在开发一款竞争性应用，而且被起诉对他来说也没什么好损失的。


    尽管如此，在某些情况下，专利对iOS开发者来说确实非常有意义。寻求专利保护的最大弊端是成本。如果你正在开发一个预算特别大或雄心勃勃的应用，并且 pursuing
    一项专利所需的10,000多美元在整个项目计划中并非巨额开支，那么获得专利可能是保护你在该项目上整体投资的一个明智之举。


    另一个专利保护值得考虑的情况是，如果你的应用是一项长期事业。如果在你产品的预期生命周期的大格局中，三年时间并不算长，那么漫长的申请程序可能就不是问题。请认真思考你对你应用的抱负，并判断你认为三年后是否还会有人关心它。


    ## 你的发明是否具备可专利性？


    专利保护的是新的、有用的工艺、机器、制造品和物质组成，以及对这些事物的任何新的、有用的改进。概括来说，除其他要求外，要获得专利，你的发明必须是新颖且有用的，并且你必须能够以这样一种方式来描述它：使得在该发明领域具有合理技能的人能够使该发明工作。


    要求发明是“新颖的”意味着你必须是第一个发明它的人。在美国，如果两个人对同一项发明申请专利，专利将授予最先构思出该发明的人，而不是最先提交专利申请的人。事实上，无论另一位发明者是否提交了专利申请，如果该发明者首先构思了这项发明，你后来提交的专利可能会被宣告无效。


    即使没有人比你更早构思出这项发明，该发明本身对于在你发明相关技术领域具有普通技能的人来说也必须是“非显而易见的”。这可能是一个棘手的难题，因为往往最好的发明在发明出来之后看起来是显而易见的。关于这一点，判断标准是该发明在发明之时是否是非显而易见的。由于在发明已经公之于众后很难做出判断，所以通常会用这样一个事实作为证据来证明该发明并非特别显而易见：即尽管其他人与发明者拥有相同的信息，但此前却没有人构思出这项发明。


    获得保护的另一个要求是，你的发明必须在你的申请中以这样一种方式描述，即证明你已经“将发明付诸实践”。这意味着你不仅构思了这项发明，还实际确定了如何使其工作，并且细节足够详细，以至于你技术领域内的熟练人员可以据此制造出来。例如，如果我声称发明了时间机器或传送装置，要获得专利，我必须能够以一种切实可行的方式，描述如何制造出这台机器或装置，从而使其他人能够制造它。


    假设你的发明符合保护条件，美国专利赋予其所有者有权阻止他人在美国境内制造、使用、许诺销售或“销售”该发明，或将该发明“进口”到美国，期限为自该专利申请在美国提交之日起20年。与版权和商业秘密保护相比，这些权利尤其强大，因为你阻止他人制造或销售你发明的权利，无论他们是否从你这里复制或窃取了该发明。即使他们独立发明了相同的东西，如果你首先构思了它，你也可以阻止他们。


    ## 避免“销售拦阻”


    如果一项发明的专利申请未在其首次公开、公开使用或在美国销售之日起一年内提交，则该发明将不具备专利保护资格。这意味着，如果你向潜在投资者或客户演示你的发明或应用，你写了一篇关于它的博客文章，或者你的应用已提交给苹果，那么计时就开始了。如果你在一年内没有提交专利申请，你将失去这样做的权利。因此，如果你正在考虑寻求专利保护，你应该在流程的早期就联系专利律师，以便律师可以帮助你确定提交申请还有多少时间。


    ## 如何提交专利申请


    虽然你可以自行提交专利申请，但如果你与专利律师合作，几乎肯定会获得范围更广、更稳固的专利。与合同不同，在合同中，简单明了的协议实际上比复杂的协议更可取，而专利申请有其特定的词汇，专门适用于专利申请。使用错误的措辞来描述发明可能会导致你的专利权利要求出现弱点。


    专利律师和专利局有他们自己的语言，聘请一位会说这种语言的人将你的发明翻译成恰当的术语，以最大化你专利的价值，是值得的。如果你确实试图自行起草申请，你至少可以在提交前聘请一位专利律师对其进行审查，看看是否有任何律师可以推荐的明显修正点。


    ## 自行提交临时专利申请


    尽管专利申请流程昂贵且通常需要律师，但有一个初步步骤你可以自行完成，只需支付适度的申请费。这个初步步骤被称为*临时专利申请*。


    临时专利申请基本上是你向专利局提交的一份关于你发明的描述，目的是为了在你决定就该项发明提交正式专利申请时，确立一个较早的有效申请日。临时专利申请只是为你占个位，这样当你提交正式申请时，就可以获得更早申请日的权益。


    一般来说，临时专利申请相当薄弱。它们不赋予你任何可强制执行的权利，也不会产生专利，除非你稍后在时间耗尽前提交正式专利申请（请参阅前面的“避免销售拦阻”部分）。


    那么，为什么要费事呢？临时专利申请让你能够将*专利未决*这个术语与你的产品联系起来。*专利未决*这个术语并不意味着你有任何法律上可强制执行的权利，但它会让你的竞争对手和潜在竞争对手注意到你有一项正在申请中的专利。根据潜在竞争对手进入你的市场的成本有多高，让他们知道你正在寻求专利保护可能足以阻止他们。许多人根本不知道*专利未决*是什么意思，也懒得去搞清楚。'
  raw: 'Games, for instance, have a fairly distinctive sales curve in the App Store.
    If a game is successful, it will see a spike in sales at or near launch, and then
    typically sales deteriorate over time. For a patent to be worthwhile, your inventive
    idea must still be valuable in three years.


    Meanwhile, having a patent in process doesn’t give you any enforceable rights
    until the patent issues. Telling your competitors that you are coming for them
    once you have your patent might keep them from investing too greatly in a competitive
    app. However, if the competitive app is inexpensive to create (or the competitors
    already created it), they are likely to continue selling the app until your patent
    issues. Combine that with the fact that there are iOS developers all over the
    world. Your patent may not scare a 14-year-old kid in India who is creating a
    competitive app and doesn’t have much to lose by being sued.


    All that said, there are cases where patents make a lot of sense for iOS developers.
    The biggest downside of pursuing patent protection is the cost. If you are working
    on a particularly big budget or ambitious app, and the $10,000+ it will cost you
    to pursue a patent is not a huge expense in the scheme of the overall project,
    obtaining a patent might be a smart move to try to protect your overall investment
    in the project.


    Another time when patent protection makes sense is if your app is a long-term
    venture. If three years is short in the grand scheme of your product’s expected
    life cycle, the lengthy application process may not be an issue. Seriously think
    about your ambitions for your app, and decide whether you think people are going
    to still care in three years.


    Is Your Invention Patentable?


    Patents protect new and useful processes, machines, articles of manufacture, and
    compositions of matter, as well as any new and useful improvement to those things.
    In general terms, among other requirements, to qualify for a patent, your invention
    must be new and useful, and you must be able to describe it in a way that would
    allow a person reasonably skilled in the invention’s area to make the invention
    work.


    The requirement that the invention be “new” means that you must be the first one
    to invent it. In the United States, if two people file a patent on the same invention,
    the patent goes to the first to conceive the invention, not the first to file
    the patent application. In fact, whether the other inventor files a patent at
    all, if that inventor conceived of the invention first, your later-filed patent
    can be invalidated.


    Even if no one conceived of the invention before you, the invention itself must
    be “nonobvious” to a person having ordinary skill in the area of technology related
    to your invention. This can be a tricky burden, since often the best inventions
    seem obvious once they have been invented. To this point, the test is whether
    the invention was nonobvious at the time it was invented. Because this is a difficult
    thing to determine once the invention is known, often the fact that no one had
    previously conceived of the invention, despite having access to the same information
    as the inventor, is used as evidence that the invention was not particularly obvious.


    Another requirement for protection is that your invention must be described in
    your application in a manner that demonstrates that you have “reduced the invention
    to practice.” This means that you have done more than conceive of the invention,
    but you have also actually determined how to make it work with enough detail that
    a skilled person in your area of technology could produce it. For example, if
    I claim to have invented a time machine or a teleportation device, to qualify
    for a patent, I need to be able to describe how to build the machine or device
    in a way that actually enables someone to build it.


    Assuming your invention qualifies for protection, a US patent gives its owner
    the right to exclude others from making, using, offering for sale, or “selling”
    the invention in the United States or “importing” the invention into the United
    States for a period of 20 years from the date on which the application for the
    patent was filed in the United States. These rights are particularly powerful
    compared to copyright and trade secret protection, because your right to prevent
    other people from making or selling your invention applies whether or not they
    copied or stole the invention from you. Even if they independently invent the
    same thing, if you conceived of it first, you may be able to stop them.


    Avoiding the On Sale Bar


    An invention will not qualify for patent protection unless its patent application
    is filed less than one year after it is first published, used in public, or on
    sale in the United States. This means if you demonstrate your invention or app
    to a potential investor or customer, you write a blog post about it, or your app
    is submitted to Apple, the clock is running. If you don’t file your patent application
    within one year, you will lose the right to do so. For this reason, if you are
    considering pursuing patent protection, you should contact a patent attorney fairly
    early in the process, so that the attorney can help you determine how much time
    you have to file your application.


    How to File for a Patent


    Although it is possible to file a patent application on your own, you will almost
    certainly get a broader and more defensible patent if you work with a patent attorney.
    Unlike contracts, where a plainly written agreement is actually preferable to
    a complex one, patent applications have a certain vocabulary that applies specifically
    to patent applications. Using the wrong phrasing to describe an invention can
    cause weaknesses in your patent claims.


    Patent attorneys and the Patent Office have their own language, and it is worth
    hiring someone who speaks it to translate your invention into the right terms
    to maximize the value of your patent. If you do try to draft an application on
    your own, you might at least hire a patent attorney to look it over before you
    file it, to see if there are any obvious fixes that the attorney can recommend.


    Filing a Provisional Patent Application Yourself


    Although the patent process is expensive and generally requires an attorney, there
    is a preliminary step that you can do yourself for a modest filing fee. This preliminary
    step is called a *provisional patent application*.


    A provisional patent application is basically a description of your invention
    that you file with the Patent Office to establish an early effective filing date
    if you decide to file a full patent application on the invention. The provisional
    patent application just holds your place in line, so that if you file a full application,
    you can get the benefit of the earlier filing date.


    Generally speaking, provisional patent applications are pretty weak. They don’t
    give you any enforceable rights and won’t result in a patent unless you later
    file a full patent application before your time runs out (see the earlier “Avoiding
    the On Sale Bar” section).


    So why bother? A provisional patent application gives you the ability to use the
    term *patent pending* in connection with your product. The term *patent pending*
    doesn’t mean that you have any legally enforceable rights, but it puts your competitors
    and potential competitors on notice that you have a patent application in the
    works. Depending on how expensive it will be for potential competitors to enter
    your market, making them aware that you are pursuing patent protection may be
    enough to dissuade them. Many people simply don’t know what patent pending means
    and won’t bother to find out.'
