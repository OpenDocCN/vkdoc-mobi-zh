  trans: '

    假设你有一个为 iPhone 开发的首个信用卡处理应用，你想保护自己。一个选择是为这个创意申请专利，但即便你的创意符合专利保护条件，也要等上几年才能拿到专利。


    没有专利，你对该概念的保护有限，但你拥有先发优势。作为首款此类应用，它很可能获得媒体关注，甚至被苹果推荐。一旦你的应用取得一定成功，竞争者就可能开始模仿。没有专利，你或许无法阻止这种模仿，但可以防止竞争者误导用户以为他们就是你。


    同样，苹果的审核流程不会过滤抄袭应用，所以你不能指望审核机制或苹果会阻止仿冒品上架。通过创建人们能关联到你公司的图标、名称和界面，你可以建立商标权。这些商标权能让你阻止他人在应用中使用易混淆的相似品牌。


    如果竞争者以可能让用户混淆应用来源的方式抄袭你的应用，你的商标权应能让你阻止他们。但并非所有名称和标识都受同等保护。本节将介绍商标保护的基础知识，以及如何选择可受保护的商标来标识你的公司和应用。


    如何获取商标


    与版权类似，你只需将名称或符号用作应用来源的标识，就能自动获得一些商标权。但这些“普通法”商标权相当有限，而向美国专利商标局提交商标注册申请能带来显著好处。


    联邦商标注册能向公众宣告你对该商标的所有权。注册还会在法律上推定你拥有该商标，以及在全美范围内就注册中列明的商品和服务类型享有独家使用权。最重要的是，联邦商标注册是向联邦法院提起商标诉讼的前提条件。


    了解更多商标申请流程的最佳途径是访问`http://uspto.gov`。专利商标局网站上有大量关于该流程的信息，并提供在线提交商标申请的分步指南。


    联邦政府甚至设有帮助热线，你可致电获取更多关于申请流程的信息。该热线不能提供法律建议，但它是极其有用且惊人的资源。商标援助中心的号码是`1-800-786-9199`。


    但聘请律师协助准备申请也有好处。在流程中，通常需要与专利商标局反复沟通，有专业人士为你工作，能帮你为商标争取到最广泛的权利。


    选择可受保护的商标


    有些商标比其他商标更强。虚构名称（例如，Exxon 或 Google）或与公司没有字面关联的名称（例如，Apple 用于电脑公司）最有利于建立强大的知识产权。需要一点逻辑跳跃或仅暗示公司产品或服务的名称（例如，Titanium
    用于旅行包公司，暗示强度和耐用性）是可受保护的，并且往往在打造强大品牌与向公众传达公司信息之间取得良好平衡。


    另一方面，描述公司业务范围的名称（例如，Online Advertising, Inc.用于销售互联网广告的公司）通常最初不受保护。公司往往倾向于使用描述性名称，因为他们希望公众立即了解公司业务。然而，选择描述性名称可能会对公司的长期利润产生不利影响。原因如下：


    *   可能无法阻止竞争者使用相同名称。

    *   描述性名称（本质上可能与其他公司名称相似）可能需要额外的营销成本来从拥挤的领域中脱颖而出。

    *   由于“监控”其他想使用相似名称的人负担加重，可能会产生额外费用。


    作为应用开发者，你有两个重要的品牌塑造机会：应用名称和图标。你还可以指定公司名称。


    首先，讨论应用名称作为品牌。App Store 对你选择的应用名称施加了一些不寻常的商业限制。在非 App Store 环境下，我通常建议选择一个不描述或暗示产品功能的名称。描述性或暗示性商标比任意或臆造性商标更难保护。


    然而，对于 iOS 应用，任意性名称会带来发现难题。App Store 在列出应用时，只会显示应用名称的前 17 个左右字母。如果你给应用起一个任意性名称，App
    Store 目录的随意浏览者可能找不到你的应用，或者没意识到这是他们需要的东西。出于这个原因，选择可保护性较弱的商标有商业上的优势；但你仍应设法让你的应用名称在某些方面具有独特性。


    例如，如果你销售一个小费计算器并将其命名为“小费计算器”，你几乎不可能成功获得该名称的商标保护。另一方面，如果你将小费计算器应用命名为“小费之星”，并添加一个带有星星的独特图标，你就有了可以主张该应用识别为来自你的依据，而不仅仅是描述其用途。


    在“小费之星”的例子中，如果另一个开发者发布了一个带有星形标志或使用单词*星星*的小费计算器，那么“小费之星”的开发者 Ryan Rowe 将拥有合法的侵权索赔权。Ryan
    的“小费之星”商标不仅仅描述应用，还添加了用于区分其应用与他人的独特性。星星的名称和符号与应用的目的无关，所以如果 Ryan 发布一个名为“体重之星”或“转换之星”的应用，他就可以建立在其初始应用所创造的良好声誉之上。


    你的目标应该是创建一个独特且能标识应用来自你的名称，但又不完全掩盖应用的目的。这需要把握微妙的平衡。


    如果你选择了一个暗示应用功能的名称，你可能需要额外努力使你的图标具有独特性。图 3-1 展示了一些独特图标的例子，并与一些不太独特的图标进行了对比。


    ![9781430262381_Fig03-01.jpg](img/9781430262381_Fig03-01.jpg)


    图 3-1. 小费计算器名称和图标，从最不易保护到最易保护


    商业秘密


    作为开发者，你很可能有一些值得保护的秘密。可能是你下一款游戏或应用的概念、让你的应用更高效的算法，或者你某个应用功能背后的源代码。商业秘密法是保护这些秘密的一种方式，并且获得保护的条件相当简单。


    '
- fmt: '# Trade Secret Law Overview


    Trade secret law varies from state to state, but typically provides protection
    for information that gives the owner of the information an advantage over competitors
    in the marketplace and that is treated by the owner in a way that can be reasonably
    expected to prevent the information from being learned by other people, absent
    some improper action, such as breach of contract or theft. In simpler terms, if
    you have a secret that gives you a competitive advantage, and you take sufficient
    steps to keep it a secret, you can sue if it is stolen from you.


    ## How Do You Establish a Trade Secret?


    Trade secret protection doesn''t require any application or filing with the government.
    In fact, you don''t need to do anything but take reasonable steps to keep the
    secret confidential. For protecting source code, this might mean keeping the code
    on a secure server. For protecting your unpublished product ideas, this might
    mean not talking about your app idea with people who haven''t signed a nondisclosure
    agreement.


    The following are some minimum steps to take toward maintaining the confidentiality
    of information that you want to protect as a trade secret:


    *   **Education:** Be sure to educate all of your employees and contractors on
    the importance of maintaining confidentiality of company information. Being able
    to show that you took efforts to make sure everyone was aware of their responsibilities
    will help demonstrate that your company acted reasonably.

    *   **Contractual protection:** Every full-time or part-time employee and all
    consultants (including founders and officers) should sign an employment agreement
    that contains provisions protecting confidential information of your company before
    commencing work and before any company trade secrets are revealed to them. Use
    nondisclosure agreements to protect confidential information disclosed to any
    other third parties.

    *   **Control of tangible materials:** Confidential documents and tangible materials
    should be marked as "Confidential." Access to these documents and materials should
    be limited to those employees and contractors who have a need to know such information
    for the performance of their duties to the company.

    *   **Control of electronic data and code:** Be sure that source code and other
    confidential data is stored on secured computers that require a login and password
    to access.


    ## Nondisclosure Agreements


    *Nondisclosure agreements* (NDAs), also referred to as *confidentiality agreements*,
    are used to create a confidential relationship that legally binds a party to protect
    the trade secret information of another party. Although a confidential relationship
    can be created through an oral agreement or can be implied by the conduct of the
    parties, I recommend that you always use an NDA when disclosing confidential information.
    Oral or implied agreements are much more difficult to prove than written agreements.


    At the core of most NDAs is the obligation not to use or disclose the other party''s
    confidential information.


    If you are in a situation where both you and the other party will be disclosing
    confidential information to each other, the appropriate agreement would be a *mutual
    NDA*. Mutual NDAs tend to be drafted in an evenhanded manner, since the rights
    and obligations apply equally to both parties.


    If you are in a situation where you expect to disclose but not receive confidential
    information, you should consider using a one-way NDA that protects your confidential
    information but does not create any obligations for your company with respect
    to information received from the other party. For example, a one-way NDA would
    be appropriate when you are pitching a product idea to another company or hiring
    a contractor to perform work for you. In those cases, you might not want to be
    restricted in how you use information received from the other party, since it
    will likely apply to the product you are pitching or the work you are hiring the
    contractor to perform.


    NDAs are a critical part of maintaining protection for your trade secrets. Trade
    secrets are protectable only if they are kept secret, so failure to put a confidentiality
    agreement in place with a third party before disclosing a trade secret even once
    can cause a loss of your trade secret rights.


    ## Limitations of Trade Secret Protection


    An important limitation to consider is that trade secret protection applies only
    to nonpublic information, which means there is no protection for information that
    others can gather by simply inspecting your product. The secret recipe for Coca
    Cola is a famous trade secret, but its trade secret protection does not stop Coca
    Cola''s competitors from buying a can and trying to reverse-engineer the finished
    product. This limitation applies equally to the observable elements of your iOS
    app. Information that your users can access by analyzing your app is not protected
    under trade secret law because it stopped being secret once you published the
    app.


    To help illustrate this distinction, let''s imagine that you created a new search
    engine that runs on the iPhone. Imagine that this search engine is powered by
    a top-secret and highly effective algorithm that you invented to determine which
    search results are most relevant to the user. If it works, this algorithm would
    probably be your company''s most valuable intellectual property asset. The key
    then would be putting out your app in a way that gives your users the benefit
    of the algorithm, without exposing exactly how it works.


    Now let''s assume the Google has learned of your amazing app and wants to incorporate
    the technology into its search engine. As the developer of this technology, you
    will clearly want Google to need to license or buy it from you or, better yet,
    acquire your company to get access to the secret. Before Google can do that, you
    can assume that it will probably buy a copy of your app and try to figure out
    how the algorithm works. Assuming you haven''t patented your algorithm, if Google''s
    engineers can figure out how your algorithm works by testing and observing your
    program, Google likely won''t need to buy your company to implement something
    similar.


    If you take sufficient efforts to protect the algorithm, and it isn''t ascertainable
    by simply observing your product, you can keep your competitors from using it.
    If they hack into your computers or bribe one of your employees to disclose the
    algorithm, you could sue them for trade secret misappropriation.


    The fact that trade secret law covers only things that you can keep secret is
    an important limitation to consider. It means that you will want to look to other
    forms of intellectual property protection (for example, copyright and/or patent)
    to protect aspects of your products that are visible to the user.


    ## Patents


    If you think of the various forms of intellectual property protection as weapons,
    patent protection is the doomsday device. Patents are expensive to obtain and
    expensive to litigate, but they can offer extremely strong protection for inventive
    ideas and should scare the pants off your competition. Entire business models
    or core technology can be sunk by a patent on preexisting technology that covers
    what the company is doing. For this reason, many midsize to large companies amass
    an arsenal of patents purely for defensive purposes so they will have something
    to fire back at their competition if they get sued.


    Despite their strength, patents tend to be a bad fit for most iOS developers.
    Costs vary, but typically hiring an attorney to file a patent application and
    take it through to publication costs more than $10,000. The process often takes
    two to three years, so your iOS app would need to be a long-term venture for the
    patent to become relevant.'
