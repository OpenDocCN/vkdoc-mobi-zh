  trans: '

    # 在运行时征求反馈


    正如我在前几章中提到的，在 iOS 4 之前，当用户从主屏幕删除应用时，苹果会自动提示用户先为该应用评分。虽然这是征求客户反馈的一种便捷方式，但这显然不是询问意见的最佳时机。如果用户选择删除你的应用，那么他很可能不喜欢它，或认为它没有用。无论哪种情况，如果他真的选择发布评分，很可能是个负面评价。


    值得庆幸的是，苹果在 iOS 4 中移除了那个删除时评分的功能。但即使有了这个受欢迎的改进，不满意的用户通常也比满意的用户更有动力主动前往 App Store
    并手动发布评论。他们心中有不满，想让所有人都知道。接下来，我们考虑如何鼓励那些对你的应用感到满意的用户进行评分。


    我们都深知，App Store 中的客户评分和评论会极大地影响应用的销量。甚至还有各种传言称，在 iOS 7 中，评论会影响你的应用在特定搜索词上的排名。那么，开发者该如何应对这种对负面反馈的偏重呢？显然，首要答案是打造一款深思熟虑、精良完善的应用。但除此之外，你还能做什么呢？


    何不在应用内部提示你的满意用户给出积极反馈呢？这就像让你的应用显示一个自定义的 `UIAlertView`，请求喜欢该应用的用户为其评分一样简单。你只需几行代码就能做到这一点。


    首先，启动 Xcode 并创建一个新的 iPhone 项目，使用“基于视图的应用”模板作为基础。（如果你更倾向于针对 iPad 设备，也可以轻松地将其创建为
    iPad 项目。）我们将项目命名为 `AskForRating`。在这个示例中，你只需在 `AskForRating` 项目的主屏幕上添加一个按钮。在你自己的应用中，你可能希望通过在“设置”或“信息”屏幕上包含一个按钮，让用户在任何时候都可以选择为你的应用评分。


    接下来，你需要在 `AskForRatingViewController.h` 头文件的 `@interface` 调用中添加对 `UIAlertViewDelegate`
    的引用。你还需要为稍后将在 Interface Builder 中创建的按钮添加一个 `IBAction` 方法。你的 `AskForRatingViewController.h`
    文件现在应包含以下代码：


    ```

    #import <UIKit/UIKit.h>


    @interface AskForRatingViewController : UIViewController <UIAlertViewDelegate>
    {


    }


    - (IBAction)buttonPressed:(id)sender;


    @end

    ```


    保存该文件后，打开 `AskForRatingViewController.m` 实现文件并添加以下代码：


    ```

    - (IBAction)buttonPressed:(id)sender {

        UIAlertView *buttonAlert = [[UIAlertView alloc] initWithTitle:@"帮忙宣传" message:@"如果你喜欢这个应用，请在
    App Store 中为它评分。谢谢！" delegate:self cancelButtonTitle:@"稍后再说" otherButtonTitles:@"立即评分",
    nil];

        [buttonAlert show];

        [buttonAlert release];  // 此行可删除

    }


    - (void)alertView:(UIAlertView *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex
    {

        if (buttonIndex == 1) {

            NSURL *url = [NSURL URLWithString:@"你的 APP STORE URL"];


    NSURL *url= [NSURL URLwithString:@" http://itunes.apple.com/WebObjects/MZStore.woa/wa/viewContentsUserReviews?pageNumber=0&sortOrdering=1&type=Purple+Software&mt=8&id=你的应用
    ID

    "];

            [[UIApplication sharedApplication] openURL:url];

        }

    }

    ```


    `(IBAction)buttonPressed` 方法接收按钮点击动作，并显示 `UIAlertView`，请求用户为应用评分。当用户在 `UIAlertView`
    对话框中选择“稍后再说”或“立即评分”按钮时，会调用 `alertView` 代码。如果选择了“立即评分”按钮，则会启动你的 App Store URL，将用户直接引导至你的应用在
    App Store 中的页面。


    别忘了将占位符字符串 `"YOUR APP STORE URL"` 替换为你独特的 App Store URL。


    **提示** 要获取正确的 App Store URL，只需在 Mac 版桌面 iTunes 中找到你的应用，从“购买”按钮旁边的弹出菜单或按住 Ctrl
    键点击应用图标时出现的上下文菜单中选择“复制链接”，然后将其粘贴到代码中的 URL 字符串里。


    在 Xcode 中保存文件，然后继续最后一项任务：创建你的按钮。双击 `AskForRatingViewController.xib` 文件以在 Interface
    Builder 中打开它。向视图中添加一个“圆角矩形按钮”。将按钮标题重命名为 `为这个应用评分`。如果需要，你也可以创建自己的自定义按钮。然后将按钮的“Touch
    Up Inside”连接器连接到文件所有者的 `buttonPressed` 连接器。保存并关闭 XIB 文件。


    如果你在 iOS 模拟器中运行你的 Xcode 项目，你会看到按下 `为这个应用评分` 按钮会成功弹出一个 `UIAlertView` 对话框提示你为应用评分（参见图
    5-1）。然而，如果你点击“立即评分”按钮，App Store URL 将无法在 iOS 模拟器中加载，因此你需要在真实的 iPhone、iPad 或 iPod
    touch 上测试你的应用，以确保它能正确地在设备上的 App Store 中获取你的应用页面。


    ![9781430262381_Fig05-01.jpg](img/9781430262381_Fig05-01.jpg)


    图 5-1. 通过内置的自定义提示鼓励用户为你的应用评分


    请注意我们示例中 `UIAlertView` 的措辞。通过使用标题“帮忙宣传”作为行动号召，你是在邀请粉丝们帮助推广你的应用。而消息“如果你喜欢这个应用，请在
    App Store 中为它评分”，则是专门针对你的满意用户。当然，这并不能阻止讨厌你的人使用这个功能，但这种措辞确实定下了一个积极的基调。甚至取消按钮也被标记为“稍后再说”，让用户知道他们的反馈随时都受欢迎。


    # 何时请求评分


    尽管我们之前的示例提供了一个不错的解决方案，但它仍然是被动的，依赖于用户点击 `为这个应用评分` 按钮来启动操作。如果你将按钮放在“设置”或“信息”屏幕上，用户可能只有在寻找关于应用的帮助时才会偶然发现它。而如果他们正在寻求帮助，可能已经很沮丧了——这时候向他们索要评论可不是个好时机。


    你想在用户心情最好的时候请求他们为你的应用评分，比如当他们正在享受你的应用时。你可能需要考虑采取更主动的姿态，在战略性的时刻显示你的 `UIAlertView`，例如：


    - 使用几天后，如果用户还没有删除你的应用，他们一定在其中发现了某些积极的价值。包含代码来检查 `NSUserDefaults`，在应用启动时确定应用已安装了多少天。根据你的应用可能被使用的频率（每天或每周），选择一个合适的时间弹出评分请求对话框——也许在安装后
    5 到 15 天。

    - 如果你的应用是游戏，可以在用户感觉良好时显示评分请求对话框，比如在完成一个困难关卡或获得高分之后。

    - 如果它是一个生产力应用，你可能希望在用户有积极成就感时显示评分请求对话框——比如在写完一份文档、编辑完一张照片、勾选完任务列表等等之后。


    Lima Sky 广受欢迎的《涂鸦跳跃》在游戏主菜单屏幕上使用了一个有趣的弹出横幅图片来征求积极的 App Store 评分（参见图 5-2）。注意横幅中显示的五颗星，暗示着对好评的请求。你可以看到标题“喜欢《涂鸦跳跃》吗？”专门针对这款游戏的快乐用户。这些是微妙但有效的策略，能够激励用户提供帮助。


    ![9781430262381_Fig05-02.jpg](img/9781430262381_Fig05-02.jpg)

