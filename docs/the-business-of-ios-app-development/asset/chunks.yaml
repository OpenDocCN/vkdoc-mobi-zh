- fmt: 'Having multiple differentiators defined, along with a loose road map of new
    features you plan on adding to future versions, will help keep your app relevant
    and competitive. For example, earlier versions of iOS did not support a landscape
    keyboard in `Mail`, `Notes`, and `Messages`. To satisfy the demand for easier
    two-thumb typing, a slew of wide keyboard apps flooded the App Store, offering
    the ability to type e-mail messages and notes in landscape mode. Many of those
    iPhone apps were one-trick ponies, with the landscape keyboard being their only
    key selling point. When iOS 3 added landscape keyboard support to `Mail`, `Notes`,
    and other built-in Apple apps, it instantly invalidated the usefulness of many
    of those one-function apps. The ones that survived were the apps that still had
    something unique to offer, such as synchronizing notes with Google Docs, organizing
    notes into groups, posting notes to Twitter, and so on.


    Just keep in mind that the more features you add, the more streamlined and intuitive
    your interface design needs to be, especially on a small mobile screen. After
    several updates, if your app begins to feel bloated and cluttered, then it is
    failing its primary objective, which is to provide an easy-to-use mobile experience.
    Take a look at the official Twitter app (formerly known as `Tweetie`). The developer,
    Loren Brichter, continues to add dozens of new features with every release, while
    spending a great deal of time simplifying the UI design so that additional features
    never interfere with enjoying the app’s core Twitter functionality. Each new feature
    he implements serves to further empower the user without diminishing the app’s
    usability. Many developers find themselves leaving their apps stagnant after building,
    what they think, is the perfect app. Users are never fully satisfied, and the
    iOS SDK is always changing. Make sure you do everything you can to evolve with
    the app store.


    ## Targeting Multiple iOS Devices


    Unless your game or app requires a hardware or iOS system feature that’s exclusive
    to a specific device, it’s in your best interest to make your application available
    to as many users and devices as possible. It’s simple sales logic, really. A larger
    target audience equals a larger number of potential customers. Although making
    your app available on multiple devices does require some extra development effort
    on your part, it’s a great way to increase the return on your investment (of time
    and money). Why target only several million iPad users if your app could be designed
    for compatibility with all of the 120 million iOS devices out there? Your potential
    audience should continue to expand with every new iOS device that Apple releases.


    Since a large percentage of users are still running iOS 5 on older iPhones and
    iPod touches, some developers take the lazy approach by simply producing apps
    for that lowest common denominator. They know that an iOS 7–compiled app will
    probably run fine on iOS 5 and even on iPads. The only issue here is that the
    apps will be very different visually, due to the heavy redesign of iOS 7\. Such
    an app is simple to code and compatible with a broad range of iOS devices, but
    that’s hardly optimal. In following that path, you’re doing a major disservice
    to your business’s future in the App Store.


    Users of the iPhone 5 and the very latest iPod touch want apps that take advantage
    of the Retina display’s enhanced resolution and extra screen height. If your competitors
    offer a stunning Retina display–optimized UI, while your app still utilizes an
    old, 3.5-inch-only iOS 5 interface, your competitors’ apps are going to be much
    more visually appealing to iPhone 5 and new iPod touch customers. And that could
    result in lost sales. With a little extra graphics work, your app can—and *should*—be
    crafted so that its UI is optimized for both the Retina display and older, lower-resolution
    screens. [Chapter 4](#9781430262381_Ch04.xhtml) discusses the design requirements
    for targeting both displays.


    The same holds true for the iPad. Although your iPhone app may run fine on Apple’s
    popular tablet, don’t settle for an inferior user experience. Sure, the iPad includes
    a “2x” button for super-sizing iPhone apps to full screen, but this enlarged effect
    is very pixelized and rather ugly compared to the beautiful native iPad apps of
    your competitors. Keep in mind that you now have two different device families
    on the iPad side: the iPad and the iPad mini.


    Since iOS features some unique UI components exclusive to the iPad, some iPhone
    developers may not want to maintain two separate Xcode projects for essentially
    the same product in order to properly support both targets. To solve this problem,
    Apple introduced a new universal application format that runs on both iPhone and
    iPad devices. Depending on the device running the universal application, the appropriate
    version of the app is launched. That way, you can maintain one Xcode project with
    shared source code, but design separate UIs specifically tailored for each device
    target. For example, your iPhone app may use a navigation controller for organizing
    content, yet on an iPad, you would most likely want to display a split view controller
    instead. Both versions use the same data, but present it in different ways that
    best suit the chosen device.


    For developers targeting both iPhones and iPads, Apple highly recommends building
    universal applications. Managing and updating only one application in the App
    Store makes it much easier for customers who use your app on both their iPhone
    and iPad (and even iPod touch). But if your iPad version is radically different
    from your iPhone app, with dozens of new features that require a fairly hefty
    code rewrite, a universal application may not be the ideal choice. If the two
    versions don’t share much in the way of code, it may make more sense to build
    them as two stand-alone products: one for the iPhone and one for the iPad. Business
    and marketing factors also come into play in deciding whether to create a universal
    application.


    ## Universal Applications from a Business Perspective


    From a development standpoint, creating a universal application has many advantages,
    but is it the right choice for you? If your app is free, then your goal is to
    provide the most convenient, user-friendly access to it. A universal application
    makes it easy for users to download your app across all of their Apple mobile
    devices. But paid apps are a different story. Putting aside the technical benefits
    for a moment, let’s look at the business factors involved.


    When you create a universal application, existing owners of your iPhone app will
    be able to access the iPad version for free, since there’s no official upgrade
    mechanism supported in universal applications. If your iPad app represents an
    enhanced edition, offering dozens of exclusive new features that are not available
    in your iPhone version, it may make more sense to release the app as a separate,
    stand-alone iPad version.


    By selling the iPad app as a separate product, you have the opportunity to recoup
    your development costs. And if it provides additional value above and beyond your
    iPhone edition, most customers won’t have a problem with paying for it, even after
    they’ve already purchased the iPhone version. I say “most” because there will
    always be a select few users protesting that they should receive all app versions
    for all applicable iOS devices for free. Ironically, the loudest complaints usually
    come from people who paid only 99 cents for your original iPhone app. But don’t
    cut off a potential revenue stream that could help support your continued development
    just because you’re worried about keeping everyone happy. Here’s a little secret:
    it’s not possible to please everyone. Just build the best features and user experience
    possible. If you provide your customers with additional value, most of them will
    be more than happy to pay for the enhanced iPad version.'
  raw: 'Having multiple differentiators defined, along with a loose road map of new
    features you plan on adding to future versions, will help keep your app relevant
    and competitive. For example, earlier versions of iOS did not support a landscape
    keyboard in Mail, Notes, and Messages. To satisfy the demand for easier two-thumb
    typing, a slew of wide keyboard apps flooded the App Store, offering the ability
    to type e-mail messages and notes in landscape mode. Many of those iPhone apps
    were one-trick ponies, with the landscape keyboard being their only key selling
    point. When iOS 3 added landscape keyboard support to Mail, Notes, and other built-in
    Apple apps, it instantly invalidated the usefulness of many of those one-function
    apps. The ones that survived were the apps that still had something unique to
    offer, such as synchronizing notes with Google Docs, organizing notes into groups,
    posting notes to Twitter, and so on.


    Just keep in mind that the more features you add, the more streamlined and intuitive
    your interface design needs to be, especially on a small mobile screen. After
    several updates, if your app begins to feel bloated and cluttered, then it is
    failing its primary objective, which is to provide an easy-to-use mobile experience.
    Take a look at the official Twitter app (formerly known as Tweetie). The developer,
    Loren Brichter, continues to add dozens of new features with every release, while
    spending a great deal of time simplifying the UI design so that additional features
    never interfere with enjoying the app’s core Twitter functionality. Each new feature
    he implements serves to further empower the user without diminishing the app’s
    usability. Many developers find themselves leaving their apps stagnant after building,
    what they think, is the perfect app. Users are never fully satisfied, and the
    iOS SDK is always changing. Make sure you do everything you can to evolve with
    the app store.


    Targeting Multiple iOS Devices


    Unless your game or app requires a hardware or iOS system feature that’s exclusive
    to a specific device, it’s in your best interest to make your application available
    to as many users and devices as possible. It’s simple sales logic, really. A larger
    target audience equals a larger number of potential customers. Although making
    your app available on multiple devices does require some extra development effort
    on your part, it’s a great way to increase the return on your investment (of time
    and money). Why target only several million iPad users if your app could be designed
    for compatibility with all of the 120 million iOS devices out there? Your potential
    audience should continue to expand with every new iOS device that Apple releases.


    Since a large percentage of users are still running iOS 5 on older iPhones and
    iPod touches, some developers take the lazy approach by simply producing apps
    for that lowest common denominator. They know that an iOS 7–compiled app will
    probably run fine on iOS 5 and even on iPads. The only issue here is that the
    apps will be very different visually, due to the heavy redesign of iOS 7\. Such
    an app is simple to code and compatible with a broad range of iOS devices, but
    that’s hardly optimal. In following that path, you’re doing a major disservice
    to your business’s future in the App Store.


    Users of the iPhone 5 and the very latest iPod touch want apps that take advantage
    of the Retina display’s enhanced resolution and extra screen height. If your competitors
    offer a stunning Retina display–optimized UI, while your app still utilizes an
    old, 3.5-inch-only iOS 5 interface, your competitors’ apps are going to be much
    more visually appealing to iPhone 5 and new iPod touch customers. And that could
    result in lost sales. With a little extra graphics work, your app can—and *should*—be
    crafted so that its UI is optimized for both the Retina display and older, lower-resolution
    screens. [Chapter 4](#9781430262381_Ch04.xhtml) discusses the design requirements
    for targeting both displays.


    The same holds true for the iPad. Although your iPhone app may run fine on Apple’s
    popular tablet, don’t settle for an inferior user experience. Sure, the iPad includes
    a “2x” button for super-sizing iPhone apps to full screen, but this enlarged effect
    is very pixelized and rather ugly compared to the beautiful native iPad apps of
    your competitors. Keep in mind that you now have two different device families
    on the iPad side: the iPad and the iPad mini.


    Since iOS features some unique UI components exclusive to the iPad, some iPhone
    developers may not want to maintain two separate Xcode projects for essentially
    the same product in order to properly support both targets. To solve this problem,
    Apple introduced a new universal application format that runs on both iPhone and
    iPad devices. Depending on the device running the universal application, the appropriate
    version of the app is launched. That way, you can maintain one Xcode project with
    shared source code, but design separate UIs specifically tailored for each device
    target. For example, your iPhone app may use a navigation controller for organizing
    content, yet on an iPad, you would most likely want to display a split view controller
    instead. Both versions use the same data, but present it in different ways that
    best suit the chosen device.


    For developers targeting both iPhones and iPads, Apple highly recommends building
    universal applications. Managing and updating only one application in the App
    Store makes it much easier for customers who use your app on both their iPhone
    and iPad (and even iPod touch). But if your iPad version is radically different
    from your iPhone app, with dozens of new features that require a fairly hefty
    code rewrite, a universal application may not be the ideal choice. If the two
    versions don’t share much in the way of code, it may make more sense to build
    them as two stand-alone products: one for the iPhone and one for the iPad. Business
    and marketing factors also come into play in deciding whether to create a universal
    application.


    Universal Applications from a Business Perspective


    From a development standpoint, creating a universal application has many advantages,
    but is it the right choice for you? If your app is free, then your goal is to
    provide the most convenient, user-friendly access to it. A universal application
    makes it easy for users to download your app across all of their Apple mobile
    devices. But paid apps are a different story. Putting aside the technical benefits
    for a moment, let’s look at the business factors involved.


    When you create a universal application, existing owners of your iPhone app will
    be able to access the iPad version for free, since there’s no official upgrade
    mechanism supported in universal applications. If your iPad app represents an
    enhanced edition, offering dozens of exclusive new features that are not available
    in your iPhone version, it may make more sense to release the app as a separate,
    stand-alone iPad version.


    By selling the iPad app as a separate product, you have the opportunity to recoup
    your development costs. And if it provides additional value above and beyond your
    iPhone edition, most customers won’t have a problem with paying for it, even after
    they’ve already purchased the iPhone version. I say “most” because there will
    always be a select few users protesting that they should receive all app versions
    for all applicable iOS devices for free. Ironically, the loudest complaints usually
    come from people who paid only 99 cents for your original iPhone app. But don’t
    cut off a potential revenue stream that could help support your continued development
    just because you’re worried about keeping everyone happy. Here’s a little secret:
    it’s not possible to please everyone. Just build the best features and user experience
    possible. If you provide your customers with additional value, most of them will
    be more than happy to pay for the enhanced iPad version.'
