  trans: '

    # 一款用于关注竞争对手的工具


    我喜欢用来密切关注竞争对手的一款工具是 `Searchman SEO`。这个网站替你完成了大量基础工作，并追踪诸如 App Store 排名、关键词排名以及新的客户评论等事项。这是一款相当不错的软件，能让你在竞争中占据优势。另一款可选工具是
    `appcod.es`；这个网站能让你追踪关键词的排名位置，并且，我们姑且称之为魔法，它实际上能猜测出你竞争对手的关键词。这可谓是占据了竞争的先机。


    举例来说，假设你正在计划开发一款帮助人们找到自己停车位置的应用程序。因为忘记车停在哪里这种事（体育赛事后或漫长购物之后）似乎谁都会遇到，所以这确实是一个很适合做移动应用的概念——在
    App Store 中，至少有 2000 款不同的应用是基于这个概念开发的。


    为了找到所有这些寻找停车位置的应用，让我们在 App Store 中进行几次搜索。像 `car` 和 `park` 这样的关键词搜索结果包含了太多不相关的应用，所以我们把搜索范围缩小到一个短语。以下是针对不同关键词短语，在前
    20 个搜索结果中列出的相关应用数量：`car park`（805 个）、`find car`（437 个）、`car locator`（343 个）、`car
    finder`（437 个）以及 `parked car`（41 个）。有趣的是，`car park` 提供了最佳结果（参见图 2-3），尽管你可能会预期
    `car locator` 或 `car finder` 是更好的关键词组合。这正好说明了搜索词的主观性，所以请尝试所有可能性！


    ![9781430262381_Fig02-03.jpg](img/9781430262381_Fig02-03.jpg)


    图 2-3。在 App Store 中搜索 `car park`，在前 20 个列出的项目中找到了 14 个相关应用


    这个例子还表明了另一个重要观点。你是否注意到，少数特定应用几乎出现在所有相关搜索中？在这次搜索时，排名较高的应用出现得也更高、更频繁，这并非巧合。


    但是，那些频繁被列出的应用能够超越竞争对手，并持续出现在大多数相关搜索中——而且至少是在前 20 个结果中——这证明了它们正在利用重要的关键词和战略性的应用名称来帮助实现这一目标。


    当大多数消费者搜索某一类应用时，他们通常不会浏览前几屏结果之后的内容，而这通常意味着前三到五个图标。因此，研究主要竞争对手应用的描述和名称，以找出哪些关键词对你至关重要，这一点非常重要。虽然描述在
    App Store 中已不再可搜索，但它们通常包含一些吸引眼球的文字短语，这些短语在你的关键词探索中可能很有价值。让你的应用出现在相关搜索结果的第一个屏幕中，将为你的应用提供急需的曝光度，最终也有助于提升销量，进一步提高应用的可发现性。


    另一个挖掘竞争对手信息的技巧是阅读你已找到应用的客户评论。客户经常会在评论中比较应用，推荐一款胜过另一款。请务必将任何新提及的应用添加到你的竞争应用列表中，并仔细研究它们。评论者对于应用及其功能的比较是否正确？我非常喜欢使用的一个技巧是，查看用户说该应用缺少什么，或者该应用在哪些方面做得不好。如果你能提供当前用户所使用的应用所缺失的需求和愿望，那么让该用户转而使用你的应用就会变得非常容易。切记，切勿在你的竞争对手的应用中撰写那种低劣的“来看看我的应用吧”的用户评论；这会让你看起来非常、非常糟糕，而且苹果最终会删除你的评论。


    ## 利用替代应用目录进行竞争研究


    你大部分搜索都会在 iTunes 中的本地 App Store 里进行，但不要忘记那些可能仅在其他国家/地区可用的竞争应用。如果你计划最终在你本国之外的其他几个特定国家/地区的
    App Store 发售你的应用，这一点尤其重要。


    有几种基于网络的第三方应用目录值得探索。许多这类网站还会发布应用评论。你会在本书的附录中找到这些实用网站的列表。


    ## 分析应用排名统计信息


    在了解了针对你特定细分市场的竞争激烈程度后，找出竞争对手在 App Store 中的表现也同样重要。他们在 App Store 排行榜上排名高吗？是否有任何应用突破了其原始类别，在总下载量上排名靠前？那些应用在某些国家的表现是否优于其他国家？这些信息还能帮助你判断，某个特定的细分市场是否足够受欢迎或有利可图，从而值得你投入资金进行开发。


    你的 iTunes Connect 账户限制你只能查看自己的应用统计数据，但值得庆幸的是，一些极好的替代方案可以协助你进行竞争研究探索：

    '
- fmt: '*   `Mobclix`（`http://www.mobclix.com/appstore/`）：除了提供从嵌入式移动广告到复杂应用分析等一系列诱人的iPhone服务平台外，`Mobclix`还提供了美国应用商店的全面应用排名。想要调查竞争对手甚至自己应用的榜单趋势？您可以在这里找到大量有价值的信息。`Mobclix`网站应该是所有iOS开发者的必去之地。

    *   `MajicRank`（`http://majicjungle.com/majicrank.html`）：Majic Jungle Software的`David
    Frampton`创建了一个便捷的Mac OS X应用程序，让您能够轻松追踪多个地区应用商店的iOS应用排名统计。`David`在这个免费软件工具上投入了大量心血，因此如果您觉得它有用，可以考虑购买他的其他应用作为感谢。请注意，自2012年起，`Majic
    Jungle`已声明使用此应用可能导致您的IP地址被苹果应用商店和iTunes封禁。请自行承担使用风险。

    *   `APPlyzer`（`http://www.applyzer.com/`）：`APPlyzer`是一个流行的基于网页的免费和付费应用排名统计来源。该站点为地区应用商店和全球总体统计提供了海量信息，因此，即使其免费的标准会员已提供很多功能，但升级到专业会员所需的小额费用也是非常值得的。

    *   `Top App Charts`（`http://www.topappcharts.com/`）：`Top App Charts`通过绘制榜单上的重大变动者，为应用排名统计提供了独特的视角。与`APPlyzer`类似，这个免费网站使用视觉标记来标示重大首发、上升和下降，从而揭示应用在排名中的实际变动。

    *   `PositionApp`（`http://positionapp.com/`）：想要一个用于检查应用商店排名的移动解决方案？由`ustwo`开发的`PositionApp`是一款强大的iPhone应用程序，使您能够追踪所有应用商店地区前300名应用的历史榜单变动。

    *   `App Store Metrics`（`http://148apps.biz/app-store-metrics/`）：这是一个很棒的网站，充满了iPhone和iPad开发新闻和商业洞见。但除了其所有精彩内容之外，`148Apps.biz`可能以其全面的应用商店指标而闻名，这些指标包括活跃应用数量、提交量、批准量、应用价格以及应用在各个类别中的分布等统计信息。

    *   `App Store Stats`（`http://www.yappler.com/Apple-iPhone-App-Store-Stats/`）：尽管`Yappler`主要是一个用于查找和分享应用的在线目录，但它也提供了一些值得一看的有趣的应用商店统计数据。

    *   `AppTrends`（`http://appsfire.com/apptrends`）：`Appsfire`的`AppTrends`并非追踪顶级应用的应用商店排名，而是代表了一个哪些应用在Twitter和Facebook上最受欢迎的排名。这是一个有价值的网站，可以监控哪些类型的应用正在通过社交媒体口口相传被最多讨论。

    *   `Searchman SEO`（`http://www.searchman.com`）：`Searchman SEO`是一个用于追踪应用商店排名、关键词排名、评论以及追踪竞争对手的绝佳工具。在寻找一体化解决方案时，`Searchman
    SEO`确实无出其右。


    尽管还有其他几个应用分析服务、网站、软件工具，甚至一些酷炫的iPhone应用（例如`AppFigures`和`AppViz`）也会追踪应用商店排名，但它们更侧重于分析您自己应用的统计数据，并从您的iTunes
    Connect账户的销售日志中收集数据。因此，即使这些资源可能超出了竞争研究的范畴，也请放心——它们会在后续章节中详细介绍。


    ## 从竞争对手的用户评论中寻找灵感


    让我们继续以“停车位查找”应用为例进行竞争研究。现在您已经整理了一份所有类似应用的列表，是时候仔细研究它们各自的功能集和用户评论了。所有这些应用都使用iPhone内置的GPS定位功能，首先存储您停车的位置，然后再次定位您当前的位置，帮助您规划返回车辆的路线，并显示嵌入式地图框架，如`MapKit`。有些应用除了基本功能外，没有提供更多功能。另一些则提供了一些附加功能，例如保存您停车位置的文本备注、语音备忘录和/或照片，以记录实际的行、层、车位号等（非常适合多层停车场）。少数应用还包括记录您到达时间的功能，并且如果您把车停在计时器旁，它们可以追踪计时器剩余的时间，以便您在计时器到期前返回。


    比较这些应用的有趣之处在于，它们都以截然不同的界面提供相似的功能。并且，根据发布的用户评论，您可以快速判断哪些界面被证明易于使用，哪些不够直观，从而导致用户沮丧。


    现在，我不会在这里对任何特定应用发表批评。我也不会透露哪些应用收到了负面用户评论。本书的目标是帮助开发者利用他们的应用赚更多钱，因此我不想通过指出他们的弱点而无意中给他们制造更多困难。您可以轻松地自行查看哪些应用在应用商店中获得了低分评价。因此，为了这个示例的目的，我将向您展示用户评论的概况，以此衡量其中一些应用做得好和不好的地方，但不点名。让我们开始吧。


    ## 从他人的错误中学习


    对于那些记录停车计时器剩余时间的应用，一些客户发布了负面评论，疑惑为什么某个特定应用在没有设置计时器提醒的情况下，不会在他们计时器即将到期时发送通知提醒。例如，一位评论者给出了一星的低评价，理由是“需要一个可以在应用关闭时提醒你的计时器”。作为开发者，我们这类评论视为功能请求，但失望的消费者倾向于将它们视为缺失的功能。不幸的是，他们的“功能请求”以负面评分的形式发布，这损害了应用的整体形象，并可能影响销量。目标是从竞争对手的错误中学习，以期（尽可能）避免这类评论。当您查看竞争对手的用户评论时，要关注人们所说的是应用的哪些问题。一个不满意的用户是一个您可以通过您的应用满足其缺失需求来争取的用户。


    这类应用中大部分（如果不是全部）也收到了大量关于GPS性能缓慢和GPS结果不准确的负面评论。通常情况下，这些问题并非由有缺陷的编程导致，而是由用户当前信号强度和较旧iPhone型号的GPS缺陷造成的。大多数人（尤其是非技术用户）不了解其移动设备的局限性，因此他们简单地将这些问题归咎于应用。


    为了解决这些与GPS相关的投诉，大多数开发者在其应用商店描述中用非常清晰的语言声明，为了获得最佳效果，他们强烈建议使用iPhone 3G、3GS或iPhone
    4，这些设备提供了大大改善的GPS定位精度。但似乎许多用户并没有花时间阅读应用商店描述中的免责声明，然后当应用在他们的iPod touch设备（缺乏真正的GPS功能）上表现不佳时，他们会感到不满。'
  raw: '*   *Mobclix* (`http://www.mobclix.com/appstore/`): Beyond offering a compelling
    platform of iPhone services, ranging from embedded mobile advertising to sophisticated
    app analytics, Mobclix also provides comprehensive app rankings for the US App
    Store. Want to investigate the charting trends of your competition or even your
    own apps? You can find a wealth of valuable information here. The Mobclix web
    site should be a required destination for all iOS developers.

    *   *MajicRank* (`http://majicjungle.com/majicrank.html`): Majic Jungle Software’s
    David Frampton has created a handy Mac OS X application that allows you to easily
    track iOS app-ranking statistics across several regional App Stores. David has
    put a lot of work into this free software tool, so if you find it useful, consider
    buying one of his other apps as your way of saying thanks. Be warned, since 2012
    Majic Jungle has let it be known that using this app can cause your IP address
    to be banned from the Apple App Store and iTunes. Use it at your own risk.

    *   *APPlyzer* (`http://www.applyzer.com/`): APPlyzer is a popular web-based source
    for free and paid app ranking statistics. This site provides an extensive amount
    of information for both regional App Stores and overall worldwide stats, so even
    though its free Standard membership offers a lot, it’s well worth the small fee
    to upgrade to Pro membership.

    *   *Top App Charts* (`http://www.topappcharts.com/`): Top App Charts offers a
    unique spin on app ranking statistics by charting the big movers and shakers on
    the lists. Similar to APPlyzer, this free site uses visual markers for big debuts,
    jumps, and drops to reveal the actual movement of apps through the ranks.

    *   *PositionApp* (`http://positionapp.com/`): Want a mobile solution for checking
    App Store rankings? PositionApp by ustwo is a powerful iPhone application that
    enables you to track the historical chart movements of the top 300 apps in all
    App Store regions.

    *   *App Store Metrics* (`http://148apps.biz/app-store-metrics/`): This is a great
    web site, chock-full of iPhone and iPad development news and business insights.
    But beyond all of its wonderful content, 148Apps.biz may be best known for its
    comprehensive App Store metrics, which include statistics on active app counts,
    submissions, approvals, app prices, and distribution of apps across the various
    categories.

    *   *App Store Stats* (`http://www.yappler.com/Apple-iPhone-App-Store-Stats/`):
    Even though Yappler is primarily an online directory for finding and sharing apps,
    it also provides some interesting App Store statistics that are worth checking
    out.

    *   *AppTrends* (`http://appsfire.com/apptrends`): Instead of tracking the App
    Store ranking of the top apps, Appsfire’s AppTrends represents a ranking of which
    apps are most popular on Twitter and Facebook. This is a valuable site to monitor
    to see which kinds of apps are being talked about the most via social media word
    of mouth.

    *   *Searchman SEO* (`http://www.searchman.com`): Searchman SEO is a fantastic
    tool for tracking App Store rankings, keyword rankings, reviews, and tracking
    your competition. When it comes to an all-in-one, you really can’t beat Searchman
    SEO.


    Although several other app analytics services, web sites, software tools, and
    even a few cool iPhone apps (such as AppFigures and AppViz) track App Store ranking,
    they’re more focused on analyzing your own app’s statistics and collecting data
    from your iTunes Connect account’s sales logs. So, even though these resources
    may fall beyond the scope of competitive research, don’t worry—they are profiled
    in later chapters.


    Finding Inspiration in Your Competitors’ Customer Reviews


    Let’s continue with the competitive research example of parked-car finder apps.
    Now that you’ve compiled a list of all similar apps, it’s time to take a closer
    look at their individual feature sets and their customer reviews. All of these
    apps use the iPhone’s built-in GPS location awareness to first store your parked-car
    location and then again to determine your current location to help you map a route
    back to your parked car, displaying an embedded map framework, such as MapKit.
    Some of the apps don’t offer much more than that basic functionality. Others offer
    some additional features, such as saving a text note, voice memo, and/or photo
    of your parked location for logging the actual row, level, spot number, and so
    on (perfect for multilevel parking garages). A select few also include the ability
    to log your arrival time, and if you parked at a meter, they can track the amount
    of time remaining on your meter so you can return to your car before the meter
    expires.


    The interesting thing about comparing these apps is that they all deliver similar
    features in vastly different interfaces. And based on the posted customer reviews,
    you can quickly determine which interfaces have proven to be easy to use and which
    are less intuitive, causing user frustration.


    Now, I’m not going to direct any criticism toward any specific apps here. Nor
    am I going to reveal which apps received negative customer reviews. The goal of
    this book is to help developers make more money with their apps, so I don’t want
    to unintentionally make it any harder for them by pointing out their weaknesses.
    You can easily see for yourself which apps are receiving poor ratings in the App
    Store. So, for the purpose of this example, I’ll give you a general look at customer
    reviews as a gauge of what some of these apps are doing right and wrong, without
    naming any names. Let’s dive in.


    Learning from the Mistakes of Others


    For those apps that log the remaining time left on your parking meter, some customers
    posted negative reviews, wondering why a particular app does not notify them with
    an alert, reminding them when their meter is about to expire. For example, one
    reviewer gave a low two-star rating, citing “needs a timer for meters that can
    alert you when the app is closed.” As developers, we see this type of comment
    as a feature request, but disappointed consumers tend to view them as missing
    features. Unfortunately, their “feature requests” are posted as negative ratings,
    which hurt the overall perception of the app and can impact sales. The goal is
    to learn from the mistakes of your competitors in the hopes of avoiding (as much
    as humanly possible) those kinds of reviews. When you are looking at competitors’
    user reviews, focus on what people are saying is wrong with the app. A dissatisfied
    user is someone you can sway if your app fulfills their missing needs.


    Most, if not all, of these apps also fall prey to a ton of negative reviews that
    complain about slow GPS performance and inaccurate GPS results. More often than
    not, these problems aren’t caused by faulty programming, but are due to the user’s
    current signal strength and the GPS shortcomings of older iPhone models. Most
    people (especially nontech users) don’t understand the limitations of their mobile
    devices, so they simply blame the app for these issues.


    To work around those GPS-related complaints, most of the developers have stated
    in very clear language in their App Store descriptions that for best results,
    they highly recommend using an iPhone 3G, 3GS, or iPhone 4, which offers much
    improved GPS location accuracy. But it would appear that many users are not taking
    the time to read the disclaimers in the App Store descriptions, and then they
    get upset when the app does not perform well on their iPod touch devices (which
    lack true GPS).'
