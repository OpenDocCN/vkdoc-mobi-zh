- fmt: '### On the iPad’s Larger Display


    On the iPad’s larger display, you have more screen real estate, so it’s easier
    to insert upgrade information for the paid version in a popover window (`UIPopover`)
    or a centered modal view (`UIModalPresentationFormSheet`) without dominating the
    entire screen. In Illusion Labs’ Labyrinth 2 HD Lite, the menu of free mazes includes
    a small banner ad for the paid version. Tap the banner, and a popover window appears
    with a scrollable description of premium features, screenshots, and an App Store
    buy button (see [Figure 6-6](#9781430262381_Ch06.xhtml#Fig6)).


    ![9781430262381_Fig06-06.jpg](images/9781430262381_Fig06-06.jpg)


    [Figure 6-6](#9781430262381_Ch06.xhtml#_Fig6). Illusion Labs’ Labyrinth 2 HD Lite
    presents the paid version up-sell in a popover window on the iPad


    The beauty of a `UIPopover` is that the `UIView` it displays can be easily reused
    and shown again in another `UIPopover` elsewhere in the app. Beyond the mazes
    that Illusion Labs provides, the company also hosts a free online community where
    customers can upload and share their own contributed maze creations. From within
    the free Labyrinth 2 HD Lite app, users can browse the list of third-party mazes,
    but they will quickly notice that the paid version is required in order to download
    and play those community mazes. That’s a great motivator to upgrade to the full
    game. In the lite version, the download button is conveniently replaced with a
    Full Version Info button. When tapped, that button displays the same paid version
    information in a `UIPopover` as previously seen in other sections of the app (see
    [Figure 6-7](#9781430262381_Ch06.xhtml#Fig7)). The popover window provides the
    upgrade information when needed, without being intrusive to the rest of the interface.


    ![9781430262381_Fig06-07.jpg](images/9781430262381_Fig06-07.jpg)


    [Figure 6-7](#9781430262381_Ch06.xhtml#_Fig7). Requiring Labyrinth 2 HD Lite users
    to buy the paid version in order to download the thousands of free, third-party
    mazes contributed by the Labyrinth community is a great incentive to upgrade


    ### App Rejection Warning


    You should not display the app’s price within your application. When promoting
    the full version within your free lite version, don’t list the price. Apple has
    localized App Stores in many countries around the world, supporting many different
    currencies, so it frowns upon hard-coded prices displayed in your app. Apple’s
    app review team does not always flag this as a cause for rejection, but it happens
    enough that you’ll want to avoid doing it. Beyond the risk of rejection, it’s
    important not to list the price in your app so that you have the flexibility to
    change the App Store price at any time for special sale offers without needing
    to submit an update.


    ### Including Analytics


    It’s important to include analytics in your lite version so that you can track
    how many people are tapping that buy button. Those analytics reports combined
    with your iTunes Connect statistics will help you to determine the effectiveness
    of your lite version as a promotional tool. You’ll know how many people are downloading
    your lite app, how often they use it, how many users tap the buy button, and how
    many sales your paid version is pulling in. With all that data at your fingertips,
    if the conversion rate of lite-to-paid sales is much lower than expected, you
    can experiment with the wording and button placements in subsequent updates in
    an effort to improve results.


    Of course, knowing how customers use your paid app can be just as valuable, so
    if you do add analytics to your development strategy, make sure to wire it into
    all your apps—both lite and paid—for the most comprehensive picture of how they
    are performing. Apple recently changed its rules on what information third-party
    analytics are allowed to collect. To learn the facts on in-app analytics, check
    out [Chapter 7](#9781430262381_Ch07.xhtml).


    **Tip** If you’re an iOS developer, you should join the iTunes Affiliate Program.
    Any links you have pointing to the App Store should be affiliate links. There’s
    no reason not to earn some affiliate commissions for all the traffic you’re sending
    Apple’s way. This means all the buy buttons in your lite version, cross-promotions,
    web site, and so on should be coded with iTunes affiliate links. We’ll be exploring
    the lucrative world of affiliate programs later in this chapter.


    ### Bulletproofing Your Lite Version


    As developers, we work hard to create high-quality products, so no one purposely
    releases buggy software. Showstopper bugs happen to the best of us, but if there
    was ever a time to ramp up your testing and quality-control efforts, it’s with
    your free lite version.


    Since users will be evaluating your lite app to determine whether the paid version
    is worth their hard-earned money, they will be test-driving it with a very critical
    eye. Since it’s free, the app will attract a much broader audience, with many
    people merely kicking the tires out of curiosity. Without any emotional investment
    in the app, people are often quick to make snap judgments. As evidenced by the
    lower ratings of most lite versions compared to their paid-app counterparts, people
    have no problem giving an app a dismal one-star rating for the most minor of reasons.
    Even though the lite version was free, reviews often can be harsh if the experience
    left users frustrated.


    Ensure that your lite version includes ample built-in instructions to help alleviate
    any potential confusion that might arise if someone can’t figure out how to use
    the app. Many lite versions ask users upon launch if they would like to watch
    or read a brief tutorial before exploring the app. Although this does require
    a little extra development effort, it is a very proactive approach that may help
    avoid many of those unwarranted one-star reviews. If you feel your app would benefit
    from offering in-app tutorials, see [Chapter 9](#9781430262381_Ch09.xhtml) for
    details on this topic.


    ### Migrating Data from the Lite Version to the Paid Version


    If users purchase your app, they should not be penalized by losing the data they
    had in the free lite version. If that happens, prepare to receive a slew of negative
    customer reviews in the App Store.


    For most games, there’s nothing to lose, since high-score leaderboards are usually
    stored on a remote server. But what if it’s a productivity app that saves information
    in a plist file or database records?


    Unlike the more flexible environment of desktop operating systems, iOS restricts
    each app to its own data “sandbox” for storing files. App A is not allowed to
    access the saved files from app B, and vice versa. This protects each installed
    app from malicious behavior, but makes it incredibly difficult to share data between
    apps.


    Starting with iOS 3.2, Apple introduced a new built-in file-handling mechanism
    called Document Support, which allows developers to register their app with the
    iOS system to create and/or open specific file types. This is wonderful for apps
    that require their own unique file type (such as a word processor) or offer support
    for popular file types (such as PDF, image, and video formats). This enables a
    file in one app to be opened in or copied to another app that is registered to
    also support that same file type. If you need to transfer some information from
    a plist file or a few database records from your lite version to the paid app,
    this Document Support feature is overkill, adding a lot of programming overhead
    that’s unnecessary in the particular situation.'
