    \ -= iAdHeight;\n\n// Since alternate ad banner is not being used,\n            //\
    \ adjust its position offscreen.\n            altAdPosition += altAdHeight;\n\n\
    // Now adjust onscreen position for iAd banner.\n            iAdPosition -= iAdHeight;\n\
    \n} else {\n            // iAd not available or an error occurred,\n            //\
    \ so show alternate ad banner instead.\n            // For this example, a custom\
    \ house ad is shown,\n            // but the code below could be easily replaced\
    \ to\n            // show an ad from another ad network like AdMob.\n\n// Adjust\
    \ height for contentView above alternative ad banner.\n            viewFrame.size.height\
    \ -= altAdHeight;\n\n// Since iAd is not being used, adjust iAd position offscreen.\n\
                iAdPosition += iAdHeight;\n\n// Now adjust onscreen position for alternate\
    \ ad banner.\n            altAdPosition -= altAdHeight;\n        }\n\n} else {\n\
            // NO, Internet connection is NOT available, so hide ad banner.\n\n//\
    \ Move both banner views offscreen.\n        iAdPosition += iAdHeight;\n        altAdPosition\
    \ += altAdHeight;\n    }\n\n// Slide the requested ad banner into view,\n    //\
    \ and move the other ad banner view offscreen.\n    [UIView animateWithDuration:animationDuration\
    \ animations:^{\n        contentView.frame = viewFrame;\n        [contentView\
    \ layoutIfNeeded];\n        adBannerView.frame = CGRectMake(0.0, iAdPosition,\
    \ adBannerView.frame.size.width,         adBannerView.frame.size.height);\n        altAdBannerButton.frame\
    \ = CGRectMake(0.0, altAdPosition, altAdWidth, altAdHeight);\n    }];\n}\n```\n\
    \nThe difference here is that these two methods have been customized with iPad-specific\
    \ ad banner sizes and screen coordinates to fit the larger dimensions of the tablet’s\
    \ display (see [Figure 7-15](#9781430262381_Ch07.xhtml#Fig15)).\n\n![9781430262381_Fig07-15.jpg](images/9781430262381_Fig07-15.jpg)\n\
    \n[Figure 7-15](#9781430262381_Ch07.xhtml#_Fig15). The iPad target requires modified\
    \ prepareAltAdBanner and adjustAdBannerPosition methods to accommodate iPad-specific\
    \ ad sizes and placement\n\n**Note**  Experienced iOS developers may find the\
    \ similarities between the iPhone and iPad code fairly repetitive. I’ll be the\
    \ first to admit that much of the code could be refactored for sharing between\
    \ the two targets to reduce the redundancy. But there really is a method to my\
    \ madness. The book’s readers are a very diverse bunch, ranging from entry-level\
    \ beginners to advanced programmers. By leaving all of the related code in one\
    \ place for each target, this approach makes it much easier for readers to follow\
    \ the code and quickly learn how the project works, regardless of skill level.\n\
    \nIf you run into any snags incorporating this example code into your own app\
    \ projects, or if you need to build a more advanced solution, check out Apple’s\
    \ extensive iAd documentation available online at the iOS Dev Center:\n\n*   *iAd\
    \ Programming Guide* (`http://developer.apple.com/library/ios/#documentation/UserExperience/Conceptual/iAd_Guide/`)\n\
    *   *iAd Framework Reference* (`http://developer.apple.com/library/ios/#documentation/UserExperience/Reference/iAd_ReferenceCollection/`)\n\
    \nEnabling Live Ads in Your App\n\nBefore submitting your app to the App Store,\
    \ Optime Software’s Jon Schlegel offers some sound advice: “Don’t forget to disable\
    \ the ‘test ad’ mode before you go live in the App Store. I know several developers\
    \ who have forgotten to do that and have lost quite a bit of money as a result\
    \ [from displaying test ads that don’t earn revenue]. We trigger a compiler warning\
    \ in all of our apps when the ‘test ad’ mode is enabled to make sure that we don’t\
    \ go live with the test ads.”\n\nIf you’re using third-party ad networks such\
    \ as AdMob, be sure to check their respective SDK documentation for instructions\
    \ on how to disable the test ad mode (if applicable) before publishing your app\
    \ in the App Store."
  trans: "\n要完成该项目，请务必将 `MainViewController_iPhone.m` 中的新代码添加到其 iPad 版本的 `MainViewController_iPad.m`\
    \ 中。所有新代码应该是相同的，但 `prepareAltAdBanner` 和 `adjustAdBannerPosition` 方法除外，这两个方法包含\
    \ iPad 专用代码，如下所示：\n\n```objc\n- (void)prepareAltAdBanner {\n    // 此方法在屏幕外创建并配置一个自定义的内置广告横幅，\n\
    \    // 以便在 iAd 横幅不可用时使用。但下面的代码可以\n    // 轻松替换为显示其他广告网络（如 AdMob）的广告。\n\n    //\
    \ 根据设备的当前方向创建备用广告横幅。\n    UIImage *altAdImg = [[[UIImage alloc] init] autorelease];\n\
    \    NSString *adBannerImage = [[NSString alloc] init];\n    if (UIInterfaceOrientationIsLandscape([UIDevice\
    \ currentDevice].orientation)) {\n        adBannerImage = @\"adbannerlandscape-ipad.png\"\
    ;\n    } else {\n        adBannerImage = @\"adbannerportrait-ipad.png\";\n   \
    \ }\n    altAdImg = [UIImage imageNamed:adBannerImage];\n\n    UIButton *altButton\
    \ = [[UIButton buttonWithType:UIButtonTypeCustom] autorelease];\n    [altButton\
    \ setBackgroundImage:altAdImg forState:UIControlStateNormal];\n    [altButton\
    \ addTarget:self action:@selector(tappedAltAdBanner) forControlEvents:UIControlEventTouchUpInside];\n\
    \    self.altAdBannerButton = altButton;\n\n    // 初始时，此广告横幅将放置在屏幕外。\n    // 当广告准备好显示后，再将广告横幅显示出来。\n\
    \    CGRect adFrame = CGRectMake(0.0, CGRectGetMaxY(self.view.bounds), altAdImg.size.width,\
    \ altAdImg.size.height);\n    self.altAdBannerButton.frame = adFrame;\n\n    //\
    \ 将备用广告横幅添加到父视图。\n    [self.view addSubview:self.altAdBannerButton];\n    [adBannerImage\
    \ release];\n}\n\n- (void)adjustAdBannerPosition:(BOOL)animated {\n    // 设置一些用于计算位置和动画的初始属性。\n\
    \    CGFloat animationDuration = animated ? 0.3 : 0.0;\n    CGRect viewFrame =\
    \ self.view.bounds;\n    CGFloat iAdPosition = self.view.frame.size.height;\n\
    \    CGFloat iAdHeight = 0.0;\n    CGFloat altAdPosition = self.view.frame.size.height;\n\
    \    CGFloat altAdWidth = 0.0;\n    CGFloat altAdHeight = 0.0;\n    UIImage *altAdImage\
    \ = [[[UIImage alloc] init] autorelease];\n\n    if (UIInterfaceOrientationIsLandscape([UIDevice\
    \ currentDevice].orientation)) {\n        // 横屏 iPad 高度：768 - 20 像素状态栏 = 748。\n\
    \        adBannerView.currentContentSizeIdentifier = ADBannerContentSizeIdentifierLandscape;\n\
    \        iAdPosition = 748.0;\n        // 横屏 iAd 横幅尺寸：宽 1024，高 66。\n        iAdHeight\
    \ = adBannerView.frame.size.height;\n        altAdImage = [UIImage imageNamed:@\"\
    adbannerlandscape-ipad.png\"];\n        altAdPosition = 748.0;\n    } else {\n\
    \        // 竖屏 iPad 高度：1024 - 20 像素状态栏 = 1004。\n        adBannerView.currentContentSizeIdentifier\
    \ = ADBannerContentSizeIdentifierPortrait;\n        iAdPosition = 1004.0;\n  \
    \      // 竖屏 iAd 横幅尺寸：宽 768，高 66。\n        iAdHeight = adBannerView.frame.size.height;\n\
    \        altAdImage = [UIImage imageNamed:@\"adbannerportrait-ipad.png\"];\n \
    \       altAdPosition = 1004.0;\n    }\n    [altAdBannerButton setBackgroundImage:altAdImage\
    \ forState:UIControlStateNormal];\n    altAdWidth = altAdImage.size.width;\n \
    \   altAdHeight = altAdImage.size.height;\n\n    // 检查网络连接状态，以决定是否显示广告。\n    if\
    \ (isNetAvailable) {\n        // 是，网络可用，因此显示广告横幅。\n\n        if (adBannerView.bannerLoaded)\
    \ {\n            // iAd 已成功加载到广告横幅中，\n            // 因此将其滑入视图。同时调整 contentView\
    \ 的高度\n            // 为底部的广告横幅腾出空间。\n\n            // 调整 iAd 横幅上方 contentView\
    \ 的高度。\n            viewFrame.size.height -= iAdHeight;\n\n            // 由于未使用备用广告横幅，\n\
    \            // 将其位置调整到屏幕外。\n            altAdPosition += altAdHeight;\n\n   \
    \         // 现在调整 iAd 横幅在屏幕上的位置。\n            iAdPosition -= iAdHeight;\n    \
    \    } else {\n            // iAd 不可用或发生错误，\n            // 因此改为显示备用广告横幅。\n  \
    \          // 在此示例中，显示的是自定义的内置广告，\n            // 但下面的代码可以轻松替换为\n            //\
    \ 显示其他广告网络（如 AdMob）的广告。\n\n            // 调整备用广告横幅上方 contentView 的高度。\n      \
    \      viewFrame.size.height -= altAdHeight;\n\n            // 由于未使用 iAd，将 iAd\
    \ 位置调整到屏幕外。\n            iAdPosition += iAdHeight;\n\n            // 现在调整备用广告横幅在屏幕上的位置。\n\
    \            altAdPosition -= altAdHeight;\n        }\n    } else {\n        //\
    \ 否，网络不可用，因此隐藏广告横幅。\n\n        // 将两个横幅视图都移出屏幕。\n        iAdPosition += iAdHeight;\n\
    \        altAdPosition += altAdHeight;\n    }\n\n    // 将请求的广告横幅滑入视图，\n    //\
    \ 并将另一个广告横幅视图移出屏幕。\n    [UIView animateWithDuration:animationDuration animations:^{\n\
    \        contentView.frame = viewFrame;\n        [contentView layoutIfNeeded];\n\
    \        adBannerView.frame = CGRectMake(0.0, iAdPosition, adBannerView.frame.size.width,\
    \ adBannerView.frame.size.height);\n        altAdBannerButton.frame = CGRectMake(0.0,\
    \ altAdPosition, altAdWidth, altAdHeight);\n    }];\n}\n```\n\n这里的区别在于，这两个方法已根据\
    \ iPad 专用的广告横幅尺寸和屏幕坐标进行了定制，以适应平板电脑显示屏更大的尺寸（参见图 7-15）。\n\n![9781430262381_Fig07-15.jpg](img/9781430262381_Fig07-15.jpg)\n\
    \n图 7-15. iPad 目标需要修改 `prepareAltAdBanner` 和 `adjustAdBannerPosition` 方法，以适应 iPad\
    \ 专用的广告尺寸和位置\n\n**注意** 经验丰富的 iOS 开发者可能会觉得 iPhone 和 iPad 代码之间的相似性相当重复。我第一个承认，很多代码本可以重构以在两个目标之间共享，从而减少重复。但这种看似疯狂的做法自有其道理。本书的读者群体非常多样化，从入门级新手到高级程序员。通过将所有相关代码保留在每个目标的同一个位置，这种方法使读者更容易跟随代码并快速了解项目的工作原理，无论其技术水平如何。\n\
    \n如果在将示例代码整合到自己的应用程序项目中遇到任何障碍，或者需要构建更高级的解决方案，请查看 Apple 在 iOS Dev Center 在线提供的详尽\
    \ iAd 文档：\n\n- *iAd Programming Guide* (`http://developer.apple.com/library/ios/#documentation/UserExperience/Conceptual/iAd_Guide/`)\n\
    - *iAd Framework Reference* (`http://developer.apple.com/library/ios/#documentation/UserExperience/Reference/iAd_ReferenceCollection/`)\n\
    \n## 在您的应用中启用实时广告\n\n在将应用提交到 App Store 之前，Optime Software 的 Jon Schlegel 提供了一些可靠的建议：“别忘了在上线\
    \ App Store 之前禁用‘测试广告’模式。我知道有几个开发者忘记这样做，结果损失了不少钱（因为显示的测试广告不会产生收入）。我们在所有应用中，当‘测试广告’模式启用时，都会触发编译器警告，以确保我们不会带着测试广告上线。”\n\
    \n如果您使用的是第三方广告网络（如 AdMob），请务必在 App Store 发布应用之前，查阅其相应的 SDK 文档，了解如何禁用测试广告模式（如适用）。\n"
- fmt: '# For iAd


    Activating live ad banners within your app requires a few steps in `iTunes Connect`.
    You’ll need to first upload your app to `iTunes Connect`, and then within the
    `Manage Your Applications` section of the online portal, enable `iAd` for that
    application listing. Once your app is available in the `App Store`, you’ll be
    able to monitor and track your `iAd` performance and revenue via the `iAd Network`
    module in `iTunes Connect`.


    ## Knowledge Is Power: Tracking App Usage Through Analytics


    Any successful web developer understands the immense value of tracking web site
    traffic statistics with tools like `Google Analytics`. Mobile applications are
    no different. Knowing as much as possible about your users’ demographics and their
    usage patterns will help you to make better development and marketing decisions.
    How much time do they spend using your app? Which features are popular, and which
    ones are rarely accessed? Having this kind of knowledge at your fingertips will
    empower you with the ability to improve your app’s user experience and sales potential.


    In 2010, Apple revised its policy on in-app analytics, prohibiting apps from collecting
    and sending device-related data to a third party (such as an analytics service).
    Apple still allows in-app analytics, but only if the transmitted data is directly
    relevant to in-app advertising or the use of the app. Because of this major policy
    change, it appears the only analytics services that remain compliant are the ones
    integrated with some kind of in-app advertising solution.


    Here are a few analytics services to consider:


    -   Flurry (`http://www.flurry.com`)

    -   Mobclix (`http://www.mobclix.com`)

    -   Medialets Analytics (`http://www.medialets.com`)

    -   App Annie (`http://appannie.com`)

    -   Parse (`http://parse.com`)

    -   Google App Analytics (`https://www.google.com/analytics/mobile/`)


    `Mobclix` and `Medialets` both offer mobile advertising solutions, so if you currently
    use one of those companies for in-app advertising, you also benefit from the comprehensive
    app analytics features that are integrated into their respective SDKs. `Flurry`
    provides an innovative `AppCircle` advertising option for app recommendations
    and cross-promotions as part of its popular analytics SDK to comply with Apple’s
    terms.


    Even though in-app analytics services collect anonymous, aggregated data, consumers
    are becoming more and more protective of their privacy. If you do plan on integrating
    analytics into your app, I recommend that you let users know up-front what kind
    of information you’re collecting, and give them a convenient in-app method to
    opt out. The popular ad-supported, free app, `AroundMe`, provides this courtesy
    (see [Figure 7-16](#9781430262381_Ch07.xhtml#Fig16)).


    ![9781430262381_Fig07-16.jpg](images/9781430262381_Fig07-16.jpg)


    [Figure 7-16](#9781430262381_Ch07.xhtml#_Fig16). `AroundMe` notifies users of
    analytics data that the free, ad-supported app collects and provides a convenient,
    in-app method to opt out


    Even with Apple’s restrictions, acceptable in-app analytics are still being approved
    in the `App Store`, so don’t let this shift in policy deter you from exploring
    how analytics can improve your own development efforts. Thousands of apps in the
    `App Store` still actively employ in-app analytics.


    Take the time to plan an effective analytics strategy that not only provides you
    with valuable app usage data, but also gives you the peace of mind that your app
    complies with Apple’s terms and satisfies consumer privacy needs.


    ## Contemplating Sponsorships and Product Placement Deals


    Similar to in-app advertising, sponsorships and product placement offer an innovative
    way to monetize a free lite version, but they’re typically more tightly integrated
    within the app than traditional advertising. This provides a much more elegant
    solution for users, while enabling the sponsor to directly connect with a very
    targeted audience. Since the sponsor would be eager to promote its affiliation
    with the app, the added marketing support can help reinvigorate interest in an
    existing app, bringing a flood of new users that you can later up-sell additional
    paid content and other apps.


    `Firemint`’s `Real Racing` is one of the most popular racing games in the `App
    Store`. Possibly for fear of cannibalizing sales of the paid version, the developers
    initially opted not to release a free lite app. But that soon changed. By partnering
    with `Volkswagen`, `Firemint` was able to offer a free `Real Racing GTI` version
    in the `App Store`. `Real Racing GTI` features the same game engine as the original
    `Real Racing` app, but all the race cars are the new 2010 `Volkswagen GTI` models.
    Even the sponsor stickers and track billboards are `Volkswagen` ads (see [Figure
    7-17](#9781430262381_Ch07.xhtml#Fig17)). The game also includes a virtual showroom,
    providing a closer look at the `GTI`.


    ![9781430262381_Fig07-17.jpg](images/9781430262381_Fig07-17.jpg)


    [Figure 7-17](#9781430262381_Ch07.xhtml#_Fig17). `Firemint`’s free `Real Racing
    GTI` game features 2010 `Volkswagen GTI` race cars and sponsored billboards on
    the racetrack


    With this sponsored product placement deal, `Volkswagen` can promote its 2010
    `GTI` to this highly targeted audience, and `Firemint` now has a way to monetize
    the free lite version. With the free `Real Racing GTI` game available to a greater
    number of users, it also presents `Firemint` with a much bigger audience to up-sell
    the additional features in the paid version of `Real Racing` and its sequel, `Real
    Racing 2`.


    Even the app icon for `Real Racing` was customized to better promote the sponsored
    version. Not only does the altered app icon help differentiate the free version
    from the original paid game, but it’s also an important visual element within
    the `App Store` that helps reinforce the sponsor’s brand (see [Figure 7-18](#9781430262381_Ch07.xhtml#Fig18)).


    ![9781430262381_Fig07-18.jpg](images/9781430262381_Fig07-18.jpg)


    [Figure 7-18](#9781430262381_Ch07.xhtml#_Fig18). The custom app icon (right) helps
    differentiate the free version from the original paid game (left) and serves as
    an important visual element within the `App Store` that reinforces the sponsor’s
    brand


    As evident by the success of `Real Racing GTI`, partnering with a sponsor can
    breathe new life into an existing app, extending its reach to a much larger audience
    with a free version. In fact, this approach proved so popular that `Firemint`
    expanded the concept in the paid sequel. `Real Racing 2` features 30 officially
    licensed cars that you can race in the game, including `BMW`, `Chevrolet`, `Ford`,
    `Jaguar`, `Lotus`, and several other brands.


    Obviously, these kinds of sponsorship deals are not appropriate for all apps.
    For example, if your iOS app is a mobile guide to the latest movies and local
    theaters, then recruiting `Warner Bros.` as the exclusive sponsor would present
    a conflict of interest when listing new movies from other studios such as `Universal`
    and `Paramount`. And if your app’s subject matter is too broad or your app does
    not currently reach enough people, you may have trouble finding an interested
    sponsor. Companies are in the business of selling more products, so a sponsorship
    proposal would be appealing only if your app can deliver a large audience in a
    very targeted market.


    ## The Tipping Point


    Whew! This was a long chapter, jam-packed with a lot of information to digest.
    But with the insatiable consumer demand for free apps, learning how to monetize
    your development efforts with mobile advertising is time well spent. Ready for
    more?'
