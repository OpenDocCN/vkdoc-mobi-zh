    # 寻找原创应用创意


    有时最酷的创意思路往往是最简单的概念，就藏在我们眼皮底下。身为开发者，我们常常被同行们的成功故事深深吸引（并心生羡慕），因此脑海中最先闪现的冲动往往也是最致命的：如何借助流行趋势的东风来投机取巧。当
    `iFart Mobile` 在 2008 年意外爆红时，大量山寨放屁应用如潮水般涌入 App Store，试图从这股新潮中分一杯羹。跟风的前几款山寨应用或许还能赚到足以回本的销售额，但到了某个节点，App
    Store 便已过度饱和。如今市面上有超过 500 款与放屁相关的应用，消费者找到并购买你新应用的几率微乎其微。面对如此庞大的选择范围，逐一浏览实在太困难，因此消费者更可能选择那些当前排名靠前的最热门应用。自
    iOS 6 引入重新设计的应用商店以来，想获得关注变得难上加难。用户现在必须滑动浏览应用方块，而不是简单查看格式美观的列表；如今你的应用比以往任何时候都更需要脱颖而出。


    难道你不想成为那个开发出被数百名开发者争相模仿的*那款*应用的远见者吗？当然，我们都想。那么，如何去寻找全新且未被挖掘的创意呢？


    ## 审视自身需求与兴趣


    首先，审视一下自己的需求和兴趣。没错，你是一名开发者，但首先你也是一名用户。你是否希望 iPhone 能增加某些缺失的功能？如果有，现有应用是否已提供该功能？没有？嗯，如果这是你想要的功能，那么很可能其他人也渴望同样的东西，甚至愿意为此付费——答案不就来了吗！


    需要注意的是，某些愿望清单上的功能可能成为优秀的功能，但未必能成为出色的应用。例如，被强烈需求的复制粘贴功能最终在 iOS 3 中加入，但它本身并不适合作为独立的应用存在。


    ## 探索你的业余爱好与兴趣


    在科技之外，你有哪些兴趣？关于观鸟者、漫画收藏家、体育迷等题材的成功应用比比皆是。如果你对某个特定爱好充满热情，且尚未找到相关应用，那或许是一个值得填补的绝佳空白。只需记住，爱好越是小众（比如水下编篮——有人吗？），你的潜在客户群就越小。如果你为那个规模虽小却很忠实的北极裸泳爱好者群体开发一款日志应用，你或许能让一群冻得嘴唇发紫的个体感到开心，但可能赚不到多少钱。而将这一想法扩展至涵盖所有水上运动（包括为冲浪者、划船者、游泳者和潜水员提供自定义日志模板），你的日志应用就能大幅扩大潜在客户群，使其成为一个更可行的应用概念。


    关于针对特定小众群体的应用，有一点需要注意：事实证明，用户更有可能为契合他们特定爱好的东西付费。如果你的应用满足了爱好者的需求或渴望，他们花上几美元连想都不会多想。去看看
    App Store 中的“参考”类别，你就能明白我在说什么。


    ## 向亲朋好友取经


    如果你觉得特别缺乏原创想法，不妨向亲朋好友求助。看看他们有哪些具体需求和兴趣适合用移动应用来满足。但无论你做什么，请千万不要在博客、Facebook 页面或通过
    `Twitter` 征求意见。虽然你的粉丝可能会提供一些好建议，但接受他们的反馈会让你面临法律风险。如果你的应用成功了，你可能会被陌生人起诉，指控你窃取了他的想法而未给予充分认可或补偿，而证据则可能是他发给你的存档推文或博客评论。最好只向信得过的亲朋好友征求意见。


    ## 逛逛本地报刊亭


    另一个获取原创想法的好来源是本地报刊亭。虽然这听起来可能有点“老派”，但不要低估翻阅最新杂志的便利性。互联网是一个巨大的数据宝库，但你需要知道自己在搜索什么才能找到相关的内容。在报刊亭，你可以快速浏览几十种流行杂志类型。纸质印刷成本高昂，所以如果有一本月刊专门关注某个主题，那很可能意味着有足够多的人对此感兴趣，值得进一步探索。真正的问题在于，要弄清楚这些读者中有多大比例是精通科技的，并且要么计划拥有要么已经拥有
    iOS 设备。如果该杂志有网站，那是个不错的起点。查看它是否有活跃的在线论坛、RSS 订阅、播客或 `Twitter` 账号。只需花几分钟阅读那里的帖子，就能对该杂志的读者群有个不错的了解。


    同时，看看杂志的广告商是否在推广计算机或移动相关的解决方案。例如，写作类杂志会刊登多款软件工具的广告，这些工具帮助作者处理写作业务和故事创作流程中的各种环节。App
    Store 中已有几款移动写作工具来帮助作者整理笔记和故事创意，但有没有应用能让自由撰稿人追踪向潜在出版商提交稿件后的处理状态呢？


    ## 将调查转向线上


    既然你大致了解了搜索方向，是时候将调查转移到互联网上了。早在 2009 年我编写本书第一版时，已有几款桌面软件程序和基于订阅的网站提供那种稿件追踪服务，但却没有任何
    iPhone 应用来处理这一特定任务。当时看来，这个移动应用概念的市场似乎完全开放。


    命运弄人，几个月后，Andrew Nicolle 发布了他的 iPhone 和 iPad 应用 `Story Tracker` 来满足这一需求。这里的关键点是，如果你确实偶然发现了一个未开发的市场，最好尽快开始开发你的应用。如果你发现了一个新领域，我保证*至少*有十几个其他开发者也在考虑类似的应用概念。时间至关重要。记住这句经典（且非常贴切）的话：“世上没有原创的想法，谁先做谁就赢。”


    ## 关于营销的最后一点说明


    当满足现有需求时，你是在向已知的目标受众销售。但如果你引入一个与 App Store 中任何东西都截然不同的全新产品概念，请注意，你的营销工作将需要教育消费者，为什么他们应该购买一款他们还不知道自己需要或想要的应用。你的任务就是让他们想要，甚至更好的是，让他们需要这款应用。

