- fmt: '# Customizing Your Profile


    Twitter offers a nice selection of background images and colors to beautify your
    account pages. Although the colors are easy enough to modify, don’t settle for
    the same default themes seen on countless profiles. Be unique and personalize
    your page with your own custom background image and avatar picture. Take advantage
    of this free marketing opportunity to visually showcase your iOS app and brand
    identity!


    Regarding your avatar picture, if you maintain two Twitter accounts—one for your
    company and one for your own personal use—you’ll most likely want to differentiate
    the two by using a corporate logo for the company profile and a photo of yourself
    for the personal profile. For an independent developer using a single Twitter
    account, I highly recommend using a photo of yourself as the profile picture.
    Even though you’ll be tweeting about your software products and iOS news, a photo
    adds a personal touch. People like to see who they are following.


    When I first joined Twitter, I listed Electric Butterfly as the profile name and
    uploaded my company logo as the avatar picture. I didn’t tweet that much, and
    in return, few people followed me. After a couple months of seeing how other people
    operated on Twitter, I decided to follow their lead. I switched the profile name
    to Dave Wooldridge and replaced the avatar with my photo. After I provided a human
    face and name to my Twitter presence, and made a conscious effort to tweet more
    frequently, my follower count began to rapidly increase.


    Although all Twitter clients support the display of avatar pictures, a person’s
    background image is seen only when visiting the profile page on Twitter.com. Even
    then, when viewing the Twitter site on the iPad, the main content is scaled to
    fill the width of the Mobile Safari screen, obscuring the background image. And
    on the iPhone, Mobile Safari loads a mobile-optimized version of Twitter, which
    excludes custom backgrounds. But none of that minimizes the importance of customizing
    your profile’s background image. Many people will check out your profile page
    from a desktop web browser before deciding whether to follow you.


    In the Design section of Twitter’s Settings page, you can upload your own custom
    background image file. Since this is a valuable piece of screen real estate, the
    background should be designed to effectively promote your company or iOS app,
    without being hidden by the main Twitter content centered within the browser.
    To accommodate most common screen dimensions, this requires a design theme that’s
    planted in the top-left corner and extends outward to the right and down. Take
    a look at several custom backgrounds. Check out the great collection from real
    Twitter accounts at the fun site `http://twitterbackgroundsgallery.com`, and you’ll
    see what I mean.


    With large monitors with high resolutions of 1280 × 800, 1900 × 1200, or even
    higher, it’s recommended that your background image be at least 1600 pixels wide.
    Since web browsers are not usually maximized full width on such large screens,
    that size should work fine. But web pages scroll down, so the chances are greater
    that a web browser’s height may span from top to bottom on the screen. For best
    results, set your image height to a minimum of 1300 pixels.


    If your image fades to the same solid color as the background color, then the
    image can be much shorter. When Twitter’s Tile Background setting is left unchecked,
    the background color will show through where the image ends, but with the color
    the same, it will appear seamless to the viewer. This is the approach used in
    the example background image designed to promote the fictional Breadcrumbs app
    (see [Figure 10-14](#9781430262381_Ch10.xhtml#Fig14)). The background image is
    only 700 pixels tall, yet because the background color is set to the same brown
    as the ground beneath the car, it creates the illusion that the ground continues
    far below it.


    ![9781430262381_Fig10-14.jpg](images/9781430262381_Fig10-14.jpg)


    [Figure 10-14](#9781430262381_Ch10.xhtml#_Fig14). A Twitter background image design
    for the fictional Breadcrumbs app, leaving plenty of empty space for the main
    Twitter page content that will be centered on the screen


    Looking at [Figure 10-14](#9781430262381_Ch10.xhtml#Fig14), notice that the iPhone
    app graphics are positioned in the far-top-left area, leaving the rest of the
    image fairly empty, with nothing but the simple horizon line and the navigational
    breadcrumbs leading off the screen. This was done intentionally so that there
    is ample room for the main Twitter page content that will be displayed in the
    center of the browser screen. The trick is to create something unique and compelling,
    without being visually overpowering.


    Based on average screen sizes, I recommend limiting your primary design elements
    to 180 pixels wide by 660 pixels tall in the top-left corner of the background
    image. Confining your main graphics to that safe area helps prevent your background
    visual from being obscured by the Twitter page content (see [Figure 10-15](#9781430262381_Ch10.xhtml#Fig15)).
    Since Twitter’s content area is fairly wide, you may want to try limiting your
    design area’s width to less than 180 pixels to accommodate smaller screens, such
    as laptops.


    ![9781430262381_Fig10-15.jpg](images/9781430262381_Fig10-15.jpg)


    [Figure 10-15](#9781430262381_Ch10.xhtml#_Fig15). Limiting your primary graphics
    to 180 pixels wide (or less) in the top-left corner ensures that imagery won’t
    be obscured by the main Twitter content when viewed on most desktop computer screens


    For those of you who think the inclusion of the iPhone app’s site URL in [Figure
    10-15](#9781430262381_Ch10.xhtml#Fig15)’s background is a little too much, let
    me be the first to say it really is quite effective. Not because everyone seems
    to be doing it (they are), but because it actually works!


    After changing my own Twitter background image to promote a few of my Electric
    Butterfly products with web site domain names listed, I began receiving a lot
    more tweets asking about those products. I also saw a significant increase in
    traffic to those URLs. I was surprised by this, since you can’t add active hyperlinks
    to a Twitter background image, which means that people are forced to manually
    type that URL into their browser to visit that site. But if followers are curious
    enough, they’ll do it, especially if the URL is short and easy to remember (yet
    another reason for registering a dedicated domain name for your app’s web site).


    Last, but not least, when customizing your Twitter profile, don’t forget to add
    some brief information about yourself and your app to the Bio field and your site’s
    URL in the Web field. People want to know who you are and what you do. I personally
    won’t follow anyone who leaves those fields blank. And the beauty of your profile’s
    bio text and web URL is that they are accessible in all Twitter client apps and
    web browsers—even those that don’t support Twitter’s custom background images.


    ## Keywords and Hashtags


    Before you dash off your next tweet, it’s important to know that the wording of
    your message can greatly impact its success in reaching the right audience. You
    want to use words that are quickly identified by readers scanning the timeline
    and searching Twitter for specific keywords.


    For example, if you’re talking about your iPhone app in a tweet, don’t refer to
    it as a generic “app.” You know it’s an iPhone or iPad app, but those new to you,
    who came via a retweet or Twitter search, may not know which platform your app
    supports. Most people will search for *iPhone* or *iPad*, so always include the
    supported device name in product-related tweets.'
  raw: 'Customizing Your Profile


    Twitter offers a nice selection of background images and colors to beautify your
    account pages. Although the colors are easy enough to modify, don’t settle for
    the same default themes seen on countless profiles. Be unique and personalize
    your page with your own custom background image and avatar picture. Take advantage
    of this free marketing opportunity to visually showcase your iOS app and brand
    identity!


    Regarding your avatar picture, if you maintain two Twitter accounts—one for your
    company and one for your own personal use—you’ll most likely want to differentiate
    the two by using a corporate logo for the company profile and a photo of yourself
    for the personal profile. For an independent developer using a single Twitter
    account, I highly recommend using a photo of yourself as the profile picture.
    Even though you’ll be tweeting about your software products and iOS news, a photo
    adds a personal touch. People like to see who they are following.


    When I first joined Twitter, I listed Electric Butterfly as the profile name and
    uploaded my company logo as the avatar picture. I didn’t tweet that much, and
    in return, few people followed me. After a couple months of seeing how other people
    operated on Twitter, I decided to follow their lead. I switched the profile name
    to Dave Wooldridge and replaced the avatar with my photo. After I provided a human
    face and name to my Twitter presence, and made a conscious effort to tweet more
    frequently, my follower count began to rapidly increase.


    Although all Twitter clients support the display of avatar pictures, a person’s
    background image is seen only when visiting the profile page on Twitter.com. Even
    then, when viewing the Twitter site on the iPad, the main content is scaled to
    fill the width of the Mobile Safari screen, obscuring the background image. And
    on the iPhone, Mobile Safari loads a mobile-optimized version of Twitter, which
    excludes custom backgrounds. But none of that minimizes the importance of customizing
    your profile’s background image. Many people will check out your profile page
    from a desktop web browser before deciding whether to follow you.


    In the Design section of Twitter’s Settings page, you can upload your own custom
    background image file. Since this is a valuable piece of screen real estate, the
    background should be designed to effectively promote your company or iOS app,
    without being hidden by the main Twitter content centered within the browser.
    To accommodate most common screen dimensions, this requires a design theme that’s
    planted in the top-left corner and extends outward to the right and down. Take
    a look at several custom backgrounds. Check out the great collection from real
    Twitter accounts at the fun site `http://twitterbackgroundsgallery.com`, and you’ll
    see what I mean.


    With large monitors with high resolutions of 1280 × 800, 1900 × 1200, or even
    higher, it’s recommended that your background image be at least 1600 pixels wide.
    Since web browsers are not usually maximized full width on such large screens,
    that size should work fine. But web pages scroll down, so the chances are greater
    that a web browser’s height may span from top to bottom on the screen. For best
    results, set your image height to a minimum of 1300 pixels.


    If your image fades to the same solid color as the background color, then the
    image can be much shorter. When Twitter’s Tile Background setting is left unchecked,
    the background color will show through where the image ends, but with the color
    the same, it will appear seamless to the viewer. This is the approach used in
    the example background image designed to promote the fictional Breadcrumbs app
    (see [Figure 10-14](#9781430262381_Ch10.xhtml#Fig14)). The background image is
    only 700 pixels tall, yet because the background color is set to the same brown
    as the ground beneath the car, it creates the illusion that the ground continues
    far below it.


    ![9781430262381_Fig10-14.jpg](images/9781430262381_Fig10-14.jpg)


    [Figure 10-14](#9781430262381_Ch10.xhtml#_Fig14). A Twitter background image design
    for the fictional Breadcrumbs app, leaving plenty of empty space for the main
    Twitter page content that will be centered on the screen


    Looking at [Figure 10-14](#9781430262381_Ch10.xhtml#Fig14), notice that the iPhone
    app graphics are positioned in the far-top-left area, leaving the rest of the
    image fairly empty, with nothing but the simple horizon line and the navigational
    breadcrumbs leading off the screen. This was done intentionally so that there
    is ample room for the main Twitter page content that will be displayed in the
    center of the browser screen. The trick is to create something unique and compelling,
    without being visually overpowering.


    Based on average screen sizes, I recommend limiting your primary design elements
    to 180 pixels wide by 660 pixels tall in the top-left corner of the background
    image. Confining your main graphics to that safe area helps prevent your background
    visual from being obscured by the Twitter page content (see [Figure 10-15](#9781430262381_Ch10.xhtml#Fig15)).
    Since Twitter’s content area is fairly wide, you may want to try limiting your
    design area’s width to less than 180 pixels to accommodate smaller screens, such
    as laptops.


    ![9781430262381_Fig10-15.jpg](images/9781430262381_Fig10-15.jpg)


    [Figure 10-15](#9781430262381_Ch10.xhtml#_Fig15). Limiting your primary graphics
    to 180 pixels wide (or less) in the top-left corner ensures that imagery won’t
    be obscured by the main Twitter content when viewed on most desktop computer screens


    For those of you who think the inclusion of the iPhone app’s site URL in [Figure
    10-15](#9781430262381_Ch10.xhtml#Fig15)’s background is a little too much, let
    me be the first to say it really is quite effective. Not because everyone seems
    to be doing it (they are), but because it actually works!


    After changing my own Twitter background image to promote a few of my Electric
    Butterfly products with web site domain names listed, I began receiving a lot
    more tweets asking about those products. I also saw a significant increase in
    traffic to those URLs. I was surprised by this, since you can’t add active hyperlinks
    to a Twitter background image, which means that people are forced to manually
    type that URL into their browser to visit that site. But if followers are curious
    enough, they’ll do it, especially if the URL is short and easy to remember (yet
    another reason for registering a dedicated domain name for your app’s web site).


    Last, but not least, when customizing your Twitter profile, don’t forget to add
    some brief information about yourself and your app to the Bio field and your site’s
    URL in the Web field. People want to know who you are and what you do. I personally
    won’t follow anyone who leaves those fields blank. And the beauty of your profile’s
    bio text and web URL is that they are accessible in all Twitter client apps and
    web browsers—even those that don’t support Twitter’s custom background images.


    Keywords and Hashtags


    Before you dash off your next tweet, it’s important to know that the wording of
    your message can greatly impact its success in reaching the right audience. You
    want to use words that are quickly identified by readers scanning the timeline
    and searching Twitter for specific keywords.


    For example, if you’re talking about your iPhone app in a tweet, don’t refer to
    it as a generic “app.” You know it’s an iPhone or iPad app, but those new to you,
    who came via a retweet or Twitter search, may not know which platform your app
    supports. Most people will search for *iPhone* or *iPad*, so always include the
    supported device name in product-related tweets.'
  trans: '

    # 自定义个人资料


    Twitter 提供了精美的背景图片和颜色选择，可用于美化你的账户页面。虽然颜色很容易修改，但不要满足于无数个人资料中都使用的相同默认主题。用自己定制的背景图片和头像图片，让你的页面独一无二、展现个性。利用这一免费的营销机会，直观地展示你的
    iOS 应用和品牌形象！


    关于你的头像图片，如果你维护两个 Twitter 账户——一个用于公司，一个用于个人使用——你很可能会想通过为公司资料使用公司标识、为个人资料使用自己的照片来区分两者。对于使用单个
    Twitter 账户的独立开发者，我强烈建议使用你自己的照片作为个人资料图片。即使你会发布关于软件产品和 iOS 新闻的推文，照片也能增添个人色彩。人们喜欢看到自己关注的人是谁。


    当我最初加入 Twitter 时，我将个人资料名称设为 Electric Butterfly，并上传了公司标识作为头像图片。我发的推文不多，结果很少有人关注我。在观察了其他人在
    Twitter 上的运作方式几个月后，我决定效仿他们的做法。我将个人资料名称改为 Dave Wooldridge，并用我的照片替换了头像。当我为我的 Twitter
    形象提供了一个真实面孔和姓名，并有意更频繁地发布推文后，我的关注者数量开始迅速增长。


    虽然所有 Twitter 客户端都支持显示头像图片，但一个人的背景图片只有在访问 Twitter.com 上的个人资料页面时才能看到。即便如此，在 iPad
    上查看 Twitter 网站时，主要内容会缩放以填充 Mobile Safari 屏幕的宽度，从而遮挡背景图片。而在 iPhone 上，Mobile Safari
    会加载针对移动设备优化的 Twitter 版本，该版本排除了自定义背景。但这些都不会降低自定义个人资料背景图片的重要性。许多人会在决定是否关注你之前，通过桌面网页浏览器查看你的个人资料页面。


    在 Twitter 设置页面的“设计”部分，你可以上传自己的自定义背景图片文件。由于这是宝贵的屏幕空间，背景的设计应能有效推广你的公司或 iOS 应用，而不会被浏览器中央的
    Twitter 主要内容所遮挡。为了适应最常见的屏幕尺寸，这需要一个设计主题，该主题位于左上角，并向右侧和下方延伸。看看一些自定义背景。在有趣的网站 `http://twitterbackgroundsgallery.com`
    上查看真实的 Twitter 账户的精彩集合，你就会明白我的意思。


    对于分辨率为 1280 × 800、1900 × 1200 甚至更高的宽屏显示器，建议你的背景图片宽度至少为 1600 像素。由于网页浏览器在此类大屏幕上通常不会最大化至全宽，这个尺寸应该没问题。但网页会向下滚动，因此网页浏览器的高度很可能从上到下占满屏幕。为了获得最佳效果，请将图片高度设置为至少
    1300 像素。


    如果你的图片渐变为与背景颜色相同的纯色，那么图片可以短得多。当 Twitter 的“平铺背景”设置未被选中时，图片结束处会透出背景颜色，但由于颜色相同，在查看者看来会是无缝的。这正是为推广虚构应用
    Breadcrumbs 而设计的示例背景图片所采用的方法（见图 10-14）。该背景图片仅有 700 像素高，但由于背景颜色设置为与汽车下方的地面相同的棕色，造成了地面在其下方无限延伸的错觉。


    ![9781430262381_Fig10-14.jpg](img/9781430262381_Fig10-14.jpg)


    图 10-14. 为虚拟应用 Breadcrumbs 设计的 Twitter 背景图片，为中心显示的 Twitter 主要内容页面留下了充足的空白空间


    查看 图 10-14，注意 iPhone 应用图形位于最左上角区域，图片其余部分相当空旷，只有简单的地平线和引向屏幕之外的导航面包屑路径。这是有意为之，以便为将在浏览器屏幕中央显示的
    Twitter 主要内容页面留出充足空间。技巧在于创造出独特而引人注目的内容，同时又不至于在视觉上过于强势。


    基于平均屏幕尺寸，我建议将主要设计元素限制在背景图片左上角宽 180 像素、高 660 像素的区域内。将主要图形限制在这个安全区域内，有助于防止你的背景视觉效果被
    Twitter 页面内容遮挡（见图 10-15）。由于 Twitter 的内容区域相当宽，你可能想尝试将设计区域的宽度限制在 180 像素以内，以适应较小的屏幕，比如笔记本电脑。


    ![9781430262381_Fig10-15.jpg](img/9781430262381_Fig10-15.jpg)


    图 10-15. 将主要图形限制在左上角 180 像素宽（或更少）的范围内，可确保在大多数台式机电脑屏幕上查看时，图像不会被 Twitter 主要内容遮挡


    对于你们中认为 图 10-15 背景中包含 iPhone 应用网站 URL 有些过分的人，让我第一个说这确实非常有效。不是因为似乎每个人都在这样做（他们确实如此），而是因为它确实管用！


    在我将自己的 Twitter 背景图片更换为推广我的一些 Electric Butterfly 产品并列出网站域名后，我开始收到更多询问这些产品的推文。我还发现这些网址的流量显著增加。这让我很惊讶，因为你不能在
    Twitter 背景图片中添加有效的超链接，这意味着人们必须手动将该网址输入浏览器才能访问该网站。但如果粉丝足够好奇，他们就会这么做，特别是如果网址短且容易记住（这也是为你应用网站注册专用域名的另一个原因）。


    最后但同样重要的是，在自定义你的 Twitter 个人资料时，不要忘记在“简介”字段中添加一些关于你自己和应用的信息，并在“网站”字段中填入你的网站网址。人们想知道你是谁以及你做什么。我个人不会关注那些留空这些字段的人。你的个人资料简介文本和网站网址的妙处在于，它们在所有
    Twitter 客户端应用和网页浏览器中都可以访问——即使是那些不支持 Twitter 自定义背景图片的应用和浏览器。


    ## 关键词和主题标签


    在你匆忙写下下一条推文之前，重要的是要知道你消息的措辞会极大地影响其成功触达目标受众。你需要使用那些能让阅读时间线的用户快速识别，并能通过搜索 Twitter
    特定关键词找到的词语。


    例如，如果在推文中谈论你的 iPhone 应用，不要将其称为一个泛泛的“应用”。你知道它是一个 iPhone 或 iPad 应用，但那些通过转发或 Twitter
    搜索了解到你的新人，可能不知道你的应用支持哪个平台。大多数人会搜索 *iPhone* 或 *iPad*，因此请始终在与应用相关的推文中包含支持的设备名称。

    '
- fmt: '# 排版后的 Markdown 文档


    Don’t assume everyone knows what your app does. If you’re tweeting the iTunes
    App Store link of your application, don’t just post the app name and URL. I know
    the limit is 140 characters, but I’m sure you have a few more characters to spare
    (especially when using a URL-shortener service like `Bit.ly`, as discussed earlier
    in the chapter). Don’t be vague. Oh, it’s a parked-car locator for the iPhone?
    Ah, I could use one of those. And you were kind enough to state “(iTunes)” after
    the URL, warning me that the link will launch iTunes on my computer. Very convenient
    and respectful.


    Besides crafting your tweet with appropriate keywords, hashtags can also be included.
    `Hashtags` are keywords that are preceded with a number (`#`) symbol. What makes
    them special is that Twitter and most third-party clients display hashtags as
    active text links.


    Click a hashtag, and a group of recent tweets that include that same hashtag are
    listed. It’s a great way to increase the discoverability of your tweets by including
    them in popular hashtag groups. People who don’t follow you or even know your
    Twitter ID can stumble on your tweets from a hashtag list.


    Just be careful not to overuse hashtags. Don’t insert a hashtag in every tweet,
    and certainly don’t `#pollute` a `#single` `#tweet` with `#multiple` `#hashtags`,
    or else your posts will be hard to read and look like spam.


    For those select few tweets that are important enough to warrant a little extra
    exposure, convert one of the keywords into a hashtag. If none of your words is
    a popular tag, then tack on the desired hashtag to the end of your tweet. For
    example, when I post valuable links that would benefit fellow iPhone developers,
    I often add the known hashtag `#iphonedev`.


    To help pinpoint existing hashtags and popular search keywords, check out these
    handy resources:


    *   Twitter Search (`http://search.twitter.com`)

    *   Hashtags.org (`http://hashtags.org`)

    *   What the Trend (`http://www.whatthetrend.com`)


    ## Twitter Lists


    Lists represent yet one more reason that the number of followers you have isn’t
    as important as it once was. Within your account on Twitter, you can create a
    new list and give it a unique name. Since Twitter assigns a domain name to it—such
    as `http://twitter.com/ebutterfly/iphonedev`—it’s best to use a name without spaces.


    Lists provide a way to organize people into groups, making it easier to follow
    particular topics. The reason lists chip away the importance of followers is that
    you can follow a list without following all the people in the list. And you can
    create a list of people you don’t follow.


    Some app developers have created lists of their favorite iOS-related Twitterers,
    including fellow developers, review sites, and bloggers. It’s a great way to see
    a daily snapshot of the iOS developer community. A lot of developers follow the
    lists of other developers as a way to connect with the major influencers.


    Creating your own lists can bring new followers to it, so make sure you include
    yourself in your own lists. That’s something many people tend to forget to do.


    If you’ve compiled a great list and submitted to the major Twitter list directories
    like Listorious, newcomers will possibly follow your list and maybe also your
    own Twitter account. It’s yet another way to get discovered on Twitter and reach
    a larger audience with your tweets.


    Don’t just create iOS-related lists. If your app is related to a specific subject
    such as music or writing, create a list for that topic. By creating such lists,
    you can attract new followers who are interested in those subjects. If they own
    an iOS device, then your tweets within those lists will expose your app to potential
    customers who may not have known about it.


    If someone adds you to their list, it means they think your tweets provide enough
    value to warrant being part of a select group. Be sure to thank them for the kind
    gesture. And likewise, if someone follows your list, thank them for it. In such
    an impersonal online world, you might be surprised how much goodwill can be exchanged
    with a simple “thank you.”


    ## Managing the Pipeline


    Everything you post on Twitter (not counting retweets) should drive traffic back
    to your web site. That includes any photos or videos you tweet.


    It’s true that many of the Twitter client apps make it extremely easy to upload
    photos from your iPhone camera to media-sharing sites like Flickr, TwitPic, and
    yfrog, but that’s not an optimal use of your tweets. If people are interested
    enough to check out cool screenshots or video play from your app, you should be
    hosting those media files on your own web site, within web pages that provide
    additional information about your product.


    Even if you’re showing very early alpha screenshots that you don’t want published
    on your main web site, just link to a stand-alone page on your server that serves
    as a sneak preview for your tweets. This way, you get to control the message and
    content on the page. Plus, it can be designed to reflect your app’s visual branding,
    rather than the generic pages of third-party media-sharing sites.


    Remember when I mentioned that you should set up a free account with one of the
    URL shortening services like `Bit.ly`, so that you can track the click-throughs
    and retweets of the links you post on Twitter? If you experiment with two different
    ways to word a tweet about your iOS app, use two different `Bit.ly` URLs, so that
    you can track which word phrasing was more successful in click-throughs. This
    will help you refine your marketing messages as effective, eye-catching tweets!


    For those of you ready to dive deeper into the Twitterverse with advanced management
    tools, check out oneforty’s vast directory of third-party applications and services
    for tracking unfollows, Twitter marketing campaigns, follower locations, spam
    filters, and much more. There really is quite an amazing cottage industry of businesses
    out there based on Twitter—too many to list here. Some of them are less useful
    than others, so tread carefully.


    ## Facebook


    The Facebook SDK for iOS is widely used in the app development world. Facebook
    logins are just as common as Twitter in today’s mobile apps and games. If you
    don’t have a Facebook account already, you’ll want to sign up for one at `http://www.facebook.com`,
    and use that for personal interactions with friends and colleagues.


    Although Facebook has made it extremely easy to interface with its API from within
    an iOS project, your marketing efforts within the social networking site itself
    need to be formulated a little differently than they are in Twitter. Since it’s
    all about growing your audience, all of the same rules of etiquette discussed
    for Twitter also apply to Facebook. The difference here is that while you can
    mix personal and business tweets within a single Twitter account, it’s recommended
    to separate the two in Facebook.


    With Twitter, you can choose not to follow everyone who follows you, but not so
    with Facebook. If someone adds you as a friend in Facebook and you approve the
    request, that person is automatically added to your friends list as well. For
    this reason, you’ll want to create a Facebook Page for your business. For those
    people interested in following your iOS app news and updates, they can simply
    “like” your Facebook Page. This provides you with a way to grow your audience
    without being forced to add each and every one of them to your own personal friends
    list, since those followers are instead added to your Facebook Page’s list of
    fans.


    ### Creating a Facebook Page'
