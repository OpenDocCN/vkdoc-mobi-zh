- fmt: 'A dedicated press section is a good resource to offer, but you’ll definitely
    want to actively send out your press release to the prominent tech and mobile
    news sites as well.


    ## Connecting with the Press


    When contacting specific journalists and bloggers directly, your press release
    should not be the first correspondence they receive from you. As discussed in
    [Chapter 10](#9781430262381_Ch10.xhtml), you should have already initiated a dialogue
    with them during your prerelease marketing stage with a brief query, asking if
    they would be interested in an exclusive preview or reviewing the app. With introductions
    already established, those people will be much more receptive to your press release
    and future announcements. Obviously, you won’t have time to formulate a connection
    with everyone, but you should do this for the most important and influential reporters
    and bloggers on your list.


    Beyond your initial introduction, the other vital elements to master when communicating
    with the press are presentation, delivery logistics, and etiquette.


    ## Formatting Your E-mail Announcement


    A nicely formatted press release with your company logo looks great, but don’t
    send that out as a PDF attached to an e-mail message that merely asks journalists
    to read the attachment. Not only is that a surefire way to have your e-mail ignored,
    but it’s also a common flag for spam filters. If your e-mail address has not been
    whitelisted by the press members you’re attempting to reach (yet another reason
    to establish a relationship with them beforehand), your e-mail with attachments
    may accidentally get marked as junk mail. And for those sites that automatically
    post press releases that are e-mailed to their mail bots, sending the press release
    in an e-mail attachment makes it close to impossible for their automated scripts
    to parse your announcement text.


    Your e-mail should include your entire press release in the body of the message,
    with the subject headline as the e-mail’s subject line. Don’t format the text
    as styled rich text or as a fancy HTML e-mail. To enable journalists and mail
    bots to easily copy the press release, use the tried-and-true plain-text e-mail
    format.


    Since word processors such as Microsoft Word tend to insert curly quotes, curly
    apostrophes, long dashes, and other special characters, you’ll want to ensure
    your press release is converted to standard ASCII plain text. Although your e-mail
    application may support Unicode characters, many web sites still publish HTML
    pages with an ASCII text-related content type such as `ISO-8859-1`. News sites
    often copy and paste your text directly to the Web, without first converting it
    into HTML entities. If your press release contains special characters, it may
    be displayed online with strange question mark symbols representing the unrecognizable
    characters. This not only makes your press release look unprofessional, but it
    can also render it difficult to read.


    For the same reasons that you should not include your press release as an e-mail
    attachment, do not include screenshots of your iOS app as attachments. If you
    know the journalist who is receiving your e-mail, then attaching one or two screenshots
    is perfectly acceptable. However, for most cases, you should include only direct
    URL links to your screenshots and video trailer. This provides immediate access
    to your screenshots and other press materials, without the issues that often plague
    e-mail attachments.


    When listing URLs within your e-mail message, always include the full URL, complete
    with the `http://` prefix. Most modern e-mail programs will dynamically display
    full `http` URLs as clickable links, but that’s not always the case for partial
    URLs that start only with `www`.


    ## Who to Notify?


    Now that your press release e-mail is ready to go, to whom should you send it?
    Perform online searches for “iPhone news” and “iPhone app reviews” to find the
    sites and blogs that cover new iOS app announcements.


    If you’re launching an iPad app, you may also want to search for iPad-related
    news sites (although most iPhone news sites cover all things iOS, including the
    iPad). After scanning the search results, you’ll quickly compile a list much more
    comprehensive than the collection of sites I’ve included in this book’s appendix.


    My list in the appendix consists of web sites that specialize in iPhone and iPad
    news and app reviews, and should serve as a good starting point. And since some
    of the major Mac and PC news sites also cover iOS app news, I’ve included a few
    of them there as well. That long list may seem daunting at first glance, but take
    the time to send your press release to as many relevant iOS news sites as possible.
    Remember that they won’t all report on your new app release. The more sites you
    contact, the more potential coverage you’ll get, compensating for any sites that
    ignore your e-mail.


    Before sending press releases and app review requests to any web site or blog,
    first explore the site to learn about any special submission policies that are
    enforced and which staff members handle iOS app news and reviews. Don’t send a
    press release or app review request to a site sight unseen. Doing so is not only
    a waste of your time, but it annoys those site administrators who don’t cover
    mobile app news or your particular app genre. For example, don’t send a press
    release or review inquiry for a productivity app to a games-only site like TouchArcade.com.
    You never want anyone in the media to perceive your submissions as ignorant spam.
    Do your research before contacting specific sites or individual writers.


    If your app targets a specific niche market—such as writing, yoga, or golf—you
    should also make an effort to send your press release to related web sites and
    magazines in those fields. Those sites and magazines like to keep their readers
    informed on the latest related products. Even though not everyone will own an
    iPhone or iPad, targeted coverage in a specific field could help reach new customers
    who don’t ordinarily visit tech sites.


    ## Reaching the Masses


    Not everyone you send a press release is going to post your announcement, but
    if you send it out to a large number of news outlets, you’re bound to get some
    coverage. If your iOS app does not get mentioned on one of your favorite news
    sites, don’t despair.


    If you’re having trouble reaching the right people or getting posted on mainstream
    sites like Google News (`http://news.google.com`), you may want to enlist the
    assistance of a third-party press release distribution service that specializes
    in technology news. Perform an online search for press release distribution, and
    you’ll find dozens of free and commercial services, such as the following:


    - BeeSaved (`http://beesaved.com`)

    - Business Wire (`http://www.businesswire.com`)

    - Games Press (`http://www.gamespress.com`)

    - The Indie Press Release Service (`http://www.gamerelease.net`)

    - iSpreadNews (`http://ispreadnews.com`)

    - Newswire (`http://www.newswire.net`)

    - prMac (`http://prmac.com`)

    - PRWeb (`http://www.prweb.com`)

    - PR Newswire (`http://www.prnewswire.com`)

    - SoftPressRelease (`http://www.softpressrelease.com`)


    Before signing up for a specific service, verify that it will distribute your
    press release to the mainstream news outlets you want to target. But don’t expect
    a service like this to be able to adequately reach smaller, niche iOS news sites—that
    may be a job best suited for you.


    ## Reinforcing Relationships with a Thank-You


    When journalists and bloggers do post stories or reviews on your new app, be sure
    to e-mail a personal thank-you to each one. Even if your press release didn’t
    warrant a spot on their main news site but was just mentioned as a posted link
    on their Twitter account, that’s still coverage that will drive additional traffic
    to your app’s product page in the App Store.'
