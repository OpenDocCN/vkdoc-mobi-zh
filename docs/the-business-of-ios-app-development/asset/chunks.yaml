    an important visual element within the App Store that reinforces the sponsor’s
    brand


    As evident by the success of Real Racing GTI, partnering with a sponsor can breathe
    new life into an existing app, extending its reach to a much larger audience with
    a free version. In fact, this approach proved so popular that Firemint expanded
    the concept in the paid sequel. Real Racing 2 features 30 officially licensed
    cars that you can race in the game, including BMW, Chevrolet, Ford, Jaguar, Lotus,
    and several other brands.


    Obviously, these kinds of sponsorship deals are not appropriate for all apps.
    For example, if your iOS app is a mobile guide to the latest movies and local
    theaters, then recruiting Warner Bros. as the exclusive sponsor would present
    a conflict of interest when listing new movies from other studios such as Universal
    and Paramount. And if your app’s subject matter is too broad or your app does
    not currently reach enough people, you may have trouble finding an interested
    sponsor. Companies are in the business of selling more products, so a sponsorship
    proposal would be appealing only if your app can deliver a large audience in a
    very targeted market.


    The Tipping Point


    Whew! This was a long chapter, jam-packed with a *lot* of information to digest.
    But with the insatiable consumer demand for free apps, learning how to monetize
    your development efforts with mobile advertising is time well spent. Ready for
    more?'
