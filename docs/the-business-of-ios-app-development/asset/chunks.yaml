    17+评级。

    - **暴力与色情**：如果你的应用包含“长时间的血腥或施虐性现实暴力”或“露骨色情内容和裸体”——即苹果内容类型列表中的最后两项——你的应用将被视为不适宜上架
    App Store，不会获得批准。奇怪的是，似乎确实存在一个轻微的灰色地带，允许一定程度的色情主题内容，因为包含列表中第三项“色情内容或裸体”的应用通常会被给予
    17+评级。


    回答这十个分级问题时要格外小心，因为在应用提交审阅后，这些问题就无法修改了。还要记住，你为应用选择的评级也必须反映所有相关应用内购买项目的内容。


    紧接在分级区域下方的是对最终用户许可协议（EULA）的简要说明。默认情况下，如果你没有提供自己的 EULA，那么苹果标准的 App Store EULA 将适用于你的应用。这似乎是大多数
    iOS 开发者选择采用的 EULA。然而，如果在 Michael Schneider 的第 3 章中阅读关于最终用户协议的内容后，你确信应用中的特定功能需要自定义
    EULA，那么只要它符合苹果的最低条款，苹果确实允许你上传自己的 EULA。由于苹果需要在提交时审阅自定义 EULA，这一选项可能会拖慢审批流程。


    ## 第 5 步：上传你的应用图标和屏幕截图


    继续向下滚动冗长的“版本信息”页面，接下来你会遇到一个名为“图像”的区域。这是你上传 1024×1024 像素的应用大图标和屏幕截图的地方。要上传特定元素，请点击其下方的对应“选择文件”按钮，从硬盘中选择文件（见图
    11-14）。


    ![9781430262381_Fig11-14.jpg](img/9781430262381_Fig11-14.jpg)


    图 11-14

