- fmt: '# Version Information Page


    ## Images Section


    The Images section of the Version Information page allows you to choose and upload
    your large 1024 × 1024–pixel app icon and your app screenshots for display in
    the App Store.


    ### App Store Icon


    Since I discussed the need for creating a large, high-quality 1024 × 1024–pixel
    app icon way back in [Chapter 4](#9781430262381_Ch04.xhtml), you should already
    have this icon file prepared and ready to upload. Note that this large icon must
    be the same design as the app icon compiled in your iOS application. Submitting
    app icons that are not identical in design will quickly earn you a rejection letter.


    The 1024 × 1024–pixel icon should be delivered as a flat, square PNG image with
    a 72-dpi resolution and RGB color mode. Do not include layers, masks, or transparencies
    of any kind.


    And this is the most important rule: do not add rounded corners or the beveled
    gloss yourself. The App Store automatically adds those icon effects dynamically,
    but will honor the custom setting of the `UIPrerenderedIcon` key in your application’s
    `Info.plist` file.


    ### App Screenshots


    When submitting your screenshots, they do not need to be uploaded in any particular
    order. Once uploaded, you should see them displayed as thumbnails in the Images
    section. To place them in a specific sequence for the App Store, simply use your
    mouse to drag-and-drop the image thumbnails into the desired order. Your primary
    screenshot should always be the first image on the left.


    Apple prefers receiving Retina-sized screenshots if your app is optimized for
    Retina display. The accepted dimensions for iPhone and iPod touch screenshots
    are as follows:


    - 1136 × 640 or 640 × 1136

    - 640 × 960 or 960 × 640 pixels (Retina display full screen)

    - 600 × 960 or 920 × 640 pixels (Retina display without status bar)

    - 320 × 480 or 480 × 320 pixels (full screen)

    - 300 × 480 or 460 × 320 pixels (without status bar)


    The following are the accepted dimensions for iPad screenshots:


    - 768 × 1024 or 1024 × 768 pixels (full screen)

    - 748 × 1024 or 1004 × 768 pixels (without status bar)


    Like the app icon, screenshots should also be submitted in RGB color at 72 dpi
    with no transparencies, masks, or layers. Supported image formats are PNG, JPEG,
    and TIFF.


    The system may not accept screenshot sizes and image formats that don’t adhere
    to Apple’s specifications.


    **Note** If you’re creating an app listing in iTunes Connect so that you can test
    certain features like In-App Purchase, then screenshots are not required to finish
    the process. After you’ve uploaded your 1024 × 1024 app icon, simply click the
    **Save** button. You can always go back and upload your screenshots to the app
    listing in iTunes Connect when you’re ready to submit your application for App
    Store review.


    Once you’ve completed the Version Information page, click the **Save** button
    to finish creating your app listing.


    ## Your New App Listing in iTunes Connect


    Now when visiting the **Manage Your Applications** section of iTunes Connect,
    you should see your new app listing displayed. Clicking the app’s icon will take
    you to its main summary page (see [Figure 11-15](#9781430262381_Ch11.xhtml#Fig15)).


    ![9781430262381_Fig11-15.jpg](images/9781430262381_Fig11-15.jpg)


    [Figure 11-15](#9781430262381_Ch11.xhtml#_Fig15). Your new app listing’s main
    summary page in iTunes Connect


    On the app’s summary page, you can manage any related In-App Purchase items and
    other attributes. Click the **View Details** button if you need to access and
    edit metadata or screenshots before submitting your app binary for review (see
    [Figure 11-16](#9781430262381_Ch11.xhtml#Fig16)).


    ![9781430262381_Fig11-16.jpg](images/9781430262381_Fig11-16.jpg)


    [Figure 11-16](#9781430262381_Ch11.xhtml#_Fig16). Visit the **View Details** page
    (accessible from your app’s main summary page) to edit various attributes before
    submitting your app binary for review.


    ## Step 6: Support Multiple Languages


    If your application currently supports your primary language only, then you can
    skip this step. Do not select additional languages in iTunes Connect until your
    application actually includes localized support for those languages. Those of
    you who did provide support for multiple languages in your app binary shouldn’t
    go anywhere just yet!


    Within your app summary’s **View Details** page, there is a **Manage Localizations**
    button (see [Figure 11-16](#9781430262381_Ch11.xhtml#Fig16)). Clicking that button
    takes you to localizations page that enables you to designate additional languages
    for display in regional App Stores that support those languages. For example,
    if your application already supports both English and Japanese, you would add
    Japanese as an additional language here. Since English was the primary language
    you selected back in step 1, there’s no need to add English.


    Upon selecting an additional language, you’ll see a new web form that looks almost
    identical to the app metadata form you encountered earlier. The only difference
    is that instead of English, you’ll be submitting localized content for App Store
    metadata elements like the application name, description, keywords, support URL,
    and even an option to upload localized screenshots. If you opt not to submit new
    screenshots for the new language, your primary language screenshots will be used
    by default.


    ## Step 7: Upload Your App Binary for App Store Review


    Earlier in this chapter, you compiled your application for App Store distribution.
    Now that you’ve just finished adding your app listing to iTunes Connect, the very
    last step in the App Store submission process is to upload your app binary.


    Before you continue, take a moment to meticulously review the listed details in
    your iTunes Connect app summary, checking very carefully for any errors or typos.
    Once you upload your app binary, it will be added to the queue for Apple to review,
    and only a select handful of app elements can be later edited in iTunes Connect
    (without requiring an updated submission). In other words, now is the time to
    make sure everything is correct!


    If everything looks good, then proceed to your app’s **View Details** page in
    iTunes Connect (see [Figure 11-16](#9781430262381_Ch11.xhtml#Fig16)) and click
    the blue **Ready to Upload Binary** button in the top-right corner of the screen.
    You’ll be presented with an **Export Compliance** page.


    ### Export Compliance


    Because of current export laws, any products that contain encryption need to be
    authorized for export. The **Export Compliance** page asks if your app contains
    encryption or accesses encryption (see [Figure 11-17](#9781430262381_Ch11.xhtml#Fig17)).


    ![9781430262381_Fig11-17.jpg](images/9781430262381_Fig11-17.jpg)


    [Figure 11-17](#9781430262381_Ch11.xhtml#_Fig17). Before you can upload your app
    binary, iTunes Connect requires you to answer an export compliance question.


    If the answer is **No**, you can move along—just click the **Save** button.


    If the answer is **Yes**, then a few more encryption questions will appear, requiring
    answers before you can proceed. Based on how you answer those additional questions,
    you may be asked to upload a copy of your Commodity Classification Automated Tracking
    System (CCATS) document.


    Since Export Compliance must review and approve your CCATS file before your application
    can be made available in the App Store, be prepared for a longer than normal app
    review period if a CCATS document is required. If you’ve never heard of CCATS
    before, odds are good your app does not fall into this category.


    ### Waiting for Upload App Status


    Now that you’ve initiated a request to upload your app binary, your app’s status
    in iTunes Connect should have changed from **Prepare for Upload** to **Waiting
    for Upload** (see [Figure 11-18](#9781430262381_Ch11.xhtml#Fig18)).'
