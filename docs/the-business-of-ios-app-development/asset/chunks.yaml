- fmt: '# 排版后


    Since Game Center is baked right into iOS, and Apple is heavily promoting apps
    in the App Store that support Game Center with special logo badges and featured
    selections, adding support for Game Center into your game should be a no-brainer.
    But Game Center is the newest kid on the block. It has fewer features than some
    of its rivals and has not yet accumulated the large user base of existing networks
    like the popular OpenFeint. Many developers are integrating support for both Game
    Center and OpenFeint so that their app can provide a more comprehensive set of
    social gaming features and is accessible to the biggest possible audience of gamers.


    If you’re an iOS game developer, I highly recommend exploring all of the social
    gaming platform web sites and easy-to-use SDKs to find the one that best fits
    your specific development and marketing needs. Get started with the following
    list:


    * Apple’s Game Center for Developers (`https://developer.apple.com/devcenter/ios/gamecenter/`)

    * OpenFeint (`http://openfeint.com/`)

    * Scoreloop (`http://scoreloop.com/`)

    * AGON Online (`http://developer.agon-online.com/`)

    * ngmoco’s Plus+ (`http://plusplus.com/`)

    * Chillingo’s Crystal SDK (`http://www.crystalsdk.com/`)


    ## Earning Your Stripes


    This and the previous chapter covered a vast number of topics, and you even played
    around with some code (yeah, I thought you would appreciate that). I told you
    we would be talking about more than just research and marketing concepts.


    You’ve definitely earned yourself a pat on the back and a well-deserved break
    after all you’ve tackled so far. So, go put up your feet and enjoy a few levels
    of your favorite iOS game.


    When you’re ready for more, just turn the page to dive into the next chapter.


    ## Chapter 6: Money for Nothing: When It Pays to Be Free


    Unlike the traditional desktop software world, the App Store currently does not
    allow time-limited or feature-crippled trial versions. To work around this restriction,
    many developers offer an In-App Purchase–supported “freemium” model or a free
    “lite” version of their apps, hoping users will buy in-app content or the separate
    paid edition to gain access to premium features. In this chapter, you’ll learn
    when and how to harness the power of free for effective results, plus how to tap
    into the additional revenue opportunities of affiliate programs.


    ### Generating Revenue from Free Apps


    In [Chapter 4](#9781430262381_Ch04.xhtml), you explored the value of designing
    an eye-catching app icon and elegant UI to help make your app more visually attractive
    in the App Store. But once you have people’s attention, will your screenshots
    be enough to convince them to purchase your app? Don’t think that just because
    your app is priced at only 99 cents everyone will automatically buy it. Most of
    the apps in the Top 25 go for 99 cents, so why should consumers pick your app
    over the thousands of others with the same price? Unfortunately, the current App
    Store ecosystem has a very skewed outlook on pricing, with everyone racing to
    the bottom with lowered prices to gain traction in the Top 100.


    So, what’s a developer to do? Don’t forget the big lesson from the previous chapters:
    your app is its own powerful marketing tool. Let’s take that concept to the next
    level by giving consumers something for free.


    Free? Yes, you read that correctly. Don’t worry. The objective here is still to
    make money. Free is a very powerful motivator to get people to download your product.
    Who doesn’t love to get free stuff? I know I do, and according to the App Store
    statistics, I’m not alone. Although free apps account for only 25 percent of the
    App Store’s catalog, they represent a whopping 95 percent of the total downloads!


    ### Free Strategies


    You can take advantage of this demand for free apps by employing one or more of
    the following strategies:


    * Offer a free lite version of your app to help drive sales for the paid version,
    or use a freemium model with premium features available through In-App Purchase.

    * Give away your app for free to get as many people using it as possible. After
    you’ve cultivated a large loyal customer base that depends on your app, use that
    basic free version to up-sell a separate premium version or In-App Purchase items
    that offer additional “must-have” features.

    * Make your app free, supported by in-app advertising. Implementing mobile ads
    in your app is discussed in [Chapter 7](#9781430262381_Ch07.xhtml).


    Which of those scenarios will work for your particular situation greatly hinges
    on what kind of app you’re developing. For example, in-app advertising may not
    be an appropriate solution for an educational app for kids. Parents may not condone
    apps that advertise to their young children. Also, the majority of users may be
    running the app safely offline on an iPod touch, unreachable by ad network servers.


    And don’t forget about affiliate programs. If your app currently links to an external
    web site that offers an affiliate program, you should be benefiting from the traffic
    you’re sending your affiliates’ way. Do you have a music app that includes links
    to buy selected songs in the iTunes Store? Does your app include web links to
    books on Amazon.com or products listed on eBay? If your app takes advantage of
    affiliate links, you can earn commissions on all sales you drive to those web
    sites.


    ### Try Before You Buy


    As an iOS developer, you’re undoubtedly no stranger to the concept of free lite
    apps. Like me, your iPhone or iPad home screen is probably littered with several
    “pages” of lite apps downloaded from the App Store. And after evaluating them,
    you’ve probably bought the paid versions of at least a few of them. Without the
    ability to try the lite version first, would you have purchased the paid version?
    Maybe not. So, it’s easy to see the enormous value that free lite versions can
    have in boosting paid app sales.


    Developers of desktop software have known this important fact for decades. Making
    trial demo versions available for free download is one of the primary marketing
    tools for selling commercial software. The trial versions of most modern Mac and
    Windows applications offer built-in purchase mechanisms. These enable users to
    easily buy a license online and receive a serial number that unlocks the demo
    app, instantaneously transforming the trial version into the full-featured application.


    Try before you buy. It sounds like a no-brainer for the App Store, right? Unfortunately,
    Apple does not currently allow iOS app developers to offer free trial demos with
    crippled features that can be unlocked by purchasing the app. This limitation
    forced developers to work around the issue by producing two separate versions
    of their app: a free lite version and a paid version that offers additional features
    not found in the lite version. In the first year of the App Store, this was the
    closest anyone got to the “try-before-you-buy” concept.


    When Apple announced the inclusion of the new In-App Purchase feature in the iPhone
    SDK 3.0 back in 2009, developers were hopeful that it would finally solve this
    problem, but that was not quite the case. Even though In-App Purchase does enable
    users to purchase App Store items within an iOS application, Apple is very particular
    about how In-App Purchase is utilized. Free apps are allowed to offer In-App Purchases,
    but this built-in e-commerce API cannot be used to unlock previously crippled
    features, because apps are still prohibited from presenting features as disabled.
    If the free app includes a feature—such as a button in the toolbar—then it must
    be a functional feature. The current implementation of In-App Purchase enables
    developers to provide additional features that are not currently included in the
    app, such as subscription services, new content, and add-on game levels.


    ### Choosing a Path: Lite vs. In-App Purchase'
