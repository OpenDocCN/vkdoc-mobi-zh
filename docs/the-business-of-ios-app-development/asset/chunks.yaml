- fmt: '[Figure 8-1](#9781430262381_Ch08.xhtml#_Fig1). Streaming Colour Studios’ `LandFormer`
    is a great example of a freemium app that enables users to play the first 12 levels
    for free, and then buy additional levels and themes from the game’s virtual shop
    via In-App Purchase.


    “This is a really exciting monetization path for several reasons,” said Owen.
    “The in-game store allows me to continue releasing new level packs and themes
    without having to update the app binary itself. As a free game, it gets maximum
    visibility in the App Store with a lot more downloads. But with banner ads and
    In-App Purchase, I still have a way to earn some money. And the ads are disabled
    if the player buys any content from the in-game shop.”


    “However, it’s not all rainbows and unicorns,” added Owen. “One thing I was not
    at all prepared for was a backlash from users over the pricing model. I thought
    that players would be happy that they were given an opportunity to try the game
    before spending any money on it. Instead, the reaction from some players was ‘Hey,
    a free game!,’ but then they’re angry when they discover they can’t play all the
    levels for free. My app description clearly states that you only get the beginner
    levels for free and have to buy the others. The app page in the App Store also
    lists the top In-App Purchase items. But what I learned is that no one reads that
    stuff.”


    In-App Purchase and pay-to-play apps will always leave a bad taste in customers’
    mouths. The million-dollar question is: Will it keep them from using the app?
    Take a look at many of EA’s games—they are flooded with in-app-purchases, which
    if not purchased, will leave the user stuck at a current level. This method of
    trying to generate revenue from customers is not ideal by any means. You need
    to find a balance where a free user can still play the game, but maybe not as
    fast or as often. An example of this concept is implemented very well in SuperCel’s
    `Clash of Clans`. This game can be played free forever and you can eventually
    reach the end; however, if you want to play the game and be competitive, you’re
    going to need to spend a little bit on upgrades. This model works fantastic and
    `Clash of Clans` is normally the No. 1 or No. 2 top-grossing app in the App Store.


    In-App Purchase was launched back in mid-2009, but consumers were slow to acclimate
    to the concept of paying for new content within apps that they had already purchased
    or downloaded for free. Even a year later, new games like `LandFormer` and other
    freemium titles were still experiencing resistance from a percentage of users.
    But with the proliferation of so many exciting freemium apps in the second half
    of 2010, the tide was gradually turning, with a majority of iPhone, iPad, and
    iPod touch users finally embracing microtransactions with open arms.


    Where once traditional app sales and in-app advertising were the dominant business
    models for iOS developers, In-App Purchase has become one of the biggest revenue
    streams in the App Store. In January 2011, the App Store–monitoring firm Distimo
    reported that almost 50 percent of the revenue from the top-grossing iPhone apps
    was now coming from In-App Purchase items!


    Much of this evolution can be attributed to popular games such as `FarmVille`,
    `We Rule Quests`, `Zombie Farm`, and `Pocket Frogs`. These freemium apps are based
    on using virtual currency to further your progress in the game. Users quickly
    learn that in order to grow their farms, build their empires, or nurse their pets.
    They need to use game points to purchase crops, tools, food, and other required
    items in the virtual market (see [Figure 8-2](#9781430262381_Ch08.xhtml#Fig2)).
    These repeated trips to the in-game market conditions users to shop within the
    app. So, making the jump to purchasing other market items, like `Mojo` or magic
    potions, with real money becomes a small extra step (see [Figure 8-3](#9781430262381_Ch08.xhtml#Fig3)).


    ![9781430262381_Fig08-02.jpg](images/9781430262381_Fig08-02.jpg)


    [Figure 8-2](#9781430262381_Ch08.xhtml#_Fig2). ngmoco’s `We Rule Quests` for iPad
    is a kingdom-building game that uses earned points to buy various items in the
    virtual market.


    ![9781430262381_Fig08-03.jpg](images/9781430262381_Fig08-03.jpg)


    [Figure 8-3](#9781430262381_Ch08.xhtml#_Fig3). `We Rule Quests` informs users
    when virtual items like `Mojo` cost real money, requiring an In-App Purchase transaction
    (iPad version shown here).


    It’s important that consumers never feel misled about what they’re selecting.
    For example, `We Rule Quests` is careful to clearly display the currency type
    for every item in its virtual market, so that users can see if an item can be
    bought with digital points or with real money via In-App Purchase. As shown in
    [Figure 8-3](#9781430262381_Ch08.xhtml#Fig3), in order to acquire `Mojo`, a real
    price is displayed, requiring an In-App Purchase transaction. Also, In-App Purchase
    items are categorized as “We Rule Store” products to visually set them apart from
    other virtual market items.


    Even though microtransactions are now widely accepted by the App Store user community,
    developers may periodically encounter backlash from some customers who resent
    the à la carte pricing structure of In-App Purchase. Just remember they represent
    only a small percentage of your overall customer base. Typically, these are the
    same vocal minority of users who complain about needing to pay more than 99 cents
    for a full-featured game that would cost 50 times as much on Xbox or PlayStation.
    While it’s important to keep as many customers satisfied as possible, these individuals
    are usually only happy with free. And unless you’re independently wealthy, your
    business can’t afford to give away everything for free, so remember to have some
    ads in the free version to generate some revenue from the users who will never
    pay anything for an app.


    A key factor to succeeding with In-App Purchase is offering exciting add-on items
    that users are eager to buy. If your app can effectively communicate the distinct
    difference between free updates to the core functionality versus the additional
    content available as In-App Purchase items, you may have a profitable business
    model that can sustain continued development.


    With this in mind, it’s never too early to look at ways your app could benefit
    from In-App Purchase. Loyalty pays! In the long run, even if your app eventually
    attracts fewer and fewer new customers, your satisfied users could continue to
    support you through In-App Purchases!


    ## When and How to Use In-App Purchase


    So, you’re ready to tackle In-App Purchase in your application, but what can it
    be used for? Unlocking additional game content and new levels are obvious choices,
    but what if you’re not developing a game? The best way to approach this is to
    take a good look at your app’s current functionality and future road map of features
    to see whether In-App Purchase can help extend its product life span and sales
    potential.


    In-App Purchase is a great way to generate additional revenue streams and support
    continued development, but it isn’t suitable for every application. Don’t try
    to force this functionality into your app if you don’t have a good reason to do
    so. It should not be treated as a solution in search of a need. You certainly
    won’t want to wear out your goodwill with loyal customers by “nickel and diming”
    them to death for core features they expected to get as part of the original purchase
    price.


    Another good example is how many Xbox and PlayStation games use the premium DLC
    model. You buy the game for $59.99, and then every few months you can get extra
    maps, characters, game modes, or weapons for a nominal fee. The idea here is to
    not take advantage of the people that bought the game, but to allow them to enhance
    and extend their experience.


    ### Understanding the Fundamentals'
