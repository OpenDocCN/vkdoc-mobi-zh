- fmt: '**Taylor Pierce** has been developing apps since Apple’s App Store opened
    to the public in 2009. In the summer of 2010, Taylor was awarded an internship
    at the coveted Apple Headquarters in Cupertino, California. He has developed over
    60 apps, many of which have ranked consistently among Apple’s top 200. Taylor
    has firsthand knowledge of what makes apps marketable and profitable. He is currently
    the Lead Developer at Klinklife, LLC.


    Because of Taylor’s direct knowledge of clients’ needs, the specifics of app design,
    and the ever-changing app market, he has designed this book as a reference tool
    for success in the App Store. Few people exist who possess Taylor’s level of expertise
    and experience with the App Store. He has built apps for nearly every category
    in the App Store and has accrued financial success not only for himself, but also
    for his clientele.


    In addition to app development, Taylor also offers consulting to individuals and
    companies who wish to maximize their app’s performance. This book was inspired
    by his desire to provide exceptional consultation services for his clientele.
    For his personal clients, he wanted to write a book a client could read to become
    informed of the ins and outs of the App Store.


    Follow Taylor on Twitter `@taylorpierceapps`.


    Dave Wooldrige is the founder of Electric Butterfly and has been developing award-winning
    web sites and software for 15 years. When he’s not creating Mac and iPhone apps,
    he can be found writing. Dave is the author of *The Business of iPhone App Development:
    Making and Marketing Apps that Succeed* (Apress, 2011) and has written numerous
    articles for leading tech publications, including a monthly software marketing
    column for *MacTech Magazine*.


    Follow Dave on Twitter `@ebutterfly`.


    ## About the Technical Reviewer


    ![9781430262381_unFM-01.jpg](images/9781430262381_unFM-01.jpg)


    **Giacomo Balli** is mobile consultant and entrepreneur (applications for iPhone
    and iPad) with some of the most unique, well-made applications currently for sale
    in the App Store. Originally from Italy but currently based in San Francisco,
    he is passionate about new ideas and original content.


    In addition to creating his own apps, Giacomo frequently works with companies
    who commission him to create custom applications or improve existing ones. He
    enjoys working with clients to find ways to streamline everyday processes and
    provide needed services to employees or mobile users. Well-versed in PhoneGap
    cross-platform development, Giacomo has full experience with web technologies.


    ## Special Contributor


    ![9781430262381_unFM-02.jpg](images/9781430262381_unFM-02.jpg)


    **Charles Cruz** is a mobile application developer for the iOS, Android, and Windows
    Phone platforms. He graduated from Stanford University with B.S. and M.S. degrees
    in engineering. He lives in Southern California and runs a photography business
    with his wife (`www.facebook.com/BellaLenteStudios`). When not doing technical
    things, he plays lead guitar in an original metal band (`www.taintedsociety.com`).


    Charles can be reached at `codingandpicking@gmail.com` and `@CodingNPicking` on
    Twitter.


    ## Introduction


    This book is to help developers with every aspect of the App Store. Oftentimes,
    we see amazing apps go unnoticed. There are many factors that can cause this,
    but often it is because we developers have trouble thinking with a business mindset.
    David and I wrote this book to provide you with every single thing you will need
    to make your apps succeed in the every crowded app marketplace. You will find
    code example, graphic templates, and tons of third-party extensions to help you
    take your apps to the next level.


    ## Chapter 1: Seeing the Big Picture in a Crowded App Store Marketplace


    Living in Los Angeles, there’s no shortage of Hollywood clichés. There was a time
    when it seemed like everyone I met—no matter their profession—was working on a
    screenplay.


    Now they’re all working on their own iOS apps!


    And who can blame them? It’s a testament to the soaring popularity of the iPhone,
    iPod touch, and iPad. There’s money to be made in the App Store, and everyone
    wants in on the action.


    We’ve all read about the success story of indie developer Steve Demeter. His Trism
    game, along with many of the 500 other apps that were included in the initial
    July 2008 launch of the App Store, experienced an overwhelming explosion in sales.
    With some price tags as low as 99 cents, iPhone and iPod touch owners were impulsively
    downloading these inexpensive apps at a feverish pace. In the months that followed,
    several of the most popular apps were already netting their creators hundreds
    of thousands of dollars, allowing programmers like Steve Demeter to quit his day
    job to focus full time on this lucrative opportunity.


    The media quickly proclaimed the seemingly overnight sensation of the App Store
    as a “gold rush” for developers. With the lure of potential riches, inspired entrepreneurs
    from all over the world have downloaded the iOS SDK, racing to learn Objective-C
    and Cocoa Touch in the hope of cashing in on this software phenomenon.


    Fast-forward two years to July 2010. Apple has since introduced the iOS-powered
    iPad, selling more than 3 million in only the first 80 days. Combine that with
    the massive army of iPhone and iPod touch users for a staggering total of more
    than 120 million iOS devices sold and 7 billion app downloads from the App Store.
    You would think that with stats like that, it would be easier than ever to make
    money in the App Store, right? Think again. The competition is fierce, and you’re
    no longer just competing against other indie devs, just about every business now
    has an app.


    ### Why a Business Book for iOS Developers?


    With more than 1,000,000 applications in the App Store and developer interest
    continuing to grow at a stunning rate, industry analysts predict that number will
    likely double each year.


    Think about that for a moment. When browsing through the App Store, how many new
    apps do you stumble upon weekly or even monthly? 25? 50? According to Apple, approximately
    31,000 new apps and updates are submitted each week to its app review team!


    In such a crowded marketplace, it’s becoming increasingly difficult for new apps
    to get noticed. Without the necessary exposure, your app may simply get lost in
    the endless stream of new software that floods the App Store on a daily basis.
    Gone are the days when you could quickly cobble together a simple app, throw it
    into the App Store, and then sit back and wait for the large royalty checks to
    roll in.


    The media hype machine is so good at celebrating the underdog stories of a few
    indie developers who found instant wealth in the App Store that newcomers often
    assume that if they build an app, the sales will come. When the anticipated avalanche
    of profit turns out to be nothing more than a trickle, surprised developers quickly
    discover that a *Field of Dreams* philosophy is no longer enough in this highly
    competitive market.


    “Ah, but what if I’ve just created the next killer app?” you ask. “Surely Apple
    will want to showcase it as a featured app in the App Store.”


    Having a great product is certainly the underlying key in this equation, but it
    won’t be enough. It’s true that being listed as a “Featured App,” “New and Noteworthy,”
    or a “Staff Favorite” can instantly propel your sales into the stratosphere, but
    unfortunately, those high-profile spotlights are not purchasable advertising spaces.
    Apple chooses only a select few apps every month for those coveted spots. With
    thousands of new apps vying for attention every week, your chances of getting
    that life-altering call from Apple are pretty slim. In fact, you may have better
    odds of winning the lottery—twice.'
