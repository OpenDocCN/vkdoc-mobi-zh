    stream is in-app advertising. As long as you keep delivering a rewarding and fun
    experience, people will continue to talk about your app. Continuous updates and
    high-quality customer support are big factors in driving word-of-mouth.    Providing
    High-Quality Support    In previous chapters, I’ve discussed the importance of
    setting up a support site and e-mail address for customers who need assistance
    or have questions. How you use that communication channel will ultimately determine
    its effectiveness as a business tool. Customer relationship management is the
    most organic form of direct marketing and sales.'
