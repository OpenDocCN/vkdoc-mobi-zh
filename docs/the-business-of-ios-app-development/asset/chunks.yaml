    *   *第 2 章，《做好功课：分析 iOS 应用创意并进行竞争研究》*：您认为自己有一个很棒的移动应用创意？学习如何识别尚未开发的市场，并精炼您的应用概念，使其独一无二且极具市场价值，从而在竞争中脱颖而出。您将发现通过分析竞争对手做对了什么又做错了什么来进行老式侦探工作的巨大价值。我们还将探讨将目标定位在`iPhone`之外的多个`iOS`设备的优势，以及通用应用所面临的商业挑战。

    *   *第 3 章，《保护您的知识产权》*：这可能就是本书最重要的章节之一！虽然我们可能都不喜欢处理法律事务，但保护自己并保护您原创概念与代码的知识产权，对您业务的长期健康与成功至关重要。由律师转行成为应用开发专家的`Michael
    Schneider`将为您讲解保护您的软件业务所需了解的一切。

    *   *第 4 章，《您的 iOS 应用是最强大的营销工具》*：您的应用图标和截图通常是用户在`App Store`评估应用时首先看到的视觉元素。糟糕的第一印象可能会让您损失销量并招来负面评论，因此优化应用设计是成功的关键组成部分。第
    4 章包含了关于原型设计、创建引人注目的应用图标、打造直观用户界面以及为多个`iOS`设备进行设计的有用技巧。

    *   *第 5 章，《社交植入：在应用内部推广您的应用》*：在第 4 章将应用转变为自身营销动力源的基础上，本章将更进一步，集成便捷的分享和社交媒体元素，例如`In-App
    Email`、`Twitter`和`Facebook`。优雅地在您的应用内引导用户进行`App Store`评价，通过应用内交叉推广和第三方社交游戏平台建立协同效应，并学习如何有效实施这些不同要素。

    *   *第 6 章，《免费也赚钱：何时免费才划算》*：与传统的桌面软件世界不同，`App Store`目前不允许有时间限制或功能受限的试用版。为了绕过这一限制，许多开发者提供了由`In-App
    Purchase`（应用内购买）支持的“免费增值”模式或免费“精简”版应用，希望用户能购买应用内内容或单独的付费版以获取高级功能。了解免费版在推广付费版方面的好处，以及联盟计划带来的额外收入机会。

    *   *第 7 章，《通过 iAd 和其他应用内广告机会实现免费应用盈利》*：即使没有付费内容，免费应用本身也能赚钱。学习如何通过应用内广告、赞助和产品植入交易来挖掘替代收入流。本章将深入探讨应用内广告的世界，向您介绍适用于`iOS`应用的移动广告网络，以及通过应用内分析跟踪使用情况的价值。第
    7 章还包含在您的应用中逐步实施苹果`iAd`框架的指南。

    *   *第 8 章，《通过应用内购买探索免费增值模式》*：借助`In-App Purchase`（应用内购买），开发者可以在其应用中构建新的商业模式，例如提供订阅、销售附加内容和服务，以及解锁高级功能。有兴趣在为您持续的开发工作提供财务支持的同时，为用户提供额外价值吗？本章提供了关于何时以及如何在您的`iOS`应用中使用`In-App
    Purchase`及其相关`Store Kit`框架的详尽指导。'
- fmt: '* **[Chapter 9, Testing and Usability: Putting Your Best Foot Forward](#9781430262381_Ch09.xhtml)**:
    Did you know that many of the one-star customer reviews in the App Store are caused
    by user frustration with hard-to-use app interfaces or buggy features? Low customer
    ratings can really hurt your app’s perception and sales, so avoiding those situations
    when possible should be your top priority. [Chapter 9](#9781430262381_Ch09.xhtml)
    is all about the value of providing built-in help, provisioning apps for on-device
    testing, and conducting thorough beta tests.

    * **[Chapter 10, Get the Party Started! Creating Prerelease Buzz](#9781430262381_Ch10.xhtml)**:
    Your app is finished, but before you submit it to the App Store, it’s time to
    start generating some prerelease buzz for it. [Chapter 10](#9781430262381_Ch10.xhtml)
    will show you the best way to stir up some excitement and anticipation for your
    app by promoting it on your web site, blogs, Twitter, and other social networks,
    as well as by getting basically anyone you can to review or talk about your app.

    * **[Chapter 11, Keys to the Kingdom: The App Store Submission Process](#9781430262381_Ch11.xhtml)**:
    Your product page in the App Store is the world’s gateway to your app, so its
    presentation is essential in properly communicating the value of your app. This
    chapter will walk you through the app submission process in iTunes Connect, helping
    you optimize your app’s text description, keywords, rating, screenshots, and other
    required elements, as well as discuss how to set the price to maximize your sales
    potential.

    * **[Chapter 12, Increasing Awareness for Your iOS App](#9781430262381_Ch12.xhtml)**:
    Once you’re in the App Store, it’s time to rev up the publicity engine to increase
    consumer awareness of your app’s availability. Even if your prerelease marketing
    efforts resulted in an initial sales surge, there’s still vital work to be done.
    It’s your job to ensure that your iOS application does not get buried amidst the
    thousands of new apps flooding into the App Store. [Chapter 12](#9781430262381_Ch12.xhtml)
    reveals how to craft effective press releases, utilize promo codes, gain exposure
    through interviews, and sustain momentum in the App Store with promotions, giveaways,
    and carefully timed sales events.


    This book assumes that you’re already familiar with Objective-C, Cocoa Touch,
    and iOS application programming. If you’re looking for in-depth guidance beyond
    the documentation and tutorials available from the Apple Developer site, I highly
    recommend the following Apress books:


    * *Learn Objective-C on the Mac* by Scott Knaster, Waqar Malik, and Mark Dalrymple
    (`http://www.apress.com/9781430241881`)

    * *Beginning iOS 7 Development: Exploring the iOS SDK* by Jack Nutting, Fredrik
    Olsson, Dave Mark, and Jeff LaMarche (`http://www.apress.com/9781430260226`)


    ## Getting Started with Your First iOS App


    We have a lot of ground to cover here, so before we get too far along, make sure
    that you’ve already downloaded and installed the latest Xcode tools and iOS SDK
    (7.0 or higher). If not, make your way over to the Apple Developer web site at
    `http://developer.apple.com/`.


    If you’re not yet a registered Apple Developer, then sign up (it’s free) so that
    you’ll have access to the latest SDKs, tools, documentation, tutorials, and sample
    code at the iOS Dev Center (`http://developer.apple.com/devcenter/ios/`).


    While you’re there, take the time to apply for the required iOS Developer Program.
    Do not wait to do this when your app is ready to be submitted to the App Store,
    since it can take weeks to receive acceptance into the iOS Developer Program,
    which would delay your progress unnecessarily. After being accepted, pay the applicable
    fee to complete your registration. After your payment has been processed, when
    you’re logged into the iOS Dev Center, you’ll see an iOS Developer Program column
    on the right side of the browser screen. Click the `iTunes Connect` button listed
    there.


    On the main page of iTunes Connect, be sure to visit the `Contracts, Tax, & Banking
    Information` section to view the contracts you currently have in effect. By default,
    you should have the Free Applications contract, which allows you to submit free
    apps to the App Store, already activated. But if you want to submit paid apps
    to the App Store, you’ll need to request a Paid Applications contract. Apple needs
    your bank and tax information so that it can pay you when you’ve accrued revenue
    from app sales. Since Apple transfers money via secure electronic deposits, you’ll
    need to provide your bank’s ABA routing number, name, and address, as well as
    your account number, so make sure your bank supports electronic transactions with
    third-party vendors. If you plan on selling your app in several regional App Stores,
    in order to receive international payments, Apple may also require your bank’s
    SWIFT code. Although most large national banks support the SWIFT system, some
    smaller independent banks and credit unions do not, so make sure your bank can
    supply a SWIFT code.


    Until you complete the required steps (see [Figure 1-4](#9781430262381_Ch01.xhtml#Fig4)),
    Apple will hold any money it owes you in trust. And since this can also be a fairly
    lengthy process, I highly recommend completing the Paid Applications contract
    long before submitting your app to the App Store.


    ![9781430262381_Fig01-04.jpg](images/9781430262381_Fig01-04.jpg)


    [Figure 1-4](#9781430262381_Ch01.xhtml#_Fig4). In order to get paid for your App
    Store sales, make sure you complete Apple’s required Paid Applications contract
    in the iTunes Connect online portal


    ## Already in the App Store? It’s Never Too Late to Boost Sales


    Even if you’re a veteran iOS developer with one or more apps currently available
    in the App Store, you can still do a lot to increase exposure and sales for those
    apps. You’ve already invested valuable development time and money to get to this
    point, so it would be a shame to give up now!


    But don’t make the mistake of skipping ahead to the postrelease chapters in this
    book. Many of the solutions presented in earlier chapters can be utilized with
    great effect, especially when planning new versions and updates for your existing
    apps.'
