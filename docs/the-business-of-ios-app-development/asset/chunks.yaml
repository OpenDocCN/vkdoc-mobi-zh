- fmt: 'Another great example is the demonstration in Rovio’s Angry Birds. When first
    launching the game, users are given the option to view a quick how-to guide (see
    [Figure 9-5](#9781430262381_Ch09.xhtml#Fig5)). Showing only detailed pictures
    without words, these visual instructions translate effortlessly into any language
    and age group.


    ![9781430262381_Fig09-05.jpg](images/9781430262381_Fig09-05.jpg)


    [Figure 9-5](#9781430262381_Ch09.xhtml#_Fig5). By showing only pictures, Angry
    Birds’ game-play instructions are easily accessible by any language and age group


    The only drawback to constructing an effective in-app demo is the time and development
    energy required. Crafting a tutorial demo as a series of illustrations or modified
    screenshots with instructional annotations can often be a lot easier than creating
    a video, especially if your film-editing skills are limited. You could write a
    very simple slide show view controller to run through the PNG screenshots. If
    you have an app that would benefit from an embedded demo, then it’s well worth
    the effort.


    ## Providing Mobile Manuals with Text-based Help


    Although simple pictures can often suffice to explain game play, many productivity
    and lifestyle apps require more extensive instructions for using advanced features
    and services. If other types of in-app help are not applicable, and you really
    need to provide comprehensive documentation, then good old-fashioned text-based
    help might be your only answer.


    But don’t settle for plain text. Present the information in an appealing format,
    following these basic guidelines:


    * Quickly explain steps in fewer words by organizing text into sections with bullet
    points.

    * Use larger font sizes with a bold style to reflect topic titles.

    * Insert screenshots or illustrations as visual aids to the text.


    RunKeeper Pro, a popular fitness app, accomplishes this with the help guide presented
    on its About screen. Since the content is organized into sections with styled
    text, numbered lists, and cropped screenshots, the instructions are easy to understand
    and read quickly (see [Figure 9-6](#9781430262381_Ch09.xhtml#Fig6)).


    ![9781430262381_Fig09-06.jpg](images/9781430262381_Fig09-06.jpg)


    [Figure 9-6](#9781430262381_Ch09.xhtml#_Fig6). RunKeeper Pro’s text-based help
    is presented in a styled and organized manner, which is attractive and easy to
    read


    Don’t worry! There’s no need to tackle the complexities of Core Text just to display
    the kind of stylized help shown in [Figure 9-6](#9781430262381_Ch09.xhtml#Fig6).
    With a `UIWebView`, you can use HTML to display styled text and images!


    ## A Little HTML Goes a Long Way


    The beauty of HTML is that it’s easy to create and maintain. Just add a `UIWebView`
    to your help view controller and have it load the HTML page or HTML string you
    want displayed. You can even include the HTML help page within your compiled app
    so that there’s nothing to fetch remotely—perfect for devices that are not connected
    to the Internet, such as an iPad without Wi-Fi or an iPhone in airplane mode.
    And during development, modifying the documentation requires only a few simple
    text changes to the HTML—no need to fiddle with Objective-C code.


    For apps that require a constant Internet connection for their core functionality,
    the Help panel’s `UIWebView` could just as easily load an URL of an external web
    site. This gives you the flexibility to update your help content without needing
    to modify or recompile the actual iOS app.


    Remotely hosting the help content is especially useful if you receive a lot of
    feedback from users. You can continuously update your help page with additional
    answers to frequently asked questions, improving the support within your existing
    iOS app. This also allows you to maintain a single source of help content on your
    web server, which can be accessed by multiple platforms. A different set of CSS
    styles can be employed depending on whether that same help content is rendered
    in a desktop web browser, an iPhone, an iPad, or some other mobile device.


    With many users accessing your in-app help with single thumb taps on small screens,
    take great care to keep the help content tightly organized and easy to navigate.
    If you’re building a sophisticated productivity app that requires extensive documentation,
    one long scrolling screen of text can be a little unwieldy. Break it up into smaller
    topics. This list of help topics can be presented as a `UITableView`. Selecting
    a topic loads a new screen that displays that topic’s HTML page of text and images
    in a `UIWebView`.


    If you would rather not create your own infrastructure of a navigation controller
    with multiple `UITableView`s and `UIWebView` screens, an alternative is to use
    a third-party mobile web framework within a single `UIWebView`.


    ## The One-Time-Only Instruction


    One new instruction method that has gotten very popular in the last year is the
    graphical overlay launched only one time when the initial app’s delegate is called.
    [Figure 9-7](#9781430262381_Ch09.xhtml#Fig7) shows an example that shows a nice
    clean overlay. Keep in mind, no matter how simple your app is, you are a well-versed
    developer and technologist—not everyone is.


    ![9781430262381_Fig09-07.jpg](images/9781430262381_Fig09-07.jpg)


    [Figure 9-7](#9781430262381_Ch09.xhtml#_Fig7). One time only instruction


    ## Building In-App Help with Mobile Web Frameworks


    Most developers groan at the thought of writing documentation of any kind. And
    if you lack web-design skills, then needing to create a set of HTML pages makes
    matters even worse. Fortunately, there are some amazing third-party iOS WebKit
    frameworks that you can use to streamline this process. Here are just a few:


    * iUI, an iPhone UI web framework (`http://code.google.com/p/iui/`)

    * Sencha Touch, a feature-rich mobile JavaScript framework (`http://www.sencha.com/products/touch/`)

    * jQTouch, a jQuery plug-in for iPhone web development (`http://www.jqtouch.com`)

    * iWebKit, an iPhone web site toolkit (`http://snippetspace.com/projects/iwebkit/`)

    * WebApp.Net, an iPhone web development framework (`http://webapp-net.com`)

    * Magic Framework, an iPhone HTML5 framework (`http://www.jeffmcfadden.com/projects/Magic%20Framework/`)

    * SaFire, an iPhone web app framework (`http://code.rememberthisguy.com/safire/`)

    * UiUIKit, a universal iPhone UI kit (`http://code.google.com/p/iphone-universal/`)


    Not only are these toolkits specifically optimized for iOS screen sizes, but they
    also provide time-saving templates that mimic native UI controls and behavior.
    This is beneficial for two major reasons:


    * The web design looks like an iOS interface, so it blends well with the rest
    of your app.

    * The UI is familiar, so there’s absolutely no learning curve for the user.


    An instant help system that works like an iOS app! All you need to do is write
    the text.


    So, which framework should you use? They all have their own unique benefits and
    strengths, so check out their web sites to see which one best suits your specific
    needs.


    All of the frameworks include full source code and are available as free downloads.
    Usage rights can vary, so be sure to read the licensing terms before adding a
    third-party web framework to your app.


    ## Provisioning: Setting Up a Development Device


    When you need to test features that are not supported in the iOS Simulator, such
    as the accelerometer, multitouch gestures, and In-App Purchase, you should run
    your app on an actual iPhone, iPad, or iPod touch.'
