- fmt: '[Figure 7-8](#9781430262381_Ch07.xhtml#_Fig8). Some apps may require reworking
    the hierarchy of views to accommodate an iAd banner frame, which must be a subview
    of a `UIView`.


    In [Figure 7-8](#9781430262381_Ch07.xhtml#Fig8), the top `UIView` (assigned in
    code as `contentView`) acts as a parent view container for your app’s UI controls.
    If you need this parent view to resize itself to make room for an iAd banner at
    the bottom of the screen, you will want to set the autosizing masks of the nested
    UI controls, so that they also resize or move accordingly. As shown in [Figure
    7-8](#9781430262381_Ch07.xhtml#Fig8), the `UILabel` with the text “BOTTOM of ‘contentView’
    UIView” has its autosizing mask set to move up relative to the resizing of its
    parent `UIView`’s height.


    The very bottom layer in [Figure 7-8](#9781430262381_Ch07.xhtml#Fig8) represents
    the app’s main window with an embedded view controller. The white middle layer
    is the main `UIView` called by the view controller. This `UIView` is assigned
    the outlet `view` by default. The `contentView`-named `UIView` and the iAd banner
    frame are both subviews of the parent `UIView` (known as `view`).


    If any of this is a little confusing to you, don’t worry. It will make perfect
    sense when we step through the process of integrating iAd into an Xcode example
    project in the following section. You’ll understand the reasoning behind the hierarchy
    of `UIView`s when you see it in action.


    As far as appearances are concerned, you don’t want the iAd to instantly pop into
    view with everything shifted. That can be jarring for the user. It’s much more
    elegant to gracefully transition the iAd onto the screen, sliding it in and out
    of view using `UIView` animation. You’ll see how to use `UIView` animation with
    an iAd banner frame when we build the [Figure 7-8](#9781430262381_Ch07.xhtml#Fig8)
    example as a universal app for both iPhone and iPad. Keep reading...


    ## Programming Your App to Support Ads


    Let’s tackle some code! First, it’s important to understand exactly what we need
    this example project to do before diving into Xcode. Here’s an outline of the
    basic functionality:


    * Check the device’s Internet connectivity. If there’s no connection, then do
    nothing, leaving the app’s UI in its normal, full-screen state.

    * If the device does have Internet access, then request an iAd banner from the
    iAd Network.

    * If the iAd Network sends a message that the iAd banner request was successful,
    then prepare the iAd banner frame, and the ad banner is ready to display.

    * If the iAd Network replies that an iAd banner is not available, then prepare
    an alternate ad banner to show. In this example, we’ll show a built-in house ad,
    but you could just as easily modify the example code to support a second ad network
    instead (such as AdMob).

    * When an ad banner is ready for display—either an iAd or the house ad—use `UIView`
    animation to slide the advertisement up into view at the bottom of the screen
    and adjust the positioning of affected UI elements to make room for the ad banner
    frame.

    * If the app was previously showing an ad banner, and either the device loses
    Internet connectivity or there’s no new ad banner to display, then use the same
    `UIView` animation technique to slide the ad frame out of view, reverting the
    app’s UI to its normal, full-screen state.


    If you just want to display an iAd banner above your existing UI, you may find
    this extensive tutorial to be a bit overkill for your needs. For simple iAd code
    examples, check out Apple’s sample project, iAdSuite, available online at the
    iOS Dev Center: `http://developer.apple.com/library/ios/#samplecode/iAdSuite/`.


    But for those of you interested in the features I’ve outlined, the advanced example
    project we’re about to build might just be the solution you’re seeking. This tutorial
    contains a lot of code (compared to other examples in the book), so to avoid all
    of that manual typing, I highly recommend downloading the book’s companion code
    examples (from `http://www.iPhoneBusinessBook.com` or `http://www.apress.com`),
    and then opening the included `InAppAdv` project in Xcode. Even if you want to
    work through the steps yourself, copying and pasting some of the code from the
    `InAppAdv` example project could save you some valuable time.


    ## Creating a New Xcode Project


    iAd has been available for iPhone and iPod touch since iOS 4.0, but iAd wasn’t
    supported on the iPad until iOS 4.2. To accommodate all readers, we’ll build a
    universal app example, showing how to implement iAd code for both iPhone and iPad
    targets.


    Launch Xcode and create a new iOS project, choosing the Window-based Application
    template. When selecting that project template, make sure its Product drop-down
    menu is set to Universal, but leave the Use Core Data for storage box unchecked.
    Name the new project `InAppAdv`.


    ## Adding the iAd Framework to the Project


    Apple’s iAd framework is required in order to successfully run and compile your
    app with iAd-related code. To add this framework to your project, Ctrl-click the
    project’s *Frameworks* folder, and from the contextual menu that appears, select
    Add ![image](images/arrow.jpg) Existing Frameworks… (see [Figure 7-9](#9781430262381_Ch07.xhtml#Fig9)).
    Then select `iAd.framework` from the list that appears.


    ![9781430262381_Fig07-09.jpg](images/9781430262381_Fig07-09.jpg)


    [Figure 7-9](#9781430262381_Ch07.xhtml#_Fig9). Add the required iAd.framework
    to your Xcode project.


    To remain focused on the task at hand, the example project requires iOS 4.2. If
    your app needs to support older iOS versions, you can weak-link the iAd framework
    in your project. To do so, select the project’s app name in the Targets group,
    click the Get Info button, and within the General tab that appears, choose Weak
    as the linking method for `iAd.framework` (see [Figure 7-10](#9781430262381_Ch07.xhtml#Fig10)).


    ![9781430262381_Fig07-10.jpg](images/9781430262381_Fig07-10.jpg)


    [Figure 7-10](#9781430262381_Ch07.xhtml#_Fig10). Weak-linking the iAd.framework
    for backward-compatibility with pre-iOS 4 devices.


    You’ll probably also need to use conditional coding within your app, so that on
    iOS 4 devices, an iAd banner ad is displayed, but on older iOS versions, a house
    ad or another third-party ad banner is shown instead. For more information about
    implementing backward-compatibility, check out the iOS Dev Center.


    ## Adding Apple’s Reachability Class to the Project


    When the app is running, you’ll want the code to check for Internet connectivity.
    Without access to the Internet, there’s no sense requesting an ad banner. Instead
    of spending hours crafting your own custom network-detection code, Apple recommends
    using its own `Reachability` class, which can be downloaded from the iOS Dev Center
    as part of the `Reachability` sample project, at `http://developer.apple.com/library/ios/#samplecode/Reachability/`.


    Once you’ve downloaded the `Reachability` project, open it in Xcode. Drag and
    drop the *Reachability.h* and *Reachability.m* class files from the `Reachability`
    project into the *Shared* folder of your `InAppAdv` Xcode project window (selecting
    the option to copy the files rather than move them).


    We’ll add code for interacting with the `Reachability` class later. For now, simply
    follow the same framework-insertion instructions as for previous examples to add
    the SystemConfiguration framework to your project. As you might expect, the `Reachability`
    class requires the networking functions in the SystemConfiguration framework.


    ## Building the App’s Foundation


    Before programming the core functionality of our project, we need to construct
    some initial files and write some basic code.'
