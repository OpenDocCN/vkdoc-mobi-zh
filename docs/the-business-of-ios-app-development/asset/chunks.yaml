  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵守您的要求，将给定的英文文本翻译成中文。



    # 第 3 步：配置你的 Xcode 项目以进行 App Store 发布


    现在有了合适的配置文件，下一步就是在 Xcode 中打开你的项目，并配置它以进行 App Store 发布。在主 Xcode 项目窗口中，在“组与文件”窗格顶部选择项目名称，然后点击工具栏中的“信息”按钮。在“信息”窗口的“配置”选项卡中，确认你仍然有一个名为“发布”（Distribution）的配置（你应在第
    9 章的临时发布阶段已经创建了它）。如果没有，请复制现有的“发布”（Release）配置，并将副本命名为“发布”（Distribution）。现在关闭该“信息”窗口。


    接下来，在“组与文件”窗格中选择“目标”应用，并再次点击工具栏的“信息”按钮。在出现的“目标信息”窗口中，导航到“构建”选项卡，再次确认“配置”下拉菜单设置为“发布”（Distribution）。向下滚动到“代码签名标识”行下方的“任意
    iOS”字段，并将其分配给新的 App Store 发布配置文件。即使你的临时发布配置文件也可能出现在弹出菜单中，但最关键的是必须选中你的 App Store
    发布配置文件（参见图 11-8）。


    ![9781430262381_Fig11-08.jpg](img/9781430262381_Fig11-08.jpg)


    图 11-8. 修改你目标的“构建”选项卡，将新的 App Store 发布配置文件分配给“任意 iOS 代码签名标识”


    切换到“属性”选项卡，确认正确的应用 ID 包标识符已填入“标识符”字段。该标识符应与你的 Xcode 项目 `Info.plist` 文件中列出的包标识符相同（例如示例
    ID `com.ebutterfly.breadcrumbs`）。


    完成以上所有步骤后，最后一步是导航到主 Xcode 项目窗口，确保左上角的下拉菜单中，分别为“活跃 SDK”和“活跃配置”设置了“设备”和“发布”（Distribution）。


    # 第 4 步：编译你的 iOS 应用


    现在你已经准备好编译你的 Xcode 项目了！App Store 发布不像临时发布那样要求你的项目包含授权文件，所以保存你的项目。接下来，选择“构建”![image](img/arrow.jpg)“构建并归档”。如果你的配置一切正确，你的应用应该可以成功编译。


    如果你遇到与项目设置相关的构建错误，请回溯你的步骤，确保你已经遵循了此处概述的每一个任务，无论它看起来多么微不足道。构建错误常常由最小的错误引起，例如拼写错误的包标识符或误选了的复选框。如果问题仍然存在，并且你已经排除了代码错误和错误的配置设置，请清理项目的构建目录，在
    Xcode 中重新打开项目，然后再次尝试构建。


    **应用被拒警告** 不要在应用中使用未记录的私有 Apple API。Apple 已经拒绝了数十个应用，因为它们使用了未正式批准供公众使用的私有 iOS
    API。据传，应用审核团队正使用静态分析工具来查找对受限、私有 API 的调用。因此，即使你的应用包含了这些代码但并未执行，仅凭代码存在，你的应用仍可能被标记。为避免被
    App Store 拒绝，请坚持使用官方授权的 API。


    Apple 只接受使用 App Store 发布配置文件编译的 iOS 应用。不幸的是，App Store 发布配置文件以及使用该配置文件编译的应用无法在你的测试设备上运行，因此你无法在提交给
    Apple 之前测试这个版本的应用。


    考虑到这一点，在为 App Store 发布而配置和编译之前，尽可能多地测试——密切关注构建日志和错误信息——是非常重要的。


    在你使用“构建并归档”选项编译后，你可以在 Xcode 的“管理器”窗口中找到该应用。在 Xcode 管理器的左窗格中，选择“已归档的应用”，你应该会在显示的应用列表中看到你新编译的应用。选中该应用后，你会在
    Xcode 管理器屏幕底部注意到一个“提交到 iTunes Connect”按钮。但是，等等！先不要点击那个按钮。


    在提交你的应用二进制文件之前，你首先需要在 iTunes Connect 中创建你的应用列表，并附带必需的元数据，我稍后会教你如何操作。提交流程的最后一步是上传你的应用二进制文件，所以我们很快就会再次回到
    Xcode 管理器。


    # 确保 Apple 已处理你的合同和付款设置


    在提交应用之前，请确保所有 Apple 要求的合同、税务表格和银行信息都已正确提交和处理。正如我在第 1 章中提到的，这个过程通常需要相当长的时间，所以最好在开发初期就处理妥当。这样，当你准备向
    App Store 提交应用时，就不会有遗留的文书工作阻碍你。


    要检查你的当前状态，请登录位于 `http://itunesconnect.apple.com` 的 iTunes Connect，在 iTunes Connect
    的主页上，访问名为“合同、税务和银行”的部分，查看你当前生效的合同。如第 1 章所述，你默认应已激活“免费应用”合同，这允许你向 App Store 提交免费的
    iOS 应用。要提交付费应用，你需要已经申请了“付费应用”合同，并完成了相关的银行和税务表格。如果没有提交这些信息，Apple 无法向你支付从应用销售中获得的任何收入。相反，它会将你累积的收入托管，直到你提交所需的表格。


    # 我们到了吗？在 iTunes Connect 中提交你的应用


    经过数月的开发和测试，你可能不敢相信终于到了这一步：准备将你的应用提交到 App Store。这是一个既充满兴奋又充满不安的时刻，你无法确定你的产品在 Apple
    应用审核团队手中会面临何种命运。但别担心，你已经非常仔细地规划了你的应用，有条不紊地遵循了 Apple 的所有指导原则，所以你应该状态良好。现在你准备好全力以赴了。


    计划在你拥有充足时间的日子里，在 iTunes Connect 中添加你的新应用。有几个屏幕的在线表格需要填写，因此你需要从容地、耐心地完成每个部分，以避免出现任何粗心的错误或拼写错误。


    **注意** 你可以在 iTunes Connect 中添加一个新的应用列表，而不将其提交到 App Store。事实上，你需要提前这样做来测试某些功能，例如应用内购买。你的应用不会被提交给
    Apple 的审核团队，直到你完成上传应用二进制文件的最后一步。如果你已经按照第 8 章中的这些说明为应用内购买测试在 iTunes Connect 中创建了应用列表，并且准备提交到
    App Store，那么你可以跳到标题为“第 5 步：上传你的应用图标和截图”的章节。


    ## 第 1 步：创建新的应用条目


    准备好了吗？太好了，我们开始吧！前往 iTunes Connect 的管理你的应用部分。点击“管理你的应用”页面左上角的蓝色“添加新应用”按钮（参见图 11-9）。

