    Moron Test`迅速成为`Entertainment`类别中收入最高的应用。这种曝光推动了更多的销售，进而将其排名提升至美国 App Store 前
    25 名的顶端。如果`The Moron Test`当初被放在`Games`类别中，它还能卖得这么好吗？也许不会。尽管`Games`主类别被划分为 19 个子类别（例如
    Action（动作）、Arcade（街机）和 Board Games（桌游）），但要与那些占据整体游戏排行榜主导地位的沉浸式、高动作、有发行商支持的 3D
    游戏竞争，仍然会非常困难。


    但要小心。根据你的应用类型，这种策略有时可能会适得其反。显然，在你的应用名称中包含正确的关键词至关重要，这样你的应用才能出现在相关的 App Store 搜索结果中，但人们也喜欢浏览他们最喜欢的类别来寻找新应用。记住这一点，不要仅仅因为一个类别更小就选择它。要选择大多数人在寻找你这类应用时会想到的类别。因此，尽管
    DistinctDev 避开了`Games`类别，但较小的`Entertainment`类别对于`The Moron Test`来说仍然是一个非常合适且直观的位置；如果他们决定把它放在`Weather`（天气）类别里，那可就完全说不通了。此外，众所周知，苹果会将不属于相关类别的应用从
    App Store 中移除，所以请预先注意。


    对于适合多个不同类别的应用，决定可能不那么显而易见。当这种情况发生时，最好去调查类似应用所选择的类别，尤其是那些销售情况良好的应用。例如，市面上有数十款笔记应用，但这类应用最适合放在`Utilities`（工具）、`Productivity`（效率）还是`Business`（商务）类别中？不妨在
    App Store 中快速搜索一下`notes`，看看大多数此类应用都位于哪里。


    强烈建议你使用桌面版 iTunes 进行所有竞争研究，因为它显示的信息比 iOS 设备上的移动版 App Store 要多得多。例如，如果你从搜索结果中选择一个应用，移动版
    App Store 的列表不会显示该应用的类别，但桌面版 iTunes 会显示（参见图 2-2）。


    ![9781430262381_Fig02-02.jpg](img/9781430262381_Fig02-02.jpg)


    **图 2-2**。如果从搜索结果中访问，应用的类别不会显示在 iPhone 的移动版 App Store 中（左），但会显示在桌面版 iTunes 的 App
    Store 中（右）


    当我购买写作软件时，我的目标是找到能帮助我提高写作效率的工具，因此本能地，`Productivity`（效率）类别是我首先会查看的地方。显然，有这种想法的不止我一个。尽管有些笔记应用位于`Utilities`（工具）和`Business`（商务）类别，但大多数都位于`Productivity`（效率）类别。


    有时，特定的类别会限制你的潜在受众。以本章前面提到的联系人交换应用 Bump 为例，开发人员希望该应用不仅限于商务用户。尽管类似应用牢牢扎根于`Business`（商务）类别，但
    Bump 的简洁性使其成为任何人都可以轻松使用的数据共享解决方案，因此他们决定将其放在`Social Networking`（社交网络）类别中，尽管`Business`（商务）、`Entertainment`（娱乐）和`Productivity`（效率）也都是不错的选择。


    “从核心来看，Bump 远不止是联系人信息交换；它是一种让两台设备直观交互的技术。我们不想把 Bump 局限于商务应用，也不想把它定位为仅限 iPhone
    的实用工具，”Lieb 说道。“通过选择`Social Networking`（社交网络）类别，我们将 Bump 定位为一种与周围人建立联系的工具。此外，我们知道如果我们的应用成功了，身处`Social
    Networking`（社交网络）类别将使我们与 Facebook、MySpace、LinkedIn、AIM、Yahoo 和 Loopt 等世界级品牌为邻。”


    所以，当你心存疑虑时，不妨查看一下竞争对手的类别选择，以及他们可能从这些位置获得的潜在优势。


    ## 评估竞争


    如果你的应用创意面临一些现有竞争，不要仅仅依赖于调查你所知道的竞争对手。你需要花些力气，在 App Store 中找到所有主要竞争对手。在进行了一些初步搜索后，你或许已经大致了解了有多少类似的应用存在，但现在你需要开始整理一份清单，以备日后参考。每当
    App Store 中出现一个新的竞争对手时，你都应该将其添加到你的清单中。


    密切关注竞争对手的动向，是作为开发者的主要工作之一。要扩大你的客户群并防止用户倒向竞争对手，唯一的方法就是确保你始终领先对手一步，而这需要时刻关注他们的更新。相信我，如果你的应用是一个有力的竞争者，你的竞争对手也正在密切关注着你的一举一动。


    你需要使用不同的关键词和短语变体进行多次搜索，以找出所有存在的类似应用。值得花时间创建一个关键词列表，列出你作为用户可能会尝试用来寻找此类应用的词。同时，使用词典和同义词词典来发现更多相关的词汇。没人知道用户会搜索什么关键词，所以最好做到全面彻底。'
- fmt: '# One Tool for Keeping an Eye on the Competition


    One tool I like to use to keep a watchful eye on my competition is `Searchman
    SEO`. This web site does a lot of the legwork for you, and tracks things such
    as App Store rankings, rankings for keywords, and new customer reviews. It’s a
    pretty nifty piece of software and can give you a nice edge over the competition.
    Another tool of choice is `appcod.es`; this web site allows you to track your
    ranking position for keywords, and somehow, let’s just call it magic, it can actually
    guess your competitors’ keywords. Talk about having a leg up on the competition.


    For example, let’s say you’re looking to build an app that helps people locate
    where they’ve parked their car. Since forgetting where the car is parked after
    a sporting event or a long day of shopping seems to happen to the best of us,
    it’s actually a fitting concept for a mobile app—one that is the basis for at
    least 2,000 different apps currently available in the App Store.


    To find all of these parked-car finder apps, let’s run through a few searches
    in the App Store. The search results for keywords like `car` and `park` include
    too many unrelated apps, so let’s narrow our search to a phrase. The following
    are the number of relevant apps that were listed in the top 20 search results
    for the following keyword phrases: `car park` (805), `find car` (437), `car locator`
    (343), `car finder` (437), and `parked car` (41). Interestingly enough, `car park`
    delivered the best results (see [Figure 2-3](#9781430262381_Ch02.xhtml#Fig3)),
    although you might expect `car locator` or `car finder` to be the better keyword
    combinations. That just goes to show how subjective search terms can be, so try
    everything!


    ![9781430262381_Fig02-03.jpg](images/9781430262381_Fig02-03.jpg)


    [Figure 2-3](#9781430262381_Ch02.xhtml#_Fig3). Searching the App Store for `car
    park` found 14 related apps within the first 20 listed items


    This example demonstrates another important point. Did you notice that a select
    few apps seem to come up in almost all the related searches? It’s no coincidence
    that at the time of this search, apps that ranked higher showed up higher and
    more frequently.


    But for those other frequently listed apps to outperform their competition and
    consistently show up in most of the relevant searches—and in the first 20 results,
    no less—proves they’re utilizing important keywords and strategic app names to
    help achieve this.


    When most consumers search for a type of app, they usually won’t read past the
    first few screens of results, and that typically means the first three to five
    tiles. So it’s important that you study the descriptions and names of your major
    competitors’ apps to figure out which keywords are crucial for you to include.
    Although descriptions are no longer searchable in the App Store, they do often
    include eye-catching text phrases that could prove valuable in your keyword quest.
    Getting placement in the first screen of related search results will provide much-needed
    exposure for your app, which ultimately can also help boost sales, furthering
    app visibility.


    Another tip for hunting down your competition is to read the customer reviews
    for the apps you already found. Often, customers will compare apps in their reviews,
    recommending one over the other. Make sure to add any new mentions to your growing
    list of competitive apps and also take a close look at them. Were the reviewers
    correct in their comparison of the apps and their features? One technique I really
    like to use is to see what users are saying the app is lacking, or what the app
    is doing wrong. If you can provide an individual the needs and wants that the
    current app they are using is lacking, it would be very easy to make that user
    switch over to your app. Make sure you never do the sleazy "check my app out"
    user review in your competitors’ apps; this makes you look really, really bad
    and Apple will ultimately remove your review.


    ## Using Alternative App Directories for Competitive Research


    You’ll perform most of your searches within your regional App Store in iTunes,
    but don’t forget about competitive apps that may be available only in other countries.
    This is especially important if you plan on eventually offering your app in several
    country-specific App Stores outside your own.


    Several web-based, third-party app directories are worth exploring. Many of these
    sites also post app reviews. You’ll find a listing of these useful sites in this
    book’s appendix.


    ## Analyzing App Ranking Statistics


    After getting a handle on how much competition is out there for your particular
    niche, it’s also important to find out how your competitors are faring in the
    App Store. Are they ranked high in the App Store charts? Have any of them broken
    out of their primary categories to rank well in overall downloads? Do those apps
    perform better in some countries than in others? This information can also help
    you determine whether a particular niche is popular or profitable enough to warrant
    your own development investment in it.


    Your iTunes Connect account limits you to viewing only your own app statistics,
    but thankfully, some amazing alternatives can assist in your competitive research
    quest:'
