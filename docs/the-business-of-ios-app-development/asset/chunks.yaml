    of the concepts at work here. But for the sake of being thorough, let’s step through
    it and look at how each piece operates.


    Beyond synthesizing and releasing the ad-related properties in the appropriate
    sections, you’ll notice that the `viewDidLoad` event calls `prepareAdBannerView`,
    `prepareAltAdBanner`, and `adjustAdBannerPosition`, so let’s start with those
    methods.


    The `prepareAdBannerView` method creates a new instance of `ADBannerView`, sets
    its ad frame size based on the device’s current orientation, and then sends an
    iAd request to the iAd Network. Initially, this iAd banner frame is placed off
    the screen. When an iAd banner has been successfully received from the iAd Network,
    only then will the iAd banner frame be displayed on the screen. Moving the iAd
    into view is done in the `adjustAdBannerPosition` method.


    So how does your app know when an iAd banner is available to display? As an `ADBannerViewDelegate`,
    this class receives messages from the iAd Network after the `prepareAdBannerView`
    method sends the request. When an iAd Network reply is received, the `bannerView:didFailToReceiveAdWithError:`
    event fires. If an iAd banner cannot be loaded, then the Boolean `ADBannerView.bannerLoaded`
    is set to `NO`. If an iAd is successfully loaded, then that Boolean is set to
    `YES`. When the received iAd is finished loading into the `ADBannerView` frame,
    the `bannerViewDidLoadAd` event is fired. When either the `bannerView:didFailToReceiveAdWithError:`
    or `bannerViewDidLoadAd` events fire, the `adjustAdBannerPosition` method should
    be called, regardless of whether there is an iAd to display.


    Just in case the iAd Network is unable to provide an iAd, this example project
    includes a backup plan to show a house ad instead. The `prepareAltAdBanner` method
    creates a new instance of an image-based `UIButton` to show the alternate house
    ad in the event that iAd is unavailable. This `UIButton` is configured and placed
    off-screen until it is needed. Of course, if you would rather use a third-party
    ad banner as a fallback option instead of a house ad, you could easily customize
    this method with your own code that requests and configures an advertisement from
    another ad network, like AdMob or InMobi.


    The `adjustAdBannerPosition` method does all the heavy lifting of moving the appropriate
    ad banner onto the screen and resizing the existing UI elements to accommodate
    the ad banner frame. It is also responsible for removing the ad banner and reverting
    the app’s UI to its normal, full-screen state if network connectivity is lost.
    This transition of sliding the ad banner in and out of view is achieved using
    `UIView` animation (see [Figure 7-13](#9781430262381_Ch07.xhtml#Fig13)).


    ![9781430262381_Fig07-13.jpg](images/9781430262381_Fig07-13.jpg)


    [Figure 7-13](#9781430262381_Ch07.xhtml#_Fig13). Using UIView animation, the adjustAdBannerPosition
    method is responsible for sliding the ad banner in and out of view and adjusting
    the rest of the app’s UI as needed


    The `adjustAdBannerPosition` method configures and juggles the placement of the
    iAd banner frame and the house ad `UIButton`. If an iAd is available, then the
    iAd banner frame is assigned a pixel position on the screen, and the house ad
    is given an off-screen position. And if there’s no iAd to display, the opposite
    occurs, with the house ad receiving on-screen placement, and the iAd banner frame
    being relegated to off-screen coordinates (see [Figure 7-14](#9781430262381_Ch07.xhtml#Fig14)).
    If the device loses network connectivity, then both the iAd banner frame and the
    house ad `UIButton` are given off-screen pixel positions.


    ![9781430262381_Fig07-14.jpg](images/9781430262381_Fig07-14.jpg)


    [Figure 7-14](#9781430262381_Ch07.xhtml#_Fig14). If an iAd is available, then
    it is displayed on the screen. In the absence of an iAd banner, the alternate
    house ad is shown instead


    To ensure that the displayed ad banner and the affected UI elements are properly
    positioned (with the correct ad size) when the device’s orientation is changed,
    you need to also add the native Cocoa Touch events `viewWillAppear` and `willRotateToInterfaceOrientation`
    to the *MainViewController_iPhone.m* code. When either of those events fire, the
    `adjustAdBannerPosition` method should always be called.


    If an iAd banner is tapped, the iAd modal view advertisement is displayed, taking
    over the screen (with the host app idling in the background until the iAd is dismissed).
    But when the alternate house ad is displayed, what happens when a user taps that
    banner? As a `UIButton`, its action selector is set to call the `tappedAltAdBanner`
    method. Right now, the example code within that method launches `http://www.iPhoneBusinessBook.com`
    in Mobile Safari, but you could easily replace that code with a custom action
    of your choice.'
  trans: "```objective-c\n} else {\n    // iAd 不可用或发生错误，\n    // 因此显示备用广告横幅。\n   \
    \ // 在此示例中，显示的是自定义的内部广告，\n    // 但以下代码可以轻松替换为\n    // 显示来自其他广告网络（如 AdMob）的广告。\n\
    \n    // 调整备用广告横幅上方内容视图的高度。\n    viewFrame.size.height -= altAdHeight;\n\n   \
    \ // 由于未使用 iAd，将 iAd 位置移出屏幕。\n    iAdPosition += iAdHeight;\n\n    // 现在调整备用广告横幅的屏幕显示位置。\n\
    \    altAdPosition -= altAdHeight;\n}\n\n} else {\n    // 不，网络连接不可用，因此隐藏广告横幅。\n\
    \n    // 将两个横幅视图都移出屏幕。\n    iAdPosition += iAdHeight;\n    altAdPosition += altAdHeight;\n\
    }\n\n// 将请求的广告横幅滑入视野，\n// 并将另一个广告横幅视图移出屏幕。\n[UIView animateWithDuration:animationDuration\
    \ animations:^{\n    contentView.frame = viewFrame;\n    [contentView layoutIfNeeded];\n\
    \    adBannerView.frame = CGRectMake(0.0, iAdPosition, adBannerView.frame.size.width,\
    \ adBannerView.frame.size.height);\n    altAdBannerButton.frame = CGRectMake(0.0,\
    \ altAdPosition, altAdWidth, altAdHeight);\n}];\n```\n\n```objective-c\n// 作为\
    \ ADBannerViewDelegate，此类将接收来自 iAd 框架的消息，\n// 通知您的应用 iAd 横幅是否已加载。\n#pragma mark\
    \ ADBannerViewDelegate 方法\n\n- (void)bannerViewDidLoadAd:(ADBannerView *)banner\
    \ {\n    [self adjustAdBannerPosition:YES];\n}\n\n- (void)bannerView:(ADBannerView\
    \ *)banner didFailToReceiveAdWithError:(NSError *)error {\n    [self adjustAdBannerPosition:YES];\n\
    }\n\n- (BOOL)bannerViewActionShouldBegin:(ADBannerView *)banner willLeaveApplication:(BOOL)willLeave\
    \ {\n    return YES;\n}\n\n- (void)bannerViewActionDidFinish:(ADBannerView *)banner\
    \ {\n}\n// ADBannerViewDelegate 方法结束\n\n- (void)didReceiveMemoryWarning {\n  \
    \  [super didReceiveMemoryWarning];\n}\n\n- (void)viewDidUnload {\n    self.contentView\
    \ = nil;\n    adBannerView.delegate = nil;\n    self.adBannerView = nil;\n   \
    \ [super viewDidUnload];\n}\n\n- (void)dealloc {\n    [contentView release];\n\
    \    adBannerView.delegate = nil;\n    [adBannerView release];\n    [altAdBannerButton\
    \ release];\n    [[NSNotificationCenter defaultCenter] removeObserver:self];\n\
    \    [super dealloc];\n}\n\n@end\n```\n\n我在该代码中穿插了一些有用的注释，因此快速阅读 `MainViewController_iPhone.m`\
    \ 后，您可能已经对这里所涉及的概念有了很好的理解。但为了确保详尽无遗，让我们逐步过一遍，看看每个部分是如何运作的。\n\n除了在相应部分对与广告相关的属性进行合成和释放之外，您会注意到\
    \ `viewDidLoad` 事件调用了 `prepareAdBannerView`、`prepareAltAdBanner` 和 `adjustAdBannerPosition`，因此我们从这些方法开始。\n\
    \n`prepareAdBannerView` 方法会创建一个新的 `ADBannerView` 实例，根据设备当前方向设置其广告框架尺寸，然后向 iAd\
    \ 网络发送 iAd 请求。最初，这个 iAd 横幅框架被放置在屏幕之外。只有当从 iAd 网络成功接收到 iAd 横幅后，iAd 横幅框架才会显示在屏幕上。将\
    \ iAd 移入视野的操作是在 `adjustAdBannerPosition` 方法中完成的。\n\n那么，您的应用如何知道何时有 iAd 横幅可以显示？作为\
    \ `ADBannerViewDelegate`，此类在 `prepareAdBannerView` 方法发送请求后会从 iAd 网络接收消息。当收到 iAd\
    \ 网络回复时，`bannerView:didFailToReceiveAdWithError:` 事件会被触发。如果无法加载 iAd 横幅，则布尔值 `ADBannerView.bannerLoaded`\
    \ 会被设置为 `NO`。如果 iAd 成功加载，则该布尔值会被设置为 `YES`。当接收到的 iAd 完成加载到 `ADBannerView` 框架时，`bannerViewDidLoadAd`\
    \ 事件会被触发。当 `bannerView:didFailToReceiveAdWithError:` 或 `bannerViewDidLoadAd` 事件中的任意一个被触发时，无论是否有\
    \ iAd 要显示，都应该调用 `adjustAdBannerPosition` 方法。\n\n为了应对 iAd 网络无法提供 iAd 的情况，此示例项目包含了一个备用方案，即显示内部广告。`prepareAltAdBanner`\
    \ 方法会创建一个新的基于图像的 `UIButton` 实例，用于在 iAd 不可用时显示替代的内部广告。这个 `UIButton` 被配置好并放置在屏幕之外，直到需要时才使用。当然，如果您更愿意使用第三方广告横幅作为备用选项而不是内部广告，您可以轻松地使用自己的代码自定义此方法，以从其他广告网络（如\
    \ AdMob 或 InMobi）请求和配置广告。\n\n`adjustAdBannerPosition` 方法负责所有繁重的工作，包括将适当的广告横幅移动到屏幕上，以及调整现有\
    \ UI 元素的大小以适应广告横幅框架。同时，它还在网络连接丢失时负责移除广告横幅并将应用的 UI 恢复到正常的全屏状态。这种将广告横幅滑入和滑出视野的过渡是通过使用\
    \ `UIView` 动画实现的（参见图 7-13）。\n\n![9781430262381_Fig07-13.jpg](img/9781430262381_Fig07-13.jpg)\n\
    \n图 7-13. 使用 UIView 动画，`adjustAdBannerPosition` 方法负责将广告横幅滑入和滑出视野，并根据需要调整应用其余 UI\n\
    \n`adjustAdBannerPosition` 方法配置并协调 iAd 横幅框架和内部广告 `UIButton` 的放置。如果 iAd 可用，那么 iAd\
    \ 横幅框架会被分配屏幕上的像素位置，而内部广告则被赋予屏幕外的位置。如果没有 iAd 可显示，则情况相反，内部广告获得屏幕上的位置，而 iAd 横幅框架被降级为屏幕外的坐标（参见图\
    \ 7-14）。如果设备失去网络连接，则 iAd 横幅框架和内部广告 `UIButton` 都会被赋予屏幕外的像素位置。\n\n![9781430262381_Fig07-14.jpg](img/9781430262381_Fig07-14.jpg)\n\
    \n图 7-14. 如果 iAd 可用，则在屏幕上显示它。在缺少 iAd 横幅的情况下，则显示替代的内部广告\n\n为了确保当设备方向改变时，所显示的广告横幅和受影响的\
    \ UI 元素能够正确放置（并具有正确的广告尺寸），您还需要将原生的 Cocoa Touch 事件 `viewWillAppear` 和 `willRotateToInterfaceOrientation`\
    \ 添加到 `MainViewController_iPhone.m` 代码中。当这两个事件中的任意一个被触发时，都应该调用 `adjustAdBannerPosition`\
    \ 方法。\n\n如果 iAd 横幅被点击，则会显示 iAd 的模态视图广告，并占据整个屏幕（宿主应用在后台闲置，直到 iAd 被关闭）。但是，当显示替代的内部广告时，用户点击该横幅会发生什么？作为一个\
    \ `UIButton`，其动作选择器被设置为调用 `tappedAltAdBanner` 方法。目前，该方法中的示例代码会在 Mobile Safari\
    \ 中启动 `http://www.iPhoneBusinessBook.com`，但您可以轻松地将该代码替换为您选择的自定义操作。"
- fmt: "To complete this project, don’t forget to add the new code from `MainViewController_iPhone.m`\
    \ to its iPad companion, `MainViewController_iPad.m`. All of the new code should\
    \ be identical, with the exception of the `prepareAltAdBanner` and `adjustAdBannerPosition`\
    \ methods, which both contain iPad-specific code, as follows:\n\n```objc\n- (void)prepareAltAdBanner\
    \ {\n    // This method creates and configures a  custom house ad banner offscreen\n\
    \    // in the event that an iAd banner is not available. But the code below could\n\
    \    // be easily replaced to show an ad from another ad network like AdMob.\n\
    \n    // Create the alternate ad banner based on the device's current orientation.\n\
    \    UIImage *altAdImg = [[[UIImage alloc] init] autorelease];\n    NSString *adBannerImage\
    \ = [[NSString alloc] init];\n    if (UIInterfaceOrientationIsLandscape([UIDevice\
    \ currentDevice].orientation)) {\n        adBannerImage = @\"adbannerlandscape-ipad.png\"\
    ;\n    } else {\n        adBannerImage = @\"adbannerportrait-ipad.png\";\n   \
    \ }\n    altAdImg = [UIImage imageNamed:adBannerImage];\n\n    UIButton *altButton\
    \ = [[UIButton buttonWithType:UIButtonTypeCustom] autorelease];\n    [altButton\
    \ setBackgroundImage:altAdImg forState:UIControlStateNormal];\n    [altButton\
    \ addTarget:self action:@selector(tappedAltAdBanner) forControlEvents:UIControlEventTouchUpInside];\n\
    \    self.altAdBannerButton = altButton;\n\n    // Initially, this ad banner will\
    \ be placed offscreen.\n    // Once the ad is ready to be shown, then the ad banner\
    \ will be displayed.\n    CGRect adFrame = CGRectMake(0.0, CGRectGetMaxY(self.view.bounds),\
    \ altAdImg.size.width, altAdImg.size.height);\n    self.altAdBannerButton.frame\
    \ = adFrame;\n\n    // Add the alternate ad banner to the parent view.\n    [self.view\
    \ addSubview:self.altAdBannerButton];\n    [adBannerImage release];\n}\n\n- (void)adjustAdBannerPosition:(BOOL)animated\
    \ {\n    // Set up some initial properties for calculating positions and animation.\n\
    \    CGFloat animationDuration = animated ? 0.3 : 0.0;\n    CGRect viewFrame =\
    \ self.view.bounds;\n    CGFloat iAdPosition = self.view.frame.size.height;\n\
    \    CGFloat iAdHeight = 0.0;\n    CGFloat altAdPosition = self.view.frame.size.height;\n\
    \    CGFloat altAdWidth = 0.0;\n    CGFloat altAdHeight = 0.0;\n    UIImage *altAdImage\
    \ = [[[UIImage alloc] init] autorelease];\n\n    if (UIInterfaceOrientationIsLandscape([UIDevice\
    \ currentDevice].orientation)) {\n        // Landscape iPad Height: 768 - 20 pixel\
    \ status bar = 748.\n        adBannerView.currentContentSizeIdentifier = ADBannerContentSizeIdentifierLandscape;\n\
    \        iAdPosition = 748.0;\n        // Landscape iAd Banner Size: 1024 width,\
    \ 66 height.\n        iAdHeight = adBannerView.frame.size.height;\n        altAdImage\
    \ = [UIImage imageNamed:@\"adbannerlandscape-ipad.png\"];\n        altAdPosition\
    \ = 748.0;\n    } else {\n        // Portrait iPad Height: 1024 - 20 pixel status\
    \ bar = 1004.\n        adBannerView.currentContentSizeIdentifier = ADBannerContentSizeIdentifierPortrait;\n\
    \        iAdPosition = 1004.0;\n        // Portrait iAd Banner Size: 768 width,\
    \ 66 height.\n        iAdHeight = adBannerView.frame.size.height;\n        altAdImage\
    \ = [UIImage imageNamed:@\"adbannerportrait-ipad.png\"];\n        altAdPosition\
    \ = 1004.0;\n    }\n    [altAdBannerButton setBackgroundImage:altAdImage forState:UIControlStateNormal];\n\
    \    altAdWidth = altAdImage.size.width;\n    altAdHeight = altAdImage.size.height;\n\
    \n    // Check status of Internet connection to decide whether or not to show\
    \ an ad.\n    if (isNetAvailable) {\n        // YES, Internet connection is available,\
    \ so show ad banner.\n\n        if (adBannerView.bannerLoaded) {\n           \
    \ // An iAd was successfully loaded into the ad banner,\n            // so slide\
    \ it into view. Also resize contentView height\n            // to make room for\
    \ the ad banner at the bottom.\n\n            // Adjust height for contentView\
    \ above iAd banner.\n            viewFrame.size.height -= iAdHeight;\n\n     \
    \       // Since alternate ad banner is not being used,\n            // adjust\
    \ its position offscreen.\n            altAdPosition += altAdHeight;\n\n     \
    \       // Now adjust onscreen position for iAd banner.\n            iAdPosition\
    \ -= iAdHeight;\n        } else {\n            // iAd not available or an error\
    \ occurred,\n            // so show alternate ad banner instead.\n           \
    \ // For this example, a  custom house ad is shown,\n            // but the code\
    \ below could be easily replaced to\n            // show an ad from another ad\
    \ network like AdMob.\n\n            // Adjust height for contentView above alternative\
    \ ad banner.\n            viewFrame.size.height -= altAdHeight;\n\n          \
    \  // Since iAd is not being used, adjust iAd position offscreen.\n          \
    \  iAdPosition += iAdHeight;\n\n            // Now adjust onscreen position for\
    \ alternate ad banner.\n            altAdPosition -= altAdHeight;\n        }\n\
    \    } else {\n        // NO, Internet connection is NOT available, so hide ad\
    \ banner.\n\n        // Move both banner views offscreen.\n        iAdPosition\
    \ += iAdHeight;\n        altAdPosition += altAdHeight;\n    }\n\n    // Slide\
    \ the requested ad banner into view,\n    // and move the other ad banner view\
    \ offscreen.\n    [UIView animateWithDuration:animationDuration animations:^{\n\
    \        contentView.frame = viewFrame;\n        [contentView layoutIfNeeded];\n\
    \        adBannerView.frame = CGRectMake(0.0, iAdPosition, adBannerView.frame.size.width,\
    \ adBannerView.frame.size.height);\n        altAdBannerButton.frame = CGRectMake(0.0,\
    \ altAdPosition, altAdWidth, altAdHeight);\n    }];\n}\n```\n\nThe difference\
    \ here is that these two methods have been customized with iPad-specific ad banner\
    \ sizes and screen coordinates to fit the larger dimensions of the tablet’s display\
    \ (see [Figure 7-15](#9781430262381_Ch07.xhtml#Fig15)).\n\n![9781430262381_Fig07-15.jpg](images/9781430262381_Fig07-15.jpg)\n\
    \n[Figure 7-15](#9781430262381_Ch07.xhtml#_Fig15). The iPad target requires modified\
    \ `prepareAltAdBanner` and `adjustAdBannerPosition` methods to accommodate iPad-specific\
    \ ad sizes and placement\n\n**Note** Experienced iOS developers may find the similarities\
    \ between the iPhone and iPad code fairly repetitive. I’ll be the first to admit\
    \ that much of the code could be refactored for sharing between the two targets\
    \ to reduce the redundancy. But there really is a method to my madness. The book’s\
    \ readers are a very diverse bunch, ranging from entry-level beginners to advanced\
    \ programmers. By leaving all of the related code in one place for each target,\
    \ this approach makes it much easier for readers to follow the code and quickly\
    \ learn how the project works, regardless of skill level.\n\nIf you run into any\
    \ snags incorporating this example code into your own app projects, or if you\
    \ need to build a more advanced solution, check out Apple’s extensive iAd documentation\
    \ available online at the iOS Dev Center:\n\n- *iAd Programming Guide* (`http://developer.apple.com/library/ios/#documentation/UserExperience/Conceptual/iAd_Guide/`)\n\
    - *iAd Framework Reference* (`http://developer.apple.com/library/ios/#documentation/UserExperience/Reference/iAd_ReferenceCollection/`)\n\
    \n## Enabling Live Ads in Your App\n\nBefore submitting your app to the App Store,\
    \ Optime Software’s Jon Schlegel offers some sound advice: “Don’t forget to disable\
    \ the ‘test ad’ mode before you go live in the App Store. I know several developers\
    \ who have forgotten to do that and have lost quite a bit of money as a result\
    \ [from displaying test ads that don’t earn revenue]. We trigger a compiler warning\
    \ in all of our apps when the ‘test ad’ mode is enabled to make sure that we don’t\
    \ go live with the test ads.”\n\nIf you’re using third-party ad networks such\
    \ as AdMob, be sure to check their respective SDK documentation for instructions\
    \ on how to disable the test ad mode (if applicable) before publishing your app\
    \ in the App Store."
