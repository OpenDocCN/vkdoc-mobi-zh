- fmt: "**App Rejection Warning**  \nKeywords cannot contain words or phrases that\
    \ are irrelevant, offensive, or refer to other products, brands, and registered\
    \ trademarks. Don’t try to be clever by including the names of competitive apps\
    \ in your keywords list. And be very careful not to include trademarked names\
    \ or celebrity names that you do not have licensed permission to use. Doing so\
    \ will only get your app rejected! For example, if your app is an independent\
    \ movie listings guide, including keywords like `Moviefone`, `Netflix`, `Fandango`,\
    \ or even actor names could get your app booted from the App Store. Apple says\
    \ that “improper use of keywords is the fourth most common reason for App Store\
    \ rejections.”\n\n- **Avoid overly common keywords.** Common, generalized keywords\
    \ will produce a huge list of search results, making it much more difficult for\
    \ your app to be discovered. Honing in on more specific keywords that will produce\
    \ fewer search results will not only improve your search relevancy, but will also\
    \ make it easier for your app to be included closer to the top of the search results\
    \ list. For example, if your app is a flying game that requires users to navigate\
    \ a spaceship through a three-dimensional maze of stars and planets, don’t use\
    \ general keywords like `game` or `fun`, which basically describe every game in\
    \ the App Store. Narrow your keywords to more specific terms that game lovers\
    \ might search for, such as `spaceship` and `mission`.\n- **Avoid repetition.**\
    \ Since you’re limited to only 100 characters, don’t repeat the same words in\
    \ both your app name and keywords, since both are included in App Store searches.\
    \ For example, if your app name includes the word `spaceship`, there’s no need\
    \ to waste valuable characters by including `spaceship` in your keywords.\n- **Cover\
    \ all your regions.** If you’ve localized your app to more than one language,\
    \ it’s important to include localized keywords in the Localization section of\
    \ `iTunes Connect` for every region your app supports. If you’ve decided to make\
    \ your application available in both English and German App Stores, you’ll want\
    \ to submit keywords in both English and German so that your app is searchable\
    \ in those related regional App Stores.\n\nTake special care in crafting your\
    \ list of keywords before submitting them in `iTunes Connect`. You will be able\
    \ to edit them again only upon uploading a new binary app version or if your app\
    \ has been rejected and needs to be reviewed again. This precaution is in place\
    \ so that Apple can approve your keywords during the app review process. It prevents\
    \ the keywords system from being gamed or abused by developers. It also makes\
    \ it vital that the keywords list submitted is perfectly optimized and free of\
    \ typos, since you won’t be able to go back and revise your keywords until the\
    \ next time your app is officially reviewed by Apple.\n\n**Tip**  \nStill not\
    \ sure what keywords to use for optimal results? As mentioned in [Chapter 10](#9781430262381_Ch10.xhtml),\
    \ Google’s AdWords keyword tool (`https://adwords.google.com/select/KeywordToolExternal`)\
    \ can be a helpful resource. Although Google designed that web tool to help people\
    \ refine their SEO plans and ad campaigns, it can also help you identify and compare\
    \ the popularity of specific keywords. The data is not App Store–related, but\
    \ it does give you a good idea of what people are searching for online as it relates\
    \ to your app’s subject matter. For those of you having trouble pinpointing strategic\
    \ keywords via App Store searches, Google’s keyword tool provides much better\
    \ answers than simply making wild guesses on your own.\n\n## The Name Game\n\n\
    In [Chapter 2](#9781430262381_Ch02.xhtml), I stressed how important it is that\
    \ your app name be short enough to display in its entirety on iOS’ home screen\
    \ without being truncated. Having a short app name also serves you well when displayed\
    \ in search results in the App Store. A shorter app name ensures that the entire\
    \ name is displayed without being truncated. Tap Tap Tap’s `Voices` and `Convert`\
    \ app names are very easy to read, leaving room to add a descriptive caption to\
    \ the title (see [Figure 11-1](#9781430262381_Ch11.xhtml#Fig1)).\n\n![9781430262381_Fig11-01.jpg](images/9781430262381_Fig11-01.jpg)\n\
    \n[Figure 11-1](#9781430262381_Ch11.xhtml#_Fig1). With `Voices` and `Convert`,\
    \ Tap Tap Tap kept its app names short for easy readability, and added descriptive,\
    \ keyword-rich captions to their name titles in the App Store\n\nThat’s right,\
    \ your application’s name in the App Store isn’t limited to only the app name\
    \ itself. It’s perfectly acceptable to add a descriptive caption to the App Name\
    \ field. Just be sure your app’s name comes first, followed by any additional\
    \ descriptive text, so that the actual name will always be visible when listed\
    \ in search results. It’s fine that the embedded caption shown in [Figure 11-1](#9781430262381_Ch11.xhtml#Fig1)\
    \ is truncated, since it will be displayed in full on the app’s product page (after\
    \ tapping the selection in the list). The simple app names `Convert` and `Voices`\
    \ are listed in the App Store as follows:\n\n- `Convert`—the unit calculator\n\
    - `Voices`—fun voice changing!\n\nThat added caption—usually separated from the\
    \ preceding app name with a simple hyphen or colon—helps describe the application’s\
    \ core functionality. This eye-catching trick not only draws the viewer’s attention,\
    \ but also lets the viewer know what your app does without needing to first read\
    \ the lengthy description. Since it would appear that not many people actually\
    \ take the time to read long app descriptions anymore, this extended app title\
    \ can really benefit your marketing efforts.\n\nThe other major benefit of this\
    \ extended name technique is that it gives you the opportunity to fill the searchable\
    \ App Name field with related keywords! As an example, consider “`Convert`—the\
    \ unit calculator” and one of its competitors, “`Convertbot`—The Amazing Unit\
    \ Converter” by Tapbots:\n\n- If a user searches the App Store for `convert`,\
    \ both `Convert` and `Convertbot` are listed in the search results, because both\
    \ of them include that term in their app names.\n- If a user searches for `calculator`\
    \ or `unit calculator`, only `Convert` appears in the search results, since its\
    \ app title includes those terms as part of its extended name. (It appears that\
    \ `Convertbot`’s keywords are not optimized for `unit calculator` or `calculator`.)\n\
    - If a user searches for `converter`, `Convertbot` is included in the search results,\
    \ whereas `Convert` is not.\n\nKeep in mind that the app name you choose for display\
    \ within the App Store can be edited only when submitting a new app binary for\
    \ review or if your app was rejected and requires resubmission. Like your keywords,\
    \ your app name is subject to Apple’s review team to ensure that no one tries\
    \ to abuse the opportunity with unlicensed trademarks or irrelevant and inappropriate\
    \ words. So, all of the same rules apply here as they do for submitted keywords.\
    \ Attempts to cheat the system will prevent your app from being approved.\n\n\
    Treat the app name as a marketing extension of your related keywords. When your\
    \ keywords list and the app name are working together in unison with highly optimized\
    \ words and phrases, you’re increasing the chances of your product being discovered\
    \ in the overcrowded App Store.\n\n## Perfecting the Sales Pitch of Your App Description"
  raw: '**App Rejection Warning**  Keywords cannot contain words or phrases that are
    irrelevant, offensive, or refer to other products, brands, and registered trademarks.
    Don’t try to be clever by including the names of competitive apps in your keywords
    list. And be very careful not to include trademarked names or celebrity names
    that you do not have licensed permission to use. Doing so will only get your app
    rejected! For example, if your app is an independent movie listings guide, including
    keywords like Moviefone, Netflix, Fandango, or even actor names could get your
    app booted from the App Store. Apple says that “improper use of keywords is the
    fourth most common reason for App Store rejections.”


    *   **Avoid overly common keywords.** Common, generalized keywords will produce
    a huge list of search results, making it much more difficult for your app to be
    discovered. Honing in on more specific keywords that will produce fewer search
    results will not only improve your search relevancy, but will also make it easier
    for your app to be included closer to the top of the search results list. For
    example, if your app is a flying game that requires users to navigate a spaceship
    through a three-dimensional maze of stars and planets, don’t use general keywords
    like *game* or *fun*, which basically describe every game in the App Store. Narrow
    your keywords to more specific terms that game lovers might search for, such as
    *spaceship* and *mission*.

    *   **Avoid repetition.** Since you’re limited to only 100 characters, don’t repeat
    the same words in both your app name and keywords, since both are included in
    App Store searches. For example, if your app name includes the word *spaceship*,
    there’s no need to waste valuable characters by including *spaceship* in your
    keywords.

    *   **Cover all your regions.** If you’ve localized your app to more than one
    language, it’s important to include localized keywords in the Localization section
    of iTunes Connect for every region your app supports. If you’ve decided to make
    your application available in both English and German App Stores, you’ll want
    to submit keywords in both English and German so that your app is searchable in
    those related regional App Stores.


    Take special care in crafting your list of keywords before submitting them in
    iTunes Connect. You will be able to edit them again only upon uploading a new
    binary app version or if your app has been rejected and needs to be reviewed again.
    This precaution is in place so that Apple can approve your keywords during the
    app review process. It prevents the keywords system from being gamed or abused
    by developers. It also makes it vital that the keywords list submitted is perfectly
    optimized and free of typos, since you won’t be able to go back and revise your
    keywords until the next time your app is officially reviewed by Apple.


    **Tip**  Still not sure what keywords to use for optimal results? As mentioned
    in [Chapter 10](#9781430262381_Ch10.xhtml), Google’s AdWords keyword tool (`https://adwords.google.com/select/KeywordToolExternal`)
    can be a helpful resource. Although Google designed that web tool to help people
    refine their SEO plans and ad campaigns, it can also help you identify and compare
    the popularity of specific keywords. The data is not App Store–related, but it
    does give you a good idea of what people are searching for online as it relates
    to your app’s subject matter. For those of you having trouble pinpointing strategic
    keywords via App Store searches, Google’s keyword tool provides much better answers
    than simply making wild guesses on your own.


    The Name Game


    In [Chapter 2](#9781430262381_Ch02.xhtml), I stressed how important it is that
    your app name be short enough to display in its entirety on iOS’ home screen without
    being truncated. Having a short app name also serves you well when displayed in
    search results in the App Store. A shorter app name ensures that the entire name
    is displayed without being truncated. Tap Tap Tap’s Voices and Convert app names
    are very easy to read, leaving room to add a descriptive caption to the title
    (see [Figure 11-1](#9781430262381_Ch11.xhtml#Fig1)).


    ![9781430262381_Fig11-01.jpg](images/9781430262381_Fig11-01.jpg)


    [Figure 11-1](#9781430262381_Ch11.xhtml#_Fig1). With Voices and Convert, Tap Tap
    Tap kept its app names short for easy readability, and added descriptive, keyword-rich
    captions to their name titles in the App Store


    That’s right, your application’s name in the App Store isn’t limited to only the
    app name itself. It’s perfectly acceptable to add a descriptive caption to the
    App Name field. Just be sure your app’s name comes first, followed by any additional
    descriptive text, so that the actual name will always be visible when listed in
    search results. It’s fine that the embedded caption shown in [Figure 11-1](#9781430262381_Ch11.xhtml#Fig1)
    is truncated, since it will be displayed in full on the app’s product page (after
    tapping the selection in the list). The simple app names Convert and Voices are
    listed in the App Store as follows:


    *   Convert—the unit calculator

    *   Voices—fun voice changing!


    That added caption—usually separated from the preceding app name with a simple
    hyphen or colon—helps describe the application’s core functionality. This eye-catching
    trick not only draws the viewer’s attention, but also lets the viewer know what
    your app does without needing to first read the lengthy description. Since it
    would appear that not many people actually take the time to read long app descriptions
    anymore, this extended app title can really benefit your marketing efforts.


    The other major benefit of this extended name technique is that it gives you the
    opportunity to fill the searchable App Name field with related keywords! As an
    example, consider “Convert—the unit calculator” and one of its competitors, “Convertbot—The
    Amazing Unit Converter” by Tapbots:


    *   If a user searches the App Store for *convert*, both Convert and Convertbot
    are listed in the search results, because both of them include that term in their
    app names.

    *   If a user searches for calculator or unit calculator, only Convert appears
    in the search results, since its app title includes those terms as part of its
    extended name. (It appears that Convertbot’s keywords are not optimized for *unit
    calculator* or *calculator*.)

    *   If a user searches for converter, Convertbot is included in the search results,
    whereas Convert is not.


    Keep in mind that the app name you choose for display within the App Store can
    be edited only when submitting a new app binary for review or if your app was
    rejected and requires resubmission. Like your keywords, your app name is subject
    to Apple’s review team to ensure that no one tries to abuse the opportunity with
    unlicensed trademarks or irrelevant and inappropriate words. So, all of the same
    rules apply here as they do for submitted keywords. Attempts to cheat the system
    will prevent your app from being approved.


    Treat the app name as a marketing extension of your related keywords. When your
    keywords list and the app name are working together in unison with highly optimized
    words and phrases, you’re increasing the chances of your product being discovered
    in the overcrowded App Store.


