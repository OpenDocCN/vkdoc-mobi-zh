  trans: "\n**应用被拒警告**  \n关键词中不得包含无关、具有攻击性、或提及竞品、品牌及注册商标的词汇。别耍小聪明在关键词列表里塞入竞品应用名称，更要格外小心，千万不要包含未经授权使用的商标名或名人姓名，否则你的应用只会被拒绝！例如，如果你的应用只是一个独立电影列表指南，在关键词中加入像`Moviefone`、`Netflix`、`Fandango`甚至演员姓名，都可能导致你的应用被\
    \ App Store 下架。苹果公司表示，“不当使用关键词是导致应用被 App Store 拒绝的第四大常见原因。”\n\n-   **避免使用过于通用的关键词。**\
    \ 常见且笼统的关键词会产生大量搜索结果，让用户更难发现你的应用。专注于更具体、能产生更少搜索结果的关键词，不仅能提高搜索相关性，还能让你的应用更容易出现在搜索结果列表的顶部。例如，如果你的应用是一款要求用户在三维星空行星迷宫中驾驶飞船的飞行游戏，就不要使用像`game`或`fun`这样基本能描述\
    \ App Store 里所有游戏的通用关键词。应将关键词缩小到游戏爱好者可能搜索的更具体词汇，如`spaceship`和`mission`。\n-   **避免重复。**\
    \ 由于你的关键词只有 100 个字符的限制，不要在你的应用名称和关键词中重复相同的词语，因为两者都会在 App Store 搜索中被索引。例如，如果你的应用名称中包含了`spaceship`，就没有必要再在关键词中浪费宝贵的字符来重复它。\n\
    -   **覆盖所有地区。** 如果你的应用已经本地化支持多种语言，那么在你的应用支持的每个地区的`iTunes Connect`的本地化部分包含本地化关键词就非常重要。如果你决定让你的应用同时在英文和德文\
    \ App Store 上架，你需要提交英文和德文的关键词，这样你的应用才能在这些相关的地区性 App Store 中被搜索到。\n\n在向`iTunes\
    \ Connect`提交关键词列表之前，要特别精心地制定它。你将只能在上传新的应用二进制版本，或者你的应用被拒绝需要重新审核时才能再次编辑它们。这种预防措施是为了让苹果在应用审核过程中批准你的关键词。它可以防止关键词系统被开发者玩弄或滥用。这也使得提交的关键词列表必须经过完美优化且没有拼写错误变得至关重要，因为直到你的应用下次被苹果正式审核之前，你都无法返回去修改关键词。\n\
    \n**提示**  \n还不确定使用什么关键词才能获得最佳效果？正如第 10 章中提到的，谷歌的 AdWords 关键词工具 (`https://adwords.google.com/select/KeywordToolExternal`)\
    \ 是一个有用的资源。虽然谷歌设计该网络工具是为了帮助人们优化他们的 SEO 计划和广告活动，但它也可以帮助你识别和比较特定关键词的热度。这些数据虽然与 App\
    \ Store 无关，但它确实能让你很好地了解人们在线搜索什么与你的应用主题相关的内容。对于那些通过 App Store 搜索难以精准定位战略性关键词的人来说，谷歌的关键词工具能提供比你自己胡乱猜测好得多的答案。\n\
    \n## 名称游戏\n\n在第 2 章中，我强调了应用名称足够简短以至于能在 iOS 主屏幕上完整显示而不被截断是多么重要。拥有简短的应用名称在 App Store\
    \ 搜索结果中显示时也对你有益。更短的应用名称能确保整个名称被完整显示而不被截断。Tap Tap Tap 的`Voices`和`Convert`应用名称非常易于阅读，并且为给标题添加描述性说明留出了空间（参见图\
    \ 11-1）。\n\n![9781430262381_Fig11-01.jpg](img/9781430262381_Fig11-01.jpg)\n\n\
    图 11-1。通过`Voices`和`Convert`，Tap Tap Tap 保持了应用名称的简短以便于阅读，并在 App Store 的名称标题中附加了描述性、富含关键词的说明。\n\
    \n没错，你的应用在 App Store 中的名称并不仅限于应用名称本身。在“应用名称”字段中附加一个描述性说明是完全允许的。只需确保你的应用名称在前，后面跟上任何附加的描述性文字，这样当在搜索结果中列出时，实际名称总能可见。图\
    \ 11-1 中嵌入的说明被截断是没问题的，因为它在应用的产品页面（点击列表中的选项后）会完整显示。简单的应用名称`Convert`和`Voices`在 App\
    \ Store 中显示如下：\n\n-   `Convert`—the unit calculator\n-   `Voices`—fun voice changing!\n\
    \n这种附加的说明（通常用简单的连字符或冒号与前面的应用名称隔开）有助于描述应用的核心功能。这种吸引眼球的技巧不仅能吸引观看者的注意力，还能让观看者无需先阅读冗长的描述就知道你的应用是做什么的。鉴于似乎没有多少人愿意花时间阅读冗长的应用描述，这种扩展的应用标题确实能帮助你进行营销推广。\n\
    \n这种“名称扩展”技术的另一个主要好处是，它让你有机会用相关关键词填满可被搜索的“应用名称”字段！举个例子，对比一下“`Convert`—the unit\
    \ calculator”和它的一个竞争对手——Tapbots 的“`Convertbot`—The Amazing Unit Converter”：\n\n\
    -   如果用户搜索`convert`，`Convert`和`Convertbot`都会出现在搜索结果中，因为它们的应用名称都包含该词。\n-   如果用户搜索`calculator`或`unit\
    \ calculator`，只有`Convert`出现在搜索结果中，因为其应用标题通过扩展名称包含了这些词。（看起来`Convertbot`的关键词并没有针对`unit\
    \ calculator`或`calculator`进行优化。）\n-   如果用户搜索`converter`，`Convertbot`会出现在搜索结果中，而`Convert`则不会。\n\
    \n请记住，你为在 App Store 内显示而选择的应用名称，只能在提交新的应用二进制文件供审核时，或者你的应用被拒绝并需要重新提交时才能编辑。与你的关键词一样，你的应用名称也需经过苹果审核团队的审核，以确保没人试图利用未经授权的商标或无关、不当的词汇来滥用这个机会。因此，所有适用于提交关键词的规则同样适用于此。试图欺骗系统的行为会使你的应用无法通过审核。\n\
    \n将应用名称视为你相关关键词的一种营销延伸。当你的关键词列表和应用名称通过高度优化的词汇和短语协同工作时，你就在拥挤的 App Store 中增加了产品被发现的机会。\n\
    \n## 完善应用描述中的销售话术\n"
- fmt: '# App Store Description Best Practices


    Although a product’s App Store description is not searchable, it does still serve
    as a primary marketing tool for users who are interested in learning more about
    your app. Someone has gotten as far as viewing your product page in the App Store,
    and this is your one shot to convince that person why his life is not complete
    until he has purchased your app! The three influential elements on your product
    page are the description, the screenshots, and the customer reviews. We’ll be
    exploring all of these items in this chapter, starting with the anatomy of a good
    app description.


    ## What Is It?


    If you’re not using an extended app name (and you should), or if it’s still not
    obvious what your app’s primary function is, then the very first thing you should
    include in your description is a brief explanation of what your app does and why
    people should buy it. Remember my [Chapter 10](#9781430262381_Ch10.xhtml) discussion
    of “the quick pitch” on your app’s web site? This is no different.


    Just as with your web site, visitors to your App Store product page will take
    only a few seconds to scan the description and screenshots to see whether the
    app captures their interest. Your job is to make sure to provide enough of a sales
    hook that they are motivated to continue reading.


    Although the iPhone version of the App Store displays the full app description
    on product pages, the iPad and desktop iTunes versions of the App Store display
    only the first three or four lines of text, with a `More` link to reveal the rest.
    Unless users are captivated by your screenshots, odds are good they won’t take
    the time to click that `More` link. With this in mind, it’s more important than
    ever to optimize your app summary into a couple of brief sentences placed at the
    very top of your description text so that it will be included on your app’s product
    page. If that brief text summary interests users, they will most likely click
    the `More` link to view your complete list of features and benefits.


    ## Awards and Testimonials


    Ideally, when you were generating a little prerelease buzz (covered in [Chapter
    10](#9781430262381_Ch10.xhtml)), you managed to get a few prominent media reviewers
    to check out your app and provide you with some choice quotes. When your app is
    new in the App Store, you’ll have very few (if any) customer reviews posted, so
    it’s best to include a few winning testimonials in your app description to help
    convince consumers of the app’s quality. And even when your app does receive a
    lot of customer ratings, there’s nothing more influential than praise from respected
    bloggers and magazines. This is also a perfect place to mention any awards your
    app has won.


    It may be tempting to place eye-catching awards and testimonials at the very top
    of your app description, but not at the expense of your quick-pitch app summary.
    If a stellar quote or an award-winning reference can be included along with your
    app summary within the few lines of text that are visible in the iPad and desktop
    iTunes versions of the App Store, then great! But if those accolades use up too
    much space at the top, and your app summary is truncated (by the `More` link),
    that could pose a problem. Consumers may not care that your app won an award if
    they don’t know what it does or how it could benefit them.


    ## App Features and Benefits


    Most people won’t bother reading dense blocks of text, so don’t describe your
    app’s features in long paragraphs. Break it up into brief sections for easy eye-scanning.
    Better yet, if you have a lot of features to mention, structure it as an easy-to-read
    bulleted list instead.


    Don’t ramble on, listing every single last detail about the app. Less is more.
    Space and attention spans are limited, so consolidate your list to just the major
    features and benefits. This includes the core features that consumers are looking
    for, as well as the differentiating factors that set your app apart from the competition.
    If you think a specific feature is a key selling point, then it belongs in this
    list.


    It’s vital to understand the difference between features and benefits so that
    you can craft a more effective app description:


    *   Features represent functionality in the app or game.

    *   Benefits illustrate how that functionality can improve your happiness, lifestyle,
    productivity, and so on.


    For example, a writing app’s ability to synchronize documents via Dropbox is a
    feature. The benefit is that it allows you to continue working on your novel from
    any device or location that can log in to the online Dropbox service.


    ## Putting It All Together


    For best results across all the various versions of the App Store, organize your
    app description elements into the following top-to-bottom sequence:


    *   App summary

    *   Awards and testimonials

    *   Features and benefits


    After reading the previous sections, it should come as no surprise that the app
    summary should be placed at the very top of your App Store description. This is
    your quick pitch that explains what your app is. As I’ve emphasized, this brief
    text should always be visible; clicking the `More` link should not be required
    to read the summary.


    If your app description requires quite a bit of scrolling to read it in its entirety,
    then it’s too long. You don’t want a potential customer’s attention to stray.
    If you’ve included a lot of accolades, try cutting them down to only a few of
    the most influential awards and testimonials. And if your features and benefits
    are not already listed as brief bullet points, doing so can also reduce the amount
    of space your description consumes.


    **App Rejection Warning**  Do not include pricing in your app description, name,
    or icon. The App Store caters to many regional languages and currencies, so displaying
    a static, text-based price is prohibited. If your English app description mentioned
    a price in US dollars, that could cause confusion among customers in the UK App
    Store, since the dynamic buy button lists the app’s price in British pounds. To
    avoid App Store rejection, you can promote limited-time sale offers in your app
    description without mentioning a specific currency. For example, if your `$1.99`
    app is currently on sale for only `99` cents, you could refer to the sale as “Half
    Off” or a “50% Discount.”


    Before submitting your app description, be sure to proofread it using a good spell
    checker! I cannot stress this enough. Nothing says unprofessional like typos and
    misspellings! You want to compete with the big boys like Electronic Arts and Gameloft?
    Then you need to double-check everything you write before it gets uploaded into
    iTunes Connect. Afraid you’ll miss something? Then have a few friends proofread
    the description as well.


    Make sure that your description is easy to understand and does not in any way
    misrepresent your app’s true functionality. Don’t forget that this description
    is not only read by consumers in the App Store. First it’s read by an Apple reviewer.
    If something in your app description is ambiguous or misleading, or if the reviewer
    couldn’t locate one of your listed features in the short time the app is being
    reviewed, it could cause the approval process to be delayed or even result in
    a rejection, with a request for further clarification. Remember that you can modify
    your description with additional information after your app has been approved.


    ## A Picture Is Worth a Thousand Words: The Importance of Screenshots


    Since the App Store does not currently support the inclusion of video demos, the
    only way an interested consumer can immediately see what your app looks like is
    via the screenshots on your product page.'
