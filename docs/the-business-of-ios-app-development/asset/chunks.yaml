- fmt: '# But Don’t Despair. Your Killer App Can Certainly Make a Lot of Money


    But don’t despair. Your killer app can certainly make a lot of money without being
    featured by Apple. Like anything else in life, finding success in the current
    App Store environment will require some hard work and planning, but who says the
    journey can’t be fun along the way? There is just one major thing you will need
    to know: you need to think of your app like a business, not a cash cow, or some
    get-rich-quick scheme. Hard work, a quality product, and a near-genius marketing
    campaign is what it takes to win. This book is written to teach you exactly this.


    ## Tackling the New World of Mobile Marketing


    If you have the benefit of working for a large software company with deep pockets,
    it probably has a dedicated department to handle all of the marketing for the
    products you create. But if you’re an independent developer who is responsible
    for managing every aspect of your own business, then you’re all too familiar with
    the haunting questions that arise when wondering how to implement effective marketing
    strategies to increase app sales.


    And you aren’t alone. Just take a look online at the various iOS-related developer
    forums and mailing lists, and you’ll quickly see countless posts (some with generous
    amounts of cursing) from frustrated programmers, all asking similar questions:


    - How do I promote my app?

    - My app just got approved in the App Store. Now what?

    - How do I get reviews for my app?

    - Yikes! My 99-cent app is selling only a few units a week. What do I do?

    - Is there anything I can do to avoid one-star customer reviews?

    - How can I get my app featured?

    - What’s the best marketing campaign for apps?


    Although this all may look quite daunting, trust me—it’s really not as overwhelming
    as it might appear. My goal here is to provide answers to those questions and
    much more. A lot of innovative marketing tactics, tools, and resources are available
    to iOS developers. Just as you wouldn’t want to bring a knife to a gunfight, the
    key to success is in choosing the right weapon for the task at hand. This book’s
    primary objective is to arm you with the ammunition you need, humbly serving as
    your definitive reference guide to the business of iPhone, iPod touch, and iPad
    app development.


    ## Rest Easy—This Is Not Your Typical Business Book


    If just the thought of reading yet another stale book on overgeneralized marketing
    concepts causes your eyes to roll back in your head, then don’t worry! This is
    not your run-of-the-mill business book. You do not need a Harvard MBA to grok
    this material.


    Like all Apress books, this one was written by developers for developers, taking
    you step by step through marketing solutions that have proven successful for professional
    iOS app creators. I won’t just tell you what you need to do; I’ll also show you,
    firsthand, how to do it.


    This is not about expensive advertising campaigns, and when it comes to apps,
    those high-dollar campaigns rarely work as advertised. This is about cost-effective
    marketing alternatives that can help you sell more apps! In fact, most of the
    business strategies described in this book cost little to no money—perfect for
    all of us indie developers on shoestring budgets. The saying “sometimes the best
    things in life are free” is my go-to marketing mindset. All you need is some dedicated
    time, patience, a little creativity, and of course, this book. As with any successful
    marketing campaign, we will teach you to effectively find your niche.


    ## Planning Your Own Success Story


    I know what you’re thinking. This all sounds very time-consuming, and free time
    is something you simply don’t have to give. As a full-time developer myself, I
    understand this all too well. Whether I’m feeling the pressure from self-imposed
    work deadlines or racing to finish a project for a client, time often feels like
    the enemy. But I just want to spend any free time I do manage to salvage programming
    the next killer app. I don’t want to be bothered with marketing concerns, at least
    not until my app is finished. Unfortunately, that would be far too late.


    Without a solid game plan in place, you’ll find that one solitary publicity push
    when your app is released may not be enough to generate substantial sales. Once
    upon a time, sending out a press release, landing a few magazine reviews, and
    listing your product updates on the popular online software directories worked
    fine to promote traditional desktop applications. But many of those old shareware
    techniques don’t apply here. In the unique world of the App Store, you would most
    likely see a momentary sales bump on launch day that quickly plummeted in the
    week that followed (see [Figure 1-1](#9781430262381_Ch01.xhtml#Fig1)). Then you
    would end up spending a lot of extra time that you had not originally allocated
    in desperate scrambling to figure out how to improve sales.


    ![9781430262381_Fig01-01.jpg](images/9781430262381_Fig01-01.jpg)


    [Figure 1-1](#9781430262381_Ch01.xhtml#_Fig1). Without a long-term marketing plan
    in place, you risk drastically shortening the life span and profitability of your
    iOS app


    If no one knows about your app, it won’t matter how many cool new features you
    add in the future. Did you build an app that consumers will want, satisfying an
    existing need in the marketplace? Did you do anything to create prerelease interest
    in your app? And what about your app’s longevity in the App Store? Have you thought
    about how to sustain and grow your sales beyond the initial release? Wouldn’t
    you prefer your sales to look more like the graph in [Figure 1-2](#9781430262381_Ch01.xhtml#Fig2)?


    ![9781430262381_Fig01-02.jpg](images/9781430262381_Fig01-02.jpg)


    [Figure 1-2](#9781430262381_Ch01.xhtml#_Fig2). Wouldn’t you prefer your sales
    graph to look more like this?


    The reality is that if done right, your marketing efforts should actually help
    save you time in the long run. It’s not just about time management. Sure, carving
    out a few hours every week to focus on promoting your app is important, but that’s
    only part of the solution.


    Before reading any further, you need to make sure you realize it is not 2009 anymore.
    If you want an app to be successful, you need to think of it as a business and
    be ready to put in the hours and work that it takes.


    Think like a marketer. Think big picture.


    It’s not just about what to do after your app is available in the App Store. Did
    you know that as a developer, you can integrate several elements directly into
    your app that can encourage sales, produce additional revenue streams, help users
    spread the word via built-in social marketing, and improve customer support and
    reviews? Your app itself is one of your most powerful promotional tools, but to
    take advantage of these valuable tactics (and many others), you should start planning
    your marketing strategy before you’ve even written a single line of code.


    In fact, this is such an important point that I feel obligated to say it again:
    start planning your marketing strategy before writing a single line of code. By
    incorporating marketing and business savvy into every aspect of the development
    process, you’re giving your app the best possible chance of succeeding in the
    App Store. Before beginning development, ask yourself these important questions:


    - Is my app something that everyone will use, or only people in a specific niche?

    - Are there a ton of other apps out there like this, or is this the first of its
    kind?

    - Who are my competitors?

    - Is my app a product or a service?'
