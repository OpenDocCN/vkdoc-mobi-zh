- fmt: 'Those are new customers who probably would not have purchased your app. So,
    thousands of new users are discovering your app for the first time. If they enjoy
    the free app, you’ve just expanded your customer base with an opportunity to up-sell
    future In-App Purchase content and other new apps. Even if you were already doing
    that within a free lite version, there’s a big difference in audience size. The
    lite version of your relatively unknown app may reach 50,000 users over the course
    of a few months, whereas a highly publicized weekend giveaway of your full paid
    version may add more than 100,000 new users to your existing customer base in
    only a matter of days.


    This strategy works only if you have a way to eventually convert a large percentage
    of these new users into paying customers. Having In-App Purchase items available
    within your app or cross-promoting another paid app can make these kinds of free
    giveaway offers less risky.


    Robert Szeleney partnered with FreeAppADay to offer his popular Rope’n’Fly game
    as a free App Store download for one day. He did this with the express intent
    of spreading awareness for the new sequel, Rope’n’Fly 2\. He capitalized on the
    free download offer by promoting the sequel on the original game’s main screen
    (see [Figure 12-3](#9781430262381_Ch12.xhtml#Fig3)), reaching a much larger audience
    in the process. This extra exposure helped propel Rope’n’Fly 2 into the App Store’s
    Top 50 Paid Apps chart.


    ![9781430262381_Fig12-03.jpg](images/9781430262381_Fig12-03.jpg)


    [Figure 12-3](#9781430262381_Ch12.xhtml#_Fig3). By offering a free one-day download
    of Rope’n’Fly, the game’s main screen helped promote the new paid sequel, Rope’n’Fly
    2, to a much larger audience


    If you currently have only one app available and do not have any plans to integrate
    In-App Purchase, then offering a limited-time free download will aid in app discovery
    and visibility within the App Store, but it may not improve your sales. Candy
    Cane was fortunate in that its gamble of giving away Fling! for a short time pushed
    the game to the number-one spot on the App Store’s Top Free Apps chart. When Fling!
    returned to its normal price, the wave of positive word-of-mouth recommendations
    from users resulted in enough sales to catapult Fling! into the US Top 50 Paid
    Apps chart.


    If you have faith in the quality of your app, then the limited-time free strategy
    may work for you, but it’s risky. For most apps that try this approach, the developers
    see a slight bump in sales after the free offer ends, but it doesn’t last long.
    Without a way to up-sell In-App Purchase items or cross-promote other products,
    it’s often hard to justify this kind of freebie strategy.


    If you’re worried about cannibalizing potential app sales, then why not give away
    something else? That’s what Tap Tap Tap did. To promote the launch of the voice-morphing
    app Voices, Tap Tap Tap partnered with Potion Factory to offer a free copy of
    its Voice Candy application for Mac OS X. To help promote the Voices iPhone app,
    consumers had to tweet about the special offer on Twitter in order to download
    their free copy of Voice Candy. Tap Tap Tap announced this “TweetBlast” promotion
    through MacHeist’s e-mail database and Twitter feed, initially reaching almost
    600,000 members. The word was spread via Twitter, and more and more people found
    their way to the web site. They then tweeted about it to receive the free Mac
    software.


    Tap Tap Tap conducted a successful viral campaign that motivated tens of thousands
    of people to tweet about the offer, which resulted in hundreds of thousands of
    people checking out the Voices app. Besides providing the promotion details, the
    web site also beautifully showcased Tap Tap Tap’s Voices app with demo videos
    and an App Store buy button (see [Figure 12-4](#9781430262381_Ch12.xhtml#Fig4)).
    And sure enough, the ploy worked.


    With an introductory price of only 99 cents, enough people purchased the app within
    the first few days that Voices skyrocketed to number one in the US Top Paid Apps
    chart.


    ![9781430262381_Fig12-04.jpg](images/9781430262381_Fig12-04.jpg)


    [Figure 12-4](#9781430262381_Ch12.xhtml#_Fig4). By offering a free copy of Voice
    Candy for Mac to anyone who tweeted about the special promotion, Tap Tap Tap’s
    clever TweetBlast campaign helped propel Voices to number one in the US App Store’s
    Top Paid Apps chart


    With Tap Tap Tap’s John Casasanta being the creator of MacHeist, the company had
    unique access to an extremely large targeted audience. Obviously, most independent
    developers won’t have mailing lists as large as MacHeist’s list, but this kind
    of social media-based promotion can still work on a smaller level. If you followed
    my advice in [Chapter 10](#9781430262381_Ch10.xhtml) and have spent the past few
    months cultivating your own audience via Twitter, Facebook, e-mail newsletters,
    and blog readers, you should have a sizable base for communicating special offers,
    giveaways, and other app-related news.


    Any online promotion, especially one that utilizes social media, should be designed
    to grow your audience. Don’t give away free software, promo codes, or prizes without
    receiving a valuable connection in return. Even if people tweet about your app,
    there’s no guarantee those tweets will turn into sales. But if people were required
    to follow you on Twitter or subscribe to your free e-mail newsletter in order
    to participate in the promotion, then regardless of the outcome, your marketing
    efforts would be rewarded.


    That’s exactly what Tap Tap Tap did with its Voices TweetBlast campaign. To get
    the free Voice Candy software, participants were required to first sign up for
    a free MacHeist account, follow `@TapTapTap` on Twitter, and then tweet a very
    specific message. Even if the promotion didn’t pay off with a substantial boost
    in Voices sales, it added thousands of new Twitter followers and MacHeist members,
    enabling Tap Tap Tap to easily reach those people again in the future with special
    offers and new product announcements.


    ## Timing a Good Sale to Rejuvenate App Downloads


    Like freebies, sale prices are also heavily reported by many online app directories
    and app review sites, so the extra publicity can definitely drive more traffic
    to your app in the App Store. A carefully timed sale will attract new customers
    who ordinarily may not have purchased your app at its regular price. During a
    sale, you won’t make as much profit per purchase, but ideally, the increase in
    sales volume will make up the difference.


    The goal is to exceed your usual daily revenue and climb higher in the App Store
    charts. The higher you rank, the more visible your app is within the App Store,
    especially if your sale price has boosted the app into the Top 100\. That visibility
    exposes your product to new consumers who may not have previously known about
    it. Seeing your app perform well in the App Store will prompt people to check
    it out. It’s a bit of a vicious cycle. You must sell a lot of units to rank high
    in the App Store charts, but once you’re in the Top 100, that visibility will
    help you sell even more. For as long as that position can be maintained, keep
    offering the discounted price. When your app eventually falls out of the charts,
    you can evaluate whether to revert to the regular price.


    Some iOS developers offer a special introductory low price on a new app the moment
    it lands in the App Store. If it’s a short-lived, hit-driven release, like a game
    or a novelty app that requires higher placement in the App Store charts to survive,
    an instant sale price can maximize its chance for success. But if you’ve developed
    a niche app that caters to a very targeted audience, offering a discount right
    out of the gate could prove to be a bad move.'
