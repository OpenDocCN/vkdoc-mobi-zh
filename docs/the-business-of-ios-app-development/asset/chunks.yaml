    ### 责任限制


    责任限制条款对于您的应用尤为重要，尤其是当您的应用（像许多 iOS 应用一样）仅售价几美元时。如果您的客户只为您的应用支付了一美元，您肯定不希望在他们认为因该应用而受到损害时，面临客户起诉您并索要数千美元赔偿的风险。您最终用户许可协议（EULA）中的责任限制条款有助于降低此风险，并允许您继续以低价（如一美元）销售应用，而无需为了应对客户起诉的风险而提高价格。客户以更优惠的价格获得应用，但同意如果应用无法正常运行，他们不会就超出某个固定金额（很可能是他们为应用支付的金额）的损失起诉您。


    ### Apple 的最终用户许可协议（EULA）


    您绝对应该拥有一份用于管理您与用户之间关系的 EULA，但您可能不需要为自己创建一份自定义协议。如果您不自行上传 EULA，Apple 会默认应用其标准 EULA。


    Apple 的默认 EULA 包含所讨论的一些基本保护条款，例如有限许可授予、免责声明和责任限制。Apple 在其 App Store 条款和许可应用 EULA
    的副本中公布了相关内容，网址为 `http://www.apple.com/legal/itunes/us/terms.html#APPS`。


    Apple 当前的 App Store 条款和许可应用 EULA（日期为 2011 年 2 月 2 日）提供了您在此类协议中所需的大部分基本保护，并且无需额外操作即可实施。然而，出于某些原因，您可能希望创建自己的协议。


    ### 使用您自己 EULA 的理由


    在我看来，Apple 默认 EULA 的最大弱点在于，用户在下载或安装您的应用时，并未被提示接受该协议。用户作为 Apple 其他点击通过协议的一部分，已经同意了这些条款。然而，可以认为，如果要求用户在决定购买您的应用时同意这些条款，该协议将更有可能被强制执行。这并不是说
    Apple 的默认协议不可强制执行，只是说它给用户提供了一个原本不存在的论点——如果 EULA 在下载时呈现给用户并征求其同意，这个论点就不会存在。


    创建自己 EULA 的另一个充分理由是，如果您的应用或业务存在 Apple 默认协议未涵盖的特定风险。例如，如果您正在开发一款帮助医生评估患者需求的医疗应用，您可能需要包含一些特定的免责声明，提醒医生不应仅依赖您的应用来提供护理。如果您正在创建一款涉及用户生成内容的应用，您可能需要加入《数字千年版权法案》（DMCA）安全港条款，该条款有助于在您的用户上传侵权内容时保护您的公司。


    最后，Apple 默认 EULA 中的隐私条款可能与您的公司使用和/或披露用户信息的方式不符。事实上，Apple 默认协议中关于开发者如何使用这些信息的表述相当模糊。如果您计划收集用户的任何个人信息，例如其姓名和电子邮件地址，或者将访问其设备上的数据，例如其音乐资料库或通讯录，您应该认真考虑实施带有针对您业务的特定隐私条款的
    EULA。如果您计划将所获取的信息用于超出为用户提供其下载应用所对应服务之外的任何目的，或者如果您希望保留与其他公司共享这些信息的权利，这一点尤其重要。


    ### 如何以及何时采取法律行动


    那么，您已经采取了必要步骤为您的应用获得了某些知识产权。现在，竞争对手出现了，并且您认为他们可能侵犯了您的权利。您该怎么办？在本章的剩余部分，我将结合一个我认为侵犯了我某款应用商标权的案例，介绍诉讼前和诉讼中的选择方案。


    这个故事涉及我早期的一款名为“Private-I”的应用，它帮助 iPhone 用户找回丢失或被盗的 iPhone。该应用以一个故意引人注目的图标为特色，该图标上以红色字母显示“*Private*”（私人）字样。该图标旨在诱使找到或偷走用户
    iPhone 的人打开应用，以查看用户认为隐私的内容。当应用打开时，它会显示一个看似正在加载某些私人信息的屏幕，但实际上，它正在秘密地向 iPhone 主人发送一封包含手机位置地图的电子邮件。我对这款应用的期望并不高，因为它的本质局限在于，需要小偷打开应用，位置追踪功能才能被激活。令我惊讶的是，这款应用引起了人们的共鸣。它在许多知名博客上被报道，例如
    TechCrunch 和 Engadget。


    与所有取得显著成功的应用一样，在我的应用推出后不久，类似的应用便开始出现。该应用的整体市场不值得为该概念寻求专利保护，而且我也不确定该概念是否值得专利保护，因此我接受了其他人会利用这个想法开发应用的事实。然而，一个竞争对手决定使用与我完全相同的图标来销售其应用，这促使我考虑采取法律行动。以下是对一些诉讼前和诉讼中选择方案的说明，以及我如何针对自己的山寨事件评估这些方案。


    ### 争议解决的第一步


    根据我的经验，Apple 试图避免介入应用开发者之间的纠纷。尽管如此，在您考虑真正提起诉讼之前，值得通过 Apple 寻求补救措施。与 Apple 合作无需任何费用，如果公司响应迅速，可能会立即产生结果。另一方面，诉讼可能既耗时又昂贵。与商标相关的问题可以通过电子邮件地址
    `appdisputes@apple.com` 提交给 Apple 审议。


    在我的案例中，`appdisputes@apple.com` 这个电子邮件地址当时还不存在，但我向 Apple 的版权官员（已在美国版权局注册）发送了请求。我的请求没有得到回复，这让我得出结论：Apple
    的律师更愿意避免介入开发者之间的纠纷。说实话，我不能责怪他们。版权和商标纠纷可能很复杂，Apple 需要在每个案例中就开发者各自的权利做出判定。可以理解为什么
    Apple 更愿意简单地等待开发者通过诉讼或谈判解决纠纷，然后根据法院命令或开发者双方同意的指示采取行动。


    尽管如此，向 Apple 发送电子邮件应该是您追究侵权者的第一步。您不应仅仅假设 Apple 会为您解决纠纷。


    ### 诉讼前步骤


    如果您认为竞争对手侵犯了您的知识产权，诉讼过程的第一步是确定其侵犯了哪些权利：


    *   如果对方在其应用中使用了您的一些图形，您应关注您对这些图形的版权。

    *   如果竞争对手为其应用起的名称与您的应用名称有令人混淆的相似性，您应关注您的商标权。

    *   如果竞争对手的应用采用了您为您的应用创造的相同概念或想法，并且您已提交了专利申请（或者您仍有时间在“销售阻止”条款限制您的权利之前提交申请），您可能希望关注您潜在的专利权。

