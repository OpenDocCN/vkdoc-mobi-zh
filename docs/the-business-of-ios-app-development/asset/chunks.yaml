  raw: 'Most bloggers and web site owners are very familiar with Amazon.com Associates,
    one of the oldest and most popular affiliate programs online. If your site visitors
    follow your affiliate link to Amazon.com and purchase products there, you’ll earn
    a commission on that sale (typically 4 percent or higher, depending on the products).


    Although there are thousands of affiliate programs out there, the one you should
    be most interested in is Apple’s iTunes Affiliate Program. With the iTunes Store
    and the App Store built into every iPhone, iPad, and iPod touch, it’s easy for
    apps to link to the store pages of music, movies, TV shows, audiobooks, and even
    other applications. Free lite apps do it all the time, redirecting users to the
    full paid version in the App Store, in the hopes they will buy it.


    So, there’s no lack of links here. Thousands of iOS apps and their related web
    sites are chock-full of links back to the iTunes Store and the App Store. What
    I find odd is that a large percentage of those links are not affiliate links.
    I’m constantly surprised by just how many developers still do not take advantage
    of this free revenue-generating opportunity.


    Earning a 5 percent commission on digital items that may be priced at only 99
    cents does not sound like a windfall of money, but just like low-priced app sales,
    this business model is all about volume. If you’re sending app users or site visitors
    to the iTunes Store, and Apple is making money from your links, why shouldn’t
    you be compensated for the sales you’re generating for Apple? It’s hard enough
    to make money in the App Store if you’re not in the Top 200, so why would you
    ignore an easy option to earn some extra cash? As a software business owner, you
    should be looking for any and all possible revenue streams that your iOS app and
    web site can deliver for you (legitimately, of course). And in this case, all
    it requires you to do is sign up for the free affiliate program and modify your
    existing URLs.


    Not yet convinced that it’s worth the effort? Here’s a little tidbit that might
    pique your interest.


    Pandora is one of the most beloved Internet radio services available online, and
    its Pandora iOS app is a perennial favorite, forever hovering in the App Store’s
    Free Music Apps Top 10\. Listeners who like the currently playing song can easily
    purchase that track by tapping the Buy from iTunes button (see [Figure 6-10](#9781430262381_Ch06.xhtml#Fig10)).
    The button uses an affiliate link to send the user to the related song page in
    iTunes. If the track is purchased by that user, Pandora earns a commission fee.


    ![9781430262381_Fig06-10.jpg](images/9781430262381_Fig06-10.jpg)


    [Figure 6-10](#9781430262381_Ch06.xhtml#_Fig10). The Pandora Internet radio app
    includes affiliate links to the iPhone’s embedded iTunes Store, enabling listeners
    to easily buy the currently playing song


    Pandora’s chief technology officer, Tom Conrad, revealed that between Pandora’s
    web site and iOS app, Pandora listeners are buying approximately 1 million songs
    a month through their affiliate links! And of those song sales, Pandora’s iOS
    app is responsible for a whopping 20 percent of that.


    It’s not difficult to see how a large customer base can generate substantial traffic
    to the iTunes Store, turning those affiliate links into a major revenue stream.
    The commissions earned from iTunes affiliate links are one of the primary sources
    of income for many of the social gaming platforms, such as OpenFeint (discussed
    in [Chapter 5](#9781430262381_Ch05.xhtml)), which is why they are able to provide
    those feature-rich gaming services for free to iOS developers.


    The great thing about the iTunes Affiliate Program is that when users follow your
    affiliate link to the iTunes Store, you’ll earn a 5 percent commission on everything
    they buy within a 24-hour session or until they click another affiliate link.
    Pandora has seen many of its listeners not only buy the song from the affiliate
    link they followed, but also go on to purchase a few other songs as well, which
    just adds more commissions to Pandora’s earnings.


    Granted, your iPhone or iPad app may not have as many users as Pandora (not many
    apps can match that level of popularity), so let’s examine a more realistic scenario.
    Let’s say your app drives about 50,000 people to the iTunes Store every month.
    Even if only half of them end up buying one or two 99-cent digital items, at a
    5 percent affiliate commission, you would be earning $1,250 to $2,500 per month.
    That’s a lot of money for doing nothing but a one-time URL change to your embedded
    iTunes Store links.


    Joining the iTunes Affiliate Program


    To sign up for the iTunes Affiliate Program, head over to `http://www.apple.com/itunes/affiliates/`.


    There are different affiliate networks for specific regions. Currently, your options
    are LinkShare (United States), TradeDoubler (Europe), LinkShare Japan (Japan),
    and dgm (Australia and New Zealand). Do not sign up for the affiliate network
    that represents your own location, but rather choose the one that best suits your
    app’s target audience.


    Here, we’ll step through the process using the primary US-based affiliate network,
    LinkShare. Clicking the LinkShare link will take you to LinkShare’s sign-up form.
    If you already have a LinkShare account, simply log in at `http://www.linkshare.com`.


    Once you’ve completed the sign-up process and logged in to your LinkShare account,
    there’s still one more step. LinkShare is the affiliate network for hundreds of
    retailers, so within your LinkShare account, you’re required to apply for the
    individual affiliate programs you’re interested in joining. Perform a search of
    LinkShare’s advertiser network for the keyword *iTunes*, and the iTunes Affiliate
    Program will be displayed in the listed results (see [Figure 6-11](#9781430262381_Ch06.xhtml#Fig11)).
    Click the Apply button, and agree to Apple’s terms and conditions.


    ![9781430262381_Fig06-11.jpg](images/9781430262381_Fig06-11.jpg)


    [Figure 6-11](#9781430262381_Ch06.xhtml#_Fig11). After signing up for LinkShare,
    you’ll need to apply for the iTunes Affiliate Program within your LinkShare account.
    Search for iTunes, and then click the Apply button


    Since Apple manually approves all of its affiliates, you’ll need to wait until
    you receive approval confirmation (via e-mail) before you can create any affiliate
    links.


    Once approved by Apple as an official iTunes affiliate, log back into your LinkShare
    account, and navigate your way over to the iTunes Affiliate Program page (listed
    in the My Advertisers section). You should now see a blue iTunes Create Links
    banner with a row of buttons underneath (see [Figure 6-12](#9781430262381_Ch06.xhtml#Fig12)).


    ![9781430262381_Fig06-12.jpg](images/9781430262381_Fig06-12.jpg)


    [Figure 6-12](#9781430262381_Ch06.xhtml#_Fig12). To generate affiliate links for
    items in the iTunes Store, you’ll need to use Apple’s special Link Maker Tool


    To generate iTunes affiliate links for use in your iOS apps and web site, click
    the Link Maker Tool button. (Do not use LinkShare’s link-builder features.) Apple’s
    Link Maker Tool is very easy to use. You can easily search for a specific product,
    and then copy the custom affiliate link that the online tool provides.


    It’s really that simple. Use those special links (which include your affiliate
    ID) in your apps and web site to start earning some extra money for all that traffic
    you’re sending to the iTunes Store.


    The Power of Free'
  trans: '

    大多数博主和网站所有者都非常熟悉亚马逊联盟（Amazon.com Associates），这是历史最悠久、最受欢迎的在线联盟项目之一。如果你的网站访问者通过你的联盟链接进入亚马逊并购买商品，你将获得该笔销售的部分佣金（通常为
    4%或更高，具体取决于商品）。


    尽管有成千上万个联盟项目，但你最应该关注的是苹果的 iTunes 联盟计划（iTunes Affiliate Program）。由于 iTunes Store
    和 App Store 内置于每一台 iPhone、iPad 和 iPod touch 中，应用可以轻松链接到音乐、电影、电视剧、有声读物甚至其他应用的商店页面。免费的精简版应用经常这样做，引导用户到
    App Store 中的完整付费版本，希望他们购买。


    因此，这里并不缺少链接。成千上万的 iOS 应用及其相关网站充斥着指向 iTunes Store 和 App Store 的链接。我觉得奇怪的是，这些链接中有很大一部分不是联盟链接。我经常惊讶于有多少开发者仍然没有利用这个免费的收入机会。


    从可能仅售 99 美分的数字商品上赚取 5% 的佣金听起来并非一笔意外之财，但就像低价的应用程序销售一样，这种商业模式全靠走量。如果你正在将应用用户或网站访问者引导至
    iTunes Store，并且苹果正通过这些链接获利，那么你为苹果带来的销售为何不应得到补偿呢？如果你的应用不在前 200 名之内，在 App Store
    里赚钱已经很困难了，为什么还要忽略这个轻松赚取额外现金的选择呢？作为软件业务所有者，你应该寻找 iOS 应用和网站能够（合法地）带来的所有可能的收入流。在这种情况下，你只需要免费注册联盟计划并修改现有的
    URLs。


    还不相信这值得一试吗？这里有一条小信息可能会激起你的兴趣。


    Pandora 是在线最受欢迎的网络广播服务之一，其 Pandora iOS 应用常年受到青睐，一直徘徊在 App Store 免费音乐应用前十名。喜欢当前播放歌曲的听众可以轻松点击“从
    iTunes 购买”按钮来购买该曲目（见图 6-10）。该按钮使用了一个联盟链接，将用户引导至 iTunes 中相应的歌曲页面。如果该用户购买了这首曲目，Pandora
    就能赚取佣金。


    ![9781430262381_Fig06-10.jpg](img/9781430262381_Fig06-10.jpg)


    **图 6-10.** Pandora 网络广播应用包含了指向 iPhone 内嵌 iTunes Store 的联盟链接，使听众能够轻松购买当前播放的歌曲


    Pandora 的首席技术官 Tom Conrad 透露，通过 Pandora 网站和 iOS 应用，Pandora 的听众每月通过他们的联盟链接购买约 100
    万首歌曲！而在这些歌曲销售中，Pandora 的 iOS 应用占据了其中的 20%。


    不难看出，庞大的客户群如何能为 iTunes Store 带来巨大流量，将这些联盟链接转变为主要的收入来源。从 iTunes 联盟链接赚取的佣金是许多社交游戏平台（例如
    OpenFeint，已在第 5 章讨论）的主要收入来源之一，这也是它们能够免费向 iOS 开发者提供那些功能丰富的游戏服务的原因。


    iTunes 联盟计划的一大优点是，当用户通过你的联盟链接进入 iTunes Store 后，在 24 小时内（或直到他们点击另一个联盟链接之前），他们购买的所有商品你都能获得
    5% 的佣金。Pandora 发现，许多听众不仅通过他们点击的联盟链接购买了歌曲，还会继续购买其他几首歌，这无疑增加了 Pandora 的佣金收入。


    诚然，你的 iPhone 或 iPad 应用可能没有 Pandora 那么多的用户（没有多少应用能达到那种受欢迎程度），所以让我们来看一个更现实的场景。假设你的应用每个月引导约
    5 万人进入 iTunes Store。即使只有一半的人最终购买了一两件 99 美分的数字商品，按照 5% 的联盟佣金计算，你每月将赚取 1250 到 2500
    美元。这仅仅是通过一次性更改你嵌入的 iTunes Store 链接就能获得的收入，不费吹灰之力。


    **加入 iTunes 联盟计划**


    要注册 iTunes 联盟计划，请访问`http://www.apple.com/itunes/affiliates/`。


    不同地区有不同的联盟网络。目前，你的选择包括 `LinkShare`（美国）、`TradeDoubler`（欧洲）、`LinkShare Japan`（日本）以及
    `dgm`（澳大利亚和新西兰）。不要注册代表你所在地区的联盟网络，而是选择最适合你应用目标受众的网络。


    这里，我们将使用主要面向美国的联盟网络 `LinkShare` 来逐步演示流程。点击 `LinkShare` 链接将带你进入 `LinkShare` 的注册表单。如果你已有
    `LinkShare` 账户，只需登录 `http://www.linkshare.com`。


    完成注册流程并登录到你的 `LinkShare` 账户后，还有一个步骤。`LinkShare` 是数百家零售商的联盟网络，因此你需要在 `LinkShare`
    账户中申请加入你感兴趣的各个联盟计划。在 `LinkShare` 的广告商网络中搜索关键词 `iTunes`，搜索结果中会显示 iTunes 联盟计划（见图
    6-11）。点击“申请”按钮，并同意苹果的条款和条件。


    ![9781430262381_Fig06-11.jpg](img/9781430262381_Fig06-11.jpg)


    **图 6-11.** 注册 `LinkShare` 后，你需要在 `LinkShare` 账户中申请 iTunes 联盟计划。搜索 `iTunes`，然后点击“申请”按钮


    由于苹果会手动批准所有联盟成员，你需要等待收到批准确认电子邮件后，才能创建任何联盟链接。


    一旦被苹果批准成为官方 iTunes 联盟成员，请重新登录你的 `LinkShare` 账户，并导航至 iTunes 联盟计划页面（列在“我的广告商”部分）。你应该会看到一个蓝色的
    iTunes 创建链接横幅，下方有一排按钮（见图 6-12）。


    ![9781430262381_Fig06-12.jpg](img/9781430262381_Fig06-12.jpg)


    **图 6-12.** 要为 iTunes Store 中的商品生成联盟链接，你需要使用苹果的专用链接生成器工具


    要为你的 iOS 应用和网站生成 iTunes 联盟链接，请点击“链接生成器工具”按钮。（不要使用 `LinkShare` 的链接构建功能。）苹果的链接生成器工具非常易于使用。你可以轻松搜索特定产品，然后复制在线工具提供的自定义联盟链接。


    就是这么简单。在你的应用和网站中使用这些特殊的链接（它们包含你的联盟 ID），就能开始通过你为 iTunes Store 带来的流量赚取额外收入了。


    **免费的力量**

