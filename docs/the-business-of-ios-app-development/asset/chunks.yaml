    \    // 购买被用户取消或发生错误。\n\nif (transaction.error.code != SKErrorPaymentCancelled)\
    \ {\n                    // 发生交易错误，因此通知用户。\n                }\n              \
    \  break;\n        }\n    }\n}\n\n@end\n```\n\n在 `paymentQueue` 状态接收器中，您可以检查交易的当前状态。正如之前的代码所示，`SKPaymentTransactionStatePurchasing`\
    \ 表示购买仍在进行中，因此您暂时无需执行任何操作。您需要密切关注 `SKPaymentTransactionStatePurchased` 或 `SKPaymentTransactionStateRestored`\
    \ 的返回，因为这将表明您的应用需要解锁或下载已购内容（参见图 8-20）。\n\n![9781430262381_Fig08-20.jpg](img/9781430262381_Fig08-20.jpg)\n\
    \n图 8-20。如果应用内购买交易成功，App Store 会显示一条感谢信息，并将 `SKPaymentTransactionStatePurchased`\
    \ 返回给 `paymentQueue` 接收器\n\n如果购买被用户取消或发生交易错误，则会返回 `SKPaymentTransactionStateFailed`。如果用户点击了取消按钮（如\
    \ `SKErrorPaymentCancelled` 所示），则可以安全地忽略这次中止的购买。但如果交易因其他原因失败，您应该让用户知道购买未完成。\n\n\
    ## 第 5 步：提供对已购内容的访问权限\n\n如果收到的交易状态是 `SKPaymentTransactionStatePurchased`，这确认了用户的购买成功。此时，您应该立即向客户提供对已购内容的访问权限作为奖励。正如您所学到的，您可以选择在应用内解锁商品，或从远程服务器下载内容。在已购内容成功交付给用户后，您需要做的最后一件事是通过调用\
    \ `finishTransaction` 将交易从支付队列中移除：\n\n```objectivec\n- (void)paymentQueue:(SKPaymentQueue\
    \ *)queue updatedTransactions:(NSArray *)transactions {\n    for(SKPaymentTransaction\
    \ *transaction in transactions) {\n        switch (transaction.transactionState)\
    \ {\n\ncase SKPaymentTransactionStatePurchasing:\n                // 商品仍在购买过程中。\n\
    \                break;\n\ncase SKPaymentTransactionStatePurchased:\n        \
    \        // 商品已成功购买！\n\n// --- 在此处解锁功能或下载内容 ---\n                // 已购商品的 ID 可通过\n\
    \                // transaction.payment.productIdentifier 访问\n\n// 在客户成功接收已购内容后，\n\
    \                // 将完成的交易从支付队列中移除。\n                [[SKPaymentQueue defaultQueue]\
    \ finishTransaction: transaction];\n                break;\n\ncase SKPaymentTransactionStateRestored:\n\
    \                // 已验证用户已为这个商品付过费。\n                // 非常适合在客户的所有设备上恢复商品。\n\n\
    // --- 在此处解锁功能或下载内容 ---\n                // 已购商品的 ID 可通过\n                // transaction.payment.productIdentifier\
    \ 访问\n\n// 在客户在此设备上恢复已购内容后，\n                // 将完成的交易从支付队列中移除。\n            \
    \    [[SKPaymentQueue defaultQueue] finishTransaction: transaction];\n       \
    \         break;\n\ncase SKPaymentTransactionStateFailed:\n                //\
    \ 购买被用户取消或发生错误。\n\nif (transaction.error.code != SKErrorPaymentCancelled) {\n\
    \                    // 发生交易错误，因此通知用户。\n                }\n                //\
    \ 完成的交易应从支付队列中移除。\n                [[SKPaymentQueue defaultQueue] finishTransaction:\
    \ transaction];\n                break;\n        }\n    }\n}\n```\n\n由于交易是持久的，将完成的交易从支付队列中移除非常重要。从加粗代码中您会注意到，这不仅在成功交易后执行，在失败交易后也需要执行。但只有在您从交易中获取完所需信息之后才能这样做。\n\
    \n在成功交易的情况下，您需要在移除交易之前通过 `transaction.payment.productIdentifier` 捕获已购商品的 ID。这将告诉您应该向用户提供哪个特定的应用内购买产品，如果您的应用程序提供多个应用内商品销售，这一点尤其有用。您应该将此\
    \ ID 存储在应用程序的某个位置（例如 plist 文件中），以便跟踪哪些商品已被购买，并确保用户下次运行您的应用程序时内容仍然易于访问。\n\n应用程序的首选项文件是存储已购产品\
    \ ID 的好地方，因为当用户通过 iTunes 将设备与电脑同步时，应用程序的首选项会被备份。对于非消耗品和有效的订阅商品，您的客户每次运行应用程序时都应能访问他们已购买的商品。\n\
    \n如果已购内容是从您的服务器下载的，您还需要在从支付队列中移除交易之前获取 `transaction.transactionReceipt`。您的服务器需要接收此收据数据，以便在授权来自您应用的下载请求之前，与\
    \ App Store 验证其真实性。\n\n最后但同样重要的是 `SKPaymentTransactionStateRestored` 的交易状态。这通常是在向支付队列发送恢复请求时返回的。\n\
    \n## 恢复已支付内容\n\n乍一看，确保客户拥有的所有兼容设备上都能访问已购商品听起来像是一项相当艰巨的任务，但 Store Kit 提供的支持可以自动完成其中的大部分工作。对于自动续期订阅和非消耗性应用内购买商品，您可以通过调用以下代码向支付队列发送恢复请求：\n\
    \n```objectivec\n[[SKPaymentQueue defaultQueue] restoreCompletedTransactions];\n\
    ```\n"
- fmt: '`SKPaymentTransactionStateRestored`结果会返回给交易观察者类中的`paymentQueue`接收器。在示例项目中，`paymentQueue`位于`InAppPurchaseObserver.m`文件中。与普通应用内商品购买一样，你可以检查恢复交易记录中的产品ID，然后向用户提供对这些已购商品的访问权限。恢复交易的主要区别在于不会再次向用户收费。这些商品已经支付过，因此此方法只是标识你的应用应向用户提供哪些应用内商品。


    同样，如果用户意外尝试购买已拥有的非消耗型商品，结果将返回为`SKPaymentTransactionStatePurchased`，但不会对此交易收费。在你向用户提供对其已购商品的访问权限后，应从支付队列中移除此交易。


    遗憾的是，较旧的订阅类型和消耗型商品交易无法通过 Store Kit 恢复。要恢复这些类型，你需要采用基于服务器的应用内购买模型，并在自己的服务器上保存原始购买交易记录。然后，你的服务器端
    Web 应用程序可以协调将这些商品恢复到用户的设备上。


    无论你在后端需要做什么来支持这一点，都应尽可能让恢复过程对用户便捷简单。许多开发者通过在应用的逻辑位置添加“恢复已购内容”按钮来实现这一点。一个视觉上吸引人的示例是
    Iconfactory 的 Astronut 游戏，该游戏在关卡选择屏幕上提供了此功能，效果显著（参见[图 8-21](#9781430262381_Ch08.xhtml#Fig21)）。


    ![9781430262381_Fig08-21.jpg](images/9781430262381_Fig08-21.jpg)


    [图 8-21](#9781430262381_Ch08.xhtml#_Fig21)。Iconfactory 的 Astronut 游戏提供了一个方便的“恢复之前购买”按钮，用于恢复用户的已购内容


    **深入挖掘**


    介于[第 7 章](#9781430262381_Ch07.xhtml)讨论的应用内广告机会与本章探讨的通过应用内购买实现的新商业模式之间，在 iOS 平台上有许多超越传统应用销售之外的盈利方式。


    本章为你理解并在应用中使用应用内购买提供了一个良好的起点。如需深入了解整个 Store Kit API，我强烈建议阅读相关的 iOS SDK 文档。登录 iOS
    Dev Center，然后查看以下资源：


    *   *In-App Purchase Programming Guide* (`http://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/StoreKitGuide/`)

    *   *Store Kit Framework Reference* (`http://developer.apple.com/library/ios/#documentation/StoreKit/Reference/StoreKit_Collection/`)


    ## 第 9 章 测试与可用性：展现最佳状态


    当你阅读了各种从应用内部提升应用市场推广性的技巧后，你可能已经注意到贯穿本书的一个主题：你的应用必须出色！拥有一个绝妙的应用创意是不够的。那么，什么才是卖点？美丽、直观的界面，易于使用，并提供按预期工作的功能。


    再多的营销和宣传也无法挽救一个构思糟糕的应用。漏洞百出的性能和粗糙的可用性会迅速毁掉应用的口碑，引发负面口碑、差评以及 App Store 中灾难性的用户评分。


    在任何发布之前，尤其是最初的 1.0 版本，实施全面的测试流程应是你开发周期中的关键步骤。本章将讨论提供内置帮助、为设备测试配置应用以及从 Beta 测试者处获得宝贵反馈的优点。


    ### 避免大多数一星差评


    表面上，App Store 中的许多负面用户评论似乎都只是在抱怨价格。有无数评论声称，购买应用后，用户觉得不值这个价。如果应用只花费几美元甚至更少，这类评论显得相当小气，但理解这些用户为何感到受骗是很重要的。


    当然，无论你交付的应用有多好，总会有一些特立独行的人对价格大加抱怨。但对于很大一部分不满意的用户来说，背后有一个根本原因在起作用。对他们而言，这实际上与金钱无关——他们在星巴克买一杯拿铁的花费都比应用贵。相反，这完全关乎他们的购买满意度。


    在阅读了 App Store 的描述并浏览了截图后，用户会带着特定的期望下载一个应用。无论对错，如果这些期望没有得到满足，挫败感就会产生——即使应用是免费的！显然，有些期望注定是不合理的，你不可能让每个人都满意，但你可以采取一些步骤来尽量减少不满意的用户数量，正如你将在本章中学到的那样。


    ### 避免常见陷阱


    以下是导致用户挫败感的三大因素：


    *   性能不佳

    *   缺乏可用性

    *   界面不精致


    好消息是，通过进行一些边缘情况测试，你可以在将应用发布到“野外”之前修复其中两个致命问题。


    当然，没有人想发布难以使用的有漏洞软件。尽管避免性能不佳和可用性问题对你来说似乎显而易见，但令人惊讶的是，有大量 App Store 应用都栽在了这些问题上。那么，这是如何发生的呢？如果你在一个孤立的环境中工作，既是唯一的开发者又是唯一的测试者，这比你想象的要容易。


    即使你积极使用 Instruments（包含在 Apple 开发工具下载中）和 Xcode 的“构建与分析”功能来剔除 Bug 和内存泄漏，这也还不够。


    遗憾的是，太多开发者在将应用提交到 App Store 之前，没有花时间在多种设备和用户间进行广泛测试。一个应用可能在你的 iOS 模拟器中运行良好，但在实际的
    iPhone、iPad 和 iPod touch 上呢？许多性能、内存和可用性问题只能通过在设备本身上测试应用才能发现。在模拟器中，你的应用可能在配备高速宽带互联网连接的强劲
    Mac 上运行飞快，但真正的性能测试是在较慢的无线网络和真实 iOS 设备处理器上运行的。


    并且别忘了，iOS 模拟器的显示尺寸比设备紧凑的屏幕要大得多。在大的 Mac 显示器上，应用的界面设计看起来可能具有欺骗性的大，但在小巧的高分辨率 iPhone
    屏幕上可能会急剧缩小。UI 元素在 iOS 模拟器中看起来功能正常，但当在 iPhone 小屏幕上测试时，你可能会发现自定义按钮太小且距离过近，导致精确的手指点击极其困难。


    Apple 拒绝了近 60% 的应用提交至少一次。你在各种技术博客上读到的那少数几起高调被拒事件，因其模糊或荒谬的拒绝理由而成为了新闻素材。然而，大多数日常被拒事件——那些没有成为头条新闻的——仅仅是在审核过程中无法工作、出现
    Bug 或崩溃的应用。因此，你不仅要在 iOS 模拟器中测试你的应用，还要在尽可能多的设备上进行测试，这一点至关重要。'
  raw: 'The result is returned as `SKPaymentTransactionStateRestored` to the `paymentQueue`
    receiver in your transaction observer class. In the example project, the `paymentQueue`
    is located in the InAppPurchaseObserver.m file. Just as with a normal in-app item
    purchase, you can check the product IDs in the restored transaction record, and
    then provide the customer with access to these paid items. The main difference
    with restored transactions is that the user is not billed again. The items are
    already paid for, so this method is simply identifying which in-app items your
    application should make available to the user.


    Likewise, if customers accidentally attempt to purchase a Non-consumable item
    that they’ve already bought, the result is returned as `SKPaymentTransactionStatePurchased`,
    but there is no charge for the transaction. After you’ve provided access to the
    user’s purchased items, you should remove the transaction from the payment queue.


    Unfortunately, the older Subscriptions type and Consumable item transactions are
    not restored by Store Kit. To restore those types, you’ll need to employ the server-based
    In-App Purchase model and keep records of the original purchase transactions on
    your own server. Then your server’s web applications can orchestrate the restoration
    of those items to your customer’s devices.


    No matter what you have to do on the back end to support this, you should make
    the restoration process as convenient and simple as possible for your users. Many
    developers accomplish this by including a Restore Purchased Content button in
    a logical location within their apps. A visually appealing example is The Iconfactory’s
    Astronut game, which provides this feature on its level-selection screen with
    great effect (see [Figure 8-21](#9781430262381_Ch08.xhtml#Fig21)).


    ![9781430262381_Fig08-21.jpg](images/9781430262381_Fig08-21.jpg)


    [Figure 8-21](#9781430262381_Ch08.xhtml#_Fig21). The Iconfactory’s Astronut game
    provides a convenient Restore Previous Purchase button to restore a customer’s
    purchased content


    Digging for Gold


    Between the in-app advertising opportunities discussed in [Chapter 7](#9781430262381_Ch07.xhtml)
    and the new business models with In-App Purchase explored in this chapter, there
    are many ways to make money on the iOS platform beyond traditional app sales.


    This chapter has provided you with a good starting point for understanding and
    using In-App Purchase within your applications. For an in-depth look at the entire
    Store Kit API, I highly recommend reading the related iOS SDK documentation. Log
    into the iOS Dev Center, and then check out these resources:


    *   *In-App Purchase Programming Guide* (`http://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/StoreKitGuide/`)

    *   *Store Kit Framework Reference* (`http://developer.apple.com/library/ios/#documentation/StoreKit/Reference/StoreKit_Collection/`)


    Chapter    9


    Testing and Usability: Putting Your Best Foot Forward


    As you’ve read about the various techniques for improving your app’s marketability
    from within the app itself, you’ve probably noticed a running theme throughout
    this book: your app needs to rock! Having a great app idea is not enough. So,
    what sells? Beautiful, intuitive interfaces that are easy to use and provide functionality
    that works as intended.


    No amount of marketing and publicity will help a poorly conceived app. Buggy performance
    and rough edges in usability can quickly ruin your app’s reputation, prompting
    negative word-of-mouth, bad reviews, and disastrous customer ratings in the App
    Store.


    Before any release, especially your initial 1.0 launch, implementing a thorough
    testing process should be a key step in your development cycle. This chapter will
    touch on the merits of providing built-in help, provisioning apps for on-device
    testing, and receiving valuable feedback from beta testers.


    Preventing the Majority of One-Star Reviews


    On the surface, many of the negative customer reviews in the App Store appear
    to be complaining about nothing more than pricing. There are countless reviews
    stating that after purchasing the app, the user felt it was not worth the price.
    Those kinds of comments seem quite petty if the app costs only a few dollars or
    less, but it’s important to understand why those customers feel cheated.


    Sure, there will always be those unique individuals who shout from the rooftops
    about pricing, no matter how good of an app you delivered. But for a large portion
    of disgruntled customers, there is an underlying principle in effect. For them,
    it’s not really about the money—their morning latte from Starbucks costs more
    than the app. Rather, it has everything to do with their purchase satisfaction.


    After reading the App Store description and browsing the screenshots, a customer
    will download an app with specific expectations in mind. Whether right or wrong,
    if those expectations are not met, frustration sets in—even if the app was free!
    Obviously, some expectations are bound to be unreasonable, and you won’t be able
    to make everyone happy, but there are steps you can take to minimize the number
    of unsatisfied customers, as you’ll learn in this chapter.


    Avoiding Common Pitfalls


    Here are the three biggest factors that contribute to user frustration:


    *   Poor performance

    *   Lack of usability

    *   Unpolished interface


    The good news is that you can fix two of the three showstoppers before unleashing
    your app into the wild by just doing some edge-case testing.


    Of course, no one wants to release buggy software that’s hard to use. Although
    avoiding poor performance and usability problems may seem plainly obvious to you,
    it’s amazing just how many App Store apps fall victim to those very issues. So,
    how does this happen? It’s easier than you might think, if you’re working in an
    isolated bubble where you’re the sole developer and the only tester.


    Even if you actively use Instruments (included in Apple’s development tools download)
    and Xcode’s Build and Analyze feature to weed out bugs and memory leaks, that’s
    not enough.


    Unfortunately, way too many developers don’t take the time to extensively test
    an app across multiple devices and users before submitting the app to the App
    Store. An app may run fine in your iOS Simulator, but how about on an actual iPhone,
    iPad, and iPod touch? A number of performance, memory, and usability issues can
    be discovered only by testing your app on the device itself. In the Simulator,
    your app may run fast on your mighty Mac with high-speed broadband Internet connectivity,
    but the true performance test is running on the slower wireless network and processor
    of a real iOS device.


    And don’t forget that the iOS Simulator has a much larger display size than the
    device’s compact screen. On a big Mac monitor, an app’s interface design can look
    deceptively large, but it may shrink dramatically on a tiny, high-resolution iPhone
    screen. UI elements can appear quite functional in the iOS Simulator, but then
    when testing on the iPhone’s small screen, you may find that custom buttons are
    too small and close together, making accurate finger taps extremely difficult.


    Apple rejects almost 60 percent of app submissions at least once. The handful
    of high-profile rejections that you’ve read about in the various tech blogs have
    become news fodder because of vague or ridiculous rejection reasons. However,
    most of the daily rejections—the ones that don’t make headlines—are simply apps
    that fail to work or fall prey to bugs and crashes while being reviewed. So, it’s
    important that you take the time to test your app not only in the iOS Simulator,
    but also on as many devices as possible.'
