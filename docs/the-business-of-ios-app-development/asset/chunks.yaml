    Step 5: Provide Access to the Purchased Content


    If the transaction status received proves to be `SKPaymentTransactionStatePurchased`,
    this confirms that the user’s purchase was successful. This is the point where
    you should reward the customer by immediately providing access to the purchased
    content. As you’ve learned, you have the option to either unlock the item within
    your app or download the content from a remote server. After the purchased content
    has been successfully delivered to the user, the last thing you’ll need to do
    is remove the transaction from the payment queue by calling `finishTransaction`:


    ```

    - (void)paymentQueue:(SKPaymentQueue *)queue updatedTransactions:(NSArray *)transactions
    {

        for(SKPaymentTransaction *transaction in transactions) {

            switch (transaction.transactionState) {


    case SKPaymentTransactionStatePurchasing:

                    // Item is still in the process of being purchased.

                    break;


    case SKPaymentTransactionStatePurchased:

                    // Item was successfully purchased!


    // --- UNLOCK FEATURE OR DOWNLOAD CONTENT HERE ---

                    // The purchased item ID is accessible via

                    // transaction.payment.productIdentifier


    // After customer has successfully received purchased content,

                    // remove the finished transaction from the payment queue.

                    [[SKPaymentQueue defaultQueue] finishTransaction: transaction];

                    break;


    case SKPaymentTransactionStateRestored:

                    // Verified that user has already paid for this item.

                    // Ideal for restoring item across all devices of this customer.


    // --- UNLOCK FEATURE OR DOWNLOAD CONTENT HERE ---

                    // The purchased item ID is accessible via

                    // transaction.payment.productIdentifier


    // After customer has restored purchased content on this device,

                    // remove the finished transaction from the payment queue.

                    [[SKPaymentQueue defaultQueue] finishTransaction: transaction];

                    break;


    case SKPaymentTransactionStateFailed:

                    // Purchase was either cancelled by user or an error occurred.


    if (transaction.error.code != SKErrorPaymentCancelled) {

                        // A transaction error occurred, so notify user.

                    }

                    // Finished transactions should be removed from the payment queue.

                    [[SKPaymentQueue defaultQueue] finishTransaction: transaction];

                    break;

            }

        }

    }

