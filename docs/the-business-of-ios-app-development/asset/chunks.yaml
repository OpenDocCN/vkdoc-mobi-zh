    iOS Beta 版本。它还提供了非常详细的崩溃报告。


    ### 征求直接反馈


    在应用内部提供一个让客户能轻松向你发送直接反馈的机制，有助于减少许多负面的应用商店评论。还记得我们在第 5 章中是如何将应用内邮件集成到一个示例项目中的吗？尽管那是为了给用户提供“告诉朋友”功能，但同样的应用内邮件功能也可以用来征求客户的直接反馈。


    为用户提供一个专门用于从应用内给你发送邮件的渠道，能为你的客户带来极大的便利。不要指望用户会花时间去查找你网站上的支持页面，尤其是当他们正使用 iPhone、iPad
    或 iPod touch 时（远离他们的电脑）。对他们来说，表达意见最方便的方式就是直接在 App Store 上发布评论——除非你给他们提供一种更简单、更快捷的方法，就在你的应用内部！


    PumpOne 的 `FitnessBuilder` 提供了一个很好的应用内反馈表单示例。通过在应用主屏幕上设置一个“Ask”按钮来访问此表单，开发人员为客户提供了一种极其简便的方式，可以直接从应用内部提交反馈（参见图
    9-1）。


    ![9781430262381_Fig09-01.jpg](img/9781430262381_Fig09-01.jpg)


    图 9-1. PumpOne 的 `FitnessBuilder` 提供了一个便捷的应用内反馈表单，可通过应用主屏幕上的“Ask”按钮轻松访问


    那么，如果你有兴趣为自己的应用添加直接反馈功能，该从哪里开始呢？看看第 5 章的“告诉朋友”示例项目。将那个应用内邮件代码修改为应用内反馈表单应该很容易。如果你不想自己构建解决方案，也有一些第三方替代方案，比如
    `Crittercism`（`http://www.crittercism.com`）。


    如果你还提供了免费应用或付费应用的精简版，那么同样重要的是（甚至更为重要）也要为这些版本添加应用内反馈表单。由于免费和精简版应用没有使用门槛，它们会吸引更广泛的用户群体，其中多数只是出于好奇，想先“试驾”一下。与付费应用的客户不同，这些用户没有既得利益，因此往往会是更严厉的批评者。免费和精简版应用通常在
    App Store 上获得的评分低于其付费版本。考虑到这一点，你的目标是让用户直接在应用内向您提交反馈，而不是在 App Store 上公开发布他们的负面言论。


    通过提供应用内反馈表单，你是在告诉用户：他们的意见对你很重要。如果让你选择，是直接与应用开发者沟通，还是等待并希望开发者看到他们在 App Store 的评论，很可能他们会选择应用内反馈表单，尤其是当他们真的希望看到应用改进和发展时。这当然不会阻止那些喜欢在
    App Store 的“在线演讲台”上抱怨一切的小众用户，但这将有助于减少那些仅仅只是功能请求和支持问题的负面 App Store 评论。


    但是，应用内邮件表单不也会把正面反馈直接引导到你这里，而不是公开发布在 App Store 上（这样有助于促进销售）吗？当然，这种情况可能会出现一些，但你总是可以通过电子邮件回复这些客户，感谢他们，并礼貌地询问他们是否愿意将正面评论发布在
    App Store 上。如果他们喜爱你的应用，通常情况下，他们会对此请求感到荣幸并乐意帮忙。


    与客户建立直接联系对所有参与者来说总是一个双赢的局面。如果客户支持你作为一名独立开发者的个人成功，那么他们更有可能在与朋友的线上互动中（通过 Twitter、Facebook
    等）为你的应用进行宣传。


    ### 通过应用内帮助预防用户挫败感


    用户受挫的一个主要原因是无法弄清楚你的应用是如何工作的。在桌面电脑的世界里，人们已经习惯了需要“圣经”般厚重手册的庞大、复杂的软件应用。


    而在移动环境中，应用通常只用一只手（有时甚至只有一根拇指）来操作，用户期望应用拥有直观的界面，能够一目了然。iOS SDK 通过提供一套通用的原生 UI 控件来处理常见功能，在这方面有所帮助。如果你在一个应用中用过导航控制器，那么你就会知道如何在所有其他
    iPhone 应用中使用它。

    '
- fmt: '# 应用内帮助指南


    对于大多数移动应用，如果需要手册来解释如何使用最基本的功能，你应该认真考虑重新设计当前的界面。用户应该能够下载你的应用并立即开始使用核心功能，而无需被告知如何使用。但话虽如此，即使是操作最直观、最简单的用户界面，对所有人来说可能也并不明显。为了安全起见，提供内置的演示或教程来引导需要帮助的用户总是一个好主意。


    游戏通常需要说明如何激活各种控制和命令。更复杂的生产力应用经常需要向高级用户展示高级技巧和窍门。在这些情况下，在你的应用中让这些信息易于访问非常重要。不要仅仅将信息发布在网站或支持网站上，认为用户会自己找到它们。如果用户已经到了那个地步，他们早已因为四处寻找你似乎刻意隐藏的说明而感到沮丧了。还要记住，你的应用可能在飞机上或没有无线连接的地方使用，因此在应用中包含文档对用户来说会方便得多。


    在应用中包含指南也有助于减少你花在客户支持上的时间，这反过来为你节省了金钱（以及无数的烦恼）。如果用户能轻松地在你的应用中找到问题的答案，你需要处理的支持请求就会减少。如果你是独立开发者，你会知道花在应对客户支持查询上的时间越少，你就越有时间进行实际的编程。


    在你的 iOS 应用中，有四种常见的应用内帮助类型可供使用：


    *   屏幕提示

    *   教学视频

    *   视觉演示

    *   基于文本的帮助


    我们将看看每种方法的优缺点，以便你决定哪种类型最适合你的应用。无论你选择哪种方法，包含某种形式的应用内帮助都能提升应用的整体用户体验。


    ## 用屏幕提示播下知识的种子


    假设你的应用易于使用，不需要专用的帮助屏幕或教程，但它确实包含一些高级功能。在`UIAlertView`弹出窗口中显示屏幕提示是快速教育用户的好方法。


    流行的电子书阅读器应用 `Stanza` 在启动时会显示一个有用的提示（见图 9-2）。该应用在每次启动时自动随机选择一条提示。用户可以通过点击“显示下一条提示”按钮选择查看更多提示，或选择“关闭”开始使用应用。


    ![9781430262381_Fig09-02.jpg](images/9781430262381_Fig09-02.jpg)


    **图 9-2.** 启动时，`Stanza` 电子书阅读器会显示有用的屏幕提示，指导如何使用应用。提供了方便的选项来禁用提示或显示更多提示。


    注意还有一个“禁用提示”按钮。这是一个关键选项，允许已经熟悉所有提示的高级用户轻松地在提示变得烦人之前将其关闭。提示功能可以在应用的“设置”面板中打开和关闭，但为什么让用户去寻找呢？让用户只需轻点一下即可快速禁用提示，可以防止用户对本来应该只提供帮助的功能感到沮丧。


    ## 教学视频：双刃剑


    对于许多游戏（甚至应用）来说，展示实际游戏过程的视频通常是最容易解释如何游玩的方式。尽管这非常有效，但也存在一些缺点。


    由于视频剪辑的典型文件大小，你可能不希望将其包含在应用的下载包中，以免使移动应用变得过大。这给你留下两个主要选择：


    *   将视频上传到像 YouTube 这样的视频分享网站。

    *   将视频托管在你自己的网络服务器上。


    由于许多开发者将预告片和教学视频上传到视频分享网站来推广他们的应用，一个简单的解决方案是直接从应用内的按钮链接到那些“如何游玩”的视频之一。然而，这种方法存在几个问题。


    大多数视频分享网站使用 Flash 视频，而 iOS 平台目前不支持。你可以使用 YouTube，因为它的视频会从 Flash 视频动态转换为 iOS 兼容的
    H.264 视频格式。但你必须确保你的应用不是链接到视频的 YouTube 页面，这会导致视频在 YouTube 应用或 `Mobile Safari` 浏览器中加载，从而将用户带离你的应用。由于用户起初并未意识到他们离开了应用，他们可能不明白为什么看完视频后没有返回应用。是的，我知道将所有流量导向那个
    YouTube 视频页面会增加观看次数和你的 YouTube 排名，但在这种情况下，用户体验应该优先于你的在线社交营销努力。


    只要有可能，你应该直接加载媒体文件，以便在原生 iOS 电影播放器控制器中播放。当剪辑播放完毕或用户点击控制器的“完成”按钮时，用户会自动返回到你的应用。这提供了无缝的过渡，使消费者在观看完教学视频后能立即开始使用应用。流行的联系人数据共享应用
    `Bump` 在其“关于”屏幕上的简短教学视频中很好地做到了这一点（见图 9-3）。


    ![9781430262381_Fig09-03.jpg](images/9781430262381_Fig09-03.jpg)


    **图 9-3.** 在 `Bump` 的“关于”屏幕中点击视频缩略图，将在 iOS 电影播放器控制器中播放教学视频。剪辑播放完毕后，用户会自动返回应用。


    当然，制作教学视频需要一些数字电影制作技巧，但如果你是游戏开发者，这在如今几乎是营销的必备条件。似乎每款 iPhone 和 iPad 游戏都有用于推广目的的流畅视频预告片。制作另一个解释如何游玩的视频可能同样重要。


    ## 视觉演示：展示，而非告知


    你知道那句老话：“一图胜千言。”这在教导人们如何使用你的应用时同样适用。虽然视频很好，但由静态图像或短动画组成的视觉演示也同样有效。由于这类演示通常由简短的截图或插图幻灯片构成，它们的文件大小通常比视频文件小得多，这意味着加载速度更快，占用内存更少——这是构建移动应用时需要考虑的重要因素。


    流行的 `Convertbot` 应用拥有美观而独特的界面，但由于它不使用熟悉的 `UIKit` 控件，如何操作它乍一看可能并不明显。开发者 `Tapbots`
    通过在首次启动时询问用户是否想要查看快速演示来解决这个问题。如果这个提示被关闭，演示仍然可以通过“信息”面板访问。


    `Convertbot` 拥有我在 iOS 应用中见过的最好的演示之一。它不是将演示加载到不同的视图中，而是将应用的实际主界面全屏显示，自动执行操作，并用弹出气球描述不同的
    UI 元素如何工作以及执行特定单位转换需要采取哪些步骤（见图 9-4）。


    ![9781430262381_Fig09-04.jpg](images/9781430262381_Fig09-04.jpg)


    **图 9-4.** `Convertbot` 包含一个非常有效的演示。它将主界面置于自动演示模式，通过弹出气球描述向你展示如何使用独特的 UI 元素。'
  raw: 'For most mobile apps, if a manual is required to explain how to use even the
    most basic functions, you should seriously consider rethinking your current interface
    design. Users should be able to download your app and immediately begin playing
    with the core functionality without being told how to use it. But with that said,
    figuring out how to operate even the most intuitive, simple UI may not be obvious
    to everyone. To play it safe, it’s never a bad idea to provide a built-in demo
    or tutorial to help guide those users in need of assistance.


    Games often require instructions on how to activate various controls and commands.
    The more sophisticated productivity apps frequently need to reveal advanced tips
    and tricks for power users. In these situations, it’s important to make this information
    easily accessible within your app. Don’t just post it on your web site or support
    site, assuming users will find their way there. If customers have gotten to that
    point, they’re already frustrated from searching high and low for the instructions
    you seem to be keeping well hidden from them. Also keep in mind that your app
    may be used on an airplane or away from a wireless connection, so including documentation
    within your app will prove much more convenient for your users.


    Including in-app guides will also help reduce the amount of time you spend on
    customer support, which in turn saves you money (and countless headaches). If
    users can easily find the answers to their questions within your app, there will
    be fewer support requests for you to deal with. And if you’re an independent developer,
    you know that the less time you need to spend fielding customer support queries,
    the more time you have to do actual programming.


    There are four common types of in-app help that you can employ in your iOS application:


    *   On-screen tips

    *   Instructional videos

    *   Visual demos

    *   Text-based help


    We’ll look at the pros and cons of each approach, so that you can decide which
    type best suits your app. Whichever method you choose, including some form of
    in-app help can only improve your app’s overall user experience.


    Planting Knowledge Seeds with On-Screen Tips


    Let’s say your app is easy to use and does not require a dedicated help screen
    or tutorial, but it does include a few advanced power features. Displaying on-screen
    tips in a `UIAlertView` pop-up is a great way to quickly educate users.


    Upon launch, the popular e-book reader app, Stanza, displays a helpful tip (see
    [Figure 9-2](#9781430262381_Ch09.xhtml#Fig2)). The app automatically chooses a
    random tip each time the app launches. A user can opt to see more tips by tapping
    the Show Next Tip button or choose Dismiss to begin enjoying the app.


    ![9781430262381_Fig09-02.jpg](images/9781430262381_Fig09-02.jpg)


    [Figure 9-2](#9781430262381_Ch09.xhtml#_Fig2). Upon launch, the Stanza e-book
    reader displays helpful on-screen tips for using the app. There are convenient
    options to either disable tips or show more tips


    Notice that there is also a Disable Tips button. This is a critical option that
    allows power users who are already familiar with all of the tips to easily deactivate
    the startup alert before it becomes annoying. The tips feature can be turned on
    and off in the app’s Settings panel, but why make the user search for that? Allowing
    users to quickly disable tips with a simple tap will prevent them from becoming
    frustrated with something that is supposed to be nothing but helpful.


    Instructional Videos: The Double-Edged Sword


    For many games (and even apps), a video showing the actual game in action is often
    the easiest way to explain how to play it. Although this is highly effective,
    there are some drawbacks.


    Because of the typical file size of a video clip, you won’t want to include it
    in your app’s download for fear of bloating your mobile app to an unreasonable
    size. This leaves you with two main options:


    *   Upload the video to a video-sharing site like YouTube.

    *   Host the video on your own web server.


    Since many developers upload trailers and instructional clips to video-sharing
    sites to help promote their app, an easy solution is to simply link to one of
    those “how to play” videos from a button within the app. There are a couple problems
    with this approach, however.


    Most video-sharing sites use Flash video, which the iOS platform does not currently
    support. You can use YouTube, because its videos are dynamically converted from
    Flash video into the iOS-compatible H.264 video format. But then you must make
    sure your app is not linking to the video’s YouTube page, forcing the video to
    load in either the YouTube app or the Mobile Safari browser, which takes users
    out of your app. Since users were not aware they had left the app to begin with,
    they may not understand why they are not returned to the app after viewing the
    video. Yes, I know that directing all traffic to that YouTube video page will
    increase the number of viewings and your YouTube ranking, but in this case, user
    experience should trump your online social marketing efforts.


    Whenever possible, you should load the media file directly so that it plays in
    the native iOS movie player controller. When the clip finishes playing or the
    user taps the controller''s Done button, the user is automatically returned to
    your app. This provides a seamless transition, enabling consumers to instantly
    begin using the app after watching the how-to video. The popular contact data-sharing
    app, Bump, does this well with the brief, instructional video on its About screen
    (see [Figure 9-3](#9781430262381_Ch09.xhtml#Fig3)).


    ![9781430262381_Fig09-03.jpg](images/9781430262381_Fig09-03.jpg)


    [Figure 9-3](#9781430262381_Ch09.xhtml#_Fig3). Tapping the video thumbnail in
    Bump’s About screen will play the how-to video in the iOS movie player controller.
    When the clip is finished, users are automatically returned to the app


    Of course, producing an instructional video requires some digital filmmaking chops,
    but if you’re a game developer, then it’s practically a marketing requirement
    these days. It seems like every iPhone and iPad game has a slick video trailer
    for promotional purposes. Creating another video that explains how to play it
    may prove equally important.


    Show, Don’t Tell, with Visual Demos


    You know the old saying, “A picture is worth a thousand words.” It rings just
    as true when teaching people how to use your app. Although a video is great, a
    visual demo made up of static images or short animations can be just as effective.
    Since these kinds of demos are typically constructed as a brief slide show of
    screenshots or illustrations, they’re usually much smaller in size than a video
    file, which means they load faster and use less memory—important factors to consider
    when building mobile apps.


    The popular Convertbot app boasts a beautiful and unique interface, but since
    it doesn’t use familiar `UIKit` controls, how to use it may not be apparent at
    first glance. The developers, Tapbots, solve this issue by asking users upon first
    launch if they would like to view a quick demo. If the prompt is dismissed, the
    demo can always be accessed through the Info panel.


    Convertbot has one of the best demos I’ve seen in an iOS app. Instead of loading
    the demo into a different view, the app’s actual main interface is shown full
    screen, performing actions on autopilot with pop-up balloons describing how the
    different UI elements work and what steps to take to perform specific unit conversions
    (see [Figure 9-4](#9781430262381_Ch09.xhtml#Fig4)).


    ![9781430262381_Fig09-04.jpg](images/9781430262381_Fig09-04.jpg)


    [Figure 9-4](#9781430262381_Ch09.xhtml#_Fig4). Convertbot includes a very effective
    demo. Placing the main interface on autopilot, it shows you how to use the unique
    UI elements with pop-up balloon descriptions'
