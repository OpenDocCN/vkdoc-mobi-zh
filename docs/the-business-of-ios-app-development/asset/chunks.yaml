    Let’s say that you have created the first credit card processing app for the iPhone.
    You want to protect yourself. One option is to file a patent on the idea, but
    it would be years before you were issued a patent, assuming that your idea met
    the criteria for patent protection.


    Without a patent, you don’t have much protection for the concept, but you do have
    the advantage of being first to market. Your app, as the first of its kind, is
    likely to get media attention, and could even be featured by Apple. Once your
    app has achieved a degree of success, the competitors are likely to start making
    similar apps. Without a patent, you may not be able to prevent this from happening,
    but you can stop your competitors from tricking customers into thinking that they
    are you.


    Similarly, Apple’s approval process does not provide any filter for copycat apps,
    so you can’t assume that the approval process or Apple will be doing anything
    to stop knockoffs from hitting the store. By creating an icon, name, and interface
    that people associate specifically with your company, you can establish trademark
    rights. These trademark rights give you a tool that you can use to prevent other
    people from using confusingly similar branding on their app.


    If a competitor copies your app in a way that is likely to cause customers to
    be confused as to whether the app came from the competitor or from you, your trademark
    rights should give you a means to stop the competitor. But all names and logos
    are not equally protectable. This section describes the basics of trademark protection
    and how to choose a protectable trademark to identify your company and apps.


    How to Get a Trademark


    As with copyright, you can obtain some trademark rights automatically by simply
    using a name or symbol as an identifier of the source of your app. These “common-law”
    trademarks are fairly limited, though, and there are significant benefits to filing
    a trademark registration with the US Patent and Trademark Office.


    A federal trademark registration provides notice to the public that you are claiming
    ownership of the mark. The registration also creates a legal presumption of your
    ownership of the mark and your exclusive right to use the mark nationwide in connection
    with the types of goods and services listed in your registration. Most important,
    a federal trademark registration is a prerequisite to bringing an action concerning
    the trademark to federal court.


    The best way to find out more about the trademark application process is to visit
    `http://uspto.gov`. The Patent and Trademark Office has a wealth of information
    on its web site about the process, and it offers step-by-step instructions on
    how to file a trademark application online.


    The federal government even operates a help line that you can call to get more
    information about the filing process. The help line cannot give you legal advice,
    but it is an extremely helpful, amazing resource. The Trademark Assistance Center’s
    number is 1-800-786-9199.


    But there are advantages to hiring a lawyer to help prepare your application.
    Often, there is a back and forth required with the Patent and Trademark Office
    in the process, and having a professional working on your behalf can help you
    obtain the broadest possible rights for your mark.


    Picking a Protectable Trademark


    Some trademarks are stronger than others. Made-up names (for example, Exxon or
    Google) or those that have no literal connection to the company (for example,
    Apple for a computer company) are best to establish strong intellectual property
    rights. Names that require a slight leap of logic or merely suggest a company’s
    products or services (for example, Titanium for a travel bag company, suggesting
    strength and durability) are protectable and often strike the right balance between
    developing strong brands and educating the public about the company.


    On the other hand, names that describe what a company does (for example, Online
    Advertising, Inc., for a company that sells Internet ads) tend not to be initially
    protectable. Companies often gravitate toward descriptive names because they want
    the public to immediately understand the company’s business. However, choosing
    a descriptive name can adversely impact a company’s long-term bottom line. Here
    are some reasons:


    *   It may be impossible to stop a competitor from using the same name.

    *   A descriptive name (which, by its nature, may be similar to others’ names)
    may require additional marketing costs to differentiate it from a crowded field.

    *   There may be additional expenses caused by the increased burden of “policing”
    others who want to use similar names.


    As an app maker, you have two important opportunities to brand your app: your
    app name and your icon. You also have the ability to specify your company name.


    First, let’s discuss your app name as a brand. The App Store places some unusual
    business constraints on the app name that you choose. In a non-App Store context,
    I typically recommend picking a name that does not describe or suggest the function
    of your product. Descriptive or suggestive trademarks are much more difficult
    to protect than arbitrary or fanciful ones.


    With iOS apps, however, arbitrary marks pose a discovery problem. The App Store
    will display only the first 17 or so letters of your app’s name when listing apps.
    If you give your app an arbitrary name, casual browsers of the App Store catalog
    may not find your app or realize that it is something that they need. For this
    reason, there are business advantages to choosing a less protectable mark; however,
    you should still seek to make your app name distinctive in some way.


    For instance, if you sell a tip calculator and name it Tip Calculator, it is going
    to be nearly impossible for you to successfully obtain trademark protection for
    that name. On the other hand, if you name your tip calculator app TipStar and
    add a distinctive icon featuring a star, you have something that you can argue
    identifies the app as coming from you, as opposed to simply describing the app’s
    purpose.


    In the TipStar example, if another developer published a tip calculator that featured
    a star-shaped logo or used the word *star*, Ryan Rowe, the developer of TipStar,
    would have a legitimate claim of infringement. Ryan’s TipStar trademark goes beyond
    simply describing the app and adds something distinctive that exists for the purpose
    of distinguishing his apps from others. The star name and symbol are unrelated
    to the purpose of the app, so if Ryan put out an app called WeightStar or ConvertStar,
    he could build on the goodwill that he created with his initial app.


    Your goal should be to create a distinctive name that can identify your app as
    coming from you, but without completely obscuring the purpose of your app. It
    is a fine line.


    If you choose an app name that suggests the function of your app, you may want
    to take extra effort to make your icon distinctive. [Figure 3-1](#9781430262381_Ch03.xhtml#Fig1)
    shows some examples of distinctive icons, compared with some icons that are less
    distinctive.


    ![9781430262381_Fig03-01.jpg](images/9781430262381_Fig03-01.jpg)


    [Figure 3-1](#9781430262381_Ch03.xhtml#_Fig1). Tip calculator names and icons,
    from least to most protectable


    Trade Secrets


    As a developer, you probably have some secrets worth protecting. Maybe it is the
    concept for your next game or app, an algorithm that makes your apps more efficient,
    or the source code behind one of your app’s features. Trade secret law is one
    way you can protect those secrets, and qualifying for the protection is fairly
    simple.

