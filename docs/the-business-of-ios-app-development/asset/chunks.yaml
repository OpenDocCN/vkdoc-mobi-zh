  trans: '

    ### 等待上传状态


    您的应用状态变为*等待上传*，表示 iTunes Connect 已准备好接收您的应用二进制文件上传。


    ![9781430262381_Fig11-18.jpg](img/9781430262381_Fig11-18.jpg)

    **图 11-18.** 您的应用状态变为*等待上传*，表示 iTunes Connect 现已准备好接收您的应用二进制文件上传。


    只有当您的应用状态为*等待上传*时，您才能成功上传应用二进制文件。一旦在 iTunes Connect 的应用主摘要页面上确认了这一点，您就可以返回 Xcode
    Organizer 了。


    ### 在 Xcode Organizer 中提交您的应用二进制文件


    还记得本章前面您使用 Xcode 的*构建并归档*选项编译应用的过程吗？请确保您编译好的应用在 Xcode Organizer 的*已归档应用*部分中仍处于选中状态。在窗口底部，您应该会看到三个按钮（见图
    11-19）。


    ![9781430262381_Fig11-19.jpg](img/9781430262381_Fig11-19.jpg)

    **图 11-19.** 当 iTunes Connect 等待您的二进制文件上传时，您可以在 Xcode Organizer 中验证并提交您的应用以供 App
    Store 审核。


    **注：** 上传应用二进制文件的另一种方法是通过 Xcode 开发者工具下载中包含的 Application Loader 实用程序。在 Apple 文档的多个地方，会指引您使用
    Application Loader 将应用二进制文件上传到 iTunes Connect。虽然这确实是一种有效的方法，但大多数 iOS 开发者建议使用 Xcode
    的*构建并归档*选项编译应用，并通过最新版本的 Xcode Organizer 上传您的应用二进制文件。


    首先，点击*验证应用*按钮。这将执行 Apple 在审核过程中会运行的相同验证测试。如果它通知您应用二进制文件存在任何问题，请借此机会修复问题并重新编译，然后再将应用提交给
    Apple。


    通过验证检查后，您现在可以点击*将应用提交至 iTunes Connect*按钮。系统将要求您提供 iTunes Connect 登录名和密码以完成提交请求。


    就是这样！上传完成后，您的应用状态应变为*等待审核*。


    ### 开发者拒绝状态


    如果您发现问题，或需要编辑在提交队列中无法触碰的某些资源，那么您可以在 iTunes Connect 中点击应用列表的*拒绝二进制文件*按钮，将应用从审核中撤回。这会将您的应用状态更改为*开发者已拒绝*。


    当您准备好后，您需要重新提交一个新的应用二进制文件，这将从头开始审核流程。显然，只有万不得已时您才会这样做。


    ### 正在审核状态


    当您的应用正在被 Apple 审核时，状态会变为*正在审核*。如果您被要求上传 CCATS 文档，在您的 CCATS 被评估期间，您可能会看到*等待出口合规性*状态。


    ### 准备销售状态


    如果您的状态显示为*准备销售*，那么您的应用已获批！是时候庆祝这一重要时刻了！


    ### 管理您自己的预期


    汤姆·佩蒂在唱“等待是最艰难的部分”时从未如此明智。您付出了巨大的努力才走到这一步，即使应用审核过程最终比预期短得多，但在 Apple 确认到来之前，时间的缓慢流逝也会让人觉得极其漫长。要有耐心，小蚂蚱。最好别老想着这事。相反，给自己找个项目忙起来。


    您是否已经完成了所有营销材料的创作，比如新闻稿和视频预告片？以及像第 10 章讨论的那样，研究和联系潜在媒体网站以获取评论和新闻机会？


    如果您已经处理好了营销任务，那太棒了！当您的应用在 App Store 上线时，您将准备好大展拳脚。但这仍然不是您闲坐无事、拼命看时钟的借口。


    没有比现在更好的时间去着手开发您的下一个应用，或者开始为现有应用开发新功能了。无论您做什么，只要让自己忙碌起来，时间就会飞逝。


    ### 获取应用状态通知


    那些不想每天登录 iTunes Connect 一百万次、焦虑地等待状态信息变化的人，可以选择通过电子邮件直接接收状态更新。在您的 iTunes Connect
    用户资料中，只需修改“通知”标签页中的设置，选择接收状态更新邮件即可（见图 11-20）。


    ![9781430262381_Fig11-20.jpg](img/9781430262381_Fig11-20.jpg)

    **图 11-20.** 通过更新 iTunes Connect 用户资料中的“通知”标签页，请求在您的应用状态发生变化时接收电子邮件通知。


    但如果您担心错过那封至关重要的电子邮件通知，Apple 还提供了一个方便的“状态历史”功能。在 iTunes Connect 的应用列表主摘要页面上，点击*状态历史*链接，即可查看审核过程中已经历了哪些阶段，以及特定操作发生的时间和发起人（您或
    Apple）。


    **提示：** 为了提供更高的透明度和简化的沟通，Apple 还创建了 Apple 开发者新闻与公告网站，网址为 `http://developer.apple.com/news/`，作为应用提交技巧、iOS
    开发者计划更新、SDK 新闻和推荐编程技术的在线资源。这个网站甚至会发布最新的应用审核周转时间，例如“过去 7 天内被审核的 iOS 提交比例：80% 的新应用和
    92% 的应用更新。”


    ### 再试一次：应对 App Store 拒绝


    我们所有人都祈祷，拼命希望不要收到那令人恐惧的*被拒*通知，但如果您提交的 iOS 应用被 Apple 拒绝了，请不要绝望。尽管令人沮丧透顶，但这并非世界末日。软件的好处在于，它总是可以被修改并重新提交！


    在 Apple 发送的拒绝信中，审核人员通常会解释您的应用被拒绝的原因，并且如果幸运的话，他们有时甚至会提供如何解决问题的建议。对于简单的问题，比如不恰当的图标或
    UI 元素的错误使用，做出必要的调整应该是不费吹灰之力的事情。


    无论您是否同意拒绝的理由，这都不重要。重要的是您按照要求进行修复并重新提交您的应用。幸运的是，您重新提交应用的次数没有限制，所以振作起来，继续尝试。您已经走了这么远，不应该让一个小小的争议阻止您在
    App Store 赚钱。


    对于那些不容易补救的重大拒绝问题，保持冷静并以专业企业主的身份处理此事至关重要。我知道，仅仅是因为一个不被接受的应用就让您几个月的心血付诸东流，这种想法足以让任何人抓狂。您的第一反应可能是写一篇尖刻的博文，试图为您的诉求集结支持者。像
    Twitter 这样的社交媒体让召集一群愤怒的在线追随者变得太容易了，但对机器发火不会让您赢得 Apple 或应用审核团队的好感。是的，他们确实会阅读博文和新闻网站。虽然让
    TechCrunch 报道您是如何成为又一个应用被拒的受害者，可能会让您个人感到满足，但这无助于您进入 App Store。


    而如果 Apple 的拒绝完全合理，因为您的应用违反了其既定的条款和条件，那您真的没有理由抱怨。您的大声咆哮只会让您在同行——开发者社区——眼中显得不专业。

