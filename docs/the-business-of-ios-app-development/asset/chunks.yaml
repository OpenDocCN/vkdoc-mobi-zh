    此图像将帮助 Apple 在审核您的应用内购买项目时进行参考。因此，请在项目成功通过您自己的测试并准备提交后，再上传截图。'
  raw: 'When adding a new app to the Manage Your Applications section of iTunes Connect,
    do not upload an app binary yet. Without an app binary, your iOS app will not
    be prematurely submitted for review, but you’ll still be able to set up related
    In-App Purchase items and test purchases. Your app listing in Manage Your Applications
    should display a status of Prepare for Upload (see [Figure 8-13](#9781430262381_Ch08.xhtml#Fig13)).
    For details on how to add a new app listing in iTunes Connect, see the comprehensive
    instructions provided in [Chapter 11](#9781430262381_Ch11.xhtml).


    ![9781430262381_Fig08-13.jpg](images/9781430262381_Fig08-13.jpg)


    [Figure 8-13](#9781430262381_Ch08.xhtml#_Fig13). Select your app from within the
    Manage Your Applications section of iTunes Connect, and then click the Manage
    In-App Purchases button to create a new In-App Purchase item


    Within your app’s main page, click the Manage In App Purchases button (see [Figure
    8-13](#9781430262381_Ch08.xhtml#Fig13)), and then click the Create New button
    to add a new In-App Purchase item for that app. Complete the web form that appears
    (see [Figure 8-14](#9781430262381_Ch08.xhtml#Fig14)). You’re required to fill
    out all of the fields, with the exception of the For Review screenshot of the
    purchase in action. That screenshot is only for the app review team, so you can
    wait to upload it when you’re ready to submit it (after you’ve finished testing).


    ![9781430262381_Fig08-14.jpg](images/9781430262381_Fig08-14.jpg)


    [Figure 8-14](#9781430262381_Ch08.xhtml#_Fig14). Create a new In-App Purchase
    item for your app in iTunes Connect


    Let’s walk through the form in [Figure 8-14](#9781430262381_Ch08.xhtml#Fig14).


    *   *Reference Name*: This field represents the name of your In-App Purchase item
    in iTunes Connect, but it may not necessarily be the name that is displayed in
    the App Store (if a customer’s device has a different language setting than your
    iTunes Connect default language). See the Language field description for your
    item’s actual display name.

    *   *Product ID*: Every product in iTunes Connect requires a unique ID, and In-App
    Purchase items are no exception. Any UTF-8 string can be used to identify this
    product, but it’s recommended to use a common ID system across all of your products.
    Many iOS developers use *com.company.appname* as the naming scheme for all application
    SKU numbers, and related In-App Purchase product IDs could use an extension of
    that, such as *com.company.appname.productid*. Since our fictional Breadcrumbs
    app in the example screenshots uses breadcrumbs as its SKU, the In-App Purchase
    product ID for the Premium Pack could be *breadcrumbs.premiumpack* to visually
    reference its relationship to the parent app. This simple system gives you an
    easy and consistent naming scheme across all your own products, as well as unique
    IDs that no one else would be using. This is a significant factor, since iTunes
    Connect does not allow any two products to have the same ID.

    *   *Type*: This is the most important field to understand before submitting this
    form, especially since it cannot be edited after you’ve saved your new In-App
    Purchase item in iTunes Connect. Type defines what kind of In-App Purchase item
    you’re creating. As discussed earlier in the chapter, currently, there are four
    types: Non-Consumable, Consumable, Auto-Renewable Subscriptions, and Subscriptions.
    If Auto-Renewable Subscriptions is selected, you’ll also be required to define
    a duration for your subscription (such as monthly or annually), so that the App
    Store will know when to bill customers for renewals.

    *   *Cleared for Sale*: If this check box is left unchecked, your In-App Purchase
    item will not be available for listing within your app. But even if you select
    this box, that doesn’t mean your In-App Purchase item can be publicly purchased.
    As individual products, all In-App Purchase items need to be reviewed and approved
    by Apple before they are made available in the App Store. But for testing purposes
    (as well as when you’re ready to go live), you definitely want this box to be
    selected.

    *   *Price Tier*: This drop-down menu provides a list of available pricing tiers
    for assigning a specific price to your In-App Purchase item. You can modify the
    price of In-App Purchase items to hold a special promotional sale, but they can
    never be offered for free—not even for a limited time. In-App Purchase, items
    must be priced, with 99 cents as the minimum. To offer free downloadable content
    within your app, you’ll need to implement your own system for retrieving those
    items from your server, outside the App Store.

    *   *Language to Add*: This is where you choose the languages you want to support.
    For each language selected, you fill in the localized Displayed Name field and
    the Description field for your In-App Purchase item. Type carefully, since the
    In-App Purchase item name and description you submit here are what Apple displays
    to customers within the App Store and your application. Your In-App Purchase item
    must support at least one language. If you have only one language listed, make
    sure it is the same as the language set for the related parent app

    *   *Screenshot*: This is for review purposes only and will never be displayed
    in the App Store. When first creating a new In-App Purchase item, you’ll leave
    this field empty. After you’ve extensively tested In-App Purchase within your
    app, you’ll need to take a screenshot of that purchase process in action. Upload
    that image to this Screenshot section.


    This image will aid Apple during the review process of your In-App Purchase item,
    so upload a screenshot only after the item has successfully passed your own testing
    and is ready for submission.'
  trans: '

    ### 在 iTunes Connect 的“管理您的应用”部分添加新应用时，请勿立即上传应用二进制文件。没有应用二进制文件，您的 iOS 应用不会过早地提交审核，但您仍然可以设置相关的应用内购买项目并测试购买。您在“管理您的应用”中的应用列表应显示状态为“准备上传”（请参见图
    8-13）。关于如何在 iTunes Connect 中添加新应用列表的详细信息，请参阅第 11 章中的全面说明。


    ![9781430262381_Fig08-13.jpg](img/9781430262381_Fig08-13.jpg)


    图 8-13. 在 iTunes Connect 的“管理您的应用”部分选择您的应用，然后点击“管理应用内购买”按钮以创建新的应用内购买项目。


    在应用的主页面中，点击“管理应用内购买”按钮（请参见图 8-13），然后点击“创建新项目”按钮为该应用添加一个新的应用内购买项目。填写出现的网页表单（请参见图
    8-14）。您需要填写所有字段，但“供审核的购买过程截图”除外。该截图仅供应用审核团队使用，因此您可以等到准备提交时（在完成测试后）再上传。


    ![9781430262381_Fig08-14.jpg](img/9781430262381_Fig08-14.jpg)


    图 8-14. 在 iTunes Connect 中为您的应用创建新的应用内购买项目。


    让我们逐一了解图 8-14 中的表单字段。


    *   **`Reference Name`**：该字段表示您的应用内购买项目在 iTunes Connect 中的名称，但它不一定是 App Store
    中显示的名称（如果客户设备的语言设置与您的 iTunes Connect 默认语言不同）。请参阅语言字段描述以了解项目的实际显示名称。

    *   **`Product ID`**：iTunes Connect 中的每个产品都需要一个唯一的 ID，应用内购买项目也不例外。任何 UTF-8 字符串都可以用来标识此产品，但建议在您的所有产品中使用通用的
    ID 系统。许多 iOS 开发者使用 `com.company.appname` 作为所有应用 SKU 编号的命名方案，而相关的应用内购买产品 ID 可以使用该方案的扩展，例如
    `com.company.appname.productid`。由于我们示例截图中的虚构应用 Breadcrumbs 使用 `breadcrumbs` 作为其
    SKU，因此高级包的应用内购买产品 ID 可以是 `breadcrumbs.premiumpack`，以直观地体现其与父应用的关系。这个简单的系统为您提供了一种易于使用且在所有产品中保持一致的命名方案，同时也确保了
    ID 的唯一性（其他人无法使用）。这是一个重要因素，因为 iTunes Connect 不允许任何两个产品拥有相同的 ID。

    *   **`Type`**：这是提交此表单前需要理解的最重要字段，尤其是在您保存新的应用内购买项目到 iTunes Connect 后，该字段将无法编辑。`Type`
    定义了您要创建的应用内购买项目的类型。如本章前面所述，目前有四种类型：非消耗品、消耗品、自动续期订阅和订阅。如果选择了“自动续期订阅”，您还需要为订阅定义一个期限（例如每月或每年），以便
    App Store 知道何时向客户收取续期费用。

    *   **`Cleared for Sale`**：如果此复选框未选中，您的应用内购买项目将无法在您的应用中列出。但即使选中了此框，也并不意味着您的应用内购买项目可以公开购买。作为独立产品，所有应用内购买项目在
    App Store 中可用之前，都需要经过 Apple 的审核和批准。但出于测试目的（以及当您准备上线时），您肯定希望选中此框。

    *   **`Price Tier`**：此下拉菜单提供了一系列可用的定价等级，用于为您的应用内购买项目分配特定价格。您可以修改应用内购买项目的价格以进行特价促销活动，但它们绝不能免费提供——即使是限时免费也不行。应用内购买项目必须定价，最低为
    99 美分。若要在您的应用中提供免费的可下载内容，您需要实现自己的系统，从您的服务器上（而非 App Store 之外）获取这些项目。

    *   **`Language to Add`**：此处用于选择您要支持的语言。对于每种选择的语言，您需要填写应用内购买项目的本地化显示名称字段和描述字段。请仔细填写，因为您在此处提交的应用内购买项目名称和描述是
    Apple 在 App Store 和您的应用中向客户显示的内容。您的应用内购买项目必须至少支持一种语言。如果您只列出了一种语言，请确保其与相关父应用设置的语言一致。

    *   **`Screenshot`**：此字段仅用于审核目的，绝不会在 App Store 中显示。首次创建新的应用内购买项目时，请将此字段留空。在您对应用内的购买功能进行充分测试后，需要截取购买过程的截图。将该图像上传到此“截图”部分。


    此图像将帮助 Apple 在审核您的应用内购买项目时进行参考。因此，请在项目成功通过您自己的测试并准备提交后，再上传截图。

