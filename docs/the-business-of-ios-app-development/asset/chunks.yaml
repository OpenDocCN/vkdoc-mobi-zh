- fmt: '如果你的应用完全依靠应用内广告来盈利，制定营销和开发策略就至关重要——这些策略不仅要能吸引新用户，还要能让应用的生命周期超过最初的30天平均值。因此，即使是提供免费应用，开发者也不能固步自封，坐等广告收入滚滚而来。你应该像对待付费应用一样，投入同样多的精力来推广和持续更新一款免费、由广告支持的应用，以确保你的应用内广告解决方案能够带来回报。


    但如果你的免费应用一炮而红，冲进App Store前100名，那么通过应用内广告赚取大笔收入是可能的。如果你同时拥有多款排名靠前的免费应用都在产生广告收入，那么你手上就可能拥有一项非常有利可图的业务。


    ## 在你的iOS应用中集成苹果的iAd


    在了解了其他开发者通过应用内广告取得的成功后，你可能也迫不及待想亲身体验一下。由于篇幅所限，本书无法为每个第三方移动广告网络都提供集成说明，因此在示例中，我们将以iAd为例。一旦你掌握了如何在iOS应用中使用苹果的iAd框架，再自行学习其他第三方SDK（例如AdMob）就会变得非常容易。


    我们将从使用iAd网络的基础知识开始，然后深入讲解设计和编程应用以支持iAd的完整流程。所以，卷起袖子，我们开始吧。


    **注意**：如果你想了解更多关于iAd的信息，请查看以下苹果官方开发者链接（可能需要登录你的iOS开发者账号）：iAd开发（`http://developer.apple.com/iad/`）和面向iAd的App
    Store资源中心（`http://developer.apple.com/appstore/resources/iad/`）。


    ### 加入iAd网络


    在开始使用iAd之前，即使是在Xcode的iOS模拟器中进行测试，你都需要先加入iAd网络。这是在iTunes Connect中完成的，请登录——`http://itunesconnect.apple.com`——然后导航至“合同、税务和银行”部分，以申请加入iAd网络（参见[图7-7](#9781430262381_Ch07.xhtml#Fig7)）。


    ![9781430262381_Fig07-07.jpg](images/9781430262381_Fig07-07.jpg)


    [图7-7](#9781430262381_Ch07.xhtml#_Fig7). 在开始在你的应用中使用iAd框架之前，你首先必须在iTunes Connect中加入iAd网络


    一旦你的iAd网络合同请求被苹果批准，你将能够使用iAd框架成功开发和测试你的应用。


    需要注意的是，在iOS模拟器和你的测试设备上运行应用时，你唯一会看到的广告是默认的iAd测试广告。点击测试iAd横幅只会显示测试广告视图。你的应用不会显示真实的iAd横幅，除非你将该应用提交到iTunes
    Connect并在其中为该应用启用了iAd。


    ### 设计你的应用以展示iAd横幅


    iAd广告有两种类型。一种是典型的iAd横幅视图，在许多由广告支持的iOS应用中都能看到（例如，参见[图7-3](#9781430262381_Ch07.xhtml#Fig3)和[7-4](#9781430262381_Ch07.xhtml#Fig4)）。另一种是全屏沉浸式广告，称为iAd插页视图，在iOS
    4.3中引入。为简单起见，我们将在本书中只关注更流行的iAd横幅视图类型。如果你想了解更多关于实现iAd插页视图的信息，请查阅苹果iOS开发者中心的在线文档。


    如果你已经在iOS应用中见过iAd，那么你对它们的基本运作方式应该不陌生。一个iAd横幅被策略性地放置在应用的用户界面（UI）中，当用户点击时，不会离开当前应用。取而代之的是，一个全屏广告会以模态视图的形式在应用内部显示。关闭这个模态广告视图会将用户带回应用。


    正如你所料，iAd横幅的大小与其他移动广告尺寸非常相似：


    *   竖屏iPhone iAd横幅：宽320点 × 高50点

    *   横屏iPhone iAd横幅：宽480点 × 高32点

    *   横屏iPhone 5/5S iAd横幅：宽568点 × 高32点

    *   竖屏iPad iAd横幅：宽768点 × 高66点

    *   横屏iPad iAd横幅：宽1024点 × 高66点


    目标是将广告横幅插入到你应用的UI中，同时不干扰用户体验。但与此同时，你也希望将广告放在用户容易看到的位置，以获取展示次数和点击量。


    如果你计划将iAd横幅框架放在屏幕顶部，苹果建议将其放置在顶部导航栏或工具栏的上方。如果你计划在屏幕底部附近显示iAd横幅框架，苹果也建议将其添加到工具栏或标签栏上方，但这并非在所有情况下都适用。例如，如果一个iPad应用使用底部带有工具栏的分割视图控制器，则无法将横屏广告横幅放置在这些工具栏上方，因为此时本质上存在两个不同的视图（在横屏模式下，主面板和详细面板是并排的）。在这种场景下，你需要将广告横幅放置在工具栏下方。


    可能让许多开发者感到惊讶的是，`iAd`横幅视图必须作为子视图添加到`UIView`中。如果你知道你的应用总是在屏幕上的某个固定位置显示广告，为什么不在Interface
    Builder中直接将`iAd`横幅视图添加到一个已有的`UIView`中呢？如果你的应用支持多个广告网络，你总是有广告可展示，那又为什么不这么做呢？实际上，有三个非常重要的原因，要求你确保广告视图可以在应用运行时动态地从UI中移除，正如Hog
    Bay Software的PlainText所演示的那样（参见[图7-3](#9781430262381_Ch07.xhtml#Fig3)）：


    *   如果用户的设备失去了蜂窝网络或Wi-Fi连接，你不希望你的应用显示一个空的广告横幅框架。一个大而空白的矩形占据UI中宝贵的屏幕空间，既难看又非常不专业。

    *   当`iAd`横幅不可用或无法连接到iAd网络服务器时，苹果的应用审核团队会拒绝任何显示空白广告位的应用。苹果的`iAd`框架使得在代码中检测这一点变得很容易，它会在无法获取广告时通过`iAd`横幅代理向你的应用发送消息。

    *   如果你计划提供一个应用内购买选项，让那些希望获得无广告体验的忠实用户能够移除广告，你肯定不希望购买后还有一个未使用且空的广告横幅框架留在屏幕上，毫无理由地扰乱应用的UI。


    对于那些计划在`UITableView`上方或某个特定`UIView`中的游戏画布上显示iAd的人，通过代码让iAd横幅在屏幕上可见是相当简单的。但对于那些需要调整多个控件尺寸以便为iAd横幅框架腾出空间的开发者来说，这无疑需要对UI组件和父控制器的设计进行一些改造。


    不要轻易妥协你的应用设计来迁就iAd横幅，从而走上捷径。花时间弄清楚如何在不牺牲应用UI完整性的前提下集成iAd横幅。如果你还没有构建你的应用，那么这仅仅是在规划UI时就考虑好广告横幅的问题。但对于现有应用，这可能意味着需要重建许多视图，以包含新的父级`UIView`，例如一个底层视图来容纳iAd横幅框架的嵌套子视图，以及包含你应用UI组件的顶层视图（参见[图7-8](#9781430262381_Ch07.xhtml#Fig8)）。


    ![9781430262381_Fig07-08.jpg](images/9781430262381_Fig07-08.jpg)'
  raw: 'If your app is supported entirely by in-app advertising, it’s crucial that
    you have marketing and development strategies in place that not only drive new
    users to your app, but also extend your app’s life span beyond that initial 30-day
    average. So, even when offering free apps, developers cannot rest on their laurels,
    waiting for the ad revenue to roll in. You should expect to work just as hard
    promoting and continuously updating a free, ad-supported app as you would for
    a paid app to ensure that your in-app advertising solution pays off.


    But if your free app becomes a runaway hit, rising into the App Store’s Top 100,
    it’s possible to make a lot of money from in-app advertising. And if you have
    several top-ranking free apps generating ad revenue at the same time, you could
    have a very profitable business on your hands.


    Implementing Apple’s iAd in Your iOS Apps


    After reading about the success other developers have had with in-app advertising,
    you’re probably anxious to try your own hand at it. Due to page constraints, it
    wouldn’t be practical for this book to include implementation instructions for
    every third-party mobile ad network out there, so for our examples, we’ll stick
    with iAd. Once you have a good handle on how to use Apple’s iAd framework in your
    iOS apps, learning other third-party SDKs like AdMob on your own will prove very
    easy.


    We’ll start with the basics of working with the iAd Network, and then take an
    extensive walk-through of designing and programming your app to support iAd. So
    roll up your sleeves and let’s get started.


    **Note**  If you’re interested in learning more about iAd, check out these official
    Apple Developer links (your iOS Developer Program login may be required): iAd
    Development (`http://developer.apple.com/iad/`) and App Store Resource Center
    for iAd (`http://developer.apple.com/appstore/resources/iad/`).


    Joining the iAd Network


    Before you can start working with iAd, even when testing in Xcode’s iOS Simulator,
    you’re required to first join the iAd Network. This is done in iTunes Connect,
    so log in—`http://itunesconnect.apple.com`—and then navigate to the Contracts,
    Tax, and Banking section to apply for the iAd Network (see [Figure 7-7](#9781430262381_Ch07.xhtml#Fig7)).


    ![9781430262381_Fig07-07.jpg](images/9781430262381_Fig07-07.jpg)


    [Figure 7-7](#9781430262381_Ch07.xhtml#_Fig7). You must first join the iAd Network
    within iTunes Connect before you can begin working with the iAd framework in your
    apps


    Once your iAd Network contract request has been approved by Apple, you’ll be able
    to successfully develop and test your apps with the iAd framework.


    It’s important to note that the only ad you’ll see when running your app in the
    iOS Simulator and on your test devices is the default iAd test advertisement.
    Tapping the test iAd banner will display only the test ad view. Your app won’t
    display real live iAd banners until you submit the app in iTunes Connect with
    iAd enabled for that app in iTunes Connect.


    Designing Your App for Displaying iAd Banners


    There are two types of iAd advertisements. One is the typical iAd Banner View,
    which can be seen in many ad-supported iOS apps (see [Figures 7-3](#9781430262381_Ch07.xhtml#Fig3)
    and [7-4](#9781430262381_Ch07.xhtml#Fig4), for example). The other is a full-screen,
    immersive ad called an iAd Interstitial View, which was introduced in iOS 4.3\.
    For the sake of simplicity, we’ll focus on only the more popular iAd Banner View
    type within these pages. If you’re interested in learning more about implementing
    the iAd Interstitial View, check out the documentation online at Apple’s iOS Dev
    Center.


    If you’ve already seen iAds in iOS apps, you’re familiar with the general concept
    of how they operate. An iAd banner is placed strategically in an app’s UI, and
    when tapped, the user does not leave the app. Instead, a full screen advertisement
    is shown as a modal view within the app. Closing the modal advertisement view
    brings the user back to the app.


    As you might expect, the iAd banner sizes are very similar to other mobile ad
    sizes:


    *   iPhone portrait iAd banner: 320 points wide × 50 points tall

    *   iPhone landscape iAd banner: 480 points wide × 32 points tall

    *   iPhone 5/5S landscape iAd banner: 568 points wide × 32 points tall

    *   iPad portrait iAd banner: 768 points wide × 66 points tall

    *   iPad landscape iAd banner: 1024 points × 66 points tall


    The goal is to insert the ad banner into your app’s UI without it being too intrusive
    to the user experience. But at the same time, you want the ad to be placed where
    it will be easily seen by users to gain impressions and click-throughs.


    If you plan on placing the iAd banner frame at the top of the screen, Apple recommends
    positioning it above your top navigation bar or toolbar. If you plan on displaying
    the iAd banner frame near the bottom of the screen, Apple also recommends adding
    it above toolbars or tab bars, but that doesn’t necessarily work in all cases.
    For example, if an iPad app uses a split view controller with toolbars along the
    bottom, a landscape ad banner can’t be placed above those toolbars, since there
    are essentially two different views (the master pane and the details pane are
    side by side in landscape mode). In that scenario, you need to place the ad banner
    below the toolbars.


    What may come as a surprise to many developers is that an iAd Banner View must
    be added as a subview to a `UIView`. If you know your app is always going to display
    ads at a specific fixed position on the screen, why not just add an iAd Banner
    View to an existing `UIView` in Interface Builder? If your app supports multiple
    ad networks, you’ll always have an ad available to show, so why not? There are
    actually three very important reasons to ensure your ad view can be dynamically
    removed from the UI while the app is running, as demonstrated in Hog Bay Software’s
    PlainText (see [Figure 7-3](#9781430262381_Ch07.xhtml#Fig3)):


    *   If the user’s device loses cellular or Wi-Fi connectivity, you do not want
    your app to display an empty ad banner frame. Having a large, blank rectangle
    consume valuable screen real estate within your UI is ugly and very unprofessional.

    *   Apple’s app review team will reject any apps that display a blank ad space
    when either an iAd banner is not available or the iAd Network’s server cannot
    be reached. Apple’s iAd framework makes this easy to detect in code by sending
    your app a message via the iAd banner delegate when an ad cannot be retrieved.

    *   If you plan on offering an In-App Purchase option to remove ads for those
    loyal users who would prefer an ad-free experience, you won’t want an unused,
    empty ad banner frame to remain on the screen after purchase, cluttering the app’s
    UI for no reason.


    For those of you who plan to have an iAd appear above a `UITableView` or a game-based
    canvas in a specific `UIView`, making the iAd banner visible on the screen via
    code is fairly trivial. But for those developers who need to resize multiple controls
    to make room for the iAd banner frame, this will undoubtedly require some retooling
    of the design of your UI components and parent controllers.


    Don’t automatically give in to the easy path by compromising your app’s design
    to accommodate an iAd banner. Take the time to figure out how to integrate the
    iAd banner without sacrificing the integrity of your app’s UI. If you have not
    built your app yet, then this is simply a matter of planning your UI with ad banners
    in mind. But for existing apps, this may require rebuilding many of your views
    to include new parent `UIView`s, such as an underlying view that holds the nested
    subviews of the iAd banner frame and the top view containing your app’s UI components
    (see [Figure 7-8](#9781430262381_Ch07.xhtml#Fig8)).


    ![9781430262381_Fig07-08.jpg](images/9781430262381_Fig07-08.jpg)'
  trans: '

    如果你的应用完全依靠应用内广告来盈利，制定营销和开发策略就至关重要——这些策略不仅要能吸引新用户，还要能让应用的生命周期超过最初的 30 天平均值。因此，即使是提供免费应用，开发者也不能固步自封，坐等广告收入滚滚而来。你应该像对待付费应用一样，投入同样多的精力来推广和持续更新一款免费、由广告支持的应用，以确保你的应用内广告解决方案能够带来回报。


    但如果你的免费应用一炮而红，冲进 App Store 前 100 名，那么通过应用内广告赚取大笔收入是可能的。如果你同时拥有多款排名靠前的免费应用都在产生广告收入，那么你手上就可能拥有一项非常有利可图的业务。


    ## 在你的 iOS 应用中集成苹果的 iAd


    在了解了其他开发者通过应用内广告取得的成功后，你可能也迫不及待想亲身体验一下。由于篇幅所限，本书无法为每个第三方移动广告网络都提供集成说明，因此在示例中，我们将以
    iAd 为例。一旦你掌握了如何在 iOS 应用中使用苹果的 iAd 框架，再自行学习其他第三方 SDK（例如 AdMob）就会变得非常容易。


    我们将从使用 iAd 网络的基础知识开始，然后深入讲解设计和编程应用以支持 iAd 的完整流程。所以，卷起袖子，我们开始吧。


    **注意**：如果你想了解更多关于 iAd 的信息，请查看以下苹果官方开发者链接（可能需要登录你的 iOS 开发者账号）：iAd 开发（`http://developer.apple.com/iad/`）和面向
    iAd 的 App Store 资源中心（`http://developer.apple.com/appstore/resources/iad/`）。


    ### 加入 iAd 网络


    在开始使用 iAd 之前，即使是在 Xcode 的 iOS 模拟器中进行测试，你都需要先加入 iAd 网络。这是在 iTunes Connect 中完成的，请登录——`http://itunesconnect.apple.com`——然后导航至“合同、税务和银行”部分，以申请加入
    iAd 网络（参见图 7-7）。


    ![9781430262381_Fig07-07.jpg](img/9781430262381_Fig07-07.jpg)


    图 7-7. 在开始在你的应用中使用 iAd 框架之前，你首先必须在 iTunes Connect 中加入 iAd 网络


    一旦你的 iAd 网络合同请求被苹果批准，你将能够使用 iAd 框架成功开发和测试你的应用。


    需要注意的是，在 iOS 模拟器和你的测试设备上运行应用时，你唯一会看到的广告是默认的 iAd 测试广告。点击测试 iAd 横幅只会显示测试广告视图。你的应用不会显示真实的
    iAd 横幅，除非你将该应用提交到 iTunes Connect 并在其中为该应用启用了 iAd。


    ### 设计你的应用以展示 iAd 横幅


    iAd 广告有两种类型。一种是典型的 iAd 横幅视图，在许多由广告支持的 iOS 应用中都能看到（例如，参见图 7-3 和 7-4）。另一种是全屏沉浸式广告，称为
    iAd 插页视图，在 iOS 4.3 中引入。为简单起见，我们将在本书中只关注更流行的 iAd 横幅视图类型。如果你想了解更多关于实现 iAd 插页视图的信息，请查阅苹果
    iOS 开发者中心的在线文档。


    如果你已经在 iOS 应用中见过 iAd，那么你对它们的基本运作方式应该不陌生。一个 iAd 横幅被策略性地放置在应用的用户界面（UI）中，当用户点击时，不会离开当前应用。取而代之的是，一个全屏广告会以模态视图的形式在应用内部显示。关闭这个模态广告视图会将用户带回应用。


    正如你所料，iAd 横幅的大小与其他移动广告尺寸非常相似：


    *   竖屏 iPhone iAd 横幅：宽 320 点 × 高 50 点

    *   横屏 iPhone iAd 横幅：宽 480 点 × 高 32 点

    *   横屏 iPhone 5/5S iAd 横幅：宽 568 点 × 高 32 点

    *   竖屏 iPad iAd 横幅：宽 768 点 × 高 66 点

    *   横屏 iPad iAd 横幅：宽 1024 点 × 高 66 点


    目标是将广告横幅插入到你应用的 UI 中，同时不干扰用户体验。但与此同时，你也希望将广告放在用户容易看到的位置，以获取展示次数和点击量。


    如果你计划将 iAd 横幅框架放在屏幕顶部，苹果建议将其放置在顶部导航栏或工具栏的上方。如果你计划在屏幕底部附近显示 iAd 横幅框架，苹果也建议将其添加到工具栏或标签栏上方，但这并非在所有情况下都适用。例如，如果一个
    iPad 应用使用底部带有工具栏的分割视图控制器，则无法将横屏广告横幅放置在这些工具栏上方，因为此时本质上存在两个不同的视图（在横屏模式下，主面板和详细面板是并排的）。在这种场景下，你需要将广告横幅放置在工具栏下方。


    可能让许多开发者感到惊讶的是，`iAd` 横幅视图必须作为子视图添加到 `UIView` 中。如果你知道你的应用总是在屏幕上的某个固定位置显示广告，为什么不在
    Interface Builder 中直接将 `iAd` 横幅视图添加到一个已有的 `UIView` 中呢？如果你的应用支持多个广告网络，你总是有广告可展示，那又为什么不这么做呢？实际上，有三个非常重要的原因，要求你确保广告视图可以在应用运行时动态地从
    UI 中移除，正如 Hog Bay Software 的 PlainText 所演示的那样（参见图 7-3）：


    *   如果用户的设备失去了蜂窝网络或 Wi-Fi 连接，你不希望你的应用显示一个空的广告横幅框架。一个大而空白的矩形占据 UI 中宝贵的屏幕空间，既难看又非常不专业。

    *   当 `iAd` 横幅不可用或无法连接到 iAd 网络服务器时，苹果的应用审核团队会拒绝任何显示空白广告位的应用。苹果的 `iAd` 框架使得在代码中检测这一点变得很容易，它会在无法获取广告时通过
    `iAd` 横幅代理向你的应用发送消息。

    *   如果你计划提供一个应用内购买选项，让那些希望获得无广告体验的忠实用户能够移除广告，你肯定不希望购买后还有一个未使用且空的广告横幅框架留在屏幕上，毫无理由地扰乱应用的
    UI。


    对于那些计划在 `UITableView` 上方或某个特定 `UIView` 中的游戏画布上显示 iAd 的人，通过代码让 iAd 横幅在屏幕上可见是相当简单的。但对于那些需要调整多个控件尺寸以便为
    iAd 横幅框架腾出空间的开发者来说，这无疑需要对 UI 组件和父控制器的设计进行一些改造。


    不要轻易妥协你的应用设计来迁就 iAd 横幅，从而走上捷径。花时间弄清楚如何在不牺牲应用 UI 完整性的前提下集成 iAd 横幅。如果你还没有构建你的应用，那么这仅仅是在规划
    UI 时就考虑好广告横幅的问题。但对于现有应用，这可能意味着需要重建许多视图，以包含新的父级 `UIView`，例如一个底层视图来容纳 iAd 横幅框架的嵌套子视图，以及包含你应用
    UI 组件的顶层视图（参见图 7-8）。


    ![9781430262381_Fig07-08.jpg](img/9781430262381_Fig07-08.jpg)

