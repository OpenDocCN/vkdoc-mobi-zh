  trans: '

    如果 Illustrator 或 Photoshop 的价格超出你的预算，市面上也有更便宜的图形工具可供选择。我推荐`Pixelmator`，它可以在 Mac
    App Store 上购买。它拥有许多类似 Photoshop 的功能，并且学习曲线更为平缓。但如果你计划为自己的所有软件产品、网站和营销材料创建图形，我强烈建议投资
    Adobe 的应用。如果购买 Creative Suite 套装，你可以以优惠的打包价格获得所有 Adobe 最佳设计应用。


    在向 App Store 提交应用时，你需要向 Apple 提供一个 1024 × 1024 像素的大图标。因此，如果你在 Photoshop 中创建图标，请确保你的主设计至少这么大。由于你可能也希望在营销材料中使用该图标，你应强烈考虑以更大的尺寸创建主图标。请记住，印刷广告（杂志广告、展会海报等）的分辨率至少应为
    300 点/英寸 (dpi)，因此，如果你的最大图标只有 1024 × 1024 像素，那么在 300 dpi 的印刷材料中，你的图标将只有 1.7 英寸。


    如果你以几英寸的大尺寸创建主图标，你将始终确保在任何场合都有合适的尺寸。你总是可以将图标缩小以获得出色的效果，但你不能增大现有基于位图的图标尺寸，否则会显得非常像素化。如果你在
    Illustrator 中创建基于矢量的图标，则放大或缩小都不是问题。


    不要犯仅在 iPhone 5s 或最新的 iPod touch 型号上预览应用图标的错误。在清晰、高分辨率的 Retina 显示屏上，几乎所有东西看起来都很漂亮。还要确保你的设计在最小的主屏幕应用图标尺寸（即
    60 × 60 像素，非 Retina）下看起来也很好。诀窍在于让你的图标看起来专业而精致，同时保持足够简单，以便在任何尺寸下都能良好显示。这绝非易事，尤其对于非设计师而言，但我们将通过使用一些巧妙的小图形技巧来尝试一下。


    **应用拒绝警告** *你的应用图标和 App Store 图标必须匹配！* 不要试图通过制作一个复杂、精细的 1024 × 1024 图标，然后针对 60
    × 60 的应用图标制作一个大幅简化的版本来规避图标易读性问题。图标不需要完全一致，所以如果缩小导致某些元素模糊，你可以对小图标进行细微修饰。但当两者放在一起时，两个图标看起来应该是相同的设计。如果两者之间存在显著差异，你的应用可能会被
    Apple 的应用审核团队拒绝。


    关于规则和工具的讨论就到这里。让我们开始一些设计工作吧！


    ## 设计自定义应用图标


    你需要专注于一些本质简单，但同时又能传达应用功能的东西。务必研究竞争对手，让你的应用图标从同类中脱颖而出。在 iOS 7 中，许多知名应用简化了它们的图标以匹配新风格，这一趋势在
    iOS 8 中得以延续。图标的风格也取决于你正在制作的应用类型；例如，如果是游戏，你需要确保它有足够的细节来吸引用户的兴趣。图 4-7 展示了 iOS 6
    和 iOS 7 版本应用图标对比的示例。


    ![9781430262381_Fig04-07.jpg](img/9781430262381_Fig04-07.jpg)


    图 4-7。左侧为 Duolingo iOS 6，右侧为 iOS 7。请注意，iOS 7 版本的图标使用了更明亮的调色板，并减少了阴影和细节


    ### 开始绘制草图


    首先，绘制关于你希望应用图标外观的想法草图。构思出几种不同的变体，直到找到你想要的方向。在构思不同布局时，你可能需要考虑几点。颜色在区分不同应用方面起着巨大作用；确保你在实际应用和图标中的调色板保持一致。如果你有品牌色或标志，请务必将它们融入到应用图标的概念中。你的概念应该传达应用的功能，无论是通过标志还是设计来体现。


    ### 使其独一无二


    确保你定义了一个既不过于复杂但依然独特的形状或图案。通常，标志会作为应用图标的独特形状，但有时需要自行创建。图 4-8 展示了一些近期应用图标设计的示例。注意这些图标如何将设计聚焦于单一元素，保持简洁和可识别性。


    ![9781430262381_Fig04-08.jpg](img/9781430262381_Fig04-08.jpg)


    图 4-8。Evernote、Rise、Circle、Deliveries、YouTube（从左至右）


    ### 简约之美


    在制作图标时，请记住保持简单和切题。确保这一点的一个方法是限制你使用的颜色数量。你还应尽可能避免在图标上使用文字。务必遵循 Apple 最近引入的网格系统，以确保应用图标设计之间更具一致性（参见图
    4-9）。这是一个建议指南，并非必须使用。


    ![9781430262381_Fig04-09.jpg](img/9781430262381_Fig04-09.jpg)


    图 4-9。Apple 新引入的网格系统为应用图标带来了统一性


    如果你有想要推广的品牌，请务必将你的品牌/标志元素融入应用图标中。作为参考，图 4-10 展示了一些大型零售商如何将他们的品牌融入应用图标。


    ![9781430262381_Fig04-10.jpg](img/9781430262381_Fig04-10.jpg)


    图 4-10。Target、Twitter、Skype、Google Search 和 Nordstrom（从左至右）


    ### 示例应用图标


    如果你需要一些资源来帮助你创建不同分辨率的文件，请查看这些由慷慨的开发者捐赠给社区的实用 Photoshop 和 Illustrator 文件：


    *   iOS 8 应用图标 PSD 模板：(`http://appicontemplate.com/ios8`)

    *   Andex 设计的 iOS 7 应用图标 PSD 和 AI 模板（大致适用于 iOS 8）：(`http://www.andexdesign.com/ios-7-app-icons-template/`)


    如果你正在寻找灵感，这里有一个不错的 iOS 应用图标设计汇编：


    *   iOS 图标画廊：(`http://iosicongallery.com`)


    现在，为了好玩，让我们制作一个天气图标。首先，使用模板并借助网格线来帮助你定位图标元素。在使用 Photoshop 或任何其他程序时，请确保将每个对象都设置为单独的图层。在下面的例子中，有三个主要图层：背景、太阳和云。为什么要费心维护这么多图层呢？将对象分开可以让你轻松移动单个图层或图层组，直到构图看起来平衡和完整。分开的图层还允许你修改每个对象的属性和应用滤镜效果。

    '
- fmt: 'The first step is to draw the outline of the icon and position it to where
    you want it (see [Figure 4-11](#9781430262381_Ch04.xhtml#Fig11)). Then you can
    change the color of each of the layers to make it closer to what you want. The
    final step is always the longest because this is where all the subtle details
    come in. You want to play around with the level of gradient on the icon to make
    it a little more similar to gradients found throughout iOS 8. I’ve added very
    subtle shadows and opacity on the icons to produce a look that is vivid, but keeps
    a balance so that too many objects aren’t calling your attention. The focus should
    always be on that one element that you want to communicate. The primary color
    used here is blue. Choose a good color that matches your brand and makes it distinct
    enough so that if I am looking for the icon on my home screen, I can easily find
    it; for example, if I associated the color purple with your app.


    ![9781430262381_Fig04-11.jpg](images/9781430262381_Fig04-11.jpg)


    [Figure 4-11](#9781430262381_Ch04.xhtml#_Fig11). Sample weather app icon. Take
    designing icons in stages: make a low-fidelity design first, add some color, and
    then finish it with the details


    I highly suggest sketching your icon ideas before you jump into creating the digital
    counterpart, but the true test is in resizing the finished icon to the required
    sizes. If the design looks good in both 1024 × 1024 pixels and 60 × 60 pixels
    icon sizes, then you’ve accomplished your mission. Don’t worry about the rounded
    look that iOS app icons typically have. The iOS system and the App Store automatically
    add those elements to the icon for you.


    ## Interface Design: Think Like a User, Not Like a Developer


    Because I stressed its importance earlier in this chapter, you’ve taken the time
    to read Apple’s iOS HIG, right? No? Then go ahead. I’ll wait....


    You’re back already? Great! Now that you understand Apple’s suggested boundaries
    and recommended design practices for iOS UIs, your first step in the development
    process is to put that knowledge to good use. No, I’m not talking about writing
    code just yet. Think about your app’s core functionality and the key features
    that it will include. How do you package that feature set into a compact, user-friendly
    interface for a small mobile device? Answering that question should be your first
    development task. You may already be an experienced iOS programmer, well versed
    in `Objective-C` and `Cocoa Touch` (and if you’re not, plenty of great iPhone
    and iPad development books are available from Apress), but many developers have
    trouble translating their app concept into an efficient UI that’s intuitive and
    easy to use.


    Users want to see the interface when your app is showcased in the App Store. It’s
    the front end that they will be interacting with when using your app, so they’ll
    be checking to see whether it satisfies their specific needs and is easy to learn.
    Since consumers may have many alternatives to choose from, your app needs to be
    more visually appealing than your competitors. It’s not just about being the app
    with the most features. Offering the features that consumers want may initially
    grab their attention, but the app with the best overall user experience will win
    their hard-earned money.


    The following are some resources that can help you on this journey of understanding
    iOS design:


    *   Starter’s Guide to iOS Design (`http://taybenlor.com/2013/05/21/designing-for-ios.html`)

    *   Bjango, Designing for Retina Displays (`http://bjango.com/articles/designingforretina/`)


    ### Get to Know Your Users


    Take off your “developer hat” for a moment to think about your own purchasing
    habits. When you compare several similar apps to evaluate which one to buy, it’s
    your visual senses that first kick into gear. You’re looking at an app’s screenshots
    in the App Store, and maybe even watching a video demo trailer on the developer’s
    web site or playing with a free lite version. Obviously, customer ratings and
    reviews play a huge part in your decision, but let’s say two similar apps offer
    the same features and have received roughly the same glowing reviews. When compared
    side by side, if one app offers a very plain and boring UI, and the other offers
    a slick and attractive UI, the consumer is going to gravitate toward the app that’s
    more visually enticing.


    This type of thinking does not apply only to games, which require unique interfaces
    and original game play. Even if you’re developing a utility or productivity app
    that performs mundane tasks, it doesn’t mean that it can’t be exciting and fun
    to use. Your customers will thank you for it.


    To get into this mode of thinking, you should start off by writing *user stories*.
    User stories are essentially an exercise that will help put you in the shoes of
    your users. A user story is written like this: “As a [type of user], I want [some
    goal] so that [some reason].” So if you were creating an app that tracks fitness
    goals, you would need to create several user stories for all the different tasks
    and users of the app. For example: “As a registered user I want to be able to
    log in so that I can view my fitness goals and progress.”


    This exercise may seem repetitive but it is what many have adopted so that the
    focus remains on the user. It also helps you visualize and prioritize certain
    tasks over others, which will ultimately help you create a more relevant experience
    for the user. Once you have exhausted yourself in creating these user stories,
    you can treat this as your task list and your guide when deciding to start your
    app design and development.


    ### Draw Your Ideas on Paper


    I’ve seen many developers’ excitement get the best of them and so all they want
    to do is jump right into developing the app. The first thing you want to do is
    really define your app from A to Z: the features you want to have, what you want
    the user to get from it, how they will interact with it, and so forth. It doesn’t
    have to be complete, but once you have a good vision of what you want, then you
    can start thinking about how the user will interact with the app.


    Don’t overlook the value of sketches on graph paper! Getting your ideas down on
    paper is a quick way to map out the basic look and feel of your app. Are you designing
    a game that requires a completely custom interface? Drawing your concept on paper
    may be your only rapid option, since it would be impossible to do with only the
    standard controls available in `Interface Builder`. Sketch it first by hand to
    work out the design kinks, and then construct the final custom artwork in `Photoshop`
    or `Illustrator`.


    ### Create an App Flow/Storyboard


    You’ve already defined user stories, so now you have a better idea of how you
    want the app to flow. If I were developing a fitness app, I’d want to use my user
    stories to begin visualizing how a user gets from one screen to another, or how
    a user arrives at the screen they want to go to.


    If you are interested in an easy way to create these wireframes and user flows,
    I highly suggest programs like `Balsamiq Mockups` and `Axure`. These tools are
    generally used for prototyping but can also aid in developing low-fidelity wireframes
    that help paint a picture in your head. Another program worth checking out on
    the iPad/iPhone is `Graffio`. It allows you to create a visual flow with standard
    shapes and icons, which is especially useful in understanding how your app will
    ultimately work.'
  raw: 'The first step is to draw the outline of the icon and position it to where
    you want it (see [Figure 4-11](#9781430262381_Ch04.xhtml#Fig11)). Then you can
    change the color of each of the layers to make it closer to what you want. The
    final step is always the longest because this is where all the subtle details
    come in. You want to play around with the level of gradient on the icon to make
    it a little more similar to gradients found throughout iOS 8\. I’ve added very
    subtle shadows and opacity on the icons to produce a look that is vivid, but keeps
    a balance so that too many objects aren’t calling your attention. The focus should
    always be on that one element that you want to communicate. The primary color
    used here is blue. Choose a good color that matches your brand and makes it distinct
    enough so that if I am looking for the icon on my home screen, I can easily find
    it; for example, if I associated the color purple with your app.


    ![9781430262381_Fig04-11.jpg](images/9781430262381_Fig04-11.jpg)


    [Figure 4-11](#9781430262381_Ch04.xhtml#_Fig11). Sample weather app icon. Take
    designing icons in stages: make a low-fidelity design first, add some color, and
