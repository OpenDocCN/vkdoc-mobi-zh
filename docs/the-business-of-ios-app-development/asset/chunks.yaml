- fmt: '# When Designing for Multiple iOS Device Targets


    When designing for multiple iOS device targets, you may find that resizing your
    Retina display toolbar and tab bar icons for older iPhones and the iPad provides
    less than stellar results. Shrinking a little white icon to an even smaller size
    can sometimes make certain elements of the icon appear blurry. Frequently, I find
    that to perfect an icon for each target size, I end up either doing some touch-up
    work to the icon after resizing it or simply re-creating it from scratch for that
    smaller size. Yes, that’s a lot of extra work, but in the long run, it’s worth
    the additional time spent on beautifying my app for every iOS device it supports.


    **App Rejection Warning**: Use system-provided icons only in the way that users
    expect them to work. Apple has generously included several icons in the iOS SDK
    that developers can use in their own apps, such as Add, Compose, Reply, Action,
    Search, and many more. This can save you from needing to create custom icons for
    common tasks that are already covered by Apple’s system icons. Just keep in mind
    that Apple provides these icons to represent consistent behavior across all apps
    that use them. When employing these system icons in your own app, be sure you’re
    using them in their intended manner, or else your App Store submission may be
    quickly rejected. For example, don’t use the Reply icon for a back button, and
    don’t use the Bookmarks icon to open an e-book.


    ## Navigation Colors


    You can modify the color of the navigation bar easily through Xcode, which is
    what Apple intends for developers to do to move away from using images. When you
    define a color that is appropriate for the app, you can set it in Xcode. You can
    set any text or icons on the navigation bar or toolbar by adjusting the `tintColor`
    function.


    If you peruse the App Store, you’ll notice that a lot of recent apps focus on
    a set color and keep it consistent throughout the app. [Figure 4-18](#9781430262381_Ch04.xhtml#Fig18)
    shows some examples of how color now plays a huge role in defining the look and
    feel of an app.


    ![9781430262381_Fig04-18.jpg](images/9781430262381_Fig04-18.jpg)


    [Figure 4-18](#9781430262381_Ch04.xhtml#_Fig18). The Snapguide app utilizes orange
    toolbars and an off-white background image to reinforce its brand colors


    Set the color of the navigation and toolbar components by first opening your `.xib`
    file in Interface Builder and selecting the navigation bar or toolbar with its
    attributes visible in the inspector palette. Then, under Attributes, keep the
    Style set to Default and change the Tint to your desired color by using the Color
    Picker button.


    If you use a custom color for your navigation bar and/or toolbar, you’ll also
    want to modify the background of your views from the default blue/gray to a new
    color or image of your choice.


    ## Using Text


    The use of text seems to be optimized in the event that the screen resolution
    or the screen size changes. Apps that are less image-heavy and that use color
    and typography to engage the user are more adaptable and scalable. When Apple
    introduced the iPhone 4 with Retina display, it took many developers a long time
    to redo all of the images in their app at 2x the old resolution.


    So just as you should embrace color, also embrace text and how it can play a big
    role in engaging your user by serving as an action. This also helps avoid the
    dilemma of choosing an appropriate icon for a particular action. For example,
    to access a filter screen, a funnel icon could be displayed, but users might have
    trouble identifying it since there is no set standard icon associated to the action
    of filtering on devices. If you replace it with just the word *filter* you have
    eliminated any confusion for the user and at the same time you are consistent
    with the design change introduced with iOS 7.


    ## Designing for Accessibility


    Another important visual design factor to consider is Apple’s accessibility feature,
    White on Black. It enables any iPhone or iPad user to change the display to white
    text on a black background in any application. When turned on, this high-contrast
    feature inverts the screen’s colors, making the text easier to read for some vision-impaired
    folks. As a developer, you should test your app’s interface design in White on
    Black mode to ensure that it remains readable and its usability does not suffer
    from the inverted colors. It does not appear that the iPhone Simulator supports
    the Inverted Colors mode, so for now, you’ll need to test your app on an actual
    iOS device. In the Settings panel, choose General, select Accessibility, and finally
    tap the Invert Colors switch to ON.


    Another important subject that’s often overlooked by software developers is color
    blindness. Although complete color blindness is a rare condition, quite a large
    percentage of the world’s population suffers from some form of color-deficient
    vision. This means their eyes see full color but are unable to differentiate between
    some key colors, like red and green. Although very few females exhibit color problems,
    would you believe that a whopping 8 percent of males demonstrate some sort of
    color deficiency? To put that into perspective, roughly 1 in 12 males of European
    descent have color-deficient vision. Considering that many iOS developers create
    games and other apps specifically geared toward guys, being aware of color-deficiency
    issues when you’re designing your interface is crucial in making your app accessible
    to the broadest audience possible.


    Here are a couple of helpful resources for checking accessibility:


    - **Vischeck** (`http://www.vischeck.com`): This web site should be a required
    stop for all software developers. It provides helpful online tools for revealing
    color problems in your applications. Upload screenshots of your interface into
    the online Vischeck simulator to see how your UI design will look through color-deficient
    eyes. Upload screenshots to the online Daltonize tool to color-correct your interface
    for the three most common color deficiencies. The site also offers download of
    the Vischeck simulator as a free Photoshop plug-in for testing your interface
    screenshots directly within Photoshop.

    - **Sim Daltonism for Mac OS X** (`http://michelf.com/projects/sim-daltonism/`):
    This time-saving desktop application by Michel Fortin is a simple floating palette
    that allows you to test your iPhone app’s interface in real time. Run your Xcode
    project in the iPhone Simulator while running the Sim Daltonism floating palette
    along one side. Select a color-deficiency type from the palette’s menu, and then
    move your mouse pointer over the iPhone Simulator to see how your app’s UI looks
    through color-deficient eyes in the palette window. (If you find Sim Daltonism
    useful, you’re encouraged to support its continued development by making an online
    donation at Michel’s web site.)


    ## Tips for the Artistically Challenged


    The do-it-yourself route is not for everyone, especially when designing something
    as important as custom artwork for your iOS app icon, logo, and UI. Remember that
    Photoshop, Illustrator, Pixelmator, and other graphics programs are merely tools.
    Those tools are only as useful as your ability to wield them. To put the tools
    to good use, you must have the creativity and patience to translate the ideas
    from your head into actual pixels on the screen. Need some help? Here, I’ll recommend
    a few time-saving solutions and resources that might give you just the boost you
    need.


    ### Finding Graphics and Icons'
