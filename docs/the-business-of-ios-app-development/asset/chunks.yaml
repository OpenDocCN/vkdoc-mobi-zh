- fmt: '# App Store Lite Version Guidelines


    - The lite version must be a fully functional app. Your free lite version can
    contain fewer features than the paid version as long as this limited feature set
    allows the user to enjoy the lite version as a complete, stand-alone experience.
    The core functionality of the app should be accessible in both versions. For example,
    if your app’s primary functionality is writing documents, then both the lite and
    paid versions should include the ability to create, edit, and save documents.
    To entice users to purchase the paid version, you can make additional enhancements
    exclusive to the paid version, such as file-synchronizing services, extra style
    formatting options, and so on. You may even limit the number of documents a user
    can store in the lite version (lite: ten files; paid: unlimited), as long as the
    core functionality remains intact.


    - The lite version cannot contain crippled features. A free lite version may not
    contain disabled features that, when accessed, inform users that the selected
    functionality is available only in the paid version. For example, if your app
    is a game and the ability to save high scores is limited to the paid version,
    do not include a reference to high scores in your lite version’s interface. Don’t
    include a High Scores button in the lite version that, when selected, notifies
    the user that high scores is a full-version, paid-only feature with a blatant
    Buy Now button. In the eyes of Apple, that’s considered a crippled feature. If
    your lite version includes a High Scores button, it must provide that functionality.


    - The lite version cannot remind users to buy the paid version. Although you can
    definitely include a Buy Full Version button in your lite version’s main Info
    screen, you cannot prompt the user to upgrade via a `UIAlertView` or a custom
    pop-up view while they are using your app. This constant “nag” window may be acceptable
    for desktop shareware, but it will quickly earn you a rejection letter from Apple’s
    app review team.


    - The lite version cannot time-out or disable features. In the world of desktop
    software, a common approach to expedite the full-version purchase is to create
    a time-limited demo version that disables either certain features or the entire
    app after being installed for a set number of days. This is a big no-no in the
    App Store. iOS apps are not allowed to ever expire or time-out in any way.


    - The lite version cannot be referenced as a demo. Since all iOS apps are required
    to be fully functional, you’ll have trouble getting approved in the App Store
    if you use words like demo or trial in your app name, or anywhere in your UI.
    Your app can include the word *lite* or *free* to denote a lite version.


    - One of the best examples of free version monetary power is pay-to-play games
    such as Clash of Clans and Candy Crush. These games are completely free to play.
    If you choose to never spend a dime on the app you will be considerably behind
    everyone else. Now you might now think people would pay to have an advantage over
    the competition… *Wrong*. Take a look at the Top Grossing Category in the App
    Store; chances are almost all of the apps found here play on this model. You get
    them hooked on the free version and offer them the option to do things better,
    faster, or more efficiently at a cost.


    ## Can a Free Lite Version Really Boost Paid App Sales?


    If done right, your lite version can be a finely tuned sales machine, turning
    thousands (or maybe millions) of users into paying customers. So, how many free
    lite downloads does it actually take to see a spike in paid app sales?


    On average, most iOS developers report conversion rates between 0.5 percent and
    3 percent. This means that for every 100 downloads of their free lite version,
    they’re selling approximately one to three paid versions. If you’re selling your
    paid version for 99 cents, and your lite version is getting only 100 downloads
    per day, your app sales may bring in only a few dollars each day. That’s not going
    to generate enough revenue to financially support you or your development costs.


    This is where success really becomes a numbers game. Volume is king. You’ll need
    to heavily promote your lite version to increase the number of downloads it receives.
    The more lite downloads you have, the more your paid app sales will rise.


    Ethan Nicholas, the developer behind the best-selling iShoot app, reported conversion
    rates as high as 8 percent. The popularity of Ethan’s iShoot Lite helped propel
    iShoot to the number-one spot in the App Store’s Top Paid Apps chart. Although
    8 percent may not seem like a lot, the numbers quickly add up if your lite version
    becomes popular. The free iShoot Lite received millions of downloads, and with
    iShoot priced at $2.99 at the time (January 2009), that small conversion rate
    reportedly earned Ethan more than $700,000 in just the first few weeks of release.
    Just keep in mind that was back when the App Store had less than 100,000 apps.
    Now Apple’s mobile marketplace is packed with more than 300,000 titles, so most
    apps and games will never see conversion rates that high.


    Specialized niche apps often see higher conversion rates than mainstream apps,
    since interested users are looking for specific features that only a handful of
    apps offer. A popular niche app may not rank high enough to be listed in the Top
    100, but it could potentially benefit from conversion rates of 10 to 20 percent.
    Why such a big difference?


    Popular mainstream apps that hover in the Top 100 have much more visibility, drawing
    the attention of a broader, general audience who may download many free lite versions
    out of sheer curiosity. Special niche apps are usually found by consumers with
    a genuine interest or need for that specific functionality, so the odds they will
    purchase the full version are much better. This is why many niche apps are priced
    higher than games and novelty apps. What they lack in sales volume, they try to
    make up for with a higher profit margin per unit sold.


    Regardless of the actual conversion rate, it’s important to have your lite version
    available at the same time you release your paid app. This allows you to capitalize
    on the buzz and visibility surrounding the initial launch. One of the biggest
    success stories of 2010 was not a bestseller right out of the gate. Rovio’s Angry
    Birds had lukewarm sales when it was first released as a paid app in December
    2009. It wasn''t until the free lite version was made available a few months later
    that sales started to skyrocket (see [Figure 6-1](#9781430262381_Ch06.xhtml#Fig1)).
    As more and more people were trying the free lite version, the word-of-mouth spread
    quickly, and Angry Birds was eventually showcased as a featured game in the App
    Store. The groundswell of attention, combined with its addictive, fun game play,
    propelled Angry Birds to the phenomenon it is today, with more than 40 million
    downloads of the free lite and paid versions for the iPhone and iPad.


    ![9781430262381_Fig06-01.jpg](images/9781430262381_Fig06-01.jpg)


    [Figure 6-1](#9781430262381_Ch06.xhtml#_Fig1). Rovio’s sales for Angry Birds didn’t
    skyrocket to the top of the paid charts until the free lite version was released,
    followed by Apple showcasing it as a featured game in the App Store'
