- fmt: 'The next few paragraphs that follow the introductory paragraph are essentially
    your elevator pitch description without the flowery marketing adjectives. The
    main body of your press release should explain in concise detail exactly what
    your app does, the features and benefits it provides, and why people should care.
    The press love to include quotes in the stories they run, so it’s also a good
    idea to include a good quote from a senior executive of your company (you?) on
    why the product was created or how it represents an important milestone for your
    company. Just remember that less is more. Unless your app represents some earth-shattering
    technology breakthrough that warrants a lengthy explanation, your press release
    should not be longer than one page. That means if you are using word processor
    software such as `Microsoft Word` to write your press release, the entire document
    should fit within a single 8.5 × 11–inch page with 1-inch margins.


    ## Pricing and Availability


    The next text block should include your app’s price, any specific device hardware
    or iOS version requirements, and where the app can be purchased. Since most iPhone
    and iPad apps are available in multiple countries, if the price is listed in dollars,
    then indicate that’s the price in the US App Store and that the app is priced
    accordingly in other regions. Most news sites cater to a global audience, so it’s
    important to mention if your app is available worldwide in all of Apple’s regional
    App Stores. If you also offer a free lite version, be sure to include that information
    as well, so that interested readers can download it and try it risk-free.


    ## Web Site URL and Additional Information


    Since a one-page press release can’t possibly include everything about your new
    iOS app, it’s absolutely crucial that you include a link to your app’s web site
    or company web site. This gives interested consumers easy access to additional
    information, screenshots, and video demos. If the press is interested in writing
    about your product, they will also visit your listed URLs to better familiarize
    themselves with your company. And that’s yet another reason to make sure you have
    a professional, well-designed web site before your app is released.


    ## About Your Company


    This last paragraph should describe your company. This is also a great place to
    briefly mention any relevant awards you’ve won and other well-known products you’ve
    produced. Journalists are consumers too, so if they recognize and admire your
    other software apps, they may be more inclined to write about your new product.


    ## End of the Press Release


    The three hash symbols (`###`) centered on the page represent the end of the press
    release content. Anything that you include below that marker is regarded as information
    that should not be posted publicly, such as your phone number and other media
    contact details. Of course, for those automated news sites that simply post the
    exact e-mail announcement you send them, the entire message will be published,
    regardless of those markers. For those automated sites, be sure to omit any personal
    contact information that you don’t want posted online for search engines to index
    and cache for all eternity.


    ## Media Contact Information


    Always provide a way for the press to reach you. An e-mail address is a must,
    and a phone number is also recommended. Since international phone calls can be
    quite expensive, you may want to set up a `Skype` account or instant messaging
    account and list that in lieu of a phone number. The more avenues you provide
    for reaching you, the better, so it can’t hurt to also include your `Twitter`
    handle as well. If they like your app, they may just decide to follow you! This
    section is also a great place to include download links for screenshot images,
    video trailers, an official press kit, and any other marketing materials that
    you’ve produced for your iOS app.


    Journalists don’t have time to hunt through your web site for screenshots, so
    always include direct links to media resources. And don’t forget to state that
    you welcome all questions, interviews, and app reviews. Let the press know that
    you’re openly accessible for additional inquiries and can provide promo codes
    for reviewing your app. (Promo codes are discussed a little later in this chapter.)


    ## Translating Your Press Release


    Most of the dominant iOS-related news sites are English-based. If English is not
    your native language, don’t send them a press release in a foreign language. And
    certainly don’t try converting your press release with an automated online tool
    like `Google Translate`. Either the journalists won’t be able to translate it
    themselves or the autotranslated English will contain so much incorrect syntax
    and phrasing that it can render your announcement unreadable. Hire a professional
    translator to convert your press release to proper English, and do likewise for
    translations from English to any other language. First impressions are everything
    when dealing with the press, so it’s a worthy investment.


    ## The Virtual 24/7 Press Room


    Although you’ll be sending out your press release to as many iOS-related news
    sites as possible, you’ll also want to make your press release available on your
    web site or blog. You can’t possibly reach everyone yourself. For those journalists
    who were not included in your initial e-mail list but discover your app on their
    own, provide access to your press release online. And don’t just post it as an
    `HTML` page. Make it available as its own download that the press can save to
    their computers for later reference.


    After looking at the Dapple press release in [Figure 12-1](#9781430262381_Ch12.xhtml#Fig1),
    nicely formatted with a company logo letterhead and various font sizes and styles
    applied, you may be tempted to create something similar—and you should! This is
    easy enough to produce with most word processor software programs and makes your
    press release look that much more professional. Be sure to save the press release
    in several popular formats, such as `DOC` (`Microsoft Word`), `RTF`, and `PDF`
    to ensure that anyone can easily open and read the file.


    Create a dedicated section on your web site for posting all your press releases.
    Make it easily accessible from anywhere in your site by including a link to it
    from your main navigation menu or footer menu. Most developers tend to call this
    section something intuitive and simple, such as “Press” or “Press Room,” so that
    it’s extremely easy to find.


    Although providing a public archive of downloadable press releases online is great,
    don’t stop there. Make it as easy as possible for journalists and reviewers to
    write about your iOS app by also including download links of screenshots, video
    trailers, app icons and logos, and even your company logo! Any materials that
    might prove useful to the press should be included in your virtual online press
    room. Streaming Colour Studios’ online press page at `http://www.streamingcolour.com/press/`
    accomplishes this and more. It offers a convenient downloadable press kit for
    each iOS game that includes screenshots, an app icon, a company logo, and a press
    release—all compressed in a single zip archive. This press page also lists links
    to relevant awards, interviews, and app reviews to further spotlight its games.


    Maintaining an online press section on your site will serve as a comprehensive
    resource for those journalists and bloggers who are interested in doing a story
    on your company or products, no matter their time zone. Reporters are often under
    tight deadlines, so your 24/7 virtual press room can help provide immediate answers,
    even when you’re unavailable. Of course, don’t wait for the media to find your
    web site.'
