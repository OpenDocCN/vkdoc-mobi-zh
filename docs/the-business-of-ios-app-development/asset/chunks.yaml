    will surely trigger new questions that require new rules and clarification. As
    the mobile landscape evolves, so too will Apple’s guidelines. With this in mind,
    always refer to the latest online version of this document when designing and
    developing your app. Find it at `https://developer.apple.com/appstore/resources/approval/guidelines.html`.

    *   *Application Submission Feedback*: This blog posts reported reasons for app
    rejections, as submitted by anonymous developers. This unauthorized site is a
    great source of information, although Apple’s app review team can’t be thrilled
    with its existence. Visit it at `http://appreview.tumblr.com`.'
