- fmt: 'From there, you can access the Promotional Codes screen and enter the number
    of promo codes you need (as long as you don’t exceed your remaining balance of
    codes for that app update). If your allotment isn’t yet depleted, simply return
    to iTunes Connect any time you need additional promo codes issued to you.


    If you don’t see a link or button for promo codes on your app’s View Details page,
    that means the app has not yet been approved by Apple. Since promo codes are redeemed
    via iTunes, your app must be available for sale in the App Store before you can
    request promo codes for it.


    If you want to send an advance copy of your app to someone to review before it’s
    available in the App Store, then obviously you won’t be able to issue a promo
    code. Your only option is to use ad hoc distribution to provide the app to that
    reviewer. Most, if not all, app review sites can provide their device IDs and
    will accept ad hoc distributed versions if they have agreed to do an advance review.
    And since sneak previews and exclusives for highly anticipated apps are greatly
    desired, they will gladly deal with the irritating complexity of ad hoc distribution
    and expiring provision profiles.


    But keep in mind that you can register only 100 device IDs per year for all your
    apps combined, whereas Apple is much more generous with 50 promo codes per app
    update. If your app is already available in the App Store, don’t waste your precious
    ad hoc device ID allotment. Issue promo codes instead, which are preferred by
    reviewers anyway.


    ## Publicity Requires Planning and Patience


    Just because you sent someone a promo code, don’t assume that automatically grants
    you an app review. And even if a reviewer does eventually write about your app,
    it may not be within the timetable you anticipated. As I’ve mentioned, journalists
    and reviewers are extremely busy, receiving hundreds of new product releases and
    review requests every day. It may be days or even weeks before they reply to your
    inquiry, so be patient.


    I know I’m starting to sound like a broken record, but this is yet another reason
    why establishing relationships with the press during your early prerelease marketing
    efforts is so important. Everything takes time, and publicity is no different,
    so plan ahead.


    If an important app review site does not respond to your submission in a timely
    manner, whatever you do, never offer bribes, beg, or attempt to solicit sympathy.
    And, certainly, don’t hassle them with a mind-numbing barrage of e-mail messages
    and phone calls. Such behavior will not only ruin your chances at receiving coverage,
    but it may just get you and your company banned from the site.


    You can preempt much of the mystery by asking two simple questions when you’re
    initially contacting bloggers and reviewers:


    * After receiving a new press release or app review inquiry, how long does it
    typically take for an article or review to be written and posted online?

    * If I don’t receive a response, may I check back with you in a week or two?


    If you push too hard, you may not like the result. If you’re dealing with a fellow
    developer with a popular app review blog and you’re having trouble getting him
    to commit to writing a review, tread carefully. Keep in mind that the reason could
    be that he didn’t like your app and is reluctant to write a negative review, because
    as a developer, he understands how much hard work went into its creation. If you
    continue to hound him, he may opt to publish the bad review just to get you off
    his back. And that certainly doesn’t help you at all, so approach every potential
    opportunity with patience.


    For those of you who are eager to speed up the app review process and move to
    the front of the line, a few sites out there offer expedited app reviews for a
    fee. For the record, I''m not a fan of buying reviews, especially since some of
    those sites won’t write a review unless you agree to buy into their sponsorship
    or premium review packages.


    Due to my own disapproval of that tactic, I won’t promote those site names here.
    They will be easy enough for you to spot when requesting app reviews. Granted,
    I understand that the ethical quandary is somewhat alleviated, since the fee promises
    only that a review will be written, with no guarantee that it will be positive.
    You could pay the fee and still receive a bad review.


    If you’re going to go down that path, why not pay for an unbiased review to be
    posted where it can reach the most eyeballs: in the App Store! Truevoo (`http://www.truevoo.com`)
    offers just such a pay-per-review service, and you won’t even need to waste any
    promo codes! It costs you only the price of your app plus a small service fee
    per review. When posted reviews show up in the App Store, the reviewers are then
    reimbursed the app cost, so they receive a free app for their efforts.


    Even if you encourage happy customers to post App Store reviews, that won’t help
    you the first day or two your app is available in the App Store. You’ll be heavily
    promoting your app’s release, driving as much traffic as possible to your product
    page in the App Store, and yet for the first couple days, it may have only a few
    customer reviews. Without a substantial number of reviews, consumers may be hesitant
    to buy your app. If your app has more than a dozen reviews in the App Store, that
    seems to change how it is perceived, causing people to be a little less reluctant
    to make a purchase.


    If you have several friends or peers who would be willing to post a review, it’s
    worth sacrificing ten promo codes to ensure that your app has a decent number
    of reviews in the App Store during those crucial first few days after its debut.
    You could also give away a few promo codes on AppGiveaway (`http://www.appgiveaway.com`)
    or via your Twitter and Facebook accounts in exchange for some App Store reviews.
    Just make sure the participants post honest, objective reviews. Having all five-star
    ratings on the very first day will look quite suspect!


    ## Using Promotions and Giveaways to Improve App Discovery


    Who doesn’t love freebies? Giving away something of value is a great way to draw
    attention to your iOS app, especially if it’s your app that’s free! Temporarily
    reducing your app’s price to free for a single day or a weekend can help boost
    it higher in the App Store’s Top Free Apps charts, especially if you notify all
    the iOS-related news sites of this limited-time offer. Those sites love to report
    on price reductions and freebies, so the stunt should gain your app quite a bit
    of exposure. And if you partner with a popular giveaway site, such as the following
    services, the extra publicity should really improve your app’s ranking and visibility
    in the App Store charts.


    * FreeAppADay (`http://www.freeappaday.com`) and its related FreeAppADay Store
    iPhone app (see [Figure 12-2](#9781430262381_Ch12.xhtml#Fig2))

    * Free App Calendar (`http://www.freeappcalendar.com`)

    * GiveawayEZ (`http://www.giveawayez.com`)

    * OpenFeint’s Free Game of the Day site (`http://freegameoftheday.com`) and its
    related Game Channel iPhone app (see [Figure 12-2](#9781430262381_Ch12.xhtml#Fig2))


    ![9781430262381_Fig12-02.jpg](images/9781430262381_Fig12-02.jpg)


    [Figure 12-2](#9781430262381_Ch12.xhtml#_Fig2). Beyond the audience that visits
    their respective web sites, the FreeAppADay Store app (left) and OpenFeint’s free
    Game Channel app (right) can promote your free app offer directly to mobile users


    If you’re scratching your head, wondering how you’re supposed to profit by giving
    away your app, then you’re not looking at the big picture. It’s true that you
    won’t be making any money from all those users who downloaded the app for free,
    and you won’t see a huge spike in paid app sales after the free offer ends. So
    why do it? This strategy is all about the up-sell.


    By removing the price barrier for a limited time, you may have thousands of new
    users take advantage of the free download.'
