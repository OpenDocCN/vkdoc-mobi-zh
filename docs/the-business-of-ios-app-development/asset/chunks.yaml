- fmt: '如果你是一名独立开发者，可能无法接触到所有搭载 iOS 系统的硬件型号，比如初代 iPhone、iPhone 3G 和 3GS、iPhone 4、iPad
    以及 iPod touch。但你最好能拥有不止一台测试设备，这是一项值得的投资。我通常使用 iPod touch、初代 iPhone、iPad 和 iPhone
    4 来测试应用。这样我就能在旧款硬件和 iOS 5 上，以及在最新处理器、Retina 显示屏和 iOS 7 上分别检查应用的兼容性。如果预算允许，尽量保留一台
    iPhone 4 作为测试设备。大多数情况下，如果应用能在 iPhone 4 上流畅运行，那么它在当前最新的 iPhone 和 iPad 上运行效果会更好。


    为了覆盖尽可能广泛的用户群体，你应该以最低配置的通用设备为目标。如果应用的网络功能在初代 iPhone 较慢的 EDGE 网络下都能良好运行，那么在 iPhone
    5S 上更快的 4G LTE 网络下，它的速度只会更快。对于内存密集型应用，建议你在 RAM 较小的旧款 iPhone 型号上进行测试。如果你计划让应用向后兼容旧版
    iOS，我建议使用安装了这些旧版本系统的测试设备，例如几款不同型号的 iPod touch。


    你有没有让别人试驾过你的应用？如果没有，那你必须这么做！招募 Beta 测试人员来评估你的应用，是发现难以定位的漏洞和其他关键问题的最有效方法之一。作为应用的创建者，你已经和它朝夕相处了数月，经历了艰苦的设计和开发过程。它的完成是你的骄傲和喜悦。你离它太近了，这意味着你可能会错过别人一眼就能看出的明显问题。潜意识里，你可能不想发现任何缺陷，因为那意味着要推迟发布。但在
    App Store 严酷的竞争环境中，无知可不是福。


    Beta 测试不仅仅是为了消灭漏洞。每个人接触一个应用时，都会带着独特的心态和不同的期望。你对自己的应用了如指掌，所以自然觉得它的设计很直观。然而，对于那些不熟悉它的人来说，弄清楚如何使用它可能会困难得多。


    此外，其他人使用你的应用的方式可能与你的预期大相径庭。了解这一点非常重要，它能帮助你填补可用性的漏洞，并发现你之前未曾考虑过的新目标市场。例如，一个普通的笔记应用，在发现
    Beta 测试人员表达出的特定需求后，可能会演变成一个定义更明确的日记撰写工具。


    如果你对设备端测试或 Beta 测试还不熟悉，请继续阅读，因为这两个主题都将在本章后面详细讨论。


    毫无疑问，市场上用于向 Beta 测试人员分发应用的最佳工具是 `Test Flight`（`www.testflightapp.com`）。这个强大的网页门户允许你随时向测试人员分发
    iOS Beta 版本。它还提供了非常详细的崩溃报告。


    ### 征求直接反馈


    在应用内部提供一个让客户能轻松向你发送直接反馈的机制，有助于减少许多负面的应用商店评论。还记得我们在第 5 章中是如何将应用内邮件集成到一个示例项目中的吗？尽管那是为了给用户提供“告诉朋友”功能，但同样的应用内邮件功能也可以用来征求客户的直接反馈。


    为用户提供一个专门用于从应用内给你发送邮件的渠道，能为你的客户带来极大的便利。不要指望用户会花时间去查找你网站上的支持页面，尤其是当他们正使用 iPhone、iPad
    或 iPod touch 时（远离他们的电脑）。对他们来说，表达意见最方便的方式就是直接在 App Store 上发布评论——除非你给他们提供一种更简单、更快捷的方法，就在你的应用内部！


    PumpOne 的 `FitnessBuilder` 提供了一个很好的应用内反馈表单示例。通过在应用主屏幕上设置一个“Ask”按钮来访问此表单，开发人员为客户提供了一种极其简便的方式，可以直接从应用内部提交反馈（参见[图
    9-1](#9781430262381_Ch09.xhtml#Fig1)）。


    ![9781430262381_Fig09-01.jpg](images/9781430262381_Fig09-01.jpg)


    [图 9-1](#9781430262381_Ch09.xhtml#_Fig1). PumpOne 的 `FitnessBuilder` 提供了一个便捷的应用内反馈表单，可通过应用主屏幕上的“Ask”按钮轻松访问


    那么，如果你有兴趣为自己的应用添加直接反馈功能，该从哪里开始呢？看看第 5 章的“告诉朋友”示例项目。将那个应用内邮件代码修改为应用内反馈表单应该很容易。如果你不想自己构建解决方案，也有一些第三方替代方案，比如
    `Crittercism`（`http://www.crittercism.com`）。


    如果你还提供了免费应用或付费应用的精简版，那么同样重要的是（甚至更为重要）也要为这些版本添加应用内反馈表单。由于免费和精简版应用没有使用门槛，它们会吸引更广泛的用户群体，其中多数只是出于好奇，想先“试驾”一下。与付费应用的客户不同，这些用户没有既得利益，因此往往会是更严厉的批评者。免费和精简版应用通常在
    App Store 上获得的评分低于其付费版本。考虑到这一点，你的目标是让用户直接在应用内向您提交反馈，而不是在 App Store 上公开发布他们的负面言论。


    通过提供应用内反馈表单，你是在告诉用户：他们的意见对你很重要。如果让你选择，是直接与应用开发者沟通，还是等待并希望开发者看到他们在 App Store 的评论，很可能他们会选择应用内反馈表单，尤其是当他们真的希望看到应用改进和发展时。这当然不会阻止那些喜欢在
    App Store 的“在线演讲台”上抱怨一切的小众用户，但这将有助于减少那些仅仅只是功能请求和支持问题的负面 App Store 评论。


    但是，应用内邮件表单不也会把正面反馈直接引导到你这里，而不是公开发布在 App Store 上（这样有助于促进销售）吗？当然，这种情况可能会出现一些，但你总是可以通过电子邮件回复这些客户，感谢他们，并礼貌地询问他们是否愿意将正面评论发布在
    App Store 上。如果他们喜爱你的应用，通常情况下，他们会对此请求感到荣幸并乐意帮忙。


    与客户建立直接联系对所有参与者来说总是一个双赢的局面。如果客户支持你作为一名独立开发者的个人成功，那么他们更有可能在与朋友的线上互动中（通过 Twitter、Facebook
    等）为你的应用进行宣传。


    ### 通过应用内帮助预防用户挫败感


    用户受挫的一个主要原因是无法弄清楚你的应用是如何工作的。在桌面电脑的世界里，人们已经习惯了需要“圣经”般厚重手册的庞大、复杂的软件应用。


    而在移动环境中，应用通常只用一只手（有时甚至只有一根拇指）来操作，用户期望应用拥有直观的界面，能够一目了然。iOS SDK 通过提供一套通用的原生 UI 控件来处理常见功能，在这方面有所帮助。如果你在一个应用中用过导航控制器，那么你就会知道如何在所有其他
    iPhone 应用中使用它。'
  raw: 'If you’re a solo, independent developer, you may not have access to all the
    iOS-powered hardware models, such as the original iPhone, iPhone 3G and 3GS, iPhone
    4, iPad, and iPod touch, but it’s a worthy investment to have more than one testing
    device at your disposal. I test apps on an iPod touch, an original iPhone, an
    iPad, and an iPhone 4\. This allows me to check app compatibility on older hardware
    and iOS 5, as well as on the latest processors, Retina display, and iOS 7\. If
    your budget will allow, try and keep an iPhone 4 as a test device. The majority
    of the time, if the app runs smoothly on the iPhone 4, it will run amazing on
    the current line of iPhones and iPads.


    To accommodate the broadest possible audience, you should consider targeting the
    lowest common denominator. If an app’s Internet-related functionality performs
    well on the original iPhone’s slower EDGE network, then it can only be that much
    faster on the newer 4G LTE on the iPhone 5S. For memory-intensive apps, it’s recommended
    that you test on an older iPhone model that’s limited to a smaller amount of available
    RAM. And if you plan on making your app backward-compatible with older iOS versions,
    I recommend using test devices with those versions installed, such as a few different
    iPod touch models.


    Have you let anyone else test-drive your app? If not, then it’s imperative that
    you do! Recruiting beta testers to evaluate your app is one of the most effective
    ways to unearth hard-to-find bugs and other critical issues. As the app’s creator,
    you’ve lived with this app through months of laborious design and development.
    Its completion is your pride and joy. You’re too close to it, which means that
    you might miss glaring problems that others will see. Subconsciously, you might
    not want to find any faults, since that will mean delaying the release. But when
    it comes to the harsh frenzy of the App Store, ignorance is not bliss.


    Beta testing is not only about squashing bugs. Everyone approaches an app with
    a unique mind-set and varying expectations. You know your own app inside and out,
    so naturally, its design seems intuitive to you. However, for others who are unfamiliar
    with it, figuring out how to use it may prove much more elusive.


    Also, the way someone else uses your app may be vastly different from how you
    intended it to be used. This is important knowledge that will help you fill usability
    holes and also reveal new target markets for your app that you had not previously
    considered. For example, a once generic note-taking app may evolve into a more
    clearly defined journal-writing tool after discovering the specific needs expressed
    by beta testers.


    If you’re new to on-device testing or beta testing, then keep reading, because
    both topics are covered in detail later in this chapter.


    Hands down, the best tool on the market for distributing your app to your beta
    testers is Test Flight (`www.testflightapp.com`). This awesome web portal allows
    you to distribute your iOS betas on the fly to your testers. It also provides
    great in-depth crash reports.


    Soliciting Direct Feedback


    Including an in-app mechanism for customers to easily send you feedback directly
    can help alleviate many of those negative app store postings. Remember how we
    integrated In-App Email into an example project in Chapter 5? Even though that
    was for providing users with a Tell A Friend feature, that same In-App Email functionality
    can be employed for soliciting direct feedback from customers.


    Giving users a dedicated channel for e-mailing you from within your app provides
    a huge level of convenience for your customers. Don’t assume that users will take
    the time to hunt down the support page on your web site, especially if they are
    using their iPhone, iPad, or iPod touch (away from their computer). The most convenient
    avenue to express their opinion is to simply post it as a review on the App Store—unless
    you give them an easier and quicker method directly within your app!


    PumpOne’s FitnessBuilder includes a nice example of an in-app feedback form. By
    making this form accessible from an Ask button on the app’s main screen, the developers
    have set up a remarkably easy way for customers to submit direct feedback from
    within the app itself (see [Figure 9-1](#9781430262381_Ch09.xhtml#Fig1)).


    ![9781430262381_Fig09-01.jpg](images/9781430262381_Fig09-01.jpg)


    [Figure 9-1](#9781430262381_Ch09.xhtml#_Fig1). PumpOne’s FitnessBuilder provides
    a convenient in-app feedback form, easily accessible from the Ask button on the
    app’s main screen


    So, if you’re interested in adding direct feedback functionality to your own app,
    where do you start? Check out Chapter 5’s Tell A Friend example project. It should
    be easy enough to modify that In-App Email code for use as an in-app feedback
    form. If you would rather not build your own solution, third-party alternatives
    are available, such as Crittercism (`http://www.crittercism.com`).


    If you also offer a free app or a lite version of your paid app, it’s just as
    important (if not more important) to add an in-app feedback form to that version
    as well. With no barrier to entry for free and lite apps, their availability invites
    a much broader audience of users, most simply curious and wanting to kick the
    tires. Without the vested interest in the app that paid customers have, those
    users tend to be harsher critics. Free and lite apps generally receive lower App
    Store ratings than their paid-version counterparts. With this in mind, your goal
    is to get users to submit their feedback directly to you within the app, instead
    of publicly posting their negative rants online in the App Store.


    By providing an in-app feedback form, you’re letting users know that their voice
    matters to you. If given the choice to either communicate directly with the app
    developer or just wait and hope the developer sees their App Store review, odds
    are they will choose the in-app feedback form, especially if they are seriously
    interested in seeing the app improve and evolve. This won’t stop that minority
    of loud users who simply like to complain about everything from their online soapbox
    in the App Store, but it will help reduce the number of negative App Store reviews
    that are nothing more than feature requests and support questions.


    But won’t an in-app e-mail form also funnel positive feedback directly to you,
    instead of having it posted publicly on the App Store, where it can help promote
    sales? Sure, you may find a little of that happening, but you can always reply
    to those customers via e-mail, thanking them and politely asking whether they
    would be willing to post their positive comments in the App Store. If they love
    your app, more often than not, they will be flattered by the request and help
    you out.


    Establishing a direct connection with your customers is always a win-win for everyone
    involved. If customers are rooting for your personal success as an independent
    developer, there’s a stronger likelihood that they will evangelize your app in
    their own interactions online with friends via Twitter, Facebook, and so on.


    Preventing User Frustration with In-App Help


    A major cause of user frustration is the inability to figure out how your app
    works. In a desktop computer world, people have grown accustomed to massive, complex
    software applications that require Bible-sized manuals.


    In a mobile environment, where apps are often operated with one free hand (and
    sometimes only a single thumb), users expect apps to have intuitive interfaces
    that can be quickly learned at a glance. The iOS SDK helps in that regard by providing
    a universal set of native UI controls for common functions. If you’ve used a navigation
    controller in one app, then you’ll know how to use it in all other iPhone apps.'
