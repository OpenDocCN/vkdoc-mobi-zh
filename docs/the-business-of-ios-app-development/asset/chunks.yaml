- fmt: '# 第三方支持服务


    如果你没有时间或技能来构建自己的定制支持服务，有一些优秀的现成第三方服务可用，价格非常实惠。以下是一些选择：


    - `Get Satisfaction`（`http://getsatisfaction.com`）

    - `Tender Support`（`http://tenderapp.com`）

    - `UserVoice`（`http://uservoice.com`）

    - `Zendesk`（`http://www.zendesk.com`）


    ## 关于支持的额外说明


    即使提供了详尽的支持网站，如果你发现太多顾客滥用App Store的客户评价区域来发布功能请求和错误报告，那么在应用描述文本中添加一些支持信息可能会有所帮助。任何能将用户引导至你的支持网站的做法，都可能有助于减少那些仅仅是功能愿望清单的无谓一星评价数量！但绝不要指责这样做的顾客。应以积极的方式措辞，说服顾客相信你的支持网站是获得优质帮助的最佳、最快途径。


    例如，你可以在应用描述文本底部插入这样的措辞：“如需快速支持帮助，请直接联系我们：`http://support.breadcrumbsapp.com`，或发送邮件至`support@breadcrumbsapp.com`。”如果你更倾向于通过Twitter与用户联系，还可以在该句子中添加你的Twitter
    URL。


    基本上，你提供的客户关怀选项越多，就越有可能减少App Store客户评价中与支持相关的帖子（这反过来可能有助于提高你应用的整体客户星级评分）。


    ## 应用URL


    我在[第10章](#9781430262381_Ch10.xhtml)中讨论了为iOS应用维护专用网站的重要性，因此，尽管应用URL字段是可选的，但你应在此处填写你的网站URL。不这样做只会损害你应用未来的市场竞争力，尤其是在应用URL链接在App
    Store中显示得如此突出的当下。


    ## 审阅备注


    大多数开发者无需填写这个可选字段，但如果你担心审阅者可能会误解你的应用或难以访问其中的某些独特功能，那么在此处添加一些额外说明可能有助于加快审阅流程。


    如果你的应用需要创建用户账户或登录到受密码保护的Web服务，则需提供苹果在审阅过程中可以使用的测试账户或登录凭据。这些登录功能肯定会被应用审阅团队测试，因此如果你忘记在审阅备注字段中提供这些信息，审阅者会向你请求这些登录数据，从而延迟审批流程。有些应用甚至仅仅因为审阅者无法成功登录测试账户或应用内的会员专属Web服务而被直接拒绝。因此，即使你在此字段中提供了所需信息，也要先确保这是一个有效可用的登录凭证。


    务必确保你在此处包含的文本清晰简洁。你最不希望看到的就是，因为添加的额外备注反而造成更多困惑，而不是提供帮助，从而导致应用被拒绝。


    ## 第4步：为你的应用指定分级


    滚动“版本信息”页面，第二个部分涉及你应用的预期年龄分级。你会看到一个调查式的列表，其中包含你必须回答的问题（见图11-13）。苹果要求所有iOS应用都指定一个与内容相关的年龄分级，以便iOS家长控制功能在孩子访问App
    Store时能够筛选出指定年龄段的适宜应用。


    ![9781430262381_Fig11-13.jpg](images/9781430262381_Fig11-13.jpg)


    [图11-13](#9781430262381_Ch11.xhtml#_Fig13)


    对所有内容问题均选择“无”，则会动态显示年龄评级为4+，将应用标记为适合儿童和成人使用。


    可能的年龄分级包括4+、9+、12+和17+。如图11-13所示，对所有内容问题均选择“无”，会动态显示年龄评级为4+。尝试对某些内容类型选择“偶尔/轻微”和“频繁/强烈”答案，你将看到显示的评级变为9+、12+甚至17+。


    诚实回答，选择适合你应用的分级，这最符合你的利益。即使你提交的12+评级仅包含少数“偶尔/轻微”答案，但如果苹果审阅团队认为你的应用需要更严格的17+评级，它完全可以并且会在批准在App
    Store销售之前重新分类你的评级。


    分级可能看起来有些主观，尤其是面对诸如“成人/暗示性主题”这样模糊、泛泛的内容类型时，不同的人可能有不同的理解。尽管如此，苹果对其分级系统非常重视，因此如果你不喜欢应用获得的批准评级，也没有多少回旋余地可以申诉。


    在设计iOS应用时，有三个主要的分级相关因素需要注意：


    - **Web浏览访问**：如果你的应用允许用户通过嵌入的`UIWebView`访问任何Web内容（其中可能包含对儿童不适宜的内容），你的应用很可能会被评定为17+。

    - **Web服务数据**：如果你的应用从Web服务检索数据（例如在线数字漫画或电子书目录），尤其是可能包含不适宜内容的公共领域项目，你的应用极有可能被归为17+评级。

    - **暴力与色情**：如果你的应用包含“长时间的血腥或施虐性现实暴力”或“露骨色情内容和裸体”——即苹果内容类型列表中的最后两项——你的应用将被视为不适宜上架App
    Store，不会获得批准。奇怪的是，似乎确实存在一个轻微的灰色地带，允许一定程度的色情主题内容，因为包含列表中第三项“色情内容或裸体”的应用通常会被给予17+评级。


    回答这十个分级问题时要格外小心，因为在应用提交审阅后，这些问题就无法修改了。还要记住，你为应用选择的评级也必须反映所有相关应用内购买项目的内容。


    紧接在分级区域下方的是对最终用户许可协议（EULA）的简要说明。默认情况下，如果你没有提供自己的EULA，那么苹果标准的App Store EULA将适用于你的应用。这似乎是大多数iOS开发者选择采用的EULA。然而，如果在Michael
    Schneider的[第3章](#9781430262381_Ch03.xhtml)中阅读关于最终用户协议的内容后，你确信应用中的特定功能需要自定义EULA，那么只要它符合苹果的最低条款，苹果确实允许你上传自己的EULA。由于苹果需要在提交时审阅自定义EULA，这一选项可能会拖慢审批流程。


    ## 第5步：上传你的应用图标和屏幕截图


    继续向下滚动冗长的“版本信息”页面，接下来你会遇到一个名为“图像”的区域。这是你上传1024×1024像素的应用大图标和屏幕截图的地方。要上传特定元素，请点击其下方的对应“选择文件”按钮，从硬盘中选择文件（见图11-14）。


    ![9781430262381_Fig11-14.jpg](images/9781430262381_Fig11-14.jpg)


    [图11-14](#9781430262381_Ch11.xhtml#_Fig14)'
  raw: 'If you don’t have the time or skill set to build your own custom support offerings,
    there are some amazing ready-made, third-party services available at very affordable
    monthly rates. Here are a few options:    *   Get Satisfaction (`http://getsatisfaction.com`)
    *   Tender Support (`http://tenderapp.com`) *   UserVoice (`http://uservoice.com`)
    *   Zendesk (`http://www.zendesk.com`)    AN ADDITIONAL NOTE ABOUT SUPPORT    Even
    after providing an extensive support site, if you find too many customers misusing
    the App Store’s Customer Reviews section as a place to post feature requests and
    bug reports, it may be helpful to add some support information to your app description
    text. Anything you can do to redirect users to your support site may help reduce
    the number of unnecessary one-star reviews that are nothing more than feature
    wish lists! But never reprimand customers who do that. Phrase it in a positive
    manner that persuades customers into believing your support site is the best and
    fastest method of receiving quality assistance.    For example, you could insert
    additional wording at the bottom of your app description text that reads: “For
    quick support assistance, please contact us directly at `http://support.breadcrumbsapp.com`
    or e-mail us at `support@breadcrumbsapp.com`.” And if you prefer connecting with
    users via Twitter, you can also add your Twitter URL to that sentence.    Basically,
    the more customer care options you provide, the greater chance you have of reducing
    the clutter of support-related posts in the App Store’s customer reviews (which
    in turn, may help boost your app’s overall customer star rating).    App URL    I
    discussed the importance of maintaining a dedicated web site for your iOS app
    in [Chapter 10](#9781430262381_Ch10.xhtml), so even though the App URL field is
    optional, you should include your site URL here. Not doing so will only hurt your
    app’s marketability down the road, especially now that the application URL link
    is displayed so prominently in the App Store.    Review Notes    Most developers
    won’t need to fill out this optional field, but if there are unique features in
    your app that you worry the reviewers may misinterpret or have trouble accessing,
    your including some additional notes here may help expedite the review process.    If
    your app requires creating a user account or logging in to a password-protected
    web service, you’ll want to provide a test account or login credentials that Apple
    can use during the review process. Those login features are definitely tested
    by the app review team, so if you forget to provide this information in the Review
    Notes field, reviewers will request this login data from you, delaying the approval
    process. Some apps have even been flat out rejected based on the inability of
    app reviewers to successfully log in to a test account or a members-only web service
    from within an app. So even if you do supply the required information in this
    field, be sure to first test that it’s a working valid login.    Be careful that
    whatever text you include here is clear and concise. The last thing you want is
    for your app to be rejected because the extra notes you added here proved to be
    more confusing than helpful.    Step 4: Assign a Rating to Your App    Scrolling
    down the Version Information page, the second section refers to the intended age
    rating for your app. Here, you’re presented with a survey-style list of questions
    that you must answer (see [Figure 11-13](#9781430262381_Ch11.xhtml#Fig13)). Apple
    requires all iOS apps to be assigned a content-related age rating so that the
    iOS parental controls can filter out specified age-appropriate applications when
    children access the App Store.    ![9781430262381_Fig11-13.jpg](images/9781430262381_Fig11-13.jpg)    [Figure
    11-13](#9781430262381_Ch11.xhtml#_Fig13).


    Answering None to all of the content questions dynamically displays an age rating
    of 4+, labeling the application as suitable for both kids and adults    The possible
    age ratings are 4+, 9+, 12+, and 17+. As illustrated in [Figure 11-13](#9781430262381_Ch11.xhtml#Fig13),
    answering None to all of the content questions will dynamically display an age
    rating of 4+. Experiment with various Infrequent/Mild and Frequent/Intense answers
    for some of the content types, and you’ll see the displayed rating change to 9+,
    12+, or even 17+.    It’s in your best interest to answer truthfully, selecting
    a rating that’s appropriate for your app. Even if your submitted 12+ rating consists
    of only a few Infrequent/Mild answers, if Apple’s review team thinks your app
    requires a more restrictive rating of 17+, it can and will reclassify your rating
    before approving it for sale in the App Store.    Ratings may seem subjective,
    especially with vague, generalized content types like Mature/Suggestive Themes,
    which can mean different things to different people. Nonetheless, Apple takes
    its ratings system very seriously, so there’s not much wiggle room to complain
    if you don’t like the approved rating your app has been given.    There are three
    major ratings-related factors to be aware of when designing your iOS app:    *   **Web
    browsing access**: If your app gives users the ability to access any web content
    (some of which may be deemed inappropriate for children) via an embedded `UIWebView`,
    your app will probably be given a 17+ rating. *   **Web service data**: If your
    app retrieves data from a web service, such as an online catalog of digital comics
    or e-books, especially public domain items that may contain inappropriate content,
    your app will most likely be saddled with a 17+ rating. *   **Violence and sex**:
    If your app features either Prolonged Graphic or Sadistic Realistic Violence or
    Graphic Sexual Content and Nudity—the bottom two criteria in Apple’s list of content
    types—your app will be deemed unsuitable for the App Store and will not be approved.
    Oddly enough, there does seem to be a slight gray area where a mild degree of
    sexually themed content is allowed, since apps containing the third item on the
    list, Sexual Content or Nudity, are typically granted a 17+ rating.    Take great
    care when answering the ten ratings questions, because they cannot be modified
    after the app has been submitted for review. Also keep in mind that the rating
    you choose for your app needs to also reflect the content of all related In-App
    Purchase items.    Directly below the Rating section is a small reference to the
    EULA. By default, if you do not provide your own EULA, then Apple’s standard App
    Store EULA will be applied to your application. This appears to be the EULA that
    most iOS developers choose to adopt. However, if reading about end-user agreements
    in Michael Schneider’s [Chapter 3](#9781430262381_Ch03.xhtml) leads you to believe
    that specific features in your app warrant a custom EULA, then Apple does allow
    you to upload your own, as long as it meets Apple’s minimum terms. Since Apple
    needs to review custom EULAs upon submission, that option could potentially slow
    down the approval process.    Step 5: Upload Your App Icon and Screenshots    Continuing
    to scroll down the long Version Information page, the next section you’ll encounter
    is called Images. This is where you upload your large 1024 × 1024–pixel app icon
    and your screenshots. To upload a particular element, click the related Choose
    File button below it to select the file from your hard drive (see [Figure 11-14](#9781430262381_Ch11.xhtml#Fig14)).    ![9781430262381_Fig11-14.jpg](images/9781430262381_Fig11-14.jpg)    [Figure
    11-14](#9781430262381_Ch11.xhtml#_Fig14).'
