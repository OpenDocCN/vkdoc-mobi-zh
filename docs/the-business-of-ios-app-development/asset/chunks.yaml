- fmt: '# Step 3: Configure Your Xcode Project for App Store Distribution


    Now with the proper provisioning profile in place, the next step is to open your
    project in Xcode and configure it for App Store distribution. In the main Xcode
    project window, select the project name at the top of the Groups & Files pane,
    and then click the Info button in the toolbar. Within the Configurations tab of
    the Info window, verify that you still have a Distribution configuration listed
    (which you should have already created during Chapter 9’s ad hoc distribution
    stage). If you don’t have one, then duplicate the existing Release configuration,
    naming the copy Distribution. Now close that Info window.


    Next, select the Target app within the Groups & Files pane, and click the toolbar’s
    Info button again. In the new Target Info window that appears, navigate to the
    Build tab, and double-check that the Configuration drop-down menu is set to Distribution.
    Scroll down to the Any iOS field below the Code Signing Identity row, and assign
    it to your new App Store distribution provisioning profile. Even though your ad
    hoc distribution provisioning profile may also be listed in the pop-up menu, it’s
    critical that your App Store distribution provisioning profile is selected (see
    [Figure 11-8](#9781430262381_Ch11.xhtml#Fig8)).


    ![9781430262381_Fig11-08.jpg](images/9781430262381_Fig11-08.jpg)


    [Figure 11-8](#9781430262381_Ch11.xhtml#_Fig8). Modify your Target’s Build tab,
    assigning your new App Store distribution provisioning profile to the Any iOS
    Code Signing Identity


    Switch to the Properties tab, and verify that the correct app ID bundle identifier
    is in the Identifier field. It should be the same as the bundle identifier listed
    in your Xcode project’s `Info.plist` file (such as the example ID `com.ebutterfly.breadcrumbs`).


    With all of that completed, the last step is to navigate to the main Xcode project
    window and ensure that the drop-down menu in the top-left corner has Device and
    Distribution selected for the Active SDK and Active Configuration settings, respectively.


    # Step 4: Compile Your iOS App


    Now you’re ready to compile your Xcode project! App Store distribution does not
    require your project to include an Entitlements file, as it does for ad hoc distribution,
    so save your project. Next, select Build ![image](images/arrow.jpg) Build and
    Archive. If you’ve configured everything correctly, your app should compile successfully.


    If you get build errors that are related to the project settings, retrace your
    steps to ensure that you’ve followed every single task outlined here, no matter
    how insignificant it may seem. Build errors can often be caused by the smallest
    mistakes, such as a misspelled bundle identifier or a mismarked check box. If
    problems persist, and you’ve ruled out code bugs and faulty configuration settings,
    clean out your project’s build directory, reopen the project in Xcode, and try
    another build attempt.


    **App Rejection Warning** Do not utilize undocumented private Apple APIs in your
    app. Apple has rejected dozens of apps for tapping into private iOS APIs that
    are not officially sanctioned for public use. The app review team is rumored to
    be using a static analyzer tool to ferret out calls to restricted, private APIs.
    So, even if your app includes the code but doesn’t execute it, your app may still
    get flagged for the code presence alone. To avoid App Store rejection, stick with
    the authorized APIs.


    Apple will accept only iOS applications that were compiled with an App Store distribution
    provisioning profile. Unfortunately, an App Store distribution provisioning profile
    and an application compiled with that profile will not work on your test devices,
    so there’s no way for you to test this version of the app before submitting it
    to Apple.


    With this in mind, it’s important to do as much testing as possible—keeping a
    close eye on build logs and error messages—before configuring and compiling for
    App Store distribution.


    After you’ve compiled it using the Build and Archive option, you’ll find the app
    in Xcode’s Organizer window. In the left pane of Xcode Organizer, select Archived
    Applications, and you should see your newly compiled app in the applications list
    that’s displayed. With the app selected, you’ll notice a Submit to iTunes Connect
    button at the bottom of the Xcode Organizer screen. But wait! Don’t click that
    button yet.


    Before submitting your app binary, you first need to create your app’s listing
    with required metadata in iTunes Connect, which I’ll show you how to do shortly.
    The very last step in the submission process will be uploading your app binary,
    so we’ll revisit Xcode Organizer again very soon.


    # Ensuring Apple Has Processed Your Contracts and Payment Settings


    Before submitting your app, make sure all of Apple’s required contracts, tax forms,
    and banking information have been properly submitted and processed. As I mentioned
    way back in [Chapter 1](#9781430262381_Ch01.xhtml), this process can often take
    a fair amount of time, so it’s best to get it taken care of while you’re in the
    initial stages of development. That way, when you’re ready to submit your application
    to the App Store, there’s no lingering paperwork holding you back.


    To check your current status, log in to iTunes Connect at `http://itunesconnect.apple.com`,
    and on the main page of iTunes Connect, visit the section called Contracts, Tax,
    and Banking to view the contracts you currently have in effect. As discussed in
    [Chapter 1](#9781430262381_Ch01.xhtml), you should have the Free Applications
    contract already activated by default, which allows you to submit free iOS apps
    to the App Store. To submit paid apps to the App Store, you should have already
    requested a Paid Applications contract and completed the related banking and tax
    forms. Without that information submitted, Apple is unable to pay you any revenue
    you earn from app sales. Instead, it will hold your accrued earnings in trust
    until the required forms have been processed.


    # Are We There Yet? Submitting Your App in iTunes Connect


    After months of development and testing, you probably can’t believe that you’ve
    finally arrived at this point: ready to submit your application to the App Store.
    It’s a moment filled with both excitement and trepidation, uncertain as to the
    fate of your product in the hands of Apple’s app review team. But not to fear,
    you’ve planned your application very carefully, methodically following all of
    Apple’s guidelines, so you should be in good shape. Now you’re ready to take the
    plunge.


    Plan on adding your new app in iTunes Connect on a day when you have plenty of
    time to dedicate to this process. There are several screens of online forms to
    complete, so you’ll want to patiently work through each section at a relaxed pace
    to avoid making any careless mistakes or typos.


    **Note** You can add a new application listing in iTunes Connect without submitting
    it to the App Store. In fact, you’ll need to do this in advance to test certain
    features, such as In-App Purchase. Your app will not be submitted to Apple’s app
    review team until you’ve completed the very last step of uploading your app binary.
    If you’ve already created a listing for your app in iTunes Connect (based on these
    instructions) for In-App Purchase testing in [Chapter 8](#9781430262381_Ch08.xhtml)
    and you’re ready for App Store submission, you can skip ahead to the section titled
    “Step 5: Upload Your App Icon and Screenshots.”


    ## Step 1: Create a New App Entry


    Ready? Great, let’s do this! Head over to the Manage Your Applications section
    of iTunes Connect. Click the blue Add New App button in the top-left corner of
    the Manage Your Applications page (see [Figure 11-9](#9781430262381_Ch11.xhtml#Fig9)).'
