- fmt: '# In-App Purchase Setup and Usage


    There’s no need to maintain your own customer account management and e-commerce
    system. The `Store Kit` framework makes the transaction process seamless for your
    customers, enabling them to use their existing `iTunes` login account for a quick
    and painless purchase experience.


    Every item that you want to sell via In-App Purchase needs to be configured in
    `iTunes Connect` as its own In-App Purchase product, similar to how standard iOS
    apps are submitted. Each In-App Purchase item is assigned to its related parent
    app so that the `iTunes App Store` knows the relationship between the products.
    Just like a regular app, each In-App Purchase item needs to be approved by Apple’s
    app review team before it can be made available within your app. This entire setup
    process is described in detail later in this chapter.


    ## Selling More Content


    So, what does a typical In-App Purchase look like to the consumer? One of my favorite
    apps, Comics by ComiXology, serves as a great example. Comics is a free digital
    comics reader with an innovative viewing engine for easily reading comics on an
    iPhone or iPad screen. The app includes access to dozens of free digital comics
    from popular publishers, such as DC, Marvel, and Image Comics.


    Most of the free comics are the first issues of popular series, providing a great
    entry point for new readers. Comics not only gives customers a lot of immediate
    value, but the free comics also get people hooked on various series. When they
    want more, In-App Purchase comes into play.


    Within Comics is an easy-to-use store catalog of available comics, ranging from
    free to $1.99 each. All of the pay comics are configured in `iTunes Connect` as
    individual In-App Purchase items. If you decide to purchase a specific comic book
    issue, the `App Store` displays a default dialog box asking you to confirm your
    purchase request for this item (see [Figure 8-4](#9781430262381_Ch08.xhtml#Fig4)).


    ![9781430262381_Fig08-04.jpg](images/9781430262381_Fig08-04.jpg)


    [Figure 8-4](#9781430262381_Ch08.xhtml#_Fig4). When purchasing a digital comic
    book within the Comics app (left), the `App Store` displays a default dialog box
    requesting confirmation of your In-App Purchase request for this item (right).


    If you tap the dialog box’s Buy button, you’re asked to enter your iTunes login,
    just as with any other purchase through the `iTunes Store`. Once the login is
    confirmed, the secure transaction is completed using your existing iTunes account’s
    billing information, and your purchased item immediately begins to download into
    the Comics app (see [Figure 8-5](#9781430262381_Ch08.xhtml#Fig5)). And that’s
    it! No tedious order forms to contend with. It’s a drop-dead simple purchase process,
    requiring only a few finger taps.


    ![9781430262381_Fig08-05.jpg](images/9781430262381_Fig08-05.jpg)


    [Figure 8-5](#9781430262381_Ch08.xhtml#_Fig5). After confirming your purchase
    and your iTunes login (left), the transaction is completed, and your purchased
    digital comic immediately begins to download into the Comics app (right).


    You probably noticed that the Comics catalog list looks similar to the `App Store`.
    But you can design your in-app storefront to emulate your own custom UI design.
    As you’ve seen in previous examples, such as LandFormer and We Rule Quests, the
    `Store Kit` framework gives you complete flexibility to customize how those items
    are displayed within your app.


    Most people assume that games and entertainment titles will be the dominant champions
    of In-App Purchase, since selling digital comics, e-books, new game levels, and
    other virtual-world components seems like such a natural fit for microtransactions.
    But the truth is that with a little creativity, In-App Purchase can be an effective
    revenue vehicle for almost any category genre—travel, lifestyle, productivity,
    and others. A case in point is *Men’s Health* magazine.


    The *Men’s Health* magazine’s fitness app, Men’s Health Workouts, includes an
    extensive collection of workouts and exercises for an initial price of $1.99.
    But it also provides additional workout packs that can be purchased in-app (see
    [Figure 8-6](#9781430262381_Ch08.xhtml#Fig6)). There’s a smart play here in that
    one free add-on workout is uploaded each month (accessible within the app), which
    not only encourages continued user engagement, but also helps promote the other
    add-ons available for sale. On top of that, the In-App Purchase items offered
    in Men’s Health Workouts are presented in the same design theme as the rest of
    the app’s custom interface, providing a seamless user experience.


    ![9781430262381_Fig08-06.jpg](images/9781430262381_Fig08-06.jpg)


    [Figure 8-6](#9781430262381_Ch08.xhtml#_Fig6). Not just for games! Apps like Men’s
    Health Workouts prove that In-App Purchase can be just as powerful in other category
    genres. And the `Store Kit` framework gives you complete flexibility to customize
    how those items are displayed.


    ## Offering Services and Subscriptions


    We’ve looked at several examples of downloadable content, but what about services
    and subscriptions? Simplenote is a great example of both, using an in-app subscription
    model for its annual Premium service. Beyond the basic note synchronization that’s
    included free in Simplenote, the Premium service offers additional synchronizing
    features and enhanced support, and hides the in-app ads (see [Figure 8-7](#9781430262381_Ch08.xhtml#Fig7)).


    ![9781430262381_Fig08-07.jpg](images/9781430262381_Fig08-07.jpg)


    [Figure 8-7](#9781430262381_Ch08.xhtml#_Fig7). The free note-syncing app, Simplenote
    (iPad version shown here), uses In-App Purchase to sell a subscription, encouraging
    users to upgrade to its annual Premium service.


    The one quibble I have with the otherwise excellent Simplenote is that the Upgrades
    screen (see [Figure 8-7](#9781430262381_Ch08.xhtml#Fig7)) does not include details
    on the specific benefits provided by the Premium service. For more information,
    you’re forced to tap the What’s in Premium? button, which jumps from the app to
    the Mobile Safari browser, loading a page on the Simplenote web site. Granted,
    Simplenote’s note-synchronizing service is also available as a web-based application,
    as well as through numerous third-party apps, so directing all inquiries to a
    central Premium web page enables the developers to manage only one source of information
    for all the related apps. But how many Simplenote users actually take the time
    to tap that button?


    Convenience is a big factor in impulse buys. Simplenote does well with its Premium
    service, but just think how many more subscription plans might be sold if the
    details of the Premium features were actually promoted right there on the Upgrades
    screen within the app.


    ## Presentation Is the Key to Success


    How do you get users to buy your In-App Purchase products? The same way you got
    them to buy your app in the first place: by offering an appealing package that
    they will want. Beyond creating great add-on content, you must communicate to
    your potential customers why they need to buy it.


    Remember the promotional full version screens from the free lite app examples
    in Chapter 6? Since In-App Purchase items are essentially their own products,
    you’ll want to devise a similar in-app sales pitch for them as well. Your visual
    presentation of these items is just as important as the presentation for promoting
    the parent app itself. Don’t rely on only a single sentence or caption with a
    buy button. Users want to know exactly what they will receive by buying that In-App
    Purchase item. But that doesn’t mean you should write long, verbose descriptions.
    Mobile users want quick answers, so brevity can be very effective, as long as
    the details provided are compelling.'
