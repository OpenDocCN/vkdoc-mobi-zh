- fmt: 'Don’t worry if your graphics experience is limited. You can design an amazing
    site with only a few key visuals. Just look at the web page for Shiny Development’s
    Balloons! app at `http://balloonsapp.com` (see [Figure 10-5](#9781430262381_Ch10.xhtml#Fig5)).
    Although the page design is fairly minimal with black text on a solid white background,
    the app’s primary art of floating balloons is very bold and eye-catching. It’s
    the only imagery on the page, yet the simplicity of it strongly reinforces the
    established brand identity and nonverbally communicates ease of use, both of which
    are vital to the success of a social media app.


    ![9781430262381_Fig10-05.jpg](images/9781430262381_Fig10-05.jpg)


    [Figure 10-5](#9781430262381_Ch10.xhtml#_Fig5). You don’t have to be a Photoshop
    guru to build an attractive web site. With only one central image in the background,
    the simplicity of Shiny Development’s web site for its Balloons! app is eye-catching
    and effective


    Even though the Balloons! app icon is not displayed next to the logo, it is integrated
    into the Get Balloons! buy button. If you click the button, that red balloon is
    the same one you’ll see in the icon listed in the App Store.


    Like the design of your app’s interface, the look and feel of the corresponding
    web site should be appealing. If you hired a professional designer to create your
    app’s icon and logo, you should consider contracting that same person to also
    generate visuals for your web site and all other promotional needs, so that your
    branding remains consistent across all of your marketing materials.


    ## The Quick Pitch: What Is It and Why Should I Care?


    Remember when I talked about crafting your elevator pitch earlier in this chapter?
    You’ll want to place this at the top of your web page, typically below your app
    name. This will quickly inform visitors what your app does and how it can benefit
    them. Your app may be packed with tons of great features, but don’t overwhelm
    the reader by listing them all at once. That will only make the page feel cluttered
    and top-heavy.


    In [Figure 10-5](#9781430262381_Ch10.xhtml#Fig5), only a short caption and a few
    sentences are displayed within the main Balloons! visual. Within seconds, you
    have a broad grasp of what this app does and the potential fun you could have
    using it. That’s the hook that draws you in, motivating you to keep reading. To
    learn more, simply scroll down the page for a comprehensive list of features.


    ## App Store Identity Badge


    The most common element you’ll see on most iPhone and iPad app-related web sites
    is the official App Store identity badge that’s labeled “Available on the App
    Store.” To obtain this graphic, you’ll need to visit Apple’s App Store Resource
    Center at `http://developer.apple.com/appstore/resources/marketing/`. You’ll see
    the identity badge displayed within the App Store Badging and Artwork section.


    You’ll need to download and sign the App Marketing Artwork License Agreement form
    and mail it back to Apple. Although the identity badge and iOS device graphics
    download links are already provided there, before using any of those images, be
    sure to download and read the *App Marketing and Identity Guidelines for Developers*
    PDF. This document explains the rules for how to properly use the App Store identity
    badge and the authorized iPhone and iPad images. Since Apple reserves the right
    to revoke permission to use the supplied graphics if you fail to follow the guidelines,
    it’s in your best interest to read that document and make sure you understand
    how to remain compliant.


    The graphics downloads include both web and print resolutions of the badge, as
    well as several different versions of iPhone, iPad, and iPod touch images in layered
    Photoshop PSD files. This gives you the flexibility to use these graphics within
    all your marketing materials.


    ## Buy Button


    Although the App Store identity badge is typically linked from your web site to
    your app’s product page in the App Store, don’t rely on it as your sole buy button.
    Some people may see it only as an official badge, not understanding that it actually
    links to the App Store. Since the primary goal of your web site is to sell more
    units of your app, you should also include a dedicated buy button to help drive
    traffic to the App Store.


    In our fictional Breadcrumbs web page example (see [Figure 10-4](#9781430262381_Ch10.xhtml#Fig4)),
    the large Buy Now button uses the same high-contrast red color as the icon’s red
    car, so that it really “pops” as a prominent, eye-catching element.


    Any time you’re linking to the App Store, don’t forget to use an iTunes affiliate
    link so that you can earn extra revenue from all the sales you’re sending Apple’s
    way. (You did join the free iTunes Affiliate Program after reading [Chapter 6](#9781430262381_Ch06.xhtml),
    right?)


    ## Pricing


    Including the app’s price on your web site seems to be a highly debated topic
    among iOS developers. Some believe that stating the price may deter people from
    clicking through to the App Store, while others believe the price can actually
    help drive sales. Although there are valid points to both arguments, I think stating
    the price in all your marketing materials, including your site, will help sales
    more than it could possibly hurt.


    If you’re constantly experimenting with different price points to improve your
    app’s position in the App Store’s top sales charts, then I can understand your
    reluctance to display the fluctuating price on your web site. But this is a venture
    you’re attempting to grow into a successful business, so it’s worth every minute
    of extra time it takes to frequently update pricing on your web site. And if your
    app is on sale, surely you want the world to know about it.


    If you’re selling your app in more than one regional App Store, try to be conscientious
    of the currency in those countries. Many app-related web sites display the price
    in both US dollars and euros to accommodate the majority of their target audience.
    FutureTap took this idea one step further. Since its Where To? app is available
    in several languages, it has localized its web site, with pricing and text descriptions
    translated for every major region the app supports. If you visit `http://www.futuretap.com/home/whereto-en/`,
    you’ll see tabs along the left side of the screen, each one representing a different
    country flag. Click a flag icon to display the translated product page and pricing
    for that country. In [Figure 10-6](#9781430262381_Ch10.xhtml#Fig6), the English
    product page displays the price in US dollars, and the French product page shows
    the equivalent price in euros.


    ![9781430262381_Fig10-06.jpg](images/9781430262381_Fig10-06.jpg)


    [Figure 10-6](#9781430262381_Ch10.xhtml#_Fig6). FutureTap’s web site for its Where
    To? app displays the price in the appropriate currency for each localized product
    page, such as US dollars for the English description and euros for the French
    description


    For best results, display your app’s price either within the buy button (as shown
    in the Breadcrumbs example in [Figure 10-4](#9781430262381_Ch10.xhtml#Fig4)) or
    near the iPhone or iPad image on your web page (like FutureTap does in [Figure
    10-6](#9781430262381_Ch10.xhtml#Fig6)). You cannot include the price on or within
    the App Store identity badge, because Apple’s guidelines specifically prohibit
    modifying that logo.


    ## Screenshots and Video


    Besides designing the web page to emulate your app’s brand identity, the other
    crucial visuals are screenshots and video of your app in action. To make a purchase
    decision, people need to see what your application looks like and how it works.
    Outside a free trial version of the software, the best way to do that is through
    screenshots and video simulations.'
