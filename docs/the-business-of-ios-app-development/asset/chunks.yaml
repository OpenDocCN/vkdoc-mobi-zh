  trans: '

    `Ramp Champ by The Iconfactory and DS Media Labs` 以一种非常直接的方式出色地完成了这项任务，占用的屏幕空间极少。`Ramp
    Champ` 是一款有趣的投球得分风格游戏，内置了多个主题斜坡。附加的斜坡包可在应用的“附加内容”部分购买。每个附加包都以非常紧凑的方式列出，使用户能够快速滚动浏览可用项目列表。简洁的要点说明准确地描述了每个包中买家能得到什么，并附有来自包含斜坡的诱人视觉图片（见图
    8-8）。


    ![9781430262381_Fig08-08.jpg](img/9781430262381_Fig08-08.jpg)


    图 8-8。当有新的附加斜坡包可用时，`Ramp Champ` 会通知用户（左图）。简洁的要点说明和截图有效地描述了每个附加斜坡包中买家能得到的内容（右图）


    在撰写应用内购买项目描述时，你需要非常清楚地说明用户将收到什么。模糊的描述常常会导致用户感到沮丧。他们可能会为你的应用发布负面评论，抱怨购买的附加项目并非他们所期望的。沟通对于防止混淆至关重要。


    顾客喜欢在点击购买按钮之前就清楚知道商品的价格，因此你应尽可能在应用内商店中显示定价。你可以在应用内动态列出可用应用内购买项目的价格，这在跨多个区域本地化你的应用时尤其有用。事实上，由于
    App Store 会针对不同国家货币对价格进行本地化处理，苹果强烈反对使用静态价格。


    如果你频繁为游戏发布新的应用内购买项目（例如额外的关卡），不要指望你的顾客会定期检查游戏的虚拟商店。当新的附加内容可供购买时，应通过显示 `UIAlertView`
    或自定义通知（例如 `Ramp Champ` 在 图 8-8 中显示的那样）来让用户知晓。


    ## 找到最佳平衡点


    尽管你的应用核心功能是吸引新顾客的主要亮点，但只有当你以对消费者合理且有吸引力的价格提供诱人的附加内容时，你的应用内购买策略才会成功。即使 App Store
    的购物者已经习惯以低至 99 美分（甚至免费）的价格获得功能齐全的游戏和应用，只要内在价值对顾客来说是显而易见的，你的应用内购买项目定价高于相关主应用也完全没问题。


    ## 包含正确的元素组合


    对于付费应用，了解哪些功能是顾客认为的主要吸引力至关重要。这些功能应包含在应用的价格中。那些增强核心产品的附加功能则更适合作为潜在的应用内购买项目。你不应该对用户认为应包含在原始应用价格中的功能（即他们以为开箱即用就能获得的核心功能）收取应用内费用。


    `Networks in Motion` 在 2009 年首次发布其 GPS 导航应用 `Gokivo` 时就遇到了这个问题。该应用仅售 99 美分，包含了许多功能，例如
    Yahoo! 本地搜索、地图、交通信息和收藏夹。但若要解锁逐向导航这一完整的 GPS 导航服务，则需通过应用内购买支付每月 9.99 美元的订阅费。消费者认为逐向
    GPS 功能是应包含在应用中的核心功能。尽管其他功能也不错，但逐向导航服务才是他们最初购买该应用的主要原因。当发现需要额外每月支付 9.99 美元才能获得他们认为已经购买的功能时（尽管该应用仅售
    99 美分），许多用户感觉受到了欺骗。


    `Networks in Motion` 竭尽全力在 App Store 描述中明确说明了其定价结构，但部分顾客似乎并未接收到这个信息。许多人在购买应用前并未花时间仔细阅读描述。


    该公司对该问题的最终解决方案是将应用价格提高到 9.99 美元，并附带一个 30 天的逐向导航服务订阅。这样，顾客在购买应用后就能立即使用他们想要的核心功能。30
    天后，他们可以通过应用内购买按月续订。


    尽管在这两种情况下涉及的是相同金额，但用户的感知却大相径庭。这归结于购买的原则以及满足用户期望。


    进入 2011 年，`Networks in Motion` 进一步改进了其商业模式。为了在饱和的导航市场中保持竞争力，`Gokivo GPS Navigator`
    被作为一款免费的 iPhone 应用提供，并且仍然包含 30 天的逐向导航服务订阅。作为免费下载，这能让更多用户接触到该应用，并让用户有机会试用并依赖该服务。续订选项是每月仅需
    4.99 美元或每年 39.99 美元的应用内购买。


    ## 允许用户随心所欲地花钱


    `Snappy Touch` 的 `Noel Llopis` 对应用内购买并不陌生。他广受欢迎的通用应用 `Flower Garden` 允许用户培育数字鲜花并向朋友发送虚拟花束。这款应用非常适合提供消耗性附加组件，例如额外的肥料和种子包（见图
    8-9）。得益于付费和免费版本中都包含的应用内花店，`Flower Garden` 的大部分收入来自应用内购买也就不足为奇了。事实上，付费应用销售额仅占 `Flower
    Garden` 收入的 17%；其余收入均由应用内购买推动。


    ![9781430262381_Fig08-09.jpg](img/9781430262381_Fig08-09.jpg)


    图 8-9。`Snappy Touch` 的 `Flower Garden` 在其应用内花店中提供了多种肥料捆绑包，让用户可以选择他们愿意花费的金额


    看到像 `FarmVille` 和 `We Rule Quests` 这样的游戏通过销售分级捆绑的消耗品获得成功后，`Noel` 开始思考，他只在 `Flower
    Garden` 中提供一种 99 美分的肥料选项，是否低估了玩家愿意花费的金额。他惊讶地发现，App Store 上许多热门游戏销量最高的应用内购买项目从来都不是
    99 美分的。人们在花费 4.99 美元甚至更多来购买武器、弹药、Mojo 瓶、魔法药水、农场金币以及其他虚拟货币。一些排名靠前的应用内购买项目定价高达 29.99
    美元、49.99 美元，甚至 99.99 美元。

    '
- fmt: '“I decided to run a little experiment by adding two more fertilizer options
    to Flower Garden: 80 doses of fertilizer for $2.99 and 200 doses of fertilizer
    for $5.99,” said Noel. “Each bundle gives you a slightly better deal on fertilizer.
    That was still nothing compared to the price tags I was seeing in those other
    games, but I didn’t want to alienate users by slapping on some ridiculously high
    bundle prices.”


    The result? Based on the number of sales, the most popular In-App Purchase item
    was still the 99-cent fertilizer option, but a lot of customers did take advantage
    of the other two fertilizer bundles as well.


    Even if you don’t sell as many of the higher-priced items, they can still represent
    a large percentage of your overall revenue. Noel’s bundle experiment was a success.
    In-App Purchases of fertilizer alone now account for a staggering 45 percent of
    Flower Garden’s total revenue.


    After adding multiple fertilizer bundles to the growing collection of seed pack
    offerings, Noel discovered that the top Flower Garden users were spending more
    than $100 in the game.


    If the In-App Purchase items provide ample value for the money and a user continues
    to enjoy the game, there’s no limit to the amount of money that customer may spend.


    Noel points to two very good reasons why bundles are great for consumable In-App
    Purchases: choice and commitment. He explains, “Having different levels of bundles
    gives players more choice on how they want to purchase something. And whenever
    a user buys a larger bundle, they became more committed to your game. They will
    continue to keep playing to get their money’s worth from that purchase. Even if
    they had the intention of coming back to your game without the purchase, having
    spent that money is a nice reminder to do so. And having people come back to your
    game is what this is all about. They will explore more of the game, get more hooked,
    make more In-App Purchases, and show it to more of their friends.”


    ## Delivering and Managing In-App Purchases


    In-app purchased content can be built into your application and then unlocked
    after purchase, or it can be downloaded from a remote server. Which method you
    choose will depend on what kind of content you’re delivering and the extensibility
    your app requires.


    ### Unlocking Built-in Content


    Unlocking built-in content is by far the easiest route, requiring far fewer steps
    that can all be completed from within your app. There’s no need to maintain a
    server, and you don’t need to worry about security issues when communicating between
    your app and server. Just a few interactions with the App Store, and then purchased
    content is unlocked from within your app (see [Figure 8-10](#9781430262381_Ch08.xhtml#Fig10)).


    ![9781430262381_Fig08-10.jpg](images/9781430262381_Fig08-10.jpg)


    [Figure 8-10](#9781430262381_Ch08.xhtml#_Fig10). The built-in In-App Purchase
    delivery model


    If you’re new to iOS development, the process illustrated in [Figure 8-10](#9781430262381_Ch08.xhtml#Fig10)
    may appear quite daunting, but it’s actually not that complicated. True, there
    are several steps involved in configuring your app to use In-App Purchase, but
    not to worry. Later in this chapter, I’ll walk you through the entire setup process
    and the creation of a basic Xcode project, so that you can see exactly how all
    of these pieces fit together.


    Using this built-in model requires all your related In-App Purchase content to
    already be embedded in the app, hidden away from users. When a customer purchases
    a particular item, your app simply unlocks access to it. This works great for
    providing integrated content such as new levels in a game or additional features
    in a productivity app, or for activating subscription-based functionality.


    Store Kit does not support any way to “patch” your app binary with a downloaded
    update from a remote server. If your app requires the purchased content to be
    integrated within the app bundle, you should include it in your application before
    submitting it to the App Store. Then after a customer purchase, your app can simply
    unlock this content.


    The easiest way for your app to record and remember unlocked content is to store
    the information in your app’s preferences, which are backed up when users sync
    their devices with their computer via iTunes. Having the app’s preferences backed
    up will help prevent purchases from being lost, even if the app is deleted on
    a user’s device. Your app needs to remember which items have already been purchased,
    so that the next time the user runs your app, the purchased content is still readily
    accessible.


    The one major drawback to using this built-in unlocking model is that if you decide
    to make additional In-App Purchase items available in the future, you’ll need
    to submit a new, updated application binary that includes the new content to the
    App Store.


    ### Downloading Content from Your Server


    If you’re constantly adding new In-App Purchase items for your application, using
    the server download approach is the recommended route. This requires quite a few
    more steps and saddles you with a lot of server management responsibilities, but
    it provides the most flexibility and future growth possibilities for your app
    (see [Figure 8-11](#9781430262381_Ch08.xhtml#Fig11)).


    ![9781430262381_Fig08-11.jpg](images/9781430262381_Fig08-11.jpg)


    [Figure 8-11](#9781430262381_Ch08.xhtml#_Fig11). The server-based In-App Purchase
    delivery model


    The Comics app by ComiXology (showcased earlier in this chapter) is a perfect
    example of this model. The app fetches the latest list of product IDs for available
    digital comics from the server. When a user purchases a specific digital comic
    book, the app downloads the file from the server. The app can open and view any
    selected digital comic file from the user’s downloaded collection of purchased
    issues.


    This approach enables new digital comics to be made available every week as In-App
    Purchase items, without requiring any updates to the actual Comics application.
    New In-App Purchase items are submitted for review through iTunes Connect. When
    they are approved, ComiXology simply adds their product IDs to the database on
    its server. Then the next time the Comics app checks for new items, it retrieves
    the latest list of new digital comics from the server.


    You cannot patch your app binary with a downloaded app update from a remote server.
    If your app requires the purchased content to be integrated within the app bundle,
    then delivering purchased content from your server is not the appropriate path.
    You’ll need to use the built-in model of embedding the content in your application
    before submitting it to the App Store. Then after a customer purchase, your app
    can simply unlock this content.


    And what if you plan on delivering the same content to more than just iOS users?
    The server-based model is recommended if you allow customers to access their purchased
    content on multiple platforms, such as via the iPhone, an Android phone, a web
    browser, and so on. This way, all of the content and customer records can be easily
    managed in one central location (such as a database on your server), with all
    supported devices connecting to it.


    Another benefit of downloading content from a server is that it gives you the
    flexibility to also offer free items along with your In-App Purchase products.
    If a customer selects a free item, your app can simply bypass the In-App Purchase
    process and download the item directly from your server. If your users know that
    free content is often made available in your app’s virtual store, it will motivate
    them to browse your add-on offerings more frequently, and may increase the sales
    of In-App Purchase items.'
  raw: '“I decided to run a little experiment by adding two more fertilizer options
    to Flower Garden: 80 doses of fertilizer for $2.99 and 200 doses of fertilizer
    for $5.99,” said Noel. “Each bundle gives you a slightly better deal on fertilizer.
    That was still nothing compared to the price tags I was seeing in those other
    games, but I didn’t want to alienate users by slapping on some ridiculously high
    bundle prices.”


    The result? Based on the number of sales, the most popular In-App Purchase item
    was still the 99-cent fertilizer option, but a lot of customers did take advantage
    of the other two fertilizer bundles as well.


    Even if you don’t sell as many of the higher-priced items, they can still represent
    a large percentage of your overall revenue. Noel’s bundle experiment was a success.
    In-App Purchases of fertilizer alone now account for a staggering 45 percent of
    Flower Garden’s total revenue.


    After adding multiple fertilizer bundles to the growing collection of seed pack
    offerings, Noel discovered that the top Flower Garden users were spending more
    than $100 in the game.


    If the In-App Purchase items provide ample value for the money and a user continues
    to enjoy the game, there’s no limit to the amount of money that customer may spend.


    Noel points to two very good reasons why bundles are great for consumable In-App
    Purchases: choice and commitment. He explains, “Having different levels of bundles
    gives players more choice on how they want to purchase something. And whenever
    a user buys a larger bundle, they became more committed to your game. They will
    continue to keep playing to get their money’s worth from that purchase. Even if
    they had the intention of coming back to your game without the purchase, having
    spent that money is a nice reminder to do so. And having people come back to your
    game is what this is all about. They will explore more of the game, get more hooked,
    make more In-App Purchases, and show it to more of their friends.”


