- fmt: '# 探索使用应用内购买的免费增值模式


    曾经，传统应用销售和应用内广告是iOS开发者主导的商业模式，而应用内购买正迅速成为App Store中收入最高的收入流之一，尤其是对于免费应用和游戏而言。[第8章](#9781430262381_Ch08.xhtml)将向您展示原因，并解释如何利用应用内购买的力量。在深入本章之前，快速浏览一下App
    Store中收入最高的应用，它们几乎*全部*都使用了应用内购买。兴奋了吗？


    ## 第8章 探索使用应用内购买的免费增值模式


    应用内购买是iPhone SDK 3.0中引入的最令人兴奋且备受期待的功能之一。在免费和付费iOS应用中集成电子商务的选项为开发者开辟了新的领域，创造了超越传统应用销售的额外收入机会。应用内购买使您能够销售订阅、服务、虚拟商品和附加内容，例如高级功能或额外的游戏关卡——所有这些都在您的应用内完成。


    由于平均应用价格如此之低，并且附带免费更新，因此您必须拥抱新的商业模式，以便更好地将持续开发成本货币化。是时候发挥创造力了！在本章中，我们将探讨如何利用应用内购买的力量来帮助您的业务长期持续发展。


    ### 忠诚度有回报：现有用户是最好的客户


    在桌面软件的世界中，对使用您的应用感到满意的客户更有可能购买后续升级，尤其是当他们频繁使用您的产品时。他们保持最新版本的动力通常来自对用户体验的满意度或对您软件提供的独特功能的依赖（如果幸运的话，两者兼有）。


    这就是为什么Mac和Windows软件开发者花费大量时间加强与客户关系的原因。当然，寻找新客户至关重要，但向现有客户销售升级产品才是支持特定应用持续开发的关键。开发者能够以低廉的入门价格（甚至免费）提供产品来吸引新客户，因为他们知道将来能够向这些用户销售额外的升级。除此之外，已经对产品质量认可的忠实客户通常比不熟悉您产品的新用户更倾向于购买您的其他应用。


    向上销售新产品和升级是桌面软件行业的命脉。开发者们已经开始在较小规模上将这种模式移植到移动平台。微交易是移动经济的关键。但App Store拥有自己独特的购买文化，并伴有严格的应用指南，这两者都给iOS开发者带来了新的挑战，他们必须克服这些挑战才能维持长期业务。


    ### 支持长尾：将持续开发货币化


    App Store对“长尾”概念并不陌生，这一概念由著名作家克里斯·安德森提出。新产品会经历一个初始的销售高峰，然后，在达到平台期或饱和点后，其销售额会逐渐下降。这种最终的销售下滑趋势，即长尾（在图表上看起来如此），正是应用开发者开始争先恐后地想办法增加销售额或寻找替代方法来将应用开发货币化的地方。


    由于App Store最初设立的方式，一旦用户购买了应用，任何更新都必须是免费的。与传统的桌面软件不同，无法向现有iOS应用客户收取升级版本的费用。这对用户来说非常划算，尤其是当应用仅售99美分时。但这对于开发者来说在经济上很困难，因为他们被期望频繁更新应用，却无法为这些开发工作提供资金。


    一些游戏开发者通过将新版本作为完全独立的应用发布来绕过这个限制。Firemint在其成功的《真实赛车》游戏之后，投入大量时间和金钱开发了第二代。Firemint没有将其作为免费更新发布，而是明智地决定将《真实赛车2》作为独立的独立应用推出，从而使公司能够为这个有价值的续作收取费用。


    对于游戏来说，独立应用的策略更容易被消费者接受，因为这已经是Xbox和PlayStation等其他游戏平台多年来的标准做法。对于其他类型的应用，例如生产力应用，现有客户习惯于在Mac和Windows软件上获得免费更新或折扣升级价格，因此他们通常期望移动应用也能提供类似的路径。由于App
    Store没有付费升级选项，iOS开发者只能通过两种购买机制来支付新功能或附加内容的费用：传统应用销售和应用内购买。


    以Bolt Creative广受欢迎的《口袋上帝》游戏为例，其早期成功的一个重要因素是公司几乎每周都会向客户提供新玩法的免费更新。每一个新剧集都包含大量新鲜内容，这不仅有助于吸引新客户，还能通过每次更新的冒险保持用户的参与度。仅售99美分（包含所有已发布的剧集），它仍然是App
    Store中最超值的应用之一。


    但是，包含大量新内容和数小时游戏时长的频繁更新可能会变得成本高昂。由于有如此多新游戏涌入App Store，除非您的游戏像《愤怒的小鸟》或《口袋上帝》一样是常青畅销作品，否则很难通过每次新更新带来足够的销售高峰，从而在财务上无限制地支持相同水平的加速开发。


    尽管《口袋上帝》继续销售得很好，但为了更好地支持产品的持续开发成本，Bolt Creative开始提供皮肤包和其他附加项目的应用内购买。鉴于《口袋上帝》的客户已经习惯了免费获得如此多的新内容，Bolt
    Creative的Dave Castlenuovo承认，引入应用内购买项目的主要挑战在于正确传达：增加微交易并非贪婪之举，而仅仅是帮助补贴持续免费更新新剧集的手段。


    ### 改变用户认知的挑战


    由于App Store的基础设施培育了一种购物文化，即iOS用户期望为他们购买的应用获得终身的免费更新，因此转变他们的思维模式以接受应用内微交易所花费的时间比大多数开发者预期的要长一些。Streaming
    Colour Studios在其第一款免费增值游戏`LandFormer`发布时迅速发现了这一点。


    `LandFormer`于2010年6月发布，获得了媒体的一致好评，被誉为一款创新且令人上瘾的益智游戏。我本人并非重度游戏玩家，但它无疑是我最喜欢的iOS应用之一。它是一个执行良好的免费增值策略的绝佳范例。


    Streaming Colour Studios的创始人Owen Goss评论道：“我的其他游戏（`Dapple`和`Monkeys in Space`）都是付费游戏，而`Dapple`有一个单独的精简版，供人们‘先试后买’。我不喜欢精简版模式的一点是，如果用户想购买游戏，他们需要下载两个单独的应用。对我来说，这总感觉很笨拙。”


    最终，Owen决定将`LandFormer`作为一款免费应用发布，包含12个关卡。另外70多个关卡可通过应用内购买获得（参见[图8-1](#9781430262381_Ch08.xhtml#Fig1)）。为了帮助围绕游戏建立社区，`LandFormer`还允许用户创建和分享自己的关卡。


    ![9781430262381_Fig08-01.jpg](images/9781430262381_Fig08-01.jpg)'
  raw: 'Where once traditional app sales and in-app advertising were the dominant
    business models for iOS developers, In-App Purchase is fast becoming one of the
    top-grossing revenue streams in the App Store, especially for free apps and games.
    [Chapter 8](#9781430262381_Ch08.xhtml) shows you why and explains how to tap into
    the power of In-App Purchase. Before we dive into this chapter, take a quick look
    at the App Store’s top-grossing apps, chances are they almost *all* use in-app-purchases.
    Excited yet?


    Chapter    8


    Exploring the Freemium Model with In-App Purchase


    In-App Purchase was one of the more exciting and highly anticipated features introduced
    in iPhone SDK 3.0\. The option to integrate e-commerce within both free and paid
    iOS apps opened a new frontier for developers to create additional revenue opportunities
    beyond traditional app sales. In-App Purchase enables you to sell subscriptions,
    services, virtual goods, and add-on content, such as premium features or additional
    game levels—all within your app.


    With average app prices being so low and coming with free updates, it’s important
    for you to embrace new business models to better monetize continued development
    costs. It’s time to get creative! In this chapter, we’ll explore how to take advantage
    of the power of In-App Purchase to help sustain your business for the long run.


    Loyalty Pays: Existing Users Make the Best Customers


    In the world of desktop software, customers who are happy using your application
    are more likely to purchase subsequent upgrades, especially if they use your product
    frequently. Their motivation to stay up-to-date with the latest version is usually
    driven by either satisfaction with the user experience or dependence on the unique
    features your software provides (or both, if you’re lucky).


    This is why Mac and Windows software developers spend so much time strengthening
    the relationship with their customers. Sure, finding new customers is crucial,
    but selling upgrades to existing customers is what supports continued development
    on a particular application. Developers can afford to offer products at low introductory
    rates (or even free) to entice new customers, knowing they will be able to sell
    additional upgrades to those users in the future. And beyond that, loyal customers
    who are already sold on the product quality are typically more inclined to buy
    other applications from you than new users who are unfamiliar with your offerings.


    Up-selling new products and upgrades is the lifeblood of the desktop software
    industry. Developers are already translating this model to mobile platforms on
    a smaller scale. Microtransactions are the key to the mobile economy. But the
    App Store has its own unique buying culture combined with strict app guidelines,
    both of which introduce a new set of challenges that iOS developers must overcome
    to sustain a long-term business.


    Supporting the Long Tail: Monetizing Continued Development


    The App Store is no stranger to “the long tail,” a concept described by acclaimed
    author Chris Anderson. New products experience an initial sales spike, and then,
    after they’ve plateaued or reached saturation, their sales gradually drop off.
    This eventual downward slide of sales, or the long tail (as it looks on a graph),
    is where app developers start to scramble to figure out ways to increase sales
    or find alternative methods to monetize app development.


    Because of how the App Store was initially set up, once a user purchased an app,
    any updates were required to be free. Unlike traditional desktop software, there
    was no way to charge existing iOS app customers for an upgraded version. This
    was a great value for users, especially if the app cost only 99 cents. But it
    was financially difficult for developers, who were expected to frequently update
    their apps without a way to fund those development efforts.


    Some game developers worked around this limitation by releasing new versions as
    completely separate apps. As a follow-up to its successful Real Racing game, Firemint
    spent a lot of time and money developing version 2\. Rather than releasing it
    as a free update, Firemint made the wise decision to launch Real Racing 2 as a
    separate stand-alone app, enabling the company to charge a fee for this worthy
    sequel.


    For games, the separate app strategy is much easier for consumers to accept, since
    that has been the standard practice for years on other gaming platforms, such
    as Xbox and PlayStation. For other types of applications, such as productivity
    apps, existing customers are used to either receiving free updates or discounted
    upgrade pricing on Mac and Windows software, so they often expect a similar path
    to be offered for mobile apps, too. With no App Store option for paid upgrades,
    iOS developers are limited to two buying mechanisms to pay for new features or
    additional content: traditional app sales and In-App Purchase.


    In the case of Bolt Creative’s wildly popular Pocket God game, a big factor in
    its early success was the near weekly free updates of new game play the company
    delivered to customers. Each new episode included a massive amount of fresh content,
    which not only helped attract new customers, but also sustained user engagement
    with every updated adventure. At only 99 cents (which includes all released episodes),
    it remains one of the best values in the App Store.


    But frequent updates packed full of new content and hours of game play can become
    quite costly to produce. With so many new games flooding the App Store, unless
    your game is a perennial best seller like Angry Birds or Pocket God, it would
    be difficult to deliver enough of a sales spike with each new update to financially
    support the same consistent level of accelerated development indefinitely.


    Even though Pocket God continues to sell very well, in order to better support
    the product’s ongoing development costs, Bolt Creative began offering In-App Purchases
    of skin packs and other add-on items. With Pocket God’s customers accustomed to
    receiving so much new content for free, Bolt Creative’s Dave Castlenuovo admitted
    that the primary challenge in introducing In-App Purchase items was in properly
    communicating that the addition of microtransactions was not an act of greed,
    but merely the means to help subsidize the continued free updates of new episodes.


    The Challenge of Changing User Perception


    Since the App Store infrastructure has bred a shopping culture where iOS users
    expect to receive a lifetime of free updates for the apps they’ve purchased, shifting
    their mind-set to accept in-app microtransactions has taken a little longer than
    most developers anticipated. Streaming Colour Studios quickly discovered this
    with the launch of its first freemium game, LandFormer.


    Released in June 2010, LandFormer received stellar reviews from the media, praising
    it for being an innovative and addicting puzzler. I’m not a big gamer myself,
    but it’s easily one of my favorite iOS apps. It’s a great example of a well-executed
    freemium strategy.


    Streaming Colour Studios’ founder Owen Goss remarked, “My other games [Dapple
    and Monkeys in Space] are both paid games, and Dapple has a separate lite version
    for people to ‘try before they buy.’ The thing I don’t like about the lite model
    is that it requires players to download two separate apps if they then want to
    buy the game. It always felt kludgy to me.”


    Ultimately, Owen decided to release LandFormer as a free app that includes 12
    levels. More than 70 additional levels are available via In-App Purchase (see
    [Figure 8-1](#9781430262381_Ch08.xhtml#Fig1)). To help build a community around
    the game, LandFormer also enables users to create and share their own levels.


