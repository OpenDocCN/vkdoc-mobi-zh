- fmt: 'If your app is a notebook-style writing tool, don’t show me an empty, unused
    list. And don’t show me a few test notes with generic titles like “Note 1” or
    “Example 1.” If I’m a writer looking for a tool like that, I want to see it being
    used to its full potential. Create some authentic-looking documents inside your
    app’s notes list, like “My Novel Outline,” “Research for Tech Article,” and “Tuesday
    Meeting Notes.” The app needs to look valuable and worthy of purchase.


    In the real estate market, staging helps sell houses. Some prospective buyers
    have trouble envisioning what an empty house would look like with their own furniture
    in it, so they walk away, believing it’s not really a good fit for their needs.
    Staging is the act of filling that house with appealing furniture and interior
    design nuances to help those people better visualize the possibilities. “See,
    this is what your house could look like! Nice, right?”


    You need to take the same staging approach with your iPhone and iPad app screenshots.
    This does not mean faking your screenshots in any way. Just spend some time actively
    using the app yourself, setting up a scenario within your app that would make
    for a visually enticing screenshot. This “in-action” screen should help potential
    buyers immediately see the value in purchasing your app. Although this applies
    well to productivity and utility apps, it’s also a good rule of thumb for all
    other types of apps, such as games. Don’t just show any example of game play.
    If it’s a first-person shooter, show the player in the middle of heavy combat,
    racking up a high score. Showcase the fun!


    ## Video Trailer


    Producing an engaging video trailer for your app is something every iOS developer
    should seriously consider. Some apps are hard to describe through static images
    alone. Providing an actual video walk-through of the app in a slick, movie-style
    video trailer—complete with title treatments, visual effects, and music—is a very
    powerful marketing tool. Captivating video trailers on YouTube have helped hundreds
    of iPhone games become best sellers.


    Depending on the kind of app you’ve developed, producing a trailer now may be
    a tad premature for your prerelease marketing efforts. Since you haven’t submitted
    your app to Apple’s review team, you have no idea if you’ll be required to change
    major portions in order to receive an approval. A video trailer floating out there
    on YouTube and other video-sharing sites should be representative of the actual
    final application that will be in the App Store.


    If you do plan on creating a video trailer for your app, I definitely recommend
    completing it before your app is released, so that it can help boost awareness
    from the very beginning. Two compelling reasons to produce your own video trailer
    are control and convenience. Without a video trailer, some app review sites may
    choose to shoot their own video walk-through, which may not show your app in its
    best light. By providing them with your own video trailer, you retain control
    of how your app will be presented visually. And by alleviating the need for reviewers
    to shoot a video, you’ve just made it that much more convenient for them to write
    a review of your app.


    Using a video camera to film the app running on your iPhone or iPad is a huge
    undertaking that often produces poor results if not done properly. There are many
    requirements when taking this approach—such as capturing the right lighting, ensuring
    the device’s screen is always in focus, and keeping your hands from shaking—which
    are much harder to achieve than you might think. Unless you’re a professional
    filmmaker or have access to one, this is not the ideal path.


    Most developers rely on screen-capture software to record video of their apps
    running in the iOS Simulator. This provides a high-quality solution that is easy
    to implement.


    If you want to enhance the look and capabilities of the iOS Simulator, a few third-party
    software products are worth exploring:


    *   To emulate support for GPS location, multitouch gestures, the accelerometer,
    and the compass, check out Vimov’s clever `iSimulate` iPhone app and SDK (`http://www.vimov.com/isimulate/`).
    It wirelessly sends those events to the iOS Simulator from an iPhone or iPod touch
    device on the same Wi-Fi network.

    *   To customize the look of the iOS Simulator’s home screen and improve the visibility
    of the cursor with a translucent white dot, try `SimFinger` (`http://blog.atebits.com/2009/03/not-your-average-iphone-screencast/`).
    atebits offers this utility as donationware.

    *   If you would rather use an actual finger image as a cursor replacement in
    the iOS Simulator, you’ll like Wonder Warp Software’s `PhoneFinger` (`http://www.wonderwarp.com/phonefinger/`),
    which is also available as donationware.


    Once you have the iOS Simulator optimized, you’ll need to find a screen-capture
    utility for recording the video. Here are several options to evaluate:


    *   `ScreenFlow` (`http://www.telestream.net/screen-flow/`)

    *   `iShowU HD` (`http://www.shinywhitebox.com/ishowuhd/main.html`)

    *   `Sound Stage` (`http://soundstageapp.com`)

    *   `Screenium` (`http://www.syniumsoftware.com/screenium/`)

    *   `Snapz Pro X` (`http://www.ambrosiasw.com/utilities/snapzprox/`)

    *   `Camtasia for Mac` (`http://www.techsmith.com/camtasia/`)

    *   `Voila` (`http://www.globaldelight.com/voila/`)


    Some popular choices among iOS developers are Telestream’s `ScreenFlow`, shinywhitebox’s
    `iShowU HD`, and New Leaders’ `Sound Stage`. Some of the screencasting products
    available offer an all-in-one, comprehensive recording and editing solution. If
    you choose a tool that provides only screen recording, you’ll also need a third-party
    editor like Apple’s `iMovie` or `Final Cut Pro` to turn the footage into a polished
    video trailer.


    It’s up to you to create a compelling video trailer, so take the time to not only
    plan the recorded walk-through of your app in the iOS Simulator, but also to script
    any audio voice-over tracks. Don’t forget to add some music to set the tone—making
    sure to use licensed or royalty-free music. Since the trailer may be played on
    various video-sharing sites and app-review sites, always incorporate your app’s
    icon and logo within the video to help reinforce its brand identity.


    If producing a video trailer falls far outside your comfort zone, don’t think
    twice about hiring a professional editor. An amateurish video can definitely taint
    consumer perception of your app’s quality. When possible, don’t cut corners on
    production value.


    An image is worth a thousand words, but the impact of video can be even more effective
    in building anticipation for your forthcoming iOS app or game. Just be careful
    not to release the video trailer too far in advance of your app’s release. Since
    Apple’s app review process can often take longer than expected, you don’t want
    to overhype your app prematurely, only to lose that momentum long before the app
    becomes available in the App Store.


    ## Dedicated Web Presence


    Last, but not least, you need a web site or dedicated web page for your app. Providing
    a central online destination for both consumers and the press to access additional
    information is a powerful tool that every software developer should embrace. Next,
    we’ll take a look at what constitutes a good web site for promoting an iPhone
    or iPad app.


    ### Your iOS App Deserves a Well-Designed Web Site


    You’ll need a web site and online support up and running for your app before it
    becomes available in the App Store, so why not take advantage of its promotional
    power while drumming up excitement during the prerelease phase? Since your application
    is not in the App Store yet, your site should be the primary URL where all interested
    parties are directed. And even after your app is released, a custom-designed web
    site (when done right) can be a much more effective sales tool than the limited
    content found in App Store product pages.'
