    that downloads and analyzes your iTunes Connect sales reports. Since it’s available
    as open source from GitHub, you’ll need to compile the project in Xcode and run
    it as a debug build in order to use it. But it gives you the flexibility to customize,
    compile, and install the software on your own mobile iOS devices to suit your
    own needs.

    *   AppStar (`http://www.damabia.com/appstar.php`), Damabia’s Mac OS X application,
    is a comprehensive desktop solution for tracking your iTunes Connect sales and
    trends reports, Apple’s monthly financial sales reports, and App Store chart rankings
    and app reviews. It also provides you with a built-in interface for organizing
    all of your app icons, screenshots, and marketing materials in one place. A ten-day
    fully functional demo of AppStar is available for download.

