- fmt: '`Ramp Champ by The Iconfactory and DS Media Labs` accomplishes this task quite
    nicely with a very straightforward approach that consumes very little screen real
    estate. `Ramp Champ` is a fun skee-ball-style game with several built-in themed
    ramps. Additional ramp packs are offered in the app’s Add-ons section. Each add-on
    pack is listed in a very compact manner, allowing users to quickly scroll through
    the list of available items. The concise bullet points describe exactly what a
    buyer gets in each pack, along with visually enticing images from the included
    ramps (see [Figure 8-8](#9781430262381_Ch08.xhtml#Fig8)).


    ![9781430262381_Fig08-08.jpg](images/9781430262381_Fig08-08.jpg)


    [Figure 8-8](#9781430262381_Ch08.xhtml#_Fig8). `Ramp Champ` notifies users when
    new add-on ramp packs are available (left). The concise bullet points and screenshots
    effectively describe exactly what a buyer would get in each add-on ramp pack (right)


    When crafting In-App Purchase item descriptions, you need to be very clear about
    what people will receive. Ambiguous descriptions often result in frustrated users.
    They may post negative customer reviews for your app, complaining that the purchased
    add-on item was not what they had expected. Communication is vital in preventing
    confusion.


    Customers like knowing up front how much an item costs before tapping the buy
    button, so you should include pricing within your in-app storefront whenever possible.
    You can dynamically list the prices of available In-App Purchase items within
    your app, which is especially helpful when localizing your app across several
    regions. In fact, since the App Store localizes prices for different country currencies,
    Apple strongly discourages the inclusion of static prices.


    If you frequently release new In-App Purchase items for a game (such as additional
    levels), don’t rely on your customers to check your game’s virtual shop on a regular
    basis. When new add-on content becomes available for purchase, let your users
    know by displaying a `UIAlertView` or a custom notification upon launch, such
    as the one displayed by `Ramp Champ` in [Figure 8-8](#9781430262381_Ch08.xhtml#Fig8).


    ## Finding the Sweet Spot


    Although your app’s core functionality will be the primary attraction that brings
    in new customers, your In-App Purchase strategy will succeed only if you’re offering
    enticing add-on content at a reasonable price that makes sense to consumers. Even
    though App Store shoppers are accustomed to getting full-featured games and apps
    for as low as 99 cents (or even free), it’s perfectly all right if your In-App
    Purchase items are priced higher than the related parent app, as long as the inherent
    value is apparent to your customers.


    ## Including the Right Mix of Ingredients


    For a paid app, it’s important to know which features your customers consider
    to be the app’s primary draw. Those are the features that should be included in
    your app’s price. Additional features that enhance the core offering are the ones
    better suited as potential In-App Purchase items. You don’t want to charge an
    in-app fee for a feature that users believe should be part of the original app
    price—some core functionality that they thought they were getting right out of
    the box.


    `Networks in Motion` ran into this problem when it first released its GPS navigation
    app, `Gokivo`, in 2009. At only 99 cents, it included a lot of features, such
    as Yahoo! Local Search, maps, traffic, and favorites. But to unlock the turn-by-turn,
    full GPS navigation service, an additional $9.99 monthly subscription fee via
    In-App Purchase was required. Consumers perceived the turn-by-turn GPS feature
    as core functionality that should be included with the app. Although the other
    features were nice, the turn-by-turn navigation service was the primary reason
    they bought the app in the first place. Upon discovering they needed to shell
    out another $9.99 a month to get the feature they assumed they had already purchased
    (regardless of the fact that the app was only 99 cents), many users felt duped.


    `Networks in Motion` went to great lengths to explicitly clarify its pricing structure
    in the App Store description, but somehow the message was not getting through
    to some of its customers. Many people were not taking the time to thoroughly read
    the description before purchasing the app.


    The company’s eventual solution to the issue was to raise the price of the app
    to $9.99 and include a 30-day subscription to its turn-by-turn navigation service.
    This way, customers were able to access the core feature they wanted immediately
    after purchasing the app. After 30 days, they could renew their subscription for
    another month via In-App Purchase.


    Even though we’re talking about the same amount of money in both scenarios, the
    perception is vastly different. It comes down to the principle of the purchase
    and satisfying user expectations.


    Heading into 2011, `Networks in Motion` revamped its business model even further.
    To remain competitive in the saturated navigation market, `Gokivo GPS Navigator`
    was made available as a free iPhone app, and it still includes a 30-day subscription
    to the turn-by-turn navigation service. As a free download, this gets the app
    into many more hands and gives users a chance to try out the app and become reliant
    on the service. The options are to renew the subscription via In-App Purchase
    for only $4.99 a month or $39.99 a year.


    ## Allowing Users to Spend As Much Money As They Want


    `Snappy Touch`’s `Noel Llopis` is no stranger to In-App Purchase. His popular
    universal app, `Flower Garden`, lets users grow and nurture digital flowers and
    send virtual bouquets to friends. This app was a perfect fit for offering consumable
    add-ons such as extra fertilizer and seed packs (see [Figure 8-9](#9781430262381_Ch08.xhtml#Fig9)).
    With the in-app Flower Shop included in both the paid and free versions, it’s
    no surprise that most of `Flower Garden`’s revenue comes from In-App Purchases.
    In fact, paid app sales make up only 17 percent of `Flower Garden`’s revenue;
    the rest is driven by In-App Purchase sales.


    ![9781430262381_Fig08-09.jpg](images/9781430262381_Fig08-09.jpg)


    [Figure 8-9](#9781430262381_Ch08.xhtml#_Fig9). `Snappy Touch`’s `Flower Garden`
    offers multiple fertilizer bundles in its in-app Flower Shop, giving users a choice
    as to how much money they wish to spend


    Upon seeing how games like `FarmVille` and `We Rule Quests` were finding success
    in selling tiered bundles of consumable items, `Noel` began wondering if he was
    underestimating what players were willing to spend by offering only one 99-cent
    fertilizer option in `Flower Garden`. He was surprised to find the App Store’s
    top-selling In-App Purchases for many of these popular games were never 99-cent
    ones. People were spending $4.99 and up for weapons, ammunition, bottles of Mojo,
    magic potions, farm coins, and other virtual currencies. Some of the top-ranking
    In-App Purchase items were priced as high as $29.99, $49.99, and even $99.99.'
