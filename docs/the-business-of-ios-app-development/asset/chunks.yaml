- fmt: "```objective-c\n} else {\n    // iAd not available or an error occurred,\n\
    \    // so show alternate ad banner instead.\n    // For this example, a custom\
    \ house ad is shown,\n    // but the code below could be easily replaced to\n\
    \    // show an ad from another ad network like AdMob.\n\n    // Adjust height\
    \ for contentView above alternative ad banner.\n    viewFrame.size.height -= altAdHeight;\n\
    \n    // Since iAd is not being used, adjust iAd position offscreen.\n    iAdPosition\
    \ += iAdHeight;\n\n    // Now adjust onscreen position for alternate ad banner.\n\
    \    altAdPosition -= altAdHeight;\n}\n\n} else {\n    // NO, Internet connection\
    \ is NOT available, so hide ad banner.\n\n    // Move both banner views offscreen.\n\
    \    iAdPosition += iAdHeight;\n    altAdPosition += altAdHeight;\n}\n\n// Slide\
    \ the requested ad banner into view,\n// and move the other ad banner view offscreen.\n\
    [UIView animateWithDuration:animationDuration animations:^{\n    contentView.frame\
    \ = viewFrame;\n    [contentView layoutIfNeeded];\n    adBannerView.frame = CGRectMake(0.0,\
    \ iAdPosition, adBannerView.frame.size.width, adBannerView.frame.size.height);\n\
    \    altAdBannerButton.frame = CGRectMake(0.0, altAdPosition, altAdWidth, altAdHeight);\n\
    }];\n```\n\n```objective-c\n// As an ADBannerViewDelegate, this class will receive\
    \ messages from the\n// iAd framework, notifying your app if an iAd banner was\
    \ loaded or not.\n#pragma mark ADBannerViewDelegate methods\n\n- (void)bannerViewDidLoadAd:(ADBannerView\
    \ *)banner {\n    [self adjustAdBannerPosition:YES];\n}\n\n- (void)bannerView:(ADBannerView\
    \ *)banner didFailToReceiveAdWithError:(NSError *)error {\n    [self adjustAdBannerPosition:YES];\n\
    }\n\n- (BOOL)bannerViewActionShouldBegin:(ADBannerView *)banner willLeaveApplication:(BOOL)willLeave\
    \ {\n    return YES;\n}\n\n- (void)bannerViewActionDidFinish:(ADBannerView *)banner\
    \ {\n}\n// End of the ADBannerViewDelegate methods\n\n- (void)didReceiveMemoryWarning\
    \ {\n    [super didReceiveMemoryWarning];\n}\n\n- (void)viewDidUnload {\n    self.contentView\
    \ = nil;\n    adBannerView.delegate = nil;\n    self.adBannerView = nil;\n   \
    \ [super viewDidUnload];\n}\n\n- (void)dealloc {\n    [contentView release];\n\
    \    adBannerView.delegate = nil;\n    [adBannerView release];\n    [altAdBannerButton\
    \ release];\n    [[NSNotificationCenter defaultCenter] removeObserver:self];\n\
    \    [super dealloc];\n}\n\n@end\n```\n\nI sprinkled helpful comments through\
    \ that code, so after a quick read through of `MainViewController_iPhone.m`, you\
    \ might already have a good understanding of the concepts at work here. But for\
    \ the sake of being thorough, let's step through it and look at how each piece\
    \ operates.\n\nBeyond synthesizing and releasing the ad-related properties in\
    \ the appropriate sections, you'll notice that the `viewDidLoad` event calls `prepareAdBannerView`,\
    \ `prepareAltAdBanner`, and `adjustAdBannerPosition`, so let's start with those\
    \ methods.\n\nThe `prepareAdBannerView` method creates a new instance of `ADBannerView`,\
    \ sets its ad frame size based on the device's current orientation, and then sends\
    \ an iAd request to the iAd Network. Initially, this iAd banner frame is placed\
    \ off the screen. When an iAd banner has been successfully received from the iAd\
    \ Network, only then will the iAd banner frame be displayed on the screen. Moving\
    \ the iAd into view is done in the `adjustAdBannerPosition` method.\n\nSo how\
    \ does your app know when an iAd banner is available to display? As an `ADBannerViewDelegate`,\
    \ this class receives messages from the iAd Network after the `prepareAdBannerView`\
    \ method sends the request. When an iAd Network reply is received, the `bannerView:didFailToReceiveAdWithError:`\
    \ event fires. If an iAd banner cannot be loaded, then the Boolean `ADBannerView.bannerLoaded`\
    \ is set to `NO`. If an iAd is successfully loaded, then that Boolean is set to\
    \ `YES`. When the received iAd is finished loading into the `ADBannerView` frame,\
    \ the `bannerViewDidLoadAd` event is fired. When either the `bannerView:didFailToReceiveAdWithError:`\
    \ or `bannerViewDidLoadAd` events fire, the `adjustAdBannerPosition` method should\
    \ be called, regardless of whether there is an iAd to display.\n\nJust in case\
    \ the iAd Network is unable to provide an iAd, this example project includes a\
    \ backup plan to show a house ad instead. The `prepareAltAdBanner` method creates\
    \ a new instance of an image-based `UIButton` to show the alternate house ad in\
    \ the event that iAd is unavailable. This `UIButton` is configured and placed\
    \ off-screen until it is needed. Of course, if you would rather use a third-party\
    \ ad banner as a fallback option instead of a house ad, you could easily customize\
    \ this method with your own code that requests and configures an advertisement\
    \ from another ad network, like AdMob or InMobi.\n\nThe `adjustAdBannerPosition`\
    \ method does all the heavy lifting of moving the appropriate ad banner onto the\
    \ screen and resizing the existing UI elements to accommodate the ad banner frame.\
    \ It is also responsible for removing the ad banner and reverting the app's UI\
    \ to its normal, full-screen state if network connectivity is lost. This transition\
    \ of sliding the ad banner in and out of view is achieved using `UIView` animation\
    \ (see [Figure 7-13](#9781430262381_Ch07.xhtml#Fig13)).\n\n![9781430262381_Fig07-13.jpg](images/9781430262381_Fig07-13.jpg)\n\
    \n[Figure 7-13](#9781430262381_Ch07.xhtml#_Fig13). Using UIView animation, the\
    \ adjustAdBannerPosition method is responsible for sliding the ad banner in and\
    \ out of view and adjusting the rest of the app's UI as needed\n\nThe `adjustAdBannerPosition`\
    \ method configures and juggles the placement of the iAd banner frame and the\
    \ house ad `UIButton`. If an iAd is available, then the iAd banner frame is assigned\
    \ a pixel position on the screen, and the house ad is given an off-screen position.\
    \ And if there's no iAd to display, the opposite occurs, with the house ad receiving\
    \ on-screen placement, and the iAd banner frame being relegated to off-screen\
    \ coordinates (see [Figure 7-14](#9781430262381_Ch07.xhtml#Fig14)). If the device\
    \ loses network connectivity, then both the iAd banner frame and the house ad\
    \ `UIButton` are given off-screen pixel positions.\n\n![9781430262381_Fig07-14.jpg](images/9781430262381_Fig07-14.jpg)\n\
    \n[Figure 7-14](#9781430262381_Ch07.xhtml#_Fig14). If an iAd is available, then\
    \ it is displayed on the screen. In the absence of an iAd banner, the alternate\
    \ house ad is shown instead\n\nTo ensure that the displayed ad banner and the\
    \ affected UI elements are properly positioned (with the correct ad size) when\
    \ the device's orientation is changed, you need to also add the native Cocoa Touch\
    \ events `viewWillAppear` and `willRotateToInterfaceOrientation` to the `MainViewController_iPhone.m`\
    \ code. When either of those events fire, the `adjustAdBannerPosition` method\
    \ should always be called.\n\nIf an iAd banner is tapped, the iAd modal view advertisement\
    \ is displayed, taking over the screen (with the host app idling in the background\
    \ until the iAd is dismissed). But when the alternate house ad is displayed, what\
    \ happens when a user taps that banner? As a `UIButton`, its action selector is\
    \ set to call the `tappedAltAdBanner` method. Right now, the example code within\
    \ that method launches `http://www.iPhoneBusinessBook.com` in Mobile Safari, but\
    \ you could easily replace that code with a custom action of your choice."
