    Here are some factors to consider:


    *   **Apps that use** **the Internet:** If your app requires an Internet connection,
    such as to access GPS information, web services, or an online social network,
    adding in-app advertising will not be an imposition for your users, since they
    will already be online when running your app. This is important to keep in mind,
    because even though an iPhone typically has a constant connection (via Wi-Fi or
    cellular carrier), iPod touch and iPad users may not have a Wi-Fi connection at
    all times. If the majority of your customers tend to use your app offline, then
    your in-app advertising will not make you any money. If your app cannot communicate
    with the ad network servers, it can’t serve up ads.

    *   **Apps for a** **younger audience:** If your app is a game or educational
    app aimed at a younger demographic, in-app advertising may not be appropriate.
    For one, parents may not appreciate apps that directly advertise to their kids.
    And advertising to young children may be illegal in some regions, so it’s important
    to do your legal homework.

    *   **Entertainment apps and casual games:** Many entertainment apps, especially
    casual games and board games, can fare quite well with in-app advertising, especially
    the ones that require an Internet connection for logging in to an online leaderboard
    or game network. If the UI design is done right, banner ads inserted at the very
    top or bottom of the screen should be unobtrusive to the game play. An example
    is Angry Birds Free, which earns revenue from in-app advertising. The development
    company, Rovio, prevents the actual game play from being obscured by creatively
    sliding the ad banners in and out of view at the top of the screen (see [Figure
    7-1](#9781430262381_Ch07.xhtml#Fig1)).


    ![9781430262381_Fig07-01.jpg](images/9781430262381_Fig07-01.jpg)


    [Figure 7-1](#9781430262381_Ch07.xhtml#_Fig1). Angry Birds Free slides ad banners
    in and out of view at the top of the screen to prevent obscuring actual game play


    *   **Immersive games:** In-app advertising can be very difficult to successfully
    integrate into full-screen, immersive 3D games. Often, the only option in those
    cases is to display advertisements in between game levels. This is usually not
    ideal, since that would drastically reduce the number of ad impressions your app
    could generate, especially if game levels take a long time for users to complete.


    If you do decide to monetize your free iOS application with in-app advertising,
    be sure to do it from the very beginning, with your initial 1.0 release. If your
    app has always included advertising, users will simply accept it as the price
    for a free download. If your app has already gained a loyal following of users
    who have enjoyed several versions of your app ad-free, then the sudden introduction
    of in-app advertising in a later update is bound to upset many of your fans. As
    always, you want to avoid receiving negative customer reviews in the App Store,
    so carefully plan your free app strategy up-front.


    In-App Advertising As a Sales Tool'
  trans: '

    # 免费应用的变现方式


    免费应用的最后一种变现方式可能大多数开发者都想不到，而且这种模式具有一定的赌博性质。如今，许多大型企业会仅凭一款应用的用户数量就收购其所有权。这类情况正日益增多。最典型的例子当属
    `Instagram`。


    `Facebook` 在极易受影响的青少年群体中发现了一个新兴市场。这款照片分享应用从未、也永远不会产生任何直接收益——没有广告、没有内购、也没有升级到高级版本的营销。`Facebook`
    纯粹是为了其用户基础，以十亿美元现金收购了 `Instagram`。没错，是十亿美元（Billion）。


    另一款采用完全相同策略的应用是 `Snap Chat`。这款应用允许用户发送“阅后即焚”的图片消息。它在青少年群体中非常流行，并曾收到过多次数十亿美元的收购要约。


    这里的核心在于确定你的终局战略：你是想直接从用户身上赚钱，还是致力于被第三方收购？如果目标是那笔巨额收购，那么让你的应用永远免费可能是最佳选择。


    ## 转变思路


    付费应用并非移动领域中唯一的盈利途径。你是否想真正利用“免费”的力量来创造更多收入？本章讨论的推广版精简版应用和其他商业模式只是冰山一角。接下来的两章将深入探讨应用内广告和内购模式。


    ## 第 7 章：利用 iAd 及其他应用内广告机会实现免费应用变现


    移动广告被广泛视为下一个重要的营销前沿，广告商们竞相瞄准不断增长的用户群体。本章将深入剖析应用内广告的世界，为你介绍适用于 iOS 应用的移动广告网络，以及通过应用内分析追踪使用情况的价值。同时，还会探讨其他替代广告模式，如赞助和植入式广告合作。


    ### 何时使用应用内广告


    我们都有过下载显示某种应用内广告的免费应用的经历，其中不少人甚至点击过这些广告。根据当前趋势，研究专家`Gartner`预测，到 2014 年移动广告支出将超过
    170 亿美元。就连苹果公司也通过推出在 iOS 应用中投放广告的 `iAd` 平台，涉足这一利润丰厚的市场。但关键问题在于：应用开发者真的能从中赚钱吗？


    应用内广告是一种无需依赖付费内容销售就能实现免费应用变现的有效方式，但它并非对所有应用都是可行的商业模式。你需要深入审视自己正在构建的是哪种应用，以及用户将如何使用你的应用。


    #### 了解你的受众


    如果你开发的免费应用能吸引广泛的主流市场，并且用户使用频率很高，那么你或许能从应用内广告中获得可观的收入。关键在于*流量*。


    这方面最经典的案例是昙花一现的游戏神作 `Flappy Bird`。这款游戏免费，通过在主屏幕和游戏结束画面展示 `iAd` 广告来创收。该游戏的设计初衷就是成为一种潮流，吸引所有人，因此免费应用的思路完全合理。`Flappy
    Bird` 仅凭 `iAd` 每天就能产生超过 5 万美元的收入。


    使用你应用的人越多，累积的广告展示次数和点击量就越高。如果你的应用足够“粘人”，能长时间吸引用户的注意力，它就能展示更多的横幅广告，从而为你带来更多的广告分成收入。


    如果你的免费应用面向小众市场，吸引力有限，那么它可能无法产生足够的广告收入来支撑你的业务。另一方面，服务于小众市场也可能让你从优质广告网络获得更高的费率，因为那些品牌广告主渴望精准触达这些受众。尽管这类小众应用最终吸引的用户数量不如大众市场应用，但它可以通过每个广告赚取更多收入来弥补差距。


    以下是一些需要考虑的因素：


    - **使用网络的应用：** 如果你的应用需要网络连接（例如访问 GPS 信息、网络服务或在线社交网络），那么添加应用内广告不会给用户带来不便，因为他们在运行你的应用时已经在线。请务必牢记这一点，因为尽管
    iPhone 通常有持续的网络连接（通过 Wi-Fi 或蜂窝网络），但 iPod touch 和 iPad 用户可能并非随时都有 Wi-Fi 连接。如果你的大部分用户倾向于离线使用你的应用，那么应用内广告就无法为你带来任何收入。如果应用无法与广告网络服务器通信，它就无法展示广告。

    - **面向年轻用户的应用：** 如果你的应用是面向青少年的游戏或教育应用，应用内广告可能并不合适。一方面，家长可能不喜欢那些直接向孩子做广告的应用。此外，在部分地区向幼儿投放广告可能是非法的，因此做好法律方面的功课至关重要。

    - **娱乐应用和休闲游戏：** 许多娱乐应用，尤其是休闲游戏和棋类游戏，非常适合采用应用内广告模式，特别是那些需要联网登录在线排行榜或游戏网络的应用。如果用户界面设计得当，插入在屏幕顶部或底部的横幅广告应该不会影响游戏体验。一个例子是《愤怒的小鸟免费版》（`Angry
    Birds Free`），它通过应用内广告盈利。其开发公司 `Rovio` 通过创造性地将广告横幅滑入和滑出屏幕顶部，避免了遮挡实际的游戏画面（参见图 7-1）。


    ![9781430262381_Fig07-01.jpg](img/9781430262381_Fig07-01.jpg)


    图 7-1. 《愤怒的小鸟免费版》将广告横幅滑入和滑出屏幕顶部，以避免遮挡实际的游戏画面


    - **沉浸式游戏：** 在全屏、沉浸式的 3D 游戏中整合应用内广告非常困难。通常，在这种情况下唯一的选择是在游戏关卡之间展示广告。这通常并不理想，因为那样会大幅减少应用能够产生的广告展示次数，尤其是在游戏关卡需要用户花费很长时间才能完成的情况下。


    如果你决定通过应用内广告来变现你的免费 iOS 应用，请务必从最初 1.0 版本发布时就这样做。如果你的应用从一开始就包含广告，用户会自然而然地将其视为免费下载的代价。如果你的应用已经积累了一批忠实用户，他们享受了多个无广告版本，那么在后续更新中突然引入应用内广告必然会令许多粉丝反感。一如既往，你需要避免在
    App Store 收到负面用户评价，因此请提前仔细规划你的免费应用策略。


    ### 作为销售工具的应用内广告

    '
- fmt: '如果你不完全依赖广告收入，并决定发布一个免费的精简版来推广付费应用，那么可以考虑仅在精简版中使用应用内广告。根据你正在开发的应用类型，这不仅可以有效地将该免费应用变现，还能促使用户升级到付费应用以获得无广告的体验。这就是《愤怒的小鸟免费版》（参见[图
    7-1](#9781430262381_Ch07.xhtml#Fig1)）背后的商业模式，它提供了十几个免费游戏关卡并带有应用内广告。为了获得更多游戏关卡和无广告体验，用户被鼓励购买《愤怒的小鸟》付费应用。


    即使你不提供单独的付费应用，一些用户也会更喜欢你应用的无广告版本。许多免费应用，例如 Tweakersoft 的 `AroundMe`（参见[图 7-2](#9781430262381_Ch07.xhtml#Fig2)），通过应用内购买提供了一个移除广告的付费选项。这样，你的应用保持免费下载，可供任何想要尝试的人使用。忠诚的客户可以继续使用带有广告的免费版本，也可以选择支付少量应用内费用来移除广告。这使得你的应用无论用户选择哪种方式都能产生收入。有关应用内购买的深入介绍，请参见[第
    8 章](#9781430262381_Ch08.xhtml)。


    ![9781430262381_Fig07-02.jpg](images/9781430262381_Fig07-02.jpg)


    [图 7-2](#9781430262381_Ch07.xhtml#_Fig2). Tweakersoft 的免费应用 `AroundMe`，提供了一项通过应用内购买移除广告的无广告选项。


    ## 选择移动广告网络


    苹果公司在 2010 年推出的 `iAd` 引起了巨大的媒体轰动。有关参与应用通过广告展示和点击获得可观利润的新闻，吸引了大量 iOS 开发者加入 `iAd`
    网络。对于设计用来容纳横幅广告的应用界面来说，`iAd` 是一个诱人的选择。苹果公司一直在努力增加 `iAd` 网络的广告库存，并将其可用性扩大到美国以外，以提升其对开发者的价值和覆盖范围。但
    `iAd` 显然不是唯一的选择，并且可能不是你特定应用需求的最理想广告解决方案。


    ### 调查可用选项


    彻底调查所有兼容 iOS 的广告网络，以找到提供你所需解决方案的选项，这一点至关重要。尽管市面上有数十个移动广告平台，但此处我将重点限于那些为 iOS 开发者提供应用内广告
    SDK 的主要平台。


    以下是一些值得探索的广告网络网站：


    *   `iAd` (`http://developer.apple.com/iad/`)

    *   谷歌的 `AdMob` (`http://www.admob.com`)

    *   `Greystripe` (`http://www.greystripe.com`)

    *   `Millennial Media` (`http://developer.millennialmedia.com`)

    *   `InMobi` (`http://www.inmobi.com`)

    *   `iVdopia` (`http://www.ivdopia.com`)

    *   `Jumptap` (`http://www.jumptap.com`)

    *   `Medialets` (`http://www.medialets.com`)

    *   `MobFox` (`http://www.mobfox.com`)

    *   `Mojiva` (`http://www.mojiva.com`)

    *   `Rhythm NewMedia` (`http://www.rhythmnewmedia.com`)

    *   `Say Media` (`http://saymedia.com`)

    *   `Smaato` (`http://www.smaato.com`)

    *   `YuMe` (`http://www.yume.com`)


    归根结底，一个成功的广告支持型应用最重要的因素是确保 100% 的填充率（始终有广告可供展示），并为你的应用广告空间赚取最优费率。实现这些目标可能需要在你的应用中支持多个广告网络。许多开发者利用广告中介层和广告交易平台，例如以下服务提供的平台：


    *   `AdWhirl` (`http://www.adwhirl.com`)

    *   `Burstly` (`http://www.burstly.com`)

    *   `Mobclix` (`http://www.mobclix.com`)


    ### 哪个广告网络适合你？


    除了易于使用、可在五到十分钟内集成到应用中的 SDK 之外，所有这些广告网络也都是免费的，并提供类似的功能，那么你应该选择哪一个呢？这实际上取决于你应用的切实需求。你应该根据以下标准来做决定：


    *   支持的广告尺寸和格式

    *   报告和分析功能

    *   全球可用性和定向能力

    *   收益和填充率


    让我们更仔细地看看这些因素会如何极大地影响你的应用在应用内广告方面的成功。


    请记住，这些广告网络总是在发展和变化，有时会损害开发者的利益。请密切关注 `http://iphonedevsdk.com/forum/business-legal-app-store/`，因为那里总是有关于不同广告网络以及它们做得对与错的帖子。


    ## 支持的广告尺寸和格式


    首先也是最重要的，你选择的移动广告网络必须支持能够很好地适配你 iOS 应用 UI 和屏幕尺寸的广告尺寸。例如，有些广告网络只为 iPhone 和 iPod
    touch 提供固定的竖屏和横屏横幅广告尺寸，这对于 iPad 应用的更大屏幕来说可能会出现问题。


    如果横幅广告不适合你应用的特定界面需求怎么办？有些广告网络专注于全屏富媒体广告或视频广告，这更适合游戏和传统横幅广告不实用的自定义 UI。


    如果交叉推广对你的免费广告支持型应用来说是一个有价值的功能，那么请特别注意那些允许你将部分广告库存分配为自定义“内部广告”的广告网络。你可以使用这些内部广告来推广你的其他应用和/或应用内购买项目，同时还可以作为交换网络的一部分，与其他第三方应用交换广告。虽然你不会从这类交叉推广广告中赚取任何广告收入，但如果你的免费应用拥有庞大的用户群，它们可以帮助带动大量流量和销售，流向你的其他付费应用和内容。


    ## 报告和分析功能


    为了正确评估应用内广告业务模式的有效性，你必须能够衡量的你应用内广告展示的频率和效果。所有广告网络都提供基于网页的报告，用于报告应用内投放的广告情况，但有些报告比其他报告更全面。在做决定之前，你应该尝试查看一份报告示例。


    但赚取的广告收入并不是唯一值得追踪的统计数据。大多数（如果不是全部）移动广告网络也提供作为其 SDK 一部分的集成化分析包。这对于追踪应用使用情况以及找出你应用的哪些部分获得最多流量至关重要。这些信息将帮助你优化应用内广告的放置位置以提高广告收入，并改进应用的总体性能和设计，使其更好地匹配用户的使用方式。2010
    年，苹果公司更改了其关于分析的政策，仅允许在用于跟踪和改进应用内广告投放时使用第三方分析工具。我将在本章后面更详细地讨论应用内分析。


    ## 全球可用性和定向能力


    单一广告网络可能无法覆盖你的应用所销售的所有 App Store 地区，因此请考虑如何为所有用户提供应用内广告，无论他们身处何地。这可能需要组合使用多个广告网络，或者利用一个支持多个广告网络和中介层的服务。


    当苹果公司的 `iAd` 网络首次推出时，最初仅限于北美大陆。在接下来的几个月里，苹果开始在其他地区（例如欧洲和日本）逐步推出 `iAd`。当你读到本文时，`iAd`
    可能在足够多的地区已经建立完善，使其成为面向全球应用的一个可行的应用内广告解决方案。


    但如果你担心某些地区或国家得不到服务，你可能需要在你的应用中支持一个以上的广告网络。许多开发者将他们的应用编程为：为美国用户提供 `iAd`，为欧洲用户提供
    `MobFox` 或 `InMobi`，为世界其他地区提供 `AdMob`。这就是位置感知和应用内分析可以帮助确定为每个用户调用哪些广告网络的地方。'
  raw: 'If you’re not sold on relying entirely on advertising revenue and decide to
    release a free lite version to promote your paid app, consider using in-app advertising
    in only your lite version. Depending on the kind of app you’re developing, it
    can be an effective way to not only monetize that free app, but also help motivate
    users to upgrade to the paid app if they want an ad-free version. That’s the business
    model behind Angry Birds Free (see [Figure 7-1](#9781430262381_Ch07.xhtml#Fig1)),
    which offers a dozen free game levels with in-app advertising. For additional
    game levels and an ad-free experience, users are encouraged to purchase the Angry
    Birds paid app.


    Even if you don’t offer a separate paid app, some users will prefer an ad-free
    version of your app. Many free apps, such as Tweakersoft’s AroundMe (see [Figure
    7-2](#9781430262381_Ch07.xhtml#Fig2)), offer a paid option to remove ads via In-App
    Purchase. This way, your app remains free to download, available to anyone who
    wants to try it. Loyal customers can either continue to use the app free with
    ads, or opt to remove the ads for a small in-app fee. This enables your app to
    generate revenue, regardless of which option your users choose. For in-depth coverage
    of In-App Purchase, see [Chapter 8](#9781430262381_Ch08.xhtml).


    ![9781430262381_Fig07-02.jpg](images/9781430262381_Fig07-02.jpg)


    [Figure 7-2](#9781430262381_Ch07.xhtml#_Fig2). Tweakersoft’s free app, AroundMe,
    offers an ad-free option with an In-App Purchase to remove ads


    Selecting a Mobile Ad Network


    Apple made quite a media splash with its iAd launch in 2010\. News of participating
    apps earning impressive profits from ad impressions and click-throughs has attracted
    hordes of iOS developers to the iAd Network. For app interfaces that are designed
    to accommodate banner ads, iAd is an enticing choice. And Apple has been working
    hard to ramp up the iAd Network’s ad inventory and increase availability beyond
    the United States to improve its reach and value to developers. But iAd is certainly
    not the only game in town, and it may not be the most ideal ad solution for your
    specific app needs.


    Investigating the Choices


    It’s important to thoroughly investigate all the iOS-compatible ad networks to
    find the ones that offer the solutions you need. Although there are dozens of
    mobile advertising platforms available, I’ll limit the focus here to only the
    major players that offer an in-app advertising SDK for iOS developers.


    Here are some ad network sites worth exploring:


    *   iAd (`http://developer.apple.com/iad/`)

    *   AdMob by Google (`http://www.admob.com`)

    *   Greystripe (`http://www.greystripe.com`)

    *   Millennial Media (`http://developer.millennialmedia.com`)

    *   InMobi (`http://www.inmobi.com`)

    *   iVdopia (`http://www.ivdopia.com`)

    *   Jumptap (`http://www.jumptap.com`)

    *   Medialets (`http://www.medialets.com`)

    *   MobFox (`http://www.mobfox.com`)

    *   Mojiva (`http://www.mojiva.com`)

    *   Rhythm NewMedia (`http://www.rhythmnewmedia.com`)

    *   Say Media (`http://saymedia.com`)

    *   Smaato (`http://www.smaato.com`)

    *   YuMe (`http://www.yume.com`)


    At the end of the day, the most important factors in a successful ad-supported
    app are ensuring a 100 percent fill rate (with an ad always available to display)
    and earning the best rates for your app’s ad space. Accomplishing these goals
    may require supporting more than one ad network in your app. Many developers take
    advantage of ad mediation layers and ad exchange platforms, such as offered by
    the following services:


    *   AdWhirl (`http://www.adwhirl.com`)

    *   Burstly (`http://www.burstly.com`)

    *   Mobclix (`http://www.mobclix.com`)


    Which Ad Network Is Right for You?


    Beyond the lure of easy-to-use SDKs that can be integrated into your app within
    five to ten minutes, all of these ad networks are also free and offer similar
    features, so which one should you choose? It really comes down to the actual needs
    of your app. You should make your decision based on the following criteria:


    *   Supported ad sizes and formats

    *   Reporting and analytics

    *   Global availability and targeting

    *   Earnings and fill rates


    Let’s take a closer look at how these factors can greatly impact your app’s success
    with in-app advertising.


    Keep in mind these ad networks are always evolving and changing, sometimes hurting
    developers. Always keep an eye on `http://iphonedevsdk.com/forum/business-legal-app-store/`
    because there are always posts on the different ad networks, and what they are
    doing right and wrong.


    Supported Ad Sizes and Formats


    First and foremost, the mobile ad network you choose must support ad sizes that
    will fit nicely within your iOS app’s UI and screen dimensions. For example, some
    ad networks offer only fixed portrait and landscape banner ad sizes for the iPhone
    and iPod touch, which would prove problematic for the larger screen of an iPad
    app.


    And what if banner ads aren’t suitable for your app’s specific interface needs?
    Some ad networks specialize in full-screen, rich media ads or video-based ads,
    which may be a better fit for games and custom UIs where traditional banner ads
    would be impractical.


    If cross-promotion is a valuable feature for your free ad-supported app to utilize,
    then pay special attention to the ad networks that allow you to assign some of
    your ad inventory with custom “house ads.” You can use these to promote your other
    apps and/or In-App Purchase offerings from within your free app, as well as possibly
    trade ads with other third-party apps as part of an exchange network. While you
    won’t be earning any ad revenue from those kinds of cross-promotional ads, they
    can help drive a lot of traffic and sales to your other paid apps and content,
    if your free app enjoys a large user base.


    Reporting and Analytics


    In order to properly evaluate the effectiveness of your in-app advertising business
    model, you must have the ability to measure the frequency and performance of ads
    displayed within your app. All of the ad networks offer web-based reporting on
    the ads run within your app, but some are more comprehensive than others. You
    should try to check out an example of a report before making your decision.


    But earned ad revenue is not the only set of statistics worth tracking. Most (if
    not all) of the mobile ad networks also offer an integrated analytics package
    as part of their SDKs. This can be significant in tracking app usage and figuring
    out which sections of your app receive the most traffic. This knowledge will help
    you to fine-tune in-app ad placement to improve ad revenue, as well as enhance
    the app’s overall performance and design to better match how people are using
    it. In 2010, Apple changed its policy on analytics, allowing only third-party
    analytics when used to track and improve in-app advertising efforts. I discuss
    in-app analytics in greater detail later in this chapter.


    Global Availability and Targeting


    One ad network alone may not cater to every App Store region where your app is
    sold, so consider how to provide in-app ads to all of your users, regardless of
    their location. This may require a combination of ad networks or that you take
    advantage of a service that supports multiple ad networks and mediation layers.


    When Apple’s iAd Network first launched, it was initially limited to the North
    American continent. In the months that followed, Apple began slowly rolling out
    iAd in other regions, such as Europe and Japan. By the time you read this, iAd
    may be well established in enough regions to make it a viable in-app advertising
    solution for globally available apps.


    But if you’re worried about some regions or countries going unserved, you may
    want to support more than one ad network in your app. Many developers program
    their apps to serve up iAds for US users, MobFox or InMobi for European users,
    and AdMob for the rest of the world. This is where location awareness and in-app
    analytics can help determine which ad networks to call on for each individual
    user.'
  trans: '

    如果你不完全依赖广告收入，并决定发布一个免费的精简版来推广付费应用，那么可以考虑仅在精简版中使用应用内广告。根据你正在开发的应用类型，这不仅可以有效地将该免费应用变现，还能促使用户升级到付费应用以获得无广告的体验。这就是《愤怒的小鸟免费版》（参见图
    7-1）背后的商业模式，它提供了十几个免费游戏关卡并带有应用内广告。为了获得更多游戏关卡和无广告体验，用户被鼓励购买《愤怒的小鸟》付费应用。


    即使你不提供单独的付费应用，一些用户也会更喜欢你应用的无广告版本。许多免费应用，例如 Tweakersoft 的 `AroundMe`（参见图 7-2），通过应用内购买提供了一个移除广告的付费选项。这样，你的应用保持免费下载，可供任何想要尝试的人使用。忠诚的客户可以继续使用带有广告的免费版本，也可以选择支付少量应用内费用来移除广告。这使得你的应用无论用户选择哪种方式都能产生收入。有关应用内购买的深入介绍，请参见第
    8 章。


    ![9781430262381_Fig07-02.jpg](img/9781430262381_Fig07-02.jpg)


    图 7-2. Tweakersoft 的免费应用 `AroundMe`，提供了一项通过应用内购买移除广告的无广告选项。


    ## 选择移动广告网络


    苹果公司在 2010 年推出的 `iAd` 引起了巨大的媒体轰动。有关参与应用通过广告展示和点击获得可观利润的新闻，吸引了大量 iOS 开发者加入 `iAd`
    网络。对于设计用来容纳横幅广告的应用界面来说，`iAd` 是一个诱人的选择。苹果公司一直在努力增加 `iAd` 网络的广告库存，并将其可用性扩大到美国以外，以提升其对开发者的价值和覆盖范围。但
    `iAd` 显然不是唯一的选择，并且可能不是你特定应用需求的最理想广告解决方案。


    ### 调查可用选项


    彻底调查所有兼容 iOS 的广告网络，以找到提供你所需解决方案的选项，这一点至关重要。尽管市面上有数十个移动广告平台，但此处我将重点限于那些为 iOS 开发者提供应用内广告
    SDK 的主要平台。


    以下是一些值得探索的广告网络网站：


    *   `iAd` (`http://developer.apple.com/iad/`)

    *   谷歌的 `AdMob` (`http://www.admob.com`)

    *   `Greystripe` (`http://www.greystripe.com`)

    *   `Millennial Media` (`http://developer.millennialmedia.com`)

    *   `InMobi` (`http://www.inmobi.com`)

    *   `iVdopia` (`http://www.ivdopia.com`)

    *   `Jumptap` (`http://www.jumptap.com`)

    *   `Medialets` (`http://www.medialets.com`)

    *   `MobFox` (`http://www.mobfox.com`)

    *   `Mojiva` (`http://www.mojiva.com`)

    *   `Rhythm NewMedia` (`http://www.rhythmnewmedia.com`)

    *   `Say Media` (`http://saymedia.com`)

    *   `Smaato` (`http://www.smaato.com`)

    *   `YuMe` (`http://www.yume.com`)


    归根结底，一个成功的广告支持型应用最重要的因素是确保 100% 的填充率（始终有广告可供展示），并为你的应用广告空间赚取最优费率。实现这些目标可能需要在你的应用中支持多个广告网络。许多开发者利用广告中介层和广告交易平台，例如以下服务提供的平台：


    *   `AdWhirl` (`http://www.adwhirl.com`)

    *   `Burstly` (`http://www.burstly.com`)

    *   `Mobclix` (`http://www.mobclix.com`)


    ### 哪个广告网络适合你？


    除了易于使用、可在五到十分钟内集成到应用中的 SDK 之外，所有这些广告网络也都是免费的，并提供类似的功能，那么你应该选择哪一个呢？这实际上取决于你应用的切实需求。你应该根据以下标准来做决定：


    *   支持的广告尺寸和格式

    *   报告和分析功能

    *   全球可用性和定向能力

    *   收益和填充率


    让我们更仔细地看看这些因素会如何极大地影响你的应用在应用内广告方面的成功。


    请记住，这些广告网络总是在发展和变化，有时会损害开发者的利益。请密切关注 `http://iphonedevsdk.com/forum/business-legal-app-store/`，因为那里总是有关于不同广告网络以及它们做得对与错的帖子。


    ## 支持的广告尺寸和格式


    首先也是最重要的，你选择的移动广告网络必须支持能够很好地适配你 iOS 应用 UI 和屏幕尺寸的广告尺寸。例如，有些广告网络只为 iPhone 和 iPod
    touch 提供固定的竖屏和横屏横幅广告尺寸，这对于 iPad 应用的更大屏幕来说可能会出现问题。


    如果横幅广告不适合你应用的特定界面需求怎么办？有些广告网络专注于全屏富媒体广告或视频广告，这更适合游戏和传统横幅广告不实用的自定义 UI。


    如果交叉推广对你的免费广告支持型应用来说是一个有价值的功能，那么请特别注意那些允许你将部分广告库存分配为自定义“内部广告”的广告网络。你可以使用这些内部广告来推广你的其他应用和/或应用内购买项目，同时还可以作为交换网络的一部分，与其他第三方应用交换广告。虽然你不会从这类交叉推广广告中赚取任何广告收入，但如果你的免费应用拥有庞大的用户群，它们可以帮助带动大量流量和销售，流向你的其他付费应用和内容。


    ## 报告和分析功能


    为了正确评估应用内广告业务模式的有效性，你必须能够衡量的你应用内广告展示的频率和效果。所有广告网络都提供基于网页的报告，用于报告应用内投放的广告情况，但有些报告比其他报告更全面。在做决定之前，你应该尝试查看一份报告示例。


    但赚取的广告收入并不是唯一值得追踪的统计数据。大多数（如果不是全部）移动广告网络也提供作为其 SDK 一部分的集成化分析包。这对于追踪应用使用情况以及找出你应用的哪些部分获得最多流量至关重要。这些信息将帮助你优化应用内广告的放置位置以提高广告收入，并改进应用的总体性能和设计，使其更好地匹配用户的使用方式。2010
    年，苹果公司更改了其关于分析的政策，仅允许在用于跟踪和改进应用内广告投放时使用第三方分析工具。我将在本章后面更详细地讨论应用内分析。


    ## 全球可用性和定向能力


    单一广告网络可能无法覆盖你的应用所销售的所有 App Store 地区，因此请考虑如何为所有用户提供应用内广告，无论他们身处何地。这可能需要组合使用多个广告网络，或者利用一个支持多个广告网络和中介层的服务。


    当苹果公司的 `iAd` 网络首次推出时，最初仅限于北美大陆。在接下来的几个月里，苹果开始在其他地区（例如欧洲和日本）逐步推出 `iAd`。当你读到本文时，`iAd`
    可能在足够多的地区已经建立完善，使其成为面向全球应用的一个可行的应用内广告解决方案。


    但如果你担心某些地区或国家得不到服务，你可能需要在你的应用中支持一个以上的广告网络。许多开发者将他们的应用编程为：为美国用户提供 `iAd`，为欧洲用户提供
    `MobFox` 或 `InMobi`，为世界其他地区提供 `AdMob`。这就是位置感知和应用内分析可以帮助确定为每个用户调用哪些广告网络的地方。

