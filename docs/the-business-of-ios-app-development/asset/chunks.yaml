    Since In-App Purchase is not supported in the iOS Simulator, select Device in
    the top-left Overview drop-down menu in Xcode’s main project window to reflect
    your connected test device.


    Next, open the InAppPurchase-Info.plist file and change the bundle identifier
    to the one that’s now assigned to this app in iTunes Connect. As an example, the
    bundle ID for our fictional Breadcrumbs app is `com.ebutterfly.breadcrumbs` (as
    shown in [Figure 8-13](#9781430262381_Ch08.xhtml#Fig13)).


    The last configuration task is to specify the Xcode project’s provisioning profile,
    so that the appropriate provisioning profile is used when Xcode runs the app on
    the connected test device. To accomplish this, select the project name at the
    top of the Groups & Files pane, and then click the Info toolbar button. In the
    window that appears, select the Build tab and scroll down to the Code Signing
    section. Under Code Signing Identity’s Any iOS, choose the provisioning profile
    that’s assigned to your app’s bundle ID (as previously discussed in the “Creating
    In-App Purchase Items” section).


    If you don’t see that provisioning profile listed, you’ll need to generate it
    in Apple’s online iOS Provisioning Portal, download it to your computer, and install
    it in Xcode Organizer while your test device is connected. If you’ve never created
    provisioning profiles before, read the tutorial in [Chapter 9](#9781430262381_Ch09.xhtml)
    so that you can complete this step before moving forward.


    Setting Up the Basics'
  trans: '

    # 管理你的应用内购买项目


    在 `iTunes Connect` 中保存新的应用内购买项目后，你可以通过应用程序列表的 `管理应用内购买项目` 部分进行后续修改（参见 图 8-15）。在将项目提交给苹果审核之前，其状态为
    `待开发者批准`，你可以自由编辑或删除它。


    ![9781430262381_Fig08-15.jpg](img/9781430262381_Fig08-15.jpg)


    图 8-15。创建应用内购买项目后，它将会列在 `iTunes Connect` 中应用程序的 `管理应用内购买项目` 部分。


    完成测试并上传应用内购买功能的截图后，点击 `批准` 按钮以提交你的应用内购买项目进行审核。系统会提示你从以下两个选项中选择其一：


    *   *立即提交*：如果你的现有 iOS 应用程序已支持应用内购买，并且你只是想向现有产品列表中添加另一个应用内购买项目，你可以选择 `立即提交` 将其直接送入审核队列。

    *   *随二进制文件提交*：如果你的应用内购买项目需要应用程序的新版本或更新版本，则应选择 `随二进制文件提交`，以确保两个产品同时被审核并同时在 App
    Store 上线。


    当应用内购买项目的状态为 `等待审核` 或 `正在审核` 时，在审核过程中你将无法进行任何进一步修改。


    在应用内购买项目被苹果拒绝或批准后，你所做的任何额外修改都需要重新进行审核。如果项目被拒绝，那么苹果要求你在重新提交审核之前，将其作为新的应用内购买项目重新创建。


    每个父级应用程序最多可以创建 3000 个应用内购买项目。如果你从 `iTunes Connect` 中删除了一个应用内购买项目，该唯一的产品 ID 将永远无法再用于其他项目。即使你要用类似的应用内购买项目替换已删除的项目，也需要为其使用不同的产品
    ID。


    # 准备测试设备


    遗憾的是，iOS 模拟器不支持应用内购买。要正确测试应用内购买交易，你需要在 iOS 设备上使用新创建的测试用户账户来完整执行一次。


    为避免账户问题，你必须先在测试设备上退出所有现有的 iTunes 账户。操作方法是：启动设备的 `设置` 应用，然后轻点 `商店`。在 `商店` 界面，点击
    `退出登录` 按钮以退出 iTunes Store（参见 图 8-16）。我再怎么强调这一步的重要性也不为过。清理设备 `商店` 设置中的现有账户可以防止在应用内购买测试交易中意外使用非测试账户。只需让
    `商店` 设置保持空白即可。不要在此处使用你的测试用户账户登录，否则可能会使其作为测试账户失效。


    ![9781430262381_Fig08-16.jpg](img/9781430262381_Fig08-16.jpg)


    图 8-16。在测试应用内购买之前，你必须先在测试设备上退出你的 iTunes 账户（左图）。你还需要在测试设备的 `允许的内容` 设置中打开 `应用内购买`（右图）。


    在测试设备的 `通用设置` 的 `限制` 部分，确保 `允许的内容` 下的 `应用内购买` 功能已开启（参见 图 8-16）。


    现在设备已准备就绪，只需将其连接到你的开发电脑。为了在设备上编译和测试项目，请确保在 Xcode 的下拉菜单中选择 `设备` 作为 `活动的 SDK`。正如我之前提到的，你还需要确保已在
    `Xcode Organizer` 中正确安装了为此设备和相关 App ID 分配的配置文件。


    当你在测试设备上运行 Xcode 调试构建的应用时，`Store Kit` 框架会与一个特殊的“沙盒”测试环境通信，而不是真实的 App Store。如果发起应用内购买请求，`Store
    Kit` 会提示你确认购买。然后，`Store Kit` 会显示一个 iTunes 登录界面。选择 `现有账户`，并使用你的测试用户账户登录。在这个特殊的测试环境中，成功完成交易将返回一份订单收据，但不会发生资金转移，也不会生成发票。


    切勿在生产环境中使用你的测试用户账户。你的测试账户仅应在 Xcode 中调试应用程序时使用。否则会导致你的账户凭据失效。确保你在苹果沙盒测试环境中运行应用的唯一方法是从
    Xcode 启动应用到测试设备上。如果你从设备主屏幕启动应用，`Store Kit` 将连接到真实的 App Store 并使你的测试用户账户失效。


    # 接入 Store Kit 框架


    开始编程吧！启动 Xcode 并创建一个新的 iOS 项目，选择 iPhone 的 `基于视图的应用程序` 模板。你也可以轻松地将示例代码应用到 iPad
    或通用应用程序中，但为了专注于当前任务，我们保持简单。将示例项目命名为 `InAppPurchase`。如果你想节省时间直接跟着做，可以从本书配套的代码示例中下载并打开已完成的
    `InAppPurchase` 项目，网址为 `http://iPhoneBusinessBook.com` 或 `http://www.apress.com`。


    **注意**  我们即将构建的示例项目不应被视为一个独立可运行的应用程序。要使它正常工作，你需要在代码的各处插入自己的应用内购买项目产品 ID 和其他相关数据。在概述完成示例购买所需的步骤时，我将解释在哪里插入你的自定义应用内购买信息。


    ## 为应用内购买配置项目


    在编写任何代码之前，必须将所需的 `Store Kit` 框架添加到 Xcode 项目中。操作方式与你之前在本节中看到的例子相同。按住 Ctrl 键点击项目的
    `Frameworks` 文件夹，选择 `添加 ![image](img/arrow.jpg) 现有框架...`，然后从出现的列表中选择 `StoreKit.framework`。


    由于 iOS 模拟器不支持应用内购买，请在 Xcode 主项目窗口左上角的 `概览` 下拉菜单中选择 `设备`，以反映你连接的测试设备。


    接下来，打开 `InAppPurchase-Info.plist` 文件，将捆绑包标识符更改为现在在 `iTunes Connect` 中分配给此应用的标识符。例如，我们虚构的
    Breadcrumbs 应用的捆绑包 ID 是 `com.ebutterfly.breadcrumbs`（如 图 8-13 所示）。


    最后一个配置任务是指定 Xcode 项目的配置文件，以便在 Xcode 在连接的测试设备上运行应用时使用正确的配置文件。为此，请在 `组与文件` 窗格顶部选择项目名称，然后点击
    `信息` 工具栏按钮。在出现的窗口中，选择 `构建` 标签页，向下滚动到 `代码签名` 部分。在 `代码签名身份` 下的 `任何 iOS` 中，选择分配给应用捆绑包
    ID 的配置文件（如前文“创建应用内购买项目”部分所述）。


    如果列表中未显示该配置文件，你需要在苹果的在线 iOS 配置门户中生成它，下载到你的电脑，并在测试设备连接时将其安装到 `Xcode Organizer`
    中。如果你以前从未创建过配置文件，请阅读 第 9 章 中的教程，这样就可以在继续之前完成此步骤。


    # 设置基础内容

    '
- fmt: "首先，你需要向项目中添加一个新类，因此请在“Groups & Files”列中选择“Classes”文件夹，然后选择“File” ![image](images/arrow.jpg)\
    \ “New File…”。接下来，在弹出的“New File”对话框中，从“Cocoa Touch Class”类别中选择“Objective-C Class”模板，并将“Subclass”下拉菜单配置为`NSObject`的子类。点击“Next”按钮，让Xcode创建`.h`和`.m`文件，并将它们都命名为`InAppPurchaseObserver`。我们稍后会在本章中向这个类添加一些代码，届时会解释其用途。\n\
    \n现在，让我们继续处理`InAppPurchaseViewController`类。你需要设计自己的商店前端界面，特别是当你在应用中提供多个应用内购买产品时。不过，对于这个基本示例，你将使用一个简单的`UIButton`来表示单个应用内购买项目。\n\
    \n打开`InAppPurchaseViewController.h`头文件，并按如下方式修改代码：\n\n```\n#import <UIKit/UIKit.h>\n\
    #import <StoreKit/StoreKit.h>\n#import \"InAppPurchaseObserver.h\"\n\n@interface\
    \ InAppPurchaseViewController : UIViewController <SKProductsRequestDelegate> {\n\
    \    InAppPurchaseObserver *inappObserver;\n    UIButton *inappButton;\n}\n\n\
    @property (nonatomic, retain) InAppPurchaseObserver *inappObserver;\n@property\
    \ (nonatomic, retain) IBOutlet UIButton *inappButton;\n-(IBAction)buyInApp:(id)sender;\n\
    \n@end\n```\n\n以粗体突出显示的代码是新增内容。`StoreKit`框架已被导入，并引用了新的`UIButton`和`buyInApp`方法。这使得你可以通过代码修改按钮的属性，并在按钮被点击时调用`buyInApp`函数。\n\
    \n你还会注意到`SKProductsRequestDelegate`的指定。这允许`InAppPurchaseViewController`从`StoreKit`框架接收响应，这在你稍后开始向项目添加`StoreKit`代码时会发挥作用。\n\
    \n新的`InAppPurchaseObserver`类也已被导入，并可以通过`inappObserver`属性进行引用。这将使`InAppPurchaseViewController`能够将`StoreKit`事务响应发送给`InAppPurchaseObserver`类。我们将在本章稍后部分对此进行更多讨论。现在，请保存你的更改。\n\
    \n接下来，打开`InAppPurchaseViewController.m`实现文件，并添加以下粗体代码，以完成对`inappObserver`属性、`UIButton`和`buyInApp`方法的设置。\n\
    \n```\n#import \"InAppPurchaseViewController.h\"\n\n@implementation InAppPurchaseViewController\n\
    @synthesize inappObserver;\n@synthesize inappButton;\n\n- (void)viewDidLoad {\n\
    \ninappObserver = [[InAppPurchaseObserver alloc] init];\n\n[super viewDidLoad];\n\
    }\n\n// When the buy button is clicked, start In-App Purchase process. \n-(IBAction)buyInApp:(id)sender\
    \ {\n    // Interact with StoreKit here.\n}\n\n- (void)didReceiveMemoryWarning\
    \ {\n\n[super didReceiveMemoryWarning];\n}\n\n- (void)viewDidUnload {\n    //\
    \ Release any retained subviews of the main view. \n    // e.g. self.myOutlet\
    \ = nil;\n}\n\n- (void)dealloc {\n  [inappButton release];\n  [inappObserver release];\n\
    \  [super dealloc];\n}\n\n@end\n```\n\n保存这些更改后，在Interface Builder中启动`InAppPurchaseViewController.xib`。向视图中添加一个“Rounded\
    \ Rect Button”（圆角矩形按钮），并将其“Touch Up Inside”连接器连接到文件所有者的`buyInApp`连接器。然后将文件所有者的`inappButton`输出口连接到该“Rounded\
    \ Rect Button”。另外，添加一个标签，文本设置为“**Purchase Additional Features**”，并将按钮的默认标题更改为“**None\
    \ Available**”（参见[图 8-17](#9781430262381_Ch08.xhtml#Fig17)）。确保通过取消选中“Enabled”属性来禁用该按钮。当我们开始与`StoreKit`交互时，这一切就会变得有意义。\n\
    \n![9781430262381_Fig08-17.jpg](images/9781430262381_Fig08-17.jpg)\n\n[图 8-17](#9781430262381_Ch08.xhtml#_Fig17).\
    \ 在Interface Builder中设置简单的示例。取消选中按钮的“Enabled”属性\n\n## 让应用内购买启动并运行\n\n现在你已经完成了基本UI的构建和连接，是时候与`StoreKit`互动了。只需五个步骤，你就可以在应用中启动并运行应用内购买功能！\n\
    \n### 步骤 1：消费者是否允许应用内购买？\n\n由于用户可以在设备设置中禁用应用内购买功能，你需要在执行任何其他操作之前检查是否可以进行应用内购买。在Interface\
    \ Builder中保存更改后，返回Xcode，并再次打开`InAppPurchaseViewController.m`实现文件。将以下新的粗体代码添加到`viewDidLoad`中：\n\
    \n```\n- (void)viewDidLoad {\n\ninappObserver = [[InAppPurchaseObserver alloc]\
    \ init];\n\nif ([SKPaymentQueue canMakePayments]) {\n        // Yes, In-App Purchase\
    \ is enabled on this device!\n        // Proceed to fetch available In-App Purchase\
    \ items.\n\n} else {\n        // Notify user that In-App Purchase is disabled\
    \ via button text.\n        [inappButton setTitle:@\"In-App Purchase is Disabled\"\
    \ forState:UIControlStateNormal];\n        inappButton.enabled = NO;\n    }\n\n\
    [super viewDidLoad];\n}\n```\n\n这里，快速调用了`StoreKit`的`SKPaymentQueue`类中的`canMakePayments`方法。如果返回“是”，则表示该设备上允许应用内购买功能，并且可以访问App\
    \ Store。如果返回“否”，你可以通过按钮的标题标签通知用户他们已禁用应用内购买功能。请记住，按钮的初始状态已在Interface Builder中设置为禁用，所以目前只需保持其禁用状态，仅用于向用户传达信息。\n\
    \n### 步骤 2：获取可用的应用内购买项目\n\n在应用内购买功能可访问后，你现在可以检查App Store中你的项目是否可用。在执行此检查之前，你的应用必须已经知道相关的应用内购买产品ID。\n\
    \n如果你只提供一个或两个应用内购买项目，并且不打算添加更多，最简单的方法是将应用内购买产品ID存储在应用内部。当然，每当你向应用添加新的应用内购买产品ID时，你需要通过更新使其对客户可用，这将需要你再次提交应用以供审核/批准。\n\
    \n由于iTunes Connect要求应用内购买产品ID是唯一的，请不要在父应用中预先分配不存在的ID，并计划将来在iTunes Connect中创建这些ID。如果其他开发者在你有机会在iTunes\
    \ Connect中创建该产品ID之前就拥有了该产品ID，那么这种策略可能会适得其反。\n\n当然，你可以提前规划，现在就在iTunes Connect中创建所有已知的应用内购买项目，并将其标记为“Pending\
    \ Developer Approval”（待开发者批准）。这样，你就知道了要包含在应用程序二进制文件中的产品ID，当你准备好让消费者使用这些未来的应用内购买项目时，你可以提交它们以供批准。\n\
    \n如果你希望灵活地添加新的应用内购买项目而无需构建新的应用版本，则需要使用基于服务器的应用内购买模型（本章前面已讨论过），在该模型中，你的应用可以从你的服务器获取所有相关的产品ID。如你所知，`StoreKit`不为此提供任何基础架构，因此配置应用与你的服务器通信是你的责任。虽然这需要你额外的工作，但这是检索大量产品ID的推荐方法，特别是如果你不断添加新的应用内购买项目。每次发布新的可购买附加内容时都提交新的应用更新，苹果的审批过程太耗时了。\n\
    \n相关的应用内购买项目需要获得批准并在App Store中准备好销售，之后客户才能在你的应用中购买它们。在项目获得批准之前，它们仅在你的父应用开发版本中可供你的测试用户账户使用。"
  raw: "First, you’ll need to add a new class to the project, so select the Classes\
    \ folder in the Groups & Files column, and then choose File ![image](images/arrow.jpg)\
    \ New File…. Next, in the New File dialog box that appears, select the Objective-C\
    \ Class template from the Cocoa Touch Class category, and configure the Subclass\
    \ drop-down menu to make it a subclass of `NSObject`. Click the Next button, and\
    \ have Xcode create both the .h and .m files, naming them both InAppPurchaseObserver.\
    \ We’ll add some code to this class a little later in the process, and I’ll explain\
    \ its purpose then.\n\nFor now, let’s move on to the `InAppPurchaseViewController`\
    \ class. You’ll want to design your own storefront UI, especially if you’re offering\
    \ several In-App Purchase products within your app. However, for this basic example,\
    \ you’ll use a simple `UIButton` for a single In-App Purchase item.\n\nOpen the\
    \ InAppPurchaseViewController.h header file, and modify the code as follows:\n\
    \n```\n#import <UIKit/UIKit.h>\n#import <StoreKit/StoreKit.h>\n#import \"InAppPurchaseObserver.h\"\
    \n\n@interface InAppPurchaseViewController : UIViewController <SKProductsRequestDelegate>\
    \ {\n    InAppPurchaseObserver *inappObserver;\n    UIButton *inappButton;\n}\n\
    \n@property (nonatomic, retain) InAppPurchaseObserver *inappObserver;\n@property\
    \ (nonatomic, retain) IBOutlet UIButton *inappButton;\n-(IBAction)buyInApp:(id)sender;\n\
    \n@end\n```\n\nThe code highlighted in bold represent new additions. The Store\
    \ Kit framework has been imported, and a new `UIButton` and `buyInApp` method\
    \ are referenced. This enables you to modify the button’s properties via code,\
    \ and it will call the `buyInApp` function when the button is tapped.\n\nYou’ll\
    \ also notice the assignment of the `SKProductsRequestDelegate`. This allows the\
    \ `InAppPurchaseViewController` to receive responses from the Store Kit framework,\
    \ which will come into play later when you start adding Store Kit code to the\
    \ project.\n\nThe new `InAppPurchaseObserver` class has also been imported and\
    \ can be referenced via the `inappObserver` property. This will enable the `InAppPurchaseViewController`\
    \ to send Store Kit transaction responses to the `InAppPurchaseObserver` class.\
    \ We’ll talk about that more later in this chapter. For now, save your changes.\n\
    \nNext, open the InAppPurchaseViewController.m implementation file, and add the\
    \ following bold code to complete your setup of the `inappObserver` property,\
    \ `UIButton`, and the `buyInApp` method.\n\n```\n#import \"InAppPurchaseViewController.h”\n\
    \n@implementation InAppPurchaseViewController\n@synthesize inappObserver;\n@synthesize\
    \ inappButton;\n\n- (void)viewDidLoad {\n\ninappObserver = [[InAppPurchaseObserver\
    \ alloc] init];\n\n[super viewDidLoad];\n}\n\n// When the buy button is clicked,\
    \ start In-App Purchase process. \n-(IBAction)buyInApp:(id)sender {\n    // Interact\
    \ with StoreKit here.\n}\n\n- (void)didReceiveMemoryWarning {\n\n[super didReceiveMemoryWarning];\n\
    }\n\n- (void)viewDidUnload {\n    // Release any retained subviews of the main\
    \ view. \n    // e.g. self.myOutlet = nil;\n}\n\n- (void)dealloc {\n  [inappButton\
    \ release];\n  [inappObserver release];\n  [super dealloc];\n}\n\n@end\n```\n\n\
    After saving those changes, launch InAppPurchaseViewController.xib in Interface\
    \ Builder. Add a Rounded Rect Button to the View, and wire up its Touch Up Inside\
    \ connector to the File Owner’s `buyInApp` connector. Then wire the File Owner’s\
    \ `inappButton` outlet to the Rounded Rect Button. Also add a label with **Purchase\
    \ Additional Features** as the text, and change the button’s default title to\
    \ read **None Available** (see [Figure 8-17](#9781430262381_Ch08.xhtml#Fig17)).\
    \ Make sure to disable the button by unchecking the Enabled property. This will\
    \ all make sense when we start interacting with Store Kit.\n\n![9781430262381_Fig08-17.jpg](images/9781430262381_Fig08-17.jpg)\n\
    \n[Figure 8-17](#9781430262381_Ch08.xhtml#_Fig17). Setting up our simple example\
    \ in Interface Builder. Uncheck the button’s Enabled property\n\nGetting In-App\
    \ Purchase Up and Running\n\nNow that you’re finished building and wiring up your\
    \ basic UI, it’s time to have some fun with Store Kit. In only five steps, you’ll\
    \ have In-App Purchase up and running in your application!\n\nStep 1: Does the\
    \ Consumer Allow In-App Purchase?\n\nSince users can disable the In-App Purchase\
    \ feature in their device settings, you’ll want to check that an In-App Purchase\
    \ can be made before doing anything else. After you’ve saved your changes in Interface\
    \ Builder, go back to Xcode, and open the InAppPurchaseViewController.m implementation\
    \ file again. Add the following new bold code to `viewDidLoad`:\n\n```\n- (void)viewDidLoad\
    \ {\n\ninappObserver = [[InAppPurchaseObserver alloc] init];\n\nif ([SKPaymentQueue\
    \ canMakePayments]) {\n        // Yes, In-App Purchase is enabled on this device!\n\
            // Proceed to fetch available In-App Purchase items.\n\n} else {\n        //\
    \ Notify user that In-App Purchase is disabled via button text.\n        [inappButton\
    \ setTitle:@\"In-App Purchase is Disabled\" forState:UIControlStateNormal];\n\
            inappButton.enabled = NO;\n    }\n\n[super viewDidLoad];\n}\n```\n\nHere,\
    \ a quick call is being made to the `canMakePayments` method in Store Kit’s `SKPaymentQueue`\
    \ class. If a `Yes` value is returned, then the In-App Purchase feature is allowed\
    \ on that device, and the App Store is accessible. If a `No` is returned, you\
    \ can notify the users that they have In-App Purchase disabled via the button’s\
    \ Title label. Remember that the initial state of the button was set to disabled\
    \ in Interface Builder, so just leave it disabled for now, simply using it to\
    \ communicate information to the user.\n\nStep 2: Fetch Available In-App Purchase\
    \ Items\n\nWith the In-App Purchase feature accessible, you can now check the\
    \ App Store for the availability of your item. Your application must already know\
    \ the related In-App Purchase product ID before performing this check.\n\nIf you\
    \ are offering only one or two In-App Purchase items and don’t plan on adding\
    \ more, the easiest approach is to store your In-App Purchase product IDs within\
    \ your app. Of course, any time you add a new In-App Purchase product ID to your\
    \ app, you’ll need to make it available to customers as an update, which will\
    \ require submitting your app again for review/approval.\n\nSince iTunes Connect\
    \ requires In-App Purchase product IDs to be unique, don’t preassign nonexistent\
    \ IDs in your parent app with plans to create those IDs in iTunes Connect at some\
    \ point in the future. That strategy could backfire on you if some other developer\
    \ takes ownership of that product ID before you get a chance to create it in iTunes\
    \ Connect.\n\nOf course, you could plan ahead by creating all your known In-App\
    \ Purchase items in iTunes Connect now and simply mark them as Pending Developer\
    \ Approval. That way, you’ll know the product IDs to include in your application\
    \ binary, and when you’re ready to make those future In-App Purchase items available\
    \ to consumers, you can submit them for approval.\n\nIf you want the flexibility\
    \ to add new In-App Purchase items without requiring a new build of your app,\
    \ you’ll need to use the server-based In-App Purchase model (discussed earlier\
    \ in this chapter), where your app can fetch all related product IDs from your\
    \ server. As you learned, Store Kit does not provide any infrastructure for this,\
    \ so it’s your responsibility to configure the app to talk to your server. Although\
    \ this requires extra work on your part, it is the recommended method for retrieving\
    \ a large number of product IDs, especially if you’re constantly adding new In-App\
    \ Purchase items. Apple’s approval process is too time-consuming to continuously\
    \ submit a new app update every time you release new purchasable add-on content.\n\
    \nThe related In-App Purchase items will need to be approved and ready for sale\
    \ in the App Store before customers can purchase them within your app. Before\
    \ the items are approved, they are available to only your Test User account within\
    \ your parent app’s development build."
  trans: "\n首先，你需要向项目中添加一个新类，因此请在“Groups & Files”列中选择“Classes”文件夹，然后选择“File” ![image](img/arrow.jpg)\
    \ “New File…”。接下来，在弹出的“New File”对话框中，从“Cocoa Touch Class”类别中选择“Objective-C Class”模板，并将“Subclass”下拉菜单配置为`NSObject`的子类。点击“Next”按钮，让\
    \ Xcode 创建`.h`和`.m`文件，并将它们都命名为`InAppPurchaseObserver`。我们稍后会在本章中向这个类添加一些代码，届时会解释其用途。\n\
    \n现在，让我们继续处理`InAppPurchaseViewController`类。你需要设计自己的商店前端界面，特别是当你在应用中提供多个应用内购买产品时。不过，对于这个基本示例，你将使用一个简单的`UIButton`来表示单个应用内购买项目。\n\
    \n打开`InAppPurchaseViewController.h`头文件，并按如下方式修改代码：\n\n```\n#import <UIKit/UIKit.h>\n\
    #import <StoreKit/StoreKit.h>\n#import \"InAppPurchaseObserver.h\"\n\n@interface\
    \ InAppPurchaseViewController : UIViewController <SKProductsRequestDelegate> {\n\
    \    InAppPurchaseObserver *inappObserver;\n    UIButton *inappButton;\n}\n\n\
    @property (nonatomic, retain) InAppPurchaseObserver *inappObserver;\n@property\
    \ (nonatomic, retain) IBOutlet UIButton *inappButton;\n-(IBAction)buyInApp:(id)sender;\n\
    \n@end\n```\n\n以粗体突出显示的代码是新增内容。`StoreKit`框架已被导入，并引用了新的`UIButton`和`buyInApp`方法。这使得你可以通过代码修改按钮的属性，并在按钮被点击时调用`buyInApp`函数。\n\
    \n你还会注意到`SKProductsRequestDelegate`的指定。这允许`InAppPurchaseViewController`从`StoreKit`框架接收响应，这在你稍后开始向项目添加`StoreKit`代码时会发挥作用。\n\
    \n新的`InAppPurchaseObserver`类也已被导入，并可以通过`inappObserver`属性进行引用。这将使`InAppPurchaseViewController`能够将`StoreKit`事务响应发送给`InAppPurchaseObserver`类。我们将在本章稍后部分对此进行更多讨论。现在，请保存你的更改。\n\
    \n接下来，打开`InAppPurchaseViewController.m`实现文件，并添加以下粗体代码，以完成对`inappObserver`属性、`UIButton`和`buyInApp`方法的设置。\n\
    \n```\n#import \"InAppPurchaseViewController.h\"\n\n@implementation InAppPurchaseViewController\n\
    @synthesize inappObserver;\n@synthesize inappButton;\n\n- (void)viewDidLoad {\n\
    \ninappObserver = [[InAppPurchaseObserver alloc] init];\n\n[super viewDidLoad];\n\
    }\n\n// 当购买按钮被点击时，启动应用内购买流程。\n-(IBAction)buyInApp:(id)sender {\n    // 在这里与 StoreKit\
    \ 交互。\n}\n\n- (void)didReceiveMemoryWarning {\n\n[super didReceiveMemoryWarning];\n\
    }\n\n- (void)viewDidUnload {\n    // 释放主视图的任何保留子视图。\n    // 例如：self.myOutlet =\
    \ nil;\n}\n\n- (void)dealloc {\n  [inappButton release];\n  [inappObserver release];\n\
    \  [super dealloc];\n}\n\n@end\n```\n\n保存这些更改后，在 Interface Builder 中启动`InAppPurchaseViewController.xib`。向视图中添加一个“Rounded\
    \ Rect Button”（圆角矩形按钮），并将其“Touch Up Inside”连接器连接到文件所有者的`buyInApp`连接器。然后将文件所有者的`inappButton`输出口连接到该“Rounded\
    \ Rect Button”。另外，添加一个标签，文本设置为“**Purchase Additional Features**”，并将按钮的默认标题更改为“**None\
    \ Available**”（参见图 8-17）。确保通过取消选中“Enabled”属性来禁用该按钮。当我们开始与`StoreKit`交互时，这一切就会变得有意义。\n\
    \n![9781430262381_Fig08-17.jpg](img/9781430262381_Fig08-17.jpg)\n\n图 8-17. 在 Interface\
    \ Builder 中设置简单的示例。取消选中按钮的“Enabled”属性\n\n## 让应用内购买启动并运行\n\n现在你已经完成了基本 UI 的构建和连接，是时候与`StoreKit`互动了。只需五个步骤，你就可以在应用中启动并运行应用内购买功能！\n\
    \n### 步骤 1：消费者是否允许应用内购买？\n\n由于用户可以在设备设置中禁用应用内购买功能，你需要在执行任何其他操作之前检查是否可以进行应用内购买。在\
    \ Interface Builder 中保存更改后，返回 Xcode，并再次打开`InAppPurchaseViewController.m`实现文件。将以下新的粗体代码添加到`viewDidLoad`中：\n\
    \n```\n- (void)viewDidLoad {\n\ninappObserver = [[InAppPurchaseObserver alloc]\
    \ init];\n\nif ([SKPaymentQueue canMakePayments]) {\n        // 是的，此设备已启用应用内购买！\n\
    \        // 继续获取可用的应用内购买项目。\n\n} else {\n        // 通过按钮文本通知用户应用内购买已禁用。\n    \
    \    [inappButton setTitle:@\"应用内购买已禁用\" forState:UIControlStateNormal];\n   \
    \     inappButton.enabled = NO;\n    }\n\n[super viewDidLoad];\n}\n```\n\n这里，快速调用了`StoreKit`的`SKPaymentQueue`类中的`canMakePayments`方法。如果返回“是”，则表示该设备上允许应用内购买功能，并且可以访问\
    \ App Store。如果返回“否”，你可以通过按钮的标题标签通知用户他们已禁用应用内购买功能。请记住，按钮的初始状态已在 Interface Builder\
    \ 中设置为禁用，所以目前只需保持其禁用状态，仅用于向用户传达信息。\n\n### 步骤 2：获取可用的应用内购买项目\n\n在应用内购买功能可访问后，你现在可以检查\
    \ App Store 中你的项目是否可用。在执行此检查之前，你的应用必须已经知道相关的应用内购买产品 ID。\n\n如果你只提供一个或两个应用内购买项目，并且不打算添加更多，最简单的方法是将应用内购买产品\
    \ ID 存储在应用内部。当然，每当你向应用添加新的应用内购买产品 ID 时，你需要通过更新使其对客户可用，这将需要你再次提交应用以供审核/批准。\n\n\
    由于 iTunes Connect 要求应用内购买产品 ID 是唯一的，请不要在父应用中预先分配不存在的 ID，并计划将来在 iTunes Connect\
    \ 中创建这些 ID。如果其他开发者在你有机会在 iTunes Connect 中创建该产品 ID 之前就拥有了该产品 ID，那么这种策略可能会适得其反。\n\
    \n当然，你可以提前规划，现在就在 iTunes Connect 中创建所有已知的应用内购买项目，并将其标记为“Pending Developer Approval”（待开发者批准）。这样，你就知道了要包含在应用程序二进制文件中的产品\
    \ ID，当你准备好让消费者使用这些未来的应用内购买项目时，你可以提交它们以供批准。\n\n如果你希望灵活地添加新的应用内购买项目而无需构建新的应用版本，则需要使用基于服务器的应用内购买模型（本章前面已讨论过），在该模型中，你的应用可以从你的服务器获取所有相关的产品\
    \ ID。如你所知，`StoreKit`不为此提供任何基础架构，因此配置应用与你的服务器通信是你的责任。虽然这需要你额外的工作，但这是检索大量产品 ID 的推荐方法，特别是如果你不断添加新的应用内购买项目。每次发布新的可购买附加内容时都提交新的应用更新，苹果的审批过程太耗时了。\n\
    \n相关的应用内购买项目需要获得批准并在 App Store 中准备好销售，之后客户才能在你的应用中购买它们。在项目获得批准之前，它们仅在你的父应用开发版本中可供你的测试用户账户使用。\n"
- fmt: 'Once your app has retrieved the In-App Purchase product ID—in this example,
    you’re using only one—proceed to request that product from the App Store to ensure
    that it’s currently available for purchase.


    ```

    - (void)viewDidLoad {


    inappObserver = [[InAppPurchaseObserver alloc] init];


    if ([SKPaymentQueue canMakePayments]) {

            // Yes, In-App Purchase is enabled on this device!

            // Proceed to fetch available In-App Purchase items.


    // Replace "Your IAP Product ID" with your actual In-App Purchase Product ID,

            // fetched from either a remote server or stored locally within your app.

            SKProductsRequest *prodRequest= [[SKProductsRequest alloc] initWithProductIdentifiers:        [NSSet
    setWithObject: @"Your IAP Product ID"]];

            prodRequest.delegate = self;

            [prodRequest start];


    } else {

            // Notify user that In-App Purchase is disabled via button text.

            [inappButton setTitle:@"In-App Purchase is Disabled" forState:UIControlStateNormal];

            inappButton.enabled = NO;

        }


    [super viewDidLoad];

    }

    ```


    Of the new code added (in bold) to `InAppPurchaseViewController.m`’s `viewDidLoad`,
    you’ll need to replace the placeholder string `"Your IAP Product ID"` with your
    own actual In-App Purchase product ID. For example, the In-App Purchase product
    ID of the $1.99 Premium Pack for our fictional Breadcrumbs app is `breadcrumbs.premiumpack`
    (as shown in [Figure 8-15](#9781430262381_Ch08.xhtml#Fig15)).


    And remember that `SKProductsRequestDelegate` code you added to the header file
    a while back? By assigning `InAppPurchaseViewController` as the `SKProductsRequest`
    delegate, you can simply state `self` for the `Delegate` property. The Store Kit
    will then return a response to this delegate. To receive that response, add the
    following code to the `InAppPurchaseViewController.m` file:


    ```

    // StoreKit returns a response from an SKProductsRequest.

    - (void)productsRequest:(SKProductsRequest *)request didReceiveResponse:(SKProductsResponse
    *)response {


    // Populate the inappBuy button with the received product info.

        SKProduct *validProduct = nil;

        int count = [response.products count];

        if (count>0) {

            validProduct = [response.products objectAtIndex:0];

        }

        if (!validProduct) {

            [inappButton setTitle:@"No Products Available" forState:UIControlStateNormal];

            inappButton.enabled = NO;

            return;

        }


    NSString *buttonText = [[NSString alloc] initWithFormat:@"%@ - Buy %@",     validProduct.localizedTitle,
    validProduct.price];

        [inappButton setTitle:buttonText forState:UIControlStateNormal];

        inappButton.enabled = YES;

        [buttonText release];

    }

    ```


    Store Kit responds with an array of available In-App Purchase products. Since
    you have only one here, you populate the `inappBuy` button with the product’s
    localized title and price (see [Figure 8-18](#9781430262381_Ch08.xhtml#Fig18)).
    If you’re interested in also displaying the localized description, that can be
    accessed via the `localizedDescription` property. Don’t forget to enable the button
    via code now that it’s displaying a valid In-App Purchase item.


    ![9781430262381_Fig08-18.jpg](images/9781430262381_Fig08-18.jpg)


    [Figure 8-18](#9781430262381_Ch08.xhtml#_Fig18). The Store Kit replies to the
    product request with information about the available In-App Purchase item. The
    example code then populates the button with the item’s localized title and price


    Why bother checking for the In-App Purchase item through the Store Kit if you
    already know the product ID? This vital step ensures that your application does
    not try to sell an item that is not currently available in the App Store. For
    example, what if you submitted both your application and an In-App Purchase item
    for review at the same time, but only your iOS app was approved? Forcing your
    application to first check for the availability of the In-App Purchase item before
    listing it will prevent potential customer purchase issues. Never assume. Always
    perform this check before displaying any items for sale within your app.


    If you successfully set up an In-App Purchase item in iTunes Connect and yet your
    app encounters problems retrieving that item data as a valid product, make sure
    your application’s bundle identifier in its `.plist` file matches the parent app’s
    bundle ID assigned to your In-App Purchase item in iTunes Connect.


    Do not discard that In-App Purchase product ID after using it for the product
    request. It will come in handy again soon. If the user taps the buy button, you’ll
    need that product ID to submit a purchase request to Store Kit.


    ## Step 3: Request a Purchase


    Tapping the buy button in the example fires the `buyInApp` method in the `InAppPurchaseViewController.m`
    file. So, the next step is to handle that action by sending a payment request
    to Store Kit.


    ```

    // When the buy button is clicked, start In-App Purchase process.

    -(IBAction)buyInApp:(id)sender {


    // Replace "Your IAP Product ID" with your actual In-App Purchase Product ID.

        SKPayment *paymentRequest = [SKPayment paymentWithProductIdentifier: @"Your
    IAP Product ID"];


    // Assign an Observer class to the SKPaymentTransactionObserver,

        // so that it can monitor the transaction status.

        [[SKPaymentQueue defaultQueue] addTransactionObserver:inappObserver];


    // Request a purchase of the selected item.

        [[SKPaymentQueue defaultQueue] addPayment:paymentRequest];

    }

    ```


    After creating an `SKPayment` instance with the In-App Purchase product ID of
    the item the user wants to buy, you’ll need to assign an observer class to the
    `SKPaymentQueue`’s transaction observer. This is where your `InAppPurchaseObserver`
    class comes into play. Remember how the `inappObserver` property was created to
    reference that class? By assigning `inappObserver` as the `SKPaymentTransactionObserver`,
    your project’s `InAppPurchaseObserver` class can monitor the transaction status
    of the `SKPaymentQueue` after a payment request has been sent to it.


    Since payment transactions are not lost when the app quits, you may want to assign
    your observer to the payment queue when your app launches, so that any existing
    transactions can resume being monitored and processed the next time your app is
    run. Why would this be important? One possible scenario is that the user receives
    a phone call in the middle of making a purchase. After the call, when the user
    returns to your app, the transaction can be resumed.


    When the payment request is delivered, the App Store prompts the user to confirm
    the purchase and then enter an iTunes account login. When testing your own app
    in this sandbox environment, this is where you select Use Existing Account and
    enter your Test User account e-mail address and password (see [Figure 8-19](#9781430262381_Ch08.xhtml#Fig19)).


    ![9781430262381_Fig08-19.jpg](images/9781430262381_Fig08-19.jpg)


    [Figure 8-19](#9781430262381_Ch08.xhtml#_Fig19). You’re asked to confirm your
    purchase request (left). After selecting the Buy button, you’re then prompted
    to sign in as a Test User via the Use Existing Account button (right)


    ## Step 4: Receive Payment Status


    After the user either cancels or confirms the purchase, the transaction status
    is sent back to your `InAppPurchaseObserver` class. Now it’s time to add code
    to that class to handle this job. Open the `InAppPurchaseObserver.h` header file,
    and update the code as follows:


    ```

    #import <Foundation/Foundation.h>

    #import <StoreKit/StoreKit.h>

    ```'
