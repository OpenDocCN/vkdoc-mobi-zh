  trans: '

    由于大多数博客软件（例如 WordPress）都会自动为最新博文生成 RSS 订阅源，许多博主除了提供必要的订阅链接外，并没有在订阅源上投入太多精力。尽管
    Twitter 等令人兴奋的新平台似乎让这种基于 XML 的标准热度有所下降，但 RSS 仍然是一种非常强大的信息分发机制。要真正利用 RSS 满足你的营销需求，我强烈建议你注册谷歌的免费服务
    FeedBurner，其网址为 `http://www.feedburner.com`。


    乍一看，FeedBurner 可能只是一个华而不实的分析服务，用来追踪谁在订阅你的 RSS 订阅源，以及使用了哪些浏览器或客户端应用来阅读它。虽然 RSS
    数据监控非常有用，但 FeedBurner 的功能远不止于此。


    FeedBurner 的其中一项功能是 `FeedFlare`，它能在你的订阅源中插入社交媒体链接。这样一来，RSS 订阅者只需点击一下，就可以在 Digg、Delicious、Facebook
    和其他社交网站上分享单篇博文。除此之外，当你发布新博文时，FeedBurner 会自动向所有主要的订阅源聚合器和搜索引擎发送 ping 通知。


    该服务还提供 JavaScript 小部件，可以轻松地在任何网站上以 HTML 形式发布订阅源内容，这对于那些希望转载你的博客内容但又不想麻烦地解析 XML
    的第三方网站来说非常理想。虽然有些博主可能担心他人会如何重新利用自己的内容，但既然你正在用博客和 RSS 订阅源来营销你的 iOS 应用，那么你的订阅源被转载得越广，你的应用获得的曝光就越多。这对你来说是一个双赢的局面，因为你的首要目标是尽可能多地为
    App Store 中的应用产品页面引流。


    不过，目前最有价值的功能是 FeedBurner 的免费邮件订阅服务。这项服务能让你的网站访客通过电子邮件接收你的博文。想想看，你无需在自己的服务器上安装和维护复杂的邮件列表软件来管理订阅者并发送广播邮件，FeedBurner
    会为你代劳所有这些工作。你甚至不需要浪费时间配置 SQL 数据库和构建邮件模板。只需发布一篇博文，它就会被添加到你的 RSS 订阅源中，然后通过电子邮件发送给你的邮件订阅者。我刚才是不是提到这是免费的？你甚至可以使用自己的
    Logo 和字体样式来自定义邮件。利用 FeedBurner 提供的简单易用的“复制粘贴”式邮件订阅 HTML 表单代码，人们可以轻松地从你自己的网站进行订阅。


    但是，如果你不想让每一篇博文都发送到邮件列表怎么办？如果你需要对邮件设计有更多控制权怎么办？如果要从以前的营销活动中导入现有邮件列表又该如何？为了满足这些需求，你需要一个更强大的邮件营销解决方案。


    ## 邮件新闻订阅列表


    你是否想通过电子邮件直接将新闻、公告和特别优惠发送给你的客户？如果你和我一样，可能不想费心去摆弄自己的邮件列表软件，也不愿应对咄咄逼人的垃圾邮件过滤器、保护
    SQL 数据库安全以防黑客入侵以及其他耗时的麻烦事。幸运的是，一些易于使用且价格实惠的第三方邮件营销服务可以处理所有这些繁重的工作。


    邮件营销服务可以处理以下任务：


    -   在其安全的服务器上维护你的邮件列表数据库和邮件营销活动

    -   支持自定义 HTML 格式的邮件

    -   邮件列表的导入和导出

    -   提供广泛的基于 Web 的管理后台，并为每次营销活动提供全面的分析报告

    -   提供自定义的 HTML 表单代码，供你复制粘贴到自己的网站上，方便访客订阅


    这些服务与主要的互联网服务提供商（ISP）和电子邮件供应商签订了“白名单”协议，有助于防止你的营销活动被服务器端的垃圾邮件过滤器拦截。仅此一点就使得这些第三方服务成为比安装自己的
    PHP/MySQL 解决方案更好的选择。


    目前有数百家邮件营销公司，但以下是经过筛选、在软件开发人员中颇受欢迎的服务：


    -   Campaign Monitor（`http://www.campaignmonitor.com`）

    -   MailChimp（`http://www.mailchimp.com`）

    -   Constant Contact（`http://www.constantcontact.com`）

    -   iContact（`http://www.icontact.com`）

    -   StreamSend（`http://www.streamsend.com`）

    -   Vertical Response（`http://www.verticalresponse.com`）


    我对 Campaign Monitor 的经验最为丰富，它提供了对邮件推送外观和感觉的完全设计控制权。我最喜欢 Campaign Monitor 的一点是，你只需按邮件营销活动付费；没有月费。所以，如果我这月没有发送邮件营销活动，我就不需要支付任何费用。当我发送营销活动时，费用也很合理。对于拥有庞大邮件列表但发送邮件非常少的开发者来说，这是一个很好的解决方案。


    对于订阅者少于 2,000 人的低用量账户，MailChimp 免费提供其服务。随着订阅者基础的增长，你可以升级到更大容量的方案。MailChimp 还提供
    `ChimpKit`，这是 MailChimp API 的一个 Objective-C 封装，让你能够直接在 iOS 应用内提供一个邮件新闻通讯注册表单！


    无论你选择免费的 FeedBurner 邮件订阅服务，还是更全面的邮件营销解决方案，都请告知你的网站访客，每封邮件新闻通讯的底部都设有退订链接，以方便他们操作。


    在你的网站某处包含一个隐私政策的链接也很重要。人们已经厌倦了处理垃圾邮件，因此他们对提供自己的电子邮件地址变得谨慎起来。一份简单的隐私政策声明可以安抚网站访客，让他们知道你不会出售或与任何人分享他们的电子邮件地址。如果你不确定如何措辞，可以在线搜索
    `privacy policy`。你会找到数百个样本。只要确保遵守你所设定的任何隐私政策，以避免责任问题即可。撇开大多数国家现在都有严格的反垃圾邮件法律这一事实不谈，来自愤怒订阅者的负面口碑传播对你的业务造成的损害可能更大。


    如果邮件新闻通讯如此麻烦，为什么还要费心使用它们呢？面对咄咄逼人的垃圾邮件过滤器，它仍然是一种有效的分发机制吗？诚然，由于贪婪的垃圾邮件过滤器，相当一部分收件人可能永远看不到你的邮件。但电子邮件仍然是传递新闻的一个非常强大的渠道。


    虽然你可能只倾向于在 Twitter、Facebook 或你的博客上发布公告，但这依赖于用户在那里关注你并严格地查看你的最新消息。这将责任推给了你的受众，尽管你可能很警惕地阅读每一条推文和
    Facebook 更新，但大多数人不会。为什么要冒着你重要的帖子被忽略的风险呢？


    仍然有很多消费者更喜欢被动的方式。他们宁愿将请求的信息直接发送给自己，而不是被迫自己去寻找。关键是要在你的网站上提供尽可能多的沟通渠道，以便任何对你的 iOS
    应用感兴趣的人都能以他们选择的格式或平台接收相关新闻。


    ## 客户支持与联系信息


    虽然我会在第 11 章中更多地讨论客户支持选项，但这里我要提一下，你应该始终从应用的主网站链接到你的支持页面。至少，要给网站访客提供某种联系你的方式——无论是通过电子邮件还是
    HTML 表单。

    '
- fmt: '# Even Though the Desktop Version of iTunes and the iPad Version of the App
    Store Supply a Dedicated Active Link...


    Even though the desktop version of iTunes and the iPad version of the App Store
    supply a dedicated active link to your support site from your product’s App Store
    page, that’s not the case in the iPhone version of the App Store. The App Store
    on the iPhone lists only the web site URL for a selected application (see [Figure
    10-1](#9781430262381_Ch10.xhtml#Fig1)). And with more than 90 percent of all iPhone
    and iPod touch users browsing and downloading apps directly from their device,
    if they encounter a support issue, they’ll look up your web site in Mobile Safari
    in the hopes of finding online assistance. So, make life easier for both you and
    your customers by having your support page easily accessible from your app’s web
    site.


    ## Company Identity


    This may seem obvious if your app’s web page is part of your existing company
    site, but if you’re an independent developer who decides to build a stand-alone
    web site for just your iOS app, don’t forget to include your own business name
    and an About page.


    If you’re building only a cheap 99-cent novelty app that will soon be forgotten
    three months from now, then establishing a company identity may not matter (and
    if that were the case, you probably wouldn’t be reading this book). But if you’ve
    developed a rock-solid, niche application that sells for more than the average
    app price (such as $3.99 or higher), consumers will want to know you’re a serious
    developer with plans to support the app for the long haul before making their
    purchase decision.


    When people buy a higher-priced app, especially one that they may come to rely
    on daily, they’re really investing in the product’s future. You want your web
    site to exude a prosperous and confident professionalism. Seeing your business
    logo and reading your company/developer bio online can help give your customers
    peace of mind.


    ## Cross-Promotion of Your Other Products


    Are you trying to sell multiple software applications? If you’re driving traffic
    to your web site to promote a new iOS app, take advantage of this opportunity
    to also spotlight some of your other products, especially if they’re apps that
    would appeal to this same audience. That’s what Tap Tap Tap does at `http://www.taptaptap.com`.


    Tap Tap Tap’s web site was designed with cross-promotion as a central factor.
    Using a clever sushi menu theme, app icons for all of the products sit on a virtual
    wood table. Select an app, and its icon slides forward, revealing a full description,
    screenshots, video demos, and other related information. But the other app icons
    remain visible on the left. Click another, and the current app icon slides back
    into place, while the new selection slides forward (see [Figure 10-10](#9781430262381_Ch10.xhtml#Fig10)).
    This is all done within the same screen. It’s an elegant, animated design that
    was achieved with a sophisticated mix of Cascading Style Sheets (CSS) and JavaScript—no
    Flash.


    ![9781430262381_Fig10-10.jpg](images/9781430262381_Fig10-10.jpg)


    [Figure 10-10](#9781430262381_Ch10.xhtml#_Fig10). Tap Tap Tap utilizes a clever
    web site design that cross-promotes all of its iPhone apps within a single screen


    You can also cross-promote other products and services. Even though people came
    to your site interested in an iPhone or iPad app, they surely have other interests
    that may involve books, desktop software, related consulting services, and so
    on. But be very careful not to overpromote those other items, or you run the risk
    of appearing too ad-centric, pimping out your iOS app as bait. Also keep in mind
    that you don’t want to distract site visitors from your primary goal: convincing
    them to buy your iOS application in the App Store!


    ## Downloadable Extras


    People love freebies! And offering up fun downloads on your web site is an easy
    way to promote your app. For example, you might include Twitter avatar images,
    desktop backgrounds, and iPhone and iPad wallpaper.


    But just because you created a freebie does not necessarily mean your site visitors
    will want it. Since these are essentially digital advertisements for your product,
    you need to make them visually compelling enough for people to look at every time
    they turn on their computer or mobile device. People don’t want to stare at interface
    components or company logos, so if you’re promoting a productivity app, these
    kinds of image-based freebies may not be a good fit. But if your app is a game
    with cool scenery and characters, then the game’s visuals may lend itself quite
    well to promotional downloads like avatar icons and digital wallpaper.


    ## Before Selling, Start Collecting


    Your iOS app is not yet live in the App Store, so including a buy button and App
    Store identity badge on your site (as in the Breadcrumbs example shown in [Figure
    10-4](#9781430262381_Ch10.xhtml#Fig4)) is a tad premature. Although it is good
    to have those two images designed and ready to go, you’ll want to leave them off
    your web page for now.


    During this prerelease stage, use your web site to grow your online audience.
    You could keep it simple and just ask people to follow you on Twitter or visit
    your Facebook Page to stay informed on the latest news about your forthcoming
    iOS app. But if you’re not yet a known developer, there may not be a compelling
    reason for people to follow you. They may just decide to check your site later.
    Of course, in time, memory fades, and they may not remember to come back. By placing
    the ball in their court, you’re risking the loss of those potential app sales.


    Here’s where offering that free e-mail newsletter can really benefit your prerelease
    marketing efforts. Interested site visitors can subscribe, and then a month later
    after they have forgotten about your app, you can send them an e-mail announcing
    its availability in the App Store!


    Don’t rely on the small subscription link located in your navigation menu or in
    another section of the site. Replacing the buy button and App Store identity badge,
    position the subscription form front and center on your app’s web page. Invite
    visitors to submit their e-mail address to be the first notified when your application
    becomes available in the App Store (see [Figure 10-11](#9781430262381_Ch10.xhtml#Fig11)).


    ![9781430262381_Fig10-11.jpg](images/9781430262381_Fig10-11.jpg)


    [Figure 10-11](#9781430262381_Ch10.xhtml#_Fig11). During the prerelease stage,
    replace the buy button and App Store identity badge with a Notify Me When It’s
    Available e-mail subscription form


    What’s convenient about this strategy is that nothing else on the web page must
    be moved or modified. Once your app is live in the App Store, you can easily swap
    out that prominent Notify Me… e-mail form, adding back the buy button and App
    Store identity badge (as in [Figure 10-4](#9781430262381_Ch10.xhtml#Fig4)).


    ## Why Site Compatibility with Mobile Safari Is So Important


    AdMob reported that a whopping 93 percent of iPhone users browse and purchase
    apps directly from the App Store on their mobile devices, while only a meager
    7 percent do so from the desktop version of iTunes. Since it’s highly possible
    that consumers may check out your app’s official site before making a purchase
    decision, it’s in your best interest to make sure your web site is compatible
    with the Mobile Safari browser in iOS.


    Mobile Safari uses the powerful WebKit engine under the hood, so it has extensive
    support for JavaScript, CSS, and other modern web standards. In practice, most
    sites actually render quite well in Mobile Safari. But you can use a few optimization
    tricks to make your site even more enjoyable for iOS users:


    *   Control page scale with the `viewport` meta tag.

    *   Detect the platform from the browser’s user agent.

    *   Work around Mobile Safari’s lack of Flash support.

    *   Enhance home screen bookmarking.


    ## “I’m Ready for My Close-up, Mr. Viewport”'
  raw: 'Even though the desktop version of iTunes and the iPad version of the App
    Store supply a dedicated active link to your support site from your product’s
    App Store page, that’s not the case in the iPhone version of the App Store. The
    App Store on the iPhone lists only the web site URL for a selected application
    (see [Figure 10-1](#9781430262381_Ch10.xhtml#Fig1)). And with more than 90 percent
    of all iPhone and iPod touch users browsing and downloading apps directly from
    their device, if they encounter a support issue, they’ll look up your web site
    in Mobile Safari in the hopes of finding online assistance. So, make life easier
    for both you and your customers by having your support page easily accessible
    from your app’s web site.


    Company Identity


    This may seem obvious if your app’s web page is part of your existing company
    site, but if you’re an independent developer who decides to build a stand-alone
    web site for just your iOS app, don’t forget to include your own business name
    and an About page.


    If you’re building only a cheap 99-cent novelty app that will soon be forgotten
    three months from now, then establishing a company identity may not matter (and
    if that were the case, you probably wouldn’t be reading this book). But if you’ve
    developed a rock-solid, niche application that sells for more than the average
    app price (such as $3.99 or higher), consumers will want to know you’re a serious
    developer with plans to support the app for the long haul before making their
    purchase decision.


    When people buy a higher-priced app, especially one that they may come to rely
    on daily, they’re really investing in the product’s future. You want your web
    site to exude a prosperous and confident professionalism. Seeing your business
    logo and reading your company/developer bio online can help give your customers
    peace of mind.


    Cross-Promotion of Your Other Products


    Are you trying to sell multiple software applications? If you’re driving traffic
    to your web site to promote a new iOS app, take advantage of this opportunity
    to also spotlight some of your other products, especially if they’re apps that
    would appeal to this same audience. That’s what Tap Tap Tap does at `http://www.taptaptap.com`.


    Tap Tap Tap’s web site was designed with cross-promotion as a central factor.
    Using a clever sushi menu theme, app icons for all of the products sit on a virtual
    wood table. Select an app, and its icon slides forward, revealing a full description,
    screenshots, video demos, and other related information. But the other app icons
    remain visible on the left. Click another, and the current app icon slides back
    into place, while the new selection slides forward (see [Figure 10-10](#9781430262381_Ch10.xhtml#Fig10)).
    This is all done within the same screen. It’s an elegant, animated design that
    was achieved with a sophisticated mix of Cascading Style Sheets (CSS) and JavaScript—no
    Flash.


    ![9781430262381_Fig10-10.jpg](images/9781430262381_Fig10-10.jpg)


    [Figure 10-10](#9781430262381_Ch10.xhtml#_Fig10). Tap Tap Tap utilizes a clever
    web site design that cross-promotes all of its iPhone apps within a single screen


    You can also cross-promote other products and services. Even though people came
    to your site interested in an iPhone or iPad app, they surely have other interests
    that may involve books, desktop software, related consulting services, and so
    on. But be very careful not to overpromote those other items, or you run the risk
    of appearing too ad-centric, pimping out your iOS app as bait. Also keep in mind
    that you don’t want to distract site visitors from your primary goal: convincing
    them to buy your iOS application in the App Store!


    Downloadable Extras


    People love freebies! And offering up fun downloads on your web site is an easy
    way to promote your app. For example, you might include Twitter avatar images,
    desktop backgrounds, and iPhone and iPad wallpaper.


    But just because you created a freebie does not necessarily mean your site visitors
    will want it. Since these are essentially digital advertisements for your product,
    you need to make them visually compelling enough for people to look at every time
    they turn on their computer or mobile device. People don’t want to stare at interface
    components or company logos, so if you’re promoting a productivity app, these
    kinds of image-based freebies may not be a good fit. But if your app is a game
    with cool scenery and characters, then the game’s visuals may lend itself quite
    well to promotional downloads like avatar icons and digital wallpaper.


