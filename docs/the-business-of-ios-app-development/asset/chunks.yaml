- fmt: 'Once upon a time, developers used to be able to make quick changes to the
    availability date after being notified that their app had been approved, which
    allowed them to control when their app appeared in that valuable list. This enabled
    developers to closely time the launch of press releases with the product’s visibility
    in the App Store’s new releases list. Unfortunately, Apple has since made changes
    to the release date reflected in the App Store, rendering that little trick obsolete.
    Now, the actual release date of your app is the date it is approved by Apple.


    So then why does Apple provide developers with an option to set the availability
    date? This still gives you control over when your app goes live in the App Store.
    For example, if Apple approves your app on March 1, but you would prefer to debut
    in the App Store on March 22 to coincide with your press release and marketing
    efforts, then set the availability date for March 22. But keep in mind that the
    app’s release date in the App Store will state March 1, so you’ll have missed
    that initial exposure in the new releases list, since newer releases will have
    already pushed your app much farther down the list.


    If appearing near the top of that new releases list is more important to you than
    a preplanned launch date, then set your availability date to a distant day in
    the future (such as a few months ahead), way beyond the estimated approval date.
    Unless your app’s review process takes an abnormally long time, Apple’s approval
    date will typically be earlier than your future release date. Then after you’ve
    completed the submission, set your `iTunes Connect` user profile’s preferences
    to notify you via e-mail when your app status changes to `Ready for Sale`. This
    way, if you regularly check your e-mail, the moment you’re notified of your app’s
    approval, you can quickly log in to `iTunes Connect` and change your availability
    date to Apple’s approved date. It then will instantly appear in the App Store
    and benefit from the fleeting exposure in the new releases list. This e-mail notification
    also serves as a nice heads-up, so you can send out your press release closely
    following the product’s availability in the App Store.


    ## Price Tier


    For paid applications, you’ll also need to choose a price tier. Since regional
    App Stores support various currencies, the drop-down menu forces you to choose
    a tier instead of an actual price.


    When you choose a tier, the corresponding pricing is automatically displayed.
    And if you click the `See Pricing Matrix` link, a table appears, revealing not
    only the currency conversions in several regions, but also what your proceeds
    would be after Apple subtracts its 30 percent fee.


    ## Educational Discounts and Regional Availability


    By default, your application will be available worldwide, unless you choose to
    select only specific individual countries. You can also elect to participate in
    Apple’s educational discount program, which enables educational institutions to
    purchase volume quantities of your app at a discount of 50 percent of the App
    Store price.


    Clicking the `Continue` button on the `Rights and Pricing` page will bring you
    to the `Version Information` page.


    ## Step 3: Submit Your App’s Metadata


    Of all the forms in the app submission process, you’ll probably spend the most
    time on the `Version Information` page, specifying all of your app’s metadata
    (see [Figure 11-12](#9781430262381_Ch11.xhtml#Fig12)). Fortunately, you should
    have already prepared many of the requested elements, such as the app description,
    keywords, and web site URL.


    ![9781430262381_Fig11-12.jpg](images/9781430262381_Fig11-12.jpg)


    [Figure 11-12](#9781430262381_Ch11.xhtml#_Fig12). Of all the screens in the submission
    process, the `Version Information` page is by far the longest, but fortunately,
    you should already have many of these items prepared, such as the app description,
    keywords, and web site URL.


    As you can see from [Figure 11-12](#9781430262381_Ch11.xhtml#Fig12), it’s quite
    a long form, so let’s take a closer look at each item.


    ### Version Number


    This is a fairly self-explanatory field, listing your app’s version number, such
    as `1.0` or `1.3.1`. You should use the same version number as the value listed
    in your application `Info.plist` file’s `CFBundleVersion` property, so avoid including
    alpha characters such as “Beta 1.”


    Discrepancies between your actual app binary version and the version number you
    enter in this field might cause delays or problems during the app review process.


    ### Description


    The description you painstakingly wrote earlier in this chapter should be pasted
    into this field. Just remember that the desktop iTunes and the iPad versions of
    the App Store initially display only the first few lines of text, with a `More`
    link to read the rest of it. This makes those first few lines of text very important,
    so be sure to use that limited space wisely, explaining what your app does. Since
    you are allowed a generous maximum of 4,000 characters, use the rest of the available
    characters to list features and benefits, awards, testimonials, and other key
    selling points.


    `HTML` tags are not supported, but lines breaks and special Unicode characters
    are acceptable.


    ### Primary Category and Secondary Category


    You must choose a primary category where you want your app to be located in the
    App Store. Selecting a secondary category is optional, but can be beneficial as
    an alternative if Apple thinks your primary category choice is not appropriate
    based on your app’s functionality.


    If you choose `Games` as a category, then two more menus appear, allowing you
    to select two subcategories from the `Games` parent group, such as Action, Arcade,
    Board, Puzzle, Strategy, and other game genres.


    ### Keywords


    The keywords you crafted earlier in this chapter should be pasted into this field.
    As I’ve mentioned, whether or not you’re using multiword phrases for some of your
    keywords, it’s always recommended to separate them with commas for best results.


    ### Copyright


    List your copyright line as you want it displayed in the App Store. There’s no
    need to include the `©` symbol, since the App Store automatically places it before
    your copyright line. So, for example, submitting the line “2009 Electric Butterfly,
    Inc. All rights reserved.” would appear in the App Store as: “© 2009 Electric
    Butterfly, Inc. All rights reserved.”


    ### Contact Email Address


    Apple requires you to supply a contact e-mail address, but it won’t be posted
    in the App Store. It is only for Apple’s internal team in the event they need
    to contact you during the review process or while your app resides in the App
    Store.


    ### Support URL


    Apple requires all developers to provide an online support URL for each app listed
    in the App Store. Even though the desktop iTunes and iPad versions of the App
    Store include your support URL as an active link on your product’s App Store page,
    the iPhone version of the App Store includes only your app URL. With this in mind,
    you’ll want to make sure your support page is also easily accessible from your
    app’s web site.


    It’s important that your support URL points to a valid source for contacting you,
    since Apple will check its existence during the app review process. At the very
    least, give site visitors some way to contact you directly, whether by an e-mail
    link or by an HTML feedback form (if you would rather hide your e-mail address
    from spambots).


    To help reduce the flood of support queries and provide 24/7 assistance even when
    you’re offline, it’s always a good idea to post a list of frequently asked questions
    (FAQs), especially if you find yourself answering the same e-mail questions repeatedly.
    For iOS apps that enjoy an active and vibrant user community, self-hosting an
    online forum, such as the popular open source `phpBB` (`http://www.phpbb.com`),
    might be a beneficial addition to your support site.'
