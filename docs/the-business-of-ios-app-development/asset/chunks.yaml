  trans: '

    “我决定做个小小的实验，在《Flower Garden》中增加两种肥料选项：80 剂肥料售价 2.99 美元，200 剂肥料售价 5.99 美元，”诺埃尔说道。“每个捆绑包都能让您以更优惠的价格购买肥料。这与我看到的那些游戏中的标价相比仍微不足道，但我不想因为标上荒谬的高价捆绑包而疏远用户。”


    结果如何？根据销售数量，最受欢迎的应用内购买项目仍然是 99 美分的肥料选项，但也有不少顾客购买了另外两种肥料捆绑包。


    即使高价商品的销量不高，它们仍然可能占总收入的很大比例。诺埃尔的捆绑包实验取得了成功。仅肥料一项的应用内购买就占了《Flower Garden》总收入的惊人
    45%。


    在向不断增长的种子包产品系列中添加多种肥料捆绑包后，诺埃尔发现，《Flower Garden》的顶级用户在该游戏中的消费超过了 100 美元。


    只要应用内购买项目物有所值，并且用户持续喜爱该游戏，那么用户的消费金额就没有上限。


    诺埃尔指出了捆绑包对消耗性应用内购买非常有用的两个充分理由：选择权和承诺。他解释说：“提供不同级别的捆绑包让玩家在决定如何购买某样东西时有更多选择。而且，每当用户购买更大的捆绑包时，他们就会对你的游戏更加投入。他们会继续玩下去，以从这次购买中获得应有的价值。即使他们原本就有意回到你的游戏而不进行购买，这笔花费也会是一个很好的提醒。而让用户回到你的游戏正是这一切的核心。他们会探索更多游戏内容，更加着迷，进行更多的应用内购买，并向更多的朋友推荐你的游戏。”


    ## 交付与管理应用内购买


    应用内购买的内容可以内置于你的应用程序中，待购买后再解锁，也可以从远程服务器下载。选择哪种方法取决于你要交付的内容类型以及你的应用所需的扩展性。


    ### 解锁内置内容


    解锁内置内容是目前最简单的途径，需要的步骤少得多，且所有这些步骤都可以在你的应用内部完成。你无需维护服务器，也无需担心应用与服务器通信时的安全问题。只需与
    App Store 进行几次交互，购买的内容即可在你的应用中解锁（参见图 8-10）。


    ![9781430262381_Fig08-10.jpg](img/9781430262381_Fig08-10.jpg)


    图 8-10. 内置应用内购买交付模型


    如果你是 iOS 开发新手，图 8-10 中展示的流程可能看起来相当令人生畏，但实际上并没有那么复杂。诚然，配置应用以使用应用内购买涉及几个步骤，但不用担心。在本章后面，我将引导你完成整个设置过程以及一个基本
    Xcode 项目的创建，这样你就能确切地看到所有这些部分是如何组合在一起的。


    使用这种内置模型要求你所有的相关应用内购买内容都已嵌入应用中，并对用户隐藏。当顾客购买特定项目时，你的应用只需解锁其访问权限即可。这种方法非常适合提供集成的功能，例如游戏中的新关卡或效率应用中的附加功能，或者用于激活基于订阅的功能。


    Store Kit 并不支持通过从远程服务器下载的更新来“修补”你的应用二进制文件。如果你的应用要求购买的内容集成在应用包内，则应在提交到 App Store
    之前将其包含在你的应用中。之后，当顾客购买后，你的应用只需解锁这些内容即可。


    你的应用记录并记住已解锁内容的最简单方法是将信息存储在你的应用偏好设置中。当用户通过 iTunes 将设备与电脑同步时，这些设置会被备份。备份应用的偏好设置有助于防止购买记录丢失，即使应用在用户设备上被删除。你的应用需要记住哪些项目已被购买，以便用户下次运行你的应用时，已购买的内容仍然可以轻松访问。


    使用这种内置解锁模型的一个主要缺点是，如果你决定将来提供更多的应用内购买项目，你将需要提交一个包含新内容的、更新后的应用二进制文件到 App Store。


    ### 从你的服务器下载内容


    如果你在不断为你的应用添加新的应用内购买项目，推荐使用服务器下载方式。这需要更多的步骤，并给你带来相当多的服务器管理责任，但它为你的应用提供了最大的灵活性和未来增长的可能性（参见图
    8-11）。


    ![9781430262381_Fig08-11.jpg](img/9781430262381_Fig08-11.jpg)


    图 8-11. 基于服务器的应用内购买交付模型


    ComiXology 公司的 Comics 应用（本章前面介绍过）就是这种模型的完美范例。该应用会从服务器获取可用数字漫画的产品 ID 列表。当用户购买特定的数字漫画书时，应用会从服务器下载文件。该应用可以打开和查看用户已购买下载收藏中的任何选定数字漫画文件。


    这种方法使新的数字漫画每周都能作为应用内购买项目提供，而无需对实际的 Comics 应用进行任何更新。新的应用内购买项目会通过 iTunes Connect
    提交审核。一旦获批，ComiXology 只需将其产品 ID 添加到其服务器上的数据库中。然后，下次 Comics 应用检查新项目时，它会从服务器检索最新的新数字漫画列表。


    你不能通过从远程服务器下载的应用更新来修补你的应用二进制文件。如果你的应用要求购买的内容集成在应用包内，那么从你的服务器交付购买内容就不是合适的途径。你需要使用内置模型，在提交到
    App Store 之前将内容嵌入你的应用中。然后，在顾客购买后，你的应用只需解锁这些内容即可。


    如果你计划向不仅仅是 iOS 用户交付相同的内容，那该怎么办？如果你允许顾客在多个平台上访问他们购买的内容，例如通过 iPhone、安卓手机、网页浏览器等，那么推荐使用基于服务器的模型。这样一来，所有内容和顾客记录都可以在一个中心位置（例如你服务器上的一个数据库）轻松管理，所有支持的设备都可以连接到该位置。


    从服务器下载内容的另一个好处是，它给了你灵活性，可以在提供应用内购买产品的同时，也提供免费项目。如果顾客选择了一个免费项目，你的应用可以直接绕过应用内购买流程，直接从你的服务器下载该项目。如果你的用户知道你的应用虚拟商店中经常提供免费内容，这将激励他们更频繁地浏览你的附加产品，并可能增加应用内购买项目的销量。

    '
- fmt: '基于服务器的模型的一个主要缺点是，Store Kit 没有提供任何与你的服务器进行通信的基础设施。你需要自己开发和实现自定义的服务器端应用程序，以便与你的
    iOS 应用进行交互。


    不过，Store Kit 确实提供了一种方法，让你的服务器能够验证收到的交易收据。这个额外的验证层是一个推荐的安全机制，有助于防止你的基于服务器的下载内容被非法盗版。当你的
    iOS 应用通知服务器某笔购买已成功完成时，它应该向服务器发送一个交易收据。正如我将在本章后面详细讨论的那样，当应用内购买交易完成时，App Store 会向你的
    iOS 应用返回一个交易收据。通过将此交易收据发送到你的服务器，你的服务器就获得了所需的数据，以便通过 JavaScript Object Notation（JSON）与
    App Store 通信来验证购买。这可以防止黑客欺骗你的服务器，让其提供从未被合法购买的内容的免费下载。这在处理使用越狱设备的客户时是一个巨大的优势。拥有越狱设备的用户可以免费获得任何应用内购买——如果它已经存在于当前应用中——通过使用内置内容解锁来实现。如果你的应用内购买涉及虚拟货币，或者能够以某种方式为用户提供优势，请确保在你的服务器上下载这些内容。


    如果你不是一个有经验的 web 开发者，那么创建自定义 web 应用和服务器端基础设施来与你的 iOS 应用进行通信，至少可以说会令人感到畏缩。这种基于服务器的模型还将可靠的可扩展性和安全性的负担放在了你的肩上。如果你的应用拥有庞大的用户群，那么测试你的服务器以承受大量流量和潜在的安全威胁是至关重要的。与服务器相关的问题不仅会影响你的
    iOS 应用的感知性能质量，还会影响你的商业声誉（以及责任）。


    **注意**：如果你对基于服务器的模型感兴趣，Apple 提供了一个全面的教程，介绍如何通过 JSON 验证应用内购买交易。请阅读官方《应用内购买编程指南》中的“验证
    Store 收据”部分，该指南位于以下 URL：`http://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/StoreKitGuide/`。


    ## 在云端寻找帮助


    我们中的许多人是软件程序员，最习惯在 Xcode 中编写 Objective-C 代码。如果仅仅是花无数时间学习、开发和维护 web 应用以及昂贵服务器系统的想法就让你大汗淋漓，那么请放心。如果你需要为应用内购买采用基于服务器的下载模型，有几家第三方服务提供了全面的应用内购买支持：


    *   Urban Airship（`http://urbanairship.com`）

    *   Push.IO（`http://push.io/`）

    *   Burstly（`http://www.burstly.com`）

    *   iLime:Purchase（`http://www.ilime.com/in-app-purchase/`）

    *   dodaii（`http://dodaii.com/en/`）

    *   Parse（`http://parse.com`）


    这些第三方服务负责处理相关的服务器管理难题，例如可扩展性、安全性、性能监控、App Store 收据验证、内容交付以及应用集成。Urban Airship
    甚至为你提供了一个方便、即用的商店界面 UI，以及在你的应用中提供免费下载的能力（这两项目前均未通过 Apple 的 Store Kit 框架提供）。


    除非你有令人信服的理由自己托管、排除故障和管理自定义 web 应用及服务器，否则让专家来处理这种后端架构将为你节省时间和金钱（并有助于减轻那些压力引起的头痛）。这能让你专注于你最热爱的事情：创建应用。


    ## 在 iTunes Connect 中配置应用内购买


    在本章后面，我们将在 Xcode 中编写一个应用内购买示例。为此，你需要创建一个 iTunes Test User 账户和你的应用内购买项目。这两项都需要在
    iTunes Connect 中在线创建。如前所述，应用内购买项目是作为独立产品添加到 iTunes Connect 中的，因此在你测试购买它们之前，需要先创建它们。


    ### 设置 iTunes 测试用户账户


    为什么需要一个测试用户账户？你希望在将应用提交到 App Store 之前，全面测试其应用内购买功能。使用测试用户账户可以让你进行测试购买，而无需实际付费。呼！这绝对是个好消息。现在你可以随心所欲地进行所有应用内购买测试，而无需担心在这个过程中掏空腰包。


    登录到位于`https://itunesconnect.apple.com`的 iTunes Connect。在 iTunes Connect 主页上，点击“Manage
    Users”链接，然后选择用户类型“Test User”（参见 [Figure 8-12](#9781430262381_Ch08.xhtml#Fig12)）。在“Manage
    Test Users”页面上，点击“Add New User”按钮。


    ![9781430262381_Fig08-12.jpg](images/9781430262381_Fig08-12.jpg)


    [Figure 8-12](#9781430262381_Ch08.xhtml#_Fig12). 在 iTunes Connect 的“Manage Users”部分添加一个新的测试用户账户


    填写所需的表单字段时，请确保使用一个有效但未与任何现有 iTunes 账户关联的电子邮件地址。这一点非常重要。使用一个已分配给 iTunes Connect
    或 iTunes Store 账户的电子邮件地址将使你的测试用户账户失效。此外，你也不希望你的测试购买意外地被收费到一个现有且已启用信用卡的 iTunes
    账户上。


    创建新的测试用户账户后，你可以在 iTunes Connect 的“Manage Users”部分查看或删除它。似乎没有办法编辑现有的用户账户，因此如果你想修改电子邮件地址或密码，你需要删除该测试用户账户，然后创建一个新账户来替换它。


    ### 创建应用内购买项目


    既然你已经有了一个测试用户账户，下一步就是将你的应用内购买项目作为独立产品添加到 iTunes Connect 中。


    你可以在 iTunes Connect 的“Manage Your Applications”部分中的应用列表里，或者在“Manage Your In-App
    Purchases”部分中创建应用内购买项目。如果你的 iTunes Connect 中没有列出“Manage Your In-App Purchases”，那么你可能尚未向
    iTunes Connect 提交你的付费应用程序合同，而这是创建应用内购买项目所必需的。


    只有当你在 iTunes Connect 中已经有一个应用列表时，iTunes Connect 才会允许你添加新的应用内购买项目。这样，在创建应用内购买项目时，你可以适当地将列出的应用分配为其父级应用。但如果这是你的第一个应用呢？别担心。测试应用内购买并不要求你的应用已经在
    App Store 中。但是，为了创建和测试应用内购买项目，你必须先将你的应用信息添加到 iTunes Connect，并为该应用分配一个唯一的捆绑包 ID（`bundle
    ID`）。


    **注意**：捆绑包 ID（`bundle ID`）基于你已在 iOS 配置门户中创建的应用 ID（`app ID`）。为了让应用内购买在你的应用中正常工作（即使在测试期间），你必须使用一个已启用应用内购买功能的特定应用
    ID。不要使用通用的通配符应用 ID（包含星号），例如默认团队配置描述文件中找到的那个。你还需要根据该应用 ID 和你将用于测试 Xcode 项目的应用内购买的
    iOS 设备生成一个配置描述文件。如果你不熟悉在在线 iOS 配置门户中创建应用 ID 和配置描述文件的过程，请阅读 [Chapter 9](#9781430262381_Ch09.xhtml)
    中的详细教程。'
  raw: 'The big drawback to the server-based model is that Store Kit does not provide
    any kind of infrastructure for communicating with your server. It’s up to you
    to develop and implement your own custom server-side applications for interacting
    with your iOS app.


    The Store Kit does offer a method for your server to verify a received transaction
    receipt. This added verification layer is a recommended security mechanism to
    help prevent piracy of your server-based downloads. When your iOS app notifies
    your server that a purchase was successfully completed, it should send a transaction
    receipt to the server. As I’ll discuss in greater detail later in this chapter,
    when an In-App Purchase transaction is finished, the App Store returns a transaction
    receipt to your iOS app. By sending this transaction receipt to your server, you’ve
    now given your server the data needed to communicate with the App Store via JavaScript
    Object Notation (JSON) to verify the purchase. This prevents hackers from tricking
    your server into granting free downloads of content that were never legitimately
    purchased. This is a big plus when dealing with customers who have jail-broken
    devices. A user with a jail-broken device can get any in-app purchase for free—if
    it is already residing in the current app—by using the unlocking built-in content.
    If your in-app purchases are for virtual currency or have some way of giving a
    user an advantage, make sure to download the content on your servers.


    If you’re not an experienced web developer, the prospect of creating custom web
    applications and server-side infrastructure for communicating with your iOS app
    can seem overwhelming, to say the least. This server-based model also puts the
    burden of reliable scalability and security on your shoulders. If your app enjoys
    a large customer base, testing your server to withstand a lot of traffic and potential
    security threats is essential. Server-related problems affect not only the perceived
    performance quality of your iOS app, but also your business reputation (and liability).


    **Note**  If you’re interested in the server-based model, Apple provides a comprehensive
    tutorial on verifying In-App Purchase transactions via JSON. Read the “Verifying
    Store Receipts” section of the official *In-App Purchase Programming Guide*, located
    online at the following URL: `http://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/StoreKitGuide/`.


    Finding Help in the Cloud


    Many of us are software programmers, feeling most comfortable when coding Objective-C
    in Xcode. If just the idea of spending countless hours learning, developing, and
    maintaining web applications and expensive server systems makes you break out
    in a sweat, then rest easy. If you need to employ a server-based download model
    for your In-App Purchases, several third-party services offer comprehensive In-App
    Purchase support:


    *   Urban Airship (`http://urbanairship.com`)

    *   Push.IO (`http://push.io/`)

    *   Burstly (`http://www.burstly.com`)

    *   iLime:Purchase (`http://www.ilime.com/in-app-purchase/`)

    *   dodaii (`http://dodaii.com/en/`)

    *   Parse (`http://parse.com`)


    These third-party services take care of the related server management hassles,
    such as scalability, security, performance monitoring, App Store receipt verification,
    content delivery, and app integration. Urban Airship even supplies you with a
    convenient, ready-to-use storefront UI and the ability to deliver free downloads
    within your app (both not currently offered through Apple’s Store Kit framework).


    Unless you have some compelling reason to host, troubleshoot, and manage custom
    web applications and the server yourself, letting the experts handle this back-end
    architecture will save you time and money (and help alleviate those stress-induced
    headaches). This allows you to stay focused on what you love doing most: creating
    apps.


    Configuring In-App Purchase in iTunes Connect


    Later in this chapter, we’ll program an In-App Purchase example in Xcode. For
    that, you need to create an iTunes Test User account and your In-App Purchase
    items. You create both online in iTunes Connect. As previously mentioned, In-App
    Purchase items are added to iTunes Connect as individual products, so they need
    to be created before you can test purchasing them.


    Setting Up an iTunes Test User Account


    Why do you need a Test User account? You’ll want to test your application’s In-App
    Purchase functionality extensively before submitting it to the App Store. Using
    a Test User account will enable you to perform test purchases without actually
    getting billed for them. Whew! That’s definitely good news. Now you can do all
    the In-App Purchase testing you want without worrying about draining your pocketbook
    in the process.


    Log into iTunes Connect at `https://itunesconnect.apple.com`. On the main iTunes
    Connect page, click the Manage Users link, and then select the user type Test
    User (see [Figure 8-12](#9781430262381_Ch08.xhtml#Fig12)). On the Manage Test
    Users page, click the Add New User button.


    ![9781430262381_Fig08-12.jpg](images/9781430262381_Fig08-12.jpg)


    [Figure 8-12](#9781430262381_Ch08.xhtml#_Fig12). Adding a new Test User account
    within the Manage Users section of iTunes Connect


    When completing the required form fields, be sure to use an e-mail address that
    is valid but is not associated with any existing iTunes accounts. This is very
    important. Using an e-mail address that is already assigned to an iTunes Connect
    or iTunes Store account will invalidate your Test User account. Plus, you don’t
    want your test purchases to accidentally be charged to an existing credit card–enabled
    iTunes account.


    After creating the new Test User account, you can view or delete it from within
    the Manage Users section of iTunes Connect. There does not appear to be a way
    to edit an existing user account, so if you want to modify the e-mail address
    or password, you’ll need to delete that Test User account and then create a new
    one to replace it.


    Creating In-App Purchase Items


    Now that you have a Test User account in place, the next step is to add your In-App
    Purchase item to iTunes Connect as its own individual product.


    You can create an In-App Purchase item within either your app listing in the Manage
    Your Applications section or the Manage Your In-App Purchases section of iTunes
    Connect. If Manage Your In-App Purchases is not listed in your iTunes Connect,
    then you probably have not yet submitted your Paid Applications Contract to iTunes
    Connect, which is required in order to create an In-App Purchase item.


    iTunes Connect will allow you to add a new In-App Purchase item only if you already
    have an app listed in iTunes Connect. This way, when you’re creating the In-App
    Purchase item, you can properly assign the listed application as its parent app.
    But what if this is your first app? Don’t worry. Testing In-App Purchase does
    not require your app to already be in the App Store. But in order to create and
    test In-App Purchase items, you must first add your app’s information to iTunes
    Connect and assign the app a unique bundle ID.


    **Note**  A bundle ID is based on an app ID you’ve already created in the iOS
    Provisioning Portal. In order for In-App Purchase to work within your app (even
    during testing), you must use an app-specific app ID that is enabled for In-App
    Purchase. Do not use general-purpose wildcard app IDs (that include asterisks)
    like the one found in the default Team Provisioning Profile. You’ll also need
    to generate a provisioning profile based on that app ID and the iOS device you’ll
    be using to test your Xcode project’s In-App Purchases. If you’re unfamiliar with
    the process of creating app IDs and provisioning profiles in the online iOS Provisioning
    Portal, read the extensive tutorial in [Chapter 9](#9781430262381_Ch09.xhtml).'
  trans: '

    基于服务器的模型的一个主要缺点是，Store Kit 没有提供任何与你的服务器进行通信的基础设施。你需要自己开发和实现自定义的服务器端应用程序，以便与你的
    iOS 应用进行交互。


    不过，Store Kit 确实提供了一种方法，让你的服务器能够验证收到的交易收据。这个额外的验证层是一个推荐的安全机制，有助于防止你的基于服务器的下载内容被非法盗版。当你的
    iOS 应用通知服务器某笔购买已成功完成时，它应该向服务器发送一个交易收据。正如我将在本章后面详细讨论的那样，当应用内购买交易完成时，App Store 会向你的
    iOS 应用返回一个交易收据。通过将此交易收据发送到你的服务器，你的服务器就获得了所需的数据，以便通过 JavaScript Object Notation（JSON）与
    App Store 通信来验证购买。这可以防止黑客欺骗你的服务器，让其提供从未被合法购买的内容的免费下载。这在处理使用越狱设备的客户时是一个巨大的优势。拥有越狱设备的用户可以免费获得任何应用内购买——如果它已经存在于当前应用中——通过使用内置内容解锁来实现。如果你的应用内购买涉及虚拟货币，或者能够以某种方式为用户提供优势，请确保在你的服务器上下载这些内容。


    如果你不是一个有经验的 web 开发者，那么创建自定义 web 应用和服务器端基础设施来与你的 iOS 应用进行通信，至少可以说会令人感到畏缩。这种基于服务器的模型还将可靠的可扩展性和安全性的负担放在了你的肩上。如果你的应用拥有庞大的用户群，那么测试你的服务器以承受大量流量和潜在的安全威胁是至关重要的。与服务器相关的问题不仅会影响你的
    iOS 应用的感知性能质量，还会影响你的商业声誉（以及责任）。


    **注意**：如果你对基于服务器的模型感兴趣，Apple 提供了一个全面的教程，介绍如何通过 JSON 验证应用内购买交易。请阅读官方《应用内购买编程指南》中的“验证
    Store 收据”部分，该指南位于以下 URL：`http://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/StoreKitGuide/`。


    ## 在云端寻找帮助


    我们中的许多人是软件程序员，最习惯在 Xcode 中编写 Objective-C 代码。如果仅仅是花无数时间学习、开发和维护 web 应用以及昂贵服务器系统的想法就让你大汗淋漓，那么请放心。如果你需要为应用内购买采用基于服务器的下载模型，有几家第三方服务提供了全面的应用内购买支持：


    *   Urban Airship（`http://urbanairship.com`）

    *   Push.IO（`http://push.io/`）

    *   Burstly（`http://www.burstly.com`）

    *   iLime:Purchase（`http://www.ilime.com/in-app-purchase/`）

    *   dodaii（`http://dodaii.com/en/`）

    *   Parse（`http://parse.com`）


    这些第三方服务负责处理相关的服务器管理难题，例如可扩展性、安全性、性能监控、App Store 收据验证、内容交付以及应用集成。Urban Airship
    甚至为你提供了一个方便、即用的商店界面 UI，以及在你的应用中提供免费下载的能力（这两项目前均未通过 Apple 的 Store Kit 框架提供）。


    除非你有令人信服的理由自己托管、排除故障和管理自定义 web 应用及服务器，否则让专家来处理这种后端架构将为你节省时间和金钱（并有助于减轻那些压力引起的头痛）。这能让你专注于你最热爱的事情：创建应用。


    ## 在 iTunes Connect 中配置应用内购买


    在本章后面，我们将在 Xcode 中编写一个应用内购买示例。为此，你需要创建一个 iTunes Test User 账户和你的应用内购买项目。这两项都需要在
    iTunes Connect 中在线创建。如前所述，应用内购买项目是作为独立产品添加到 iTunes Connect 中的，因此在你测试购买它们之前，需要先创建它们。


    ### 设置 iTunes 测试用户账户


    为什么需要一个测试用户账户？你希望在将应用提交到 App Store 之前，全面测试其应用内购买功能。使用测试用户账户可以让你进行测试购买，而无需实际付费。呼！这绝对是个好消息。现在你可以随心所欲地进行所有应用内购买测试，而无需担心在这个过程中掏空腰包。


    登录到位于`https://itunesconnect.apple.com`的 iTunes Connect。在 iTunes Connect 主页上，点击“Manage
    Users”链接，然后选择用户类型“Test User”（参见 Figure 8-12）。在“Manage Test Users”页面上，点击“Add New
    User”按钮。


    ![9781430262381_Fig08-12.jpg](img/9781430262381_Fig08-12.jpg)


    Figure 8-12. 在 iTunes Connect 的“Manage Users”部分添加一个新的测试用户账户


    填写所需的表单字段时，请确保使用一个有效但未与任何现有 iTunes 账户关联的电子邮件地址。这一点非常重要。使用一个已分配给 iTunes Connect
    或 iTunes Store 账户的电子邮件地址将使你的测试用户账户失效。此外，你也不希望你的测试购买意外地被收费到一个现有且已启用信用卡的 iTunes
    账户上。


    创建新的测试用户账户后，你可以在 iTunes Connect 的“Manage Users”部分查看或删除它。似乎没有办法编辑现有的用户账户，因此如果你想修改电子邮件地址或密码，你需要删除该测试用户账户，然后创建一个新账户来替换它。


    ### 创建应用内购买项目


    既然你已经有了一个测试用户账户，下一步就是将你的应用内购买项目作为独立产品添加到 iTunes Connect 中。


    你可以在 iTunes Connect 的“Manage Your Applications”部分中的应用列表里，或者在“Manage Your In-App
    Purchases”部分中创建应用内购买项目。如果你的 iTunes Connect 中没有列出“Manage Your In-App Purchases”，那么你可能尚未向
    iTunes Connect 提交你的付费应用程序合同，而这是创建应用内购买项目所必需的。


    只有当你在 iTunes Connect 中已经有一个应用列表时，iTunes Connect 才会允许你添加新的应用内购买项目。这样，在创建应用内购买项目时，你可以适当地将列出的应用分配为其父级应用。但如果这是你的第一个应用呢？别担心。测试应用内购买并不要求你的应用已经在
    App Store 中。但是，为了创建和测试应用内购买项目，你必须先将你的应用信息添加到 iTunes Connect，并为该应用分配一个唯一的捆绑包 ID（`bundle
    ID`）。


    **注意**：捆绑包 ID（`bundle ID`）基于你已在 iOS 配置门户中创建的应用 ID（`app ID`）。为了让应用内购买在你的应用中正常工作（即使在测试期间），你必须使用一个已启用应用内购买功能的特定应用
    ID。不要使用通用的通配符应用 ID（包含星号），例如默认团队配置描述文件中找到的那个。你还需要根据该应用 ID 和你将用于测试 Xcode 项目的应用内购买的
    iOS 设备生成一个配置描述文件。如果你不熟悉在在线 iOS 配置门户中创建应用 ID 和配置描述文件的过程，请阅读 Chapter 9 中的详细教程。

