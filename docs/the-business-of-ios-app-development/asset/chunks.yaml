- fmt: '# No matter how small, any publicity a third party gives your app is worthy
    of a thank-you.


    Expressing your gratitude with a sincere e-mail note also helps strengthen your
    relationship with those journalists and bloggers. Creating a dialogue with them
    keeps those valuable connections open, so that you can continue sending new app
    announcements their way.


    ## Issuing Promo Codes: Soliciting App Reviews on Influential Blogs and Review
    Sites


    For those sites that post app reviews, you won’t want to send them only a press
    release. You should also contact them about writing a review of your app, which
    requires a slightly modified pitch.


    With more than 1,000,000 apps in the App Store, everyone wants their app reviewed,
    so how do you ensure that your app stands out from the crowd? This is where having
    an established relationship with prominent bloggers and app reviewers (as discussed
    in [Chapter 10](#9781430262381_Ch10.xhtml)) can help move your app to the front
    of the queue. If you’ve already prepped them with sneak-preview screenshots and
    a video trailer of your app during your prerelease marketing efforts, and they
    were impressed, there’s a good chance they will want to review your app when it’s
    released.


    ### Providing Review Materials


    Your app review pitch should contain all the information from your press release,
    plus additional media materials such as a few screenshots, a video trailer, and
    the app’s icon—basically all of the elements that you included on your web site’s
    press page and/or downloadable press kit. Depending on the submission rules of
    each web site, reviewers may ask you to include screenshots and other app-related
    images as e-mail attachments or require URLs of your materials online. Some sites
    accept app review requests only through online web forms.


    Here’s a rundown of the materials that most app reviewers require:


    - **Your elevator pitch:** Why should reviewers care about your app or game? They
    need to be sold on why your new app is important to their readers. That elevator
    pitch I talked about crafting in [Chapter 10](#9781430262381_Ch10.xhtml) is proving
    to be quite useful in almost all of your marketing efforts—your web site, App
    Store text, press release, and now app review requests! Use your elevator pitch
    to help construct an appealing e-mail subject line and app description. Those
    two elements need to convey your passion and excitement as the creator of the
    app. Reviewers are extremely busy, so brevity is key. Like your press release,
    your app description should be short. And always remember to include your app’s
    price!


    - **Three to five screenshots:** Don’t inundate reviewers with too many screenshots.
    Pick three that best represent your app, and submit only those. If a site requires
    that you submit more than that, send the five screenshots that you had uploaded
    to the App Store, since those were obviously picked as the best representations
    of your app.


    - **Video trailer:** If you’ve produced a video trailer that shows the app or
    game in action, always include a URL link for viewing that as well. As I mentioned
    in [Chapter 10](#9781430262381_Ch10.xhtml), pay close attention to production
    value, because your video trailer is a direct reflection of your app’s quality.
    A well-produced video trailer can educate a reviewer in less than two minutes—less
    time than it would take to download and test-drive your app. This can often be
    the deciding factor on whether your app gets reviewed.


    - **App icon and App Store URL:** Although some reviewers don’t require your app
    icon image, you should always include a direct link to your app in the App Store.
    This enables them to check out your App Store listing and link to it from their
    review. Instead of copying the long, complicated URL from the App Store, it is
    often easier to provide Apple’s shortened iTunes link format of `http://itunes.com/apps/APPNAME`,
    replacing `APPNAME` with your application’s official App Store name. For example,
    the link to the popular Bump app is `http://itunes.com/apps/bump`. For those reviewers
    who do accept app icon images, submit the high-quality 512 × 512–pixel version
    for maximum flexibility.


    - **App web site URL:** Definitely include a link to your app’s web site so that
    reviewers can explore any additional online resources you offer. Don’t be disappointed
    if a review does not link to your web site. The iTunes Affiliate Program is a
    major revenue source for many review sites, so typically the review will only
    direct readers to your app in the App Store via an affiliate link.


    - **Contact information:** Just as with your press release, make sure to provide
    all your relevant contact information, such as your name, company name, e-mail
    address, phone number, Skype, IM, and Twitter. The more options you provide, the
    better. It’s surprising just how many developers forget to include these vital
    details. If a reviewer can’t reach you with additional questions, that alone could
    prevent a review from being written.


    - **Promo code:** Many sites tell you not to include a promo code with your app
    review request, stating that if they’re interested in reviewing the app after
    evaluating your submission, they will ask for a promo code. It’s nice that they
    don’t want to unnecessarily waste promo codes for apps they don’t plan on reviewing,
    but here’s a little secret. If you provide a promo code with your initial review
    request, you’ve made it incredibly convenient for them to download your app for
    free and try it immediately. Odds are they will use the supplied promo code, and
    your chances of getting reviewed just got a little better! Apple limits how many
    promo codes you can issue per app version, so you’ll want to use your promo codes
    sparingly. Supply them with the initial submission only to the most popular and
    influential review sites.


    Not sure what a promo code is? I explain what they are and how to acquire them
    in the following section.


    ## Obtaining Promo Codes


    Promo codes are special codes that you can use to provide someone with a free
    copy of your app. Promo codes work just like iTunes gift card codes and are redeemed
    in the same way. This is the easy and recommended way to provide journalists,
    bloggers, and app reviewers with a free download of your product.


    A promo code is assigned to a specific item in the iTunes Store. In this case,
    that’s your iOS application. If a user redeems a promo code provided by you, only
    the related app is downloaded free of charge. That promo code cannot be used to
    download any other item. And as with gift cards, once a promo code is redeemed,
    it can never be used again, which prevents piracy.


    Promo codes are not tied to an individual’s iTunes account, so treat them like
    cash. A promo code can be given to anyone you want.


    Apple grants you only 50 promo codes per app update. So if you use up all 50 promo
    codes for your 1.0 version, you won’t be able to request any more promo codes
    until after your next app update is uploaded and approved in the App Store.


    Although 50 may sound like a lot, these promo codes will disappear much faster
    than you might expect. Everyone loves free apps, so a lot of people will ask you
    for promo codes, but use them sparingly.


    Your first priority is making sure you have enough promo codes for the press and
    app reviews. After that, you can use remaining ones for giveaways and promotions.
    But I recommend always hanging onto a handful of promo codes, just in case an
    exciting app review or marketing opportunity presents itself down the road.


    So, how do you obtain promo codes for your iOS app? As with everything else associated
    with your App Store products, promo codes are managed from Apple’s iTunes Connect
    site. Log in to iTunes Connect at `http://itunesconnect.apple.com` and within
    the Manage Your Applications section, select your app. Then navigate to your app’s
    View Details page.'
