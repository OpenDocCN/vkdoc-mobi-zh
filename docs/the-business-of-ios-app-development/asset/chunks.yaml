    # 请务必按照章节顺序依次学习每个章节。你可能会惊喜地发现，沿途学到的小技巧甚至能帮助那些在 App Store 中沉寂数月之久的旧版应用焕发新生。


    ## 为客户端开发 iOS 应用


    本书不仅适用于希望在 App Store 中销售自有应用的人，也适用于为第三方公司开发应用的顾问。客户聘请你是看重你的专业能力，因此，任何能帮助客户在 App
    Store 中取得成功的事情，都将提升你对他们的价值。


    还有什么能比提供一站式交钥匙服务更能确保咨询合同的呢？从应用概念到发布，全程指导客户，同时提供代码和市场支持。通过在 iOS 开发服务列表中增加可选的市场/宣传服务包，你也能为自己创造新的收入机会！


    客户的成功直接影响着你与客户关系的成败。将本书中的商业解决方案融入你现有的工具集，这样你就能成为满足客户所有移动应用需求的不可或缺的超级英雄。


    任何人都能开发应用，但确保应用成功则需要一套特定的技能。如果你能向客户提供的不仅仅是源代码，你就将成为无价之宝。


    ## 准备好潜入了吗？


    在对当前 App Store 的概况有了大致了解后，显而易见，所有 iOS 开发者在通往成功的道路上都将面临若干挑战。作为程序员，解决问题是我们的日常工作，所以我相信你会享受这个过程。只要拼对正确的拼图，你或许就能在道路尽头找到那
    elusive 的金矿。嗯，应用销售！


    首先，把脑海里那些回响的 Objective-C 代码统统甩掉。接下来两章你需要一个清晰的头脑。别担心——你很快就会深入设计和开发问题。但在那之前，你需要做一些竞争研究和商业规划。所以，卷起袖子，戴上侦探帽，拿起放大镜，让我们开始吧。


    # 第 2 章


    ## 做好功课：分析 iOS 应用创意并开展竞争性研究


    那么，你觉得自己有一个 iPhone 或 iPad 应用的好主意？请确保它是一个*绝佳*的主意。再多的营销也无法帮助销售一个糟糕的应用。当然，你可能拥有出色的编码能力，能够开发出性能优化、高质量的应用，但如果它基于一个构思欠佳的概念，在当今拥挤的
    App Store 中它将毫无胜算。


    在本章中，你将学习如何运用一些传统的侦探工作来检验应用概念的可行性和市场潜力。分析竞争对手做对了什么——*更重要的是，做错了什么*——将为你提供所需的洞察力，从而真正完善和改进你的想法，使其成为一款与众不同的独特应用。


    即使做一点竞争性研究对你来说似乎很简单，也请继续读下去。你可能会惊喜地学到一些新技巧。我们还将探讨将目标瞄准 iPhone 以外的多个 iOS 设备的优势，以及通用应用面临的业务挑战。


    ### 满足需求


    人们购买软件是为了解决问题或满足需求。待办事项列表让我们保持条理清晰。天气和新闻应用让我们了解信息。游戏满足了我们对娱乐的渴望。即使是那些新奇的小玩意儿应用，也能通过让人们分享欢笑而建立联系，满足我们对被接纳的基本需求。虽然这些普遍的例子很容易识别和理解，但更具体需求呢？


    如果你正在考虑构建除游戏之外的东西，比如生产力或实用工具类应用，以下是需要考虑的几个因素：


    *   它是否聚焦于现有应用尚未解决的需求或问题？

    *   你的应用是否以显著简化移动体验的方式满足了该需求，使其比在台式电脑上执行相同任务更便捷？

    *   如果你的应用与现有其他应用类似，你可以添加哪些功能来解决竞争对手当前未满足的需求？


    ### 发现未被开发的市场


    成千上万的 iPhone 应用用户寥寥无几。早在 2009 年，苹果公司改变其第三方应用分析政策的之前（更多内容见第 7 章），流行的移动广告网络 `AdMob`
    报告称，在积极展示嵌入式 `AdMob` 广告的 iPhone 应用中，高达 54% 的应用各自拥有不到 1000 名用户。诚然，与 App Store 庞大的规模（无论当时还是现在）相比，2009
    年那份 `AdMob` 报告中的几千个应用只是一个很小的样本，但这仍然是一个令人震惊的警钟，尤其是当你考虑到 `AdMob` 网络中的大多数应用都是免费的时候。


    即使应用是免费的，也不能保证人们会使用它。如果你期望人们为你的应用付费，那么你提供一项人们迫切需要的服务、功能或体验就更加重要了——用户会感到有动力去下载它。


    虽然移动应用的价格相比传统桌面软件要便宜得多，但它们已不再是 App Store 早期那样的冲动消费品了。在过去的一年里，用户们的 iPhone、iPad
    和 iPod touch 中塞满了大量应用，以至于他们在选择下载哪些应用时变得越来越挑剔。


    想想你自己在购买新应用时的决策过程。你可能不会为一 张 12 美元的电影票而犹豫不决，但出于某种奇怪的原因，你更可能会深思熟虑是否要花区区 2.99 美元买一个
    iPhone 游戏。我也犯过同样的错误，尽管作为程序员，我完全清楚开发一个 iOS 应用需要付出多少辛勤工作。


    问题部分在于，为了提升销量并在 App Store 排行榜上获得更高排名，大量应用标价仅为 0.99 美元，这导致用户对应用价值的认知产生了扭曲。不幸的是，这种状况使用户习惯了以极低的价格期待极高的价值。为了突破这种购买障碍，你的应用*必须*与众不同，提供独特的体验和/或满足现有的需求。


    App Store 中有超过 100 万个应用， 乍一看，似乎所有原创想法都已被占用，而且这在很大程度上是事实。当苹果公司说“总有一个应用能解决你的问题”时，这家公司没有开玩笑，或者看起来如此。但是，时不时地，就会有先驱者带着一款新应用出现，让全世界的开发者们拍着自己的额头大喊：“我怎么没想到呢？”

