    99 美分且销量不持续走高，那么遵循这个模型来维持和发展您的业务将非常困难。


    使用应用内购买，如果您始终让客户可以选择购买额外的功能和附加内容，那么您就给了他们一种以其便利性和舒适度持续购买项目的方式。他们可以想花多少就花多少（或少花），这对您的利润非常有利。灵活性赢得人心！您收入的很大一部分将来自一小部分忠诚客户购买多个应用内购买项目。一个有效的、长期的商业模式是永远不会限制客户消费金额的模式。


    尽管免费增值应用包含应用内购买项目，但它们本身是免费下载的，这意味着您的应用只适合出现在 App Store 的“免费 App 排行榜”上。另一方面，同时发布免费精简版和付费版，能让您的产品有机会同时出现在
    App Store 的“免费 App 排行榜”和“付费 App 排行榜”上。


    诚然，出现在 App Store 排行榜上能带来更高的应用发现率和销量，但这对您业务生存的重要性已不像过去那样至关重要。Snappy Touch 的 Noel
    Llopis 在将他广受好评的应用 Flower Garden 集成应用内购买后，收入出现了指数级增长。


    “过去，在 App Store 上赚钱的常识性做法是不惜一切代价登上排行榜。应用内购买改变了这一切，”Noel 在他 `GamesFromWithin.com`
    网站最近的一篇博客文章中写道。“好的应用内购买可以让你的应用即使不在任何排行榜上也能盈利，并且是独立开发者最大的希望。”


    我确实相信应用内购买是移动销售的一条非常强大的途径，并且很快将成为在 iOS 平台上实现应用开发盈利的最流行方法。如果这种模式非常适合您的应用功能集和架构，那么敬请期待！第
    8 章将详细讨论何时以及如何实现应用内购买。


    精简版方法：口味更佳，热量更低


    本书后面的章节将致力于介绍如何制作通过应用内广告和应用内购买盈利的免费应用。在此，我们将介绍当您的产品创意最适合作为付费应用时的情况，并探讨如何使用免费精简版来推广您的付费应用。但在深入探讨有效的营销策略之前，让我们先了解一些开发精简版应用的指南。


    安全第一：精简版的限制


    为避免被 App Store 拒绝，请确保您的精简版遵循以下指南。尽管这些规则可能并非铁板钉钉，但这份清单似乎对当前 App Store 中无数成功的精简版都适用。

