- fmt: 'If Illustrator or Photoshop are too expensive for your budget, cheaper graphics
    tools are available. I suggest `Pixelmator`, which can be purchased on the Mac
    App Store. It has many capabilities similar to Photoshop and less of a learning
    curve. But if you plan on creating your own graphics for all your software products,
    web site, and marketing materials, I highly recommend investing in Adobe’s applications.
    If you buy the Creative Suite, you’ll get all of Adobe’s best design apps bundled
    together for a discounted package price.


    When submitting your app to the App Store, you’ll need to provide Apple with a
    large 1024 × 1024 pixel icon. So if you’re creating your icon in Photoshop, make
    sure your master design is at least that big. Since you’ll probably want to use
    your icon in marketing materials as well, you should strongly consider creating
    your master icon at an even bigger size. Keep in mind that print advertising (magazine
    ads, trade-show posters, and so on) should be at least 300 dots per inch (dpi),
    so if your biggest icon is only 1024 × 1024 pixels, your icon will be only 1.7
    inches when used in 300-dpi print materials.


    If you create your master icon at a large size of several inches, you’ll always
    be sure to have the right size for any occasion. You can always resize the icon
    smaller with great results, but you can’t increase the size of an existing bitmap-based
    icon without it looking terribly pixelated. If you’re creating a vector-based
    icon in Illustrator, resizing up or down is not an issue.


    Don’t make the mistake of previewing your app icon on only an iPhone 5s or the
    very latest iPod touch model. Almost everything looks nice on a crisp, high-resolution
    Retina display. Also make sure your design looks good at the smallest home screen
    app icon size, which is 60 × 60 pixels (non-Retina). The trick is for your icon
    to look professional and sophisticated, while remaining simplistic enough to display
    well in almost any size. This is no easy feat, especially for a non-designer,
    but we’ll take a stab at it by using a few clever little graphics tricks.


    **App Rejection Warning** *Your app icon and App Store icon must match!* Don’t
    try to work around icon legibility issues by crafting a complex, detailed 1024
    × 1024 icon, and then a vastly simplified version for the 60 × 60 app icon. The
    icons don’t need to be precisely identical, so you can do minor touch-ups to the
    small icon if the resize muddied a few elements. But when placed next to each
    other, both icons should look like the same design. If there’s a major difference
    between the two, your app risks being rejected by Apple’s app review team.


    Enough talk about rules and tools. Let’s dive into some design work!


    ## Designing a Custom App Icon


    You want to focus on something that is simplistic in nature but at the same time
    communicates what your app does. Be sure to look at the competition and make yours
    stand out a bit from the rest. In iOS 7, many high-profile apps simplified their
    icons to match the new style and the trend continues in iOS 8. The style of your
    icon also depends on what type of app you are making; for example, if it’s a game,
    then you want to make sure it has enough level of detail to get the user interested.
    [Figure 4-7](#9781430262381_Ch04.xhtml#Fig7) shows an example of the contrast
    between the iOS 6 and iOS 7 versions of the app icon.


    ![9781430262381_Fig04-07.jpg](images/9781430262381_Fig04-07.jpg)


    [Figure 4-7](#9781430262381_Ch04.xhtml#_Fig7). Duolingo iOS 6 is on the left and
    iOS 7 is on the right. Notice that the iOS 7 version focuses its icon with a brighter
    color palette and fewer shadows and details


    ### Start Sketching


    Start by sketching your ideas on how you want the app icon to look. Come up with
    a few different variations until you find a direction that you want to go in.
    You may want to consider a few things while you are brainstorming different layouts.
    Color plays a huge role in differentiating apps from one another; be sure that
    you are consistent in your color palette for the actual app and the icon. If you
    have brand colors or a logo, be sure to incorporate them into your concepts for
    the app icon. Your concepts should convey what the app does, whether it is in
    a logo or the design.


    ### Make It Unique


    Make sure you define a shape or pattern that is not overly complex but still unique.
    Often times a logo will serve as the unique shape for the app icon, but sometimes
    it has to be created. [Figure 4-8](#9781430262381_Ch04.xhtml#Fig8) shows a few
    examples of recent app icon designs. Notice how these icons focus the design on
    a single element, remaining simple and identifiable.


    ![9781430262381_Fig04-08.jpg](images/9781430262381_Fig04-08.jpg)


    [Figure 4-8](#9781430262381_Ch04.xhtml#_Fig8). Evernote, Rise, Circle, Deliveries,
    YouTube (from left to right)


    ### Beauty in Simplicity


    As you are making your icon, remember to keep it simple and to the point. One
    way you can ensure this is by limiting the number of colors that you use. You
    should also avoid text on the icons whenever possible. Be sure to follow Apple’s
    recently introduced grid system to ensure that there is more consistency throughout
    app icon designs (see [Figure 4-9](#9781430262381_Ch04.xhtml#Fig9)). It is a suggested
    guide and does not necessarily have to be used.


    ![9781430262381_Fig04-09.jpg](images/9781430262381_Fig04-09.jpg)


    [Figure 4-9](#9781430262381_Ch04.xhtml#_Fig9). Apple’s newly introduced grid system
    brings consistency to app icons


    If you have a brand you are trying to push, be sure to incorporate elements of
    your brand/logo in the app icon. For reference, [Figure 4-10](#9781430262381_Ch04.xhtml#Fig10)
    shows how some major retailers have included their brands in their app icons.


    ![9781430262381_Fig04-10.jpg](images/9781430262381_Fig04-10.jpg)


    [Figure 4-10](#9781430262381_Ch04.xhtml#_Fig10). Target, Twitter, Skype, Google
    Search, and Nordstrom (from left to right)


    ### Sample App Icon


    If you need some resources to help you create different file resolutions, check
    out these helpful Photoshop and Illustrator files donated to the community by
    generous developers:


    *   iOS 8 App Icon PSD Template: (`http://appicontemplate.com/ios8`)

    *   Andex’s Design iOS 7 App Icon PSD & AI Template, largely applicable to iOS
    8: (`http://www.andexdesign.com/ios-7-app-icons-template/`)


    If you are looking for inspiration, here is a nice compilation of app icon designs
    for iOS:


    *   iOS Icon Gallery: (`http://iosicongallery.com`)


    Now let’s make a weather icon just for fun. First, take the template and use the
    gridlines to help you position your icons. When using Photoshop or any other program,
    be sure to make each object a separate layer. In the following example, there
    are three main layers: the background, the sun, and the cloud. Why go to all the
    trouble of maintaining so many layers? Keeping the objects separated allows you
    to easily move around individual layers or groups of layers until you have a composition
    that looks balanced and complete. Separate layers also allow you to modify the
    properties and to filter effects on each object.'
