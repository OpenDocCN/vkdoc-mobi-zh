    '
- fmt: '在 Twitter 上建立你的存在感时，你应该决定如何使用该服务。


    有些开发者会为自己创建一个 Twitter 账户，并为他们的 iOS 应用创建另一个独立账户。这样，他们可以使用应用专用账户发布相关新闻和处理支持查询，而个人账户则用于发布关于其他产品或杂项、非业务内容的推文。一些组织拥有一个专门发布公司新闻的账户，然后为公司的每位员工分配独立的账户。如果你的企业由不止一名开发者组成，或者你希望将一个
    Twitter 账户仅用于个人用途，那么这两种方法都很有效。


    如果你是独立开发者，你可能会发现将精力整合到一个单一的 Twitter 账户中会容易得多。而且，当你拥有几款 iOS 应用时，在一个 Twitter 信息流中交叉推广它们会非常有益。如果你的某款应用变得流行并为你带来大量
    Twitter 关注者，这一点尤其有帮助，因为你将拥有一个渴望了解你发布任何其他产品的庞大受众。


    ## 获取关注者


    “关注者”是指那些选择关注你 Twitter 信息流的用户，这意味着你的推文会出现在他们的时间线（即他们所关注用户发布内容的流）中。你积累的关注者越多，你的受众群体就越大。


    由于扩大受众群体是这里的主要营销目标，那么如何获得更多关注者呢？


    啊，这可能是关于 Twitter 最常被问到的问题。


    当然，很多第三方服务承诺，如果你同意关注他们要求的人，就能增加你的关注者数量，但这是一条错误的途径。关键不在于让任何人和所有人都关注你，以换取你关注他们。诚然，采用这种策略你的受众会呈指数级增长，但数量并不一定等于质量。通常，这些人只关心一件事：增加他们自己的关注者数量。你对他们来说只是一个数字。他们中的大多数（如果不是全部的话）并不真正关心你想说什么——他们甚至可能没有
    iOS 设备。


    不要担心有多少人关注你。专注于培养高质量的受众，即那些对 iOS 应用真正感兴趣的人。让我们看看实现这一目标的几种方法。


    - **你关注谁很重要。** 建立受众群体从你自身开始。在 Twitter 上搜索那些对你影响最大的人——你最喜欢的应用开发者、发布商、博主、记者、朋友和同行。每当他们发布与你观点相关的有价值的内容时，转发它。他们可能会注意到你偶尔的转发并回复你。出现在有影响力的人的视野中绝对没有错！谁知道呢，他们甚至可能会回关你。即使他们没有回关，你关注谁也能说明很多问题。偶然发现你
    Twitter 个人资料的人可能会在决定是否关注你之前，先看看你关注了谁。

    - **关注你的粉丝。** 通过向忠诚的关注者回报一些关爱来与他们建立联系。没有什么比互相关注更让人愉悦的了。这并不意味着你需要关注每一个关注你的人，但如果他们的推文让你感兴趣，那将是感谢的终极姿态。

    - **与你的社区互动。** 如果有人通过 Twitter 联系你并提出评论或问题，始终要回答他们。Twitter 不是 *对* 着人们说话，而是 *与*
    人们对话。在 Twitter 上进行公开对话不仅能将其他人吸引到讨论中，还能展现人性化的一面，证明你不是一个只会吐出营销信息的自动垃圾邮件机器人。如果你觉得你的
    Twitter 信息流被某一场对话主导了，你可能希望关注该用户并通过私信继续讨论，以避免疏远你的其他关注者。如果有人行为粗鲁，你可以选择屏蔽他们，但这永远应该是最后的手段。大多数情况下，人们只是希望被倾听。通过关注你，他们同意倾听你的声音，所以你也听听他们的声音，这才公平。

    - **高质量的内容为王！** 不要只是不停地发布关于你应用的信息，没完没了地发送评论和公告的链接。如果你 24/7 只发布营销垃圾信息，没人会关注你。这很可能是让你失去现有关注者的一个万无一失的方法。给人们一个关注你的理由。你的推文应该展现出一个既有趣又有料、真实的声音。像博客一样，你的
    Twitter 帖子应该反映你的个性甚至你的观点（只要它们不具冒犯性或对你的营销使命适得其反）。如果你发布了一篇博文，那么发一条推文并附上链接！关注者会传播和转发的是人，而不是企业实体，所以让他们看到产品背后的人。

    - **忠于你的声音。** 为了留住你的关注者，保持话题专注很重要。如果你因发布关于 iOS 游戏开发的推文而闻名，那么花整整一个月时间只谈论房屋翻新，很快就会让你的关注者数量锐减。他们关注你，是为了向你学习宝贵的游戏编程专业知识，而不是为了在成百上千条关于铺设新浴室瓷砖的推文中跋涉。分享生活中的个人事件是好的，尤其是当你的受众有相似兴趣时，但这些帖子应该穿插在你的主要话题推文中。只专注于一两个主题也有助于吸引新的关注者。如果有人正在
    Twitter 上搜索`iPhone dev`来学习和与其他程序员建立联系，并且他们偶然发现了你的一条推文，那么只有当你的大部分其他帖子也与 iOS 开发相关时，他们才最有可能关注你。

    - **转发！** 如果有人发布了你认为你的受众会喜欢的内容，就转发它。Twitter 建立在因果报应的精神之上。善有善报。花时间推广他人的推文要超过推广你自己，这样你会与关注者建立更深的联系。他们甚至可能更频繁地
    *转推* 你的帖子作为回报。记住，这不仅仅是找到你可以单向宣讲的人，而是在社区内建立协同效应。

    - **把握推文时机。** 很少有人会整天都盯着 Twitter。而且每晚还有那个该死的睡眠障碍。除非你的关注者使用的客户端应用能跟踪他们在时间线中的当前阅读位置，否则他们可能会错过你的一些帖子。当然，错过的那条推文往往是你花了十分钟精心编写的完美推文，或者是你已经计划数周、至关重要的产品公告。我们都生活在不同的时区，有不同的作息时间表，因此你的时机选择至关重要。在洛杉矶时间早上
    8 点发送一条推文，可以覆盖相当多地区白天时段。例如，那时芝加哥是上午 10 点；纽约是上午 11 点；伦敦是下午 4 点；巴黎、柏林和罗马是下午 5 点。Twitter
    允许你每 8 小时重复发送一条推文，因此如果在洛杉矶时间下午 5 点再次发送同样的消息，那么香港是早上 8 点，东京是上午 9 点，澳大利亚悉尼是上午 11
    点。由于你的一些关注者会看到你 *所有* 的推文，所以不要把重复发帖变成一种习惯。如果它开始变得像垃圾信息，你可能会失去关注者。但偶尔为了特殊公告而重复一条推文是可以容忍的，并且对于触达更多人来说非常有效。'
  raw: 'When establishing your existence on Twitter, you should decide how you want
    to use the service.


    Some developers create a Twitter account for themselves and a separate account
    for their iOS app. This allows them to use the app-focused account for posting
    related news and fielding support queries, while their own personal account is
    used for tweeting about other products or miscellaneous, nonbusiness items. Some
    organizations have one account that is dedicated to company news, and then assign
    separate accounts to each employee of the company. These two approaches work well
    if your venture is composed of more than one developer or if you want to reserve
    one Twitter account for only personal use.


    If you’re a solo developer, you may find it much easier to consolidate your efforts
    into a single Twitter account. And with a few iOS apps under your belt, cross-promoting
    them within a single Twitter feed can be very beneficial. This is especially helpful
    if one of your apps becomes popular and brings you a lot of Twitter followers,
    because you’ll have a large audience that is eager to hear about any other products
    you release.


    Gaining Followers


    “Followers” are those users who choose to follow your Twitter stream, which means
    your tweets will show up in their timeline (a stream of posts from the people
    they follow). The more followers you accrue, the larger your audience becomes.


    And since growing your audience is the main marketing objective here, how does
    one get more followers?


    Ah, that is probably the most frequently asked question regarding Twitter.


    Sure, a lot of third-party services promise to boost your number of followers
    if you agree to follow the people they request, but that’s the wrong avenue to
    take. It’s not about getting just anyone and everyone to follow you in exchange
    for following them. True, your audience will grow exponentially with that kind
    of tactic, but quantity does not necessarily equal quality. Typically, those people
    care about only one thing: increasing their own follower count. You’re just a
    number to them. Most (if not all) of them don’t really care what you have to say—they
    may not even own an iOS device.


    Don’t worry about how many people follow you. Focus on growing a good-quality
    audience, one genuinely interested in iOS apps. Let’s look at a few ways you can
    make that happen.


    *   **Who you follow matters.** Building an audience starts with you. Search Twitter
    for the people who influence you most—your favorite app developers, publishers,
    bloggers, journalists, friends, and peers. Whenever they post something of value
    related to your views, then retweet it. They may notice your occasional retweets
    and reply to you. There’s absolutely nothing wrong with being on the radar of
    influential people! Who knows, they may even follow you back. And even if they
    don’t, who you follow says a lot about you. People who stumble on your Twitter
    profile may look at who you follow before deciding whether to follow you themselves.

    *   **Follow your fans.** Create a connection with loyal followers by showing
    them a little love in return. Nothing is more complimentary than reciprocity in
    following. Now that doesn’t mean you need to follow everyone who follows you,
    but if their tweets interest you, it is the ultimate gesture of thanks.

    *   **Engage your community.** If people reach out to you on Twitter with comments
    or questions, always answer them. Twitter is not about talking *at* people. It’s
    about talking *to* people. Having public conversations on Twitter can not only
    draw others into the discussion, but it also shows a personal touch, proving you’re
    not an automated spambot that spews out only marketing messages. If you feel that
    your Twitter stream is becoming dominated by a single conversation, you may want
    to follow the person and continue the discussion via direct messages, to avoid
    alienating any of your other followers. If people are being rude, you do have
    the option to block them, but that should always be a last resort. More often
    than not, people just want to be heard. By following you, they have agreed to
    listen to your voice, so it’s only fair that you listen to theirs as well.

    *   **Quality content is king!** Don’t just tweet about your app nonstop with
    an endless barrage of links to reviews and announcements. No one will follow if
    you post only marketing spam 24/7. And that’s probably a surefire way to lose
    whatever followers you do have. Give people a reason to follow you. Your tweets
    should portray a genuine voice that’s entertaining and informative. Like a blog,
    your Twitter posts should reflect your personality and even your opinions (as
    long as they are not offensive or counterproductive to your marketing mission).
    And if you publish a blog post, then tweet about it with a link! Followers will
    evangelize and retweet people, not corporate entities, so let them see the person
    behind the product.

    *   **Stay true to your voice.** To retain your followers, it’s important to stay
    on topic. If you’re known for tweeting about iOS game development, then spending
    a solid month talking about nothing but house renovations will quickly decimate
    your follower count. They followed you to learn from your valued game programming
    expertise, not to trudge through hundreds of tweets about laying new tile in the
    bathroom. It’s good to share personal events in your life, especially if your
    audience has similar interests, but those posts should be sprinkled among your
    primary topic tweets. Staying focused on only one or two themes will also help
    attract new followers. If someone is searching Twitter for *iPhone dev* to learn
    and network with fellow programmers, and they stumble on one of your tweets, they
    will most likely follow you only if the majority of your other posts are also
    related to iOS development.

    *   **Retweet!** If someone posts something that you feel your audience would
    enjoy, retweet it. Twitter is built on the spirit of karma. What goes around comes
    around. Spend the time promoting other people’s tweets more than you promote yourself,
    and you’ll cultivate a deeper bond with your followers. They may even retweet
    *your* posts more often to return the favor. Remember that this isn’t about finding
    people you can merely talk at, but rather building synergy within the community.


    And when people do retweet you or promote one of your links, take a moment to
    thank them. It’s a small gesture, but it goes a long way. If your followers know
    their support is appreciated, they are more likely to retweet your posts again
    in the future.

    *   **Time your tweets.** Very few people monitor Twitter all day long. And then
    there’s that damn sleep thing that gets in the way every night. Unless your followers
    are using a client app that keeps track of their current reading position in the
    timeline, they may miss some of your posts. Of course, it’s always that perfect
    tweet you spent ten minutes crafting or the all-important product announcement
    that you’ve been planning for weeks. We all live in different time zones with
    different schedules, so your timing is essential. Sending out a tweet at 8 a.m.
    from Los Angeles would cover quite a few territories during daylight hours. For
    example, it would be 10 a.m. in Chicago; 11 a.m. in New York; 4 p.m. in London;
    and 5 p.m. in Paris, Berlin, and Rome. Twitter allows you to repeat a tweet every
    eight hours, so if the same message was sent out again at 5 p.m. from Los Angeles,
    it would be 8 a.m. in Hong Kong, 9 a.m. in Tokyo, and 11 a.m. in Sydney, Australia.
    Since some of your followers will see *all* your tweets, don’t make a habit of
    repeating posts multiple times. If it starts smelling like spam, you’re liable
    to lose followers. But a rare repeated tweet every once in a while for special
    announcements is tolerable and can be very effective in reaching more people.'
