  trans: "\n# 为多种 iOS 设备设计\n\n在第 2 章中，我强调了在开发应用时拥抱多种 iOS 设备目标的重要性。设计最适合各种 iOS 设备的应用图标和\
    \ UI 元素至关重要。由于大多数 iPhone 和 iPad 都配备了 Retina 显示屏，因此最好针对该屏幕进行优化。\n\n你肯定不希望自己的应用仅与新版本的\
    \ iOS 兼容。你希望应用在最新的 iOS 设备上看起来绝对惊艳，从而吸引潜在客户在 App Store 中点击“购买”按钮。实现这一目标的重要一步是为你的应用支持的所有相关\
    \ iOS 目标，在应用中包含尺寸合适的图标和图片，但这意味着什么呢？\n\n请务必清楚你想覆盖哪些设备，以便相应地设计屏幕。为方便快速参考，我列出了设备分辨率：\n\
    \n- iPhone 5s/5c/5（Retina）：640 × 1136 像素\n- iPhone 4s/4（Retina）：640 × 960 像素\n\
    - iPhone 3GS 及以下（非 Retina）：320 × 480 像素\n- iPad 5/4/3（Retina）：2048 × 1536 像素\n\
    - iPad 2/1（非 Retina）：1024 × 768 像素\n- iPad mini（Retina）：2048 × 1536 像素\n- iPad\
    \ mini（非 Retina）：1024 × 768 像素\n\n## 准备 UI 美术资源\n\n你应用图标的大型 1024 × 1024 像素 App\
    \ Store 版本是少数在所有 iOS 目标上保持一致的图片尺寸之一。其他所有内容都需要不同的尺寸，如 Apple 的 HIG 中所述。iOS 7 为应用图标引入了一个略有不同的尺寸。以下是新要求的摘要：\n\
    \n- **iPhone Retina** (5, 5s, 5c, 4s, 4)\n  - App Store 图标：1024 × 1024 像素\n  -\
    \ 应用图标：120 × 120 像素\n  - 聚焦图标：80 × 80 像素\n  - 设置图标：58 × 58 像素\n  - 启动图片：640 ×\
    \ 960 像素\n- **iPad Retina** (iPad 3, 4, Air, mini Retina)\n  - App Store 图标：1024\
    \ × 1024 像素\n  - 应用图标：152 × 152 像素\n  - 聚焦图标：80 × 80 像素\n  - 设置图标：58 × 58 像素\n\
    \  - 启动图片：2048 × 1536（横向）和 1536 × 2048（纵向）\n- **iPad 非 Retina** (1, 2, mini)\n\
    \  - App Store 图标：512 × 512 像素\n  - 应用图标：76 × 76 像素\n  - 聚焦图标：40 × 40 像素\n  -\
    \ 设置图标：29 × 29 像素\n  - 启动图片：1024 × 768（横向）和 768 × 1024（纵向）\n\n最好以 1024 × 1024\
    \ 尺寸设计应用图标，这样就能轻松创建较小的版本。iPhone 和 iPad 的默认启动图片应包含状态栏区域。所有这些都应保存为 PNG 格式。\n\n##\
    \ iPad 的方向考虑\n\n由于 iPhone 屏幕较小，提供高效的 UI 设计通常需要固定的方向，例如仅支持纵向的应用。这在 iPhone 上完全可以接受，但\
    \ iPad 更大的显示屏允许将更多的界面元素整合到单个窗口中，在纵向和横向视图中都提供了足够的屏幕空间。事实上，Apple 建议 iPad 应用支持所有方向。\n\
    \n如果你的 iPhone 应用锁定在单一方向，那么在将其移植到 iPad 时，你需要重新考虑设计，以便它能在更大的平板电脑屏幕上适应多种方向。在 iPad\
    \ 上，你应该为应用支持的每个方向都包含一个默认启动图片，因为在启动应用前你无法知道用户将如何手持平板电脑。\n\n## 使用 Retina 显示屏屏幕，乐趣加倍\n\
    \n查看 iPhone 5s Retina 显示屏与旧款 iPhone 型号（iPhone 4 之前的所有 iPhone）之间的各种图标尺寸差异，你会发现\
    \ Retina 显示屏的宽度和高度都翻倍了。这也适用于所有其他美术资源，例如背景图片。\n\n那么，你的 iPhone 应用如何区分这两种尺寸呢？Apple\
    \ 为开发者简化了这一过程。如果背景图片命名为 `background.png`，那么只需将双倍尺寸的 Retina 显示屏版本命名为 `background@2x.png`。这个\
    \ `@2x` 标识符应放在相同的文件名之后，但在 `.png` 文件扩展名之前。在 Retina 显示屏上运行时，你编译好的应用会查找带有 `@2x` 标识符的文件，并相应加载该图片。如果你的应用中不存在\
    \ Retina 显示屏版本，则会显示较低分辨率的图片。\n\n正如我在第 2 章中提到的，不要只是放大你现有的图形，而是将它们保存为更大的 `@2x` 版本。目前使用的大多数设备都是\
    \ Retina 设备，所以务必使用 `@2x` 分辨率，否则会出现明显的像素化。如果你最初使用 Adobe Photoshop 或类似的图形工具以位图格式创建了图片，那么最好的办法是专门为\
    \ Retina 显示屏尺寸重新创建这些图片，以确保界面元素清晰、高分辨率。相信我，完善应用的视觉吸引力，值得你为支持 Apple 的 Retina 显示屏而投入所有额外的设计工作。\n\
    \n只要可能，你应该使用基于矢量的格式（如 Adobe Illustrator）创建图标和 UI 图片，这样你就能灵活地适应 Apple 未来要求的任何新尺寸。这将为你省去重新创建小型位图图片的麻烦。我将在下一节中详细讨论位图和基于矢量的设计，请继续阅读。\n\
    \n## 为 iOS 8 设计\n\nApple 对 iOS 的最新更新无疑在其设计方向上引入了一个根本性的变化。主要的设计变化发生在 iOS 7，iOS\
    \ 8 仅添加了微小的设计改进。iOS 8 更新的主要重点是添加新功能，包括引入一种新的编程语言（参见“Swift”边栏）。当 iOS 7 更新推出时，它引起了分化，有人拥抱它，也有人讨厌它。自\
    \ 2014 年 2 月 1 日起，Apple 要求任何新应用或应用更新都必须使用 Xcode 5 构建并针对 iOS 7 进行优化。由于 Xcode 6\
    \ 和 iOS 8 已经发布，建议使用这些最新工具来准备任何新应用或应用更新。\n\n你可能已经注意到，设计风格已转向“扁平”设计，并且不那么“拟物化”。扁平设计更侧重于体验，减少了阴影和纹理等未必对用户有帮助的多余元素的干扰。*拟物化*是指界面模仿现实中的元素；例如，纸张纹理、展示书籍目录的书架等等。由于\
    \ iOS 6 的界面细节丰富，充满纹理和逼真的对象，并且有时将拟物化推向极端，作为回应，扁平设计运动应运而生。许多人错误地认为拟物化设计的对立面就是扁平设计，而实际上，某些设计可以是扁平的，但仍然模仿现实生活中的某些事物。那么为什么要讨论这个呢？你需要定义的首要事项之一就是应用的方向，这会影响你的设计。考虑到最近的趋势，我觉得扁平设计方法与操作系统和目前推出的应用最为一致。\n\
    \n### SWIFT\n"
- fmt: '# Each year Apple holds the Worldwide Developers Conference (WWDC) in Northern
    California. The conference keynote typically serves as a forum for Apple to introduce
    new products and software to an audience of eager developers. The 2014 WWDC was
    no exception—and included the announcement of iOS 8 and Yosemite, a new Mac OS
    X. However, the most significant announcement for developers was Apple’s new programming
    language, called Swift. Swift is an alternative to `Objective-C`—and developers
    need not worry that all of their efforts to learn `Objective-C` have been wasted,
    as `Objective-C` and Swift code can both be used to develop iOS and OS X applications.


    Apple describes Swift as “`Objective-C` without the C.” Swift is a compiled programming
    language with syntax similar to other C-derived languages, such as C# and Java.
    Swift replaces header files (`.h` and `.m` files) in `Objective-C` with `.swift`
    files that contain your code. Bracket-based syntax and semicolons to terminate
    statement are not needed in Swift. Methods in Swift are prefixed with a `func`
    keyword and class methods are prefixed with the `class` keyword. Swift is a type-safe
    language, with the compiler performing type checks to catch any type errors at
    compile-time rather than runtime. To get started with Swift, go to the iBooks
    Store and get a free copy of Apple’s *The Swift Programming Language*.


    ## Differences in iOS 8


    This section will get you acclimated with understanding the changes that took
    place in iOS 7 and iOS 8. Although most of the design changes were made in iOS
    7, the discussion in this section refers to iOS 8 which is the latest version
    of iOS. Also, this section will help you understand the new design standards that
    Apple introduced and tell you which standards have been deprecated.


    If you were an iPhone user before iOS 7, you inherently know how different this
    style is from the previous ones. Let’s now discuss the detailed differences between
    iOS 6 and iOS 8 and how this may impact the way you design your app.


    The Calculator app is a perfect example to show the change in visual direction.
    On the left of [Figure 4-1](#9781430262381_Ch04.xhtml#Fig1) is the iOS 6 version.
    You can see it has a very skeuomorphic design style that imitates a real-life
    calculator. On the right, you can see a big emphasis on type and simplicity. The
    idea is not to necessarily show how pretty you can make something, but rather
    how you can focus on enriching the user’s experience with the app.


    ![9781430262381_Fig04-01.jpg](images/9781430262381_Fig04-01.jpg)


    [Figure 4-1](#9781430262381_Ch04.xhtml#_Fig1). Apple’s native Calculator app (iOS
    6 on left, iOS 8 on right)


    The Mail app went through some changes as well, and it is a good example of the
    differences between the `UIToolbar` and the `UINavigationBar`. You can see in
    [Figure 4-2](#9781430262381_Ch04.xhtml#Fig2) that iOS 8 simplified a lot of the
    gradients and colors, and enhanced the typography in Mail.


    ![9781430262381_Fig04-02.jpg](images/9781430262381_Fig04-02.jpg)


    [Figure 4-2](#9781430262381_Ch04.xhtml#_Fig2). Apple’s native Mail app (iOS 6
    on left, iOS 8 on right)


    But I’d like to take a moment to focus on the `UINavigationBar` and the buttons.
    Notice that with the introduction of text buttons (iCloud or Edit), there is no
    longer a need for images. This is a great approach because down the road, as device
    resolutions change, the app can easily adjust to multiple resolutions without
    scrunching or stretching images. To be consistent with iOS 8, consider using text
    or icons to communicate an action rather using than a physical button. Also, notice
    that the `UINavigationBar` is now unified with the status bar, instead of being
    a separate item. You can set the `UINavigationBar` to be a different color since
    it is no longer an image.


    I’d like to now focus on the `UITabBar` to show how it impacts icons (see [Figure
    4-3](#9781430262381_Ch04.xhtml#Fig3)).


    ![9781430262381_Fig04-03.jpg](images/9781430262381_Fig04-03.jpg)


    [Figure 4-3](#9781430262381_Ch04.xhtml#_Fig3). Apple’s App Store (iOS 6 on left,
    iOS 8 on right)


    The icons in iOS 8 are usually referred to as *line icons*; they are thin icons
    when they are unselected and they become “filled” when they are selected. In iOS
    8, Apple allowed changing the color of an icon to be done programmatically.


    Finally, let’s look at the Facebook app. You can see in [Figure 4-4](#9781430262381_Ch04.xhtml#Fig4)
    that a lot of “effects” were removed and that things were kept simpler and the
    navigation was expanded back to the `UITabBar`. Going forward, keep some of these
    examples in the back of your mind to form a mental picture of what you want your
    end product to look like.


    ![9781430262381_Fig04-04.jpg](images/9781430262381_Fig04-04.jpg)


    [Figure 4-4](#9781430262381_Ch04.xhtml#_Fig4). The Facebook app (iOS 6 on left,
    iOS 8 on right)


    ## Define a Brand for Your App


    Your app should have primary colors, icons, and logos that set it apart from the
    rest of the competition. One of the best things you can offer to a user is consistency
    in the design of the logo, the app, and the app icon. Keep those creative juices
    flowing when tackling a logo for the app. This is a visual element that would
    benefit from the wizardry of a professional designer, so if you hired a designer
    to create your app icon, you should have that same expert create a logo to match.
    But don’t worry if a constrained budget forces you to continue carrying the graphics
    burden on your own. A logo does not need to be complicated. In fact, like your
    icon, the more simplistic your logo is, the more flexibility you have to use it
    in various small sizes while still maintaining readability.


    You’ll want to create a master logo that’s at least several inches long, with
    a 300-dpi resolution so that it will look good in any and all print-related marketing
    materials you may create in the future. For the best results, you may want to
    choose a vector-based Illustrator program for creating your logo, especially if
    your icon was constructed in Illustrator. Take advantage of the design work you’ve
    already done and incorporate the existing icon into the logo design. Not only
    does this save you a lot of design time, but it also helps reinforce the branding
    you already established with the app icon.


    ### Your Most Powerful Marketing Tool


    **Caution** If you use a third-party font in your logo, it’s important that you
    purchase the proper font licensing to use it in commercial projects. Some fonts
    can be quite expensive, so if money is an issue, I recommend using royalty-free
    fonts when possible. See the “Tips for the Artistically Challenged” section later
    in this chapter for some helpful font library resources.


    Creating an app icon for inclusion in your `Xcode` project seems like a no-brainer
    at this early stage in the game—but why design a logo now, when the app hasn’t
    even been developed? Obviously, you’ll want to have your logo ready to use on
    your app’s official web site, as well as have it available for any prerelease
    publicity efforts that you do. But the biggest reason to design your logo now
    is for trademark registration (as explained by Taylor Pierce in [Chapter 3](#9781430262381_Ch03.xhtml)).
    The trademark application and approval process can take several months, so if
    you plan on registering a trademark for your app logo, it’s best to get this ball
    rolling as soon as possible. If all goes well, you’ll ideally have the trademark
    officially registered before your app is available in the App Store.


    ## Maintaining a Consistent Brand Identity


    To reinforce your brand identity, you’ll want to use the same app icon and logo
    across all your marketing efforts. If you use too many visual variations for promoting
    the same iOS app, you’re likely to cause confusion among consumers.'
