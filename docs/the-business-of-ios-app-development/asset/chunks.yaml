    *   `AppTrends`（`http://appsfire.com/apptrends`）：`Appsfire`的`AppTrends`并非追踪顶级应用的应用商店排名，而是代表了一个哪些应用在
    Twitter 和 Facebook 上最受欢迎的排名。这是一个有价值的网站，可以监控哪些类型的应用正在通过社交媒体口口相传被最多讨论。

    *   `Searchman SEO`（`http://www.searchman.com`）：`Searchman SEO`是一个用于追踪应用商店排名、关键词排名、评论以及追踪竞争对手的绝佳工具。在寻找一体化解决方案时，`Searchman
    SEO`确实无出其右。


    尽管还有其他几个应用分析服务、网站、软件工具，甚至一些酷炫的 iPhone 应用（例如`AppFigures`和`AppViz`）也会追踪应用商店排名，但它们更侧重于分析您自己应用的统计数据，并从您的
    iTunes Connect 账户的销售日志中收集数据。因此，即使这些资源可能超出了竞争研究的范畴，也请放心——它们会在后续章节中详细介绍。


    ## 从竞争对手的用户评论中寻找灵感


    让我们继续以“停车位查找”应用为例进行竞争研究。现在您已经整理了一份所有类似应用的列表，是时候仔细研究它们各自的功能集和用户评论了。所有这些应用都使用 iPhone
    内置的 GPS 定位功能，首先存储您停车的位置，然后再次定位您当前的位置，帮助您规划返回车辆的路线，并显示嵌入式地图框架，如`MapKit`。有些应用除了基本功能外，没有提供更多功能。另一些则提供了一些附加功能，例如保存您停车位置的文本备注、语音备忘录和/或照片，以记录实际的行、层、车位号等（非常适合多层停车场）。少数应用还包括记录您到达时间的功能，并且如果您把车停在计时器旁，它们可以追踪计时器剩余的时间，以便您在计时器到期前返回。


    比较这些应用的有趣之处在于，它们都以截然不同的界面提供相似的功能。并且，根据发布的用户评论，您可以快速判断哪些界面被证明易于使用，哪些不够直观，从而导致用户沮丧。


    现在，我不会在这里对任何特定应用发表批评。我也不会透露哪些应用收到了负面用户评论。本书的目标是帮助开发者利用他们的应用赚更多钱，因此我不想通过指出他们的弱点而无意中给他们制造更多困难。您可以轻松地自行查看哪些应用在应用商店中获得了低分评价。因此，为了这个示例的目的，我将向您展示用户评论的概况，以此衡量其中一些应用做得好和不好的地方，但不点名。让我们开始吧。


    ## 从他人的错误中学习


    对于那些记录停车计时器剩余时间的应用，一些客户发布了负面评论，疑惑为什么某个特定应用在没有设置计时器提醒的情况下，不会在他们计时器即将到期时发送通知提醒。例如，一位评论者给出了一星的低评价，理由是“需要一个可以在应用关闭时提醒你的计时器”。作为开发者，我们这类评论视为功能请求，但失望的消费者倾向于将它们视为缺失的功能。不幸的是，他们的“功能请求”以负面评分的形式发布，这损害了应用的整体形象，并可能影响销量。目标是从竞争对手的错误中学习，以期（尽可能）避免这类评论。当您查看竞争对手的用户评论时，要关注人们所说的是应用的哪些问题。一个不满意的用户是一个您可以通过您的应用满足其缺失需求来争取的用户。


    这类应用中大部分（如果不是全部）也收到了大量关于 GPS 性能缓慢和 GPS 结果不准确的负面评论。通常情况下，这些问题并非由有缺陷的编程导致，而是由用户当前信号强度和较旧
    iPhone 型号的 GPS 缺陷造成的。大多数人（尤其是非技术用户）不了解其移动设备的局限性，因此他们简单地将这些问题归咎于应用。


    为了解决这些与 GPS 相关的投诉，大多数开发者在其应用商店描述中用非常清晰的语言声明，为了获得最佳效果，他们强烈建议使用 iPhone 3G、3GS 或
    iPhone 4，这些设备提供了大大改善的 GPS 定位精度。但似乎许多用户并没有花时间阅读应用商店描述中的免责声明，然后当应用在他们的 iPod touch
    设备（缺乏真正的 GPS 功能）上表现不佳时，他们会感到不满。

    '
- fmt: '这些开发者还警告说，如果你身处地下多层停车场深处，头顶厚重的水泥障碍物可能会阻止应用精确定位你的位置。用户汽车内置的GPS在地下会丢失信号，但*iPhone*应用的GPS却被期望能完美运行？这并不总是关乎逻辑，但你必须预测用户的期望。


    那些GPS相关投诉较少的应用，已经成功地从内部解决了这个问题。这些少数开发者没有仅仅依赖App Store的描述，而是采取了主动措施，在应用界面中集成了状态指示器。这些UI指示器既能向用户显示获取GPS位置数据的进度（用于应对信号缓慢时的不耐烦），也能显示位置精度评级（用于通知用户获取的GPS数据是否不准）。其中一些应用甚至更进一步，当获取的GPS结果不准确时，允许用户在地图界面上手动调整位置。这也有助于避免*iPod
    touch*和初代*iPhone*用户（那些忽略了开发者文本免责声明的用户）感到沮丧。


    仅从我们找车应用的这个小例子，你就能看到用户评价可以让你深入了解用户对此类应用有何期望。通过监控他们对类似应用的喜好与厌恶，你可以更好地规划自己的应用需要构建哪些功能，从而在该领域保持竞争力。稍有不足，你就会收到来自客户的同样反馈。


    ## 超越App Store的用户评价


    尽管App Store的用户评价在开展竞品研究时很有帮助，但请记住，在很长一段时间里，苹果的评分机制存在一些缺陷。在*iOS 4*之前，当你从*iOS*设备上删除应用时，苹果会询问你是否要先给该应用评分。显然，如果你要删除一个应用，要么是你根本不喜欢它，要么是你再也用不上它了，所以这自然会招致负面评价。如果你想为你喜爱（并打算长期使用）的应用留下正面评价，你需要专门在App
    Store中找到该应用来发布你的评论。因此，请记住这一点，不要认为App Store的用户评价总能公平地反映应用的质量和价值。（幸好，苹果在*iOS 4*中移除了那个“删除时评分”的提示，所以这不再是未来的问题了。）


    你还应该看看那些提供大量应用评测的网站和博客。其中许多网站还会发布带有音频解说的应用视频演示。除了应用目录列表，你可以在本书的附录中找到一份详尽的评测网站列表。自*iOS
    7*起，评价的重要性被提升到了新的高度。此前，尚不清楚正面或负面评价是否在App Store的搜索算法中起作用。从*iOS 7*开始，正面评价有助于提升你的搜索可见性，而负面评价则会降低你的可见性。请记住这一点；苹果正在这里迈出一大步，以鼓励应用追求最高品质。


    ## 亲身体验你的竞争对手


    你已经花了数小时阅读评价，但你是否亲自试用过这些应用呢？不要仅仅相信别人的话。没有什么比第一手知识更可靠。下载你竞争对手的应用，好好体验一下。


    我知道你可能不太愿意给竞争对手送钱，但鉴于应用价格大多在0.99美元到几美元之间，你无需担心他们靠你的小额购买发财。此外，亲自体验界面和功能，看看这些应用完成任务的优劣，这完全符合你的最佳利益。这是了解哪些UI组件好用、哪些元素感觉别扭或不直观的好方法——这些可能无法通过仅仅查看截图来正确评估。


    即使存在免费或精简版的应用，下载付费版以试用高级功能（免费版没有的）同样重要。


    好消息是，由于应用价格如此低廉，即使是预算紧张的开发者通常也能负担得起，因为购买一打*iPhone*或*iPad*应用可能不会比去电影院看场电影花更多钱。如果你无法或不愿购买竞争对手的应用，还有一个选择：*YouTube*。在过去几年里，许多人开始在*YouTube*上发布应用的上手评测。虽然这不如亲自体验应用来得有效，但它能帮你收集更多信息。


    ## 定义你的差异化


    模仿其他类似应用的功能，并不能让你的销售业绩脱颖而出。你需要提供更多的东西——比现有解决方案更好的东西；不要模仿，要创新。


    你的应用能做什么，让它比竞争对手更出色？如果你在构建一个找车应用，你的应用与其他应用有何不同？你需要定义一个或多个独特的差异化因素，让你的应用在同类应用中更胜一筹。


    通过阅读用户评价，你发现一些用于追踪停车计时器剩余时间的应用，（目前）还不支持在计时器到期前向用户发送提醒通知的功能。如果其他应用都没有提供这项功能，那么停车计时提醒功能将是你应用的一个很好的差异化因素，尤其是很多用户已经要求这个功能了。


    假设你在商场和朋友们碰面，你想让他们知道你的确切位置，而无需逐一打电话或发短信。如果你的竞争对手没有解决这个潜在便利性问题，那么让你的应用只需点击一个按钮，就能通过*Twitter*、*Foursquare*、*Facebook*或短信服务（SMS）将你的当前地图位置广播给你的朋友们，这可能就是一个绝佳的差异化亮点。


    基本上，你的差异化因素应该足够吸引人，以至于在推广你的应用时，这些独特的功能能让那些在评估你应用以及其他几个类似应用的人，非常轻松地做出购买决定。如果用户想要那个差异化功能，而其他应用都没有，那么购买你的应用就成了一个无需思考的选择。


    但你绝不能止步于此。迟早（通常比你希望的要早），你的竞争对手会在他们的应用中添加相同的功能。而且他们很可能还会用自己的一些新功能“胜过你”，迫使你在后续更新中拿出新的差异化因素，以确保人们仍然对你的应用保持兴趣。'
  raw: 'These developers also warn that if you’re located deep within an underground
    multifloor parking structure, the thick concrete obstructions above you may prevent
    the app from pinpointing your exact location. The GPS built into a user’s car
    loses its signal underground, but somehow the iPhone app’s GPS is expected to
    still work flawlessly? It’s not always about logic, but you do need to anticipate
    user expectations.


    The apps that have fewer GPS-related complaints have successfully attacked the
    problem from within. Instead of relying solely on their App Store descriptions,
    these select few developers have taken a proactive approach by also integrating
    status indicators into their apps’ interfaces. These UI indicators range from
    showing users the progress of retrieving the GPS location data (for impatiently
    dealing with slow signals) to location accuracy ratings (for notifying users if
    the retrieved GPS data is weak). A couple of these apps have even taken it one
    step further by enabling the user to manually adjust the location position on
    the map screen when the retrieved GPS results prove inaccurate. This also helps
    prevent frustration from iPod touch and first-gen iPhone users (the ones who missed
    the developer’s text disclaimer).


    From just our little example of parked-car finder apps, you can see that customer
    reviews can teach you a lot about what users expect in this kind of app. By monitoring
    their likes and dislikes with similar apps, you can better plan the features you
    need to build in to your own app to be competitive in this space. Anything less,
    and you’ll be receiving the same feedback from your customers.


    Going Beyond the App Store’s Customer Reviews


    Although the App Store’s customer reviews are helpful in the course of doing competitive
    research, keep in mind that for a long time, Apple’s implementation of ratings
    was somewhat flawed. Prior to iOS 4, when deleting an app from your iOS device,
    Apple asked whether you would like to rate the app first. Obviously, if you’re
    deleting an app, either you didn’t like it or you no longer have any use for it,
    so this automatically invited negative ratings. If you want to leave a positive
    rating for an app you love (and plan on using indefinitely), you need to go out
    of your way to find the app in the App Store to post your review. So, with this
    in mind, don’t assume that the App Store’s customer reviews are always a fair
    representation of an app’s quality and value. (Thankfully, Apple removed that
    “rate upon deletion” prompt in iOS 4, so it will no longer be a concern moving
    forward.)


    You should also take a look at the many web sites and blogs that offer extensive
    app reviews. Many of them also post video walk-throughs of the apps with audio
    commentary. Along with the app directories listing, you can find an extensive
    list of app review sites in this book’s appendix. Introduced in iOS 7 is a new
    importance on reviews. Until now, it was unclear if positive or negative reviews
    played any role in the App Store search algorithm. Starting in iOS 7, positive
    reviews help your search visibility, whereas negative ones will decrease your
    visibility. Keep this in mind; Apple is making a huge move here to encourage apps
    to be of the highest quality.


    Taking Your Competition for a Test-Drive


    So, you’ve spent hours reading the reviews, but have you tried the apps yourself?
    Don’t just take their word for it. Nothing beats firsthand knowledge. Download
    your competitors’ apps, and kick the tires a little.


    I know you’re probably hesitant to put money in the pockets of your competitors,
    but with app prices hovering between 99 cents to a few dollars, you don’t need
    to worry about them getting rich off your small purchase. Besides, it’s in your
    best interest to play with the interfaces and functionality to see how well the
    apps accomplish their task. It’s a good way to learn which UI pieces work and
    which elements feel awkward or nonintuitive—something you may not be able to properly
    evaluate by just viewing screenshots.


    Even if lite/free versions of the apps are available, it’s important to also download
    the paid versions in order to try the premium features that aren’t available in
    the free editions.


    The good news is that with app prices being as low as they are, even developers
    on a tight, shoestring budget can typically afford this, since purchasing a dozen
    iPhone or iPad apps probably won’t cost you more than a night out at the movie
    theater. If you are unable, or wish to not buy your competitors apps, then there
    is still an option: YouTube. Over the last few years, many people have begun posting
    hands-on reviews of apps on YouTube. While this is not going to be as effective
    as test-driving the app yourself, it can help you gather much more information.


    Defining Your Differentiator


    Mimicking the same features as similar apps won’t propel your sales ahead of the
    pack. You need to offer something more—something better than the existing solutions;
    don’t imitate, innovate.


    What can your app do that makes it better than the rest of your competition? If
    you’re building a parked-car finder app, what makes your app different from the
    others? You need to define one or more unique differentiators that make your app
    stand a cut above similar apps.


    Upon reading customer reviews, you’ve discovered that some of the apps that track
    the remaining time left on a parking meter do not (yet) support the ability to
    notify the user with a reminder alert before their meter expires. If none of the
    other apps offer this functionality, then parking meter time notifications would
    be a nice differentiator to add to your own app, especially since many customers
    have already requested this feature.


    Say you’re meeting your friends at the mall and you want to let them know your
    exact location without needing to call or text them all individually. If your
    competitors are not addressing this potential convenience, then enabling your
    app to broadcast your current map location to your friends via Twitter, Foursquare,
    Facebook, or Short Message Service (SMS) with a single button click could prove
    to be a great differentiator.


    Basically, your differentiators should be exciting enough that when promoting
    your app, these unique features make the purchase decision very easy for people
    who are evaluating your app along with several other similar apps. If users want
    that differentiating feature and no one else has it, then buying your app becomes
    a no-brainer.


    But you can’t stop there. Sooner or later (usually sooner than you would like),
    your competition will add those same features to their apps. And they will probably
    “one-up” you with a few new features of their own, forcing you to come up with
    some new differentiators in subsequent updates to ensure that people remain interested
    in your app.'
