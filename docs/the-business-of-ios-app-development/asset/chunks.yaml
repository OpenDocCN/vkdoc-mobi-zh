    \ = [UIImage imageNamed:@\"adbannerlandscape-ipad.png\"];\n        altAdPosition\
    \ = 748.0;\n    } else {\n        // Portrait iPad Height: 1024 - 20 pixel status\
    \ bar = 1004.\n        adBannerView.currentContentSizeIdentifier = ADBannerContentSizeIdentifierPortrait;\n\
            iAdPosition = 1004.0; \n        // Portrait iAd Banner Size: 768 width,\
