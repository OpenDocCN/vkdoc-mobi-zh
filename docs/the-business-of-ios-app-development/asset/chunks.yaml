    leverage the best eCPM and fill rates, he felt it was more important to preserve
    the integrity of the app’s UI design and support only iAd. When an iAd is available,
    the entire PlainText UI shifts up, making room for an iAd at the bottom. If there’s
    no iAd to display, the PlainText UI reverts back to its normal state, hiding the
    ad banner frame (see [Figure 7-3](#9781430262381_Ch07.xhtml#Fig3)).


    ![9781430262381_Fig07-03.jpg](images/9781430262381_Fig07-03.jpg)


    [Figure 7-3](#9781430262381_Ch07.xhtml#_Fig3). PlainText by Hog Bay Software dynamically
    adjusts the height of the app’s UI based on whether an iAd is available for display
    at the bottom of the screen


    Jesse admitted that his decision to use iAd exclusively doesn’t allow him to truly
    optimize his in-app advertising efforts, especially since iAd requires iOS 4,
    so users running PlainText on iOS 3 are not seeing any ads. Regardless of that
    limitation, he has been pleased with the results. The free app also offers an
    In-App Purchase option to remove the ads.


    “Compared to my paid apps, PlainText has had many more downloads, but with less
    profit,” Jesse revealed. “In a little over two months, PlainText has had about
    225,000 downloads and has made a little over $3,000 via In-App Purchases and about
    $7,000 via iAd.”


    Even though the number of people who chose to buy the “Remove Ads” In-App Purchase
    item represents only roughly 1 percent of total PlainText users, it is still a
    significant portion of the revenue that the app earns. This hybrid model of a
    free, ad-supported app with an In-App Purchase component for removing ads and/or
    selling additional features can be a very powerful combination.


    Designing Two Versions: With and Without Ads


    Instead of offering an In-App Purchase option to remove ads, some developers simply
    release two versions of the app: a free, ad-supported app and a paid, ad-free
    app. This is the strategy employed by Optime Software, a business built from the
    ground up on mobile ad revenue. The company launched with only free app releases—Checkers
    Free, Dots Free, Chess Free, Tic Tac Toe Free, Four in a Row Free, and other classic
    games. And many of their free apps continuously rank high in the App Store charts.'
