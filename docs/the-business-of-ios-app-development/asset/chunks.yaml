    ### 在此阶段与律师沟通，可以帮助您识别自身权利受到侵犯的具体方式。律师能够指导您了解：在向他人主张权利之前，是否需要采取额外措施来巩固这些权利，同时也能帮您评估权利的相对优劣势，以及在与竞争对手的诉讼中获得胜诉的可能性。


    打官司的开销极为高昂。幸运的是，大多数纠纷在进入诉讼程序之前就能得到妥善解决。如果您和您的律师认定，对竞争对手的侵权指控成立，下一步很可能就是向对方发送一封停止侵权函。这封信函的目的是通知对方：您认为其行为侵犯了您的权利，并要求其立即停止。根据具体情况，您的竞争对手可能并未意识到自身的侵权行为。停止侵权函兼具双重作用：一方面告知对方被指控的侵权行为并要求其停止，另一方面留下书面证据，证明对方已知晓您的权利——以防其选择继续侵权。


    那么，在我经营 Private-I 这款应用时是如何处理此类问题的呢？我评估了认为抄袭者侵犯的那些权利。就本案而言，我认为抄袭者侵犯了我图标的著作权，因为图标
    artwork 被复制；同时商标权也受到侵犯，因为在另一款产品上使用相同图标必定会导致消费者混淆。更重要的是，我评估了侵权行为对我造成的实际损害，以及通过维权可能获得的潜在收益。最终结论是：追究抄袭者责任得不偿失。那款抄袭应用从未取得良好销量，对我的销售额影响甚微。虽然对有人如此卑劣地完全复制一款应用并上传至
    App Store 感到愤慨，但我必须做出抉择：是花费时间写信，与一个令我反感的人周旋，还是更愿将精力集中于开发应用。我从不后悔这个决定。Private-I
    始终是旅行类别中的强劲竞争者，而那款抄袭应用在商店中几乎毫无曝光度。


    ## 诉讼


    在我的案例中，抄袭应用并未造成太大损害，但如果您的权利受到侵犯且对业务造成实质伤害，诉讼便是制止侵权并可能从侵权方获得金钱赔偿的途径。诉讼耗时费力且开销巨大，但它是一把极其锋利的武器。


    如果潜在侵权方在收到您的停止侵权函后仍不停止侵权行为，且您与对方代表的沟通已破裂，下一步便是对竞争对手提起诉讼。这不是一项您单枪匹马就能完成的任务。如果您认为指控成立，应当聘请知识产权诉讼律师来起草并提交诉状。


    ## 总结


    知识产权法以及运营软件业务所涉及的通用法律问题可能令人难以理解。幸运的是，您无需通晓所有知识产权知识，也能成为一位精通权利保护的开发者。即使是在该领域执业的律师，也往往专注于法律的特定部分。例如，我的执业重心主要在于协助他人起草合同，而其他律师则专攻诉讼领域。还有些律师则致力于帮助客户提交专利或商标申请。既然连该领域的律师都无法掌握知识产权的全部内容，您的目标只需是：对这些问题有足够了解，以便在需要深入探究某个特定主题时能够及时识别。


    不妨将这些法律问题视为 Cocoa 框架中包含的类库。举例来说，在您编写需要调用摄像头或照片的应用之前，您无需懂得如何使用`UIImagePickerView`。但当那一刻来临时，了解该类是否存在以及其大致功能就变得至关重要。就像学习编程语言一样，拓展业务法律知识的关键在于：知晓现有资源以及如何获取它们。


    # 第 4 章


    # 您的 iOS 应用是最强大的营销工具


    一款应用的成功发布与生命周期受诸多因素影响。应用图标和截图是用户在 App Store 中看到的最重要视觉元素之一。与任何商业领域一样，糟糕的第一印象会导致销售损失并招致负面评论，因此精心打磨应用设计是成功的关键要素。在本章中，我将引导您通过原型设计让应用顺利起步。我还会介绍如何通过直观的用户界面和引人注目的图标来打造卓越用户体验，以及如何为多款
    iOS 设备进行设计。整章我将为这些主题提供实用技巧。


    本书聚焦于如何提升应用的市场吸引力。本章将讨论界面设计如何发挥作用，重点阐述在设计用户界面时需考虑的若干重要因素，并指出一些常见误区以助您规避。


    ## 迈入门槛：第一印象决定一切


    当您为了收集竞品研究信息（详见第 2 章）而进行大量 App Store 搜索后，您早已见识到市面上多数应用普遍缺乏品质。您看到的许多应用，其设计和实现都很拙劣，那些开发者只想着利用短期趋势牟利。


    困扰新 iOS 开发者的最大问题之一是应用发现——尤其是在当今，App Store 中已有超过 100 万款应用（其中 47.5 万款为 iPad 原生应用），用户很难从大量劣质应用中筛选出真正的精品。但无论您投入多少营销宣传来为应用引流和提升知名度，发现只是成功方程式的一部分。


    苹果最近将 App Store 搜索页面从显示四到五个结果改为仅显示一个。当用户终于找到或偶然看到您应用的 App Store 产品页面时，您虽然成功吸引了他们的注意，但这只是转瞬即逝的机会。您只有宝贵的几秒钟来说服他们继续探索您的应用。这意味着您的应用图标和截图必须能激发他们深入了解的欲望。


    总体来说，大多数人既懒惰又极度忙碌，他们对时间极为珍视，耐心却极其有限。如果您的应用未能在用户查看 App Store 页面的最初几秒内抓住他们，他们就会转向其他选择——尤其当有大量类似应用可供浏览时更是如此。


    ### 第一视觉线索


    应用图标是您应用呈现的第一个视觉线索。消费者在 App Store 列表中最先看到的就是您的应用图标。图标与应用名称的组合，将是决定用户是否有足够兴趣点击进入产品页面的初始关键因素。同时，图标也代表您应用的品牌标识，必须独具特色且令人难忘。


    如果您的图标看起来不够专业，就会给用户留下一种鲜明印象：您的应用可能并非专业打造。因此，牢记这一点，一个引人注目、品质上乘的应用图标应成为您的首要设计优先级。它就像俗话说的"迈入门槛的第一只脚"，能为您争取到消费者稍纵即逝的更多关注时间与注意力。


