    plan the recorded walk-through of your app in the iOS Simulator, but also to script
    any audio voice-over tracks. Don’t forget to add some music to set the tone—making
    sure to use licensed or royalty-free music. Since the trailer may be played on
    various video-sharing sites and app-review sites, always incorporate your app’s
    icon and logo within the video to help reinforce its brand identity.


    If producing a video trailer falls far outside your comfort zone, don’t think
    twice about hiring a professional editor. An amateurish video can definitely taint
    consumer perception of your app’s quality. When possible, don’t cut corners on
    production value.


    An image is worth a thousand words, but the impact of video can be even more effective
    in building anticipation for your forthcoming iOS app or game. Just be careful
    not to release the video trailer too far in advance of your app’s release. Since
    Apple’s app review process can often take longer than expected, you don’t want
    to overhype your app prematurely, only to lose that momentum long before the app
    becomes available in the App Store.


    Dedicated Web Presence


    Last, but not least, you need a web site or dedicated web page for your app. Providing
    a central online destination for both consumers and the press to access additional
    information is a powerful tool that every software developer should embrace. Next,
    we’ll take a look at what constitutes a good web site for promoting an iPhone
    or iPad app.


    Your iOS App Deserves a Well-Designed Web Site


    You’ll need a web site and online support up and running for your app before it
    becomes available in the App Store, so why not take advantage of its promotional
    power while drumming up excitement during the prerelease phase? Since your application
    is not in the App Store yet, your site should be the primary URL where all interested
    parties are directed. And even after your app is released, a custom-designed web
    site (when done right) can be a much more effective sales tool than the limited
    content found in App Store product pages.'
  trans: '

    如果你的应用是一款笔记本风格的写作工具，请不要给我展示一个空白的、未使用的列表，也不要展示几条标题泛泛的测试笔记，比如“笔记 1”或“示例 1”。如果我是一位正在寻找这类工具的作家，我想看到的是它被充分利用的样子。在你的应用笔记列表中，创建一些看起来真实可信的文档，比如“我的小说大纲”、“技术文章研究”和“周二会议记录”。这款应用需要看起来有价值，值得购买。


    在房地产市场中，“装饰”有助于房屋销售。一些潜在买家难以想象空房子里摆上自己家具后的样子，因此他们会放弃购买，认为这并不真正符合他们的需求。“装饰”就是用吸引人的家具和室内设计细节填满房子，帮助这些人更好地想象其可能性。“看，你的房子可以变成这样！很棒，对吧？”


    你需要对你的 iPhone 和 iPad 应用截图采取同样的“装饰”方法。这绝不意味着以任何方式伪造截图。只需花些时间亲自使用应用，在应用内设置一个能制作出视觉上引人入胜截图的场景。这种“实战”截图应该帮助潜在买家立刻看到购买你的应用的价值。虽然这非常适用于生产力和实用工具类应用，但对于所有其他类型的应用（比如游戏），这也是一个不错的通用法则。不要只展示任何随意的游戏过程示例。如果是一款第一人称射击游戏，就让玩家展示在激烈战斗中打出高分的情景。展示游戏的乐趣！


    ## 视频预告片


    为你的应用制作一个引人入胜的视频预告片，是每位 iOS 开发者都应该认真考虑的事情。有些应用很难仅通过静态图像来描述。提供一个像电影风格般的视频预告片——配上标题特效、视觉效果和音乐——是一个非常强大的营销工具。YouTube
    上那些引人入胜的视频预告片已经帮助了数百款 iPhone 游戏成为畅销品。


    根据你开发的应用类型，在发布前的营销工作中，现在就制作预告片可能为时过早。因为你还没有将应用提交给苹果的审核团队，你不知道为了获得批准，是否需要修改主要部分。一个在
    YouTube 和其他视频分享网站上流传的视频预告片，应该能够代表最终将出现在 App Store 里的实际应用。


    如果你确实计划为应用制作视频预告片，我强烈建议在应用发布前完成它，这样它从一开始就能帮助提升知名度。制作自己的视频预告片有两个令人信服的理由：控制权和便利性。如果没有视频预告片，一些应用评测网站可能会选择自己拍摄视频演示，这未必能展现你应用的最佳效果。通过向他们提供你自己的视频预告片，你可以掌控应用在视觉上的呈现方式。同时，由于省去了评测者自己录制视频的需要，你实际上也让他们更方便地撰写应用评测。


    用摄像机拍摄在 iPhone 或 iPad 上运行的应用是一项艰巨的任务，如果处理不当，往往效果不佳。采用这种方法有很多要求——比如捕捉合适的光线、确保设备的屏幕始终对焦、以及保持双手不抖动——这些都比想象中要难得多。除非你是一名专业电影制作人，或者能找到专业人士为你拍摄，否则这并非理想之选。


    大多数开发者依赖屏幕捕捉软件来录制 iOS 模拟器中运行的应用程序视频。这提供了一个易于实现的高质量解决方案。


    如果你想增强 iOS 模拟器的外观和功能，有几款值得探索的第三方软件产品：


    *   要模拟对 GPS 定位、多点触控手势、加速计和指南针的支持，可以看看 Vimov 公司巧妙的`iSimulate` iPhone 应用和 SDK（`http://www.vimov.com/isimulate/`）。它能通过
    Wi-Fi 网络从同一网络中的 iPhone 或 iPod touch 设备向 iOS 模拟器无线发送这些事件。

    *   要自定义 iOS 模拟器主屏幕的外观，并使用半透明白点提高光标的可见性，可以试试`SimFinger`（`http://blog.atebits.com/2009/03/not-your-average-iphone-screencast/`）。atebits
    将此工具作为捐赠软件提供。

    *   如果你更愿意使用真实的手指图像作为 iOS 模拟器中的光标替代品，你会喜欢 Wonder Warp Software 公司的`PhoneFinger`（`http://www.wonderwarp.com/phonefinger/`），该工具也作为捐赠软件提供。


    一旦优化了 iOS 模拟器，你就需要找到一个屏幕捕捉工具来录制视频。以下是几个可供评估的选项：


    *   `ScreenFlow`（`http://www.telestream.net/screen-flow/`）

    *   `iShowU HD`（`http://www.shinywhitebox.com/ishowuhd/main.html`）

    *   `Sound Stage`（`http://soundstageapp.com`）

    *   `Screenium`（`http://www.syniumsoftware.com/screenium/`）

    *   `Snapz Pro X`（`http://www.ambrosiasw.com/utilities/snapzprox/`）

    *   `Camtasia for Mac`（`http://www.techsmith.com/camtasia/`）

    *   `Voila`（`http://www.globaldelight.com/voila/`）


    在 iOS 开发者中，一些受欢迎的选择是 Telestream 的`ScreenFlow`、shinywhitebox 的`iShowU HD`和 New
    Leaders 的`Sound Stage`。一些可用的录屏产品提供一体化的综合录制和编辑解决方案。如果你选择的工具只提供屏幕录制，你还需要一个第三方编辑器，比如苹果的`iMovie`或`Final
    Cut Pro`，才能将录制的素材加工成一个精致的视频预告片。


    制作一个引人注目的视频预告片取决于你自己，所以不仅要花时间规划在 iOS 模拟器中录制应用演示的过程，还要为任何画外音音频脚本做好准备。别忘了加入一些音乐来设定基调——确保使用已获许可或免版税的音乐。由于预告片可能会在各种视频分享网站和应用评测网站上播放，请务必在视频中嵌入你应用的图标和标识，以加强其品牌形象。


    如果制作视频预告片完全超出了你的舒适区，不要犹豫，请一位专业编辑代劳。业余水平的视频无疑会损害消费者对你应用质量的看法。在可能的情况下，不要在制作价值上偷工减料。


    一张图片胜过千言万语，但视频的影响力在为你即将发布的 iOS 应用或游戏营造期待感方面可能更为有效。只是注意不要在应用发布前过早地放出视频预告片。由于苹果的应用审核过程常常比预期的要长，你不想过早地对应用进行过度炒作，结果在应用在
    App Store 上架很久之前就失去了这股势头。


    ## 专属网站展示


    最后但同样重要的一点是，你需要为你的应用建立一个网站或专属页面。为消费者和媒体提供一个访问额外信息的核心在线站点，是每位软件开发者都应该利用的强大工具。接下来，我们将探讨一个用于推广
    iPhone 或 iPad 应用的好网站应该具备哪些要素。


    ### 你的 iOS 应用值得拥有一个精心设计的网站


    在应用上架 App Store 之前，你就需要为它建立一个网站并提供在线支持并使其运行起来，那么何不在发布前阶段利用它的推广力量来激起人们的兴奋感呢？由于你的应用尚未进入
    App Store，你的网站应该成为所有感兴趣的人访问的主要网址。即使在应用发布之后，一个精心设计的网站（如果做得好）也可以成为比 App Store 产品页面上有限内容更有效的销售工具。

    '
- fmt: '每个 iOS 开发者都必须在网络上拥有强大的存在，无论 App Store 是否是封闭系统。App Store 允许从一个应用的介绍页面直接链接到开发者的网站和支持网站。对你的应用感兴趣的消费者可能在做出购买决定之前访问你的网站，寻找附加信息、视频预告片或动画教程。他们可能还想确认你是一家提供客户支持的合法企业。当人们购买你的应用时，从某种意义上说，这是对你公司的一项投资，所以他们想了解你会长期运营下去。


    你不希望任何技术故障或错失良机毁了应用在 App Store 实际发布时带来的高曝光度。现在就理清所有头绪，你就能在应用上线前，从容应对任何可能出现的网络问题。


    ## 网站托管


    如果你还没有网站，第一步是在众多可用的网站托管公司中开设一个账户。只需在谷歌上快速搜索`web hosting`，你就会发现有不少公司可供选择。大多数公司都提供非常实惠的托管套餐，但真正的难点在于找到一家能满足你特定需求的公司。


    向其他开发者打听他们推荐的网站托管商。了解他们在服务器正常运行时间和客户服务方面的体验很重要。他们的网站是否曾长时间宕机？他们的供应商是否提供 24/7 全天候支持并能快速解决服务器问题？


    ## 格式之争：博客 vs. 定制网站


    一旦建立了网站托管，接下来的问题就是：“我应该创建一个传统的网站，还是改用博客？”虽然博客当然更容易更新和维护，但在这种情况下，将博客格式作为主站存在明显的缺点。每个开发者都应该有一个博客来轻松发布更新和新闻，但它应该连接到静态网页，以便你可以自定义设计来推广你的应用，而不受博客文章结构的限制。


    如果你对建站很熟悉，我建议为你的应用创建一个定制网站。如果 Web 开发不是你的强项，并且你更愿意使用像 WordPress 这样的博客平台，请确保它支持添加静态页面。你需要这个功能，以便你的应用可以拥有自己的一套永久页面，用于截图、视频、支持和其他典型的营销元素。对于所有
    WordPress 爱好者，Cory Shaw 创建了一个名为`AppifyWP`的优秀 WordPress 主题，它为推广你的 iPhone 和 iPad
    应用提供了省时且优化的页面模板。可以访问`http://appifywp.com`查看。


    大多数成功的 iOS 开发者都为他们的应用配备了专门的网站，如果他们有博客，其网站也会链接到博客。一个罕见的例外是 Bolt Creative 的 Pocket
    God 网站，它完全由博客组成，免费托管在 Blogger 的`http://pocketgod.blogspot.com`上。在 Pocket God 这个独特的案例中，开发者更新应用新剧集的频率非常高，以至于博客格式对他们来说效果很好，让他们可以每隔几天轻松地为粉丝发布新信息。对于大多数应用和游戏来说，更新的频率要低得多，因此博客应该位于主应用网站之后。


    ## 域名优势


    在[第 2 章](#9781430262381_Ch02.xhtml)中，我提到了为你的 iOS 应用网站注册域名的重要性，所以你已经做了，对吧？我不会重复之前的讨论，但我将再揭示一个理由，说明为什么一个独特的应用域名非常有价值。


    你的网站 URL 长度在桌面版 iTunes 或 iPad 版 App Store 中可能看起来无关紧要，因为实际的 URL 分别被隐藏在一个基于文本的链接或按钮后面。例如，PopCap
    Games, Inc. 的热门游戏 Plants vs. Zombies 的 URL 是`http://www.popcap.com/games/pvz`，但在
    iPad 上的 Plants vs. Zombies App Store 页面上，你只能看到一个名为“开发者网站”的活动链接按钮（参见[图 10-1](#9781430262381_Ch10.xhtml#Fig1)）。


    ![9781430262381_Fig10-01.jpg](images/9781430262381_Fig10-01.jpg)


    [图 10-1](#9781430262381_Ch10.xhtml#_Fig1). 长 URL 在桌面版 iTunes 或 iPad App Store（左）中无关紧要，但在
    iPhone 版 App Store（右）中显示时会出现截断问题


    问题在于 Apple 如何在 iPhone 版 App Store 中列出同一个网站链接，在该版本中会显示实际的 URL。在如此狭窄的手机屏幕上，长 URL
    会被截断（参见[图 10-1](#9781430262381_Ch10.xhtml#Fig1)）。而且，由于 URL 仅仅被列出而并非一个活动链接，用户可能难以猜出完整的
    URL 是什么。这看起来可能是个小问题，但根据 AdMob 的数据，超过 90% 的 iPhone 用户会在他们的移动设备上浏览和购买 App Store
    的应用。因此，在 Mobile Safari 中轻松访问你的网站变得比许多开发者意识到的要重要得多（我将在本章后面更详细地讨论这一点）。


    如果你已经为公司建立了一个现有网站，或者你当前为所有软件产品维护一个中心站点，那么很可能你已经将网站组织成将每个应用分配到其自己的目录。例如，Streaming
    Colour Studios 就是这样对其 iOS 游戏进行分类的。Dapple 游戏的网页位于`http://www.streamingcolour.com/games/dapple/`。尽管该
    URL 看起来很简单，但在 iPhone 版 App Store 中它肯定会被截断。为了避免这个问题，开发者 Owen Goss 注册了域名`dapplegame.com`。这个较短的域名不仅在
    iPhone 的 App Store 中显示良好（参见[图 10-2](#9781430262381_Ch10.xhtml#Fig2)），而且当用户在营销材料和广告中看到它时，也更容易记住。


    ![9781430262381_Fig10-02.jpg](images/9781430262381_Fig10-02.jpg)


    [图 10-2](#9781430262381_Ch10.xhtml#_Fig2). Streaming Colour Studios 没有为其官方 Dapple
    网页使用长公司 URL，而是选择了一个更短的应用特定域名


    别担心——这并不要求你维护两个独立的网站和托管费用：一个给公司，一个给应用。大多数域名注册商都提供网页转发服务，这样你就可以轻松地将你的应用 URL 重定向到你现有公司网站中的任何目录或页面。Streaming
    Colour Studios 就是这么做的。URL`http://www.dapplegame.com`只是简单地重定向到位于`http://www.streamingcolour.com/games/dapple/`的实际
    Dapple 网页。


    另一种选择是使用子域名。Smule 没有在其网站`http://www.smule.com`内使用嵌套目录，而是为每个产品使用唯一的子域名。例如，Ocarina
    应用的网页位于`http://ocarina.smule.com`，I Am T-Pain 的网页位于`http://iamtpain.smule.com`。这使得
    Smule 可以显示简短、易记的应用 URL，同时只维护一个中心公司网站。而且这一切都在无需支付额外域名注册和网页转发费用的情况下完成。


    ## 搜索引擎优化策略


    搜索引擎优化（SEO）是一个庞大的话题，它催生了一个由 SEO 顾问、研讨会和书籍组成的庞大产业。在这里，让我们来讨论一些你为了应用网站而应该了解的基础知识。'
  raw: 'Having a strong web presence should be mandatory for every iOS developer,
    regardless of the fact that the App Store is a closed system. The App Store includes
    direct external links to a developer’s web site and support site from an app’s
    product page. Consumers interested in your application may visit your web site
    before making a purchase decision, looking for additional information, a video
    trailer, or an animated tutorial. They may also want to check whether you’re a
    legitimate business that offers customer support. When people buy your app, in
    a small sense, it’s an investment in your company, so they like to know you’re
    going to be around awhile.


    You don’t want any technical glitches or missed opportunities to ruin the heightened
    exposure that surrounds your app’s actual release in the App Store. By getting
    all of your “ducks in a row” now, you’ll be able to navigate through any web issues
    that may arise long before your app’s debut.


    Web Hosting


    If you don’t yet have a web site, the first step is to set up an account with
    one of the many web-hosting companies available. Just do a quick Google search
    for *web hosting*, and you’ll see there’s no shortage of companies. Most of them
    offer very affordable hosting packages, but the real trick is to find one that
    meets your specific needs.


    Ask fellow developers who they recommend for web hosting. It’s important to inquire
    about their experiences with server uptime and customer service. Does their site
    ever go offline for long periods of time? Does their provider offer 24/7 support
    and resolve server issues quickly?


    Format Wars: Blogs vs. Custom Sites


    Once you have web hosting established, the next question that arises is, “Should
    I create a traditional web site or use a blog instead?” Although a blog is certainly
    easier to update and maintain, there are distinct disadvantages to the blog format
    as your primary site in this particular situation. Every developer should have
    a blog to easily announce updates and news, but it should be connected to static
    web pages that you can custom design to promote your app without being limited
    to the blog post structure.


    If you’re comfortable building web sites, I recommend creating a custom site for
    your app. If web development is not your thing, and you would rather use a blog
    platform such as WordPress, be sure it supports the addition of static pages.
    You need that so your app can have its own set of permanent pages for screenshots,
    videos, support, and other typical marketing elements. For all you WordPress fans
    out there, Cory Shaw created an excellent WordPress Theme called AppifyWP, which
    provides time-saving, optimized page templates for promoting your iPhone and iPad
    apps. Check it out at `http://appifywp.com`.


    Most of the successful iOS developers have dedicated web sites for their apps,
    and if they also have blogs, their respective sites link to them. One of the rare
    exceptions is Bolt Creative’s Pocket God site, which consists entirely of a blog,
    hosted free on Blogger at `http://pocketgod.blogspot.com`. In the unique case
    of Pocket God, the developers are updating the app with new episodes so frequently
    that the blog format works well for them, allowing them to easily post new information
    for fans every few days. For most apps and games, updates are much less frequent,
    so a blog should be secondary to a primary application web site.


    Domain Name Benefits


    In [Chapter 2](#9781430262381_Ch02.xhtml), I mentioned the importance of registering
    a domain name for your iOS app web site, so you’ve already done that, right? I
    won’t rehash that prior discussion, but I will reveal one more reason why a unique
    domain name for your app can be very valuable.


    The length of your web site URL may not appear relevant in the desktop version
    of iTunes or the iPad version of the App Store, since the actual URL is hidden
    behind a text-based link or a button, respectively. For example, the URL for the
    popular Plants vs. Zombies game, by PopCap Games, Inc., is `http://www.popcap.com/games/pvz`,
    but on the Plants vs. Zombies App Store page on the iPad, all you see is an active
    link button titled Developer Web Site (see [Figure 10-1](#9781430262381_Ch10.xhtml#Fig1)).


    ![9781430262381_Fig10-01.jpg](images/9781430262381_Fig10-01.jpg)


    [Figure 10-1](#9781430262381_Ch10.xhtml#_Fig1). Long URLs don’t matter in the
    desktop version of iTunes or the iPad App Store (left), but truncation issues
    arise when displayed in the iPhone version of the App Store (right)


    The problem lies in how Apple lists the same web site link in the iPhone version
    of the App Store, in which the actual URL is displayed. On such a narrow mobile
    screen, a long URL is truncated (see [Figure 10-1](#9781430262381_Ch10.xhtml#Fig1)).
    And since the URL is merely listed and not provided as an active link, the user
    may have a difficult time guessing what the full URL should be. This may seem
    like a minor nitpick, but according to AdMob, more than 90 percent of iPhone users
    browse and purchase from the App Store on their mobile devices. So, the ability
    to easily access your web site in Mobile Safari is a lot more important than many
    developers realize (I’ll talk about this in more detail later in this chapter).


    If you already have an existing web site for your company, or you currently maintain
    one central site for all your software products, most likely you’ve organized
    your site to assign each app to its own directory. For example, Streaming Colour
    Studios has its iOS games categorized this way. The Dapple game’s web page is
    located at `http://www.streamingcolour.com/games/dapple/`. Although that URL seems
    simple enough, it would definitely be truncated in the iPhone version of the App
    Store. To avoid that issue, the developer Owen Goss registered the domain name
    `dapplegame.com`. Not only does this shorter domain name fit nicely when displayed
    in the iPhone’s App Store (see [Figure 10-2](#9781430262381_Ch10.xhtml#Fig2)),
    but it’s also a much easier URL for users to remember when they see it listed
    in marketing materials and advertisements.


    ![9781430262381_Fig10-02.jpg](images/9781430262381_Fig10-02.jpg)


    [Figure 10-2](#9781430262381_Ch10.xhtml#_Fig2). Instead of using the long company
    URL of its official Dapple web page, Streaming Colour Studios opted to use a much
    shorter app-specific domain name


    Don’t worry—this does not require you to maintain two separate sites and hosting
    bills: one for your company and one for your app. Most domain registrars offer
    web-forwarding services, so that you can easily set your app URL to redirect to
    any directory or page within your existing company web site. That’s what Streaming
    Colour Studios does. The URL `http://www.dapplegame.com` simply redirects to the
    actual Dapple web page at `http://www.streamingcolour.com/games/dapple/`.


    Another option is to use *subdomains*. Instead of using nested directories within
    its site at `http://www.smule.com`, Smule uses a unique subdomain for each of
    its products. For example, the Ocarina app’s web page is located at `http://ocarina.smule.com`,
    and the I Am T-Pain web page is at `http://iamtpain.smule.com`. This enables Smule
    to display short, easy-to-remember app URLs, while maintaining only one central
    company web site. And it does all this without the expense of registering additional
    domain names and web-forwarding fees.


    SEO Tactics


    Search engine optimization (SEO) is a vast topic, one that has birthed a cottage
    industry of SEO consultants, seminars, and books. Here, let’s tackle the basics
    you should know for your app’s web site.'
  trans: '

    每个 iOS 开发者都必须在网络上拥有强大的存在，无论 App Store 是否是封闭系统。App Store 允许从一个应用的介绍页面直接链接到开发者的网站和支持网站。对你的应用感兴趣的消费者可能在做出购买决定之前访问你的网站，寻找附加信息、视频预告片或动画教程。他们可能还想确认你是一家提供客户支持的合法企业。当人们购买你的应用时，从某种意义上说，这是对你公司的一项投资，所以他们想了解你会长期运营下去。


    你不希望任何技术故障或错失良机毁了应用在 App Store 实际发布时带来的高曝光度。现在就理清所有头绪，你就能在应用上线前，从容应对任何可能出现的网络问题。


    ## 网站托管


    如果你还没有网站，第一步是在众多可用的网站托管公司中开设一个账户。只需在谷歌上快速搜索`web hosting`，你就会发现有不少公司可供选择。大多数公司都提供非常实惠的托管套餐，但真正的难点在于找到一家能满足你特定需求的公司。


    向其他开发者打听他们推荐的网站托管商。了解他们在服务器正常运行时间和客户服务方面的体验很重要。他们的网站是否曾长时间宕机？他们的供应商是否提供 24/7 全天候支持并能快速解决服务器问题？


    ## 格式之争：博客 vs. 定制网站


    一旦建立了网站托管，接下来的问题就是：“我应该创建一个传统的网站，还是改用博客？”虽然博客当然更容易更新和维护，但在这种情况下，将博客格式作为主站存在明显的缺点。每个开发者都应该有一个博客来轻松发布更新和新闻，但它应该连接到静态网页，以便你可以自定义设计来推广你的应用，而不受博客文章结构的限制。


    如果你对建站很熟悉，我建议为你的应用创建一个定制网站。如果 Web 开发不是你的强项，并且你更愿意使用像 WordPress 这样的博客平台，请确保它支持添加静态页面。你需要这个功能，以便你的应用可以拥有自己的一套永久页面，用于截图、视频、支持和其他典型的营销元素。对于所有
    WordPress 爱好者，Cory Shaw 创建了一个名为`AppifyWP`的优秀 WordPress 主题，它为推广你的 iPhone 和 iPad
    应用提供了省时且优化的页面模板。可以访问`http://appifywp.com`查看。


    大多数成功的 iOS 开发者都为他们的应用配备了专门的网站，如果他们有博客，其网站也会链接到博客。一个罕见的例外是 Bolt Creative 的 Pocket
    God 网站，它完全由博客组成，免费托管在 Blogger 的`http://pocketgod.blogspot.com`上。在 Pocket God 这个独特的案例中，开发者更新应用新剧集的频率非常高，以至于博客格式对他们来说效果很好，让他们可以每隔几天轻松地为粉丝发布新信息。对于大多数应用和游戏来说，更新的频率要低得多，因此博客应该位于主应用网站之后。


    ## 域名优势


    在第 2 章中，我提到了为你的 iOS 应用网站注册域名的重要性，所以你已经做了，对吧？我不会重复之前的讨论，但我将再揭示一个理由，说明为什么一个独特的应用域名非常有价值。


    你的网站 URL 长度在桌面版 iTunes 或 iPad 版 App Store 中可能看起来无关紧要，因为实际的 URL 分别被隐藏在一个基于文本的链接或按钮后面。例如，PopCap
    Games, Inc. 的热门游戏 Plants vs. Zombies 的 URL 是`http://www.popcap.com/games/pvz`，但在
    iPad 上的 Plants vs. Zombies App Store 页面上，你只能看到一个名为“开发者网站”的活动链接按钮（参见图 10-1）。


    ![9781430262381_Fig10-01.jpg](img/9781430262381_Fig10-01.jpg)


    图 10-1. 长 URL 在桌面版 iTunes 或 iPad App Store（左）中无关紧要，但在 iPhone 版 App Store（右）中显示时会出现截断问题


    问题在于 Apple 如何在 iPhone 版 App Store 中列出同一个网站链接，在该版本中会显示实际的 URL。在如此狭窄的手机屏幕上，长 URL
    会被截断（参见图 10-1）。而且，由于 URL 仅仅被列出而并非一个活动链接，用户可能难以猜出完整的 URL 是什么。这看起来可能是个小问题，但根据 AdMob
    的数据，超过 90% 的 iPhone 用户会在他们的移动设备上浏览和购买 App Store 的应用。因此，在 Mobile Safari 中轻松访问你的网站变得比许多开发者意识到的要重要得多（我将在本章后面更详细地讨论这一点）。


    如果你已经为公司建立了一个现有网站，或者你当前为所有软件产品维护一个中心站点，那么很可能你已经将网站组织成将每个应用分配到其自己的目录。例如，Streaming
    Colour Studios 就是这样对其 iOS 游戏进行分类的。Dapple 游戏的网页位于`http://www.streamingcolour.com/games/dapple/`。尽管该
    URL 看起来很简单，但在 iPhone 版 App Store 中它肯定会被截断。为了避免这个问题，开发者 Owen Goss 注册了域名`dapplegame.com`。这个较短的域名不仅在
    iPhone 的 App Store 中显示良好（参见图 10-2），而且当用户在营销材料和广告中看到它时，也更容易记住。


    ![9781430262381_Fig10-02.jpg](img/9781430262381_Fig10-02.jpg)


    图 10-2. Streaming Colour Studios 没有为其官方 Dapple 网页使用长公司 URL，而是选择了一个更短的应用特定域名


    别担心——这并不要求你维护两个独立的网站和托管费用：一个给公司，一个给应用。大多数域名注册商都提供网页转发服务，这样你就可以轻松地将你的应用 URL 重定向到你现有公司网站中的任何目录或页面。Streaming
    Colour Studios 就是这么做的。URL`http://www.dapplegame.com`只是简单地重定向到位于`http://www.streamingcolour.com/games/dapple/`的实际
    Dapple 网页。


    另一种选择是使用子域名。Smule 没有在其网站`http://www.smule.com`内使用嵌套目录，而是为每个产品使用唯一的子域名。例如，Ocarina
    应用的网页位于`http://ocarina.smule.com`，I Am T-Pain 的网页位于`http://iamtpain.smule.com`。这使得
    Smule 可以显示简短、易记的应用 URL，同时只维护一个中心公司网站。而且这一切都在无需支付额外域名注册和网页转发费用的情况下完成。


    ## 搜索引擎优化策略


    搜索引擎优化（SEO）是一个庞大的话题，它催生了一个由 SEO 顾问、研讨会和书籍组成的庞大产业。在这里，让我们来讨论一些你为了应用网站而应该了解的基础知识。

    '
- fmt: '**Tip** If you would like to learn more about SEO, check out the free *SEO
    Starter Guide* from Google: `http://www.google.com/webmasters/docs/search-engine-optimization-starter-guide.pdf`.


    ## `<title>` Tag


    The `<title>` tag, which is located within the `<head>` tag in your HTML code,
    displays the title of the page in the web browser’s top title bar. Although that
    may seem fairly useless, `<title>` is actually quite an important tag when it
    comes to search engines and social media.


    The `<title>` tag is the primary link headline displayed in search engine results.
    Let’s use the fictional Breadcrumbs app as an example:


    ```

    <title>Breadcrumbs – Parked Car Locator App for the iPhone</title>

    ```


    Notice how I incorporated not only the app’s name and caption, but also that it’s
    an iPhone app. It’s important to use strategic keywords in your title to help
    improve your ranking in the search results. When that page is listed in Google’s
    search engine results, users will immediately know what it is by the link headline
    alone.


    If you take advantage of one of the many free sharing services available (such
    as AddThis and ShareThis) to enable site visitors to share that web page with
    their friends, their JavaScript code that you’ve pasted into your HTML simply
    grabs that page’s `<title>` tag on the fly as part of the message that’s being
    sent along with the page’s URL. With this in mind, it’s always a good idea to
    keep the character count well below 140 characters to promote easy retweeting
    on Twitter.


    ## `description` and `keywords` Meta Tags


    Although the `description` and `keywords` meta tags are not required, they should
    never be seen as optional. Also located within the HTML `<head>` tag, they are
    important elements that most search engines analyze when crawling your site:


    - The `keywords <meta>` tag helps provide context as to the subject of your web
    page.

    - The `description <meta>` tag is often used as the text description that is displayed
    directly below the title link headline in search engine results.


    Here’s an example of the syntax:


    ```

    <meta name="description" content="Easily find your car in crowded parking lots
    with Breadcrumbs, now available in the iPhone App Store">

    <meta name="keywords" content="iPhone, App Store, GPS, car finder, car locator,
    mobile, augmented reality, map, directions, lost car, parking, app">

    ```


    To prevent your description from appearing truncated in search engine results,
    try to limit its length to no more than 25 to 30 words.


    You can include a lot more words in your `keywords <meta>` tag, but be very careful
    to include only keywords that are relevant to that web page. Don’t try to “game”
    the system by including popular search terms that are unrelated in the hopes of
    getting broader exposure. That’s so 1998. These days, modern search engines employ
    extremely sophisticated algorithms that compare your meta keywords with the keywords
    in your main body text. Any discrepancies found will penalize your current search
    engine page ranking.


    Not sure which keywords to use for optimal results? Try using Google’s AdWords
    keyword tool (`https://adwords.google.com/select/KeywordToolExternal`). Although
    it was designed to help advertisers refine their ad campaign keywords, it can
    also help you determine the value of search keywords so that your `keywords <meta>`
    tag is loaded with the most optimized words.


    ## Keyword-Rich Text


    As with the `keywords <meta>` tag, make sure the visible text within the main
    body of your web page contains optimized keywords to help improve your search
    engine rankings. If your app currently has several competitors, check out their
    web sites to see which keywords they’re using and how they rank in the search
    engines. Your goal is to place just as high, if not better than them, in the search
    engine results for similar keywords.


    Make sure all of your web images include the `alt` text parameter, so that search
    engines can still read their intended description. It’s also a good idea to appropriately
    name your image files. For example, a search engine-optimized buy button might
    look like this:


    ```

    <img src="images/buy.jpg" alt="Buy Now at the App Store" width="200" height="60"
    border="0">

    ```


    Try to avoid using Adobe Flash on your web site whenever possible. Although it’s
    a great web technology, it poses two serious problems for iOS app developers:


    - The iOS native browser, Mobile Safari, does not currently support Flash. It
    renders Flash objects as broken when viewed on an iPhone, iPad, or iPod touch.

    - Some search engines have trouble properly searching Flash-based SWF files, so
    embedded text keywords may not be indexed.


    If you want to use the popular Flash video format on your site, you’ll want to
    read more about how to do that in the “Why Site Compatibility with Mobile Safari
    Is So Important” section later in this chapter.


    ## Keyword-Friendly URLs


    Following the theme of strategically named image files, if your app-specific domain
    name redirects to your existing company web site, you should also try to use strategically
    named directories and files in your URLs. For example, using a web site naming
    structure like this:


    ```

    http://www.mywebsite.com/iphone/breadcrumbs/

    ```


    will help your site rank much higher in search results than a nondescript URL
    like this:


    ```

    http://www.mywebsite.com/sw/0901/page01.html

    ```


    ## Maintaining Valid Links


    Make sure to place default index pages within all subdirectories to prevent both
    users and search engine spiders from encountering 404 errors or “Forbidden Directory”
    warnings. Broken URLs can dramatically affect how your site is indexed in the
    major search engines.


    ## XML Sitemap


    The XML Sitemap is a standard introduced by Google several years ago. It enables
    you to submit an XML Sitemap file to Google, Yahoo!, and Microsoft Bing. The XML
    listing includes entries for all of the web page URLs in your site that you want
    indexed by these search engines. Within the XML, you can specify the priority
    (importance) of each page, the last date it was modified, and the frequency rate
    of changes.


    This site map helps Google, Yahoo!, and Bing discover pages on your web site that
    their search bots may not have found during their crawling process. If you add
    or delete pages from your site, simply update the XML Sitemap file, and then resubmit
    it to Google and others for indexing.


    To get started, visit Google’s free Webmaster Tools site (`http://www.google.com/webmasters/tools/`)
    to learn how to create and submit your own XML Sitemap file. Google even provides
    helpful reports on any crawling issues found, as well as identifying any meta
    tag issues.


    Never seen an XML Sitemap file before? Here’s a short example:


    ```

    <?xml version="1.0" encoding="UTF-8"?><urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">

        <url><loc>http://www.ebutterfly.com/</loc><lastmod>2010–9-30</lastmod><changefreq>weekly</changefreq><priority>1.0</priority></url>

        <url><loc>http://www.ebutterfly.com/books/devsketchbook/</loc><lastmod>2010–9-30</lastmod><changefreq>monthly</changefreq><priority>0.9</priority></url>

        <url><loc>http://www.ebutterfly.com/books/iphonebusiness/</loc><lastmod>2010–9-30</lastmod><changefreq>monthly</changefreq><priority>0.9</priority></url>

        <url><loc>http://www.ebutterfly.com/company/</loc><lastmod>2010–9-30</lastmod><changefreq>monthly</changefreq><priority>0.6</priority></url>

    </urlset>

    ```


    See how simple the syntax is? Within the main parent `urlset` tag, each child
    `<url>` tag contains the information for a different, unique URL in my web site.
    (Although keep in mind that my real XML Sitemap file is actually much larger.)


    If you’re not comfortable crafting your own XML code within a text editor, you
    may prefer to use a site-map automation tool. Here are a few:'
