- fmt: "### 优化排版后的内容\n\n[Figure 5-2](#9781430262381_Ch05.xhtml#_Fig2). Lima Sky customized\
    \ the app rating request in Doodle Jump to match the fun style of the game\n\n\
    With any of these approaches, take care not to be overly aggressive. If you annoy\
    \ users by constantly asking them for a rating, this ploy will backfire on you.\
    \ The users you annoy will be driven to post negative ratings, complaining about\
    \ how much they hate being pestered for their feedback. For best results, ask\
    \ only once or in a very few select places. If customers choose Maybe Later, they\
    \ can always rate your app when it’s convenient for them by accessing the `Rate\
    \ This App` button on your Settings or Info screen.\n\nIf you’re interested in\
    \ prompting users after a specific number of days and/or app launches, but would\
    \ rather not spend time implementing that extra bit of code and making it multitasking-aware,\
    \ check out Arash Payan’s open-source `Appirater` class, at `http://github.com/arashpayan/appirater/`.\
    \ (And if you find the free `Appirater` code helpful, then return the favor by\
    \ downloading his iPhone app, Jabeh.)\n\n### Tell a Friend with In-App E-mail\
    \ and Social Networking\n\nSimilar to the concept of a `Rate This App` button,\
    \ you can also include a `Tell A Friend` button in your app, enabling your customers\
    \ to recommend your app to their friends and family. This is good old-fashioned\
    \ grassroots marketing. By supplying your users with convenient options to talk\
    \ about your app, you’ve taken a proactive step in the hopes of increasing your\
    \ app’s exposure and sales through the proven power of word of mouth. Nothing\
    \ helps sell a product more effectively than recommendations from trusted peers.\n\
    \nWhat options would you want to offer? You can send e-mail directly from within\
    \ your app using the iOS SDK’s In-App Email functionality, so that’s an easy yet\
    \ powerful feature to include. And with Twitter and Facebook being such popular\
    \ social networking sites, you may want to consider adding support for those platforms\
    \ as well, with iOS 7 it couldn’t be easier with the built-in Social Framework.\
    \ Just a few lines of code, and users can Tweet and Post to Facebook about your\
    \ app. If this is done correctly, the amount of traffic it can generate is more\
    \ than worthwhile.\n\n### Using Third-Party Web Services\n\nIf you do decide to\
    \ connect with a third-party web service, you’ll want to first read the API license\
    \ agreement to confirm that it allows you to access the API in a commercial software\
    \ application for mobile devices. And even if it does allow commercial use, take\
    \ into consideration that the company’s terms may change in the future, or it\
    \ may cease to operate, forcing you to remove that feature. If your app lists\
    \ supported web services as buttons on a `UIActionSheet`, that gives you the flexibility\
    \ to easily remove one of the buttons, if needed, in a future app update.\n\n\
    Even beyond licensing terms, a third-party web service might make an API change\
    \ that could break your app, causing you to scramble to submit a new fixed update\
    \ to the App Store. Remember Twitpocalypse—the Twitter API change that briefly\
    \ disabled many of the iPhone Twitter client apps back in June 2009? Unlike the\
    \ instant availability of posting new software downloads on your web site, you\
    \ may need to wait days for your updated version to make its way through the App\
    \ Store review process before customers can get their hands on it.\n\nRelying\
    \ on a third-party web service also makes you vulnerable to any API outages or\
    \ glitches that may surface due to server maintenance, bugs, or too much traffic.\
    \ You’ll want to defensively code your app to gracefully handle situations when\
    \ a supported service is temporarily unavailable. If your app’s social networking\
    \ feature is not functioning properly and the app fails to notify the users that\
    \ the third-party service is down, they will automatically assume the culprit\
    \ is your app, not Twitter or Facebook.\n\nWeb services offer amazing content\
    \ that is perfect for mobile app consumption, but definitely keep these potential\
    \ issues in mind when deciding how much of your app’s functionality will depend\
    \ on a third-party web service.\n\n### Connecting Users with In-App Sharing\n\n\
    Without any further ado, let’s try our hand at a little code, shall we? Create\
    \ a new project in Xcode, but this time choose the Window-based Application template\
    \ with Universal selected in its Product pull-down menu, and name it `TellAFriend`.\
    \ This way, you can use the same shared code for both iPhone and iPad, yet you’ll\
    \ see how the interface appears slightly different on the two devices.\n\nBefore\
    \ you start working on `TellAFriend`'s primary functionality, you’ll want to first\
    \ set the stage with some basic UI elements. Since many apps use the standard\
    \ action button to present these kinds of sharing features, let’s build a navigation\
    \ controller with an action button. This requires a few extra steps, so you can\
    \ either follow along or download the completed project from the book’s companion\
    \ code examples at `http://iPhoneBusinessBook.com/` or `http://www.apress.com/`.\n\
    \nWith the *Shared* folder selected in the Xcode project, choose File ![image](images/arrow.jpg)\
    \ New File…, and then add a new `UIViewController` subclass with an XIB file and\
    \ `.h` file. Name the new class `RootViewController`, and set it aside for now.\
    \ We’ll come back to it in a few minutes.\n\nOpen the `AppDelegate_iPhone.h` file\
    \ and add two new lines of code (shown in bold):\n\n```\n#import <UIKit/UIKit.h>\n\
    \n@interface AppDelegate_iPhone : NSObject <UIApplicationDelegate> {\n    UIWindow\
    \ *window;\n    UINavigationController *navigationController;\n}\n\n@property\
    \ (nonatomic, retain) IBOutlet UIWindow *window;\n@property (nonatomic, retain)\
    \ IBOutlet UINavigationController *navigationController;\n\n@end\n```\n\nYou’ll\
    \ also need to add those bold code lines to the same places in your `AppDelegate_iPad.h`\
    \ file. This code is for the navigation controller that we’ll be adding to the\
    \ UI soon.\n\nNext, open the `AppDelegate_iPhone.m` file and modify its contents\
    \ with a few new code lines (shown in bold):\n\n```\n#import \"AppDelegate_iPhone.h\"\
    \n#import \"RootViewController.h\"\n\n@implementation AppDelegate_iPhone\n\n@synthesize\
    \ window;\n@synthesize navigationController;\n\n#pragma mark -\n#pragma mark Application\
    \ lifecycle\n\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions {\n\n[self.window addSubview:navigationController.view];\n\n\
    [self.window makeKeyAndVisible];\n\nreturn YES;\n}\n// THIS DEALLOC CAN BE REMOVED\
    \ FOR ARC\n- (void)dealloc {\n    [navigationController release];\n    [window\
    \ release];\n    [super dealloc];\n}\n\n// There are several other default application\
    \ methods also included in this\n// file, which we'll omit from this code listing\
    \ to conserve page space, but\n// DO NOT remove them from the actual file.\n\n\
    @end\n```\n\nAs with the header files, you’ll also need to add those bold code\
    \ lines to the same places in your `AppDelegate_iPad.m` file. This new code essentially\
    \ adds the navigation controller’s view to the window and displays it.\n\nNow\
    \ with all the code groundwork out of the way, open `MainWindow_iPhone.xib` in\
    \ Interface Builder and add a `UINavigationController`. Wire the app delegate’s\
    \ referencing outlet `navigationController` to the `UINavigationController`. Then\
    \ with the `UINavigationController`’s view selected in the attributes inspector\
    \ panel, assign the view’s NIB name to `RootViewController` with the Resize View\
    \ From NIB option checked (see [Figure 5-3](#9781430262381_Ch05.xhtml#Fig3)).\
    \ And, in the identity inspector panel, set the class to `RootViewController`.\
    \ Save that file. Then perform the same steps with the `MainWindow_iPad.xib` file.\n\
    \n![9781430262381_Fig05-03.jpg](images/9781430262381_Fig05-03.jpg)\n\n[Figure\
    \ 5-3](#9781430262381_Ch05.xhtml#_Fig3). Setting up the navigation controller\
    \ for the iPhone UI in Interface Builder. The same steps will also need to be\
    \ performed for the iPad UI in this universal app example"
  raw: '[Figure 5-2](#9781430262381_Ch05.xhtml#_Fig2). Lima Sky customized the app
    rating request in Doodle Jump to match the fun style of the game


    With any of these approaches, take care not to be overly aggressive. If you annoy
    users by constantly asking them for a rating, this ploy will backfire on you.
    The users you annoy will be driven to post negative ratings, complaining about
    how much they hate being pestered for their feedback. For best results, ask only
    once or in a very few select places. If customers choose Maybe Later, they can
    always rate your app when it’s convenient for them by accessing the Rate This
    App button on your Settings or Info screen.


    If you’re interested in prompting users after a specific number of days and/or
    app launches, but would rather not spend time implementing that extra bit of code
    and making it multitasking-aware, check out Arash Payan’s open-source Appirater
    class, at `http://github.com/arashpayan/appirater/`. (And if you find the free
    Appirater code helpful, then return the favor by downloading his iPhone app, Jabeh.)


    Tell a Friend with In-App E-mail and Social Networking


    Similar to the concept of a Rate This App button, you can also include a Tell
    A Friend button in your app, enabling your customers to recommend your app to
    their friends and family. This is good old-fashioned grassroots marketing. By
    supplying your users with convenient options to talk about your app, you’ve taken
    a proactive step in the hopes of increasing your app’s exposure and sales through
    the proven power of word of mouth. Nothing helps sell a product more effectively
    than recommendations from trusted peers.


    What options would you want to offer? You can send e-mail directly from within
    your app using the iOS SDK’s In-App Email functionality, so that’s an easy yet
    powerful feature to include. And with Twitter and Facebook being such popular
    social networking sites, you may want to consider adding support for those platforms
    as well, with iOS 7 it couldn’t be easier with the built-in Social Framework.
    Just a few lines of code, and users can Tweet and Post to Facebook about your
    app. If this is done correctly, the amount of traffic it can generate is more
    than worthwhile.


    Using Third-Party Web Services


    If you do decide to connect with a third-party web service, you’ll want to first
    read the API license agreement to confirm that it allows you to access the API
    in a commercial software application for mobile devices. And even if it does allow
    commercial use, take into consideration that the company’s terms may change in
    the future, or it may cease to operate, forcing you to remove that feature. If
    your app lists supported web services as buttons on a `UIActionSheet`, that gives
    you the flexibility to easily remove one of the buttons, if needed, in a future
    app update.


    Even beyond licensing terms, a third-party web service might make an API change
    that could break your app, causing you to scramble to submit a new fixed update
    to the App Store. Remember Twitpocalypse—the Twitter API change that briefly disabled
    many of the iPhone Twitter client apps back in June 2009? Unlike the instant availability
    of posting new software downloads on your web site, you may need to wait days
    for your updated version to make its way through the App Store review process
    before customers can get their hands on it.


    Relying on a third-party web service also makes you vulnerable to any API outages
    or glitches that may surface due to server maintenance, bugs, or too much traffic.
    You’ll want to defensively code your app to gracefully handle situations when
    a supported service is temporarily unavailable. If your app’s social networking
    feature is not functioning properly and the app fails to notify the users that
    the third-party service is down, they will automatically assume the culprit is
    your app, not Twitter or Facebook.


    Web services offer amazing content that is perfect for mobile app consumption,
    but definitely keep these potential issues in mind when deciding how much of your
    app’s functionality will depend on a third-party web service.


    Connecting Users with In-App Sharing


    Without any further ado, let’s try our hand at a little code, shall we? Create
    a new project in Xcode, but this time choose the Window-based Application template
    with Universal selected in its Product pull-down menu, and name it **TellAFriend**.
    This way, you can use the same shared code for both iPhone and iPad, yet you’ll
    see how the interface appears slightly different on the two devices.


    Before you start working on `TellAFriend`’s primary functionality, you’ll want
    to first set the stage with some basic UI elements. Since many apps use the standard
    action button to present these kinds of sharing features, let’s build a navigation
    controller with an action button. This requires a few extra steps, so you can
    either follow along or download the completed project from the book’s companion
    code examples at `http://iPhoneBusinessBook.com/` or `http://www.apress.com/`.


    With the *Shared* folder selected in the Xcode project, choose File ![image](images/arrow.jpg)
    New File…, and then add a new `UIViewController` subclass with an XIB file and
    *.h* file. Name the new class **RootViewController**, and set it aside for now.
    We’ll come back to it in a few minutes.


    Open the *AppDelegate_iPhone.h* file and add two new lines of code (shown in bold):


    ```

    #import <UIKit/UIKit.h>


    @interface AppDelegate_iPhone : NSObject <UIApplicationDelegate> {

        UIWindow *window;

        UINavigationController *navigationController;

    }


    @property (nonatomic, retain) IBOutlet UIWindow *window;

    @property (nonatomic, retain) IBOutlet UINavigationController *navigationController;


    @end

    ```


    You’ll also need to add those bold code lines to the same places in your *AppDelegate_iPad.h*
    file. This code is for the navigation controller that we’ll be adding to the UI
    soon.


    Next, open the *AppDelegate_iPhone.m* file and modify its contents with a few
    new code lines (shown in bold):


    ```

    #import "AppDelegate_iPhone.h"

    #import "RootViewController.h"


    @implementation AppDelegate_iPhone


    @synthesize window;

    @synthesize navigationController;


    #pragma mark -

    #pragma mark Application lifecycle


    - (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary
    *)launchOptions {


    [self.window addSubview:navigationController.view];


    [self.window makeKeyAndVisible];


    return YES;

    }

    // THIS DEALLOC CAN BE REMOVED FOR ARC

    - (void)dealloc {

        [navigationController release];

        [window release];

        [super dealloc];

    }


    // There are several other default application methods also included in this

    // file, which we''ll omit from this code listing to conserve page space, but

    // DO NOT remove them from the actual file.


    @end

    ```


    As with the header files, you’ll also need to add those bold code lines to the
    same places in your *AppDelegate_iPad.m* file. This new code essentially adds
    the navigation controller’s view to the window and displays it.


    Now with all the code groundwork out of the way, open *MainWindow_iPhone.xib*
    in Interface Builder and add a `UINavigationController`. Wire the app delegate’s
    referencing outlet `navigationController` to the `UINavigationController`. Then
    with the `UINavigationController`’s view selected in the attributes inspector
    panel, assign the view’s NIB name to `RootViewController` with the Resize View
    From NIB option checked (see [Figure 5-3](#9781430262381_Ch05.xhtml#Fig3)). And,
    in the identity inspector panel, set the class to `RootViewController`. Save that
    file. Then perform the same steps with the *MainWindow_iPad.xib* file.


    ![9781430262381_Fig05-03.jpg](images/9781430262381_Fig05-03.jpg)


    [Figure 5-3](#9781430262381_Ch05.xhtml#_Fig3). Setting up the navigation controller
    for the iPhone UI in Interface Builder. The same steps will also need to be performed
    for the iPad UI in this universal app example'
  trans: "\n### 优化排版后的内容\n\n图 5-2. Lima Sky 在《 doodle Jump》中自定义了应用评分请求，以匹配游戏的趣味风格\n\
    \n无论采用哪种方法，都要注意不要过于激进。如果你不断向用户索要评分而惹恼他们，这一策略会适得其反。被你惹恼的用户会发表负面评分，抱怨他们多么讨厌被纠缠着提供反馈。为了获得最佳效果，只在一处或极少数精选位置请求一次。如果用户选择了“稍后再说”，他们随时可以通过访问“设置”或“信息”屏幕上的`评分此应用`按钮，在方便时对你的应用进行评分。\n\
    \n如果你希望在特定天数之后和/或应用启动一定次数后提示用户，但不想花时间实现额外的代码并使其支持多任务处理，可以查看 Arash Payan 的开源`Appirater`类，网址为\
    \ `http://github.com/arashpayan/appirater/`。（如果你觉得免费的`Appirater`代码有用，可以下载他的 iPhone\
    \ 应用 Jabeh 作为回报。）\n\n### 通过应用内邮件和社交网络“告诉朋友”\n\n与`评分此应用`按钮的概念类似，你也可以在应用中包含一个`告诉朋友`按钮，让你的客户能够向他们的朋友和家人推荐你的应用。这是一种经典的草根营销方式。通过为用户提供便捷的选项来讨论你的应用，你便主动迈出了一步，希望通过已被验证的口碑力量来增加应用的曝光率和销量。没有什么比来自可信赖同伴的推荐更能有效地销售产品了。\n\
    \n你想提供哪些选项？你可以使用 iOS SDK 的应用内邮件功能，直接从应用内部发送电子邮件，因此这是一个既简单又强大的功能。而随着 Twitter 和\
    \ Facebook 成为如此受欢迎的社交网络平台，你可能需要考虑也对这些平台提供支持。在 iOS 7 中，通过内置的 Social Framework，这变得前所未有的简单。只需几行代码，用户就可以通过\
    \ Tweet 和 Facebook 帖子谈论你的应用。如果操作得当，由此产生的流量绝对物超所值。\n\n### 使用第三方网络服务\n\n如果你决定连接第三方网络服务，首先需要阅读\
    \ API 许可协议，以确认它允许你在商业移动设备软件应用中访问该 API。即使它允许商业使用，也要考虑到该公司的条款未来可能会发生变化，或者它可能停止运营，迫使你移除该功能。如果你的应用将支持的\
    \ Web 服务作为按钮列在`UIActionSheet`上，那么你可以在未来的应用更新中灵活地轻松移除其中一个按钮。\n\n除了许可条款之外，第三方网络服务还可能进行\
    \ API 变更，从而破坏你的应用，导致你不得不匆忙向 App Store 提交一个新的修复更新。还记得 Twitpocalypse 事件吗？那是 2009\
    \ 年 6 月一次 Twitter API 变更，曾短暂地导致许多 iPhone Twitter 客户端应用无法使用。与你网站上可以即时发布新软件下载不同，你可能需要等待数天，让你的更新版本通过\
    \ App Store 的审核流程，之后客户才能使用。\n\n依赖第三方网络服务还会使你容易受到任何 API 中断或因服务器维护、错误或流量过大而出现的故障的影响。你需要以防御性编码方式编写应用，以便在支持的服务暂时不可用时能够优雅地处理。如果你的应用的社交网络功能无法正常运行，而应用未能通知用户第三方服务已宕机，他们会自动认为问题出在你的应用上，而不是\
    \ Twitter 或 Facebook。\n\nWeb 服务提供了非常适合移动应用消费的精彩内容，但在决定你的应用有多少功能将依赖第三方网络服务时，务必将这些潜在问题牢记在心。\n\
    \n### 通过应用内分享连接用户\n\n闲话少说，让我们动手尝试一点代码，好吗？在 Xcode 中创建一个新项目，但这次选择“基于窗口的应用程序”模板，并在其产品下拉菜单中选择“通用”，并将其命名为`TellAFriend`。这样，你可以为\
    \ iPhone 和 iPad 使用相同的共享代码，同时你将看到界面在两个设备上略有不同。\n\n在开始处理`TellAFriend`的主要功能之前，你首先需要进行一些基础\
    \ UI 元素的设置。由于许多应用使用标准的操作按钮来呈现这类分享功能，让我们构建一个带有操作按钮的导航控制器。这需要几个额外的步骤，你可以按照以下步骤操作，或者从本书配套的代码示例中下载完成的项目，网址为\
    \ `http://iPhoneBusinessBook.com/` 或 `http://www.apress.com/`。\n\n在 Xcode 项目中选中*Shared*文件夹，选择“文件\
    \ ![image](img/arrow.jpg) 新建文件…”，然后添加一个带有 XIB 文件和 `.h` 文件的新`UIViewController`子类。将新类命名为`RootViewController`，先将其放在一边。我们稍后会用到它。\n\
    \n打开`AppDelegate_iPhone.h`文件，添加两行新代码（以粗体显示）：\n\n```\n#import <UIKit/UIKit.h>\n\
    \n@interface AppDelegate_iPhone : NSObject <UIApplicationDelegate> {\n    UIWindow\
    \ *window;\n    UINavigationController *navigationController;\n}\n\n@property\
    \ (nonatomic, retain) IBOutlet UIWindow *window;\n@property (nonatomic, retain)\
    \ IBOutlet UINavigationController *navigationController;\n\n@end\n```\n\n你还需要将这些粗体代码行添加到你的`AppDelegate_iPad.h`文件中相同的位置。这段代码用于我们即将添加到用户界面中的导航控制器。\n\
    \n接下来，打开`AppDelegate_iPhone.m`文件，用几行新代码修改其内容（以粗体显示）：\n\n```\n#import \"AppDelegate_iPhone.h\"\
    \n#import \"RootViewController.h\"\n\n@implementation AppDelegate_iPhone\n\n@synthesize\
    \ window;\n@synthesize navigationController;\n\n#pragma mark -\n#pragma mark Application\
    \ lifecycle\n\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions {\n\n[self.window addSubview:navigationController.view];\n\n\
    [self.window makeKeyAndVisible];\n\nreturn YES;\n}\n// 对于 ARC，可以移除这个 DEALLOC\n\
    - (void)dealloc {\n    [navigationController release];\n    [window release];\n\
    \    [super dealloc];\n}\n\n// 此文件中还包含了其他几个默认的应用程序方法，\n// 为了节省页面空间我们在此代码清单中省略了它们，\n\
    // 但请勿从实际文件中移除它们。\n\n@end\n```\n\n与头文件一样，你还需要将这些粗体代码行添加到你的`AppDelegate_iPad.m`文件中的相同位置。这段新代码本质上是将导航控制器的视图添加到窗口并显示它。\n\
    \n现在，所有代码基础工作已经完成，在 Interface Builder 中打开`MainWindow_iPhone.xib`，并添加一个`UINavigationController`。将应用委托的引用出口`navigationController`连接到`UINavigationController`。然后，在属性检查器面板中选择`UINavigationController`的视图，将视图的\
    \ NIB 名称指定为`RootViewController`，并选中“从 NIB 调整视图大小”选项（参见图 5-3）。并且，在身份检查器面板中，将类设置为`RootViewController`。保存该文件。然后对`MainWindow_iPad.xib`文件执行相同的步骤。\n\
    \n![9781430262381_Fig05-03.jpg](img/9781430262381_Fig05-03.jpg)\n\n图 5-3. 在 Interface\
    \ Builder 中为 iPhone 用户界面设置导航控制器。在这个通用应用示例中，也需要为 iPad 用户界面执行相同的步骤\n"
- fmt: "```markdown\nYou’ll want the app to include a Tell A Friend button that displays\
    \ a `UIActionSheet` with various buttons for e-mail, Twitter, and Facebook. Why\
    \ use a `UIActionSheet`? It allows you to add the Tell A Friend feature with a\
    \ single button, so as not to be intrusive in your existing interface design.\
    \ It also consolidates all of the supported social networking services into a\
    \ single list, making it easy to add or remove options as needed. Want to add\
    \ support for another social networking platform? Just add another button to your\
    \ `UIActionSheet`, without disturbing your app’s main UI design.\n\nOpen the `RootViewController.h`\
    \ header file, and modify the code to read as follows:\n\n```\n#import <UIKit/UIKit.h>\n\
    \n@interface RootViewController : UIViewController <UIActionSheetDelegate> {\n\
    \n}\n\n- (IBAction)showShareOptions:(id)sender;\n\n@end\n```\n\nNotice the added\
    \ delegate reference to the `UIActionSheetDelegate` and the `IBAction` method\
    \ for the button you’ll be creating in Interface Builder. Save that file, and\
    \ now open the `RootViewController.m` implementation file. Change the code to\
    \ read as follows:\n\n```\n#import \"RootViewController.h\"\n\n@implementation\
    \ RootViewController\n\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\n//\
    \ Add action button to the navigation bar.\n    UIBarButtonItem *actionButton\
    \ = [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemAction\
    \ target:self action:@selector(showShareOptions:)];\n    self.navigationItem.rightBarButtonItem\
    \ = actionButton;\n    [actionButton release];\n}\n\n- (IBAction)showShareOptions:(id)sender\
    \ {\n    // Action button was tapped, so display Action Sheet.\n    UIActionSheet\
    \ *actionSheet = [[UIActionSheet alloc] initWithTitle:@\"Like This App? Tell A\
    \ Friend!\" delegate:self cancelButtonTitle:@\"Maybe Later\" destructiveButtonTitle:nil\
    \ otherButtonTitles:@\"Send Email\", @\"Post on Twitter\", @\"Share on Facebook\"\
    , nil];\n    [actionSheet showInView:self.view];\n    [actionSheet release]; \
    \  // Can be removed\n\n}\n\n- (void)actionSheet:(UIActionSheet *)actionSheet\
    \ didDismissWithButtonIndex:(NSInteger)buttonIndex {\n    if (buttonIndex != [actionSheet\
    \ cancelButtonIndex]) {\n        if (buttonIndex == 0) {\n            // Add Email\
    \ code here.\n        }\n        if (buttonIndex == 1) {\n            // Add Twitter\
    \ code here.\n        }\n        if (buttonIndex == 2) {\n            // Add Facebook\
    \ code here.\n        }\n    }\n}\n\n- (void)didReceiveMemoryWarning {\n    [super\
    \ didReceiveMemoryWarning];\n}\n\n- (void)viewDidUnload {\n    [super viewDidUnload];\n\
    }\n\n- (void)dealloc {\n    [super dealloc];\n}\n\n@end\n```\n\nIn `viewDidLoad`,\
    \ an action button is being dynamically added as the right button in the navigation\
    \ bar. Since `RootViewController` is the view assigned to the navigation controller\
    \ in both the iPhone and iPad interfaces, this new action button will display\
    \ itself on both the iPhone and iPad versions of the app.\n\nIf the user taps\
    \ the action button, the `showShareOptions` method is called. This is where you\
    \ display the `UIActionSheet` with the title “Like This App? Tell A Friend!” buttons\
    \ for e-mail, Twitter, and Facebook (see [Figure 5-4](#9781430262381_Ch05.xhtml#Fig4)).\
    \ As a `UIActionSheetDelegate`, the `RootViewController` is notified when a user\
    \ chooses an option from the action sheet. The user’s selection is captured in\
    \ the action sheet’s `didDismissWithButtonIndex` event.\n\n![9781430262381_Fig05-04.jpg](images/9781430262381_Fig05-04.jpg)\n\
    \n[Figure 5-4](#9781430262381_Ch05.xhtml#_Fig4). The Tell A Friend example app\
    \ in action on the iPhone\n\nWhen running the app on the iPad, you’ll notice that\
    \ the `UIActionSheet` is displayed as an iPad-centric popover (see [Figure 5-5](#9781430262381_Ch05.xhtml#Fig5)).\
    \ The Maybe Later (cancel) button is discarded by the system, since popovers are\
    \ dismissed by tapping anywhere outside the popover window.\n\n![9781430262381_Fig05-05.jpg](images/9781430262381_Fig05-05.jpg)\n\
    \n[Figure 5-5](#9781430262381_Ch05.xhtml#_Fig5). The same Tell A Friend example\
    \ app running on the iPad\n\nTapping on the Send Email, Post on Twitter, or Share\
    \ on Facebook button does nothing but dismiss the `UIActionSheet`, but that’s\
    \ because you haven’t added the functionality yet. On to the next steps…\n\n##\
    \ Adding E-mail Support\n\nWith the basic foundation of the Tell A Friend app\
    \ finished, now you need to add functionality to the Send Email button. The iOS\
    \ SDK includes framework support for an In-App Email feature, which allows users\
    \ to compose and send an e-mail message directly within your own app! Apple has\
    \ made In-App Email relatively easy for developers to employ, so adding this functionality\
    \ requires much less effort than you might expect.\n\nBefore you write any code,\
    \ the required MessageUI framework must be added to the Xcode project. To add\
    \ it, Ctrl-click the project’s `Frameworks` folder, and from the contextual menu\
    \ that appears, select Add ![image](images/arrow.jpg) Existing Frameworks… (see\
    \ [Figure 5-6](#9781430262381_Ch05.xhtml#Fig6)). Select `MessageUI.framework`\
    \ from the list that appears.\n\n![9781430262381_Fig05-06.jpg](images/9781430262381_Fig05-06.jpg)\n\
    \n[Figure 5-6](#9781430262381_Ch05.xhtml#_Fig6). To add a new framework, choose\
    \ Existing Frameworks from the contextual menu’s Add submenu, and then select\
    \ the `MessageUI.framework` from the list that appears\n\nOnce the `MessageUI`\
    \ framework is included in your project, you can dig into some programming. Open\
    \ the `RootViewController.h` header file, and modify the code as follows:\n\n\
    ```\n#import <UIKit/UIKit.h>\n#import <MessageUI/MessageUI.h>\n#import <MessageUI/MFMailComposeViewController.h>\n\
    \n@interface RootViewController : UIViewController <UIActionSheetDelegate, MFMailComposeViewControllerDelegate>\
    \ {\n\n}\n\n- (IBAction)showShareOptions:(id)sender;\n- (void)showMailComposer;\n\
    \n@end\n```\n\nAs you can see from the new code elements highlighted in bold,\
    \ the MessageUI framework classes have been imported, a new mail delegate was\
    \ added to the `@interface`, and a `showMailComposer` function is referenced.\
    \ Save this file.\n\nNow open the `RootViewController.m` implementation file,\
    \ and without changing the existing code, add the following two methods:\n\n```\n\
    // Displays an email composition interface inside the app\n// and populates all\
    \ the Mail fields.\n- (void)showMailComposer {\n\nClass mailClass = (NSClassFromString(@\"\
    MFMailComposeViewController\"));\n    if (mailClass != nil) {\n        // Test\
    \ to ensure that device is configured for sending emails.\n        if ([mailClass\
    \ canSendMail]) {\n\nMFMailComposeViewController *picker = [[MFMailComposeViewController\
    \ alloc] init];\n            picker.mailComposeDelegate = self;\n\n[picker setSubject:@\"\
    Check out this cool new app!\"];\n\n// Fill out the email body text\n        \
    \    NSString *emailBody = @\"Check out this cool new app for iPhone, iPad, and\
    \ iPod touch - now available in the App Store!\\n\\nBreadcrumbs - Parked Car Locator\\\
    n\\nWatch a video and learn more at:\\nhttp://www.breadcrumbsapp.com/\";\n   \
    \         [picker setMessageBody:emailBody isHTML:NO];\n\n[self presentModalViewController:picker\
    \ animated:YES];\n            [picker release];\n\n} else {\n            // Device\
    \ is not configured for sending emails, so notify user.\n            UIAlertView\
    \ *alertView = [[UIAlertView alloc] initWithTitle:@\"Unable to Email\" message:@\"\
    This device is not yet configured for sending emails.\" delegate:self cancelButtonTitle:@\"\
    Okay, I'll Try Later\" otherButtonTitles:nil];\n            [alertView show];\n\
    \            [alertView release];\n        }\n    }\n}\n\n// Dismisses the Mail\
    \ composer when the user taps Cancel or Send.\n- (void)mailComposeController:(MFMailComposeViewController*)controller\
    \ didFinishWithResult:(MFMailComposeResult)result error:(NSError*)error\n{\n \
    \   NSString *resultTitle = nil;\n    NSString *resultMsg = nil;\n```"
  raw: 'You’ll want the app to include a Tell A Friend button that displays a `UIActionSheet`
    with various buttons for e-mail, Twitter, and Facebook. Why use a `UIActionSheet`?
    It allows you to add the Tell A Friend feature with a single button, so as not
    to be intrusive in your existing interface design. It also consolidates all of
    the supported social networking services into a single list, making it easy to
    add or remove options as needed. Want to add support for another social networking
    platform? Just add another button to your `UIActionSheet`, without disturbing
    your app’s main UI design.


    Open the *RootViewController.h* header file, and modify the code to read as follows:


    ```

    #import <UIKit/UIKit.h>


    @interface RootViewController : UIViewController <UIActionSheetDelegate> {


    }


    - (IBAction)showShareOptions:(id)sender;


    @end

    ```


    Notice the added delegate reference to the `UIActionSheetDelegate` and the `IBAction`
    method for the button you’ll be creating in Interface Builder. Save that file,
    and now open the *RootViewController.m* implementation file. Change the code to
    read as follows:


    ```

    #import "RootViewController.h"


    @implementation RootViewController


    - (void)viewDidLoad {

        [super viewDidLoad];


    // Add action button to the navigation bar.

        UIBarButtonItem *actionButton = [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemAction
    target:self action:@selector(showShareOptions:)];

        self.navigationItem.rightBarButtonItem = actionButton;

        [actionButton release];

    }


    - (IBAction)showShareOptions:(id)sender {

        // Action button was tapped, so display Action Sheet.

        UIActionSheet *actionSheet = [[UIActionSheet alloc] initWithTitle:@"Like This
    App? Tell A Friend!" delegate:self cancelButtonTitle:@"Maybe Later" destructiveButtonTitle:nil
    otherButtonTitles:@"Send Email", @"Post on Twitter", @"Share on Facebook", nil];

        [actionSheet showInView:self.view];

        [actionSheet release];   // Can be removed


    }


    - (void)actionSheet:(UIActionSheet *)actionSheet didDismissWithButtonIndex:(NSInteger)buttonIndex
    {

        if (buttonIndex != [actionSheet cancelButtonIndex]) {

            if (buttonIndex == 0) {

                // Add Email code here.

            }

            if (buttonIndex == 1) {

                // Add Twitter code here.

            }

            if (buttonIndex == 2) {

                // Add Facebook code here.

            }

        }

    }


    - (void)didReceiveMemoryWarning {

        [super didReceiveMemoryWarning];

    }


    - (void)viewDidUnload {

        [super viewDidUnload];

    }


    - (void)dealloc {

        [super dealloc];

    }


    @end

    ```


    In `viewDidLoad`, an action button is being dynamically added as the right button
    in the navigation bar. Since `RootViewController` is the view assigned to the
    navigation controller in both the iPhone and iPad interfaces, this new action
    button will display itself on both the iPhone and iPad versions of the app.


    If the user taps the action button, the `showShareOptions` method is called. This
    is where you display the `UIActionSheet` with the title “Like This App? Tell A
    Friend!” buttons for e-mail, Twitter, and Facebook (see [Figure 5-4](#9781430262381_Ch05.xhtml#Fig4)).
    As a `UIActionSheetDelegate`, the `RootViewController` is notified when a user
    chooses an option from the action sheet. The user’s selection is captured in the
    action sheet’s `didDismissWithButtonIndex` event.


    ![9781430262381_Fig05-04.jpg](images/9781430262381_Fig05-04.jpg)


    [Figure 5-4](#9781430262381_Ch05.xhtml#_Fig4). The Tell A Friend example app in
    action on the iPhone


    When running the app on the iPad, you’ll notice that the `UIAlertSheet` is displayed
    as an iPad-centric popover (see [Figure 5-5](#9781430262381_Ch05.xhtml#Fig5)).
    The Maybe Later (cancel) button is discarded by the system, since popovers are
    dismissed by tapping anywhere outside the popover window.


    ![9781430262381_Fig05-05.jpg](images/9781430262381_Fig05-05.jpg)


    [Figure 5-5](#9781430262381_Ch05.xhtml#_Fig5). The same Tell A Friend example
    app running on the iPad


    Tapping on the Send Email, Post on Twitter, or Share on Facebook button does nothing
    but dismiss the `UIAlertSheet`, but that’s because you haven’t added the functionality
    yet. On to the next steps…


    Adding E-mail Support


    With the basic foundation of the Tell A Friend app finished, now you need to add
    functionality to the Send Email button. The iOS SDK includes framework support
    for an In-App Email feature, which allows users to compose and send an e-mail
    message directly within your own app! Apple has made In-App Email relatively easy
    for developers to employ, so adding this functionality requires much less effort
    than you might expect.


    Before you write any code, the required MessageUI framework must be added to the
    Xcode project. To add it, Ctrl-click the project’s *Frameworks* folder, and from
    the contextual menu that appears, select Add ![image](images/arrow.jpg) Existing
    Frameworks… (see [Figure 5-6](#9781430262381_Ch05.xhtml#Fig6)). Select MessageUI.framework
    from the list that appears.


    ![9781430262381_Fig05-06.jpg](images/9781430262381_Fig05-06.jpg)


    [Figure 5-6](#9781430262381_Ch05.xhtml#_Fig6). To add a new framework, choose
    Existing Frameworks from the contextual menu’s Add submenu, and then select the
    MessageUI.framework from the list that appears


    Once the MessageUI framework is included in your project, you can dig into some
    programming. Open the *RootViewController.h* header file, and modify the code
    as follows:


    ```

    #import <UIKit/UIKit.h>

    #import <MessageUI/MessageUI.h>

    #import <MessageUI/MFMailComposeViewController.h>


    @interface RootViewController : UIViewController <UIActionSheetDelegate, MFMailComposeViewControllerDelegate>
    {


    }


    - (IBAction)showShareOptions:(id)sender;

    - (void)showMailComposer;


    @end

    ```


    As you can see from the new code elements highlighted in bold, the MessageUI framework
    classes have been imported, a new mail delegate was added to the `@interface`,
    and a `showMailComposer` function is referenced. Save this file.


    Now open the *RootViewController**.m* implementation file, and without changing
    the existing code, add the following two methods:


    ```

    // Displays an email composition interface inside the app

    // and populates all the Mail fields.

    - (void)showMailComposer {


    Class mailClass = (NSClassFromString(@"MFMailComposeViewController"));

        if (mailClass != nil) {

            // Test to ensure that device is configured for sending emails.

            if ([mailClass canSendMail]) {


    MFMailComposeViewController *picker = [[MFMailComposeViewController alloc] init];

                picker.mailComposeDelegate = self;


    [picker setSubject:@"Check out this cool new app!"];


    // Fill out the email body text

                NSString *emailBody = @"Check out this cool new app for iPhone, iPad,
    and iPod touch - now available in the App Store!\n\nBreadcrumbs - Parked Car Locator\n\nWatch
    a video and learn more at:\nhttp://www.breadcrumbsapp.com/";

                [picker setMessageBody:emailBody isHTML:NO];


    [self presentModalViewController:picker animated:YES];

                [picker release];


    } else {

                // Device is not configured for sending emails, so notify user.

                UIAlertView *alertView = [[UIAlertView alloc] initWithTitle:@"Unable
    to Email" message:@"This device is not yet configured for sending emails." delegate:self
    cancelButtonTitle:@"Okay, I''ll Try Later" otherButtonTitles:nil];

                [alertView show];

                [alertView release];

            }

        }

    }


    // Dismisses the Mail composer when the user taps Cancel or Send.

    - (void)mailComposeController:(MFMailComposeViewController*)controller didFinishWithResult:(MFMailComposeResult)result
