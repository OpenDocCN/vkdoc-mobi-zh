  trans: '

    # 应用内交叉推广的成功之道


    Optime Software 旗下应用成功的一个重要因素，便是其对应用内交叉推广的大量运用。当用户启动 Optime 的一款免费广告支持型应用时，一个启动画面会短暂出现。在用户等待应用加载的过程中，启动画面不仅会推广当前免费应用的高级版本，还会列出
    Optime 的其他几款免费应用（见图 5-11）。列出的每个应用都是一个实时链接。点击该应用名称，便会跳转到 App Store 中相应的页面，以便用户了解详情并进行下载。


    ![9781430262381_Fig05-11.jpg](img/9781430262381_Fig05-11.jpg)


    图 5-11. Optime Software 免费应用的启动画面有效地交叉推广了其其他应用


    虽然 Optime Software 通过在应用内广告网络中交叉推广其应用，使销售额增长了四到五倍（这将在第 7 章中探讨），但其自身的应用内交叉推广也被证明是提升现有用户对其所有免费应用认知度的宝贵方法。下载量越多，公司最终从广告收入和高级应用销售中获得的收益就越多。


    “启动画面交叉推广对我们来说是一种非常有效的工具，” Optime Software 的创始人兼 CEO Jon Schlegel 表示。“我们会追踪启动画面广告的点击率，但不会追踪转化率。我们某些启动画面广告的点击率高达
    10%。不过，启动画面广告的点击率往往会随着时间的推移而下降，因为普通用户会逐渐适应这些广告并开始忽略它们。我们正在研究如何让启动画面广告更具动态性，以提高其效果。”


    **应用被拒警告**   尽管苹果的 iOS 人机交互指南（HIG）表示不赞同使用启动画面做广告，但在 App Store 的无数应用中，这种做法似乎很普遍。然而，当你通过
    iTunes Connect 提交应用时，如果因为启动画面而被拒，那就说明你的做法有些过头了。如果你确实在应用中使用了启动画面，那么在提交之前，请确保它不会在屏幕上停留过长时间，并且不要进行过于直白生硬的推销。由于启动画面处于审核流程中那个神秘的灰色地带，因此，在设计启动画面作为交叉推广工具时，务必小心谨慎，使其在视觉上保持有效的同时，又不会过于引人注目。


    许多游戏发行商选择了另一种方法，即在应用的主屏幕上放置一个“更多游戏”按钮。在某些应用中，点击“更多游戏”按钮会在移动版 Safari 中打开发行商的网站。这会让用户离开他们正在玩的游戏，这绝非最佳体验。


    ## 开店设铺


    为了让用户更沉浸于应用之中，NimbleBit 选择在其游戏中嵌入自定义的“应用商店”。点击其应用中的“更多游戏”按钮，会显示 NimbleStore 屏幕，该屏幕会交叉推广其所有可用的应用（见图
    5-12）。点击 NimbleStore 屏幕上的应用图标，不会自动将用户重定向到 App Store 中的相应页面，而是会显示该应用的一个嵌入式自定义屏幕。这使得
    NimbleBit 能够定制其增强版的销售宣传，并提供指向其 App Store 页面的链接。


    ![9781430262381_Fig05-12.jpg](img/9781430262381_Fig05-12.jpg)


    图 5-12. 在 NimbleBit 的游戏中点击“更多游戏”按钮，会显示其嵌入式的 NimbleStore，该商店通过视频预告片等素材交叉推广其全部应用目录


    嵌入式 NimbleStore 的精妙之处在于它是一个托管在`UIWebView`中的远程迷你站点。这不仅允许 NimbleBit 修改位于`http://m.nimblebit.com/`的
    NimbleStore 页面，而无需更新 iPhone 和 iPad 游戏本身，还让公司能够使用 Google Analytics 追踪用户正在访问哪些商店页面。根据
    NimbleBit 的统计数据，大约 85% 访问其应用内 NimbleStore 的用户会继续浏览某个特定的游戏页面。仅在最初的九个月内，NimbleStore
    就获得了略高于 160 万的页面浏览量，并促成了 13,170 份游戏销售！


    远程托管的 NimbleStore 使 NimbleBit 能够根据地区和限时优惠动态调整定价。苹果倾向于拒绝那些显示应用定价的应用，所以我不确定 NimbleBit
    是如何逃脱这一特定限制的（除非远程托管页面是其中的区别）。因此，为了安全起见，你在自己的应用内交叉推广中可能不应列出价格。


    当用户选择从 NimbleStore 购买应用时，点击“App Store”按钮会将用户引导至 iTunes App Store 完成购买。正如任何聪明的
    iOS 开发者都会设置的那样，所有重定向到 App Store 的链接都是 iTunes 联盟链接，因此，每当用户购买 NimbleStore 中列出的任何游戏时，NimbleBit
    都能获得联盟佣金。iTunes 联盟计划还使 NimbleBit 能够追踪所赚取的佣金，从而报告通过 NimbleStore 引导购买的游戏总数。


    NimbleStore 中列出的“我们喜爱的应用”游戏（如 Harbor Master）并非 NimbleBit 的游戏。虽然这些特定的购买不会给 NimbleBit
    带来 App Store 的版税，但能为公司赚取联盟佣金。因此，如果你的应用数量不足以填充你自己的嵌入式迷你商店，你总是可以列出一些来自其他发行商的你最喜欢的应用。你既支持了同行开发者，又能从推荐中获得一点收益。你将在第
    6 章中了解更多关于 iTunes 联盟计划的信息。


    如果你只有少数几个应用，并且更愿意将交叉推广努力局限于精简版应用的“关于”屏幕（你目前在那里向上销售付费版本），那么请注意不要过分稀释你的营销信息。如果鼓励用户升级到付费版本是你的首要任务，请确保同一屏幕上关于你其他应用的任何提及都不会抢了付费版本销售宣传的风头。


    ## 联合则兴


    如果你喜欢在应用中集成自己的迷你商店以交叉推广其他应用的想法，但又没有足够多的应用来填充它，那么可以考虑与少数几位同行开发者合作。当多个开发者在其所有应用中集成一个共享的“社区”商店时，你将从一个内容丰富的店面中受益。同时，你还能获得增强的协同效应，不仅在你自己的应用内，还能在这个社区网络的所有其他应用中进行交叉推广。这对所有参与的开发者来说都是一个双赢的局面。


    这正是几位独立的 iOS 游戏开发者联合起来组建 App Treasures 时想要实现的策略。最初参与 App Treasures 的开发者包括 The
    Blimp Pilots (Koi Pond)、Imangi Studios (Harbor Master)、Snappy Touch (Flower Garden)、Streaming
    Colour Studios (LandFormer) 和 Veiled Games (Up There)。他们将 App Treasures 这个标签定位为消费者可以信赖的质量保证。如果玩家喜欢其中一款游戏，他们很可能也会喜欢
    App Treasures 家族中的其他游戏。

    '
- fmt: '`App Treasures`可从所有参与游戏的“更多游戏”按钮中访问，它是一个嵌入式视图，用于展示这些开发商的应用程序。如 iPad 版`Harbor
    Master HD`中所示（参见[图 5-13](#9781430262381_Ch05.xhtml#Fig13)），在“更多游戏”屏幕上，`App Treasures`按钮与`Imangi
    Studios`推广的应用程序并列显示。


    ![9781430262381_Fig05-13.jpg](images/9781430262381_Fig05-13.jpg)


    [图 5-13](#9781430262381_Ch05.xhtml#_Fig13)：在任何参与开发者的应用中探索“更多游戏”部分，以访问交叉推广的`App
    Treasures`屏幕。


    由于应用商店的游戏类别通常由`Electronic Arts`和`Gameloft`等大型游戏发行商主导，小型独立开发者认为他们更难获得同等程度的曝光度。`Imangi
    Studios`的首席执行官`Keith Shepherd`表示，`App Treasures`“是我们整合资源、成为更大玩家的方式，同时保持我们的独立性，且没有与发行商合作所带来的任何弊端和附加条件。”


    这种共享式交叉推广网络的价值在于，当某个合作伙伴的应用成功时，其他合作伙伴也能从曝光度的提升中受益。当`Harbor Master`迅速攀升至应用商店前 25
    名时，嵌入式`App Treasures`屏幕每天多达 10,000 次浏览，这导致其他列出的`App Treasures`游戏销量激增。


    如果你觉得在应用网络中交叉推广自己的游戏这个概念很有吸引力，但你并不认识其他开发者，或者没有时间构建自己的应用内迷你商店，那么有一些第三方解决方案可用。其中一种替代方案是`PlayHaven`，这是一项免费的移动推广服务，它提供现成的、嵌入式应用目录，其外观和功能与`NimbleBit`和`App
    Treasures`使用的自定义目录相似。你可以通过`http://www.playhaven.com/`注册`PlayHaven`。


    使用`PlayHaven`的好处是，随着越来越多的应用开发者加入这项免费服务，网络不断壮大，发现你列出的游戏的潜在受众群体也会越来越大。当一些参与游戏成为畅销品时，比如`The
    Playforge`的`Zombie Farm`，尤其如此。这些热门作品极大地增加了点击“更多游戏”按钮、浏览`PlayHaven`网络以及查看一些不太知名游戏的用户数量（参见[图
    5-14](#9781430262381_Ch05.xhtml#Fig14)）。


    ![9781430262381_Fig05-14.jpg](images/9781430262381_Fig05-14.jpg)


    [图 5-14](#9781430262381_Ch05.xhtml#_Fig14)：`PlayHaven`提供免费的应用内交叉推广服务，让你的游戏在其整个参与应用网络中获得曝光。


    对于游戏开发者而言，另一个用于应用内交叉推广和提升应用发现度的绝佳解决方案是将众多第三方社交游戏平台（如`OpenFeint`和苹果的`Game Center`）集成到你的游戏中。请继续阅读……


    ## 让你的用户借助第三方社交游戏平台互动起来


    如果你是游戏开发者，你很可能熟悉适用于 iOS 的社交游戏平台，例如`OpenFeint`、`Scoreloop`、`Plus+`以及苹果自己的`Game
    Center`。使用这些平台之一的明显好处是，它们提供了现成的托管服务——比如高分排行榜、多人游戏连接和社交挑战——这减轻了你自行编写这些复杂功能代码的需求。通过将第三方社交平台集成到你的
    iPhone 和 iPad 游戏中，你可能会节省数百小时的编程时间。这似乎是一件轻而易举的事，尤其是大多数这些平台都可以免费使用。


    ### 热情是会传染的


    一些开发者没有意识到的是，许多社交游戏平台也提供了提升应用发现度的强大环境。使用同一社交平台的游戏越多，它们就越能共同受益于该平台固有的交叉推广协同效应。除了它们大多支持
    Twitter 和 Facebook 之外，有些还提供“虚拟大厅”，用户可以看到其他人在玩什么游戏，以及哪些游戏与该平台相连。这些领域中当前流行内容的巨大影响力有助于推动新的应用销售，因为感兴趣的用户想要参与其中。


    “如果朋友让你看一部电影或听一首歌，你很可能会基于朋友的推荐去购买那部电影或那首歌。这就是 Facebook 应用平台如此成功的原因，也是构建`OpenFeint`的基本原则之一，”`Aurora
    Feint`的创始人兼首席执行官`Jason Citron`说道。“`OpenFeint`提供类似`Xbox Live`风格的托管游戏服务，如多人游戏、排行榜、挑战、聊天、成就等，当玩家与之互动时，就会产生交叉推广事件。因此，例如，通过使用`OpenFeint`为你的游戏添加成就和排行榜，你将卖出更多游戏。需要指出的是，这并非空洞的推销话术——我们今天看到这种情况发生在数百万玩家和数百款游戏中。听起来可能有点离谱，但你做的工作更少，你的玩家更开心，你卖出更多游戏，而苹果会支付我们联盟佣金，所以你无需为此付费。”


    事实上，应用发现是这些社交环境中一个非常强大的组成部分，以至于运营这些免费平台的公司正通过收取 iTunes 联盟佣金来实现其服务的货币化。`Aurora
    Feint`的`OpenFeint`和`ngmoco`的`Plus+`在其应用中内置了突出的游戏目录，推广各自网络上所有参与的游戏（参见[图 5-15](#9781430262381_Ch05.xhtml#Fig15)）。`OpenFeint`甚至正在尝试为开发者提供额外的推广机会，例如其“每日免费游戏”功能。


    ![9781430262381_Fig05-15.jpg](images/9781430262381_Fig05-15.jpg)


    [图 5-15](#9781430262381_Ch05.xhtml#_Fig15)：除了众多社交功能外，`Aurora Feint`的`OpenFeint`（左）和`ngmoco`的`Plus+`（右）为游戏开发者提供了极具吸引力的交叉推广机会，使用户能够看到其他人在玩什么，甚至购买列出的游戏以加入其中。


    ## 选择社交游戏平台


    那么，哪个社交游戏平台适合你的游戏呢？在选择平台时，有两个主要因素需要考虑：


    *   被更多高知名度畅销游戏采用的平台将吸引更广泛的受众。聚集在一个在线社区中的玩家越多，你的应用获得的曝光度就越高。

    *   尽管应用发现无疑是一个至关重要的组成部分，但你的首要任务应该是选择最适合你应用特定玩法的平台。它需要让你的游戏变得更有趣，而不是更复杂或更令人沮丧。如果你的玩家玩得很开心，这种热情会体现在在线社交社区中，进而推动额外的销量。


    随着苹果`Game Center`内置到 iOS 4.1（及更高版本）中，许多第三方社交游戏平台迅速适应，引入了新功能，使其超越了`Game Center`当前的基本功能集。事实上，像`OpenFeint`这样的平台已经通过提供深度兼容性来拥抱`Game
    Center`。`OpenFeint`的策略是，通过让开发者能够混合搭配`OpenFeint`和`Game Center`的最佳功能，最终结果对`OpenFeint`及其庞大的现有游戏玩家用户群来说是双赢的。'
  raw: 'Accessible from the More Games button within all the participating games,
    App Treasures is an embedded view that spotlights apps from those developers.
    As seen in Harbor Master HD for the iPad (see [Figure 5-13](#9781430262381_Ch05.xhtml#Fig13)),
    the App Treasures button is listed alongside the Imangi Studios’ promoted apps
    on the More Games screen.


    ![9781430262381_Fig05-13.jpg](images/9781430262381_Fig05-13.jpg)


    [Figure 5-13](#9781430262381_Ch05.xhtml#_Fig13). Explore the More Games section
    in any of the participating developers’ apps to access the cross-promotional App
    Treasures screen


    With the App Store’s games category so often dominated by the big game publishers
    such as Electronic Arts and Gameloft, the feeling was that it was more difficult
    for smaller, independent developers to gain the same level of visibility. Keith
    Shepherd, CEO of Imangi Studios, said that App Treasures “is our way of combining
    resources to become a bigger player, while retaining our independence and without
    any of the drawbacks and strings attached that come from working with a publisher.”


    What makes this kind of shared, cross-promotional network especially valuable
    is that when one partner’s app becomes successful, the other partners benefit
    from the heightened exposure. When Harbor Master skyrocketed into the App Store’s
    Top 25, the embedded App Treasures screen was receiving as many as 10,000 views
    a day, which resulted in a sales surge for the other App Treasures games listed
    there.


    If cross-promoting your games across a network of apps is a concept that appeals
    to you, but you don’t really know other developers or don’t have the time to build
    your own in-app mini-store, third-party solutions are available. One such alternative
    is PlayHaven, a free mobile promotion service that provides a ready-made, embedded
    app catalog that looks and functions similar to the custom ones used by NimbleBit
    and App Treasures. You can sign up for PlayHaven at `http://www.playhaven.com/`.


    The advantage of using PlayHaven is that as more and more app developers join
    this free service and the network continues to grow, the larger the potential
    audience that may discover your listed game becomes. This is especially true when
    some of the participating games become best sellers, such as The Playforge’s Zombie
    Farm. These hits greatly increase the number of consumers tapping that More Games
    button, browsing the PlayHaven network, and checking out some of the lesser-known
    games (see [Figure 5-14](#9781430262381_Ch05.xhtml#Fig14)).


    ![9781430262381_Fig05-14.jpg](images/9781430262381_Fig05-14.jpg)


    [Figure 5-14](#9781430262381_Ch05.xhtml#_Fig14). PlayHaven offers a free in-app
    cross-promotion service that provides exposure for your games across its entire
    network of participating apps


    For game developers, another great solution for in-app cross-promotion and increasing
    app discovery is by integrating one of the many third-party social gaming platforms
    such as OpenFeint and Apple’s Game Center into your game. Keep reading…


    Get Your Users Talking with Third-Party Social Gaming Platforms


    If you’re a game developer, you’re most likely familiar with the social gaming
    platforms available for iOS, such as OpenFeint, Scoreloop, Plus+, and Apple’s
    own Game Center. The obvious benefit to using one of these platforms is that they
    provide ready-to-use hosted services—such as high-score leaderboards, multiplayer
    connectivity, and social challenges—that alleviate the need for you to code this
    complex functionality yourself. By integrating a third-party social platform into
    your iPhone and iPad games, you’re potentially saving hundreds of hours of programming
    time. This seems like a no-brainer, especially since most of these platforms are
    free to use.


    Enthusiasm Is Contagious


    What some developers don’t realize is that many of the social gaming platforms
    also provide powerful environments for increased app discovery. The more games
    that use the same social platform, the more they all benefit from that platform’s
    inherent cross-promotional synergy. Beyond the fact that most of them include
    Twitter and Facebook support, some of them also offer “virtual lobbies,” where
    users can see what other people are playing and which games are connected with
    that platform. The sheer influence of what’s currently popular in these arenas
    helps drive new app sales, because interested users want to get in on the action.


    “If a friend tells you to watch a movie or listen to a song, it’s pretty likely
    you’re going to buy that movie or song based on your friend’s recommendation.
    This is why Facebook’s App Platform has been so successful and is one of the basic
    principles upon which OpenFeint is built,” says Jason Citron, founder and CEO
    of Aurora Feint. “OpenFeint provides Xbox Live–style hosted game services such
    as multiplayer, leaderboards, challenges, chat, achievements, etc., that create
    cross-promotion events when players interact with them. So, for example, by adding
    achievements and leaderboards to your game with OpenFeint, you will sell more
    games. It’s important to mention that this isn’t some dry sales pitch—we see this
    happening today with millions of players across hundreds of games. As ridiculous
    as it sounds, you do less work, your players have more fun, you sell more games,
    and Apple pays us affiliate fees so you don’t have to.”


    In fact, app discovery is such a strong component in these social environments
    that the companies that run these free platforms are monetizing their services
    by collecting iTunes affiliate fees. Aurora Feint’s OpenFeint and ngmoco’s Plus+
    feature prominent in-app game catalogs, promoting all of the participating games
    on their respective networks (see [Figure 5-15](#9781430262381_Ch05.xhtml#Fig15)).
    OpenFeint is even experimenting with additional promotional opportunities for
    developers, such as its Free Game of the Day feature.


    ![9781430262381_Fig05-15.jpg](images/9781430262381_Fig05-15.jpg)


    [Figure 5-15](#9781430262381_Ch05.xhtml#_Fig15). Beyond their many social features,
    Aurora Feint’s OpenFeint (left) and ngmoco’s Plus+ (right) provide appealing cross-promotion
    opportunities for game developers, which enable users to see what other people
    are playing and even purchase the listed games to join in the fun


    Choosing a Social Gaming Platform


    So, which social gaming platform is right for your game? When choosing a platform,
    there are two major factors to consider:


    *   The platform that is being adopted by more of the high-profile best sellers
    will attract a larger audience. More players congregating in one online community
    equal more exposure for your app.

    *   Although app discovery is definitely a vital component, your number-one priority
    should be to choose the platform that works best for your app’s specific game
    play. It needs to make your game more fun, not more complicated or frustrating.
    If your players are having a great time, that enthusiasm will show in the online
    social community, which will in turn drive additional sales.


    With the advent of Apple’s Game Center built into iOS 4.1 (and higher), many of
    these third-party social gaming platforms have quickly adapted with new functionality
    that sets them above and beyond the current basic feature set of Game Center.
    In fact, some of them, like OpenFeint, have embraced Game Center by offering deep
    compatibility. OpenFeint’s strategy is that by enabling developers to mix and
    match the best features from both OpenFeint and Game Center, the end result is
    a win-win for both OpenFeint and its massive user base of existing game players.'
