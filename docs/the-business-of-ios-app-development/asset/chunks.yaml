    that programmers would rather not deal with, but this is vital knowledge for safeguarding
    your business. Michael Schneider, an expert lawyer turned app developer, will
    walk you through the essentials of protecting both yourself and your intellectual
    property.


    Chapter    3


    Protecting Your Intellectual Property'
  trans: '

    **注意** 如果你计划将应用上架到本国以外的多个地区性 App Store，你还需要检查这些国家/地区的注册商标以及该名称的任何使用情况。如需在国际范围内保障和保护你的应用名称权利，建议咨询商标律师。


    如果你计划只将其用于 iOS 移动应用，那么某个 Android、Mac 或 Windows 软件产品已经使用该名称又有什么关系呢？这会造成消费者的品牌混淆，他们可能会错误地认为你的应用是同名
    Android、Mac 或 Windows 应用的 iOS 版本。如果另一家软件公司先使用了该名称并能证明在先使用权（该名称和标识的在先公开使用），特别是如果该公司已经注册了商标，你就会在法律上处于弱势。你肯定不希望花费数月开发应用后，却收到该公司律师的停止侵权函。更糟的是，如果你的应用在
    App Store 中大获成功，你也不希望该公司起诉你商标侵权，并要求分走你应用收入的一部分。


    我的目的并非吓唬你，而只是让你了解在为 iOS 应用选择独特名称时需要注意的潜在雷区。这是你应该为原创应用名称、图标和标识采取的法律保护措施，因此请查看第
    3 章中 Michael Schneider 解释注册商标益处和流程的部分。


    关于应用名称的最后一个思考是不同 iOS 设备目标之间的区别。如果你正在为 iPhone 和 iPad 分别开发独立版本的应用（而不是单个通用应用），你需要相应地加以区分。


    当 iPad 首次发布时，iPhone 开发者发布了带有标识性`HD`名称后缀的 iPad 专用版本，巧妙地点明了平板电脑更大的高清屏幕尺寸。快速浏览 App
    Store 会发现不少使用这种命名规范的 iPad 应用和游戏，例如`Real Racing HD`、`Harbor Master HD`和`Flick Fishing
    HD`。不幸的是，在接下来的几个月里，苹果推出了配备 Retina 显示屏的 iPhone 4，这是一块真正的高清屏幕。对于那些已经凭借`HD`名称站稳脚跟的
    iPad 应用来说，进行名称变更得不偿失。但在后 iPhone 4 时代，新的 iPad 开发者正逐渐远离`HD`标识符，因为无法确定未来哪些 iOS 设备会搭载
    Retina 显示屏。许多近期发布的应用仅仅按设备区分其在 App Store 中的名称，例如`GoodReader for iPhone`和`GoodReader
    for iPad`——这是我强烈推荐的策略。在过去几个月中，苹果鼓励开发者开始使用通用应用，甚至有消息称，如果存在 iPhone 版本，苹果会拒绝这些`HD`应用。


    ## 注册网站域名


    既然你已经决定了应用名称，你会希望在别人之前抢先注册一个对应的域名。为你的 iOS 应用拥有一个专属网站对其成功至关重要。该网站是推广应用和提供客户支持的中心场所。现在先不用考虑其设计和结构。我将在第
    10 章中讨论如何将你的网站打造成一个有效的推广工具和支持中心。


    当下的重要任务是为你应用确保一个好的域名。要了解你想要的域名是否已被注册（如果是，谁在使用它们），可以搜索 WHOIS 数据库。以下是几个可以进行此操作的网站：


    - DomainTools WHOIS Lookup (`http://whois.domaintools.com/`)

    - WHOIS Domain Search (`http://www.whois.net`)

    - Network Solutions WHOIS Search (`http://www.networksolutions.com/whois/`)


    仅仅在域名注册商处搜索域名，只能告诉你该域名是否已被注册。而 WHOIS 搜索通常会提供已注册域名所有者的详细信息。


    如果你在寻找与应用名称匹配的可用域名时遇到困难，可以尝试在名称末尾加上`app`或`game`（如果它是游戏）。例如，对于流行的应用`Simplenote`，域名`Simplenote.com`已被注册，因此开发者注册了`SimplenoteApp.com`。


    `Register.com`和`NetworkSolutions.com`是知名的域名注册商。我个人更喜欢`GoDaddy.com`。还有大量其他选择，其中许多提供更便宜的注册价格。先在网上做些购物调查，找到一家能提供你所需功能且价格符合预算的域名注册商。


    如果你目前运营着自己的博客或网站，则无需为 iOS 应用创建一个独立的网站。你可以为你的 iOS 应用相关网页在现有网站上添加一个目录，然后将你的应用网址重定向到该新目录。如果你现有的网站或博客已经有了自定义网址，为什么还需要一个独特的应用网址？将消费者引导至`http://www.breadcrumbsapp.com/`，看起来要比`http://www.mywebsite.com/software/iphone/breadcrumbs/`专业得多。


    此外，一个简短、专用的应用网址更容易让人记住。而且大多数域名注册商都提供网址转发服务，这样你可以轻松地将独特的应用网址设置为你想要的任何重定向目标。将流量导向你现有的网站也是交叉推广你提供的其他应用和服务的一个绝佳策略。


    **注意** 在选择域名注册商时，请务必检查哪些服务需要额外收费。例如，`GoDaddy.com`在域名注册中包含免费网址转发，而其他注册商可能会对网址转发收取额外年费。


    ## 为 iOS 应用打造独特身份


    完成了所有竞争性研究后，你就有机会看到你将与之竞争的各类应用图标。


    拥有一个既独特又能反映应用核心功能和 UI 设计的应用图标非常重要。这听起来可能很明显，但令我惊讶的是，许多开发者在设计应用图标时，往往闭门造车，完全不顾及竞争对手已经在使用的图标。正因如此，许多类似的应用会无意中拥有相似的图标。在
    App Store 中搜索特定类型的应用时，结果页面往往满是看起来非常相似的应用图标，这使得整个群体在表面上显得相当同质化。


    如果你正在构建一个写作应用，而所有类似的应用都采用笔记本主题的图标，那就尝试想出一个既传达写作主题又与众不同的巧妙视觉设计。如果大多数竞争对手都使用蓝色图标，那么可以考虑为你的应用图标使用对比色（例如红色或橙色）。你是在尝试将应用打造成一个品牌，而要成功，你所推销的品牌形象必须独特且引人注目。


    既然你手头有竞争应用的列表，那么在现在到第 4 章（涵盖有效的应用图标设计）之间，应用图标设计只是你可以思考的一个方面，尤其是下一章包含了关于为你应用名称和图标申请商标的有用信息。所以，好好琢磨一下吧。


    ## 取得进展


    你在本章中涉及了众多内容，所以花点时间喘口气。下一章非常重要。是的，它将处理那些程序员们宁愿不去面对的法律难题，但这是保护你业务的关键知识。由资深律师转型为应用开发者的
    Michael Schneider，将引导你掌握保护自身及知识产权的基本要点。


    ## 第 3 章


    ### 保护你的知识产权

    '
- fmt: '本章由技术交易律师兼iPhone开发者Michael Schneider撰写。作为一名律师，Michael 帮助客户处理知识产权和技术相关合同，协助他们构建、实现盈利并保护其产品。作为一名iPhone开发者，Michael
    发布了许多成功的应用，包括`TouchType`、`Private-I`以及Andrew Johnson系列自助应用。


    当你构建一个iOS应用时，你就在创造知识产权。与传统企业不同，软件公司的价值通常不基于有形资产。随着业务增长，你可能不会建造工厂或购买卡车车队。你的企业价值不在于房地产或设备，而在于你所创造的无形资产。你的产品及其所有权将成为公司的核心资产，因此，理解如何识别和保护构成该所有权及公司价值基础的知识产权至关重要。


    知识产权不仅能让你向他人出售或许可，还能防止竞争对手窃取你的劳动成果。即使你无意于通过将应用出售给最终用户之外的方式来将知识产权变现，了解你的权利也能帮助你抵御模仿者。


    同样，作为应用开发者，你需要避免侵犯他人的知识产权。理解各类知识产权的优势和局限性，将帮助你了解法律允许和禁止的行为。掌握了这些知识，你就能更自信地构建应用，并抵御那些试图用虚假主张来欺压你的人。知道界限在哪里，能帮助你在不越界、不侵犯他人权利的情况下更接近这些界限。


    在本章中，你将了解如何获得不同类型知识产权保护，并思考在应用开发的背景下哪些类型最有意义。你还会探讨一些可能损害你知识产权权利和企业价值的常见陷阱。


    为了让你了解本章的来龙去脉，在涉足iPhone开发之前，我曾担任科技公司的律师，帮助构建、保护产品并实现其盈利。需要声明的是，即使在iOS开发者之间，每个人的法律需求也不尽相同。尽管我试图从一般意义上解释iOS应用开发和销售中的一些法律问题，但本章不应被视为法律建议。我的希望是，你能了解一些需要留意的法律问题，并利用这些信息与法律专业人士进行有意义的沟通。


    ## 什么是知识产权？


    我与许多开发者交流过，他们听说过知识产权，并理解这是他们应该关心的事情，但不太清楚它究竟是什么。


    *知识产权*（IP）指的是你或公司对其创造性工作所拥有的无形权利。在我们的语境中，这种创造性工作很可能是iOS应用，但也可能是该应用的组成部分，例如音乐或图形。


    知识产权为你提供的主要好处是，有权阻止他人使用你受保护的作品。如果竞争对手或其他公司拿走了你已妥善保护的东西（例如，你的图标、图形或创意），知识产权赋予你起诉以阻止他们，并可能追回损害赔偿（即金钱）的能力。


    每种知识产权以不同的方式保护内容：


    - **版权：** 对于版权，作者被授予决定谁能复制、分发、公开表演、修改或从其原创作品中创作衍生作品的权利。

    - **专利：** 对于专利，发明人被授予阻止他人使用、制造或出口发明主题的权利。

    - **商标：** 商标旨在防止他人混淆你的客户，使其误以为其他公司是你（或者以某种方式与你有关联）。


    ## 确定你的知识产权策略


    当你阅读本章时，请考虑在你的业务和你正在创建的应用的背景下，哪些类型的知识产权是有意义的。关于寻求哪些类型的保护以及为什么寻求这些保护，这些决策构成了你公司的知识产权策略。就像制定商业计划一样，定义和理解公司的知识产权策略将帮助你做出更好的决策，并避免可能危及你试图建立的知识产权资产的陷阱。


    尽管每个公司在决定寻求哪些类型的知识产权保护时都有其需要考虑的特定因素，但其中一些因素对于iOS应用来说是特有的。在本章中，我将重点讨论大多数iOS应用开发者面临的共性问题。


    ## iOS应用有所不同


    尽管iOS应用与桌面软件有共同的起源，但某些差异会影响哪些类型的知识产权值得追求。这些差异将成为确定最合适方法的基础。


    需要考虑的一个因素是，我们的应用通常市场导入时间很短，市场准入门槛极低。iOS应用通常比其桌面版本便宜，iTunes App Store中大多数应用的价格低于5美元。


    iOS平台为一人或两人的团队提供了前所未有的机会，让他们能够制作出与资金雄厚的大公司应用竞争的产品。在Apple注册开发者账户仅需99美元，而构建应用所需的工具已随每台新Mac捆绑提供。从技术角度来看，Apple构建了极其强大的框架来创建引人注目的用户界面，这大大简化了动画等其他复杂功能所需的工作。


    在移动设备上，简单的程序往往对用户来说比功能更丰富的应用更有价值。虽然最佳桌面应用的评判通常基于其功能和能力的丰富程度，但最佳iOS应用通常专注于将一件事做得非常好，有意识地限制功能范围。


    Apple工具所培养的简单性和易开发性意味着应用可以极快地从概念进入发布阶段。iOS应用的开发周期通常以周和月计，而不是年，许多成功的应用甚至在短短一个周末内就完成了创作。


    基于这些原因，独立开发者主导着iOS应用市场。iPhone上一些最热门的应用都是相当简单的独立开发应用。我最初开发的`TouchType`应用花了不到一周时间，在App
    Store中连续一个月位居最受欢迎应用之列。其他简单的应用，如`The Moron Test`，目前也高居排行榜榜首。当我查看App Store的热门应用列表时，目前排名前25的应用中有15款是由没有已有品牌的独立开发者开发的。这种新格局需要对知识产权采取略有不同的方法。


    ## 制定iOS应用专属的行动计划


    作为iOS应用开发者，传统的知识产权策略可能不适合你的业务。应用开发和发布的速度使得某些形式的知识产权在iOS应用环境下不太有用。你可能也缺乏寻求知识产权保护的财务资源。'
  raw: 'This chapter was contributed by Michael Schneider, a technology transactions
    attorney and iPhone developer. As an attorney, Michael works with clients on intellectual
    property and technology-related contracts, helping them build, monetize, and protect
    their products. As an iPhone developer, Michael has published a number of successful
    apps, including TouchType, Private-I, and the Andrew Johnson series of self-help
    apps.


    When you build an iOS app, you are creating intellectual property. Unlike traditional
    businesses, software companies typically are not valued based on physical assets.
    As you grow your business, you probably won’t build factories or buy fleets of
    trucks. The value of your business won’t be in real estate or equipment; it will
    be built on the intangible assets that you create. Your products and your ownership
    of them will be your company’s core assets, so it is important to understand how
    to identify and protect the intellectual property that will become the basis of
    that ownership and your company’s value.


    In addition to being something that you can sell or license to other people, intellectual
    property rights are a way that you can prevent competitors from stealing your
    work. Even if you have no intention of monetizing your intellectual property beyond
    selling your app to end users, understanding your rights can help you fend off
    copycats.


    Similarly, as an app developer, you will want to avoid infringing the intellectual
    property rights of others. Understanding the strengths and limitations of various
    types of intellectual property will help you understand what is and isn’t permissible
    under the law. Armed with this knowledge, you can build apps more confidently,
    and fend off those who try to bully you with trumped-up claims. Knowing where
    the lines are helps you get closer to those lines without going over and violating
    someone else’s rights.


    In this chapter, you will learn about how to obtain the different types of intellectual
    property protection available to you and consider which types make the most sense
    in the context of app development. You will also explore some of the common pitfalls
    that can hurt your intellectual property rights and the value of your business.


    To give you a sense of where this chapter is coming from, before venturing into
    iPhone development, I worked as a lawyer for technology companies helping to build,
    protect, and monetize products. As a disclaimer, even among iOS developers, every
    person''s legal needs are different. Although I will try to explain in general
    terms some of the legal issues surrounding iOS application development and sales,
    this chapter should not be taken as legal advice. My hope is that you will become
    aware of some of the legal issues to watch out for, and use that information to
    engage in a meaningful way with a legal professional.


    What Is Intellectual Property?


    I talk to a lot of developers who have heard about intellectual property and understand
    that it is something that they should care about, but they are unclear exactly
    what it is.


    *Intellectual property* (IP) refers to the intangible rights that you or your
    company can possess in your creative work. In our case, this creative work will
    likely be an iOS app, but it could also be components of that app, such as music
    or graphics.


    The primary benefit that intellectual property provides you is the right to exclude
    others from using your protected work. If a competitor or another company takes
    something that you have properly protected (for example, your icon, your graphics,
    or your idea), intellectual property rights give you the ability to sue to stop
    them and possibly recover damages (that is, money).


    Each type of intellectual property protects content in a different way:


    *   **Copyright:** In the case of a copyright, the authors are granted the right
    to dictate who can copy, distribute, publicly perform, modify, or create derivative
    works from their original work of authorship.

    *   **Patent:** In the case of a patent, the inventor is granted the right to
    stop other people from using, making, or exporting the subject of the invention.

    *   **Trademark:** Trademarks are intended to keep others from confusing your
    customers into thinking that the other company is you (or somehow affiliated with
    you).


    Determining Your Intellectual Property Strategy


    As you read this chapter, consider which types of intellectual property make sense
    in the context of your business and the apps that you are creating. The decision
    about which types of protection to pursue, and why, are your company’s intellectual
    property strategy. Like making a business plan, defining and understanding your
    company’s intellectual property strategy will help you make better decisions and
    avoid pitfalls that could jeopardize the intellectual property assets you are
    trying to build.


    Although every company has its own factors to consider when determining which
    types of intellectual property protection to seek, some of these factors are specific
    to iOS apps. In this chapter, I will focus on the issues that are common to most
    iOS app developers.


    iOS Apps Are Different


    Although iOS apps share common origins with desktop software, certain differences
    influence the types of intellectual property that are worth pursuing. These differences
    will be the basis for determining which approaches are most appropriate.


    One factor to consider is that our apps typically have a rapid time to market,
    and the barriers to market entry are extremely low. iOS apps are typically less
    expensive than their desktop counterparts, with most apps in the iTunes App Store
    priced at less than $5.


    The iOS platform is an unprecedented opportunity for one- or two-person teams
    to make apps that can compete against apps from giant, well-funded companies.
    A developer account with Apple costs only $99, and the tools you need to build
    apps are bundled with every new Mac. From a technology standpoint, Apple has built
    an incredibly robust framework for creating compelling UIs, which takes much of
    the work out of otherwise complex features such as animation.


    On mobile devices, simple programs are often more valuable to users than more
    feature-rich applications. Where the best desktop application is typically determined
    based on the extent of its features and capabilities, the best iOS apps often
    focus on doing one thing very well, intentionally keeping features limited.


    The simplicity and ease of development fostered by Apple’s tools mean that apps
    can move from concept to publication extremely quickly. Development of iOS apps
    is typically measured in weeks and months, as opposed to years, and many successful
    apps have been created in as short as a weekend.


    For these reasons, independent developers dominate the iOS app marketplace. Some
    of the biggest hits on the iPhone have been fairly simple independently developed
    apps. My original TouchType app took less than a week to make and was among the
    most popular apps in the App Store for about a month. Other simple apps, such
    as The Moron Test, currently top the charts. As I look through the Top Apps list
    in the App Store, 15 out of the current top 25 apps in the App Store are developed
    by independent developers, with no preexisting brand. This new landscape requires
    a slightly different approach to intellectual property.


    Developing an iOS App-Specific Game Plan


    As a developer of iOS apps, a traditional intellectual property strategy may not
    fit your business. The speed with which apps can be developed and published makes
    some forms of intellectual property less useful in the iOS app context. You may
    have limited financial resources to pursue protection.'
  trans: '

    本章由技术交易律师兼 iPhone 开发者 Michael Schneider 撰写。作为一名律师，Michael 帮助客户处理知识产权和技术相关合同，协助他们构建、实现盈利并保护其产品。作为一名
    iPhone 开发者，Michael 发布了许多成功的应用，包括`TouchType`、`Private-I`以及 Andrew Johnson 系列自助应用。


    当你构建一个 iOS 应用时，你就在创造知识产权。与传统企业不同，软件公司的价值通常不基于有形资产。随着业务增长，你可能不会建造工厂或购买卡车车队。你的企业价值不在于房地产或设备，而在于你所创造的无形资产。你的产品及其所有权将成为公司的核心资产，因此，理解如何识别和保护构成该所有权及公司价值基础的知识产权至关重要。


    知识产权不仅能让你向他人出售或许可，还能防止竞争对手窃取你的劳动成果。即使你无意于通过将应用出售给最终用户之外的方式来将知识产权变现，了解你的权利也能帮助你抵御模仿者。


    同样，作为应用开发者，你需要避免侵犯他人的知识产权。理解各类知识产权的优势和局限性，将帮助你了解法律允许和禁止的行为。掌握了这些知识，你就能更自信地构建应用，并抵御那些试图用虚假主张来欺压你的人。知道界限在哪里，能帮助你在不越界、不侵犯他人权利的情况下更接近这些界限。


    在本章中，你将了解如何获得不同类型知识产权保护，并思考在应用开发的背景下哪些类型最有意义。你还会探讨一些可能损害你知识产权权利和企业价值的常见陷阱。


    为了让你了解本章的来龙去脉，在涉足 iPhone 开发之前，我曾担任科技公司的律师，帮助构建、保护产品并实现其盈利。需要声明的是，即使在 iOS 开发者之间，每个人的法律需求也不尽相同。尽管我试图从一般意义上解释
    iOS 应用开发和销售中的一些法律问题，但本章不应被视为法律建议。我的希望是，你能了解一些需要留意的法律问题，并利用这些信息与法律专业人士进行有意义的沟通。


    ## 什么是知识产权？


    我与许多开发者交流过，他们听说过知识产权，并理解这是他们应该关心的事情，但不太清楚它究竟是什么。


    *知识产权*（IP）指的是你或公司对其创造性工作所拥有的无形权利。在我们的语境中，这种创造性工作很可能是 iOS 应用，但也可能是该应用的组成部分，例如音乐或图形。


    知识产权为你提供的主要好处是，有权阻止他人使用你受保护的作品。如果竞争对手或其他公司拿走了你已妥善保护的东西（例如，你的图标、图形或创意），知识产权赋予你起诉以阻止他们，并可能追回损害赔偿（即金钱）的能力。


    每种知识产权以不同的方式保护内容：


    - **版权：** 对于版权，作者被授予决定谁能复制、分发、公开表演、修改或从其原创作品中创作衍生作品的权利。

    - **专利：** 对于专利，发明人被授予阻止他人使用、制造或出口发明主题的权利。

    - **商标：** 商标旨在防止他人混淆你的客户，使其误以为其他公司是你（或者以某种方式与你有关联）。


    ## 确定你的知识产权策略


    当你阅读本章时，请考虑在你的业务和你正在创建的应用的背景下，哪些类型的知识产权是有意义的。关于寻求哪些类型的保护以及为什么寻求这些保护，这些决策构成了你公司的知识产权策略。就像制定商业计划一样，定义和理解公司的知识产权策略将帮助你做出更好的决策，并避免可能危及你试图建立的知识产权资产的陷阱。


    尽管每个公司在决定寻求哪些类型的知识产权保护时都有其需要考虑的特定因素，但其中一些因素对于 iOS 应用来说是特有的。在本章中，我将重点讨论大多数 iOS
    应用开发者面临的共性问题。


    ## iOS 应用有所不同


    尽管 iOS 应用与桌面软件有共同的起源，但某些差异会影响哪些类型的知识产权值得追求。这些差异将成为确定最合适方法的基础。


    需要考虑的一个因素是，我们的应用通常市场导入时间很短，市场准入门槛极低。iOS 应用通常比其桌面版本便宜，iTunes App Store 中大多数应用的价格低于
    5 美元。


    iOS 平台为一人或两人的团队提供了前所未有的机会，让他们能够制作出与资金雄厚的大公司应用竞争的产品。在 Apple 注册开发者账户仅需 99 美元，而构建应用所需的工具已随每台新
    Mac 捆绑提供。从技术角度来看，Apple 构建了极其强大的框架来创建引人注目的用户界面，这大大简化了动画等其他复杂功能所需的工作。


    在移动设备上，简单的程序往往对用户来说比功能更丰富的应用更有价值。虽然最佳桌面应用的评判通常基于其功能和能力的丰富程度，但最佳 iOS 应用通常专注于将一件事做得非常好，有意识地限制功能范围。


    Apple 工具所培养的简单性和易开发性意味着应用可以极快地从概念进入发布阶段。iOS 应用的开发周期通常以周和月计，而不是年，许多成功的应用甚至在短短一个周末内就完成了创作。


    基于这些原因，独立开发者主导着 iOS 应用市场。iPhone 上一些最热门的应用都是相当简单的独立开发应用。我最初开发的`TouchType`应用花了不到一周时间，在
    App Store 中连续一个月位居最受欢迎应用之列。其他简单的应用，如`The Moron Test`，目前也高居排行榜榜首。当我查看 App Store
    的热门应用列表时，目前排名前 25 的应用中有 15 款是由没有已有品牌的独立开发者开发的。这种新格局需要对知识产权采取略有不同的方法。


    ## 制定 iOS 应用专属的行动计划


    作为 iOS 应用开发者，传统的知识产权策略可能不适合你的业务。应用开发和发布的速度使得某些形式的知识产权在 iOS 应用环境下不太有用。你可能也缺乏寻求知识产权保护的财务资源。

