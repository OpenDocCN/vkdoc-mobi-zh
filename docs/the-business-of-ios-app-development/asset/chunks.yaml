- fmt: '### Talking with a lawyer at this stage can help you identify the ways in
    which your rights are being violated. A lawyer can help you understand if there
    are any additional steps you need to take to shore up your rights before you start
    trying to assert them against others. A lawyer can also help you to understand
    the relative strength or weaknesses of your rights and your likelihood of prevailing
    in a lawsuit against the competitor.


    Going to court is extremely expensive. Fortunately, most disputes are resolved
    well before you get that far. If you and your lawyer conclude that you have a
    valid infringement claim against your competitor, your next step will likely be
    to send the competitor a cease-and-desist letter. The purpose of this letter is
    to notify the other party that you believe it is infringing your rights and demand
    that it stops. Depending on the circumstances, your competitor may not realize
    it is infringing. A cease-and-desist letter serves the dual purpose of notifying
    the competitor of the alleged infringement to get it to stop and creating documentation
    to show that it was aware of your rights, should it choose to continue infringing.


    So, how did I approach this in the case of Private-I? I evaluated the rights that
    I believed the copycat infringed. In my case, I believed that the copycat infringed
    my copyright in the icon because the artwork had been copied, and the trademark
    was infringed because the use of the same icon on another product was bound to
    cause confusion with customers. More important, I evaluated the harm that the
    infringement was causing me and the potential benefit that would come from pursuing
    a claim. My conclusion was that pursuing the copycat wasn''t worth the effort.
    His duplicate of my app never sold very well and didn''t have a large effect on
    my sales. I was offended that someone would be so underhanded as to copy an entire
    app and post it on the App Store, but I needed to make a decision as to whether
    I wanted to spend my time writing letters and interacting with someone who I found
    distasteful or whether I would prefer to focus my energy on making apps. I don''t
    regret the decision. Private-I continued to be a strong contender in the Travel
    category, and the copycat app has almost no exposure on the store.


    ## Litigation


    In my case, the copycat app wasn''t causing much harm, but if your rights are
    being infringed and that is causing real harm to your business, litigation is
    the way to stop the infringement and potentially recover monetary damages from
    the infringer. Litigation is expensive and time-consuming, but it is an extremely
    strong weapon.


    If the potentially infringing competitor does not stop infringing your rights
    as a result of your cease-and-desist letter, and your discussions with the representatives
    have broken down, your next step is to file a claim against the competitor. This
    is not something that you would want to attempt alone. If you think you have a
    claim, you should work with an intellectual property litigator to draft and file
    the complaint.


    ## Summary


    Intellectual property law and the general legal issues in running a software business
    can be difficult to wrap your head around. Fortunately, you don''t need to understand
    everything about intellectual property to be a rights-savvy developer. Even lawyers
    who work in this space tend to focus on specific portions of the law. My practice,
    for instance, is focused primarily on helping people draft contracts, while other
    lawyers are specifically focused on litigation. Others spend their time helping
    people file patent or trademark applications. Since even lawyers in this field
    don''t know everything about intellectual property, your goal should simply be
    to get enough exposure to the issues so that you will recognize when it is time
    to explore more about a particular topic.


    Think of these legal issues like the frameworks included in Cocoa. For example,
    you don''t need to know how to use a `UIImagePickerView` until you write an app
    that requires the use of the camera or photos. But when that time comes, it will
    be important to know that the class exists and roughly what it can do. Just like
    learning a programming language, the key to success in expanding your knowledge
    of business legal issues is being aware of the available resources and how to
    access them.


    # Chapter 4


    # Your iOS App Is Your Most Powerful Marketing Tool


    There are many factors that contribute to a successful launch and life of an app.
    Factors such as your app icon and screenshots are among the most important visual
    elements that users see in the App Store. Just like with any business, a bad first
    impression can cost you sales and invite negative reviews, so fine-tuning your
    app''s design is a critical component to success. In this chapter, I''ll go through
    the process of getting your app off the ground by prototyping. I''ll also go over
    creating a great user experience with an intuitive UI and eye-catching icons,
    as well as designing for multiple iOS devices. I''ll provide useful tips for all
    of these topics throughout the chapter.


    This book is focused on how to improve the marketability of your app. This chapter
    discusses how interface design comes into play. It spotlights several important
    factors to consider when designing your UI, and points out a few common pitfalls
    to avoid.


    ## Getting Your Foot in the Door: First Impressions Are Everything


    After performing all of those App Store searches during your pursuit to collect
    competitive research information (covered in [Chapter 2](#9781430262381_Ch02.xhtml)),
    you already witnessed the lack of quality that exists in the majority of apps
    out there. Many apps you see are poorly designed and executed by developers that
    were only looking to exploit short-term trends.


    One of the biggest problems that plague new iOS developers is app discovery. Especially
    in today''s world, with more than 1,000,000 apps in the app store (475,000 native
    to iPad), it''s hard for users to successfully wade through the crud to find the
    true gems. But no matter how much publicity you do to drive traffic and awareness
    to your app, discovery is only part of the equation.


    Apple has recently changed their app store from showing a list of four to five
    results on their search page to only one. When people finally do seek out or stumble
    upon your app''s product page in the App Store, you''ve managed to capture their
    interest, but only for a moment. You have a precious few seconds to convince them
    to continue exploring your app. This means your app''s icon and screenshots need
    to hook them into wanting to learn more.


    In general, most people are both lazy and extremely busy, placing an immense value
    on their time and a short fuse on their patience. If your app does not captivate
    them within the first few seconds of viewing your App Store page, they will move
    on, especially if there are many similar apps to peruse.


    ### The First Visual Cue


    Your app icon is the first visual cue your app has to offer. Consumers see your
    app icon first in the App Store listings. Your icon, combined with your app''s
    name, will be the initial key factor that determines whether a user is interested
    enough to click through to your app''s product page. It also represents your app''s
    brand identity and must be uniquely memorable.


    If your icon doesn''t look professional, it leaves the distinct impression that
    your application may not be professionally made. So, with this in mind, an eye-catching,
    high-quality app icon should be your top design priority. It is your proverbial
    "foot in the door," granting you a little more of a consumer''s time and short
    attention span.


    ### The Second Visual Cue'
