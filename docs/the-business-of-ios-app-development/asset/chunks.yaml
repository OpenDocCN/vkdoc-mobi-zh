- fmt: '# User Targeting and Ad Revenue


    Another vital component to your success is ad targeting. Make sure the ad network
    you choose is capable of matching the right ads to your app’s unique audience.
    For example, if your app caters to mostly males (such as `Maxim HD for iPad`),
    then ads for women’s fashion and makeup would most likely be the wrong fit for
    that demographic. Unrelated ads that do not capture the attention of your users
    will not get tapped. The fewer click-throughs, the less ad revenue you earn.


    ## Earnings and Fill Rates


    Ad-sharing revenue is based on the effective cost per thousand (eCPM). Apple’s
    iAd Network currently holds the highest eCPM rate in the mobile advertising space
    due to its big-name brand advertisers.


    As a new venture, during the first six months of operation, iAd had a small ad
    inventory. So even though ad rates were high, there weren’t enough ads to fill
    the pipeline of participating apps in the network. As a result, critics complained
    of iAd’s low fill rates. Although Apple has worked hard to pump up its ad inventory
    since then by adding more brand advertisers and launching the iAd for Developers
    program, it’s never a bad idea to support multiple ad networks to ensure a 100
    percent fill rate in your app.


    Due to iAd’s high eCPM rates, many developers assign iAd as the first ad network
    to send a request for an ad. If there isn’t an iAd available, then the app automatically
    requests an ad from a second ad network, such as Google’s popular `AdMob`.


    One of the primary advantages of using an ad mediation layer service, like `AdWhirl`
    or `Burstly`, is that it ensures the best fill rate and a good eCPM average. Not
    only do `AdWhirl` and `Burstly` support a long list of leading ad networks, but
    they also support iAd. `Mobclix` is another appealing platform that supports several
    major ad networks.


    Differentiate which ad networks pay out only for actual click-throughs on ads
    versus the ones that also pay out for ad impressions (views). Some ad networks
    claim high eCPM rates without mentioning that those attractive rates are often
    only a small fraction of their ad inventory, and available only to select apps
    that reach a specific demographic.


    Again, be sure to do your homework before choosing an ad network. Just keep in
    mind that if your app does not have a large user base or capture a coveted demographic,
    then your app may not be able to command the high eCPM rates.


    ## Building a Business with Ad-Supported Apps


    Can iOS developers make a living solely based on revenue earned from in-app advertising?
    When trying to decide whether you should release your product as either a paid
    app or a free ad-supported app, it’s important to do the math. A paid app sale
    would earn you at least 70 cents (based on a 99-cent price). If it was an ad-supported
    free app, would it generate enough ad impressions and click-throughs to net you
    more than 70 cents per user? With a heavily used app, you could confidently answer
    “yes” to that question, but with very few users, the answer may be a surprising
    “no.”


    If you’re averaging an eCPM that hovers around $1, then to make more than $1,000,
    your in-app advertising will need to receive at least 1,000,000 ad impressions.
    With more than 160 million iOS devices out there, it shouldn’t be too hard for
    your free app to drum up 1 million ad impressions, right?


    Just because your app is free does not guarantee an avalanche of downloads. There
    are simply too many apps in the App Store vying for people’s attention. Only a
    small percentage of those apps enjoy a healthy customer base of hundreds of thousands
    of users, with some of the top apps benefiting from millions of users. But that’s
    not the norm. More than half of the free apps in the App Store have been downloaded
    by only a few thousand people. If your app falls into that latter category, you
    would net only a handful of dollars each day in ad revenue—definitely not enough
    to sustain a full-time salary for yourself.


    While that may sound rather bleak, keep in mind that your app doesn’t need to
    be a Top 10 best-selling phenomenon in order to make money from in-app advertising.
    There are quite a few free, ad-supported apps that pull in consistent revenue
    due to the thoughtful, strategic planning and marketing creativity of the developers
    who created them.


    ## Balancing UI Design Aesthetics with Ads


    You’ll need to consider how the display of ads will affect your UI. Whether you
    have a single version that has an option to remove the ads, or you offer dual
    apps consisting of a free version with ads and a paid version without them, your
    UI design will need to accommodate your selected approach.


    ### Designing Free Apps with Removable Ads


    Hog Bay Software’s Jesse Grosjean made his first foray into the world of mobile
    advertising with the release of his free writing app, `PlainText`, for both iPhone
    and iPad. His previous iOS products, the popular `TaskPaper` and `WriteRoom`,
    were released as paid apps. But with the cloud-based Dropbox file-synchronizing
    option in `PlainText`, the user needs an online connection. This presented a unique
    opportunity for Jesse to experiment with in-app advertising.


    The goal of `PlainText` is to provide a minimal, distraction-free UI for writers,
    so it was important to Jesse not to clutter the screen with ugly banner ads. Most
    iAd banners are nicely designed, so instead of juggling multiple ad networks to
    leverage the best eCPM and fill rates, he felt it was more important to preserve
    the integrity of the app’s UI design and support only iAd. When an iAd is available,
    the entire `PlainText` UI shifts up, making room for an iAd at the bottom. If
    there’s no iAd to display, the `PlainText` UI reverts back to its normal state,
    hiding the ad banner frame (see [Figure 7-3](#9781430262381_Ch07.xhtml#Fig3)).


    ![9781430262381_Fig07-03.jpg](images/9781430262381_Fig07-03.jpg)


    [Figure 7-3](#9781430262381_Ch07.xhtml#_Fig3). PlainText by Hog Bay Software dynamically
    adjusts the height of the app’s UI based on whether an iAd is available for display
    at the bottom of the screen


    Jesse admitted that his decision to use iAd exclusively doesn’t allow him to truly
    optimize his in-app advertising efforts, especially since iAd requires iOS 4,
    so users running `PlainText` on iOS 3 are not seeing any ads. Regardless of that
    limitation, he has been pleased with the results. The free app also offers an
    In-App Purchase option to remove the ads.


    “Compared to my paid apps, `PlainText` has had many more downloads, but with less
    profit,” Jesse revealed. “In a little over two months, `PlainText` has had about
    225,000 downloads and has made a little over $3,000 via In-App Purchases and about
    $7,000 via iAd.”


    Even though the number of people who chose to buy the “Remove Ads” In-App Purchase
    item represents only roughly 1 percent of total `PlainText` users, it is still
    a significant portion of the revenue that the app earns. This hybrid model of
    a free, ad-supported app with an In-App Purchase component for removing ads and/or
    selling additional features can be a very powerful combination.


    ### Designing Two Versions: With and Without Ads


    Instead of offering an In-App Purchase option to remove ads, some developers simply
    release two versions of the app: a free, ad-supported app and a paid, ad-free
    app. This is the strategy employed by Optime Software, a business built from the
    ground up on mobile ad revenue. The company launched with only free app releases—`Checkers
    Free`, `Dots Free`, `Chess Free`, `Tic Tac Toe Free`, `Four in a Row Free`, and
    other classic games. And many of their free apps continuously rank high in the
    App Store charts.'
