- fmt: '# The Strategies Described in This Chapter


    The strategies described in this chapter are based on some assumptions that are
    tied to the nature of the App Store. These won’t apply to everyone, but they should
    serve as a backdrop for your analysis.


    - **Speed:** If your app is simple in nature, the competitors will appear almost
    instantly, so you may want to focus your efforts on intellectual property protection
    that can be established fairly quickly. Rights that take years to establish are
    probably not well suited to the platform. Although you probably hope that your
    app will still be selling years from now in some form or another, there is a good
    chance mobile devices and apps will look very different in five years. With exceptions
    for app developers working on long-term business plans, developers should focus
    their energy on obtaining rights that can be protected immediately, such as copyright.

    - **Cost:** The vast majority of apps fail commercially. As of the publication
    of this book, there are more than 300,000 apps in the App Store. When you combine
    the list of Top 100 Paid Apps overall, together with the Top 100 Paid Apps in
    each of the 40 categories (including the subcategories in Games), there are fewer
    than 4,000 apps represented in those Top App lists at any one time. I estimate
    that 98 percent of iOS apps published today haven’t made more than $5,000. This
    means, depending on how ambitious your app is, you may want to focus on low-cost
    intellectual property protection. Depending on your goals, it also may make sense
    to wait and see whether you achieve a degree of success before spending money
    pursuing protectable rights in your work.

    - **Geography:** You should also consider the worldwide nature of the App Store
    and whether you are going to focus your intellectual property strategy solely
    in the United States or in other countries as well. This chapter is focused primarily
    on US intellectual property law, but most other countries have some form of copyright,
    trademark, or patent protection available. Each additional country adds a layer
    of expense, and it would likely be impractical to pursue protection in all 90
    countries that the App Store targets. Identify the jurisdictions that you care
    most about from a business standpoint, and then prioritize where you will spend
    your money.


    Most developers see the vast majority of their sales generated from the US App
    Store, so protecting your interests in the United States is a good place to start.
    If you are developing your app outside the United States, you should be sure to
    do a trademark search in the United States to determine whether anyone else is
    using the mark already. You can run a simple trademark search yourself using Google.
    However, for a more thorough search, including searching records at the US Patent
    and Trademark Office, you can pay to use a trademark search service. Whether to
    pay for a comprehensive search will depend primarily on how much you are investing
    in your new mark. If changing the name of your company or app would be workable,
    you might just rely on your Google search to determine whether anyone is using
    a similar mark. On the other hand, if you were about to embark on an expensive
    advertising or public relations campaign to establish your brand, it would make
    sense to have a more thorough search performed before investing in the brand.


    ## Copyrighting Your App


    The concept of *copyrighting* an app is a little misleading because it implies
    that obtaining copyright protection for your work requires you to take proactive
    measures to have protection. In fact, in the United States and most other countries
    that follow the Berne Convention, some degree of copyright protection is established
    automatically the moment you put pen to paper (or start working in Photoshop or
    Xcode), assuming the thing you are creating is original to you.


    Copyright protects original works of authorship. This includes literary, dramatic,
    musical, and artistic works, such as poetry, novels, movies, songs, computer software,
    and architecture. In the case of iOS apps, copyright can provide protection for
    things like your app’s source code, graphics, and sound effects; the text of your
    instructions; the text of your app description; and creative video or audio content
    that you bundle with your app. Copyright does not protect facts, ideas, systems,
    or methods of operation, but if those facts, ideas, systems, or methods of operation
    are implemented in a creative/artistic way, copyright might provide some protection
    for the way these things are expressed.


    ### How to Obtain a Copyright


    A copyright automatically comes into existence when you create a work of authorship
    and fix it in a tangible medium. In app development terms, this means it starts
    when you type a line of code, draw some graphics, record sounds, or write your
    app’s description. Assuming the work is creative and recorded somewhere (for example,
    on your hard drive or printed to a page), there is a copyright coming into existence.


    Copyright protection is very affordable. A base level of protection exists at
    the time of creation without the need to pay lawyers or file a copyright application.
    That said, filing with the US Copyright Office provides some important additional
    benefits. Registered works, for instance, may be eligible for statutory damages
    and attorney fees if you decide to sue an infringer. This means that although
    you can protect an unregistered copyright, you might not be able to win as much
    in the lawsuit as you would if it were registered. Fortunately, copyright applications
    are relatively inexpensive compared to patent or trademark filings.


    The current filing fee for a copyright application in the United States is $65,
    and it can be as low as $35 if you file online. It is fairly common for authors
    and software developers to pay an attorney to handle their copyright registrations
    for them, but if you are comfortable with legal concepts and willing to ask questions
    when needed, filing a copyright application on your own behalf is an option that
    the US Copyright Office supports. The place to start is `http://www.copyright.gov/eco/`.
    The electronic Copyright Office (eCO) has done a nice job of making the application
    process fast and easy through its site. If you are interested in filing a copyright
    on your own behalf, the eCO has a detailed tutorial posted at `http://www.copyright.gov/eco/eco-tutorial.pdf`.


    ### Limitations of Copyright Protection


    A copyright is a strong and affordable means of protecting your app’s content
    and code, but copyrights protect creative expression of ideas; they don’t protect
    the ideas themselves.


    For instance, if you have an idea for an app that recommends new music to users
    based on the contents of their music library on their iPhone, a copyright could
    provide protection for your creative graphics or the text of your instructions.
    Copyright, however, would not provide protection for the concept of the app. In
    the context of iOS apps, this is a huge limitation.


    ## Filing Trademarks for App Icons and Logos


    I believe trademark represents an iOS developers’ most affordable and effective
    means of fending off competitors. In the previous section, I discussed the limitations
    of copyright protection. An important one is that copyright does not protect ideas,
    so your app idea or concept will not have protection under copyright law. Patents
    can provide protection for concepts and ideas, but obtaining a patent is relatively
    expensive and time-consuming when compared with going through the copyright or
    trademark process.


    Trademark doesn’t protect concepts or ideas, but it can protect the logo or name
    that you give your app, if that logo or name is distinctive enough. Trademarks
    are a way to keep other developers from exploiting the goodwill you establish
    with your app or concept.'
