    12 关，然后通过应用内购买从游戏的虚拟商店中购买额外的关卡和主题。


    “出于几个原因，这真是一条令人兴奋的盈利途径，”Owen 说道。“游戏内商店让我可以继续发布新的关卡包和主题，而无需更新应用程序的二进制文件本身。作为一款免费游戏，它在
    App Store 中能获得最大的曝光率和更多的下载量。但通过横幅广告和应用内购买，我仍然有办法赚一些钱。而且，如果玩家在游戏内商店购买了任何内容，广告就会被禁用。”


    “然而，这并非一帆风顺，”Owen 补充道。“有一件事我完全没有预料到，那就是用户对定价模式的强烈反对。我以为玩家会很高兴有机会在花钱之前先试玩游戏。然而，一些玩家的反应却是‘嘿，一个免费游戏！’，但随后当他们发现自己不能免费玩所有关卡时，他们就很生气。我的应用描述清楚地写着，你只能免费获得初学者关卡，必须购买其他关卡。App
    Store 中的应用页面也列出了热门应用内购买项目。但我学到的是，没人会看那些东西。”


    应用内购买和付费游戏总会让用户感到不快。关键问题是：这会让用户放弃使用应用吗？看看 EA 的许多游戏——它们充斥着应用内购买，如果不购买，用户就会被困在当前关卡。这种试图从客户身上创收的方法无论如何都不理想。你需要找到一个平衡点，让免费用户仍然可以玩游戏，但可能无法那么快或那么频繁。这个概念的一个例子在
    SuperCel 的 `Clash of Clans` 中得到了很好的实现。这款游戏可以永远免费玩下去，你最终也能通关；然而，如果你想在游戏中玩得开心并具有竞争力，你就需要花点钱升级。这种模式效果极佳，`Clash
    of Clans` 通常是 App Store 中收入排名第一或第二的应用。


    应用内购买早在 2009 年中期就已推出，但消费者适应在已购买或免费下载的应用内为内容付费这一概念的速度很慢。即使一年后，像 `LandFormer` 这样的新游戏和其他免费增值游戏仍然遭到部分用户的抵制。但随着
    2010 年下半年众多精彩的免费增值应用的激增，潮流逐渐转变，大多数 iPhone、iPad 和 iPod touch 用户终于张开双臂接受了小额交易。


    曾经，传统的应用销售和应用内广告是 iOS 开发者的主要商业模式，而现在，应用内购买已成为 App Store 中最大的收入来源之一。2011 年 1 月，App
    Store 监控公司 Distimo 报告称，收入最高的 iPhone 应用中近 50%的收入来自应用内购买项目！


    这种演变很大程度上要归功于像 `FarmVille`、`We Rule Quests`、`Zombie Farm` 和 `Pocket Frogs` 这样的热门游戏。这些免费增值应用基于使用虚拟货币来推进游戏进程。用户很快了解到，为了发展他们的农场、建立他们的帝国或照顾他们的宠物，他们需要使用游戏点数在虚拟市场购买作物、工具、食物和其他必需物品（见
    Figure 8-2）。这些反复前往游戏内市场的经历让用户习惯于在应用内购物。因此，更进一步使用真实货币购买其他市场物品，如 `Mojo` 或魔法药水，就成了一小步额外的操作（见
    Figure 8-3）。


    ![9781430262381_Fig08-02.jpg](img/9781430262381_Fig08-02.jpg)


    Figure 8-2. ngmoco 的 iPad 版 `We Rule Quests` 是一款王国建设游戏，使用赚取的点数在虚拟市场中购买各种物品。


    ![9781430262381_Fig08-03.jpg](img/9781430262381_Fig08-03.jpg)


    Figure 8-3. `We Rule Quests` 在诸如 `Mojo` 这样的虚拟物品需要花费真实货币时，会通知用户，要求进行应用内购买交易（此处展示的是
    iPad 版本）。


    重要的是，消费者永远不应对他们所选择的东西感到被误导。例如，`We Rule Quests` 会细致地在虚拟市场中为每件物品清晰显示其货币类型，以便用户能够看到该物品是用数字点数购买，还是通过应用内购买用真实货币购买。如
    Figure 8-3 所示，为了获取 `Mojo`，会显示一个真实价格，要求进行应用内购买交易。此外，应用内购买项目被归类为“We Rule Store”产品，以便在视觉上与其他虚拟市场物品区分开来。


    尽管小额交易现在已被 App Store 用户社区广泛接受，但开发者可能偶尔会遇到一些用户的强烈反对，他们反感应用内购买的单点定价结构。请记住，他们只代表你整体客户群中的一小部分。通常，这些用户就是那些抱怨一款全功能游戏价格超过
    99 美分，而在 Xbox 或 PlayStation 上同等游戏要贵 50 倍的意见强烈的少数派。虽然尽可能让更多客户满意很重要，但这些人通常只对免费感到满意。除非你财务独立，否则你的生意负担不起把一切都免费赠送，所以记得在免费版本中加入一些广告，以便从那些永远不会为应用付费的用户那里获取一些收入。


    应用内购买成功的一个关键因素是提供用户渴望购买并令人兴奋的附加项目。如果你的应用能够有效区分核心功能的免费更新与应用内购买提供的额外内容之间的差异，那么你就有可能建立一个可以维持持续开发盈利的商业模式。


    考虑到这一点，尽早考虑你的应用如何能从应用内购买中受益永远都不嫌早。忠诚会带来回报！从长远来看，即使你的应用最终吸引的新客户越来越少，你满意的用户也可能通过应用内购买继续支持你！


    ## 何时以及如何使用应用内购买


    那么，你已准备好要在你的应用中处理应用内购买，但它可以用来做什么呢？解锁额外的游戏内容和新关卡是显而易见的选择，但如果你不是在开发游戏呢？最好的处理方法是仔细审视你应用的当前功能和未来的特性路线图，看看应用内购买是否有助于延长其产品生命周期和销售潜力。


    应用内购买是创造额外收入来源和支持持续开发的绝佳方式，但它并不适用于所有应用。如果没有充分的理由，不要试图将这一功能强行加入你的应用。不应将它视为一种寻找需求的解决方案。你当然不想让忠诚的客户失望，为了那些他们本期望作为最初购买价格一部分的核心功能，而对他们进行无休止的“小钱”收费。


    另一个很好的例子是许多 Xbox 和 PlayStation 游戏如何采用高级 DLC 模式。你以 59.99 美元购买游戏，然后每隔几个月，你可以支付少量费用获得额外的地图、角色、游戏模式或武器。这里的理念不是占购买游戏玩家的便宜，而是允许他们增强和扩展他们的体验。


    ### 理解基本原理'
- fmt: '# In-App Purchase Types


    In-App Purchases are categorized into four distinct product types: `Non-Consumable`,
    `Consumable`, `Auto-Renewable Subscriptions`, and `Subscriptions`. It’s essential
    that you understand the differences between these product types because your choice
    affects how purchased items are handled within your app. Additionally, there are
    a few rules that you need to follow.


    Here’s a quick rundown of the four types of In-App Purchase product types:


    - **`Non-Consumable`**: Items that are purchased only once and should always remain
    available within the app on all devices associated with the customer’s iTunes
    account. Typically non-consumables are additional functionality or add-on content.
    So if it’s a new game level that was purchased within a game on Johnny’s iPhone,
    not only should that new level be persistent every time Johnny runs the game on
    his iPhone, but it should also be made available within the same game installed
    on Johnny’s iPod touch. The `Store Kit` framework provides support for querying
    the App Store for purchased items so that your app can be programmed to restore
    those items on a specific device, even if it was initially purchased and installed
    on another device owned by the same customer. I’ll talk more about this when we
    walk through an Xcode project example later in this chapter.


    - **`Consumable`**: Items that can be used up or depleted, and then purchased
    again multiple times. A good example of a consumable item is weapon ammunition
    in a game. Once the customer depletes the stock of ammunition that was purchased,
    it cannot be retrieved again. To continue using that weapon, the customer needs
    to buy another round of ammunition. Because of the disposable quality of this
    type, consumable items are not required to be available across all of a customer’s
    related devices. If you plan to offer this type of In-App Purchase item, you should
    always state in very clear language within your app that once it’s used up, it’s
    gone, but a new one can be purchased.


    - **`Auto-Renewable Subscriptions`**: Items much like non-consumables, except
    that they are assigned a limited duration. If the customer bought a 30-day subscription
    to a service within your app, when that term expires, the App Store automatically
    renews the subscription, billing the customer’s iTunes account. Like non-consumables,
    auto-renewable subscriptions must always be made available within the same app
    on all devices associated with the customer’s iTunes account. So if Johnny has
    your app installed on both his iPhone and iPod touch, the subscription he purchased
    should be persistent within the app on both devices. The customer has the option
    to cancel future renewals, which deactivates the subscription after the current
    paid subscription period expires.


    - **`Subscriptions`**: An older mechanism that predates the auto-renewable subscriptions
    product type. A limitation of this older subscriptions type is that it does not
    currently support a duration term—there is no automatic renewal billing (although
    subscriptions may be purchased multiple times, like consumables). It’s up to your
    app to self-monitor customer subscription expiration dates and renewal notifications.
    Due to this limitation, Apple recommends using auto-renewable subscriptions instead.


    Cool, right? Did that give you any ideas for use within your own app?


    Additional functionality is usually categorized as a non-consumable. Add-on content—depending
    on whether it’s a disposable item (ammunition, seeds, magic potions, and so on)
    or a permanent addition (such as new game levels)—may be a consumable or a non-consumable,
    respectively.


    If you plan on unlocking services within your app (such as premium access to a
    web service, newspaper and magazine content, or a notification service), those
    are typically categorized as auto-renewable subscriptions. Alternatively, a service
    could be offered as a non-consumable one-time In-App Purchase. But before going
    that route, make sure such a model would provide enough revenue to financially
    support the ongoing upkeep of the service.


    # In-App Purchase Guidelines


    Before you start planning your next major masterpiece with In-App Purchase, you
    need to know about a few strict rules that you must follow:


    - In-App Purchase items must be digital elements that can be delivered within
    your app. You cannot use In-App Purchase to sell physical products and services
    outside your app. For example, you can’t use it to sell a printed book, but you
    can definitely sell an e-book, as long as it can be delivered within your app
    immediately after purchase confirmation.

    - In-App Purchase items are not allowed to contain prohibited content, such as
    pornography or hate speech.

    - In-App Purchase items cannot represent virtual currency, unless it’s directly
    related to in-app game play, as seen in apps like Zombie Farm, We Rule Quests,
    and Clash of Clans. If Apple feels your In-App Purchase items are not properly
    represented, confusing users as to which goods or services they are buying, your
    app may get rejected.

    - The `Store Kit` framework cannot be used to create trialware. As I mentioned
    in [Chapter 6](#9781430262381_Ch06.xhtml), In-App Purchase is not intended for
    unlocking previously crippled features, since Apple still prohibits iOS apps from
    presenting features as disabled. The current implementation of In-App Purchase
    enables developers to provide additional features that are not currently included
    in the app.

    - Most important, you cannot facilitate a complete payment transaction inside
    your app without using In-App Purchase. Implementing your own homemade version
    of In-App Purchase within your app is guaranteed to earn you a rejection notice
    from Apple’s app review team.


    # The Power of Simplicity


    The best part about In-App Purchase is that beyond the handful of guidelines,
    it does not impose any kind of predefined business model. The `Store Kit` framework
    that powers In-App Purchase is nothing more than a secure payment-collection gateway.
    It does not include a prefabricated storefront like the App Store, which gives
    you the ultimate creative flexibility to integrate In-App Purchase in any manner
    that best suits your app’s current UI.


    In-App Purchase’s flexibility is especially helpful if your app offers only one
    In-App Purchase item. Displaying an entire store window to list only a single
    item is not an effective use of screen space. With only one or two In-App Purchase
    items, you can easily implement those buy buttons seamlessly into your existing
    UI. This may sound like it leaves a lot for you to program yourself, but truthfully,
    In-App Purchase requires a lot less code than you might think. We’ll walk through
    the steps of adding In-App Purchase to an Xcode project later in this chapter.


    Since all In-App Purchase transactions are done through the App Store, they retain
    the same business terms as those that apply to purchasing standard apps within
    the store. You, the developer, receive 70 percent of the In-App Purchase price,
    and Apple keeps 30 percent as a service fee. Although some developers may cringe
    at giving up 30 percent of In-App Purchases, you need to remember that not only
    does this cover credit-card fees, fraud protection, and refund-related chargeback
    fees, but it also provides an elegant microtransaction model in the secure, trusted
    environment of the App Store.'
