    as important as it once was. Within your account on Twitter, you can create a
    new list and give it a unique name. Since Twitter assigns a domain name to it—such
    as `http://twitter.com/ebutterfly/iphonedev`—it’s best to use a name without spaces.


    Lists provide a way to organize people into groups, making it easier to follow
    particular topics. The reason lists chip away the importance of followers is that
    you can follow a list without following all the people in the list. And you can
    create a list of people you don’t follow.


    Some app developers have created lists of their favorite iOS-related Twitterers,
    including fellow developers, review sites, and bloggers. It’s a great way to see
    a daily snapshot of the iOS developer community. A lot of developers follow the
    lists of other developers as a way to connect with the major influencers.


    Creating your own lists can bring new followers to it, so make sure you include
    yourself in your own lists. That’s something many people tend to forget to do.


    If you’ve compiled a great list and submitted to the major Twitter list directories
    like Listorious, newcomers will possibly follow your list and maybe also your
    own Twitter account. It’s yet another way to get discovered on Twitter and reach
    a larger audience with your tweets.


    Don’t just create iOS-related lists. If your app is related to a specific subject
    such as music or writing, create a list for that topic. By creating such lists,
    you can attract new followers who are interested in those subjects. If they own
    an iOS device, then your tweets within those lists will expose your app to potential
    customers who may not have known about it.


    If someone adds you to their list, it means they think your tweets provide enough
    value to warrant being part of a select group. Be sure to thank them for the kind
    gesture. And likewise, if someone follows your list, thank them for it. In such
    an impersonal online world, you might be surprised how much goodwill can be exchanged
    with a simple “thank you.”


    Managing the Pipeline


    Everything you post on Twitter (not counting retweets) should drive traffic back
    to your web site. That includes any photos or videos you tweet.


    It’s true that many of the Twitter client apps make it extremely easy to upload
    photos from your iPhone camera to media-sharing sites like Flickr, TwitPic, and
    yfrog, but that’s not an optimal use of your tweets. If people are interested
    enough to check out cool screenshots or video play from your app, you should be
    hosting those media files on your own web site, within web pages that provide
    additional information about your product.


    Even if you’re showing very early alpha screenshots that you don’t want published
    on your main web site, just link to a stand-alone page on your server that serves
    as a sneak preview for your tweets. This way, you get to control the message and
    content on the page. Plus, it can be designed to reflect your app’s visual branding,
    rather than the generic pages of third-party media-sharing sites.


    Remember when I mentioned that you should set up a free account with one of the
    URL shortening services like Bit.ly, so that you can track the click-throughs
    and retweets of the links you post on Twitter? If you experiment with two different
    ways to word a tweet about your iOS app, use two different Bit.ly URLs, so that
    you can track which word phrasing was more successful in click-throughs. This
    will help you refine your marketing messages as effective, eye-catching tweets!


    For those of you ready to dive deeper into the Twitterverse with advanced management
    tools, check out oneforty’s vast directory of third-party applications and services
    for tracking unfollows, Twitter marketing campaigns, follower locations, spam
    filters, and much more. There really is quite an amazing cottage industry of businesses
    out there based on Twitter—too many to list here. Some of them are less useful
    than others, so tread carefully.


    Facebook


    The Facebook SDK for iOS is widely used in the app development world. Facebook
    logins are just as common as Twitter in today’s mobile apps and games. If you
    don’t have a Facebook account already, you’ll want to sign up for one at `http://www.facebook.com`,
    and use that for personal interactions with friends and colleagues.


    Although Facebook has made it extremely easy to interface with its API from within
    an iOS project, your marketing efforts within the social networking site itself
    need to be formulated a little differently than they are in Twitter. Since it’s
    all about growing your audience, all of the same rules of etiquette discussed
    for Twitter also apply to Facebook. The difference here is that while you can
    mix personal and business tweets within a single Twitter account, it’s recommended
    to separate the two in Facebook.


    With Twitter, you can choose not to follow everyone who follows you, but not so
    with Facebook. If someone adds you as a friend in Facebook and you approve the
    request, that person is automatically added to your friends list as well. For
    this reason, you’ll want to create a Facebook Page for your business. For those
    people interested in following your iOS app news and updates, they can simply
    “like” your Facebook Page. This provides you with a way to grow your audience
    without being forced to add each and every one of them to your own personal friends
    list, since those followers are instead added to your Facebook Page’s list of
    fans.


    Creating a Facebook Page'
  trans: '

    # 排版后的 Markdown 文档


    不要假设每个人都知道你的应用是做什么的。如果你在推特上分享应用在 iTunes App Store 的链接，不要只发布应用名称和网址。我知道字数限制是 140
    个字符，但我相信你还能多挤出几个字符来（尤其是使用像 `Bit.ly` 这样的短网址服务时，正如本章前面讨论过的）。不要含糊其辞。哦，原来是一款用于定位停放车辆的
    iPhone 应用？啊，那我正好需要这样一个功能。而且你还在网址后面贴心地标注了“(iTunes)”，提醒我这个链接会在我的电脑上启动 iTunes。这非常方便且尊重用户。


    除了用恰当的关键词精心撰写推文之外，你还可以加入话题标签。`话题标签` 是前面带有数字符号（`#`）的关键词。它们的特别之处在于，推特和大多数第三方客户端会将话题标签显示为可点击的文本链接。


    点击一个话题标签，就会列出近期包含该标签的一组推文。通过将你的推文加入热门话题标签组，是提高内容被发现率的绝佳方式。那些没有关注你、甚至不知道你推特 ID
    的人，也可能通过话题标签列表偶然看到你的推文。


    只是要小心不要过度使用话题标签。不要在每条推文中都插入话题标签，尤其不要用 `#多个` `#话题` `#标签` 来 `#污染` `#一条` `#推文`，否则你的帖子会难以阅读，看起来像垃圾信息。


    对于那些特别重要、值得增加一点曝光度的精选推文，可以把其中一个关键词转换成话题标签。如果你的词语中没有热门的标签，那就把你想要的话题标签附加在推文末尾。例如，当我发布对
    iPhone 开发者同行有益的价值链接时，我经常会加上知名的 `#iphonedev` 话题标签。


    为了更精准地锁定已有话题标签和热门搜索关键词，可以查看以下便捷资源：


    -   Twitter 搜索 (`http://search.twitter.com`)

    -   Hashtags.org (`http://hashtags.org`)

    -   What the Trend (`http://www.whatthetrend.com`)


    ## Twitter 列表


    列表代表了粉丝数量不再像过去那样重要的又一个原因。在你的推特账户中，你可以创建一个新列表并赋予其独特的名称。由于推特会为其分配一个域名——例如 `http://twitter.com/ebutterfly/iphonedev`——因此最好使用不带空格的名称。


    列表提供了一种将用户分组的途径，让你更容易关注特定话题。列表之所以削弱了粉丝的重要性，是因为你可以关注一个列表，而不需要关注列表里的所有人。而且，你还可以创建一个包含你未关注用户的列表。


    一些应用开发者创建了他们喜爱的 iOS 相关推特用户的列表，其中包括同行开发者、评测网站和博主。这是获取 iOS 开发者社区日常动态快照的绝佳方式。许多开发者会关注其他开发者的列表，以此来与有影响力的主要人物建立联系。


    创建你自己的列表可以为你吸引新的粉丝，所以确保把你自己也加入你的列表中。这是很多人往往容易忘记的事情。


    如果你整理出了一个很棒的列表，并将其提交到像 Listorious 这样的大型推特列表目录，那么新用户可能会关注你的列表，甚至可能也关注你的推特账户。这是在推特上被发现、让你的推文触及更广泛受众的另一种方式。


    不要只创建与 iOS 相关的列表。如果你的应用与某个特定主题相关，比如音乐或写作，那就为那个主题创建一个列表。通过创建这样的列表，你可以吸引那些对这些主题感兴趣的新粉丝。如果他们拥有
    iOS 设备，那么你在这些列表中的推文就会将你的应用展示给那些可能原本不知道它的潜在客户。


    如果有人把你加入了他们的列表，这意味着他们认为你的推文提供了足够价值，值得成为特定群体的一员。一定要感谢他们的善意之举。同样，如果有人关注了你的列表，也要为此感谢他们。在这样一个缺乏人情味的网络世界里，你可能会惊讶于一个简单的“谢谢”能换来多少好感。


    ## 管理信息流


    你在推特上发布的所有内容（不包括转推）都应该引导用户访问你的网站。这包括你推文中的任何照片或视频。


    诚然，许多推特客户端应用使得从你的 iPhone 相机上传照片到像 Flickr、TwitPic 和 yfrog 这样的媒体分享网站变得极其简单，但这并非推文的最佳用途。如果有人有兴趣查看你应用里的酷炫截图或视频演示，你应该将这些媒体文件托管在你自己的网站上，放在那些能提供你产品更多信息的网页内。


    即使你展示的是你不想发布在主网站上的早期 Alpha 测试版截图，只需链接到你服务器上的一个独立页面，作为你推文的预览页面。这样，你就可以掌控页面上的信息和内容。此外，你可以将其设计成能体现你应用视觉品牌形象的样子，而不是使用第三方媒体分享网站的通用页面。


    还记得我之前提到过，你应该在像 `Bit.ly` 这样的短网址服务上注册一个免费账户，以便追踪你在推特上发布链接的点击量和转推量吗？如果你尝试用两种不同的措辞来推文介绍你的
    iOS 应用，那就使用两个不同的 `Bit.ly` 网址，这样你就能追踪哪种措辞在点击量方面更成功。这将帮助你精炼你的营销信息，使其成为有效且引人注目的推文！


    对于那些准备好使用高级管理工具深入探索推特世界的朋友，可以查看 oneforty 庞大的第三方应用和服务目录，这些工具可用于追踪取消关注、推特营销活动、粉丝位置、垃圾邮件过滤器等等。基于推特，确实形成了一个令人惊叹的庞大细分产业——多到无法在此一一列举。其中一些工具不如其他工具实用，因此要谨慎选择。


    ## Facebook


    iOS 版 Facebook SDK 在应用开发领域被广泛使用。在当今的移动应用和游戏中，Facebook 登录与 Twitter 登录一样普遍。如果你还没有
    Facebook 账户，你需要去 `http://www.facebook.com` 注册一个，并用它来与朋友和同事进行私人互动。


    尽管 Facebook 使得在 iOS 项目中与其 API 对接变得极其简单，但你在该社交网络内的营销策略需要与在 Twitter 上略有不同。由于核心目标都是扩大你的受众，之前讨论的所有适用于
    Twitter 的礼仪规则同样也适用于 Facebook。区别在于，虽然你可以在一个 Twitter 账户中混合发布个人和商业推文，但在 Facebook
    上建议将两者分开。


    在 Twitter 上，你可以选择不关注每一个关注你的人，但在 Facebook 上则不然。如果有人将你添加为 Facebook 好友，而你批准了请求，此人也会自动被添加到你的好友列表中。基于这个原因，你需要为你的业务创建一个
    Facebook 主页。对于那些有兴趣关注你的 iOS 应用新闻和更新的用户，他们只需“赞”一下你的 Facebook 主页即可。这为你提供了一种扩大受众的方式，同时不必被迫将每一个这样的人添加到你的个人好友列表中，因为这些关注者会转而成为你
    Facebook 主页的粉丝列表中的一员。


    ### 创建 Facebook 主页

    '
- fmt: '在社交网络巨头 Facebook 上为您的主页或公司主页创建一个粉丝主页是在这个世界最流行的社交网站上与人们建立联系的绝佳方式。唯一的要求是，您必须是您所创建的主页所反映的业务或产品的所有者或官方代表。


    与 Twitter 不同，会员无法在帖子中搜索关键词。Facebook 的搜索引擎仅限于搜索会员姓名。如果您只有一个以自己名字命名的个人 Facebook
    帐户，那么您在 Facebook 搜索中不会因为您的 iOS 应用名称或公司名称而被列出。但是，如果您为您的应用或公司创建了 Facebook 主页，相关的
    Facebook 搜索就能找到它。


    要创建一个 Facebook 主页，您必须拥有一个个人 Facebook 帐户，因为该帐户将被分配为该主页的管理员。如果您计划创建多个应用，我建议您将所有粉丝都聚集到一个公司
    Facebook 主页下，而不是为每个 iPhone 或 iPad 应用分别开设独立的账户。一个集中的主页不仅更容易管理，还能让您向同一批受众交叉推广您的产品。


    登录您的个人 Facebook 帐户，然后访问官方的“创建主页”网址 `http://www.facebook.com/pages/create.php`。


    从提供的选项中选择“公司、组织或机构”来为您的业务创建主页，或者选择“品牌或产品”来为特定应用创建主页。然后，系统会提示您为新主页分配适当的类别。如果您是为您的应用开发业务设立主页，您很可能选择“计算机/技术”作为类别。如果您在“品牌或产品”下构建应用主页，您的类别应为“软件”。


    新的 Facebook 主页创建完成后，在“简介”选项卡中添加您的公司描述，并为主页的主图添加您的徽标或应用图标。然后发布关于您应用的信息，包括开发新闻、更新和特别优惠。您甚至可以发布即将推出的新功能的预览截图，来激发粉丝对未来版本的期待。


    ### 与粉丝建立联系


    既然您的 Facebook 主页已经上线并运行，是时候宣传它了，鼓励人们点击“赞”按钮成为您主页的粉丝！要让您的页面获得一个酷炫的 Facebook 域名（例如
    `http://www.facebook.com/iTunes`），至少需要有 25 个人为您的页面点赞。


    向您现有的博客和 Twitter 受众进行推广完全没问题。让他们知道您有了一个专门的 Facebook 主页，并邀请他们通过点击“赞”按钮来表达支持。不出所料，Facebook
    甚至提供了一种经济实惠的方式，让您在其整个网络中为您的页面做广告以吸引新粉丝。


    与粉丝沟通时，请在您的 Facebook 主页时间线上发布状态更新、笔记、照片、链接等内容。为您主页点赞的人会在他们自己的 Facebook 信息流中看到您的帖子。有时，您可能需要向每位粉丝的收件箱广播重要公告。为此，请点击您主页的“编辑信息”链接，然后在“编辑信息”的“营销”选项卡中，点击“发送更新”。请记住，没有人喜欢收到一连串的新闻稿和营销信息，因此，为了留住粉丝，请尽量不要滥用这种直接的沟通渠道。


    为了打破时间线上与应用相关的营销帖子的单调，请尝试穿插一些粉丝可能也感兴趣的各类相关新闻、照片和视频。如果有人在您的时间线上发表评论，请回复他们，以在您的
    Facebook 主页内营造一种社区感。


    ### 追踪您的 Facebook 营销效果


    Facebook 为其主页和开发者提供自己的免费分析服务：Facebook 分析。当以管理员身份登录您的 Facebook 主页后，点击最右侧列中的“查看分析”链接，即可查看关于您主页的指标数据。


    如果您正在投放 Facebook 广告或从其他营销材料将人们引导至您的 Facebook 主页，那么追踪访客流量会特别有用。


    ### 导入博客，输出到 Twitter


    随着您的营销范围扩展到越来越多的社交网络，首要问题是时间。在多个网站（如博客、Twitter 和 Facebook）发布相同的内容可能非常耗时。幸运的是，社交媒体近期的一个趋势是能够在网络间聚合内容，使发布更加便捷。您只需在一个地方发布消息，它就会在多个网站上发布。


    正如我之前提到的，一些博客网站（如 Tumblr 和 Posterous）允许用户自动更新 Twitter 和 Facebook，并附上他们新博客文章的链接。Facebook
    也通过其“导入博客”功能提供了一种实现方式。


    您是否希望您的新博客文章自动发布到您的 Facebook 主页上？请按以下步骤操作：


    1. 在您的 Facebook 主页资料中，在搜索字段中输入 **Notes**。

    2. 从动态下拉菜单的结果中，选择 Facebook 的“记事”应用。

    3. 在“记事”页面上，从左侧列中选择“编辑导入设置”。系统会提示您提供博客的 RSS feed URL（参见 [图 10-16](#9781430262381_Ch10.xhtml#Fig16)）。输入
    URL 并点击“开始导入”。


    ![9781430262381_Fig10-16.jpg](images/9781430262381_Fig10-16.jpg)


    [图 10-16](#9781430262381_Ch10.xhtml#_Fig16). 提交您博客的 RSS feed URL，以将博客文章自动导入为 Facebook
    记事


    完成这些步骤后，Facebook 将自动将您的新博客文章发布到您的 Facebook 主页的记事中。


    如果您希望您的 Facebook 帖子能自动发布到 Twitter，Facebook 在 `http://www.facebook.com/twitter`
    提供了支持（参见 [图 10-17](#9781430262381_Ch10.xhtml#Fig17)）。将您的 Twitter 帐户关联到您的 Facebook
    主页时，您可以选择分享您在 Facebook 上发布的所有内容，或者仅分享特定类型的帖子（例如状态更新和记事）。


    ![9781430262381_Fig10-17.jpg](images/9781430262381_Fig10-17.jpg)


    [图 10-17](#9781430262381_Ch10.xhtml#_Fig17). Facebook 提供了将您主页的帖子分享到 Twitter 帐户的功能


    反过来，您也可以通过安装 Andy Young 的方便 Facebook 应用 Selective Tweets（`http://www.facebook.com/selectivetwitter`），将您的推文作为状态更新发布到您的
    Facebook 主页。这个应用比将您的 Twitter RSS feed 作为博客导入要强大得多，因为它允许您通过使用特殊的 `#fb` 标签，来选择哪些特定的推文被发布到您的
    Facebook 主页。这可以防止非业务相关的推文意外混入您公司的 Facebook 主页。要使 Selective Tweets 应用正常工作，您的 Twitter
    帐户的推文不得被保护。


    ### 其他社交网络和书签网站


    显然，Twitter 和 Facebook 并不是镇上唯一的社交媒体巨头。根据您开发的应用或游戏的类型，其他一些网站可能提供更精准的目标人群。


    虽然 Myspace 可能已被当前的王者 Facebook 夺走风头，但 Myspace 在音乐社区中仍然是一个流行的社交网站。无数新晋艺术家通过 Myspace
    被发现，进而获得了丰厚的唱片合约和备受瞩目的音乐事业。如果您的应用与音乐相关，那么 Myspace 上的音乐人群可能正是您要接触的完美受众。是时候揭晓您自己的
    Myspace 个人资料页面，与其他音乐爱好者建立联系，并推广您的 iOS 应用了！'
  raw: 'Setting up a Facebook Page for your product or business is a great way to
    connect with people on the world’s most popular social networking site. The only
    requirement is that you must be the owner or official representative of the business
    or product reflected in the page you’re creating.


    Unlike with Twitter, members are not able to search for keywords in posts. Facebook’s
    search engine is limited to searching for member names. With only a personal Facebook
    account under your own name, you won’t be listed in Facebook searches for your
    iOS app name or business name. But with a Facebook Page for your app or company,
    related Facebook searches will find it.


    To create a Facebook Page, you must have a personal Facebook account, since that
    is the account assigned as the page’s administrator. If you plan on creating more
    than one app, I recommend building a fan base under one company Facebook Page,
    rather than several separate accounts for each iPhone or iPad app. One centralized
    page will not only be easier to manage, but it will also allow you to cross-promote
    your products to the same audience.


    Sign in to your personal Facebook account, and then visit the official Create
    a Page URL at `http://www.facebook.com/pages/create.php`.


    From the options provided, select Company, Organization, or Institution to create
    a page for your business, or Brand or Product to create a page for a specific
    app. You’re then prompted to assign the appropriate category for your new page.
    If you’re setting up a page for your app development business, you will most likely
    select Computers/Technology as your category. If you’re building an app page under
    Brand or Product, your category should be Software.


    Once the new Facebook Page is built, add your company description to the Info
    tab, and add your logo or app icon to the page’s main picture. Then post information
    about your app, including development news, updates, and special offers. You can
    even post sneak preview screenshots of upcoming new features to get fans excited
    about a future release.


    Connecting with Fans


    Now that your Facebook Page is up and running, it’s time to spread the word about
    it, encouraging people to click the Like button to become a fan of your page!
    To get one of those cool Facebook domain names assigned to your page—such as `http://www.facebook.com/iTunes`—at
    least 25 people must like your page.


    There’s absolutely nothing wrong with appealing to your existing blog and Twitter
    audience. Let them know that you have a new dedicated Facebook Page, and invite
    them to show support by clicking the Like button. As expected, Facebook even provides
    an affordable way to advertise your page throughout its network to gain new fans.


    When communicating with your fans, post status updates, notes, photos, links,
    and more to your Facebook Page’s Wall. People who have liked your page will see
    your posts in their own Facebook newsfeeds. Occasionally, you may need to broadcast
    an important announcement to the inbox of every fan. To do that, click your page’s
    Edit Info link, then from within the Edit Info’s Marketing tab, click Send an
    Update. Remember that no one likes to receive a barrage of press releases and
    marketing messages, so to retain your fans, try not to abuse this direct line
    of communication.


    To break up the stream of app-related marketing posts on your Wall, try to sprinkle
    in a variety of related news, photos, and videos that might also be of interest
    to your fans. If people post comments on your Wall, reply back to create a sense
    of community within your Facebook Page.


    TRACKING THE PERFORMANCE OF YOUR FACEBOOK MARKETING EFFORTS


    Facebook offers its own free analytics service, Facebook Insights, for Facebook
    Pages and Facebook developers. When logged in to your Facebook Page as an Admin,
    click the View Insights link in the far-right column to view metrics about your
    Facebook Page.


    Tracking the visitor traffic can be especially helpful if you’re running a Facebook
    ad or directing people to your Facebook Page from other marketing materials.


    Importing Your Blog, Outputting to Twitter


    By extending your marketing reach across more and more social networks, the first
    concern is time. Posting the same content across multiple sites, such as your
    blog, Twitter, and Facebook, can be very time-consuming. Fortunately, a recent
    trend in social media is the ability to syndicate content across networks to make
    publishing more convenient. Post your news in one place, and it gets published
    on multiple sites.


    As I’ve mentioned earlier, several blog sites, like Tumblr and Posterous, enable
    users to autoupdate Twitter and Facebook with links to their new blog posts. Facebook
    also offers a way to do this with its own Import a Blog feature.


    Do you want your new blog posts to automatically be published on your Facebook
    Page? Just follow these steps:


    1.  From your Facebook Page’s profile, type **Notes** into the search field.

    2.  From the dynamic drop-down menu of results, select the Facebook Notes app.

    3.  On the Notes page, choose Edit Import Settings from the left column. You’ll
    be prompted to provide your blog’s RSS feed URL (see [Figure 10-16](#9781430262381_Ch10.xhtml#Fig16)).
    Enter a URL and click Start Importing.


    ![9781430262381_Fig10-16.jpg](images/9781430262381_Fig10-16.jpg)


    [Figure 10-16](#9781430262381_Ch10.xhtml#_Fig16). Submit your blog’s RSS feed
    URL to autoimport blog posts into Facebook as notes


    Once you’ve followed these steps, Facebook will automatically post your new blog
    entries to your Facebook Page’s notes.


    If you want your Facebook posts to be automatically tweeted on Twitter, Facebook
    offers support for that at `http://www.facebook.com/twitter` (see [Figure 10-17](#9781430262381_Ch10.xhtml#Fig17)).
    When linking your Twitter account to your Facebook Page, you can opt to share
    everything you post on Facebook or elect to share only specific kinds of posts,
    such as status updates and notes.


    ![9781430262381_Fig10-17.jpg](images/9781430262381_Fig10-17.jpg)


    [Figure 10-17](#9781430262381_Ch10.xhtml#_Fig17). Facebook provides support for
    sharing your page’s posts on your Twitter account


    In reverse, you can also publish your tweets as status updates on your Facebook
    Page by installing Andy Young’s handy Facebook application Selective Tweets (`http://www.facebook.com/selectivetwitter`).
    This application is much more powerful than importing your Twitter RSS feed as
    a blog, because it allows you to choose which specific tweets are posted on your
    Facebook Page by marking them with the special `#fb` hashtag. This prevents nonbusiness
    tweets from accidentally sneaking into your company’s Facebook Page. For the Selective
    Tweets application to work, your Twitter account’s tweets must not be protected.


    Other Social Networks and Bookmarking Sites


    Obviously, Twitter and Facebook are not the only social media giants in town.
    Depending on the kind of app or game you’ve developed, some of the other sites
    may offer a more targeted demographic.


    Although Myspace may have been dethroned by the current king, Facebook, Myspace
    is still a popular social networking site in the music community. Countless new
    artists have been discovered via Myspace, moving on to lucrative record deals
    and high-profile music careers. If your app is music-related, then the Myspace
    music crowd may just be the perfect audience for you to reach. Time to unveil
    your own Myspace profile page to network with other music lovers and promote your
    iOS app!'
  trans: '

    在社交网络巨头 Facebook 上为您的主页或公司主页创建一个粉丝主页是在这个世界最流行的社交网站上与人们建立联系的绝佳方式。唯一的要求是，您必须是您所创建的主页所反映的业务或产品的所有者或官方代表。


    与 Twitter 不同，会员无法在帖子中搜索关键词。Facebook 的搜索引擎仅限于搜索会员姓名。如果您只有一个以自己名字命名的个人 Facebook
    帐户，那么您在 Facebook 搜索中不会因为您的 iOS 应用名称或公司名称而被列出。但是，如果您为您的应用或公司创建了 Facebook 主页，相关的
    Facebook 搜索就能找到它。


    要创建一个 Facebook 主页，您必须拥有一个个人 Facebook 帐户，因为该帐户将被分配为该主页的管理员。如果您计划创建多个应用，我建议您将所有粉丝都聚集到一个公司
    Facebook 主页下，而不是为每个 iPhone 或 iPad 应用分别开设独立的账户。一个集中的主页不仅更容易管理，还能让您向同一批受众交叉推广您的产品。


    登录您的个人 Facebook 帐户，然后访问官方的“创建主页”网址 `http://www.facebook.com/pages/create.php`。


    从提供的选项中选择“公司、组织或机构”来为您的业务创建主页，或者选择“品牌或产品”来为特定应用创建主页。然后，系统会提示您为新主页分配适当的类别。如果您是为您的应用开发业务设立主页，您很可能选择“计算机/技术”作为类别。如果您在“品牌或产品”下构建应用主页，您的类别应为“软件”。


    新的 Facebook 主页创建完成后，在“简介”选项卡中添加您的公司描述，并为主页的主图添加您的徽标或应用图标。然后发布关于您应用的信息，包括开发新闻、更新和特别优惠。您甚至可以发布即将推出的新功能的预览截图，来激发粉丝对未来版本的期待。


    ### 与粉丝建立联系


    既然您的 Facebook 主页已经上线并运行，是时候宣传它了，鼓励人们点击“赞”按钮成为您主页的粉丝！要让您的页面获得一个酷炫的 Facebook 域名（例如
    `http://www.facebook.com/iTunes`），至少需要有 25 个人为您的页面点赞。


    向您现有的博客和 Twitter 受众进行推广完全没问题。让他们知道您有了一个专门的 Facebook 主页，并邀请他们通过点击“赞”按钮来表达支持。不出所料，Facebook
    甚至提供了一种经济实惠的方式，让您在其整个网络中为您的页面做广告以吸引新粉丝。


    与粉丝沟通时，请在您的 Facebook 主页时间线上发布状态更新、笔记、照片、链接等内容。为您主页点赞的人会在他们自己的 Facebook 信息流中看到您的帖子。有时，您可能需要向每位粉丝的收件箱广播重要公告。为此，请点击您主页的“编辑信息”链接，然后在“编辑信息”的“营销”选项卡中，点击“发送更新”。请记住，没有人喜欢收到一连串的新闻稿和营销信息，因此，为了留住粉丝，请尽量不要滥用这种直接的沟通渠道。


    为了打破时间线上与应用相关的营销帖子的单调，请尝试穿插一些粉丝可能也感兴趣的各类相关新闻、照片和视频。如果有人在您的时间线上发表评论，请回复他们，以在您的
    Facebook 主页内营造一种社区感。


    ### 追踪您的 Facebook 营销效果


    Facebook 为其主页和开发者提供自己的免费分析服务：Facebook 分析。当以管理员身份登录您的 Facebook 主页后，点击最右侧列中的“查看分析”链接，即可查看关于您主页的指标数据。


    如果您正在投放 Facebook 广告或从其他营销材料将人们引导至您的 Facebook 主页，那么追踪访客流量会特别有用。


    ### 导入博客，输出到 Twitter


    随着您的营销范围扩展到越来越多的社交网络，首要问题是时间。在多个网站（如博客、Twitter 和 Facebook）发布相同的内容可能非常耗时。幸运的是，社交媒体近期的一个趋势是能够在网络间聚合内容，使发布更加便捷。您只需在一个地方发布消息，它就会在多个网站上发布。


    正如我之前提到的，一些博客网站（如 Tumblr 和 Posterous）允许用户自动更新 Twitter 和 Facebook，并附上他们新博客文章的链接。Facebook
    也通过其“导入博客”功能提供了一种实现方式。


    您是否希望您的新博客文章自动发布到您的 Facebook 主页上？请按以下步骤操作：


    1. 在您的 Facebook 主页资料中，在搜索字段中输入 **Notes**。

    2. 从动态下拉菜单的结果中，选择 Facebook 的“记事”应用。

    3. 在“记事”页面上，从左侧列中选择“编辑导入设置”。系统会提示您提供博客的 RSS feed URL（参见 图 10-16）。输入 URL 并点击“开始导入”。


    ![9781430262381_Fig10-16.jpg](img/9781430262381_Fig10-16.jpg)


    图 10-16. 提交您博客的 RSS feed URL，以将博客文章自动导入为 Facebook 记事


    完成这些步骤后，Facebook 将自动将您的新博客文章发布到您的 Facebook 主页的记事中。


    如果您希望您的 Facebook 帖子能自动发布到 Twitter，Facebook 在 `http://www.facebook.com/twitter`
    提供了支持（参见 图 10-17）。将您的 Twitter 帐户关联到您的 Facebook 主页时，您可以选择分享您在 Facebook 上发布的所有内容，或者仅分享特定类型的帖子（例如状态更新和记事）。


    ![9781430262381_Fig10-17.jpg](img/9781430262381_Fig10-17.jpg)


    图 10-17. Facebook 提供了将您主页的帖子分享到 Twitter 帐户的功能


    反过来，您也可以通过安装 Andy Young 的方便 Facebook 应用 Selective Tweets（`http://www.facebook.com/selectivetwitter`），将您的推文作为状态更新发布到您的
    Facebook 主页。这个应用比将您的 Twitter RSS feed 作为博客导入要强大得多，因为它允许您通过使用特殊的 `#fb` 标签，来选择哪些特定的推文被发布到您的
    Facebook 主页。这可以防止非业务相关的推文意外混入您公司的 Facebook 主页。要使 Selective Tweets 应用正常工作，您的 Twitter
    帐户的推文不得被保护。


    ### 其他社交网络和书签网站


    显然，Twitter 和 Facebook 并不是镇上唯一的社交媒体巨头。根据您开发的应用或游戏的类型，其他一些网站可能提供更精准的目标人群。


    虽然 Myspace 可能已被当前的王者 Facebook 夺走风头，但 Myspace 在音乐社区中仍然是一个流行的社交网站。无数新晋艺术家通过 Myspace
    被发现，进而获得了丰厚的唱片合约和备受瞩目的音乐事业。如果您的应用与音乐相关，那么 Myspace 上的音乐人群可能正是您要接触的完美受众。是时候揭晓您自己的
    Myspace 个人资料页面，与其他音乐爱好者建立联系，并推广您的 iOS 应用了！

