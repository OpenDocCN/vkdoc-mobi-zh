- fmt: '**Note** If you’re planning on making your app available in multiple regional
    App Stores beyond your own, you’ll also want to check for registered trademarks
    and any usage of that name in those respective countries. For guidance on securing
    and protecting your application name rights internationally, you may want to consult
    a trademark attorney.


    Why would it matter if an Android, a Mac, or a Windows software product is already
    using that name if you plan on using it only for your iOS mobile app? Well, it
    causes brand confusion for consumers who might incorrectly assume your app is
    the iOS version of the Android, Mac, or Windows application of the same name.
    If another software company was using that name first and can prove prior art
    (prior public use of the name and logo), especially if that company has already
    registered the trademark, you’ll find yourself legally vulnerable. You don’t want
    to spend months developing your app only to receive a cease-and-desist letter
    from the company’s attorneys. Even worse, if your app has become a successful
    best-seller in the App Store, you don’t want the company to sue you for trademark
    infringement and a percentage of your app royalties.


    My intent is not to scare you, but simply to make you aware of the potential land
    mines to watch out for when picking a unique name for your iOS app. This is the
    kind of legal safeguarding that you’ll want to do for your original app name,
    icon, and logo, so check out the section in [Chapter 3](#9781430262381_Ch03.xhtml)
    where Michael Schneider explains the benefits and process of registering a trademark.


    One last thought on app names regards the distinction between different iOS device
    targets. If you’re developing separate versions of your app for the iPhone and
    iPad (instead of a single universal application), you’ll need to identify them
    accordingly.


    When the iPad was first launched, iPhone developers released iPad-only versions
    with the identifying `HD` name suffix as a clever nod to the tablet’s larger high-definition
    screen size. A quick browse through the App Store will reveal quite a few iPad
    apps and games using this naming convention, such as `Real Racing HD`, `Harbor
    Master HD`, and `Flick Fishing HD`. Unfortunately, in the months that followed,
    Apple unveiled the new iPhone 4 with its Retina display, a true high-definition
    screen. For those iPad apps that were already well established with their `HD`
    names, it wasn’t worth the hassle to undergo a name change. But in a post–iPhone
    4 world, new iPad developers are leaning away from the `HD` identifier, since
    there’s no telling which iOS devices may get Retina displays in future models.
    Many recent app releases simply differentiate their App Store names by device,
    such as `GoodReader for iPhone` and `GoodReader for iPad`—a strategy I highly
    recommend. Over the last few months, Apple has encouraged developers to start
    utilizing universal apps, and there are even stories of Apple rejecting these
    `HD` apps if an iPhone version exists.


    ## Registering Web Site Domain Names


    Now that you’ve decided on an app name, you’ll want to snatch up a domain name
    for it before someone else does. Having a dedicated web site for your iOS app
    is critical to its success. The site is a central place for promoting your app
    and providing customer support. Don’t worry about the design and structure of
    it yet. I’ll discuss methods for shaping your web site into a thriving promotional
    tool and support center in [Chapter 10](#9781430262381_Ch10.xhtml).


    The important task at hand is to secure a good domain name for your app. To find
    out whether the domains you want are taken (and if so, who is using them), search
    the WHOIS database. Here are a few sites where you can do this:


    - DomainTools WHOIS Lookup (`http://whois.domaintools.com/`)

    - WHOIS Domain Search (`http://www.whois.net`)

    - Network Solutions WHOIS Search (`http://www.networksolutions.com/whois/`)


    Just searching for domain names at a domain name registrar will tell you only
    whether a domain is already taken. A WHOIS search will often provide detailed
    information about the owners of taken domains.


    If you’re having trouble finding an available domain name that matches your app
    name, try adding the word `app` or `game` (if it’s a game) to the end of it. For
    example, for the popular app `Simplenote`, the domain `Simplenote.com` was already
    taken, so the developers registered `SimplenoteApp.com`.


    `Register.com` and `NetworkSolutions.com` are popular domain registrars. Personally,
    I prefer `GoDaddy.com`. Plenty of alternatives exist, with many of them offering
    cheaper registration prices. Do a little shopping online first to find a domain
    name registrar that offers the features you need at a price that fits your budget.


    If you currently maintain your own blog or web site, you don’t need to create
    a stand-alone site for your iOS app. You can add a directory to your existing
    site for your iOS app-related web pages and then redirect your app URL to that
    new directory in your site. Why have a unique app URL if your existing web site
    or blog already has a custom URL? It just looks a lot more professional to point
    consumers to `http://www.breadcrumbsapp.com/`, rather than to `http://www.mywebsite.com/software/iphone/breadcrumbs/`.


    In addition, a short, dedicated app URL is a lot easier for people to remember.
    And most domain name registrars offer web-forwarding services so that you can
    easily set your unique app URL to redirect to wherever you want. Driving traffic
    to your existing web site is also a great strategy for cross-promoting other apps
    and services you offer.


    **Note** When shopping for a domain name registrar, be sure to check which services
    require additional fees. For example, `GoDaddy.com` includes free web-forwarding
    with domain name registration, while other registrars may charge an extra annual
    fee for web forwarding.


    ## Building a Unique Identity for Your iOS App


    With all your competitive research done, you’ve had the opportunity to see the
    app icons that you’ll be competing against.


    It’s important to have an app icon that’s unique yet still reflective of your
    app’s core function and UI design. This may sound obvious, but it’s always surprising
    to me how many developers design an app icon in their own isolated vacuum without
    regard to the icons their competition are already using. Because of this, many
    similar apps unintentionally have similar icons. When doing a search in the App
    Store for a particular kind of app, the results are often a page full of app icons
    that look very much the same, which makes the entire group appear rather generic
    on the surface.


    If you’re building a writing app and all the similar apps utilize notebook-themed
    icons, try coming up with a clever visual that’s different yet still communicates
    writing. If most of your competitors are using blue icons, think about using a
    contrasting color for your app icon (such as red or orange). You’re attempting
    to package your app as a brand, and in order for this to succeed, the brand identity
    you’re pitching must be unique and eye-catching.


    Since you have your list of competing apps sitting in front of you, your app icon
    design is merely something to think about between now and [Chapter 4](#9781430262381_Ch04.xhtml)
    (which covers effective app icon design), especially since the next chapter includes
    helpful facts about filing a trademark for your app name and icon. So percolate
    on it.


    ## Making Progress


    You covered a lot of ground in this chapter, so take a moment to breathe. The
    next chapter is an important one. Yes, it tackles all of that daunting legal stuff
    that programmers would rather not deal with, but this is vital knowledge for safeguarding
    your business. Michael Schneider, an expert lawyer turned app developer, will
    walk you through the essentials of protecting both yourself and your intellectual
    property.


    ## Chapter 3


    ### Protecting Your Intellectual Property'
