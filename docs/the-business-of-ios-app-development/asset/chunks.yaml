- fmt: '# Finding Original App Ideas


    Sometimes the coolest ideas are the simplest concepts, hiding right under our
    noses. As developers, we’re so captivated by (and envious of) the success stories
    of our peers that one of the first instincts to strike us is often the most fatal:
    how to take advantage of current trends by riding the coattails of what’s popular.
    When `iFart Mobile` became a runaway hit in 2008, a flood of copycat fart apps
    bombarded the App Store, hoping to cash in on the popular novelty. Jumping on
    the bandwagon, the first handful of copycat apps probably generated enough sales
    to justify their development, but at a certain point, the App Store became oversaturated.
    With more than 500 fart-related apps currently available, the odds of consumers
    finding and purchasing your new fart app are pretty low. When needing to choose
    from such a large assortment, it’s simply too overwhelming to look at them all,
    so consumers will more than likely settle for the most popular apps currently
    residing near the top of the charts. Since the introduction of the redesigned
    app store in iOS 6, it is now even harder to get noticed. Users must now swipe
    through tiles of app vs. simply looking at a nicely formatted table; now more
    than ever your app needs to stand out.


    Wouldn’t you much rather be the visionary who develops *that* app—the one that
    hundreds of developers rush to emulate? Of course, we all would. So, how does
    one go about finding new, untapped ideas?


    ## Look at Your Own Needs and Interests


    First, take a look at your own needs and interests. Sure, you’re a developer,
    but first and foremost, you’re also a user. Is there some missing functionality
    that you would love to see added to the iPhone? If so, do any existing apps already
    provide that functionality? No? Well, if it’s a feature you want, then odds are
    that others out there are wishing for the same thing, and maybe even willing to
    pay for it—bingo!


    It’s worth noting that some wish-list items might make great features but not
    great apps. For example, the heavily requested copy-and-paste feature was finally
    added to iOS 3, but it doesn’t really make sense as its own stand-alone app.


    ## Explore Your Hobbies and Interests


    What interests do you have outside of technology? There are successful apps for
    bird-watchers, comic book collectors, sports fans, and so on. If you’re passionate
    about a specific hobby and have not found any related apps, that might be a great
    space to fill. Just remember that the more niche it is (underwater basket weaving,
    anyone?), the smaller your potential customer base will be. If you develop a journal
    log for the small yet dedicated group of arctic nude swimmers, you could make
    a few shivering, blue-lipped individuals happy, but you may not make much money
    doing it. By broadening that idea to encompass all water sports (including custom
    log templates for surfers, boaters, swimmers, and scuba divers), your journal
    app dramatically expands its potential customer base, making it a much more viable
    app concept.


    One thing to note about apps for specific niches: users have been proven more
    likely to pay for something that appeals to a specific hobby that interests them.
    If your app fills a need or a want of hobbyists, it is not uncommon for them to
    pay a few bucks and not even think about it. Take a look at the Reference Category
    in the App Store to see exactly what I am talking about.


    ## Tap into Friends and Family


    If you’re feeling particularly void of any original ideas, try turning to your
    friends and family. See what specific needs and interests they have that might
    be well suited for a mobile app. But whatever you do, please do not solicit for
    app ideas on your blog, on your Facebook page, or via `Twitter`. Although your
    followers may provide some great suggestions, accepting their feedback leaves
    you legally vulnerable. If your app becomes successful, you run the risk of a
    stranger suing you for stealing his idea without providing adequate credit or
    compensation for it, producing evidence in the form of an archived tweet or blog
    comment he posted to you. You’re better off limiting your inquiries to only your
    trusted friends and family.


    ## Visit Your Local Newsstand


    Another great source for original ideas is your local newsstand. Although that
    may seem a little “old school,” don’t discount the ease of flipping through the
    pages of the latest magazines. The Internet is a vast treasure chest of data,
    but you need to know what you’re searching for in order to find anything of relevance.
    At a newsstand, you can quickly browse through dozens of popular magazine genres.
    Print is expensive, so if there’s a monthly magazine dedicated to a topic, the
    odds are good that enough people are interested in it to justify further exploration.
    The real question then lies in figuring out whether a decent percentage of those
    readers are tech-savvy and either plan to own or already own an iOS device. If
    the magazine has a web site, that’s a good place to start. Check to see whether
    it has an active online forum, an RSS feed, podcasts, or a `Twitter` account.
    By just taking a few minutes to read some of the posts there, you can get a good
    feel for that magazine’s reader base.


    Also look to see whether any of the magazine advertisers are promoting computer-
    or mobile-related solutions. For example, writing magazines include several ads
    for software tools that assist authors with various elements of the writing business
    and the story-building process. The App Store already has several mobile writing
    tools to help authors organize their notes and story ideas, but what about giving
    freelance writers the ability to track the status of submitted queries to potential
    publishers?


    ## Take Your Investigation Online


    Now that you have a general idea of what to search for, it’s time to take your
    investigation to the Internet. Back in 2009 when I wrote the first edition of
    this book, there were several desktop software programs and subscription-based
    web sites that offered that query-tracking service, but there weren’t any iPhone
    apps that handled that particular task. At the time, it looked like the market
    was wide open for this mobile app concept.


    As fate would have it, several months later, Andrew Nicolle released his iPhone
    and iPad app, `Story Tracker`, to fill that demand. The vital point here is that
    if you do stumble upon an untapped market, it’s best to start developing your
    app quickly. If you discovered a new niche, I can guarantee there are *at least*
    a dozen other developers thinking about similar app concepts. Time is of the essence.
    Just remember this famous (and very relevant) saying: “There’s no such thing as
    an original idea. It’s who does it first that counts.”


    ## A Final Note on Marketing


    When fulfilling an existing demand, you’re selling to a known target audience.
    But if you introduce an entirely new product concept that is unlike anything else
    in the App Store, be aware that your marketing efforts will require educating
    consumers on why they should buy an app they do not yet know they need or want.
    It is your job to make them want, or better yet, need the app.'
