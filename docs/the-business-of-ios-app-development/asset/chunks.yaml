- fmt: '# 排版后的文本


    那些对你的公司感觉良好的人会愿意回报你的支持，不仅通过购买你的应用和可下载内容，还会成为拥护者，在 Twitter、Facebook 和其他社交媒体平台上向朋友推荐你的应用和服务。即使是使用盗版应用的黑客，如果他们欣赏开发者的努力，后来也可能成为应用内购买内容的合法买家。


    在线口碑是一把双刃剑，它可以双向影响。它有力量将产品从默默无闻推向一夜成功，也能在几小时内摧毁商业声誉。教训是要始终以绝对的尊重和关怀对待客户的咨询。


    花时间实施一个组织有序的客户支持系统，使你不仅能够快速响应错误报告和问题，还能有效跟踪客户支持历史记录和联系信息。这通常超出了大多数电子邮件应用的能力范围，需要使用功能更丰富的客户管理解决方案，例如帮助台软件或基于
    Web 的故障单系统。在线搜索`customer support software`，你会发现有数十种产品和服务可用。其中许多，如`Zendesk`（`http://www.zendesk.com`），提供可负担的定价层级，可满足从独立开发者到大型企业的不同需求。


    关于`Zendesk`特别有趣的一点是，它为 iOS 开发者提供了几个吸引人的功能。如果你已经在使用`GetSatisfaction`（`http://getsatisfaction.com`）作为在线支持解决方案，那些社区评论可以与`Zendesk`同步。对于使用`MailChimp`发送电子邮件新闻简报的用户，这可以与`Zendesk`集成，用于基于电子邮件的客户支持管理。想要远程访问你的帮助台系统？只需下载适用于
    iPhone 和 iPad 的免费`Zendesk`应用。`Zendesk`甚至提供了一个开源反馈表单，你可以将其嵌入到你的`Xcode`项目中，使客户能够直接从你的
    iOS 应用内向你的`Zendesk`账户提交支持请求！你可以在`http://github.com/zendesk/zendesk-iphone-dropbox`下载`Zendesk`的
    Cocoa 库。


    通过跟踪客户支持历史记录，你将能够更好地满足每个客户的独特需求，并有效监控重复出现的问题。你应该回复收到的每一封支持邮件，即使只是一个功能请求。快速的感谢回复是与客户建立良好融洽关系的简单方法。人们喜欢知道自己的声音被听到了。


    当重大错误确实出现时，迅速反应很重要。你应该做的第一件事是立即在 App Store 中更新你的应用描述，通知消费者你已意识到这个问题。让用户提前知道该问题正在处理中，并且更新版本将很快可用。这应该有助于减少大量重复的支持邮件，并——但愿如此——帮助阻止人们在可能损害你应用声誉的公共论坛上发泄不满。至少，这应该为你争取足够的时间来调查并解决这个阻止性的错误。


    如果报告的问题是一个严重影响大部分客户的严重崩溃，并且你需要尽快将修复后的更新提交到 App Store，你可能会欣慰地知道，苹果公司会在特殊情况下提供加急审核。在
    iTunes Connect 中提交你的更新应用后，发送一封电子邮件到苹果的审核团队`appreview@apple.com`，说明情况。在紧急情况下，苹果可以在一天或两天内加快应用审核，为你节省数天的等待时间。


    苹果只会为你进行一到两次加急审核（并且苹果确实会记录），所以请非常明智地使用这张“免狱卡”。


    这也是[第 9 章](#9781430262381_Ch09.xhtml)如此强调在向 App Store 提交应用之前进行广泛测试的另一个原因。开发者社区很幸运能拥有这个直接联系苹果的电子邮件渠道，所以请不要用它来沟通除关键应用审核问题以外的任何事情。


    ## 在 App Store 中保持势头的额外建议


    除了征求应用评论、参与 iOS 相关网络论坛、通过 Twitter 和 Facebook 在线增长受众，以及[第 10 章](#9781430262381_Ch10.xhtml)和本章已概述的其他众多营销和推广策略之外，以下章节讨论了一些更重要的主题。


    ### 依靠奖项和认可的声望


    让你的应用尽可能多地参加高知名度的 iPhone 奖项评选。赢得奖项可以为你的应用和公司带来奇迹，带来大量的宣传和声望。随着所有媒体报道获奖者，被包括在内将提高消费者的认知度并推动应用销售。即使你只是半决赛选手，那些额外的曝光和认可也一定会让你的应用受益。以下是一些值得考虑的奖项：


    -   苹果设计奖（`http://developer.apple.com/wwdc/ada/`）

    -   148Apps 最佳应用奖（`http://bestappever.com`）

    -   Appsfire 应用之星奖（`http://appsfire.com/appstar`）

    -   应用名人堂（`http://www.apphalloffame.com`）


    尽管这里列出的所有奖项都很有影响力，但获得著名的苹果设计奖（ADA）被认为是 iOS 开发者能取得的最高荣誉。将你的应用提交给 ADA 是吸引苹果注意力的绝佳方式。即使你没有获奖，如果你的应用给苹果留下了深刻印象，它也可能被选为
    App Store 中的精选应用。我们都知道，被苹果在 App Store 中展示有能力将应用变成畅销品。


    来自受人尊敬的开发者和媒体人士的认可也可以带来可喜的销售高峰。曾经鲜为人知的`Simplenote`被 John Gruber 公开在线推荐为他最喜欢的笔记应用。由于
    Gruber 的`DaringFireball.net`网站拥有大量读者，`Simplenote`的销量在随后的几天里一飞冲天。


    正如我在[第 10 章](#9781430262381_Ch10.xhtml)中提到的，高知名度的奖项和专家推荐应该像荣誉勋章一样自豪地展示在你的应用网站和
    App Store 描述中。奖项和认可提供了验证和认可印章，影响消费者对你应用的看法。


    ### 分享你的知识


    在[第 10 章](#9781430262381_Ch10.xhtml)中，我讨论了在预发布阶段撰写关于你 iOS 应用开发经验的博客文章和帖子，作为在线增长受众的一种方式的价值。发表你的想法、见解和从过程中学到的经验教训，有助于在你和读者之间建立联系。理想情况下，他们会更加欣赏你的努力和最终产品。但不要因为应用在
    App Store 上架就停止。


    iOS 开发者喜欢阅读同行的经验，并且如果他们觉得博客帖子会对其他开发者同行感兴趣，往往会迅速转发你的 URL。记住，许多客户会关注他们喜爱应用创作者的博客和推文。因此，如果那些开发者传播了你应用的消息，他们的客户也可能成为你的客户！其他网站和博客也可能链接到你的文章。如果你足够幸运，在`Digg`、`Techmeme`、`Technorati`甚至`Slashdot`上获得一些链接喜爱，你可能会在几小时内看到网站流量呈指数级增长。


    Streaming Colour Studios 的 Owen Goss 在发表了一篇关于他开发的`Dapple`游戏销售数据的博客文章后，亲眼目睹了这种情况。'
  raw: 'People who feel good about your company will want to support you in return,
    not only by buying your apps and downloadable content, but also by becoming advocates
    who recommend your apps and services to friends on Twitter, Facebook, and other
    social media platforms. Even hackers using pirated apps have been known to later
    become legitimate buyers of In-App Purchase content if they appreciate the developers’
    efforts.    Online word-of-mouth is a double-edged sword that can cut both ways.
    It has the power to catapult products from obscurity to overnight success, as
    well as to destroy business reputations within a matter of hours. The lesson is
    to always treat customer inquiries with absolute respect and care.    Take the
    time to implement an organized customer-support system that enables you to not
    only respond quickly to bug reports and issues, but also effectively track customer
    support histories and contact information. This usually goes beyond the capabilities
    of most e-mail applications, requiring the use of a more feature-rich customer-management
    solution, such as help desk software or a web-based trouble-ticket system. Perform
    a search online for *customer support software*, and you’ll discover that dozens
    of products and services are available. Many of them, such as Zendesk (`http://www.zendesk.com`),
    offer affordable pricing tiers that cater to both solo developers and large enterprises,
    depending on your specific needs.    What’s especially interesting about Zendesk
    is that it provides several appealing features for iOS developers. If you’re already
    using GetSatisfaction (`http://getsatisfaction.com`) as your online support solution,
    those community comments can be synchronized with Zendesk. For those of you using
    MailChimp to send out e-mail newsletters, that can be integrated with Zendesk
    for e-mail–based customer-support management. Want to access your help desk system
    remotely? Just download the free Zendesk app for iPhone and iPad. Zendesk even
    provides an open source feedback form that you can embed into your Xcode project,
    enabling customers to submit support requests directly to your Zendesk account
    from within your iOS app! You can download Zendesk’s Cocoa library for iPhone
    at `http://github.com/zendesk/zendesk-iphone-dropbox`.    By tracking customer
    support histories, you’ll be able to better serve each customer’s unique needs
    and effectively monitor recurring issues. You should reply to every support e-mail
    you receive, even if it’s only a feature request. A quick thank-you reply is an
    easy way to establish a nice rapport with your customers. People like to know
    their voice has been heard.    When major bugs do surface, it’s important to react
    quickly. The first thing you should do is immediately update your app’s description
    in the App Store, notifying consumers that you’re aware of the problem. Let users
    know up front that the issue is being addressed and an updated version will be
    available soon. This should help reduce the flood of redundant support e-mail
    messages and—fingers crossed—help dissuade people from venting their frustrations
    in a public forum that can damage your app’s reputation. At the very least, it
    should buy you enough time to investigate and resolve the showstopping bug.    If
    the reported issue is a severe crash affecting a large percentage of your customers,
    and you need to get the fixed update into the App Store as soon as possible, you
    may be relieved to know that Apple provides expedited reviews for special circumstances.
    After submitting your updated app in iTunes Connect, send an e-mail message to
    Apple’s review team at `appreview@apple.com`, explaining the situation. In emergency
    cases, Apple can expedite the app review in a day or two, saving you several days
    of waiting.    Apple will perform expedited reviews for you only once or twice
    (and Apple does keep track), so use this “get out of jail free card” very wisely.


    This is yet another reason why [Chapter 9](#9781430262381_Ch09.xhtml) placed such
    a strong emphasis on extensive testing before submitting your application to the
    App Store. The developer community is fortunate to have this direct e-mail line
    into Apple, so please don’t use it to communicate anything other than critical
    app review issues.    Additional Tips for Sustaining Momentum in the App Store    Beyond
    soliciting app reviews, participating in iOS-related web forums, growing your
    audience online via Twitter and Facebook, and the myriad of other marketing and
    publicity strategies already outlined in [Chapter 10](#9781430262381_Ch10.xhtml)
    and this chapter, the following sections discuss a few more important topics.    Banking
    on the Prestige of Awards and Endorsements    Enter your app into as many high-profile
    iPhone awards competitions as possible. Winning an award can do wonders for both
    your app and your company, providing a landslide of publicity and prestige. And
    with all the press that reports on the winners, being included will increase consumer
    awareness and boost app sales. Even if you’re only a semifinalist, that extra
    exposure and recognition will definitely benefit your app. Here are a few to consider:    *   Apple
    Design Awards (`http://developer.apple.com/wwdc/ada/`) *   148Apps’ Best App Ever
    Awards (`http://bestappever.com`) *   Appsfire’s App Star Awards (`http://appsfire.com/appstar`)
    *   App Hall of Fame (`http://www.apphalloffame.com`)    Although all the awards
    listed here are very influential, landing a renowned Apple Design Awards (ADA)
    one is perceived as the highest honor an iOS developer can achieve. Submitting
    your app to the ADA is a great way to gain Apple’s attention. Even if you don’t
    win an award, if your app impresses Apple, it may just get selected as a featured
    app in the App Store. And we all know that being showcased by Apple in the App
    Store has the power to transform apps into best sellers.    Endorsements from
    respected developers and media personalities can also provide welcome sales spikes.
    The once little-known Simplenote was publicly endorsed online by John Gruber as
    his favorite notes app. Because of the large readership of Gruber’s DaringFireball.net
    site, sales for Simplenote shot through the roof in the days that followed.    As
    I mentioned in [Chapter 10](#9781430262381_Ch10.xhtml), high-profile awards and
    expert testimonials should be proudly displayed on your app’s web site and App
    Store description like merit badges. Awards and endorsements offer validation
    and a seal of approval that influence consumer perception of your app.    Share
    Your Knowledge    In [Chapter 10](#9781430262381_Ch10.xhtml), I discussed the
    value of writing blog posts and articles about your iOS app development experiences
    as a way to grow your online audience during the prerelease stage. Publishing
    your thoughts, insights, and lessons learned from the process helps bridge a connection
    between you and your readers. Ideally, they will have a greater appreciation for
    your efforts and the finished product. But don’t stop once the app is available
    in the App Store.    iOS developers love to read about the experiences of their
    peers and are often quick to retweet your URL if they think the blog post would
    be of interest to other fellow developers. Remember that many customers follow
    the blogs and tweets of their favorite app creators. So, if those developers spread
    the word about your app, their customers could also become your customers! Other
    web sites and blogs may link to your articles as well. And if you’re lucky enough
    to get some link love on Digg, Techmeme, Technorati, or even Slashdot, you could
    see traffic to your site rise exponentially in a matter of hours.    Streaming
    Colour Studios’ Owen Goss saw that happen firsthand after publishing a blog article
    about his Dapple game’s sales numbers.'
