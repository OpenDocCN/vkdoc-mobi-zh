- fmt: 'The beauty of these share buttons is that they give your site visitors the
    ability to bookmark or share a specific URL with dozens of popular social media
    sites, such as Twitter, Facebook, Digg, Delicious, StumbleUpon, LinkedIn, MySpace,
    Slashdot, Reddit, Technorati, and many others. You can even “tell a friend” via
    e-mail. Their share buttons are small and compact, for easy placement anywhere
    on your web pages. Hover your mouse over the button, and a drop-down menu appears
    with sharing options (see [Figure 10-8](#9781430262381_Ch10.xhtml#Fig8)).


    ![9781430262381_Fig10-08.jpg](images/9781430262381_Fig10-08.jpg)


    [Figure 10-8](#9781430262381_Ch10.xhtml#_Fig8). The default button offerings from
    ShareThis (left) and AddThis (right) provide comprehensive drop-down menus for
    convenient URL sharing


    Don’t like their default button choices? Some of these sharing services even let
    you use your own custom button image. This enables you to better integrate their
    service into your site’s existing design, such as in the Breadcrumbs example ([Figure
    10-4](#9781430262381_Ch10.xhtml#Fig4)), where I modified the share icon to match
    the same dimensions as the accompanying Twitter and Facebook icons for visual
    consistency.


    You can easily grab the needed code from these sharing services and be on your
    way. However, if you want to track the performance of your share buttons, I recommend
    signing up for a free account with these services. As with web site analytics,
    you’ll be able to log in to your AddThis or ShareThis account to monitor which
    of your web pages are being bookmarked and shared the most, as well as which social
    media sites they are sharing with. This is very valuable information to have.
    Knowing which social networking sites your visitors use regularly can help you
    determine where to focus your own online marketing efforts.


    If the majority of your web audience is using a specific social media site, such
    as Facebook, you may be interested in targeting your share button to that site,
    rather than the “everything but the kitchen sink” approach of third-party share
    services like AddThis. If you read a lot of blogs, you’ve undoubtedly seen the
    popular Twitter, Facebook Like, and Digg buttons (see [Figure 10-9](#9781430262381_Ch10.xhtml#Fig9)).


    ![9781430262381_Fig10-09.jpg](images/9781430262381_Fig10-09.jpg)


    [Figure 10-9](#9781430262381_Ch10.xhtml#_Fig9). Targeted sharing buttons provided
    by Twitter, Facebook, and Digg dramatically increase URL sharing, but visible
    counters can also reveal unpopular web pages


    These high-profile buttons reduce the sharing task down to a single targeted click,
    which results in a greater number of URLs shared. The easier you make sharing
    for your site visitors, the more they’ll do it.


    If your web page is popular and racks up a nice large number in the share counter,
    as shown in [Figure 10-9](#9781430262381_Ch10.xhtml#Fig9)’s Tweet button (on the
    far left), your content looks that much more attractive to new visitors, making
    them eager to share the page as well.


    But on the flip side is the inevitable disadvantage that visible counter will
    have for new or rarely visited sites. Clocking in at an excruciatingly low number
    of retweets is frustrating enough, but to have it advertised to everyone who visits
    your web page is just downright embarrassing. And no one likes to hang around
    the unpopular kids.


    If your site is still struggling to increase traffic, you may want to use all-in-one
    sharing aggregators like ShareThis, until you’re able to drum up higher numbers.


    So, if your web site already enjoys a healthy stream of traffic, high-impact,
    targeted share buttons are worthy additions. Here are a few, all of which are
    easily installed on your web page or blog by copying and pasting a small snippet
    of JavaScript code:


    *   Tweet Button (`http://twitter.com/about/resources/tweetbutton`)

    *   Facebook Like Button (`http://developers.facebook.com/docs/reference/plugins/like/`)

    *   Smart Digg Button (`http://about.digg.com/downloads/button/smart`)


    Whichever share button options you decide to use, be sure your web pages have
    HTML `<title>` tags that are short enough to easily retweet. If your site visitors
    are forced to edit your title text in order to share it via Twitter, odds are
    they will abandon the URL share attempt, not wanting to be bothered with the extra
    effort required.


    So, what’s an appropriate title length? Twitter limits tweets to no more than
    140 characters, but even that’s too long for your title, since your retweet will
    need to also include your web page’s URL. Reserving space for the URL, let’s see
    how many characters remain for the actual title text.


    For the sake of this example, we’ll walk through constructing a viable web page
    title for the fictional Breadcrumbs app—one that is easily retweetable. The web
    site URL of `http://www.breadcrumbsapp.com` is short, but Twitter may automatically
    convert it into a shorter URL using its built-in URL-shortening feature. You’ll
    want to track the number of click-throughs coming from that tweet, so instead
    of relying on Twitter’s native URL shortener, set up your own free account at
    a URL-shortener service like Bit.ly (`http://bit.ly/`) and provide your own shortened
    URL. This way, you’ll reduce the number of characters needed for the URL, and
    you’ll be able to monitor the link’s popularity via Bit.ly’s analytics.


    With a shortened Bit.ly URL weighing in at approximately 20 characters (`http://bit.ly/3EmvfN`),
    that leaves us with 120 characters to avoid exceeding Twitter’s 140-character
    limit. To safely account for any additional comments that users want to add to
    the tweet (such as “Cool app!”), let’s craft a title that’s 100 characters or
    less.


    “Breadcrumbs for iPhone - Never misplace your car again with this new parked car
    locator app!” is only 92 characters, so that will work! The web page’s HTML `<title>`
    tag now reads as follows:


    ```

    <title>Breadcrumbs for iPhone - Never misplace your car again with this new parked
    car locator app!</title>

    ```


    This produces the following 113-character share message:


    ```

    Breadcrumbs for iPhone - Never misplace your car again with this new parked car
    locator app! http://bit.ly/3EmvfN

    ```


    Perfect! Our web page’s `<title>` tag includes important keyword phrases like
    *iPhone app* and *car locator* for proper search engine positioning, yet it’s
    short enough to promote URL sharing across the popular social networking sites.
    This may all seem like a lot of attention paid to trivial minutiae, but it’s this
    level of detail that can turn an ordinary web site into a powerful marketing tool.


    Your Blog and RSS Feed


    Most of you already maintain a blog for posting news about software releases and
    development updates. And if you don’t, then you really should! It’s a great way
    to grow a readership, drawing users to your site. Don’t have much to say? That’s
    OK, because you don’t need to make it a daily journal.


    A blog establishes a direct connection between you and your customers, where readers
    can stay on top of your latest news and post comments. For those of you new to
    blogs, I’ll be discussing the community-building power of blogs later in this
    chapter.


    For now, if you do maintain a blog for discussing software development or iOS
    news, make sure that your app-related web site includes a direct link to it. Beyond
    Twitter and Facebook, you want site visitors to know that your blog is yet one
    more available resource for staying informed about your app.'
