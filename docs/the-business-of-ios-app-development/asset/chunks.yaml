  raw: 'Tired of drawing the same buttons and other standard interface elements over
    and over again? Thanks to several prominent designers and developers, predrawn
    iPhone and iPad sketch templates are available online (see [Figure 4-12](#9781430262381_Ch04.xhtml#Fig12)),
    including the following:


    *   Interface Sketch (`http://www.interfacesketch.com`) iPhone and iPad app wireframe
    templates  are available in PDF format to print in Letter or A4 sizes.

    *   UI Stencils (`http://www.uistencils.com`) iPhone and iPad stencils are durable
    stainless stencils. You can also get downloadable sketchbook pages in PDF format
    from the web site.


    ![9781430262381_Fig04-12.jpg](images/9781430262381_Fig04-12.jpg)


    [Figure 4-12](#9781430262381_Ch04.xhtml#_Fig12). UIStencils wire framing pad and
    stainless steel stencil is definitely worth investing in if you plan on designing
    apps regularly


    Beautiful Mock-ups in Illustrator and Photoshop


    If drawing on paper is not your thing, and you’re more comfortable working in
    Adobe’s Photoshop, Illustrator, or even Fireworks, other resourceful designers
    have graciously donated comprehensive sets of interface elements to the iOS developer
    community. These are conveniently stored in layered files, making the creation
    of pixel-perfect mock-ups extremely easy (see [Figure 4-13](#9781430262381_Ch04.xhtml#Fig13)).


    *   Meng To’s iPhone UX sketch wireframe templates


    (`http://blog.mengto.com/how-to-wireframe-an-iphone-app-in-sketch/`)


    *   Teehan+Lax’s iPhone GUI, for Photoshop (`http://www.teehanlax.com/tools/iphone/`)

    *   Teehan+Lax’s iPad GUI, for Photoshop (`http://www.teehanlax.com/tools/ipad/`)


    ![9781430262381_Fig04-13.jpg](images/9781430262381_Fig04-13.jpg)


    [Figure 4-13](#9781430262381_Ch04.xhtml#_Fig13). Just a small sample of the many
    iOS elements available in layered Photoshop files and vector-based Illustrator
    files from third-party designers


    When designing the actual artwork for the device, remember to always use a two-pixel
    grid system to avoid any issues on non-Retina devices. If you made a button that
    was 120 × 51 pixels on a Retina device, but now you want to make the non-Retina
    version, it cannot be 60 × 25.5 pixels. You need to make sure your dimensions
    don’t yield a half pixel when you save a non-Retina image. This guide by Eddie
    Lobanovskiy is helpful with designing your app in Photoshop: iPhone 5 Grid Template
    (`http://dribbble.com/shots/865767-iPhone-5-Grid`).


    Other Software Tools for Designing Mock-ups


    Balsamiq Mockups (`www.balsamiq.com/products/mockups/`) is one of my personal
    favorites. It is a robust, cross-platform Adobe AIR application that features
    a vast toolkit of “hand-drawn” UI elements for both desktop apps and iOS apps.
    This unique approach produces mock-ups that are very clean and professional, while
    still looking as though they were drawn on paper.


    If you don’t own a license for Photoshop or Illustrator, or you’re looking for
    a more budget-conscious prototyping option, here are some other tools for designing
    mock-ups:


    *   *OmniGraffle* (`www.omnigroup.com/applications/omnigraffle/`): This is an
    inexpensive solution for Mac users. Although originally developed as a diagramming
    tool, OmniGraffle has become a popular choice for constructing wireframes and
    interface design mock-ups.

    *   *Graffletopia* (`www.graffletopia.com`): This third-party web site offers
    an extensive free library of user-contributed OmniGraffle stencils. Several iPhone-related
    stencils are available for download.

    *   *Keynotopia* (`www.keynotopia.com`): If you prefer using presentation software
    for client meetings, you may want to check out the various Keynote templates for
    prototyping iPhone and iPad apps available.


    Designing Apps with Mobile Apps


    What about those frequent occasions when inspiration hits while you’re away from
    your desk? A few innovative iPhone and iPad apps provide powerful wire framing
    and prototyping features conveniently and comfortably available from wherever
    you are.


    If you’re interested in exporting Xcode projects of your mock-ups, you’ll definitely
    want to check out AppCooker and BluePrint. If you’re already a fan of OmniGraffle
    on the Mac, OmniGraffle for iPad may be an obvious solution for you (although
    it’s worth noting that some of the third-party templates available at `Graffletopia.com`
    may not be supported on the current iPad version of OmniGraffle).


    The following are some of the available mobile mock-up tools:


    *   OmniGraffle for iPad (`http://www.omnigroup.com/products/omnigraffle-ipad/`)

    *   AppCooker for iPad (`http://www.appcooker.com`)

    *   Blueprint (iOS Mockup) for iPad (`http://groosoft.com`)


    Start Prototyping


    Of course, if you’re simply designing an app for yourself as a solo developer,
    then this step may seem a little excessive, especially if you’re skilled enough
    to cobble together fast prototypes in Interface Builder. But if you’re working
    with a client who is infamous for requesting countless UI changes, then creating
    functional paper prototypes may allow you to quickly refine the design and get
    your client’s approval without wasting any actual programming time.


    Prototyping can reveal awkward workflows and unintuitive architecture in your
    app. An interface concept can play like a good idea in your head, but once you
    map it out on paper and scrutinize a semiworking prototype, you may change your
    mind. In fact, sometimes a prototype can lead you to new ideas that end up enhancing
    the marketability of your app. At the very least, prototyping will expose actions
    that are overly complicated, leading you to find new solutions to streamline the
    user interaction—something that’s crucial to the success of a mobile app.


    Prototyping can also save you countless hours of development time and prevent
    you from writing unusable code. “How is that possible?” you ask. “Wouldn’t it
    be faster to just jump into Xcode right now and start hammering out a quick-and-dirty
    demo?”


    If you’re developing an app for a client or your boss, he may want to see your
    ideas before signing off on the project. The key word here is *see*. More often
    than not, many business executives—especially those with no creative background—have
    trouble visualizing an interface. No matter how well you communicate your idea
    in a meeting, they just can’t picture it in their head. Putting together wireframes
    or screenshot mock-ups of your interface concept is an easy, time-saving method
    to quickly show your client or boss what you’re proposing. This way, if he comes
    back to you with a lot of changes or (gasp!) a major shift in direction, you won’t
    have wasted a lot of precious time in Xcode and Interface Builder.


    If you’re outsourcing your app development, then prototyping can also be extremely
    valuable in properly communicating your UI concept to third-party programmers,
    especially if there’s a substantial language barrier. When they’re charging you
    by the hour, the less time you need to spend explaining your ideas and goals,
    the less money the outsourced development will cost you. A picture is worth a
    thousand words.


    Even if you’re an independent developer working solo on an app, the most important
    benefit of prototyping is the amount of valuable time and potential headaches
    it can save you later during the beta testing stage. You don’t want to spend months
    slaving over an app, only to receive overwhelming feedback from your testers that
    the UI is impossible to grasp and difficult for them to figure out how to use
    the app or access certain features. Those are issues best solved before you get
    too deep into the development process.


