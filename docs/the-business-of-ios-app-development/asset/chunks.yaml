- fmt: '# Beta Tester Recruitment Guide


    When looking for beta testers, avoid recruiting your close friends and family,
    since their feedback will not be as objective as you would like. More often than
    not, they will give only positive comments—you won’t get the harsh truth you need
    at this juncture.


    And don’t just get fellow developers to test your app. Also recruit a fresh set
    of nontechnical eyes to run the app through its paces. People who are not familiar
    with programming offer a very valuable, objective viewpoint, and they will most
    likely be a closer representation of your app’s target audience. Just be prepared
    to ask a lot of questions to extract the pertinent bits.


    Often, nontechnical users will know when they don’t like something, but they may
    not initially understand why it bothers them. It may take a great deal of patience
    on your part to get them to properly communicate their reasoning behind a reported
    issue.


    On the flip side, developers speak your language, so they can easily describe
    problems on a very technical level, and may even suggest ways to fix them. But
    since developers are attuned to navigating through even the most nonintuitive
    interfaces, they may not recognize usability issues that would trouble a newbie.


    Your best bet is to gather a diverse group of beta testers that is composed of
    developers, power users, and nontechnical casual users.


    Since quality beta testing requires a fair amount of dedicated time from a participant,
    you should offer some form of payment as an incentive for providing a satisfactory
    amount of feedback. It does not need to be cash. For developers on a shoestring
    budget, the reward can be a free copy of the app you’re testing or a free license
    to another related product you sell. Just make sure to carefully outline exactly
    what a beta tester is required to complete to earn the free goods. A good barter
    system will be a win-win situation for everyone involved. You get valuable feedback,
    and the testers get free swag and software.


    So, beyond your own pool of developer friends, where can you find additional beta
    testers? Imangi Studios (creators of Harbor Master) and other popular game developers
    recruit many of their beta testers from popular gaming sites, such as the Touch
    Arcade forums. It’s not uncommon to see online queries from companies looking
    for beta-test volunteers posted on blogs, Facebook, and Twitter.


    ## Collecting a Device ID from iTunes


    Most users won’t know where to locate the `UDID` on their iPhone, iPad, or iPod
    touch. You can tell the user to follow these steps:


    1. Sync your device with iTunes.

    2. Select the device’s Summary tab to display its properties.

    3. If the serial number is listed, click it to toggle the listing to show the
    identifier (`UDID`).

    4. Choose `Edit` ![image](images/arrow.jpg) `Copy` from the Edit menu to copy
    that 40-character `UDID` to the clipboard. (Even though the user won’t be able
    to select the text of the `UDID` in iTunes, the `Copy` command will copy it to
    the clipboard.)

    5. Paste it into an e-mail message and send it to the developer (you).


    After receiving all your beta testers’ device IDs, simply register them online
    in the Devices section of the Certificates, Identifiers & Profiles page, using
    the same procedure you used earlier when registering your own test devices.


    Many developers employ a naming scheme to help keep their Devices list organized.
    Instead of just the beta tester’s first and last name, I highly recommend including
    the tester’s device model as well, such as “Joe Smith iPhone 4” or “Jane Walker
    iPad.”


    Unfortunately, you need to know who all of your beta testers are before you generate
    your distribution provisioning profile, since every beta tester’s device ID must
    be tied to that profile. If you need to insert additional device IDs later, that
    will require you to generate a new distribution provisioning profile, and then
    redistribute the updated profile and app. It’s a very laborious, time-consuming
    process, so it’s best not to need to go through that more than once.


    Remember me talking about Test Flight earlier? This is where it saves you a bunch
    of time. All you need to do is log in to `www.testflightapp.com` and invite your
    beta testers via e-mail. They will get an e-mail (that must be opened on the mobile
    device they are going to test on) and it will gather all the information you need.
    Then, you can simply export to iTunes Connect and you’re done.


    **Note** A major drawback to Apple’s current system is that a standard iOS Developer
    Program account is limited to only 100 devices per membership year. That may seem
    like a lot, but in reality, if you’re developing several apps and each one has
    its own group of beta testers, it’s actually pretty easy to max out your device
    ID allotment. You do have the option to delete old unused device IDs, but they
    will still count toward your device ID total within that membership year. So with
    that said, take care to use your device ID slots wisely. Whenever possible, register
    only the device IDs of beta testers you know will provide quality feedback.


    ## Step 3: Generate and Install an Ad Hoc Distribution Provisioning Profile


    Jumping back to the Certificates, Identifiers & Profiles page in your web browser,
    select Distribution in the Provisioning Profiles section. Then click the `+` button
    to add a New Profile.


    In the page that’s presented, be sure to choose Ad Hoc as the distribution method.
    Select the appropriate app ID for your application, and select the distribution
    certificate to include in the provisioning profile. Then select all of the beta
    tester device IDs that should be included in this provisioning profile (see [Figure
    9-24](#9781430262381_Ch09.xhtml#Fig24)). If a specific beta tester’s device ID
    is not embedded in the provisioning profile, that person will not be able to install
    and run the app on his or her device. Any accidental omissions will force you
    to create and install a new, updated provisioning profile, so carefully review
    the selected devices before clicking the Continue button.


    ![9781430262381_Fig09-24.jpg](images/9781430262381_Fig09-24.jpg)


    [Figure 9-24](#9781430262381_Ch09.xhtml#_Fig24). Carefully select all the device
    IDs of your beta testers before generating the distribution provisioning profile


    Last, but not least, enter a profile name that reflects the nature of this provisioning
    profile. When testing multiple applications, including the name of the app along
    with a reference to the distribution stage (Ad Hoc or App Store) in the Profile
    Name field helps keep the collection of profiles organized.


    When your distribution provisioning profile has been generated and can be found
    in the Distribution tab’s list of provisioning profiles, click the Download button
    to save the `.mobileprovision` file to your hard drive. With your test device
    still connected to your Mac, drag the `.mobileprovision` file onto the Xcode icon
    in your Dock. Xcode will automatically install that provisioning profile in the
    proper location.


    Save a copy of the distribution provisioning profile that you stored on your hard
    drive. You’ll need to include that `.mobileprovision` file with the compiled app
    you deliver to your beta testers.


    ## Step 4: Configure Your App for Ad Hoc Distribution


    Now that you have the distribution certificate and provisioning profile in place,
    the next step is to configure your Xcode project for ad hoc distribution. Fire
    up your project in Xcode, but before you do anything, ensure that you’ve added
    a 57 × 57 pixel `icon.png` file and a 114 × 114 pixel `icon@2x.png` file (for
    Retina display) to the project. Beyond the fact that you may encounter distribution
    build errors without an icon, visual impressions count even in the beta-testing
    stage, so including a beautiful app icon is important.


    Create an archive of your project by selecting `Product` ![image](images/arrow.jpg)
    `Archive` in Xcode. Once your archive is created, the Organizer-Archives window
    will open (see [Figure 9-25](#9781430262381_Ch09.xhtml#Fig25)).'
  raw: 'When looking for beta testers, avoid recruiting your close friends and family,
    since their feedback will not be as objective as you would like. More often than
    not, they will give only positive comments—you won’t get the harsh truth you need
    at this juncture.


    And don’t just get fellow developers to test your app. Also recruit a fresh set
    of nontechnical eyes to run the app through its paces. People who are not familiar
    with programming offer a very valuable, objective viewpoint, and they will most
    likely be a closer representation of your app’s target audience. Just be prepared
    to ask a lot of questions to extract the pertinent bits.


    Often, nontechnical users will know when they don’t like something, but they may
    not initially understand why it bothers them. It may take a great deal of patience
    on your part to get them to properly communicate their reasoning behind a reported
    issue.


    On the flip side, developers speak your language, so they can easily describe
    problems on a very technical level, and may even suggest ways to fix them. But
    since developers are attuned to navigating through even the most nonintuitive
    interfaces, they may not recognize usability issues that would trouble a newbie.


    Your best bet is to gather a diverse group of beta testers that is composed of
    developers, power users, and nontechnical casual users.


    Since quality beta testing requires a fair amount of dedicated time from a participant,
    you should offer some form of payment as an incentive for providing a satisfactory
    amount of feedback. It does not need to be cash. For developers on a shoestring
    budget, the reward can be a free copy of the app you’re testing or a free license
    to another related product you sell. Just make sure to carefully outline exactly
    what a beta tester is required to complete to earn the free goods. A good barter
    system will be a win-win situation for everyone involved. You get valuable feedback,
    and the testers get free swag and software.


    So, beyond your own pool of developer friends, where can you find additional beta
    testers? Imangi Studios (creators of Harbor Master) and other popular game developers
    recruit many of their beta testers from popular gaming sites, such as the Touch
    Arcade forums. It’s not uncommon to see online queries from companies looking
    for beta-test volunteers posted on blogs, Facebook, and Twitter.


    Collecting a Device ID from iTunes


    Most users won’t know where to locate the UDID on their iPhone, iPad, or iPod
    touch. You can tell the user to follow these steps:


    1.  Sync your device with iTunes.

    2.  Select the device’s Summary tab to display its properties.

    3.  If the serial number is listed, click it to toggle the listing to show the
    identifier (UDID).

    4.  Choose Edit ![image](images/arrow.jpg) Copy from the Edit menu to copy that
    40-character UDID to the clipboard. (Even though the user won’t be able to select
    the text of the UDID in iTunes, the Copy command will copy it to the clipboard.)

    5.  Paste it into an e-mail message and send it to the developer (you).


    After receiving all your beta testers’ device IDs, simply register them online
    in the Devices section of the Certificates, Identifiers & Profiles page, using
    the same procedure you used earlier when registering your own test devices.


    Many developers employ a naming scheme to help keep their Devices list organized.
    Instead of just the beta tester’s first and last name, I highly recommend including
    the tester’s device model as well, such as “Joe Smith iPhone 4” or “Jane Walker
    iPad.”


    Unfortunately, you need to know who all of your beta testers are before you generate
    your distribution provisioning profile, since every beta tester’s device ID must
    be tied to that profile. If you need to insert additional device IDs later, that
    will require you to generate a new distribution provisioning profile, and then
    redistribute the updated profile and app. It’s a very laborious, time-consuming
    process, so it’s best not to need to go through that more than once.


    Remember me talking about Test Flight earlier? This is where it saves you a bunch
    of time. All you need to do is log in to `www.testflightapp.com` and invite your
    beta testers via e-mail. They will get an e-mail (that must be opened on the mobile
    device they are going to test on) and it will gather all the information you need.
    Then, you can simply export to iTunes Connect and you’re done.


    **Note**  A major drawback to Apple’s current system is that a standard iOS Developer
    Program account is limited to only 100 devices per membership year. That may seem
    like a lot, but in reality, if you’re developing several apps and each one has
    its own group of beta testers, it’s actually pretty easy to max out your device
    ID allotment. You do have the option to delete old unused device IDs, but they
    will still count toward your device ID total within that membership year. So with
    that said, take care to use your device ID slots wisely. Whenever possible, register
    only the device IDs of beta testers you know will provide quality feedback.


    Step 3: Generate and Install an Ad Hoc Distribution Provisioning Profile


    Jumping back to the Certificates, Identifiers & Profiles page in your web browser,
    select Distribution in the Provisioning Profiles section. Then click the + button
    to add a New Profile.


    In the page that’s presented, be sure to choose Ad Hoc as the distribution method.
    Select the appropriate app ID for your application, and select the distribution
    certificate to include in the provisioning profile. Then select all of the beta
    tester device IDs that should be included in this provisioning profile (see [Figure
    9-24](#9781430262381_Ch09.xhtml#Fig24)). If a specific beta tester’s device ID
    is not embedded in the provisioning profile, that person will not be able to install
    and run the app on his or her device. Any accidental omissions will force you
    to create and install a new, updated provisioning profile, so carefully review
    the selected devices before clicking the Continue button.


    ![9781430262381_Fig09-24.jpg](images/9781430262381_Fig09-24.jpg)


    [Figure 9-24](#9781430262381_Ch09.xhtml#_Fig24). Carefully select all the device
    IDs of your beta testers before generating the distribution provisioning profile


    Last, but not least, enter a profile name that reflects the nature of this provisioning
    profile. When testing multiple applications, including the name of the app along
    with a reference to the distribution stage (Ad Hoc or App Store) in the Profile
    Name field helps keep the collection of profiles organized.


    When your distribution provisioning profile has been generated and can be found
    in the Distribution tab’s list of provisioning profiles, click the Download button
    to save the .mobileprovision file to your hard drive. With your test device still
    connected to your Mac, drag the .mobileprovision file onto the Xcode icon in your
    Dock. Xcode will automatically install that provisioning profile in the proper
    location.


    Save a copy of the distribution provisioning profile that you stored on your hard
    drive. You’ll need to include that .mobileprovision file with the compiled app
    you deliver to your beta testers.


    Step 4: Configure Your App for Ad Hoc Distribution


    Now that you have the distribution certificate and provisioning profile in place,
    the next step is to configure your Xcode project for ad hoc distribution. Fire
    up your project in Xcode, but before you do anything, ensure that you’ve added
    a 57 × 57 pixel icon.png file and a 114 × 114 pixel `icon@2x.png` file (for Retina
    display) to the project. Beyond the fact that you may encounter distribution build
    errors without an icon, visual impressions count even in the beta-testing stage,
    so including a beautiful app icon is important.


    Create an archive of your project by selecting `Product` ![image](images/arrow.jpg)
    `Archive` in Xcode. Once your archive is created, the Organizer-Archives window
    will open (see [Figure 9-25](#9781430262381_Ch09.xhtml#Fig25)).'
  trans: '好的，作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将以下英文文本翻译成高质量的中文。



    # Beta 版测试者招募指南


    在寻找 Beta 版测试者时，请避免招募你的密友和家人，因为他们的反馈不会像你期望的那样客观。很多时候，他们只会给出正面评价——而你在这个阶段需要的是严苛的真相。


    另外，不要只让其他开发者来测试你的应用。也要招募一批不熟悉技术的新鲜人来全面测试你的应用。不熟悉编程的人能提供非常有价值的、客观的观点，而且他们很可能更能代表你应用的目标受众。你只需要准备好提出大量问题，以提取出相关的重要信息。


    通常情况下，非技术用户能感知到他们不喜欢某个东西，但他们起初可能不明白为什么这个东西会让他们感到困扰。你可能需要付出极大的耐心，才能让他们恰当地沟通他们在报告问题背后的理由。


    另一方面，开发者与你语言相通，所以他们能在非常技术性的层面上轻松描述问题，甚至可能提出修复方法。但是，由于开发者习惯于在即使是最不直观的界面中导航，他们可能无法识别出那些会让新手感到困扰的可用性问题。


    你最好的选择是组建一个多元化的 Beta 版测试者团队，其中包含开发者、高级用户和非技术类的普通用户。


    由于高质量的 Beta 版测试需要参与者投入相当多的专用时间，你应该提供某种形式的报酬，作为提供足够数量反馈的激励。这不一定是现金。对于预算紧张的开发者来说，奖励可以是所测试应用的免费副本，或者是你销售的另一个相关产品的免费许可证。只需确保仔细说明
    Beta 版测试者需要完成哪些任务才能获得免费物品。一个好的易货体系对参与的每个人都是双赢。你获得了宝贵的反馈，而测试者获得了免费的周边和软件。


    那么，除了你自己的开发者朋友之外，你还能在哪里找到更多的 Beta 版测试者呢？Imangi Studios（《港口大师》的开发商）和其他热门游戏开发者会从热门游戏网站（如
    Touch Arcade 论坛）招募他们的许多 Beta 版测试者。在博客、Facebook 和 Twitter 上看到公司发布的寻找 Beta 版测试志愿者的在线查询请求并不罕见。


    ## 从 iTunes 收集设备 ID


    大多数用户不知道在他们的 iPhone、iPad 或 iPod touch 上哪里可以找到 `UDID`。你可以告诉用户遵循以下步骤：


    1.  将你的设备与 iTunes 同步。

    2.  选择设备的“摘要”标签页以显示其属性。

    3.  如果列出了序列号，请点击它以切换显示列表，显示标识符 (`UDID`)。

    4.  从“编辑”菜单中选择`编辑` ![image](img/arrow.jpg) `拷贝`，将那 40 个字符的 `UDID` 复制到剪贴板。（即使无法在
    iTunes 中选择 `UDID` 的文本，“拷贝”命令也会将其复制到剪贴板。）

    5.  将其粘贴到电子邮件中，并发送给开发者（也就是你）。


    在收到所有 Beta 版测试者的设备 ID 后，只需使用你之前注册自己测试设备时使用的相同流程，在“证书、标识符和配置文件”页面的“设备”部分在线注册它们即可。


    许多开发者会采用一种命名方案来帮助保持其设备列表的条理性。我强烈建议不仅包括 Beta 版测试者的名字和姓氏，还要包括测试者的设备型号，例如“Joe Smith
    iPhone 4”或“Jane Walker iPad”。


    不幸的是，你必须在生成分发配置文件之前，就了解所有 Beta 版测试者是谁，因为每个 Beta 版测试者的设备 ID 都必须绑定到该配置文件。如果你之后需要插入额外的设备
    ID，就需要生成一个新的分发配置文件，然后重新分发更新后的配置文件和应用程序。这是一个非常繁琐且耗时的过程，所以最好不要重复经历这个过程超过一次。


    还记得我之前提到的 Test Flight 吗？这就是它为你节省大量时间的地方。你只需登录 `www.testflightapp.com`，然后通过电子邮件邀请你的
    Beta 版测试者。他们会收到一封电子邮件（必须在他们将要测试的移动设备上打开），该邮件会收集你需要的所有信息。然后，你可以直接导出到 iTunes Connect，就大功告成了。


    **注意** 苹果当前系统的一个主要缺点是，标准的 iOS 开发者计划账户在每个会员年度内仅限注册 100 台设备。这看起来可能很多，但实际上，如果你正在开发多个应用程序，并且每个应用都有自己的
    Beta 版测试者群体，那么很容易就会用尽你的设备 ID 配额。你确实可以选择删除旧的未使用的设备 ID，但在该会员年度内，它们仍会计入你的设备 ID 总数。因此，请注意明智地使用你的设备
    ID 名额。只要有可能，只注册那些你知道会提供高质量反馈的 Beta 版测试者的设备 ID。


    ## 步骤 3：生成并安装 Ad Hoc 分发配置文件


    回到你网页浏览器中的“证书、标识符和配置文件”页面，在“配置文件”部分中选择“分发”。然后点击 `+` 按钮添加一个新配置文件。


    在出现的页面中，请确保选择 Ad Hoc 作为分发方式。为你的应用程序选择正确的应用 ID，并选择要包含在配置文件中的分发证书。然后选择所有应包含在此配置文件中的
    Beta 版测试者设备 ID（参见图 9-24）。如果某个 Beta 版测试者的设备 ID 未嵌入配置文件中，该测试者将无法在其设备上安装和运行该应用。任何意外的遗漏都将迫使你创建并安装一个新的、更新的配置文件，因此在点击“继续”按钮之前，请仔细检查所选设备。


    ![9781430262381_Fig09-24.jpg](img/9781430262381_Fig09-24.jpg)


    图 9-24. 在生成分发配置文件之前，仔细选择你的所有 Beta 版测试者设备 ID


    最后但同样重要的是，输入一个能反映此配置文件性质的配置文件名称。在测试多个应用程序时，在“配置文件名称”字段中包含应用程序名称以及对分发阶段（Ad Hoc
    或 App Store）的引用，有助于保持配置文件集合的条理性。


    当你的分发配置文件生成完毕，并可以在“分发”标签页的配置文件列表中找到时，点击“下载”按钮将 `.mobileprovision` 文件保存到你的硬盘。在你的测试设备仍连接到
    Mac 的情况下，将 `.mobileprovision` 文件拖放到 Dock 中的 Xcode 图标上。Xcode 会自动将该配置文件安装到正确的位置。


    保存一份你存储在硬盘上的分发配置文件的副本。你需要将该 `.mobileprovision` 文件与你要交付给 Beta 版测试者的已编译应用一起提供。


    ## 步骤 4：为 Ad Hoc 分发配置你的应用


    现在你已经有了分发证书和配置文件，下一步是配置你的 Xcode 项目以进行 ad hoc 分发。在 Xcode 中启动你的项目，但在你做任何事情之前，请确保已将
    57 × 57 像素的 `icon.png` 文件和 114 × 114 像素的 `icon@2x.png` 文件（用于 Retina 显示屏）添加到项目中。除了如果没有图标可能会遇到分发构建错误之外，视觉印象即使在
    Beta 测试阶段也很重要，因此包含一个漂亮的应用图标非常重要。


    通过在 Xcode 中选择 `产品` ![image](img/arrow.jpg) `归档` 来创建项目归档。一旦你的归档创建完成，Organizer-Archives
    窗口将打开（参见图 9-25）。

    '
- fmt: '![9781430262381_Fig09-25.jpg](images/9781430262381_Fig09-25.jpg)


    [Figure 9-25](#9781430262381_Ch09.xhtml#_Fig25). Archived project in the Organizer-Archive
    window


    Select the archive of your project and click the `Validate` button. Validation
    will identify any problems with your app that should be fixed before distribution
    for testing. Once your app is successfully validated, a popup will appear indicating
    successful validation. Click the `Done` button.


    Now you need to save your archive for ad hoc deployment. Click the `Export` button
    and select `Save for Ad Hoc Deployment` (see [Figure 9-26](#9781430262381_Ch09.xhtml#Fig26)).


    ![9781430262381_Fig09-26.jpg](images/9781430262381_Fig09-26.jpg)


    [Figure 9-26](#9781430262381_Ch09.xhtml#_Fig26). Select the method for export
    of your packaged application file


    Then select `Next`. A dialog box will appear for you to choose a team. Choose
    a team and click the `Choose` button. `Xcode` will generate the provisioning profile
    and display a summary. Click the `Export` button to save the file to your hard
    drive. The file will have an `.ipa` extension.


    ## Step 5: Distribute Your App to the Beta Testers


    Now you’re ready to send the app to your beta testers! Locate the packaged application
    file that you saved in the last step on your hard drive. Send the packaged application
    file to testers along with any instructions for installation and testing.


    For beta testers to install your app, their devices should already be mounted
    in `iTunes` (connected via USB). They will need to double-click the packaged application
    file to open `iTunes`. If they perform a sync, your app and the related provisioning
    profile should appear on the beta testers’ devices, ready to run. Let the beta
    testing begin!


    ## Wireless Distribution to Beta Testers


    Forcing beta testers to deal with importing an app package into the desktop `iTunes`
    just to sync an ad hoc version onto their mobile devices has always been annoying
    for developers and often problematic for newbie beta testers. Fortunately, `iOS
    4` introduced a little-known new method for distributing your ad hoc builds wirelessly.
    Yup, that’s right—no more syncing with `iTunes` just to install a beta version.


    In `iOS 4` and higher, Apple supports over-the-air installation of `iOS` apps,
    which means you can download and install an ad hoc app build and its related provisioning
    file by tapping an `HTTP` link on a web page or in an e-mail. This feature was
    originally promoted as a benefit to Enterprise iOS Developer Program members,
    but it seems to work just as well for standard program members, too. In `iOS 8`,
    Apple introduced a beta distribution platform based on `TestFlight` that allows
    you to use `iTunes Connect` to distribute your app to testers.


    Fortunately, this new over-the-air feature bypasses the need for all the ad hoc
    distribution steps and collection of beta testers’ device IDs that we previously
    walked through. Refer to Apple’s *App Distribution Guide* for more detailed information
    on using this approach to distribution for your beta testing.


    ## Sitting Pretty


    This was, by far, one of the most instruction-heavy chapters in the book. Since
    both provisioning and ad hoc distribution have proven to be such challenging topics
    for many new iOS developers, I hope the thorough explanations helped clarify the
    process for anyone struggling with these two tasks.


    It won’t matter how brilliant your app idea is if it’s poorly executed. I can’t
    emphasize enough the importance of your app’s overall user experience as one of
    the primary factors in its potential success. On-device testing and group-managed
    beta testing should be mandatory steps in every application’s development cycle.


    # Chapter 10


    ## Get the Party Started! Creating a Prerelease Buzz


    Development completed? Check. Testing completed? Check. Ready for the `App Store`?
    Almost.


    After months of hard work to finish your application, I know you’re eager to release
    it to the world, but don’t jump the gun just yet. You still need to accomplish
    a few very important tasks.


    Before submitting your iOS app to the `App Store`, you want to start generating
    some prerelease buzz through a carefully crafted online presence. This chapter
    will explore the best ways to stir up some excitement and anticipation for your
    app by promoting it on your web site, blogs, and social networking sites, such
    as `Twitter` and `Facebook`.


    ## The Final Countdown: Preparing for Liftoff


    I know what you’re thinking: “Why can’t I simply take care of building my app’s
    web site and prerelease buzz while the app is being reviewed by Apple? Since the
    `App Store` can take weeks to approve or reject an application, that should give
    me enough time, right?” Don’t count on it. Even if your app review takes longer
    than the average 7-day to 14-day turnaround, that’s still not enough time to cultivate
    a large online following and effective web presence.


    Just your luck, when you actually rely on Apple’s app review team to take a long
    time, that will undoubtedly be the one occasion your app sails through to approval
    within only a few days. That would leave you unprepared, without your app’s web
    site and social marketing plan in place.


    ## Invest the Time to Find Your Audience


    Even though developing an attractive web site always takes longer than you think
    it will, if you were really pressed for time, you could probably construct a decent
    site in only a matter of days (with a little web-design expertise). But what does
    require a much longer gestation period is the job of growing your online audience.
    Marketing requires an audience, so you need to invest the time to find yours.


    This audience usually consists of not only influential bloggers and journalists,
    but also your own `Twitter` followers, `Facebook` friends, `LinkedIn` connections,
    blog readers, and e-mail newsletter subscribers. To a social media newbie, this
    may all seem a little overwhelming, but don’t worry. Later in this chapter, I’ll
    explain how to take advantage of these powerful tools and relationships in extensive
    detail.


    If you don’t yet have a `Twitter` account, a `Facebook` fan page, or a good rapport
    with high-profile bloggers and journalists, it’s never too soon to get the ball
    rolling. How early should you start? It usually takes a few months to acquire
    a decent number of followers on `Twitter` and `Facebook`, so you should dive into
    the social media sea at least three months before you plan on submitting your
    app to the `App Store`. Some developers start tweeting about their forthcoming
    `iPhone` and `iPad` apps while still in development. The goal here is to amass
    your own social information network for easily distributing news about your iOS
    applications. So the earlier you start, the better.


    Just be careful not to give away too much information during this prerelease campaign.
    You don’t want to prematurely expose your poker hand to your competitors (yes,
    they are watching). Also, if you inundate your online audience with a blitz of
    overhyped marketing messages long before your app is released, you risk losing
    a large portion of your followers before launch day. No one likes an overzealous,
    aggressive salesperson who clutters their `Twitter` streams and e-mail inboxes
    with too much marketing noise. It’s all about gently stoking the fire, building
    anticipation and interest. Simply whet their appetite, leaving them wanting for
    more—be a tease!


    ## Craft Your Elevator Pitch


    To effectively explain the features and benefits of your forthcoming app in a
    quick and concise manner, you should write several versions of your app description.
    Each variation should be limited to a specific length for different uses. Don’t
    mistake this exercise for writing a full-blown press release. You’ll have plenty
    of time to do that later for your app’s actual release. For now, think much shorter.'
  raw: '![9781430262381_Fig09-25.jpg](images/9781430262381_Fig09-25.jpg)


    [Figure 9-25](#9781430262381_Ch09.xhtml#_Fig25). Archived project in the Organizer-Archive
    window


    Select the archive of your project and click the Validate button. Validation will
    identify any problems with your app that should be fixed before distribution for
    testing. Once your app is successfully validated, a popup will appear indicating
    successful validation. Click the Done button.


    Now you need to save your archive for ad hoc deployment. Click the Export button
    and select Save for Ad Hoc Deployment (see [Figure 9-26](#9781430262381_Ch09.xhtml#Fig26)).


    ![9781430262381_Fig09-26.jpg](images/9781430262381_Fig09-26.jpg)


    [Figure 9-26](#9781430262381_Ch09.xhtml#_Fig26). Select the method for export
    of your packaged application file


    Then select Next. A dialog box will appear for you to choose a team. Choose a
    team and click the Choose button. Xcode will generate the provisioning profile
    and display a summary. Click the Export button to save the file to your hard drive.
    The file will have an `.ipa` extension.


    Step 5: Distribute Your App to the Beta Testers


    Now you’re ready to send the app to your beta testers! Locate the packaged application
    file that you saved in the last step on your hard drive. Send the packaged application
    file to testers along with any instructions for installation and testing.


    For beta testers to install your app, their devices should already be mounted
    in iTunes (connected via USB). They will need to double-click the packaged application
    file to open iTunes. If they perform a sync, your app and the related provisioning
    profile should appear on the beta testers’ devices, ready to run. Let the beta
    testing begin!


    Wireless Distribution to Beta Testers


    Forcing beta testers to deal with importing an app package into the desktop iTunes
    just to sync an ad hoc version onto their mobile devices has always been annoying
    for developers and often problematic for newbie beta testers. Fortunately, iOS
    4 introduced a little-known new method for distributing your ad hoc builds wirelessly.
    Yup, that’s right—no more syncing with iTunes just to install a beta version.


    In iOS 4 and higher, Apple supports over-the-air installation of iOS apps, which
    means you can download and install an ad hoc app build and its related provisioning
    file by tapping an HTTP link on a web page or in an e-mail. This feature was originally
    promoted as a benefit to Enterprise iOS Developer Program members, but it seems
    to work just as well for standard program members, too. In iOS 8, Apple introduced
    a beta distribution platform based on TestFlight that allows you to use iTunes
    Connect to distribute your app to testers.


    Fortunately, this new over-the-air feature bypasses the need for all the ad hoc
    distribution steps and collection of beta testers’ device IDs that we previously
    walked through. Refer to Apple’s *App Distribution Guide* for more detailed information
    on using this approach to distribution for your beta testing


    Sitting Pretty


    This was, by far, one of the most instruction-heavy chapters in the book. Since
    both provisioning and ad hoc distribution have proven to be such challenging topics
    for many new iOS developers, I hope the thorough explanations helped clarify the
    process for anyone struggling with these two tasks.


    It won’t matter how brilliant your app idea is if it’s poorly executed. I can’t
    emphasize enough the importance of your app’s overall user experience as one of
    the primary factors in its potential success. On-device testing and group-managed
    beta testing should be mandatory steps in every application’s development cycle.


    Chapter    10


    Get the Party Started! Creating a Prerelease Buzz


    Development completed? Check. Testing completed? Check. Ready for the App Store?
    Almost.


    After months of hard work to finish your application, I know you’re eager to release
    it to the world, but don’t jump the gun just yet. You still need to accomplish
    a few very important tasks.


    Before submitting your iOS app to the App Store, you want to start generating
    some prerelease buzz through a carefully crafted online presence. This chapter
    will explore the best ways to stir up some excitement and anticipation for your
    app by promoting it on your web site, blogs, and social networking sites, such
    as Twitter and Facebook.


    The Final Countdown: Preparing for Liftoff


    I know what you’re thinking: “Why can’t I simply take care of building my app’s
    web site and prerelease buzz while the app is being reviewed by Apple? Since the
    App Store can take weeks to approve or reject an application, that should give
    me enough time, right?” Don’t count on it. Even if your app review takes longer
    than the average 7-day to 14-day turnaround, that’s still not enough time to cultivate
    a large online following and effective web presence.


    Just your luck, when you actually rely on Apple’s app review team to take a long
    time, that will undoubtedly be the one occasion your app sails through to approval
    within only a few days. That would leave you unprepared, without your app’s web
    site and social marketing plan in place.


    Invest the Time to Find Your Audience


    Even though developing an attractive web site always takes longer than you think
    it will, if you were really pressed for time, you could probably construct a decent
    site in only a matter of days (with a little web-design expertise). But what does
    require a much longer gestation period is the job of growing your online audience.
    Marketing requires an audience, so you need to invest the time to find yours.


    This audience usually consists of not only influential bloggers and journalists,
    but also your own Twitter followers, Facebook friends, LinkedIn connections, blog
    readers, and e-mail newsletter subscribers. To a social media newbie, this may
    all seem a little overwhelming, but don’t worry. Later in this chapter, I’ll explain
    how to take advantage of these powerful tools and relationships in extensive detail.


    If you don’t yet have a Twitter account, a Facebook fan page, or a good rapport
    with high-profile bloggers and journalists, it’s never too soon to get the ball
    rolling. How early should you start? It usually takes a few months to acquire
    a decent number of followers on Twitter and Facebook, so you should dive into
    the social media sea at least three months before you plan on submitting your
    app to the App Store. Some developers start tweeting about their forthcoming iPhone
    and iPad apps while still in development. The goal here is to amass your own social
    information network for easily distributing news about your iOS applications.
    So the earlier you start, the better.


    Just be careful not to give away too much information during this prerelease campaign.
    You don’t want to prematurely expose your poker hand to your competitors (yes,
    they are watching). Also, if you inundate your online audience with a blitz of
    overhyped marketing messages long before your app is released, you risk losing
    a large portion of your followers before launch day. No one likes an overzealous,
    aggressive salesperson who clutters their Twitter streams and e-mail inboxes with
    too much marketing noise. It’s all about gently stoking the fire, building anticipation
    and interest. Simply whet their appetite, leaving them wanting for more—be a tease!


    Craft Your Elevator Pitch


    To effectively explain the features and benefits of your forthcoming app in a
    quick and concise manner, you should write several versions of your app description.
    Each variation should be limited to a specific length for different uses. Don’t
    mistake this exercise for writing a full-blown press release. You’ll have plenty
    of time to do that later for your app’s actual release. For now, think much shorter.'
