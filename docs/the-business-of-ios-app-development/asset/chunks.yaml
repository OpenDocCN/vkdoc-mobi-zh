  trans: '

    这肯定不会为你赢得任何关注你博客或在推特上关注你的消费者的好感。


    如果你认为自己有正当理由认为应用被拒不公，那就和苹果公司沟通。尝试与应用审核你应用的人建立对话。如果行不通，你可以向官方的应用审核委员会提交申诉，网址是 `http://developer.apple.com/appstore/resources/approval/contact.html`。陈述你的理由时，务必深思熟虑、条理清晰，以帮助审核人员理解你的想法。不少被拒的应用，正是因为有说服力的开发者论证和快速重新评估而得以推翻判决。


    没人说过应用审核流程是完美的。只需记住，App Store 仍是一个相对较新的市场——其规模增长速度远超苹果（或任何其他人）的预期。被拒很容易让人心烦，但面对超过
    100 万款应用涌入 App Store，且每周有超过 45,000 个应用提交，苹果不堪重负的审核团队只是在巨大的压力下尽力做好本职工作而已。


    错误确实会发生，但苹果在持续改进流程。虽然这种说法可能让我听起来像个夸夸其谈的粉丝，但请不要误解我的意图。作为开发者自己，当我的创造力和雄心受到商业世界的限制时，我当然会感到沮丧，但随后我会记得，这终究是一门生意。如果我想参与其中，以得体和专业的方式解决问题，才是长期真正成功的唯一途径。


    苹果掌握着“王国”的钥匙，所以如果你希望有朝一日在 App Store 中蓬勃发展，那么与苹果公司及其审核团队保持良好的工作关系，才最符合你的利益。


    ## 通过审核！进入应许之地


    所以，那个奇迹般的日子终于到来了。你的应用已通过审核，现在已在 App Store 上架！恭喜你！这确实是一项值得的成就，能为你带来巨大成功，尤其是当你已采取所有必要步骤来有效推广你的应用时。


    在 App Store 中查看应用的性能非常简单，只需登录 iTunes Connect，按周或按日查看报告中的销量和下载量即可。注意：追踪销量可能会非常上瘾，并摧毁你每日的生产力。iTunes
    Connect 还会发布月度财务报告，汇总你的应用销售额和收入。


    ## 分析你的 App Store 销售统计数据


    iTunes Connect 中的销售和趋势报告包含大量数据，可用于分析你的产品生命周期和在市场中的销售表现。但如果你需要更多帮助和像下面这样的附加功能呢？


    *   通过桌面应用或移动设备追踪你的 App Store 统计数据

    *   自定义统计图表以更好地指导你的营销工作

    *   自动化检索和分析销量与下载数据的任务（当你忘记自己做时）


    第三方工具和基于网络的服务可以提供这些功能。肯定有一种解决方案能与你的工作流程完美契合。虽然这可能不是一份详尽的清单，但以下是一些可供探索的选项：


    *   苹果的 iTunes Connect Mobile (`http://itunes.com/apps/iTunesConnectMobile`) 是一款通用
    iPhone 和 iPad 应用，可从 App Store 免费下载，能让你直接访问你的 iTunes Connect 销售和趋势数据。无论你是否使用其他服务（如
    appFigures 或 App Annie），这款免费的苹果移动应用都是一种便捷的方式，让你随时随地追踪应用销量。

    *   appFigures (`http://www.appfigures.com`) 是一款流行的基于网络的解决方案，支持自动导入你的 iTunes Connect
    销售报告，并以动态图形和图表形式呈现数据。除了追踪销量、趋势、App Store 排名和评论外，appFigures 还会每天自动通过电子邮件向你发送报告摘要。你可以选择免费的
    Basic 账户，或升级以访问所有 Premium 功能。虽然 appFigures 的网络报告兼容 iOS（在 Mobile Safari 中查看时），但也有一个第三方原生
    iPhone 应用用于访问你的 appFigures 账户：由 David Knell 开发的 appTrends，可在 App Store 获取。

    *   App Annie (`http://www.appannie.com`)，被称为“你的应用保姆”，是一个全面的应用销售追踪和趋势分析网络服务。它提供许多与
    appFigures 相同的功能，以及所有应用的历史 App Store 排名数据。其吸引人的在线仪表盘界面，可以通过桌面浏览器或 iPad 的 Mobile
    Safari 访问和查看。

    *   AppSales Mobile (`https://github.com/omz/AppSales-Mobile`) 是一款 iPhone 应用，可下载并分析你的
    iTunes Connect 销售报告。由于它以 GitHub 上的开源形式提供，你需要先在 Xcode 中编译项目，然后以调试构建方式运行才能使用。但这为你提供了灵活性，可以自定义、编译并将软件安装到你自己的移动
    iOS 设备上，以满足自身需求。

    *   AppStar (`http://www.damabia.com/appstar.php`)，由 Damabia 开发的 Mac OS X 应用，是一款全面的桌面解决方案，用于追踪你的
    iTunes Connect 销量和趋势报告、苹果的月度财务销售报告、App Store 排行榜排名和应用评论。它还为你提供了一个内置界面，可将所有应用图标、截图和营销资料整理到一个地方。AppStar
    提供为期十天的全功能演示版供下载。

    *   AppStore Clerk (`http://blog.fieryferret.com/2008/10/appstore-clerk.html`)
    是一款免费的 Mac OS X 应用，可解析你的销售报告，并以简单易读的电子表格形式显示你的应用下载量。它可能不包含此处列出的其他解决方案的先进图表功能，但它作为免费软件慷慨提供（而且开发者甚至也提供了源代码）。

    *   AppViz (`http://www.ideaswarm.com/products/appviz/`)，由 Ideaswarm 开发，是一款设计精美的
    Mac OS X 应用，可以下载你的 iTunes Connect 销售数据，也可以导入你已经下载到硬盘的报告。与列表中的大多数其他工具一样，它可以通过可视化图表分析和追踪你的销量和下载量，以揭示趋势。它还监控多个应用和账户、App
    Store 类别排名、客户评论，以及应用内购买产品的销量追踪。这款功能丰富、广受欢迎的桌面应用提供试用版下载。

    *   Distimo Monitor (`https://monitor.distimo.com`)，与 appFigures 和 App Annie 类似，是一款全面的基于网络的应用销售追踪工具。此解决方案与此处列出的许多其他产品的不同之处在于，Distimo
    Monitor 支持所有主要的应用商店，例如苹果的 App Store、谷歌的 Android Market、黑莓的 App World 等——非常适合跨平台移动开发者。

    *   Heartbeat (`http://www.heartbeatapp.com`)，是 Mobclix 的一项服务，是一个非常流畅的远程托管网络应用，提供一整套销售追踪、趋势、崩溃报告监控、使用统计数据、App
    Store 排名、收入支付管理等功能。如果你正在寻找一个用于管理整个 App Store 业务的综合工具，那就注册一个 Mobclix 账户，以利用免费的
    Heartbeat。

    *   MyAppSales (`https://github.com/Cocoanetics/MyAppSales`) 是一款便捷的 iPhone 应用，类似于
    AppSales Mobile，但由于创建者 Oliver Drobnik 的积极开发，它提供了更多的功能。尽管 MyAppSales 现在以开源形式提供，允许你将这款功能丰富的应用编译并运行在自己的
    iOS 设备上，但 Oliver 仍然欢迎并感激捐赠。

    *   Prismo (`http://positiveteam.`)'
- fmt: '`com/products/prismo/mac/`, Positive Team’s Mac OS X application, boasts a
    clean and simplified iTunes-style interface design. It supports the automatic
    download of reports from iTunes Connect, as well as tracking the ranking and sales
    of your iPhone apps and In-App Purchase products. A 30-day trial of Prismo is
    available for download.


    Beyond the solutions already mentioned here, don’t forget to also check out the
    many App Store ranking tools that were profiled in [Chapter 2](#9781430262381_Ch02.xhtml),
    such as APPlyzer and David Frampton’s excellent (and free) MajicRank.


    # Rev Your Engines


    You’re in the App Store—now what? No, it’s not time to take a break. I know you’re
    tired from months of development, but you need to capitalize on the short-lived
    momentum surrounding your app’s launch! [Chapter 12](#9781430262381_Ch12.xhtml)
    cranks up the publicity engine to increase consumer awareness of your app’s availability.


    ## Chapter 12: Increasing Awareness for Your iOS App


    Your app has been approved and is available for sale in the App Store, so now
    what? First, I would like to congratulate you on this milestone achievement! If
    you’ve worked your way through the entire book and finally have an application
    listed in the App Store, that in itself is quite an accomplishment. Only fellow
    developers truly know how much hard work and dedication goes into launching a
    new software product. After months of meticulously planning and programming your
    app, you deserve to celebrate. Although you would probably love nothing more than
    to take a much needed vacation at this point, unfortunately, you can’t rest yet.


    It’s time to rev up the publicity engine to increase consumer awareness of your
    app’s availability. Even if you implemented the various business strategies from
    previous chapters, and your prerelease marketing efforts resulted in an initial
    sales surge, there’s still vital work to be done. It’s your job to ensure that
    your iOS application does not get buried amid the thousands of new apps flooding
    into the App Store. This chapter reveals how to craft effective press releases,
    utilize promo codes, gain exposure through reviews and interviews, and sustain
    momentum in the App Store with promotions, giveaways, and carefully timed sale
    events.


    ### Dedicating As Much Effort to Marketing Your App As You Put into Developing
    It


    If your app was already available in the App Store when you bought this book and
    you decided to skip ahead to this chapter, I highly recommend reading [Chapter
    10](#9781430262381_Ch10.xhtml) first. In fact, I insist. This chapter will prove
    much more useful to you after you’ve read [Chapter 10](#9781430262381_Ch10.xhtml).


    Even though [Chapter 10](#9781430262381_Ch10.xhtml) is aimed at prerelease marketing,
    its primary goal is to help you build a solid foundation online. It covers establishing
    a web site presence, a social media following via Twitter and Facebook, and relationships
    with prominent bloggers and influential iOS app review sites. All of those elements
    will serve as the underlying backbone of your postrelease marketing efforts as
    well, so having them in place long before your app goes live in the App Store
    is crucial to your success.


    ### Launching with a Supernova of Publicity


    You want to capitalize on the initial visibility of your app’s release in the
    App Store, so the trick is to get as many consumers and news outlets as possible
    talking about your app at the same time. Think of it as a supernova of publicity
    in the hopes of creating a snowball effect. You want consumers thinking, “Everyone
    is talking about that app, so it must be good!” With that in mind, when reading
    this chapter, don’t tackle a single task each week. Read through all the topics,
    and then try to implement as many of them as possible at the same time, in the
    hopes of sustaining that buzz well beyond the initial release.


    ### How much time should you dedicate to marketing your app?


    Initially, only one or two hours a day is not enough. Yes, I know you’re eager
    to start developing that next great app idea, but before you dive into any future
    projects, your new 1.0 app release needs attention. You should be prepared to
    set aside the first two weeks to focus on nothing but promoting your new app.
    Request reviews, publicize your app on Twitter and Facebook, set up media interviews,
    post blog articles, submit your app for awards, and the list goes on. Once your
    marketing efforts start to pay off with an increase in sales and/or a rise in
    the App Store charts, you can gradually ease back into your normal work life,
    with only a couple hours a day spent on app marketing.


    Unfortunately, there are no shortcuts in software marketing. For your iOS app
    to have a chance at becoming successful, you must be willing to invest just as
    much time and effort into promoting your app as you put into developing it.


    ### Enlisting Help from the Pros


    If you’re not able to dedicate the necessary hours to postrelease marketing, then
    it’s in your best interest to hire a third-party company to handle this job. Perform
    a search online for “iPhone app marketing” or “iPhone marketing agency”. You’ll
    find hundreds of marketing and PR firms around the world that specialize in mobile
    product launches. Here are several agencies to give you an idea of some of the
    services available:


    *   Appency (`http://www.appency.com`)

    *   Appular (`http://appular.com`)

    *   App2Market (`http://www.app2market.com`)

    *   Apalon App Marketing (`http://www.apalon.com/iphone_marketing.html`)

    *   Digital Automat (`http://www.digitalautomat.com`)

    *   Mobility Public Relations (`http://www.mobilitypr.com`)

    *   PR Mac (`http://www.prmac.com`)

    *   TriplePoint PR (`http://www.triplepointpr.com`)


    Of course, there are many more marketing agencies out there beyond the ones listed
    here. Depending on where you live, you may feel more comfortable hiring a local
    firm, so do several online searches to find one that meets your specific needs.


    As I’ve said before, whenever you’re hiring third-party consultants or companies,
    you should do ample research before selecting one. Not only should they be experts
    on the specific challenges of the App Store and marketing iOS apps, but their
    practices, policies, and performance should also be very transparent. Since they
    are representing your company and products, their actions are a reflection of
    you and your application.


    For example, if an unscrupulous PR firm uses its own internal iTunes accounts
    to plant the same fake five-star reviews for all of its clients’ apps in the App
    Store, it’s only a matter of time before someone makes the connection and blows
    the whistle. Even if you were unaware that this was happening, ultimately, it’s
    your reputation that gets tarnished.


    Apple has even been known to remove from the App Store apps that have abused the
    customer review system. Obviously, most PR agencies take their ethical responsibility
    very seriously and never cross that line. I only mention this so that you do your
    homework and ask the right questions before choosing a mobile marketing firm to
    promote your iPhone or iPad app.


    Depending on the level of services provided, an experienced third-party marketing
    agency will cost at least $1,000 (and possibly thousands more). If you’re an independent
    developer who can’t afford to outsource the marketing and publicity for your app,
    then you’ll need to carve out the necessary time in your schedule to handle the
    job yourself. So, roll up your sleeves, and let’s dive in!


    **Tip** Know when people are talking about your app! Based on the latest relevant
    search results, Google Alerts is a fantastic free e-mail notification service
    that enables you to monitor when a specific name or topic is discussed online
    on web sites, blogs, and even Twitter. I highly recommend setting up Google Alerts
    to track your app name and company name.'
