    # 平面杂志广告与 App 生命周期


    平面杂志通常需要三个月的提前量，因此当你的印刷广告刊出时，你的 App 可能已经进入了其生命周期的长尾阶段——而这正是广告重新激发消费者兴趣和 App 下载量的绝佳时机。只要瞄准正确的受众，广告就能发挥作用。不过在贸然投入之前，需谨慎评估它是否适合你的
    iOS App。请记住，没有任何单一的营销策略能让你的 App 成为畅销品。如果你将本书学到的众多策略整合成一个精心策划的营销计划，你很快就能在 App Store
    中走上成功之路。


    ## 善用面向开发者的 `iAd`


    苹果面向开发者的 `iAd` 计划与其他应用内广告方案的不同之处在于，它能将 App Store 无缝融入展示你 `iAd` 的主机应用中。当用户点击面向开发者的
    `iAd` 横幅时，他们会看到一个类似于 App Store 产品页面的屏幕，其中显示了你 App 的信息，包括描述、用户评分、截图，甚至购买按钮。


    苹果已将此系统与 iOS 和 App Store 深度集成，用户无需离开当前主机应用，即可在该屏幕上购买你的 App。他们可以继续使用当前应用，而新购买的
    App 会在后台下载到设备中。这对顾客毫无不便之处，而你则增加了一笔新销售！


    由于苹果控制了从广告展示到购买再到下载的整个流程，你的面向开发者的 `iAd` 活动报告能提供从点击到实际购买的转化率的精确数据。由于你是按点击付费，这相当于你的每次获取成本——即基于你付费的点击次数计算，该活动获取新客户的实际成本。


    尽管苹果设计面向开发者的 `iAd` 计划，是希望为独立应用创作者提供高性价比的解决方案，但 `iAd` 网络仍应被视为一个优质广告平台，因此其单次点击费用高于许多其他移动广告网络。由于
    `iAd` 是消费者信赖的苹果品牌，如果你拥有合适的产品与价格组合，那么这份溢价可能物超所值。


    由于大量的 `iAd` 点击未能转化为足够多的实际购买，一些开发者发现每次获取成本远高于 App 本身的价格。如果你销售的是 99 美分的 App，这笔广告费用很难合理化。除非你有应用内购买项目可以向上销售给这些新客户，否则你很可能在亏损而非盈利。


    但价格较高的付费 App 和免费增值 App 可能更适合面向开发者的 `iAd`。对许多开发者而言，它产生的每次获取成本优于其他移动广告网络。苹果宣布，参与面向开发者的
    `iAd` 计划的客户中，有 75% 续订了他们的广告活动。


    与任何其他广告投资一样，如果你认为你的 App 能从面向开发者的 `iAd` 计划中受益，请用你能负担的试算预算先测试一下。通过密切监控广告活动的表现，你很快就能判断它是否为你的
    App 带来了有利可图的销售工具。要了解有关面向开发者的 `iAd` 计划的更多信息，请查看 `http://advertising.apple.com/developers/`。


    ## 按安装付费激励实现交叉销售


    另一个有趣的广告概念是按安装付费激励。这种方法并非简单地在其他应用内按安装量付费（寄望于可观的转化率），而是提供激励措施来促使更多用户安装被广告的 App。这通常只在游戏中效果良好，用户通过下载特定
    App 来换取某种游戏内虚拟货币奖励。


    例如，NimbleBit 的《Pocket Frogs》向从 App Store 下载指定 App 的用户赠送一只免费虚拟青蛙（参见图 12-5）。


    ![9781430262381_Fig12-05.jpg](img/9781430262381_Fig12-05.jpg)


    图 12-5。作为下载指定 App 的激励，NimbleBit 的《Pocket Frogs》用一只免费的稀有游戏内青蛙奖励这些用户


    这种系统通常需要一种检测方法来验证参与的 App 已被下载并至少运行一次。主机应用需要得到任务成功完成的通知，然后用户应获得承诺的游戏内激励。


    一些开发者之间建立了战略联盟，通过游戏内奖励作为下载激励来互相推广对方的 App。这对所有参与方都很有效，尽管结果规模通常较小。


    要真正利用这个概念并覆盖更多游戏中的更广泛受众，你可能会想使用第三方服务——例如 Tapjoy (`https://www.tapjoy.com`) 或 Flurry
    的 AppCircle Rewards (`http://www.flurry.com/product/appcircle/rewards/`)——这些服务专门从事按安装付费激励。通过将你的
    App 推广与同类型 App 配对以触达高度定向的受众，这些计划已知能每天驱动数十万次新安装，从而将你的 App 推入 App Store 排行榜前列。尽管这类活动通常比传统横幅广告更昂贵，但它们能真正提升
    App 销量。这在免费增值游戏中尤其有效，因为用户下载没有成本障碍，一旦对游戏玩法上瘾，应用内购买就能分摊按安装付费活动的费用。


    ## 与客户保持联系


    维持消费者对你 App 的兴趣不仅在于吸引新客户，还在于让现有客户保持满意。还记得我在第 8 章中谈到忠实客户是最好的客户吗？建立客户忠诚度的方法是通过高质量的支持，并及时交付错误修复以及附加功能/内容。


    ### 频繁发布 App 更新


    不要等几个月才发布 App 的新版本。即使没有报告任何错误或崩溃，你也应该定期更新 App，以提供额外的优化和价值。缺乏更新可能会对客户在 App Store
    中对你 App 的看法产生负面影响。如果消费者注意到你的 App 好几个月没有更新，他们可能会因担心该 App 不再得到积极支持而不愿购买。


    通过持续更新 App，你不仅提升了用户体验，还让你的 App 保持在用户脑海中。即使由于新 App 购买的干扰，你 App 的整体客户使用率最终下降，但每当新版本出现在客户的更新列表中时，它都会巧妙地提醒用户你
    App 的价值以及你对支持它的承诺。


    如果客户对你的 App 感到满意，他们就会更有动力向你购买应用内购买项目和其他新产品。稳定的更新流也有助于维持客户使用率，如果你的主要收入来源是应用内广告，这一点就极其重要。只要你持续提供有回报且有趣的体验，人们就会继续谈论你的
    App。持续的更新和高质量的客户支持是推动口碑传播的重要因素。


    ### 提供高质量支持


    在之前的章节中，我讨论过为需要帮助或有疑问的客户建立支持网站和电子邮件地址的重要性。你如何使用这一沟通渠道，最终将决定其作为商业工具的有效性。客户关系管理是最自然形式的直销和销售。

