- fmt: '如果你的应用面向企业用户，那么你绝对应该通过 `LinkedIn` 进行推广。除了在你的 `LinkedIn` 个人资料中包含应用网站的链接外，这个流行的商业社交网络还托管着数千个活跃的讨论组。挑选与你应用目标受众最匹配的群组，并通过发布应用相关的信息和博客文章的链接来推广它。这是一种接触企业高管的绝佳方式，他们可能不会在拥挤的
    `App Store` 中自己找到你的 `iOS` 应用。


    `LinkedIn` 也让你可以轻松地将你的 `Twitter` 帖子发布到 `LinkedIn` 页面。在你的 `LinkedIn` 个人资料中激活你的
    `Twitter` 账户，然后在你的推文中附加 `#in` 或 `#li` 标签，这样这些精选消息也会作为 `LinkedIn` 状态更新发布。


    为了获得更多曝光，别忘了将你的博客文章和已发布的网络文章提交到专注于分享新闻和社交书签的网站，例如 `Digg`、`Delicious`、`Technorati`、`Reddit`
    和 `StumbleUpon`。


    ### 在论坛、群组和博客上发表评论


    做一些研究，找到与你 `iOS` 应用目标受众相关的在线论坛、留言板和博客。如果是一个音乐应用，去探索最流行的音乐论坛和群组。如果是一个写作应用，去调查哪些网站是作者们最常去的地方。既然你为一个特定的细分市场开发了一个应用，可以合理地假设你对该话题有所了解。通过在相关的特殊兴趣论坛上提供帮助或是在博客上发表评论，将你的知识好好利用起来。


    是的，我这是在为你增加额外的工作，但这是有充分理由的。永远不要在这些网站上匿名发帖。大多数论坛、群组甚至博客都支持会员登录，以使频繁发帖更加方便和安全。在有要求时，注册成为免费会员并填写所有个人资料信息。你希望在这些网站上的存在能够通过姓名、`URL`
    链接和照片被清晰地识别出来。


    一些博客使用像 `Gravatar` 这样的第三方头像系统。提前注册并准备好一个 `Gravatar` 个人资料是值得的。如果支持签名，那么利用那一小段懂
    `HTML` 的空间来推广你的应用和网站。


    明白我的意思了吗？每次你在论坛帖子或博客文章下发表评论时，你的照片、姓名、网站链接以及一个含蓄的应用引用都会同时呈现。只要你不过度使用，用明显的销售宣传来垃圾轰炸，这对所有人来说都是一个双赢的局面。在帮助他人的同时，通过在你的会员
    `URL` 和签名中提及它，你也在提高即将推出的 `iOS` 应用的知名度。


    ### 但不要噪音太多：维护专业声誉


    由于在像 `Twitter` 和 `Facebook` 这样的社交媒体网站上，非正式对话的数量巨大，人们往往很容易忘记，你所说的话不仅仅存在于你和参与者之间——它们实际上可以被你网络中的任何人看到。就
    `Twitter` 而言，任何人都可以访问你的个人资料页面并阅读你的推文，无论他们是否关注你。你的在线行为是在一个非常公开的全球舞台上进行的。


    虽然鼓励表现得平易近人，但你仍然代表你的产品和/或公司。你的在线行为应该是值得尊敬的，要知道你所说和所链接的内容会给全球的潜在客户留下持久的印象。如果你觉得这个建议显而易见，不值得一提，那么你已经领先了一步。你可能有足够商业头脑认识到这一点，但你会惊讶地发现，有多少专业开发者对自己所塑造的整体形象浑然不觉。


    多年来，我见过一些开发者网站，他们将软件产品与他们对职业摔跤明星以及《太空堡垒卡拉狄加》中性感赛昂美女的在线“圣地”一起推广！是的，你自己心里清楚。如果你还在上大学，在车库里经营你的软件业务，这没问题，但世界不需要知道这个。事实上，你希望你的网站和社交媒体账户能够呈现出一种专业的形象，让消费者对你产生信心。他们想通过购买你的应用，知道他们是在投资一个会持续更新和支持产品的开发者。如果他们怀疑这对你来说仅仅是个爱好，你就可能会错失这些潜在的销售机会。如果对你没有信心，他们怎么能对你的产品有信心呢？


    以下是一些需要考虑的指导方针：


    -   **将自己塑造成专业人士。** 始终展现你希望在他人眼中呈现的专业形象。无论你是18岁还是68岁，是高中刚毕业还是最近退休，这都不重要。互联网拉平了竞技场。你网站的视觉设计、它所提供的内容类型，以及你通过电子邮件、推文和博客文章向他人展示自己的方式，都为你本人以及你的业务方式描绘了一幅生动的画面。这不是为了营造虚假的假象，而是要在专业的光照下展示真实的自己。

    -   **NSFW？不适合发布！** 如果你正在使用博客和社交媒体账户来推广你的 `iOS` 应用和业务，请不要说脏话，也不要发布他人可能觉得冒犯的笑话、搞笑图片或视频。仅仅因为你加上
    `NSFW`（不适合上班时间观看）的警告并不能让它变得可接受。你觉得有趣的东西，别人可能会觉得极其冒犯。而那些人正是你刚刚失去的潜在销售额。我不想扫兴。我们都想找点乐子，但目标是卖出更多的应用，对吧？

    -   **不要将商业与政治或宗教混为一谈。** 最能引起人们强烈反应的两个话题是政治和宗教。无论你的观点如何，总是有同样激情的人在反对的那一边。这是一场你无法赢得的对话。如果你正在使用像
    `Twitter` 和 `Facebook` 这样的社交网络来推广你即将推出的 `iOS` 应用，利用你的受众，宣扬你自己的政治或宗教议程，是疏远潜在客户最快的方式。

    -   **控制你的情绪。** 永远不要在愤怒时发推文、评论或发布博客文章。虽然你通常可以在事后删除大部分内容，但它们的副本会留在网络上，在未来多年困扰你。你可能已经删除了那篇糟糕的博文，但你博客的所有电子邮件订阅者仍然可以在他们的收件箱里找到它。别忘了
    `Google` 缓存的“大象记忆”。你的在线咆哮可能会无限期地存在于 `Google` 的搜索数据库中。

    -   **以牙还牙解决不了问题。** 如果有人对你的应用或博文发表了负面评论，不要恶语相向。对他人恶语相向——尤其是在网上，一切都被记录、缓存和存档——可能会让你惹上诽谤官司。你可能会笑，但这确实发生过。通过采取高姿态，保护你的声誉和个人资产。

    -   **客户至上。** 客户可能并不总是对的，但他们应该始终得到你最大的尊重和关注。及时并以礼貌的方式回复你收到的每一封电子邮件和每一条推文。没有愚蠢的问题，只有愚蠢的回答。好吧，也许确实有愚蠢的问题，有些客户可能会让你恼火。但如果你在
    `Twitter` 上以任何方式用讽刺的公开回复让对方难堪，你可能失去的不仅仅是一个客户——那个人现在可能会警告朋友和家人避开你的产品。要愿意不遗余力地让你的客户满意。如果他们感到被重视，他们会用忠诚来回报你。


    ### 人人都爱赢家：收集发布前的评价和推荐'
  raw: 'If your app appeals to businesses, you’ll definitely want to get connected
    on LinkedIn. Besides including a link to your app’s web site on your LinkedIn
    profile, the popular business network hosts thousands of active discussion groups.
    Pick the groups that best match your app’s target audience, and promote it by
    posting app-related information and links to your blog articles. This is a great
    way to reach business executives who may not have found your iOS app on their
    own in the crowded App Store.


    LinkedIn also makes it easy to publish your Twitter posts on your LinkedIn page.
    Activate your Twitter account on your LinkedIn profile, and then append either
    the `#in` or `#li` hashtag to your tweets for those select messages to also be
    published as LinkedIn status updates.


    For additional exposure, don’t forget to submit your blog posts and published
    web articles to sites that specialize in sharing news and social bookmarking,
    like Digg, Delicious, Technorati, Reddit, and StumbleUpon.


    Commenting on Forums, Groups, and Blogs


    Do a little research to find online forums, message boards, and blogs related
    to your iOS app’s target audience. If it’s a music app, explore the most popular
    music forums and groups. If it’s a writing app, investigate which sites are the
    most popular hangouts for authors. Since you developed an app for a particular
    niche market, it’s a safe assumption you know a little something about the topic.
    Put your knowledge to good use by offering help on related special-interest forums
    or posting comments on blogs.


    Yes, I’m creating extra work for you, but with good reason. Don’t ever post anonymously
    on those sites. Most forums, groups, and even blogs support member logins to make
    frequent posting more convenient and secure. When requested, sign up as a free
    member and enter all the profile information. You want your presence on those
    sites visibly identifiable with a name, URL link, and photo.


    Some blogs use third-party avatar systems like Gravatar. It’s worth having a Gravatar
    profile already registered and ready to use. If signatures are supported, then
    use that small bit of HTML-savvy space to promote your app and web site.


    See where I’m going with this? Every time you post a comment to a forum thread
    or blog article, your photo, your name, your web site link, and a subtle app reference
    are always represented. As long as you don’t abuse your presence by spamming blatant
    sales pitches for your app, it’s a win-win situation for everyone. In helping
    others, you’re also increasing awareness of your forthcoming iOS app, simply by
    referencing it in your member URL and signature.


    But Not Too Much Noise: Maintaining a Professional Reputation


    Because of the high volume of informal conversations that occurs on social media
    sites like Twitter and Facebook, it’s often easy to forget that the things you
    say are not just between you and the participants—they can be read by literally
    everyone within your network. And in the case of Twitter, anyone can visit your
    profile page and read your tweets, whether they follow you or not. Your online
    actions play out on a very public, global stage.


    While being personable is encouraged, you’re still representing your product and/or
    company. Your online behavior should be respectful, knowing that the things you
    say and link to make lasting impressions with potential customers worldwide. If
    you feel this advice is painfully obvious and shouldn’t warrant a mention, then
    you’re one step ahead of the game. You may have enough business savvy to recognize
    this, but you might be surprised by just how many professional developers are
    oblivious to the overall image they project.


    Over the years, I’ve seen developer web sites that promote their software products
    alongside their online shrines to pro wrestling stars and the sexy Cylon babes
    from *Battlestar Galactica*! Yeah, you know who you are. It’s fine if you’re still
    in college and operate your software business out of the garage, but the world
    does not need to know this. In fact, you want your web site and your social media
    accounts to project a professional image that instills confidence in consumers.
    They want to know that by purchasing your app, they’re investing in a developer
    who will continue to update and support the product. If they suspect it’s nothing
    more than a hobby for you, you run the risk of missing out on those potential
    sales. Without faith in you, how can they have faith in your product?


    Here are a few guidelines to consider:


    *   **Portray yourself as a professional.** Always portray a professional image
    of how you want to be seen. It doesn’t matter if you’re 18 or 68, fresh out of
    high school or recently retired. The Internet equalizes the playing field. The
    visual design of your web site, the kind of content it offers, and the way you
    present yourself to others via e-mail, tweets, and blog posts paints a vivid picture
    of you and how you do business. It’s not about projecting a false illusion, but
    rather showcasing your true self in a professional light.

    *   **NSFW? Not appropriate to post!** If you’re using your blog and social media
    accounts to promote your iOS app and business, don’t curse or post jokes, funny
    photos, or videos that others might find offensive. Just because you tack on the
    warning NSFW (not suitable for work) doesn’t make it acceptable. What you find
    funny, others may find wildly offensive. And those are potential sales you just
    lost. I hate to be a killjoy. We all want to have fun, but the goal is to sell
    more apps, right?

    *   **Don’t mix business with politics or religion.** The two topics that elicit
    the strongest reactions from people are politics and religion. Whatever your viewpoint,
    there is always someone just as passionate on the opposing side. It’s a conversation
    you can’t win. If you’re using social networks like Twitter and Facebook to promote
    your forthcoming iOS app, taking advantage of your audience by preaching your
    own political or religious agenda is the quickest way to alienate potential customers.

    *   **Keep your emotions in check.** Don’t ever tweet, comment, or post blog entries
    in anger. Even though you can usually delete most items after the fact, copies
    of them linger on the Web to haunt you for years to come. You may have deleted
    that nasty blog post, but all of your blog’s e-mail subscribers still have it
    sitting in their inboxes. And don’t forget the elephant memory of Google’s cache.
    Your online rants can live on indefinitely in Google’s search databases.

    *   **Two wrongs don’t make a right.** If someone says something negative about
    your app or your blog posts, don’t lash back with venom. Talking trash about someone—especially
    online where everything is logged, cached, and archived—can win you a defamation
    lawsuit. You laugh, but it has happened. Protect your reputation and your personal
    assets by taking the high road.

    *   **Customers come first.** Customers may not always be right, but they should
    always be given your utmost respect and attention. Reply to every e-mail and tweet
    you receive in a prompt and courteous manner. There’s no such thing as a stupid
    question, only stupid answers. OK, so maybe there are stupid questions, and some
    customers may get on your nerves. But if you embarrass a person in any way with
    sarcastic public replies on Twitter, you may have lost more than one customer—that’s
    someone who may now warn friends and family to avoid your products. Be willing
    to go out of your way to make your customers happy. If they feel valued, they
    will reward you with their loyalty.


    Everyone Loves a Winner: Collecting Prerelease Press and Testimonials'
  trans: '

    如果你的应用面向企业用户，那么你绝对应该通过 `LinkedIn` 进行推广。除了在你的 `LinkedIn` 个人资料中包含应用网站的链接外，这个流行的商业社交网络还托管着数千个活跃的讨论组。挑选与你应用目标受众最匹配的群组，并通过发布应用相关的信息和博客文章的链接来推广它。这是一种接触企业高管的绝佳方式，他们可能不会在拥挤的
    `App Store` 中自己找到你的 `iOS` 应用。


    `LinkedIn` 也让你可以轻松地将你的 `Twitter` 帖子发布到 `LinkedIn` 页面。在你的 `LinkedIn` 个人资料中激活你的
    `Twitter` 账户，然后在你的推文中附加 `#in` 或 `#li` 标签，这样这些精选消息也会作为 `LinkedIn` 状态更新发布。


    为了获得更多曝光，别忘了将你的博客文章和已发布的网络文章提交到专注于分享新闻和社交书签的网站，例如 `Digg`、`Delicious`、`Technorati`、`Reddit`
    和 `StumbleUpon`。


    ### 在论坛、群组和博客上发表评论


    做一些研究，找到与你 `iOS` 应用目标受众相关的在线论坛、留言板和博客。如果是一个音乐应用，去探索最流行的音乐论坛和群组。如果是一个写作应用，去调查哪些网站是作者们最常去的地方。既然你为一个特定的细分市场开发了一个应用，可以合理地假设你对该话题有所了解。通过在相关的特殊兴趣论坛上提供帮助或是在博客上发表评论，将你的知识好好利用起来。


    是的，我这是在为你增加额外的工作，但这是有充分理由的。永远不要在这些网站上匿名发帖。大多数论坛、群组甚至博客都支持会员登录，以使频繁发帖更加方便和安全。在有要求时，注册成为免费会员并填写所有个人资料信息。你希望在这些网站上的存在能够通过姓名、`URL`
    链接和照片被清晰地识别出来。


    一些博客使用像 `Gravatar` 这样的第三方头像系统。提前注册并准备好一个 `Gravatar` 个人资料是值得的。如果支持签名，那么利用那一小段懂
    `HTML` 的空间来推广你的应用和网站。


    明白我的意思了吗？每次你在论坛帖子或博客文章下发表评论时，你的照片、姓名、网站链接以及一个含蓄的应用引用都会同时呈现。只要你不过度使用，用明显的销售宣传来垃圾轰炸，这对所有人来说都是一个双赢的局面。在帮助他人的同时，通过在你的会员
    `URL` 和签名中提及它，你也在提高即将推出的 `iOS` 应用的知名度。


    ### 但不要噪音太多：维护专业声誉


    由于在像 `Twitter` 和 `Facebook` 这样的社交媒体网站上，非正式对话的数量巨大，人们往往很容易忘记，你所说的话不仅仅存在于你和参与者之间——它们实际上可以被你网络中的任何人看到。就
    `Twitter` 而言，任何人都可以访问你的个人资料页面并阅读你的推文，无论他们是否关注你。你的在线行为是在一个非常公开的全球舞台上进行的。


    虽然鼓励表现得平易近人，但你仍然代表你的产品和/或公司。你的在线行为应该是值得尊敬的，要知道你所说和所链接的内容会给全球的潜在客户留下持久的印象。如果你觉得这个建议显而易见，不值得一提，那么你已经领先了一步。你可能有足够商业头脑认识到这一点，但你会惊讶地发现，有多少专业开发者对自己所塑造的整体形象浑然不觉。


    多年来，我见过一些开发者网站，他们将软件产品与他们对职业摔跤明星以及《太空堡垒卡拉狄加》中性感赛昂美女的在线“圣地”一起推广！是的，你自己心里清楚。如果你还在上大学，在车库里经营你的软件业务，这没问题，但世界不需要知道这个。事实上，你希望你的网站和社交媒体账户能够呈现出一种专业的形象，让消费者对你产生信心。他们想通过购买你的应用，知道他们是在投资一个会持续更新和支持产品的开发者。如果他们怀疑这对你来说仅仅是个爱好，你就可能会错失这些潜在的销售机会。如果对你没有信心，他们怎么能对你的产品有信心呢？


    以下是一些需要考虑的指导方针：


    -   **将自己塑造成专业人士。** 始终展现你希望在他人眼中呈现的专业形象。无论你是 18 岁还是 68 岁，是高中刚毕业还是最近退休，这都不重要。互联网拉平了竞技场。你网站的视觉设计、它所提供的内容类型，以及你通过电子邮件、推文和博客文章向他人展示自己的方式，都为你本人以及你的业务方式描绘了一幅生动的画面。这不是为了营造虚假的假象，而是要在专业的光照下展示真实的自己。

    -   **NSFW？不适合发布！** 如果你正在使用博客和社交媒体账户来推广你的 `iOS` 应用和业务，请不要说脏话，也不要发布他人可能觉得冒犯的笑话、搞笑图片或视频。仅仅因为你加上
    `NSFW`（不适合上班时间观看）的警告并不能让它变得可接受。你觉得有趣的东西，别人可能会觉得极其冒犯。而那些人正是你刚刚失去的潜在销售额。我不想扫兴。我们都想找点乐子，但目标是卖出更多的应用，对吧？

    -   **不要将商业与政治或宗教混为一谈。** 最能引起人们强烈反应的两个话题是政治和宗教。无论你的观点如何，总是有同样激情的人在反对的那一边。这是一场你无法赢得的对话。如果你正在使用像
    `Twitter` 和 `Facebook` 这样的社交网络来推广你即将推出的 `iOS` 应用，利用你的受众，宣扬你自己的政治或宗教议程，是疏远潜在客户最快的方式。

    -   **控制你的情绪。** 永远不要在愤怒时发推文、评论或发布博客文章。虽然你通常可以在事后删除大部分内容，但它们的副本会留在网络上，在未来多年困扰你。你可能已经删除了那篇糟糕的博文，但你博客的所有电子邮件订阅者仍然可以在他们的收件箱里找到它。别忘了
    `Google` 缓存的“大象记忆”。你的在线咆哮可能会无限期地存在于 `Google` 的搜索数据库中。

    -   **以牙还牙解决不了问题。** 如果有人对你的应用或博文发表了负面评论，不要恶语相向。对他人恶语相向——尤其是在网上，一切都被记录、缓存和存档——可能会让你惹上诽谤官司。你可能会笑，但这确实发生过。通过采取高姿态，保护你的声誉和个人资产。

    -   **客户至上。** 客户可能并不总是对的，但他们应该始终得到你最大的尊重和关注。及时并以礼貌的方式回复你收到的每一封电子邮件和每一条推文。没有愚蠢的问题，只有愚蠢的回答。好吧，也许确实有愚蠢的问题，有些客户可能会让你恼火。但如果你在
    `Twitter` 上以任何方式用讽刺的公开回复让对方难堪，你可能失去的不仅仅是一个客户——那个人现在可能会警告朋友和家人避开你的产品。要愿意不遗余力地让你的客户满意。如果他们感到被重视，他们会用忠诚来回报你。


    ### 人人都爱赢家：收集发布前的评价和推荐'
- fmt: '虽然通过社交媒体制造预发布热度很重要，但你也应该开始联系那些你希望他们能报道你应用即将发布的公告并发表评测的有影响力的记者和博主。


    正如我之前所说，如果你没有耐心或时间投入到预发布宣传中，那么聘请一家专注于移动应用营销的第三方公司可能是值得的。在谷歌搜索`iPhone app marketing`后，你会发现有很多选择。如果你选择这条路，请做好功课，与其中几家沟通，找到能满足你需求和预算的公司。


    **准备一份“重点关注名单”**


    无论你是聘请第三方公关人员还是自己动手，你都需要准备一些营销材料以备不时之需。幸运的是，这些内容我在本书前面已经讨论过，因此你应该已经准备好了：


    *   公司logo

    *   你的iOS应用的图标和logo

    *   应用描述——简短的电梯演讲和完整的功能列表

    *   几张最能代表你应用的惊艳截图

    *   一个专门的应用网页

    *   一个展示你应用的视频预告片


    大多数科技记者会在网上发布报道，但万一你的应用引起了印刷杂志或报纸的兴趣，请确保准备好你的公司logo和iOS应用图标/logo的高分辨率图像。


    在联系媒体之前，完成你的应用网站至关重要，因为记者会询问你的网站URL。


    此外，如果你制作了视频预告片，请务必将其上传到像YouTube这样的视频分享网站，以便在线出版物可以轻松地将视频嵌入到他们的新闻文章中。


    现在是在线做一些调研的时候了。要从最有影响力的媒体渠道获得新闻报道，你需要知道哪些科技网站和记者有兴趣撰写关于你特定应用的文章。准备一份你应联系的人员的“重点关注名单”。注意他们的目标受众以及他们专注于撰写哪些内容。如果你的应用不是游戏，那么花宝贵的时间向一个移动游戏网站推销它是没有意义的。如果该网站过去从未报道过效率类应用，它现在也不太可能开始。集中精力，只关注那些对你的应用类别感兴趣的人。


    **建立关系**


    当你在[第2章](#9781430262381_Ch02.xhtml)进行竞品调研时，你探索了几十个应用评测网站。当你希望这些网站在你的应用程序在App Store上架后对其进行评测时，它们将再次证明其重要性。


    不要忘记那些报道iPhone和iPad新闻的各种科技网站和杂志。即使那些不发布新闻稿的网站，如果你的应用提供了独特的功能或服务，被认为具有新闻价值且能直接让他们的读者受益，他们也可能有兴趣撰文。


    我将在[第12章](#9781430262381_Ch12.xhtml)中详细讨论如何为你的iOS应用争取媒体报道曝光和评测。然而，在现阶段，如果你与任何知名的科技记者和博主还没有建立关系，那么现在是时候介绍你自己了。你不想在你的应用发布时再给他们打冷电话。那时就太晚了，当你的营销引擎应该全速运转时，却浪费宝贵的时间在介绍上。


    在这个预发布阶段，与你的媒体重点关注名单上的人建立联系。先瞄准最重要的，然后逐步推进。


    尽管联系人的电话号码可能列在他们各自的网站上，但不要先打电话给他们。首先通过电子邮件介绍自己，这样他们可以在方便的时候了解你的公司和即将推出的应用。


    请记住，大多数记者都有截稿压力，每天要撰写多篇文章，所以他们的时间非常有限。不要期望立即得到回复。他们可能需要几天甚至一周才能回复你的邮件，因此耐心是关键。这也是为什么你应该在应用在App
    Store上线前一个月左右就开始这个过程的另一个原因。


    即使有些记者忽略了你的询问，在任何情况下都不要用一连串重复的信息轰炸他们的语音信箱或电子邮件收件箱。App Store中有超过30万个应用，你并不是唯一寻求媒体报道的iOS开发者。坚持不懈没有错，但没有人喜欢被垃圾信息骚扰。


    另一个让记者和有影响力的博主注意到你的好方法是在Twitter上关注他们。由于Twitter已成为媒体的主要新闻来源，你的推文不仅能提高潜在客户对你应用的认知，还可能吸引媒体的注意，引发采访和应用评测的请求。关注你最喜欢的科技记者，他们可能也会关注你！


    你的应用网站和截图必须具有震撼的视觉效果，其关键原因之一是要让你从其他开发者铺天盖地的询问中脱颖而出。众所周知，一条推文中链接的引人注目的网站，或发布在热门iPhone论坛上的一张杀手级截图，可以开启一波良好的媒体报道和口碑传播。


    科技媒体与数千个不同平台的应用程序和游戏的开发者及发行商打交道。不要以为那些过去报道过你产品的记者会记得你，当你发布新的新闻稿时。在发送那份新闻稿之前，重新介绍自己，感谢他们之前的报道作为提醒，然后再提及你即将推出的新应用。


    通过询问他们的编辑日程以及发布一篇报道或评测需要提前多久通知，来体谅他们繁忙的写作日程和截稿日期。在处理纸质媒体时这一点尤其重要。在线博主通常可以在几天内完成文章，但印刷杂志通常有三个月的前置时间。


    **提供独家报道和预先的Ad Hoc构建以确保报道**


    如果你有新颖和令人兴奋的东西可以提供，记者们会希望成为第一个发布消息的人。如果这是独家报道，他们会对报道你的故事更感兴趣。显然，你不能给每个人提供独家报道，所以如果你确实以视频片段、截图甚至早期测试版的形式提供应用的特殊预览，请确保它是面向能吸引大量受众的主流媒体。


    让一些关键博主在你的应用发布前试用它，对你是有利的。如果他们喜欢你的应用，他们更有可能谈论它。如果他们热爱你的应用，他们甚至可能成为非官方的布道者，为你提供一些很棒的引语，你可以将其包含在新闻稿和你的网站上。


    大多数评测者和博主已经习惯了通过Ad Hoc分发方式来接收应用，因此在对你的应用进行Beta测试时，别忘了在分配的设备名额中预留一些用于预发布媒体报道。许多精通iPhone的记者甚至将他们的设备UDID包含在他们的联系人vCard或在线简历中。这很方便，因为你需要在iOS
    Provisioning Portal中为他们设置一个设备ID。是的，为你选定的一群有影响力的媒体成员配置和提供应用的Ad Hoc构建版本可能有些麻烦，但潜在的宣传效果是完全值得的。如果你发送的是Beta版本，请务必让他们知道这一点，这样他们就不会将其视为最终版本的应用。'
  raw: 'Although growing the prerelease buzz via social media is important, you should
    also start reaching out to influential journalists and bloggers who you hope will
    cover your app’s forthcoming launch announcement and publish a review.


    As I’ve said before, if you don’t have the patience or time to dedicate to prerelease
    publicity, then it may be worth hiring a third-party firm that specializes in
    mobile app marketing. After searching Google for *iPhone app marketing*, you’ll
    see there are many choices. If you do go that route, do your homework and talk
    to several of them to find the one that can meet your needs and budget.


    Preparing a Hit List


    Whether you hire a third-party publicist or do it yourself, you’ll need to have
    a few marketing materials ready at your fingertips. Luckily, these are elements
    I’ve discussed earlier in this book, so you should already have them prepared:


    *   Company logo

    *   Your iOS app’s icon and logo

    *   The app description—the quick elevator pitch and full list of features

    *   A few stunning screenshots that best represent your app

    *   A dedicated web page for your app

    *   A video trailer showcasing your app


    Most tech journalists will be publishing coverage online, but in the event that
    your app attracts interest from a print magazine or newspaper, be sure to have
    ready high-resolution images of your company logo and iOS app icon/logo.


    Getting your app’s web site completed before you reach out to the press is vital,
    since journalists will ask for your web site URL.


    Additionally, if you produced a video trailer, be sure to upload it to a video-sharing
    site like YouTube, so that online publications can easily embed the video in their
    news articles.


    It’s time to do a little research online. To receive news coverage from the most
    influential press sources, you need to know which tech sites and journalists would
    be interested in writing about your particular app. Prepare a hit list of people
    you should contact. Take note of their target audience and what they specialize
    in writing about. There’s no point spending valuable time pitching your app to
    a mobile games site if it’s not a game. If the site has never covered productivity
    apps in the past, it’s probably not looking to start now. Conserve your efforts
    and focus only on those select people who will be interested in your app’s category.


    Establishing Relationships


    When performing competitive research in [Chapter 2](#9781430262381_Ch02.xhtml),
    you explored dozens of app review sites. Those sites will prove important once
    again when you want them to review your application after it becomes available
    in the App Store.


    And don’t forget about the various tech sites and magazines that cover iPhone
    and iPad news. Even the ones that don’t post press releases may be interested
    in writing about your app if it provides a unique feature or service that is deemed
    newsworthy and would directly benefit their readers.


    I’ll discuss acquiring media news exposure and reviews for your iOS app extensively
    in [Chapter 12](#9781430262381_Ch12.xhtml). However, at this point, if you don’t
    have an existing relationship with any prominent tech journalists and bloggers,
    now is the time to introduce yourself. You don’t want to cold-call them when your
    app is released. That’s too late, wasting valuable time with introductions when
    your marketing engine should be moving at full speed.


    During this prerelease stage, establish a connection with the people on your press
    hit list. Target the most important ones first, gradually making your way through
    the list.


    Although the contacts’ phone numbers may be listed on their respective web sites,
    don’t call them first. Introduce yourself initially through e-mail, so that they
    can read about your company and your forthcoming app at their convenience.


    Remember that most journalists are under a deadline to write several articles
    each day, so their time is very limited. Don’t expect an instantaneous response.
    It may take them several days or even a week to reply to your e-mail, so patience
    is key here. This is yet another reason to begin the process a good month or so
    before your application goes live in the App Store.


    Even if some journalists ignore your queries, do not—under any circumstances—bombard
    their voice mail or e-mail inboxes with an onslaught of repeated messages. With
    more than 300,000 apps in the App Store, you’re not the only iOS developer looking
    for press coverage. There’s nothing wrong with being persistent, but no one likes
    being spammed either.


    Another good way to make journalists and influential bloggers aware of you is
    to follow them on Twitter. Since Twitter has become a major news source for the
    press, your tweets will not only increase awareness of your app with potential
    customers, but may also attract the attention of the press, generating requests
    for interviews and app reviews. Follow your favorite tech journalists, and they
    may just follow you back!


    One of the reasons it’s so crucial that your app’s web site and screenshots are
    stunning visuals is to make you stand out from the overwhelming pile of queries
    from other developers. An eye-catching web site linked from a tweet and a killer
    screenshot posted on a popular iPhone forum have been known to kick-start a good
    dose of press coverage and word-of-mouth.


    The tech press deals with thousands of developers and publishers of applications
    and games for several different platforms. Don’t assume that those journalists
    who have reported on your products in the past will remember you when you send
    out a new press release. Reintroduce yourself before sending that release, thanking
    them for their previous coverage as a reminder before mentioning your impending
    new app.


    Be conscious of their busy writing schedules and deadlines by asking about editorial
    calendars and how much advance notice they need in order to run a story or review
    during a given time period. This is especially important when dealing with the
    print world. Online bloggers can usually turn around articles within days, but
    print magazines typically have a three-month lead time.


    Offering Exclusives and Advance Ad Hoc Builds to Secure Coverage


    If you have something new and exciting to offer, journalists will want to be the
    first to break the news. They will have more interest in covering your story if
    it’s an exclusive. Obviously, you can’t offer everyone an exclusive, so if you
    do provide a special sneak preview of your app in the form of a video clip, a
    screenshot, or even an early beta version, make sure it’s with a major publication
    that pulls in a large audience.


    Having a few key bloggers play with your app before its release can work in your
    favor. If they enjoy your app, they are more likely to talk about it. If they
    love your app, they may even become unofficial evangelists for it, providing you
    with amazing quotes that you can include in your press release and on your web
    site.


    Most reviewers and bloggers are accustomed to receiving apps via ad hoc distribution,
    so when beta-testing your app, don’t forget to reserve a few of your allotted
    device slots for prerelease press coverage. Many iPhone-savvy journalists even
    include their device’s UDID in their contact vCard or online bio. This is handy,
    since you’ll need to set up a device ID for them in your iOS Provisioning Portal.
    Yes, configuring and providing ad hoc builds of your app for a select group of
    influential press members can be a hassle, but the potential publicity is well
    worth it. If you’re sending a beta version, be sure to make them aware of that
    fact, so that they don’t judge it as the final app release.'
