    # 尽管桌面版 iTunes 和 iPad 版 App Store 为你的应用页面提供了专属支持链接...


    尽管桌面版 iTunes 和 iPad 版 App Store 会从你的产品页面提供一个指向你支持网站的专属活跃链接，但 iPhone 版 App Store
    却并非如此。iPhone 版 App Store 仅会列出所选应用的网站 URL（请参见图 10-1）。由于超过 90% 的 iPhone 和 iPod touch
    用户会直接在设备上浏览和下载应用，当他们遇到支持问题时，会在 Mobile Safari 中查找你的网站，希望能找到在线帮助。因此，让你的用户能从你的应用网站上轻松找到支持页面，这对你和你的客户来说都会轻松许多。


    ## 公司身份


    如果你的应用网页是你现有公司网站的一部分，这似乎是显而易见的；但如果你是一位独立开发者，决定为你的 iOS 应用建立一个独立的网站，那么请不要忘记包含你的公司名称和“关于我们”页面。


    如果你只是在构建一个售价 99 美分、三个月后就会被遗忘的新奇应用，那么建立公司身份可能并不重要（如果真是这样，你可能也不会读这本书了）。但如果你开发了一个价格高于平均应用售价（比如
    3.99 美元或更高）的、坚如磐石的小众应用，消费者在做购买决定前，会想确认你是一位严肃的开发者，并计划长期支持该应用。


    当人们购买一个价格较高的应用，尤其是一个他们可能每天都会依赖的应用时，他们实际上是在对该产品的未来进行投资。你希望你的网站能散发出一种繁荣自信的专业气息。看到你的商业标志并在线阅读你的公司/开发者简介，有助于让你的客户感到安心。


    ## 其他产品的交叉推广


    你是否正在尝试销售多款软件应用？如果你正在为推广一款新的 iOS 应用而吸引流量到你的网站，那么请利用这个机会同时推介你的一些其他产品，尤其是那些能吸引同一批受众的应用。`http://www.taptaptap.com`
    的 Tap Tap Tap 就是这样做的。


    Tap Tap Tap 的网站设计将交叉推广作为核心要素。通过一个巧妙的寿司菜单主题，所有产品的应用图标都放置在一张虚拟的木桌上。选择一个应用，其图标会向前滑动，展示出完整的描述、截图、视频演示及其他相关信息。但其他应用的图标仍然在左侧可见。点击另一个，当前的应用图标会滑回原位，而新选中的图标则滑向前方（请参见图
    10-10）。这一切都在同一个屏幕内完成。这是一个优雅的动画设计，通过层叠样式表（CSS）和 JavaScript 的复杂混合实现——没有使用 Flash。


    ![9781430262381_Fig10-10.jpg](img/9781430262381_Fig10-10.jpg)


    图 10-10. Tap Tap Tap 采用了一个巧妙的网站设计，在单个屏幕内对其所有 iPhone 应用进行交叉推广


    你还可以交叉推广其他产品和服务。尽管人们来到你的网站是对一款 iPhone 或 iPad 应用感兴趣，但他们肯定也有其他兴趣，可能涉及书籍、桌面软件、相关咨询服务等等。但要非常小心，不要过度推广那些其他项目，否则你有显得过于广告中心化的风险，把你的
    iOS 应用当作诱饵。同时要记住，你不想让网站访问者偏离你的主要目标：说服他们在 App Store 中购买你的 iOS 应用！


    ## 可下载的附加内容


    人们喜欢免费赠品！在你的网站上提供有趣的下载内容是推广你应用的简单方法。例如，你可以包含 Twitter 头像图片、桌面壁纸以及 iPhone 和 iPad
    壁纸。


    但仅仅因为你制作了免费赠品，并不意味着你的网站访问者就会想要它。由于这些本质上是你产品的数字广告，你需要让它们在视觉上足够引人注目，让人们每次打开电脑或移动设备时都愿意看。人们不想盯着界面组件或公司标志看，所以如果你在推广一个效率类应用，这类基于图片的免费赠品可能不太合适。但如果你的应用是一个拥有酷炫场景和角色的游戏，那么游戏的视觉元素可能非常适合用于头像图标和数字壁纸等促销性下载内容。


    ## 在销售之前，先开始收集


    你的 iOS 应用还未在 App Store 上线，所以此时在你的网站上添加购买按钮和 App Store 身份徽章（如图 10-4 中的 Breadcrumbs
    示例所示）还为时过早。虽然设计好这两个图片并准备就绪是好事，但你现在应该把它们从网页上拿掉。


    在预发布阶段，利用你的网站来扩大你的在线受众。你可以保持简单，直接让人们关注你的 Twitter 或访问你的 Facebook 页面，以便及时了解你即将推出的
    iOS 应用的最新消息。但如果你还不是一个知名的开发者，可能没有令人信服的理由让人们关注你。他们可能决定晚些时候再查看你的网站。当然，随着时间的推移，记忆会淡化，他们可能不记得再回来。把球踢给他们的做法，会让你有损失这些潜在应用销售的风险。


    在这里，提供免费的电子邮件通讯可以真正有益于你的预发布营销工作。感兴趣的网站访问者可以订阅，然后一个月后，当他们已经忘记了你的应用时，你可以给他们发一封电子邮件，宣布该应用已在
    App Store 上架！


    不要依赖位于导航菜单或网站其他位置的微小订阅链接。把订阅表单放在你应用网页的中心位置，取代购买按钮和 App Store 身份徽章。邀请访问者提交他们的电子邮件地址，以便在您的应用在
    App Store 上架时第一时间得到通知（请参见图 10-11）。


    ![9781430262381_Fig10-11.jpg](img/9781430262381_Fig10-11.jpg)


    图 10-11. 在预发布阶段，用“上架时通知我”的电子邮件订阅表单替换购买按钮和 App Store 身份徽章


    这个策略的便利之处在于，网页上的其他任何内容都不需要移动或修改。一旦你的应用在 App Store 上线，你可以轻松地移除那个显眼的“通知我...”电子邮件表单，重新添加购买按钮和
    App Store 身份徽章（如图 10-4 所示）。


    ## 为何网站与 Mobile Safari 的兼容性如此重要


    AdMob 报告称，高达 93% 的 iPhone 用户直接在移动设备上的 App Store 浏览和购买应用，而只有区区 7% 的用户通过桌面版 iTunes
    进行。由于消费者很可能在做购买决定前查看你的应用官网，确保你的网站与 iOS 中的 Mobile Safari 浏览器兼容，对你最为有利。


    Mobile Safari 底层使用了强大的 WebKit 引擎，因此它对 JavaScript、CSS 和其他现代网络标准有广泛支持。实际上，大多数网站在
    Mobile Safari 中渲染得相当好。但你可以使用一些优化技巧，让你的网站对 iOS 用户更具吸引力：


    *   使用 `viewport` meta 标签控制页面缩放。

    *   从浏览器的用户代理检测平台。

    *   解决 Mobile Safari 缺乏 Flash 支持的问题。

    *   增强主屏幕书签功能。


    ## “视口先生，我已准备好特写了。”

    '
- fmt: '大多数网页开发人员根据桌面屏幕的平均尺寸来设计页面布局。为了适应大多数网站的典型宽度，`Mobile Safari` 的默认缩放设置为 980 像素的屏幕宽度。这使得所有网站在初次加载时都能很好地适配
    `Mobile Safari` 浏览器窗口。


    在 `iPad` 的大屏幕上以横屏模式查看网站，其体验与桌面网页浏览器无异，但对于屏幕较小的 `iPhone` 或 `iPod touch` 来说则并非如此。在竖屏模式下，浏览器窗口非常狭窄，因此页面会被大幅缩小，导致文本几乎无法辨认。为了阅读内容和点击文本链接，用户不得不捏合屏幕进行放大。


    但是，如果你想设计一个能够适应 `iPhone` 和 `iPod touch` 上 `Mobile Safari` 浏览器独特尺寸的网站，从而免除手动缩放的需要呢？


    以 `Tap Tap Tap` 的网页布局为例，其宽度仅略大于 600 像素（见图 [10-10](#9781430262381_Ch10.xhtml#Fig10)）。它被设计成在桌面电脑浏览器的宽屏格式和
    `iPhone` 的 `Mobile Safari` 的窄竖屏模式下都能良好显示。然而，`Mobile Safari` 默认的 980 像素宽的屏幕缩放比例仍会将页面的主要内容渲染为屏幕中央的一个微小对象，两侧留下大量未使用的黑色背景边距。解决方案是一个名为
    `viewport` 的 `HTML` 标签。在 `Tap Tap Tap` 网站 `http://www.taptaptap.com/` 的 `<head>`
    标签内，包含以下 `meta` 标签：


    ```

    <meta name="viewport" content="width=device-width" />

    ```


    `viewport` 标签能被 `Mobile Safari` 识别，但会被所有其他浏览器忽略，因此它只会影响你的网站在具有小屏幕的 `iOS` 设备上的显示效果。将
    `content` 参数设置为 `width=device-width`，会告诉 `Mobile Safari` 适当地缩放页面内容的宽度以匹配浏览器的宽度。这使得
    `Tap Tap Tap` 的网站呈现出为 `iPhone` 优化过的效果，并且易于阅读（见图 [10-12](#9781430262381_Ch10.xhtml#Fig12)）。它只影响应用的缩放量以及页面定位，网页的原始宽高比保持不变。


    ![9781430262381_Fig10-12.jpg](images/9781430262381_Fig10-12.jpg)


    [图 10-12](#9781430262381_Ch10.xhtml#_Fig12). `Tap Tap Tap` 将 `viewport` 标签的宽度设置为匹配设备宽度，这增强了其网站在
    `iPhone` 和 `iPod touch` 上的 `Mobile Safari` 中的外观和可读性。


    还可以分配其他几个 `viewport` 属性来影响缩放和用户的缩放能力，所有这些属性都由 `Apple` 在 `http://developer.apple.com/library/safari/#documentation/appleapplications/reference/safarihtmlref/Articles/MetaTags.html`
    在线文档中记录。如果你希望对 `viewport` 宽度有比设置 `device-width` 值更大的控制，你可以将 `width` 属性设置为特定的像素数。这会在什么情况下派上用场呢？


    假设你的页面背景图像是整个设计的组成部分。当 `viewport` 标签设置为 `width=device-width` 时，前景网页内容将填满屏幕；几乎没有边距空间来显示背景图像。如果你的主要内容宽度为
    400 像素（并且居中显示），并且你希望在屏幕的左侧和右侧至少看到 50 像素的背景图像，那么将你的 `viewport` 标签设置为以下内容：


    ```

    <meta name="viewport" content="width=500">

    ```


    **注意**  我确实注意到 `Tap Tap Tap` 酷炫的 `JavaScript` 驱动的应用图标动画在 `Mobile Safari` 中滑动效果不佳；它们在
    `Mac OS X` 版本的 `Safari` 中完美流畅。我并非批评其精美的页面设计，而是指出一个困扰许多 `iOS` 相关网站的常见问题。即使两个浏览器都使用
    `WebKit`，`JavaScript` 和 `CSS` 的支持也存在细微差别。在你的网站中使用复杂的脚本或第三方 `Web` 框架时，请务必在 `Mobile
    Safari` 中测试你的代码，以确保桌面电脑和移动设备上的浏览体验相似。


    如果你需要在 `Mobile Safari` 中调试网页，请打开位于 `iOS 设置` 应用中 `Safari` 的“开发者”面板下的“调试控制台”。`Mobile
    Safari` 的调试控制台能极大节省时间，因为它能精确定位错误并推荐优化技巧。


    ## 使用浏览器检测来提供目标内容


    对于为多个不同平台开发应用和游戏的软件发行商来说，修改其主网站以仅适应其中一个平台可能并不合适。`PopCap Games` 就是一个完美的例子，它为 `Mac`、`PC`、`Web`、`Nintendo`、`Xbox`、`PlayStation`
    以及各种移动设备（如 `iPhone` 和 `iPad`）开发游戏。


    为了在单个网站内推广其所有最新游戏和支持的平台，`PopCap Games` 必须利用桌面网页浏览器的大屏幕优势，这很可能占据了其网站流量的绝大部分。当缩放以适应
    `iPhone` 的 `Mobile Safari` 浏览器窗口时，`PopCaps.com` 的主页将变得非常难以导航和阅读（见图 [10-13](#9781430262381_Ch10.xhtml#Fig13)）。`PopCap`
    并未尝试根据访问的浏览器动态地更改现有网站设计，而是使用一个简单的重定向将 `iPhone` 用户发送到一个专门针对移动设备优化的网站，该网站仅展示其 `iPhone`
    游戏。在 `Mobile Safari` 中访问 `http://www.popcap.com` 会自动将你重定向到 `http://www.popcap.com/iphone/`（见图
    [10-13](#9781430262381_Ch10.xhtml#Fig13)）。


    ![9781430262381_Fig10-13.jpg](images/9781430262381_Fig10-13.jpg)


    [图 10-13](#9781430262381_Ch10.xhtml#_Fig13). `PopCap Games` 主首页服务于多个平台，在小移动屏幕上难以阅读（左图），因此
    `iPhone` 用户会被自动重定向到一个特别的 `iPhone` 专用网站（右图）。


    这个简单的重定向技巧是通过首先检测浏览器的用户代理来实现的。以下是来自运行 `iOS 4.2.1` 的 `iPhone 4` 的 `Mobile Safari`
    用户代理：


    ```

    Mozilla/5.0 (iPhone; U; CPU iPhone OS 4_2_1 like Mac OS X; en-us) AppleWebKit/533.17.9
    (KHTML, like Gecko) Version/5.0.2 Mobile/8C148 Safari/6533.18.5

    ```


    以下是来自运行 `iOS 3.1` 的 `iPod touch` 的 `Mobile Safari` 用户代理：


    ```

    Mozilla/5.0 (iPod; U; CPU iPhone OS 3_1 like Mac OS X; en-us) AppleWebKit/528.18
    (KHTML, like Gecko) Version/4.0 Mobile/7C144 Safari/528.16

    ```


    以下是来自运行 `iOS 4.2.1` 的 `iPad` 的 `Mobile Safari` 用户代理：


    ```

    Mozilla/5.0 (iPad; U; CPU OS 4_2_1 like Mac OS X; en-us) AppleWebKit/533.17.9
    (KHTML, like Gecko) Version/5.0.2 Mobile/8C148 Safari/6533.18.5

    ```


    浏览器的用户代理可以从任何现代 `Web` 脚本语言中获取。如果用户代理描述显示用户的浏览器来自 `iPhone` 或 `iPod touch`，你的 `Web`
    代码可以将用户发送到不同的 `URL`。如果用户代理来自任何其他平台或设备（例如 `Mac` 或 `iPad`），则不执行任何操作，保持在当前网页上。让我们看看如何用
    `JavaScript` 和 `PHP` 仅用几行代码来实现这一点。


    ### 用于浏览器检测的 JavaScript


    将以下代码放在 `HTML` 页面的 `<head>` 标签内。这将导致在页面其余部分加载完成之前，为 `Mobile Safari` 用户执行重定向，从而使过渡快速且无缝。'
  raw: 'The majority of web developers design page layouts based on average desktop
    screen dimensions. To accommodate the typical widths of most web sites, Mobile
    Safari’s default zoom is set at a screen width of 980 pixels. This enables all
    web sites to fit nicely within the Mobile Safari browser window when initially
    loaded.


    Viewing web sites in landscape mode on the large screen of an iPad feels identical
    to a desktop web browser, but the same can’t be said for the smaller screen of
    an iPhone or iPod touch. In portrait mode, the browser window is quite narrow,
    so the pages are scaled down quite a bit, making the text practically illegible.
    To read the content and tap text links, users are forced to pinch the screen to
    zoom in closer.


    But what if you want to design your web site to accommodate the unique dimensions
    of the Mobile Safari browser on the iPhone and iPod touch, alleviating the need
    to manually pinch zoom?


    Consider Tap Tap Tap’s web page layout, which is only a little wider than 600
    pixels (see [Figure 10-10](#9781430262381_Ch10.xhtml#Fig10)). It’s designed to
    display well in both the wide-screen format of desktop computer browsers and the
    narrow portrait mode of the iPhone’s Mobile Safari. Yet Mobile Safari’s default
    screen scale of 980 pixels wide would still render the page’s main content as
    a tiny object centered in the screen, with a large unused margin of black background
    color on both sides. The solution is an HTML tag called `viewport`. Within the
    `<head>` tag of Tap Tap Tap’s web page at `http://www.taptaptap.com/` is the following
    meta tag:


    ```

    <meta name="viewport" content="width=device-width" />

    ```


    The `viewport` tag is acknowledged by Mobile Safari but is ignored by all other
    browsers, so it will affect your site display only on iOS devices with small screens.
    Assigning the `content` parameter to `width=device-width` tells Mobile Safari
    to appropriately scale the page content’s width to match the browser’s width.
    This makes Tap Tap Tap’s web site appear iPhone-optimized and easy to read (see
    [Figure 10-12](#9781430262381_Ch10.xhtml#Fig12)). It affects only the amount of
    zoom and page positioning that’s applied. The web page’s original aspect ratio
    remains unaltered.


    ![9781430262381_Fig10-12.jpg](images/9781430262381_Fig10-12.jpg)


    [Figure 10-12](#9781430262381_Ch10.xhtml#_Fig12). Tap Tap Tap sets the viewport
    tag’s width to match the device width, which enhances its web site’s appearance
    and readability within Mobile Safari on the iPhone and iPod touch


    Several other `viewport` properties can be assigned to affect the scaling and
    a user’s zoom capabilities, all of which are documented by Apple online at `http://developer.apple.com/library/safari/#documentation/appleapplications/reference/safarihtmlref/Articles/MetaTags.html`.
    If you’re looking for greater control over the viewport’s width than is offered
    by setting the `device-width` value, you can set the `width` property to a specific
    number of pixels. How might this come in handy?


    Let’s say your page’s background imagery is an integrated part of the overall
    design. With the `viewport` tag set to `width=device-width`, the foreground web
    content will fill the screen; little to no margin space will remain to reveal
    the background image. If your main content is 400 pixels wide (and centered on
    the page), and you would like to see at least 50 pixels of background image on
    both the left and right sides of the screen, set your `viewport` tag to the following:


    ```

    <meta name="viewport" content="width=500">

    ```


    **Note**  I did notice that Tap Tap Tap’s cool JavaScript-driven app icon animations
    don’t slide as well in Mobile Safari; they’re flawlessly smooth in the Mac OS
    X version of Safari. I’m not knocking the beautiful page design, but rather pointing
    out a common problem that plagues quite a few iOS-related web sites. Even though
    both browsers use WebKit, there are subtle differences in JavaScript and CSS support.
    When using complex scripts or third-party web frameworks in your site, be sure
    to test your code in Mobile Safari to ensure that the viewing experience is similar
    on both desktop computers and mobile devices.


    If you need help debugging your web page within Mobile Safari, turn on the Debug
    Console located in Safari’s Developer panel within the iOS Settings app. Mobile
    Safari’s Debug Console is a huge time-saver, as it pinpoints errors and recommends
    optimization tips.


    Using Browser Detection to Deliver Targeted Content


    For software publishers who develop apps and games for several different platforms,
    it may not be appropriate to modify their main web site to accommodate just one
    of them. A perfect example of this is PopCap Games, which produces games for Mac,
    PC, Web, Nintendo, Xbox, PlayStation, and even various mobile devices such as
    the iPhone and iPad.


    To promote all of its latest games and supported platforms within a single site,
    PopCap Games must take advantage of the wide-screen real estate of desktop web
    browsers, which probably account for the majority of their site traffic. The main
    PopCaps.com home page would be quite difficult to navigate and read when scaled
    down to fit within the iPhone’s Mobile Safari browser window (see [Figure 10-13](#9781430262381_Ch10.xhtml#Fig13)).
    Instead of trying to dynamically alter the existing site design on the fly based
    on the browser accessing it, PopCap uses a simple redirect to send iPhone users
    to a special mobile-optimized web site that showcases only its iPhone games. Within
    Mobile Safari, visiting `http://www.popcap.com` automatically redirects you to
    `http://www.popcap.com/iphone/` (see [Figure 10-13](#9781430262381_Ch10.xhtml#Fig13)).


    ![9781430262381_Fig10-13.jpg](images/9781430262381_Fig10-13.jpg)


    [Figure 10-13](#9781430262381_Ch10.xhtml#_Fig13). The PopCap Games main home page
    caters to several platforms and would be hard to read on a small mobile screen
    (left), so iPhone users are automatically redirected to a special iPhone-centric
    site (right)


    This simple redirect trick is achieved by first detecting the browser’s user agent.
    Here’s what Mobile Safari’s user agent looks like from an iPhone 4 running iOS
    4.2.1:


    ```

    Mozilla/5.0 (iPhone; U; CPU iPhone OS 4_2_1 like Mac OS X; en-us) AppleWebKit/533.17.9
    (KHTML, like Gecko) Version/5.0.2 Mobile/8C148 Safari/6533.18.5

    ```


    Here’s Mobile Safari’s user agent from an iPod touch running iOS 3.1:


    ```

    Mozilla/5.0 (iPod; U; CPU iPhone OS 3_1 like Mac OS X; en-us) AppleWebKit/528.18
    (KHTML, like Gecko) Version/4.0 Mobile/7C144 Safari/528.16

    ```


    And here’s Mobile Safari’s user agent from an iPad running iOS 4.2.1:


    ```

    Mozilla/5.0 (iPad; U; CPU OS 4_2_1 like Mac OS X; en-us) AppleWebKit/533.17.9
    (KHTML, like Gecko) Version/5.0.2 Mobile/8C148 Safari/6533.18.5

    ```


    The browser’s user agent can be accessed from any modern web scripting language.
    If the user agent description reveals the user’s browser is from the iPhone or
    iPod touch, your web code can send the user to a different URL. If the user agent
    is from any other platform or device (such as a Mac or iPad), then do nothing,
    remaining on the current web page. Let’s take a look at how to program this in
    JavaScript and PHP with only a few lines of code.


    JavaScript for Browser Detection


    Place the following code within the `<head>` tag in your HTML page. This will
    cause the redirect to happen for Mobile Safari users before the rest of the page
    finishes loading, which will make the transition fast and seamless.'
