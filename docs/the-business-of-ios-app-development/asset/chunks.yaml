  raw: '1.  Open *MainViewController_iPhone.xib* in Interface Builder.

    2.  In the browser window, you should already see a `UIView` listed, wired to
    the default `view` referencing outlet. Drag a new `UIView` from the Library palette
    to the browser window, carefully positioning it as a nested `UIView` within that
    existing `UIView`. Wire the outlet of `contentView` from the File’s Owner module
    to that new, nested `UIView`. The nested `UIView` (named `contentView`) and the
    iAd banner frame will both be subviews of the main parent `UIView` (named `view`).

    3.  With that nested `UIView` selected, navigate to the View Size tab of the inspector
    palette and modify the autosizing mask to automatically expand full screen (see
    [Figure 7-12](#9781430262381_Ch07.xhtml#Fig12)). The parent `UIView` should also
    have the same autosizing mask settings (if it doesn’t already by default).


    ![9781430262381_Fig07-12.jpg](images/9781430262381_Fig07-12.jpg)


    [Figure 7-12](#9781430262381_Ch07.xhtml#_Fig12). Within MainViewController_iPhone.xib,
    construct the nested UIView hierarchy, UI elements, and autosizing masks


    **Note**  Even though the Library palette does offer an iAd `BannerView` component,
    do *not* add it to the view within Interface Builder. For this example, it’s crucial
    that the iAd banner frame is only added programmatically, so that the iAd can
    dynamically slide in and out of the screen based on availability and other factors
    at runtime. You’ll see how to write that iAd code soon.


    4.  With the nested `UIView` (named `contentView`) selected, change its Color
    Tint in the inspector palette’s Attributes tab to 75 percent grayscale, so that
    we can easily differentiate this `UIView` from its white parent `UIView` when
    displayed on the screen. This gray `UIView` is where you will place all of the
    UI elements for this screen. Think of it as a container for your app interface,
    with its height resized when needed to make room for the ad banner frame at the
    bottom of the screen.

    5.  To keep things simple for demonstration purposes, add two `UILabel`s from
    the Library palette to that nested `UIView`.

    6.  Move one `UILabel` to the top of the view with label text that reads **TOP
    of “contentView” UIVIew**. Set the autosizing mask for that `UILabel` to always
    stay rooted at the top of the screen.

    7.  Move the second `UILabel` to the bottom of the view and give it the label
    text **BOTTOM of “contentView” UIView**. Set the autosizing mask of this second
    `UILabel` to always stay rooted at the bottom of the screen.


    **Note**  If you’re not quite sure how to configure the brackets on the autosizing
    mask, check out the book’s downloadable `InAppAdv` project to see an example of
    how they are set.


    Remember to also make all of these same additions and modifications to *MainViewController_iPad.xib*.


    Why the `UILabel`s? They serve as visible markers, indicating where the top and
    bottom of the gray `contentView`-assigned `UIView` is located when resizing it
    via code to make room for the ad banner frame. This will be obvious when you run
    the app in the iOS Simulator or on a test device and see it in action. But we’re
    not ready to do that quite yet.


    The last step is the most important piece of the project: writing the code that
    manages the entire in-app advertising process from ad banner request to display
    on the screen.


    **Note**  You may find that several UI components, such as a `UINavigationController`,
    cannot be added to a `UIView` in Interface Builder. For those scenarios, the solution
    is to create those UI components programmatically in Xcode, adding them to the
    `UIView` as a subview via code.


    Copying Your House Ad Image Files to the Project


    In the event that there isn’t an iAd available to display, you’ll want to show
    an alternate ad banner instead. For this example, let’s show a house ad. Before
    you start writing code for handling iAd and your alternate ad banner, you’ll need
    to create the actual image files for your house ad and add them as resources to
    the Xcode project.


    To support all of the device orientations and display resolutions for both iPhone
    and iPad, you’ll need to create your house ad in six different sizes with the
    exact file names and PNG format listed here, so that they work with the example
    code:


    *   *adbannerportrait-iphone.png* (320 pixels × 50 pixels)

    *   *[adbannerportrait-iphone@2x.png](mailto:adbannerportrait-iphone@2x.png)*
    (Retina: 640 pixels × 100 pixels)

    *   *adbannerlandscape-iphone.png* (480 pixels × 32 pixels)

    *   *[adbannerlandscape-iphone@2x.png](mailto:adbannerlandscape-iphone@2x.png)*
    (Retina: 960 pixels × 64 pixels)

    *   *adbannerportrait-ipad.png* (768 pixels × 66 pixels)

    *   *adbannerlandscape-ipad.png* (1024 pixels × 66 pixels)


    For consistency, the house ad uses the same banner sizes as supported by iAd.
    The iAd Network dynamically serves up high-resolution iAd banners for Retina display
    devices, so to maintain the same resolution quality, you should also create Retina
    display banner sizes for your house ad.


    If you don’t want to spend time designing your own house ad just to complete this
    tutorial, then as a placeholder, copy the six house ad PNG image files from the
    book’s downloadable `InAppAdv` project to your Xcode project’s *Shared* folder.


    Crafting the In-App Advertising Code


    For this last step, you’ll finally add the code for managing the iAd banner frame
    and the alternate house ad, along with the dynamic resizing of the app’s UI to
    accommodate the ad banner. This part requires the addition of a *lot* of new code.
    To avoid all of that manual typing, I’ll once again recommend downloading the
    book’s companion code examples, so that you can copy and paste the relevant code
    from the included `InAppAdv` project into your Xcode project.


    Open *MainViewController_iPhone.h* and add the following new code lines (shown
    in bold):


    ```

    #import <UIKit/UIKit.h>

    #import <iAd/iAd.h>


    @class Reachability;


    @interface MainViewController_iPhone : UIViewController <ADBannerViewDelegate>
    {


    UIView *contentView;

        ADBannerView *adBannerView;

        UIButton *altAdBannerButton;

        Reachability* netReachable;

        BOOL isNetAvailable;

    }


    @property (nonatomic, retain) IBOutlet UIView *contentView;

    @property (nonatomic, retain) IBOutlet ADBannerView *adBannerView;

    @property (nonatomic, retain) IBOutlet UIButton *altAdBannerButton;


    - (void)reachabilityChanged:(NSNotification*)note;

    - (void)prepareAdBannerView;

    - (void)prepareAltAdBanner;

    - (void)adjustAdBannerPosition:(BOOL)animated;

    - (void)tappedAltAdBanner;


    @end

    ```


    In a nutshell, this new code imports the *iAd.h* header file and initializes several
    new ad-related properties and methods for dealing with iAd and the alternate house
    ad.


    Notice that the iAd banner type being used is the `ADBannerView`. In order to
    receive messages from the iAd Network, this class is assigned as an `ADBannerViewDelegate`.
    To ensure the house ad is tappable, like a real banner ad, it will be created
    as an image-based `UIButton` via code. I’ll explain how the preparation and display
    of the iAd and alternate house ad are programmed when we add those respective
    methods to the *MainViewController.m* file.


    Of course, you’ll also need to add the identical bold code to *MainViewController_iPad.h*:


    ```

    #import <UIKit/UIKit.h>

    #import <iAd/iAd.h>


    @class Reachability;


    @interface MainViewController_iPad : UIViewController <ADBannerViewDelegate> {


    UIView *contentView;

        ADBannerView *adBannerView;

        UIButton *altAdBannerButton;

        Reachability* netReachable;

        BOOL isNetAvailable;

    }


    @property (nonatomic, retain) IBOutlet UIView *contentView;

    @property (nonatomic, retain) IBOutlet ADBannerView *adBannerView;

    @property (nonatomic, retain) IBOutlet UIButton *altAdBannerButton;


    - (void)reachabilityChanged:(NSNotification*)note;

    - (void)prepareAdBannerView;

    - (void)prepareAltAdBanner;

    - (void)adjustAdBannerPosition:(BOOL)animated;

    - (void)tappedAltAdBanner;


    @end

    ```'
  trans: "\n1.  在 Interface Builder 中打开 `MainViewController_iPhone.xib`。\n2.  在浏览器窗口中，你应该已经能看到一个\
    \ `UIView`，它已经连接到了默认的 `view` 引用插座。从库面板中拖拽一个新的 `UIView` 到浏览器窗口，并小心地将其定位为现有 `UIView`\
    \ 的嵌套子视图。将 `contentView` 的插座从 File's Owner 模块连接到这个新的、嵌套的 `UIView`。嵌套的 `UIView`（名为\
    \ `contentView`）和 iAd 横幅框架都将作为主父视图 `UIView`（名为 `view`）的子视图。\n3.  选中该嵌套的 `UIView`，导航到检查器面板的视图大小标签页，并修改其自动调整大小遮罩，使其自动全屏扩展（参见图\
    \ 7-12）。父 `UIView` 也应设置相同的自动调整大小遮罩（如果默认情况下尚未设置）。\n\n    ![9781430262381_Fig07-12.jpg](img/9781430262381_Fig07-12.jpg)\n\
    \n    图 7-12。在 `MainViewController_iPhone.xib` 中，构建嵌套的 `UIView` 层次结构、UI 元素和自动调整大小遮罩\n\
    \n    **注意** 尽管库面板确实提供了一个 iAd `BannerView` 组件，但*不要*在 Interface Builder 中将其添加到视图。在本例中，至关重要的一点是\
    \ iAd 横幅框架只能通过编程方式添加，这样 iAd 就可以根据运行时广告可用性和其他因素动态地滑入和滑出屏幕。你很快就会看到如何编写那段 iAd 代码。\n\
    \n4.  选中嵌套的 `UIView`（名为 `contentView`），在检查器面板的属性标签页中将其 Color Tint 更改为 75% 灰度，这样我们在屏幕上显示时，可以轻松地将这个\
    \ `UIView` 与其白色的父 `UIView` 区分开来。这个灰色的 `UIView` 将是你放置此屏幕所有 UI 元素的地方。可以将其视为应用界面的容器，其高度会根据需要调整，以便为屏幕底部的广告横幅框架腾出空间。\n\
    5.  为了演示方便，从库面板中向该嵌套的 `UIView` 添加两个 `UILabel`。\n6.  将一个 `UILabel` 移动到视图顶部，其标签文本设置为\
    \ **TOP of “contentView” UIVIew**。将该 `UILabel` 的自动调整大小遮罩设置为始终固定在屏幕顶部。\n7.  将第二个\
    \ `UILabel` 移动到视图底部，为其设置标签文本 **BOTTOM of “contentView” UIView**。将第二个 `UILabel`\
    \ 的自动调整大小遮罩设置为始终固定在屏幕底部。\n\n    **注意** 如果你不确定如何配置自动调整大小遮罩上的括号，请查看本书可下载的 `InAppAdv`\
    \ 项目，了解如何设置的示例。\n\n记得也要将这些添加和修改应用到 `MainViewController_iPad.xib`。\n\n为什么使用 `UILabel`？它们用作可见标记，指示在通过代码调整灰色\
    \ `contentView` 所分配的 `UIView` 的大小以为广告横幅框架腾出空间时，其顶部和底部的具体位置。当你在 iOS 模拟器或测试设备上运行应用并看到实际效果时，这一点会非常明显。但我们还没有准备好执行这一步。\n\
    \n最后一步是项目中最重要的一部分：编写管理整个应用内广告流程（从广告横幅请求到屏幕显示）的代码。\n\n**注意** 你可能会发现一些 UI 组件，例如\
    \ `UINavigationController`，无法在 Interface Builder 中添加到 `UIView`。对于这些情况，解决方案是在 Xcode\
    \ 中以编程方式创建这些 UI 组件，并通过代码将它们作为子视图添加到 `UIView`。\n\n### 将您的自有广告图片文件复制到项目\n\n如果出现没有\
    \ iAd 可供显示的情况，您需要显示一个替代广告横幅。在本例中，我们显示一个自有广告。在开始编写处理 iAd 和您替代广告横幅的代码之前，您需要为您的自有广告创建实际的图像文件，并将它们作为资源添加到\
    \ Xcode 项目中。\n\n为了支持 iPhone 和 iPad 的所有设备方向及显示分辨率，您需要按照下面列出的确切文件名和 PNG 格式，创建六种不同尺寸的自有广告，以便它们能与示例代码配合使用：\n\
    \n*   `adbannerportrait-iphone.png`（320 像素 × 50 像素）\n*   `adbannerportrait-iphone@2x.png`（Retina：640\
    \ 像素 × 100 像素）\n*   `adbannerlandscape-iphone.png`（480 像素 × 32 像素）\n*   `adbannerlandscape-iphone@2x.png`（Retina：960\
    \ 像素 × 64 像素）\n*   `adbannerportrait-ipad.png`（768 像素 × 66 像素）\n*   `adbannerlandscape-ipad.png`（1024\
    \ 像素 × 66 像素）\n\n为了保持一致性，自有广告使用与 iAd 支持的相同横幅尺寸。iAd Network 会动态地为 Retina 显示设备提供高分辨率\
    \ iAd 横幅，因此为了保持相同的分辨率质量，您也应该为您的自有广告创建 Retina 显示横幅尺寸。\n\n如果您不想仅仅为了完成本教程而设计自己的自有广告，那么作为占位符，请将本书可下载的\
    \ `InAppAdv` 项目中的六个自有广告 PNG 图像文件复制到您的 Xcode 项目的 `Shared` 文件夹中。\n\n### 编写应用内广告代码\n\
    \n在最后一步中，您将最终添加用于管理 iAd 横幅框架和替代自有广告的代码，以及用于适应广告横幅而动态调整应用 UI 大小的代码。这部分需要添加*大量*新代码。为了避免繁琐的手动输入，我再次建议您下载本书的配套代码示例，以便您可以将包含的\
    \ `InAppAdv` 项目中的相关代码复制并粘贴到您的 Xcode 项目中。\n\n打开 `MainViewController_iPhone.h` 并添加以下新代码行（以粗体显示）：\n\
    \n```\n#import <UIKit/UIKit.h>\n#import <iAd/iAd.h>\n\n@class Reachability;\n\n\
    @interface MainViewController_iPhone : UIViewController <ADBannerViewDelegate>\
    \ {\n\nUIView *contentView;\n    ADBannerView *adBannerView;\n    UIButton *altAdBannerButton;\n\
    \    Reachability* netReachable;\n    BOOL isNetAvailable;\n}\n\n@property (nonatomic,\
    \ retain) IBOutlet UIView *contentView;\n@property (nonatomic, retain) IBOutlet\
    \ ADBannerView *adBannerView;\n@property (nonatomic, retain) IBOutlet UIButton\
    \ *altAdBannerButton;\n\n- (void)reachabilityChanged:(NSNotification*)note;\n\
    - (void)prepareAdBannerView;\n- (void)prepareAltAdBanner;\n- (void)adjustAdBannerPosition:(BOOL)animated;\n\
    - (void)tappedAltAdBanner;\n\n@end\n```\n\n简而言之，这段新代码导入了 `iAd.h` 头文件，并初始化了几个新的与广告相关的属性和方法，用于处理\
    \ iAd 和替代自有广告。\n\n请注意，使用的 iAd 横幅类型是 `ADBannerView`。为了接收来自 iAd Network 的消息，该类被分配为\
    \ `ADBannerViewDelegate`。为了确保自有广告像真实广告横幅一样可点击，它将通过代码创建为一个基于图像的 `UIButton`。当我们把这些相应的方法添加到\
    \ `MainViewController.m` 文件中时，我将解释 iAd 和替代自有广告的准备和显示是如何编程的。\n\n当然，您还需要将相同的粗体代码添加到\
    \ `MainViewController_iPad.h`：\n\n```\n#import <UIKit/UIKit.h>\n#import <iAd/iAd.h>\n\
    \n@class Reachability;\n\n@interface MainViewController_iPad : UIViewController\
    \ <ADBannerViewDelegate> {\n\nUIView *contentView;\n    ADBannerView *adBannerView;\n\
    \    UIButton *altAdBannerButton;\n    Reachability* netReachable;\n    BOOL isNetAvailable;\n\
    }\n\n@property (nonatomic, retain) IBOutlet UIView *contentView;\n@property (nonatomic,\
    \ retain) IBOutlet ADBannerView *adBannerView;\n@property (nonatomic, retain)\
    \ IBOutlet UIButton *altAdBannerButton;\n\n- (void)reachabilityChanged:(NSNotification*)note;\n\
    - (void)prepareAdBannerView;\n- (void)prepareAltAdBanner;\n- (void)adjustAdBannerPosition:(BOOL)animated;\n\
    - (void)tappedAltAdBanner;\n\n@end\n```\n"
