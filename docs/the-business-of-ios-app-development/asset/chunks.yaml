    # 别指望用户会主动下载你的应用


    不要以为你提供了免费或精简版应用，用户就会花时间下载，也不要以为他们会跳到 `YouTube` 或你的网站去观看视频预告。他们已经身处 `App Store`
    中浏览，所以很可能懒得再跑去其他网站，尤其是在他们很忙的情况下（而大多数人确实很忙）。你的 `App Store` 产品页面需要说服用户下载你的应用，而该页面上最具影响力的元素很可能就是你的截图。


    既然视觉效果如此重要，那么上传最能突出应用核心功能与质量的截图就变得至关重要。如果是游戏，你的截图最好能**大声喊出**趣味和刺激！如果是效率应用，那么你的截图需要强调使用该应用后，用户的生活能变得多么美好。你的截图必须具有冲击力！


    ## 选择主截图


    展示的第一张截图最为重要。如果消费者不想点击或滑动查看其余截图，那么他们可能只会看到这一张。所以，请确保这张主截图能最好地通过视觉方式描述你的应用。看到它的人应该能立即理解应用的大致概念，而无需阅读描述或加载其他截图。这是一张**一图胜千言**的图片！


    花些时间浏览热门应用和游戏的 `App Store` 产品页面。分析每一个的主截图，特别是那些会与你应用竞争的同类应用。当你看到一张吸引眼球的截图时，试着分析究竟是什么让这张图片如此有效。


    表面上看，获胜因素可能仅仅是惊艳的界面设计，但请再仔细看看。许多最佳主截图都是经过精心**布置**来呈现良好效果的！不，我不是指用 `Photoshop`
    美化。我说的是展示应用的实际运行状态！如果是一款待办事项列表应用，不要显示一个空的新建列表。用它填满你的目标受众能理解的任务，向他们展示这个应用能让他们变得多么高效、节省多少时间。如果是一款太空大战游戏，就展示出核心乐趣因素，比如激光枪开火和外星飞船爆炸。你要让用户产生这样的反应：“哇，看起来真刺激……我必须现在就买！”


    目标不一定是要在截图中塞满尽可能多的动作。一张引人入胜的主截图，是能瞬间吸引你的目光，并用单一视觉元素成功描述核心功能的截图。


    Retro Dreamer 公司 `Sneezies` 游戏的 `App Store` 产品页面展示了一个有效主截图的绝佳例子（见图 11-2）。无需阅读应用描述，这张图片就让我很好地了解了它提供的游戏玩法。乍一看，目标似乎是让喷嚏精灵从漂浮的泡泡中解脱出来。果然，描述中的应用概要写着：“触摸屏幕，向漂浮的喷嚏精灵区域释放一阵喷嚏粉，看着它们打着喷嚏从泡泡中挣脱出来。尝试引发连锁反应，在这个家庭趣味解谜游戏中解救尽可能多的喷嚏精灵。”
    截图甚至展示了喷嚏粉的作用效果，以及几个喷嚏精灵挣脱泡泡、打开降落伞安全降落的画面。


    ![9781430262381_Fig11-02.jpg](img/9781430262381_Fig11-02.jpg)


    图 11-2。Retro Dreamer 的 `Sneezies`（由 Chillingo 发行）。无需阅读应用描述，这张主截图就告诉了我很多关于游戏玩法的信息，而且看起来纯粹就是好玩！


    `Sneezies` 的截图展示了核心游戏目标，同时避免了屏幕过于杂乱。它看起来纯粹有趣，而且对于所有年龄段的玩家来说，掌握基本玩法似乎并不困难。


    展示游戏运行状态似乎显而易见，但同样的策略也应该用于其他类型的应用。Rogue Sheep 公司 `Postage` 应用的主截图（图 11-3 左侧）提供了一个绝佳的例子，展示了你可以创建和发送的数字明信片。Imagam
    公司的 `iFiles` 应用的主截图（图 11-3 右侧）则通过在一个填充了文件的列表上方显示其自定义弹出菜单，展示了其众多文件管理和导出功能。展示应用实际活动的截图，能直观地向用户演示这些应用如何改善他们的生活或帮助他们提高效率。


    ![9781430262381_Fig11-03.jpg](img/9781430262381_Fig11-03.jpg)


    图 11-3。Rogue Sheep 的 `Postage`（左）和 Imagam 的 `iFiles`（右）的主截图，在单一图像中直观地展示了它们的许多功能和优势。


    Apple 建议从截图中移除状态栏，但在 `App Store` 浏览一圈，显然这条建议并非总被采纳。


    Apple 还建议直接从 `iPhone`、`iPad` 或 `iPod touch` 上截取截图，而不是使用 `iOS Simulator`。操作方法如下：当你准备截图时，同时按住设备的
    `Home` 键和 `Power` 键。截图会保存到设备的 `Photo Library`（照片图库）中。虽然你可以轻松地通过设备上的 `Photo Library`
    将截图通过电子邮件发送到你的桌面电脑，但你也可以将设备与桌面 `iTunes` 同步，然后启动 Mac 上的 `iPhoto` 应用来导入保存的 `PNG`
    格式截图。


    另一种选择是从 `Xcode Organizer` 窗口的 `Screenshots` 标签页中，从连接的设备上截取截图。然后，可以从那里将它们作为 `PNG`
    文件拖拽到 Mac 桌面上。


    ## 当截图不仅仅是截图时


    尽管 Apple 称其为截图（screenshots），但此功能并不局限于其字面定义。如果你的应用核心功能利用了加速计或特殊的多点触控手势，那么完全可以在截图中展示一张真实人物在
    `iOS` 设备上使用该应用的照片。


    Smule 的 `Ocarina` 应用，它能将你的 `iPhone` 变成一种乐器。该应用使用主截图（图 11-4）来展示如何利用设备的麦克风和触摸屏来“演奏”它。这张照片在描述这款独特应用方面，比实际的屏幕截图效果要好得多。由于用户的手指会遮挡部分应用界面，Smule
    巧妙地在这张照片中加入了 `Ocarina` 标志，以强化应用名称和品牌。


    ![9781430262381_Fig11-04.jpg](img/9781430262381_Fig11-04.jpg)


    图 11-4。由于 Smule `Ocarina` 应用利用了 `iPhone` 的麦克风和触摸屏功能，展示一张用户实际操作的照片，作为主图像比实际的截图要有效得多。


    如果你构建的应用功能极其丰富，简单的屏幕截图根本无法充分体现其优点，该怎么办？别担心。如果能在截图中加入文字有助于解释应用的工作原理，那么并没有规则禁止这样做。


    Guided Ways Technologies Ltd. 的 `Groups` 应用的主截图（图 11-5 左侧）就是一个文字使用的典范。它用额外的文字和图标来补充内置的界面视图，以此在视觉上推广其大量的关键功能。它还骄傲地展示了来自
    O''Reilly 的推荐。


    ![9781430262381_Fig11-05.jpg](img/9781430262381_Fig11-05.jpg)

