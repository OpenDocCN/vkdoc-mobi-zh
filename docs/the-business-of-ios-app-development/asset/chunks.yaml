    areas of your app’s navigational flow that could benefit from streamlining or
    simplifying actions. And when allowing a select group to test such an early prototype,
    you gain important insights about which interface elements are not intuitive to
    other people, allowing you to make important changes to your design before investing
    months in pursuing a wrong direction.


    For example, if your app is managed by a navigation controller or tab bar controller,
    then add that controller to your window in Interface Builder. In Xcode, write
    only the controller code necessary to enable moving from one screen to the next.
    Don’t worry about re-creating the individual UI controls in every screen. If you’ve
    already created mock-ups of your app’s various screens in Photoshop, Illustrator,
    or some other graphics editor, then simply crop and save those screens as PNG
    files. Import those PNG files into your Xcode project. By adding new subviews
    with UIImages to display each PNG file, the temporary UIImages can serve as dummy
    placeholders for those screens in Interface Builder (see [Figure 4-15](#9781430262381_Ch04.xhtml#Fig15)).


    ![9781430262381_Fig04-15.jpg](images/9781430262381_Fig04-15.jpg)


    [Figure 4-15](#9781430262381_Ch04.xhtml#_Fig15). Create quick prototypes by adding
    the minimum amount of navigation code needed to move from one screen to the next.
    Each screen subview can be faked by displaying Photoshop PNG files of your interface
    mock-ups in UIImages


    Usually, a navigation controller is wired up with enough code to move between
    your app’s various screens. On the selected subview in the example, an image is
    added and set to display the PNG mock-up of the default background with a fake
    text field. To enhance the prototype with additional functionality, you can add
    a few lines of code so that a mouse-click on that image triggers the display of
    a new subview layer that shows a PNG mock-up of a fake iOS keyboard. Based on
    your own needs, you can decide how much extra interactivity you want to add to
    your prototypes.


    After testing the prototype, receiving valuable feedback, and making any improvements
    to your app design, you can strip out the small amount of temporary code and related
    UIImage elements. Now you’re ready to build the real subviews and controls on
    top of your existing controller code to start fleshing out the interface and feature
    set of your newly optimized app architecture.


    As an alternative, if you’ve already created PNG or JPEG mock-ups of your various
    app screens using Photoshop or a similar graphics tool, and you’re interested
    in previewing them on an actual iOS device, then the following solutions are worth
    exploring:


    *   Axure RP (`http://www.axure.com`)

    *   Briefs (`http://github.com/capttaco/Briefs`)

    *   Mockabilly (`http://www.mockabilly.com`)


    I highly recommend Axure to start off with because it can be low fidelity or you
    can make high-fidelity working prototypes. Your prototypes are generated as HTML/JS/CSS
    files, which you can run on Safari on the device. To learn more about how to generate
    prototypes on your iOS device, go to `www.axure.com/learn/iphone-app/viewing-and-settings`.


    Briefs also allow you to assign interactions to specific regions of each screen
    (such as buttons and table view rows) for testing on-device usability. It is powerful
    tool that has a companion iPad app as well. Briefs also comes in handy as a tool
    to visualize the flow of your app.


    Test User Interactions Using Your Prototype


    After you’ve created and tweaked your design, and you’re finally happy with the
    way your interface looks, it’s time to fire up Xcode and Interface Builder. Creating
    a new Xcode project, you could immediately go to work re-creating your UI design
    with real UIKit components or your own custom controls in Interface Builder, but
    before you put too much effort into writing a lot of code, you may want to first
    test the usability of your new UI design.


    Think Outside the Box


    Creating a custom UI for a nongame app can be very rewarding. Why should games
    have all the fun? There’s no reason utility and productivity apps can’t be just
    as visually appealing. Unique and exciting UIs can get people talking, which results
    in free publicity for your app. Mac OS X users saw this strategy work wonders
    for Delicious Monster with the cutting-edge UI of its successful Delicious Library
    software application.


    If you have your heart set on creating a custom interface, here’s one important
    rule to remember: don’t overthink the design. Being innovative is good, as long
    as it does not make your UI less intuitive to use. With such a small screen for
    mobile usage, less is more. Take special care that your custom design does not
    add extra complexity to your interface.


    Paper by FiftyThree breaks convention with a totally unique interface design (see
    [Figure 4-16](#9781430262381_Ch04.xhtml#Fig16)). The app provides users with the
    opportunity to just launch the app and start sketching their ideas beautifully.
    Simplifying the UI to focus on the essentials has made it the go-to app for anyone
    needing to make a sketch. Paper also incorporates unique gestures to help remove
    the clutter of buttons for actions like back, undo, zoom, and so forth. Paper
    has been featured on Apple on numerous occasions and it has won Apple’s Design
    award as well.


    ![9781430262381_Fig04-16.jpg](images/9781430262381_Fig04-16.jpg)


    [Figure 4-16](#9781430262381_Ch04.xhtml#_Fig16). Paper by FiftyThree effectively
    balances beauty and simplicity to provide a satisfying and intuitive user experience


    What makes Paper’s design so effective and easy to use is that behind the meticulously
    crafted UI is an extremely simple concept: a series of notebooks that you can
    open and close with a simple pinch gesture. So, even though the interface is unlike
    any of the usual UIKit elements, everyone knows how to use the swipe and pinch
    gestures.'
  trans: '

    我个人非常喜欢使用一款名为 POP（纸上原型设计）的应用（见图 4-14）。它仅适用于 iPhone，但能让您用相机拍下 App 草图，并通过这些草图创建一个可运行的
    App。您可以快速绘制几个界面，设定屏幕的特定区域链接到其他页面，并设置相应的过渡效果。将原型交给任何用户，就能快速获得反馈。


    ![9781430262381_Fig04-14.jpg](img/9781430262381_Fig04-14.jpg)


    图 4-14. POP——纸上原型设计，目前仅适用于 iPhone/iPod


    请记住，归根结底，您的目标是获得有价值的反馈，以提升用户体验。在 App 的整个创建过程中，要尽量多接触用户。根据我的经验，如果我想快速测试某个功能，我会用
    POP 或其他软件制作低保真原型。但如果我想针对一个重要的流程获得更深入、更具启发性的反馈，我会将模拟图制作得保真度更高，并让原型具备功能性。


    您可以通过仅编写模拟预期操作流程所需的最少 UI 元素代码，快速创建一个 App 的半功能性原型。尽管您可能认为这需要为 App 中的大部分控件编写至少基本的代码，但实际上有很多方法可以“假装”来实现，从而避免编写代码并节省时间。如果您只是想快速在
    iOS 模拟器中测试一个 UI 概念，或者编译并分发一个快速原型给其他人以获取反馈，这种方法尤其方便。这一步在发现 App 导航流程中可能存在问题、可能需要简化或精简操作的区域时，具有极大的价值。当您让一个精选的测试小组试用这种早期原型时，您能获得关于哪些界面元素对其他人来说不够直观的重要见解，从而在投入数月时间走向错误方向之前，对设计做出重要更改。


    例如，如果您的 App 由导航控制器或标签栏控制器管理，那么在 Interface Builder 中，将该控制器添加到您的窗口中。在 Xcode 中，仅编写实现从一个界面跳转到下一个界面所必需的控制器代码。不必担心在每个界面中重新创建单个
    UI 控件。如果您已经在 Photoshop、Illustrator 或其他图形编辑器中创建了 App 各个界面的模拟图，那么只需将这些界面截图并保存为 PNG
    文件，再将 PNG 文件导入到您的 Xcode 项目中即可。通过添加带有 `UIImage` 的新子视图来显示每个 PNG 文件，这些临时的 `UIImage`
    就可以在 Interface Builder 中作为那些界面的虚拟占位符（见图 4-15）。


    ![9781430262381_Fig04-15.jpg](img/9781430262381_Fig04-15.jpg)


    图 4-15. 通过添加从一个界面跳转到下一个界面所需的最少导航代码来创建快速原型。每个界面的子视图可以通过显示您用 Photoshop 制作的界面模拟图的
    PNG 文件来模拟，并放置在 `UIImages` 中


    通常，导航控制器会配置足够的代码，以便在 App 的各个界面之间切换。在示例中选定的子视图上，添加了一个图像并将其设置为显示 PNG 模拟图——带有模拟文本字段的默认背景。为了给原型增加更多功能，您可以添加几行代码，使得点击该图像时能触发显示一个新的子视图层，该层显示一个模拟
    iOS 键盘的 PNG 图片。根据您的需求，您可以决定为原型添加多少额外的交互性。


    在测试原型、获得有价值的反馈并对 App 设计进行改进之后，您可以移除少量临时代码和相关的 `UIImage` 元素。现在，您就可以在现有的控制器代码基础上，构建真正的子视图和控件，开始充实您新优化过的
    App 架构的界面和功能集了。


    另外，如果您已经使用 Photoshop 或类似的图形工具创建了 App 各个界面的 PNG 或 JPEG 模拟图，并且希望在真实的 iOS 设备上预览它们，那么以下解决方案值得探索：


    *   Axure RP (`http://www.axure.com`)

    *   Briefs (`http://github.com/capttaco/Briefs`)

    *   Mockabilly (`http://www.mockabilly.com`)


    我强烈推荐从 Axure 开始，因为它既可以制作低保真原型，也可以制作高保真可运行原型。您的原型会生成为 HTML/JS/CSS 文件，您可以在设备上的 Safari
    浏览器中运行它们。要了解更多关于如何在您的 iOS 设备上生成原型的信息，请访问 `www.axure.com/learn/iphone-app/viewing-and-settings`。


    Briefs 也允许您将交互指定给每个界面的特定区域（例如按钮和表格视图行），以便在设备上进行可用性测试。它是一个强大的工具，并且有一个配套的 iPad 应用。Briefs
    作为可视化 App 流程的工具也非常方便。


    ### 使用原型测试用户交互


    在您创建并调整好设计，最终对自己的界面外观感到满意后，就该启动 Xcode 和 Interface Builder 了。创建一个新的 Xcode 项目后，您可以立即开始工作，在
    Interface Builder 中使用真实的 UIKit 组件或您自己的自定义控件重新创建 UI 设计。但是，在您投入过多精力编写大量代码之前，您可能想先测试一下新
    UI 设计的可用性。


    ### 跳出框架思考


    为非游戏 App 创建自定义 UI 可以带来丰厚的回报。为什么只有游戏才能充满乐趣？实用性和效率型 App 同样可以具有视觉吸引力。独特且令人兴奋的 UI
    能引起人们讨论，从而为您的 App 带来免费的宣传。Mac OS X 用户见证了这种策略对 Delicious Monster 产生的奇效，该公司凭借其成功的
    Delicious Library 软件应用的前沿 UI 取得了巨大成功。


    如果您下定决心要创建自定义界面，请记住一个重要规则：不要过度设计。创新是好事，但前提是不能让您的 UI 变得不够直观。对于移动设备上如此小的屏幕而言，少即是多。要特别注意，您的自定义设计不能给界面增加额外的复杂性。


    FiftyThree 的 Paper 应用以其完全独特的界面设计打破了常规（见图 4-16）。该应用让用户能够直接启动应用，开始精美地勾勒他们的想法。通过简化
    UI 以专注于核心功能，它已成为任何需要绘制草图人士的首选应用。Paper 还融入了独特的手势操作，有助于消除后退、撤销、缩放等操作按钮带来的杂乱感。Paper
    曾多次被苹果公司推荐，并获得了苹果设计大奖。


    ![9781430262381_Fig04-16.jpg](img/9781430262381_Fig04-16.jpg)


    图 4-16. FiftyThree 的 Paper 应用巧妙地平衡了美感与简洁性，提供了令人满意且直观的用户体验


    Paper 的设计之所以如此有效且易于使用，是因为其精心打造的 UI 背后是一个极其简单的概念：一系列只需用简单的捏合手势就能打开和关闭的笔记本。因此，即使其界面不同于任何常见的
    `UIKit` 元素，每个人都知道如何使用滑动和捏合手势。

    '
- fmt: '另一个很好的例子是雅虎的天气应用，它提供了精美的自定义界面，同时保持着易用性。尽管 App Store 中已经有数十款天气应用，但大多数都没有抓住用户的真正需求。雅虎没有向用户灌输过多信息，而是仅提供用户想要查看的主要信息。用户的通常行为是每天可能打开一次天气应用查看天气预报，本质上只是为了快速了解当天的情况。雅虎还允许用户通过向下滚动来获取更详细的信息（参见[图
    4-17](#9781430262381_Ch04.xhtml#Fig17)）。雅虎天气的自定义 UI 成功地在无需额外学习成本的情况下，提供了独特的用户体验。


    ![9781430262381_Fig04-17.jpg](images/9781430262381_Fig04-17.jpg)


    [图 4-17](#9781430262381_Ch04.xhtml#_Fig17). 雅虎天气令人惊艳的 UI 出奇地简洁，同时在一瞥之间提供了用户所需的一切。


    只要你避免了那些可能导致应用被苹果拒绝的已知问题，并记住像用户一样思考，维护一个直观且易用的 UI，那么在界面设计上突破常规就能提供有吸引力的用户体验，并有可能获得更多的关注和销量。


    有时，为特定页面或应用风格寻找灵感是很困难的。务必看看别人在做什么，并思考如何将富有创意且直观的交互融入到你自己的应用中。我推荐以下网站，以了解最新的应用和模式设计：


    - Pttrns (`http://www.pttrns.com`)：iPhone 和 iPad 用户界面模式库

    - Pattern Tap Library (`http://www.patterntap.com`)


    ## 其他需要考虑的因素


    希望现在你对如何着手设计应用有了更好的思路。请记住，视觉设计只是过程的一部分；从长远来看，应用的流程以及与用户的交互方式同样重要，甚至更为重要。一旦你专注于用户，你就可以在前进过程中不断改进设计。我们讨论了你可以为设计做出贡献以及识别优秀设计的方法；现在我们将介绍提升和贡献于设计的其他机会。


    ## UIKit 的舒适熟悉感


    在选择设计自定义界面而非使用苹果提供的标准 UIKit 控件之前，请确保你有非常充分的理由。如前所述，雅虎天气应用中的自定义控件有助于强化其独特的交互，同时忠实于类似
    UIKit 组件的熟悉功能，例如屏幕右上角和左上角的导航元素。雅虎的设计意图似乎得到了很好的体现和印证，但请不要为了耍小聪明而重头造轮子。


    如果你正在构建一个复杂、功能丰富且旨在存储大量数据的应用，你可能需要三思而后行，再引入带有新视觉隐喻的自定义 UI。如果你的应用界面显得过于杂乱和复杂，你就有让用户不知所措的风险。你的自定义设计元素可能因为你创建了它们而感觉直观，但对于新用户来说，你独特的视觉效果可能会显得陌生和令人困惑。任何导致用户沮丧的事情都可能导致负面的客户评分和评论，这显然不利于你的应用销售。


    由于已有数千款应用使用了苹果的标准 UIKit 框架，用户已经知道如何操作那些标准组件。通过依赖 UIKit，你的应用可以最大限度地降低新用户的学习成本。这使得人们能够专注于应用的核心功能，而不会在琢磨如何使用你的界面上陷入困境。


    苹果在其原生界面元素上投入了大量心思，以确保它们以高度紧凑、精简的方式在视觉上传达其功能。如果你不能创造出比 UIKit 已包含的组件更好的东西，那就不要这样做。


    ## 可扩展性


    在设计界面时，可扩展性是一个需要牢记的重要因素。如果你的应用有四个不同的部分，那么标签栏控制器似乎是方便访问每个部分的最佳 UI 选择。但在你决定走这条路之前，请考虑你为未来更新规划的功能。如果你计划以后集成更多部分，标签栏控制器可能不是最佳选择，因为在竖屏模式下它只能舒适地显示四到五个标签。为了给你的应用留出未来发展的空间，你可能需要考虑使用表格视图来列出这些部分。


    可扩展性是你 UI 设计每个方面都需要考虑的因素，因为你不想因为空间不足，而在 2.0 或 3.0 版本中被迫彻底更改界面。要求你的客户在习惯了你原始 UI
    之后再去学习如何使用新 UI，只会让他们感到厌烦。这甚至可能让你失去一些因为沮丧而决定改用竞品应用的客户。


    如果你对在应用中使用 UIKit 元素感兴趣，但又担心界面看起来与其他类似应用太像，你可以采取一些措施来让你基于 UIKit 的界面变得独特。让我们来看看几个选项。


    ## 图标与图像


    你在应用界面中使用的图标和图像，对于赋予应用独特的视觉标识可以产生巨大的影响。尽量不要为你的图标使用剪贴画素材，这只会让 UI 显得廉价。你需要所有图标在设计上保持一致，而不是来自不同风格的杂七杂八的剪贴画集合。你也不希望任何用户认出你的图标是他们在其他地方见过的剪贴画，因为这会自动降低你应用的感知质量。


    如果你自己没有设计能力来创作自己的艺术作品，正如我前面说过的，我强烈建议聘请一位专业的平面设计师。如果你已经请人创建了应用图标和 Logo，可以看看同一个人是否也能为你设计
    UI 图标和图像，以实现一致的整体主题。


    通常，图标与某个结果动作相关联。例如，当你显示一个垃圾桶图标时，它通常指的是删除操作。你的设计应该平衡图标和文字，文字仅用于向用户传达该图标将产生的动作。就像我们之前讨论过的，你会注意到图标用于标签栏，但对于全局导航，通常只会有像`Edit`或`Logout`这样的文字。


    设计图标绝非易事，尤其是你试图通过点击图标来传达将要发生的整个动作或事件。当前的趋势是使用线型图标，或者说是内部为空且有描边的图标。你需要为每个图标制作两个版本：一个是空心的且带有描边，另一个是实心的。前者传达未选中状态，后者传达选中或已选择状态。我不是在重复老生常谈，但这又是一个简洁性最能确保用户轻松理解每个图标含义的场合。向选定的用户群体展示一个粗糙的原型，有助于找出用户难以识别的图标，这样你就可以在开始对成品应用进行
    Beta 测试之前，相应地修改图标的设计。'
  raw: 'Another good example of an app that delivers a beautiful custom interface
    while remaining very easy to use is Yahoo!’s Weather app. Although there are already
    dozens of weather apps in the App Store, most of them miss the point of what a
    user really wants. Instead of overloading the user with information, Yahoo! takes
    the approach of offering just the main information a user wants to see. The normal
    behavior of a user is to open a weather app maybe once a day to see the weather
    forecast, essentially just to get a snapshot of the day. Yahoo! also allows users
    to dig a little deeper by giving access to detailed information simply by scrolling
    down (see [Figure 4-17](#9781430262381_Ch04.xhtml#Fig17)). The custom UI of Yahoo!
    Weather succeeds in offering a unique user experience with no additional learning
    curve.


    ![9781430262381_Fig04-17.jpg](images/9781430262381_Fig04-17.jpg)


    [Figure 4-17](#9781430262381_Ch04.xhtml#_Fig17). The stunning UI Yahoo! Weather
    remains surprisingly simplistic while still offering everything a user needs at
    a glance


    As long as you avoid known issues that can get your app rejected by Apple, and
    remember to think like a user to maintain a UI that’s intuitive and easy to use,
    pushing the envelope on interface design can offer an attractive user experience
    with the potential to garner increased publicity and sales.


    Sometimes it is hard to find the inspiration you need for a particular page or
    the style of the app. Be sure to see what others are doing and how you can incorporate
    creative and intuitive interactions in to your own app. I recommend the following
    web sites to see the latest app and pattern designs:


    *   Pttrns (`http://www.pttrns.com`) library of iPhone and iPad user interface
    patterns

    *   Pattern Tap Library (`http://www.patterntap.com`)


    Other Factors to Consider


    Hopefully you now have a better idea of how to go about designing your app. Remember,
    visual design is just one part of the process; how the app flows and interacts
    with the user is just as—if not more—important in the long run. Once you focus
    on the user, then you can always improve the design as you move forward. We discussed
    ways you can contribute to design and recognize a good design; now we’ll go over
    other opportunities to enhance and contribute to your design.


    The Comfortable Familiarity of UIKit


    Before choosing to design a custom interface instead of using the standard UIKit
    controls provided by Apple, make sure you have very valid reasons to do so. As
    previously mentioned, the custom controls in Yahoo!’s Weather app help reinforce
    its unique interaction, staying true to the familiar functionality of similar
    UIKit components, such as navigational elements in the top right and left of the
    screen. Yahoo!’s design intentions appear well served and justified, but don’t
    you reinvent the wheel just for the sake of being clever.


    If you’re building a complex, feature-rich app that’s intended to store a lot
    of data, you may want to think twice about introducing a custom UI with new visual
    metaphors. If your app’s interface appears to be too cluttered and complicated,
    you run the risk of overwhelming users. Your custom design elements may seem intuitive
    to you because you created them, but to newcomers, your unique visuals may feel
    foreign and confusing. Anything that causes frustration can lead to negative customer
    ratings and reviews, which obviously won’t help your app sales.


    With thousands of apps already using Apple’s standard UIKit framework, users already
    know how to operate those standard components. By relying on UIKit, your app minimizes
    the learning curve for new customers. This allows people to focus on your app’s
    core functionality without getting bogged down in figuring out how to use your
    interface.


    Apple has put a lot of thought into its native interface elements to ensure they
    visually communicate their function using a highly compact, streamlined approach.
    If you can’t create something better than what’s already included in UIKit, then
    don’t.


    Extensibility is an important factor to keep in mind when designing your interface.
    If there are four distinct sections in your app, a tab bar controller may seem
    like the best UI choice for easily accessing each of the sections. But before
    you decide to go that route, think about the features you have planned for future
    updates. If you plan on later integrating additional sections, a tab bar controller
    is probably not the best choice, since it can comfortably display only four or
    five tabs in portrait mode. To give your app room to grow in the future, you may
    want to consider using a table view to list those sections.


    Extensibility is a consideration for every aspect of your UI design, since you
    don’t want to be forced to radically change the interface in version 2.0 or 3.0
    because you ran out of room. Requiring your customers to learn how to use a new
    UI after they’ve grown accustomed to using your original UI will only agitate
    them. It may even cost you a few customers who decide to switch to a competitor’s
    app out of frustration.


    If you’re interested in using UIKit elements in your app but worry about your
    interface looking too much like similar apps, you can do several things to make
    your UIKit-driven interface unique. Let’s look at a few options.


    Icons and Images


    The icons and imagery you use within your app’s interface can make a huge difference
    in giving your app a unique visual identity. Try not to use stock clip-art for
    your icons, which will only cheapen the look of your UI. You want all of your
    icons to be consistent in design, and not a motley collection of stock clip-art
    from different styles. You also do not want any of your users to recognize any
    of your icons as clip art they’ve seen in other places, since that automatically
    lowers the perceived quality of your app.


    If you don’t have the design chops to create your own artwork, as I’ve said before,
    I highly recommend hiring a professional graphic designer. If you’ve already had
    someone create your app icon and logo, see whether that person is also able to
    design your UI icons and imagery for a consistent overall theme.


    Normally an icon is associated with some resulting action. For example, when you
    display a garbage can icon, it usually refers to the action of deleting. Your
    design should have a balance of icons, with text only to communicate to the user
    the action that it will produce. Like we discussed before, you will notice that
    icons are used in the tab bar, but for global navigation, typically there is only
    text like Edit or Logout.


    Designing icons is certainly no easy task, especially since you are trying to
    communicate an entire action or event that will take place upon clicking the icon.
    The trend is now toward line icons or icons that have an empty fill and a stroke
    around it. You have to produce two versions of each icon, one being empty with
    a stroke around it, and another one that is filled in. The first communicates
    an inactive state and the latter communicates an active or selected state. Not
    to sound like a broken record, but this is yet another occasion when simplicity
    works best to ensure that the user can easily understand the meaning behind each
    and every icon. Showing a rough prototype to a select group can help pinpoint
    icons that users are having trouble identifying, so that you can modify an icon’s
    design accordingly long before you start beta testing a finished app.'
  trans: '

    另一个很好的例子是雅虎的天气应用，它提供了精美的自定义界面，同时保持着易用性。尽管 App Store 中已经有数十款天气应用，但大多数都没有抓住用户的真正需求。雅虎没有向用户灌输过多信息，而是仅提供用户想要查看的主要信息。用户的通常行为是每天可能打开一次天气应用查看天气预报，本质上只是为了快速了解当天的情况。雅虎还允许用户通过向下滚动来获取更详细的信息（参见图
    4-17）。雅虎天气的自定义 UI 成功地在无需额外学习成本的情况下，提供了独特的用户体验。


    ![9781430262381_Fig04-17.jpg](img/9781430262381_Fig04-17.jpg)


    图 4-17. 雅虎天气令人惊艳的 UI 出奇地简洁，同时在一瞥之间提供了用户所需的一切。


    只要你避免了那些可能导致应用被苹果拒绝的已知问题，并记住像用户一样思考，维护一个直观且易用的 UI，那么在界面设计上突破常规就能提供有吸引力的用户体验，并有可能获得更多的关注和销量。


    有时，为特定页面或应用风格寻找灵感是很困难的。务必看看别人在做什么，并思考如何将富有创意且直观的交互融入到你自己的应用中。我推荐以下网站，以了解最新的应用和模式设计：


    - Pttrns (`http://www.pttrns.com`)：iPhone 和 iPad 用户界面模式库

    - Pattern Tap Library (`http://www.patterntap.com`)


    ## 其他需要考虑的因素


    希望现在你对如何着手设计应用有了更好的思路。请记住，视觉设计只是过程的一部分；从长远来看，应用的流程以及与用户的交互方式同样重要，甚至更为重要。一旦你专注于用户，你就可以在前进过程中不断改进设计。我们讨论了你可以为设计做出贡献以及识别优秀设计的方法；现在我们将介绍提升和贡献于设计的其他机会。


    ## UIKit 的舒适熟悉感


    在选择设计自定义界面而非使用苹果提供的标准 UIKit 控件之前，请确保你有非常充分的理由。如前所述，雅虎天气应用中的自定义控件有助于强化其独特的交互，同时忠实于类似
    UIKit 组件的熟悉功能，例如屏幕右上角和左上角的导航元素。雅虎的设计意图似乎得到了很好的体现和印证，但请不要为了耍小聪明而重头造轮子。


    如果你正在构建一个复杂、功能丰富且旨在存储大量数据的应用，你可能需要三思而后行，再引入带有新视觉隐喻的自定义 UI。如果你的应用界面显得过于杂乱和复杂，你就有让用户不知所措的风险。你的自定义设计元素可能因为你创建了它们而感觉直观，但对于新用户来说，你独特的视觉效果可能会显得陌生和令人困惑。任何导致用户沮丧的事情都可能导致负面的客户评分和评论，这显然不利于你的应用销售。


    由于已有数千款应用使用了苹果的标准 UIKit 框架，用户已经知道如何操作那些标准组件。通过依赖 UIKit，你的应用可以最大限度地降低新用户的学习成本。这使得人们能够专注于应用的核心功能，而不会在琢磨如何使用你的界面上陷入困境。


    苹果在其原生界面元素上投入了大量心思，以确保它们以高度紧凑、精简的方式在视觉上传达其功能。如果你不能创造出比 UIKit 已包含的组件更好的东西，那就不要这样做。


    ## 可扩展性


    在设计界面时，可扩展性是一个需要牢记的重要因素。如果你的应用有四个不同的部分，那么标签栏控制器似乎是方便访问每个部分的最佳 UI 选择。但在你决定走这条路之前，请考虑你为未来更新规划的功能。如果你计划以后集成更多部分，标签栏控制器可能不是最佳选择，因为在竖屏模式下它只能舒适地显示四到五个标签。为了给你的应用留出未来发展的空间，你可能需要考虑使用表格视图来列出这些部分。


    可扩展性是你 UI 设计每个方面都需要考虑的因素，因为你不想因为空间不足，而在 2.0 或 3.0 版本中被迫彻底更改界面。要求你的客户在习惯了你原始 UI
    之后再去学习如何使用新 UI，只会让他们感到厌烦。这甚至可能让你失去一些因为沮丧而决定改用竞品应用的客户。


    如果你对在应用中使用 UIKit 元素感兴趣，但又担心界面看起来与其他类似应用太像，你可以采取一些措施来让你基于 UIKit 的界面变得独特。让我们来看看几个选项。


    ## 图标与图像


    你在应用界面中使用的图标和图像，对于赋予应用独特的视觉标识可以产生巨大的影响。尽量不要为你的图标使用剪贴画素材，这只会让 UI 显得廉价。你需要所有图标在设计上保持一致，而不是来自不同风格的杂七杂八的剪贴画集合。你也不希望任何用户认出你的图标是他们在其他地方见过的剪贴画，因为这会自动降低你应用的感知质量。


    如果你自己没有设计能力来创作自己的艺术作品，正如我前面说过的，我强烈建议聘请一位专业的平面设计师。如果你已经请人创建了应用图标和 Logo，可以看看同一个人是否也能为你设计
    UI 图标和图像，以实现一致的整体主题。


    通常，图标与某个结果动作相关联。例如，当你显示一个垃圾桶图标时，它通常指的是删除操作。你的设计应该平衡图标和文字，文字仅用于向用户传达该图标将产生的动作。就像我们之前讨论过的，你会注意到图标用于标签栏，但对于全局导航，通常只会有像`Edit`或`Logout`这样的文字。


    设计图标绝非易事，尤其是你试图通过点击图标来传达将要发生的整个动作或事件。当前的趋势是使用线型图标，或者说是内部为空且有描边的图标。你需要为每个图标制作两个版本：一个是空心的且带有描边，另一个是实心的。前者传达未选中状态，后者传达选中或已选择状态。我不是在重复老生常谈，但这又是一个简洁性最能确保用户轻松理解每个图标含义的场合。向选定的用户群体展示一个粗糙的原型，有助于找出用户难以识别的图标，这样你就可以在开始对成品应用进行
    Beta 测试之前，相应地修改图标的设计。

