- fmt: '# Marketing Your App


    You can’t sell people a solution for an issue that they aren’t aware they have.
    That’s why your marketing focus must illustrate the inadequacies of the current
    options available (or the lack thereof). Show how your app addresses that void
    and can save them time, improve their workflow, provide happiness, or whatever
    it does that would enhance their daily lives (as all software should strive to
    achieve). For an entirely new app category, you sell the solution by showcasing
    the problem.


    ## Enhancing the Mobile Experience


    When building an app for a mobile device such as the `iPhone`, `iPod touch`, or
    `iPad`, keep in mind that whatever features your app provides, it should do so
    in the most streamlined and convenient manner possible. Consumers may be using
    your app with only one hand (or a single thumb) while on the go. Take advantage
    of the unique mobile frameworks that Apple provides. Think about how you could
    simplify your app’s features and usability by directly accessing built-in technologies
    such as the accelerometer, location awareness, `Wi-Fi`, and the cellular network,
    as well as the phone, mail, and calendar support.


    A basic example of this is an app that searches for local businesses. Instead
    of forcing users to always type a ZIP code or an address (which can often be very
    inconvenient in a mobile environment), enable an option to easily discover their
    current location using Apple’s location-awareness frameworks. Just be sure to
    have the app first ask their permission. For privacy reasons, some consumers may
    not want to reveal their current location.


    A large-scale example of a product that enhances the mobile experience is Bump,
    a free `iPhone` app that makes swapping contact information (as well as pictures,
    calendar events, and other data) as easy as bumping hands with another Bump user
    (see [Figure 2-1](#9781430262381_Ch02.xhtml#Fig1)). Exchanging contact information
    is not a new concept in smartphones. For years, numerous mobile apps have tried
    to streamline this process in handheld devices, but they typically involve too
    many button clicks with complicated methods of “beaming” vCard-formatted data.
    Some of them are even limited to sending vCards via e-mail, which adds more steps.
    The developers of Bump took advantage of built-in `iOS` technologies to simplify
    this need into a single action, which swaps contact information instantly and
    securely.


    ![9781430262381_Fig02-01.jpg](images/9781430262381_Fig02-01.jpg)


    [Figure 2-1](#9781430262381_Ch02.xhtml#_Fig1). Bump enhances the mobile experience
    by greatly simplifying the exchange of contact information between two people


    “Our primary goal when designing Bump was to create a simple, fun, and intuitive
    way to connect two phones,” says David Lieb, cofounder and president of Bump Technologies,
    Inc. “The accelerometer and location services allow us to do that. Bump monitors
    the output of the accelerometers and sends the output of the accelerometers up
    to the global Bump servers whenever a physical bump is felt. The servers then
    match up any pair of phones that felt the same bump at the same time in the same
    location. This allows connections to be made between any two phones with just
    a simple bump of the hands.”


    Lieb adds, “The idea for Bump came out of a moment of frustration (well, actually,
    two moments). Back in 2005, I was working as an engineer, and it really bothered
    me that in order to get some simple data like names and phone numbers from one
    phone to another one not 12 inches away from it, I had to ask someone to read
    out their information, and I had to type it in. I wanted to be able to just touch
    the phones together and transfer the information—but the phones of 2005 didn’t
    have what it takes to make that work. Fast-forward to 2008, when I went to business
    school and found myself typing in the phone numbers of dozens of new classmates.
    Same frustration, but this time, I noticed everyone was carrying smartphones,
    many of which had accelerometers and location awareness. So we decided to build
    Bump.”


    Even though the app’s idea stemmed from the needs of its own developers, it appears
    to be fulfilling a common need that many people have. In 2010, Bump surpassed
    10 million downloads in the App Store.


    The same logic of simplifying mobile tasks also applies for those developers who
    want to port their own Mac or Windows software apps into companion `iOS` versions.
    Don’t just repackage the same features in an `iPhone` or `iPad` interface. By
    designing your app to be easier to use for the often one-handed, fast-paced world
    of mobile users, not only will you strengthen the loyalty of your existing customers,
    but your `iOS` app may also attract new users to your desktop versions.


    Some people have even been known to switch from another mobile device (such as
    BlackBerry or Windows Mobile) to an iPhone just so they can use a specific app
    that’s not available on any other mobile platform; today that is much less the
    case, but it still happens.


    ## Competing with Similar Apps


    Does the world really need any more to-do lists, shopping lists, tip calculators,
    music jukebox quizzes, or fart apps? If you think it does, then it must be because
    you’ve identified some new feature that none of the other apps has tapped into—a
    feature that people want and need. If not, trying to compete with the hundreds
    of existing tip calculators, to-do lists, and so on, may be futile, especially
    if really good ones have already captured that particular niche market, or rank
    high on the charts.


    Perform an App Store search for *tip*, and you’ll discover that there are currently
    more than 2,200 tip calculator apps in the App Store. True, it’s a great idea
    for a mobile app, but how do you find an audience for your new app when competing
    with so many existing tip calculators, especially when some of them are very well
    done and have been heavily featured in the media? One of the most popular ones,
    Tipulator, was even showcased in an Apple iPhone ad. The point here is that there
    is really only so much a tip calculator can do and simply throwing your version
    into the App Store may not be the best idea.


    Sure, it might be a lot easier to quickly churn out a tip calculator app than
    to develop a complicated 3D game, but looking at such heavy competition in this
    space, would even such a simple app be worth developing if you couldn’t sell that
    app? It’s difficult to justify putting any amount of time into a venture—no matter
    how small—if it turns out to be a bad investment. If you can’t offer a fresh approach
    or new features that would motivate users to choose your app over the hundreds
    of other similar apps, you may want to try another app idea.


    Ah, but if you do know how to build a better mousetrap, then that knowledge, along
    with some creative marketing, may be enough to gain a toehold in the market. Just
    look at how many Twitter client apps there are, yet new ones pop up all the time
    with bigger and better features or a more intuitive mobile interface, causing
    users to switch. This is because users are more likely to discover new apps they
    consider fun or entertaining.'
