    # 用户定向与广告收入


    你成功的另一个关键要素是广告定向。确保你选择的广告网络能够将合适的广告与你的应用特定受众群体相匹配。例如，如果你的应用主要面向男性用户（如 `iPad 版
    Maxim HD`），那么女性时尚和化妆品的广告很可能不适合这个人群。无法吸引用户注意力的不相关广告将不会被点击。点击量越少，你的广告收入就越低。


    ## 收入与填充率


    广告分成收入基于有效的每千次展示成本（eCPM）。苹果的 iAd 网络目前拥有移动广告领域最高的 eCPM 费率，这得益于其知名品牌广告主。


    作为一项新业务，在运营的头六个月内，iAd 的广告库存量很小。因此，尽管广告费率很高，但并没有足够的广告来填充网络中参与应用的广告位。结果，批评者抱怨 iAd
    的填充率低。尽管苹果此后通过增加更多品牌广告主并推出 iAd 开发者计划，努力扩充其广告库存，但支持多个广告网络以确保你的应用达到 100% 的填充率始终是个好主意。


    由于 iAd 的高 eCPM 费率，许多开发者将 iAd 设置为第一个请求广告的广告网络。如果没有可用的 iAd，应用会自动从第二个广告网络（如 Google
    流行的 `AdMob`）请求广告。


    使用像 `AdWhirl` 或 `Burstly` 这样的广告中介层服务的一个主要优势是，它能确保最佳的填充率和良好的平均 eCPM。`AdWhirl` 和
    `Burstly` 不仅支持一长串领先的广告网络，它们也支持 iAd。`Mobclix` 是另一个有吸引力的平台，它支持多个主要广告网络。


    要区分哪些广告网络仅根据广告的实际点击次数付费，哪些也对广告展示（曝光）付费。一些广告网络宣称拥有高 eCPM 费率，却不提这些诱人的费率通常只占其广告库存的一小部分，并且仅适用于覆盖特定人群的精选应用。


    再次强调，在选择广告网络之前，务必做好功课。请记住，如果你的应用没有庞大的用户基础或没有吸引到令人垂涎的用户群体，那么你的应用可能无法获得高 eCPM 费率。


    ## 通过广告支持的应用构建业务


    iOS 开发者能否仅依靠应用内广告的收入维持生计？在决定你的产品是作为付费应用发布，还是作为免费广告支持应用发布时，做好计算很重要。一个付费应用销售将为你带来至少
    70 美分（基于 0.99 美元的价格）。如果它是一个广告支持的免费应用，它能否产生足够的广告展示和点击，使每个用户为你带来超过 70 美分的净收入？对于一个使用频率高的应用，你可以自信地回答“是”，但对于用户很少的应用，答案可能是令人惊讶的“否”。


    如果你的平均 eCPM 在 1 美元左右，那么要赚到超过 1000 美元，你的应用内广告需要至少获得 1,000,000 次广告展示。考虑到市面上有超过 1.6
    亿台 iOS 设备，你的免费应用获得 100 万次广告展示应该不难，对吧？


    仅仅因为你的应用是免费的，并不能保证会有海量的下载。App Store 中的应用实在太多，都在争夺人们的注意力。只有一小部分应用拥有数十万用户的健康客户群，一些顶尖应用更是拥有数百万用户。但这不是常态。App
    Store 中超过一半的免费应用只有几千人下载。如果你的应用属于后一类，那么你每天可能只能获得区区几美元的广告收入——这绝对不足以支撑你的全职薪资。


    虽然这听起来可能有些黯淡，但请记住，你的应用不一定非得是畅销榜前十的爆款才能通过应用内广告赚钱。有不少免费、广告支持的应用，由于开发者们深思熟虑的战略规划和营销创意，而获得了稳定的收入。


    ## 平衡 UI 设计美学与广告


    你需要考虑广告的展示将如何影响你的 UI。无论你是提供一个可移除广告的单一版本，还是提供两个版本（一个带广告的免费版和一个不带广告的付费版），你的 UI 设计都需要适应你所选择的方法。


    ### 设计带可移除广告的免费应用


    Hog Bay Software 的 Jesse Grosjean 通过发布他的免费写作应用 `PlainText`（同时适用于 iPhone 和 iPad），首次涉足移动广告领域。他之前的
    iOS 产品，流行的 `TaskPaper` 和 `WriteRoom`，都是以付费应用的形式发布的。但由于 `PlainText` 中基于云端的 Dropbox
    文件同步选项，用户需要联网。这为 Jesse 尝试应用内广告提供了一个独特的机会。


    `PlainText` 的目标是为写作者提供一个极简、无干扰的 UI，因此对 Jesse 来说，不让丑陋的横幅广告弄乱屏幕非常重要。大多数 iAd 横幅设计精良，因此，与其为了利用最佳的
    eCPM 和填充率而同时使用多个广告网络，他更看重保持应用 UI 设计的完整性，并决定只支持 iAd。当有 iAd 可用时，整个 `PlainText` UI
    会向上移动，在底部为 iAd 腾出空间。如果没有 iAd 显示，`PlainText` UI 会恢复到正常状态，隐藏广告横幅框架（参见图 7-3）。


    ![9781430262381_Fig07-03.jpg](img/9781430262381_Fig07-03.jpg)


    图 7-3。Hog Bay Software 的 PlainText 根据屏幕底部是否有 iAd 显示，动态调整应用 UI 的高度


    Jesse 承认，他独家使用 iAd 的决定并未让他真正优化其应用内广告效果，尤其是因为 iAd 需要 iOS 4，所以在 iOS 3 上运行 `PlainText`
    的用户根本看不到任何广告。尽管有这一限制，他对结果还是满意的。这款免费应用还提供了一个应用内购买选项来移除广告。


    “与我的付费应用相比，`PlainText` 的下载量要多得多，但利润却更少，”Jesse 透露。“在略多于两个月的时间里，`PlainText` 获得了大约
    225,000 次下载，通过应用内购买赚了大约 3,000 美元，通过 iAd 赚了大约 7,000 美元。”


    尽管选择购买“移除广告”应用内购买项目的人数仅占 `PlainText` 总用户的大约 1%，但这仍然是该应用收入的重要组成部分。这种免费、广告支持应用结合用于移除广告和/或销售附加功能的
    IAP 组件的混合模式，可以是一个非常强大的组合。


    ### 设计两个版本：带广告版与无广告版


    一些开发者不提供移除广告的应用内购买选项，而是简单地发布两个版本的应用：一个带广告的免费版和一个无广告的付费版。这是 Optime Software 采用的策略，这家公司完全建立在移动广告收入的基础上。该公司最初只发布了免费应用——`Checkers
    Free`、`Dots Free`、`Chess Free`、`Tic Tac Toe Free`、`Four in a Row Free` 以及其他经典游戏。他们的许多免费应用在
    App Store 排行榜上持续名列前茅。

    '
- fmt: '应客户要求，Optime Software 开始提供其游戏的无广告高级版本。CEO Jon Schlegel 解释道：“美国以外的许多用户没有无限数据套餐，他们担心广告下载带来的成本。用户对高级版本的反应非常积极。如果用户经常使用某款游戏，他们大多会购买其高级版本。”


    与通过`PlainText`调整 UI 大小来动态显示或隐藏广告横幅框架不同，Optime Software 在设计其免费应用界面时，会特意为横幅广告预留空间。无广告的高级版本则能够利用整个屏幕，拉伸各个游戏元素之间的间距，为整体
    UI 设计提供更多呼吸空间（参见[图 7-4](#9781430262381_Ch07.xhtml#Fig4)）。


    ![9781430262381_Fig07-04.jpg](images/9781430262381_Fig07-04.jpg)


    [图 7-4](#9781430262381_Ch07.xhtml#_Fig4). Optime Software 根据版本不同，调整其游戏中各种 UI 元素的位置。免费应用需要在屏幕底部为广告横幅留出足够空间（左图），而付费高级版本则无需如此（右图）


    这种方法的明显缺点是开发和维护两个独立版本。Optime Software 在引入应用内购买之前很久就在使用这一策略，但这样做的一个显著好处是，在 App
    Store 中拥有两个应用，而不是只有一个。在免费和付费应用排行榜上都有应用，这种可见度的提升有助于推广两个版本。Jon 承认：“我们从广告支持的免费应用中获得的收入远高于高级应用，但免费应用也有助于提高可见度，并为我们的高级应用创造提升。我们许多高级应用能够进入其类别的前
    100 名，完全依赖于免费版本的用户升级转化。”


    ---


    找到广告网络的最佳组合


    Focused Apps 的 Mark Johnson 在其众多免费应用（包括`Focus for Facebook`、`Hit Tennis 2`和`Santa''s
    Lil'' Zombies`）中，对应用内广告有着相当丰富的经验。他慷慨地分享了一些从大量实验中获得的宝贵见解，这些实验旨在找到 eCPM（有效每千次展示成本）和填充率的最佳组合。


    “通过第三方广告赚钱很难。对我们来说，这只是收入的一小部分。要让‘免费+广告’模式奏效，你需要足够的用户量和一款粘性高的应用，”Mark 表示，“换句话说，你需要大量的下载量，一个用户经常使用的应用，并且他们会将应用保留在手机上，在很长一段时间内反复使用（而不是玩了一周后就删除）。”


    `Focus for Facebook`展示了来自`iAd`、`AdMob`等领先广告网络的广告。广告横幅框架出现在屏幕底部，表格视图在其后方滚动（参见[图
    7-5](#9781430262381_Ch07.xhtml#Fig5)）。这种布局使广告始终保持高度可见，同时不妨碍用户阅读 Facebook 信息流。


    ![9781430262381_Fig07-05.jpg](images/9781430262381_Fig07-05.jpg)


    [图 7-5](#9781430262381_Ch07.xhtml#_Fig5). 免费的`Focus for Facebook`应用由应用内广告支持，展示来自`iAd`（左图）、`AdMob`（右图）及其他广告网络的广告


    “在我们的一个应用中，我们使用`Burstly`作为广告网络集成商，这样如果`iAd`没有为我们提供广告，`Burstly`就会从其他广告网络中投放一个广告，”Mark
    说。“不同的广告网络在填充率、eCPM、广告质量等方面各不相同，而且所有这些因素都因国家而异。我们大约一半的广告库存展示在美国，另一半在其他国家。我们一直在尝试不同的广告网络，以了解在不同国家能获得怎样的填充率和
    eCPM。没有哪个广告网络在所有国家都表现最佳。自然，富裕国家的 eCPM 更高，但广告网络在每个国家的销售团队会影响他们能销售的量与价值，当然，英文文本广告不如当地语言的广告效果好。目前`iAd`在美国的回报不错，而且还在增长。我建议开发者优先考虑`iAd`，辅以`AdMob`和你自己的自有广告（`AdMob`有很好的内置自有广告解决方案）。也可以考虑使用`AdWhirl`或`Burstly`。”


    ---


    利用自有广告的力量


    正如我在本章前面提到的，自有广告是你为在应用广告横幅框架中展示而创建的自定义广告。如果你愿意放弃一些第三方广告来展示自己的自有广告，这将是推广其他创收服务和产品（如付费应用）的绝佳方式。Mark
    Johnson 就此话题分享了大量见解：


    “免费应用自然会获得更多下载量，这是一个巨大的优势。我们在免费应用中的广告空间用途远不止展示第三方广告。我们通过展示自有广告来做很多事情，例如：引导用户升级到付费版本；推广应用内购买；宣传我们的其他应用；征求用户反馈以帮助我们规划下一版本；吸引人们加入我们的邮件列表；让用户为我们发推文宣传。我认为制作免费应用的最大优势并非广告收入，而是能够接触到大量用户，然后创造性地利用自有广告来辅助其他业务线。这非常有效。我们邮件列表约
    95% 的注册来自‘加入邮件列表以解锁免费关卡’这样的自有广告，而只有 5% 来自我们的‘联系我们’页面。”


    在免费应用中展示自有广告以交叉推广其他付费应用和应用内购买产品，这一策略也让`Backflip Studios`受益匪浅。其许多应用，例如超受欢迎的`Paper
    Toss`（参见[图 7-6](#9781430262381_Ch07.xhtml#Fig6)），都是常年热门，在 App Store 排行榜上名列前茅。凭借超过
    4700 万次的 iOS 应用下载量，`Backflip Studios`通过在其多个免费应用中的应用内广告，每月收入达 50 万美元。而且这仅是将 60%
    的广告展示机会分配给第三方广告（如`AdMob`）的结果。其余 40% 的广告展示机会是由`Backflip Studios`分配的自有广告，用于推广其所有其他应用，无论是免费还是付费版本。


    ![9781430262381_Fig07-06.jpg](images/9781430262381_Fig07-06.jpg)


    [图 7-6](#9781430262381_Ch07.xhtml#_Fig6). 适用于 iPad 的`Paper Toss HD Free`利用专用广告空间，不仅展示第三方广告，还展示`Backflip
    Studios`用于推广其他应用的自有广告


    免费应用的平均使用率在下载后的前几周内会急剧下降，30 天后，只有不到 5% 的用户会重新使用该应用。要使应用内广告成为一项有利可图的收入来源，你的应用需要尽可能多地展示广告，这需要大量用户的持续使用。'
  raw: 'In response to user requests, Optime Software started offering ad-free, premium
    versions of its games. CEO Jon Schlegel explained, “Many users outside of the
    United States don’t have all-you-can-eat data plans and were concerned about the
    cost they were incurring due to ad downloads. The response we have received from
    users to the premium versions has been very favorable. Most users will buy the
    premium version of a game if they use it regularly.”


    Unlike the resizing UI of PlainText to dynamically show or hide the ad banner
    frame, Optime Software specifically designs its free app interfaces with banner
    ads in mind. The ad-free, premium versions are able to span the entire screen,
    spacing out the various game elements and giving the overall UI design a little
    more breathing room (see [Figure 7-4](#9781430262381_Ch07.xhtml#Fig4)).


    ![9781430262381_Fig07-04.jpg](images/9781430262381_Fig07-04.jpg)


    [Figure 7-4](#9781430262381_Ch07.xhtml#_Fig4). Optime Software modifies the placement
    of various UI elements in its games depending on the version. A free app requires
    adequate space at the bottom of the screen for an ad banner (left), whereas a
    premium paid version does not (right)


    The obvious disadvantage to this approach is the development maintenance of two
    separate versions. Optime Software was utilizing this strategy long before the
    introduction of In-App Purchase, but the stellar benefit here is the presence
    of two apps in the App Store, instead of only one. The increased visibility of
    having apps on both the free and paid App Store charts can help promote both versions.
    Jon admitted, “We earn significantly more from our ad-supported free apps than
    from our premium applications, but the free apps also help drive visibility and
    create uplift for our premium apps. Many of our premium applications have made
    it onto the Top 100 lists for their categories entirely based on up-sell conversions
    from the free version of the app.”


    Finding the Best Mix of Ad Networks


    Mark Johnson of Focused Apps has quite a bit of experience working with in-app
    advertising in many of his free apps, which include Focus for Facebook, Hit Tennis
    2, and Santa’s Lil’ Zombies. He was kind enough to share some valuable insights
    he has learned from all the experiments he has conducted to find the best mix
    of eCPM and fill rates.


    “Making money with third-party ads is hard. For us, it’s a smaller part of our
    revenue. To make free+ads work, you need volume and a sticky app,” Mark stated.
    “In other words, you need lots of downloads, an app that people use often, and
    that they keep on their phone and return to over a long period of time (as opposed
    to just deleting it after a week of play).”


    Focus for Facebook displays ads from iAd, AdMob, and other leading ad networks.
    The ad banner frame appears at the bottom of the screen, with the table view scrolling
    behind it (see [Figure 7-5](#9781430262381_Ch07.xhtml#Fig5)). The placement enables
    the ad to remain highly visible at all times without interfering with the reading
    of a user’s Facebook newsfeed.


    ![9781430262381_Fig07-05.jpg](images/9781430262381_Fig07-05.jpg)


    [Figure 7-5](#9781430262381_Ch07.xhtml#_Fig5). The free Focus for Facebook app
    is supported by in-app advertising, displaying ads from iAd (left), AdMob (right),
    and other ad networks


    “In one of our apps, we use Burstly as an ad network integrator so that if iAd
    doesn’t have an ad for us, Burstly will put in an ad from one of the other ad
    networks,” Mark said. “The different ad networks vary in fill, eCPM, quality of
    ads, and all those factors vary from country to country. Around half of our ad
    inventory is shown in the US, the other half in other countries. We’ve been trying
    different ad networks in order to see what fill rates and eCPMs we can get in
    different countries. No one ad network performs the best in every country. Naturally
    eCPMs are higher in richer countries, but the ad network’s sales presence in each
    country affects the volume and value that they can sell there, and of course,
    English text ads won’t be as good as ads in the local language. iAd pays well
    in the US at the moment, and it’s growing. I recommend that developers first look
    at iAd, supplemented by AdMob and your own house ads (AdMob has a good built-in
    solution for house ads). Also consider using AdWhirl or Burstly.”


    Harnessing the Power of House Ads


    As I mentioned earlier in this chapter, house ads are custom ads you create for
    display in your app’s ad banner frame. If you’re willing to forego some of the
    third-party ads to show your house ads, they can be a great way to promote other
    revenue-generating services and products, such as your paid apps. Mark Johnson
    had a lot to say on the subject:


    “Naturally free apps get a lot more downloads, and that’s a huge benefit. We use
    the ad space in the free app for a lot more than just showing third-party ads.
    We show house ads to do things like up-sell the paid app version; up-sell in-app-purchases;
    promote our other apps; ask users for feedback to help us plan the next version
    of the app; get people to join our mailing list; get people to tweet out an ad
    for us. I’d say the biggest advantage of making free apps isn’t the ad revenue,
    but getting in front of a lot of people, and then using house ads creatively to
    aid other lines of business. This works really well. Something like 95 percent
    of our mailing list sign-ups come from a ‘join our mailing list to unlock a free
    level’ house ad, compared to only 5 percent from our ‘contact us’ screen.”


    Displaying house ads in free apps to cross-promote other paid apps and In-App
    Purchase offerings is a strategy that has also benefited Backflip Studios. Many
    of its apps, such as the ultra-popular Paper Toss (see [Figure 7-6](#9781430262381_Ch07.xhtml#Fig6)),
    are perennial favorites, ranking quite high in the App Store charts. With more
    than 47 million iOS app downloads, Backflip Studios makes $500,000 per month with
    in-app advertising in several free apps. And that’s with only 60 percent of the
    ad impressions dedicated to third-party ads, such as AdMob. The remaining 40 percent
    of the ad impressions are house ads assigned by Backflip Studios to promote all
    of its other apps, both free and paid.


    ![9781430262381_Fig07-06.jpg](images/9781430262381_Fig07-06.jpg)


    [Figure 7-6](#9781430262381_Ch07.xhtml#_Fig6). Paper Toss HD Free for iPad utilizes
    the dedicated ad space to display not only third-party ads, but also house ads
    promoting other apps by Backflip Studios


    The average free app usage declines rapidly in the first few weeks after download,
    with less than 5 percent of users returning to the app after 30 days. For in-app
    advertising to be a lucrative revenue source, your app needs to serve up as many
    advertisements as possible, which requires continued usage by a large number of
    users.'
  trans: '

    应客户要求，Optime Software 开始提供其游戏的无广告高级版本。CEO Jon Schlegel 解释道：“美国以外的许多用户没有无限数据套餐，他们担心广告下载带来的成本。用户对高级版本的反应非常积极。如果用户经常使用某款游戏，他们大多会购买其高级版本。”


    与通过`PlainText`调整 UI 大小来动态显示或隐藏广告横幅框架不同，Optime Software 在设计其免费应用界面时，会特意为横幅广告预留空间。无广告的高级版本则能够利用整个屏幕，拉伸各个游戏元素之间的间距，为整体
    UI 设计提供更多呼吸空间（参见图 7-4）。


    ![9781430262381_Fig07-04.jpg](img/9781430262381_Fig07-04.jpg)


    图 7-4. Optime Software 根据版本不同，调整其游戏中各种 UI 元素的位置。免费应用需要在屏幕底部为广告横幅留出足够空间（左图），而付费高级版本则无需如此（右图）


    这种方法的明显缺点是开发和维护两个独立版本。Optime Software 在引入应用内购买之前很久就在使用这一策略，但这样做的一个显著好处是，在 App
    Store 中拥有两个应用，而不是只有一个。在免费和付费应用排行榜上都有应用，这种可见度的提升有助于推广两个版本。Jon 承认：“我们从广告支持的免费应用中获得的收入远高于高级应用，但免费应用也有助于提高可见度，并为我们的高级应用创造提升。我们许多高级应用能够进入其类别的前
    100 名，完全依赖于免费版本的用户升级转化。”


    ---


    找到广告网络的最佳组合


    Focused Apps 的 Mark Johnson 在其众多免费应用（包括`Focus for Facebook`、`Hit Tennis 2`和`Santa''s
    Lil'' Zombies`）中，对应用内广告有着相当丰富的经验。他慷慨地分享了一些从大量实验中获得的宝贵见解，这些实验旨在找到 eCPM（有效每千次展示成本）和填充率的最佳组合。


    “通过第三方广告赚钱很难。对我们来说，这只是收入的一小部分。要让‘免费+广告’模式奏效，你需要足够的用户量和一款粘性高的应用，”Mark 表示，“换句话说，你需要大量的下载量，一个用户经常使用的应用，并且他们会将应用保留在手机上，在很长一段时间内反复使用（而不是玩了一周后就删除）。”


    `Focus for Facebook`展示了来自`iAd`、`AdMob`等领先广告网络的广告。广告横幅框架出现在屏幕底部，表格视图在其后方滚动（参见图
    7-5）。这种布局使广告始终保持高度可见，同时不妨碍用户阅读 Facebook 信息流。


    ![9781430262381_Fig07-05.jpg](img/9781430262381_Fig07-05.jpg)


    图 7-5. 免费的`Focus for Facebook`应用由应用内广告支持，展示来自`iAd`（左图）、`AdMob`（右图）及其他广告网络的广告


    “在我们的一个应用中，我们使用`Burstly`作为广告网络集成商，这样如果`iAd`没有为我们提供广告，`Burstly`就会从其他广告网络中投放一个广告，”Mark
    说。“不同的广告网络在填充率、eCPM、广告质量等方面各不相同，而且所有这些因素都因国家而异。我们大约一半的广告库存展示在美国，另一半在其他国家。我们一直在尝试不同的广告网络，以了解在不同国家能获得怎样的填充率和
    eCPM。没有哪个广告网络在所有国家都表现最佳。自然，富裕国家的 eCPM 更高，但广告网络在每个国家的销售团队会影响他们能销售的量与价值，当然，英文文本广告不如当地语言的广告效果好。目前`iAd`在美国的回报不错，而且还在增长。我建议开发者优先考虑`iAd`，辅以`AdMob`和你自己的自有广告（`AdMob`有很好的内置自有广告解决方案）。也可以考虑使用`AdWhirl`或`Burstly`。”


    ---


    利用自有广告的力量


    正如我在本章前面提到的，自有广告是你为在应用广告横幅框架中展示而创建的自定义广告。如果你愿意放弃一些第三方广告来展示自己的自有广告，这将是推广其他创收服务和产品（如付费应用）的绝佳方式。Mark
    Johnson 就此话题分享了大量见解：


    “免费应用自然会获得更多下载量，这是一个巨大的优势。我们在免费应用中的广告空间用途远不止展示第三方广告。我们通过展示自有广告来做很多事情，例如：引导用户升级到付费版本；推广应用内购买；宣传我们的其他应用；征求用户反馈以帮助我们规划下一版本；吸引人们加入我们的邮件列表；让用户为我们发推文宣传。我认为制作免费应用的最大优势并非广告收入，而是能够接触到大量用户，然后创造性地利用自有广告来辅助其他业务线。这非常有效。我们邮件列表约
    95% 的注册来自‘加入邮件列表以解锁免费关卡’这样的自有广告，而只有 5% 来自我们的‘联系我们’页面。”


    在免费应用中展示自有广告以交叉推广其他付费应用和应用内购买产品，这一策略也让`Backflip Studios`受益匪浅。其许多应用，例如超受欢迎的`Paper
    Toss`（参见图 7-6），都是常年热门，在 App Store 排行榜上名列前茅。凭借超过 4700 万次的 iOS 应用下载量，`Backflip Studios`通过在其多个免费应用中的应用内广告，每月收入达
    50 万美元。而且这仅是将 60% 的广告展示机会分配给第三方广告（如`AdMob`）的结果。其余 40% 的广告展示机会是由`Backflip Studios`分配的自有广告，用于推广其所有其他应用，无论是免费还是付费版本。


    ![9781430262381_Fig07-06.jpg](img/9781430262381_Fig07-06.jpg)


    图 7-6. 适用于 iPad 的`Paper Toss HD Free`利用专用广告空间，不仅展示第三方广告，还展示`Backflip Studios`用于推广其他应用的自有广告


    免费应用的平均使用率在下载后的前几周内会急剧下降，30 天后，只有不到 5% 的用户会重新使用该应用。要使应用内广告成为一项有利可图的收入来源，你的应用需要尽可能多地展示广告，这需要大量用户的持续使用。

