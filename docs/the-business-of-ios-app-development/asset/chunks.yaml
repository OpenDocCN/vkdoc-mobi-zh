  trans: '

    ### 关于 iPad 的更大显示屏


    在 iPad 的更大显示屏上，你拥有更多的屏幕空间，因此更容易在弹出窗口（`UIPopover`）或居中的模态视图（`UIModalPresentationFormSheet`）中插入付费版本的升级信息，而不会占据整个屏幕。在
    Illusion Labs 的《迷宫 2 HD Lite》中，免费迷宫菜单包含一个用于付费版本的小型横幅广告。点击该横幅，会弹出一个弹出窗口，其中包含高级功能的可滚动描述、截图以及一个
    App Store 购买按钮（参见图 6-6）。


    ![9781430262381_Fig06-06.jpg](img/9781430262381_Fig06-06.jpg)


    图 6-6。Illusion Labs 的《迷宫 2 HD Lite》在 iPad 的弹出窗口中展示付费版本的升级销售信息。


    `UIPopover` 的美妙之处在于，它所显示的 `UIView` 可以轻松重复使用，并可在应用的其他地方通过另一个 `UIPopover` 再次显示。除了
    Illusion Labs 提供的迷宫外，该公司还托管了一个免费的在线社区，用户可以在其中上传和分享自己创作的迷宫。在免费的《迷宫 2 HD Lite》应用中，用户可以浏览第三方迷宫列表，但他们很快就会注意到，需要购买付费版本才能下载和游玩这些社区迷宫。这是升级到完整版游戏的一个巨大动力。在精简版中，下载按钮被方便地替换为“完整版信息”按钮。点击该按钮时，它会像之前在应用其他部分看到的那样，在一个
    `UIPopover` 中显示相同的付费版本信息（参见图 6-7）。这个弹出窗口在需要时提供升级信息，同时不会干扰界面的其他部分。


    ![9781430262381_Fig06-07.jpg](img/9781430262381_Fig06-07.jpg)


    图 6-7。要求《迷宫 2 HD Lite》用户购买付费版本才能下载由迷宫社区贡献的数千个免费第三方迷宫，这是一个极好的升级激励。


    ### 应用被拒警告


    你不应在应用内显示应用的价格。在免费精简版中推广完整版时，不要列出价格。Apple 在世界许多国家/地区拥有本地化 App Store，支持多种不同货币，因此它不欢迎在应用中显示硬编码的价格。Apple
    的应用审核团队并不总是将此标记为被拒原因，但这种情况时有发生，因此你应避免这样做。除了被拒风险外，不在应用中列出价格也很重要，这样你就可以灵活地随时为特殊促销活动更改
    App Store 价格，而无需提交更新。


    ### 加入分析功能


    在精简版中加入分析功能非常重要，这样你就可以追踪有多少人点击了购买按钮。这些分析报告结合你的 iTunes Connect 统计数据，将帮助你确定精简版作为推广工具的有效性。你将了解有多少人下载你的精简版应用、他们使用的频率、有多少用户点击了购买按钮，以及你的付费版本带来了多少销售额。掌握了所有这些数据后，如果精简版到付费版的转化率远低于预期，你可以尝试在后续更新中调整措辞和按钮位置，以改善效果。


    当然，了解用户如何使用你的付费应用同样有价值。因此，如果你将分析功能纳入开发策略，请确保将其接入你的所有应用——无论是精简版还是付费版——以获得关于它们表现的最全面图景。Apple
    最近更改了关于第三方分析工具允许收集哪些信息的规则。要了解应用内分析的相关事实，请查看第 7 章。


    **提示** 如果你是 iOS 开发者，应加入 iTunes 联盟计划。你指向 App Store 的任何链接都应是联盟链接。没有理由不为你导向 Apple
    的所有流量赚取一些联盟佣金。这意味着你精简版中的所有购买按钮、交叉推广、网站等都应使用 iTunes 联盟链接进行编码。我们将在本章后面探讨利润丰厚的联盟计划世界。


    ### 让精简版无懈可击


    作为开发者，我们努力创造高质量的产品，因此没有人会故意发布有漏洞的软件。即使是顶尖开发者也会遇到致命的错误，但如果有一个时刻需要加强你的测试和质量控制工作，那便是针对你的免费精简版。


    由于用户会通过评估你的精简版应用来判断付费版本是否值得他们辛苦赚来的钱，因此他们会用非常挑剔的目光来试用它。因为是免费的，该应用会吸引更广泛的受众，其中许多人只是出于好奇而“试驾”。由于在这方面没有任何情感投入，人们常常会迅速做出草率的判断。正如大多数精简版应用与对应的付费版本相比评分更低所证明的那样，人们会毫不犹豫地因为最微不足道的原因给一个应用打出凄惨的一星评分。即使精简版是免费的，如果体验让用户感到沮丧，评论往往也会很苛刻。


    确保你的精简版包含充足的内置说明，以帮助减轻因有人不知如何使用应用而可能产生的任何潜在困惑。许多精简版应用会在启动时询问用户，是否希望在探索应用之前观看或阅读一个简短的教程。虽然这确实需要额外的开发工作，但这是一个非常主动的方法，可能有助于避免许多不应出现的一星差评。如果你认为你的应用会从提供应用内教程中受益，请参阅第
    9 章了解此主题的详细信息。


    ### 将数据从精简版迁移到付费版


    如果用户购买了你的应用，他们不应因丢失免费精简版中的数据而受到惩罚。如果发生这种情况，准备好迎接 App Store 中大量负面用户评论吧。


    对于大多数游戏来说，没有什么可丢失的，因为高分排行榜通常存储在远程服务器上。但如果这是一个将信息保存在 plist 文件或数据库记录中的效率应用呢？


    与桌面操作系统更灵活的环境不同，iOS 限制每个应用只能在其自己的数据“沙盒”中存储文件。应用 A 不能访问应用 B 保存的文件，反之亦然。这可以保护每个已安装的应用免受恶意行为的影响，但也使得在应用之间共享数据变得极其困难。


    从 iOS 3.2 开始，Apple 引入了一种新的内置文件处理机制，称为“文档支持”，它允许开发者向 iOS 系统注册他们的应用，以创建和/或打开特定的文件类型。这对于需要其独特文件类型（例如文字处理器）或支持流行文件类型（例如
    PDF、图像和视频格式）的应用来说非常棒。这使得一个应用中的文件可以被打幵或复制到另一个也注册支持相同文件类型的应用中。如果你需要从精简版的 plist 文件或少量数据库记录中传输一些信息到付费版应用，这种“文档支持”功能显得有些大材小用，在这种特定情况下增加了不必要的编程开销。


    '
- fmt: "# iOS 3.2 数据迁移方案\n\niOS 3.2 还增加了一项桌面同步功能，使应用能够在桌面版 iTunes 的特殊文件共享列表中显示其文件目录，当你的\
    \ iOS 设备与电脑同步时即可使用。从技术上讲，如果你的应用支持此功能，用户可以从精简版中复制存储的数据文件到桌面，然后将其拖回 iTunes 的付费应用文件共享目录中。但这要求客户完成大量额外工作，处理他们本不该遇到的问题。如果你重视客户并希望他们获得满意的用户体验，应避免使用此方案。\n\
    \n显然，应用内购买（`In-App Purchase`）能让你的生活轻松得多，避免了将数据从精简版传递到独立付费应用的麻烦。但别灰心——还有其他方法可以完成此任务。\n\
    \n## 云端同步\n\n一些开发者通过在应用中实现同步服务来解决数据迁移问题，让客户能够将应用数据同步到远程服务器。诸如 `Flixoft` 的 `Grocery\
    \ Gadget` 等流行应用鼓励用户注册免费群组账户，以便数据能从精简版轻松传输到付费版。\n\n如果你的应用存储大量复杂数据，或者你只是想给客户一种从其他位置和设备（如他们的\
    \ iPad 或台式电脑的网页浏览器）访问数据的方式，那么维护一个同步服务可能是最佳选择。如果这对你的应用需求来说是个吸引人的解决方案，以下是一些值得考虑的实惠云服务：\n\
    \n*   `Dropbox` 开发者平台（`http://www.dropbox.com/developers`）\n*   `Google App Engine`（`http://code.google.com/appengine/`）\n\
    *   `Amazon S3`（`http://aws.amazon.com/s3/`）\n*   `Rackspace Cloud`（`http://www.rackspacecloud.com`）\n\
    *   `Parse`（`http://parse.com`）\n\n如果你不想开发并维护一个服务器端 Web 应用来管理原生应用与云端之间的数据同步，可以首先考虑\
    \ `Dropbox` 的 iOS SDK。`Dropbox` 已成为需要在多设备间同步数据的移动开发者的热门选择。但如果你只需要在应用间传输非常少量的数据，还有另一种选择。\n\
    \n## 通过 URL 传输数据\n\n一些开发者成功通过唯一的 URL 命令传输数据。例如，如果 iOS 应用发起一个 HTTP 网站的开放 URL 请求，`Mobile\
    \ Safari` 会自动启动并处理该请求，因为它是注册处理 HTTP 的默认应用。简而言之，应用刚刚将数据传输给了 `Mobile Safari`。你可以通过设置一个唯一的\
    \ URL 协议处理器，将同样的概念应用到你自己的应用。\n\n要使你的 URL 协议生效，它需要使用一个尚未被任何其他应用使用的前缀。由于你不知道其他 iOS\
    \ 应用可能为此使用哪些唯一协议，你应该设计一个足够独特的前缀，以防止与其他应用冲突。\n\n出于本练习的目的，让我们为虚构的停车位置定位应用 `Breadcrumbs`\
    \ 创建一个唯一协议。我们希望精简版用户能将保存的停车位置传输到付费版。由于数据量非常小（仅几个 GPS 坐标），且不包含任何机密信息，通过开放 URL 命令传输数据效果很好。\n\
    \n对于我们的 URL 前缀，我们将使用`bcrumbs`。如果你的应用有一个独特的名称（应该如此），那么该名称（或其变体）可能很适合作为唯一前缀。首先，`bcrumbs`\
    \ URL 协议需要注册到 iOS 系统中，并分配给 `Breadcrumbs` 的完整版。这通过在 Xcode 中向付费应用的`Info.plist`文件添加新的\
    \ URL 类型来完成（参见[Figure 6-8](#9781430262381_Ch06.xhtml#Fig8)）。\n\n![9781430262381_Fig06-08.jpg](images/9781430262381_Fig06-08.jpg)\n\
    \n[Figure 6-8](#9781430262381_Ch06.xhtml#_Fig8)。在 Xcode 的 plist 编辑器中打开完整版的`Info.plist`文件，添加新的\
    \ URL 类型\n\n要向`Info.plist`文件添加新条目，请在 plist 编辑器中选择最后一行，然后点击右侧的灰色加号（`+`）按钮。在新的空白行中，从左侧键（`Key`）列出现的上下文菜单列表中选择`URL\
    \ Types`。\n\n添加新 URL 类型后，打开其展开三角形以配置嵌套属性。在其`Item 0`键下，你需要将付费应用的唯一属性`com.company.Application`添加到`URL\
    \ identifier`字段。对于虚构的 `Breadcrumbs` 应用，这很可能是`com.electricbutterfly.Breadcrumbs`。\n\
    \n接下来，再次点击加号按钮，在`URL identifier`正下方添加另一个嵌套键，并从新键的上下文菜单中选择`URL Schemes`。`URL scheme`是你定义唯一\
    \ URL 协议处理器的地方，因此对于 `Breadcrumbs` 示例，它是`bcrumbs`。\n\n**注意**：如果你有一个 Xcode 项目设置了两个编译目标（一个目标用于精简版，一个目标用于付费版），则需要为每个目标创建单独的\
    \ plist 文件。只有应用完整版的 plist 文件可以包含唯一的 URL 协议处理器定义。如果你的精简版 plist 文件引用了相同的 URL 类型，那么精简版最终将接收自己的\
    \ URL 请求，这会导致冲突。当精简版发送唯一的 URL 请求时，你只希望付费版来响应它。\n\n现在，唯一的`bcrumbs` URL 协议已分配给 `Breadcrumbs`\
    \ 的完整版，下一步是为精简版添加通过 URL 传输数据的代码。假设你已在精简应用的设置屏幕上添加了一个新按钮，名为`Transfer My Data to\
    \ Full Version`（将我的数据传输到完整版），并且它已在 Interface Builder 中连接好。还假设事件处理器已包含从精简版沙盒获取数据的代码（例如来自\
    \ XML 文件或纯文本文件的内容）。\n\n你不能在 URL 查询中发送原始数据，因此必须首先进行 Base64 编码和/或 URL 编码。iOS SDK\
    \ 不包含 Base64 编码和解码，但一些第三方 Objective-C 库（例如`Google Toolbox for Mac`，`http://code.google.com/p/google-toolbox-for-mac/`）为\
    \ iOS 提供 Base64 支持。如果仅 URL 编码就能满足需求，你可以轻松调用原生 iOS `NSString`方法`stringByAddingPercentEscapesUsingEncoding`。\n\
    \n一旦数据经过 Base64 编码和/或 URL 编码并存储在`NSString`中（我们称之为`encodedData`），就可以作为唯一 URL 查询的一部分发送：\n\
    \n```objectivec\nNSString *urlQuery = [NSString stringWithFormat:@\"bcrumbs://localhost/importData?%@\"\
