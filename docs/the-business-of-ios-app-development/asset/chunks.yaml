    # 第一印象的重要性


    任何应用的产品页面展示内容的顺序，都应能反映出用户最感兴趣的是什么。在应用图标之后，你注意到的首要视觉线索就是截图。以前，苹果将文本描述放在截图之上，但现在顺序已经颠倒过来。这充分说明了选择合适的截图有多么重要。你不能指望人们会阅读你在
    App Store 中应用的完整文本描述。他们可能会读前几行应用描述，但立刻就会被展示出来的截图所吸引。


    第一张截图必须是最能代表你应用核心功能的那一张。不要浪费机会，把应用的启动画面或设置界面作为第一张视觉呈现。虽然从使用应用的流程来看，这些界面可能在技术上排在最前面，但它们无法向潜在用户传达任何信息。此外，当用户搜索你的应用时，会显示你的应用图标和第一张截图——所以要让它有价值！


    在这关键的几秒钟内，第一张截图必须传达出应用的功能或决定性特征。用户看一眼后，就应该有“啊哈”时刻，立刻明白你的应用大致是如何工作的，以及/或者他们为什么要购买它。至少，它应该能促使用户继续滑动，查看更多截图，阅读更多应用描述，并浏览你的用户评价和官方网站。如果你的工作做对了，这个制胜的第一印象会说服他们下载并试用你的应用。


    # 打造良好第一印象的更多动力


    以前，许多应用开发者会提供应用的精简版和专业版。其背后的理念是让用户在购买前能够评估应用，并帮助推广付费版或应用内购买功能。最近对用户和开发者都有利的趋势是，为了让应用免费以增加下载量，如果用户喜欢，他们会通过应用内购买来购买。如果用户下载了你的应用，简单试用后决定删除，你或许再也没有机会将这个人转化为客户了。


    苹果在 iOS 4 中移除了“删除后评分”功能，但如果用户足够不喜欢你的应用，他们可能会花时间访问 App Store 并手动发布一条恶意评论。这无疑为尽可能留下良好第一印象提供了额外的动力。用户评分是用户决定是否下载应用时考虑的首要因素之一。


    遗憾的是，你的应用 UI 设计和功能不仅要努力赢得付费版的销售，还要避免负面评价（这些评价可能不公平地“以貌取人”）。这项任务乍看起来可能令人生畏，但读完本章后，你将掌握一些实用的设计方法，直接应对这一问题。


    在第 6 章和第 8 章中，我将讨论免费精简版在推广付费应用和应用内购买项目方面的优势，但要事优先。现在是时候为你的应用设计奠定基础了。


    # 在苹果的沙盒中遵守规则


    违反苹果的 iOS 人机界面指南（通常称为 HIG）是提交的 iPhone 和 iPad 应用被拒绝的最常见原因之一。尽管 App Store 中确实存在一些例外情况——一些被批准的应用违反了某些
    UI 设计规则——但最好尽可能遵守这些指南。


    没有充分的理由，就不要去玩火；即使有，你也需要问自己是否真的值得冒这个风险。设计创新可以为应用带来“性感”的视觉吸引力，有助于激发兴趣和促进销售；但在你试图打破太多常规之前，请牢记两个非常重要的因素：


    - 如果你的设计违反了太多关键指南，无论它多么酷，苹果都会毫不犹豫地拒绝你的应用。而如果你的应用不在 App Store 中，它就无法赚钱。

    - 苹果的界面指南旨在提供通用的界面控件和架构，这是一个至关重要的目的。熟悉度能大大降低学习曲线，使用户体验更加直观。苹果已在网上发布了这些指南，这是一份宝贵的文档。App
    Store 审核指南明确了开发者应避免的特定应用元素，以帮助加快审核流程。完整列表可在 `http://developer.apple.com/appstore/guidelines.html`
    查看。


    这个方便的在线资源页面提供了指向 App Store 审核指南和 iOS 开发者计划许可协议的链接，如果你认为应用被不公正地拒绝，还可以向应用审核委员会提交申诉。要访问这些链接，你需要先登录
    iOS 开发者计划。


    尽管许多开发者对苹果严格控制应用审核流程表示担忧，但这个经过精心策划、专有的销售渠道正是 App Store 最大的优势。通过确保一定的质量水平，App Store
    成为一个能灌输消费者信心的有吸引力的移动市场，这反过来又有助于销售更多应用——这一策略已被证明极为成功。


    归根结底，如果你想在最热门、最赚钱的移动平台上赚钱，你必须记住，你是在苹果的沙盒中玩耍。要想继续游戏，你需要遵守这家公司的规则。你可能不喜欢它的规则，但这是真正的入场代价（除了你的
    iOS 开发者计划费用）。


    即使有了公布的指南，也不可能预见所有潜在的拒绝原因（特别是如果出现了新原因），但至少你可以帮自己一个忙，避免那些会让你收到拒绝信的已知问题。在本书中，我将根据所讨论的相关设计和开发主题，重点介绍已知的拒绝原因，但仅凭这些零散的信息是不够的。


    以下是所有 iOS 应用开发者必读的一些重要资源：


    - *iOS 人机界面指南*：这是 iPhone、iPod touch 和 iPad 应用 UI 设计的圣经。显然，我们鼓励你发挥创造力和发明力，但让 HIG
    作为你的基础。该在线指南提供了下载便捷 PDF 版本的链接。你也可以在 Xcode 内置的文档浏览器中访问 HIG。有这么多的查看选项，你真的没有借口——所以去阅读它，拥抱它，实践它！网址是
    `https://developer.apple.com/library/ios/documentation/UserExperience/Conceptual/MobileHIG/index.html`。

    - *App Store 审核指南*：你需要登录 iOS 开发者计划才能访问这个直接链接。与 HIG 不同，苹果不提供 App Store 审核指南的 PDF
    下载。需要注意的是，苹果将这些指南视为“活文档”，会根据需要更新以反映新规则和变化。这并不是说苹果计划为了自己的目的而改变指南，而是新的应用提交必然会引发新问题，需要新的规则和澄清。随着移动格局的发展，苹果的指南也会随之发展。记住这一点，在设计和开发应用时，务必参考本文档的最新在线版本。网址是
    `https://developer.apple.com/appstore/resources/approval/guidelines.html`。

    - *应用提交反馈*：这个博客发布了由匿名开发者提交的应用被拒绝的原因报告。这个非授权网站是一个很好的信息来源，尽管苹果的应用审核团队可能不会为其存在而兴奋。访问地址是
    `http://appreview.tumblr.com`。

