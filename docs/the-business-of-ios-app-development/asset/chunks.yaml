    ## Beta Testing: Navigating the Complexities of Ad Hoc Distribution


    Even more important than your own testing in the iOS Simulator and on an actual
    device is having multiple people test your app. After performing extensive tests
    of your own, it’s highly recommended that you round up a group of volunteers who
    are willing to beta-test your application before release in the App Store.


    We’ve gone over the steps for setting up certificates and provisioning profiles
    for testing on your own iOS device. Many of the steps required to set up ad hoc
    distribution for multiple beta testers will seem quite similar, with only a few
    exceptions. But make no mistake, configuring your app for ad hoc distribution
    includes some very subtle, yet important, extra tasks that must be followed in
    order for the process to work smoothly. This is yet another stumbling block for
    many new developers, so let’s take our time walking through each and every step.


    ### Step 1: Acquire Your Distribution Certificate


    Launch the Keychain Access application, located on your Mac at `/Applications/Utilities/Keychain
    Access`.


    First, make sure Online Certificate Status Protocol (OSCP) and Certificate Revocation
    List (CRL) are both still set to Off in the Keychain Access Preferences window’s
    Certificates tab.


    Then, select `Keychain Access` ![image](images/arrow.jpg) `Certificate Assistant`
    ![image](images/arrow.jpg) `Request a Certificate from a Certificate Authority`
    from the menu. In the Certificate Assistant window that appears, enter the e-mail
    address and the exact name listed for you in your iOS Developer Program account
    (see [Figure 9-21](#9781430262381_Ch09.xhtml#Fig21)).


    ![9781430262381_Fig09-21.jpg](images/9781430262381_Fig09-21.jpg)


    [Figure 9-21](#9781430262381_Ch09.xhtml#_Fig21). Your distribution certificate
    request must include the same name and e-mail address as assigned to your iOS
    Developer Program account. You must specify the Key Size and Algorithm settings
    as 2048 bits and RSA, respectively.


    Since this request is for your official distribution certificate, which will be
    used for both ad hoc distribution and App Store distribution, the e-mail and name
    must match up identically to your iOS Developer Program credentials. For example,
    my company name, Electric Butterfly, Inc., is the official name in my account,
    so that’s what I used for this form. The Request Is option should be set to Saved
    to Disk.


    There’s one more thing that makes this request different from the one previously
    made during the development certificate process. Make sure “Let me specify key
    pair information” is checked. Because that box is checked, when you click the
    Continue button, the Certificate Assistant will ask you to assign the key size
    and algorithm, which should be set to 2048 bits and RSA, respectively (see [Figure
    9-21](#9781430262381_Ch09.xhtml#Fig21)).


    Click the Continue button yet again, and Keychain Access will generate and save
    the new `CertificateSigningRequest.certSigningRequest` file to your hard drive.


    Moving back to your web browser, navigate to the Certificates, Identifiers & Profiles
    page of the iOS Member Center. Select Production under the Certificates section,
    and then click the + button and follow the instructions to upload your new `CertificateSigningRequest.certSigningRequest`
    file.


    Once submitted, the certificate request must be approved by the team admin. If
    you’re the only one managing your iOS Developer Program account, then you’re probably
    the team admin, so click the Approve button. Your new development certificate
    will be available for download from this Certificates section. Click the Download
    button to save the generated distribution certificate to your Mac desktop (see
    [Figure 9-22](#9781430262381_Ch09.xhtml#Fig22)).


    ![9781430262381_Fig09-22.jpg](images/9781430262381_Fig09-22.jpg)


    [Figure 9-22](#9781430262381_Ch09.xhtml#_Fig22). Upload and approve your certificate
    request. Once approved, you’ll be able to download the generated distribution
    certificate.


    Once the `distribution_identity.cer` is downloaded to your Mac, double-click the
    file, which will launch the Keychain Access application (if it’s not already open).
    Keychain Access will display a dialog box asking if you would like to add the
    certificate to a keychain. Make sure the dialog’s keychain menu is set to `login`,
    and then click the Add button. In the Keys category of the main Keychain Access
    window, verify that your private and public keys are now paired together with
    your distribution certificate to ensure it is properly configured on your Mac.
    In this example, my Electric Butterfly, Inc. key (which was created when I generated
    a certificate-signing request under the same name) is now paired with my imported
    distribution certificate (see [Figure 9-23](#9781430262381_Ch09.xhtml#Fig23)).


    ![9781430262381_Fig09-23.jpg](images/9781430262381_Fig09-23.jpg)


    [Figure 9-23](#9781430262381_Ch09.xhtml#_Fig23). Verify that your imported distribution
    certificate has been paired with the correct private key in Keychain Access.


    Do not install distribution certificates for multiple iOS Developer Program accounts
    into the same keychain. Doing so will cause problems in Xcode. If you’re compiling
    and submitting iOS apps for clients, then create a separate Mac OS X user account
    for each distribution certificate you need to install. You can do all your development
    within your primary Mac user account, but to compile for distribution, you should
    switch to the user account that has that client’s distribution certificate installed.


    ### EXPORT YOUR DISTRIBUTION PRIVATE KEY FOR SAFEKEEPING


    Your distribution private key is required by Xcode to sign compiled app binaries.
    Without the proper code signing, the application cannot be uploaded to the App
    Store, nor will it work with ad hoc testing. This private key cannot be reproduced,
    so it is imperative that you export it and save the file in a special place, just
    in case you need to restore it at a later date when switching to a new Mac or
    reinstalling the operating system.


    To export your distribution private key, select it from the Keys section of Keychain
    Access. In the [Figure 9-23](#9781430262381_Ch09.xhtml#Fig23) example, my distribution
    private key is selected. Then choose File ![image](images/arrow.jpg) Export Items.
    Save the file in Personal Information Exchange (`.p12`) format, which requires
    you to assign a password.


    If you ever need to reinstall this private key, simply double-click the exported
    `.p12` file and enter your password. Keychain Access will take care of the rest.


    ### Step 2: Register the Device IDs of Your Beta Testers


    Do you remember registering your own test device’s 40-character UDID as a new
    device ID in the Certificates, Identifiers & Profiles page of the iOS Member Center
    in order to create your development provisioning profile? The same holds true
    when creating a distribution provisioning profile; so before you can do that,
    you’ll need to add the UDID of every beta tester as a new device ID in the same
    manner.


    #### Rallying the Troops


    Have a group play with your app for a dedicated amount of time. Not only will
    they discover new bugs that you’ve never encountered, but they will also stumble
    on usability issues that may not be apparent to you, the creator.'
