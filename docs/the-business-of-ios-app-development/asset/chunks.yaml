  trans: '

    ![9781430262381_Fig11-09.jpg](img/9781430262381_Fig11-09.jpg)    图 11-9。在 iTunes
    Connect 的“管理您的应用”部分，点击“添加新应用”按钮开始操作


    ## 公司名称和主要语言


    如果这是您首次提交 iOS 应用，第一个页面会要求您提供官方公司名称和应用的主要语言。请注意，这些信息后续无法更改，因此请务必确保此页面信息无误！


    您提交的公司名称应是您希望在 App Store 中作为应用官方开发者显示的名称。出于对代码签名和 App Store 设置的谨慎考虑，我建议您在以下所有项目中使用相同的公司/开发者名称，以避免潜在问题：


    *   您的 iOS 开发者计划账户

    *   您的 iOS 分发证书

    *   您的 iTunes Connect/App Store 公司名称


    我在以上三项中均使用我的公司名称 Electric Butterfly, Inc.，并确保拼写和标点始终保持一致。


    至于主要语言设置，这是在提交过程中用于输入所有应用数据的语言。例如，如果您从下拉菜单选择英语，其余在线表单将要求您用英语填写信息。在 iTunes Connect
    中创建应用列表后，您将有机会添加对其他语言的支持，例如法语、德语、日语等。


    点击“继续”按钮将进入下一个页面，您需要在此输入一些初始应用信息。


    ## 应用信息


    我们来逐一了解“应用信息”页面上的三个表单元素（见图 11-10），以便更好地理解其要求：


    *   **应用名称：** 提交的名称最多可包含 255 个字符。如本章前文所述，此字段不限于应用的二进制名称或显示名称。建议使用带有说明文字的扩展应用名称（例如
    Tap Tap Tap 的“Convert——单位换算器”）。但应用的实际名称应包含在该说明文字中（最好放在开头）。如果您的 App Store 名称与应用在
    iOS 设备主屏幕上的显示名称差异过大，可能会引起消费者混淆，并在应用审核过程中引发问题。

    *   **SKU 编号：** 这个字段通常是 iOS 开发者最困惑的来源，因为 Apple 并未对此字符串的正确格式或语法提供太多说明。与普遍看法相反，SKU
    属性并没有定义的模板或编号系统。即使将其称为 SKU 编号也有一定误导性，因为它不一定要由数字组成。应用的 SKU 永远不会向客户展示，也不会公开列在 App
    Store 中。基本上，SKU 是 iTunes Connect 中应用的内部唯一标识符。通常使用一个易于识别的名称比仅使用数字串更方便，特别是当您有相关的
    App 内购买项目时。例如，我们虚构的 Breadcrumbs 应用的 SKU 是 `breadcrumbs`，其 App 内购买高级包的 SKU 是 `breadcrumbs.premiumpack`。SKU
    与版本号无关，因此不会随每次版本更新而改变。事实上，一旦提交，SKU 编号就永远无法修改，所以请选择一个适合您的好标识名。此外，如果您选择删除现有应用列表，该
    SKU 也永远无法重复使用。

    *   **Bundle ID：** 在为应用配置配置文件后，您的应用 ID 应已列在 iTunes Connect 中，因此只需从下拉菜单中选择即可。


    ![9781430262381_Fig11-10.jpg](img/9781430262381_Fig11-10.jpg)    图 11-10。


    “应用信息”表单要求提供唯一的应用名称和 SKU，以及应用的 Bundle ID


    为避免在市场上引起消费者混淆，App Store 中不能有两款应用拥有相同的应用名称或 SKU。如果系统报告您请求的名称或 SKU 已被占用（即使该应用尚未获得
    App Store 销售批准），您将被迫提供不同的应用名称或 SKU。


    您可能无法将已“被占用”的应用名称用作您的 App Store 名称，但您可以在名称后添加包含关键词的说明文字来解决此问题。仅当 App Store 中没有其他可用（或即将上架）的同名应用时，才应选择这种方案。相同的应用名称可能在市场上造成混淆，让消费者无法确定哪一款是您的应用——尤其是当两款应用提供相似功能时。


    尽管您添加的说明文字使提交的名称在技术上于系统中是唯一的，但在消费者眼中，应用的实际名称本质上仍与其他应用相同。如果您的应用名称侵犯了 App Store
    中现有的商标应用名称，这还可能导致诉讼。如果您已为应用名称注册商标，那么法律将站在您这一边（至少在本国如此）。这就是为什么您必须进行充分的竞争研究并创建一个独特的名称（见第
    2 章）。为应用名称避免使用常见词汇可以防止此类问题的发生。


    **注意**  由于每个应用名称和 SKU 都必须是唯一的，Apple 已采取措施防止名称抢占——即在 iTunes Connect 中创建应用列表以阻止其他开发者获得该名称的行为。将应用添加到
    iTunes Connect 后，您只有 120 天时间上传应用二进制文件（以便将应用提交至 App Store 审核）。如果 120 天期限已过而您未上传应用二进制文件，该应用名称将从您的账户中移除，供其他开发者使用。因此，如果您创建应用列表是为了测试
    App 内购买等特定功能，请务必在 120 天到期前完成开发并提交应用二进制文件。


    在“应用信息”页面的最底部，您会注意到 Apple 关于指定设备要求的一段简要提醒。特殊的设备要求是指那些需要硬件相关功能的要求，例如 GPS、网络访问、内置摄像头或加速度计。毫无疑问，您在阅读
    Apple 的 *iOS 应用程序编程指南* 时，已经了解到如何通过应用 `Info.plist` 文件中的 `UIRequiredDeviceCapabilities`
    键来定义这些设备要求。如果尚未完成，您需要在为提交至 App Store 编译应用时进行必要的修改。


    与上一个页面一样，这些字段一旦提交便无法更改，因此确保拼写万无一失至关重要。


    完成应用信息输入后，点击“继续”按钮进入下一个页面。


    ## 步骤 2：设置可用日期和定价


    “权利与定价”页面提供了选择应用可用日期、价格层级和其他销售选项的设置（见图 11-11）。


    ![9781430262381_Fig11-11.jpg](img/9781430262381_Fig11-11.jpg)    图 11-11。在“权利与定价”页面设置应用的可用日期和价格层级


    ### 可用日期


    “可用日期”设置已被证明是应用提交流程中最令人困扰的元素之一。在 App Store 的主要分类页面中，消费者可以按发布日期对列表进行排序，这对于新发布的应用来说是极佳的曝光来源。

