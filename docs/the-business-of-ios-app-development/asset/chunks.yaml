  raw: 'Slashdot posted a story about it, linking to his blog, and Owen got to witness
    the famous “Slashdot effect.” The day of the Slashdot post, Streaming Colour Studios’
    site traffic increased 4,000 percent, and his Dapple sales were four times more
    than the usual daily sales! As you can see, publishing interesting articles of
    value on your blog (with links from your social media accounts) has the potential
    to dramatically boost both product awareness and app sales.    Participating in
    Interviews and Podcasts    It goes without saying that invitations by the press
    and the developer community to be interviewed for a story or a featured guest
    on a popular podcast should be accepted when your schedule permits. This can have
    a similar effect to publishing frequent blog articles and Twitter posts, enabling
    consumers and peers to learn more about you as a person and business owner. It
    represents yet one more valuable audience for increasing sales and awareness for
    your app.    Be aware of the proposed topic before agreeing to participate in
    an interview or podcast. If the story takes a negative angle, your involvement
    could ultimately tarnish your reputation.    Also be very careful what you say
    in an interview. When you’re on the record, speaking too casually about your opinions
    of other products, companies, and individuals can land you in hot water. Remember
    that most published articles remain online indefinitely, so your words can come
    back to haunt you again and again.    If you’re charming and don’t experience
    difficulties speaking in public, then this additional exposure can help endear
    new fans to your cause. If you’re shy (like most programmers) with a distinct
    fear of public speaking, it might be beneficial to first receive some media training.
    It’s important that you’re able to make a good impression when speaking to the
    press or chatting on podcasts. Sure, media-training consultants and seminars cost
    money, but if you blow a high-profile interview, that could cost you even more.    Looking
    Toward the Horizon    First, I would like to thank you for reading this book.
    And second, I want to congratulate you for working so diligently through every
    chapter. Together, we’ve covered a vast number of important topics. You’ve learned
    about competitive research, in-app marketing strategies, alternative business
    models, the App Store submission process, online promotion, and much more. There
    was even a chapter dedicated to harnessing the power of In-App Purchase! This
    book was carefully designed to provide the essential tools, resources, and knowledge
    needed to transform your iOS app development from a fun hobby into a successful,
    thriving business.    Beyond what you’ve read within these pages, there will always
    be new avenues for promoting your app. Study what other developers are doing to
    market their mobile products—not only what works, but also which strategies fail
    and why. But don’t limit your scope to only the iOS community. It’s important
    to stay well informed on current events in the entire mobile arena by reading
    all the latest technology news sites and blogs, such as TechCrunch, Techmeme,
    Daring Fireball, and Mashable (to name just a few). Even software marketing campaigns
    for Google Android, Windows Phone, HP webOS, and mobile web apps may inspire new
    ideas that would lend themselves well to your own efforts reaching iPhone, iPad,
    and iPod touch users. The goal is to keep an open mind and embrace new strategies
    that can help grow your business.    With the App Store being such a phenomenal
    success, the iOS platform will undoubtedly expand onto new devices. And forthcoming
    SDK updates will continue to roll out an endless array of innovative new features.
    It’s a fascinating time to be in mobile software, and Apple has only just begun
    to tap into the possibilities. With new opportunities arising every day for iOS
    developers, the future promises to be an exciting journey!    Index    ![images](images/sq.


