  trans: '

    # 版本信息页面


    ## 图像部分


    版本信息页面的“图像”部分允许您选择和上传用于在 App Store 中展示的 1024 × 1024 像素大型应用图标和应用截图。


    ### App Store 图标


    早在第 4 章中，我就讨论过创建高质量 1024 × 1024 像素大型应用图标的必要性，因此您应该已经准备好此图标文件并等待上传。请注意，此大型图标必须与您的
    iOS 应用中编译的应用图标设计一致。提交设计不一致的应用图标会迅速导致您收到拒审通知。


    1024 × 1024 像素的图标应以扁平的方形 PNG 图像形式提交，分辨率为 72 dpi，颜色模式为 RGB。请勿包含任何类型的图层、蒙版或透明度。


    而这是最重要的一条规则：请勿自行添加圆角或斜面光泽。App Store 会自动动态添加这些图标效果，但会尊重您应用的 `Info.plist` 文件中 `UIPrerenderedIcon`
    键的自定义设置。


    ### 应用截图


    提交截图时，无需按特定顺序上传。上传后，您应在“图像”部分看到它们以缩略图形式显示。要按特定顺序为 App Store 排列截图，只需用鼠标将图像缩略图拖放到所需顺序即可。您的主截图应始终是左侧的第一张图片。


    如果您的应用针对 Retina 显示屏进行了优化，Apple 建议您提交 Retina 尺寸的截图。iPhone 和 iPod touch 可接受的截图尺寸如下：


    - 1136 × 640 或 640 × 1136

    - 640 × 960 或 960 × 640 像素（Retina 显示屏全屏）

    - 600 × 960 或 920 × 640 像素（Retina 显示屏无状态栏）

    - 320 × 480 或 480 × 320 像素（全屏）

    - 300 × 480 或 460 × 320 像素（无状态栏）


    以下为 iPad 可接受的截图尺寸：


    - 768 × 1024 或 1024 × 768 像素（全屏）

    - 748 × 1024 或 1004 × 768 像素（无状态栏）


    与应用图标类似，截图也应采用 RGB 颜色、72 dpi 分辨率提交，且不包含透明度、蒙版或图层。支持的图像格式为 PNG、JPEG 和 TIFF。


    不符合 Apple 规范的截图尺寸和图像格式可能不会被系统接受。


    **注意** 如果您正在 iTunes Connect 中创建应用列表以测试某些功能（如 App 内购买），则完成该流程无需截图。上传 1024 × 1024
    应用图标后，只需单击**保存**按钮。当您准备好提交应用以供 App Store 审核时，随时可以返回并将截图上传到 iTunes Connect 中的应用列表中。


    完成版本信息页面后，单击**保存**按钮以完成应用列表的创建。


    ## iTunes Connect 中的新应用列表


    现在，当您访问 iTunes Connect 中的**管理您的应用**部分时，应会看到您的新应用列表显示出来。单击应用图标将转到其主摘要页面（参见图 11-15）。


    ![9781430262381_Fig11-15.jpg](img/9781430262381_Fig11-15.jpg)


    图 11-15. iTunes Connect 中您的新应用列表主摘要页面


    在应用的摘要页面上，您可以管理任何相关的 App 内购买项目和其他属性。如果需要在提交应用二进制文件进行审核之前访问和编辑元数据或截图，请单击**查看详情**按钮（参见图
    11-16）。


    ![9781430262381_Fig11-16.jpg](img/9781430262381_Fig11-16.jpg)


    图 11-16. 在提交应用二进制文件进行审核之前，访问**查看详情**页面（可从应用主摘要页面访问）以编辑各种属性。


    ## 步骤 6：支持多种语言


    如果您的应用目前仅支持您的主要语言，则可以跳过此步骤。在您的应用实际包含对这些语言的本土化支持之前，请不要在 iTunes Connect 中选择其他语言。而那些确实在应用二进制文件中提供了多语言支持的请先留步！


    在应用摘要的**查看详情**页面中，有一个**管理本地化**按钮（参见图 11-16）。单击该按钮将转到本地化页面，该页面允许您指定其他语言，以便在支持这些语言的地区性
    App Store 中展示。例如，如果您的应用已同时支持英语和日语，您可以在此处添加日语作为其他语言。由于您在第 1 步中选择的主要语言是英语，因此无需再添加英语。


    选择其他语言后，您将看到一个新的网页表单，该表单与您之前遇到的应用程序元数据表单几乎完全相同。唯一的区别在于，您需要为 App Store 元数据元素（如应用名称、描述、关键词、支持
    URL，甚至可以选择上传本地化截图）提交本地化内容，而不是英语内容。如果您选择不为新语言提交新截图，则将默认使用主要语言的截图。


    ## 步骤 7：上传您的应用二进制文件以供 App Store 审核


    在本章前面部分，您为 App Store 分发编译了您的应用。现在您刚刚完成了在 iTunes Connect 中添加应用列表的操作，App Store 提交流程的最后一步就是上传您的应用二进制文件。


    在继续之前，请花点时间仔细检查 iTunes Connect 应用摘要中列出的详细信息，非常仔细地检查是否有任何错误或拼写错误。一旦上传您的应用二进制文件，它将被添加到
    Apple 审核队列中，并且之后只有少数应用元素可以在 iTunes Connect 中编辑（无需提交更新）。换句话说，现在是确保一切正确的时候了！


    如果一切看起来没问题，那么请转到 iTunes Connect 中应用的**查看详情**页面（参见图 11-16），并单击屏幕右上角的蓝色**准备上传二进制文件**按钮。您将看到一个**出口合规**页面。


    ### 出口合规


    由于当前的出口法律，任何包含加密的产品都需要获得出口授权。**出口合规**页面会询问您的应用是否包含加密或访问加密（参见图 11-17）。


    ![9781430262381_Fig11-17.jpg](img/9781430262381_Fig11-17.jpg)


    图 11-17. 在您上传应用二进制文件之前，iTunes Connect 要求您回答出口合规问题。


    如果答案为**否**，您可以直接继续——只需单击**保存**按钮。


    如果答案为**是**，则会出现更多加密问题，需要回答才能继续。根据您回答这些附加问题的方式，系统可能会要求您上传商品分类自动跟踪系统 (CCATS) 文件的副本。


    由于出口合规部门必须在您的应用可在 App Store 上架之前审查并批准您的 CCATS 文件，如果要求提供 CCATS 文档，请做好应用审核期比平常更长的准备。如果您以前从未听说过
    CCATS，那您的应用很可能不属于此类别。


    ### 等待上传应用状态


    现在您已发起上传应用二进制文件的请求，您应用在 iTunes Connect 中的状态应从**准备上传**更改为**等待上传**（参见图 11-18）。

    '
- fmt: '### Waiting for Upload Status


    Your app status changing to *Waiting for Upload* signals that iTunes Connect is
    now ready to receive your app binary upload.


    ![9781430262381_Fig11-18.jpg](images/9781430262381_Fig11-18.jpg)

    **Figure 11-18.** Your app status changing to *Waiting for Upload* signals that
    iTunes Connect is now ready to receive your app binary upload.


    You won’t be able to successfully upload your app binary until your app status
    is *Waiting for Upload*. Once that’s verified on your app’s main summary page
    in iTunes Connect, you can finally go back to Xcode Organizer.


    ### Submitting Your App Binary in Xcode Organizer


    Remember when you compiled your app with Xcode’s *Build and Archive* option earlier
    in this chapter? Make sure your compiled app is still selected in the *Archived
    Applications* section of Xcode Organizer. At the bottom of the window, you should
    see three buttons (see Figure 11-19).


    ![9781430262381_Fig11-19.jpg](images/9781430262381_Fig11-19.jpg)

    **Figure 11-19.** When iTunes Connect is waiting for your binary upload, you can
    validate and submit your application for App Store review within Xcode Organizer.


    **Note:** An alternate method of uploading your app binary is via the Application
    Loader utility that’s included in the Xcode developer tools download. In various
    places in Apple’s documentation, you’re directed to use Application Loader for
    uploading your app binary to iTunes Connect. While that’s certainly a valid option,
    most iOS developers recommend compiling your app with Xcode’s *Build and Archive*
    option and uploading your app binary through the latest version of Xcode Organizer.


    First, click the *Validate Application* button. This performs the same validation
    tests that Apple will run during the review process. If it notifies you of any
    problems with your app binary, take this opportunity to fix the issues and recompile
    before submitting your app to Apple.


    After passing the validation checks, you can now click the *Submit Application
    to iTunes Connect* button. You’ll be asked to provide your iTunes Connect login
    and password to complete the submission request.


    And that’s it! Once the upload finishes, your app status should change to *Waiting
    for Review*.


    ### Developer Rejected Status


    If you discover a problem or need to edit certain assets that are untouchable
    when in the submission queue, then you can pull the app from review by clicking
    the app listing’s *Reject Binary* button in iTunes Connect. This will change your
    app’s status to *Developer Rejected*.


    When you’re ready, you’ll need to resubmit a new app binary, which will start
    the review process from the very beginning. Obviously, you would do this only
    when in dire need.


    ### In Review Status


    When your app is being reviewed by Apple, the status changes to *In Review*. If
    you were required to upload a CCATS document, you may see the status *Waiting
    for Export Compliance* while your CCATS is being evaluated.


    ### Ready for Sale Status


    If your status reads *Ready for Sale*, then your app has been approved! Time to
    celebrate the momentous occasion!


    ### MANAGING YOUR OWN EXPECTATIONS


    Tom Petty was never wiser when singing “the waiting is the hardest part.” You’ve
    worked so hard to get to this point that, even if the app review process ends
    up being much shorter than expected, the slow passing of time until Apple’s confirmation
    arrives can feel excruciatingly long. Patience, Grasshopper. It’s best not to
    dwell on it. Instead, give yourself a project to keep you occupied.


    Have you finished creating all of your marketing materials, such as your press
    release and video trailer? And how about researching and connecting with potential
    media sites for reviews and press opportunities, as discussed in Chapter 10?


    If you’ve taken care of your marketing tasks, then that’s great! You’ll be ready
    to rock when your app does become available in the App Store. But that’s still
    no excuse to idly sit, feverishly watching the clock.


    There’s no time like the present to dive into developing your next application
    or begin working on new features for the existing app. Just whatever you do, keep
    busy, and the time will fly.


    ### Getting App Status Notifications


    Those of you who would rather not log in to iTunes Connect a million times a day,
    obsessing over when that status message will change, can elect to have status
    updates sent to you directly via e-mail. Within your iTunes Connect user profile,
    simply opt in to receive status-update e-mail by modifying the settings in the
    Notifications tab (see Figure 11-20).


    ![9781430262381_Fig11-20.jpg](images/9781430262381_Fig11-20.jpg)

    **Figure 11-20.** Request to receive e-mail notifications when your app’s status
    changes by updating the Notifications tab in your iTunes Connect user profile.


    But if you’re paranoid that you might miss that all-important e-mail notification,
    Apple also provides a handy Status History feature. On your app listing’s main
    summary page in iTunes Connect, click the *Status History* link to see which stages
    of the review process have already transpired, as well as when specific actions
    happened and who initiated them (you or Apple).


    **Tip:** In an effort to provide greater transparency and streamlined communication,
    Apple also created the News and Announcements for Apple Developers site at `http://developer.apple.com/news/`
    as an online resource for app submission tips, iOS Dev Program updates, SDK news,
    and recommended programming techniques. This web site even posts the latest turnaround
    time for app reviews, such as “Percentage of iOS submissions reviewed within the
    last 7 days: 80% of new apps and 92% of app updates.”


    ### Try, Try Again: Dealing with App Store Rejections


    We all cross our fingers, desperately hoping not to receive the dreaded *Rejected*
    notice, but if your submitted iOS app is rejected by Apple, do not despair. Although
    painfully frustrating, it is not the end of the world. The nice thing about software
    is that it can always be modified and resubmitted!


    In the rejection letter that Apple sends, the reviewers usually explain why your
    app was rejected, and if you’re lucky, they sometimes even provide suggestions
    on how to remedy the issue. For simple things, such as inappropriate icons or
    the incorrect usage of a UI element, making the necessary adjustments should be
    a no-brainer.


    It doesn’t matter whether or not you agree with the reason for rejection. The
    important thing is that you make the requested fixes and resubmit your application.
    Fortunately, there’s no limit to how many times you can resubmit an app, so get
    back on that horse and keep trying. You’ve come this far, and you shouldn’t let
    a tiny dispute prevent you from making money in the App Store.


    For major rejection issues that are not so easily remedied, it’s important to
    remain calm and deal with this as a professional business owner. I know that just
    the idea of several months of your life being thrown out the window because of
    an unacceptable app is enough to drive any person into a screaming frenzy. Your
    first instinct may be to write a scathing blog post in an effort to rally the
    troops behind your cause. Social media networks like Twitter make it entirely
    too easy to gather an angry mob of online followers, but raging against the machine
    won’t endear you to Apple or the app review team. Yes, they do read blog posts
    and news sites. Although it might feel personally satisfying to have TechCrunch
    report on how you’re yet another victim of app rejection, that won’t help you
    get into the App Store.


    And if Apple’s rejection was completely justified because your application violates
    its established terms and conditions, you really don’t have a good reason to complain.
    Your loud rants will only make you look unprofessional in the eyes of your peers:
    the developer community.'
