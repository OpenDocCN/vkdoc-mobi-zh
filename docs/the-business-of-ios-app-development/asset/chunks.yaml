- fmt: '# 如何制定有效的 Lite 版应用策略


    Very few developers will experience the same level of success as Ethan Nicholas
    or Rovio, especially with the staggering number of apps now competing for attention
    in the App Store. But if you develop a solid lite version strategy, there is still
    potential to make quite a bit of money. A lot of factors go into building an effective
    lite version. Here’s where attention to detail can really pay off.


    ## 他们不会为免费牛奶而购买奶牛


    Most developers immediately understand the marketing value of offering a free
    lite version, but since Apple requires lite apps to be fully functional, a major
    concern is giving too much away. If your lite version includes enough functionality
    to satisfy people’s needs, why would anyone buy the paid version?


    The answer lies in all of the market analysis and competitive research discussed
    in [Chapter 2](#9781430262381_Ch02.xhtml). If you know the audience your app is
    targeting, who your competition is and what features those apps offer, and which
    key features are important to users, then planning your lite version strategy
    will be that much easier.


    The trick is to understand which features to include in the lite version without
    cannibalizing your paid app sales. If your competitors offer specific features
    in their lite versions, you’ll want to take a similar approach, especially if
    users are expecting those features. But if your app has some cool new feature
    that no one else offers—that innovative X factor that sets your app apart from
    the competition—then you’ll want to figure out a way to allow users to test-drive
    that feature in your lite version, while providing a more comprehensive version
    of it in your paid app.


    You want to whet their appetite without giving away the whole meal.


    ## 生产力工具和实用工具的 Lite 版本


    For productivity, utility, and nongame apps, choosing lite version features can
    be challenging, which is why many of them do not offer free lite versions. Instead,
    they rely on reviews, external publicity, video trailers, and screenshots to help
    sell the app. How do you limit the lite version functionality enough to encourage
    paid app sales and yet still get approved into the App Store?


    If you’re building an app that creates documents or notes, you’ll need your lite
    version to be fully functional, allowing users to create, edit, and save those
    files. Since users will want the ability to import/export their documents via
    e-mail or synchronize files with a remote server (such as Google Docs or Dropbox),
    then obviously those are features your app will need to remain competitive in
    the App Store, but they could be offered as premium features available only in
    the paid version.


    If your app enables users to create to-do tasks or lists of some kind, one effective
    approach is to limit the number of items that can be created within the lite version.
    To properly set user expectations, your lite version should openly communicate
    the current limitations, encouraging users to upgrade to the paid version for
    the full, unlimited experience.


    Marco Arment adopted this strategy for `Instapaper Free`, the lite version of
    his acclaimed `Instapaper` app, which is a useful tool for saving web pages for
    reading later. `Instapaper Free` limits storage to ten web page articles—enough
    to convince people of the benefits and convenience of this service. Once they’re
    hooked and require more space, they will be more inclined to upgrade to the paid
    version, which offers unlimited storage, iPad compatibility, and a bevy of additional
    features (see [Figure 6-2](#9781430262381_Ch06.xhtml#Fig2)).


    ![9781430262381_Fig06-02.jpg](images/9781430262381_Fig06-02.jpg)


    [Figure 6-2](#9781430262381_Ch06.xhtml#_Fig2). Marco Arment’s `Instapaper Free`
    is limited to saving ten web page articles for later reading, encouraging users
    to upgrade to the paid version for unlimited article storage, iPad compatibility,
    and additional features


    ## 游戏的 Lite 版本


    For games, devising a free lite approach is usually a much simpler task. Game
    developers typically include the first few levels in the lite version. If users
    want more, they need to purchase the paid version, where they are rewarded with
    dozens of additional levels, enhancements, and special features.


    Depending on your app’s game play, limiting the lite version to only a handful
    of introductory levels may not be enough to adequately showcase the game’s true
    value. Matt Rix ran into this issue when he developed the lite version for his
    best-selling game, `Trainyard`.


    “The paid game has around 150 puzzles, and at first, I thought about including
    only the first few puzzles in the lite version, hoping users would see the potential
    and want to buy the full game,” said Matt. “The problem is that during the first
    10 or 15 puzzles, players are just starting to get a feel for the mechanics. The
    ‘ah ha!’ moments don’t come until 40 or 50 puzzles into the game, when you get
    a sense of just how cool the puzzles can be. That left me in a bit of a tricky
    spot. I could give away the first 50 puzzles in the lite version, but then if
    users decided to buy the paid game, there was no smooth upgrade path. They’d have
    to solve those 50 puzzles again in the full game. I considered adding a cheat
    to the full game that skipped the first 50 puzzles, but that still didn’t seem
    like the best solution.”


    Instead, Matt came up with a clever alternative. He created 60 brand-new puzzles
    for the lite version. Opting not to use the word *lite* or *free*, he named this
    edition `Trainyard Express` and refers to it as a “prequel” to the full paid version
    of `Trainyard` (see [Figure 6-3](#9781430262381_Ch06.xhtml#Fig3)).


    ![9781430262381_Fig06-03.jpg](images/9781430262381_Fig06-03.jpg)


    [Figure 6-3](#9781430262381_Ch06.xhtml#_Fig3). Matt Rix’s free `Trainyard Express`
    offers 60 unique puzzles to avoid overlapping the 150 puzzles in the paid `Trainyard`
    game. This strategy increases the perceived value of both versions


    Matt admits that this unconventional path required a lot of extra development
    work, but there was quite a bit of strategic thinking behind the effort. He added,
    “I really want people to fall in love with the mechanic, and I think this might
    just be the best way to do it. I also increased the difficulty curve quite a bit,
    so that the sixtieth puzzle in the free `Express` is as hard as the hundredth
    puzzle in the full game.”


    In positioning `Trainyard Express` as its own stand-alone precursor to the full
    paid game, fans of `Trainyard` will want to download both versions in order to
    play all 210 puzzles. This incidentally helps boost the game in both the paid
    and free charts, for greater visibility in the App Store.


    ## 何时发布 Lite 版本


    Giving away so much free content may seem like a risky gamble, but depending on
    your particular app’s functionality or game play, it can be winning move that
    earns you a faithful following of loyal customers.


    The initial concern that a lite version may potentially impede paid app sales
    is a scary prospect for any new app business. Due to this fear, many independent
    developers shy away from lite versions. Some developers wait until app sales drop
    off, thinking that introducing a free lite version at the tail end of an app’s
    life span will help resuscitate sales. Although that may drum up a little extra
    business, they are really not maximizing the true potential of the lite version
    as a promotional tool. The timing is all wrong.


    Developers who have taken this delayed approach do see an increase in paid app
    sales when introducing a free lite version at such a late stage, but by then,
    all of the free publicity generated from the initial launch has long since faded,
    so the new sales bump is often not enough to push the paid version back into the
    App Store’s Top 200\. If only those developers had made a free lite version available
    when their app’s release was benefiting from the initial wave of publicity!'
