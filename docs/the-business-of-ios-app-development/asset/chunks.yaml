- fmt: '# Monetizing Free Apps


    The last way of monetizing a free app is one that may not be thought of by most
    developers and can be a bit of a gamble. Today, a lot of large companies will
    buy the rights to an app simply based on the number of users they have. These
    situations come about more and more each day. The most popular one that comes
    to mind is `Instagram`.


    `Facebook` saw a new and emerging market in the ever-so-impressionable teen demographic.
    This photo-sharing app has never and will never make a dime. There are no ads,
    no In-App Purchases, and no up-selling to a premium version. `Facebook` simply
    bought out `Instagram` for its user base and for a cold billion dollars. Yes,
    billion with a B.


    Another app that is doing the exact same thing is `Snap Chat`. This app allows
    you to send picture messages that are "erased" after being viewed. This application
    is very popular with the teen demographic and has had many different multibillion-dollar
    offers.


    The point of this is to figure out your end-game strategy. Are you looking to
    make money from your users or are you working toward an acquisition from a third
    party? If you are gunning for that big buyout, then making your app free forever
    may be the best option.


    ## Shifting Gears


    Paid apps are not the only avenue to make money in the mobile universe. Do you
    want to really leverage the power of free to generate more revenue? Promotional
    lite versions and the other business models discussed in this chapter are only
    the tip of the iceberg. The next two chapters will explore in-app advertising
    and In-App Purchase.


    ## Chapter 7: Monetizing Free Apps with iAd and Other In-App Advertising Opportunities


    Mobile advertising is widely perceived as the next great marketing frontier, with
    advertisers racing to target that growing audience. In this chapter, the world
    of in-app advertising is thoroughly examined, educating you on the mobile ad networks
    available for iOS apps and the value of tracking usage through in-app analytics.
    Alternative advertising models, such as sponsorships and product placement deals,
    are also explored.


    ### When to Use In-App Advertising


    At one time or another, we''ve all downloaded free apps that display some kind
    of in-app advertising, and many of us have even tapped the ads. Based on current
    trends, the research experts at `Gartner` anticipate mobile ad spending to surpass
    $17 billion by 2014. Even Apple has jumped into this lucrative market with the
    introduction of its `iAd` platform for serving ads in iOS apps. But the big question
    is this: Can app developers make any money from it?


    In-app advertising can be an effective way to monetize your free app without relying
    on paid content sales, but it may not be a viable business model for all apps.
    You need to take an in-depth look at what kind of app you''re building, as well
    as how people will be consuming your app.


    #### Knowing Your Audience


    If you''re developing a free app that would appeal to a broad mainstream market
    and experience frequent usage, you might be able to earn quite a bit of revenue
    from in-app advertising. The key is *volume*.


    The best case study for this is the one-hit wonder game `Flappy Bird`. The game
    was free and generated revenue by displaying `iAd`s in the home screen and the
    game-over screen. The game was built to be a fad and appeal to everyone, so the
    idea of a free app made perfect sense. `Flappy Bird` generated an excess of $50,000
    a day simply from `iAd`.


    The more people who use your app, the more ad impressions and click-throughs that
    will accrue. And if your app is "sticky" enough to retain the user''s attention
    for a long span of time, it will be able to display many more banner ads, which
    will net you more ad-sharing revenue.


    If your free app has limited appeal to a niche market, then it may not generate
    enough advertising revenue to support your business. On the other hand, catering
    to a niche market may earn you higher rates from premium ad networks whose brand
    advertisers are eager to target that audience. Even though this kind of niche
    app will ultimately attract fewer users than a mass-market app, it may be able
    to make up the difference in revenue by earning more money per ad.


    Here are some factors to consider:


    - **Apps that use the Internet:** If your app requires an Internet connection,
    such as to access GPS information, web services, or an online social network,
    adding in-app advertising will not be an imposition for your users, since they
    will already be online when running your app. This is important to keep in mind,
    because even though an iPhone typically has a constant connection (via Wi-Fi or
    cellular carrier), iPod touch and iPad users may not have a Wi-Fi connection at
    all times. If the majority of your customers tend to use your app offline, then
    your in-app advertising will not make you any money. If your app cannot communicate
    with the ad network servers, it can''t serve up ads.

    - **Apps for a younger audience:** If your app is a game or educational app aimed
    at a younger demographic, in-app advertising may not be appropriate. For one,
    parents may not appreciate apps that directly advertise to their kids. And advertising
    to young children may be illegal in some regions, so it''s important to do your
    legal homework.

    - **Entertainment apps and casual games:** Many entertainment apps, especially
    casual games and board games, can fare quite well with in-app advertising, especially
    the ones that require an Internet connection for logging in to an online leaderboard
    or game network. If the UI design is done right, banner ads inserted at the very
    top or bottom of the screen should be unobtrusive to the game play. An example
    is `Angry Birds Free`, which earns revenue from in-app advertising. The development
    company, `Rovio`, prevents the actual game play from being obscured by creatively
    sliding the ad banners in and out of view at the top of the screen (see [Figure
    7-1](#9781430262381_Ch07.xhtml#Fig1)).


    ![9781430262381_Fig07-01.jpg](images/9781430262381_Fig07-01.jpg)


    [Figure 7-1](#9781430262381_Ch07.xhtml#_Fig1). `Angry Birds Free` slides ad banners
    in and out of view at the top of the screen to prevent obscuring actual game play


    - **Immersive games:** In-app advertising can be very difficult to successfully
    integrate into full-screen, immersive 3D games. Often, the only option in those
    cases is to display advertisements in between game levels. This is usually not
    ideal, since that would drastically reduce the number of ad impressions your app
    could generate, especially if game levels take a long time for users to complete.


    If you do decide to monetize your free iOS application with in-app advertising,
    be sure to do it from the very beginning, with your initial 1.0 release. If your
    app has always included advertising, users will simply accept it as the price
    for a free download. If your app has already gained a loyal following of users
    who have enjoyed several versions of your app ad-free, then the sudden introduction
    of in-app advertising in a later update is bound to upset many of your fans. As
    always, you want to avoid receiving negative customer reviews in the App Store,
    so carefully plan your free app strategy up-front.


    ### In-App Advertising As a Sales Tool'
