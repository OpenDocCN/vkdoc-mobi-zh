- fmt: '# Engaging Users with Rich Media


    Interested bloggers and journalists may pull content from your site when writing
    a review, so it’s always a good idea to include both video and screenshots whenever
    possible. If you have not yet finished producing your app’s video trailer, then
    at the very least, include some high-quality screenshots.


    Although most developers display their app’s primary screenshot within a large
    iPhone or iPad image on their web pages, the more effective sites actually embed
    video or an animated slide show of screenshots within the iOS device image. This
    is very engaging, giving the user a much more immersive representation of your
    app’s functionality or game play. FutureTap does this on its Where To? web site
    (see [Figure 10-6](#9781430262381_Ch10.xhtml#Fig6)). Every few seconds, a different
    screenshot slides into view within the displayed iPhone. If you want to go back
    to a particular screen, it has even included iOS-centric page “dot” markers for
    manually stepping to a specific image.


    To achieve a similar effect, you can use JavaScript code to run through a slide
    show of static screenshots within the iPhone or iPad image frame. Not a JavaScript
    guru? No problem. Plenty of great slide show scripts are available online, many
    of which are free. Just search the Web for *JavaScript image slide show*, or check
    out the nice collection of JavaScript solutions at these sites:


    *   Dynamic Drive (`http://www.dynamicdrive.com`)

    *   Hot Scripts (`http://www.hotscripts.com`)


    Some of the slide show scripts offer such smooth transition effects between images
    that the slide show almost plays like a movie, without the overhead of a large
    video download.


    The iPhone displayed on the Put Things Off web site at `http://putthingsoff.com`
    showcases an embedded QuickTime video. Click the play symbol, and the video will
    load and play right there within the iPhone frame, simulating the Put Things Off
    app in action (see [Figure 10-7](#9781430262381_Ch10.xhtml#Fig7)). The combination
    of the video and simple four-step text instructions emphasizes just how easy the
    app is to use.


    ![9781430262381_Fig10-07.jpg](images/9781430262381_Fig10-07.jpg)


    [Figure 10-7](#9781430262381_Ch10.xhtml#_Fig7). The embedded video and the brief
    four-step instructions on the Put Things Off web site spotlight the app’s ease
    of use


    This eye-catching technique creates the illusion that the iPhone graphic is running
    the app live within your web browser. To maintain that illusion, set the HTML
    QuickTime code’s `controller` parameter to `false` to ensure that the playback
    controller bar is invisible. You should set the `bgcolor` parameter to `#000000`
    (black) to avoid any unsightly borders around the video frame. You may also want
    to assign the `autoplay` and `loop` parameters to `true`, so that the video begins
    playing immediately when the web page loads and continues to loop endlessly. To
    learn about the dozens of other QuickTime parameters for customizing video playback,
    as well as the best method for embedding a QuickTime video within a web page,
    check out Apple’s official *HTML Scripting Guide for QuickTime* at `http://developer.apple.com/library/safari/#documentation/QuickTime/Conceptual/QTScripting_HTML/QTScripting_HTML_AIntroduction/Introduction.html`.


    If you have produced a video trailer for your app, you’ll want to also upload
    it to the major video-sharing sites like YouTube to benefit from the additional
    exposure of their massive audiences and social media sharing features. But don’t
    be a lazy web designer and simply link directly to your video page on YouTube
    or Vimeo. It may be tempting to do this in the hopes of increasing your video’s
    view count (and popularity ranking), but that would pull visitors away from your
    site. Your goal should be to keep users engaged within your site so that your
    buy button is always only a click away. You can achieve this by simply embedding
    the video in your own web page. Even if your video trailer plays more like a commercial
    than pure simulation, so it would not make sense framed within a large iPhone
    or iPad graphic, it still should be viewable within your own site.


    For example, on your YouTube video page, there is an Embed button that allows
    you to copy and paste a short snippet of HTML code into your own web pages.


    Be sure to customize the embed code that YouTube generates with both the “Include
    related videos” option and the “Use old embed code” option turned off. The old
    embed code that YouTube used to employ would play only the Flash video format,
    which is not supported on iOS devices. The new embed code supports both Flash
    and HTML5 video, depending on the browser that loads the video. This enables iPhone,
    iPad, and iPod touch users to view your video, since the YouTube embed code will
    automatically switch to the HTML5 video format within Mobile Safari.


    ## Additional Details


    The lower half of your app’s web page is an ideal area to include additional text
    such as a comprehensive list of features, benefits, requirements, and even quotes
    from testimonials and reviews.


    Most people lead very busy lives, and the trend is toward increasingly short attention
    spans. Don’t expect anyone to take the time to read long, dense paragraphs of
    information. Organize the data into easy-to-read bullet points.


    ## Social Media


    I’ll be talking at length about growing your social media presence later in this
    chapter, but one major way to draw new followers to your social network identities
    is to heavily promote them on your web site.


    Looking at the blogs and web sites for most iOS developers, you’ll notice that
    a vast majority of them display button links to their Twitter and Facebook Pages
    in the hopes you’ll follow them there. The icons for both of those social media
    titans are very well known, so you could opt to display only their linked icons
    if you prefer a more space-saving approach, as shown in the fictional Breadcrumbs
    web page ([Figure 10-4](#9781430262381_Ch10.xhtml#Fig4)).


    Another icon button you may have noticed in [Figure 10-4](#9781430262381_Ch10.xhtml#Fig4)
    is the little green sharing emblem. You don’t just want people to follow you,
    but you also want them to share your web site URL with their friends and family.
    As I’ve said before, word-of-mouth is one of the most powerful marketing forces
    that social media provides. People trust their friends, so recommendations that
    come to them via word-of-mouth are a much more powerful sales tool than any advertising
    or self-promotion you do yourself.


    In previous chapters, I’ve shown you how to build support for Twitter, Facebook,
    and Tell A Friend functionality within your app. Your web site should also offer
    those same features, but thanks to some wonderful third-party services, you don’t
    need to write a single line of code! These services provide custom “share” widgets
    that can be easily installed on your web pages by copying and pasting their supplied
    code snippet, which typically consists of only a few lines of JavaScript. Here
    are a few of these services, which you may recognize from their use on millions
    of web sites:


    *   AddThis (`http://www.addthis.com`)

    *   ShareThis (`http://sharethis.com`)

    *   AddToAny (`http://www.addtoany.com`)'
