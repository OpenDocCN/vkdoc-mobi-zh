- fmt: '如果你认为自己的概念很有胜算，并且决定要涉足一个已经被类似应用饱和的特定细分市场，请知道你将面临艰巨的挑战。当用户有如此多的选择争夺他们的注意力时，要扩大你的客户群将是一场艰苦的战斗。我们稍后会在本章中更深入地探讨如何分析和智胜竞争对手。


    如果发布应用后，你发现在如此拥挤的领域竞争太过困难，并选择放弃该应用，转而在一个不那么拥挤的类别中开发不同的产品，那么你可能面临损害自身声誉以及未来任何新应用前景的风险。如果用户无法信任你会持续通过更新和新功能来支持这些应用，他们为什么还要购买你的其他应用呢？


    App Store 里充斥着数十款因销量不佳而被开发者放弃的应用。它们的商品页面满是愤怒的用户评论。虽然为损失 99 美分而小题大做听起来很幼稚，但这些抱怨实际上并非关乎金钱，而是关乎原则。你必须对自己的应用充满热情，并承诺长期持续维护它，以维护与客户的关系。


    ## 何时避免过度饱和的类别


    当需要将你的应用提交到 App Store 时，你会被要求选择一个合适的类别进行放置。有时最显而易见的选择并非总是最佳选择。


    在 App Store 中研究类似应用时，要仔细查看它们位于哪些类别，以及它们在那些类别中的表现如何。仅仅是这一点侦查工作就能帮助你选择最佳类别，从而让你的应用在
    App Store 中获得最大的曝光机会。


    这方面的一个好例子是 DistinctDev 最畅销的趣味应用 `The Moron Test`。尽管该应用包含多个游戏关卡，但开发者有意避开了庞大的`Games`（游戏）类别，转而选择将其放在较小的`Entertainment`（娱乐）类别中。结果证明这是一个明智之举。`The
    Moron Test`迅速成为`Entertainment`类别中收入最高的应用。这种曝光推动了更多的销售，进而将其排名提升至美国 App Store 前
    25 名的顶端。如果`The Moron Test`当初被放在`Games`类别中，它还能卖得这么好吗？也许不会。尽管`Games`主类别被划分为 19 个子类别（例如
    Action（动作）、Arcade（街机）和 Board Games（桌游）），但要与那些占据整体游戏排行榜主导地位的沉浸式、高动作、有发行商支持的 3D
    游戏竞争，仍然会非常困难。


    但要小心。根据你的应用类型，这种策略有时可能会适得其反。显然，在你的应用名称中包含正确的关键词至关重要，这样你的应用才能出现在相关的 App Store 搜索结果中，但人们也喜欢浏览他们最喜欢的类别来寻找新应用。记住这一点，不要仅仅因为一个类别更小就选择它。要选择大多数人在寻找你这类应用时会想到的类别。因此，尽管
    DistinctDev 避开了`Games`类别，但较小的`Entertainment`类别对于`The Moron Test`来说仍然是一个非常合适且直观的位置；如果他们决定把它放在`Weather`（天气）类别里，那可就完全说不通了。此外，众所周知，苹果会将不属于相关类别的应用从
    App Store 中移除，所以请预先注意。


    对于适合多个不同类别的应用，决定可能不那么显而易见。当这种情况发生时，最好去调查类似应用所选择的类别，尤其是那些销售情况良好的应用。例如，市面上有数十款笔记应用，但这类应用最适合放在`Utilities`（工具）、`Productivity`（效率）还是`Business`（商务）类别中？不妨在
    App Store 中快速搜索一下`notes`，看看大多数此类应用都位于哪里。


    强烈建议你使用桌面版 iTunes 进行所有竞争研究，因为它显示的信息比 iOS 设备上的移动版 App Store 要多得多。例如，如果你从搜索结果中选择一个应用，移动版
    App Store 的列表不会显示该应用的类别，但桌面版 iTunes 会显示（参见图 2-2）。


    ![9781430262381_Fig02-02.jpg](images/9781430262381_Fig02-02.jpg)


    **图 2-2**。如果从搜索结果中访问，应用的类别不会显示在 iPhone 的移动版 App Store 中（左），但会显示在桌面版 iTunes 的 App
    Store 中（右）


    当我购买写作软件时，我的目标是找到能帮助我提高写作效率的工具，因此本能地，`Productivity`（效率）类别是我首先会查看的地方。显然，有这种想法的不止我一个。尽管有些笔记应用位于`Utilities`（工具）和`Business`（商务）类别，但大多数都位于`Productivity`（效率）类别。


    有时，特定的类别会限制你的潜在受众。以本章前面提到的联系人交换应用 Bump 为例，开发人员希望该应用不仅限于商务用户。尽管类似应用牢牢扎根于`Business`（商务）类别，但
    Bump 的简洁性使其成为任何人都可以轻松使用的数据共享解决方案，因此他们决定将其放在`Social Networking`（社交网络）类别中，尽管`Business`（商务）、`Entertainment`（娱乐）和`Productivity`（效率）也都是不错的选择。


    “从核心来看，Bump 远不止是联系人信息交换；它是一种让两台设备直观交互的技术。我们不想把 Bump 局限于商务应用，也不想把它定位为仅限 iPhone
    的实用工具，”Lieb 说道。“通过选择`Social Networking`（社交网络）类别，我们将 Bump 定位为一种与周围人建立联系的工具。此外，我们知道如果我们的应用成功了，身处`Social
    Networking`（社交网络）类别将使我们与 Facebook、MySpace、LinkedIn、AIM、Yahoo 和 Loopt 等世界级品牌为邻。”


    所以，当你心存疑虑时，不妨查看一下竞争对手的类别选择，以及他们可能从这些位置获得的潜在优势。


    ## 评估竞争


    如果你的应用创意面临一些现有竞争，不要仅仅依赖于调查你所知道的竞争对手。你需要花些力气，在 App Store 中找到所有主要竞争对手。在进行了一些初步搜索后，你或许已经大致了解了有多少类似的应用存在，但现在你需要开始整理一份清单，以备日后参考。每当
    App Store 中出现一个新的竞争对手时，你都应该将其添加到你的清单中。


    密切关注竞争对手的动向，是作为开发者的主要工作之一。要扩大你的客户群并防止用户倒向竞争对手，唯一的方法就是确保你始终领先对手一步，而这需要时刻关注他们的更新。相信我，如果你的应用是一个有力的竞争者，你的竞争对手也正在密切关注着你的一举一动。


    你需要使用不同的关键词和短语变体进行多次搜索，以找出所有存在的类似应用。值得花时间创建一个关键词列表，列出你作为用户可能会尝试用来寻找此类应用的词。同时，使用词典和同义词词典来发现更多相关的词汇。没人知道用户会搜索什么关键词，所以最好做到全面彻底。'
  raw: 'If you think you have a winning concept and do decide to tackle a specific
    niche that’s already saturated with similar apps, just know that you’ll have your
    work cut out for you. It will be an upward battle to grow your customer base when
    users have so many choices vying for their attention. We’ll take a more in-depth
    look at how to analyze and outmaneuver your competition a little later in this
    chapter.


    If after releasing your app you find that competing in such a crowded space is
    too difficult and you choose to abandon the app to develop a different product
    in a less crowded category, you run the risk of tarnishing your reputation and
    the future of any new apps you release. Why would any users buy any other apps
    from you if they can’t trust that you’ll continue to support them with updates
    and new features?


    The App Store is littered with dozens of apps that have been abandoned by their
    developers from lack of sales. Their product pages are full of angry customer
    reviews. Although it may sound petty to make a big deal about losing 99 cents,
    these complaints are not really about the money, but about the principle. You
    must be passionate about your app, with a commitment to continue maintaining it
    for the long haul, in order to preserve the relationship with your customers.


    When to Avoid Oversaturated Categories


    When it comes time to submit your app to the App Store, you’ll be asked to select
    an appropriate category to place it in. Sometimes the most obvious choice is not
    always the best choice.


    When researching similar apps in the App Store, take a good look at which categories
    they’re located in and how well they are faring in those categories. Just this
    bit of detective work alone can help you choose the best category that will give
    your app the greatest chance for exposure in the App Store.


    A good example of this is DistinctDev’s best-selling novelty app, The Moron Test.
    Even though the app includes several levels of game play, the developers made
    a conscious decision to avoid the massive Games category, opting instead to place
    it in the smaller Entertainment category. This turned out to be a smart move.
    The Moron Test quickly rose to the top-paid app in Entertainment. That exposure
    fueled even more sales, which in turn elevated its position to the top of the
    US App Store’s Top 25\. Would The Moron Test have sold as well if it had been
    in the Games category? Maybe not. Even though the main Games category is divided
    into 19 subcategories (such as Action, Arcade, and Board Games), it still would
    have proven difficult to compete against the immersive, high-action, publisher-backed,
    3D games that dominate the overall Top Games chart.


    But be careful. Depending on the kind of app you have, sometimes this strategy
    can work against you. Obviously, having the right keywords in your app name is
    vital so that you’re included in related App Store searches, but people also like
    to browse their favorite categories to find new apps. With this in mind, don’t
    pick a category just because it’s smaller. Choose the category where most people
    will think to look for your type of app. So, even though DistinctDev bypassed
    the Games category, the smaller Entertainment category is still a very appropriate
    and intuitive location for The Moron Test; had they decided to put it in Weather,
    well that just wouldn’t make any sense. Apple also has been known to remove apps
    from the App Store that are not in relevant categories, so be forewarned.


    For apps that would fit well in several different categories, the decision may
    not be so obvious. When this happens, it’s best to investigate the categories
    that similar apps have chosen, especially the apps that are selling well. For
    example, dozens of note-taking apps are available, but should that kind of app
    be best placed in Utilities, Productivity, or Business? Do a quick App Store search
    for *notes* to see where most of those apps reside.


    It’s highly recommended that you use the desktop iTunes for all your competitive
    research because it displays much more information than the mobile App Store on
    iOS devices. For example, if you select an app from the search results, the app’s
    category is not displayed in the mobile App Store listing, but it does appear
    in the desktop version of iTunes (see [Figure 2-2](#9781430262381_Ch02.xhtml#Fig2)).


    ![9781430262381_Fig02-02.jpg](images/9781430262381_Fig02-02.jpg)


    [Figure 2-2](#9781430262381_Ch02.xhtml#_Fig2). If accessed from search results,
    an app’s category is not listed in the iPhone’s mobile App Store (left), but it
    is listed in the desktop version of the App Store in iTunes (right)


    When I shop for writing software, my goal is to find writing tools that will help
    me be more productive as an author, so instinctively, the Productivity category
    is the first place I look. And apparently, I’m not alone in that thinking. Although
    some note-taking apps are located in Utilities and Business, the majority resides
    in Productivity.


    Sometimes a particular category can limit your potential audience. In the case
    of Bump, the contact-swapping app mentioned earlier in this chapter, the developers
    wanted the app to appeal to more than just business users. Although similar apps
    are rooted firmly in the Business category, the simplicity of Bump made it an
    easy data-sharing solution for anyone, so the decision was made to place it in
    the Social Networking category, although business, entertainment, and productivity,
    would have been good choices as well.


    “At its core, Bump is much more than contact information exchange; it is a technology
    that lets two devices intuitively interact. We didn’t want to pigeonhole Bump
    as a business app, nor did we want to position it as an iPhone-only utility,”
    says Lieb. “By choosing the Social Networking category, we positioned Bump as
    a tool for connecting with the people around you. Also, we knew that if we were
    successful, being in the Social Networking category would put us right next to
    world-class brands like Facebook, MySpace, LinkedIn, AIM, Yahoo, and Loopt.”


    So when in doubt, check out your competition’s category choices and the possible
    advantages they may gain from those locations.


    Assessing the Competition


    If your app idea faces some existing competition, don’t rely on investigating
    only the competitors you know about. You’ll need to do the legwork of finding
    all your major competitors in the App Store. After doing some initial searches,
    you may already have a rough idea of how many similar apps exist, but now you’ll
    want to start compiling a list of them for later reference. And every time a new
    one pops up in the App Store, you should add it to your list.


    Staying on top of what your competitors are doing is one of your primary jobs
    as a developer. The only way to grow your customer base and prevent users from
    switching to the other side is to make sure you’re staying one step ahead of your
    competitors, and that requires keeping an eye on their updates. Believe me, if
    your app is a contender, your competitors are watching your every move, too.


    You’ll want to perform several searches using different keywords and phrase variations
    in order to find any similar apps that exist. It’s worth taking the time to create
    a list of keywords that you, as a user, might try in order to find these kinds
    of apps. Also, use a dictionary and thesaurus to discover additional related words.
    There’s no telling what keywords people may search for, so it’s best to be thorough.'
  trans: '如果你认为自己的概念很有胜算，并且决定要涉足一个已经被类似应用饱和的特定细分市场，请知道你将面临艰巨的挑战。当用户有如此多的选择争夺他们的注意力时，要扩大你的客户群将是一场艰苦的战斗。我们稍后会在本章中更深入地探讨如何分析和智胜竞争对手。


