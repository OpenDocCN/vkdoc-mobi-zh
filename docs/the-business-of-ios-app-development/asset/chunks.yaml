    \ altAdWidth = 0.0;\n    CGFloat altAdHeight = 0.0;\n    UIImage *altAdImage = [[[UIImage\
    \ alloc] init] autorelease];\n\nif (UIInterfaceOrientationIsLandscape([UIDevice\
    \ currentDevice].orientation)) {\n        // Landscape iPad Height: 768 - 20 pixel\
    \ status bar = 748.\n        adBannerView.currentContentSizeIdentifier = ADBannerContentSizeIdentifierLandscape;\n\
            iAdPosition = 748.0;\n        // Landscape iAd Banner Size: 1024 width,\
