- fmt: 'Since most blog software, such as WordPress, automatically generates RSS feeds
    for the latest blog entries, many bloggers are not placing much emphasis on their
    feed, beyond offering the obligatory link for interested subscribers. Although
    exciting new platforms like Twitter have seemingly cooled the popularity of this
    XML-based standard, RSS is still a very powerful mechanism for distributing information.
    To really leverage RSS for your own marketing needs, I highly recommend signing
    up for Google’s free FeedBurner service at `http://www.feedburner.com`.


    At first glance, FeedBurner may appear to be just a glorified analytics service,
    tracking who is subscribing to your RSS feed and which browsers or client apps
    are being used to read it. Although RSS statistics monitoring is very useful,
    FeedBurner is really so much more than that.


    One of FeedBurner’s features is `FeedFlare`, which inserts social media links
    within your feed. So with a single click, RSS subscribers can actually share individual
    posts on Digg, Delicious, Facebook, and other social networking sites. On top
    of that, FeedBurner will automatically send ping notifications to all major feed
    aggregators and search engines when you’ve posted a new blog entry.


    The service also provides JavaScript widgets for easily publishing feed content
    in HTML form on any web site, which is perfect for third-party sites interested
    in syndicating your blog content without the hassles of parsing XML. Although
    some bloggers may be wary of who repurposes their content, you’re using your blog
    and RSS feed to market your iOS app, so the more locations your feed is syndicated,
    the more exposure your app receives. It’s a win-win situation for you, since your
    primary goal is to drive as much traffic as possible to your product page in the
    App Store.


    But the most valuable feature by far is FeedBurner’s free Email Subscriptions
    service. This enables your site visitors to receive your blog posts via e-mail.
    Think about that for a moment. Instead of installing and maintaining complicated
    mailing list software on your own server for managing subscribers and sending
    out broadcast e-mail messages, FeedBurner does all of that for you. And you don’t
    even need to waste time configuring a SQL database and constructing e-mail templates.
    Just post a blog entry. It gets added to your RSS feed, which in turn gets sent
    out via e-mail to your e-mail subscribers. And did I already mention it’s free?
    You can even customize the e-mail messages with your own logo and font styles.
    And with the simple copy-and-paste Email Subscription HTML form code that FeedBurner
    provides, people can easily subscribe from within your own web site.


    But what if you don’t want every single blog post to be sent out to your mailing
    list? What if you need more control over the design of the e-mail messages? And
    how about importing existing mailing lists from previous marketing campaigns?
    To serve those needs, you’ll need a more robust e-mail marketing solution.


    ## E-mail News Mailing List


    Would you like to send news, announcements, and special offers directly to your
    customers via e-mail? If you’re like me, you may not want to be bothered with
    monkeying with your own mailing list software and the maintenance headaches that
    come with aggressive spam filters, SQL database security to keep out hackers,
    and other time-consuming nuisances. Fortunately, some easy-to-use yet affordable
    third-party e-mail marketing services can take care of all the heavy lifting.


    E-mail marketing services handle tasks like the following:


    - Maintain your mailing list databases and e-mail campaigns on their secure servers

    - Support custom HTML e-mail messages

    - List imports and exports

    - Provide extensive web-based admin sites with comprehensive analytics reports
    for each campaign

    - Produce custom HTML form code for you to copy and paste into your own web site
    for visitors to easily subscribe


    These services have “whitelist” agreements with the major Internet service providers
    (ISPs) and e-mail vendors to help prevent your campaigns from getting eaten by
    server-side spam filters. This alone makes these third-party services a better
    option than installing your own PHP/MySQL solution.


    Hundreds of e-mail marketing companies exist, but here’s a select group of services
    that have proven popular with software developers:


    - Campaign Monitor (`http://www.campaignmonitor.com`)

    - MailChimp (`http://www.mailchimp.com`)

    - Constant Contact (`http://www.constantcontact.com`)

    - iContact (`http://www.icontact.com`)

    - StreamSend (`http://www.streamsend.com`)

    - Vertical Response (`http://www.verticalresponse.com`)


    I’ve had the most experience with Campaign Monitor, which offers complete design
    control over the look and feel of your e-mail blasts. The thing I like best about
    Campaign Monitor is that you only pay per e-mail campaign; there’s no monthly
    fee. So, if I don’t send out an e-mail campaign this month, then I pay nothing.
    When I do send out a campaign, the rate is affordable. This is a great solution
    for developers with large mailing lists who send out very few e-mail messages.


    MailChimp offers its service free for low-volume accounts of fewer than 2,000
    subscribers. It gives you the ability to upgrade to larger-capacity plans as your
    subscriber base grows. MailChimp also offers `ChimpKit`, an Objective-C wrapper
    for the MailChimp API, which enables you to provide an e-mail newsletter sign-up
    form directly within your iOS app!


    Whether you choose the free FeedBurner Email Subscriptions or a more comprehensive
    e-mail marketing solution, let your site visitors know that unsubscribe links
    are located at the bottom of every e-mail newsletter for their convenience.


    It’s also important to include a link to a privacy policy somewhere on your web
    site. People are tired of dealing with spam, so they’ve become wary of giving
    out their e-mail address. A simple privacy policy statement can reassure site
    visitors that you won’t be selling or sharing their e-mail addresses with anyone.
    If you’re not sure how to word it, perform an online search for `privacy policy`.
    You’ll find hundreds of samples. Just be sure to adhere to whatever privacy policy
    you set to avoid liability issues. Beyond the fact that most countries now have
    strict antispam laws in effect, the wrath of negative word-of-mouth from angry
    subscribers can be even more damaging to your business.


    Why bother with e-mail newsletters at all if they are so troublesome? With overly
    aggressive spam filters, is it still an effective delivery mechanism? True, a
    fair percentage of your recipients may never see your e-mail because of hungry
    junk mail filters. But e-mail is still a very powerful pipeline to communicate
    news.


    Although you may be tempted to post announcements only on Twitter, Facebook, or
    your blog, you’re reliant on users to follow you there and religiously monitor
    your latest news. That places the responsibility on your audience, and although
    you may be vigilant about reading every tweet and Facebook update, most people
    are not. Why risk the possibility of your important posts being overlooked?


    There are still a lot of consumers who prefer a more passive approach. They would
    rather have requested information delivered to them directly than be forced to
    go find it for themselves. It’s all about providing as many communication options
    as possible on your web site, so that anyone interested in your iOS app can receive
    related news in the format or platform of their choice.


    ## Customer Support and Contact Information


    Even though I’ll be talking more about customer support options in [Chapter 11](#9781430262381_Ch11.xhtml),
    here I will mention that you should always link to your support page from your
    app’s main web site. At the very least, give site visitors some way to contact
    you—whether by e-mail or an HTML form.'
  raw: 'Since most blog software, such as WordPress, automatically generates RSS feeds
    for the latest blog entries, many bloggers are not placing much emphasis on their
    feed, beyond offering the obligatory link for interested subscribers. Although
    exciting new platforms like Twitter have seemingly cooled the popularity of this
    XML-based standard, RSS is still a very powerful mechanism for distributing information.
    To really leverage RSS for your own marketing needs, I highly recommend signing
    up for Google’s free FeedBurner service at `http://www.feedburner.com`.


