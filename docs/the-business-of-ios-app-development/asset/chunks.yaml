- fmt: '![9781430262381_Fig11-09.jpg](images/9781430262381_Fig11-09.jpg)    [Figure
    11-9](#9781430262381_Ch11.xhtml#_Fig9). In the Manage Your Applications section
    of iTunes Connect, click the Add New App button to get started


    ## Company Name and Primary Language


    If this is your very first iOS app submission, the first screen will ask you to
    provide your official company name and your application’s primary language. Please
    note that this information cannot be changed later, so do not make any mistakes
    on this page!


    The company name you submit should be the name you want listed in the App Store
    as the official developer of your application. Because of my own paranoia about
    proper code signing and App Store settings, I recommend using the same company/developer
    name across all of the following items to avoid any potential issues:


    *   Your iOS Developer Program account

    *   Your iOS distribution certificate

    *   Your iTunes Connect/App Store company name


    I use my company name, Electric Butterfly, Inc., for all three of those items,
    making sure the spelling and punctuation are always consistent.


    As for the primary language setting, this is the language that you’ll use to enter
    all of your application data during this submission process. For example, if you
    choose English from the drop-down menu, the rest of the online forms will require
    your information to be in English. After you’ve created your app listing in iTunes
    Connect, you’ll have an opportunity to add support for additional languages, such
    as French, German, Japanese, and so on.


    Clicking the Continue button will send you to the next screen, where you will
    enter some initial app information.


    ## App Information


    Let’s examine each of the three form elements on the App Information screen (see
    [Figure 11-10](#9781430262381_Ch11.xhtml#Fig10)) to better understand what’s required:


    *   **App Name:** The submitted name can be up to 255 characters long. As discussed
    earlier in this chapter, this field is not limited to only your app’s binary name
    or display name. Using an extended app name with a caption (like Tap Tap Tap’s
    “Convert—the unit calculator”) is recommended. But your app’s actual name should
    be included in that caption (preferably first). If your App Store name and your
    app’s display name on an iOS device’s home screen are too dissimilar, that may
    cause confusion among consumers, as well as possibly raise a red flag during the
    app review process.

    *   **SKU Number:** This field is often the source of the most confusion for iOS
    developers, since Apple does not provide much explanation as to the correct format
    or syntax of this string. Contrary to popular belief, there is no defined template
    or numbering system for the SKU attribute. Even calling it a SKU number is somewhat
    misleading, in that it does not need to consist of numeric characters. Your app’s
    SKU is never shown to customers and never publicly listed in the App Store. Basically,
    the SKU is an internal, unique ID for your app in iTunes Connect. It’s often convenient
    to use an easily recognizable name, rather than a string of only numbers, especially
    if you have related In-App Purchase items. For example, our fictional Breadcrumbs
    app’s SKU is `breadcrumbs`, and its In-App Purchase Premium Pack SKU is `breadcrumbs.premiumpack`.
    The SKU is independent of the version number, so it does not change with every
    version update. In fact, once submitted, that SKU number can never be modified,
    so pick a good identifying name that works for you. Also, if you opt to delete
    an existing app listing, that SKU can never be reused.

    *   **Bundle ID:** Your app ID should already be listed in iTunes Connect after
    configuring provisioning profiles for the app, so simply select it from the pull-down
    menu.


    ![9781430262381_Fig11-10.jpg](images/9781430262381_Fig11-10.jpg)    [Figure 11-10](#9781430262381_Ch11.xhtml#_Fig10).


    The App Information form requires a unique app name and SKU, along with your app’s
    bundle ID


    To avoid consumer confusion in the marketplace, no two apps in the App Store can
    have the same app name or SKU. If the system reports that either of your requested
    choices is already taken (even if that other app has not been approved for sale
    in the App Store), you’ll be forced to provide a different app name or SKU.


    You may not have a way to capture a “taken” app name for use as your App Store
    name, but you can append a keyword-rich caption to your name to work around the
    issue. You want to go this route only if there is no other app available (or soon
    to be available) in the App Store with the same name. Identical app names could
    cause confusion in the marketplace, with consumers unsure as to which one is your
    app—especially if both apps provide similar functionality.


    Even though your added caption makes your submitted name technically unique in
    the system, the app’s actual name is still essentially the same as the others
    in the eyes of consumers. This could also lead to lawsuits if your app name is
    infringing on an existing trademarked application name in the App Store. If you
    already trademarked your app’s name, then the law is on your side (at least in
    your country). This is why you must perform adequate competitive research and
    create a unique name (see [Chapter 2](#9781430262381_Ch02.xhtml)). Avoiding common
    words for your app name can prevent these kinds of problems from occurring.


    **Caution**  Since every app name and SKU must be unique, Apple has taken measures
    to prevent name squatting—the act of creating an app listing in iTunes Connect
    simply to keep other developers from obtaining that name. After adding an app
    to iTunes Connect, you’ll have only 120 days to upload an app binary (which submits
    the app for App Store review). If the 120 days lapses without an uploaded app
    binary, the app name will then be removed from your account, making it available
    for another developer. So, if you’ve created an app listing in order to test specific
    features like In-App Purchase, make sure you complete your development and submit
    your app binary before that 120-day expiration date.


    At the very bottom of the App Information screen, you’ll notice a brief reminder
    from Apple about specifying device requirements. Special device requirements are
    those that require hardware-related features, such as GPS, network access, the
    built-in camera, or the accelerometer. You undoubtedly already learned how to
    define those device requirements via the `UIRequiredDeviceCapabilities` key in
    your app’s `Info.plist` file when you read Apple’s *iOS Application Programming
    Guide*. If you haven’t yet done that, then you’ll want to make the necessary modifications
    when compiling your app for submission to the App Store.


    As in the previous screen, once these fields are submitted, they cannot be changed,
    so it’s vital that you do not misspell anything.


    When you’ve finished entering your app information, click the Continue button
    to proceed to the next screen.


    ## Step 2: Set the Availability Date and Pricing


    The Rights and Pricing screen presents options to choose your app’s availability
    date, price tier, and other selling options (see [Figure 11-11](#9781430262381_Ch11.xhtml#Fig11)).


    ![9781430262381_Fig11-11.jpg](images/9781430262381_Fig11-11.jpg)    [Figure 11-11](#9781430262381_Ch11.xhtml#_Fig11).
    Set your app’s availability date and price tier on the Rights and Pricing page


    ### Availability Date


    The Availability Date setting has proven to be one of the more frustrating elements
    of the app submission process. Within the main category pages of the App Store,
    consumers have the ability to sort the list by release date, which is a great
    source of exposure for new app releases.'
