    Groups by Guided Ways Technologies Ltd. (left) uses text and icons to visually
    promote a vast array of key features. The one for Newtoy’s Words with Friends
    (right) showcases core features, an impressive accolade from *Wired* magazine,
    and its compatibility with several iOS device models.


    Another example is the primary screenshot for Newtoy’s Words with Friends (on
    the right in [Figure 11-5](#9781430262381_Ch11.xhtml#Fig5)). It showcases a few
    core features and an impressive accolade from *Wired* magazine. It also displays
    a few different iOS devices running the app, visually promoting the fact that
    its social game play is compatible with a variety of hardware models, so all your
    friends can join in on the fun.


    If you do include text in your screenshots and you offer localized versions of
    your app in multiple regional App Stores, don’t forget to also localize your screenshots
    accordingly. Before capturing the screenshots, set the preferred language on the
    device, which can be located in the Settings app at General ![image](images/arrow.jpg)
    International ![image](images/arrow.jpg) Language. If you’re creating a custom
    image (such as the ones shown in [Figure 11-5](#9781430262381_Ch11.xhtml#Fig5)),
    be sure to translate the text correctly. Online web translator bots such as Google
    Translate can sometimes generate incorrect phrasing or syntax. To avoid confusion
    or even possibly offending someone with the wrong word, you might want to consult
    with a professional translator. When your localized screenshots are ready, simply
    upload them to the corresponding app language version in iTunes Connect.


    **App Rejection Warning** Apple’s review team will reject your app submission
    if any of the provided screenshots include an iAd test advertisement or display
    inappropriate content that does not adhere to the 4+ age rating policy. If your
    app displays iAd banners, then hide the banner view when capturing the screenshot.
    And if your app includes content for older audiences, be sure it’s not visible
    in your screenshots. In other words, don’t show mature media content or violent
    game play.


    # Preparing Your Application Binary for the App Store


    After learning the configuration process for ad hoc distribution (detailed in
    [Chapter 9](#9781430262381_Ch09.xhtml)), you’ll be happy to know that compiling
    your iOS app for distribution in the App Store is almost the same process. The
    only difference is the provisioning profile you assign to your application in
    Xcode.


    Have you finished beta-testing and tweaking your app? Are you ready to compile
    the master version for the App Store? Here’s a rundown of the steps to prepare
    the application binary that you’ll upload to iTunes Connect.


    ## Step 1: Verify Your Distribution Certificate Is Still Installed


    To compile your app for ad hoc distribution, you needed to generate your distribution
    certificate from the iOS Provisioning Portal and install it in your Mac’s Keychain
    system. This distribution certificate is also used when compiling for App Store
    distribution, so take a moment to ensure that it is still installed properly.
    Launch the Keychain Access application, located on your Mac at `/Applications/Utilities/Keychain
    Access`.


    In the dialog box that’s displayed, select login from the Keychains list and Keys
    from the Category list. In the list of keys, simply double-check that your private
    key is still paired with your distribution certificate. In the example in [Figure
    11-6](#9781430262381_Ch11.xhtml#Fig6), my Electric Butterfly, Inc. key (which
    was previously created for ad hoc distribution) is paired with my imported distribution
    certificate. If your distribution certificate is not paired with the appropriate
    key in a similar manner, then revisit step 1 of the ad hoc distribution process
    described in [Chapter 9](#9781430262381_Ch09.xhtml) before continuing.


    ![9781430262381_Fig11-06.jpg](images/9781430262381_Fig11-06.jpg)


    [Figure 11-6](#9781430262381_Ch11.xhtml#_Fig6). Verify that your distribution
    certificate is still paired with the correct private key in Keychain Access.


    ## Step 2: Generate and Install an App Store Distribution Provisioning Profile


    Log in to the iOS Dev Center online, click the iOS Provisioning Portal link in
    the top-right corner of the page, and then within the main Provisioning Portal
    page, navigate to the Provisioning section. Select the Distribution tab, and click
    the New Profile button.


    In the form that’s presented, be sure to choose App Store as the distribution
    method. Select the appropriate app ID for your application, and verify that the
    distribution certificate is assigned correctly. For easy reference, enter a profile
    name that includes the app’s name and reflects the specific purpose of this provisioning
    profile, such as `Breadcrumbs App Store Profile` (see [Figure 11-7](#9781430262381_Ch11.xhtml#Fig7)).
    It’s important that your App Store provisioning profile is named differently from
    your ad hoc distribution provisioning profile so that they are easily identifiable
    when listed in Xcode. Choose Submit to generate your App Store distribution provisioning
    profile.


    ![9781430262381_Fig11-07.jpg](images/9781430262381_Fig11-07.jpg)


    [Figure 11-7](#9781430262381_Ch11.xhtml#_Fig7). Since you’re done beta-testing,
    it’s time to generate an App Store distribution provisioning profile in the online
    iOS Provisioning Portal site.


    Within the Distribution tab’s list of provisioning profiles, click the Download
    button to save this new `*.mobileprovision` file to your hard drive. Drag the
    `*.mobileprovision` file onto the Xcode icon in your Dock. Xcode will automatically
    install that provisioning profile in the proper location.'
  raw: '[Figure 11-5](#9781430262381_Ch11.xhtml#_Fig5). The primary screenshot for
    Groups by Guided Ways Technologies Ltd. (left) uses text and icons to visually
    promote a vast array of key features. The one for Newtoy’s Words with Friends
    (right) showcases core features, an impressive accolade from Wired magazine, and
    its compatibility with several iOS device models


    Another example is the primary screenshot for Newtoy’s Words with Friends (on
    the right in [Figure 11-5](#9781430262381_Ch11.xhtml#Fig5)). It showcases a few
    core features and an impressive accolade from *Wired* magazine. It also displays
    a few different iOS devices running the app, visually promoting the fact that
    its social game play is compatible with a variety of hardware models, so all your
    friends can join in on the fun.


    If you do include text in your screenshots and you offer localized versions of
    your app in multiple regional App Stores, don’t forget to also localize your screenshots
    accordingly. Before capturing the screenshots, set the preferred language on the
    device, which can be located in the Settings app at General ![image](images/arrow.jpg)
    International ![image](images/arrow.jpg) Language. If you’re creating a custom
    image (such as the ones shown in [Figure 11-5](#9781430262381_Ch11.xhtml#Fig5)),
    be sure to translate the text correctly. Online web translator bots such as Google
    Translate can sometimes generate incorrect phrasing or syntax. To avoid confusion
    or even possibly offending someone with the wrong word, you might want to consult
    with a professional translator. When your localized screenshots are ready, simply
    upload them to the corresponding app language version in iTunes Connect.


    **App Rejection Warning**  Apple’s review team will reject your app submission
    if any of the provided screenshots include an iAd test advertisement or display
    inappropriate content that does not adhere to the 4+ age rating policy. If your
    app displays iAd banners, then hide the banner view when capturing the screenshot.
    And if your app includes content for older audiences, be sure it’s not visible
    in your screenshots. In other words, don’t show mature media content or violent
    game play.


    Preparing Your Application Binary for the App Store


    After learning the configuration process for ad hoc distribution (detailed in
    [Chapter 9](#9781430262381_Ch09.xhtml)), you’ll be happy to know that compiling
    your iOS app for distribution in the App Store is almost the same process. The
    only difference is the provisioning profile you assign to your application in
    Xcode.


    Have you finished beta-testing and tweaking your app? Are you ready to compile
    the master version for the App Store? Here’s a rundown of the steps to prepare
    the application binary that you’ll upload to iTunes Connect.


    Step 1: Verify Your Distribution Certificate Is Still Installed


    To compile your app for ad hoc distribution, you needed to generate your distribution
    certificate from the iOS Provisioning Portal and install it in your Mac’s Keychain
    system. This distribution certificate is also used when compiling for App Store
    distribution, so take a moment to ensure that it is still installed properly.
    Launch the Keychain Access application, located on your Mac at */Applications/Utilities/Keychain
    Access*.


    In the dialog box that’s displayed, select login from the Keychains list and Keys
    from the Category list. In the list of keys, simply double-check that your private
    key is still paired with your distribution certificate. In the example in [Figure
    11-6](#9781430262381_Ch11.xhtml#Fig6), my Electric Butterfly, Inc. key (which
    was previously created for ad hoc distribution) is paired with my imported distribution
    certificate. If your distribution certificate is not paired with the appropriate
    key in a similar manner, then revisit step 1 of the ad hoc distribution process
    described in [Chapter 9](#9781430262381_Ch09.xhtml) before continuing.


    ![9781430262381_Fig11-06.jpg](images/9781430262381_Fig11-06.jpg)


    [Figure 11-6](#9781430262381_Ch11.xhtml#_Fig6). Verify that your distribution
    certificate is still paired with the correct private key in Keychain Access


    Step 2: Generate and Install an App Store Distribution Provisioning Profile


    Log in to the iOS Dev Center online, click the iOS Provisioning Portal link in
    the top-right corner of the page, and then within the main Provisioning Portal
    page, navigate to the Provisioning section. Select the Distribution tab, and click
    the New Profile button.


    In the form that’s presented, be sure to choose App Store as the distribution
    method. Select the appropriate app ID for your application, and verify that the
    distribution certificate is assigned correctly. For easy reference, enter a profile
    name that includes the app’s name and reflects the specific purpose of this provisioning
    profile, such as Breadcrumbs App Store Profile (see [Figure 11-7](#9781430262381_Ch11.xhtml#Fig7)).
    It’s important that your App Store provisioning profile is named differently from
    your ad hoc distribution provisioning profile so that they are easily identifiable
    when listed in Xcode. Choose Submit to generate your App Store distribution provisioning
    profile.


    ![9781430262381_Fig11-07.jpg](images/9781430262381_Fig11-07.jpg)


    [Figure 11-7](#9781430262381_Ch11.xhtml#_Fig7). Since you’re done beta-testing,
    it’s time to generate an App Store distribution provisioning profile in the online
    iOS Provisioning Portal site


    Within the Distribution tab’s list of provisioning profiles, click the Download
    button to save this new `` *.mobileprovision* file to your hard drive. Drag the
    *.mobileprovision* `file onto the Xcode icon in your Dock. Xcode will automatically
    install that provisioning profile in the proper location.` ``'
  trans: '

    图 11-5。Guidled Ways Technologies Ltd. 出品的 Groups（左图）主截图使用文字和图标直观地展示了其海量核心功能。Newtoy
    公司的 Words with Friends（右图）则展示了核心功能、来自《连线》杂志的惊人赞誉，以及它与多款 iOS 设备机型的兼容性。


    另一个例子是 Newtoy 公司 Words with Friends 的主截图（图 11-5 右侧）。它展示了几个核心功能以及来自《连线》杂志的权威赞誉。此外，该截图还显示了运行该应用的几款不同
    iOS 设备，直观地宣传了其社交游戏玩法与多种硬件型号兼容，从而让你的所有朋友都能加入游戏，共享欢乐。


    如果你在截图中确实包含了文字，并且你的应用在多个地区的 App Store 中提供了本地化版本，请务必记得也相应地对截图进行本地化处理。在截取截图之前，请在设备上设置首选语言，该选项位于“设置”应用中的“通用”![image](img/arrow.jpg)“国际”![image](img/arrow.jpg)“语言”。如果你正在创建自定义图片（例如图
    11-5 中展示的那些），请确保正确翻译文字。像谷歌翻译这样的在线网络翻译机器人有时可能会生成不正确的措辞或语法。为避免混淆，甚至可能因用词不当冒犯他人，你或许应考虑咨询专业翻译人员。当你的本地化截图准备就绪后，只需将它们上传到
    iTunes Connect 中对应的应用语言版本即可。


    **应用被拒警告** 如果提供的任何截图包含 iAd 测试广告，或显示了不符合 4+ 年龄分级政策的不当内容，Apple 审核团队将拒绝你的应用提交。如果你的应用显示
    iAd 横幅，请在截取截图时隐藏该横幅视图。并且，如果你的应用包含面向年长受众的内容，请确保这些内容在截图中不可见。换句话说，不要展示成人媒体内容或暴力游戏画面。


    # 准备向 App Store 提交的应用二进制文件


    在了解了用于 ad hoc 分发的配置流程（详见第 9 章）之后，你会高兴地得知，编译你的 iOS 应用以便在 App Store 中分发的流程几乎相同。唯一的区别在于你在
    Xcode 中为应用分配的配置描述文件。


    你是否已完成应用的 Beta 测试和微调？准备好编译用于 App Store 的最终版本了吗？以下是准备要上传到 iTunes Connect 的应用二进制文件的步骤概要。


    ## 第 1 步：确认你的分发证书仍然安装完好


    为了编译用于 ad hoc 分发的应用，你需要从 iOS 配置门户生成你的分发证书，并将其安装到 Mac 的钥匙串系统中。此分发证书也用于编译 App Store
    分发版本，因此请花点时间确保它仍然安装完好。启动钥匙串访问应用程序，它位于你的 Mac 上的 `/Applications/Utilities/Keychain
    Access`。


    在显示的对话框中，从钥匙串列表中选择“登录”，从类别列表中选择“密钥”。在密钥列表中，只需仔细检查你的私钥是否仍然与你的分发证书配对。在图 11-6 的示例中，我的
    Electric Butterfly, Inc. 密钥（先前为 ad hoc 分发创建）与导入的分发证书配对。如果你的分发证书没有以类似方式与相应的密钥配对，那么在继续之前，请重新访问第
    9 章中描述的 ad hoc 分发流程的第 1 步。


    ![9781430262381_Fig11-06.jpg](img/9781430262381_Fig11-06.jpg)


    图 11-6。在钥匙串访问中确认你的分发证书仍然与正确的私钥配对。


    ## 第 2 步：生成并安装一个 App Store 分发配置描述文件


    登录 iOS 开发者中心网站，点击页面右上角的 iOS 配置门户链接，然后在主配置门户页面内，导航到“配置”部分。选择“分发”标签，然后点击“新建描述文件”按钮。


    在出现的表单中，请务必选择“App Store”作为分发方式。为你的应用选择合适的应用 ID，并确认分发证书已正确分配。为便于参考，请输入一个包含应用名称并反映此配置描述文件特定用途的描述文件名称，例如
    `Breadcrumbs App Store Profile`（参见图 11-7）。重要的是，你的 App Store 配置描述文件命名要与 ad hoc
    分发配置描述文件不同，这样当它们在 Xcode 中列出时才易于区分。选择“提交”以生成你的 App Store 分发配置描述文件。


    ![9781430262381_Fig11-07.jpg](img/9781430262381_Fig11-07.jpg)


    图 11-7。既然你已经完成了 Beta 测试，是时候在在线 iOS 配置门户网站中生成一个 App Store 分发配置描述文件了。


    在“分发”标签的配置描述文件列表中，点击“下载”按钮将此新的 `*.mobileprovision` 文件保存到你的硬盘。将 `*.mobileprovision`
    文件拖放到 Dock 中的 Xcode 图标上。Xcode 将自动将该配置描述文件安装到正确的位置。

