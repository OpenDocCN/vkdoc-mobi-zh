- fmt: '# Don’t Assume People Will Download Your App


    Don’t assume people will take the time to download your app just because you offer
    a free or lite version, or that they will jump to `YouTube` or your web site to
    view a video trailer. They are already browsing in the `App Store`, so they may
    not bother visiting other sites, especially if they are busy (and most people
    are). Your `App Store` product page needs to convince people to download the app,
    and probably the most influential element on that page will be your screenshots.


    With so much riding on the visuals, it’s imperative that you upload screenshots
    that best promote your app’s core functionality and quality. If it’s a game, then
    your screenshots better scream fun and excitement! If it’s a productivity app,
    then your screenshots need to emphasize just how much better someone’s life is
    going to be when using this app. Your screenshots need to have impact!


    ## Choosing the Primary Screenshot


    The first screenshot that is shown is the most important. It may be the only screenshot
    consumers see if they opt not to tap/scroll through the rest of the screenshots.
    So, make sure this primary screenshot is the one that best describes your app
    visually. Someone viewing it should immediately understand the general concept,
    without needing to read the description or load the other screenshots. This is
    the picture that’s worth a thousand words!


    Take some time to explore the `App Store` product pages of popular apps and games.
    Analyze the first primary screenshot for each one, especially similar apps that
    will compete with yours. When you see a screenshot that catches your eye, try
    to determine what it is that makes the image an effective graphic.


    On the surface, it may appear that the winning attributes are simply a stunning
    interface design, but look closer. Many of the best primary screenshots are ones
    that have been set up to look good! No, I don’t mean `Photoshop` enhancements.
    I’m talking about showing the app in action! If it’s a to-do list app, don’t show
    a new, empty list. Fill it with tasks that your target audience can relate to,
    demonstrating just how productive and time-saving it could be for them. If it’s
    a space battle game, display the key fun factors like laser guns firing and alien
    crafts exploding. You want the reaction to be, “Wow, that looks exciting…I must
    buy it now!”


    The goal is not necessarily about packing in as much action as possible into your
    screenshots. A compelling primary screenshot is one that instantly attracts your
    eye and successfully describes the core functionality in a single visual.


    The `App Store` product page for Retro Dreamer’s `Sneezies` game displays a great
    example of an effective primary screenshot (see [Figure 11-2](#9781430262381_Ch11.xhtml#Fig2)).
    Without reading the app description, this visual gives me a good idea of what
    kind of game play it offers. At first glance, it appears the goal is to free the
    Sneezies from their floating bubbles. Sure enough, the app summary in the description
    reads, “Touch the screen to drop a burst of sneezing powder into the field of
    floating Sneezies and watch as they sneeze themselves out of their bubbles. Try
    to initiate a chain reaction to rescue as many Sneezies as you can in this family
    fun puzzle game.” The screenshot even shows the sneezing powder in action, with
    a couple Sneezies freed from their bubbles and parachuting to safety.


    ![9781430262381_Fig11-02.jpg](images/9781430262381_Fig11-02.jpg)


    [Figure 11-2](#9781430262381_Ch11.xhtml#_Fig2). `Sneezies` by Retro Dreamer (published
    by Chillingo). Without reading the app description, this primary screenshot tells
    me quite a lot about the game play and looks like pure fun!


    The `Sneezies` screenshot showcases the core game objective without cluttering
    the screen with too much activity. It looks like pure fun, without appearing too
    difficult for players of all ages to grasp the basics.


    It may seem obvious to show a game in action, but the same strategy should also
    be employed with other kinds of apps. The primary screenshot of Rogue Sheep’s
    `Postage` in [Figure 11-3](#9781430262381_Ch11.xhtml#Fig3) (left) provides a beautiful
    example of the digital postcards you can create and send. The primary screenshot
    for Imagam’s `iFiles` (on the right in [Figure 11-3](#9781430262381_Ch11.xhtml#Fig3))
    showcases many of its file management and export features simply by displaying
    its custom pop-up menu above a populated file list. Screenshots of actual app
    activity visually demonstrate to users how those apps could benefit their own
    lives or help them become more productive.


    ![9781430262381_Fig11-03.jpg](images/9781430262381_Fig11-03.jpg)


    [Figure 11-3](#9781430262381_Ch11.xhtml#_Fig3). The primary screenshots of Rogue
    Sheep’s `Postage` (left) and Imagam’s `iFiles` (right) visually showcase many
    of their features and benefits within a single image


    Apple recommends removing the status bar from your screenshots, but looking around
    the `App Store`, it’s apparent that advice is not always heeded.


    Apple also recommends capturing screenshots directly from an `iPhone`, `iPad`,
    or `iPod touch`, instead of the `iOS Simulator`. To do this, when you’re ready
    to take the shot, hold down the device’s `Home` button and `Power` button at the
    same time. The screenshot is saved to the device’s `Photo Library`. Although you
    could easily e-mail the screenshot from the device’s `Photo Library` to your desktop
    computer, you can also sync the device with your desktop `iTunes`, and launch
    the Mac’s `iPhoto` application to import the saved `PNG` screenshot.


    An alternative option is to capture screenshots from a connected device within
    the `Screenshots` tab of the `Xcode Organizer` window. From there, they can then
    be dragged to the Mac desktop as `PNG` files.


    ## When a Screenshot Is More Than a Screenshot


    Even though Apple refers to them as screenshots, this feature is not limited to
    the literal definition. If your app’s core functionality takes advantage of the
    accelerometer or special multitouch gestures, then it’s perfectly acceptable to
    show a photo of an actual person using the app on an `iOS` device.


    Smule’s `Ocarina` app, which turns your `iPhone` into a musical instrument, uses
    the primary screenshot to display a photo of how to “play” the app using the device’s
    mic and multitouch screen (see [Figure 11-4](#9781430262381_Ch11.xhtml#Fig4)).
    This photo does a much better job at describing the unique app than an actual
    screenshot could show. Since the user’s fingers obscure portions of the app’s
    interface, Smule smartly included the `Ocarina` logo in the photo to reinforce
    the app name and branding.


    ![9781430262381_Fig11-04.jpg](images/9781430262381_Fig11-04.jpg)


    [Figure 11-4](#9781430262381_Ch11.xhtml#_Fig4). Because of the Smule `Ocarina`
    app’s use of the `iPhone`’s mic and multitouch functionality, displaying a photo
    of a user in action is a much more effective primary image than an actual screenshot


    What if you’ve built a productivity app that is so packed full of features that
    a simple screen capture simply does not do it justice? Not to worry. There’s no
    rule forbidding the inclusion of text in your screenshots if it helps explain
    how your app works.


    A model example of text usage is the primary screenshot for `Groups` from Guided
    Ways Technologies Ltd. (on the left in [Figure 11-5](#9781430262381_Ch11.xhtml#Fig5)).
    It complements the embedded interface view with additional text and icons to visually
    promote a vast array of key features. It also boasts a nice recommendation from
    O’Reilly.


    ![9781430262381_Fig11-05.jpg](images/9781430262381_Fig11-05.jpg)'
