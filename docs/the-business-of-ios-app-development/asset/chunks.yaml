- fmt: 'I typically write three versions at this stage: a one-sentence description,
    a single-paragraph description, and then one that’s a few paragraphs long. Not
    only does that provide me with an app description size that’s appropriate for
    almost any need, but it also helps me fine-tune my marketing message. When forced
    to explain your app in only a few sentences, you need to cut out the fat, leaving
    only the key selling points that would appeal to potential customers.


    The old term *elevator pitch* refers to the ability to sell someone on an idea
    in the short amount of time it takes to ride an elevator. This concept applies
    to almost every industry. When pitching a movie treatment, a screenwriter may
    have no more than a brief moment to convince a studio executive of its merits.
    A publisher may discard a book submission if it fails to captivate him in the
    first few pages. In a radio commercial, an advertiser may have only 15 seconds
    to grab the listener’s attention. Promoting an iOS app in the fast-paced world
    of technology is no different.


    Often, you have only a minute or two to describe your app to an influential journalist.
    Hot-tech blogs are flooded with press releases and queries about new mobile apps
    every day, so what makes yours so special? Whether it’s read in an e-mail or quickly
    explained at a conference, after only a few sentences, you want that journalist
    to instantly “get it” and want to write about your app.


    To start off, think of an effective caption that describes your app in only a
    few words. For our fictional Breadcrumbs app example, we’ve established the caption
    “Parked Car Locator.” Sure, it’s basic, but in only three words, we’ve said what
    the app does. And with the 140-character limit imposed by Twitter, short is sweet.
    Now with the general functionality covered by the caption, the Breadcrumbs description
    can focus on the primary features and benefits, as well as the key differentiator
    that sets this app apart from its competition.


    Remember our discussion of determining your application’s differentiator in Chapter
    2? Here’s where it starts to pay dividends for you. Not only will it help attract
    customers, but it will also assist you in capturing the attention of the media
    in this prerelease stage. When describing your app to journalists and bloggers,
    you never want them to ask “Why?” With the many existing parked-car locators in
    the App Store, why should anyone care about your app? If you’ve crafted your pitch
    successfully, you’ve already answered that question, describing how your app is
    the first parked-car locator to implement augmented reality using the iPhone’s
    built-in camera. Augmented reality in mobile apps has recently been a hot topic
    in the news, so that’s the hook. And the media loves a good hook.


    Just make sure that any claim you make is true before including it in your pitch.
    You don’t want to announce your app as the first augmented reality-based parked-car
    locator if an existing iOS app has already staked that claim. As always, do your
    homework first, making sure to do plenty of research online and in the App Store.


    Ad-supported blogs and news sites need to continuously draw in readers to satisfy
    sponsors, and in order to do that, there’s an insatiable demand to publish fascinating,
    topical stories. If your pitch fails to interest the press, you’ll want to rethink
    your strategy. Later in this chapter, I’ll touch on when and how to communicate
    with the press to establish important relationships and jump-start some prerelease
    publicity.


    Another advantage to crafting your elevator pitch now is that it will help you
    write a better App Store description when you’re ready to submit your app to Apple.
    I’ve seen too many long-winded App Store descriptions that scroll for days to
    explain a simple game concept. Those lengthy descriptions actually do the apps
    a disservice, since no one will spend the time reading them.


    Like your elevator pitch, your App Store description should be brief and concise,
    with bulleted key features and a few highlighted testimonial quotes (and even
    award mentions). It should quickly tell readers what your app does and why they
    should buy it. Anything more is just noise that gets in the way of your sales
    pitch.


    Gather Additional Prerelease Marketing Materials


    Beyond having short and long text descriptions of your app, you should also have
    the following items prepared for use in your marketing campaigns (both prerelease
    and postrelease):


    *   Company logo (high-resolution)

    *   App icon (high-resolution)

    *   App logo (high-resolution)

    *   Screenshots

    *   Video trailer

    *   Dedicated web presence


    These items will come in handy for not only your own web site and social media
    efforts, but also for the press if requested by journalists and bloggers.


    ## Company Logo


    No matter what kind of products you develop, you should always have a high-resolution
    version of your logo available, just in case the press requests it. Many companies
    actually include a “press room” page on their web site or a download link to a
    press kit so that their company information and logo are available 24/7.


    Technology is a global industry, so reporters and bloggers from various time zones
    may be interested in writing about your company or product. They may be on a tight
    deadline and can’t wait until you read your e-mail in the morning. Providing a
    press kit or company logo download on your web site will help make their job easier!


    Although most media coverage may be online, don’t discount the needs of print
    magazines and newspapers. Make sure your company logo is a scalable, vector-based
    image and saved as an `EPS` file. Or at the very least, it’s a large 300-dpi bitmap
    image saved in a lossless compression format, such as `TIFF` or `PNG`. That will
    ensure maximum flexibility for any use.


    If you’re a publisher who partnered with a third-party development company to
    create the application, you’ll also want to have the other party’s logo available.
    This would be a good time to check your contracts to see whether the third party
    also requires its logos and/or names included in all press coverage about your
    iOS app.


    ## App Icon and Logo


    You should have a high-resolution icon and logo for your iOS app. Ideally, you
    took my advice in [Chapter 4](#9781430262381_Ch04.xhtml) to design your app icon
    at a high resolution for various press and marketing purposes.


    Scalable, vector-based `EPS` files are always nice, but large 300-dpi bitmap files
    (like `PNG` or `TIFF`) can work just as well. If you’re saving your icon or logo
    as a `PNG` file, ensure that the background is transparent. If you’re saving it
    as a `TIFF` or high-quality `JPEG`, use a default white background.


    Since most of your media coverage and marketing efforts will focus primarily on
    your new app, and not necessarily your company itself, the 300-dpi print-ready
    versions of your app’s icon and logo will prove much more important than any of
    your other logos. You’ll also find high-resolution app-branding graphics useful
    when designing other related elements, such as your app’s web site and the background
    image for your Twitter profile. And on the off chance that Apple requests an ultra-large
    app icon for inclusion in its print advertisements, Worldwide Developers Conference
    wall banner, or (gasp!) a TV commercial, you’ll have one ready at your fingertips
    (and you can thank me later).


    ## Screenshots


    Having a few good screenshots of your app in action may seem fairly obvious, but
    it’s amazing just how many bad screenshots I’ve encountered in the App Store and
    online at various developer web sites and app review blogs. Don’t just run your
    app and take some random screenshots of the main views. The screenshots you unveil
    to the world should be stellar examples of your app, showing off just how much
    fun or productive it is to use it.'
