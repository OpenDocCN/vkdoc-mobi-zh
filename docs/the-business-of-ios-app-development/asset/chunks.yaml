  trans: '

    # 如何制定有效的 Lite 版应用策略


    很少有开发者能像 Ethan Nicholas 或 Rovio 那样成功，尤其是在 App Store 中应用数量惊人、竞争激烈的当下。但如果你制定一个扎实的
    Lite 版策略，仍然有很大的赚钱潜力。打造一个有效的 Lite 版涉及众多因素。注重细节之处才能真正带来回报。


    ## 他们不会为免费牛奶而购买奶牛


    大多数开发者立即就理解了提供免费 Lite 版的市场价值，但由于 Apple 要求 Lite 版应用功能完整，一个主要担忧就是免费提供的内容过多。如果你的
    Lite 版包含了足够满足人们需求的功能，那为什么还有人会去购买付费版呢？


    答案在于第 2 章中讨论的所有市场分析和竞争研究。如果你了解应用的目标受众、竞争对手是谁以及他们提供了哪些功能、哪些关键功能对用户很重要，那么规划你的 Lite
    版策略就会容易得多。


    诀窍在于要明白哪些功能可以包含在 Lite 版中，而又不至于蚕食付费应用的销量。如果你的竞争对手在他们的 Lite 版中提供了特定功能，你也应该采取类似的做法，尤其是当用户期望这些功能时。但如果你应用有一些很酷的新功能是别人没有的——那种让你应用与众不同的创新“法宝”——那么你需要找到一种方法，让用户能在
    Lite 版中试用该功能，同时在付费应用中提供更全面的版本。


    你要吊起他们的胃口，但不要全盘托出。


    ## 生产力工具和实用工具的 Lite 版本


    对于生产力、实用工具和非游戏类应用来说，选择 Lite 版的功能可能颇具挑战，这也是为什么很多这类应用不提供免费 Lite 版的原因。相反，它们依靠评测、外部宣传、视频预告和截图来帮助销售应用。如何将
    Lite 版的功能限制到足以鼓励付费应用销售，同时又能通过 App Store 的审核呢？


    如果你正在开发一款创建文档或笔记的应用，你的 Lite 版需要功能完整，允许用户创建、编辑和保存这些文件。既然用户希望能够通过电子邮件导入/导出文档，或将文件与远程服务器（如
    Google Docs 或 Dropbox）同步，那么显然这些功能是你的应用在 App Store 中保持竞争力所必需的，但它们可以作为仅在付费版中提供的高级功能。


    如果你的应用允许用户创建某种待办事项或清单，一种有效的方法是限制在 Lite 版中可以创建的项目数量。为了正确设定用户预期，你的 Lite 版应明确告知当前限制，鼓励用户升级到付费版以获得完整、无限制的体验。


    Marco Arment 为他广受好评的 `Instapaper` 应用的 Lite 版——`Instapaper Free` 采用了这一策略。`Instapaper`
    是一款用于保存网页以便稍后阅读的有用工具。`Instapaper Free` 将存储限制为十个网页文章——这足以让人们相信这项服务的益处和便利性。一旦他们上瘾并需要更多空间，他们就更倾向于升级到付费版，后者提供无限存储、iPad
    兼容性以及大量附加功能（见图 6-2）。


    ![9781430262381_Fig06-02.jpg](img/9781430262381_Fig06-02.jpg)


    图 6-2. Marco Arment 的 `Instapaper Free` 限制用户只能保存十个网页文章以供稍后阅读，以此鼓励用户升级到付费版以获得无限文章存储、iPad
    兼容性和附加功能


    ## 游戏的 Lite 版本


    对于游戏来说，设计免费 Lite 版通常要简单得多。游戏开发者通常会包含前几个关卡在 Lite 版中。如果用户想玩更多，就需要购买付费版，在那里他们会获得数十个额外关卡、增强功能和特色玩法。


    根据你的应用玩法，将 Lite 版限制在仅包含少量入门关卡可能不足以充分展示游戏的真正价值。Matt Rix 在为他的畅销游戏 `Trainyard` 开发
    Lite 版时就遇到了这个问题。


    “付费游戏有大约 150 个谜题，起初，我想只包含前几个谜题在 Lite 版中，希望用户能看到潜力并想购买完整版，”Matt 说。“但问题在于，在前 10
    或 15 个谜题中，玩家才刚刚开始熟悉操作机制。那些‘啊哈！’的时刻要到游戏进行到 40 或 50 个谜题时才会出现，那时你才能感受到这些谜题到底有多酷。这让我陷入了有点棘手的境地。我可以在
    Lite 版中免费提供前 50 个谜题，但如果用户决定购买付费游戏，就没有顺畅的升级路径了。他们必须在完整版中再次解决那 50 个谜题。我考虑过在完整版中添加一个可以跳过前
    50 个谜题的作弊功能，但这似乎仍然不是最好的解决方案。”


    于是，Matt 想出了一个巧妙的替代方案。他为 Lite 版创建了 60 个全新的谜题。他选择不使用 *lite* 或 *free* 这样的词，而是将这个版本命名为
    `Trainyard Express`，并将其称为完整付费版 `Trainyard` 的“前传”（见图 6-3）。


    ![9781430262381_Fig06-03.jpg](img/9781430262381_Fig06-03.jpg)


    图 6-3. Matt Rix 的免费版 `Trainyard Express` 提供了 60 个独特的谜题，以避免与付费版 `Trainyard` 的 150
    个谜题重叠。这一策略提升了两个版本在用户眼中的价值


    Matt 承认，这种非传统路径需要大量的额外开发工作，但此举背后有着相当多的战略思考。他补充道：“我真心希望人们爱上这个游戏机制，我认为这可能是最好的方法。我还大幅提高了难度曲线，所以免费
    `Express` 中的第 60 个谜题的难度与完整版中的第 100 个谜题相当。”


    通过将 `Trainyard Express` 定位为完整付费游戏的独立前传，`Trainyard` 的粉丝会想下载这两个版本，以便玩到全部 210 个谜题。这反而有助于同时提升游戏在付费榜和免费榜的排名，从而在
    App Store 中获得更高的曝光度。


    ## 何时发布 Lite 版本


    免费提供如此多的内容似乎是一场冒险的赌博，但根据你特定应用的功能或玩法，这可能是制胜的一步，能为你赢得一批忠实的用户。


    对于任何新兴的应用业务来说，担心 Lite 版可能会阻碍付费应用销售，这是一个可怕的前景。由于这种担忧，许多独立开发者对 Lite 版敬而远之。一些开发者会等到应用销量下滑，认为在应用生命周期的尾声推出一个免费的
    Lite 版有助于重振销量。虽然这可能会带来一些额外的业务，但他们并没有真正最大限度地发挥 Lite 版作为推广工具的潜力。时机完全不对。


    那些采取这种延迟策略的开发者发现，在这么晚的阶段推出免费 Lite 版时，付费应用的销量确实会增加，但到那时，最初发布时产生的所有免费宣传早已消退，所以销量上的新增长往往不足以将付费版推回
    App Store 的前 200 名。要是这些开发者当初能在应用发布、享受首波宣传浪潮时就推出免费 Lite 版，那该多好啊！

    '
- fmt: '### 排版后内容


    If you plan on releasing a free lite version, you should make it available from
    the very beginning when you first launch your paid version. This way, your free
    lite version can take advantage of all the publicity and word-of-mouth generated
    during the app’s initial release. The more traffic you drive to downloading the
    free lite version, the more conversions you’ll have for the paid app. Many developers
    who advertise their apps online link the ads to their free lite versions to encourage
    click-throughs. This makes their advertising campaigns much more effective, since
    people love free. Then let your lite version work its magic, giving users a small
    taste of what they will get if they buy the paid version.


    If you worry that the exclusive features in your paid version are not enticing
    enough to get users to switch from the free lite version, then you need to rethink
    the division of features between the two versions to make the upgrade more appealing,
    or you may want to consider adding in-app advertising to your free lite version.
    Offering a paid version without any advertisements can be a powerful lure, and
    it also provides a way to monetize your free lite version with ad revenue. [Chapter
    7](#9781430262381_Ch07.xhtml) provides details about in-app advertising.


    Of course, not all applications lend themselves well to the concept of a free
    lite version. But if you can figure out a way to make it work in your favor to
    generate app sales, then it’s a gamble that will pay off in the long run.


    ## Perfecting Your In-App Sales Pitch


    To design a more effective lite version, you need to think of it as a virtual
    sales assistant. You can’t personally be there to walk each user through the benefits
    of your app, so you need your lite version to do the talking for you. This means
    you need to carefully craft the sales pitch within your lite version to properly
    communicate your message. You already know what the guidelines are for lite versions,
    so for the moment, take off your developer hat. It’s time to think like your users,
    putting yourself in their shoes.


    ### Placing the Buy Button


    Many lite versions promote the paid version on their splash screen, which is displayed
    for the first few seconds when the app is launched. Although this is a great way
    to take advantage of your users’ undivided attention as they briefly wait for
    the app to load, it should not be the only place that the `Buy` button is located.


    After users finish a session with your app, if they are interested in learning
    more about the paid version, they will look on your app’s main screen, Info screen,
    and/or Settings screen (depending on which of those screens you’ve included in
    your app). This may sound like common sense to you, but I’m always surprised to
    find lite versions that don’t make that buy button easily accessible within the
    app or, worse yet, don’t even include it at all!


    If people can’t find the buy button, they can’t purchase your app. Don’t rely
    on them remembering to manually visit the App Store on their own. Odds are, they
    might forget, and you’ve just lost those potential customers.


    When it comes to selling anything, especially software, make the act of buying
    your product as easy and painless as humanly possible. And unlike most online
    e-commerce systems that overly complicate the process with too many steps, Apple
    has designed the iTunes App Store to be the simplest, most convenient way to buy
    software, so you really have no excuse. If someone loves your free lite version
    and is interested in upgrading to the paid version, that next step should be only
    a finger tap away.


    So, now that you’ve integrated a buy button into your lite version’s main screen
    or Info screen, what should it say? That may sound like a stupid question, but
    the answer is really much more subtle and complicated than you might think.


    Words like `buy` and `purchase` communicate one thing to iPhone, iPad, and iPod
    touch users: tapping that button will take them to the App Store. Yes, your refined
    sales pitch is already there in the App Store—complete with a detailed description
    and screenshots—making this very convenient from a development standpoint. As
    you learned in [Chapter 5](#9781430262381_Ch05.xhtml), launching your iTunes store
    URL within your app can be done in only a few lines of code. ZeptoLab’s popular
    Cut the Rope Lite uses a similar tactic, with a `Full Version` button placed above
    the familiar `Available on the App Store` badge. This shows up on the game’s main
    menu screen and is also displayed when the user reaches the end of the free levels
    (see [Figure 6-4](#9781430262381_Ch06.xhtml#Fig4)). Tapping on those buttons will
    take you directly to the Cut the Rope paid game’s page in the App Store. You’ll
    also find the same App Store buttons in Rovio’s Angry Birds.


    ![9781430262381_Fig06-04.jpg](images/9781430262381_Fig06-04.jpg)


    [Figure 6-4](#9781430262381_Ch06.xhtml#_Fig4). In ZeptoLab’s Cut the Rope Lite,
    the `Full Version` button and `Available on the App Store` badge link directly
    to the Cut the Rope paid game’s page in the App Store


    Although some apps have found success with this simple approach, it is not necessarily
    the most effective, especially for an unknown, new product. As much as we would
    all like to believe that our apps are just as addictive as Cut the Rope and Angry
    Birds, those two phenomenal best sellers are the exceptions to the rule. Odds
    are good that we mere mortals will need to be a little more aggressive with our
    in-app marketing strategies.


    ### Adding Upgrade Info to the Lite Version


    Jumping to the App Store from that buy button takes users out of your app, someplace
    they may not want to be at that very moment, especially if they mistakenly think
    it will automatically initiate a purchase. As developers, we understand that’s
    not possible without the users first entering their iTunes password in the App
    Store, but some consumers may not be tech-savvy enough to recognize that. Why
    would they want to buy the app without first knowing which additional features
    they would gain? They wouldn’t, so they might ignore the button. And if that happens,
    your free lite version just failed its one and only mission.


    Any known reason that might make a user hesitate about tapping that buy button
    should be eliminated whenever possible. If there’s anything you can do to remove
    that hesitation or fear, then it’s worth the extra development time to implement
    it.


    So, how do you solve the problem at hand? Instead of instantly redirecting users
    away from your app to the App Store, why not include your sales pitch directly
    inside your app? Once you’ve sold them on upgrading to the full version, you can
    safely close the deal with a buy button linked to the App Store.


    One of my favorite examples is Digital Chocolate’s 3D Rollercoaster Rush Free.
    On the app’s main screen, the `What’s Full Version?` button leads to a screen
    that tells you exactly what you’ll get if you select it. You’re expecting detailed
    information about the features included in the paid version, and that’s precisely
    what you receive (see [Figure 6-5](#9781430262381_Ch06.xhtml#Fig5)). The promotional
    screen that appears is very well designed to match the game’s visual theme. The
    screenshots and key selling points are crafted for maximum impact. All this is
    communicated without forcing the user to leave the app, giving people the choice
    to either buy the paid app or tap the `Back` button to return to the game. I was
    convinced to tap the `Get the Full Version` button, and I’m a very jaded iPhone
    user who rarely plays games, so the sales pitch is definitely effective.


    ![9781430262381_Fig06-05.jpg](images/9781430262381_Fig06-05.jpg)


    [Figure 6-5](#9781430262381_Ch06.xhtml#_Fig5). 3D Rollercoaster Rush Free is a
    great example of the up-sell done right'
  raw: 'If you plan on releasing a free lite version, you should make it available
    from the very beginning when you first launch your paid version. This way, your
    free lite version can take advantage of all the publicity and word-of-mouth generated
    during the app’s initial release. The more traffic you drive to downloading the
    free lite version, the more conversions you’ll have for the paid app. Many developers
    who advertise their apps online link the ads to their free lite versions to encourage
    click-throughs. This makes their advertising campaigns much more effective, since
    people love free. Then let your lite version work its magic, giving users a small
    taste of what they will get if they buy the paid version.


    If you worry that the exclusive features in your paid version are not enticing
    enough to get users to switch from the free lite version, then you need to rethink
    the division of features between the two versions to make the upgrade more appealing,
    or you may want to consider adding in-app advertising to your free lite version.
    Offering a paid version without any advertisements can be a powerful lure, and
    it also provides a way to monetize your free lite version with ad revenue. [Chapter
    7](#9781430262381_Ch07.xhtml) provides details about in-app advertising.


    Of course, not all applications lend themselves well to the concept of a free
    lite version. But if you can figure out a way to make it work in your favor to
    generate app sales, then it’s a gamble that will pay off in the long run.


