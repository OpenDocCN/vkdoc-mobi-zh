    # 推广你的应用


    你无法向人们推销他们尚未意识到的解决方案。这就是为什么你的营销重点必须揭示当前可用选项（或缺乏选项）的不足之处。展示你的应用如何填补这一空白，能为他们节省时间、改善工作流程、带来快乐，或提升他们的日常生活质量（所有软件都应致力于实现这一目标）。对于一个全新的应用类别，你需要通过展示问题来推销解决方案。


    ## 提升移动端体验


    在为 `iPhone`、`iPod touch` 或 `iPad` 等移动设备构建应用时，请记住，无论你的应用提供什么功能，都应尽可能以最精简、最便捷的方式实现。用户可能正在单手（或单指）操作你的应用，同时还在移动中。善用苹果提供的独特移动框架。思考如何通过直接访问内置技术（如加速计、定位服务、`Wi-Fi`、蜂窝网络，以及电话、邮件和日历支持）来简化应用的功能和易用性。


    一个基本示例是搜索本地商家的应用。不要强迫用户总是输入邮政编码或地址（这在移动环境中通常非常不便），而是启用一个选项，让用户利用苹果的定位框架轻松发现他们当前的位置。只需确保应用首先请求他们的许可。出于隐私原因，一些用户可能不愿意透露他们的当前位置。


    一个大规模提升移动体验的产品示例是 Bump——一款免费的 `iPhone` 应用，它让交换联系人信息（以及照片、日历事件和其他数据）变得像与其他 Bump
    用户碰一下手一样简单（见图 2-1）。在智能手机上交换联系人信息并非新概念。多年来，众多移动应用试图简化手持设备上的这一过程，但它们通常涉及过多的按钮点击和复杂的“发送”
    vCard 格式数据的方法。有些甚至仅限于通过电子邮件发送 vCard，这又增加了更多步骤。Bump 的开发者利用内置的 `iOS` 技术，将这一需求简化为一个单一动作，即可即时且安全地交换联系人信息。


    ![9781430262381_Fig02-01.jpg](img/9781430262381_Fig02-01.jpg)


    图 2-1. Bump 通过大幅简化两人之间的联系人信息交换，提升了移动体验


    “我们在设计 Bump 时的首要目标是创造一种简单、有趣且直观的方式来连接两部手机，”Bump Technologies, Inc. 的联合创始人兼总裁 David
    Lieb 说道。“加速计和定位服务让我们能够做到这一点。Bump 会监控加速计的输出，并在感觉到物理碰撞时，将加速计的输出发送到全球的 Bump 服务器。然后，服务器会匹配在同一时间、同一地点感受到相同碰撞的任何一对手机。这使得只需简单地碰一下手，就能在两部手机之间建立连接。”


    Lieb 补充道：“Bump 的想法源于一次挫败感（实际上，是两次）。早在 2005 年，我还是一名工程师，当时让我非常烦恼的是，为了将一些简单的数据（比如姓名和电话号码）从一部手机传到距离不足
    12 英寸的另一部手机上，我不得不请对方读出他们的信息，然后手动输入。我希望只需将两部手机碰在一起就能传输信息——但 2005 年的手机还不具备实现这一功能的条件。快进到
    2008 年，我去了商学院，发现自己又在输入几十位新同学的手机号码。同样的挫败感，但这次，我注意到每个人都带着智能手机，其中许多都配有加速计和定位功能。于是我们决定开发
    Bump。”


    尽管这个应用的创意源于开发者自身的需求，但它似乎满足了很多人共同的愿望。2010 年，Bump 在 App Store 的下载量突破了 1000 万次。


    同样的移动任务简化逻辑，也适用于那些希望将自己 Mac 或 Windows 软件应用移植到配套 `iOS` 版本的开发者。不要仅仅在 `iPhone` 或
    `iPad` 界面中重新包装相同的功能。通过将你的应用设计得更适合通常单手操作、快节奏的移动用户世界，你不仅能增强现有客户的忠诚度，而且你的 `iOS` 应用还可能为桌面版吸引新用户。


    甚至有一些人闻名从其他移动设备（如 BlackBerry 或 Windows Mobile）转而使用 iPhone，仅仅是为了使用某个在其他移动平台上不可用的特定应用；如今这种情况已大为减少，但仍然存在。


    ## 与同类应用竞争


    这个世界真的还需要更多的待办事项列表、购物清单、小费计算器、音乐点唱机问答或放屁应用吗？如果你认为需要，那一定是因为你发现了一些其他应用尚未涉足的新功能——一个人们想要且需要的功能。如果不是这样，试图与成百上千个现有的小费计算器、待办事项列表等竞争可能是徒劳的，尤其是当一些真正出色的应用已经占据了特定利基市场，或在排行榜上名列前茅时。


    在 App Store 中搜索 *tip*，你会发现目前 App Store 中有超过 2,200 个小费计算器应用。诚然，这对移动应用来说是个好主意，但当与这么多现有的小费计算器竞争时，你如何为你的新应用找到受众？尤其是其中一些做得非常好，并且得到了媒体的大量报道。其中最受欢迎的一个应用
    Tipulator 甚至出现在苹果 iPhone 的广告中。关键在于，一个小费计算器能做的事情实际上非常有限，仅仅将你的版本扔进 App Store 可能并不是最好的主意。


    诚然，快速炮制一个小费计算器应用可能比开发一个复杂的 3D 游戏容易得多，但面对这个领域的激烈竞争，如果你无法销售这个应用，那么开发这样一个简单的应用是否值得？如果一项投入最终被证明是糟糕的投资，那么无论多小，都很难证明投入时间是合理的。如果你无法提供新颖的方法或能激励用户从成百上千个其他类似应用中选择你的应用的新功能，那么你可能需要考虑另一个应用创意。


    啊，但如果你确实知道如何制造一个更好的捕鼠器，那么这些知识，加上一些创造性的营销，可能足以在市场上站稳脚跟。看看有多少 Twitter 客户端应用吧，然而新的应用层出不穷，它们拥有更大、更好的功能或更直观的移动界面，导致用户不断切换。这是因为用户更有可能发现他们认为有趣或好玩的新的应用。

