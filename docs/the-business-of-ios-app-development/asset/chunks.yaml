- fmt: '# The Importance of First Impressions


    The order at which any app’s product page displays its content should give you
    an indication of what users are interested in most. The most important visual
    cues you will notice after the app icon are the screenshots. Previously, Apple
    displayed the text description above the screenshots, but now they have been reversed.
    This goes to show you how important choosing the right screenshots can be. You
    cannot rely on people reading your app’s entire text description in the App Store.
    They may read the first couple lines of your app description, but will be immediately
    drawn to the displayed screenshots.


    That first screenshot must be one that best represents the core functionality
    of your app. Don’t waste the opportunity by posting your app’s splash or settings
    screen as that first visual. Although those screens may technically come first
    in the flow of using your app, they communicate nothing to potential customers.
    Additionally, when a user searches for your app, your app icon and first screenshot
    are shown—so make it count!


    In those vital few seconds, that first screenshot must convey your app’s functionality
    or defining feature. After one look, consumers should have that “ah-ha” moment
    when they immediately understand how your app generally works and/or why they
    should buy it. At the very least, it should spur them to continue swiping to see
    more of your screenshots, read more of your app description, and explore your
    customer reviews and official web site. And if you’ve done your job right, that
    winning first impression convinced them to download and evaluate your app.


    # More Incentive for a Good First Impression


    Previously, many app developers would have a lite version and a pro version of
    their apps. The idea behind this was to give users the ability to evaluate the
    app before purchasing it and help promote the paid version or In-App. The recent
    trend that is most beneficial to both the users and developers is to make an app
    free in order to increase downloads, and if the users like it, they will buy it
    through an In-App Purchase. If a user downloads your app, tries it briefly, and
    then decides to delete it, you may never get a second chance to convert that person
    into a customer.


    Apple removed that “rate upon deletion” feature in iOS 4, but if users dislike
    your app enough, they may take the time to visit the App Store and manually post
    a nasty review. This sure provides extra incentive to make as good of a first
    impression as possible. The user rating is one of the top factors that users look
    for when deciding to download an app or not.


    Unfortunately, your app’s UI design and functionality are responsible not only
    for attempting to win a sale for the paid version, but also for avoiding negative
    reviews (that may be unfairly “judging a book by its cover”). This task may seem
    overwhelming at first, but after reading this chapter, you’ll be armed with some
    practical design methodology for tackling this problem head-on.


    In [Chapters 6](#9781430262381_Ch06.xhtml) and [8](#9781430262381_Ch08.xhtml),
    I’ll discuss the merits of free lite versions to promote paid apps and In-App
    Purchase items, but first things first. It’s time to lay the groundwork for your
    app’s design.


    # Playing by the Rules in Apple’s Sandbox


    Violating Apple’s iOS Human Interface Guidelines (commonly known as the HIG) is
    one of the most frequent causes for submitted iPhone and iPad apps to be rejected.
    Although the App Store does contain some exceptions to the rule—approved apps
    that have broken a few of those UI design rules—it’s best to adhere to the guidelines
    the best you can.


    There’s no sense playing with fire unless you have a very good reason to do so,
    and even then, you need to ask yourself whether it’s truly worth the risk. Design
    innovation can give an app that “sexy” visual appeal that helps drive interest
    and sales; but before you attempt to break too many conventions, keep in mind
    two very important factors:


    - If your design violates too many critical guidelines, Apple won’t think twice
    about rejecting your app, no matter how cool it is. And if you’re not in the App
    Store, your app can’t make money.

    - Apple’s interface guidelines serve the vital purpose of supplying common interface
    controls and architecture. Familiarity greatly eases the learning curve, which
    makes the user experience much more intuitive. Apple has published these guidelines
    online and it is a valuable document. The App Store Review Guidelines shed light
    on specific app elements that developers should avoid to help expedite the approval
    process. The full list can be viewed at `http://developer.apple.com/appstore/guidelines.html`.


    This convenient online resource page provides links to the App Store Review Guidelines
    and the iOS Developer Program License Agreement, as well as the ability to submit
    an appeal to the App Review Board if you feel your app was unfairly rejected.
    To access these links, you’ll be required to first log in to the iOS Developer
    Program.


    Although many developers have expressed their concern regarding Apple’s tight
    control over the app approval process, this curated, exclusive sales channel is
    the App Store’s greatest strength. By ensuring a certain quality level, the App
    Store is an attractive mobile marketplace that instills consumer trust, which
    in turn helps sell more apps—a recipe that has proven wildly successful.


    The bottom line is that if you want the opportunity to make money in the hottest,
    most lucrative mobile platform, you must remember that you’re playing in Apple’s
    sandbox. To stay in the game, you need to adhere to the company’s rules. You may
    not like its rules, but that’s the real price of admission (beyond your iOS Developer
    Program fee).


    Even with the posted guidelines, it may be impossible to foresee all the potential
    reasons for rejection (especially if new ones arise), but at least you can do
    yourself the favor of avoiding the known issues that will earn you a rejection
    letter. Throughout this book, I’ll be spotlighting known rejection causes as they
    apply to the related design and development topics being discussed, but those
    select tidbits alone are not enough.


    Here are a few important resources that should be required reading for all iOS
    app developers:


    - *iOS Human Interface Guidelines*: This is the bible for iPhone, iPod touch,
    and iPad app UI design. Obviously, you’re encouraged to be creative and inventive,
    but let the HIG serve as your foundation. This online guide provides a link to
    download a handy PDF version. You can also access the HIG within Xcode’s built-in
    documentation browser. With so many viewing options, you really have no excuse—so
    read it, embrace it, live it! Find it at `https://developer.apple.com/library/ios/documentation/UserExperience/Conceptual/MobileHIG/index.html`.

    - *App Store Review Guidelines*: You’ll be required to log in to the iOS Developer
    Program to access this direct link. Unlike with the HIG, Apple does not offer
    a PDF download of the App Store Review Guidelines. It’s important to note that
    these guidelines are considered by Apple to be a “living document,” which is updated
    to reflect new rules and changes as the need arises. This is not to suggest that
    Apple plans to morph the guidelines to suit its own agenda, but that new app submissions
    will surely trigger new questions that require new rules and clarification. As
    the mobile landscape evolves, so too will Apple’s guidelines. With this in mind,
    always refer to the latest online version of this document when designing and
    developing your app. Find it at `https://developer.apple.com/appstore/resources/approval/guidelines.html`.

    - *Application Submission Feedback*: This blog posts reported reasons for app
    rejections, as submitted by anonymous developers. This unauthorized site is a
    great source of information, although Apple’s app review team can’t be thrilled
    with its existence. Visit it at `http://appreview.tumblr.com`.'
