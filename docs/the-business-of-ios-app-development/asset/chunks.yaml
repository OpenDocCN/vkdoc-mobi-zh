    you find on the Web, you may be bound by the terms of a license that accompanies
    the code. If there is no license posted, you might not have the right to use the
    code at all.


    Know What You Are Getting


    The main purpose of a license agreement is to grant the licensee the right to
    use the licensor’s code or other content, but licenses also can provide the licensor
    with certain assurances regarding the quality of the code or content.


    If you are negotiating an inbound license, you will want to secure some warranties
    that the licensor in fact has the right to grant you the license to the code or
    content. You may also want the licensor to defend you if for some reason your
    company is sued for infringement caused by the in-licensed materials.


    Many click-through or shrink-wrap licenses will not include these types of warranties
    or indemnification. The result is that you alone may be responsible if something
    harmful is included in the code provided by a licensor.


    Freely available code items, like Joe Hewitt’s Three20 framework, are incredible
    resources. But it is important to understand that code like Three20, licensed
    under the BSD license, does not come with any warranties. It is effectively “as-is,”
    which means that although it is a great way to save time in your development of
    apps, you alone will be responsible if that code fails, includes a virus, or infringes.
    Surprisingly, the same applies to most artwork that you license through stock
    photography sites, like `iStockphoto.com`. This is not to say that you shouldn’t
    use Three20 or stock photography, but that you should be aware of the risk that
    your company bears by doing so.


    Avoid Viral Licenses


    Some freely available software is licensed under open source licenses that are
    viral in nature. These open source licenses, like the GNU General Public License
    (GPL) and Lesser GPL (LGPL), have contributed immensely to the advancement of
    software, but they carry a fairly strong obligation for anyone who uses the code
    in their own programs. This obligation is to license the resulting app under a
    similar open source license. This means that if you accidentally (or intentionally)
    include some open source code that you found on the Internet in your app, you
    may be contractually obligating yourself to provide access to your source code
    and allow other people to redistribute your apps for free. For commercial software,
    this is a real problem.


