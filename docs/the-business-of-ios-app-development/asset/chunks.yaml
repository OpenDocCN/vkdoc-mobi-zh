  trans: '

    这些分享按钮的美妙之处在于，它们能让网站访问者将特定网址收藏或分享到数十个热门社交媒体网站，如 Twitter、Facebook、Digg、Delicious、StumbleUpon、LinkedIn、MySpace、Slashdot、Reddit、Technorati
    等，甚至可以通过电子邮件“告诉朋友”。它们的分享按钮小巧紧凑，便于放置在网页的任意位置。将鼠标悬停在按钮上时，会弹出包含分享选项的下拉菜单（参见图 10-8）。


    ![9781430262381_Fig10-08.jpg](img/9781430262381_Fig10-08.jpg)


    图 10-8。ShareThis（左）和 AddThis（右）提供的默认按钮，均带有全面的下拉菜单，便于进行网址分享


    不喜欢它们的默认按钮样式？有些分享服务甚至允许你使用自定义按钮图片。这样你就能更好地将其服务融入网站现有设计，例如在面包屑导航示例（图 10-4）中，我修改了分享图标，使其与配套的
    Twitter 和 Facebook 图标尺寸一致，以保持视觉统一。


    你可以轻松地从这些分享服务获取所需代码，然后直接使用。不过，如果你想追踪分享按钮的表现，我建议免费注册这些服务的账号。与网站分析工具类似，你可以登录 AddThis
    或 ShareThis 账户，监控哪些网页被收藏和分享最多，以及它们被分享到了哪些社交媒体网站。这是非常有价值的信息。了解访问者经常使用哪些社交网站，有助于你确定线上营销的重点方向。


    如果你的大部分网络受众都在使用某个特定社交媒体网站（例如 Facebook），你可能更希望将分享按钮专门针对该网站，而不是采用像 AddThis 这类第三方分享服务“包罗万象”的方式。如果你经常阅读博客，肯定见过流行的
    Twitter、Facebook Like 和 Digg 按钮（参见图 10-9）。


    ![9781430262381_Fig10-09.jpg](img/9781430262381_Fig10-09.jpg)


    图 10-9。Twitter、Facebook 和 Digg 提供的针对性分享按钮能大幅提升网址分享量，但可见的计数器也可能暴露出不受欢迎的网页


    这些高知名度的按钮将分享操作简化为一次有针对性的点击，从而带来更多网址分享。你让访问者分享越容易，他们就会分享得越多。


    如果你的网页很受欢迎，分享计数器上累积了可观的大数字，如图 10-9 中的 Tweet 按钮（最左侧）所示，那么你的内容对新访问者会显得更具吸引力，让他们也渴望分享该页面。


    但另一方面，可见的计数器对新网站或访问量少的网站也存在不可避免的劣势。转推数低得可怜本身就够令人沮丧了，还要让它对每个访问你网页的人广而告之，这简直是种尴尬。而且，没人喜欢跟不受欢迎的家伙待在一起。


    如果你的网站仍在努力增加流量，你可能想先使用像 ShareThis 这样的一站式分享聚合器，直到你能提升数字为止。


    所以，如果你的网站已经拥有健康的流量，那么高影响力、有针对性的分享按钮就是有价值的补充。以下是一些例子，通过复制粘贴一小段 JavaScript 代码即可轻松安装到你的网页或博客上：


    *   Tweet 按钮（`http://twitter.com/about/resources/tweetbutton`）

    *   Facebook Like 按钮（`http://developers.facebook.com/docs/reference/plugins/like/`）

    *   Smart Digg 按钮（`http://about.digg.com/downloads/button/smart`）


    无论你决定使用哪种分享按钮选项，务必确保你的网页拥有足够简短的 HTML `<title>`标签，以便于轻松转推。如果你的网站访问者为了通过 Twitter
    分享而被迫编辑标题文本，他们很可能会放弃分享网址，因为不愿意费这个额外的功夫。


    那么，合适的标题长度是多少？Twitter 将推文限制在 140 个字符以内，但对你的标题而言，这个长度也太长了，因为转推还需要包含你网页的网址。为网址预留空间后，我们来看看标题文本还能剩下多少字符。


    为了说明这一点，我们来为虚构的面包屑导航应用构建一个易于转推的可行网页标题。网站网址`http://www.breadcrumbsapp.com`虽然简短，但
    Twitter 可能会使用其内置的网址缩短功能自动将其转换为更短的网址。你可能希望追踪来自那条推文的点击量，所以与其依赖 Twitter 的原生网址缩短服务，不如在
    Bit.ly（`http://bit.ly/`）这类网址缩短服务商处免费注册自己的账号，并提供自定义的短网址。这样，你既能减少网址所需的字符数，又能通过 Bit.ly
    的分析功能监控该链接的受欢迎程度。


    Bit.ly 的短网址大约占用 20 个字符（`http://bit.ly/3EmvfN`），这样就给我们留下了 120 个字符，以避免超过 Twitter
    的 140 字符限制。为了安全地容纳用户可能添加到推文中的任何额外评论（例如“很酷的应用！”），我们不妨把标题控制在 100 个字符或更少。


    “Breadcrumbs for iPhone - Never misplace your car again with this new parked car
    locator app!” 只有 92 个字符，所以完全可行！网页的 HTML `<title>`标签现在如下所示：


    ```

    <title>Breadcrumbs for iPhone - Never misplace your car again with this new parked
    car locator app!</title>

    ```


    这会生成以下 113 个字符的分享信息：


    ```

    Breadcrumbs for iPhone - Never misplace your car again with this new parked car
    locator app! http://bit.ly/3EmvfN

    ```


    完美！我们网页的`<title>`标签包含了像*iPhone app*和*car locator*这样的重要关键词短语，有利于搜索引擎优化，同时它又足够简短，便于在热门社交网站上进行网址分享。这一切看似是对琐碎细节的过分关注，但正是这种精细程度，能将一个普通的网站转变为强大的营销工具。


    你的博客与 RSS feed


    你们大多数人应该已经维护了一个博客，用于发布软件发布和开发更新的新闻。如果没有，那你真的应该开设一个！这是培养读者群、吸引用户访问你网站的好方法。没什么可说的？没关系，你不需要把它当成每日日记来写。


    博客在你和客户之间建立了一种直接联系，读者可以通过它随时了解你的最新动态并发表评论。对于博客新手，我将在本章稍后部分讨论博客在构建社区方面的力量。


    目前，如果你确实维护着用于讨论软件开发或 iOS 新闻的博客，请确保你的应用相关网站上包含一个直接链接。除了 Twitter 和 Facebook 之外，你要让网站访问者知道，你的博客是让他们随时了解应用动态的又一个可用资源。

