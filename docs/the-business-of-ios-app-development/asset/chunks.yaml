    Just be aware that many news sites and blogs actively ignore embargoes, always
    eager to be the first to break new stories.    If it’s imperative that your announcement
    remains under wraps until the product is available, you may want to wait to send
    out the press release until the morning of the app’s actual debut in the App Store.
    Some publicists recommend sending out the press release the night before. The
    problem is that many news sites report around the clock, and your press release
    just might get coverage in the middle of the night while your target audience
    is sleeping. Then the story is buried by newer stories in the morning. That’s
    why it’s a good idea to research the reporting habits of each of the iOS-related
    news sites and blogs. This will allow you to better gauge when to send them your
    press release.    Subject Line (B)    The most important element of your press
    release is the subject line. This title needs to capture the attention of anyone
    who reads it, whether it’s the subject line of an e-mail or the headline of a
    hyperlink on a news site.    Traditionally, the subject line formula is “company
    releases product for platform,” replacing company, product, and platform with
    your specifics. In [Figure 12-1](#9781430262381_Ch12.xhtml#Fig1), this translates
    to “Streaming Colour Studios Releases Dapple for iPhone/iPod touch.”    Never,
    never, never add marketing adjectives like “amazing” or “exciting” to the subject
    line. Doing so only makes your press release look like it was written by an amateur.
    Unlike your other marketing materials, a press release should stick to only the
    facts, without the flourish of marketing jargon. But at the same time, to compete
    with the hundreds of other press releases that arrive daily, your subject line
    should be both informative and captivating. If you’re announcing a new version
    of an existing app that has previously won awards, it’s perfectly acceptable to
    include “award-winning” in the subject line.    Since the goal is to grab the
    attention of the media, if the app name is not reflective of its unique, pioneering
    features, then adjust the subject line accordingly. Instead of saying “Electric
    Butterfly Releases XRayMed for the iPad,” the subject might draw more attention
    if worded “Electric Butterfly Releases First X-Ray Reader App for the iPad.” You
    can always mention your app’s name in the summary line below the subject title.
    (And if you do boast of being first to market with a particular app or feature,
    be sure that’s true!)    Summary Line (C)    This is the second most important
    element of your press release. If journalists are remotely intrigued by your subject
    line, this brief one-sentence summary will help determine whether they continue
    to read the rest of the press release. Many developers opt not to include this
    line, using only the subject line to lead into the introductory paragraph, but
    I highly recommend including a summary line to help deliver the basics even if
    the reader stops there.    In the case of the Dapple press release in [Figure
    12-1](#9781430262381_Ch12.xhtml#Fig1), the subject line and summary line together
    convey that Streaming Colour Studios released Dapple for iPhone and iPod touch
    and that this paint-mixing puzzle game is now available in Apple’s App Store.
    If readers only bothered to read those two lines, they would still be aware of
    the most important information: what your app is and where to get it.    Introduction
    (D)    The first paragraph begins with your location and release date, followed
    by a rehash of your subject and summary lines. This introduction should be a single
    paragraph with only a couple sentences. It should state that your company announces
    the release of a specific product, what it is, who the target audience/platform
    is, and where it’s available.    Description (E)    Remember when I talked about
    crafting an “elevator pitch” for your app description in Chapter 10?'
