    a clean and simplified iTunes-style interface design. It supports the automatic
    download of reports from iTunes Connect, as well as tracking the ranking and sales
    of your iPhone apps and In-App Purchase products. A 30-day trial of Prismo is
    available for download.    Beyond the solutions already mentioned here, don’t
    forget to also check out the many App Store ranking tools that were profiled in
    [Chapter 2](#9781430262381_Ch02.xhtml), such as APPlyzer and David Frampton’s
    excellent (and free) MajicRank.    Rev Your Engines    You’re in the App Store—now
    what? No, it’s not time to take a break. I know you’re tired from months of development,
    but you need to capitalize on the short-lived momentum surrounding your app’s
    launch! [Chapter 12](#9781430262381_Ch12.xhtml) cranks up the publicity engine
    to increase consumer awareness of your app’s availability.    Chapter    12    Increasing
    Awareness for Your iOS App    Your app has been approved and is available for
    sale in the App Store, so now what? First, I would like to congratulate you on
    this milestone achievement! If you’ve worked your way through the entire book
    and finally have an application listed in the App Store, that in itself is quite
    an accomplishment. Only fellow developers truly know how much hard work and dedication
    goes into launching a new software product. After months of meticulously planning
    and programming your app, you deserve to celebrate. Although you would probably
    love nothing more than to take a much needed vacation at this point, unfortunately,
    you can’t rest yet.    It’s time to rev up the publicity engine to increase consumer
    awareness of your app’s availability. Even if you implemented the various business
    strategies from previous chapters, and your prerelease marketing efforts resulted
    in an initial sales surge, there’s still vital work to be done. It’s your job
    to ensure that your iOS application does not get buried amid the thousands of
    new apps flooding into the App Store. This chapter reveals how to craft effective
    press releases, utilize promo codes, gain exposure through reviews and interviews,
    and sustain momentum in the App Store with promotions, giveaways, and carefully
    timed sale events.    Dedicating As Much Effort to Marketing Your App As You Put
    into Developing It    If your app was already available in the App Store when
    you bought this book and you decided to skip ahead to this chapter, I highly recommend
    reading [Chapter 10](#9781430262381_Ch10.xhtml) first. In fact, I insist. This
    chapter will prove much more useful to you after you’ve read [Chapter 10](#9781430262381_Ch10.xhtml).    Even
    though [Chapter 10](#9781430262381_Ch10.xhtml) is aimed at prerelease marketing,
    its primary goal is to help you build a solid foundation online. It covers establishing
    a web site presence, a social media following via Twitter and Facebook, and relationships
    with prominent bloggers and influential iOS app review sites. All of those elements
    will serve as the underlying backbone of your postrelease marketing efforts as
    well, so having them in place long before your app goes live in the App Store
    is crucial to your success.    Launching with a Supernova of Publicity    You
    want to capitalize on the initial visibility of your app’s release in the App
    Store, so the trick is to get as many consumers and news outlets as possible talking
    about your app at the same time. Think of it as a supernova of publicity in the
    hopes of creating a snowball effect. You want consumers thinking, “Everyone is
    talking about that app, so it must be good!” With that in mind, when reading this
    chapter, don’t tackle a single task each week. Read through all the topics, and
    then try to implement as many of them as possible at the same time, in the hopes
    of sustaining that buzz well beyond the initial release.    How much time should
    you dedicate to marketing your app?


    Initially, only one or two hours a day is not enough. Yes, I know you’re eager
    to start developing that next great app idea, but before you dive into any future
    projects, your new 1.0 app release needs attention. You should be prepared to
    set aside the first two weeks to focus on nothing but promoting your new app.
    Request reviews, publicize your app on Twitter and Facebook, set up media interviews,
    post blog articles, submit your app for awards, and the list goes on. Once your
    marketing efforts start to pay off with an increase in sales and/or a rise in
    the App Store charts, you can gradually ease back into your normal work life,
    with only a couple hours a day spent on app marketing.    Unfortunately, there
    are no shortcuts in software marketing. For your iOS app to have a chance at becoming
    successful, you must be willing to invest just as much time and effort into promoting
    your app as you put into developing it.    Enlisting Help from the Pros    If
    you’re not able to dedicate the necessary hours to postrelease marketing, then
    it’s in your best interest to hire a third-party company to handle this job. Perform
    a search online for *iPhone app marketing* or *iPhone marketing* *agency*. You’ll
    find hundreds of marketing and PR firms around the world that specialize in mobile
    product launches. Here are several agencies to give you an idea of some of the
    services available:    *   Appency (`http://www.appency.com`) *   Appular (`http://appular.com`)
    *   App2Market (`http://www.app2market.com`) *   Apalon App Marketing (`http://www.apalon.com/iphone_marketing.html`)
    *   Digital Automat (`http://www.digitalautomat.com`) *   Mobility Public Relations
    (`http://www.mobilitypr.com`) *   PR Mac (`htttp://``www.prmac.com`) *   TriplePoint
    PR (`http://www.triplepointpr.com`)    Of course, there are many more marketing
    agencies out there beyond the ones listed here. Depending on where you live, you
    may feel more comfortable hiring a local firm, so do several online searches to
    find one that meets your specific needs.    As I’ve said before, whenever you’re
    hiring third-party consultants or companies, you should do ample research before
    selecting one. Not only should they be experts on the specific challenges of the
    App Store and marketing iOS apps, but their practices, policies, and performance
    should also be very transparent. Since they are representing your company and
    products, their actions are a reflection of you and your application.    For example,
    if an unscrupulous PR firm uses its own internal iTunes accounts to plant the
    same fake five-star reviews for all of its clients’ apps in the App Store, it’s
    only a matter of time before someone makes the connection and blows the whistle.
    Even if you were unaware that this was happening, ultimately, it’s your reputation
    that gets tarnished.    Apple has even been known to remove from the App Store
    apps that have abused the customer review system. Obviously, most PR agencies
    take their ethical responsibility very seriously and never cross that line. I
    only mention this so that you do your homework and ask the right questions before
    choosing a mobile marketing firm to promote your iPhone or iPad app.    Depending
    on the level of services provided, an experienced third-party marketing agency
    will cost at least $1,000 (and possibly thousands more). If you’re an independent
    developer who can’t afford to outsource the marketing and publicity for your app,
    then you’ll need to carve out the necessary time in your schedule to handle the
    job yourself. So, roll up your sleeves, and let’s dive in!    **Tip**  Know when
    people are talking about your app! Based on the latest relevant search results,
    Google Alerts is a fantastic free e-mail notification service that enables you
    to monitor when a specific name or topic is discussed online on web sites, blogs,
    and even Twitter. I highly recommend setting up Google Alerts to track your app
    name and company name.'
