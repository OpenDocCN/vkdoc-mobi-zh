- fmt: '随着应用内购买（In-App Purchase）的出现，许多开发者曾迅速预测它将使精简版（lite version）变得过时。然而，考虑到实现应用内购买的复杂性，以及应用在
    App Store 排行榜中的定位方式，免费的精简版仍然是一种非常有效且可行的商业模式。再次强调，哪种方法最适合您取决于您正在开发的应用类型。


    许多开发者仍选择同时发布免费精简版和独立付费版，最明显的原因是这比实现应用内购买要简单得多。如果您曾花时间浏览过苹果的 Store Kit 文档，您会发现应用内购买需要大量的额外编程和后端基础设施。对于
    iOS 开发者平台的新手来说，Store Kit 的 API 可能显得有些令人生畏。而在 Xcode 内编译您的应用的两个版本（一个作为精简版，另一个作为功能更强大的付费版）是相当容易的。


    如果您应用的功能可以清晰地划分为一组免费功能和一组只需支付少量升级费用即可获得的额外高级功能，那么应用内购买可能是更适合您需求的模式。例如，如果您的免费应用是一款包含五个游戏关卡的的第一人称射击游戏，那么额外的关卡和武器可以作为应用内购买项目提供。


    ngmoco 在其广受欢迎的 Eliminate Pro 应用中成功采用了这种模式。该应用免费提供，而额外的游戏关卡、武器和盔甲则可通过应用内购买获得。事实上，ngmoco
    对应用内购买的尝试已证明非常有效，以至于在随后的所有应用发布中（如 Touch Pets、We Rule 和 We Farm），都转向了免费增值（freemium）商业模式。


    **注意**：您不能通过应用内购买用新的应用二进制文件替换现有的二进制文件，因此对于大多数游戏来说，这需要在免费应用中以隐藏或锁定状态包含额外的游戏关卡和内容。当客户购买该项目时，您的应用会解锁该新武器或游戏关卡。


    但应用内购买可能并不适合所有类型的应用。一些单一功能的实用工具应用的结构，使得尝试针对特定功能通过应用内购买提供会很成问题。


    对于大多数游戏而言，应用内购买似乎是一个很好的选择，但请记住，通过应用内购买解锁额外内容需要您的应用变得更大（以存储那些隐藏内容）。而且，在处理移动设备上的下载带宽限制时，免费应用的文件大小对其作为促销工具的有效性会产生巨大影响。


    许多手机运营商，如 AT&T，限制通过其移动网络下载的文件大小仅为 20MB。因此，如果用户想要将您 35MB 的免费游戏下载到他们的 iPhone 上，他们需要等到登录到本地
    Wi-Fi 网络才行。这挫败了潜在的冲动购买和一时兴起的下载。等到他们进入 Wi-Fi 网络范围时，可能早已忘记了您的应用。


    使用精简版，只包含免费提供的内容，因此其编译后的文件大小远小于体积更大、功能齐全的付费版。如果免费精简版应用的二进制文件小于 20MB，它将能够接触到更广泛的潜在客户群，因为他们无需
    Wi-Fi，便可通过运营商的移动网络将其下载到 iPhone 上。


    话虽如此，免费精简版模式的一个主要缺点是，购买付费版需要单独下载一个应用，因此将任何现有用户数据从精简版迁移到付费版对开发者来说是一个相当令人头疼的物流问题。应用内购买则直接在应用内解锁新功能或内容，因此无需转移现有用户数据。


    另一个重要的考虑因素是，付费应用需要为现有客户提供免费更新。App Store 目前不支持对更新收费的机制。因此，即使您的精简版成功说服用户购买了您的付费应用，那也只是该客户为应用付出的唯一一次费用。这意味着您需要不断吸引新客户来支持发布更新所需的持续开发成本。如果您的应用仅定价
    99 美分且销量不持续走高，那么遵循这个模型来维持和发展您的业务将非常困难。


    使用应用内购买，如果您始终让客户可以选择购买额外的功能和附加内容，那么您就给了他们一种以其便利性和舒适度持续购买项目的方式。他们可以想花多少就花多少（或少花），这对您的利润非常有利。灵活性赢得人心！您收入的很大一部分将来自一小部分忠诚客户购买多个应用内购买项目。一个有效的、长期的商业模式是永远不会限制客户消费金额的模式。


    尽管免费增值应用包含应用内购买项目，但它们本身是免费下载的，这意味着您的应用只适合出现在 App Store 的“免费 App 排行榜”上。另一方面，同时发布免费精简版和付费版，能让您的产品有机会同时出现在
    App Store 的“免费 App 排行榜”和“付费 App 排行榜”上。


    诚然，出现在 App Store 排行榜上能带来更高的应用发现率和销量，但这对您业务生存的重要性已不像过去那样至关重要。Snappy Touch 的 Noel
    Llopis 在将他广受好评的应用 Flower Garden 集成应用内购买后，收入出现了指数级增长。


    “过去，在 App Store 上赚钱的常识性做法是不惜一切代价登上排行榜。应用内购买改变了这一切，”Noel 在他 `GamesFromWithin.com`
    网站最近的一篇博客文章中写道。“好的应用内购买可以让你的应用即使不在任何排行榜上也能盈利，并且是独立开发者最大的希望。”


    我确实相信应用内购买是移动销售的一条非常强大的途径，并且很快将成为在 iOS 平台上实现应用开发盈利的最流行方法。如果这种模式非常适合您的应用功能集和架构，那么敬请期待！[第
    8 章](#9781430262381_Ch08.xhtml)将详细讨论何时以及如何实现应用内购买。


    精简版方法：口味更佳，热量更低


    本书后面的章节将致力于介绍如何制作通过应用内广告和应用内购买盈利的免费应用。在此，我们将介绍当您的产品创意最适合作为付费应用时的情况，并探讨如何使用免费精简版来推广您的付费应用。但在深入探讨有效的营销策略之前，让我们先了解一些开发精简版应用的指南。


    安全第一：精简版的限制


    为避免被 App Store 拒绝，请确保您的精简版遵循以下指南。尽管这些规则可能并非铁板钉钉，但这份清单似乎对当前 App Store 中无数成功的精简版都适用。'
  raw: 'With the advent of In-App Purchase, many developers were quick to predict
    that it would render lite versions obsolete. However, with the complexities of
    implementing In-App Purchase combined with how apps are positioned in the App
    Store charts, a free lite version is still a very valid and effective business
    model. Again, which approach is best for you depends on the kind of app you’re
    developing.


    The most obvious reason many developers still opt to produce both a free lite
    version and a separate paid version is that it is much easier to implement than
    an In-App Purchase. If you’ve ever taken the time to glance through Apple’s Store
    Kit documentation, you’ll have noticed that In-App Purchase requires quite a bit
    of additional programming and back-end infrastructure. For newcomers to the iOS
    developer platform, the Store Kit API may seem a little overwhelming. And it’s
    easy enough to compile two versions of your app within Xcode: one as a lite version
    and the other as a more robust paid version.


    If your app’s functionality can be divided neatly into a free feature set and
    additional premium features made available for a small upgrade fee, then In-App
    Purchase may be the better model to suit your needs. For example, if your free
    app is a first-person shooter that includes five levels of game play, additional
    levels and weapons could be offered as In-App Purchase items.


    ngmoco found success with this model in its popular Eliminate Pro app. This app
    is offered for free, and additional game play, weapons, and armor can be bought
    via In-App Purchase. In fact, ngmoco’s foray into In-App Purchase has proven so
    effective that it switched over to a freemium business model with all subsequent
    app releases, such as Touch Pets, We Rule, and We Farm.


    **Note**  You can’t replace the existing app binary with a new binary via In-App
    Purchase, so for most games, this requires including the extra game levels and
    content within the free app in a hidden or locked capacity. When the customer
    purchases that item, your app unlocks that new weapon or game level.


    But In-App Purchase may not be suitable for every type of application. Some single-function
    utility apps are structured in such a way that attempting to target specific features
    to be offered via In-App Purchase can be problematic.


    In the case of most games, In-App Purchase seems to be a good fit, but keep in
    mind that unlocking additional content via In-App Purchase requires your application
    to be that much bigger (to store that hidden content). And when dealing with the
    download bandwidth limitations on mobile devices, the file size of your free app
    can make a huge difference in its effectiveness as a promotional sales tool.


    Many phone carriers, such as AT&T, limit file downloads through their mobile networks
    to only 20MB. So, if users want to download your 35MB free game onto their iPhone,
    they will need to wait until they are logged in to a local Wi-Fi network. That
    defeats potential impulse buys and spur-of-the-moment downloads. By the time they
    are within range of a Wi-Fi network, they may have already forgotten about your
    app.


    With a lite version, only the content that it is offered for free is included,
    which in turn compiles to a much smaller file size than the larger, full-featured
    paid version. If the free lite app binary weighs in at under 20MB, it will be
    accessible to a much broader audience of potential customers because they will
    have the ability to download it onto their iPhones through their carrier’s mobile
    network (if Wi-Fi isn’t available).


    With all that said, a major drawback to the free lite model is that purchasing
    the paid version is a separate app download, so transferring any existing user
    data from the lite version to the paid version is quite a logistical headache
    for developers. In-App Purchase unlocks the new features or content directly within
    the app, so there’s no need to transfer existing user data.


    Another important consideration is that paid apps are required to provide free
    updates to existing customers. The App Store does not currently support a mechanism
    for charging for updates. So, even if your lite version successfully persuades
    a user to buy your paid app, that single purchase price is the only time the customer
    will invest in the app. That means you need to continually attract new customers
    to support the ongoing development costs of releasing updates. If your app is
    priced at only 99 cents and doesn’t consistently sell large quantities, that’s
    a tough model to follow to properly sustain and grow your business.


    With In-App Purchase, if you’re always giving customers the option to buy additional
    features and add-on content, then you’re giving them a way to continue purchasing
    items at their convenience and comfort level. They can spend as little or as much
    as they want, which is great for your bottom line. Flexibility wins hearts! A
    large portion of your revenue will come from a small percentage of loyal customers
    buying multiple In-App Purchase items. An effective, long-term business model
    is one that never limits the amount of money a customer can spend.


    Even though freemium apps include In-App Purchase items, they are free to download,
    which means your app is eligible to appear only in the App Store’s Top Free Apps
    chart. On the other hand, releasing a free lite version and a paid version gives
    your product a chance to potentially place on both the Top Free Apps and Top Paid
    Apps in the App Store.


    While it’s certainly true that appearance in the App Store charts leads to increased
    app discovery and sales, it’s no longer as critically important to the survival
    of your business as it once used to be. Snappy Touch’s Noel Llopis saw an exponential
    increase in revenue after he integrated In-App Purchase in his acclaimed app,
    Flower Garden.


    “The common sense approach to make money on the App Store used to be to do anything
    to get on the Top charts. In-App Purchases changed all of that,” said Noel in
    a recent blog post on his `GamesFromWithin.com` site. “Good In-App Purchases can
    make your app profitable without being anywhere on the charts, and are the best
    hope for the independent developer.”


    I do believe In-App Purchase is a very powerful avenue for mobile sales and will
    soon become the most popular method for monetizing app development on the iOS
    platform. If this model fits nicely with your application’s feature set and architecture,
    then stay tuned! [Chapter 8](#9781430262381_Ch08.xhtml) provides detailed coverage
    on when and how to implement In-App Purchase.


    The Lite Approach: Tastes Great, Less Filling


    Later chapters of this book are dedicated to producing profitable free apps supported
    by in-app advertising and In-App Purchase. Here, we’ll cover the case where your
    product idea is best served as a paid application, and explore how to use a free
    lite version to promote your paid app. But before diving into effective marketing
    strategies, let’s go over some guidelines for developing lite apps.


    Playing It Safe: Lite Version Restrictions


    To avoid rejection from the App Store, make sure your lite version adheres to
    the following guidelines. Although these rules may not be written in stone, this
    checklist appears to have worked for countless lite versions currently available
    in the App Store.'
