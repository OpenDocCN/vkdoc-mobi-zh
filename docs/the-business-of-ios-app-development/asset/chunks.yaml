    ;\n        break;\n}\n```\n\n```\n// 通过警告视图通知用户收到的任何邮件编写器错误。\nUIAlertView *mailAlertView\
    \ = [[UIAlertView alloc] initWithTitle:resultTitle message:resultMsg delegate:self\
    \ cancelButtonTitle:@\"好的\" otherButtonTitles:nil];\n[mailAlertView show];\n[mailAlertView\
    \ release];\n[resultTitle release];\n[resultMsg release];\n[self dismissModalViewControllerAnimated:YES];\n\
    ```\n\n让我们逐步分析这段新代码，以便你准确了解其运行机制。`showMailComposer` 函数负责完成撰写邮件并显示在新嵌入的 `MFMailComposeViewController`\
    \ 中的所有繁重工作。在此示例中，邮件内容为告知朋友查看 App Store 中的虚构应用 Breadcrumbs，并且还包含一个指向官方网站的链接。为用户提供所有这些内容使得分享变得极其方便和简单。用户只需在“收件人”字段中输入朋友的电子邮件地址，然后轻点“发送”按钮即可（请参阅插图\
    \ 5-7）。\n\n![9781430262381_Fig05-07.jpg](img/9781430262381_Fig05-07.jpg)\n\n插图\
    \ 5-7。当用户轻点“发送电子邮件”按钮时，邮件编写器将显示在应用内\n\n继续向下看，`showMailComposer` 方法的下方是 `mailComposeController`\
    \ 事件，当用户按下 `MFMailComposeViewController` 的“取消”或“发送”按钮时，系统会调用该事件。这是添加代码以通知用户其邮件操作状态的地方。从列出的代码可以看出，你可以测试接收到的结果以获取邮件的状态，然后向用户报告邮件已成功送达，或者由于某种原因发送失败。\n\
    \n**提示** 经常向用户提供状态更新是一个好习惯，尤其是在通过在线连接发送数据时。如果用户点击“发送”按钮后，`MFMailComposeViewController`\
    \ 在没有进一步通信的情况下被关闭，用户就会一直等待，并疑惑邮件是否已送达。在示例 `mailComposerController` 事件中，如果收到的结果表示成功送达，则通过\
    \ `UIAlertView` 通知用户。如果邮件无法发送，也会通知用户。在你为避免 App Store 中出现负面客户评价而不懈努力的过程中，传达邮件操作的当前状态将有助于防止用户感到沮丧。\n\
    \n最后一部分是让“发送电子邮件”按钮在被点击时调用 `showMailComposer` 方法。通过在操作表的 `didDismissWithButtonIndex`\
    \ 事件中添加一行代码即可轻松实现（请参阅以粗体突出显示的代码）：\n\n```\n- (void)actionSheet:(UIActionSheet *)actionSheet\
    \ didDismissWithButtonIndex:(NSInteger)buttonIndex {\n    if (buttonIndex != [actionSheet\
    \ cancelButtonIndex]) {\n        if (buttonIndex == 0) {\n            // 应用内邮件，需要\
    \ iOS 3.0 或更高版本\n            [self showMailComposer];\n        }\n        if (buttonIndex\
    \ == 1) {\n            // 在此处添加 Twitter 代码。\n        }\n        if (buttonIndex\
    \ == 2) {\n            // 在此处添加 Facebook 代码。\n        }\n    }\n}\n```\n\n在 iOS\
    \ 模拟器中运行 `TellAFriend` 项目时，应用会报告你的邮件已成功发送，但实际上它并不会真正发送你的消息。为了获得最佳效果，请在至少已在“邮件”应用中设置一个电子邮件帐户的实际\
    \ iOS 设备上测试你的应用内邮件代码。\n\n就是这样！与你获得的功能相比，为应用添加应用内邮件支持实际上只需要很少的代码行。\n\n## 集成 Twitter\
    \ 和 Facebook\n\n除了发送邮件，你可能还想让用户能够将消息发布到他们的 Twitter 和 Facebook 帐户。虽然用户直接推广你的应用是好事，但另一种更微妙的方式来提高应用的知名度，是将社交网络与你的应用的其他核心功能深度集成。例如，如果你正在构建一个游戏，让用户能够通过\
    \ Twitter 和 Facebook 分享他们的高分，不仅能在玩家之间产生协同效应，还可能吸引想要参与其中的新客户。Lima Sky 的 Doodle\
    \ Jump 包含一个无缝的用户选项，用于通过 Twitter 和 Facebook 分享高分（请参阅插图 5-8）。\n\n![9781430262381_Fig05-08.jpg](img/9781430262381_Fig05-08.jpg)\n\
    \n插图 5-8。在 Lima Sky 的 Doodle Jump 中完成一局游戏后，会提示用户通过 Twitter 和 Facebook 分享他们的高分\n\
    \n发布的消息内容如下：“我刚刚在 #DoodleJump 中达到了 5,529 分！！！来超越我吧！ `http://bit.ly/DoodleJump-App`。”\n\
    \n除了炫耀你的高分，它还向任何认为自己能超越的人发起挑战，并附上 Doodle Jump 在 App Store 中的便捷链接。这是一个很好的方式，让你的客户在忙于与朋友分享高分时，帮助推广和销售更多的游戏副本！\n\
    \n社区建设的一个更全面的扩展是集成当前可用于 iOS 游戏的众多社交游戏平台之一，正如本章后面所讨论的那样。现在，我们先来看看 Twitter 和 Facebook。\n\
    \n在构建像上面那样的预填充推文时，请确保使用合适的主题标签和好的 URL 跟踪器，例如 `goo.gl`。这将显示点击链接的人数，你就能看到你的用户为你推广应用的效果如何。与此同时，使用好的主题标签有助于新用户通过浏览标签来发现你的应用。\n\
    \n### 访问 Twitter 的 API\n\n社交框架在 iOS 5 中引入，并在 iOS 6 中进行了扩展，允许你仅用几行代码集成 Twitter\
    \ 和 Facebook。\n\n请查看此链接以获取更多信息：`https://dev.twitter.com/docs/ios`。\n\nTwitter\
    \ API 通过 OAuth 执行身份验证，这使 Twitter 能够知道已发布推文的来源。如果你希望推文的来源归属显示为“来自 [*我的应用名称*]”，则需要向\
    \ Twitter 注册你的应用。已注册的应用会获得一个唯一的 API 密钥和秘密令牌，以便在向 Twitter 发布内容时正确标识自己。\n\n在 `http://dev.twitter.com/apps/new`\
    \ 向 Twitter 注册你的应用。\n\n### 使用适用于 iOS 的 Facebook SDK\n\n与我们讨论过的 Twitter 集成方式类似，Facebook\
    \ 也有一个非常相似的方法，可以使用社交框架进行简单的帖子发布。如果你想深入探索更多功能，Facebook SDK 是你的首选工具。\n"
- fmt: "Facebook 允许 iOS 开发者使用其开源 Objective-C 软件开发套件（SDK）来访问其平台，该 SDK 可从 `http://github.com/facebook/facebook-ios-sdk`\
    \ 获取。能够访问你的好友列表及其个人资料信息，并实时与他们连接，可将 Facebook 平台的全部能力引入你的 iOS 应用。\n\n仅仅为了让用户向他们的\
    \ Facebook 页面发布状态更新，就将如此庞大的框架集成到你的 Xcode 项目中，或许显得有些大材小用。但如果你正在开发一款 iOS 游戏或任何类型的点对点社区应用，你很快就会发现自己在项目的其他部分也需要使用更多的\
    \ Facebook 功能。\n\n在你的 iOS 应用中使用 Facebook SDK 之前，需要获取一个 API 密钥和一个密钥令牌，以便对你的 Facebook\
    \ 请求进行身份验证。这要求你拥有一个自己的有效 Facebook 账户。登录你的账户后，访问 Facebook 开发者创建应用页面（`http://www.facebook.com/developers/createapp.php`）并注册你的应用。\n\
    \n在设置新的 Facebook 应用时，请务必为其赋予与你正在构建的 iOS 应用相同的名称，因为当用户从你的 iOS 应用发布状态更新时，该应用名称将作为来源列出。与应该向\
    \ Twitter 注册你的应用同理，这是一种巧妙但有效的方式，可以让你的应用名称显示在用户的 Facebook 页面上——这对你的应用来说是极好的曝光机会。\n\
    \n一旦你的新 Facebook 应用在 Facebook 开发者网站上创建完成，该应用的资料页将会列出你唯一的 API 密钥和密钥令牌。请将这两个文本字符串保存在安全的地方，因为在你自己的\
    \ iOS 应用中定制 Facebook 代码时会用到它们。\n\n**应用拒绝警告** 你的应用必须在在线连接尝试失败时通知用户。如果你的应用依赖于与第三方网络服务的连接，你必须包含适当的错误处理代码，以便在连接或数据请求失败时，你的应用能优雅地处理故障并通知用户当前状态。如果错误的数据请求导致你的应用冻结，或者让用户等待却没有任何状态提示，App\
    \ Store 审核团队很可能会拒绝你的提交。如果你为审核过程提供了一个演示账户，请确保该演示账户能正常工作！或者提供两个演示账户，以防其中一个在审核期间出现故障。同样，一个良好的实践是，始终在应用需要在线连接时通知用户，尤其是考虑到\
    \ iPad 和 iPod touch 设备可能并不总是连接到 Wi-Fi 网络。\n\n现在，你已经准备好将社交网络集成到你自己的 iOS 应用中了！请参照\
    \ `MGTwitterEngine` 和 Facebook iOS SDK 附带的文档和示例代码，看看能否在现有的 Tell A Friend 示例项目中添加对发布到\
    \ Twitter 和 Facebook 的支持。我相信你很快就能让它跑起来！\n\n## 使用 ShareKit\n\n如果你觉得深入研究 `MGTwitterEngine`\
    \ 和 Facebook iOS SDK 过于复杂或耗时，那么你很幸运。备受尊敬的开发者 Nate Weiner 制作了一个交钥匙式的开源类库，名为 `ShareKit`，它支持一系列服务，例如电子邮件、Twitter、Facebook、Delicious、Google\
    \ Reader、Tumblr、Pinboard、Instapaper 和 Read It Later。除了分享 URL，`ShareKit` 还支持分享图片、文本和文件。因为它是开源的，其用户界面是可定制的，并且任何人都可以随时向\
    \ `ShareKit` 添加服务。从 `http://www.getsharekit.com/` 下载 `ShareKit`。\n\n既然你已经创建了 Tell\
    \ A Friend 示例项目，让我们逐步完成将 `ShareKit` 添加到项目的过程（或者你可以从本书的配套代码示例中打开已经完成的 Tell A Friend\
    \ with ShareKit 项目）。你需要将项目的基础 SDK 设置为 iOS 4 或更高版本。由于这是一个通用应用，通过将项目的 iOS 部署目标设置为\
    \ iOS 3.2，仍然可以支持运行 iOS 3.2 的 iPad。\n\n下载 `ShareKit` 后，在 Xcode 中打开 `ShareKit` 示例项目，并将其\
    \ `ShareKit` 文件夹（位于 `Classes` 组内）拖入你打开的 Xcode 项目。当提示时，请确保勾选“将项目复制到目标组文件夹（如果需要）”。`ShareKit`\
    \ 还需要一些额外的 Apple 框架。你应该已经从之前的应用内邮件示例中包含了 `MessageUI` 框架。使用相同的方法，添加 `SystemConfiguration`\
    \ 和 `Security` 框架。完成后，你的项目的 Groups & Files 列表应类似于图 5-9 所示。\n\n![9781430262381_Fig05-09.jpg](images/9781430262381_Fig05-09.jpg)\n\
    \n图 5-9. 向你的项目添加所需的框架和 ShareKit 类\n\n在前面的章节中，我提到需要向 Twitter 和 Facebook 注册你的应用，以获取\
    \ API 密钥和密钥令牌。使用现成的 `ShareKit` 并不能免除你这两项任务。你需要将这些唯一的 API 密钥存储在 `ShareKit` 的 `SHKConfig.h`\
    \ 文件中。Nate 已在该文件中以代码注释的形式包含了详细的说明，使得这一步尽可能易于遵循。\n\n最后但同样重要的是，从项目的操作按钮调用 `ShareKit`。为此，打开\
    \ `RootViewController.m` 文件，并在顶部添加以下代码行，以导入 `ShareKit` 的头文件：\n\n```\n#import \"\
    SHK.h\"\n```\n\n接下来，删除 `showShareOptions` 方法中的现有代码，并将其替换为以下新代码（以粗体显示）。这将分配要发布的文本和\
    \ URL，并启动 `ShareKit` 的自定义操作表。\n\n```\n- (IBAction)showShareOptions:(id)sender\
    \ {\n    // Action button was tapped, so launch ShareKit.\n\n    // Create the\
    \ item to share (in this example, a url)\n    NSURL *url = [NSURL URLWithString:@\"\
    http://breadcrumbsapp.com/\"];\n    SHKItem *item = [SHKItem URL:url title:@\"\
    Check out Breadcrumbs, the new parked car locator app for iPhone and iPad!\"];\n\
    \n    // Get the ShareKit action sheet\n    SHKActionSheet *actionSheet = [SHKActionSheet\
    \ actionSheetForItem:item];\n\n    // Display the action sheet\n    [actionSheet\
    \ showFromToolbar:self.navigationController.toolbar];\n}\n```\n\n既然所有工作都由 `ShareKit`\
    \ 来完成，你就不再需要之前添加的任何用于处理 `UIActionSheet` 和应用内邮件的代码。现在可以从 `RootViewController` 类中安全地移除所有这些未使用的代码。当运行\
    \ Tell A Friend 应用时，你不再看到原始的 `UIActionSheet` 实现，而应看到 `ShareKit` 的自定义操作表（见图 5-10）。\n\
    \n![9781430262381_Fig05-10.jpg](images/9781430262381_Fig05-10.jpg)\n\n图 5-10.\
    \ 将 Tell A Friend 应用配置为使用 ShareKit 后，你应该能够将数据发布到 Facebook 和其他几个社交网络服务\n\n**提示**\
    \ 当你阅读本书时，可能会有更新版本的 `ShareKit` 可用。由于 `ShareKit` 持续不断地增加新功能和服务，我强烈建议你从其官方网站（`http://www.getsharekit.com/`）下载最新版本的\
    \ `ShareKit`，并在你计划提交到 App Store 的应用中使用它。与此同时，不妨给 Nate Weiner 发一封电子邮件，感谢他出色的开源贡献，并告诉他你的哪些应用使用了\
    \ `ShareKit`。\n\n## 人多力量大：通过应用内交叉推广建立协同效应"
  raw: 'Facebook allows iOS developers to access their platform using their open-source
    Objective-C software development kit (SDK), available from `http://github.com/facebook/facebook-ios-sdk`.
    Having access to your list of friends and their profile information, as well as
    connecting with them in real time, brings the full power of the Facebook platform
    into your iOS app.


    It may seem like overkill to integrate such an extensive framework into your Xcode
    project just so your users can post status updates to their Facebook page. But
    if you’re developing an iOS game or any kind of peer-to-peer community app, you
    may soon find yourself using additional Facebook features in other parts of your
    project.


    Before you can use the Facebook SDK in your iOS app, you’ll need an API key and
    a secret token in order to authenticate your Facebook requests. This requires
    you to have an active Facebook account of your own. Once logged into your account,
    visit the Facebook Developer Create Application page at `http://www.facebook.com/developers/createapp.php`
    and register your app.


    When setting up a new Facebook application, be sure to give it the same name as
    the iOS app you’re building, since that application name will be listed as the
    source when users post status updates from your iOS app. For the same reason that
    you should register your app with Twitter, this is a subtle yet effective way
    to get your app’s name displayed on users’ Facebook pages—great exposure for your
    app.


    Once your new Facebook application is created on the Facebook Developer site,
    the application’s profile will list your unique API key and secret token. Save
    those two text strings in a safe place, because you’ll need them when customizing
    the Facebook code in your own iOS app.


    **App Rejection Warning**  Your app must notify users when an online connection
    attempt fails. If your app relies on connecting with a third-party web service,
    you must include appropriate error-handling code so that in the case of a failed
    connection or data request, your app handles the failure gracefully and notifies
    the users of the current status. If a bad data request freezes your app or leaves
    the user waiting without any indication of what’s happening, the App Store review
    team will most likely reject your submission. If you provide a demo account for
    use during the review process, make sure that demo account works! Or provide two
    demo accounts, just in case one fails during the review. It’s also a good practice
    to always notify users if and when your app requires an online connection, especially
    since iPad and iPod touch devices may not always be logged in to a Wi-Fi network.


    Now you’re ready to integrate social networking into your own iOS apps! Following
    the documentation and sample code included with MGTwitterEngine and the Facebook
    iOS SDK, see whether you can add support for posting to Twitter and Facebook in
    the existing Tell A Friend example project. I bet you’ll have it up and running
    in no time!


    Using ShareKit


    If you feel that diving into MGTwitterEngine and the Facebook iOS SDK is too daunting
    or time-consuming, then you’re in luck. Respected developer Nate Weiner has produced
    a turnkey, open-source class library called ShareKit that supports a long list
    of services such as e-mail, Twitter, Facebook, Delicious, Google Reader, Tumblr,
    Pinboard, Instapaper, and Read It Later. Beyond sharing URLs, ShareKit also supports
    sharing images, text, and files. Because it’s open source, the UI is customizable,
    and anyone can add services to ShareKit at any time. Download ShareKit from `http://www.getsharekit.com/`.


    Since you already have the Tell A Friend example created, let’s step through the
    process of adding ShareKit to your project (or you can open the completed Tell
    A Friend with ShareKit project from the book’s companion code examples). You’ll
    need to set the project’s base SDK to iOS 4 or higher. Since this is a universal
    app, iPads running iOS 3.2 can still be supported by setting the project’s iOS
    deployment target to iOS 3.2.


    After downloading ShareKit, open the ShareKit example project in Xcode and drag
    its *ShareKit* folder (located within the *Classes* group) into your open Xcode
    project. When prompted, make sure “Copy items into destination group’s folder
    (if needed)” is checked. ShareKit requires a few additional Apple frameworks as
    well. You should already have the MessageUI framework included from the previous
    In-App Email example. Using the same method, add the SystemConfiguration and Security
    frameworks. When completed, your project’s Groups & Files list should look like
    the one shown in [Figure 5-9](#9781430262381_Ch05.xhtml#Fig9).


    ![9781430262381_Fig05-09.jpg](images/9781430262381_Fig05-09.jpg)


    [Figure 5-9](#9781430262381_Ch05.xhtml#_Fig9). Adding the required frameworks
    and ShareKit classes to your project


    In the previous sections, I mentioned the need to register your app with both
    Twitter and Facebook in order to acquire API keys and secret tokens. Using the
    ready-made ShareKit does not excuse you from those two tasks. You’ll need to store
    those unique API keys in ShareKit’s *SHKConfig.h* file. Nate has included extensive
    instructions in that file as code comments, making this step as easy to follow
    as possible.


    Last, but certainly not least, is calling ShareKit from the project’s action button.
    To accomplish this, open the *RootViewController.m* file and add the following
    line at the top to import ShareKit’s header file:


    ```

    #import "SHK.h"

    ```


    Next, rip out the existing code in the `showShareOptions` method, replacing it
    with the following new code (shown in bold). This assigns the text and URL to
    be posted, and launches ShareKit’s custom action sheet.


    ```

    - (IBAction)showShareOptions:(id)sender {

        // Action button was tapped, so launch ShareKit.


    // Create the item to share (in this example, a url)

        NSURL *url = [NSURL URLWithString:@"http://breadcrumbsapp.com/"];

        SHKItem *item = [SHKItem URL:url title:@"Check out Breadcrumbs, the new parked
    car locator app for iPhone and iPad!"];


    // Get the ShareKit action sheet

        SHKActionSheet *actionSheet = [SHKActionSheet actionSheetForItem:item];


    // Display the action sheet

        [actionSheet showFromToolbar:self.navigationController.toolbar];

    }

    ```


    Since ShareKit is now doing all the work, you no longer need any of the previously
    added code for handling `UIActionSheet` and In-App Email. All of that unused code
    can now be safely removed from the `RootViewController` class. When running the
    Tell A Friend app, instead of the original `UIActionSheet` implementation, you
    should now see ShareKit’s custom action sheet (see [Figure 5-10](#9781430262381_Ch05.xhtml#Fig10)).


    ![9781430262381_Fig05-10.jpg](images/9781430262381_Fig05-10.jpg)


    [Figure 5-10](#9781430262381_Ch05.xhtml#_Fig10). With the Tell A Friend app now
    configured to use ShareKit, you should be able to post data to Facebook and several
    other social networking services


    **Tip**  There may be a newer, updated version of ShareKit available by the time
    you read this book. Since ShareKit is continually being enhanced with new features
    and services, I strongly recommend that you download the very latest version of
    ShareKit from its official web site (`http://www.getsharekit.com/`) and use that
    in the apps you plan on submitting to the App Store. And while you’re at it, drop
    Nate Weiner an e-mail, thanking him for his wonderful open-source contribution
    and letting him know which of your apps feature ShareKit.


    Strength in Numbers: Building Synergy with In-App Cross-Promotion'
  trans: "好的，作为高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\nFacebook 允许 iOS 开发者使用其开源\
    \ Objective-C 软件开发套件（SDK）来访问其平台，该 SDK 可从 `http://github.com/facebook/facebook-ios-sdk`\
    \ 获取。能够访问你的好友列表及其个人资料信息，并实时与他们连接，可将 Facebook 平台的全部能力引入你的 iOS 应用。\n\n仅仅为了让用户向他们的\
    \ Facebook 页面发布状态更新，就将如此庞大的框架集成到你的 Xcode 项目中，或许显得有些大材小用。但如果你正在开发一款 iOS 游戏或任何类型的点对点社区应用，你很快就会发现自己在项目的其他部分也需要使用更多的\
    \ Facebook 功能。\n\n在你的 iOS 应用中使用 Facebook SDK 之前，需要获取一个 API 密钥和一个密钥令牌，以便对你的 Facebook\
    \ 请求进行身份验证。这要求你拥有一个自己的有效 Facebook 账户。登录你的账户后，访问 Facebook 开发者创建应用页面（`http://www.facebook.com/developers/createapp.php`）并注册你的应用。\n\
    \n在设置新的 Facebook 应用时，请务必为其赋予与你正在构建的 iOS 应用相同的名称，因为当用户从你的 iOS 应用发布状态更新时，该应用名称将作为来源列出。与应该向\
    \ Twitter 注册你的应用同理，这是一种巧妙但有效的方式，可以让你的应用名称显示在用户的 Facebook 页面上——这对你的应用来说是极好的曝光机会。\n\
    \n一旦你的新 Facebook 应用在 Facebook 开发者网站上创建完成，该应用的资料页将会列出你唯一的 API 密钥和密钥令牌。请将这两个文本字符串保存在安全的地方，因为在你自己的\
    \ iOS 应用中定制 Facebook 代码时会用到它们。\n\n**应用拒绝警告** 你的应用必须在在线连接尝试失败时通知用户。如果你的应用依赖于与第三方网络服务的连接，你必须包含适当的错误处理代码，以便在连接或数据请求失败时，你的应用能优雅地处理故障并通知用户当前状态。如果错误的数据请求导致你的应用冻结，或者让用户等待却没有任何状态提示，App\
    \ Store 审核团队很可能会拒绝你的提交。如果你为审核过程提供了一个演示账户，请确保该演示账户能正常工作！或者提供两个演示账户，以防其中一个在审核期间出现故障。同样，一个良好的实践是，始终在应用需要在线连接时通知用户，尤其是考虑到\
    \ iPad 和 iPod touch 设备可能并不总是连接到 Wi-Fi 网络。\n\n现在，你已经准备好将社交网络集成到你自己的 iOS 应用中了！请参照\
    \ `MGTwitterEngine` 和 Facebook iOS SDK 附带的文档和示例代码，看看能否在现有的 Tell A Friend 示例项目中添加对发布到\
    \ Twitter 和 Facebook 的支持。我相信你很快就能让它跑起来！\n\n## 使用 ShareKit\n\n如果你觉得深入研究 `MGTwitterEngine`\
    \ 和 Facebook iOS SDK 过于复杂或耗时，那么你很幸运。备受尊敬的开发者 Nate Weiner 制作了一个交钥匙式的开源类库，名为 `ShareKit`，它支持一系列服务，例如电子邮件、Twitter、Facebook、Delicious、Google\
    \ Reader、Tumblr、Pinboard、Instapaper 和 Read It Later。除了分享 URL，`ShareKit` 还支持分享图片、文本和文件。因为它是开源的，其用户界面是可定制的，并且任何人都可以随时向\
    \ `ShareKit` 添加服务。从 `http://www.getsharekit.com/` 下载 `ShareKit`。\n\n既然你已经创建了 Tell\
    \ A Friend 示例项目，让我们逐步完成将 `ShareKit` 添加到项目的过程（或者你可以从本书的配套代码示例中打开已经完成的 Tell A Friend\
    \ with ShareKit 项目）。你需要将项目的基础 SDK 设置为 iOS 4 或更高版本。由于这是一个通用应用，通过将项目的 iOS 部署目标设置为\
    \ iOS 3.2，仍然可以支持运行 iOS 3.2 的 iPad。\n\n下载 `ShareKit` 后，在 Xcode 中打开 `ShareKit` 示例项目，并将其\
    \ `ShareKit` 文件夹（位于 `Classes` 组内）拖入你打开的 Xcode 项目。当提示时，请确保勾选“将项目复制到目标组文件夹（如果需要）”。`ShareKit`\
    \ 还需要一些额外的 Apple 框架。你应该已经从之前的应用内邮件示例中包含了 `MessageUI` 框架。使用相同的方法，添加 `SystemConfiguration`\
    \ 和 `Security` 框架。完成后，你的项目的 Groups & Files 列表应类似于图 5-9 所示。\n\n![9781430262381_Fig05-09.jpg](img/9781430262381_Fig05-09.jpg)\n\
    \n图 5-9. 向你的项目添加所需的框架和 ShareKit 类\n\n在前面的章节中，我提到需要向 Twitter 和 Facebook 注册你的应用，以获取\
    \ API 密钥和密钥令牌。使用现成的 `ShareKit` 并不能免除你这两项任务。你需要将这些唯一的 API 密钥存储在 `ShareKit` 的 `SHKConfig.h`\
    \ 文件中。Nate 已在该文件中以代码注释的形式包含了详细的说明，使得这一步尽可能易于遵循。\n\n最后但同样重要的是，从项目的操作按钮调用 `ShareKit`。为此，打开\
    \ `RootViewController.m` 文件，并在顶部添加以下代码行，以导入 `ShareKit` 的头文件：\n\n```\n#import \"\
    SHK.h\"\n```\n\n接下来，删除 `showShareOptions` 方法中的现有代码，并将其替换为以下新代码（以粗体显示）。这将分配要发布的文本和\
    \ URL，并启动 `ShareKit` 的自定义操作表。\n\n```\n- (IBAction)showShareOptions:(id)sender\
    \ {\n    // Action button was tapped, so launch ShareKit.\n\n    // Create the\
    \ item to share (in this example, a url)\n    NSURL *url = [NSURL URLWithString:@\"\
    http://breadcrumbsapp.com/\"];\n    SHKItem *item = [SHKItem URL:url title:@\"\
    Check out Breadcrumbs, the new parked car locator app for iPhone and iPad!\"];\n\
    \n    // Get the ShareKit action sheet\n    SHKActionSheet *actionSheet = [SHKActionSheet\
    \ actionSheetForItem:item];\n\n    // Display the action sheet\n    [actionSheet\
    \ showFromToolbar:self.navigationController.toolbar];\n}\n```\n\n既然所有工作都由 `ShareKit`\
    \ 来完成，你就不再需要之前添加的任何用于处理 `UIActionSheet` 和应用内邮件的代码。现在可以从 `RootViewController` 类中安全地移除所有这些未使用的代码。当运行\
    \ Tell A Friend 应用时，你不再看到原始的 `UIActionSheet` 实现，而应看到 `ShareKit` 的自定义操作表（见图 5-10）。\n\
    \n![9781430262381_Fig05-10.jpg](img/9781430262381_Fig05-10.jpg)\n\n图 5-10. 将 Tell\
    \ A Friend 应用配置为使用 ShareKit 后，你应该能够将数据发布到 Facebook 和其他几个社交网络服务\n\n**提示** 当你阅读本书时，可能会有更新版本的\
    \ `ShareKit` 可用。由于 `ShareKit` 持续不断地增加新功能和服务，我强烈建议你从其官方网站（`http://www.getsharekit.com/`）下载最新版本的\
    \ `ShareKit`，并在你计划提交到 App Store 的应用中使用它。与此同时，不妨给 Nate Weiner 发一封电子邮件，感谢他出色的开源贡献，并告诉他你的哪些应用使用了\
    \ `ShareKit`。\n\n## 人多力量大：通过应用内交叉推广建立协同效应\n"
- fmt: '# The Success of In-App Cross-Promotion


    A major factor that has contributed to the success of Optime Software’s apps is
    its heavy use of in-app cross-promotion. Upon launching one of Optime’s free ad-supported
    apps, a splash screen briefly appears. While the user is waiting for the app to
    load, the splash screen not only promotes the premium version of the free app
    they’re using, but also lists several of Optime’s other free apps (see [Figure
    5-11](#9781430262381_Ch05.xhtml#Fig11)). Each app listed is a live link. Tapping
    the app name will take you to its respective page in the App Store so that you
    can learn more about the app and download it.


    ![9781430262381_Fig05-11.jpg](images/9781430262381_Fig05-11.jpg)


    [Figure 5-11](#9781430262381_Ch05.xhtml#_Fig11). The splash screens in Optime
    Software’s free apps effectively cross-promote its other apps


    While Optime Software has seen sales increase four to five times from cross-promoting
    its apps across in-app advertising networks (which will be explored in [Chapter
    7](#9781430262381_Ch07.xhtml)), doing its own in-app cross-promotion has also
    proven to be a valuable method for boosting awareness of all of its free apps
    to existing users. The more downloads it receives, the more the company eventually
    earns from ad revenue and premium app sales.


    “Splash-screen cross-promotion has been a very effective tool for us,” says Optime
    Software’s founder and CEO, Jon Schlegel. “We track the click-through rates from
    our splash-screen advertising, but not the conversion rates. We’ve seen click-through
    rates as high as 10 percent for some of our splash-screen ads. Click-through rates
    for the splash-screen ads tend to decline over time though, as regular users become
    acclimated to the ads and start to ignore them. We’re looking into ways to make
    the splash-screen advertising more dynamic in order to increase its effectiveness.”


    **App Rejection Warning**  Even though Apple’s iOS HIG says that it frowns upon
    splash screens for advertising, they seem to be prevalent in countless applications
    in the App Store. But upon submitting your app via iTunes Connect, if it gets
    rejected because of a splash screen, then you’ll know you went too far with the
    concept. If you do utilize a splash screen in your app, then before submitting
    it, make sure it doesn’t linger on the screen for too many seconds and doesn’t
    go over the top with a blatant hard sell. Since splash screens fall into that
    mysterious gray area of the approval process, take great care that when designing
    your splash screen as a cross-promotional tool, it remains visually effective
    without calling too much attention to itself.


    Circumventing the splash-screen approach, many game publishers include a More
    Games button on their app’s main screen. In some apps, selecting More Games launches
    the publisher’s web site in Mobile Safari. That takes users away from the game
    they were playing, which is never optimal.


    ## Setting up Shop


    In a move to keep users engaged within the app, NimbleBit opted to embed its own
    custom “app store” into its games. Tapping the More Games button in its apps displays
    the NimbleStore screen, which cross-promotes all of its available apps (see [Figure
    5-12](#9781430262381_Ch05.xhtml#Fig12)). Rather than automatically redirecting
    the user to the respective page in the App Store, tapping an app icon in the NimbleStore
    screen displays an embedded, custom screen for the app. This allows NimbleBit
    to tailor its own enhanced sales pitch, along with providing a link to its App
    Store page.


    ![9781430262381_Fig05-12.jpg](images/9781430262381_Fig05-12.jpg)


    [Figure 5-12](#9781430262381_Ch05.xhtml#_Fig12). Tapping the More Games button
    in one of NimbleBit’s games displays its embedded NimbleStore, which cross-promotes
    its catalog of apps with video trailers and more


    The beauty of the embedded NimbleStore is that it is a remote mini-site displayed
    in a `UIWebView`. Not only does this allow NimbleBit to modify the NimbleStore
    pages at `http://m.nimblebit.com/` without requiring updates to the iPhone and
    iPad games themselves, but it also lets the company use Google Analytics to track
    which store pages are being accessed by users. According to NimbleBit’s statistics,
    approximately 85 percent of the people who visit the NimbleStore within their
    apps go on to further explore one of the specific game pages. In only the first
    nine months, the NimbleStore received a little more than 1.6 million page views
    and has been responsible for 13,170 game sales!


    Having the NimbleStore remotely hosted enables NimbleBit to dynamically alter
    pricing based on regions and limited-time sale offers. Apple tends to reject apps
    that display app pricing, so I’m not sure how NimbleBit escaped that particular
    restriction (unless having the pages hosted remotely makes the difference). So,
    just to play it safe, you probably should not list prices in your own in-app cross-promotion
    efforts.


    When users choose to buy an app from the NimbleStore, tapping the App Store button
    sends the user to the iTunes App Store to make the purchase. As any smart iOS
    developers should set up, all redirects to the App Store are iTunes affiliate
    links, so any time a user purchases one of the games listed in the NimbleStore,
    NimbleBit makes an affiliate commission. The iTunes Affiliate Program also enables
    NimbleBit to track the commissions earned, which reports the total number of games
    being purchased from NimbleStore leads.


    The “Apps We Love” games listed in the NimbleStore (such as Harbor Master) are
    not NimbleBit games. Although those specific purchases won’t net NimbleBit an
    App Store royalty, they will earn the company affiliate commissions. So, if you
    don’t have enough apps to fill your own embedded mini-store, you can always list
    some of your favorite apps from other publishers. You’ll be supporting your fellow
    developers, as well as making a little money yourself from the referrals. You’ll
    learn more about the iTunes Affiliate Program in [Chapter 6](#9781430262381_Ch06.xhtml).


    If you have only a few apps and would rather limit your cross-promotion efforts
    to your lite version’s Info screen where you’re currently up-selling the paid
    version, just be careful not to dilute your marketing message too much. If encouraging
    users to upgrade to the paid version is your priority, make sure that any mention
    of your other apps on that same screen does not upstage the sales pitch for the
    paid version.


    ## United We Prosper


    If you like the idea of integrating your own mini-store within your app to cross-promote
    your other app offerings, but you don’t have enough apps to fill it, consider
    partnering with a select few of your developer peers. With several developers
    integrating a shared “community” store in all their apps, you’ll benefit from
    having a populated storefront. You’ll also get the increased synergy of cross-promoting
    your apps not only within your own apps, but also across all the other apps in
    this community network. It’s a win-win situation for all the developers involved.


    This strategy is exactly what a few independent iOS game developers set out to
    achieve when they banded together to form App Treasures. The developers originally
    involved in App Treasures were The Blimp Pilots (Koi Pond), Imangi Studios (Harbor
    Master), Snappy Touch (Flower Garden), Streaming Colour Studios (LandFormer),
    and Veiled Games (Up There). They positioned the App Treasures label as a seal
    of quality that consumers can trust. If players like one of the games, they’ll
    most likely enjoy other games in the App Treasures family.'
