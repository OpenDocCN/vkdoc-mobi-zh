    厌倦了没完没了地绘制相同的按钮和其他标准界面元素？得益于几位杰出的设计师和开发人员，网上提供了预绘制好的 iPhone 和 iPad 草图模板（参见图 4-12），具体包括：


    *   Interface Sketch (`http://www.interfacesketch.com`) 提供 PDF 格式的 iPhone 和 iPad
    应用线框图模板，可打印为 Letter 或 A4 尺寸。

    *   UI Stencils (`http://www.uistencils.com`) 提供耐用的不锈钢 iPhone 和 iPad 模板。你也可以从网站上下载可打印的
    PDF 格式速写本页面。


    ![9781430262381_Fig04-12.jpg](img/9781430262381_Fig04-12.jpg)


    图 4-12. 如果你计划定期设计应用，UIStencils 的线框画板和不锈钢模板绝对值得投资。


    ## Illustrator 和 Photoshop 中的精美模型


    如果不习惯在纸上绘图，而更擅长使用 Adobe 的 Photoshop、Illustrator 或 Fireworks，那么其他足智多谋的设计师们已慷慨地向
    iOS 开发者社区贡献了全面的界面元素集。这些元素被方便地保存在分层文件中，使得创建像素级完美的模型变得极其容易（参见图 4-13）。


    *   Meng To 的 iPhone UX 草图线框模板 (`http://blog.mengto.com/how-to-wireframe-an-iphone-app-in-sketch/`)

    *   Teehan+Lax 的 iPhone GUI，适用于 Photoshop (`http://www.teehanlax.com/tools/iphone/`)

    *   Teehan+Lax 的 iPad GUI，适用于 Photoshop (`http://www.teehanlax.com/tools/ipad/`)


    ![9781430262381_Fig04-13.jpg](img/9781430262381_Fig04-13.jpg)


    图 4-13. 仅展示了来自第三方设计师的分层 Photoshop 文件和基于矢量的 Illustrator 文件中所提供的众多 iOS 元素的一小部分。


    在设计设备上的实际图稿时，请记住始终使用两像素网格系统，以避免在非 Retina 设备上出现任何问题。如果你在 Retina 设备上制作了一个尺寸为 `120
    × 51` 像素的按钮，但现在想制作非 Retina 版本，它不能是 `60 × 25.5` 像素。你需要确保在保存非 Retina 图像时，尺寸不会产生半个像素。Eddie
    Lobanovskiy 的这个指南对于在 Photoshop 中设计应用很有帮助：iPhone 5 网格模板 (`http://dribbble.com/shots/865767-iPhone-5-Grid`)。


    ## 用于设计模型的其他软件工具


    Balsamiq Mockups (`www.balsamiq.com/products/mockups/`) 是我个人最喜欢的工具之一。它是一个强大、跨平台的
    Adobe AIR 应用程序，拥有大量“手绘”风格的 UI 元素工具集，适用于桌面应用和 iOS 应用。这种独特的方法能生成非常干净且专业的模型，同时仍然保留着纸上绘制的感觉。


    如果你没有 Photoshop 或 Illustrator 的许可证，或者正在寻找更经济实惠的原型设计选项，以下是一些用于设计模型的其他工具：


    *   OmniGraffle (`www.omnigroup.com/applications/omnigraffle/`)：对于 Mac 用户来说，这是一个价格合理的解决方案。虽然最初是作为图表工具开发的，但
    OmniGraffle 已成为构建线框图和界面设计模型的热门选择。

    *   Graffletopia (`www.graffletopia.com`)：这个第三方网站提供了一个庞大的、由用户贡献的免费 OmniGraffle
    模板库。可以下载多个与 iPhone 相关的模板。

    *   Keynotopia (`www.keynotopia.com`)：如果你更倾向于在客户会议中使用演示软件，可以看看那些用于制作 iPhone 和
    iPad 应用原型的各种 Keynote 模板。


    ## 使用移动应用设计应用


    当灵感在你离开办公桌时涌现，这种频繁发生的情况该怎么办？一些创新的 iPhone 和 iPad 应用提供了强大的线框和原型制作功能，让你随时随地都能方便、舒适地使用。


    如果你对导出模型的 Xcode 项目感兴趣，那么你一定要看看 AppCooker 和 BluePrint。如果你已经是 Mac 版 OmniGraffle
    的粉丝，那么 iPad 版 OmniGraffle 对你来说可能是一个显而易见的选择（不过值得注意的是，目前在 `Graffletopia.com` 上可用的一些第三方模板可能不支持当前
    iPad 版本的 OmniGraffle）。


    以下是一些可用的移动模型制作工具：


    *   iPad 版 OmniGraffle (`http://www.omnigroup.com/products/omnigraffle-ipad/`)

    *   iPad 版 AppCooker (`http://www.appcooker.com`)

    *   iPad 版 Blueprint（iOS 模型）(`http://groosoft.com`)


    ## 开始制作原型


    当然，如果你只是作为一个独立开发者为自己设计应用，那么这一步可能显得有些多余，特别是当你技术足够娴熟，能在 Interface Builder 中快速拼凑出原型时。但如果你是在为一个以要求无数
    UI 更改而臭名昭著的客户合作，那么创建功能性的纸质原型可以让你快速完善设计并获得客户批准，而无需浪费任何实际的编程时间。


    原型制作可以揭示应用中笨拙的工作流程和不直观的架构。一个界面构思在脑海中可能是个好主意，但一旦你在纸上绘制出来并仔细审视一个半工作原型后，你可能会改变主意。事实上，有时原型可以引导你产生新想法，最终提升你应用的市场竞争力。至少，原型制作会暴露出过于复杂的操作，促使你寻找新的解决方案来简化用户交互——这对移动应用的成功至关重要。


    原型制作还能为你节省大量的开发时间，并防止你编写不可用的代码。“怎么可能呢？”你可能会问。“现在直接跳到 Xcode 开始快速敲出一个简陋的演示不是更快吗？”


    如果你是为客户或老板开发应用，他可能希望在批准项目之前看到你的想法。这里的关键词是*看到*。很多时候，许多企业高管——尤其是那些没有创意背景的人——很难想象出一个界面。无论你在会议上多么清晰地表达你的想法，他们就是无法在脑海中描绘出来。将你的界面构思组合成线框图或截图模型，是一种简单且节省时间的方法，能快速向客户或老板展示你的提议。这样，如果他回过头来找你要求大量更改，或者（天哪！）要求方向上的重大转变，你也不会在
    Xcode 和 Interface Builder 中浪费大量宝贵时间。


    如果你将应用开发外包，那么原型制作在向第三方程序员正确传达你的 UI 构思方面也极具价值，尤其是在存在严重语言障碍的情况下。当他们按小时收费时，你花在解释想法和目标上的时间越少，外包开发的成本就越低。一张图胜千言。


    即使你是一个独立开发者，单独开发一个应用，原型制作最重要的好处在于它能在后期的测试阶段为你节省大量宝贵时间并避免潜在的麻烦。你肯定不想花费数月辛勤工作开发一个应用，结果却从测试人员那里收到铺天盖地的反馈，说
    UI 难以理解，他们很难弄清楚如何使用应用或访问某些功能。这些问题最好在你的开发进程深入之前就解决掉。


    ### 制作一个原型

