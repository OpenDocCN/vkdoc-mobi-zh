  trans: '

    # 无论多么微小，任何第三方为你的应用所做的宣传都值得你表示感谢。


    通过一封真诚的电子邮件表达谢意，还能帮助你加强与那些记者和博客作者的关系。与他们建立对话，可以保持这些宝贵联系的通畅，这样你就可以继续向他们发送新的应用发布公告。


    ## 发放促销码：在有影响力的博客和评测网站上争取应用评测


    对于那些发布应用评测的网站，你不仅需要向他们发送新闻稿，还应该联系他们撰写关于你应用的评测，这需要一个略有调整的推介方式。


    由于 App Store 中拥有超过 100 万个应用，每个人都希望自己的应用被评测，那么你如何确保自己的应用能从众多应用中脱颖而出？这正是与知名博主和应用评测者建立良好关系（如第
    10 章所讨论的）能够帮助你的应用排到队列前列的地方。如果你在发布前的营销活动中，已经向他们展示了预览截图和视频预告片，并给他们留下了深刻印象，那么当他们有机会时，很可能会愿意评测你的应用。


    ### 提供评测材料


    你的应用评测推介应包含新闻稿中的所有信息，再加上额外的媒体材料，例如几张截图、一个视频预告片以及应用图标——基本上就是你网站“新闻页面”和/或可下载的媒体资料包中的所有元素。根据每个网站的具体提交规则，评测者可能要求你将截图和其他与应用相关的图片作为电子邮件附件发送，或者要求你提供材料的在线
    URL。有些网站只接受通过在线表格提交的应用评测请求。


    以下是大多数应用评测者要求的材料清单：


    -   **你的电梯演讲：** 为什么评测者应该关注你的应用或游戏？你需要让他们认同你的新应用对其读者很重要。我在第 10 章中提到的如何撰写电梯演讲的技巧，在你几乎所有的营销工作中——你的网站、App
    Store 文字、新闻稿，以及现在的应用评测请求——都被证明非常有用！利用你的电梯演讲来构建一个吸引人的邮件主题行和应用描述。这两个元素需要传达出你作为应用创作者的激情和兴奋。评测者非常繁忙，因此简洁是关键。与新闻稿一样，你的应用描述应该简短。并且永远记得包含你应用的价格！


    -   **三到五张截图：** 不要给评测者塞太多截图。挑选最能代表你应用的三张，只提交这些。如果一个网站要求你提交更多，那么把你已经上传到 App Store
    的那五张截图发过去，因为这些显然是经过挑选最能代表你应用的图片。


    -   **视频预告片：** 如果你制作了展示应用或游戏运行状态的视频预告片，也一定要附上观看链接的 URL。正如我在第 10 章中提到的，要密切关注制作价值，因为你的视频预告片直接反映了你应用的质量。一个制作精良的视频预告片可以在不到两分钟内让评测者了解你的应用——这比下载并试驾你的应用花费的时间还要少。这往往能成为决定你的应用是否会被评测的关键因素。


    -   **应用图标和 App Store URL：** 尽管有些评测者不要求提供你的应用图标图片，但你始终应该附上指向你应用在 App Store 中的直接链接。这使他们能够查看你的
    App Store 列表，并从他们的评测中链接到它。与其复制从 App Store 获得的又长又复杂的 URL，通常更容易的方法是提供苹果的短 iTunes
    链接格式 `http://itunes.com/apps/APPNAME`，将 `APPNAME` 替换为你的应用在 App Store 中的官方名称。例如，流行的
    Bump 应用的链接是 `http://itunes.com/apps/bump`。对于那些接受应用图标图片的评测者，请提供高质量 512 × 512 像素的版本以获得最大灵活性。


    -   **应用网站 URL：** 一定要包含指向你应用网站的链接，以便评测者能够探索你提供的任何其他在线资源。如果评测中没有链接到你的网站，请不要失望。iTunes
    联盟计划是许多评测网站的主要收入来源，因此通常评测只会通过联盟链接将读者引导到你在 App Store 中的应用。


    -   **联系信息：** 与你的新闻稿一样，确保提供所有相关的联系信息，例如你的姓名、公司名称、电子邮件地址、电话号码、Skype、即时通讯工具和 Twitter
    账号。你提供的选择越多越好。令人惊讶的是，有多少开发者会忘记包含这些至关重要的细节。如果评测者因有额外问题而联系不上你，仅此一点就可能阻止评测的撰写。


    -   **促销码：** 许多网站会告诉你不要在应用评测请求中包含促销码，并声明如果他们在评估你的提交后有兴趣评测该应用，他们会向你索要促销码。他们不想为不打算评测的应用浪费促销码，这很好，但这里有个小秘密。如果你在最初的评测请求中就提供了促销码，那么你就为他们免费下载并立即试用你的应用提供了极大的便利。他们很可能会使用你提供的促销码，而你被评测的机会也会增加那么一点点！苹果限制了每个应用版本可以发放的促销码数量（50
    个），所以你需要谨慎使用促销码。只在首次提交时向最流行和最有影响力的评测网站提供它们。


    不确定什么是促销码？我将在下一节解释它们是什么以及如何获取。


    ## 获取促销码


    促销码是特殊代码，你可以用它们向别人提供你的应用的免费副本。促销码的工作原理与 iTunes 礼品卡代码完全相同，并且以相同的方式兑换。这是向记者、博客作者和应用评测者免费提供产品下载的简便推荐方法。


    一个促销码被分配给 iTunes Store 中的特定项目。在这里，它对应的是你的 iOS 应用。如果用户兑换了你提供的促销码，只会免费下载相关的应用。该促销码不能用于下载任何其他项目。与礼品卡一样，一旦促销码被兑换，就永远无法再次使用，这可以防止盗版。


    促销码不与个人的 iTunes 账户绑定，所以你可以像对待现金一样对待它们。你可以将促销码赠送给任何你想要的人。


    每次应用更新，苹果只授予你 50 个促销码。因此，如果你在 1.0 版本中用完了所有 50 个促销码，那么在下一个应用更新上传并通过 App Store 审核之前，你将无法再请求任何促销码。


    虽然 50 个听起来可能很多，但这些促销码消失的速度可能比你预期的要快得多。每个人都喜欢免费应用，所以会有很多人向你索要促销码，但请谨慎使用。


    你的首要任务是确保你有足够的促销码用于媒体和应用评测。之后，你可以将剩余的用于赠品和推广活动。但我建议总是保留几个促销码，以防将来出现令人兴奋的应用评测或营销机会。


    那么，如何为你的 iOS 应用获取促销码呢？与你的 App Store 产品相关的所有其他事务一样，促销码通过苹果的 iTunes Connect 网站进行管理。登录
    `http://itunesconnect.apple.com` 的 iTunes Connect，在“管理你的应用”部分，选择你的应用。然后导航到你应用的“查看详细信息”页面。

