- fmt: '# Passing the Baton


    This was one of the longer chapters in the book, but ultimately one of the most
    important when it comes to marketing yourself and your app online.


    With your prerelease marketing efforts in full swing, it''s now time to place
    your iOS application in the good hands of Apple''s app review team. Next up, I''ll
    walk through the dreaded app-submission process. You''ve read the horror stories
    posted online of long review times and disheartening rejections, but don''t let
    that discourage you. The sooner you work through Apple''s app review process and
    get approved, the sooner you can start selling in the `App Store`. So, take a
    deep breath, and turn the page.


    Even though the app may change or encounter unexpected delays during Apple''s
    review process, some tech sites don''t respect embargoes. So, even if you stress
    the importance of holding back the publication of their app review until its release
    in the `App Store`, your wishes may not always be granted.


    Since you can''t always control when reviews are published, it''s vital that you
    don''t send out ad hoc builds to tech sites too far in advance. You certainly
    don''t want to oversaturate the market with tons of press coverage long before
    the actual release—that''s simply a waste of publicity that would be of greater
    benefit postrelease. People generally have short memories when it comes to software
    products. The majority of your publicity should take place when it can do you
    the most good—when consumers can instantly buy the app they just read about.


    With that said, it''s always nice to have some winning testimonials in place from
    respected tech sites before your application is released. This way, when your
    app goes live in the `App Store`, it won''t seem like such an unknown entity.
    Based on the prerelease buzz and the endorsements plastered on your web site,
    your new app will appear that much more appealing to consumers. Everyone loves
    a winner.


    ---


    # Chapter 11: Keys to the Kingdom: The App Store Submission Process


    After months of extensive planning, development, and testing, you''re finally
    ready to submit your iOS application to the `App Store`! Congratulations on all
    your hard work! Your beta testers love your app, but will Apple''s app review
    team give it a thumbs-up?


    This chapter will walk you through the app submission process in `iTunes Connect`.
    If you''ve followed Apple''s guidelines, chances are good that your app submission
    will go smoothly. Just remember that more than 300,000 apps have already been
    approved, far outweighing the number of rejected apps.


    Your product page in the `App Store` is the world''s gateway to your app, so its
    presentation is essential in properly communicating the value of your app. Before
    submitting your app in `iTunes Connect`, you will need to have a few items ready
    for the online submission form. It''s worth taking the time up-front to craft
    the following:


    *   Your app''s title

    *   An enticing app description

    *   Eye-catching screenshots

    *   An optimized keywords list

    *   A pricing strategy


    These elements will influence not only Apple''s app review team, but also your
    product''s marketability in the `App Store`.


    ## The Politics of Pricing


    One of the most important things you''ll need to determine before submitting your
    app is the selling price. With most of the apps in the `App Store`''s Top 25 priced
    at only 99 cents, don''t assume that''s the magic price point for your app. There
    are actually quite a few factors to consider before settling on a price.


    ### Analyzing Similar Apps


    Having already researched your competition (as discussed in Chapter 2), you should
    know the prices and feature sets of similar apps. Although keeping your price
    below that of competitive apps may seem like the obvious move, don''t sell yourself
    short just yet.


    If your app does not offer an attractive differentiator, such as an enhanced UI
    or killer feature, then you may be forced to price your app below similar apps,
    especially if they already enjoy a successful run of sales and positive customer
    reviews. But if you did your competitive homework, this shouldn''t be an issue,
    right?


    If your app does bring a much desired feature that sets it apart from the competition,
    you may be able to do quite well in the `App Store` with the same price or even
    a higher price. If you feel similar apps selling at `$1.99` will quickly copy
    your unique killer feature, then maintaining the same `$1.99` price point might
    be the answer. But if you think the feature may remain exclusive to your app—for
    whatever reason, such as technical difficulty or licensing deals—you may be able
    to charge `$2.99` or a slighter higher price.


    If you''ve stumbled upon an untapped market where your app does not currently
    have any competitors, then it really comes down to determining how much your product
    is worth to potential customers. Usually, the more niche market it serves, the
    higher price threshold it can bear. For example, apps that cater to scientists,
    doctors, or sales reps are often priced at the higher end of the spectrum, ranging
    anywhere from `$6.99` to `$99`. You''ll want to research the particular field
    your app specializes in to help calculate how much potential customers would be
    willing to spend on such a mobile application, based on the benefits it provides.
    You certainly don''t want to gouge your customers, but at the same time, you don''t
    want to leave money behind on the table either.


    ### Room to Maneuver


    Productivity apps experience a longer life span than fly-by-night, hit-driven
    apps, so pricing can be a little easier to determine. But for games and novelty
    apps that don''t benefit from that same longevity, ranking high in the `App Store`
    charts immediately after launch is usually the goal. Although most of those hit-driven
    apps debut at the rock-bottom price of 99 cents in the hopes of propelling them
    into the Top 100, you should think twice before employing this same pricing strategy.


    Setting the price at 99 cents upon release is a nice impulse-buy incentive, but
    what happens when the initial sales boost from your launch publicity efforts eventually
    tapers off? When awareness and sales later drop (and at some point, they will),
    that''s the time you''ll want to rejuvenate your presence in the `App Store` with
    a limited-time sale offer. But with your app already priced at the minimum 99
    cents, you have no room to maneuver. But with an app price of `$1.99` or higher,
    you''ll have room to offer a special discount sale when needed to keep your momentum
    going in the `App Store`.


    Games often receive complaints from consumers when released with a price tag higher
    than 99 cents, but don''t let the vocal few sway you. If you''ve built a high-quality
    game, then complaints aside, your profits will benefit from the higher price.
    Although most higher-priced games are from big publishers like Electronic Arts
    and Gameloft, many small, independent developers have also found success—for example,
    Semi Secret Software''s Canabalt at `$2.99`.


    With your app priced at only 99 cents, you need to sell a lot of copies to make
    any decent money, especially after Apple takes its 30 percent cut. This usually
    requires ranking in the Top 25, with your business model relying on the boosted
    sales volume. And if you can get there, the visible exposure of the Top 25 can
    increase your sales exponentially, making the low 99-cent price worthwhile.


    If you can rank high—that''s the gamble. Since there''s no guarantee your app
    will make it to the Top 25, or even the Top 100, pricing it at 99 cents is very
    risky if you end up selling fewer copies than expected. When you charge an app
    price of `$1.99` or higher, you don''t need to sell as many units to make just
    as much money, which in turn makes the `App Store` ranking less vital to your
    app''s profitability.'
