- fmt: '# Managing Your In-App Purchase Items


    After saving your new In-App Purchase item within `iTunes Connect`, you can make
    changes to it later by accessing it via your app listing’s `Manage Your In-App
    Purchases` section (see [Figure 8-15](#9781430262381_Ch08.xhtml#Fig15)). Until
    you submit the item to Apple for review, its status will be `Pending Developer
    Approval`, and you can freely edit or delete it.


    ![9781430262381_Fig08-15.jpg](images/9781430262381_Fig08-15.jpg)


    [Figure 8-15](#9781430262381_Ch08.xhtml#_Fig15). After your In-App Purchase item
    is created, it is listed in your app’s `Manage Your In-App Purchases` section
    of `iTunes Connect`


    After you’ve completed your testing and uploaded a screenshot of an In-App Purchase
    in action, click the `Approve` button to submit your In-App Purchase item for
    review. You’ll be prompted to choose one of two options:


    *   *Submit Now*: If your existing iOS app is already supporting In-App Purchase
    and you’re merely adding yet another In-App Purchase item to an existing list
    of offerings, you can select `Submit Now` to send it directly to the review queue.

    *   *Submit with Binary*: If your In-App Purchase item requires a new or updated
    version of your application, you’ll want to select `Submit with Binary` to ensure
    that both products are reviewed together and go live in the App Store at the same
    time.


    When the In-App Purchase item’s status is `Waiting for Review` or `In Review`,
    you will not be able to make any further changes while it’s being reviewed.


    After your In-App Purchase item has been rejected or approved by Apple, any additional
    modifications you make will require it to be reviewed again. If it gets rejected,
    then Apple requires you to re-create it as a new In-App Purchase item before resubmitting
    it for review.


    You can create up to 3,000 In-App Purchase items per parent application. If you
    delete an In-App Purchase item from `iTunes Connect`, that unique product ID can
    never be used again for another item. Even if you’re replacing the deleted item
    with a similar In-App Purchase item, you’ll be required to use a different product
    ID for it.


    # Preparing Your Test Device


    Unfortunately, the iOS Simulator does not support In-App Purchase. To properly
    test an In-App Purchase transaction, you’ll need to run through it on an iOS device
    using your new Test User account.


    To avoid account issues, you must log out of any existing iTunes accounts on your
    test device. To do this, simply launch the device’s `Settings` app and tap on
    `Store`. On the `Store` screen, tap the `Sign Out` button to log out of the iTunes
    Store (see [Figure 8-16](#9781430262381_Ch08.xhtml#Fig16)). I cannot stress enough
    how important this step is. Clearing out existing accounts from the device’s `Store`
    settings will prevent a nontest account from accidentally being used during your
    In-App Purchase test transactions. Just leave the `Store` setting empty. Do not
    log in here with your Test User account. Doing so may invalidate it as a test
    account.


    ![9781430262381_Fig08-16.jpg](images/9781430262381_Fig08-16.jpg)


    [Figure 8-16](#9781430262381_Ch08.xhtml#_Fig16). You must sign out of your iTunes
    account on your test device before testing In-App Purchase (left). You’ll also
    need `In-App Purchases` turned on in your test device’s `Allowed Content` settings
    (right)


    In the `Restrictions` section of your test device’s `General Settings`, make sure
    the `In-App Purchases` feature is switched on under `Allowed Content` (see [Figure
    8-16](#9781430262381_Ch08.xhtml#Fig16)).


    Now that your device is ready, simply connect it to your development computer.
    To compile and test your project on your device, make sure you select `Device`
    as the `Active SDK` in Xcode’s drop-down menu. As I mentioned earlier, you’ll
    also want to ensure that you’ve properly installed the correct provisioning profile
    in `Xcode Organizer`—the one that’s assigned to this device and the related app
    ID.


    When running an Xcode debug build of your application on your test device, the
    `Store Kit` framework communicates with a special “sandbox” test environment instead
    of the live App Store. If an In-App Purchase request is made, the `Store Kit`
    will prompt you to confirm the purchase. Then `Store Kit` will display an iTunes
    sign-in screen. Select `Existing Account`, and log in with your Test User account.
    In this special test environment, successfully completing a transaction will return
    an order receipt, but no money is transferred, and no invoice is generated.


    Never use your Test User account in a live production environment. Your test account
    should be used only when debugging your app in Xcode. Doing otherwise will invalidate
    your account credentials. The only way to ensure that you’re running the app in
    Apple’s sandbox test environment is to launch it from Xcode onto your test device.
    If you launch the app from your device’s home screen, `Store Kit` will connect
    to the live App Store and invalidate your Test User account.


    # Tapping into the Store Kit Framework


    Time to start programming! Fire up Xcode and create a new iOS project, selecting
    the `View-based Application` template for iPhone. You could just as easily apply
    the example code to an iPad or universal app, but to remain focused on the task
    at hand, let’s keep things simple. Name the example project `InAppPurchase`. If
    you would rather save time and just follow along, you can download and open the
    completed `InAppPurchase` project from the book’s companion code examples at `http://iPhoneBusinessBook.com`
    or `http://www.apress.com`.


    **Note**  The example project we’re about to build should not be viewed as a functional
    app on its own. For it to work, you’ll need to plug in your own In-App Purchase
    item product IDs and other related data in various places in the code. In outlining
    the steps needed to complete an example purchase, I’ll explain where to insert
    your custom In-App Purchase information.


    ## Configuring the Project for In-App Purchase


    Before we write any code, the required `Store Kit` framework must be added to
    the Xcode project. This is done in the same way you’ve seen in previous examples
    in the book. Ctrl-click the project’s `Frameworks` folder, select `Add ![image](images/arrow.jpg)
    Existing Frameworks…`, and choose `StoreKit.framework` from the list that appears.


    Since In-App Purchase is not supported in the iOS Simulator, select `Device` in
    the top-left `Overview` drop-down menu in Xcode’s main project window to reflect
    your connected test device.


    Next, open the `InAppPurchase-Info.plist` file and change the bundle identifier
    to the one that’s now assigned to this app in `iTunes Connect`. As an example,
    the bundle ID for our fictional Breadcrumbs app is `com.ebutterfly.breadcrumbs`
    (as shown in [Figure 8-13](#9781430262381_Ch08.xhtml#Fig13)).


    The last configuration task is to specify the Xcode project’s provisioning profile,
    so that the appropriate provisioning profile is used when Xcode runs the app on
    the connected test device. To accomplish this, select the project name at the
    top of the `Groups & Files` pane, and then click the `Info` toolbar button. In
    the window that appears, select the `Build` tab and scroll down to the `Code Signing`
    section. Under `Code Signing Identity`’s `Any iOS`, choose the provisioning profile
    that’s assigned to your app’s bundle ID (as previously discussed in the “Creating
    In-App Purchase Items” section).


    If you don’t see that provisioning profile listed, you’ll need to generate it
    in Apple’s online iOS Provisioning Portal, download it to your computer, and install
    it in `Xcode Organizer` while your test device is connected. If you’ve never created
    provisioning profiles before, read the tutorial in [Chapter 9](#9781430262381_Ch09.xhtml)
    so that you can complete this step before moving forward.


    # Setting Up the Basics'
