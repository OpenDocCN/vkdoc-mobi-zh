- fmt: 'Let’s say your app manages to sell only 10,000 units over the course of several
    months:


    - 10,000 × $0.99 = $9,900 – $2,970 (Apple’s 30%) = $6,930

    - 10,000 × $1.99 = $19,900 – $5,970 (Apple’s 30%) = $13,930


    With disappointing overall sales, a $1.99 or higher price can still provide respectable
    sales numbers, and may even recoup the product’s initial development costs. A
    99-cent price drastically reduces your profit margin by half!


    ## Sustaining a Long-Term Business


    Since you’ve purchased this book, it’s probably a safe bet that you’re looking
    to make money from your mobile app development. And you’re not just looking to
    bank on a single app, but ideally build a profitable business producing several
    iOS apps. To accomplish this, you must price your apps not only to be competitive
    with other similar apps, but also to provide enough revenue to pay for the actual
    development costs of each app and run your business. To help determine your pricing,
    you should first figure out what your business needs to earn each year to survive.


    As a fledging business, your operating overhead may appear to be very low. Like
    many independent developers, you could be working from home and doing all of the
    design, programming, marketing, accounting, and other business tasks yourself.
    This is a common formula that has worked for many iOS app developers. But when
    calculating your financial needs, don’t focus on only immediate expenses such
    as advertising, web hosting, Internet access, telephone lines, health insurance,
    food, and your mortgage/rent. It’s important to place a value on your time as
    well. You don’t want to merely “get by.” Your plan should be to profit from all
    your hard work, earning enough money to not only fund your next app project, but
    also to reward your efforts with a little luxury.


    As an example, let’s say your iOS app will cost $5,000 to develop. That assumes
    you’re doing all the UI design and programming work yourself, with a small budget
    to license graphics, music, or other services. To put food on the table and pay
    all of your bills, let’s assume your monthly overhead is $4,000. If you plan on
    producing three apps within a year, your total development budget and annual living
    expenses will be approximately $63,000. To give yourself a little breathing room
    in case of additional expenses and unexpected emergencies, let’s round up to $70,000.


    - $70,000 / $0.69 ($0.99 – Apple’s 30%) = 101,449 apps sold

    - $70,000 / $1.39 ($1.99 – Apple’s 30%) = 50,360 apps sold

    - $70,000 / $2.09 ($2.99 – Apple’s 30%) = 33,493 apps sold


    To generate $70,000 in annual revenue, your three 99-cent apps would need to sell
    101,449 copies before the year’s end! Easy enough if your three apps are best
    sellers, sitting comfortably within the App Store’s Top 100. But if they are ranked
    outside the Top 100, then charging only 99 cents per app may not get you anywhere
    close to your annual $70,000 revenue goal. And if you’re coming from the world
    of desktop software development and consulting, you’re probably used to making
    quite a bit more than that per year.


    Just do the math. You’ll quickly see how selling apps for only 99 cents requires
    them to be best sellers with no margin for failure.


    What if you manage a small in-house team of designers and programmers, or outsource
    development to a third-party company? Then the development costs for your app
    project will mostly likely exceed $10,000 or $20,000. I’m being conservative here,
    as some apps and games can cost more than $100,000 to develop. It just depends
    on the project’s complexity and the overhead of your staff and related expenses.


    Looking to support your business with an annual revenue stream of at least $300,000?


    - $300,000 / $0.69 ($0.99 – Apple’s 30%) = 434,783 apps sold

    - $300,000 / $1.39 ($1.99 – Apple’s 30%) = 215,827 apps sold

    - $300,000 / $2.09 ($2.99 – Apple’s 30%) = 143,541 apps sold


    That’s a lot of apps you’ll need to sell per year at only 99 cents each! You’ll
    either need a bona fide hit or to work much harder to release a larger collection
    of apps that can be generating revenue. Just remember that the more apps you produce,
    the more money you spend on development, which in turn raises your overhead.


    Just because you’ve read about hit games like Angry Birds and Cut the Rope selling
    millions of copies, don’t assume that selling 500,000 apps is an easy goal to
    achieve. Sure, it would be great, and we all hope to hit the jackpot with a best-selling
    app. But when calculating your development budget and app pricing, keep in mind
    that most apps sell only a few thousand copies during their lifetime in the App
    Store. You’ll need to work very hard as it is to ensure your app is more successful
    than the rest of the pack, so don’t make your job any more difficult by pricing
    your app too low.


    ## Perceived Value and Consumer Resistance


    Are you starting to understand the great risk involved with the 99-cent price
    point? Your revenue earnings are not the only potential victim if your app does
    not sell well. There also seems to be a direct correlation between price and ratings,
    but not in the direction you would expect. The lower your price, the lower your
    customer ratings may sink.


    It’s true that if your app is priced too high, consumers will lash out with negative
    ratings in the App Store. So, the cheaper your app is, then the better the reviews,
    right? Not necessarily. A lower price brings a broader audience of customers,
    many of whom acquired it as an impulse buy. After paying just 99 cents, you wouldn’t
    think anyone would complain, but complain they do. Quite a few users out there
    have unreasonably high expectations for what they will get for 99 cents. Many
    of them have been spoiled by the wealth of great 99-cent games. The popular strategy
    of dropping app prices to only 99 cents in an attempt to boost volume sales and
    rank higher on the App Store charts seems to have cultivated a distorted perception
    of app worth among consumers.


    In 2009, Hog Bay Software’s Jesse Grosjean decided to experiment with the pricing
    of his acclaimed WriteRoom app, dropping from the regular $4.99 price down to
    free (for a weekend) and then 99 cents. The test was to see whether the limited
    free offer and then the later subtle increase to 99 cents would spur enough of
    a boost in overall sales volume to make up for the decreased profit per sale.
    Although sales did increase, they eventually tapered off again—proof that for
    the longevity of this niche productivity app, the higher price ultimately generated
    more revenue in the long haul.


    Jesse Grosjean had planned to end up at a lower price point such as $1.99 or $2.99,
    but during the sales experiment, he watched WriteRoom’s App Store star ratings
    “go from mostly fours and fives to evenly distributed between five and one star.”
    Even though the cheaper pricing did increase the number of new users, it also
    yielded a perception that users were overall less satisfied. The experiment revealed
    a lot about App Store behavior. After the sale ended, Jesse opted to return to
    his original $4.99 price tag.


    At a higher price, you may attract fewer customers, but they buy your app because
    they genuinely want it. Then they have a vested interest in the app’s survival
    and success, so their posted App Store ratings tend to reflect a more positive
    tone. A higher price can also give your app a greater perceived value. Psychologically,
    many people relate price to quality, believing that you get what you pay for.'
