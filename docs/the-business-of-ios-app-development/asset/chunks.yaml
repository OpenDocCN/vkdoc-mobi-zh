- fmt: 'Unlike many hit-driven games, productivity apps typically enjoy a much longer
    life cycle, since they satisfy a distinct need. If there’s a significant demand
    for your app’s unique features, early adopters won’t hesitate to pay regular price.
    By offering a discount on day one, you would be selling them the app for less
    money than they were prepared to spend (which is great for consumers but bad for
    your bottom line). Since most niche apps don’t rank high in the overall App Store
    charts anyway, an introductory sale price will only reduce the amount of revenue
    you could have made selling the same number of downloads at regular price.


    When the initial popularity of your app starts to decline and the weekly revenue
    begins to slide into the “long tail” of the product’s life (as discussed in [Chapter
    8](#9781430262381_Ch08.xhtml)), that’s a perfect time to hold a sales event. The
    reduced price will help lure new customers and rejuvenate interest in the app.
    If you find that the discount is sustaining an acceptable level of sales, you
    can always decide to permanently stick with that price point for the remainder
    of its time in the App Store.


    A well-received sale offer on one app can also positively affect the rest of your
    product line in the App Store. Customers who enjoy their new purchase will be
    curious about your other offerings. If you’re effectively cross-promoting your
    products within each app, then a spike in downloads for the discounted app will
    also drive more traffic to your other apps, which often results in more purchases.


    ## Can Advertising Sell Apps?


    This is one of the most commonly asked questions by iOS developers. The answer
    is somewhat less definitive than you might expect. Advertising your app can result
    in enough sales to justify the expense if you choose the right medium and market,
    but that’s easier said than done.


    Unless you’re using Apple’s `iAd for Developers` program or a pay-per-install
    incentive solution like `Tapjoy`, it’s extremely difficult to accurately track
    the conversion rate of your advertising campaign. Web and mobile ad networks track
    the click-throughs to the App Store, and Apple tracks sales of your app, but how
    do you tie the two reports together to pinpoint just how many of those ad clicks
    turned into actual app sales? One way to accomplish this is by using an `iTunes
    Affiliate Program` URL for your advertisement link. Beyond the benefit of earning
    a 5 percent commission on all sales derived from iTunes affiliate links (as discussed
    in [Chapter 6](#9781430262381_Ch06.xhtml)), it’s also a great way to track which
    ad click-throughs result in app sales. And if you’re already using similar affiliate
    links on your web site, `LinkShare` allows you to assign a unique signature ID
    to the iTunes affiliate link you employ for your advertisement, so that click-throughs
    and sales from your ad can be easily identified in your `LinkShare` reports.


    ### Advertising to a Mobile Audience


    If you’re going to experiment with advertising, try your hand at mobile ads first,
    since they are the most targeted. As I’ve said many times, more than 90 percent
    of iPhone users download apps directly from the mobile device’s App Store. This
    is your target audience, so what better way to reach them than advertising within
    another iOS app or on a mobile web site?


    If you’ve already implemented in-app advertising in your own app with `AdMob`
    (as mentioned in [Chapter 7](#9781430262381_Ch07.xhtml)), then you’ll be able
    to benefit from its `Download Exchange` program. This program enables you to advertise
    your apps across other apps in their network by giving up some of your app’s ad
    inventory. Optime Software’s Jon Schlegel found it to be a very cost-effective
    way to test some initial advertising. “We typically use the `AdMob Download Exchange`
    to promote new app releases,” said Jon. “The extra download volume that comes
    from the `Download Exchange` can sometimes be enough to push an app into a more
    favorable position in the App Store rankings.”


    Of course, if your app doesn’t feature in-app advertising, you’ll need to pay
    for the ad campaign. Since you’re paying per click, include the price and a short
    descriptor to prevent the curious from tapping the ad just to find out the price
    or what the app does. With advertising typically being fairly expensive, if your
    app is priced at only 99 cents, then you’ll need to be very careful not to spend
    more than you could possibly make in new sales.


    While your ad campaign is actively running, pay close attention to your daily
    sales reports in `iTunes Connect` to see whether you can recognize sales spikes
    that may have been caused by the ad. If your advertisement is using an `iTunes
    Affiliate Program` link, it’s much easier to track the sales performance of your
    ad through your `LinkShare` reports. If you don’t see any significant sales impact,
    you might want to modify your ad campaign to see whether the results improve.


    Don’t be afraid to continuously tweak your ad text until you find a message that
    proves effective. It’s important to give your campaign a solid amount of time
    before discontinuing it. Successful advertising is all about frequency and volume.
    Advertising for only a couple days is not enough time to properly evaluate its
    effectiveness. Repetition is the name of the game. People may need to see an ad
    a few times before they are motivated to tap it, especially if they are immersed
    in the current app and have not been paying much attention to the embedded in-app
    ads.


    Average click-throughs typically hover around 2 percent of ad views, and even
    then there’s no guarantee those App Store visitors will purchase the app. Your
    ad campaign needs to be viewed by millions of iOS users for it to generate enough
    traffic to your App Store page. And what if that massive traffic volume still
    doesn’t result in sales?


    Many developers have found that advertising a freemium app or free lite version
    produces a much higher conversion rate than a paid app, since there’s no risk
    for the consumer to download a free app. Then the freemium app or free lite version
    can help close the deal, acting as a much better sales tool to up-sell In-App
    Purchase items or a paid app. Focused Apps’ Mark Johnson revealed, “We’ve launched
    a free app into the Top 100 charts on as little as $1,000 in mobile advertising
    and had it rise to the Top 10 in many countries. That''s much harder to do with
    a paid app.”


    If you venture into web advertising, buying keywords and ads on search engines
    and popular portal sites is often too costly for low-priced mobile apps, not to
    mention that some of the people clicking your ad may not even own an iOS device.
    Your best bet is to focus your web advertising efforts on niche sites that specifically
    target your app’s audience. For example, if it’s a game, advertise on a popular
    iOS gaming site, such as `TouchArcade` (`http://toucharcade.com`).


    Print advertising is difficult to justify for most mobile apps. Not only is it
    expensive, but it’s unable to deliver instant access to your App Store page as
    a clickable online ad does. Your URL is listed in print, which requires interested
    readers to manually type the URL into their web browser the next time they are
    sitting at their computer or using their mobile device. By that point, they may
    have forgotten about your ad. If you’re an independent developer on a shoestring
    budget, then print advertising may be out of your league—stick with web and mobile
    ads.


    If you work for a big company with a large advertising budget, then print advertising
    can be very effective in reinforcing your brand identity.'
