- fmt: '# 知识产权与合同管理


    如果您未能在“销售禁止”条款规定的时间内提交非临时专利申请，您将失去主张“专利待决”状态的权利。但到那时，您应该已经清楚您的应用程序是否有前景，并决定是否值得花钱继续寻求专利保护。


    您可以通过美国专利商标局网站在线提交临时专利申请，网址为 `https://efs.uspto.gov/efile/portal/efs-unregistered`。


    美国专利商标局在其网站上提供了一些关于临时专利申请的说明和信息。此外，Nolo Press 等法律出版商也提供了一些资源。例如，Richard Stim 和
    David Pressman 合著的 *Patent Pending in 24 Hours*（Nolo, 2009）可以指导您完成整个流程。


    如果您打算后续提交非临时专利申请，您可能还想咨询将为您提交完整申请的专利律师。律师提交临时申请的费用远低于完整申请。此外，如果他们是基于您自己起草的临时申请来撰写非临时申请，其受到的约束可能会比后者更少。


    ## 在承包商与员工协议中处理知识产权问题


    如果您正在雇佣承包商或员工来帮助您创建应用程序，务必与他们签订协议，以明确他们为应用程序贡献的知识产权的所有权。一种常见的误解是，雇佣承包商或员工的人自动拥有其创建作品的权利。实际上，如果您雇佣承包商来编写应用程序代码或设计用户界面，除非您有一份书面协议表明您拥有该工作成果，否则您很可能无法完全拥有您期望的对交付成果的所有权利。


    ### 雇佣承包商


    起草一份能够保护您公司的独立承包商协议，不仅仅涉及必要的知识产权转让条款。您可能需要与律师合作，制定一份能够涵盖公司可能遇到的各种问题的标准合同。您可能希望加入针对交付成果的验收条款，以确保您能得到符合预期的成果。或者，您可能想加入延迟交付的违约金条款，以激励承包商按时交付工作成果。如果您的承包商位于知识产权保护不力的海外国家，您可能需要在保密性方面加入额外的保护条款。不过，本节的重点是确保您从独立承包商协议中获得您所期望的知识产权。


    在独立承包的背景下，除非存在一份将知识产权转让给客户的书面协议，否则客户并不拥有承包商所创建工作成果的知识产权。这与许多雇佣承包商的人的预期相反。


    您可能听说过“雇佣作品”原则。该原则并不意味着您雇佣某人做工作，您就拥有该工作成果。事实上，如果您在没有书面知识产权转让协议的情况下雇佣承包商，您很可能只获得有限的使用该工作成果的许可。这会产生若干问题。首先，由于您对工作成果的许可是非书面的，很难确定哪些行为是允许的，哪些是不允许的。例如，在这种非书面许可下，您是否有权雇佣其他承包商修改该作品，或者是否有权将其再许可给其他公司，这些都可能不明确。


    如果您有幸遇到有人试图收购您的公司或应用程序的权利，缺乏书面的许可协议或知识产权转让可能会危及这笔交易。我曾见过一个首次公开募股以及多起并购交易因此差点告吹。在每种情况下，未能与承包商达成协议的公司都需要找到该承包商，并协商购买缺失的权利。这种谈判并不容易，因为处于清算事件前夕的公司几乎没有议价能力，特别是当承包商知道即将发生的收购时。指望事后补签协议也假设您能够找到该承包商。多年后，承包商的可能已不存在，或者承包商可能搬到了安第斯山脉的偏远地区。如果您找不到承包商，无论您有多少钱试图购买这些权利，都无法实现。


    如果说您从本章中需要记住一件事，那就是：与您雇佣来创建任何将整合到应用程序中的内容的人，签订一份独立承包商协议。这包括编码人员、美术师、用户界面设计师等等——所有人。


    我建议您与律师合作，创建一份符合您公司特定需求的独立承包商协议。但为了您的参考，我在 `http://www.bitwiselegal.com/iPhone`
    上发布了一个示例独立承包商协议。它应该能让您大致了解，作为雇佣公司，您希望在协议中看到哪些类型的条款。


    ### 雇佣员工


    雇佣员工会为您的业务带来一系列复杂性。然而，从知识产权的角度看，这比雇佣承包商要简单。与承包商不同，雇佣员工时，您确实会获得他们创建的工作成果的部分所有权。但与承包商一样，您也无法获得您可能期望的所有权利。


    特别是专利权，并不会自动随着雇佣关系而转让。如果没有书面转让协议，雇主仅获得所谓的“工场权”，这意味着雇主可以在其业务中使用该发明，但并不拥有该发明的底层知识产权。


    与处理独立承包商关系时一样，您需要有一份书面的雇佣协议，将知识产权转让给您作为雇主。您应该让所有员工签署这份协议。


    **注意**：知识产权转让同样适用于创始人。通常，当朋友们一起成立公司时，他们共同开发公司产品，却没有与公司签署雇佣（或承包商）协议。如果出现分歧，创始人分道扬镳，公司可能会失去对其技术的完整权利。未签署转让协议的创始人日后可能会起诉公司侵权，或者利用他们创建的作品来创建与原公司竞争的实体。


    ## 知识产权的引入许可


    所有开发者都讨厌重新造轮子，尤其是当其他程序员已经完美解决了某个问题的时候。有时候，从他人处获取代码在时间和成本上更为高效。第三方代码可能比您从头编写的代码经过更充分的测试且更稳定。它可能拥有您没有时间自己构建的有用功能。问题在于，这些代码不属于您。由于您不是自己构建它，也没有雇佣员工或承包商为您构建，您需要从创建它的个人或公司处获得使用该代码的权利。本节主要讨论如何获取使用他人拥有的内容和技术的必要权利。


    ### 记录您的引入许可'
  raw: 'If you don’t file a nonprovisional patent application within the time allotted
    by the on sale bar, you will lose the ability to claim patent-pending status,  but
    by then, you should know whether your app has a future and decide whether it is
    worth spending the money to continue pursuing a patent.


    You can file provisional patent applications online through the US Patent and
    Trademark Office web site at `https://efs.uspto.gov/efile/portal/efs-unregistered`.


    The Patent and Trademark Office has some instructions and information regarding
    provisional patent application on its web site. Additionally, there are some resources
    available from legal publishers like Nolo Press. For example, *Patent Pending
    in 24 Hours* by Richard Stim and David Pressman (Nolo, 2009) can walk you through
    the process.


    If you think you are going to follow up with a nonprovisional patent application,
    you might also want to consult with the attorney who will be filing your full
    application. Attorneys can file your provisional application for much less than
    a full application would cost. Also, they might be less restricted when filing
    the nonprovisional application than they would be if they needed to work from
    a provisional application that you drafted yourself.


    Addressing Intellectual Property in Contractor and Employee Agreements


    If you are hiring contractors or employees to help you create your app, it is
    imperative that you get an agreement in place with them to govern ownership of
    the intellectual property that they contribute to your app. It is a common misconception
    that the person hiring a contractor or employee automatically owns the rights
    to the work he or she creates. In reality, if you hire a contractor to create
    the code for your app or design your UI, unless you have a written agreement indicating
    that you own the work product, it is unlikely that you will have all the rights
    you would like in the work delivered.


    Hiring Contractors


    Drafting an independent contractor agreement that protects your company involves
    more than just having the requisite intellectual property assignment provisions.
    You may want to work with an attorney to get a form in place that will cover your
    company in the event of a variety of problems that can arise. You may want to
    include acceptance provisions for deliverables so that you know you will get what
    you expect. Or you might want to add liquidated damages for late delivery to motivate
    your contractor to deliver work product in a timely fashion. If your contractors
    are overseas in countries where intellectual property protection is not particularly
    strong, you may want to include additional protective provisions around confidentiality.
    This section, however, is focused on making sure you get the intellectual property
    rights that you expect from your independent contractor agreement.


    In the independent contractor context, the customer does not own the intellectual
    property rights in the work product created by the contractor, unless there is
    a written agreement that assigns those rights to the customer. This is contrary
    to what many people hiring contractors expect.


    You may have heard of the “work-for-hire” doctrine. The work-for-hire doctrine
    does not mean that if you hire someone to do work for you, you own the work product.
    In fact, if you hire a contractor without a written agreement assigning the intellectual
    property rights, you will most likely have only a limited license to use the work
    product. This is problematic for a number of reasons. First, since your license
    to the work product is not in writing, it can be difficult to determine what is
    permitted and not permitted. For instance, under this unwritten license, it may
    be unclear whether you have the right to hire other contractors to modify the
    work or whether you have the right to sublicense it to other companies.


    If you are fortunate enough to have someone try to buy your company or the rights
    to your app, the lack of written license agreement or assignment of intellectual
    property could jeopardize the deal. I have seen an initial public offering (IPO)
    and more than one acquisition almost go south for this reason. In each case, the
    company that didn’t get the agreement in place with its contractor needed to find
    the contractor and negotiate a deal to buy the missing rights. This negotiation
    is not an easy one, because the company on the eve of a liquidation event has
    very little leverage, particularly if the contractor knows of the pending acquisition.
    Hoping to get an agreement in place retroactively also assumes that you will be
    able to find the contractor. Years from now, the contractor’s company may not
    exist, or the contractor may have moved to a remote part of the Andes. If you
    can’t find the contractor, no matter how much money you have to try to buy the
    rights, they won’t be available.


    If there is one thing that you take away from this chapter, it should be to get
    an independent contractor agreement in place with anyone who you hire to create
    anything that will be incorporated into your app. This includes coders, artists,
    UI designers, and so on—everyone.


    I recommend that you work with an attorney to create an independent contractor
    agreement that is customized for the needs of your company, but for your reference,
    I have posted an example independent contractor agreement at `http://www.bitwiselegal.com/iPhone`.
    It should give you an idea of the type of provisions that you, as the hiring company,
    would want to see in an agreement to hire a contractor.


    Hiring Employees


    Hiring employees has its own set of complications for your business. From an intellectual
    property perspective, however, it is simpler than with independent contractors.
    Unlike with contractors, when you hire employees, you do get some ownership rights
    in the work product that they create. As with contractors, however, you don’t
    get all the rights that you might expect.


    Patent rights in particular are not assigned automatically as part of an employer/employee
    relationship. Without a written assignment, the employer gets what are referred
    to as *shop rights*, which means that the employer can use the invention in its
    business but does not own the underlying intellectual property in the invention.


    As when working with independent contractors, you will want to have a written
    employment agreement assigning intellectual property rights to you as the employer.
    You should have all employees sign this agreement.


    **Caution**  Intellectual property assignments apply to founders, too. Often,
    when friends come together to form a company, they jointly develop the company’s
    products without signing employment (or contractor) agreements with the company.
    If there is a falling out and the founders part ways, the company could be left
    without full rights in its technology. Founders who didn’t sign an assignment
    agreement could later try to sue the company for infringement or use the work
    that they made to create a competitor to the original company.


    Inbound Licensing of Intellectual Property


    So, every developer hates to need to re-create something that another coder has
    already nailed. Sometimes it is more time- and cost-efficient to get code from
    other people. The third-party code might be better tested and more stable than
    something you could write from scratch. It might have useful features that you
    don’t have time to build into your own code. The problem is that it isn’t yours.
    Since you didn’t build it yourself or hire an employee or contractor to build
    it for you, you need to obtain the right to use the code from the person or people
    who made it. This section addresses how to acquire the rights you need to use
    content and technology that are owned by other people.


    Document Your Inbound Licenses'
