  trans: '

    # 开发阶段的初步测试


    `Vimov` 公司巧妙的 iSimulate iPhone 应用及 SDK，能够通过无线方式，将同一 Wi-Fi 网络下 iPhone 或 iPod touch
    上的 GPS 位置、多点触控、加速度计和指南针事件发送到 iOS 模拟器。这可以大大减少测试所花费的时间，因为在 iOS 模拟器中运行应用远比在测试设备上安装应用要快得多。请在
    `http://www.vimov.com/isimulate/` 了解更多关于 iSimulate 的信息。


    即使你未使用那些需要在真实移动设备上运行的特定功能，也强烈建议你在多台 iOS 设备上测试和调试你的应用，以确保在提交至 App Store 之前，一切功能都能按预期运行。为此，你需要设置一个开发者证书和配置文件来授权你的设备。


    在真实的移动硬件上彻底测试你的项目，是应用能否取得成功的关键因素。然而，许多开发者因为苹果的配置过程看似复杂而回避这项任务。在热门开发者论坛上快速搜索一下，你就会发现无数（甚至成百上千）来自受挫程序员的帖子，他们无法让这个过程正确运行。


    如果你从未做过这件事，设置测试设备可能会相当令人望而生畏。以下是一份分步指南，旨在帮助你理清整个过程。


    ## 步骤 1：在 Xcode Organizer 中建立测试设备


    首先，你需要在 Xcode Organizer 中指定一部 iPhone、iPad 或 iPod touch 作为测试设备。使用设备附带的 30 针 USB
    数据线将其连接到你的 Mac。此操作通常会启动 iTunes。如果 iTunes 偏好设置配置为在连接时自动同步设备，那么只需等待同步完成即可。同步完成后，打开
    Xcode 并选择 `Window` ![image](img/arrow.jpg) `Devices`。


    当 Xcode 设备窗口出现时，你应该会在左侧面板中看到已连接的设备。选择该设备，在主面板中，你应该会看到与设备相关的信息（参见图 9-8）。如果设备上出现“信任”对话框，请选择“信任”以授予
    Xcode 访问你的设备的权限。为了验证请求，如果你之前没有登录过，系统可能会要求你提供 iOS Dev Center 的登录名和密码。


    ![9781430262381_Fig09-08.jpg](img/9781430262381_Fig09-08.jpg)


    图 9-8. Xcode 设备中的设备相关信息


    将你的主用 iPhone 作为开发设备是完全可以的。即使点击了“用于开发”按钮，该设备仍会像普通 iPhone 一样运行。只需记住，在 iTunes 中同步时，始终要备份设备数据。这样，如果在测试过程中出现任何问题，你总是可以借助最后一次保存的备份，在
    iTunes 中恢复设备的操作系统、应用程序和设置。


    完成此步骤后，请不要退出 Xcode 设备，因为稍后在配置过程中我们还会再次用到它。这里需要的一个基本信息是 40 位字符的设备标识符，它列在设备信息中。这被称为唯一设备标识符
    (UDID)。


    ## 步骤 2：获取你的开发证书


    接下来，你需要请求一个证书。启动钥匙串访问应用程序，它位于你的 Mac 上的 `/Applications/Utilities/Keychain Access`。


    在钥匙串访问实用工具中，通过选择 `Keychain Access` ![image](img/arrow.jpg) `Preferences...` 来打开偏好设置窗口，并选择“证书”标签页。在关闭偏好设置窗口之前，请确保“在线证书状态协议
    (OCSP)”和“证书撤销列表 (CRL)”都设置为“关闭”。


    现在，从菜单中选择 `Keychain Access` ![image](img/arrow.jpg) `Certificate Assistant` ![image](img/arrow.jpg)
    `Request a Certificate from a Certificate Authority`。在出现的证书助理窗口中，输入你的 iOS 开发者计划电子邮件地址和你的证书名称（参见图
    9-9）。在这个例子中，我简单地使用了我的全名，但我也可以轻松地使用更具描述性的标签，比如 Dave Dev Key。“请求是”选项应设置为“存储到磁盘”。点击“继续”按钮，钥匙串访问将生成你的证书请求文件并保存到你的硬盘上。如果你选择桌面作为保存位置，你应该会在那里看到一个名为
    `CertificateSigningRequest.certSigningRequest` 的新文件。


    ![9781430262381_Fig09-09.jpg](img/9781430262381_Fig09-09.jpg)


    图 9-9. 在你的 Mac 上从钥匙串访问应用程序生成证书签名请求文件


    打开你的网页浏览器并登录 iOS Dev Center，网址是 `http://developer.apple.com/devcenter/ios/`。然后，通过单击右侧列中相应的链接，导航到“证书、标识符和描述文件”页面。


    在“证书、标识符和描述文件”页面上，选择“证书”部分下的“开发”。然后点击 `+` 按钮，并按照说明将你的 `CertificateSigningRequest.certSigningRequest`
    文件上传到在线系统。一旦你的团队管理员（在大多数个人情况下就是你）批准了证书请求，你的新开发证书就可以从这个“证书”部分下载了（参见图 9-10）。


    ![9781430262381_Fig09-10.jpg](img/9781430262381_Fig09-10.jpg)


    图 9-10. 将你的开发证书下载到 Mac 桌面


    ### 验证苹果的 WWDR 证书是否已安装


    当你最初在线注册 iOS 开发者计划时，你可能已经完成的首要步骤之一就是下载并安装苹果的全球开发者关系 (WWDR) 证书。如果你的 Mac 钥匙串中还没有苹果的
    WWDR 证书，你需要在安装你的开发证书*之前*处理好这个问题。


    `Xcode` 会自动安装 WWDR 证书。但是，如果需要重新安装此证书，请点击 iOS 证书页面上的加号 (+)，然后滚动到“中间证书”部分。点击“全球开发者关系证书颁发机构”链接以下载
    WWDR 证书文件。


    将 `developer_identity.cer` 文件下载到你的 Mac 桌面。双击下载的那个 `.cer` 文件，这将启动钥匙串访问应用程序（如果它尚未打开）。钥匙串访问将显示一个对话框，询问你是否要将此证书添加到钥匙串中。确保对话框的钥匙串菜单设置为“登录”，然后点击“添加”按钮。


    在钥匙串访问主窗口的“密钥”类别中，验证你的私钥和公钥现在是否与你的开发证书配对在一起，以确保它在你的 Mac 上已正确配置。在这个例子中，我的 Dave
    Wooldridge 密钥（这是在生成同名的证书签名请求时创建的）现在与我导入的开发证书配对在一起（参见图 9-11）。


    ![9781430262381_Fig09-11.jpg](img/9781430262381_Fig09-11.jpg)


    图 9-11. 验证你导入的开发证书是否已与钥匙串访问中的开发者密钥配对


    开发者证书安装完成后，你现在可以退出钥匙串访问应用程序，并返回网页浏览器中的“证书、标识符和描述文件”页面。


    ## 步骤 3：注册你的设备 ID

    '
- fmt: '在`Certificates, Identifiers & Profiles`页面中，选择左侧`Devices`部分下的`All`。点击`+`按钮添加设备。此网页表单用于输入测试设备的名称和ID。设备名称可以任意指定，但应足够描述性，以便与计划添加的其他设备名称区分开来。参考在`Xcode
    Devices`中选择的设备，复制40字符的设备标识符，并将其粘贴到`Device ID`字段中（参见[图9-12](#9781430262381_Ch09.xhtml#Fig12)）。


    对于标准iOS开发者计划成员，Apple允许您分配最多100台设备用于开发和测试。100台起初看起来很多，但随着您为多个应用收集测试人员，这个数字最终会显得有限，因此请明智地使用这些名额。


    ![9781430262381_Fig09-12.jpg](images/9781430262381_Fig09-12.jpg)


    [图9-12](#9781430262381_Ch09.xhtml#_Fig12). 设备ID应为测试设备在`Xcode Devices`中列出的40字符设备标识符


    **步骤4：创建应用ID**


    在注册测试设备ID后，导航到`Certificates, Identifiers & Profiles`页面的`App IDs`部分。点击`+`按钮添加App
    ID。在出现的网页表单中，在`App ID Description`字段中输入名称（参见[图9-13](#9781430262381_Ch09.xhtml#Fig13)）。此名称可任意指定。它是`Certificates,
    Identifiers & Profiles`页面中App ID列表的名称，因此请使用独特的描述，使其与您创建的其他App ID区分开来。


    ![9781430262381_Fig09-13.jpg](images/9781430262381_Fig09-13.jpg)


    [图9-13](#9781430262381_Ch09.xhtml#_Fig13). 使用特定于应用的包标识符创建显式App ID


    `Bundle Seed ID`（`App ID Prefix`）值由Apple动态生成，但您应将`Bundle Identifier`（`App ID Suffix`）值设置为与Xcode项目`Info.plist`文件中列出的值相同。例如，在我们虚构的`Breadcrumbs`应用中，包标识符是反向域名`com.ebutterfly.breadcrumbs2`（参见[图9-13](#9781430262381_Ch09.xhtml#Fig13)）。


    提交新的App ID后，您应该会看到它显示在您的App ID列表中（参见[图9-14](#9781430262381_Ch09.xhtml#Fig14)）。点击名称以显示关于该App
    ID的更多信息。请注意，您的显式App ID可以配置用于测试`In-App Purchase`和`Game Center`。这是因为它包含一个特定于应用的包标识符，而您的应用需要此标识符才能与这些Apple服务正常通信。


    ![9781430262381_Fig09-14.jpg](images/9781430262381_Fig09-14.jpg)


    [图9-14](#9781430262381_Ch09.xhtml#_Fig14). 显式App ID可配置用于测试`In-App Purchase`和`Game
    Center`


    从Apple便捷的`Development Provisioning Assistant`向导和`Xcode`的`Automatic Device Provisioning`生成的配置文件，由于使用了通配符App
    ID，因此在设备上测试应用时非常方便。不是分配特定于应用的包标识符，而是使用星号（`*`）作为通配符占位符。这样一来，相关的配置文件可以用于测试设备上的任何应用，无论其包标识符是什么。


    正如您从`TestApp`的禁用选项中注意到的，通配符App ID的主要限制是它们不能用于测试特定于应用的功能，例如`In-App Purchase`和`Game
    Center`。


    这就是我们执行额外步骤来创建显式App ID和配置文件的原因，以便在您的设备上测试任何iOS功能。


    **步骤5：生成并安装您的配置文件**


    现在我们终于准备好生成配置文件了。这是所有步骤汇聚的地方。


    从`Certificates, Identifiers & Profiles`页面的左列选择`Development`。点击`+`按钮添加新配置文件。在加载的网页表单上，选择配置文件类型（`iOS
    App Development`）并点击`Continue`。在下一页上，选择要为其创建配置文件的App ID。在接下来的两页上，选择要包含在配置文件中的证书和设备。然后，在`Profile
    Name`字段中输入名称来为您的配置文件命名。然后点击`Generate`按钮。您的配置文件将被生成并显示出来（参见[图9-15](#9781430262381_Ch09.xhtml#Fig15)）。


    ![9781430262381_Fig09-15.jpg](images/9781430262381_Fig09-15.jpg)


    [图9-15](#9781430262381_Ch09.xhtml#_Fig15). 使用在线`Development Provisioning Assistant`生成您的配置文件


    生成配置文件后，您可以从配置文件列表中下载它（参见[图9-16](#9781430262381_Ch09.xhtml#Fig16)）。点击`Download`按钮将`.mobileprovision`文件下载到您的Mac下载文件夹。


    ![9781430262381_Fig09-16.jpg](images/9781430262381_Fig09-16.jpg)


    [图9-16](#9781430262381_Ch09.xhtml#_Fig16). 将您的新配置文件下载到您的Mac


    在测试设备仍然连接到Mac的情况下，将`.mobileprovision`文件从下载文件夹拖到Dock中的Xcode图标上。Xcode会自动将该配置文件安装到正确的位置。如果导入正确，您现在可以通过点击`Xcode`中的`View
    Details`按钮 ![image](images/arrow.jpg) `Preferences` ![image](images/arrow.jpg)
    `Accounts` ![image](images/arrow.jpg) 来查看您的配置文件（参见[图9-17](#9781430262381_Ch09.xhtml#Fig17)）。


    ![9781430262381_Fig09-17.jpg](images/9781430262381_Fig09-17.jpg)


    [图9-17](#9781430262381_Ch09.xhtml#_Fig17). 如果您的配置文件安装成功，您应该会在`Xcode Preferences`中看到它列出


    **步骤6：在测试设备上运行您的Xcode项目**


    现在您已拥有正确的配置文件和证书，终于可以在连接的设备上开始测试您的应用了。在运行项目之前，您需要修改构建设置以指定新的配置文件。在左侧窗格中选择`Target`应用，并在顶部中央窗格的菜单中选择`Build
    Settings`。在出现的`Target Info`窗口中，选择`Build`选项卡，并向下滚动到`Code Signing`部分。从弹出菜单中选择您想要的开发配置文件（参见[图9-18](#9781430262381_Ch09.xhtml#Fig18)）。


    ![9781430262381_Fig09-18.jpg](images/9781430262381_Fig09-18.jpg)


    [图9-18](#9781430262381_Ch09.xhtml#_Fig18). 为您的Xcode项目分配一个特定的配置文件以用于设备测试


    作为最后一项任务，切换到中央窗格中`General`选项卡的`Identity`部分，并在`Bundle Identifier`字段中确认您应用ID的包标识符。例如，在[图9-19](#9781430262381_Ch09.xhtml#Fig19)中，我们虚构的`Breadcrumbs`应用的应用ID包标识符是`com.ebutterfly.breadcrumbs2`，它也在Xcode项目的`Info.plist`文件中列出。


    ![9781430262381_Fig09-19.jpg](images/9781430262381_Fig09-19.jpg)


    [图9-19](#9781430262381_Ch09.xhtml#_Fig19). 在`Identifier`字段中确认您应用ID的包ID


    当您点击`Build and Run`按钮时，Xcode将编译该应用并通过USB将其发送到测试设备，在那里它将安装并运行。第一次尝试此操作时，系统会弹出一个代码签名对话框，请求使用您的开发者密钥（参见[图9-20](#9781430262381_Ch09.xhtml#Fig20)）。点击`Always
    Allow`按钮继续。


    ![9781430262381_Fig09-20.jpg](images/9781430262381_Fig09-20.jpg)'
  raw: 'In the Certificates, Identifiers & Profiles page, select All under the Devices
    section in the left column. Click the + button to add a device. This web form
    is where you enter the name and ID of your test device. The device name can be
    any name you want, but make it descriptive enough to differentiate it from other
    device names you plan to add. Referring to your selected device in Xcode Devices,
    copy the 40-character device identifier, and paste it into the Device ID field
    (see [Figure 9-12](#9781430262381_Ch09.xhtml#Fig12)).


    For standard iOS Developer Program members, Apple allows you to assign up to 100
    devices for development and testing purposes. A hundred may seem like a lot at
    first glance, but as you gather beta testers for multiple apps, that number will
    eventually seem rather limiting, so use these slots wisely.


    ![9781430262381_Fig09-12.jpg](images/9781430262381_Fig09-12.jpg)


    [Figure 9-12](#9781430262381_Ch09.xhtml#_Fig12). The device ID should be your
    test device’s 40-character device identifier listed in Xcode Devices


    Step 4: Create an App ID


    With your test device’s ID registered, navigate to the App IDs section of the
    Certificates, Identifiers & Profiles page. Click the + button to add an App ID.
    On the web form that appears, enter a name in the App ID Description field (see
    [Figure 9-13](#9781430262381_Ch09.xhtml#Fig13)). This can be any name you want.
    It is the name of the app ID listing in the Certificates, Identifiers & Profiles
    page, so use a unique description that makes it distinguishable from other app
    IDs you create.


    ![9781430262381_Fig09-13.jpg](images/9781430262381_Fig09-13.jpg)


    [Figure 9-13](#9781430262381_Ch09.xhtml#_Fig13). Create an explicit app ID with
    an app-specific bundle identifier


    The Bundle Seed ID (App ID Prefix) value is dynamically generated by Apple, but
    you should set the Bundle Identifier (App ID Suffix) value to be the same as the
    one listed in your Xcode project’s Info.plist file. For example, in our fictional
    Breadcrumbs app, the bundle identifier is the reverse-domain name com.ebutterfly.breadcrumbs2
    (see [Figure 9-13](#9781430262381_Ch09.xhtml#Fig13)).


    After submitting your new app ID, you should see it displayed in your list of
    app IDs (see [Figure 9-14](#9781430262381_Ch09.xhtml#Fig14)). Click the Name to
    reveal additional information about the App ID. Notice that your explicit app
    ID can be configured for testing In-App Purchase and Game Center. That’s because
    it contains an app-specific bundle identifier, which is required for your app
    to properly communicate with those Apple services.


    ![9781430262381_Fig09-14.jpg](images/9781430262381_Fig09-14.jpg)


    [Figure 9-14](#9781430262381_Ch09.xhtml#_Fig14). An explicit app ID can be configured
    for testing In-App Purchase and Game Center


    The provisioning profiles generated from Apple’s handy Development Provisioning
    Assistant wizard and Xcode’s Automatic Device Provisioning are convenient for
    testing apps on a device because they use a wildcard app ID. Instead of assigning
    an app-specific bundle identifier, an asterisk (*) is used as a wildcard placeholder.
    This way, the related provisioning profile can be used to test any app on a device,
    regardless of its bundle identifier.


    As you’ll notice from the disabled options of TestApp, the major limitation to
    wildcard app IDs is that they cannot be used for testing app-specific features
    such as In-App Purchase and Game Center.


    This is the reason we’re working through the extra steps to create an explicit
    app ID and provisioning profile that can be used for testing any iOS feature on
    your device.


    Step 5: Generate and Install Your Provisioning Profile


    Now we’re finally ready to generate a provisioning profile. This is where it all
    comes together.


    Select Development from the left column of the Certificates, Identifiers & Profiles
    page. Click the + button to add a new profile. On the web form that loads, select
    the type of provisioning profile (iOS App Development) and select Continue. On
    the next page, select the App ID that you want to create the provisioning profile
    for. On the next two pages, select the certificates and devices that you want
    to include in the provisioning profile. Then provide a name for your provisioning
    profile by entering a name in the Profile Name field. Then click the Generate
    button. Your provisioning profile will be generated and displayed (see [Figure
    9-15](#9781430262381_Ch09.xhtml#Fig15)).


    ![9781430262381_Fig09-15.jpg](images/9781430262381_Fig09-15.jpg)


    [Figure 9-15](#9781430262381_Ch09.xhtml#_Fig15). Using the online Development
    Provisioning Assistant to generate your provisioning profile


    After your provisioning profile has been generated, you can download it from your
    list of provisioning profiles (see [Figure 9-16](#9781430262381_Ch09.xhtml#Fig16)).
    Click the Download button to download the .mobileprovision file to your Mac Downloads
    folder.


    ![9781430262381_Fig09-16.jpg](images/9781430262381_Fig09-16.jpg)


    [Figure 9-16](#9781430262381_Ch09.xhtml#_Fig16). Download your new provisioning
    profile to your Mac


    With your test device still connected to your Mac, drag the .mobileprovision file
    from the Downloads folder onto the Xcode icon in your Dock. Xcode will automatically
    install that provisioning profile in the proper location. If you imported it correctly,
    you can now see your provisioning profile by clicking the View Details button
    in `Xcode` ![image](images/arrow.jpg) `Preferences` ![image](images/arrow.jpg)
    `Accounts` ![image](images/arrow.jpg) (see [Figure 9-17](#9781430262381_Ch09.xhtml#Fig17)).


    ![9781430262381_Fig09-17.jpg](images/9781430262381_Fig09-17.jpg)


    [Figure 9-17](#9781430262381_Ch09.xhtml#_Fig17). If your provisioning profile
    was installed successfully, you should see it listed in Xcode Preferences


    Step 6: Run Your Xcode Project on Your Test Device


    Now that you have the proper provisioning profile and certificates in place, you
    can finally start testing your app on the connected device. Before you can run
    your project, you’ll need to modify the build settings to specify your new provisioning
    profile. Select the Target app in the left pane and select the Build Settings
    in the menu across the top of the center pane. In the Target Info window that
    appears, choose the Build tab, and scroll down to the Code Signing section. Select
    your desired development provisioning profile from the pop-up menu (see [Figure
    9-18](#9781430262381_Ch09.xhtml#Fig18)).


    ![9781430262381_Fig09-18.jpg](images/9781430262381_Fig09-18.jpg)


    [Figure 9-18](#9781430262381_Ch09.xhtml#_Fig18). Assign a specific provisioning
    profile to your Xcode project for device testing


    As your last task, switch over to the Identity section of the General tab in the
    center pane, and confirm your app ID’s bundle identifier in the Bundle Identifier
    field. For the example, in [Figure 9-19](#9781430262381_Ch09.xhtml#Fig19), the
    app ID bundle identifier for our fictional Breadcrumbs app is `com.ebutterfly.breadcrumbs2`,
    and it is also listed as such in the Xcode project’s Info.plist file.


    ![9781430262381_Fig09-19.jpg](images/9781430262381_Fig09-19.jpg)


    [Figure 9-19](#9781430262381_Ch09.xhtml#_Fig19). Confirm your app ID’s bundle
    ID in the Identifier field


    When you click the Build and Run button, Xcode will compile the app and send it
    via USB to the test device, where it will be installed and run. The first time
    you attempt this, you’ll be prompted by a code-signing dialog box, requesting
    to use your developer key (see [Figure 9-20](#9781430262381_Ch09.xhtml#Fig20)).
    Click the Always Allow button to proceed.


