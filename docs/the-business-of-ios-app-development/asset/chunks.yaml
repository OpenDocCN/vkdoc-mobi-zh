    # 每年，苹果公司都会在北加州举办全球开发者大会（WWDC）。大会的主题演讲通常是苹果向热切期待的开发者群体介绍新产品和软件的论坛。2014 年的 WWDC
    也不例外——会上宣布了 iOS 8 和新的 Mac OS X 系统 Yosemite。然而，对开发者来说，最重要的发布是苹果的新编程语言，名为 Swift。Swift
    是`Objective-C`的替代品——开发者无需担心他们学习`Objective-C`的努力全都白费了，因为`Objective-C`和 Swift 代码都可以用于开发
    iOS 和 OS X 应用程序。


    苹果将 Swift 描述为“不带 C 的`Objective-C`”。Swift 是一种编译型编程语言，其语法与其他源自 C 的语言（如 C#和 Java）相似。Swift
    用包含代码的`.swift`文件替代了`Objective-C`中的头文件（`.h`和`.m`文件）。在 Swift 中，不需要基于括号的语法和分号来终止语句。Swift
    中的方法以`func`关键字为前缀，类方法则以`class`关键字为前缀。Swift 是一种类型安全的语言，编译器会执行类型检查，在编译时而非运行时捕获任何类型错误。要开始使用
    Swift，请前往 iBooks Store 免费获取苹果公司的《*The Swift Programming Language*》一书。


    ## iOS 8 中的差异


    本节将帮助你熟悉 iOS 7 和 iOS 8 中发生的变化。虽然大多数设计变化是在 iOS 7 中进行的，但本节讨论的是作为最新 iOS 版本的 iOS 8。此外，本节将帮助你理解苹果引入的新设计标准，并告诉你哪些标准已被弃用。


    如果你是在 iOS 7 之前就使用 iPhone 的用户，你自然会知道这种风格与之前的有何不同。现在，让我们讨论一下 iOS 6 和 iOS 8 之间的具体差异，以及这可能如何影响你设计应用的方式。


    计算器应用是展示视觉方向变化的完美例子。图 4-1 左侧是 iOS 6 版本。可以看到它具有非常拟物化的设计风格，模仿了现实生活中的计算器。右侧则可以看到对字体和简洁性的极大强调。其理念不一定是展示你能把东西做得多么漂亮，而是如何专注于通过应用丰富用户的体验。


    ![9781430262381_Fig04-01.jpg](img/9781430262381_Fig04-01.jpg)


    图 4-1. 苹果原生计算器应用（左：iOS 6，右：iOS 8）


    邮件应用也经历了一些变化，它是展示`UIToolbar`和`UINavigationBar`之间差异的好例子。你可以在图 4-2 中看到，iOS 8 简化了大量渐变和颜色，并增强了邮件应用的排版。


    ![9781430262381_Fig04-02.jpg](img/9781430262381_Fig04-02.jpg)


    图 4-2. 苹果原生邮件应用（左：iOS 6，右：iOS 8）


    但我想花点时间关注`UINavigationBar`和按钮。请注意，随着文本按钮（如 iCloud 或编辑）的引入，不再需要使用图片。这是一个很好的方法，因为随着时间的推移，随着设备分辨率的变化，应用可以轻松适应多种分辨率，而无需压缩或拉伸图片。为了与
    iOS 8 保持一致，请考虑使用文本或图标来传达操作，而不是使用实体按钮。另外，请注意`UINavigationBar`现在与状态栏合为一体，不再是单独的项目。由于它不再是一张图片，你可以将`UINavigationBar`设置为不同的颜色。


    现在我想把重点放在`UITabBar`上，以展示它如何影响图标（参见图 4-3）。


    ![9781430262381_Fig04-03.jpg](img/9781430262381_Fig04-03.jpg)


    图 4-3. 苹果 App Store（左：iOS 6，右：iOS 8）


    iOS 8 中的图标通常被称为*线形图标*；它们未选中时是细线条，选中时会变得“填充”。在 iOS 8 中，苹果允许通过编程方式更改图标的颜色。


    最后，让我们看看 Facebook 应用。你可以在图 4-4 中看到，许多“效果”被移除，东西保持得更简洁，导航也扩展回到了`UITabBar`。展望未来，请将这些例子中的一些记在心里，为你想要实现的最终产品形成一个视觉蓝图。


    ![9781430262381_Fig04-04.jpg](img/9781430262381_Fig04-04.jpg)


    图 4-4. Facebook 应用（左：iOS 6，右：iOS 8）


    ## 为你的应用定义品牌


    你的应用应拥有区别于其他竞争对手的主色调、图标和标志。你能提供给用户的最佳体验之一，就是在标志、应用和应用图标的设计上保持一致性。在构思应用的标志时，请保持创意源源不断。这是一个视觉元素，如果能借助专业设计师的魔力会更好，因此，如果你聘请了设计师来创建应用图标，那么应该让同一位专家来创建匹配的标志。但如果预算紧张迫使你不得不独自承担图形设计的重任，也无需担心。标志不必复杂。事实上，就像你的图标一样，标志越简洁，你在各种小尺寸下使用它的灵活性就越大，同时还能保持可读性。


    你需要创建一个主标志，其尺寸至少几英寸长，分辨率为 300 dpi，这样它在你未来可能创建的任何与印刷相关的营销材料中都会看起来很棒。为了获得最佳效果，你可能希望选择基于矢量的
    Illustrator 程序来创建你的标志，特别是如果你的图标也是在 Illustrator 中构建的。利用你已经完成的设计工作，将现有的图标融入标志设计中。这不仅为你节省了大量设计时间，还有助于强化你已经通过应用图标建立的品牌形象。


    ### 你最强大的营销工具


    **注意** 如果你在标志中使用第三方字体，务必购买适当的字体许可证以便在商业项目中使用。有些字体可能相当昂贵，因此如果资金是个问题，我建议尽可能使用免版税字体。请参考本章后面的“给艺术挑战者的提示”部分，获取一些有用的字体库资源。


    在游戏的这个早期阶段，创建一个包含在`Xcode`项目中的应用图标似乎是显而易见的——但为什么要在应用尚未开发时就设计标志呢？显然，你会希望在应用的官方网站上准备好使用你的标志，并让它可用于你进行的任何发布前的宣传工作。但现在设计标志的最大原因是为了商标注册（正如
    Taylor Pierce 在第 3 章中所解释的）。商标申请和审批过程可能需要几个月的时间，因此如果你计划为你的应用标志注册商标，最好尽快启动这一流程。如果一切顺利，理想情况下你可以在应用上架
    App Store 之前就正式注册好商标。


    ## 保持一致的品牌形象


    为了强化你的品牌形象，你需要在所有的营销活动中使用相同的应用图标和标志。如果你使用太多视觉上的变体来推广同一个 iOS 应用，很可能引起消费者的困惑。

    '
- fmt: 'By consistently using the same icon and logo, your app''s brand will start
    to become recognizable to people. This familiarity will help consumers easily
    recall your app name when searching the App Store and when recommending your app
    to friends and family.


    Having a recognized brand also helps you promote new iOS apps to those users who
    are familiar with the visual branding of your previous app.


    For example, to reinforce the branding of Evernote, a popular productivity app,
    the same logo and color palette were used within various screens of the app, as
    well as in the app''s official web site (see [Figure 4-5](#9781430262381_Ch04.xhtml#Fig5)).
    Notice that even though the Evernote logo is a very simple design, its consistent
    use is nonetheless quite effective (good news for all you non-artists out there).


    ![9781430262381_Fig04-05.jpg](images/9781430262381_Fig04-05.jpg)


    [Figure 4-5](#9781430262381_Ch04.xhtml#_Fig5). Evernote uses the same Evernote
    logo and colors within the app icon. The Evernote app (left) and its web site
    (right) show consistent branding


    If you''re porting an existing app to the iPhone or iPad from another platform,
    such as Mac OS X or Windows, take advantage of the brand equity you''ve already
    established by using a similar icon and logo for the iOS version. This is a great
    way to attract new customers who are already familiar with your app from another
    platform.


    For example, when Flexbits created an iPhone version of its award-winning Mac
    application, Fantastical, it used the same branding but modified the icon slightly.
    The icon is still instantly recognizable as Fantastical and cements the fact that
    the iPhone app is directly related to its Mac cousin. But the minor design tweak
    to the iPhone version''s icon plays an important role. Not only does the change
    help the image display better as a small iOS icon with rounded edges, but it also
    helps position the iPhone app as a stand-alone version (see [Figure 4-6](#9781430262381_Ch04.xhtml#Fig6)).


    ![9781430262381_Fig04-06.jpg](images/9781430262381_Fig04-06.jpg)


    [Figure 4-6](#9781430262381_Ch04.xhtml#_Fig6). The Fantastical Mac icon (left)
    and the Fantastical iPhone icon (right)


    The Fantastical iPhone icon is another great example of an image that is both
    simple and sophisticated at the same time. The icon gets its high-quality feel
    from the little design nuances, such as the high-contrast colors, the subtle effects,
    and the recognizable calendar design. In my opinion, the Fantastical icons for
    both Mac and iOS are perfect models of effective app icon design, where less is
    more—delivering sheer simplicity with visual impact.


    ## Creating an Effective App Icon and Logo


    Now to the final step: making an effective app icon. As mentioned earlier, when
    consumers browse the App Store listings, your app icon is the first visual cue
    your app has to offer. Your app''s icon and name will be the first key factors
    that determine whether a user is interested enough to click through to your app''s
    product page. Since the icon represents your app''s brand identity, its design
    must be memorable and eye-catching enough to stand apart from the icons of your
    competition.


    At the end of [Chapter 2](#9781430262381_Ch02.xhtml), I recommended reviewing
    your competition''s app icons to start thinking about ideas for your own app icon.
    For example, if you''re building a note-taking app and most of the similar apps
    currently use a notebook-related app icon, you won''t want to emulate that same
    look. Otherwise, your app may be perceived as an unoriginal app that''s simply
    hopping on the same bandwagon. But your app is going to be different—better. So,
    let your app icon reflect that with contrasting colors and an original visual
    theme that sets your app apart from similar apps when they are all displayed together
    in the App Store listings.


    Although some app icons utilize photographic imagery, you''ll find that most apps
    have illustration-based icons. Often, a photo includes too much detail, and when
    shrunk to a tiny 120 × 120 pixel icon, the image looks cluttered and busy. The
    most successful icons and those most consistent with Apple''s new design direction
    boast a simple, crisp, and clean design that looks vibrant and appealing at any
    size—big or small. Illustrations tend to work best to meet those design goals.


    ## App Icon Rules and Tools


    Many apps use icon imagery that look suspiciously like royalty-free clip art.
    Using royalty-free stock art can serve as a great foundation for mocking up the
    initial prototype design of your icon, but you''ll want to create your own original
    artwork for the final icon, especially if you plan to register a trademark for
    your app logo and icon. You can''t trademark someone else''s artwork or imagery
    unless you own all the rights to it.


    **App Rejection Warning**  Do not use copyrighted or trademarked art or names
    in your app icon or UI. This also includes any Apple trademarks. iPhone imagery
    is strictly hands-off, so don''t include it in your icon or interface design.
    Although a few select apps do display an iPhone in their app icon or UI icons,
    they are the rare exception. Breaking this rule without receiving prior permission
    from Apple will quickly earn most new apps a rejection letter. It''s also important
    to note that Apple will also reject your app if it uses unauthorized images of
    public figures or celebrities. And believe me, Apple is doing you a favor by enforcing
    this before granting entry into the App Store. The last thing you want is some
    large Fortune 500 corporation suing you for trademark infringement.


    Because I''ve been a designer and an avid user of Adobe Photoshop for years, I''ll
    share some tips and tricks for making an eye-catching icon. With the shift to
    a simpler design style, it is now easier to make an app icon. That''s the beauty
    of designing a simple icon. As long as you know a few layering and filtering tricks,
    you can create an attractive icon. You don''t need to be Michelangelo, but having
    a good eye for composition—how to structure the layout of an icon—is definitely
    a valuable trait. But not to worry: even if your graphics skills ended with kindergarten
    drawings displayed on the refrigerator, the "Tips for the Artistically Challenged"
    section later in this chapter provides helpful advice and links to online resources.


    If you''re not a talented artist, it''s definitely worth finding room in your
    budget to hire a professional designer. Your app icon will greatly benefit from
    the skilled eye of an experienced graphics guru. Again, your app icon is a very
    important visual component of your overall app marketing strategy. If you''re
    truly serious about succeeding in the App Store, hiring a professional designer
    to develop your icon—as well as your logo and even some of your UI elements—is
    a smart investment.


    But what if you are a struggling independent developer, working with a small,
    shoestring budget? Let''s see what you can do on your own to produce a worthy,
    high-quality icon.


    Most professional design work is done in either Adobe Illustrator or Photoshop
    (`http://www.adobe.com`):


    *   Adobe Illustrator is a vector-based drawing program, which means it creates
    illustrations that can be set to any size without losing any pixel quality. It''s
    perfect for designing software icons and logos that may need to be available in
    many different sizes for anything ranging from a small desktop icon to a large
    trade-show poster.

    *   Adobe Photoshop is a bitmap-based graphics program that also includes many
    vector-based tools.


    I tend to be partial to Photoshop, but most designers would probably recommend
    Illustrator for this specific task. And since Apple keeps introducing new iOS
    devices and screen resolutions, creating a vector-based icon design gives you
    the flexibility to handle larger sizes in the future without sacrificing image
    quality.'
