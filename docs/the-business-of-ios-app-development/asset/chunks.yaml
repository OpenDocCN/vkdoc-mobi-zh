- fmt: '# Licensing and Legal Considerations for App Development


    Whenever you use code or other materials that you obtain from a third party, you
    will want to be sure that you have documented and understand the scope of your
    license. Sometimes these inbound license agreements will be negotiated and executed
    between you and the licensor. In other cases, you will have clicked through an
    agreement with the provider as part of your purchase. In the case of code that
    you find on the Web, you may be bound by the terms of a license that accompanies
    the code. If there is no license posted, you might not have the right to use the
    code at all.


    ## Know What You Are Getting


    The main purpose of a license agreement is to grant the licensee the right to
    use the licensor’s code or other content, but licenses also can provide the licensor
    with certain assurances regarding the quality of the code or content.


    If you are negotiating an inbound license, you will want to secure some warranties
    that the licensor in fact has the right to grant you the license to the code or
    content. You may also want the licensor to defend you if for some reason your
    company is sued for infringement caused by the in-licensed materials.


    Many click-through or shrink-wrap licenses will not include these types of warranties
    or indemnification. The result is that you alone may be responsible if something
    harmful is included in the code provided by a licensor.


    Freely available code items, like Joe Hewitt’s `Three20` framework, are incredible
    resources. But it is important to understand that code like `Three20`, licensed
    under the BSD license, does not come with any warranties. It is effectively “as-is,”
    which means that although it is a great way to save time in your development of
    apps, you alone will be responsible if that code fails, includes a virus, or infringes.
    Surprisingly, the same applies to most artwork that you license through stock
    photography sites, like `iStockphoto.com`. This is not to say that you shouldn’t
    use `Three20` or stock photography, but that you should be aware of the risk that
    your company bears by doing so.


    ## Avoid Viral Licenses


    Some freely available software is licensed under open source licenses that are
    viral in nature. These open source licenses, like the GNU General Public License
    (GPL) and Lesser GPL (LGPL), have contributed immensely to the advancement of
    software, but they carry a fairly strong obligation for anyone who uses the code
    in their own programs. This obligation is to license the resulting app under a
    similar open source license. This means that if you accidentally (or intentionally)
    include some open source code that you found on the Internet in your app, you
    may be contractually obligating yourself to provide access to your source code
    and allow other people to redistribute your apps for free. For commercial software,
    this is a real problem.


    The takeaway here is that you should be sure to review the license agreement for
    any piece of third-party code or content that you incorporate into your app. Everything
    in your app should be traceable back to its original licensor and linked in your
    records to a license agreement that you are comfortable provides you with sufficient
    warranties and does not contain viral provisions that could taint your commercial
    products.


    ## Don’t Use Apple’s Trademarks


    It is important to know that Apple’s developer agreement prohibits the use of
    Apple’s trademarks in your apps. This means that you want to avoid using toolbar
    icons that look like an iPod, and you don’t want to include pictures or images
    of an iPhone in your app. Also, you shouldn’t use the word `iPod`, `iPhone`, or
    `iPad` in your app or company name.


    Using these marks is a violation of your agreement with Apple, and could get your
    app rejected or possibly stuck in a lengthy and unpredictable approval cycle.


    ## Creating a Custom End User License Agreement


    Your end user license agreement (EULA) is the agreement with your users that gives
    them the right to use your app. In terms of intellectual property, this agreement
    is where you grant your user a license under your intellectual property rights
    to use your app.


    ### The Purpose of a EULA


    Your EULA is the document that governs your relationship with your users. Among
    other things, it grants your users the right to use your app and sets out any
    limitations you want to impose on how it can be used. Like any license agreement,
    your EULA can grant narrow or broad rights, depending on your goals. Most app
    developers will want to grant users only a very narrow license that limits the
    users to only using your app, and not modifying or redistributing it. This model
    is to some extent baked in to the App Store, since Apple embeds technological
    restrictions on users’ ability to share apps with others.


    One of the most important reasons to have a EULA is that it can be used to limit
    the warranties that users get with your app, and therefore limit your liability
    to the end user.


    ### Warranty Disclaimers


    What should your customer expect when they purchase a copy of your app? The ways
    these expectations are set from a legal standpoint are with *warranties*.


    When you say in your app description that your game has 20 levels or that your
    Twitter client enables users to post tweets from the app, these are “express warranties”
    about the app. If a customer buys your app, and it doesn’t do the things you said
    it would do, the user could claim that you breached your warranty.


    Most app developers are not looking to disclaim their express warranties, but
    without the proper warranty disclaimer language in your EULA, you could end up
    making warranties to the end user that you do not intend. These are implied warranties
    that can come into existence based on the circumstances of the sale. Examples
    of implied warranties are the “warranty of merchantability” and “warranty of fitness
    for a particular purpose.” The problem with these warranties is that they are
    often based on what the customers expect your product to do, rather than the things
    that you told them it would do.


    A detailed description of the various implied warranties and how they come into
    existence isn’t necessary to understand how they fit into your EULA. The point
    is that with proper disclaimers in your EULA, you can disclaim these implied warranties
    and limit the users’ ability to sue you if your app does not live up to their
    expectations. As you launch your app on the App Store, you will see how important
    this is. There are all types of customers in the App Store. Some are mature; some
    are immature. Some are reasonable; others are crazy. Once you start seeing some
    of the reviews that people post for apps, it will be clear that often users’ expectations
    for what an app can do are not based in reality.


    ### Limitations of Liability


    Another important benefit for developers in an EULA is a provision limiting the
    developer’s liability in connection with the sale of the app. A limitation of
    liability provision is an agreement between you and your user that sets the maximum
    liability under your agreement at some amount. Most often, these caps on liability
    are set at the amount the customer paid for the product. Sometimes they are set
    even lower than that.


    Not all jurisdictions enforce limitations of liability. Often, the judges evaluate
    whether the limitation of liability provision is fair to the user. Generally,
    however, courts in the United States will respect people’s right to decide for
    themselves which contracts they want to agree to, and most often limitations of
    liability are considered enforceable.'
