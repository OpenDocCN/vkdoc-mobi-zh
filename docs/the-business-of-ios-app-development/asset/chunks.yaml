- fmt: '社交网络是您在应用世界中的最佳伙伴；请务必为您的应用或应用公司创建专属页面。专注于积累粉丝并在发布前进行预热，这至关重要。如果操作得当，能在极短时间内带来数千次下载。务必与您的客户互动，确保他们在社交社区中感受到您的存在。没有人喜欢被冷落，所以请确保您的用户始终感觉与您和您的应用保持联系。


    需要明确的是，我并非建议您将应用的界面变成流动广告牌——那是更适合放在`App Store`描述、网站和宣传材料中的任务（本书也会广泛涵盖这些内容）。我在这里讨论的是可以集成到应用功能与用户界面（`UI`）设计中的基本组件，这些组件能以非常微妙的方式推广您的应用，而您的用户只会将其视为便利且提升品质的功能。


    `iOS SDK`提供了数千个省时的框架，其中许多实际上能让您的营销工作更轻松。例如，本书将探讨`In-App Purchase`（应用内购买）和`In-App
    Email`（应用内邮件）功能。


    是的，您没看错。本书有好几个章节将聚焦于您最热爱的事情：设计和编程您的应用！现在吸引您的注意了吗？您还觉得营销不会有趣吗？


    ## 如何使用本书


    章节的编排采用非常系统化的线性方法，逐步引导您完成`iOS`应用从规划、开发到发布的整个过程。在此过程中，每个阶段都会提出重要的商业解决方案，帮助您打造出一款畅销的应用！虽然您可能很想跳跃阅读，只读感兴趣的章节，但我建议按顺序阅读，以便从这种战略性、有条理的工作流程中受益（参见[图1-3](#9781430262381_Ch01.xhtml#Fig3)）。


    ![9781430262381_Fig01-03.jpg](images/9781430262381_Fig01-03.jpg)


    [图1-3](#9781430262381_Ch01.xhtml#_Fig3). 为获得最佳效果，请遵循本书的线性工作流程


    *   *[第2章](#9781430262381_Ch02.xhtml)，《做好功课：分析iOS应用创意并进行竞争研究》*：您认为自己有一个很棒的移动应用创意？学习如何识别尚未开发的市场，并精炼您的应用概念，使其独一无二且极具市场价值，从而在竞争中脱颖而出。您将发现通过分析竞争对手做对了什么又做错了什么来进行老式侦探工作的巨大价值。我们还将探讨将目标定位在`iPhone`之外的多个`iOS`设备的优势，以及通用应用所面临的商业挑战。

    *   *[第3章](#9781430262381_Ch03.xhtml)，《保护您的知识产权》*：这可能就是本书最重要的章节之一！虽然我们可能都不喜欢处理法律事务，但保护自己并保护您原创概念与代码的知识产权，对您业务的长期健康与成功至关重要。由律师转行成为应用开发专家的`Michael
    Schneider`将为您讲解保护您的软件业务所需了解的一切。

    *   *[第4章](#9781430262381_Ch04.xhtml)，《您的iOS应用是最强大的营销工具》*：您的应用图标和截图通常是用户在`App
    Store`评估应用时首先看到的视觉元素。糟糕的第一印象可能会让您损失销量并招来负面评论，因此优化应用设计是成功的关键组成部分。[第4章](#9781430262381_Ch04.xhtml)包含了关于原型设计、创建引人注目的应用图标、打造直观用户界面以及为多个`iOS`设备进行设计的有用技巧。

    *   *[第5章](#9781430262381_Ch05.xhtml)，《社交植入：在应用内部推广您的应用》*：在第4章将应用转变为自身营销动力源的基础上，本章将更进一步，集成便捷的分享和社交媒体元素，例如`In-App
    Email`、`Twitter`和`Facebook`。优雅地在您的应用内引导用户进行`App Store`评价，通过应用内交叉推广和第三方社交游戏平台建立协同效应，并学习如何有效实施这些不同要素。

    *   *[第6章](#9781430262381_Ch06.xhtml)，《免费也赚钱：何时免费才划算》*：与传统的桌面软件世界不同，`App Store`目前不允许有时间限制或功能受限的试用版。为了绕过这一限制，许多开发者提供了由`In-App
    Purchase`（应用内购买）支持的“免费增值”模式或免费“精简”版应用，希望用户能购买应用内内容或单独的付费版以获取高级功能。了解免费版在推广付费版方面的好处，以及联盟计划带来的额外收入机会。

    *   *[第7章](#9781430262381_Ch07.xhtml)，《通过iAd和其他应用内广告机会实现免费应用盈利》*：即使没有付费内容，免费应用本身也能赚钱。学习如何通过应用内广告、赞助和产品植入交易来挖掘替代收入流。本章将深入探讨应用内广告的世界，向您介绍适用于`iOS`应用的移动广告网络，以及通过应用内分析跟踪使用情况的价值。[第7章](#9781430262381_Ch07.xhtml)还包含在您的应用中逐步实施苹果`iAd`框架的指南。

    *   *[第8章](#9781430262381_Ch08.xhtml)，《通过应用内购买探索免费增值模式》*：借助`In-App Purchase`（应用内购买），开发者可以在其应用中构建新的商业模式，例如提供订阅、销售附加内容和服务，以及解锁高级功能。有兴趣在为您持续的开发工作提供财务支持的同时，为用户提供额外价值吗？本章提供了关于何时以及如何在您的`iOS`应用中使用`In-App
    Purchase`及其相关`Store Kit`框架的详尽指导。'
  raw: 'Social networks are your best friend in the app world; make sure to create
    pages for your app or app company. Focus on building followers and hyping prerelease;
    this is very important, and if done correctly, can yield thousands of downloads
    in a very short time. Be sure to interact with your customers and make sure they
    feel your presence in the social community. No one likes to feel left out, so
    make sure your users always feel in touch with you and your app.


    Now just to be clear, I’m not suggesting that you turn your app’s interface into
    a walking billboard—that’s a task better suited for your App Store description,
    your web site, and publicity materials (which are also covered extensively in
    this book). What I’m talking about here are essential components that can be integrated
    into your app’s functionality and user interface (UI) design that will help promote
    your app in very subtle ways that your users will perceive only as convenient,
    quality-enhancing features.


    The iOS SDK provides thousands of time-saving frameworks, many of which can actually
    make your job easier as a marketer. For example, both In-App Purchase and In-App
    Email will be explored in this book.


    Yes, you read that correctly. Several chapters of this book will be focused on
    what you love doing most: designing and programming your app! Got your attention
    now? And you thought marketing wasn’t going to be fun!


    How to Use This Book


    The sequence of chapters takes a very systematic linear approach, working step
    by step through the planning, development, and release of an iOS app. Along the
    way, important business solutions will be presented in each phase of the process
    to help you produce an app that sells! Although you may be tempted to jump around,
    reading only the chapters that appeal to you, I recommend reading the chapters
    in order to benefit from this strategic, organized workflow (see [Figure 1-3](#9781430262381_Ch01.xhtml#Fig3)).


    ![9781430262381_Fig01-03.jpg](images/9781430262381_Fig01-03.jpg)


    [Figure 1-3](#9781430262381_Ch01.xhtml#_Fig3). For best results, follow the linear
    workflow of this book


    *   *[Chapter 2](#9781430262381_Ch02.xhtml), Doing Your Homework: Analyzing iOS
    App Ideas and Performing Competitive Research*: So you think you’ve got a great
    idea for a mobile app? Learn how to identify untapped markets and refine your
    app concept to be unique and highly marketable, setting it apart from your competition.
    You’ll discover the immense value of doing some good old-fashioned detective work
    by analyzing what your competitors are doing right and wrong. We’ll also explore
    the advantages of targeting multiple iOS devices beyond just the iPhone and the
    business challenges of universal applications.

    *   *[Chapter 3](#9781430262381_Ch03.xhtml), Protecting Your Intellectual Property*:
    This just might be one of the most important chapters in the book! Although we
    probably all hate dealing with legal matters, it’s crucial to the long-term health
    and success of your business not only to protect yourself, but also to protect
    the intellectual property of your original concepts and code. Michael Schneider,
    an expert lawyer turned app developer, will walk you through everything you need
    to know to safeguard your software business.

    *   *[Chapter 4](#9781430262381_Ch04.xhtml), Your iOS App Is Your Most Powerful
    Marketing Tool*: Your app icon and screenshots are often the first visual elements
    users see in the App Store when evaluating your app. Bad first impressions can
    cost you sales and invite negative reviews, so fine-tuning your app’s design is
    a critical component to success. [Chapter 4](#9781430262381_Ch04.xhtml) includes
    useful tips on prototyping, creating eye-catching app icons, crafting intuitive
    user interfaces, and designing for multiple iOS device targets.

    *   *[Chapter 5](#9781430262381_Ch05.xhtml), Social Inception: Promoting Your
    Apps Within Apps*: Building upon Chapter 4’s quest to transform your app into
    its own marketing powerhouse, this chapter will take you one step further by integrating
    convenient sharing and social media elements such as In-App Email, Twitter, and
    Facebook. Gracefully encourage App Store user reviews within your app, build synergy
    with in-app cross-promotion and third-party social gaming platforms, and learn
    how to implement these various ingredients for effective results.

    *   *[Chapter 6](#9781430262381_Ch06.xhtml), Money for Nothing: When It Pays to
    Be Free*: Unlike the traditional desktop software world, the App Store does not
    currently allow time-limited or feature-crippled trial versions. To work around
    this restriction, many developers offer an In-App Purchase–supported “freemium”
    model or a free “lite” version of their apps, hoping users will buy in-app content
    or the separate paid edition to gain access to premium features. Learn the benefit
    of free to promote paid versions, plus the additional revenue opportunities of
    affiliate programs.

    *   *[Chapter 7](#9781430262381_Ch07.xhtml), Monetizing Free Apps with iAd and
    Other In-App Advertising Opportunities*: Free apps can still make money on their
    own, even without paid content. Learn how to tap into alternative revenue streams
    with in-app advertising, sponsorships, and product-placement deals. The world
    of in-app advertising is thoroughly examined, educating you on the mobile ad networks
    available for iOS apps and the value of tracking usage through in-app analytics.
    [Chapter 7](#9781430262381_Ch07.xhtml) also includes a step-by-step guide to implementing
    Apple’s iAd framework in your app.

    *   *[Chapter 8](#9781430262381_Ch08.xhtml), Exploring the Freemium Model with
    In-App Purchase*: With In-App Purchase, developers can construct new business
    models within their applications, such as offering subscriptions, selling add-on
    content and services, and unlocking premium features. Interested in supplying
    additional value to your users while financially supporting your continued development
    efforts? This chapter provides in-depth instructions on when and how to use In-App
    Purchase and its related Store Kit framework in your iOS apps.'
