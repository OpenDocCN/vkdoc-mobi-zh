    在 Twitter 上建立你的存在感时，你应该决定如何使用该服务。


    有些开发者会为自己创建一个 Twitter 账户，并为他们的 iOS 应用创建另一个独立账户。这样，他们可以使用应用专用账户发布相关新闻和处理支持查询，而个人账户则用于发布关于其他产品或杂项、非业务内容的推文。一些组织拥有一个专门发布公司新闻的账户，然后为公司的每位员工分配独立的账户。如果你的企业由不止一名开发者组成，或者你希望将一个
    Twitter 账户仅用于个人用途，那么这两种方法都很有效。


    如果你是独立开发者，你可能会发现将精力整合到一个单一的 Twitter 账户中会容易得多。而且，当你拥有几款 iOS 应用时，在一个 Twitter 信息流中交叉推广它们会非常有益。如果你的某款应用变得流行并为你带来大量
    Twitter 关注者，这一点尤其有帮助，因为你将拥有一个渴望了解你发布任何其他产品的庞大受众。


    ## 获取关注者


    “关注者”是指那些选择关注你 Twitter 信息流的用户，这意味着你的推文会出现在他们的时间线（即他们所关注用户发布内容的流）中。你积累的关注者越多，你的受众群体就越大。


    由于扩大受众群体是这里的主要营销目标，那么如何获得更多关注者呢？


    啊，这可能是关于 Twitter 最常被问到的问题。


