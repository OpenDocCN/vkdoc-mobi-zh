    **泰勒·皮尔斯**自苹果应用商店于 2009 年向公众开放以来，一直从事应用开发工作。2010 年夏天，泰勒在梦寐以求的加州库比蒂诺苹果总部获得实习机会。他已开发超过
    60 款应用，其中许多长期位居苹果前 200 名榜单。泰勒对应用如何具有市场吸引力和盈利能力有着第一手经验。他目前是 Klinklife, LLC 的首席开发者。


    由于泰勒对客户需求、应用设计细节以及日新月异的应用市场有着直接了解，他编写了这本书，作为在应用商店取得成功的参考工具。很少有人能像泰勒这样拥有如此专业的知识和应用商店经验。他几乎为应用商店中的每个类别都开发过应用，不仅为自己，也为客户带来了经济上的成功。


    除应用开发外，泰勒还为希望最大化应用性能的个人和公司提供咨询。这本书的灵感来源于他希望为客户提供卓越咨询服务的愿望。为了他的个人客户，他决定写一本客户能够阅读的书，让他们了解应用商店的方方面面。


    在 Twitter 上关注泰勒：`@taylorpierceapps`。


    戴夫·伍尔德里奇是 Electric Butterfly 的创始人，从事屡获殊优的网站和软件开发已有 15 年。在不创建 Mac 和 iPhone 应用的时候，你会发现他在写作。戴夫是《iPhone
    应用开发业务：成功制作与营销应用》（Apress, 2011）的作者，并为多家领先技术出版物撰写了大量文章，包括为《MacTech Magazine》撰写月度软件营销专栏。


    在 Twitter 上关注戴夫：`@ebutterfly`。


    ## 关于技术审校者


    ![9781430262381_unFM-01.jpg](img/9781430262381_unFM-01.jpg)


    **贾科莫·巴利**是一位移动顾问和企业家（专注于 iPhone 和 iPad 应用），他开发了一些目前在应用商店中销售的最独特、制作精良的应用。他来自意大利，目前常驻旧金山，对新想法和原创内容充满热情。


    除了创建自己的应用，贾科莫还经常与委托他创建定制应用或改进现有应用的公司合作。他喜欢与客户合作，寻找简化日常流程的方法，并为员工或移动用户提供所需服务。贾科莫精通
    PhoneGap 跨平台开发，对 Web 技术有着全面的经验。


    ## 特别贡献者


    ![9781430262381_unFM-02.jpg](img/9781430262381_unFM-02.jpg)


    **查尔斯·克鲁兹**是一名移动应用开发者，专注于 iOS、Android 和 Windows Phone 平台。他毕业于斯坦福大学，获得工程学学士和硕士学位。他住在南加州，与妻子共同经营一家摄影公司（`www.facebook.com/BellaLenteStudios`）。不从事技术工作时，他会在一个原创金属乐队中担任主音吉他手（`www.taintedsociety.com`）。


    可以通过`codingandpicking@gmail.com`联系查尔斯，他的 Twitter 账号是`@CodingNPicking`。


    ## 引言


    这本书旨在帮助开发者应对应用商店的方方面面。我们经常看到一些出色的应用无人问津。造成这种情况的因素有很多，但通常是因为我们开发者难以用商业思维来思考。戴维和我编写这本书，就是为了提供您所需的一切，让您的应用在拥挤的应用市场中取得成功。您将找到代码示例、图形模板以及大量第三方扩展，帮助您的应用更上一层楼。


    ## 第 1 章：在拥挤的应用商店市场中看清全局


    住在洛杉矶，好莱坞的陈词滥调随处可见。曾几何时，我遇到的每个人——无论他们从事什么职业——似乎都在写剧本。


    现在，他们全都在开发自己的 iOS 应用了！


    谁又能责怪他们呢？这正说明了 iPhone、iPod touch 和 iPad 的惊人流行度。应用商店有利可图，每个人都想参与其中。


    我们都读过独立开发者史蒂夫·德米特的成功故事。他的 Trism 游戏，以及 2008 年 7 月应用商店上线之初收录的其他 500 款应用，都经历了销售量的爆炸式增长。由于某些应用的价格低至
    99 美分，iPhone 和 iPod touch 用户们以狂热的冲动速度下载这些廉价应用。在接下来的几个月里，几款最受欢迎的应用已经为其开发者带来了数十万美元的净收入，使得像史蒂夫·德米特这样的程序员能够辞去日常工作，全身心投入这个利润丰厚的机会。


    媒体迅速宣称应用商店看似一夜爆红的现象是开发者的“淘金热”。受到潜在财富的诱惑，来自世界各地的创业家们纷纷下载 iOS SDK，争相学习 Objective-C
    和 Cocoa Touch，希望能从这个软件热潮中获利。


    时间快进到 2010 年 7 月。苹果公司推出了搭载 iOS 系统的 iPad，仅在前 80 天就售出了超过 300 万台。再加上庞大的 iPhone 和
    iPod touch 用户群，iOS 设备总销量达到了惊人的 1.2 亿多台，应用商店的下载量也达到了 70 亿次。你可能会想，有了这样的统计数据，在应用商店赚钱应该比以前更容易了，对吧？再想想吧。竞争非常激烈，你不再只是与其他独立开发者竞争，现在几乎每家公司都有自己的应用。


    ### 为什么为 iOS 开发者写一本商业书？


    应用商店里有超过 100 万款应用，且开发者的兴趣仍在以惊人的速度增长，行业分析师预测这个数字每年可能会翻一番。


    想想看。当你浏览应用商店时，你每周甚至每月会发现多少新应用？25 个？50 个？根据苹果公司的数据，每周大约有 31,000 个新应用和更新提交给其应用审核团队！


    在如此拥挤的市场中，新应用要想获得关注变得越来越困难。没有必要的曝光度，你的应用很可能在每日涌入应用商店的无穷无尽的新软件流中迷失。那些你可以快速拼凑一个简单应用，扔进商店，然后坐等大笔版税支票滚滚而来的日子已经一去不复返了。


    媒体炒作机器非常擅长宣扬少数在应用商店中迅速致富的独立开发者的逆袭故事，以至于新手们常常认为，只要他们开发了一款应用，销量自然就会来。但当初期预期的利润雪崩仅仅变成了涓涓细流时，惊讶的开发者们很快发现，在这个竞争激烈的市场中，单纯的“梦想之地”哲学已经不够用了。


    “啊，但如果我刚刚创造了下一个杀手级应用呢？”你问道。“苹果肯定想把它作为精选应用在商店里展示吧？”


    拥有出色的产品当然是这个等式中的根本，但这还不够。确实，被列为“精选应用”、“新见推荐”或“编辑推荐”可以瞬间将你的销量推至顶峰，但不幸的是，这些高光位置的曝光并不是可以购买的广告位。苹果每个月只选择少数几款应用获得这些令人垂涎的位置。每周都有成千上万的新应用争夺注意力，你获得那个能改变命运的苹果来电的机会微乎其微。事实上，你可能更有机会中彩票——中两次。

