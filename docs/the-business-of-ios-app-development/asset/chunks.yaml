  trans: '

    图 9-20。首次尝试在测试设备上运行应用时，系统会弹出代码签名请求提示，请点击“始终允许”按钮继续操作。


    发射成功！你的 Xcode 项目现在应该已经作为编译好的应用在测试设备上运行了。


    ## Beta 测试：掌握 Ad Hoc 分发的复杂性


    比你在 iOS 模拟器和真机上自行测试更重要的是，让多人测试你的应用。在完成充分的自行测试后，强烈建议你召集一群愿意在应用发布到 App Store 之前进行
    Beta 测试的志愿者。


    我们已经介绍了为在你的 iOS 设备上进行测试而设置证书和配置文件所需的步骤。为多个 Beta 测试者设置 Ad Hoc 分发所需的许多步骤看起来非常相似，只有少数例外。但不要搞错，为你的应用配置
    Ad Hoc 分发包含一些非常微妙但重要的额外任务，必须遵循这些任务才能使流程顺利进行。这对许多新开发者来说又是一个绊脚石，所以让我们一步步仔细过一遍每个步骤。


    ### 步骤 1：获取分发证书


    启动钥匙串访问应用程序，它位于你的 Mac 的 `/Applications/Utilities/Keychain Access`。


    首先，请确保在钥匙串访问偏好设置窗口的“证书”选项卡中，“联机证书状态协议 (OSCP)”和“证书吊销列表 (CRL)”均仍设置为“关闭”。


    然后，从菜单中选择 `钥匙串访问` ![image](img/arrow.jpg) `证书助理` ![image](img/arrow.jpg) `从证书颁发机构请求证书`。在出现的证书助理窗口中，输入电子邮件地址以及你
    iOS 开发者计划账户中列出的确切名称（请参见图 9-21）。


    ![9781430262381_Fig09-21.jpg](img/9781430262381_Fig09-21.jpg)


    图 9-21。你的分发证书请求必须包含与你 iOS 开发者计划账户分配的名称和电子邮件地址完全相同。你必须分别将“密钥大小”和“算法”设置指定为 2048
    位和 RSA。


    由于此请求针对的是你的官方分发证书，该证书将同时用于 Ad Hoc 分发和 App Store 分发，因此电子邮件和名称必须与你 iOS 开发者计划凭证完全匹配。例如，我的公司名称
    Electric Butterfly, Inc. 是我的账户中的官方名称，所以我用它来填写此表单。“请求方式”选项应设置为“存储到磁盘”。


    还有一点使此请求与之前在开发证书过程中发出的请求不同。请确保选中“让我指定密钥对信息”复选框。由于勾选了该复选框，当你点击“继续”按钮时，证书助理将要求你分配密钥大小和算法，应分别设置为
    2048 位和 RSA（请参见图 9-21）。


    再次点击“继续”按钮，钥匙串访问将生成新的 `CertificateSigningRequest.certSigningRequest` 文件并将其保存到你的硬盘。


    回到你的网页浏览器，导航到 iOS 成员中心的“证书、标识符和配置文件”页面。在“证书”部分下选择“生产”，然后点击 `+` 按钮并按照说明上传你的新 `CertificateSigningRequest.certSigningRequest`
    文件。


    提交后，证书请求必须由团队管理员批准。如果你是唯一管理你的 iOS 开发者计划账户的人，那么你可能就是团队管理员，因此请点击“批准”按钮。你的新开发证书将在此“证书”部分可供下载。点击“下载”按钮将生成的分发证书保存到你的
    Mac 桌面上（请参见图 9-22）。


    ![9781430262381_Fig09-22.jpg](img/9781430262381_Fig09-22.jpg)


    图 9-22。上传并批准你的证书请求。一旦获批准，你将能够下载生成的分发证书。


    一旦 `distribution_identity.cer` 下载到你的 Mac，双击该文件，它将启动钥匙串访问应用程序（如果尚未打开）。钥匙串访问会显示一个对话框，询问你是否要将证书添加到钥匙串。确保对话框的钥匙串菜单设置为
    `login`，然后点击“添加”按钮。在钥匙串访问主窗口的“密钥”类别中，验证你的私钥和公钥现在已与你的分发证书配对，以确保它在你的 Mac 上配置正确。在此示例中，我的
    Electric Butterfly, Inc. 密钥（在我以相同名称生成证书签名请求时创建）现在已与我导入的分发证书配对（请参见图 9-23）。


    ![9781430262381_Fig09-23.jpg](img/9781430262381_Fig09-23.jpg)


    图 9-23。验证你导入的分发证书已与钥匙串访问中的正确私钥配对。


    不要将多个 iOS 开发者计划账户的分发证书安装到同一个钥匙串中。这样做会在 Xcode 中引起问题。如果你正在为客户编译和提交 iOS 应用，那么请为你需要安装的每个分发证书创建一个单独的
    Mac OS X 用户账户。你可以在你的主要 Mac 用户账户中进行所有开发工作，但要为分发而编译，你应该切换到安装了该客户端分发证书的用户账户。


    ### 导出你的分发私钥以妥善保管


    Xcode 需要你的分发私钥来签署编译后的应用二进制文件。如果没有正确的代码签名，该应用程序无法上传到 App Store，也无法用于 Ad Hoc 测试。此私钥无法重新生成，因此务必将其导出并保存在一个特殊的地方，以防日后切换到新
    Mac 或重装操作系统时需要恢复它。


    要导出你的分发私钥，请在钥匙串访问的“密钥”部分选择它。在图 9-23 的示例中，我的分发私钥已被选中。然后选择“文件” ![image](img/arrow.jpg)
    “导出项目”。以“个人信息交换”(`.p12`) 格式保存文件，这需要你设置一个密码。


    如果你将来需要重新安装此私钥，只需双击导出的 `.p12` 文件并输入你的密码即可。剩下的工作将由钥匙串访问处理。


    ### 步骤 2：注册 Beta 测试者的设备 ID


    还记得为了创建你的开发配置文件，你曾将你自己的测试设备的 40 位 UDID 作为新设备 ID 注册到 iOS 成员中心的“证书、标识符和配置文件”页面吗？创建分发配置文件时也是如此；因此，在此之前，你需要以相同的方式将每个
    Beta 测试者的 UDID 作为新设备 ID 添加。


    #### 召集队伍


    让一群人专门花时间体验你的应用。他们不仅会发现你从未遇到过的错误，还会遇到你可能没有意识到的可用性问题，而你作为创造者却可能浑然不觉。

