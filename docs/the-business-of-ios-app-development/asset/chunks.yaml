    Twitter 个人资料的人可能会在决定是否关注你之前，先看看你关注了谁。

    - **关注你的粉丝。** 通过向忠诚的关注者回报一些关爱来与他们建立联系。没有什么比互相关注更让人愉悦的了。这并不意味着你需要关注每一个关注你的人，但如果他们的推文让你感兴趣，那将是感谢的终极姿态。

    - **与你的社区互动。** 如果有人通过 Twitter 联系你并提出评论或问题，始终要回答他们。Twitter 不是 *对* 着人们说话，而是 *与*
    人们对话。在 Twitter 上进行公开对话不仅能将其他人吸引到讨论中，还能展现人性化的一面，证明你不是一个只会吐出营销信息的自动垃圾邮件机器人。如果你觉得你的
