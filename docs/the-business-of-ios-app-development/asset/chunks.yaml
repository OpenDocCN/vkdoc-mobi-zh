- fmt: '# Print Magazine Advertising and the App Lifecycle


    Print magazines usually require a three-month lead, so by the time your print
    ad’s issue hits newsstands, your app may have already fallen into the long tail
    of its life cycle—an opportune stage for the ad to revive consumer interest and
    app downloads. Advertising can work when aimed at the right audience. Just tread
    carefully to see whether it’s a good fit for your iOS app before diving in with
    both feet. Keep in mind that no single marketing tactic will turn your app into
    a best seller. If you incorporate the many strategies you’ve learned from this
    book into an orchestrated marketing plan, you’ll soon be on the road to achieving
    success in the App Store.


    ## Taking Advantage of `iAd` for Developers


    What sets Apple’s `iAd` for Developers program apart from other in-app advertising
    options is that it seamlessly brings the App Store into the host app that’s showing
    your `iAd`. When people tap an `iAd` for Developers banner, they see a screen
    that resembles an App Store product page, displaying your app’s information, complete
    with description, customer ratings, screenshots, and even a purchase button.


    Apple has deeply integrated this system with iOS and the App Store, so users can
    buy your app from that screen without ever leaving their host application. They
    can continue to use the current app while their new app purchase is being downloaded
    to their device in the background. There’s no inconvenience to the customer, and
    you just gained a new sale!


    Because Apple controls the entire process—from ad presentation to purchase to
    download—your `iAd` for Developers campaign reports provide a truly accurate account
    of the conversion rate from click-through to actual purchase. Since you’re paying
    per click-through, this equates to your cost per acquisition—the actual cost of
    your new customers from this campaign based on the number of click-throughs you
    paid for.


    Even though Apple devised the `iAd` for Developers program to be a cost-effective
    solution for independent app creators, the `iAd` network should still be regarded
    as a premium advertising platform, so the per click-through rate is higher than
    many other mobile ad networks. Since `iAd` is an Apple brand that consumers trust,
    that premium may just be worth the extra expense—if you have the right mix of
    product and price.


    With a lot of `iAd` click-throughs and not enough actual purchases, some developers
    have experienced a cost per acquisition that’s much higher than the actual price
    of the app itself. If you’re selling a 99-cent app, that’s a difficult advertising
    expense to justify. Unless you have In-App Purchase items to up-sell to these
    new customers, you would likely be losing money instead of making it.


    But higher-priced paid apps and freemium apps may be the right fit for `iAd` for
    Developers. For many developers, it produces a better cost per acquisition than
    other mobile ad networks. Apple has announced that 75 percent of the participants
    in the `iAd` for Developers program have renewed their ad campaigns.


    Like any other advertising venture, if you feel your app would benefit from the
    `iAd` for Developers program, test the waters with a trial budget you can afford.
    By closely monitoring your ad campaign’s performance, you’ll quickly see if it’s
    a profitable selling tool for your app. To learn more about the `iAd` for Developers
    program, check out `http://advertising.apple.com/developers/`.


    ## Pay-Per-Install Incentives to Cross-Sell Apps


    Another interesting advertising concept is pay-per-install incentives. Instead
    of simply advertising your app within other apps on a pay-per-install basis (hoping
    for a decent conversion rate), incentives are provided to help motivate more users
    to install the advertised app. This typically works well only in games where users
    are rewarded with some kind of in-game virtual currency in exchange for downloading
    a specific app.


    For example, NimbleBit’s Pocket Frogs offers a free virtual frog to users who
    download a specified app from the App Store (see [Figure 12-5](#9781430262381_Ch12.xhtml#Fig5)).


    ![9781430262381_Fig12-05.jpg](images/9781430262381_Fig12-05.jpg)


    [Figure 12-5](#9781430262381_Ch12.xhtml#_Fig5). As an incentive to download specified
    apps, NimbleBit’s Pocket Frogs rewards those users with a free in-game exotic
    frog


    This kind of system usually requires a detection method for verifying the participating
    app was downloaded and run at least once. The host app needs to be notified that
    the task was successfully completed, and the user should be awarded the promised
    in-game incentive.


    Some developers have created their own strategic alliances among themselves to
    cross-promote each other’s apps with in-game rewards as download incentives. This
    works well for all parties involved, although results tend to be on a smaller
    scale.


    To really take advantage of this concept and reach a much larger audience across
    more games, you might want to employ a third-party service—like Tapjoy (`https://www.tapjoy.com`)
    or Flurry’s AppCircle Rewards (`http://www.flurry.com/product/appcircle/rewards/`)—that
    specializes in pay-per-install incentives. Pairing your app promotion with similar
    genre apps to reach a highly targeted audience, these programs have been known
    to drive hundreds of thousands of new installations a day, propelling your app
    into the App Store’s top charts. Although these types of campaigns are often more
    expensive than traditional banner advertising, they can really boost app sales.
    This works especially well with freemium games, since there’s no cost barrier
    to users to download, and once hooked on the game play, In-App Purchases can amortize
    the expense of the pay-per-install campaign.


    ## Staying Connected with Customers


    Maintaining consumer interest in your app is not just about attracting new customers;
    it’s also about keeping your existing customers happy. Remember when I talked
    about loyal customers being the best customers in [Chapter 8](#9781430262381_Ch08.xhtml)?
    The way to build customer loyalty is through high-quality support and delivering
    bug fixes and additional features/content in a timely manner.


    ### Delivering Frequent App Updates


    Don’t wait months before releasing updated versions of your app. Even without
    any reported bugs or crashes, you should update the app periodically, providing
    additional polish and value. A lack of updates can negatively affect your customers’
    perception of your app in the App Store. If consumers notice that your app hasn’t
    been updated in several months, they may be reluctant to purchase the app for
    fear that it’s no longer actively supported.


    By continuing to update the app, you’re enhancing the user experience and keeping
    your app top of mind. Even if your app’s overall customer usage eventually declines
    because of distractions from new app purchases, whenever a new version shows up
    in a customer’s Updates list, it serves as subtle reminder of your app’s value
    and your commitment to supporting it.


    If customers remain satisfied with your app, they will be that much more motivated
    to buy In-App Purchase items and other new products from you. A steady stream
    of updates also helps sustain customer usage, which is extremely important if
    your primary revenue stream is in-app advertising. As long as you keep delivering
    a rewarding and fun experience, people will continue to talk about your app. Continuous
    updates and high-quality customer support are big factors in driving word-of-mouth.


    ### Providing High-Quality Support


    In previous chapters, I’ve discussed the importance of setting up a support site
    and e-mail address for customers who need assistance or have questions. How you
    use that communication channel will ultimately determine its effectiveness as
    a business tool. Customer relationship management is the most organic form of
    direct marketing and sales.'
  raw: 'Print magazines usually require a three-month lead, so by the time your print
    ad’s issue hits newsstands, your app may have already fallen into the long tail
    of its life cycle—an opportune stage for the ad to revive consumer interest and
    app downloads.    Advertising can work when aimed at the right audience. Just
    tread carefully to see whether it’s a good fit for your iOS app before diving
    in with both feet. Keep in mind that no single marketing tactic will turn your
    app into a best seller. If you incorporate the many strategies you’ve learned
    from this book into an orchestrated marketing plan, you’ll soon be on the road
    to achieving success in the App Store.    Taking Advantage of iAd for Developers    What
    sets Apple’s iAd for Developers program apart from other in-app advertising options
    is that it seamlessly brings the App Store into the host app that’s showing your
    iAd. When people tap an iAd for Developers banner, they see a screen that resembles
    an App Store product page, displaying your app’s information, complete with description,
    customer ratings, screenshots, and even a purchase button.    Apple has deeply
    integrated this system with iOS and the App Store, so users can buy your app from
    that screen without ever leaving their host application. They can continue to
    use the current app while their new app purchase is being downloaded to their
    device in the background. There’s no inconvenience to the customer, and you just
    gained a new sale!    Because Apple controls the entire process—from ad presentation
    to purchase to download—your iAd for Developers campaign reports provide a truly
    accurate account of the conversion rate from click-through to actual purchase.
    Since you’re paying per click-through, this equates to your cost per acquisition—the
    actual cost of your new customers from this campaign based on the number of click-throughs
    you paid for.    Even though Apple devised the iAd for Developers program to be
    a cost-effective solution for independent app creators, the iAd network should
    still be regarded as a premium advertising platform, so the per click-through
    rate is higher than many other mobile ad networks. Since iAd is an Apple brand
    that consumers trust, that premium may just be worth the extra expense—if you
    have the right mix of product and price.    With a lot of iAd click-throughs and
    not enough actual purchases, some developers have experienced a cost per acquisition
    that’s much higher than the actual price of the app itself. If you’re selling
    a 99-cent app, that’s a difficult advertising expense to justify. Unless you have
    In-App Purchase items to up-sell to these new customers, you would likely be losing
    money instead of making it.    But higher-priced paid apps and freemium apps may
    be the right fit for iAd for Developers. For many developers, it produces a better
    cost per acquisition than other mobile ad networks. Apple has announced that 75
    percent of the participants in the iAd for Developers program have renewed their
    ad campaigns.    Like any other advertising venture, if you feel your app would
    benefit from the iAd for Developers program, test the waters with a trial budget
    you can afford. By closely monitoring your ad campaign’s performance, you’ll quickly
    see if it’s a profitable selling tool for your app. To learn more about the iAd
    for Developers program, check out `http://advertising.apple.com/developers/`.    Pay-Per-Install
    Incentives to Cross-Sell Apps    Another interesting advertising concept is pay-per-install
    incentives. Instead of simply advertising your app within other apps on a pay-per-install
    basis (hoping for a decent conversion rate), incentives are provided to help motivate
    more users to install the advertised app. This typically works well only in games
    where users are rewarded with some kind of in-game virtual currency in exchange
    for downloading a specific app.


    For example, NimbleBit’s Pocket Frogs offers a free virtual frog to users who
    download a specified app from the App Store (see [Figure 12-5](#9781430262381_Ch12.xhtml#Fig5)).    ![9781430262381_Fig12-05.jpg](images/9781430262381_Fig12-05.jpg)    [Figure
    12-5](#9781430262381_Ch12.xhtml#_Fig5). As an incentive to download specified
    apps, NimbleBit’s Pocket Frogs rewards those users with a free in-game exotic
    frog    This kind of system usually requires a detection method for verifying
    the participating app was downloaded and run at least once. The host app needs
    to be notified that the task was successfully completed, and the user should be
    awarded the promised in-game incentive.    Some developers have created their
    own strategic alliances among themselves to cross-promote each other’s apps with
    in-game rewards as download incentives. This works well for all parties involved,
    although results tend to be on a smaller scale.    To really take advantage of
    this concept and reach a much larger audience across more games, you might want
    to employ a third-party service—like Tapjoy (`https://www.tapjoy.com`) or Flurry’s
    AppCircle Rewards (`http://www.flurry.com/product/appcircle/rewards/`)—that specializes
    in pay-per-install incentives. Pairing your app promotion with similar genre apps
    to reach a highly targeted audience, these programs have been known to drive hundreds
    of thousands of new installations a day, propelling your app into the App Store’s
    top charts. Although these types of campaigns are often more expensive than traditional
    banner advertising, they can really boost app sales. This works especially well
    with freemium games, since there’s no cost barrier to users to download, and once
    hooked on the game play, In-App Purchases can amortize the expense of the pay-per-install
    campaign.    Staying Connected with Customers    Maintaining consumer interest
    in your app is not just about attracting new customers; it’s also about keeping
    your existing customers happy. Remember when I talked about loyal customers being
    the best customers in [Chapter 8](#9781430262381_Ch08.xhtml)? The way to build
    customer loyalty is through high-quality support and delivering bug fixes and
    additional features/content in a timely manner.    Delivering Frequent App Updates    Don’t
    wait months before releasing updated versions of your app. Even without any reported
    bugs or crashes, you should update the app periodically, providing additional
    polish and value. A lack of updates can negatively affect your customers’ perception
    of your app in the App Store. If consumers notice that your app hasn’t been updated
    in several months, they may be reluctant to purchase the app for fear that it’s
    no longer actively supported.    By continuing to update the app, you’re enhancing
    the user experience and keeping your app top of mind. Even if your app’s overall
    customer usage eventually declines because of distractions from new app purchases,
