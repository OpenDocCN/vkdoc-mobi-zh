- fmt: '# Pricing Strategies and App Store Optimization


    So if 99 cents is too low for a large percentage of apps, then what price is too
    high? It is generally believed that apps ranging from $0.99 to $1.99 are perceived
    as impulse buys. A price of $2.99 seems to be the threshold that causes people
    to think and evaluate the app with a higher degree of scrutiny before making a
    purchase decision. Real resistance kicks in at $4.99 and higher, which requires
    a particularly high-quality game or app with strong features. There are a handful
    of best-in-class apps that have prospered at the higher end of the price spectrum,
    such as The Omni Group’s `OmniFocus` at $19.99 and Cultured Code’s `Things` at
    $9.99.


    One of my favorite games, Firemint’s `Real Racing`, was originally launched at
    $9.99 to great fanfare. To sustain continued sales after several months of release,
    Firemint eventually dropped the price to $6.99 and then again to $4.99. This has
    enabled Firemint to extend the product’s life span and remain competitive among
    the new releases in the App Store without sacrificing too much revenue.


    When the highly anticipated sequel, `Real Racing 2`, was released, Firemint tried
    once again with a $9.99 price tag. It initially did quite well, taking advantage
    of those early adopters and loyal fans who couldn’t wait to play it. But sales
    eventually began to slowly decline, and Firemint reduced the price to $6.99 to
    help maintain its position on the App Store charts.


    `Real Racing` is not one of those games that can be developed for only a few thousand
    dollars. It’s a state-of-the-art virtual racing game that required a large development
    budget and many months of programming. It should be priced accordingly, reinforcing
    the perceived value. The reduced price of $4.99 for `Real Racing` and $6.99 for
    `Real Racing 2` seems like a steal for those consumers who were hesitant to buy
    those games at $9.99. Yet the games still retain a profitable price tag to help
    support continued development of updates and new games.


    iPad apps appear to command a much higher average price than iPhone apps. With
    its larger tablet screen, consumers perceive the iPad as more of a mobile computing
    replacement for netbooks and laptops, so there’s a belief that iPad apps are more
    powerful and feature-rich. This raises the overall price threshold, where an iPad
    version of an app can fetch at least one or two more dollars (if not more) than
    its iPhone counterpart. For example, the best-selling `Angry Birds` game is only
    99 cents on the iPhone, yet `Angry Birds HD` for the iPad does quite well at $4.99.


    While you can certainly make more money per app sale on the iPad, it’s still a
    smaller audience than that of the iPhone and iPod touch. Even at a lower price
    point, an iPhone app can still make more total revenue than its iPad counterpart
    due to sheer sales volume. But that’s only relevant if you offer two separate
    versions of your app: one for the iPhone and one for the iPad.


    A universal app is designed for both the iPhone and the iPad, yet is assigned
    only one price. A lot of work goes into optimizing an app’s UI for both devices.
    So, unless you have a good reason to price your universal app at 99 cents, it’s
    in your best interest to go with a higher price based on the perceived value,
    your competitors, and what the market will bear for that category.


    Just keep in mind that once your app has been released in the App Store, it’s
    much easier to later reduce your price than to increase your price. After a few
    weeks of sales, if you’re experiencing a lot of pushback from consumers over your
    app price, you can always experiment with sale prices or permanent price drops.
    But if you already established a set low price, raising the price at a later date
    can often cause friction with consumers who are angered by the increase.


    ## Improving App Discovery: The Art of Keywords and Names


    An app’s description in the App Store used to be searchable, which allowed developers
    to fill their app descriptions with tons of optimized keywords and text phrases.
    It was also a source of abuse, because many developers tried to “game” the system
    by including competitor app names and irrelevant, popular keywords in their descriptions
    in the hopes of ranking better in search results. In the summer of 2009, Apple
    changed the iTunes search algorithm to prevent this kind of misuse. In its place,
    Apple introduced keywords, which developers can assign to their submitted applications.


    Now, the only elements that are searchable in the App Store are your app’s name,
    keywords, and company name. Because of this change, it’s more important than ever
    that your app’s submitted name and keywords are search engine-optimized to improve
    your app’s visibility in related App Store searches.


    ### Assigning Keywords


    `iTunes Connect` limits the `Keywords` field to only 100 characters, so make every
    keyword count!


    Keywords can be single words or multiword phrases. For best results, Apple recommends
    separating multiple keywords with commas.


    Since your company name listed with your application is already searchable in
    the App Store, there is absolutely no need to include it in the `Keywords` field.
    Doing so is only a waste of your precious 100 characters.


    Although the `Keywords` feature may seem a lot more limiting than the lengthy
    text blocks of app descriptions, Apple has done you a small favor by making keywords
    hidden from public view. This prevents your competitors from easily copying all
    of your keywords! Of course, it’s a double-edged sword, in that you don’t have
    easy access to their keywords either.


    Since the keywords you select play such a crucial role in your app’s discovery
    in the App Store, it’s important to do a lot of search experiments of your own
    to find out which apps are included in the search results based on certain search
    queries. I mentioned this in [Chapter 2](#9781430262381_Ch02.xhtml) when discussing
    the benefits of researching your competition before developing your app.


    Your goal is to build a list of keywords that you think would benefit your app’s
    visibility in consumer searches. Sure, you’ll want to include keywords that work
    for your competition, but you’ll also want to use a thesaurus to figure out all
    the possible keywords related to your app’s feature set. You want to cover all
    the keywords that users might possibly search for. If you find a few terms that
    seem like intuitive queries and are not used by your competition, those may be
    valuable keywords to include. The fewer similar apps that appear in a user’s search
    results, the less competition you have when the user decides which listed items
    to explore.


    Here are some guidelines for picking keywords:


    * **Use relevant keywords.** Stick to relevant keywords for best results. If you’re
    selling a niche app, such as a writing tool or parked-car locator, it might seem
    like a good idea to include popular terms such as *fart* or *bikini* in an attempt
    to push your app in front of a broader audience, but that strategy won’t help
    you in the App Store. Not only do unrelated keywords hurt your search relevancy—lowering
    your search ranking in your actual genre—but including them is also a good way
    to get your app flagged by Apple during the review process.'
