    ## Tracking Web Site Traffic


    In [Chapter 7](#9781430262381_Ch07.xhtml), I stressed the value of tracking iOS
    app usage via third-party app analytics, such as Flurry. And it is equally beneficial
    to do the same with your web site. Tracking site traffic can shed light on where
    visitors are originating from, the browser versions they’re using, when and how
    many people are viewing your site, which web pages and links are the most popular,
    and much more.


    By monitoring when peak traffic hours occur for your site, combined with which
    days of the week generate the most downloads for your app in the App Store, you
    can best determine the optimal times to announce limited sale offers and related
    app news. On the flip side, site traffic statistics can also help pinpoint design
    weaknesses by listing which pages are responsible for the most visitor exits (leaving
    your site).


    Since English is a globally accepted language, your English-based app can achieve
    success in Apple’s various regional App Stores. But if you’re interested in producing
    localized versions of your app to increase sales in countries outside your own,
    which languages should you target first? Good web site traffic statistics can
    tell you which countries your visitors are from. Beyond the United States, are
    a large percentage of your site visitors coming from Italy, France, or Germany?
    Or maybe Japan and China? The combination of your international App Store downloads/sales
    reports and web site traffic statistics can help you determine on which countries
    to focus your translation efforts.


    Most web-hosting companies offer traffic tracking as part of their package. If
    your web host does not include traffic statistics (or if its bundled solution
    lacks robust features), check out the available third-party analytics services.
    Many of them are either free or very low cost. Here are a few of the popular offerings:


    - Google Analytics (`http://www.google.com/analytics/`)

    - Site Meter (`http://www.sitemeter.com`)

    - Mint (`http://haveamint.com`)


    If you’re already using Google Analytics for Mobile Apps within your iOS application,
    then setting up the free Google Analytics for your web site should be a no-brainer!
    Being able to monitor both your web site and iOS app usage statistics within the
    same web-based dashboard is a highly convenient and powerful solution.


    ## Anatomy of an iOS App Web Site


    Now you’re ready to design your application’s web page, but what elements should
    you include? Here’s a list of common ingredients to consider:


    - Consistent brand identity, displaying your app icon and name/logo

    - Caption and/or quick-pitch description

    - Apple’s App Store identity badge

    - Buy button

    - Pricing

    - Screenshots and video

    - Additional details, such as features, benefits, requirements, testimonials,
    and reviews

    - A sharing mechanism to easily share your page URL with others via social media,
    such as Twitter and Facebook

    - A community built with a blog, RSS, and e-mail newsletter

    - Customer support and contact information

    - Company identity

    - Links to cross-promote your other products

    - Download extras (optional)


    Although this may seem like a long list of elements, the really effective sites
    present the information in a very clean, simple layout that is easy for visitors
    to read. If you’ve evaluated the web sites for your favorite iOS apps and games,
    you’ve seen many (if not all) of these items already.


    [Figure 10-3](#9781430262381_Ch10.xhtml#Fig3) provides a conceptual mock-up of
    how all these components can be integrated into a single web page. After evaluating
    several leading iOS app web sites, this example outline will appear quite familiar.


    ![9781430262381_Fig10-03.jpg](images/9781430262381_Fig10-03.jpg)


    [Figure 10-3](#9781430262381_Ch10.xhtml#_Fig3). This web page mock-up demonstrates
    how to integrate the essential content into a clean, easy-to-read layout (designed
    with Balsamiq Mockups, `http://balsamiq.com/products/mockups/`)


    Unlike a printed page, a web page can scroll vertically, so it can contain more
    content. The trick is to avoid overwhelming the user with too much information
    all at once. This is achieved by placing only the most important “quick-pitch”
    data front and center at the top of the screen. Those users interested in reading
    more can scroll down the page for additional details. This enables you to space
    out the content so that the design can “breathe” on the page.


    If the top portion of your page is overcrowded, it will appear cluttered, making
    it difficult to read. By keeping the design simple, you make the page much easier
    for the human eye to quickly scan and process. A product-based web site is little
    more than an online marketing brochure, so it must convey its message quickly
    and efficiently. The Web is a very visual medium, so don’t weigh down the page
    with too much text. Of course, you want to include enough rich, related keywords
    to successfully describe the app to both consumers and search engines, but it’s
    important to draw in visitors with appealing imagery.


    Now that you’ve had an overview, let’s take a closer look at each of the elements
    your web site should contain.


    ## App Brand Identity


    The bare-bones mock-up shown in [Figure 10-3](#9781430262381_Ch10.xhtml#Fig3)
    could serve as the layout for almost any iPhone app or game web page. What will
    make it unique to your application will be the visuals you incorporate. The web
    imagery should directly reflect your application’s icon and interface theme. Brand
    consistency is key.


    Always, always, always display your app’s icon! The icon visually represents your
    product in the App Store, so you need to reinforce that same imagery on your web
    site. The goal is to condition consumers to associate that icon with your application’s
    name and functionality. Whenever they see that icon in the App Store, you want
    them to immediately recognize it. That’s why I recommended incorporating the app
    icon into the overall logo design in [Chapter 4](#9781430262381_Ch04.xhtml). And
    likewise, the app icon should also be a prominent part of your web page design.


    As an example, I’ve designed a fake web page for the fictional Breadcrumbs app,
    based on the generic layout from [Figure 10-3](#9781430262381_Ch10.xhtml#Fig3).
    As you can see from [Figure 10-4](#9781430262381_Ch10.xhtml#Fig4), the page structure
    is identical to the mock-up outline, but the unique branding in the underlying
    design theme sets it apart.


    ![9781430262381_Fig10-04.jpg](images/9781430262381_Fig10-04.jpg)


    [Figure 10-4](#9781430262381_Ch10.xhtml#_Fig4). Based on the mock-up shown in
    [Figure 10-3](#9781430262381_Ch10.xhtml#Fig3), this Breadcrumbs web page reinforces
    the app’s brand identity


    Notice how the app’s icon is an integrated part of the Breadcrumbs logo in [Figure
    10-4](#9781430262381_Ch10.xhtml#Fig4). The branding is further supported by using
    the icon’s blue-sky horizon as the web page’s background image.


    The nice thing about the Internet is that its accessibility truly equalizes the
    playing field for developers. You may not have the massive marketing budgets of
    the big publishers, but if you’re skilled at using Adobe Photoshop and a web page
    editor, you can make your site look just as impressive.'
