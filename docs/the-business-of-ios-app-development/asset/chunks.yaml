- fmt: "# Designing for Multiple iOS Devices\n\nIn [Chapter 2](#9781430262381_Ch02.xhtml),\
    \ I stressed the importance of embracing multiple iOS device targets when developing\
    \ your apps. It’s vital that your app’s icon and UI elements are designed to best\
    \ suit the various iOS devices. With the majority of iPhones and iPads being Retina\
    \ display, it is best to optimize for that.\n\nYou don’t want your app to simply\
    \ be compatible with newer versions of iOS. You want your app to look absolutely\
    \ amazing on the latest iOS devices, enticing potential customers to tap that\
    \ Buy button in the App Store. One major step to achieving this is including appropriately\
    \ sized icons and images within your app for all the related iOS targets your\
    \ app is supporting, but what does that entail?\n\nBe sure to know which devices\
    \ you want to tackle so that you can design the screens accordingly. For a quick\
    \ reference, I’ve listed the device resolutions:\n\n- iPhone 5s/5c/5 (Retina):\
    \ 640 × 1136 pixels\n- iPhone 4s/4 (Retina): 640 × 960 pixels\n- iPhone 3GS and\
    \ below (non-Retina): 320 × 480 pixels\n- iPad 5/4/3 (Retina): 2048 × 1536 pixels\n\
    - iPad 2/1 (non-Retina): 1024 × 768 pixels\n- iPad mini (Retina): 2048 × 1536\
    \ pixels\n- iPad mini (non-Retina): 1024 × 768 pixels\n\n## Preparing UI Art Assets\n\
    \nThe large 1024 × 1024 pixel App Store version of your app icon is one of the\
    \ few image sizes that is consistently the same across all iOS targets. Everything\
    \ else requires different sizes, as described in Apple’s HIG. iOS 7 introduced\
    \ a slightly different size for the app icon. The following is a summary of the\
    \ new requirements:\n\n- **iPhone Retina** (5, 5s, 5c, 4s, 4)\n  - App Store icon:\
    \ 1024 × 1024 pixels\n  - App icon: 120 × 120 pixels\n  - Spotlight icon: 80 ×\
    \ 80 pixels\n  - Settings icon: 58 × 58 pixels\n  - Launch image: 640 × 960 pixels\n\
    - **iPad Retina** (iPad 3, 4, Air, mini Retina)\n  - App Store icon: 1024 × 1024\
    \ pixels\n  - App icon: 152 × 152 pixels\n  - Spotlight icon: 80 × 80 pixels\n\
    \  - Settings icon: 58 × 58 pixels\n  - Launch image: 2048 × 1536 (landscape)\
    \ and 1536 × 2048 (portrait)\n- **iPad non-Retina** (1, 2, mini)\n  - App Store\
    \ icon: 512 × 512 pixels\n  - App icon: 76 × 76 pixels\n  - Spotlight icon: 40\
    \ × 40 pixels\n  - Settings icon: 29 × 29 pixels\n  - Launch image: 1024 × 768\
    \ (landscape) and 768 × 1024 (portrait)\n\nIt is a good idea to design your app\
    \ icon at 1024 × 1024 so you can easily create smaller versions of them. Your\
    \ default launch image for the iPhone and iPad should include the status bar area.\
    \ All of these should be saved in PNG format.\n\n## Orientation Considerations\
    \ on the iPad\n\nWith the iPhone’s small screen, providing an efficient UI design\
    \ often requires a dedicated orientation, such as a portrait-only app. That’s\
    \ perfectly acceptable on the iPhone, but the iPad’s larger display allows more\
    \ of your interface elements to be consolidated into a single window, providing\
    \ enough screen space in both portrait and landscape views. In fact, Apple recommends\
    \ that iPad apps support all orientations.\n\nIf your iPhone app is locked into\
    \ a single orientation, you’ll want to rethink the design when porting it to the\
    \ iPad so that it can accommodate multiple orientations on the larger tablet screen.\
    \ On the iPad, you should include a default launch image for every orientation\
    \ that your app supports, since you won’t know how the user will be holding the\
    \ tablet before launching your app.\n\n## Double the Fun with Retina Display Screens\n\
    \nLooking at the various icon size differences between the iPhone 5s Retina display\
    \ and the older iPhone models (all iPhones before iPhone 4), you’ll notice that\
    \ the Retina display doubles the width and height. This also holds true for all\
    \ other art assets, such as background images.\n\nSo how does your iPhone app\
    \ differentiate between the two sizes? Apple has made this very easy for developers.\
    \ If a background image is named `background.png`, then simply name the double-sized\
    \ Retina display version `background@2x.png`. That `@2x` identifier should be\
    \ placed after the identical file name, but before the `.png` file extension.\
    \ When run on a Retina display, your compiled app will look for the file with\
    \ the `@2x` identifier and load that image accordingly. If a Retina display version\
    \ doesn’t exist in your app, the lower-resolution image will be displayed instead.\n\
    \nAs I mentioned in [Chapter 2](#9781430262381_Ch02.xhtml), don’t just upscale\
    \ your existing graphics, save them as larger `@2x` versions. The majority of\
    \ devices currently used are Retina devices, so be sure to use `@2x` resolutions\
    \ or there will be noticeable pixilation. If you originally created your images\
    \ in a bitmapped format using Adobe Photoshop or a similar graphics tool, your\
    \ best bet is to re-create those images specifically for the Retina display sizes\
    \ to ensure crisp, high-resolution interface elements. Trust me, perfecting your\
    \ app’s visual appeal is worth all the extra design work involved in supporting\
    \ Apple’s Retina display.\n\nWhenever possible, you should create your icons and\
    \ UI images in a vector-based format such as Adobe Illustrator so that you have\
    \ the flexibility to adapt to any new sizes that Apple requires in the future.\
    \ That would save you from the hassle of re-creating small bitmap images. I talk\
    \ more about bitmap and vector-based design in the following section, so keep\
    \ reading.\n\n## Designing for iOS 8\n\nApple’s latest updates to iOS certainly\
    \ introduced a radical change in its design direction. The major design change\
    \ was in iOS 7, with iOS 8 adding only minor design enhancements. The major focus\
    \ of the iOS 8 update was to add new features, including introduction of a new\
    \ programming language (see the “Swift” sidebar). When the iOS 7 update was introduced,\
    \ it was polarizing, with those that embraced it and those that hated it. As of\
    \ February 1, 2014, Apple required any new apps or app updates to be built with\
    \ Xcode 5 and optimized for iOS 7. Since Xcode 6 and iOS 8 have been released,\
    \ it is recommended that any new apps or app updates be prepared using these latest\
    \ tools.\n\nAs you’ve probably already noticed, the design style has moved toward\
    \ a “flat” design and being less “skeuomorphic.” A flat design is more focused\
    \ on the experience, with fewer distractions from superfluous elements like shadows\
    \ and textures that don’t necessarily help the user in any way. *Skeuomorphism*\
    \ is when an interface resembles elements from reality; for example, paper texture,\
    \ a bookshelf holding a catalog of books, and so forth. Because iOS 6 interfaces\
    \ were very detailed with textures and life-like objects, and took skeuomorphism\
    \ to a bit of an extreme at times, the response to that was a flat design movement.\
    \ Many make the incorrect assumption that the opposite of skeuomorphic design\
    \ is flat design, when in reality something can be flat but still resemble something\
    \ in real life. So why talk about this? One of the first things that you will\
    \ need to define is the direction of your app, which impacts your design. Considering\
    \ recent trends, I feel that a flat-design approach is most consistent with the\
    \ operating system and the apps that are coming out now.\n\n### SWIFT"
