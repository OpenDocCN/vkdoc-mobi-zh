- fmt: '# Seeking Feedback at Runtime


    As I’ve noted in earlier chapters, prior to iOS 4, when a user deleted an app
    from the home screen, Apple automatically prompted the user to first rate the
    app. Although that was a convenient way to solicit customer feedback, it was certainly
    not the most opportune time to ask for an opinion. If the user had chosen to delete
    your app, then he probably didn’t like it or had not found it useful. In either
    situation, if he did opt to post a rating, odds were it would be a negative one.


    Thankfully, Apple removed that rate-upon-deletion feature in iOS 4. But even with
    that welcome fix, unhappy users are typically much more motivated than satisfied
    users to visit the App Store on their own and manually post a review. They have
    a bone to pick and want everyone to know about it. Let’s consider how to encourage
    ratings from users who are happy with your app.


    We’re all painfully aware that customer ratings and reviews in the App Store can
    greatly affect the sales of an app. There are even various rumors that in iOS
    7, reviews can impact your rankings on specific searched terms. So, how does a
    developer combat the uneven emphasis on negative feedback? Obviously, the first
    answer is to make a well-thought, polished app. But what can you do beyond that?


    Why not prompt your satisfied users for positive feedback within the app? It’s
    as easy as having your app display its own `UIAlertView`, asking users who like
    the app to please rate it. You can do this with only a handful of code lines.


    First, fire up Xcode and create a new iPhone project, using the View-based Application
    template as the foundation. (You can just as easily create this as an iPad project
    if that’s the device you prefer to target.) Let’s name the project `AskForRating`.
    In this example, you’ll simply be adding a button to the `AskForRating` project’s
    main screen. In your own apps, you may want to give the user the option to rate
    your app at any time by including a button on your Settings or Info screen.


    Next, you’ll need to add a reference to the `UIAlertViewDelegate` in the `@interface`
    call of your `AskForRatingViewController.h` header file. You’ll also want to add
    an `IBAction` method for the button you’ll be creating in Interface Builder later.
    Your `AskForRatingViewController.h` file should now consist of the following code:


    ```

    #import <UIKit/UIKit.h>


    @interface AskForRatingViewController : UIViewController <UIAlertViewDelegate>
    {


    }


    - (IBAction)buttonPressed:(id)sender;


    @end

    ```


    After saving that file, open the `AskForRatingViewController.m` implementation
    file and add the following code:


    ```

    - (IBAction)buttonPressed:(id)sender {

        UIAlertView *buttonAlert = [[UIAlertView alloc] initWithTitle:@"Help Spread
    the Word" message:@"If you like this app, please rate it in the App Store. Thanks!"
    delegate:self cancelButtonTitle:@"Maybe Later" otherButtonTitles:@"Rate It Now",
    nil];

        [buttonAlert show];

        [buttonAlert release];  // THIS LINE CAN BE REMOVED

    }


    - (void)alertView:(UIAlertView *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex
    {

        if (buttonIndex == 1) {

            NSURL *url = [NSURL URLWithString:@"YOUR APP STORE URL"];


    NSURL *url= [NSURL URLwithString:@" http://itunes.apple.com/WebObjects/MZStore.woa/wa/viewContentsUserReviews?pageNumber=0&sortOrdering=1&type=Purple+Software&mt=8&id=YOUR_APP

    "];

            [[UIApplication sharedApplication] openURL:url];

        }

    }

    ```


    The `(IBAction)buttonPressed` method receives the tapped button action and proceeds
    to display the `UIAlertView`, asking the user to rate the app. The `alertView`
    code is called when the user chooses either the Maybe Later or Rate It Now button
    in the `UIAlertView` dialog box. If the Rate It Now button is selected, your App
    Store URL is launched, sending the user directly to your app’s page in the App
    Store.


    Don’t forget to replace the placeholder string `"YOUR APP STORE URL"` with your
    unique App Store URL.


    **Tip** To grab the correct App Store URL, simply locate your app in the desktop
    Mac version of iTunes, select Copy Link from either the pop-up menu next to the
    Buy button or the contextual menu that appears when you Ctrl-click your app icon,
    and then paste it into the URL string in your code.


    Save the file in Xcode, and move on to the last task: creating your button. Double-click
    the `AskForRatingViewController.xib` file to open it in Interface Builder. Add
    a Round Rect Button to your view. Rename the button’s title to `Rate This App`.
    If desired, you could create your own custom button instead. Then wire the button’s
    Touch Up Inside connector to the File Owner’s `buttonPressed` connector. Save
    and close the XIB file.


    If you run your Xcode project in the iOS Simulator, you’ll see that pressing the
    `Rate This App` button successfully prompts you to rate the app with a `UIAlertView`
    dialog box (see [Figure 5-1](#9781430262381_Ch05.xhtml#Fig1)). However, if you
    click the Rate It Now button, the App Store URL won’t load within the iOS Simulator,
    so you’ll need to test your app on an actual iPhone, iPad, or iPod touch to ensure
    it properly fetches your app’s page in the on-device App Store.


    ![9781430262381_Fig05-01.jpg](images/9781430262381_Fig05-01.jpg)


    [Figure 5-1](#9781430262381_Ch05.xhtml#_Fig1). Encourage users to rate your app
    with a built-in custom prompt


    Take note of the wording used in our example’s `UIAlertView`. By using the title
    “Help Spread the Word” as the call to action, you’re inviting fans to help evangelize
    your app. And with the message “If you like this app, please rate it in the App
    Store,” you’re specifically addressing your satisfied users. Of course, that won’t
    stop haters from using this feature, but the wording does set a positive tone.
    Even the cancel button is labeled Maybe Later, letting users know that their feedback
    is always welcome at any time.


    # When to Ask for Ratings


    Although our previous example provides a nice solution, it’s still a passive one,
    relying on the users to tap the `Rate This App` button to initiate the action.
    If you place the button on your Settings or Info screen, users may stumble upon
    it only while looking for help with your app. And if they’re searching for help,
    they may be frustrated—not a good time to hit them up for a review.


    You want to ask users to rate your app when they’re in the best possible mood,
    such as moments when they are enjoying your app. You may want to consider taking
    a more proactive stance, initiating the display of your `UIAlertView` at strategic
    times, such as the following:


    - After several days of usage, if users have not deleted your app yet, they must
    have found some positive value in it. Include code to check the `NSUserDefaults`,
    determining how many days the app has been installed upon app launch. Depending
    on how often your app is likely to get used (daily or weekly), pick an appropriate
    time to pop up the rating request dialog box—maybe after 5 to 15 days of being
    installed.

    - If your app is a game, display the rating request dialog box when they’re feeling
    good, like after finishing a difficult level or achieving a high score.

    - If it’s a productivity app, you may want to display the rating request dialog
    box when users have a positive sense of accomplishment—after writing a document,
    editing a photo, checking off a list of tasks, and so on.


    Lima Sky’s popular Doodle Jump uses a fun pop-up banner image on the game’s main
    menu screen to solicit positive App Store ratings (see [Figure 5-2](#9781430262381_Ch05.xhtml#Fig2)).
    Notice the implied request for a good rating by showing five stars in the banner.
    You can see that the caption “Love Doodle Jump?” specifically addresses the game’s
    happy customers. These are subtle yet effective strategies to inspire users to
    help out.


    ![9781430262381_Fig05-02.jpg](images/9781430262381_Fig05-02.jpg)'
