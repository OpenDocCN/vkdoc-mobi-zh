    Let’s step through the new code so you can see exactly what’s happening. The `showMailComposer`
    function does all the heavy lifting of crafting an e-mail message and then displaying
    it in a new embedded `MFMailComposeViewController`. For this example, the message
    tells a friend to check out the fictional Breadcrumbs app in the App Store. It
    even includes a link to the official web site. Supplying all of this for the user
    makes sharing extremely convenient and simple. All the user needs to do is type
    a friend’s e-mail address in the To field and tap the Send button (see [Figure
    5-7](#9781430262381_Ch05.xhtml#Fig7)).


    ![9781430262381_Fig05-07.jpg](images/9781430262381_Fig05-07.jpg)


    [Figure 5-7](#9781430262381_Ch05.xhtml#_Fig7). When users tap the Send Email button,
    the Mail Composer is displayed within the app


    Working our way down, below the `showMailComposer` method is the `mailComposeController`
    event, which is called when the user presses the `MFMailComposeViewController`’s
    Cancel or Send button. This is the place to add code that notifies the users of
    the status of their e-mail action. As you can see from the listed code, you can
    test the received results for the status of the e-mail, and then report to the
    user that the e-mail was successfully delivered or that the process failed for
    some reason.


    **Tip**  It’s always a good idea to provide users with frequent status updates,
    especially when sending data via an online connection. If a user clicks the Send
    button and the `MFMailComposeViewController` is dismissed without any further
    communication, the user is left waiting, wondering whether the e-mail was delivered.
    In the example `mailComposerController` event, if the received result signals
    a successful delivery, then the user is notified via a `UIAlertView`. The user
    is also notified if the e-mail could not be sent. In your never-ending quest to
    avoid negative customer ratings in the App Store, communicating the current status
    of e-mail actions will help prevent users from getting frustrated.


    The very last piece of the puzzle is to have the Send Email button call the s`howMailComposer`
    method when tapped. This is easily accomplished by adding a single line to the
    action sheet’s `didDismissWithButtonIndex` event (see the code highlighted in
    bold):


    ```

    - (void)actionSheet:(UIActionSheet *)actionSheet didDismissWithButtonIndex:(NSInteger)buttonIndex
    {

        if (buttonIndex != [actionSheet cancelButtonIndex]) {

            if (buttonIndex == 0) {

                // In-App Email, requires iOS 3.0 or higher

                [self showMailComposer];

            }

            if (buttonIndex == 1) {

                // Add Twitter code here.

            }

            if (buttonIndex == 2) {

                // Add Facebook code here.

            }

        }

    }

    ```


    When running the `TellAFriend` project in the iOS Simulator, the app will report
    that your e-mail was successfully delivered, but it does not actually send your
    message. For best results, test your In-App Email code on an actual iOS device
    with at least one e-mail account already set up in the Mail app.


    And that’s all there is to it! Adding In-App Email support to your app actually
    requires very few lines of code compared to how much functionality you get in
    return.


    Integrating Twitter and Facebook


    Beyond sending e-mail, you may want to also give users the ability to post messages
    to their Twitter and Facebook accounts. And although it’s nice when users blatantly
    promote your app, another, more subtle way to increase awareness for your app
    is to deeply integrate social networking with other core features in your app.
    For example, if you’re building a game, enabling users to share their high scores
    via Twitter and Facebook will not only breed synergy among players, but may also
    attract new customers who want to get in on the action. Lima Sky’s Doodle Jump
    includes a seamless user option for sharing high scores via Twitter and Facebook
    (see [Figure 5-8](#9781430262381_Ch05.xhtml#Fig8)).


    ![9781430262381_Fig05-08.jpg](images/9781430262381_Fig05-08.jpg)


    [Figure 5-8](#9781430262381_Ch05.xhtml#_Fig8). After finishing a game in Lima
    Sky’s Doodle Jump, users are prompted to share their high scores on Twitter and
    Facebook


    What gets posted is the following message: “I just got up to 5,529 in #DoodleJump!!!
    Beat that! `http://bit.ly/DoodleJump-App`.”


    Besides flaunting your high score, it throws down a challenge to anyone who thinks
    they can beat it with a convenient link to Doodle Jump in the App Store. That’s
    a great way to get your customers to help promote and sell additional copies of
    your game while they’re busy sharing high scores with their friends!


    A more comprehensive extension of community building is to integrate one of the
    many social gaming platforms currently available for iOS games, as discussed later
    in this chapter. For now, let’s look at Twitter and Facebook.


    When building a pre-populated tweet like the preceding one, be sure to use appropriate
    hash tags and a good URL tracker such as goo.gl. This will show you the number
