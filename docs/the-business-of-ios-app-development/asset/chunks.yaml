- fmt: '# You can even use the service to keep tabs on your competitors! Sign up for
    free at `http://www.google.com/alerts`.


    ## The Art of Crafting Effective Press Releases


    Once your app becomes available in the App Store, you’ll want to tell the world
    about it! Sure, notifying your followers on Twitter, Facebook, and your blog are
    important first steps. But you’ll also want to announce the news on a grander
    scale to reach as many iPhone, iPad, and iPod touch users as possible. One way
    to accomplish this is to send out a press release to all the major technology
    and mobile news sites.


    Even if you’re a well-established developer in the Mac or iOS communities, don’t
    assume that the major news outlets are watching your blog or Twitter posts. With
    the constant flood of tech news that comes across journalists’ desks on a daily
    basis, your news needs to get their attention, so take the time to deliver important
    announcements directly to their e-mail inboxes.


    Press releases are not limited to only new products. Send out a press release
    to announce anything that’s newsworthy, such as new app versions and special limited-time
    sale offers and promotions.


    ## The Essential Ingredients of a Press Release


    So, how does one write an effective press release? Do not simply copy and paste
    the app announcement from your blog into an e-mail message!


    Press releases consist of specific formatting. By following the standard rules
    and syntax for press releases, you’ll be making it much easier for reporters to
    quickly scan your story for the pertinent facts.


    **Note**  Do you have to follow a standard press release format? No, some developers
    have found success with unique clever announcements, but take great care to ensure
    that the press release remains easy to read and contains all of the necessary
    information. Sometimes “too creative” can backfire, such as a press release formatted
    in Objective-C code syntax, which would receive quite a bit of attention and admiration
    from developer blogs, but might prove extremely difficult for nonprogrammer journalists
    to decipher. If you have your heart set on creating a clever press release for
    select recipients, be sure to also prepare a normal one for those news sites that
    may not “get the joke” or are unable to accept nonstandard press releases.


    Using Streaming Colour Studios’ press release for Dapple as a visual example (see
    [Figure 12-1](#9781430262381_Ch12.xhtml#Fig1)), I’ll walk you through each of
    the essential elements of a press release to convey the information that journalists
    need.


    ![9781430262381_Fig12-01.jpg](images/9781430262381_Fig12-01.jpg)


    [Figure 12-1](#9781430262381_Ch12.xhtml#_Fig1). Using Streaming Colour Studios’
    Dapple announcement as an example, this illustration pinpoints the essential ingredients
    for effective press releases


    Referring to [Figure 12-1](#9781430262381_Ch12.xhtml#Fig1), let’s go over each
    component and its importance in the press release format.


    **Caution**  Those of you who think this press release stuff all seems like common
    sense are one step ahead of the game. You would be surprised at just how many
    developers forget to include vital information—such as pricing, a web site URL,
    and even contact information—in their press releases. How are journalists supposed
    to write a good story based on your new app announcement if they can’t reach you
    with any additional questions they have? They won’t. Incomplete press releases
    simply get discarded, and the media moves onto the next story. Don’t let that
    happen to you!


    ### Release Instructions (A)


    Typically, if your app is already available, you use the phrase “FOR IMMEDIATE
    RELEASE” (in all caps).


    If you’re sending a press release in advance of the product’s official launch
    and want the press to hold off on publishing the story until then, you could specify
    “UNDER EMBARGO UNTIL” and specify a date.


    Just be aware that many news sites and blogs actively ignore embargoes, always
    eager to be the first to break new stories.


    If it’s imperative that your announcement remains under wraps until the product
    is available, you may want to wait to send out the press release until the morning
    of the app’s actual debut in the App Store. Some publicists recommend sending
    out the press release the night before. The problem is that many news sites report
    around the clock, and your press release just might get coverage in the middle
    of the night while your target audience is sleeping. Then the story is buried
    by newer stories in the morning. That’s why it’s a good idea to research the reporting
    habits of each of the iOS-related news sites and blogs. This will allow you to
    better gauge when to send them your press release.


    ### Subject Line (B)


    The most important element of your press release is the subject line. This title
    needs to capture the attention of anyone who reads it, whether it’s the subject
    line of an e-mail or the headline of a hyperlink on a news site.


    Traditionally, the subject line formula is “company releases product for platform,”
    replacing company, product, and platform with your specifics. In [Figure 12-1](#9781430262381_Ch12.xhtml#Fig1),
    this translates to “Streaming Colour Studios Releases Dapple for iPhone/iPod touch.”


    Never, never, never add marketing adjectives like “amazing” or “exciting” to the
    subject line. Doing so only makes your press release look like it was written
    by an amateur. Unlike your other marketing materials, a press release should stick
    to only the facts, without the flourish of marketing jargon. But at the same time,
    to compete with the hundreds of other press releases that arrive daily, your subject
    line should be both informative and captivating. If you’re announcing a new version
    of an existing app that has previously won awards, it’s perfectly acceptable to
    include “award-winning” in the subject line.


    Since the goal is to grab the attention of the media, if the app name is not reflective
    of its unique, pioneering features, then adjust the subject line accordingly.
    Instead of saying “Electric Butterfly Releases XRayMed for the iPad,” the subject
    might draw more attention if worded “Electric Butterfly Releases First X-Ray Reader
    App for the iPad.” You can always mention your app’s name in the summary line
    below the subject title. (And if you do boast of being first to market with a
    particular app or feature, be sure that’s true!)


    ### Summary Line (C)


    This is the second most important element of your press release. If journalists
    are remotely intrigued by your subject line, this brief one-sentence summary will
    help determine whether they continue to read the rest of the press release. Many
    developers opt not to include this line, using only the subject line to lead into
    the introductory paragraph, but I highly recommend including a summary line to
    help deliver the basics even if the reader stops there.


    In the case of the Dapple press release in [Figure 12-1](#9781430262381_Ch12.xhtml#Fig1),
    the subject line and summary line together convey that Streaming Colour Studios
    released Dapple for iPhone and iPod touch and that this paint-mixing puzzle game
    is now available in Apple’s App Store. If readers only bothered to read those
    two lines, they would still be aware of the most important information: what your
    app is and where to get it.


    ### Introduction (D)


    The first paragraph begins with your location and release date, followed by a
    rehash of your subject and summary lines. This introduction should be a single
    paragraph with only a couple sentences. It should state that your company announces
    the release of a specific product, what it is, who the target audience/platform
    is, and where it’s available.


    ### Description (E)


    Remember when I talked about crafting an “elevator pitch” for your app description
    in Chapter 10?'
