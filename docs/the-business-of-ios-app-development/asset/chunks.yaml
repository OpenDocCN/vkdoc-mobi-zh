  trans: '

    # 应用内购买的设置与使用


    您无需自行维护客户账户管理系统和电子商务系统。`Store Kit` 框架能够为您的顾客提供无缝的交易流程，使他们能使用现有的 `iTunes` 登录账号，享受快捷无痛的购买体验。


    您想通过应用内购买销售的每件商品，都需要在 `iTunes Connect` 中配置为独立的“应用内购买产品”，这与提交标准 iOS 应用的方式类似。每个应用内购买项目都会被分配至其关联的父级应用，以便
    `iTunes App Store` 知晓产品之间的关联关系。与常规应用一样，每个应用内购买项目在上架到您的应用之前，都需要通过 Apple 应用审核团队的批准。本章后续部分将详细描述这一完整的设置过程。


    ## 销售更多内容


    那么，对于消费者来说，典型的应用内购买是怎样的呢？我最喜欢的应用之一，ComiXology 出品的 *Comics*，就是一个绝佳的例子。*Comics*
    是一款免费的电子漫画阅读器，其创新的浏览引擎让用户在 iPhone 或 iPad 屏幕上轻松阅读漫画。该应用预置了来自 DC、漫威（Marvel）和 Image
    Comics 等热门出版商提供的数十部免费数字漫画。


    大多数免费漫画都是热门系列的第一期，这为新读者提供了极佳的入门机会。*Comics* 不仅给顾客带来了立竿见影的价值，这些免费漫画还让人们迷上了各种系列。当他们想要更多内容时，应用内购买就登场了。


    在 *Comics* 内部，有一个易于使用的商店目录，陈列着从免费到每本 1.99 美元不等的漫画。所有付费漫画都在 `iTunes Connect` 中被配置为单独的应用内购买项目。如果您决定购买某一期特定的漫画书，`App
    Store` 会显示一个默认对话框，请求您确认对此项目的购买请求（参见图 8-4）。


    ![9781430262381_Fig08-04.jpg](img/9781430262381_Fig08-04.jpg)


    图 8-4. 在 *Comics* 应用中购买数字漫画时（左图），`App Store` 会显示一个默认对话框，请求确认您对此项目的应用内购买请求（右图）。


    如果点击对话框中的“购买”按钮，系统会要求您输入 iTunes 登录信息，这与通过 `iTunes Store` 进行的任何其他购买流程类似。一旦登录信息确认无误，安全交易便会使用您现有
    iTunes 账户的账单信息完成，您购买的项目会立即开始下载到 *Comics* 应用中（参见图 8-5）。仅此而已！无需应付繁琐的订单表格。这是一个极其简单的购买流程，只需轻点几下手指。


    ![9781430262381_Fig08-05.jpg](img/9781430262381_Fig08-05.jpg)


    图 8-5. 在确认购买和您的 iTunes 登录信息后（左图），交易完成，您购买的数字漫画会立即开始下载到 *Comics* 应用中（右图）。


    您可能已经注意到，*Comics* 的目录列表看起来与 `App Store` 相似。但您可以自行设计应用内商店的外观，以模仿您自己的用户界面设计。正如您在之前的例子（如
    LandFormer 和 We Rule Quests）中看到的那样，`Store Kit` 框架为您提供了完全的灵活性，可以自定义这些项目在应用中的显示方式。


    大多数人认为游戏和娱乐类应用将成为应用内购买的主导力量，因为销售数字漫画、电子书、新游戏关卡和其他虚拟世界组件看起来非常适合微交易。但事实上，只要稍加创意，应用内购买几乎可以成为任何类别（旅行、生活、生产力等）应用的有效收入引擎。*《男士健康》*
    杂志就是一个很好的例子。


    *《男士健康》* 杂志的健身应用 Men''s Health Workouts，初始售价为 1.99 美元，包含了大量的训练和锻炼项目。但它也提供额外的训练包，可以通过应用内购买获得（参见图
    8-6）。这里有一个巧妙之处：每月会免费上传一个附加训练包（可在应用内访问），这不仅鼓励了用户的持续参与，也有助于推广其他可供出售的附加内容。除此之外，Men''s
    Health Workouts 中提供的应用内购买项目，其展示设计主题与应用其余自定义界面保持一致，从而提供了无缝的用户体验。


    ![9781430262381_Fig08-06.jpg](img/9781430262381_Fig08-06.jpg)


    图 8-6. 并非只适用于游戏！像 Men''s Health Workouts 这样的应用证明了，应用内购买在其他类别中同样可以发挥强大作用。并且 `Store
    Kit` 框架为您提供了完全的灵活性，可以自定义这些项目的显示方式。


    ## 提供服务与订阅


    我们已经看到了几个可下载内容的例子，但服务和订阅呢？Simplenote 是两者的绝佳范例，它为其年度高级服务采用了应用内订阅模式。除了 Simplenote
    免费提供的笔记同步基本功能外，高级服务还提供额外的同步功能、增强的支持，并隐藏了应用内广告（参见图 8-7）。


    ![9781430262381_Fig08-07.jpg](img/9781430262381_Fig08-07.jpg)


    图 8-7. 免费笔记同步应用 Simplenote（此处显示的是 iPad 版本）使用应用内购买来销售订阅服务，鼓励用户升级到其年度高级服务。


    对于这个原本优秀的 Simplenote，我有一点小意见：升级界面（参见图 8-7）并未包含高级服务所提供的具体优势的详细信息。若要了解更多信息，您必须点击“高级服务包含什么？”按钮，该操作会从应用跳转到
    Mobile Safari 浏览器，并加载 Simplenote 网站上的一个页面。诚然，Simplenote 的笔记同步服务也可作为基于 Web 的应用以及通过众多第三方应用使用，因此将所有查询引导到一个集中的高级服务网页，使得开发者只需为所有相关应用管理一个信息来源。但是，有多少
    Simplenote 用户会真正花时间去点击那个按钮呢？


    便捷性是冲动购买的重要因素。Simplenote 在高级服务方面做得很好，但试想一下，如果高级功能的详细信息就在应用内的升级界面上进行宣传，还能多卖出多少订阅计划呢？


    ## 展示是成功的关键


    如何让用户购买您的应用内购买产品？方法跟最初让用户购买您的应用是一样的：提供一个他们想要的、有吸引力的产品包。除了创造出色的附加内容，您还必须向潜在客户传达他们为何需要购买它。


    还记得第 6 章中免费精简版应用的促销完整版截图吗？由于应用内购买项目本质上是它们自己的产品，您也需要为它们设计类似的应用内推销说辞。这些项目的视觉呈现，与推广母应用本身同样重要。不要仅仅依赖一行文字或说明再加上一个购买按钮。用户想知道通过购买那个应用内购买项目，他们到底能得到什么。但这并不意味着您应该写出冗长、啰嗦的描述。移动用户想要快速得到答案，因此简洁可以非常有效，只要提供的细节足够吸引人。

