- fmt: '# For Preliminary Testing During Development


    `Vimov`''s ingenious iSimulate iPhone app and SDK can wirelessly send the GPS
    location and multitouch, accelerometer, and compass events to the iOS Simulator
    from an iPhone or iPod touch on the same Wi-Fi network. This can greatly reduce
    the amount of time spent on testing, since running apps in the iOS Simulator is
    much faster than installing apps on a test device. Learn more about iSimulate
    at `http://www.vimov.com/isimulate/`.


    Even if you don’t use the specific features that require running on an actual
    mobile device, it’s highly recommended to test and debug your app on several iOS
    devices to ensure that everything works as intended before submission to the App
    Store. In order to do that, you need to set up a developer certificate and provisioning
    profile to authorize your device.


    Thoroughly testing your project on actual mobile hardware is a crucial factor
    in the potential success of your application. Yet many developers avoid this task
    because Apple’s provisioning process can appear complicated. Perform a quick search
    through the popular developer forums, and you’ll find dozens (if not hundreds)
    of posts from frustrated programmers who have been unable to get this working
    correctly.


    If you’ve never done this before, setting up a test device can be quite daunting.
    Here’s a step-by-step walk-through to help demystify the process.


    ## Step 1: Establish Your Test Device in Xcode Organizer


    First, you’ll need to assign an iPhone, iPad, or iPod touch as a test device within
    Xcode Organizer. Using the 30-pin USB cable that came with the device, plug it
    into your Mac. This action will typically cause iTunes to launch. If iTunes’ preferences
    are configured to automatically sync the device upon connection, then simply wait
    for the synchronizing to finish. Once completed, open Xcode and choose `Window`
    ![image](images/arrow.jpg) `Devices`.


    When the Xcode Devices window appears, you should see your connected device listed
    in the left pane. Select that device, and in the main pane, you should see device-related
    information (see [Figure 9-8](#9781430262381_Ch09.xhtml#Fig8)). If a Trust dialog
    appears on your device, select Trust to grant Xcode access to your device. To
    authenticate the request, you may be asked to provide your iOS Dev Center login
    and password, if you have not done so previously.


    ![9781430262381_Fig09-08.jpg](images/9781430262381_Fig09-08.jpg)


    [Figure 9-8](#9781430262381_Ch09.xhtml#_Fig8). Device-related information in Xcode
    Devices


    It’s perfectly fine to use your primary iPhone as a development device. Even after
    clicking the Use for Development button, that device will still operate like a
    normal iPhone. Just remember to always back up the device’s data when synchronizing
    in iTunes. That way, if anything goes wrong during testing, you can always restore
    the device’s operating system, applications, and settings in iTunes with the last
    saved backup.


    After finishing this step, do not quit Xcode Devices, since we’ll be referring
    to it again later in the provisioning process. One essential bit of information
    that will be needed is the 40-character device identifier, which is listed here
    in the device’s information. This is referred to as the unique device identifier
    (UDID).


    ## Step 2: Acquire Your Development Certificate


    Next, you’ll need to request a certificate. Launch the Keychain Access application,
    located on your Mac at `/Applications/Utilities/Keychain Access`.


    In the Keychain Access utility, open the Preferences window by choosing `Keychain
    Access` ![image](images/arrow.jpg) `Preferences...` and select the Certificates
    tab. Make sure Online Certificate Status Protocol (OSCP) and Certificate Revocation
    List (CRL) are both set to Off before closing the Preferences window.


    Now, select `Keychain Access` ![image](images/arrow.jpg) `Certificate Assistant`
    ![image](images/arrow.jpg) `Request a Certificate from a Certificate Authority`
    from the menu. In the Certificate Assistant window that appears, enter your iOS
    Developer Program e-mail address and a name for your certificate (see [Figure
    9-9](#9781430262381_Ch09.xhtml#Fig9)). In this example, I simply used my full
    name, but I could have just as easily used a more descriptive label, like Dave
    Dev Key. The Request Is option should be set to Saved to Disk. Click the Continue
    button, and Keychain Access will generate and save your certificate request file
    to your hard drive. If you chose your desktop as the location, you should see
    a new file there called `CertificateSigningRequest.certSigningRequest`.


    ![9781430262381_Fig09-09.jpg](images/9781430262381_Fig09-09.jpg)


    [Figure 9-9](#9781430262381_Ch09.xhtml#_Fig9). Generate a certificate-signing
    request file from the Keychain Access application on your Mac


    Open your web browser and log in to the iOS Dev Center at `http://developer.apple.com/devcenter/ios/`.
    Then navigate to the Certificates, Identifiers & Profiles page by clicking its
    respective link in the right column.


    On the Certificates, Identifiers & Profiles page, select Development under the
    Certificates section. Then click the `+` button and follow the instructions to
    upload your `CertificateSigningRequest.certSigningRequest` file to the online
    system. Once your team admin (you, in most individual cases) approves the certificate
    request, your new development certificate will be available for download from
    this Certificates section (see [Figure 9-10](#9781430262381_Ch09.xhtml#Fig10)).


    ![9781430262381_Fig09-10.jpg](images/9781430262381_Fig09-10.jpg)


    [Figure 9-10](#9781430262381_Ch09.xhtml#_Fig10). Download your development certificate
    to your Mac desktop


    ### Verify That Apple’s WWDR Certificate Is Installed


    When you initially signed up for the iOS Developer Program online, one of the
    first things you might have done was download and install Apple’s Worldwide Developer
    Relations (WWDR) certificate. If you don’t yet have Apple’s WWDR certificate in
    your Mac’s keychain, you’ll need to take care of that *before* installing your
    development certificate.


    `Xcode` will automatically install the WWDR certification. However, if this certificate
    needs to be reinstalled, click the plus sign (+) on the iOS Certificates page
    and scroll down to the Intermediate Certificates section. Click the Worldwide
    Developer Relations Certificate Authority link to download the WWDR certification
    file.


    Download the `developer_identity.cer` file to your Mac desktop. Double-click that
    downloaded `.cer` file, which will launch the Keychain Access application (if
    it’s not already open). Keychain Access will display a dialog box, asking if you
    would like to add the certificate to a keychain. Make sure the dialog box’s keychain
    menu is set to login, and then click the Add button.


    In the Keys category of the main Keychain Access window, verify that your private
    and public keys are now paired together with your development certificate to ensure
    it is properly configured on your Mac. In this example, my Dave Wooldridge key
    (which was created when I generated a certificate-signing request under the same
    name) is now paired with my imported development certificate (see [Figure 9-11](#9781430262381_Ch09.xhtml#Fig11)).


    ![9781430262381_Fig09-11.jpg](images/9781430262381_Fig09-11.jpg)


    [Figure 9-11](#9781430262381_Ch09.xhtml#_Fig11). Verify that your imported development
    certificate has been paired with your developer key in Keychain Access


    With the developer certificate installed, you can now quit the Keychain Access
    application and return to the Certificates, Identifiers & Profiles page in your
    web browser.


    ## Step 3: Register Your Device ID'
