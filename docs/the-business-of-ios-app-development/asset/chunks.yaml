    大多数网页开发人员根据桌面屏幕的平均尺寸来设计页面布局。为了适应大多数网站的典型宽度，`Mobile Safari` 的默认缩放设置为 980 像素的屏幕宽度。这使得所有网站在初次加载时都能很好地适配
    `Mobile Safari` 浏览器窗口。


    在 `iPad` 的大屏幕上以横屏模式查看网站，其体验与桌面网页浏览器无异，但对于屏幕较小的 `iPhone` 或 `iPod touch` 来说则并非如此。在竖屏模式下，浏览器窗口非常狭窄，因此页面会被大幅缩小，导致文本几乎无法辨认。为了阅读内容和点击文本链接，用户不得不捏合屏幕进行放大。


    但是，如果你想设计一个能够适应 `iPhone` 和 `iPod touch` 上 `Mobile Safari` 浏览器独特尺寸的网站，从而免除手动缩放的需要呢？


    以 `Tap Tap Tap` 的网页布局为例，其宽度仅略大于 600 像素（见图 10-10）。它被设计成在桌面电脑浏览器的宽屏格式和 `iPhone`
    的 `Mobile Safari` 的窄竖屏模式下都能良好显示。然而，`Mobile Safari` 默认的 980 像素宽的屏幕缩放比例仍会将页面的主要内容渲染为屏幕中央的一个微小对象，两侧留下大量未使用的黑色背景边距。解决方案是一个名为
    `viewport` 的 `HTML` 标签。在 `Tap Tap Tap` 网站 `http://www.taptaptap.com/` 的 `<head>`
    标签内，包含以下 `meta` 标签：


    ```

    <meta name="viewport" content="width=device-width" />

    ```


    `viewport` 标签能被 `Mobile Safari` 识别，但会被所有其他浏览器忽略，因此它只会影响你的网站在具有小屏幕的 `iOS` 设备上的显示效果。将
    `content` 参数设置为 `width=device-width`，会告诉 `Mobile Safari` 适当地缩放页面内容的宽度以匹配浏览器的宽度。这使得
    `Tap Tap Tap` 的网站呈现出为 `iPhone` 优化过的效果，并且易于阅读（见图 10-12）。它只影响应用的缩放量以及页面定位，网页的原始宽高比保持不变。


    ![9781430262381_Fig10-12.jpg](img/9781430262381_Fig10-12.jpg)


    图 10-12. `Tap Tap Tap` 将 `viewport` 标签的宽度设置为匹配设备宽度，这增强了其网站在 `iPhone` 和 `iPod touch`
    上的 `Mobile Safari` 中的外观和可读性。


    还可以分配其他几个 `viewport` 属性来影响缩放和用户的缩放能力，所有这些属性都由 `Apple` 在 `http://developer.apple.com/library/safari/#documentation/appleapplications/reference/safarihtmlref/Articles/MetaTags.html`
    在线文档中记录。如果你希望对 `viewport` 宽度有比设置 `device-width` 值更大的控制，你可以将 `width` 属性设置为特定的像素数。这会在什么情况下派上用场呢？


    假设你的页面背景图像是整个设计的组成部分。当 `viewport` 标签设置为 `width=device-width` 时，前景网页内容将填满屏幕；几乎没有边距空间来显示背景图像。如果你的主要内容宽度为
    400 像素（并且居中显示），并且你希望在屏幕的左侧和右侧至少看到 50 像素的背景图像，那么将你的 `viewport` 标签设置为以下内容：


    ```

    <meta name="viewport" content="width=500">

    ```


    **注意**  我确实注意到 `Tap Tap Tap` 酷炫的 `JavaScript` 驱动的应用图标动画在 `Mobile Safari` 中滑动效果不佳；它们在
    `Mac OS X` 版本的 `Safari` 中完美流畅。我并非批评其精美的页面设计，而是指出一个困扰许多 `iOS` 相关网站的常见问题。即使两个浏览器都使用
    `WebKit`，`JavaScript` 和 `CSS` 的支持也存在细微差别。在你的网站中使用复杂的脚本或第三方 `Web` 框架时，请务必在 `Mobile
    Safari` 中测试你的代码，以确保桌面电脑和移动设备上的浏览体验相似。


    如果你需要在 `Mobile Safari` 中调试网页，请打开位于 `iOS 设置` 应用中 `Safari` 的“开发者”面板下的“调试控制台”。`Mobile
    Safari` 的调试控制台能极大节省时间，因为它能精确定位错误并推荐优化技巧。


    ## 使用浏览器检测来提供目标内容


    对于为多个不同平台开发应用和游戏的软件发行商来说，修改其主网站以仅适应其中一个平台可能并不合适。`PopCap Games` 就是一个完美的例子，它为 `Mac`、`PC`、`Web`、`Nintendo`、`Xbox`、`PlayStation`
    以及各种移动设备（如 `iPhone` 和 `iPad`）开发游戏。


    为了在单个网站内推广其所有最新游戏和支持的平台，`PopCap Games` 必须利用桌面网页浏览器的大屏幕优势，这很可能占据了其网站流量的绝大部分。当缩放以适应
    `iPhone` 的 `Mobile Safari` 浏览器窗口时，`PopCaps.com` 的主页将变得非常难以导航和阅读（见图 10-13）。`PopCap`
    并未尝试根据访问的浏览器动态地更改现有网站设计，而是使用一个简单的重定向将 `iPhone` 用户发送到一个专门针对移动设备优化的网站，该网站仅展示其 `iPhone`
    游戏。在 `Mobile Safari` 中访问 `http://www.popcap.com` 会自动将你重定向到 `http://www.popcap.com/iphone/`（见图
    10-13）。


    ![9781430262381_Fig10-13.jpg](img/9781430262381_Fig10-13.jpg)


    图 10-13. `PopCap Games` 主首页服务于多个平台，在小移动屏幕上难以阅读（左图），因此 `iPhone` 用户会被自动重定向到一个特别的
    `iPhone` 专用网站（右图）。


    这个简单的重定向技巧是通过首先检测浏览器的用户代理来实现的。以下是来自运行 `iOS 4.2.1` 的 `iPhone 4` 的 `Mobile Safari`
    用户代理：


    ```

    Mozilla/5.0 (iPhone; U; CPU iPhone OS 4_2_1 like Mac OS X; en-us) AppleWebKit/533.17.9
    (KHTML, like Gecko) Version/5.0.2 Mobile/8C148 Safari/6533.18.5

    ```


    以下是来自运行 `iOS 3.1` 的 `iPod touch` 的 `Mobile Safari` 用户代理：


    ```

    Mozilla/5.0 (iPod; U; CPU iPhone OS 3_1 like Mac OS X; en-us) AppleWebKit/528.18
    (KHTML, like Gecko) Version/4.0 Mobile/7C144 Safari/528.16

    ```


    以下是来自运行 `iOS 4.2.1` 的 `iPad` 的 `Mobile Safari` 用户代理：


    ```

    Mozilla/5.0 (iPad; U; CPU OS 4_2_1 like Mac OS X; en-us) AppleWebKit/533.17.9
    (KHTML, like Gecko) Version/5.0.2 Mobile/8C148 Safari/6533.18.5

    ```


    浏览器的用户代理可以从任何现代 `Web` 脚本语言中获取。如果用户代理描述显示用户的浏览器来自 `iPhone` 或 `iPod touch`，你的 `Web`
    代码可以将用户发送到不同的 `URL`。如果用户代理来自任何其他平台或设备（例如 `Mac` 或 `iPad`），则不执行任何操作，保持在当前网页上。让我们看看如何用
    `JavaScript` 和 `PHP` 仅用几行代码来实现这一点。


    ### 用于浏览器检测的 JavaScript


    将以下代码放在 `HTML` 页面的 `<head>` 标签内。这将导致在页面其余部分加载完成之前，为 `Mobile Safari` 用户执行重定向，从而使过渡快速且无缝。

    '
- fmt: "```html\n<script type=\"text/javascript\">\n<!--\nvar os = navigator.userAgent.toLowerCase();\n\
    if (os.indexOf('iphone')!=-1) {\n    window.location.href = \"http://www.mywebsite.com/iphone/\"\
    ;\n}\n// -->\n</script>\n```\n\nIn JavaScript, the user agent is accessed via\
    \ `navigator.userAgent`. Although Mobile Safari’s current user agent in both the\
    \ iPhone and iPod touch references `iPhone`, it’s best to convert the entire string\
    \ to all lowercase letters using JavaScript’s `toLowerCase()` function. This ensures\
    \ the code will always work, even if Apple ever switches the case in the future.\n\
    \nOnce you have the user agent string in lowercase format, use the `indexOf()`\
    \ function to search for `iphone`, since *iPhone OS* is listed by both the iPhone\
    \ and iPod touch (but not the iPad). An integer position of the first occurrence\
    \ of that word is returned. If that search term is not found, then `-1` is returned.\
    \ If any other number is returned, that signals a match for either the iPhone\
    \ or iPod touch, so the JavaScript code redirects the browser to the URL location\
    \ of your iPhone-optimized web page.\n\n## PHP for Browser Detection\n\nFor this\
    \ example, you must place the following PHP code at the very top of the HTML page,\
    \ before even the `<html>` tag. This PHP code needs to run before any HTML code\
    \ is executed.\n\n```php\n<?\n$os = $_SERVER['HTTP_USER_AGENT'];\nif (stristr($os,\
    \ 'iphone')) {\n    header(\"Location: http://www.mywebsite.com/iphone/\");\n\
    \    exit;\n}\n?>\n```\n\nIn PHP, the user agent is retrieved from the `HTTP_USER_AGENT`\
    \ property in the `$_SERVER` array. Similar to how the JavaScript version works,\
    \ this PHP code uses the case-insensitive `stristr()` function to search the user\
    \ agent string for an occurrence of `iphone`. If the search term is not found,\
    \ then `stristr()` returns `False`, and the rest of the web page continues to\
    \ load. But if the word `iphone` is found, then the PHP redirects the identified\
    \ iPhone or iPod touch Mobile Safari browser to your dedicated iPhone site URL.\n\
    \nAfter calling the redirect via the `header()` function, you should include the\
    \ `exit()` function, which will prevent the rest of that HTML page from loading\
    \ while the redirect is being processed.\n\n## Dynamically Replacing Flash with\
    \ iOS-Compatible Content\n\nWhat if you don’t need to redirect to a separate iPhone-centric\
    \ site, but merely want to replace a single web element—such as a Flash video—for\
    \ your web page to be iOS-compliant? You can also apply the browser user agent\
    \ detection technique here.\n\nSince Flash is not supported in Mobile Safari,\
    \ if your web site includes a Flash video or Flash animation, you’ll want to provide\
    \ an alternative replacement (such as QuickTime-compatible video or an HTML5-driven\
    \ animation, respectively) for viewing on iOS devices.\n\nThis content swap can\
    \ be done dynamically on your web page with only minor tweaks to the JavaScript\
    \ and PHP browser-detection examples.\n\n### JavaScript for Flash Replacement\n\
    \nPlace the following JavaScript code anywhere in your web page where you need\
    \ to switch between two content formats based on the browser model. As in the\
    \ previous JavaScript example, retrieve the user agent and check it for the presence\
    \ of `iphone` and `ipad` (since you want to identify iPads, too). If either word\
    \ is found, then the page is being viewed with Mobile Safari, so display an iOS-compatible\
    \ format. If some other web browser is being used from a computer, then it’s safe\
    \ to load a Flash file instead.\n\n```html\n<script type=\"text/javascript\">\n\
    <!--\nvar os = navigator.userAgent.toLowerCase();\nif (os.indexOf('iphone')!=-1\
    \ || os.indexOf('ipad')!=-1) {\n\n// Yes, viewed by Mobile Safari, so show iOS-compatible\
    \ web content.\n    document.write(\"Place QuickTime or HTML5 code here\");\n\
    }\nelse {\n    // No, some other browser, so load Flash file instead.\n    document.write(\"\
    Place Flash HTML Object/Embed code here\");\n}\n// -->\n</script>\n```\n\n###\
    \ PHP for Flash Replacement\n\nYou can place the following PHP code anywhere in\
    \ your web page where you need to swap content based on the browser being used.\
    \ If the PHP determines the user agent is from Mobile Safari, then it will display\
    \ iOS-compatible web content. If the user agent reveals some other web browser,\
    \ then you can load a Flash file.\n\n```php\n<?\n$os = $_SERVER['HTTP_USER_AGENT'];\n\
    if (stristr($os, 'iphone') || stristr($os, 'ipad')) {\n?>\n    <!-- Yes, viewed\
    \ by Mobile Safari, so show iOS-compatible web content. -->\n<?\n}\nelse {\n?>\n\
    \    <!-- No, some other browser, so place Flash HTML Object/Embed code here.\
    \ -->\n<?\n}\n?>\n```\n\nOf course, if you don’t have a specific need to use Flash\
    \ on your web site, the easiest solution is to simply use a QuickTime-compatible\
    \ format for all your web-based videos. Anyone who has an iOS device is required\
    \ to have the desktop version of iTunes on their computer for device synchronizing.\
    \ Since QuickTime is installed with iTunes, even Windows users will be able to\
    \ watch your web site’s QuickTime videos.\n\n## Home Screen Bookmarking Made Beautiful\n\
    \nYou can make it easy for loyal fans who visit your site frequently to add a\
    \ web site bookmark to their iOS home screens.\n\nWhen bookmarking a URL in Mobile\
    \ Safari, one of the options is Add to Home Screen, which saves the bookmark as\
    \ an app icon on your iOS device’s home screen. Tap the icon, and it displays\
    \ that web site in Mobile Safari. By default, a thumbnail snapshot of your web\
    \ page is displayed as the app icon, but that shrunken thumbnail is so small that\
    \ the site is probably unrecognizable.\n\nFortunately, you don’t have to settle\
    \ for that.\n\nYou can design your own custom image for display as a home screen\
    \ bookmark icon. As with an iPhone or iPad app icon, do not add rounded corners\
    \ or the glossy bevel, since iOS will automatically add those effects to the icon.\
    \ Just create and save the icon in PNG format for each iOS screen resolution size:\n\
    \n*   Older iPhone and iPod touch: 57 × 57 pixels\n*   iPad: 72 × 72 pixels\n\
    *   Retina display iPhone and iPod touch: 114 × 114 pixels\n\nThe default 57 ×\
    \ 57–pixels icon should be named `apple-touch-icon.png`, but the other two files\
    \ can be named whatever you want (such as `apple-touch-icon-72px.png` and `apple-touch-icon-114px.png`).\
    \ Then upload those PNG images to your web site’s root directory, and add the\
    \ following lines of HTML code within the `<head>` tag of your web page:\n\n```html\n\
    <link rel=\"apple-touch-icon\" media=\"screen and (resolution: 163dpi)\" href=\"\
    apple-touch-icon.png\" />\n\n<link rel=\"apple-touch-icon\" media=\"screen and\
    \ (resolution: 132dpi)\" href=\"apple-touch-icon-72px.png\" />\n\n<link rel=\"\
    apple-touch-icon\" media=\"screen and (resolution: 326dpi)\" href=\"apple-touch-icon-114px.png\"\
    \ />\n```\n\nThe user’s device resolution will determine which icon size is used\
    \ for the home screen web site bookmark. This is important to avoid saving a blurry,\
    \ small icon on a higher-resolution device.\n\nIf the URL points to a dedicated\
    \ web site for your iOS app, then don’t use your application’s existing icon,\
    \ since that might prove confusing to customers who have both icons on their home\
    \ screen. Instead, use an alternate image so that users can easily differentiate\
    \ between your app icon and your web site bookmark icon. If the URL points to\
    \ your company site that showcases several apps, assigning your company logo as\
    \ the bookmark icon is a good branding choice.\n\n## Let’s Make Some Noise: The\
    \ Power of Blogs, Twitter, and Social Networks\n\nNow that your web site is ready,\
    \ you finally have an online destination for promoting the forthcoming release\
    \ of your iOS app. But the only way anyone will know about your new web site is\
    \ if you get out there and start building your online audience.\n\n### Cultivating\
    \ an Online Community\n\nAlthough important, submitting your web site URL and\
    \ XML Sitemap file to the major search engines is not enough. Don’t wait for the\
    \ masses to find you. Go out and find them. You want to start conversations and\
    \ get people talking about your new app.\n```"
  raw: '```

    <script type="text/javascript">

    <!--

    var os = navigator.userAgent.toLowerCase();

    if (os.indexOf(''iphone'')!=-1) {

        window.location.href = "http://www.mywebsite.com/iphone/";

    }

    // -->

    </script>

    ```


    In JavaScript, the user agent is accessed via `navigator.userAgent`. Although
    Mobile Safari’s current user agent in both the iPhone and iPod touch references
    `iPhone`, it’s best to convert the entire string to all lowercase letters using
    JavaScript’s `toLowerCase()` function. This ensures the code will always work,
    even if Apple ever switches the case in the future.


    Once you have the user agent string in lowercase format, use the `indexOf()` function
    to search for *iphone*, since *iPhone OS* is listed by both the iPhone and iPod
    touch (but not the iPad). An integer position of the first occurrence of that
    word is returned. If that search term is not found, then `-1` is returned. If
    any other number is returned, that signals a match for either the iPhone or iPod
    touch, so the JavaScript code redirects the browser to the URL location of your
    iPhone-optimized web page.


    PHP for Browser Detection


    For this example, you must place the following PHP code at the very top of the
    HTML page, before even the `<html>` tag. This PHP code needs to run before any
    HTML code is executed.


    ```

    <?

    $os = $_SERVER[''HTTP_USER_AGENT''];

    if (stristr($os, ''iphone'')) {

        header("Location: http://www.mywebsite.com/iphone/");

        exit;

    }

    ?>

    ```


    In PHP, the user agent is retrieved from the `HTTP_USER_AGENT` property in the
    `$_SERVER` array. Similar to how the JavaScript version works, this PHP code uses
    the case-insensitive `stristr()` function to search the user agent string for
    an occurrence of *iphone*. If the search term is not found, then `stristr()` returns
    `False`, and the rest of the web page continues to load. But if the word *iphone*
    is found, then the PHP redirects the identified iPhone or iPod touch Mobile Safari
    browser to your dedicated iPhone site URL.


    After calling the redirect via the `header()` function, you should include the
    `exit()` function, which will prevent the rest of that HTML page from loading
    while the redirect is being processed.


    Dynamically Replacing Flash with iOS-Compatible Content


    What if you don’t need to redirect to a separate iPhone-centric site, but merely
    want to replace a single web element—such as a Flash video—for your web page to
    be iOS-compliant? You can also apply the browser user agent detection technique
    here.


    Since Flash is not supported in Mobile Safari, if your web site includes a Flash
    video or Flash animation, you’ll want to provide an alternative replacement (such
    as QuickTime-compatible video or an HTML5-driven animation, respectively) for
    viewing on iOS devices.


    This content swap can be done dynamically on your web page with only minor tweaks
    to the JavaScript and PHP browser-detection examples.


    JavaScript for Flash Replacement


    Place the following JavaScript code anywhere in your web page where you need to
    switch between two content formats based on the browser model. As in the previous
    JavaScript example, retrieve the user agent and check it for the presence of *iphone*
    and *ipad* (since you want to identify iPads, too). If either word is found, then
    the page is being viewed with Mobile Safari, so display an iOS-compatible format.
    If some other web browser is being used from a computer, then it’s safe to load
    a Flash file instead.


    ```

    <script type="text/javascript">

    <!--

    var os = navigator.userAgent.toLowerCase();

    if (os.indexOf(''iphone'')!=-1 || os.indexOf(''ipad'')!=-1) {


    // Yes, viewed by Mobile Safari, so show iOS-compatible web content.

        document.write("Place QuickTime or HTML5 code here");

    }

    else {

        // No, some other browser, so load Flash file instead.

        document.write("Place Flash HTML Object/Embed code here");

    }

    // -->

    </script>

    ```


    PHP for Flash Replacement


    You can place the following PHP code anywhere in your web page where you need
    to swap content based on the browser being used. If the PHP determines the user
    agent is from Mobile Safari, then it will display iOS-compatible web content.
    If the user agent reveals some other web browser, then you can load a Flash file.


    ```

    <?

    $os = $_SERVER[''HTTP_USER_AGENT''];

    if (stristr($os, ''iphone'') || stristr($os, ''ipad'')) {

    ?>

        <!-- Yes, viewed by Mobile Safari, so show iOS-compatible web content. -->

    <?

    }

    else {

    ?>

        <!-- No, some other browser, so place Flash HTML Object/Embed code here. -->

    <?

    }

    ?>

    ```


    Of course, if you don’t have a specific need to use Flash on your web site, the
    easiest solution is to simply use a QuickTime-compatible format for all your web-based
    videos. Anyone who has an iOS device is required to have the desktop version of
    iTunes on their computer for device synchronizing. Since QuickTime is installed
    with iTunes, even Windows users will be able to watch your web site’s QuickTime
    videos.


    Home Screen Bookmarking Made Beautiful


    You can make it easy for loyal fans who visit your site frequently to add a web
    site bookmark to their iOS home screens.


    When bookmarking a URL in Mobile Safari, one of the options is Add to Home Screen,
    which saves the bookmark as an app icon on your iOS device’s home screen. Tap
    the icon, and it displays that web site in Mobile Safari. By default, a thumbnail
    snapshot of your web page is displayed as the app icon, but that shrunken thumbnail
    is so small that the site is probably unrecognizable.


    Fortunately, you don’t have to settle for that.


    You can design your own custom image for display as a home screen bookmark icon.
    As with an iPhone or iPad app icon, do not add rounded corners or the glossy bevel,
    since iOS will automatically add those effects to the icon. Just create and save
    the icon in PNG format for each iOS screen resolution size:


    *   Older iPhone and iPod touch: 57 × 57 pixels

    *   iPad: 72 × 72 pixels

    *   Retina display iPhone and iPod touch: 114 × 114 pixels


    The default 57 × 57–pixels icon should be named *apple-touch-icon.png*, but the
    other two files can be named whatever you want (such as *apple-touch-icon-72px.png*
    and *apple-touch-icon-114px.png*). Then upload those PNG images to your web site’s
    root directory, and add the following lines of HTML code within the `<head>` tag
    of your web page:


    ```

    <link rel="apple-touch-icon" media="screen and (resolution: 163dpi)" href="apple-touch-icon.png"
    />


    <link rel="apple-touch-icon" media="screen and (resolution: 132dpi)" href="apple-touch-icon-72px.png"
    />


    <link rel="apple-touch-icon" media="screen and (resolution: 326dpi)" href="apple-touch-icon-114px.png"
    />

    ```


    The user’s device resolution will determine which icon size is used for the home
    screen web site bookmark. This is important to avoid saving a blurry, small icon
    on a higher-resolution device.


    If the URL points to a dedicated web site for your iOS app, then don’t use your
    application’s existing icon, since that might prove confusing to customers who
    have both icons on their home screen. Instead, use an alternate image so that
    users can easily differentiate between your app icon and your web site bookmark
    icon. If the URL points to your company site that showcases several apps, assigning
    your company logo as the bookmark icon is a good branding choice.


    Let’s Make Some Noise: The Power of Blogs, Twitter, and Social Networks


    Now that your web site is ready, you finally have an online destination for promoting
    the forthcoming release of your iOS app. But the only way anyone will know about
    your new web site is if you get out there and start building your online audience.


    Cultivating an Online Community


    Although important, submitting your web site URL and XML Sitemap file to the major
    search engines is not enough. Don’t wait for the masses to find you. Go out and
    find them. You want to start conversations and get people talking about your new
    app.'
  trans: "\n```html\n<script type=\"text/javascript\">\n<!--\nvar os = navigator.userAgent.toLowerCase();\n\
    if (os.indexOf('iphone')!=-1) {\n    window.location.href = \"http://www.mywebsite.com/iphone/\"\
    ;\n}\n// -->\n</script>\n```\n\n在 JavaScript 中，用户代理可通过`navigator.userAgent`访问。尽管当前\
    \ iPhone 和 iPod touch 上 Mobile Safari 的用户代理都包含`iPhone`，但最好使用 JavaScript 的`toLowerCase()`函数将整个字符串转换为小写字母。这能确保代码始终有效，即使苹果未来更改了大小写。\n\
    \n将用户代理字符串转换为小写格式后，使用`indexOf()`函数搜索`iphone`，因为*iPhone OS*同时被 iPhone 和 iPod touch（但不包括\
    \ iPad）所列出。该函数会返回该词首次出现的整数位置。如果未找到该搜索词，则返回`-1`。若返回任何其他数字，则表示与 iPhone 或 iPod touch\
    \ 匹配，此时 JavaScript 代码会将浏览器重定向至您针对 iPhone 优化的网页 URL。\n\n## 用于浏览器检测的 PHP\n\n在本示例中，您必须将以下\
    \ PHP 代码放在 HTML 页面的最顶部，甚至放在`<html>`标签之前。这段 PHP 代码需要在任何 HTML 代码执行之前运行。\n\n```php\n\
    <?\n$os = $_SERVER['HTTP_USER_AGENT'];\nif (stristr($os, 'iphone')) {\n    header(\"\
    Location: http://www.mywebsite.com/iphone/\");\n    exit;\n}\n?>\n```\n\n在 PHP\
    \ 中，用户代理从`$_SERVER`数组的`HTTP_USER_AGENT`属性中获取。与 JavaScript 版本的工作方式类似，此 PHP 代码使用不区分大小写的`stristr()`函数在用户代理字符串中搜索`iphone`。如果未找到搜索词，则`stristr()`返回`False`，网页其余部分继续加载。但如果找到`iphone`这个词，则\
    \ PHP 会将识别出的 iPhone 或 iPod touch 的 Mobile Safari 浏览器重定向到您专用的 iPhone 网站 URL。\n\n\
    通过`header()`函数调用重定向后，您应包含`exit()`函数，这将在重定向处理过程中阻止 HTML 页面的其余部分加载。\n\n## 动态替换 Flash\
    \ 为 iOS 兼容内容\n\n如果您不需要重定向到独立的 iPhone 网站，而只是希望替换网页上的单个元素（例如 Flash 视频）以使其符合 iOS\
    \ 规范，该怎么办？您也可以在此处应用浏览器用户代理检测技术。\n\n由于 Mobile Safari 不支持 Flash，如果您的网站包含 Flash 视频或\
    \ Flash 动画，您需要为 iOS 设备上的观看提供替代内容（例如 QuickTime 兼容视频或基于 HTML5 的动画）。\n\n这种内容替换可以在网页上动态完成，只需对\
    \ JavaScript 和 PHP 浏览器检测示例进行微小调整。\n\n### 用于 Flash 替换的 JavaScript\n\n将以下 JavaScript\
    \ 代码放置在您网页中需要根据浏览器型号切换两种内容格式的任何位置。与之前的 JavaScript 示例一样，获取用户代理并检查是否包含`iphone`和`ipad`（因为您也想识别\
    \ iPad）。如果找到其中任一单词，则页面正通过 Mobile Safari 浏览，因此显示 iOS 兼容格式。如果计算机上使用的是其他网页浏览器，则安全起见，可加载\
    \ Flash 文件。\n\n```html\n<script type=\"text/javascript\">\n<!--\nvar os = navigator.userAgent.toLowerCase();\n\
    if (os.indexOf('iphone')!=-1 || os.indexOf('ipad')!=-1) {\n\n// 是，通过 Mobile Safari\
    \ 浏览，因此显示 iOS 兼容的网页内容。\n    document.write(\"在此处放置 QuickTime 或 HTML5 代码\");\n\
    }\nelse {\n    // 否，其他浏览器，因此改为加载 Flash 文件。\n    document.write(\"在此处放置 Flash HTML\
    \ Object/Embed 代码\");\n}\n// -->\n</script>\n```\n\n### 用于 Flash 替换的 PHP\n\n您可以将以下\
    \ PHP 代码放置在您网页中需要根据所用浏览器交换内容的任何位置。如果 PHP 判断用户代理来自 Mobile Safari，则显示 iOS 兼容的网页内容。如果用户代理显示为其他网页浏览器，则您可以加载\
    \ Flash 文件。\n\n```php\n<?\n$os = $_SERVER['HTTP_USER_AGENT'];\nif (stristr($os,\
    \ 'iphone') || stristr($os, 'ipad')) {\n?>\n    <!-- 是，通过 Mobile Safari 浏览，因此显示\
    \ iOS 兼容的网页内容。 -->\n<?\n}\nelse {\n?>\n    <!-- 否，其他浏览器，因此在此处放置 Flash HTML Object/Embed\
    \ 代码。 -->\n<?\n}\n?>\n```\n\n当然，如果您网站没有特定需求必须使用 Flash，最简单的解决方案就是为所有网页视频统一使用 QuickTime\
    \ 兼容格式。任何拥有 iOS 设备的用户都必须在电脑上安装桌面版 iTunes 以进行设备同步。由于 QuickTime 随 iTunes 一同安装，即使是\
    \ Windows 用户也能观看您网站上的 QuickTime 视频。\n\n## 让主屏幕书签更美观\n\n您可以方便那些频繁访问您网站的忠实粉丝，让他们将网站书签添加到\
    \ iOS 主屏幕。\n\n在 Mobile Safari 中为 URL 添加书签时，其中一个选项是“添加到主屏幕”，这会将书签以应用图标的形式保存到 iOS\
    \ 设备的主屏幕上。点击该图标，它会在 Mobile Safari 中显示该网站。默认情况下，网页的缩略图快照会显示为应用图标，但这个缩略图太小，以至于网站可能无法识别。\n\
    \n幸运的是，您不必接受这种默认设置。\n\n您可以设计自己的自定义图像，用作主屏幕书签图标。与 iPhone 或 iPad 应用图标一样，不要添加圆角或光泽斜面，因为\
    \ iOS 会自动为图标添加这些效果。只需为每种 iOS 屏幕分辨率尺寸创建并保存 PNG 格式的图标：\n\n*   旧款 iPhone 和 iPod touch：57\
    \ × 57 像素\n*   iPad：72 × 72 像素\n*   Retina 显示屏 iPhone 和 iPod touch：114 × 114 像素\n\
    \n默认的 57 × 57 像素图标应命名为`apple-touch-icon.png`，但其他两个文件可以任意命名（例如`apple-touch-icon-72px.png`和`apple-touch-icon-114px.png`）。然后将这些\
    \ PNG 图像上传到您网站的根目录，并在网页的`<head>`标签内添加以下 HTML 代码行：\n\n```html\n<link rel=\"apple-touch-icon\"\
    \ media=\"screen and (resolution: 163dpi)\" href=\"apple-touch-icon.png\" />\n\
    \n<link rel=\"apple-touch-icon\" media=\"screen and (resolution: 132dpi)\" href=\"\
    apple-touch-icon-72px.png\" />\n\n<link rel=\"apple-touch-icon\" media=\"screen\
    \ and (resolution: 326dpi)\" href=\"apple-touch-icon-114px.png\" />\n```\n\n用户的设备分辨率将决定主屏幕网站书签使用哪个图标尺寸。这对于避免在分辨率更高的设备上保存模糊的小图标至关重要。\n\
    \n如果 URL 指向您 iOS 应用的专用网站，那么不要使用您应用的现有图标，因为这可能会让主屏幕上同时拥有这两个图标的用户感到困惑。相反，应使用替代图像，以便用户能够轻松区分您的应用图标和网站书签图标。如果\
    \ URL 指向展示多个应用的公司网站，那么将公司徽标指定为书签图标是一个不错的品牌选择。\n\n## 制造声势：博客、Twitter 和社交网络的力量\n\
    \n现在您的网站已经准备就绪，您终于有了一个在线目的地来推广即将发布的 iOS 应用。但要让人们知道您的新网站，唯一的方法就是走出去，开始建立您的在线受众。\n\
    \n### 培养在线社区\n\n虽然重要，但将您网站的 URL 和 XML 站点地图文件提交给主流搜索引擎是不够的。不要等待大众来找您。走出去，找到他们。您要开启对话，让人们讨论您的新应用。\n"
- fmt: '# 社交媒体营销策略


    通过将初期营销工作集中在 Twitter、Facebook 和其他热门社交网络上，你可以利用它们的口碑传播力，将感兴趣的消费者吸引到你的网站。由于你的应用尚未在
    App Store 上架，这个预发布阶段的目标就是建立产品的知名度和期待感。


    我必须提前提醒你，深入社交媒体的世界可能会非常耗时。如果你已经在积极使用 Twitter 或 Facebook，你就会明白我在说什么。请准备好每天至少投入一小时进行在线营销。如果方法得当，你的互动应让人感觉更像是在建立社区，而不是商业行为，从而与全球受众建立有意义的联系。


    每天挤出一小时或更多时间进行在线营销，看似是一项艰巨的任务，但要在 App Store 中取得成功，每一秒都值得。而且，关键在于这一切都是免费的、自发的广告。加入这些社交网络都不需要费用，唯一的投资就是你的时间。


    请务必记住，这一切方法奏效的唯一前提是尊重你的受众。如果你的推文和博客只包含新闻稿和销售宣传，没有人会愿意关注你。要扩大受众，你需要发布人们真正想读的内容。


    顶级的社交媒体网站是 Facebook 和 Twitter。由于 iOS 平台上有可用的 Twitter 和 Facebook 第三方框架，毫不意外，它们是
    iOS 社区中最为广泛使用的两大社交网络。因此，将大部分精力集中在这两个网站上是明智之举。


    ## 博客


    正如我之前提到的，维护博客是吸引流量到网站的关键要素。你的 iOS 应用主页面通常不会频繁变动，因为它主要用于向人们介绍你的应用是什么以及他们为什么要购买。而你的博客则是发布所有公告、特别优惠和最新动态的核心在线引擎。


    你刚刚发布了一个新的视频预告片或一些截图？写博客吧。你的应用已提交给 App Store 审核团队？写博客吧。你的应用获奖或被其他网站点评？写博客吧。有关于开发经历的有趣故事要分享？是的，你猜对了——写博客吧。


    ### 同步你的博客内容


    每次发布新的博客文章时，相关的 RSS 源会随之更新，同时也会同步到 RSS 阅读器订阅者和任何转载你博客内容的网站。你还应该在 Twitter、Facebook、Digg、Delicious
    以及其他所有能为你带来网站流量并提升应用知名度的主流社交媒体网站上，发布新博客文章的链接。


    不要假设所有访问你网站的人都会订阅你的博客 RSS 源或邮件提醒（详见“iOS 应用网站解析”一节中关于 FeedBurner 邮件订阅的说明）。有些人更倾向于通过其他服务（如
    Twitter）接收消息。


    如果你觉得每次都必须在每个社交网络账号上手動发布博客更新很繁琐，可以使用一些免费的博客服务来自动完成这项任务。


    你可以配置 Posterous、Tumblr 和 TypePad，让它们自动将你的博客文章同步到 Twitter 和 Facebook 账户，以及其他多个网站。你甚至还可以设置
    Tumblr，让它从你的 Twitter RSS 源中拉取推文并自动发布到你的博客上。


    如果你目前使用的博客服务不同，例如 WordPress、Blogger、LiveJournal 或 MovableType，你仍然可以将博客文章自动发布到
    Facebook。在本章稍后部分，我将解释如何轻松地将你的博客 RSS 源同步到你的 Facebook 账户。


    ### 邀请评论


    真正让博客鲜活起来的一个功能是评论功能。赋予读者发言权，能将你的博客从单向阅读的文章转变为充满活力的双向对话。通过鼓励互动，你的博客读者会变得更加忠诚和支持。即使他们不同意你的某篇文章，他们仍然在讨论它、链接它。在建立社区的过程中，并非每个人都持相同观点，这很正常——正是这一点让对话保持趣味性。


    不幸的是，大量垃圾评论堵塞了许多博客的评论区，这相当烦人。为了帮助消除来自自动机器人的垃圾信息，请务必使用带有 CAPTCHA 验证码和垃圾过滤器的博客服务，以确保发表评论的是真人。你可能还需要频繁地监控评论，并通过博客的管理后台删除有问题的评论。是的，这可能会耗费时间，但为了提供一个真正的博客环境，这些努力最终是值得的。


    虽然有些人选择在 Facebook Page 上进行讨论以避免匿名垃圾评论，但博客评论的便利在于无需注册账号。它没有准入门槛。读者无需加入社交网络或登录任何系统。只需填写评论表单并点击提交按钮即可。


    ### 自己搭建博客还是使用第三方博客服务？


    如果你熟悉如何在自己的网络服务器上安装和修改博客软件（例如 WordPress 的开源下载版），你将能定制博客的每一个方面，以满足你的特定需求。


    如果你不愿意处理配置 MySQL 数据库、安装安全更新补丁和编辑 PHP 文件等问题，可以考虑使用前面提到的众多免费博客服务之一。它们会自动更新服务器上的博客软件，并提供最先进的反垃圾工具来管理评论。如果需要，你还可以自定义博客的外观，使其与你网站的现有页面设计相匹配。例如，我使用
    Blogger 远程托管我的公司博客，但其模板经过定制，模仿了我公司网站 Electric Butterfly 的相同设计，以实现两者之间的无缝过渡。


    ## Twitter


    由于很大一部分 iPhone、iPad 和 iPod touch 用户都在使用 Twitter，因此这是一个你绝对不能忽视的社交网络。如果你在 Twitter
    上还没有任何存在感，那么在你继续阅读之前，请帮自己一个忙，立即注册一个免费账号（访问`http://twitter.com`）。


    虽然你可以通过电脑和移动设备上的网页浏览器轻松访问 Twitter，但你可能会更喜欢使用专门的客户端应用来随时掌握 Twitter 动态。受欢迎的选择有 Twitterrific、Echofon、TweetDeck
    以及 Twitter 官方的 iOS 应用。要探索所有适用于 Mac、Windows、Linux 和 iOS 的选项，可以访问 oneforty 的综合 Twitter
    应用目录：`http://oneforty.com`。


    Twitter 的微博/即时消息功能不仅是一种与客户实时沟通（涵盖从技术支持到功能请求等一切）的绝佳方式，也是一个非常被认可的推广 iOS 应用和游戏的平台。除此之外，许多主要的应用评测网站和新闻博主都会密切跟踪
    Twitter 上的相关趋势和话题，因此你的推文可能会为你的应用吸引更多的媒体报道！


    根据 Kisky Netmedia 的 Jonathan Deamer 和 Katie Lips 撰写、并由 Northwest Vision and Media
    支持的《致胜 iPhone 策略》报告（`http://www.scribd.com/winningiphonestrategies`），iPhone 用户发现应用的第四大最具影响力途径是
    Twitter 上的推荐，仅次于前三大途径：口口相传、在线评测和浏览 App Store。这再度印证了 Twitter 作为 iOS 开发者强大营销工具的重要性。


    ### 管理 Twitter 账号'
  raw: 'By focusing your initial marketing efforts on Twitter, Facebook, and other
    popular social networks, you can leverage their word-of-mouth power to drive interested
    consumers to your web site. Since your app is not yet available in the App Store,
    this prerelease stage is all about building awareness and anticipation for the
    product.


    I will warn you in advance that diving into the world of social media can be very
    time-consuming. If you already actively use Twitter or Facebook, you know what
    I’m talking about. Be prepared to dedicate at least one hour every day to online
    marketing. If done right, your interactions should feel less like business and
    more like community building, establishing meaningful connections with a global
    audience.


    Carving out an hour or more each day for online marketing can seem like an overwhelming
    concept, but to succeed in the App Store, it’s worth every second. And the punch
    line is that this is all free, grassroots advertising. There’s no cost to join
    any of these social networks, so the only investment is your time.


    It’s important to remember that the only way any of this works is if you treat
    your audience with respect. If you tweet and blog only about press releases and
    sales pitches, no one will want to follow you. To grow your audience requires
    posting about things that people want to read.


    The top social media sites are Facebook and Twitter. With third-party iOS frameworks
    available for Twitter and Facebook, it should come as no surprise that these are
    the two most widely embraced social networks within the iOS community. So, it
    makes sense to concentrate most of your energy on these two sites.


    Blogging


    As I’ve already mentioned, maintaining a blog is an essential element in driving
    traffic to your web site. Your iOS app’s main web page probably won’t change often,
    since it primarily serves to educate people on what your app is and why they should
    buy your app. Your blog, on the other hand, is the central online engine for posting
    all your announcements, special offers, and news updates.


    You just posted a new video trailer or some screenshots? Blog about it. Your app
    has been submitted to the App Store review team? Blog about it. Your app won an
    award or has been reviewed by another site? Blog about it. Have an interesting
    story to share about your development experience? Yes, you guessed right—blog
    about it.


    Syndicating Your Blog Content


    Every time you publish a new blog entry, the related RSS feed is updated, along
    with feed reader subscribers and any site that syndicates your blog content. You
    should also post a link to the new blog entry on Twitter, Facebook, Digg, Delicious,
    and all other major social media sites that could push web traffic your way and
    increase awareness of your app.


    Don’t assume everyone who visits your site will subscribe to your blog’s RSS feed
    or e-mail alerts (see the “Anatomy of an iOS App Web Site” section for details
    on FeedBurner’s e-mail subscriptions). Some people prefer to receive news through
    other services, such as Twitter.


    If the thought of needing to manually post your blog update on each and every
    one of your social network accounts sounds tedious, you can use one of the free
    blog services that automate this task.


    You can configure Posterous, Tumblr, and TypePad to automatically syndicate your
    blog entries to your Twitter and Facebook accounts, as well as several other sites.
    And you can even set Tumblr to autopost your tweets on your blog, retrieved from
    your Twitter RSS feed.


    If you currently have a blog with a different service, such as WordPress, Blogger,
    LiveJournal, or MovableType, you can still automate the posting of your blog entries
    into Facebook. Later in this chapter, I’ll explain how to easily syndicate your
    blog’s RSS feed into your Facebook account.


    Inviting Comments


    The one feature that really makes a blog come alive is the inclusion of commenting.
    Giving your readers a voice turns your blog from a read-only article into a vibrant
    two-way conversation. By encouraging interaction, your blog readers will become
    much more loyal and supportive. Even if they disagree with one of your posts,
    they are still talking about it and linking to it. When building a community,
    not everyone is going to have the same opinion, which is fine—that’s what keeps
    the conversation interesting.


    Unfortunately, the amount of spam that ends up clogging up the comments section
    of many blogs can be quite annoying. To help eliminate spam that comes from automated
    bots, make sure to use a blog service with CAPTCHA web forms and spam filters
    to ensure that posted comments are from actual humans. You may also want to monitor
    posted comments frequently and remove questionable ones via the blog’s admin dashboard.
    Yes, that can be time-consuming, but it’s ultimately worth the effort to offer
    a true blogging environment.


    Although some people opt to hold their conversations on a Facebook Page to avoid
    anonymous spam, the convenience of blog comments is that no account is required.
    There’s no barrier to entry. Readers don’t need to join a social network or log
    in to any system. They just fill out the comment form and click the submit button.


    Host Your Own Blog or Use a Third-Party Blog Service?


    If you’re comfortable with installing and modifying blog software, such as the
    open source download from WordPress, on your own web server, you’ll have the power
    to customize every aspect of the blog to suit your specific needs.


    If you would rather not deal with configuring MySQL databases, installing security
    update patches, and editing PHP files, consider using one of the many free blog
    services previously mentioned. They automatically update the blog software on
    their servers and offer state-of-the-art antispam tools for managing comments.
    You can also customize the look and feel of your blog to match your web site’s
    existing page design if desired. For example, I use Blogger to remotely host my
    company blog, but the template was customized to mimic the same design as my Electric
    Butterfly web site, for a seamless transition between the two.


    Twitter


    Since a large percentage of iPhone, iPad, and iPod touch users are on Twitter,
    that’s one social network you really can’t afford to avoid. If you don’t already
    have a presence on Twitter, before we go any further, do yourself a favor and
    sign up for a free account now (go to `http://twitter.com`).


    Although you can easily access Twitter from a web browser on both your computer
    and mobile device, you may prefer using a dedicated client app for staying on
    top of your Twitter world. Popular favorites are Twitterrific, Echofon, TweetDeck,
    and Twitter’s official iOS app. To explore all the available options for Mac,
    Windows, Linux, and iOS, check out oneforty’s comprehensive Twitter apps directory
    at `http://oneforty.com`.


    Twitter’s microblogging/messaging is not only a great way to communicate with
    your customers in real time on everything from support issues to feature requests,
    but it’s also a very accepted platform for promoting your iOS apps and games.
    And on top of that, many of the major app review sites and news bloggers keep
    tabs on related trends and topics within the Twittersphere, so your tweets may
    attract additional press coverage for your apps!


    According to the report “Winning iPhone Strategies,” written by Jonathan Deamer
    and Katie Lips at Kisky Netmedia and supported by Northwest Vision and Media (`http://www.scribd.com/winningiphonestrategies`),
    the fourth most influential method of app discovery for iPhone users is recommendations
    on Twitter, just below the top three: word-of-mouth, online reviews, and browsing
    the App Store. This reinforces the importance of Twitter as a powerful marketing
    tool for iOS developers.


    Managing Twitter Accounts'
  trans: '

    # 社交媒体营销策略


    通过将初期营销工作集中在 Twitter、Facebook 和其他热门社交网络上，你可以利用它们的口碑传播力，将感兴趣的消费者吸引到你的网站。由于你的应用尚未在
    App Store 上架，这个预发布阶段的目标就是建立产品的知名度和期待感。


    我必须提前提醒你，深入社交媒体的世界可能会非常耗时。如果你已经在积极使用 Twitter 或 Facebook，你就会明白我在说什么。请准备好每天至少投入一小时进行在线营销。如果方法得当，你的互动应让人感觉更像是在建立社区，而非商业行为，从而与全球受众建立有意义的联系。


    每天挤出一小时或更多时间进行在线营销，看似是一项艰巨的任务，但要在 App Store 中取得成功，每一秒都值得。而且，关键在于这一切都是免费的、自发的广告。加入这些社交网络都不需要费用，唯一的投资就是你的时间。


    请务必记住，这一切方法奏效的唯一前提是尊重你的受众。如果你的推文和博客只包含新闻稿和销售宣传，没有人会愿意关注你。要扩大受众，你需要发布人们真正想读的内容。


    顶级的社交媒体网站是 Facebook 和 Twitter。由于 iOS 平台上有可用的 Twitter 和 Facebook 第三方框架，毫不意外，它们是
    iOS 社区中最为广泛使用的两大社交网络。因此，将大部分精力集中在这两个网站上是明智之举。


    ## 博客


    正如我之前提到的，维护博客是吸引流量到网站的关键要素。你的 iOS 应用主页面通常不会频繁变动，因为它主要用于向人们介绍你的应用是什么以及他们为什么要购买。而你的博客则是发布所有公告、特别优惠和最新动态的核心在线引擎。


    你刚刚发布了一个新的视频预告片或一些截图？写博客吧。你的应用已提交给 App Store 审核团队？写博客吧。你的应用获奖或被其他网站点评？写博客吧。有关于开发经历的有趣故事要分享？是的，你猜对了——写博客吧。


    ### 同步你的博客内容


    每次发布新的博客文章时，相关的 RSS 源会随之更新，同时也会同步到 RSS 阅读器订阅者和任何转载你博客内容的网站。你还应该在 Twitter、Facebook、Digg、Delicious
    以及其他所有能为你带来网站流量并提升应用知名度的主流社交媒体网站上，发布新博客文章的链接。


    不要假设所有访问你网站的人都会订阅你的博客 RSS 源或邮件提醒（详见“iOS 应用网站解析”一节中关于 FeedBurner 邮件订阅的说明）。有些人更倾向于通过其他服务（如
    Twitter）接收消息。


    如果你觉得每次都必须在每个社交网络账号上手动发布博客更新很繁琐，可以使用一些免费的博客服务来自动完成这项任务。


    你可以配置 Posterous、Tumblr 和 TypePad，让它们自动将你的博客文章同步到 Twitter 和 Facebook 账户，以及其他多个网站。你甚至还可以设置
    Tumblr，让它从你的 Twitter RSS 源中拉取推文并自动发布到你的博客上。


    如果你目前使用的博客服务不同，例如 WordPress、Blogger、LiveJournal 或 MovableType，你仍然可以将博客文章自动发布到
    Facebook。在本章稍后部分，我将解释如何轻松地将你的博客 RSS 源同步到你的 Facebook 账户。


    ### 邀请评论


    真正让博客鲜活起来的一个功能是评论功能。赋予读者发言权，能将你的博客从单向阅读的文章转变为充满活力的双向对话。通过鼓励互动，你的博客读者会变得更加忠诚和支持。即使他们不同意你的某篇文章，他们仍然在讨论它、链接它。在建立社区的过程中，并非每个人都持相同观点，这很正常——正是这一点让对话保持趣味性。


    不幸的是，大量垃圾评论堵塞了许多博客的评论区，这相当烦人。为了帮助消除来自自动机器人的垃圾信息，请务必使用带有 CAPTCHA 验证码和垃圾过滤器的博客服务，以确保发表评论的是真人。你可能还需要频繁地监控评论，并通过博客的管理后台删除有问题的评论。是的，这可能会耗费时间，但为了提供一个真正的博客环境，这些努力最终是值得的。


    虽然有些人选择在 Facebook Page 上进行讨论以避免匿名垃圾评论，但博客评论的便利在于无需注册账号。它没有准入门槛。读者无需加入社交网络或登录任何系统。只需填写评论表单并点击提交按钮即可。


    ### 自己搭建博客还是使用第三方博客服务？


    如果你熟悉如何在自己的网络服务器上安装和修改博客软件（例如 WordPress 的开源下载版），你将能定制博客的每一个方面，以满足你的特定需求。


    如果你不愿意处理配置 MySQL 数据库、安装安全更新补丁和编辑 PHP 文件等问题，可以考虑使用前面提到的众多免费博客服务之一。它们会自动更新服务器上的博客软件，并提供最先进的反垃圾工具来管理评论。如果需要，你还可以自定义博客的外观，使其与你网站的现有页面设计相匹配。例如，我使用
    Blogger 远程托管我的公司博客，但其模板经过定制，模仿了我公司网站 Electric Butterfly 的相同设计，以实现两者之间的无缝过渡。


    ## Twitter


    由于很大一部分 iPhone、iPad 和 iPod touch 用户都在使用 Twitter，因此这是一个你绝对不能忽视的社交网络。如果你在 Twitter
    上还没有任何存在感，那么在你继续阅读之前，请帮自己一个忙，立即注册一个免费账号（访问 `http://twitter.com`）。


    虽然你可以通过电脑和移动设备上的网页浏览器轻松访问 Twitter，但你可能会更喜欢使用专门的客户端应用来随时掌握 Twitter 动态。受欢迎的选择有 Twitterrific、Echofon、TweetDeck
    以及 Twitter 官方的 iOS 应用。要探索所有适用于 Mac、Windows、Linux 和 iOS 的选项，可以访问 oneforty 的综合 Twitter
    应用目录：`http://oneforty.com`。


    Twitter 的微博/即时消息功能不仅是一种与客户实时沟通（涵盖从技术支持到功能请求等一切）的绝佳方式，也是一个非常被认可的推广 iOS 应用和游戏的平台。除此之外，许多主要的应用评测网站和新闻博主都会密切跟踪
    Twitter 上的相关趋势和话题，因此你的推文可能会为你的应用吸引更多的媒体报道！


    根据 Kisky Netmedia 的 Jonathan Deamer 和 Katie Lips 撰写、并由 Northwest Vision and Media
    支持的《致胜 iPhone 策略》报告（`http://www.scribd.com/winningiphonestrategies`），iPhone 用户发现应用的第四大最具影响力途径是
    Twitter 上的推荐，仅次于前三大途径：口口相传、在线评测和浏览 App Store。这再度印证了 Twitter 作为 iOS 开发者强大营销工具的重要性。


