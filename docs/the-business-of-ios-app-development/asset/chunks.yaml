    to insert upgrade information for the paid version in a popover window (`UIPopover`)
    or a centered modal view(`UIModalPresentationFormSheet`) without dominating the
    entire screen. In Illusion Labs’ Labyrinth 2 HD Lite, the menu of free mazes includes
    a small banner ad for the paid version. Tap the banner, and a popover window appears
    with a scrollable description of premium features, screenshots, and an App Store
    buy button (see [Figure 6-6](#9781430262381_Ch06.xhtml#Fig6)).


    ![9781430262381_Fig06-06.jpg](images/9781430262381_Fig06-06.jpg)


    [Figure 6-6](#9781430262381_Ch06.xhtml#_Fig6). Illusion Labs’ Labyrinth 2 HD Lite
    presents the paid version up-sell in a popover window on the iPad


    The beauty of a `UIPopover` is that the `UIView` it displays can be easily reused
    and shown again in another `UIPopover` elsewhere in the app. Beyond the mazes
    that Illusion Labs provides, the company also hosts a free online community where
    customers can upload and share their own contributed maze creations. From within
    the free Labyrinth 2 HD Lite app, users can browse the list of third-party mazes,
    but they will quickly notice that the paid version is required in order to download
    and play those community mazes. That’s a great motivator to upgrade to the full
    game. In the lite version, the download button is conveniently replaced with a
    Full Version Info button. When tapped, that button displays the same paid version
    information in a `UIPopover` as previously seen in other sections of the app (see
    [Figure 6-7](#9781430262381_Ch06.xhtml#Fig7)). The popover window provides the
    upgrade information when needed, without being intrusive to the rest of the interface.


    ![9781430262381_Fig06-07.jpg](images/9781430262381_Fig06-07.jpg)


    [Figure 6-7](#9781430262381_Ch06.xhtml#_Fig7). Requiring Labyrinth 2 HD Lite users
    to buy the paid version in order to download the thousands of free, third-party
    mazes contributed by the Labyrinth community is a great incentive to upgrade


    **App Rejection Warning**  You should not display the app’s price within your
    application. When promoting the full version within your free lite version, don’t
    list the price. Apple has localized App Stores in many countries around the world,
    supporting many different currencies, so it frowns upon hard-coded prices displayed
    in your app. Apple’s app review team does not always flag this as a cause for
    rejection, but it happens enough that you’ll want to avoid doing it. Beyond the
    risk of rejection, it’s important not to list the price in your app so that you
    have the flexibility to change the App Store price at any time for special sale
    offers without needing to submit an update.


    Including Analytics


    It’s important to include analytics in your lite version so that you can track
    how many people are tapping that buy button. Those analytics reports combined
    with your iTunes Connect statistics will help you to determine the effectiveness
    of your lite version as a promotional tool. You’ll know how many people are downloading
    your lite app, how often they use it, how many users tap the buy button, and how
    many sales your paid version is pulling in. With all that data at your fingertips,
    if the conversion rate of lite-to-paid sales is much lower than expected, you
    can experiment with the wording and button placements in subsequent updates in
    an effort to improve results.


    Of course, knowing how customers use your paid app can be just as valuable, so
    if you do add analytics to your development strategy, make sure to wire it into
    all your apps—both lite and paid—for the most comprehensive picture of how they
    are performing. Apple recently changed its rules on what information third-party
    analytics are allowed to collect. To learn the facts on in-app analytics, check
    out [Chapter 7](#9781430262381_Ch07.xhtml).


    **Tip**  If you’re an iOS developer, you should join the iTunes Affiliate Program.
