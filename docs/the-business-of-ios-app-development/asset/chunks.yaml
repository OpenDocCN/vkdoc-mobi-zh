  trans: '

    * **第 9 章：测试与可用性：展现最佳状态**：你知道吗，App Store 中许多一星差评都是因为用户对难用的应用界面或充满漏洞的功能感到沮丧？低分的用户评价会严重影响应用的口碑和销量，因此尽可能避免这种情况应是你的首要任务。第
    9 章将全面介绍提供内置帮助、配置设备内测以及进行深入 Beta 测试的价值。

    * **第 10 章：启动派对！创造预发布热度**：你的应用开发完毕，但在提交至 App Store 之前，是时候为其制造一些预发布热度了。第 10 章将向你展示最佳方法：通过在你的网站、博客、Twitter
    及其他社交网络上进行推广，并尽可能让每一个人都来评论或讨论你的应用，从而为你的应用掀起兴奋与期待的热潮。

    * **第 11 章：通往成功的钥匙：App Store 提交流程**：你在 App Store 中的产品页面是全球用户接触你应用的入口，因此其呈现方式对于正确传达应用价值至关重要。本章将引导你完成
    iTunes Connect 中的应用提交流程，帮助你优化应用的文本描述、关键词、评级、截图及其他必需元素，并探讨如何设定价格以最大化销售潜力。

    * **第 12 章：提升认知度：为你的 iOS 应用打造知名度**：一旦你的应用成功上架 App Store，就该启动宣传引擎了，以提高消费者对你应用可获取性的认知。即使你的预发布营销努力带来了初期的销售激增，后续仍有至关重要的工作要做。你的职责是确保你的
    iOS 应用不会淹没在涌入 App Store 的成千上万款新应用中。第 12 章将揭示如何撰写高效的新闻稿、利用促销代码、通过采访增加曝光，并通过促销活动、赠品以及精心策划的限时促销活动来保持
    App Store 中的发展势头。


    本书假定你已熟悉 Objective-C、Cocoa Touch 和 iOS 应用程序编程。如果你希望在 Apple 开发者网站提供的文档和教程之外寻找更深入的指导，我强烈推荐以下几本
    Apress 出版的书籍：


    * 《在 Mac 上学习 Objective-C》，作者：Scott Knaster、Waqar Malik 和 Mark Dalrymple（`http://www.apress.com/9781430241881`）

    * 《iOS 7 开发入门：探索 iOS SDK》，作者：Jack Nutting、Fredrik Olsson、Dave Mark 和 Jeff LaMarche（`http://www.apress.com/9781430260226`）


    ## 开始上手你的第一个 iOS 应用


    我们需要涵盖的内容非常多，所以在深入之前，请确保你已经下载并安装了最新的 Xcode 工具和 iOS SDK（7.0 或更高版本）。如果没有，请前往 Apple
    开发者网站 `http://developer.apple.com/`。


    如果你还不是注册的 Apple 开发者，请先注册（免费），这样你就可以访问 iOS 开发中心（`http://developer.apple.com/devcenter/ios/`）提供的最新
    SDK、工具、文档、教程和示例代码。


    在你访问该网站时，花点时间申请所需的 iOS 开发者计划。不要等到你的应用准备提交到 App Store 时才去做这件事，因为收到 iOS 开发者计划的接受通知可能需要数周时间，这会不必要地延误你的进度。被接受后，支付相应的费用以完成注册。当你的付款处理完毕后，在登录
    iOS 开发中心时，你会看到浏览器屏幕右侧有一个“iOS Developer Program”栏。点击列在那里的 `iTunes Connect` 按钮。


    在 iTunes Connect 的主页上，请务必访问 `Contracts, Tax, & Banking Information`（合同、税务和银行信息）部分，以查看你当前生效的合同。默认情况下，你应该已经激活了“免费应用程序”合同，该合同允许你向
    App Store 提交免费应用。但如果你想向 App Store 提交付费应用，则需要申请一份“付费应用程序”合同。Apple 需要你的银行和税务信息，以便在你有应用销售收入时向你付款。由于
    Apple 通过安全的电子存款转账，你需要提供你银行的 ABA 路由号码、名称和地址以及你的账号，因此请确保你的银行支持与第三方供应商的电子交易。如果你计划在多个地区的
    App Store 销售应用，为了接收国际付款，Apple 可能还需要你银行的 SWIFT 代码。虽然大多数大型全国性银行都支持 SWIFT 系统，但一些较小的独立银行和信用合作社可能不支持，因此请确保你的银行能够提供
    SWIFT 代码。


    在你完成所需步骤（参见图 1-4）之前，Apple 将托管其欠你的任何款项。由于这个过程也可能相当漫长，我强烈建议在将应用提交到 App Store 之前很久就完成“付费应用程序”合同的签订。


    ![9781430262381_Fig01-04.jpg](img/9781430262381_Fig01-04.jpg)


    图 1-4. 为了获得 App Store 销售的收入，请确保你在 iTunes Connect 在线门户中完成 Apple 要求的“付费应用程序”合同


    ## 你的应用已经在 App Store 里了？提升销量永远不会太晚


    即使你是一位资深的 iOS 开发者，目前在 App Store 中已经有一款或多款应用，你仍然可以采取许多措施来增加这些应用的曝光度和销量。你已经投入了宝贵的开发时间和金钱才走到这一步，现在放弃实在太可惜了！


    但是，切勿犯下直接跳到本书发布后相关章节的错误。前面章节中介绍的许多解决方案都能产生显著效果，尤其是在为现有应用规划新版本和更新时。

    '
- fmt: '# Take the time to work through all the chapters in the order they’re presented.
    You may be surprised by the tips you pick up along the way that can help even
    older apps that have been stagnating for months in the App Store.


    ## Developing iOS Apps for Clients


    This book can benefit not only the people who want to sell their own apps in the
    App Store, but also consultants who develop apps for third-party companies. You’re
    being hired for your expertise, so anything you can do to help your clients succeed
    in the App Store will serve to strengthen your worth to them.


    What better way to secure a consulting contract than by offering a full turnkey
    service, guiding your clients from app concept to launch, providing both code
    and marketing support? By adding an optional marketing/publicity package to your
    list of iPhone development services, you’re also establishing new income opportunities
    for yourself!


    The success of your clients directly affects the success of your relationship
    with them. Add this book’s business solutions to your existing toolbox so that
    you can prove to be an indispensable superhero for all your clients’ mobile app
    needs.


    Anyone can develop an app; it takes a specific set of skills to make sure an app
    succeeds. If you can provide more than just source code to a client, you become
    an invaluable asset.


    ## Ready to Dive In?


    Now that we’ve taken a broad look at the current state of the App Store, it’s
    apparent that several challenges await all iOS developers as they navigate their
    way along the road to success. As programmers, problem solving is what we all
    do on a daily basis, so I’m confident you’ll enjoy each step in this process.
    And just think, put together the right puzzle pieces, and you may just find that
    elusive pot of gold at the end of the road. Mmmm, app sales!


    First, shake off all that Objective-C code bouncing around in your brain. You’ll
    want a clear head for the next two chapters. Don’t worry—you’ll be diving into
    design and development issues soon enough. But before you do that, you need to
    do a little competitive research and business planning. So, roll up your sleeves,
    put on your detective hat, grab your spy glass, and let’s get started.


    # Chapter 2


    ## Doing Your Homework: Analyzing iOS App Ideas and Performing Competitive Research


    So, you think you have a good idea for an iPhone or iPad app? Make sure it’s a
    *great* idea. No amount of marketing will help sell a bad app. Sure, you may have
    excellent coding skills with the ability to produce a performance-optimized, high-quality
    application, but if it’s based on a poorly conceived concept, it won’t stand a
    chance in today’s crowded App Store.


    In this chapter, you’ll learn how some good old-fashioned detective work can help
    test the validity and marketability of your app concept. Analyzing what your competition
    is doing right—*and more importantly, wrong*—will give you the insight needed
    to truly refine and improve your ideas into a unique app that stands apart from
    the rest.


    Even if the thought of doing a little competitive research seems elementary to
    you, keep reading. You may be pleasantly surprised to learn some new tricks here.
    We’ll also explore the advantages of targeting multiple iOS devices beyond just
    the iPhone and the business challenges of universal applications.


    ### Fulfilling a Need


    People buy software to solve a problem or satisfy a need. To-do lists keep us
    organized. Weather and news apps keep us informed. Games feed into our desire
    to be entertained. Even silly novelty apps serve our basic need for acceptance
    by enabling people to bond over a few shared laughs. Although these general examples
    may be easy to recognize and understand, what about more specific needs?


    If you’re thinking of building something other than a game, such as a productivity
    or utility app, here are a few factors to consider:


    *   Does it focus on a need or issue that is currently not being addressed by
    existing apps?

    *   Does your app fulfill that need in a way that makes the mobile experience
    significantly easier than performing the same tasks on a desktop computer?

    *   If your app is similar to other existing apps, what feature(s) can you add
    that would solve the needs not currently addressed by your competitors?


    ### Discovering Untapped Markets


    Thousands of iPhone apps have very few users. Back in 2009, before Apple changed
    their policy on third-party app analytics (more on that in [Chapter 7](#9781430262381_Ch07.xhtml)),
    the popular mobile advertising network `AdMob` reported that of the iPhone apps
    that actively displayed embedded `AdMob` ads, a whopping 54 percent of them had
    fewer than 1,000 users each. Granted, the few thousand apps included in that 2009
    `AdMob` report represent a small sample compared to the sheer size of the App
    Store (then and now), but it’s still a shocking wake-up call nonetheless, especially
    when you consider that most of the apps in `AdMob`’s network are free.


    Even if an app is free, it does not guarantee that people will use it. And if
    you expect people to pay for your app, it’s that much more important that you
    provide a desperately desired service, feature, or experience—something users
    will feel compelled to download.


    Although mobile apps are inexpensive compared to traditional desktop software
    prices, they are no longer considered impulse buys, as they were in the early
    days of the App Store. In the past year, users have packed their iPhones, iPads,
    and iPod touches with so many apps that they’ve gradually become much more selective
    about which apps they choose to download.


    Just think about your own decision-making process when purchasing a new app. You
    may not think twice about spending $12 for a movie ticket, but for some curious
    reason, you more than likely contemplate at great length whether to spend a mere
    $2.99 on an iPhone game. I’m guilty of doing the same thing, even though as a
    programmer, I’m fully aware of how much hard work goes into creating an iOS application.


    Part of the problem is that with so many apps priced at only 99 cents in an attempt
    to boost volume sales and rank higher on the App Store charts, users now have
    a distorted perception of app worth. Unfortunately, this has conditioned users
    to expect a lot of value for very little money. To cut through this purchase barrier,
    your app *must* be special, providing a unique experience and/or satisfying an
    existing need.


    With more than 1,000,000 apps in the App Store, at first glance, it might appear
    that all the original ideas have already been taken, and for the most part that
    is true. When Apple says, “There’s an app for that,” the company is not kidding,
    or so it would seem. But then, every so often, a pioneer comes along with a new
    app that causes developers worldwide to slap their own foreheads while shouting,
    “Why didn’t I think of that?”'
