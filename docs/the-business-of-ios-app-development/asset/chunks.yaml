    拥有多重差异化功能，并辅以一份大致勾画出您计划在未来版本中新增功能的路线图，将有助于您的应用保持相关性和竞争力。例如，早期版本的 iOS 在 `Mail`、`Notes`
    和 `Messages` 中并不支持横向键盘。为了满足用户对更便捷的双指打字需求，大量宽屏键盘应用涌入 App Store，提供在横屏模式下输入电子邮件和笔记的功能。其中许多
    iPhone 应用仅此一招，横向键盘就是它们唯一的核心卖点。当 iOS 3 为 `Mail`、`Notes` 及其他内置应用添加横向键盘支持后，这些单一功能应用的实用性瞬间丧失。幸存下来的应用是那些仍能提供独特价值的，例如将笔记与
    Google Docs 同步、将笔记分组管理、将笔记发布到 Twitter 等。


    请记住，您添加的功能越多，界面设计就需要越精简直观，尤其是在小巧的手机屏幕上。经过几次更新后，如果您的应用开始显得臃肿杂乱，那么它就未能完成其首要目标——提供易于使用的移动体验。看看官方
    Twitter 应用（原名 `Tweetie`）。其开发者 Loren Brichter 持续在每次发布中增加数十项新功能，同时花费大量精力简化 UI 设计，以确保新功能永远不会干扰用户享受应用的核心
    Twitter 功能。他实现的每一项新功能都能进一步赋能用户，同时又不会降低应用的可用性。许多开发者在构建出他们认为“完美”的应用后，便让其停滞不前。然而用户永远不会完全满足，iOS
    SDK 也总在变化。请务必尽一切努力，随着应用商店共同进化。


    ## 面向多种 iOS 设备


    除非您的游戏或应用需要使用特定设备专属的硬件或 iOS 系统功能，否则让您的应用尽可能覆盖更多用户和设备，对您最为有利。这其实是简单的销售逻辑。更大的目标受众意味着更大的潜在客户群。虽然让您的应用适配多种设备需要您投入一些额外的开发工作，但这是提高您（时间和金钱）投资回报率的好方法。如果您的应用可以设计为与所有
    1.2 亿台 iOS 设备兼容，为何只针对几百万 iPad 用户呢？随着苹果发布每一款新的 iOS 设备，您的潜在受众都应持续扩大。


    由于仍有大量用户在较旧的 iPhone 和 iPod touch 上运行 iOS 5，一些开发者采取了偷懒的方式，仅仅针对这个“最低公分母”来开发应用。他们知道一个为
    iOS 7 编译的应用可能在 iOS 5 甚至 iPad 上都能正常运行。唯一的问题在于，由于 iOS 7 进行了重大的重新设计，这些应用的视觉观感会截然不同。这类应用编码简单，并且与广泛的
    iOS 设备兼容，但这绝非最优选择。沿着这条路走下去，您是在严重损害自家业务在 App Store 的未来。


    iPhone 5 和最新款 iPod touch 的用户希望应用能够充分利用 Retina 显示屏增强的分辨率和额外的屏幕高度。如果您的竞争对手提供了令人惊艳的、针对
    Retina 显示屏优化的 UI，而您的应用仍在使用陈旧、仅限 3.5 英寸屏幕的 iOS 5 界面，那么竞争对手的应用将对 iPhone 5 和新款 iPod
    touch 用户更具视觉吸引力。这可能导致您失去销售机会。只需增加一些额外的图形设计工作，您的应用就可以——而且*应该*——被精心打造，使其 UI 对 Retina
    显示屏和老一代低分辨率屏幕都进行了优化。第 4 章 讨论了面向这两种显示屏的设计要求。


    这一点同样适用于 iPad。尽管您的 iPhone 应用在苹果这款流行的平板电脑上可能运行良好，但请不要满足于次等的用户体验。诚然，iPad 包含一个“2x”按钮，可以将
    iPhone 应用放大至全屏，但与竞争对手精美的原生 iPad 应用相比，这种放大效果像素感很强，相当丑陋。请记住，iPad 产品线目前有两个不同的设备家族：iPad
    和 iPad mini。


    由于 iOS 包含一些 iPad 专属的独特 UI 组件，一些 iPhone 开发者可能不想为了恰当地支持这两个目标平台，而维护两个独立的 Xcode 项目来开发本质上相同的产品。为了解决这个问题，苹果引入了一种新的通用应用程序格式，它可以在
    iPhone 和 iPad 设备上运行。根据运行通用应用的设备，系统会启动相应版本的应用。这样一来，您可以维护一个共享源代码的 Xcode 项目，但为每个目标设备分别设计定制的
    UI。例如，您的 iPhone 应用可能会使用导航控制器来组织内容，但在 iPad 上，您很可能更想显示一个分视控制器。两个版本使用相同的数据，但以最适合各自设备的方式呈现。


    对于同时面向 iPhone 和 iPad 的开发人员，苹果强烈建议构建通用应用程序。在 App Store 中仅管理和更新一个应用程序，对于同时在 iPhone
    和 iPad（甚至 iPod touch）上使用您应用的用户来说会方便得多。但是，如果您的 iPad 版本与 iPhone 应用差异巨大，包含数十项需要大量重写代码的新功能，那么通用应用程序可能就不是理想之选。如果两个版本在代码上没有太多共性，将它们作为两个独立产品来构建可能更有意义：一个针对
    iPhone，一个针对 iPad。在决定是否创建通用应用时，业务和营销因素也会发挥作用。


    ## 从商业角度看通用应用程序


    从开发的角度来看，创建通用应用程序有很多优点，但这是适合您的选择吗？如果您的应用是免费的，那么您的目标就是为用户提供最便捷、最友好的访问方式。通用应用程序让用户可以轻松地在其所有苹果移动设备上下载您的应用。但付费应用则是另一回事。暂且抛开技术上的好处，让我们来看看相关的业务因素。


    当您创建了一个通用应用程序，现有 iPhone 应用的用户将能够免费获得 iPad 版本，因为通用应用程序不支持官方的升级机制。如果您的 iPad 应用代表了增强版，提供了您的
    iPhone 版本中所不具备的数十项独家新功能，那么将该应用作为独立的 iPad 版本发布可能更有意义。


    通过将 iPad 应用作为独立产品销售，您有机会收回开发成本。如果它提供了远超 iPhone 版本的价值，大多数客户不会介意为此付费，即使他们已经购买了 iPhone
    版本。我说“大多数”是因为总会有少数用户抗议，他们认为应该免费获得适用于所有 iOS 设备的所有应用版本。具有讽刺意味的是，最响亮的抱怨往往来自那些只花了
    99 美分购买您原始 iPhone 应用的人。但是，不要仅仅因为担心无法让所有人满意，就切断一个能够支持您持续开发的潜在收入来源。这里有个小秘密：你不可能取悦所有人。只需构建尽可能最好的功能和用户体验。如果您为客户提供了额外的价值，他们中的大多数人会很乐意为增强版的
    iPad 应用付费。

