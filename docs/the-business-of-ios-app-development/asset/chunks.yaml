  raw: 'iOS 3.2 also added a desktop synchronization feature, which enables an app
    to display its file directory in a special file sharing list within the desktop
    iTunes when your iOS device is synchronized with your computer. Technically, if
    your apps supported this feature, your users could copy the stored data file from
    your lite version onto their desktop, and then drag it back into iTunes onto the
    File Sharing directory of your paid app. But that’s asking your customers to do
    a lot of extra work for something they shouldn’t need to deal with in the first
    place. If you value your customers and want them to have a satisfying user experience,
    you’ll avoid this solution.


    Obviously, this is where In-App Purchase would make your life much easier, sidestepping
    the hassles of passing data from a lite version to a separate paid app. But don’t
    despair—there are other ways to accomplish this task.


    Syncing with the Cloud


    Some developers have solved the problem of migrating data by implementing a synchronizing
    service that enables customers to sync their app data to a remote server. Popular
    apps like Flixoft’s Grocery Gadget encourage users to sign up for a free group
    account so that data from the lite version can be easily transferred to the paid
    version.


    If your app stores large amounts of complex data, or if you simply want to give
    customers a way to access their data from alternative locations and devices (such
    as their iPad or desktop computer’s web browser), then maintaining a synchronizing
    service might be your best bet. If this sounds like an appealing solution for
    your app needs, here are a few affordable cloud services worth checking out:


    *   Dropbox for Developers (`http://www.dropbox.com/developers`)

    *   Google App Engine (`http://code.google.com/appengine/`)

    *   Amazon S3 (`http://aws.amazon.com/s3/`)

    *   Rackspace Cloud (`http://www.rackspacecloud.com`)

    *   Parse (`http://parse.com`)


    If you don’t want the hassle of developing and maintaining a server-side web application
    to handle the synchronizing of data between your native app and the cloud, you
    may want to first look at Dropbox’s SDK for iOS. Dropbox has become a very popular
    choice for mobile developers who need to synchronize data across multiple devices.
    But if you need to transfer only a very small amount of data from one app to another,
    there is yet another option.


    Transferring Data via URL


    Some developers have found success transferring data across a unique URL command.
    For example, if an iOS app makes an open URL request for an HTTP web site address,
    Mobile Safari automatically launches and processes the request, since it is the
    default app registered to handle HTTP. In a nutshell, the app just sent data to
    Mobile Safari. You can put this same concept to work for your own apps by setting
    up a unique URL protocol handler.


    For your URL protocol to work, it needs to use a prefix that is not already being
    used by any other application. Since you have no idea what unique protocols other
    iOS apps might be using for this same purpose, you should come up with your own
    prefix that is obscure enough to prevent conflicts with those other apps.


    For the purposes of this exercise, let’s create a unique protocol for our fictional
    parked-car locator app, Breadcrumbs. We want users of the lite version to be able
    to transfer their saved parking locations to the paid version. Since the amount
    of data is very small (just a few GPS coordinates) and does not contain any confidential
    information, transferring the data via an open URL command would work quite well.


    For our URL prefix, we’ll use `bcrumbs`. If your app has an original name (which
    it should), then that name (or a variation of it) might lend itself nicely as
    a unique prefix. First, the `bcrumbs` URL protocol needs to be registered with
    the iOS system as being assigned to the full version of Breadcrumbs. This is done
    by adding a new URL type to the paid app’s Info.plist file in Xcode (see [Figure
    6-8](#9781430262381_Ch06.xhtml#Fig8)).


    ![9781430262381_Fig06-08.jpg](images/9781430262381_Fig06-08.jpg)


    [Figure 6-8](#9781430262381_Ch06.xhtml#_Fig8). Open your full version’s Info.plist
    file within Xcode’s plist editor to add a new URL type


    To add a new entry to the Info.plist file, select the last row in the plist editor,
    and then click the gray plus symbol (+) button on the right side. In the new blank
    row, choose URL Types from the contextual menu list that appears in the left Key
    column.


    With the new URL type now added to your Info.plist, open its disclosure triangle
    to configure its nested properties. Under its Item 0 key, you’ll need to add the
    unique `com.company.Application` property of this paid app to the URL identifier
    field. For the fictional Breadcrumbs app, that would most likely be `com.electricbutterfly.Breadcrumbs`.


    Next, click the plus button again to add another nested key directly below the
    URL identifier, and choose URL Schemes from the new key’s contextual menu. The
    URL scheme is where you define your unique URL protocol handler, so in the case
    of the Breadcrumbs example, it’s `bcrumbs`.


    **Note**  If you have a single Xcode project set up with two compile targets—one
    target build for your lite version and one target build for your paid version—you’ll
    need to create a separate plist file for each target. Only the plist file of your
    app’s full version can contain the unique URL protocol handler definition. If
    your lite version’s plist file references this same URL type, then your lite version
    will end up receiving its own URL requests, which will cause a conflict. When
    your lite version sends the unique URL request, you want only your paid version
    to respond to it.


    Now that the unique `bcrumbs` URL protocol is assigned to the full version of
    Breadcrumbs, the next step is to add code to the lite version for transferring
    the data via URL. Let’s say you’ve added a new button to the lite app’s Settings
    screen; it’s called Transfer My Data to Full Version, and it has already been
    wired up in Interface Builder. Let’s also assume that the event handler already
    includes code for obtaining the data from the lite app’s sandbox (such as content
    from an XML file or a plain-text file).


    You can’t send raw data via a URL query, so it first must be Base64-encoded and/or
    URL-encoded. The iOS SDK does not include Base64 encoding and decoding, but several
    third-party Objective-C libraries, such as Google Toolbox for Mac (`http://code.google.com/p/google-toolbox-for-mac/`),
    provide Base64 support for iOS. If only URL-encoding is sufficient for your needs,
    you can easily call the native iOS `NSString` method `stringByAddingPercentEscapesUsingEncoding`.


    Once the data is Base64-encoded and/or URL-encoded and stored in an `NSString`—let’s
    call it `encodedData`—it can be sent as part of the unique URL query:


    ```

    NSString *urlQuery = [NSString stringWithFormat:@"bcrumbs://localhost/importData?%@",
    encodedData];

    NSURL *url = [NSURL URLWithString:urlQuery];

    [[UIApplication sharedApplication] openURL:url];

    ```


    When a user taps the Transfer My Data to Full Version button, the lite version
    makes that URL request. iOS recognizes the `bcrumbs` URL protocol handler as being
    registered to the full version of Breadcrumbs, so that unique URL is passed to
    the paid app. The full version of Breadcrumbs launches to receive and parse that
    URL command.


    For that last part to succeed, the paid app must include the `application:handleOpenURL`
    handler in the application delegate’s implementation. For example, my BreadcrumbsAppDelegate.m
    file includes the following code:


    ```

    - (BOOL)application:(UIApplication *)application handleOpenURL:(NSURL *)url {

         if([@"/importData" isEqual:[url path]]) {

             NSString *urlData = [url query];


    // First, you should ask users if they want existing

