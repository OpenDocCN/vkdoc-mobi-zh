    `com/products/prismo/mac/` 是 Positive Team 开发的 Mac OS X 应用程序，拥有简洁且简化的 iTunes 风格界面设计。它支持从
    iTunes Connect 自动下载报告，以及追踪你的 iPhone 应用和 App 内购产品的排名与销量。Prismo 提供 30 天试用版可供下载。


    除了这里已经提到的解决方案，请不要忘记查看 第 2 章 中介绍过的众多 App Store 排名工具，例如 APPlyzer 以及 David Frampton
    出色且免费的 MajicRank。


    # 启动引擎


    你的应用已在 App Store 中——接下来呢？不，现在还不是休息的时候。我知道你因数月的开发而感到疲惫，但你需要充分利用应用发布后短暂的势头。第 12
    章 将启动宣传引擎，提高消费者对你应用上架情况的认知。


    ## 第 12 章：提高你 iOS 应用的知名度


    你的应用已获批准并已在 App Store 中上架销售，那么接下来呢？首先，我想祝贺你取得了这一里程碑式的成就！如果你已经通读全书，并最终在 App Store
    中列出了一个应用程序，这本身就是一项了不起的成就。只有同为开发者的人才能真正了解推出一款新软件产品需要付出多少努力和心血。经过数月的精心规划和编程，你值得庆祝一下。虽然此刻你或许最想享受一次迫切需要的假期，但不幸的是，你还不能休息。


    是时候启动宣传引擎，以提高消费者对你应用上架情况的认知了。即使你已经实施了前面章节中的各种商业策略，且发布前的营销工作带来了最初的销售激增，但仍有至关重要的工作要做。你的任务是确保你的
    iOS 应用不会被淹没在涌入 App Store 的成千上万款新应用中。本章揭示了如何撰写有效的新闻稿、使用兑换码、通过评测和采访获得曝光，以及通过促销、赠品和精心安排的打折活动来保持
    App Store 中的发展势头。


    ### 投入与开发同样多的精力来营销你的应用


    如果你购买本书时你的应用已在 App Store 中，并且你决定跳过前面的内容直接阅读本章，我强烈建议你先阅读第 10 章。事实上，我坚持如此。在你阅读完第
    10 章 后，本章对你来说会显得更有用。


    尽管第 10 章 侧重于发布前的营销，但其主要目标是帮助你在线建立一个坚实的基础。它涵盖了建立网站存在感、通过 Twitter 和 Facebook 建立社交媒体关注度，以及与知名博主和有影响力的
    iOS 应用评测网站建立关系。所有这些元素也将作为你发布后营销工作的基础支撑，因此，在你的应用在 App Store 上线之前很久就建立好这些，对你的成功至关重要。


    ### 以宣传大爆发的方式发布


    你希望充分利用应用在 App Store 发布时的初始关注度，因此诀窍是让尽可能多的消费者和新闻媒体同时谈论你的应用。可以将其视为一次宣传方面的“超新星爆发”，以期产生雪球效应。你希望消费者心想：“每个人都在谈论那个应用，它一定很棒！”基于此，在阅读本章时，不要每周只处理一项任务。通读所有主题，然后尝试在同一时间尽可能多地实施它们，以期在初始发布之后很长一段时间内都能维持这股热潮。


    ### 你应该投入多少时间用于营销你的应用？


    最初，每天一两个小时是不够的。是的，我知道你渴望开始开发下一个伟大的应用创意，但在你投身于任何未来项目之前，你新发布的 1.0 版本应用需要关注。你应该准备好在发布后的头两周内，除了推广你的新应用之外什么也不做。请求评测，在
    Twitter 和 Facebook 上宣传你的应用，安排媒体采访，发布博客文章，提交你的应用参与评奖，等等。一旦你的营销努力开始以销量增长和（或）在 App
    Store 排行榜上排名上升的形式获得回报，你就可以逐渐恢复到正常的工作节奏，每天只需花几个小时进行应用营销。


    不幸的是，软件营销没有捷径可走。为了让你的 iOS 应用有机会获得成功，你必须愿意投入与开发它同样多的时间和精力来推广你的应用。


    ### 寻求专业人士的帮助


    如果你无法抽出必要的时间进行发布后营销，那么雇佣第三方公司来处理这项工作最符合你的利益。在线搜索“iPhone 应用营销”或“iPhone 营销机构”。你会发现全球有数百家专门从事移动产品发布的营销和公关公司。以下是一些机构，供你了解可用的服务：


    *   Appency (`http://www.appency.com`)

    *   Appular (`http://appular.com`)

    *   App2Market (`http://www.app2market.com`)

    *   Apalon App Marketing (`http://www.apalon.com/iphone_marketing.html`)

    *   Digital Automat (`http://www.digitalautomat.com`)

    *   Mobility Public Relations (`http://www.mobilitypr.com`)

    *   PR Mac (`http://www.prmac.com`)

    *   TriplePoint PR (`http://www.triplepointpr.com`)


    当然，除了这里列出的公司之外，还有很多其他的营销机构。根据你居住地的不同，你可能会觉得雇佣本地公司更合适，因此请进行多次在线搜索，找到能够满足你特定需求的公司。


    正如我之前所说，当你雇佣第三方顾问或公司时，你应该在选择之前进行充分的研究。他们不仅应该是应对 App Store 独特挑战和营销 iOS 应用方面的专家，而且他们的做法、政策和绩效也应该非常透明。由于他们代表的是你的公司和产品，他们的行为会反映出你和你的应用形象。


    例如，如果一家不道德的公关公司使用其内部的 iTunes 账户，为其所有客户的 App Store 应用批量刷相同的虚假五星好评，那么有人发现其中联系并揭发此事只是时间问题。即使你并不知道这种情况的发生，最终受到损害的还是你的声誉。


    众所周知，苹果甚至会从 App Store 中移除那些滥用客户评价系统的应用。显然，大多数公关机构都非常认真地对待其道德责任，并且从不逾越那条界限。我提到这一点只是为了让你在选择一家移动营销公司来推广你的
    iPhone 或 iPad 应用之前，做好功课并提出正确的问题。


    根据提供的服务水平，经验丰富的第三方营销机构的费用至少为 1000 美元（甚至可能数千美元）。如果你是独立开发者，无法负担外包应用市场营销和宣传的费用，那么你需要在自己的日程安排中腾出必要的时间来亲自处理这项工作。因此，挽起袖子，让我们一起深入吧！


    **提示** 及时了解人们何时在谈论你的应用！基于最新的相关搜索结果，Google 快讯是一项出色的免费电子邮件通知服务，它能让你监控特定名称或主题何时在网站、博客甚至
    Twitter 上被讨论。我强烈建议你设置 Google 快讯来追踪你的应用名称和公司名称。

