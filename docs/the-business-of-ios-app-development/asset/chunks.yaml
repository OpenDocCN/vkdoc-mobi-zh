    as a visual marker for users to easily distinguish it from the full version. This
    alleviates the need to clutter your app name with those words.


    In comparison, Digital Chocolate’s 3D Rollercoaster Rush has quite a long name
    in the App Store, but its actual bundle display name is shortened to 3D Coaster
    to ensure that it fits under the app icon on an iPhone home screen. Luckily, users
    recognize the shortened *coaster* as meaning *rollercoaster*. And for the free
    version, Digital Chocolate simply modified its app icon with a “FREE!” badge (shown
    in [Figure 2-4](#9781430262381_Ch02.xhtml#Fig4)).


    If you do use an abbreviated name for your application bundle display name, take
    great care that it is not radically different from its App Store name. If the
    two names don’t appear related in the eyes of Apple’s app review team, it can
    be grounds for rejection from the App Store. [Chapter 11](#9781430262381_Ch11.xhtml)
    explores app name conventions as they relate to App Store submissions, but you
    do need to think about these issues in advance. When you’re deciding on your app
    name, take extra care not to use long words that can’t be broken down into nicknames
    or abbreviations. *Supercalifragilistic* is a memorable word but impossible to
    trim into a 12-character app name.


    So now that you’ve figured out your length limitation, what would make a good
    name? Finding the perfect name can be very challenging, but it’s worth spending
    the time to get the name right. In previous App Store searches, app names that
    included relevant keywords ranked well in the search results, but don’t get too
    caught up with trying to integrate keywords into your app name. Remember that
    your app’s name in the App Store can be much longer with a keyword-laden caption,
    so you should concentrate primarily on creating a name that’s unique and memorable.


    Although a name like Parked Car Locator is very descriptive, is rich with keywords,
    and can be easily shortened to the 11-character Car Locator when needed, it’s
    probably too generic to be registered as a trademark. Since US trademark law prevents
    the trademark ownership of common words that describe a service or function—common
    words that other companies need to be able to use to describe similar things—legally
    protecting a name like Parked Car Locator would be difficult.


    Instead, try coming up with something a little more creative. To prevent getting
    lost in the forest, travelers would often place markers on branches or leave a
    trail of breadcrumbs so that they could find their way back home. Since finding
    your way back to your parked car involves a similar strategy, you might want to
    play around with a cute app name like Breadcrumbs, which is only 11 characters.
    To ensure placement in relevant search results within the App Store, you could
    pack your app submission with important keywords and even expand your App Store
    name to Breadcrumbs—Parked Car Locator.


    If another iOS app is using a similar name, you’ll definitely want to come up
    with a different name. Even if you’ve locked in on a name that no one else is
    using in the App Store, you can’t stop there. You should also search the Internet
    and all major software directories—the Mac App Store, `Google.com`, Android Marketplace,
    `MacUpdate.com`, and `Download.com` to name a few—to check for any possible conflicts
    on other software platforms.


    You’ll also want to search the US Patent and Trademark Office’s Trademark Electronic
    Search System (TESS) database, at `http://www.uspto.gov/trademarks/`, for any
    filed trademarks on that name. Searching TESS in no way obligates you to file
    a trademark. That’s something you can do later when you’re ready. For now, you
    merely want to make sure the name is not already trademarked by another party.'
  trans: '

    另一方面，如果你的 iPad 应用除了在 iPhone 版功能集之上套用一个优化过的 iPad 界面之外，并没有提供任何新内容，那么你或许应该考虑将其制作成一个通用应用。如果你无法通过额外且
    iPad 独享的功能来证明其定价合理，那么将其作为独立产品出售，必然会引来成群愤怒的用户，他们挥舞着“干草叉”，并写下差评！而苹果公司可能也会赞同他们的看法。众所周知，苹果曾拒绝过那些相较于
    iPhone 版应用未增添任何显著价值的独立 iPad 应用。在这种情况下，苹果通常会建议开发者先将其转换为通用应用，再重新提交至 App Store。


    另一个需要考虑的主要问题是应用的文件大小。通用应用将 iPhone 和 iPad 版本的增量代码、独立的 `*.xib*` 文件以及图像资源整合到一个软件包中，这意味着其文件大小往往是单一目标应用的两倍。尽管苹果最近将蜂窝
    4G 网络下载限制从 20MB 提高到了 50MB 以便容纳通用应用，但一些内容密集型的游戏可能仍然会超出这个大小。如果你的通用应用大于 50MB，这会极大地将应用的潜在用户群体削减为仅限
    Wi-Fi 覆盖区域内的用户。无论你的应用是免费的还是付费产品，单凭这个因素，可能就足以说服你发布独立的 iPhone 和 iPad 版本，以确保你的应用能够通过
    Wi-Fi 和蜂窝 4G 网络两种方式下载。


    ## 应用名称有何讲究？


    在研究竞品时，你无疑已经在 App Store 中进行了无数次搜索。在此过程中，你会发现应用名称和相关关键词中使用的词语会影响其在 App Store 搜索结果中的排名。第
    11 章将讨论如何优化你的 App Store 显示名称、关键词和描述；现在，我们先聚焦于你的应用名称。在 App Store 中，你可以为应用的显示名称添加简短说明，以帮助其出现在相关搜索结果中，但我们暂时还不用为那些长长的
    App Store 名称操心。


    你的应用名称是你在 App Store 内外所有地方推广应用时使用的名字。连同图标一起，你的应用名称就是一个品牌——一个你希望打造成为知名品牌的名字，它既要象征其核心功能，又要足够吸引人以便用户记住。如果人们不能轻易记住你应用的名字，他们就不会向他人推荐。


    此外，还有在 Xcode 项目的属性列表（`plist`）文件中分配的应用捆绑包显示名称。这个名称显示在 iPhone 或 iPad 主屏幕应用图标下方那个非常小的空间里。你大约有
    12 个字符可供使用。名称一长，就有被截断（变成 `...`）的风险。例如，Rebisoft 的 Jack Nutting 开发了一款很棒的复古射击游戏，名为
    `Diabolotros`，它出色地利用了 iPhone 的加速计。作为在 20 世纪 80 年代长大的人，我在游戏厅里花了不少时间玩《太空侵略者》，所以我很快就下载了免费的
    `Diabolotros` `Lite` 版来体验。这是个令人上瘾且有趣的游戏，我很快就购买了完整版。我注意到，11 个字符长的 `Diabolotros`
    在我 iPhone 主屏幕的应用图标下方显示得相当好。然而，`DiabolotrosLite` 就太长了，为了能放得下，名称被自动截断为 `“Diabol…sLite”`（见图
    2-4）。


    ![9781430262381_Fig02-04.jpg](img/9781430262381_Fig02-04.jpg)


    图 2-4. 尽量将应用名称控制在 12 个字符或更少，以避免在 iPhone 主屏幕上被截断显示


    由于添加 `lite` 或 `free` 这个词会使大多数应用名称超过 12 个字符的限制，许多开发者选择在应用图标中加入一个 `lite` 或 `free`
    标记，作为用户轻松区分其与完整版的视觉标识。这样就不需要用这些词来拥堵你的应用名称了。


    相比之下，Digital Chocolate 的《3D Rollercoaster Rush》在 App Store 中有一个相当长的名称，但其实际的捆绑包显示名称被缩短为
    `3D Coaster`，以确保它能适合 iPhone 主屏幕的应用图标下方。幸运的是，用户能认出缩写的 `coaster` 代表 `rollercoaster`。而对于免费版，Digital
    Chocolate 只是在其应用图标上增加了一个“FREE!”标记（如图 2-4 所示）。


    如果你确实为应用的捆绑包显示名称使用了缩写名称，请务必确保它与 App Store 名称没有天壤之别。如果在苹果应用审核团队看来这两个名称看起来毫无关联，这可能导致应用被
    App Store 拒绝。第 11 章将探讨与 App Store 提交相关的应用命名规范，但你现在就需要提前考虑这些问题。在确定应用名称时，要特别小心，不要使用那些无法简化为昵称或缩写的长单词。`Supercalifragilistic`
    是个令人难忘的词，但无法将其压缩成一个 12 字符的应用名称。


    既然你已经了解了长度限制，那么什么样的名称才算好呢？找到完美的名字可能极具挑战性，但花时间把名字起对是值得的。在之前的 App Store 搜索中，包含相关关键词的应用名称在搜索结果中排名靠前，但不要过分执着于将关键词融入应用名称。记住，你的应用在
    App Store 中的名称可以长得多，并配有包含关键词的说明，所以你应该主要专注于创造一个独特且令人难忘的名字。


    虽然像 `Parked Car Locator` 这样的名称描述性很强，富含关键词，并且在需要时可以轻松缩短为 11 个字符的 `Car Locator`，但它可能过于通用而无法注册为商标。由于美国商标法禁止对描述某项服务或功能的常用词（其他公司也需要使用这些常用词来描述类似事物）进行商标所有权保护，因此像
    `Parked Car Locator` 这样的名称很难获得法律保护。


    相反，试着想出一些更有创意的名字。为了不在森林中迷路，旅行者经常会在树枝上放置标记或留下一条面包屑小径，以便找到回家的路。由于找到你停车的地方涉及相似的策略，你可能会想用一个可爱的应用名称，比如
    `Breadcrumbs`，它只有 11 个字符。为了确保能在 App Store 的相关搜索结果中有好的排名，你可以在提交应用时填满重要关键词，甚至可以将你的
    App Store 名称扩展为 `Breadcrumbs—Parked Car Locator`。


    如果其他 iOS 应用正使用类似的名称，你绝对需要想一个不同的名字。即使你已经锁定了一个在 App Store 中无人使用的名字，也不能就此止步。你还应该搜索互联网和所有主要的软件目录——例如
    Mac App Store、`Google.com`、Android Marketplace、`MacUpdate.com` 和 `Download.com`——以检查在其他软件平台上是否存在任何可能的冲突。


    你还需要在美国专利商标局的商标电子搜索系统（TESS）数据库（地址：`http://www.uspto.gov/trademarks/`）中搜索该名称是否有已备案的商标。搜索
    TESS 绝不意味着你有义务申请商标。那是你以后准备好了再做的事情。现在，你只是想确保该名称尚未被另一方注册为商标。

