    And that’s all there is to it! Just keep in mind that transferring data via URL
    is practical only for small amounts of data such as XML files or text files that
    are less than a few hundred kilobytes. You’ll also want to defend your paid app
    against hackers who figure out your unique URL protocol by coding your `application:handleOpenURL`
    handler to accept only the specific data you want and to ignore invalid URL strings.


    Securing Market Share: Give It Away Now and Up-Sell Later


    Is the success of your iOS app dependent on being adopted by as many people as
    possible, such as a social networking app that requires multiple participants
    in order for it to be useful? If so, you may want to consider giving away the
    app for free. The only way to get millions of people to adopt your service on
    such a grand, global scale is to make it freely available to everyone. Think Facebook,
    Foursquare, and Twitter.


    The goal is to get everyone and anyone to use your app frequently enough that
    it eventually becomes an indispensable part of their daily lives. The fewer barriers
    to entry, the easier this task is to accomplish. Beyond being free, for best results,
    your app should also be void of any potential deterrents such as advertising.


    After your app has cultivated a large loyal following, you can introduce a premium
    version of the app that offers additional features for a price. An alternative
    option is to offer premium features as In-App Purchase items (as discussed in
    [Chapter 8](#9781430262381_Ch08.xhtml)). The basic version will always be available
    for free, which is what the majority of users will choose.


    So, how do you make any money if most people use only the free basic version?
    This is yet another example of how volume will ultimately dictate your success.
    If you’ve created an innovative user experience and you’ve done your job right
    as a marketer, then your free app has penetrated the mainstream as a “must-have”
    app and is currently used by millions. For example, let’s say the free basic version
    is frequently used by 10 million people. If only 8 percent of that user base decide
    to upgrade to the $1.99 premium version, after subtracting Apple’s 30 percent
    App Store fee, you would net more than $1.1 million in revenue. For a more conservative
    estimate, even if only 5 percent upgrade to the premium version, that would still
    produce $700,000 in revenue.


    Again, volume is the name of the game for this strategy to work. Most apps will
    not be appropriate for this kind of business model. But if your app relies on
    peer-to-peer interaction between users, this approach might just be your ticket
    to capturing the lion’s share of the market for that particular niche. If your
    app is the market leader, you’ll fare much better at successfully up-selling more
    users to the premium version.


    In [Chapter 2](#9781430262381_Ch02.xhtml), I mentioned the cool Bump app by Bump
    Technologies, Inc., which enables users to instantly send contact information
    to each other by bumping their hands together. But for it to work, the two people
    must both have Bump installed on their iPhones or Android phones. The more people
    who have Bump, the more useful it becomes. The hope is that it will eventually
    be ubiquitous enough among mobile phones that it becomes the standard method for
    users to swap virtual business cards and other data. And the plan seems to be
    working. As it stands now, the app has become quite popular among iPhone users
    and has even been featured in one of Apple’s iPhone commercials.


    Will Bump always be free? To continue the adoption momentum, that’s the goal for
    the foreseeable future. Instead of taking a traditional path with a premium edition,
    Bump Technologies, Inc. is hoping to successfully monetize its business by licensing
    its core bump technology to other large-scale, commercial developers who would
    benefit from this functionality. The Bump API is free to use within your app as
    long as it doesn’t overload the Bump servers or generate incremental revenue with
    each bump. If your app makes money from bumps or requires significant bandwidth
    from the Bump servers, you can purchase the appropriate licensing tier.


    By offering this API with easy-to-use SDKs for iOS and Android, Bump is not only
    solidifying its position in the mobile world as the de facto platform for peer-to-peer
    data sharing, but it’s also building a long-term infrastructure for monetizing
    its core strength. And with the Bump API already adopted in dozens of mobile apps
    by independent developers, as well as by high-profile clients like PayPal and
    ABC Family, it would appear Bump’s strategy is definitely paying off.


    The newspaper industry is another good example of a business that’s attempting
    to grow a loyal mobile audience by offering a free service. With print newspaper
    ad sales and circulation continuing to fall at a rapid pace, struggling newspapers
    are looking to transition to a digital platform with a sustainable revenue model.
    Competing with so much free online content, paid newspaper apps have failed to
    work in the past, especially since re-creating the newspaper experience on a small
    mobile phone screen had proven challenging. But with the immense popularity of
    the iPad and the fact that a tablet encourages similar layback viewing behavior
    as newspaper reading, there’s finally a viable mobile platform for this medium.


    Major newspapers such as the *New York Times* and the *Washington Post* have begun
    experimenting with new dedicated iPad apps that offer their entire daily newspapers
    free for a limited time. With the iPad’s larger screen, these apps are able to
    present a satisfying digital reading experience that’s comparable to print, while
    taking advantage of modern touchscreen technology. They provide 100 percent free
    content for several months, and hope that consumers will grow to depend on receiving
    the “paper” this way. Then it will be an easy decision to switch to an In-App
    Purchase subscription when the free service ends (see [Figure 6-9](#9781430262381_Ch06.xhtml#Fig9)).


    ![9781430262381_Fig06-09.jpg](images/9781430262381_Fig06-09.jpg)


    [Figure 6-9](#9781430262381_Ch06.xhtml#_Fig9). The Washington Post is one of several
    newspapers hoping that its free iPad app will eventually turn loyal readers into
    paid subscribers by offering 100 percent free content for a limited time


    If you need to earn revenue sooner rather than later to finance your development
    efforts, these free strategies may not be the right path for you. But if your
    development is currently supported by existing cash flow from investors, sponsors,
    or other sources, and you can afford to wait several months for your app to gain
    traction in the mobile marketplace, free can be an effective business model with
    the right implementation.


    Mining Additional Revenue with Affiliate Programs


    Earlier in this chapter, I mentioned the use of iTunes affiliate links when sending
    users to the iTunes Store. Here, we’ll take a closer look at how affiliate programs
    can generate income for you.


    How Affiliate Programs Work


    The way that affiliate programs work is quite simple. Participating companies
    want to encourage software and web site owners to send traffic to their retail
    sites. As an incentive to do so, a small commission fee is earned for sales that
    are generated. This is tracked by using special URLs that include unique affiliate
    IDs. The commissions earned by an affiliate are based on a percentage of the sales
    that were derived by customers who came from that affiliate’s links.'
