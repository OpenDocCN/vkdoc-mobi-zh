- fmt: 'And it certainly won’t win you any points with consumers who read your blog
    or follow you on Twitter.


    If you feel that you have a legitimate reason for considering your app rejection
    unjust, then talk to Apple about it. Try to establish a dialogue with the app
    reviewers who evaluated your app. If that doesn’t work, then you can submit an
    appeal to the official App Review Board at `http://developer.apple.com/appstore/resources/approval/contact.html`.
    Always state your case in a thoughtful, clear manner to help the reviewers understand
    your reasoning. Several app rejections have been overturned because of persuasive
    developer arguments and a quick reevaluation.


    No one has said the app review process is perfect. Just remember that the App
    Store is still a relatively new marketplace—one that grew in size much faster
    than Apple (or anyone else) ever anticipated. It’s easy to get upset over rejection,
    but with more than 1,000,000 apps flooding the App Store and more than 45,000
    app submissions each week, Apple’s overworked review team is merely trying to
    do its job as best it can under such remarkable pressure.


    Mistakes do happen, but Apple is constantly working to improve the process. Although
    that kind of sentiment may make me sound like a glorified fanboy, please don’t
    misinterpret my intentions. As a developer myself, I certainly get frustrated
    if my creativity and ambition are limited by the restrictions of the business
    world, but then I remember that it is a business. If I want to be a part of it,
    solving problems with etiquette and professionalism is the only way to truly succeed
    in the long run.


    Apple holds the keys to the kingdom, so if you hope to someday thrive in the App
    Store, it’s in your best interest to maintain a good working relationship with
    the company and its review team.


    ## Approved! Making It to the Promised Land


    So that miraculous day has finally come. Your app has been approved and is now
    available in the App Store! Congratulations! It is indeed a worthy achievement
    that can bring you much success, especially if you’ve taken all the necessary
    steps to effectively market your app.


    Checking on your application’s performance in the App Store is as simple as logging
    in to iTunes Connect to review reported sales and downloads on either a weekly
    or daily basis. Beware: tracking sales can be utterly addictive and destroy your
    daily productivity level. iTunes Connect also issues monthly financial reports
    that summarize your app sales and earned revenue.


    ## Analyzing Your App Store Sales Statistics


    The sales and trends reports in iTunes Connect include a lot of data for analyzing
    your product’s life cycle and sales performance in the marketplace. But what if
    you’re looking for more assistance and additional features like the following?


    *   Tracking your App Store statistics from a desktop application or mobile device

    *   Custom graphing your statistics to better educate your own marketing efforts

    *   Automating the task of retrieving and analyzing sales and download data (when
    you forget to do it yourself)


    Third-party tools and web-based services can provide such capabilities. There’s
    definitely a solution out there that will mesh well with your workflow. Although
    this may not be an exhaustive list, here are some options to explore:


    *   Apple’s iTunes Connect Mobile (`http://itunes.com/apps/iTunesConnectMobile`)
    is a universal iPhone and iPad app that is free to download from the App Store
    and gives you direct access to your iTunes Connect sales and trend data. Regardless
    if you employ other services, such as appFigures or App Annie, this free mobile
    Apple app is a convenient way to track your app’s sales from anywhere.

    *   appFigures (`http://www.appfigures.com`) is a popular web-based solution that
    supports the automated importing of your iTunes Connect sales reports, presenting
    the data in dynamic graphs and charts. Beyond tracking sales, trends, App Store
    rankings, and reviews, appFigures will also automatically e-mail you report summaries
    every day. You can choose either a free Basic account or upgrade to access all
    Premium features. Although appFigures’ web reports are iOS-compatible (when viewed
    in Mobile Safari), there is also a third-party native iPhone app for accessing
    your appFigures account: appTrends by David Knell, available in the App Store.

    *   App Annie (`http://www.appannie.com`), dubbed “Your App Nanny,” is a comprehensive
    app sales tracking and trend analytics web service. It offers many of the same
    features as appFigures, as well as historical App Store rankings data on all apps.
    Its attractive online dashboard interface can be accessed and viewed from either
    your desktop web browser or iPad’s Mobile Safari.

