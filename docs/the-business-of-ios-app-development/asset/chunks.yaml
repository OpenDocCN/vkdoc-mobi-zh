  trans: '

    # 为多个 iOS 设备目标设计时


    在为多个 iOS 设备目标设计时，您可能会发现，将 Retina 显示屏的工具栏和标签栏图标缩小以适配旧款 iPhone 和 iPad 时，效果并不理想。将一个本已小巧的白色图标进一步缩小，有时会使图标的某些元素显得模糊。我常常发现，为了针对每种目标尺寸完善图标，我最终要么在调整大小后对图标进行一些润色工作，要么干脆针对较小的尺寸从头重新创建。没错，这确实增加了不少额外工作，但从长远来看，为了让我支持的所有
    iOS 设备上的应用更加美观，多花些时间是值得的。


    **应用审核拒绝警告**：仅以用户预期的方式使用系统提供的图标。苹果在 iOS SDK 中慷慨地包含了多个图标供开发者在自己的应用中使用，例如“添加”、“撰写”、“回复”、“操作”、“搜索”等等。这可以避免你为那些已被苹果系统图标覆盖的常见任务创建自定义图标。请记住，苹果提供这些图标是为了在所有使用它们的应用中代表一致的行为。在你的应用中使用这些系统图标时，请确保你以它们预期的方式使用，否则你的
    App Store 提交可能会被迅速拒绝。例如，不要将“回复”图标用作返回按钮，也不要使用“书签”图标来打开电子书。


    ## 导航栏颜色


    你可以通过 Xcode 轻松修改导航栏的颜色，这也是苹果希望开发者摆脱使用图像转而采用的方式。当你为应用定义了一种合适的颜色后，就可以在 Xcode 中进行设置。通过调整
    `tintColor` 函数，你可以设置导航栏或工具栏上的任何文本或图标。


    如果你浏览一下 App Store，你会注意到最近很多应用都专注于一种设定好的颜色，并在整个应用中保持其一致性。图 4-18 展示了一些示例，说明颜色在定义应用外观和感觉方面扮演着多么重要的角色。


    ![9781430262381_Fig04-18.jpg](img/9781430262381_Fig04-18.jpg)


    图 4-18. Snapguide 应用使用橙色工具栏和米白色背景图片来强化其品牌色彩


    要设置导航栏和工具栏组件的颜色，首先在 Interface Builder 中打开您的 `.xib` 文件，并在检查器面板中选中导航栏或工具栏，使其属性可见。然后，在“属性”下，将“样式”（Style）保持为“默认”（Default），并使用“颜色选择器”（Color
    Picker）按钮将“色调”（Tint）更改为您想要的颜色。


    如果您为导航栏和/或工具栏使用了自定义颜色，您可能还需要将视图的背景从默认的蓝色/灰色修改为您选择的新颜色或图像。


    ## 使用文本


    当屏幕分辨率或屏幕尺寸发生变化时，文本的使用似乎得到了优化。那些对图像依赖较少，而使用颜色和排版来吸引用户的应用更具适应性和可扩展性。当苹果推出配备 Retina
    显示屏的 iPhone 4 时，许多开发者花了很长时间才将应用中的所有图像以旧分辨率的两倍重新制作。


    因此，正如你应该拥抱颜色一样，也应该拥抱文本，以及它如何通过充当操作指令在吸引用户方面发挥重要作用。这也有助于避免为特定操作选择合适图标的困境。例如，要访问筛选界面，可以显示一个漏斗图标，但用户可能难以识别它，因为设备上没有与筛选操作相关联的既定标准图标。如果你仅用
    *filter*（筛选）这个词来替换它，你就消除了用户的任何困惑，同时你也与 iOS 7 引入的设计变更保持一致。


    ## 无障碍设计


    另一个需要考虑的重要视觉设计因素是苹果的无障碍功能——“白底黑字”。它允许任何 iPhone 或 iPad 用户在任何应用中更改显示，使之成为黑底白字。启用后，这种高对比度功能会反转屏幕颜色，使某些视障人士更容易阅读文本。作为开发者，你应该在“白底黑字”模式下测试应用界面设计，以确保界面保持可读性，并且其可用性不会因颜色反转而受到影响。看起来
    iPhone 模拟器不支持“反转颜色”模式，所以目前，你需要在一台真实的 iOS 设备上测试你的应用。在“设置”面板中，选择“通用”，然后选择“辅助功能”，最后将“反转颜色”开关轻点至“开”。


    另一个常被软件开发人员忽视的重要主题是色盲。虽然完全色盲的情况很少见，但世界上有相当大比例的人口患有某种形式的色觉缺陷。这意味着他们的眼睛能看到全彩，但无法区分某些关键颜色，比如红色和绿色。尽管很少有女性表现出色觉问题，但你是否相信高达
    8% 的男性存在某种形式的色觉缺陷？具体来说，大约每 12 名欧洲裔男性中就有 1 人患有色觉缺陷。考虑到许多 iOS 开发者专门为男性用户群体制作游戏和其他应用，在设计界面时意识到色觉缺陷问题，对于让你的应用尽可能覆盖最广泛的受众至关重要。


    以下是一些用于检查无障碍性的有用资源：


    -   **Vischeck**（`http://www.vischeck.com`）：所有软件开发人员都应该访问这个网站。它提供了有用的在线工具，用于揭示你应用中的颜色问题。将你的界面截图上传到在线
    Vischeck 模拟器中，看看你的 UI 设计在色觉缺陷者眼中会是什么样子。将截图上传到在线 Daltonize 工具中，可以针对三种最常见的色觉缺陷校正你的界面颜色。该网站还提供
    Vischeck 模拟器的免费 Photoshop 插件下载，可以直接在 Photoshop 中测试你的界面截图。

    -   **适用于 Mac OS X 的 Sim Daltonism 色盲模拟器**（`http://michelf.com/projects/sim-daltonism/`）：这款由
    Michel Fortin 开发的节省时间的桌面应用程序是一个简单的浮动调色板，允许你实时测试你的 iPhone 应用界面。在 iPhone 模拟器中运行你的
    Xcode 项目，同时在屏幕一侧运行 Sim Daltonism 浮动调色板。从调色板菜单中选择一种色觉缺陷类型，然后将鼠标指针移到 iPhone 模拟器上，即可在调色板窗口中看到应用
    UI 在色觉缺陷者眼中的样子。（如果你觉得 Sim Daltonism 有用，可以到 Michel 的网站上在线捐款，以支持其持续开发。）


    ## 给艺术创作困难者的建议


    自己动手的方法并不适合所有人，尤其是在设计像 iOS 应用图标、标志和 UI 的自定义艺术作品这样重要的东西时。请记住，Photoshop、Illustrator、Pixelmator
    及其他图形程序仅仅是工具。这些工具的效用完全取决于你的使用能力。要善用这些工具，你必须具备创造力和耐心，将脑海中的想法转化为屏幕上的实际像素。需要一些帮助吗？在此，我将推荐一些省时的解决方案和资源，或许能为你提供所需的助力。


    ### 寻找图形和图标

    '
- fmt: '在寻找适合应用工具栏和标签栏的预制图标吗？对您来说很幸运，有许多专门为 iOS 应用设计的第三方图标集。这些图标集免版税且价格低廉（或免费），非常适合预算有限的商业应用项目。图形资源以位图图像、矢量图像或两者兼有格式提供，因此您一定能找到一些不错的图标来增强应用的用户界面。以下是一些资源：


    - `Glyphish Icons` (`http://glyphish.com`)

    - `Pictos Interface Icons` (`http://pictos.drewwilson.com`)

    - `Default Icon Repository` (`http://www.defaulticon.com`)


    就全色图标（用于表格视图和其他相关 UI 元素）而言，有几十个网站提供图标设计教程、免费库存图标、商业图标集和自定义图标设计服务。


    如果您确实找到了一些想在应用中使用的免费库存图标，请务必检查许可条款，以确保这些图标免版税且可用于商业软件。有些免费图标需要在您的应用或文档中注明设计者。


    此外，如前所述，如果您决定在 iOS 应用中使用库存图标，请考虑修改它们，以便您的应用保留独特的感觉（前提是您仍然遵守相关的许可条款）。您不希望因为使用人们已在其他软件和网站上见过无数次的相同库存图标，而降低应用质量的感知度。以下是一些精选的在线资源：


    - `Icon Archive` (`http://www.iconarchive.com`)

    - `FreeIconsWeb` (`http://www.freeiconsweb.com`)

    - `The Noun Project` (`http://www.thenounproject.com`)

    - `iStockphoto` (`http://www.istockphoto.com`)


    **注意**  尽管大多数人都知道`iStockphoto`是购买廉价库存照片的地方，但它也拥有丰富的精美矢量背景图像和图标库。


    ## 选择字体


    对于大多数 iPhone 和 iPad 应用，使用原生的 iOS 系统字体就足够了，因此字体许可将不成问题。如果您正在开发一款在界面图形中使用特殊字体的游戏、儿童应用或娱乐应用，您需要确保所选的特有字体具有可承受的许可条款。只要允许用于商业项目，免版税字体显然是最具成本效益的。


    请仔细关注您想使用的每种自定字体的许可协议。乍一看，许多字体库似乎是免费或免版税的，但通常细则会指定仅供个人使用，而商业用途（如网站、软件等）则需要单独的许可（且价格更高）。在您为
    iOS 应用购买专用字体之前，请做好功课。


    以下是一些可供探索的字体目录：


    - `dafont.com` (`http://www.dafont.com`)

    - `MyFonts` (`http://www.myfonts.com`)

    - `Discover Fonts` (`http://www.discoverfonts.com`)

    - `Fonts.com` (`http://www.fonts.com`)

    - `FontSpace` (`http://www.fontspace.com`)

    - `UrbanFonts` (`http://www.urbanfonts.com`)


    ## 添加音频


    如果您正在构建游戏或娱乐应用，音频通常是其娱乐性的重要因素。如果您不是声音设计师，或者没有什么作曲和编辑音频的经验，您可能需要雇佣某人来制作音乐和音效提示。如果您负担不起雇佣数字音乐家或声音设计师，您可以考虑许可库存音效库。与字体一样，请确保您购买的任何库存音频或音乐都是免版税并且已获商业使用许可。


    以下是一些音频和音乐目录：


    - `AudioJungle` (`http://audiojungle.net`)

    - `iStockphoto Audio Tracks` (`http://www.istockphoto.com/audio`)

    - `The Music Bakery` (`http://www.musicbakery.com`)

    - `StockFuel` (`http://stockfuel.com/stock_audio.html`)

    - `Soundrangers` (`http://www.soundrangers.com`)


    ## 使用专业设计服务


    如果创建图稿或自定义音频对您来说异常困难，那么与其让这种体验变得极其沮丧和得不偿失，您或许应该考虑雇佣一名专业设计师。如果您的应用可能会因您自身的创作局限而受到影响，请勿屈从于任何自负的想法，认为您必须创造并控制设计和开发过程的每个方面。应用的成功至关重要。


    了解自己作为开发者的局限性将使您能够自由地引入外部帮助，从而构建出质量最佳的应用。即使将工作委托给专业设计师，您仍然负责项目。


    如果钱是个问题，那么就发挥创意。您有任何专业设计师可能需要的才能吗？也许设计师需要一些网站或软件编程方面的帮助？如果是这样，那么就有机会进行服务交换。


    另一种选择是用一小部分应用销售收入来换取设计师的持续图形支持。从本质上讲，设计师正在成为合伙人，共同分担风险。如果应用未能吸引到受众，那么参与其中的人都不会赚钱。一些设计师，取决于他们的空余时间，可能不愿意接受这种赌博。即使您有一个很好的概念，他们可能也倾向于提前获得报酬。但如果利润分享是您的最佳选择，提出这个方案也无妨。


    在本书范围内，无法列举出所有专业设计服务和自由职业艺术家。以下是一些值得考虑的值得注意的资源：


    - `They Make Apps` (`http://theymakeapps.com`)

    - `99designs` (`http://99designs.com`)

    - `oDesk` (`http://www.odesk.com`)

    - `Elance` (`http://www.elance.com`)

    - `Guru.com` (`http://www.guru.com`)

    - `Get Apps Done` (`http://www.getappsdone.com`)


    在探索外包市场、在线搜索引擎甚至本地黄页时，永远不要满足于找到的第一个列表。请直接或通过开发者邮件列表和在线论坛向同行征求推荐。您想从其他开发者那里了解哪些公司和顾问在图标、标志、音乐、音效和其他外包创意元素的设计工作上是值得信赖和受人尊敬的。即使找到了喜欢的设计师，也请要求查看她的作品集，以确保她的设计风格和技能能够将您的特定愿景变为现实。


    与设计师合作时，沟通是关键。尽管他们可能技艺精湛，但他们无法读心。您提供给他们的关于创意需求的信息越多，他们就越有能力准确交付您想要的东西。我们涵盖了线框图、原型设计和模型，所有这些都有助于您更好地理解您的应用，同时也对您需要向他人解释应用流程时很有用。


    ## 创意助推


    哇，一个章节中包含了这么多信息！您现在是否充满了新想法和足够的灵感，可以启动您自己的应用界面设计工作了？很好！将您的 iOS 应用转变为强大的营销工具并不止于此。


    # 第五章


    ## 社交植入：在应用中推广您的应用


    基于第四章将您的应用转变为其自身营销强机的探索，本章将进一步引导您。您将学习如何集成便捷的分享和社交媒体元素，例如应用内电子邮件、Twitter 和 Facebook。您还将探索在应用内优雅地鼓励
    App Store 用户评论的策略，以及通过应用内交叉推广和第三方社交游戏平台来提高应用发现度的技巧。本章的示例代码演示了如何实现这些不同要素以获得有效结果。


    ## 在应用中鼓励用户评论


    为了完善应用的用户体验，您投入了大量工作，希望您的努力能带来销量和正面的客户评价。'
  raw: 'Looking for premade icons for your app’s toolbars and tab bars? Lucky for
    you, there are numerous third-party icon collections designed specifically for
    use in iOS apps. These icon sets are royalty-free and inexpensive (or free)—perfect
    for budget-conscious, commercial app projects. Graphics are available as bitmap
    images, vector-based images, or both formats, so you’re sure to find some great
    icons to help enhance your app’s UI. Here are some resources:


    *   Glyphish Icons (`http://glyphish.com`)

    *   Pictos Interface Icons (`http://pictos.drewwilson.com`)

    *   Default Icon Repository (`http://www.defaulticon.com`)


    As far as full-color icons are concerned (for use in your table views and other
    related UI elements), dozens of web sites offer icon design tutorials, free stock
    icons, commercial icon sets, and custom icon design services.


    If you do find some free stock icons that you would like to use in your app, be
    sure to check the licensing terms to ensure that the icons are royalty-free and
    can be used in commercial software. Some free icons require giving credit to the
    designer in your app or documentation.


    Also, as previously mentioned, if you do decide to use stock icons in your iOS
    app, consider modifying them so that you app retains a unique feel (provided you
    still adhere to the related license terms). You don’t want to cheapen the perception
    of the quality of your app by using the same stock icons that people have already
    seen countless times in other software and web sites. Here are a select handful
    of online resources:


    *   Icon Archive (`http://www.iconarchive.com`)

    *   FreeIconsWeb (`http://www.freeiconsweb.com`)

    *   The Noun Project (`http://www.thenounproject.com`)

    *   iStockphoto (`http://www.istockphoto.com`)


    **Note**  Although most people know iStockphoto as a destination for purchasing
    inexpensive stock photography, it also has an extensive library of beautiful vector-based
    background imagery and icons.


    Choosing Fonts


    For most iPhone and iPad apps, using the native iOS system fonts will be sufficient,
    so font licensing will not be a concern. If you’re developing a game, kids’ app,
    or entertainment app that uses a special font in its interface graphics, you’ll
    want to make sure the unique font you’ve chosen has affordable licensing terms.
    Royalty-free fonts are obviously the most cost-effective, as long as they allow
    use in commercial projects.


    Pay close attention to the licensing agreement of each custom font you’re interested
    in using. At first glance, many font libraries appear to be free or royalty-free,
    but often the fine print specifies personal use only, with separate licenses (and
    higher price tags) available for commercial purposes, such as web sites, software,
    and so on. Do your homework before you purchase specialty fonts for use in your
    iOS apps.


    Here are a few font directories to explore:


    *   dafont.com (`http://www.dafont.com`)

    *   MyFonts (`http://www.myfonts.com`)

    *   Discover Fonts (`http://www.discoverfonts.com`)

    *   `Fonts.com` (`http://www.fonts.com`)

    *   FontSpace (`http://www.fontspace.com`)

    *   UrbanFonts (`http://www.urbanfonts.com`)


    Adding Audio


    If you’re building a game or entertainment app, audio is often a big factor in
    the enjoyment of it. If you’re not a sound designer or have very little experience
    composing and editing audio, you may want to hire someone to do the music and
    sound effects cues. If you can’t afford to hire a digital musician or sound designer,
    you may want to consider licensing stock sound libraries. As with fonts, make
    sure any stock audio or music you purchase is royalty-free and licensed for commercial
    use.


    Here are some audio and music directories:


    *   AudioJungle (`http://audiojungle.net`)

    *   iStockphoto Audio Tracks (`http://www.istockphoto.com/audio`)

    *   The Music Bakery (`http://www.musicbakery.com`)

    *   StockFuel (`http://stockfuel.com/stock_audio.html`)

    *   Soundrangers (`http://www.soundrangers.com`)


    Using Professional Design Services


    If creating artwork or custom audio proves difficult for you—like pulling teeth—then
    instead of allowing the experience to become overly frustrating and unrewarding,
    you may want to consider hiring a professional designer. Don’t succumb to any
    egotistical notions that you must create and control every aspect of the design
    and development process if your app stands to suffer from your own creative limitations.
    The success of your app is far too important.


    Knowing your own limitations as a developer will give you the freedom to bring
    on outside help so that you can build the best-quality app possible. Even when
    delegating the work to professional designers, you’re still in charge of the project.


    If money is an issue, then be creative. Do you have any talents that a professional
    designer may need? Perhaps the designer needs some web site or software programming
    assistance? If so, then there’s an opportunity to barter services.


    Another option is to offer a small percentage of your app sales in exchange for
    the designer’s ongoing graphics support. In essence, the designer is becoming
    a partner, sharing in the risk. If the app fails to reach an audience, then no
    one involved makes any money. Some designers, depending on their availability,
    may not be open to such a gamble. Even if you have a great concept, they may prefer
    to get paid up front. But if a profit-sharing option is your best option, it can’t
    hurt to offer it.


    There are far too many professional design services and freelance artists to list
    within these pages. Here are a just few notable resources worth considering:


    *   They Make Apps (`http://theymakeapps.com`)

    *   99designs (`http://99designs.com`)

    *   oDesk (`http://www.odesk.com`)

    *   Elance (`http://www.elance.com`)

    *   `Guru.com` (`http://www.guru.com`)

    *   Get Apps Done (`http://www.getappsdone.com`)


    When exploring outsourcing marketplaces, online search engines, or even your local
    yellow pages, never settle for the first listing you find. Ask for recommendations
    from your peers, either directly or via developer mailing lists and online forums.
    You want to find out from other developers which companies and consultants are
    trusted and respected for their design work on icons, logos, music, sound effects,
    and other outsourced creative elements. Even when you find a designer you like,
    ask to see her portfolio to make sure her design style and skills are capable
    of bringing your specific vision to life.


    Communication is key when working with designers. Although they may be extremely
    good at their craft, they can’t read minds. The more information you give them
    about your creative needs, the better equipped they will be to deliver exactly
    what you want. We covered wire framing, prototyping and mock-ups, all of which
    help you understand your app better but also can be useful when you need to explain
    the flow of the app to others.


    Creative Boost


    Wow, that was a lot of information packed into a single chapter! Are you now fueled
    with new ideas and enough inspiration to kick-start your own app interface design
    work? Good! Turning your iOS app into a powerful marketing tool does not end here.


    Chapter    5


    Social Inception: Promoting Your Apps Within Apps


    Building upon Chapter 4’s quest to transform your app into its own marketing powerhouse,
    this chapter will take you one step further. You’ll learn how to integrate convenient
    sharing and social media elements such as In-App Email, Twitter, and Facebook.
    You’ll also explore tactics for gracefully encouraging App Store user reviews
    within your app, and improving app discovery with in-app cross-promotion and third-party
    social gaming platforms. The sample code in this chapter demonstrates how to implement
    these various ingredients for effective results.


    Encouraging User Reviews Within Your App


    You’ve put a lot of work into perfecting your app’s user experience in the hopes
    that your efforts result in sales and positive customer ratings.'
  trans: '

    在寻找适合应用工具栏和标签栏的预制图标吗？对您来说很幸运，有许多专门为 iOS 应用设计的第三方图标集。这些图标集免版税且价格低廉（或免费），非常适合预算有限的商业应用项目。图形资源以位图图像、矢量图像或两者兼有格式提供，因此您一定能找到一些不错的图标来增强应用的用户界面。以下是一些资源：


    - `Glyphish Icons` (`http://glyphish.com`)

    - `Pictos Interface Icons` (`http://pictos.drewwilson.com`)

    - `Default Icon Repository` (`http://www.defaulticon.com`)


    就全色图标（用于表格视图和其他相关 UI 元素）而言，有几十个网站提供图标设计教程、免费库存图标、商业图标集和自定义图标设计服务。


    如果您确实找到了一些想在应用中使用的免费库存图标，请务必检查许可条款，以确保这些图标免版税且可用于商业软件。有些免费图标需要在您的应用或文档中注明设计者。


    此外，如前所述，如果您决定在 iOS 应用中使用库存图标，请考虑修改它们，以便您的应用保留独特的感觉（前提是您仍然遵守相关的许可条款）。您不希望因为使用人们已在其他软件和网站上见过无数次的相同库存图标，而降低应用质量的感知度。以下是一些精选的在线资源：


    - `Icon Archive` (`http://www.iconarchive.com`)

    - `FreeIconsWeb` (`http://www.freeiconsweb.com`)

    - `The Noun Project` (`http://www.thenounproject.com`)

    - `iStockphoto` (`http://www.istockphoto.com`)


    **注意**  尽管大多数人都知道`iStockphoto`是购买廉价库存照片的地方，但它也拥有丰富的精美矢量背景图像和图标库。


    ## 选择字体


    对于大多数 iPhone 和 iPad 应用，使用原生的 iOS 系统字体就足够了，因此字体许可将不成问题。如果您正在开发一款在界面图形中使用特殊字体的游戏、儿童应用或娱乐应用，您需要确保所选的特有字体具有可承受的许可条款。只要允许用于商业项目，免版税字体显然是最具成本效益的。


    请仔细关注您想使用的每种自定字体的许可协议。乍一看，许多字体库似乎是免费或免版税的，但通常细则会指定仅供个人使用，而商业用途（如网站、软件等）则需要单独的许可（且价格更高）。在您为
    iOS 应用购买专用字体之前，请做好功课。


    以下是一些可供探索的字体目录：


    - `dafont.com` (`http://www.dafont.com`)

    - `MyFonts` (`http://www.myfonts.com`)

    - `Discover Fonts` (`http://www.discoverfonts.com`)

    - `Fonts.com` (`http://www.fonts.com`)

    - `FontSpace` (`http://www.fontspace.com`)

    - `UrbanFonts` (`http://www.urbanfonts.com`)


    ## 添加音频


    如果您正在构建游戏或娱乐应用，音频通常是其娱乐性的重要因素。如果您不是声音设计师，或者没有什么作曲和编辑音频的经验，您可能需要雇佣某人来制作音乐和音效提示。如果您负担不起雇佣数字音乐家或声音设计师，您可以考虑许可库存音效库。与字体一样，请确保您购买的任何库存音频或音乐都是免版税并且已获商业使用许可。


    以下是一些音频和音乐目录：


    - `AudioJungle` (`http://audiojungle.net`)

    - `iStockphoto Audio Tracks` (`http://www.istockphoto.com/audio`)

    - `The Music Bakery` (`http://www.musicbakery.com`)

    - `StockFuel` (`http://stockfuel.com/stock_audio.html`)

    - `Soundrangers` (`http://www.soundrangers.com`)


    ## 使用专业设计服务


    如果创建图稿或自定义音频对您来说异常困难，那么与其让这种体验变得极其沮丧和得不偿失，您或许应该考虑雇佣一名专业设计师。如果您的应用可能会因您自身的创作局限而受到影响，请勿屈从于任何自负的想法，认为您必须创造并控制设计和开发过程的每个方面。应用的成功至关重要。


    了解自己作为开发者的局限性将使您能够自由地引入外部帮助，从而构建出质量最佳的应用。即使将工作委托给专业设计师，您仍然负责项目。


    如果钱是个问题，那么就发挥创意。您有任何专业设计师可能需要的才能吗？也许设计师需要一些网站或软件编程方面的帮助？如果是这样，那么就有机会进行服务交换。


    另一种选择是用一小部分应用销售收入来换取设计师的持续图形支持。从本质上讲，设计师正在成为合伙人，共同分担风险。如果应用未能吸引到受众，那么参与其中的人都不会赚钱。一些设计师，取决于他们的空余时间，可能不愿意接受这种赌博。即使您有一个很好的概念，他们可能也倾向于提前获得报酬。但如果利润分享是您的最佳选择，提出这个方案也无妨。


    在本书范围内，无法列举出所有专业设计服务和自由职业艺术家。以下是一些值得考虑的值得注意的资源：


    - `They Make Apps` (`http://theymakeapps.com`)

    - `99designs` (`http://99designs.com`)

    - `oDesk` (`http://www.odesk.com`)

    - `Elance` (`http://www.elance.com`)

    - `Guru.com` (`http://www.guru.com`)

    - `Get Apps Done` (`http://www.getappsdone.com`)


    在探索外包市场、在线搜索引擎甚至本地黄页时，永远不要满足于找到的第一个列表。请直接或通过开发者邮件列表和在线论坛向同行征求推荐。您想从其他开发者那里了解哪些公司和顾问在图标、标志、音乐、音效和其他外包创意元素的设计工作上是值得信赖和受人尊敬的。即使找到了喜欢的设计师，也请要求查看她的作品集，以确保她的设计风格和技能能够将您的特定愿景变为现实。


    与设计师合作时，沟通是关键。尽管他们可能技艺精湛，但他们无法读心。您提供给他们的关于创意需求的信息越多，他们就越有能力准确交付您想要的东西。我们涵盖了线框图、原型设计和模型，所有这些都有助于您更好地理解您的应用，同时也对您需要向他人解释应用流程时很有用。


    ## 创意助推


    哇，一个章节中包含了这么多信息！您现在是否充满了新想法和足够的灵感，可以启动您自己的应用界面设计工作了？很好！将您的 iOS 应用转变为强大的营销工具并不止于此。


    # 第五章


    ## 社交植入：在应用中推广您的应用


    基于第四章将您的应用转变为其自身营销强机的探索，本章将进一步引导您。您将学习如何集成便捷的分享和社交媒体元素，例如应用内电子邮件、Twitter 和 Facebook。您还将探索在应用内优雅地鼓励
    App Store 用户评论的策略，以及通过应用内交叉推广和第三方社交游戏平台来提高应用发现度的技巧。本章的示例代码演示了如何实现这些不同要素以获得有效结果。


    ## 在应用中鼓励用户评论


    为了完善应用的用户体验，您投入了大量工作，希望您的努力能带来销量和正面的客户评价。

