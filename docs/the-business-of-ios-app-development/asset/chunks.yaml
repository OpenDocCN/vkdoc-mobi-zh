- fmt: '### 在 iTunes Connect 的“管理您的应用”部分添加新应用时，请勿立即上传应用二进制文件。没有应用二进制文件，您的 iOS 应用不会过早地提交审核，但您仍然可以设置相关的应用内购买项目并测试购买。您在“管理您的应用”中的应用列表应显示状态为“准备上传”（请参见[图
    8-13](#9781430262381_Ch08.xhtml#Fig13)）。关于如何在 iTunes Connect 中添加新应用列表的详细信息，请参阅[第
    11 章](#9781430262381_Ch11.xhtml)中的全面说明。


    ![9781430262381_Fig08-13.jpg](images/9781430262381_Fig08-13.jpg)


    [图 8-13](#9781430262381_Ch08.xhtml#_Fig13). 在 iTunes Connect 的“管理您的应用”部分选择您的应用，然后点击“管理应用内购买”按钮以创建新的应用内购买项目。


    在应用的主页面中，点击“管理应用内购买”按钮（请参见[图 8-13](#9781430262381_Ch08.xhtml#Fig13)），然后点击“创建新项目”按钮为该应用添加一个新的应用内购买项目。填写出现的网页表单（请参见[图
    8-14](#9781430262381_Ch08.xhtml#Fig14)）。您需要填写所有字段，但“供审核的购买过程截图”除外。该截图仅供应用审核团队使用，因此您可以等到准备提交时（在完成测试后）再上传。


    ![9781430262381_Fig08-14.jpg](images/9781430262381_Fig08-14.jpg)


    [图 8-14](#9781430262381_Ch08.xhtml#_Fig14). 在 iTunes Connect 中为您的应用创建新的应用内购买项目。


    让我们逐一了解[图 8-14](#9781430262381_Ch08.xhtml#Fig14)中的表单字段。


    *   **`Reference Name`**：该字段表示您的应用内购买项目在 iTunes Connect 中的名称，但它不一定是 App Store
    中显示的名称（如果客户设备的语言设置与您的 iTunes Connect 默认语言不同）。请参阅语言字段描述以了解项目的实际显示名称。

    *   **`Product ID`**：iTunes Connect 中的每个产品都需要一个唯一的 ID，应用内购买项目也不例外。任何 UTF-8 字符串都可以用来标识此产品，但建议在您的所有产品中使用通用的
    ID 系统。许多 iOS 开发者使用 `com.company.appname` 作为所有应用 SKU 编号的命名方案，而相关的应用内购买产品 ID 可以使用该方案的扩展，例如
    `com.company.appname.productid`。由于我们示例截图中的虚构应用 Breadcrumbs 使用 `breadcrumbs` 作为其
    SKU，因此高级包的应用内购买产品 ID 可以是 `breadcrumbs.premiumpack`，以直观地体现其与父应用的关系。这个简单的系统为您提供了一种易于使用且在所有产品中保持一致的命名方案，同时也确保了
    ID 的唯一性（其他人无法使用）。这是一个重要因素，因为 iTunes Connect 不允许任何两个产品拥有相同的 ID。

    *   **`Type`**：这是提交此表单前需要理解的最重要字段，尤其是在您保存新的应用内购买项目到 iTunes Connect 后，该字段将无法编辑。`Type`
    定义了您要创建的应用内购买项目的类型。如本章前面所述，目前有四种类型：非消耗品、消耗品、自动续期订阅和订阅。如果选择了“自动续期订阅”，您还需要为订阅定义一个期限（例如每月或每年），以便
    App Store 知道何时向客户收取续期费用。

    *   **`Cleared for Sale`**：如果此复选框未选中，您的应用内购买项目将无法在您的应用中列出。但即使选中了此框，也并不意味着您的应用内购买项目可以公开购买。作为独立产品，所有应用内购买项目在
    App Store 中可用之前，都需要经过 Apple 的审核和批准。但出于测试目的（以及当您准备上线时），您肯定希望选中此框。

    *   **`Price Tier`**：此下拉菜单提供了一系列可用的定价等级，用于为您的应用内购买项目分配特定价格。您可以修改应用内购买项目的价格以进行特价促销活动，但它们绝不能免费提供——即使是限时免费也不行。应用内购买项目必须定价，最低为
    99 美分。若要在您的应用中提供免费的可下载内容，您需要实现自己的系统，从您的服务器上（而非 App Store 之外）获取这些项目。

    *   **`Language to Add`**：此处用于选择您要支持的语言。对于每种选择的语言，您需要填写应用内购买项目的本地化显示名称字段和描述字段。请仔细填写，因为您在此处提交的应用内购买项目名称和描述是
