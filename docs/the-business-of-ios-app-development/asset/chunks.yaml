  trans: "\n# iOS 3.2 数据迁移方案\n\niOS 3.2 还增加了一项桌面同步功能，使应用能够在桌面版 iTunes 的特殊文件共享列表中显示其文件目录，当你的\
    \ iOS 设备与电脑同步时即可使用。从技术上讲，如果你的应用支持此功能，用户可以从精简版中复制存储的数据文件到桌面，然后将其拖回 iTunes 的付费应用文件共享目录中。但这要求客户完成大量额外工作，处理他们本不该遇到的问题。如果你重视客户并希望他们获得满意的用户体验，应避免使用此方案。\n\
    \n显然，应用内购买（`In-App Purchase`）能让你的生活轻松得多，避免了将数据从精简版传递到独立付费应用的麻烦。但别灰心——还有其他方法可以完成此任务。\n\
    \n## 云端同步\n\n一些开发者通过在应用中实现同步服务来解决数据迁移问题，让客户能够将应用数据同步到远程服务器。诸如 `Flixoft` 的 `Grocery\
    \ Gadget` 等流行应用鼓励用户注册免费群组账户，以便数据能从精简版轻松传输到付费版。\n\n如果你的应用存储大量复杂数据，或者你只是想给客户一种从其他位置和设备（如他们的\
    \ iPad 或台式电脑的网页浏览器）访问数据的方式，那么维护一个同步服务可能是最佳选择。如果这对你的应用需求来说是个吸引人的解决方案，以下是一些值得考虑的实惠云服务：\n\
    \n*   `Dropbox` 开发者平台（`http://www.dropbox.com/developers`）\n*   `Google App Engine`（`http://code.google.com/appengine/`）\n\
    *   `Amazon S3`（`http://aws.amazon.com/s3/`）\n*   `Rackspace Cloud`（`http://www.rackspacecloud.com`）\n\
    *   `Parse`（`http://parse.com`）\n\n如果你不想开发并维护一个服务器端 Web 应用来管理原生应用与云端之间的数据同步，可以首先考虑\
    \ `Dropbox` 的 iOS SDK。`Dropbox` 已成为需要在多设备间同步数据的移动开发者的热门选择。但如果你只需要在应用间传输非常少量的数据，还有另一种选择。\n\
    \n## 通过 URL 传输数据\n\n一些开发者成功通过唯一的 URL 命令传输数据。例如，如果 iOS 应用发起一个 HTTP 网站的开放 URL 请求，`Mobile\
    \ Safari` 会自动启动并处理该请求，因为它是注册处理 HTTP 的默认应用。简而言之，应用刚刚将数据传输给了 `Mobile Safari`。你可以通过设置一个唯一的\
    \ URL 协议处理器，将同样的概念应用到你自己的应用。\n\n要使你的 URL 协议生效，它需要使用一个尚未被任何其他应用使用的前缀。由于你不知道其他 iOS\
    \ 应用可能为此使用哪些唯一协议，你应该设计一个足够独特的前缀，以防止与其他应用冲突。\n\n出于本练习的目的，让我们为虚构的停车位置定位应用 `Breadcrumbs`\
    \ 创建一个唯一协议。我们希望精简版用户能将保存的停车位置传输到付费版。由于数据量非常小（仅几个 GPS 坐标），且不包含任何机密信息，通过开放 URL 命令传输数据效果很好。\n\
    \n对于我们的 URL 前缀，我们将使用`bcrumbs`。如果你的应用有一个独特的名称（应该如此），那么该名称（或其变体）可能很适合作为唯一前缀。首先，`bcrumbs`\
    \ URL 协议需要注册到 iOS 系统中，并分配给 `Breadcrumbs` 的完整版。这通过在 Xcode 中向付费应用的`Info.plist`文件添加新的\
    \ URL 类型来完成（参见 Figure 6-8）。\n\n![9781430262381_Fig06-08.jpg](img/9781430262381_Fig06-08.jpg)\n\
    \nFigure 6-8。在 Xcode 的 plist 编辑器中打开完整版的`Info.plist`文件，添加新的 URL 类型\n\n要向`Info.plist`文件添加新条目，请在\
    \ plist 编辑器中选择最后一行，然后点击右侧的灰色加号（`+`）按钮。在新的空白行中，从左侧键（`Key`）列出现的上下文菜单列表中选择`URL Types`。\n\
    \n添加新 URL 类型后，打开其展开三角形以配置嵌套属性。在其`Item 0`键下，你需要将付费应用的唯一属性`com.company.Application`添加到`URL\
    \ identifier`字段。对于虚构的 `Breadcrumbs` 应用，这很可能是`com.electricbutterfly.Breadcrumbs`。\n\
    \n接下来，再次点击加号按钮，在`URL identifier`正下方添加另一个嵌套键，并从新键的上下文菜单中选择`URL Schemes`。`URL scheme`是你定义唯一\
    \ URL 协议处理器的地方，因此对于 `Breadcrumbs` 示例，它是`bcrumbs`。\n\n**注意**：如果你有一个 Xcode 项目设置了两个编译目标（一个目标用于精简版，一个目标用于付费版），则需要为每个目标创建单独的\
    \ plist 文件。只有应用完整版的 plist 文件可以包含唯一的 URL 协议处理器定义。如果你的精简版 plist 文件引用了相同的 URL 类型，那么精简版最终将接收自己的\
    \ URL 请求，这会导致冲突。当精简版发送唯一的 URL 请求时，你只希望付费版来响应它。\n\n现在，唯一的`bcrumbs` URL 协议已分配给 `Breadcrumbs`\
    \ 的完整版，下一步是为精简版添加通过 URL 传输数据的代码。假设你已在精简应用的设置屏幕上添加了一个新按钮，名为`Transfer My Data to\
    \ Full Version`（将我的数据传输到完整版），并且它已在 Interface Builder 中连接好。还假设事件处理器已包含从精简版沙盒获取数据的代码（例如来自\
    \ XML 文件或纯文本文件的内容）。\n\n你不能在 URL 查询中发送原始数据，因此必须首先进行 Base64 编码和/或 URL 编码。iOS SDK\
    \ 不包含 Base64 编码和解码，但一些第三方 Objective-C 库（例如`Google Toolbox for Mac`，`http://code.google.com/p/google-toolbox-for-mac/`）为\
    \ iOS 提供 Base64 支持。如果仅 URL 编码就能满足需求，你可以轻松调用原生 iOS `NSString`方法`stringByAddingPercentEscapesUsingEncoding`。\n\
    \n一旦数据经过 Base64 编码和/或 URL 编码并存储在`NSString`中（我们称之为`encodedData`），就可以作为唯一 URL 查询的一部分发送：\n\
    \n```objectivec\nNSString *urlQuery = [NSString stringWithFormat:@\"bcrumbs://localhost/importData?%@\"\
    , encodedData];\nNSURL *url = [NSURL URLWithString:urlQuery];\n[[UIApplication\
    \ sharedApplication] openURL:url];\n```\n\n当用户点击`Transfer My Data to Full Version`按钮时，精简版发起该\
    \ URL 请求。iOS 识别出`bcrumbs` URL 协议处理器已注册到 `Breadcrumbs` 的完整版，因此该唯一 URL 被传递给付费应用。`Breadcrumbs`\
    \ 的完整版启动以接收并解析该 URL 命令。\n\n要使最后一步成功，付费应用必须在应用委托的实现中包含`application:handleOpenURL`处理器。例如，`BreadcrumbsAppDelegate.m`文件包含以下代码：\n\
    \n```objectivec\n- (BOOL)application:(UIApplication *)application handleOpenURL:(NSURL\
    \ *)url {\n     if([@\"/importData\" isEqual:[url path]]) {\n         NSString\
    \ *urlData = [url query];\n\n// 首先，你应该询问用户是否愿意\n         // 用新导入的精简版数据替换现有数据。\n\
    ```\n"
- fmt: "// Then depending on how the string was initially encoded, you’ll  \n// need\
    \ to either decode the Base64 via a third-party library  \n// -OR- decode the\
    \ URL-encoding by calling the `NSString`  \n// method `stringByReplacingPercentEscapesUsingEncoding:`.\
    \  \n\n// Lastly, you'll want to parse and save the data  \n// to this full version's\
    \ own app sandbox.  \n\n```\nreturn YES;\n     }\n     return NO;\n}\n```\n\n\
    And that’s all there is to it! Just keep in mind that transferring data via URL\
    \ is practical only for small amounts of data such as XML files or text files\
    \ that are less than a few hundred kilobytes. You’ll also want to defend your\
    \ paid app against hackers who figure out your unique URL protocol by coding your\
    \ `application:handleOpenURL:` handler to accept only the specific data you want\
    \ and to ignore invalid URL strings.\n\n## Securing Market Share: Give It Away\
    \ Now and Up-Sell Later\n\nIs the success of your iOS app dependent on being adopted\
    \ by as many people as possible, such as a social networking app that requires\
    \ multiple participants in order for it to be useful? If so, you may want to consider\
    \ giving away the app for free. The only way to get millions of people to adopt\
    \ your service on such a grand, global scale is to make it freely available to\
    \ everyone. Think Facebook, Foursquare, and Twitter.\n\nThe goal is to get everyone\
    \ and anyone to use your app frequently enough that it eventually becomes an indispensable\
    \ part of their daily lives. The fewer barriers to entry, the easier this task\
    \ is to accomplish. Beyond being free, for best results, your app should also\
    \ be void of any potential deterrents such as advertising.\n\nAfter your app has\
    \ cultivated a large loyal following, you can introduce a premium version of the\
    \ app that offers additional features for a price. An alternative option is to\
    \ offer premium features as In-App Purchase items (as discussed in [Chapter 8](#9781430262381_Ch08.xhtml)).\
    \ The basic version will always be available for free, which is what the majority\
    \ of users will choose.\n\nSo, how do you make any money if most people use only\
    \ the free basic version? This is yet another example of how volume will ultimately\
    \ dictate your success. If you’ve created an innovative user experience and you’ve\
    \ done your job right as a marketer, then your free app has penetrated the mainstream\
    \ as a “must-have” app and is currently used by millions. For example, let’s say\
    \ the free basic version is frequently used by 10 million people. If only 8 percent\
    \ of that user base decide to upgrade to the $1.99 premium version, after subtracting\
    \ Apple’s 30 percent App Store fee, you would net more than $1.1 million in revenue.\
    \ For a more conservative estimate, even if only 5 percent upgrade to the premium\
    \ version, that would still produce $700,000 in revenue.\n\nAgain, volume is the\
    \ name of the game for this strategy to work. Most apps will not be appropriate\
    \ for this kind of business model. But if your app relies on peer-to-peer interaction\
    \ between users, this approach might just be your ticket to capturing the lion’s\
    \ share of the market for that particular niche. If your app is the market leader,\
    \ you’ll fare much better at successfully up-selling more users to the premium\
    \ version.\n\nIn [Chapter 2](#9781430262381_Ch02.xhtml), I mentioned the cool\
    \ Bump app by Bump Technologies, Inc., which enables users to instantly send contact\
    \ information to each other by bumping their hands together. But for it to work,\
    \ the two people must both have Bump installed on their iPhones or Android phones.\
    \ The more people who have Bump, the more useful it becomes. The hope is that\
    \ it will eventually be ubiquitous enough among mobile phones that it becomes\
    \ the standard method for users to swap virtual business cards and other data.\
    \ And the plan seems to be working. As it stands now, the app has become quite\
    \ popular among iPhone users and has even been featured in one of Apple’s iPhone\
    \ commercials.\n\nWill Bump always be free? To continue the adoption momentum,\
    \ that’s the goal for the foreseeable future. Instead of taking a traditional\
    \ path with a premium edition, Bump Technologies, Inc. is hoping to successfully\
    \ monetize its business by licensing its core bump technology to other large-scale,\
    \ commercial developers who would benefit from this functionality. The Bump API\
    \ is free to use within your app as long as it doesn’t overload the Bump servers\
    \ or generate incremental revenue with each bump. If your app makes money from\
    \ bumps or requires significant bandwidth from the Bump servers, you can purchase\
    \ the appropriate licensing tier.\n\nBy offering this API with easy-to-use SDKs\
    \ for iOS and Android, Bump is not only solidifying its position in the mobile\
    \ world as the de facto platform for peer-to-peer data sharing, but it’s also\
    \ building a long-term infrastructure for monetizing its core strength. And with\
    \ the Bump API already adopted in dozens of mobile apps by independent developers,\
    \ as well as by high-profile clients like PayPal and ABC Family, it would appear\
    \ Bump’s strategy is definitely paying off.\n\nThe newspaper industry is another\
    \ good example of a business that’s attempting to grow a loyal mobile audience\
    \ by offering a free service. With print newspaper ad sales and circulation continuing\
    \ to fall at a rapid pace, struggling newspapers are looking to transition to\
    \ a digital platform with a sustainable revenue model. Competing with so much\
    \ free online content, paid newspaper apps have failed to work in the past, especially\
    \ since re-creating the newspaper experience on a small mobile phone screen had\
    \ proven challenging. But with the immense popularity of the iPad and the fact\
    \ that a tablet encourages similar layback viewing behavior as newspaper reading,\
    \ there’s finally a viable mobile platform for this medium.\n\nMajor newspapers\
    \ such as the *New York Times* and the *Washington Post* have begun experimenting\
    \ with new dedicated iPad apps that offer their entire daily newspapers free for\
    \ a limited time. With the iPad’s larger screen, these apps are able to present\
    \ a satisfying digital reading experience that’s comparable to print, while taking\
    \ advantage of modern touchscreen technology. They provide 100 percent free content\
    \ for several months, and hope that consumers will grow to depend on receiving\
    \ the “paper” this way. Then it will be an easy decision to switch to an In-App\
    \ Purchase subscription when the free service ends (see [Figure 6-9](#9781430262381_Ch06.xhtml#Fig9)).\n\
    \n![9781430262381_Fig06-09.jpg](images/9781430262381_Fig06-09.jpg)\n\n[Figure\
    \ 6-9](#9781430262381_Ch06.xhtml#_Fig9). The Washington Post is one of several\
    \ newspapers hoping that its free iPad app will eventually turn loyal readers\
    \ into paid subscribers by offering 100 percent free content for a limited time\n\
    \nIf you need to earn revenue sooner rather than later to finance your development\
    \ efforts, these free strategies may not be the right path for you. But if your\
    \ development is currently supported by existing cash flow from investors, sponsors,\
    \ or other sources, and you can afford to wait several months for your app to\
    \ gain traction in the mobile marketplace, free can be an effective business model\
    \ with the right implementation.\n\n## Mining Additional Revenue with Affiliate\
    \ Programs\n\nEarlier in this chapter, I mentioned the use of iTunes affiliate\
    \ links when sending users to the iTunes Store. Here, we’ll take a closer look\
    \ at how affiliate programs can generate income for you.\n\n### How Affiliate\
    \ Programs Work\n\nThe way that affiliate programs work is quite simple. Participating\
    \ companies want to encourage software and web site owners to send traffic to\
