- fmt: 'On the other hand, if your iPad app does not offer anything new beyond an
    iPad-optimized interface slapped on top of the same iPhone feature set, you may
    want to consider a universal application. If you can’t justify the iPad app price
    with additional iPad-exclusive functionality, selling it as a separate product
    will definitely attract an angry mob of customers wielding pitchforks and writing
    negative App Store reviews! And Apple may just agree with them. Apple has been
    known to reject stand-alone iPad apps that don’t add any significant value beyond
    what’s available from their iPhone counterparts. In these situations, Apple usually
    advises the developer to convert it into a universal application before resubmitting
    it to the App Store.


    Another major issue to consider is the file size of your app. A universal application
    combines the incremental code and separate `*.xib*` files and image resources
    for both the iPhone and iPad versions into one package, which means it can often
    be nearly double the file size of a single target app. Although Apple recently
    raised the cellular 4G download limit from 20MB to 50MB to help accommodate universal
    applications, some content-heavy games may still exceed that file size. If your
    universal application is larger than 50MB, that drastically reduces your app’s
    potential audience to only people within Wi-Fi range. Whether your app is free
    or a paid product, this factor alone may persuade you to release separate iPhone
    and iPad versions to ensure that your app can be downloaded by both Wi-Fi and
    cellular 4G connections.


    ## What’s in an App Name?


    While researching the competition, you undoubtedly performed a countless number
    of searches within the App Store. Along the way, you discovered that the words
    used in an app’s name and related keywords can affect its placement in App Store
    searches. [Chapter 11](#9781430262381_Ch11.xhtml) discusses how to refine your
    App Store display name, keywords, and description; for now, let’s focus on your
    app name. In the App Store, you’re able to add short captions to your app’s display
    name to help ensure inclusion in relevant search results, but we won’t worry about
    those long App Store names just yet.


    Your app name is the one you will use to promote your app everywhere, both inside
    and outside the App Store. Coupled with its icon, your app name is a brand—one
    that you hope to build into a recognizable name that is both symbolic of its core
    function and appealing enough to be memorable. If people can’t easily remember
    your app’s name, they can’t recommend it to others.


    There is also the application’s bundle display name that is assigned in your Xcode
    project’s property list (`plist`) file. This is the name listed in the very small
    space under your app icon on an iPhone or iPad home screen. You have approximately
    12 characters to play with. Anything longer than that, and you risk your name
    being truncated (with `...`). For example, Rebisoft’s Jack Nutting developed a
    stellar retro shooter game called `Diabolotros`, which makes great use of the
    iPhone’s accelerometer. Having grown up in the 1980s, I spent a fair amount of
    time in the arcades playing Space Invaders, so I quickly downloaded the free `Diabolotros`
    `Lite` to check it out. It’s an addictive, fun game, and I soon purchased the
    full version. I noticed that `Diabolotros`, at 11 characters long, displays quite
    nicely under the app icon on my iPhone home screen. `DiabolotrosLite`, however,
    is too long, so in order for it to fit, the name is automatically truncated to
    `“Diabol…sLite”` (see [Figure 2-4](#9781430262381_Ch02.xhtml#Fig4)).


    ![9781430262381_Fig02-04.jpg](images/9781430262381_Fig02-04.jpg)


    [Figure 2-4](#9781430262381_Ch02.xhtml#_Fig4). Try to keep your app name to 12
    characters or less to avoid a truncated display on the iPhone’s home screen


    Since adding the word `lite` or `free` would put most app names over the 12-character
    maximum, many developers have inserted a `lite` or `free` badge into their app
    icon as a visual marker for users to easily distinguish it from the full version.
    This alleviates the need to clutter your app name with those words.


    In comparison, Digital Chocolate’s 3D Rollercoaster Rush has quite a long name
    in the App Store, but its actual bundle display name is shortened to `3D Coaster`
    to ensure that it fits under the app icon on an iPhone home screen. Luckily, users
    recognize the shortened `coaster` as meaning `rollercoaster`. And for the free
    version, Digital Chocolate simply modified its app icon with a “FREE!” badge (shown
    in [Figure 2-4](#9781430262381_Ch02.xhtml#Fig4)).


    If you do use an abbreviated name for your application bundle display name, take
    great care that it is not radically different from its App Store name. If the
    two names don’t appear related in the eyes of Apple’s app review team, it can
    be grounds for rejection from the App Store. [Chapter 11](#9781430262381_Ch11.xhtml)
    explores app name conventions as they relate to App Store submissions, but you
    do need to think about these issues in advance. When you’re deciding on your app
    name, take extra care not to use long words that can’t be broken down into nicknames
    or abbreviations. `Supercalifragilistic` is a memorable word but impossible to
    trim into a 12-character app name.


    So now that you’ve figured out your length limitation, what would make a good
    name? Finding the perfect name can be very challenging, but it’s worth spending
    the time to get the name right. In previous App Store searches, app names that
    included relevant keywords ranked well in the search results, but don’t get too
    caught up with trying to integrate keywords into your app name. Remember that
    your app’s name in the App Store can be much longer with a keyword-laden caption,
    so you should concentrate primarily on creating a name that’s unique and memorable.


    Although a name like `Parked Car Locator` is very descriptive, is rich with keywords,
    and can be easily shortened to the 11-character `Car Locator` when needed, it’s
    probably too generic to be registered as a trademark. Since US trademark law prevents
    the trademark ownership of common words that describe a service or function—common
    words that other companies need to be able to use to describe similar things—legally
    protecting a name like `Parked Car Locator` would be difficult.


    Instead, try coming up with something a little more creative. To prevent getting
    lost in the forest, travelers would often place markers on branches or leave a
    trail of breadcrumbs so that they could find their way back home. Since finding
    your way back to your parked car involves a similar strategy, you might want to
    play around with a cute app name like `Breadcrumbs`, which is only 11 characters.
    To ensure placement in relevant search results within the App Store, you could
    pack your app submission with important keywords and even expand your App Store
    name to `Breadcrumbs—Parked Car Locator`.


    If another iOS app is using a similar name, you’ll definitely want to come up
    with a different name. Even if you’ve locked in on a name that no one else is
    using in the App Store, you can’t stop there. You should also search the Internet
    and all major software directories—the Mac App Store, `Google.com`, Android Marketplace,
    `MacUpdate.com`, and `Download.com` to name a few—to check for any possible conflicts
    on other software platforms.


    You’ll also want to search the US Patent and Trademark Office’s Trademark Electronic
    Search System (TESS) database, at `http://www.uspto.gov/trademarks/`, for any
    filed trademarks on that name. Searching TESS in no way obligates you to file
    a trademark. That’s something you can do later when you’re ready. For now, you
    merely want to make sure the name is not already trademarked by another party.'
