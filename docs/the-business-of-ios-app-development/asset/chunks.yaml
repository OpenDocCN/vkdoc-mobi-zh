    follow the same framework-insertion instructions as for previous examples to add
    the SystemConfiguration framework to your project. As you might expect, the `Reachability`
    class requires the networking functions in the SystemConfiguration framework.


    Building the App’s Foundation


    Before programming the core functionality of our project, we need to construct
    some initial files and write some basic code.'
  trans: '

    图 7-8. 某些应用可能需要重新设计视图层级，以便容纳必须作为`UIView`子视图的 iAd 横幅框架。


    在图 7-8 中，顶部的`UIView`（在代码中赋值为`contentView`）充当应用 UI 控件的外部容器视图。如果你需要此父视图调整自身大小，以便在屏幕底部为
    iAd 横幅腾出空间，则应设置嵌套 UI 控件的自动调整蒙版，从而使它们也能相应地调整大小或移动位置。如图 7-8 所示，文本内容为“BOTTOM of ‘contentView’
    UIView”的`UILabel`已将其自动调整蒙版设置为在父视图`UIView`高度变化时向上移动。


    图 7-8 中最底层代表应用的主窗口，其中嵌入了一个视图控制器。中间的白色图层是由该视图控制器调用的主`UIView`。此`UIView`默认被分配了出口`view`。名为`contentView`的`UIView`和
    iAd 横幅框架都是父`UIView`（即`view`）的子视图。


    如果这对你来说有点难以理解，别担心。当我们接下来逐步演示如何在 Xcode 示例项目中集成 iAd 时，一切都会变得清晰明了。当你看到实际运行效果时，就会理解`UIView`层级设计背后的逻辑。


    就视觉效果而言，我们不希望 iAd 突然弹出，导致所有内容瞬间移位。这可能会让用户感到突兀。更优雅的方式是让 iAd 平滑地过渡到屏幕上，使用`UIView`动画将其滑入和滑出视图。当我们构建图
    7-8 的通用应用示例（同时适用于 iPhone 和 iPad）时，你将看到如何将`UIView`动画与 iAd 横幅框架结合使用。请继续阅读...


    ## 编写应用以支持广告


    让我们开始编写代码！首先，在深入 Xcode 之前，重要的是要确切理解我们这个示例项目需要实现什么功能。以下是基本功能概要：


    *   检查设备的互联网连接。如果没有连接，则不执行任何操作，让应用的 UI 保持在正常的全屏状态。

    *   如果设备有互联网连接，则向 iAd 网络请求一个 iAd 横幅。

    *   如果 iAd 网络发来消息表明 iAd 横幅请求成功，则准备 iAd 横幅框架，广告横幅即可显示。

    *   如果 iAd 网络回复说没有可用的 iAd 横幅，则准备一个备用广告横幅来显示。在本示例中，我们将展示一个内置的自家广告，但你也可以很容易地修改示例代码以支持第二个广告网络（例如
    AdMob）。

    *   当广告横幅（无论是 iAd 还是自家广告）准备好显示时，使用`UIView`动画将广告从屏幕底部滑入视图，并调整受影响的 UI 元素的位置，为广告横幅框架腾出空间。

    *   如果应用之前正在显示广告横幅，但设备失去了互联网连接或没有新的广告横幅可显示，则使用相同的`UIView`动画技术将广告框架滑出视图，将应用的 UI
    恢复为正常的全屏状态。


    如果你只想在现有 UI 上方显示一个 iAd 横幅，可能会觉得这个详尽的教程有些大材小用。对于简单的 iAd 代码示例，请查看苹果的示例项目 iAdSuite，可从
    iOS 开发中心在线获取：`http://developer.apple.com/library/ios/#samplecode/iAdSuite/`。


    但对于那些对我上面列出的功能感兴趣的读者来说，我们即将构建的高级示例项目可能正是你所寻找的解决方案。本教程包含大量代码（与本书其他示例相比），因此为了避免大量手动输入，我强烈建议你下载本书配套的示例代码（来自
    `http://www.iPhoneBusinessBook.com` 或 `http://www.apress.com`），然后在 Xcode 中打开包含的
    `InAppAdv` 项目。即使你想自己逐步操作，从 `InAppAdv` 示例项目中复制粘贴一些代码也能为你节省宝贵的时间。


    ## 创建新的 Xcode 项目


    自 iOS 4.0 起，iAd 便可用于 iPhone 和 iPod touch，但直到 iOS 4.2 才在 iPad 上获得支持。为了兼顾所有读者，我们将构建一个通用应用示例，展示如何为
    iPhone 和 iPad 目标设备实现 iAd 代码。


    启动 Xcode 并创建一个新的 iOS 项目，选择“基于窗口的应用程序”模板。在选择该项目模板时，确保其“产品”下拉菜单设置为“通用”，但取消勾选“使用
    Core Data 存储”复选框。将新项目命名为 `InAppAdv`。


    ## 向项目添加 iAd 框架


    要成功运行和编译带有 iAd 相关代码的应用，必须使用苹果的 iAd 框架。要将此框架添加到项目中，请按住 Control 键点击项目的 *Frameworks*
    文件夹，然后从出现的上下文菜单中选择“添加”![image](img/arrow.jpg) “现有框架...”（参见图 7-9）。接着从出现的列表中选择 `iAd.framework`。


    ![9781430262381_Fig07-09.jpg](img/9781430262381_Fig07-09.jpg)


    图 7-9. 将所需的 iAd.framework 添加到你的 Xcode 项目中。


    为了专注于当前任务，本示例项目要求 iOS 4.2 或更高版本。如果你的应用需要支持更早的 iOS 版本，可以在项目中弱链接 iAd 框架。为此，请在“目标”组中选择项目的应用名称，点击“获取信息”按钮，然后在出现的“通用”标签页中，为
    `iAd.framework` 选择“弱”作为链接方法（参见图 7-10）。


    ![9781430262381_Fig07-10.jpg](img/9781430262381_Fig07-10.jpg)


    图 7-10. 弱链接 iAd.framework 以实现与 iOS 4 之前版本设备的向后兼容。


    你可能还需要在应用内使用条件编码，以便在 iOS 4 设备上显示 iAd 横幅广告，而在较旧版本的 iOS 上显示自家广告或其他第三方广告横幅。有关实现向后兼容的更多信息，请查阅
    iOS 开发中心。


    ## 向项目添加苹果的 Reachability 类


    当应用运行时，你需要代码来检查互联网连接。如果没有网络连接，请求广告横幅就毫无意义。无需花时间编写自定义的网络检测代码，苹果建议使用其 `Reachability`
    类，该类可以作为 `Reachability` 示例项目的一部分从 iOS 开发中心下载，地址为 `http://developer.apple.com/library/ios/#samplecode/Reachability/`。


    下载 `Reachability` 项目后，在 Xcode 中打开它。将 `Reachability` 项目中的 *Reachability.h* 和 *Reachability.m*
    类文件拖放到你的 `InAppAdv` Xcode 项目窗口的 *Shared* 文件夹中（选择复制文件选项，而非移动文件）。


    我们稍后将添加与 `Reachability` 类交互的代码。目前，只需按照与先前示例相同的框架插入说明，将 SystemConfiguration 框架添加到你的项目中。不出所料，`Reachability`
    类需要 SystemConfiguration 框架中的网络功能。


    ## 构建应用基础


    在编写项目的核心功能之前，我们需要创建一些初始文件并编写一些基本代码。

    '
- fmt: 'With the `iPhone` folder selected in the Groups & Files column, create a new
    file based on a `UIViewController` subclass. Assign an interface to this class
    by checking the box “With XIB for user interface,” and call the new class `MainViewController_iPhone`.


    Next, select the `iPad` folder in the project and create another new `UIViewController`
    subclass, appropriately named `MainViewController_iPad`. As with its iPhone counterpart,
    make sure the check box “With XIB for user interface” is selected. Even though
    we’re using this class for the iPad, please leave Targeted for iPad unchecked,
    so that the autosizing mask of the default `UIView` remains unlocked. This will
    come into play later when we need to modify the `UIView` autosizing mask.


    Now that we have the necessary new classes created, open the `AppDelegate_iPhone.h`
    file and add the following new code, highlighted in bold:


    ```

    #import <UIKit/UIKit.h>


    @class MainViewController_iPhone;


    @interface AppDelegate_iPhone : NSObject <UIApplicationDelegate> {

        UIWindow *window;

        MainViewController_iPhone *viewController;

    }


    @property (nonatomic, retain) IBOutlet UIWindow *window;

    @property (nonatomic, retain) IBOutlet MainViewController_iPhone *viewController;


    @end

    ```


    As you can see, the bold lines of code assign a new `viewController` property
    and `IBOutlet` to the `MainViewController_iPhone` class.


    Also add the same code to `AppDelegate_iPad.h`, taking care to replace all `MainViewController_iPhone`
    references with `MainViewController_iPad`.


    After saving those header files, open the `AppDelegate_iPhone.m` implementation
    file and add the new code, shown in bold:


    ```

    #import "AppDelegate_iPhone.h"

    #import "MainViewController_iPhone.h"


    @implementation AppDelegate_iPhone


    @synthesize window;

    @synthesize viewController;


    #pragma mark -

    #pragma mark Application lifecycle


    - (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary
    *)launchOptions {


    // Override point for customization after application launch.


    [window addSubview:viewController.view];

        [self.window makeKeyAndVisible];


    return YES;

    }


    - (void)applicationWillResignActive:(UIApplication *)application {

    }


    - (void)applicationDidEnterBackground:(UIApplication *)application {

    }


    - (void)applicationWillEnterForeground:(UIApplication *)application {

    }


    - (void)applicationDidBecomeActive:(UIApplication *)application {

    }


    - (void)applicationWillTerminate:(UIApplication *)application {

    }


    #pragma mark -

    #pragma mark Memory management


    - (void)applicationDidReceiveMemoryWarning:(UIApplication *)application {

    }


    - (void)dealloc {

        [viewController release];

        [window release];

        [super dealloc];

    }


    @end

    ```


    This new code adds `viewController` as a subview to the app’s main window.


    Also insert the same new code in `AppDelegate_iPad.m`, taking care to `#import`
    `MainViewController_iPad.h` instead of `MainViewController_iPhone.h`.


    With the proper code in place, it’s time to do a little UI work. Follow these
    steps:


    1.  Open `MainWindow_iPhone.xib` in Interface Builder.

    2.  Drag a `UIViewController` from the Library palette to the browser window and
    wire its referencing outlet `viewController` to the app delegate module.

    3.  With the `UIViewController` selected in the browser window, assign its NIB
    to `MainViewController_iPhone.xib` in the inspector palette’s Attributes tab,
    with Resize View from NIB checked (see [Figure 7-11](#9781430262381_Ch07.xhtml#Fig11)).


    ![9781430262381_Fig07-11.jpg](images/9781430262381_Fig07-11.jpg)


    [Figure 7-11](#9781430262381_Ch07.xhtml#_Fig11). Configuring MainWindow_iPhone.xib
    with a new UIViewController that loads MainViewController_iPhone


    4.  In the inspector palette’s Identity tab, change its class to `MainViewController_iPhone`.


    You’ll need to perform the same steps in Interface Builder with `MainWindow_iPad.xib`,
    except that the `UIViewController`’s NIB should be assigned to `MainViewController_iPad.xib`
    and its class changed to `MainViewController_iPad`.


    ## Checking the iOS Device’s Network Connection


    Remember adding Apple’s `Reachability` class to the project? Now you get to write
    code that taps into the power of that handy network-detection class. Open the
    `MainViewController_iPhone.h` file in Xcode and add the following bold code:


    ```

    #import <UIKit/UIKit.h>


    @class Reachability;


    @interface MainViewController_iPhone : UIViewController {


    UIView *contentView;

        Reachability* netReachable;

        BOOL isNetAvailable;

    }


    @property (nonatomic, retain) IBOutlet UIView *contentView;


    - (void)reachabilityChanged:(NSNotification*)note;


    @end

    ```


    Essentially, this code sets up some `Reachability`-related properties and a method,
    as well as a new `UIView` property and `IBOutlet` reference called `contentView`.
    You’ll need to also add the same new code lines to `MainViewController_iPad.h`.


    Moving on to the `MainViewController_iPhone.m` implementation file, add the following
    new code, highlighted in bold:


    ```

    #import "MainViewController_iPhone.h"

    #import "Reachability.h"


    @implementation MainViewController_iPhone


    @synthesize contentView;


    // Uncommented viewDidLoad and added Reachability code.

    - (void)viewDidLoad {

        [super viewDidLoad];


    // Check the current device''s Internet connection

        // using Apple''s Reachability classes. When the status

        // changes, a notification is posted, calling the

        // reachabilityChanged method.

        [[NSNotificationCenter defaultCenter] addObserver: self selector: @selector(reachabilityChanged:)
    name: kReachabilityChangedNotification object: nil];

        netReachable = [[Reachability reachabilityWithHostName: @"www.apple.com"]
    retain];

        [netReachable startNotifier];

    }


    // Uncommented and return YES.

    - (BOOL)shouldAutorotateToInterfaceOrientation:

                    (UIInterfaceOrientation)interfaceOrientation {

        // Return YES to support both Portrait and Landscape orientations.

        return YES;

    }


    //Called by Reachability whenever status changes.

    - (void) reachabilityChanged: (NSNotification* )note {


    NetworkStatus netStatus = [netReachable currentReachabilityStatus];

        switch (netStatus)

        {

            case NotReachable:

            {

                isNetAvailable = NO;

                break;

            }

            case ReachableViaWiFi:

            {

                isNetAvailable = YES;

                break;

            }

            case ReachableViaWWAN:

            {

                isNetAvailable = YES;

                break;

            }

        }

    }


    - (void)didReceiveMemoryWarning {

        [super didReceiveMemoryWarning];

    }


    - (void)viewDidUnload {

        self.contentView = nil;

        [super viewDidUnload];

    }


    - (void)dealloc {

        [contentView release];

        [[NSNotificationCenter defaultCenter] removeObserver:self];

        [super dealloc];

    }


    @end

    ```


    The newly added code sets up access to the `Reachability` functionality and the
    `NSNotificationCenter`, so that this class can check the current status of the
    device’s network connection, and is always notified if that status changes. This
    determines if your app has Internet access, which is vital information to know
    before attempting to communicate with ad network’s servers. If viable network
    connectivity is detected, then the Boolean `isNetAvailable` is set to `YES`.


    As with the previous steps in this tutorial, you’ll need to add the same bold
    code lines to `MainViewController_iPad.m` as well.


    ## Building the App’s Interface and UIView Hierarchy


    You probably noticed the new `UIView` property called `contentView` in the `MainViewController_iPhone`
    and `MainViewController_iPad` classes. Now that the `IBOutlet` code is in place,
    let’s complete the configuration of that `UIView` in Interface Builder, along
    with some other UI elements for this example.'
