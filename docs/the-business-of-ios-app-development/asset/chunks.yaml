    Since transactions are persistent, removing the finished transaction from the
    payment queue is very important. You’ll notice from the bold code that this is
    done not only after a successful transaction, but also after a failed transaction.
    But do this only after you’re finished retrieving the information you need from
    the transaction.


    In the case of a successful transaction, you’ll want to capture the ID of the
    purchased item via `transaction.payment.productIdentifier` before removing the
    transaction. This will tell you the specific In-App Purchase product that should
    be provided to the user, which is especially useful if your application offers
    multiple in-app items for sale. You should store this ID somewhere in your app
    (such as in a plist file), so that it can keep track of which items have already
    been purchased and ensure that content remains readily accessible the next time
    the user runs your app.


    The app’s preferences file is a good place to store purchased product IDs, since
    an app’s preferences are backed up when users sync their devices with their computer
    via iTunes. For Non-consumable and valid subscription items, your customers should
    have access to their purchased items every time they run your app.


