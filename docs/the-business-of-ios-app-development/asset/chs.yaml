  \n**注意** 经验丰富的 iOS 开发者可能会觉得 iPhone 和 iPad 代码之间的相似性相当重复。我第一个承认，很多代码本可以重构以在两个目标之间共享，从而减少重复。但这种看似疯狂的做法自有其道理。本书的读者群体非常多样化，从入门级新手到高级程序员。通过将所有相关代码保留在每个目标的同一个位置，这种方法使读者更容易跟随代码并快速了解项目的工作原理，无论其技术水平如何。\n\
