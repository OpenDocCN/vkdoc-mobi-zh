  \ `UIActionSheet` 中增加一个按钮，而无需改动应用的主要 UI 设计。\n\n打开 `RootViewController.h` 头文件，将代码修改如下：\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@interface RootViewController : UIViewController\
