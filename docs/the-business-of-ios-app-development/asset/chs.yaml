  ### 开始上手你的第一个 iOS 应用


  我们需要涵盖的内容非常多，所以在深入之前，请确保你已经下载并安装了最新的 Xcode 工具和 iOS SDK（7.0 或更高版本）。如果没有，请前往 Apple
  开发者网站 `http://developer.apple.com/`。


  如果你还不是注册的 Apple 开发者，请先注册（免费），这样你就可以访问 iOS 开发中心（`http://developer.apple.com/devcenter/ios/`）提供的最新
  SDK、工具、文档、教程和示例代码。


  在你访问该网站时，花点时间申请所需的 iOS 开发者计划。不要等到你的应用准备提交到 App Store 时才去做这件事，因为收到 iOS 开发者计划的接受通知可能需要数周时间，这会不必要地延误你的进度。被接受后，支付相应的费用以完成注册。当你的付款处理完毕后，在登录
  iOS 开发中心时，你会看到浏览器屏幕右侧有一个“iOS Developer Program”栏。点击列在那里的 `iTunes Connect` 按钮。


  在 iTunes Connect 的主页上，请务必访问 `Contracts, Tax, & Banking Information`（合同、税务和银行信息）部分，以查看你当前生效的合同。默认情况下，你应该已经激活了“免费应用程序”合同，该合同允许你向
  App Store 提交免费应用。但如果你想向 App Store 提交付费应用，则需要申请一份“付费应用程序”合同。Apple 需要你的银行和税务信息，以便在你有应用销售收入时向你付款。由于
  Apple 通过安全的电子存款转账，你需要提供你银行的 ABA 路由号码、名称和地址以及你的账号，因此请确保你的银行支持与第三方供应商的电子交易。如果你计划在多个地区的
  App Store 销售应用，为了接收国际付款，Apple 可能还需要你银行的 SWIFT 代码。虽然大多数大型全国性银行都支持 SWIFT 系统，但一些较小的独立银行和信用合作社可能不支持，因此请确保你的银行能够提供
  SWIFT 代码。


  在你完成所需步骤（参见图 1-4）之前，Apple 将托管其欠你的任何款项。由于这个过程也可能相当漫长，我强烈建议在将应用提交到 App Store 之前很久就完成“付费应用程序”合同的签订。


