  ### 你的应用已经在 App Store 里了？提升销量永远不会太晚


  即使你是一位资深的 iOS 开发者，目前在 App Store 中已经有一款或多款应用，你仍然可以采取许多措施来增加这些应用的曝光度和销量。你已经投入了宝贵的开发时间和金钱才走到这一步，现在放弃实在太可惜了！


  但是，切勿犯下直接跳到本书发布后相关章节的错误。前面章节中介绍的许多解决方案都能产生显著效果，尤其是在为现有应用规划新版本和更新时。




