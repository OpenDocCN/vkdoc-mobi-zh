  ### 为你的应用定义品牌


  你的应用应拥有区别于其他竞争对手的主色调、图标和标志。你能提供给用户的最佳体验之一，就是在标志、应用和应用图标的设计上保持一致性。在构思应用的标志时，请保持创意源源不断。这是一个视觉元素，如果能借助专业设计师的魔力会更好，因此，如果你聘请了设计师来创建应用图标，那么应该让同一位专家来创建匹配的标志。但如果预算紧张迫使你不得不独自承担图形设计的重任，也无需担心。标志不必复杂。事实上，就像你的图标一样，标志越简洁，你在各种小尺寸下使用它的灵活性就越大，同时还能保持可读性。


  你需要创建一个主标志，其尺寸至少几英寸长，分辨率为 300 dpi，这样它在你未来可能创建的任何与印刷相关的营销材料中都会看起来很棒。为了获得最佳效果，你可能希望选择基于矢量的
  Illustrator 程序来创建你的标志，特别是如果你的图标也是在 Illustrator 中构建的。利用你已经完成的设计工作，将现有的图标融入标志设计中。这不仅为你节省了大量设计时间，还有助于强化你已经通过应用图标建立的品牌形象。


  #### 你最强大的营销工具


  **注意** 如果你在标志中使用第三方字体，务必购买适当的字体许可证以便在商业项目中使用。有些字体可能相当昂贵，因此如果资金是个问题，我建议尽可能使用免版税字体。请参考本章后面的“给艺术挑战者的提示”部分，获取一些有用的字体库资源。


  在游戏的这个早期阶段，创建一个包含在`Xcode`项目中的应用图标似乎是显而易见的——但为什么要在应用尚未开发时就设计标志呢？显然，你会希望在应用的官方网站上准备好使用你的标志，并让它可用于你进行的任何发布前的宣传工作。但现在设计标志的最大原因是为了商标注册（正如
  Taylor Pierce 在第 3 章中所解释的）。商标申请和审批过程可能需要几个月的时间，因此如果你计划为你的应用标志注册商标，最好尽快启动这一流程。如果一切顺利，理想情况下你可以在应用上架
  App Store 之前就正式注册好商标。


  #### 保持一致的品牌形象


  为了强化你的品牌形象，你需要在所有的营销活动中使用相同的应用图标和标志。如果你使用太多视觉上的变体来推广同一个 iOS 应用，很可能引起消费者的困惑。




  通过持续使用相同的图标和标识，你的应用品牌将逐渐为人们所熟知。这种熟悉感有助于消费者在搜索 App Store 或向亲友推荐你的应用时，轻松回忆起应用名称。


  拥有一个知名品牌，还能帮助你向熟悉你此前应用视觉品牌的用户推广新的 iOS 应用。


  例如，为强化知名效率应用 Evernote 的品牌形象，其应用内多个界面以及官方网站都使用了相同的图标和配色方案（见图 4-5）。请注意，尽管 Evernote
  的图标设计极为简洁，但其一致的运用却非常有效（这对所有非艺术出身的开发者来说是个好消息）。


  ![9781430262381_Fig04-05.jpg](img/9781430262381_Fig04-05.jpg)


  图 4-5。Evernote 在应用图标中使用了相同的 Evernote 图标和颜色。Evernote 应用（左）与其网站（右）展示了统一的品牌形象。


  如果你正在将现有应用从其他平台（如 Mac OS X 或 Windows）移植到 iPhone 或 iPad，可以利用已建立的品牌资产，为 iOS 版本使用相似的图标和标识。这是吸引那些已从其他平台熟悉你应用的新用户的好方法。


  例如，当 Flexbits 为其获奖 Mac 应用 Fantastical 创建 iPhone 版本时，它使用了相同的品牌形象，但略微修改了图标。该图标依然能让人一眼认出是
  Fantastical，并巩固了 iPhone 应用与其 Mac 版本直接相关的联系。但对 iPhone 版本图标的细微设计调整起到了重要作用。这种改动不仅有助于图像作为带有圆角的小型
  iOS 图标更好地显示，还有助于将 iPhone 应用定位为独立版本（见图 4-6）。


  ![9781430262381_Fig04-06.jpg](img/9781430262381_Fig04-06.jpg)


  图 4-6。Fantastical Mac 版图标（左）与 Fantastical iPhone 版图标（右）


  Fantastical 的 iPhone 图标是兼具简约与精致的绝佳范例。该图标的高品质感来源于设计中的细微之处，例如高对比度色彩、微妙的效果以及具有辨识度的日历设计。在我看来，Fantastical
  的 Mac 版和 iOS 版图标都是高效应用图标设计的完美典范，体现了“少即是多”的原则——以视觉冲击力实现极致简约。


  #### 创建高效的应用图标与标识


  现在进入最后一步：制作一个高效的应用图标。如前所述，当消费者浏览 App Store 列表时，应用图标是你的应用呈现的第一个视觉线索。你的应用图标和名称将是决定用户是否感兴趣并点击进入应用产品页面的关键因素。由于图标代表了应用的品牌形象，其设计必须足够令人难忘且引人注目，才能从竞争对手的图标中脱颖而出。


  在第 2 章末尾，我建议你审视竞争对手的应用图标，开始构思自己的应用图标。例如，如果你正在开发一款笔记应用，而大多数同类应用目前都使用与笔记本相关的图标，那么你就不应模仿这种外观。否则，你的应用可能会被视为缺乏原创性，只是跟风之作。但你的应用将会与众不同——更加出色。因此，让你的应用图标通过对比色和原创视觉主题来反映这一点，当它们一同展示在
  App Store 列表中时，能让你的应用区别于同类应用。


  尽管有些应用图标使用了摄影图像，但你会发现大多数应用采用的是基于插画的图标。照片通常包含过多细节，当缩小到 120×120 像素的小图标时，图像会显得杂乱拥挤。最成功的图标，以及那些与
  Apple 新设计方向最为一致的图标，都以其简约、清晰、干净的设计著称，无论尺寸大小，都看起来充满活力且富有吸引力。插画通常能最好地实现这些设计目标。


  #### 应用图标规则与工具


  许多应用的图标图像看起来很像免版税的剪贴画。使用免版税的图库素材可以作为绘制图标初始原型设计的良好基础，但你最终应根据自己的需求制作原创艺术作品，特别是如果你打算为应用标识和图标注册商标的话。你不能将别人的艺术作品或图像注册为商标，除非你拥有其全部权利。


  **应用被拒警告**   请勿在应用图标或 UI 中使用受版权或商标保护的艺术品或名称。这也包括任何 Apple 商标。iPhone 图像严格禁止使用，因此不要将其包含在你的图标或界面设计中。尽管少数精选应用在其应用图标或
  UI 图标中展示了 iPhone，但这属于极少数例外。未经 Apple 事先许可而违反此规则，大多数新应用很快就会收到拒绝信。同样需要注意的是，如果你的应用使用了公众人物或名人的未经授权图像，Apple
  也会拒绝你的应用。请相信我，Apple 在允许你的应用进入 App Store 前强制执行此规定是在帮你。你最不希望发生的事情就是被某个世界 500 强企业以商标侵权为由起诉。


  由于我多年来一直是一名设计师和 Adobe Photoshop 的忠实用户，我将分享一些制作吸睛图标的小技巧。随着设计风格向简约化转变，制作应用图标变得更加容易。这就是设计简单图标的美妙之处。只要掌握一些图层和滤镜技巧，你就能创建出有吸引力的图标。你不需要成为米开朗基罗，但拥有良好的构图感——即如何安排图标的布局——绝对是一项宝贵的特质。但不必担心：即使你的图形技能只停留在幼儿园画作的水平，本章后面的“给艺术挑战者的建议”部分也提供了有用的建议和在线资源链接。


  如果你不是一位有天赋的艺术家，那么在你的预算中预留资金聘请一位专业设计师绝对是值得的。经验丰富的图形专家的敏锐眼光将使你的应用图标受益匪浅。再次强调，你的应用图标是整个应用营销策略中非常重要的视觉组成部分。如果你真的想在
  App Store 取得成功，聘请专业设计师来开发你的图标、标识，甚至部分 UI 元素，是一项明智的投资。


  但如果你是一位预算紧张、苦苦挣扎的独立开发者该怎么办呢？让我们看看你自己能怎样制作出优秀、高质量的图标。


  大多数专业设计工作都在 Adobe Illustrator 或 Photoshop (`http://www.adobe.com`) 中完成：


  *   Adobe Illustrator 是一款基于矢量的绘图程序，这意味着它创建的插图可以设置为任何尺寸而不会丢失像素质量。它非常适合设计软件图标和标识，因为这些元素可能需要以多种不同尺寸呈现，从小型桌面图标到大型展会海报。

  *   Adobe Photoshop 是一款基于位图的图形程序，但也包含许多基于矢量的工具。


  我本人偏爱 Photoshop，但大多数设计师可能会推荐使用 Illustrator 来完成此特定任务。而且，由于 Apple 不断推出新的 iOS 设备和屏幕分辨率，创建基于矢量的图标设计能让你在未来灵活处理更大尺寸，同时不牺牲图像质量。




  如果 Illustrator 或 Photoshop 的价格超出你的预算，市面上也有更便宜的图形工具可供选择。我推荐`Pixelmator`，它可以在 Mac
  App Store 上购买。它拥有许多类似 Photoshop 的功能，并且学习曲线更为平缓。但如果你计划为自己的所有软件产品、网站和营销材料创建图形，我强烈建议投资
  Adobe 的应用。如果购买 Creative Suite 套装，你可以以优惠的打包价格获得所有 Adobe 最佳设计应用。


  在向 App Store 提交应用时，你需要向 Apple 提供一个 1024 × 1024 像素的大图标。因此，如果你在 Photoshop 中创建图标，请确保你的主设计至少这么大。由于你可能也希望在营销材料中使用该图标，你应强烈考虑以更大的尺寸创建主图标。请记住，印刷广告（杂志广告、展会海报等）的分辨率至少应为
  300 点/英寸 (dpi)，因此，如果你的最大图标只有 1024 × 1024 像素，那么在 300 dpi 的印刷材料中，你的图标将只有 1.7 英寸。


  如果你以几英寸的大尺寸创建主图标，你将始终确保在任何场合都有合适的尺寸。你总是可以将图标缩小以获得出色的效果，但你不能增大现有基于位图的图标尺寸，否则会显得非常像素化。如果你在
  Illustrator 中创建基于矢量的图标，则放大或缩小都不是问题。


  不要犯仅在 iPhone 5s 或最新的 iPod touch 型号上预览应用图标的错误。在清晰、高分辨率的 Retina 显示屏上，几乎所有东西看起来都很漂亮。还要确保你的设计在最小的主屏幕应用图标尺寸（即
  60 × 60 像素，非 Retina）下看起来也很好。诀窍在于让你的图标看起来专业而精致，同时保持足够简单，以便在任何尺寸下都能良好显示。这绝非易事，尤其对于非设计师而言，但我们将通过使用一些巧妙的小图形技巧来尝试一下。


  **应用拒绝警告** *你的应用图标和 App Store 图标必须匹配！* 不要试图通过制作一个复杂、精细的 1024 × 1024 图标，然后针对 60 ×
  60 的应用图标制作一个大幅简化的版本来规避图标易读性问题。图标不需要完全一致，所以如果缩小导致某些元素模糊，你可以对小图标进行细微修饰。但当两者放在一起时，两个图标看起来应该是相同的设计。如果两者之间存在显著差异，你的应用可能会被
  Apple 的应用审核团队拒绝。


  关于规则和工具的讨论就到这里。让我们开始一些设计工作吧！


  #### 设计自定义应用图标


  你需要专注于一些本质简单，但同时又能传达应用功能的东西。务必研究竞争对手，让你的应用图标从同类中脱颖而出。在 iOS 7 中，许多知名应用简化了它们的图标以匹配新风格，这一趋势在
  iOS 8 中得以延续。图标的风格也取决于你正在制作的应用类型；例如，如果是游戏，你需要确保它有足够的细节来吸引用户的兴趣。图 4-7 展示了 iOS 6 和
  iOS 7 版本应用图标对比的示例。


  ![9781430262381_Fig04-07.jpg](img/9781430262381_Fig04-07.jpg)


  图 4-7。左侧为 Duolingo iOS 6，右侧为 iOS 7。请注意，iOS 7 版本的图标使用了更明亮的调色板，并减少了阴影和细节


  ##### 开始绘制草图


  首先，绘制关于你希望应用图标外观的想法草图。构思出几种不同的变体，直到找到你想要的方向。在构思不同布局时，你可能需要考虑几点。颜色在区分不同应用方面起着巨大作用；确保你在实际应用和图标中的调色板保持一致。如果你有品牌色或标志，请务必将它们融入到应用图标的概念中。你的概念应该传达应用的功能，无论是通过标志还是设计来体现。


  ##### 使其独一无二


  确保你定义了一个既不过于复杂但依然独特的形状或图案。通常，标志会作为应用图标的独特形状，但有时需要自行创建。图 4-8 展示了一些近期应用图标设计的示例。注意这些图标如何将设计聚焦于单一元素，保持简洁和可识别性。


  ![9781430262381_Fig04-08.jpg](img/9781430262381_Fig04-08.jpg)


  图 4-8。Evernote、Rise、Circle、Deliveries、YouTube（从左至右）


  ##### 简约之美


  在制作图标时，请记住保持简单和切题。确保这一点的一个方法是限制你使用的颜色数量。你还应尽可能避免在图标上使用文字。务必遵循 Apple 最近引入的网格系统，以确保应用图标设计之间更具一致性（参见图
  4-9）。这是一个建议指南，并非必须使用。


  ![9781430262381_Fig04-09.jpg](img/9781430262381_Fig04-09.jpg)


  图 4-9。Apple 新引入的网格系统为应用图标带来了统一性


  如果你有想要推广的品牌，请务必将你的品牌/标志元素融入应用图标中。作为参考，图 4-10 展示了一些大型零售商如何将他们的品牌融入应用图标。


