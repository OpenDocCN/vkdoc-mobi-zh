  我在该代码中穿插了一些有用的注释，因此快速阅读 `MainViewController_iPhone.m` 后，您可能已经对这里所涉及的概念有了很好的理解。但为了确保详尽无遗，让我们逐步过一遍，看看每个部分是如何运作的。\n\
  \n除了在相应部分对与广告相关的属性进行合成和释放之外，您会注意到 `viewDidLoad` 事件调用了 `prepareAdBannerView`、`prepareAltAdBanner`\
  \ 和 `adjustAdBannerPosition`，因此我们从这些方法开始。\n\n`prepareAdBannerView` 方法会创建一个新的 `ADBannerView`\
  \ 实例，根据设备当前方向设置其广告框架尺寸，然后向 iAd 网络发送 iAd 请求。最初，这个 iAd 横幅框架被放置在屏幕之外。只有当从 iAd 网络成功接收到\
  \ iAd 横幅后，iAd 横幅框架才会显示在屏幕上。将 iAd 移入视野的操作是在 `adjustAdBannerPosition` 方法中完成的。\n\n\
  那么，您的应用如何知道何时有 iAd 横幅可以显示？作为 `ADBannerViewDelegate`，此类在 `prepareAdBannerView` 方法发送请求后会从\
  \ iAd 网络接收消息。当收到 iAd 网络回复时，`bannerView:didFailToReceiveAdWithError:` 事件会被触发。如果无法加载\
  \ iAd 横幅，则布尔值 `ADBannerView.bannerLoaded` 会被设置为 `NO`。如果 iAd 成功加载，则该布尔值会被设置为 `YES`。当接收到的\
  \ iAd 完成加载到 `ADBannerView` 框架时，`bannerViewDidLoadAd` 事件会被触发。当 `bannerView:didFailToReceiveAdWithError:`\
  \ 或 `bannerViewDidLoadAd` 事件中的任意一个被触发时，无论是否有 iAd 要显示，都应该调用 `adjustAdBannerPosition`\
  \ 方法。\n\n为了应对 iAd 网络无法提供 iAd 的情况，此示例项目包含了一个备用方案，即显示内部广告。`prepareAltAdBanner` 方法会创建一个新的基于图像的\
  \ `UIButton` 实例，用于在 iAd 不可用时显示替代的内部广告。这个 `UIButton` 被配置好并放置在屏幕之外，直到需要时才使用。当然，如果您更愿意使用第三方广告横幅作为备用选项而不是内部广告，您可以轻松地使用自己的代码自定义此方法，以从其他广告网络（如\
  \ AdMob 或 InMobi）请求和配置广告。\n\n`adjustAdBannerPosition` 方法负责所有繁重的工作，包括将适当的广告横幅移动到屏幕上，以及调整现有\
  \ UI 元素的大小以适应广告横幅框架。同时，它还在网络连接丢失时负责移除广告横幅并将应用的 UI 恢复到正常的全屏状态。这种将广告横幅滑入和滑出视野的过渡是通过使用\
  \ `UIView` 动画实现的（参见图 7-13）。\n\n![9781430262381_Fig07-13.jpg](img/9781430262381_Fig07-13.jpg)\n\
  \n图 7-13. 使用 UIView 动画，`adjustAdBannerPosition` 方法负责将广告横幅滑入和滑出视野，并根据需要调整应用其余 UI\n\
  \n`adjustAdBannerPosition` 方法配置并协调 iAd 横幅框架和内部广告 `UIButton` 的放置。如果 iAd 可用，那么 iAd\
  \ 横幅框架会被分配屏幕上的像素位置，而内部广告则被赋予屏幕外的位置。如果没有 iAd 可显示，则情况相反，内部广告获得屏幕上的位置，而 iAd 横幅框架被降级为屏幕外的坐标（参见图\
  \ 7-14）。如果设备失去网络连接，则 iAd 横幅框架和内部广告 `UIButton` 都会被赋予屏幕外的像素位置。\n\n![9781430262381_Fig07-14.jpg](img/9781430262381_Fig07-14.jpg)\n\
