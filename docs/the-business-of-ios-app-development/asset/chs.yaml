- '# 第 4 章


  '
- "# 您的 iOS 应用是最强大的营销工具\n\n一款应用的成功发布与生命周期受诸多因素影响。应用图标和截图是用户在 App Store 中看到的最重要视觉元素之一。与任何商业领域一样，糟糕的第一印象会导致销售损失并招致负面评论，因此精心打磨应用设计是成功的关键要素。在本章中，我将引导您通过原型设计让应用顺利起步。我还会介绍如何通过直观的用户界面和引人注目的图标来打造卓越用户体验，以及如何为多款\
  \ iOS 设备进行设计。整章我将为这些主题提供实用技巧。\n\n本书聚焦于如何提升应用的市场吸引力。本章将讨论界面设计如何发挥作用，重点阐述在设计用户界面时需考虑的若干重要因素，并指出一些常见误区以助您规避。\n\
  \n### 迈入门槛：第一印象决定一切\n\n当您为了收集竞品研究信息（详见第 2 章）而进行大量 App Store 搜索后，您早已见识到市面上多数应用普遍缺乏品质。您看到的许多应用，其设计和实现都很拙劣，那些开发者只想着利用短期趋势牟利。\n\
  \n困扰新 iOS 开发者的最大问题之一是应用发现——尤其是在当今，App Store 中已有超过 100 万款应用（其中 47.5 万款为 iPad 原生应用），用户很难从大量劣质应用中筛选出真正的精品。但无论您投入多少营销宣传来为应用引流和提升知名度，发现只是成功方程式的一部分。\n\
  \n苹果最近将 App Store 搜索页面从显示四到五个结果改为仅显示一个。当用户终于找到或偶然看到您应用的 App Store 产品页面时，您虽然成功吸引了他们的注意，但这只是转瞬即逝的机会。您只有宝贵的几秒钟来说服他们继续探索您的应用。这意味着您的应用图标和截图必须能激发他们深入了解的欲望。\n\
  \n总体来说，大多数人既懒惰又极度忙碌，他们对时间极为珍视，耐心却极其有限。如果您的应用未能在用户查看 App Store 页面的最初几秒内抓住他们，他们就会转向其他选择——尤其当有大量类似应用可供浏览时更是如此。\n\
  \n#### 第一视觉线索\n\n应用图标是您应用呈现的第一个视觉线索。消费者在 App Store 列表中最先看到的就是您的应用图标。图标与应用名称的组合，将是决定用户是否有足够兴趣点击进入产品页面的初始关键因素。同时，图标也代表您应用的品牌标识，必须独具特色且令人难忘。\n\
  \n如果您的图标看起来不够专业，就会给用户留下一种鲜明印象：您的应用可能并非专业打造。因此，牢记这一点，一个引人注目、品质上乘的应用图标应成为您的首要设计优先级。它就像俗话说的\"\
  迈入门槛的第一只脚\"，能为您争取到消费者稍纵即逝的更多关注时间与注意力。\n\n#### 第二视觉线索\n\n\n\n#### 第一印象的重要性\n\n任何应用的产品页面展示内容的顺序，都应能反映出用户最感兴趣的是什么。在应用图标之后，你注意到的首要视觉线索就是截图。以前，苹果将文本描述放在截图之上，但现在顺序已经颠倒过来。这充分说明了选择合适的截图有多么重要。你不能指望人们会阅读你在\
  \ App Store 中应用的完整文本描述。他们可能会读前几行应用描述，但立刻就会被展示出来的截图所吸引。\n\n第一张截图必须是最能代表你应用核心功能的那一张。不要浪费机会，把应用的启动画面或设置界面作为第一张视觉呈现。虽然从使用应用的流程来看，这些界面可能在技术上排在最前面，但它们无法向潜在用户传达任何信息。此外，当用户搜索你的应用时，会显示你的应用图标和第一张截图——所以要让它有价值！\n\
  \n在这关键的几秒钟内，第一张截图必须传达出应用的功能或决定性特征。用户看一眼后，就应该有“啊哈”时刻，立刻明白你的应用大致是如何工作的，以及/或者他们为什么要购买它。至少，它应该能促使用户继续滑动，查看更多截图，阅读更多应用描述，并浏览你的用户评价和官方网站。如果你的工作做对了，这个制胜的第一印象会说服他们下载并试用你的应用。\n\
  \n#### 打造良好第一印象的更多动力\n\n以前，许多应用开发者会提供应用的精简版和专业版。其背后的理念是让用户在购买前能够评估应用，并帮助推广付费版或应用内购买功能。最近对用户和开发者都有利的趋势是，为了让应用免费以增加下载量，如果用户喜欢，他们会通过应用内购买来购买。如果用户下载了你的应用，简单试用后决定删除，你或许再也没有机会将这个人转化为客户了。\n\
  \n苹果在 iOS 4 中移除了“删除后评分”功能，但如果用户足够不喜欢你的应用，他们可能会花时间访问 App Store 并手动发布一条恶意评论。这无疑为尽可能留下良好第一印象提供了额外的动力。用户评分是用户决定是否下载应用时考虑的首要因素之一。\n\
  \n遗憾的是，你的应用 UI 设计和功能不仅要努力赢得付费版的销售，还要避免负面评价（这些评价可能不公平地“以貌取人”）。这项任务乍看起来可能令人生畏，但读完本章后，你将掌握一些实用的设计方法，直接应对这一问题。\n\
  \n在第 6 章和第 8 章中，我将讨论免费精简版在推广付费应用和应用内购买项目方面的优势，但要事优先。现在是时候为你的应用设计奠定基础了。\n\n#### 在苹果的沙盒中遵守规则\n\
  \n违反苹果的 iOS 人机界面指南（通常称为 HIG）是提交的 iPhone 和 iPad 应用被拒绝的最常见原因之一。尽管 App Store 中确实存在一些例外情况——一些被批准的应用违反了某些\
  \ UI 设计规则——但最好尽可能遵守这些指南。\n\n没有充分的理由，就不要去玩火；即使有，你也需要问自己是否真的值得冒这个风险。设计创新可以为应用带来“性感”的视觉吸引力，有助于激发兴趣和促进销售；但在你试图打破太多常规之前，请牢记两个非常重要的因素：\n\
  \n- 如果你的设计违反了太多关键指南，无论它多么酷，苹果都会毫不犹豫地拒绝你的应用。而如果你的应用不在 App Store 中，它就无法赚钱。\n- 苹果的界面指南旨在提供通用的界面控件和架构，这是一个至关重要的目的。熟悉度能大大降低学习曲线，使用户体验更加直观。苹果已在网上发布了这些指南，这是一份宝贵的文档。App\
  \ Store 审核指南明确了开发者应避免的特定应用元素，以帮助加快审核流程。完整列表可在 `http://developer.apple.com/appstore/guidelines.html`\
  \ 查看。\n\n这个方便的在线资源页面提供了指向 App Store 审核指南和 iOS 开发者计划许可协议的链接，如果你认为应用被不公正地拒绝，还可以向应用审核委员会提交申诉。要访问这些链接，你需要先登录\
  \ iOS 开发者计划。\n\n尽管许多开发者对苹果严格控制应用审核流程表示担忧，但这个经过精心策划、专有的销售渠道正是 App Store 最大的优势。通过确保一定的质量水平，App\
  \ Store 成为一个能灌输消费者信心的有吸引力的移动市场，这反过来又有助于销售更多应用——这一策略已被证明极为成功。\n\n归根结底，如果你想在最热门、最赚钱的移动平台上赚钱，你必须记住，你是在苹果的沙盒中玩耍。要想继续游戏，你需要遵守这家公司的规则。你可能不喜欢它的规则，但这是真正的入场代价（除了你的\
  \ iOS 开发者计划费用）。\n\n即使有了公布的指南，也不可能预见所有潜在的拒绝原因（特别是如果出现了新原因），但至少你可以帮自己一个忙，避免那些会让你收到拒绝信的已知问题。在本书中，我将根据所讨论的相关设计和开发主题，重点介绍已知的拒绝原因，但仅凭这些零散的信息是不够的。\n\
  \n以下是所有 iOS 应用开发者必读的一些重要资源：\n\n- *iOS 人机界面指南*：这是 iPhone、iPod touch 和 iPad 应用 UI\
  \ 设计的圣经。显然，我们鼓励你发挥创造力和发明力，但让 HIG 作为你的基础。该在线指南提供了下载便捷 PDF 版本的链接。你也可以在 Xcode 内置的文档浏览器中访问\
  \ HIG。有这么多的查看选项，你真的没有借口——所以去阅读它，拥抱它，实践它！网址是 `https://developer.apple.com/library/ios/documentation/UserExperience/Conceptual/MobileHIG/index.html`。\n\
  - *App Store 审核指南*：你需要登录 iOS 开发者计划才能访问这个直接链接。与 HIG 不同，苹果不提供 App Store 审核指南的 PDF\
  \ 下载。需要注意的是，苹果将这些指南视为“活文档”，会根据需要更新以反映新规则和变化。这并不是说苹果计划为了自己的目的而改变指南，而是新的应用提交必然会引发新问题，需要新的规则和澄清。随着移动格局的发展，苹果的指南也会随之发展。记住这一点，在设计和开发应用时，务必参考本文档的最新在线版本。网址是\
  \ `https://developer.apple.com/appstore/resources/approval/guidelines.html`。\n-\
  \ *应用提交反馈*：这个博客发布了由匿名开发者提交的应用被拒绝的原因报告。这个非授权网站是一个很好的信息来源，尽管苹果的应用审核团队可能不会为其存在而兴奋。访问地址是\
  \ `http://appreview.tumblr.com`。\n\n\n\n### 为多种 iOS 设备设计\n\n在第 2 章中，我强调了在开发应用时拥抱多种\
  \ iOS 设备目标的重要性。设计最适合各种 iOS 设备的应用图标和 UI 元素至关重要。由于大多数 iPhone 和 iPad 都配备了 Retina 显示屏，因此最好针对该屏幕进行优化。\n\
  \n你肯定不希望自己的应用仅与新版本的 iOS 兼容。你希望应用在最新的 iOS 设备上看起来绝对惊艳，从而吸引潜在客户在 App Store 中点击“购买”按钮。实现这一目标的重要一步是为你的应用支持的所有相关\
  \ iOS 目标，在应用中包含尺寸合适的图标和图片，但这意味着什么呢？\n\n请务必清楚你想覆盖哪些设备，以便相应地设计屏幕。为方便快速参考，我列出了设备分辨率：\n\
  \n- iPhone 5s/5c/5（Retina）：640 × 1136 像素\n- iPhone 4s/4（Retina）：640 × 960 像素\n-\
  \ iPhone 3GS 及以下（非 Retina）：320 × 480 像素\n- iPad 5/4/3（Retina）：2048 × 1536 像素\n-\
  \ iPad 2/1（非 Retina）：1024 × 768 像素\n- iPad mini（Retina）：2048 × 1536 像素\n- iPad mini（非\
  \ Retina）：1024 × 768 像素\n\n#### 准备 UI 美术资源\n\n你应用图标的大型 1024 × 1024 像素 App Store\
  \ 版本是少数在所有 iOS 目标上保持一致的图片尺寸之一。其他所有内容都需要不同的尺寸，如 Apple 的 HIG 中所述。iOS 7 为应用图标引入了一个略有不同的尺寸。以下是新要求的摘要：\n\
  \n- **iPhone Retina** (5, 5s, 5c, 4s, 4)\n  - App Store 图标：1024 × 1024 像素\n  - 应用图标：120\
  \ × 120 像素\n  - 聚焦图标：80 × 80 像素\n  - 设置图标：58 × 58 像素\n  - 启动图片：640 × 960 像素\n- **iPad\
  \ Retina** (iPad 3, 4, Air, mini Retina)\n  - App Store 图标：1024 × 1024 像素\n  - 应用图标：152\
  \ × 152 像素\n  - 聚焦图标：80 × 80 像素\n  - 设置图标：58 × 58 像素\n  - 启动图片：2048 × 1536（横向）和\
  \ 1536 × 2048（纵向）\n- **iPad 非 Retina** (1, 2, mini)\n  - App Store 图标：512 × 512\
  \ 像素\n  - 应用图标：76 × 76 像素\n  - 聚焦图标：40 × 40 像素\n  - 设置图标：29 × 29 像素\n  - 启动图片：1024\
  \ × 768（横向）和 768 × 1024（纵向）\n\n最好以 1024 × 1024 尺寸设计应用图标，这样就能轻松创建较小的版本。iPhone 和 iPad\
  \ 的默认启动图片应包含状态栏区域。所有这些都应保存为 PNG 格式。\n\n#### iPad 的方向考虑\n\n由于 iPhone 屏幕较小，提供高效的 UI\
  \ 设计通常需要固定的方向，例如仅支持纵向的应用。这在 iPhone 上完全可以接受，但 iPad 更大的显示屏允许将更多的界面元素整合到单个窗口中，在纵向和横向视图中都提供了足够的屏幕空间。事实上，Apple\
  \ 建议 iPad 应用支持所有方向。\n\n如果你的 iPhone 应用锁定在单一方向，那么在将其移植到 iPad 时，你需要重新考虑设计，以便它能在更大的平板电脑屏幕上适应多种方向。在\
  \ iPad 上，你应该为应用支持的每个方向都包含一个默认启动图片，因为在启动应用前你无法知道用户将如何手持平板电脑。\n\n#### 使用 Retina 显示屏屏幕，乐趣加倍\n\
  \n查看 iPhone 5s Retina 显示屏与旧款 iPhone 型号（iPhone 4 之前的所有 iPhone）之间的各种图标尺寸差异，你会发现 Retina\
  \ 显示屏的宽度和高度都翻倍了。这也适用于所有其他美术资源，例如背景图片。\n\n那么，你的 iPhone 应用如何区分这两种尺寸呢？Apple 为开发者简化了这一过程。如果背景图片命名为\
  \ `background.png`，那么只需将双倍尺寸的 Retina 显示屏版本命名为 `background@2x.png`。这个 `@2x` 标识符应放在相同的文件名之后，但在\
  \ `.png` 文件扩展名之前。在 Retina 显示屏上运行时，你编译好的应用会查找带有 `@2x` 标识符的文件，并相应加载该图片。如果你的应用中不存在\
  \ Retina 显示屏版本，则会显示较低分辨率的图片。\n\n正如我在第 2 章中提到的，不要只是放大你现有的图形，而是将它们保存为更大的 `@2x` 版本。目前使用的大多数设备都是\
  \ Retina 设备，所以务必使用 `@2x` 分辨率，否则会出现明显的像素化。如果你最初使用 Adobe Photoshop 或类似的图形工具以位图格式创建了图片，那么最好的办法是专门为\
  \ Retina 显示屏尺寸重新创建这些图片，以确保界面元素清晰、高分辨率。相信我，完善应用的视觉吸引力，值得你为支持 Apple 的 Retina 显示屏而投入所有额外的设计工作。\n\
  \n只要可能，你应该使用基于矢量的格式（如 Adobe Illustrator）创建图标和 UI 图片，这样你就能灵活地适应 Apple 未来要求的任何新尺寸。这将为你省去重新创建小型位图图片的麻烦。我将在下一节中详细讨论位图和基于矢量的设计，请继续阅读。\n\
  \n#### 为 iOS 8 设计\n\nApple 对 iOS 的最新更新无疑在其设计方向上引入了一个根本性的变化。主要的设计变化发生在 iOS 7，iOS\
  \ 8 仅添加了微小的设计改进。iOS 8 更新的主要重点是添加新功能，包括引入一种新的编程语言（参见“Swift”边栏）。当 iOS 7 更新推出时，它引起了分化，有人拥抱它，也有人讨厌它。自\
  \ 2014 年 2 月 1 日起，Apple 要求任何新应用或应用更新都必须使用 Xcode 5 构建并针对 iOS 7 进行优化。由于 Xcode 6 和\
  \ iOS 8 已经发布，建议使用这些最新工具来准备任何新应用或应用更新。\n\n你可能已经注意到，设计风格已转向“扁平”设计，并且不那么“拟物化”。扁平设计更侧重于体验，减少了阴影和纹理等未必对用户有帮助的多余元素的干扰。*拟物化*是指界面模仿现实中的元素；例如，纸张纹理、展示书籍目录的书架等等。由于\
  \ iOS 6 的界面细节丰富，充满纹理和逼真的对象，并且有时将拟物化推向极端，作为回应，扁平设计运动应运而生。许多人错误地认为拟物化设计的对立面就是扁平设计，而实际上，某些设计可以是扁平的，但仍然模仿现实生活中的某些事物。那么为什么要讨论这个呢？你需要定义的首要事项之一就是应用的方向，这会影响你的设计。考虑到最近的趋势，我觉得扁平设计方法与操作系统和目前推出的应用最为一致。\n\
  \n##### SWIFT\n\n\n\n"
- '# 每年，苹果公司都会在北加州举办全球开发者大会（WWDC）。大会的主题演讲通常是苹果向热切期待的开发者群体介绍新产品和软件的论坛。2014 年的 WWDC
  也不例外——会上宣布了 iOS 8 和新的 Mac OS X 系统 Yosemite。然而，对开发者来说，最重要的发布是苹果的新编程语言，名为 Swift。Swift
  是`Objective-C`的替代品——开发者无需担心他们学习`Objective-C`的努力全都白费了，因为`Objective-C`和 Swift 代码都可以用于开发
  iOS 和 OS X 应用程序。


  苹果将 Swift 描述为“不带 C 的`Objective-C`”。Swift 是一种编译型编程语言，其语法与其他源自 C 的语言（如 C#和 Java）相似。Swift
  用包含代码的`.swift`文件替代了`Objective-C`中的头文件（`.h`和`.m`文件）。在 Swift 中，不需要基于括号的语法和分号来终止语句。Swift
  中的方法以`func`关键字为前缀，类方法则以`class`关键字为前缀。Swift 是一种类型安全的语言，编译器会执行类型检查，在编译时而非运行时捕获任何类型错误。要开始使用
  Swift，请前往 iBooks Store 免费获取苹果公司的《*The Swift Programming Language*》一书。


  #### iOS 8 中的差异


  本节将帮助你熟悉 iOS 7 和 iOS 8 中发生的变化。虽然大多数设计变化是在 iOS 7 中进行的，但本节讨论的是作为最新 iOS 版本的 iOS 8。此外，本节将帮助你理解苹果引入的新设计标准，并告诉你哪些标准已被弃用。


  如果你是在 iOS 7 之前就使用 iPhone 的用户，你自然会知道这种风格与之前的有何不同。现在，让我们讨论一下 iOS 6 和 iOS 8 之间的具体差异，以及这可能如何影响你设计应用的方式。


  计算器应用是展示视觉方向变化的完美例子。图 4-1 左侧是 iOS 6 版本。可以看到它具有非常拟物化的设计风格，模仿了现实生活中的计算器。右侧则可以看到对字体和简洁性的极大强调。其理念不一定是展示你能把东西做得多么漂亮，而是如何专注于通过应用丰富用户的体验。


