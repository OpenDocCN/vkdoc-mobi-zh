  \n在 `viewDidLoad` 中，一个操作按钮被动态添加为导航栏的右侧按钮。由于 `RootViewController` 在 iPhone 和 iPad\
  \ 界面中都是分配给导航控制器的视图，因此这个新操作按钮会同时显示在 iPhone 和 iPad 版本的应用中。\n\n如果用户点击操作按钮，会调用 `showShareOptions`\
  \ 方法。正是在这里，您会显示一个标题为“喜欢这个应用？推荐给朋友！”的 `UIActionSheet`，其中包含邮件、Twitter 和 Facebook 按钮（见图\
  \ 5-4）。作为 `UIActionSheetDelegate`，当用户从操作列表中选择一个选项时，`RootViewController` 会收到通知。用户的选择会通过操作列表的\
  \ `didDismissWithButtonIndex` 事件进行捕获。\n\n![9781430262381_Fig05-04.jpg](img/9781430262381_Fig05-04.jpg)\n\
  \n图 5-4。在 iPhone 上运行的“推荐给朋友”示例应用\n\n在 iPad 上运行该应用时，您会注意到 `UIActionSheet` 会以 iPad\
  \ 专属的弹出窗口形式显示（见图 5-5）。系统会忽略“稍后再说”（取消）按钮，因为点击弹出窗口外的任意位置即可关闭弹出窗口。\n\n![9781430262381_Fig05-05.jpg](img/9781430262381_Fig05-05.jpg)\n\
  \n图 5-5。在 iPad 上运行的同一个“推荐给朋友”示例应用\n\n点击“发送邮件”、“发布到 Twitter”或“分享到 Facebook”按钮目前没有任何反应，只会关闭\
  \ `UIActionSheet`，这是因为您尚未添加相关功能。接下来进入下一步……\n\n### 添加邮件支持\n\n“推荐给朋友”应用的基本框架搭建完成后，现在需要为“发送邮件”按钮添加功能。iOS\
  \ SDK 包含对应用内邮件功能的框架支持，允许用户直接在您的应用内撰写和发送邮件！苹果公司让开发者可以相对轻松地实现应用内邮件功能，因此添加此功能所需的精力比您想象的要少得多。\n\
  \n在编写任何代码之前，必须先将所需的 MessageUI 框架添加到 Xcode 项目中。要添加它，请按住 Ctrl 键点击项目的 `Frameworks`\
  \ 文件夹，在出现的上下文菜单中选择“添加”→“现有框架”（见图 5-6）。从出现的列表中选择 `MessageUI.framework`。\n\n![9781430262381_Fig05-06.jpg](img/9781430262381_Fig05-06.jpg)\n\
  \n图 5-6。要添加新框架，请从上下文菜单的“添加”子菜单中选择“现有框架”，然后从出现的列表中选择 `MessageUI.framework`\n\n一旦将\
  \ `MessageUI` 框架包含到项目中，您就可以着手编程了。打开 `RootViewController.h` 头文件，将代码修改如下：\n\n```\n\
  #import <UIKit/UIKit.h>\n#import <MessageUI/MessageUI.h>\n#import <MessageUI/MFMailComposeViewController.h>\n\
  \n@interface RootViewController : UIViewController <UIActionSheetDelegate, MFMailComposeViewControllerDelegate>\
  \ {\n\n}\n\n- (IBAction)showShareOptions:(id)sender;\n- (void)showMailComposer;\n\
  \n@end\n```\n\n从以粗体高亮显示的新代码元素可以看出，已导入 MessageUI 框架类，在 `@interface` 中新增了一个邮件委托，并且引用了一个\
  \ `showMailComposer` 函数。保存该文件。\n\n现在打开 `RootViewController.m` 实现文件，在不更改现有代码的情况下，添加以下两个方法：\n\
  \n```\n// 在应用内显示邮件撰写界面\n// 并填充所有邮件字段。\n- (void)showMailComposer {\n\nClass mailClass\
  \ = (NSClassFromString(@\"MFMailComposeViewController\"));\n    if (mailClass !=\
  \ nil) {\n        // 测试以确保设备已配置为可发送邮件。\n        if ([mailClass canSendMail]) {\n\
  \nMFMailComposeViewController *picker = [[MFMailComposeViewController alloc] init];\n\
  \            picker.mailComposeDelegate = self;\n\n[picker setSubject:@\"看看这个很酷的新应用！\"\
  ];\n\n// 填充邮件正文\n            NSString *emailBody = @\"来看看这个适用于 iPhone、iPad 和 iPod\
  \ touch 的酷炫新应用——现在已在 App Store 上线！\\n\\n 面包屑 - 停车位置记录器\\n\\n 观看视频并了解更多信息，请访问：\\\
  nhttp://www.breadcrumbsapp.com/\";\n            [picker setMessageBody:emailBody\
  \ isHTML:NO];\n\n[self presentModalViewController:picker animated:YES];\n      \
  \      [picker release];\n\n} else {\n            // 设备未配置为可发送邮件，通知用户。\n       \
  \     UIAlertView *alertView = [[UIAlertView alloc] initWithTitle:@\"无法发送邮件\" message:@\"\
  此设备尚未配置为可发送邮件。\" delegate:self cancelButtonTitle:@\"好的，稍后再试\" otherButtonTitles:nil];\n\
  \            [alertView show];\n            [alertView release];\n        }\n  \
  \  }\n}\n\n// 当用户点击“取消”或“发送”时关闭邮件撰写界面。\n- (void)mailComposeController:(MFMailComposeViewController*)controller\
  \ didFinishWithResult:(MFMailComposeResult)result error:(NSError*)error\n{\n   \
  \ NSString *resultTitle = nil;\n    NSString *resultMsg = nil;\n```\n\n\n\n`switch\
  \ (result)`\n```\n{\n    case MFMailComposeResultCancelled:\n        resultTitle\
  \ = @\"邮件已取消\";\n        resultMsg = @\"您已选择取消发送邮件\";\n        break;\n    case\
  \ MFMailComposeResultSaved:\n        resultTitle = @\"邮件已保存\";\n        resultMsg\
  \ = @\"您已将邮件保存为草稿\";\n        break;\n    case MFMailComposeResultSent:\n      \
  \  resultTitle = @\"邮件已发送\";\n        resultMsg = @\"您的邮件已成功发送\";\n        break;\n\
  \    case MFMailComposeResultFailed:\n        resultTitle = @\"邮件发送失败\";\n     \
  \   resultMsg = @\"抱歉，邮件编写器出现故障。请重试。\";\n        break;\n    default:\n        resultTitle\
  \ = @\"邮件未发送\";\n        resultMsg = @\"抱歉，发生错误。您的邮件无法发送。\";\n        break;\n}\n\
  ```\n\n```\n// 通过警告视图通知用户收到的任何邮件编写器错误。\nUIAlertView *mailAlertView = [[UIAlertView\
  \ alloc] initWithTitle:resultTitle message:resultMsg delegate:self cancelButtonTitle:@\"\
  好的\" otherButtonTitles:nil];\n[mailAlertView show];\n[mailAlertView release];\n\
  [resultTitle release];\n[resultMsg release];\n[self dismissModalViewControllerAnimated:YES];\n\
  ```\n\n让我们逐步分析这段新代码，以便你准确了解其运行机制。`showMailComposer` 函数负责完成撰写邮件并显示在新嵌入的 `MFMailComposeViewController`\
  \ 中的所有繁重工作。在此示例中，邮件内容为告知朋友查看 App Store 中的虚构应用 Breadcrumbs，并且还包含一个指向官方网站的链接。为用户提供所有这些内容使得分享变得极其方便和简单。用户只需在“收件人”字段中输入朋友的电子邮件地址，然后轻点“发送”按钮即可（请参阅插图\
  \ 5-7）。\n\n![9781430262381_Fig05-07.jpg](img/9781430262381_Fig05-07.jpg)\n\n插图 5-7。当用户轻点“发送电子邮件”按钮时，邮件编写器将显示在应用内\n\
  \n继续向下看，`showMailComposer` 方法的下方是 `mailComposeController` 事件，当用户按下 `MFMailComposeViewController`\
  \ 的“取消”或“发送”按钮时，系统会调用该事件。这是添加代码以通知用户其邮件操作状态的地方。从列出的代码可以看出，你可以测试接收到的结果以获取邮件的状态，然后向用户报告邮件已成功送达，或者由于某种原因发送失败。\n\
  \n**提示** 经常向用户提供状态更新是一个好习惯，尤其是在通过在线连接发送数据时。如果用户点击“发送”按钮后，`MFMailComposeViewController`\
  \ 在没有进一步通信的情况下被关闭，用户就会一直等待，并疑惑邮件是否已送达。在示例 `mailComposerController` 事件中，如果收到的结果表示成功送达，则通过\
  \ `UIAlertView` 通知用户。如果邮件无法发送，也会通知用户。在你为避免 App Store 中出现负面客户评价而不懈努力的过程中，传达邮件操作的当前状态将有助于防止用户感到沮丧。\n\
  \n最后一部分是让“发送电子邮件”按钮在被点击时调用 `showMailComposer` 方法。通过在操作表的 `didDismissWithButtonIndex`\
  \ 事件中添加一行代码即可轻松实现（请参阅以粗体突出显示的代码）：\n\n```\n- (void)actionSheet:(UIActionSheet *)actionSheet\
  \ didDismissWithButtonIndex:(NSInteger)buttonIndex {\n    if (buttonIndex != [actionSheet\
  \ cancelButtonIndex]) {\n        if (buttonIndex == 0) {\n            // 应用内邮件，需要\
  \ iOS 3.0 或更高版本\n            [self showMailComposer];\n        }\n        if (buttonIndex\
  \ == 1) {\n            // 在此处添加 Twitter 代码。\n        }\n        if (buttonIndex\
  \ == 2) {\n            // 在此处添加 Facebook 代码。\n        }\n    }\n}\n```\n\n在 iOS\
  \ 模拟器中运行 `TellAFriend` 项目时，应用会报告你的邮件已成功发送，但实际上它并不会真正发送你的消息。为了获得最佳效果，请在至少已在“邮件”应用中设置一个电子邮件帐户的实际\
  \ iOS 设备上测试你的应用内邮件代码。\n\n就是这样！与你获得的功能相比，为应用添加应用内邮件支持实际上只需要很少的代码行。\n\n### 集成 Twitter\
  \ 和 Facebook\n\n除了发送邮件，你可能还想让用户能够将消息发布到他们的 Twitter 和 Facebook 帐户。虽然用户直接推广你的应用是好事，但另一种更微妙的方式来提高应用的知名度，是将社交网络与你的应用的其他核心功能深度集成。例如，如果你正在构建一个游戏，让用户能够通过\
  \ Twitter 和 Facebook 分享他们的高分，不仅能在玩家之间产生协同效应，还可能吸引想要参与其中的新客户。Lima Sky 的 Doodle Jump\
  \ 包含一个无缝的用户选项，用于通过 Twitter 和 Facebook 分享高分（请参阅插图 5-8）。\n\n![9781430262381_Fig05-08.jpg](img/9781430262381_Fig05-08.jpg)\n\
  \n插图 5-8。在 Lima Sky 的 Doodle Jump 中完成一局游戏后，会提示用户通过 Twitter 和 Facebook 分享他们的高分\n\n\
  发布的消息内容如下：“我刚刚在 #DoodleJump 中达到了 5,529 分！！！来超越我吧！ `http://bit.ly/DoodleJump-App`。”\n\
  \n除了炫耀你的高分，它还向任何认为自己能超越的人发起挑战，并附上 Doodle Jump 在 App Store 中的便捷链接。这是一个很好的方式，让你的客户在忙于与朋友分享高分时，帮助推广和销售更多的游戏副本！\n\
  \n社区建设的一个更全面的扩展是集成当前可用于 iOS 游戏的众多社交游戏平台之一，正如本章后面所讨论的那样。现在，我们先来看看 Twitter 和 Facebook。\n\
  \n在构建像上面那样的预填充推文时，请确保使用合适的主题标签和好的 URL 跟踪器，例如 `goo.gl`。这将显示点击链接的人数，你就能看到你的用户为你推广应用的效果如何。与此同时，使用好的主题标签有助于新用户通过浏览标签来发现你的应用。\n\
  \n#### 访问 Twitter 的 API\n\n社交框架在 iOS 5 中引入，并在 iOS 6 中进行了扩展，允许你仅用几行代码集成 Twitter 和\
  \ Facebook。\n\n请查看此链接以获取更多信息：`https://dev.twitter.com/docs/ios`。\n\nTwitter API\
  \ 通过 OAuth 执行身份验证，这使 Twitter 能够知道已发布推文的来源。如果你希望推文的来源归属显示为“来自 [*我的应用名称*]”，则需要向 Twitter\
  \ 注册你的应用。已注册的应用会获得一个唯一的 API 密钥和秘密令牌，以便在向 Twitter 发布内容时正确标识自己。\n\n在 `http://dev.twitter.com/apps/new`\
  \ 向 Twitter 注册你的应用。\n\n#### 使用适用于 iOS 的 Facebook SDK\n\n与我们讨论过的 Twitter 集成方式类似，Facebook\
  \ 也有一个非常相似的方法，可以使用社交框架进行简单的帖子发布。如果你想深入探索更多功能，Facebook SDK 是你的首选工具。\n\n\n好的，作为高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\nFacebook 允许 iOS 开发者使用其开源 Objective-C 软件开发套件（SDK）来访问其平台，该 SDK 可从 `http://github.com/facebook/facebook-ios-sdk`\
  \ 获取。能够访问你的好友列表及其个人资料信息，并实时与他们连接，可将 Facebook 平台的全部能力引入你的 iOS 应用。\n\n仅仅为了让用户向他们的\
  \ Facebook 页面发布状态更新，就将如此庞大的框架集成到你的 Xcode 项目中，或许显得有些大材小用。但如果你正在开发一款 iOS 游戏或任何类型的点对点社区应用，你很快就会发现自己在项目的其他部分也需要使用更多的\
  \ Facebook 功能。\n\n在你的 iOS 应用中使用 Facebook SDK 之前，需要获取一个 API 密钥和一个密钥令牌，以便对你的 Facebook\
  \ 请求进行身份验证。这要求你拥有一个自己的有效 Facebook 账户。登录你的账户后，访问 Facebook 开发者创建应用页面（`http://www.facebook.com/developers/createapp.php`）并注册你的应用。\n\
  \n在设置新的 Facebook 应用时，请务必为其赋予与你正在构建的 iOS 应用相同的名称，因为当用户从你的 iOS 应用发布状态更新时，该应用名称将作为来源列出。与应该向\
  \ Twitter 注册你的应用同理，这是一种巧妙但有效的方式，可以让你的应用名称显示在用户的 Facebook 页面上——这对你的应用来说是极好的曝光机会。\n\
  \n一旦你的新 Facebook 应用在 Facebook 开发者网站上创建完成，该应用的资料页将会列出你唯一的 API 密钥和密钥令牌。请将这两个文本字符串保存在安全的地方，因为在你自己的\
  \ iOS 应用中定制 Facebook 代码时会用到它们。\n\n**应用拒绝警告** 你的应用必须在在线连接尝试失败时通知用户。如果你的应用依赖于与第三方网络服务的连接，你必须包含适当的错误处理代码，以便在连接或数据请求失败时，你的应用能优雅地处理故障并通知用户当前状态。如果错误的数据请求导致你的应用冻结，或者让用户等待却没有任何状态提示，App\
  \ Store 审核团队很可能会拒绝你的提交。如果你为审核过程提供了一个演示账户，请确保该演示账户能正常工作！或者提供两个演示账户，以防其中一个在审核期间出现故障。同样，一个良好的实践是，始终在应用需要在线连接时通知用户，尤其是考虑到\
  \ iPad 和 iPod touch 设备可能并不总是连接到 Wi-Fi 网络。\n\n现在，你已经准备好将社交网络集成到你自己的 iOS 应用中了！请参照\
  \ `MGTwitterEngine` 和 Facebook iOS SDK 附带的文档和示例代码，看看能否在现有的 Tell A Friend 示例项目中添加对发布到\
  \ Twitter 和 Facebook 的支持。我相信你很快就能让它跑起来！\n\n### 使用 ShareKit\n\n如果你觉得深入研究 `MGTwitterEngine`\
  \ 和 Facebook iOS SDK 过于复杂或耗时，那么你很幸运。备受尊敬的开发者 Nate Weiner 制作了一个交钥匙式的开源类库，名为 `ShareKit`，它支持一系列服务，例如电子邮件、Twitter、Facebook、Delicious、Google\
  \ Reader、Tumblr、Pinboard、Instapaper 和 Read It Later。除了分享 URL，`ShareKit` 还支持分享图片、文本和文件。因为它是开源的，其用户界面是可定制的，并且任何人都可以随时向\
  \ `ShareKit` 添加服务。从 `http://www.getsharekit.com/` 下载 `ShareKit`。\n\n既然你已经创建了 Tell\
  \ A Friend 示例项目，让我们逐步完成将 `ShareKit` 添加到项目的过程（或者你可以从本书的配套代码示例中打开已经完成的 Tell A Friend\
  \ with ShareKit 项目）。你需要将项目的基础 SDK 设置为 iOS 4 或更高版本。由于这是一个通用应用，通过将项目的 iOS 部署目标设置为\
  \ iOS 3.2，仍然可以支持运行 iOS 3.2 的 iPad。\n\n下载 `ShareKit` 后，在 Xcode 中打开 `ShareKit` 示例项目，并将其\
  \ `ShareKit` 文件夹（位于 `Classes` 组内）拖入你打开的 Xcode 项目。当提示时，请确保勾选“将项目复制到目标组文件夹（如果需要）”。`ShareKit`\
  \ 还需要一些额外的 Apple 框架。你应该已经从之前的应用内邮件示例中包含了 `MessageUI` 框架。使用相同的方法，添加 `SystemConfiguration`\
  \ 和 `Security` 框架。完成后，你的项目的 Groups & Files 列表应类似于图 5-9 所示。\n\n![9781430262381_Fig05-09.jpg](img/9781430262381_Fig05-09.jpg)\n\
  \n图 5-9. 向你的项目添加所需的框架和 ShareKit 类\n\n在前面的章节中，我提到需要向 Twitter 和 Facebook 注册你的应用，以获取\
  \ API 密钥和密钥令牌。使用现成的 `ShareKit` 并不能免除你这两项任务。你需要将这些唯一的 API 密钥存储在 `ShareKit` 的 `SHKConfig.h`\
  \ 文件中。Nate 已在该文件中以代码注释的形式包含了详细的说明，使得这一步尽可能易于遵循。\n\n最后但同样重要的是，从项目的操作按钮调用 `ShareKit`。为此，打开\
  \ `RootViewController.m` 文件，并在顶部添加以下代码行，以导入 `ShareKit` 的头文件：\n\n```\n#import \"\
  SHK.h\"\n```\n\n接下来，删除 `showShareOptions` 方法中的现有代码，并将其替换为以下新代码（以粗体显示）。这将分配要发布的文本和\
  \ URL，并启动 `ShareKit` 的自定义操作表。\n\n```\n- (IBAction)showShareOptions:(id)sender {\n\
  \    // Action button was tapped, so launch ShareKit.\n\n    // Create the item\
  \ to share (in this example, a url)\n    NSURL *url = [NSURL URLWithString:@\"http://breadcrumbsapp.com/\"\
  ];\n    SHKItem *item = [SHKItem URL:url title:@\"Check out Breadcrumbs, the new\
  \ parked car locator app for iPhone and iPad!\"];\n\n    // Get the ShareKit action\
  \ sheet\n    SHKActionSheet *actionSheet = [SHKActionSheet actionSheetForItem:item];\n\
  \n    // Display the action sheet\n    [actionSheet showFromToolbar:self.navigationController.toolbar];\n\
  }\n```\n\n既然所有工作都由 `ShareKit` 来完成，你就不再需要之前添加的任何用于处理 `UIActionSheet` 和应用内邮件的代码。现在可以从\
  \ `RootViewController` 类中安全地移除所有这些未使用的代码。当运行 Tell A Friend 应用时，你不再看到原始的 `UIActionSheet`\
  \ 实现，而应看到 `ShareKit` 的自定义操作表（见图 5-10）。\n\n![9781430262381_Fig05-10.jpg](img/9781430262381_Fig05-10.jpg)\n\
  \n图 5-10. 将 Tell A Friend 应用配置为使用 ShareKit 后，你应该能够将数据发布到 Facebook 和其他几个社交网络服务\n\n\
  **提示** 当你阅读本书时，可能会有更新版本的 `ShareKit` 可用。由于 `ShareKit` 持续不断地增加新功能和服务，我强烈建议你从其官方网站（`http://www.getsharekit.com/`）下载最新版本的\
  \ `ShareKit`，并在你计划提交到 App Store 的应用中使用它。与此同时，不妨给 Nate Weiner 发一封电子邮件，感谢他出色的开源贡献，并告诉他你的哪些应用使用了\
  \ `ShareKit`。\n\n### 人多力量大：通过应用内交叉推广建立协同效应\n\n\n\n#### 应用内交叉推广的成功之道\n\nOptime Software\
  \ 旗下应用成功的一个重要因素，便是其对应用内交叉推广的大量运用。当用户启动 Optime 的一款免费广告支持型应用时，一个启动画面会短暂出现。在用户等待应用加载的过程中，启动画面不仅会推广当前免费应用的高级版本，还会列出\
  \ Optime 的其他几款免费应用（见图 5-11）。列出的每个应用都是一个实时链接。点击该应用名称，便会跳转到 App Store 中相应的页面，以便用户了解详情并进行下载。\n\
  \n![9781430262381_Fig05-11.jpg](img/9781430262381_Fig05-11.jpg)\n\n图 5-11. Optime\
  \ Software 免费应用的启动画面有效地交叉推广了其其他应用\n\n虽然 Optime Software 通过在应用内广告网络中交叉推广其应用，使销售额增长了四到五倍（这将在第\
  \ 7 章中探讨），但其自身的应用内交叉推广也被证明是提升现有用户对其所有免费应用认知度的宝贵方法。下载量越多，公司最终从广告收入和高级应用销售中获得的收益就越多。\n\
  \n“启动画面交叉推广对我们来说是一种非常有效的工具，” Optime Software 的创始人兼 CEO Jon Schlegel 表示。“我们会追踪启动画面广告的点击率，但不会追踪转化率。我们某些启动画面广告的点击率高达\
  \ 10%。不过，启动画面广告的点击率往往会随着时间的推移而下降，因为普通用户会逐渐适应这些广告并开始忽略它们。我们正在研究如何让启动画面广告更具动态性，以提高其效果。”\n\
  \n**应用被拒警告**   尽管苹果的 iOS 人机交互指南（HIG）表示不赞同使用启动画面做广告，但在 App Store 的无数应用中，这种做法似乎很普遍。然而，当你通过\
  \ iTunes Connect 提交应用时，如果因为启动画面而被拒，那就说明你的做法有些过头了。如果你确实在应用中使用了启动画面，那么在提交之前，请确保它不会在屏幕上停留过长时间，并且不要进行过于直白生硬的推销。由于启动画面处于审核流程中那个神秘的灰色地带，因此，在设计启动画面作为交叉推广工具时，务必小心谨慎，使其在视觉上保持有效的同时，又不会过于引人注目。\n\
  \n许多游戏发行商选择了另一种方法，即在应用的主屏幕上放置一个“更多游戏”按钮。在某些应用中，点击“更多游戏”按钮会在移动版 Safari 中打开发行商的网站。这会让用户离开他们正在玩的游戏，这绝非最佳体验。\n\
  \n#### 开店设铺\n\n为了让用户更沉浸于应用之中，NimbleBit 选择在其游戏中嵌入自定义的“应用商店”。点击其应用中的“更多游戏”按钮，会显示 NimbleStore\
  \ 屏幕，该屏幕会交叉推广其所有可用的应用（见图 5-12）。点击 NimbleStore 屏幕上的应用图标，不会自动将用户重定向到 App Store 中的相应页面，而是会显示该应用的一个嵌入式自定义屏幕。这使得\
  \ NimbleBit 能够定制其增强版的销售宣传，并提供指向其 App Store 页面的链接。\n\n![9781430262381_Fig05-12.jpg](img/9781430262381_Fig05-12.jpg)\n\
  \n图 5-12. 在 NimbleBit 的游戏中点击“更多游戏”按钮，会显示其嵌入式的 NimbleStore，该商店通过视频预告片等素材交叉推广其全部应用目录\n\
  \n嵌入式 NimbleStore 的精妙之处在于它是一个托管在`UIWebView`中的远程迷你站点。这不仅允许 NimbleBit 修改位于`http://m.nimblebit.com/`的\
  \ NimbleStore 页面，而无需更新 iPhone 和 iPad 游戏本身，还让公司能够使用 Google Analytics 追踪用户正在访问哪些商店页面。根据\
  \ NimbleBit 的统计数据，大约 85% 访问其应用内 NimbleStore 的用户会继续浏览某个特定的游戏页面。仅在最初的九个月内，NimbleStore\
  \ 就获得了略高于 160 万的页面浏览量，并促成了 13,170 份游戏销售！\n\n远程托管的 NimbleStore 使 NimbleBit 能够根据地区和限时优惠动态调整定价。苹果倾向于拒绝那些显示应用定价的应用，所以我不确定\
  \ NimbleBit 是如何逃脱这一特定限制的（除非远程托管页面是其中的区别）。因此，为了安全起见，你在自己的应用内交叉推广中可能不应列出价格。\n\n当用户选择从\
  \ NimbleStore 购买应用时，点击“App Store”按钮会将用户引导至 iTunes App Store 完成购买。正如任何聪明的 iOS 开发者都会设置的那样，所有重定向到\
  \ App Store 的链接都是 iTunes 联盟链接，因此，每当用户购买 NimbleStore 中列出的任何游戏时，NimbleBit 都能获得联盟佣金。iTunes\
  \ 联盟计划还使 NimbleBit 能够追踪所赚取的佣金，从而报告通过 NimbleStore 引导购买的游戏总数。\n\nNimbleStore 中列出的“我们喜爱的应用”游戏（如\
  \ Harbor Master）并非 NimbleBit 的游戏。虽然这些特定的购买不会给 NimbleBit 带来 App Store 的版税，但能为公司赚取联盟佣金。因此，如果你的应用数量不足以填充你自己的嵌入式迷你商店，你总是可以列出一些来自其他发行商的你最喜欢的应用。你既支持了同行开发者，又能从推荐中获得一点收益。你将在第\
  \ 6 章中了解更多关于 iTunes 联盟计划的信息。\n\n如果你只有少数几个应用，并且更愿意将交叉推广努力局限于精简版应用的“关于”屏幕（你目前在那里向上销售付费版本），那么请注意不要过分稀释你的营销信息。如果鼓励用户升级到付费版本是你的首要任务，请确保同一屏幕上关于你其他应用的任何提及都不会抢了付费版本销售宣传的风头。\n\
  \n#### 联合则兴\n\n如果你喜欢在应用中集成自己的迷你商店以交叉推广其他应用的想法，但又没有足够多的应用来填充它，那么可以考虑与少数几位同行开发者合作。当多个开发者在其所有应用中集成一个共享的“社区”商店时，你将从一个内容丰富的店面中受益。同时，你还能获得增强的协同效应，不仅在你自己的应用内，还能在这个社区网络的所有其他应用中进行交叉推广。这对所有参与的开发者来说都是一个双赢的局面。\n\
  \n这正是几位独立的 iOS 游戏开发者联合起来组建 App Treasures 时想要实现的策略。最初参与 App Treasures 的开发者包括 The\
  \ Blimp Pilots (Koi Pond)、Imangi Studios (Harbor Master)、Snappy Touch (Flower Garden)、Streaming\
  \ Colour Studios (LandFormer) 和 Veiled Games (Up There)。他们将 App Treasures 这个标签定位为消费者可以信赖的质量保证。如果玩家喜欢其中一款游戏，他们很可能也会喜欢\
  \ App Treasures 家族中的其他游戏。\n\n\n\n`App Treasures`可从所有参与游戏的“更多游戏”按钮中访问，它是一个嵌入式视图，用于展示这些开发商的应用程序。如\
  \ iPad 版`Harbor Master HD`中所示（参见图 5-13），在“更多游戏”屏幕上，`App Treasures`按钮与`Imangi Studios`推广的应用程序并列显示。\n\
  \n![9781430262381_Fig05-13.jpg](img/9781430262381_Fig05-13.jpg)\n\n图 5-13：在任何参与开发者的应用中探索“更多游戏”部分，以访问交叉推广的`App\
  \ Treasures`屏幕。\n\n由于应用商店的游戏类别通常由`Electronic Arts`和`Gameloft`等大型游戏发行商主导，小型独立开发者认为他们更难获得同等程度的曝光度。`Imangi\
  \ Studios`的首席执行官`Keith Shepherd`表示，`App Treasures`“是我们整合资源、成为更大玩家的方式，同时保持我们的独立性，且没有与发行商合作所带来的任何弊端和附加条件。”\n\
  \n这种共享式交叉推广网络的价值在于，当某个合作伙伴的应用成功时，其他合作伙伴也能从曝光度的提升中受益。当`Harbor Master`迅速攀升至应用商店前 25\
  \ 名时，嵌入式`App Treasures`屏幕每天多达 10,000 次浏览，这导致其他列出的`App Treasures`游戏销量激增。\n\n如果你觉得在应用网络中交叉推广自己的游戏这个概念很有吸引力，但你并不认识其他开发者，或者没有时间构建自己的应用内迷你商店，那么有一些第三方解决方案可用。其中一种替代方案是`PlayHaven`，这是一项免费的移动推广服务，它提供现成的、嵌入式应用目录，其外观和功能与`NimbleBit`和`App\
  \ Treasures`使用的自定义目录相似。你可以通过`http://www.playhaven.com/`注册`PlayHaven`。\n\n使用`PlayHaven`的好处是，随着越来越多的应用开发者加入这项免费服务，网络不断壮大，发现你列出的游戏的潜在受众群体也会越来越大。当一些参与游戏成为畅销品时，比如`The\
  \ Playforge`的`Zombie Farm`，尤其如此。这些热门作品极大地增加了点击“更多游戏”按钮、浏览`PlayHaven`网络以及查看一些不太知名游戏的用户数量（参见图\
  \ 5-14）。\n\n![9781430262381_Fig05-14.jpg](img/9781430262381_Fig05-14.jpg)\n\n图 5-14：`PlayHaven`提供免费的应用内交叉推广服务，让你的游戏在其整个参与应用网络中获得曝光。\n\
  \n对于游戏开发者而言，另一个用于应用内交叉推广和提升应用发现度的绝佳解决方案是将众多第三方社交游戏平台（如`OpenFeint`和苹果的`Game Center`）集成到你的游戏中。请继续阅读……\n\
  \n### 让你的用户借助第三方社交游戏平台互动起来\n\n如果你是游戏开发者，你很可能熟悉适用于 iOS 的社交游戏平台，例如`OpenFeint`、`Scoreloop`、`Plus+`以及苹果自己的`Game\
  \ Center`。使用这些平台之一的明显好处是，它们提供了现成的托管服务——比如高分排行榜、多人游戏连接和社交挑战——这减轻了你自行编写这些复杂功能代码的需求。通过将第三方社交平台集成到你的\
  \ iPhone 和 iPad 游戏中，你可能会节省数百小时的编程时间。这似乎是一件轻而易举的事，尤其是大多数这些平台都可以免费使用。\n\n#### 热情是会传染的\n\
  \n一些开发者没有意识到的是，许多社交游戏平台也提供了提升应用发现度的强大环境。使用同一社交平台的游戏越多，它们就越能共同受益于该平台固有的交叉推广协同效应。除了它们大多支持\
  \ Twitter 和 Facebook 之外，有些还提供“虚拟大厅”，用户可以看到其他人在玩什么游戏，以及哪些游戏与该平台相连。这些领域中当前流行内容的巨大影响力有助于推动新的应用销售，因为感兴趣的用户想要参与其中。\n\
  \n“如果朋友让你看一部电影或听一首歌，你很可能会基于朋友的推荐去购买那部电影或那首歌。这就是 Facebook 应用平台如此成功的原因，也是构建`OpenFeint`的基本原则之一，”`Aurora\
  \ Feint`的创始人兼首席执行官`Jason Citron`说道。“`OpenFeint`提供类似`Xbox Live`风格的托管游戏服务，如多人游戏、排行榜、挑战、聊天、成就等，当玩家与之互动时，就会产生交叉推广事件。因此，例如，通过使用`OpenFeint`为你的游戏添加成就和排行榜，你将卖出更多游戏。需要指出的是，这并非空洞的推销话术——我们今天看到这种情况发生在数百万玩家和数百款游戏中。听起来可能有点离谱，但你做的工作更少，你的玩家更开心，你卖出更多游戏，而苹果会支付我们联盟佣金，所以你无需为此付费。”\n\
  \n事实上，应用发现是这些社交环境中一个非常强大的组成部分，以至于运营这些免费平台的公司正通过收取 iTunes 联盟佣金来实现其服务的货币化。`Aurora\
  \ Feint`的`OpenFeint`和`ngmoco`的`Plus+`在其应用中内置了突出的游戏目录，推广各自网络上所有参与的游戏（参见图 5-15）。`OpenFeint`甚至正在尝试为开发者提供额外的推广机会，例如其“每日免费游戏”功能。\n\
  \n![9781430262381_Fig05-15.jpg](img/9781430262381_Fig05-15.jpg)\n\n图 5-15：除了众多社交功能外，`Aurora\
  \ Feint`的`OpenFeint`（左）和`ngmoco`的`Plus+`（右）为游戏开发者提供了极具吸引力的交叉推广机会，使用户能够看到其他人在玩什么，甚至购买列出的游戏以加入其中。\n\
  \n#### 选择社交游戏平台\n\n那么，哪个社交游戏平台适合你的游戏呢？在选择平台时，有两个主要因素需要考虑：\n\n*   被更多高知名度畅销游戏采用的平台将吸引更广泛的受众。聚集在一个在线社区中的玩家越多，你的应用获得的曝光度就越高。\n\
  *   尽管应用发现无疑是一个至关重要的组成部分，但你的首要任务应该是选择最适合你应用特定玩法的平台。它需要让你的游戏变得更有趣，而不是更复杂或更令人沮丧。如果你的玩家玩得很开心，这种热情会体现在在线社交社区中，进而推动额外的销量。\n\
  \n随着苹果`Game Center`内置到 iOS 4.1（及更高版本）中，许多第三方社交游戏平台迅速适应，引入了新功能，使其超越了`Game Center`当前的基本功能集。事实上，像`OpenFeint`这样的平台已经通过提供深度兼容性来拥抱`Game\
  \ Center`。`OpenFeint`的策略是，通过让开发者能够混合搭配`OpenFeint`和`Game Center`的最佳功能，最终结果对`OpenFeint`及其庞大的现有游戏玩家用户群来说是双赢的。\n\
  \n\n\n# 排版后\n\n由于 Game Center 已深度集成到 iOS 中，并且苹果正通过特殊徽章和精选推荐，大力推广 App Store 中支持 Game\
  \ Center 的应用，因此为你的游戏添加 Game Center 支持应是明智之举。但 Game Center 毕竟是后来者。它比某些竞争对手的功能更少，且尚未积累起像流行的\
  \ OpenFeint 等现有网络那样庞大的用户群。许多开发者正在集成对 Game Center 和 OpenFeint 的双重支持，以便他们的应用能提供更全面的社交游戏功能，并触达尽可能广泛的玩家群体。\n\
  \n如果你是一名 iOS 游戏开发者，我强烈建议你探索所有社交游戏平台的网站和易用的 SDK，以找到最适合你特定开发和营销需求的平台。可以从以下列表开始：\n\n\
  * 苹果面向开发者的 Game Center（`https://developer.apple.com/devcenter/ios/gamecenter/`）\n\
  * OpenFeint（`http://openfeint.com/`）\n* Scoreloop（`http://scoreloop.com/`）\n* AGON\
  \ Online（`http://developer.agon-online.com/`）\n* ngmoco 的 Plus+（`http://plusplus.com/`）\n\
  * Chillingo 的 Crystal SDK（`http://www.crystalsdk.com/`）\n\n### 赢得你的荣誉\n\n本章和前一章涵盖了众多主题，你甚至动手尝试了一些代码（是的，我想你会喜欢这一点）。我之前说过，我们讨论的将不仅仅是研究和营销概念。\n\
  \n在完成了这么多内容之后，你绝对值得表扬自己一番，并理应得到一次休息。那么，去放松一下，畅玩几关你最喜欢的 iOS 游戏吧。\n\n当你准备好学习更多内容时，只需翻到下一页，进入下一章。\n\
  \n## 第 6 章：免费午餐：免费的价值\n\n与传统的桌面软件世界不同，App Store 目前不允许提供限时或功能受限的试用版。为了绕过这一限制，许多开发者提供了通过应用内购买支持的“免费增值”模式，或推出应用的免费“精简版”，希望用户能购买应用内内容或单独的付费版，以获取高级功能。在本章中，你将学习何时以及如何利用免费的力量来获得有效成果，以及如何挖掘联盟计划带来的额外收入机会。\n\
  \n### 从免费应用中创收\n\n在第 4 章中，你探讨了设计引人注目的应用图标和优雅用户界面的价值，这有助于让应用在 App Store 中更具视觉吸引力。但一旦你吸引了人们的注意力，你的截图是否足以说服他们购买你的应用？不要以为你的应用仅售\
  \ 99 美分，所有人就会自动购买。排行榜前 25 名的应用大多售价 99 美分，那么消费者为何要选择你的应用，而不是其他数千款价格相同的应用呢？不幸的是，当前的\
  \ App Store 生态系统的定价观念非常扭曲，每个人都竞相降价以冲进前 100 名。\n\n那么，开发者该怎么办？别忘了前几章的重要教训：你的应用本身就是强大的营销工具。让我们通过免费向消费者提供一些东西，将这一概念提升到一个新的水平。\n\
  \n免费？是的，你没看错。别担心。这里的最终目标仍然是赚钱。免费是促使人们下载你的产品的强大动力。谁不喜欢免费的东西呢？我就喜欢，而且根据 App Store\
  \ 的统计数据，我并非个例。尽管免费应用仅占 App Store 目录的 25%，但它们却占据了总下载量的 95%！\n\n### 免费策略\n\n你可以通过采用以下一种或多种策略来利用对免费应用的需求：\n\
  \n* 提供应用的免费精简版以推动付费版的销售，或使用通过应用内购买提供高级功能的免费增值模式。\n* 免费赠送你的应用，让尽可能多的人使用它。在你培养了一个依赖你应用的大型忠实客户群之后，利用这个基本免费版来向上销售一个独立的高级版本或提供额外“必备”功能的应用内购买项目。\n\
  * 让你的应用免费，通过应用内广告支持。在你的应用中实施移动广告将在第 7 章中讨论。\n\n这些方案中哪一种适合你的具体情况，很大程度上取决于你正在开发的应用类型。例如，应用内广告可能不适合儿童教育类应用。父母可能不会容忍向年幼的孩子投放广告的应用。此外，大多数用户可能是在\
  \ iPod touch 上安全地离线运行应用，广告网络服务器无法触及。\n\n别忘了联盟计划。如果你的应用当前链接到提供联盟计划的外部网站，你应当从你为联盟伙伴带去的流量中获益。你是否有一个音乐应用，其中包含购买\
  \ iTunes Store 中选定歌曲的链接？你的应用是否包含指向 Amazon.com 上书籍或 eBay 上商品的网页链接？如果你的应用利用了联盟链接，你可以从你为这些网站带来的所有销售中获得佣金。\n\
  \n### 先试后买\n\n作为一名 iOS 开发者，你无疑对免费精简版的概念并不陌生。和我一样，你的 iPhone 或 iPad 主屏幕上可能散落着从 App\
  \ Store 下载的“几页”精简版应用。在评估之后，你可能已经购买了其中至少几个的付费版本。如果没有先尝试精简版的能力，你会购买付费版吗？可能不会。因此，很容易看出免费精简版在提升付费应用销售方面的巨大价值。\n\
  \n桌面软件的开发者几十年前就已经知道这个重要事实。提供可供免费下载的试用演示版是销售商业软件的主要营销工具之一。大多数现代 Mac 和 Windows 应用的试用版都内置了购买机制。这使得用户可以轻松地在线购买许可证，并收到一个解锁演示应用的序列号，从而立即将试用版转变为全功能应用。\n\
  \n先试后买。听起来对 App Store 来说是显而易见的事，对吧？不幸的是，苹果目前不允许 iOS 应用开发者提供功能受限、可通过购买应用解锁的免费试用演示版。这一限制迫使开发者通过制作两个独立版本来解决此问题：一个免费精简版和一个提供精简版所没有的额外功能的付费版。在\
  \ App Store 的第一年，这是最接近“先试后买”概念的做法。\n\n早在 2009 年，当苹果宣布在 iPhone SDK 3.0 中包含新的应用内购买功能时，开发者们曾希望它最终能解决这个问题，但事实并非如此。尽管应用内购买确实允许用户在\
  \ iOS 应用内购买 App Store 项目，但苹果对应用内购买的使用方式有非常具体的规定。免费应用可以提供应用内购买，但这个内置的电子商务 API 不能用于解锁之前受限的功能，因为应用仍然被禁止将功能显示为禁用状态。如果免费应用包含一个功能——比如工具栏中的一个按钮——那么它必须是一个可用的功能。当前的应用内购买实现允许开发者提供当前应用中未包含的额外功能，例如订阅服务、新内容和附加的游戏关卡。\n\
  \n### 选择路径：精简版 vs. 应用内购买\n\n\n\n随着应用内购买（In-App Purchase）的出现，许多开发者曾迅速预测它将使精简版（lite\
  \ version）变得过时。然而，考虑到实现应用内购买的复杂性，以及应用在 App Store 排行榜中的定位方式，免费的精简版仍然是一种非常有效且可行的商业模式。再次强调，哪种方法最适合您取决于您正在开发的应用类型。\n\
  \n许多开发者仍选择同时发布免费精简版和独立付费版，最明显的原因是这比实现应用内购买要简单得多。如果您曾花时间浏览过苹果的 Store Kit 文档，您会发现应用内购买需要大量的额外编程和后端基础设施。对于\
  \ iOS 开发者平台的新手来说，Store Kit 的 API 可能显得有些令人生畏。而在 Xcode 内编译您的应用的两个版本（一个作为精简版，另一个作为功能更强大的付费版）是相当容易的。\n\
  \n如果您应用的功能可以清晰地划分为一组免费功能和一组只需支付少量升级费用即可获得的额外高级功能，那么应用内购买可能是更适合您需求的模式。例如，如果您的免费应用是一款包含五个游戏关卡的的第一人称射击游戏，那么额外的关卡和武器可以作为应用内购买项目提供。\n\
  \nngmoco 在其广受欢迎的 Eliminate Pro 应用中成功采用了这种模式。该应用免费提供，而额外的游戏关卡、武器和盔甲则可通过应用内购买获得。事实上，ngmoco\
  \ 对应用内购买的尝试已证明非常有效，以至于在随后的所有应用发布中（如 Touch Pets、We Rule 和 We Farm），都转向了免费增值（freemium）商业模式。\n\
  \n**注意**：您不能通过应用内购买用新的应用二进制文件替换现有的二进制文件，因此对于大多数游戏来说，这需要在免费应用中以隐藏或锁定状态包含额外的游戏关卡和内容。当客户购买该项目时，您的应用会解锁该新武器或游戏关卡。\n\
  \n但应用内购买可能并不适合所有类型的应用。一些单一功能的实用工具应用的结构，使得尝试针对特定功能通过应用内购买提供会很成问题。\n\n对于大多数游戏而言，应用内购买似乎是一个很好的选择，但请记住，通过应用内购买解锁额外内容需要您的应用变得更大（以存储那些隐藏内容）。而且，在处理移动设备上的下载带宽限制时，免费应用的文件大小对其作为促销工具的有效性会产生巨大影响。\n\
  \n许多手机运营商，如 AT&T，限制通过其移动网络下载的文件大小仅为 20MB。因此，如果用户想要将您 35MB 的免费游戏下载到他们的 iPhone 上，他们需要等到登录到本地\
  \ Wi-Fi 网络才行。这挫败了潜在的冲动购买和一时兴起的下载。等到他们进入 Wi-Fi 网络范围时，可能早已忘记了您的应用。\n\n使用精简版，只包含免费提供的内容，因此其编译后的文件大小远小于体积更大、功能齐全的付费版。如果免费精简版应用的二进制文件小于\
  \ 20MB，它将能够接触到更广泛的潜在客户群，因为他们无需 Wi-Fi，便可通过运营商的移动网络将其下载到 iPhone 上。\n\n话虽如此，免费精简版模式的一个主要缺点是，购买付费版需要单独下载一个应用，因此将任何现有用户数据从精简版迁移到付费版对开发者来说是一个相当令人头疼的物流问题。应用内购买则直接在应用内解锁新功能或内容，因此无需转移现有用户数据。\n\
  \n另一个重要的考虑因素是，付费应用需要为现有客户提供免费更新。App Store 目前不支持对更新收费的机制。因此，即使您的精简版成功说服用户购买了您的付费应用，那也只是该客户为应用付出的唯一一次费用。这意味着您需要不断吸引新客户来支持发布更新所需的持续开发成本。如果您的应用仅定价\
  \ 99 美分且销量不持续走高，那么遵循这个模型来维持和发展您的业务将非常困难。\n\n使用应用内购买，如果您始终让客户可以选择购买额外的功能和附加内容，那么您就给了他们一种以其便利性和舒适度持续购买项目的方式。他们可以想花多少就花多少（或少花），这对您的利润非常有利。灵活性赢得人心！您收入的很大一部分将来自一小部分忠诚客户购买多个应用内购买项目。一个有效的、长期的商业模式是永远不会限制客户消费金额的模式。\n\
  \n尽管免费增值应用包含应用内购买项目，但它们本身是免费下载的，这意味着您的应用只适合出现在 App Store 的“免费 App 排行榜”上。另一方面，同时发布免费精简版和付费版，能让您的产品有机会同时出现在\
  \ App Store 的“免费 App 排行榜”和“付费 App 排行榜”上。\n\n诚然，出现在 App Store 排行榜上能带来更高的应用发现率和销量，但这对您业务生存的重要性已不像过去那样至关重要。Snappy\
  \ Touch 的 Noel Llopis 在将他广受好评的应用 Flower Garden 集成应用内购买后，收入出现了指数级增长。\n\n“过去，在 App\
  \ Store 上赚钱的常识性做法是不惜一切代价登上排行榜。应用内购买改变了这一切，”Noel 在他 `GamesFromWithin.com` 网站最近的一篇博客文章中写道。“好的应用内购买可以让你的应用即使不在任何排行榜上也能盈利，并且是独立开发者最大的希望。”\n\
  \n我确实相信应用内购买是移动销售的一条非常强大的途径，并且很快将成为在 iOS 平台上实现应用开发盈利的最流行方法。如果这种模式非常适合您的应用功能集和架构，那么敬请期待！第\
  \ 8 章将详细讨论何时以及如何实现应用内购买。\n\n精简版方法：口味更佳，热量更低\n\n本书后面的章节将致力于介绍如何制作通过应用内广告和应用内购买盈利的免费应用。在此，我们将介绍当您的产品创意最适合作为付费应用时的情况，并探讨如何使用免费精简版来推广您的付费应用。但在深入探讨有效的营销策略之前，让我们先了解一些开发精简版应用的指南。\n\
  \n安全第一：精简版的限制\n\n为避免被 App Store 拒绝，请确保您的精简版遵循以下指南。尽管这些规则可能并非铁板钉钉，但这份清单似乎对当前 App\
  \ Store 中无数成功的精简版都适用。\n\n\n\n#### App Store 精简版指南\n\n-   精简版必须是一款功能完整的应用。你的免费精简版可以比付费版功能更少，只要有限的功能集能让用户将精简版视为一个完整、独立的体验来使用。应用的核心功能应在两个版本中均可访问。例如，如果你的应用主要功能是撰写文档，那么精简版和付费版都应包含创建、编辑和保存文档的功能。为了吸引用户购买付费版，你可以添加仅限付费版的额外增强功能，例如文件同步服务、额外的样式格式选项等。你甚至可以限制用户在精简版中存储的文档数量（精简版：十个文件；付费版：无限制），只要核心功能保持完整。\n\
  \n-   精简版不能包含功能残缺的特性。免费精简版不得包含已禁用的功能，当用户访问这些功能时，会被告知所选功能仅限付费版使用。例如，如果你的应用是一款游戏，且保存高分的功能仅限于付费版，请不要在精简版的界面中包含高分的相关引用。不要在精简版中添加“高分榜”按钮，当用户点击该按钮时，会通知用户高分功能是完整版、付费版专属功能，并附带一个显眼的“立即购买”按钮。在苹果看来，这被认为是功能残缺的特性。如果你的精简版包含“高分榜”按钮，则必须提供该功能。\n\
  \n-   精简版不能提醒用户购买付费版。虽然你可以在精简版的主信息屏幕中包含“购买完整版”按钮，但不能在用户使用应用期间，通过`UIAlertView`或自定义弹出视图提示用户升级。这种持续不断的“骚扰”窗口在桌面共享软件中或许可以接受，但很快会让你收到苹果应用审核团队的拒绝信。\n\
  \n-   精简版不能限时使用或禁用功能。在桌面软件领域，加速用户购买完整版的常见方法是创建一个限时演示版，该版本在安装一定天数后禁用某些功能或整个应用。这在\
  \ App Store 中是绝对不允许的。iOS 应用不得以任何方式过期或限时。\n\n-   精简版不能被称为演示版。由于所有 iOS 应用都需要功能完整，如果你在应用名称或用户界面中的任何地方使用像“演示”或“试用”这样的词，将很难在\
  \ App Store 中获得批准。你的应用可以使用*精简*或*免费*来表示精简版。\n\n-   免费版货币化潜力的最佳范例之一是《部落冲突》和《糖果粉碎传奇》等付费游戏。这些游戏完全免费游玩。如果你选择不在应用上花一分钱，你将明显落后于其他人。现在你可能会认为人们会花钱以在竞争中取得优势……*错*。看看\
  \ App Store 的收入排行榜；你会发现，几乎这里所有的应用都采用这种模式。你先用免费版让他们上瘾，然后提供选项，让他们付费以做得更好、更快或更有效率。\n\
  \n#### 免费精简版真的能促进付费应用销售吗？\n\n如果操作得当，你的精简版可以成为一台精准的销售机器，将成千上万（甚至数百万）用户转化为付费客户。那么，究竟需要多少次免费精简版下载才能看到付费应用销量的激增呢？\n\
  \n平均而言，大多数 iOS 开发者报告的转化率在 0.5% 到 3% 之间。这意味着，每 100 次免费精简版下载，他们大约能售出 1 到 3 个付费版本。如果你的付费版售价为\
  \ 99 美分，而你的精简版每天只有 100 次下载，那么你的应用销售每天可能只带来几美元。这产生的收入不足以在经济上支持你或覆盖你的开发成本。\n\n这就是成功真正变成数字游戏的地方。流量为王。你需要大力推广你的精简版，以增加其下载量。精简版的下载量越多，付费应用的销量就会越高。\n\
  \n畅销应用 iShoot 的开发者 Ethan Nicholas 报告称，转化率高达 8%。Ethan 的 iShoot 精简版的流行，帮助 iShoot 攀升至\
  \ App Store 付费应用排行榜的榜首位置。尽管 8% 看起来可能不多，但如果你精简版变得流行起来，这个数字很快就会累积起来。免费的 iShoot 精简版获得了数百万次下载，考虑到当时（2009\
  \ 年 1 月）iShoot 的售价为 2.99 美元，据报道，这个看似不高的转化率在发布后的头几周内就为 Ethan 带来了超过 70 万美元的收入。但请记住，那还是在\
  \ App Store 应用数量不到 10 万个的时候。现在苹果的移动应用商店已挤满了超过 30 万个应用，因此大多数应用和游戏永远不会看到如此高的转化率。\n\
  \n专业小众应用的转化率通常高于主流应用，因为感兴趣的用户正在寻找只有少数应用才能提供的特定功能。一款受欢迎的小众应用可能排名不够高，无法进入前 100 名，但它却有可能受益于\
  \ 10% 到 20% 的转化率。为什么会有如此大的差异？\n\n徘徊在前 100 名的流行主流应用拥有更高的曝光度，吸引了更广泛的大众用户，他们可能纯粹出于好奇下载许多免费精简版。专业小众应用通常是被那些对该特定功能有真正兴趣或需求的消费者找到的，因此他们购买完整版的可能性要大得多。这就是为什么许多小众应用的定价高于游戏和新奇应用的原因。它们在销量上的不足，试图通过更高的单品利润率来弥补。\n\
  \n无论实际转化率如何，在发布付费应用的同时提供精简版至关重要。这能让你充分利用首次发布带来的关注度和曝光度。2010 年最成功的案例之一，并非一开始就是畅销品。Rovio\
  \ 的《愤怒的小鸟》在 2009 年 12 月作为付费应用首次发布时，销售情况并不理想。直到几个月后免费精简版推出，销量才开始飙升（参见图 6-1）。随着越来越多的人尝试免费精简版，口碑迅速传播开来，《愤怒的小鸟》最终成为\
  \ App Store 的特色推荐游戏。这股由大众关注引发的热潮，加上其令人上瘾且有趣的游戏性，将《愤怒的小鸟》推向了今天的现象级地位，其 iPhone 和 iPad\
  \ 的精简版与付费版总下载量超过 4000 万次。\n\n![9781430262381_Fig06-01.jpg](img/9781430262381_Fig06-01.jpg)\n\
  \n图 6-1。Rovio 的《愤怒的小鸟》销量直到免费精简版发布后才飙升至付费榜榜首，随后苹果将其选为 App Store 的特色推荐游戏\n\n\n\n####\
  \ 如何制定有效的 Lite 版应用策略\n\n很少有开发者能像 Ethan Nicholas 或 Rovio 那样成功，尤其是在 App Store 中应用数量惊人、竞争激烈的当下。但如果你制定一个扎实的\
  \ Lite 版策略，仍然有很大的赚钱潜力。打造一个有效的 Lite 版涉及众多因素。注重细节之处才能真正带来回报。\n\n#### 他们不会为免费牛奶而购买奶牛\n\
  \n大多数开发者立即就理解了提供免费 Lite 版的市场价值，但由于 Apple 要求 Lite 版应用功能完整，一个主要担忧就是免费提供的内容过多。如果你的\
  \ Lite 版包含了足够满足人们需求的功能，那为什么还有人会去购买付费版呢？\n\n答案在于第 2 章中讨论的所有市场分析和竞争研究。如果你了解应用的目标受众、竞争对手是谁以及他们提供了哪些功能、哪些关键功能对用户很重要，那么规划你的\
  \ Lite 版策略就会容易得多。\n\n诀窍在于要明白哪些功能可以包含在 Lite 版中，而又不至于蚕食付费应用的销量。如果你的竞争对手在他们的 Lite 版中提供了特定功能，你也应该采取类似的做法，尤其是当用户期望这些功能时。但如果你应用有一些很酷的新功能是别人没有的——那种让你应用与众不同的创新“法宝”——那么你需要找到一种方法，让用户能在\
  \ Lite 版中试用该功能，同时在付费应用中提供更全面的版本。\n\n你要吊起他们的胃口，但不要全盘托出。\n\n#### 生产力工具和实用工具的 Lite\
  \ 版本\n\n对于生产力、实用工具和非游戏类应用来说，选择 Lite 版的功能可能颇具挑战，这也是为什么很多这类应用不提供免费 Lite 版的原因。相反，它们依靠评测、外部宣传、视频预告和截图来帮助销售应用。如何将\
  \ Lite 版的功能限制到足以鼓励付费应用销售，同时又能通过 App Store 的审核呢？\n\n如果你正在开发一款创建文档或笔记的应用，你的 Lite 版需要功能完整，允许用户创建、编辑和保存这些文件。既然用户希望能够通过电子邮件导入/导出文档，或将文件与远程服务器（如\
  \ Google Docs 或 Dropbox）同步，那么显然这些功能是你的应用在 App Store 中保持竞争力所必需的，但它们可以作为仅在付费版中提供的高级功能。\n\
  \n如果你的应用允许用户创建某种待办事项或清单，一种有效的方法是限制在 Lite 版中可以创建的项目数量。为了正确设定用户预期，你的 Lite 版应明确告知当前限制，鼓励用户升级到付费版以获得完整、无限制的体验。\n\
  \nMarco Arment 为他广受好评的 `Instapaper` 应用的 Lite 版——`Instapaper Free` 采用了这一策略。`Instapaper`\
  \ 是一款用于保存网页以便稍后阅读的有用工具。`Instapaper Free` 将存储限制为十个网页文章——这足以让人们相信这项服务的益处和便利性。一旦他们上瘾并需要更多空间，他们就更倾向于升级到付费版，后者提供无限存储、iPad\
  \ 兼容性以及大量附加功能（见图 6-2）。\n\n![9781430262381_Fig06-02.jpg](img/9781430262381_Fig06-02.jpg)\n\
  \n图 6-2. Marco Arment 的 `Instapaper Free` 限制用户只能保存十个网页文章以供稍后阅读，以此鼓励用户升级到付费版以获得无限文章存储、iPad\
  \ 兼容性和附加功能\n\n#### 游戏的 Lite 版本\n\n对于游戏来说，设计免费 Lite 版通常要简单得多。游戏开发者通常会包含前几个关卡在 Lite\
  \ 版中。如果用户想玩更多，就需要购买付费版，在那里他们会获得数十个额外关卡、增强功能和特色玩法。\n\n根据你的应用玩法，将 Lite 版限制在仅包含少量入门关卡可能不足以充分展示游戏的真正价值。Matt\
  \ Rix 在为他的畅销游戏 `Trainyard` 开发 Lite 版时就遇到了这个问题。\n\n“付费游戏有大约 150 个谜题，起初，我想只包含前几个谜题在\
  \ Lite 版中，希望用户能看到潜力并想购买完整版，”Matt 说。“但问题在于，在前 10 或 15 个谜题中，玩家才刚刚开始熟悉操作机制。那些‘啊哈！’的时刻要到游戏进行到\
  \ 40 或 50 个谜题时才会出现，那时你才能感受到这些谜题到底有多酷。这让我陷入了有点棘手的境地。我可以在 Lite 版中免费提供前 50 个谜题，但如果用户决定购买付费游戏，就没有顺畅的升级路径了。他们必须在完整版中再次解决那\
  \ 50 个谜题。我考虑过在完整版中添加一个可以跳过前 50 个谜题的作弊功能，但这似乎仍然不是最好的解决方案。”\n\n于是，Matt 想出了一个巧妙的替代方案。他为\
  \ Lite 版创建了 60 个全新的谜题。他选择不使用 *lite* 或 *free* 这样的词，而是将这个版本命名为 `Trainyard Express`，并将其称为完整付费版\
  \ `Trainyard` 的“前传”（见图 6-3）。\n\n![9781430262381_Fig06-03.jpg](img/9781430262381_Fig06-03.jpg)\n\
  \n图 6-3. Matt Rix 的免费版 `Trainyard Express` 提供了 60 个独特的谜题，以避免与付费版 `Trainyard` 的 150\
  \ 个谜题重叠。这一策略提升了两个版本在用户眼中的价值\n\nMatt 承认，这种非传统路径需要大量的额外开发工作，但此举背后有着相当多的战略思考。他补充道：“我真心希望人们爱上这个游戏机制，我认为这可能是最好的方法。我还大幅提高了难度曲线，所以免费\
  \ `Express` 中的第 60 个谜题的难度与完整版中的第 100 个谜题相当。”\n\n通过将 `Trainyard Express` 定位为完整付费游戏的独立前传，`Trainyard`\
  \ 的粉丝会想下载这两个版本，以便玩到全部 210 个谜题。这反而有助于同时提升游戏在付费榜和免费榜的排名，从而在 App Store 中获得更高的曝光度。\n\
  \n#### 何时发布 Lite 版本\n\n免费提供如此多的内容似乎是一场冒险的赌博，但根据你特定应用的功能或玩法，这可能是制胜的一步，能为你赢得一批忠实的用户。\n\
  \n对于任何新兴的应用业务来说，担心 Lite 版可能会阻碍付费应用销售，这是一个可怕的前景。由于这种担忧，许多独立开发者对 Lite 版敬而远之。一些开发者会等到应用销量下滑，认为在应用生命周期的尾声推出一个免费的\
  \ Lite 版有助于重振销量。虽然这可能会带来一些额外的业务，但他们并没有真正最大限度地发挥 Lite 版作为推广工具的潜力。时机完全不对。\n\n那些采取这种延迟策略的开发者发现，在这么晚的阶段推出免费\
  \ Lite 版时，付费应用的销量确实会增加，但到那时，最初发布时产生的所有免费宣传早已消退，所以销量上的新增长往往不足以将付费版推回 App Store 的前\
  \ 200 名。要是这些开发者当初能在应用发布、享受首波宣传浪潮时就推出免费 Lite 版，那该多好啊！\n\n\n\n### 排版后内容\n\n如果你计划发布免费的精简版，你应该在首次推出付费版时，就让精简版可供下载。这样一来，你的免费精简版就能借应用初始发布时产生的所有宣传和口碑效应获得优势。你驱动下载免费精简版的流量越多，付费应用的转化率就越高。许多在网络推广应用的开发者，会将广告链接到免费精简版，以鼓励用户点击。这能使他们的广告活动更有效，因为人们都喜欢免费的东西。然后，让你的精简版发挥魔力，让用户小小体验一下购买付费版后能得到什么。\n\
  \n如果你担心付费版的专属功能吸引力不够，无法促使用户从免费精简版切换过来，那么你需要重新考虑两个版本之间的功能划分，让升级更具吸引力；或者，你也可以考虑在免费精简版中加入应用内广告。提供一个完全无广告的付费版，这本身就是一种强大的诱惑，同时也能通过广告收入为你带来免费精简版的变现途径。第\
  \ 7 章详细介绍了应用内广告的相关内容。\n\n当然，并非所有应用都适合做免费精简版。但如果你能想出一个方法，让它对你有利并带动应用销售，那么从长远来看，这将是一项会有回报的赌注。\n\
  \n### 完善你的应用内销售话术\n\n要设计一个更有效的精简版，你需要把它看作一个虚拟的销售助理。你不可能亲自到场，向每位用户逐一介绍你应用的优势，所以你需要让你的精简版替你去“推销”。这意味着你需要在精简版内精心设计销售话术，以恰当地传达你的信息。你已经知道了精简版的指导原则，所以现在，请先摘下开发者的帽子。是时候像你的用户一样思考，设身处地去感受了。\n\
  \n#### 放置购买按钮\n\n许多精简版会在启动画面（即应用启动后的头几秒内显示的界面）上宣传付费版。虽然这是在用户短暂等待应用加载时，充分利用他们全神贯注的注意力来推销的好方法，但这不应该是放置`购买`按钮的唯一位置。\n\
  \n用户在完成一次应用使用后，如果他们对了解更多付费版信息感兴趣，他们会查看应用的主界面、信息界面和/或设置界面（具体取决于你的应用包含了哪些界面）。这听起来像是常识，但我总惊讶地发现，有些精简版并没有让购买按钮在应用内便于点击，或者更糟的是，根本就没放进这个按钮！\n\
  \n如果人们找不到购买按钮，他们就没法购买你的应用。别指望他们会自己记住去手动访问 App Store。很有可能，他们会忘记，而你就白白失去了那些潜在客户。\n\
  \n任何销售，尤其是软件销售，都应该让购买行为尽可能简单和轻松。不同于大多数在线电商系统那样步骤繁琐、过于复杂，苹果公司将 iTunes App Store 设计成了最简单、最便捷的购买软件方式，所以你实在没有任何借口。如果有人喜欢你的免费精简版，并有意升级到付费版，那么下一步操作应该只是轻点指尖就能完成。\n\
  \n那么，既然你已经在精简版的主界面或信息界面集成了一个购买按钮，这个按钮上该写什么字呢？这个问题听起来可能有点蠢，但答案其实比你想象的更微妙、更复杂。\n\n\
  像`购买`和`购买`这样的词，传递给 iPhone、iPad 和 iPod touch 用户的信息只有一个：点击这个按钮会带他们去 App Store。没错，你精心准备的销售话术已经在\
  \ App Store 里了——配有详细的描述和截图——从开发角度来看这非常方便。如你在第 5 章所学到的，在应用内启动 iTunes 商店的 URL 仅需几行代码。ZeptoLab\
  \ 广受欢迎的《Cut the Rope Lite》采用了类似的策略，在常见的`Available on the App Store`标志上方，放置了一个`完整版`按钮。这个按钮出现在游戏的主菜单界面，也会在用户玩完免费关卡后显示（见图\
  \ 6-4）。点击这些按钮会直接把你带到 App Store 中《Cut the Rope》付费游戏的页面。你也会在 Rovio 的《愤怒的小鸟》中找到同样的\
  \ App Store 按钮。\n\n![9781430262381_Fig06-04.jpg](img/9781430262381_Fig06-04.jpg)\n\
  \n图 6-4。在 ZeptoLab 的《Cut the Rope Lite》中，`完整版`按钮和`Available on the App Store`标志直接链接到\
  \ App Store 中《Cut the Rope》付费游戏的页面\n\n尽管一些应用通过这种简单的方法取得了成功，但它不一定是最有效的，尤其对于一款不知名的新产品。尽管我们都愿意相信自己的应用像《Cut\
  \ the Rope》和《愤怒的小鸟》一样令人上瘾，但这两个现象级的畅销品是规则之外的例外。很有可能，我们这些凡夫俗子需要在应用内营销策略上更积极一点。\n\n\
  #### 在精简版中添加升级信息\n\n从那个购买按钮直接跳转到 App Store，会让用户离开你的应用，而他们可能并不想在那一刻离开，尤其是当他们误以为这会自动开始一笔购买时。作为开发者，我们明白在用户先在\
  \ App Store 输入他们的 iTunes 密码之前，这是不可能的，但一些消费者可能不够了解技术，意识不到这一点。为什么他们会在不知道付费版本会带来哪些额外功能的情况下就想要购买这个应用呢？他们不会，所以他们可能会忽略这个按钮。如果那样的话，你的免费精简版就未能完成它唯一且最重要的使命。\n\
  \n任何可能导致用户点击购买按钮时犹豫不决的已知原因，都应该尽可能消除。只要你能做些什么来消除这种犹豫或恐惧，那么投入额外的开发时间来实现它都是值得的。\n\n\
  那么，如何解决眼前的问题呢？与其立刻将用户重定向离开你的应用去到 App Store，为什么不直接在应用内部包含你的销售话术呢？一旦你成功说服他们升级到完整版，你就可以用一个链接到\
  \ App Store 的购买按钮稳妥地完成交易。\n\n我最喜欢的一个例子是 Digital Chocolate 的《3D Rollercoaster Rush\
  \ Free》。在应用的主界面，`完整版有什么？`按钮会引导至一个界面，精确地告诉你选择它后会得到什么。你期待看到关于付费版所包含功能的详细信息，而这正是你所得到的（见图\
  \ 6-5）。这个出现的促销界面设计得非常好，与游戏的视觉主题相匹配。截图和关键卖点都经过精心打造，以求达到最大影响力。所有这些信息都是在不强迫用户离开应用的情况下传达的，让人们可以选择购买付费应用，或者点击`返回`按钮回到游戏。我被说服并点击了`获取完整版`按钮，而且我是一个很少玩游戏、品味非常挑剔的\
  \ iPhone 用户，所以这个销售话术绝对有效。\n\n![9781430262381_Fig06-05.jpg](img/9781430262381_Fig06-05.jpg)\n\
  \n图 6-5。《3D Rollercoaster Rush Free》是一个绝佳的上行销售范例。\n\n\n\n#### 关于 iPad 的更大显示屏\n\n\
  在 iPad 的更大显示屏上，你拥有更多的屏幕空间，因此更容易在弹出窗口（`UIPopover`）或居中的模态视图（`UIModalPresentationFormSheet`）中插入付费版本的升级信息，而不会占据整个屏幕。在\
  \ Illusion Labs 的《迷宫 2 HD Lite》中，免费迷宫菜单包含一个用于付费版本的小型横幅广告。点击该横幅，会弹出一个弹出窗口，其中包含高级功能的可滚动描述、截图以及一个\
  \ App Store 购买按钮（参见图 6-6）。\n\n![9781430262381_Fig06-06.jpg](img/9781430262381_Fig06-06.jpg)\n\
  \n图 6-6。Illusion Labs 的《迷宫 2 HD Lite》在 iPad 的弹出窗口中展示付费版本的升级销售信息。\n\n`UIPopover`\
  \ 的美妙之处在于，它所显示的 `UIView` 可以轻松重复使用，并可在应用的其他地方通过另一个 `UIPopover` 再次显示。除了 Illusion Labs\
  \ 提供的迷宫外，该公司还托管了一个免费的在线社区，用户可以在其中上传和分享自己创作的迷宫。在免费的《迷宫 2 HD Lite》应用中，用户可以浏览第三方迷宫列表，但他们很快就会注意到，需要购买付费版本才能下载和游玩这些社区迷宫。这是升级到完整版游戏的一个巨大动力。在精简版中，下载按钮被方便地替换为“完整版信息”按钮。点击该按钮时，它会像之前在应用其他部分看到的那样，在一个\
  \ `UIPopover` 中显示相同的付费版本信息（参见图 6-7）。这个弹出窗口在需要时提供升级信息，同时不会干扰界面的其他部分。\n\n![9781430262381_Fig06-07.jpg](img/9781430262381_Fig06-07.jpg)\n\
  \n图 6-7。要求《迷宫 2 HD Lite》用户购买付费版本才能下载由迷宫社区贡献的数千个免费第三方迷宫，这是一个极好的升级激励。\n\n#### 应用被拒警告\n\
  \n你不应在应用内显示应用的价格。在免费精简版中推广完整版时，不要列出价格。Apple 在世界许多国家/地区拥有本地化 App Store，支持多种不同货币，因此它不欢迎在应用中显示硬编码的价格。Apple\
  \ 的应用审核团队并不总是将此标记为被拒原因，但这种情况时有发生，因此你应避免这样做。除了被拒风险外，不在应用中列出价格也很重要，这样你就可以灵活地随时为特殊促销活动更改\
  \ App Store 价格，而无需提交更新。\n\n#### 加入分析功能\n\n在精简版中加入分析功能非常重要，这样你就可以追踪有多少人点击了购买按钮。这些分析报告结合你的\
  \ iTunes Connect 统计数据，将帮助你确定精简版作为推广工具的有效性。你将了解有多少人下载你的精简版应用、他们使用的频率、有多少用户点击了购买按钮，以及你的付费版本带来了多少销售额。掌握了所有这些数据后，如果精简版到付费版的转化率远低于预期，你可以尝试在后续更新中调整措辞和按钮位置，以改善效果。\n\
  \n当然，了解用户如何使用你的付费应用同样有价值。因此，如果你将分析功能纳入开发策略，请确保将其接入你的所有应用——无论是精简版还是付费版——以获得关于它们表现的最全面图景。Apple\
  \ 最近更改了关于第三方分析工具允许收集哪些信息的规则。要了解应用内分析的相关事实，请查看第 7 章。\n\n**提示** 如果你是 iOS 开发者，应加入 iTunes\
  \ 联盟计划。你指向 App Store 的任何链接都应是联盟链接。没有理由不为你导向 Apple 的所有流量赚取一些联盟佣金。这意味着你精简版中的所有购买按钮、交叉推广、网站等都应使用\
  \ iTunes 联盟链接进行编码。我们将在本章后面探讨利润丰厚的联盟计划世界。\n\n#### 让精简版无懈可击\n\n作为开发者，我们努力创造高质量的产品，因此没有人会故意发布有漏洞的软件。即使是顶尖开发者也会遇到致命的错误，但如果有一个时刻需要加强你的测试和质量控制工作，那便是针对你的免费精简版。\n\
  \n由于用户会通过评估你的精简版应用来判断付费版本是否值得他们辛苦赚来的钱，因此他们会用非常挑剔的目光来试用它。因为是免费的，该应用会吸引更广泛的受众，其中许多人只是出于好奇而“试驾”。由于在这方面没有任何情感投入，人们常常会迅速做出草率的判断。正如大多数精简版应用与对应的付费版本相比评分更低所证明的那样，人们会毫不犹豫地因为最微不足道的原因给一个应用打出凄惨的一星评分。即使精简版是免费的，如果体验让用户感到沮丧，评论往往也会很苛刻。\n\
  \n确保你的精简版包含充足的内置说明，以帮助减轻因有人不知如何使用应用而可能产生的任何潜在困惑。许多精简版应用会在启动时询问用户，是否希望在探索应用之前观看或阅读一个简短的教程。虽然这确实需要额外的开发工作，但这是一个非常主动的方法，可能有助于避免许多不应出现的一星差评。如果你认为你的应用会从提供应用内教程中受益，请参阅第\
  \ 9 章了解此主题的详细信息。\n\n#### 将数据从精简版迁移到付费版\n\n如果用户购买了你的应用，他们不应因丢失免费精简版中的数据而受到惩罚。如果发生这种情况，准备好迎接\
  \ App Store 中大量负面用户评论吧。\n\n对于大多数游戏来说，没有什么可丢失的，因为高分排行榜通常存储在远程服务器上。但如果这是一个将信息保存在 plist\
  \ 文件或数据库记录中的效率应用呢？\n\n与桌面操作系统更灵活的环境不同，iOS 限制每个应用只能在其自己的数据“沙盒”中存储文件。应用 A 不能访问应用 B\
  \ 保存的文件，反之亦然。这可以保护每个已安装的应用免受恶意行为的影响，但也使得在应用之间共享数据变得极其困难。\n\n从 iOS 3.2 开始，Apple 引入了一种新的内置文件处理机制，称为“文档支持”，它允许开发者向\
  \ iOS 系统注册他们的应用，以创建和/或打开特定的文件类型。这对于需要其独特文件类型（例如文字处理器）或支持流行文件类型（例如 PDF、图像和视频格式）的应用来说非常棒。这使得一个应用中的文件可以被打幵或复制到另一个也注册支持相同文件类型的应用中。如果你需要从精简版的\
  \ plist 文件或少量数据库记录中传输一些信息到付费版应用，这种“文档支持”功能显得有些大材小用，在这种特定情况下增加了不必要的编程开销。\n\n\n\n\n\
  #### iOS 3.2 数据迁移方案\n\niOS 3.2 还增加了一项桌面同步功能，使应用能够在桌面版 iTunes 的特殊文件共享列表中显示其文件目录，当你的\
  \ iOS 设备与电脑同步时即可使用。从技术上讲，如果你的应用支持此功能，用户可以从精简版中复制存储的数据文件到桌面，然后将其拖回 iTunes 的付费应用文件共享目录中。但这要求客户完成大量额外工作，处理他们本不该遇到的问题。如果你重视客户并希望他们获得满意的用户体验，应避免使用此方案。\n\
  \n显然，应用内购买（`In-App Purchase`）能让你的生活轻松得多，避免了将数据从精简版传递到独立付费应用的麻烦。但别灰心——还有其他方法可以完成此任务。\n\
  \n#### 云端同步\n\n一些开发者通过在应用中实现同步服务来解决数据迁移问题，让客户能够将应用数据同步到远程服务器。诸如 `Flixoft` 的 `Grocery\
  \ Gadget` 等流行应用鼓励用户注册免费群组账户，以便数据能从精简版轻松传输到付费版。\n\n如果你的应用存储大量复杂数据，或者你只是想给客户一种从其他位置和设备（如他们的\
  \ iPad 或台式电脑的网页浏览器）访问数据的方式，那么维护一个同步服务可能是最佳选择。如果这对你的应用需求来说是个吸引人的解决方案，以下是一些值得考虑的实惠云服务：\n\
  \n*   `Dropbox` 开发者平台（`http://www.dropbox.com/developers`）\n*   `Google App Engine`（`http://code.google.com/appengine/`）\n\
  *   `Amazon S3`（`http://aws.amazon.com/s3/`）\n*   `Rackspace Cloud`（`http://www.rackspacecloud.com`）\n\
  *   `Parse`（`http://parse.com`）\n\n如果你不想开发并维护一个服务器端 Web 应用来管理原生应用与云端之间的数据同步，可以首先考虑\
  \ `Dropbox` 的 iOS SDK。`Dropbox` 已成为需要在多设备间同步数据的移动开发者的热门选择。但如果你只需要在应用间传输非常少量的数据，还有另一种选择。\n\
  \n#### 通过 URL 传输数据\n\n一些开发者成功通过唯一的 URL 命令传输数据。例如，如果 iOS 应用发起一个 HTTP 网站的开放 URL 请求，`Mobile\
  \ Safari` 会自动启动并处理该请求，因为它是注册处理 HTTP 的默认应用。简而言之，应用刚刚将数据传输给了 `Mobile Safari`。你可以通过设置一个唯一的\
  \ URL 协议处理器，将同样的概念应用到你自己的应用。\n\n要使你的 URL 协议生效，它需要使用一个尚未被任何其他应用使用的前缀。由于你不知道其他 iOS\
  \ 应用可能为此使用哪些唯一协议，你应该设计一个足够独特的前缀，以防止与其他应用冲突。\n\n出于本练习的目的，让我们为虚构的停车位置定位应用 `Breadcrumbs`\
  \ 创建一个唯一协议。我们希望精简版用户能将保存的停车位置传输到付费版。由于数据量非常小（仅几个 GPS 坐标），且不包含任何机密信息，通过开放 URL 命令传输数据效果很好。\n\
  \n对于我们的 URL 前缀，我们将使用`bcrumbs`。如果你的应用有一个独特的名称（应该如此），那么该名称（或其变体）可能很适合作为唯一前缀。首先，`bcrumbs`\
  \ URL 协议需要注册到 iOS 系统中，并分配给 `Breadcrumbs` 的完整版。这通过在 Xcode 中向付费应用的`Info.plist`文件添加新的\
  \ URL 类型来完成（参见 Figure 6-8）。\n\n![9781430262381_Fig06-08.jpg](img/9781430262381_Fig06-08.jpg)\n\
  \nFigure 6-8。在 Xcode 的 plist 编辑器中打开完整版的`Info.plist`文件，添加新的 URL 类型\n\n要向`Info.plist`文件添加新条目，请在\
  \ plist 编辑器中选择最后一行，然后点击右侧的灰色加号（`+`）按钮。在新的空白行中，从左侧键（`Key`）列出现的上下文菜单列表中选择`URL Types`。\n\
  \n添加新 URL 类型后，打开其展开三角形以配置嵌套属性。在其`Item 0`键下，你需要将付费应用的唯一属性`com.company.Application`添加到`URL\
  \ identifier`字段。对于虚构的 `Breadcrumbs` 应用，这很可能是`com.electricbutterfly.Breadcrumbs`。\n\
  \n接下来，再次点击加号按钮，在`URL identifier`正下方添加另一个嵌套键，并从新键的上下文菜单中选择`URL Schemes`。`URL scheme`是你定义唯一\
  \ URL 协议处理器的地方，因此对于 `Breadcrumbs` 示例，它是`bcrumbs`。\n\n**注意**：如果你有一个 Xcode 项目设置了两个编译目标（一个目标用于精简版，一个目标用于付费版），则需要为每个目标创建单独的\
  \ plist 文件。只有应用完整版的 plist 文件可以包含唯一的 URL 协议处理器定义。如果你的精简版 plist 文件引用了相同的 URL 类型，那么精简版最终将接收自己的\
  \ URL 请求，这会导致冲突。当精简版发送唯一的 URL 请求时，你只希望付费版来响应它。\n\n现在，唯一的`bcrumbs` URL 协议已分配给 `Breadcrumbs`\
  \ 的完整版，下一步是为精简版添加通过 URL 传输数据的代码。假设你已在精简应用的设置屏幕上添加了一个新按钮，名为`Transfer My Data to Full\
  \ Version`（将我的数据传输到完整版），并且它已在 Interface Builder 中连接好。还假设事件处理器已包含从精简版沙盒获取数据的代码（例如来自\
  \ XML 文件或纯文本文件的内容）。\n\n你不能在 URL 查询中发送原始数据，因此必须首先进行 Base64 编码和/或 URL 编码。iOS SDK 不包含\
  \ Base64 编码和解码，但一些第三方 Objective-C 库（例如`Google Toolbox for Mac`，`http://code.google.com/p/google-toolbox-for-mac/`）为\
  \ iOS 提供 Base64 支持。如果仅 URL 编码就能满足需求，你可以轻松调用原生 iOS `NSString`方法`stringByAddingPercentEscapesUsingEncoding`。\n\
  \n一旦数据经过 Base64 编码和/或 URL 编码并存储在`NSString`中（我们称之为`encodedData`），就可以作为唯一 URL 查询的一部分发送：\n\
  \n```objectivec\nNSString *urlQuery = [NSString stringWithFormat:@\"bcrumbs://localhost/importData?%@\"\
  , encodedData];\nNSURL *url = [NSURL URLWithString:urlQuery];\n[[UIApplication sharedApplication]\
  \ openURL:url];\n```\n\n当用户点击`Transfer My Data to Full Version`按钮时，精简版发起该 URL 请求。iOS\
  \ 识别出`bcrumbs` URL 协议处理器已注册到 `Breadcrumbs` 的完整版，因此该唯一 URL 被传递给付费应用。`Breadcrumbs`\
  \ 的完整版启动以接收并解析该 URL 命令。\n\n要使最后一步成功，付费应用必须在应用委托的实现中包含`application:handleOpenURL`处理器。例如，`BreadcrumbsAppDelegate.m`文件包含以下代码：\n\
  \n```objectivec\n- (BOOL)application:(UIApplication *)application handleOpenURL:(NSURL\
  \ *)url {\n     if([@\"/importData\" isEqual:[url path]]) {\n         NSString *urlData\
  \ = [url query];\n\n// 首先，你应该询问用户是否愿意\n         // 用新导入的精简版数据替换现有数据。\n```\n\n\n\n\
  // 随后，根据字符串的初始编码方式，\n// 你需要通过第三方库解码 Base64\n// -或- 调用 `NSString` 方法\n// `stringByReplacingPercentEscapesUsingEncoding:`\
  \ 来解码 URL 编码。\n\n// 最后，你需要解析并保存数据\n// 到完整版本自身的应用沙盒中。\n\n```\nreturn YES;\n     }\n\
  \     return NO;\n}\n```\n\n就这么简单！只需记住，通过 URL 传输数据仅适用于少量数据，例如小于几百千字节的 XML 文件或文本文件。你还需要通过编写\
  \ `application:handleOpenURL:` 处理程序来保护付费应用，使其仅接受你想要的特定数据，并忽略无效的 URL 字符串，从而防御那些破解你独特\
  \ URL 协议的黑客。\n\n### 保护市场份额：先免费赠送，再后续升级\n\n你的 iOS 应用的成功是否依赖于尽可能多的人采用，例如需要多个参与者才能发挥作用的社会化网络应用？如果是这样，你可能需要考虑免费赠送该应用。要让数百万人在如此宏大的全球规模上采用你的服务，唯一的办法就是让所有人都能免费使用。想想\
  \ Facebook、Foursquare 和 Twitter。\n\n目标是让每个人都能足够频繁地使用你的应用，以至于它最终成为他们日常生活中不可或缺的一部分。使用门槛越低，实现这一目标就越容易。除了免费之外，为了获得最佳效果，你的应用还应避免出现任何潜在的阻碍因素，比如广告。\n\
  \n当你的应用培养了一大批忠实的追随者后，你可以推出付费版的应用，提供额外的功能。另一种选择是将高级功能作为应用内购买项目提供（如第 8 章所述）。基础版将始终免费提供，这也是大多数用户会选择的方式。\n\
  \n那么，如果大多数人只使用免费的入门版，你如何赚钱呢？这是另一个关于“规模”如何最终决定你成功的例子。如果你创造了创新的用户体验，并且作为营销人员做得足够出色，那么你的免费应用就会作为“必备”应用渗透主流市场，并被数百万人使用。例如，假设有\
  \ 1000 万人经常使用免费的基础版。如果其中只有 8% 的用户决定升级到 1.99 美元的付费版，减去苹果 30% 的应用商店抽成后，你的净收入将超过 110\
  \ 万美元。更保守地估计，即使只有 5% 的用户升级到付费版，也能产生 70 万美元的收入。\n\n再说一次，规模是这个策略奏效的关键。大多数应用并不适合这种商业模式。但如果你的应用依赖于用户之间的点对点互动，这种方法或许就是你在特定细分市场占据最大份额的通行证。如果你的应用是市场领导者，你将更成功地引导更多用户升级到付费版。\n\
  \n在第 2 章中，我提到了 Bump Technologies, Inc. 公司推出的很酷的 Bump 应用，它允许用户通过互相碰击手掌来即时发送联系信息。但要使其工作，两个人都必须在他们的\
  \ iPhone 或安卓手机上安装 Bump。拥有 Bump 的人越多，它就越有用。希望是它最终能在手机中变得足够普及，成为用户交换虚拟名片和其他数据的标准方法。这个计划似乎正在奏效。就目前而言，该应用在\
  \ iPhone 用户中已经变得相当流行，甚至出现在了苹果的一则 iPhone 广告中。\n\nBump 会永远免费吗？为了保持这种普及势头，这将是可预见的未来的目标。Bump\
  \ Technologies, Inc. 并未走传统的付费版路线，而是希望通过将其核心的碰撞技术授权给其他能从该功能中受益的大型商业开发者来实现盈利。只要不 overload\
  \ Bump 服务器或通过每次碰撞产生增量收入，你就可以免费在你的应用中使用 Bump API。如果你的应用通过碰撞功能赚钱，或者需要 Bump 服务器提供大量带宽，你可以购买相应的授权层级。\n\
  \n通过为 iOS 和安卓提供易于使用的 SDK 来开放此 API，Bump 不仅在移动世界中巩固了自己作为点对点数据共享事实标准的平台地位，而且还在为其核心优势的货币化建立长期基础设施。随着\
  \ Bump API 已被独立开发者以及像 PayPal 和 ABC Family 这样知名客户开发的数十款移动应用所采用，Bump 的策略显然正在获得回报。\n\
  \n报业是另一个通过提供免费服务来试图培养忠实移动受众的商业模式的好例子。随着印刷报纸的广告销售和发行量持续快速下滑，处境艰难的报纸正寻求向拥有可持续收入模式的数字平台转型。由于要与大量免费在线内容竞争，付费报纸应用在过去一直难以成功，尤其是在小手机屏幕上重现报纸阅读体验已被证明颇具挑战性。但随着\
  \ iPad 的广泛普及，以及平板电脑鼓励与阅读报纸类似的向后倚靠式观看行为，这一媒介终于有了一个可行的移动平台。\n\n诸如《*纽约时报*》和《*华盛顿邮报*》等主要报纸已开始尝试新的专用\
  \ iPad 应用，这些应用在限定时间内免费提供其全部日报内容。借助 iPad 更大的屏幕，这些应用能够提供令人满意的、可与印刷版相媲美的数字阅读体验，同时充分利用现代触摸屏技术。它们连续几个月提供\
  \ 100% 的免费内容，希望消费者会逐渐依赖这种接收“报纸”的方式。这样，当免费服务结束时，用户很容易决定切换到应用内购买订阅模式（见图 6-9）。\n\n\
  ![9781430262381_Fig06-09.jpg](img/9781430262381_Fig06-09.jpg)\n\n图 6-9. 《华盛顿邮报》是几家希望通过在限定时间内提供\
  \ 100% 免费内容，最终将忠实读者转化为付费订阅者的报纸之一\n\n如果你需要尽快获得收入来为开发工作提供资金，这些免费策略可能不适合你。但如果你的开发目前由投资者、赞助商或其他来源的现有现金流支持，并且你能够等待几个月让你的应用在移动市场站稳脚跟，那么在正确实施的情况下，免费可以是一种有效的商业模式。\n\
  \n### 通过联盟计划挖掘额外收入\n\n在本章前面部分，我提到了在将用户引导至 iTunes Store 时使用 iTunes 联盟链接。在这里，我们将更深入地探讨联盟计划如何为你创收。\n\
  \n#### 联盟计划的工作原理\n\n联盟计划的运作方式相当简单。参与公司希望鼓励软件和网站所有者将流量引导至其零售网站。作为激励，联盟会员可以从产生的销售中获得一小笔佣金。这是通过使用包含唯一联盟\
  \ ID 的特殊 URL 来追踪的。联盟会员赚取的佣金基于通过其链接而来的客户所产生的销售额的百分比。\n\n\n\n大多数博主和网站所有者都非常熟悉亚马逊联盟（Amazon.com\
  \ Associates），这是历史最悠久、最受欢迎的在线联盟项目之一。如果你的网站访问者通过你的联盟链接进入亚马逊并购买商品，你将获得该笔销售的部分佣金（通常为\
  \ 4%或更高，具体取决于商品）。\n\n尽管有成千上万个联盟项目，但你最应该关注的是苹果的 iTunes 联盟计划（iTunes Affiliate Program）。由于\
  \ iTunes Store 和 App Store 内置于每一台 iPhone、iPad 和 iPod touch 中，应用可以轻松链接到音乐、电影、电视剧、有声读物甚至其他应用的商店页面。免费的精简版应用经常这样做，引导用户到\
  \ App Store 中的完整付费版本，希望他们购买。\n\n因此，这里并不缺少链接。成千上万的 iOS 应用及其相关网站充斥着指向 iTunes Store\
  \ 和 App Store 的链接。我觉得奇怪的是，这些链接中有很大一部分不是联盟链接。我经常惊讶于有多少开发者仍然没有利用这个免费的收入机会。\n\n从可能仅售\
  \ 99 美分的数字商品上赚取 5% 的佣金听起来并非一笔意外之财，但就像低价的应用程序销售一样，这种商业模式全靠走量。如果你正在将应用用户或网站访问者引导至\
  \ iTunes Store，并且苹果正通过这些链接获利，那么你为苹果带来的销售为何不应得到补偿呢？如果你的应用不在前 200 名之内，在 App Store\
  \ 里赚钱已经很困难了，为什么还要忽略这个轻松赚取额外现金的选择呢？作为软件业务所有者，你应该寻找 iOS 应用和网站能够（合法地）带来的所有可能的收入流。在这种情况下，你只需要免费注册联盟计划并修改现有的\
  \ URLs。\n\n还不相信这值得一试吗？这里有一条小信息可能会激起你的兴趣。\n\nPandora 是在线最受欢迎的网络广播服务之一，其 Pandora iOS\
  \ 应用常年受到青睐，一直徘徊在 App Store 免费音乐应用前十名。喜欢当前播放歌曲的听众可以轻松点击“从 iTunes 购买”按钮来购买该曲目（见图 6-10）。该按钮使用了一个联盟链接，将用户引导至\
  \ iTunes 中相应的歌曲页面。如果该用户购买了这首曲目，Pandora 就能赚取佣金。\n\n![9781430262381_Fig06-10.jpg](img/9781430262381_Fig06-10.jpg)\n\
  \n**图 6-10.** Pandora 网络广播应用包含了指向 iPhone 内嵌 iTunes Store 的联盟链接，使听众能够轻松购买当前播放的歌曲\n\
  \nPandora 的首席技术官 Tom Conrad 透露，通过 Pandora 网站和 iOS 应用，Pandora 的听众每月通过他们的联盟链接购买约 100\
  \ 万首歌曲！而在这些歌曲销售中，Pandora 的 iOS 应用占据了其中的 20%。\n\n不难看出，庞大的客户群如何能为 iTunes Store 带来巨大流量，将这些联盟链接转变为主要的收入来源。从\
  \ iTunes 联盟链接赚取的佣金是许多社交游戏平台（例如 OpenFeint，已在第 5 章讨论）的主要收入来源之一，这也是它们能够免费向 iOS 开发者提供那些功能丰富的游戏服务的原因。\n\
  \niTunes 联盟计划的一大优点是，当用户通过你的联盟链接进入 iTunes Store 后，在 24 小时内（或直到他们点击另一个联盟链接之前），他们购买的所有商品你都能获得\
  \ 5% 的佣金。Pandora 发现，许多听众不仅通过他们点击的联盟链接购买了歌曲，还会继续购买其他几首歌，这无疑增加了 Pandora 的佣金收入。\n\n\
  诚然，你的 iPhone 或 iPad 应用可能没有 Pandora 那么多的用户（没有多少应用能达到那种受欢迎程度），所以让我们来看一个更现实的场景。假设你的应用每个月引导约\
  \ 5 万人进入 iTunes Store。即使只有一半的人最终购买了一两件 99 美分的数字商品，按照 5% 的联盟佣金计算，你每月将赚取 1250 到 2500\
  \ 美元。这仅仅是通过一次性更改你嵌入的 iTunes Store 链接就能获得的收入，不费吹灰之力。\n\n**加入 iTunes 联盟计划**\n\n要注册\
  \ iTunes 联盟计划，请访问`http://www.apple.com/itunes/affiliates/`。\n\n不同地区有不同的联盟网络。目前，你的选择包括\
  \ `LinkShare`（美国）、`TradeDoubler`（欧洲）、`LinkShare Japan`（日本）以及 `dgm`（澳大利亚和新西兰）。不要注册代表你所在地区的联盟网络，而是选择最适合你应用目标受众的网络。\n\
  \n这里，我们将使用主要面向美国的联盟网络 `LinkShare` 来逐步演示流程。点击 `LinkShare` 链接将带你进入 `LinkShare` 的注册表单。如果你已有\
  \ `LinkShare` 账户，只需登录 `http://www.linkshare.com`。\n\n完成注册流程并登录到你的 `LinkShare` 账户后，还有一个步骤。`LinkShare`\
  \ 是数百家零售商的联盟网络，因此你需要在 `LinkShare` 账户中申请加入你感兴趣的各个联盟计划。在 `LinkShare` 的广告商网络中搜索关键词\
  \ `iTunes`，搜索结果中会显示 iTunes 联盟计划（见图 6-11）。点击“申请”按钮，并同意苹果的条款和条件。\n\n![9781430262381_Fig06-11.jpg](img/9781430262381_Fig06-11.jpg)\n\
  \n**图 6-11.** 注册 `LinkShare` 后，你需要在 `LinkShare` 账户中申请 iTunes 联盟计划。搜索 `iTunes`，然后点击“申请”按钮\n\
  \n由于苹果会手动批准所有联盟成员，你需要等待收到批准确认电子邮件后，才能创建任何联盟链接。\n\n一旦被苹果批准成为官方 iTunes 联盟成员，请重新登录你的\
  \ `LinkShare` 账户，并导航至 iTunes 联盟计划页面（列在“我的广告商”部分）。你应该会看到一个蓝色的 iTunes 创建链接横幅，下方有一排按钮（见图\
  \ 6-12）。\n\n![9781430262381_Fig06-12.jpg](img/9781430262381_Fig06-12.jpg)\n\n**图\
  \ 6-12.** 要为 iTunes Store 中的商品生成联盟链接，你需要使用苹果的专用链接生成器工具\n\n要为你的 iOS 应用和网站生成 iTunes\
  \ 联盟链接，请点击“链接生成器工具”按钮。（不要使用 `LinkShare` 的链接构建功能。）苹果的链接生成器工具非常易于使用。你可以轻松搜索特定产品，然后复制在线工具提供的自定义联盟链接。\n\
  \n就是这么简单。在你的应用和网站中使用这些特殊的链接（它们包含你的联盟 ID），就能开始通过你为 iTunes Store 带来的流量赚取额外收入了。\n\n\
  **免费的力量**\n\n\n\n#### 免费应用的变现方式\n\n免费应用的最后一种变现方式可能大多数开发者都想不到，而且这种模式具有一定的赌博性质。如今，许多大型企业会仅凭一款应用的用户数量就收购其所有权。这类情况正日益增多。最典型的例子当属\
  \ `Instagram`。\n\n`Facebook` 在极易受影响的青少年群体中发现了一个新兴市场。这款照片分享应用从未、也永远不会产生任何直接收益——没有广告、没有内购、也没有升级到高级版本的营销。`Facebook`\
  \ 纯粹是为了其用户基础，以十亿美元现金收购了 `Instagram`。没错，是十亿美元（Billion）。\n\n另一款采用完全相同策略的应用是 `Snap\
  \ Chat`。这款应用允许用户发送“阅后即焚”的图片消息。它在青少年群体中非常流行，并曾收到过多次数十亿美元的收购要约。\n\n这里的核心在于确定你的终局战略：你是想直接从用户身上赚钱，还是致力于被第三方收购？如果目标是那笔巨额收购，那么让你的应用永远免费可能是最佳选择。\n\
  \n### 转变思路\n\n付费应用并非移动领域中唯一的盈利途径。你是否想真正利用“免费”的力量来创造更多收入？本章讨论的推广版精简版应用和其他商业模式只是冰山一角。接下来的两章将深入探讨应用内广告和内购模式。\n\
  \n## 第 7 章：利用 iAd 及其他应用内广告机会实现免费应用变现\n\n移动广告被广泛视为下一个重要的营销前沿，广告商们竞相瞄准不断增长的用户群体。本章将深入剖析应用内广告的世界，为你介绍适用于\
  \ iOS 应用的移动广告网络，以及通过应用内分析追踪使用情况的价值。同时，还会探讨其他替代广告模式，如赞助和植入式广告合作。\n\n### 何时使用应用内广告\n\
  \n我们都有过下载显示某种应用内广告的免费应用的经历，其中不少人甚至点击过这些广告。根据当前趋势，研究专家`Gartner`预测，到 2014 年移动广告支出将超过\
  \ 170 亿美元。就连苹果公司也通过推出在 iOS 应用中投放广告的 `iAd` 平台，涉足这一利润丰厚的市场。但关键问题在于：应用开发者真的能从中赚钱吗？\n\
  \n应用内广告是一种无需依赖付费内容销售就能实现免费应用变现的有效方式，但它并非对所有应用都是可行的商业模式。你需要深入审视自己正在构建的是哪种应用，以及用户将如何使用你的应用。\n\
  \n#### 了解你的受众\n\n如果你开发的免费应用能吸引广泛的主流市场，并且用户使用频率很高，那么你或许能从应用内广告中获得可观的收入。关键在于*流量*。\n\
  \n这方面最经典的案例是昙花一现的游戏神作 `Flappy Bird`。这款游戏免费，通过在主屏幕和游戏结束画面展示 `iAd` 广告来创收。该游戏的设计初衷就是成为一种潮流，吸引所有人，因此免费应用的思路完全合理。`Flappy\
  \ Bird` 仅凭 `iAd` 每天就能产生超过 5 万美元的收入。\n\n使用你应用的人越多，累积的广告展示次数和点击量就越高。如果你的应用足够“粘人”，能长时间吸引用户的注意力，它就能展示更多的横幅广告，从而为你带来更多的广告分成收入。\n\
  \n如果你的免费应用面向小众市场，吸引力有限，那么它可能无法产生足够的广告收入来支撑你的业务。另一方面，服务于小众市场也可能让你从优质广告网络获得更高的费率，因为那些品牌广告主渴望精准触达这些受众。尽管这类小众应用最终吸引的用户数量不如大众市场应用，但它可以通过每个广告赚取更多收入来弥补差距。\n\
  \n以下是一些需要考虑的因素：\n\n- **使用网络的应用：** 如果你的应用需要网络连接（例如访问 GPS 信息、网络服务或在线社交网络），那么添加应用内广告不会给用户带来不便，因为他们在运行你的应用时已经在线。请务必牢记这一点，因为尽管\
  \ iPhone 通常有持续的网络连接（通过 Wi-Fi 或蜂窝网络），但 iPod touch 和 iPad 用户可能并非随时都有 Wi-Fi 连接。如果你的大部分用户倾向于离线使用你的应用，那么应用内广告就无法为你带来任何收入。如果应用无法与广告网络服务器通信，它就无法展示广告。\n\
  - **面向年轻用户的应用：** 如果你的应用是面向青少年的游戏或教育应用，应用内广告可能并不合适。一方面，家长可能不喜欢那些直接向孩子做广告的应用。此外，在部分地区向幼儿投放广告可能是非法的，因此做好法律方面的功课至关重要。\n\
  - **娱乐应用和休闲游戏：** 许多娱乐应用，尤其是休闲游戏和棋类游戏，非常适合采用应用内广告模式，特别是那些需要联网登录在线排行榜或游戏网络的应用。如果用户界面设计得当，插入在屏幕顶部或底部的横幅广告应该不会影响游戏体验。一个例子是《愤怒的小鸟免费版》（`Angry\
  \ Birds Free`），它通过应用内广告盈利。其开发公司 `Rovio` 通过创造性地将广告横幅滑入和滑出屏幕顶部，避免了遮挡实际的游戏画面（参见图 7-1）。\n\
  \n![9781430262381_Fig07-01.jpg](img/9781430262381_Fig07-01.jpg)\n\n图 7-1. 《愤怒的小鸟免费版》将广告横幅滑入和滑出屏幕顶部，以避免遮挡实际的游戏画面\n\
  \n- **沉浸式游戏：** 在全屏、沉浸式的 3D 游戏中整合应用内广告非常困难。通常，在这种情况下唯一的选择是在游戏关卡之间展示广告。这通常并不理想，因为那样会大幅减少应用能够产生的广告展示次数，尤其是在游戏关卡需要用户花费很长时间才能完成的情况下。\n\
  \n如果你决定通过应用内广告来变现你的免费 iOS 应用，请务必从最初 1.0 版本发布时就这样做。如果你的应用从一开始就包含广告，用户会自然而然地将其视为免费下载的代价。如果你的应用已经积累了一批忠实用户，他们享受了多个无广告版本，那么在后续更新中突然引入应用内广告必然会令许多粉丝反感。一如既往，你需要避免在\
  \ App Store 收到负面用户评价，因此请提前仔细规划你的免费应用策略。\n\n#### 作为销售工具的应用内广告\n\n\n\n如果你不完全依赖广告收入，并决定发布一个免费的精简版来推广付费应用，那么可以考虑仅在精简版中使用应用内广告。根据你正在开发的应用类型，这不仅可以有效地将该免费应用变现，还能促使用户升级到付费应用以获得无广告的体验。这就是《愤怒的小鸟免费版》（参见图\
  \ 7-1）背后的商业模式，它提供了十几个免费游戏关卡并带有应用内广告。为了获得更多游戏关卡和无广告体验，用户被鼓励购买《愤怒的小鸟》付费应用。\n\n即使你不提供单独的付费应用，一些用户也会更喜欢你应用的无广告版本。许多免费应用，例如\
  \ Tweakersoft 的 `AroundMe`（参见图 7-2），通过应用内购买提供了一个移除广告的付费选项。这样，你的应用保持免费下载，可供任何想要尝试的人使用。忠诚的客户可以继续使用带有广告的免费版本，也可以选择支付少量应用内费用来移除广告。这使得你的应用无论用户选择哪种方式都能产生收入。有关应用内购买的深入介绍，请参见第\
  \ 8 章。\n\n![9781430262381_Fig07-02.jpg](img/9781430262381_Fig07-02.jpg)\n\n图 7-2.\
  \ Tweakersoft 的免费应用 `AroundMe`，提供了一项通过应用内购买移除广告的无广告选项。\n\n### 选择移动广告网络\n\n苹果公司在\
  \ 2010 年推出的 `iAd` 引起了巨大的媒体轰动。有关参与应用通过广告展示和点击获得可观利润的新闻，吸引了大量 iOS 开发者加入 `iAd` 网络。对于设计用来容纳横幅广告的应用界面来说，`iAd`\
  \ 是一个诱人的选择。苹果公司一直在努力增加 `iAd` 网络的广告库存，并将其可用性扩大到美国以外，以提升其对开发者的价值和覆盖范围。但 `iAd` 显然不是唯一的选择，并且可能不是你特定应用需求的最理想广告解决方案。\n\
  \n#### 调查可用选项\n\n彻底调查所有兼容 iOS 的广告网络，以找到提供你所需解决方案的选项，这一点至关重要。尽管市面上有数十个移动广告平台，但此处我将重点限于那些为\
  \ iOS 开发者提供应用内广告 SDK 的主要平台。\n\n以下是一些值得探索的广告网络网站：\n\n*   `iAd` (`http://developer.apple.com/iad/`)\n\
  *   谷歌的 `AdMob` (`http://www.admob.com`)\n*   `Greystripe` (`http://www.greystripe.com`)\n\
  *   `Millennial Media` (`http://developer.millennialmedia.com`)\n*   `InMobi` (`http://www.inmobi.com`)\n\
  *   `iVdopia` (`http://www.ivdopia.com`)\n*   `Jumptap` (`http://www.jumptap.com`)\n\
  *   `Medialets` (`http://www.medialets.com`)\n*   `MobFox` (`http://www.mobfox.com`)\n\
  *   `Mojiva` (`http://www.mojiva.com`)\n*   `Rhythm NewMedia` (`http://www.rhythmnewmedia.com`)\n\
  *   `Say Media` (`http://saymedia.com`)\n*   `Smaato` (`http://www.smaato.com`)\n\
  *   `YuMe` (`http://www.yume.com`)\n\n归根结底，一个成功的广告支持型应用最重要的因素是确保 100% 的填充率（始终有广告可供展示），并为你的应用广告空间赚取最优费率。实现这些目标可能需要在你的应用中支持多个广告网络。许多开发者利用广告中介层和广告交易平台，例如以下服务提供的平台：\n\
  \n*   `AdWhirl` (`http://www.adwhirl.com`)\n*   `Burstly` (`http://www.burstly.com`)\n\
  *   `Mobclix` (`http://www.mobclix.com`)\n\n#### 哪个广告网络适合你？\n\n除了易于使用、可在五到十分钟内集成到应用中的\
  \ SDK 之外，所有这些广告网络也都是免费的，并提供类似的功能，那么你应该选择哪一个呢？这实际上取决于你应用的切实需求。你应该根据以下标准来做决定：\n\n\
  *   支持的广告尺寸和格式\n*   报告和分析功能\n*   全球可用性和定向能力\n*   收益和填充率\n\n让我们更仔细地看看这些因素会如何极大地影响你的应用在应用内广告方面的成功。\n\
  \n请记住，这些广告网络总是在发展和变化，有时会损害开发者的利益。请密切关注 `http://iphonedevsdk.com/forum/business-legal-app-store/`，因为那里总是有关于不同广告网络以及它们做得对与错的帖子。\n\
  \n### 支持的广告尺寸和格式\n\n首先也是最重要的，你选择的移动广告网络必须支持能够很好地适配你 iOS 应用 UI 和屏幕尺寸的广告尺寸。例如，有些广告网络只为\
  \ iPhone 和 iPod touch 提供固定的竖屏和横屏横幅广告尺寸，这对于 iPad 应用的更大屏幕来说可能会出现问题。\n\n如果横幅广告不适合你应用的特定界面需求怎么办？有些广告网络专注于全屏富媒体广告或视频广告，这更适合游戏和传统横幅广告不实用的自定义\
  \ UI。\n\n如果交叉推广对你的免费广告支持型应用来说是一个有价值的功能，那么请特别注意那些允许你将部分广告库存分配为自定义“内部广告”的广告网络。你可以使用这些内部广告来推广你的其他应用和/或应用内购买项目，同时还可以作为交换网络的一部分，与其他第三方应用交换广告。虽然你不会从这类交叉推广广告中赚取任何广告收入，但如果你的免费应用拥有庞大的用户群，它们可以帮助带动大量流量和销售，流向你的其他付费应用和内容。\n\
  \n### 报告和分析功能\n\n为了正确评估应用内广告业务模式的有效性，你必须能够衡量的你应用内广告展示的频率和效果。所有广告网络都提供基于网页的报告，用于报告应用内投放的广告情况，但有些报告比其他报告更全面。在做决定之前，你应该尝试查看一份报告示例。\n\
  \n但赚取的广告收入并不是唯一值得追踪的统计数据。大多数（如果不是全部）移动广告网络也提供作为其 SDK 一部分的集成化分析包。这对于追踪应用使用情况以及找出你应用的哪些部分获得最多流量至关重要。这些信息将帮助你优化应用内广告的放置位置以提高广告收入，并改进应用的总体性能和设计，使其更好地匹配用户的使用方式。2010\
  \ 年，苹果公司更改了其关于分析的政策，仅允许在用于跟踪和改进应用内广告投放时使用第三方分析工具。我将在本章后面更详细地讨论应用内分析。\n\n### 全球可用性和定向能力\n\
  \n单一广告网络可能无法覆盖你的应用所销售的所有 App Store 地区，因此请考虑如何为所有用户提供应用内广告，无论他们身处何地。这可能需要组合使用多个广告网络，或者利用一个支持多个广告网络和中介层的服务。\n\
  \n当苹果公司的 `iAd` 网络首次推出时，最初仅限于北美大陆。在接下来的几个月里，苹果开始在其他地区（例如欧洲和日本）逐步推出 `iAd`。当你读到本文时，`iAd`\
  \ 可能在足够多的地区已经建立完善，使其成为面向全球应用的一个可行的应用内广告解决方案。\n\n但如果你担心某些地区或国家得不到服务，你可能需要在你的应用中支持一个以上的广告网络。许多开发者将他们的应用编程为：为美国用户提供\
  \ `iAd`，为欧洲用户提供 `MobFox` 或 `InMobi`，为世界其他地区提供 `AdMob`。这就是位置感知和应用内分析可以帮助确定为每个用户调用哪些广告网络的地方。\n\
  \n\n\n#### 用户定向与广告收入\n\n你成功的另一个关键要素是广告定向。确保你选择的广告网络能够将合适的广告与你的应用特定受众群体相匹配。例如，如果你的应用主要面向男性用户（如\
  \ `iPad 版 Maxim HD`），那么女性时尚和化妆品的广告很可能不适合这个人群。无法吸引用户注意力的不相关广告将不会被点击。点击量越少，你的广告收入就越低。\n\
  \n#### 收入与填充率\n\n广告分成收入基于有效的每千次展示成本（eCPM）。苹果的 iAd 网络目前拥有移动广告领域最高的 eCPM 费率，这得益于其知名品牌广告主。\n\
  \n作为一项新业务，在运营的头六个月内，iAd 的广告库存量很小。因此，尽管广告费率很高，但并没有足够的广告来填充网络中参与应用的广告位。结果，批评者抱怨 iAd\
  \ 的填充率低。尽管苹果此后通过增加更多品牌广告主并推出 iAd 开发者计划，努力扩充其广告库存，但支持多个广告网络以确保你的应用达到 100% 的填充率始终是个好主意。\n\
  \n由于 iAd 的高 eCPM 费率，许多开发者将 iAd 设置为第一个请求广告的广告网络。如果没有可用的 iAd，应用会自动从第二个广告网络（如 Google\
  \ 流行的 `AdMob`）请求广告。\n\n使用像 `AdWhirl` 或 `Burstly` 这样的广告中介层服务的一个主要优势是，它能确保最佳的填充率和良好的平均\
  \ eCPM。`AdWhirl` 和 `Burstly` 不仅支持一长串领先的广告网络，它们也支持 iAd。`Mobclix` 是另一个有吸引力的平台，它支持多个主要广告网络。\n\
  \n要区分哪些广告网络仅根据广告的实际点击次数付费，哪些也对广告展示（曝光）付费。一些广告网络宣称拥有高 eCPM 费率，却不提这些诱人的费率通常只占其广告库存的一小部分，并且仅适用于覆盖特定人群的精选应用。\n\
  \n再次强调，在选择广告网络之前，务必做好功课。请记住，如果你的应用没有庞大的用户基础或没有吸引到令人垂涎的用户群体，那么你的应用可能无法获得高 eCPM 费率。\n\
  \n### 通过广告支持的应用构建业务\n\niOS 开发者能否仅依靠应用内广告的收入维持生计？在决定你的产品是作为付费应用发布，还是作为免费广告支持应用发布时，做好计算很重要。一个付费应用销售将为你带来至少\
  \ 70 美分（基于 0.99 美元的价格）。如果它是一个广告支持的免费应用，它能否产生足够的广告展示和点击，使每个用户为你带来超过 70 美分的净收入？对于一个使用频率高的应用，你可以自信地回答“是”，但对于用户很少的应用，答案可能是令人惊讶的“否”。\n\
  \n如果你的平均 eCPM 在 1 美元左右，那么要赚到超过 1000 美元，你的应用内广告需要至少获得 1,000,000 次广告展示。考虑到市面上有超过 1.6\
  \ 亿台 iOS 设备，你的免费应用获得 100 万次广告展示应该不难，对吧？\n\n仅仅因为你的应用是免费的，并不能保证会有海量的下载。App Store 中的应用实在太多，都在争夺人们的注意力。只有一小部分应用拥有数十万用户的健康客户群，一些顶尖应用更是拥有数百万用户。但这不是常态。App\
  \ Store 中超过一半的免费应用只有几千人下载。如果你的应用属于后一类，那么你每天可能只能获得区区几美元的广告收入——这绝对不足以支撑你的全职薪资。\n\n\
  虽然这听起来可能有些黯淡，但请记住，你的应用不一定非得是畅销榜前十的爆款才能通过应用内广告赚钱。有不少免费、广告支持的应用，由于开发者们深思熟虑的战略规划和营销创意，而获得了稳定的收入。\n\
  \n### 平衡 UI 设计美学与广告\n\n你需要考虑广告的展示将如何影响你的 UI。无论你是提供一个可移除广告的单一版本，还是提供两个版本（一个带广告的免费版和一个不带广告的付费版），你的\
  \ UI 设计都需要适应你所选择的方法。\n\n#### 设计带可移除广告的免费应用\n\nHog Bay Software 的 Jesse Grosjean\
  \ 通过发布他的免费写作应用 `PlainText`（同时适用于 iPhone 和 iPad），首次涉足移动广告领域。他之前的 iOS 产品，流行的 `TaskPaper`\
  \ 和 `WriteRoom`，都是以付费应用的形式发布的。但由于 `PlainText` 中基于云端的 Dropbox 文件同步选项，用户需要联网。这为 Jesse\
  \ 尝试应用内广告提供了一个独特的机会。\n\n`PlainText` 的目标是为写作者提供一个极简、无干扰的 UI，因此对 Jesse 来说，不让丑陋的横幅广告弄乱屏幕非常重要。大多数\
  \ iAd 横幅设计精良，因此，与其为了利用最佳的 eCPM 和填充率而同时使用多个广告网络，他更看重保持应用 UI 设计的完整性，并决定只支持 iAd。当有\
  \ iAd 可用时，整个 `PlainText` UI 会向上移动，在底部为 iAd 腾出空间。如果没有 iAd 显示，`PlainText` UI 会恢复到正常状态，隐藏广告横幅框架（参见图\
  \ 7-3）。\n\n![9781430262381_Fig07-03.jpg](img/9781430262381_Fig07-03.jpg)\n\n图 7-3。Hog\
  \ Bay Software 的 PlainText 根据屏幕底部是否有 iAd 显示，动态调整应用 UI 的高度\n\nJesse 承认，他独家使用 iAd\
  \ 的决定并未让他真正优化其应用内广告效果，尤其是因为 iAd 需要 iOS 4，所以在 iOS 3 上运行 `PlainText` 的用户根本看不到任何广告。尽管有这一限制，他对结果还是满意的。这款免费应用还提供了一个应用内购买选项来移除广告。\n\
  \n“与我的付费应用相比，`PlainText` 的下载量要多得多，但利润却更少，”Jesse 透露。“在略多于两个月的时间里，`PlainText` 获得了大约\
  \ 225,000 次下载，通过应用内购买赚了大约 3,000 美元，通过 iAd 赚了大约 7,000 美元。”\n\n尽管选择购买“移除广告”应用内购买项目的人数仅占\
  \ `PlainText` 总用户的大约 1%，但这仍然是该应用收入的重要组成部分。这种免费、广告支持应用结合用于移除广告和/或销售附加功能的 IAP 组件的混合模式，可以是一个非常强大的组合。\n\
  \n#### 设计两个版本：带广告版与无广告版\n\n一些开发者不提供移除广告的应用内购买选项，而是简单地发布两个版本的应用：一个带广告的免费版和一个无广告的付费版。这是\
  \ Optime Software 采用的策略，这家公司完全建立在移动广告收入的基础上。该公司最初只发布了免费应用——`Checkers Free`、`Dots\
  \ Free`、`Chess Free`、`Tic Tac Toe Free`、`Four in a Row Free` 以及其他经典游戏。他们的许多免费应用在\
  \ App Store 排行榜上持续名列前茅。\n\n\n\n应客户要求，Optime Software 开始提供其游戏的无广告高级版本。CEO Jon Schlegel\
  \ 解释道：“美国以外的许多用户没有无限数据套餐，他们担心广告下载带来的成本。用户对高级版本的反应非常积极。如果用户经常使用某款游戏，他们大多会购买其高级版本。”\n\
  \n与通过`PlainText`调整 UI 大小来动态显示或隐藏广告横幅框架不同，Optime Software 在设计其免费应用界面时，会特意为横幅广告预留空间。无广告的高级版本则能够利用整个屏幕，拉伸各个游戏元素之间的间距，为整体\
  \ UI 设计提供更多呼吸空间（参见图 7-4）。\n\n![9781430262381_Fig07-04.jpg](img/9781430262381_Fig07-04.jpg)\n\
  \n图 7-4. Optime Software 根据版本不同，调整其游戏中各种 UI 元素的位置。免费应用需要在屏幕底部为广告横幅留出足够空间（左图），而付费高级版本则无需如此（右图）\n\
  \n这种方法的明显缺点是开发和维护两个独立版本。Optime Software 在引入应用内购买之前很久就在使用这一策略，但这样做的一个显著好处是，在 App\
  \ Store 中拥有两个应用，而不是只有一个。在免费和付费应用排行榜上都有应用，这种可见度的提升有助于推广两个版本。Jon 承认：“我们从广告支持的免费应用中获得的收入远高于高级应用，但免费应用也有助于提高可见度，并为我们的高级应用创造提升。我们许多高级应用能够进入其类别的前\
  \ 100 名，完全依赖于免费版本的用户升级转化。”\n\n---\n\n找到广告网络的最佳组合\n\nFocused Apps 的 Mark Johnson\
  \ 在其众多免费应用（包括`Focus for Facebook`、`Hit Tennis 2`和`Santa's Lil' Zombies`）中，对应用内广告有着相当丰富的经验。他慷慨地分享了一些从大量实验中获得的宝贵见解，这些实验旨在找到\
  \ eCPM（有效每千次展示成本）和填充率的最佳组合。\n\n“通过第三方广告赚钱很难。对我们来说，这只是收入的一小部分。要让‘免费+广告’模式奏效，你需要足够的用户量和一款粘性高的应用，”Mark\
  \ 表示，“换句话说，你需要大量的下载量，一个用户经常使用的应用，并且他们会将应用保留在手机上，在很长一段时间内反复使用（而不是玩了一周后就删除）。”\n\n\
  `Focus for Facebook`展示了来自`iAd`、`AdMob`等领先广告网络的广告。广告横幅框架出现在屏幕底部，表格视图在其后方滚动（参见图 7-5）。这种布局使广告始终保持高度可见，同时不妨碍用户阅读\
  \ Facebook 信息流。\n\n![9781430262381_Fig07-05.jpg](img/9781430262381_Fig07-05.jpg)\n\
  \n图 7-5. 免费的`Focus for Facebook`应用由应用内广告支持，展示来自`iAd`（左图）、`AdMob`（右图）及其他广告网络的广告\n\
  \n“在我们的一个应用中，我们使用`Burstly`作为广告网络集成商，这样如果`iAd`没有为我们提供广告，`Burstly`就会从其他广告网络中投放一个广告，”Mark\
  \ 说。“不同的广告网络在填充率、eCPM、广告质量等方面各不相同，而且所有这些因素都因国家而异。我们大约一半的广告库存展示在美国，另一半在其他国家。我们一直在尝试不同的广告网络，以了解在不同国家能获得怎样的填充率和\
  \ eCPM。没有哪个广告网络在所有国家都表现最佳。自然，富裕国家的 eCPM 更高，但广告网络在每个国家的销售团队会影响他们能销售的量与价值，当然，英文文本广告不如当地语言的广告效果好。目前`iAd`在美国的回报不错，而且还在增长。我建议开发者优先考虑`iAd`，辅以`AdMob`和你自己的自有广告（`AdMob`有很好的内置自有广告解决方案）。也可以考虑使用`AdWhirl`或`Burstly`。”\n\
  \n---\n\n利用自有广告的力量\n\n正如我在本章前面提到的，自有广告是你为在应用广告横幅框架中展示而创建的自定义广告。如果你愿意放弃一些第三方广告来展示自己的自有广告，这将是推广其他创收服务和产品（如付费应用）的绝佳方式。Mark\
  \ Johnson 就此话题分享了大量见解：\n\n“免费应用自然会获得更多下载量，这是一个巨大的优势。我们在免费应用中的广告空间用途远不止展示第三方广告。我们通过展示自有广告来做很多事情，例如：引导用户升级到付费版本；推广应用内购买；宣传我们的其他应用；征求用户反馈以帮助我们规划下一版本；吸引人们加入我们的邮件列表；让用户为我们发推文宣传。我认为制作免费应用的最大优势并非广告收入，而是能够接触到大量用户，然后创造性地利用自有广告来辅助其他业务线。这非常有效。我们邮件列表约\
  \ 95% 的注册来自‘加入邮件列表以解锁免费关卡’这样的自有广告，而只有 5% 来自我们的‘联系我们’页面。”\n\n在免费应用中展示自有广告以交叉推广其他付费应用和应用内购买产品，这一策略也让`Backflip\
  \ Studios`受益匪浅。其许多应用，例如超受欢迎的`Paper Toss`（参见图 7-6），都是常年热门，在 App Store 排行榜上名列前茅。凭借超过\
  \ 4700 万次的 iOS 应用下载量，`Backflip Studios`通过在其多个免费应用中的应用内广告，每月收入达 50 万美元。而且这仅是将 60%\
  \ 的广告展示机会分配给第三方广告（如`AdMob`）的结果。其余 40% 的广告展示机会是由`Backflip Studios`分配的自有广告，用于推广其所有其他应用，无论是免费还是付费版本。\n\
  \n![9781430262381_Fig07-06.jpg](img/9781430262381_Fig07-06.jpg)\n\n图 7-6. 适用于 iPad\
  \ 的`Paper Toss HD Free`利用专用广告空间，不仅展示第三方广告，还展示`Backflip Studios`用于推广其他应用的自有广告\n\n\
  免费应用的平均使用率在下载后的前几周内会急剧下降，30 天后，只有不到 5% 的用户会重新使用该应用。要使应用内广告成为一项有利可图的收入来源，你的应用需要尽可能多地展示广告，这需要大量用户的持续使用。\n\
  \n\n\n如果你的应用完全依靠应用内广告来盈利，制定营销和开发策略就至关重要——这些策略不仅要能吸引新用户，还要能让应用的生命周期超过最初的 30 天平均值。因此，即使是提供免费应用，开发者也不能固步自封，坐等广告收入滚滚而来。你应该像对待付费应用一样，投入同样多的精力来推广和持续更新一款免费、由广告支持的应用，以确保你的应用内广告解决方案能够带来回报。\n\
  \n但如果你的免费应用一炮而红，冲进 App Store 前 100 名，那么通过应用内广告赚取大笔收入是可能的。如果你同时拥有多款排名靠前的免费应用都在产生广告收入，那么你手上就可能拥有一项非常有利可图的业务。\n\
  \n### 在你的 iOS 应用中集成苹果的 iAd\n\n在了解了其他开发者通过应用内广告取得的成功后，你可能也迫不及待想亲身体验一下。由于篇幅所限，本书无法为每个第三方移动广告网络都提供集成说明，因此在示例中，我们将以\
  \ iAd 为例。一旦你掌握了如何在 iOS 应用中使用苹果的 iAd 框架，再自行学习其他第三方 SDK（例如 AdMob）就会变得非常容易。\n\n我们将从使用\
  \ iAd 网络的基础知识开始，然后深入讲解设计和编程应用以支持 iAd 的完整流程。所以，卷起袖子，我们开始吧。\n\n**注意**：如果你想了解更多关于 iAd\
  \ 的信息，请查看以下苹果官方开发者链接（可能需要登录你的 iOS 开发者账号）：iAd 开发（`http://developer.apple.com/iad/`）和面向\
  \ iAd 的 App Store 资源中心（`http://developer.apple.com/appstore/resources/iad/`）。\n\n\
  #### 加入 iAd 网络\n\n在开始使用 iAd 之前，即使是在 Xcode 的 iOS 模拟器中进行测试，你都需要先加入 iAd 网络。这是在 iTunes\
  \ Connect 中完成的，请登录——`http://itunesconnect.apple.com`——然后导航至“合同、税务和银行”部分，以申请加入 iAd\
  \ 网络（参见图 7-7）。\n\n![9781430262381_Fig07-07.jpg](img/9781430262381_Fig07-07.jpg)\n\
  \n图 7-7. 在开始在你的应用中使用 iAd 框架之前，你首先必须在 iTunes Connect 中加入 iAd 网络\n\n一旦你的 iAd 网络合同请求被苹果批准，你将能够使用\
  \ iAd 框架成功开发和测试你的应用。\n\n需要注意的是，在 iOS 模拟器和你的测试设备上运行应用时，你唯一会看到的广告是默认的 iAd 测试广告。点击测试\
  \ iAd 横幅只会显示测试广告视图。你的应用不会显示真实的 iAd 横幅，除非你将该应用提交到 iTunes Connect 并在其中为该应用启用了 iAd。\n\
  \n#### 设计你的应用以展示 iAd 横幅\n\niAd 广告有两种类型。一种是典型的 iAd 横幅视图，在许多由广告支持的 iOS 应用中都能看到（例如，参见图\
  \ 7-3 和 7-4）。另一种是全屏沉浸式广告，称为 iAd 插页视图，在 iOS 4.3 中引入。为简单起见，我们将在本书中只关注更流行的 iAd 横幅视图类型。如果你想了解更多关于实现\
  \ iAd 插页视图的信息，请查阅苹果 iOS 开发者中心的在线文档。\n\n如果你已经在 iOS 应用中见过 iAd，那么你对它们的基本运作方式应该不陌生。一个\
  \ iAd 横幅被策略性地放置在应用的用户界面（UI）中，当用户点击时，不会离开当前应用。取而代之的是，一个全屏广告会以模态视图的形式在应用内部显示。关闭这个模态广告视图会将用户带回应用。\n\
  \n正如你所料，iAd 横幅的大小与其他移动广告尺寸非常相似：\n\n*   竖屏 iPhone iAd 横幅：宽 320 点 × 高 50 点\n*   横屏\
  \ iPhone iAd 横幅：宽 480 点 × 高 32 点\n*   横屏 iPhone 5/5S iAd 横幅：宽 568 点 × 高 32 点\n*\
  \   竖屏 iPad iAd 横幅：宽 768 点 × 高 66 点\n*   横屏 iPad iAd 横幅：宽 1024 点 × 高 66 点\n\n目标是将广告横幅插入到你应用的\
  \ UI 中，同时不干扰用户体验。但与此同时，你也希望将广告放在用户容易看到的位置，以获取展示次数和点击量。\n\n如果你计划将 iAd 横幅框架放在屏幕顶部，苹果建议将其放置在顶部导航栏或工具栏的上方。如果你计划在屏幕底部附近显示\
  \ iAd 横幅框架，苹果也建议将其添加到工具栏或标签栏上方，但这并非在所有情况下都适用。例如，如果一个 iPad 应用使用底部带有工具栏的分割视图控制器，则无法将横屏广告横幅放置在这些工具栏上方，因为此时本质上存在两个不同的视图（在横屏模式下，主面板和详细面板是并排的）。在这种场景下，你需要将广告横幅放置在工具栏下方。\n\
  \n可能让许多开发者感到惊讶的是，`iAd` 横幅视图必须作为子视图添加到 `UIView` 中。如果你知道你的应用总是在屏幕上的某个固定位置显示广告，为什么不在\
  \ Interface Builder 中直接将 `iAd` 横幅视图添加到一个已有的 `UIView` 中呢？如果你的应用支持多个广告网络，你总是有广告可展示，那又为什么不这么做呢？实际上，有三个非常重要的原因，要求你确保广告视图可以在应用运行时动态地从\
  \ UI 中移除，正如 Hog Bay Software 的 PlainText 所演示的那样（参见图 7-3）：\n\n*   如果用户的设备失去了蜂窝网络或\
  \ Wi-Fi 连接，你不希望你的应用显示一个空的广告横幅框架。一个大而空白的矩形占据 UI 中宝贵的屏幕空间，既难看又非常不专业。\n*   当 `iAd`\
  \ 横幅不可用或无法连接到 iAd 网络服务器时，苹果的应用审核团队会拒绝任何显示空白广告位的应用。苹果的 `iAd` 框架使得在代码中检测这一点变得很容易，它会在无法获取广告时通过\
  \ `iAd` 横幅代理向你的应用发送消息。\n*   如果你计划提供一个应用内购买选项，让那些希望获得无广告体验的忠实用户能够移除广告，你肯定不希望购买后还有一个未使用且空的广告横幅框架留在屏幕上，毫无理由地扰乱应用的\
  \ UI。\n\n对于那些计划在 `UITableView` 上方或某个特定 `UIView` 中的游戏画布上显示 iAd 的人，通过代码让 iAd 横幅在屏幕上可见是相当简单的。但对于那些需要调整多个控件尺寸以便为\
  \ iAd 横幅框架腾出空间的开发者来说，这无疑需要对 UI 组件和父控制器的设计进行一些改造。\n\n不要轻易妥协你的应用设计来迁就 iAd 横幅，从而走上捷径。花时间弄清楚如何在不牺牲应用\
  \ UI 完整性的前提下集成 iAd 横幅。如果你还没有构建你的应用，那么这仅仅是在规划 UI 时就考虑好广告横幅的问题。但对于现有应用，这可能意味着需要重建许多视图，以包含新的父级\
  \ `UIView`，例如一个底层视图来容纳 iAd 横幅框架的嵌套子视图，以及包含你应用 UI 组件的顶层视图（参见图 7-8）。\n\n![9781430262381_Fig07-08.jpg](img/9781430262381_Fig07-08.jpg)\n\
  \n\n\n图 7-8. 某些应用可能需要重新设计视图层级，以便容纳必须作为`UIView`子视图的 iAd 横幅框架。\n\n在图 7-8 中，顶部的`UIView`（在代码中赋值为`contentView`）充当应用\
  \ UI 控件的外部容器视图。如果你需要此父视图调整自身大小，以便在屏幕底部为 iAd 横幅腾出空间，则应设置嵌套 UI 控件的自动调整蒙版，从而使它们也能相应地调整大小或移动位置。如图\
  \ 7-8 所示，文本内容为“BOTTOM of ‘contentView’ UIView”的`UILabel`已将其自动调整蒙版设置为在父视图`UIView`高度变化时向上移动。\n\
  \n图 7-8 中最底层代表应用的主窗口，其中嵌入了一个视图控制器。中间的白色图层是由该视图控制器调用的主`UIView`。此`UIView`默认被分配了出口`view`。名为`contentView`的`UIView`和\
  \ iAd 横幅框架都是父`UIView`（即`view`）的子视图。\n\n如果这对你来说有点难以理解，别担心。当我们接下来逐步演示如何在 Xcode 示例项目中集成\
  \ iAd 时，一切都会变得清晰明了。当你看到实际运行效果时，就会理解`UIView`层级设计背后的逻辑。\n\n就视觉效果而言，我们不希望 iAd 突然弹出，导致所有内容瞬间移位。这可能会让用户感到突兀。更优雅的方式是让\
  \ iAd 平滑地过渡到屏幕上，使用`UIView`动画将其滑入和滑出视图。当我们构建图 7-8 的通用应用示例（同时适用于 iPhone 和 iPad）时，你将看到如何将`UIView`动画与\
  \ iAd 横幅框架结合使用。请继续阅读...\n\n### 编写应用以支持广告\n\n让我们开始编写代码！首先，在深入 Xcode 之前，重要的是要确切理解我们这个示例项目需要实现什么功能。以下是基本功能概要：\n\
  \n*   检查设备的互联网连接。如果没有连接，则不执行任何操作，让应用的 UI 保持在正常的全屏状态。\n*   如果设备有互联网连接，则向 iAd 网络请求一个\
  \ iAd 横幅。\n*   如果 iAd 网络发来消息表明 iAd 横幅请求成功，则准备 iAd 横幅框架，广告横幅即可显示。\n*   如果 iAd 网络回复说没有可用的\
  \ iAd 横幅，则准备一个备用广告横幅来显示。在本示例中，我们将展示一个内置的自家广告，但你也可以很容易地修改示例代码以支持第二个广告网络（例如 AdMob）。\n\
  *   当广告横幅（无论是 iAd 还是自家广告）准备好显示时，使用`UIView`动画将广告从屏幕底部滑入视图，并调整受影响的 UI 元素的位置，为广告横幅框架腾出空间。\n\
  *   如果应用之前正在显示广告横幅，但设备失去了互联网连接或没有新的广告横幅可显示，则使用相同的`UIView`动画技术将广告框架滑出视图，将应用的 UI 恢复为正常的全屏状态。\n\
  \n如果你只想在现有 UI 上方显示一个 iAd 横幅，可能会觉得这个详尽的教程有些大材小用。对于简单的 iAd 代码示例，请查看苹果的示例项目 iAdSuite，可从\
  \ iOS 开发中心在线获取：`http://developer.apple.com/library/ios/#samplecode/iAdSuite/`。\n\
  \n但对于那些对我上面列出的功能感兴趣的读者来说，我们即将构建的高级示例项目可能正是你所寻找的解决方案。本教程包含大量代码（与本书其他示例相比），因此为了避免大量手动输入，我强烈建议你下载本书配套的示例代码（来自\
  \ `http://www.iPhoneBusinessBook.com` 或 `http://www.apress.com`），然后在 Xcode 中打开包含的\
  \ `InAppAdv` 项目。即使你想自己逐步操作，从 `InAppAdv` 示例项目中复制粘贴一些代码也能为你节省宝贵的时间。\n\n#### 创建新的 Xcode\
  \ 项目\n\n自 iOS 4.0 起，iAd 便可用于 iPhone 和 iPod touch，但直到 iOS 4.2 才在 iPad 上获得支持。为了兼顾所有读者，我们将构建一个通用应用示例，展示如何为\
  \ iPhone 和 iPad 目标设备实现 iAd 代码。\n\n启动 Xcode 并创建一个新的 iOS 项目，选择“基于窗口的应用程序”模板。在选择该项目模板时，确保其“产品”下拉菜单设置为“通用”，但取消勾选“使用\
  \ Core Data 存储”复选框。将新项目命名为 `InAppAdv`。\n\n#### 向项目添加 iAd 框架\n\n要成功运行和编译带有 iAd 相关代码的应用，必须使用苹果的\
  \ iAd 框架。要将此框架添加到项目中，请按住 Control 键点击项目的 *Frameworks* 文件夹，然后从出现的上下文菜单中选择“添加”![image](img/arrow.jpg)\
  \ “现有框架...”（参见图 7-9）。接着从出现的列表中选择 `iAd.framework`。\n\n![9781430262381_Fig07-09.jpg](img/9781430262381_Fig07-09.jpg)\n\
  \n图 7-9. 将所需的 iAd.framework 添加到你的 Xcode 项目中。\n\n为了专注于当前任务，本示例项目要求 iOS 4.2 或更高版本。如果你的应用需要支持更早的\
  \ iOS 版本，可以在项目中弱链接 iAd 框架。为此，请在“目标”组中选择项目的应用名称，点击“获取信息”按钮，然后在出现的“通用”标签页中，为 `iAd.framework`\
  \ 选择“弱”作为链接方法（参见图 7-10）。\n\n![9781430262381_Fig07-10.jpg](img/9781430262381_Fig07-10.jpg)\n\
  \n图 7-10. 弱链接 iAd.framework 以实现与 iOS 4 之前版本设备的向后兼容。\n\n你可能还需要在应用内使用条件编码，以便在 iOS\
  \ 4 设备上显示 iAd 横幅广告，而在较旧版本的 iOS 上显示自家广告或其他第三方广告横幅。有关实现向后兼容的更多信息，请查阅 iOS 开发中心。\n\n\
  #### 向项目添加苹果的 Reachability 类\n\n当应用运行时，你需要代码来检查互联网连接。如果没有网络连接，请求广告横幅就毫无意义。无需花时间编写自定义的网络检测代码，苹果建议使用其\
  \ `Reachability` 类，该类可以作为 `Reachability` 示例项目的一部分从 iOS 开发中心下载，地址为 `http://developer.apple.com/library/ios/#samplecode/Reachability/`。\n\
  \n下载 `Reachability` 项目后，在 Xcode 中打开它。将 `Reachability` 项目中的 *Reachability.h* 和 *Reachability.m*\
  \ 类文件拖放到你的 `InAppAdv` Xcode 项目窗口的 *Shared* 文件夹中（选择复制文件选项，而非移动文件）。\n\n我们稍后将添加与 `Reachability`\
  \ 类交互的代码。目前，只需按照与先前示例相同的框架插入说明，将 SystemConfiguration 框架添加到你的项目中。不出所料，`Reachability`\
  \ 类需要 SystemConfiguration 框架中的网络功能。\n\n#### 构建应用基础\n\n在编写项目的核心功能之前，我们需要创建一些初始文件并编写一些基本代码。\n\
  \n\n\n在“Groups & Files”列中选择`iPhone`文件夹后，基于`UIViewController`子类创建一个新文件。通过勾选“带有 XIB\
  \ 的用户界面”复选框为该类分配一个界面，并将新类命名为`MainViewController_iPhone`。\n\n接着，在项目中选择`iPad`文件夹，创建另一个新的`UIViewController`子类，并恰当地命名为`MainViewController_iPad`。与其\
  \ iPhone 版本类似，确保勾选了“带有 XIB 的用户界面”复选框。尽管我们使用此类用于 iPad，但请取消勾选“Targeted for iPad”，以便默认`UIView`的自动调整大小掩码保持解锁状态。这将在稍后需要修改`UIView`自动调整大小掩码时发挥作用。\n\
  \n现在我们已经创建了必要的新类，打开`AppDelegate_iPhone.h`文件并添加以下以粗体显示的新代码：\n\n```\n#import <UIKit/UIKit.h>\n\
  \n@class MainViewController_iPhone;\n\n@interface AppDelegate_iPhone : NSObject\
  \ <UIApplicationDelegate> {\n    UIWindow *window;\n    MainViewController_iPhone\
  \ *viewController;\n}\n\n@property (nonatomic, retain) IBOutlet UIWindow *window;\n\
  @property (nonatomic, retain) IBOutlet MainViewController_iPhone *viewController;\n\
  \n@end\n```\n\n如您所见，粗体代码行为`MainViewController_iPhone`类分配了一个新的`viewController`属性和`IBOutlet`。\n\
  \n同时，将相同的代码添加到`AppDelegate_iPad.h`中，注意将所有`MainViewController_iPhone`引用替换为`MainViewController_iPad`。\n\
  \n保存这些头文件后，打开`AppDelegate_iPhone.m`实现文件并添加以粗体显示的新代码：\n\n```\n#import \"AppDelegate_iPhone.h\"\
  \n#import \"MainViewController_iPhone.h\"\n\n@implementation AppDelegate_iPhone\n\
  \n@synthesize window;\n@synthesize viewController;\n\n#pragma mark -\n#pragma mark\
  \ Application lifecycle\n\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions {\n\n// Override point for customization after application launch.\n\
  \n[window addSubview:viewController.view];\n    [self.window makeKeyAndVisible];\n\
  \nreturn YES;\n}\n\n- (void)applicationWillResignActive:(UIApplication *)application\
  \ {\n}\n\n- (void)applicationDidEnterBackground:(UIApplication *)application {\n\
  }\n\n- (void)applicationWillEnterForeground:(UIApplication *)application {\n}\n\n\
  - (void)applicationDidBecomeActive:(UIApplication *)application {\n}\n\n- (void)applicationWillTerminate:(UIApplication\
  \ *)application {\n}\n\n#pragma mark -\n#pragma mark Memory management\n\n- (void)applicationDidReceiveMemoryWarning:(UIApplication\
  \ *)application {\n}\n\n- (void)dealloc {\n    [viewController release];\n    [window\
  \ release];\n    [super dealloc];\n}\n\n@end\n```\n\n这段新代码将`viewController`作为子视图添加到应用的主窗口中。\n\
  \n同时，在`AppDelegate_iPad.m`中插入相同的新代码，注意将`#import` `MainViewController_iPad.h` 替换为\
  \ `MainViewController_iPhone.h`。\n\n在添加了正确的代码后，是时候进行一些界面工作了。请按照以下步骤操作：\n\n1.  在\
  \ Interface Builder 中打开`MainWindow_iPhone.xib`。\n2.  从库面板中拖拽一个`UIViewController`到浏览器窗口中，并将其引用的输出口`viewController`连接到应用委托模块。\n\
  3.  在浏览器窗口中选择`UIViewController`后，在检查器面板的“属性”选项卡中，将其 NIB 分配给`MainViewController_iPhone.xib`，并勾选“从\
  \ NIB 调整视图大小”（参见图 7-11）。\n\n![9781430262381_Fig07-11.jpg](img/9781430262381_Fig07-11.jpg)\n\
  \n图 7-11. 通过新的 UIViewController 配置 MainWindow_iPhone.xib，该 UIViewController 加载 MainViewController_iPhone\n\
  \n4.  在检查器面板的“标识”选项卡中，将其类更改为`MainViewController_iPhone`。\n\n您需要在 Interface Builder\
  \ 中对`MainWindow_iPad.xib`执行相同的步骤，只是`UIViewController`的 NIB 应分配给`MainViewController_iPad.xib`，并且其类更改为`MainViewController_iPad`。\n\
  \n#### 检查 iOS 设备的网络连接\n\n还记得将苹果的`Reachability`类添加到项目中吗？现在您需要编写代码，利用这个便捷的网络检测类。在\
  \ Xcode 中打开`MainViewController_iPhone.h`文件，并添加以下粗体代码：\n\n```\n#import <UIKit/UIKit.h>\n\
  \n@class Reachability;\n\n@interface MainViewController_iPhone : UIViewController\
  \ {\n\nUIView *contentView;\n    Reachability* netReachable;\n    BOOL isNetAvailable;\n\
  }\n\n@property (nonatomic, retain) IBOutlet UIView *contentView;\n\n- (void)reachabilityChanged:(NSNotification*)note;\n\
  \n@end\n```\n\n本质上，这段代码设置了一些与`Reachability`相关的属性和一个方法，以及一个名为`contentView`的新`UIView`属性和`IBOutlet`引用。您还需要将相同的新代码行添加到`MainViewController_iPad.h`中。\n\
  \n接下来，转到`MainViewController_iPhone.m`实现文件，添加以下以粗体显示的新代码：\n\n```\n#import \"MainViewController_iPhone.h\"\
  \n#import \"Reachability.h\"\n\n@implementation MainViewController_iPhone\n\n@synthesize\
  \ contentView;\n\n// Uncommented viewDidLoad and added Reachability code.\n- (void)viewDidLoad\
  \ {\n    [super viewDidLoad];\n\n// Check the current device's Internet connection\n\
      // using Apple's Reachability classes. When the status\n    // changes, a notification\
  \ is posted, calling the\n    // reachabilityChanged method.\n    [[NSNotificationCenter\
  \ defaultCenter] addObserver: self selector: @selector(reachabilityChanged:) name:\
  \ kReachabilityChangedNotification object: nil];\n    netReachable = [[Reachability\
  \ reachabilityWithHostName: @\"www.apple.com\"] retain];\n    [netReachable startNotifier];\n\
  }\n\n// Uncommented and return YES.\n- (BOOL)shouldAutorotateToInterfaceOrientation:\n\
                  (UIInterfaceOrientation)interfaceOrientation {\n    // Return YES\
  \ to support both Portrait and Landscape orientations.\n    return YES;\n}\n\n//Called\
  \ by Reachability whenever status changes.\n- (void) reachabilityChanged: (NSNotification*\
  \ )note {\n\nNetworkStatus netStatus = [netReachable currentReachabilityStatus];\n\
      switch (netStatus)\n    {\n        case NotReachable:\n        {\n            isNetAvailable\
  \ = NO;\n            break;\n        }\n        case ReachableViaWiFi:\n        {\n\
              isNetAvailable = YES;\n            break;\n        }\n        case ReachableViaWWAN:\n\
          {\n            isNetAvailable = YES;\n            break;\n        }\n    }\n\
  }\n\n- (void)didReceiveMemoryWarning {\n    [super didReceiveMemoryWarning];\n}\n\
  \n- (void)viewDidUnload {\n    self.contentView = nil;\n    [super viewDidUnload];\n\
  }\n\n- (void)dealloc {\n    [contentView release];\n    [[NSNotificationCenter defaultCenter]\
  \ removeObserver:self];\n    [super dealloc];\n}\n\n@end\n```\n\n新添加的代码设置了访问`Reachability`功能和`NSNotificationCenter`的权限，以便该类可以检查设备网络连接的当前状态，并在状态发生变化时始终收到通知。这决定了您的应用是否有互联网访问权限，是在尝试与广告网络服务器通信之前必须了解的重要信息。如果检测到可行的网络连接，则布尔值`isNetAvailable`被设置为`YES`。\n\
  \n与本教程前面的步骤一样，您还需要将相同的粗体代码行添加到`MainViewController_iPad.m`中。\n\n#### 构建应用的界面和 UIView\
  \ 层次结构\n\n您可能注意到了`MainViewController_iPhone`和`MainViewController_iPad`类中名为`contentView`的新`UIView`属性。现在`IBOutlet`代码已就位，让我们在\
  \ Interface Builder 中完成该`UIView`的配置，以及本示例中的其他一些 UI 元素。\n\n\n\n1.  在 Interface Builder\
  \ 中打开 `MainViewController_iPhone.xib`。\n2.  在浏览器窗口中，你应该已经能看到一个 `UIView`，它已经连接到了默认的\
  \ `view` 引用插座。从库面板中拖拽一个新的 `UIView` 到浏览器窗口，并小心地将其定位为现有 `UIView` 的嵌套子视图。将 `contentView`\
  \ 的插座从 File's Owner 模块连接到这个新的、嵌套的 `UIView`。嵌套的 `UIView`（名为 `contentView`）和 iAd 横幅框架都将作为主父视图\
  \ `UIView`（名为 `view`）的子视图。\n3.  选中该嵌套的 `UIView`，导航到检查器面板的视图大小标签页，并修改其自动调整大小遮罩，使其自动全屏扩展（参见图\
  \ 7-12）。父 `UIView` 也应设置相同的自动调整大小遮罩（如果默认情况下尚未设置）。\n\n    ![9781430262381_Fig07-12.jpg](img/9781430262381_Fig07-12.jpg)\n\
  \n    图 7-12。在 `MainViewController_iPhone.xib` 中，构建嵌套的 `UIView` 层次结构、UI 元素和自动调整大小遮罩\n\
  \n    **注意** 尽管库面板确实提供了一个 iAd `BannerView` 组件，但*不要*在 Interface Builder 中将其添加到视图。在本例中，至关重要的一点是\
  \ iAd 横幅框架只能通过编程方式添加，这样 iAd 就可以根据运行时广告可用性和其他因素动态地滑入和滑出屏幕。你很快就会看到如何编写那段 iAd 代码。\n\
  \n4.  选中嵌套的 `UIView`（名为 `contentView`），在检查器面板的属性标签页中将其 Color Tint 更改为 75% 灰度，这样我们在屏幕上显示时，可以轻松地将这个\
  \ `UIView` 与其白色的父 `UIView` 区分开来。这个灰色的 `UIView` 将是你放置此屏幕所有 UI 元素的地方。可以将其视为应用界面的容器，其高度会根据需要调整，以便为屏幕底部的广告横幅框架腾出空间。\n\
  5.  为了演示方便，从库面板中向该嵌套的 `UIView` 添加两个 `UILabel`。\n6.  将一个 `UILabel` 移动到视图顶部，其标签文本设置为\
  \ **TOP of “contentView” UIVIew**。将该 `UILabel` 的自动调整大小遮罩设置为始终固定在屏幕顶部。\n7.  将第二个\
  \ `UILabel` 移动到视图底部，为其设置标签文本 **BOTTOM of “contentView” UIView**。将第二个 `UILabel` 的自动调整大小遮罩设置为始终固定在屏幕底部。\n\
  \n    **注意** 如果你不确定如何配置自动调整大小遮罩上的括号，请查看本书可下载的 `InAppAdv` 项目，了解如何设置的示例。\n\n记得也要将这些添加和修改应用到\
  \ `MainViewController_iPad.xib`。\n\n为什么使用 `UILabel`？它们用作可见标记，指示在通过代码调整灰色 `contentView`\
  \ 所分配的 `UIView` 的大小以为广告横幅框架腾出空间时，其顶部和底部的具体位置。当你在 iOS 模拟器或测试设备上运行应用并看到实际效果时，这一点会非常明显。但我们还没有准备好执行这一步。\n\
  \n最后一步是项目中最重要的一部分：编写管理整个应用内广告流程（从广告横幅请求到屏幕显示）的代码。\n\n**注意** 你可能会发现一些 UI 组件，例如 `UINavigationController`，无法在\
  \ Interface Builder 中添加到 `UIView`。对于这些情况，解决方案是在 Xcode 中以编程方式创建这些 UI 组件，并通过代码将它们作为子视图添加到\
  \ `UIView`。\n\n##### 将您的自有广告图片文件复制到项目\n\n如果出现没有 iAd 可供显示的情况，您需要显示一个替代广告横幅。在本例中，我们显示一个自有广告。在开始编写处理\
  \ iAd 和您替代广告横幅的代码之前，您需要为您的自有广告创建实际的图像文件，并将它们作为资源添加到 Xcode 项目中。\n\n为了支持 iPhone 和\
  \ iPad 的所有设备方向及显示分辨率，您需要按照下面列出的确切文件名和 PNG 格式，创建六种不同尺寸的自有广告，以便它们能与示例代码配合使用：\n\n*\
  \   `adbannerportrait-iphone.png`（320 像素 × 50 像素）\n*   `adbannerportrait-iphone@2x.png`（Retina：640\
  \ 像素 × 100 像素）\n*   `adbannerlandscape-iphone.png`（480 像素 × 32 像素）\n*   `adbannerlandscape-iphone@2x.png`（Retina：960\
  \ 像素 × 64 像素）\n*   `adbannerportrait-ipad.png`（768 像素 × 66 像素）\n*   `adbannerlandscape-ipad.png`（1024\
  \ 像素 × 66 像素）\n\n为了保持一致性，自有广告使用与 iAd 支持的相同横幅尺寸。iAd Network 会动态地为 Retina 显示设备提供高分辨率\
  \ iAd 横幅，因此为了保持相同的分辨率质量，您也应该为您的自有广告创建 Retina 显示横幅尺寸。\n\n如果您不想仅仅为了完成本教程而设计自己的自有广告，那么作为占位符，请将本书可下载的\
  \ `InAppAdv` 项目中的六个自有广告 PNG 图像文件复制到您的 Xcode 项目的 `Shared` 文件夹中。\n\n##### 编写应用内广告代码\n\
  \n在最后一步中，您将最终添加用于管理 iAd 横幅框架和替代自有广告的代码，以及用于适应广告横幅而动态调整应用 UI 大小的代码。这部分需要添加*大量*新代码。为了避免繁琐的手动输入，我再次建议您下载本书的配套代码示例，以便您可以将包含的\
  \ `InAppAdv` 项目中的相关代码复制并粘贴到您的 Xcode 项目中。\n\n打开 `MainViewController_iPhone.h` 并添加以下新代码行（以粗体显示）：\n\
  \n```\n#import <UIKit/UIKit.h>\n#import <iAd/iAd.h>\n\n@class Reachability;\n\n\
  @interface MainViewController_iPhone : UIViewController <ADBannerViewDelegate> {\n\
  \nUIView *contentView;\n    ADBannerView *adBannerView;\n    UIButton *altAdBannerButton;\n\
  \    Reachability* netReachable;\n    BOOL isNetAvailable;\n}\n\n@property (nonatomic,\
  \ retain) IBOutlet UIView *contentView;\n@property (nonatomic, retain) IBOutlet\
  \ ADBannerView *adBannerView;\n@property (nonatomic, retain) IBOutlet UIButton *altAdBannerButton;\n\
  \n- (void)reachabilityChanged:(NSNotification*)note;\n- (void)prepareAdBannerView;\n\
  - (void)prepareAltAdBanner;\n- (void)adjustAdBannerPosition:(BOOL)animated;\n- (void)tappedAltAdBanner;\n\
  \n@end\n```\n\n简而言之，这段新代码导入了 `iAd.h` 头文件，并初始化了几个新的与广告相关的属性和方法，用于处理 iAd 和替代自有广告。\n\
  \n请注意，使用的 iAd 横幅类型是 `ADBannerView`。为了接收来自 iAd Network 的消息，该类被分配为 `ADBannerViewDelegate`。为了确保自有广告像真实广告横幅一样可点击，它将通过代码创建为一个基于图像的\
  \ `UIButton`。当我们把这些相应的方法添加到 `MainViewController.m` 文件中时，我将解释 iAd 和替代自有广告的准备和显示是如何编程的。\n\
  \n当然，您还需要将相同的粗体代码添加到 `MainViewController_iPad.h`：\n\n```\n#import <UIKit/UIKit.h>\n\
  #import <iAd/iAd.h>\n\n@class Reachability;\n\n@interface MainViewController_iPad\
  \ : UIViewController <ADBannerViewDelegate> {\n\nUIView *contentView;\n    ADBannerView\
  \ *adBannerView;\n    UIButton *altAdBannerButton;\n    Reachability* netReachable;\n\
  \    BOOL isNetAvailable;\n}\n\n@property (nonatomic, retain) IBOutlet UIView *contentView;\n\
  @property (nonatomic, retain) IBOutlet ADBannerView *adBannerView;\n@property (nonatomic,\
  \ retain) IBOutlet UIButton *altAdBannerButton;\n\n- (void)reachabilityChanged:(NSNotification*)note;\n\
  - (void)prepareAdBannerView;\n- (void)prepareAltAdBanner;\n- (void)adjustAdBannerPosition:(BOOL)animated;\n\
  - (void)tappedAltAdBanner;\n\n@end\n```\n\n\n\n现在我们来处理到目前为止最大的一段代码，它添加了应用内广告功能的主体部分。打开\
  \ `MainViewController_iPhone.m` 实现文件，插入以下以粗体**加粗**高亮的新代码：\n\n```\n#import \"MainViewController_iPhone.h\"\
  \n#import \"Reachability.h\"\n\n@implementation MainViewController_iPhone\n\n@synthesize\
  \ contentView;\n@synthesize adBannerView;\n@synthesize altAdBannerButton;\n\n- (void)viewDidLoad\
  \ {\n    [super viewDidLoad];\n\n// 使用 Apple 的 Reachability 类检查当前设备的互联网连接\n    //\
  \ 当状态变化时，会发送通知，调用 reachabilityChanged 方法。\n    [[NSNotificationCenter defaultCenter]\
  \ addObserver: self selector: @selector(reachabilityChanged:) name: kReachabilityChangedNotification\
  \ object: nil];\n    netReachable = [[Reachability reachabilityWithHostName: @\"\
  www.apple.com\"] retain];\n    [netReachable startNotifier];\n\n// 配置并请求一个 iAd 横幅广告。\n\
  \    [self prepareAdBannerView];\n\n// 在 iAd 横幅广告不可用时，配置一个备用广告横幅。\n    [self prepareAltAdBanner];\n\
  \n// 调整应用 UI，使广告横幅显示在屏幕底部。\n    [self adjustAdBannerPosition:NO];\n}\n\n-(void)viewWillAppear:(BOOL)animated\n\
  {\n    [super viewWillAppear:animated];\n    [self adjustAdBannerPosition:NO];\n\
  }\n\n- (void)willRotateToInterfaceOrientation:(UIInterfaceOrientation)toInterfaceOrientation\
  \ duration:(NSTimeInterval)duration {\n\n[self adjustAdBannerPosition:YES];\n}\n\
  \n- (BOOL)shouldAutorotateToInterfaceOrientation:\n                (UIInterfaceOrientation)interfaceOrientation\
  \ {\n    // 返回 YES 以支持竖屏和横屏两种方向。\n    return YES;\n}\n\n// 当网络状态改变时，由 Reachability\
  \ 调用。\n- (void) reachabilityChanged: (NSNotification* )note {\n\nNetworkStatus netStatus\
  \ = [netReachable currentReachabilityStatus];\n    switch (netStatus)\n    {\n \
  \       case NotReachable:\n        {\n            isNetAvailable = NO;\n      \
  \      break;\n        }\n        case ReachableViaWiFi:\n        {\n          \
  \  isNetAvailable = YES;\n            break;\n        }\n        case ReachableViaWWAN:\n\
  \        {\n            isNetAvailable = YES;\n            break;\n        }\n \
  \   }\n}\n\n- (void)prepareAdBannerView {\n    // 此方法在屏幕外创建并配置 iAd 横幅视图。\n\n// 根据设备当前方向计算横幅视图的大小。\n\
  \    NSString *adBannerSize = UIInterfaceOrientationIsPortrait([UIDevice currentDevice].orientation)\
  \    ? ADBannerContentSizeIdentifierPortrait : ADBannerContentSizeIdentifierLandscape;\n\
  \n// 初始时，此 iAd 横幅视图将放置在屏幕外。\n    // 一旦广告准备好显示，横幅视图才会显示出来。\n    CGRect adFrame;\n\
  \    adFrame.size = [ADBannerView sizeFromBannerContentSizeIdentifier:adBannerSize];\n\
  \    adFrame.origin = CGPointMake(0.0, CGRectGetMaxY(self.view.bounds));\n\n// 创建\
  \ iAd 横幅。\n    ADBannerView *adBanner = [[ADBannerView alloc] initWithFrame:adFrame];\n\
  \n// 将 iAd 横幅的代理设置为 self，以便接收 iAd 通知。\n    adBanner.delegate = self;\n\n// 告知 iAd\
  \ 网络本应用支持的广告尺寸\n    // （本例中，同时支持竖屏和横屏）。\n    adBanner.requiredContentSizeIdentifiers\
  \ = [NSSet setWithObjects:ADBannerContentSizeIdentifier    Portrait, ADBannerContentSizeIdentifierLandscape,\
  \ nil];\n\n// 将 iAd 横幅视图添加到父视图中。\n    // 此时它正在向 iAd 网络请求广告。\n    [self.view addSubview:adBanner];\n\
  \    self.adBannerView = adBanner;\n    [adBanner release];\n    [adBannerSize release];\n\
  }\n\n- (void)prepareAltAdBanner {\n    // 此方法在屏幕外创建并配置一个自定义的内置广告横幅，\n    // 用于 iAd\
  \ 横幅不可用的情况。但下面的代码可以轻松替换，\n    // 以显示来自其他广告网络（如 AdMob）的广告。\n\n// 根据设备当前方向创建备用广告横幅。\n\
  \    UIImage *altAdImg = [[[UIImage alloc] init] autorelease];\n    NSString *adBannerImage\
  \ = [[NSString alloc] init];\n    if (UIInterfaceOrientationIsLandscape([UIDevice\
  \ currentDevice].orientation)) {\n        adBannerImage = @\"adbannerlandscape-iphone.png\"\
  ;\n    } else {\n        adBannerImage = @\"adbannerportrait-iphone.png\";\n   \
  \ }\n    altAdImg = [UIImage imageNamed:adBannerImage];\n\nUIButton *altButton =\
  \ [[UIButton buttonWithType:UIButtonTypeCustom] autorelease];\n    [altButton setBackgroundImage:altAdImg\
  \ forState:UIControlStateNormal];\n    [altButton addTarget:self action:@selector(tappedAltAdBanner)\
  \ forControlEvents:UIControlEvent    TouchUpInside];\n    self.altAdBannerButton\
