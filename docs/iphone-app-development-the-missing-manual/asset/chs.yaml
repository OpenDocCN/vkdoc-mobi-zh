  \ 设备”**。名称后的数字表示你正针对哪个版本的 iPhone SDK 进行构建。\n\n**149**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**正式生效**\n\n**注意：** 为设备设置**“活动 SDK”**会导致 Xcode 为 iPhone 的 ARM 处理器生成代码，而不是为 Mac\
