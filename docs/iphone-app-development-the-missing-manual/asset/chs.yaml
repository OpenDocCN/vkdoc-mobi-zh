  \n## 正式授权\n\n### 代码签名对你意味着什么\n\n在深入了解代码签名的具体细节之前，最好先了解其必要性以及 Apple 的实现方式。\n\n编译器和链接器长期以来一直被用于创建应用程序二进制文件。这些代码可以在目标平台上毫无问题地运行，但它们存在一些与安全相关的缺陷：\n\
  \n- **无法验证软件的创建者。** 相反，使用签名代码，Apple 确切知道上传到 App Store 的软件是由谁创建的。\n- **无法保证软件未被篡改。**\
  \ 这就是为什么代码签名使用加密哈希，让操作系统能够验证将要执行的比特位是否与你构建的相同。\n\niPhone 上的代码使用公钥密码学进行签名。即，公钥和私钥的组合（类似于\
  \ Web 浏览器中用于安全通信的密钥）在可执行文件中创建并验证数字签名。你的*私钥*用于创建数字签名，而*公钥*用于将其与文件内容进行比较。\n\n签名过程中使用的公钥和私钥作为证书存储在\
  \ Mac OS X 钥匙串中。Apple Worldwide Developer Relations（`WWDR`）的证书颁发机构签发该证书。`WWDR`还规定了证书的过期时间。\n\
  \nApple 还通过要求开发设备安装*配置文件*来控制签名代码的运行位置。每个配置文件包含一个 40 字符的十六进制数字列表，这些数字唯一标识允许运行指定应用程序的硬件。某些配置文件特定于单个应用程序，而其他配置文件可以指定多个应用程序。该配置文件还包含对创建应用程序的开发人员证书的引用。\n\
  \n当你启动应用程序进行测试时，会检查配置文件中的设备列表，如果当前设备在列表中，则正常执行。如果没有匹配项，应用程序将终止。\n\n***注意：*** 从 App\
  \ Store 下载的应用程序不需要配置文件：`iTunes`使用的`FairPlay DRM`控制其执行。\n\n简而言之，在 iPhone 上运行应用程序之前，你需要两样东西：能够使用\
  \ Mac OS X 钥匙串中的条目对代码进行签名，以及一个包含你设备 ID 的已安装配置文件。\n\n第 5 章：严肃对待开发\n\n**137**\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 正式授权\n\n### 钥匙串设置\n\n如果你很大胆，尝试对之前的某个项目进行真机构建，你很可能在构建过程中看到代码签名错误。除非你跳到了本章，或者有一些之前的\
  \ iPhone 开发经验，否则构建不会完成，因为你还没有设置钥匙串或安装配置文件。\n\n第一步是配置 Mac OS X 钥匙串，以便`Xcode`可以在代码签名构建阶段使用它。\n\
  \n\n\n***注意：*** Mac OS X 钥匙串是操作系统内置的一种安全机制。在您输入主密码（通常在登录时进行）后，应用程序即可访问其他密码和安全信息。例如，当您输入网站密码时，该密码会存储在钥匙串中，以便\
  \ Safari 浏览器下次访问该网站时使用。\n\n您可以使用`钥匙串访问`（位于`应用程序`➝`实用工具`文件夹中）来管理钥匙串中存储的信息。它用于浏览和管理钥匙串中存储的信息。\n\
  \n在进行 Xcode 开发时，您需要重点关注`证书`类别中的项目。\n\n一个新权威机构。您需要做的第一件事是将 Apple 的开发者关系部门设置为证书颁发机构。具体步骤如下：\n\
  \n1. 登录 iPhone 开发者中心，网址为 `http://developer.apple.com/iphone`。\n2. 在右侧的导航栏中，点击`iPhone\
  \ Provisioning Portal`。\n3. 在左侧栏中，点击`证书`。\n4. 在`证书`页面底部，点击链接“如果您未安装 WWDR 中间证书，请点击此处立即下载”。\n\
  \n名为 `AppleWWDRCA.cer` 的文件将出现在您的 Mac 上。\n\n5. 双击该文件。\n\n`钥匙串访问`将启动。\n\n6. 如果出现`添加证书`对话框，请确保`钥匙串`弹出菜单设置为“登录”，然后点击`添加`按钮。\n\
  \n此时，您应能看到新证书已安装在您的登录钥匙串中（图 5-4）。\n\n***图 5-4：*** *从开发者门户下载并安装 WWDR 中间证书文件后，您应在登录钥匙串的证书类别中看到来自\
  \ WWDR 的证书。*\n\n请求证书。下一步是向您刚刚添加的权威机构请求一个新证书。该过程包括在您的桌面上生成请求，然后通过 Provisioning Portal\
