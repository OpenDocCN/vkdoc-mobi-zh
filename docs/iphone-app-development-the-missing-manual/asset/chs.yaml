- "# 方括号的力量\n\n你已经看到了构建 iPhone 应用是多么简单：这并不是什么高深莫测的学问。\n\n或者，它确实是？\n\n苹果公司出色地创建了你用于构建\
  \ iPhone 应用的工具，但如果你想成为一名大师级的工匠，你需要对这些新工具有更多了解。本章的第一部分将带你开始探索：你将了解用于创建应用的 Objective-C\
  \ 语言的基础知识。\n\n此外，还有一个蓬勃发展的开发者社区致力于 iPhone 开发。你将学习在遇到编码问题时去哪里寻求帮助，如何跟上 iPhone 中不断发展的技术，以及在哪里下载免费的示例代码用于你自己的应用开发。\n\
  \n**注意：** Objective-C 有很多需要学习的地方。如果你现在拿着的这本书深入介绍了这种语言，那它可能要重上好几磅。相反，本章将涵盖你在 iPhone\
  \ 开发中最可能遇到的主题。\n\n在本章结束时，你将看到一些关于去哪里寻找更多信息的建议。\n\n当你掌握了这门语言的基本部分后，你将快速了解 Xcode 中内置的文档查看器。知道如何快速有效地查找信息将有助于你轻松进入这个新平台。\n\
  \n**29**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## Objective-C：iPhone\
  \ 应用的螺丝与螺母\n\n在本节中，你将探索用于编写 iPhone 应用程序的语言：Objective-C。本章不会教你如何编程，而是向你展示这门语言与你可能用过的其他语言之间的差异。\n\
  \n你还将遇到 Objective-C 独有的特性。\n\n### 方括号的世界\n\n在你创建手电筒时，你可能注意到了这行代码：\n\n```\n[window\
  \ makeKeyAndVisible];\n```\n\n如果你曾用 Java、C 或 JavaScript 编程，这些方括号可能会让你摸不着头脑。你不是第一个有这种反应的开发者！\n\
  \n那么这些奇怪的方括号是干什么用的呢？在回答这个问题之前，先看看这门语言的名字——结尾的 *C*。你看，这门全新的语言实际上是基于一门旧语言：1972 年丹尼斯·里奇在贝尔电话实验室开发的\
  \ C 语言。与 Java 和 JavaScript 一样，Objective-C 的创建者在许多程序员熟悉的基础上构建了新的东西。一旦你学会了一些技巧，这门语言也会很快变得熟悉起来（有关\
  \ Objective-C 与其他 C 语言关系的更多信息，请参见下面的框）。\n\n**内幕：C 语言加特性**\n\nObjective-C 是 C 语言语法的超集。你在本章中看到的所有内容都是使用\
  \ GNU C/C++ 编译器构建的。\n\n当源文件使用 `.m` 而不是 `.c` 时，会进行额外的文件处理（在概念上类似于使用预处理器）。这一步将你的代码连接到一个支持\
  \ Objective-C 特性的小型运行时。类和对象只是 C 结构体；运行时让它们通过内省和消息传递进行通信。\n\n由于整个基础设施基于标准 C，因此很容易将开源库和遗留代码与你的\
  \ Objective-C 应用程序混合使用。开始使用这门新语言时，你不必放弃你珍视的 C/C++ 源代码。\n\n话虽如此，许多开发者发现这个面向对象的环境非常令人上瘾。将\
  \ Objective-C 用作包装器，使开源库更易于使用，这种情况相当常见。一个很好的例子是正则表达式：Cocoa Touch 本身不支持它们。多亏了 John\
  \ Engelhart 的工作，RegexKit 框架（`http://regexkit.sourceforge.net/`）使得 Perl 兼容正则表达式 (PCRE)\
  \ 可以与你的字符串对象一起愉快地使用。\n\n当你熟悉了这门新语言的语法和感觉后，你将在第 60 页的框中探索如何使用标准的 C 习惯用法来实现它。\n\n\
  **30**\n\niPhone 应用开发：缺失的手册\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 一切皆对象\n\n看看下面的 Objective-C 代码。你会立即对你在其他语言中使用过的熟悉表达式和控制结构感到自在：\n\n```\nint i;\n\
  for (i = 0; i < 10; i++) {\n    // 检查偶数和奇数值\n    if ((i % 2) == 0)\n        [label\
  \ setTitle:@″Even″];\n    else\n        [label setTitle:@″Odd″];\n}\n```\n\n在这个简单示例中，很容易看出你正在一个执行\
  \ 10 次的循环中检查偶数和奇数值。\n\n这门语言名字的第一部分暗示了那些括号的用途：*Objective* 告诉你，你在处理对象。而这些方括号让你与这些对象进行通信。在第一个示例中，你在与一个\
  \ *window* 对象通信。第二个示例则与一个 *label* 对象交互。\n\n所以现在你可能会想，“太好了，但什么是对象？” Objective-C 是计算机科学家所称的*面向对象*语言。在开发你的\
  \ iPhone 应用程序时，你将进行面向对象编程。\n\n**提示：** 如果你是面向对象编程的新手，请花点时间阅读维基百科上关于此主题的页面。概述和历史将帮助你快速了解这种编程风格中使用的设计动机和术语：`http://en.wikipedia.org/wiki/Object-oriented_programming`。\n\
  \n*对象*是包含应用程序代码和数据的内存块。面向对象设计的主要原则之一是，你的应用程序应尽可能少地了解对象的内部工作机制。像*封装*和*数据抽象*这样的术语描述了这种行为。\n\
  \n\n\n对象应该像一个黑盒子。事实上，使用方括号作为视觉提示可能对你有所帮助：`[]` 看起来很像一个盒子。\n\n打开 iPhone 的瞬间，内存中就会创建数千个对象。启动你自己的应用时，还会新增数千个对象。你常常会听到用*实例*来描述这些对象中的每一个。由于有这么多实例在内存中浮动，你需要变量来跟踪那些重要的实例。\n\
  \n## 这一切的对象\n\n### 命令你的对象做事\n\n引用对象的变量允许你改变对象的行为或状态。通过向对象发送*消息*来实现这一点。在 Cocoa 文档中，接收消息的对象常被称为*接收者*。\n\
  \n***注意：*** 你还会看到术语*目标*用于表示接收消息的对象。消息本身有时被称为*动作*，因为消息通常会促使事情发生。在处理用户界面（在 Interface\
  \ Builder 中）时，你会经常遇到这些术语。\n\n对于本节开头展示的*窗口*对象，你向它发送了消息 `-makeKeyAndVisible`。本质上，这条消息是在告诉窗口让自己在屏幕上可见。你的“label”变量收到了消息\
  \ `-setTitle:`，并附带了一个变量；它被指示将其标题更改为一个新值。不用关心具体发生什么动作——你目前的重点是理解如何使用消息来发起动作。\n\n\
  当你逐渐习惯这种新的编程语法时，方括号会提醒你正在与一个黑盒子进行通信。其中第一个单词指定了接收消息的对象，其余单词提供了所需的任何其他参数。以下是一些示例：\n\
  \n```\n[myBlackBox messageWithNoParameters];\n[myBlackBox messageWithFirstParameter:one\
  \ andSecondParameter:two];\n```\n\n***注意：*** 如果你有 C++ 或 Java 等其他面向对象语言的背景，发送消息在功能上等同于以下形式：\n\
  \n```\nmyBlackBox->functionWithNoParameters();\nmyBlackBox->functionWithParameters(one,\
  \ two);\n```\n\n或这样：\n\n```\nmyBlackBox.functionWithNoParameters();\nmyBlackBox.functionWithParameters(one,\
  \ two);\n```\n\n最大的区别在于，你发送给对象的消息不仅可以在应用编译时生成，也可以在运行时生成。同样，对象的方法也可以在代码运行时被修改。Objective-C\
  \ 是一种动态语言，因此你可以随时改变对象的行为。\n\n这些消息中的每一条都由对象定义的*方法*来处理。方法使用唯一的签名，让 Objective-C 能够将你的消息和任何参数路由到正确的代码以执行。你会发现，许多方法签名在你的代码中非常易读：虽然需要多打几个字，但最终你会得到更容易理解的代码。\n\
  \n## 大量的类\n\n有些方法会返回值。之前，你看到了 `setTitle:` 方法更改了一个标签的标题。有一个对应的方法叫做 `title`，它允许你向对象查询当前的标题值。例如：\n\
  \n```\nNSString *labelTitle = [label title];\n```\n\n现在你正在跳出黑盒子进行思考。但那个 `NSString`\
  \ 到底是什么东西？\n\n这是一个变量定义。就像 C 语言中的任何变量定义一样，`labelTitle` 变量是一个指向名为 `NSString` 的类的指针（因为星号）。很好，但什么是类呢？继续往下读。\n\
  \n### 大量的类（续）\n\nObjective-C 中的每个对象都属于一个*类*，因为行为和内部数据都是在类中指定的。类是方法（代码）定义和实现的地方。也是你定义哪些实例变量（数据）由该类管理的地方。\n\
  \n`NSString` 是一个提供丰富方法集用于存储和处理文本的类。名称中的 `NS` 表示它是 Cocoa Touch 中系统基础框架的一部分。\n\n***注意：***\
  \ 框架是你可以添加到应用程序中的类和其他资源的集合。你将在下一章全面了解提供所有有趣类的 Cocoa Touch 框架，例如 `NSString`。\n\n\
  另外，由于 Objective-C 缺乏命名空间，框架通常使用两个字符的前缀来防止类名冲突。最初为 NeXTSTEP 编写的基础类使用 `NS`。Cocoa Touch\
  \ 中的用户界面类使用 `UI`。一些开发者使用自己的类名前缀来避免这些冲突。例如，Iconfactory 在其项目间共享的所有类中都使用 `IF`。\n\n\
  因此，`labelTitle` 指向一个由系统定义的字符串对象的实例。由于你在变量中拥有这个对象指针，你可以向它发送消息。例如，你可以向你的 `labelTitle`\
  \ 发送 `uppercaseString` 消息，它将返回一个新的字符串对象，其中所有小写字母都已转换为大写字母：\n\n```\nNSString *moreAwesomeLabelTitle\
  \ = [labelTitle uppercaseString];\n```\n\n然后，这个 `moreAwesomeLabelTitle` 变量可以用来更新原始标签的标题：\n\
  \n```\n[label setTitle:moreAwesomeLabelTitle];\n```\n\n***提示：*** 嵌套对象及其消息是缩短代码并减少临时变量数量的有效方法。你可以将这三行代码：\n\
  \n```\nNSString *labelTitle = [label title];\nNSString *moreAwesomeLabelTitle =\
  \ [labelTitle uppercaseString];\n[label setTitle:moreAwesomeLabelTitle];\n```\n\n\
  通过使用这种技术压缩成一行代码：\n\n```\n[label setTitle:[[label title] uppercaseString]];\n```\n\
  \n只要确保正确平衡括号即可，否则编译器会抱怨！\n\n之前你可能好奇过，label 对象的 `setTitle:` 方法中的 `@\"Even\"` 和 `@\"\
  Odd\"` 参数是做什么的。问得好！由于字符串在编程中大量使用，Objective-C 的创建者为这些文本对象定义了一种简写形式。如果没有这种简写，`@\"\
  Even\"` 需要使用以下方式实例化：\n\n```\n[NSString stringWithUTF8String:″Even″]\n```\n\n那得多打不少字。而最优秀的程序员往往是“懒”的。欢迎加入我们！\n\
  \n### 类的细节\n\n至此，应该很明显，类在 Objective-C 中非常重要。它们充当着构建应用的积木，并让你避免编写大量枯燥的代码。不难想象 `uppercaseString`\
  \ 方法是如何实现的，但更妙的是完全不去想它，直接让系统来完成工作。\n\n类是在包含在你的源代码中的头文件中定义的。像 `NSString` 这样的系统级类会被默认引入。看看上一章自动为你创建的\
  \ `FlashlightAppDelegate.h` 文件的顶部：\n\n```\n#import <UIKit/UIKit.h>\n```\n\n这一行代码就引入了整个系统的类定义。预处理器首先加载用于开发\
  \ Cocoa Touch 用户界面的类（`UIKit`）。这些类又会接着加载用于管理数据的基础类以及用于绘图的 Core Graphics 类。\n\n***注意：***\
  \ 对于有经验的 C 程序员，请注意 `#include` 和 `#import` 之间有一个微妙的区别：预处理器会跟踪导入，并且不会多次包含同一个文件。这种技术使得避免多重定义变得容易得多！\n\
  \n类的这些头文件长什么样？以下是取自 `NSString.h` 头文件的 `NSString` 类定义的一部分：\n\n\n\n"
- '# Objective-C 接口定义


  @interface NSString : NSObject <NSCopying, NSMutableCopying, NSCoding>


  - (NSUInteger)length;


  - (unichar)characterAtIndex:(NSUInteger)index;


  @end


  即使你有其他编程语言的经验，这段代码也毫无意义。是时候拆解语法了！


  首先是 `@interface`：


  `@interface` NSString : NSObject <NSCopying, NSMutableCopying, NSCoding>  这行代码告诉
  Objective-C，你即将为一个类定义数据和方法。


  实际上，这是从该类实例化的每个对象的模板。接口也是类名定义为 `NSString` 的地方。


  接口定义一直持续到 `@end`，嗯，结束。


  ## 一统众类的基类


  在定义之后，有一个冒号和一些以 `NS` 开头的其他名称。这暗示你正在处理系统类的定义。其中最重要的是 `NSObject`：


  `@interface NSString :` **`NSObject`** `<NSCopying, NSMutableCopying, NSCoding>`
  在 Objective-C 中，所有类（因此也是所有对象）都“继承”自另一个类。


  *继承* 允许父类的特性传递给子类。子类（通常称为 *子类*）可以修改父类定义的方法和实例变量。（父类通常被称为 *超类*。）


  **提示：** 这个继承规则有一个例外，就是 `NSObject`。它是层级结构中的根类，不继承自任何其他类。


  就像从父母那里继承一样，继承让你免费获得很多行为（即使你不想要或不需要！）。即使这种继承不涉及金钱，你也会发现它价值连城，因为它节省了你大量的时间和精力。（有关此“免费代码”的详细信息，请参见第
  36 页的方框。）


  继承的一个例子出现在自定义视图中。在你开发的某个时刻，很可能需要开发一个自定义视图来显示某些特定于应用程序的数据。你将通过子类化一个系统类（如 `UIView`）来开始这项工作。


  在实现 `UIView` 的子类时，你会发现很多代码已经为你完成了。像处理多点触控事件、绘图、动画和视图管理这些事情都可以从父类中获得。你只需要为视图实现新的行为。


  ## 大量的类


  既然你已经了解了 Objective-C 中的类层级结构，那么应该清楚冒号后的第一个单词是被定义类的超类（父类）。`NSString` 的超类是 `NSObject`。


  ### 遵循协议


  在超类名称之后，你会看到一些尖括号（`< >`）中的其他类名：


  `@interface NSString : NSObject` **`<NSCopying, NSMutableCopying, NSCoding>`** 这些是类所采用的
  *协议*。协议定义了不与任何特定类关联的一组方法。


  使用协议就像签署合同。如果你通过在尖括号中包含类名称来指定你的类采用某个协议，你就承诺实现该协议中定义的方法。例如，`NSString` 协议承诺履行提供自身副本的契约。这些对象副本可以是只读的（使用
  `NSCopying`）和可写的（使用 `NSMutableCopying`）。`NSCoding` 协议告诉你该类也实现了用于编码和解码对象的方法。


  **注意：** `NSCoding` 中的编码和解码方法用于将对象归档到磁盘上或通过网络分发它们。这是 Cocoa 序列化对象的机制。


  定义新类时，协议不是必需的，但你会发现，在开发应用程序时，它们被广泛使用。协议最常见的用途是与委托一起使用；你将在下一章中看到这种设计模式。


  **注意：** 由于 Objective-C 仅支持单继承，因此协议经常被用来实现其他语言中多重继承的相同目标。


  ## 疯狂背后的方法


  仅仅为了理解一行代码就需要阅读这么多内容！值得庆幸的是，接下来的两行内容会稍微容易一些，这两行都以减号（`-`）开头。


  ```

  - (NSUInteger)length;


  - (unichar)characterAtIndex:(NSUInteger)index;

  ```


  这就是在类接口中定义方法（第 49 页）的方式。你只需这两个方法就可以表示 Cocoa 中的任何字符串：第一个返回字符串的长度；另一个返回索引位置上的 Unicode
  字符。


  **提示：** 在在线论坛、邮件列表或博客中撰写方法时，许多开发者使用方法签名的缩写形式：他们省略了类型信息和参数名称。Apple 的开发文档也使用这种格式。


  在求助帖中经常能看到类似“我在使用 `–messageWithFirstParameter:andSecondParameter:` 时遇到问题”的表述。这也是让方法签名保持可读性的另一个原因！上面显示的
  `NSString` 方法的简短形式是 `–length` 和 `–characterAtIndex:`。本书通篇使用这种格式。


  定义中还包含了任何参数和结果的类型。`–length` 方法返回一个无符号整数（`NSUInteger`）。`–characterAtIndex:` 方法接受一个无符号整数索引作为参数，并返回一个
  `unichar`。这些方法使用基本类型，但你也可以使用指向类名的指针来指定对象（稍后在 `–uppercaseString` 的定义中你会看到）。


  **提示：** 方法定义中使用的类型在编译时进行检查，但在运行时发送消息时则不会。当你看到编译器警告“`NSString`”可能无法响应“`–aNonexistentMethod`”时，请确保你正在将消息发送给正确类型的对象。


  ## 高级用户课堂：自我介绍


  免费代码的概念贯穿了整个对象层级结构。当你在处理一个 `UIView` 子类时，会向对象发送一个 description 消息，你将能够访问来自 `UIView`、`UIResponder`（处理触摸事件的地方）和
  `NSObject`（根类）的代码。


  这种特性在记录信息时也非常方便。Cocoa 的日志记录函数 `NSLog` 接受一个 `printf` 风格的字符串，并将结果输出到当前控制台设备：


  ```

  NSLog(@″THIS OBJECT IS AWESOME: %@″, chockLockObject);

  ```


  格式化说明符是通过一个 `NSString` 提供的（记住前面提到的 `@` 快捷方式）。还有一个新的格式化说明符——`%@`——它像 `%s` 打印 C 风格字符串一样打印
  `NSString`。


  真正酷的地方在于，日志记录函数足够智能，知道 `chockLockObject` 不是 `NSString` 的实例，因此它会使用对象的 description
  方法来创建要显示的字符串。


  要查看层级结构的威力，请查看 `NSObject` 中的 `–description` 方法。由于每个对象都是此根类的子类，因此它们都知道如何描述自己。该方法的默认实现返回对象的类名和一个内存地址。因此，即使你对一个对象一无所知，你也可以这样做：


  ```

  [mysteryObject description]

  ```


  当你调试或处理来自你无法直接控制的外部源的数据时，描述 `mysteryObject` 的结果字符串会很有帮助。


  例如，你与 Xcode 一起使用的调试器（gdb）包含一个 `print-object` 命令。当你在调试器中输入以下内容时：


  ```

  (gdb) po myObjectVariable

  ```


  描述 `myObjectVariable` 的结果字符串将被打印到控制台上。




  '
- "# 当编译器警告“方法中传递参数”时\n\n当编译器发出“方法中传递参数”的警告时，这提示你在向对象发送消息时存在类型不匹配问题。如果看到关于不兼容指针类型的消息，请确认你使用的是\
  \ `*@\"string\"*` 而非标准 C 语言的 `*\"string\"*`。“缺少类型转换”这类警告通常表明你使用了基本数据类型代替对象（或反之）。\n\
  \n若忽略这些警告，应用仍可运行，但一旦在消息中发送这些不兼容的类型，就会导致崩溃。\n\n请注意，这只是一个类定义，因此并未提及字符串数据的存储位置或方式。记住，你其实无需了解对象的内部工作机制。（你最终会爱上这种封装机制的。）但你可能在问：“第\
  \ 33 页提到的 `–uppercaseString` 方法去哪儿了？”问得好，这引出了 Objective-C 另一个强大且独特的功能：分类。\n\n##\
  \ 分类之说\n\n像字符串处理类这样重要的类存在一个问题：它们可能会变得非常庞大且笨重。分类通过将类定义拆分为多个部分来避免这个问题。以 `NSString`\
  \ 为例，主类定义中仅包含最基本的功能。该类的核心内容在这个分类中：\n\n```\n@interface NSString (NSStringExtensionMethods)\n\
  ```\n\n你之前（第 35 页）见过的 `@interface` 后面跟的是类名。只有看到括号时，事情才变得有趣起来。\n\n括号中的名称提示了这里的功能。这个类接口提供了扩展先前定义的\
  \ `NSString` 的方法。它在不使字符串基本定义杂乱的前提下，增加了新功能。\n\n**提示：** Objective-C 中的命名是一门艺术。允许使用冗长的名称，比如\
  \ `NSStringExtensionMethods` 这个分类名。只要确保名称描述性足够强，让你无需查阅文档就能理解其含义即可。\n\n该字符串分类包含以下方法定义：\n\
  \n```\n- (NSString *)uppercaseString;\n```\n\n这正是你在第 33 页见到的方法。\n\n但分类还有更酷的玩法。你可以用它们来扩展现有类（即使没有源代码也没问题）。假设你需要让所有字符串变得*超棒*。虽然你还不太清楚“超棒”具体指什么，但你知道自己会经常用到这个功能。\n\
  \n你可以像这样定义自己的分类：\n\n```\n@interface NSString (AwesomeMethods)\n\n- (NSString *)awesomeString;\n\
  \n@end\n```\n\n你基于现有类 `NSString` 创建分类，并通过在括号内加入 `AwesomeMethods` 为其指定分类名称。\n\n这个新类将拥有普通\
  \ `NSString` 的所有功能，同时还能响应一个名为 `–awesomeString` 的额外消息。更妙的是：系统中所有其他字符串对象都能理解这条新消息。如果通过子类实现\
  \ `–awesomeString`，你将花费大量时间重构自己的代码来使用新实现，还会遇到无法控制的代码（如 Cocoa API 返回的字符串）带来的问题。分类是一种强大的构造，让你能在不破坏现有代码的前提下扩展系统。\n\
  \n现在你需要的只是让字符串变“超棒”的代码。\n\n## 实现：美丽背后的智慧\n\n每个 `@interface` 都对应一个 `@implementation`。最简单的理解方式是：`@interface`\
  \ 是类从外部看的样子，而 `@implementation` 是类从内部看的样子。\n\n**注意：** 到目前为止，你一直在看接口头文件的内容。按照惯例，这些文件像\
  \ C 语言一样使用 `.h` 扩展名。接口的实现则放在 `.m` 文件中。只需记住：*方法（Methods）*放在以字母 *M* 结尾的文件里。\n\n以下是可能的实现方式：\n\
  \n```\n@implementation NSString (AwesomeMethods)\n\n- (NSString *)awesomeString\
  \ {\n    NSString *awesome = [self uppercaseString];\n    if (! [self hasSuffix:@\"\
  !]) {\n        // 添加震撼效果！！！\n        awesome = [awesome stringByAppendingString:@\"\
  !!!\"];\n    }\n    return awesome;\n}\n\n@end\n```\n\n现在，你的 Objective-C 代码阅读能力越来越强了。你会看到“超棒”字符串是通过老朋友\
  \ `–uppercaseString` 创建的。`–hasSuffix:` 方法检查末尾是否至少有一个感叹号。如果没有，`–stringByAppendingString:`\
  \ 方法就会添加必要的震撼效果。但这里的 `self` 是什么意思呢？\n\n每个方法实现都会接收一个名为 `self` 的隐藏参数，它引用接收消息的对象。由于你的方法是\
  \ `NSString` 类的一部分，`self` 指向该类的实例。（是的，你在方法里和自己对话，这完全没问题。）\n\n**注意：** C++、Java 和\
  \ PHP 都使用 `this` 来实现这种自引用。\n\n一旦实现了这个分类方法，你的代码就可以这样调用它：\n\n```\nNSString *ordinaryString\
  \ = @\"typing power\";\nNSString *excitingString = [ordinaryString awesomeString];\n\
  ```\n\n`excitingString` 对象的值将是“TYPING POWER!!!”。\n\n分类还能帮助你避免代码中的重复。假设你经常检查字符串是否为“超棒”状态。你就会反复编写这样的代码：\n\
  \n```\nNSString *myString = @\"something\";\nif ([myString isEqualToString:[myString\
  \ awesomeString]]) {\n    // 抱歉，myString 不是超棒字符串\n}\n\nNSString *myOtherString =\
  \ @\"SOMETHING ELSE!!!\";\nif ([myOtherString isEqualToString:[myOtherString awesomeString]])\
  \ {\n    // 而 myOtherString 则是真正的超棒字符串\n}\n```\n\n这样写既麻烦又难读。因此，在 `NSString` 的分类接口中添加以下内容：\n\
  \n```\n@interface NSString (AwesomeMethods)\n\n- (NSString *)awesomeString;\n- (BOOL)isAwesomeString;\n\
  \n@end\n```\n\n并在实现中添加以下内容：\n\n```\n- (BOOL)isAwesomeString {\n    return [self\
  \ isEqualToString:[self awesomeString]];\n}\n```\n\n这大大简化了你的检查代码：\n\n```\nNSString\
  \ *myString = @\"something\";\nif ([myString isAwesomeString]) {\n    // 抱歉，myString\
  \ 不是超棒字符串\n}\n\nNSString *myOtherString = @\"SOMETHING ELSE!!!\";\nif ([myOtherString\
  \ isAwesomeString]) {\n    // 而 myOtherString 则是真正的超棒字符串\n}\n```\n\n同样重要的是要注意，至此你并未真正创建新类。你只是在系统框架提供的代码基础上进行扩展，以满足自身需求。\n\
  \nCocoa Touch 本身就很棒；你只是让它变得更棒。\n\n## 创建新类\n\n如你所见，分类能完成很多工作，并提供了一种扩展现有代码（非你编写）的绝佳方式。但它们有一个主要限制：你不能在分类定义中添加实例变量。对于\
  \ `NSString` 类来说，你又怎么能添加呢？类接口完全没有说明字符串是如何存储的。\n\n是时候学习如何创建新类并扩展 Cocoa 层次结构了。为了展示具体做法，你将创建一个能让你控制感叹号数量的新类，就像“THIS\
  \ IS GOING TO BE AWESOME!!!!!!!”这个短语那样。\n\n首先要做的是为这个新类创建 `@interface`：\n\n```\n\
  @interface AwesomeStringMaker : NSObject\n{\n    NSNumber *exclamationCount;\n \
  \   NSString *originalString;\n}\n\n- (NSNumber *)exclamationCount;\n- (void)setExclamationCount:(NSNumber\
  \ *)newExclamationCount;\n- (NSString *)originalString;\n- (void)setOriginalString:(NSString\
  \ *)newOriginalString;\n\n@end\n```\n\n\n\n```objc\n- (NSString *)awesomeString;\n\
  \n@end\n```\n\n这段代码看起来与第 39 页的类分类相似。这次，括号中的分类名称消失了，而花括号 `{ }` 中增加了一些新代码。类的数据就是在这些花括号之间指定的。\n\
  \n这个示例有两个实例变量：一个用于跟踪感叹号数量的数值，以及一个你想要变得「酷炫」的字符串。\n\n## 创建新类\n\n**注意：** 你会发现类数据有多种称呼方式。Objective-C\
  \ 开发者会混用 `instancevariable`、`ivar` 和 `property` 这几个术语。如果你和长期使用 C++ 的开发者交流，可能会听到\
  \ `membervariables`。Java 的忠实用户则称之为 `fields`。\n\n使用哪个术语并不重要；它本质上仍然只是与类每个实例相关联的一块内存。\n\
  \n接口末尾的幾個新方法允许你读取和写入这个新类管理的数据。这些方法被称为*存取器*，因为它们让你能够访问类的内部信息。按照惯例，读取实例变量的方法直接使用变量名，而更新实例变量的方法则以\
  \ `set` 为前缀。在其他语言中，这些方法被称为 *getters* 和 *setters*。\n\n只有该类的实现才能轻松访问所有实例数据。如果没有存取器方法，这些数据实际上是隐藏的。在大多数情况下，这是一件好事，尤其是当你拥有不想暴露给调用者的私有数据时。\n\
  \n现在来看 `AwesomeStringMaker` 类的 `@implementation`：\n\n```objc\n@implementation AwesomeStringMaker\n\
  \n- (NSNumber *)exclamationCount {\n    return exclamationCount;\n}\n\n- (void)setExclamationCount:(NSNumber\
  \ *)newExclamationCount {\n    if (exclamationCount != newExclamationCount) {\n\
  \        [exclamationCount release];\n        exclamationCount = [newExclamationCount\
  \ retain];\n    }\n}\n\n- (NSString *)originalString {\n    return originalString;\n\
  }\n\n- (void)setOriginalString:(NSString *)newOriginalString {\n    if (originalString\
  \ != newOriginalString) {\n        [originalString release];\n        originalString\
  \ = [newOriginalString copy];\n    }\n}\n\n- (NSString *)awesomeString {\n    NSString\
  \ *awesome = [originalString uppercaseString];\n    NSUInteger length = [awesome\
  \ length];\n    NSInteger padding = [exclamationCount unsignedIntValue];\n    NSString\
  \ *moreAwesome = [awesome stringByPaddingToLength:(length + padding) withString:@\"\
  !\" startingAtIndex:0];\n    return moreAwesome;\n}\n\n@end\n```\n\n借助 `AwesomeStringMaker`\
  \ 的强大功能，你可以这样使用该类：\n\n```objc\nAwesomeStringMaker *myAwesomeStringMaker = [[AwesomeStringMaker\
  \ alloc] init];\n[myAwesomeStringMaker setExclamationCount:[NSNumber numberWithFloat:8.0f]];\n\
  [myAwesomeStringMaker setOriginalString:@\"typing power\"];\nNSString *myAwesomeString\
  \ = [myAwesomeStringMaker awesomeString];\n// myAwesomeString 现在包含 \"TYPING POWER!!!!!!!!\"\
  \n[myAwesomeStringMaker release];\n```\n\n**提示：** 在学习 Objective-C 时，请注意哪个对象接收哪个消息。如果你尝试向\
  \ `NSString` 的实例而不是 `AwesomeStringMaker` 发送 `-setExclamationCount:` 消息，编译代码时会收到“方法未找到”的警告。在运行时，你的应用会因为\
  \ `NSString` 类不知道如何处理你发送的消息而在 `objc_msgSend` 中抛出异常并崩溃。\n\n## 管理内存\n\n如果你看一下类中 `exclamationCount`\
  \ 和 `originalString` 的存取器，会发现实例变量上调用了某些新方法。`retain`、`copy` 和 `release` 消息极其重要：你需要用它们来管理对象的内存使用。\n\
  \n**注意：** 内存也是 Objective-C 中较难理解的概念之一，所以如果一开始没弄明白，不必灰心。\n\n正如你之前了解的，在你使用 iPhone\
  \ 的每一秒，都有成千上万个对象被创建和销毁。而每个对象都会占用一块内存，这在移动设备上是宝贵的资源。你的台式电脑可能以 GB 计量内存容量，但手机只有几百 MB。\n\
  \n如果你不注意内存使用，iPhone 操作系统就会关闭你的应用。如果不这样做，系统最终会陷入停滞，你只能重启手机。这对于正在等待重要电话的你来说，会相当不便。\n\
  \n那么，这些 `-retain`、`-release` 和 `-copy` 方法是如何管理内存的呢？\n\n内存中的每个对象都维护着一个计数器。这个计数器跟踪有多少其他对象正在使用该对象。当你想要使用一个对象时，必须告知该对象，以便它更新计数器，而你要做的就是发送\
  \ `-retain` 消息。\n\n发送该消息后，对象会更新其保留计数，并且该对象不会被删除。如果你想知道有多少其他对象持有对该对象的引用，可以向它发送 `-retainCount`\
  \ 消息，它会返回计数器的当前值。对象初始分配时，其保留计数被设置为 `1`。\n\n现在你知道了如何让对象保留在内存中，接下来需要一种方法，在你用完它们后将其清除。这就是\
  \ `-release` 消息的作用。它的作用与 `-retain` 正好相反；它不是增加，而是*减少*保留计数。你是在告诉对象你不再需要它了。\n\n当你的应用在\
  \ Cocoa Touch 环境中运行时，系统会定期检查对象的保留计数。计数为零的对象不再被任何其他对象使用，因此系统可以删除它们并回收其内存。\n\n既然你已经熟悉了\
  \ retain 和 release 的机制，让我们更详细地看一下存取器：\n\n```objc\nif (exclamationCount != newExclamationCount)\
  \ {\n```\n\n这行代码是一个简单的性能优化。如果旧对象和新对象是同一个，就无需调整保留计数。\n\n**提示：** 这段代码比较的是指针地址，这是一种快速（且有效）检查两个对象是否相同的方法。事实上，`NSObject`\
  \ 的 `-isEqual` 方法也使用了同样的方法。（对于许多类，比如 `NSString`，检查相等性比检查指针要复杂得多。）\n\n首先要做的是通过发送\
  \ `-release` 消息，告诉旧的实例变量你不再需要它：\n\n```objc\n[exclamationCount release];\n```\n\n\
  现在你已经释放了实例变量，就无法保证该变量仍然有效。如果你尝试向 `exclamationCount` 发送更多消息，应用很可能会崩溃。因此，下一步是保留传入存取器的新对象。`retain`\
  \ 方法会返回自身，因此该返回值用于更新 `exclamationCount` 的实例变量。此时，再次向该对象发送消息就是安全的了：\n\n```objc\n\
  exclamationCount = [newExclamationCount retain];\n```\n\n`-retain` 消息的一种变体是 `-copy`\
  \ 消息。和 retain 一样，你会拥有对该对象的独有引用，该引用在你决定释放之前不会消失。区别在于，你持有的是原始对象数据的一个副本。\n\n这里有一个 `-copy`\
  \ 派上用场的场景。对于 `originalString` 实例变量，你不希望使用 `-retain`，因为原始字符串可能被另一个对象修改。请记住，如果你与许多其他对象共享一个引用，并且其中一个对象修改了该字符串，那么当你调用\
  \ `-awesomeString` 时就会看到这个变化。\n\n\n\n你想要拥有字符串的独立副本，因此应该使用以下代码：`originalString =\
  \ [newOriginalString copy];`\n\n如果另一个对象修改了 `newOriginalString` 所指向的对象，你不会受到影响。\n\
  \n**服用 `nil` 这颗药丸**\n\n有时你想彻底清空一个实例变量。可能是因为不再使用该对象，想要释放内存；或者你正在应用程序中建模某种状态，而对象的缺失本身具有意义。你可以使用一个名为\
  \ `nil` 的特殊对象来清空变量。如果一个引用对象的变量包含 `nil` 值，则表示没有对象。\n\n`nil` 对象具有一种有趣的行为，会影响你在管理内存时对它们的使用。当你向\
  \ `nil` 对象发送消息时，该消息会被忽略，并返回 `nil` 结果。这种技术通常被称为 `nil` 目标消息，如下所示：\n\n```\nNSString\
  \ *missingString = nil;\n\nNSString *excitingString = [missingString awesomeString];\n\
  \n// excitingString 的值也是 nil\n```\n\n当你在编写使用 `retain`、`copy` 和 `release` 的访问器时，这一特性可以帮助清理内存。要了解其工作原理，请将\
  \ `newExclamationCount` 替换为 `nil`，代码将变成：\n\n```\nif (exclamationCount != nil) {\n\
  \    [exclamationCount release];\n    exclamationCount = [nil retain];\n}\n```\n\
  \n如果当前计数值不是 `nil`，则会释放 `exclamationCount` 对象。然后，`retain` 消息返回的 `nil` 结果被用来设置新的计数值。\n\
  \n`nil` 目标消息还能帮助防止在初始化失败后的代码中发生崩溃。（初始化失败的对象会被赋值为 `nil`，以表示它们不存在。）当你想要管理某种状态时，也可以利用\
  \ `nil` 对象。例如，在一个视图中使用 `middleName` 实例变量：如果该变量的值是 `nil`，你就知道不需要显示一个人的中间名。\n\n某些代码还会利用\
  \ `nil` 的数值：零。以 `exclamationCount` 为例，当它为 `nil` 时，`unsignedIntValue` 消息会被忽略，并返回\
  \ `nil`：`NSInteger padding = [nil unsignedIntValue];`\n\n// padding 的值是零\n\n当内边距为\
  \ 0 时，不会使用任何感叹号，这对于实例变量没有对象的情况来说似乎是一种合理的行为。另一方面，如果你的代码需要一个对象，但尚未设置，你应该使用类似下面的代码：\n\
  \n```\nif (myObject) {\n    [myObject doSomething];\n}\nelse {\n    NSLog(@\"无法执行\
  \ doSomething，因为 myObject 是 nil！\");\n}\n```\n\n再次说明，这段代码依赖于 `nil` 对象值为零的事实。如果 `myObject`\
  \ 有值，其非零值将允许发送 `doSomething` 消息。\n\n**提示：** `nil` 对象也可能是令人费解的根源。如果你忘记初始化一个变量，在向它发送消息时，你会疑惑为什么对象实例没有按预期工作。当你进入调试器、显示该对象并看到“无法访问地址\
  \ 0x0 的内存”时，顿悟的时刻就到了。你的对象值为零。\n\n**轻松使用 Autorelease**\n\nAutorelease 与松开你的汽车无关。在处理临时对象时，所有那些保留、复制和释放操作都是相当繁琐的编程工作。通常，你只需要对象存在足够长的时间来完成某些工作。例如，许多对象从不会超出方法实现的作用域。\n\
  \n那些聪明又懒惰的、提出 Objective-C 的程序员们想出了一个变通方法，叫做 `autorelease` 方法。要了解其工作原理，首先看看 `myAwesomeStringMaker`\
  \ 对象是如何管理的：\n\n```\nAwesomeStringMaker *myAwesomeStringMaker = [[AwesomeStringMaker\
  \ alloc] init];\n\n// 对 myAwesomeStringMaker 进行一些操作\n\n[myAwesomeStringMaker release];\n\
  ```\n\n这段代码可以通过使用 `autorelease` 消息来简化：\n\n```\nAwesomeStringMaker *myAwesomeStringMaker\
  \ = [[[AwesomeStringMaker alloc] init] autorelease];\n\n// 对 myAwesomeStringMaker\
  \ 进行一些操作\n```\n\n在对象被分配和初始化之后，它会收到 `autorelease` 消息。一个被自动释放的对象保证在当前方法执行期间保留在内存中。之后，它将在无需你直接干预的情况下被删除。\n\
  \n这一特性大大简化了你的工作。在这个例子中，`myAwesomeStringMaker` 只在短时间内需要，因此自动释放会自动清理对象。如果你在分配对象和方法结束之间对\
  \ `myAwesomeStringMaker` 进行了大量操作，很容易忘记发送 `release` 消息。\n\n由于其他程序员和你一样聪明又懒惰，许多方法返回的都是自动释放的对象。前提是你可能不会长时间需要该对象，因此最好让系统来进行清理。\n\
  \n按照惯例，只有名称中包含 `init` 或 `copy` 的方法才会返回非自动释放的对象。如果你使用了这些方法之一，就必须关注内存的情况。更多细节请参见下面的方框。\n\
  \n## 智者箴言：牢记规则\n\n长久以来使用 Cocoa 的程序员都会引用以下规则（最初由 Don Yacktman 编写），每当有人询问关于如何管理内存的问题时：\n\
  \n- 如果你分配、复制或保留了某个对象，那么你就有责任在不再需要该对象时，使用 `release` 或 `autorelease` 来释放它。如果你没有分配、复制或保留某个对象，那么就不应该释放它。\n\
  - 当你收到一个对象（作为方法调用的结果）时，它通常会在你的方法结束前保持有效，并且可以安全地作为方法的结果返回。如果你需要该对象的生存期更长——例如，你计划将其存储在一个实例变量中——那么你必须\
  \ `retain` 或 `copy` 该对象。\n- 当你想要返回一个对象但又希望放弃对其的所有权时，使用 `autorelease` 而非 `release`。出于性能考虑，在可以的情况下使用\
  \ `release`。\n- 当你想要防止一个对象因正在执行的操作的副作用而被销毁时，使用 `retain` 和 `release`（或 `autorelease`）。\n\
  \n**管理内存**\n\n**属性与点语法**\n\n随着你的 Objective-C 编码水平不断提高，你会发现类中的访问器开始变得非常多。它们是另一种无聊的代码，懒惰的程序员想要避免，尤其是那些一遍又一遍重复的\
  \ `retain` 和 `release` 内容。你可以利用另一种称为*声明属性*的捷径。\n\n这一语言特性提供了一种简单的方式来指定、实现和使用类的访问器方法。\n\
  \n当你使用属性时，类的接口和实现都会发生变化：\n\n```\n@interface AwesomeString : NSString\n{\n    NSNumber\
  \ *exclamationCount;\n    NSString *originalString;\n}\n\n@property (nonatomic,\
  \ retain) NSNumber *exclamationCount;\n@property (nonatomic, copy) NSString *originalString;\n\
  \n- (NSString *)awesomeString;\n\n@end\n```\n\n每个属性都使用括号内的属性进行配置。`nonatomic` 属性使访问器速度更快；只有在处理多线程时才需要原子属性。`retain`\
  \ 属性会导致实例变量在赋值期间使用 retain/release 模式。同样，`copy` 属性使用 copy/release 模式。你刚刚删除了两行代码，但等等，还有更多好处！\n\
  \n\n\n"
