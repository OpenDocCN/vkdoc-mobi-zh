  \n但即使你习惯在一个窗口中阅读帮助屏幕，同时尝试在另一个窗口中工作，仍然缺少些什么。有时，简洁的电子帮助屏幕假设你已经理解了当前讨论的内容，匆匆跳过需要深入讲解的重要主题。此外，你并非总能获得对程序功能的客观评价。（你的工程师同事常常会在程序中加入技术复杂的特性，是因为他们*能*做到，而不是因为你需要它们。）你不该浪费时间学习那些无助于完成工作的功能。\n\
