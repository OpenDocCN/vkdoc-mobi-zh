- "# 类的方法\n\n一旦你为类定义了属性，你可能会想使用*点语法*来访问它们。这种语法让你无需使用方括号即可访问实例变量。终于，我们这些 C++ 和 Java\
  \ 程序员可以松一口气了！对于许多开发者来说，这种代码会更具可读性：\n\n```\nAwesomeStringMaker *myAwesomeStringMaker\
  \ = [[[AwesomeStringMaker alloc] init] autorelease];\n\n// 使用点语法设置属性的值...\nmyAwesomeStringMaker.exclamationCount\
  \ = [NSNumber numberWithFloat:8.0];\nmyAwesomeStringMaker.originalString = @\"typing\
  \ power\";\n\nNSString *myAwesomeString = [myAwesomeStringMaker awesomeString];\n\
  \n// 或使用点语法读取属性\nif ([myAwesomeStringMaker.exclamationCount integerValue] < 4) {\n\
  \    // 这还不够棒\n    myAwesomeStringMaker.exclamationCount = [NSNumber numberWithFloat:8.0];\n\
  }\n```\n\n等号左边的属性将使用 setter 方法，而等号右边的同一个属性将使用 getter 方法。\n\n## 类的方法\n\n此前，你可能会对这段代码感到有些困惑：\n\
  \n```\n[NSString stringWithUTF8String:\"Even\"]\n```\n\n就在我们讨论向对象实例发送消息时，现在你却没有使用对象实例。\n\
  这条消息到底发到哪里去了？\n\n要回答这个问题，我们先看一下 `NSString` 接口中的定义：\n\n```\n+ (id)stringWithUTF8String:(const\
  \ char *)bytes;\n```\n\n没错，这又是 Objective-C 带来的一个古怪字符。这次是个加号（`+`）。\n\n在第 37 页中，你看到过方法定义以减号开头。\n\
  但那些只是*实例*方法。*类*方法是另一种类型。\n\n对于实例方法，你需要一个引用对象实例的变量才能发送消息。有时这会在你的类设计中造成限制：你希望在不依赖对象实例的情况下也能调用某个方法。类方法正是\
  \ Objective-C 解决此问题的方案。使用这些方法，你可以直接向类发送消息，而不需要实际的对象。\n\n这些类方法通常用于创建新的对象实例。`+stringWithUTF8String:`\
  \ 方法就是这样一个例子；向类发送消息让它返回一个供你在代码中使用的新对象。\n\n## 初始化对象\n\n> **注意：** 你可能熟悉使用*工厂*对象。这正是向类发送消息所做的事情。`+stringWithUTF8String:`\
  \ 消息充当了 `NSString` 新实例的工厂。\n\n那么，怎样才能让你的 `AwesomeStringMaker` 类更上一层楼呢？一个返回 `mostAwesomeString`\
  \ 的类方法：\n\n```\n@interface AwesomeStringMaker : NSObject\n. . .\n+ (NSString *)mostAwesomeString;\n\
  @end\n```\n\n你的实现代码会是这样：\n\n```\n@implementation AwesomeStringMaker\n. . .\n+ (NSString\
  \ *)mostAwesomeString {\n    return @\"CHOCKLOCK!!!!!!!!\";\n}\n@end\n```\n\n现在，当你需要让你的应用更加出色时，甚至无需思考：\n\
  \n```\n[label setTitle:[AwesomeStringMaker mostAwesomeString]];\n```\n\n## 初始化对象\n\
  \n你的 `AwesomeStringMaker` 类有一个 bug。这很难想象，不是吗？\n\n```\nAwesomeStringMaker *myAwesomeStringMaker\
  \ = [[[AwesomeStringMaker alloc] init] autorelease];\nmyAwesomeStringMaker.originalString\
  \ = @\"typing power\";\nNSString *myAwesomeString = [myAwesomeStringMaker awesomeString];\n\
  ```\n\n`myAwesomeString` 的值是“TYPING POWER”。它缺少了一些令人惊叹的感叹号！！！！！这是因为当创建一个新对象实例时，所有实例数据都会被清空。指针被设置为\
  \ `nil` 值，数字被设置为零。这意味着你的`exclamationCount` 实例变量为零。而零个感叹号是无法让人感到震撼的。\n\n这种情况揭示了一个更大的问题：你的对象通常需要在发送消息之前进行设置。在\
  \ Objective-C 中，有一个专门用于此目的的方法：\n\n```\n- (id)init {\n    if (self = [super init])\
  \ {\n        // 既然能用很多，为什么只用一点？\n        exclamationCount = [[NSNumber numberWithInt:8]\
  \ retain];\n        originalString = [@\"\" copy];\n    }\n    return self;\n}\n\
  ```\n\n这段代码看起来可能有些复杂，但它做的事情既简单又优雅：每个对象在内存中分配之后，新的实例都会收到 `-init` 消息。你可以选择忽略这条消息，但更可能的情况是你不会忽略。\n\
  \n> **注意：** 你可能想知道为什么每个对象都会收到 `-init` 消息。这是因为默认实现位于 `NSObject` 中，而每个对象都是这个根类的后代。如果你没有实现这个方法，它将被超类（包括\
  \ `NSObject`）处理。\n\n当你的对象收到该消息时，它会将向父对象（由隐式变量 `super` 表示）发送 `-init` 消息的结果赋值给变量 `self`。这又是怎么回事呢？\n\
  \n就像你的类需要进行一些初始化工作一样，你的父类也可能需要做一些。你并不确切知道那些设置是什么，但现在是你与 `NSObject` 之间的所有类进行初始化的唯一机会。\n\
  \n在给了所有其他类完成设置的机会后，你检查赋值给 `self` 的结果。有可能某个超类无法初始化自身，从而返回了 `nil`。如果是这种情况，你也会跳过自己的初始化并返回\
  \ `nil`。\n\n假设超类一切顺利，你将有机会把 `exclamationCount` 设置为惊人的 8 个字符。\n\n### 释放位置\n\n你的代码中仍然存在一个相当严重的\
  \ bug。你费尽心思地进行了保留、复制和释放访问器的工作。但当整个对象被释放时会发生什么？除非你调用了每个访问器并将值设置为 `nil`，否则实例变量使用的内存将永远不会被释放。\n\
  \n在实现类时，你有责任在类的对象被释放时清理自己。要做到这一点，你需要使用 `-dealloc` 方法。就像 `-init` 让你进行设置一样，`-dealloc`\
  \ 方法则让你进行拆除工作。以下是你的 `AwesomeStringMaker` 类中该方法应有的样子：\n\n```\n- (void)dealloc {\n\
  \    [exclamationCount release];\n    [originalString release];\n    [super dealloc];\n\
  }\n```\n\n首先，释放你的两个实例变量，以便可以回收它们占用的内存。\n然后，将 `-dealloc` 消息转发给超类，让它执行自己的清理工作。\n\n\
  ### 手动重写\n\n你可能已经注意到，`-init` 和 `-dealloc` 从未在你的 `@interface` 中定义过。这是因为没有必要；作为 `NSObject`\
  \ 的后代，这个方法已经被声明过了。你自己对这两个方法的实现只是“重写”了在超类中定义的那些方法。\n\n\n\n"
- "# 类文档指南\n\n类文档会给出关于哪些方法可以被重写的指导。在某些情况下，这是必需的：如果你创建了一个绘制自身内容的`UIView`类，必须重写`-drawRect`方法来显示该视图。在其他情况下，重写方法提供了灵活性和自定义能力。例如，通过`-layoutSubviews`方法，重写可以让你显式地控制界面元素的位置，这是使用默认机制无法实现的。\n\
  \n## 循环：好与坏\n\n使用变量进行循环可能是你最早学习的编程概念之一。你会很高兴地知道，Objective-C 有`for`循环——而且其语法比纯 C\
  \ 更好。\n\n你将在下一章全面了解`NSArray`类，但目前你只需要知道它是一个管理零个或多个对象的类。当你有多个对象时，很可能你需要在某个时候遍历它们的内容。\n\
  \n你可以使用标准 C 中的老式`for`循环：\n\n```\nNSArray *myArray = [NSArray arrayWithObjects:@\"\
  THIS\", @\"IS\", @\"AWESOME!!!\", nil];\nNSUInteger count = [array count];\nNSUInteger\
  \ i;\nfor (i = 0; i < count; i++) {\n    NSString *element = [myArray objectAtIndex:i];\n\
  \    if ([element isAwesomeString]) {\n        NSLog(@\"CONGRATULATIONS!!!!!!!!!\"\
  );\n    }\n}\n```\n\n但 Objective-C 有一种叫做**快速枚举**的构造，可以省去大量输入：\n\n```\nNSArray *myArray\
  \ = [NSArray arrayWithObjects:@\"THIS\", @\"is!\", @\"AWESOME!!!!\", nil];\nfor\
  \ (NSString *element in myArray) {\n    if ([element isAwesomeString]) {\n     \
  \   NSLog(@\"CONGRATULATIONS!!!!!!!!!\");\n    }\n}\n```\n\n更重要的，这种枚举形式由运行时优化，消除了循环不变式引入错误的可能性。\n\
  \n这是另一个聪明而简洁的代码示例——更简单、更安全、更快。\n\n## 你的异常代码\n\n作为开发者，你知道事情并不总是按计划进行。不符合预期的代码是你生活中源源不断的“乐趣”。幸运的是，Objective-C\
  \ 提供了编译器指令来帮助你处理代码块中的异常：\n\n- 使用`@try`标记可能抛出异常的代码。\n- `@catch()`用于指定异常发生时运行的代码。如果需要处理不同类型的异常，可以使用多个块。\n\
  - 如果你有无论是否发生异常都需要运行的代码，可以使用`@finally`。\n\n以下是使用所有三个指令的示例：\n\n```\nNSArray *myArray\
  \ = [NSArray array]; // 一个没有元素的数组\n\n@try {\n    // 数组为空，所以这一行会失败：\n    [myArray\
  \ objectAtIndex:0];\n}\n@catch (NSException *exception) {\n    NSLog(@\"name = %@,\
  \ reason = %@\", [exception name], [exception reason]);\n}\n@finally {\n    NSLog(@\"\
  Glad that's over with...\");\n}\n```\n\n这将在控制台日志中生成以下输出：\n\n```\nname = NSRangeException,\
  \ reason = *** -[NSCFArray objectAtIndex:]: index (0) beyond bounds (0)\nGlad that's\
  \ over with...\n```\n\n如果你没有捕获异常，你的应用程序会退出，并将用户突然送回 iPhone 的主屏幕。捕获异常是一件好事。\n\n当你的代码需要生成一个异常时，使用`NSException`类。假设你遇到了一个不够“awesome”的字符串，你可以像这样抛出一个异常：\n\
  \n```\n[[NSException exceptionWithName:@\"AwesomeException\" reason:@\"Not awesome\
  \ enough\" userInfo:nil] raise];\n```\n\n你可以使用`userInfo`参数，如果你需要随异常提供一些额外信息（例如，有问题的字符串）。\n\
  \n**提示：** 在调试时，在即将抛出异常之前设置断点通常很有帮助。这样，你可以在错误发生的位置看到堆栈跟踪。在`objc_exception_`处添加一个断点。\n\
  \n\n\n"
- "# 使用调试器学习\n\n`throw`，调试器会向你展示导致问题的全部过程。\n\n## 通过崩溃学习\n\n一本介绍编程语言的书中包含使用调试器的章节，这看起来可能有些奇怪。但请想一想你上次学习一门新语言时的经历：你会遇到大量错误，因为一切都是新的，而且你会做一些经验丰富的开发者会避免的事情。\n\
  \nXcode 内置了一个强大的调试器；它基于来自 GNU 开发工具的`gdb`。与 Objective-C 编译器一样，调试器的一些扩展使其与对象和运行时架构兼容。\n\
  \n运行代码时，你可以选择启用或禁用断点。\n\n## 启用断点\n\nXcode 的工具栏有一个按钮可以切换断点：你也可以选择 **运行** ➝**调试**\
  \ ➝**开启断点**（或按 ⌘-Option-Y）来启动你的应用程序并启用断点。\n\n一旦启用了断点，你可以通过以下几种方式设置新的断点：\n\n- 当点击源代码左侧的装订线时，会出现一个蓝色箭头（图\
  \ 2-1）。该箭头表示已设置断点，并且当代码执行到此处时，你的应用程序会停止。如果你再次点击该箭头，它会变暗并变为禁用状态。你也可以按住 Control 键或右键点击该箭头，以获取包含其他选项的上下文菜单。\n\
  - 当你选择 **运行** ➝**显示** ➝**断点**（或按 ⌘-Option-B）时，所有当前的断点都会显示出来。你可以通过双击最后一行并输入符号名称来为显示的列表添加一个断点。\n\
  \n当你想要在没有源代码的地方（例如，在 Cocoa Touch 框架中）设置断点时，将需要使用此方法。你也可以在此窗口中通过选择断点并按 Delete 键来删除它。\n\
  \n## 手动设置断点\n\n当手动设置断点时，你可以使用函数名，例如`objc_exception_throw`，调试器会在它执行之前暂停。但由于你是 Objective-C\
  \ 的新手，你更可能想要在某个类方法处设置断点。以下是一些设置此类断点的特殊语法：\n\n- 要在实例方法处停止，请使用格式`–[ClassName methodName:]`。例如，要在`NSArray`的`–objectAtIndex:`方法处停止，你可以使用`–[NSArray\
  \ objectAtIndex:]`。（在指定名称时，请务必记住冒号，否则断点将不会触发。）\n\n**54**\n\niPhone App 开发：缺失手册\n\
  \n![Image 21](img/index-73_1.jpg)\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**你的异常代码**\n\n***图 2-1：*** *实战中的 Xcode 调试器。你可以使用工具栏图标（A）启用或禁用断点。要在源代码中设置断点，请点击左侧装订线，直到看到蓝色箭头（B）。断点窗口显示了所有已定义的断点，你可以在列表末尾添加新断点（C）。当断点被触发时，源代码行会高亮显示（D），你可以通过弹出菜单（E）轻松导航堆栈回溯。还有可用于单步执行代码的控件（F）。更高级的操作可以在调试器控制台（G）中执行。*\n\
  \n- 对于类方法，语法类似：只需在第一个括号前使用加号（`+`）而不是减号（`–`）。要在`NSArray`的`+array`方法处停止，你可以使用`+[NSArray\
  \ array]`。\n\n## 检查变量\n\n一旦在断点处停止，你可以通过将鼠标指针悬停在源代码上来检查变量。在许多情况下，你将需要使用`gdb`命令行来检查实例变量的状态并向它们发送消息。以下是一些重要的技巧：\n\
  \n- `po`，即打印对象（print object）命令，显示对象的描述。在许多情况下，这将包含有助于你弄清楚发生了什么的信息。\n\n以第 52 页代码中的`myArray`变量为例：\n\
  \n```\n(gdb) po myArray\n<NSCFArray 0x3b0e850>(\n)\n\n\n\n# 排版后的内容\n\n用于数组的打印对象命令通常会显示数组中的所有元素。在此例中，未显示任何元素，因此可知访问第一个元素将会出现问题。\n\
  \n## 第二章：括号的力量\n\n**55**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  **你的卓越代码**\n\n- `p`（即 `print` 命令）用于显示固有类型的值。与之前的命令类似，它能智能识别你所检查的数据类型：必要时会使用结构体和枚举。\n\
  \n- 两种 `print` 命令均可调用方法。例如，若发现某个对象未被正确保留而出现问题时，可临时通过以下方式进行修复：\n\n```\n(gdb) po [myArray\
  \ retain]\n<NSCFArray 0x3b0e850>(\n)\n```\n\n上述示例返回一个对象，因此使用了 `po` 命令。如果方法返回的是固有类型，则需要使用\
  \ `p` 命令，并告知调试器预期的类型。例如，当你查询数组中的条目数量时，指定返回整数结果：\n\n```\n(gdb) p (int)[myArray count]\n\
  $1 = 0\n```\n\n- 当你在控制台中看到 `address 0x0` 时，这表示一个 `nil` 对象（详见第 45 页）。例如，若向空数组请求最后一个对象，由于不存在该对象，你会收到\
  \ `nil` 的返回结果：\n\n```\n(gdb) po [myArray lastObject]\nCannot access memory at address\
  \ 0x0\n```\n\n- `p` 命令还可用于为变量赋予新值。要修复因空数组引发的异常，可以分配一个包含单个字符串的新数组：\n\n```\n(gdb)\
  \ p myArray=[NSArray arrayWithObject:@\"MY CODE IS PERFECT\"]\n$2 = (NSArray *)\
  \ 0x3b0ee40\n(gdb) po myArray\n<NSCFArray 0x3b0ee40>(\nMY CODE IS PERFECT\n)\n```\n\
  \n- `b` 命令可用于在 `gdb` 提示符下设置断点。例如，要在按数组索引获取对象前停止应用程序，可使用：\n\n```\n(gdb) b –[NSArray\
  \ objectAtIndex:]\nBreakpoint 1 at 0xf135h90d\n```\n\n你大概已经知道，熟悉调试器的使用能让你成为更高效的开发者。想了解更多，可首先搜索\
  \ *Xcode Debugging Guide*（Xcode 调试指南）。如需更高级的信息，可查阅 *Debugging with GDB*（使用 GDB 调试）。这两份文档均可通过第\
  \ 61 页所述的文档查看器获取。\n\n**56**\n\niPhone 应用程序开发：遗失的手册\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 选择器投影\n\n由于 Objective-C 是一种动态语言，它在运行时而非编译时解析方法。这种机制提供了一种微妙但强大的功能：你可以将方法作为参数传递给其他方法。\n\
  \n`选择器` 是特殊的变量，用于标识对象实例应使用哪个方法实现。Objective-C 运行时使用内部数据结构将消息的选择器与要执行的代码进行匹配。\n\n\
  ***提示：*** 如果你使用过其他语言，可以将选择器视为动态函数指针。\n\n选择器的名称会自动指向正确的函数，并适应其使用的任何类。\n\n这种行为让你可以在\
  \ Objective-C 中实现多态。如果你有三个分别名为 `Circle`、`Triangle` 和 `Square` 的类，你可以向这些类的每个实例发送一个\
  \ `draw` 方法的选择器，从而执行不同的绘图形状实现。\n\n每个选择器都用 `SEL` 类型定义。你可以通过两种方法之一来赋值选择器变量。在编译时，你可以使用编译器指令来创建该值：\n\
  \n```\nSEL mySelector = @selector(moreAwesomeThanEver);\n```\n\n在运行时，你可以使用一个接受单个\
  \ `NSString` 参数并查找选择器的函数：\n\n```\nSEL mySelector = NSSelectorFromString(@\"moreAwesomeThanEver\"\
  );\n```\n\n现在，`mySelector` 变量包含了 `–moreAwesomeThanEver` 消息的快捷方式。有趣之处在于：你可以使用该变量来执行方法。因此，无需像本章一直做的那样发送消息：\n\
  \n```\n[myObject moreAwesomeThanEver];\n```\n\n\n\n你可以在变量中使用，并得到相同的结果：\n\n`[myObject\
  \ performSelector:mySelector];`\n\n现在，你可以做一些疯狂的事情，比如获取用户输入，将其转换为`NSString`，然后根据用户输入的内容调用方法。幸运的是，Objective-C\
  \ 的设计者实现选择器并不是为了让你疯狂。他们这样做是为了让你可以偷懒，可以将代码片段的引用传递给框架，让框架来完成繁重的工作。\n\n选择器变量及其传递能力，在你将在下一章学习的\
  \ Cocoa Touch 框架中扮演着核心角色。许多这些特性都属于高级类别，但以下只是你可以使用存储在变量中的消息所做的一些很酷的事情：\n\n-   你可以使用选择器和第\
  \ 189 页描述的`–performSelector`方法来实现下一章中描述的委托与目标/动作模式。\n\n第 2 章：括号的力量\n\n**57**\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**展示你的 `id`**\n\n-   数组可以使用选择器来控制排序行为。当你想要向集合中的每个项目发送相同消息时，你也可以使用选择器。\n\
  -   如果你想跟踪视图何时在动画，你可以使用选择器指定一个回调方法。\n-   你可以使用选择器配置定时器，让其在延迟后或按重复间隔运行代码。\n-   对象通过选择器指定一个方法，来注册系统范围的通知。\n\
  -   你可以使用选择器指定对象中初始化新线程的方法。\n\n选择器名称中的冒号数量*确实*很重要。虽然`@selector`*(`moreAwesomeThanEver`)*\
  \ 和 `@selector(moreAwesomeThanEver:)` 看起来相似，但它们有不同的方法签名。第一种情况是一个不带参数的方法，第二种情况因为末尾有一个冒号，所以接受一个参数。\n\
  \n如果你曾经花过好几个小时在 C 代码中追踪一个遗漏的分号，那么在选择器中找到一个缺失的冒号也是类似的事情。你的眼睛会欺骗你，让你觉得代码看起来是对的，即使运行时知道它不对。\n\
  \n***提示：*** 当你在`objc_msgSend`中看到崩溃时，这通常是 Objective-C 运行时在告诉你它找不到方法实现。如果你错误地输入了`@selector`，那就会是原因。请确保该对象有所使用方法的实现。\n\
  \n**展示你的 `id`**\n\n**有时你需要在不知道对象类的情况下引用它。仅通过其内存地址而不带任何类型信息来引用对象是很方便的。**\n\n你已经在第\
  \ 50 页看到了其中一个匿名指针：\n\n-   `(id)init` {\n\nObjective-C 将`id`定义为指向对象数据结构的指针。（它很像 C\
  \ 中的`void`指针，只不过该指针仅用于引用对象。）那么为什么`–init`方法要返回这个通用类型呢？因为你无法保证父类会返回给你哪个类的对象：\n\n`if\
  \ (self = **[super init]**) `{\n\n在初始化期间，对象处于不稳定的状态，因此其类被故意忽略，并被认为可能会发生变化。使用`id`类型表达了对象身份的缺失。\n\
  \n**58**\n\niPhone App 开发：缺失的手册\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**展示你的 `id`**\n\n尽管`id`只不过是一个指向内存块的指针，但你应该永远不要用`void`指针来代替它。编译器能够执行额外的检查并优化代码，因为`id`让它知道该变量指向一个对象。\n\
  \n`id`类型也用作避免在类之间进行类型转换的一种方式。有些类需要管理对象，而无需知道数据的任何类型信息。集合和其他对象容器就是一个很好的例子。如果集合中的对象是用指向`NSObject`的指针来指定的，那么每次从集合中检索对象时，你都必须将其转换为子类。对于懒惰的程序员来说，那是很多工作。\n\
  \n\n\n***注意：*** 使用 `id` 也能解决子类中重写方法返回类型与原始类不同的情况。通过使用泛型类型，原始类及其任何子类都可以共享一个通用的方法签名，并返回正确的类。\n\
  \n再次强调，下一章将深入探讨 `NSArray` 类，但你已经知道，只有当你能够访问列表中的元素时，数组才有用。实现这一操作的方法如下：\n\n```\n-\
  \ (id)objectAtIndex:(NSUInteger)index;\n```\n\n因此，给定一个整数索引，会返回一个 `id` 值。当你向数组添加元素时也是如此：结合这些方法，你就可以将任何类型的对象存储到数组中。\n\
  \n当然，你的代码通常知道它放入了什么到数组中，因此常见的做法是在读取数组元素时进行隐式类型转换：\n\n```\nNSString *element = [myArray\
  \ objectAtIndex:i];\n```\n\n这段代码让编译器能够检查任何访问元素对象的代码。\n\n最后，有一个特殊的 `id` 值你在本章中已经多次看到——\
  \ `nil`。与 C 语言中的指针类似，有时你需要表示没有对象的情况。使用 `nil` 来表示空对象可以做到这一点。\n\nObjective-C 中的 `nil`\
  \ 和 C 中的 `NULL` 都被定义为值为零的 `void` 指针。例如：\n\n```\n#define NULL ((void *)0)\n#define\
  \ __DARWIN_NULL ((void *)0)\n#define nil __DARWIN_NULL\n```\n\n然而，从语义上讲，在处理指向对象的指针时应使用\
  \ `nil`，而对于所有其他类型的指针则应使用 `NULL`。从技术上讲，下面的代码并没有错：\n\n```\nNSString *myString = NULL;\
  \ // 请使用 nil 替代！！！\n```\n\n#### 第 2 章：括号的力量\n\n**59**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n### 展示你的 id\n\n### 引擎盖之下\n\n### 它真的只是 C 语言\n\n在第 30 页，你了解到 Objective-C 只是 C 语言加上少量额外语法和一个运行时。\n\
  \n既然你已经学习了一些关于这门语言的知识，你可能想看看 Objective-C 是如何施展它的魔法的。这是进阶内容，但如果你是那种喜欢探究底层原理的开发者，你会喜欢这个框里的内容。\n\
  \n首先，从之前例子中的一段标准 Objective-C 代码开始：\n\n```\nNSString *myString = @\"typing power\"\
  ;\nNSString *myResult = [myString awesomeString];\nNSLog(@\"myResult = %@\", myResult);\n\
  ```\n\n你可以用以下代码实现完全相同的功能：\n\n```\n#import <objc/objc-runtime.h>\n\nid myString =\
  \ @\"typing power\";\nSEL mySelector = @selector(awesomeString);\nIMP myImp = class_getMethodImplementation(object_getClass(myString),\
  \ mySelector);\nid myResult = myImp(myString, mySelector);\nNSLog(@\"myResult =\
  \ %@\", myResult);\n```\n\n你刚刚所做的就是复现了 `objc_msgSend:` 的工作，这是 Objective-C 用于向对象发送消息的代码。它看起来很像普通的\
  \ C 代码，不是吗？\n\n你首先为 `-awesomeString` 方法创建了一个选择器。那只是一个指向内部结构的指针：\n\n```\ntypedef\
  \ struct objc_selector *SEL;\n```\n\n然后，该选择器被传递给运行时函数 `class_getMethodImplementation()`，该函数使用对象的类和选择器来查找一个函数。所有方法都符合这个函数定义：\n\
  \n```\ntypedef id (*IMP)(id, SEL, ...);\n```\n\n一旦你在 `myImp` 变量中获得了指向类实现的函数指针，你就可以使用对象和选择器来调用它。这个例子没有额外的参数，但由于\
  \ `IMP` 是用可变参数列表定义的，因此也可以传入额外的参数。\n\n当编译器遇到你的方法实现时：\n\n```\n- (NSString *)awesomeString;\n\
  ```\n\n它生成一个类似这样的 C 函数：\n\n```\nid _i_NSString_AwesomeMethods_awesomeString(id self,\
  \ SEL _cmd);\n```\n\n函数名使用了方法类型（实例方法或类方法）、类名、分类名和方法名进行修饰。函数的参数解释了隐藏的 `self` 参数是如何传递的。它同时展示了另一个隐藏参数\
  \ `_cmd`，你的方法实现可以在需要获知其选择器时使用它。\n\n\n\n# 当你输入那些强大的方括号时，所有这些都会自动发生。第一步是导入 `objc-runtime.h`\
  \ 头文件。\n\n所有的运行时定义都存储在那里。\n\n然而，这会让经验丰富的 Objective-C 程序员感到神经紧张和血压升高。这倒没什么，直到你在在线论坛上向他们求助为止。\n\
  \n**注意：** 是的，推荐使用小写类型定义而不是像本章其余部分那样使用炫酷的大写字母，这确实有点讽刺意味。\n\n## 下一步去哪里\n\n既然你已经对 Objective-C\
  \ 有了初步了解，你可能会想进一步了解这门语言。\n\n有时候，你确实可以不劳而获；*《Objective-C 2.0 编程语言》* 这本书就是一个很好的例子。苹果公司拥有业内最优秀的技术文档作者，这一点在这本描述编程语言的书中体现得淋漓尽致。所有语言特性都配有相关示例进行了详细描述。当你遇到新的术语和概念时，书中的词汇表和索引特别有用。你可以从本书的\
  \ Missing CD 页面找到这本在线书籍的链接：[www.missingmanuals.com/cds](http://www.missingmanuals.com/cds)。（或者直接在网上搜索\
  \ *the objective-c 2.0 programming language*，你会在苹果网站上找到该书的链接。）另一个极好的资源就在本书内部——附录\
  \ A。在这里，你会找到本书涵盖的每个主题的额外资源。每个资源都附有 URL 和简短评论。如果你觉得某个方面需要更多帮助，请前往附录。\n\n## 开发者文档\n\
  \n你可能觉得奇怪，已经用完整整一章来介绍一门编程语言了，却一直没有提及开发者文档这个话题。\n\n这是因为开发者文档数量庞大且质量极高。事实上，多到甚至让人觉得有点分心。\n\
  \n由于本书无法解释你将会遇到的每一行代码，现在是时候介绍一下图 2-2 所示的系统文档了。\n\n当你在 Xcode 中工作时，你可以随时通过“帮助”➝“开发者文档”菜单调出这份文档。窗口出现后，你可以在右上角的框中输入任何内容进行搜索：类名（例如\
  \ `NSString`）、方法名（例如 `release`）或概念（例如 `override`）。\n\n搜索结果出现后，你可以使用各种导航元素深入查看。\n\
  \n### 结果列表\n\n你的搜索结果会显示在文档窗口的左侧。你可以通过选择搜索词匹配文档页面的方式，来控制 API 列表中显示的信息量。当选择“包含”时，`NSString`\
  \ 会匹配到 `CFStringConvertEncodingToNSStringEncoding`，因为它是 API 名称的一部分。如果选择“前缀”，`NSString(UIStringDrawing)`\
  \ 会匹配，因为它以搜索文本开头。“精确”设置则只会显示 `NSString` 的页面。\n\n![图片 22](img/index-80_1.jpg)\n\n\
  **图 2-2：** Xcode 文档查看器。你可以使用右上角的框进行搜索（A）。结果会显示在窗口左侧的列表中（B）。选择其中一个结果，文档页面就会在右侧显示（C）。你可以打开目录，通过点击链接快速浏览页面（D）。例如，点击\
  \ `-length` 方法名会跳转到详细文档，或者你可以将鼠标指针悬停在信息图标上以获取快速描述（E）。\n\n结果分为三个部分：\n\n-   **API。**\
  \ 此部分显示符号名称的匹配项。每个匹配项前都有一个彩色字母。紫色 `C` 表示该符号是一个类，蓝色 `M` 表示一个方法，橙色 `T` 表示一个类型定义，依此类推。\n\
  -   **标题。** 此部分下的每个条目都是文档页面标题的匹配项。\n-   **全文。** 最后一部分显示文档页面全文中的匹配项。\n\n在更大的上下文中查找目标时，这些结果非常有用。\n\
  \n如果你更关心如何使用某个类，这些结果会显示该类在指南、发布说明或示例代码中的出现位置。\n\n### 文档页面视图\n\n当你从结果列表中选择一个项目时，页面会显示在窗口的右侧。对于某些类，文档页面可能非常长，以下是一些帮助快速导航的技巧：\n\
  \n-   **目录。** 你可以打开页面的目录，在包含许多方法的页面中快速导航。并且，当你刚开始学习时，类文档中的“任务”部分是一个有用的指南。例如，如果你正在寻找创建和初始化字符串的方法，在\
  \ `NSString` 的“任务”下会有专门的子部分。\n-   **配套指南。** Cocoa 中的许多核心类都有配套指南。这些文档提供了如何使用该类的宏观视角，并附有示例。如果你刚开始学习\
  \ `NSStrings`，点击“Cocoa 字符串编程指南”部分可以让你尽快上手。\n-   **相关源代码。** 有时一张图胜过千言万语；对于开发者来说，示例代码是最美的图。如果你在为如何在数据列表中使用\
  \ `NSString` 而苦恼，点击 `TableViewSuite` 会展示在可运行的源代码中是如何实现的。\n-   **跳转到…** 如果你正在查找类中的某个特定方法，这个弹出式菜单提供了快速访问页面各个部分和子部分的途径。\n\
  -   **使用查找。** 当你按下 ⌘-F 时，文档页面上方会出现一个新的搜索栏。你在此栏中输入的任何文本都会在文档中高亮匹配。你可以点击箭头按钮（或 ⌘-G\
  \ 和 ⌘-Shift-G）在匹配项之间导航。\n\n#### 少打字，多学习\n\n内置文档提供了便捷的访问方式；不要错过这些绝妙技巧。即使使用复制粘贴，将类名和方法名输入到文档搜索栏也会很快变得繁琐。创建\
  \ Xcode 的开发者和你一样懒，所以他们想出了一些更好的方法来浏览这片信息之海。\n\n##### 上下文菜单\n\n如果你在源代码中看到一个不理解的符号，可以选择文本，然后按住\
  \ Control 键点击以显示快捷菜单。这个菜单包含许多有用的项目，但最后你会看到两个特别感兴趣的项目。点击“在文档中查找文本”会打开文档窗口，并显示选中文本的搜索结果。无需输入！\n\
  \n该菜单中另一个有用的项是“跳转到定义”。此命令使用选中的文本查找符号定义的代码。对于像 `NSString` 这样你没有源代码的类，你会看到一个 `@interface`\
  \ 定义。如果这个类是你自己编写的，你会看到 `@implementation` 定义。\n\n##### 点击，起航！\n\n但这还不是全部。你只需使用键盘和两次鼠标点击即可访问文档。按住\
  \ Option 键并双击符号名称，会出现一个小窗口，显示类或方法的简短描述、包含参数类型的声明，以及指向示例代码和相关文档的链接。你还会看到该 API 首次可用的日期。\n\
  \n\n\n***提示：*** 如果你想跳过这个预览窗口，直接跳转到文档窗口，可以按住 `Option-⌘` 并双击符号名称。\n\n要查找定义，可以先按住 `⌘`\
  \ 键并双击名称。如果找到多个匹配项（这在方法名称中很常见），系统会在显示 `@interface` 或 `@implementation` 之前，为你展示一个选项列表。\n\
  \n如果你和大多数 iPhone 开发者一样，很快就会在不知不觉中习惯使用鼠标和这两个按键。\n\n## 学会“偷懒”\n\n又提到了那个以 *L* 开头的词。但事实是，借助\
  \ Cocoa，大量优秀的代码已经为你写好了。刚入门时，你自然会有一股自己动手写代码的冲动，尤其是在学习一门新语言，想要一展身手的时候。当你产生这种冲动时，不妨花点时间打开文档做些研究。\n\
  \n如果你找到了接近你需求的现有功能，尝试使用类别（Category）来扩展现有类。如果行不通，再尝试创建子类并添加新功能。\n\n如果以上方法都失败了，再从头开始实现你自己的类。\n\
  \n遵循这个建议，现在该进入下一章了。在那里，你将开始学习一些你可以随时调用的优秀代码。\n\n---\n\n**64**\n\niPhone 应用开发：缺失的手册\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n---\n\n# Cocoa Touch：让 Objective-C\
  \ 发挥作用\n\n现在你已经对 Objective-C 有了初步了解，是时候让这门语言真正发挥作用了。如果你把 Objective-C 看作是构建应用程序的“胶水”，那么接下来你将探索构建模块——即\
  \ Cocoa Touch 框架的各个部分——它们将通过你手中的新“胶水”拼接在一起。\n\n在开始粘合 Cocoa Touch 框架的各个组件之前，你需要先了解一下苹果工程师推荐的架构和设计模式。正如了解正确的建筑材料如何协同工作才能盖好房子一样，熟练掌握这些框架能让你构建出更\
  \ robust 的应用程序，并节省时间。\n\n你还将学习到哪里可以找到关于 Cocoa Touch 的更多信息。网络和你最喜欢的书店里有大量资源，可以帮助你提升\
  \ iPhone 开发技能。\n\n## 进入 Cocoa Touch 的世界\n\nCocoa Touch 框架非常庞大，有成百上千个类供你使用。学习如何使用这个丰富的组件库需要时间。完成这项艰巨任务的最佳方法是学习这些框架所实现的常见设计模式和功能。\n\
  \n在接下来的章节中，你将看到 Cocoa Touch 如何使用模型、视图和控制器（MVC）来实现你的应用程序。你还会看到如何使用“目标-动作”设计模式来将可视化组件连接到执行实际工作的代码上。在此过程中，你将了解到委托（Delegation）是如何成为一种强大的机制，来利用系统框架中的代码。当然，你还会学习如何管理数据对象和集合，以及一些更重要的设计模式。\n\
  \n---\n\n**65**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n---\n\n##\
  \ 三巨头：模型、视图、控制器\n\n### 幕后：名称里有什么？\n\n你可能听说过“Cocoa Touch”这个词，它用来描述 iPhone 上的编程环境。但它到底是什么呢？\n\
  \n严格来说，Cocoa Touch 只是两个框架，它们为你的应用提供了最重要的构建模块：\n\n-   **Foundation 框架。** 该框架为你提供主要的构建模块。在这个框架中，你可以找到管理数据的类（如\
  \ `NSString`、`NSNumber` 和 `NSDate`）、读写信息的类（`NSFileManager`、`NSUserDefaults`）、与网络通信的类（`NSURLConnection`）等等。\n\
  -   **UI Kit 框架。** 每个应用程序都会有窗口、视图、按钮和其他界面元素。`UIKit` 框架提供了让用户与你的作品进行交互的各种组件。你可以在\
  \ Interface Builder 的库面板中看到这些类。\n\n开发者有时会用“Cocoa Touch”这个总称，来涵盖与基础框架协同工作、共同构建应用的其他开发技术。在构建应用程序的过程中，你会用到许多其他的辅助框架。最常用的一些包括：\n\
  \n-   **Core Graphics。** 一个基于 C 语言的绘图 API（使用 Quartz 渲染引擎）。这个底层框架提供了绘制矢量路径和位图、二维坐标变换与遮罩、颜色和图像管理等函数。\n\
  -   **OpenGL ES。** 另一个基于 C 语言的接口，用于加速 2D 和 3D 图形的渲染。其实现符合 OpenGL ES 1.1 和 2.0 规范。\n\
  -   **Core Animation。** 这个 Objective-C API 提供了基于图层对 2D 图像层级进行复杂合成和动画处理的类。这个高级框架大大简化了你的代码，并提升了用户体验。它的一个附带好处是通过利用\
  \ OpenGL 等底层 API 提升了性能。\n-   **Core Data。** 这个复杂的框架能以透明的方式将对象图持久化存储在 XML 或 SQLite\
  \ 文件中。Xcode 提供了用于描述对象及其关系的工具。这些工具可以使用谓词（Predicates）来获取对象，并使用描述符（Descriptors）对它们进行排序。\n\
  -   **Core Audio。** 一组用于播放、录制、处理和转换音频的框架。\n\n你可以在文档查看器中搜索这些名称，来了解更多关于这些构建模块的信息。\n\
  \n## 三巨头：模型、视图、控制器\n\nCocoa Touch 提供了数百个对象类需要你掌握。幸运的是，这些类中的大部分可以归为三类。并且这些类别中的对象会以一种简单且定义良好的方式相互交互。\n\
  \n每个 iPhone 应用都使用一个简单的模型-视图-控制器设计模式。由于开发者写文档和写代码时一样“偷懒”，你经常会看到这个模式被简称为“MVC”。\n\n\
  ***注意：*** 如果你使用过其他语言和开发环境，你会很高兴地发现，Cocoa 中的 MVC 与你过去使用的并无不同。对象变了，但概念没变。\n\n---\n\
  \n**66**\n\niPhone 应用开发：缺失的手册\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n---\n\n## 三巨头：模型、视图、控制器\n\n要了解这种设计的简洁性，请看图 3-1。\n\n```\n用户操作\n   |\n   v\n 控制器\n\
  \   |\n   +----> 模型 (更新)\n   |\n   +----> 视图 (更新/通知)\n```\n\n***图 3-1：*** *此图展示了模型、视图和控制器如何协同工作，具体说明见后续页面。*\n\
  \n一个 iPhone 应用的全部精髓就在于此了。更棒的是，你会发现框架中的视图和控制器已经完成了大部分繁重的工作。就连模型对象的创建，也在 Cocoa Touch\
  \ 的帮助下得以简化。\n\n那么，每种对象类型的角色分别是什么呢？请继续阅读。\n\n### 视图\n\n你知道 iPhone 屏幕上所有的按钮、滚动列表、网页浏览器以及其他所有元素吗？它们都是*视图*。视图知道如何展示你的应用程序数据。有些视图还知道如何响应用户的输入。一个\
  \ `UIButton` 视图会响应用户的触摸。一个 `UITextField` 视图则接收来自虚拟键盘的输入。\n\n在许多应用中，你需要创建自己的视图来显示特定数据。例如，没有标准的\
  \ widget 来显示股票走势图，所以如果你想实现这个功能，就必须自己想出解决方案。\n\n同样，许多设计师和开发者希望自定义其应用的外观。无论你的动机是品牌推广还是只想在众多应用中脱颖而出，为你的应用创建独特外观都涉及基于标准的\
  \ `UIView` 和 `UIControl` 类来构建新的视图。\n\n\n\n# 创建视图\n\n创建视图并没有听起来那么困难。通过使用现有视图的子类，你只需进行少量自定义绘制即可。如果你正在构建复合视图（将多个视图组合成一个视图），唯一需要做的工作就是管理子视图的布局。\n\
  \n# 模型\n\n模型是应用程序的核心与灵魂，因为它们负责管理应用的数据。与视图不同，模型完全不关心用户正在执行的操作或屏幕上显示的内容。模型的唯一功能是在应用程序内操作和处理用户数据。模型通常实现提供这些基本行为的内部逻辑。\n\
  \n例如，每当你使用内置的\"通讯录\"应用时，实际上就是在操作代表通讯录中联系人的模型对象。如果你更新了应用的设置，就是在修改另一种模型对象。从互联网下载股票数据的应用则会使用模型对象来存储价格历史记录。\n\
  \n有些模型对象可以跨多个应用工作：通讯录和用户默认设置（偏好设置）数据库就是很好的例子。而其他模型（如股票应用使用的模型）则是特定于应用的。\n\n许多模型对象会被永久存储到文件或数据库中。这种机制称为**对象持久化**，它让你能够在多次应用启动间重建应用的状态。即使不持久化对象，模型在处理内存数据结构时也非常有用。\n\
  \n在构建自己的模型时，你通常会在实现中使用 Cocoa Touch 类。例如，`NSArray` 和 `NSDictionary` 等类可以让你将数据存储在有序列表或哈希表中。你还会发现\
  \ `NSURLConnection` 和 `NSData` 等类能帮助你从网络检索和存储数据。\n\n最后，你可以使用 Core Data 框架在 SQLite\
  \ 数据库中存储和检索对象。\n\n# 控制器\n\n控制器稍微复杂一些。它们充当视图对象和模型对象之间的中介。当模型中的值发生变化时，控制器负责更新视图。同样地，控制器在收到用户输入时，能够相应地更新模型数据。\n\
  \n你的控制器让你能够在模型和视图之间传递信息。在图 3-1 中，你可以看到控制器是唯一包含所有箭头（消息）的模块。就像管弦乐队中的指挥，它负责掌控全局。\n\n\
  为了让你理解其工作原理，想象一个绘制股票价格的应用：\n\n1. 用户点击按钮（视图）刷新图表。此操作被发送至控制器。\n2. 控制器随之告知模型加载新的股票数据。\n\
  3. 模型打开网络连接并开始下载数据。\n4. 股票数据加载完成后，模型通知控制器新数据已到达。\n5. 控制器将新数据传递给视图，用户便看到了结果。\n\n\
  **注意：** 模型和视图不会直接通信，因为如果它们直接通信，随着你添加更多对象，应用会变得极其复杂。当多个视图共享同一个模型的数据，或单个视图更新多个模型时，你就会遇到问题。一个类中的微小变动会波及到其他类，类之间的依赖性会越来越高，代码复用将变得困难。开发者将这种情况称为**紧耦合设计**，应当尽量避免。\n\
  \n控制器对象通常负责设置任务。模型和视图必须在某个时间点被加载和初始化，而控制器的核心角色使其自然成为这项工作的承担者。\n\nCocoa Touch 提供了专门的视图控制器类来处理这种职责分离。在开发\
  \ iPhone 应用时，你会发现大量代码最终都驻留在这些控制器类中。\n\n具体来说，视图控制器在导航中被大量使用。例如：\n\n- 当你点击列表中的某一行，新的视图滑入时，你刚刚创建了一个新的视图控制器。同样地，点击\"\
  返回\"按钮时，当前控制器会被丢弃，替换为上一个控制器。\n- 如果你点击撰写新邮件的按钮，会创建一个新的模态视图控制器；它的视图从屏幕底部滑入并显示，直到你点击\"\
  取消\"或\"发送\"。\n- 当你点击天气应用中的信息图标时，一个新的视图控制器翻转出现，让你输入新的城市。点击\"完成\"后，该视图会被主视图取代。\n\n\
  `UIViewController` 类及其多个子类执行这些基本功能。如果必须优先掌握一个类，那就是它了。\n\n# 值对象\n\n在构建自己的模型、视图和控制器类时，你经常需要决定如何在类中存储数据。由于\
  \ Objective-C 构建在 C 语言之上，因此所有原始数据类型都可使用。那么问题就来了：是使用整数、浮点数和字符数组，还是使用将相同原始值包装成对象的类呢？\n\
  \n## 使用原始类型\n\n在对象的实例变量中使用原始类型并无坏处。事实上，这往往能让实现更简单，因为你无需担心对象的保留和释放。例如，如果只是记录一个计数器，你不需要添加对象带来的额外开销。\n\
  \n**提示：** Cocoa 中最重要的计数器之一——`NSObject` 中的 `retainCount`，被定义为无符号整数（`NSUInteger`）。虽然\
  \ `NSInteger` 和 `NSUInteger` 这两个关键字看起来像是类名，但它们实际上只是 Cocoa Touch 中使用的类型定义。\n\n```objectivec\n\
  typedef int NSInteger;\ntypedef unsigned int NSUInteger;\n```\n\n其他常用的类型定义示例包括：`NSRange`（定义数据范围的结构体）和\
  \ `NSTimeInterval`（表示时间段的浮点值）。\n\n使用原始类型的实例变量的定义方式与对象实例变量略有不同。由于不涉及保留或复制，它们在 `@property`\
  \ 中使用 `assign` 属性定义。例如，如果你决定在上一章的 `AwesomeString` 类中使用 `NSUInteger` 而不是 `NSNumber`，接口将如下所示：\n\
  \n```objectivec\n@interface AwesomeString : NSString\n{\n    NSUInteger exclamationCount;\n\
  \    NSString *originalString;\n}\n@property (nonatomic, assign) NSUInteger exclamationCount;\n\
  @property (nonatomic, copy) NSString *originalString;\n- (NSString *)awesomeString;\n\
  @end\n```\n\n在实现中，`–init` 方法里的初始赋值从值对象改为：\n\n```objectivec\nexclamationCount = [[NSNumber\
  \ numberWithInt:8] retain];\n```\n\n通过赋值原始值可以简化代码：\n\n```objectivec\nexclamationCount\
  \ = 8;\n```\n\n在 `–dealloc` 方法中，你也不需要释放 `exclamationCount`。使用原始值使代码大大简化，且不牺牲任何功能。除非书面语言允许你在句子末尾放\
  \ 8.5 个感叹号，否则这段代码将完美运行！\n\n## 对象化\n\n既然你已经看到了值对象并非必要的情况，那为什么还要使用它们呢？主要有两个原因：\n\n\
  \n\n# 值对象\n\n-   你可以在集合中存储以对象形式表示的值。集合能让你轻松管理一组对象。可利用的方法包括对对象进行排序、查找实例，以及根据模式筛选数据。如果你使用的是原始值，就必须自行实现这些数据管理代码。\n\
  -   对象的类提供了大量用于操作值的函数。这能为你带来更高的灵活性，并节省实现过程中的时间。\n\n## 这些值对象是什么？问得好！\n\n### `NSString`\n\
  \n如上一章所见，该类是 Cocoa 中的基础类之一。\n\n许多其他类都使用以对象形式表示的字符串。你可能会忍不住在实现中使用纯 C 字符串，这确实可行，但你会遇到很多阻力。最终，当你在\
  \ Cocoa 中使用原始字符串时，将不得不进行大量不必要的转换。\n\n此外，你还将错过 `NSString` 类提供的一些重要功能：\n\n-   完整的\
  \ Unicode 支持及字符串编码之间的转换（`–dataUsingEncoding:`）。\n-   从文件中读取文本及其编码（`–stringWithContentsOfFile:usedEncoding:error:`）。\n\
  -   字符串的分割（`–componentsSeparatedByString:`）与拼接（`–componentsJoinedByString:`）。\n\
  -   转义字符串以便放入 URL（`–stringByAddingPercentEscapesUsingEncoding:` 和 `–stringByReplacingPercentEscapesUsingEncoding:`）。\n\
  -   子字符串搜索（`–rangeOfString:`）以及获取 Unicode 字符数量（`–length`）。\n-   将字符串转换为数字（`–boolValue`、`–integerValue`、`–floatValue`、`–doubleValue`）。\n\
  -   大小写转换（`–capitalizedString`、`–lowercaseString` 以及最棒的 `–uppercaseString`）。\n-\
  \   字符串格式化（`–stringWithFormat:`）和本地化（`NSLocalizedString`）。\n-   使用用户当前的语言设置进行字符串比较（`–localizedCompare:`），并可使用多种选项，包括忽略变音符号（因此\
  \ \"ö\" 等同于 \"o\"）以及按数值排序（因此 \"CHOCK9.TXT\" 在列表中会排在 \"CHOCK9000.TXT\" 之前）。\n\n###\
  \ `NSNumber`\n\n在进行值转换时，你会想使用这个值对象。如果你用一个浮点值创建一个数字对象，然后请求该对象返回无符号字符值（`–unsignedCharValue`），内部将执行一次转换，且原始对象中的信息不会丢失。\n\
  \n如果你的应用程序中进行基于货币的计算，可以使用 `NSDecimalNumber` 子类以获得最高精度。由于该子类允许你使用 38 位有效数字和 –128\
  \ 到 127 范围内的指数，因此你无需担心浮点计算中固有的舍入误差和其他数据丢失问题。\n\n### `NSDate`\n\n日期对象提供了一些用于操作时间点的基本函数。你可以比较哪个日期更早（`–earlierDate:`），以及计算两个日期之间的秒数（`–timeIntervalSinceDate:`）。当与\
  \ `NSCalendar` 结合使用时，`NSDate` 的优势尤为突出；如果你曾经尝试在考虑时区和闰年等因素的情况下计算两个时间点之间的月数和天数，你就会感激这项工作为你代劳了。\n\
  \n### `NSData`\n\n作为非结构化字节流的值对象，`NSData` 提供了管理数据缓冲区所需的机制。数据对象通常需要存储到磁盘上，因此提供了读取（`+dataWithContentsOfFile:`）和写入（`–writeToFile:atomically:`）的方法。\n\
  \n这些数据块通常用于创建其他对象的实例。例如，可以使用 `NSData` 对象创建 `NSString`。同样，你也可以使用 `UIImage` 对象的 `–initWithData:`\
  \ 方法创建图像。\n\n### `NSNull`\n\n\n\n此对象的唯一用途：表示空值。集合不允许使用 `nil` 对象，因此当需要在数组、字典（哈希表）或集合中放入空值时，可以使用\
  \ `NSNull`。\n\n## `NSValue`\n\n有时，你需要创建能够紧密镜像原始类型或数据结构的对象。当你有一些遗留数据或第三方数据，并需要将其添加到集合中时，最可能遇到这种情况。\n\
  \n每当出现这种需求时，请查看 `NSValue` 类。它可以将 Objective-C 中任何有效的变量类型包装为值对象。假设你有一个遗留系统，定义了一种名为\
  \ `Chockitude` 的奇怪数据结构：\n\n```c\ntypedef struct {\n    unsigned char palmCount;\n\
  \    int isFleshy;\n    float height; // 单位为英寸\n} Chockitude;\n```\n\n如果你需要将此数据包装到对象中，操作很简单：\n\
  \n```objc\nChockitude ch;\nch.palmCount = 2;\nch.isFleshy = true;\nch.height = 79.25;\n\
  \nNSValue *value = [NSValue valueWithBytes:&ch objCType:@encode(Chockitude)];\n\
  ```\n\n每当需要检索值对象的内容时，你可以编写如下代码：\n\n```objc\nChockitude theChockitude;\n[value getValue:&theChockitude];\n\
  NSLog(@\"palmCount = %d, isFleshy = %s, height = %f\",\n      theChockitude.palmCount,\n\
  \      (theChockitude.isFleshy ? \"YES OF COURSE\" : \"no\"),\n      theChockitude.height);\n\
  // 控制台日志中显示：\n// palmCount = 2, isFleshy = YES OF COURSE, height = 79.250000\n```\n\
  \n`NSValue` 对象的另一个用途是处理 iPhone 显示屏上的点和其他几何图形。如果你想跟踪屏幕上的系列点击操作，很可能会想使用 `CGPoint`\
  \ 结构（包含 x 和 y）的集合。你可以使用一个 `NSValue` 类别，它能够接收这些常见结构并将其编码为对象：`+valueWithCGPoint:`\
  \ 和 `+valueWithCGRect:` 用于包装图形框架使用的点和矩形。\n\n## 集合\n\n当你处理对象时，通常会涉及许多对象。保持有序至关重要，而实现这一点的最简单方法是将相似对象分组到*集合*中。\n\
  \n例如，当你在 iPhone 上查看滚动列表时，每行中的数据都由一个对象表示。如果该行包含一个人的姓名和年龄，那么你很可能还会有其他对象来存放这些个人详细信息。\n\
  \n对于这种列表视图，`NSArray` 是一种很自然的集合。你可以指定集合内的顺序，使列表中的第一行成为数组中的第一个对象。该数组类还提供了对数据进行排序和过滤的机制，从而轻松地在用户界面中模拟这种行为。\n\
  \n当你想通过唯一键来收集对象时，请使用 `NSDictionary` 类。它实现了关联数组，允许你查找与键关联的对象（值）。\n\n***注意：*** 如果你使用过其他语言，关联数组有多种不同的叫法：哈希表、哈希、映射和容器等只是其中几种。无论名称如何，它们都允许你通过键来查找值。\n\
  \n你可以使用 `NSDictionary` 来存储列表中每行的数据。由于你可以将 `NSString`、`NSDate` 和 `NSNumber` 存储在集合中，因此很容易为这些信息创建集合：\n\
  \n```objc\nNSDictionary *personalDetails = [NSDictionary dictionaryWithObjectsAndKeys:\n\
  \    @\"Craig\", @\"name\",\n    [NSNumber numberWithInt:50], @\"age\"];\n```\n\n\
  然后，每当需要获取其中某个对象时，你都可以查询字典集合：\n\n```objc\nNSInteger age = [[personalDetails objectForKey:@\"\
  age\"] integerValue];\nBOOL crankyOldMan = NO;\nif (age > 50) {\n    crankyOldMan\
  \ = YES;\n}\n```\n\n你可以使用 `NSSet` 来收集不重复的对象，且顺序不重要。通常，你会像在数学中使用集合一样使用这种类型的集合。该类提供了用于测试相等性、交集和子集的方法。\n\
  \n随着应用程序变得越来越复杂，你会发现开始组合这些集合。例如，你的列表视图可以为每行实例使用一个 `NSArray`，并使用一个 `NSDictionary`\
  \ 来存储实际的行数据。同样，也可能出现一个 `NSDictionary` 在其某个键下包含一个 `NSArray` 的情况。假设你的个人详细信息包含一个 `siblingNames`\
  \ 键；该数据用数组来表示很合适。如果你没有兄弟姐妹，那么数组就是空的；无论你的父母生育能力多强，数组都会随着家庭规模的增长而扩展。\n\n### 深拷贝\n\n\
  当你通过发送 `-copy` 消息来拷贝集合时，结果是该对象的浅拷贝。拷贝后的集合可以独立于原始集合进行修改，但两个集合中的对象是共享的。\n\n要执行集合的深拷贝，你需要使用*拷贝项目*方法。例如，对于\
  \ `NSArray`，你可以像这样使用 `-initWithArray:copyItems:`：\n\n```objc\nNSArray *original\
  \ = [NSArray arrayWithObjects:@\"Mimeoscope\", @\"Cyclostyle\", nil];\nNSArray *shallowCopy\
  \ = [original copy];\nNSArray *deepCopy = [[NSArray alloc] initWithArray:original\
  \ copyItems:YES];\n```\n\n在 `shallowCopy` 中，数组中的两个对象与原始数组中的实例相同。另一方面，`deepCopy`\
  \ 在新数组中包含了 `\"Mimeoscope\"` 和 `\"Cyclostyle\"` 的新实例。\n\n`NSDictionary` 和 `NSSet`\
  \ 集合使用相同的模式，分别对应 `-initWithDictionary:copyItems:` 和 `-initWithSet:copyItems:` 方法。\n\
  \n## 可变与不可变\n\n在查看 `NSString` 时，你可能已经注意到字符串的内容从未直接修改。如果你查看过 `NSArray` 类，可能会担心它似乎没有任何添加或删除项目中条目的方法。别担心；Cocoa\
  \ 的设计者们可没那么懒！\n\n许多用于管理数据的类都被一分为二：一个类用于管理从不更改的数据，另一个子类用于处理可以更改的部分。如果常量数据的类名是 `NSString`，那么用于可修改数据的类名就是\
  \ `NSMutableString`。\n\n### 属性列表\n\n当你费心将对象组织到集合中时，很可能会想要保存这些成果。`NSArray` 和 `NSDictionary`\
  \ 都提供了 `-writeToFile:atomically:` 方法。它们还提供了 `+arrayWithContentsOfFile:` 和 `+dictionaryWithContentsOfFile:`\
  \ 方法，用于从文件中读取信息。\n\n存储在文件中的内容就是*属性列表*，这是 Cocoa Touch 中作为一种轻量级且可移植的持久化机制而广泛使用的标准格式。属性列表将对象实例存储在扩展名为\
  \ `.plist` 的文件中。数据内容可以存储为可移植性最佳的 XML 格式，也可以存储为效率更高的二进制格式。\n\n如果你打开 Flashlight 应用程序的资源文件夹，可能会注意到一个名为\
  \ `Flashlight-Info.plist` 的文件。这个重要的属性列表包含了向 iPhone 操作系统描述应用程序的信息。例如，你可以在此指定显示在主屏幕上的图标。同样，当用户更新应用程序的设置时，配置会被写入属性列表。\n\
  \n当你使用属性列表时，必须仅使用以下类：`NSArray`、`NSDictionary`、`NSString`、`NSData`、`NSDate` 和 `NSNumber`（整型、浮点型和布尔值）。这些对象的任何层次结构都可以存储在文件中。一个包含数字、字符串和日期的字典数组是完全有效的。\n\
  \n***提示：*** 如果你需要归档包含属性列表不支持类的对象图，请查看 `NSKeyedArchiver` 类和 `NSCoding` 协议。\n\n\n\n\
  # 既然一个类就能搞定，为什么非要用两个？\n\n既然可以实现为一个类，为什么偏要写成两个？这和代码中使用常量的道理一样：你能确定数据在 processing\
  \ 过程中永远不会改变。从而可以做出原本无法成立的假设。\n\n***注意：*** 如果你曾遭遇过遍历数组时数组长度突然变化的经历，你就会明白这些错误假设会带来多么痛苦的\
  \ bug。\n\n## 第 3 章 Cocoa Touch：让 Objective-C 真正发挥作用\n\n**75**\n\n**可变与不可变**\n\n\
  在构建自己的类时，你常常需要决定实例变量该用这两种中的哪一种。一条好用的经验法则是：当值需要被整体替换时，使用像 `NSString` 或 `NSNumber`\
  \ 这样的不可变对象。\n\n当你在拼接牛逼闪闪的字符串时，使用 `NSMutableString` 毫无意义，因为 `–setOriginalString:`\
  \ 方法更新的是整个字符串，而不是修改单个字符。\n\n另一方面，集合类则经常需要增量更新。从数组中添加或删除元素是家常便饭，所以你会希望使用 `NSMutableArray`，并获得\
  \ `–insertObject:atIndex:` 和 `–removeObjectAtIndex:` 方法。\n\n### 让它可变\n\n当你手里有一个不可变对象，却又需要一个可变对象时，该怎么办？\n\
  \n你会发现 Foundation 框架中的很多方法返回的都是不可变对象。这些系统类假设你可能并不想修改返回的结果。大多数情况下，这个假设是对的。但作为开发者，你很清楚，正是那些特殊情况才最让人头疼！\n\
  \n下面是一个返回不可变数据的方法简单示例——`NSString` 中使用分隔符分割字符串的方法：\n\n```\n- (NSArray *)componentsSeparatedByString:(NSString\
  \ *)separator;\n```\n\n如果你只是为了遍历分割后的值而解析一个逗号分隔的字符串，那么不可变的副本就完全够用：\n\n```\nNSString\
  \ *oneHand = @″Thumb,Index,Middle,Ring,Little″;\nNSArray *fingers = [oneHand componentsSeparatedByString:@″,″];\n\
  for (NSString *finger in fingers) {\n    NSLog(@″The finger is %@″, finger);\n}\n\
  ```\n\n但如果你想修改这些手指名称呢？这正是那种罕见却又重要的场景，你需要一个可变副本。谁都知道最后一个手指叫做“小拇指”（Pinkie）。\n\n幸运的是，使用\
  \ `NSObject` 定义的 `–mutableCopy` 方法就能轻松搞定：\n\n```\nNSString *oneHand = @″Thumb,Index,Middle,Ring,Little″;\n\
  NSArray *fingers = [oneHand componentsSeparatedByString:@″,″];\nNSMutableArray *mutableFingers\
  \ = [fingers mutableCopy];\n[mutableFingers removeLastObject]; // 嗷，好疼！！！\n[mutableFingers\
  \ addObject:@″Pinkie″]; // 现代科学的奇迹\nfor (NSString *finger in mutableFingers) {\n\
  \    NSLog(@″The finger is %@″, finger);\n}\n```\n\n有一点很重要：你不能对任意一个对象都进行可变复制。你要复制的类必须支持\
  \ `NSMutableCopying` 协议。如果类的定义中没有包含 `<NSMutableCopying>`，那么当你尝试进行复制时就会抛出异常。\n\n\
  **76**\n\niPhone 应用开发：缺失手册\n\n**可变与不可变**\n\n***注意：*** 在处理集合时，`–mutableCopy` 的行为与\
  \ `–copy` 类似。执行的是浅拷贝。\n\n幸运的是，所有的值对象和集合都支持这个协议。当一个类不支持该协议时，很可能是有充分理由的。对 `UIView`\
  \ 或 `NSURLConnection` 做可变复制又有什么意义呢？这种抽象太复杂，依赖关系太多，反而难以理解。\n\n### 保护你的数据\n\n在方法实现中使用可变数据是很常见的。你无从得知\
  \ `–componentsSeparatedByString:` 是如何实现的，但很可能是在解析器从字符串开头移动到结尾的过程中逐步构建起这个数组的。那么，为什么最终要把它作为不可变数组返回呢？\n\
  \nCocoa Touch 这是在防止你搬起石头砸自己的脚。除了你很可能并不需要可变副本之外，更重要的是：当两个对象持有同一份数据的副本时，如果一个对象在另一个对象不知情的情况下修改了数据，就会出大问题。\n\
  \n想象一下，一个数组在两个对象之间共享，它们都在向其中添加或删除元素。第一个对象计算了数组的长度。然后第二个对象删除了数组中的最后一个元素。当第一个对象去访问它自以为的最后一个元素时，就会因为数组索引越界而抛出异常。这是一个非常令人抓狂的\
  \ bug，因为每个对象看起来都做了正确的事。很难一眼看出问题的根源在于共享的集合。\n\n要返回一个可变实例的不可变副本，你可以利用可变类是其超类的子类，并且其超类实现了\
  \ `<NSCopying>` 协议这一事实。当你发送 `–copy` 消息时，你会得到一个不可修改的副本。\n\n假设你上面创建的 `mutableFingers`\
  \ 数组是 `MyHand` 类中的一个实例变量。你决定保持这个变量的可变性，以便迁就那些坚持把最后一个手指叫做“无名指”的无知人士。当其他对象向这个实例请求手指名称时，你可以像这样返回它们：\n\
  \n```\n@implementation MyHand\n. . .\n- (NSArray *)fingers {\n    NSArray *result\
  \ = (NSArray *)[[mutableFingers copy] autorelease];\n    return result;\n}\n```\n\
  \n这样返回的对象就不会破坏你的 `mutableFingers`。即使有人想把最后一个手指叫做“耳指”并塞进耳朵里，也没问题。\n\n第 3 章 Cocoa\
  \ Touch：让 Objective-C 真正发挥作用\n\n**77**\n\n**委托与数据源**\n\n你有没有遇到过需要完成一项任务，却完全不知道如何下手的情况？也许是修理洗碗机，或者是织一双袜子。你要么自己学会，要么找个帮手来完成你不懂的部分。\n\
  \nCocoa Touch 有一种设计模式叫做*委托*，它让你的应用程序能够帮助那些不知道你想做什么的系统类。其工作方式很简单：你向一个能够回答问题的对象介绍另一个对象。通过分配一个\
  \ `delegate`，你就为可以响应请求和状态变化的代码提供了钩子。\n\n如果你的对象愿意充当委托，那么它需要遵循一个协议。正如你在第 36 页看到的，协议就像一份合同。合同中的许多方法是可选的，但有些是必须实现的。\n\
  \n这种模式在 Cocoa 中被广泛使用。如果你在文档查看器中输入 `delegate`，会得到超过 100 个结果。你可以通过类是否拥有 `delegate`\
  \ 属性来判断它是否支持委托。具体的委托协议通常以 `Delegate` 作为后缀。\n\n在实践中了解其最佳方式，是查看一个使用委托的类：`UIPickerView`\
  \ 控件，它通过滚动列表来选择值（图 3-2）。\n\n***图 3-2：*** *Cocoa Touch 的标准选择器视图。显示的值来自委托和数据源。*\n\n\
  **78**\n\niPhone 应用开发：缺失手册\n\n**委托与数据源**\n\n当你查看 `UIPickerView` 类的文档时，你会看到如下定义的\
  \ `delegate` 实例变量：\n\n\n`@property (nonatomic, assign) id<UIPickerViewDelegate>\
  \ delegate;` 该声明告诉你，`delegate`可以是任何类（由`*id*`表示），只要它支持`UIPickerViewDelegate`协议。当你打开文档时，你会发现该协议为代理定义了三个主要任务。你需要提供尺寸和内容，并对选择做出响应。所有这些任务都是可选的，但如果你忽略所有问题，你的选择器将变得非常无聊。\n\
  \n最初，你可能会想自定义每一行中的名称列表。选择器视图不知道如何标记行，因此它会通过`–pickerView:titleForRow:forComponent:`消息询问你想要什么。作为代理，你可以实现如下方法：\n\
  \n```\n- (NSString *)pickerView:(UIPickerView *)pickerView titleForRow:(NSInteger)row\
  \ forComponent:(NSInteger)component {\n    return [NSString stringWithFormat:@″Row\
  \ %d″, row];\n}\n```\n\n这样，选择器中的每一行将被标记为“Row 0”、“Row 1”、“Row 2”等。\n\n你还想知道何时有人点击某一行。如果不实现以下方法，你将永远不知道选择器值何时发生变化：\n\
  \n```\n- (void)pickerView:(UIPickerView *)pickerView didSelectRow:(NSInteger)row\
  \ inComponent:(NSInteger)component {\n    NSLog(@″You picked row %d″, row);\n}\n\
  ```\n\n实现这两个方法的最佳位置是在`UIViewControl er`子类中。该控制器遵循第 66 页描述的 MVC 设计模式，因此很容易协调选择器视图与提供标题并在选择发生变化时更新状态的模型之间的活动。\n\
  \n选择器视图知道要显示多少行，因为委托模式有一个细微的变体——数据源。与代理一样，名为`dataSource`的实例变量必须实现`UIPickerViewDataSource`协议：\n\
  \n`@property (nonatomic, assign) id<UIPickerViewDataSource> dataSource;`\n\n并且`dataSource`需要实现两个方法：`–numberOfComponentsInPickerView:`和`–pickerView:numberOfRowsInComponent:`。\n\
  \n第一个方法告诉选择器视图要显示多少列，而第二个方法指定行数。对于一列和 10 行，你可以使用以下实现：\n\n```\n- (NSInteger)numberOfComponentsInPickerView:(UIPickerView\
  \ *)pickerView {\n    return 1;\n}\n\n- (NSInteger)pickerView:(UIPickerView *)pickerView\
  \ numberOfRowsInComponent:(NSInteger)component {\n    return 10;\n}\n```\n\n与代理方法一样，你可能会使用控制器的模型来填充这些值，而不是使用硬编码的结果。\n\
  \n当你处理滚动数据列表时（例如 Safari 中的书签或 Mail 中的收件箱），你会使用相同的委托和数据源模式。两者都使用`UITableView`，它通过与`UIPickerView`相同的技术进行控制。\n\
  \n不要认为这种委托设计模式仅限于用户界面中的视图。从 URL 下载数据时也经常使用委托。`NSURLConnectionDelegate`定义了一个协议，用于提供任何连接认证，并在下载过程中通知你。\n\
  \n## 目标与动作\n\n在 Cocoa Touch 中处理控件时，你会使用与委托类似的机制。当你点击按钮、拖动滑块调节音量或切换开关时，这些用户界面元素需要通知应用程序的其他部分有关状态变化。那么，这些控件如何让所有内容知道发生了什么？\n\
  \n通知通过**目标-动作**设计模式发生。换句话说，你可以为每个控件设置一个**目标**——一个将被通知变化的对象。与委托一样，你可以选择任何对象。\n\n\
  与委托不同的是，动作可以是对象定义的任何方法。重要的是该方法符合以下两种签名之一：\n\n```\n- (IBAction)actionOne {\n}\n\n\
  - (IBAction)actionTwo:(id)sender {\n}\n```\n\nInterface Builder 使用`IBAction`来识别你代码中的动作（稍后详细说明）。第二种形式接受一个包含发送动作的对象的单个参数。在处理动作时，可以使用`sender`。\n\
  \n如果你有一个由多个`UIButton`实例共享的单个动作，可以使用`sender`来确定哪个按钮触发了该动作。`sender`的另一个用途是查询控件的状态。例如，如果你从`UISwitch`控件接收到了一个动作，你会想知道开关是打开还是关闭：\n\
  \n```\n- (IBAction)toggleSwitch:(id)sender {\n    // sender is an instance of UISwitch,\
  \ so use its –on method:\n    if ([sender on]) {\n        NSLog(@″AFFIRMATORY DIXIE\
  \ CUP″);\n    }\n    else {\n        NSLog(@″NEGATORY MR CLEAN″);\n    }\n}\n```\n\
  \n这段代码也有易于阅读的优点，尤其是如果你理解 1970 年代的 CB 俚语。\n\n接下来，你需要了解这些控件如何与目标对象和动作方法挂钩。实际上，定义目标和动作有两种方式：一种使用代码，另一种使用\
  \ Interface Builder。你先从代码开始，以更深入地了解幕后发生了什么。\n\n### 用户界面：硬核方式\n\nCocoa Touch 中的每个控件都是`UIControl`类的子类。该类定义了以下方法：\n\
  \n```\n- (void)addTarget:(id)target action:(SEL)action\n    forControlEvents:(UIControlEvents)controlEvents\n\
  ```\n\n此方法接受三个参数。第一个是将被通知控制事件的目标对象。第二个参数`action`定义了将发送给目标对象的消息。第三个参数`controlEvents`让你指定将触发该动作的事件类型。\n\
  \n最常见的事件是`UIControlEventValueChanged`和`UIControlEventTouchUpInside`。第一个`UIControlEventValueChanged`用于值变化很重要的控件，例如拖动滑块（`UISlider`）、在文本字段中键入（`UITextField`）以及翻转开关（`UISwitch`）。\n\
  \n`UIControlEventTouchUpInside`事件通常用于`UIButton`控件，因为你只想在用户手指在按钮边界内释放按钮时才知道。即使你是\
  \ NFL 的粉丝，也不应使用`UIControlEventTouchDown`。此事件不允许用户将手指拖离按钮以取消按钮按下。\n\n以下是在你的控制器对象中如何将它们组合在一起：\n\
  \n```\n#define LOUDER 11.0f\n\n- (void)updateVolume:(id)sender {\n    float volume\
  \ = [(UISlider *)sender value];\n    if (volume >= LOUDER) {\n        NSLog(@″NIGEL\
  \ TUFNEL WOULD BE PROUD″);\n    }\n}\n\n- (void)hitOrMiss {\n    if ([mySlider value]\
  \ > LOUDER) {\n        NSLog(@″OF COURSE IT’S A HIT!!!″);\n    }\n}\n\n- (void)setupControls\
  \ {\n    [mySlider addTarget:self action:@selector(updateVolume:)\n        forControlEvents:UIControlEventValueChanged];\n\
  \    [myButton addTarget:self action:@selector(hitOrMiss)\n        forControlEvents:UIControlEventTouchUpInside];\n\
  }\n```\n\n`–updateVolume:`方法被附加到控制器对象中的`mySlider`视图引用上。当滑块移动且其值发生变化时，会检查音量；如果超过\
  \ 11，则在控制台日志中显示一条消息。\n\n`–hitOrMiss`方法使用了不带`sender`参数的动作签名。此方法还展示了如何利用其他视图状态来响应按钮按下。如果滑块值高于\
  \ 11，按钮会让你知道这是一个热门点击。\n\n\n***注意：*** 第 58 页曾提醒过，要正确填写选择器语句中的冒号数量。如果你在上面的代码中键入了`@selector(updateVolume)`或`@selector(hitOrMiss:)`，那么冒号与你实现的方法将不匹配。当你测试控件时，应用会崩溃，并在控制台日志中显示“unrecognized\
  \ selector sent to instance（向实例发送了无法识别的选择器）”消息。\n\n*循序渐近*\n\n现在你可能正期待了解在目标对象上设置操作消息的简便方法。但在深入探讨\
  \ Interface Builder 之前，你需要先准备好控制器的代码，以便将对象和操作暴露出来。随着项目的演进，这少量工作将会为你节省大量时间，非常值得投入。\n\
  \n正如你在 MVC 设计模式中所见，一个或多个视图对象由控制器管理。那么，你应在何处为控制器定义这些视图呢？如果你回答“在`@interface`中”，恭喜你答对了！\n\
  \n为了获得一些动手实践经验，请访问 Missing CD 页面`www.missingmanuals.com`，下载`MissingCD_Xcode_Projects.zip`文件。\n\
  \n## Targets 和 Actions\n\n在本练习中，你的控制器名为`HitMakerViewController`，它包含三个视图：一个滑块、一个文本视图和一个按钮。你按照第\
  \ 70 页的做法定义实例变量：\n\n```\n@interface HitMakerViewController : UIViewController {\n\
  \    UISlider *mySlider;\n    UIButton *myButton;\n    UILabel *myLabel;\n}\n```\n\
  \n同时，为这些实例变量定义属性，以便它们成为被保留的对象：\n\n```\n@property (nonatomic, retain) IBOutlet UISlider\
  \ *mySlider;\n@property (nonatomic, retain) IBOutlet UIButton *myButton;\n@property\
  \ (nonatomic, retain) IBOutlet UILabel *myLabel;\n```\n\n以下是操作方法定义：\n\n```\n- (IBAction)updateVolume:(id)sender;\n\
  - (IBAction)hitOrMiss;\n```\n\n到目前为止，你可能已经猜到 Objective-C 标识符中头两个字母的重要性。`IB`是一个提示，能帮你解开谜团，它代表\
  \ Interface Builder。\n\n如果你查阅`IBOutlet`和`IBAction`的定义，可能会被`UINibDeclarations.h`中的内容搞糊涂：\n\
  \n```\n#define IBOutlet\n#define IBAction void\n```\n\n当你向源码中添加`IBOutlet`和`IBAction`时，并没有添加任何额外的功能。如上所见，这两个标识符的定义本质上是空操作（NOP）。你只是在标记代码，以便\
  \ Interface Builder 能够解析。\n\n`IBOutlet`用于标记那些将在图形编辑器以及源码中使用的对象。类似地，`IBAction`用于标识在两个编辑环境之间共享的方法。\n\
  \n*魔法方式*\n\n从源码的角度来看，当你的应用启动时，`mySlider`、`myButton`和`myLabel`对象会神奇地出现。这种魔法让你的生活轻松不少，但理解其中的窍门至关重要，这样你才能利用好背后的小把戏。\n\
  \n这一切都始于应用程序配置文件。`HitMaker-Info.plist`包含一个主要 NIB 文件基名（`NSMainNibFile`）值，这告诉 Cocoa\
  \ Touch 在启动时加载指定的文件。当指定了`MainWindow`时，`MainWindow.xib`中的所有对象都会被加载到内存中。\n\n***注意：**\
  \ * “NIB”这个名称是“NeXT Interface Builder”的缩写，曾用作旧版软件保存文件的扩展名。许多开发者以及框架的大部分仍继续使用这个术语，尽管现在文件使用的是`.xib`扩展名。这种新格式基于\
  \ XML，因此新名称的第一个字母由此而来。\n\n在某些上下文中，开发者谈论 NIB 文件；在另一些上下文中，他们使用术语“XIB 文件”。它们其实是一回事：一个包含部分用户界面的文件。\n\
  \n加载过程的一部分是设置你定义为`IBOutlet`的所有实例变量。NIB 加载机制使用你的访问器来设置实例变量，因此会利用内存中的对象分别调用`-setMySlider:`、`-setMyButton:`和`-setMyLabel:`。\n\
  \n最酷的是，加载的对象包含了你在 Interface Builder 中做的所有设置。如果你更改了视图的背景色，该更改会在内存中体现出来，并且你的实例变量可以访问它。\n\
  \n当从 NIB/XIB 文件中读取一个对象后，它会收到一个`-awakeFromNib`消息。这让你有机会对对象执行任何额外的设置。\n\n这一点很重要，因为并非所有对象属性都可以用\
  \ Interface Builder 编辑。另外，在某些情况下，你希望基于内部逻辑来配置对象。\n\n你可能会认为现在也是更新视图出口的好时机，这样想没错。但是，如果在`-awakeFromNib`的实现中向`mySlider`实例变量发送`-setValue:`消息，什么也不会发生。因为这些视图尚未加载，所以实例变量的值仍为\
  \ nil。当你向 nil 对象发送消息时，消息会被悄悄丢弃。这看起来像是一个 bug，但设计 Cocoa Touch 的工程师们帮了你一个忙：视图是*惰性*加载的。\n\
  \n工作原理如下：视图会占用大量内存，特别是当你使用诸如`UIWebView`这类包含图片缓存及其他网页内容的重型对象时。在 iPhone 上，每个字节都很宝贵，因此视图对象只在需要显示时才被加载。这种方法还有一个额外好处：当应用中包含多个视图时，应用加载所需的时间更少。\n\
  \n要了解视图何时从 NIB/XIB 文件中加载，请重写`-viewDidLoad`方法。以下代码展示了如何初始化你的`mySlider`对象的位置：\n\n\
  ```\n- (void)viewDidLoad {\n    mySlider.value = 11.0; // LOUDER\n    [super viewDidLoad];\n\
  }\n```\n\nCocoa Touch 不仅惰性加载视图，还能在内存不足时自动移除它们。该框架知道哪些视图正在显示，并通过移除任何不可见的视图来安全地回收存储空间。当这样做时，它还会向你的视图控制器发送一条消息，让你了解内存不足的情况：\n\
  \n```\n- (void)didReceiveMemoryWarning {\n    [super didReceiveMemoryWarning];\n\
  }\n```\n\n如果你的视图依赖于大量缓存信息或其他易于重建的数据，那么`-didReceiveMemoryWarning`方法也是清除这些对象的好办法。\n\
  \n当然，你还需要知道视图何时被移除，以便释放实例变量来节省更多内存。如果你不重写`-viewDidUnload`方法，你的实例变量将继续占用空间，但由于它们没有父视图，所以毫无用处。实现很简单：\n\
  \n```\n- (void)viewDidUnload {\n    self.mySlider = nil;\n    self.myButton = nil;\n\
  \    self.myLabel = nil;\n}\n```\n\n这引出了一个微妙之处：`-viewDidLoad`和`-viewDidUnload`方法可能会被多次调用，因此应避免执行那些只应执行一次的初始化操作。\n\
  \n***提示：** * 你并非必须使用 Interface Builder 创建的 NIB/XIB 文件来构建视图层次结构。重写`-loadView`方法允许你用代码构建自己的视图层次结构。这样做更难，但对于某些用户界面来说，这是必要的。\n\
  \n如果你要花大力气调整从 NIB/XIB 文件加载的视图（通常是在进行大量动画时），用代码重写`-loadView`，通过分配视图对象、初始化它们，然后用`-addSubview:`将它们添加到主视图中，通常会更简单。\n\
  \n\n\n最后，由于 NIB 加载器在将输出口对象存入内存后仍保留了它们，你需要在视图控制器中完成最后一步：在视图控制器被释放时释放这些视图：\n\n```\n\
  - (void)dealloc {\n    [mySlider release]; mySlider = nil;\n    [myButton release];\
  \ myButton = nil;\n    [myLabel release]; myLabel = nil;\n    [super dealloc];\n\
  }\n```\n\n现在，你已经掌握了 NIB/XIB 文件背后的神奇原理，可以准备好看看它们是如何创建的了！\n\n**第 3 章：Cocoa Touch：让\
  \ Objective-C 发挥作用**\n\n**85**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 目标和动作\n\n### 用户界面：简易之道\n\n乍一看，这份逐步指南可能并不简单。别担心，一旦你掌握了工作流程，使用 Interface Builder\
