  \ → 清理）。此步骤确保你从一个干净的状态开始。它会移除所有因代码签名错误而生成的代码。在出现的对话框中，确保两个复选框都已勾选，然后点击**“清理”**。\n\
  \n现在是每位 iPhone 开发者都记忆犹新的时刻：在你的 iPhone 上安装第一个应用。选择 构建 → 构建并运行（或按 ⌘-Return）来启动操作！\n\
  \n**注意：** 如果你看到无法启动可执行文件的错误，这意味着你的 iPhone 未连接或需要重启。另外，请检查你的手机是否已解锁，以便显示主屏幕。\n\n\
  你可以在左下角观察状态行，随着头文件被预编译和源代码被编译。在构建过程接近尾声时，会进行代码签名过程。此时，你会看到一个消息框，询问是否允许“codesign”访问你的钥匙串。点击**“允许”**。\n\
  \n每次从 Xcode 运行应用程序时，它都会检查设备以确保已安装有效的配置描述文件。当你将配置文件拖放到 Xcode 图标上时，你只是将其安装在了开发环境中。配置描述文件的最终目的地是设备本身，在它就位之前，你的应用程序将无法运行。幸运的是，Xcode\
  \ 会帮助你：它会提示你无法在设备上运行应用程序。当你点击**“安装并运行”**时，配置文件将被安装。\n\n你可以通过手机上的**“设置”**应用来验证配置描述文件是否已安装。轻按\
  \ 设置 → 通用 → 描述文件，你会看到已安装的配置文件列表。你会看到你的**“iPhone Development”**配置文件及其过期日期。当配置文件即将过期时，iPhone\
  \ OS 会发出警告。你也可以使用此界面删除配置文件。\n\nXcode 的下一步是将你的应用程序复制到设备上。你会在左下角看到一条状态消息：“正在将 Safety\
  \ Light.app 安装到 Kryten 上……”，随后是“GDB：正在运行……”。现在看看你的设备。恭喜你，你现在是一名 iPhone 开发者了！\n\n\
  **提示：** 你可以将多个 iPhone 和 iPod 连接到你的 Mac 作为测试辅助工具。这很简单——只需将每台设备连接到 USB 端口，Xcode 就可以同时使用它们。要控制应用安装和调试的位置，请在**“概览”**菜单中选择适当的设备名称作为**“活动可执行文件”**。\n\
  \n**150**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**正式生效**\n\n##\
  \ 当操作失败时\n\n经验丰富的 iPhone 开发者会告诉你，他们在配置门户上花费的时间比他们希望的多得多。可悲的事实是，整个代码签名过程的设计初衷就是随着时间的推移而失效。\n\
  \n正如你一路注意到的，证书会过期，它们所关联的配置描述文件也会过期。甚至连设备也会因为升级或意外而失效（如果你从未发现过手机在洗衣机里，那你真算幸运了！）。\n\
  \n\n\n# Apple 开发配置与签名问题指南\n\nApple 设计的这一流程使其能够保留对您应用程序分发的控制权。结果就是：您所处理的配置绝对*不是*“一劳永逸”。更糟的是，几个月后您会忘记当初是如何设置的。以下章节将帮助您在出现问题后恢复正常工作状态。\n\
  \n## 代码签名\n\n没有人喜欢构建失败。如果在签名代码时遇到错误，您的构建肯定出了问题。此时需要检查您的证书和构建设置！\n\n### 证书\n\n首先要验证的是证书是否已过期。最快的方法是打开\
  \ `Applications➝Utilities` 文件夹中的`钥匙串访问`，并搜索`iPhone.*`。如果看到任何证书上有红色 `X`，则需要重新生成它们。如果您保存了之前的证书签名请求副本，例如`iPhone.certSigningRequest`（第\
  \ 140 页），只需将其重新提交到门户。否则，您需要使用`钥匙串访问`生成新的请求。\n\n通过门户更新证书后，您会发现配置文件出现问题。它们已被作废，因为其中包含对不再存在的证书的引用。修复并不难：点击“无效”状态指示旁边的“续订”按钮。\n\
  \n一旦配置文件重新生成，您需要下载并将其安装到`Xcode`中。如果团队中的其他开发者使用相同的配置文件，他们也需要更新其开发环境。任何使用该配置文件进行 Beta\
  \ 测试的外部测试人员也需要在其设备上加载新的配置文件。\n\n现在您可以看到，像过期证书这样简单的事情会如何级联成许多人繁重的工作。还好您在编码时可以偷懒，因为您需要额外的时间来管理配置文件！\n\
  \n### 代码签名标识\n\n在 iPhone 开发过程中，您可能会看到类似这样的错误消息：“代码签名错误：标识‘iPhone Developer: Baba\
  \ O’Riley’与默认钥匙串中的任何有效证书/私钥对都不匹配”。\n\n此消息表明您的项目设置包含对默认钥匙串中不存在的证书的引用。请检查`钥匙串访问`，确保看到类似图\
  \ 5-4 的内容。\n\n当您与另一位开发者（无论是开源项目还是团队中的其他人）协作开发项目时，通常会出现此问题。如果该人员将代码签名设置更改为“iPhone\
  \ Developer: Happy Jack”，您的证书将不匹配，从而看到该错误。\n\n修复方法很简单：确保在构建设置中定义了“自动配置文件选择器”。在`Xcode`中打开目标构建设置（`Project➝Edit\
  \ Active Target`），向下滚动到“代码签名”部分。`代码签名标识`应设置为`Any iPhone OS Device`，其值为`iPhone Developer`。此时会显示钥匙串中的当前匹配项。\n\
  \n***提示：*** 请记住检查目标中的设置：目标可以覆盖项目中的任何配置。不要因为查看了错误的位置而误导自己！\n\n### 配置文件匹配\n\n如果您使用类似`com.*mydomain.*`的包标识符定义了一个配置文件，并尝试构建一个在`Info.plist`中包含`com.theirdomain.TheirProduct`的项目，您将看到错误：“代码签名错误：标识‘iPhone\
  \ Developer’与任何配置文件中的任何标识都不匹配”。\n\n这就是在配置文件中为您的 App ID 使用通配符`*`的原因之一——它更有可能匹配您钥匙串中的某个证书。当然，在需要对应用程序标识符更加具体的情况下，您需要更改`Info.plist`中的值，或者生成一个与新标识符匹配的新配置文件。\n\
  \n## 设备配置\n\n您可能在构建应用时没有遇到任何问题，但当它无法在设备上运行时，那才是真正的问题！以下是需要注意的一些事项：\n\n### 启动中止\n\
  \n当您点击应用程序图标时，它开始启动，您会看到`Default.png`中的图像一闪而过。然后您就回到了主屏幕。真糟糕。您刚刚见证了过期的配置文件。iPhone\
  \ OS 启动该应用，确定设备上没有有效的配置文件，然后应用退出。\n\n前往“设置”应用，深入导航至`General➝Profiles`。如果看到带有红色文本的配置文件，指示该配置文件已过期，请将其删除。它不再有用。\n\
  \n然后前往“配置门户”刷新配置文件，以便重新安装。\n\n***提示：*** 删除过期的配置文件可以帮助您避免配置文件之间的冲突。如果您有一个匹配所有应用的过期配置文件，操作系统可能会先找到该配置文件，而忽略该应用的其他有效配置文件。*请尽快从设备上删除任何过期的配置文件*。\n\
  \n也可能是配置文件一开始就没有正确安装。如果“设置”应用没有列出您一直用于开发的名称，请使用`Xcode`的“管理器”再次安装该配置文件。\n\n***注意：***\
  \ 当您向测试人员发送新的 Beta 版本时，可能会听到其中一些人说“应用已安装，但无法完成启动”。他们正遇到上述问题。\n\n### 门户混淆\n\n当您在配置门户中添加和删除设备时，请记住刷新“配置”部分的配置文件。这不会自动发生。\n\
  \n许多开发者在更新设备配置后，立即下载了一个不包含新信息的配置文件。很容易忘记添加设备并不会神奇地使其出现在您的配置文件中。您需要点击`Edit➝Modify`链接，并在配置文件列表中选择每个新设备。\n\
  \n类似地，如果您从门户中删除设备，任何使用该设备的配置文件都会立即失效。请访问“配置”部分并重新创建受影响的配置文件。\n\n## 其他问题\n\n如果您遇到代码签名或配置问题，不要害怕重启`Xcode`。大多数情况下，开发环境能够完美地处理证书和配置文件的管理。然而，各个组件之间的关系很复杂，有时`Xcode`需要一点推动。\n\
  \n另一个即使是顶尖开发者也会被迷惑的问题，并非与代码签名或配置有关。它可能更简单——您的应用是为错误版本的 iPhone OS 编译的。\n\n如果您使用 3.1\
  \ SDK 构建应用，测试人员可以将其安装到装有 iPhone OS 3.0 的设备上。当您的应用无法在设备上启动时，不要假定是配置问题。养成在开始排查配置之前，先询问测试人员他们运行的是哪个操作系统版本的习惯。\n\
  \n***提示：*** 通过 App Store 安装的应用不会遇到此问题，因为安装程序在将应用放到设备上时会检查版本。其他安装机制不会执行此检查。\n\n##\
  \ 您现在已移动\n\n一旦您将工作成果放入口袋随身携带，您就会开始以不同的眼光看待它。您的应用已从桌面开发环境中解放出来，您对其设计的前提假设也是如此。\n\n\
  将您的创作带入现实世界极为重要，因为您的客户在从 App Store 下载完成后也会立即这样做。\n\n以下是您会立即注意到的一些事情：\n\n\n\n• **一切感觉都变慢了。**\
  \ CPU 和网络不再那么快，这会影响整个用户体验。\n• **控件看起来更小了。** 那些在 Mac 屏幕上显得很大的按钮，现在不再那么大了。\n• **环境条件发生变化。**\
  \ 在办公室受控光线条件下看起来不错的界面，在直射阳光或刺眼的荧光灯下可能就不那么好看了。\n• **干扰增多。** 你会在与其他人互动以及各种环境条件下使用应用程序：复杂情况更难处理。\n\
  \n随着时间的推移，你会发现应用程序中有些功能在真实世界中会失效。有时是代码问题，比如应用程序如何处理断开的网络连接。有时则是设计问题：你需要调整控件的对比度和位置。无论哪种情况，你只有离开舒适的工作环境才能发现这些问题。\n\
  \n## 准备就绪\n\n现在你已经熟悉了开发环境。一切都按你的需求设置好了，可以轻松地构建和测试代码。是时候考虑编写应用程序的最佳方式了。你可能用过其他开发环境，所以你知道掌握设计模式和最佳实践有多么重要，这能让你成为一名高效的程序员。这意味着是时候深入探究\
  \ Flashlight Pro 项目了！\n\n**154**\n《iPhone 应用程序开发：缺失手册》\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n# 专业人士的手电筒\n\n现在你的开发环境已经运行起来，是时候开始编写代码了。当你面对一门新语言、新框架和新平台时，这是一项艰巨的任务。当有那么多东西都截然不同时，第一行代码很难写出来。与其翻阅成堆的文档和示例代码，不如现在做些不同的事情。你将研究一款由经验丰富的\
  \ iPhone 开发者创建的完整产品。本章的重点*不是*全面介绍所有可用的编程 API。相反，你将获得一次充满技巧和诀窍的导览。实质上，你将坐下来观看专业人士构建一款\
  \ iPhone 应用程序。目标是传授你可以在自己的应用程序中使用的常见模式和最佳实践。\n\n### 导览\n\n幸运的是，本章要构建的产品你已经很熟悉了：一款手电筒应用！你在第\
  \ 4 章中为之纠结的设计将在你眼前变成现实。如果你还没有下载，请从缺失 CD 页面（*www.missingmanuals.com/cds*）下载 Flashlight\
  \ Pro 项目。本导览中的所有内容都引用该项目中的代码。\n\n***提示：*** 不要害怕尝试修改这些代码。事实上，在某些方面，通过调整可以学到很多东西。正如每一位优秀的程序员所知，这项技能是通过多年的反复试错磨练出来的！如果你不小心把代码改坏了，只需从缺失\
  \ CD 再次下载项目即可。\n\n**155**\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  ## 打开指南手册\n\n### 从哪里开始？\n\n当你的项目文件正确设置好后，你会遇到每个开发者都会面临的问题：空白画布综合症。这个庞大的项目该从哪里入手？以下是一些简单的步骤，可以帮助你尽快开始：\n\
  \n1. **熟悉模板创建的 NIB 文件和源代码。** 其中一些你可能想保留；另一些则需要重命名或删除。\n2. **应用程序委托（参见下一节）是应用程序中首先执行的部分。**\
  \ 它是开始核心开发的天然起点。\n3. **Interface Builder（第 86 页）是你的好朋友，因为它能让你几乎立即看到设计效果。** 应用程序可能还做不了太多事情，因为\
  \ NIB 文件（第 152 页）中创建的视图无法向控制器发送动作，但这能激励你继续前进。\n4. **使用 Interface Builder 还能帮助你识别哪些视图需要自定义。**\
  \ 如果你无法在图形编辑器中让它们看起来正确，就需要编写一些代码，要么通过子类化标准视图（第 67 页），要么从头开始编写自己的视图。\n5. **当你开始编写视图代码时，通常会遇到第一批需要用类别或子类扩展的标准类。**\n\
  6. **一旦视图就位，就可以开始向它们提供数据了。** 这是开始实现模型的好机会。\n7. **在上述所有步骤中，你一直在向控制器对象添加实例变量。** 但此时，你可以真正开始通过模型和视图之间的动作、更新和通知将所有内容整合在一起。\n\
  8. **当项目接近尾声时，开始考虑产品本地化。** 同时，在设计师的帮助下清理用户界面。\n\n现在你已经准备好开始浏览最终的 Flashlight Pro\
  \ 应用程序了。你将按照大致创建的顺序查看源代码文件。在浏览过程中，本章还会重点介绍并讨论重要部分。那么，请坐下来，熟悉你的项目副本，准备开始一次穿越 Xcode\
  \ 的“组与文件”列表的旅程！\n\n### 打开指南手册\n\n通过打开指南手册开始你的导览：找到从缺失 CD 页面下载的 `Flashlight_Pro.xcodeproj`\
  \ 项目文件，双击其图标以在 Xcode 中打开它。确保主 Flashlight Pro 组和应用程序委托子组都已展开，如图 6-1 所示。\n\n**156**\n\
  《iPhone 应用程序开发：缺失手册》\n![图片 55](img/index-175_1.jpg)\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n***图 6-1：*** *在本章中，你将使用 Xcode 中的“组与文件”列表来查找这些页面中讨论的代码。此图显示了在列表中选择并在编辑器中查看的 `Flashlight_ProAppDelegate.m`。要使编辑器填满窗口的右侧，请使用“视图”➝“放大编辑器”（⌘-Shift-E）。你将在下方了解更多关于第一行（选中的）代码。*\n\
  \n正如上一页列表中所指出的，应用程序委托是你的代码首先执行的地方，因此导览从这里开始。\n\n### `Flashlight_ProAppDelegate`\n\
  \n在这个类的实现中，真正重要的方法只有一个：`–applicationDidFinishLaunching:`。尽管它只有几行代码，但其中蕴含了很多内容。\n\
  \n#### `UIApplication`\n\n在 `Flashlight_ProAppDelegate.m` 中，你第一次看到了 `UIApplication`\
  \ 类。这个对象的一个实例始终可用，它允许你查询和配置应用程序在 iPhone OS 中的状态。在这个例子中，禁用了允许屏幕变暗和关闭的属性：\n\n```\n\
  [[UIApplication sharedApplication] setIdleTimerDisabled:YES];\n```\n\n当你使用手电筒时，你希望它一直亮着，直到用户想关闭它。`UIApplication`\
  \ 类还允许你做一些有趣的事情，比如在主屏幕的图标上添加徽章、更改状态栏外观、显示网络活动指示器等。\n\n第 6 章：专业人士的手电筒\n**157**\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n#### `UIScreen`\n\n另一个重要的共享类是\
  \ `UIScreen`：它包含显示区域大小的信息。要确定视图的大小，请使用：\n\n\n\n`CGRect applicationFrame = [[UIScreen\
  \ mainScreen] applicationFrame];`  \n编写这段代码的原因在于，即使你已知 iPhone 屏幕的确切尺寸（320 × 480，或显示状态栏时的\
  \ 320 × 460），屏幕的实际大小也可能与预期不符。例如，在通话中或使用网络共享时，状态栏高度为 40 像素而非 20 像素。而在横屏模式下，这些数值是从屏幕宽度而非高度中减去的。因此，最好让\
  \ Cocoa Touch 为你计算当前屏幕尺寸。\n\n**提示：** 让系统计算屏幕尺寸的另一个原因是：未来你的应用可能会在更大屏幕的设备上运行，例如 iPad\
  \ 的 1024 × 768 像素显示屏。这样写能提前适应未来的变化！\n\n---\n\n### Windows 与视图\n\n继续查看`Flashlight_ProAppDelegate.m`，你会看到屏幕是如何被激活的。这一切始于以下代码：\n\
  \n`mainViewController.view.frame = applicationFrame;`\n\n很明显，视图的尺寸和位置（`frame`）被设置为整个屏幕。不太明显的是，视图对象此时也正在被**实例化**。\n\
  \n也就是说，由于控制器的视图是惰性加载的，首次访问`MainViewController`的`view`属性会导致该对象从 NIB 文件加载到内存中。因此，执行这行代码会触发`MainViewController`中的`–viewDidLoad`方法被调用。\n\
  \n让视图显示在屏幕上需要两步：首先，将其添加为窗口的子视图；然后，使窗口可见。如下所示：\n\n```\n[window addSubview:mainViewController.view];\n\
  [window makeKeyAndVisible];\n```\n\n这将导致`MainViewController`中的另一个方法被调用：`–viewDidAppear`中的代码会执行。请注意，这并不是该消息被发送的唯一时机；只要视图出现在屏幕上（例如，在查看设置视图后翻转回主视图时），都会触发此消息。\n\
  \n---\n\n## NIB 文件：值得一看\n\n如你在第 86 页的步骤中所见，使用 Interface Builder 创建基本界面非常简单。尽管 UI\
  \ 还无法实现任何实用功能，但你可以看到控件和其他视图。这也会开启一个自然循环：添加视图、在控制器中创建 outlet、添加 action，并将 action\
  \ 连接到视图。\n\n---\n\n**图 6-2：** 你检查的第一个 NIB 文件包含对`UIApplication`对象的引用以及`Flashlight_ProAppDelegate`类的一个实例。此外，应用窗口在此定义并在启动时加载。\n\
  \n首先你会注意到，File’s Owner 被设置为`UIApplication`。正如你在第 89 页所见，该对象知晓你的应用的一切信息。当用户启动应用时，它会自动创建。\n\
  \n`UIApplication`可以有一个委托，该委托会在应用状态发生变化时接收消息。在这个 NIB 中，委托的实例以`Flashlight_ProAppDelegate`类型被归档。当该文件被加载时，你会自动获得该对象的一个实例。\n\
  \n注意，File’s Owner 中的`UIApplication`对象有一个连接到`Flashlight_ProAppDelegate`实例的委托。这确保了你的委托能够知道应用状态何时发生变化。如果没有这个重要的连接，`–applicationDidFinishLaunching:`消息将永远不会被发送，最终你将得到一个没有视图的窗口。当你将目标设置中的主\
  \ NIB 文件配置为`MainWindow`时，你就告诉 Cocoa Touch 在启动时自动加载该文件。这个设置是应用引导过程的关键部分！\n\n**提示：**\
  \ 如果第一个 NIB 文件无法显示，请确保`Info.plist`中的`NSMainNibFile`键具有正确的值。\n\n当你展开`Window`实例旁的三角符号时，会看到它有一个`UIImageView`子视图。这就是为什么当你双击\
  \ Window 在 Interface Builder 中查看时，能看到电池图片。\n\n子视图会彼此堆叠。这个带有电池的图片视图位于堆叠的底部。你可能好奇为什么启动应用时看不到这些电池——因为在`–applicationDidFinishLaunching:`的实现中，你在它上面堆叠了其他内容：\n\
  \n`[window addSubview:mainViewController.view]`\n\n然而，堆叠底部的视图仍然存在。这就是为什么每次在主视图和设置视图之间切换时，你都能看到它。\n\
  \n**注意：** 这种视图堆叠被称为**视图层级**。你并不局限于只有一个堆叠。每个视图都可以有自己的视图堆叠，从而允许构建任意深度和宽度的用户界面元素集合。\n\
  \n这个 NIB 文件中最后一个值得关注的连接是：`Flashlight_ProAppDelegate`为窗口设置了一个 outlet。当该对象从文件加载时，实例变量会自动连接，因此任何发送给`window`的消息都会传递到`UIWindow`。\n\
  \n如果这个连接中断，`window`实例变量将为`nil`，那么发送给`–addSubview:`和`makeKeyAndVisible`的消息将被丢弃。最终你只会看到一张电池图片，其他什么也没有——电源故障！\n\
  \n---\n\n### MainView.xib\n\n当你打开这个 NIB 文件并双击 Light View 时，所看到的内容与你运行应用时看到的类似（图\
  \ 6-3）。这很好，因为这就是主控制器视图。\n\n**图 6-3：** 这是应用主视图的 NIB 文件内容。显示光照的视图名为 Light View，它包含工具栏和状态信息等子视图。你还可以看到`MainViewController`负责管理\
  \ Light View 的内容。\n\n#### File’s Owner\n\n注意，File’s Owner 被设置为`MainViewController`。通常，NIB\
  \ 文件的 owner 是导致它被加载的对象。正如你在第 157 页所见，`UIApplication`是 File’s Owner，因为它负责自动加载`MainWindow.xib`。\n\
  \n当你在`–applicationDidFinishLaunching:`中执行以下代码时，`MainViewController`会加载`MainView.xib`：\n\
  \n`MainViewController *controller = [[MainViewController alloc] initWithNibName:@\"\
  MainView\" bundle:nil];`\n\n这使得`MainViewController`成为`MainView.xib`的 File’s Owner。\n\
  \n**注意：** 当你通过 New File 模板创建新的`UIViewController`子类时，可以选择“With XIB for user interface”。启用该选项后，File’s\
  \ Owner 会自动配置完成。\n\n如果出于某种原因需要更改类，你可以在 Interface Builder 中使用 Identity Inspector。只需在对象列表中选择\
  \ File’s Owner，按 ⌘-4，然后从下拉菜单中选择一个新类即可。\n\n\n\n# 第 6 章：专业人士的手电筒\n\n## NIB 文件：值得一看的内容\n\
  \n当 File's Owner 使用的类与代码中使用的类不匹配时，在 `–_loadViewFromNibNamed:bundle:` 中可能会发生 `***NSInternalInconsistencyException***`\
  \ 崩溃。如果在 NIB 文件中类设置看起来正确，也请检查视图的 outlet 是否正确设置。\n\n将控制器作为 NIB 文件中的主要对象，也能让你访问在类的头文件中定义的\
  \ outlet 和 action。要查看这些连接，请在对象列表中选择 `MainViewController`。然后按下 `⌘-2` 调出连接检查器，并将鼠标悬停在每个\
  \ outlet 和 action 上。连接的视图会在 Light View 窗口中高亮显示。\n\n### 层层嵌套的视图\n\n当你打开 Light View\
  \ 左侧的展开三角形时，会看到一个信息视图和一个工具栏。如果展开工具栏，你会看到“Flasher”、“Disco”、“SOS”、“Settings”，它们之间由“(Flexible\
  \ Space)”分隔。\n\n灯光视图有两个子视图：一个用于信息，另一个用于工具栏。而工具栏又有七个子视图，包括四个按钮和三个分隔符（均来自 `UIBarButtonItem`\
  \ 类）。\n\n有时，通过这个列表导航比在 Light View 窗口中选择项目更容易。例如，如果你单击 Disco，可以按下 `⌘-1` 快速查看按钮的图片是\
  \ `ToolbarDiscoStart.png`，或者按下 `⌘-2` 查看它发送的是 `toggleDisco` 动作。你也可以使用方向键在对象列表中移动，以便在当前检查器中快速检查所有对象的属性。\n\
  \n### 自定义视图\n\n这个 NIB 文件包含两个自定义视图：`LightView` 和 `IFInfoView`。在创建自定义视图时，你经常会面临一个“先有鸡还是先有蛋”的问题：你希望在类的实现完成*之前*，就在\
  \ NIB 文件中放置一个此视图的实例。\n\n为了解决这个问题，你可以在视图层次结构中创建一个 `UIView` 的实例。然后，你可以使用这个通用视图进行布局和其他基本配置。之后，在实现了类之后，你可以使用标识检查器（`⌘-4`）将类的标识从\
  \ `UIView` 更改为你的新视图的名称。\n\n你将在本节稍后部分（第 169 页）看到 `LightView` 和 `IFInfoView` 类的实现。\n\
  \n## 视图尺寸设置\n\n到目前为止，Interface Builder 中有一个检查器明显未被提及：那就是用于设置视图尺寸的检查器（图 6-4）。你可以通过选择“工具”➝“尺寸检查器”或按下\
  \ `⌘-3` 来访问此面板。\n\n**图 6-4：** 你可以在“尺寸检查器”面板中看到信息视图及其设置。“尺寸与位置”值定义了视图的原点以及其宽度和高度。“自动调整大小”控件显示了四个锚点和两个拉伸箭头。信息视图锚定在左、上、右边缘，并且当父视图的尺寸改变时会水平拉伸。工具栏具有类似的设置，只是它锚定在视图的底部而不是顶部。\n\
  \n有时，你希望使用参数来指定视图的框架。信息视图就是一个很好的例子：你需要确保它位于父视图的左上角，并且其高度设置为 44 像素（以便与工具栏的高度匹配）。\n\
  \n通过将 X 和 Y 坐标指定为 0,0，你可以确保视图放置在左上角原点。同样，宽度设置为 320、高度设置为 44，则设定了初始宽度和高度。\n\n## 自动调整大小\n\
  \n设置尺寸仅仅是个开始，因为视图的尺寸会随着应用程序的运行而改变。无论是由于状态栏高度加倍，还是由于设备方向的改变，应用程序的屏幕区域都会变化。幸运的是，Cocoa\
  \ Touch 提供了一种优雅的机制来自动调整视图大小。这种机制称为*自动调整大小*，它对任何视图都可用，并且会通过视图层次结构进行传播。\n\n### 深入探究：调整大小的实验\n\
  \n“自动调整大小”预览会提示你调整尺寸的效果，但检查调整大小配置的更好方法是改变视图的方向。即使你的应用不支持横向模式，单击视图窗口右上角的箭头也会触发自动调整大小的应用。\n\
  \n以下是在 Interface Builder 中执行的一些简单步骤，应该能帮助你理解这个复杂的特性：\n\n1. 在 `MainView.xib` 中打开\
  \ Light View。在出现的窗口中，单击右上角的方向更改图标。\n2. 视图将侧向旋转，信息视图和工具栏都会正确定位，如图 6-5 所示。这就是自动调整大小在起作用！再次单击方向箭头，视图将恢复到纵向。得益于自动调整大小，视图会回到其原始位置。\n\
  3. 现在，打开 Light View 的属性检查器（`⌘-1`）并取消选中“自动调整子视图”。在单击方向控件后，请注意工具栏是如何落到屏幕底部的，因为视图仍然认为灯光视图的高度是\
  \ 460 像素。同样，信息视图的宽度仍为 320 像素，尽管屏幕现在有 480 像素宽。\n4. 由于你不想将这些更改保存到 NIB 文件中，请使用 Interface\
  \ Builder 的“文件”➝“还原”菜单项。单击“还原”按钮后，文件将重新加载到上次保存的版本。\n5. 要了解视图拉伸是如何工作的，请从对象列表中选择 Info\
  \ View。调出尺寸检查器（`⌘-3`），并单击自动调整大小控件中间的宽度箭头。（黑色框的中间应该没有红色箭头。）\n6. 单击方向控件，你会看到信息视图的宽度保持为\
  \ 320 像素。\n7. 将方向保持在横向。现在你将调整工具栏的锚点，因此从对象列表中选择它并打开尺寸检查器。\n8. 将视图底部的锚点更改为顶部。单击黑色框底部的红色锚点将其关闭。然后单击黑色框上方的锚点将其打开。\n\
  9. 现在，当你将方向改回纵向时，工具栏会移动到窗口的中间。这是因为工具栏保持了其顶部边缘与灯光视图顶部边缘之间的相同距离。\n\n你可以随意操作所有视图的锚点和拉伸控件，以了解它们的工作方式。只需确保不要将更改保存到\
  \ `MainView.xib` 文件中，否则当你的手电筒调整大小时，它的行为会变得非常奇怪！\n\n当你选择 Light View 并检查其属性（`⌘-1`）时，你会看到“绘图”部分中的“自动调整子视图”已打开。当此视图的大小因任何原因改变时，信息视图和工具栏都会自动调整大小。\n\
  \n**图 6-5：** 当你单击 Light View 窗口右上角的方向更改图标时，视图会在纵向和横向之间切换。使用此图标可以快速测试视图的自动调整大小行为。在此图中，你将看到信息视图和工具栏都有了新的宽度，但仍锚定在屏幕的相同边缘。\n\
  \n\n\n\n那么，调整子视图的大小意味着什么呢？这个问题问得好，它引出了大小检查器中的另一个控件！从列表中选择`Toolbar`，然后按 ⌘-3 调出检查器。你会在面板中看到一个“自动调整大小”部分。这里的控件告诉系统在调整大小时如何计算新的视图尺寸。外边缘显示了四个锚点。内部正方形则展示了视图将如何在垂直和水平方向上进行拉伸。当视图可以被拉伸时，锚点定义了视图边缘与父视图之间的间隙。如果视图不能被拉伸，那么锚点则定义了一个需要保持的相对位置。这六个控件中的每一个都会影响最终的视图大小；如果将鼠标悬停在控件上，会显示一个预览效果。\n\
  \n工具栏被配置为拉伸其宽度，并且除了顶部之外的所有边都被锚定。由于工具栏边缘与浅色视图之间没有像素间隔，任何自动调整大小都会使控件保持与视图的完整宽度相连。因为工具栏在顶部没有锚定，如果屏幕尺寸发生变化，视图的位置就会向上移动。\n\
  \n`SettingsView.xib`\n\n当你打开 `SettingsView.xib` 并在对象列表中双击 `Settings View` 时，你会看到与应用程序中显示的内容非常相似（图\
  \ 6-6）。\n\n除了滑块控件中的自定义图形和选择器视图中的项目外，你会看到相同的视图。\n\n# 第 6 章：专业手电筒\n\n**165**\n\n![图\
  \ 60](img/index-184_1.jpg)\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## NIB 文件：值得一看\n\n### 模拟仿真\n\n#### 尝试调整大小\n\n构建应用程序后，你应该始终在模拟器中测试其大小调整功能。你可以使用`硬件`➝`向左旋转`和`向右旋转`菜单来更改方向。要获得双倍高度的工具栏，请使用`硬件`➝`切换通话中状态栏`。\n\
  \n一个常见的问题是看到工具栏在屏幕上被向下推。发生这种情况时，请检查主视图的自动调整大小是否已开启，并且工具栏底部的锚点是否已设置。\n\n当你将一个新的 `UIView`\
  \ 作为子视图添加到主视图时，它会在所有四条边上被锚定，并在宽度和高度上同时拉伸。这保持了在父视图中的相对位置：如果你有一个需要紧贴屏幕边缘放置的视图，则需要更新这些默认设置。\n\
  \n**图 6-6：** 除了滑块控件的自定义图形和颜色选择器的内容外，`SettingsView.xib` 文档看起来与你在应用程序中看到的非常相似。设置视图由许多子视图组成。\n\
  \n点击对象列表中 `Settings View` 左侧的展开三角形，你会看到这个视图由许多子视图组成。\n\n### 不透明度\n\n这些视图的顺序很重要。列表中第一个列出的子视图\
  \ `Light View` 绘制在堆栈的底部。然后，两个图像视图、选择器视图和其他视图按照顺序依次绘制在彼此之上。\n\n**166**\n\niPhone\
  \ 应用程序开发：缺失的手册\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## NIB 文件：值得一看\n\
  \n默认情况下，视图是不透明的。这是 iPhone 绘制的最快方式，因为它不需要使用 Alpha 通道来合成（混合）一个视图与另一个视图。只有最顶层的视图会被绘制。同样，如果你确定视图完全填满了它的矩形区域，你可以将其配置为在绘制前不清除该区域。\n\
  \n这些配置参数在属性检查器中列为`不透明`和`绘制前清除内容`。\n\n在需要快速绘制的视图中，关闭透明度并在绘制前不清除可以显著加快速度。当你在绘制表格视图并希望滚动尽可能流畅时，这通常是一个问题。这个简单的设置视图只有有限数量的视图，并且绘制操作不频繁，因此透明度不会显著影响绘制性能。\n\
  \n不透明度是制作复杂 iPhone 用户界面中非常重要的一部分。\n\n透明的视图使工作变得简单得多，因为你能够叠加效果来产生最终结果。第一个示例是每个滑块视图。用于最小值和最大值的图标图像具有透明背景。滑块按钮和滑块图像也是透明的。这些元素组合在一起创建了一个可以在任何背景上绘制的滑块。\n\
  \n另一个示例是结合了不透明的 `Light View` 和半透明的 `Background Image View` 来生成预览效果。图像视图使用图像 `SettingsBackground.png`\
  \ 来绘制视图。当你用 Finder 打开该图像时，你会看到它有一个完全透明的孔和部分透明的半影。此图像绘制在灯光的不透明视图之上。当 `Light View`\
  \ 的颜色改变时，它会强制其上方的视图层重新合成并在屏幕上生成新的图像。这产生了灯光投射在表面上的效果，而无需任何复杂的绘制。\n\n**提示：** 你可以通过按住\
  \ Control 键单击（或右键单击）组与文件列表中的文件名，然后从快捷菜单中选择`在 Finder 中打开`，来在 Finder 中打开 Xcode 项目中的任何文件。你也可以选择`在\
  \ Finder 中显示`项目来打开包含该文件的文件夹。\n\n对于图像文件，`在 Finder 中打开`将在预览应用程序中显示该图形。如果你要查看许多包含透明度的文件，你可能希望使用`预览`➝`偏好设置`➝`通用`来调整窗口背景颜色。\n\
  \n### 滑块\n\n在这个 NIB 文件中需要注意的最后一件事是滑块配置。`亮度滑块`设置为连续更新，而`速度滑块`则不是。此配置是通过属性检查器（⌘-1）中的`连续`复选框完成的。\n\
  \n有时你希望在用户拖动滑块时更新你的控制器（和模型）。其他时候，这种连续更新可能会导致性能或视觉问题。当`速度滑块`连续更新时，闪烁会变得不稳定，因此它被关闭了。\n\
  \n第 6 章：专业手电筒\n\n**167**\n\n![图 61](img/index-186_1.jpg)\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## NIB 文件：值得一看\n\n### `AboutView.xib`\n\n嘿——这个 NIB 并不在最初计划中！作为一名开发者，你知道计划总会有变化。在开发产品的过程中，你显然需要一个地方来推广你的业务。在\
  \ Beta 测试期间，你还发现有一个显示 Beta 版本号的地方非常方便。而一旦你意识到添加一个控制器和视图是多么容易，实现这个新的“关于”视图只需要很短的时间（图\
  \ 6-7）。\n\n**图 6-7：** 此图显示了一个包含致谢、推广信息和应用程序版本号的“关于”视图。\n\n**提示：** 这个新的 NIB 文件也可能是一个为你们谦逊的作者添加更多酷示例的地方。\n\
  \n视图的大部分由描述产品的文本标签组成。其中一个视图，即`版本标签`，连接到控制器中的 `-versionLabel` 插座。这样，版本号就可以自动更新。当讲解到\
  \ `AboutViewController` 类（第 204 页）时，你会看到它是如何工作的。\n\n这个 NIB 中的另一个有趣的视图是`关闭按钮`。在检查器中看看它的大小：它的尺寸高达\
  \ 320 × 460 像素，覆盖了整个屏幕！\n\n这个按钮允许用户点击屏幕上的任何地方，并将 `-close` 动作发送给控制器。这表明按钮不一定需要显示任何可见的文本或图像才能有效。例如，你可以使用透明按钮作为图像上的点击检测器。\n\
  \n**168**\n\niPhone 应用程序开发：缺失的手册\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 优化外观\n\n\n\n\n# 最后是`Spotlight Image View`\n\n这是一个透明的图像，目前看起来有点无聊，但等你看到控制器（第\
  \ 205 页）时，它就会动起来、活跃起来！\n\n## 优化外观\n\n现在你已经看过了 NIB 文件，是时候看看一些自定义视图是如何创建的了。这里有一个用于光源的自定义视图，另一个用于屏幕顶部显示的信息。\n\
  \n### `LightView`\n\n这个视图模仿了真实的物理光源。模拟现实世界的对象通常更容易设计，因为你已经熟悉了正确的行为。它们往往也能让你的代码更易读。\n\
  \n这种倾向在 Cocoa Touch 中很常见。例如，`UISwitch`控件通过使用名为`on`的属性来管理其状态。下面哪段代码更易读？\n\n```\n\
  mySwitch.on = YES;\n```\n\n还是\n\n```\nmySwitch.state = YES;\n```\n\n该视图的属性允许你更改光源的状态（开、关或单次脉冲）。你还可以设置光源的亮度和颜色。为了模拟光源的物理属性，你还可以设置一个包络，其中\
  \ attack（起音）和 release（释音）变量控制光源打开和关闭所需的时间。\n\n### 委托\n\n委托不仅适用于系统类。光源使用这种设计模式来通知另一个对象，视图上发生了点击事件。在这个应用中，该对象是`MainViewController`。当你看到控制器代码（第\
  \ 194 页）时，就会了解它如何作为委托角色。\n\n当你查看`LightView.h`时，会看到协议的前向声明：\n\n```\n@protocol LightViewDelegate;\n\
  ```\n\n需要这个声明是因为委托和视图之间存在“先有鸡还是先有蛋”的问题。类和协议定义互相需要对方。\n\n使用这个前向声明，委托实例变量被定义为：`id\
  \ <LightViewDelegate> delegate;`\n\n这个变量告诉编译器，委托可以是任何对象，只要它遵守`LightViewDelegate`协议即可。（记住`id`是任何类的通用对象。）\n\
  \n第 6 章：专业手电筒\n\n**169**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  ### 优化外观\n\n完整的协议声明位于`LightView`的`@interface`之后：\n\n```\n@protocol LightViewDelegate\
  \ <NSObject>\n\n@optional\n\n- (void)lightView:(LightView *)view singleTapAtPoint:(CGPoint)tapPoint;\n\
  \n- (void)lightView:(LightView *)view doubleTapAtPoint:(CGPoint)tapPoint;\n\n@end\n\
  ```\n\n`LightView`发送的两条消息是`–lightView:singleTapAtPoint:`和`–lightView:doubleTapAtPoint:`。两者都被标记为`@optional`，因此是否实现这些方法由委托决定。如果未指定`@optional`，则委托必须提供这些方法。\n\
  \n### 枚举\n\nC 语言的枚举在 Cocoa Touch 中被广泛使用，作为在代码中表达多种选项的方式。光源视图使用枚举来控制光源的状态。在 UIKit\
  \ 中的一个例子是`UIViewAnimationCurve`枚举。枚举的命名和值遵循一个简单的模式——类名、属性名和唯一选项名的拼接。因此动画曲线类型为`UIViewAnimationCurveEaseInOut`、`UIViewAnimationCurveLinear`等等。\n\
  \n是的，这有点冗长，但在代码中非常易读：\n\n```\n[UIView setAnimationCurve:UIViewAnimationCurveLinear];\n\
  ```\n\n**注意：** 这种标准命名模式在 Xcode 的自动补全功能中非常有用。一旦你掌握了规则，找到这些长名称就很容易了。\n\n例如，你可以输入`UIViewAnim`并按\
  \ Esc 键来显示建议列表。你知道要输入开头的文本，因为你正在处理一个`UIView`和`animationCurve`属性。\n\n光源视图用自己的枚举遵循了这个模式：\n\
  \n```\ntypedef enum {\n\n    LightViewStateOff = 0,\n\n    LightViewStateOn,\n\n\
  \    LightViewStatePulse\n\n} LightViewState;\n```\n\n该枚举在实例变量定义中使用：\n\n```\nLightViewState\
  \ state;\n```\n\n并且在属性中也使用：\n\n```\n@property (nonatomic, assign) LightViewState\
  \ state;\n```\n\n\n\n### 控制器可以通过枚举来改变灯光状态：`lightView.state = LightViewStatePulse`;\n\
  \n**170**\n\niPhone 应用开发：缺失的手册\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 优化外观\n\n### 用于私有方法的类扩展\n\n在第 2 章中，你学习了如何通过 Objective-C 分类来扩展已有类（第 38 页）。一种名为*类扩展*的变体则可以让你扩展自己类的接口。尽管你是编写类的人，并且可以在接口的`@implementation`部分定义任何内容，但扩展类接口仍有一个好处：它能让你隐藏内部方法。\n\
  \n例如，`LightView.h`中的`@interface`展示了其他类可用于与对象通信的方法。问题在于，有些方法仅用于内部，将它们暴露在接口中既会造成混淆也存在风险。\n\
  \n解决方案是在你的实现文件中定义另一个`@interface`。这个`@interface`看起来很像分类，区别在于它是匿名的——括号内没有名称：\n\n```\n\
  @interface LightView ()\n\n- (void)updateBackgroundColor;\n\n- (void)endPulse;\n\
  \n- (void)handleSingleTap;\n\n- (void)handleDoubleTap;\n\n@end\n```\n\n这个`@interface`中的方法（如`-updateBackgroundColor`）是对原始接口的扩展，因此必须在下面的实现部分中实现。这样一来，你可以在`LightView.m`中随意调用`[self\
  \ updateBackgroundColor]`，但如果其他对象试图发送类似`[lightView updateBackgroundColor]`的消息，编译器就会报错。\n\
  \n**注意：** 其他面向对象语言中称之为*私有方法*。许多 Objective-C 程序员也沿用这一术语。\n\n### 捕获视图属性变化\n\n如你之前所见，`@property`和`@synthesize`声明可以为你节省大量编写访问器代码的时间。但有一个问题：你无法知道这些访问器代码何时会被执行。\n\
  \n大多数情况下这不成问题。然而在视图中，属性更新通常意味着某些数据的呈现方式必须随之调整。视图的`color`属性就是一个例子。当其他对象改变颜色时，你需要更新视图以显示这种变化。\n\
  \n第 6 章：专业手电筒应用\n\n**171**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n### 优化外观\n\n要更新视图，你需要手动编写访问器并添加自己的代码：\n\n```\n- (void)setColor:(UIColor *)newColor\
  \ {\n\nif (color != newColor) {\n\n[color release];\n\ncolor = [newColor retain];\n\
  \n[self updateBackgroundColor];\n\n}\n\n}\n```\n\n你不可能一直偷懒，处理视图属性变化就是不能偷懒的时候。\n\n\
  **提示：** 如果你正在为视图进行自定义绘制，通常唯一需要额外添加的代码是：\n\n```\n[self setNeedsDisplay];\n```\n\n\
  `-setNeedsDisplay`方法会将视图标记为“需要重绘”，并通过`-drawRect:`方法自动触发重绘。你将在`IFInfoView`（第 174\
  \ 页）中看到这一技术的实际应用。\n\n另请注意，绘制不会立即执行。相反，多个绘制请求会在下一个事件处理周期中合并为一次更新。如果你试图直接调用`-drawRect:`来规避这一点，效率会更低且结果不可预测。让系统来决定何时绘制。\n\
  \n### 视图动画\n\nCocoa Touch 允许你对某些视图属性进行动画处理，这也是让应用看起来如此酷炫的原因。但更重要的是，它是你向用户提供操作微妙反馈的方式。\n\
  \n以下是 iPhone 应用中常见的一些视图属性及其效果类型：\n\n- **alpha.** 当用户编辑或改变应用状态时，让视图淡入或淡出。\n- **frame.**\
  \ 在两个点之间平滑移动，以在屏幕上添加或移除信息。\n- **transform.** 通过改变仿射变换矩阵，实现数据的旋转、缩放和翻转。\n- **backgroundColor.**\
  \ 柔和地改变视图背景色，以指示状态变化。\n\n\n\n动画是在 *block* 中完成的。一个 block 是一组同时执行的动画属性变化。在 block 的开始和结束之间对视图属性的更改会同时生效，为用户提供流畅的体验。动画\
  \ block 还可以简化你的代码。\n\n**172**\n\n*iPhone App 开发：缺失的手册*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**完善外观**\n\n***提示：*** 没有什么能阻止你同时更改视图的 `alpha`、`frame` 和 `backgroundColor`。只需记住，最佳动画是那些起到微妙提示作用的动画。从“大锤设计学院”毕业的人只会打动他们自己，而不是客户。\n\
  \n`lightView` 只动画化一个属性：用作虚拟手电筒灯泡的背景颜色。所有工作都在私有方法 `-updateBackgroundColor` 中完成。\n\
  \n你通过 `UIView` 的类方法 `+beginAnimations:context:` 来开始一个动画 block：\n\n```\n- (void)updateBackgroundColor\
  \ {\n    [UIView beginAnimations:@\"updateLightView\" context:NULL];\n```\n\n`updateLightView`\
  \ 被委托方法用于唯一标识一个动画。对于复杂的转场效果，可能在给定时间内有多个动画同时发生，因此能够正确选择动画非常重要。\n\n每个动画允许你设置各种选项。对于\
  \ `lightView`，如果动画已经在进行中，当前颜色将是新颜色的起点：\n\n```\n[UIView setAnimationBeginsFromCurrentState:YES];\n\
  ```\n\n视图动画的其他属性包括重复次数、完成后是否反转，以及一些控制时间等其他属性。\n\n`lightView` 使用最常用的属性之一：动画持续时间。如果灯亮着，使用\
  \ `envelopeAttack` 实例变量中指定的时间来控制从当前颜色切换到新颜色所需的时长：\n\n```\nif (self.state == LightViewStateOn\
  \ || self.state == LightViewStatePulse)\n{\n    [UIView setAnimationDuration:self.envelopeAttack];\n\
  \    [self setBackgroundColor:self.color withBrightness:self.brightness];\n}\n```\n\
  \n如果灯的状态为关闭，则 `envelopeRelease` 变量被用作 `animationDuration`，同时将背景颜色设置为黑色：\n\n```\n\
  else {\n    [UIView setAnimationDuration:self.envelopeRelease];\n    self.backgroundColor\
  \ = [UIColor blackColor];\n}\n```\n\n配置完视图动画后，使用 `-commitAnimations` 类方法来启动动画：\n\
  \n```\n[UIView commitAnimations];\n}\n```\n\n结果是，`lightView` 会在颜色和状态之间平滑过渡。得益于视图动画，这个视图看起来、用起来都像真正的灯泡。\n\
  \n第 6 章：专业手电筒\n\n**173**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  **完善外观**\n\n当教程讲到 category 和 `SettingsViewController` 时（第 201 页），你将看到更多动画 block。一旦你熟悉了它们的工作原理，它们就能为你的应用程序增色不少。只需记住，过犹不及。\n\
  \n## IFInfoView\n\nFlashlight Pro 项目中的另一个自定义视图是用于在屏幕顶部显示状态的视图。与依赖 `backgroundColor`\
  \ 属性来显示自身的 `LightView` 不同，`IFInfoView` 进行自定义绘图。在本节中，你还会学习如何设置该视图并正确命名。\n\n### 命名\n\
  \n为什么视图类名要以 `IF` 开头？难道不能像 `LightView` 那样直接叫 `InfoView` 吗？\n\n是的，你可以。但你是懒程序员。而且你对未来有远见……\n\
  \n总有一天，这个信息视图可能会在其他项目中有用。很多应用都需要时不时地显示状态，这代码就是实现这一点的好办法。\n\n你很可能想要重用这段代码。\n\n如果你试图将这个类放入一个已经存在\
  \ `InfoView` 的项目中，就会遇到命名冲突。由于 Objective-C 没有命名空间，你必须通过一些方式来模拟它。\n\n\n\n# 代码类命名与冲突避免\n\
  \n正如框架使用`*NS*`和`*UI*`（第 33 页）等前缀来避免冲突一样，你可以添加自己的前缀来使类名唯一。以下代码来自 Iconfactory，因此它使用标准`*IF*`前缀。这隐式保证了该公司中不会再有其他类使用相同名称。\n\
  \n通过这种机制，Iconfactory 可以在自己的项目中使用这些代码，你也可以在你的项目中使用。当然，命名空间会是更优雅的解决方案，但在实践中，这种君子协定运作得相当不错。\n\
  \n**提示：** 如果你发现自己遇到了类名冲突，务必查看 Xcode 的`Refactor`工具。它能够轻松地更改整个项目中类名（包括在 NIB 文件中）。你还可以用它来更改实例变量名称以及类的其他属性。要在\
  \ Xcode 中使用此功能，请在源代码编辑器中选择类名，然后选择`Edit`➝`Refactor`。\n\n# 视图设置\n\n你可以通过两种方式创建任何对象：使用\
  \ NIB 文件，或者使用`*–init*`方法。对于视图类来说尤其如此。\n\n**174**\n\niPhone App 开发：缺失手册\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**完善外观**\n\n在这两种情况下，你很可能需要编写一些代码来将实例变量设置为有效状态。对于这个视图，默认会显示一个信息图标。你可以在`*–initWithFrame:*`和`*–awakeFromNib*`方法中执行此设置，但随着视图变得越来越复杂并添加更多实例变量，这种重复的代码将变得难以管理和同步。\n\
  \n解决方案是创建一个`*–setupView*`方法，可以在两个实例中调用：\n\n```\n- (void)setupView {\n    type =\
  \ IFInfoViewTypeInformation;\n    self.backgroundColor = [UIColor clearColor];\n\
  }\n\n- (id)initWithFrame:(CGRect)frame {\n    if (self = [super initWithFrame:frame])\
  \ {\n        [self setupView];\n    }\n    return self;\n}\n\n- (void)awakeFromNib\
  \ {\n    [self setupView];\n}\n```\n\n这确保了`backgroundColor`完全透明，并且无论视图是通过代码创建还是从\
  \ NIB 读取，都会设置默认类型。\n\n# 在代码中绘制\n\n这个类的核心在于`*–drawRect:*`方法。每当`IFInfoView`需要更新并显示在屏幕上时，都会调用这个方法。\n\
  \n在大多数情况下，这种绘制是通过`UIView`父类中的`*–setNeedsDisplay*`方法触发的。例如，当`type`属性发生更改时，你希望看到一个新图标，因此将视图标记为需要显示：\n\
  \n```\n- (void)setType:(IFInfoViewType)newType {\n    if (newType != type) {\n \
  \       type = newType;\n        [self setNeedsDisplay];\n    }\n}\n```\n\n现在你知道了触发绘制的原因，是时候看看`*–drawRect:*`方法中的代码了。\n\
  \n第 6 章：专业手电筒应用\n\n**175**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**完善外观**\n\n**提示：** 在开始编写大量使用`*–drawRect:*`的自定义绘制代码之前，尝试使用基本的视图层次结构。这个类本可以实现为`UIImageView`，包含一个背景图像和两个子视图。子视图将使用`UILabel`绘制文本，并使用另一个`UIImageView`绘制图标。\n\
  \n# 颜色填充\n\n最基本的操作之一是标准颜色填充。首先，选择你想要填充的颜色：\n\n```\nUIColor *fillColor = nil;\nif\
  \ (self.type == IFInfoViewTypeAlert) {\n    fillColor = [UIColor colorWithRed:0.6f\
  \ green:0.0f blue:0.0f alpha:1.0f];\n} else {\n    fillColor = [UIColor colorWithRed:0.0f\
  \ green:0.0f blue:0.0f alpha:0.60f];\n}\n```\n\n如果信息类型是告警，则选择纯 60%红色；否则选择不透明度为 60%的黑色。选择好颜色后，必须调用其`*–set*`方法，以便在后续绘制操作中使用：\n\
  \n```\n[fillColor set];\n```\n\n剩下要做的就是填充正在绘制的矩形：`UIRectFill(rect);`\n\n# 渐变\n\n\
  现在，我们将从最简单的绘制操作之一过渡到最复杂的操作之一——你将在纯色之上绘制渐变。\n\n\n\n# 绘制渐变与图形\n\n为此，你需要使用 `CoreGraphics`。该框架包含了用于在\
  \ iPhone 上绘图的所有底层 API。当你使用任何以 `CG` 开头的定义时（特别是 `CGRect`（第 158 页）），就已经接触过这个框架了。\n\n\
  要开始绘制渐变，你需要一个颜色数组：\n\n```\nUIColor *startColor = [UIColor colorWithRed:1.0f green:1.0f\
  \ blue:1.0f alpha:0.45f];\nUIColor *endColor = [UIColor colorWithRed:1.0f green:1.0f\
  \ blue:1.0f alpha:0.10f];\nCGColorRef colors[] = { [startColor CGColor], [endColor\
  \ CGColor] };\nCFArrayRef colorsArrayRef = CFArrayCreate(NULL, (const void **)colors,\
  \ 2, NULL);\n```\n\n渐变使用的颜色是白色，只有透明度发生变化。它从 45% 开始，到 10% 结束（即 55% 和 90% 的透明度）。这两个值都被放入一个\
  \ `CoreGraphics` 颜色引用数组中。\n\n**注意：** 你使用数组是因为可以在渐变中指定任意数量的颜色。你还可以指定颜色应用的点。\n\n下一步是使用这些颜色以及颜色空间引用，并创建渐变规范的引用：\n\
  \n```\nCGColorSpaceRef colorSpaceRef = CGColorSpaceCreateDeviceRGB();\nCGGradientRef\
  \ gradientRef = CGGradientCreateWithColors(colorSpaceRef, colorsArrayRef, NULL);\n\
  ```\n\n现在你已经定义了渐变，可以在当前图形上下文中绘制它。图形上下文定义了整个 2D 绘图环境：`UIKit` 提供了 `UIGraphicsGetCurrentContext()`\
  \ 函数，以便你可以与绘制视图的系统代码共享该环境：\n\n```\nCGContextRef contextRef = UIGraphicsGetCurrentContext();\n\
  CGContextDrawLinearGradient(contextRef, gradientRef, CGPointMake(0.0f, 0.0f), CGPointMake(0.0f,\
  \ CGRectGetMidY(rect)), 0);\n```\n\n渐变是从视图的顶部绘制到其矩形的中间。\n\n**提示：** 许多便捷函数允许你创建和查询\
  \ Core Graphics 数据结构。在上面的示例中，你看到了 `CGPointMake()` 和 `CGRectGetMidY()`。还有像 `CGRectMake()`\
  \ 和 `CGRectGetMinX()` 这样的函数。\n\n最后一步非常重要。`Core Graphics` 创建的引用会分配内存，因此你需要显式释放该内存（第\
  \ 43 页）：\n\n```\nCFRelease(colorsArrayRef);\nCGGradientRelease(gradientRef);\nCGColorSpaceRelease(colorSpaceRef);\n\
  ```\n\n由于视图绘制往往会重复进行，因此在执行屏幕更新时发生内存泄漏会严重影响你的应用。\n\n呼！那个渐变挺难的。接下来会稍微容易一些。\n\n## 混合绘制与线条\n\
  \n另一种常见的绘图类型是*混合*。它通常用于使图像的一部分变亮或变暗，以指示某种状态（如选中状态）。另一种用途，如信息视图中使用的（第 175 页），是突出边缘并提供额外的对比度。\n\
  \n矩形的顶部使用 20% 白色变亮，代码如下：\n\n```\nlineRect = CGRectMake(0.0f, 0.0f, rect.size.width,\
  \ 1.0f);\n[[UIColor colorWithRed:1.0f green:1.0f blue:1.0f alpha:0.20f] set];\n\
  UIRectFillUsingBlendMode(lineRect, kCGBlendModeLighten);\n```\n\n这个函数的工作原理类似于你在第\
  \ 176 页看到的 `UIRectFill()`，但它添加了一个混合模式作为第二个参数。相同的绘图函数用于矩形的底部。请注意，当混合模式为 `kCGBlendModeDarken`\
  \ 时，你设置的是透明度为 30% 的黑色。这段代码还展示了一个绘制水平和垂直线的简单技巧：只需定义一个高度或宽度为 1 像素的矩形。\n\n## 伟大的路径\n\
  \n那么，如果你要绘制的线条不是垂直或水平线怎么办？或者如果你想绘制矩形区域以外的形状呢？Core Graphics 来救场！\n\n使用该框架绘制“线条”是一个相当复杂的操作。这是有充分理由的：所使用的机制并不仅限于线条。你可以绘制圆形和其他椭圆体。或者你可以绘制源自贝塞尔路径的复杂形状。\n\
  \n这种绘图操作基于*路径*。路径可以被描边以生成形状的轮廓，或者被填充以生成实心形状。路径是增量式生成的：你移动到某点，向另一点添加一条线，附加一条曲线，依此类推。\n\
  \n以下是在矩形底部绘制线条的代码：\n\n```\nlineRect.origin.y = rect.size.height - 1.0f;\n[[UIColor\
  \ colorWithRed:0.0f green:0.0f blue:0.0f alpha:0.30f] set];\nUIRectFillUsingBlendMode(lineRect,\
  \ kCGBlendModeDarken);\n```\n\n要使用路径做同样的事情，你需要先创建它：\n\n```\nCGMutablePathRef pathRef\
  \ = CGPathCreateMutable();\n```\n\n然后添加线条的两个端点：\n\n```\nCGPathMoveToPoint(pathRef,\
  \ NULL, 0.0f, rect.size.height - 0.5f);\nCGPathAddLineToPoint(pathRef, NULL, rect.size.width,\
  \ rect.size.height - 0.5f);\n```\n\n此时你可以进行任何类型的绘图。如果你正在绘制圆角矩形，可以使用 `CGPathAddArc()`。要绘制贝塞尔曲线，则使用\
  \ `CGPathAddQuadCurveToPoint()`。你还可以向路径添加矩形和其他几何形状。\n\n一旦完成路径的构建，就关闭它：\n\n```\n\
  CGPathCloseSubpath(pathRef);\n```\n\n下一步是设置图形上下文以供绘图。设置混合模式以及线条的颜色和宽度：\n\n```\n\
  CGContextSetBlendMode(contextRef, kCGBlendModeDarken);\n[[UIColor colorWithRed:0.0f\
  \ green:0.0f blue:0.0f alpha:0.30f] set];\nCGContextSetLineWidth(contextRef, 1.0f);\n\
  ```\n\n然后将路径添加到当前图形上下文。上下文随后可以使用该路径进行后续绘图操作：\n\n```\nCGContextAddPath(contextRef,\
  \ pathRef);\n```\n\n最后，通过告诉图形上下文描边路径来绘制线条：\n\n```\nCGContextStrokePath(contextRef);\n\
  ```\n\n之后请务必清理。路径使用的内存必须释放，混合模式也应恢复为默认状态：\n\n```\nCGPathRelease(pathRef);\nCGContextSetBlendMode(contextRef,\
  \ kCGBlendModeNormal);\n```\n\n这比你开始时那三行代码要多很多工作，但它提供了更多的灵活性。当你需要绘制比线条或矩形更复杂的图形时，这就是正确的方法。\n\
  \n## 半像素的重要性\n\n请务必注意绘图时使用的坐标。许多开发者都曾被 Core Graphics 的精度问题绊倒。当你绘制一条 1 像素的线条时，该线条的一半位于指定坐标之上，另一半位于其下（图\
  \ 6-8）。\n\n**图 6-8：** 在整数坐标处绘制的线条不会如你所期望的那样显示。当你指定 44.0 作为垂直坐标时，一半的线条会绘制在上方，一半在下方（A）。该线条分布在\
  \ 2 个像素上，失去了颜色定义并变得模糊（B）。解决方案是减去一半线宽并在 43.5 处绘制（C）。\n\n例如，如果你指定一条宽度为 1.0 且水平坐标为\
  \ 44.0 的线条，则绘制出的线条顶部在 43.5，底部在 44.5。由于 Core Graphics 使用抗锯齿来平滑线条，它会将单一颜色的线条平分到 2\
  \ 个像素上。这会导致线条模糊，失去颜色定义。\n\n为了补偿，在定义点时所使用的高度要减去一半线宽，从而得到一条精确跨越第 44 像素的线条。\n\n**注意：**\
  \ 这种模糊绘制也可能在你计算视图矩形时发生。与线条一样，偏移了半像素的矩形看起来会不正确，并且很难清楚为什么会发生这种情况。\n\n\n\n# 排版后内容\n\
  \n例如，如果你使用 `CGRectGetMidY()` 函数来计算一个具有偶数高度的矩形的中点，你会得到一个带小数的结果。在这种情况下，请使用 `floorf()`\
  \ 数学函数将结果限定为整数值。在几乎所有情况下，矩形原点和尺寸都应使用整数，即使它们被定义为浮点值。\n\n## 文本绘制\n\n在信息视图中接下来要绘制的是消息文本。为了与工具栏的样式相匹配，字符串将带有\
  \ 1 像素的阴影进行绘制，使其看起来像是蚀刻在渐变创建的曲面上。\n\n在绘制文本之前，你需要确定其大小。为此，你需要知道绘制所用的字体：\n\n```\n\
  UIFont *font = [UIFont systemFontOfSize:17.0f];\n```\n\n这段代码让你获得 17 磅的 Helvetica\
  \ 字体。`UIFont` 也有获取系统字体粗体或斜体版本的方法。如果你想绘制自定义文本，也可以通过名称获取字体。\n\n一旦你有了字体，就需要指定用于绘制文本的区域。由于你希望消息在图标预留\
  \ 44 像素的边距后适应矩形的宽度，你可以像这样定义尺寸约束：\n\n```\nCGSize constrainedSize = CGSizeMake(rect.size.width\
  \ - iconOffset, 9999.0f);\n```\n\n第二个参数是一个很大的值，因为你关心的是计算出的高度，所以实际上在这个维度上没有约束。要计算文本的高度，请使用一个\
  \ `NSString` 的 UIKit 类别，其中包含 `-sizeWithFont:constrainedToSize:` 方法：\n\n```\nCGSize\
  \ textSize = [self.message sizeWithFont:font\n                         constrainedToSize:constrainedSize];\n\
  ```\n\n接着，这被用来找到一个在视图高度中居中文本的新矩形：\n\n```\nCGRect textRect = CGRectMake(iconOffset,\n\
  \                    (CGRectGetMidY(rect) - (textSize.height / 2.0f)) - 1.0f,\n\
  \                    rect.size.width - iconOffset,\n                    textSize.height);\n\
  ```\n\n现在数学计算完成了，你可以实际绘制文本了。如果你仔细观察，可能会想知道为什么计算中会出现那个 `-1.0`。原因在于你要使用一个小技巧来绘制文本的阴影：你将绘制它两次。\n\
  \n第一次绘制时，你使用深色，并在正常文本上方偏移 1 个像素。\n\n**180**\n\niPhone 应用开发：缺失手册\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**优化外观**\n\n***提示：*** 如果你想为复杂形状或其他类型的绘图添加阴影，可以使用 `CGContextSetShadow()` 函数结合当前图形上下文。\n\
  \n**高级用户课堂**\n\n**让你的矩形变圆角**\n\n路径也可以用于在绘制时进行裁剪。一个常见的用途是在绘制具有方形角的图像时显示圆角。\n\n使用这种技术，你可以通过由角上的弧线连接的直线来构建路径：\n\
  \n```\n#include <math.h> // 用于 M_PI\n\n#define MIN(A,B) ((A) < (B) ? (A) : (B))\n\
  \nCGFloat DegreesToRadians(CGFloat degrees)\n{\n    return degrees * M_PI / 180;\n\
  }\n\nCGPathRef RoundedRectPath(CGRect rect,\n                          CGFloat radius)\
  \ {\n    CGMutablePathRef pathRef =\n        CGPathCreateMutable();\n    radius\
  \ = MIN(radius, 0.5f *\n        MIN(CGRectGetWidth(rect),\n            CGRectGetHeight(rect)));\n\
  \    CGRect insetRect = CGRectInset(rect,\n                                   radius,\
  \ radius);\n    \n    // 左上角\n    CGPathAddArc(pathRef, NULL,\n        CGRectGetMinX(insetRect),\n\
  \        CGRectGetMinY(insetRect), radius,\n        DegreesToRadians(180.0),\n \
  \       DegreesToRadians(270.0), false);\n    \n    // 右上角\n    CGPathAddArc(pathRef,\
  \ NULL,\n        CGRectGetMaxX(insetRect),\n        CGRectGetMinY(insetRect), radius,\n\
  \        DegreesToRadians(270.0),\n        DegreesToRadians(360.0), false);\n  \
  \  \n    // 右下角\n    CGPathAddArc(pathRef, NULL,\n        CGRectGetMaxX(insetRect),\n\
  \        CGRectGetMaxY(insetRect), radius,\n        DegreesToRadians(0.0),\n   \
  \     DegreesToRadians(90.0), false);\n    \n    // 左下角\n    CGPathAddArc(pathRef,\
  \ NULL,\n        CGRectGetMinX(insetRect),\n        CGRectGetMaxY(insetRect), radius,\n\
  \        DegreesToRadians(90.0),\n        DegreesToRadians(180.0), false);\n   \
  \ \n    CGPathCloseSubpath(pathRef);\n    return pathRef;\n}\n```\n\n将此路径添加到图形上下文后，你可以调用\
  \ `CGContextClip()`，它将在绘制图像时用于遮罩：\n\n```\nCGPathRef pathRef =\n    RoundedRectPath(rect,\
  \ 8.0f);\nCGContextAddPath(context, pathRef);\n```\n\n\n\n```objc\nCGContextClip(context);\n\
  \n// 右上角\n\n[myImage drawInRect:rect];\n\nCGPathAddArc(pathRef, NULL,\nCGRectGetMaxX(insetRect),\n\
  CGPathRelease(pathRef);\n```\n\n#### 第 6 章：专业级手电筒\n\n**181**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n### 优化外观\n\n要创建透明度为 50% 的深黑色：\n\n```objc\n[[UIColor colorWithWhite:0.0f alpha:0.5f]\
  \ set];\n```\n\n以下是在视图中绘制阴影文字的代码：\n\n```objc\n[self.message drawInRect:textRect\
  \ withFont:font];\n```\n\n第二次绘制文本时，将原点向下移动 1 像素，将颜色设置为白色，并使用相同的方法绘制字符：`textRect.origin.y\
  \ += 1.0f;`\n\n```objc\n[[UIColor whiteColor] set];\n[self.message drawInRect:textRect\
  \ withFont:font];\n```\n\n相当简单又巧妙，对吧？\n\n请注意，当视图的消息发生更改时，也会使用 `–sizeWithFont:constrainedToSize:`\
  \ 方法。如果文本超过一行，则会使用计算出的尺寸来调整视图的高度。\n\n### 图像绘制\n\n视图中还需要绘制最后一样东西：图标图像。第一步是从应用程序资源中读取图像：\n\
  \n```objc\nUIImage *image = nil;\nif (self.type == IFInfoViewTypeAlert) {\n    image\
  \ = [UIImage imageNamed:@\"InfoViewAlert.png\"];\n}\nelse {\n    image = [UIImage\
  \ imageNamed:@\"InfoViewInfo.png\"];\n}\n```\n\n`UIImage` 类的类方法 `+imageNamed:` 会在应用程序包中找到图像文件，并将其缓存到内存中。\n\
  \n下一步是计算图像在绘制矩形中的位置。\n\n`UIImage` 的 `–size` 方法可提供图像尺寸，随后这些尺寸用于找到一个在视图中垂直居中的矩形：\n\
  \n```objc\nCGRect imageRect = CGRectZero;\nimageRect.size = [image size];\nCGRect\
  \ drawRect = CGRectMake(CGRectGetMidX(imageRect),\n                            \
  \ CGRectGetMidY(rect) - CGRectGetMidY(imageRect),\n                            \
  \ imageRect.size.width, imageRect.size.height);\n```\n\n要让图像显示在视图中，你只需向 `UIImage`\
  \ 实例发送 `–drawInRect:` 消息：\n\n```objc\n[image drawInRect:drawRect];\n```\n\n至此，视图的绘制工作就完成了，在这个过程中你学到了很多知识。恭喜！\n\
  \n**182**\n\niPhone 应用开发：缺失手册\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 打造专属 Cocoa Touch\n\n***提示：*** 在绘制视图时，最好始终基于传入的矩形来计算所有几何图形。如你所见，视图的大小可能会在你不知情的情况下发生变化。如果你对尺寸做出假设或硬编码数值，那很可能导致失败。\n\
  \n在某些情况下，使用常量值是合理的：`iconOffset` 充当了图像和信息性消息之间的间距。\n\n### 打造专属 Cocoa Touch\n\n正如你在第\
  \ 2 章中所见，Objective-C 中的类别是扩展现有类的非常强大的机制（第 38 页）。专业版手电筒有三个类别。其中两个用于使用亮度值创建和设置颜色，第三个用于在屏幕上隐藏视图。\n\
  \n#### UIColor+Brightness\n\n你要看的第一个类别是 `UIColor+Brightness`。这个类别使用了你在互联网上找到的一些代码，将其封装在\
  \ Objective-C 中，并集成到现有的 `UIColor` 类中。\n\n##### 命名规范\n\n关于这个类别，你首先注意到的是源文件的名称。\n\n\
  由于这些类别通常会在项目之间共享，因此命名规范对于避免冲突非常重要。你会发现，你自己的类别会有很高的重用率，而且你也能找到许多优秀的开源类别。\n\n按照此处使用的规范，名称派生自被扩展的类和类别名。对于这个类别，`@interface`\
  \ 定义为：\n\n```objc\n@interface UIColor (Brightness)\n```\n\n因此，其文件名称为 `UIColor+Brightness`。如果类别名是“(Chockolicious)”，那么文件名就会变为\
  \ `UIColor+Chockolicious`。\n\n***注意：*** 有些开发者使用破折号而不是加号作为分隔符。分隔符实际上并不重要；重要的是原始类和类别的唯一组合。\n\
  \n#### 收尾工作\n\n\n\n如果你查看`@implementation`，会看到大量在 RGB 和 HSV 色彩空间之间进行转换的 C 语言代码。（本节中的源代码来自\
  \ Alvy Ray Smith 与 Eric Ray Lyons 合著的一篇 ACM 论文。若想自行查看，可在网上搜索“converting RGB to HSV\
  \ written in C”。）\n\n## 专业级手电筒\n\n### 打造专属 Cocoa Touch\n\n这段代码说明了几个要点。首先，Objective-C\
  \ 与标准 C 语言配合得非常好。算法中的代码保持不变，仅做了风格上的调整，主要是为了让命名和格式适应新环境。\n\n另一个重要之处在于，通过 Objective-C\
  \ 封装器，这段相当复杂的代码变得更易理解。即便不查看任何文档，你也能猜出以下代码的功能：\n\n```\nCGFloat brightness = [[UIColor\
  \ orangeColor] brightness];\n```\n```\n[mySlider setValue:brightness];\n```\n```\n\
  UIColor *backgroundColor = [[UIColor redColor] colorWithBrightness:0.6f];\n```\n\
  ```\n[myView setBackgroundColor:backgroundColor];\n```\n\n当你决定使用分类时，有一行代码至关重要：\n\
  \n```\n#import \"UIColor+Brightness.h\"\n```\n\n这行代码能让编译器知晓新增的方法，并将其链接到最终的可执行文件中。如果忘记添加，构建应用时会出现“可能无法响应”的警告。\n\
  \n#### `UIView+Brightness`\n\n这个简单的 `UIView` 分类使用了你刚刚看到的 `UIColor` 分类，在设置视图背景颜色时添加了一个亮度参数。一个分类完全可以调用另一个分类：只要记得导入\
  \ `@interface`，它们的行为就与原类完全一致。\n\n#### `UIView+Concealed`\n\n作为设计的一部分，你希望信息视图和工具栏有时能移出屏幕。信息无需无限期展示，而工具栏在手电筒锁定时需要隐藏。\n\
  \n你本可以通过向 `IFInfoView` 添加方法并创建 `UIToolbar` 的子类来实现这些功能。但你的做法更聪明！\n\n##### 新增属性\n\n\
  你本可以使用 `UIView` 现有的 `hidden` 属性来切换视图的可见性。不过这种做法不够优雅，也无法让用户感知到信息的短暂性。在隐藏视图的过程中加入一点动画效果，就能同时解决这两个问题。\n\
  \n这个 `UIView` 分类为任意视图添加了一个 `conceal` 属性。这种做法的精妙之处在于，当发现 Bug 或需要添加新的隐藏功能时，只需修改一次代码，而无需在两个或更多视图中分别改动。\n\
  \n`UIView+Concealed` 分类为视图添加了一个新属性。你可以通过 `-setConcealed:` 方法让视图以动画形式移入或移出屏幕。同样，你也可以使用\
  \ `-isConcealed` 消息检查视图是否可见。\n\n> **注意：** 分类无法为类添加实例变量。在大多数情况下，属性会引用这些变量之一，但这并非强制要求。属性仅定义了访问类内部某些数据的协议。\n\
  \n该分类利用现有的 `frame` 属性（以及 `UIView` 实例变量）来判断视图是否在屏幕上。\n\n例如，控制器可以通过这个新属性来切换视图的隐藏状态：\n\
  \n```\nmyView.concealed = ! myView.isConcealed;\n```\n\n控制器只需在实现文件顶部添加这一行代码：\n\n\
  ```\n#import \"UIView+Concealed.h\"\n```\n\n##### 视图坐标\n\n当你隐藏视图时，实际上是在改变它在父视图中的坐标。在了解移动视图的代码之前，你需要先花点时间理解\
  \ Cocoa Touch 中的视图坐标系。\n\n实际上，在本教程的开头部分你就已经接触过这个坐标系了。在学习 `Flashlight_ProAppDelegate`\
  \ 时，你看到了这行代码：\n```\nCGRect applicationFrame = [[UIScreen mainScreen] applicationFrame];\n\
  ```\n如果你当时充满好奇，可能还查阅过 `UIScreen` 的文档，发现该类中只有另一个方法：`-bounds`。在本章中，你也反复看到术语 `frame`。简单来说，`bounds`\
  \ 定义了子视图 `frame` 所处的坐标系（见图 6-9）。\n\n\n`[[UIScreen mainScreen] bounds]`  \n(0,0)\n\
  \n```\n[[UIScreen mainScreen] applicationFrame]\n```\n\n> **图 6-9：** iPhone 屏幕的\
  \ `bounds`，括号内为坐标值，其原点为 (0,0)，宽度为 320，高度为 480。`frame` 位于这些 bounds 之内，其原点和高度相对于 bounds\
  \ 分别偏移了 20 像素。frame 的数值以方括号标示。\n\n以下是使用 `UIScreen` 的 `-applicationFrame` 和 `-bounds`\
  \ 的示例。如你所知，iPhone 的屏幕分辨率为 320 × 480 像素。因此，当你查询 `-bounds` 方法时，`UIScreen` 会返回一个具有这些尺寸的矩形。\n\
  \n然而，由于状态栏的存在，你的应用无法使用所有这些像素。`-applicationFrame` 方法会返回一个基于 bounds 的 frame 矩形。该 frame\
  \ 用于将你的第一个视图放置在窗口中。\n\n在 iPhone 应用中，你很可能不会只有一个视图。这没问题，因为当你设置视图的 frame 时，实际上也是在设置其初始的\
  \ bounds。当你将第一个视图的 frame 尺寸设置为 320 × 460 时，你也同时设置了 bounds。\n\n如果你觉得这像是在重复数据，没错，确实如此。但这是有充分理由的：新的\
  \ bounds 的原点为 (0,0)，专门用于放置子视图。这些子视图无需了解父视图的任何 frame 信息。这种情况可能有些令人困惑，因此图 6-10 提供了一张图片，希望能胜过千言万语。\n\
  \n> **图 6-10：** 这张图展示了三个视图 A、B、C 如何通过 frame 和 bounds 坐标放置在屏幕上。视图 A 的 bounds 为 300\
  \ × 400，子视图 B 的 frame 尺寸为 200 × 250，原点位于 (50, 100)。当你指定子视图 C 的位置时，需要使用视图 B 的 bounds，即\
  \ 200 × 250。\n\n请注意，图中的视图 C 完全不知道父视图 B 的 frame 设置为何值，也不知道视图 B 的 bounds 是多少。拥有 frame\
  \ 和 bounds 这样两套坐标系，使得视图 C 只需关心其 frame 在父视图 B 的 bounds 内的位置即可。\n\n> **注意：** 在大多数情况下，bounds\
  \ 和 frame 坐标之间存在一一对应关系。bounds 中的一个像素与 frame 中的一个像素是相同的。为什么要自找麻烦去更改它呢？\n\n更改 bounds\
  \ 可以对视图进行缩放：如果将 bounds 的尺寸减半，同时保持子视图 frame 的尺寸不变，那么该子视图的实际显示尺寸也会减半。类似地，更改 bounds\
  \ 的原点会移动所有子视图。要查看效果，请将 `Flashlight_ProAppDelegate` 中的 `#if` 从 0 改为 1：\n\n```\n.\
  \ . .\nmainViewController.view.frame = applicationFrame;\nCGRect funkyBounds = mainViewController.view.bounds;\n\
  funkyBounds.origin = CGPointMake(-10.0f, 10.f);\nfunkyBounds.size.width /= 2.0f;\n\
  funkyBounds.size.height /= 2.0f;\nmainViewController.view.bounds = funkyBounds;\n\
  . . .\n```\n\n这段测试代码也能让你更清楚地看到视图隐藏的工作机制。\n\n#### 更多视图动画\n\n\n\n在`LightView`类中，您看到了一些改变背景颜色的基础动画。在本部分中，您将看到更多动画代码。这次用它来移动视图的框架，使其平滑地滑入和滑出屏幕。\n\
  \n既然您已经是视图框架和父视图（第 162 页）的专家，您可以了解`-isConcealed`属性是如何实现的：\n\n```\nCGRect superviewBounds\
  \ = self.superview.bounds;\nCGRect viewFrame = self.frame;\n\nif (viewFrame.origin.y\
  \ >= superviewBounds.size.height) {\n    // view is below the superview’s frame\n\
  \    result = YES;\n}\nelse if (viewFrame.origin.y < superviewBounds.origin.y) {\n\
  \    // view is above the superview’s frame\n    result = YES;\n}\n```\n\n如果视图的框架位于其父视图边界之上或之下，则视为被隐藏。类似地，`-setConcealed:animated:duration:`使用`superviewBounds`来计算新的`viewFrame`，根据`concealed`参数，该框架要么在屏幕上，要么在屏幕外。\n\
  \n但是什么让框架平滑移动呢？是结尾的这段小代码：\n\n```\nif (animated)\n{\n    [UIView beginAnimations:@\"\
  updateConcealedView\" context:NULL];\n    [UIView setAnimationDuration:duration];\n\
  }\nself.frame = viewFrame;\nif (animated)\n{\n    [UIView commitAnimations];\n}\n\
  ```\n\nUIKit 中的许多方法都使用`animated`参数。动画虽然酷，但在初始化视图时并非最佳方案。如果启动代码需要 1/3 秒，会让应用感觉笨拙，因此在视图控制器的`-viewDidLoad`方法中调用此代码可以解决问题：\n\
  \n```\n[self.myView setConcealed:YES animated:NO];\n```\n\n**188**\n\niPhone App\
  \ Development: The Missing Manual\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**让 Cocoa Touch 成为你自己的**\n\n*渐进方法*\n\n此类类别中的方法定义也展示了 Objective-C 开发者使用的另一种常见技术。方法是渐进定义的。完成所有工作的方法是`-setConcealed:animated:duration:`，如果您想显式指定每个参数，可以使用此方法。\n\
  \n然而，在大多数情况下，默认设置就足够了，因此您只需发送`-setConcealed`消息（或使用`concealed`属性）。而且，如上所述，您可以使用`-setConcealed:animated:`方法进行快速初始化。\n\
  \n***提示：** 这种方法在概念上类似于 C++中的默认参数。*\n\n*一个新特性*\n\n您还记得使用类别进行隐藏（第 185 页）如何让您轻松地为所有视图添加新功能吗？`-concealAfterDelay:`方法就是一个完美的例子。\n\
  \n在添加了管理视图位置的方法后，您发现在视图控制器中做大量工作来管理隐藏是一件麻烦事。一直调用`-setConcealed`很痛苦。\n\n经过两个方法和八行代码，您得到了这个解决方案：\n\
  \n```\n- (void)conceal {\n    self.concealed = YES;\n}\n\n- (void)concealAfterDelay:(NSTimeInterval)delay\n\
  {\n    [NSObject cancelPreviousPerformRequestsWithTarget:self\n                \
  \                            selector:@selector(conceal) object:nil];\n    [self\
  \ performSelector:@selector(conceal) withObject:nil afterDelay:delay];\n}\n```\n\
  \n当您向视图发送带延迟的`-concealAfterDelay:`消息时，该视图会在指定时间过后自动隐藏。现在您的视图控制器可以这样做：\n\n```\nself.myView.concealed\
  \ = NO;\n[self.myView concealAfterDelay:3.0f];\n```\n\n该控制器依赖于`NSObject`中一个非常酷的方法，它允许您调用一个选择器并向其传递一个对象。这两行代码在功能上是相同的：\n\
  \n```\n[myObject myMethod:myParameter];\n[myObject performSelector:@selector(myMethod:)\
  \ withObject:myParameter];\n```\n\nChapter 6: A Flashlight for Pros\n\n**189**\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**塑造你的模型**\n\n这本身就很巧妙。您可以使用此技术在运行时（而不仅仅是编译时）分派消息。但更令人印象深刻的是，您可以通过使用`afterDelay`参数来配置发送消息前的等待时间：\n\
  \n\n\n`[self performSelector:@selector(conceal) withObject:nil afterDelay:delay];`\
  \ 这行代码会在 `delay` 变量指定的时间（如 3 秒）后发送 `–conceal` 消息。当该消息被触发时，`concealed` 属性被设为 `NO`，视图开始隐藏自身。\n\
  \n由于这个方法可能在延迟结束前被多次调用，以下代码用于取消任何待处理的消息：\n\n```\n[NSObject cancelPreviousPerformRequestsWithTarget:self\n\
  selector:@selector(conceal) object:nil];\n```\n\n通常，如果你打算在稍后时间执行一个选择器，应该先取消任何已存在的待执行请求。如果没有任何待执行请求，取消消息会被忽略。\n\
  \n## 装饰你的模型\n\n现在，你已经探索了 Flashlight Pro 的视图，是时候看看为应用提供数据的模型了。\n\n你可能会想：“数据？对于一个手电筒应用来说？”\n\
  \n是的！数据有多种形式：手电筒的模型让你能够跟踪灯光设置，并构建一个控制 SOS 闪烁器的状态机。这不是传统意义上的数据，但它仍然是你要从控制器中分离出来的信息。\n\
  \n### SOSModel\n\n当你发送 SOS 信号时，你处理的是一个随时间变化的点划序列。本质上，你是在操作一个状态机。由于模型的功能之一是管理内部逻辑和行为，这使得求救信号成为这类对象的理想候选。\n\
  \n该模型的接口很简单：一个 `unitInterval` 属性让你定义点或划的时长（划被定义为点的三倍长）。还有一个方法让你查询当前元素。\n\n通过调用 `–send`\
  \ 方法来启动状态机运行。\n\n#### 通知\n\n启动状态机运行后，你如何知道何时从点切换到划？你可以轮询 `element` 参数，但你知道在事件驱动的环境中轮询值更新是非常糟糕的做法。而\
  \ Cocoa Touch 正是一个高度事件驱动的环境。\n\n解决方案是依赖通知。如你在第 97 页所见，通知让你能够以结构化方式向对象分发信息。所以对于 SOS\
  \ 模型也采用这种方式。以下是 `@interface` 中定义的通知名称：`extern NSString *const SOSModelElementChangedNotification;`\n\
  \n其在 `@implementation` 中有对应的定义：`NSString *const SOSModelElementChangedNotification\
  \ = @″SOSModelElementChangedNotification″;`\n\n当状态机前进时，会发布该通知，以便任何感兴趣的视图控制器可以更新其视图：\n\
  \n```\n- (void)update {\n    [self advance];\n    [[NSNotificationCenter defaultCenter]\n\
  \        postNotificationName:SOSModelElementChangedNotification object:self];\n\
  \    [self performSelector:@selector(update) withObject:self\n               afterDelay:[self\
  \ duration]];\n}\n```\n\n在本章稍后经过 `MainViewController` 类时，你将看到它如何处理该通知。\n\n***注意：***\
  \ 这个类的设计与你处理通过 Internet 加载数据的网络刷新非常相似。不是使用 `–send`，而是实现 `–refresh`，它使用 `NSURLConnection`\
  \ 异步加载数据。当数据通过该连接加载完成时，你会发送一个 `refreshdidfinish` 通知，以便任何注册的视图控制器可以使用新数据更新其视图。\n\n\
  #### 私有属性\n\n类扩展也可以用于定义私有属性。你可以享受 Objective-C 自动创建访问器方法的好处，而不必暴露内部数据。\n\n`SOSModel`\
  \ 使用一个整型实例变量来维护状态。令人意外的是，这个变量名为 `state`，并在 `@interface` 中定义：`NSUInteger state;`\n\
  \n注意头文件中没有 `@property` 定义。你会在 `@implementation` 上方的类扩展中找到它：\n\n```\n@interface SOSModel\
  \ ()\n@property (nonatomic, assign) NSUInteger state;\n...\n@end\n```\n\n此时，你可以像使用外部定义的属性一样使用\
  \ `state` 属性。并且可以确信，类的客户端不会乱动你的内部数据。\n\n### FlashlightModel\n\n你可以使用手电筒模型来持久化应用的状态。当前的亮度、闪烁速度、颜色和灯光模式都可以通过属性和方法访问。每当你在模型中更改这些值之一时，它会立即保存到用户的设置数据库中。\n\
  \n该模型还提供了一个小的颜色数据库。例如，可以检索到一个 `UIColor` 实例及其用于用户界面的本地化名称。\n\n#### 只读属性\n\n如你在 191\
  \ 页所见，在某些情况下，防止其他对象窥探你的数据是一个好主意。同样，在某些情况下，你愿意暴露状态，但不希望它被修改。在这些情况下，你会使用只读属性。\n\n\
  `@interface` 中的 `currentColorIndex` 正是这样做的：\n\n`@property (nonatomic, readonly)\
  \ NSUInteger currentColorIndex;`\n\n现在你有一个小问题。你可以读取该属性，但不能写入它。如果你尝试使用 `self.currentColorIndex\
  \ = 0`，会得到一个编译错误。\n\n类扩展又来救场了！你可以在实现文件中重写属性定义：\n\n```\n@interface FlashlightModel\
  \ ()\n@property (nonatomic, assign) NSUInteger currentColorIndex;\n...\n@end\n```\n\
  \n这样你的 `@implementation` 可以写入该属性，但任何使用你的 `@interface` 的人都只能读取它。\n\n#### 类静态变量\n\n\
  在第 100 页，你看到了如何使用类静态变量实现单例模式。手电筒模型对此做了一个细微的变体。类静态变量用于保存颜色名称和值的数组：\n\n```\n+ (NSArray\
  \ *)colors {\n    static NSArray *colors = nil;\n    if (colors == nil) {\n    \
  \    colors = [[NSArray alloc] initWithObjects: ...\n```\n\n第一次使用 `+colors` 类方法时，数组被分配并在应用的生命周期内保持。\n\
  \n***提示：*** 你可以使用类静态变量来加速应用的某些部分。如果你有一个频繁访问的对象，并且加载该对象需要花费一些时间，你希望尽量减少实例化它的时间。\n\
  \n一个带有 `UIFont` 或 `UIImage` 的静态变量可以在绘制视图时初始化一次并重复使用。这些缓存对象有助于提高 `UITableView` 的滚动速度。请记住，你永远不会收回缓存使用的内存，所以只对小对象使用此技术。\n\
  \n类静态变量也用于存储和检索颜色信息的键：\n\n```\nstatic NSString *nameKey = @″name″;\nstatic NSString\
  \ *colorKey = @″color″;\n```\n\n这种方法允许编译器检查键类型并捕获拼写错误。如果你使用 `@″name″` 写入哈希表的数据，而用拼写错误的\
  \ `@″nane″` 来读取，你将会挠头不已。通过使用 `nameKey`，你避免了这种潜在问题。\n\n#### 用户默认设置\n\nCocoa Touch\
  \ 提供了一个用于存储用户设置的标准机制。它叫做 `NSUserDefaults`，并充当了这个模型的支柱。\n\n例如，当你向模型发送 `–setSpeed:`\
  \ 消息时，当前速度值被更新，然后通过 `–setFloat:forKey:` 方法作为浮点值存储到标准用户默认设置中：\n\n```\n- (void)setSpeed:(float)newValue\
  \ {\n    if (newValue != speed) {\n        speed = newValue;\n        [[NSUserDefaults\
  \ standardUserDefaults] setFloat:speed\n                                       \
  \         forKey:speedKey];\n    }\n}\n```\n\n\n\n当模型初始化时，会通过`–objectForKey:`检查用户默认设置，以确认是否已设定速度值。如果该方法返回`nil`值，则分配一个默认设置。否则，将通过`–floatForKey:`读取当前设置。\n\
  \n```\n- (id)init {\n    if ((self = [super init])) {\n        NSUserDefaults *userDefaults\
  \ = [NSUserDefaults standardUserDefaults];\n        . . .\n        if (! [userDefaults\
  \ objectForKey:speedKey]) {\n            speed = 0.75f;\n            [userDefaults\
  \ setFloat:speed forKey:speedKey];\n        }\n        else {\n            speed\
  \ = [userDefaults floatForKey:speedKey];\n        }\n        . . .\n    }\n    return\
  \ self;\n}\n```\n\n如果你之前没有先检查对象就直接调用`–floatForKey`，你可能会返回一个零值，并且无法判断这是因为用户的选择还是因为设置不存在。\n\
  \n由于设置存储在属性列表中，可存储的对象类包括`NSArray`、`NSDictionary`、`NSString`、`NSData`、`NSDate`和`NSNumber`（整型、浮点型和布尔值）。\n\
  \n### 用户界面中的字符串\n\n维护一个小型颜色数据库的原因之一，是将颜色值与人类可读的名称关联起来。请记住，并非所有人都阅读与你相同的语言。这就是为什么像`@\"\
  White\"`这样的简单字符串需要用本地化宏来封装：\n\n```\nNSLocalizedString(@″White″, nil)\n```\n\n每当你使用一个将在用户界面中显示的字符串值时，都应通过此技术进行本地化。这些字符串如何分配和处理，将在参观`Localizable.strings`文件时进行描述。\n\
  \n### 整合一切\n\n现在你已经了解了应用程序中的视图和模型，是时候看看控制器如何让一切协同工作。它们是连接你手电筒应用的粘合剂。\n\n你已经预览过控制器：每个包含视图的\
  \ NIB 文件都有一个对应的控制器（例如第 86 页）。当然，Xcode 创建的基本控制器没有任何实例变量或操作，也不包含任何特定于应用程序的逻辑。\n\n\
  所以，快回到车上，让参观继续吧…\n\n### MainViewController\n\n主手电筒视图的设计本身就很简单。这导致控制器虽然使用了两个模型，但只包含三个视图出口。其中两个视图是自定义的`UIView`子类。与大多数控制器一样，其关键部分在于它与视图和模型的交互方式。\n\
  \n### 深入探究：打开模拟器\n\n模拟器是一个强大的调试工具。但它有一个问题：每次构建并运行新版本的应用时，它都会被复制到一个新文件夹中。这个文件夹使用一长串十六进制数字（GUID\
  \ 格式）命名，很难定位。\n\n而你在调试时想要定位它，因为这里存储着应用程序的文档和设置。在处理模型时，定位数据的后端存储通常很有帮助。无论文件包含 SQLite\
  \ 数据库、属性列表还是纯文本文件，能够验证写入内容都至关重要。\n\n以下是一个简短的 shell 脚本，可帮助你定位应用程序数据：\n\n```\n#!/bin/sh\n\
  if [ -z \"$1\" ]; then\n    echo \"用法: $0 <app> [ Preferences | <document> ]\"\n\
  else\n    if [ \"$2\" = \"\" ]; then\n        open \"$dir/Library/Preferences\"\n\
  \    else\n        open \"$dir/Documents/$2\"\n    fi\nfi\n```\n\n将此脚本放在你的`PATH`路径下，命名为`opensim`，并赋予其可执行权限。安装完成后，你可以使用它来查找模拟器中最新加载的应用程序，并在访达中打开\
  \ Preferences、Documents 或指定文档。\n\n例如，要打开 Safety Light 应用程序当前的 Documents 文件夹，只需执行：\n\
  \n`$ opensim \"Safety Light\"`\n\n该文件夹中没有文档，但如果有的话，你可以通过以下命令打开它们：\n\n`$ opensim\
  \ \"Safety Light\" fleshy.db`  \n`$ opensim \"Safety Light\" awesome.plist`\n\n\n\
  \n你可以通过以下命令轻松进入你的偏好设置文件夹：\n\n```\nbase=~/Library/Application\\ Support/\niPhone\\\
  \ Simulator/\n$ opensim ″Safety Light″ Preferences\napps=Applications\n```\n\n如果你双击文件夹中显示的\
  \ `com.iconfactory.SafetyLight.plist` 文件，就会显示手电筒的当前设置。\n\n```\napp=`ls -1td ″$base/″*″/$apps/″*″/$1.\n\
  if [ -n ″$app″ ]; then\n```\n\n**注意：** `opensim` 脚本的副本位于 Flashlight Pro 项目的顶层目录中，因此你无需手动输入。\n\
  \n```\ndir=`dirname ″$app″`\nif [ ″$2″ = ″Preferences″ ]; then\n```\n\n### 通知\n\n\
  任何对象都可以注册接收通知，但控制器是最常使用它们的。控制器通常具备必要的逻辑，用于响应设备、模型或应用程序其他部分的状态变化。\n\n第 6 章：专业人士的手电筒\
  \  \n**195**  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 自我整合\n\n\
  主视图控制器会注册自己，以接收来自 `UIApplication` 和 `SOSModel` 的通知：\n\n```\n- (NSObject *)initWithNibName:(NSString\
  \ *)nibNameOrNil bundle:(NSBundle *)nibBundleOrNil {\n. . .\n[[NSNotificationCenter\
  \ defaultCenter] addObserver:self\nselector:@selector(elementChanged:) name:SOSModelElementChangedNotification\
  \ object:nil];\n[[NSNotificationCenter defaultCenter] addObserver:self\nselector:@selector(resignActive:)\
  \ name:\nUIApplicationWillResignActiveNotification object:nil];\n[[NSNotificationCenter\
  \ defaultCenter] addObserver:self\nselector:@selector(becomeActive:) name:\nUIApplicationDidBecomeActiveNotification\
  \ object:nil];\n. . .\n}\n```\n\n同样重要的是，当视图控制器对象被释放时，它会将自己移除为观察者：\n\n```\n[[NSNotificationCenter\
  \ defaultCenter] removeObserver:self\nname:SOSModelElementChangedNotification object:nil]\n\
  [[NSNotificationCenter defaultCenter] removeObserver:self\nname:UIApplicationWillResignActiveNotification\
  \ object:nil];\n[[NSNotificationCenter defaultCenter] removeObserver:self\nname:UIApplicationDidBecomeActiveNotification\
  \ object:nil];\n```\n\n当你使用设备上的锁定开关时，控制器中的 `–resignActive:` 和 `–becomeActive` 方法会被调用。这些方法会启动或停止闪光灯或迪斯科灯光。这是一个简单但很好的例子，说明了设备状态的变化如何导致应用程序状态的变化。\n\
  \n由 `SOSModel` 定义的通知会在模型状态每次变化时发送 `–elementChanged` 消息。此方法随后会打开或关闭灯光视图——这是一个如何将新数据传播到视图的例子。\n\
  \n### 声音\n\n`–elementChanged` 方法还会播放点或划的蜂鸣声：\n\n```\nif (sosDotBeep != 0 && sosDashBeep\
  \ != 0) {\nif (element == SOSModelElementDot) {\nAudioServicesPlaySystemSound(sosDotBeep);\n\
  }\nelse {\nAudioServicesPlaySystemSound(sosDashBeep);\n}\n}\n```\n\n**196**  \n\
  iPhone 应用开发：缺失的手册  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 自我整合\n\
  \n***提示：*** 如果你希望在播放声音时伴随振动，请使用 `AudioServicesPlayAlertSound()` 函数。\n\n`sosDotBeep`\
  \ 和 `sosDashBeep` 声音的来源如下：当使用 `–startSOS` 方法启动闪光灯时，这些声音会通过以下代码加载到内存中：\n\n```\nOSStatus\
  \ result;\nNSString *dotPath = [[NSBundle mainBundle] pathForResource:@″Dot″\nofType:@″aif″];\n\
  result = AudioServicesCreateSystemSoundID((CFURLRef)[NSURL\nfileURLWithPath:dotPath],\
  \ &sosDotBeep);\nif (result != kAudioServicesNoError)\n{\nsosDotBeep = 0;\n}\n```\n\
  \n首先，声音文件位于应用程序的 bundle 中。*Bundle* 是应用程序的代码和资源的集合。Xcode 中 Resources 组中的所有文件都会被移动到主\
  \ bundle 中。\n\n要从 bundle 中提取其中一个文件，你需要使用资源名称（`@\"Dot\"`）和类型（`@\"aif\"`）来指定文件。生成的\
  \ `dotPath` 变量随后会被转换为文件 URL 并传递给 `AudioServicesCreateSystemSoundID()` API。\n\n如果调用成功，`sosDotBeep`\
  \ 变量便可用于播放声音。\n\n\n\n***注意：*** 部分资源（尤其是图片）拥有从包中读取的自身机制。若要提取图片，你需要使用 `[UIImage imageNamed:@\"\
  xyz.png\"]`。\n\n由于声音文件会占用大量内存，因此只应在需要时加载。如果你仅在短时间内需要某个声音，可以使用 `AudioServicesDisposeSystemSoundID()`\
  \ 释放其存储空间。\n\n标准的 Xcode 模板无法访问这些声音 API；你需要先添加一个新框架，才能编译上述代码。如果你在 Xcode 中打开 Frameworks\
  \ 组，会发现 `AudioToolbox.framework` 已经被添加。\n\n## 成为代理\n\n`LightView` 类为其代理定义了一个协议。灯光视图通过该代理传递视图内点击的相关信息。视图控制器使用代理方法更改亮度并锁定视图。作为代理的第一步，它需要在接口中采纳该协议：\n\
  \n```\n@interface MainViewController : UIViewController < LightViewDelegate, UIAlertViewDelegate,\
  \ UIActionSheetDelegate>\n```\n\n`MainView.xib` 中的 `LightView` 有一个连接到 `MainViewController`\
  \ 的插座变量，因此视图知道谁将担任代理角色。剩下要做的就是实现 `–lightView:singleTapAtPoint:` 和 `–lightView:doubleTapAtPoint:`\
  \ 方法。\n\n单次点击的代理会检查 SOS 信号是否正在运行（通过控制器的一个状态变量），还会检查工具栏是否因屏幕锁定而隐藏。如果满足任一条件，点击将被忽略。\n\
  \n在确定当前亮度级别后，会选择一个新的亮度，并通过本地化字符串在信息视图中显示状态变化。\n\n双击也会检查 SOS 信号是否正在运行，如果正在运行则会忽略点击。否则，会切换工具栏的隐藏状态，并更新信息视图。\n\
  \n### 一个视图，两种身份\n\n仔细观察会发现，`LightView` 对象连接到了 `MainView.xib` 中的两个插座变量。虽然只有一个 `LightView`\
  \ 实例，但它同时被用于 `infoView` 和 `view` 属性。难道一个实例变量不够用吗？\n\n是，也不是。\n\n如果你只使用一个实例变量，就必须使用\
  \ `UIViewController` 所需的视图。如果只使用那个变量，你会因为它被定义为 `UIView` 基类而增加大量额外工作。如果尝试使用此代码，你会收到一个编译器错误：\n\
  \n```\nself.view.state = LightViewStateOn;\n```\n\n因此，你不得不编写如下代码来让编译器满意：`((LightView\
  \ *)self.view).state = LightViewStateOn;`\n\n除了违背你懒散的天性之外，这段代码简直丑陋不堪！如果你为这个对象定义第二个类型正确的插座变量，你可以这样做：`self.lightView.state\
  \ = LightViewStateOn;`\n\n这段代码唯一的实际代价是确保你在 `–viewDidUnload` 和 `–dealloc` 方法中释放该实例。不会占用额外内存，并且你的代码可读性会大大提高。\n\
  \n### 警告视图\n\n当你查看主视图控制器所采纳的协议时，可能已经注意到它还采纳了 `UIAlertViewDelegate` 协议。来认识你的第一个警告视图吧。当你首次启动闪光灯程序时，会显示一条警告，提示闪烁的灯光可能引发癫痫发作。此应用的目标是让人们的生活更安全，而不是将他们置于危险之中！\n\
  \n在 iPhone 应用中，警告视图在此类情况下很常见。如果发生错误或需要做出重要选择，这是一种极佳的交互机制。不过，不要将它们用作状态指示器——屏幕上弹出太多警告会让人厌烦。\n\
  \n\n\n# 弹窗显示与用户交互\n\n通过以下代码显示弹窗。首先检查模型，确认用户是否已接受运行闪光灯的风险：\n\n```\nif (! self.flashlightModel.flashingAccepted)\
  \ {\n```\n\n如果用户尚未接受，则创建一个弹窗视图对象，包含标题、消息以及视图中显示的按钮标签：\n\n```\nUIAlertView *alertView\
  \ = [[UIAlertView alloc]\ninitWithTitle:NSLocalizedString(@\"FlasherWarning\", nil)\n\
  message:NSLocalizedString(@\"FlasherWarningMessage\", nil)\ndelegate:self\ncancelButtonTitle:NSLocalizedString(@\"\
  Cancel\", nil)\notherButtonTitles:NSLocalizedString(@\"FlasherWarningButtonStart\"\
  , nil), NSLocalizedString(@\"FlasherWarningButtonLearn\", nil), nil];\n```\n\n由于你的控制器遵循\
  \ `UIAlertViewDelegate` 协议，因此将其设置为代理。另外请注意，这些字符串已做本地化处理。如果你要在应用中警告用户某些危险，务必使用他们最熟悉的语言。\n\
  \n向弹窗视图发送 `–show` 消息，即可让弹窗显示在屏幕上。\n\n随后释放该对象，因为它已不再需要，并结束动作方法：\n\n```\n[alertView\
  \ show];\n[alertView release];\nreturn;\n}\n```\n\n但接下来呢？你在请求用户输入，然而弹窗视图并没有返回任何内容。难道这里要使用心灵感应吗？\n\
  \n不，这个功能要等苹果发布 iPhone 9GSXY 才会提供。在此之前，你需要记住自己是一个 `UIAlertViewDelegate`。当用户点击按钮时，将调用以下代码：\n\
  \n```\n- (void)alertView:(UIAlertView *)alertView\nclickedButtonAtIndex:(NSInteger)buttonIndex\
  \ {\n    if (buttonIndex == 0) {\n        // 取消\n    }\n    else if (buttonIndex\
  \ == 1) {\n        // 启动闪光灯\n        self.flashlightModel.flashingAccepted = YES;\n\
  \        [self startFlasher];\n        self.flasherRunning = YES;\n    }\n    else\
  \ if (buttonIndex == 2) {\n        // 了解更多\n        [[UIApplication sharedApplication]\
  \ openURL:[NSURL\nURLWithString:@\"http://en.wikipedia.org/wiki/Photosensitive_epilepsy\"\
  ]];\n    }\n}\n```\n\n弹窗中的每个按钮都有一个索引。取消按钮是第一个，接着是启动闪光灯的按钮，最后是了解更多关于光敏性癫痫的按钮。\n\n\
  **注意：** “了解更多”按钮展示了如何在 Safari 中打开网页。首先将字符串转换为 URL，然后将其传递给 `UIApplication`。你的应用将被关闭，Safari\
  \ 将打开指定页面：\n\n```\nNSURL *URL = [NSURL URLWithString:@\"http://chocklock.com\"];\n\
  [[UIApplication sharedApplication] openURL:URL];\n```\n\n## 操作列表\n\n你最初的计划是添加一个“迪斯科模式”。实际上，许多变量名都体现了这一特性。但某天，你的市场专家意识到迪斯科舞曲与安全并没有太多共同点。其他类型的灯光可能更合适。\n\
  \n结果，这一功能演变为让用户从一系列灯光中进行选择。有用于危险情况的紧急灯和警示灯，而迪斯科灯则是给那些想今晚跳跳舞、谈谈情、嗨起来的人们准备的选项。为了让用户做出选择，你为应用添加了操作列表！\n\
  \n当你希望用户从一系列选项中进行选择时，操作列表就是最佳方案。例如在邮件应用中的回复功能，操作列表会提供“回复”和“转发”两个选项。\n\n与弹窗视图类似，首先你需要在视图控制器的\
  \ `@interface` 中遵循 `UIActionSheetDelegate` 协议。然后，以主视图控制器作为代理，配合标题和按钮字符串来构建操作列表：\n\
  \n```\nUIActionSheet *actionSheet = [[UIActionSheet alloc]\ninitWithTitle:NSLocalizedString(@\"\
  DiscoActionTitle\", nil)\ndelegate:self\ncancelButtonTitle:NSLocalizedString(@\"\
  Cancel\", nil)\ndestructiveButtonTitle:nil\notherButtonTitles:NSLocalizedString(@\"\
  DiscoActionButtonEmergency\", nil), NSLocalizedString(@\"DiscoActionButtonAlert\"\
  , nil), NSLocalizedString(@\"DiscoActionButtonHues\", nil), NSLocalizedString(@\"\
  DiscoActionButtonMixed\", nil)];\n```\n\n\n\n\n# iPhone App 开发：缺失手册\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 收束自身\n\n`nil`, `nil`];\n\n`[actionSheet setActionSheetStyle:UIActionSheetStyleBlackTranslucent];`\n\
  \n`[actionSheet showInView:self.view];`\n\n`[actionSheet release];`\n\n操作表（action\
  \ sheet）的委托处理按钮点击的方式与警告视图相同：\n\n```objc\n- (void)actionSheet:(UIActionSheet *)actionSheet\
  \ clickedButtonAtIndex:(NSInteger)buttonIndex\n{\n    . . .\n    switch (buttonIndex)\
  \ {\n        . . .\n    }\n    . . .\n}\n```\n\n## `SettingsViewController`\n\n\
  设置视图控制器维护的状态非常少：它只使用一个定时器来预览闪烁器（flasher）。由于所有设置的状态都由`FlashlightModel`维护，因此你不需要添加额外的状态。\n\
  \n你会注意到这里有多出许多视图。这是典型的设置控制器场景，它包含许多可由用户执行的调整项（以及相关的操作）。\n\n### 初始化\n\n`SettingsViewController`之所以会存在，是因为主视图工具栏中的“设置”按钮已连接到`–showSettings`操作。该方法会分配并实例化一个控制器实例，其方式与`Flashlight_ProAppDelegate`类似：`SettingsViewController\
  \ controller = [[SettingsViewController alloc] initWithNibName:@″SettingsView″ bundle:nil];`\n\
  \n但随后它开始做一些新的事情。\n\n### 共享模型\n\n第一个不同之处在于，它将模型传递给新的控制器：`controller.flashlightModel\
  \ = self.flashlightModel;`\n\n这行代码在两个控制器之间共享了手电筒模型。这样一来，如果其中一个更新了模型，另一个无需额外操作就能访问这些更改。同时还能略微节省内存，因为无需复制实例数据。对于更复杂的模型，这种内存节省效果会非常显著。\n\
  \n第六章：专业手电筒应用 **201**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n##\
  \ 收束自身\n\n***提示：*** 当然，在某些情况下，你希望每个视图控制器拥有独立的模型。在这些情况下，你可以在控制器的`–initWithNib:bundle:`方法中实例化一个新模型。\n\
  \n### 翻转出现与消失\n\n第一个显示在屏幕上的视图是作为子视图添加到窗口中的（第 153 页）。你也可以通过编写大量代码来实现类似效果：为视图添加动画、在视图层级中交换它们以及切换控制器。但和往常一样，“编写大量代码”正暗示了\
  \ Cocoa Touch 有更简便的实现方式！\n\n`UIViewController`（就像用作此类基础的控件一样，详见第 195 页）可以在其“上方”呈现另一个视图。当新的控制器取代其位置时，原始控制器会被挂起。这被称为*模态视图*，因为在这种模式下，用户无法与原始视图进行交互。\n\
  \n你可以通过`modalTransitionStyle`属性指定进入此模式的转场效果。对于设置界面，通常使用水平翻转效果，但你也可以指定视图从屏幕底部出现，或使用交叉溶解效果淡入：`controller.modalTransitionStyle\
  \ = UIModalTransitionStyleFlipHorizontal;` 一旦设置了转场效果，只需调用`–presentModalViewController:animated:`方法，新的控制器和视图就会以动画形式呈现：\n\
  \n```objc\n[self presentModalViewController:controller animated:YES];\n```\n\n从此刻起，新的视图控制器由`UIViewController`超类管理，因此你可以释放刚刚创建的实例：\n\
  \n```objc\n[controller release];\n```\n\n***注意：*** iPhone 应用中另一种常见的导航方式是基于`UINavigationController`。这个基于`UIViewController`的类允许你“推入”和“弹出”新视图。这样，你可以轻松创建类似\
  \ iPhone 邮件或设置应用那样的界面，其中新视图会滑入到位，并在左上角显示一个“返回”按钮。\n\n该类提供了`–pushViewController:animated:`和`–popViewControllerAnimated:`方法来改变用户在屏幕上的视图。此外，还有一些属性可以访问导航栏（以便添加你自己的按钮）并更改其状态。`UINavigationController`的文档包含了更多信息，并且可以从苹果开发者网站下载多个代码示例。\n\
  \n### 选择颜色\n\n由于设置界面包含一个选择器，允许用户选择他们喜欢的颜色，因此这个视图控制器在其`@interface`中采用了`UIPickerViewDelegate`和`UIPickerViewDataSource`协议。\n\
  \n数据源方法`–numberOfComponentsInPickerView`和`–pickerView:numberOfRowsInComponents:`指定了一个单列（组件），其行数等于手电筒模型中的颜色数量。\n\
  \n**202** iPhone App 开发：缺失手册\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 收束自身\n\n两个委托方法用于配置每行显示的标签。`–pickerView:titleForRow:forComponent:`方法使用手电筒模型的类方法`+nameForColorIndex:`为行提供文本。`–pickerView:widthForComponent:`方法则对每个颜色名称使用相同的方法来确定列的最大宽度。请记住，`+nameForColorIndex:`返回的是本地化字符串，这很好地说明了为什么不应硬编码字符串的尺寸。你可能认为\
  \ 20 像素足够显示“tan”，但当德国用户发现“hel braun”无法容纳在相同空间时，他们就会抱怨了。\n\n当用户在选择器中选中新行时，会调用`–pickerView:didSelectRow:inComponent:`方法。其实现会停止闪烁器，更新手电筒模型，然后更新视图。\n\
  \n### Interface Builder 并非万能\n\n你可能觉得 Interface Builder 的选项已经多到令人眼花缭乱，事实也确实如此。但即便拥有如此丰富的设置，你仍然无法直接在\
  \ NIB 文件中设置某些内容。在这个视图控制器的`–viewDidLoad`方法中，你可以看到一个示例：\n\n```objc\n[self.brightnessSlider\
  \ setMaximumTrackImage:stretchableSliderMaximum forState:UIControlStateNormal];\n\
  [self.brightnessSlider setMinimumTrackImage:stretchableSliderMinimum forState:UIControlStateNormal];\n\
  [self.brightnessSlider setThumbImage:sliderThumb forState:UIControlStateNormal];\n\
  ```\n\nInterface Builder 没有提供任何机制来为滑块设置自定义轨道和滑块按钮图像，因此你必须在代码中完成。`–viewDidLoad`方法非常适合做这件事，因为每次视图被读入内存时，这条消息都保证会被调用。\n\
  \n### 可拉伸图像\n\n你可能对滑块轨道图像的加载方式有些困惑：\n\n```objc\nUIImage *stretchableSliderMaximum\
  \ = [[UIImage imageNamed:@″SliderMaximum.png″] stretchableImageWithLeftCapWidth:2.0f\
  \ topCapHeight:0.0f];\n```\n\n你已经见过使用`–imageNamed:`方法从应用程序资源中加载图像（第 182 页）。但`–stretchableImageWithLeftCapWidth:topCapHeight:`方法又是做什么的呢？难道和橡皮人\
  \ Gumby 和 Pokey 有关？\n\n不——可拉伸图像在 UIKit 中被广泛使用。你可以将它们用于按钮、渐变以及任何尺寸会随布局变化而改变的屏幕元素。正如你在第\
  \ 162 页所见，当用户与应用交互时，视图的尺寸可能会发生相当大的变化，因此能够自动调整宽度和高度的图像非常有用。\n\n第六章：专业手电筒应用 **203**\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 收束自身\n\n当你定义一个可拉伸图像时，你需要在原始图像中定义两个点，这些点在绘制时可以被重复。在第\
  \ 180 页的示例中，从左数第二个像素使用`2.0f`指定。如果你不希望图像在一个维度上被拉伸，可以将限制值指定为`0.0f`：滑块的图像高度就是这样处理的。\n\
  \n### 本地化\n\n\n\n\n`–viewDidLoad`方法还包含一行对不讲英语的用户很重要的代码：\n\n```objective-c\nself.aboutBarButtonItem.title\
  \ = NSLocalizedString(@″About″, nil);\n```\n\n设置屏幕的设计目标之一是尽可能少用文字。\n\n滑块两侧的图标在任何语言中都能表示亮度和闪烁速度，因此无需担心这一问题。模型已对颜色名称进行了本地化处理，所以您也无需为此操心。\n\
  \n至此，NIB 中只剩下一个文本需要处理：左上角的**“关于”**(About)按钮。\n\n由于只有一个项目需要本地化，最简单的方法是直接更新这一个按钮。\n\
  \n当您有多个项目需要本地化时，可以采用另一种本地化方法，稍后将对此进行讨论。\n\n**注意：****“完成”**(Done)按钮会自动为您更新，因为它是系统按钮之一。您只需在本地化字符串文件中提供对`@“Done”`的翻译即可。\n\
  \n## AboutViewController\n\n视图控制器不一定需要包含模型。大多数控制器都有模型，但这当然不是必须的。致谢视图就是一个不需要模型的例子。此外，该控制器采用了另一种实现动画的方式。\n\
  \n### 哪个版本？\n\n您可能曾想过为产品的版本号创建一个数据模型，但鉴于`–viewDidLoad`中只有三行代码，这样做不值得：\n\n```objective-c\n\
  NSString *bundlePath = [[NSBundle mainBundle] bundlePath];\nNSDictionary *infoDictionary\
  \ = [NSDictionary dictionaryWithContentsOfFile:\n                              \
  \  [NSString stringWithFormat:@″%@/Info.plist″, bundlePath]];\nself.versionLabel.text\
  \ = [NSString stringWithFormat:NSLocalizedString(@″Version″, nil),\n           \
  \               [infoDictionary objectForKey:@″CFBundleVersion″]];\n```\n\n这段代码定位并加载应用程序的`Info.plist`文件，从列表中读取`CFBundleVersion`属性，然后通过一个本地化字符串更新`versionLabel`的文本。\n\
