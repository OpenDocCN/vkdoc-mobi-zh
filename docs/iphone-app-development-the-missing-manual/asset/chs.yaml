  \ 标识符，这些输出口会自动显示出来。\n\n***提示：*** 要证明这一点，请打开 `HitMakerViewController.h`，删除 `UILabel\
  \ myLabel` 前面的 `IBOutlet` 并保存文件。返回后，该输出口将不会出现在“文件的所有者”检查器中。\n\n完成此实验后，请将 `IBOutlet`\
