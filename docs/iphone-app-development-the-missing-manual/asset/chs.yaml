  \ 9-12 的内容。\n\n![Image 93](img/index-314_1.jpg)\n\n***图 9-12：*** *该表格来自 LinkShare\
  \ 关于 2009 年 12 月 29 日至 2010 年 1 月 5 日期间对 iTunes 上 Safety Light 页面的链接的报告。它显示了促销网站上的\
  \ App Store 徽章是最受欢迎的链接，并且要求 Twitter 关注者留下评论可以产生销售。Apple 支付的 5% 佣金为该周赚取了 $87.91。*\n\
  \nSafety Light 促销网站上的所有链接都使用了 LinkShare 签名。查看该网站，您会在一个*非常*长的 URL 末尾看到表中列出的名称。\n\n\
  要查看报告，请转到 LinkShare 发布商门户并点击 **报告**。然后，在 **高级报告** 下，您可以通过 **报告类型** 进行几种选择：\n\n-\
  \ **签名活动.** 此报告汇总了您附加到链接的每个成员 ID 签名的点击次数和销售额。此概览使您可以轻松查看哪些链接正在产生流量和销售。您将最常使用此报告。\n\
  - **签名订单.** iTunes 中的每笔交易都会列出产生佣金的成员 ID 签名。您还将看到交易的日期和时间以及订购的 SKU 类别。\n- **产品成功.**\
  \ 要查看您在每个 SKU 类别中赚取了多少钱，请选择此报告。类别 “Q9020” 显示购买的应用程序数量。项目数量可以大于订单数量：一次可以购买多个应用程序。\n\
  \n***提示：*** LinkShare 还通过一个简单的 Web 服务提供其中一些信息。如果您希望自动处理报告，请在他们的帮助中心搜索 “签名订单报告 Web\
  \ 服务”：`http://helpcenter.linkshare.com/publisher/questions.php?questionid=780`。\n\
  \n*收集情报*\n\n签名活动报告的 “佣金” 列中报告的数字表明了一笔可观的额外收入，但当您添加 “成员 ID” 和 “点击量” 列时，该报告变得更有价值。它们告诉您每个链接的使用频率及其盈利情况。\n\
  \n不幸的是，没有足够的信息可以准确知道您自己的产品被购买了多少。Apple 和 LinkShare 没有将订单分解为所购产品的单个 SKU。如果您看到一个 $4.99\
  \ 的订单，您无法知道这是针对您的应用程序还是竞争对手的。\n\n即使没有这些信息，您仍然可以确定哪些链接最有效。假设您有足够大的样本量，您可以比较每个签名的相对百分比。包含其他产品所导致的错误将在所有签名中均匀分布。如果您发现一个签名仅通过三次点击就产生了\
  \ $50 的销售额，请不要基于这个部分样本做任何决定。\n\n使用上面显示的表格，您可以比较 BADGE、DOWNLOAD 和 PRICE 的签名。这些签名用于促销网站上的每个链接：分别用于\
  \ “Available on the iPhone App Store” 图形徽章、“Download your copy” 文本链接和绿色的 “Only 99¢”\
  \ 链接。\n\n它们合计产生了 1,510 次点击。BADGE 链接的 1,152 次点击产生了从网站到 iTunes 的 76% 的流量。DOWNLOAD\
  \ 和 PRICE 链接分别产生了 17% 和 7% 的流量。显然，您希望确保徽章在网站上突出显示。\n\n***注意：*** App Store 徽标必须从\
  \ Apple 获得许可。在开发者网站的 App Store Resource Center 中获取详细信息：`http://developer.apple.com/iphone/appstore/marketing.html#storelogo`。您也可以从此页面下载标准图稿。\n\
  \n\n好的，这是根据您的要求翻译和格式化的中文 Markdown 文档。\n\n---\n\n# 从这些数字中，你可以生成的另一个统计指标是每次点击的销售额。\n\
  \n对于 `BADGE` 徽章，1,152 次点击产生了 1,229.05 美元的销售额，即每次点击 1.07 美元。而 `TWEET_REVIEW` 链接每次点击仅带来\
  \ 0.35 美元。出现这个数字的原因是 `TWEET_REVIEW` 链接被发布到 Twitter 上，提醒关注者去评论 Safety Light 应用。包含签名的联盟链接可以使用像\
  \ `bit.ly` 这样的服务来缩短。如果你查看链接 `http://bit.ly/info/77QJhk` 的信息，你会看到展开后的链接末尾带有 `SAFETY_LIGHT_TWEET_REVIEW`\
  \ 签名。\n\n信息页面还会用图表显示该链接随时间变化的使用情况。\n\n显然，有些点击链接去写评论的人已经购买了该应用，他们不会产生任何新的销售额。实际上，能产生任何销售额都令人惊讶：在查看“签名订单”报告后，似乎大部分佣金都来自其他产品。\n\
  \n## 客户支持\n\n**注意：** 有些签名会被截断，比如“`SAFETY_LIGHT_TW`”。电子邮件客户端、网页浏览器、复制/粘贴错误以及其他处理错误都可能导致这些不完整的签名。你需要学会忽略它们。\n\
  \n你也可以在其他场景中使用这些技巧，例如：\n\n- **找出哪种广告对你的产品最有效。** 为每个发布商分配一个唯一的签名，然后看看在 TouchArcade\
  \ 还是 SlideToPlay 上投放的广告对你的产品效果更好。\n- **测试不同的广告布局和/或文案。** 用“最好的手电筒”还是“拯救你的生命”作为 Safety\
  \ Light 的广告语效果更好？展示应用图标还是巧妙的广告语更好？通过投放带有不同签名的各种广告，你就会知道哪种方式最有效。\n\n### 客户支持\n\n\
  随着客户群的扩大，你会发现还有一样东西也在增长：支持邮件。\n\n你的客户会遇到问题，而你的工作就是解决这些问题并让他们满意。\n\n#### 一切完美\n\n\
  你做了大量的 Beta 测试并修复了很多 Bug：一切应该都很完美，对吧？不幸的是，答案是否定的。1.0 版本发布后总会出现一些问题。作为一个聪明的开发者，你应该计划在首次发布后的一到两周内推出一个\
  \ 1.0.1 版本。尽管你很可能需要这样做，但不要计划在发布后的几周内去度假。\n\n这个维护版本将解决客户发现的主要问题。你可能还想加入一些用户提出的简单功能请求。\n\
  \n#### 崩溃速成课\n\n在客户安装应用后，iTunes 会开始收集设备上生成的崩溃报告。如第 7 章（第 226 页）所述，这些崩溃报告是自动生成的，包含能让你识别原因的信息。在同步过程中，iTunes\
  \ 会收集这些报告，并将其转发到苹果公司的服务器上。\n\n每周，你的崩溃报告都会被分析并发布到 iTunes Connect 上，供你下载：\n\n1. **登录\
  \ iTunes Connect（第 233 页）并选择“管理你的应用”。**\n   从列表中选择你的应用以查看其信息。\n2. **点击“崩溃报告”以查看按所使用的操作系统版本分类的应用报告。**\n\
  \   如果你看到“提交的报告太少，无法显示”，那么恭喜你，你的代码运行得很好！\n   如果你没那么幸运，你会看到导致崩溃的类和方法的列表，并按崩溃发生的频率排序。\n\
  3. **点击“下载报告”将崩溃报告复制到你的 Mac 上。**\n   下载的文件会带有 `.crash` 扩展名。\n\n当你将最终的二进制文件上传到 iTunes\
  \ Connect 时，你应该已经保存了一份应用副本以及在构建过程中生成的 `dSYM` 文件（第 262 页）。确保 Spotlight 可以找到这些文件。这种\
  \ Mac OS X 搜索技术能让工具找到并处理包含调试信息的文件。\n\n要查看崩溃报告的内容，请在 Xcode 中打开 Organizer 窗口。然后，在\
  \ `IPHONE DEVELOPMENT` 下，选择 `Crash Logs`，并将你下载的 `.crash` 文件拖入窗口顶部的列表中。崩溃报告处理完成后，你会看到额外的类名、方法名以及与你源代码对应的行号。\n\
  \n**提示：** 使用版本控制系统 (VCS)，并在每次发布时为项目打上标签。这样，当需要检索与当前报告的崩溃相对应的源代码、应用和 `dSYM` 文件时就会非常方便。\n\
  \n流行的 Subversion VCS 工具已预装在 Mac OS X Snow Leopard 版本中。要了解更多信息，请在终端窗口中输入 `mansvn`。\n\
  \n如果你在解析符号时遇到问题，请查看 iTunes Connect 崩溃报告页面底部的技术说明 TN2151 的链接。\n\n### 处理支持邮件\n\n当你努力设计、开发和推广了一款人们愿意购买的应用后，其中一小部分客户会对你的应用有疑问或遇到问题。\n\
  \n许多开发者发现，在 iTunes 上他们的销量很高，所以即使只有一小部分用户寻求帮助，最终你也可能需要进行大量的客户支持。养成能够控制支持工作量的习惯。\n\
  \n以下是处理支持问题的一些技巧：\n\n- **对常见问题使用模板回复。** 创建一个文档，其中包含用户经常遇到的问题的解决方案。然后你可以从该文档中复制粘贴，以减少与客户沟通所花费的时间。\n\
  - **把你的模板回复放在你的产品网站上，** 并更新 iTunes Connect 中的“支持 URL”，指向这个 FAQ（常见问题）列表。许多客户在需要联系你之前就能找到他们问题的解决方案。\n\
  - **使用 Twitter 或其他社交网络** 让客户知道影响许多人的问题。告知用户预计修复问题需要多长时间，并在问题已提交审核时通知他们。当修复版本发布时，提醒他们更新。\n\
  - **建立一个功能请求列表。** 你会发现很多好想法都来自支持邮件和社交网络上的评论。保持该列表的更新，便于你在开始开发下一个版本时使用。某些功能会被频繁请求，这时你只需说“谢谢！这个功能已经在我们的功能请求列表中了。”\n\
  - **使用单一的客服联系点。** 无论你通过基于网络的服务、电子邮件还是其他机制来提供支持，这其实并不重要。但如果你将注意力分散到许多不同的渠道上，你将会抓狂。你的客户也一样，因为他们会不知道联系你的最佳方式。选择一种联系方式并坚持下去。\n\
  \n## 产品更新\n\n在修复了最初的 Bug 并完成了一些简单的功能请求之后，就该上传你的 1.0.1 版本了。幸运的是，这比第一次容易得多，因为 iTunes\
  \ Connect 中的许多元数据不需要更改。\n\n### 新信息\n\n显然，你在源代码中做了很多更改。但有一项更改比其他所有更改都重要：你需要更新 `Info.plist`\
  \ 文件中的版本号。\n\n当你上传一个新的二进制文件时，iTunes Connect 会检查版本号的值，如果该值不大于当前版本，文件将被拒绝。你还需要记得从版本号中删除任何非数字字符（例如，你的测试版版本号）。\n\
  \n\n建议为版本号采用统一的命名模式。大多数开发者会根据改动幅度和深度来递增版本号。\n\n例如，如果你当前的版本是 1.0，那么下一个版本可以这样命名：\n\
  \n- **1.0.1.** 小版本更新。主要是修复错误，不包含新功能。\n\n**产品更新**\n\n- **1.1.** 用于包含重要变更的版本，包括错误修复和小型新功能。\n\
  - **2.0.** 一个重大的新版本，包含大量错误修复和面向客户的新功能。\n\n## 欢迎回来，iTunes\n\n到现在，你已经是 iTunes Connect\
  \ 的老手了，但还是有一些新东西需要学习。要更新你的应用，请从更新元数据开始：\n\n1.  登录 iTunes Connect，选择“管理你的应用程序”。然后点击你要更新的应用的图标。\n\
  2.  点击“更新应用”链接，开始更新流程。\n\n你首先会看到一个询问导出合规性是否发生变化的问题。答案很可能是“否”。\n\n3.  点击“继续”。\n\n\
  你会看到一个屏幕，你需要在其中提供关于新版本的更新信息。与首次提交相比，需要填写的字段更少。\n\n4.  首先填写“版本号”字段。\n\n该号码应与你在 `Info.plist`\
  \ 中分配的版本号一致。“名称”和“关键词”字段会预先填充当前值；如果你想更改，现在正是时候。一旦你提交了更新后的二进制文件，这些字段将无法编辑。\n\n你的内容评级的当前值也会显示出来。\n\
  \n5.  如有必要，请更新任何值。最后，点击“稍后上传应用二进制文件”，然后点击“保存更改”。\n\n返回应用屏幕后，你会看到版本号已更新，状态变为“等待上传”。你还会看到你的应用图标在“管理你的应用程序”屏幕上出现了两次。\n\
  \n需要注意的是，此时**不应**更新你的应用描述或任何其他数据。你可能需要列出新功能或更新截图，但如果现在进行这些更改，它们会显示在当前版本上。相反，请等待新版本批准后再进行这些更新。\n\
  \n最后一步是上传新的二进制文件。像发布初始版本（第 262 页）一样进行最终构建，然后点击“上传二进制文件”。使用“选择文件”按钮选取文件，然后点击“保存更改”。\n\
  \n## 产品更新\n\n完成后，你会看到状态变为“等待审核”。希望审核等待时间不长！\n\n## 升级（或者说，缺乏升级）\n\n如果你是从其他软件平台转过来的开发者，你可能已经了解软件升级的好处。简而言之，你知道自己有多少客户，以及其中有多少人可能会升级。这些信息，加上升级的成本，可以告诉你应该在开发上投入多少钱。\n\
  \n不幸的是，这个等式中关键的一部分在 App Store 上是缺失的。没有办法给现有客户提供折扣。每个 SKU 都是独立的。对于游戏和其他类型的娱乐产品来说，这不是问题。客户已经习惯为使用相同角色和主题的额外游戏内容付费。\n\
  \n而生产力工具和其他更“严肃”应用的开发者则面临一个艰难的决定：是免费提供升级，还是为全新的产品收费？\n\n在做这个决定时，请记住以下几点：\n\n-  \
  \ 你会遇到与用户从免费应用迁移到付费应用时相同的数据迁移问题。当前版本的文档和设置不会自动迁移到新版本，除非你付出大量努力。\n-   用户会抱怨。举个例子，流行应用\
  \ Tweetie（`www.atebits.com/tweetie-iphone`）的作者 Loren Brichter 在决定对 2.0 升级版本收费时，就遭遇了相当大的抵制。无论出于何种原因，客户觉得他们有权免费升级，即使升级费用只有\
  \ 3 美元。\n    -   穿上你的防火内裤吧，因为人们会通过社交网络和电子邮件表达他们的不满。\n-   如果你的用户基数相对较小，而开发成本较高，那么对升级收费可能会成就或毁掉你的业务。如果你面向的是一个利基市场，请花时间教育你的客户：持续的营收是如何支持他们喜爱的应用的。\n\
  \n好消息是，如果你正在考虑升级，那意味着你的第一个版本已经赚到了一些钱。许多产品永远走不到这一步，所以为你完成的工作感到自豪吧。\n\n## 产品更新\n\n\
  恭喜你！\n\n仿佛就在昨天，你第一次启动 Xcode 来制作一个简单的手电筒应用。但回首往事，这是一段漫长的旅程，你一路上学到了很多。\n\n如果你像大多数\
  \ iPhone 开发者一样，那么一旦你完成第一个应用，你已经在考虑下一个了。顶尖研究人员发现，治愈这种“病”的唯一方法就是长时间接触 Xcode。谢天谢地，你已经完全准备好使用这个“解药”了。\n\
  \n那么，祝愿你在 App Store 作为 iPhone 开发者能长久而成功：这是你应得的。干杯！\n\n#### 附录 A：下一步去哪里\n\n关于 iPhone\
  \ 开发，总有更多东西要学。如果你发现自己对本书涉及的某个主题感到困惑，可以查看以下资源。你可以查阅书籍、网站和论坛来寻找答案。\n\n同样重要的是要记住，iPhone\
  \ 开发是一个新兴行业。新技术和方法在不断被发现。不要害怕使用你在本书中学到的术语在 Google 上搜索！\n\n### 关于 Objective-C 的帮助\n\
  \n**书籍**\n\n`http://developer.apple.com/mac/library/documentation/Cocoa/Conceptual/ObjectiveC`\n\
  \n许多关于 Cocoa 的书籍也会深入探讨 Objective-C。如果你想要一个优秀的入门介绍和完整的语言参考，苹果出版的 *The Objective-C\
  \ 2.0 Programming Language* 是无与伦比的。当你遇到新的术语和概念时，术语表和索引尤其有用。\n\n该文档有 PDF 格式，方便你打印和搜索。\n\
  \n**网站**\n\n`http://sealiesoftware.com/blog/`\n\n如果你对 Objective-C 的内部原理有任何疑问，Greg\
  \ Parker 都已经回答过了。当你不可避免地陷入 `objc_msgSend` 崩溃的深渊时，你最终会来到这个网站，长舒一口气。\n\n### 关于 Cocoa\
  \ 的帮助\n\n**书籍**\n\n`http://bignerdranch.com/products.shtml`\n\nAaron Hillegass 在他的\
  \ Big Nerd Ranch 教授编程多年。在 *Cocoa Programming for Mac OS X* 中，他通过清晰的示例和从这些课程中磨练出的精彩讲解来阐述这个主题。这本书受到许多资深\
  \ Mac 开发者的推崇，并且尽管书名如此，它对于那些希望更深入理解两个平台共享的类和设计模式的 iPhone 开发者来说也很有价值。\n\n`http://cocoabook.com/`\n\
  \n\n\n# 附录 A：下一步该去哪里\n\n## Cocoa 与 Objective-C\n\n### 书籍\n\n*《Cocoa 与 Objective-C：快速上手》*，作者\
  \ Scott Stevenson，深入剖析了 Cocoa 和 Objective-C。Scott 在其网站 Cocoa Dev Central（`http://cocoadevcentral.com/`）和\
  \ Theocacao（`http://theocacao.com/`）上长期提供在线教程。他直截了当且富有个性的文风易于阅读，强烈推荐给希望充分利用这门语言和框架的开发者。\n\
  \n`http://www.cocoadesignpatterns.com/`\n\nErik Buck 和 Don Yacktman 都是资深的 Cocoa\
  \ 开发者。在《Cocoa 设计模式》一书中，他们研究了 iPhone SDK 框架中使用的面向对象设计模式。通过实际案例和示例代码，高级开发者将发现用于构建其\
  \ iPhone 应用的组件背后所蕴含的优雅与一致性。\n\n### 网络资源\n\n`http://developer.apple.com/cocoa/`\n\
  \n该页面是 Apple 关于 Cocoa 一切内容的主要参考。请将其作为探索框架的起点。\n\n`http://cocoawithlove.com`\n\n\
  Matt Gallagher 的 Cocoa with Love 站点是有关 Cocoa 框架的有用代码和信息的无尽源泉。他的一些文章深入探讨了 Mac 和 iPhone\
  \ 开发的精妙之处，而另一些则对新手非常友好。\n\n`http://cimgf.com`\n\n由 Marcus Zarra 和 Matt Long 撰写的\
  \ *Cocoa Is My Girlfriend* 站点涵盖了 Mac 和 iPhone 编程的广泛主题。对于 iPhone 上两个最重要的框架：Core Animation\
  \ 和 Core Data 来说，它是一个特别好的信息来源。\n\n---\n\n## iPhone SDK 帮助\n\n### 网络资源\n\n`http://www.mikeash.com/?page=pyblog/`\n\
  \n*NSBlog* 由资深 Mac 开发者 Mike Ash 运营，涵盖 Cocoa 开发的高级主题。这是专业人士学习新东西的地方。\n\n### 讨论区\n\
  \n`http://www.cocoabuilder.com/`\n\n*CocoaBuilder* 站点提供了 Cocoa 和 Xcode 开发者邮件列表的可搜索归档。结果以易于阅读的线程格式显示。当你在理解\
  \ Cocoa 的某些方面遇到问题时，这个站点是寻找解决方案的绝佳起点。\n\n`http://lists.apple.com/mailman/listinfo/cocoa-dev`\n\
  \n注册 Apple 关于 Cocoa 开发的邮件列表。该列表是讨论 Cocoa 框架、功能和技术问题的好去处，但不讨论 iPhone SDK 的具体问题。\n\
  \n---\n\n## iPhone SDK 帮助\n\n### 书籍\n\n`http://iphonedevbook.com`\n\n由 Dave Mark\
  \ 和 Jeff LaMarche 编写的《iPhone 3 开发入门》通过分步指导，带你掌握 iPhone SDK 的核心部分。后续书籍《iPhone 3 开发进阶》涵盖了\
  \ 3.0 软件的新功能和更高级的主题。\n\n`http://ericasadun.com`\n\nErica Sadun 是 iPhone 开发者获取示例代码、技巧和窍门的无尽源泉。自越狱早期就活跃的她，将这些诀窍汇编成书《iPhone\
  \ 开发者食谱》。这本书在通过相关源代码快速覆盖新主题方面表现出色。\n\n### 网络资源\n\n`http://appdevmanual.com`\n\n\
  《iPhone 应用开发：缺失手册》的官方网站。书中未涵盖的补充材料将在此发布。\n\n`http://iphonedevelopment.blogspot.com`\n\
  \n由作者 Jeff LaMarche 撰写的 *iPhone 开发* 站点，是寻找 iPhone 教程和评论的好地方。他书中出现的许多示例代码都是首次在这个站点上亮相。\n\
  \n---\n\n## 界面设计帮助\n\n### 网络资源\n\n`http://iphoneincubator.com/blog/`\n\nNick Dalton\
  \ 的 *iPhone 开发博客* 在 iPhone SDK 发布的第一天上线。从那时起，它已成为一个宝贵的技巧和窍门集合。\n\n`http://iPhoneDeveloperTips.com`\n\
  \n顾名思义，*iPhone 开发者技巧* 网站拥有数百个可用于你项目的技巧和教程。作者兼资深移动开发者 John Muchow 定期更新该站点，为所有开发者提供优质信息。\n\
  \n`http://furbo.org`\n\n这个由鄙人撰写的站点，用于探讨与 iPhone 相关的各种开发主题。文章 `http://furbo.org/bootstrap`\
  \ 是本书的创作之源。\n\n### 讨论区\n\n`http://devforums.apple.com`\n\nApple 运营着这些讨论论坛。除了针对常见问题的普通问答外，该站点是唯一可以合法讨论受保密协议\
  \ (NDA) 约束的 SDK 版本的场所。\n\n`http://groups.google.com/group/iphonesdk`\n\n这个由 Erica\
  \ Sadun 运营的 Google 群组承载着有关 iPhone SDK 的各种讨论。\n\n---\n\n## 界面设计帮助\n\n### 书籍\n\n`http://developer.apple.com/iphone/library/documentation/UserExperience/Conceptual/MobileHIG`\n\
  \n《iPhone 人机界面指南》是 Apple 出版的出版物，涵盖了为用户提供最佳体验所面临的挑战和最佳实践，是设计用户界面时的基本指南。建议你将该文件保存为\
  \ PDF，并在原型设计新项目时将其作为便捷参考。\n\n`http://www.tobyjoe.com/2009/08/my-iphone-user-experience-book/`\n\
  \nToby Joe Boudreax 的《编程实现 iPhone 用户体验》将前述《人机界面指南》中的信息向前推进了一步。他涵盖了许多相同的问题，但更深入，并附有代码示例和对许多流行\
  \ iPhone 应用的评析。推荐给希望充分利用其用户体验的设计师和开发者。\n\n---\n\n## Web 开发帮助\n\n### 书籍\n\n`http://apress.com/book/view/1430223596`\n\
  \n《iPhone 用户界面设计项目》调查了 10 个流行且获奖的 iPhone 应用。这本书审视了每位开发者和设计师为创建最终产品所采取的方法。正如你在 Safety\
  \ Light 中所见，最佳学习方式就是亲历整个过程。\n\n---\n\n## Xcode 帮助\n\n### 网络资源\n\n`http://developer.apple.com/mac/library/referencelibrary/GettingStarted/GS_Tools/`\n\
  \nApple 开发者站点上的这份“入门”文档提供了 Xcode 的介绍，以及可用于改进 iPhone 应用程序的性能工具的深入介绍。\n\n`http://developer.apple.com/tools/`\n\
  \n此网页包含有关 Apple 开发工具的各种主题的链接。如果你对工具有疑问，请务必查看 Xcode-Users 邮件列表。\n\n`http://search.lists.apple.com/`\n\
  \nApple 维护着所有邮件列表的可搜索归档。你可以在归档中找到有关 Xcode、Cocoa 及其他技术的信息。请务必使用页面底部的导航来查看其他选项和功能。\n\
  \n`http://developer.apple.com/mac/articles/server/subversionwithxcode3.html`\n\n\
  这份 Apple 文档解释了如何设置 Subversion 源代码管理。说明包括设置服务器和将 Xcode 配置为客户端。\n\n---\n\n## Web 开发帮助\n\
  \n### 网络资源\n\n`http://developer.apple.com/safari/library/referencelibrary/GettingStarted/GS_iPhoneWebApp`\n\
  \nApple 开发者站点上的这个页面是初学者和高级 Web 开发者的绝佳起点，他们希望探索 iPhone 上 Safari 的技术和设计问题。\n\n`http://www.alistapart.com/articles/putyourcontentinmypocket/`\n\
  \n`http://www.alistapart.com/articles/putyourcontentinmypocketpart2/`\n\n这个在热门 Web\
  \ 杂志 *A List Apart* 上的系列文章涵盖了在 iPhone 上为 Safari Web 浏览器进行开发的基础知识。\n\n---\n\n## 了解新闻与业务动态\n\
  \n### 网络资源\n\n`http://jqtouch.com`\n\n\n\n# 高级 Web 开发工具\n\n高级 Web 开发者一定会想了解 `David\
  \ Kaneda` 为 `jQuery` 编写的插件。该工具包让你只需使用标准的 `HTML`、`CSS` 和 `JavaScript` 就能设计出复杂的用户界面。\n\
  \n## 讨论\n\n`http://groups.google.com/group/iphonewebdev`\n\n这个 `Google` 小组是与其他从事\
  \ `iPhone` 特定项目的开发者交流的好地方。\n\n## 关注新闻与商业动态\n\n### 书籍\n\n`iPhone 营销 (O’Reilly)`\n\
  \n`Rana June Sobhany` 深入阐述了推广你的应用所需的一切。通过对众多成功开发者的访谈，你将了解如何让你的产品脱颖而出。\n\n### 网站\n\
  \n`http://daringfireball.net`\n\n`John Gruber` 的热门网站 `Daring Fireball`，对科技新闻采取一种务实的态度。富有洞察力的分析和无炒作风格的报道，让你轻松掌握最新的\
  \ `Apple` 新闻，并了解其如何影响你的业务。\n\n`http://www.mobileorchard.com/`\n\n由 `Dan Grigsby`\
  \ 和 `Ari Braginsky` 运营的 `Mobile Orchard`，提供新闻、教程以及采访 `iPhone` 开发者的播客。他们的每周新闻摘要让你紧跟行业动态。\n\
  \n`http://blogs.oreilly.com/iphone/`\n\n`Inside iPhone` 网站是 `O'Reilly Media` 关于\
  \ `iPhone` 所有相关资讯的枢纽。在这里，你可以找到活跃的讨论论坛以及涵盖各种主题的频繁更新的博客。\n\n### 讨论\n\n`http://groups.google.com/group/iphonesb`\n\
  \n`iPhone 软件业务` 是一个 `Google` 小组，面向希望与其他开发者讨论 `iPhone` 应用开发业务的小型独立 `iPhone` 开发者。你会发现涵盖市场营销、客户支持和独立咨询的各种讨论话题。\n\
  \n---\n\n## 开源资源\n\n围绕 `iPhone` 的开发者社区非常活跃，由此产生了大量优秀的开源项目。除了能为你开发项目节省大量时间外，新手开发者也能从那些才华横溢且慷慨的解开发者所创建的代码中学习。\n\
  \n`http://joehewitt.com/post/the-three20-project/`\n\n`Three20` 是由 `Joe Hewitt`\
  \ 创建的一个大型开源项目，包含了 `Facebook` 在 `iPhone` 应用中使用的大量类库。你会找到用于查看图片的组件、控制器、撰写消息的视图，以及如\
  \ `HTTP` 磁盘缓存等各种实用工具。该项目包含一个演示如何使用每个组件的示例应用。如果你刚刚起步，阅读这位专家级开发者的代码就能让你学到很多东西。\n\n\
  `http://touchcode.com/`\n\n`TouchCode` 是由 `Jonathan Wight` 发起的一个屡获殊荣的项目。活跃的开发者社区为其贡献了诸如\
  \ `XML` 和 `JSON` 解析器、可嵌入的 `HTTP` 服务器、用户界面视图等大量代码。这些代码被广泛应用于许多 `iPhone` 应用中，所以，不妨看看它，为自己节省时间！\n\
  \n`http://code.google.com/p/kissxml`\n\n与提供轻量级 `XML` 解析器的 `TouchCode` 不同，`KissXML`\
  \ 提供了一个功能强大的解析器，并且能够通过编程方式生成 `XML`。\n\n`http://code.google.com/p/core-plot/`\n\n\
  如果你的应用需要绘制图表，那么了解 `CorePlot` 项目将是个明智的选择。该框架与 `Core Animation` 和 `Core Data` 等其他框架紧密集成，为你提供一个灵活的系统，将你的数值数据转化为引人注目的\
  \ 2D 可视化效果。\n\n`http://github.com/devinross/tapkulibrary`\n\n由 `Devin Ross` 编写的\
  \ `Tapku Library` 是一套精美的用户界面类库。你能找到实现 `CoverFlow`、日历、图表、加载视图等等的代码。他位于 `http://devinsheaven.com/`\
  \ 的博客也是 `iPhone` 开发者的重要信息来源。\n\n`http://cocos2d.org/`\n\n`cocos2d` 框架让你能够创建包含精灵的丰富图形场景。它非常适合\
  \ 2D 游戏、演示以及任何需要协调图像与用户交互的应用程序。\n\n`http://allseeing-i.com/ASIHTTPRequest/`\n\n\
  `ASIHTTPRequest` 项目为 `Core Foundation` 网络 `API` 提供了一个易于使用的封装。如果你的项目需要与 Web 服务器交互、使用\
  \ `POST` 提交多部分表单数据，或与基于 `REST` 的 `API` 通信，那么这段代码可以简化你的工作。项目还提供了大量优质的示例代码和文档，助你快速上手。\n\
  \n`http://github.com/AlanQuatermain/iPhoneContacts`\n\n许多开发者觉得基于 `C` 语言的 `AddressBook`\
  \ 框架使用起来很繁琐。开发者 `Jim Dovey` 编写了几个 `Objective-C` 类，使得操作用户的联系信息变得更加简单容易。你也许还想看看 `Jim`\
  \ 在 `http://github.com/AlanQuatermain/AQToolkit` 上提供的实用工具类集合。\n\n`http://github.com/ldandersen/scifihifi-iphone`\n\
  \n`Buzz Anderson` 解决了 `iPhone SDK` 中的另一个难点：用于存储安全信息的钥匙串。`模拟器`和实际设备上可用的 `API` 略有不同，因此\
  \ `Buzz` 的 `SFHFKeychainUtils` 将其全部封装在一个类中，使其可以在这两个平台上使用。同样值得一看的还有他那些有用的用户界面元素。\n\
