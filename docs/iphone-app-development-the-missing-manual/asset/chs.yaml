  \ Hockenberry 的证书，可用于构建和运行所有 App，并且可以安装在所选设备上。\n\n## Xcode 设置\n\n你在配置门户中执行了许多步骤来创建配置描述文件。幸运的是，安装它非常简单。只需将\
