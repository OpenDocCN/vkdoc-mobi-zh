  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 章：构建你的第一个 iPhone 应用\n\
  \n你有一个创意，它将在 iTunes App Store 上为你带来名望与财富。\n\n你决定编写一个 iPhone 应用。第一个也是最重要的任务是熟悉用于构建产品的工具。中国有句古语：\"\
  旅途本身就是回报\"，而本章正是关于这段旅途的。在接下来的篇幅中，你将从头到尾体验整个应用开发流程。你将学习如何配置所需的软件，并亲自尝试构建一个应用。\n\n\
  但该构建什么应用呢？如果你快速搜索一下 App Store，会发现手电筒应用比比皆是。对于许多有抱负的开发者来说，这款简单的应用是入门必经之路。那么，现在正是你加入这群优秀开发者行列的机会。一旦你发现创建自己的应用如此简单，你就会纳闷为什么还有人愿意在\
  \ iTunes 上花 99 美分购买它！\n\n## 获取工具\n\n没有工具，你什么都做不了，包括 iPhone 应用。幸运的是，你可以在 Mac 上找到所有需要的东西，或者免费下载。具体来说，你需要在\
  \ Mac 上下载并安装 `Xcode` 开发软件和 iPhone 软件开发工具包（SDK）。（如果你没有 Mac，请参阅下一页的说明。）\n\nMac 和 iPhone\
  \ 都受益于一套经得起时间考验的丰富技术。iPhone SDK 基于 NeXT 公司在 20 世纪 80 年代创建的基础架构构建。这家由史蒂夫·乔布斯创立的公司，打造了一款革命性的面向对象操作系统，名为\
  \ `NeXTSTEP`。这个具有影响力的系统已演变为今天使用的 OS X 操作系统。随着你对 iPhone 的深入了解，你会发现它和 Mac 有许多共同之处。\n\
  \n**9**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 获取工具\n\n***注意：***\
  \ 每当看到以 \"NS\" 为前缀的对象时，你都能看到 NeXT 的遗产。这些缩写代表 `NeXTSTEP`。\n\n**快速入门**\n\n**买一台 Mac**\n\
  \n如果你想开发 iPhone 应用，就必须在 Macintosh 上完成。苹果的开发工具不能在 Windows 或其他任何操作系统上运行。就像你不能在 Mac\
  \ 上运行微软 Visual Studio 一样，你需要一台 Mac 来运行构建 iPhone 应用的工具。这些工具依赖于底层系统软件的特性。\n\n如果你没有\
  \ Mac，以下是一些提示，帮助你做出正确的购买选择：\n\n- **购买二手设备。** 如果预算紧张，可以看看 `eBay` 或 `craigslist`。别人淘汰的旧硬件完全可以满足\
  \ iPhone 开发的需求。你要创建的应用很小，不需要很强的处理器性能来构建和测试。购买较老硬件时唯一需要注意的是，确保这个 Mac 使用的是 Intel 处理器。开发工具不适用于较老的\
  \ PowerPC 处理器。\n\n- **添置一台 Mac mini。** 购买一台新的 Mac mini 是一个绝佳选择。将 Mac mini 连接到 KVM\
  \ 交换机后面很方便，这样你就可以快速在不同机器之间切换。\n\n- **不妨大方一次。** 苹果生产着一些非常性感的硬件。特别是新款笔记本电脑，让人难以抗拒。如果你正在寻找理由来证明这笔消费的合理性，这里有些帮助：Mac\
  \ 现在使用 Intel 处理器，这意味着你可以在新机器上运行 Windows 或任何其他基于 x86 的操作系统。你可以使用苹果免费的 Boot Camp 工具启动到任何操作系统。或者，你可能会发现安装第三方软件（如\
  \ `VMware Fusion`）更容易，从而在 Mac OS X 内的虚拟机上运行其他操作系统。当你需要查看 iPhone 产品网站在 Internet Explorer\
  \ 中的显示效果时，虚拟机尤其方便。只需启动虚拟机，在 Windows 中打开浏览器，然后加载测试 URL 即可。\n\n\n\n"
- "# 安装 Xcode\n\n如果你已经拥有显示器、键盘和其他外设，可以选择此方案。只需购买一台新 CPU 并复用现有设备，就能省下一笔可观的费用。如果你是软件开发人员，这些东西可能早就堆在储藏室里了。而且，如果你在多个平台进行开发，想想你在开发工具上能省下多少钱。如果你习惯了为\
  \ `Visual Studio` 和 `MSDN` 花费数千美元，那么得知苹果所有开发者工具都是免费的时，你会感到惊喜。把钱花在硬件而不是工具上，你会更划算。\n\
  \n当你和你的 Mac 准备就绪后，就该往硬盘里装载大量新软件了。苹果免费提供 `Xcode` 开发工具，但并未预装在每一台 Mac 上，因为大多数消费者永远不会用到它们。\n\
  \n## 获取工具\n\n幸运的是，你可以直接在 `Snow Leopard` 安装光盘上找到 `Xcode` 工具。\n\n要运行 `Xcode`，苹果建议你使用运行\
  \ `Leopard` 或 `Snow Leopard` 的 Intel Mac。以下步骤说明了如何将软件安装到硬盘上以供使用：\n\n**注意：** 你可以在\
  \ `Leopard` 上安装 `iPhone SDK` 和其他开发工具，但 `Snow Leopard` 版本的工具相比上一版本有显著改进。在最新版本的 `Mac\
  \ OS X` 上工作，能确保你获得最新、最强大的功能。\n\n1. 将安装 DVD 插入 Mac，双击其图标。在 `Optional Installs` 文件夹中，双击\
  \ `Xcode.mpkg` 文件。\n\n   双击该文件后，`Xcode` 安装过程开始。\n\n2. 在介绍屏幕上，点击 `Continue`。当许可协议屏幕出现时，点击\
  \ `Continue`，然后点击 `Agree`。\n\n   许可协议与你安装任何软件时同意的法律条文相同。如果你喜欢看这种东西，可以读一读。完成后，下一个屏幕会允许你选择要安装的内容，如图\
  \ 1-1 所示。\n\n   **图 1-1：** *Xcode 安装程序默认会为你选中除 `Mac OS X 10.4` 之外的所有复选框。保持这种状态即可。你可以点击每个软件包名称查看安装的具体内容：除了你期望的集成开发环境\
  \ (IDE) 之外，你还会找到用于监控性能的工具和大量文档。*\n\n3. 在 `Custom Install` 屏幕上，确保除 `Mac OS X 10.4`\
  \ 之外的所有复选框都已选中，然后点击 `Continue`。\n\n   安装程序会将 DVD 上的所有 `Xcode` 复制到你的硬盘上。此过程需要几分钟时间。\n\
  \n4. 最终屏幕会提示你选择安装位置。确保它与所有其他应用程序存储在同一磁盘上。点击 `Install` 开始安装。\n\n   根据你 Mac 的速度，此过程可能需要几个小时。暂时离开电脑，去呼吸一下新鲜空气。\n\
  \n   一切安全复制到硬盘后，你会看到以下消息：“安装成功。”\n\n5. 点击 `Close` 退出。\n\n6. 此时你可以安全弹出 DVD。\n\n安装完成后，进入硬盘上的\
  \ `Hard Drive ➝ Developer ➝ Applications` 文件夹，查看你的新工具。此文件夹包含你用于开发 Mac 和 iPhone 应用程序的应用程序和实用工具：你最常用的是\
  \ `Xcode` 和 `Interface Builder`。父级 `Developer` 文件夹中还包含所有附带的开发者框架、库和文档。\n\n`Xcode`\
