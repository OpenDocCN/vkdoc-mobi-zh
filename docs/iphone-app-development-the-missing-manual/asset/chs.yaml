  \ Xcode 可以使用的所有配置文件。你应该会看到**“iPhone Development”**及其过期日期。如果点击配置文件，你会看到一些关于它的附加信息，如图\
  \ 5-12 所示。\n\n## 清理、构建与运行\n\n现在你已经准备好构建并安装应用至你的 iPhone 了。确保你在配置中指定的其中一台设备已插入并准备就绪。当设备成功连接到\
