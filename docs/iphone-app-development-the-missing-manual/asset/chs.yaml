  \n### 广告与推广\n\n*获取高价值点击*\n\n如果能知道客户何时点击了导向你 iTunes 页面的链接，那该多好？如果还能知道该链接何时促成了一笔购买，那岂不是更棒？\n\
  \nApple 拥有所有这些宝贵信息，而最棒的是，你还能因此获得报酬！你正在将客户引导至 iTunes，因此，对于从入站链接产生的每笔购买，你将获得 5% 的佣金。只需注册成为\
  \ iTunes 联盟会员：`http://www.apple.com/itunes/affiliates/`。\n\n**注册**\n\n该计划通过第三方公司运营：你需在\
  \ `LinkShare` 创建一个账户。通过此账户，你可以申请成为 iTunes 联盟会员，创建定制链接，并查看统计数据：\n\n1. **前往 iTunes\
  \ 联盟会员页面（`http://www.apple.com/itunes/affiliates/`），然后点击“申请成为联盟会员”链接。**\n   你将被引导至\
  \ `LinkShare` 的注册页面。\n\n2. **选择合适的法律实体类型。**\n   如果你是独立开发者，请选择“个人”并提供社会安全号码（SSN）。对于企业，请选择相应类型并提供雇主识别号（EIN）。\n\
  \n3. **输入你的姓名和邮寄地址。**\n   `LinkShare` 使用此信息将你的收入支票邮寄给你。你还必须提供一个唯一的电子邮件地址和账户信息，以便访问该\
  \ Web 应用程序。\n\n4. **点击“继续”后，系统会提示你输入网站名称及其 URL 以及其他描述信息。**\n   如果你有公司网站，请使用它，因为你可能不希望每次发布新应用程序时都经历此注册过程。\n\
