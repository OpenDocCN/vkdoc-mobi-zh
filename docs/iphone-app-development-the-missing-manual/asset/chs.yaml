  \ 定义为 `com.squidger.TiddlywinksPro`，现在你有几种指定应用 ID 的选择：\n\n- `*` 匹配所有应用。你可以构建并运行设备上的任何应用，包括示例代码和其他第三方应用。但它缺少接下来两个选项所具备的特殊功能。\n\
