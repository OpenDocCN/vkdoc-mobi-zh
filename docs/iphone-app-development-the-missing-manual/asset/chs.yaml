  \ 已连接到水平滑块（图 3-6）。耶！\n\n\n\n### **图 3-6：**\n\n将 `slider` 控件添加为插座变量后，`HitMakerViewController`\
  \ 的连接检查器（Connection Inspector）显示如下。如你所见，`mySlider` 已连接到一个水平滑块。当你使用 Interface Builder\
