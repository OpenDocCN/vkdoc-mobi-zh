  \n---\n\n#### 第 7 章：后期润色\n\n现在，你已完成了 App Store 上最棒应用的编码工作。真的吗？\n\n现在是为你的应用做最后打磨抛光的时候了。这包括让更广泛的用户群体及其设备来测试你的作品。由于开发工作已接近尾声，现在正是清理界面图形的好时机。然后，就该开始为产品网站制作截图和其他推广材料了。\n\
  \n## Beta 测试\n\n在将应用提交到 App Store 之前对其进行测试，是开发过程中的重要一环。让你的作品展现在其他人面前，将帮助你发现设计和代码中的问题。\n\
  \n### 你的应用对你有效……但\n\n你和你的开发团队已经知道这个应用是如何工作的。你非常熟悉每个组件应该如何运作。代码在你的测试设备上完美运行。\n\n\
  换句话说，你与每个将从 App Store 下载你产品的人完全相反。\n\n*用户总能发现最离奇的问题*\n\n将你的应用交给从未见过它的人，会产生大量宝贵的反馈。正如你在第\
  \ 113 页所学到的，客户是你最强大的反馈机制，而 Beta 测试者就是你的第一批客户。\n\n---\n\n当你把应用交给其他人时，会发生两件事：\n\n\
  -   他们会发现你代码中的错误。\n-   他们会发现他们不理解的地方。\n\n在你全新的代码中发现错误可能会令人沮丧，但这比另一种情况要好得多。如果你在 App\
  \ Store 上发布了一个版本，然后发现很大比例的用户都遇到了问题，你将陷入相当大的困境。新版本的应用需要很多天才能被苹果审核通过并供用户使用。在此期间，客户会在\
  \ iTunes 上留下差评，你会面临负面新闻，并且会焦头烂额。\n\n但是，如果你的 *测试* 组中有很大一部分人不理解某个功能的工作原理，或者在使用你的应用时感到沮丧，那反而是好消息。这意味着你的某个设计决策是错误的。听到这样的反馈时不要沮丧：每个开发者在某个时刻都收到过这样的反馈。现在是你扭转局面的机会，以免\
  \ App Store 上的客户抱怨同样的问题！\n\n### 手电筒改进\n\n事实上，你在上一章看到的手电筒就是根据测试者的反馈进行了一些设计修改。你可能会在自己的应用中也遇到类似的问题：\n\
  \n-   测试组中的几个人发现，快速更改亮度很麻烦。他们每次都必须进入和退出设置来调整灯光级别。他们真正想要的是一个简单的手势来临时降低亮度。这就是 `LightView`\
  \ 中单击手势的由来。\n-   另一位测试者抱怨说，很容易不小心关掉闪光灯。她在晚间锻炼时，将安全灯戴在臂包里，跑步时不小心碰到了工具栏。`LightView`\
  \ 中的单击手势被扩展为双击锁定屏幕。\n-   团队中的设计型成员希望应用中有一些视觉亮点。设置视图看起来已经足够酷了，但他想要 App Store 上其他手电筒都没有的东西——电池！在翻转到设置时看到的背景，是通过在\
  \ `MainWindow` 中放置一个 `UIImageView` 就能轻松添加的功能。\n\n手电筒的代码中有几个错误，如果没有 Beta 测试者的帮助，你是不会发现的：\n\
  \n-   由于 `Localizable.strings` 中的问题，意大利语本地化在某些情况下显示不正确。该用户还发现了一个问题，即长消息无法在 `IFInfoView`\
  \ 中正确显示。\n-   另一位测试者发现了一个开发团队从未考虑过的错误：你可以调暗灯光亮度并启动 SOS 闪光灯。这会阻止警告信号发挥最大效果。\n\n幸运的是，没有出现任何严重问题，Beta\
  \ 测试进行得很顺利！\n\n---\n\n## Ad Hoc 分发\n\n那么，你如何将这个 Beta 版分发给你的测试者呢？通过一种叫做 *Ad hoc 分发*\
  \ 的机制。这种技术允许你与多达 100 名测试者分享你的 iPhone 应用。\n\n但首先，你需要对你的项目进行一些额外的修改，以便这些用户能在他们的 iPhone\
  \ 或 iPod touch 上运行它。\n\n### 收集测试者信息\n\n第一步是从潜在的测试者那里收集设备 ID。你可以使用与第 137 页相同的技术。对于大多数测试者来说，在\
  \ iTunes 中点击序列号，或者从 App Store 运行免费的 `Ad Hoc Helper` 应用，是获取 40 位 UDID 字符串的最简单方法。\n\
  \n作为此过程的一部分，也要获取测试者的电子邮件地址和他们拥有的设备类型。你将使用这些电子邮件地址来设置邮件列表。了解他们正在测试的设备类型，将有助于调试特定于硬件的问题。\n\
  \n***提示：** 请记住，你的 iPhone 开发者账户限制你在整个一年内只能注册 100 台设备。请确保 Beta 测试的人数远低于这个数字。*\n\n\n\
  请注意：你给出的示例中，`varName` 等标记规则非常明确。在处理你提供的文本时，我将严格遵循此规则，对所有可能被误解为变量、函数、命令或路径的专有名称或代码片段添加反引号。\n\
  \n由于原文中包含大量粗体、斜体以及图片和页码等排版元素，我将在保留核心内容的前提下，去除不必要的格式，并对关键代码/文件名/路径等添加反引号。\n\n---\n\
  \n请注意，每增加一名新测试员，都会增加运行 Beta 测试的工作量：你需要回应更多反馈、帮助解决更多安装问题，并提供额外的测试员支持。对于大多数应用来说，20\
  \ 到 40 人的测试组就能提供足够的测试覆盖。\n\n## 分发\n\n到目前为止，你仅配置了用于开发的设备。这些描述文件设计为在 Xcode 环境中工作。例如，开发描述文件包含一个配置值，允许调试器在应用启动后附加到其进程中。\n\
  \n你的测试员不会使用 Xcode，因此他们需要一种不同类型的描述文件：用于通用分发的描述文件。幸运的是，创建这些描述文件的流程与你之前用于开发的流程非常相似，所以不会出现意外。\n\
  \n### 证书\n\n与开发描述文件的流程相同，第一步是使用“钥匙串访问”生成证书：\n\n1.  使用`钥匙串访问`应用的助手生成请求。首先，选择`钥匙串访问`\
  \ → `证书助理` → `从证书颁发机构请求证书`。  \n    此时会打开`证书助理`对话框。\n\n2.  在`用户电子邮件地址`字段中，输入你的电子邮件地址。\
  \  \n    请使用你注册`iPhone 开发者计划`时使用的同一邮箱。\n\n3.  在`常用名称`字段中，输入你的（或你公司的）名称。勾选`存储到磁盘`以创建文件。\
  \  \n    如果你以个人开发者身份注册，请使用你注册 iPhone 开发者时使用的同一名称。如果你使用公司账户注册，请使用同一公司名称。\n\n4.  点击`继续`。\
  \  \n    系统会提示你保存证书请求。\n\n5.  将文件名改为`Distribution.certSigningRequest`，并将其保存在桌面上。\n\
  \n6.  看到确认屏幕后，点击`完成`关闭助手。\n\n然后，需要将该证书请求上传到`配置门户`。（如果您需要重温门户是什么以及如何访问它，请参见第 136\
  \ 页。）\n\n1.  在`配置门户`页面，点击左侧栏中的`证书`。  \n    此时会打开`证书`页面，默认显示在`开发`选项卡。\n\n2.  你需要创建一个分发证书，因此请切换到`分发`选项卡。你会看到一条警告，提示你没有有效的证书；点击`请求证书`按钮以上传你的请求。\
  \  \n    点击`选取文件`，会打开一个文件对话框（图 7-1）。\n\n3.  导航到桌面上的`Distribution.certSigningRequest`，然后点击`选取`。\n\
  \n4.  回到`分发`选项卡，在右下角点击`提交`。  \n    你会看到请求已提交的确认信息。证书的状态显示为`待批准`。信不信由你，苹果是在要求你批准你自己的请求。\n\
  \n> **注意：** 如果你使用的是公司账户，只有团队代理人可以批准证书请求。代理人是最初注册开发者账户的人。\n\n5.  在`操作`列中，点击`批准`。\
  \  \n    状态列会变为`待签发`。\n\n6.  稍等片刻后，你应该能够刷新浏览器并看到`下载`按钮；点击它。  \n    下载完成后，你应该会在`下载`文件夹中看到一个`distribution_identity.cer`文件。\n\
  \n7.  双击打开`distribution_identity.cer`文件。  \n    系统会提示你确认添加此新证书。\n\n8.  确保`钥匙串`弹出菜单设置为`登录`，然后点击`添加`。\
  \  \n    至此，你的钥匙串已正确设置。你应该能在“钥匙串访问”中看到`iPhone 分发`以及你的名称。\n\n与开发者证书签名请求一样，建议保存你的分发请求文件以备将来使用。这样当你的\
  \ Beta 构建因证书过期而出问题时，就能少一个麻烦。\n\n如果你使用的是公司账户，团队中的每位开发者都有一个用于开发的个人代码签名证书。而对于分发证书，整个公司只有一个。这是因为苹果想要验证的是创建软件的**公司**，而不是执行构建的**个人开发者**。\n\
  \n> **提示：** 如果你需要检查证书签名请求的内容，请在`终端`窗口中使用以下命令查看：  \n> `$ openssl req -noout -text\
  \ -in Distribution.certSigningRequest`  \n> 输出将显示请求中使用的电子邮件地址和常用名称（CN）。\n\n### 设备\n\
  \n一旦你从 Beta 测试员那里收集到相关信息，就去`配置门户`，在`设备`部分花些时间。为测试员添加设备的过程与你之前在第 144 页使用的过程完全相同。\n\
  \n门户并不区分用于开发和分发的设备。\n\n请确保使用可以一次性添加多个设备的功能。点击每行末尾的`+`图标，即可获得另一个用于输入设备名称和 ID 的输入字段；这能让这项繁琐的工作稍微快一点。\n\
  \n### App ID\n\n在这个例子中，你正在分发公司的 Beta 应用。你希望你的`App ID`能够反映这一点。假设你的公司是 Squidger Industries，你的互联网域名为`squidger.com`。以下是创建名为`Squidger\
  \ Apps`的`App ID`的方法：\n\n1.  在`配置门户`页面，点击左侧栏中的`App ID`。  \n    你应该会看到用于开发的、名为`所有应用`的`App\
  \ ID`。\n\n2.  点击`新建 App ID`，添加你要用于分发的新 ID。\n\n3.  在`描述`字段中，输入`Squidger Apps`，作为用于构建和运行\
  \ Squidger 应用的 App ID 的提醒。保持弹出菜单设置为`生成新项`。  \n    接下来，输入用于匹配应用的模式。\n\n4.  为`Bundle\
  \ Identifier`输入`com.squidger.*`，然后点击`提交`。  \n    返回到主`App ID`页面后，你会在`描述`列中看到`Squidger\
  \ Apps`（图 7-2）。\n\n现在，你已经准备好将所有这些整合到配置描述文件中！\n\n### 配置\n\n正如你在证书中看到的，当你选择`配置门户`中的`配置`部分时，会有一个额外的选项卡。这里你可以创建和管理用于分发的描述文件。现在，你只需为\
  \ Beta 测试创建一个描述文件，但最终你会添加一个用于在 iTunes 上分发应用的描述文件。\n\n切换到`分发`选项卡后，点击`新建描述文件`，你会看到一个与开发时非常相似的界面。最大的区别在于，你现在看到列出了`分发方式`。由于你尚未准备好发布到`App\
  \ Store`，请点击`Ad Hoc`，你就万事俱备了。\n\n在填写`描述文件名称`时，请花点时间考虑一下你的测试员。他们喜欢帮助开发者，并且很可能也在测试其他人的软件。\n\
  \n\n如果你将配置文件的名称设置为“Beta Test”，当它出现在测试人员的手机上时会令人困惑。而且当他们的 Beta Test 配置文件过期时，他们不知道向谁申请新的配置文件。\n\
  \n最好使用公司名称作为`Profile Name`。例如，如果你输入`Squidger Beta Distribution`，你的测试人员就会知道这是用于测试`Tiddlywinks\
  \ Pro`的配置文件。这个描述性名称也会对你有所帮助，你很快就会明白。\n\n对于`App ID`，选择`Squidger Apps`，这样你的测试人员就可以运行来自`Squidger\
  \ Industries`天才团队的任何及所有应用程序。\n\n***注意：*** 如果你正在使用推送通知或进行应用内购买，你需要选择已配置了这些功能的`App\
  \ ID`。这两个功能都需要一个*不*使用通配符（`*`）的标识符。\n\n在`Devices`下，点击`Select All`，你所有的 beta 测试人员都将被添加到这个分发配置文件（`distribution\
  \ provisioning profile`）中。\n\n***提示：*** 请记住，如果你为 beta 测试人员添加了新设备，你需要更新此配置文件，并向测试人员提供一份`*.mobileprovision`文件的副本。很容易忘记这个重要步骤，这会给你和测试人员都带来困惑。\n\
  \n点击`Submit`，门户网站将开始生成你的分发配置文件。几秒钟后，你应该能够刷新浏览器并看到`Download`链接。点击该链接，然后将`Squidger_Beta_Distribution.mobileprovision`文件拖拽到\
  \ Xcode 的应用图标上，将其添加到 Xcode 中。\n\n将`*.mobileprovision`文件保存在安全的地方。你将把它发送给你的 beta 测试人员。\n\
  \n第 7 章：收尾工作\n\n**219**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  **Beta 测试**\n\n*授权*\n\n现在你已经配置好了配置文件，将注意力转向 Xcode 的构建设置。\n\n为开发版本和为分发配置文件签名代码的主要区别在于允许\
  \ Xcode 调试进程的配置参数。`get-task-allow`键的默认值启用了调试功能，但当你在进行 Ad Hoc 分发时，必须关闭此设置。\n\n为此，更改代码签名期间使用的授权（Entitlements）配置。步骤如下：\n\
  \n**1. 在 Xcode 中，选择 File** ➝ **New File。然后，在 New File 对话框中，在 iPhone OS 源列表中选择 Code\
  \ Signing。**\n\n你会看到两个模板：`Entitlements`和`Resource Rules`，它们都能让你配置代码签名。\n\n**2. 选择`Entitlements`模板，然后点击`Next`。**\n\
  \n**3. 将 File Name 字段设置为`dist.plist`**，并将 **Location** 设置为项目文件夹的顶层。确保该文件已添加到正确的目标（targets）中。点击\
  \ **Finish**。\n\n该文件现在应出现在属性列表编辑器中。\n\n**4. 关闭`get-task-allow`**复选框，然后保存文件。\n\n\
  现在你有了一个可以禁用调试器的文件。剩下要做的就是将该文件添加到一个目标中。\n\n***提示：*** 不要害怕偷懒，直接使用 Flashlight Pro 应用中的`dist.plist`文件。上述步骤已为你完成！\n\
  \n正如第 127 页所述，将你的 beta 版本放在一个单独的目标中是很方便的。由于目标设置会覆盖项目和 Xcode 中的对应设置，因此它是定义你希望如何构建\
  \ beta 版本的绝佳位置。\n\n事实上，这在 Flashlight Pro 项目中已经完成了。如果你打开`Targets`，会看到一个名为“Safety\
  \ Light (Beta)”的目标。当你双击此目标时，会出现包含构建设置的窗口。确保`Configuration`设置为`Release`，然后向下滚动到`Code\
  \ Signing`部分；你会看到`Code Signing Entitlements`被设置为`dist.plist`。\n\n**220**\n\niPhone\
  \ App Development: The Missing Manual\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**Beta 测试**\n\n**高级用户诊所**\n\n**目标还是配置？**\n\n一些开发者会创建一个 Distribution 构建配置，在源列表中选择\
  \ Other，然后将其作为存储 beta 设置的位置。他们不选择新的构建目标，而是从 Other 列表中选择 Aggregate。\n\nFlashlight\
  \ Pro 项目对 beta 和最终应用构建都使用了聚合目标。在`Groups & Files`中的`Targets`下，你会看到两个红色的目标图标：`Beta`和`Final`。\n\
  \n如果你展开`Beta`的展开三角形，你会看到聚合目标首先构建`Safety Light (Beta)`，然后运行一个名为`Package Release`的脚本。如果你双击该脚本名称，你可以编辑它。此脚本会备份\
  \ dSYM 调试信息（用于处理崩溃报告），并创建一个你可以分发给测试人员的 ZIP 文件。\n\n使用多个目标时，你可以同时使用几个脚本。在`Final`目标中，发布的打包方式与\
  \ beta 构建时相同，然后重新签名，以便你可以在测试设备上运行它。\n\n你可以通过右键单击目标名称，选择 Add ➝ New Build Phase ➝\
  \ New Run Script Build Phase，将你自己的脚本添加到聚合目标中。一个很好的例子是，一个将你的 beta 构建上传到服务器以便测试人员下载的脚本。\n\
  \n为了进一步自动化此过程，flashlight 项目有两个 shell 脚本。在终端中从命令行运行`build_beta`或`build_final`后，你会得到一个准备分发给\
  \ beta 测试人员或上传到 App Store 的 ZIP 文件。\n\n另一种方法是，他们只更改 Active Configuration，然后再进行构建。这种方法的问题在于，你现在有两个“发布”配置。如果你更改了\
  \ Release 配置中的一个构建设置，却忘记在 Distribution 中更新相同的设置，你的 beta 测试人员将无法与你使用相同的代码进行工作。随着你添加最终版本、产品的精简版、最终版本的\
  \ Lite 版本等等，你最终会拥有许多配置。\n\n当使用多个目标时，你也会遇到类似的问题：你可以将一个文件添加到一个目标，却忘记添加到其他目标。实际上，很容易发现这个错误——当你在`Groups\
  \ & Files`中使用展开三角形时，你会看到不同的文件数量。所有目标在`Copy Bundle Resources`、`Compile Sources`和`Link\
  \ Binary With Libraries`之后括号内的项目数量应该相同。此外，如果目标缺少文件，你很可能会看到一个编译器错误来提醒你这个差异。\n\n使用目标的另一个优点是它们可以用来自动化你的构建过程。你可以创建“聚合”目标，让你运行执行后处理的脚本。要创建聚合目标，进入`Groups\
  \ & Files`，右键单击`Targets`，然后选择`Add Target`。在出现的窗口中，选择`Other`源列表中的`Aggregate`。\n\n\
  更改了授权构建设置后，你还需要更改下面几行的`Code Signing Identity`设置。使用`Any iPhone OS Device`以及`iPhone\
  \ Distribution`。自动配置文件选择器应该会显示它匹配到了`Squidger Beta Distribution`或你在设置分发配置文件时提供的任何名称。\n\
  \n*构建与发送*\n\n现在你的构建设置已经准备就绪，是时候进行构建了。在动手之前，在 Xcode 中做最后一次编辑：将`Info.plist`中的“Bundle\
  \ version”更改为能够唯一标识此版本的名称。如果这是你的第一个版本的第一次 beta 测试，请使用类似`\"1.0b1\"`的名称。现在转到 Project\
  \ ➝ Set Active Target，\n\n第 7 章：收尾工作\n\n**221**\n\n![Image 64](img/index-240_1.jpg)\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**Beta 测试**\n\n选择你的 beta 版本目标，并进行一次清理构建（第\
  \ 148 页）。如果一切顺利，不久你就会看到“Succeeded!”\n\n\n\n***注意：*** `Flashlight Pro` 项目包含两个 Beta\
  \ 目标。第一个名为“`Safety Light (Beta)`”，用于构建应用程序。第二个是一个聚合目标，名为“`Beta`”，它使用第一个目标构建应用，生成\
  \ ZIP 文件，并将应用上传到下载服务器。\n\n构建完成后，请为你打算发送给测试人员的应用程序创建一个 Zip 文件。进入目标的构建文件夹，你会看到如图 7-3\
  \ 所示的内容。\n\n***图 7-3：*** 构建完成后，目标的文件夹中包含一个带圆圈反斜杠符号的应用程序以及一个 `dSYM` 文件。Mac 和 iPhone\
  \ 版本的 OS X 都使用 `Info.plist` 文件。别担心——该符号仅表示 Mac 和 iPhone 使用不同的处理器。带有 `.dSYM` 扩展名的文件包含调试符号。在发送给\
  \ Beta 测试人员之前，请先压缩应用程序文件。\n\n***提示：*** 你可以通过查看“`Per-configuration Build Products\
  \ Path`”来确定目标的构建文件夹。\n\n设备构建的默认值为 `build/Debug-iphoneos` 和 `build/Release-iphoneos`。`Flashlight\
  \ Pro` 项目会在文件夹名称前添加“`Beta—`”和“`Final—`”，这样你的测试构建就不会与你的 Beta 和最终构建混淆。\n\n**Beta 测试**\n\
  \n创建 Zip 文件的最快方法是在按住 Control 键的同时单击（或右键单击）应用图标，然后从快捷菜单中选择“压缩”。请将此 Zip 文件保存在安全位置，因为你将把它发送给\
  \ Beta 测试人员。你可能还需要使用在 `Info.plist` 中使用的相同版本号重命名该文件，这有助于你和 Beta 测试人员追踪多个版本。像 `TiddlywinksPro-1.0b1.zip`\
  \ 这样的命名方式就很合适。\n\n还记得几页前你保存的那个 `.mobileprovision` 文件吗？是时候把它找出来，与应用程序 Zip 文件一起发送了。然后将\
  \ `TiddlywinksPro-1.0b1.zip` 和 `Squidger_Beta_Distribution.mobileprovision` 文件一并附加到发送给\
  \ Beta 测试人员的邮件中。\n\n但在发送邮件之前，你还需要再做一次测试。你需要确保你的测试人员能够安装并运行该软件。\n\n**安装**\n\n你的 Beta\
  \ 测试人员可能没有 Xcode 及其管理工具窗口来安装配置文件和应用。如果你有使用 Windows 的测试人员，他们肯定无法运行这个 Mac 应用程序。那么，诀窍是什么呢？\n\
  \n实际上，有两种方法。第一种也是最简单的方法是使用 iTunes！\n\n**iTunes。** 你的 Beta 测试人员收到你的测试软件后，首先要做的就是解压\
  \ Zip 文件。只需在 Finder 中双击该文件，就会出现带圆圈反斜杠的应用图标。此时，安装应用只需将应用程序和配置文件拖放到 iTunes 的应用资料库中即可（图\
  \ 7-4）。\n\n***图 7-4：*** 测试人员可以使用 iTunes 安装你的 Beta 应用程序和配置文件。他们只需将应用和 `.mobileprovision`\
  \ 文件拖入 iTunes 的应用资料库即可。\n\n**Beta 测试**\n\n添加到 iTunes 的应用其行为与从 iTunes 购买的应用非常相似。唯一的区别是它们显示的是“`Unknown\
  \ Genre`”而不是类别名称。你甚至可以使用 `文件` ➝ `显示简介` 来查看版本号。毫不意外，你可以随后将 Beta 应用同步到设备上（图 7-5）。\n\
  \n***图 7-5：*** Beta 应用可以像 App Store 中的任何其他应用一样同步到测试人员的设备。只需确保在开始同步前，应用名称旁已勾选即可。\n\
  \n\n\n***注意：*** Windows 上的测试人员可能会对 Zip 文件中的内容感到困惑。Mac OS X 会添加一些额外信息，导致难以在归档文件中找到该应用程序。幸运的是，你可以采取额外步骤来简化此过程：*http://www.markj.net/iphone-ad-hoc-distribution-windows-mac/*。\n\
  \n同步过程还会将配置文件（provisioning profile）移至设备上。你可以通过前往 iPhone“设置”应用中的“通用”➝“设备管理”来检查其是否已正确安装，并核对名称和到期日期。如果看到错误的配置文件，请在设备上将其删除，然后重新同步。任何已过期或重复的配置文件都只会引发问题：最好立即将其清除。\n\
  \n检查正确配置文件已安装后，你应该能够启动手机上的应用程序。检查 Credits 画面以确保安装了正确的版本。（现在你知道为什么有这个视图很有用了吧！）\n\n\
  **224**\n\niPhone 应用开发：Missing Manual 手册\n\n![图片 67](img/index-243_1.jpg)\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## Beta 测试\n\n***注意：*** 在图 7-5 中，你会看到 Safety Light 在 iTunes 中显示了自定义图稿（应用图标上写有“BETA”字样）。这是通过向\
  \ Beta 目标添加一个 `iTunesArtwork` 文件来实现的。该文件是一个 512 × 512 像素的 PNG 文件，但去除了扩展名。\n\n`Flashlight\
  \ Pro` 项目演示了如何在 Beta 目标中执行此操作。如果你不包含此文件，一切仍能正常运行，但你的测试人员会看到一个通用图标。在图标上添加文字是为了提醒测试人员他们正在使用\
  \ Beta 版本。\n\n请确保你**不要**将 `iTunesArtwork` 添加到最终上传至 App Store 的构建版本中。Apple 会在提交后添加此图稿，如果它已经存在，可能会引发问题。\n\
  \n**iPhone 配置实用工具。** 第二个技巧是使用 iPhone 配置实用工具。Apple 在 *http://www.apple.com/support/iphone/enterprise/*\
  \ 为 Mac 和 Windows 提供了此工具。它最初是为 iPhone 应用的企业部署而开发的，但同样非常适合 Beta 测试人员使用。\n\n***注意：***\
  \ Ad Hoc 分发最早是在 2008 年史蒂夫·乔布斯的 WWDC 主题演讲中引入的。它当时被宣传为企业客户分发其应用的一种方式。像你这样的独立开发者另有想法，并迅速将\
  \ Ad Hoc 分发用于 Beta 测试。\n\n下载、安装并启动该应用程序后，你会看到一个类似图 7-6 的界面。\n\n***图 7-6：*** *测试人员也可以使用\
  \ iPhone 配置实用工具来安装和管理你的应用程序的 Beta 发布版本。此工具可以更轻松地管理多个应用程序和配置文件。选择设备名称（此处为“Due”）后，你可以使用“配置描述文件”和“App”选项卡来安装和移除这些项目。*\n\
  \n使用此实用工具时，请在源列表中选择“App”，然后拖入新的应用程序以更新列表。同样，你可以将 `*.mobileprovision` 文件拖入“设备”显示的列表中。\n\
  \n第 7 章：最后润色\n\n**225**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  **Beta 测试**\n\n注册完这两项内容后，切换到源列表中已命名的设备，并使用“配置描述文件”和“App”选项卡进行安装和卸载。与 iTunes 不同，你还可以查看配置文件的到期日期。另一个巨大的优势是，你可以在不进行同步的情况下安装，这对于在工作场所进行测试但设备与家中\
  \ iTunes 媒体库绑定的测试人员来说非常重要。\n\n反复如此。除非你运气极好，否则很可能会有不止一个 Beta 版本。你需要为测试人员提供如何更新现有\
  \ Beta 安装的建议。对于使用 iTunes 的测试人员，过程非常简单。他们只需将新版本的应用拖入 iTunes 即可。他们会看到一条警告，提示该应用已存在，然后使用“替换”来更新到新版本。\n\
  \n\n\n# 若需新的配置文件\n\n若需新的配置文件，测试人员应删除设备上现有的配置文件，然后将新文件拖入 `iTunes`。文件替换前会出现另一条警告。待更新文件就位后，同步操作会将新版本传输到设备上。\n\
  \n如果测试人员使用 `iPhone Configuration Utility` 安装测试版本，他们必须先彻底卸载应用，然后进行全新安装。这会清除所有现有文档，因此游戏分数和其他应用数据将丢失。\n\
  \n**注意：** 添加新版本的应用后，版本号可能显示不正确。若要查看正确信息，需退出并重新启动 `iPhone Configuration Utility`。\n\
  \n## 崩溃应对\n\n你的代码完美无瑕，对吧？没错，每个开发者都这么想，直到那些狡猾的测试人员拿到它。\n\n崩溃难免会发生。而这是件好事——最好在 App\
  \ Store 的用户发现之前，就抓住那些糟糕的内存引用、缺失的方法以及其他问题。\n\n现在遇到的每个崩溃，都是日后不会重现的隐患。\n\n`iPhone OS`\
  \ 会记录设备上发生的每一次崩溃。当崩溃发生时，系统会自动生成一个名为*崩溃报告*的文件。通常，当用户与 `iTunes` 同步时，这些文件会被上传到 Apple。还记得应用崩溃后首次同步时\
  \ `iTunes` 弹出的对话框吗？当看到“您的设备包含诊断信息……”时，那就是崩溃报告首次被检测到并发送给 Apple。\n\n你可以直接从测试人员那里获取这些崩溃报告。Apple\
  \ 在技术说明 TN2151 (http://developer.apple.com/iphone/library/technotes/tn2008/tn2151.html)\
  \ 中描述了该过程。简而言之，测试人员可以从其 Mac 或 PC 的 `iTunes` 中提取 `.crash` 文件，并通过邮件发送给你。然后你在 `Xcode`\
  \ 中打开 `Organizer` 窗口，将该文件拖入 `IPHONE DEVELOPMENT` 下的崩溃日志列表中。处理完崩溃报告后，数字内存地址会转换为带有行号的类名和方法名，这些行号与你源代码中的行号对应。\n\
  \n**注意：** 此步骤中最重要的是保存 `dSYM` 文件和应用二进制的副本。它必须与你发给测试人员的版本完全一致，且文件必须归档在同一文件夹中。这就是 `Flashlight\
  \ Pro` 项目能按日期和时间自动保存这些文件的原因。\n\n一旦获得这些信息，通常很容易追踪到错误的根源。\n\n## 整理收尾\n\n在进行测试时，你不应同时进行活跃开发。如果那样做，测试人员面对的就是一个不断变化的目标。冻结功能集并集中精力修复出现的问题，这符合所有人的最佳利益。\n\
  \n鉴于这种“不要碰代码”的指令，测试阶段正是开始整理应用外观的好时机。如果你正在进行本地化，这也是收集翻译文本并分发给测试人员的正确时机。\n\n### 美化委员会\n\
  \n开发者编写优美的代码。设计师绘制精美的图形。图 7-7 展示了开发者制作图形时可能呈现的效果。\n\n**图 7-7：** 开发过程中使用了占位图形的手电筒用户界面。测试阶段可能是清理应用视觉效果的好时机，因为无需修改大量代码即可完成。\n\
  \n而当设计师出手相助时，每个人都受益。请查看图 7-8。\n\n**图 7-8：** 与图 7-7 相同的屏幕，但使用了设计师制作的图形。注意，由专业人士完成的工具栏图标、设置和致谢屏幕看起来要美观得多？这一改进让应用显得精致而完整。\n\
  \n\n\n# 项目生命周期中的激动人心时刻\n\n对大多数开发者来说，看到最终图形界面是一个神奇的时刻。你最早随手塞进应用里的粗糙图片被替换掉了，应用瞬间感觉好了千百倍。这对设计师而言同样是一个特殊时刻：她终于能看到自己的像素动起来了。每个人的愿景都得以实现。\n\
  \n作为清理流程的一部分，给设计师提供每个文件的书面说明通常很有帮助。作为开发者，你知道 `ToolbarDiscoStart.png` 是如何被使用的，因为它就在源代码里。但大多数设计师不读代码，所以对她们宽容点；明确说明你的需求。务必指定图形所需的任何特殊尺寸、颜色或位置要求。\n\
  \n**提示：** 手电筒项目的 `Images` 文件夹中包含一份清单文件，它解释了每个图形的用途。这样你可以把整个目录交给设计师，而她也能拿到所需的所有东西。\n\
  \n# 多语言支持\n\n在图 7-8 中，你可能注意到界面显示的是意大利文。\n\n*太棒了！*\n\nBeta 测试也是处理应用中任何本地化工作的好时机。如果你在代码中一直勤勉地使用\
  \ `NSLocalizedString()`，那么这项工作相对容易。为你的外语翻译人员创建一个本地化包。这个包包含 `Localizable.strings`\
  \ 文件和任何需要更新的 NIB 文件。把所有东西放进一个 Zip 文件并发送出去。\n\n# 网站开发\n\n拿到本地化文件后，你可以将它们添加到项目中并执行构建。确保你的翻译人员也参与\
  \ Beta 测试，因为他们需要检查最终结果。你肯定不希望有任何 *蠢货* 漏网！\n\n一旦你更新了图形并启动了本地化工作，就可以开始考虑为产品建立推广网站。有些开发者认为他们需要的唯一推广就是\
  \ iTunes 本身。对于一些简单的产品，这种方法效果不错。但如果你有一个稍显复杂的产品，就需要一种方式向潜在客户展示其功能。\n\nApp Store 只允许你展示五张截图，并且无法展示产品运行中的视频。一旦人们看到你的产品有多棒，他们就会想购买。一个产品网站能让你比在\
  \ iTunes 内更详细地解释产品。\n\n在这项工作中，请与你的设计师和市场人员合作。同样重要的是，要意识到为网站开发视觉效果和销售文案需要时间。这就是为什么你应该尽早开始这项工作。\n\
  \n## 网站结构\n\n作为开发者，你可以通过搭建一些基本元素来帮助大家。\n\n例如，用 HTML 搭建网站的基本结构，并设置好网页服务器来托管文件。\n\n\
  **注意：** Missing CD（`www.missingmanuals.com/cds`）包含了 Safety Light 网站的 HTML 和 CSS\
  \ 源代码。它被设计为可适应多种不同类型的应用，因此你可以随意将其用于你自己的产品。\n\n在建设这个网站时，务必记住：*许多* 用户会通过 iPhone 或\
  \ iPod touch 访问。你需要确保你设计的任何方案都能在小屏幕格式上正常工作。令人惊讶的是，有多少开发者从未在自己的设备上打开过产品网站！\n\n###\
  \ 内容\n\n大多数情况下，iPhone 可以显示与桌面浏览器相同类型的图片。但要注意如何呈现这些图片。避免使用 JavaScript 对截图进行花哨的缩放操作：缩放会慢得令人沮丧，而且在设备上不经过捏合操作，“全窗口”显示很难导航。\n\
  \n\n\n在网站上，一行额外的 HTML 代码也非常重要：\n\n`<meta name=\"viewport\" content=\"width=999\"\
  \ />`\n\n这行代码向 Safari 提示你网站的宽度，以便它优化显示。将“999”替换为你希望网站加载时缩放到的实际宽度。你可以在 A List Apart\
  \ 的这两篇文章中了解这些技巧以及网络开发者可对移动版 Safari 使用的许多其他技巧：\n\n- `http://www.alistapart.com/articles/putyourcontentinmypocket/`\n\
  - `http://www.alistapart.com/articles/putyourcontentinmypocketpart2/`\n\n花几分钟熟悉一下移动版\
  \ Safari 的功能——你的未来客户会因此感谢你。\n\n## 电影\n\n如果你要在产品网站上包含一段电影，你*必须*遵循一条规则：不要使用 Flash。iPhone\
  \ 上的 Safari 无法显示它，因此所有为产品制作精彩介绍的工作都将白费。\n\n相反，请使用`QuickTime`来创建电影。该应用程序（如图 7-9 所示）可以接受单一电影，并针对桌面和移动设备显示进行优化。\n\
  \n导出过程还会生成一些 HTML 和 JavaScript 代码，方便你将输出内容整合到网站中。你指定的输出文件夹包含一个`ReadMe.html`文件（图\
  \ 7-10），其中包含详细信息。\n\n另一种播放电影的方式是使用 YouTube。是的，即使 YouTube 使用 Flash，你也没有违反规则。YouTube\
  \ 会将你上传的电影转换为不同的文件格式。在桌面上观看时，电影会在 Flash 播放器中显示。而在 iPhone 上，则使用 H.264 视频——与 iPhone\
  \ 的 YouTube 应用程序中使用的格式相同。虽然你对演示的控制能力会降低，但 YouTube 可以是一种廉价且有效的产品推广方式。\n\n**230**\n\
