  **App Store，你来了**\n\n## 跟踪\n\n当客户开始访问你的产品网站时，你会想知道有多少人访问以及他们从哪里来。这些信息将指引你找到评论你应用程序的网站、在\
  \ Twitter 上提及它的人以及在线论坛的评论。你会非常清楚地了解人们对你作品的看法。\n\n跟踪网站访问者的最佳方法是使用名为 Mint (`http://haveamint.com`)\
  \ 的产品。这个简单的系统通过在你的 HTML 头部添加一行 JavaScript 代码来记录网站的所有访问者。你需要 PHP 和 MySQL 才能安装此产品，但大多数网络托管公司都会免费提供。\n\
  \n要了解它的工作原理，你可以查看 Safety Light 应用程序的网站统计信息 (`http://safetylightapp.com/mint/`)。不必担心你的竞争对手能对你的网站这样做：标准的\
  \ Mint 配置使用密码来保护这些信息。此站点上已启用此功能，仅用于演示其能力。\n\n**App Store，你来了**\n\n当你的 Beta 测试正在进行时，这也是连接到\
  \ iTunes 的最佳时机。当测试人员对产品进行全面测试时，你可以开始准备将其上架销售所需的工作！\n\n是时候访问另一个为 iPhone 开发者服务的 Apple\
  \ 网站了……\n\n\n\n**232**\n\n**iPhone 应用开发：缺失的手册**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n# 章节\n\n## 待售\n\n你的 Beta 测试进展顺利，所以现在是时候将注意力转向如何销售最终产品了。iTunes 上有超过 10 万个应用程序，现在轮到你的应用加入它们了。\n\
  \n本章将向你介绍 `iTunes Connect`，这是一个能访问 App Store 中产品数据库的 Web 应用程序。你将使用浏览器来设置财务细节、提供应用信息、设定或更新定价，以及上传最终版本。\n\
  \n你还会遇到苹果公司对每个提交的审核流程。这是 iPhone 开发中比较令人沮丧的领域之一，因此本章将向你展示如何让这个过程更顺畅。\n\n### 签约落笔\n\
  \n你在 `iTunes Connect` 中要做的第一件事，就是与你的新合作伙伴处理法律合同和银行信息。\n\n#### 欢迎\n\n要登录 `iTunes\
  \ Connect`，请在浏览器中访问 `http://itunesconnect.apple.com`。\n\n花点时间将这个网址加入书签——你会经常用到它。在登录屏幕上，输入你的\
  \ iPhone 开发者中心用户名和密码。\n\n> **提示：** 如果你已经登录了开发者网站，只需点击主页右侧栏中的 `iTunes Connect` 链接即可。无需再次登录。\n\
  \n**233**\n\n![Image 72](img/index-252_1.jpg)\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n### 签约落笔\n\n登录后，你会看到一个表单，要求你接受网站的条款与条件。你只在首次使用 `iTunes Connect` 或苹果更改合同时才会看到此页面。如果你想将你的应用放入\
  \ iTunes，请接受这些条件。\n\n进入 `iTunes Connect` 后，你会看到一个类似图 8-1 的屏幕。\n\n> **图 8-1：** `iTunes\
  \ Connect` 主屏幕，用于管理在 App Store 上分发应用的所有详细信息。某些项目仅在添加或更新应用时使用，而另一些则可能每天都会用到。首先要做的是设置合同、税务和银行信息。\n\
  \n#### 首要事务\n\n首要事务是设置你的合同、税务和银行信息。当你注册 iPhone 开发者账户时，仅提供了联系信息。但商业合作涉及的内容远不止了解彼此的身份。现在是时候让律师、政府和金融机构参与进来了！\n\
  \n点击 `iTunes Connect` 主页上的“合同、税务和银行信息”链接开始准备。加载此页面后，你会看到你已经有一份生效的合同。当你注册成为 iPhone\
  \ 开发者时，苹果给了你一份在全球范围内分发免费应用的合同。如果你不想从 iTunes 赚钱，那么你就算完成了！\n\n##### 合同\n\n与大多数涉及金钱的事情一样，如果你想让苹果支付费用，情况会稍微复杂一些。打开`请求合同`复选框，然后点击`提交`。\n\
  \n（如果你开发团队中的其他人负责处理法律事务，那么应由该人完成这些步骤。）\n\n**234**\n\niPhone 应用开发：缺失的手册\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n### 签约落笔\n\n一旦你提交请求，就会看到苹果向你提供的合同——付费应用。该合同指定苹果作为你的代理人/佣金商来销售和分发你的软件，不拥有所有权权益。你同意提供许可应用并支持最终用户。合同还规定了苹果的佣金（30%）、如何在全球范围内收税，以及你的付款时间（月结后\
  \ 45 天内支付）。\n\n> **注意：** 与任何合同一样，你和你的律师应审查整个文档。上一段只是概述。\n\n如果你和你的律师接受这些条件，请点击`同意`复选框并提交表单。你会看到一个确认屏幕，并且合同\
  \ PDF 将通过电子邮件发送给你。点击`完成`返回合同设置屏幕。\n\n##### 联系信息\n\n设置合同的下一步是添加额外的联系信息。`iTunes Connect`\
  \ 允许你为组织中的不同人员分配特定角色。例如，你的财务部门可以访问财务报告，而市场部门可以生成促销代码。\n\n1. 在你的合同`联系信息`中，点击`编辑`。\n\
  \n   下一个屏幕会显示你公司的法律地址以及 `iTunes Connect` 中的角色。目前，只需将所有角色分配给自己即可。随着需求的出现，你可以点击主屏幕上的`管理用户`，创建具有新\
  \ Apple ID 的新用户。\n\n2. 要创建你的联系信息，请点击`新增人员`，然后输入你的 `iTunes Connect` 用户名和电子邮件地址。添加你的职位和电话号码，然后点击`创建`。\n\
  \n   你将返回到联系信息页面。\n\n3. 对于`高级管理`、`财务`、`技术`、`法律`和`促销`角色，请从下拉菜单中选择你的名字。\n\n完成后，点击`提交`按钮进入下一步。\n\
  \n##### 银行信息\n\n联系人确定后，你需要告知苹果将每月获得的收入存入何处。资金将通过两种方式存入：\n\n- **ACH。** 使用自动清算所的标准电子存款。此方式仅适用于美元收入。来自“Apple\
  \ Inc.”的存款是来自美国 iTunes 商店的收益。你还会看到来自“iTunes S.A.R.L.”的存款，用于那些没有自己的 iTunes 商店的国家。\n\
  \n**235**\n\n从 Wow! eBook 下载\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n### 签约落笔\n\n- **SWIFT。** 使用环球银行金融电信协会的电汇。来自澳大利亚、加拿大、欧洲、英国和日本 iTunes 商店的收益通过此机制存入。此转账也会按当前汇率将任何外币兑换成美元。不幸的是，许多银行不提供交易来源或所用汇率的信息，这使得核对你的记录变得困难。\n\
  \n两种转账方式都需要一个账号才能完成存款。\n\nACH 转账使用九位数的 ABA 路由号码来确定资金将存入何处。SWIFT 代码用于外国金融机构之间的电汇。\n\
  \n你可以从你的银行获得 ABA 路由号码和 SWIFT 代码。（查看你银行网站上的支持页面：你不是第一个需要它的人。）一旦掌握这些信息，你就可以填写银行信息表：\n\
  \n1. 在“管理你的合同”屏幕上，在“银行信息”下，点击`编辑`。\n\n   你将进入主“银行信息”屏幕。\n\n2. 要开始设置你的银行信息，请点击`添加地址`。输入你账户所在银行的邮寄地址。点击`提交`。\n\
  \n   你应该可以从上一封银行对账单中获得此信息。\n\n3. 输入你的账户信息。\n\n   选择账户使用的货币，然后填写银行和账户持有人的名称字段。选择`账户类型`：你可能希望使用支票账户，以便轻松支取存款。\n\
  \n   其余四个字段特定于你的账户。你可能已经知道你的账号和分行。如上所述，你也可以轻松获得 ABA 号码和 SWIFT 代码。\n\n4. 仔细检查所有信息。\n\
  \n   真的。然后再次检查。如果有任何错误，你将无法收到付款，而且更新信息是一个繁琐的手动过程。\n\n5. 点击`提交`。\n\n   最后一步是证明你输入的信息真实准确，并授权苹果向你的账户付款。\n\
  \n\n\n# 6. 勾选复选框，最后核对一遍信息，然后点击**提交。**\n\n## 在虚线处签名\n\n### 税务信息\n\n你正在赚钱——毫无疑问——政府想知道这件事。设置付费应用合同的最后一步是提供你的税务信息。由于苹果公司代表你收取商品销售款项，因此美国国税局要求他们报告这笔收入。他们通过以电子方式代表你提交\
  \ W-9 表格来完成此操作：\n\n1.  在“管理你的合同”主屏幕上，在“税务信息”下，点击**编辑**。\n2.  输入你在纳税申报单上显示的姓名。如果你有与之不同的企业名称，也请一并输入。\n\
  3.  如果你是独资经营者，请从下拉菜单中选择**个人**。否则，选择相应的商业实体类型。\n4.  对于**免税收款人**单选按钮，请咨询你的会计师。你可以从美国国税局网站（`www.irs.gov`）下载\
  \ W-9 表格的 PDF 文件：其中详细说明了免税条件。\n5.  从下拉菜单中选择你的地址。如有必要，请点击**添加地址**来指定一个新地址。\n6.  最后，输入一个\
  \ TIN（纳税人识别号）。\n\n如果你是个体，请使用你的社会安全号码。对于企业，请使用雇主识别号。只需输入数字，不要包含任何破折号或其他字符。\n\n7.\
  \  勾选复选框以确认信息正确，然后点击**提交**。\n\n### 最终批准\n\n你的合同已准备好由苹果公司处理。回到“管理你的合同”屏幕，你会看到“设置进行中”旁边有一个绿色的勾选标记，但你仍需等待几天，你提交的信息才会被批准。一旦所有事项都处理完毕，你会看到“你生效中的合同”下出现一个新条目。恭喜你，现在你已经准备好通过\
  \ iTunes 赚钱了！\n\n***提示：*** 不要等到最后一刻才处理这项重要的电子文书工作。如果你提交的信息出现任何问题，批准过程可能需要超过几天的时间，并打乱你的发布计划。\n\
  \n合同列表下方还有几个针对加拿大和澳大利亚开发者的额外链接，他们需要提交额外的税务信息。还有一个非常重要的链接被许多开发者忽略了——日本税收协定信息。不点击这个链接可能会让你损失一大笔钱！\n\
  \n## 维护你的权益\n\n如果你不向日本税务机关提交一些额外的表格，你的收入将被征收 20%的预扣税。你在日本每赚 1 美元，就有 20 美分被留下。提交这些表格是一个繁琐的过程，可能需要长达\
  \ 90 天才能完成，但最终，每年可能价值数百甚至数千美元。一旦你的合同生效，记得查看“管理你的合同”页面底部的链接。\n\n另一个你应该尽快完成的 iTunes\
  \ Connect 任务是开始添加你的应用元数据。你需要提供控制你的应用在 App Store（无论是在 iTunes 内还是设备上的应用程序中）中如何显示的信息。\n\
  \n在单次会话中提供所有这些信息是可能的，但分批处理更容易、也更安全。不要害怕在首次添加应用时留下占位数据。随着发布日期的临近，你可以对数据进行更新。\n\n\
  ***注意：*** App Store 的流行有时会导致 iTunes Connect 响应缓慢。分批处理可以降低浪费时间以及已录入数据的风险。\n\n此外，由于元数据变更经常发生，一些开发者会在版本控制系统中跟踪变更。你可以查看`Flashlight\
  \ Pro`项目中的`iTunes`文件夹，了解这类系统的一个示例。\n\n当你将信息录入 iTunes 时，请牢记一个重要事实：这些数据帮助客户找到并购买你的应用。确保信息清晰、简洁且正确。\n\
  \n要开始输入你的元数据，请转到 iTunes Connect 的主屏幕（图 8-1），然后选择“管理你的应用程序”。在左上角，点击**添加新应用程序**按钮。\n\
  \n### 出口合规性\n\n当你添加一个新应用时，第一个问题可能看起来有些奇怪：“你的产品包含加密功能吗？”\n\n由于 iTunes 将使你的应用在全球范围内可用，苹果会将其出口到美国境外。如果你的产品具有加密数据的能力，则适用特殊的出口要求。页面上的链接提供了更多信息。\n\
  \n如果你的产品依赖于系统设施来管理加密数据，例如使用钥匙串 API 管理用户的私人数据，或使用安全套接层进行网络连接，你可以选择**否**。苹果已经授权了 iPhone\
  \ 操作系统的这些部分用于出口。\n\n![图 73](img/index-257_1.jpg)\n\n对于确实包含加密功能的产品，你需要提供商品分类裁定副本作为提交材料的一部分。\n\
  \n### 概览\n\n添加一个新应用需要填写多个屏幕的信息。第一个屏幕是“概览”，它提供了应用的基本信息（图 8-2）。\n\n***图 8-2：*** *你添加到\
  \ iTunes 的第一件事就是你的应用概览。有很多字段需要填写，但接下来的部分将帮助你完成。*\n\n#### 应用名称\n\n概览中的第一个字段是你的应用名称。该字段必须是唯一的：App\
  \ Store 中没有两个产品拥有完全相同的名称。\n\n一些开发者通过对名称进行细微调整来规避这一点。你会在 App Store 上找到“手电筒”、“手电筒。”、“手电筒\
  \ .”和“手电筒™”。这种方法的问题在于会给客户造成困惑：如果朋友推荐“手电筒”，他说的是哪一个？\n\n***注意：*** 此字段不区分大小写，因此`\"\
  手电筒\"` 行不通。而且你就错过了一个让自己变得出色的机会。\n\n同样重要的是要记住，“应用名称”字段不需要与 iPhone 主屏幕上显示的名称匹配。你可以使用像“安全之光\
  \ – 世界上最好的手电筒”这样的名称，但这么长的名称在 App Store 的许多屏幕中会被截断。\n\n最好的方法是让你的名称简短明了。“安全之光”这个名称最能表达这款应用的独特功能——救援信标。任何提及该应用名称的推广或评论，都能让潜在客户更容易在\
  \ iTunes 中找到它。\n\n因为你的产品名称必须在成千上万个其他名称中保持唯一，所以尽快开始在 iTunes Connect 中添加数据是个好主意。一些开发者甚至在写一行代码之前就创建一个占位应用。确保获得你想要的名称也能防止营销工作中的最后一刻意外：在最后一刻更改宣传材料上的名称可能代价高昂！\n\
  \n关于应用名称，还需要注意的一点是，一旦进入审核阶段，你就不能更改它。你只能在更新你的应用并上传新版本时更改它。\n\n#### 应用描述\n\n\n\n#\
  \ 大多数开发者会将应用的初始描述设置为“待定”或其他占位符。此处填写的内容取决于你打算如何营销该产品。在产品进入 iTunes 数据库的早期阶段，你可能尚未明确该描述信息。\n\
  \n因此你将其推迟到以后处理。只需记住，在提交最终产品以供审核时，你需要提供真实的描述。如果你的描述仍是“待定”，应用将无法通过审核。\n\n就描述本身而言，请保持简短精炼。初始屏幕上只会显示前三行文本。iTunes\
  \ 中的许多用户不会费心点击“更多…”来查看额外信息。而冗长的描述会在设备的 App Store 应用中造成大量滚动。\n\n描述文本可以是任何 Unicode\
  \ 字符。这意味着你可以使用符号，例如项目符号 (•)、星号 ( ) 和其他装饰符号 (♥ 和 •)。只需记住，这些字符中的许多在桌面端显示效果与在设备上不同。\n\
  \nEmoji 字符就是一个很好的例子：它们在桌面版的 iTunes 中根本不会显示。\n\n另外，避免在描述中使用价格。在某些情况下，这甚至可能导致应用在审核期间被拒绝。问题在于，如果你写上“价格降至\
  \ 99 美分”，这对身处法国的用户毫无意义，因为那里的 App Store 以欧元显示价格。\n\n**提示：** 为了你和潜在客户着想，在提交描述之前请检查拼写。\n\
  \n## 声明你的权利\n\n如果你因发布新版本而更新应用描述，请记住，相关信息会在当天更新到 iTunes，而不是在新版本获批的那天。如果你要列出新增功能，请在其出现在\
  \ iTunes 中之后再进行更新。\n\n### 设备能力\n\n在提供你的应用描述后，你会看到一个问题：“你是否希望将应用限制为仅能在具有特定功能的设备上运行？”你需要回答“是”或“否”，但实际答案并不重要。\n\
  \n如果你点击“是”单选按钮，你会看到一个指向在线文档的链接，其中描述了 `Info.plist` 文件中的 `UIRequiredDeviceCapabilities`\
  \ 键的工作方式。这些按钮不会以任何方式影响你的应用信息；这只是苹果公司引导你阅读“细则”的方式？\n\n当你的应用的 `Info.plist` 中未列出 `UIRequiredDeviceCapabilities`\
  \ 键时，iTunes 上的所有客户都能下载它。这是最佳目标，因为这样最广泛的人群都能购买并享受你的应用。但有时你的创作会依赖特定的硬件功能。\n\n对于这些情况，你需要指定一组字符串，列出你的应用所需的功能。例如，你可以在\
  \ `Info.plist` 中指定如下内容：\n\n```\n<key>UIRequiredDeviceCapabilities</key>\n<array>\n\
  \    <string>still-camera</string>\n    <string>magnetometer</string>\n</array>\n\
  ```\n\n`still-camera` 字符串表示，除非设备能够拍照，否则你的应用将无法正常运行。iPod touch 用户将无法启动该应用，因为该设备没有摄像头。同样地，`magnetometer`\
  \ 字符串表示你的应用需要具备确定方向的能力。较旧款 iPhone 的用户将无法使用该应用，因为指南针功能仅在 3GS 机型上才可用。\n\n**提示：** 要了解更多关于设备功能的信息并查看完整的功能字符串列表，请使用文档查看器搜索\
  \ `UIRequiredDeviceCapabilities`。\n\n当你将应用二进制文件上传到 iTunes 时，系统会检查 `Info.plist` 文件的内容。App\
  \ Store 提交流程中的这最后一步会将硬件需求与你的其他应用数据一同存储。此信息将防止客户在不满足要求的设备上安装该应用。\n\n你可能倾向于忽略设备功能信息，让所有客户都能下载和安装你的应用。这样你确实能拥有最多的潜在买家，但如果存在不兼容问题，这也将确保你遇到最多的客户支持问题。\n\
  \n在就应用的硬件需求做出任何决定之前，请确保你已在一系列设备上测试了该应用——即使这意味着你需要去 eBay 购买一台初代 iPod touch。\n\n###\
  \ 类别\n\n主类别菜单决定了你的应用在 iTunes 中的显示位置。\n\n你的应用会作为新发布版本出现在所选类别的热门下载列表中。在某些情况下，类别也会显示在应用图标和名称下方。\n\
  \n次要类别是可选的，仅在 iTunes 的强力搜索功能中起作用。你的应用不会同时被列在两个类别中。将其设置为相关类别即可，但不要指望这能让看到你产品的客户数量翻倍。\n\
  \n### 版权与版本\n\n接下来的字段是会在产品页面上显示的版权与版本信息。对于版权，请输入年份和你的公司名称：例如“2010 Squidger Industries”。如果你没有添加\
  \ © 符号，系统会在文本开头为你自动添加一个。\n\n版本号应仅包含数字和句点：例如“1.0”或“1.0.1”，而不是“1.0 最终版”或“版本 1.0”。\n\
  \n### SKU 编号\n\nSKU（库存单位）编号可以是任何你想要的数字和字母序列。唯一的要求是该值在你的开发者账户中必须是唯一的：你不能有两个产品使用“OMGWTFBBQ001”作为\
  \ SKU。\n\n请谨慎选择此字段的值：一旦提交了某个值，你在任何情况下都无法更改它。\n\n你会发现这个 SKU 编号在月末财务报告中会作为供应商标识符出现。你可能希望用这个值来排序或筛选数据，因此在做选择时要考虑到这一点。\n\
  \n### 关键词\n\n关键词，连同应用名称和公司名称，是 iTunes 在用户搜索时寻找匹配应用的方式。没有关键词，搜索“手电筒”或“SOS”将不会在 Safety\
  \ Light 应用上返回任何结果。\n\n输入关键词时，请用逗号分隔每个词。该字段的字符数限制为总共 100 个，因此请明智地选择你的关键词。使用文字处理软件有助于检查关键词长度：Bean\
  \ 是一个不错的选择，因为它在你输入时会显示窗口底部的字符数。你可以免费下载它：`http://www.bean-osx.com/`。\n\n与应用名称一样，你可以在最终二进制文件提交之前编辑你的关键词。一旦该文件上传，关键词就会被固定下来，直到你的下一个版本。仔细考虑你在应用描述中使用的词语。试着站在客户的角度思考；想想他们可能会如何搜索你的应用。\n\
  \n避免使用某些关键词：任何冒犯性词语或商标名称都会导致你的应用被拒绝。同样，如果你使用其他流行应用的名称来欺骗用户找到你的产品，你将遭遇审核流程的反对。如果你运用常识且不试图钻空子，你就没问题。\n\
  \n### URL 和电子邮件\n\n\n\n下一组输入字段用于填写您的网址和支持邮箱地址。`Application URL`字段并非必填，但强烈建议填写，因为它是\
  \ iTunes 中（在应用描述下方）首先显示的链接。该 URL 的文本标签会根据您的 iPhone 开发者账户信息自动生成。如果您拥有公司账户，您会看到类似“Squidger\
  \ Industries Web Site”的内容；而个人账户，例如，则会显示为“Al Czervik Web Site”。如果您有一个展示您所有在 App Store\
  \ 销售产品的网站，那么它就很适合填入此字段。\n\n另一方面，`Support URL`是必填字段，应指向一个客户可以获取有关您产品更多信息的页面。同时，请在该网页上提供一个邮箱地址或某种联系表单——这将是客户联系您的唯一途径。\n\
  \n**提示：** `Support URL`也会出现在设备上的 App Store 应用中。遗憾的是，它并非可点击的链接，因此用户访问您产品网页的难度更大（且可能性更低）。\n\
  \n那么下一个字段`Support Email Address`呢？客户不能通过您在此输入的值给您发送电子邮件吗？遗憾的是，Apple 仅会在*他们*需要就应用相关事宜联系您时使用此邮箱地址。\n\
  \n## Demo Account\n\n另一个可选字段是“Demo Account – Full Access”。您在此提供的信息旨在帮助 Apple 的审核人员评估您的应用。如果您的应用需要与需要登录的网络服务（例如在线排行榜或社交网络）通信，那么您需要为审核人员提供访问信息。\n\
  \n## EULA\n\n某些应用需要自定义最终用户许可协议（EULA）。概览屏幕底部的链接允许您指定您的法务部门要求的任何特殊条款。\n\n**明确声明**\n\
  \n您提交的许可协议不能包含任何标记格式——仅限文本和换行符。如果您提供了自定义的`EULA`，则在产品页面上，支持链接旁边会出现一个标有“Application\
  \ License Agreement”的链接。在 App Store 应用中，类似的链接位于滚动列表的底部。\n\n如果您未指定`EULA`，则将适用 Apple\
  \ 的标准许可协议。（概览屏幕底部有一个查看此文档的链接。）\n\n**继续之前**\n\n在点击屏幕底部的`Continue`按钮之前，您需要为所有必填字段提供数据。同样，如果您尚未准备好所有必要数据，可以填写“TBD”或其他占位符。除了版本和\
  \ SKU 编号之外，所有值在您提交最终二进制文件之前都是可编辑的。\n\n如果出现任何验证错误，它们会以红色显示在屏幕顶部。最常见的错误是应用名称已被其他开发者使用。如果看到此错误，请尝试提交另一个名称。这个过程既是一项营销活动，也是一项技术工作，因此请务必从您组织中的其他人那里获取意见。\n\
  \n## Ratings\n\n完成概览后，下一步是为您的应用评级。如果您的应用包含任何淫秽、色情、攻击性、诽谤性或 Apple 不认可的其他内容，它将无法在\
  \ App Store 中上架（图 8-3）。\n\n**图 8-3：** iPhone 和 iPod touch 均设有家长控制功能。通过对您的应用进行评级，您可以让家长限制其孩子接触不适宜的内容。\n\
  \n**明确声明**\n\n即使您的内容并无不妥，也仍然需要评级。这是因为 iPhone OS 具有家长控制功能。例如，家长可以将其孩子的 iPod touch\
  \ 配置为仅安装具有相应评级的内容。要了解这些控制功能的工作原理，请打开 iPhone 上的`Settings`应用，并导航至`General ➝ Restrictions`。\n\
  \n一旦启用“访问限制”，家长可以在“允许的内容”部分指定“不允许应用”、“4 至 17 岁或以上”或“允许所有应用”。用户更改这些设置时需要输入密码。\n\n\
  设置评级非常简单：只需根据您应用中不同类型的内容选择相应的单选按钮即可。每种类型的内容要么是“无”，要么是“偶尔/轻微”，要么是“频繁/强烈”，整体评级将随您的选择而更新。\n\
  \n如果您看到“No Rating”，Apple 将不允许该应用在商店中上架。如果您的内容处于可接受范围的边缘，那么在应用设计阶段尝试调整这些单选按钮是个好主意。与应用名称和关键词一样，一旦您提交了应用二进制文件，就无法再更改评级。您可以在每次提交新版本时更新它们。\n\
  \n对评级满意后，点击`Continue`进入下一个屏幕。\n\n## Upload—Show It Off\n\n现在是真正展示您应用的时候了！`Upload`标签页（图\
  \ 8-4）是您提交应用图标和截图的地方，客户在购买前会通过这些来了解您的应用。\n\n**图 8-4：** iTunes Connect 中的`Upload`标签页允许您提交应用图标和其他图形文件。您可以点击每个项目下的预览链接，以确保文件正确传输。同时，请确保“Upload\
  \ application binary later”复选框处于选中状态。\n\n**明确声明**\n\n### Application binary\n\n\
  通过选中“Upload application binary later”复选框，跳过上传第一个文件“Application”，原因如下：\n\n-   **您希望尽快将元数据录入\
  \ iTunes。** 这意味着您可能甚至还没有要提交的应用二进制文件：甚至在开始 Beta 测试之前就开始进行设置的情况并不少见！\n-   **iTunes\
  \ Connect 历来不太可靠。** 众多开发者与一个不断演进的系统上的高负载相结合，导致比任何人期望的都更多的停机时间。上传应用二进制文件可能需要一段时间，如果在此期间出现任何问题，您将丢失已输入的其他元数据。\n\
  \n此页面上唯一必填的项目是“Large 512 × 512 Icon”和主截图。即使您没有这些文件的最终版本，也可以上传占位图形，并随着发布日期的临近进行替换。\n\
  \n### Application icon\n\n应用图标图形比您在代码中使用的 57×57 像素图标要大得多。如果您的设计师使用能够生成矢量图形的插图软件制作了图标，那么放大该图像将很简单。如果不是，他们则需要做一些额外的工作。您不希望放大非矢量图形，因为它会变得像素化且模糊；这会给您的客户留下非常糟糕的第一印象。\n\
  \n当然，使用这个独立图形的好处在于它不必与 iPhone 主屏幕上显示的图标完全相同。许多开发者在促销期间会将“ON SALE”和其他促销信息放在此文件上。\n\
  \n请记住，这个 512×512 的图形会被显著缩小。请确保任何文本或细节在缩小尺寸后看起来仍然良好。\n\n此图形仅在桌面端的 iTunes 中使用。设备上的\
  \ App Store 使用应用中相同的 57×57 像素图标。您使用的所有促销徽章，大多数潜在客户都不会看到。\n\n\n\n***提示：*** 你甚至可能希望在测试版构建中将此图片作为`iTunesArtwork`包含在内。正如第\
  \ 225 页的注释中所解释的，Flashlight Pro 项目展示了如何做到这一点。\n\n要上传你的图标，请点击“选择文件”按钮，然后找到你的 TIFF\
  \ 或 JPEG 文件。此文件不应包含任何图层或透明度。\n\n成功上传图片后，你会看到一个复选框图标。你还会看到文件名与一个链接一起显示，该链接会在新窗口中打开图片。点击此链接以验证图片是否正确上传。\n\
  \n**246**\n\n《iPhone 应用开发：缺失的手册》\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**宣告你的主张**\n\n*屏幕截图*\n\n上传主屏幕截图的过程与应用图标相同。唯一的区别在于可上传文件的大小。\n\n你可以提交带顶部状态栏或不带状态栏的屏幕截图：尺寸为\
  \ 320 × 480 或 300 × 480 像素，格式为 TIFF 或 JPEG。文件可以是竖向或横向模式：iTunes 和 App Store 应用会在你的产品页面上正确显示这些文件。此图片始终会首先显示在你的产品页面上。\n\
  \n上传额外的屏幕截图是可选的，但如果你不使用它们，那可就太不明智了。大多数客户会使用这些图片来评估你的应用是否适合他们。你能提供的视觉信息越多越好。\n\n\
  这些额外屏幕截图的上传过程有点令人困惑。你需要点击“选择文件”来选择每个图片，然后点击“上传文件”一次性提交所有图片。棘手的部分在于让屏幕截图按正确顺序排列。你试图通过它们讲述应用的故事，如果截图顺序错了，情节就会令人困惑。\n\
  \n开发者常犯的另一个错误是，他们按照应用内的顺序来展示屏幕截图。人们不想看到游戏设置或登录屏幕——他们想看的是应用的操作和炫酷功能。如果你有帮助屏幕，这些也是不错的选择，因为它们能以图形丰富的方式展示你的应用是如何工作的。\n\
  \n一旦你确定了想要的截图顺序，请按照与在 iTunes 中显示顺序*相反*的顺序来选择文件。假设你有四个额外的屏幕截图：\n\n**1.** 点击“选择文件”，在文件对话框中选择你的第四个（最后一个）屏幕截图；点击“选择”。\n\
  \n**2.** 再次点击“选择文件”，用你的第三个屏幕截图重复此过程。\n\n**然后对第二个和第一个额外屏幕截图执行相同操作。** 这些文件随后应以上传文件按钮上方的正确顺序列出。\n\
  \n**3.** 如果是这样，点击“上传文件”按钮。\n\n**4.** iTunes Connect 会将文件传输到 iTunes。你可以点击“全部清除”并重新开始。\n\
  \n***提示：*** 在这里保持头脑清晰的最简单方法是给屏幕截图编号命名。你的主屏幕截图是`0.jpg`，第一个额外屏幕截图是`1.jpg`，以此类推。这样，在你选择文件时，可以轻松看出`1.jpg`之后是`2.jpg`。\n\
  \n点击“继续”，你就完成了应用文件的上传。请记住，你可以随时返回此屏幕并更新图片，即使你的产品已在 App Store 中发布也是如此。\n\n第 8 章：待售\n\
  \n**247**\n\n![图片 76](img/index-266_1.jpg)\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**宣告你的主张**\n\n定价——选择你的价格\n\n定价选项卡上只有两个字段（图 8-5），但它们非常重要，且难以设置正确！\n\n***图 8-5：**\
  \ *iTunes Connect 中的定价选项卡只要求提供两项信息，而这两项都非常重要。“上市日期”控制产品发布的时间，最初应设置为一个遥远的未来日期。“价格等级”的选择则控制你从每次销售中获得的收入。该选项卡会以每种货币显示摘要。*\n\
  \n*上市日期*\n\n\n\niTunes 的默认行为是让您的新版本立即上架。要控制应用的发布日期，请选择一个远期未来的可用日期。\n\n给自己留出足够的时间来选定具体日期，并围绕该日期协调营销工作。考虑好发送评测版本、发布新闻稿以及部署推广网站的时间。如果在半夜某个随机时间发布，最终只会落得个无人问津的下场，而不是成功发布。\n\
  \n通过设置一个未来的日期，您就有机会把一切安排妥当，并将设置更新为实际发布日期。\n\n选择发布日期时的另一个重要因素是：它不会发生在您以为的那一天。人们很容易忘记\
  \ iTunes 是一家全球性企业。您可能住在加利福尼亚，但您的许多客户在新西兰，他们比您离国际日期变更线近得多。\n\n当您将`可用日期`指定为`“2009\
  \ 年 10 月 22 日”`时，可能会惊讶地发现，在发布前一天的凌晨 4 点，人们就开始访问您的网站并给您发送支持邮件。iTunes 确实按照您的要求在 22\
  \ 日让应用在新西兰上架了，但您不知道新西兰比您的当地时间快 20 小时。哎呀！\n\n**248**\n\niPhone 应用开发：遗失的手册\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n# 确定时间\n\n要搞清楚实际发布时间，请使用在线时区转换器：[`www.timeanddate.com/worldclock/converter.html`](http://www.timeanddate.com/worldclock/converter.html)。选择新西兰奥克兰的午夜作为转换的起始时间和地点，并选择您的位置作为目标地点。如果您在美国，那将是凌晨的某个时间。请据此安排您的睡眠计划。\n\
  \n# 价格等级\n\n选择可用日期后，为您的应用挑选一个价格。同样，由于 iTunes 在全球运营，您并不是以美元和美分来定价的。相反，Apple 使用`价格等级`——一组等价的定价级别。\n\
  \n第一个选项是`免费`，选择它意味着您将无法从应用下载中直接获利。（不过，您仍然可以通过应用内购买和广告来赚钱。）\n\n如果您选择`等级 1`，您的应用在美国将售价\
  \ 99 美分，在欧洲售价 0.79 欧元，以及其他外币的等价价格。每个等级大致相当于一美元，直到更高的等级。（`等级 85` 在美国意味着 999.99 美元！）选择等级后，各种货币的金额以及您每次销售的收入将一同显示。\n\
  \n当然，最困难的部分是弄清楚应该为您的应用收取多少费用。下一节将介绍一些可能影响您决策的市场因素。现在，只需选择一个您认为合适的价格等级，然后点击`继续`前进。\n\
  \n# 本地化\n\n您已经努力编写了出色的应用描述，因此请选择相关的关键词，并展示应用中最优质的图片。不要忘记英语以外的其他语言。否则，多达 40% 的潜在客户可能永远找不到您的应用。当西班牙的某个人搜索`literna`时，您要确保他能找到您的手电筒应用！\n\
  \n同样，要在 iTunes 上取得成功，您需要具备全球视野。您的很大一部分客户群体并不说您所说的语言。您只有很短的时间来吸引他们的注意力：让您的营销信息易于阅读。\n\
  \n`本地化`标签页允许您为以下项目提供翻译：\n\n- 应用名称和描述\n- 关键词\n- URL 和电子邮件\n- 主要和附加截图\n\niTunes Connect\
  \ 支持多种不同的本地化语言，但将您的营销材料翻译成日语、法语、德语、西班牙语和意大利语，能让您的投入获得最大回报。\n\n第 8 章：待售\n\n**249**\n\
  \n![图片 77](img/index-268_1.jpg)\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**确定时间**\n\n\n\n# 要输入翻译内容，请从弹出式菜单（图 8-6）中选择一种语言，然后输入任何需要变更的值。除非另有指定，否则产品页面上将显示英文版的截图图像。输入本地化值后，点击`添加其他语言`返回语言选择菜单，或点击`继续`完成元数据的录入。\n\
  \n**图 8-6:**  \n*使用“本地化”标签页以不同语言提供您的应用信息。通过弹出式菜单选择语言，随后会显示更多文本输入字段。*\n\n## 审核\n\n\
  最后一步是检查您的信息。该标签页的默认视图显示数据在美国地区的呈现效果。您可以（也应当）将“审核 App Store”的弹出式菜单切换至其他国家，查看您的营销信息在该国商店用户眼中的显示效果。\n\
  \n如需进行任何修改，请点击页面底部的`返回`按钮，或点击页面顶部的任一标签页。如果一切无误，点击`提交应用`，您的产品将被添加到 iTunes 数据库中。恭喜您！\n\
  \n## 微调\n\n如本节所示，设置元数据是一个迭代过程。输入应用的基本信息后，您可以点击 iTunes Connect 中“管理您的应用”部分的应用图标。您将看到一个包含`编辑信息`按钮的界面，用于更新元数据。\n\
  \n**图 8-7:**  \n*向 iTunes 提交信息的最后一步是核对准确性。您可以使用“审核 App Store”弹出式菜单预览全球各 App Store\
  \ 的信息（A）。检查应用描述中的拼写，并确保分类、关键词和 URL 均正确（B）。您可以点击图片链接，在新窗口中查看它们（C）。最后但同样重要的是，“上架日期”和“价格等级”指定了产品何时开始销售及其售价（D）。*\n\
  \n**备注：** 随着应用经历正常的生命周期，元数据会频繁更改。实际上，您可能需要在源代码目录树中维护一份文档，供开发团队所有成员在必要时更新或回退。\n\n\
  Flashlight Pro 项目将所有 iTunes 相关信息保存在项目文件夹的根目录中。该文件夹包含一个包含元数据的`AppInfo.rtf`文件，以及应用图标和截图图片。\n\
  \n# 市场\n\n与平台本身一样，为 iPhone 销售产品是一个全新的世界。您很可能从未向大众市场销售过软件：但随着 iTunes 的到来，这一切即将改变！\n\
  \n如第 258 页所述，为应用定价是准备发布过程中较困难的环节之一。只有您自己清楚产品投入了多少工作量，以及需要销售多少份许可才能收回投资。\n\n为了帮助您做出决策，需要分析您即将进入的市场。在第\
  \ 4 章（第 113 页）中，您走出了市场营销的第一步：在动笔编码之前，思考如何定位您的应用。现在是时候开始考虑如何定价，以及如何推广最终产品了。\n\n##\
  \ 数据指标\n\n要了解这个新市场，首先看看定义它的一些数字。请记住，这个新市场也在快速演变——下方包含的链接应能帮助您跟上最新变化。\n\n*惊喜！苹果公司很神秘*\n\
  \n苹果公司并未提供太多关于 iPhone OS 市场的信息。唯一实质性的指标是每季度财务报告中公布的 iPhone 销量。\n\n利用这些数字，您可以从图 8-8\
  \ 中看到市场的增长势头相当惊人。\n\n有趣的是，这些数字并未包含您潜在客户群的重要部分：苹果公司并未单独公布 iPod touch 的销量（而是报告 iPod\
  \ 的总销量）。公司关于该细分数据的唯一信息是在 2009 年 7 月的季度财报电话会议中。他们暗示当时有 4500 万台设备在使用中，这意味着 iPod touch\
  \ 占总市场的 40%略多。\n\n*第三方研究*\n\n您可以从第三方获取额外的市场信息。像 AdMob 这样的公司会收集通过广告和推送到设备上的调查问卷获得的数据。其他公司，如\
  \ Pinch Media，则允许开发者添加分析库来收集匿名统计数据。甚至像尼尔森公司这样的老牌研究机构也在对用户进行调查，以建立市场模式。\n\n**图 8-8:**\
  \  \n*此图表显示了自 2007 年年中以来 iPhone 的累计销量。销量增长呈指数级趋势，导致一些分析师预测到 2009 年底设备数量将超过 7000\
  \ 万。请注意，苹果公司的这些销量数据不包括 iPod touch，且其财年于 9 月份结束。*\n\n这些信息来源揭示了一些有趣的结果：\n\n- 90%的用户直接从手机上（而非通过桌面版\
  \ iTunes）下载应用。\n- iPhone 用户每月下载约 10 个新应用，其中约 25%是付费应用。iPod touch 用户每月下载约 18 个应用，其中约\
  \ 10%是付费的。\n- 平均每位用户每月在五个付费应用上花费约 9 美元，平均每个应用花费 1.80 美元。\n- 75%的用户曾下载过应用（免费或付费）。\n\
  - 只有 20%的用户在下载免费应用的第二天仍会使用它。一个月后，只有 5%的用户仍在继续使用该应用。\n\n以下是为您提供的查阅这些信息来源的途径。您可以在本书的“缺失手册”页面上找到可点击的链接（`www.missingmanuals.com/cds`）：\n\
  \n- **AdMob。** `http://metrics.AdMob.com/2009/08/july-2009-metrics-report/`\n- **尼尔森。**\
  \ `http://blog.nielsen.com/nielsenwire/online_mobile/iphone-users-watch-more-video-and-are-older-than-you-think/`\n\
  - **Pinch Media。** `http://www.pinchmedia.com/appstore-secrets/`\n\n*用户人口统计*\n\n\
  2009 年 6 月，AdMob 和 comScore 进行了一项调查，以确定 iPhone 和 iPod touch 用户的人口统计数据。不出所料，iPhone\
  \ 用户通常年龄较大，而 iPod touch 用户则趋于年轻化（图 8-9）。\n\n**图 8-9:**  \n*AdMob 和 comScore 的人口统计研究显示，69%的\
  \ iPod touch 用户年龄在 13 至 24 岁之间。而在 iPhone 用户中，78%的用户年龄介于 18 至 49 岁之间。*\n\n伴随着年龄偏大的人口特征，iPhone\
  \ 用户的收入也更高。iPod touch 用户中只有 66%的人年收入超过 25,000 美元，而 iPhone 用户中这一比例为 78%。该调查还报告称，超过\
  \ 70%的用户为男性。2008 年 10 月的一份额外的 comScore 调查显示，43%的 iPhone 拥有者年收入超过 100,000 美元。更有趣的是，家庭收入低于中位数的\
  \ iPhone 拥有者增长强劲：在 25,000–50,000 美元区间占 48%，在 50,000–75,000 美元区间占 46%。\n\n\n\n# 在全球经济衰退期间的这种强劲增长表明，低收入用户并不将`iPhone`视为奢侈品购买。相反，它被视为一种集通信和娱乐于一体的设备，其拥有和使用成本低于多种设备和服务的总和。\n\
  \n**市场**\n\n来源：\n\n- **AdMob.** *http://blog.AdMob.com/2009/06/16/new-research-on-the-demographics-and-behavioral-characteristics-of-iphone-and-ipod-touch-users-from-AdMob-and-comscore/*\n\
  - **comScore.** *http://www.comscore.com/Press_Events/Press_Releases/2008/10/Lower*\
  \ *_Income_Mobile_Consumers_use_Iphone/*\n\n别忘了，普通 iPhone 用户在合约期内还需支付数千美元。本节强调的研究表明，iPhone\
  \ 和 iPod touch 拥有者收入可观，且拥有大量可支配收入。此外，客户群规模也在众多人口统计群体中迅速增长。\n\n这对你作为 iPhone 开发者来说是个好消息！众多客户正等待通过\
  \ iTunes 获取你的产品。但有一个问题：一个快速增长且充满意愿客户的市场会带来……\n\n## 竞争\n\n你并非唯一被这个新兴市场吸引的开发者。在最近一次回应\
  \ FCC 调查时，苹果报告称每周约有 6800 个 iPhone 应用程序获得批准。诚然，其中许多是对现有应用的更新，但 App Store 每月仍新增超过\
  \ 10,000 个新应用。\n\n来源：\n\n- **Daring Fireball.** *http://daringfireball.net/2009/08/apples_fcc_response*\n\
  - **148 Apps.** *http://148apps.biz/app-store-metrics/?mpage=appcount* *排行榜上攀升*\n\
  \n如果你考虑冲击排行榜，会发现这非常困难。随着可用应用数量的增加，进入前 100 名所需的销量也在上升。\n\n当 App Store 刚推出时约有 1000\
  \ 个应用，每天只需卖出约 100 份就能上榜。如今，应用数量超过 10 万个，你每天需要卖出超过 1200 份。（完整故事可查看 *www.taptaptap.com/blog/the-app-store-pricing-game/*。）你还会发现，打造一款登顶应用的要求比以前高得多。花几小时做个放屁应用或手电筒应用就能赚得盆满钵满的日子早已一去不复返。开发者们已经意识到，更高质量和客户价值是竞争优势，他们花费数月时间开发希望成为爆款的应用。\n\
  \n同样，随着 App Store 中应用数量增加，应用被列入 iTunes 的`“最新推荐”`或`“编辑精选”`版块的可能性也越来越小。如果被选上固然很好，但争取推荐不应该是你营销工作的主要焦点。\n\
  \n### 媒体\n\n市场饱和的另一个方面是，为你的应用争取媒体报道变得越来越困难。在线媒体跟上需求的难度与 iPhone 生态系统的其他部分一样大。不要等到最后一刻才让媒体对你的作品产生兴趣。你的营销工作应该远在发布日之前就开始。请记住，你联系的每个人都被新闻稿淹没。寻找能够帮助作者构思新鲜内容的切入点。也许你的应用契合某个即将到来的节日，或者它做了其他应用从未做过的事。（它甚至可能是一个手电筒应用，同时宣传一本关于\
  \ iPhone 开发的新书。）\n\n在寻找网站来推荐你的应用时，不要害怕瞄准小众市场。IGN 不太可能对 Tiddlywinks Pro 感兴趣。花几分钟在谷歌上搜索*Tiddlywinks\
  \ 博客*，你会找到许多乐于了解你这款酷炫新 iPhone 游戏的地方。\n\n最后，请警惕一些`“评测”`网站向开发者收费以换取更多关注。千万不要靠近这些网站——其推荐价值的信誉正迅速崩溃。考虑到它只是一个网页，这已经很能说明问题了！\n\
  \n## 两位开发者，同一家商店\n\n作为开发者，你可以采取两种基本方法来销售你的应用。你可以进入基于爆款营销的快节奏新世界，或者采取更传统的方式，慢慢建立忠实的客户群。\n\
  \n这个想法的萌芽来自 Marco Arment（*www.marco.org/208454730*），Instapaper 应用的开发者，以及 John Casasanta（*www.taptaptap.com/blog/convert-first-month-sales/*），他领导开发了\
  \ Convert 和其他 iPhone 爆款应用。他们各自通过这两种方法之一成功销售了应用。\n\n要了解哪种方法最适合你，请查看表 8-1。\n\n***表\
  \ 8-1.** 在 App Store 中定位应用的两种方式。*\n\n| **爆款导向** | **传统导向** |\n| :--- | :--- |\n\
  | **应用类型** | |\n| 简单且浅显。 | 复杂且深入。 |\n| **典型类别** | |\n| 游戏、工具。 | 生产力、摄影、医疗。 |\n|\
  \ **用户群体** | |\n| 浏览`“热门”`排行榜寻找应用。很少在 iTunes 或 App Store 之外寻找应用。 | 在网上研究可用的应用后再做出明智购买。阅读正面评价。点击广告。\
  \ |\n| **特点** | |\n| 具有广泛大众市场吸引力的新奇事物。应用货架期有限，通常仅几个月。 | 针对个人品味和需求的较窄吸引力。应用成为用户日常生活的一部分。\
  \ |\n| **定价水平** | |\n| 较低价格以鼓励冲动购买。 | 较高价格，来自欣赏深度和质量的用户。 |\n| **营销方式** | |\n| 发布时大规模公关闪电战，制造短期新品热度。\
  \ | 依靠良好媒体评价、正面评测和口碑推荐，维持长期产品兴趣。 |\n| **发布定价** | |\n| 低价导入以提高销量并提升排行榜排名。 | 无导入定价，可能导致未投入产品的用户给出差评。\
  \ |\n| **收入潜力** | |\n| 高，但存在无法收回初始开发成本的风险。 | 较低，但获得持续开发收入的可能性更大。 |\n\n请记住，这些并非硬性规定，只是帮助你找出最适合你产品方法的大致分类。\n\
  \n### 看看音乐行业\n\n采用爆款导向的方法销售应用时，就像身处音乐行业：成也排行榜，败也排行榜。看看流行音乐世界，你会发现大多数歌曲在榜首停留的时间并不长。一两个月后，公众就转向其他内容，销量随之萎靡。当一首歌在榜时，为了维持排名，往往要投入大量推广费用。\n\
  \n而且，即使你一度上榜，许多音乐人也会发现自己是“一曲歌星”。让第一首单曲上榜已经很难：持续成功更是难以捉摸。\n\n与此同时，很多音乐人从未登上过公告牌百强单曲榜，却依然过得很好。有些人做录音棚乐手，有些人则向忠实粉丝群发行专辑。App\
  \ Store 的生意也是如此。\n\n### 选择你的客户\n\n当你面向大众市场销售时，会面对两种消费者行为。一些客户想要能完成任务的最便宜解决方案，不关心产品的精致度。如果看到一款产品卖\
  \ 5 美元，另一款卖 10 美元，他们总是会选择价格更低的那个。\n\n\n\n# 市场与定价策略\n\n## 消费者行为的两极分化\n\n另一些客户愿意支付更多费用以获得最佳产品。当面对\
  \ 5 美元和 10 美元产品的相同选择时，他们会认为更贵的那个更好。\n\n这种消费行为往往会影响您的企业：如果您向那些没有品牌忠诚度的“吝啬鬼”销售产品，您的业务将反映出这一点。相反，如果您努力寻找那些希望您的产品长期成功的优质客户，您的业务将随着这种投资而增长。\n\
  \n### 高额投入者\n\n如果说进入热门市场感觉像赌博，那确实如此。在营销攻势上投入大量资金会增加成功几率，但并不能保证您一定会大获成功。您可能在第一年赚取数百万美元，但可能性并不大。\n\
  \n另一种选择是采用更传统的营销方法，让您能够通过可持续的定价建立稳定的收入。您可能不会在第一年赚取数百万美元，但可以建立一个拥有忠实客户的长期业务。\n\n\
  ## 定价策略\n\n我们讨论了这么多关于市场的内容，那么定价这个主题呢？这是一个复杂拼图的最后一块。\n\n### 一杯咖啡的启示\n\n产品的价格很大程度上取决于它的功能，而非您开发的难度。许多沮丧的开发者会抛出这样一句话：“我的应用比一杯咖啡更值钱！”\n\
  \n从您的角度来看，这完全合理。您知道自己为将其变为现实投入了多少心血。不幸的是，您的潜在客户并不关心这一点。在他们眼中，一杯好咖啡值 5 美元——而您的应用不值。\n\
  \n诀窍在于提高您产品的感知价值。\n\n### 这是什么样的产品？\n\n您设定的价格在很大程度上暗示了您所销售产品的种类。以下价格区间在 App Store\
  \ 中较为典型：\n\n-   **0.99 美元**：最低价位适用于提供娱乐价值或简单实用功能的新奇应用。这也用于推广通常定价更高的应用。\n-   **1.99\
  \ 美元至 2.99 美元**：这个价位通常是你希望用户冲动购买的应用的上限。\n-   **3.99 美元至 4.99 美元**：这个价位适用于具有可证明高质量的高级应用。这也是客户开始对价格敏感的水平。\n\
  -   **9.99 美元及以上**：专业应用能够吸引愿意支付远高于平均价格的客户。如果您针对垂直市场中的专业需求，将应用作为现有产品的增强版销售，或提供对昂贵数据集的访问权限，那么典型的\
  \ App Store 定价不会限制您。\n\n消费者并不偏向于某个特定价位。Pinch Media 收集的数据显示，对于所有低于 4.99 美元的价格，平均付费下载量是一致的。他们的研究还表明，免费应用的使用频率低于付费应用，这表明用户会对自己购买的应用产生情感依恋。\n\
  \n在设定价格时需要注意一件事：价格越高，您在 iTunes 中获得正面评分和评价的可能性就越大。随着人们在您的产品上花费更多，他们也更有可能认为这笔购买是值得的。\n\
  \n这种合理化形式有助于客户避免**认知失调**。\n\n反过来，正面评价会影响其他客户。在不确定的情况下，**社会认同**的心理现象会发挥作用：人们倾向于观察他人以确定恰当的行为。在\
  \ App Store 中，评分和评价就提供了这些线索。如果之前的买家已经认可了产品，那么促成销售就会容易得多。\n\n正面评价在产品发布初期也扮演着重要角色：它们有助于产生动力。不要不好意思向朋友、亲戚和\
  \ Twitter 上的关注者请求评价。大多数人都乐于帮助您站稳脚跟！\n\n**来源：**\n\n-   **认知失调**：*http://en.wikipedia.org/wiki/Cognitive_dissonance*\n\
  -   **社会认同**：*http://en.wikipedia.org/wiki/Social_proof*\n-   **Mobile Orchard**：*www.mobileorchard.com/app-store-heresies-higher-price\
  \ -better-ratings-dont-discount-your-app-at-launch/*\n-   **Pinch Media**：*www.pinchmedia.com/blog/paid-applications-on-the-app-store-from-360idev/*\n\
  \n## 先试后买\n\n从客户的角度来看，了解自己是否喜欢一款产品的最好方法就是实际使用它。如果您在寻找一部手机，可以走进苹果零售店，拿起 iPhone 把玩一番。几分钟之内，您就能知道这款产品是否适合自己。\n\
  \n同样的情况也适用于 iTunes 中的应用。许多开发者通过提供应用的免费版本获得了成功。客户可以无义务地试用该应用，并在认为其有用时升级到付费版本。\n\n\
  ### 激励机制\n\n为了使这种技巧奏效，您需要给用户升级的动机。积极的激励效果最好：您为用户提供更多功能、额外游戏关卡以及其他能增强其体验的内容。用户会为这些增值内容付费。\n\
  \n您也可以使用负面刺激来促使免费用户转化为付费用户。在这里，“负面刺激”是“广告”的另一种说法。广告令人厌烦且占用宝贵的屏幕空间，因此有些人愿意付费来移除它们。\n\
  \n将广告作为一种激励手段有一个附带好处：在人们评估您的应用时，广告收入能补充您的收益。在某些情况下，单靠广告赚取的收入就足以支付开发成本。\n\n广告并非适用于所有类型的应用。它最适合那些经常被使用的应用：广告商喜欢重复曝光。您通常根据展示的广告数量获得报酬，因此重复使用会增加您的收入。\n\
  \n### 转化率\n\n那么，这些免费下载中会有多少转化为付费下载呢？这因应用而异。一些开发者报告的转化率低至 1%，而其他开发者则高达 15%。Pinch\
  \ Media 报告称，在大量应用样本中，平均转化率为 7.4%。\n\n平均而言，每 14 个下载您免费版本的人中，就有 1 人会付费购买。这听起来不算太惊人，但请记住，iTunes\
  \ 拥有数百万个账户！\n\n### 从免费到付费\n\n一旦用户决定升级到付费版本，他们该怎么做呢？\n\n传统上，开发者会向 iTunes 提交两个版本的应用。一个是“免费”或“精简版”，另一个是“高级版”或“专业版”。请注意这两个版本的品牌命名，要让客户清楚了解一个版本是另一个版本的子集。\n\
  \n苹果还要求免费演示版本必须功能完整。您不能有任何随时间推移而禁用的功能。这些免费应用本身也必须是可用的。客户不应感到被迫升级。\n\n维护两个版本的应用会带来几个问题。首先，构建、测试和提交应用的工作量翻倍。您可能还需要处理数据迁移问题。由于应用无法访问彼此的数据，您需要找到一种方法将任何文档、分数或其他信息从免费版本转移到付费版本。\n\
  \n\n\nApple 最近的一项政策变化为您和您的客户提供了一个更好的解决方案：免费应用程序可以通过应用内购买（In-App Purchases）来解锁付费功能。通过这项技术，您使用`StoreKit`框架向\
  \ iTunes 提供一个唯一的产品 ID。一旦用户批准交易，您就能获取信息来解锁功能。您无需管理两个应用程序，不存在数据迁移问题，并且对您的客户而言，体验也简单得多。\n\
  \n**上传**\n\n当您结束 Beta 测试后，必须再次调整 Xcode 设置。您之前使用 Ad Hoc 配置文件（第 215 页）为 Beta 测试签发了分发构建。您提交给\
  \ iTunes 的构建应使用 App Store 配置文件进行签名。本节将向您展示如何创建新的 App Store 配置文件、创建并上传新构建，以及如何进行测试。最后但同样重要的是，您将开始推广您的新应用并为买家做好准备。\n\
  \n**最终配置文件**\n\n要创建新的配置文件，请启动您的老朋友——配置门户网站（第 136 页）。然后，按照以下步骤操作：\n\n1.  登录配置门户后，在左侧栏中选择“Provisioning”。\n\
  2.  在“Provisioning”页面上，点击“Distribution”选项卡。在“Distribution”选项卡上，点击“New Profile”以创建新的分发配置文件。\n\
  3.  在“Distribution Method”下，保持“App Store”选中状态。\n4.  接下来，提供“Profile Name”。如果您将 Beta\
  \ 配置文件命名为“Squidger Beta Distribution”，那么一个好名称是“Squidger Final Distribution”。\n5.\
  \  为配置文件选择一个 App ID。使用与您 Beta 测试相同的 App ID：例如，“Squidger Apps”。\n6.  由于您要在 App Store\
  \ 上分发此版本，因此无需指定设备。只需点击“Submit”，您的新配置文件就会创建。\n\n点击“Download”链接获取配置文件，然后将其拖到 Dock\
  \ 中的 Xcode 图标上进行安装。您应该在“Organizer”窗口中看到“Squidger Final Distribution”。\n\n上传\n\n\
  **最终目标**\n\n您需要为此构建创建一个新目标，就像您为 Beta 测试构建所做的那样（第 127 页）。此目标将与您为 Beta 测试创建的目标类似，但会在“Code\
  \ Signing”构建设置中具有不同的设置。\n\n对于 Beta 测试，您为代码签名授权添加了一个`dist.plist`文件。对于最终版本，您**不需要**此文件。另一个设置“Code\
  \ Signing Identity”应设置为“Any iPhone OS Device”。此外，您**不**希望使用自动配置文件选择器，因为它可能会意外选择您的\
  \ Beta 配置文件。\n\n相反，请向下滚动列表，然后选择配置文件名称下所列的“iPhone Distribution”（例如，“Squidger Final\
  \ Distribution”）。\n\n要查看这些设置的实际效果，请查看“Safety Light (Final)”的构建设置。\n\n双击目标，您会看到没有授权，并且代码签名身份是“iPhone\
  \ Distribution: Craig Hockenberry”，后跟一个长且全局唯一的 ID（GUID）。\n\n您看到此 GUID 是因为您没有“Craig\
  \ Hockenberry”开发者账户的分发配置文件或代码签名证书。如果您尝试构建项目，您会看到一个代码签名错误，指出“在默认钥匙串中没有有效的证书/私钥对”。如果您想将此应用程序提交到\
  \ App Store，您必须使用自己的唯一证书和配置文件。\n\n***Tip:*** 如果您看到 GUID，通常意味着 Xcode 无法找到配置文件。请从配置门户下载一份新副本。\n\
  \n**最终构建**\n\n现在您已经配置好了要在 App Store 上分发的目标，可以准备构建所有 iTunes 上的客户都将使用的版本了。在这样做之前，请务必更新`Info.plist`中的“Bundle\
  \ version”编号（第 221 页），使其仅包含数字和句点——不要包含字母。如果您保留了像“1.0b3”这样的 Beta 版本号，上传时会被拒绝。\n\n\
  构建之后，您需要备份您的应用程序和`dSYM`文件。这两个文件是调查客户遇到的崩溃所**必需**的（您将在第 298 页学习如何调试这些崩溃）。在上传到 iTunes\
  \ 之前，您还需要将刚刚构建的应用归档到一个 Zip 文件中（只需按住 Control 键点击文件，然后从快捷菜单中选择“Compress”）。\n\n***Tip:***\
  \ `Flashlight Pro`应用程序有一个名为“Final”的聚合目标，其中包含一个“Package Release”构建阶段，可以自动创建 Zip 文件。此构建阶段还会创建应用程序和`dSYM`文件的备份，以便它们可以检入到您的版本控制系统中。\n\
  \n上传\n\n**最终上传**\n\n一旦准备好最终的 Zip 文件，通过 iTunes Connect 上传它只需简单几步：\n\n1.  登录 iTunes\
  \ Connect（第 233 页），然后点击“Manage Your Applications”。在出现的列表中，点击您的应用图标。\n    \n    您应用程序的状态应为“Waiting\
  \ For Upload”。\n    \n2.  在应用程序信息屏幕中，点击“Upload Binary”以开始上传过程。\n3.  在下一个屏幕上，点击“Choose\
  \ File”，然后导航到包含您最终应用程序的 Zip 文件。完成后，点击“Choose”。\n4.  屏幕上会出现一个新按钮：“Upload File”。点击它，文件就会上传到\
  \ Apple 的服务器。\n5.  上传完成后，您会看到一个勾号图标；点击“Save Changes”以完成提交过程。\n\n此时，服务器会检查您上传的文件（图\
  \ 8-10）。如果发现任何问题，您会在页面顶部看到一个红色横幅，解释错误。\n\n常见的问题来源是分发配置文件：如果遇到此类问题，请返回检查您的构建设置。\n\
  \n***Note:*** 您也可能会看到诸如“我们暂时无法保存您的更改，请稍后重试”这样的错误。有时系统会过载，您可能需要尝试多次才能成功。出于同样的原因，请将更新应用程序元数据与上传文件分开进行。\n\
  \n如果一切顺利，您应用程序的状态将变为“Waiting For Review”。现在只是时间问题了。恭喜！\n\n**最终测试**\n\n但是，有一个小问题：您从未运行过上传到\
  \ iTunes 的最终构建。您也无法运行它，因为它是使用未指定任何设备的 App Store 分发配置文件签名的。\n\n在短短时间内，成百上千的客户将购买和使用这个构建，因此确认一切正常当然很好。幸运的是，您可以通过一个名为`codesign`的命令行工具来获得这种保证。该工具使用与\
  \ Xcode 相同的代码签名方法。\n\n将目录更改为您进行构建的位置后，您可以通过以下方式查看应用中代码签名的当前值：\n\n```\n$ cd build/Final--Release-iphoneos\n\
  $ codesign –d –vv ″Safety Light.app/Safety Light″\nExecutable=/Users/studmuffin/Projects/Flashlight\
  \ Pro/build/Final--Release-iphoneos/Safety Light.app/Safety Light\nIdentifier=com.iconfactory.FlashlightPro\n\
  Format=bundle with Mach-O thin (armv6)\nCodeDirectory v=20100 size=618 flags=0x0(none)\
  \ hashes=22+5 location=embedded Signature size=4280\n```\n\n\n\n`Authority=iPhone\
  \ Distribution: Craig Hockenberry`\n\n`Authority=Apple Worldwide Developer Relations\
  \ Certification Authority` `Authority=Apple Root CA`\n\n`Signed Time=2010 年 1 月\
  \ 18 日 下午 3:28:43`\n\n`Info.plist` 条目数=19\n\n`Sealed Resources` 规则数=3 文件数=34\n\n\
  `Internal requirements` 数量=1 大小=144\n\n如您所见，应用程序代码使用的是 iPhone 发行证书进行签名。更改签名也非常简单：\n\
  \n`$ codesign –f –s ″iPhone Developer″ –vv ″Safety Light.app/Safety Light″`\n\n\
  `Safety Light.app/Safety Light: 替换现有签名`\n\n`Safety Light.app/Safety Light: 已对包含\
  \ Mach-O thin (armv6) 的 bundle 进行签名`\n\n[com.iconfactory.FlashlightPro]\n\n现在，如果您查看代码签名，会看到它使用的是\
  \ iPhone 开发者证书进行签名：\n\n`$ codesign –d –vv ″Safety Light.app/Safety Light″`\n\n`Executable=/Users/studmuffin/Projects/Flashlight\
  \ Pro/build/Final--Release-iphoneos/Safety Light.app/Safety Light`\n\n`Identifier=com.iconfactory.FlashlightPro`\n\
  \n`Format=bundle with Mach-O thin (armv6)`\n\n`CodeDirectory v=20100 size=578 flags=0x0(none)\
  \ hashes=22+3 location=embedded Signature size=4290`\n\n`264`\n\niPhone App 开发：缺失的手册\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 应用审核\n\n`Authority=iPhone\
  \ Developer: Craig Hockenberry (8RMK66WF7S)`\n\n`Authority=Apple Worldwide Developer\
  \ Relations Certification Authority` `Authority=Apple Root CA`\n\n`Signed Time=2010\
  \ 年 1 月 18 日 下午 3:29:16`\n\n`Info.plist` 条目数=19\n\n`Sealed Resources` 规则数=3 文件数=34\n\
  \n`Internal requirements` 数量=1 大小=144`\n\n这意味着您可以通过 Xcode Organizer 或 iTunes 将其安装到您的设备上。\n\
  \n最终构建中的所有内容都可以在您的 iPhone 上运行，因此您可以在应用审核期间执行最终测试。\n\n要了解更多关于 `codesign` 如何工作的信息，请务必查看其\
  \ Unix 手册页；在命令行中输入 `man codesign`。\n\n**注意：** 在 Flashlight Pro 项目中，为最终发布版本重新签署代码是通过一个名为“Resign\
  \ Release”的构建阶段自动完成的。此构建步骤会在应用程序被打包准备发布后，对其运行 `codesign` 工具。它还会创建一个包含修改后应用程序版本的\
  \ Zip 文件。\n\n## 首次推广\n\n可以正式宣布了：您的首个发布版本代码已经完成。您可以在等待 Apple 批准该应用期间无所事事地坐着。但您希望这款产品能大获成功，所以是时候开始生命周期的下一个阶段了。\n\
  \n是时候开始推广那段出色的代码了！\n\n一些开发者会利用这段时间开始制造一些发布前的热度。例如，您可以上线推广网站的一部分，并配上一个巨大的“即将推出”横幅。这样做风险在于审核过程可能出现任何延迟。如果您的应用因任何原因被卡住，您费尽心思制造的热度就会逐渐消退并化为乌有。自然，人们还会问“即将”是什么时候。届时您将无法告知潜在客户或媒体您的发布日期，因为此时发布完全由\
  \ Apple 掌控。\n\n一个更稳妥的方法是现在就建立一个邮件列表。人们可以注册以便在应用上架时收到通知。务必让人们知道这只是发布通知，并且您不会滥用他们的电子邮件地址。大家收到的垃圾邮件已经够多了。（如果您真的将这些邮件地址用于发送垃圾邮件，您将万劫不复。）\n\
  \n## 应用审核\n\n一旦您通过 iTunes Connect 上传了应用，您就要开始排队等待了。而且这是一条大约有 1,000 名其他开发者在排的队伍。应用审核流程的时长随时间变化而不同，平均等待时间从几天到几周不等。\n\
  \n第 8 章：上架销售\n\n`265`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n##\
  \ 应用审核\n\n等待应用获批是艰难的：所有事情都已完成，您急于展示它。如果您专注于其他活动，比如完成您的网站、撰写新闻稿以及加大营销力度，时间会过得更快。\n\
  \n现在是联系媒体并让他们对即将发布的版本产生兴趣的好时机——尽可能多地让博主和记者注册。\n\n应用审核过程也可能令人沮丧。如果被拒绝，不要感到难过；大多数开发者都经历过这种情况。继续阅读，了解您可以采取哪些措施来避免被拒。\n\
  \n### 确保您没有违反任何规则\n\n导致应用被拒的原因有很多。在许多情况下，是因为您没有遵守您签署的 iPhone SDK 协议中第 3.3 节所规定的规则。该协议的这一节规定了使用\
  \ SDK、用户界面、数据、隐私、内容、网络使用以及其他开发方面的规则。精明的开发者会仔细阅读这一节。\n\n不幸的是，这份法律协议的大部分内容都可能存在解释空间。最好的建议是运用常识，并且做到己所不欲，勿施于\
  \ Apple。\n\n为了帮助您了解什么是可接受的，什么不是，以下是一些众所周知的被拒原因：\n\n- **不要试图绕过 App Store。** 您不能在应用中提供奖品或任何形式的金钱促销。您不能向用户索取捐款。不要使用内置浏览器来促进应用内的购买。客户应该只从\
  \ iTunes 购买东西。\n- **不要在您的应用内或其 iTunes 页面上提及价格。** 正如您在第 258 页所见，考虑到价格涉及多种货币，这并非易事。唯一的例外是当您使用应用内购买时：您可以向\
  \ iTunes 查询价格并显示给客户。\n- **不要在您的应用中使用 Apple 商标或产品。** 对开发者来说最困难的是显示 iPhone 图片的用户界面。请寻找另一种工具栏图形或方式来在帮助屏幕中展示设备。应避免与\
  \ Apple 有任何其他关联：一位开发者因引用史蒂夫·乔布斯而被拒；另一位开发者则因使用公司地址“1 Infinite Loop”作为示例数据而遇到问题。\n\
  - **不要做任何让 iPhone 或 App Store 看起来糟糕的事情。** 模拟碎屏、假装脏话（@%#!?!）以及其他以 Apple 为代价的把戏都会导致失望。Apple\
  \ 对其在公众心目中的形象**极为**重视。\n- **您需要拥有应用中包含的所有内容的所有权。** 避免使用任何未经授权的资源，包括提及公众人物或名人。（一个免版税的使用许可并不意味着您拥有它。）\n\
  - **如果您的应用包含任何未经筛选的互联网内容，请将年龄分级设为 17+。** 应用审核员是发现不适合儿童内容的专家！\n- **不要让网络连接静默失败。**\
  \ 如果您正在从网络获取数据，您需要在连接不正常时通知用户。应用审核员在测试您的应用时会打开飞行模式：在这种情况下，应用的行为应该是可预测的。\n- **请牢记保护用户隐私。**\
  \ 当来自设备的信息（包括游戏分数）正在上传到网络时，请明确告知用户。您不必在每次连接时都这样做，只需给用户一个选择退出的机会。在您的应用中提供设置，让用户有机会改变主意。\n\
  - **不要提交一个仅仅是名片或公司广告的应用。** 这些应用，以及极其简单的笑话和新奇应用，会因“用户功能极少”而被拒绝。\n- **注意不要复制 Apple\
  \ 应用的功能。** 一些开发者成功开发了替代内置实用工具（如计算器和天气应用）的应用。但核心应用，如电话、邮件和 iPod，通常是被禁止的。\n\n`266`\n\
  \niPhone App 开发：缺失的手册\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\n\n\
  • **留意你在蜂窝网络上的数据传输量。** 虽然没有公开的限制，但请确保不要在短时间内（5–10 分钟）使用超过 5 MB 的带宽。\n\n• **不要在关键词中包含其他应用的名称。**\
  \ 如果你想搭其他开发者成功的顺风车，是骗不了任何人的。\n\n• **不要使用未公开的类或方法。** 是的，逆向工程这些隐藏功能确实很容易，但这会给你带来与未来\
  \ iPhone OS 版本的兼容性问题。为了解决这个问题，苹果会在每个应用提交后对其进行扫描，以确保它只使用了公开的 API。\n\n这些指南会随时间变化：苹果放宽了一些要求，也收紧了另一些。幸运的是，有一个网站追踪了被拒的原因：`http://appreview.tumblr.com/`。定期查看这个网站以跟上任何变化是个好主意。\n\
  \n## 应对被拒\n\n当你的应用被拒时，你会收到一封来自苹果的邮件，解释问题所在。如果应用本身有问题，你必须修复问题并构建一个新的二进制文件。在测试新版本后，使用\
  \ iTunes Connect 提交更新后的版本。\n\n当你的应用元数据（如描述或关键词）出现问题时，你需要编辑这些信息。下一步并不明显，但至关重要。你必须在“管理你的应用”中拒绝当前的二进制文件，并重新提交你上次上传的二进制文件。\n\
  \n**第 8 章：待售**\n\n**267**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  **准备出售**\n\n***提示：*** 如果你在提交后发现了应用的问题，请使用 iTunes Connect 中的“拒绝二进制文件”功能。这个按钮会暂停审查流程，这样你就可以修复问题并再次尝试。\n\
  \n在你重新提交二进制文件后，审查流程会重新开始。被拒最令人沮丧的一点是，你又回到了队伍的最后。等待重新开始。\n\n**准备出售**\n\n当你在“管理你的应用”列表中点击一个应用后，会看到一个“状态历史”的链接。最初，只显示你创建应用元数据和上传二进制文件的日期。最终，状态会变为“审查中”，表示苹果已经开始评估你的提交。如果一切顺利，接下来列出的就是“准备出售”。恭喜你，你的应用已准备好全球发布！\n\
  \n***注意：*** 苹果还会向你用于 Apple ID 的电子邮箱地址发送一条消息。你不必过于焦虑地刷新“状态历史”页面。至少不用那么频繁。\n\n此时你有两个重要任务。第一是决定何时让应用上架。确保你所有的宣传材料都已准备就绪：网站、新闻稿、电子邮件通知，以及你为发布计划的其他任何内容。\n\
  \n即使一切立即可用，也请等上一两天。这看起来有些反直觉，但在 iTunes Connect 中还有一件更重要的事要做——生成促销代码。这个功能会在你的应用进入“准备出售”状态后可用。\n\
  \n博主和记者可以使用这些代码，在你的产品对公众开放之前下载并安装它。在你能向他们发送促销代码之前，让这些人对你的产品产生兴趣至关重要。明智地利用等待审批的时间。\n\
  \n要生成促销代码，请遵循以下步骤：\n\n1. 登录 iTunes Connect 并选择“请求促销代码”。\n2. 从下拉列表中选择你的产品名称，然后输入你想生成的代码数量。剩余代码数会显示在输入框下方。点击“继续”。\n\
  3. 勾选显示协议底部的复选框，然后点击“继续”。\n\n**268**\n\niPhone 应用开发：遗失的手册\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**准备出售**\n\n\n\n# 排版后的文档\n\n**4\\. 点击 `Download Codes` 链接，即可获取包含促销码的文本文件。**\n\n\
  文件中的每一行都包含一个可在 iTunes 上兑换的 12 位字符代码。\n\n**5\\. 点击 `Done` 返回 iTunes Connect 主屏幕。**\n\
  \n将这些促销码发送给媒体，并给他们时间撰写使用体验。每位评测者只需一个代码，而且他们可能都已经知道如何使用。如果不知道，请说明在桌面版 iTunes 的 App\
  \ Store 页面底部以及设备 App Store 应用“精选”标签页底部都可以找到 `Redeem` 链接。这些代码的使用方式与苹果礼品卡完全相同，但无需花费一分钱。\n\
  \n博客作者和记者们还想知道你的产品上线日期，以便安排评测时间。请为他们提供包含撰写文章所需材料的媒体资料包：其中应包含新闻稿、高分辨率应用图标、你提交给苹果的截图，以及你拥有的任何其他营销材料。\n\
  \n与作者打交道时，请记住他们可能正面临截稿压力。请随时准备回答他们可能提出的任何问题或解决他们遇到的困难。在产品发布初期，势头非常重要：尽你所能帮助这些作者宣传你的新产品。\n\
  \n## 发布日\n\n万事俱备，你的发布日期也日益临近。正如你在设定“上线日期”时所看到的，产品实际上线的时间可能比你预想的要快。请确保你的网站运行正常，然后静待热潮开始。\n\
  \n同时也要留意你的网站日志。你将能在 Twitter、Facebook 和其他社交网络上找到讨论你产品的人。希望博客和其他在线媒体会开始链接到你的网站。留意那些你未曾听过的网站，并与他们取得联系，表示感谢并提供他们可能需要的任何帮助。\n\
  \n**提示：** 现在正是检查你的页面在全球各个 iTunes 商店中显示效果的好时机。在 iTunes 主 App Store 页面底部，你会看到一个小国旗图标。点击该图标后，你可以切换到任意商店，然后导航到你的产品页面。\n\
  \n这将是漫长的一天，但回报将难以言表。\n\n#### 第 8 章：待售\n\n**269**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 章节\n\n**你有客户了！**\n\n你的产品已发布。客户正在从\
  \ iTunes 下载你的应用。生活真美好！\n\n但为了维持这份美好，你必须努力经营。你需要向新客户推广和宣传你的应用。为了了解营销工作的效果，你需要跟踪销售数据和其他趋势。同时，你还需要通过社交网络和其他支持渠道与客户群体建立对话。\n\
  \n目标是尽可能多地收集客户信息。通过这些数据，你可以了解他们的购买习惯以及如何让他们满意。\n\n这样便能成就一番成功的事业。\n\n### 跟踪销售情况\n\
  \n如果你和大多数 iPhone 开发者一样，那么你很想知道产品的销售情况。下载量越多，就意味着越多人喜欢你的作品，你也会感到被认可。更重要的是，这些销售数据是衡量你营销效果的主要反馈机制。苹果提供两种报告：每日汇总和月度财务报告。\n\
  \n**271**\n\n![图 82](img/index-290_1.jpg)\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n### 每日报告\n\n每日汇总报告会告诉你每个产品在每个国家的销售数量。这是一个制表符分隔的文本文件，汇总了每个销售项目。你从 iTunes Connect\
  \ 获取这些文件应该不足为奇。要下载该报告，请按照以下步骤操作：\n\n**1\\. 登录 iTunes Connect，点击 `Sales/Trends Report`。**\n\
  \n交易报告屏幕将会出现（图 9-1）。\n\n***图 9-1：***\n\n*你的每日销售*\n\n*报告是从此处*\n\n*下载的*\n\n\n\n*iTunes\
  \ Connect 中的“交易报告”页面。该制表符分隔的文本文件包含所选日期全球所有销售的清单。*\n\n2. 确保“报告类型”弹出菜单显示为“摘要”。将第二个弹出菜单“报告周期”设置为“每日”。\n\
  \n页面会更新，你会看到一些新的选项，包括一个“日期”弹出菜单。\n\n3. 从“日期”下拉菜单中选择你想要报告的日期。然后点击“下载”。\n\n所选日期的文本文件将下载到你的“下载”文件夹中。\n\
  \n你可以将这个文本文件加载到 Excel 等电子表格程序中，手动跟踪销售情况，但这很繁琐。处理这些文件几天后，你会高兴地发现，市场上有多种产品可以轻松地收集、分析和展示你的销售数据。更棒的是，其中许多应用程序还可以跟踪你在\
  \ iTunes 上的评论和排名。\n\n**272**\n\niPhone 应用开发：缺失手册\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 跟踪销售\n\n### 基于网页的解决方案\n\n如果你希望无论身在何处都能访问销售数据，那么在浏览器中显示信息的网络解决方案将会非常方便。appFigures（http://appfigures.com）的团队正是为此而生的。\n\
  \n注册账户后，输入你的 iTunes Connect 登录信息，你的每日报告就会被传输到该应用，进行分析并绘制成图表。appFigures 还提供了一个非常有用的“事件”机制，可以帮助你追踪发布和促销活动对产品销量的影响。评论和排名信息也可获取。\n\
  \n你可以免费使用该网站，但产品和账户数量有限。如果你的需求超出此范围，或者希望使用评论和排名等附加功能，则每月费用从 5 美元起。\n\n### iPhone\
  \ 应用\n\n如果你喜欢在 iPhone 上完成所有操作（你懂的），那么你会高兴地知道有两个出色的应用销售追踪解决方案。\n\n第一个叫做 AppSales，是由\
  \ Ole Zorn 编写的开源软件。你可以在 GitHub 上查看该项目：http://github.com/omz/AppSales-Mobile。在你的\
  \ Mac 上检出源代码后，你可以在你的 iPhone 上构建并安装该应用。然后提供你的 iTunes Connect 账户信息，该应用就会加载你的每日报告，并以表格和图表的形式显示结果。你还可以查看产品的评论。\n\
  \n另一个解决方案是名称相似的 MyAppSales，网址为 www.drobnik.com/touch/my-app-sales/。该应用提供了 AppSales\
  \ 不具备的几个功能：它可以处理多个账户和应用内购买。由于苹果公司依据 SDK 协议第 3.3.7 节不允许 iPhone 应用访问 iTunes Connect，因此你也需要自行构建并安装此应用。源代码许可的费用仅为\
  \ 15 美元，非常合理。\n\n### 桌面应用程序\n\n第三个用于处理每日报告的解决方案是一款名为 AppViz 的 Mac 桌面应用程序，网址为 www.ideaswarm.com/products/appviz/（图\
  \ 9-2）。与其他应用一样，你提供你的 iTunes 凭据，它会在你启动应用时自动下载你的报告。这款售价 30 美元的应用还能自动备份你的销售报告。\n\n\
  第 9 章：你已拥有客户！\n\n**273**\n\n![图片 83](img/index-292_1.jpg)\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**跟踪销售**\n\n**图 9-2：** 这是 AppViz 如何在 App Store 上显示 Safety Light 的每日销售信息。AppViz\
  \ 仪表盘绘制了 2010 年前两周的每日收入。该应用还可以生成更详细的图表和销售报告。你可以查看来自全球所有 iTunes 商店的产品评论和排名。\n\nAppViz\
  \ 还可以下载每个类别中前 100 名应用的排名。如果你的应用是畅销品，排名可以帮助你了解产品在 iTunes 上的表现。\n\n与其他销售追踪应用一样，全球范围内的评论也是可用的。\n\
  \n使用桌面应用程序的主要优势在于，你所有的财务数据都直接受你控制。并且，与任何财务数据一样，你应该确保其已备份并存储在安全的位置。\n\n### 估算\n\n\
  需要记住的是，每日报告是以各个国家的货币报告的。在美国，一份 Safety Light 拷贝能为你带来 0.70 美元的收入，而在欧洲则是 0.48 欧元，苹果公司就是以此方式报告的。\n\
  \n由于大多数开发者都希望以本国货币了解结果，上述列出的应用会使用当前汇率调整销售数据。\n\n然而，外汇市场是波动的，因此在月底对账完成时，报告的值会存在偏差。调整后的金额并非完美，但用于衡量你的产品销售情况已足够。如果你需要进行任何收入分成或支付版税，请不要使用每日报告进行会计核算。请改用月度财务报告，下文将对此进行描述。\n\
  \n**274**\n\niPhone 应用开发：缺失手册\n\n![图片 84](img/index-293_1.jpg)\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**跟踪销售**\n\n## 月度财务报告\n\n月底过后大约两周，你将开始收到苹果公司发送的电子邮件，其主题行以“iTunes 财务报告”开头。这是个好消息——苹果公司已迈出向你付款的第一步。\n\
  \n你将收到每个主要地区的通知邮件：澳大利亚 (AU)、加拿大 (CA)、欧洲 (EU)、日本 (JP)、英国 (GB)、美国 (US) 和全球 (WW)。通常需要\
  \ 4 到 5 天才能收到所有地区的报告。邮件本身不包含报告；你需要登录 iTunes Connect 获取。\n\n登录后，点击“财务报告”链接，你会看到最近一个月的报告列在最前面（图\
  \ 9-3）。点击“下载”列中的链接，即可在 Mac 上获取报告。\n\n**图 9-3：** 月底过后几周，你可以从 iTunes Connect 下载财务报告。点击一个链接，即可下载该地区和该时间段的报告——此处为\
  \ 2009 年 12 月的美国报告。\n\n你会收到两种类型的报告：以“PYMT.txt”结尾的文件包含该地区付款的摘要。如果你在某地区的收入未达到至少 150\
  \ 美元，苹果公司会为你的账户保留余额；任何之前的余额都会列在月度摘要中。你还会看到从你的收入中扣除的任何预扣税或消费税/日本消费税。\n\n**注意：** 如果你尚未按照第\
  \ 237 页所述提交日本税务条约文件，你将会发现你在日本收入的 20% 被预扣了。“管理你的合同”部分解释了如何追回这些收入。\n\n第 9 章：你已拥有客户！\n\
  \n**275**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 广告与推广\n\n在“财务报告”屏幕上列出的另一种\
  \ `.txt` 文件（不含 `PYMT`）包含销售信息。该文档包含制表符分隔的数据，详细列出了每个国家/地区每种产品的销售数量。将文档拖放到 Dock 图标上后，Microsoft\
  \ Excel 和 iWork 中的 Numbers 都可以打开该报告。\n\n如果你有多种产品，请按供应商标识符对数据进行排序（以将所有产品分组），然后累加“扩展合作伙伴分成”列，即可得出每种产品的金额。\n\
  \n### 获得付款\n\n`PYMT.txt` 文件中列出的金额就是苹果公司将存入你银行账户的金额。通常情况下，存款会在你收到月度报告后几周内完成。由于货币兑换的原因，核对这些存款有点棘手。\n\
  \n\n\n只有美国（US）和全球（WW）地区的金额以美元列出。财务报表中列出的付款将以 ACH 存款形式显示在您于 iTunes Connect 中设置合同时指定的账户中。对于非美元付款，您需要存款当日的汇率。苹果公司无法提供此信息，因为他们不知道当付款移交给银行系统（即实际发生汇兑时）的汇率会是多少。不幸的是，许多银行并不报告\
  \ SWIFT 电汇的汇率。\n\n如果您的银行没有记录汇率，请使用像 `http://x-rates.com/cgi-bin/hlookup.cgi` 这样的在线存档。存款日期前一两天内的汇率将帮助您确定来源国，并让您对金额是否正确有个大致判断。\n\
  \n至此，剩下要做的就是为购买一艘 100 英尺长的游艇支付首付，并订购古巴雪茄！或者想办法让每月的存款变得更多一些……\n\n---\n\n## 广告与推广\n\
  \n大多数开发者进入 iPhone 开发领域时，都抱着远超实际结果的期望。你以为只需几个小时的功夫就能赚到一百万。\n\n抱歉，但通常情况并非如此。\n\n你的应用成功与否在很大程度上取决于广告和推广。如果客户不知道你的产品，他们就不会购买。你的代码很棒，所以不要害怕告诉别人！\n\
  \n### 新闻稿\n\n要制作的第一份推广材料是*新闻稿*。这份一页纸的文档让媒体了解你的新产品。撰写新闻稿时，重要的是要考虑谁会阅读它。你是在写给媒体，而不是潜在客户。目标是让你的产品获得报道，从而产生兴趣，并间接带来销量。\n\
  \n因此，要避免任何听起来像推销宣传的语言。相反，要将你的产品描述为与众不同且有新闻价值的东西。对于 Safety Light 来说，能引起媒体关注的点可能是：\n\
  \n-   它是 iPhone 上最好的手电筒，在众多手电筒应用中独树一帜。\n-   它的救援信标可以在事故或自然灾害中拯救生命。\n-   它有一个迪斯科模式。\n\
  \n另一种策略是使用讲述你的应用故事的引语：“Safety Light 取代了我 iPhone 上所有其他手电筒！”或者“我的狗就是喜欢迪斯科灯光！”\n\n\
  （如果这些引语来自行业专家或小有名气的人，那就更好了。）提供尽可能多的讨论要点，让记者有独特的写作角度。\n\n记住，记者不会只看你这一份新闻稿。同一天还有数百个其他\
  \ iPhone 应用发布，其中许多也在争夺同样的媒体关注。这似乎有违直觉，但一份简短的新闻稿远比一篇冗长、拖沓的长篇大论要好得多。保持简短有力，或许真的会有人读它。\n\
  \n你还应该了解新闻稿的标准格式。新闻稿需要包含标题、摘要、正文、公司背景和联系信息。在 PRWeb 网站 `www.prwebdirect.com/pressreleasetips.php`\
  \ 上可以看到一个示例，以及其他技巧和指南。\n\n完成新闻稿后，确保它能在你的网站上找到。让那些不在你新闻稿邮件列表上的人也能轻松获取关于你产品的信息。\n\n\
  ### 寻找代言人\n\n即使是顶尖的开发者，也往往倾向于回避自我推广。如果你过于内向，不善于宣传自己的应用，你可以找别人为你做这件事。无论哪种方式，你的应用都需要有人在外面为你传播口碑。\n\
  \n学习如何宣传你的产品可以是非常有益的。你将与行业内的聪明人建立新的、有趣的关系。\n\n但要警惕，这项活动会消耗*大量*时间。人脉不是轻易就能获得的，但没有他们，你就无处可发新闻稿。\n\
  \n### 广告与推广\n\n另一个选择是找一家专门从事媒体关系或营销的公司。他们已经有现成的人脉，并且可以利用这些资源来推广你的产品。营销和公关公司在如何推销产品方面也拥有丰富的经验。\n\
  \n然而，最大的好处是，这让你可以专注于自己最擅长的事情——软件开发。\n\n### 社交网络：增强版的口碑营销\n\n许多开发者发现，社交网络是提高其产品能见度的绝佳场所。Twitter\
  \ 和 Facebook 都允许用户选择定期接收你正在做的最新动态。\n\n这就是增强版口碑营销的用武之地。通过一次状态更新，你可以触达成百上千的人。为了让您了解这是什么样子，图\
  \ 9-4 中的图表显示了 Safety Light 在一个拥有约 6,100 名关注者的 Twitter 账户上被宣布的情况。\n\n**图 9-4：** 该图显示了\
  \ Safety Light 在 Twitter 上发布公告后的网站访问者数量。12 月 21 日的第一个峰值显示了对推文的响应：“准备开售——iPhone 上最好的手电筒应该很快在\
  \ iTunes 上架”。一天后的第二个峰值来自“如果你昨晚错过了，应用商店里最好的手电筒现已上市”。这两条推文将产品介绍给了 2,000 多人。该图由运行在\
  \ Safety Light 网络服务器上的 Mint (`http://haveamint.com/`) 生成。\n\n请注意，重复公告的效果会递减。提及产品几次没问题，但再多就会让你的关注者感到厌烦。此外，考虑开一个独立的产品或商业账户，这样你就可以将个人生活和商业生活分开。\n\
  \n一旦建立了你的账户，你希望人们关注你。例如，你可以在你的网站上放置一个简单的链接，访客可以点击关注你的 Twitter 或 Facebook 账户。事实上，如今很难找到一个*没有*社交网络链接的网站！\n\
  \n**提示：** 你的产品网页也是进行跨产品营销的好地方。当有人在社交网络上关注你的活动时，他们很可能喜欢你的工作。记得向他们介绍你创建的其他产品。\n\n\
  #### 网络的力量\n\n社交网络最棒的地方在于，它们可以放大口碑推荐的效果。你的一些关注者比你更聪明、更英俊、更有趣。（很难想象，是吧？）Michael “Rands”\
  \ Lopp 就是这样一个人：他是一位作家，运营着一个备受尊敬的网站，名为 *Rands in Repose* (`http://randsinrepose.com`)。他在\
  \ Twitter 上的 `@rands` 账户拥有超过 11,000 名关注者。\n\n在看到之前关于 Safety Light 的一条推文后，他添加了自己的评论：“显然缺少一个\
  \ SafetyDance™ 模式：`http://j.mp/7tB9G5`”。如图 9-5 所示，该链接导致超过 700 名好奇的用户了解了 Safety Light。\n\
  \n**图 9-5：** 该图显示了有影响力的关注者提及你的应用所带来的效果。在这种情况下，圣诞节后一天来自 `@rands` 的一条推文导致超过 700 人了解了\
  \ Safety Light。查询缩短链接（如上文所述）的更多信息会显示该图表。\n\n许多社交网络用户更喜欢使用缩短的 URL（比如上一段中的链接），这让你在状态更新中有更多空间来放置内容。\n\
  \n\n\n在许多情况下，它还为你提供了收集有关你的产品链接的额外信息的能力。你可以通过将 `info` 添加到链接并在网络浏览器中键入，来获取关于 `bit.ly`\
  \ 和 `j.mp` 链接的统计数据。例如，在浏览器中输入 `http://j.mp/info/7tB9G5` 即可生成如图 9-5 所示的图表。它还会提供关于使用同一\
  \ URL 的其他推文、链接被点击的网站以及点击者地理位置的信息。\n\n## 给顾客一些谈资\n\nSafety Light 有一个很酷的功能，在 iTunes\
  \ 或产品网站上都没有提及——当屏幕在设置界面切换时出现的电池图案。这些电池是故意保密的。你可以通过让用户在 iPhone 应用中发现一些新奇事物来利用社交网络。告诉别人你遇到的新鲜事是人之常情。用户第一次翻转查看设置时，看到电池会感到惊喜（图\
  \ 9-6），有些人会非常高兴，甚至想向他们的关注者展示。\n\n**279**\n\n![图 87](img/index-298_1.jpg)\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**图 9-6：** *在灯光和设置视图之间显示的电池图案对新用户来说是一个惊喜。有些人会在社交网络上评论，为应用带来更多关注。Martin Dufort\
  \ (@mdufort) 截取了这张图并发布到他的 Twitter 信息流中供他人查看。*\n\n与此类似的一个变体是，应用将游戏分数发布到玩家的 Facebook\
  \ 和 Twitter 账户。为你的游戏添加这个功能并不难，它能让用户炫耀自己的成就。如果朋友和关注者没听说过这款游戏，他们会点开附带的链接查看。如果他们已经购买了游戏，则会想要超越这个分数！这对你和你的客户都有好处。\n\
  \n***提示：*** 如果你希望你的应用向社交网络发送帖子，请确保应用征求了用户的许可。每次发帖都应当给用户选择退出的机会。自动发布的帖子被视为垃圾信息，会破坏用户对你的应用的信任。\n\
  \n### 这是一场对话\n\n要使社交网络真正有效，沟通必须是双向的。如果你只是不停地发布一些近乎新闻稿的信息，你的关注者会感到厌倦并离开。解决方案：确保你的社交网络是互动性的。\n\
  \n以下是关于如何有效使用你的产品或公司账户的一些建议：\n\n- **使用你的账户发布使用应用的技巧和窍门。** 将这些帖子分散发布，以便更多用户有机会看到它们。同时，最好包含指向列出所有技巧的支持页面的链接。\n\
  - **建立处理针对你账户的支持请求的机制。** 大多数情况下，最好的做法是引导客户通过电子邮件账户来调查问题。复杂的支持问题通常需要来回沟通才能确定原因和解决方案，你肯定不希望这些内容填满你的主页。电子邮件最适合此类交流。\n\
  - **对于简短明了的问题，快速回复即可解决。** 例如，Twitter 上的一位用户对光强度有疑问：“@chockenberry 应用能否覆盖系统亮度？在低亮度下，你的应用的高亮度仍然很低。”快速回复让他们知道你意识到了这个问题，并且这是系统限制：“@jazzviolin\
  \ 不幸的是，没有公开的 API 可以调节亮度。”\n- **关注新功能请求。** 当人们使用你的应用时，他们会产生一些想法：在你的账户中发送一条简短的信息，就能让他们迅速把想法传达给你。快速确认回复让他们知道你正在关注并感谢他们的反馈。感谢\
  \ Twitter 上的用户，下一个版本的功能请求列表中包含了一个给 DJ 用的 BPM 指示器、一个利用加速计的雪崩检测器，以及通过摩尔斯电码发送的自定义消息。\n\
  - **写一封感谢信。** 社交网络的一大优点是赞美：“@chockenberry 我喜欢翻转视图时后面的电池图案，真是点睛之笔。”感谢你的用户（“@McCarron\
  \ 谢谢！我们努力让事情变得有趣 :-)”）不仅能让他们感觉良好，还能使他们成为你应用更好的支持者和拥护者。\n- **提醒关注者在 iTunes 上留下评论。**\
  \ 正如你在第 259 页所看到的，社会认同可以极大地推广你的应用；对你的作品感兴趣的人通常很乐意花点时间帮忙。只是要注意提出这个请求的频率：过于频繁会让你看起来像是在乞求。\n\
  - **发推时，使用易于搜索的模式。** 例如，在推文中包含 `http://safetylightapp.com` 将有助于你搜索谈论该网站的人，而仅使用“Safety\
  \ Light”则会包括那些谈论自行车灯的人。\n\n## 大爆炸\n\n在上一节中，你看到了社交网络上有影响力的人如何帮助推广你的应用。当被一个领先的网站提及时，情况会变得更好！\n\
  \n2009 年 12 月 29 日，这一句话改变了 Safety Light 的未来：\n\n“如果你打算做一个 iPhone 手电筒应用，你不如把它做得最好。”\n\
  \n`http://daringfireball.net/linked/2009/12/29/safety-light`\n\n实际的话语本身并不如写下它们的人重要。这篇短文出现在\
  \ Daring Fireball 上，这是一个有影响力的网站，提供关于 Mac 和 iPhone 的新闻和评论。运营该网站的记者 John Gruber 善于发现优秀的应用，读者们也喜爱他的发现。由于这次推荐，超过\
  \ 10,000 人访问了 Safety Light 网站，其中有 688 人决定购买该应用（图 9-7）。\n\n**281**\n\n![图 88](img/index-300_1.png)\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**图 9-7：** *此图显示了托管 Safety\
  \ Light 网站的网络服务器上的流量。来自 Daring Fireball 在上午 10:30 的一个链接导致了流量剧增。在选择网站托管服务商时，要询问他们处理此类带宽异常的规则。网站因访问量过大而宕机会导致你损失销售额。*\n\
  \n在此次曝光之前，Safety Light 的日收入约为 25 美元。在帖子发布当天，日收入超过了 450 美元。Daring Fireball 的提及还将\
  \ Safety Light 推到了实用工具类别前 100 名的第 40 位。\n\n教训：不要低估媒体关系的重要性。\n\n### 像野火一样蔓延\n\n当一个拥有大量读者的网站链接到一个产品时，这个链接往往会像涟漪一样扩散到其他网站。这正是\
  \ Daring Fireball 提及后发生的事情，它帮助扩大了 Safety Light 的知名度。\n\n这种效应与你上一章（第 259 页）看到的社会认同并无二致。如果一位作者认为某个应用有价值，其他作者也会查看并加入他们独特的观点。这也是为什么你的公关策略不应该只有一种方法：一位作者会抓住“最好的手电筒”这一点，另一位看到独特的设计和\
  \ SOS 信标，而第三位则会关注 Disco Mode。\n\n**282**\n\n\n以下是 `Daring Fireball` 发文后提及或评测了 `Safety\
  \ Light` 的部分网站示例：一家巴西 `Mac` 网站甚至报道了此事！\n\n- **Laughing Squid.** `http://laughingsquid.com/safety-light-iphone-flashlight-app-with-sos-signal-feature-for-emergency-rescue/`\n\
  - **The iPhone Blog.** `http://www.theiphoneblog.com/2009/12/29/safety-light-iphone-flashlight-app-redeemed/`\n\
  - **Download Squad.** `http://downloadsquad.com/2009/12/30/safety-light-not-just-another-iphone-flashlight/`\n\
  - **Mac Magazine (巴西).** `http://macmagazine.uol.com.br/2009/12/30/se-voce-for-baixar-uma-lanterna-para-o-iphone-opte-logo-pela-melhor-safety-light/`\n\
  \n**提示：** `Google Language Tools` (`http://google.com/language_tools`) 可以帮助你理解外语评测。翻译过程中会有部分信息丢失，但足以掌握大意。\n\
  \n请务必尽快将评测链接汇总到你的推广网站上。\n\n此外，挑选出最佳评测，将其添加到 `iTunes Connect` 中的应用描述中。\n\n## 在线广告\n\
  \n提高应用知名度的另一途径是在线广告。媒体报道和提及往往能在短期内引发热潮；你会持续几天获得大量流量，然后热度便会消退。\n\n广告是一个极好的补充，因为它能形成*重复*曝光。如果你在热门网站上投放广告，访问者会反复看到你的品牌和营销信息。\n\
  \n此外，广告网络还能让您在用户使用 `iPhone` 或 `iPod touch` 时向其展示广告——这是与潜在客户直接建立联系的渠道。\n\n### 预算\n\
  \n那么，应该在广告上投入多少资金呢？要回答这个问题，你需要同时考虑你推广的产品以及你希望采用的广告类型。\n\n广告界的一条通用经验法则是，应将总销售额的 5%–10%\
  \ 再投资于产品营销。这是思考预算投入的一个良好起点，但正如你将要看到的，具体情况会根据应用的价格而发生显著变化。\n\n在所有这些广告方案中，都要思考每笔销售能带来多少利润。很容易忘记苹果要抽成\
  \ 30%。对于售价 99 美分的应用，每售出一个单位你只能赚到 70 美分。如果你的应用售价为 4.99 美元，净收入则是 3.50 美元。正如你将看到的，为低价应用找到有效的广告方式相当困难。\n\
  \n### 第 9 章：你已经有客户了！\n\n`http://www.it-ebooks.info/`\n\n**广告与推广**\n\n#### 基于展示次数的广告\n\
  \n这种传统的在线广告形式基于广告向访问者展示的次数。你按千次为单位购买*展示次数*（通常称为 `CPM`）。`CPM` 广告的价格可低至每千次展示 1 美元，最高可达数百美元。\n\
  \n**注意：** \"`CPM`\" 代表\"每千次成本\"。该缩写中的 `M` 是表示 1000 的罗马数字。当你进入在线广告领域时，你会发现许多奇怪的三字母缩写词。\n\
  \n成本取决于投放广告的网站。每个网站吸引不同类型的客户。它们每天吸引的访问者数量也差异巨大。\n\n在咨询广告费率时，不要害怕询问人口统计数据和流量统计信息。\n\
  \n如果你打算在一个热门游戏网站上为你的 `iPhone` 游戏投放广告，请准备好支付高昂的 `CPM`。服务于特定小众受众的小型网站 `CPM` 较低，可能更适合你的产品。在评估基于展示次数的广告成本时，牢记盈亏平衡点至关重要。当你将千次展示的成本除以每笔销售的收入时，就能收回广告成本。\n\
  \n例如，如果你为售价 99 美分的应用支付每 `CPM` 1000 美元的费用，你需要额外卖出 1,429 份才能实现收支平衡（每 `CPM` 1000 美元\
  \ / 0.70 美元收入）。考虑到广告活动最多覆盖一千名客户，卖出 1,429 份的可能性极低。你几乎等于在往窗外扔百元大钞。另一方面，如果你的应用售价为 4.99\
  \ 美元，而 `CPM` 为 100 美元，则只需售出 29 份就能支付广告费用。这意味着看到广告的一千人中，仅有 2.9% 需要购买。对于合适的受众群体而言，这是一个可以实现的目标。\n\
  \n在寻找网站投放应用广告时，请记住，出售广告位的商家通常在定价上具有一定灵活性。不要害怕就报价进行谈判。如果你愿意将广告投放日期调整到能让发布商填补空位的时间，通常能获得更优惠的费率。\n\
  \n#### 基于点击的广告\n\n许多广告网络——包括 `AdMob` 和 `Google`——现在都采用基于每次点击成本（`CPC`）的模式投放广告。你通过指定愿意为每个点击广告的人支付多少费用，与其他广告主竞争广告位。你愿意为每次点击支付的价格越高，你的广告在网络上展示的可能性就越大，展示频率也越高。\n\
  \n`http://www.it-ebooks.info/`\n\n**广告与推广**\n\n要确定每次点击应该支付多少费用，你需要了解有多少访问 `iTunes`\
  \ 中页面的人实际进行了购买。这个*转化率*通常在潜在客户的 5% 到 10% 之间。也就是说，每 100 个在 `iTunes` 上看到你页面的人中，大约有\
  \ 5 到 10 人会购买产品。\n\n要为售价 99 美分的应用广告实现盈亏平衡，将每单位净收入（0.70 美元）乘以每次点击带来的销售量（5% 到 10%\
  \ 的转化率），得出的 `CPC` 范围在 0.035 美元到 0.07 美元之间。对于售价 4.99 美元的应用，得出的 `CPC` 则在 0.17 美元到\
  \ 0.35 美元之间。\n\n当然，在广告投放期间要监控你的销售情况，以便更准确地了解真实的转化率。广告网络会报告广告被点击的次数，而苹果会报告每日销售数据。将广告投放当天的销售数量与你的日均销售数量进行比较，并利用结果计算转化率。\n\
  \n例如，`Safety Light` 的一个广告于 2010 年 1 月 5 日在 `AdMob` 上进行了短期投放。使用 0.05 美元的 `CPC`，在短短几个小时内产生了\
  \ 127,634 次展示。广告获得的 1,000 次点击带来了 0.78% 的 `CTR`（点击率）。当天的销售额比平均水平高出约 20 笔，转化率为 2%。`AdMob`\
  \ 要求最低 `CPC` 出价为 0.05 美元，因此，当 99 美分产品的转化率低于 7% 时，你就是在浪费钱。Safety Light 的转化率远低于这个阈值，因此没有再开展广告活动。\n\
  \n广告活动在短短几小时内就完成这一事实表明，有大量 `iPhone` 应用在展示广告，并且有大量客户愿意点击它们。这对你是有利的，因为这意味着即使 `CPC`\
  \ 较低，你也能获得大量曝光，这对价格较高的应用尤其有利。如果 `Safety Light` 定价为 4.99 美元，在相同的 1,000 次点击和 0.05\
  \ 美元 `CPC` 下，每天只需额外 15 笔销售就能实现成本效益。\n\n你的目标是找到能够产生额外销售的最低可能 `CPC`，由于每个产品都是独一无二的，确定这一点的唯一方法是通过反复试验。投入部分广告预算来找出哪些有效、哪些无效。\n\
  \n#### 固定费率\n\n在固定费率广告中，网站或广告网络同意以固定成本在特定时期内投放你的广告。既不保证展示次数，也不保证点击次数。那么，这种广告投放方式能带来什么呢？\n\
  \n\n\n# 这类广告首先能为您带来极高的曝光度\n\n您的广告很可能是页面上唯一的广告。一个广告网络的例子是 Deck Network（`http://decknetwork.net`）。该网络将广告投放在对创意、网页和设计行业极具影响力的网站上。如果您的产品能吸引这些领域的客户，投入数千美元进行广告投放可能会产生显著效果（图\
  \ 9-8）。\n\n![图 89](img/index-304_1.jpg)\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 广告与推广\n\n**图 9-8：** Zeldman.com 此页面上唯一的广告是 Safety Light 的广告。该广告通过 Deck Network\
  \ 投放——这是一个由吸引创意、网页和设计行业的网站组成的联盟。在广告投放期间，Safety Light 推广网站的访问量比平时高出约 10 倍，销售额也翻了一番。\n\
  \n## 赞助\n\n另一个新兴趋势是*博客赞助*。您的产品会在博客读者中获得很高的曝光率。如同公共广播赞助一样，您并非直接推销产品或品牌。赞助费率从每周数百美元到数千美元不等；网站影响力越大，成本越高。\n\
  \n两个例子是 Daring Fireball（`http://daringfireball.net/feeds/sponsors/`）和 Hivelogic（`http://hivelogic.com/sponsorship`）。\n\
  \n这类广告形式的主要好处在于，您的产品与可信赖的来源关联在一起。从 Daring Fireball 提及后的反馈（第 281 页）可以看出，当您的产品拥有这种积极的关联时，客户购买起来会容易得多。\n\
  \n## 品牌建设\n\n广告费用高昂。您需要从中获取尽可能多的价值。最初，人们很容易只专注于为单一产品做广告，因为那时您只有这一款产品。更聪明的开发者会考虑长远，同时为产品*和*品牌做广告。\n\
  \n您会在大型开发者和发行商身上看到这一点。如果您一直关注 iPhone 游戏市场，很可能听说过《Rolando》和《Topple》这些热门系列。更重要的是，您可能也知道发行这些游戏的公司\
  \ ngmoco:)。\n\n这并非偶然。这类公司在推广品牌上投入的精力，与推广单个应用一样多。原因很简单：如果您对 ngmoco:) 的一款游戏感到满意，就更愿意接受他们的新作品。您可能完全不知道《Dr.\
  \ Awesome》是什么，但仅仅因为非常喜欢《Rolando》就将其买下。一旦您拥有多款产品，就可以零成本地建立自己的品牌。这就是最好的广告。\n\n许多应用在游戏选择界面或帮助界面中加入了交叉推广。如果用户喜欢某款应用，她自然想了解您的其他作品。进行这种品牌广告宣传时需要注意的一点是，不要惹恼您的用户。要做得巧妙，否则您有可能把一个粉丝变成敌人。\n\
  \n当您拥有多款产品时，还应考虑建立一个展示所有产品的推广网站。例如，Iconfactory 的所有应用都列在 `http://iconfactoryapps.com`。该网站将交叉推广扩展到同时涵盖\
  \ Mac 和 iPhone 平台。最终目标是，当用户看到“来自 Iconfactory”时，会想到“这一定很棒”。\n\n## 推广码\n\n另一种获得免费广告的方式是使用*推广码*。顾名思义，这些代码可以帮助您提高产品的知名度。正如您在第\
  \ 262 页所见，评测者应该优先获得您的推广码。通过将单个代码提供给一位受欢迎的评测者，您可以接触到成百上千位阅读该评测的潜在客户。\n\n**小贴士：**\
  \ 开发者、评测者和用户通常都称这些代码为 *promocode*。在字符数限制为 140 个的 Twitter 上发帖时，这个缩写无疑很有帮助！\n\n幸运的是，Apple\
  \ 提供的推广码远超您发布应用所需的量——您应用的每个版本总计有 50 个。您可能不会把全部代码都给评测者，所以用剩下的来为产品制造热度。而最好的方式就是将它们送出去。人们喜欢赢取奖品，即使只值一两美元。\n\
  \n赠送推广码最简单的方法，是向关注您社交网络账户的用户发布一条消息。广告的核心就是触达人群，因此如何赠送这些宝贵的代码至关重要。\n\n![图 90](img/index-306_1.png)\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 附带条件\n\n有些开发者只是发布推广码，不要求任何回报。这当然有效，但您无法触达比现有粉丝更多的人。没有“回响”来激发其他人的兴趣。相反，您应该让您的粉丝向他们的粉丝发布消息来赢取奖品。\n\
  \n例如，这条消息被发送给了 Twitter 上超过 6100 个粉丝：\n\n“想要《Safety Light》的免费拷贝吗？发布一条包含 `http://safetylightapp.com`\
  \ 链接的新推文，我会给前 20 位私信一个推广码。要有创意哦！” `http://twitter.com/chockenberry/statuses/7491384567`\n\
  \n在接下来的几个小时里，该社交网络上有 60 条指向 Safety Light 推广网站的链接被发布。这些链接反过来又触达成百上千访问该网站的人（图 9-9）。\n\
  \n**图 9-9：** 该图表显示了 2010 年 1 月 7 日在 Twitter 上赠送推广码所产生的流量。Safety Light 网站的流量在大约 12\
  \ 小时内持续走高，而销售额在接下来的 5 天里保持增长。\n\n随后使用 Twitter 的搜索功能寻找中奖者：`http://search.twitter.com/search?q=safetylightapp.com`。在显示\
  \ 20 条推文后，通过私信向所列账户发送了推广码。有些开发者采用自动方式来生成这些推广信息。这些*推文轰炸*是一种强大的推广工具，但也存在疏远潜在客户的风险。毕竟，同样的信息反复出现会让人感到厌烦。\n\
  \n为了更有人情味，可以要求您的粉丝在发布关于您应用的推文时发挥创意。\n\n这种赠送活动的一种变体，是将您的推广码作为竞赛奖品提供给博客。许多博客喜欢举办此类竞赛来吸引新读者，并让现有读者兴奋起来。您从提供竞赛奖品中受益，因为可以接触到博客的访问者，其数量少则上百，多则成千上万。同时，由于您支持了博客读者喜爱的事物，也能与他们建立积极的联系。\n\
  \n**注意：** 当您开始分发这些推广码时，会发现一个严重的缺陷。与 iTunes 的其他所有方面不同，这些推广码目前仅在美国商店有效。有些中奖者将无法兑换他们的奖品。许多美国以外的用户已经知道这一限制，因此不会费心参加竞赛。对于不了解此限制的用户，您需要道歉并解释这是\
  \ Apple 的政策，而非您的。\n\n### 补充\n\n\n好的，这是根据您的要求，将给定的英文文本翻译成中文的译文。\n\n\n请记住，每当苹果批准新版本时，你会额外获得\
  \ 50 个促销码。当你看到状态变为`Ready For Sale`（第 268 页）后，计数器会重置到最大值，即使你之前在旧版本中还有剩余码。不要浪费你的促销码。在你上传新版本后，立即申请所有剩余的促销码。这些码有效期为\
  \ 30 天，你可以用它们来推广当前版本或即将推出的版本。\n\n## 促销价格\n\n拿起一份本地报纸看看广告：你会发现充斥着“五折优惠”或“限时特惠，立省\
  \ 20 美元”这样的字眼。消费者通常会关注他们省了多少钱，而不是花了多少钱，这很正常。\n\n优秀的广告商知道，每个人都希望认为自己买到了物超所值的东西。这在\
  \ App Store 里也是一样。你可以通过给顾客提供更低的价格来提升销售势头。\n\n对许多产品来说，这一策略并不会带来收入的大幅增长。\n\n例如，如果你每天以\
  \ 1.99 美元的价格卖出 100 个单位，那么以 99 美分的价格，预计能卖出大约 200 个单位。你的总收入在促销期间并不会有太大变化。那为什么要这么做呢？\n\
  \n-   **促销能给你创造在互联网上制造话题的机会。** 网站会链接到你的产品，因为他们知道读者喜欢了解好交易。\n\n**注意：** 请记住，这些网络链接在促销结束后仍然会存在。这是件好事，因为人们仍然会访问你的推广网站并了解你的产品。\n\
  \n-   **扩大你的客户基础也有助于口口相传的推荐。** 那些喜爱你的产品*而且*买到了实惠的人会告诉他们的朋友。\n\n-   **增加的销售量可以让你进入\
  \ iTunes 上你所在类别的畅销榜。** 如果你已经在榜上，它会提升你的排名。\n\n促销价格也在决定你的首发价中扮演着角色。如果你以 99 美分起步，那么你就没有空间玩这个游戏了。另外请记住，降价远比涨价容易：一些客户会因价格上涨而感到被欺骗。\n\
  \n*埃迪并不是真的疯了*\n\n当然，最终的促销是免费赠送你的产品。听起来很疯狂，但当你考虑到第 289 页提到的几点时，就不会这么认为了。这本质上是以损失销售收入为代价进行广告宣传。例如，如果你一款\
  \ 99 美分的应用通常日销量为 100 个单位，免费赠送每天会花费你 70 美元。当你考虑本章前面提到的广告成本时，这个代价相当低廉。\n\n**注意：**\
  \ 第 260 页讨论的这种促销技巧的一个变体是，提供一个免费试用版，通过应用内购买来提供附加功能。一个出色的试用版能提升你应用的知名度，并让你在客户享受产品的同时进行销售。\n\
  \n*让人们知道*\n\n为了最大化促销价格的效果，你需要让人们知道这件事。是的，这意味着你要为广告再做一次广告。欢迎来到疯狂的市场营销世界！\n\n你会使用常规的媒体渠道，让媒体知道促销何时进行。社交网络也是传播信息的绝佳机制。\n\
  \n对于那些已经上榜，或者预期会因销量提升而上榜的应用来说，在 iTunes Connect 中更新应用图标可以吸引人们对促销活动的关注。\n\n## 绘制图表\n\
  \n那么，所有这些广告和促销活动会如何影响你的收入呢？回答这个问题的最佳方式，就是看一看 Gas Cubby（一款追踪车辆保养并计算里程的应用）一年内的销量图表。该应用的开发者\
  \ David Barnard 详细记录了一年中的销售情况和事件，并制作了图 9-10 所示的图表。\n\n你可以很轻易地看到被 The Unofficial\
  \ Apple Weblog (TUAW)、Gizmodo 和 CNN/Time 等主流网站提及的影响。许多 iPhone 开发者期待的另一个事件是节假日：圣诞节当天，随着人们收到礼品卡和崭新的硬件设备，销量会大幅攀升。\n\
  \n最初，App Store 会在每个类别的页面上显示产品更新。图 9-10 中针对 2.0.1 更新的峰值在今天不会发生，因为 iTunes 内现在只突出显示新版本发布。保持产品更新也许会带来一些媒体报道，但其主要好处是通过修复错误和增加新功能来让客户满意，而不是驱动新销量。\n\
  \n![图片 91](img/index-309_1.jpg)\n\n**图 9-10：** *这张图表展示了 App Cubby 销售的 Gas Cubby\
  \ 应用第一年的销量。在知名网站上的提及和新版本发布都带来了销量峰值。在 App Store 内的推广对收入也有巨大影响。*\n\n最大的峰值来自苹果本身。出现在\
  \ App Store 首页的`热门`或`编辑推荐`中，会带来持续数周的巨量增长。图中部的巨大峰值则是应用被刊登在苹果网站上，并通过邮件发送给所有客户的结果。\n\
  \n**提示：** 你可以从 Rana June Sobhany (O'Reilly) 所著的 *MarketingiPhoneApps* 中，了解更多关于图\
  \ 9-10 的图表信息以及其他市场营销话题。\n\n## 监控覆盖情况\n\n现在你的广告和促销活动正在全力运转，你必须问自己一个问题：这有效吗？\n\n要回答这个问题，你必须监控你产品的可发现性、销售排名和链接有效性。这听起来有点像市场营销的废话，但实际上是一些相当酷的技术。\n\
  \n### 排名\n\n苹果提供的数据源包含了每个 App Store 类别中顶级应用的排名以及总排名。这些数据源被细分为免费榜、付费榜和最高收入榜。正如你在第\
  \ 273 页所学到的，一些销售跟踪应用可以让你下载和显示这些排名。\n\n如果你的产品进入了前 100 名榜单，你需要非常密切地追踪它的位置变化。这时候就需要一款名为\
  \ `MajicRank` ( `http://majicjungle.com/majicrank.html`) 的 Mac 桌面应用了。\n\nDave Frampton\
  \ 开发了这款应用来追踪他热门的 iPhone 游戏 Chopper。\n\n通过 `MajicRank`，你可以按照自己设定的时间间隔自动下载排名。你的应用排名会被绘制成图表，如图\
  \ 9-11 所示。\n\n使用 `MajicRank` 软件需要支付 20 美元的捐赠费用。\n\n![图片 92](img/index-310_1.jpg)\n\
  \n**图 9-11：** *这张由 MajicRank 生成的图表，显示了 Safety Light 在被 Daring Fireball 推荐后，每半小时排名变化的情况。你可以看到从\
  \ 1 月 5 日开始的广告和其他促销活动的影响。有趣的是，Safety Light 唯一上榜的欧洲地区是意大利，而该应用唯一本地化的语言也是意大利语。*\n\n\
  排名追踪也是关注你竞争对手的好方法。与只有你和你的团队才能访问的详细销售数据不同，排名是公开信息。当一个竞争应用发布了带有新功能的版本并且排名上升时，你可以推断其销量增加了。这意味着你有工作要做了。\n\
  \n### 谷歌\n\n在查找指向你应用的链接方面，谷歌是你的朋友。当然，你需要搜索你的应用名称。对于像 `Safety Light` 这样常见的应用名称，你会得到很多与\
  \ iPhone 应用无关的结果。在这种情况下，只需搜索 *Safety Light app*，结果就会相关得多。\n\n\n\n### 广告与推广\n\n同时，搜索指向你推广网站的链接。除了在\
  \ Google 主搜索框中输入 `safetylightapp.com`，还可以查看哪些博主正在链接到你的产品。为此，请访问 `http://blogsearch.google.com`\
  \ 并输入 `link:safetylightapp.com`。\n\n在寻找人们谈论你产品的过程中，试着像他们一样思考。使用诸如 `flashlight for\
  \ iPhone` 和 `flashlight app` 这样的短语，而不仅仅是产品名称。\n\n如果你在 App Store 中拥有多个相互竞争的应用程序，你还能深入了解人们对这些其他产品的看法。\n\
