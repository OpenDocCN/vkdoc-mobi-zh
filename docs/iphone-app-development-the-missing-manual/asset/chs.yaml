  \ ID。这个唯一标识符通过模式匹配来指定哪些应用可以运行。模式匹配可以包含用作通配符的星号。\n\n在查看手电筒应用的 `Info.plist` 时，你会看到它的\
  \ Bundle Identifier 被定义为 `com.iconfactory.FlashlightPro`。这个反向域名路径唯一地标识了该手电筒应用来自\
  \ Iconfactory。如果你从 iPhone 开发中心下载过示例代码，你会发现许多应用的标识符都以 `com.yourcompany` 开头。\n\n假设你的域名是\
