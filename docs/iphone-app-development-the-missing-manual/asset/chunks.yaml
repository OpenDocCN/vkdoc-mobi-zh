- fmt: "***Tip:*** If you want to skip this preview window and jump right to the documentation\
    \ window, `Option-⌘`-double-click the symbol name.\n\nTo find a definition, `⌘`-double-click\
    \ the name. If you get multiple matches, which is common with method names, you’ll\
    \ be shown a list of choices before the `@interface` or `@implementation` is shown.\n\
    \nIf you’re like most iPhone developers, you’ll soon be using the mouse and these\
    \ two keys without even thinking.\n\n## Learn to Be Lazy\n\nThere’s that *L* word\
    \ again. But the fact is, with Cocoa, a lot of great code has already been written\
    \ for you. When you’re starting out, it’s natural to have the urge to write something\
    \ yourself. Especially when it’s a new language and you want to start exercising\
    \ your new skills. When you feel that urge, take a moment to open the documentation\
    \ and do a little research.\n\nIf you find something that’s close to what you\
    \ need, try to use a category to extend an existing class. If that won’t work,\
    \ try to create a subclass and add new functionality.\n\nWhen all else fails,\
    \ implement your own class from scratch.\n\nAnd with that advice it’s now time\
    \ to head to the next chapter, where you’ll start to learn about some of this\
    \ great code you now have at your disposal.\n\n---\n\n**64**\n\niPhone App Development:\
    \ The Missing Manual\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n---\n\
    \n# Cocoa Touch: Putting Objective-C to Work\n\nNow that you’ve gotten a taste\
    \ of Objective-C, it’s time to put the language to work. If you think of Objective-C\
    \ as the glue for building applications, you’re now going to explore the building\
    \ blocks—parts of the Cocoa Touch frameworks—that get pieced together with your\
    \ new adhesive.\n\nBefore you start gluing the components of the Cocoa Touch frameworks\
    \ together, you’ll need to learn a bit about the architecture and design patterns\
    \ recommended by Apple’s engineers. Just as knowing how the correct building materials\
    \ work together helps to build a house, a good working knowledge of the frameworks\
    \ lets you build more robust applications and save time.\n\nYou’ll also learn\
    \ where to look for more information about Cocoa Touch. Plenty of resources on\
    \ the Web and in your favorite bookstore can help you improve your iPhone development\
    \ skills.\n\n## Get in Cocoa Touch\n\nThe Cocoa Touch frameworks are extensive,\
    \ and hundreds of classes are at your disposal. Learning how to use this rich\
    \ collection of components takes time. The best way to approach this Herculean\
    \ task is to learn the common design patterns and functions implemented by the\
    \ frameworks.\n\nIn the following sections, you’ll see how Cocoa Touch uses models,\
    \ views, and controllers (MVC) to implement your application. You’ll also see\
    \ how to use a target-action design pattern to hook the visual components to the\
    \ code that does the actual work. In the process, you’ll see how delegation is\
    \ a powerful mechanism for leveraging code from the system frameworks. Of course,\
    \ you’ll also learn about managing data objects and collections, along with some\
    \ of the more important design patterns.\n\n---\n\n**65**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n---\n\n## The Big Three: Models, Views, Controllers\n\n### Behind the Scenes:\
    \ What’s in a Name?\n\nYou’ve probably heard the name “Cocoa Touch” used to describe\
    \ the programming environment on the iPhone. But what is it?\n\nStrictly speaking,\
    \ Cocoa Touch is just two frameworks that provide the most important building\
    \ blocks for your app:\n\n- **Foundation.** This framework gives you the main\
    \ building blocks. Within this framework, you’ll find classes that manage data\
    \ (such as `NSString`, `NSNumber`, and `NSDate`), that read and write information\
    \ (`NSFileManager`, `NSUserDefaults`), that communicate with the network (`NSURLConnection`),\
    \ and much more.\n- **UI Kit.** Every application will have windows, views, buttons,\
    \ and other interface elements. The `UIKit` framework provides the pieces that\
    \ let users interact with your creation. You see these classes in the Interface\
    \ Builder library palette.\n\nDevelopers sometimes use the term “Cocoa Touch”\
    \ as an all-encompassing name for other development technologies that work alongside\
    \ base frameworks to create an app. You’ll find yourself using many other supporting\
    \ frameworks as you build your application. The most popular ones are:\n\n- **Core\
    \ Graphics.** A C-based API for drawing graphics (using the Quartz rendering engine).\
    \ This low-level framework provides functions for drawing vector paths and bitmaps,\
    \ 2-D coordinate transforms and masking, color and image management, and much\
    \ more.\n- **OpenGL ES.** Another C-based interface for accelerated rendering\
    \ of 2-D and 3-D graphics. The implementation conforms to the OpenGL ES 1.1 and\
    \ 2.0 specifications.\n- **Core Animation.** This Objective-C API provides classes\
    \ that allow sophisticated compositing and animation of a 2-D image hierarchy\
    \ based on layers. This high-level framework greatly simplifies your code and\
    \ improves the user experience. A nice side benefit is that it improves performance\
    \ by leveraging low-level APIs such as OpenGL.\n- **Core Data.** This sophisticated\
    \ framework manages a graph of objects with transparent persistence in XML or\
    \ SQLite files. Xcode provides tools to describe the objects and the relationships\
    \ between them. The tools fetch objects using predicates and sort them using descriptors.\n\
    - **Core Audio.** A collection of frameworks that let audio be played, recorded,\
    \ processed, and converted.\n\nYou can learn more about these building blocks\
    \ by searching for their names in the documentation viewer.\n\n## The Big Three:\
    \ Models, Views, Controllers\n\nCocoa Touch gives you hundreds of object classes\
    \ to wrap your head around. Fortunately, most of these classes fall into three\
    \ categories. And the objects in these categories interact in a simple and well-defined\
    \ way.\n\nEvery iPhone application uses a simple Model-View-Controller design\
    \ pattern. And since developers are just as lazy with writing as they are with\
    \ coding, you’ll often find this referred to as “MVC.”\n\n***Note:*** If you’ve\
    \ used other languages and development environments, you’ll be very happy to know\
    \ that MVC in Cocoa is no different than the ones you’re used to. The objects\
    \ change, but the concepts don’t.\n\n---\n\n**66**\n\niPhone App Development:\
    \ The Missing Manual\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n---\n\
    \n## The Big Three: Models, Views, Controllers\n\nTo see the simplicity of this\
    \ design, take a look at Figure 3-1.\n\n```\nUser Action\n   |\n   v\n Controller\n\
    \   |\n   +----> Model (Update)\n   |\n   +----> View (Update Notify)\n```\n\n\
    ***Figure 3-1:*** *This graphic shows how models, views, and controllers work\
    \ together, as described on the following pages.*\n\nThat’s all there is to an\
    \ iPhone app. And things get even better when you realize that views and controllers\
    \ in the frameworks already do most of the hard work. Even the creation of model\
    \ objects is simplified with the help of Cocoa Touch.\n\nSo what are the roles\
    \ of each of these object types? Read on.\n\n### Views\n\nYou know all those buttons,\
    \ scrolling lists, web browsers, and everything else that appears on your iPhone\
    \ screen? Those are all *views.* Views know how to present your application’s\
    \ data. Some views also know how to react to user input. A `UIButton` view responds\
    \ to a user’s touch. A `UITextField` view takes input from the virtual keyboard.\n\
    \nIn many applications, you’ll create your own views for displaying specific data.\
    \ For example, there’s no standard widget for displaying stock graphs, so if you\
    \ want to do that, you’ll have to come up with your own solution.\n\nLikewise,\
    \ many designers and developers want to customize the look of their application.\
    \ Whether your motivation is product branding or just wanting to stand out in\
    \ a crowd, creating a unique look for your app involves building new views based\
    \ on standard `UIView` and `UIControl` classes."
