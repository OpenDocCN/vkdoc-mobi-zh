    \ to send a `-setExclamationCount:` message to an instance of `NSString` instead\
    \ of to `AwesomeStringMaker`, you'll get a \"method not found\" warning while\
    \ compiling your code. At runtime, your application will crash with an exception\
    \ in `objc_msgSend` because the `NSString` class doesn't know what to do with\
    \ the message you've sent.\n\n## Managing Memory\n\nIf you take a look at your\
    \ class's accessors for `exclamationCount` and `originalString`, you'll see some\
    \ new methods being called on the instance variables. The `retain`, `copy`, and\
    \ `release` messages are extremely important: You use them to manage the memory\
    \ usage of objects.\n\n**Note:** Memory is also one of the more complicated things\
    \ to understand about Objective-C, so don't get frustrated if you don't understand\
    \ it at first.\n\nAs you learned before, thousands of objects are created and\
    \ deleted every second that you're using your iPhone. And each of those objects\
    \ uses a chunk of memory, which is a precious resource on a mobile device. Your\
    \ desktop computer may measure its memory capacity in gigabytes, but your phone\
    \ only has a few hundred megabytes.\n\nIf you're not careful about your memory\
    \ usage, the iPhone's operating system will shut down your application. If it\
    \ didn't, the system would eventually grind to a halt, and you'd have to reboot\
    \ your phone. That's kind of inconvenient when you're expecting an important call.\n\
    \nSo how is memory managed with these `-retain`, `-release`, and `-copy` methods?\n\
    \nEvery object in memory maintains a counter. This counter keeps track of how\
