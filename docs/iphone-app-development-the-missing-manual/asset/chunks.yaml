    \ to save the file.\n\nNow switch back to the Xcode project window for the Flashlight,\
    \ and select Build➝Build and Run.\n\n**Note:** If you see a window pop up with\
    \ a warning to Stop Executable, just click OK. Xcode is just reminding you that\
    \ you already have an application running in the simulator.\n\nChapter 1: Building\
    \ Your First iPhone App\n\n**27**\n\n![Image 20](index-46_1.jpg)\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**Exploring Your New Tools**\n\n**Figure 1-14:** Changing your application window’s\
    \ background color involves clicking a color wheel. After selecting the Window\
    \ in the `MainWindow.xib` document (A), you view the attributes (B), which include\
    \ a background color. Clicking in the well (C) brings up a color wheel (D) where\
    \ you can select a new color with your mouse. As you select new colors, you get\
    \ immediate feedback.\n\nYou’ve just made your first iPhone application and customized\
    \ it to fit your own tastes. Well done!\n\nNow that the journey is complete, read\
    \ on to look at some details for things you saw along the way.\n\n**28**\n\niPhone\
    \ App Development: The Missing Manual\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# The Power of Brackets\n\nYou’ve now seen how easy it is to build an iPhone\
    \ app: It’s not rocket science.\n\nOr is it?\n\nApple has done an excellent job\
    \ of creating the tools you use for building iPhone applications, but if you’re\
    \ going to become a master craftsperson, you need to learn more about these new\
    \ tools. The first section of this chapter will get you started in this exploration:\
    \ You’re going to take a look at the basics of the Objective-C language used to\
    \ create apps.\n\nAlso, a thriving community of developers is working on the iPhone.\
    \ You’ll learn where to look for help with your coding questions, how to keep\
    \ up with the ever evolving technologies used in the iPhone, and where to download\
    \ free sample code to use in your own app development.\n\n**Note:** There’s a\
    \ lot to learn in Objective-C. The book you’re holding now would weigh several\
    \ more pounds if the language were covered in depth. Instead, this chapter will\
    \ cover the topics that you’re most likely to encounter in iPhone development.\n\
    \nAt the end of the chapter, you’ll see some recommendations on where to look\
    \ for additional information.\n\nOnce you’ve gotten up to speed with the essential\
    \ parts of the language, you’ll take a quick look at the documentation viewer\
    \ that’s built into Xcode. Knowing how to find information quickly and effectively\
    \ will ease your entrée into this new platform.\n\n**29**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Objective-C: The Nuts and Bolts for Your iPhone App\n\nIn this section, you’ll\
    \ explore the language used for programming iPhone applications: Objective-C.\
    \ This chapter won’t teach you how to program, but rather will show you the differences\
    \ between this language and others you might have used.\n\nYou’ll also encounter\
    \ features that are exclusive to Objective-C.\n\n### The Land of Square Brackets\n\
    \nWhile you were creating your flashlight, you might have noticed this line of\
    \ code:\n\n```\n[window makeKeyAndVisible];\n```\n\nIf you’ve programmed in Java,\
    \ C, or JavaScript, those square brackets probably made you scratch your head.\
    \ You’re not the first developer to react that way!\n\nSo what are those funny\
    \ brackets for? Before that question is answered, take a look at the language’s\
    \ name—the *C* on the end. You see, this whole new language is really based on\
    \ an old one: the C language developed by Dennis Ritchie at Bell Telephone Laboratories\
    \ in 1972. As with Java and JavaScript, the creators of Objective-C built something\
    \ new on top of something familiar to many programmers. Once you learn a few tricks,\
    \ this language will quickly become familiar to you, too (For more information\
    \ on the relationship between Objective-C and other C languages, see the box below).\n\
    \n**Under The Hood: C Plus Stuff**\n\nObjective-C is a superset of the C language\
    \ syntax. Everything you see in this chapter is built using the GNU C/C++ compiler.\n\
    \nWhen a source file uses `.m` rather than `.c`, additional processing on the\
    \ file occurs (similar, in concept, to using a preprocessor). This step hooks\
    \ your code into a small runtime that supports the features of Objective-C. Classes\
    \ and objects are simply C structures; the runtime lets them communicate with\
    \ each other via introspection and message passing.\n\nBecause the entire infrastructure\
    \ is based on standard C, it’s easy to mix in open source libraries and legacy\
    \ code with your Objective-C application. You don’t have to give up your prized\
    \ C/C++ source code when starting with this new language.\n\nThat said, many developers\
    \ find working in this object-oriented environment quite addictive. It’s fairly\
    \ common to see Objective-C used as a wrapper that makes an open source library\
    \ easier to work with. A good example is with regular expressions: Cocoa Touch\
    \ has no native support for them. Thanks to the work of John Engelhart, the RegexKit\
    \ Framework (`http://regexkit.sourceforge.net/`) makes Perl Compatible Regular\
    \ Expressions (PCRE) a joy to use with your string objects.\n\nAfter you’ve had\
    \ a chance to get familiar with the syntax and feel of this new language, you’ll\
    \ explore how standard C idioms are used to implement it in the box on page 60.\n\
    \n**30**\n\niPhone App Development: The Missing Manual\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## The Object of It All\n\nTake a look at the following Objective-C code. You’ll\
    \ immediately feel comfortable with the familiar expressions and control structures\
    \ you’ve used in other languages:\n\n```\nint i;\nfor (i = 0; i < 10; i++) {\n\
    \    // check for even and odd values\n    if ((i % 2) == 0)\n        [label setTitle:@″Even″];\n\
    \    else\n        [label setTitle:@″Odd″];\n}\n```\n\nIn this contrived example,\
    \ it’s easy to see that you’re checking for even and odd values in a loop that\
    \ executes 10 times.\n\nThe first part of the language’s name gives you a hint\
    \ as to what those brackets are used for: *Objective* tells you that you’re dealing\
    \ with objects. And those square brackets let you communicate with those objects.\
    \ In the first example, you were communicating with a *window* object. The second\
    \ example interacts with a *label* object.\n\nSo now you’re probably thinking,\
    \ “Great, but what’s an object?” Objective-C is what computer scientists call\
    \ an *object-oriented* language. You’re going to be doing object-oriented programming\
    \ as you develop your iPhone application.\n\n**Tip:** If you’re new to object-oriented\
    \ programming, take a moment to read the Wikipedia page on this topic. The overview\
    \ and history will help you come up to speed on the design motivations and terminology\
    \ used in this style of programming: `http://en.wikipedia.org/wiki/Object-oriented_programming`.\n\
    \n*Objects* are chunks of memory that contain code and data for your application.\
    \ One of the main tenets of object-oriented design is that your application should\
    \ know as little as possible about the inner workings of an object. Terms like\
    \ *encapsulation* and *data abstraction* describe this behavior."
