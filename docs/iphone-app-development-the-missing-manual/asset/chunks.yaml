    # 若需新的配置文件


    若需新的配置文件，测试人员应删除设备上现有的配置文件，然后将新文件拖入 `iTunes`。文件替换前会出现另一条警告。待更新文件就位后，同步操作会将新版本传输到设备上。


    如果测试人员使用 `iPhone Configuration Utility` 安装测试版本，他们必须先彻底卸载应用，然后进行全新安装。这会清除所有现有文档，因此游戏分数和其他应用数据将丢失。


    **注意：** 添加新版本的应用后，版本号可能显示不正确。若要查看正确信息，需退出并重新启动 `iPhone Configuration Utility`。


    ## 崩溃应对


    你的代码完美无瑕，对吧？没错，每个开发者都这么想，直到那些狡猾的测试人员拿到它。


    崩溃难免会发生。而这是件好事——最好在 App Store 的用户发现之前，就抓住那些糟糕的内存引用、缺失的方法以及其他问题。


    现在遇到的每个崩溃，都是日后不会重现的隐患。


    `iPhone OS` 会记录设备上发生的每一次崩溃。当崩溃发生时，系统会自动生成一个名为*崩溃报告*的文件。通常，当用户与 `iTunes` 同步时，这些文件会被上传到
    Apple。还记得应用崩溃后首次同步时 `iTunes` 弹出的对话框吗？当看到“您的设备包含诊断信息……”时，那就是崩溃报告首次被检测到并发送给 Apple。


    你可以直接从测试人员那里获取这些崩溃报告。Apple 在技术说明 TN2151 (http://developer.apple.com/iphone/library/technotes/tn2008/tn2151.html)
    中描述了该过程。简而言之，测试人员可以从其 Mac 或 PC 的 `iTunes` 中提取 `.crash` 文件，并通过邮件发送给你。然后你在 `Xcode`
    中打开 `Organizer` 窗口，将该文件拖入 `IPHONE DEVELOPMENT` 下的崩溃日志列表中。处理完崩溃报告后，数字内存地址会转换为带有行号的类名和方法名，这些行号与你源代码中的行号对应。


    **注意：** 此步骤中最重要的是保存 `dSYM` 文件和应用二进制的副本。它必须与你发给测试人员的版本完全一致，且文件必须归档在同一文件夹中。这就是 `Flashlight
    Pro` 项目能按日期和时间自动保存这些文件的原因。


    一旦获得这些信息，通常很容易追踪到错误的根源。


    ## 整理收尾


    在进行测试时，你不应同时进行活跃开发。如果那样做，测试人员面对的就是一个不断变化的目标。冻结功能集并集中精力修复出现的问题，这符合所有人的最佳利益。


    鉴于这种“不要碰代码”的指令，测试阶段正是开始整理应用外观的好时机。如果你正在进行本地化，这也是收集翻译文本并分发给测试人员的正确时机。


    ### 美化委员会


    开发者编写优美的代码。设计师绘制精美的图形。图 7-7 展示了开发者制作图形时可能呈现的效果。


    **图 7-7：** 开发过程中使用了占位图形的手电筒用户界面。测试阶段可能是清理应用视觉效果的好时机，因为无需修改大量代码即可完成。


    而当设计师出手相助时，每个人都受益。请查看图 7-8。


    **图 7-8：** 与图 7-7 相同的屏幕，但使用了设计师制作的图形。注意，由专业人士完成的工具栏图标、设置和致谢屏幕看起来要美观得多？这一改进让应用显得精致而完整。

    '
- fmt: '# Exciting Time in the Life of the Project


    For most developers, seeing the final graphics is a magic moment. The crappy graphics
    you threw into the app get replaced, and your application feels a thousand times
    better. It’s also a special time for the designer: She finally gets to see her
    pixels put into motion. Everyone’s vision is brought to fruition.


    As a part of this cleanup process, it’s often helpful to give your designer written
    instructions for each file. As the developer, you know how `ToolbarDiscoStart.png`
    is being used because it’s right there in the source. Most designers don’t read
    code, so give them a break; be explicit about what you need. Make sure to specify
    any special size, color, or placement requirements that the graphics need.


    **Tip:** The flashlight project includes a manifest file in the `Images` folder
    that explains each graphic. This way, you can give the entire directory to the
    designer, and she has everything she needs.


    # Speaking in Tongues


    In Figure 7-8, you may have noticed that the interface is being displayed in Italian.


    *Che bello!*


    The beta test is also a good time to work on any localization you’re going to
    do in the application. If you’ve been diligent about using `NSLocalizedString()`
    in your code, it’s relatively easy work. Create a localization package for your
    foreign-language translators. This package includes the `Localizable.strings`
    file and any NIBs that need to be updated. Put everything in a Zip file and send
    it.


    # Web Development


    Once you get back the localized files, you can add them to your project and do
    a build. Make sure that your translators are a part of the beta test, because
    they need to check the final results. You don’t want any *idiotzia* slipping through!


    Once you have your graphics updated and localization started, you can start to
    think about a promotional website for the product. Some developers think that
    the only promotion that they need is iTunes itself. For some simple products,
    that approach works fine. But if you have a product with any complexity, you need
    a way to show off the features to potential customers.


    The App Store only allows you to show five screenshots. And it has no way to show
    a movie of your product in action. Once people can see how great your product
    is, they’ll want to buy it. A product website gives you room to explain your product
    in greater detail than is possible within iTunes.


    Work with both your designer and marketing person on this endeavor. It’s also
    important to realize that it’s going to take awhile to develop the visuals and
    sales pitch for the site. That’s why you want to get an early start on this activity.


    ## The Site


    As a developer you can help everyone by putting some of the basic elements in
    place.


    For example, put together the basic structure of the site in HTML, and get the
    web server set up to host the files.


    **Note:** The Missing CD (`www.missingmanuals.com/cds`) contains the HTML and
    CSS source code for the Safety Light website. It’s designed to be adaptable for
    many different kinds of applications, so feel free to use it for your own products.


    As you’re working on this site, it’s important to remember that *many* users will
    be visiting from their iPhone or iPod touch. You need to make sure that any design
    you come up with works with a small screen format. It’s surprising how many developers
    never bother to open their product website on a device!


    ### Content


    For the most part, the iPhone can display the same kinds of images that your desktop
    browser can. Be careful how you present those images. Avoid JavaScript that does
    fancy zooming of screenshots: The zoom will be frustratingly slow, and the “full
    window” display is hard to navigate on the device without pinching.'
