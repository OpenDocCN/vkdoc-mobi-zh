- fmt: '# 排版后的内容


    Developers tend to look at marketing people with an evil eye. They get a bad rap
    for asking for things that are hard to implement or that don’t seem logical. They’re
    looking at your product like a normal person would. Their motivation is to position,
    promote, and sell that product to other normal people.


    # Chapter 4: Design Tools: Building a Better Flashlight


    **113**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Feedback: Don’t Take Your Own Word for It


    The best marketing people are the ones who act as a conduit of information and
    ideas between you and the person who buys your creation. If you’ve done any marketing,
    you know that developers are more receptive to ideas if they’re descriptive rather
    than prescriptive: Explain your problem, not your perceived solution. If you’re
    a small developer, you won’t have a marketing department. That’s fine because
    you can easily find a surrogate.


    Find someone you can bounce ideas off of. It should be someone who understands
    what the product does but not how it’s implemented. This person can be your spouse,
    or best friend, or even the barista at your favorite coffee shop. All that matters
    is that this person is willing to have a long-term discussion about what you’re
    doing and to provide unbiased feedback.


    Be careful about using your designer for this task. Like you, they’ll have an
    intimate knowledge of the product and may not be able to look at things with an
    untainted eye.


    ### The People Who Plunked Down Their Credit Cards


    Simply put, users are what make your product great. Whether they love your work,
    hate it, or are completely ambivalent about it, their feedback can help you improve
    your product.


    User feedback comes in many forms:


    - **Support email.** Users will contact you by email when they encounter a bug,
    don’t understand how something works, or have a great feature idea. Trends in
    these communications are excellent indicators for how your product needs to evolve.

    - **Beta testers.** These folks are the first ones to be exposed to new features
    and other changes in an application. If they complain about something not being
    right, chances are good that thousands of others will join them when the product
    goes into wide distribution.


    **Tip:** Finding beta testers can be a challenge. Start by asking people you know
    if they’re interested in testing. This can include people on a social networking
    site like Facebook or Twitter.


    If you still need testers, try a site like iBetaTest ( [http://ibetatest.com/](http://ibetatest.com/)
    ) that connects developers with enthusiastic users.


    - **iTunes reviews.** Many one-star reviews about a feature are an indicator that
    you’re doing something wrong.


    Notice that all of these things should be taken in aggregate. Resist the urge
    to change your product direction on the basis of one email. It’s an admirable
    desire to make every customer happy, but the reality is that you can’t. Find the
    things that will please the most people.


    **114**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Bigger, Stronger, Faster


    ### Flashlight 2.0


    Imagine that you released the Flashlight application you developed in the first
    chapter. You’ve been getting great feedback about the product. It’s now time to
    develop version 2.0. What are you going to implement?


    You’ve been getting a lot of support email about the need to control brightness.
    Many users have been complaining that the light is just too bright while they’re
    navigating a dark bedroom: Spouses are being woken! It’s clear from these reports
    that you need a quick way to lower the light level.


    As you read your reviews in iTunes, you see a lot of people complaining about
    that wonderful shade of yellow you chose. Not everyone has the same great sense
    of color you do. Adding a color selector will make many customers happy.


    Your marketing department (also called your spouse) spent some time evaluating
    the competition for your app: Many of those apps include a flasher. You think
    that’s a great feature because you often exercise at night with your iPhone in
    an armband.


    While at lunch with marketing, you start talking about the new flasher feature.
    You’re merely matching the competition with the new flasher feature. Is there
    a way that you can give it a unique touch, maybe make it even more useful? It
    would be cool to have a “disco light” that randomly changes color while flashing.
    That’s something that none of your competitors have, so marketing agrees that
    this feature should be investigated. But apart from making you a hit at parties,
    the feature isn’t very useful.


    And then it hits you both: What if the flasher could send an SOS signal? This
    international sign of distress would let rescue workers spot your customer’s phone.


    Besides it being a great marketing angle, you’re providing a feature that could
    potentially save someone’s life.


    So now you have your feature list for the new version:


    - Brightness control

    - Color selection

    - Flasher

    - Disco mode

    - SOS signal


    As you continue development, this list is your guiding light. And not just because
    you’re developing a flashlight!


    ### Bigger, Stronger, Faster


    You’ve collected all the feedback, and feel good about the list of features that
    you want for version 2. Time to whip out the pencils and start designing the user
    interface!


    Chapter 4: Design Tools: Building a Better Flashlight


    **115**


    ![Image 39](index-134_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### The Light Side


    The main view for the app is straightforward. The light source is predominant,
    and you’ll need control mechanisms at the bottom of the screen for the various
    modes and settings access, as shown in Figure 4-5.


    **Figure 4-5:** *A paper prototype for the main screen of your new flashlight
    application. The screen is broken into three areas: an information view, a light
    source, and a control area for switching modes.*


    The control area lets the user start the flasher, “disco mode,” and the SOS rescue
    signal. The settings icon will flip the view, much like the built-in Weather and
    Stocks applications.


    You’re leaning toward using a toolbar to hold these controls at the bottom of
    the screen.


    A tab bar control is better suited to switching between views in an application—the
    app has only one view. The toolbar also has the advantage in that you can make
    it translucent, letting part of the underlying light source shine through.


    **Note:** `UITabBar` is best used in applications that need to switch between
    views with different operational modes. Apple’s use of the tab bar in the iPod
    and YouTube apps lets users pick different views of music and video collections.
    Users can also reconfigure tab bars to display preferred sets of information.


    On the other hand, `UIToolbar` is appropriate for actions that work within a single
    context. A toolbar button lets the user act on the information in the view.


    When designing your UI, think carefully about which of these control mechanisms
    is right for your application.


    **116**


    iPhone App Development: The Missing Manual


    ![Image 40](index-135_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### The Flip Side


    When switching modes, it’s a good idea to give the user some feedback, so you
    decide to put an information view at the top of the screen. It would be nice to
    hide the information when possible, since it reduces the illumination produced
    by the light source.


    So now you’re feeling pretty good about the main view, but things are about to
    get more difficult with the settings interface. You have more controls to deal
    with, and they introduce some subtle interaction problems.


    Luckily, you’ve learned to use paper prototypes as a way to work through these
    issues.


    Sketching your screens, as shown in Figure 4-6, helps you identify trouble spots.


    **Figure 4-6:**'
