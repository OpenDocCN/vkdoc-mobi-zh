    are still there, it’s just a matter of time before you become comfortable using
    Xcode’s version of them.


    In this section, you’ll go through all of the phases of creating an iPhone app,
    from creating a project file with Xcode to running it in the iPhone Simulator.
    You’ll also take a peek at the Interface Builder application that lets you modify
    the user interface.


    Chapter 1: Building Your First iPhone App


    **17**'
  trans: '

    **1. 如果 iPhone 模拟器正在运行，请先退出。**


    如果跳过此步骤，安装过程将无限期挂起，您需要退出`Installer`并重新开始。


    **2. 双击磁盘映像中的 iPhone SDK 图标以启动安装过程。同意许可协议并选择一个目标硬盘。**


    您会看到要安装的软件包列表。在第二列中，`Developer`被设置为位置。您需要为测试版更改位置。


    **3. 点击`Developer`，然后从弹出菜单中选择`Other`（参见图 1-5）。**


    此时会打开一个对话框，让您选择一个文件夹。


    ***图 1-5：*** *您可以为 iPhone SDK 选择自定义安装位置。由于您不能使用 iPhone SDK 的测试版为 App Store 构建应用程序，因此需要在硬盘上保留两个版本的工具。在安装过程中，点击`Developer`文件夹图标并选择`Other`来为测试版选择位置。*


    **4. 通过从设备列表中选择硬盘名称，导航到硬盘的根目录。然后点击`新建文件夹`按钮，输入`DeveloperBeta`。点击`创建`来创建该文件夹。**


    **5. 选择`Choose`以使用`DeveloperBeta`文件夹进行安装。**


    返回主安装窗口后，您会看到`DeveloperBeta`显示为位置。


    **6. 要使用测试版，请从新的`硬盘` ➝ `DeveloperBeta` ➝ `Applications`文件夹中启动`Xcode`和其他工具。**


    现在还有第二个注意事项：测试版是苹果公司的保密信息，受保密协议（NDA）约束。这些法律术语意味着你不能公开谈论它。你只能在苹果开发者论坛（`http://devforums.apple.com`）上讨论新的
    SDK。你可以与其他开发者交流，他们和你做着同样的事情：通过提问和分享发现来了解新版本。苹果工程师也会参与讨论。


    保密协议还意味着你找不到任何书籍或其他媒体来帮助你理解这些变化。关于测试版的唯一信息来自苹果公司本身，并发布在 iPhone 开发者中心。通常会有“新增功能”文档、发布说明和
    API 差异列表。请完整阅读这些文档：当你等待几个 GB 的 SDK 下载时，这是消磨时间的好方法！


    另一个信息来源是苹果的年度开发者大会 WWDC。测试版通常与这个为期一周的大会同期发布，这样每个人都可以详细讨论新功能。大会夏季在旧金山举行：这是结识其他开发者并学习许多新事物的好机会。


    ## 探索你的新工具


    你的 Mac 现在已经设置为创建 iPhone 应用程序，因此你可以开始制作你的第一个应用了。最棒的是，你不需要编写任何代码。不写代码怎么能开发呢？借助 Xcode
    模板和 Interface Builder 的省时功能，这是可以做到的。


    如果你是一位经验丰富的开发者，这种工作方式可能会带来挑战。如果你习惯于在 Visual Studio、Eclipse 或其他环境下工作，初次接触 Xcode
    可能会让你感到有些畏惧。除了在一个新的操作系统上工作，你还要处理新的项目布局、快捷键和偏好设置。别担心，你习惯使用的所有工具都还在，你只是需要一些时间来熟悉
    Xcode 对这些工具的实现方式。


    在本节中，你将经历创建 iPhone 应用程序的所有阶段，从使用 Xcode 创建项目文件到在 iPhone 模拟器中运行它。你还会初步了解 Interface
    Builder 应用程序，它允许你修改用户界面。

