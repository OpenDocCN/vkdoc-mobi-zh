  trans: "\nApple 最近的一项政策变化为您和您的客户提供了一个更好的解决方案：免费应用程序可以通过应用内购买（In-App Purchases）来解锁付费功能。通过这项技术，您使用`StoreKit`框架向\
    \ iTunes 提供一个唯一的产品 ID。一旦用户批准交易，您就能获取信息来解锁功能。您无需管理两个应用程序，不存在数据迁移问题，并且对您的客户而言，体验也简单得多。\n\
    \n**上传**\n\n当您结束 Beta 测试后，必须再次调整 Xcode 设置。您之前使用 Ad Hoc 配置文件（第 215 页）为 Beta 测试签发了分发构建。您提交给\
    \ iTunes 的构建应使用 App Store 配置文件进行签名。本节将向您展示如何创建新的 App Store 配置文件、创建并上传新构建，以及如何进行测试。最后但同样重要的是，您将开始推广您的新应用并为买家做好准备。\n\
    \n**最终配置文件**\n\n要创建新的配置文件，请启动您的老朋友——配置门户网站（第 136 页）。然后，按照以下步骤操作：\n\n1.  登录配置门户后，在左侧栏中选择“Provisioning”。\n\
    2.  在“Provisioning”页面上，点击“Distribution”选项卡。在“Distribution”选项卡上，点击“New Profile”以创建新的分发配置文件。\n\
    3.  在“Distribution Method”下，保持“App Store”选中状态。\n4.  接下来，提供“Profile Name”。如果您将\
    \ Beta 配置文件命名为“Squidger Beta Distribution”，那么一个好名称是“Squidger Final Distribution”。\n\
    5.  为配置文件选择一个 App ID。使用与您 Beta 测试相同的 App ID：例如，“Squidger Apps”。\n6.  由于您要在 App\
    \ Store 上分发此版本，因此无需指定设备。只需点击“Submit”，您的新配置文件就会创建。\n\n点击“Download”链接获取配置文件，然后将其拖到\
    \ Dock 中的 Xcode 图标上进行安装。您应该在“Organizer”窗口中看到“Squidger Final Distribution”。\n\n\
    上传\n\n**最终目标**\n\n您需要为此构建创建一个新目标，就像您为 Beta 测试构建所做的那样（第 127 页）。此目标将与您为 Beta 测试创建的目标类似，但会在“Code\
    \ Signing”构建设置中具有不同的设置。\n\n对于 Beta 测试，您为代码签名授权添加了一个`dist.plist`文件。对于最终版本，您**不需要**此文件。另一个设置“Code\
    \ Signing Identity”应设置为“Any iPhone OS Device”。此外，您**不**希望使用自动配置文件选择器，因为它可能会意外选择您的\
    \ Beta 配置文件。\n\n相反，请向下滚动列表，然后选择配置文件名称下所列的“iPhone Distribution”（例如，“Squidger Final\
    \ Distribution”）。\n\n要查看这些设置的实际效果，请查看“Safety Light (Final)”的构建设置。\n\n双击目标，您会看到没有授权，并且代码签名身份是“iPhone\
    \ Distribution: Craig Hockenberry”，后跟一个长且全局唯一的 ID（GUID）。\n\n您看到此 GUID 是因为您没有“Craig\
    \ Hockenberry”开发者账户的分发配置文件或代码签名证书。如果您尝试构建项目，您会看到一个代码签名错误，指出“在默认钥匙串中没有有效的证书/私钥对”。如果您想将此应用程序提交到\
    \ App Store，您必须使用自己的唯一证书和配置文件。\n\n***Tip:*** 如果您看到 GUID，通常意味着 Xcode 无法找到配置文件。请从配置门户下载一份新副本。\n\
    \n**最终构建**\n\n现在您已经配置好了要在 App Store 上分发的目标，可以准备构建所有 iTunes 上的客户都将使用的版本了。在这样做之前，请务必更新`Info.plist`中的“Bundle\
    \ version”编号（第 221 页），使其仅包含数字和句点——不要包含字母。如果您保留了像“1.0b3”这样的 Beta 版本号，上传时会被拒绝。\n\
    \n构建之后，您需要备份您的应用程序和`dSYM`文件。这两个文件是调查客户遇到的崩溃所**必需**的（您将在第 298 页学习如何调试这些崩溃）。在上传到\
    \ iTunes 之前，您还需要将刚刚构建的应用归档到一个 Zip 文件中（只需按住 Control 键点击文件，然后从快捷菜单中选择“Compress”）。\n\
    \n***Tip:*** `Flashlight Pro`应用程序有一个名为“Final”的聚合目标，其中包含一个“Package Release”构建阶段，可以自动创建\
    \ Zip 文件。此构建阶段还会创建应用程序和`dSYM`文件的备份，以便它们可以检入到您的版本控制系统中。\n\n上传\n\n**最终上传**\n\n一旦准备好最终的\
    \ Zip 文件，通过 iTunes Connect 上传它只需简单几步：\n\n1.  登录 iTunes Connect（第 233 页），然后点击“Manage\
    \ Your Applications”。在出现的列表中，点击您的应用图标。\n    \n    您应用程序的状态应为“Waiting For Upload”。\n\
    \    \n2.  在应用程序信息屏幕中，点击“Upload Binary”以开始上传过程。\n3.  在下一个屏幕上，点击“Choose File”，然后导航到包含您最终应用程序的\
    \ Zip 文件。完成后，点击“Choose”。\n4.  屏幕上会出现一个新按钮：“Upload File”。点击它，文件就会上传到 Apple 的服务器。\n\
    5.  上传完成后，您会看到一个勾号图标；点击“Save Changes”以完成提交过程。\n\n此时，服务器会检查您上传的文件（图 8-10）。如果发现任何问题，您会在页面顶部看到一个红色横幅，解释错误。\n\
    \n常见的问题来源是分发配置文件：如果遇到此类问题，请返回检查您的构建设置。\n\n***Note:*** 您也可能会看到诸如“我们暂时无法保存您的更改，请稍后重试”这样的错误。有时系统会过载，您可能需要尝试多次才能成功。出于同样的原因，请将更新应用程序元数据与上传文件分开进行。\n\
    \n如果一切顺利，您应用程序的状态将变为“Waiting For Review”。现在只是时间问题了。恭喜！\n\n**最终测试**\n\n但是，有一个小问题：您从未运行过上传到\
    \ iTunes 的最终构建。您也无法运行它，因为它是使用未指定任何设备的 App Store 分发配置文件签名的。\n\n在短短时间内，成百上千的客户将购买和使用这个构建，因此确认一切正常当然很好。幸运的是，您可以通过一个名为`codesign`的命令行工具来获得这种保证。该工具使用与\
    \ Xcode 相同的代码签名方法。\n\n将目录更改为您进行构建的位置后，您可以通过以下方式查看应用中代码签名的当前值：\n\n```\n$ cd build/Final--Release-iphoneos\n\
    $ codesign –d –vv ″Safety Light.app/Safety Light″\nExecutable=/Users/studmuffin/Projects/Flashlight\
    \ Pro/build/Final--Release-iphoneos/Safety Light.app/Safety Light\nIdentifier=com.iconfactory.FlashlightPro\n\
    Format=bundle with Mach-O thin (armv6)\nCodeDirectory v=20100 size=618 flags=0x0(none)\
    \ hashes=22+5 location=embedded Signature size=4280\n```\n"
