  trans: "\n当模型初始化时，会通过`–objectForKey:`检查用户默认设置，以确认是否已设定速度值。如果该方法返回`nil`值，则分配一个默认设置。否则，将通过`–floatForKey:`读取当前设置。\n\
    \n```\n- (id)init {\n    if ((self = [super init])) {\n        NSUserDefaults\
    \ *userDefaults = [NSUserDefaults standardUserDefaults];\n        . . .\n    \
    \    if (! [userDefaults objectForKey:speedKey]) {\n            speed = 0.75f;\n\
    \            [userDefaults setFloat:speed forKey:speedKey];\n        }\n     \
    \   else {\n            speed = [userDefaults floatForKey:speedKey];\n       \
    \ }\n        . . .\n    }\n    return self;\n}\n```\n\n如果你之前没有先检查对象就直接调用`–floatForKey`，你可能会返回一个零值，并且无法判断这是因为用户的选择还是因为设置不存在。\n\
    \n由于设置存储在属性列表中，可存储的对象类包括`NSArray`、`NSDictionary`、`NSString`、`NSData`、`NSDate`和`NSNumber`（整型、浮点型和布尔值）。\n\
    \n### 用户界面中的字符串\n\n维护一个小型颜色数据库的原因之一，是将颜色值与人类可读的名称关联起来。请记住，并非所有人都阅读与你相同的语言。这就是为什么像`@\"\
    White\"`这样的简单字符串需要用本地化宏来封装：\n\n```\nNSLocalizedString(@″White″, nil)\n```\n\n\
    每当你使用一个将在用户界面中显示的字符串值时，都应通过此技术进行本地化。这些字符串如何分配和处理，将在参观`Localizable.strings`文件时进行描述。\n\
    \n### 整合一切\n\n现在你已经了解了应用程序中的视图和模型，是时候看看控制器如何让一切协同工作。它们是连接你手电筒应用的粘合剂。\n\n你已经预览过控制器：每个包含视图的\
    \ NIB 文件都有一个对应的控制器（例如第 86 页）。当然，Xcode 创建的基本控制器没有任何实例变量或操作，也不包含任何特定于应用程序的逻辑。\n\n\
    所以，快回到车上，让参观继续吧…\n\n### MainViewController\n\n主手电筒视图的设计本身就很简单。这导致控制器虽然使用了两个模型，但只包含三个视图出口。其中两个视图是自定义的`UIView`子类。与大多数控制器一样，其关键部分在于它与视图和模型的交互方式。\n\
    \n### 深入探究：打开模拟器\n\n模拟器是一个强大的调试工具。但它有一个问题：每次构建并运行新版本的应用时，它都会被复制到一个新文件夹中。这个文件夹使用一长串十六进制数字（GUID\
    \ 格式）命名，很难定位。\n\n而你在调试时想要定位它，因为这里存储着应用程序的文档和设置。在处理模型时，定位数据的后端存储通常很有帮助。无论文件包含 SQLite\
    \ 数据库、属性列表还是纯文本文件，能够验证写入内容都至关重要。\n\n以下是一个简短的 shell 脚本，可帮助你定位应用程序数据：\n\n```\n#!/bin/sh\n\
    if [ -z \"$1\" ]; then\n    echo \"用法: $0 <app> [ Preferences | <document> ]\"\
    \nelse\n    if [ \"$2\" = \"\" ]; then\n        open \"$dir/Library/Preferences\"\
    \n    else\n        open \"$dir/Documents/$2\"\n    fi\nfi\n```\n\n将此脚本放在你的`PATH`路径下，命名为`opensim`，并赋予其可执行权限。安装完成后，你可以使用它来查找模拟器中最新加载的应用程序，并在访达中打开\
    \ Preferences、Documents 或指定文档。\n\n例如，要打开 Safety Light 应用程序当前的 Documents 文件夹，只需执行：\n\
    \n`$ opensim \"Safety Light\"`\n\n该文件夹中没有文档，但如果有的话，你可以通过以下命令打开它们：\n\n`$ opensim\
    \ \"Safety Light\" fleshy.db`  \n`$ opensim \"Safety Light\" awesome.plist`\n"
- fmt: "You can easily get to your preferences folder with:\n\n```\nbase=~/Library/Application\\\
    \ Support/\niPhone\\ Simulator/\n$ opensim ″Safety Light″ Preferences\napps=Applications\n\
    ```\n\nIf you double-click the `com.iconfactory.SafetyLight.plist` file that’s\
    \ displayed in the folder, the flashlight’s current settings are displayed.\n\n\
    ```\napp=`ls -1td ″$base/″*″/$apps/″*″/$1.\nif [ -n ″$app″ ]; then\n```\n\n**Note:**\
    \ A copy of the *`opensim`* script is located in the top level of the Flashlight\
    \ Pro project, so you don’t have to type it in.\n\n```\ndir=`dirname ″$app″`\n\
    if [ ″$2″ = ″Preferences″ ]; then\n```\n\n### Notifications\n\nAny object can\
    \ register to receive notifications, but they’re used most frequently by controllers.\
    \ Controllers typically have the logic necessary to respond to the changed conditions\
    \ for the device, models, or other parts of the application.\n\nChapter 6: A Flashlight\
    \ for Pros  \n**195**  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
    ### Pull Yourself Together\n\nThe main view controller registers itself for notifications\
    \ from `UIApplication` and the `SOSModel`:\n\n```\n- (NSObject *)initWithNibName:(NSString\
    \ *)nibNameOrNil bundle:(NSBundle *)nibBundleOrNil {\n. . .\n[[NSNotificationCenter\
    \ defaultCenter] addObserver:self\nselector:@selector(elementChanged:) name:SOSModelElementChangedNotification\
    \ object:nil];\n[[NSNotificationCenter defaultCenter] addObserver:self\nselector:@selector(resignActive:)\
    \ name:\nUIApplicationWillResignActiveNotification object:nil];\n[[NSNotificationCenter\
    \ defaultCenter] addObserver:self\nselector:@selector(becomeActive:) name:\nUIApplicationDidBecomeActiveNotification\
    \ object:nil];\n. . .\n}\n```\n\nAnd just as importantly, it removes itself as\
    \ an observer when the view controller object is freed:\n\n```\n[[NSNotificationCenter\
    \ defaultCenter] removeObserver:self\nname:SOSModelElementChangedNotification\
    \ object:nil]\n[[NSNotificationCenter defaultCenter] removeObserver:self\nname:UIApplicationWillResignActiveNotification\
    \ object:nil];\n[[NSNotificationCenter defaultCenter] removeObserver:self\nname:UIApplicationDidBecomeActiveNotification\
    \ object:nil];\n```\n\nThe `–resignActive:` and `–becomeActive` methods in the\
    \ controller are invoked when you use the lock switch on the device. These methods\
    \ start or stop the flasher or disco lights. It’s a simple, but good, example\
    \ of how a change in device state results in a change of application state.\n\n\
    The notification defined by the `SOSModel` sends the `–elementChanged` message\
    \ every time the state of the model changes. This method, in turn, turns the light\
    \ view on or off—an example of how new data is propagated to a view.\n\n### Sounds\n\
    \nThe `–elementChanged` method also plays a dot or dash beep sound:\n\n```\nif\
    \ (sosDotBeep != 0 && sosDashBeep != 0) {\nif (element == SOSModelElementDot)\
    \ {\nAudioServicesPlaySystemSound(sosDotBeep);\n}\nelse {\nAudioServicesPlaySystemSound(sosDashBeep);\n\
    }\n}\n```\n\n**196**  \niPhone App Development: The Missing Manual  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### Pull Yourself Together\n\n***Tip:*** If you want your sound to play along\
    \ with a vibration, use the `AudioServicesPlayAlertSound()` function instead.\n\
    \nHere’s where these `sosDotBeep` and `sosDashBeep` sounds come from: When the\
    \ flasher was started with the `–startSOS` method, these sounds were loaded into\
    \ memory with this code:\n\n```\nOSStatus result;\nNSString *dotPath = [[NSBundle\
    \ mainBundle] pathForResource:@″Dot″\nofType:@″aif″];\nresult = AudioServicesCreateSystemSoundID((CFURLRef)[NSURL\n\
    fileURLWithPath:dotPath], &sosDotBeep);\nif (result != kAudioServicesNoError)\n\
    {\nsosDotBeep = 0;\n}\n```\n\nFirst the sound file is located within your application’s\
    \ bundle. The *bundle* is a group of code and resources for your application.\
    \ All of the files in Xcode’s Resources group are moved into the main bundle.\n\
    \nTo extract one of these files from the bundle, you specify the file using its\
    \ resource name (`@\"Dot\"`) and its type (`@\"aif\"`). The resulting `dotPath`\
    \ variable is then converted into a file URL and passed to the `AudioServicesCreateSystemSoundID()`\
    \ API.\n\nIf the call succeeds, the `sosDotBeep` variable can be used to play\
    \ the sound."
