    **The Big Three: Models, Views, Controllers**


    Cocoa Touch gives you hundreds of object classes to wrap your head around. Fortunately,
    most of these classes fall into three categories. And the objects in these categories
    interact in a simple and well-defined way.


    Every iPhone application uses a simple Model-View-Controller design pattern. And
    since developers are just as lazy with writing as they are with coding, you’ll
    often find this referred to as “MVC.”


    ***Note:*** If you’ve used other languages and development environments, you’ll
