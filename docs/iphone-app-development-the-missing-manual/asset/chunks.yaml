    # 通知


    当你想接收系统事件的通知时，你需要向通知中心告知一些关于你自己的信息。假设你对应用程序变为活跃状态（无论是在启动时还是在 iPhone 解锁时）感兴趣。通常，你会将视图控制器添加为观察者：


    ```

    @implementation MyViewController


    . . .


    - (NSObject *)initWithNibName:(NSString *)nibNameOrNil bundle:(NSBundle *) nibBundleOrNil
    {


    if (self = [super initWithNibName:nibNameOrNil bundle:nibBundleOrNil]) {


    . . .


    [[NSNotificationCenter defaultCenter] addObserver:self selector:@selector(becomeActive:)

    name:UIApplicationDidBecomeActiveNotification object:nil];


    . . .


    }

    ```


    第一个参数是 `self`，它告诉通知中心该视图控制器将处理通知。选择器 `becomeActive:` 指定了发送给视图控制器的消息，而名称则指明了该控制器的兴趣所在。当用户能够与用户界面交互时，`UIApplicationDidBecomeActiveNotification`
    会被发送给该控制器。


    **注意：** 本示例中未使用对象参数，但它可用于指定通知的发送者。通过指定 `nil`，你表示无论源自哪个对象，你都希望接收此类型的全部通知。


    既然你已经注册接收通知，现在就需要实现处理该通知的方法：


    ```

    - (void)becomeActive:(NSNotification *)notification {


    NSLog(@”OPEN PUMPERNICKEL”);


    }

    ```


    现在，每次启动或解锁应用时，控制台日志中都会显示 `OPEN PUMPERNICKEL`。很酷的功能，对吧？


    好吧，这算不上一个很棒的功能。但是，如果该通知启动了一个通过网络刷新数据的连接呢？或者更新设备位置呢？它是一个很好的触发器，让你知道用户正在积极地使用你的应用。


    类似地，你可以使用 `UIApplicationWillResignActiveNotification` 来取消任何待处理的操作，特别是那些使无线连接保持活跃的操作。如果停止网络操作，无线设备可以关闭电源，从而延长电池寿命。皆大欢喜！


    当你的视图控制器对象不再关心这些事件时，告诉通知中心这一点非常重要。如果你不这样做，你的应用程序可能会崩溃，因为当你添加观察者时，通知是通过引用进行的。如果已注册的对象被释放，通知将会发送给一个已不存在的实例，导致内存错误。


    解决方案非常简单。确保每个 `–addObserver:selector:name:object:` 都有相应的 `–removeObserver:name:object:`
    与之匹配。你也可以使用 `–removeObserver:` 一次性移除所有通知。由于观察者是在初始化期间添加的，因此在 `–dealloc` 期间移除它也是合情合理的：


    ```

    @implementation MyViewController


    . . .


    - (void)dealloc {


    . . .


    [[NSNotificationCenter defaultCenter] removeObserver:self];


    [super dealloc];


    }

    ```


    **注意：** 这些是出了名难追踪的 bug。你会在不是你编写的代码中看到来自 `objc_msgSend` 的故障，而且它们会在你意想不到的时候发生。如果你使用通知，请确保它们被妥善清理。


    通知不仅限于系统生成的那些。你可以自定义通知，使应用程序的各个部分保持同步。想象一下，你的应用程序中有多个控制器需要知道网络连接何时完成。`NSURLConnection`
    基于委托模式，因此只有一个对象知道操作何时完成。该对象可以通过定义自己的通知名称，将信息传递给感兴趣的各方。通知名称不过是一个字符串对象，因此你可以在类接口文件中这样定义它：


    ```

    extern NSString *MyConnectionDidFinishNotification;

    ```


    在该对象的实现中，你需要定义通知名称的值：


    ```

    NSString *MyConnectionDidFinishNotification = @”MyConnectionDidFinishNotification”;

    ```


    当连接完成时，你可以这样发布通知：


    ```

    [[NSNotificationCenter defaultCenter] postNotificationName:MyConnectionDidFinishNotification
    object:self];

    ```


    应用中任何调用了 `–addObserver:selector:name:object:` 且使用了 `MyConnectionDidFinishNotification`
    的对象都会收到一条消息，并可以相应地更新视图、控制器和模型。


    # 单例


    单例设计模式应用于 Cocoa Touch 中的几个关键类。单例允许一个类在任何其他对象请求时，返回同一个对象实例。当你*绝不*需要该类型的多个对象时，这非常方便。


    你刚刚了解到的 `NSNotificationCenter` 就是一个例子。所有通知都需要通过一个集中式服务进行路由才能有效。同样重要的是，对象需要能够定位到那个中心实例，这通过通知中心的类方法实现：


    ```

    + (id)defaultCenter;

    ```


    每个发送 `+defaultCenter` 消息的对象都会得到同一个对象。这使得所有对象可以在同一位置添加和移除观察者。


    很多时候，类会使用单例作为一种方式，来建模那些只发生一次的事物，无论是物理上的还是虚拟上的。例如，你只有一个应用程序、一套设置和一个硬件加速度计。


    不幸的是，对于单例的命名没有一个统一的标准。较老的类，例如 Foundation 中的类，在方法名上使用 `default` 前缀。较新的类倾向于使用 `shared`
    作为前缀。最常见的单例类有：


    - `NSFileManager` (`defaultManager`)

    - `NSUserDefaults` (`standardUserDefaults`)

    - `UIApplication` (`sharedApplication`)

    - `UIAccelerometer` (`sharedAccelerometer`)

    - `NSNotificationCenter` (`defaultCenter`)


    ## 将单例作为全局变量


    许多经验丰富的开发者不推荐使用单例。如果你曾经使用全局变量编程，你会意识到单例实际上只是表示全局状态的一种花哨方式。你也会体会到，随着应用程序的发展和演变，维护由许多组件共享的状态是一件令人头疼的事。


    在实现单例时，你需要提供一个返回该类实例的类方法。因此，如果你有一个名为 `MyFoot` 的类，你需要像这样定义 `+sharedFoot` 方法：


    ```

    @implementation MyFoot


    + (id)sharedFoot {


    static MyFoot *foot = nil;


    if (! foot) {


    foot = [[self alloc] init];


    }


    return foot;


    }

    ```


    这段代码的巧妙之处在于实现中的静态变量；它持有一个指向共享对象的全局变量。当你的应用程序启动时，该变量的值为 `nil`。在接收到第一条消息后，实例被分配并返回，供此调用及后续调用使用。

    '
- fmt: '> ***Note:*** This singleton implementation isn’t thread safe, nor does it
    prevent you from doing dumb things like releasing the global instance. If you’re
    going to create singletons, take a moment to read Apple’s recommendations in the
    “Creating a Singleton Instance” section of the *CocoaFundamentalsGuide* (type
    `Singleton` in the documentation viewer).


    Everything works great as long as your app needs to keep track only of one foot.
    But what happens when you add that new feature that uses both feet?


    ```

    MyFoot *myLeftFoot = [MyFoot sharedFoot];

    MyFoot *myRightFoot = [MyFoot sharedFoot];

    [myLeftFoot shoot];

    ```


    Not only are you shooting yourself in the foot, you’re shooting them both at once.


    And you can’t tell your left foot from your right because they’re the same shared
    foot. The only way out of this kind of mess is by doing a lot of tedious refactoring.


    Singletons aren’t inherently evil; just be sure you really need them before you
    go ahead with this design pattern.


    ## Where to Go from Here


    You’ve only scratched the surface of a set of frameworks that have been in active
    development since the 1980s. You’ve seen some of the most important parts of that
    framework, but you’ve certainly not seen anywhere near all of it.


    As mentioned on page 61, the *Cocoa Fundamentals Guide* in the developer documentation
    is a great place to start learning more about this essential framework. Just search
    for its name in the documentation viewer. This book’s appendix shows you books,
    websites, and other resources for learning more about Cocoa and Cocoa Touch.


    Chapter 3: Cocoa Touch: Putting Objective-C to Work


    **101**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Where to Go from Here


    As a new developer, make sure you also take advantage of the source code that
    Apple provides on the developer site. Studying these examples can teach you a
    lot about the right way to build an iPhone application. In a similar vein, the
    appendix contains links to many open source projects. Some very talented developers
    have contributed this code to the iPhone community, and you can learn from their
    work.


    ## The Language of Design


    Once you get your head wrapped around the language and frameworks, you’re going
    to want to start putting these new skills to use. But before you do, you’ll want
    to think about design.


    Just as software has a system in place to organize the various components, the
    language of design can help you arrange your app’s functional and visual aspects.
    The next chapter will explore this topic and show you how it can improve your
    entire development process.


    Download from Wow! eBook


    **102**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Chapter 3: Design Tools: Building a Better Flashlight


    Now that you’re up to speed with the language and frameworks used to create applications
    on the iPhone, you’re ready to start coding, right? Wrong!


    You may have years of experience developing applications for the desktop or Web,
    but the iPhone is a radical new platform running on a mobile device. Understanding
    how one or more fingers work with your user interface takes time.


    Assumptions based on how applications work in a controlled work environment change
    when you move into a chaotic mobile environment. These big differences also mean
    that the tools you’ll use to design your app will change.


    This chapter will introduce you to some of the unique elements of iPhone design.
    You’ll also learn about a decision process that helps you come to terms with this
    new platform. And once you’ve gone through that process, you’ll see how to start
    thinking about the code that will implement your ideas.


    ### Plan Before You Code


    You’ll find a lot more to developing iPhone applications than just writing code.
    In this section, you’ll learn what’s different about designing iPhone software,
    how to create effective user experiences, how to start visualizing your ideas,
    and what tools will help during the design process.


    #### Why Call in a Designer?'
