- fmt: "# This approach was taken with the `settings` view. The brightness and flasher\
    \ speed use icons instead of words. No translation is required and users in all\
    \ languages can understand the function of the sliders.\n\n## `AboutView.xib`\n\
    \nDespite all your efforts to just translate the words, sometimes localizations\
    \ require a separate NIB file. For example, if you’re doing a help screen for\
    \ a game, you’re going to have a lot of text that flows around images and controls.\
    \ It’s easier to change the layout for a whole screen than it is to adapt the\
    \ text to a single layout.\n\nThe `AboutView.xib` file is an example. You’ll see\
    \ that the file appears in both the `English.lproj` and `Italian.lproj` folders.\
    \ Cocoa loads the correct NIB based upon the user’s language settings. You can\
    \ change any part of the layout; just make sure that the actions and outlets are\
    \ maintained. If the connection between a button and its action is broken, you\
    \ have a bug that only users of that language will encounter.\n\n## How to Localize\
    \ a File\n\nYou may have noticed that localizable files show a disclosure triangle\
    \ in the `Groups & Files` list. When you click the control, a list of languages\
    \ shows. Xcode treats localizable files differently than normal files.\n\nHere’s\
    \ how to create a localizable file:\n\n1. In Xcode’s `Groups & Files` list, select\
    \ the file you want to localize.\n2. Choose `File ➝ Get Info` to bring up the\
    \ `File Inspector` window.\n3. In the `File Inspector`, click the `Make File Localizable`\
    \ button. This option moves the existing file into an `English.lproj` folder.\
    \ At this point the disclosure triangle also appears.\n4. In the `File Inspector`,\
    \ click the `General` tab, and an `Add Localization` button appears in the lower-left\
    \ corner. Click it.\n5. You’ll be prompted for a new name for the localization.\
    \ You can enter *Italian*, *French*, *German*, *Spanish*, *Japanese*, or any other\
    \ language the iPhone OS supports.\n\n## Wrapping It Up\n\nThis iPhone app is\
    \ looking good. It’s now time to start beta testing and getting it ready for sale\
    \ on iTunes. Your coding phase is about to end, but you still have a lot of work\
    \ to do!\n\nChapter 6: A Flashlight for Pros\n\n---\n\n**Part Three: The Business\
    \ End**\n\nChapter 7: Finishing Touches  \nChapter 8: For Sale  \nChapter 9: You’ve\
    \ Got Customers\n\n---\n\n# Chapter 7: Finishing Touches\n\nYou’ve now finished\
    \ coding the best thing ever seen in the App Store. Or have you?\n\nNow’s the\
    \ time to put the final spit and polish on your app. That includes testing your\
    \ creation with a wider group of people and their devices. Since your development\
    \ is winding up, now’s the perfect opportunity to clean up your interface graphics.\
    \ Then it’s time to start working on screenshots and other promotional materials\
    \ for a product website.\n\n## Beta Testing\n\nTesting your application before\
    \ submitting it to the App Store is an important part of the development process.\
    \ Getting your work in front of other people will help you find problems with\
    \ both your design and code.\n\n### Your App Works for You… But\n\nYou and your\
    \ development team already know how the application works. You’re intimately familiar\
    \ with how each component should function. The code runs perfectly on your test\
    \ devices.\n\nIn other words, you’re the exact opposite of every single person\
    \ who will download your product from the App Store.\n\n*Users find the darnedest\
    \ things*\n\nGiving your application to people who’ve never seen it generates\
    \ a lot of great feedback. As you learned on page 113, customers are your greatest\
    \ feedback mechanism, and beta testers are your first customers.\n\n---\n\nWhen\
    \ you give your application to other people, two things will happen:\n\n- They’ll\
    \ find bugs in your code.\n- They’ll find things they don’t understand.\n\nFinding\
    \ bugs in your brand-new code may be disappointing, but it’s much better than\
    \ the alternative. If you release something to the App Store and find that a large\
    \ percentage of your users are having an issue, you’ll be in quite a predicament.\
    \ It takes many days for a new version of the app to be reviewed by Apple and\
    \ made available for users. During that time, customers will be leaving bad reviews\
    \ in iTunes, you’ll get bad press, and you’ll be sweating bullets.\n\nBut if a\
    \ large portion of your *test* group doesn’t understand how a feature works or\
    \ gets frustrated using your app, that’s great news. It means one of your design\
    \ decisions was wrong. Don’t get upset when you hear this feedback: Every developer\
    \ has gotten such feedback at one point or another. Now’s your chance to put things\
    \ right before customers in the App Store complain about the same thing!\n\n###\
    \ Flashlight Improvements\n\nIn fact, the flashlight you saw in the last chapter\
    \ went through some design revisions based on tester feedback. You may encounter\
    \ some issues like these in your own apps:\n\n- Several people in the test group\
    \ found that it was cumbersome to change the brightness quickly. They had to go\
    \ in and out of settings each time to adjust the light level. What they really\
    \ wanted was a simple gesture to lower the brightness temporarily. That’s how\
    \ the single tap in `LightView` was born.\n- Another tester complained of how\
    \ easy it was to inadvertently turn off the flasher. She was using the Safety\
    \ Light in an armband during her evening workout and accidentally tapping on the\
    \ toolbar while running. The single tap gesture in `LightView` was extended to\
    \ a double-tap that locked the screen.\n- The designer-type in the bunch wanted\
    \ some visual flair in the app. The settings view looked cool enough, but he wanted\
    \ something that no other flashlight on the App Store had—batteries! The background\
    \ that you see when flipping to settings was an easy feature to add by putting\
    \ a `UIImageView` in the `MainWindow`.\n\nThe flashlight’s code had a few bugs\
    \ that you wouldn’t have found without the help of the beta testers:\n\n- The\
    \ Italian localization didn’t display correctly in some cases because of problems\
    \ in `Localizable.strings`. This user also discovered an issue with long messages\
    \ not being displayed correctly in `IFInfoView`.\n- Another tester found a bug\
    \ that had never been considered by the development team: You could dim the brightness\
    \ of the light and start the SOS flasher. That prevented the warning signal from\
    \ being as effective as possible.\n\nLuckily, there weren’t any serious problems,\
    \ and the beta test went smoothly!\n\n---\n\n## Ad Hoc & Roll\n\nSo how do you\
    \ get this beta version to your testers? With a mechanism called *Ad hoc distribution*.\
    \ This technique lets you share your iPhone app with up to 100 testers.\n\nBut\
    \ first you need to make a few more changes to your project so these users can\
    \ run it on their iPhone or iPod touch.\n\n### Gather Your Testers\n\nThe first\
    \ step is to collect device IDs from potential testers. You can use the same techniques\
    \ as you used on page 137. For most of your testers, clicking the serial number\
    \ in iTunes or running the free `Ad Hoc Helper` application from the App Store\
    \ is the easiest way to get the 40-character UDID string.\n\nAs a part of this\
    \ process, also get the testers’ email address and the type of device they have.\
    \ You’ll use the email addresses to set up a mailing list. Knowing which type\
    \ of device they’re testing on will be helpful in debugging hardware-specific\
    \ problems.\n\n***Tip:*** Remember that your iPhone developer account limits you\
    \ to 100 devices for the entire year. Keep the number of people in your beta test\
    \ well below this number."
