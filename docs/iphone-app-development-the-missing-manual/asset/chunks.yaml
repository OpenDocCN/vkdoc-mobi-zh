- fmt: "# Final y, there’s the `Spotlight Image View`\n\nIt’s a transparent image\
    \ that looks kinda boring now, but wait until you get to the controller (page\
    \ 205). That view is going to move and groove!\n\n## Refine the Look\n\nNow that\
    \ you’ve seen the NIB files, it’s time to take a look at how some of the custom\
    \ views were created. There’s a custom view for the light source and another for\
    \ information displayed at the top of the screen.\n\n### `LightView`\n\nThis view\
    \ is modeled after a physical light. Objects that emulate the real world are usually\
    \ easier to design, since the correct behavior is already something you’re familiar\
    \ with. They also tend to make your code easier to read.\n\nYou see this tendency\
    \ a lot in Cocoa Touch. For example, the `UISwitch` control manages its state\
    \ by using a property named `on`. Which of these snippets of code is more readable?\n\
    \n```\nmySwitch.on = YES;\n```\n\nor\n\n```\nmySwitch.state = YES;\n```\n\nThe\
    \ properties of the view let you change the state of the light (on, off, or a\
    \ single pulse). You can also set the brightness and color of the light. To model\
    \ the physical property of the light, you can also set an envelope where attack\
    \ and release variables control the amount of time the light takes to turn on\
    \ and off.\n\n### Delegation\n\nDelegation is not just for system classes. The\
    \ light uses this design pattern to notify another object that taps have occurred\
    \ in the view. In this application, that object is `MainViewController`. When\
    \ the tour reaches the controller code (page 194), you see how it acts as the\
    \ delegate.\n\nWhen you look at `LightView.h`, you see a forward declaration of\
    \ the protocol:\n\n```\n@protocol LightViewDelegate;\n```\n\nThis declaration\
    \ is needed because there’s a chicken-and-egg problem between the delegate and\
    \ the view. Both the class and protocol definition need each other.\n\nUsing this\
    \ forward declaration, the delegate instance variable is defined as: `id <LightViewDelegate>\
    \ delegate;`\n\nThis variable tells the compiler that the delegate can be any\
    \ object as long as it conforms to the `LightViewDelegate` protocol. (Remember\
    \ that `id` is a generic object of any class.)\n\nChapter 6: A Flashlight for\
    \ Pros\n\n**169**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### Refine\
    \ the Look\n\nThe full protocol declaration follows the `LightView` `@interface`:\n\
    \n```\n@protocol LightViewDelegate <NSObject>\n\n@optional\n\n- (void)lightView:(LightView\
    \ *)view singleTapAtPoint:(CGPoint)tapPoint;\n\n- (void)lightView:(LightView *)view\
    \ doubleTapAtPoint:(CGPoint)tapPoint;\n\n@end\n```\n\nThe two messages sent by\
    \ the `LightView` are `–lightView:singleTapAtPoint:` and `–lightView:doubleTapAtPoint:`.\
    \ Both are tagged as `@optional`, so it’s up to the delegate whether it implements\
    \ these methods. If `@optional` is not specified, the delegate is required to\
    \ provide the methods.\n\n### Enumeration\n\nC enumerations are used throughout\
    \ Cocoa Touch as a way to express multiple options in code. The light view uses\
    \ an enumeration to control the state of the light. One example in UIKit is the\
    \ `UIViewAnimationCurve` enumeration. The enumeration’s naming and values follow\
    \ a simple pattern—a concatenation of the class name, the property name, and a\
    \ unique option name. So the animation curve types are `UIViewAnimationCurveEaseInOut`,\
    \ `UIViewAnimationCurveLinear`, and so on.\n\nYes, it’s wordy, but very easy to\
    \ read in code:\n\n```\n[UIView setAnimationCurve:UIViewAnimationCurveLinear];\n\
    ```\n\n**Note:** This standard naming pattern is very useful with automatic completion\
    \ in Xcode. Once you know the rules, finding these long names is easy.\n\nFor\
    \ example, you can type `UIViewAnim` and press Esc to display a list of suggestions.\
    \ You know to type the initial text because you’re working with a `UIView` and\
    \ the `animationCurve` property.\n\nThe light view follows this pattern with its\
    \ own enumeration:\n\n```\ntypedef enum {\n\n    LightViewStateOff = 0,\n\n  \
    \  LightViewStateOn,\n\n    LightViewStatePulse\n\n} LightViewState;\n```\n\n\
    which is used in the instance variable definition:\n\n```\nLightViewState state;\n\
    ```\n\nand in the property:\n\n```\n@property (nonatomic, assign) LightViewState\
    \ state;\n```"
