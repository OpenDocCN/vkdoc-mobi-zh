    ***Tip:*** If the device doesn’t show a green dot, select it in the Organizer,
    and you see a status message in the Summary tab. If you see the message “could
    not support development”, it means that Xcode could not attach to a process on
    the device. The only way to restart that process is to power-cycle the device.


    **148**


    iPhone App Development: The Missing Manual


    ![Image 53](index-167_1.jpg)


    ![Image 54](index-167_2.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Make It Official**


    ***Figure 5-12:***


    *Xcode’s Organizer can*


    *display the provision-*


    *ing profiles that are*


    *currently installed.*


    *The iPhone Develop-*


    *ment profile was just*


    *created using the Pro-*


    *visioning Portal. Note*


    *that the expiration*


    *date for the profile is*


    *about 3 months from*


    *the day it was created.*


    In the main project window, change the Overview menu in the upper-left corner
    of the window. Up until now, you’ve been using iPhone Simulator as the Active
    SDK


    setting. Now that you have a device that’s provisioned and connected, you can
    select iPhone Device (Base SDK) (Figure 5-13).


    ***Figure 5-13:***


    *Once you have your iPhone*


    *provisioned and connected*


    *to your Mac, you can select*


    *iPhone Device from the*


    *Active SDK menu. The*


    *numbers after the name*


    *indicate which version of the*


    *iPhone SDK you’re building*


    *against.*


    Chapter 5: Getting Serious about Development


    **149**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Make It Official**


    ***Note:*** Setting the Active SDK for a device causes Xcode to generate code
    for the iPhone’s ARM processor instead of for the i386 processor in your Mac.
    You can verify this by noting the Active Architecture at the bottom of the Overview
    menu.


    After selecting the Active SDK, clean the project (Build➝Clean). This step ensures
    that you’re working on a fresh slate. It removes any code you’ve generated with
    Code Sign errors. In the dialog box that appears, make sure both boxes are turned
    on and click Clean.


    And now for the moment every iPhone developer remembers fondly: installing your
    first app on the iPhone. Choose Build➝Build and Run (or press ⌘-Return) to kick
    things off!


    ***Note:*** If you see an error about not being able to start the executable,
    it either means that your iPhone isn’t connected or that it needs to be restarted.
    Also, check that your phone is unlocked so that the home screen is displayed.


    You can watch the status line in the lower-left corner as headers are precompiled
    and source code is compiled. Toward the end of the build process, the code-signing
    process takes place. When that happens, you see a message box asking if you want


    “codesign” to access your keychain. Click Allow.


    Every time you run an application from Xcode, it checks the device to make sure
    that a valid provisioning profile is installed. When you dragged the profile onto
    Xcode’s icon, you installed it only in the development environment. The final
    destination for the provisioning profile is the device, and until it’s in place,
    your application won’t run. Luckily Xcode helps you: It prompts you, saying that
    it can’t run your application on the device. When you click “Install and Run”,
    the profile will be installed.


    You can verify that the provisioning profile was installed by using the Settings
    app on your phone. Tap Settings➝General➝Profiles, and you see a list of installed
    profiles.


    You see your iPhone Development profile along with its expiration date. The iPhone
    OS warns you when a profile is about to expire. You can also use this interface
    to delete a profile.


    Xcode’s next step is to copy your application onto the device. You see a status
    message in the lower-left corner: “Installing Safety Light.app on Kryten…” followed
    by


    “GDB: Running…”. Now look at your device. Congratulations, you’re now an iPhone
    developer!


    ***Tip:*** You can connect multiple iPhones and iPods to your Mac as an aid for
    testing. It’s easy—just connect each device to a USB port, and Xcode can use them
    simultaneously. To control where the app gets installed and debugged, select the
    appropriate device name for the Active Executable in the Overview menu.


    **150**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Make It Official**


    When It Fails


    Seasoned iPhone developers will tell you they spend way more time in the Provisioning
    Portal than they’d like to. The sad truth is that the whole process of signing
    code is designed to fail over time.


    As you’ve noted along the way, certificates expire, as do the provisioning profiles
    they’re attached to. Even the devices expire because of upgrades or misfor-tune
    (consider yourself lucky if you’ve never discovered a phone in the washing machine!).'
  trans: '

    # 通过配置文件整合所有内容


    好消息！你已经创建了配置描述文件所需的所有部分——现在是时候将它们组装起来了。到现在为止，你听到要在“配置门户”中完成这项操作时，应该不会感到惊讶了：


    1. 在“配置门户”网页上，点击左侧栏中的**“配置”**。


    此屏幕包含多个标签页。目前你只需关注**“开发”**标签页。


    2. 点击**“新建配置文件”**开始操作。


    首先要做的是为新配置描述文件命名。


    3. 由于此配置文件将用于常规的 iPhone 开发，请将其命名为**`iPhoneDevelopment`**。开启所有显示的证书。


    如果你是个人开发者，则只会有一个证书。如果你与其他开发者组队合作，你可以为他们添加证书，这些证书也会列在这里。


    4. 对于 App ID，选择**“所有 App”**。开启你打算用于内部开发的每一台设备（图 5-11）。


    **“全选”**链接是选择所有设备的便捷方式。


    5. 点击**“提交”**。


    你会回到配置描述文件的列表。你会注意到新配置文件的状态为**“处理中”**。Apple 的服务器生成文件需要一些时间。


    6. 刷新屏幕。状态会变为**“有效”**，并且**“操作”**列中会出现一个**“下载”**按钮。点击**“下载”**。


    完成后，你的“下载”文件夹中会有一个新的 `iPhone_Development.mobileprovision` 文件。


    至此，你暂时完成了配置门户的操作。是时候切换到 Xcode 并添加新文件到你的构建过程了。


    **147**


    ![Image 52](img/index-166_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **正式生效**


    **图 5-11：** 创建你的第一个配置描述文件，名为**iPhone Development**。此配置文件整合了 Craig Hockenberry
    的证书，可用于构建和运行所有 App，并且可以安装在所选设备上。


    ## Xcode 设置


    你在配置门户中执行了许多步骤来创建配置描述文件。幸运的是，安装它非常简单。只需将 `iPhone_Development.mobileprovision`
    文件拖放到 Xcode 的图标上即可完成！


    要验证它是否已正确安装，请打开 Xcode 中的管理器（选择 窗口 → 管理器）。在管理器窗口中，打开源列表中的**“iPhone Development”**组，找到名为**“配置描述文件”**的项目。点击它，你会看到
    Xcode 可以使用的所有配置文件。你应该会看到**“iPhone Development”**及其过期日期。如果点击配置文件，你会看到一些关于它的附加信息，如图
    5-12 所示。


    ## 清理、构建与运行


    现在你已经准备好构建并安装应用至你的 iPhone 了。确保你在配置中指定的其中一台设备已插入并准备就绪。当设备成功连接到 Xcode 后，你会在管理器中设备旁边看到一个绿点。


    **提示：** 如果设备没有显示绿点，请在管理器中选中它，然后在**“摘要”**标签页中查看状态消息。如果你看到“无法支持开发”的消息，意味着 Xcode
    无法附加到设备上的进程。重启该进程的唯一方法是重启设备。


    **148**


    ![Image 53](img/index-167_1.jpg)


    ![Image 54](img/index-167_2.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **正式生效**


    **图 5-12：** Xcode 的管理器可以显示当前已安装的配置描述文件。**iPhone Development** 配置文件刚刚通过配置门户创建完成。请注意，此配置文件的过期日期大约为其创建之日起的
    3 个月。


    在主项目窗口中，更改窗口左上角的**“概览”**菜单。到目前为止，你一直在使用**“iPhone 模拟器”**作为**“活动 SDK”**设置。现在你已拥有已配置并连接的设备，你可以选择**“iPhone
    设备（基础 SDK）”**（图 5-13）。


    **图 5-13：** 一旦你的 iPhone 已配置并连接到 Mac，你可以从**“活动 SDK”**菜单中选择**“iPhone 设备”**。名称后的数字表示你正针对哪个版本的
    iPhone SDK 进行构建。


    **149**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **正式生效**


    **注意：** 为设备设置**“活动 SDK”**会导致 Xcode 为 iPhone 的 ARM 处理器生成代码，而不是为 Mac 中的 i386 处理器生成。你可以通过在**“概览”**菜单底部的**“活动架构”**来验证这一点。


    选择**“活动 SDK”**后，清理项目（构建 → 清理）。此步骤确保你从一个干净的状态开始。它会移除所有因代码签名错误而生成的代码。在出现的对话框中，确保两个复选框都已勾选，然后点击**“清理”**。


    现在是每位 iPhone 开发者都记忆犹新的时刻：在你的 iPhone 上安装第一个应用。选择 构建 → 构建并运行（或按 ⌘-Return）来启动操作！


    **注意：** 如果你看到无法启动可执行文件的错误，这意味着你的 iPhone 未连接或需要重启。另外，请检查你的手机是否已解锁，以便显示主屏幕。


    你可以在左下角观察状态行，随着头文件被预编译和源代码被编译。在构建过程接近尾声时，会进行代码签名过程。此时，你会看到一个消息框，询问是否允许“codesign”访问你的钥匙串。点击**“允许”**。


    每次从 Xcode 运行应用程序时，它都会检查设备以确保已安装有效的配置描述文件。当你将配置文件拖放到 Xcode 图标上时，你只是将其安装在了开发环境中。配置描述文件的最终目的地是设备本身，在它就位之前，你的应用程序将无法运行。幸运的是，Xcode
    会帮助你：它会提示你无法在设备上运行应用程序。当你点击**“安装并运行”**时，配置文件将被安装。


    你可以通过手机上的**“设置”**应用来验证配置描述文件是否已安装。轻按 设置 → 通用 → 描述文件，你会看到已安装的配置文件列表。你会看到你的**“iPhone
    Development”**配置文件及其过期日期。当配置文件即将过期时，iPhone OS 会发出警告。你也可以使用此界面删除配置文件。


    Xcode 的下一步是将你的应用程序复制到设备上。你会在左下角看到一条状态消息：“正在将 Safety Light.app 安装到 Kryten 上……”，随后是“GDB：正在运行……”。现在看看你的设备。恭喜你，你现在是一名
    iPhone 开发者了！


    **提示：** 你可以将多个 iPhone 和 iPod 连接到你的 Mac 作为测试辅助工具。这很简单——只需将每台设备连接到 USB 端口，Xcode
    就可以同时使用它们。要控制应用安装和调试的位置，请在**“概览”**菜单中选择适当的设备名称作为**“活动可执行文件”**。


    **150**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **正式生效**


    ## 当操作失败时


    经验丰富的 iPhone 开发者会告诉你，他们在配置门户上花费的时间比他们希望的多得多。可悲的事实是，整个代码签名过程的设计初衷就是随着时间的推移而失效。


    正如你一路注意到的，证书会过期，它们所关联的配置描述文件也会过期。甚至连设备也会因为升级或意外而失效（如果你从未发现过手机在洗衣机里，那你真算幸运了！）。

    '
- fmt: '# Apple 开发配置与签名问题指南


    Apple 设计的这一流程使其能够保留对您应用程序分发的控制权。结果就是：您所处理的配置绝对*不是*“一劳永逸”。更糟的是，几个月后您会忘记当初是如何设置的。以下章节将帮助您在出现问题后恢复正常工作状态。


    ## 代码签名


    没有人喜欢构建失败。如果在签名代码时遇到错误，您的构建肯定出了问题。此时需要检查您的证书和构建设置！


    ### 证书


    首先要验证的是证书是否已过期。最快的方法是打开 `Applications➝Utilities` 文件夹中的`钥匙串访问`，并搜索`iPhone.*`。如果看到任何证书上有红色
    `X`，则需要重新生成它们。如果您保存了之前的证书签名请求副本，例如`iPhone.certSigningRequest`（第 140 页），只需将其重新提交到门户。否则，您需要使用`钥匙串访问`生成新的请求。


    通过门户更新证书后，您会发现配置文件出现问题。它们已被作废，因为其中包含对不再存在的证书的引用。修复并不难：点击“无效”状态指示旁边的“续订”按钮。


    一旦配置文件重新生成，您需要下载并将其安装到`Xcode`中。如果团队中的其他开发者使用相同的配置文件，他们也需要更新其开发环境。任何使用该配置文件进行 Beta
    测试的外部测试人员也需要在其设备上加载新的配置文件。


    现在您可以看到，像过期证书这样简单的事情会如何级联成许多人繁重的工作。还好您在编码时可以偷懒，因为您需要额外的时间来管理配置文件！


    ### 代码签名标识


    在 iPhone 开发过程中，您可能会看到类似这样的错误消息：“代码签名错误：标识‘iPhone Developer: Baba O’Riley’与默认钥匙串中的任何有效证书/私钥对都不匹配”。


    此消息表明您的项目设置包含对默认钥匙串中不存在的证书的引用。请检查`钥匙串访问`，确保看到类似图 5-4 的内容。


    当您与另一位开发者（无论是开源项目还是团队中的其他人）协作开发项目时，通常会出现此问题。如果该人员将代码签名设置更改为“iPhone Developer:
    Happy Jack”，您的证书将不匹配，从而看到该错误。


    修复方法很简单：确保在构建设置中定义了“自动配置文件选择器”。在`Xcode`中打开目标构建设置（`Project➝Edit Active Target`），向下滚动到“代码签名”部分。`代码签名标识`应设置为`Any
    iPhone OS Device`，其值为`iPhone Developer`。此时会显示钥匙串中的当前匹配项。


    ***提示：*** 请记住检查目标中的设置：目标可以覆盖项目中的任何配置。不要因为查看了错误的位置而误导自己！


    ### 配置文件匹配


    如果您使用类似`com.*mydomain.*`的包标识符定义了一个配置文件，并尝试构建一个在`Info.plist`中包含`com.theirdomain.TheirProduct`的项目，您将看到错误：“代码签名错误：标识‘iPhone
    Developer’与任何配置文件中的任何标识都不匹配”。


    这就是在配置文件中为您的 App ID 使用通配符`*`的原因之一——它更有可能匹配您钥匙串中的某个证书。当然，在需要对应用程序标识符更加具体的情况下，您需要更改`Info.plist`中的值，或者生成一个与新标识符匹配的新配置文件。


    ## 设备配置


    您可能在构建应用时没有遇到任何问题，但当它无法在设备上运行时，那才是真正的问题！以下是需要注意的一些事项：


    ### 启动中止


    当您点击应用程序图标时，它开始启动，您会看到`Default.png`中的图像一闪而过。然后您就回到了主屏幕。真糟糕。您刚刚见证了过期的配置文件。iPhone
    OS 启动该应用，确定设备上没有有效的配置文件，然后应用退出。


    前往“设置”应用，深入导航至`General➝Profiles`。如果看到带有红色文本的配置文件，指示该配置文件已过期，请将其删除。它不再有用。


    然后前往“配置门户”刷新配置文件，以便重新安装。


    ***提示：*** 删除过期的配置文件可以帮助您避免配置文件之间的冲突。如果您有一个匹配所有应用的过期配置文件，操作系统可能会先找到该配置文件，而忽略该应用的其他有效配置文件。*请尽快从设备上删除任何过期的配置文件*。


    也可能是配置文件一开始就没有正确安装。如果“设置”应用没有列出您一直用于开发的名称，请使用`Xcode`的“管理器”再次安装该配置文件。


    ***注意：*** 当您向测试人员发送新的 Beta 版本时，可能会听到其中一些人说“应用已安装，但无法完成启动”。他们正遇到上述问题。


    ### 门户混淆


    当您在配置门户中添加和删除设备时，请记住刷新“配置”部分的配置文件。这不会自动发生。


    许多开发者在更新设备配置后，立即下载了一个不包含新信息的配置文件。很容易忘记添加设备并不会神奇地使其出现在您的配置文件中。您需要点击`Edit➝Modify`链接，并在配置文件列表中选择每个新设备。


    类似地，如果您从门户中删除设备，任何使用该设备的配置文件都会立即失效。请访问“配置”部分并重新创建受影响的配置文件。


    ## 其他问题


    如果您遇到代码签名或配置问题，不要害怕重启`Xcode`。大多数情况下，开发环境能够完美地处理证书和配置文件的管理。然而，各个组件之间的关系很复杂，有时`Xcode`需要一点推动。


    另一个即使是顶尖开发者也会被迷惑的问题，并非与代码签名或配置有关。它可能更简单——您的应用是为错误版本的 iPhone OS 编译的。


    如果您使用 3.1 SDK 构建应用，测试人员可以将其安装到装有 iPhone OS 3.0 的设备上。当您的应用无法在设备上启动时，不要假定是配置问题。养成在开始排查配置之前，先询问测试人员他们运行的是哪个操作系统版本的习惯。


    ***提示：*** 通过 App Store 安装的应用不会遇到此问题，因为安装程序在将应用放到设备上时会检查版本。其他安装机制不会执行此检查。


    ## 您现在已移动


    一旦您将工作成果放入口袋随身携带，您就会开始以不同的眼光看待它。您的应用已从桌面开发环境中解放出来，您对其设计的前提假设也是如此。


    将您的创作带入现实世界极为重要，因为您的客户在从 App Store 下载完成后也会立即这样做。


    以下是您会立即注意到的一些事情：'
  raw: 'Apple has designed this process so that they retain control over the distribution
    of your application. The result: You’re working with a configuration that’s definitely
    *not* “set it and forget it.” Worse, you won’t remember how you set things up
    many months ago. The following sections will help you get things back in working
    order when they break.


    *Code signing*


    No one likes a broken build. And if you’re seeing errors while signing code, your
    build is most definitely broken. Time to check your certificates and build settings!


    Certificates. The first thing to verify is that certificates haven’t expired.
    The quickest way to do this is to open Keychain Access in your Applications➝Utilities
    folder and to search for *iPhone.* If you see a red *X* on any of your certificates,
    you’ll need to regenerate them. If you saved copies of your previous Certificate
    Signing Requests, like *iPhone.certSigningRequest* (page 140), you can just resubmit
    them to the portal. Otherwise, you’ll need to generate new requests with Keychain
    Access.


    After your certificates are updated by using the portal, you’ll find problems
    with the provisioning profiles. They have been invalidated because they contain
    a reference to a certificate that no longer exists. It’s not hard to fix: Click
    the Renew button next to the Invalid status indication.


    Once the profile is regenerated, you need to download and install it in Xcode.
    If other developers on your team are using the same profile, they need to update
    their development environment as wel . Any external testers who are using the
    profile for beta testing also need to load the new profile on their device.


    You can now see how a simple thing like an expired certificate cascades into a
    lot of work for a lot of people. Good thing you get to be lazy while coding, because
    you’ll need the extra time to manage profiles!


    Code signing identities. During the course of your iPhone development, you might
    see an error message like: “Code Sign error: The identity ‘iPhone Developer: Baba
    O’Riley’ doesn’t match any valid certificate/private key pair in the default keychain”.


    Chapter 5: Getting Serious about Development


    **151**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Make It Official**


    This message indicates your project settings include a reference to a certificate
    that doesn’t exist in your default keychain. Check Keychain Access to make sure
    you see something similar to Figure 5-4.


    This problem typical y arises when you’re working on a project with another developer
    (either with open source or someone else on your team). If that person changes
    the code-signing setting to “iPhone Developer: Happy Jack,” your certificate won’t
    match and you see the error.


    The fix is simple: Make sure that the Automatic Profile Selector is defined in
    the build settings. Open the target build settings in Xcode (Project➝Edit Active
    Target), and scroll down to the Code Signing section. The Code Signing Identity
    should be set to Any iPhone OS Device with a value of iPhone Developer. The current
    match in the keychain shows.


    ***Tip:*** Remember to check the settings in the target: The target can override
    any configuration done in the project. Don’t fool yourself by looking in the wrong
    place!


    Profile matching. If you’ve defined a profile using a bundle identifier like *com.*


    *mydomain.** and try to build a project that has *com.theirdomain.TheirProduct*
    in the Info.plist, you’ll see an error: “Code Sign error: The identity ‘iPhone
    Developer’


    doesn’t match any identity in any profile.”


    That’s one of the reasons to use the * wildcard for your App ID in the provisioning
    profile—it’s more likely to match one of the certificates in your keychain. Of
    course in cases where you need to be more specific with your application identifiers,
    you need to either change the value in Info.plist or generate a new provisioning
    profile that matches the new identifier.


    *Device provisioning*


    You may not be seeing any issues while building your app, but when it won’t run
    on a device, that’s a problem! Here are some things to look out for: Launch abort.
    When you tap on your application’s icon, it starts to launch and you see the image
    in Default.png for just an instant. Then you’re back at the home screen. Bummer.
    You’ve just witnessed an expired provisioning profile. The iPhone OS launches
    the app, determines that there’s no valid profile on the device, and then the
    app quits.


    Head to the Settings app, and drill down into General➝Profiles. If you see a profile
    with red text indicating that the profile has expired, delete it. It’s no longer
    of use.


    Then head to the Provisioning Portal to refresh the provisioning profile so you
    can reinstall it.


    **152**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Make It Official**


    ***Tip:*** Deleting expired profiles can help you avoid conflicts between profiles.
    If you have an expired profile that matches all applications, the OS may find
    that one first and ignore another valid profile for the application. *Alwaysremoveanyexpiredprofile*
    from the device as soon as possible.


    It’s also possible that the profile wasn’t installed properly in the first place.
    If the Settings app doesn’t list the name you’ve been using for your development,
    use Xcode’s Organizer to install the profile again.


    ***Note:*** When you send a new beta release to testers, it’s likely that you’ll
    hear “the app installed, but won’t finish launching” from a few of them. They’re
    having the problems noted above.


    Portal confusion. As you add and remove devices in the Provisioning Portal, remember
    to refresh the profiles in Provisioning. It doesn’t happen automatical y.


    Many a developer has updated the device configuration and then immediately downloaded
    a profile that didn’t contain the new information. It’s easy to forget that adding
    a device doesn’t magical y make it appear in your profiles. You need to click
    the Edit➝Modify link and select each new device in the profile’s list.


    Similarly, if you delete a device from the portal, any provisioning profiles that
    use the device are immediately invalidated. Visit the Provisioning section and
    recreate the affected profiles.


    *Other problems*


    Don’t be afraid to restart Xcode if you’re having problems with code signing or
    provisioning. For the most part, the development environment handles the management
    of certificates and profiles without missing a beat. Stil , the relationships
    between the various components are complex, and sometimes Xcode needs a kick in
    the pants.


    Another issue that fools even the best developers isn’t related to code signing
    or provisioning at al . It can be something much simpler—your app was compiled
    for the wrong version of the iPhone OS.


    If you build your app using the 3.1 SDK, your testers can install it on a device
    with iPhone OS 3.0 instal ed. When your application won’t launch on a device,
    don’t assume that it’s a problem with provisioning. Get in the habit of asking
    your testers which version of the OS they’re running before you head off on a
    provisioning excursion.


    ***Tip:*** Apps installed via the App Store don’t suffer from this issue because
    the installer checks the version while putting the application on the device.
    Other installation mechanisms don’t perform this check.


    Chapter 5: Getting Serious about Development


    **153**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Make It Official**


    You’re Now Mobile


    As soon as you put your work in your pocket and carry it around with you, you’ll
    begin to look at it differently. Your application is liberated from a desktop
    development environment and so are your assumptions about its design.


    It’s extremely important to take your creation into the real world, since your
    customers will be doing it as soon as they finish downloading it from the App
    Store.


    Here are a few things you’ll notice immediately:'
