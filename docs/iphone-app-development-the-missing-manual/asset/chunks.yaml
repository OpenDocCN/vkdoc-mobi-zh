    ## Beta 测试


    ***注意：*** 在图 7-5 中，你会看到 Safety Light 在 iTunes 中显示了自定义图稿（应用图标上写有“BETA”字样）。这是通过向
    Beta 目标添加一个 `iTunesArtwork` 文件来实现的。该文件是一个 512 × 512 像素的 PNG 文件，但去除了扩展名。


    `Flashlight Pro` 项目演示了如何在 Beta 目标中执行此操作。如果你不包含此文件，一切仍能正常运行，但你的测试人员会看到一个通用图标。在图标上添加文字是为了提醒测试人员他们正在使用
    Beta 版本。


    请确保你**不要**将 `iTunesArtwork` 添加到最终上传至 App Store 的构建版本中。Apple 会在提交后添加此图稿，如果它已经存在，可能会引发问题。


    **iPhone 配置实用工具。** 第二个技巧是使用 iPhone 配置实用工具。Apple 在 *http://www.apple.com/support/iphone/enterprise/*
    为 Mac 和 Windows 提供了此工具。它最初是为 iPhone 应用的企业部署而开发的，但同样非常适合 Beta 测试人员使用。


