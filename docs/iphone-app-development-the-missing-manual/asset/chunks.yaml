    iTunes 媒体库绑定的测试人员来说非常重要。


    反复如此。除非你运气极好，否则很可能会有不止一个 Beta 版本。你需要为测试人员提供如何更新现有 Beta 安装的建议。对于使用 iTunes 的测试人员，过程非常简单。他们只需将新版本的应用拖入
