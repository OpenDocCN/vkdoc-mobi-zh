  trans: "\n# 既然一个类就能搞定，为什么非要用两个？\n\n既然可以实现为一个类，为什么偏要写成两个？这和代码中使用常量的道理一样：你能确定数据在 processing\
    \ 过程中永远不会改变。从而可以做出原本无法成立的假设。\n\n***注意：*** 如果你曾遭遇过遍历数组时数组长度突然变化的经历，你就会明白这些错误假设会带来多么痛苦的\
    \ bug。\n\n## 第 3 章 Cocoa Touch：让 Objective-C 真正发挥作用\n\n**75**\n\n**可变与不可变**\n\n\
    在构建自己的类时，你常常需要决定实例变量该用这两种中的哪一种。一条好用的经验法则是：当值需要被整体替换时，使用像 `NSString` 或 `NSNumber`\
    \ 这样的不可变对象。\n\n当你在拼接牛逼闪闪的字符串时，使用 `NSMutableString` 毫无意义，因为 `–setOriginalString:`\
    \ 方法更新的是整个字符串，而不是修改单个字符。\n\n另一方面，集合类则经常需要增量更新。从数组中添加或删除元素是家常便饭，所以你会希望使用 `NSMutableArray`，并获得\
    \ `–insertObject:atIndex:` 和 `–removeObjectAtIndex:` 方法。\n\n### 让它可变\n\n当你手里有一个不可变对象，却又需要一个可变对象时，该怎么办？\n\
    \n你会发现 Foundation 框架中的很多方法返回的都是不可变对象。这些系统类假设你可能并不想修改返回的结果。大多数情况下，这个假设是对的。但作为开发者，你很清楚，正是那些特殊情况才最让人头疼！\n\
    \n下面是一个返回不可变数据的方法简单示例——`NSString` 中使用分隔符分割字符串的方法：\n\n```\n- (NSArray *)componentsSeparatedByString:(NSString\
    \ *)separator;\n```\n\n如果你只是为了遍历分割后的值而解析一个逗号分隔的字符串，那么不可变的副本就完全够用：\n\n```\nNSString\
    \ *oneHand = @″Thumb,Index,Middle,Ring,Little″;\nNSArray *fingers = [oneHand componentsSeparatedByString:@″,″];\n\
    for (NSString *finger in fingers) {\n    NSLog(@″The finger is %@″, finger);\n\
    }\n```\n\n但如果你想修改这些手指名称呢？这正是那种罕见却又重要的场景，你需要一个可变副本。谁都知道最后一个手指叫做“小拇指”（Pinkie）。\n\
    \n幸运的是，使用 `NSObject` 定义的 `–mutableCopy` 方法就能轻松搞定：\n\n```\nNSString *oneHand =\
    \ @″Thumb,Index,Middle,Ring,Little″;\nNSArray *fingers = [oneHand componentsSeparatedByString:@″,″];\n\
    NSMutableArray *mutableFingers = [fingers mutableCopy];\n[mutableFingers removeLastObject];\
    \ // 嗷，好疼！！！\n[mutableFingers addObject:@″Pinkie″]; // 现代科学的奇迹\nfor (NSString\
    \ *finger in mutableFingers) {\n    NSLog(@″The finger is %@″, finger);\n}\n```\n\
    \n有一点很重要：你不能对任意一个对象都进行可变复制。你要复制的类必须支持 `NSMutableCopying` 协议。如果类的定义中没有包含 `<NSMutableCopying>`，那么当你尝试进行复制时就会抛出异常。\n\
    \n**76**\n\niPhone 应用开发：缺失手册\n\n**可变与不可变**\n\n***注意：*** 在处理集合时，`–mutableCopy`\
    \ 的行为与 `–copy` 类似。执行的是浅拷贝。\n\n幸运的是，所有的值对象和集合都支持这个协议。当一个类不支持该协议时，很可能是有充分理由的。对 `UIView`\
    \ 或 `NSURLConnection` 做可变复制又有什么意义呢？这种抽象太复杂，依赖关系太多，反而难以理解。\n\n### 保护你的数据\n\n在方法实现中使用可变数据是很常见的。你无从得知\
    \ `–componentsSeparatedByString:` 是如何实现的，但很可能是在解析器从字符串开头移动到结尾的过程中逐步构建起这个数组的。那么，为什么最终要把它作为不可变数组返回呢？\n\
    \nCocoa Touch 这是在防止你搬起石头砸自己的脚。除了你很可能并不需要可变副本之外，更重要的是：当两个对象持有同一份数据的副本时，如果一个对象在另一个对象不知情的情况下修改了数据，就会出大问题。\n\
    \n想象一下，一个数组在两个对象之间共享，它们都在向其中添加或删除元素。第一个对象计算了数组的长度。然后第二个对象删除了数组中的最后一个元素。当第一个对象去访问它自以为的最后一个元素时，就会因为数组索引越界而抛出异常。这是一个非常令人抓狂的\
    \ bug，因为每个对象看起来都做了正确的事。很难一眼看出问题的根源在于共享的集合。\n\n要返回一个可变实例的不可变副本，你可以利用可变类是其超类的子类，并且其超类实现了\
    \ `<NSCopying>` 协议这一事实。当你发送 `–copy` 消息时，你会得到一个不可修改的副本。\n\n假设你上面创建的 `mutableFingers`\
    \ 数组是 `MyHand` 类中的一个实例变量。你决定保持这个变量的可变性，以便迁就那些坚持把最后一个手指叫做“无名指”的无知人士。当其他对象向这个实例请求手指名称时，你可以像这样返回它们：\n\
    \n```\n@implementation MyHand\n. . .\n- (NSArray *)fingers {\n    NSArray *result\
    \ = (NSArray *)[[mutableFingers copy] autorelease];\n    return result;\n}\n```\n\
    \n这样返回的对象就不会破坏你的 `mutableFingers`。即使有人想把最后一个手指叫做“耳指”并塞进耳朵里，也没问题。\n\n第 3 章 Cocoa\
    \ Touch：让 Objective-C 真正发挥作用\n\n**77**\n\n**委托与数据源**\n\n你有没有遇到过需要完成一项任务，却完全不知道如何下手的情况？也许是修理洗碗机，或者是织一双袜子。你要么自己学会，要么找个帮手来完成你不懂的部分。\n\
    \nCocoa Touch 有一种设计模式叫做*委托*，它让你的应用程序能够帮助那些不知道你想做什么的系统类。其工作方式很简单：你向一个能够回答问题的对象介绍另一个对象。通过分配一个\
    \ `delegate`，你就为可以响应请求和状态变化的代码提供了钩子。\n\n如果你的对象愿意充当委托，那么它需要遵循一个协议。正如你在第 36 页看到的，协议就像一份合同。合同中的许多方法是可选的，但有些是必须实现的。\n\
    \n这种模式在 Cocoa 中被广泛使用。如果你在文档查看器中输入 `delegate`，会得到超过 100 个结果。你可以通过类是否拥有 `delegate`\
    \ 属性来判断它是否支持委托。具体的委托协议通常以 `Delegate` 作为后缀。\n\n在实践中了解其最佳方式，是查看一个使用委托的类：`UIPickerView`\
    \ 控件，它通过滚动列表来选择值（图 3-2）。\n\n***图 3-2：*** *Cocoa Touch 的标准选择器视图。显示的值来自委托和数据源。*\n\
    \n**78**\n\niPhone 应用开发：缺失手册\n\n**委托与数据源**\n\n当你查看 `UIPickerView` 类的文档时，你会看到如下定义的\
    \ `delegate` 实例变量：\n"
- fmt: "`@property (nonatomic, assign) id<UIPickerViewDelegate> delegate;` 该声明告诉你，`delegate`可以是任何类（由`*id*`表示），只要它支持`UIPickerViewDelegate`协议。当你打开文档时，你会发现该协议为代理定义了三个主要任务。你需要提供尺寸和内容，并对选择做出响应。所有这些任务都是可选的，但如果你忽略所有问题，你的选择器将变得非常无聊。\n\
    \n最初，你可能会想自定义每一行中的名称列表。选择器视图不知道如何标记行，因此它会通过`–pickerView:titleForRow:forComponent:`消息询问你想要什么。作为代理，你可以实现如下方法：\n\
    \n```\n- (NSString *)pickerView:(UIPickerView *)pickerView titleForRow:(NSInteger)row\
    \ forComponent:(NSInteger)component {\n    return [NSString stringWithFormat:@″Row\
    \ %d″, row];\n}\n```\n\n这样，选择器中的每一行将被标记为“Row 0”、“Row 1”、“Row 2”等。\n\n你还想知道何时有人点击某一行。如果不实现以下方法，你将永远不知道选择器值何时发生变化：\n\
    \n```\n- (void)pickerView:(UIPickerView *)pickerView didSelectRow:(NSInteger)row\
    \ inComponent:(NSInteger)component {\n    NSLog(@″You picked row %d″, row);\n\
    }\n```\n\n实现这两个方法的最佳位置是在`UIViewControl er`子类中。该控制器遵循第66页描述的MVC设计模式，因此很容易协调选择器视图与提供标题并在选择发生变化时更新状态的模型之间的活动。\n\
    \n选择器视图知道要显示多少行，因为委托模式有一个细微的变体——数据源。与代理一样，名为`dataSource`的实例变量必须实现`UIPickerViewDataSource`协议：\n\
    \n`@property (nonatomic, assign) id<UIPickerViewDataSource> dataSource;`\n\n并且`dataSource`需要实现两个方法：`–numberOfComponentsInPickerView:`和`–pickerView:numberOfRowsInComponent:`。\n\
    \n第一个方法告诉选择器视图要显示多少列，而第二个方法指定行数。对于一列和10行，你可以使用以下实现：\n\n```\n- (NSInteger)numberOfComponentsInPickerView:(UIPickerView\
    \ *)pickerView {\n    return 1;\n}\n\n- (NSInteger)pickerView:(UIPickerView *)pickerView\
    \ numberOfRowsInComponent:(NSInteger)component {\n    return 10;\n}\n```\n\n与代理方法一样，你可能会使用控制器的模型来填充这些值，而不是使用硬编码的结果。\n\
    \n当你处理滚动数据列表时（例如Safari中的书签或Mail中的收件箱），你会使用相同的委托和数据源模式。两者都使用`UITableView`，它通过与`UIPickerView`相同的技术进行控制。\n\
    \n不要认为这种委托设计模式仅限于用户界面中的视图。从URL下载数据时也经常使用委托。`NSURLConnectionDelegate`定义了一个协议，用于提供任何连接认证，并在下载过程中通知你。\n\
    \n## Targets and Actions\n\n在Cocoa Touch中处理控件时，你会使用与委托类似的机制。当你点击按钮、拖动滑块调节音量或切换开关时，这些用户界面元素需要通知应用程序的其他部分有关状态变化。那么，这些控件如何让所有内容知道发生了什么？\n\
    \n通知通过**目标-动作**设计模式发生。换句话说，你可以为每个控件设置一个**目标**——一个将被通知变化的对象。与委托一样，你可以选择任何对象。\n\n\
    与委托不同的是，动作可以是对象定义的任何方法。重要的是该方法符合以下两种签名之一：\n\n```\n- (IBAction)actionOne {\n}\n\
    \n- (IBAction)actionTwo:(id)sender {\n}\n```\n\nInterface Builder使用`IBAction`来识别你代码中的动作（稍后详细说明）。第二种形式接受一个包含发送动作的对象的单个参数。在处理动作时，可以使用`sender`。\n\
    \n如果你有一个由多个`UIButton`实例共享的单个动作，可以使用`sender`来确定哪个按钮触发了该动作。`sender`的另一个用途是查询控件的状态。例如，如果你从`UISwitch`控件接收到了一个动作，你会想知道开关是打开还是关闭：\n\
    \n```\n- (IBAction)toggleSwitch:(id)sender {\n    // sender is an instance of\
    \ UISwitch, so use its –on method:\n    if ([sender on]) {\n        NSLog(@″AFFIRMATORY\
    \ DIXIE CUP″);\n    }\n    else {\n        NSLog(@″NEGATORY MR CLEAN″);\n    }\n\
    }\n```\n\n这段代码也有易于阅读的优点，尤其是如果你理解1970年代的CB俚语。\n\n接下来，你需要了解这些控件如何与目标对象和动作方法挂钩。实际上，定义目标和动作有两种方式：一种使用代码，另一种使用Interface\
    \ Builder。你先从代码开始，以更深入地了解幕后发生了什么。\n\n### User Interface: The Hard Way\n\nCocoa\
    \ Touch中的每个控件都是`UIControl`类的子类。该类定义了以下方法：\n\n```\n- (void)addTarget:(id)target\
    \ action:(SEL)action\n    forControlEvents:(UIControlEvents)controlEvents\n```\n\
    \n此方法接受三个参数。第一个是将被通知控制事件的目标对象。第二个参数`action`定义了将发送给目标对象的消息。第三个参数`controlEvents`让你指定将触发该动作的事件类型。\n\
    \n最常见的事件是`UIControlEventValueChanged`和`UIControlEventTouchUpInside`。第一个`UIControlEventValueChanged`用于值变化很重要的控件，例如拖动滑块（`UISlider`）、在文本字段中键入（`UITextField`）以及翻转开关（`UISwitch`）。\n\
    \n`UIControlEventTouchUpInside`事件通常用于`UIButton`控件，因为你只想在用户手指在按钮边界内释放按钮时才知道。即使你是NFL的粉丝，也不应使用`UIControlEventTouchDown`。此事件不允许用户将手指拖离按钮以取消按钮按下。\n\
    \n以下是在你的控制器对象中如何将它们组合在一起：\n\n```\n#define LOUDER 11.0f\n\n- (void)updateVolume:(id)sender\
    \ {\n    float volume = [(UISlider *)sender value];\n    if (volume >= LOUDER)\
    \ {\n        NSLog(@″NIGEL TUFNEL WOULD BE PROUD″);\n    }\n}\n\n- (void)hitOrMiss\
    \ {\n    if ([mySlider value] > LOUDER) {\n        NSLog(@″OF COURSE IT’S A HIT!!!″);\n\
    \    }\n}\n\n- (void)setupControls {\n    [mySlider addTarget:self action:@selector(updateVolume:)\n\
    \        forControlEvents:UIControlEventValueChanged];\n    [myButton addTarget:self\
    \ action:@selector(hitOrMiss)\n        forControlEvents:UIControlEventTouchUpInside];\n\
    }\n```\n\n`–updateVolume:`方法被附加到控制器对象中的`mySlider`视图引用上。当滑块移动且其值发生变化时，会检查音量；如果超过11，则在控制台日志中显示一条消息。\n\
    \n`–hitOrMiss`方法使用了不带`sender`参数的动作签名。此方法还展示了如何利用其他视图状态来响应按钮按下。如果滑块值高于11，按钮会让你知道这是一个热门点击。"
  raw: '@property (nonatomic, assign) id<UIPickerViewDelegate> delegate; That declaration
    tel s you that the delegate can be any class (represented by *id*) as long as
    it supports the *UIPickerViewDelegate* protocol. When you open the documentation,
    you’ll see that the protocol has three primary tasks for the delegate. You’ll
    be asked to provide dimensions and content, as well as to respond to selections.
    All of these tasks are optional, but your picker is going to be pretty boring
    if you ignore all the questions.


    Initial y, you’ll probably want to customize the list of names in each row. The
    picker view doesn’t know how to label the rows, so it will ask you what you want
    with the


    *–pickerView:titleForRow:forComponent:* message. As a delegate, you could implement
    a method like this:


    - (NSString *)pickerView:(UIPickerView *)pickerView titleForRow:(NSInteger)row
    forComponent:(NSInteger)component {


    return [NSString stringWithFormat:@″Row %d″, row];


    }


    And each row in the picker would be labeled “Row 0”, “Row 1”, “Row 2”, and so
    on.


    You’d also like to know when someone taps on a row. If you don’t implement the
    following method, you’ll never know when the picker value changes:


    - (void)pickerView:(UIPickerView *)pickerView didSelectRow:(NSInteger)row inComponent:(NSInteger)component
    {


    NSLog(@″You picked row %d″, row);


    }


    The best place to implement both of these methods is in a *UIViewControl er* subclass.
    This controller follows the MVC design pattern described on page 66, so it’s easy
    to coordinate the activities between the picker view and a model that supplies
    the titles and that updates its state when a selection changes.


    The picker view knows how many rows to display because the delegation pattern
    has a slight variation—the data source. As with a delegate, an instance variable
    with the name of *dataSource* must implement the *UIPickerViewDataSource* protocol:


    @property (nonatomic, assign) id<UIPickerViewDataSource> dataSource; And the *dataSource*
    is required to implement two methods: *–numberOfComponentsInPickerView:* and *–pickerView:numberOfRowsInComponent:.*


    The first method tel s the picker view how many columns to display, while the
    second method specifies the number of rows. For one column and 10 rows, you’d
    use these implementations:


    - (NSInteger)numberOfComponentsInPickerView:(UIPickerView *)pickerView {


    return 1;


    }


    Chapter 3: Cocoa Touch: Putting Objective-C to Work


