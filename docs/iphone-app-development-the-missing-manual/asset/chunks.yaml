    App Delegate”.


    • **Size.** This panel lets you define the selected object’s geometry. For example,
    the window’s width and height is 320 × 480 (the size of the iPhone’s screen).


    • **Identity.** This view shows what kind of object is defined. The app’s window
    has a class of UIWindow.


    ***Tip:*** To manage Interface Builder’s many windows, you’ll find that keyboard
    shortcuts make short work of finding the information you need. You can access
    the main document window by pressing ⌘-0, and you can switch to each section of
    the inspector with ⌘-1 through ⌘-4\. Use Shift-⌘-L to bring up the Library window.


    If you don’t ful y understand what’s going on here, don’t worry. You’ll learn
    everything there is to know about classes, objects, and instances in the next
    chapter.


    ***Note:*** If you’ve used other development environments, leave your preconceptions
    about how Interface Builder works at the door. Instead of automatically generating
    code to display the UI from resources, the


    .xib file contains an XML representation of the actual object instances and hierarchy.
    When you load a file, Interface Builder creates an object graph in memory and
    connects it to the instance variables that you’ve chosen. We’ll go into greater
    detail about how this works in Chapter 3.


    Now that you’ve had a little tour of Interface Builder, you can modify your flashlight’s
    UI. Make sure that Window is selected in the MainWindow.xib document and that
    the Property Inspector is on the first panel (for modifying attributes).'
