- fmt: "# Alert Display and User Interaction\n\nThe alert is displayed with the following\
    \ code. First the model is checked to see if the user has accepted the risks of\
    \ running the flasher:\n\n```\nif (! self.flashlightModel.flashingAccepted) {\n\
    ```\n\nIf they haven’t accepted, an alert view object is created with a title,\
    \ a message, and labels for the buttons being displayed in the view:\n\n```\n\
    UIAlertView *alertView = [[UIAlertView alloc]\ninitWithTitle:NSLocalizedString(@\"\
    FlasherWarning\", nil)\nmessage:NSLocalizedString(@\"FlasherWarningMessage\",\
    \ nil)\ndelegate:self\ncancelButtonTitle:NSLocalizedString(@\"Cancel\", nil)\n\
    otherButtonTitles:NSLocalizedString(@\"FlasherWarningButtonStart\", nil), NSLocalizedString(@\"\
    FlasherWarningButtonLearn\", nil), nil];\n```\n\nSince your controller is a `UIAlertViewDelegate`,\
    \ you set it as the delegate. Note also that the strings are localized. If you’re\
    \ going to warn someone about the dangers in your app, you need to do it in the\
    \ language they understand best.\n\nSending the alert view a `–show` message causes\
    \ the alert to appear onscreen.\n\nYou then release the object because it’s no\
    \ longer needed and end the action method:\n\n```\n[alertView show];\n[alertView\
    \ release];\nreturn;\n}\n```\n\nBut then what? You’re asking for user input, and\
    \ nothing is being returned by the alert view. Is some kind of telepathy going\
    \ on here?\n\nNo, that feature won’t be available until Apple releases the iPhone\
    \ 9GSXY. In the meantime, you need to remember that you’re a `UIAlertViewDelegate`.\
    \ And the following code will be called when the user taps a button:\n\n```\n\
    - (void)alertView:(UIAlertView *)alertView\nclickedButtonAtIndex:(NSInteger)buttonIndex\
    \ {\n    if (buttonIndex == 0) {\n        // Cancel\n    }\n    else if (buttonIndex\
    \ == 1) {\n        // Start Flasher\n        self.flashlightModel.flashingAccepted\
    \ = YES;\n        [self startFlasher];\n        self.flasherRunning = YES;\n \
    \   }\n    else if (buttonIndex == 2) {\n        // Learn More\n        [[UIApplication\
    \ sharedApplication] openURL:[NSURL\nURLWithString:@\"http://en.wikipedia.org/wiki/Photosensitive_epilepsy\"\
    ]];\n    }\n}\n```\n\nEach button in the alert has an index. The Cancel button\
    \ is the first, followed by a button to start the flasher, and another to learn\
    \ more about photosensitive epilepsy.\n\n**Note:** The “learn more” button shows\
    \ how you can open a web page in Safari. First you convert a string to a URL,\
    \ and then you pass it to `UIApplication`. Your application will be closed, and\
    \ Safari will open with the specified page:\n\n```\nNSURL *URL = [NSURL URLWithString:@\"\
    http://chocklock.com\"];\n[[UIApplication sharedApplication] openURL:URL];\n```\n\
    \n## Action Sheets\n\nYour original plan was to have a “disco mode.” In fact,\
    \ a lot of the variable names reflect this feature. But one day your marketing\
    \ expert realizes that disco dancing and safety don’t really have much in common.\
    \ Other kinds of lights might be more appropriate.\n\nThe result is that this\
    \ feature morphs into one that lets users select from a list of lights. There\
    \ are emergency and alert lights for dangerous situations, and the disco light\
    \ is the option for folks who want to do a little dance, make a little love, and\
    \ get down tonight. To make the choice, you give your app an action sheet!\n\n\
    `Action sheets` are the way to go when you want to let users select from a list\
    \ of choices. An example is a reply in the Mail application, where an action sheet\
    \ lets you choose between Reply and Forward.\n\nAs with alert views, you first\
    \ need to adopt the `UIActionSheetDelegate` in your view controller’s `@interface`.\
    \ Then you construct the sheet with the main view controller as a delegate along\
    \ with title and button strings:\n\n```\nUIActionSheet *actionSheet = [[UIActionSheet\
    \ alloc]\ninitWithTitle:NSLocalizedString(@\"DiscoActionTitle\", nil)\ndelegate:self\n\
    cancelButtonTitle:NSLocalizedString(@\"Cancel\", nil)\ndestructiveButtonTitle:nil\n\
    otherButtonTitles:NSLocalizedString(@\"DiscoActionButtonEmergency\", nil), NSLocalizedString(@\"\
    DiscoActionButtonAlert\", nil), NSLocalizedString(@\"DiscoActionButtonHues\",\
    \ nil), NSLocalizedString(@\"DiscoActionButtonMixed\", nil)];\n```"
