    • **Left- or right-handed users.** Control placements for right-handed users may
    not be appropriate for left-handed users.


    • **Display rotation.** The layout of your design can change when a user switches
    between portrait and landscape orientations.


    Note that these issues are often interrelated. Designing for a left-hander using
    two hands in landscape can be just as important as for a right-hander using one
    hand in portrait orientation.


    You also need to take into account environmental factors. A low-contrast design
    may look great in controlled lighting conditions, but when a user takes his phone
    out of his pocket on a bright and sunny day, he’ll have trouble viewing the information
    you’re presenting. Similarly, your design may be easy to read while stationary,
    but many people will use your app while jostled around in a bus or train.


    It’s important to take your creation outside the office and to see the effects
    of the real world on its usability. Do this early and often throughout the development
    process.


    *The Internet in your pants*


    The iPhone has two types of users. As you design your application, you need to
    keep the radical y different needs of these two groups in mind.


    Some people use the iPhone as a satellite device. These folks have a desktop computer
    in their home or office. The iPhone acts as a way for them to take their information
    on the go. Some aspects of app design for this group are:


    • The Mail application is useful for notification and triage. Composition of long
    messages isn’t comfortable.


    • Capture and display of photos is easy, but extensive processing of the image
    is beyond the capabilities of the CPU.


    • It’s easy to add information to the Contacts app, especial y with new people
    you meet. But the real value is syncing this information back to the desktop.


    • Applications that don’t sync important data back to the desktop are frustrating
    to use. Apple’s built-in Notes application is an example.


    The other group of iPhone users is the one that doesn’t have another computer.
    For many people, their new smart phone is the first time they’ve had a personal
    computing device. These users don’t expect the kind of features available on a
    real computer, but they’ll still need flexibility while using your application.


    For all kinds of users, the value of the iPhone isn’t so much the function that
    it performs, but rather where it performs that function. Succinctly, it’s the
    Internet in your pants.


    *Size matters*


    There’s one other major area where the iPhone differs from the desktop: The resources
    available are much more limited. Table 4-1 compares the device sitting on your
    desk with the one in your pocket.


