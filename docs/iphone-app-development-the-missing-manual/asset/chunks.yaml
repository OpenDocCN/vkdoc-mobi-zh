- fmt: "# 代码类命名与冲突避免\n\n正如框架使用`*NS*`和`*UI*`（第33页）等前缀来避免冲突一样，你可以添加自己的前缀来使类名唯一。以下代码来自Iconfactory，因此它使用标准`*IF*`前缀。这隐式保证了该公司中不会再有其他类使用相同名称。\n\
    \n通过这种机制，Iconfactory可以在自己的项目中使用这些代码，你也可以在你的项目中使用。当然，命名空间会是更优雅的解决方案，但在实践中，这种君子协定运作得相当不错。\n\
    \n**提示：** 如果你发现自己遇到了类名冲突，务必查看Xcode的`Refactor`工具。它能够轻松地更改整个项目中类名（包括在NIB文件中）。你还可以用它来更改实例变量名称以及类的其他属性。要在Xcode中使用此功能，请在源代码编辑器中选择类名，然后选择`Edit`➝`Refactor`。\n\
    \n# 视图设置\n\n你可以通过两种方式创建任何对象：使用NIB文件，或者使用`*–init*`方法。对于视图类来说尤其如此。\n\n**174**\n\n\
    iPhone App开发：缺失手册\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**完善外观**\n\
    \n在这两种情况下，你很可能需要编写一些代码来将实例变量设置为有效状态。对于这个视图，默认会显示一个信息图标。你可以在`*–initWithFrame:*`和`*–awakeFromNib*`方法中执行此设置，但随着视图变得越来越复杂并添加更多实例变量，这种重复的代码将变得难以管理和同步。\n\
    \n解决方案是创建一个`*–setupView*`方法，可以在两个实例中调用：\n\n```\n- (void)setupView {\n    type\
    \ = IFInfoViewTypeInformation;\n    self.backgroundColor = [UIColor clearColor];\n\
    }\n\n- (id)initWithFrame:(CGRect)frame {\n    if (self = [super initWithFrame:frame])\
    \ {\n        [self setupView];\n    }\n    return self;\n}\n\n- (void)awakeFromNib\
    \ {\n    [self setupView];\n}\n```\n\n这确保了`backgroundColor`完全透明，并且无论视图是通过代码创建还是从NIB读取，都会设置默认类型。\n\
    \n# 在代码中绘制\n\n这个类的核心在于`*–drawRect:*`方法。每当`IFInfoView`需要更新并显示在屏幕上时，都会调用这个方法。\n\n\
    在大多数情况下，这种绘制是通过`UIView`父类中的`*–setNeedsDisplay*`方法触发的。例如，当`type`属性发生更改时，你希望看到一个新图标，因此将视图标记为需要显示：\n\
    \n```\n- (void)setType:(IFInfoViewType)newType {\n    if (newType != type) {\n\
    \        type = newType;\n        [self setNeedsDisplay];\n    }\n}\n```\n\n现在你知道了触发绘制的原因，是时候看看`*–drawRect:*`方法中的代码了。\n\
    \n第6章：专业手电筒应用\n\n**175**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**完善外观**\n\n**提示：** 在开始编写大量使用`*–drawRect:*`的自定义绘制代码之前，尝试使用基本的视图层次结构。这个类本可以实现为`UIImageView`，包含一个背景图像和两个子视图。子视图将使用`UILabel`绘制文本，并使用另一个`UIImageView`绘制图标。\n\
    \n# 颜色填充\n\n最基本的操作之一是标准颜色填充。首先，选择你想要填充的颜色：\n\n```\nUIColor *fillColor = nil;\n\
    if (self.type == IFInfoViewTypeAlert) {\n    fillColor = [UIColor colorWithRed:0.6f\
    \ green:0.0f blue:0.0f alpha:1.0f];\n} else {\n    fillColor = [UIColor colorWithRed:0.0f\
    \ green:0.0f blue:0.0f alpha:0.60f];\n}\n```\n\n如果信息类型是告警，则选择纯60%红色；否则选择不透明度为60%的黑色。选择好颜色后，必须调用其`*–set*`方法，以便在后续绘制操作中使用：\n\
    \n```\n[fillColor set];\n```\n\n剩下要做的就是填充正在绘制的矩形：`UIRectFill(rect);`\n\n# 渐变\n\
    \n现在，我们将从最简单的绘制操作之一过渡到最复杂的操作之一——你将在纯色之上绘制渐变。"
  raw: 'Just as frameworks use prefixes like *NS* and *UI* (page 33) to avoid collisions,
    you can add your own prefix to make your classes unique. This code comes from
    the Iconfactory, so it uses the standard *IF* prefix. There’s an implicit guarantee
    that no other classes from this company will use that name more than once.


    With this system, the Iconfactory can use the code in its own projects, and you
    can also use it in yours. Sure, namespaces would be a more elegant solution, but
    in practice, this gentleman’s agreement works rather wel .


    ***Tip:*** If you ever find yourself with a name conflict for classes, make sure
    to look at Xcode’s Refactor tool. It makes it easy to change the name of a class
    throughout the entire project (including in NIB files). You can also use it to
    change the names of instance variables and to change other aspects of your classes.
    To use this feature in Xcode, select the class’s name in the source code editor
    and choose Edit➝Refactor.


    *View setup*


    You can create any object in two ways: either by using a NIB file or by using
    an *–init* method. That’s especial y true with view classes.


    **174**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **refine the look**


    In both cases, you likely have some code to set instance variables to a valid
    state. In the case of this view, an information icon is displayed by default.
    You could perform this setup in the *–initWithFrame:* and *–awakeFromNib* methods,
    but as your views become more complex and you add instance variables, this duplicated
    code becomes difficult to manage and keep in sync.


    The solution is to create a *–setupView* method that can be called in both instances:


    **- (void)setupView {**


    type = IFInfoViewTypeInformation;


    self.backgroundColor = [UIColor clearColor];


    }


    - (id)initWithFrame:(CGRect)frame {


    if (self = [super initWithFrame:frame]) {


    **[self setupView];**


    }


    return self;


    }


    - (void)awakeFromNib {


    **[self setupView];**


    }


    This ensures that the *backgroundColor* is completely transparent and that the
    default type is set no matter whether the view is created via code or from being
    read from NIB.


    *Drawing in code*


    The heart and soul of this class is in the *–drawRect:* method. Whenever the *IFInfoView*
    needs to be updated and appear onscreen, this method is called.


    In most cases, this drawing is initiated using the *–setNeedsDisplay* method in
    the *UIView* parent class. For example, when the *type* property is changed, you
    want to see a new icon, so you mark the view as needing display:


    - (void)setType:(IFInfoViewType)newType {


    if (newType != type) {


    type = newType;


    **[self setNeedsDisplay];**


    }


    }


    Now that you know what brings about drawing, it’s time to look at the code in
    the


    *–drawRect:* method.


    Chapter 6: A Flashlight for Pros


    **175**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **refine the look**


    ***Tip:*** Before you start writing a bunch of custom drawing code with *–drawRect:,*
    try using a basic view hierarchy. This class could have been implemented as *UIImageView*
    with a background image and two subviews. The subviews would draw the text using
    a *UILabel* and the icon using another *UIImageView.*


    *Color filling*


    One of the most basic operations is a standard color fil . First you pick the
    color you want to fill with:


    UIColor *fillColor = nil;


    if (self.type == IFInfoViewTypeAlert) {


    fillColor = [UIColor colorWithRed:0.6f green:0.0f blue:0.0f alpha:1.0f];


    }


    else {


    fillColor = [UIColor colorWithRed:0.0f green:0.0f blue:0.0f alpha:0.60f];


    }


    If the information type is an alert, a solid 60% red is chosen; otherwise a black
    with 60% opacity is used. Once you’ve selected the color, you must call its *–set*
    method so that it will be used in subsequent drawing operations:


    [fillColor set];


    The only thing left to do is to fill the rectangle being drawn: UIRectFill(rect);


    *Gradients*


    It’s time to go from one of the simplest drawing operations to one of the most
    complex—you’re going to draw a gradient on top of that solid color.'
  trans: "\n# 代码类命名与冲突避免\n\n正如框架使用`*NS*`和`*UI*`（第 33 页）等前缀来避免冲突一样，你可以添加自己的前缀来使类名唯一。以下代码来自\
