    ***提示：*** 现在你已拥有工具，记得维护它们。苹果会定期更新 `Xcode`，因此你 Snow Leopard DVD 上的版本最终会过时。当重大更新发布时，苹果会发送电子邮件提醒你访问
    iPhone 开发中心进行升级，详情参见下一小节。


    ## 获取 iPhone SDK


