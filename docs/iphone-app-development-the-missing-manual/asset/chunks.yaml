  trans: '

    # 构建设置：发布与调试


    每个构建设置列表的顶部都有`Release`（发布）和`Debug`（调试）的下拉菜单。它们允许你根据构建的是用于调试的测试版本还是用于发布的版本，来定义不同的设置。


    一个很好的例子说明为何需要构建单独的调试版本：当你处理调试符号和优化级别时。调试时，如果可执行文件中包含有助于定位问题的符号，工作会轻松得多。同样，优化的代码在尝试复现问题时很难单步执行。


    发布版本则相反：你需要*移除*符号，以便可执行文件在闪存中占用更少的空间，加载速度更快。同时，你也希望利用编译器能够提供的任何速度和大小优化。


    ## 超越模板


    ### 幕后揭秘


    **休斯顿，我们点火了**


    `Info.plist` 显然是启动过程的核心。如果你是那种喜欢极致细节的开发者，以下是让 Flashlight Pro 应用启动的完整步骤序列：


    1. 用户点击你的应用图标。

    2. Springboard 读取 `Info.plist`，并通过 `CFBundleExecutable` 属性找到编译后的应用。这个可执行文件会像 Unix
    中的其他进程一样被启动。

    3. 应用包含一个带有标准 `argc` 和 `argv` 列表的 `main` 函数。在 Other Sources 组中，`main.m` 文件展示了这个在进程启动期间被调用的入口点。

    4. 当 `main()` 被调用时，会创建一个用于管理内存的自动释放池，并调用 `UIApplicationMain()` 函数。

    5. `UIApplicationMain` 创建 `UIApplication` 类的单一对象实例。它还读取 `Info.plist` 中的 `NSMainNibFile`
    属性。对于大多数应用，此属性为 `MainWindow`，并指定了要加载的 NIB 文件。

    6. 当 `MainWindow.xib` 加载时，File''s Owner 被设置为 `UIApplication` 实例。NIB 中的其他对象，包括
    `Flashlight_ProAppDelegate` 和 `UIWindow`，也会被加载并建立连接。

    7. 加载的对象图包含一个指向 `Flashlight_ProAppDelegate` 中 window 的 outlet。File''s Owner 中
    `UIApplication` 实例的委托也指向 `Flashlight_ProAppDelegate`。

    8. 当 `UIApplication` 完成启动时，它会向委托发送 `applicationDidFinishLaunching:` 消息。作为委托，会使用
    `Flashlight_ProAppDelegate` 中的该方法。

    9. `applicationDidFinishLaunching:` 方法创建一个 `MainViewController` 实例，并将其分配给委托的实例变量。当控制器被实例化时，会以
    `MainView.xib` 作为参数调用 `initWithNibName:bundle:` 方法。这会加载并连接另一个对象图。`initWithNibName:bundle:`
    的实现还会设置模型和配置通知。

    10. 应用委托完全实例化主控制器后，发送 `view` 消息。这会导致懒加载的视图从 NIB 文件中被读取。之后，向主控制器发送 `viewDidLoad`
    消息。

    11. 由控制器创建的视图随后被传回给应用委托。使用来自 `MainWindow` NIB 的 `UIWindow` 实例，此视图被添加为该 window
    的子视图。为了使 window 及其视图可见，会发送 `makeKeyAndVisible` 消息。

    12. 由于主控制器的视图现在即将被显示在屏幕上，控制器首先调用 `viewWillAppear:` 方法。视图显示后，调用 `viewDidAppear:`
    方法。由于主控制器重写了第二个方法，此时用户会看到他偏好的手电筒颜色被显示出来。

    13. 从此刻起，用户操作及其产生的事件驱动着应用运行。你已进入轨道。


    难道你不庆幸 Cocoa Touch 如此出色，无需自己手动完成所有这些步骤吗？它确实让启动航天飞机看起来很容易！在下一章（第 157 页），你将看到一种更人性化的启动序列处理方法。


    ### 实践中的配置


    要查看这两种配置的区别，请使用 `Project` ➝ `Edit Active Target` 打开 Flashlight Pro 的目标构建设置。然后点击
    `Build` 标签，并将 `Configuration` 菜单设置为 `Debug`。


    在搜索框中输入 `optimization`，你会看到优化级别被设置为 `None`。如果你将配置更改为 `Release`，你会看到相同的设置变成了 `Fastest,
    Smallest`。当你搜索 `strip debug` 并在两种配置之间切换时，你会看到只有 `Release` 版本中才会剥离符号。这正是你想要的。


    ## 双重性


    当你理解了设置和配置后，你会开始思考为什么会有两套：一套用于项目，另一套用于目标。许多开发者会感到困惑，因为两个窗口都提供了几乎完全相同的大量选项列表。要决定选择哪一个，你需要理解构建设置的层级结构。


    层级结构的最底层是 Xcode。它对列表中的所有设置都有内置的默认值。例如，如果你不另行告知 Xcode，编译器的优化级别会被设置为 `Fastest, Smallest`。


    在 Xcode 的默认值之上，是项目的构建设置。你在此处更改的任何设置都会反映在该项目构建的所有目标中。将项目的设置用于那些你希望在所有目标中保持一致的事项。此层级的一个设置好例子是优化：你希望所有目标的
    `Debug` 配置都没有优化，而不是使用 Xcode 的默认值。


    目标的构建设置位于层级结构的顶层。如果你更改了目标中的某个设置，它会覆盖项目中的任何设置。除非设置明确与你正在构建的产品相关，否则请克制住将其放在此处的冲动。


    当你开始一个项目时，只有一个目标，因此很容易忽略这个层级结构，随意分配设置。但随着项目的发展，你会添加越来越多的目标。例如，当需要构建测试版时，你可能会添加一个新目标；当需要将最终版本上传到
    App Store 时，又会添加另一个。


    如果你在目标中放置了大量设置，那么更改设置就会很麻烦。假设你有三个目标，并且决定需要调整发布版本的优化级别。在项目构建设置中更改一次优化级别，远比在每个目标中分别更改三次要容易得多。


    ***注意：*** 调整构建设置时，请注意那些以粗体显示的设置。这是 Xcode 突出显示那些覆盖了子级（译者注：此处指子层级）值的设置的方式。例如，如果你在目标构建设置中看到
    "Optimization level" 被高亮，你就知道它覆盖了项目中的值。


    `Show` 菜单是查看所有覆盖项设置的另一个好方法。选择 "Settings Defined at This Level"（此层级定义的设置）即可获得列表。（该列表会根据搜索字段的当前值进行过滤。）


    ## 付诸实践


    到目前为止，你只能通过模拟器运行代码。本书的全部意义在于为你的 iPhone 开发应用，而不是在你的 Mac 上运行一个巨大的仿制品。为什么你不能看到应用在掌中运行呢？

