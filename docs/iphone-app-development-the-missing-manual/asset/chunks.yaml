    ## Chapter: Building Your First iPhone App


    You have an idea that will lead to fame and fortune on the iTunes App Store.


    You decide to write an iPhone app. The first and most important task is for you
    to become comfortable with the tools used to build your products. A Chinese proverb
    says, "the journey is the reward," and this chapter is all about the journey.
    In the upcoming pages, you''ll experience the entire application development process,
    start to finish. You''ll learn how to set up the software you need, and try your
    hand at building an app.


    But what app? If you do a quick search of the App Store, you''ll find no shortage
    of flashlights. For many aspiring developers, this simple application is a rite
    of passage, so now''s your chance to join this illustrious crowd. Once you see
    how easy it is to create your own app, you''ll wonder why people pay 99¢ for them
    on iTunes!


    ## Getting the Tools


    You can''t build anything, including an iPhone app, without tools. Luckily, you
    can find everything you need on your Mac, or download it for free. Specifically,
    you need to download and install `Xcode` development software and the iPhone Software
    Development Kit (SDK) on your Mac. (And if you don''t have a Mac, see the box
    on the next page.)


    Both the Mac and iPhone benefit from a rich set of technologies that have stood
    the test of time. The iPhone SDK is built upon the infrastructure created by NeXT
    in the 1980s. This company, founded by Steve Jobs, created a revolutionary object-oriented
    operating system called `NeXTSTEP`. This influential system has evolved into the
    OS X operating system in use today. As you learn more about the iPhone, you''ll
    see that it has much in common with the Mac.


    **9**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### Getting the Tools


    ***Note:*** You see the NeXT legacy whenever you encounter an object with the
    prefix "NS". Those initials stand for `NeXTSTEP`.


    **UP TO Speed**


    **Get a Mac**


    If you''re going to create iPhone applications, you''re going to do it on a Macintosh.
    Apple''s development tools don''t run on Windows or any other operating system.
    Just as you can''t run Microsoft Visual Studio on a Mac, you need a Mac to run
    the tools used to build your iPhone app. They rely on features of the underlying
    system software.


    If you don''t have a Mac, here are some hints to help you make the right purchase:


    - **Buy a used machine.** If you''re on a shoestring budget, check out `eBay`
    or `craigslist`. Someone else''s old hardware will be perfectly fine for iPhone
    development. The apps you''re going to create are small and don''t need a lot
    of processor power to build and test. The only caveat when buying older hardware
    is to make sure the Mac has an Intel processor. The development tools don''t work
    with older PowerPC processors.


    - **Add a Mac mini.** Buying a new Mac mini is a great option. It''s handy to
    put the Mac mini behind a KVM switch so you can quickly shift between machines.


    - **Go ahead and splurge.** Apple makes some very sexy hardware. In particular,
    the new laptops are hard to resist. If you''re looking for excuses to justify
    the purchase, here''s some help: Macs now use an Intel processor, which means
    you can run Windows or any other x86-based operating system on your new machine.
    You can boot into any operating system using Apple''s free Boot Camp utility.
    Or you may find it easier to install third-party software like `VMware Fusion`
    and to run other operating systems on a virtual machine within Mac OS X. Virtual
    machines are particularly handy when you need to see how your iPhone product website
    appears in Internet Explorer. Just launch the virtual machine, open the browser
    in Windows, and load the test URL.'
