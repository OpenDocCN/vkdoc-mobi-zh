- fmt: "# Creating a Great iPhone App\n\nCreating a great iPhone app is often a group\
    \ effort. Whether you’re a developer, designer, marketer, or project manager,\
    \ you’ll find topics that get you up to speed on this new and exciting platform.\
    \ And when there’s more to learn, expert advice will point you in the right direction\
    \ to fill in the details.\n\n## The App Store\n\nSince the iTunes App Store’s\
    \ launch in July 2008, over 100,000 iPhone applications have been submitted to\
    \ the store. Customers have downloaded over 3 billion applications that were created\
    \ by developers just like you. The success of this endeavor has exceeded everyone’s\
    \ wildest expectations.\n\n1\n\n![Image 4](index-20_1.jpg)\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Introduction\n\nBefore the App Store was launched, iPhone app development\
    \ was limited to the talented engineers at Apple’s headquarters in Cupertino,\
    \ California. But in just a couple of years, thousands of developers worldwide\
    \ have discovered how easy and fun it is to write software for the iPhone. And\
    \ by keeping 70 cents of every dollar spent on their app in iTunes, some developers\
    \ have found these apps to be very profitable.\n\nThese early adopters also learned\
    \ something the hard way: This new and innovative computing device that you carry\
    \ around in your pocket comes with a different set of rules. A multitouch display\
    \ with ubiquitous networking in a small form presents many challenges.\n\nThe\
    \ difficulties are not limited to technology, either. How you design, build, and\
    \ distribute your apps requires a new way of thinking. Many developers have struggled\
    \ with their initiation into a consumer mass market.\n\nAs you walk through the\
    \ iPhone app development process from start to finish, you’ll learn from those\
    \ who preceded you. You’ll avoid the pitfalls of some, while learning from the\
    \ success of others. The goal, of course, is to help you make the best application\
    \ possible.\n\n**Figure 1-1:**  \n*What better way to learn iPhone app development\
    \ than to watch an experienced developer build a product with step-by-step instruction?\
    \ In this book, you’ll see the Safety Light (A) app come to life and go on sale\
    \ in the iTunes App Store.*\n\nA\n\n2\n\niPhone App Development: The Missing Manual\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## Introduction\n\n### About\
    \ This Book\n\nDespite the many improvements in software over the years, one feature\
    \ has grown consistently worse—documentation. With the purchase of most software\
    \ programs these days, you don’t get a single page of printed instructions. To\
    \ learn about the hundreds of features in a program, you’re expected to use online\
    \ electronic help.\n\nBut even if you’re comfortable reading a help screen in\
    \ one window as you try to work in another, something is still missing. At times,\
    \ the terse electronic help screens assume you already understand the discussion\
    \ at hand, and hurriedly skip over important topics that require an in-depth presentation.\
    \ In addition, you don’t always get an objective evaluation of the program’s features.\
    \ (Your fellow engineers often add technically sophisticated features to a program\
    \ because they *can,* not because you need them.) You shouldn’t have to waste\
    \ your time learning features that don’t help you get your work done.\n\nIn this\
    \ book’s pages, you’ll find step-by-step instructions for developing iPhone applications.\
    \ In addition, you’ll find that “big picture” topics such as design, sales, and\
    \ marketing are covered. The goal is to make you an effective and successful developer,\
    \ not just to teach you how to write the code.\n\n**Note:** This book periodically\
    \ recommends *other* books, covering topics that are too specialized or tangential\
    \ for a manual about iPhone development. Careful readers may notice that not every\
    \ one of these titles is published by Missing Manual–parent, O’Reilly Media. While\
    \ we’re happy to mention other Missing Manuals and books in the O’Reilly family,\
    \ if a great book out there doesn’t happen to be published by O’Reilly, we’ll\
    \ still let you know about it."
  raw: 'Creating a great iPhone app is often a group effort. Whether you’re a developer,
    designer, marketer, or project manager, you’ll find topics that get you up to
    speed on this new and exciting platform. And when there’s more to learn, expert
    advice will point you in the right direction to fill in the details.


    **The App Store**


    Since the iTunes App Store’s launch in July 2008, over 100,000 iPhone applications
    have been submitted to the store. Customers have downloaded over 3 billion applications
    that were created by developers just like you. The success of this endeavor has
    exceeded everyone’s wildest expectations.


    **1**


    ![Image 4](index-20_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Introduction**


    Before the App Store was launched, iPhone app development was limited to the talented
    engineers at Apple’s headquarters in Cupertino, California. But in just a couple
    of years, thousands of developers worldwide have discovered how easy and fun it
    is to write software for the iPhone. And by keeping 70 cents of every dol ar spent
    on their app in iTunes, some developers have found these apps to be very profitable.


    These early adopters also learned something the hard way: This new and innovative
    computing device that you carry around in your pocket comes with a different set
    of rules. A multitouch display with ubiquitous networking in a small form presents
    many challenges.


    The difficulties are not limited to technology, either. How you design, build,
    and distribute your apps requires a new way of thinking. Many developers have
    struggled with their initiation into a consumer mass market.


    As you walk through the iPhone app development process from start to finish, you’ll
    learn from those who preceded you. You’ll avoid the pitfal s of some, while learning
    from the success of others. The goal, of course, is to help you make the best
    application possible.


    ***Figure 1-1:***


    *What better way to learn iPhone app development than to watch an* *experienced
    developer build a product with step-by-step instruction? In this* *book, you’ll
    see the Safety Light (A) app come to life and go on sale in the* *iTunes App Store.*


    A


    **2**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Introduction**


    **About This Book**


    Despite the many improvements in software over the years, one feature has grown
    consistently worse—documentation. With the purchase of most software programs
    these days, you don’t get a single page of printed instructions. To learn about
    the hundreds of features in a program, you’re expected to use online electronic
    help.


    But even if you’re comfortable reading a help screen in one window as you try
    to work in another, something is still missing. At times, the terse electronic
    help screens assume you already understand the discussion at hand, and hurriedly
    skip over important topics that require an in-depth presentation. In addition,
    you don’t always get an objective evaluation of the program’s features. (Your
    fellow engineers often add technical y sophisticated features to a program because
    they *can,* not because you need them.) You shouldn’t have to waste your time
    learning features that don’t help you get your work done.


    In this book’s pages, you’ll find step-by-step instructions for developing iPhone
    applications. In addition, you’ll find that “big picture” topics such as design,
    sales, and marketing are covered. The goal is to make you an effective and successful
    developer, not just to teach you how to write the code.


    ***Note:*** This book periodically recommends *other* books, covering topics that
    are too specialized or tan-gential for a manual about iPhone development. Careful
    readers may notice that not every one of these titles is published by Missing
    Manual–parent, O’Reilly Media. While we’re happy to mention other Missing Manuals
    and books in the O’Reilly family, if a great book out there doesn’t happen to
    be published by O’Reilly, we’ll still let you know about it.'
  trans: "\n# 打造一款出色的 iPhone 应用\n\n打造一款出色的 iPhone 应用常常需要团队协作。无论你是开发者、设计师、营销人员还是项目经理，都能找到让你快速上手这个崭新且激动人心的平台的相关主题。当需要深入学习时，专家建议会为你指明方向，助你掌握细节。\n\
    \n## App Store\n\n自 2008 年 7 月 iTunes App Store 上线以来，已有超过 10 万个 iPhone 应用提交至该商店。用户下载量超过\
    \ 30 亿次，这些应用都是由像你一样的开发者创造的。这一事业的成功，远超所有人的最大预期。\n\n1\n\n![图片 4](img/index-20_1.jpg)\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 引言\n\n在 App Store 推出之前，iPhone\
    \ 应用开发仅限于苹果公司位于加州库比蒂诺总部的天才工程师们。但仅仅几年时间，全球成千上万的开发者就发现为 iPhone 编写软件既简单又有趣。此外，通过保留用户在\
    \ iTunes 中为应用支付的每一美元的 70 美分，一些开发者发现这些应用利润丰厚。\n\n这些早期采用者也通过艰难的方式领悟到一点：你口袋里随身携带的这款新颖创新的计算设备，遵循着一套不同的规则。小巧的机身中集成了多点触控显示屏和无处不在的网络，这带来了诸多挑战。\n\
    \n困难并非只限于技术层面。如何设计、构建和分发你的应用，也需要一套新的思维方式。许多开发者在初次涉足大众消费市场时都曾苦苦挣扎。\n\n当你从头到尾走一遍\
    \ iPhone 应用开发流程时，你将从前人身上学习。你将避免一些人犯过的错误，同时借鉴其他人的成功经验。当然，目标是帮助你做出尽可能最好的应用。\n\n\
    **图 1-1：**  \n*还有什么比观看经验丰富的开发者通过分步指导构建产品，更能学习 iPhone 应用开发呢？在本书中，你将见证 Safety Light（A）应用从诞生到在\
    \ iTunes App Store 上架销售的全过程。*\n\nA\n\n2\n\niPhone 应用开发：缺失手册\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 引言\n\n### 关于本书\n\n尽管多年来软件有了许多改进，但有一个功能却一直变得更差——文档。如今购买大多数软件程序时，你连一页印刷说明书都得不到。要了解一个程序中数百个功能，你得依赖在线电子帮助。\n\
    \n但即使你习惯在一个窗口中阅读帮助屏幕，同时尝试在另一个窗口中工作，仍然缺少些什么。有时，简洁的电子帮助屏幕假设你已经理解了当前讨论的内容，匆匆跳过需要深入讲解的重要主题。此外，你并非总能获得对程序功能的客观评价。（你的工程师同事常常会在程序中加入技术复杂的特性，是因为他们*能*做到，而不是因为你需要它们。）你不该浪费时间学习那些无助于完成工作的功能。\n\
    \n在本页中，你将找到开发 iPhone 应用的分步指导。此外，你还将发现诸如设计、销售和营销等“宏观”主题也有涵盖。目标是让你成为一名高效且成功的开发者，而不仅仅是教你如何编写代码。\n\
    \n**注：** 本书会定期推荐*其他*书籍，涵盖那些对于 iPhone 开发手册来说过于专业或旁支的主题。细心的读者可能会注意到，并非所有推荐书目都由《缺失手册》的母公司奥莱利传媒出版。虽然我们乐于提及《缺失手册》系列及奥莱利家族的其他书籍，但如果外社有一本好书，我们同样会告知你。\n"
- fmt: '*iPhone App Development: The Missing Manual* is designed to accommodate readers
    at different technical levels. The primary discussions are written for computer
    users with some programming knowledge. But if you’re a first-timer, special side-bar
    articles called “Up to Speed” provide the introductory information you need to
    understand the topic at hand. If you’re an advanced user, on the other hand, keep
    your eye out for similar shaded boxes called “Power Users’ Clinic.” They offer
    more technical tips, tricks, and shortcuts for the experienced developer.


    ## About the Outline


    *iPhone App Development: The Missing Manual* is divided into four parts, most
    containing several chapters:


    - **Part 1: Getting Started with Cocoa Touch.** In the first four chapters, you’ll
    build your first iPhone App and get acquainted with your basic tools: Cocoa Touch,
    Interface Builder, `Xcode`, and the Objective-C programming language. You’ll also
    start thinking about how to use these tools to design a new application.


    ## Introduction


    **3**


    Download from Wow! eBook


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    - **Part 2: Development in Depth.** In the next three chapters, you’ll learn how
    to set up your iPhone development environment, including getting your app onto
    a phone for the first time. You’ll also take a guided tour through the code of
    the finished app and learn how to test the final product.


    - **Part 3: The Business End.** The final two chapters explore the business of
    being an iPhone developer. You’ll learn how to get your app onto iTunes, promote
    it through various marketing channels, and how to keep track of your sales. A
    survey of the iPhone app market will help you understand where your app fits in.


    - **Part 4: Appendix.** The appendix introduces you to the vast array of resources
    for learning more about all of the topics covered in this book.


    At the Missing Manual website, you’ll find free, downloadable bonus material.
    In addition to the project and source code for the Safety Light iPhone application,
    you’ll find a promotional website template that you can use for your products.


    ## The Very Basics


    This book contains very little jargon or nerd terminology. You will, however,
    encounter a few terms and concepts that you’ll come across frequently in your
    computing life:


    - **Clicking.** This book gives you three kinds of instructions that require you
    to use your computer’s mouse or trackpad. To *click* means to point the arrow
    cursor at something on the screen and then—without moving the cursor at all—to
    press and release the left clicker button on the mouse (or laptop trackpad). To
    *double-click,* of course, means to click twice in rapid succession, again without
    moving the cursor at all. And to *drag* means to move the cursor while pressing
    the left button continuously.


    - **Keyboard shortcuts.** Every time you take your hand off the keyboard to move
    the mouse, you lose time and potentially disrupt your creative flow. That’s why
    many experienced developers use keystroke combinations instead of menu commands
    wherever possible. `⌘-B`, for example, is a keyboard shortcut to build your application
    in `Xcode`.


    When you see a shortcut like `⌘-S` (which saves changes to the current document),
    it’s telling you to hold down the `⌘` key, and, while it’s down, to press the
    letter `S` key, and then release both keys.


    - **Choice is good.** `Xcode` and `Interface Builder` frequently give you several
    ways to trigger a particular command—by choosing a menu command, *or* by clicking
    a toolbar button, *or* by pressing a key combination, for example. Some people
    prefer the speed of keyboard shortcuts; others like the satisfaction of a visual
    command array available in menus or toolbars. This book lists all of the alternatives,
    but by no means are you expected to memorize all of them.


