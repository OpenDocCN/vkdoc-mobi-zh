    promotional codes.**


    Each line of the file contains a 12-character code that can be redeemed on iTunes.


    **5\. Click Done to return to the main iTunes Connect screen.**


    Send these promotional codes out to the media, and give them time to write up
    their impressions. Each reviewer only needs one code, and they all probably already
    know how to use it. If not, explain that Redeem links are at the bottom of iTunes’
    App Store page on the desktop and at the bottom of the Featured tab in the device’s
    App Store app. The codes work just like Apple’s gift cards, except they don’t
    cost a dime.


    Bloggers and journalists also want to know your availability date so they can
    schedule their review appropriately. Give them access to a press kit that contains
    materials they’ll need for an article: It should contain a press release, a high-resolution
    application icon, the screenshots you submitted to Apple, and any other marketing
    materials you may have.


    When dealing with writers, remember that they’re probably on a deadline. Make
    yourself available for any and all questions or problems they might have. Momentum
    is very important in the early days of a release: Do whatever you can to help
    these writers to get the word out about your new product.


    Launch Day


    All the pieces are now in place, and your release date is approaching. As you
    saw above when you set the Availability Date, the time that your release goes
    live is sooner than you probably think. Make sure your website is in working order,
    and wait for the buzz to start.


    Keep an eye on your website logs, too. You’ll be able to find people talking about
    your product on Twitter, Facebook, and other social networks. Hopeful y, blogs
    and other online media will start linking to your site. Keep an eye out for sites
    you haven’t heard of, and get in contact with them to say thanks and offer any
    assistance they might need.


    ***Tip:*** Now is a good time to check out how your page looks on various iTunes
    stores worldwide. At the bottom of the main App Store page in iTunes, you’ll see
    a small flag icon. After clicking the flag, you can switch to any store and then
    navigate to your product page.


    It’s going to be a long day, but rewarding beyond words.


