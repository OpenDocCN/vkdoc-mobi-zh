  trans: "\n你可以通过以下命令轻松进入你的偏好设置文件夹：\n\n```\nbase=~/Library/Application\\ Support/\n\
    iPhone\\ Simulator/\n$ opensim ″Safety Light″ Preferences\napps=Applications\n\
    ```\n\n如果你双击文件夹中显示的 `com.iconfactory.SafetyLight.plist` 文件，就会显示手电筒的当前设置。\n\n```\n\
    app=`ls -1td ″$base/″*″/$apps/″*″/$1.\nif [ -n ″$app″ ]; then\n```\n\n**注意：**\
    \ `opensim` 脚本的副本位于 Flashlight Pro 项目的顶层目录中，因此你无需手动输入。\n\n```\ndir=`dirname ″$app″`\n\
    if [ ″$2″ = ″Preferences″ ]; then\n```\n\n### 通知\n\n任何对象都可以注册接收通知，但控制器是最常使用它们的。控制器通常具备必要的逻辑，用于响应设备、模型或应用程序其他部分的状态变化。\n\
    \n第 6 章：专业人士的手电筒  \n**195**  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### 自我整合\n\n主视图控制器会注册自己，以接收来自 `UIApplication` 和 `SOSModel` 的通知：\n\n```\n- (NSObject\
    \ *)initWithNibName:(NSString *)nibNameOrNil bundle:(NSBundle *)nibBundleOrNil\
    \ {\n. . .\n[[NSNotificationCenter defaultCenter] addObserver:self\nselector:@selector(elementChanged:)\
    \ name:SOSModelElementChangedNotification object:nil];\n[[NSNotificationCenter\
    \ defaultCenter] addObserver:self\nselector:@selector(resignActive:) name:\nUIApplicationWillResignActiveNotification\
    \ object:nil];\n[[NSNotificationCenter defaultCenter] addObserver:self\nselector:@selector(becomeActive:)\
    \ name:\nUIApplicationDidBecomeActiveNotification object:nil];\n. . .\n}\n```\n\
    \n同样重要的是，当视图控制器对象被释放时，它会将自己移除为观察者：\n\n```\n[[NSNotificationCenter defaultCenter]\
    \ removeObserver:self\nname:SOSModelElementChangedNotification object:nil]\n[[NSNotificationCenter\
    \ defaultCenter] removeObserver:self\nname:UIApplicationWillResignActiveNotification\
    \ object:nil];\n[[NSNotificationCenter defaultCenter] removeObserver:self\nname:UIApplicationDidBecomeActiveNotification\
    \ object:nil];\n```\n\n当你使用设备上的锁定开关时，控制器中的 `–resignActive:` 和 `–becomeActive`\
    \ 方法会被调用。这些方法会启动或停止闪光灯或迪斯科灯光。这是一个简单但很好的例子，说明了设备状态的变化如何导致应用程序状态的变化。\n\n由 `SOSModel`\
    \ 定义的通知会在模型状态每次变化时发送 `–elementChanged` 消息。此方法随后会打开或关闭灯光视图——这是一个如何将新数据传播到视图的例子。\n\
    \n### 声音\n\n`–elementChanged` 方法还会播放点或划的蜂鸣声：\n\n```\nif (sosDotBeep != 0 && sosDashBeep\
    \ != 0) {\nif (element == SOSModelElementDot) {\nAudioServicesPlaySystemSound(sosDotBeep);\n\
    }\nelse {\nAudioServicesPlaySystemSound(sosDashBeep);\n}\n}\n```\n\n**196**  \n\
    iPhone 应用开发：缺失的手册  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 自我整合\n\
    \n***提示：*** 如果你希望在播放声音时伴随振动，请使用 `AudioServicesPlayAlertSound()` 函数。\n\n`sosDotBeep`\
    \ 和 `sosDashBeep` 声音的来源如下：当使用 `–startSOS` 方法启动闪光灯时，这些声音会通过以下代码加载到内存中：\n\n```\n\
    OSStatus result;\nNSString *dotPath = [[NSBundle mainBundle] pathForResource:@″Dot″\n\
    ofType:@″aif″];\nresult = AudioServicesCreateSystemSoundID((CFURLRef)[NSURL\n\
    fileURLWithPath:dotPath], &sosDotBeep);\nif (result != kAudioServicesNoError)\n\
    {\nsosDotBeep = 0;\n}\n```\n\n首先，声音文件位于应用程序的 bundle 中。*Bundle* 是应用程序的代码和资源的集合。Xcode\
    \ 中 Resources 组中的所有文件都会被移动到主 bundle 中。\n\n要从 bundle 中提取其中一个文件，你需要使用资源名称（`@\"Dot\"\
    `）和类型（`@\"aif\"`）来指定文件。生成的 `dotPath` 变量随后会被转换为文件 URL 并传递给 `AudioServicesCreateSystemSoundID()`\
    \ API。\n\n如果调用成功，`sosDotBeep` 变量便可用于播放声音。\n"
- fmt: '***Note:*** Some resources, notably images, have their own mechanism for being
    read from the bundle. To extract an image, you’d use `[UIImage imageNamed:@"xyz.png"]`.


    Since the sounds use a fair amount of memory, they should be loaded only when
    needed. If you need a sound for only a short period, you may want to use `AudioServicesDisposeSystemSoundID()`
    to free its storage.


    The standard Xcode templates aren’t able to access these sounds APIs; you need
    to add a new framework before you can compile the code above. If you open the
    Frameworks group in Xcode, you see that the `AudioToolbox.framework` has been
    added.


    ## Being a delegate


    The `LightView` class defined a protocol for a delegate. The light view uses the
    delegate to pass on information about taps within the view. This controller uses
    the delegate methods to change the brightness and lock the view. Its first step
    to becoming a delegate is to adopt the protocol in the interface:


    ```

    @interface MainViewController : UIViewController < LightViewDelegate, UIAlertViewDelegate,
    UIActionSheetDelegate>

    ```


    The `LightView` in `MainView.xib` has an outlet that’s connected to the `MainViewController`,
    so the view knows who will be acting as the delegate. All that’s left to do is
    to implement the `–lightView:singleTapAtPoint:` and `–lightView:doubleTapAtPoint:`
    methods.


    The delegate for the single tap checks to see if the SOS signal is running using
    one of the controller’s state variables. It also checks whether the toolbar is
    concealed because the display is locked. If either of these conditions is met,
    the tap is ignored.


    After determining the current brightness level, a new brightness is chosen, and
    the state change is displayed in the info view using localized strings.


    A double tap also checks if the SOS signal is running and will ignore the tap
    if it is. Otherwise, the state of the toolbar’s concealment is toggled, and the
    info view is updated.


    ### One view, two identities


    Careful observation will show that the `LightView` object is connected to two
    outlets in `MainView.xib`. There’s only one instance of `LightView`, but it’s
    used for both the `infoView` and view properties. Wouldn’t one instance variable
    be enough?


    Yes and no.


    If you use just one instance variable, you have to use the view that’s required
    by the `UIViewController`. And if you use just that variable, you find that it
    being defined as a `UIView` base class creates a lot of extra effort. If you try
    to use this code, you get a compiler error:


    ```

    self.view.state = LightViewStateOn;

    ```


    So you’d be forced to write this code to make the compiler happy: `((LightView
    *)self.view).state = LightViewStateOn;`


    Besides going against your lazy tendencies, that code is just plain ugly! If you
    define a second outlet for the object with the correct type, you can do this:
    `self.lightView.state = LightViewStateOn;`


    The only real cost for this code is to make sure that you release the instance
    in your `–viewDidUnload` and `–dealloc` methods. No additional memory is used,
    and your code is much more readable.


    ### Alert views


    When you were looking at the protocols adopted by the main view controller, you
    might have noticed that it also adopted the `UIAlertViewDelegate` protocol. Meet
    your first alert view. The first time you start the flasher, a warning is displayed
    that flashing lights can cause seizures. The goal of this app is to make people’s
    lives a bit safer, not put them in danger!


    Alert views are common in iPhone apps for situations like these. If an error occurs
    or an important choice must be made, it’s a great interaction mechanism. Don’t
    use them as status indicators, though—folks get annoyed with too many onscreen
    alerts popping up.'
