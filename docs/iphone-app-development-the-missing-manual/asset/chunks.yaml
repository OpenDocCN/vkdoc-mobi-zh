  raw: 'Why use two classes when they could have just implemented one? For the same
    reason that constant values in other code are a good thing: You know that the
    data is never going to change as it’s processed. You can make assumptions that
    you wouldn’t have otherwise made.


    ***Note:*** If you’ve ever had an array’s size change as you’re iterating over
    its elements, you know the pain of the bugs that these bad assumptions can incur.


    Chapter 3: Cocoa Touch: Putting Objective-C to Work


    **75**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Mutable Versus**


    **Immutable**


    When you’re building your own classes, you’ll often have to choose which of these
    two variants to use for your instance variables. A good rule of thumb is to use
    an immutable object like *NSString* or *NSNumber* when the value is replaced entirely.


    When you were making awesome strings, there would have been no point in using
    an *NSMutableString* since the *–setOriginalString:* method updated the whole
    string rather than making changes to individual characters.


    Collections, on the other hand, are often updated incremental y. It’s common to
    add or remove items from an array, so you’d want to use *NSMutableArray* and gain
    the


    *–insertObject:atIndex:* and *–removeObjectAtIndex:* methods.


    Make It Mutable


    What do you do when you have an immutable object and you need a mutable one?


    You’ll find that a lot of methods in the foundation classes return immutable objects
    as results. These system classes assume that you’re probably not going to want
    to modify the results. And for the most part, this is true. But as a developer,
    you know that it’s the special cases that cause the most headaches!


    Here’s a simple example of a method that returns immutable data—the *NSString*
    method that splits a string using a separator:


    - (NSArray *)componentsSeparatedByString:(NSString *)separator; If you’re parsing
    a comma-separated string to just loop through the values, an immutable copy works
    just great:


    NSString *oneHand = @″Thumb,Index,Middle,Ring,Little″;


    NSArray *fingers = [oneHand componentsSeparatedByString:@″,″]; for (NSString *finger
    in fingers) {


    NSLog(@″The finger is %@″, finger);


    }


    But what if you want to modify the fingers? This is one of those rare and important
    cases where you need a mutable copy. Everyone knows the last finger is called
    the


    “Pinkie”.


    Luckily, it’s an easy fix using the *–mutableCopy* method that’s defined by *NSObject*:
    NSString *oneHand = @″Thumb,Index,Middle,Ring,Little″;


    NSArray *fingers = [oneHand componentsSeparatedByString:@″,″]; **NSMutableArray
    *mutableFingers = [fingers mutableCopy];**


    **[mutableFingers removeLastObject]; // OUCH THAT HURT!!!!**


    **[mutableFingers addObject:@″Pinkie″]; // IT′S A MIRACLE OF MODERN SCIENCE**


    **for (NSString *finger in mutableFingers) {**


    NSLog(@″The finger is %@″, finger);


    }


    It’s important to note that you can’t make a mutable copy of just any object.
    The class you’re copying needs to support the *NSMutableCopying* protocol. If
    the class definition doesn’t include *<NSMutableCopying>,* an exception will be
    raised when you try to make the copy.


    **76**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Mutable Versus**


    **Immutable**


    ***Note:*** *–mutableCopy* behaves like *–copy* when you’re dealing with collections.
    A shallow copy is performed.


    Luckily, all of the value objects and collections support the protocol. And when
    a class doesn’t support the protocol, it’s probably for good reason. What would
    it mean to have a mutable copy of a *UIView* or an *NSURLConnection*? You’d have
    too many dependencies for such an abstraction to be understandable.


    Protect Your Data


    It’s common to use mutable data in a method implementation. You have no idea how


    *–componentsSeparatedByString:* is implemented, but it’s likely that the array
    was built up as the parser moved from the beginning to the end of the string.
    So why return it as an immutable array?


    Cocoa Touch is preventing you from shooting yourself in the foot. Besides the
    fact that you probably don’t need the mutable copy, when you have two objects
    with a copy of the same data, someone is going to get hurt if one object changes
    the data without the knowledge of the other object.


    Imagine an array that’s shared between two objects that are adding and removing
    items. The first object computes the length of an array. Then another object removes
    the last object in the array. When the first object goes to access what it thinks
    is the last item, an exception occurs because the array index is out of bounds.
    It’s a hideous bug to track down, because each object appears to be doing the
    right thing. It’s far from obvious that the root of the problem is a shared collection.


    To return an immutable copy of a mutable instance, you rely on the fact that the
    mutable class is a subclass and that its superclass implements the *<NSCopying>*
    protocol. When you send a *–copy* message, you get back a nonmodifiable copy.


    Suppose the *mutableFingers* array you created above is an instance variable in
    a *MyHand* class. You’ve decided to keep the variable mutable so you can accommodate
    those ignorant people who insist on calling the last finger “Little.” When another
    object asks the instance for the finger names, you’d return them like this:


    @implementation MyHand


    . . .


    - (NSArray *)fingers {


    **NSArray *result = (NSArray *)[[mutableFingers copy] autorelease];** return result;


    }


    The resulting object won’t break your *mutableFingers.* Even if someone wants
    to call that last finger “Auricular” and stick it in his ear.


    Chapter 3: Cocoa Touch: Putting Objective-C to Work


    **77**


    ![Image 23](index-96_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **delegation and data**


    **Sources**


    **delegation and data Sources**


    Have you ever needed to perform a task and had no idea how to do it? Maybe it’s
    fixing a dishwasher or knitting a pair of socks. You can either learn to do it
    yourself, or find someone to help you with the parts you don’t understand.


    Cocoa Touch has a design pattern called *delegation* that lets your application
    help out system classes that don’t know what you want to do. The way it works
    is simple: You introduce one object to another object that’s able to answer any
    questions. By assigning a *delegate,* you provide hooks into code that can respond
    to requests and state changes.


    If your object is willing to be a delegate, it needs to follow a protocol. As
    you saw on page 36, the protocol is like a contract. Many of the methods in that
    contract will be optional, but others will be required.


    This pattern is used extensively throughout Cocoa. If you type *delegate* into
    the documentation viewer, you’ll get back over 100 results. You can tell which
    classes support delegation, because they have a *delegate* property. The actual
    protocols for delegation are usual y suffixed with *Delegate.*


    The best way to see what this looks like in practice is by checking out one of
    the classes that uses delegation: the *UIPickerView* control that selects values
    from a scrolling list (Figure 3-2).


    ***Figure 3-2:***


    *The standard picker view*


    *for Cocoa Touch. The*


    *values that are displayed*


    *come from a delegate and*


    *a data source.*


