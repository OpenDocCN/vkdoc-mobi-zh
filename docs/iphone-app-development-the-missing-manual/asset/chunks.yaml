- fmt: '***Note:*** The `Flashlight Pro` project has two beta targets. The first is
    named “`Safety Light (Beta)`” and it builds the application. The second is an
    aggregate target named “`Beta`” that builds the app using the first target, creates
    a ZIP file, and uploads the app to the download server.


    After your build is complete, make a Zip file of the application that you’re going
    to send to testers. Go to the target’s build folder, and you see something like
    Figure 7-3.


    ***Figure 7-3:*** After a build, your target’s folder has an application with
    a circle-backslash symbol and a `dSYM` file. Both the Mac and iPhone versions
    of OS X use an `Info.plist` file. Don’t worry—the symbol simply indicates that
    the Mac and iPhone have different processors. The file with a `.dSYM` extension
    contains debugging symbols. Compress the application file before sending it to
    beta testers.


    ***Tip:*** You can determine your target’s build folder by looking at the `Per-configuration
    Build Products Path`.


    The default values are `build/Debug-iphoneos` and `build/Release-iphoneos` for
    device builds. The `Flashlight Pro` project prepends “`Beta—`” and “`Final—`”
    to the folder names so your beta and final builds don’t get mixed up with your
    test builds.


    **Beta Testing**


    The quickest way to make the Zip file is to Control-click (or right-click) the
    app icon and to select Compress from the shortcut menu. Save this Zip file in
    a safe place, since you’ll be sending it to your beta testers. You may also want
    to rename the file with the same version number that you used in `Info.plist`,
    which will make it easier for you and your beta testers to track multiple releases.
    Something like `TiddlywinksPro-1.0b1.zip` works well.


    Remember that `.mobileprovision` file you saved a few pages back? Time to dig
    it up to send along with the application Zip file. Then attach both the `TiddlywinksPro-1.0b1.zip`
    and `Squidger_Beta_Distribution.mobileprovision` files to your email to beta testers.


    But before you send that email, you need to do one more test. You need to make
    sure that your testers will be able to install and run the software.


    **Install**


    Your beta testers probably won’t have Xcode and its Organizer window to install
    profiles and applications. And if you have a tester who’s running Windows, they
    certainly won’t be able to run this Mac application. So what’s the trick?


    Actually, there are two tricks. The first, and easiest, is to use iTunes!


    **iTunes.** The first thing your beta testers need to do after receiving your
    beta software is to decompress the Zip file. Just double-click the file in the
    Finder, and the app icon with the circle-backslash will appear. At this point,
    installing the app is just a matter of dragging the application and the provisioning
    file onto iTunes’ application library (Figure 7-4).


    ***Figure 7-4:*** Testers can use iTunes to install your beta application and
    provisioning. They can just drag the app and the `.mobileprovision` files into
    iTunes’ application library.


    **Beta Testing**


    The applications added to iTunes behave very similarly to the ones that are purchased
    from iTunes. The only difference is that they show “`Unknown Genre`” instead of
    the category name. You can even use `File` ➝ `Get Info` to display the version
    number. Not surprisingly, you can then sync the beta application to the device
    (Figure 7-5).


    ***Figure 7-5:*** The beta application can be synced to the tester’s device just
    like any other application from the App Store. Just make sure that there’s a checkmark
    next to the application name before you start syncing.'
