    # 当你输入那些强大的方括号时，所有这些都会自动发生。第一步是导入 `objc-runtime.h` 头文件。


    所有的运行时定义都存储在那里。


    然而，这会让经验丰富的 Objective-C 程序员感到神经紧张和血压升高。这倒没什么，直到你在在线论坛上向他们求助为止。


    **注意：** 是的，推荐使用小写类型定义而不是像本章其余部分那样使用炫酷的大写字母，这确实有点讽刺意味。


    ## 下一步去哪里


    既然你已经对 Objective-C 有了初步了解，你可能会想进一步了解这门语言。


    有时候，你确实可以不劳而获；*《Objective-C 2.0 编程语言》* 这本书就是一个很好的例子。苹果公司拥有业内最优秀的技术文档作者，这一点在这本描述编程语言的书中体现得淋漓尽致。所有语言特性都配有相关示例进行了详细描述。当你遇到新的术语和概念时，书中的词汇表和索引特别有用。你可以从本书的
    Missing CD 页面找到这本在线书籍的链接：[www.missingmanuals.com/cds](http://www.missingmanuals.com/cds)。（或者直接在网上搜索
    *the objective-c 2.0 programming language*，你会在苹果网站上找到该书的链接。）另一个极好的资源就在本书内部——附录
    A。在这里，你会找到本书涵盖的每个主题的额外资源。每个资源都附有 URL 和简短评论。如果你觉得某个方面需要更多帮助，请前往附录。


    ## 开发者文档


    你可能觉得奇怪，已经用完整整一章来介绍一门编程语言了，却一直没有提及开发者文档这个话题。


    这是因为开发者文档数量庞大且质量极高。事实上，多到甚至让人觉得有点分心。


    由于本书无法解释你将会遇到的每一行代码，现在是时候介绍一下图 2-2 所示的系统文档了。


    当你在 Xcode 中工作时，你可以随时通过“帮助”➝“开发者文档”菜单调出这份文档。窗口出现后，你可以在右上角的框中输入任何内容进行搜索：类名（例如 `NSString`）、方法名（例如
    `release`）或概念（例如 `override`）。


    搜索结果出现后，你可以使用各种导航元素深入查看。


    ### 结果列表


    你的搜索结果会显示在文档窗口的左侧。你可以通过选择搜索词匹配文档页面的方式，来控制 API 列表中显示的信息量。当选择“包含”时，`NSString` 会匹配到
    `CFStringConvertEncodingToNSStringEncoding`，因为它是 API 名称的一部分。如果选择“前缀”，`NSString(UIStringDrawing)`
    会匹配，因为它以搜索文本开头。“精确”设置则只会显示 `NSString` 的页面。


    ![图片 22](img/index-80_1.jpg)


    **图 2-2：** Xcode 文档查看器。你可以使用右上角的框进行搜索（A）。结果会显示在窗口左侧的列表中（B）。选择其中一个结果，文档页面就会在右侧显示（C）。你可以打开目录，通过点击链接快速浏览页面（D）。例如，点击
    `-length` 方法名会跳转到详细文档，或者你可以将鼠标指针悬停在信息图标上以获取快速描述（E）。


    结果分为三个部分：


    -   **API。** 此部分显示符号名称的匹配项。每个匹配项前都有一个彩色字母。紫色 `C` 表示该符号是一个类，蓝色 `M` 表示一个方法，橙色 `T`
    表示一个类型定义，依此类推。

    -   **标题。** 此部分下的每个条目都是文档页面标题的匹配项。

    -   **全文。** 最后一部分显示文档页面全文中的匹配项。


    在更大的上下文中查找目标时，这些结果非常有用。


    如果你更关心如何使用某个类，这些结果会显示该类在指南、发布说明或示例代码中的出现位置。


    ### 文档页面视图


    当你从结果列表中选择一个项目时，页面会显示在窗口的右侧。对于某些类，文档页面可能非常长，以下是一些帮助快速导航的技巧：


    -   **目录。** 你可以打开页面的目录，在包含许多方法的页面中快速导航。并且，当你刚开始学习时，类文档中的“任务”部分是一个有用的指南。例如，如果你正在寻找创建和初始化字符串的方法，在
    `NSString` 的“任务”下会有专门的子部分。

    -   **配套指南。** Cocoa 中的许多核心类都有配套指南。这些文档提供了如何使用该类的宏观视角，并附有示例。如果你刚开始学习 `NSStrings`，点击“Cocoa
    字符串编程指南”部分可以让你尽快上手。

    -   **相关源代码。** 有时一张图胜过千言万语；对于开发者来说，示例代码是最美的图。如果你在为如何在数据列表中使用 `NSString` 而苦恼，点击
    `TableViewSuite` 会展示在可运行的源代码中是如何实现的。

    -   **跳转到…** 如果你正在查找类中的某个特定方法，这个弹出式菜单提供了快速访问页面各个部分和子部分的途径。

    -   **使用查找。** 当你按下 ⌘-F 时，文档页面上方会出现一个新的搜索栏。你在此栏中输入的任何文本都会在文档中高亮匹配。你可以点击箭头按钮（或 ⌘-G
    和 ⌘-Shift-G）在匹配项之间导航。


    #### 少打字，多学习


    内置文档提供了便捷的访问方式；不要错过这些绝妙技巧。即使使用复制粘贴，将类名和方法名输入到文档搜索栏也会很快变得繁琐。创建 Xcode 的开发者和你一样懒，所以他们想出了一些更好的方法来浏览这片信息之海。


    ##### 上下文菜单


    如果你在源代码中看到一个不理解的符号，可以选择文本，然后按住 Control 键点击以显示快捷菜单。这个菜单包含许多有用的项目，但最后你会看到两个特别感兴趣的项目。点击“在文档中查找文本”会打开文档窗口，并显示选中文本的搜索结果。无需输入！


    该菜单中另一个有用的项是“跳转到定义”。此命令使用选中的文本查找符号定义的代码。对于像 `NSString` 这样你没有源代码的类，你会看到一个 `@interface`
    定义。如果这个类是你自己编写的，你会看到 `@implementation` 定义。


    ##### 点击，起航！


    但这还不是全部。你只需使用键盘和两次鼠标点击即可访问文档。按住 Option 键并双击符号名称，会出现一个小窗口，显示类或方法的简短描述、包含参数类型的声明，以及指向示例代码和相关文档的链接。你还会看到该
    API 首次可用的日期。

