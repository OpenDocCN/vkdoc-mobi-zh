- fmt: '***Tip:*** You may even want to include this graphic as `iTunesArtwork` in
    your beta test build. As explained in the note on page 225, the Flashlight Pro
    project shows how to do so.


    To upload your icon, click the Choose File button, and navigate to your TIFF or
    JPEG file. This file should not contain any layers or transparency.


    After you upload the graphic successfully, you see a checkmark icon. You also
    see the file name displayed along with a link that opens the graphic in a new
    window. Click the link to verify that the image uploaded correctly.


    **246**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Stake Your Claim**


    *Screenshots*


    Uploading the Primary Screenshot is identical to the process used for the application
    icon. The only difference is the size of the files that can be uploaded.


    You can submit screenshots either with or without a status bar at the top: 320
    × 480 or 300 × 480 pixels in TIFF or JPEG format. The files can be in portrait
    or landscape orientation: iTunes and the App Store application position the files
    correctly when they’re displayed on your product page. This image is always displayed
    first on your product page.


    Uploading Additional Screenshots is optional, but you’re crazy if you don’t use
    them. Most customers use these pictures to evaluate the suitability of your app.
    The more visual information you can provide, the better.


    The upload process for these additional screenshots is a little confusing. You
    click Choose File to select each of the images, and then click Upload File to
    submit them all at once. The tricky part is getting the screenshots in the correct
    order. You’re trying to tell a story about your application, and if the storyboard
    images are in the wrong order, the plot is confusing.


    Another common mistake developers make is that they present the screenshots in
    the order that they appear in the application. People don’t want to see a game
    setup or login screen—they want to see some action and the cool stuff your application
    does. If you have help screens, these can also be good candidates, because they
    give an idea of how your application works in a graphically rich way.


    Once you figure out the screenshot order you want, choose the files in the *opposite*
    order in which you want them to appear in iTunes. Say you have four additional
    screenshots:


    **1.** Click Choose File and select your fourth (last) screenshot in the file
    dialog box; click Choose.


    **2.** Click Choose File again and repeat the process with your third screenshot.


    **Then do the same thing for the second and first additional screenshots.** The
    files should then be listed in the correct order above the Upload File button.


    **3.** If so, click the Upload File button.


    **4.** iTunes Connect transfers the files to iTunes. You can click Clear All and
    start again.


    ***Tip:*** The easiest way to keep your sanity here is by naming the screenshots
    with a number. Your primary screenshot is `0.jpg`, the first additional screenshot
    is `1.jpg`, and so on. This makes it easy to see that `1.jpg` is followed by `2.jpg`
    as you choose the files.


    Click Continue and you’re done uploading files for your application. Remember
    that you can come back to this screen at any time and update the images, even
    after your product is released in the App Store.


    Chapter 8: For Sale


    **247**


    ![Image 76](index-266_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Stake Your Claim**


    Pricing—Pick Your Price


    Only two fields are on the Pricing tab (Figure 8-5), but are they important and
    hard to get right!


    ***Figure 8-5:*** *The Pricing tab in iTunes Connect only asks for two pieces
    of information, and they’re both very important. The Availability Date controls
    when the product is released and should initially be set to a date far in the
    future. The Price Tier selection controls how much you earn from each sale. The
    tab displays a summary in each currency.*


    *Availability Date*'
