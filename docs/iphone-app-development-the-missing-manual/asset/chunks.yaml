  trans: "\n\n# iPhone App 开发：缺失手册\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 收束自身\n\n`nil`, `nil`];\n\n`[actionSheet setActionSheetStyle:UIActionSheetStyleBlackTranslucent];`\n\
    \n`[actionSheet showInView:self.view];`\n\n`[actionSheet release];`\n\n操作表（action\
    \ sheet）的委托处理按钮点击的方式与警告视图相同：\n\n```objc\n- (void)actionSheet:(UIActionSheet *)actionSheet\
    \ clickedButtonAtIndex:(NSInteger)buttonIndex\n{\n    . . .\n    switch (buttonIndex)\
    \ {\n        . . .\n    }\n    . . .\n}\n```\n\n## `SettingsViewController`\n\n\
    设置视图控制器维护的状态非常少：它只使用一个定时器来预览闪烁器（flasher）。由于所有设置的状态都由`FlashlightModel`维护，因此你不需要添加额外的状态。\n\
    \n你会注意到这里有多出许多视图。这是典型的设置控制器场景，它包含许多可由用户执行的调整项（以及相关的操作）。\n\n### 初始化\n\n`SettingsViewController`之所以会存在，是因为主视图工具栏中的“设置”按钮已连接到`–showSettings`操作。该方法会分配并实例化一个控制器实例，其方式与`Flashlight_ProAppDelegate`类似：`SettingsViewController\
    \ controller = [[SettingsViewController alloc] initWithNibName:@″SettingsView″\
    \ bundle:nil];`\n\n但随后它开始做一些新的事情。\n\n### 共享模型\n\n第一个不同之处在于，它将模型传递给新的控制器：`controller.flashlightModel\
    \ = self.flashlightModel;`\n\n这行代码在两个控制器之间共享了手电筒模型。这样一来，如果其中一个更新了模型，另一个无需额外操作就能访问这些更改。同时还能略微节省内存，因为无需复制实例数据。对于更复杂的模型，这种内存节省效果会非常显著。\n\
    \n第六章：专业手电筒应用 **201**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
    ## 收束自身\n\n***提示：*** 当然，在某些情况下，你希望每个视图控制器拥有独立的模型。在这些情况下，你可以在控制器的`–initWithNib:bundle:`方法中实例化一个新模型。\n\
    \n### 翻转出现与消失\n\n第一个显示在屏幕上的视图是作为子视图添加到窗口中的（第 153 页）。你也可以通过编写大量代码来实现类似效果：为视图添加动画、在视图层级中交换它们以及切换控制器。但和往常一样，“编写大量代码”正暗示了\
    \ Cocoa Touch 有更简便的实现方式！\n\n`UIViewController`（就像用作此类基础的控件一样，详见第 195 页）可以在其“上方”呈现另一个视图。当新的控制器取代其位置时，原始控制器会被挂起。这被称为*模态视图*，因为在这种模式下，用户无法与原始视图进行交互。\n\
    \n你可以通过`modalTransitionStyle`属性指定进入此模式的转场效果。对于设置界面，通常使用水平翻转效果，但你也可以指定视图从屏幕底部出现，或使用交叉溶解效果淡入：`controller.modalTransitionStyle\
    \ = UIModalTransitionStyleFlipHorizontal;` 一旦设置了转场效果，只需调用`–presentModalViewController:animated:`方法，新的控制器和视图就会以动画形式呈现：\n\
    \n```objc\n[self presentModalViewController:controller animated:YES];\n```\n\n\
    从此刻起，新的视图控制器由`UIViewController`超类管理，因此你可以释放刚刚创建的实例：\n\n```objc\n[controller release];\n\
    ```\n\n***注意：*** iPhone 应用中另一种常见的导航方式是基于`UINavigationController`。这个基于`UIViewController`的类允许你“推入”和“弹出”新视图。这样，你可以轻松创建类似\
    \ iPhone 邮件或设置应用那样的界面，其中新视图会滑入到位，并在左上角显示一个“返回”按钮。\n\n该类提供了`–pushViewController:animated:`和`–popViewControllerAnimated:`方法来改变用户在屏幕上的视图。此外，还有一些属性可以访问导航栏（以便添加你自己的按钮）并更改其状态。`UINavigationController`的文档包含了更多信息，并且可以从苹果开发者网站下载多个代码示例。\n\
    \n### 选择颜色\n\n由于设置界面包含一个选择器，允许用户选择他们喜欢的颜色，因此这个视图控制器在其`@interface`中采用了`UIPickerViewDelegate`和`UIPickerViewDataSource`协议。\n\
    \n数据源方法`–numberOfComponentsInPickerView`和`–pickerView:numberOfRowsInComponents:`指定了一个单列（组件），其行数等于手电筒模型中的颜色数量。\n\
    \n**202** iPhone App 开发：缺失手册\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 收束自身\n\n两个委托方法用于配置每行显示的标签。`–pickerView:titleForRow:forComponent:`方法使用手电筒模型的类方法`+nameForColorIndex:`为行提供文本。`–pickerView:widthForComponent:`方法则对每个颜色名称使用相同的方法来确定列的最大宽度。请记住，`+nameForColorIndex:`返回的是本地化字符串，这很好地说明了为什么不应硬编码字符串的尺寸。你可能认为\
    \ 20 像素足够显示“tan”，但当德国用户发现“hel braun”无法容纳在相同空间时，他们就会抱怨了。\n\n当用户在选择器中选中新行时，会调用`–pickerView:didSelectRow:inComponent:`方法。其实现会停止闪烁器，更新手电筒模型，然后更新视图。\n\
    \n### Interface Builder 并非万能\n\n你可能觉得 Interface Builder 的选项已经多到令人眼花缭乱，事实也确实如此。但即便拥有如此丰富的设置，你仍然无法直接在\
    \ NIB 文件中设置某些内容。在这个视图控制器的`–viewDidLoad`方法中，你可以看到一个示例：\n\n```objc\n[self.brightnessSlider\
    \ setMaximumTrackImage:stretchableSliderMaximum forState:UIControlStateNormal];\n\
    [self.brightnessSlider setMinimumTrackImage:stretchableSliderMinimum forState:UIControlStateNormal];\n\
    [self.brightnessSlider setThumbImage:sliderThumb forState:UIControlStateNormal];\n\
    ```\n\nInterface Builder 没有提供任何机制来为滑块设置自定义轨道和滑块按钮图像，因此你必须在代码中完成。`–viewDidLoad`方法非常适合做这件事，因为每次视图被读入内存时，这条消息都保证会被调用。\n\
    \n### 可拉伸图像\n\n你可能对滑块轨道图像的加载方式有些困惑：\n\n```objc\nUIImage *stretchableSliderMaximum\
    \ = [[UIImage imageNamed:@″SliderMaximum.png″] stretchableImageWithLeftCapWidth:2.0f\
    \ topCapHeight:0.0f];\n```\n\n你已经见过使用`–imageNamed:`方法从应用程序资源中加载图像（第 182 页）。但`–stretchableImageWithLeftCapWidth:topCapHeight:`方法又是做什么的呢？难道和橡皮人\
    \ Gumby 和 Pokey 有关？\n\n不——可拉伸图像在 UIKit 中被广泛使用。你可以将它们用于按钮、渐变以及任何尺寸会随布局变化而改变的屏幕元素。正如你在第\
    \ 162 页所见，当用户与应用交互时，视图的尺寸可能会发生相当大的变化，因此能够自动调整宽度和高度的图像非常有用。\n\n第六章：专业手电筒应用 **203**\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 收束自身\n\n当你定义一个可拉伸图像时，你需要在原始图像中定义两个点，这些点在绘制时可以被重复。在第\
    \ 180 页的示例中，从左数第二个像素使用`2.0f`指定。如果你不希望图像在一个维度上被拉伸，可以将限制值指定为`0.0f`：滑块的图像高度就是这样处理的。\n\
    \n### 本地化\n"
- fmt: "\n`–viewDidLoad`方法还包含一行对不讲英语的用户很重要的代码：\n\n```objective-c\nself.aboutBarButtonItem.title\
    \ = NSLocalizedString(@″About″, nil);\n```\n\n设置屏幕的设计目标之一是尽可能少用文字。\n\n滑块两侧的图标在任何语言中都能表示亮度和闪烁速度，因此无需担心这一问题。模型已对颜色名称进行了本地化处理，所以您也无需为此操心。\n\
    \n至此，NIB 中只剩下一个文本需要处理：左上角的“关于”(About)按钮。\n\n由于只有一个项目需要本地化，最简单的方法是直接更新这一个按钮。\n\n\
    当您有多个项目需要本地化时，可以采用另一种本地化方法，稍后将对此进行讨论。\n\n**注意：**“完成”(Done)按钮会自动为您更新，因为它是系统按钮之一。您只需在本地化字符串文件中提供对`@“Done”`的翻译即可。\n\
    \n## AboutViewController\n\n视图控制器不一定需要包含模型。大多数控制器都有模型，但这当然不是必须的。致谢视图就是一个不需要模型的例子。此外，该控制器采用了另一种实现动画的方式。\n\
    \n### 哪个版本？\n\n您可能曾想过为产品的版本号创建一个数据模型，但鉴于`–viewDidLoad`中只有三行代码，这样做不值得：\n\n```objective-c\n\
    NSString *bundlePath = [[NSBundle mainBundle] bundlePath];\nNSDictionary *infoDictionary\
    \ = [NSDictionary dictionaryWithContentsOfFile:\n                            \
    \    [NSString stringWithFormat:@″%@/Info.plist″, bundlePath]];\nself.versionLabel.text\
    \ = [NSString stringWithFormat:NSLocalizedString(@″Version″, nil),\n         \
    \                 [infoDictionary objectForKey:@″CFBundleVersion″]];\n```\n\n\
    这段代码定位并加载应用程序的`Info.plist`文件，从列表中读取`CFBundleVersion`属性，然后通过一个本地化字符串更新`versionLabel`的文本。\n\
    \n**204**\n\niPhone 应用开发：缺失手册\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### 整理自我\n\nApp Store 在保持客户软件最新方面做得很好。事实上，它做得如此之好，以至于大多数客户甚至不需要知道安装了哪个版本的应用。那么，为什么还要费心去做这件事呢，即使只需要三行代码？\n\
    \n因为在测试应用时，您需要这个信息。无法在 iPhone 上查出安装了哪个版本，所以如果您的某个测试者发现了一个 bug，您和测试者都需要一种方式来识别是哪个版本导致了问题。\n\
    \n**注意：**当然，这也意味着在发布新的测试版之前，您需要更新版本号。通过在 Xcode 中编辑`Info.plist`中显示的值，可以轻松完成此操作。\n\
    \n### 不同的动画方法\n\n这个控制器类还演示了另一种动画方法。之前，您已经看到过视图自身的动画：`LightView`和`IFInfoView`通过`self`变量修改自身的属性。另一种方法是让控制器驱动视图的动画。\n\
    \n如果控制器拥有视图的实例变量，它可以更改 frame、alpha 或任何其他可动画化的属性。由于控制器包含进行这些更改的逻辑，这通常是一种更简单的解决方案。\n\
    \n该类执行的动画的另一个不同之处在于，它直接与 Core Animation 框架交互。使用`UIView`的`+beginAnimations:` `context:`和`+commitAnimations`通常是最简单的方法，但您会遇到想要执行更复杂操作的情况。\n\
    \n如果您查看`–animateSpotlight`方法，就能看到这种直接动画的一个例子。在此示例中，它用于在视图中移动聚光灯，并沿途在若干点处停留。\n\n\
    首先，创建动画并定义其一些基本属性：\n\n```objective-c\nCAKeyframeAnimation *animation = [CAKeyframeAnimation\n\
    \                                  animationWithKeyPath:@″position″];\nanimation.duration\
    \ = 15.0f;\n```"
  raw: 'The *–viewDidLoad* method also contains an important line of code for your
    customers who don’t speak English:


    self.aboutBarButtonItem.title = NSLocalizedString(@″About″, nil); One of the design
    goals for the settings screen was to use as few words as possible.


    The icons on either side of the slider work in any language as a way to indicate
    brightness levels and flashing speeds. The model localizes the color names, so
    you don’t need to worry about them, either.


    That leaves one piece of text in the NIB that you need to address: the About button
    in the upper-left corner.


    Since you have only one item to localize, it’s easiest to just update the one
    button.


    When you have many items to localize, you can use another approach to localization
    that will be discussed shortly.


    ***Note:*** The Done button is updated for you automatically since it’s one of
    the system buttons. All you need to provide is a translation for *@“Done”* in
    your localized strings.


    AboutViewController


    A view controller doesn’t need to have a model. Most do, but it’s certainly not
    a requirement. The credits view is an example of when you don’t need one. This
    controller also takes a different approach to doing animation.


    *Which version?*


    It’s conceivable that you could have created a data model for the product’s version
    number, but with only three lines of code in *–viewDidLoad,* the effort isn’t
    worth it: NSString *bundlePath = [[NSBundle mainBundle] bundlePath];


    NSDictionary *infoDictionary = [NSDictionary dictionaryWithContentsOfFile:


    [NSString stringWithFormat:@″%@/Info.plist″, bundlePath]];


    self.versionLabel.text = [NSString stringWithFormat:NSLocalizedString (@″Version″,
    nil), [infoDictionary objectForKey:@″CFBundleVersion″]]; This code locates and
    loads the application’s Info.plist file, reads the *CFBundleVersion* property
    from the list, and then updates the *versionLabel*’s text by using a localized
    string.


    **204**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Pull Yourself**


    **Together**


    The App Store does a great job of keeping your customers’ software up to date.
    In fact, it’s done so wel , most customers don’t even need to know which version
    of an app is installed. So why go to the trouble of doing this, even if it’s only
    three lines of code?


    Because you need this information when you’re testing the app. There’s no way
    to find out which version is installed on an iPhone, so if one of your beta testers
    finds a bug, you both need a way to identify which version caused the problem.


    ***Note:*** Of course, this also means that you need to update the version number
    before sending out a new beta release. That’s easy to do by editing the value
    displayed in the Info.plist with Xcode.


    *A different approach to animation*


    This controller class also demonstrates another approach to animation. Previously,
    you’ve seen views that animate themselves: *LightView* and *IFInfoView* modify
    their own properties by using the *self* variable. Another approach is to have
    the controller drive the animation of the view.


    If the controller has an instance variable for the view, it can change the frame,
    alpha, or any other property that can be animated. Since the controller contains
    the logic to make these changes, this can often be a simpler solution.


    Another difference with the animation performed by this class is that it interacts
    directly with the Core Animation framework. Using *UIView*’s *+beginAnimations:*
    *context:* and *+commitAnimations* is usual y the easiest way to achieve your
    goals, but you’ll encounter situations where you want to do something more complex.


    If you look at the *–animateSpotlight* method, you see an example of this type
    of direct animation. In this example, it’s used to move the spotlight around in
    the view, stopping at points along the way.


    First you create the animation and define some of its basic properties: CAKeyframeAnimation
    *animation = [CAKeyframeAnimation


    animationWithKeyPath:@″position″];


    animation.duration = 15.0f;'
