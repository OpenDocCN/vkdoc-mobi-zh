  trans: "\n### **图 3-6：**\n\n将 `slider` 控件添加为插座变量后，`HitMakerViewController` 的连接检查器（Connection\
    \ Inspector）显示如下。如你所见，`mySlider` 已连接到一个水平滑块。当你使用 Interface Builder 时，建议利用“文件的所有者”（File's\
    \ Owner）上的这个检查器，来确认所有插座变量和操作都已正确连接。如果某个连接缺失，你的控制器代码将无法与视图正常通信。\n\n**提示：** 你还可以通过按住\
    \ Control 键从“文件的所有者”拖拽到要连接的控件，来连接插座变量。松开鼠标按钮后，你将看到一个可供选择的插座变量列表。\n\n---\n\n###\
    \ **目标和操作（Targets and Actions）**\n\n你的文档开始看起来像用户界面了。你还需要连接两个插座变量：\n\n1. **从资源库中拖拽另一个\
    \ `UILabel` 对象**到灰色视图窗口。将其放置在滑块正下方，并像处理“VOLUME NOB”标签那样进行调整，但无需修改标签的文本。\n\n与第一个标签不同，你将通过代码来更新这个标签。\n\
    \n2. **现在，选中“文件的所有者”后进入连接检查器，从 `myLabel` 旁边的圆圈拖出一条蓝色线**，连接到新标签。\n\n最后，你需要一个按钮。\n\
    \n3. **在资源库检查器中，点击按钮图标（位于标签图标右侧）。**  \n   你应在窗口底部看到的描述是“圆角矩形按钮”（Rounded Rect Button）以及类名\
    \ `UIButton`。\n\n4. **将圆角矩形按钮拖到视图窗口，并放置在其他控件下方。**  \n   与标签一样，你可以双击按钮来输入要显示的按钮文本。\n\
    \n5. **双击按钮并输入 `HITORMISS`。** 然后从 `HitMakerViewController` 的插座变量 `myButton` 连接到刚添加的按钮。拖拽连接的步骤与你刚才为另外两个插座变量所做的操作相同。\n\
    \n6. **按下 ⌘-S 保存你的工作。**  \n   Interface Builder 会生成一个名为 `HitMakerViewController.xib`\
    \ 的新 XIB 文件。不要关闭文档窗口，你还没完成。\n\n接下来，你将回到 `HitMakerViewController` 的连接属性，并将 `myButton`\
    \ 连接到这个新按钮。\n\n**注意：** 有些开发者更倾向于一次性放置并配置好所有控件，而不是在检查器之间来回切换。选择最适合你的工作流程；只需记住，在所有控件放置完成后连接你的插座变量。\n\
    \n对于初学者来说，很容易忘记这些连接。任何引用未连接插座变量的代码都会向 `nil` 对象发送消息，从而不产生任何效果。在花大量时间调试代码之前，请确保所有连接都已正确挂接！\n\
    \n切换回 Xcode，以便你使用这个新的 XIB 文件构建应用程序。\n\n当你在 Xcode 中使用 ⌘-Return 构建并运行应用时，你会看到应用启动并初始化控件（图\
    \ 3-7）。`–viewDidLoad` 代码将滑块调整到中间位置，并修改了标签文本和颜色。但当你拖动滑块或按下按钮时，没有任何反应。\n\n---\n\n\
    ### **图 3-7：**\n\n将插座变量连接到滑块和标签控件后，`HitMakerViewController` 的 `–viewDidLoad` 代码可以更新滑块的位置以及标签的文本和颜色。现在启动应用时，如果你尝试点击按钮或滑块，也不会发生任何事情。\n\
    \n---\n\n### **添加一些操作（Get a Little Action）**\n\n你开了一个好头，但还需要添加一些操作。不是那种操作，是时候为你的新控件挂接操作了：\n\
    \n1. **点击 Interface Builder 的 Dock 图标，切换回该工具。**\n"
- fmt: "# 2. In the `HitMakerViewController.xib` document window, select `File’s Owner`.\n\
    \n# 3. Press ⌘-2 to bring up the Connection Inspector.\n\nRemember those `IBAction`\
    \ identifiers you added to your controller’s header file? You can see them listed\
    \ under Received Actions. Make sure you can see both the gray view window and\
    \ the document window where `File’s Owner` is listed.\n\n# 1. Press Control and\
    \ click the `HIT OR MISS` button. Drag the mouse, and you’ll see a blue line.\
    \ Since you want this action to be performed by the `HitMakerViewController`,\
    \ move the blue line to that type in the document window.\n\nWhen you let go of\
    \ the mouse button, you’ll see a menu appear with the events supported by that\
    \ view controller (Figure 3-8). Click `hitOrMiss`, and you’re done.\n\n**92**\
    \  \niPhone App Development: The Missing Manual\n\n![Image 29](index-111_1.jpg)\
    \  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## Targets and Actions\n\
    \n**Figure 3-8:** The `HitMakerViewController` fully connected. When you select\
    \ `File’s Owner`, you’ll see that the controller’s three outlets (`myButton`,\
    \ `myLabel`, and `mySlider`) are connected to views. Similarly, the actions –\
    \ `hitOrMiss` and `updateVolume:` – will be invoked by the button and slider controls.\n\
    \n# 2. Control-click the slider control. Drag the blue line onto `HitMakerViewController`,\
    \ release the mouse button, and then click `updateVolume:`.\n\n# 3. Save the changes\
    \ with ⌘-S.\n\nGo to the document window, select `File’s Owner`, and press ⌘-2\
    \ to open the Connection Inspector. You’ll see `hitOrMiss` is connected to a Rounded\
    \ Rect Button for the Touch Up Inside event. Similarly, the Horizontal Slider’s\
    \ Value Changed event is connected to the `updateVolume:` method (Figure 3-9).\n\
    \n**Tip:** You can even Control-drag between the items listed in the document\
    \ window. Some developers prefer this method since it doesn’t involve opening\
    \ the View window.\n\nOn page 81, you learned how events are processed while you\
    \ were writing the `–addTarget:action:forControlEvents:` code. In essence, you’ve\
    \ just replaced the code shown in `–setupControls` with a couple of clicks.\n\n\
    Now it’s time to switch back to Xcode and test the app. Click its Dock icon and\
    \ press ⌘-Return to build and run the app.\n\nChapter 3: Cocoa Touch: Putting\
    \ Objective-C to Work\n\n**93**  \n![Image 30](index-112_1.jpg)  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Targets and Actions\n\n**Figure 3-9:** After dragging a connection from the\
    \ `HIT OR MISS` button to the `HitMakerViewController`, you’ll select the `hitOrMiss`\
    \ action. This move causes the named method to be called when the button is pressed.\n\
    \n## Squash those bugs\n\nJust because you’re using visual development tools doesn’t\
    \ mean there won’t be bugs. As you run the app, you notice a couple of problems:\n\
    \n- **Bug:** The slider value only goes from 0.0 to 1.0 (Figure 3-10). It has\
    \ to go to at least 11.0 before it can rock.\n- **Visual:** The text colors don’t\
    \ look so great on a gray background. It would also be nice if the text were center\
    \ aligned. As is often the case with view attribute changes that are done in code,\
    \ you don’t know how things are going to look until runtime.\n\nLuckily, both\
    \ of these things are easy to fix with Interface Builder. Click the Dock icon\
    \ to bring your XIB file back into view. In the following steps, you’ll fix first\
    \ the bug, then the visual problems:\n\n# 1. In the document window, double-click\
    \ `UISlider`. Then press ⌘-1.\n\nThe Attribute Inspector opens.\n\n**94**  \n\
    iPhone App Development: The Missing Manual\n\n![Image 31](index-113_1.jpg)  \n\
    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## Targets and Actions\n\n\
    **Figure 3-10:** When you run the application, the slider and button controls\
    \ now function, but some problems linger. The slider control value only goes up\
    \ to 1.0, the contrast for the label is too low, and the text isn’t aligned correctly.\
    \ You can fix all of these bugs with Interface Builder.\n\n# 2. Change Maximum\
    \ value from 1.0 to 12.0."
