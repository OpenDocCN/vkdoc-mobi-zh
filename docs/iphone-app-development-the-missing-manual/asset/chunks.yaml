    ## 创作人员说明


    ### 关于作者


    **克雷格·霍肯贝里**从事屡获殊荣的软件设计已超过 30 年。他目前是 Iconfactory 公司的负责人，这家公司自 1996 年以来一直在改变计算机的面貌。他们的工作包括为微软、苹果、Adobe
    及其他领先软件公司设计和制作图标。


    克雷格差点就没买 iPhone。但仅仅在他当地的苹果店里待了五分钟，就让他确信自己手中握着未来。不久之后，好奇心驱使他破解了一部 iPhone，以便在手机上运行自己的应用程序。


    苹果推出 App Store 后，克雷格和他的工厂伙伴们得以与世界分享这些软件。


    从早期开始，Iconfactory（ *www.iconfactory.com*）就为 iPhone 发布了许多突破性的成功应用，包括 Twitterrific、Frenzic、Ramp
    Champ 和 Pickin’ Time。该公司还为许多其他领先的应用贡献了设计工作。


    克雷格热爱写作，希望你能学会分享他对大写字母（BIG LETTERS）的着迷。


    ### 关于创作团队


    **南·巴伯**（编辑）自本《缺失手册》系列诞生之初便参与其中。她的工作让她能够将对闪亮事物的迷恋与对文字终生的热爱结合起来。电子邮件：*nanbarber@oreilly.com*。


    **xi**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **内莉·麦凯森**（制作编辑）毕业于新墨西哥州圣达菲的圣约翰学院。她住在马萨诸塞州布罗克顿，业余时间学习平面设计和制作 T 恤（ *www.endplasticdesigns.com*）。电子邮件：*nellie@oreilly.com*。

