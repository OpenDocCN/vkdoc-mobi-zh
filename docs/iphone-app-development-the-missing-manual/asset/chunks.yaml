- fmt: 'In many cases, it also provides you with the ability to gather additional
    information about the link to your product. You can get statistics about both
    `bit.ly` and `j.mp` links by adding `info` to the link and typing it in a web
    browser. For example, entering `http://j.mp/info/7tB9G5` into a browser generated
    the graph in Figure 9-5. It also provided information on other tweets that used
    the same URL, sites where the link was clicked, and the geographic location of
    the person who clicked it.


    ## Give customers something to talk about


    Safety Light has a cool feature that’s not mentioned anywhere in iTunes or on
    the product website—the battery graphic that appears when the screen flips to
    and from settings. The batteries were kept secret on purpose. You can leverage
    social networks by letting people discover things in your iPhone app. It’s human
    nature to want to tell others about cool things you come across. The first time
    the user flips over to view settings, he’ll be surprised to see the batteries
    (Figure 9-6). Some will be so delighted that they want to show their followers.


    **279**


    ![Image 87](index-298_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Figure 9-6:** *The batteries displayed between the light and settings views
    are a surprise for new users. Some will comment on social networks and generate
    additional interest in the app. Martin Dufort (@mdufort) took this screen capture
    and posted it to his Twitter stream for others to view.*


    A variation on this theme is when apps post game scores to a player’s Facebook
    and Twitter accounts. Adding this feature to your games isn’t difficult, and it
    lets your users boast about their achievements. If friends and followers haven’t
    heard of the game, they’ll check out the included link. If they’ve already purchased
    the game, they’ll want to beat the score! There’s benefit for you as well as for
    your customer.


    ***Tip:*** If you want your app to send posts to a social network, be sure that
    the app asks your users’ permission to do so. Every posting should give users
    a chance to opt out. Automated posts are viewed as spam and break the user’s trust
    in your app.


    ### It’s a conversation


    For social networks to be truly effective, the communication needs to be a two-way
    street. If you just pump out what amounts to nothing more than press releases,
    your followers are going to get bored and leave. The solution: Make sure your
    social network is interactive.


    Here are some tips on how to effectively use your product or company account:


    - **Use your account to post tips and tricks about using the app.** Spread out
    these posts over time so that more users will be likely to see them. It’s also
    a good idea to include links that point to a support page that lists all tips.

    - **Have a way to handle support requests directed to your account.** In most
    cases, you’re best off directing the customer to an email account where the problem
    can be investigated. Complex support issues usually require some back-and-forth
    conversation to determine the cause and solution, and you don’t want all that
    filling up your wall. Email is best suited for this type of exchange.

    - **For short and simple questions, a quick reply does the trick.** For example,
    a user on Twitter had a question about the light intensity: “@chockenberry Is
    it possible for the app to override the system brightness? At low brightness,
    high brightness in your app is still low.” A quick response lets them know that
    you’re aware of the problem and that it’s a system limitation: “@jazzviolin No
    public API to adjust brightness, unfortunately.”

    - **Be on the lookout for new feature requests.** As people use your application,
    they come up with ideas: Tapping in a short message to your account lets them
    get the thought to you quickly. A quick acknowledgement lets them know you’re
    paying attention and appreciate the input. Thanks to users on Twitter, a feature
    request list for the next version includes a BPM indicator for DJs, an avalanche
    detector using the accelerometer, and custom messages via Morse code.

    - **Write a thank-you note.** A great thing about social networks are the compliments:
    “@chockenberry I love the batteries behind the view when flipping. Nice touch.”
    Thanking your users (“@McCarron Thanks! We try to keep things interesting :-)”)
    not only makes them feel good, but it also makes them even better supporters and
    champions of your app.

    - **Remind followers to leave a review on iTunes.** As you saw on page 259, social
    proof can do a lot to promote your app; the people interested in your work are
    usually happy to take a moment to help out. Just be careful how often you make
    this request: too frequently, and you’ll appear to be begging.

    - **When you tweet, use easily searchable patterns.** For example, putting `http://safetylightapp.com`
    in tweets will help you search for people who are talking about the website, while
    just “Safety Light” will include people talking about bike lights.


    ## The Big Bang


    In the last section, you saw how influential people on social networks help promote
    your application. It gets even better when you’re mentioned by a leading website!


    This single sentence on December 29, 2009, changed Safety Light’s future:


    “If you’re going to make an iPhone flashlight app, you might as well make it the
    best one.”


    `http://daringfireball.net/linked/2009/12/29/safety-light`


    The actual words aren’t as important as the person who’s writing them. This short
    posting occurred on Daring Fireball, an influential website that offers news and
    commentary about the Mac and iPhone. John Gruber, the journalist who runs the
    site, has a knack for finding great applications, and readers love his discoveries.
    As a result of this recommendation, over 10,000 people visited the Safety Light
    website, and 688 of them decided to purchase the application (Figure 9-7).


    **281**


    ![Image 88](index-300_1.png)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Figure 9-7:** *This graph shows the network traffic on the web server hosting
    the Safety Light website. A link from Daring Fireball at 10:30 a.m. caused a huge
    spike in traffic. When choosing a host for your website, ask about policies for
    handling bandwidth anomalies like the one shown here. Having a site go down because
    of popularity will cost you sales.*


    Prior to this exposure, Safety Light’s daily revenue was about $25 per day. On
    the day of the posting, the daily revenue was over $450. The mention at Daring
    Fireball also pushed Safety Light into the #40 position of the Top 100 for the
    Utilities category.


    The moral: Don’t underestimate the importance of your media relationships.


    ### Spreading like wildfire


    When a site with a large readership links to a product, the link tends to ripple
    out to other sites. That’s what happened after the mention on Daring Fireball,
    and it helped extend awareness of Safety Light.


    The effect is not unlike the social proof you saw in the last chapter (page 259).
    If one writer thinks an app is worthwhile, others will take a look and add their
    unique point of view. That’s another reason to have more than one trick up your
    PR sleeve: One writer will pick up on it being “the best flashlight,” another
    sees the unique design and SOS beacon, while a third latches onto Disco Mode.


    **282**'
