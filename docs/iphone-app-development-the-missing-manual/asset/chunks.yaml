  raw: 'CGRect applicationFrame = [[UIScreen mainScreen] applicationFrame]; The reason
    for writing the code this way, even though you know the exact size of the iPhone’s
    screen (320 × 480, or 320 × 460 with the status bar displayed) is because the
    size of the screen isn’t always what you expect it to be. For example, if you’re
    in the middle of a call or using Internet tethering, the status bar is 40 pixels
    tall instead of 20 pixels. And if you’re in landscape orientation, you’re subtracting
    these values from the width of the screen rather than from the height. It real
    y is best to let Cocoa Touch figure out the current screen size for you.


    ***Tip:*** Another reason to let the system figure out the dimensions of the screen:
    A time may come when your app runs on a larger device like the iPad’s 1024 × 768-pixel
    display. You’re future-proofing your implementation!


    *Windows and views*


    As you continue to look at Flashlight_ProAppDelegate.m, you see where the screen
    comes to life. It all starts with this code:


    mainViewController.view.frame = applicationFrame;


    It should be fairly obvious that the view’s size and position (frame) are being
    set to the entire screen. What’s less obvious is that the view object is also
    getting *instantiated.*


    That is, because the controller’s view is loaded lazily (page 84), the first access
    to the *view* property of *MainViewControl er* causes the object to be loaded
    into memory from the NIB file. As a result, executing this line of code causes
    the *–viewDidLoad* method to be called in the *MainViewControl er.*


    Having the view appear onscreen is a two-step process. First, you add it as a
    subview of the window, and then you make the window visible, like this:


    [window addSubview:mainViewController.view];


    [window makeKeyAndVisible];


    This causes another method in *MainViewControl er* to be invoked: The code in


    *–viewDidAppear* runs. Note that this is not the only time this message is sent;
    it happens anytime the view comes onscreen—when you flip back to the main view
    after looking at the settings view, for example.


    **NIB Files: Something to look At**


    As you saw in the steps on page 86, it’s pretty simple to get a basic interface
    working using Interface Builder. The UI won’t do anything useful, but you can
    see the controls and other views. It also starts a natural cycle of adding views,
    creating outlets in the controller, adding actions in the controller, and hooking
    the actions up to the views.


