    5.  点击“Window-based Application”，然后点击“Choose”。保持“Use Core Data”复选框未选中状态，因为手电筒应用不需要数据库。


    此时会弹出一个文件保存对话框，以便你为项目文件夹指定名称和位置（图 1-8）。


    **图 1-8：** 对于手电筒项目，请告知 Xcode 在你的`Documents`文件夹内创建一个名为`Flashlight`的文件夹。


    6.  在项目名称处输入`Flashlight`，并从底部的下拉菜单中选择`Documents`文件夹。


    如图 1-9 所示，你刚刚在访达中创建的文件夹包含了构建应用所需的一切，包括主项目文件`Flashlight.xcodeproj`。


    **图 1-9：** 当你用 Xcode 创建项目时，它会创建一个包含用于构建应用的文件文件夹。其中最重要的是`.xcodeproj`文件——你可以双击此文件在
    Xcode 中打开项目。此外，由于你创建的是一个基于窗口的应用，Xcode 会为你提供一个名为`Main Window.xib`的起始文件。在接下来的章节中，你将了解更多关于其他文件和文件夹的信息。


    Xcode 会在后台创建这个项目文件夹。在你的 Xcode 生涯中，你可能永远不会直接与文件或文件夹交互。相反，你可以依靠 Xcode 来为你管理一切。但你仍然需要知道这个文件夹的位置，以便备份你的工作。


    **提示：** 随着你对 Xcode 运用得越来越熟练，你可能希望将项目放在你个人文件夹内各自独立的文件夹中。许多开发者会创建一个`Projects`文件夹，里面只存放他们的
    Xcode 文件夹。就像“图片”、“影片”和“音乐”文件夹能让你更方便地管理媒体文件一样，一个`Projects`文件夹能让你更方便地管理你的软件。


    在 Xcode 完成创建新项目后，它会在一个项目窗口中显示这些文件，如图 1-10 所示。


    **图 1-10：** Xcode 项目窗口。左侧是项目的分组和文件，右侧是源代码编辑器。虽然黄色的分组图标看起来像文件夹，但它们与你之前在访达中看到的蓝色文件夹不同。你可以重命名`Classes`分组，而不会影响磁盘上的文件夹。同样，你在访达中找不到`Resources`文件夹，但该分组是组织非源代码文件的好方法。


    项目窗口左侧的“Groups & Files”面板列出了构成你应用的各个文件。回到零件清单的比喻，每个分组都包含类型相似的零件。以下是一些最重要的分组：


    - **Classes.** 此分组中的文件包含你项目的实际源代码。

    - **Resources.** 用户界面文件、图形和应用配置文件都属于 Resources 分组。

    - **Frameworks.** 这些文件包含 iPhone SDK 使用的工具。


    窗口的编辑器部分（右下角的大白色区域）显示了应用启动完毕时运行的代码。在这个简单的例子中，代码使窗口对象可见并能响应点击操作。


    你将在下一章中了解更多关于这些重要分组和源代码的信息。记住：本章的目标是在不编写任何代码的情况下构建一个应用！


    ## 一些组装工作


    你已经收集了所有零件，现在是时候组装它们了。与圣诞前夕的玩具不同，Xcode 项目很容易组装。多亏了模板，你只需启动“构建”命令，Xcode 就会获取所有源代码、资源和框架，并将它们组合成一个可在
    iPhone 上运行的可执行文件。


    确保项目窗口左上角的下拉菜单设置为“模拟器”和“调试”（菜单上的具体文字会根据你使用的 iPhone SDK 版本而有所不同）。然后选择“产品”➝“构建”，如图
    1-11 所示。


    稍等片刻后，你应该会在左下角的状态栏中看到“构建成功”。


    **注意：** Xcode 的状态栏位于窗口底部，是一个重要的信息来源。当你执行各种任务时，此区域会向你通报它们的进度。当你想知道发生了什么时，这是你应该首先查看的地方。


    **图 1-11：** 构建你的 iPhone 应用。请注意，“概览”菜单已设置为“模拟器”和“调试”。键盘组合键 ⌘-B 是一个方便的快捷键，用于在对源代码进行更改后构建项目。


    一旦你构建了应用，你就可以在 iPhone 上运行它。或者更好的是，在你的 Mac 上运行它。没错。如果你和大多数开发者一样，你大约 90% 的时间都会在
    Mac 上运行你的 iPhone 应用。应用在 Mac 上的启动速度比在 iPhone 上快，并且当出现问题时，在 Mac 上调试也更容易。


    **注意：** 不要忽视那最后的 10%。在实际设备上运行你的应用极其重要：你将在第 4 章讨论设计问题时明白原因。


    ## 在 Mac 上试运行


    在开发 iPhone 应用时，你可能在它靠近 iPhone 之前，先在 Mac 上运行它来进行测试和调试。


    那么，如何在你的 Mac 上获得一个 iPhone 呢？很简单：确保“概览”菜单中选择了“模拟器”，然后选择“运行”➝“运行”。由于你选择了模拟器，Xcode
    会使用 iPhone 的模拟来运行你的应用。


    留意一下状态栏。你会看到显示“正在模拟器中安装 Flashlight”，最终会显示“Flashlight 已启动”。不久之后，你的桌面上会出现一个巨大的 iPhone，并且它正在运行你的`Flashlight`应用（图
    1-12）。恭喜！


    **图 1-12：** 在 iPhone 模拟器中，左侧的图像显示应用正在运行，右侧的图像显示主屏幕上的应用图标。它放不进你的口袋，但模拟器的行为就像一个真实的、活生生的
    iPhone。


    **提示：** 你可以通过一次按键来完成本节和上一节中完成的所有操作。按 ⌘-回车键可以在一个步骤中（在模拟器中）构建并运行你的应用。当你深入 iPhone
    应用开发时，你会在睡梦中都按这些键。


    那么，这个巨大的 iPhone 能做什么呢？它被称为 iPhone 模拟器，其行为与你口袋里的设备相似，除了以下几点：


    - 它的速度快了数百倍。

    - 它拥有与你的 Mac 一样多的内存。

    - 网络更可靠。

    - 它有更大的显示屏。

    - 它不能通过 USB 数据线与 iTunes 同步。

    - 触摸模拟器屏幕没有效果。


    实际上，这个坐在你桌面上的大手机与你习惯用的那款有着截然不同的硬件规格。但一旦你习惯不让手指触控屏幕，你最终会爱上模拟器。它让你的开发者生活变得轻松得多，因为它做了一件重要的事情：它让你无需将
    iPhone 连接到 Mac 就能测试代码。第 25 页的边框区域将向你展示如何充分利用这个重要工具。

