  raw: 'If you use the name “Beta Test” for the profile, that’s going to be confusing
    when it shows up on the testers’ phone. And when their Beta Test profiles expire,
    they’re not going to know whom to ask for a new one.


    It’s best to use your company name for the Profile Name. If you enter Squidger
    Beta Distribution, for example, your testers will know it’s the profile for testing
    Tiddlywinks Pro. This descriptive name will also help you, as you’ll see shortly.


    For the App ID, select Squidger Apps, so your testers can run any and all applications
    from the brilliant minds at Squidger Industries.


    ***Note:*** If you’re using push notifications or doing in-app purchases, you
    need to select the App ID that you’ve configured with these features. Both these
    features require an identifier that does *not* use the wildcard (*) character.


