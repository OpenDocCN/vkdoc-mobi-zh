    此时，您应能看到新证书已安装在您的登录钥匙串中（图 5-4）。


    ***图 5-4：*** *从开发者门户下载并安装 WWDR 中间证书文件后，您应在登录钥匙串的证书类别中看到来自 WWDR 的证书。*


