    例如，你可以将测试者的姓名与设备型号结合起来。名为“David Bowman 3G”的设备表明 Dave 使用的是 iPhone 3G。当他升级设备后，你可以添加另一台名为“David
    Bowman 3GS”的设备。


    **4. 点击 Submit 后，你会在列表中看到新设备，并且计数器会递减。**


    **144**


    iPhone 应用开发：缺失的手册


    ![Image 50](img/index-163_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **使之正式化**


    ***图 5-9：*** *通过配置门户添加新设备。在此命名方案中，设备名称包含测试者的姓名及其正在测试的设备型号。*


    应用标识符。配置描述文件所需的下一项信息是应用 ID。这个唯一标识符通过模式匹配来指定哪些应用可以运行。模式匹配可以包含用作通配符的星号。


    在查看手电筒应用的 `Info.plist` 时，你会看到它的 Bundle Identifier 被定义为 `com.iconfactory.FlashlightPro`。这个反向域名路径唯一地标识了该手电筒应用来自
    Iconfactory。如果你从 iPhone 开发中心下载过示例代码，你会发现许多应用的标识符都以 `com.yourcompany` 开头。


    假设你的域名是 `squidger.com`，你的应用名为 Tiddlywinks Pro。


    你已在 `Info.plist` 中将 Bundle Identifier 定义为 `com.squidger.TiddlywinksPro`，现在你有几种指定应用
    ID 的选择：


    - `*` 匹配所有应用。你可以构建并运行设备上的任何应用，包括示例代码和其他第三方应用。但它缺少接下来两个选项所具备的特殊功能。

    - `com.squidger.*` 匹配所有以 `com.squidger` 开头的应用，包括 `com.squidger.TiddlywinksPro`
    以及你的公司未来开发的任何其他应用。


    在对你的应用进行 Beta 测试时使用此模式。一个匹配你域名下所有产品的配置文件，能让测试者轻松试用每个新版本，因为他们上次 Beta 测试时已经安装了该文件。


    第 5 章：认真对待开发


    **145**


    ![Image 51](img/index-164_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **使之正式化**


    - `com.squidger.TiddlywinksPro` 是完全限定模式，精确匹配你的应用。如果你希望从应用中使用推送通知或应用内购买，则必须使用此类
    ID。


    现在，采用最简单的方式，将你的应用 ID 指定为 `*`。打开配置门户并按以下步骤操作：


    **1. 在配置门户网页中，点击左侧列的 App IDs。**


    应用 ID 屏幕会显示已定义的应用 ID。随着时间的推移，列表会不断增长，当你需要配置推送通知或应用内购买时，就会用到它。


    **2. 现在，只需点击 New App ID 来添加第一个应用 ID。**


    首先，在 Description 下的文本框中填写内容，以提醒你这个模式是用于什么的。


    **3. 由于你可以使用这一个应用 ID 来构建和运行所有应用，因此输入 All Apps。**


    将 Bundle Seed ID (App ID Prefix) 下的弹出菜单保持选择 Generate New（图 5-10）。接下来，在 Bundle
    Identifier (App ID Suffix) 下输入用于匹配应用的模式。


    ***图 5-10：*** *以下是你的第一个应用 ID 的设置。正在创建一个新的应用 ID，使用匹配所有应用的模式 `*`。*


    **146**


    iPhone 应用开发：缺失的手册


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **使之正式化**


    **4. 输入 `*` 并点击 Submit。**


    返回主应用 ID 页面后，你会在描述列中看到 All Apps。


    ***注意：*** 该模式会带有一个随机生成的 Bundle Seed ID 前缀。这个前缀用于确保每个开发者的标识符唯一。同一开发者也可以用它来在多个应用之间共享安全信息，但大多数情况下你可以忽略这个前缀。'
- fmt: '# Pull them together with a profile


    Good news! You’ve created all the pieces needed for a provisioning profile—now
    it’s time to assemble them. By now, you won’t be surprised to hear that this is
    going to happen in the Provisioning Portal:


    1. On the Provisioning Portal web page, click **Provisioning** in the left column.


    This screen has several tabs. You need to worry only about the **Development**
    tab at this point.


    2. Click **New Profile** to get started.


    The first thing to do is to give the new provisioning profile a name.


    3. Since this profile is going to be used for general iPhone development, name
    it **`iPhoneDevelopment`**. Turn on all the certificates that are shown.


    If you’re an individual developer, there will be only one certificate. If you’re
    working in a team with other developers, you can add certificates for them, and
    they’ll be listed here, too.


    4. For the App ID, select **All Apps**. Turn on each of the devices you’re going
    to want to use for your internal development (Figure 5-11).


    The **Select All** link is a handy way to choose all devices.


    5. Click **Submit**.


    You end up back at the list of provisioning profiles. You’ll notice that your
    new profile’s status is **In Process**. It will take a few moments for Apple’s
    server to generate the file.


    6. Refresh your screen. The status changes to **Active**, and a **Download** button
    appears in the **Actions** column. Click **Download**.


    When complete, you’ll have a new `iPhone_Development.mobileprovision` file in
    your Downloads folder.


    At this point, you’re done with the Provisioning Portal for a while. Time to switch
    over to Xcode and add the new file to your build process.


    **147**


    ![Image 52](index-166_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Make It Official**


    **Figure 5-11:** Creating your first provisioning profile, called **iPhone Development**.
    This profile pulls together the certificate for Craig Hockenberry, can be used
    to build and run All Apps, and can be installed on the selected devices.


    ## Xcode setup


    You followed a lot of steps in the Provisioning Portal to create the provisioning
    profile. Luckily, installing it is dead simple. Just drag the `iPhone_Development.mobileprovision`
    file onto Xcode’s icon and you’re done!


    To verify that it’s been installed correctly, open the Organizer in Xcode (choose
    Window → Organizer). In the Organizer window, open the **iPhone Development**
    group in the source list, and find an item named **Provisioning Profiles**. Click
    it, and you see all the profiles that can be used by Xcode. You should see **iPhone
    Development** listed along with an expiration date. If you click the profile,
    you’ll see some additional information about it, as shown in Figure 5-12.


    ## Clean, build, and run


    You’re now ready to build and install your app on your iPhone. Make sure one of
    the devices you specified in the provision is plugged in and ready to go. You’ll
    see a green dot next to the device in the Organizer after it’s successfully connected
    to Xcode.


    **Tip:** If the device doesn’t show a green dot, select it in the Organizer, and
    you see a status message in the **Summary** tab. If you see the message “could
    not support development”, it means that Xcode could not attach to a process on
    the device. The only way to restart that process is to power-cycle the device.


    **148**


    ![Image 53](index-167_1.jpg)


    ![Image 54](index-167_2.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Make It Official**


    **Figure 5-12:** Xcode’s Organizer can display the provisioning profiles that
    are currently installed. The **iPhone Development** profile was just created using
    the Provisioning Portal. Note that the expiration date for the profile is about
    3 months from the day it was created.


    In the main project window, change the **Overview** menu in the upper-left corner
    of the window. Up until now, you’ve been using **iPhone Simulator** as the **Active
    SDK** setting. Now that you have a device that’s provisioned and connected, you
    can select **iPhone Device (Base SDK)** (Figure 5-13).


    **Figure 5-13:** Once you have your iPhone provisioned and connected to your Mac,
    you can select **iPhone Device** from the **Active SDK** menu. The numbers after
    the name indicate which version of the iPhone SDK you’re building against.


    **149**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Make It Official**


    **Note:** Setting the **Active SDK** for a device causes Xcode to generate code
    for the iPhone’s ARM processor instead of for the i386 processor in your Mac.
    You can verify this by noting the **Active Architecture** at the bottom of the
    **Overview** menu.


    After selecting the **Active SDK**, clean the project (Build → Clean). This step
    ensures that you’re working on a fresh slate. It removes any code you’ve generated
    with Code Sign errors. In the dialog box that appears, make sure both boxes are
    turned on and click **Clean**.


    And now for the moment every iPhone developer remembers fondly: installing your
    first app on the iPhone. Choose Build → Build and Run (or press ⌘-Return) to kick
    things off!


    **Note:** If you see an error about not being able to start the executable, it
    either means that your iPhone isn’t connected or that it needs to be restarted.
    Also, check that your phone is unlocked so that the home screen is displayed.


    You can watch the status line in the lower-left corner as headers are precompiled
    and source code is compiled. Toward the end of the build process, the code-signing
    process takes place. When that happens, you see a message box asking if you want
    “codesign” to access your keychain. Click **Allow**.


    Every time you run an application from Xcode, it checks the device to make sure
    that a valid provisioning profile is installed. When you dragged the profile onto
    Xcode’s icon, you installed it only in the development environment. The final
    destination for the provisioning profile is the device, and until it’s in place,
    your application won’t run. Luckily Xcode helps you: It prompts you, saying that
    it can’t run your application on the device. When you click **“Install and Run”**,
    the profile will be installed.


    You can verify that the provisioning profile was installed by using the **Settings**
    app on your phone. Tap Settings → General → Profiles, and you see a list of installed
    profiles. You see your **iPhone Development** profile along with its expiration
    date. The iPhone OS warns you when a profile is about to expire. You can also
    use this interface to delete a profile.


    Xcode’s next step is to copy your application onto the device. You see a status
    message in the lower-left corner: “Installing Safety Light.app on Kryten…” followed
    by “GDB: Running…”. Now look at your device. Congratulations, you’re now an iPhone
    developer!


    **Tip:** You can connect multiple iPhones and iPods to your Mac as an aid for
    testing. It’s easy—just connect each device to a USB port, and Xcode can use them
    simultaneously. To control where the app gets installed and debugged, select the
    appropriate device name for the **Active Executable** in the **Overview** menu.


    **150**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Make It Official**


    ## When It Fails


    Seasoned iPhone developers will tell you they spend way more time in the Provisioning
    Portal than they’d like to. The sad truth is that the whole process of signing
    code is designed to fail over time.


    As you’ve noted along the way, certificates expire, as do the provisioning profiles
    they’re attached to. Even the devices expire because of upgrades or misfortune
    (consider yourself lucky if you’ve never discovered a phone in the washing machine!).'
