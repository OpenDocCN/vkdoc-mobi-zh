    ## Introduction


    These days, there’s no shortage of books about how to develop an iPhone app. But
    to make your product a success, you need to do much more than just create great
    software.


    *iPhone App Development: The Missing Manual* takes you through the entire development
    process. You’ll learn how to write the code for a successful title on the App
    Store, but just as importantly, you’ll acquire the skills to design, test, and
    market that product.


    Unlike other books that take a dry, mechanical approach to the topic, this book
    tells the story of a real product’s development from start to finish. You’ll follow
    along as an actual iPhone developer recounts the tale using the popular Safety
    Light application as a protagonist.'
