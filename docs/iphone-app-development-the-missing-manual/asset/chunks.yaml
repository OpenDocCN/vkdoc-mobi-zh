  trans: "\n# 排版后的文档\n\n一张包含三个设置屏幕原型的照片。从左到右依次显示：一个用于颜色选择的分组表格视图、一个用于选择颜色的单一按钮，以及一个选择器控件。\n\
    \n你的第一个决定是包含一个当前设置的小型预览。这样做的原因是，如果没有它，用户将不得不在设置界面和主视图之间频繁切换。\n\n你还决定使用滑块控件来控制灯光的亮度和闪光灯的速度。将它们放在预览下方是合理的，因为它们之间关系密切。\n\
    \n你对于选择正确颜色的第一个想法是使用分组表格视图。这很合理，因为它类似于在“设置”应用的声音部分选择铃声。当你开始绘制界面时，很快发现了一个问题：当颜色超过四到五种时，界面会变得拥挤不堪。\n\
    \n**第 4 章：设计工具：制作更好的手电筒**  \n**117**  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\
    \  \n\n**技术设计：介于图片与代码之间**\n\n你希望给用户提供大约八种颜色供选择。当你在纸上尝试设计时，很明显，当用户滚动到列表底部时，预览内容将会滑出视野。\n\
    \n因此，你的下一个想法是只设置一个按钮，点击后显示另一个列表。但当你想象这个交互过程时，这个方案实际上让问题变得更糟：预览被隐藏了，而且存在大量浪费的空间。\n\
    \n当你思考其他可能的颜色选择控件时，你记起了`UIPickerView`。它将是完美的选择：具有固定大小，并且可以显示任意数量的项目。选择器视图的高度也为预览和滑块控件留出了更多空间。\n\
    \n在纸上花费的几分钟时间，让你免于编写大量最终会被丢弃的代码。现在，你拥有了两份文档，可以在与设计师和市场人员讨论界面时使用。干得漂亮！\n\n## 绘图板\n\
    \n坦白说，这个手电筒应用非常简单；界面只有两个屏幕。\n\n在更复杂的项目中，你会有更多的屏幕。回顾一下本章开头 Christian 绘图中屏幕的数量，你就会对像“Things”这样的应用的复杂性有新的认识。尽管存在这些复杂性，采用系统化的方法可以让你找到既满足用户需求，又保持一致且不增加不必要的复杂性的解决方案。\n\
    \n此时需要记住的是，设计过程永远不会结束。\n\n随着你不断与设计师、市场人员、测试版测试者和客户沟通，你刚刚制作出的图表将会发生变化。不要害怕拿出橡皮擦来改进你的设计。迭代不仅仅适用于编码！\n\
    \n## 技术设计：介于图片与代码之间\n\n但就目前而言，团队中的每个人都对设计感到满意，因此是时候开始构建它了。哦，太好了，你终于可以写代码了！但还不是现在。\n\
    \niPhone 应用设计过程的最后一步是将视觉设计转化为技术设计。你将创建带有方法的类，以实现纸上绘制的设计。考虑这些部件如何在前一章提到的模型-视图-控制器模式中协同工作是个好主意。\n\
    \n如果你忽略这个重要的步骤，你会发现最终要重写大量代码。\n\n你不需要写一本 100 页的规范书来详细描述技术需求，但你确实需要花一点时间来规划你的前进方向。\n\
    \n**118**  \niPhone 应用开发：缺失的手册  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\
    \  \n\n**技术设计：介于图片与代码之间**\n\n## 开始命名\n\n这个过程中一个很好的第一步是开始为事物命名。你可能在与团队其他成员讨论设计时已经提出了一些术语。现在是时候开始对你的应用程序各部分进行规范化命名了。\n\
    \n一个`UIViewController`通常在 iPhone 应用中管理一个屏幕的数据。由于你的产品将有两个屏幕，这是开始命名的自然起点。带有光源的视图是启动后第一个看到的，因此你决定称其为“主屏幕”。你曾想将另一个视图称为“调光开关屏幕”，但深思熟虑后，你决定称其为“设置屏幕”。\n\
    \n现在是时候思考在每个屏幕上找到的事物并为它们命名了。这时你开始考虑你将如何称呼你的模型、视图和控制器。与你的视觉设计一样，力求简洁和一致。\n\n##\
    \ 第一束光\n\n那么，主屏幕需要哪些类型的类？你需要一个视图控制器类来管理屏幕内容。该控制器将依次管理窗口顶部信息、光源和工具栏的视图类。将这些视图称为“信息视图”、“光源视图”和“工具栏”。\n\
    \n你还需要几个模型。一个将管理和持久化手电筒的当前设置，因此称其为“手电筒模型”是合理的。将应急信号发生器放入它自己的“SOS 模型”似乎也是个好主意。\n\
    \n总体而言，这些类将如图 4-7 所示组合在一起。\n\n这也是开始思考每个类需要哪些实例变量的好时机。视图控制器将拥有每个视图和模型的实例变量（以便它可以向它们发送消息）。你还需要动作来响应工具栏上的按钮按下操作：`-toggleFlasher`、`-toggleDisco`、`-startSOS`和`-showSettings`。\n\
    \n你决定在信息视图中使用两种类型的消息：一种用于信息性消息，另一种用于警报。该`type`以及`message`将作为视图的实例数据进行存储。\n\n光源视图将有一个`state`：照明状态可以是开、关或闪烁。你还希望能够控制其`brightness`和`color`，因此你将向视图添加这些属性。一个`delegate`实例变量还将允许你通过`-lightView:singleTapAtPoint:`和`-lightView:doubleTapAtPoint:`方法将触摸事件报告给控制器。\n\
    \n由于你试图模拟灯泡的物理行为，因此定义光对变化的响应速度也是有意义的。一个`envelope`将允许你改变灯光的开启（上升时间）和关闭（释放时间）速度。\n\
    \n**第 4 章：设计工具：制作更好的手电筒**  \n**119**  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\
    \  \n\n**技术设计：介于图片与代码之间**\n\n**主视图控制器**\n\n**图 4-7：**\n\n*用于手电筒主屏幕的类。三个视图和两个模型将连接到控制器。视图代表信息、光源和工具栏。手电筒和\
    \ SOS 信号的模型将通过控制器为视图提供数据。*\n\n```\nflashlightModel\nsosModel\ninfoView\nlightView\n\
    toolbar\n\nAction:\n-toggleFlasher\n-toggleDisco\n-startSOS\n-showSettings\n\n\
    Info View:\ntype\nmessage\n\nLight View:\ndelegate\nstate\nbrightness\nenvelope\n\
    color\n\nFlashlight Model:\nbrightness\nspeed\ndefaultColor\nrandomColor\n\nSOS\
    \ Model:\nelement\n\nNotify:\n-send\n\nToolbar:\nitems\n\nUpdate:\n-singleTap\n\
    -doubleTap\n```\n"
- fmt: '# 排版后的内容


    The last view, the toolbar, will have *items* consisting of buttons that send
    actions and visual separators. For the flashlight model, you’ll want to store
    and retrieve the *brightness,* *speed,* and *default color.* The disco mode will
    need a *random color,* so you’ll add an attribute for that as well. The SOS model
    will need a *method* to start sending the signal and a way to get the current
    Morse code *element* (a dot, dash, or the gap between each).


    ## The Dimmer Switch


    The settings screen will also have a view controller that sits center stage. It’s
    going to use the same flashlight model used by the main screen since you want
    the current flashlight data to be consistent across both views.


    You’ll also get to reuse the light view class from the main screen. It has properties
    like `brightness` and `color` that you can use for the preview. Objective-C and
    Cocoa Touch make it easy to write something once and use it over and over again.


    The standard slider controls will be used for the light’s brightness and flasher
    speed. Likewise, you’ll be using the standard picker view to select the color.
    The sliders will invoke the `-brightnessChanged` and `-speedChanged` methods on
    the controller. The controller will act as a delegate for the picker view and
    implement the `-pickerView:didSelectRow:inComponent:` method to track changes
    in the control.


    **120**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Where to Go from Here


    Like with the main view controller, there will be instance variables for each
    of the views and the model. Figure 4-8 shows the overall architecture of the screen.


    Settings View Controller


