    So what does it mean to resize a subview? A good question that leads to another
    control in the Size Inspector! Select `Toolbar` from the list, and press ⌘-3 to
    bring up the inspector. You''ll see an "autosizing" section in the palette. The
    control here tells the system how to compute new view dimensions when resizing
    occurs. The outer edge shows four anchor points. The inner square shows how the
    view will be stretched vertically and horizontally. When a view can be stretched,
    the anchor points define the gap between the edge of the view and the superview.
    If the view can''t be stretched, then the anchors define a relative position to
    maintain. Each of these six controls affects the final view size; if you hover
    over the control, a preview is displayed.


    The toolbar is configured to stretch its width and is anchored on all sides except
    the top. Since no pixels are between the edge of the toolbar and the light view,
    any automatic resizing keeps the control attached to the full width of the view.
    Because the toolbar is not anchored at the top, the position of the view shifts
    up if the size of the screen changes.


    `SettingsView.xib`


    When you open `SettingsView.xib` and double-click `Settings View` in the object
    list, you see something very similar to what is displayed in the application (Figure
    6-6).


    With the exception of the customized graphics in the slider controllers and the
    items in the picker view, you see the same views.


    # Chapter 6: A Flashlight for Pros


    **165**


    ![Image 60](index-184_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## NIB Files: Something to Look At


    ### Simulation Stimulation


    #### Try Resizing on for Size


    After you build your application, you should always test its resizing in the Simulator.
    You can change the orientation using the `Hardware`➝`Rotate Left` and `Rotate
    Right` menus. To get a double-height toolbar, use `Hardware`➝`Toggle In-Call Status
    Bar`.


    A common problem is seeing your toolbar pushed down onscreen. When this occurs,
    check that autoresizing is turned on for the main view and that the anchor at
    the bottom of the toolbar is set.


    When you add a new `UIView` as a subview to the main view, it''s anchored on all
    four sides and stretches in both width and height. This maintains relative placement
    within the superview: If you have a view that needs to be positioned against the
    edge of the screen, you need to update the defaults.


    **Figure 6-6:** With the exception of the custom graphics for the slider controls
    and the content of the color picker, the `SettingsView.xib` document looks very
    much like what you see in the application. The Settings View is composed of many
    subviews.


    Click the disclosure triangle to the left of the `Settings View` in the object
    list, and you see that this view is composed of many subviews.


    ### Opacity


    The order of these views is important. The first subview listed, `Light View`,
    is drawn at the bottom of the stack. Then the two image views, the picker view
    and others, are drawn on top of each other in order.


    **166**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## NIB Files: Something to Look At


    By default, views are opaque. That''s the fastest way for the iPhone to draw,
    since it doesn''t have to use an alpha channel to composite (blend) one view on
    top of another. Only the topmost view is drawn. Likewise, if you''re sure that
    the view completely fills its rectangle, you can configure it to not clear the
    area before drawing.


    These configuration parameters are listed as `Opaque` and `Clear Content Before
    Drawing` in the Attributes Inspector.


    In views that need to draw quickly, turning off transparency and not clearing
    before drawing can speed things up considerably. This is typically an issue when
    you''re drawing table views and want scrolling to be as smooth as possible. This
    simple settings view has a limited number of views, and the drawing is done infrequently,
    so transparency doesn''t affect drawing performance significantly.


    Opacity is a very important part of making sophisticated iPhone user interfaces.


    Views that are transparent make the job much simpler because you''re able to layer
    effects to produce a final result. The first example is each slider view. The
    icon images used for the minimum and maximum values have a transparent background.
    The knob and slider images are also transparent. These elements combine to create
    a slider that can be drawn on any background.


    Another example is the combination of the opaque `Light View` with a semitransparent
    `Background Image View` to produce the preview. The image view uses the image
    `SettingsBackground.png` to draw the view. When you open that image with the Finder,
    you see that it has a fully transparent hole and a partially transparent penumbra.
    This image is drawn on top of the opaque view of the light. When the `Light View`''s
    color changes, it forces the view layers above to recompose and produce a new
    image onscreen. This produces the effect of light being cast on a surface without
    any complicated drawing.


    **Tip:** You can open any file in an Xcode project in the Finder by Control-clicking
    (or right-clicking) the file name in the Groups & Files list and choosing `Open
    With Finder` from the shortcut menu. You can also choose the `Reveal in Finder`
    item to open the folder that contains the file.


    For an image file, `Open With Finder` will display the graphic in the Preview
    application. If you''re viewing a lot of files with transparency, you may want
    to adjust the Window background color using `Preview`➝`Preferences`➝`General`.


    ### The Sliders


    One final thing to note in this NIB file is the slider configuration. The `Brightness
    Slider` is set to update continuously, while the `Speed Slider` is not. This configuration
    is done using the `Continuous` checkbox in the Attributes Inspector (⌘-1).


    Sometimes you want to update your controller (and models) as the user drags the
    slider. Other times that continuous update can cause performance or visual problems.
    When the `Speed Slider` is updating continuously, the flashing becomes erratic,
    so it was turned off.


    Chapter 6: A Flashlight for Pros


    **167**


    ![Image 61](index-186_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## NIB Files: Something to Look At


    ### `AboutView.xib`


    Hey—this NIB isn''t a part of the original plan! You''re a developer—you know
    that plans change. As you were developing the product, it became apparent that
    you needed a place to promote your business. As you were beta testing, you also
    found that it was really handy to have a place to display the beta version number.
    And once you saw how easy it was to add a controller and views, it took only a
    short time to implement this new About View (Figure 6-7).


    **Figure 6-7:** This figure shows an About View that contains credits, promotional
    information, and the application''s version number.


    **Tip:** This new NIB file might also be a place for your humble author to add
    a few more cool examples, too.


    Most of the view consists of labels with text describing the product. One of those
    views, the `Version Label`, is connected to the `-versionLabel` outlet in the
    controller. This way, the version number can be updated automatically. You''ll
    see how that works when the tour passes by the `AboutViewController` class (page
    204).


    Another interesting view in this NIB is the `Close Button`. Take a look at its
    size in the inspector: It''s a whopping 320 × 460 pixels, and it covers the entire
    screen!


    That button lets the user tap anywhere on the screen and send the `-close` action
    to the controller. It shows that buttons don''t necessarily have to show any visible
    text or image to be effective. You can use transparent buttons to act as hit detectors
    on an image, for example.


    **168**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


