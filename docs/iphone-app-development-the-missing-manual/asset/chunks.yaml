    # 现在你已手握设计方案和行动计划，终于到了打开 Xcode 开始实现创意的时刻！乐趣就此展开！


    ## 第 5 章：认真对待开发工作


    ### 认真对待开发工作


    拿着设计文档，你已经准备好打开文本编辑器大干一场了！第 1 章曾带你快速了解 Xcode 开发环境。现在，你将深入探索项目文件的诸多细节，并学习如何根据自身需求进行配置。


    你还将学习如何设置工作区，以便将你的应用安装到 iPhone 上。这是一个复杂的过程——配置涉及数字证书和一个用于生成允许应用运行文件的 Apple 网站——但本章的分步指导将帮你顺利完成。


    在本章及下一章中，你会多次看到一个名为 Flashlight Pro 的项目。建议你将其作为参考材料放在手边。如果你还没有从 Missing CD 页面（`www.missingmanuals.com/cds`）下载它，现在正是好时机。


    ### 超越模板


    每个项目最初都基于你在第 18 页看到的某个模板。这些模板本质上是通用的，但你的项目是独特的。因此，你将首先修改代码和配置文件，以满足产品的需求。


    在本节中，你将熟悉实际项目中的基本设置，并开始思考如何着手开发你的新手电筒应用。


    你迫不及待地想开始编码，但你也知道，使用新软件时总需要一些初始设置，尤其是当这是你在 Xcode 中的第一个项目时！


    ### 超越模板


    #### 选择你的 SDK


    你需要做的首要决定之一，是选择为哪个版本的 iPhone SDK 编写代码。由于 iPhone 版 OS X 底层固件的差异，不同版本拥有不同的功能。


    通常，一个明智的做法是选择包含你实现产品所需功能的最老 SDK 版本。如果你选择最新最好的版本，你将无法向那些尚未升级操作系统的用户销售产品。虽然升级过程很简单，但许多客户升级新版本的速度较慢。


    从开发角度来看，iPhone API 最重大的变化通常发生在主版本更新时。例如，当 2.2.1 固件升级到 3.0 版本时，新版本引入了数百项新功能，包括复制粘贴、语音备忘录、彩信支持等。而
    3.1 更新仅带来了少量新功能。


    当 Apple 不可避免地发布 4.0 固件时，它无疑将包含许多出色的新功能。届时，Cocoa Touch 很可能会提供新的 API（第 15 页）供你在应用中使用。因此，即使你现在像大多数开发者一样决定以
    3.0 为目标，当你想要跟随客户转而瞄准下一个主版本时，也不必感到惊讶。


    ***注：*** *API* 是“应用程序编程接口”的缩写。Apple 和开发者都将其作为一个涵盖 SDK 中可用类和方法的统称。


    每次 iPhone 软件发布新版本时，都会发布一份“API 差异”文档，其中列出你可在应用中使用的类和方法的新增与更改内容。你可以使用文档查看器来查找和核对这份列表。


    #### 更改项目设置


    选定要为之编写的 iPhone 固件版本后，你需要在项目文件中配置该信息。为此，请确保你的 Xcode 项目已打开，然后通过 `Project` ➝ `Edit
    Project Settings` 查看设置。

    '
- fmt: 'You see the `Project Info` window (Figure 5-1), which has the “Base SDK for
    All Configurations” setting at the bottom. From the pop-up list, choose `iPhone
    Device 3.0` (or whatever firmware version you’re working with).


    Beyond the Template


    Figure 5-1: Here’s the `Project Info` window for `FlashlightPro`. The most important
    setting here is the `Base SDK` (A), which specifies the minimum firmware requirement
    for your app. You can also configure your organization name (B) and source code
    management system (C) here.


    For the most part, you won’t need to alter any of the other settings in that window.
    You may want to change the `Organization Name` to your own company name. If you’re
    using a source code management (SCM) system, you may also want to configure it
    here. The Appendix includes information on how to set up the `Subversion` SCM
    and `Xcode`.


    **Note:** The project settings also have build information. You’ll learn more
    about this important tab on page 132, after you’ve explored the target and its
    settings.


    ### Change Target Settings


    `Xcode` uses *targets* to define the set of instructions for building a final
    *product* using the files in the projects. Each target has its own name, steps
    used to create the application, and properties used to identify and then launch
    the application. When you create a new project, `Xcode` creates a default target
    with values for each of these items.


    These default settings are fine for getting your project off the ground, but you’ll
    eventually want to modify them. To do so, go to `Xcode` ➝ `Project` ➝ `Edit Active
    Target`.


    #### What’s in a name?


    The `Target Info` window that appears has five tabs. The first tab, `General`,
    has a `Name` field, where you type the name of the product that you’ll produce
    with the target—the name that appears on the iPhone’s home screen.


    **Note:** Many developers call the iPhone’s home screen the *Springboard*. During
    the Jailbreak days, many people discovered that `Springboard` is the name of the
    hidden application that manages the launching of other applications. Even though
    you’ve never seen it, you’ve used `Springboard` thousands of times.


    The first name you use for the project will rarely be your final product’s name.
    For example, you might use a code name to avoid revealing what your app does until
    you’re ready to release it. Or you may not know what the final product’s name
    will be until late in the development cycle. Such was the case with the `Flashlight
    Pro` project: Marketing didn’t decide on the name “Safety Light” until a few weeks
    before shipping.


    Unlike most last-minute changes from marketing, this one is easy to deal with.
    Just change the target’s `Name` field from `Flashlight Pro` to `Safety Light`
    and rebuild the app (Figure 5-2).


    #### Identify yourself


    Another change you should make is in the `Properties` tab. Each application on
    your iPhone has a unique identifier that the OS uses to manage it. In a new app,
    the `Identifier` is filled with `com.yourcompany.${PRODUCT_NAME:rfc1034identifier}`.
    You need to edit this identifier to make it unique.


    To make sure that your identifier is unlike any other, use the *reverse domain
    name* technique. In other words, if your domain name is `iconfactory.com`, then
    you use `com.iconfactory` for the first part of the identifier instead of `yourcompany.com`.


    The second part of the identifier uses the `Name` you entered in the `General`
    tab by means of the `PRODUCT_NAME` environment variable. As discussed on page
    239, the product name is likely to change, and when it does, you end up with a
    duplicate application on your home screen. This ends up confusing you and everyone
    else on the project, so go ahead and pick a unique name now.'
