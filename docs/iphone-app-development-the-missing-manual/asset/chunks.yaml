- fmt: 'Once you have the iPhone SDK disk image, you can begin the installation:


    1.  **Double-click the “iPhone SDK” file to start the installation process.**
    It’s the brown and gold box icon.

    2.  **Click Continue on the welcome and license agreement screens.**

    3.  **Click Agree to accept the license.**

    4.  **On the Install screen, click Continue to install the standard packages,
    and then click Install to start the installation process.**

    5.  **If required, enter your password so system files can be modified.**

    6.  **It’s also a good idea to quit iTunes at this point to avoid a dialog box
    that pauses the install.**


    Depending on your Mac’s speed and the size of the download, the installation process
    can take anywhere from half an hour to several hours. When the installation is
    finished, you’ll see a green checkmark and can click Close to finish. At this
    point you can eject the iPhone SDK disk, but keep the `.dmg` file around as a
    backup.


    > **Note:** As with Xcode, Apple updates the iPhone SDK regularly. You’ll need
    to return to this iPhone Dev Center periodically to install the latest version
    of the SDK. Apple typically releases a new version in conjunction with a new iPhone
    firmware release.


    ## What Lies Ahead for the SDK?


    The iPhone SDK is constantly evolving as Apple fixes bugs and adds new features.
    You’ll want to update your development environment to keep up with the latest
    changes. Apple updates the iPhone SDK in two different ways. The first, and simplest,
    is a maintenance release. These releases just fix bugs in the firmware and don’t
    introduce any new features. In most cases, you won’t need to make any changes
    to your application.


    Apple provides maintenance releases of the SDK to developers on the same day that
    it makes the firmware available to customers. These releases have a three-part
    version number like 2.2.1 and 3.1.3. As soon as you install the new firmware on
    your device, you need to update the iPhone SDK so you can install and debug your
    applications from Xcode. If you don’t, you’ll see warnings that the tools don’t
    support the device’s firmware version.


    When Apple makes more substantial firmware changes that will affect developer
    software, either by adding new features or changing existing ones, it posts a
    beta version of the iPhone SDK on the iPhone Dev Center. Only developers who have
    paid to join the iPhone Developer Program have access to these advance releases.
    (Page 30 explains how to enroll in this developer program.) These betas are for
    major releases, such as 3.0 or 4.0, or revisions like 3.1. Apple typically starts
    the beta release cycle three or four months prior to a general public release.
    Once the cycle starts, it puts out a new SDK (called Beta 1, Beta 2, and so on)
    every couple of weeks.


    These beta releases usually also include a new version of Xcode with improvements
    and support for the new iPhone OS, along with new firmware. With early access
    to the new SDK, you can build and run your application with the new iPhone firmware.
    If you’ve been careful to use only documented features and APIs, you shouldn’t
    have many issues to deal with: Apple’s engineers are very good at maintaining
    compatibility with published interfaces. You may see deprecation warnings as you
    compile, but those are usually simple to fix. It’s more likely that you’ll spend
    the beta test period learning about new features and testing them out in your
    application.


    There are a couple caveats to keep in mind when installing a beta version of the
    iPhone SDK. First, you can’t use the beta tools to submit an application to the
    App Store. Luckily, you can install multiple versions of Xcode on your hard drive.
    To install the tools in a separate location, follow these steps:'
