    **Show Your id**


    • Arrays can use selectors to control sorting behavior. You can also use selectors
    when you want to send the same message to every item in the collection.


    • If you want to keep track of when a view is animating, you can specify a cal
    back method with a selector.


    • You can configure timers with a selector that runs code after a delay or at
    repeated intervals.


    • Objects register for system-wide notifications by specifying a method via a
    selector.


    • You can use selectors to specify which method in an object initializes a new
    thread.


    The number of colons in a selector’s name is *real y* important. While *@selector*
    *(moreAwesomeThanEver)* and *@selector(moreAwesomeThanEver:)* look similar, they
    have different method signatures. The first case is a method that takes no parameters,
    and the second case takes one parameter because it has a colon at the end.


    If you’ve ever spent hours tracking down a stray semicolon in C code, finding
    a missing colon in a selector is the same sort of thing. Your eyes fool you into
    thinking that the code looks right, even when the runtime knows it’s not.


    ***Tip:*** When you see crashes in *objc_msgSend,* it’s often the Objective-C
    runtime telling you that it can’t find a method implementation. If you type your
    *@selector* incorrectly, that will be the cause. Make sure that the object has
    an implementation for the method being used.


    **Show Your *id***


    **Sometimes you need to refer to an object without knowing its class. It’s convenient
    to reference an object just by its memory address without any type information.


    You’ve already seen one of these anonymous pointers on page 50:


    - **(id)**init {


    Objective-C defines *id* as a pointer to an object data structure. (It’s much
    like a *void* pointer in C, except that the pointer is only used to reference
    objects.) So why does the *–init* method return this generic type? Because you
    have no guarantee what class of object the superclass will return to you:


    if (self = **[super init]**) {


    During initialization, objects are in a state of flux, so their class is purposely
    ignored and considered subject to change. Using a type of *id* expresses the object’s
    lack of identity.


