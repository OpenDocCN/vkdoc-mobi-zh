- fmt: "生成的 Info.plist 文件被重命名并放置在你的应用程序的可执行文件夹中。每个应用程序都包含此文件，因此 `Springboard` 拥有管理、显示和启动你的应用所需的所有信息。要移除\
    \ Apple 的倒角效果，你需要手动深入编辑 `Info.plist` 文件。\n\n要手动编辑应用程序的属性，请按以下步骤操作：\n\n1.  在目标的“属性”面板底部，点击“**以文件形式打开\
    \ Info.plist**”。\n    一个编辑器窗口将打开，允许你直接编辑 `Info.plist` 的值。\n    > **提示：** 你也可以在项目窗口中，通过点击“资源”组下的\
    \ `Flashlight_Pro-Info.plist` 文件来打开此编辑器。\n\n2.  选择列表中的最后一行，该行的末尾会出现一个“**+**”按钮。\n\
    \    一个新的属性被添加。\n\n3.  从列表中选择“**Icon already includes gloss and bevel effects**”。\n\
    \    你会看到一个未选中的复选框作为其值。\n\n4.  点击复选框并保存文件。\n    下次构建并安装目标时（从而让 `Springboard` 有机会读取新的值），光泽和倒角效果就会被移除。\n\
    \n你可能已经注意到属性列表中可用的键列表非常长。有些键，比如“`Status bar style`”，多少有些道理，而其他键，如“`Application\
    \ uses Wi-Fi`”，则不然。单行描述无法帮助你理解配置值的使用方式。要了解更多，你需要更进一步。\n\n`Info.plist` 中的数据实际上是\
    \ XML，你可以像编辑其他源代码一样编辑它。要这样做，请在项目列表中按住 Control 键并点击该文件。在出现的菜单中，选择“**Open As ➝ Source\
    \ Code File**”。\n> **提示：** 如果鼠标有右键，你可以右键点击文件并看到相同的菜单。\n\n一旦你打开了 `Flashlight_Pro-Info.plist`，你可以看到“`Status\
    \ bar style`”的键是`UIStatusBarStyle`，其值是`UIStatusBarStyleBlackOpaque`：\n\n```xml\n\
    <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist PUBLIC \"-//Apple//DTD\
    \ PLIST 1.0//EN\"\n  \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">\n<plist\
    \ version=\"1.0\">\n<dict>\n...\n<key>UIStatusBarStyle</key>\n<string>UIStatusBarStyleBlackOpaque</string>\n\
    <key>UIPrerenderedIcon</key>\n<true/>\n</dict>\n</plist>\n```\n\n快速搜索文档会得到一个名为\
    \ *UIKit Keys* 的文档，该文档解释了此设置及其他设置。这个特定的键配置了应用程序以黑色状态栏启动，以匹配应用程序其余部分的外观。你还可以看到，图标光泽的复选框设置的键是`UIPrerenderedIcon`。\n\
    \n当你查看此 XML 的其他部分时，你会看到一个名为`CFBundleVersion`的键，其中包含你应用程序的版本号。尽管这个值不会由 `Springboard`\
    \ 显示，但你可以在自己的应用程序中显示它（请参阅下一章的第 204 页）。\n\n### 构建设置\n\n当你探索项目和目标设置时，你会注意到两者都包含一个“构建”选项卡。你的第一个问题是，“这些设置是什么？”简而言之，它们告诉\
    \ Xcode 你要创建什么以及如何创建。\n\n当你滚动浏览设置列表时，列出的项目数量可能会让你不知所措。别担心；你只需要更改少数几个默认值。你将在第 264\
    \ 页详细了解如何更改“代码签名”值，以便将编译后的应用程序放到你的 iPhone 上。\n> **提示：** 当你点击一个项目时，会看到每个设置的简短描述。例如，如果你在“Packaging”下点击“Product\
    \ Name”，你会看到该值用作生成产品的基本名称。方括号中的值显示了该设置的环境变量：`[PRODUCT_NAME]` 提示你`${PRODUCT_NAME}`将被替换为此值。括号中的值还会显示编译器和链接器标志（如果适用）。\n\
    \n*配置*"
  raw: 'The resulting file is renamed Info.plist and placed in your application’s
    executable folder. Every application includes this file, so Springboard has all
    the information it needs to manage, display, and launch your app. To remove Apple’s
    Bevel effect, you’ll dig in and edit the Info.plist manual y, of course!


    To edit your app’s properties manual y, follow these steps:


    **1\. At the bottom of the target’s Properties panel, click “Open Info.plist as
    File”.**


    An editor window opens that lets you edit the Info.plist values directly.


    ***Tip:*** You can also open this editor in the project window by clicking the
    Flashlight_Pro-Info.plist file under the Resources group.


    **2\. Select the last line in the list, and a “+” button will appear at the end
    of the** **line.**


    A new property is added.


    **3\. Select “Icon already includes gloss and bevel effects” from the list.**


    You’ll see an unchecked box as the value.


    **4\. Click the checkbox and save the file.**


    The next time you build and install the target (thereby giving Springboard a chance
    to read the new values), the gloss and bevel are removed.


    You probably noticed that the list of keys available in the property list was
    quite long. Some of the keys, like “Status bar style”, sort of make sense, while
    others like “Application uses Wi-Fi” don’t. The one-line description doesn’t help
    you understand how the configuration value is used. To learn more, you need to
    go a step deeper.


    The data in Info.plist data is actual y XML, and you can edit it like the rest
    of your source code. To do so, press Control and click the file in the project
    list. In the menu that appears, select Open As➝Source Code File.


    ***Tip:*** If you have a mouse with a right button, you can right-click the file
    and see the same menu.


    Once you have Flashlight_Pro-Info.plist open, you can see that the key for “Status
    bar style” is *UIStatusBarStyle* and that its value is *UIStatusBarStyleBlackOpaque*:


    <?xml version=″1.0″ encoding=″UTF-8″?>


    <!DOCTYPE plist PUBLIC ″-//Apple//DTD PLIST 1.0//EN″


    ″http://www.apple.com/DTDs/PropertyList-1.0.dtd″>


    <plist version=″1.0″>


    <dict>


    Chapter 5: Getting Serious about Development


    **131**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Beyond the Template**


    . . .


    <key> **UIStatusBarStyle**</key>


    <string> **UIStatusBarStyleBlackOpaque**</string>


    <key>UIPrerenderedIcon</key>


    <true/>


    </dict>


    </plist>


    A quick search of the documentation results in a document called *UIKit Keys*
    that explains this and other settings. This particular key configures the application
    to launch with a black status bar that matches the look of the rest of the application.
    You can also see that the checkbox for icon shine has the setting key of *UIPrerenderedIcon.*


    While you’re looking at other parts of this XML, you’ll see a key named *CFBundleVersion*
    that contains the version number for your app. Even though this value isn’t displayed
    by Springboard, you can display it within your own app (see page 204 in the next
    chapter).


    Build Settings


    As you explore both the Project and Target settings, you notice that both contain
    a Build tab. Your first question is, “What are these settings?” Simply put, they
    tell Xcode what you’re going to create and how to do it.


    As you scroll through the list of settings, the number of items that are listed
    may overwhelm you. Don’t worry; you’ll only need to change a handful of these
    default values. You’ll see how to do so in detail on page 264 when you change
    the Code Signing values so you can put your compiled application on your iPhone.


    ***Tip:*** You’ll see a short description of each setting when you click an item.
    For example, if you click Product Name under Packaging, you’ll see that this value
    is used as the base name of the product generated. A value in brackets shows the
    environment variable for the setting: *[PRODUCT_NAME]* is your clue that *${PRODUCT_NAME}*
    will be replaced with this value. The bracketed value also shows a compiler and
    linker flags if applicable.


    *Configurations*'
