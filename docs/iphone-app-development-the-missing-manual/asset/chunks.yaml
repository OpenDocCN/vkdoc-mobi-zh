    That’s all there is to an iPhone app. And things get even better when you realize
    that views and controllers in the frameworks already do most of the hard work.
    Even the creation of model objects is simplified with the help of Cocoa Touch.


    So what are the roles of each of these object types? Read on.


    Views


    You know all those buttons, scrolling lists, web browsers, and everything else
    that appears on your iPhone screen? Those are all *views.* Views know how to present
    your application’s data. Some views also know how to react to user input. A *UIButton*
    view responds to a user’s touch. A *UITextField* view takes input from the virtual
    keyboard.


    In many applications, you’ll create your own views for displaying specific data.
    For example, there’s no standard widget for displaying stock graphs, so if you
    want to do that, you’ll have to come up with your own solution.


    Likewise, many designers and developers want to customize the look of their application.
    Whether your motivation is product branding or just wanting to stand out in a
    crowd, creating a unique look for your app involves building new views based on
    standard *UIView* and *UIControl* classes.'
  trans: "\n***提示：*** 如果你想跳过这个预览窗口，直接跳转到文档窗口，可以按住 `Option-⌘` 并双击符号名称。\n\n要查找定义，可以先按住\
    \ `⌘` 键并双击名称。如果找到多个匹配项（这在方法名称中很常见），系统会在显示 `@interface` 或 `@implementation` 之前，为你展示一个选项列表。\n\
    \n如果你和大多数 iPhone 开发者一样，很快就会在不知不觉中习惯使用鼠标和这两个按键。\n\n## 学会“偷懒”\n\n又提到了那个以 *L* 开头的词。但事实是，借助\
    \ Cocoa，大量优秀的代码已经为你写好了。刚入门时，你自然会有一股自己动手写代码的冲动，尤其是在学习一门新语言，想要一展身手的时候。当你产生这种冲动时，不妨花点时间打开文档做些研究。\n\
    \n如果你找到了接近你需求的现有功能，尝试使用类别（Category）来扩展现有类。如果行不通，再尝试创建子类并添加新功能。\n\n如果以上方法都失败了，再从头开始实现你自己的类。\n\
    \n遵循这个建议，现在该进入下一章了。在那里，你将开始学习一些你可以随时调用的优秀代码。\n\n---\n\n**64**\n\niPhone 应用开发：缺失的手册\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n---\n\n# Cocoa Touch：让 Objective-C\
    \ 发挥作用\n\n现在你已经对 Objective-C 有了初步了解，是时候让这门语言真正发挥作用了。如果你把 Objective-C 看作是构建应用程序的“胶水”，那么接下来你将探索构建模块——即\
    \ Cocoa Touch 框架的各个部分——它们将通过你手中的新“胶水”拼接在一起。\n\n在开始粘合 Cocoa Touch 框架的各个组件之前，你需要先了解一下苹果工程师推荐的架构和设计模式。正如了解正确的建筑材料如何协同工作才能盖好房子一样，熟练掌握这些框架能让你构建出更\
    \ robust 的应用程序，并节省时间。\n\n你还将学习到哪里可以找到关于 Cocoa Touch 的更多信息。网络和你最喜欢的书店里有大量资源，可以帮助你提升\
    \ iPhone 开发技能。\n\n## 进入 Cocoa Touch 的世界\n\nCocoa Touch 框架非常庞大，有成百上千个类供你使用。学习如何使用这个丰富的组件库需要时间。完成这项艰巨任务的最佳方法是学习这些框架所实现的常见设计模式和功能。\n\
    \n在接下来的章节中，你将看到 Cocoa Touch 如何使用模型、视图和控制器（MVC）来实现你的应用程序。你还会看到如何使用“目标-动作”设计模式来将可视化组件连接到执行实际工作的代码上。在此过程中，你将了解到委托（Delegation）是如何成为一种强大的机制，来利用系统框架中的代码。当然，你还会学习如何管理数据对象和集合，以及一些更重要的设计模式。\n\
    \n---\n\n**65**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n---\n\n\
    ## 三巨头：模型、视图、控制器\n\n### 幕后：名称里有什么？\n\n你可能听说过“Cocoa Touch”这个词，它用来描述 iPhone 上的编程环境。但它到底是什么呢？\n\
    \n严格来说，Cocoa Touch 只是两个框架，它们为你的应用提供了最重要的构建模块：\n\n-   **Foundation 框架。** 该框架为你提供主要的构建模块。在这个框架中，你可以找到管理数据的类（如\
    \ `NSString`、`NSNumber` 和 `NSDate`）、读写信息的类（`NSFileManager`、`NSUserDefaults`）、与网络通信的类（`NSURLConnection`）等等。\n\
    -   **UI Kit 框架。** 每个应用程序都会有窗口、视图、按钮和其他界面元素。`UIKit` 框架提供了让用户与你的作品进行交互的各种组件。你可以在\
    \ Interface Builder 的库面板中看到这些类。\n\n开发者有时会用“Cocoa Touch”这个总称，来涵盖与基础框架协同工作、共同构建应用的其他开发技术。在构建应用程序的过程中，你会用到许多其他的辅助框架。最常用的一些包括：\n\
    \n-   **Core Graphics。** 一个基于 C 语言的绘图 API（使用 Quartz 渲染引擎）。这个底层框架提供了绘制矢量路径和位图、二维坐标变换与遮罩、颜色和图像管理等函数。\n\
    -   **OpenGL ES。** 另一个基于 C 语言的接口，用于加速 2D 和 3D 图形的渲染。其实现符合 OpenGL ES 1.1 和 2.0\
    \ 规范。\n-   **Core Animation。** 这个 Objective-C API 提供了基于图层对 2D 图像层级进行复杂合成和动画处理的类。这个高级框架大大简化了你的代码，并提升了用户体验。它的一个附带好处是通过利用\
    \ OpenGL 等底层 API 提升了性能。\n-   **Core Data。** 这个复杂的框架能以透明的方式将对象图持久化存储在 XML 或 SQLite\
    \ 文件中。Xcode 提供了用于描述对象及其关系的工具。这些工具可以使用谓词（Predicates）来获取对象，并使用描述符（Descriptors）对它们进行排序。\n\
    -   **Core Audio。** 一组用于播放、录制、处理和转换音频的框架。\n\n你可以在文档查看器中搜索这些名称，来了解更多关于这些构建模块的信息。\n\
    \n## 三巨头：模型、视图、控制器\n\nCocoa Touch 提供了数百个对象类需要你掌握。幸运的是，这些类中的大部分可以归为三类。并且这些类别中的对象会以一种简单且定义良好的方式相互交互。\n\
    \n每个 iPhone 应用都使用一个简单的模型-视图-控制器设计模式。由于开发者写文档和写代码时一样“偷懒”，你经常会看到这个模式被简称为“MVC”。\n\
    \n***注意：*** 如果你使用过其他语言和开发环境，你会很高兴地发现，Cocoa 中的 MVC 与你过去使用的并无不同。对象变了，但概念没变。\n\n\
    ---\n\n**66**\n\niPhone 应用开发：缺失的手册\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n---\n\n## 三巨头：模型、视图、控制器\n\n要了解这种设计的简洁性，请看图 3-1。\n\n```\n用户操作\n   |\n   v\n 控制器\n\
    \   |\n   +----> 模型 (更新)\n   |\n   +----> 视图 (更新/通知)\n```\n\n***图 3-1：*** *此图展示了模型、视图和控制器如何协同工作，具体说明见后续页面。*\n\
    \n一个 iPhone 应用的全部精髓就在于此了。更棒的是，你会发现框架中的视图和控制器已经完成了大部分繁重的工作。就连模型对象的创建，也在 Cocoa Touch\
    \ 的帮助下得以简化。\n\n那么，每种对象类型的角色分别是什么呢？请继续阅读。\n\n### 视图\n\n你知道 iPhone 屏幕上所有的按钮、滚动列表、网页浏览器以及其他所有元素吗？它们都是*视图*。视图知道如何展示你的应用程序数据。有些视图还知道如何响应用户的输入。一个\
    \ `UIButton` 视图会响应用户的触摸。一个 `UITextField` 视图则接收来自虚拟键盘的输入。\n\n在许多应用中，你需要创建自己的视图来显示特定数据。例如，没有标准的\
    \ widget 来显示股票走势图，所以如果你想实现这个功能，就必须自己想出解决方案。\n\n同样，许多设计师和开发者希望自定义其应用的外观。无论你的动机是品牌推广还是只想在众多应用中脱颖而出，为你的应用创建独特外观都涉及基于标准的\
    \ `UIView` 和 `UIControl` 类来构建新的视图。\n"
- fmt: "# Creating Views\n\nCreating views isn’t as hard as it sounds. Using subclasses\
    \ of existing views, you have to do little more than customized drawing. And if\
    \ you’re building composite views, which combine several views into a single view,\
    \ your only work is managing the layout of the subordinate views.\n\n# Models\n\
    \nModels are your application’s heart and soul because they’re responsible for\
    \ managing its data. Unlike views, models know nothing about the actions the user\
    \ is performing or what they’re seeing on the display. A model’s only function\
    \ is to manipulate and process the user’s data within the application. Models\
    \ often implement internal logic that provides these basic behaviors.\n\nFor example,\
    \ whenever you use the built-in Contacts application, you’re working with model\
    \ objects that represent the people in your address book. If you update your application’s\
    \ settings, you’re modifying another kind of model object. An application that\
    \ downloads stock data from the Internet would use a model object to store the\
    \ price history.\n\nSome model objects work across multiple applications: The\
    \ contacts and user defaults (settings) databases are good examples. Other models,\
    \ such as those used by a stock application, are application specific.\n\nMany\
    \ model objects get stored permanently in files or databases. This setup is called\
    \ *object persistence* and lets you recreate the state of your application across\
    \ multiple launches. Even if you don’t persist your objects, models can be very\
    \ helpful when dealing with in-memory data structures.\n\nWhen you’re building\
    \ your own models, you’ll often use Cocoa Touch classes in the implementation.\
    \ For example, classes like `NSArray` and `NSDictionary` let you store data in\
    \ ordered lists or hash tables. You’ll also find that classes like `NSURLConnection`\
    \ and `NSData` help you retrieve and store data from a network.\n\nFinally, you\
    \ can use the Core Data framework to store and retrieve objects in an SQLite database.\n\
    \n# Controllers\n\nControllers are a little more complicated. They act as an intermediary\
    \ between the view objects and the model objects. When a value changes in a model,\
    \ the controller is responsible for updating the view. Likewise, the controller\
    \ knows when there’s some user input and can update the model data accordingly.\n\
    \nYour controllers let you transfer information between models and views. In Figure\
    \ 3-1, you can see that the controller is the only block that includes all the\
    \ arrows (messages). Like a conductor in an orchestra, it’s the one in charge.\n\
    \nTo give you an idea of how this works, imagine an application that plots stock\
    \ prices:\n\n1. The user clicks a button (view) to refresh the graph. This action\
    \ is sent to the controller.\n2. The controller, in turn, tells the model to load\
    \ new stock data.\n3. The model opens a network connection and begins downloading\
    \ data.\n4. After the stock data is loaded, the model notifies the controller\
    \ that new data has arrived.\n5. The controller passes the new data onto the view,\
    \ and the user sees the results.\n\n**Note:** The models and views don’t communicate\
    \ directly because if they did, your application would get much more complicated\
    \ as you add more objects. You’d have problems when multiple views share the data\
    \ from one model, or a single view updates multiple models. Small changes in one\
    \ class would ripple into others, classes would be increasingly dependent on each\
    \ other, and you’d have a hard time reusing code. Developers refer to that as\
    \ a *tightly coupled design*, and it’s a good idea to avoid it.\n\nController\
    \ objects are often responsible for setup tasks. The models and views must be\
    \ loaded and initialized at some point, and the central role of the controller\
    \ makes it a natural candidate for this work.\n\nCocoa Touch gives you specialized\
    \ view controller classes to handle this separation of responsibilities. As you\
    \ develop your iPhone app, you’ll find that much of the code ends up residing\
    \ in these controller classes.\n\nIn particular, view controllers are used heavily\
    \ in navigation. Some examples are:\n\n- When you tap on a single row in a list\
    \ and a new view slides into place, you’ve just created a new view controller.\
    \ Likewise, when you tap the Back button, the current controller is discarded\
    \ and replaced with the previous one.\n- If you tap the button to compose a new\
    \ mail message, a new modal view controller is created; its view slides up from\
    \ the bottom of the screen and is displayed until you tap Cancel or Send.\n- When\
    \ you tap on the Info icon in the Weather app, a new view controller is flipped\
    \ into place and lets you enter a new city. When you tap Done, that view is replaced\
    \ by the main view.\n\nThe `UIViewController` class and several subclasses perform\
    \ these basic functions. If you must master one class before any others, this\
    \ one is it.\n\n# Value Objects\n\nWhen you’re building your own model, view,\
    \ and controller classes, you’ll often have to choose how to store data within\
    \ those classes. Since Objective-C is built on top of C, all the primitive data\
    \ types are available. The question is, then, whether to use integers, floating-point\
    \ numbers, and character arrays or to use a class that wraps those same primitive\
    \ values in an object.\n\n## Let’s Get Primitive\n\nThere’s no harm in using a\
    \ primitive type in your object’s instance variables. In fact, it can often make\
    \ things much easier for your implementation, because you don’t have to worry\
    \ about retaining and releasing objects. For example, if you’re just keeping track\
    \ of a counter, you don’t need to add the overhead of an object.\n\n**Tip:** One\
    \ of the most important counters in Cocoa, the `retainCount` in `NSObject`, is\
    \ defined as an unsigned integer (`NSUInteger`). Although the keywords `NSInteger`\
    \ and `NSUInteger` look like they could be class names, they’re really just type\
    \ definitions used throughout Cocoa Touch.\n\n```objectivec\ntypedef int NSInteger;\n\
    typedef unsigned int NSUInteger;\n```\n\nOther examples of commonly used type\
    \ definitions are `NSRange`, a structure that defines a range of data, and `NSTimeInterval`,\
    \ a floating-point value that represents a period of time.\n\nInstance variables\
    \ that use primitive types are defined a little bit differently than instance\
    \ variables of objects. Since there’s no retain or copying involved, they’re defined\
    \ with the `assign` attribute for the `@property`. For example, if you had decided\
    \ to use an `NSUInteger` instead of an `NSNumber` in the last chapter’s `AwesomeString`\
    \ class, you’d have an interface that looks like this:\n\n```objectivec\n@interface\
    \ AwesomeString : NSString\n{\n    NSUInteger exclamationCount;\n    NSString\
    \ *originalString;\n}\n@property (nonatomic, assign) NSUInteger exclamationCount;\n\
    @property (nonatomic, copy) NSString *originalString;\n- (NSString *)awesomeString;\n\
    @end\n```\n\nIn the implementation the code in the `–init` method changes the\
    \ initial assignment from a value object:\n\n```objectivec\nexclamationCount =\
    \ [[NSNumber numberWithInt:8] retain];\n```\n\nYou can simplify the code by assigning\
    \ a primitive value:\n\n```objectivec\nexclamationCount = 8;\n```\n\nIn the `–dealloc`\
    \ method, you also don’t need to release the `exclamationCount`. Using a primitive\
    \ value has made your code much simpler and doesn’t sacrifice any functionality.\
    \ Until written languages start allowing you to put 8.5 exclamation points at\
    \ the end of a sentence, this code will work great!\n\n## Objectified\n\nNow that\
    \ you’ve seen an example of value objects not being necessary, why would you ever\
    \ want to use them? For two primary reasons:"
