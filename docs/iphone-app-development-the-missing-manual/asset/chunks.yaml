    the code ends up residing in these controller classes.


    In particular, view controllers are used heavily in navigation. Some examples
    are:


    • When you tap on a single row in a list and a new view slides into place, you’ve
    just created a new view controller. Likewise, when you tap the Back button, the
    current controller is discarded and replaced with the previous one.


    • If you tap the button to compose a new mail message, a new modal view controller
    is created; its view slides up from the bottom of the screen and is displayed
    until you tap Cancel or Send.


    • When you tap on the Info icon in the Weather app, a new view controller is flipped
    into place and lets you enter a new city. When you tap Done, that view is replaced
    by the main view.


    The *UIViewControl er* class and several subclasses perform these basic functions.
    If you must master one class before any others, this one is it.


    **Value Objects**


    When you’re building your own model, view, and controller classes, you’ll often
    have to choose how to store data within those classes. Since Objective-C is built
    on top of C, all the primitive data types are available. The question is, then,
    whether to use integers, floating-point numbers, and character arrays or to use
    a class that wraps those same primitive values in an object.


    Let’s Get Primitive


    There’s no harm in using a primitive type in your object’s instance variables.
    In fact, it can often make things much easier for your implementation, because
    you don’t have to worry about retaining and releasing objects. For example, if
    you’re just keeping track of a counter, you don’t need to add the overhead of
    an object.


    Chapter 3: Cocoa Touch: Putting Objective-C to Work


    **69**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Value Objects**


    ***Tip:*** One of the most important counters in Cocoa, the *retainCount* in *NSObject,*
    is defined as an unsigned integer ( *NSUInteger*). Although the keywords *NSInteger*
    and *NSUInteger* look like they could be class names, they’re really just type
    definitions used throughout Cocoa Touch.


    typedef int NSInteger;


    typedef unsigned int NSUInteger;


    Other examples of commonly used type definitions are *NSRange,* a structure that
    defines a range of data, and *NSTimeInterval,* a floating-point value that represents
    a period of time.


    Instance variables that use primitive types are defined a little bit differently
    than instance variables of objects. Since there’s no retain or copying involved,
    they’re defined with the *assign* attribute for the *@property.* For example,
    if you had decided to use an *NSUInteger* instead of an *NSNumber* in the last
    chapter’s *AwesomeString* class, you’d have an interface that looks like this:


    @interface AwesomeString : NSString


    {


    **NSUInteger exclamationCount;**


    NSString *originalString;


    }


    @property (nonatomic, **assign**) **NSUInteger exclamationCount**;


    @property (nonatomic, copy) NSString *originalString;


    - (NSString *)awesomeString;


    @end


    In the implementation the code in the *–init* method changes the initial assignment
    from a value object:


    exclamationCount = [[NSNumber numberWithInt:8] retain];


    You can simplify the code by assigning a primitive value:


    exclamationCount = 8;


    In the *–deal oc* method, you also don’t need to release the *exclamationCount.*
    Using a primitive value has made your code much simpler and doesn’t sacrifice
    any functionality. Until written languages start allowing you to put 8.5 exclamation
    points at the end of a sentence, this code will work great!


    Objectified


    Now that you’ve seen an example of value objects not being necessary, why would
    you ever want to use them? For two primary reasons:'
  trans: "\n# 创建视图\n\n创建视图并没有听起来那么困难。通过使用现有视图的子类，你只需进行少量自定义绘制即可。如果你正在构建复合视图（将多个视图组合成一个视图），唯一需要做的工作就是管理子视图的布局。\n\
    \n# 模型\n\n模型是应用程序的核心与灵魂，因为它们负责管理应用的数据。与视图不同，模型完全不关心用户正在执行的操作或屏幕上显示的内容。模型的唯一功能是在应用程序内操作和处理用户数据。模型通常实现提供这些基本行为的内部逻辑。\n\
    \n例如，每当你使用内置的\"通讯录\"应用时，实际上就是在操作代表通讯录中联系人的模型对象。如果你更新了应用的设置，就是在修改另一种模型对象。从互联网下载股票数据的应用则会使用模型对象来存储价格历史记录。\n\
    \n有些模型对象可以跨多个应用工作：通讯录和用户默认设置（偏好设置）数据库就是很好的例子。而其他模型（如股票应用使用的模型）则是特定于应用的。\n\n许多模型对象会被永久存储到文件或数据库中。这种机制称为**对象持久化**，它让你能够在多次应用启动间重建应用的状态。即使不持久化对象，模型在处理内存数据结构时也非常有用。\n\
    \n在构建自己的模型时，你通常会在实现中使用 Cocoa Touch 类。例如，`NSArray` 和 `NSDictionary` 等类可以让你将数据存储在有序列表或哈希表中。你还会发现\
    \ `NSURLConnection` 和 `NSData` 等类能帮助你从网络检索和存储数据。\n\n最后，你可以使用 Core Data 框架在 SQLite\
    \ 数据库中存储和检索对象。\n\n# 控制器\n\n控制器稍微复杂一些。它们充当视图对象和模型对象之间的中介。当模型中的值发生变化时，控制器负责更新视图。同样地，控制器在收到用户输入时，能够相应地更新模型数据。\n\
    \n你的控制器让你能够在模型和视图之间传递信息。在图 3-1 中，你可以看到控制器是唯一包含所有箭头（消息）的模块。就像管弦乐队中的指挥，它负责掌控全局。\n\
    \n为了让你理解其工作原理，想象一个绘制股票价格的应用：\n\n1. 用户点击按钮（视图）刷新图表。此操作被发送至控制器。\n2. 控制器随之告知模型加载新的股票数据。\n\
    3. 模型打开网络连接并开始下载数据。\n4. 股票数据加载完成后，模型通知控制器新数据已到达。\n5. 控制器将新数据传递给视图，用户便看到了结果。\n\n\
    **注意：** 模型和视图不会直接通信，因为如果它们直接通信，随着你添加更多对象，应用会变得极其复杂。当多个视图共享同一个模型的数据，或单个视图更新多个模型时，你就会遇到问题。一个类中的微小变动会波及到其他类，类之间的依赖性会越来越高，代码复用将变得困难。开发者将这种情况称为**紧耦合设计**，应当尽量避免。\n\
    \n控制器对象通常负责设置任务。模型和视图必须在某个时间点被加载和初始化，而控制器的核心角色使其自然成为这项工作的承担者。\n\nCocoa Touch 提供了专门的视图控制器类来处理这种职责分离。在开发\
    \ iPhone 应用时，你会发现大量代码最终都驻留在这些控制器类中。\n\n具体来说，视图控制器在导航中被大量使用。例如：\n\n- 当你点击列表中的某一行，新的视图滑入时，你刚刚创建了一个新的视图控制器。同样地，点击\"\
    返回\"按钮时，当前控制器会被丢弃，替换为上一个控制器。\n- 如果你点击撰写新邮件的按钮，会创建一个新的模态视图控制器；它的视图从屏幕底部滑入并显示，直到你点击\"\
    取消\"或\"发送\"。\n- 当你点击天气应用中的信息图标时，一个新的视图控制器翻转出现，让你输入新的城市。点击\"完成\"后，该视图会被主视图取代。\n\
    \n`UIViewController` 类及其多个子类执行这些基本功能。如果必须优先掌握一个类，那就是它了。\n\n# 值对象\n\n在构建自己的模型、视图和控制器类时，你经常需要决定如何在类中存储数据。由于\
    \ Objective-C 构建在 C 语言之上，因此所有原始数据类型都可使用。那么问题就来了：是使用整数、浮点数和字符数组，还是使用将相同原始值包装成对象的类呢？\n\
    \n## 使用原始类型\n\n在对象的实例变量中使用原始类型并无坏处。事实上，这往往能让实现更简单，因为你无需担心对象的保留和释放。例如，如果只是记录一个计数器，你不需要添加对象带来的额外开销。\n\
    \n**提示：** Cocoa 中最重要的计数器之一——`NSObject` 中的 `retainCount`，被定义为无符号整数（`NSUInteger`）。虽然\
    \ `NSInteger` 和 `NSUInteger` 这两个关键字看起来像是类名，但它们实际上只是 Cocoa Touch 中使用的类型定义。\n\n\
    ```objectivec\ntypedef int NSInteger;\ntypedef unsigned int NSUInteger;\n```\n\
    \n其他常用的类型定义示例包括：`NSRange`（定义数据范围的结构体）和 `NSTimeInterval`（表示时间段的浮点值）。\n\n使用原始类型的实例变量的定义方式与对象实例变量略有不同。由于不涉及保留或复制，它们在\
    \ `@property` 中使用 `assign` 属性定义。例如，如果你决定在上一章的 `AwesomeString` 类中使用 `NSUInteger`\
    \ 而不是 `NSNumber`，接口将如下所示：\n\n```objectivec\n@interface AwesomeString : NSString\n\
    {\n    NSUInteger exclamationCount;\n    NSString *originalString;\n}\n@property\
    \ (nonatomic, assign) NSUInteger exclamationCount;\n@property (nonatomic, copy)\
    \ NSString *originalString;\n- (NSString *)awesomeString;\n@end\n```\n\n在实现中，`–init`\
    \ 方法里的初始赋值从值对象改为：\n\n```objectivec\nexclamationCount = [[NSNumber numberWithInt:8]\
    \ retain];\n```\n\n通过赋值原始值可以简化代码：\n\n```objectivec\nexclamationCount = 8;\n```\n\
    \n在 `–dealloc` 方法中，你也不需要释放 `exclamationCount`。使用原始值使代码大大简化，且不牺牲任何功能。除非书面语言允许你在句子末尾放\
    \ 8.5 个感叹号，否则这段代码将完美运行！\n\n## 对象化\n\n既然你已经看到了值对象并非必要的情况，那为什么还要使用它们呢？主要有两个原因：\n"
- fmt: '# Value Objects


    - You can store values represented as objects in a collection. Collections make
    it easy to manage a group of objects. Methods are available to sort the objects,
    look up instances, and to filter data according to a pattern. If you’re using
    primitive values, you’ll have to implement this data management code yourself.


    - The object’s class provides a lot of functionality for manipulating the value.
    This gives you more flexibility and will save time in your implementation.


    ## What are these value objects? Good question!


    ### `NSString`


    As you saw in the last chapter, this class is one of the fundamental classes in
    Cocoa.


    Many other classes use strings represented as objects. You may be tempted to use
    plain C strings in your implementation, and it’s indeed possible to do so, but
    you’re going to be swimming upstream. You’ll end up doing a lot of unnecessary
    conversion as you use primitive strings with Cocoa.


    Additionally, you’d be missing out on some important functions provided by the
    `NSString` class:


    - Full Unicode support and conversion between string encodings (`–dataUsing-Encoding`).

    - Reading text and its encoding from a file (`–stringWithContentsOfFile:used-Encoding:error:`).

    - Splitting (`–componentsSeparatedByString:`) and joining (`–componentsJoinedBy-String:`)
    strings.

    - Escaping strings so they can be put in a URL (`–stringByAddingPercentEscapes-UsingEncoding:`
    and `–stringByReplacingPercentEscapesUsingEncoding:`).

    - Substring searches (`–rangeOfString:`) and getting the number of Unicode characters
    (`–length`).

    - Converting strings into numbers (`–boolValue`, `–integerValue`, `–floatValue`,
    `–doubleValue`).

    - Case conversions (`–capitalizedString`, `–lowercaseString`, and the best of
    all, `–uppercaseString`).

    - String formatting (`–stringWithFormat:`) and localization (`NSLocalizedString`).

    - String comparison using the user’s current language settings (`–localized-Compare:`)
    and with many options, including ignoring diacritical marks (so “ö” is equivalent
    to “o”) and sorting by numeric value (so “CHOCK9.TXT” appears in a list before
    “CHOCK9000.TXT”).


    ### `NSNumber`


    You’ll want to use this value object when you’re doing value conversions. If you
    create a number object with a floating-point value, and then ask the object for
    an unsigned character value (`–unsignedCharValue`), an internal conversion will
    be performed without any loss of information in the original object.


    If you’re doing currency-based calculations in your application, you can use the
    `NSDecimalNumber` subclass for maximum accuracy. Since the subclass lets you use
    38 significant digits and an exponent in the range of –128 to 127, you don’t need
    to worry about rounding errors and other data loss inherent in floating-point
    calculations.


    ### `NSDate`


    A date object provides some basic functions for manipulating instants in time.
    You can compare which date is earlier (`–earlierDate:`) and how many seconds are
    between two dates (`–timeIntervalSinceDate:`). `NSDate` really shines when it’s
    used alongside `NSCalendar`; if you’ve ever tried to compute the number of months
    and days between two instants in time while taking things like time zones and
    leap years into account, you’ll appreciate this work being done for you.


    ### `NSData`


    As a value object for unstructured streams of bytes, `NSData` provides the mechanisms
    you need to manage a buffer of data. Data objects often need to be stored on disk,
    so methods to read (`+dataWithContentsOfFile:`) and write (`–writeToFile:atomically:`)
    are provided.


    These chunks of data are often used to create instances of other objects. For
    example, an `NSString` can be created with an `NSData` object. Likewise, you can
    create an image using the `UIImage` object’s `–initWithData:` method.


    ### `NSNull`'
