    \n由于这个方法可能在延迟结束前被多次调用，以下代码用于取消任何待处理的消息：\n\n```\n[NSObject cancelPreviousPerformRequestsWithTarget:self\n\
    selector:@selector(conceal) object:nil];\n```\n\n通常，如果你打算在稍后时间执行一个选择器，应该先取消任何已存在的待执行请求。如果没有任何待执行请求，取消消息会被忽略。\n\
    \n## Fashion Your Models\n\n现在，你已经探索了 Flashlight Pro 的视图，是时候看看为应用提供数据的模型了。\n\n\
    你可能会想：“数据？对于一个手电筒应用来说？”\n\n是的！数据有多种形式：手电筒的模型让你能够跟踪灯光设置，并构建一个控制 SOS 闪烁器的状态机。这不是传统意义上的数据，但它仍然是你要从控制器中分离出来的信息。\n\
    \n### SOSModel\n\n当你发送 SOS 信号时，你处理的是一个随时间变化的点划序列。本质上，你是在操作一个状态机。由于模型的功能之一是管理内部逻辑和行为，这使得求救信号成为这类对象的理想候选。\n\
    \n该模型的接口很简单：一个 `unitInterval` 属性让你定义点或划的时长（划被定义为点的三倍长）。还有一个方法让你查询当前元素。\n\n通过调用\
    \ `–send` 方法来启动状态机运行。\n\n#### Notifications\n\n启动状态机运行后，你如何知道何时从点切换到划？你可以轮询 `element`\
    \ 参数，但你知道在事件驱动的环境中轮询值更新是非常糟糕的做法。而 Cocoa Touch 正是一个高度事件驱动的环境。\n\n解决方案是依赖通知。如你在第97页所见，通知让你能够以结构化方式向对象分发信息。所以对于\
    \ SOS 模型也采用这种方式。以下是 `@interface` 中定义的通知名称：`extern NSString *const SOSModelElementChangedNotification;`\n\
    \n其在 `@implementation` 中有对应的定义：`NSString *const SOSModelElementChangedNotification\
    \ = @″SOSModelElementChangedNotification″;`\n\n当状态机前进时，会发布该通知，以便任何感兴趣的视图控制器可以更新其视图：\n\
    \n```\n- (void)update {\n    [self advance];\n    [[NSNotificationCenter defaultCenter]\n\
    \        postNotificationName:SOSModelElementChangedNotification object:self];\n\
    \    [self performSelector:@selector(update) withObject:self\n               afterDelay:[self\
    \ duration]];\n}\n```\n\n在本章稍后经过 `MainViewController` 类时，你将看到它如何处理该通知。\n\n***注意：***\
    \ 这个类的设计与你处理通过 Internet 加载数据的网络刷新非常相似。不是使用 `–send`，而是实现 `–refresh`，它使用 `NSURLConnection`\
    \ 异步加载数据。当数据通过该连接加载完成时，你会发送一个 `refreshdidfinish` 通知，以便任何注册的视图控制器可以使用新数据更新其视图。\n\
    \n#### Private property\n\n类扩展也可以用于定义私有属性。你可以享受 Objective-C 自动创建访问器方法的好处，而不必暴露内部数据。\n\
    \n`SOSModel` 使用一个整型实例变量来维护状态。令人意外的是，这个变量名为 `state`，并在 `@interface` 中定义：`NSUInteger\
    \ state;`\n\n注意头文件中没有 `@property` 定义。你会在 `@implementation` 上方的类扩展中找到它：\n\n```\n\
    @interface SOSModel ()\n@property (nonatomic, assign) NSUInteger state;\n...\n\
    @end\n```\n\n此时，你可以像使用外部定义的属性一样使用 `state` 属性。并且可以确信，类的客户端不会乱动你的内部数据。\n\n### FlashlightModel\n\
    \n你可以使用手电筒模型来持久化应用的状态。当前的亮度、闪烁速度、颜色和灯光模式都可以通过属性和方法访问。每当你在模型中更改这些值之一时，它会立即保存到用户的设置数据库中。\n\
    \n该模型还提供了一个小的颜色数据库。例如，可以检索到一个 `UIColor` 实例及其用于用户界面的本地化名称。\n\n#### Read-only properties\n\
    \n如你在191页所见，在某些情况下，防止其他对象窥探你的数据是一个好主意。同样，在某些情况下，你愿意暴露状态，但不希望它被修改。在这些情况下，你会使用只读属性。\n\
    \n`@interface` 中的 `currentColorIndex` 正是这样做的：\n\n`@property (nonatomic, readonly)\
    \ NSUInteger currentColorIndex;`\n\n现在你有一个小问题。你可以读取该属性，但不能写入它。如果你尝试使用 `self.currentColorIndex\
    \ = 0`，会得到一个编译错误。\n\n类扩展又来救场了！你可以在实现文件中重写属性定义：\n\n```\n@interface FlashlightModel\
    \ ()\n@property (nonatomic, assign) NSUInteger currentColorIndex;\n...\n@end\n\
    ```\n\n这样你的 `@implementation` 可以写入该属性，但任何使用你的 `@interface` 的人都只能读取它。\n\n#### Class\
    \ statics\n\n在第100页，你看到了如何使用类静态变量实现单例模式。手电筒模型对此做了一个细微的变体。类静态变量用于保存颜色名称和值的数组：\n\
    \n```\n+ (NSArray *)colors {\n    static NSArray *colors = nil;\n    if (colors\
    \ == nil) {\n        colors = [[NSArray alloc] initWithObjects: ...\n```\n\n第一次使用\
    \ `+colors` 类方法时，数组被分配并在应用的生命周期内保持。\n\n***提示：*** 你可以使用类静态变量来加速应用的某些部分。如果你有一个频繁访问的对象，并且加载该对象需要花费一些时间，你希望尽量减少实例化它的时间。\n\
    \n一个带有 `UIFont` 或 `UIImage` 的静态变量可以在绘制视图时初始化一次并重复使用。这些缓存对象有助于提高 `UITableView`\
    \ 的滚动速度。请记住，你永远不会收回缓存使用的内存，所以只对小对象使用此技术。\n\n类静态变量也用于存储和检索颜色信息的键：\n\n```\nstatic\
    \ NSString *nameKey = @″name″;\nstatic NSString *colorKey = @″color″;\n```\n\n\
    这种方法允许编译器检查键类型并捕获拼写错误。如果你使用 `@″name″` 写入哈希表的数据，而用拼写错误的 `@″nane″` 来读取，你将会挠头不已。通过使用\
    \ `nameKey`，你避免了这种潜在问题。\n\n#### User defaults\n\nCocoa Touch 提供了一个用于存储用户设置的标准机制。它叫做\
    \ `NSUserDefaults`，并充当了这个模型的支柱。\n\n例如，当你向模型发送 `–setSpeed:` 消息时，当前速度值被更新，然后通过 `–setFloat:forKey:`\
