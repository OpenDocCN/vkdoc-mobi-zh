    And that means you can install it on your device with the Xcode Organizer or iTunes.


    Everything that’s in the final build can run on your iPhone, so you can run your
    final tests while the application is in review.


    To learn more about how `codesign` works, make sure to check out its Unix manual
    page; type `man codesign` at the command line.


    **Note:** In the Flashlight Pro project, resigning the code for the final release
    is automated with a build phase named Resign Release. This build step runs the
    `codesign` tool on the application after it’s been packaged for release. It also
    creates a Zip file that contains the modified version of the application.


    ## The First Promotion


    It’s official: The code for your first release is done. You could sit around twiddling
    your thumbs while waiting for Apple to approve the application. But you want this
    product to be a success, so it’s time to get started on the next phase of the
    lifecycle.


    It’s time to start promoting that awesome code!


    Some developers use this time to start generating some prelaunch buzz. You could
    unveil a part of your promotional website with a big “Coming Soon” banner, for
    example. The risk here is if any delay occurs in the approval process. If your
    app gets held up for any reason, that buzz you worked so hard to generate will
    just fizzle out and die. Natural y, people will also ask when “soon” is. You won’t
    be able to tell potential customers or the media when your launch date is because
    it’s completely under Apple’s control at this point.


    A safer approach is to start a mailing list now. People can sign up to be notified
    when the release becomes available. Make sure that people know that this is a
    one-time announcement and that you won’t abuse their email address. Everyone gets
    enough spam as it is. (And if you do use that email address for spam, you’ll die
    in a fire.)


    ## App review


    Once you’ve uploaded your app with iTunes Connect, you’re waiting in line. And
    it’s a line with about 1,000 other developers. The length of the app review process
    has varied over time, with the average wait time being between a few days and
    a couple of weeks.


    Chapter 8: For Sale


    `265`


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## App review


    Waiting for your app to be approved is hard: Everything is done and you’re anxious
    to show it off. Time passes more quickly if you focus on other activities like
    getting your website finished, press releases written, and ramping up your marketing
    efforts.


    Now is a great time to contact the media and get them interested in the upcoming
    release—get as many bloggers and journalists signed up as possible.


    The app review process can also be a source of frustration. Don’t feel bad if
    you get rejected; most developers have suffered this fate. Read on to find out
    what you can do to avoid it.


    ### Make Sure You Haven’t Broken Any Rules


    There are many causes for rejection. In many cases, it’s because you didn’t follow
    the rules laid out in Section 3.3 of the iPhone SDK Agreement that you signed.
    This section of the document specifies the rules for using the SDK, user interfaces,
    data, privacy, content, network usage, and other aspects of development. Smart
    developers read this section careful y.


    Unfortunately, much of this legal agreement can be left open to interpretation.
    The best advice is to use common sense and to do unto Apple as you would have
    them do unto you.


    To help you get a feel for what’s acceptable and what’s not, here are some well-known
    sources of rejection:


    - **Don’t try an end-run around App Store.** You can’t offer prizes or any type
    of monetary promotion in your app. You can’t ask for donations from users. Don’t
    use a built-in web browser to facilitate a purchase from within your app. Customers
    should only buy things from iTunes.

    - **Don’t mention prices from within your application or on its iTunes page.**
    As you saw on page 258, prices aren’t a simple matter when you take into account
    that they exist in many currencies. The one exception to this is when you’re using
    in-app purchases: You can query iTunes for a price that can be displayed to the
    customer.

    - **Don’t use Apple trademarks or products in your application.** The one that’s
    been most difficult for developers are user interfaces that show a picture of
    an iPhone. Find a different toolbar graphic or way of showing the device in a
    help screen. Any other tie-ins with Apple should be avoided: One developer was
    rejected because of a reference to Steve Jobs; another encountered problems when
    they used the corporate address, 1 Infinite Loop, as sample data.

    - **Don’t do anything that makes the iPhone or App Store look bad.** Simulating
    cracked screens, fake swearing (@%#!?!), and other gimmicks at Apple’s expense
    will lead to disappointment. Apple places a *very* high value on how it’s perceived
    by the public.

    - **You need to own all content that’s included in your app.** Avoid any unlicensed
    assets, including mentions of public figures or celebrities. (A royalty-free license
    to use an asset doesn’t mean you own it.)

    - **If you have any unfiltered content from the Internet, rate your application
    17+.** App reviewers are experts at finding content that’s not suitable for children!

    - **Don’t let Internet connections fail silently.** If you’re retrieving data
    from the network, you need to let the user know if the connection isn’t working.
    App reviewers turn on Airplane Mode when testing your app: It should behave predictably
    in this situation.

    - **Keep your users’ privacy in mind.** Make it clear when information from the
    device, including game scores, is being uploaded to the Web. You don’t need to
    do this with every connection, just give the user a chance to opt out. Providing
    a setting in your app gives users a chance to change their mind.

    - **Don’t submit an app that’s nothing more than a business card or company advertisement.**
    These, along with extremely simple joke and novelty apps, will be rejected because
    of “minimal user functionality.”

    - **Be careful about duplicating the functionality of Apple’s apps.** Developers
    have had success with applications that replace the built-in utilities, such as
    the Calculator and Weather apps. The core applications, such as Phone, Mail, and
    iPod, are general y off limits.


    `266`


    iPhone App Development: The Missing Manual


