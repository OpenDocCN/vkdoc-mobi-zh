- fmt: '# exploring Your New


    # Tools


    Every Flashlight Needs a Parts List


    The first phase of creating an iPhone app is setting up a Project file. This file
    keeps track of the information Xcode uses to build your application. It’s where
    you manage your source code, user interfaces, frameworks, and libraries. Think
    of it as a parts list for your application.


    1. In your Hard Drive ➝ Developer ➝ Applications folder, double-click the Xcode
    icon to start the application. (It’s at the bottom of the list.) The tricky part
    is that Xcode isn’t in your normal Applications folder. The installer puts it
    in the *Developer* ➝ Applications folder. To make it easier to return to Xcode
    later, store its icon in your Dock.


    2. In the Dock, Control-click the icon and choose Options ➝ Keep in Dock.


    From then on, you can launch Xcode by simply clicking the Dock icon.


    Once Xcode is running, you’ll see its Welcome window, as shown in Figure 1-6.


    ***Tip:*** If you close the Welcome window by accident, you can reopen it by choosing
    Help ➝ Welcome to Xcode.


    ***Figure 1-6:***


    *The Xcode launch window.*

    *As you create new projects with Xcode, you see them listed on the right. Click
    the "Create a new Xcode project" button to start your first iPhone application.
    The "Getting started with Xcode" button opens the documentation viewer and displays
    a helpful overview of Xcode. The last button is a convenient link to the Dev Centers
    for the Mac and iPhone.*


    3. Click the big "Create a new Xcode project" button.


    The New Project window opens (Figure 1-7), showing you a choice of template categories.
    In Xcode, a *template* is a predefined set of source code files, libraries, frameworks,
    and user interface elements that you use to create different styles of applications.


    **18**

    iPhone App Development: The Missing Manual


    ***Figure 1-7:***


    *The Xcode New Project window lists all of the templates you can use to get a
    quick start. When you’re starting out with a new application, select the template
    that best describes the style of user interface you want. When selected, each
    template displays a short description. Some templates even include options, like
    the one shown here to "Use Core Data for database storage".*


    4. Since you’re creating an iPhone application, under the iPhone OS group in the
    upper-left corner, choose Application and take a look at the available templates.


    Your choices come in the following categories:


    - **Navigation-based Application.** These applications have a "drill-down" style
    interface, like the iPhone Mail application.

    - **OpenGL ES Application.** Games that draw objects in a 3-D space use this template.

    - **Tab Bar Application.** This style of application uses a tab bar at the bottom
    of the screen to switch views. Apple’s iPod application is a great example of
    this user interface style.

    - **Utility Application.** These applications generally present a simple interface,
    with a front view containing information and a back view for configuring the information.
    The built-in Weather app uses this metaphor.

    - **View- and Window-based Applications.** Turn to these templates when your application
    combines elements of the previous four styles. Think of them as bare-bones templates
    that you can customize to your own needs.


    For your Flashlight app, you’re going to use the Window-based Application template.
    Since the application only uses a single window, this basic template is all you
    need. A nice side effect of using this customizable template is that it creates
    fewer files for the project. In effect, you have a shorter, simpler parts list.


    **19**'
