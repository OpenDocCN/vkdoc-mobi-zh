    Cocoa Touch lets you animate some view properties, and that’s how it makes things
    look so cool. But more importantly, it’s the way you give users subtle clues for
    the actions they perform.


    Here are a few view properties and the kinds of effects you’re used to seeing
    in iPhone applications:


    • **alpha.** Fading a view in or out when a user edits or otherwise changes the
    state of the application.


    • **frame.** Moving smoothly between two points to add or remove information onscreen.


    • **transform.** Rotating, scaling, and flipping data by altering an affine transforma-tion
    matrix.


    • **backgroundColor.** Gently changing the background color of a view to indicate
    a state change.'
  trans: '

    ### 控制器可以通过枚举来改变灯光状态：`lightView.state = LightViewStatePulse`;


    **170**


    iPhone 应用开发：缺失的手册


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 优化外观


    ### 用于私有方法的类扩展


    在第 2 章中，你学习了如何通过 Objective-C 分类来扩展已有类（第 38 页）。一种名为*类扩展*的变体则可以让你扩展自己类的接口。尽管你是编写类的人，并且可以在接口的`@implementation`部分定义任何内容，但扩展类接口仍有一个好处：它能让你隐藏内部方法。


    例如，`LightView.h`中的`@interface`展示了其他类可用于与对象通信的方法。问题在于，有些方法仅用于内部，将它们暴露在接口中既会造成混淆也存在风险。


    解决方案是在你的实现文件中定义另一个`@interface`。这个`@interface`看起来很像分类，区别在于它是匿名的——括号内没有名称：


    ```

    @interface LightView ()


    - (void)updateBackgroundColor;


    - (void)endPulse;


    - (void)handleSingleTap;


    - (void)handleDoubleTap;


    @end

    ```


    这个`@interface`中的方法（如`-updateBackgroundColor`）是对原始接口的扩展，因此必须在下面的实现部分中实现。这样一来，你可以在`LightView.m`中随意调用`[self
    updateBackgroundColor]`，但如果其他对象试图发送类似`[lightView updateBackgroundColor]`的消息，编译器就会报错。


    **注意：** 其他面向对象语言中称之为*私有方法*。许多 Objective-C 程序员也沿用这一术语。


    ### 捕获视图属性变化


    如你之前所见，`@property`和`@synthesize`声明可以为你节省大量编写访问器代码的时间。但有一个问题：你无法知道这些访问器代码何时会被执行。


    大多数情况下这不成问题。然而在视图中，属性更新通常意味着某些数据的呈现方式必须随之调整。视图的`color`属性就是一个例子。当其他对象改变颜色时，你需要更新视图以显示这种变化。


    第 6 章：专业手电筒应用


    **171**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### 优化外观


    要更新视图，你需要手动编写访问器并添加自己的代码：


    ```

    - (void)setColor:(UIColor *)newColor {


    if (color != newColor) {


    [color release];


    color = [newColor retain];


    [self updateBackgroundColor];


    }


    }

    ```


    你不可能一直偷懒，处理视图属性变化就是不能偷懒的时候。


    **提示：** 如果你正在为视图进行自定义绘制，通常唯一需要额外添加的代码是：


    ```

    [self setNeedsDisplay];

    ```


    `-setNeedsDisplay`方法会将视图标记为“需要重绘”，并通过`-drawRect:`方法自动触发重绘。你将在`IFInfoView`（第 174
    页）中看到这一技术的实际应用。


    另请注意，绘制不会立即执行。相反，多个绘制请求会在下一个事件处理周期中合并为一次更新。如果你试图直接调用`-drawRect:`来规避这一点，效率会更低且结果不可预测。让系统来决定何时绘制。


    ### 视图动画


    Cocoa Touch 允许你对某些视图属性进行动画处理，这也是让应用看起来如此酷炫的原因。但更重要的是，它是你向用户提供操作微妙反馈的方式。


    以下是 iPhone 应用中常见的一些视图属性及其效果类型：


    - **alpha.** 当用户编辑或改变应用状态时，让视图淡入或淡出。

    - **frame.** 在两个点之间平滑移动，以在屏幕上添加或移除信息。

    - **transform.** 通过改变仿射变换矩阵，实现数据的旋转、缩放和翻转。

    - **backgroundColor.** 柔和地改变视图背景色，以指示状态变化。

    '
- fmt: "Animation 是在 *block* 中完成的。一个 block 是一组同时执行的动画属性变化。在 block 的开始和结束之间对视图属性的更改会同时生效，为用户提供流畅的体验。动画\
    \ block 还可以简化你的代码。\n\n**172**\n\n*iPhone App Development: The Missing Manual*\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**完善外观**\n\n***提示：*** 没有什么能阻止你同时更改视图的\
    \ `alpha`、`frame` 和 `backgroundColor`。只需记住，最佳动画是那些起到微妙提示作用的动画。从“大锤设计学院”毕业的人只会打动他们自己，而不是客户。\n\
    \n`lightView` 只动画化一个属性：用作虚拟手电筒灯泡的背景颜色。所有工作都在私有方法 `-updateBackgroundColor` 中完成。\n\
    \n你通过 `UIView` 的类方法 `+beginAnimations:context:` 来开始一个动画 block：\n\n```\n- (void)updateBackgroundColor\
    \ {\n    [UIView beginAnimations:@\"updateLightView\" context:NULL];\n```\n\n\
    `updateLightView` 被委托方法用于唯一标识一个动画。对于复杂的转场效果，可能在给定时间内有多个动画同时发生，因此能够正确选择动画非常重要。\n\
    \n每个动画允许你设置各种选项。对于 `lightView`，如果动画已经在进行中，当前颜色将是新颜色的起点：\n\n```\n[UIView setAnimationBeginsFromCurrentState:YES];\n\
    ```\n\n视图动画的其他属性包括重复次数、完成后是否反转，以及一些控制时间等其他属性。\n\n`lightView` 使用最常用的属性之一：动画持续时间。如果灯亮着，使用\
    \ `envelopeAttack` 实例变量中指定的时间来控制从当前颜色切换到新颜色所需的时长：\n\n```\nif (self.state == LightViewStateOn\
    \ || self.state == LightViewStatePulse)\n{\n    [UIView setAnimationDuration:self.envelopeAttack];\n\
    \    [self setBackgroundColor:self.color withBrightness:self.brightness];\n}\n\
    ```\n\n如果灯的状态为关闭，则 `envelopeRelease` 变量被用作 `animationDuration`，同时将背景颜色设置为黑色：\n\
    \n```\nelse {\n    [UIView setAnimationDuration:self.envelopeRelease];\n    self.backgroundColor\
    \ = [UIColor blackColor];\n}\n```\n\n配置完视图动画后，使用 `-commitAnimations` 类方法来启动动画：\n\
    \n```\n[UIView commitAnimations];\n}\n```\n\n结果是，`lightView` 会在颜色和状态之间平滑过渡。得益于视图动画，这个视图看起来、用起来都像真正的灯泡。\n\
    \n第 6 章：专业手电筒\n\n**173**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**完善外观**\n\n当教程讲到 category 和 `SettingsViewController` 时（第 201 页），你将看到更多动画 block。一旦你熟悉了它们的工作原理，它们就能为你的应用程序增色不少。只需记住，过犹不及。\n\
    \n## IFInfoView\n\nFlashlight Pro 项目中的另一个自定义视图是用于在屏幕顶部显示状态的视图。与依赖 `backgroundColor`\
    \ 属性来显示自身的 `LightView` 不同，`IFInfoView` 进行自定义绘图。在本节中，你还会学习如何设置该视图并正确命名。\n\n###\
    \ 命名\n\n为什么视图类名要以 `IF` 开头？难道不能像 `LightView` 那样直接叫 `InfoView` 吗？\n\n是的，你可以。但你是懒程序员。而且你对未来有远见……\n\
    \n总有一天，这个信息视图可能会在其他项目中有用。很多应用都需要时不时地显示状态，这代码就是实现这一点的好办法。\n\n你很可能想要重用这段代码。\n\n\
    如果你试图将这个类放入一个已经存在 `InfoView` 的项目中，就会遇到命名冲突。由于 Objective-C 没有命名空间，你必须通过一些方式来模拟它。"
  raw: 'Animation is done in *blocks.* A block is a group of animation property changes
    that act in unison. Changes to view properties between the beginning and end of
    the block appear simultaneously and provide a smooth experience for the user.
    Animation blocks also simplify your code.


    **172**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **refine the look**


    ***Tip:*** Nothing stops you from changing the alpha, frame, and background color
    of the view simultaneously. Just remember that the best animations are the ones
    that act as subtle clues. Graduates of the Sledgehammer School of Design only
    impress themselves, not customers.


    The light view animates just one property: the background color that’s used as
    the light bulb in your virtual flashlight. All of the work is done in the private
    *–updateBackgroundColor* method.


    You begin an animation block with the *+beginAnimations:context:* class method
    for *UIView*:


    - (void)updateBackgroundColor {


    [UIView beginAnimations:@″updateLightView″ context:NULL];


    The *updateLightView* is used by delegate methods to uniquely identify an animation.


    With sophisticated transitions, more than one animation can occur at a given time,
    so being able to pick the right one is important.


    Each animation lets you set various options. For the light view, if an animation
    is already in progress, the current color will be the starting point for the new
    color:


    [UIView setAnimationBeginsFromCurrentState:YES];


    Other properties for view animations are a repeat count, whether it reverses when
    completed, and several others that control the timing.


    The light view uses one of the most common properties: the animation duration.
    If the light is on, the amount of time specified in the *envelopeAttack* instance
    variable is used to control how long it takes to change the *backgroundColor*
    from its current color to the new one:


    if (self.state == LightViewStateOn || self.state == LightViewStatePulse)


    {


    **[UIView setAnimationDuration:self.envelopeAttack];**


    **[self setBackgroundColor:self.color withBrightness:self.brightness];**


    }


    If the light’s state is off, then the *envelopeRelease* variable is used as the
    *animation-Duration* while setting the background color to black.


    else {


    **[UIView setAnimationDuration:self.envelopeRelease];** **self.backgroundColor
    = [UIColor blackColor];**


    }


    Once you’ve configured the view animation, you use the *–commitAnimations* class
    method to start things in motion.


    [UIView commitAnimations];


    }


    The result is that the light view smoothly transitions between colors and state.
    The view looks and acts like a real light bulb, thanks to view animation.


    Chapter 6: A Flashlight for Pros


    **173**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **refine the look**


    You’ll see more of these animation blocks when the tour reaches the category and
    the *SettingsViewControl er* (page 201). Once you’re comfortable with how they
    work, they can add quite a bit of polish to your application. Just remember you
    can have too much of a good thing.


    IFInfoView


    The other custom view in the Flashlight Pro project is the one used to display
    status at the top of the screen. Unlike the *LightView,* which relied on a *backgroundColor*
    property to display itself, *IFInfoView* does custom drawing. In this section,
    you also learn how to set up the view and name it properly.


    *Name*


    Why is *IF* at the beginning of the view class name? Couldn’t you just call it
    *InfoView,* like *LightView*?


    Yes, you could. But you’re a lazy programmer. And you have a vision of the future….


    Someday, this information view could be useful in other projects. Lots of applications
    need to show status from time to time, and this code is a great way to do that.


    Chances are that you’ll want to reuse this code.


    And if you try to put this class in a project that already has an *InfoView,*
    you’re going to have a name conflict. Since Objective-C doesn’t have namespaces,
    you’ve got to fake it.'
