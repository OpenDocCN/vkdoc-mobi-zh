    `throw`，调试器会向你展示导致问题的全部过程。


    ## 通过崩溃学习


    一本介绍编程语言的书中包含使用调试器的章节，这看起来可能有些奇怪。但请想一想你上次学习一门新语言时的经历：你会遇到大量错误，因为一切都是新的，而且你会做一些经验丰富的开发者会避免的事情。


    Xcode 内置了一个强大的调试器；它基于来自 GNU 开发工具的`gdb`。与 Objective-C 编译器一样，调试器的一些扩展使其与对象和运行时架构兼容。


    运行代码时，你可以选择启用或禁用断点。


    ## 启用断点


    Xcode 的工具栏有一个按钮可以切换断点：你也可以选择 Run（运行）➝Debug（调试）➝Breakpoints On（断点开启）（或按 ⌘-Option-Y）来启动你的应用程序并启用断点。


    一旦启用了断点，你可以通过以下几种方式设置新的断点：


    - 当点击源代码左侧的装订线时，会出现一个蓝色箭头（图 2-1）。该箭头表示已设置断点，并且当代码执行到此处时，你的应用程序会停止。如果你再次点击该箭头，它会变暗并变为禁用状态。你也可以按住
    Control 键或右键点击该箭头，以获取包含其他选项的上下文菜单。

    - 当你选择 Run（运行）➝Show（显示）➝Breakpoints（断点）（或按 ⌘-Option-B）时，所有当前的断点都会显示出来。你可以通过双击最后一行并输入符号名称来为显示的列表添加一个断点。


    当你想要在没有源代码的地方（例如，在 Cocoa Touch 框架中）设置断点时，将需要使用此方法。你也可以在此窗口中通过选择断点并按 Delete 键来删除它。


    ## 手动设置断点


    当手动设置断点时，你可以使用函数名，例如`objc_exception_throw`，调试器会在它执行之前暂停。但由于你是 Objective-C 的新手，你更可能想要在某个类方法处设置断点。以下是一些设置此类断点的特殊语法：


    - 要在实例方法处停止，请使用格式`–[ClassName methodName:]`。例如，要在`NSArray`的`–objectAtIndex:`方法处停止，你可以使用`–[NSArray
    objectAtIndex:]`。（在指定名称时，请务必记住冒号，否则断点将不会触发。）


