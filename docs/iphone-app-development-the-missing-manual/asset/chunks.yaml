    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **宣告你的主张**


    定价——选择你的价格


    定价选项卡上只有两个字段（图 8-5），但它们非常重要，且难以设置正确！


    ***图 8-5：** *iTunes Connect 中的定价选项卡只要求提供两项信息，而这两项都非常重要。“上市日期”控制产品发布的时间，最初应设置为一个遥远的未来日期。“价格等级”的选择则控制你从每次销售中获得的收入。该选项卡会以每种货币显示摘要。*


    *上市日期*

