    \ != newExclamationCount) {\n```\n\nThis line is a simple performance optimization.\
    \ If the old object and new object are the same, there's no need to adjust the\
    \ retain count.\n\n**Tip:** This code is comparing pointer addresses, which is\
    \ a quick (and valid) way to check that two objects are the same. In fact, `NSObject`'s\
    \ `-isEqual` method uses this same method. (For many classes, such as `NSString`,\
    \ checking for equality is more complicated than checking pointers.)\n\nThe first\
    \ thing to do is tell the old instance variable that you no longer need it by\
    \ sending the `-release` message:\n\n```objc\n[exclamationCount release];\n```\n\
    \nNow that you've released the instance variable, you have no guarantee that the\
    \ variable is valid. If you try to send additional messages to `exclamationCount`,\
    \ your app is likely to crash. So the next step is to retain the new object that\
