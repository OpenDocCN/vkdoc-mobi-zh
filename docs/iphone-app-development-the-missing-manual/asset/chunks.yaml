  trans: "\n# 2. 在`HitMakerViewController.xib`文档窗口中，选中`File's Owner`。\n\n# 3. 按下 ⌘-2\
    \ 打开连接检查器。\n\n还记得你在控制器头文件中添加的那些`IBAction`标识符吗？你可以在“已接收动作”列表中看到它们。请确保你能同时看到灰色视图窗口和包含`File's\
    \ Owner`的文档窗口。\n\n# 1. 按住 Control 键并点击`HIT OR MISS`按钮。拖动鼠标，你会看到一条蓝色线条。由于你想要这个动作由`HitMakerViewController`执行，请将蓝线拖至文档窗口中的该类型对象上。\n\
    \n松开鼠标按钮时，你会看到一个菜单，其中列出了该视图控制器支持的事件（图 3-8）。点击`hitOrMiss`，就完成了。\n\n**92**  \niPhone\
    \ 应用开发：缺失的手册\n\n![图片 29](img/index-111_1.jpg)  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 目标与动作\n\n**图 3-8：** `HitMakerViewController`已完全连接。当你选中`File's Owner`时，你会看到控制器的三个输出口（`myButton`、`myLabel`\
    \ 和 `mySlider`）已连接到视图。同样，动作（`hitOrMiss` 和 `updateVolume:`）将由按钮和滑块控件调用。\n\n# 2.\
    \ 按住 Control 键点击滑块控件。将蓝线拖到`HitMakerViewController`上，松开鼠标按钮，然后点击`updateVolume:`。\n\
    \n# 3. 使用 ⌘-S 保存更改。\n\n转到文档窗口，选中`File's Owner`，然后按下 ⌘-2 打开连接检查器。你会看到`hitOrMiss`已连接到圆角矩形按钮的“Touch\
    \ Up Inside”事件。同样，水平滑块的“Value Changed”事件已连接到`updateVolume:`方法（图 3-9）。\n\n**提示：**\
    \ 你甚至可以在文档窗口中列出的项目之间按住 Control 键拖动。一些开发者更喜欢这种方法，因为它无需打开视图窗口。\n\n在第 81 页，你了解了编写`–addTarget:action:forControlEvents:`代码时事件是如何处理的。本质上，你刚刚用几次点击替换了`–setupControls`中显示的代码。\n\
    \n现在该回到 Xcode 并测试应用了。点击它的 Dock 图标，然后按下 ⌘-Return 来构建并运行应用。\n\n第 3 章：Cocoa Touch：让\
    \ Objective-C 发挥作用\n\n**93**  \n![图片 30](img/index-112_1.jpg)  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 目标与动作\n\n**图 3-9：** 将连接从`HIT OR MISS`按钮拖到`HitMakerViewController`后，你会选择`hitOrMiss`动作。此操作会使按钮按下时调用命名的方法。\n\
    \n## 消灭那些 Bug\n\n使用可视化开发工具并不意味着不会有 Bug。运行应用时，你会发现几个问题：\n\n- **Bug：** 滑块值范围仅为 0.0\
    \ 到 1.0（图 3-10）。它至少需要达到 11.0 才能正常运作。\n- **视觉问题：** 文本颜色在灰色背景上看起来不太好。如果文本能居中对齐就更好了。正如在代码中更改视图属性时常遇到的情况，直到运行时你才知道效果如何。\n\
    \n幸运的是，这两个问题都可以用 Interface Builder 轻松修复。点击 Dock 图标将你的 XIB 文件重新调出。在以下步骤中，你将先修复\
    \ Bug，然后修复视觉问题：\n\n# 1. 在文档窗口中，双击`UISlider`。然后按下 ⌘-1。\n\n属性检查器随之打开。\n\n**94**\
    \  \niPhone 应用开发：缺失的手册\n\n![图片 31](img/index-113_1.jpg)  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 目标与动作\n\n**图 3-10：** 当你运行应用时，滑块和按钮控件现在可以工作，但仍存在一些问题。滑块控件值最高仅为 1.0，标签的对比度太低，并且文本没有正确对齐。你可以在\
    \ Interface Builder 中修复所有这些 Bug。\n\n# 2. 将最大值从 1.0 改为 12.0。\n"
- fmt: 'Because your app is just a bit more awesome than Mr. Tufnel’s amp.


    **3\. Double-click the second label listed under View in the document window.
    In the View section, click the Background color well. When the color picker appears,
    select black with 100% opacity.**


    You’ll also want to change the label text to white so you can see it against the
    new background.


    **4\. Click the Text color well and pick the color as before [Figure 3-11].**


    **5\. Back under the label attributes, in the Layout section, click the center
    Alignment button.**


    **6\. In the View window, drag the label’s height resize handle, and make it about
    30 pixels tall.**


    Save your work, and then switch back to Xcode to build and run your application.


    As you run the app, everything looks good [Figure 3-12]. And when you slide all
    the way to the right, you’re ready to rock!


    But that’s not the best part: Think about how much code you haven’t written. All
    of this is possible just because you typed a few `IBOutlet` and `IBAction` identifiers
    in your header file. That’s awesomely lazy.


    **Chapter 3: Cocoa Touch: Putting Objective-C to Work**


    **95**


    ![Image 32](index-114_1.jpg)

    ![Image 33](index-114_2.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Targets and Actions


