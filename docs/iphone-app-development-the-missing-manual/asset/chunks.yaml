    array]`。


    ## 检查变量


    一旦在断点处停止，你可以通过将鼠标指针悬停在源代码上来检查变量。在许多情况下，你将需要使用`gdb`命令行来检查实例变量的状态并向它们发送消息。以下是一些重要的技巧：


