- fmt: 'Only the US (United States) and WW (World) regions are listed in dollars.
    The Payment listed in the financial report will show up as an ACH deposit in the
    account you specified when setting up the contracts in iTunes Connect. For payments
    that aren’t in dollars, you need the exchange rate on the day of the deposit.
    Apple can’t provide this information, because they don’t know what the rate will
    be when the payment is handed over to the banking system, which is when the actual
    exchange takes place. And unfortunately, many banks don’t report the exchange
    rate for the SWIFT wire transfer.


    If your bank doesn’t record the exchange rate, use an online archive like the
    one at `http://x-rates.com/cgi-bin/hlookup.cgi`. The rate for a day or two before
    the deposit date will help you determine the country of origin and get a feeling
    for whether the amount is correct.


    At this point, all that’s left to do is make a down payment on a 100-foot yacht
    and order the Cuban cigars! Or figure out how to make those monthly deposits a
    bit bigger. . . .


    ## Advertising and Promotion


    Most developers go into iPhone development with expectations that exceed the actual
    results. You thought you’d make a million bucks with just a few hours of work.


    Sorry, but it doesn’t usually work out that way.


    The success of your app depends a lot on advertising and promotion. Customers
    can’t buy your product unless they know about it. Your code is awesome, so don’t
    be afraid to tell people that!


    ## Advertising and Promotion


    ### Press Release


    The first promotional item to produce is a *press release.* This one page document
    lets the media know about your new product. As you write your press release, it’s
    important to think about who’s going to be reading it. You’re writing to the press,
    not potential customers. The goal is to get coverage for your product that will
    generate interest that indirectly leads to sales.


    So avoid any language that sounds like a sales pitch. Instead, present your product
    as something that’s different and newsworthy. For Safety Light, points that get
    the press’s attention might be:


    - It’s the best flashlight for the iPhone, unique among the myriad flashlight
    apps.

    - Its rescue beacon can save a life in an accident or natural disaster.

    - It has a disco mode.


    Another tactic is to use quotes that tell a story about your app: “Safety Light
    replaced all the other flashlights on my iPhone!” or “My dog just loves the disco
    lights!”


    (If these quotes come from an industry expert or minor celebrity, so much the
    better.) Provide as many talking points as you can to give the journalist a unique
    angle to write about.


    Remember, your press release is not the only one the reporter is going to see.
    Hundreds of other iPhone apps are being launched on the same day, and many of
    them are jockeying for the same press attention. It may seem counterintuitive,
    but a shorter press release is much better than a long, drawn-out screed. Keep
    it short and punchy, and someone might actually read it.


    You should also be aware of the standard format for press releases. The release
    needs a headline, a summary, the body of information, company background, and
    contact information. An example, along with other tips and guidelines, can be
    seen on the PRWeb site: `www.prwebdirect.com/pressreleasetips.php`.


    Once you finish your press release, make sure that it’s available on your website.
    Make it easy for people who aren’t on your PR mailing list to get this information
    about your product.


    ### Find a Mouth


    Even the best developers tend to shy away from self-promotion. If you’re too introverted
    to learn to talk up your app, you can find someone to do it for you. Either way,
    your app needs someone out there spreading the word.


    Learning how to spread the word about your products can be very rewarding. You’ll
    build new and interesting relationships with smart people throughout the industry.


    But be warned that this activity eats up *lots* of time. Contacts don’t come easily,
    yet without them you have nowhere to send a press release.


    ### Advertising and Promotion


    The other option is to find a firm that specializes in press relations or marketing.
    They already have contacts and can leverage them on behalf of your products. Marketing
    and PR firms also have a great deal of experience on how to pitch a product.


    The biggest benefit, however, is that it lets you concentrate on what you do best—software
    development.


    ### Social Networking: Word-of-Mouth on Steroids


    Many developers have found that social networks are an excellent place to increase
    the visibility of their products. Both Twitter and Facebook let people opt in
    for regular updates about what you’re working on.


    Here’s where word-of-mouth on steroids comes in. In one status update, you can
    reach hundreds or thousands of people. To give you an idea of what this looks
    like, the graph in Figure 9-4 shows Safety Light being announced on a Twitter
    account with about 6,100 followers.


    **Figure 9-4:** This graph shows the number of visitors to the Safety Light website
    after its announcement on Twitter. The first peak on December 21 shows the response
    to the tweet: “Ready for Sale — The best flashlight for the iPhone should be available
    in iTunes shortly”. The second peak, a day later, was from “In case you missed
    it last night, the best flashlight in the App Store is now available”. These two
    tweets introduced the product to over 2,000 people. The graph was produced by
    Mint (`http://haveamint.com/`) running on the Safety Light web server.


    Note that returns diminish with repeated announcements. Mentioning a product a
    few times is fine, but any more than that is going to annoy your followers. Also,
    consider opening a separate product or business account, so you can keep your
    personal and business lives separate.


    Once you’ve established your accounts, you want people to follow you. For example,
    you can put a simple link on your website that visitors can click to follow the
    Twitter or Facebook account. In fact, it’s hard to find a website these days that
    *doesn’t* have social-networking links!


    **Tip:** Your product’s web page is also a great place to do cross-product marketing.
    When someone follows your activities on a social network, it’s likely that they
    enjoy your work. Make sure to introduce them to other products you’ve created.


    #### The Net Works


    The best part about social networks is that they can amplify word-of-mouth recommendations.
    Some of your followers are smarter, more handsome, and funnier than you are. (Hard
    to imagine, isn’t it?) Michael “Rands” Lopp is one such person: He’s an author
    who runs a highly respected website called *Rands in Repose* (`http://randsinrepose.com`).
    His `@rands` account on Twitter has over 11,000 followers.


    After seeing one of the previous tweets about Safety Light, he added his own comment:
    “Clearly missing a SafetyDance™ mode: `http://j.mp/7tB9G5`”. That link led to
    over 700 curious individuals learning about Safety Light, as shown in Figure 9-5.


    **Figure 9-5:** This graph shows the effect of an influential follower mentioning
    your app. In this case, a tweet from `@rands` on the day after Christmas led to
    over 700 people learning about Safety Light. Querying additional information about
    the shortened link (in the paragraph above) displayed the graph.


    Many users on social networks prefer to use shortened URLs (like the link in the
    previous paragraph), which gives you more room for the content in the status update.'
