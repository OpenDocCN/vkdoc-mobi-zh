    *Language* book is a great example. Apple has some of the best technical writers
    in the business, and it shows in this book that describes the programming language.
    All of the language’s features are described in detail along with pertinent examples.
    The book’s glossary and index are especial y helpful as you encounter new terminology
    and concepts. There’s a link to this online book on this book’s Missing CD page
    at *www.missingmanuals.com/cds*. (Or just do a web search for *the objective-c
    2.0 programming language.* You’ll find a link to the book on Apple’s site.) Another
    great resource is right inside this book—Appendix A. Here you’ll find additional
    resources for each of the topics covered in this book. Each is listed along with
    a URL and a short review. If there’s an area where you feel you need more help,
    head for the appendix.


    Developer Documentation


    It may seem odd that you’ve gone through an entire chapter describing a programming
    language, and the topic of developer documentation hasn’t been mentioned.


    It’s because there’s a lot of it and it’s real y good. To the point of it being
    a distraction, in fact.


    Since there’s no way this book can explain every line of code you’ll encounter,
    now’s a good time to introduce the system documentation shown in Figure 2-2.


    While you’re working in Xcode, you can call up this documentation at any time
    from the Help➝Developer Documentation menu. Once the window appears, you can search
    for anything by typing in the box at upper right: class names (such as *NSString*),
    method names (such as *release*), or concepts (such as *override*).


    Once your search results appear, you can drill down using various navigational
    elements.


    *Results list*


    The results for your search are displayed on the left side of the documentation
    window. You can control how much information is displayed in the API list by selecting
    how your search term will be used to match documentation pages. When Contains
    is selected, *NSString* will match *CFStringConvertEncodingToNSStringEncoding*
    because it’s a part of the API name. If Prefix is selected, *NSString(UIStringDrawing)*
    will match because it begins with the search text. The Exact setting would only
    show the page for *NSString.*


