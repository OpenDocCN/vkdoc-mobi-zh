    Chapter 6: A Flashlight for Pros


    **185**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Making Cocoa Touch**


    **Your Own**


    [[UIScreen mainScreen] bounds]


    ***Figure 6-9:***


    *The* bounds *of the iPhone’s screen, shown with*


    [[UIScreen mainScreen] applicationFrame]


    *values in parenthesis, have a zero origin with a*


    *width of 320 and a height of 480\. The* frame *is*


    (0,0)


    *placed within these bounds and has an origin*


    *and height adjusted by 20 pixels. Frame values*


    *are shown in square brackets.*


    [0,20]


    [460] (480)


    [320]


    (320)


    Here’s an example using the *UIScreen* *–applicationFrame* and *–bounds.* As you
    know, the screen for the iPhone is 320 × 480 pixels. So *UIScreen* returns a rectangle
    with these sizes when you query the *–bounds* method.


    Your application, however, can’t use all these pixels because of the status bar.
    The


    *–applicationFrame* method returns a frame rectangle that’s based on the bounds.


    That frame is used to place your first view in the window.


    It’s unlikely that you’re just going to have one view in your iPhone application.


    And that’s fine, because when you set a view’s frame, you’re also setting its
    initial bounds. When you set your first view’s frame size to 320 × 460, you also
    set the bounds.


    If you’re thinking that this is duplicating data, it is. But for a good reason:
    The new bounds have a zero origin that is used for placing subviews. These subviews
    don’t need to know anything about the frame of the superview. The situation is
    a little confusing, so Figure 6-10 provides a picture that’s hopeful y worth a
    thousand words.


    **186**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Making Cocoa Touch**


    **Your Own**


    (0.0)


    (0.0)


    ***Figure 6-10:***


    *This picture shows how*


    A


    B


    *three views, A, B, and C,*


    *are placed onscreen*


    [0, 50]


    C


    *using a frame and bounds*


    *coordinates. View A has*


    [50, 100]


    (250)


    *bounds of 300* × *400, and*


    B


    [150]


    *subview B has a frame*


    *size of 200* × *250 with an*


    [200]


    *origin at 50, 100\. When*


    (400)


    *you specify the placement*


    [250]


    *of subview C, you use view*


    *B’s bounds of 200* × *250.*


    (200)


    [200]


    (300)


    Note that view C in the diagram has no idea what the frame of the superview B
    is set to. Nor does it know what the bounds of view B are. Having two sets of
    coordinates, frames, and bounds lets view C worry only about where its frame is
    placed within superview B’s bounds.


    ***Note:*** For the most part, there’s a one-to-one relationship between bounds
    and frame coordinates.


    One pixel in the bounds is the same as one pixel in the frame. Why would you want
    to mess with that?


    Changing the bounds can scale a view: If you halve the size of the bounds and
    don’t change the size of the subview frame, the effective size of that subview
    is also halved. Similarly, changing the origin of the bounds moves all subviews.
    To see the effect, change the *#if* from 0 to 1 in *Flashlight_ProAppDelegate*:


    . . .


    mainViewController.view.frame = applicationFrame;


    CGRect funkyBounds = mainViewController.view.bounds;


    funkyBounds.origin = CGPointMake(-10.0f, 10.f);


    funkyBounds.size.width /= 2.0f;


    funkyBounds.size.height /= 2.0f;


    mainViewController.view.bounds = funkyBounds;


    . . .


    This test code also makes it easier to see how view concealment works.


    Chapter 6: A Flashlight for Pros


    **187**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Making Cocoa Touch**


    **Your Own**


    *More view animation*'
  trans: "\n如果你查看`@implementation`，会看到大量在 RGB 和 HSV 色彩空间之间进行转换的 C 语言代码。（本节中的源代码来自\
    \ Alvy Ray Smith 与 Eric Ray Lyons 合著的一篇 ACM 论文。若想自行查看，可在网上搜索“converting RGB to\
    \ HSV written in C”。）\n\n## 专业级手电筒\n\n### 打造专属 Cocoa Touch\n\n这段代码说明了几个要点。首先，Objective-C\
    \ 与标准 C 语言配合得非常好。算法中的代码保持不变，仅做了风格上的调整，主要是为了让命名和格式适应新环境。\n\n另一个重要之处在于，通过 Objective-C\
    \ 封装器，这段相当复杂的代码变得更易理解。即便不查看任何文档，你也能猜出以下代码的功能：\n\n```\nCGFloat brightness = [[UIColor\
    \ orangeColor] brightness];\n```\n```\n[mySlider setValue:brightness];\n```\n\
    ```\nUIColor *backgroundColor = [[UIColor redColor] colorWithBrightness:0.6f];\n\
    ```\n```\n[myView setBackgroundColor:backgroundColor];\n```\n\n当你决定使用分类时，有一行代码至关重要：\n\
    \n```\n#import \"UIColor+Brightness.h\"\n```\n\n这行代码能让编译器知晓新增的方法，并将其链接到最终的可执行文件中。如果忘记添加，构建应用时会出现“可能无法响应”的警告。\n\
    \n#### `UIView+Brightness`\n\n这个简单的 `UIView` 分类使用了你刚刚看到的 `UIColor` 分类，在设置视图背景颜色时添加了一个亮度参数。一个分类完全可以调用另一个分类：只要记得导入\
    \ `@interface`，它们的行为就与原类完全一致。\n\n#### `UIView+Concealed`\n\n作为设计的一部分，你希望信息视图和工具栏有时能移出屏幕。信息无需无限期展示，而工具栏在手电筒锁定时需要隐藏。\n\
    \n你本可以通过向 `IFInfoView` 添加方法并创建 `UIToolbar` 的子类来实现这些功能。但你的做法更聪明！\n\n##### 新增属性\n\
    \n你本可以使用 `UIView` 现有的 `hidden` 属性来切换视图的可见性。不过这种做法不够优雅，也无法让用户感知到信息的短暂性。在隐藏视图的过程中加入一点动画效果，就能同时解决这两个问题。\n\
    \n这个 `UIView` 分类为任意视图添加了一个 `conceal` 属性。这种做法的精妙之处在于，当发现 Bug 或需要添加新的隐藏功能时，只需修改一次代码，而无需在两个或更多视图中分别改动。\n\
    \n`UIView+Concealed` 分类为视图添加了一个新属性。你可以通过 `-setConcealed:` 方法让视图以动画形式移入或移出屏幕。同样，你也可以使用\
    \ `-isConcealed` 消息检查视图是否可见。\n\n> **注意：** 分类无法为类添加实例变量。在大多数情况下，属性会引用这些变量之一，但这并非强制要求。属性仅定义了访问类内部某些数据的协议。\n\
    \n该分类利用现有的 `frame` 属性（以及 `UIView` 实例变量）来判断视图是否在屏幕上。\n\n例如，控制器可以通过这个新属性来切换视图的隐藏状态：\n\
    \n```\nmyView.concealed = ! myView.isConcealed;\n```\n\n控制器只需在实现文件顶部添加这一行代码：\n\
    \n```\n#import \"UIView+Concealed.h\"\n```\n\n##### 视图坐标\n\n当你隐藏视图时，实际上是在改变它在父视图中的坐标。在了解移动视图的代码之前，你需要先花点时间理解\
    \ Cocoa Touch 中的视图坐标系。\n\n实际上，在本教程的开头部分你就已经接触过这个坐标系了。在学习 `Flashlight_ProAppDelegate`\
    \ 时，你看到了这行代码：\n```\nCGRect applicationFrame = [[UIScreen mainScreen] applicationFrame];\n\
    ```\n如果你当时充满好奇，可能还查阅过 `UIScreen` 的文档，发现该类中只有另一个方法：`-bounds`。在本章中，你也反复看到术语 `frame`。简单来说，`bounds`\
    \ 定义了子视图 `frame` 所处的坐标系（见图 6-9）。\n\n\n`[[UIScreen mainScreen] bounds]`  \n(0,0)\n\
    \n```\n[[UIScreen mainScreen] applicationFrame]\n```\n\n> **图 6-9：** iPhone 屏幕的\
    \ `bounds`，括号内为坐标值，其原点为 (0,0)，宽度为 320，高度为 480。`frame` 位于这些 bounds 之内，其原点和高度相对于\
    \ bounds 分别偏移了 20 像素。frame 的数值以方括号标示。\n\n以下是使用 `UIScreen` 的 `-applicationFrame`\
    \ 和 `-bounds` 的示例。如你所知，iPhone 的屏幕分辨率为 320 × 480 像素。因此，当你查询 `-bounds` 方法时，`UIScreen`\
    \ 会返回一个具有这些尺寸的矩形。\n\n然而，由于状态栏的存在，你的应用无法使用所有这些像素。`-applicationFrame` 方法会返回一个基于\
    \ bounds 的 frame 矩形。该 frame 用于将你的第一个视图放置在窗口中。\n\n在 iPhone 应用中，你很可能不会只有一个视图。这没问题，因为当你设置视图的\
    \ frame 时，实际上也是在设置其初始的 bounds。当你将第一个视图的 frame 尺寸设置为 320 × 460 时，你也同时设置了 bounds。\n\
    \n如果你觉得这像是在重复数据，没错，确实如此。但这是有充分理由的：新的 bounds 的原点为 (0,0)，专门用于放置子视图。这些子视图无需了解父视图的任何\
    \ frame 信息。这种情况可能有些令人困惑，因此图 6-10 提供了一张图片，希望能胜过千言万语。\n\n> **图 6-10：** 这张图展示了三个视图\
    \ A、B、C 如何通过 frame 和 bounds 坐标放置在屏幕上。视图 A 的 bounds 为 300 × 400，子视图 B 的 frame 尺寸为\
    \ 200 × 250，原点位于 (50, 100)。当你指定子视图 C 的位置时，需要使用视图 B 的 bounds，即 200 × 250。\n\n请注意，图中的视图\
    \ C 完全不知道父视图 B 的 frame 设置为何值，也不知道视图 B 的 bounds 是多少。拥有 frame 和 bounds 这样两套坐标系，使得视图\
    \ C 只需关心其 frame 在父视图 B 的 bounds 内的位置即可。\n\n> **注意：** 在大多数情况下，bounds 和 frame 坐标之间存在一一对应关系。bounds\
    \ 中的一个像素与 frame 中的一个像素是相同的。为什么要自找麻烦去更改它呢？\n\n更改 bounds 可以对视图进行缩放：如果将 bounds 的尺寸减半，同时保持子视图\
    \ frame 的尺寸不变，那么该子视图的实际显示尺寸也会减半。类似地，更改 bounds 的原点会移动所有子视图。要查看效果，请将 `Flashlight_ProAppDelegate`\
    \ 中的 `#if` 从 0 改为 1：\n\n```\n. . .\nmainViewController.view.frame = applicationFrame;\n\
    CGRect funkyBounds = mainViewController.view.bounds;\nfunkyBounds.origin = CGPointMake(-10.0f,\
    \ 10.f);\nfunkyBounds.size.width /= 2.0f;\nfunkyBounds.size.height /= 2.0f;\n\
    mainViewController.view.bounds = funkyBounds;\n. . .\n```\n\n这段测试代码也能让你更清楚地看到视图隐藏的工作机制。\n\
    \n#### 更多视图动画\n"
- fmt: "在`LightView`类中，您看到了一些改变背景颜色的基础动画。在本部分中，您将看到更多动画代码。这次用它来移动视图的框架，使其平滑地滑入和滑出屏幕。\n\
    \n既然您已经是视图框架和父视图（第162页）的专家，您可以了解`-isConcealed`属性是如何实现的：\n\n```\nCGRect superviewBounds\
    \ = self.superview.bounds;\nCGRect viewFrame = self.frame;\n\nif (viewFrame.origin.y\
    \ >= superviewBounds.size.height) {\n    // view is below the superview’s frame\n\
    \    result = YES;\n}\nelse if (viewFrame.origin.y < superviewBounds.origin.y)\
    \ {\n    // view is above the superview’s frame\n    result = YES;\n}\n```\n\n\
    如果视图的框架位于其父视图边界之上或之下，则视为被隐藏。类似地，`-setConcealed:animated:duration:`使用`superviewBounds`来计算新的`viewFrame`，根据`concealed`参数，该框架要么在屏幕上，要么在屏幕外。\n\
    \n但是什么让框架平滑移动呢？是结尾的这段小代码：\n\n```\nif (animated)\n{\n    [UIView beginAnimations:@\"\
    updateConcealedView\" context:NULL];\n    [UIView setAnimationDuration:duration];\n\
    }\nself.frame = viewFrame;\nif (animated)\n{\n    [UIView commitAnimations];\n\
    }\n```\n\nUIKit中的许多方法都使用`animated`参数。动画虽然酷，但在初始化视图时并非最佳方案。如果启动代码需要1/3秒，会让应用感觉笨拙，因此在视图控制器的`-viewDidLoad`方法中调用此代码可以解决问题：\n\
    \n```\n[self.myView setConcealed:YES animated:NO];\n```\n\n**188**\n\niPhone App\
    \ Development: The Missing Manual\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**让 Cocoa Touch 成为你自己的**\n\n*渐进方法*\n\n此类类别中的方法定义也展示了Objective-C开发者使用的另一种常见技术。方法是渐进定义的。完成所有工作的方法是`-setConcealed:animated:duration:`，如果您想显式指定每个参数，可以使用此方法。\n\
    \n然而，在大多数情况下，默认设置就足够了，因此您只需发送`-setConcealed`消息（或使用`concealed`属性）。而且，如上所述，您可以使用`-setConcealed:animated:`方法进行快速初始化。\n\
    \n***提示：** 这种方法在概念上类似于C++中的默认参数。*\n\n*一个新特性*\n\n您还记得使用类别进行隐藏（第185页）如何让您轻松地为所有视图添加新功能吗？`-concealAfterDelay:`方法就是一个完美的例子。\n\
    \n在添加了管理视图位置的方法后，您发现在视图控制器中做大量工作来管理隐藏是一件麻烦事。一直调用`-setConcealed`很痛苦。\n\n经过两个方法和八行代码，您得到了这个解决方案：\n\
    \n```\n- (void)conceal {\n    self.concealed = YES;\n}\n\n- (void)concealAfterDelay:(NSTimeInterval)delay\n\
    {\n    [NSObject cancelPreviousPerformRequestsWithTarget:self\n              \
    \                              selector:@selector(conceal) object:nil];\n    [self\
    \ performSelector:@selector(conceal) withObject:nil afterDelay:delay];\n}\n```\n\
    \n当您向视图发送带延迟的`-concealAfterDelay:`消息时，该视图会在指定时间过后自动隐藏。现在您的视图控制器可以这样做：\n\n```\n\
    self.myView.concealed = NO;\n[self.myView concealAfterDelay:3.0f];\n```\n\n该控制器依赖于`NSObject`中一个非常酷的方法，它允许您调用一个选择器并向其传递一个对象。这两行代码在功能上是相同的：\n\
    \n```\n[myObject myMethod:myParameter];\n[myObject performSelector:@selector(myMethod:)\
    \ withObject:myParameter];\n```\n\nChapter 6: A Flashlight for Pros\n\n**189**\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**塑造你的模型**\n\n这本身就很巧妙。您可以使用此技术在运行时（而不仅仅是编译时）分派消息。但更令人印象深刻的是，您可以通过使用`afterDelay`参数来配置发送消息前的等待时间："
  raw: 'In the *LightView* class, you saw some basic animation to change the background
    color. In this category, you see more animation code. This time it’s used to move
    the view’s frame so that it slides smoothly on- and offscreen.


    Now that you’re an expert with view frames and superview (page 162), you can see
    how the *–isConcealed* property is implemented:


    CGRect superviewBounds = self.superview.bounds;


    CGRect viewFrame = self.frame;


    if (viewFrame.origin.y >= superviewBounds.size.height) {


    // view is below the superview’s frame


    result = YES;


    }


    else if (viewFrame.origin.y < superviewBounds.origin.y) {


    // view is above the superview’s frame


    result = YES;


    }


    If the view’s frame is above or below its parent’s bounds, then it’s considered
    concealed. Similarly, *–setConcealed:animated:duration:* uses the *superviewBounds*
    to compute a new *viewFrame* that is either on- or offscreen depending on the
    concealed parameter.


    But what makes the frame move around smoothly? It’s this little bit of code at
    the end:


    if (animated)


    {


    [UIView beginAnimations:@″updateConcealedView″ context:NULL];


    [UIView setAnimationDuration:duration];


    }


    self.frame = viewFrame;


    if (animated)


    {


    [UIView commitAnimations];


    }


    Many methods within UIKit use an animated parameter. Animation is cool, but when
    you’re initializing views, it’s not the best solution. Having startup code that
    takes 1/3 of a second will make the app feel awkward, so calling this code in
    your view controller’s *–viewDidLoad* method solves the problem:


    [self.myView setConcealed:YES animated:NO];


    **188**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Making Cocoa Touch**


    **Your Own**


    *Progressive methods*


    The method definitions in this class category also show another common technique
    used by Objective-C developers. Methods are defined progressively. The method
    that does all the work is *–setConcealed:animated:duration:,* and you can use
    this method if you want to specify each parameter explicitly.


    In most cases, however, you’re fine with the default settings, so you can just
    send the


    *–setConcealed* message (or use the *concealed* property). And, as you saw above,
    you can use the *–setConcealed:animated:* method for quick initialization.


    ***Tip:*** This approach is similar in concept to default parameters in C++.


    *A new feature*


    Do you remember how using a category for concealment (page 185) let you easily
    add new features to all your views? The *–concealAfterDelay:* method is a perfect
    example.


    After adding the methods to manage the view’s placement, you realize you’re doing
    a lot of work in your view controllers to manage the concealment. Calling


    *–setConcealed* all the time is a pain.


    Two methods and eight lines of code later, you have this solution:


    - (void)conceal {


    self.concealed = YES;


    }


    - (void)concealAfterDelay:(NSTimeInterval)delay


    {


    [NSObject cancelPreviousPerformRequestsWithTarget:self


    selector:@selector(conceal) object:nil];


    [self performSelector:@selector(conceal) withObject:nil afterDelay:delay];


    }


    When you send a view the *–concealAfterDelay:* message along with a delay, the
    view is automatical y concealed after that period has elapsed. Your view controller
    can now do this:


    self.myView.concealed = NO;


    [self.myView concealAfterDelay:3.0f];


    This controller relies on a very cool method in *NSObject* that lets you invoke
    a selector and pass it an object. These two lines of code are functional y identical:


    [myObject myMethod:myParameter];


    [myObject performSelector:@selector(myMethod:) withObject:myParameter]; Chapter
    6: A Flashlight for Pros


    **189**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Fashion Your Models**


    Which, in and of itself, is pretty neat. You can use this technique to dispatch
    messages at runtime, not just at compile time. But it gets even more impressive
    because you configure how long to wait before sending the message by using the
    *afterDelay* parameter:'
