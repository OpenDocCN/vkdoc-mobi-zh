    **高级用户诊所**


    **目标还是配置？**


    一些开发者会创建一个 Distribution 构建配置，在源列表中选择 Other，然后将其作为存储 beta 设置的位置。他们不选择新的构建目标，而是从
    Other 列表中选择 Aggregate。


    Flashlight Pro 项目对 beta 和最终应用构建都使用了聚合目标。在`Groups & Files`中的`Targets`下，你会看到两个红色的目标图标：`Beta`和`Final`。


    如果你展开`Beta`的展开三角形，你会看到聚合目标首先构建`Safety Light (Beta)`，然后运行一个名为`Package Release`的脚本。如果你双击该脚本名称，你可以编辑它。此脚本会备份
    dSYM 调试信息（用于处理崩溃报告），并创建一个你可以分发给测试人员的 ZIP 文件。


    使用多个目标时，你可以同时使用几个脚本。在`Final`目标中，发布的打包方式与 beta 构建时相同，然后重新签名，以便你可以在测试设备上运行它。


    你可以通过右键单击目标名称，选择 Add ➝ New Build Phase ➝ New Run Script Build Phase，将你自己的脚本添加到聚合目标中。一个很好的例子是，一个将你的
    beta 构建上传到服务器以便测试人员下载的脚本。


    为了进一步自动化此过程，flashlight 项目有两个 shell 脚本。在终端中从命令行运行`build_beta`或`build_final`后，你会得到一个准备分发给
    beta 测试人员或上传到 App Store 的 ZIP 文件。


    另一种方法是，他们只更改 Active Configuration，然后再进行构建。这种方法的问题在于，你现在有两个“发布”配置。如果你更改了 Release
    配置中的一个构建设置，却忘记在 Distribution 中更新相同的设置，你的 beta 测试人员将无法与你使用相同的代码进行工作。随着你添加最终版本、产品的精简版、最终版本的
    Lite 版本等等，你最终会拥有许多配置。


    当使用多个目标时，你也会遇到类似的问题：你可以将一个文件添加到一个目标，却忘记添加到其他目标。实际上，很容易发现这个错误——当你在`Groups & Files`中使用展开三角形时，你会看到不同的文件数量。所有目标在`Copy
    Bundle Resources`、`Compile Sources`和`Link Binary With Libraries`之后括号内的项目数量应该相同。此外，如果目标缺少文件，你很可能会看到一个编译器错误来提醒你这个差异。


    使用目标的另一个优点是它们可以用来自动化你的构建过程。你可以创建“聚合”目标，让你运行执行后处理的脚本。要创建聚合目标，进入`Groups & Files`，右键单击`Targets`，然后选择`Add
    Target`。在出现的窗口中，选择`Other`源列表中的`Aggregate`。


    更改了授权构建设置后，你还需要更改下面几行的`Code Signing Identity`设置。使用`Any iPhone OS Device`以及`iPhone
    Distribution`。自动配置文件选择器应该会显示它匹配到了`Squidger Beta Distribution`或你在设置分发配置文件时提供的任何名称。


