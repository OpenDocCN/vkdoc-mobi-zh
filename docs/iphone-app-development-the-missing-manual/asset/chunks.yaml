- fmt: "### 广告与推广\n\n同时，搜索指向你推广网站的链接。除了在 Google 主搜索框中输入 `safetylightapp.com`，还可以查看哪些博主正在链接到你的产品。为此，请访问\
    \ `http://blogsearch.google.com` 并输入 `link:safetylightapp.com`。\n\n在寻找人们谈论你产品的过程中，试着像他们一样思考。使用诸如\
    \ `flashlight for iPhone` 和 `flashlight app` 这样的短语，而不仅仅是产品名称。\n\n如果你在 App Store\
    \ 中拥有多个相互竞争的应用程序，你还能深入了解人们对这些其他产品的看法。\n\n**292**\n\niPhone App 开发：缺失的手册\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### 广告与推广\n\n*获取高价值点击*\n\n如果能知道客户何时点击了导向你 iTunes 页面的链接，那该多好？如果还能知道该链接何时促成了一笔购买，那岂不是更棒？\n\
    \nApple 拥有所有这些宝贵信息，而最棒的是，你还能因此获得报酬！你正在将客户引导至 iTunes，因此，对于从入站链接产生的每笔购买，你将获得 5%\
    \ 的佣金。只需注册成为 iTunes 联盟会员：`http://www.apple.com/itunes/affiliates/`。\n\n**注册**\n\
    \n该计划通过第三方公司运营：你需在 `LinkShare` 创建一个账户。通过此账户，你可以申请成为 iTunes 联盟会员，创建定制链接，并查看统计数据：\n\
    \n1. **前往 iTunes 联盟会员页面（`http://www.apple.com/itunes/affiliates/`），然后点击“申请成为联盟会员”链接。**\n\
    \   你将被引导至 `LinkShare` 的注册页面。\n\n2. **选择合适的法律实体类型。**\n   如果你是独立开发者，请选择“个人”并提供社会安全号码（SSN）。对于企业，请选择相应类型并提供雇主识别号（EIN）。\n\
    \n3. **输入你的姓名和邮寄地址。**\n   `LinkShare` 使用此信息将你的收入支票邮寄给你。你还必须提供一个唯一的电子邮件地址和账户信息，以便访问该\
    \ Web 应用程序。\n\n4. **点击“继续”后，系统会提示你输入网站名称及其 URL 以及其他描述信息。**\n   如果你有公司网站，请使用它，因为你可能不希望每次发布新应用程序时都经历此注册过程。\n\
    \n由于你的推广网站是新建的，你无法确切知道它将产生多少流量。许多网站每月有 5,000 到 50,000 次浏览量，这可以作为一个良好的估算值。此外，请在“简短描述”字段中注明你的网站用于在\
    \ iTunes App Store 推广一款 iPhone 应用。\n\n5. **当你点击“继续”时，应该会看到一个确认页面。此时，你可以再次点击“继续”。**\n\
    \   你将到达发布商门户。\n\n至此，你刚刚创建了一个账户；你仍然需要申请成为 iTunes 联盟会员：\n\n1. **在发布商主页上，点击导航栏中的\
    \ `PROGRAMS` 链接。**\n   你将进入一个可以搜索公司的页面。\n\n第 9 章：你已经拥有客户！\n\n**293**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### 广告与推广\n\n2. **在广告商搜索框中，输入 `Apple iTunes`，然后点击 `Go`。**\n   你会看到 iTunes 的唯一一条结果。\n\
    \n3. **勾选左侧的复选框，然后点击页面底部的 `Apply`。在出现的弹出窗口中，接受条款和条件，然后点击 `OK`。**\n   搜索结果中的“状态”列将显示“待处理”，表示你的申请正在处理中。你可以查看“我的广告商”标签页，以了解状态何时变为“已批准”。\n\
    \n`LinkShare` 和 Apple 都会审核你的请求。大多数情况下，申请会在几天内被批准。一些美国境外的开发者最初可能会被该计划拒绝：如果遇到任何问题，请随时通过电子邮件联系\
    \ `LinkShare` 或 Apple。\n\n*创建链接*"
  raw: 'Also search for links to your promotional website. Besides typing *safetylightapp.com*
    into Google’s main search box, see which bloggers are linking to your product.
    To do this, go to *http://blogsearch.google.com* and type *link:safetylightapp.com.*


    As you look for people talking about your product, try to think like they do.
    Use phrases like *flashlight for iPhone* and *flashlight app* instead of just
    the product name.


    If you’re in the App Store with multiple competing apps, you’ll also gain insight
    into what people are saying about these other products.


    **292**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Advertising and**


    **Promotion**


    *Get rich clicks*


    Wouldn’t it be great to know anytime a customer clicked a link that led to your
    page on iTunes? And wouldn’t it be cool to know when that link resulted in a purchase?


    Apple has all of this valuable information, and the best part is that you get
    paid to collect it! You’re sending customers to iTunes, so you earn a 5 percent
    commission for every purchase that results from an inbound link. Just sign up
    to be an iTunes Affiliate: *http://www.apple.com/itunes/affiliates/*.


    Signup


    The program is run through a third-party company: You create an account with LinkShare.
    From this account, you apply to be an iTunes affiliate, create customized links,
    and view the statistics:


    **1\. Go to the iTunes Affiliates page ( *http://www.apple.com/itunes/affiliates/*),
    and** **then click the “Apply to be an affiliate” link.**


    You’re transported to LinkShare’s signup page.


    **2\. Select the appropriate Legal Entity Type.**


    If you’re a single developer, choose Individual and supply a Social Security Number
    (SSN). For a businesses, select the appropriate type and supply an Employer ID
    Number (EIN).


    **3\. Enter your name and mailing address.**


    LinkShare uses this information to mail you a check for your earnings. You must
    also supply a unique email address and account information to access the web application.


    **4\. After clicking Continue, you’re prompted to enter the name of your website**
    **along with the URL and other information that describes it.**


    If you have a company site, use that, because you won’t want to go through this
    signup process each time you release a new application.


    Since your promotional site is new, you don’t know the exact amount of traffic
    it will generate. Many sites receive between 5,000 and 50,000 views per month,
    so that would be a good estimate. Also note in the Short Description field that
    your website is for promoting an iPhone app in the iTunes App Store.


    **5\. When you click Continue, you should see a confirmation page. At that point,**
    **you can click Continue again.**


    You arrive at the Publisher portal.


    At this point you’ve just created an account; you still need to apply to be an
    iTunes Affiliate:


    **1\. On the Publisher home page, click the PROGRAMS link in the navigation bar.**


    You arrive on a page where you can search for companies.


    Chapter 9: You’ve Got Customers!


    **293**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Advertising and**


    **Promotion**


    **2\. In the Advertiser Search box, type *Apple iTunes*** **and then click Go.**


    You see a single result for iTunes.


    **3\. Turn on the checkbox on the left, and then click Apply at the bottom of
    the** **page. In the pop-up window that appears, accept the terms and conditions,**
    **and then click OK.**


    The Status column in the search results will show “Pending” while your application
    is being processed. You can check the My Advertisers tab to see when the status
    changes to “Approved”.


    Both LinkShare and Apple will review your request. In most cases, the application
    will be accepted in a matter of days. Some developers outside of the United States
    have been initial y rejected for the program: Don’t hesitate to contact either
    LinkShare or Apple by email if you have any problems.


    *Creating links*'
  trans: "\n### 广告与推广\n\n同时，搜索指向你推广网站的链接。除了在 Google 主搜索框中输入 `safetylightapp.com`，还可以查看哪些博主正在链接到你的产品。为此，请访问\
    \ `http://blogsearch.google.com` 并输入 `link:safetylightapp.com`。\n\n在寻找人们谈论你产品的过程中，试着像他们一样思考。使用诸如\
    \ `flashlight for iPhone` 和 `flashlight app` 这样的短语，而不仅仅是产品名称。\n\n如果你在 App Store\
    \ 中拥有多个相互竞争的应用程序，你还能深入了解人们对这些其他产品的看法。\n\n**292**\n\niPhone App 开发：缺失的手册\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### 广告与推广\n\n*获取高价值点击*\n\n如果能知道客户何时点击了导向你 iTunes 页面的链接，那该多好？如果还能知道该链接何时促成了一笔购买，那岂不是更棒？\n\
    \nApple 拥有所有这些宝贵信息，而最棒的是，你还能因此获得报酬！你正在将客户引导至 iTunes，因此，对于从入站链接产生的每笔购买，你将获得 5%\
    \ 的佣金。只需注册成为 iTunes 联盟会员：`http://www.apple.com/itunes/affiliates/`。\n\n**注册**\n\
    \n该计划通过第三方公司运营：你需在 `LinkShare` 创建一个账户。通过此账户，你可以申请成为 iTunes 联盟会员，创建定制链接，并查看统计数据：\n\
    \n1. **前往 iTunes 联盟会员页面（`http://www.apple.com/itunes/affiliates/`），然后点击“申请成为联盟会员”链接。**\n\
    \   你将被引导至 `LinkShare` 的注册页面。\n\n2. **选择合适的法律实体类型。**\n   如果你是独立开发者，请选择“个人”并提供社会安全号码（SSN）。对于企业，请选择相应类型并提供雇主识别号（EIN）。\n\
    \n3. **输入你的姓名和邮寄地址。**\n   `LinkShare` 使用此信息将你的收入支票邮寄给你。你还必须提供一个唯一的电子邮件地址和账户信息，以便访问该\
    \ Web 应用程序。\n\n4. **点击“继续”后，系统会提示你输入网站名称及其 URL 以及其他描述信息。**\n   如果你有公司网站，请使用它，因为你可能不希望每次发布新应用程序时都经历此注册过程。\n\
    \n由于你的推广网站是新建的，你无法确切知道它将产生多少流量。许多网站每月有 5,000 到 50,000 次浏览量，这可以作为一个良好的估算值。此外，请在“简短描述”字段中注明你的网站用于在\
    \ iTunes App Store 推广一款 iPhone 应用。\n\n5. **当你点击“继续”时，应该会看到一个确认页面。此时，你可以再次点击“继续”。**\n\
    \   你将到达发布商门户。\n\n至此，你刚刚创建了一个账户；你仍然需要申请成为 iTunes 联盟会员：\n\n1. **在发布商主页上，点击导航栏中的\
    \ `PROGRAMS` 链接。**\n   你将进入一个可以搜索公司的页面。\n\n第 9 章：你已经拥有客户！\n\n**293**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### 广告与推广\n\n2. **在广告商搜索框中，输入 `Apple iTunes`，然后点击 `Go`。**\n   你会看到 iTunes 的唯一一条结果。\n\
    \n3. **勾选左侧的复选框，然后点击页面底部的 `Apply`。在出现的弹出窗口中，接受条款和条件，然后点击 `OK`。**\n   搜索结果中的“状态”列将显示“待处理”，表示你的申请正在处理中。你可以查看“我的广告商”标签页，以了解状态何时变为“已批准”。\n\
    \n`LinkShare` 和 Apple 都会审核你的请求。大多数情况下，申请会在几天内被批准。一些美国境外的开发者最初可能会被该计划拒绝：如果遇到任何问题，请随时通过电子邮件联系\
    \ `LinkShare` 或 Apple。\n\n*创建链接*\n"
- fmt: "作为 iTunes 联盟会员，您将可以使用链接创建工具。此工具可让您在 iTunes 中搜索应用程序，并生成包含您独特账户信息的链接：\n\n1.\
    \  前往`http://www.linkshare.com/`并点击 **Login** 以打开发布商门户。\n    在顶部，点击 **LINKS**\
    \ 显示您的广告商列表；然后点击 **Apple iTunes**。\n\n    ***注意：*** 在您的网站获得批准之前，您不会在列表中看到 “Apple\
    \ iTunes”。您将看到用于创建特定于 iTunes 的链接的页面。\n\n2.  在页面顶部附近，点击 **Link Maker Tool**。\n\
    \    您将进入一个新窗口，可以在其中搜索 iTunes 中的条目。\n\n3.  由于您对 iPhone 应用程序感兴趣，请为 **Media Type**\
    \ 选择 **Applications**。将国家选择保留为 USA，并输入您的应用程序名称作为搜索词。\n    您将看到匹配项列表。在您的应用程序名称右侧，您会看到一个箭头链接。\n\
    \n4.  点击箭头以显示标准链接按钮的 HTML。\n5.  很可能您只需要链接的地址，因此只需复制 `<a>` 标签的 `href` 属性的值。\n\n\
    生成的链接又长又难读，但您需要理解它才能充分利用它。该 URL 的域名为`click.linksynergy.com`，路径以`/fs-bin/stat`开头。参数包括`id`（您的联盟\
    \ ID 号）和`offerid`（指定此链接用于 iTunes）。如果您仔细观察，`RD_PARAM1`是您产品在 iTunes 上的编码 URL。该 URL\
    \ 也以将链接关联回您的 LinkShare 账户的信息结尾。\n\n但最重要的参数是尚未出现的一个参数。\n\nLinkShare 允许您在 URL 中添加最后一个参数，以指示链接的来源。一个标识符，在发布商门户中称为\
    \ “Member ID”，在其他文档中称为 “signature”，由 URL 中的`u1`参数表示。您需要手动添加此参数。\n\n选择签名时，请使其有助于您快速识别链接。例如，如果您在`CHOCKLOCK.COM`上投放广告，您可能希望使用类似`CHOCKLOCK_AD`的内容。\n\
    \n由 iTunes Link Maker 生成的链接将以类似`partnerId%253D30`的内容结尾。要跟踪来自您广告的链接，您可以在 URL 末尾附加`&u1=`和签名，最终得到类似`partnerId%253D30&u1=CHOCKLOCK_AD`的内容。\n\
    \n`u1`参数不应超过 72 个字符。坚持使用字母、下划线和数字：任何其他字符都可能破坏 URL。\n\n***注意：*** 这些嵌入了签名的链接不仅限于网页。您也可以在\
    \ iPhone 应用程序内部使用它们。iPhone 开发者网站上的一篇文章解释了实现此目的的几种方法：`https://developer.apple.com/iphone/library/qa/qa2008/qa1629.html`。\n\
    \n如您所料，当客户点击链接时，他们将被带到您应用程序在 iTunes 中的页面。签名的总点击次数也会记录在 LinkShare 的数据库中。Apple 还将拥有必要的信息，以便对任何购买行为向您支付\
    \ 5% 的佣金。请注意，此佣金不仅限于您的应用程序：如果有人在接下来的 72 小时内购买了歌曲或视频，您也将从该销售中获得回扣。\n\nLinkShare\
    \ 每日更新其报告。最初，您只会看到 “Clicks” 列有数据，因为 Apple 将销售信息从 iTunes 传输回 LinkShare 存在延迟。佣金可能需要一周时间才能出现在您的报告中，但当它们出现时，您将看到类似图\
    \ 9-12 的内容。\n\n![Image 93](index-314_1.jpg)\n\n***图 9-12：*** *该表格来自 LinkShare\
    \ 关于 2009 年 12 月 29 日至 2010 年 1 月 5 日期间对 iTunes 上 Safety Light 页面的链接的报告。它显示了促销网站上的\
    \ App Store 徽章是最受欢迎的链接，并且要求 Twitter 关注者留下评论可以产生销售。Apple 支付的 5% 佣金为该周赚取了 $87.91。*\n\
    \nSafety Light 促销网站上的所有链接都使用了 LinkShare 签名。查看该网站，您会在一个*非常*长的 URL 末尾看到表中列出的名称。\n\
    \n要查看报告，请转到 LinkShare 发布商门户并点击 **REPORTS**。然后，在 **Advanced Reports** 下，您可以通过 **Report\
    \ Type**（报告类型）进行几种选择：\n\n- **Signature Activity.** 此报告汇总了您附加到链接的每个 Member ID 签名的点击次数和销售额。此概览使您可以轻松查看哪些链接正在产生流量和销售。您将最常使用此报告。\n\
    - **Signature Orders.** iTunes 中的每笔交易都会列出产生佣金的 Member ID 签名。您还将看到交易的日期和时间以及订购的\
    \ SKU 类别。\n- **Product Success.** 要查看您在每个 SKU 类别中赚取了多少钱，请选择此报告。类别 “Q9020” 显示购买的应用程序数量。项目数量可以大于订单数量：一次可以购买多个应用程序。\n\
    \n***提示：*** LinkShare 还通过一个简单的 Web 服务提供其中一些信息。如果您希望自动处理报告，请在他们的帮助中心搜索 “Signature\
    \ Orders Report Web Service”：`http://helpcenter.linkshare.com/publisher/questions.php?questionid=780`。\n\
    \n*收集情报*\n\nSignature Activity 报告的 “Commissions” 列中报告的数字表明了一笔可观的额外收入，但当您添加 “Member\
    \ ID” 和 “Clicks” 列时，该报告变得更有价值。它们告诉您每个链接的使用频率及其盈利情况。\n\n不幸的是，没有足够的信息可以准确知道您自己的产品被购买了多少。Apple\
    \ 和 LinkShare 没有将订单分解为所购产品的单个 SKU。如果您看到一个 $4.99 的订单，您无法知道这是针对您的应用程序还是竞争对手的。\n\n\
    即使没有这些信息，您仍然可以确定哪些链接最有效。假设您有足够大的样本量，您可以比较每个签名的相对百分比。包含其他产品所导致的错误将在所有签名中均匀分布。如果您发现一个签名仅通过三次点击就产生了\
    \ $50 的销售额，请不要基于这个部分样本做任何决定。\n\n使用上面显示的表格，您可以比较 BADGE、DOWNLOAD 和 PRICE 的签名。这些签名用于促销网站上的每个链接：分别用于\
    \ “Available on the iPhone App Store” 图形徽章、“Download your copy” 文本链接和绿色的 “Only\
    \ 99¢” 链接。\n\n它们合计产生了 1,510 次点击。BADGE 链接的 1,152 次点击产生了从网站到 iTunes 的 76% 的流量。DOWNLOAD\
    \ 和 PRICE 链接分别产生了 17% 和 7% 的流量。显然，您希望确保徽章在网站上突出显示。\n\n***注意：*** App Store 徽标必须从\
    \ Apple 获得许可。在开发者网站的 App Store Resource Center 中获取详细信息：`http://developer.apple.com/iphone/appstore/marketing.html#storelogo`。您也可以从此页面下载标准图稿。"
  raw: 'As an iTunes Affiliate, you’ll have access to a link creation tool. This tool
    lets you search for an application in iTunes and generate a link with your unique
    account information:


    **1\. Go to *http://www.linkshare.com/*** **and click Login to open the Publisher
    portal.**


    **At the top, click LINKS to display a list of your advertisers; then click Apple**
    **iTunes.**


    ***Note:*** You won’t see “Apple iTunes” in the list until your site has been
    approved. You’ll see a page for creating a link specific to iTunes.


    **2\. Near the top of the page, click Link Maker Tool.**


    You arrive at a new window where you can search iTunes for titles.


    **3\. Since you’re interested in iPhone applications, select Applications for
    the** **Media Type. Leave the country selection as USA, and enter your application’s**
    **name as the search term.**


    You’re shown a list of matches. To the right of your application’s name, you see
    an arrow link displayed.


    **4\. Click the arrow to display the HTML for a standard link button.**


    **5\. It’s likely that you want only the address for the link, so just copy the
    value for** **the *<a>*** **tag’s *href*** **attribute.**


    The link that’s generated is long and hard to read, but you need to understand
    it before you can take advantage of it. The URL’s domain is *click.linksynergy.com,*
    and **294**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Advertising and**


    **Promotion**


    the path begins with */fs-bin/stat.* Parameters include the *id,* which is your
    affiliate ID


    number, and an *offerid,* which specifies the link is for iTunes. If you look
    closely, the RD_PARAM1 is an encoded URL for your product on iTunes. That URL
    also ends with information that ties the link back to your LinkShare account.


    But the most important parameter is the one that’s not there. Yet.


    *Monitor activity*


    LinkShare lets you add one last parameter to the URL that indicates where the
    link originated. An identifier, referenced as “Member ID” in the Publisher portal
    and


    “signature” in other documentation, is represented by the *u1* parameter in the
    URL.


    You need to add this parameter manual y.


    As you choose signatures, make them something that will help you quickly identify
    the link. For example, if you were running an ad at *CHOCKLOCK.COM,* you’d want
    to use something like *CHOCKLOCK_AD.*


    The link generated by the iTunes Link Maker will end with something like *partnerId%253D30.*
    To track the links from your ad, you’d append an *&u1=* and the signature to the
    end of the URL, ending up with *partnerId%253D30&u1=*


    *CHOCKLOCK_AD.*


    The *u1* parameter should be no more than 72 characters. Stick to using letters,
    underscores, and numbers: Any other characters might mess up the URL.


    ***Note:*** These links with embedded signatures are not limited to web pages.
    You can also use them from within an iPhone app. An article on the iPhone developer
    site explains several ways to do this: *https://*


    *developer.apple.com/iphone/library/qa/qa2008/qa1629.html*.


    As you’d expect, customers will be taken to your app’s page in iTunes when they
    click the link. The total number of clicks for the signature is also recorded
    in LinkShare’s database. Apple will also have the information needed to credit
    you with a 5 percent commission on any purchase made. Note that this commission
    is not limited to just your application: If someone buys a song or video within
    the next 72 hours, you earn a kickback on that sale, too.


    LinkShare updates its reports daily. Initial y, you see only the Clicks column
    filled in, because there’s a lag as Apple transfers sales information from iTunes
    back to LinkShare. The commissions can take up to a week to appear in your reports,
    but when they do, you’ll see something like Figure 9-12.


    Chapter 9: You’ve Got Customers!


    **295**


    ![Image 93](index-314_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Advertising and**


    **Promotion**


    ***Figure 9-12:***


    *This table comes from*


    *the LinkShare report*


    *for links onto the*


    *Safety Light page in*


    *iTunes from December*


    *29, 2009, to January 5,*


    *2010\. It shows that the*


    *App Store badge on*


    *the promotional site is*


    *the most popular link*


    *and that asking Twitter*


    *followers to leave*


    *a review generates*


    *sales. The 5 percent*


    *commission paid by*


    *Apple earned $87.91*


    *for the week.*


    All of the links on the Safety Light promotional website use the LinkShare signatures.
    Look at the site and you’ll see the names listed in the table at the end of a
    *very* long URL.


    To view the reports, go to the LinkShare Publisher portal and click REPORTS. Then,
    under Advanced Reports, you have several choices for the Report Type:


    • **Signature Activity.** This report summarizes the number of clicks and sales
    for each Member ID signature that you appended to the link. This overview makes
    it easy to see which of your links are generating activity and sales. You’ll use
    this report the most often.


    • **Signature Orders.** Each transaction in iTunes is listed with the Member ID


    signature that generated the commission. You’ll also see the date and time of
    the transaction as well as the SKU category that was ordered.


    • **Product Success.** To see how much you’ve earned in each SKU category, select
    this report. The category “Q9020” shows the number of apps purchased. The number
    of items can be greater than the number of orders: Multiple applications can be
    purchased at once.


    ***Tip:*** LinkShare also provides some of this information with a simple web
    service. If you’d like to automate the processing of the reports, search for “Signature
    Orders Report Web Service” in their Help Center: *http://helpcenter.linkshare.com/publisher/questions.php?questionid=780*.


    **296**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Advertising and**


    **Promotion**


    *Gathering intelligence*


    The numbers reported in the Commissions column of the Signature Activity report
    indicate a nice bit of extra income, but the report becomes much more valuable
    when you add in the Member ID and Clicks columns. They tell you how much each
    link is used and how much it earns.


    Unfortunately, not enough information is available to know exactly how many of
    your own products were purchased. Apple and LinkShare don’t break down the orders
    into individual SKUs for the products purchased. If you see one order for $4.99,
    you have no way of knowing it’s for your app and not your competitor’s.


    Even without this information, you can still determine which links are most effective.


    Assuming that you have a large enough sample size, you can compare the relative
    percentages for each signature. The error caused by other products being included
    will be distributed evenly amongst all signatures. If you see that a signature
    generates $50


    in sales with just three clicks, don’t make any decisions based on this partial
    sample.


    Using the table shown above, you can compare the signatures for BADGE, DOWNLOAD,
    and PRICE. These signatures were used on each of the links on the promotional
    site: for the “Available on the iPhone App Store” graphical badge, “Download your
    copy” text link, and “Only 99¢” link in green.


    Combined, they totaled 1,510 clicks. The BADGE link’s 1,152 clicks generated 76
    percent of the traffic from the site to iTunes. The DOWNLOAD and PRICE links produced
    17 percent and 7 percent, respectively. Clearly, you want to make sure that the
    badge is prominently displayed on the site.


    ***Note:*** The App Store logo must be licensed from Apple. Get details in the
    App Store Resource Center on the developer site: *http://developer.apple.com/iphone/appstore/marketing.html#storelogo*.
    You can also download the standard artwork from this page.'
  trans: "\n作为 iTunes 联盟会员，您将可以使用链接创建工具。此工具可让您在 iTunes 中搜索应用程序，并生成包含您独特账户信息的链接：\n\n\
    1.  前往`http://www.linkshare.com/`并点击 **登录** 以打开发布商门户。\n    在顶部，点击 **链接** 显示您的广告商列表；然后点击\
    \ **Apple iTunes**。\n\n    ***注意：*** 在您的网站获得批准之前，您不会在列表中看到 “Apple iTunes”。您将看到用于创建特定于\
    \ iTunes 的链接的页面。\n\n2.  在页面顶部附近，点击 **链接制作工具**。\n    您将进入一个新窗口，可以在其中搜索 iTunes 中的条目。\n\
    \n3.  由于您对 iPhone 应用程序感兴趣，请为 **媒体类型** 选择 **应用程序**。将国家选择保留为 USA，并输入您的应用程序名称作为搜索词。\n\
    \    您将看到匹配项列表。在您的应用程序名称右侧，您会看到一个箭头链接。\n\n4.  点击箭头以显示标准链接按钮的 HTML。\n5.  很可能您只需要链接的地址，因此只需复制\
    \ `<a>` 标签的 `href` 属性的值。\n\n生成的链接又长又难读，但您需要理解它才能充分利用它。该 URL 的域名为`click.linksynergy.com`，路径以`/fs-bin/stat`开头。参数包括`id`（您的联盟\
    \ ID 号）和`offerid`（指定此链接用于 iTunes）。如果您仔细观察，`RD_PARAM1`是您产品在 iTunes 上的编码 URL。该 URL\
    \ 也以将链接关联回您的 LinkShare 账户的信息结尾。\n\n但最重要的参数是尚未出现的一个参数。\n\nLinkShare 允许您在 URL 中添加最后一个参数，以指示链接的来源。一个标识符，在发布商门户中称为\
    \ “成员 ID”，在其他文档中称为 “签名”，由 URL 中的`u1`参数表示。您需要手动添加此参数。\n\n选择签名时，请使其有助于您快速识别链接。例如，如果您在`CHOCKLOCK.COM`上投放广告，您可能希望使用类似`CHOCKLOCK_AD`的内容。\n\
    \n由 iTunes Link Maker 生成的链接将以类似`partnerId%253D30`的内容结尾。要跟踪来自您广告的链接，您可以在 URL 末尾附加`&u1=`和签名，最终得到类似`partnerId%253D30&u1=CHOCKLOCK_AD`的内容。\n\
    \n`u1`参数不应超过 72 个字符。坚持使用字母、下划线和数字：任何其他字符都可能破坏 URL。\n\n***注意：*** 这些嵌入了签名的链接不仅限于网页。您也可以在\
    \ iPhone 应用程序内部使用它们。iPhone 开发者网站上的一篇文章解释了实现此目的的几种方法：`https://developer.apple.com/iphone/library/qa/qa2008/qa1629.html`。\n\
    \n如您所料，当客户点击链接时，他们将被带到您应用程序在 iTunes 中的页面。签名的总点击次数也会记录在 LinkShare 的数据库中。Apple 还将拥有必要的信息，以便对任何购买行为向您支付\
    \ 5% 的佣金。请注意，此佣金不仅限于您的应用程序：如果有人在接下来的 72 小时内购买了歌曲或视频，您也将从该销售中获得回扣。\n\nLinkShare\
    \ 每日更新其报告。最初，您只会看到 “点击量” 列有数据，因为 Apple 将销售信息从 iTunes 传输回 LinkShare 存在延迟。佣金可能需要一周时间才能出现在您的报告中，但当它们出现时，您将看到类似图\
    \ 9-12 的内容。\n\n![Image 93](img/index-314_1.jpg)\n\n***图 9-12：*** *该表格来自 LinkShare\
    \ 关于 2009 年 12 月 29 日至 2010 年 1 月 5 日期间对 iTunes 上 Safety Light 页面的链接的报告。它显示了促销网站上的\
    \ App Store 徽章是最受欢迎的链接，并且要求 Twitter 关注者留下评论可以产生销售。Apple 支付的 5% 佣金为该周赚取了 $87.91。*\n\
    \nSafety Light 促销网站上的所有链接都使用了 LinkShare 签名。查看该网站，您会在一个*非常*长的 URL 末尾看到表中列出的名称。\n\
    \n要查看报告，请转到 LinkShare 发布商门户并点击 **报告**。然后，在 **高级报告** 下，您可以通过 **报告类型** 进行几种选择：\n\
    \n- **签名活动.** 此报告汇总了您附加到链接的每个成员 ID 签名的点击次数和销售额。此概览使您可以轻松查看哪些链接正在产生流量和销售。您将最常使用此报告。\n\
    - **签名订单.** iTunes 中的每笔交易都会列出产生佣金的成员 ID 签名。您还将看到交易的日期和时间以及订购的 SKU 类别。\n- **产品成功.**\
    \ 要查看您在每个 SKU 类别中赚取了多少钱，请选择此报告。类别 “Q9020” 显示购买的应用程序数量。项目数量可以大于订单数量：一次可以购买多个应用程序。\n\
    \n***提示：*** LinkShare 还通过一个简单的 Web 服务提供其中一些信息。如果您希望自动处理报告，请在他们的帮助中心搜索 “签名订单报告\
    \ Web 服务”：`http://helpcenter.linkshare.com/publisher/questions.php?questionid=780`。\n\
    \n*收集情报*\n\n签名活动报告的 “佣金” 列中报告的数字表明了一笔可观的额外收入，但当您添加 “成员 ID” 和 “点击量” 列时，该报告变得更有价值。它们告诉您每个链接的使用频率及其盈利情况。\n\
    \n不幸的是，没有足够的信息可以准确知道您自己的产品被购买了多少。Apple 和 LinkShare 没有将订单分解为所购产品的单个 SKU。如果您看到一个\
    \ $4.99 的订单，您无法知道这是针对您的应用程序还是竞争对手的。\n\n即使没有这些信息，您仍然可以确定哪些链接最有效。假设您有足够大的样本量，您可以比较每个签名的相对百分比。包含其他产品所导致的错误将在所有签名中均匀分布。如果您发现一个签名仅通过三次点击就产生了\
    \ $50 的销售额，请不要基于这个部分样本做任何决定。\n\n使用上面显示的表格，您可以比较 BADGE、DOWNLOAD 和 PRICE 的签名。这些签名用于促销网站上的每个链接：分别用于\
    \ “Available on the iPhone App Store” 图形徽章、“Download your copy” 文本链接和绿色的 “Only\
    \ 99¢” 链接。\n\n它们合计产生了 1,510 次点击。BADGE 链接的 1,152 次点击产生了从网站到 iTunes 的 76% 的流量。DOWNLOAD\
    \ 和 PRICE 链接分别产生了 17% 和 7% 的流量。显然，您希望确保徽章在网站上突出显示。\n\n***注意：*** App Store 徽标必须从\
    \ Apple 获得许可。在开发者网站的 App Store Resource Center 中获取详细信息：`http://developer.apple.com/iphone/appstore/marketing.html#storelogo`。您也可以从此页面下载标准图稿。\n"
- fmt: "好的，这是按照您的要求排版后的Markdown文档。\n\n---\n\n# Another statistic you can generate\
    \ from these numbers is the sales per click.\n\nFor the `BADGE`, sales of $1,229.05\
    \ were generated with 1,152 clicks, or $1.07 per click. The `TWEET_REVIEW` link\
    \ only produced $0.35 per click. The reason for that number is that the `TWEET_REVIEW`\
    \ link was posted to Twitter reminding followers to review Safety Light. Affiliate\
    \ links that contain signatures can be shortened using services like `bit.ly`.\
    \ If you look at the information for the link `http://bit.ly/info/77QJhk`, you\
    \ see the `SAFETY_LIGHT_TWEET_REVIEW` signature at the end of the expanded link.\n\
    \nThe information page also graphs the link’s usage over time.\n\nObviously, some\
    \ of the people who followed the link to write a review had already purchased\
    \ the application and wouldn’t be generating any new sales. It’s actually surprising\
    \ that any sales were made at all: After looking at the Signature Orders report,\
    \ it appears that most of the commissions were generated from other products.\n\
    \n## Customer Support\n\n**Note:** Some signatures get cut off, as with “`SAFETY_LIGHT_TW`”.\
    \ Email clients, web browsers, copy/paste glitches, and other processing errors\
    \ can lead to these bad signatures. You’ll learn to ignore them.\n\nYou can use\
    \ these techniques in other scenarios, as well:\n\n- **Finding which advertising\
    \ works best for your product.** Give each publisher a unique signature, and see\
    \ whether the ad run at TouchArcade or SlideToPlay works better for your product.\n\
    - **Test different ad layouts and/or copy.** Is it better to advertise Safety\
    \ Light with the tag line “The Best Flashlight” or “Save Your Life”? Is it better\
    \ to feature the application icon or a clever tag line? By running various ads\
    \ with different signatures, you’ll know what works best.\n\n### Customer Support\n\
    \nAs your customer base grows, you’ll find that something else grows: support\
    \ email.\n\nYour customers will have problems, and it’s your job to address those\
    \ issues and keep them happy.\n\n#### Everything Is Perfect\n\nYou did plenty\
    \ of beta testing and stomped out a lot of bugs: Everything should be perfect,\
    \ right? Unfortunately, the answer is no. Something always appears in the 1.0\
    \ release. As a smart developer, you should plan on having a 1.0.1 release a week\
    \ or two after your initial release. As much as you’ll probably need it, don’t\
    \ plan a vacation in the weeks following your launch.\n\nThis maintenance release\
    \ will address the major issues that your customers find. You may also want to\
    \ include some simple feature requests that have been suggested by users.\n\n\
    #### Crash Course\n\nAfter your customer installs an application, iTunes will\
    \ begin to collect crash reports that are created on the device. As explained\
    \ in Chapter 7 (page 226), these crash reports are generated automatically and\
    \ contain information that lets you identify the cause. After collecting the reports\
    \ during sync, iTunes forwards them to a server at Apple.\n\nEach week, your crash\
    \ reports are analyzed and posted to iTunes Connect for you to download:\n\n1.\
    \ **Log into iTunes Connect (page 233) and choose Manage Your Applications.**\n\
    \   Select your application from the list to view its information.\n2. **Click\
    \ Crash Reports to view the app’s reports broken down by the version of the OS\
    \ being used.**\n   If you see “Too few reports have been submitted for a report\
    \ to be shown”, congratulations, your code is working great!\n   If you’re not\
    \ so lucky, you’ll see the class and method that caused the crash listed in order\
    \ of how frequently the crash occurs.\n3. **Click Download Report to copy the\
    \ crash report to your Mac.**\n   The downloaded files will have a `.crash` extension.\n\
    \nWhen you uploaded your final binary to iTunes Connect, you should have saved\
    \ a copy of your app and the `dSYM` created during the build (page 262). Make\
    \ sure Spotlight can locate these files. This Mac OS X search technology lets\
    \ the tools find and process the files that contain the debugging information.\n\
    \nTo view the contents of the crash report, open the Organizer window in Xcode.\
    \ Then, under `IPHONE DEVELOPMENT`, select `Crash Logs` and drag the `.crash`\
    \ file you downloaded into the list at the top of the window. After the crash\
    \ report is processed, you see additional class and method names as well as line\
    \ numbers that correspond to your source code.\n\n**Tip:** Use a version control\
    \ system (VCS), and tag the project each time you do a release. That way, it’s\
    \ easy to retrieve the source code, app, and `dSYM` files that correspond to the\
    \ crash that’s being reported.\n\nThe popular Subversion VC tools come preinstalled\
    \ with the Snow Leopard release of Mac OS X. To learn more, type `mansvn` in a\
    \ Terminal window.\n\nIf you’re having problems with symbols being resolved, check\
    \ out the link to Technical Note TN2151 at the bottom of the crash report page\
    \ in iTunes Connect.\n\n### Dealing with Support Email\n\nOnce you’ve worked hard\
    \ to design, develop, and promote an application that people want to buy, a small\
    \ percentage of those customers are going to have questions or problems with your\
    \ app.\n\nWith iTunes, many developers find they have a high volume of sales,\
    \ so even if only a fraction of users ask for help, you can still end up providing\
    \ a lot of customer support. Develop habits that keep this volume in check.\n\n\
    Some techniques for dealing with support are as follows:\n\n- **Use canned responses\
    \ for common problems.** Create a document that contains solutions to issues that\
    \ users frequently encounter. You can then copy and paste from this document to\
    \ reduce the amount of time spent corresponding with customers.\n- **Put your\
    \ canned responses on your product site,** and update your Support URL in iTunes\
    \ Connect to point to this FAQ (frequently asked questions) list. Many customers\
    \ will find the solution to their problem before they need to contact you.\n-\
    \ **Use Twitter or another social network** to let customers know about problems\
    \ that are affecting many people. Give users an estimate for how long it will\
    \ take to fix the problem, and tell them when it has been submitted for review.\
    \ When the fix is released, remind them to update.\n- **Start a list of feature\
    \ requests.** You’ll find that a lot of good ideas come from support email and\
    \ comments on social networks. Keeping that list updated makes it easy when you\
    \ start on your next version. Some features will be requested frequently, so all\
    \ you have to say is “Thanks! That’s already on our feature request list.”\n-\
    \ **Use a single point of contact for support.** It doesn’t really matter if you\
    \ do support on a web-based service, via email, or with some other mechanism.\
    \ But if you spread your attention across many different channels, you’ll go crazy.\
    \ And so will your customers, because they won’t know the best way to contact\
    \ you. Choose one method of contact and stick with it.\n\n## Product Updates\n\
    \nAfter you’ve fixed your initial bugs and completed some simple feature requests,\
    \ it’s time to upload your 1.0.1 release. Luckily, this is much easier than the\
    \ first time, because much of the metadata in iTunes Connect doesn’t need to change.\n\
    \n### New Info\n\nObviously, you’ll have made plenty of changes in your source\
    \ code. But one change is more important than all others: You need to update the\
    \ version number in the `Info.plist` file.\n\nWhen you upload a new binary, iTunes\
    \ Connect checks the value for the version number, and if it’s not greater than\
    \ the current version, the file will be rejected. You’ll also want to remember\
    \ to remove any nonnumeric values from the version number (for example, your beta\
    \ version number)."
