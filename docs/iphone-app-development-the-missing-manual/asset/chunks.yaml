- fmt: '***Tip:*** Now that you have your tools, maintain them. Apple regularly updates
    `Xcode`, so the version on your Snow Leopard DVD will eventually become outdated.
    When major changes occur, Apple will send an email reminding you to upgrade by
    visiting the iPhone Dev Center, as described in the next section.


    ## Getting the iPhone SDK


    You have to join the iPhone Developer Program before Apple lets you get your hands
    on the iPhone SDK. Your free membership gives you access to the tools, documentation,
    and developer forums via the iPhone Dev Center (Figure 1-2).


    ***Figure 1-2:***


    *The iPhone Dev Center is your first and best resource as an iPhone developer.
    You’ll use this site to download and update your iPhone SDK, find sample code
    and documentation, connect with other iPhone developers, and to prepare your product
    for sale on iTunes.*


    **12**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Getting the Tools


    **1. To sign up for an ADC membership, point your web browser to** `http://developer.apple.com/iphone/`**.
    Click the Register link in the upper-right corner.**


    You access the iPhone Dev Center using an Apple ID. If you have an iTunes account
    or have made a purchase from the Apple Store, you already have one set up. Go
    ahead and use it when you create your developer account and skip to step 4.


    ***Note:*** If you’ve been using your Apple ID for personal stuff like iTunes
    and a MobileMe family photo gallery, you may want to create a new Apple ID for
    your developer account. Having a separate Apple ID used solely for business purposes
    can help you avoid accounting and reporting issues. Please see Chapter 8 to see
    how your developer account and iTunes Connect affect your business.


    **2. If you’re setting up a new Apple ID, type your name, contact information,
    and security questions for password retrieval.**


    **3. Turn on the checkbox to accept the licensing agreement and click Continue.**


    In a few minutes, Apple will send you an email to verify the account.


    **4. Click the Email Verification link, and enter the code contained in the message
    to complete the account setup.**


    Once you set up your account and log in, you see a lot of new content available
    from the iPhone Dev Center. You have access to great resources like the Getting
    Started Videos, Coding How-To’s, and Sample Code. Right now, turn your attention
    to the download for the iPhone SDK.


    **1. Click the Downloads link, and you see a selection of links at the bottom
    of the page, as shown in Figure 1-3.**


    As new versions of the iPhone SDK are released, these links will be updated. Pick
    the most recent release that matches your version of Mac OS X. At the time of
    this writing, it’s “iPhone SDK 3.1.3 with Xcode 3.2.1”.


    The iPhone SDK is a large download: Its size can range from several hundred megabytes
    to over 2 GB. Be patient as it downloads from your web browser, is verified, and
    mounted: It’s going to take a while.


    Once it’s finished, you have a `.dmg` disk image in your Downloads folder and
    a new iPhone SDK disk on your desktop, as shown in Figure 1-4.


    Chapter 1: Building Your First iPhone App


    **13**


    ![Image 9](index-32_1.jpg)


    ![Image 10](index-32_2.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Getting the Tools


    ***Figure 1-3:***


    *You find the links to download the iPhone SDK toward the bottom of the iPhone
    Dev Center page. The links in this picture are for version 3.1.3, but these will
    change as Apple updates the SDK. You can click the Read Me links to see what’s
    new in the release.*


    ***Figure 1-4:***


    *After a successful download, this disk image appears on your desktop. Its name,
    which will vary with each new release, will begin with “iphone_sdk” followed by
    the version number and the “.dmg” extension. Launch the installer by double-clicking
    the box icon. The PDF file contains information about the release that you can
    read while the installation takes place.*'
