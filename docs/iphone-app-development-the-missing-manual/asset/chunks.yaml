  trans: "\n# 弹窗显示与用户交互\n\n通过以下代码显示弹窗。首先检查模型，确认用户是否已接受运行闪光灯的风险：\n\n```\nif (! self.flashlightModel.flashingAccepted)\
    \ {\n```\n\n如果用户尚未接受，则创建一个弹窗视图对象，包含标题、消息以及视图中显示的按钮标签：\n\n```\nUIAlertView *alertView\
    \ = [[UIAlertView alloc]\ninitWithTitle:NSLocalizedString(@\"FlasherWarning\"\
    , nil)\nmessage:NSLocalizedString(@\"FlasherWarningMessage\", nil)\ndelegate:self\n\
    cancelButtonTitle:NSLocalizedString(@\"Cancel\", nil)\notherButtonTitles:NSLocalizedString(@\"\
    FlasherWarningButtonStart\", nil), NSLocalizedString(@\"FlasherWarningButtonLearn\"\
    , nil), nil];\n```\n\n由于你的控制器遵循 `UIAlertViewDelegate` 协议，因此将其设置为代理。另外请注意，这些字符串已做本地化处理。如果你要在应用中警告用户某些危险，务必使用他们最熟悉的语言。\n\
    \n向弹窗视图发送 `–show` 消息，即可让弹窗显示在屏幕上。\n\n随后释放该对象，因为它已不再需要，并结束动作方法：\n\n```\n[alertView\
    \ show];\n[alertView release];\nreturn;\n}\n```\n\n但接下来呢？你在请求用户输入，然而弹窗视图并没有返回任何内容。难道这里要使用心灵感应吗？\n\
    \n不，这个功能要等苹果发布 iPhone 9GSXY 才会提供。在此之前，你需要记住自己是一个 `UIAlertViewDelegate`。当用户点击按钮时，将调用以下代码：\n\
    \n```\n- (void)alertView:(UIAlertView *)alertView\nclickedButtonAtIndex:(NSInteger)buttonIndex\
    \ {\n    if (buttonIndex == 0) {\n        // 取消\n    }\n    else if (buttonIndex\
    \ == 1) {\n        // 启动闪光灯\n        self.flashlightModel.flashingAccepted = YES;\n\
    \        [self startFlasher];\n        self.flasherRunning = YES;\n    }\n   \
    \ else if (buttonIndex == 2) {\n        // 了解更多\n        [[UIApplication sharedApplication]\
    \ openURL:[NSURL\nURLWithString:@\"http://en.wikipedia.org/wiki/Photosensitive_epilepsy\"\
    ]];\n    }\n}\n```\n\n弹窗中的每个按钮都有一个索引。取消按钮是第一个，接着是启动闪光灯的按钮，最后是了解更多关于光敏性癫痫的按钮。\n\
    \n**注意：** “了解更多”按钮展示了如何在 Safari 中打开网页。首先将字符串转换为 URL，然后将其传递给 `UIApplication`。你的应用将被关闭，Safari\
    \ 将打开指定页面：\n\n```\nNSURL *URL = [NSURL URLWithString:@\"http://chocklock.com\"\
    ];\n[[UIApplication sharedApplication] openURL:URL];\n```\n\n## 操作列表\n\n你最初的计划是添加一个“迪斯科模式”。实际上，许多变量名都体现了这一特性。但某天，你的市场专家意识到迪斯科舞曲与安全并没有太多共同点。其他类型的灯光可能更合适。\n\
    \n结果，这一功能演变为让用户从一系列灯光中进行选择。有用于危险情况的紧急灯和警示灯，而迪斯科灯则是给那些想今晚跳跳舞、谈谈情、嗨起来的人们准备的选项。为了让用户做出选择，你为应用添加了操作列表！\n\
    \n当你希望用户从一系列选项中进行选择时，操作列表就是最佳方案。例如在邮件应用中的回复功能，操作列表会提供“回复”和“转发”两个选项。\n\n与弹窗视图类似，首先你需要在视图控制器的\
    \ `@interface` 中遵循 `UIActionSheetDelegate` 协议。然后，以主视图控制器作为代理，配合标题和按钮字符串来构建操作列表：\n\
    \n```\nUIActionSheet *actionSheet = [[UIActionSheet alloc]\ninitWithTitle:NSLocalizedString(@\"\
    DiscoActionTitle\", nil)\ndelegate:self\ncancelButtonTitle:NSLocalizedString(@\"\
    Cancel\", nil)\ndestructiveButtonTitle:nil\notherButtonTitles:NSLocalizedString(@\"\
    DiscoActionButtonEmergency\", nil), NSLocalizedString(@\"DiscoActionButtonAlert\"\
    , nil), NSLocalizedString(@\"DiscoActionButtonHues\", nil), NSLocalizedString(@\"\
    DiscoActionButtonMixed\", nil)];\n```\n"
- fmt: "# iPhone App Development: The Missing Manual\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Pull Yourself Together\n\n`nil`, `nil`];\n\n`[actionSheet setActionSheetStyle:UIActionSheetStyleBlackTranslucent];`\n\
    \n`[actionSheet showInView:self.view];`\n\n`[actionSheet release];`\n\nThe delegate\
    \ for the action sheet handles the button presses the same way the alert view\
    \ does:\n\n```objc\n- (void)actionSheet:(UIActionSheet *)actionSheet clickedButtonAtIndex:(NSInteger)buttonIndex\n\
    {\n    . . .\n    switch (buttonIndex) {\n        . . .\n    }\n    . . .\n}\n\
    ```\n\n## `SettingsViewController`\n\nThe settings view controller maintains very\
    \ little state: It uses only a single timer to show a preview of the flasher.\
    \ And since the state of all settings is maintained in `FlashlightModel` , you\
    \ don’t need any additional ones.\n\nYou’ll notice quite a few more views. This\
    \ is typical of a settings controller that has a lot of adjustments (and associated\
    \ actions) that can be performed by the user.\n\n### Coming to life\n\nThe `SettingsViewController`\
    \ comes into existence because the Settings button in the main view’s toolbar\
    \ is hooked up to the `–showSettings` action. That method allocates and instantiates\
    \ a controller instance much like `Flashlight_ProAppDelegate` did: `SettingsViewController\
    \ controller = [[SettingsViewController alloc] initWithNibName:@″SettingsView″\
    \ bundle:nil];`\n\nBut then it starts doing new things.\n\n### Sharing a model\n\
    \nThe first difference is that it passes its model to the new controller: `controller.flashlightModel\
    \ = self.flashlightModel;`\n\nThis code shares the flashlight model between both\
    \ controllers. That way, if one updates the model, the other will be able to access\
    \ those changes without any additional work. You also get a slight savings in\
    \ memory because you don’t have to duplicate the instance data. With a more complex\
    \ model, these savings can be significant.\n\nChapter 6: A Flashlight for Pros\
    \ **201**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## Pull Yourself\
    \ Together\n\n***Tip:*** Of course in some cases you want to have independent\
    \ models for each view controller. In those cases, you could instantiate a new\
    \ model in the controller’s `–initWithNib:bundle:` method.\n\n### Flipping out\
    \ and in\n\nThe first view that appeared onscreen was added as a subview to the\
    \ window (page 153). You could have done something similar here by writing a lot\
    \ of code to animate the views, swapping them in the hierarchy, and switching\
    \ controllers. As usual, the “writing a lot of code” is your tipoff that Cocoa\
    \ Touch has a lazy way to do it!\n\nA `UIViewController` , like the one that’s\
    \ used as a basis for this class (page 195), can present another view “on top”\
    \ of itself. The original controller is suspended while a new one takes its place.\
    \ This is called a *modal view*, because the user isn’t able to interact with\
    \ the original while it’s in this mode.\n\nYou can specify the transition into\
    \ this mode with the `modalTransitionStyle` property. For settings, a horizontal\
    \ flip is used, but you can also specify that the view appears from the bottom\
    \ of the screen or fades in using a cross-dissolve effect: `controller.modalTransitionStyle\
    \ = UIModalTransitionStyleFlipHorizontal;` Once you’ve set the transition, it’s\
    \ just a matter of calling the `–presentModalViewController:animated:` method,\
    \ and the new controller and view appear with animation:\n\n```objc\n[self presentModalViewController:controller\
    \ animated:YES];\n```\n\nFrom this point on, the new view controller is managed\
    \ by the `UIViewController` superclass, so you can release the instance you just\
    \ created:\n\n```objc\n[controller release];\n```\n\n***Note:*** The other type\
    \ of navigation that’s common in iPhone applications is based on `UINavigationController`\
    \ . This class, which is based on `UIViewController` , lets you “push” and “pop”\
    \ new views. That way, you can easily create interfaces like the iPhone Mail or\
    \ Settings app, where new views slide into place with a Back button in the upper-left\
    \ corner.\n\nThe class provides `–pushViewController:animated:` and `–popViewControllerAnimated:`\
    \ methods that change the user’s view onscreen. There are also properties to access\
    \ the navigation bar (to add your own buttons) and to change its state. The documentation\
    \ for `UINavigationController` contains more information, and several code samples\
    \ can be downloaded from Apple’s developer site.\n\n### Picking colors\n\nSince\
    \ the settings include a picker that lets the users choose their favorite color,\
    \ this view controller adopts the `UIPickerViewDelegate` and `UIPickerViewDataSource`\
    \ in its `@interface` .\n\nThe data source methods `–numberOfComponentsInPickerView`\
    \ and `–pickerView:numberOfRowsInComponents:` specify a single column (component)\
    \ with a number of rows equal to the number of colors in the flashlight model.\n\
    \n**202** iPhone App Development: The Missing Manual\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Pull Yourself Together\n\nTwo delegate methods are used to configure the\
    \ label that’s displayed for each row. The `–pickerView:titleForRow:forComponent:`\
    \ method provides the text for the row using the flashlight model’s class method\
    \ `+nameForColorIndex:` . The `–pickerView:widthForComponent:` uses the same method\
    \ on each color name to determine the maximum width for the column. Remember that\
    \ `+nameForColorIndex:` returns a localized string, so this is a good example\
    \ of why you should never hard-code dimensions of strings. You may think 20 pixels\
    \ is plenty to display “tan”, but a German user will complain when “hel braun”\
    \ doesn’t fit in that same space.\n\nWhen the user selects a new row in the picker,\
    \ the `–pickerView:didSelectRow:inComponent:` method is invoked. The implementation\
    \ stops the flasher, updates the flashlight model, and then updates the views.\n\
    \n### Interface Builder can’t do it all\n\nYou may think Interface Builder has\
    \ an overwhelming number of options, and it does. But even with this bounty of\
    \ settings, you still can’t set some things directly in the NIB file. In this\
    \ view controller’s `–viewDidLoad` method, you see an example:\n\n```objc\n[self.brightnessSlider\
    \ setMaximumTrackImage:stretchableSliderMaximum forState:UIControlStateNormal];\n\
    [self.brightnessSlider setMinimumTrackImage:stretchableSliderMinimum forState:UIControlStateNormal];\n\
    [self.brightnessSlider setThumbImage:sliderThumb forState:UIControlStateNormal];\n\
    ```\n\nInterface Builder doesn’t provide any mechanism to set the custom tracking\
    \ and thumb image for the slider, so you have to do it in code. The `–viewDidLoad`\
    \ method is a great place to do this, since this message is guaranteed to happen\
    \ each time the view is read into memory.\n\n### Stretchable images\n\nYou might\
    \ have been a bit confused with how the images for the sliders tracking images\
    \ were loaded:\n\n```objc\nUIImage *stretchableSliderMaximum = [[UIImage imageNamed:@″SliderMaximum.png″]\
    \ stretchableImageWithLeftCapWidth:2.0f topCapHeight:0.0f];\n```\n\nYou’ve already\
    \ seen the `–imageNamed:` method being used to load an image from your application’s\
    \ resources (page 182). But what’s this `–stretchableImageWithLeftCapWidth:topCapHeight:`\
    \ method? Are Gumby and Pokey somehow involved?\n\nNope—stretchable images are\
    \ used frequently throughout UIKit. You can use them for buttons, gradients, and\
    \ any other screen element where the size changes based upon layout changes. As\
    \ you saw on page 162, view sizes can change rather dramatically as the user interacts\
    \ with the app, so an image whose width and height can adjust automatically is\
    \ very helpful.\n\nChapter 6: A Flashlight for Pros **203**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Pull Yourself Together\n\nWhen you define a stretchable image, you define\
    \ two points in the original image that can be repeated when it’s drawn. In the\
    \ example on page 180, the second pixel from the left is specified using `2.0f`\
    \ . If you don’t want an image to be stretched in one dimension, you can specify\
    \ `0.0f` as the cap: This is done for the slider’s height image.\n\n### Localization"
