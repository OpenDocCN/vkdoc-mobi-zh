- fmt: '# 市场与定价策略


    ## 消费者行为的两极分化


    另一些客户愿意支付更多费用以获得最佳产品。当面对5美元和10美元产品的相同选择时，他们会认为更贵的那个更好。


    这种消费行为往往会影响您的企业：如果您向那些没有品牌忠诚度的“吝啬鬼”销售产品，您的业务将反映出这一点。相反，如果您努力寻找那些希望您的产品长期成功的优质客户，您的业务将随着这种投资而增长。


    ### 高额投入者


    如果说进入热门市场感觉像赌博，那确实如此。在营销攻势上投入大量资金会增加成功几率，但并不能保证您一定会大获成功。您可能在第一年赚取数百万美元，但可能性并不大。


    另一种选择是采用更传统的营销方法，让您能够通过可持续的定价建立稳定的收入。您可能不会在第一年赚取数百万美元，但可以建立一个拥有忠实客户的长期业务。


    ## 定价策略


    我们讨论了这么多关于市场的内容，那么定价这个主题呢？这是一个复杂拼图的最后一块。


    ### 一杯咖啡的启示


    产品的价格很大程度上取决于它的功能，而非您开发的难度。许多沮丧的开发者会抛出这样一句话：“我的应用比一杯咖啡更值钱！”


    从您的角度来看，这完全合理。您知道自己为将其变为现实投入了多少心血。不幸的是，您的潜在客户并不关心这一点。在他们眼中，一杯好咖啡值5美元——而您的应用不值。


    诀窍在于提高您产品的感知价值。


    ### 这是什么样的产品？


    您设定的价格在很大程度上暗示了您所销售产品的种类。以下价格区间在 App Store 中较为典型：


    - **0.99美元**：最低价位适用于提供娱乐价值或简单实用功能的新奇应用。这也用于推广通常定价更高的应用。

    - **1.99美元至2.99美元**：这个价位通常是你希望用户冲动购买的应用的上限。

    - **3.99美元至4.99美元**：这个价位适用于具有可证明高质量的高级应用。这也是客户开始对价格敏感的水平。

    - **9.99美元及以上**：专业应用能够吸引愿意支付远高于平均价格的客户。如果您针对垂直市场中的专业需求，将应用作为现有产品的增强版销售，或提供对昂贵数据集的访问权限，那么典型的
    App Store 定价不会限制您。


    消费者并不偏向于某个特定价位。Pinch Media 收集的数据显示，对于所有低于4.99美元的价格，平均付费下载量是一致的。他们的研究还表明，免费应用的使用频率低于付费应用，这表明用户会对自己购买的应用产生情感依恋。


    在设定价格时需要注意一件事：价格越高，您在 iTunes 中获得正面评分和评价的可能性就越大。随着人们在您的产品上花费更多，他们也更有可能认为这笔购买是值得的。


    这种合理化形式有助于客户避免**认知失调**。


    反过来，正面评价会影响其他客户。在不确定的情况下，**社会认同**的心理现象会发挥作用：人们倾向于观察他人以确定恰当的行为。在 App Store 中，评分和评价就提供了这些线索。如果之前的买家已经认可了产品，那么促成销售就会容易得多。


    正面评价在产品发布初期也扮演着重要角色：它们有助于产生动力。不要不好意思向朋友、亲戚和 Twitter 上的关注者请求评价。大多数人都乐于帮助您站稳脚跟！


    **来源：**


    - **认知失调**：*http://en.wikipedia.org/wiki/Cognitive_dissonance*

    - **社会认同**：*http://en.wikipedia.org/wiki/Social_proof*

    - **Mobile Orchard**：*www.mobileorchard.com/app-store-heresies-higher-price -better-ratings-dont-discount-your-app-at-launch/*

    - **Pinch Media**：*www.pinchmedia.com/blog/paid-applications-on-the-app-store-from-360idev/*


    ## 先试后买


    从客户的角度来看，了解自己是否喜欢一款产品的最好方法就是实际使用它。如果您在寻找一部手机，可以走进苹果零售店，拿起 iPhone 把玩一番。几分钟之内，您就能知道这款产品是否适合自己。


    同样的情况也适用于 iTunes 中的应用。许多开发者通过提供应用的免费版本获得了成功。客户可以无义务地试用该应用，并在认为其有用时升级到付费版本。


    ### 激励机制


    为了使这种技巧奏效，您需要给用户升级的动机。积极的激励效果最好：您为用户提供更多功能、额外游戏关卡以及其他能增强其体验的内容。用户会为这些增值内容付费。


    您也可以使用负面刺激来促使免费用户转化为付费用户。在这里，“负面刺激”是“广告”的另一种说法。广告令人厌烦且占用宝贵的屏幕空间，因此有些人愿意付费来移除它们。


    将广告作为一种激励手段有一个附带好处：在人们评估您的应用时，广告收入能补充您的收益。在某些情况下，单靠广告赚取的收入就足以支付开发成本。


    广告并非适用于所有类型的应用。它最适合那些经常被使用的应用：广告商喜欢重复曝光。您通常根据展示的广告数量获得报酬，因此重复使用会增加您的收入。


    ### 转化率


    那么，这些免费下载中会有多少转化为付费下载呢？这因应用而异。一些开发者报告的转化率低至1%，而其他开发者则高达15%。Pinch Media 报告称，在大量应用样本中，平均转化率为7.4%。


    平均而言，每14个下载您免费版本的人中，就有1人会付费购买。这听起来不算太惊人，但请记住，iTunes 拥有数百万个账户！


    ### 从免费到付费


    一旦用户决定升级到付费版本，他们该怎么做呢？


    传统上，开发者会向 iTunes 提交两个版本的应用。一个是“免费”或“精简版”，另一个是“高级版”或“专业版”。请注意这两个版本的品牌命名，要让客户清楚了解一个版本是另一个版本的子集。


    苹果还要求免费演示版本必须功能完整。您不能有任何随时间推移而禁用的功能。这些免费应用本身也必须是可用的。客户不应感到被迫升级。


    维护两个版本的应用会带来几个问题。首先，构建、测试和提交应用的工作量翻倍。您可能还需要处理数据迁移问题。由于应用无法访问彼此的数据，您需要找到一种方法将任何文档、分数或其他信息从免费版本转移到付费版本。'
  raw: 'Other customers want to pay more and get the best there is. When presented
    with the same choice between a $5 and $10 product, they assume the more expensive
    one is better.


    This consumer behavior tends to affect your enterprise: If you sell to tightwads
    who have no brand loyalty, your business will reflect that. Alternatively, if
    you work at finding great customers who want long-term success for your products,
    your business will grow with that investment.


    *High roller*


    If entering the hit-based market feels a lot like gambling, that’s because it
    is. Spending a lot of money on a marketing blitz increases your chance of success,
    but it doesn’t ensure that you’ll have a hit. You could make millions in your
    first year, but odds are that you won’t.


    The alternative of using a more traditional marketing approach lets you establish
    a steady income with sustainable pricing. You may not make millions in your first
    year, but you build a long-term business with loyal customers.


    Pricing Strategies


    All of this talk about the market, but what about the topic of prices? It’s the
    final piece of a complex puzzle.


    *A cup of coffee*


    The price of your product depends a lot on what it does, not how hard it was for
    you to make it. A lot of frustrated developers trot out the line that “my app
    is worth more than a cup of coffee!”


    From your point of view, that’s an entirely valid statement. You know how much
    work went into bringing it to life. Unfortunately, your potential customers don’t
    care about that. In their eyes, a good cup of coffee is worth $5\. Your app isn’t.


    The trick is to increase your product’s perceived value.


    *What kind of product is it?*


    The price you set implies a lot about the kind of product you’re selling. The
    following price ranges are typical in the App Store:


    • **$0.99.** The lowest price is where you find novelty applications that provide
    entertainment value or simple utility. It’s also used for promotions of apps that
    normal y carry a higher price.


    **258**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **The Market**


    • **$1.99 to $2.99.** These prices are typical y the upper bound for an app that
    you want someone to buy on impulse.


    • **$3.99 to $4.99.** This price range works for premium apps that have demonstrable
    high quality. This is also the level where customers start to experience price
    sensitivity.


    • **$9.99 and above.** Specialty applications can attract customers who are willing
    to pay much more than average. If you’re targeting specialized needs in a vertical
    market, selling the app as an enhancement to an existing product, or providing
    access to an expensive dataset, typical App Store pricing won’t limit you.


    Consumers aren’t biased toward one price point over another. Data collected by
    Pinch Media shows the average number of paid downloads is consistent for all prices
    below $4.99\. Their research also shows that free applications are used less frequently
    than paid ones, which suggests that users form an attachment to their purchases.


    One thing to keep in mind as you set a price: The higher you go, the more likely
    you are to garner positive ratings and reviews in iTunes. As people spend more
    money on your product, they’re also more likely to think that the purchase was
    a good one.


    This form of rationalization helps the customer avoid *cognitive dissonance.*


    In turn, positive evaluations wil influence other customers. Given an uncertain
    situation, the psychological phenomenon of *social proof* takes hold: People tend
    to look to others for appropriate behavior. In the App Store, ratings and reviews
    provide those clues. It’s much easier to make a sale if previous buyers have given
    it their approval.


    Positive reviews also play an important part in the early days of a product’s
    release: They help generate momentum. Don’t be too proud to ask friends, relatives,
    and followers on Twitter to give you a review. Most wil be happy to help you get
    established!


    Sources:


    • **Cognitive dissonance.** *http://en.wikipedia.org/wiki/Cognitive_dissonance*


    • **Social proof.** *http://en.wikipedia.org/wiki/Social_proof*


    • **Mobile Orchard.** *www.mobileorchard.com/app-store-heresies-higher-price -better-ratings-dont-discount-your-app-at-launch/*


    • **Pinch Media.** *www.pinchmedia.com/blog/paid-applications-on-the-app-store-from-360idev/*


    Try Before You Buy


    From a customer’s point of view, the best way to know if you like a product is
    to actual y use it. If you’re looking for a phone, you can walk into an Apple
    Store, pick up an iPhone, and play around with it. In a matter of minutes, you
    know if that product suits you.


    Chapter 8: For Sale


    **259**


    Download from Wow! eBook


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **The Market**


    The same is true with applications in iTunes. Many developers have found success
    by providing a free version of their application. A customer can then try the
    application with no obligation and upgrade to the paid version if they find the
    application useful.


    *Incentives*


    For this technique to work, you need to give the user an incentive to upgrade.
    Positive motivation works best: You offer the user more features, additional game
    levels, and other content that enhances their experience. Users will pay for the
    added value.


    You can also use negative stimulus to convert the free user into a paid one. In
    this case, “negative stimulus” is another term for “advertising.” Ads are annoying
    and take up precious screen real estate, so some people are willing to pay to
    get rid of them.


    Using advertising as an incentive has a side benefit: Ad revenue supplements your
    income while people evaluate your app. In some cases, the money earned from advertising
    alone is enough to pay for development efforts.


    Advertising isn’t appropriate for all types of applications. It works best with
    apps that get regular use: advertisers like repeated exposure. You typical y get
    paid according to how many ads you show, so repeated use increases your earnings.


    *Conversion rates*


    So how many of these free downloads will result in a paid download? It varies
    greatly by application. Some developers have reported a conversion rate as low
    as 1 percent, while others have seen it as high as 15 percent. Pinch Media has
    reported an average conversion rate of 7.4 percent across a large sample of applications.


    On average, for every 14 people who download your free version, 1 person will
    pay for it. That doesn’t sound great until you remember that iTunes has millions
    of accounts!


    *Free to paid*


    Once users decide to upgrade to the paid version, how do they do it?


    Traditional y, developers have submitted two versions of their applications to
    iTunes.


    One is a “Free” or “Lite” version, and the other is a “Premium” or “Pro” version.
    Be careful how you brand both of these versions; make it clear to the customer
    that one version is a subset of the other.


    Apple also requires that free demo versions be ful y functional. You can’t have
    any features that get disabled over time. These free applications must also be
    useful in their own right. The customer should not feel forced to upgrade.


    **260**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Upload**


    Several problems come with maintaining two versions of the application. First
    you’re doubling the amount of work it takes to build, test, and submit an application.
    You may also need to deal with data migration issues. Since apps can’t access
    each other’s data, you need to find a way to get any documents, scores, or other
    information from the free version into the paid version.'
  trans: '

    # 市场与定价策略


    ## 消费者行为的两极分化


    另一些客户愿意支付更多费用以获得最佳产品。当面对 5 美元和 10 美元产品的相同选择时，他们会认为更贵的那个更好。


    这种消费行为往往会影响您的企业：如果您向那些没有品牌忠诚度的“吝啬鬼”销售产品，您的业务将反映出这一点。相反，如果您努力寻找那些希望您的产品长期成功的优质客户，您的业务将随着这种投资而增长。


    ### 高额投入者


    如果说进入热门市场感觉像赌博，那确实如此。在营销攻势上投入大量资金会增加成功几率，但并不能保证您一定会大获成功。您可能在第一年赚取数百万美元，但可能性并不大。


    另一种选择是采用更传统的营销方法，让您能够通过可持续的定价建立稳定的收入。您可能不会在第一年赚取数百万美元，但可以建立一个拥有忠实客户的长期业务。


    ## 定价策略


    我们讨论了这么多关于市场的内容，那么定价这个主题呢？这是一个复杂拼图的最后一块。


    ### 一杯咖啡的启示


    产品的价格很大程度上取决于它的功能，而非您开发的难度。许多沮丧的开发者会抛出这样一句话：“我的应用比一杯咖啡更值钱！”


    从您的角度来看，这完全合理。您知道自己为将其变为现实投入了多少心血。不幸的是，您的潜在客户并不关心这一点。在他们眼中，一杯好咖啡值 5 美元——而您的应用不值。


    诀窍在于提高您产品的感知价值。


    ### 这是什么样的产品？


    您设定的价格在很大程度上暗示了您所销售产品的种类。以下价格区间在 App Store 中较为典型：


    -   **0.99 美元**：最低价位适用于提供娱乐价值或简单实用功能的新奇应用。这也用于推广通常定价更高的应用。

    -   **1.99 美元至 2.99 美元**：这个价位通常是你希望用户冲动购买的应用的上限。

    -   **3.99 美元至 4.99 美元**：这个价位适用于具有可证明高质量的高级应用。这也是客户开始对价格敏感的水平。

    -   **9.99 美元及以上**：专业应用能够吸引愿意支付远高于平均价格的客户。如果您针对垂直市场中的专业需求，将应用作为现有产品的增强版销售，或提供对昂贵数据集的访问权限，那么典型的
    App Store 定价不会限制您。


    消费者并不偏向于某个特定价位。Pinch Media 收集的数据显示，对于所有低于 4.99 美元的价格，平均付费下载量是一致的。他们的研究还表明，免费应用的使用频率低于付费应用，这表明用户会对自己购买的应用产生情感依恋。


    在设定价格时需要注意一件事：价格越高，您在 iTunes 中获得正面评分和评价的可能性就越大。随着人们在您的产品上花费更多，他们也更有可能认为这笔购买是值得的。


    这种合理化形式有助于客户避免**认知失调**。


    反过来，正面评价会影响其他客户。在不确定的情况下，**社会认同**的心理现象会发挥作用：人们倾向于观察他人以确定恰当的行为。在 App Store 中，评分和评价就提供了这些线索。如果之前的买家已经认可了产品，那么促成销售就会容易得多。


    正面评价在产品发布初期也扮演着重要角色：它们有助于产生动力。不要不好意思向朋友、亲戚和 Twitter 上的关注者请求评价。大多数人都乐于帮助您站稳脚跟！


    **来源：**


    -   **认知失调**：*http://en.wikipedia.org/wiki/Cognitive_dissonance*

    -   **社会认同**：*http://en.wikipedia.org/wiki/Social_proof*

    -   **Mobile Orchard**：*www.mobileorchard.com/app-store-heresies-higher-price
    -better-ratings-dont-discount-your-app-at-launch/*

    -   **Pinch Media**：*www.pinchmedia.com/blog/paid-applications-on-the-app-store-from-360idev/*


    ## 先试后买


    从客户的角度来看，了解自己是否喜欢一款产品的最好方法就是实际使用它。如果您在寻找一部手机，可以走进苹果零售店，拿起 iPhone 把玩一番。几分钟之内，您就能知道这款产品是否适合自己。


    同样的情况也适用于 iTunes 中的应用。许多开发者通过提供应用的免费版本获得了成功。客户可以无义务地试用该应用，并在认为其有用时升级到付费版本。


    ### 激励机制


    为了使这种技巧奏效，您需要给用户升级的动机。积极的激励效果最好：您为用户提供更多功能、额外游戏关卡以及其他能增强其体验的内容。用户会为这些增值内容付费。


    您也可以使用负面刺激来促使免费用户转化为付费用户。在这里，“负面刺激”是“广告”的另一种说法。广告令人厌烦且占用宝贵的屏幕空间，因此有些人愿意付费来移除它们。


    将广告作为一种激励手段有一个附带好处：在人们评估您的应用时，广告收入能补充您的收益。在某些情况下，单靠广告赚取的收入就足以支付开发成本。


    广告并非适用于所有类型的应用。它最适合那些经常被使用的应用：广告商喜欢重复曝光。您通常根据展示的广告数量获得报酬，因此重复使用会增加您的收入。


    ### 转化率


    那么，这些免费下载中会有多少转化为付费下载呢？这因应用而异。一些开发者报告的转化率低至 1%，而其他开发者则高达 15%。Pinch Media 报告称，在大量应用样本中，平均转化率为
    7.4%。


    平均而言，每 14 个下载您免费版本的人中，就有 1 人会付费购买。这听起来不算太惊人，但请记住，iTunes 拥有数百万个账户！


    ### 从免费到付费


    一旦用户决定升级到付费版本，他们该怎么做呢？


    传统上，开发者会向 iTunes 提交两个版本的应用。一个是“免费”或“精简版”，另一个是“高级版”或“专业版”。请注意这两个版本的品牌命名，要让客户清楚了解一个版本是另一个版本的子集。


    苹果还要求免费演示版本必须功能完整。您不能有任何随时间推移而禁用的功能。这些免费应用本身也必须是可用的。客户不应感到被迫升级。


    维护两个版本的应用会带来几个问题。首先，构建、测试和提交应用的工作量翻倍。您可能还需要处理数据迁移问题。由于应用无法访问彼此的数据，您需要找到一种方法将任何文档、分数或其他信息从免费版本转移到付费版本。

