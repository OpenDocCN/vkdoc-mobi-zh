    如果你将配置文件的名称设置为“Beta Test”，当它出现在测试人员的手机上时会令人困惑。而且当他们的 Beta Test 配置文件过期时，他们不知道向谁申请新的配置文件。


    最好使用公司名称作为`Profile Name`。例如，如果你输入`Squidger Beta Distribution`，你的测试人员就会知道这是用于测试`Tiddlywinks
    Pro`的配置文件。这个描述性名称也会对你有所帮助，你很快就会明白。


    对于`App ID`，选择`Squidger Apps`，这样你的测试人员就可以运行来自`Squidger Industries`天才团队的任何及所有应用程序。


    ***注意：*** 如果你正在使用推送通知或进行应用内购买，你需要选择已配置了这些功能的`App ID`。这两个功能都需要一个*不*使用通配符（`*`）的标识符。


    在`Devices`下，点击`Select All`，你所有的 beta 测试人员都将被添加到这个分发配置文件（`distribution provisioning
    profile`）中。


    ***提示：*** 请记住，如果你为 beta 测试人员添加了新设备，你需要更新此配置文件，并向测试人员提供一份`*.mobileprovision`文件的副本。很容易忘记这个重要步骤，这会给你和测试人员都带来困惑。


    点击`Submit`，门户网站将开始生成你的分发配置文件。几秒钟后，你应该能够刷新浏览器并看到`Download`链接。点击该链接，然后将`Squidger_Beta_Distribution.mobileprovision`文件拖拽到
    Xcode 的应用图标上，将其添加到 Xcode 中。


    将`*.mobileprovision`文件保存在安全的地方。你将把它发送给你的 beta 测试人员。


    第 7 章：收尾工作


    **219**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Beta 测试**


    *授权*


    现在你已经配置好了配置文件，将注意力转向 Xcode 的构建设置。


    为开发版本和为分发配置文件签名代码的主要区别在于允许 Xcode 调试进程的配置参数。`get-task-allow`键的默认值启用了调试功能，但当你在进行
    Ad Hoc 分发时，必须关闭此设置。


    为此，更改代码签名期间使用的授权（Entitlements）配置。步骤如下：


    **1. 在 Xcode 中，选择 File** ➝ **New File。然后，在 New File 对话框中，在 iPhone OS 源列表中选择 Code
    Signing。**


    你会看到两个模板：`Entitlements`和`Resource Rules`，它们都能让你配置代码签名。


    **2. 选择`Entitlements`模板，然后点击`Next`。**


    **3. 将 File Name 字段设置为`dist.plist`**，并将 **Location** 设置为项目文件夹的顶层。确保该文件已添加到正确的目标（targets）中。点击
    **Finish**。


    该文件现在应出现在属性列表编辑器中。


    **4. 关闭`get-task-allow`**复选框，然后保存文件。


    现在你有了一个可以禁用调试器的文件。剩下要做的就是将该文件添加到一个目标中。


    ***提示：*** 不要害怕偷懒，直接使用 Flashlight Pro 应用中的`dist.plist`文件。上述步骤已为你完成！


    正如第 127 页所述，将你的 beta 版本放在一个单独的目标中是很方便的。由于目标设置会覆盖项目和 Xcode 中的对应设置，因此它是定义你希望如何构建
    beta 版本的绝佳位置。


    事实上，这在 Flashlight Pro 项目中已经完成了。如果你打开`Targets`，会看到一个名为“Safety Light (Beta)”的目标。当你双击此目标时，会出现包含构建设置的窗口。确保`Configuration`设置为`Release`，然后向下滚动到`Code
    Signing`部分；你会看到`Code Signing Entitlements`被设置为`dist.plist`。


    **220**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Beta 测试**


    **高级用户诊所**


    **目标还是配置？**


    一些开发者会创建一个 Distribution 构建配置，在源列表中选择 Other，然后将其作为存储 beta 设置的位置。他们不选择新的构建目标，而是从
    Other 列表中选择 Aggregate。


    Flashlight Pro 项目对 beta 和最终应用构建都使用了聚合目标。在`Groups & Files`中的`Targets`下，你会看到两个红色的目标图标：`Beta`和`Final`。


    如果你展开`Beta`的展开三角形，你会看到聚合目标首先构建`Safety Light (Beta)`，然后运行一个名为`Package Release`的脚本。如果你双击该脚本名称，你可以编辑它。此脚本会备份
    dSYM 调试信息（用于处理崩溃报告），并创建一个你可以分发给测试人员的 ZIP 文件。


    使用多个目标时，你可以同时使用几个脚本。在`Final`目标中，发布的打包方式与 beta 构建时相同，然后重新签名，以便你可以在测试设备上运行它。


    你可以通过右键单击目标名称，选择 Add ➝ New Build Phase ➝ New Run Script Build Phase，将你自己的脚本添加到聚合目标中。一个很好的例子是，一个将你的
    beta 构建上传到服务器以便测试人员下载的脚本。


    为了进一步自动化此过程，flashlight 项目有两个 shell 脚本。在终端中从命令行运行`build_beta`或`build_final`后，你会得到一个准备分发给
    beta 测试人员或上传到 App Store 的 ZIP 文件。


    另一种方法是，他们只更改 Active Configuration，然后再进行构建。这种方法的问题在于，你现在有两个“发布”配置。如果你更改了 Release
    配置中的一个构建设置，却忘记在 Distribution 中更新相同的设置，你的 beta 测试人员将无法与你使用相同的代码进行工作。随着你添加最终版本、产品的精简版、最终版本的
    Lite 版本等等，你最终会拥有许多配置。


    当使用多个目标时，你也会遇到类似的问题：你可以将一个文件添加到一个目标，却忘记添加到其他目标。实际上，很容易发现这个错误——当你在`Groups & Files`中使用展开三角形时，你会看到不同的文件数量。所有目标在`Copy
    Bundle Resources`、`Compile Sources`和`Link Binary With Libraries`之后括号内的项目数量应该相同。此外，如果目标缺少文件，你很可能会看到一个编译器错误来提醒你这个差异。


    使用目标的另一个优点是它们可以用来自动化你的构建过程。你可以创建“聚合”目标，让你运行执行后处理的脚本。要创建聚合目标，进入`Groups & Files`，右键单击`Targets`，然后选择`Add
    Target`。在出现的窗口中，选择`Other`源列表中的`Aggregate`。


    更改了授权构建设置后，你还需要更改下面几行的`Code Signing Identity`设置。使用`Any iPhone OS Device`以及`iPhone
    Distribution`。自动配置文件选择器应该会显示它匹配到了`Squidger Beta Distribution`或你在设置分发配置文件时提供的任何名称。


    *构建与发送*


    现在你的构建设置已经准备就绪，是时候进行构建了。在动手之前，在 Xcode 中做最后一次编辑：将`Info.plist`中的“Bundle version”更改为能够唯一标识此版本的名称。如果这是你的第一个版本的第一次
    beta 测试，请使用类似`"1.0b1"`的名称。现在转到 Project ➝ Set Active Target，


    第 7 章：收尾工作


    **221**


    ![Image 64](img/index-240_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Beta 测试**


    选择你的 beta 版本目标，并进行一次清理构建（第 148 页）。如果一切顺利，不久你就会看到“Succeeded!”

