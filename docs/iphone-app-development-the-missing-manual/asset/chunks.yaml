    \n**182**\n\niPhone 应用开发：缺失手册\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 打造专属 Cocoa Touch\n\n***提示：*** 在绘制视图时，最好始终基于传入的矩形来计算所有几何图形。如你所见，视图的大小可能会在你不知情的情况下发生变化。如果你对尺寸做出假设或硬编码数值，那很可能导致失败。\n\
    \n在某些情况下，使用常量值是合理的：`iconOffset` 充当了图像和信息性消息之间的间距。\n\n### 打造专属 Cocoa Touch\n\n\
    正如你在第 2 章中所见，Objective-C 中的类别是扩展现有类的非常强大的机制（第 38 页）。专业版手电筒有三个类别。其中两个用于使用亮度值创建和设置颜色，第三个用于在屏幕上隐藏视图。\n\
    \n#### UIColor+Brightness\n\n你要看的第一个类别是 `UIColor+Brightness`。这个类别使用了你在互联网上找到的一些代码，将其封装在\
    \ Objective-C 中，并集成到现有的 `UIColor` 类中。\n\n##### 命名规范\n\n关于这个类别，你首先注意到的是源文件的名称。\n\
    \n由于这些类别通常会在项目之间共享，因此命名规范对于避免冲突非常重要。你会发现，你自己的类别会有很高的重用率，而且你也能找到许多优秀的开源类别。\n\n\
    按照此处使用的规范，名称派生自被扩展的类和类别名。对于这个类别，`@interface` 定义为：\n\n```objc\n@interface UIColor\
    \ (Brightness)\n```\n\n因此，其文件名称为 `UIColor+Brightness`。如果类别名是“(Chockolicious)”，那么文件名就会变为\
    \ `UIColor+Chockolicious`。\n\n***注意：*** 有些开发者使用破折号而不是加号作为分隔符。分隔符实际上并不重要；重要的是原始类和类别的唯一组合。\n\
    \n#### 收尾工作\n"
- fmt: "If you look at the `@implementation`, you see a lot of C code that converts\
    \ between the RGB and HSV color spaces. (The source code in this section comes\
    \ from an ACM paper by Alvy Ray Smith and Eric Ray Lyons. To see it for yourself,\
    \ search the Web for “converting RGB to HSV written in C”.)\n\n## A Flashlight\
    \ for Pros\n\n### Making Cocoa Touch Your Own\n\nThis code illustrates a couple\
    \ of important points. First, Objective-C and standard C get along really well.\
    \ The code in the algorithm is unchanged. The only modifications were stylistic,\
    \ mainly to make the names and formatting fit in the new environment.\n\nThe other\
    \ significant thing is how this fairly complex code is made more accessible via\
    \ the Objective-C wrapper. Without looking at any documentation, you can guess\
    \ what this code does:\n\n```\nCGFloat brightness = [[UIColor orangeColor] brightness];\n\
    ```\n```\n[mySlider setValue:brightness];\n```\n```\nUIColor *backgroundColor\
    \ = [[UIColor redColor] colorWithBrightness:0.6f];\n```\n```\n[myView setBackgroundColor:backgroundColor];\n\
    ```\n\nWhen you decide to use a category, one line of code is most important:\n\
    \n```\n#import \"UIColor+Brightness.h\"\n```\n\nThis lets the compiler know about\
    \ the additional methods and link them into the final binary. If you forget to\
    \ do this, you see “may not respond to” warnings when you build your app.\n\n\
    #### `UIView+Brightness`\n\nThis simple `UIView` category uses the `UIColor` category\
    \ you just looked at to add a brightness parameter when setting the background\
    \ color for the view. Nothing prevents one category from using another: They really\
    \ do behave like the original class as long as you remember to import the `@interface`.\n\
    \n#### `UIView+Concealed`\n\nAs a part of your design, you wanted the information\
    \ view and the toolbar to go offscreen at times. Information doesn’t need to be\
    \ shown indefinitely, and the toolbar needs to be hidden when the flashlight is\
    \ locked.\n\nYou could have implemented these features by adding methods to `IFInfoView`\
    \ and creating a subclass of `UIToolbar`. But you’re smarter than that!\n\n#####\
    \ A new property\n\nYou could have used the existing `hidden` property for `UIView`\
    \ to toggle the visibility of the views. But that’s not very elegant and doesn’t\
    \ give the user a clue that the information is short lived. Adding a bit of animation\
    \ to the process of hiding the view solves both problems.\n\nThis `UIView` category\
    \ adds a `conceal` property to any view. The beauty of this approach is when you\
    \ find a bug or want to add a new concealing feature. You only need to modify\
    \ the code once, not in two or more views.\n\nThe `UIView+Concealed` category\
    \ adds a new property to a view. You animate the view on- or offscreen using the\
    \ `-setConcealed:` method. Likewise, you can check if the view is visible with\
    \ the `-isConcealed` message.\n\n> **Note:** Categories can’t add instance variables\
    \ to a class. In most cases, properties refer to one of these variables, but it’s\
    \ not a requirement. Properties only define a contract for accessing some data\
    \ internal to the class.\n\nThis category uses the existing `frame` property (and\
    \ `UIView` instance variable) to determine if the view is onscreen or off.\n\n\
    For example, a controller could toggle the view’s concealment using this new property:\n\
    \n```\nmyView.concealed = ! myView.isConcealed;\n```\n\nAll the controller needs\
    \ is this single line of code at the top of the implementation:\n\n```\n#import\
    \ \"UIView+Concealed.h\"\n```\n\n##### View coordinates\n\nWhen you conceal a\
    \ view, you’re changing its coordinates within the superview. Before you can get\
    \ to the code that moves the view around, you need to spend a little time understanding\
    \ the view coordinate system used in Cocoa Touch.\n\nYou were actually exposed\
    \ to this coordinate system at the beginning of this tour. While learning about\
    \ `Flashlight_ProAppDelegate`, you saw this line of code:\n```\nCGRect applicationFrame\
    \ = [[UIScreen mainScreen] applicationFrame];\n```\nIf you were curious, you might\
    \ have also looked at the documentation for `UIScreen` and seen only one other\
    \ method in that class: `-bounds`. You’ve also seen the term `frame` repeatedly\
    \ in this chapter. Simply put, the `bounds` define the coordinate system where\
    \ subview frames are placed (Figure 6-9).\n\n\n`[[UIScreen mainScreen] bounds]`\
    \  \n(0,0)\n\n```\n[[UIScreen mainScreen] applicationFrame]\n```\n\n> **Figure\
    \ 6-9:** The `bounds` of the iPhone’s screen, shown with values in parenthesis,\
    \ have a zero origin with a width of 320 and a height of 480. The `frame` is placed\
    \ within these bounds and has an origin and height adjusted by 20 pixels. Frame\
    \ values are shown in square brackets.\n\nHere’s an example using the `UIScreen`\
    \ `-applicationFrame` and `-bounds`. As you know, the screen for the iPhone is\
    \ 320 × 480 pixels. So `UIScreen` returns a rectangle with these sizes when you\
    \ query the `-bounds` method.\n\nYour application, however, can’t use all these\
    \ pixels because of the status bar. The `-applicationFrame` method returns a frame\
    \ rectangle that’s based on the bounds. That frame is used to place your first\
    \ view in the window.\n\nIt’s unlikely that you’re just going to have one view\
    \ in your iPhone application. And that’s fine, because when you set a view’s frame,\
    \ you’re also setting its initial bounds. When you set your first view’s frame\
    \ size to 320 × 460, you also set the bounds.\n\nIf you’re thinking that this\
    \ is duplicating data, it is. But for a good reason: The new bounds have a zero\
    \ origin that is used for placing subviews. These subviews don’t need to know\
    \ anything about the frame of the superview. The situation is a little confusing,\
    \ so Figure 6-10 provides a picture that’s hopefully worth a thousand words.\n\
    \n> **Figure 6-10:** This picture shows how three views, A, B, and C, are placed\
    \ onscreen using a frame and bounds coordinates. View A has bounds of 300 × 400,\
    \ and subview B has a frame size of 200 × 250 with an origin at 50, 100. When\
    \ you specify the placement of subview C, you use view B’s bounds of 200 × 250.\n\
    \nNote that view C in the diagram has no idea what the frame of the superview\
    \ B is set to. Nor does it know what the bounds of view B are. Having two sets\
    \ of coordinates, frames, and bounds lets view C worry only about where its frame\
    \ is placed within superview B’s bounds.\n\n> **Note:** For the most part, there’s\
    \ a one-to-one relationship between bounds and frame coordinates. One pixel in\
    \ the bounds is the same as one pixel in the frame. Why would you want to mess\
    \ with that?\n\nChanging the bounds can scale a view: If you halve the size of\
    \ the bounds and don’t change the size of the subview frame, the effective size\
    \ of that subview is also halved. Similarly, changing the origin of the bounds\
    \ moves all subviews. To see the effect, change the `#if` from 0 to 1 in `Flashlight_ProAppDelegate`:\n\
    \n```\n. . .\nmainViewController.view.frame = applicationFrame;\nCGRect funkyBounds\
    \ = mainViewController.view.bounds;\nfunkyBounds.origin = CGPointMake(-10.0f,\
    \ 10.f);\nfunkyBounds.size.width /= 2.0f;\nfunkyBounds.size.height /= 2.0f;\n\
    mainViewController.view.bounds = funkyBounds;\n. . .\n```\n\nThis test code also\
    \ makes it easier to see how view concealment works.\n\n#### More view animation"
