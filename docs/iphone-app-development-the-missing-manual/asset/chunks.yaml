    ## Refine the Look


    ### Class Extensions for Private Methods


    In Chapter 2, you learned about Objective-C categories as a way to extend an existing
    class (page 38). A variation called *class extensions* lets you extend the interface
    of your own class. Even though you’re the one writing the class and you can define
    anything you want in the interface in the implementation, there’s an advantage
    to extending your class’s interface instead: It lets you hide your internal methods.


    For example, the `@interface` in `LightView.h` shows methods that any other class
    can use to communicate with the object. The problem is that some methods are only
    used internally, and exposing them in the interface is both confusing and dangerous.


    The solution is to define another `@interface` in your implementation. This `@interface`
    looks very much like a category, only it’s anonymous because there is no name
    in the parenthesis:


    ```

    @interface LightView ()


    - (void)updateBackgroundColor;


    - (void)endPulse;


    - (void)handleSingleTap;


    - (void)handleDoubleTap;


    @end

    ```


    The methods in this `@interface`, like `-updateBackgroundColor`, are extending
    the original one and must therefore be implemented in the implementation below.
    As a result, you can call `[self updateBackgroundColor]` in `LightView.m` as often
    as you’d like, but if another object tries to send a message like `[lightView
    updateBackgroundColor]`, the compiler will complain.


    **Note:** Other object-oriented languages use the term *private methods.* Many
    Objective-C programmers use this term, too.


    ### Catching View Property Changes


    As you’ve seen previously, the `@property` and `@synthesize` declarations can
    save you lots of time writing your accessor code. There’s a problem, though: You
    don’t know when this accessor code is being executed.


    Most of the time, that’s not a problem. In a view, however, a property update
    often means that some presentation of the data must adapt. The view’s `color`
    property is an example. When another object alters the color, you need to update
    the view to show the change.


    Chapter 6: A Flashlight for Pros


    **171**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### Refine the Look


    To update the view, you need to write out the accessor and add your own code:


    ```

    - (void)setColor:(UIColor *)newColor {


    if (color != newColor) {


    [color release];


    color = [newColor retain];


    [self updateBackgroundColor];


    }


    }

    ```


    You can’t be lazy all the time, and view property changes are one of those times.


    **Tip:** If you’re doing your own custom drawing for a view, the only extra code
    you typically need is:


    ```

    [self setNeedsDisplay];

    ```


    The `-setNeedsDisplay` method marks the view as being dirty and causes redrawing
    to occur automatically using the `-drawRect:` method. You’ll see this technique
    in action with `IFInfoView` (page 174).


    Note also that the drawing won’t be done immediately. Instead, multiple drawing
    requests will be coalesced into a single update in the next event-processing cycle.
    If you try to circumvent this by calling `-drawRect:` directly, it’s less efficient
    and unpredictable. Let the system decide when it’s time to draw.


    ### View Animation


    Cocoa Touch lets you animate some view properties, and that’s how it makes things
    look so cool. But more importantly, it’s the way you give users subtle clues for
    the actions they perform.


    Here are a few view properties and the kinds of effects you’re used to seeing
    in iPhone applications:


    - **alpha.** Fading a view in or out when a user edits or otherwise changes the
    state of the application.

    - **frame.** Moving smoothly between two points to add or remove information onscreen.

    - **transform.** Rotating, scaling, and flipping data by altering an affine transformation
    matrix.

    - **backgroundColor.** Gently changing the background color of a view to indicate
    a state change.'
