- fmt: 'When you click the `Home` button, you see a screen with the applications installed
    by `Xcode`. Since you only have one at this point, all you’ll see is the `Flashlight`
    app. Drag your mouse to swipe between the pages of applications. Many of the applications
    you’re used to seeing on your iPhone have gone missing, but you’ll still be able
    to use `Photos`, `Contacts`, `Settings`, and `Safari` while testing. Clicking
    an app’s icon launches it in the Simulator just as it would on a real device.


    ***Tip:*** The `Safari` icon in the simulator’s tray is very helpful for testing
    how websites will look on the iPhone.


    When you start promoting your application, you’ll want to use the simulator to
    check your product pages on a mobile device.


    ## Exploring Your New Tools


    ### Power Users’ Clinic: Simulating Reality


    The iPhone Simulator acts very much like the device in your pocket. Sometimes,
    however, it’s not obvious how to make the virtual device behave like the physical
    one.


    When you hold down the `Option` key, two dots appear. These dots show the position
    of multitouch events when you click the mouse button. Use this feature to simulate
    the pinching and spreading gestures that zoom the iPhone screen.


    You should also check out the Simulator’s `Hardware` menu. Two commands on this
    menu let you rotate the device left and right—very handy if your app detects device
    orientation. Choose `Hardware`➝`Rotate Left` or `Rotate Right`.


    If your application uses shake gestures, there’s a menu item to simulate one.
    Shaking is a standard part of the iPhone copy and paste mechanism (it’s used for
    undo).


    The `Hardware` menu also lets you simulate the status bar that the iPhone displays
    when you’re on a phone call (choose `Hardware`➝`Toggle In-Call Status Bar`). That
    way, you can verify that your application resizes its user interface (UI) correctly
    when the display window is 20 pixels smaller.


    As you get more advanced in iPhone development, you’ll have occasion to use the
    `Hardware`➝`Lock` command. You can make your app detect when the iPhone sleeps
    and wakes up, and `Lock` is the way to simulate that.


    Another advanced simulator feature is memory warnings. The iPhone has a limited
    amount of memory available to applications. `Hardware`➝`Simulate Memory Warning`
    lets you test how your application behaves when the phone runs out of memory.
    Many developers run into problems when they go from an unlimited amount of memory
    on their Mac to 128 MB on a device. `Simulate Memory Warning` helps you avoid
    that fate.


    It’s also important to realize that the simulator is sharing many of the resources
    on your Mac. Since both are built on top of OS X technologies, things like the
    network are common to both platforms: take advantage of the similarity. For example,
    if you want to see how your app behaves when it loses the cell network, just go
    into your Mac’s `System Preferences`, and turn off the network interface.


    ## Revision Decision


    So now that you have a running application, you notice that the white light makes
    it look like every other flashlight app in iTunes. You need a better color for
    the light—a way to stand out in the crowd. How are you going to do that without
    breaking the “no code” rule? The answer is simple: `Interface Builder`.


    `Xcode` works hand-in-hand with `Interface Builder` to create your app’s user
    interface (UI). You create objects like windows and buttons with this tool and
    then drop them into your code. When you created the project from a template, `Xcode`
    created a file containing these objects automatically.


    To get an idea of how easy this method is, open your `Flashlight` app’s UI. From
    the main project window, open the `Resources` group by clicking the disclosure
    triangle, and double-click the `MainWindow.xib` file. `Interface Builder` opens
    (you’ll see it bouncing in the Dock). Once it’s open, you’re ready to start working
    on your UI (Figure 1-13).


    ***Figure 1-13:***

    *Interface Builder and*

    *its many windows take*

    *up much of your dis-*

    *play. In the middle are*

    *the .xib document (A)*

    *and the window dis-*

    *played in the iPhone*

    *app (B). To the left*

    *is the library of user*

    *interface elements*

    *where buttons, win-*

    *dows, and other user*

    *interface components*

    *can be accessed (C).*

    *A property inspector*

    *for the objects in the*

    *interface is displayed*

    *on the right (D).*


    The main document window is `MainWindow.xib`. To change the View Mode, use the
    three buttons in the upper-left corner. The buttons work much like they do in
    the Finder: the leftmost displays icons, the center a list, and the right one
    shows columns. The list view (which you can see in Figure 1-13), is more compact
    and easier to read (especially with longer names).


    The Library window, at far left, contains a list of all the interface objects
    you can use in your design. You’ll learn about these objects in detail in Chapter
    3.


    To start modifying the `Flashlight`’s UI, double-click the `Window` item in the
    list in `MainWindow.xib`. The app’s window opens to the right of the main document
    window and gives you the opportunity to modify the color. Start thinking about
    your favorite color!


    At the far right is the Property Inspector. You’ll use this window often as you
    refine your UI. Currently, it’s showing `Window Attributes` because you’re working
    with a window. The inspector is split into four main sections, which you choose
    from the tabs at the top. Each section lets you adjust various aspects of each
    object:


    - **Attributes.** The object’s particular settings. Behind the scenes, these items
    set properties and attributes for the object to save you from writing code (although
    you can still write the code manually if necessary).

    - **Connections.** The connections define how your source code accesses the UI
    objects. For the `Flashlight` app, you’ll see that “window” is connected to “`Flashlight
    App Delegate`”.

    - **Size.** This panel lets you define the selected object’s geometry. For example,
    the window’s width and height is 320 × 480 (the size of the iPhone’s screen).

    - **Identity.** This view shows what kind of object is defined. The app’s window
    has a class of `UIWindow`.


    ***Tip:*** To manage `Interface Builder`’s many windows, you’ll find that keyboard
    shortcuts make short work of finding the information you need. You can access
    the main document window by pressing `⌘-0`, and you can switch to each section
    of the inspector with `⌘-1` through `⌘-4`. Use `Shift-⌘-L` to bring up the Library
    window.


    If you don’t fully understand what’s going on here, don’t worry. You’ll learn
    everything there is to know about classes, objects, and instances in the next
    chapter.


    ***Note:*** If you’ve used other development environments, leave your preconceptions
    about how `Interface Builder` works at the door. Instead of automatically generating
    code to display the UI from resources, the `.xib` file contains an XML representation
    of the actual object instances and hierarchy. When you load a file, `Interface
    Builder` creates an object graph in memory and connects it to the instance variables
    that you’ve chosen. We’ll go into greater detail about how this works in Chapter
    3.


    Now that you’ve had a little tour of `Interface Builder`, you can modify your
    flashlight’s UI. Make sure that `Window` is selected in the `MainWindow.xib` document
    and that the Property Inspector is on the first panel (for modifying attributes).'
