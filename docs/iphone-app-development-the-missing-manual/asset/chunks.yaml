- fmt: "# Installing Xcode\n\nOption if you already have a display, keyboard, and\
    \ other peripherals. You can save quite a bit of money by just buying a new CPU\
    \ and repurposing the devices you already own. If you’re a software developer,\
    \ you probably have this stuff already sitting around in a closet. And if you’re\
    \ developing for multiple platforms, finally, think of all the money you’re saving\
    \ on development tools. If you’re used to spending thousands of dollars on `Visual\
    \ Studio` and `MSDN`, it will come as a pleasant surprise to know that all of\
    \ Apple’s developer tools are free. Spend your dollars on the hardware instead\
    \ of the tools and you’ll come out ahead.\n\nOnce you and your Mac are ready to\
    \ go, it’s time to load your hard drive with lots of new software. Apple supplies\
    \ the `Xcode` development tools free of charge, but doesn’t install them on every\
    \ Mac, since most consumers will never use them.\n\n## Getting the Tools\n\nLuckily,\
    \ you can find the `Xcode` tools right on your `Snow Leopard` installation disk.\n\
    \nTo run `Xcode`, Apple recommends you have an Intel-based Mac running `Leopard`\
    \ or `Snow Leopard`. The following steps explain how to get the software onto\
    \ your hard drive where you can use it:\n\n**Note:** You can install the `iPhone\
    \ SDK` and other development tools on `Leopard`, but the `Snow Leopard` tools\
    \ reflect significant improvements over the previous version. Working in the newest\
    \ version of `Mac OS X` assures you the latest and greatest features.\n\n1. Pop\
    \ the installation DVD into your Mac and double-click its icon. In the `Optional\
    \ Installs` folder, double-click the `Xcode.mpkg` file.\n\n   When you double-click\
    \ that file, the `Xcode` installation process begins.\n\n2. On the introductory\
    \ screen, click `Continue`. When the license agreement screen appears, click `Continue`\
    \ and then click `Agree`.\n\n   The license agreement is the same legalese you\
    \ agree to whenever you install software. Read it if you’re into such things.\
    \ When you’re done, the next screen lets you choose what you want to install,\
    \ as shown in Figure 1-1.\n\n   **Figure 1-1:** *The Xcode installer starts out\
    \ with all checkboxes except `Mac OS X 10.4` selected for you. Leave them that\
    \ way. You can click each package name to see what’s being installed: Besides\
    \ the integrated development environment (IDE) that you’d expect, you’ll also\
    \ find tools for monitoring performance and plenty of documentation.*\n\n3. On\
    \ the `Custom Install` screen, make sure all checkboxes except `Mac OS X 10.4`\
    \ are turned on, and then click `Continue`.\n\n   The installer copies all of\
    \ the `Xcode` from the DVD onto your hard drive. This process takes a few minutes.\n\
    \n4. The final screen prompts you to select an install location. Make sure that\
    \ it’s on the same disk where all your other applications are stored. Click `Install`\
    \ to start the process.\n\n   Depending on your Mac’s speed, this process can\
    \ take a few hours. Get away from the computer and get some fresh air for once.\n\
    \n   After everything is safely on your hard drive, you see this message: “The\
    \ installation was successful.”\n\n5. Click `Close` to quit.\n\n6. You can safely\
    \ eject the DVD at this point.\n\nAfter the installation is complete, go to the\
    \ `Hard Drive ➝ Developer ➝ Applications` folder on your hard drive, and check\
    \ out your new tools. This folder contains the applications and utilities you\
    \ use to develop both Mac and iPhone applications: The ones you’ll use the most\
    \ are `Xcode` and `Interface Builder`. The parent `Developer` folder also has\
    \ all of the accompanying developer frameworks, libraries, and documentation.\n\
    \nThe `Xcode` installation doesn’t include one thing—the `iPhone SDK` that’s required\
    \ to develop apps for your phone. For that, go on to the next section."
