  trans: "\n***提示：*** 若想在视图中显示布局矩形，请按下 `⌘-L` 显示边界。当标签被选中时按下 Option 键，您将看到各个界面元素之间的像素数量。\n\
    \n## 第三章：Cocoa Touch：让 Objective-C 发挥作用\n\n**87**\n\n![图 25](img/index-106_1.jpg)\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 目标与动作\n\n***图 3-4：***\
    \  \n*在左侧，您可以看到已选中标签控件的库面板。您可以拖拽库中的任意项目来创建对象的新实例。这里，标签正被拖拽到视图窗口上。*\n\n**7.** 确保标签仍处于选中状态，然后选择\
    \ **工具 ➝ 属性检查器** 或按下 `⌘-1`。在属性检查器的布局部分，点击**对齐（居中）**。\n\n您刚刚替换了另一行代码：\n\n```\n\
    [label setTextAlignment:UITextAlignmentCenter]\n```\n\n**8.** 选中标签后，选择 **字体 ➝\
    \ 粗体**（`⌘-B`）。如果您想更进一步，也可以按下 `⌘-I` 使其变为斜体。\n\n*Che bel ezza!* 但更美好的是您无需编写的这段代码：\n\
    \n```\n[label setFont:[UIFont boldSystemFontOfSize:17.0f];\n```\n\n**88**\n\n\
    iPhone 应用开发：缺失手册\n\n![图 26](img/index-107_1.jpg)\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### 目标与动作\n\n如图 3-5 所示，文档窗口现在显示了一个视图的展开三角形。点击后，您会看到名称为 Label (VOLUME NOB)，类型为\
    \ `UILabel`。\n\n***图 3-5：***  \n*一旦添加包含文本 VOLUME NOB 的 `UILabel`，它将出现在窗口主 `UIView`\
    \ 的下方。在文档窗口中双击某个视图，它会被选中并显示调整手柄——在复杂用户界面中查找子视图时，此功能非常有用。*\n\n恭喜！您刚刚向层级中添加了第一个子视图。\n\
    \n*您掌控一切*\n\n您拥有了第一个对象，但它只是一个标签，并且您尚未在代码中使用它。\n\n是时候通过一个控件来解决这个问题了：\n\n**1.**\
    \ 在库面板中标签的正下方，您会看到一个类似滑块的图标。将其拖拽到灰色窗口上。\n\n一个滑块控件随即出现，左侧和右侧带有调整手柄。有些控件无法调整宽度或高度——滑块就是其中之一。\n\
    \n**2.** 将滑块拖拽到 VOLUME NOB 标签的下方。\n\n虚线蓝色线条可帮助您居中对象。\n\n**3.** 拖拽手柄，直到它们吸附到虚线蓝色线条上。\n\
    \n您已创建了一个可用于 `mySlider` 实例变量的对象。剩下的工作就是将其连接到一个输出口：\n\n**1.** 在文档窗口中，选择“文件的所有者”。\n\
    \n类型为 `HitMakerViewControler`，这与您正在编写的类相同！\n\n第三章：Cocoa Touch：让 Objective-C 发挥作用\n\
    \n**89**\n\n![图 27](img/index-108_1.jpg)\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### 目标与动作\n\n**2.** 选择 **工具 ➝ 检查器**，然后选择顶部的第二个标签页（一个蓝色圆圈，带有指向右方的白色箭头）。或者直接按下\
    \ `⌘-2` 快捷键来选择这个连接检查器标签页。\n\n您会看到 `myButton`、`myLabel` 和 `mySlider`。得益于您在源代码中添加的\
    \ `IBOutlet` 标识符，这些输出口会自动显示出来。\n\n***提示：*** 要证明这一点，请打开 `HitMakerViewController.h`，删除\
    \ `UILabel myLabel` 前面的 `IBOutlet` 并保存文件。返回后，该输出口将不会出现在“文件的所有者”检查器中。\n\n完成此实验后，请将\
    \ `IBOutlet` 放回原位；后续步骤中您会用到它。\n\n**3.** 要将输出口连接到视图，请点击 `mySlider` 右侧的圆圈并拖拽鼠标。\n\
    \n一条蓝色线条会出现，提示您正在连接到一个对象。\n\n**4.** 继续拖拽鼠标，直到悬停在滑块控件上方。当滑块周围出现蓝色方框时，松开鼠标按钮，操作完成。\n\
    \n在“文件的所有者”的输出口列表中，`mySlider` 已连接到水平滑块（图 3-6）。耶！\n"
- fmt: "### **Figure 3-6:**\n\nAfter you add the `slider` control as an outlet, the\
    \ Connection Inspector for the `HitMakerViewController` looks like this. As you\
    \ can see, `mySlider` is connected to a Horizontal Slider. When you’re working\
    \ with Interface Builder, it’s a good idea to use this inspector on File’s Owner\
    \ to check that all your outlets and actions are connected correctly. If a connection\
    \ is missing, your controller code won’t communicate with the view correctly.\n\
    \n**Tip:** You can also connect outlets by Control-dragging from File’s Owner\
    \ to the control you want to connect. When you release the mouse button, you’ll\
    \ see a list of outlets to choose from.\n\n---\n\n### **Targets and Actions**\n\
    \nYour document is starting to look like a user interface. You have two more outlets\
    \ to connect:\n\n1. **Drag another `UILabel` object** from the Library onto the\
    \ gray View window. Place it just below the slider, and adjust it like you did\
    \ for the VOLUME NOB label, but don’t bother changing the text of the label.\n\
    \nUnlike with the first label, you’re going to update this one with code.\n\n\
    2. **Now go to the Connection Inspector after selecting File’s Owner, and drag\
    \ a blue line from the circle next to `myLabel`** to the new label.\n\nFinally,\
    \ you need a button.\n\n3. **In the Library Inspector, click the button icon (to\
    \ the right of the label icon).**  \n   The description you should see at the\
    \ bottom of the window is the Rounded Rect Button and the `UIButton` class name.\n\
    \n4. **Drag the Rounded Rect Button to the View window, and drop it in place just\
    \ below the other controls.**  \n   As with a label, you can double-click the\
    \ button to enter text for the button to display.\n\n5. **Double-click the button\
    \ and type `HITORMISS`.** Then add another connection from the `HitMakerViewController`\
    \ outlet named `myButton` to the button you just added. The drag-to-connect procedure\
    \ is the same as you’ve just done for the other two outlets.\n\n6. **Press ⌘-S\
    \ to save your work.**  \n   Interface Builder writes a new XIB file with the\
    \ name `HitMakerViewController.xib`. Don’t close the document window; you’re not\
    \ done with it yet.\n\nNext, you’re going to head back to the connection attributes\
    \ for the `HitMakerViewController` and connect `myButton` up to this new button.\n\
    \n**Note:** Some developers prefer to place and configure their controls all at\
    \ once instead of switching back and forth between inspectors. Choose whichever\
    \ workflow works best for you; just remember to connect your outlets after all\
    \ the control placement is complete.\n\nWhen you’re just starting out, it’s easy\
    \ to forget these connections. Any code that references an unconnected outlet\
    \ will be sending a message to a `nil` object and nothing will happen. Before\
    \ you spend a lot of time debugging your code, make sure that everything is hooked\
