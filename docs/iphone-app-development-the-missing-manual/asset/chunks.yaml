- fmt: '***Note:*** Testers on Windows can get confused about what’s in the Zip file.
    Mac OS X adds some additional information that makes it hard to find the application
    in the archive. Luckily, you can take additional steps to make the process simpler:
    *http://www.markj.net/iphone-ad-hoc-distribution-windows-mac/*.


    The syncing process will also move the provisioning profile onto the device. You
    can check that it was installed correctly by going to General➝Profiles in the
    iPhone’s Settings app and checking the name and expiration date. If you see the
    wrong one, delete it on the device and sync again. Any expired or duplicate profiles
    will only cause problems: It’s best to get rid of them immediately.


    After checking that the correct profile is installed, you should be able to launch
    the app on the phone. Check your credits screen to make sure that the proper version
    is installed. (Now you see why having that view is useful!)


    **224**


    iPhone App Development: The Missing Manual


    ![Image 67](index-243_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Beta Testing


    ***Note:*** In Figure 7-5, you see that Safety Light shows custom artwork in iTunes
    (the app icon has “BETA” written on it). That’s accomplished by an `iTunesArtwork`
    file added to the beta target. The file is a 512 × 512-pixel PNG file with the
    extension removed.


    The `Flashlight Pro` project shows how to do this in the Beta target. If you don’t
    include this file, everything will work correctly, but your testers will see a
    generic icon. Adding the text on the icon reminds your testers that they’re using
    a beta release.


    Make sure that you don’t add the `iTunesArtwork` to your final build that gets
    uploaded to the App Store. Apple adds this artwork after submission and if it’s
    already there, it can cause problems.


    **iPhone Configuration Utility.** The second trick is to use the iPhone Configuration
    Utility. Apple provides this tool for both Mac and Windows at *http://www.apple.com/support/iphone/enterprise/*.
    It was originally developed for enterprise deployments of iPhone applications,
    but it also works great for beta testers.


    ***Note:*** Ad Hoc distribution was first introduced during Steve Jobs’ WWDC keynote
    in 2008. It was billed as a way for enterprise customers to distribute their apps.
    Independent developers like you had other ideas and quickly put Ad Hoc distribution
    into use for beta testing.


    After you download, install, and launch the application, you see a screen like
    Figure 7-6.


    ***Figure 7-6:*** *Testers can also use the iPhone Configuration Utility to install
    and manage beta release versions of your application. This tool makes it easier
    to manage many applications and provisioning profiles. After selecting the device
    name—“Due”, in this case—you can use the tabs for Provisioning Profiles and Applications
    to install and remove those items.*


    When using this utility, select Applications in the source list, and then drag
    in new applications to update the list. Similarly, you can drag your `*.mobileprovision`
    files into the list displayed by Devices.


    Chapter 7: Finishing Touches


    **225**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Beta Testing**


    After registering both these items, switch over to the named device in the source
    list, and use the Provisioning Profile and Applications tabs to install and uninstall.
    Unlike with iTunes, you can also see the dates that profiles expire. Another big
    advantage is that you can install without synching, which is very important for
    someone who’s testing at work but whose device is bound in an iTunes media library
    at home.


    Again and again. Unless you’re extremely lucky, you’ll have more than one beta
    release. You need to advise your testers on how to update their existing beta
    install. For testers using iTunes, the process is simple. All they need to do
    is drag the new version of the application into iTunes. They see a warning that
    the application already exists, and use Replace to update to the new version.'
