- fmt: '5.  Click Window-based Application and then click Choose. Leave the Use Core
    Data checkbox unchecked since a flashlight doesn’t need a database.


    A save file dialog box appears so you can indicate a name and location for your
    project’s folder (Figure 1-8).


    **Figure 1-8:** For the Flashlight project, tell Xcode to create a folder named
    `Flashlight` inside your `Documents` folder.


    6.  Type `Flashlight` for the project name, and choose the `Documents` folder
    from the bottom pop-up menu.


    As shown in Figure 1-9, the folder you’ve just created in the Finder contains
    everything you need to build your application, including the main project file
    `Flashlight.xcodeproj`.


    **Figure 1-9:** When you create a project with Xcode, it creates a folder of files
    used to build your application. The most important one is the `.xcodeproj` file
    — you can double-click this file to open the project in Xcode. Also, since you’re
    creating a window-based app, Xcode starts you out with a file called `Main Window.xib`.
    You’ll learn more about the other files and folders in upcoming chapters.


    Xcode creates this project folder behind the scenes. You may never in your Xcode
    career interact directly with files or folders. Instead, you can rely on Xcode
    to manage everything for you. But you still need to know where the folder is so
    you can back up your work.


    **Tip:** As you get more advanced with Xcode, you may want to put your projects
    in folders of their own within your Home folder. Many developers create a `Projects`
    folder that contains nothing but their Xcode folders. Just as the Pictures, Movies,
    and Music folders make it easier to manage your media, a `Projects` folder makes
    it easier to manage your software.


    After Xcode finishes creating the new project, it displays the files in a project
    window, as shown in Figure 1-10.


    **Figure 1-10:** The Xcode project window. On the left are the project’s groups
    and files, and on the right is the source code editor. Although the yellow group
    icons look like folders, they’re not the same as the blue ones you see in the
    Finder. You can rename the `Classes` group and not affect the folders on disk.
    Likewise, you won’t find a `Resources` folder in the Finder, but the group is
    a great way to organize files that aren’t source code.


    The Groups & Files panel on the left side of the project window lists the individual
    files that make up your application. To go back to the parts list metaphor, each
    group contains parts of a similar type. Here are a few of the most important groups:


    - **Classes.** The files in this group contain your project’s actual source code.

    - **Resources.** User interface files, graphics, and application configuration
    files all fall under the Resources group.

    - **Frameworks.** These files contain tools that the iPhone SDK uses.


    The editor part of the window (the big white area in the lower right) shows the
    code that runs when the application finishes launching. In this simple example,
    the code makes a window object visible and able to respond to taps.


    You’ll learn more about these important groups and the source code in the next
    chapter. Remember: Your goal in this chapter is to build an app without writing
    any code!


    ## Some Assembly Required


    You’ve gathered all the parts, and now it’s time to assemble them. Unlike toys
    on Christmas Eve, Xcode projects are easy to put together. Thanks to the template,
    all you have to do is initiate the Build command, and Xcode takes all of the source
    code, resources, and frameworks and combines them into an executable file that
    can run on the iPhone.


    Make sure that the pop-up menu in the upper-left corner of your project window
    is set to Simulator and Debug (the exact wording on the menu will change depending
    on which version of the iPhone SDK you’re using). Then choose Build➝Build, as
    shown in Figure 1-11.


    After a short wait, you should see “Build succeeded” in the status bar, at lower
    left.


    **Note:** Xcode’s status bar, which runs along the bottom of the window, is an
    important information source. As you perform various tasks, this area keeps you
    posted on their progress. It’s the first place you should look when you’re wondering
    what’s going on.


    **Figure 1-11:** Building your iPhone application. Note that the Overview menu
    is set to the Simulator and Debug. The keyboard combination ⌘-B is a handy shortcut
    to build the project after you’ve made a change to the source code.


    Once you’ve built your app, you can run it on your iPhone. Or better yet, run
    it on your Mac. That’s right. If you’re like most developers, you’ll run your
    iPhone apps on the Mac about 90 percent of the time. Apps launch faster on the
    Mac than on the iPhone, and they’re easier to debug on the Mac when problems occur.


    **Note:** Don’t discount that last 10 percent. Running your app on an actual device
    is extremely important: You’ll learn why when design issues are discussed in Chapter
    4.


    ## Taking It for a Run on Your Mac


    When you develop an iPhone app, you’ll probably run it on your Mac to test and
    debug it before it ever gets near an iPhone.


    So how do you get an iPhone onto your Mac? It’s easy: Make sure Simulator is selected
    in the Overview menu, and choose Run➝Run. Since you have Simulator selected, Xcode
    uses a simulation of the iPhone to run your app.


    Keep an eye down on the status bar. You’ll see “Installing Flashlight in Simulator”
    displayed, and eventually, “Flashlight launched”. Soon after, a giant iPhone appears
    on your desktop, and it’s running your `Flashlight` application (Figure 1-12).
    Congratulations!


    **Figure 1-12:** In the iPhone Simulator, the image on the left shows the application
    running, and the one on the right shows the application’s icon on the home screen.
    It won’t fit in your pocket, but the simulator acts just like a real, live iPhone.


    **Tip:** You can do everything you’ve done in this section and the previous one
    with a single keystroke. Pressing ⌘-Enter builds and runs your application (in
    the simulator) in one step. When you get into the thick of iPhone app development,
    you’ll be pressing these keys in your sleep.


    So what does this giant iPhone do? It’s called the iPhone Simulator, and it behaves
    like the device in your pocket, except:


    - It’s hundreds of times faster.

    - It has as much memory as your Mac.

    - The network is much more reliable.

    - It has a larger display.

    - It doesn’t sync with iTunes over a USB cable.

    - Touching the simulator screen has no effect.


    In reality, this big phone sitting on your desktop has very different hardware
    specifications than the one you’re used to. But once you get used to keeping your
    fingers off the screen, you’ll end up loving the simulator. It makes your life
    as a developer so much easier because it does one important thing: it lets you
    test your code without having an iPhone plugged into your Mac. The box on page
    25 shows you how to get the most out of this important tool.'
