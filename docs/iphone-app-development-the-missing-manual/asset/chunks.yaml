- fmt: '# 绘制渐变与图形


    为此，你需要使用 `CoreGraphics`。该框架包含了用于在 iPhone 上绘图的所有底层 API。当你使用任何以 `CG` 开头的定义时（特别是
    `CGRect`（第 158 页）），就已经接触过这个框架了。


    要开始绘制渐变，你需要一个颜色数组：


    ```

    UIColor *startColor = [UIColor colorWithRed:1.0f green:1.0f blue:1.0f alpha:0.45f];

    UIColor *endColor = [UIColor colorWithRed:1.0f green:1.0f blue:1.0f alpha:0.10f];

    CGColorRef colors[] = { [startColor CGColor], [endColor CGColor] };

    CFArrayRef colorsArrayRef = CFArrayCreate(NULL, (const void **)colors, 2, NULL);

    ```


    渐变使用的颜色是白色，只有透明度发生变化。它从 45% 开始，到 10% 结束（即 55% 和 90% 的透明度）。这两个值都被放入一个 `CoreGraphics`
    颜色引用数组中。


    **注意：** 你使用数组是因为可以在渐变中指定任意数量的颜色。你还可以指定颜色应用的点。


    下一步是使用这些颜色以及颜色空间引用，并创建渐变规范的引用：


    ```

    CGColorSpaceRef colorSpaceRef = CGColorSpaceCreateDeviceRGB();

    CGGradientRef gradientRef = CGGradientCreateWithColors(colorSpaceRef, colorsArrayRef,
    NULL);

    ```


    现在你已经定义了渐变，可以在当前图形上下文中绘制它。图形上下文定义了整个 2D 绘图环境：`UIKit` 提供了 `UIGraphicsGetCurrentContext()`
    函数，以便你可以与绘制视图的系统代码共享该环境：


    ```

    CGContextRef contextRef = UIGraphicsGetCurrentContext();

    CGContextDrawLinearGradient(contextRef, gradientRef, CGPointMake(0.0f, 0.0f),
    CGPointMake(0.0f, CGRectGetMidY(rect)), 0);

    ```


    渐变是从视图的顶部绘制到其矩形的中间。


    **提示：** 许多便捷函数允许你创建和查询 Core Graphics 数据结构。在上面的示例中，你看到了 `CGPointMake()` 和 `CGRectGetMidY()`。还有像
    `CGRectMake()` 和 `CGRectGetMinX()` 这样的函数。


    最后一步非常重要。`Core Graphics` 创建的引用会分配内存，因此你需要显式释放该内存（第 43 页）：


    ```

    CFRelease(colorsArrayRef);

    CGGradientRelease(gradientRef);

    CGColorSpaceRelease(colorSpaceRef);

    ```


    由于视图绘制往往会重复进行，因此在执行屏幕更新时发生内存泄漏会严重影响你的应用。


    呼！那个渐变挺难的。接下来会稍微容易一些。


    ## 混合绘制与线条


    另一种常见的绘图类型是*混合*。它通常用于使图像的一部分变亮或变暗，以指示某种状态（如选中状态）。另一种用途，如信息视图中使用的（第 175 页），是突出边缘并提供额外的对比度。


    矩形的顶部使用 20% 白色变亮，代码如下：


    ```

    lineRect = CGRectMake(0.0f, 0.0f, rect.size.width, 1.0f);

    [[UIColor colorWithRed:1.0f green:1.0f blue:1.0f alpha:0.20f] set];

    UIRectFillUsingBlendMode(lineRect, kCGBlendModeLighten);

    ```


    这个函数的工作原理类似于你在第 176 页看到的 `UIRectFill()`，但它添加了一个混合模式作为第二个参数。相同的绘图函数用于矩形的底部。请注意，当混合模式为
    `kCGBlendModeDarken` 时，你设置的是透明度为 30% 的黑色。这段代码还展示了一个绘制水平和垂直线的简单技巧：只需定义一个高度或宽度为
    1 像素的矩形。


    ## 伟大的路径


    那么，如果你要绘制的线条不是垂直或水平线怎么办？或者如果你想绘制矩形区域以外的形状呢？Core Graphics 来救场！


    使用该框架绘制“线条”是一个相当复杂的操作。这是有充分理由的：所使用的机制并不仅限于线条。你可以绘制圆形和其他椭圆体。或者你可以绘制源自贝塞尔路径的复杂形状。


    这种绘图操作基于*路径*。路径可以被描边以生成形状的轮廓，或者被填充以生成实心形状。路径是增量式生成的：你移动到某点，向另一点添加一条线，附加一条曲线，依此类推。


    以下是在矩形底部绘制线条的代码：


    ```

    lineRect.origin.y = rect.size.height - 1.0f;

    [[UIColor colorWithRed:0.0f green:0.0f blue:0.0f alpha:0.30f] set];

    UIRectFillUsingBlendMode(lineRect, kCGBlendModeDarken);

    ```


    要使用路径做同样的事情，你需要先创建它：


    ```

    CGMutablePathRef pathRef = CGPathCreateMutable();

    ```


    然后添加线条的两个端点：


    ```

    CGPathMoveToPoint(pathRef, NULL, 0.0f, rect.size.height - 0.5f);

    CGPathAddLineToPoint(pathRef, NULL, rect.size.width, rect.size.height - 0.5f);

    ```


    此时你可以进行任何类型的绘图。如果你正在绘制圆角矩形，可以使用 `CGPathAddArc()`。要绘制贝塞尔曲线，则使用 `CGPathAddQuadCurveToPoint()`。你还可以向路径添加矩形和其他几何形状。


    一旦完成路径的构建，就关闭它：


    ```

    CGPathCloseSubpath(pathRef);

    ```


    下一步是设置图形上下文以供绘图。设置混合模式以及线条的颜色和宽度：


    ```

    CGContextSetBlendMode(contextRef, kCGBlendModeDarken);

    [[UIColor colorWithRed:0.0f green:0.0f blue:0.0f alpha:0.30f] set];

    CGContextSetLineWidth(contextRef, 1.0f);

    ```


    然后将路径添加到当前图形上下文。上下文随后可以使用该路径进行后续绘图操作：


    ```

    CGContextAddPath(contextRef, pathRef);

    ```


    最后，通过告诉图形上下文描边路径来绘制线条：


    ```

    CGContextStrokePath(contextRef);

    ```


    之后请务必清理。路径使用的内存必须释放，混合模式也应恢复为默认状态：


    ```

    CGPathRelease(pathRef);

    CGContextSetBlendMode(contextRef, kCGBlendModeNormal);

    ```


    这比你开始时那三行代码要多很多工作，但它提供了更多的灵活性。当你需要绘制比线条或矩形更复杂的图形时，这就是正确的方法。


    ## 半像素的重要性


    请务必注意绘图时使用的坐标。许多开发者都曾被 Core Graphics 的精度问题绊倒。当你绘制一条 1 像素的线条时，该线条的一半位于指定坐标之上，另一半位于其下（图
    6-8）。


    **图 6-8：** 在整数坐标处绘制的线条不会如你所期望的那样显示。当你指定 44.0 作为垂直坐标时，一半的线条会绘制在上方，一半在下方（A）。该线条分布在
    2 个像素上，失去了颜色定义并变得模糊（B）。解决方案是减去一半线宽并在 43.5 处绘制（C）。


    例如，如果你指定一条宽度为 1.0 且水平坐标为 44.0 的线条，则绘制出的线条顶部在 43.5，底部在 44.5。由于 Core Graphics 使用抗锯齿来平滑线条，它会将单一颜色的线条平分到
    2 个像素上。这会导致线条模糊，失去颜色定义。


    为了补偿，在定义点时所使用的高度要减去一半线宽，从而得到一条精确跨越第 44 像素的线条。


    **注意：** 这种模糊绘制也可能在你计算视图矩形时发生。与线条一样，偏移了半像素的矩形看起来会不正确，并且很难清楚为什么会发生这种情况。'
  raw: 'To do so, you use *CoreGraphics.* This framework contains the entire low-level
    API used for drawing on the iPhone. You already encountered this framework when
    you used any definition that begins with *CG,* notably *CGRect* (page 158).


    To begin drawing the gradient, you need an array of colors:


    UIColor *startColor = [UIColor colorWithRed:1.0f green:1.0f blue:1.0f alpha:0.45f];


    UIColor *endColor = [UIColor colorWithRed:1.0f green:1.0f blue:1.0f alpha:0.10f];


    CGColorRef colors[] = { [startColor CGColor], [endColor CGColor] }; CFArrayRef
    colorsArrayRef = CFArrayCreate(NULL, (const void **)colors, 2, NULL);


    The color that’s used for the gradient is white; only the opacity varies. It starts
    at 45%


    and ends at 10%. (That’s 55% and 90% transparency.) Both values go into an array
    of *CoreGraphics* color references.


    **176**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **refine the look**


    ***Note:*** You’re using an array because you can specify as many colors as you’d
    like in a gradient. You can also specify the points at which the colors are applied.


    The next step is to use these colors along with a color space reference, and to
    create a reference to the gradient specification:


    CGColorSpaceRef colorSpaceRef = CGColorSpaceCreateDeviceRGB(); CGGradientRef gradientRef
    = CGGradientCreateWithColors(colorSpaceRef, colorsArrayRef, NULL);


    Now that you have the gradient defined, you can draw it in the current graphics
    context. The graphics context defines the entire 2-D drawing environment: UIKit
    provides the *UIGraphicsGetCurrentContext()* function so you’re able to share
    that environment with the system code that’s drawing views:


    CGContextRef contextRef = UIGraphicsGetCurrentContext();


    CGContextDrawLinearGradient(contextRef, gradientRef, CGPointMake(0.0f, 0.0f),
    CGPointMake(0.0f, CGRectGetMidY(rect)), 0);


    The gradient is being drawn from the top of the view to the middle of its rectangle.


    ***Tip:*** Many convenience functions allow you to create and query the Core Graphics
    data structures.


    In the above example, you see *CGPointMake()* and *CGRectGetMidY().* There are
    also functions like *CGRectMake()* and *CGRectGetMinX().*


    The last step is very important. The references created by Core Graphics allocate
    memory, so you need to explicitly release that memory (page 43).


    CFRelease(colorsArrayRef);


    CGGradientRelease(gradientRef);


    CGColorSpaceRelease(colorSpaceRef);


    Since view drawing tends to be done repeatedly, memory leaks while doing these
    screen updates can seriously impact your application.


    Whew! That gradient was tough. It’s going to get a bit easier next.


    Blended drawing and lines. Another common type of drawing is *blending.* It’s
    often used to make a part of an image lighter or darker to indicate some kind
    of state (like selection). Another use, like the one used in the info view (page
    175), is to highlight the edges and provide additional contrast.


    The top of the rectangle is lightened with a 20% white using this code: lineRect
    = CGRectMake(0.0f, 0.0f, rect.size.width, 1.0f);


    [[UIColor colorWithRed:1.0f green:1.0f blue:1.0f alpha:0.20f] set]; **UIRectFillUsingBlendMode(lineRect,
    kCGBlendModeLighten);** Chapter 6: A Flashlight for Pros


    **177**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **refine the look**


    This works like the *UIRectFill()* function you saw on page 176, but it adds a
    blending mode as a second parameter. The same drawing function is used at the
    bottom of the rectangle. Note that when the blend mode is *kCGBlendModeDarken,*
    you set a black color with 30% alpha. This code also shows a simple trick to draw
    horizontal and vertical lines. You just define a rectangle whose height or width
    is 1 pixel.


    *A path to greatness*


    So what do you do if the line you want to draw isn’t vertical or horizontal? Or
    what if you want to draw something other than a rectangular area? Core Graphics
    to the rescue!


    Drawing a “line” with this framework is a fairly complex operation. And for good
    reason: The mechanism that is used is not limited to just lines. You can draw
    circles and other ellipsoids. Or you can draw complex shapes derived from Bezier
    paths.


    This drawing operation is based on a *path.* A path can be stroked to generate
    the outline of a shape or filled to generate a solid. Paths are generated incremental
    y: You move to a point, add a line to another point, append a curve, and so on.


    Here’s some code that draws a line at the bottom of the rectangle: lineRect.origin.y
    = rect.size.height - 1.0f;


    [[UIColor colorWithRed:0.0f green:0.0f blue:0.0f alpha:0.30f] set]; UIRectFillUsingBlendMode(lineRect,
    kCGBlendModeDarken);


    To do the same thing using a path, you’d first create it:


    CGMutablePathRef pathRef = CGPathCreateMutable();


    Then add the two end-points of a line:


    CGPathMoveToPoint(pathRef, NULL, 0.0f, rect.size.height - 0.5f); CGPathAddLineToPoint(pathRef,
    NULL, rect.size.width, rect.size.height - 0.5f); You can do any kind of drawing
    at this point. If you’re drawing a rectangle with rounded edges, you might use
    *CGPathAddArc().* To draw a Bezier curve, you use *CGPathAddQuadCurveToPoint().*
    You can also add rectangles and other geometric shapes to the path.


    Once you finish constructing the path, you close it:


    CGPathCloseSubpath(pathRef);


    The next step is to get the graphics context set up for drawing. Set the blend
    mode along with the color and width of the line:


    CGContextSetBlendMode(contextRef, kCGBlendModeDarken);


    [[UIColor colorWithRed:0.0f green:0.0f blue:0.0f alpha:0.30f] set]; CGContextSetLineWidth(contextRef,
    1.0f);


    **178**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **refine the look**


    Then add the path to the current graphics context. The context can then use the
    path for subsequent drawing operations:


    CGContextAddPath(contextRef, pathRef);


    And final y you draw the line by telling the graphics context to stroke the path:
    CGContextStrokePath(contextRef);


    Make sure to clean up afterwards, too. The memory used by the path must be released,
    and the blending mode should be returned to its default state: CGPathRelease(pathRef);


    CGContextSetBlendMode(contextRef, kCGBlendModeNormal);


    This is a lot more work than the three lines of code you started with, but it
    provides a lot more flexibility. When you need to draw something more than a line
    or rectangle, this is the way to go!


    *Half a pixel matters*


    Make sure to pay attention to the coordinates used when drawing. Many a developer
    has been tripped up by the precision in Core Graphics. When you draw a 1-pixel
    line, half of the line is above the specified coordinate, and the other half is
    below (Figure 6-8).


    ***Figure 6-8:***


    *A line drawn at integral coor-*


    *dinates won’t appear as you*


    *expect. When you specify 44.0*


    43.5


    *as a vertical coordinate, half*


    *the line will be drawn above*


    *and half below (A). The line is*


    *spread across 2 pixels, losing*


    *color definition and becoming*


    A


    B


    C


    *blurry (B). The solution is to*


    *subtract half the line width and*


    *to draw at 43.5 (C).*


    For example, if you specify a line with a width of 1.0 and a horizontal coordinate
    of 44.0, the top of the line that’s drawn is at 43.5, and the bottom is at 44.5\.
    Since Core Graphics smoothes the line using anti-aliasing, it splits the single
    line of color across 2 pixels. This results in a blurry line that loses color
    definition.


    To compensate, the heights used while defining points have half the line width
    subtracted, resulting in a line that spans the 44th pixel exactly.


    Chapter 6: A Flashlight for Pros


    **179**


