    ## Where to Go from Here


    As you’re developing your first iPhone user interface, you’re sure to have additional
    questions about the “right way” to do things. When that happens, the best advice
    is to take a look at the *iPhone Human Interface Guidelines.* Every iPhone developer
    should become familiar with this document from Apple that describes fundamental
    interaction principles along with the views and controls that can implement them.


    (You can find a link to it at *www.missingmanuals.com/cds*.) You’ll also find
    several books in this book’s appendix that can help you maximize the user experience
    of your iPhone application.


    Ready to Code!


    Don’t treat your models, views, and controllers as if they’re cast in stone. Details
    will most certainly evolve as you implement the classes. Predicting the future
    has never been an exact science.


    Chapter 4: Design Tools: Building a Better Flashlight


    **121**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Where to Go from Here


    The main purpose of going through this lengthy design process before touching
    a line of code is to filter out the bad ideas and refine the good ones. Any changes
    that pop up during the implementation will be minor. The major functions and features
    won’t be affected, and you’ll avoid the costs and headaches of mid-course corrections.


    Attention to the details of design will also pay off when you start selling your
    app on iTunes. You’ll find that it’s easier to market your product because you
    have a clear vision of its purpose and the types of customers who will be interested
    in purchasing it. Customers will also appreciate the care you’ve put into the
    app’s construction, and you’ll get good reviews and word-of-mouth recommendations.'
