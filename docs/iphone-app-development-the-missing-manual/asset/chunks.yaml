    forum.


    **Note:** Yes, there’s irony in recommending a lowercase type definition instead
    of one that uses awesome uppercase letters like the rest of this chapter does.


    ## Where to Go from Here


    Now that you’ve gotten a taste of Objective-C, you may find that you want to know
    more about the language.


    Sometimes, you do get something for nothing; *The Objective-C 2.0 Programming
    Language* book is a great example. Apple has some of the best technical writers
    in the business, and it shows in this book that describes the programming language.
    All of the language’s features are described in detail along with pertinent examples.
    The book’s glossary and index are especially helpful as you encounter new terminology
    and concepts. There’s a link to this online book on this book’s Missing CD page
    at [www.missingmanuals.com/cds](http://www.missingmanuals.com/cds). (Or just do
    a web search for *the objective-c 2.0 programming language.* You’ll find a link
    to the book on Apple’s site.) Another great resource is right inside this book—Appendix
    A. Here you’ll find additional resources for each of the topics covered in this
    book. Each is listed along with a URL and a short review. If there’s an area where
    you feel you need more help, head for the appendix.


    ## Developer Documentation


    It may seem odd that you’ve gone through an entire chapter describing a programming
    language, and the topic of developer documentation hasn’t been mentioned.


    It’s because there’s a lot of it and it’s really good. To the point of it being
    a distraction, in fact.


    Since there’s no way this book can explain every line of code you’ll encounter,
    now’s a good time to introduce the system documentation shown in Figure 2-2.


    While you’re working in Xcode, you can call up this documentation at any time
    from the Help➝Developer Documentation menu. Once the window appears, you can search
    for anything by typing in the box at upper right: class names (such as `NSString`),
    method names (such as `release`), or concepts (such as `override`).


    Once your search results appear, you can drill down using various navigational
    elements.


    ### Results list


    The results for your search are displayed on the left side of the documentation
    window. You can control how much information is displayed in the API list by selecting
    how your search term will be used to match documentation pages. When Contains
    is selected, `NSString` will match `CFStringConvertEncodingToNSStringEncoding`
    because it’s a part of the API name. If Prefix is selected, `NSString(UIStringDrawing)`
    will match because it begins with the search text. The Exact setting would only
    show the page for `NSString`.


    ![Image 22](index-80_1.jpg)


    **Figure 2-2:** The Xcode documentation viewer. You can search using the box at
    upper right (A). The results are listed on the left side of the window (B). Select
    one of the results, and the documentation page is displayed at right (C). From
    there, you can open the Table of Contents to quickly navigate through the page
    by clicking the links (D). For example, clicking the `-length` method name will
    take you to detailed documentation, or you can hover your mouse pointer over the
    info icon to get a quick description (E).


    The results are broken down into three sections:


    - **API.** This section shows symbol name matches. Each match is prefixed with
    a colored letter. A purple `C` tells you the symbol is a class, a blue `M` is
    a method, an orange `T` is a type definition, and so on.

    - **Title.** Each of the entries under this section is a match for the document
    page’s title.

    - **Full Text.** The last section shows matches in the full text of the document
    page.


    These results can be handy to find what you’re looking for in a larger context.


    If you’re more interested in how you use a class, these results will show where
    it appears within a guide, release notes, or sample code.


    ### Documentation page view


    When you select an item from the results list, the page is displayed in the right
    side of the window. For some classes, this documentation page can be quite long,
    so here are some tricks to help navigate it quickly:


    - **Table of Contents.** You can open the page’s table of contents to quickly
    navigate through a page with many methods. And when you’re first starting out,
    the “Tasks” section of the class documentation can be a helpful guide. For example,
    if you’re looking for ways to create and initialize strings, there’s a subsection
    for that under Tasks for `NSString`.

    - **Companion Guides.** Many of the core classes in Cocoa have companion guides.
    These documents provide a high-level view of how to use the class, along with
    samples. If you’re just starting out with `NSStrings`, clicking the “String Programming
    Guide for Cocoa” section will get you up to speed as quickly as possible.

    - **Related Source Code.** Sometimes a picture is worth a thousand words; for
    a developer, sample code is the prettiest picture of all. If you’re struggling
    with how to use `NSString` in a list of data, clicking `TableViewSuite` will show
    you how it’s done in working source code.

    - **Jump To…** If you’re looking for a specific method in a class, this pop-up
    menu provides quick access to various sections and subsections on the page.

    - **Use Find.** When you press ⌘-F, a new search field appears above the document
    page. Any text you type in this field shows up as a match in the documentation.
    You can click the arrow buttons (or ⌘-G and ⌘-Shift-G) to navigate through the
    matches.


    #### Type less, learn more


    The built-in documentation gives you easy ways to access it; don’t miss these
    great tricks. Even using copy and paste, entering class and method names into
    the documentation search field gets tedious quick. The developers who created
    Xcode are just as lazy as you are, so they came up with some better ways to navigate
    through this sea of information.


    ##### Context menu


    If you see a symbol in some source code that you don’t understand, you can select
    the text and then Control-click to reveal a shortcut menu. This menu contains
    a lot of useful items, but toward the end you’ll see two of particular interest.
    Clicking “Find Text in Documentation” brings up the documentation window with
    search results for the selected text. No typing required!


    Another helpful item in that menu is “Jump to Definition”. This command uses the
    selected text to look for the code where the symbol is defined. For a class like
    `NSString` where you don’t have the source code, you’ll be shown an `@interface`
    definition. If the class is one you’ve written, you’ll be shown the `@implementation`
    definition.


    ##### Clicks ahoy!


    But it gets even better. You can access the documentation by using just your keyboard
    and two clicks of the mouse button. Option–double-click a symbol name, and a small
    window appears that displays a short description of the class or method, a declaration
    that includes parameter types, and links to sample code and related documents.
    You’ll also see the date when the API first became available.'
