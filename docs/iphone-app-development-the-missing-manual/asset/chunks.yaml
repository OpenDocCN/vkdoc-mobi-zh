  trans: '

    ***注意：*** `Flashlight Pro` 项目包含两个 Beta 目标。第一个名为“`Safety Light (Beta)`”，用于构建应用程序。第二个是一个聚合目标，名为“`Beta`”，它使用第一个目标构建应用，生成
    ZIP 文件，并将应用上传到下载服务器。


    构建完成后，请为你打算发送给测试人员的应用程序创建一个 Zip 文件。进入目标的构建文件夹，你会看到如图 7-3 所示的内容。


    ***图 7-3：*** 构建完成后，目标的文件夹中包含一个带圆圈反斜杠符号的应用程序以及一个 `dSYM` 文件。Mac 和 iPhone 版本的 OS
    X 都使用 `Info.plist` 文件。别担心——该符号仅表示 Mac 和 iPhone 使用不同的处理器。带有 `.dSYM` 扩展名的文件包含调试符号。在发送给
    Beta 测试人员之前，请先压缩应用程序文件。


    ***提示：*** 你可以通过查看“`Per-configuration Build Products Path`”来确定目标的构建文件夹。


    设备构建的默认值为 `build/Debug-iphoneos` 和 `build/Release-iphoneos`。`Flashlight Pro` 项目会在文件夹名称前添加“`Beta—`”和“`Final—`”，这样你的测试构建就不会与你的
    Beta 和最终构建混淆。


    **Beta 测试**


    创建 Zip 文件的最快方法是在按住 Control 键的同时单击（或右键单击）应用图标，然后从快捷菜单中选择“压缩”。请将此 Zip 文件保存在安全位置，因为你将把它发送给
    Beta 测试人员。你可能还需要使用在 `Info.plist` 中使用的相同版本号重命名该文件，这有助于你和 Beta 测试人员追踪多个版本。像 `TiddlywinksPro-1.0b1.zip`
    这样的命名方式就很合适。


    还记得几页前你保存的那个 `.mobileprovision` 文件吗？是时候把它找出来，与应用程序 Zip 文件一起发送了。然后将 `TiddlywinksPro-1.0b1.zip`
    和 `Squidger_Beta_Distribution.mobileprovision` 文件一并附加到发送给 Beta 测试人员的邮件中。


    但在发送邮件之前，你还需要再做一次测试。你需要确保你的测试人员能够安装并运行该软件。


    **安装**


    你的 Beta 测试人员可能没有 Xcode 及其管理工具窗口来安装配置文件和应用。如果你有使用 Windows 的测试人员，他们肯定无法运行这个 Mac
    应用程序。那么，诀窍是什么呢？


    实际上，有两种方法。第一种也是最简单的方法是使用 iTunes！


    **iTunes。** 你的 Beta 测试人员收到你的测试软件后，首先要做的就是解压 Zip 文件。只需在 Finder 中双击该文件，就会出现带圆圈反斜杠的应用图标。此时，安装应用只需将应用程序和配置文件拖放到
    iTunes 的应用资料库中即可（图 7-4）。


    ***图 7-4：*** 测试人员可以使用 iTunes 安装你的 Beta 应用程序和配置文件。他们只需将应用和 `.mobileprovision` 文件拖入
    iTunes 的应用资料库即可。


    **Beta 测试**


    添加到 iTunes 的应用其行为与从 iTunes 购买的应用非常相似。唯一的区别是它们显示的是“`Unknown Genre`”而不是类别名称。你甚至可以使用
    `文件` ➝ `显示简介` 来查看版本号。毫不意外，你可以随后将 Beta 应用同步到设备上（图 7-5）。


    ***图 7-5：*** Beta 应用可以像 App Store 中的任何其他应用一样同步到测试人员的设备。只需确保在开始同步前，应用名称旁已勾选即可。

