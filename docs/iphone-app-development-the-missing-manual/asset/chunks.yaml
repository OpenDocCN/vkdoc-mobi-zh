    The results are broken down into three sections:


    • **API.** This section shows symbol name matches. Each match is prefixed with
    a colored letter. A purple *C* tel s you the symbol is a class, a blue *M* is
    a method, an orange *T* is a type definition, and so on.


    • **Title.** Each of the entries under this section is a match for the document
    page’s title.


    • **Full Text.** The last section shows matches in the full text of the document
    page.


    These results can be handy to find what you’re looking for in a larger context.


    If you’re more interested in how you use a class, these results will show where
    it appears within a guide, release notes, or sample code.


    *Documentation page view*


    When you select an item from the results list, the page is displayed in the right
    side of the window. For some classes, this documentation page can be quite long,
    so here are some tricks to help navigate it quickly:


    • **Table of Contents.** You can open the page’s table of contents to quickly
    navigate through a page with many methods. And when you’re first starting out,
    the


    “Tasks” section of the class documentation can be a helpful guide. For example,
    **62**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **where to Go from**


    **Here**


    if you’re looking for ways to create and initialize strings, there’s a subsection
    for that under Tasks for *NSString.*


    • **Companion Guides.** Many of the core classes in Cocoa have companion guides.


    These documents provide a high-level view of how to use the class, along with
    samples. If you’re just starting out with *NSStrings,* clicking the “String Programming
    Guide for Cocoa” section will get you up to speed as quickly as possible.


    • **Related Source Code.** Sometimes a picture is worth a thousand words; for
    a developer, sample code is the prettiest picture of al . If you’re struggling
    with how to use *NSString* in a list of data, clicking *TableViewSuite* will show
    you how it’s done in working source code.


    • **Jump To…** If you’re looking for a specific method in a class, this pop-up
    menu provides quick access to various sections and subsections on the page.


    • **Use Find.** When you press ⌘-F, a new search field appears above the document
    page. Any text you type in this field shows up as a match in the documentation.


    You can click the arrow buttons (or ⌘-G and ⌘-Shift-G) to navigate through the
    matches.


    *Type less, learn more*


    The built-in documentation gives you easy ways to access it; don’t miss these
    great tricks. Even using copy and paste, entering class and method names into
    the documentation search field gets tedious quick. The developers who created
    Xcode are just as lazy as you are, so they came up with some better ways to navigate
    through this sea of information.


    *Context menu*


    If you see a symbol in some source code that you don’t understand, you can select
    the text and then Control-click to reveal a shortcut menu. This menu contains
    a lot of useful items, but toward the end you’ll see two of particular interest.
    Clicking


    “Find Text in Documentation” brings up the documentation window with search results
    for the selected text. No typing required!


    Another helpful item in that menu is “Jump to Definition”. This command uses the
    selected text to look for the code where the symbol is defined. For a class like
    *NSString* where you don’t have the source code, you’l be shown an *@interface*
    definition. If the class is one you’ve written, you’l be shown the *@implementation*
    definition.


    *Clicks ahoy!*


    But it gets even better. You can access the documentation by using just your keyboard
    and two clicks of the mouse button. Option–double-click a symbol name, and a small
    window appears that displays a short description of the class or method, a declaration
    that includes parameter types, and links to sample code and related documents.
    You’ll also see the date when the API first became available.


