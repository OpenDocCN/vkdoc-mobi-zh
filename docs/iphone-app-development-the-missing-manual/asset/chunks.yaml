- fmt: '# If a New Provisioning Profile Is Needed


    If a new provisioning profile is needed, testers should delete the existing one
    on the device and then drag a new one into `iTunes`. Another warning occurs before
    the file is replaced. Once the updated files are in place, sync will get the new
    version onto the device.


    If the testers are using the `iPhone Configuration Utility` to install the beta
    versions, they must completely uninstall the app before doing a fresh install.
    This wipes out any existing documents, so game scores and other application data
    are lost.


    **Note:** After you add a new version of an application, the version number may
    be displayed incorrectly. If you want to see the correct information, you need
    to quit and restart the `iPhone Configuration Utility`.


    ## Crash Act


    Your code is perfect, right? Yep, that’s what every developer thinks until one
    of those crafty beta testers gets hold of it.


    Crashes happen. And it’s a good thing; it’s better to catch the bad memory references,
    missing methods, and other bad guys before your customers in the App Store do.


    Every crash you see now is one you won’t see later.


    The `iPhone OS` keeps track of every crash that happens on the device. When they
    occur, it automatically generates a file called a *crash report*. Normally, these
    files are uploaded to Apple when a user syncs with `iTunes`. Remember that dialog
    box that popped up in `iTunes` the first time you synced after an application
    crash? When you saw “Your device contains diagnostic information…”, that was the
    first time a crash report was detected and sent to Apple.


    You can get these crash reports directly from your beta testers. Apple has described
    the process in Technical Note TN2151 (http://developer.apple.com/iphone/library/technotes/tn2008/tn2151.html).
    In short, the tester can extract the `.crash` file from `iTunes` on their Mac
    or PC and mail it to you. Then you open the `Organizer` window in `Xcode` and
    drag the file into the list of Crash Logs under `IPHONE DEVELOPMENT`. After the
    crash report is processed, numeric memory addresses are transformed into class
    and method names with line numbers that correspond to your source code.


    **Note:** The most important part of this step is that you save a copy of your
    `dSYM` file and your application binary. It has to be the exact one you sent to
    your testers, and the files must be archived in the same folder. That’s why the
    `Flashlight Pro` project automates the process of saving these files by date and
    time.


    Once you have this information, it’s usually easy to track down the source of
    the bug.


    ## Clean Up Your Act


    While you’re beta testing, you shouldn’t be doing active development. If you do,
    your testers are working with a moving target. It’s in everyone’s best interests
    if you freeze the feature set and concentrate on fixing problems that pop up.


    Given this “don’t touch the code” edict, beta testing is a great time to start
    cleaning up the appearance of your app. And if you’re doing localization, it’s
    the right time to gather translations and distribute them to the testers.


    ### Beautification Committee


    Developers write beautiful code. Designers draw beautiful graphics. Figure 7-7
    shows what it can look like when a developer makes graphics.


    **Figure 7-7:** The flashlight user interface with placeholder graphics used during
    development. The beta test can be a good time to clean up the visuals in your
    application, because it can be done without modifying much code.


    And when the designer comes to the rescue, everyone benefits. Check out Figure
    7-8.


    **Figure 7-8:** The same screens as in Figure 7-7, but with graphics produced
    by a designer. Notice how much nicer the toolbar icons, settings, and credits
    screen look when they’re done by a professional? It’s an improvement that makes
    the app feel polished and complete.'
