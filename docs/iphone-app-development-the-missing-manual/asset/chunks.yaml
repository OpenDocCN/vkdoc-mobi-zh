    **Targets and Actions**


    NSLog(@″AFFIRMATORY DIXIE CUP″);


    }


    else {


    NSLog(@″NEGATORY MR CLEAN″);


    }


    }


    This code also has the advantage of being easy to read. Especial y if you understand
    CB slang from the 1970s.


    Next up, you need to learn how these controls get hooked up with the target object
    and the action method. Actual y, you can use two ways of defining targets and
    actions: one uses code and the other uses Interface Builder. You’ll start with
    the code to get a deeper understanding of what’s going on behind the scenes.


    User Interface: The Hard Way


    Every control in Cocoa Touch is a subclass of the *UIControl* class. This class
    defines the following method:


    - (void)addTarget:(id)target action:(SEL)action


    forControlEvents:(UIControlEvents)controlEvents


    This method takes three parameters. The first is the target object that will be
    notified about the control event. Second, the action parameter, defines the message
    that will be sent to the target object. Third, *controlEvents,* lets you specify
    the types of events that will trigger the action.


    The most common events are *UIControlEventValueChanged* and *UIControlEventTouchUpInside.*
    The first, *UIControlEventValueChanged,* is used for controls where a changed
    value is important. Examples here are dragging a slider ( *UISlider*), typing
    in text fields ( *UITextField*), and flipping switches ( *UISwitch*).


    *UIControlEventTouchUpInside* events are typical y used with *UIButton* controls
    because you only want to know that the button was released with the user’s finger
    inside the bounds of the button. It’s important not to use the *UIControlEventTouchDown,*
    even if you’re a fan of the NFL. This event doesn’t give users a chance to drag
    their finger off the button to cancel the button press.


    Here’s how you’d put this all together in your controller object:


    #define LOUDER 11.0f


    - (void)updateVolume:(id)sender {


    float volume = [(UISlider *)sender value];


    if (volume >= LOUDER) {


    NSLog(@″NIGEL TUFNEL WOULD BE PROUD″);


    }


    }


    Chapter 3: Cocoa Touch: Putting Objective-C to Work


    **81**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Targets and Actions**


    - (void)hitOrMiss {


    if ([mySlider value] > LOUDER) {


    NSLog(@″OF COURSE IT’S A HIT!!!″);


    }


    }


    - (void)setupControls {


    [mySlider addTarget:self action:@selector(updateVolume:)


    forControlEvents:UIControlEventValueChanged];


    [myButton addTarget:self action:@selector(hitOrMiss)


    forControlEvents:UIControlEventTouchUpInside];


    }


    The *–updateVolume:* method is attached to the *mySlider* view reference in the
    controller object. When the slider moves and its value changes, the volume will
    be checked; if it goes past 11, a message appears in the console log.


    The action signature without a sender parameter was used for the *–hitOr Miss*
    method. This method also shows how you can use other view states to act on the
    button press. If the slider is above 11, the button lets you know that you have
    a hit.'
  trans: "`@property (nonatomic, assign) id<UIPickerViewDelegate> delegate;` 该声明告诉你，`delegate`可以是任何类（由`*id*`表示），只要它支持`UIPickerViewDelegate`协议。当你打开文档时，你会发现该协议为代理定义了三个主要任务。你需要提供尺寸和内容，并对选择做出响应。所有这些任务都是可选的，但如果你忽略所有问题，你的选择器将变得非常无聊。\n\
    \n最初，你可能会想自定义每一行中的名称列表。选择器视图不知道如何标记行，因此它会通过`–pickerView:titleForRow:forComponent:`消息询问你想要什么。作为代理，你可以实现如下方法：\n\
    \n```\n- (NSString *)pickerView:(UIPickerView *)pickerView titleForRow:(NSInteger)row\
    \ forComponent:(NSInteger)component {\n    return [NSString stringWithFormat:@″Row\
    \ %d″, row];\n}\n```\n\n这样，选择器中的每一行将被标记为“Row 0”、“Row 1”、“Row 2”等。\n\n你还想知道何时有人点击某一行。如果不实现以下方法，你将永远不知道选择器值何时发生变化：\n\
    \n```\n- (void)pickerView:(UIPickerView *)pickerView didSelectRow:(NSInteger)row\
    \ inComponent:(NSInteger)component {\n    NSLog(@″You picked row %d″, row);\n\
    }\n```\n\n实现这两个方法的最佳位置是在`UIViewControl er`子类中。该控制器遵循第 66 页描述的 MVC 设计模式，因此很容易协调选择器视图与提供标题并在选择发生变化时更新状态的模型之间的活动。\n\
    \n选择器视图知道要显示多少行，因为委托模式有一个细微的变体——数据源。与代理一样，名为`dataSource`的实例变量必须实现`UIPickerViewDataSource`协议：\n\
    \n`@property (nonatomic, assign) id<UIPickerViewDataSource> dataSource;`\n\n并且`dataSource`需要实现两个方法：`–numberOfComponentsInPickerView:`和`–pickerView:numberOfRowsInComponent:`。\n\
    \n第一个方法告诉选择器视图要显示多少列，而第二个方法指定行数。对于一列和 10 行，你可以使用以下实现：\n\n```\n- (NSInteger)numberOfComponentsInPickerView:(UIPickerView\
    \ *)pickerView {\n    return 1;\n}\n\n- (NSInteger)pickerView:(UIPickerView *)pickerView\
    \ numberOfRowsInComponent:(NSInteger)component {\n    return 10;\n}\n```\n\n与代理方法一样，你可能会使用控制器的模型来填充这些值，而不是使用硬编码的结果。\n\
    \n当你处理滚动数据列表时（例如 Safari 中的书签或 Mail 中的收件箱），你会使用相同的委托和数据源模式。两者都使用`UITableView`，它通过与`UIPickerView`相同的技术进行控制。\n\
    \n不要认为这种委托设计模式仅限于用户界面中的视图。从 URL 下载数据时也经常使用委托。`NSURLConnectionDelegate`定义了一个协议，用于提供任何连接认证，并在下载过程中通知你。\n\
    \n## 目标与动作\n\n在 Cocoa Touch 中处理控件时，你会使用与委托类似的机制。当你点击按钮、拖动滑块调节音量或切换开关时，这些用户界面元素需要通知应用程序的其他部分有关状态变化。那么，这些控件如何让所有内容知道发生了什么？\n\
    \n通知通过**目标-动作**设计模式发生。换句话说，你可以为每个控件设置一个**目标**——一个将被通知变化的对象。与委托一样，你可以选择任何对象。\n\n\
    与委托不同的是，动作可以是对象定义的任何方法。重要的是该方法符合以下两种签名之一：\n\n```\n- (IBAction)actionOne {\n}\n\
    \n- (IBAction)actionTwo:(id)sender {\n}\n```\n\nInterface Builder 使用`IBAction`来识别你代码中的动作（稍后详细说明）。第二种形式接受一个包含发送动作的对象的单个参数。在处理动作时，可以使用`sender`。\n\
    \n如果你有一个由多个`UIButton`实例共享的单个动作，可以使用`sender`来确定哪个按钮触发了该动作。`sender`的另一个用途是查询控件的状态。例如，如果你从`UISwitch`控件接收到了一个动作，你会想知道开关是打开还是关闭：\n\
    \n```\n- (IBAction)toggleSwitch:(id)sender {\n    // sender is an instance of\
    \ UISwitch, so use its –on method:\n    if ([sender on]) {\n        NSLog(@″AFFIRMATORY\
    \ DIXIE CUP″);\n    }\n    else {\n        NSLog(@″NEGATORY MR CLEAN″);\n    }\n\
    }\n```\n\n这段代码也有易于阅读的优点，尤其是如果你理解 1970 年代的 CB 俚语。\n\n接下来，你需要了解这些控件如何与目标对象和动作方法挂钩。实际上，定义目标和动作有两种方式：一种使用代码，另一种使用\
    \ Interface Builder。你先从代码开始，以更深入地了解幕后发生了什么。\n\n### 用户界面：硬核方式\n\nCocoa Touch 中的每个控件都是`UIControl`类的子类。该类定义了以下方法：\n\
    \n```\n- (void)addTarget:(id)target action:(SEL)action\n    forControlEvents:(UIControlEvents)controlEvents\n\
    ```\n\n此方法接受三个参数。第一个是将被通知控制事件的目标对象。第二个参数`action`定义了将发送给目标对象的消息。第三个参数`controlEvents`让你指定将触发该动作的事件类型。\n\
    \n最常见的事件是`UIControlEventValueChanged`和`UIControlEventTouchUpInside`。第一个`UIControlEventValueChanged`用于值变化很重要的控件，例如拖动滑块（`UISlider`）、在文本字段中键入（`UITextField`）以及翻转开关（`UISwitch`）。\n\
    \n`UIControlEventTouchUpInside`事件通常用于`UIButton`控件，因为你只想在用户手指在按钮边界内释放按钮时才知道。即使你是\
    \ NFL 的粉丝，也不应使用`UIControlEventTouchDown`。此事件不允许用户将手指拖离按钮以取消按钮按下。\n\n以下是在你的控制器对象中如何将它们组合在一起：\n\
    \n```\n#define LOUDER 11.0f\n\n- (void)updateVolume:(id)sender {\n    float volume\
    \ = [(UISlider *)sender value];\n    if (volume >= LOUDER) {\n        NSLog(@″NIGEL\
    \ TUFNEL WOULD BE PROUD″);\n    }\n}\n\n- (void)hitOrMiss {\n    if ([mySlider\
    \ value] > LOUDER) {\n        NSLog(@″OF COURSE IT’S A HIT!!!″);\n    }\n}\n\n\
    - (void)setupControls {\n    [mySlider addTarget:self action:@selector(updateVolume:)\n\
    \        forControlEvents:UIControlEventValueChanged];\n    [myButton addTarget:self\
    \ action:@selector(hitOrMiss)\n        forControlEvents:UIControlEventTouchUpInside];\n\
    }\n```\n\n`–updateVolume:`方法被附加到控制器对象中的`mySlider`视图引用上。当滑块移动且其值发生变化时，会检查音量；如果超过\
    \ 11，则在控制台日志中显示一条消息。\n\n`–hitOrMiss`方法使用了不带`sender`参数的动作签名。此方法还展示了如何利用其他视图状态来响应按钮按下。如果滑块值高于\
    \ 11，按钮会让你知道这是一个热门点击。"
- fmt: "***Note:*** Page 58 warned you about getting the number of colons in the selector\
    \ statement correct. If you had typed `@selector(updateVolume)` or `@selector(hitOrMiss:)`\
    \ in the code above, the colons won’t match the methods you’d implemented. When\
    \ you tested the controls, you’d be greeted with a crash and an “unrecognized\
    \ selector sent to instance” message in your console log.\n\n*Along the way*\n\
    \nYou’re now probably expecting to see that easy way of setting up action messages\
    \ on target objects. But before you can dive into Interface Builder, you need\
    \ to prepare your controller’s code so that objects and actions are exposed. This\
    \ small amount of work will save you loads of time as your project evolves. It’s\
    \ well worth the investment.\n\nAs you’ve seen in the MVC design pattern, one\
    \ or more view objects are managed by a controller. So where do you define these\
    \ views for your controller? If you said “in the `@interface`,” you win a prize!\n\
    \nTo get some hands-on experience, download `MissingCD_Xcode_Projects.zip` from\
    \ the Missing CD page at `www.missingmanuals.com`.\n\n## Targets and Actions\n\
    \nIn this exercise, your controller is named `HitMakerViewController`, and it\
    \ has three views: a slider, a text view, and a button. You define the instance\
    \ variables just as you did on page 70:\n\n```\n@interface HitMakerViewController\
    \ : UIViewController {\n    UISlider *mySlider;\n    UIButton *myButton;\n   \
    \ UILabel *myLabel;\n}\n```\n\nAlso define properties for these instance variables\
    \ so they’re retained objects:\n\n```\n@property (nonatomic, retain) IBOutlet\
    \ UISlider *mySlider;\n@property (nonatomic, retain) IBOutlet UIButton *myButton;\n\
    @property (nonatomic, retain) IBOutlet UILabel *myLabel;\n```\n\nAnd here are\
    \ the action method definitions:\n\n```\n- (IBAction)updateVolume:(id)sender;\n\
    - (IBAction)hitOrMiss;\n```\n\nBy now, you’ve probably figured out that the first\
    \ two letters in Objective-C identifiers are important. The `IB` is a hint that\
    \ helps you solve the mystery. It stands for Interface Builder.\n\nIf you look\
    \ up the definitions of `IBOutlet` and `IBAction`, you may be confused by what\
    \ you find in `UINibDeclarations.h`:\n\n```\n#define IBOutlet\n#define IBAction\
    \ void\n```\n\nWhen you add `IBOutlet` and `IBAction` to your source code, you’re\
    \ not adding any additional functionality. As you see above, the definitions of\
    \ these two identifiers are essentially NOPs. All you’re doing is marking your\
    \ code so Interface Builder has something to parse.\n\n`IBOutlet` is used to mark\
    \ objects that will be used in the graphical editor and in your source code. Similarly,\
    \ `IBAction` is used to identify methods that are shared between the two editing\
    \ environments.\n\n*The magical way*\n\nFrom your source code’s point of view,\
    \ the `mySlider`, `myButton`, and `myLabel` objects will magically appear when\
    \ your application launches. This kind of sorcery makes your life a lot easier,\
    \ but it’s important to understand the trick so you can take advantage of the\
    \ underlying sleight of hand.\n\nIt all begins with the application configuration\
    \ file. `HitMaker-Info.plist` contains a Main NIB file base name (`NSMainNibFile`)\
    \ value. This tells Cocoa Touch to load the named file at launch. When `MainWindow`\
    \ is specified, all the objects in `MainWindow.xib` will be loaded into memory.\n\
    \n***Note:*** The name “NIB” is short for “NeXT Interface Builder” and was used\
    \ as the extension for files saved with older versions of the software. Many developers\
    \ and most parts of the framework continue to use this term, although the files\
    \ now use the `.xib` extension. This new format is based on XML, hence the first\
    \ letter in the new name.\n\nIn some contexts, developers talk about NIB files;\
    \ in others they use the term “XIB files.” They’re the same thing: a file that\
    \ contains part of your user interface.\n\nA part of the loading process is setting\
    \ all the instance variables you’ve defined as being an `IBOutlet`. The NIB loading\
    \ mechanism uses your accessors to set the instance variables, so `-setMySlider:`,\
    \ `-setMyButton:`, and `-setMyLabel:` are all called using the object in memory.\n\
    \nThe coolest part is that the objects that are loaded have all the settings you’ve\
    \ made in the Interface Builder. If you’ve changed a view’s background color,\
    \ that change will be reflected in memory, and your instance variable has access\
    \ to it.\n\nAfter an object is read from the NIB/XIB file, it’s sent an `-awakeFromNib`\
    \ message. This gives you a chance to perform any additional setup on your objects.\n\
    \nThis point is important, because not every object property is editable using\
    \ Interface Builder. Also, in some cases, you’ll want to configure objects based\
    \ on internal logic.\n\nYou’d be right in thinking that now would also be a good\
    \ time to update your view outlets. However, if you send the `-setValue:` message\
    \ to your `mySlider` instance variable in the `-awakeFromNib` implementation,\
    \ nothing will happen. These views haven’t been loaded yet, so the instance variables\
    \ still have nil values. When you send a message to a nil object, the message\
    \ is quietly discarded. This seems like a bug, but the engineers who designed\
    \ Cocoa Touch did you a favor: views are loaded *lazily.*\n\nHere’s how it works:\
    \ Views can use a substantial amount of memory, especially if you’re using heavyweight\
    \ objects like `UIWebView` that include a cache of images and other web content.\
    \ On the iPhone, every byte counts, so view objects are loaded only when they\
    \ need to appear on the display. An added benefit to this approach is that it\
    \ takes less time for your app to load when it contains many views.\n\nTo find\
    \ out when your view is loaded from the NIB/XIB file, override the `-viewDidLoad`\
    \ method. The following code shows how you could initialize the position of your\
    \ `mySlider` object:\n\n```\n- (void)viewDidLoad {\n    mySlider.value = 11.0;\
    \ // LOUDER\n    [super viewDidLoad];\n}\n```\n\nCocoa Touch not only loads views\
    \ lazily, but it can also remove them automatically when memory is running low.\
    \ The framework knows which views are on the display and safely reclaims storage\
    \ by removing any that aren’t visible. When it does, it also sends your view controller\
    \ a message letting you know about the low memory condition:\n\n```\n- (void)didReceiveMemoryWarning\
    \ {\n    [super didReceiveMemoryWarning];\n}\n```\n\nIf your view relies on a\
    \ large cache of information or other data that can be reconstructed easily, then\
    \ the `-didReceiveMemoryWarning` method is a great way to clear out those objects\
    \ as well.\n\nOf course, you’ll want to know when your view is removed, so you\
    \ can release your instance variables to save even more memory. If you don’t override\
    \ the `-viewDidUnload` method, your instance variables will continue to occupy\
    \ space, but will be useless because they don’t have a parent view. The implementation\
    \ is simple:\n\n```\n- (void)viewDidUnload {\n    self.mySlider = nil;\n    self.myButton\
    \ = nil;\n    self.myLabel = nil;\n}\n```\n\nThis brings up a subtle point: The\
    \ `-viewDidLoad` and `-viewDidUnload` methods can be called multiple times, so\
    \ avoid any initialization that should be performed only once.\n\n***Tip:*** You\
    \ don’t have to use a NIB/XIB file created with Interface Builder in order to\
    \ construct a view hierarchy. Overriding `-loadView` lets you build your own view\
    \ hierarchy with code. It’s harder to do it this way, but with some user interfaces\
    \ it’s a necessity.\n\nIf you’re going to great lengths to adjust views loaded\
    \ from a NIB/XIB file, typically when you’re doing extensive animation, it’s often\
    \ easier to just override `-loadView` with code that allocates the view objects,\
    \ initializes, and adds them to the main view with `-addSubview:`."
  raw: '***Note:*** Page 58 warned you about getting the number of colons in the selector
    statement correct. If you had typed *@selector(updateVolume)* or *@selector(hitOrMiss:)*
    in the code above, the colons won’t match the methods you’d implemented. When
    you tested the controls, you’d be greeted with a crash and an “unrecognized selector
    sent to instance” message in your console log.


    *Along the way*


    You’re now probably expecting to see that easy way of setting up action messages
    on target objects. But before you can dive into Interface Builder, you need to
    prepare your controller’s code so that objects and actions are exposed. This small
    amount of work will save you loads of time as your project evolves. It’s well
    worth the investment.


    As you’ve seen in the MVC design pattern, one or more view objects are managed
    by a controller. So where do you define these views for your controller? If you
    said “in the *@interface,* ” you win a prize!


    To get some hands-on experience, download *MissingCD_Xcode_Projects.zip* from
    the Missing CD page at *www.missingmanuals.com*.


    **82**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Targets and Actions**


    In this exercise, your controller is named *HitMakerViewControl er,* and it has
    three views: a slider, a text view, and a button. You define the instance variables
    just as you did on page 70:


    @interface HitMakerViewController : UIViewController {


    UISlider *mySlider;


    UIButton *myButton;


    UILabel *myLabel;


    }


    Also define properties for these instance variables so they’re retained objects:


    @property (nonatomic, retain) **IBOutlet** UISlider *mySlider;


    @property (nonatomic, retain) **IBOutlet** UIButton *myButton;


    @property (nonatomic, retain) **IBOutlet** UILabel *myLabel; And here are the
    action method definitions:


    - (**IBAction**)updateVolume:(id)sender;


    - (**IBAction**)hitOrMiss;


    By now, you’ve probably figured out that the first two letters in Objective-C
    identifiers are important. The *IB* is a hint that helps you solve the mystery.
    It stands for Interface Builder.


    If you look up the definitions of *IBOutlet* and *IBAction,* you may be confused
    by what you find in UINibDeclarations.h:


    #define IBOutlet


    #define IBAction void


    When you add *IBOutlet* and *IBAction* to your source code, you’re not adding
    any additional functionality. As you see above, the definitions of these two identifiers
    are essential y NOPs. All you’re doing is marking your code so Interface Builder
    has something to parse.


    *IBOutlet* is used to mark objects that will be used in the graphical editor and
    in your source code. Similarly, *IBAction* is used to identify methods that are
    shared between the two editing environments.


    *The magical way*


    From your source code’s point of view, the *mySlider,* *myButton,* and *myLabel*
    objects will magical y appear when your application launches. This kind of sorcery
    makes your life a lot easier, but it’s important to understand the trick so you
    can take advantage of the underlying sleight of hand.


    It all begins with the application configuration file. HitMaker-Info.plist contains
    a Main NIB file base name ( *NSMainNibFile*) value. This tel s Cocoa Touch to
    load the named file at launch. When *MainWindow* is specified, all the objects
    in MainWindow.xib will be loaded into memory.


    Chapter 3: Cocoa Touch: Putting Objective-C to Work


    **83**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Targets and Actions**


    ***Note:*** The name “NIB” is short for “NeXT Interface Builder” and was used
    as the extension for files saved with older versions of the software. Many developers
    and most parts of the framework continue to use this term, although the files
    now use the .xib extension. This new format is based on XML, hence the first letter
    in the new name.


    In some contexts, developers talk about NIB files; in others they use the term
    “XIB files.” They’re the same thing: a file that contains part of your user interface.


    A part of the loading process is setting all the instance variables you’ve defined
    as being an *IBOutlet.* The NIB loading mechanism uses your accessors to set the
    instance variables, so *–setMySlider:,* *–setMyButton:,* and *–setMyLabel:* are
    all called using the object in memory.


    The coolest part is that the objects that are loaded have all the settings you’ve
    made in the Interface Builder. If you’ve changed a view’s background color, that
    change will be reflected in memory, and your instance variable has access to it.


    After an object is read from the NIB/XIB file, it’s sent an *–awakeFromNib* message.
    This gives you a chance to perform any additional setup on your objects.


    This point is important, because not every object property is editable using Interface
    Builder. Also, in some cases, you’ll want to configure objects based on internal
    logic.


    You’d be right in thinking that now would also be a good time to update your view
    outlets. However, if you send the *–setValue:* message to your *mySlider* instance
    variable in the *–awakeFromNib* implementation, nothing will happen. These views
    haven’t been loaded yet, so the instance variables still have nil values. When
    you send a message to a nil object, the message is quietly discarded. This seems
    like a bug, but the engineers who designed Cocoa Touch did you a favor: views
    are loaded *lazily.*


    Here’s how it works: Views can use a substantial amount of memory, especial y
    if you’re using heavyweight objects like *UIWebView* that include a cache of images
    and other web content. On the iPhone, every byte counts, so view objects are loaded
    only when they need to appear on the display. An added benefit to this approach
    is that it takes less time for your app to load when it contains many views.


    To find out when your view is loaded from the NIB/XIB file, override the


    *–viewDidLoad* method. The following code shows how you could initialize the position
    of your *mySlider* object:


    - (void)viewDidLoad {


    mySlider.value = 11.0; // LOUDER


    [super viewDidLoad];


    }


    Cocoa Touch not only loads views lazily, but it can also remove them automatical
    y when memory is running low. The framework knows which views are on the display
    and safely reclaims storage by removing any that aren’t visible. When it does,
    it **84**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Targets and Actions**


    also sends your view controller a message letting you know about the low memory
    condition:


    - (void)didReceiveMemoryWarning {


    [super didReceiveMemoryWarning];


    }


    If your view relies on a large cache of information or other data that can be
    reconstructed easily, then the *–didReceiveMemoryWarning* method is a great way
    to clear out those objects as wel .


    Of course, you’ll want to know when your view is removed, so you can release your
    instance variables to save even more memory. If you don’t override the *–viewDidUnload*
    method, your instance variables will continue to occupy space, but will be useless
    because they don’t have a parent view. The implementation is simple:


    - (void)viewDidUnload {


    self.mySlider = nil;


    self.myButton = nil;


    self.myLabel = nil;


    }


    This brings up a subtle point: The *–viewDidLoad* and *–viewDidUnload* methods
    can be called multiple times, so avoid any initialization that should be performed
    only once.


    ***Tip:*** You don’t have to use a NIB/XIB file created with Interface Builder
    in order to construct a view h ierarchy. Overriding *–loadView* lets you build
    your own view hierarchy with code. It’s harder to do it this way, but with some
    user interfaces it’s a necessity.


    If you’re going to great lengths to adjust views loaded from a NIB/XIB file, typically
    when you’re doing extensive animation, it’s often easier to just override *–loadView*
    with code that allocates the view objects, initializes, and adds them to the main
    view with *–addSubview:.*'
  trans: "\n***注意：*** 第 58 页曾提醒过，要正确填写选择器语句中的冒号数量。如果你在上面的代码中键入了`@selector(updateVolume)`或`@selector(hitOrMiss:)`，那么冒号与你实现的方法将不匹配。当你测试控件时，应用会崩溃，并在控制台日志中显示“unrecognized\
    \ selector sent to instance（向实例发送了无法识别的选择器）”消息。\n\n*循序渐近*\n\n现在你可能正期待了解在目标对象上设置操作消息的简便方法。但在深入探讨\
    \ Interface Builder 之前，你需要先准备好控制器的代码，以便将对象和操作暴露出来。随着项目的演进，这少量工作将会为你节省大量时间，非常值得投入。\n\
    \n正如你在 MVC 设计模式中所见，一个或多个视图对象由控制器管理。那么，你应在何处为控制器定义这些视图呢？如果你回答“在`@interface`中”，恭喜你答对了！\n\
    \n为了获得一些动手实践经验，请访问 Missing CD 页面`www.missingmanuals.com`，下载`MissingCD_Xcode_Projects.zip`文件。\n\
    \n## Targets 和 Actions\n\n在本练习中，你的控制器名为`HitMakerViewController`，它包含三个视图：一个滑块、一个文本视图和一个按钮。你按照第\
    \ 70 页的做法定义实例变量：\n\n```\n@interface HitMakerViewController : UIViewController\
    \ {\n    UISlider *mySlider;\n    UIButton *myButton;\n    UILabel *myLabel;\n\
    }\n```\n\n同时，为这些实例变量定义属性，以便它们成为被保留的对象：\n\n```\n@property (nonatomic, retain) IBOutlet\
    \ UISlider *mySlider;\n@property (nonatomic, retain) IBOutlet UIButton *myButton;\n\
    @property (nonatomic, retain) IBOutlet UILabel *myLabel;\n```\n\n以下是操作方法定义：\n\n\
    ```\n- (IBAction)updateVolume:(id)sender;\n- (IBAction)hitOrMiss;\n```\n\n到目前为止，你可能已经猜到\
    \ Objective-C 标识符中头两个字母的重要性。`IB`是一个提示，能帮你解开谜团，它代表 Interface Builder。\n\n如果你查阅`IBOutlet`和`IBAction`的定义，可能会被`UINibDeclarations.h`中的内容搞糊涂：\n\
    \n```\n#define IBOutlet\n#define IBAction void\n```\n\n当你向源码中添加`IBOutlet`和`IBAction`时，并没有添加任何额外的功能。如上所见，这两个标识符的定义本质上是空操作（NOP）。你只是在标记代码，以便\
    \ Interface Builder 能够解析。\n\n`IBOutlet`用于标记那些将在图形编辑器以及源码中使用的对象。类似地，`IBAction`用于标识在两个编辑环境之间共享的方法。\n\
    \n*魔法方式*\n\n从源码的角度来看，当你的应用启动时，`mySlider`、`myButton`和`myLabel`对象会神奇地出现。这种魔法让你的生活轻松不少，但理解其中的窍门至关重要，这样你才能利用好背后的小把戏。\n\
    \n这一切都始于应用程序配置文件。`HitMaker-Info.plist`包含一个主要 NIB 文件基名（`NSMainNibFile`）值，这告诉 Cocoa\
    \ Touch 在启动时加载指定的文件。当指定了`MainWindow`时，`MainWindow.xib`中的所有对象都会被加载到内存中。\n\n***注意：**\
    \ * “NIB”这个名称是“NeXT Interface Builder”的缩写，曾用作旧版软件保存文件的扩展名。许多开发者以及框架的大部分仍继续使用这个术语，尽管现在文件使用的是`.xib`扩展名。这种新格式基于\
    \ XML，因此新名称的第一个字母由此而来。\n\n在某些上下文中，开发者谈论 NIB 文件；在另一些上下文中，他们使用术语“XIB 文件”。它们其实是一回事：一个包含部分用户界面的文件。\n\
    \n加载过程的一部分是设置你定义为`IBOutlet`的所有实例变量。NIB 加载机制使用你的访问器来设置实例变量，因此会利用内存中的对象分别调用`-setMySlider:`、`-setMyButton:`和`-setMyLabel:`。\n\
    \n最酷的是，加载的对象包含了你在 Interface Builder 中做的所有设置。如果你更改了视图的背景色，该更改会在内存中体现出来，并且你的实例变量可以访问它。\n\
    \n当从 NIB/XIB 文件中读取一个对象后，它会收到一个`-awakeFromNib`消息。这让你有机会对对象执行任何额外的设置。\n\n这一点很重要，因为并非所有对象属性都可以用\
    \ Interface Builder 编辑。另外，在某些情况下，你希望基于内部逻辑来配置对象。\n\n你可能会认为现在也是更新视图出口的好时机，这样想没错。但是，如果在`-awakeFromNib`的实现中向`mySlider`实例变量发送`-setValue:`消息，什么也不会发生。因为这些视图尚未加载，所以实例变量的值仍为\
    \ nil。当你向 nil 对象发送消息时，消息会被悄悄丢弃。这看起来像是一个 bug，但设计 Cocoa Touch 的工程师们帮了你一个忙：视图是*惰性*加载的。\n\
    \n工作原理如下：视图会占用大量内存，特别是当你使用诸如`UIWebView`这类包含图片缓存及其他网页内容的重型对象时。在 iPhone 上，每个字节都很宝贵，因此视图对象只在需要显示时才被加载。这种方法还有一个额外好处：当应用中包含多个视图时，应用加载所需的时间更少。\n\
    \n要了解视图何时从 NIB/XIB 文件中加载，请重写`-viewDidLoad`方法。以下代码展示了如何初始化你的`mySlider`对象的位置：\n\n\
    ```\n- (void)viewDidLoad {\n    mySlider.value = 11.0; // LOUDER\n    [super viewDidLoad];\n\
    }\n```\n\nCocoa Touch 不仅惰性加载视图，还能在内存不足时自动移除它们。该框架知道哪些视图正在显示，并通过移除任何不可见的视图来安全地回收存储空间。当这样做时，它还会向你的视图控制器发送一条消息，让你了解内存不足的情况：\n\
    \n```\n- (void)didReceiveMemoryWarning {\n    [super didReceiveMemoryWarning];\n\
    }\n```\n\n如果你的视图依赖于大量缓存信息或其他易于重建的数据，那么`-didReceiveMemoryWarning`方法也是清除这些对象的好办法。\n\
    \n当然，你还需要知道视图何时被移除，以便释放实例变量来节省更多内存。如果你不重写`-viewDidUnload`方法，你的实例变量将继续占用空间，但由于它们没有父视图，所以毫无用处。实现很简单：\n\
    \n```\n- (void)viewDidUnload {\n    self.mySlider = nil;\n    self.myButton =\
    \ nil;\n    self.myLabel = nil;\n}\n```\n\n这引出了一个微妙之处：`-viewDidLoad`和`-viewDidUnload`方法可能会被多次调用，因此应避免执行那些只应执行一次的初始化操作。\n\
    \n***提示：** * 你并非必须使用 Interface Builder 创建的 NIB/XIB 文件来构建视图层次结构。重写`-loadView`方法允许你用代码构建自己的视图层次结构。这样做更难，但对于某些用户界面来说，这是必要的。\n\
    \n如果你要花大力气调整从 NIB/XIB 文件加载的视图（通常是在进行大量动画时），用代码重写`-loadView`，通过分配视图对象、初始化它们，然后用`-addSubview:`将它们添加到主视图中，通常会更简单。\n"
- fmt: "Finally, since the NIB loader retained your outlet objects after storing them\
    \ in memory, you need to do one final thing in your view controller: Release the\
    \ views when the view controller is deallocated:\n\n```\n- (void)dealloc {\n \
    \   [mySlider release]; mySlider = nil;\n    [myButton release]; myButton = nil;\n\
    \    [myLabel release]; myLabel = nil;\n    [super dealloc];\n}\n```\n\nNow that\
    \ you’re an expert with the magic behind NIB/XIB files, you’re ready to take a\
    \ look at how they’re created!\n\n**Chapter 3: Cocoa Touch: Putting Objective-C\
    \ to Work**\n\n**85**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
    ## Targets and Actions\n\n### User Interface: The Easy Way\n\nAt first glance,\
    \ this step-by-step guide may not look so easy. Don’t worry, once you learn the\
    \ work flow, creating objects and hooking them up with Interface Builder is a\
    \ snap. Time to get started!\n\n*A head start*\n\nDownload the `HitMaker—Start`\
    \ project from the Missing CD page at *www.missingmanuals.com/cds*. This project\
    \ contains all the code for the actions and targets you’ll be using during the\
    \ exercise. To begin, you’ll get Xcode and Interface Builder running, and open\
    \ the files for editing:\n\n**1.** Open the `HitMaker.xcodeproj` file in the `HitMaker`\
    \ ➝ `Start` project folder.\n\nXcode launches and shows you the project contents.\n\
    \n**2.** Open the disclosure triangle to get a list of files.\n\nXIB files are\
    \ located in the Resources group.\n\n**3.** Double-click `HitMakerViewController.xib`\
    \ to open the XIB file with Interface Builder.\n\nA new icon with a drafting triangle\
    \ appears in your Dock as the file is loaded.\n\nAfter the document file opens,\
    \ you see a list of objects that are contained in the file.\n\n***Tip:*** The\
    \ document’s name appears in the title bar and in the Window menu. It’s common\
    \ to have several NIB files open at once, so use these tools to find the correct\
    \ document.\n\nYou also see a gray View window. It’s a preview of the View object\
    \ contained in the document. Meanwhile, in the document window, you see the word\
    \ “View” with no disclosure triangle next to it (Figure 3-3). That indicates that\
    \ the `UIView` object does not have any children, or subviews. You’re about to\
    \ change that.\n\n***Tip:*** If you accidentally close the View window, you can\
    \ reopen it by double-clicking View in the document window.\n\n### Your first\
    \ view\n\nThat gray window looks pretty boring, doesn’t it? Time to start adding\
    \ new views for the labels, slider, and button!\n\n**1.** Choose Tools ➝ Library.\
    \ If you’re the kind of developer who loves the keyboard, use the ⌘-Shift-L shortcut.\n\
    \nThe Library palette opens.\n\n**86**\n\niPhone App Development: The Missing\
    \ Manual\n\n![Image 24](index-105_1.jpg)\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**Targets and Actions**\n\n***Figure 3-3:*** *Here’s the blank palette you’re\
    \ going to work with. The document window is on the left, and the application’s\
    \ only view is on the right. Note that the View listed in the document window\
    \ doesn’t have any children (subviews) yet.*\n\n**2.** Scroll the list of Objects\
    \ in the Library, and select the cell with the text “Label”.\n\nIt should be in\
    \ the first row of “Cocoa Touch—Inputs & Values”. When you select the cell, you’ll\
    \ see a short description of the control and its function at the bottom of the\
    \ palette.\n\n**3.** Using your mouse, drag the Label cell onto the gray View\
    \ window.\n\nSee Figure 3-4 for a demonstration. When you’re dragging over the\
    \ View window, a green plus sign appears, which indicates that the object will\
    \ be added when you drop it.\n\n**4.** When your cursor is over the View window,\
    \ let go of the mouse button.\n\nThe label drops onto the view, and four resize\
    \ handles indicate that it’s selected.\n\n**5.** Double-click Label and type `VOLUME\
    \ NOB`.\n\nBehind the scenes, you just replaced a line of code:\n\n```\n[label\
    \ setTitle:@\"VOLUME NOB\"];\n```\n\n**6.** Drag the left and right resize handles\
    \ until the dashed blue lines appear.\n\nThe edges of the label snap to the lines,\
    \ helping you align your controls."
