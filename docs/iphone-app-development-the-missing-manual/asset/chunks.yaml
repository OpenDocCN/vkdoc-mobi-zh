- fmt: "# To enter a translation, select one of the languages from the pop-up menu\
    \ (Figure 8-6), and enter any values that need to change. If you don’t specify\
    \ otherwise, the screenshot images from the English version display on your product\
    \ page. Once you’ve entered the localized values, click `Add Another Language`\
    \ to go back to the language selection menu, or click `Continue` to finish entering\
    \ the metadata.\n\n**Figure 8-6:**  \n*Use the `Localization` tab to provide your\
    \ application information in different languages. The pop-up menu selects the\
    \ language and presents you with more text input fields.*\n\n## Review\n\nThe\
    \ last step is to check your information. The tab’s default view shows how the\
    \ data will appear in the United States. You can, and should, change the pop-up\
    \ menu for `Review App Store` to other countries to see how your marketing information\
    \ will look for customers using that store.\n\nTo make any changes, click the\
    \ `Go Back` button at the bottom of the page, or click one of the tabs at the\
    \ top of the page. If everything looks hunky-dory, click `Submit Application`,\
    \ and your product will be added to the iTunes database. Congratulations!\n\n\
    ## Tweak It\n\nAs you’ve seen in this section, setting up your metadata is an\
    \ iterative process. Once you’ve entered the basic information for the application,\
    \ you can click its icon in the `Manage Your Applications` section of iTunes Connect.\
    \ You see a screen with an `Edit Information` button that lets you update the\
    \ metadata.\n\n**Figure 8-7:**  \n*The final step in submitting your information\
    \ to iTunes is to review it for accuracy. You can use the `Review App Store` pop-up\
    \ menu to preview the information on App Stores throughout the world (A). Check\
    \ the spelling in your application description, and make sure that your categories,\
    \ keywords, and URLs are all correct (B). You can click the links for the images\
    \ to view them in a new window (C). Last but not least, your `Availability Date`\
    \ and `Price Tier` specify when the product will go on sale and how much it will\
    \ cost (D).*\n\n**Note:** As your app goes through its normal lifecycle, the metadata\
    \ changes often. In fact, you’ll probably want to maintain a document in your\
    \ source code tree that all members of your development team can update and revert\
    \ as necessary.\n\nThe Flashlight Pro project keeps all the iTunes information\
    \ in the root of the project folder. The folder contains an `AppInfo.rtf` file\
    \ with metadata along with the application icon and screenshot images.\n\n# The\
    \ Market\n\nLike the platform itself, selling products for the iPhone is a whole\
    \ new world. Chances are you’ve never sold software to a mass market: That’s about\
    \ to change with iTunes!\n\nAs discussed on page 258, setting your application’s\
    \ price is one of the more difficult aspects of preparing your release. You’re\
    \ the only one who knows how much work went into the product and how many licenses\
    \ you need to sell in order to recoup your investment.\n\nTo help you make this\
    \ decision, you need to look at the market you’re about to sell into. In Chapter\
    \ 4 (page 113), you took the first step in marketing: thinking about how to position\
    \ your application before you even start coding. Now it’s time to start thinking\
    \ about how you’re going to price and then promote that final product.\n\n## Metrics\n\
    \nTo begin to understand this new market, take a look at some of the numbers that\
    \ define it. Keep in mind that this new market is also evolving quickly—the links\
    \ included below should help you keep up with the latest changes.\n\n*Surprise!\
    \ Apple is secretive*\n\nApple doesn’t provide much information about the iPhone\
    \ OS market. The only substantive metric is the number of iPhones sold in each\
    \ quarterly financial report.\n\nUsing these numbers, you can see in Figure 8-8\
    \ that growth of the market is pretty impressive.\n\nIt’s interesting that these\
    \ numbers don’t include a significant portion of your potential customer base:\
    \ Apple does not break out the numbers for the iPod touch (instead, it reports\
    \ the total number of iPods sold). The only information from the company regarding\
    \ the breakdown was during their quarterly earnings call in July 2009. They hinted\
    \ that 45 million devices were in circulation, suggesting that the iPod touch\
    \ makes up a little over 40 percent of the total market.\n\n*Third-party research*\n\
    \nYou can get additional market information from third parties. Companies like\
    \ AdMob gather data from ads and surveys they deliver to the devices. Other companies,\
    \ like Pinch Media, let developers add analytics libraries that collect anonymous\
    \ statistics. Even established research companies like the Nielsen Company are\
    \ surveying users in order to establish market patterns.\n\n**Figure 8-8:**  \n\
    *This graph shows the cumulative number of iPhones sold since the middle of 2007.\
    \ The sales growth appears to be exponential, causing some analysts to predict\
    \ over 70 million devices by the end of 2009. Note that these sales numbers from\
    \ Apple don’t include the iPod touch, and that their fiscal year ends in September.*\n\
    \nThese sources have uncovered some interesting results:\n\n- Ninety percent of\
    \ users download apps directly from their phone (avoiding iTunes on the desktop).\n\
    - iPhone users download about 10 new apps each month, about 25 percent of which\
    \ are paid. On the iPod touch, users pay for about 10 percent of 18 apps downloaded\
    \ each month.\n- The average user spends about $9 on five paid applications each\
    \ month. That averages out to $1.80 per app.\n- Seventy-five percent of all users\
    \ have downloaded an app (free or paid).\n- Only 20 percent of users continue\
    \ to use a free application the day after it’s downloaded. After 1 month, only\
    \ 5 percent of users still use the application.\n\nHere’s where you can check\
    \ out these sources for yourself. You can find clickable links on this book’s\
    \ Missing CD page (`www.missingmanuals.com/cds`):\n\n- **AdMob.** `http://metrics.AdMob.com/2009/08/july-2009-metrics-report/`\n\
    - **Nielsen.** `http://blog.nielsen.com/nielsenwire/online_mobile/iphone-users-watch-more-video-and-are-older-than-you-think/`\n\
    - **Pinch Media.** `http://www.pinchmedia.com/appstore-secrets/`\n\n*User demographics*\n\
    \nIn June 2009, AdMob and comScore conducted a survey to establish the demographics\
    \ for iPhone and iPod touch users. Not surprisingly, iPhone users are generally\
    \ older, while those on the iPod touch tend to be younger (Figure 8-9).\n\n**Figure\
    \ 8-9:**  \n*Demographic research by AdMob and comScore shows that 69 percent\
    \ of iPod touch users are between the ages of 13 and 24 years of age. On the iPhone,\
    \ 78 percent of users fall between the ages of 18 and 49.*\n\nAlong with the older\
    \ age demographic, iPhone users earn more. Only 66 percent of iPod touch owners\
    \ made over $25,000 each year versus 78 percent of users with iPhones. This survey\
    \ also reported that over 70 percent of users are male. A prior comScore survey\
    \ in October 2008 showed that 43 percent of iPhone owners earn in excess of $100,000.\
    \ More interesting was the strong growth of iPhone ownership below the median\
    \ household income: 48 percent in the $25,000–50,000 bracket and 46 percent in\
    \ the $50,000–75,000 bracket."
