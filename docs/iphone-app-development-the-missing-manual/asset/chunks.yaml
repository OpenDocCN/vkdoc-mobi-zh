    ## NIB 文件：值得一看


    ### `AboutView.xib`


    嘿——这个 NIB 并不在最初计划中！作为一名开发者，你知道计划总会有变化。在开发产品的过程中，你显然需要一个地方来推广你的业务。在 Beta 测试期间，你还发现有一个显示
    Beta 版本号的地方非常方便。而一旦你意识到添加一个控制器和视图是多么容易，实现这个新的“关于”视图只需要很短的时间（图 6-7）。


    **图 6-7：** 此图显示了一个包含致谢、推广信息和应用程序版本号的“关于”视图。


    **提示：** 这个新的 NIB 文件也可能是一个为你们谦逊的作者添加更多酷示例的地方。


    视图的大部分由描述产品的文本标签组成。其中一个视图，即`版本标签`，连接到控制器中的 `-versionLabel` 插座。这样，版本号就可以自动更新。当讲解到
    `AboutViewController` 类（第 204 页）时，你会看到它是如何工作的。


    这个 NIB 中的另一个有趣的视图是`关闭按钮`。在检查器中看看它的大小：它的尺寸高达 320 × 460 像素，覆盖了整个屏幕！


    这个按钮允许用户点击屏幕上的任何地方，并将 `-close` 动作发送给控制器。这表明按钮不一定需要显示任何可见的文本或图像才能有效。例如，你可以使用透明按钮作为图像上的点击检测器。


