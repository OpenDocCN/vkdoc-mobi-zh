- fmt: '# If You’re Already a Developer


    If you’re already a developer, you’re used to working with source code editors,
    compilers, linkers, and debuggers. On the iPhone, you need to learn a completely
    new concept during your builds — `code signing`. Applications won’t run on your
    iPhone until this step is complete.


    This important new piece of your development toolbox is one of the more challenging
    aspects of iPhone development. Many experienced developers, even ones who have
    been working on the iPhone since its initial release, periodically get confused
    by how it works. When you encounter problems, take solace in the fact that you’re
    not alone.


    ## Join the iPhone Developer Program


    As you saw in Chapter 1, Apple supplies the iPhone SDK for free, making it cheap
    and easy to get comfortable with this new development environment. But after you
    decide to distribute your product, you must join the iPhone Developer Program.
    It’s going to cost you $99 per year to install applications on an iPhone or an
    iPod touch, either for testing or via the App Store.


    This fee helps Apple run the program, but there’s a more subtle reason for the
    charge — it’s how the company verifies your identity. Apple takes security on
    the iPhone very seriously and doesn’t want a rogue developer to damage the platform.


    When you use your credit card to enroll in the program, you’re providing a name
    and address that have been verified by a financial institution.


    ### Choose Your Program


    If you’ve visited the iPhone Dev Center at `http://developer.apple.com/iphone`,
    you might have noticed the “Learn more” link in the right column. Click this link
    to start the signup process.


    The first step is to choose one of the three account types that best suits your
    needs.


    You can choose from two types of Standard developer accounts: Individual and Company.
    The Company account lets multiple developers build and install apps.


    Both the individual and company accounts have access to the App Store.


    **Note:** You’ll find a slight difference in how iTunes lists the applications.
    An individual account shows your name as the “seller”. Company accounts use your
    company’s name.


    You can also sign up with an Enterprise account. This type of account is only
    for large organizations with 500 or more employees. Applications created using
    this account can only be distributed in-house: You won’t see them in iTunes.


    Chapter 5: Getting Serious about Development


    **135**


    `www.it-ebooks.info`


    ## Make It Official


    ### Pay to Play


    Once you choose either a Company or Individual account, you’ll go through steps
    where you supply your personal details, including credit card information. You’ll
    also need to accept the program’s licensing agreement.


    If you’re enrolling as an individual in the Standard program, make sure your enrollment
    and credit card billing information match exactly. If they don’t, your application
    will be delayed because you’ll need to provide additional identification.


    (Apple’s trying to make sure you’re not using someone else’s credit card to pay
    for your enrollment.)


    If you’ve selected a Company account, Apple verifies your business’s identity
    as well.


    Apple asks you to provide various documents and contacts your company’s legal
    representative to verify that you have the authority to accept the program’s license
    agreement.


    Once you’ve submitted your payment and proven that you are who you say you are,
    you get an activation code via email. After clicking the activation link, you
    receive another email from Apple welcoming you to the iPhone Developer Program.
    This is when it gets interesting!


    ### Welcome to the Club


    After your successful enrollment, log into your new account, and you see some
    changes in the iPhone Dev Center (`http://developer.apple.com/iphone`). The navigation
    column at right shows links to new facilities:


    - **iPhone Provisioning Portal.** You use this web application to manage the products
    you build with Xcode, the developers who create them, and the devices the apps
    run on.'
