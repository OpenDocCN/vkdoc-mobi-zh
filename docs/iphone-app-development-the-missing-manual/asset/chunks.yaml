  raw: '*A photograph of three proto-*


    *types for your settings screen.*


    *From left to right you see a*


    *grouped table view for color*


    *selection, a single button for*


    *choosing a color, and a picker*


    *control.*


    Your first decision is to include a small preview of the current settings. The
    reason for this preview is that without it, your users would constantly be flipping
    back and forth between the settings and the main view.


    You’ve also decided that slider controls are necessary to control the brightness
    of the light and the speed for the flasher. It makes sense to put them under the
    preview since they’re so closely related.


    The first idea you have for picking the right color is a grouped table view. This
    makes sense, since it’s similar to picking a ringtone in the sounds section of
    the Settings app. As you start drawing the interface, you quickly discover a problem:
    The UI gets cramped when you get more than four or five colors.


    Chapter 4: Design Tools: Building a Better Flashlight


    **117**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Technical design:**


    **Between Pictures**


    **and Code**


    You’d like to give the user a selection of about eight colors to choose from.
    When you play around with the one you have on paper, it becomes obvious that the
    preview will scroll out of view when you move toward the bottom of the list.


    So your next thought is to just have a single button that shows another list when
    you press it. But as you imagine the interaction on paper, this solution actual
    y makes the problem worse; the preview gets hidden and there’s a lot of wasted
    space.


    As you think about other possible controls for selecting the color, you remember
    *UIPickerView.* It would be perfect: It has a fixed size and can display an arbitrary
    number of items. The height of the picker view also gives you more room for the
    preview and sliders.


    A few minutes with paper saved you from writing a lot of code that would have
    been thrown away. And you now have two documents that you can use when discussing
    the interface with both your designer and marketing. Well done!


    The Drawing Board


    This flashlight is an admittedly simple application; the interface has only two
    screens.


    In more complex projects, you’ll have many more. Go back and look at the number
    of screens in Christian’s drawing at the beginning of the chapter, and you’ll
    have a new appreciation for the complexity in an application like Things. In spite
    of these intricacies, a methodical approach to the problem lets you come up with
    a solution that fits the users’ needs with consistency and without undo complexity.


    It’s important to keep in mind at this point that the design process is never
    complete.


    As you continue to talk to designers, marketing people, beta testers, and customers,
    the diagrams you just produced will change. Don’t be afraid to pull out the eraser
    and improve your design. Iteration isn’t just for coding!


    **Technical design: Between Pictures and Code**


    But for now, everyone on the team is happy with the design, so it’s time to start
    building it. Oh boy, you final y get to write some code! But not just yet.


    The final step in the iPhone app design process is to translate the visual design
    into a technical design. You’re going to be creating classes with methods as you
    work toward what you’ve put on paper. It’s a good idea to think about how these
    pieces are going to fit together in the Model-View-Controller (MVC) pattern that
    was mentioned in the previous chapter.


    If you neglect this important step, you’ll find that you end up rewriting a lot
    of code.


    You don’t need to write a 100-page specification that describes the technical
    needs in minute detail, but you do need to spend a little time planning where
    you’re headed.


    **118**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Technical design:**


    **Between Pictures**


    **and Code**


    Start Naming


    A good first step in this process is to start giving things names. You’ve probably
    already come up with some terminology as you’ve discussed the design with the
    other members of your team. It’s time to start codifying the pieces of your application.


    A *UIViewControl er* typical y manages a screenful of data in an iPhone app. Since
    you’re going to have two screens in your product, that’s a natural place to start
    naming things. The view with the light source is the first one that you see after
    launch, so you decide to call it the “main screen.” It would be fun to call the
    other view the


    “dimmer switch screen,” but you think better of it and call it the “settings screen.”


    Now it’s time to start thinking about the things you find on each screen and to
    give them names, too. This is when you start thinking of what you’re going to
    call your models, views, and controllers. As with your visual design, strive for
    simplicity and consistency.


    *First light*


    So what kinds of classes are going to be required for the main screen? You’ll
    need a view controller class to manage the contents of the screen. That controller
    wil , in turn, manage view classes for the information at the top of the window,
    the light source, and the toolbar. Call these views the “info view,” “light view,”
    and “toolbar.”


    You’ll also need a couple of models. One will manage and persist the current settings
    for the flashlight, so it makes sense to call it the “flashlight model.” It also
    seems like a good idea to put the emergency signal generator into its own “SOS
    model.”


    Overal , the classes will fit together as shown in Figure 4-7.


    This is also a good time to start thinking about the kinds of instance variables
    that each class is going to need. The view controller will have instance variables
    for each of the views and models (so that it can send messages to them). You’ll
    also need actions to respond to the button presses on the toolbar: *–toggleFlasher,*
    *–toggleDisco,*


    *–startSOS,* and *–showSettings.*


    You decide to have two types of messages in the info view: one for informational
    messages, the other for alerts. That *type* along with the *message* will be stored
    as instance data for the view.


    The light view will have a *state*: The il umination state can be on, off, or
    flashing. You also want to be able to control its *brightness* and *color,* so
    you’ll add properties for those to the view. A *delegate* instance variable will
    also let you report touch events back to the controller via the *–lightView:singleTapAtPoint:*
    and *–lightView:doubleTapAtPoint:* methods.


    Since you’re trying to simulate the physical behavior of a light bulb, it also
    makes sense to define how quickly the light reacts to changes. An *envelope* will
    let you change how quickly the light turns on (attack) and turns off (release).


    Chapter 4: Design Tools: Building a Better Flashlight


    **119**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


