- fmt: "# When the compiler warns about “Passing arguments” from a method\n\nWhen\
    \ the compiler warns about “Passing arguments” from a method, that’s your clue\
    \ that you have mismatched types in the message you’re sending to an object. If\
    \ you see a message about incompatible pointer types, make sure you’re using `*@\"\
    string\"*` instead of a standard C `*\"string\"*`. The “without a cast” warnings\
    \ are usually an indicator that you’ve used a primitive type instead of an object\
    \ (or vice versa).\n\nIf you ignore these warnings, you’ll still be able to run\
    \ your app, but it will crash as soon as these incompatible types are sent in\
    \ a message.\n\nNote that this is just a class definition, so there’s no mention\
    \ of where or how your string data is stored. Remember that you don’t really need\
    \ to know about the inner workings of an object. (You’ll learn to love this encapsulation\
    \ thing.) But you may be asking yourself, “What happened to that `–uppercaseString`\
    \ method I saw used on page 33?” That’s a good question, and it leads into another\
    \ powerful, and unique, feature of Objective-C: categories.\n\n## Categorically\
    \ Speaking\n\nOne of the problems with important classes—like the ones for handling\
    \ strings—is that they can grow quite large and unwieldy. Categories help avoid\
    \ this by breaking the class definition into pieces. In the case of `NSString`,\
    \ only the most basic functions are present in the main class definition. The\
    \ real meat of the class is in this category:\n\n```\n@interface NSString (NSStringExtensionMethods)\n\
    ```\n\nThere’s the `@interface` you saw earlier (page 35), followed by the class\
    \ name. It’s only when you get to the parentheses that things get interesting.\n\
    \nThe parenthesized name gives you a hint as to what’s going on here. This class\
    \ interface supplies methods that extend the previously defined `NSString`. It’s\
    \ adding functionality without cluttering up the basic definition of a string.\n\
    \n**Tip:** There’s an art to naming in Objective-C. It’s OK to be wordy, as with\
    \ the `NSStringExtensionMethods` category name. Just make sure the name is descriptive\
    \ enough that you can understand it without referring to documentation.\n\nThis\
    \ string category contains the following method definition:\n\n```\n- (NSString\
    \ *)uppercaseString;\n```\n\nThat’s the exact method you saw on page 33.\n\nBut\
    \ categories get even cooler. You can use them to extend classes that already\
    \ exist (and that you don’t even have the source code to). Imagine you need to\
    \ make all your strings *awesome.* You don’t really know what awesome means yet,\
    \ but you do know that you’ll need to do it often.\n\nYou start by defining your\
    \ own category like this:\n\n```\n@interface NSString (AwesomeMethods)\n\n- (NSString\
    \ *)awesomeString;\n\n@end\n```\n\nYou’re basing your category on the existing\
    \ class `NSString`, and you assign it a category name of `AwesomeMethods` by including\
    \ it between the parentheses.\n\nThe new class will have all the capabilities\
    \ of a normal `NSString`, but it will also respond to one additional message named\
    \ `–awesomeString`. But it gets even better: All other string objects in the system\
    \ will understand the new message. If you had implemented `–awesomeString` in\
    \ a subclass, you’d spend a lot of time refactoring your own code to use the new\
    \ implementation, and have issues with code out of your control (such as strings\
    \ returned by a Cocoa API). Categories are a powerful construct that lets you\
    \ extend the system without breaking what is already there.\n\nAll you need now\
    \ is some code to make those awesome strings.\n\n## Implementation: The Brains\
    \ Behind the Beauty\n\nFor every `@interface`, there’s an `@implementation`. The\
    \ easiest way to think about it is that `@interface`s are what your class looks\
    \ like from the outside, and the `@implementation` is what it looks like from\
    \ the inside.\n\n**Note:** So far, you’ve been looking at what goes in an interface\
    \ header file. These files, like in C, use the `.h` extension by convention. An\
    \ interface’s implementation goes in a `.m` file. Just remember that *M*ethods\
    \ go in a file that ends with the letter *M.*\n\nHere’s what the implementation\
    \ could look like:\n\n```\n@implementation NSString (AwesomeMethods)\n\n- (NSString\
    \ *)awesomeString {\n    NSString *awesome = [self uppercaseString];\n    if (!\
    \ [self hasSuffix:@\"!]) {\n        // ADD SOME IMPACT!!!\n        awesome = [awesome\
    \ stringByAppendingString:@\"!!!\"];\n    }\n    return awesome;\n}\n\n@end\n\
    ```\n\nBy now, you’re getting better at reading Objective-C code. You’ll see that\
    \ an awesome string is created using your old friend `–uppercaseString`. The `–hasSuffix:`\
    \ method checks to make sure that there’s at least one exclamation point at the\
    \ end. If not, the `–stringByAppendingString:` method adds the necessary impact.\
    \ But what does that `self` mean?\n\nEvery method implementation is passed a hidden\
    \ argument named `self` that references the object receiving the message. Since\
    \ your method is a part of the `NSString` class, `self` refers to an instance\
    \ of that class. (Yes, you’re talking to yourself in this method, and that’s OK.)\n\
    \n**Note:** C++, Java, and PHP all use `this` to provide this self-reference.\n\
    \nOnce you’ve implemented this category method, your code can call it like this:\n\
    \n```\nNSString *ordinaryString = @\"typing power\";\nNSString *excitingString\
    \ = [ordinaryString awesomeString];\n```\n\nThe `excitingString` object will have\
    \ the value “TYPING POWER!!!”.\n\nCategories also help you avoid repetition in\
    \ your own code. Suppose you do a lot of checking of strings to see if they’re\
    \ awesome. You’d be writing code like this over and over again:\n\n```\nNSString\
    \ *myString = @\"something\";\nif ([myString isEqualToString:[myString awesomeString]])\
    \ {\n    // sorry, but myString isn't awesome\n}\n\nNSString *myOtherString =\
    \ @\"SOMETHING ELSE!!!\";\nif ([myOtherString isEqualToString:[myOtherString awesomeString]])\
    \ {\n    // myOtherString, on the other hand, is truly awesome\n}\n```\n\nThat’s\
    \ a pain to type and a pain to read. So add this to your `NSString`’s category\
    \ interface:\n\n```\n@interface NSString (AwesomeMethods)\n\n- (NSString *)awesomeString;\n\
    - (BOOL)isAwesomeString;\n\n@end\n```\n\nAnd add this to its implementation:\n\
    \n```\n- (BOOL)isAwesomeString {\n    return [self isEqualToString:[self awesomeString]];\n\
    }\n```\n\nThis cleans up your checking code quite a bit:\n\n```\nNSString *myString\
    \ = @\"something\";\nif ([myString isAwesomeString]) {\n    // sorry, but myString\
    \ isn't awesome\n}\n\nNSString *myOtherString = @\"SOMETHING ELSE!!!\";\nif ([myOtherString\
    \ isAwesomeString]) {\n    // myOtherString, on the other hand, is truly awesome\n\
    }\n```\n\nIt’s also important to note that at this point you haven’t actually\
    \ created a new class. You’ve only extended code provided in a system framework\
    \ to suit your own needs.\n\nCocoa Touch is awesome; you just made it more awesome.\n\
    \n## Creating New Classes\n\nAs you can see, categories can accomplish a lot and\
    \ provide a great way to extend code that you didn’t write. But they have one\
    \ major limitation: You can’t add instance variables in your category definition.\
    \ And with the `NSString` class, how could you? The class interface tells you\
    \ nothing about how the string is stored.\n\nIt’s time to learn how to create\
    \ new classes and to extend the Cocoa hierarchy. And to see how that’s done, you’re\
    \ going to create a new class that lets you control the number of exclamation\
    \ points, as in the phrase “THIS IS GOING TO BE AWESOME!!!!!!!”\n\nThe first thing\
    \ to do is create an `@interface` for this new class:\n\n```\n@interface AwesomeStringMaker\
    \ : NSObject\n{\n    NSNumber *exclamationCount;\n    NSString *originalString;\n\
    }\n\n- (NSNumber *)exclamationCount;\n- (void)setExclamationCount:(NSNumber *)newExclamationCount;\n\
    - (NSString *)originalString;\n- (void)setOriginalString:(NSString *)newOriginalString;\n\
    \n@end\n```"
