    5.  **如果需要，请输入您的密码以便修改系统文件。**

    6.  **此时，最好也退出 iTunes，以避免出现暂停安装的对话框。**


    安装过程所需时间取决于您 Mac 的速度以及下载的大小，可能需要半小时到几个小时不等。当安装完成时，您会看到一个绿色的勾选标记，然后可以点击“关闭”完成操作。此时，您可以弹出
    iPhone SDK 磁盘，但请保留 `.dmg` 文件作为备份。


    > **注意：** 与 Xcode 一样，Apple 会定期更新 iPhone SDK。您需要定期返回 iPhone Dev Center 以安装最新版本的
    SDK。Apple 通常会与新的 iPhone 固件版本一起发布新版本的 SDK。


    ## SDK 的未来发展


    随着 Apple 修复错误和添加新功能，iPhone SDK 也在不断发展。您需要更新您的开发环境以跟上最新的变化。Apple 通过两种不同的方式更新 iPhone
    SDK。第一种，也是最简单的一种，是维护版本。这些版本仅修复固件中的错误，不会引入任何新功能。在大多数情况下，您无需对应用程序进行任何更改。


    Apple 在向客户提供固件更新的同一天，也会向开发者提供 SDK 的维护版本。这些版本使用三位数的版本号，例如 2.2.1 和 3.1.3。一旦您在设备上安装了新固件，就需要更新
    iPhone SDK，以便从 Xcode 安装和调试您的应用程序。如果不这样做，您将会看到工具不支持该设备固件版本的警告。


    当 Apple 对固件进行更实质性的更改（无论是添加新功能还是修改现有功能）而影响开发者软件时，它会在 iPhone Dev Center 上发布 iPhone
    SDK 的测试版。只有付费加入 iPhone Developer Program 的开发者才能访问这些预发布版本。（第 30 页介绍了如何注册此开发者计划。）这些测试版适用于主要版本，例如
    3.0 或 4.0，或 3.1 之类的修订版。Apple 通常会在公开发布前三到四个月开始测试版发布周期。一旦周期开始，它就会每隔几周发布一个新的 SDK（称为
    Beta 1、Beta 2，依此类推）。


    这些测试版通常还包含一个改进的、支持新 iPhone OS 的新版本 Xcode，以及新的固件。通过提前使用新版 SDK，您可以使用新的 iPhone 固件构建和运行您的应用程序。如果您一直小心地只使用有文档记录的
