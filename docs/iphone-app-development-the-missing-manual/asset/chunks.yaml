    \n那么，这些 `-retain`、`-release` 和 `-copy` 方法是如何管理内存的呢？\n\n内存中的每个对象都维护着一个计数器。这个计数器跟踪有多少其他对象正在使用该对象。当你想要使用一个对象时，必须告知该对象，以便它更新计数器，而你要做的就是发送\
    \ `-retain` 消息。\n\n发送该消息后，对象会更新其保留计数，并且该对象不会被删除。如果你想知道有多少其他对象持有对该对象的引用，可以向它发送\
    \ `-retainCount` 消息，它会返回计数器的当前值。对象初始分配时，其保留计数被设置为 `1`。\n\n现在你知道了如何让对象保留在内存中，接下来需要一种方法，在你用完它们后将其清除。这就是\
    \ `-release` 消息的作用。它的作用与 `-retain` 正好相反；它不是增加，而是*减少*保留计数。你是在告诉对象你不再需要它了。\n\n当你的应用在\
    \ Cocoa Touch 环境中运行时，系统会定期检查对象的保留计数。计数为零的对象不再被任何其他对象使用，因此系统可以删除它们并回收其内存。\n\n既然你已经熟悉了\
    \ retain 和 release 的机制，让我们更详细地看一下存取器：\n\n```objc\nif (exclamationCount != newExclamationCount)\
    \ {\n```\n\n这行代码是一个简单的性能优化。如果旧对象和新对象是同一个，就无需调整保留计数。\n\n**提示：** 这段代码比较的是指针地址，这是一种快速（且有效）检查两个对象是否相同的方法。事实上，`NSObject`\
    \ 的 `-isEqual` 方法也使用了同样的方法。（对于许多类，比如 `NSString`，检查相等性比检查指针要复杂得多。）\n\n首先要做的是通过发送\
    \ `-release` 消息，告诉旧的实例变量你不再需要它：\n\n```objc\n[exclamationCount release];\n```\n\
    \n现在你已经释放了实例变量，就无法保证该变量仍然有效。如果你尝试向 `exclamationCount` 发送更多消息，应用很可能会崩溃。因此，下一步是保留传入存取器的新对象。`retain`\
    \ 方法会返回自身，因此该返回值用于更新 `exclamationCount` 的实例变量。此时，再次向该对象发送消息就是安全的了：\n\n```objc\n\
    exclamationCount = [newExclamationCount retain];\n```\n\n`-retain` 消息的一种变体是 `-copy`\
    \ 消息。和 retain 一样，你会拥有对该对象的独有引用，该引用在你决定释放之前不会消失。区别在于，你持有的是原始对象数据的一个副本。\n\n这里有一个\
    \ `-copy` 派上用场的场景。对于 `originalString` 实例变量，你不希望使用 `-retain`，因为原始字符串可能被另一个对象修改。请记住，如果你与许多其他对象共享一个引用，并且其中一个对象修改了该字符串，那么当你调用\
    \ `-awesomeString` 时就会看到这个变化。\n"
- fmt: "You want to have your own unique copy of the string, so you use this instead:\
    \ `originalString = [newOriginalString copy];`\n\nIf another object modifies the\
    \ object pointed to by `newOriginalString`, you won’t be affected.\n\nTake a `nil`\
    \ Pill\n\nSometimes you want to clear out an instance variable completely. You\
    \ might want to save some memory and remove the object because you’re no longer\
    \ using it. Or you might be modeling some state within your application where\
    \ the absence of an object is important. You can clear the variable with a special\
    \ object called `nil`. If a variable referencing an object contains the value\
    \ `nil`, there’s no object.\n\n`nil` objects have an interesting behavior that\
    \ affects how you use them while managing memory. When you send a message to a\
    \ `nil` object, the message is ignored and a result of `nil` is returned. This\
    \ technique is commonly called a `nil` targeted message and it looks like this:\n\
    \n```\nNSString *missingString = nil;\n\nNSString *excitingString = [missingString\
    \ awesomeString];\n\n// excitingString has a value of nil, too\n```\n\nWhen you’re\
    \ writing accessors with `retain`, `copy`, and `release`, this feature lets memory\
    \ get cleaned up. To see how this works, replace `newExclamationCount` with `nil`,\
    \ and you have this code:\n\n```\nif (exclamationCount != nil) {\n    [exclamationCount\
    \ release];\n    exclamationCount = [nil retain];\n}\n```\n\nIf the current count\
    \ isn’t already `nil`, the object for `exclamationCount` is released. Then the\
    \ `nil` result of the `retain` message is used to set the new count.\n\n`nil`\
    \ targeted messages can also help prevent crashes in code that has failed some\
    \ kind of initialization. (Objects that fail to initialize properly are assigned\
    \ `nil` to show that they don’t exist.) You can also use `nil` objects to your\
    \ advantage for those cases where you want to manage a state. An example would\
    \ be a `middleName` instance variable in a view: If the value of the variable\
    \ is `nil`, you know that you don’t need to display a person’s middle name.\n\n\
    Some code will also take advantage of `nil`’s value: zero. In the case of the\
    \ `exclamationCount`, when it’s `nil`, the message for `unsignedIntValue` is ignored\
    \ and `nil` is returned: `NSInteger padding = [nil unsignedIntValue];`\n\n// padding\
    \ has a value of zero\n\nWith a padding of 0, no exclamation points will be used,\
    \ which seems like the right behavior when there’s no object for the instance\
    \ variable. On the other hand, if your code needs an object but one has not been\
    \ set, you’ll want to use something like this:\n\n```\nif (myObject) {\n    [myObject\
    \ doSomething];\n}\nelse {\n    NSLog(@\"Can't doSomething because myObject is\
    \ nil!\");\n}\n```\n\nAgain, this code relies on the fact that a `nil` object\
    \ has a value of zero. If there’s a value for the `myObject`, its nonzero value\
    \ will let the `doSomething` message be sent.\n\n**Tip:** `nil` objects can also\
    \ be a great source of head scratching. If you forget to initialize a variable,\
    \ you’ll wonder why an object instance isn’t doing what you expect when you send\
    \ it messages. The “aha” moment will come when you go into the debugger, display\
    \ the object, and see “Cannot access memory at address 0x0”. Your object’s value\
    \ is zero.\n\nAutorelease with Ease\n\nAutorelease has nothing to do with letting\
    \ go of your car. All of this retaining, copying, and releasing is a lot of cumbersome\
    \ programming when you’re dealing with temporary objects. Often, you’ll want to\
    \ keep an object around just long enough to do some work. For example, many objects\
    \ never exist outside of the scope of a method implementation.\n\nThe brilliant\
    \ and lazy programmers who came up with Objective-C have a work-around called\
    \ the `autorelease` method. To see how it works, first look at how the `myAwesomeStringMaker`\
    \ object is maintained:\n\n```\nAwesomeStringMaker *myAwesomeStringMaker = [[AwesomeStringMaker\
    \ alloc] init];\n\n// do some stuff with myAwesomeStringMaker\n\n[myAwesomeStringMaker\
    \ release];\n```\n\nThis code can be simplified by using the `autorelease` message:\n\
    \n```\nAwesomeStringMaker *myAwesomeStringMaker = [[[AwesomeStringMaker alloc]\
    \ init] autorelease];\n\n// do some stuff with myAwesomeStringMaker\n```\n\nAfter\
    \ the object has been allocated and initialized, it’s sent the `autorelease` message.\
    \ An object that’s been autoreleased is guaranteed to remain in memory for the\
    \ current method. After that, it will be deleted without your direct intervention.\n\
    \nThis phenomenon makes things much easier for you. In this example, `myAwesomeStringMaker`\
    \ is only needed for a short time, so autorelease does the object cleanup automatically.\
    \ If you’re doing a lot of things with `myAwesomeStringMaker` between allocating\
    \ the object and the end of the method, it’s easy to forget to send the message\
    \ to `release`.\n\nBecause other programmers are just as smart and lazy as you\
    \ are, many methods return autoreleased objects. The assumption is that you’re\
    \ probably not going to need that object for a long time, so it’s best to let\
    \ the system do the cleanup.\n\nBy convention, only methods that have `init` or\
    \ `copy` in their name return objects that aren’t autoreleased. If you use one\
    \ of these methods, you’ve got to pay attention to what’s happening with your\
    \ memory. See the box below for more detail.\n\n## Word To The Wise: Memorize\
    \ the rules\n\nLongtime Cocoa programmers will cite the following rules, originally\
    \ written by Don Yacktman, whenever you ask a question about how to manage memory:\n\
    \n- If you allocated, copied, or retained an object, then you’re responsible for\
    \ releasing the object with either `release` or `autorelease` when you no longer\
    \ need the object. If you did not allocate, copy, or retain an object, then you\
    \ should not release it.\n- When you receive an object (as the result of a method\
    \ call), it will normally remain valid until the end of your method, and the object\
    \ can be safely returned as a result of your method. If you need the object to\
    \ live longer than this—for example, if you plan to store it in an instance variable—then\
    \ you must either `retain` or `copy` the object.\n- Use `autorelease` rather than\
    \ `release` when you want to return an object but also wish to relinquish ownership\
    \ of the same. Use `release` wherever you can, for performance reasons.\n- Use\
    \ `retain` and `release` (or `autorelease`) when you want to prevent an object\
    \ from being destroyed as a side effect of the operations you’re performing.\n\
    \nManaging Memory\n\nProperties and Dots\n\nAs you get more advanced with your\
    \ Objective-C coding, you’ll find that you start to have a lot more accessors\
    \ in your classes. They’re another case of boring code that the lazy programmer\
    \ wants to avoid, especially all of the `retain` and `release` stuff that’s repeated\
    \ over and over. You can utilize another shortcut called *declared properties*.\n\
    \nThis language feature provides a simple way for you to specify, implement, and\
    \ use a class’s accessor methods.\n\nBoth the class interface and implementation\
    \ change when you’re using properties:\n\n```\n@interface AwesomeString : NSString\n\
    {\n    NSNumber *exclamationCount;\n    NSString *originalString;\n}\n\n@property\
    \ (nonatomic, retain) NSNumber *exclamationCount;\n@property (nonatomic, copy)\
    \ NSString *originalString;\n\n- (NSString *)awesomeString;\n\n@end\n```\n\nEach\
    \ property is configured using the attributes in parentheses. The `nonatomic`\
    \ attribute makes the accessor faster; you only need atomic properties when working\
    \ across multiple threads. The `retain` attribute causes the instance variable\
    \ to use the retain/release pattern during assignment. Likewise, the `copy` attribute\
    \ uses the copy/release pattern. You just got rid of two lines of code, but wait,\
    \ there’s more!"
