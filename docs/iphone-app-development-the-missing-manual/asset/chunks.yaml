- fmt: '***Tip:*** Working in `Illustrator` provides the most flexibility. Editing
    vector objects is generally easier than moving bitmap layers around. You’ll also
    future-proof your work by producing it in a format that’s readily scalable, and
    that’s handy when a print publication asks for some screenshots that are larger
    than `320 × 480` pixels!


    *A first impression*


    You’re also at a point where you can start thinking about the most important graphic
    in your application: the icon that appears on the home screen. This graphic is
    the first thing potential customers will see in `iTunes`, whether it’s in search
    results or being listed as one of the top-selling apps. Think of it like a business
    card: You want to make a good impression, so let a professional handle this illustration!


    **110**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Plan Before You Code**


    The human brain processes shapes and colors much more quickly than words. As you
    work through the design of your application icon, focus on a distinctive color
    palette with clearly defined shapes. Avoid complicated and cluttered designs.


    *How does it feel?*


    Remember how your first app seemed huge when you ran it in the `iPhone Simulator`?
    The same effect occurs when you’re working in `Photoshop`: The iPhone’s `320 ×
    480` display looks bigger than it really is. If you’re customizing user interface
    components, remember that your designer is working in an environment where the
    light is carefully controlled.


    Both these factors tend to skew the design toward something that’s appropriate
    for the desktop and not for a mobile device. That’s why it’s so important to expose
    your design to the real world.


    The easiest way to get a feel for the `Photoshop` mockups is to save the `320
    × 480` images and sync them to the built-in `Photos` app. Once you have the designs
    on the device and are carrying them around, it’s easy to open the app and look
    at them in different conditions like bright sunlight and fluorescent lighting.


    It’s also possible to verify control sizes and placement by placing your finger
    over the simulated interface elements. Watch out for content that gets obscured
    by your hand as you move your finger around. It’s also a good time to see how
    things feel for left-handed users and whether the design works well for one- or
    two-handed use.


    **Power Users’ Clinic: A Step Further**


    If you need to demonstrate your design to a larger audience, you’ll want to package
    it in a way that makes it easily accessible outside of your project group. Luckily,
    a new open source project called `Briefs` (*http://giveabrief.com*) lets you do
    just that.


    The `Briefs` application displays *scenes* with *actors.* The scenes are background
    images that you create using scans of your paper prototypes or flattened versions
    of the `Photoshop` mockups. Then, using an `XML` file, you define one or more
    areas that respond to touch. These areas are called actors and let you transition
    between scenes. Once all this information is compiled into a *brief* and loaded
    on an `iPhone`, your paper prototype comes to life in your hand.


    This obviously means more work to get it set up, but if you’re working on an elevator
    pitch for financing your idea, or need to do a presentation to your company’s
    CEO, a live demo can make or break your project. You’ll also find this is a great
    way to do some early usability testing.


    **Living in Harmony with Your Designer**


    Designers and developers have decidedly different mindsets and ways of working.


    The last step of the design process for you, the developer, is thinking about
    how you’re going to work with the designer to get the assets from their design
    tools into your development environment.


    Chapter 4: Design Tools: Building a Better Flashlight


    **111**


    ![Image 38](index-130_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Plan Before You Code**


    *Finding a common ground*


    It’s likely that your designer lives and breathes in `Photoshop`. Take a look
    at Figure 4-4. Designers know every nook and cranny of this madly complicated
    program and can do amazing stuff with it. Fortunately, you don’t need to go out
    and buy a copy of `Photoshop` to use their work. All you need to do is ask the
    designer to supply your graphics in the `PNG` file format. This standard format
    is easy to export from a layered `Photoshop` document, and you can use it directly
    in your `Xcode` project.


    ***Figure 4-4:*** *A graphic from the Iconfactory game AstroNut being created
    with `Photoshop`. To open this dialog box, use the `File` ➝ `Save for Web & Devices`
    menu. Make sure you’re using `PNG-24` (`PNG` file with 24-bit color) and `Transparency`
    (A). The screen size on the `iPhone` is `320 × 480` pixels, but you can set the
    image size to whatever is needed by the code (B).*


    If you need to edit the designer’s work after delivery, it’s usually just a matter
    of cropping or making other minor adjustments to the image. Many developers use
    a tool called `Acorn` (*http://flyingmeat.com/acorn/*) to do this simple cleanup.


    When you’re working with a designer’s mockup, it’s often necessary to measure
    various parts of the image to get the specified alignment right in `Interface
    Builder` or code. Is that button spacing `10` pixels or `11` pixels? What’s the
    background color for this view? For these types of measurements, the `Iconfactory`’s
    `xScope` tool is invaluable (*http://iconfactory.com/software/xscope*). This application
    provides a loupe, rulers, guides, and other tools that let you inspect and align
    screen graphics.


    *Give the designer control*


    For maximum efficiency, give designers direct access to your version control repository.
    A lot of tweaking tends to be involved with graphics built into a typical `iPhone`
    app. These constant changes can result in a lot of file transfers, test builds,
    emails, and other communication between the developer and designer.


    **112**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Feedback: Don’t Take Your Own Word for It**


    You can save yourself a lot of time if you teach the designer how to build your
    app and how to replace images using the version control system. As you both feel
    more comfortable with the arrangement, you might find the designer making changes
    to your `NIBs`. And after you’ve adjusted a `UIColor` definition for the hundredth
    time, you might even suggest that the designer modify your source code!


    ***Tip:*** Keep in mind that designers are typically visual thinkers. Their talents
    usually don’t include working directly at the command line for extended periods.
    If you’re going to provide the designer with access to your repository, you’ll
    want to use a tool like `Versions` (*http://versionsapp.com/*) that provides a
    graphical interface.


    **Feedback: Don’t Take Your Own Word for It**


    Now that you’re done learning some of the basics of the design process, it’s time
    to start thinking about what drives your decisions. The answer is both simple
    and complex. You’re building this product for people to use. Their feedback should
    be the most important factor in the design.


    **The Providers of Feedback**


    You’re probably thinking: “Dude, it’s simple. Feedback comes from customers!”


    Which is absolutely true. But customers come in many different forms.


    *You*


    You’re the most important customer. If you don’t use and love your own product,
    how will your customers? The product came about because you had an itch that needed
    scratching: You tripped in the dark one time too many. So now you have a flashlight
    on the phone in your pocket.


    At the same time, you’re the worst customer. You’re atypical because you know
    every single nuance of the product. People who are downloading your app from `iTunes`
    are not in that enviable position. But they’ll be quick to notice things that
    you’ve overlooked!


    *Your marketing department*'
