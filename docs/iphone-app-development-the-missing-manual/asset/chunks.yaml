    overridden. In some cases, it’s required: If you create a *UIView* class that
    draws its own content, you must override the *–drawRect* method to display the
    view. In other cases, overriding methods provides flexibility and customization.
    For example, with the


    *–layoutSubviews* method, an override lets you explicitly control the positioning
    of interface elements in a way that you can’t by using the default mechanisms.


    **loops: For Better or For worse**


    Looping with variables is probably one of the first programming concepts you learned.
    You’ll be happy to know that Objective-C has *for* loops—and the syntax is better
    than that of plain C.


    You’ll learn all about the *NSArray* class in the next chapter, but for the moment
    all you need to know is that it’s a class that manages zero or more objects. When
    you have more than one of something, it’s likely that you’ll want to loop over
    the contents at some point.


    You could use the good old *for* loop in standard C:


    NSArray *myArray = [NSArray arrayWithObjects:@″THIS″, @″IS″, @″AWESOME!!!″, nil];


    **NSUInteger count = [array count];**


    **NSUInteger i;**


    **for (i = 0; i < count; i++) {**


    **NSString *element = [myArray objectAtIndex:i];**


    if ([element isAwesomeString]) {


    NSLog(@″CONGRATULATIONS!!!!!!!!!″);


    }


    }


    But Objective-C has a construct called *fast enumeration* that saves a bunch of
    typing: NSArray *myArray = [NSArray arrayWithObjects:@″THIS″, @″is!″, @″AWESOME!!!!″,
    nil];


    **for (NSString *element in myArray) {**


    if ([element isAwesomeString]) {


    NSLog(@″CONGRATULATIONS!!!!!!!!!″);


    }


    }


