    \ the midpoint of a rectangle that has an even height, you’ll get a fractional\
    \ result. In cases like this, use the `floorf()` math function to clamp the result\
    \ as an integral value. In almost all cases, rectangle origins and sizes should\
    \ use integers even though they are defined as floating-point values.\n\n## Text\
    \ Drawing\n\nThe next thing to draw in the information view is the text of the\
    \ message. To match the style of the toolbar, the string will be drawn with a\
    \ 1-pixel shadow to give the appearance of it being etched into the curved surface\
    \ created by the gradient.\n\nBefore you can draw the text, you need to figure\
    \ out its size. To do this, you need the font it’s drawn with:\n\n```\nUIFont\
    \ *font = [UIFont systemFontOfSize:17.0f];\n```\n\nThis code gets you Helvetica\
    \ at 17 points. `UIFont` also has methods to get bold or italic versions of the\
    \ system font. You can also retrieve a font by name if you want to draw custom\
    \ text.\n\nOnce you have the font, you need to specify the area used to draw the\
    \ text. Since you want the message to fit into the width of the rectangle after\
    \ a 44-pixel margin for the icon, you define the size constraints like this:\n\
    \n```\nCGSize constrainedSize = CGSizeMake(rect.size.width - iconOffset, 9999.0f);\n\
    ```\n\nThe second parameter is a large value because you’re interested in the\
    \ computed height, so there’s effectively no constraint in that dimension. To\
    \ compute the height of the text, use a UIKit category for `NSString` that includes\
    \ the `-sizeWithFont:constrainedToSize:` method:\n\n```\nCGSize textSize = [self.message\
    \ sizeWithFont:font\n                         constrainedToSize:constrainedSize];\n\
    ```\n\nThis, in turn, is used to find a new rectangle that centers the text in\
    \ the height of the view:\n\n```\nCGRect textRect = CGRectMake(iconOffset,\n \
    \                   (CGRectGetMidY(rect) - (textSize.height / 2.0f)) - 1.0f,\n\
    \                    rect.size.width - iconOffset,\n                    textSize.height);\n\
    ```\n\nNow that the math is done, you can actually draw the text. If you’re paying\
    \ close attention, you might wonder why that `-1.0` appeared in the computation.\
    \ The reason is that you’re going to use a trick to draw the shadow for the text:\
    \ You draw it twice.\n\nThe first time it’s drawn, you use a dark color and offset\
    \ 1 pixel above the normal text.\n\n**180**\n\niPhone App Development: The Missing\
    \ Manual\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**Refine the Look**\n\
    \n***Tip:*** If you want to add a shadow to complex shapes or other kinds of drawing,\
    \ you can use the `CGContextSetShadow()` function with the current graphics context.\n\
    \n**Power Users’ Clinic**\n\n**Round Your Rects**\n\nPaths can also be used to\
    \ clip while drawing. A common use of this is to display round corners when drawing\
    \ images that have square corners.\n\nWith this technique, you construct a path\
    \ using lines connected by arcs at the corners:\n\n```\n#include <math.h> // for\
    \ M_PI\n\n#define MIN(A,B) ((A) < (B) ? (A) : (B))\n\nCGFloat DegreesToRadians(CGFloat\
    \ degrees)\n{\n    return degrees * M_PI / 180;\n}\n\nCGPathRef RoundedRectPath(CGRect\
    \ rect,\n                          CGFloat radius) {\n    CGMutablePathRef pathRef\
    \ =\n        CGPathCreateMutable();\n    radius = MIN(radius, 0.5f *\n       \
    \ MIN(CGRectGetWidth(rect),\n            CGRectGetHeight(rect)));\n    CGRect\
    \ insetRect = CGRectInset(rect,\n                                   radius, radius);\n\
    \    \n    // top-left corner\n    CGPathAddArc(pathRef, NULL,\n        CGRectGetMinX(insetRect),\n\
    \        CGRectGetMinY(insetRect), radius,\n        DegreesToRadians(180.0),\n\
    \        DegreesToRadians(270.0), false);\n    \n    // top-right corner\n   \
    \ CGPathAddArc(pathRef, NULL,\n        CGRectGetMaxX(insetRect),\n        CGRectGetMinY(insetRect),\
    \ radius,\n        DegreesToRadians(270.0),\n        DegreesToRadians(360.0),\
    \ false);\n    \n    // bottom-right corner\n    CGPathAddArc(pathRef, NULL,\n\
    \        CGRectGetMaxX(insetRect),\n        CGRectGetMaxY(insetRect), radius,\n\
    \        DegreesToRadians(0.0),\n        DegreesToRadians(90.0), false);\n   \
    \ \n    // bottom-left corner\n    CGPathAddArc(pathRef, NULL,\n        CGRectGetMinX(insetRect),\n\
    \        CGRectGetMaxY(insetRect), radius,\n        DegreesToRadians(90.0),\n\
    \        DegreesToRadians(180.0), false);\n    \n    CGPathCloseSubpath(pathRef);\n\
    \    return pathRef;\n}\n```\n\nAfter adding this path to the graphics context,\
    \ you can call `CGContextClip()`, and it will be used to mask while drawing the\
    \ image:\n\n```\nCGPathRef pathRef =\n    RoundedRectPath(rect, 8.0f);\nCGContextAddPath(context,\
    \ pathRef);\n```"
