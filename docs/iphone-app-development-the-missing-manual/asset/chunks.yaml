  trans: "\n你想要拥有字符串的独立副本，因此应该使用以下代码：`originalString = [newOriginalString copy];`\n\
    \n如果另一个对象修改了 `newOriginalString` 所指向的对象，你不会受到影响。\n\n**服用 `nil` 这颗药丸**\n\n有时你想彻底清空一个实例变量。可能是因为不再使用该对象，想要释放内存；或者你正在应用程序中建模某种状态，而对象的缺失本身具有意义。你可以使用一个名为\
    \ `nil` 的特殊对象来清空变量。如果一个引用对象的变量包含 `nil` 值，则表示没有对象。\n\n`nil` 对象具有一种有趣的行为，会影响你在管理内存时对它们的使用。当你向\
    \ `nil` 对象发送消息时，该消息会被忽略，并返回 `nil` 结果。这种技术通常被称为 `nil` 目标消息，如下所示：\n\n```\nNSString\
    \ *missingString = nil;\n\nNSString *excitingString = [missingString awesomeString];\n\
    \n// excitingString 的值也是 nil\n```\n\n当你在编写使用 `retain`、`copy` 和 `release` 的访问器时，这一特性可以帮助清理内存。要了解其工作原理，请将\
    \ `newExclamationCount` 替换为 `nil`，代码将变成：\n\n```\nif (exclamationCount != nil)\
    \ {\n    [exclamationCount release];\n    exclamationCount = [nil retain];\n}\n\
    ```\n\n如果当前计数值不是 `nil`，则会释放 `exclamationCount` 对象。然后，`retain` 消息返回的 `nil` 结果被用来设置新的计数值。\n\
    \n`nil` 目标消息还能帮助防止在初始化失败后的代码中发生崩溃。（初始化失败的对象会被赋值为 `nil`，以表示它们不存在。）当你想要管理某种状态时，也可以利用\
    \ `nil` 对象。例如，在一个视图中使用 `middleName` 实例变量：如果该变量的值是 `nil`，你就知道不需要显示一个人的中间名。\n\n\
    某些代码还会利用 `nil` 的数值：零。以 `exclamationCount` 为例，当它为 `nil` 时，`unsignedIntValue` 消息会被忽略，并返回\
    \ `nil`：`NSInteger padding = [nil unsignedIntValue];`\n\n// padding 的值是零\n\n当内边距为\
    \ 0 时，不会使用任何感叹号，这对于实例变量没有对象的情况来说似乎是一种合理的行为。另一方面，如果你的代码需要一个对象，但尚未设置，你应该使用类似下面的代码：\n\
    \n```\nif (myObject) {\n    [myObject doSomething];\n}\nelse {\n    NSLog(@\"\
    无法执行 doSomething，因为 myObject 是 nil！\");\n}\n```\n\n再次说明，这段代码依赖于 `nil` 对象值为零的事实。如果\
    \ `myObject` 有值，其非零值将允许发送 `doSomething` 消息。\n\n**提示：** `nil` 对象也可能是令人费解的根源。如果你忘记初始化一个变量，在向它发送消息时，你会疑惑为什么对象实例没有按预期工作。当你进入调试器、显示该对象并看到“无法访问地址\
    \ 0x0 的内存”时，顿悟的时刻就到了。你的对象值为零。\n\n**轻松使用 Autorelease**\n\nAutorelease 与松开你的汽车无关。在处理临时对象时，所有那些保留、复制和释放操作都是相当繁琐的编程工作。通常，你只需要对象存在足够长的时间来完成某些工作。例如，许多对象从不会超出方法实现的作用域。\n\
    \n那些聪明又懒惰的、提出 Objective-C 的程序员们想出了一个变通方法，叫做 `autorelease` 方法。要了解其工作原理，首先看看 `myAwesomeStringMaker`\
    \ 对象是如何管理的：\n\n```\nAwesomeStringMaker *myAwesomeStringMaker = [[AwesomeStringMaker\
    \ alloc] init];\n\n// 对 myAwesomeStringMaker 进行一些操作\n\n[myAwesomeStringMaker release];\n\
    ```\n\n这段代码可以通过使用 `autorelease` 消息来简化：\n\n```\nAwesomeStringMaker *myAwesomeStringMaker\
    \ = [[[AwesomeStringMaker alloc] init] autorelease];\n\n// 对 myAwesomeStringMaker\
    \ 进行一些操作\n```\n\n在对象被分配和初始化之后，它会收到 `autorelease` 消息。一个被自动释放的对象保证在当前方法执行期间保留在内存中。之后，它将在无需你直接干预的情况下被删除。\n\
    \n这一特性大大简化了你的工作。在这个例子中，`myAwesomeStringMaker` 只在短时间内需要，因此自动释放会自动清理对象。如果你在分配对象和方法结束之间对\
    \ `myAwesomeStringMaker` 进行了大量操作，很容易忘记发送 `release` 消息。\n\n由于其他程序员和你一样聪明又懒惰，许多方法返回的都是自动释放的对象。前提是你可能不会长时间需要该对象，因此最好让系统来进行清理。\n\
    \n按照惯例，只有名称中包含 `init` 或 `copy` 的方法才会返回非自动释放的对象。如果你使用了这些方法之一，就必须关注内存的情况。更多细节请参见下面的方框。\n\
    \n## 智者箴言：牢记规则\n\n长久以来使用 Cocoa 的程序员都会引用以下规则（最初由 Don Yacktman 编写），每当有人询问关于如何管理内存的问题时：\n\
    \n- 如果你分配、复制或保留了某个对象，那么你就有责任在不再需要该对象时，使用 `release` 或 `autorelease` 来释放它。如果你没有分配、复制或保留某个对象，那么就不应该释放它。\n\
    - 当你收到一个对象（作为方法调用的结果）时，它通常会在你的方法结束前保持有效，并且可以安全地作为方法的结果返回。如果你需要该对象的生存期更长——例如，你计划将其存储在一个实例变量中——那么你必须\
    \ `retain` 或 `copy` 该对象。\n- 当你想要返回一个对象但又希望放弃对其的所有权时，使用 `autorelease` 而非 `release`。出于性能考虑，在可以的情况下使用\
    \ `release`。\n- 当你想要防止一个对象因正在执行的操作的副作用而被销毁时，使用 `retain` 和 `release`（或 `autorelease`）。\n\
    \n**管理内存**\n\n**属性与点语法**\n\n随着你的 Objective-C 编码水平不断提高，你会发现类中的访问器开始变得非常多。它们是另一种无聊的代码，懒惰的程序员想要避免，尤其是那些一遍又一遍重复的\
    \ `retain` 和 `release` 内容。你可以利用另一种称为*声明属性*的捷径。\n\n这一语言特性提供了一种简单的方式来指定、实现和使用类的访问器方法。\n\
    \n当你使用属性时，类的接口和实现都会发生变化：\n\n```\n@interface AwesomeString : NSString\n{\n    NSNumber\
    \ *exclamationCount;\n    NSString *originalString;\n}\n\n@property (nonatomic,\
    \ retain) NSNumber *exclamationCount;\n@property (nonatomic, copy) NSString *originalString;\n\
    \n- (NSString *)awesomeString;\n\n@end\n```\n\n每个属性都使用括号内的属性进行配置。`nonatomic` 属性使访问器速度更快；只有在处理多线程时才需要原子属性。`retain`\
    \ 属性会导致实例变量在赋值期间使用 retain/release 模式。同样，`copy` 属性使用 copy/release 模式。你刚刚删除了两行代码，但等等，还有更多好处！\n"
- fmt: "# Implementation\n\nIn the implementation, you can replace the `exclamationCount`\
    \ and `setExclamationCount` methods with one line of code. And you can replace\
    \ the `originalString` and `setOriginalString` with a second line of code:\n\n\
    ```\n@implementation AwesomeString\n\n@synthesize exclamationCount;\n@synthesize\
    \ originalString;\n\n. . .\n```\n\nThe `synthesize` shortcut causes the compiler\
    \ to generate the code necessary to access your instance variables. The code in\
    \ the `@implementation` is generated according to the `@property` definition in\
    \ the `@interface`. You may get tired of typing all those `@` symbols, but those\
    \ `@synthesize` statements saved you from writing 19 lines of code.\n\nWith a\
    \ larger class, the savings in lines of code will be even more impressive.\n\n\
    ---\n\n# Methods of Class\n\nOnce you’ve defined properties for your class, you\
    \ may want to access them using *dot notation.* This notation lets you access\
    \ the instance variables without using the square brackets. Finally, some relief\
    \ for the C++ and Java coders amongst us! For many developers this code will be\
    \ much more readable:\n\n```\nAwesomeStringMaker *myAwesomeStringMaker = [[[AwesomeStringMaker\
    \ alloc] init] autorelease];\n\n// use dot notation to set a property's value.\
    \ . .\nmyAwesomeStringMaker.exclamationCount = [NSNumber numberWithFloat:8.0];\n\
    myAwesomeStringMaker.originalString = @\"typing power\";\n\nNSString *myAwesomeString\
    \ = [myAwesomeStringMaker awesomeString];\n\n// or use dot notation to read a\
    \ property\nif ([myAwesomeStringMaker.exclamationCount integerValue] < 4) {\n\
    \    // that's not awesome enough\n    myAwesomeStringMaker.exclamationCount =\
    \ [NSNumber numberWithFloat:8.0];\n}\n```\n\nA property on the left side of the\
    \ equals sign will use the setter. The same property on the right side will use\
    \ the getter.\n\n## Methods of Class\n\nEarlier, you might have been a little\
    \ confused by this code:\n\n```\n[NSString stringWithUTF8String:\"Even\"]\n```\n\
    \nWith all the talk of sending messages to object instances, now you’re not using\
    \ one.\nWhere the heck is that message going?\n\nTo begin answering that question,\
    \ take a look at the definition in the `NSString` interface:\n\n```\n+ (id)stringWithUTF8String:(const\
    \ char *)bytes;\n```\n\nYep, it’s another wacky character courtesy of Objective-C.\
    \ This time it’s a plus sign (`+`).\n\nOn page 37, you saw that methods were defined\
    \ with a minus sign at the beginning.\nBut those are just *instance* methods.\
    \ *Class* methods are another kind.\n\nWith instance methods, you need a variable\
    \ that references the object instance before you can send the message. Sometimes\
    \ this is a limitation in your class design: You’d like to make a method available\
    \ without an object instance. Class methods are Objective-C’s solution to this\
    \ problem. With these methods, you send messages directly to the class without\
    \ needing an actual object.\n\nThese class methods are often used to create new\
    \ object instances. The `+stringWithUTF8String:` method is just such a case; sending\
    \ the message to the class lets it return a new object for you to use in your\
    \ code.\n\n## Initializing Objects\n\n> **Note:** You may be familiar with using\
    \ *factory* objects. That’s exactly what sending a message to the class does.\
    \ The `+stringWithUTF8String:` message acted as a factory for a new instance of\
    \ `NSString`.\n\nSo what could make your `AwesomeStringMaker` class more awesome?\
    \ A class method that returns the `mostAwesomeString`:\n\n```\n@interface AwesomeStringMaker\
    \ : NSObject\n. . .\n+ (NSString *)mostAwesomeString;\n@end\n```\n\nYour implementation\
    \ would look like this:\n\n```\n@implementation AwesomeStringMaker\n. . .\n+ (NSString\
    \ *)mostAwesomeString {\n    return @\"CHOCKLOCK!!!!!!!!\";\n}\n@end\n```\n\n\
    Now you don’t even have to think when you need to make your app a lot more awesome:\n\
    \n```\n[label setTitle:[AwesomeStringMaker mostAwesomeString]];\n```\n\n## Initializing\
    \ Objects\n\nYour `AwesomeStringMaker` class has a bug. Hard to imagine, isn’t\
    \ it?\n\n```\nAwesomeStringMaker *myAwesomeStringMaker = [[[AwesomeStringMaker\
    \ alloc] init] autorelease];\nmyAwesomeStringMaker.originalString = @\"typing\
    \ power\";\nNSString *myAwesomeString = [myAwesomeStringMaker awesomeString];\n\
    ```\n\nThe value for `myAwesomeString` is “TYPING POWER”. It’s missing some awesome\
    \ exclamation points!!!!! That’s because when a new instance of an object is created,\
    \ all instance data is cleared out. Pointers are set to `nil` values and numbers\
    \ are set to zero. This means your `exclamationCount` instance variable is zero.\
    \ And you can’t be awesome with zero exclamation points.\n\nThis situation illustrates\
    \ a larger problem: Your objects usually need to be set up before you can send\
    \ them messages. With Objective-C, there’s a method for just that:\n\n```\n- (id)init\
    \ {\n    if (self = [super init]) {\n        // WHY USE A LITTLE WHEN YOU CAN\
    \ USE A LOT\n        exclamationCount = [[NSNumber numberWithInt:8] retain];\n\
    \        originalString = [@\"\" copy];\n    }\n    return self;\n}\n```\n\nThat\
    \ code may look convoluted, but what it does is simple and elegant: After every\
    \ object is allocated in memory, the new instance is sent the `-init` message.\
    \ You can choose to ignore the message, but it’s more likely that you won’t.\n\
    \n> **Note:** You may be wondering why every object gets sent the `-init` message.\
    \ It’s because the default implementation is in `NSObject`, and every object is\
    \ a descendent of this root class. If you don’t implement the method, it will\
    \ be handled by superclasses, including `NSObject`.\n\nWhen your object gets the\
    \ message, it assigns the result of sending `-init` to the parent object (represented\
    \ by the implicit variable `super`) to the variable `self`. So what’s all that\
    \ about?\n\nJust like your class needed to do some initialization, your parent\
    \ class may need to do some. You don’t know exactly what that setup is, but now\
    \ is the only opportunity for any classes between you and `NSObject` to get their\
    \ houses in order.\n\nOnce you’ve given everyone else a chance to get set up,\
    \ you check the result of the assignment to `self`. It’s possible that one of\
    \ the superclasses wasn’t able to initialize itself, so it returned `nil`. If\
    \ that’s the case, you’ll skip your initialization and return `nil`, too.\n\n\
    Assuming that everything went fine with your superclasses, you’ll get your chance\
    \ to set the `exclamationCount` to a whopping 8 characters.\n\n### Deallocation\
    \ Location\n\nThere’s still a pretty serious bug in your code. You went to all\
    \ the work of retaining, copying, and releasing your accessors. But what happens\
    \ when the whole object is released? Unless you called each accessor and set a\
    \ `nil` value, the memory used by instance variables will never be freed.\n\n\
    As you implement classes, it’s your responsibility to clean up after yourself\
    \ as objects of that class are released. The way you do this is with a `-dealloc`\
    \ method. Just as `-init` let you get things set up, the `-dealloc` method lets\
    \ you tear things down. Here’s what that method should look like for your `AwesomeStringMaker`\
    \ class:\n\n```\n- (void)dealloc {\n    [exclamationCount release];\n    [originalString\
    \ release];\n    [super dealloc];\n}\n```\n\nFirst, both of your instance variables\
    \ are released so that memory can be reclaimed.\nThen the `-dealloc` message is\
    \ forwarded to the superclass so it can do its own cleanup.\n\n### Manual Override\n\
    \nYou may have noticed that `-init` and `-dealloc` were never defined in your\
    \ `@interface`. That’s because it’s not necessary; as a descendent of `NSObject`,\
    \ the method has already been declared. Your own implementations of these methods\
    \ merely “override” those defined in the superclasses."
