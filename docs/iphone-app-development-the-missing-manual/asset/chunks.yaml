    Learn by Crashing


    It may seem odd that a chapter that’s explaining a programming language includes
    a section on using the debugger. But think about the last time you learned a new
    language: You had plenty of bugs, because everything was new and you were doing
    things a more experienced developer would avoid.


    Xcode has a powerful debugger built-in; it’s based on *gdb* from the GNU development
    tools. Like with the Objective-C compiler, some extensions to the debugger make
    it compatible with objects and the runtime architecture.


    When you run your code, you can do so with or without breakpoints enabled.


    Xcode’s toolbar has a button that toggles your breakpoints: You can also choose
    Run➝Debug➝Breakpoints On (or press ⌘-Option-Y) to launch your app with them enabled.


    Once you have breakpoints enabled, you can set new ones in a couple of ways:


    • When you click in the left gutter of your source code, a blue arrow will appear
    (Figure 2-1). The arrow signifies that a breakpoint is set and that your application
    will stop when it’s reached. If you click the arrow again, it becomes dimmed and
    disabled. You can also Control- or right-click the arrow to get a context menu
    with other options.


    • All of the current breakpoints are displayed when you choose Run➝


    Show➝Breakpoints (or press ⌘-Option-B). You can add a breakpoint to the list that’s
    displayed by double-clicking the last line and entering the symbolic name.


    You’ll need to use this method when you want to set a breakpoint where you don’t
    have the source code (for example, in the Cocoa Touch frameworks). You can also
    remove a breakpoint in this window by selecting it and pressing Delete.


    When setting breakpoints manual y, you can use a function name such as *objc_*


    *exception_throw,* and the debugger will halt before it’s executed. But since
    you’re new to Objective-C, it’s more likely that you’ll want to break at a class
    method. Here’s some special syntax to set these types of breakpoints:


    • To stop at an instance method, use the form *–[ClassName methodName:].* For
    example, to stop in *NSArray*’s *–objectAtIndex:* method, you’d use – *[NSArray*
    *objectAtIndex:].* (Make sure to remember the semicolons when specifying the name,
    or the breakpoint won’t fire.)


