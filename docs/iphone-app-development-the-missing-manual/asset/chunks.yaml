    \ `NSObject`）处理。\n\n当你的对象收到该消息时，它会将向父对象（由隐式变量 `super` 表示）发送 `-init` 消息的结果赋值给变量\
    \ `self`。这又是怎么回事呢？\n\n就像你的类需要进行一些初始化工作一样，你的父类也可能需要做一些。你并不确切知道那些设置是什么，但现在是你与 `NSObject`\
    \ 之间的所有类进行初始化的唯一机会。\n\n在给了所有其他类完成设置的机会后，你检查赋值给 `self` 的结果。有可能某个超类无法初始化自身，从而返回了\
    \ `nil`。如果是这种情况，你也会跳过自己的初始化并返回 `nil`。\n\n假设超类一切顺利，你将有机会把 `exclamationCount` 设置为惊人的\
    \ 8 个字符。\n\n### 释放位置\n\n你的代码中仍然存在一个相当严重的 bug。你费尽心思地进行了保留、复制和释放访问器的工作。但当整个对象被释放时会发生什么？除非你调用了每个访问器并将值设置为\
    \ `nil`，否则实例变量使用的内存将永远不会被释放。\n\n在实现类时，你有责任在类的对象被释放时清理自己。要做到这一点，你需要使用 `-dealloc`\
    \ 方法。就像 `-init` 让你进行设置一样，`-dealloc` 方法则让你进行拆除工作。以下是你的 `AwesomeStringMaker` 类中该方法应有的样子：\n\
    \n```\n- (void)dealloc {\n    [exclamationCount release];\n    [originalString\
    \ release];\n    [super dealloc];\n}\n```\n\n首先，释放你的两个实例变量，以便可以回收它们占用的内存。\n然后，将\
    \ `-dealloc` 消息转发给超类，让它执行自己的清理工作。\n\n### 手动重写\n\n你可能已经注意到，`-init` 和 `-dealloc`\
    \ 从未在你的 `@interface` 中定义过。这是因为没有必要；作为 `NSObject` 的后代，这个方法已经被声明过了。你自己对这两个方法的实现只是“重写”了在超类中定义的那些方法。\n"
- fmt: "# 类文档指南\n\n类文档会给出关于哪些方法可以被重写的指导。在某些情况下，这是必需的：如果你创建了一个绘制自身内容的`UIView`类，必须重写`-drawRect`方法来显示该视图。在其他情况下，重写方法提供了灵活性和自定义能力。例如，通过`-layoutSubviews`方法，重写可以让你显式地控制界面元素的位置，这是使用默认机制无法实现的。\n\
    \n## 循环：好与坏\n\n使用变量进行循环可能是你最早学习的编程概念之一。你会很高兴地知道，Objective-C 有`for`循环——而且其语法比纯\
    \ C 更好。\n\n你将在下一章全面了解`NSArray`类，但目前你只需要知道它是一个管理零个或多个对象的类。当你有多个对象时，很可能你需要在某个时候遍历它们的内容。\n\
    \n你可以使用标准 C 中的老式`for`循环：\n\n```\nNSArray *myArray = [NSArray arrayWithObjects:@\"\
    THIS\", @\"IS\", @\"AWESOME!!!\", nil];\nNSUInteger count = [array count];\nNSUInteger\
    \ i;\nfor (i = 0; i < count; i++) {\n    NSString *element = [myArray objectAtIndex:i];\n\
    \    if ([element isAwesomeString]) {\n        NSLog(@\"CONGRATULATIONS!!!!!!!!!\"\
    );\n    }\n}\n```\n\n但 Objective-C 有一种叫做**快速枚举**的构造，可以省去大量输入：\n\n```\nNSArray\
    \ *myArray = [NSArray arrayWithObjects:@\"THIS\", @\"is!\", @\"AWESOME!!!!\",\
    \ nil];\nfor (NSString *element in myArray) {\n    if ([element isAwesomeString])\
    \ {\n        NSLog(@\"CONGRATULATIONS!!!!!!!!!\");\n    }\n}\n```\n\n更重要的，这种枚举形式由运行时优化，消除了循环不变式引入错误的可能性。\n\
    \n这是另一个聪明而简洁的代码示例——更简单、更安全、更快。\n\n## 你的异常代码\n\n作为开发者，你知道事情并不总是按计划进行。不符合预期的代码是你生活中源源不断的“乐趣”。幸运的是，Objective-C\
    \ 提供了编译器指令来帮助你处理代码块中的异常：\n\n- 使用`@try`标记可能抛出异常的代码。\n- `@catch()`用于指定异常发生时运行的代码。如果需要处理不同类型的异常，可以使用多个块。\n\
    - 如果你有无论是否发生异常都需要运行的代码，可以使用`@finally`。\n\n以下是使用所有三个指令的示例：\n\n```\nNSArray *myArray\
    \ = [NSArray array]; // 一个没有元素的数组\n\n@try {\n    // 数组为空，所以这一行会失败：\n    [myArray\
    \ objectAtIndex:0];\n}\n@catch (NSException *exception) {\n    NSLog(@\"name =\
    \ %@, reason = %@\", [exception name], [exception reason]);\n}\n@finally {\n \
    \   NSLog(@\"Glad that's over with...\");\n}\n```\n\n这将在控制台日志中生成以下输出：\n\n```\n\
    name = NSRangeException, reason = *** -[NSCFArray objectAtIndex:]: index (0) beyond\
    \ bounds (0)\nGlad that's over with...\n```\n\n如果你没有捕获异常，你的应用程序会退出，并将用户突然送回 iPhone\
    \ 的主屏幕。捕获异常是一件好事。\n\n当你的代码需要生成一个异常时，使用`NSException`类。假设你遇到了一个不够“awesome”的字符串，你可以像这样抛出一个异常：\n\
    \n```\n[[NSException exceptionWithName:@\"AwesomeException\" reason:@\"Not awesome\
    \ enough\" userInfo:nil] raise];\n```\n\n你可以使用`userInfo`参数，如果你需要随异常提供一些额外信息（例如，有问题的字符串）。\n\
    \n**提示：** 在调试时，在即将抛出异常之前设置断点通常很有帮助。这样，你可以在错误发生的位置看到堆栈跟踪。在`objc_exception_`处添加一个断点。"
