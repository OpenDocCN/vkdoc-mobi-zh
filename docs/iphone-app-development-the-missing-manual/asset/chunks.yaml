    When you’re using property lists, it’s important to use only the following classes:
    *NSArray, NSDictionary, NSString, NSData, NSDate,* and *NSNumber* (integer, floating-point,
    and Boolean values). Any hierarchy of these objects can be stored in the file.
    An array of dictionaries containing numbers, strings, and dates is completely
