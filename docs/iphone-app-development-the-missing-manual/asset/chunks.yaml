- fmt: '# The Missing Credits


    ## Technical Reviewers


    **Matt Drance** (technical reviewer) is the owner of Bookhouse Software, where
    he builds iPhone apps for himself and for clients. Before founding Bookhouse,
    Matt spent eight years in Apple Evangelism and DTS, working closely with hundreds
    of third-party developers to build many of the iPhone apps you use today. He happily
    lives, works, and races cars in Northern California.


    **Tina Spargo** (technical reviewer), her husband (and professional musician)
    Ed, their preschooler Max, their two silly Spaniels, Parker (Clumber), and Piper
    (Sussex), all share time and space in their suburban Boston home. Tina juggles
    being an at-home mom with promoting and marketing Ed’s musical projects and freelancing
    as a virtual assistant. Tina has over 20 years’ experience supporting top-level
    executives in a variety of industries. Website: *www.tinaspargo.com*.


    **Jan Jue** (copy editor) enjoys freelance copyediting, a good mystery, and the
    search for the perfect potsticker. Email: *juepub@sbcglobal.net*.


    **Angela Howard** (indexer) has been indexing for over 10 years, mostly for computer
    books, but occasionally for books on other topics such as travel, alternative
    medicine, and leopard geckos. She lives in California with her husband, daughter,
    and two cats.


    ## Acknowledgements


    First, I must thank my fellow factory workers for allowing me the time to write
    this book. Dave, Ged, Corey, Talos, Cheryl, Kate, Sean, David, Louie, Anthony,
    Mindy, and Travis, I feel honored to have you all as colleagues.


    I also want to thank Lucas Newman for providing the inspiration with Lights Off
    and for teaching me how to break out of jail. All the talented people at Apple
    deserve recognition, too. Without their hard work, none of this would be happening.


    The enthusiasm of my good friends, Kim and Mirella Poindexter, got me excited
    about the project and Jeffrey Zeldman deserves credit for explaining why seven
    long months of hard labor was a good idea. Along the way, Matt Drance and Tina
    Spargo kept me honest and taught me new things. The erudite Nan Barber made me
    look smarter than I really am.


    Of course, none of this would have happened without Bill and Mary Jay Hockenberry,
    who let me be creative even if it meant a trip to the emergency room. Thanks to
    my brother Kevin and sister-in-law Chris, for the constant reminder that normal
    people use software. And last, but in no way least, heartfelt gratitude goes to
    Lauren Mayes for her love, opinions, sense of humor and interpretive dance.


    ## The Missing Manual Series


    Missing Manuals are witty, superbly written guides to computer products that don’t
    come with printed manuals (which is just about all of them). Each book features
    a handcrafted index; cross-references to specific pages (not just chapters); and
    Rep-Kover, a detached-spine binding that lets the book lie perfectly flat without
    the assistance of weights or cinder blocks.


