    **Make It Official**


    **4\. In the lower-right corner of the page, click `Submit`.**


    You should see a message that the “Certificate Request has been submitted for
    approval.” The status of the certificate will also be “Pending Approval”.


    **5\. You need to approve your own request, so click the `Approve` button in the
    `Action` column.**


    The status column now says “Pending Issuance”.


    ***Note:*** When you’re using a company account, an admin will need to approve
    your certificate request. The admin user also has the ability to add new members
    to a Team.


    **6\. It normally takes less than a minute to issue the certificate, so refresh
    the page after a short wait, and you should see the status listed as Issued. Click
    the `Download` button in the `Action` column.**


    Your new certificate will be downloaded. You should see a `developer_identity.cer`
    file in your Downloads folder.


    **7\. Double-click this file and you’re prompted to confirm the addition of this
    new certificate. Make sure the `Keychain` pop-up menu is set to “login” and then
    click `Add`.**


    At this point, your keychain has been set up correctly. You should see it in Keychain
    Access, as shown in Figure 5-7.


    ***Figure 5-7:*** *When you’re finished with the keychain setup, you’ll see something
    similar to what’s displayed here. You’ll see your own name after “iPhone Developer”
    and as the private key, not “Craig Hockenberry”.*


    The key icon in front of your name is particularly important: If it’s missing,
    you won’t be able to sign code. If you don’t see the icon, you’ll need to start
    over and submit a new certificate request.


    Chapter 5: Getting Serious about Development


    **141**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Make It Official**


    It’s also important to make sure that the certificate is loaded into the default
    keychain (shown in bold type). In the figure, it’s “login” and selected for viewing.
    Try reloading the certificate if it’s not in the right place.


    *Provisions*


    Congratulations, you’re halfway toward being able to run your own applications
    on an iPhone! With your keychain in working order, all that remains is creating
    a provisioning profile that specifies which devices can run your code.


    **Identity crisis.** If you tried to build your project right now, you’d see an
    error along the lines of “Code Sign error: a valid provisioning profile matching
    the application’s identifier `''com.iconfactory.SafetyLight''` could not be found.”


    As you learned on page 137, the provisioning profile is a file that associates
    code signing certificates, application identifiers, and devices. When these three
    pieces of information are in agreement, you can build and run the application.


    So your job now is to start gathering these pieces of information with Xcode and
    submitting them to the Provisioning Portal.


    **The new shiny.** The first order of business is to determine which devices are
    going to be used for your development. These devices can be any of the iPhone
    or iPod touch models.


    ***Tip:*** You’ll find that you want to have multiple devices for your own testing.
    The performance characteristics of a first-generation iPod touch are very different
    from those of the current generation. Likewise, older devices don’t have the same
    features as newer ones: Examples are the GPS that wasn’t included on the first-generation
    iPhone and the compass that’s available only on the iPhone 3GS. You’ll want to
    test that your application works correctly when these capabilities aren’t present.


    With a Standard developer account, you’re given 100 devices to use for testing.
    This limit includes devices you use for your internal testing as well as the hardware
    that your beta testers will be running.


    It’s important to note that this is a cumulative number: You can’t remove one
    device and replace it with another. Once you enter the unique identifier in the
    Provisioning Portal, you’re stuck with it for the remainder of your yearlong enrollment.
    That’s an important point because the hardware typically gets updated several
    times each year, and when it does, many of your testers will want to provision
    their shiny new device.


    If all of your devices are assigned to the iPhone 3G, you wouldn’t be able to
    develop and test the 3GS model when it’s released.


    **142**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Make It Official**


    ***Tip:*** iPhones are typically updated in the summer around the time of Apple’s
    annual Worldwide Developer Conference (WWDC). New iPods, including the touch models,
    are usually introduced in the early fall, just before the holiday buying season.


    You’ll also find that many testers need to change their device identifier throughout
    the year. When a tester’s phone is lost, stolen, or broken, you want to be able
    to add their replacement to the provisioning profile. The bottom line is that
    you need to be stingy with devices. Never allocate all of them, and always leave
    yourself some padding for new and replacement hardware.


    **Find the Device Identifier.** The first step in adding a new device is to determine
    the Unique Device Identifier (UDID). Each iPhone and iPod touch has a 40-character
    hexadecimal string that’s unlike any other.


    ***Note:*** Many applications use this UDID for their own purposes. For example,
    if you need to uniquely identify a request to a web service, you can call the
    `–uniqueIdentifier` method in the `UIDevice` class and pass the result to the
    network.


    From Xcode, the easiest way to get a UDID is to plug in the device and open the
    Organizer (`Window`➝`Organizer`). When asked if you want to use this device for
    development, answer in the affirmative.


    ***Tip:*** You’ll frequently use the Organizer window, so learn the keyboard shortcut
    `Control-⌘-O`.


    Once the window is open, select the device in the source list, and the Summary
    tab appears. If you see a message saying “device could not support development”,
    unplug your phone, restart it, and try again. You can copy the summary’s Identifier
    text to the Clipboard, as shown in Figure 5-8.


    Your testers won’t be able to get their UDID from Xcode, but they can do the same
    thing with iTunes once they learn a little trick. After selecting the device,
    you can click the Serial Number in the summary, and it turns into the identifier.
    Pressing `⌘-C` (on the Mac) or `Ctrl-C` (on Windows) copies the displayed value
    to the Clipboard.


    ***Tip:*** Another good way to collect device identifiers is with Erica Sadun’s
    free `AdHocHelper` app. Your testers can install this simple application from
    the App Store and run it to automatically send the UDID in an email message.


    Chapter 5: Getting Serious about Development


    **143**


    ![Image 49](index-162_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Make It Official**


    ***Figure 5-8:*** *In the Xcode Organizer’s source list, you can gather information
    from your test devices in the Devices section. Here, the Unique Device Identifier
    is being copied.*


    **Add the device.** The next step is to add the device identifiers you’ve collected:


    **1\. On the Provisioning Portal web page, click `Devices` in the left column.**


    The Devices screen shows the current number of devices you have left to register.


    **2\. Click `Add Devices` to add your new device.**


    The next screen has two input fields, one for the device name and another for
    its ID.


    **3\. Select any name you’d like, and enter the UDID that you want associated
    to it.**


    ***Tip:*** You can make your life easier if you follow some simple naming conventions
    for device IDs, especially when the list gets long.'
