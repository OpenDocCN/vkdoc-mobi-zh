- fmt: '# So now that you''re armed with a design and a plan of attack, it''s finally
    time to open Xcode and start implementing your ideas. Now is when the fun begins!


    ## Chapter 5: Getting Serious about Development


    ### Getting Serious about Development


    With your design documents in hand, you''re ready to crack open a text editor
    and get to work! Chapter 1 gave you a quick introduction to the Xcode development
    environment. You''re now going to dig into some of the details of your project
    file and see how to configure it for your own needs.


    You''ll also learn how to set up your work area so you can install your application
    on an iPhone. It''s a complicated process—the configuration involves digital certificates
    and an Apple website that produces files that let your app run—but this chapter''s
    step-by-step instructions will get you through it.


    Throughout this chapter and the next, you''ll see references to a project called
    Flashlight Pro. You''ll want to have it handy as a reference. If you haven''t
    downloaded it from the Missing CD page yet (`www.missingmanuals.com/cds`), now
    would be a good time.


    ### Beyond the Template


    Every project starts out with one of the templates that you saw on page 18. By
    nature, these templates are generic, but your project is unique. So you''ll start
    by changing code and configuration files to suit your product''s needs.


    In this section, you''ll become familiar with the basic settings in a working
    project and start to think about how to approach your new flashlight''s development.


    You''re anxious to start coding, but you also know that there''s always some setup
    required when you start using new software, especially if it''s your first project
    in Xcode!


    ### Beyond the Template


    #### Pick Your SDK


    One of the first decisions you have to make is which version of the iPhone SDK
    you''re going to code for. Different versions have distinct capabilities because
    of the underlying firmware in the iPhone''s version of OS X.


    Generally, it''s a good idea to pick the oldest SDK version that has the features
    you need to implement your product. If you choose the latest and greatest, you
    won''t be able to sell to people who haven''t upgraded their OS in a while. Although
    the upgrade process is easy, many customers are slow to adopt new versions.


    From a development point of view, the biggest changes to the iPhone APIs come
    when a major version update occurs. An example is when the 2.2.1 firmware was
    upgraded to version 3.0. The new version introduced hundreds of new features,
    including copy and paste, voice memos, MMS support, and many others. The 3.1 update
    brought only a handful of new features.


    When Apple inevitably announces the 4.0 firmware, it''ll undoubtedly include many
    great new features. When that happens, Cocoa Touch likely will provide new APIs
    (page 15) for you to use in your application. So even if, like most developers,
    you decide to target 3.0 now, don''t be surprised when you want to follow your
    customers and change your target to the next major release.


    ***Note:*** *API* stands for "application programming interface." Both Apple and
    developers use this as an all-encompassing term for the classes and methods available
    in the SDK.


    With each new release of the iPhone software, an "API Diffs" document is published
    that lists additions and changes to classes and methods you can include in your
    app. You can use the documentation viewer to find and check the list.


    #### Change Project Settings


    After you''ve chosen which version of the iPhone firmware you want to write for,
    you need to configure your project file with that information. To do so, make
    sure your Xcode project is open, and then view the settings with `Project` ➝ `Edit
    Project Settings`.'
