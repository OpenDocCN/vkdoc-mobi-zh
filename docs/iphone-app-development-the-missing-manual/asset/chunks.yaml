    **115**


    ![Image 39](index-134_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Bigger, Stronger,**


    **Faster**


    The Light Side


    The main view for the app is straightforward. The light source is predominant,
    and you’ll need control mechanisms at the bottom of the screen for the various
    modes and settings access, as shown in Figure 4-5.


    ***Figure 4-5:***


    *A paper prototype for the main screen of your new flashlight* *application. The
    screen is broken into three areas: an information view, a light source, and a
    control area for switching* *modes.*


    The control area lets the user start the flasher, “disco mode,” and the SOS rescue
    signal. The settings icon will flip the view, much like the built-in Weather and
    Stocks applications.


    You’re leaning toward using a toolbar to hold these controls at the bottom of
    the screen.


    A tab bar control is better suited to switching between views in an application—the
    app has only one view. The toolbar also has the advantage in that you can make
    it translucent, letting part of the underlying light source shine through.


    ***Note:*** *UITabBar* is best used in applications that need to switch between
    views with different operational modes. Apple’s use of the tab bar in the iPod
    and YouTube apps lets users pick different views of music and video collections.
    Users can also reconfigure tab bars to display preferred sets of information.


    On the other hand, *UIToolbar* is appropriate for actions that work within a single
    context. A toolbar button lets the user act on the information in the view.


    When designing your UI, think carefully about which of these control mechanisms
    is right for your application.


    **116**


    iPhone App Development: The Missing Manual


    ![Image 40](index-135_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Bigger, Stronger,**


    **Faster**


    When switching modes, it’s a good idea to give the user some feedback, so you
    decide to put an information view at the top of the screen. It would be nice to
    hide the information when possible, since it reduces the il umination produced
    by the light source.


    So now you’re feeling pretty good about the main view, but things are about to
    get more difficult with the settings interface. You have more controls to deal
    with, and they introduce some subtle interaction problems.


    The Flip Side


    Luckily, you’ve learned to use paper prototypes as a way to work through these
    issues.


    Sketching your screens, as shown in Figure 4-6, helps you identify trouble spots.


