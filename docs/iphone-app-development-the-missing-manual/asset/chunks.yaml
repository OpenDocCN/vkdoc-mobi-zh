    the document. Meanwhile, in the document window, you see the word “View” with
    no disclosure triangle next to it (Figure 3-3). That indicates that the *UIView*
    object does not have any children, or subviews. You’re about to change that.


    ***Tip:*** If you accidentally close the View window, you can reopen it by double-clicking
    View in the document window.


    *Your first view*


    That gray window looks pretty boring, doesn’t it? Time to start adding new views
    for the labels, slider, and button!


    **1\. Choose Tools**➝**Library. If you’re the kind of developer who loves the
    keyboard, use the** ⌘**-Shift-L shortcut.**


    The Library palette opens.


    **86**


    iPhone App Development: The Missing Manual


    ![Image 24](index-105_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Targets and Actions**


    ***Figure 3-3:***


    *Here’s the blank*


    *palette you’re going*


    *to work with. The*


    *document window is*


    *on the left, and the*


    *application’s only view*


    *is on the right. Note*


    *that the View listed*


    *in the document*


    *window doesn’t have*


    *any children*


    *(subviews) yet.*


    **2\. Scroll the list of Objects in the Library, and select the cell with the
    text “Label”.**


    It should be in the first row of “Cocoa Touch—Inputs & Values”. When you select
    the cel , you’ll see a short description of the control and its function at the
    bottom of the palette.


    **3\. Using your mouse, drag the Label cell onto the gray View window.**


    See Figure 3-4 for a demonstration. When you’re dragging over the View window,
    a green plus sign appears, which indicates that the object will be added when
    you drop it.


    **4\. When your cursor is over the View window, let go of the mouse button.**


    The label drops onto the view, and four resize handles indicate that it’s selected.


    **5\. Double-click Label and type** *VOLUME NOB.*


    **Behind the scenes, you just replaced a line of code:


    [label setTitle:@″VOLUME NOB″];


    **6\. Drag the left and right resize handles until the dashed blue lines appear.**


    The edges of the label snap to the lines, helping you align your controls.'
  trans: "\n最后，由于 NIB 加载器在将输出口对象存入内存后仍保留了它们，你需要在视图控制器中完成最后一步：在视图控制器被释放时释放这些视图：\n\n\
    ```\n- (void)dealloc {\n    [mySlider release]; mySlider = nil;\n    [myButton\
    \ release]; myButton = nil;\n    [myLabel release]; myLabel = nil;\n    [super\
    \ dealloc];\n}\n```\n\n现在，你已经掌握了 NIB/XIB 文件背后的神奇原理，可以准备好看看它们是如何创建的了！\n\n**第 3\
    \ 章：Cocoa Touch：让 Objective-C 发挥作用**\n\n**85**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 目标和动作\n\n### 用户界面：简易之道\n\n乍一看，这份逐步指南可能并不简单。别担心，一旦你掌握了工作流程，使用 Interface Builder\
    \ 创建对象并连接它们就是小菜一碟。现在就开始吧！\n\n*抢占先机*\n\n从 Missing CD 页面 *www.missingmanuals.com/cds*\
    \ 下载 `HitMaker—Start` 项目。该项目包含了你在练习中将要使用的所有动作和目标的代码。首先，你需要启动 Xcode 和 Interface\
    \ Builder，并打开文件进行编辑：\n\n**1.** 打开 `HitMaker` ➝ `Start` 项目文件夹中的 `HitMaker.xcodeproj`\
    \ 文件。\n\nXcode 启动并显示项目内容。\n\n**2.** 打开展开三角形以获取文件列表。\n\nXIB 文件位于 Resources 组中。\n\
    \n**3.** 双击 `HitMakerViewController.xib`，用 Interface Builder 打开 XIB 文件。\n\n当文件加载时，你的\
    \ Dock 中会出现一个带有绘图三角形的新图标。\n\n文档文件打开后，你会看到文件中包含的对象列表。\n\n***提示：*** 文档名称会出现在标题栏和“窗口”菜单中。同时打开多个\
    \ NIB 文件是常见操作，因此请使用这些工具来找到正确的文档。\n\n你还会看到一个灰色的视图窗口。这是文档中包含的视图对象的预览。同时，在文档窗口中，你会看到“View”字样，旁边没有展开三角形（图\
    \ 3-3）。这表明 `UIView` 对象没有任何子视图或子层。你即将改变这一点。\n\n***提示：*** 如果你不小心关闭了视图窗口，可以双击文档窗口中的“View”重新打开。\n\
    \n### 你的第一个视图\n\n那个灰色窗口看起来很无趣，是吧？是时候开始为标签、滑块和按钮添加新视图了！\n\n**1.** 选择“工具” ➝ “库”。如果你是喜欢用键盘的开发者，可以使用快捷键\
    \ ⌘-Shift-L。\n\n库面板打开。\n\n**86**\n\niPhone 应用开发：缺失手册\n\n![图片 24](img/index-105_1.jpg)\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**目标和动作**\n\n***图 3-3：***\
    \ *这是你将使用的空白面板。左侧是文档窗口，右侧是应用唯一的视图。请注意，文档窗口中列出的 View 目前还没有任何子视图。*\n\n**2.** 滚动库中的对象列表，选择带有“Label”文本的单元格。\n\
    \n它应该位于“Cocoa Touch—Inputs & Values”的第一行。当你选中该单元格时，面板底部会显示该控件的简短描述及其功能。\n\n**3.**\
    \ 使用鼠标，将 Label 单元格拖到灰色的 View 窗口上。\n\n图 3-4 演示了此操作。当你拖过 View 窗口时，会出现一个绿色加号，表示当你放下时对象将被添加。\n\
    \n**4.** 当光标位于 View 窗口上方时，松开鼠标按钮。\n\n标签便放置在了视图上，四个调整大小的手柄表示它已被选中。\n\n**5.** 双击\
    \ Label 并输入 `VOLUME NOB`。\n\n在幕后，你刚刚替换了一行代码：\n\n```\n[label setTitle:@\"VOLUME\
    \ NOB\"];\n```\n\n**6.** 向左和向右拖动调整大小手柄，直到出现蓝色虚线。\n\n标签的边缘会与这些线对齐，帮助你对齐控件。\n"
- fmt: "***Tip:*** If you want to see the layout rectangles in View, press `⌘-L` to\
    \ display the bounds. If you press Option while the label is selected, you’ll\
    \ see the number of pixels between various interface elements.\n\n## Chapter 3:\
    \ Cocoa Touch: Putting Objective-C to Work\n\n**87**\n\n![Image 25](index-106_1.jpg)\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### Targets and Actions\n\
    \n***Figure 3-4:***  \n*On the left side, you see the Library palette with the\
    \ Label control selected. You can drag any item in the Library to create a new\
    \ instance of the object. Here, the Label is being dragged onto the View window.*\n\
    \n**7.** Make sure the label is still selected, and choose **Tools ➝ Attributes\
    \ Inspector** or press `⌘-1`. In the Attributes Inspector’s Layout section, click\
    \ the **Alignment (center)**.\n\nYou’ve just replaced another line of code:\n\n\
    ```\n[label setTextAlignment:UITextAlignmentCenter]\n```\n\n**8.** With the label\
    \ selected, choose **Font ➝ Bold** (`⌘-B`). If you want to go really crazy, press\
    \ `⌘-I` to make it italic, too.\n\n*Che bel ezza!* But even more beautiful is\
    \ this code you didn’t have to write:\n\n```\n[label setFont:[UIFont boldSystemFontOfSize:17.0f];\n\
    ```\n\n**88**\n\niPhone App Development: The Missing Manual\n\n![Image 26](index-107_1.jpg)\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### Targets and Actions\n\
    \nAs shown in Figure 3-5, the document window now shows a disclosure triangle\
    \ for View. When you click it, you see the name is Label (VOLUME NOB) with a type\
    \ of `UILabel`.\n\n***Figure 3-5:***  \n*Once you add a `UILabel` containing the\
    \ text VOLUME NOB, it appears under the main `UIView` for the window. When you\
    \ double-click a view in the document window, it gets selected and displays resize\
    \ handles—helpful when you’re looking for a subview in a complex user interface.*\n\
    \nCongratulations! You just added your first subview to the hierarchy.\n\n*You’re\
    \ in control*\n\nYou have your first object. But it’s just a label, and you’re\
    \ not using it in your code.\n\nTime to remedy that with a control:\n\n**1.**\
    \ Just below the Label in the Library palette, you’ll see an icon that looks like\
    \ a slider. Drag it onto the gray window.\n\nA slider control appears, with resize\
    \ handles on the left and right. Some controls can’t adjust their width or height—the\
    \ slider is one of them.\n\n**2.** Drag the slider so it’s below the VOLUME NOB\
    \ label.\n\nThe dashed blue lines help you center things.\n\n**3.** Drag the handles\
    \ until they snap onto the dashed blue lines.\n\nYou’ve created an object that\
    \ you can use for the `mySlider` instance variable. All that’s left to do is to\
    \ hook it up to an outlet:\n\n**1.** In the document window, select File’s Owner.\n\
    \nThe type is `HitMakerViewControler`. That’s the same as the class you’re writing!\n\
    \nChapter 3: Cocoa Touch: Putting Objective-C to Work\n\n**89**\n\n![Image 27](index-108_1.jpg)\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### Targets and Actions\n\
    \n**2.** Choose **Tools ➝ Inspector** and then select the second tab at the top\
    \ (a blue circle with white arrow pointing right). Or just press `⌘-2` as a shortcut\
    \ to select this Connections Inspector tab.\n\nYou see `myButton`, `myLabel`,\
    \ and `mySlider`. Thanks to the `IBOutlet` identifiers you added to your source\
    \ code, those show up automatically.\n\n***Tip:*** To prove this to yourself,\
    \ open `HitMakerViewController.h` and remove the `IBOutlet` before `UILabel myLabel`\
    \ and save the file. When you return, the outlet won’t appear in the inspector\
    \ for File’s Owner.\n\nAfter you’re done with this experiment, put the `IBOutlet`\
    \ back; you’ll need it in the following steps.\n\n**3.** To link the outlet to\
    \ the view, click the circle to the right of `mySlider` and drag the mouse.\n\n\
    A blue line appears that lets you know you’re connecting to an object.\n\n**4.**\
    \ Continue dragging the mouse until you’re hovering over the slider control. When\
    \ a blue box appears around the slider, release the mouse button and you’re done.\n\
    \nIn your list of outlets for File’s Owner, `mySlider` is connected to a Horizontal\
    \ Slider (Figure 3-6). Yay!"
