    **Show Your id**


    Even though *id* is nothing more than a pointer to a block of memory, you should
    never use a *void* pointer in its place. The compiler is able to perform additional
    checks and optimize code because the *id* lets it know that the variable points
    to an object.


    The *id* type is also used as a way to avoid casting between classes. Some classes
    need to manage objects without knowing anything about the type of data. A good
    example of this is col ections and other object containers. If objects in a col
    ection were specified with a pointer to an *NSObject,* you’d have to cast to a
    subclass each time you retrieved an object from the col ection. For lazy programmers,
    that’s a lot of work.'
