    and terminology used in this style of programming: *http://en.wikipedia.org/wiki/Object-oriented_programming*.


    *Objects* are chunks of memory that contain code and data for your application.
    One of the main tenets of object-oriented design is that your application should
    know as little as possible about the inner workings of an object. Terms like *encapsulation*
    and *data abstraction* describe this behavior.'
  trans: "\n已经选好你喜欢的颜色了吗？是时候通过点击“背景颜色选取器”来更改窗口的背景颜色了。然后在色轮（图 1-14）中为光线挑选一个舒适的颜色，例如，一种柔和的黄色调。\n\
    \n当你选择颜色时，窗口预览会立即更新。随着 UI 的开发，你会非常喜欢这种快速反馈：无需构建应用就能看到更改效果，这能节省大量时间。\n\n选择“文件”➝“保存”来更新你的\
    \ `MainWindow.xib` 文件。养成在调整 UI 后保存的习惯，并记住，如果更改未生效，请检查文档关闭框中的“已修改”圆点。你最不想发生的事情就是因为忘记保存文件而浪费时间调试用户界面错误。\n\
    \n现在，切换回手电筒的 Xcode 项目窗口，选择“构建”➝“构建并运行”。\n\n**注意：** 如果你看到一个弹出窗口，提示“停止可执行文件”，只需点击“确定”。Xcode\
    \ 只是在提醒你，模拟器中已经有一个应用程序在运行。\n\n第 1 章：构建你的第一个 iPhone 应用\n\n**27**\n\n![Image 20](img/index-46_1.jpg)\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**探索你的新工具**\n\n**图 1-14：**\
    \ 更改应用程序窗口的背景颜色需要点击色轮。在 `MainWindow.xib` 文档中选择窗口 (A) 后，查看属性 (B)，其中包含背景颜色。点击颜色井\
    \ (C) 会打开一个色轮 (D)，你可以用鼠标选择新颜色。当你选择新颜色时，会立即得到反馈。\n\n你已经制作了你的第一个 iPhone 应用，并根据自己的品味进行了定制。做得好！\n\
    \n现在旅程已经完成，接下来请继续阅读，了解你在此过程中看到的一些细节。\n\n**28**\n\niPhone 应用开发：缺失的手册\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# 方括号的力量\n\n你已经看到了构建 iPhone 应用是多么简单：这并不是什么高深莫测的学问。\n\n或者，它确实是？\n\n苹果公司出色地创建了你用于构建\
    \ iPhone 应用的工具，但如果你想成为一名大师级的工匠，你需要对这些新工具有更多了解。本章的第一部分将带你开始探索：你将了解用于创建应用的 Objective-C\
    \ 语言的基础知识。\n\n此外，还有一个蓬勃发展的开发者社区致力于 iPhone 开发。你将学习在遇到编码问题时去哪里寻求帮助，如何跟上 iPhone 中不断发展的技术，以及在哪里下载免费的示例代码用于你自己的应用开发。\n\
    \n**注意：** Objective-C 有很多需要学习的地方。如果你现在拿着的这本书深入介绍了这种语言，那它可能要重上好几磅。相反，本章将涵盖你在 iPhone\
    \ 开发中最可能遇到的主题。\n\n在本章结束时，你将看到一些关于去哪里寻找更多信息的建议。\n\n当你掌握了这门语言的基本部分后，你将快速了解 Xcode\
    \ 中内置的文档查看器。知道如何快速有效地查找信息将有助于你轻松进入这个新平台。\n\n**29**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Objective-C：iPhone 应用的螺丝与螺母\n\n在本节中，你将探索用于编写 iPhone 应用程序的语言：Objective-C。本章不会教你如何编程，而是向你展示这门语言与你可能用过的其他语言之间的差异。\n\
    \n你还将遇到 Objective-C 独有的特性。\n\n### 方括号的世界\n\n在你创建手电筒时，你可能注意到了这行代码：\n\n```\n[window\
    \ makeKeyAndVisible];\n```\n\n如果你曾用 Java、C 或 JavaScript 编程，这些方括号可能会让你摸不着头脑。你不是第一个有这种反应的开发者！\n\
    \n那么这些奇怪的方括号是干什么用的呢？在回答这个问题之前，先看看这门语言的名字——结尾的 *C*。你看，这门全新的语言实际上是基于一门旧语言：1972 年丹尼斯·里奇在贝尔电话实验室开发的\
    \ C 语言。与 Java 和 JavaScript 一样，Objective-C 的创建者在许多程序员熟悉的基础上构建了新的东西。一旦你学会了一些技巧，这门语言也会很快变得熟悉起来（有关\
    \ Objective-C 与其他 C 语言关系的更多信息，请参见下面的框）。\n\n**内幕：C 语言加特性**\n\nObjective-C 是 C 语言语法的超集。你在本章中看到的所有内容都是使用\
    \ GNU C/C++ 编译器构建的。\n\n当源文件使用 `.m` 而不是 `.c` 时，会进行额外的文件处理（在概念上类似于使用预处理器）。这一步将你的代码连接到一个支持\
    \ Objective-C 特性的小型运行时。类和对象只是 C 结构体；运行时让它们通过内省和消息传递进行通信。\n\n由于整个基础设施基于标准 C，因此很容易将开源库和遗留代码与你的\
    \ Objective-C 应用程序混合使用。开始使用这门新语言时，你不必放弃你珍视的 C/C++ 源代码。\n\n话虽如此，许多开发者发现这个面向对象的环境非常令人上瘾。将\
    \ Objective-C 用作包装器，使开源库更易于使用，这种情况相当常见。一个很好的例子是正则表达式：Cocoa Touch 本身不支持它们。多亏了 John\
    \ Engelhart 的工作，RegexKit 框架（`http://regexkit.sourceforge.net/`）使得 Perl 兼容正则表达式\
    \ (PCRE) 可以与你的字符串对象一起愉快地使用。\n\n当你熟悉了这门新语言的语法和感觉后，你将在第 60 页的框中探索如何使用标准的 C 习惯用法来实现它。\n\
    \n**30**\n\niPhone 应用开发：缺失的手册\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 一切皆对象\n\n看看下面的 Objective-C 代码。你会立即对你在其他语言中使用过的熟悉表达式和控制结构感到自在：\n\n```\nint\
    \ i;\nfor (i = 0; i < 10; i++) {\n    // 检查偶数和奇数值\n    if ((i % 2) == 0)\n   \
    \     [label setTitle:@″Even″];\n    else\n        [label setTitle:@″Odd″];\n\
    }\n```\n\n在这个简单示例中，很容易看出你正在一个执行 10 次的循环中检查偶数和奇数值。\n\n这门语言名字的第一部分暗示了那些括号的用途：*Objective*\
    \ 告诉你，你在处理对象。而这些方括号让你与这些对象进行通信。在第一个示例中，你在与一个 *window* 对象通信。第二个示例则与一个 *label* 对象交互。\n\
    \n所以现在你可能会想，“太好了，但什么是对象？” Objective-C 是计算机科学家所称的*面向对象*语言。在开发你的 iPhone 应用程序时，你将进行面向对象编程。\n\
    \n**提示：** 如果你是面向对象编程的新手，请花点时间阅读维基百科上关于此主题的页面。概述和历史将帮助你快速了解这种编程风格中使用的设计动机和术语：`http://en.wikipedia.org/wiki/Object-oriented_programming`。\n\
    \n*对象*是包含应用程序代码和数据的内存块。面向对象设计的主要原则之一是，你的应用程序应尽可能少地了解对象的内部工作机制。像*封装*和*数据抽象*这样的术语描述了这种行为。\n"
- fmt: 'An object should be like a black box. In fact, it may be helpful for you to
    use those square brackets as a visual reminder: `[]` looks a lot like a box.


    As soon as you turn on your iPhone, thousands of objects are created in memory.
    Thousands more are added as soon as you launch your own application. You’ll often
    hear *instance* used to describe each of these objects. With so many instances
    floating around, you’ll need variables to keep track of the important ones.


    ## The Object of It All


    ### Telling Your Objects to Do Things


    The variables that reference objects let you change an object’s behavior or state.
    You do this by sending a *message* to the object. In the Cocoa documentation,
    the object that’s getting the message is often referred to as the *receiver*.


    ***Note:*** You’ll also see the term *target* used to represent the object that’s
    getting the message. The message itself is sometimes called an *action*, since
    messages often cause things to happen. You’ll see these terms often when dealing
    with user interfaces (in Interface Builder).


    For the *window* object shown at the beginning of this section, you sent a message
    to `-makeKeyAndVisible`. In essence, the message is telling the window to make
    itself visible onscreen. Your “label” variable was sent the message `-setTitle:`
    along with a variable; it’s being instructed to change its title to a new value.
    Don’t worry about the action that takes place—your main focus right now is to
    understand how actions are initiated using messages.


    As you get used to this new programming syntax, the square brackets remind you
    that you’re communicating with a black box. The first word specifies the object
    that’s receiving the messages, and the remaining words supply any other parameters
    that are needed. Here are some examples:


    ```

    [myBlackBox messageWithNoParameters];

    [myBlackBox messageWithFirstParameter:one andSecondParameter:two];

    ```


    ***Note:*** If you’re coming from a background in another object-oriented language,
    such as C++ or Java, sending messages is functionally equivalent to this:


    ```

    myBlackBox->functionWithNoParameters();

    myBlackBox->functionWithParameters(one, two);

    ```


    or this:


    ```

    myBlackBox.functionWithNoParameters();

    myBlackBox.functionWithParameters(one, two);

    ```


    The big difference is that the messages you send to objects can be generated at
    runtime as well as when your app is compiled. Similarly, object methods can be
    modified while your code is running. Objective-C is a dynamic language, so you
    can change the behavior of your objects at any time.


    Each of these messages is handled by a *method* defined by the object. A method
    uses a unique signature that lets Objective-C route your message and any parameters
    to the right code for execution. You’ll find that many method signatures are quite
    readable in your code: It’s a little more typing, but you’ll end up with code
    that’s easier to understand.


    ## Masses of Classes


    Some methods return values. Earlier, you saw the `setTitle:` method change a label’s
    title. There’s a corresponding method called `title` that lets you query the object
    for the current value. For example:


    ```

    NSString *labelTitle = [label title];

    ```


    You’re now thinking outside the black box. But what the heck is that `NSString`
    thing?


    It’s a variable definition. Just like any variable definition in C, the `labelTitle`
    variable is a pointer (because of the asterisk) to a class called `NSString`.
    That’s great, but what’s a class? Read on.


    ### Masses of Classes (Continued)


    Every object in Objective-C belongs to a *class*, because that’s where behavior
    and internal data are specified. A class is where the methods (code) are defined
    and implemented. It’s also where you define what instance variables (data) are
    managed by the class.


    `NSString` is a class that provides a rich set of methods for storing and manipulating
    text. The `NS` in the name means it’s a part of a system foundation framework
    in Cocoa Touch.


    ***Note:*** Frameworks are collections of classes and other resources you can
    add to your application. You’ll learn all about the Cocoa Touch framework that
    supplies all the interesting classes, like `NSString`, in the next chapter.


    Also, since Objective-C lacks namespaces, frameworks typically use a two-character
    prefix to prevent class name collisions. Foundation classes, which were originally
    written for NeXTSTEP, use `NS`. The user interface classes in Cocoa Touch use
    `UI`. Some developers use their own prefix for class names to avoid these types
    of conflicts. For example, the Iconfactory uses `IF` for all classes that are
    shared among projects.


    Therefore, `labelTitle` points to an instance of a string object that’s defined
    by the system. Because you have this object pointer in a variable, you can send
    messages to it. For example, you can send the `uppercaseString` message to your
    `labelTitle`, and it will return a new string object that contains all the lowercase
    letters converted to uppercase letters:


    ```

    NSString *moreAwesomeLabelTitle = [labelTitle uppercaseString];

    ```


    And that `moreAwesomeLabelTitle` variable, in turn, can be used to update the
    title on the original label:


    ```

    [label setTitle:moreAwesomeLabelTitle];

    ```


    ***Tip:*** Nesting objects and their messages can be an effective way to shorten
    your code and reduce the number of temporary variables. You can collapse these
    three lines of code:


    ```

    NSString *labelTitle = [label title];

    NSString *moreAwesomeLabelTitle = [labelTitle uppercaseString];

    [label setTitle:moreAwesomeLabelTitle];

    ```


    into a single line of code by using this technique:


    ```

    [label setTitle:[[label title] uppercaseString]];

    ```


    Just make sure to balance the brackets correctly or the compiler will complain!


    You might have wondered earlier what the `@"Even"` and `@"Odd"` parameters were
    for in the `setTitle:` method on the label object. Good catch! Since strings are
    used a lot in programming, the creators of Objective-C defined a shortcut for
    these text objects. Without the shortcut, `@"Even"` would need to be instantiated
    using:


    ```

    [NSString stringWithUTF8String:″Even″]

    ```


    That’s a lot more typing. And the best programmers are the lazy ones. Welcome
    to the club!


    ### Classes in Detail


    At this point, it should be pretty obvious that classes are really important in
    Objective-C. They act as building blocks for your application, and they let you
    avoid writing a lot of boring code. It’s not hard to envision how an `uppercaseString`
    method would be implemented, but it’s even better to not think about it at all
    and to just let the system handle the work.


    Classes are defined in header files that are included in your source code. System-level
    classes, like `NSString`, get incorporated by default. Take a look at the top
    of the `FlashlightAppDelegate.h` file that was created automatically for you in
    the last chapter:


    ```

    #import <UIKit/UIKit.h>

    ```


    That one line of code pulls in the class definitions for the entire system. The
    preprocessor begins by loading the classes for developing Cocoa Touch user interfaces
    (`UIKit`). These classes, in turn, load foundation classes for managing data and
    the core graphics classes for drawing.


    ***Note:*** For you experienced C programmers, note that there’s a subtle difference
    between `#include` and `#import`: The preprocessor will keep track of imports
    and not include them more than once. This technique makes it much easier to avoid
    multiple definitions!


    What do these header files for classes look like? Here’s a part of the class definition
    for `NSString` taken from the `NSString.h` header file:'
