    ***提示：*** 在 `Illustrator` 中工作能提供最大的灵活性。编辑矢量对象通常比移动位图层更容易。此外，通过以易于缩放且便于印刷出版物的格式（例如需要大于
    `320 × 480` 像素的截图）制作作品，你还能为未来做好准备。


    *第一印象*


    此时，你已开始考虑应用中最重要的图形：主屏幕上的图标。无论潜在客户是在 `iTunes` 的搜索结果中看到该图标，还是它被列为畅销应用之一，这幅图形都是他们第一眼看到的东西。可以把它想象成一张名片：你想留下良好的印象，所以让专业人士来处理这幅插图吧！


    **110**


    iPhone 应用开发：缺失手册


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **编码前先规划**


    人脑处理形状和颜色的速度远快于文字。在设计应用图标时，请专注于具有清晰形状的独特配色方案。避免复杂和杂乱的设计。


    *感觉如何？*


    还记得当你第一次在 `iPhone Simulator` 中运行你的应用时，它看起来有多大吗？在 `Photoshop` 中工作时也会产生同样的效果：iPhone
    的 `320 × 480` 显示屏看起来比实际要大。如果你在自定义用户界面组件，请记住，你的设计师是在光线经过精心控制的环境中工作的。


    这两个因素都倾向于将设计导向适合桌面而非移动设备的方向。这就是为什么让你的设计接触真实世界如此重要。


    感受 `Photoshop` 原型效果的最简单方法是将 `320 × 480` 图像保存下来，然后同步到内置的 `Photos` 应用中。一旦设计稿加载到设备上并随身携带，你就可以轻松打开应用，在明亮阳光下或荧光灯等不同条件下查看它们。


    还可以通过将手指放在模拟的界面元素上来验证控件的大小和位置。注意当手指移动时被手掌遮挡的内容。这也是测试左手用户感受以及设计是否适合单手或双手操作的好时机。


    **高级用户诊所：更进一步**


    如果你需要向更多人展示你的设计，你需要将其打包，以便项目组之外的人也能轻松访问。幸运的是，一个名为 `Briefs` (*http://giveabrief.com*)
    的新开源项目可以帮你实现这一点。


    `Briefs` 应用通过*角色*来展示*场景*。场景是你使用纸质原型扫描图或 `Photoshop` 原型扁平化版本创建的背景图像。然后，通过 `XML`
    文件，你可以定义一个或多个响应触摸的区域。这些区域被称为角色，允许你在不同场景之间切换。一旦所有这些信息编译成一个*brief*并加载到 `iPhone`
    上，你的纸质原型就会在你的手中“活”起来。


    这显然意味着更多的设置工作，但如果你正在为你的创意融资做电梯演讲，或者需要向公司 CEO 做演示，那么一个现场演示可能会成就或毁掉你的项目。你也会发现这是进行早期可用性测试的好方法。


    **与设计师和谐共处**


    设计师和开发者有着截然不同的思维模式和工作方式。


    作为开发者，设计流程的最后一步是考虑如何与设计师合作，将素材从他们的设计工具转移到你的开发环境中。


    第四章：设计工具：打造更好的手电筒


    **111**


    ![图片 38](img/index-130_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **编码前先规划**


    *寻找共同点*


    你的设计师很可能在 `Photoshop` 中如鱼得水。看看图 4-4。设计师对这个极其复杂的程序的每个角落都了如指掌，并能用它做出令人惊叹的作品。幸运的是，你不需要去购买一份
    `Photoshop` 来使用他们的成果。你只需要请设计师以 `PNG` 文件格式提供图形。这种标准格式很容易从分层的 `Photoshop` 文档中导出，并且你可以直接在
    `Xcode` 项目中使用它。


    ***图 4-4：*** *Iconfactory 游戏 AstroNut 中正在用 `Photoshop` 创建的图形。要打开此对话框，请使用 `文件`
    菜单下的 `存储为 Web 和设备所用格式` 命令。请确保使用的是 `PNG-24`（24 位色彩的 `PNG` 文件）并勾选了`透明度`（A）。`iPhone`
    的屏幕尺寸是 `320 × 480` 像素，但你可以根据代码的需要设置图像大小（B）。*


    如果你需要在交付后编辑设计师的作品，通常只需对图像进行裁剪或其他小幅调整。许多开发者使用名为 `Acorn` (*http://flyingmeat.com/acorn/*)
    的工具来进行这种简单的清理工作。


    当处理设计师的原型时，经常需要测量图像的各个部分，以便在 `Interface Builder` 或代码中实现精确的对齐。那个按钮间距是 `10` 像素还是
    `11` 像素？这个视图的背景色是什么？对于这类测量，`Iconfactory` 的 `xScope` 工具非常宝贵 (*http://iconfactory.com/software/xscope*)。该应用提供了放大镜、标尺、参考线和其他工具，让你可以检查并对齐屏幕图形。


    *让设计师掌控*


    为了获得最高效率，请让设计师直接访问你的版本控制仓库。典型的 `iPhone` 应用中内置的图形往往涉及大量调整。这些持续的修改可能导致大量文件传输、测试构建、电子邮件以及开发者和设计师之间的其他沟通。


    **112**


    iPhone 应用开发：缺失手册


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **反馈：别只听自己的话**


    如果你教设计师如何构建你的应用以及如何使用版本控制系统替换图像，你可以为自己节省大量时间。当你们双方都对这个安排感到更舒适时，你可能会发现设计师开始修改你的
    `NIB` 文件。在你第一百次调整了一个 `UIColor` 定义后，你甚至可能会建议设计师直接修改你的源代码！


    ***提示：*** 请记住，设计师通常是视觉思考者。他们的才能通常不包括长时间直接在命令行中工作。如果你打算让设计师访问你的仓库，你需要使用像 `Versions`
    (*http://versionsapp.com/*) 这样提供图形界面的工具。


    **反馈：别只听自己的话**


    既然你已经完成了设计流程的一些基础知识学习，是时候开始思考是什么驱动了你的决策。答案既简单又复杂。你是在为人们使用而构建这个产品。他们的反馈应该是设计中最重要的因素。


    **反馈来源**


    你可能在想：“老兄，这很简单。反馈来自客户！”


    这完全正确。但客户有多种不同的形式。


    *你自己*


    你是最重要的客户。如果你自己都不使用和热爱自己的产品，你的客户又怎么会呢？这个产品的诞生是因为你有一个需要满足的痒处：你在黑暗中绊倒了太多次。所以现在你的口袋里有了一个装在手机上的手电筒。


    同时，你也是最糟糕的客户。你并不典型，因为你了解产品的每一个细微差别。那些从 `iTunes` 下载你应用的人并不处在这个令人羡慕的位置上。但他们很快就会发现你忽略掉的东西！


    *你的市场部门*

