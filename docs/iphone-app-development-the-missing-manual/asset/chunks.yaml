    # A Flashlight for Pros


    Now that you have your development environment up and running, it’s time to start
    writing code. That’s a daunting task when you’re dealing with a new language,
    framework, and platform. That first line of code is hard to write when so many
    things are so different. Rather than pore through reams and reams of documentation
    and sample code, you’re going to do something a little different now. You’re going
    to look at a complete product that was created by an experienced iPhone developer.
    The focus of this chapter is *not* to completely cover every aspect of the programming
    APIs that are available. Instead, you get a guided tour full of tips and tricks.
    In essence, you get to sit and watch a pro build an iPhone app. The goal is to
    teach common patterns and best practices that you can use in your own applications.


    ### A Guided Tour


    Luckily, the product to be constructed in this chapter is one that you’re already
    familiar with: a flashlight! The design that you struggled with in Chapter 4 comes
    to life before your eyes. If you haven’t done so already, download the Flashlight
    Pro project from the Missing CD page ( *www.missingmanuals.com/cds*). Everything
    in this tour references the code in that project.


    ***Tip:*** Don’t be afraid to experiment with this code. In fact, in several areas
    you can learn a lot by tweaking things. As every good programmer knows, this craft
    is honed by years and years of trial and error! If you end up breaking the thing
    irreparably, just download the project from the Missing CD again.


    **155**

    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Open the Guide Book


    ### Where to Start?


    After your project file is set up correctly, you have a problem every developer
    faces: blank canvas syndrome. Where do you begin this huge project? Here are some
    simple steps to help get you going as quickly as possible:


    1. **Familiarize yourself with the NIBs and source code created by the template.**
    Some of it you’ll want to keep; other parts you’ll rename or remove.

    2. **The application delegate (see the next section) is the first thing that gets
    executed in your application.** It’s a natural place for the core of your development
    to begin.

    3. **Interface Builder (page 86) is your friend because it lets you see your design
    almost immediately.** The application may not do much because the views created
    in your NIB file (page 152) can’t send actions to the controller, but it inspires
    you to move forward.

    4. **Working with Interface Builder also helps you identify which views you need
    to customize.** If you can’t get them to look right in the graphical editor, you
    need to write some code, either by subclassing a standard view (page 67) or by
    writing your own from scratch.

    5. **As you start writing view code, you typically encounter the first cases of
    standard classes that you need to extend with categories or subclasses.**

    6. **Once you have your views in place, start feeding them data.** That’s a great
    opportunity to start implementing your models.

    7. **Throughout the preceding steps, you’ve been adding instance variables to
    your controller objects.** But at this point, you can really start to pull everything
    together with the action, update, and notifications between the models and views.

    8. **As you reach the end of the project, start thinking about localizing the
    product.** Also, clean up the UI with the help of your designer.


    You’re now ready to begin the tour of the final Flashlight Pro application. You
    visit the source files in roughly the order they were created. Along the way,
    this chapter also highlights and discusses important landmarks. So sit back, get
    comfortable with your copy of the project, and get ready for an excursion through
    Xcode’s Groups & Files list!


    ### Open the Guide Book


    Begin your tour by opening the guidebook: Locate the `Flashlight_Pro.xcodeproj`
    project file that you downloaded from the Missing CD page, and double-click its
    icon to open it with Xcode. Make sure that the main Flashlight Pro group and the
    Application Delegate subgroup are both open, as shown in Figure 6-1.


    **156**

    iPhone App Development: The Missing Manual

    ![Image 55](index-175_1.jpg)

    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ***Figure 6-1:*** *Throughout this chapter, you use the Groups & Files list in
    Xcode to find the code discussed on these pages. This figure shows `Flashlight_ProAppDelegate.m`
    selected in the list and viewed in the editor. To make the editor fill the right-hand
    side of the window, use View ➝ Zoom Editor In (⌘-Shift-E). You’ll learn more about
    the first line of code (selected) on below.*


    As was noted in the list on the previous page, the application delegate is the
    first place your code is executed, so that’s where this tour starts.


    ### `Flashlight_ProAppDelegate`


    There’s real y only one method that matters in this class’s implementation: `–applicationDidFinishLaunching:`.
    And even though it has only a few lines of code, a lot is going on here.


    #### `UIApplication`


    In `Flashlight_ProAppDelegate.m`, you see the `UIApplication` class for the first
    time. One instance of this object is always available, and it allows you to query
    and configure the state of your application within the iPhone OS. In this instance,
    the property that allows the screen to dim and turn off is disabled:


    ```

    [[UIApplication sharedApplication] setIdleTimerDisabled:YES];

    ```


    When you’re using a flashlight, you don’t want it to turn off until the user wants
    to turn it off. The `UIApplication` class also lets you do interesting things
    like add a badge to your icon on the home screen, change the look of the status
    bar, show the network activity indicator, and so on.


