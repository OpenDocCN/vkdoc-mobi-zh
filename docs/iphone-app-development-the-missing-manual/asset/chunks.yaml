- fmt: 'For example, you can combine the tester’s name with the type of device. The
    name “David Bowman 3G” tells you that Dave uses an iPhone 3G. When he upgrades,
    you’d add another device named “David Bowman 3GS.”


    **4. After clicking Submit, you see the new device in the list, and the counter
    is decremented.**


    **144**


    iPhone App Development: The Missing Manual


    ![Image 50](index-163_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Make It Official**


    ***Figure 5-9:*** *You add new devices via the Provisioning Portal. In this naming
    scheme, the device names include the tester’s name and the type of device he’s
    testing on.*


    An ID for your apps. The next piece of information you need for the provisioning
    profile is an App ID. This unique identifier specifies which applications can
    be run by doing a pattern match. The pattern match can include an asterisk that
    acts as a wildcard character.


    When you were looking at the `Info.plist` for the flashlight application, you
    saw that its bundle identifier was defined as `com.iconfactory.FlashlightPro`.
    This reverse domain name path uniquely defines the flashlight as coming from the
    Iconfactory. If you’ve downloaded sample code from the iPhone Dev Center, you’ll
    see that many of the applications have identifiers that begin with `com.yourcompany`.


    Say that your domain is `squidger.com`, and your app is named Tiddlywinks Pro.


    You’ve defined your bundle identifier in `Info.plist` as `com.squidger.TiddlywinksPro`,
    and now have several choices for specifying an App ID:


    - `*` matches all applications. You’ll be able to build and run any application
    on your device, including sample code and other third-party apps. But it lacks
    special powers that the next two options have.

    - `com.squidger.*` matches any app that begins with `com.squidger`, including
    `com.squidger.TiddlywinksPro` and any other future apps your company makes.


    Use this pattern when you beta test your application. A single provision file
    that matches all products from your domain makes it easy for testers to try each
    new creation since they’ll already have it installed from the last beta.


    Chapter 5: Getting Serious about Development


    **145**


    ![Image 51](index-164_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Make It Official**


    - `com.squidger.TiddlywinksPro` is the fully qualified pattern that matches your
    application exactly. You must use this type of ID if you want to use push notifications
    or in-app purchases from your app.


    For now, take the easiest route and specify your App ID as `*`. So load up the
    portal and get on it:


    **1. On the Provisioning Portal web page, click App IDs in the left column.**


    The App IDs screen shows the App IDs that have been defined. Over time, the list
    will grow, and you’ll use it when you want to configure push notifications or
    in-app purchases.


    **2. For now, just click New App ID to add your first one.**


    First, fill in the text box under Description to remind you which pattern this
    is for.


    **3. Since you can use this one App ID for building and running all apps, type
    All Apps.**


    Leave the pop-up menu under Bundle Seed ID (App ID Prefix) selected on Generate
    New (Figure 5-10). Next, enter the pattern used to match the applications under
    Bundle Identifier (App ID Suffix).


    ***Figure 5-10:*** *Here are the settings for your first App ID. A new one is
    being created using the pattern `*` that matches all applications.*


    **146**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Make It Official**


    **4. Type `*` and click Submit.**


    After returning to the main App ID page, you see All Apps listed in the description
    column.


    ***Note:*** The pattern is prefixed with a randomly generated Bundle Seed ID.
    This prefix is needed to keep the identifiers unique per developer. They can also
    be used to share security information between multiple applications by the same
    developer, but for the most part you can ignore the prefix.'
