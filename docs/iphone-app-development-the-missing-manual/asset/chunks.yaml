    more technical tips, tricks, and shortcuts for the experienced developer.


    About the Outline


    *iPhone App Development: The Missing Manual* is divided into four parts, most
    containing several chapters:


    • **Part 1: Getting Started with Cocoa Touch.** In the first four chapters, you’ll
    build your first iPhone App and get acquainted with your basic tools: Cocoa Touch,
