  trans: '

    # 项目生命周期中的激动人心时刻


    对大多数开发者来说，看到最终图形界面是一个神奇的时刻。你最早随手塞进应用里的粗糙图片被替换掉了，应用瞬间感觉好了千百倍。这对设计师而言同样是一个特殊时刻：她终于能看到自己的像素动起来了。每个人的愿景都得以实现。


    作为清理流程的一部分，给设计师提供每个文件的书面说明通常很有帮助。作为开发者，你知道 `ToolbarDiscoStart.png` 是如何被使用的，因为它就在源代码里。但大多数设计师不读代码，所以对她们宽容点；明确说明你的需求。务必指定图形所需的任何特殊尺寸、颜色或位置要求。


    **提示：** 手电筒项目的 `Images` 文件夹中包含一份清单文件，它解释了每个图形的用途。这样你可以把整个目录交给设计师，而她也能拿到所需的所有东西。


    # 多语言支持


    在图 7-8 中，你可能注意到界面显示的是意大利文。


    *太棒了！*


    Beta 测试也是处理应用中任何本地化工作的好时机。如果你在代码中一直勤勉地使用 `NSLocalizedString()`，那么这项工作相对容易。为你的外语翻译人员创建一个本地化包。这个包包含
    `Localizable.strings` 文件和任何需要更新的 NIB 文件。把所有东西放进一个 Zip 文件并发送出去。


    # 网站开发


    拿到本地化文件后，你可以将它们添加到项目中并执行构建。确保你的翻译人员也参与 Beta 测试，因为他们需要检查最终结果。你肯定不希望有任何 *蠢货* 漏网！


    一旦你更新了图形并启动了本地化工作，就可以开始考虑为产品建立推广网站。有些开发者认为他们需要的唯一推广就是 iTunes 本身。对于一些简单的产品，这种方法效果不错。但如果你有一个稍显复杂的产品，就需要一种方式向潜在客户展示其功能。


    App Store 只允许你展示五张截图，并且无法展示产品运行中的视频。一旦人们看到你的产品有多棒，他们就会想购买。一个产品网站能让你比在 iTunes 内更详细地解释产品。


    在这项工作中，请与你的设计师和市场人员合作。同样重要的是，要意识到为网站开发视觉效果和销售文案需要时间。这就是为什么你应该尽早开始这项工作。


    ## 网站结构


    作为开发者，你可以通过搭建一些基本元素来帮助大家。


    例如，用 HTML 搭建网站的基本结构，并设置好网页服务器来托管文件。


    **注意：** Missing CD（`www.missingmanuals.com/cds`）包含了 Safety Light 网站的 HTML 和 CSS
    源代码。它被设计为可适应多种不同类型的应用，因此你可以随意将其用于你自己的产品。


    在建设这个网站时，务必记住：*许多* 用户会通过 iPhone 或 iPod touch 访问。你需要确保你设计的任何方案都能在小屏幕格式上正常工作。令人惊讶的是，有多少开发者从未在自己的设备上打开过产品网站！


    ### 内容


    大多数情况下，iPhone 可以显示与桌面浏览器相同类型的图片。但要注意如何呈现这些图片。避免使用 JavaScript 对截图进行花哨的缩放操作：缩放会慢得令人沮丧，而且在设备上不经过捏合操作，“全窗口”显示很难导航。

    '
- fmt: "在网站上，一行额外的HTML代码也非常重要：\n\n`<meta name=\"viewport\" content=\"width=999\" />`\n\
    \n这行代码向Safari提示你网站的宽度，以便它优化显示。将“999”替换为你希望网站加载时缩放到的实际宽度。你可以在A List Apart的这两篇文章中了解这些技巧以及网络开发者可对移动版Safari使用的许多其他技巧：\n\
    \n- `http://www.alistapart.com/articles/putyourcontentinmypocket/`\n- `http://www.alistapart.com/articles/putyourcontentinmypocketpart2/`\n\
    \n花几分钟熟悉一下移动版Safari的功能——你的未来客户会因此感谢你。\n\n## 电影\n\n如果你要在产品网站上包含一段电影，你*必须*遵循一条规则：不要使用Flash。iPhone上的Safari无法显示它，因此所有为产品制作精彩介绍的工作都将白费。\n\
    \n相反，请使用`QuickTime`来创建电影。该应用程序（如图7-9所示）可以接受单一电影，并针对桌面和移动设备显示进行优化。\n\n导出过程还会生成一些HTML和JavaScript代码，方便你将输出内容整合到网站中。你指定的输出文件夹包含一个`ReadMe.html`文件（图7-10），其中包含详细信息。\n\
    \n另一种播放电影的方式是使用YouTube。是的，即使YouTube使用Flash，你也没有违反规则。YouTube会将你上传的电影转换为不同的文件格式。在桌面上观看时，电影会在Flash播放器中显示。而在iPhone上，则使用H.264视频——与iPhone的YouTube应用程序中使用的格式相同。虽然你对演示的控制能力会降低，但YouTube可以是一种廉价且有效的产品推广方式。\n\
    \n**230**\n\niPhone App开发：缺失的手册\n\n![Image 70](index-249_1.jpg)\n\n![Image 71](index-249_2.jpg)\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**网络开发**\n\n***图7-9：***\
    \  \n*电影* `rampchampion.mov` *正在被转换为与桌面和iPhone（通过无线和蜂窝网络）兼容的格式。生成的文件被放置在Mac桌面上的一个名为*\
    \ `rampchampion` *的文件夹中。*\n\n***图7-10：***  \n*导出到* `rampchampion` *文件夹中的文件。注意桌面文件大小为9.5\
    \ MB，而针对蜂窝网络iPhone的文件仅为791 KB。在浏览器中打开* `ReadMe.html` *文件，你将看到展示如何在网站上使用这些电影的代码示例。*\n\
    \n第7章：最后修饰\n\n**231**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
    **App Store，你来了**\n\n## 跟踪\n\n当客户开始访问你的产品网站时，你会想知道有多少人访问以及他们从哪里来。这些信息将指引你找到评论你应用程序的网站、在Twitter上提及它的人以及在线论坛的评论。你会非常清楚地了解人们对你作品的看法。\n\
    \n跟踪网站访问者的最佳方法是使用名为Mint (`http://haveamint.com`) 的产品。这个简单的系统通过在你的HTML头部添加一行JavaScript代码来记录网站的所有访问者。你需要PHP和MySQL才能安装此产品，但大多数网络托管公司都会免费提供。\n\
    \n要了解它的工作原理，你可以查看Safety Light应用程序的网站统计信息 (`http://safetylightapp.com/mint/`)。不必担心你的竞争对手能对你的网站这样做：标准的Mint配置使用密码来保护这些信息。此站点上已启用此功能，仅用于演示其能力。\n\
    \n**App Store，你来了**\n\n当你的Beta测试正在进行时，这也是连接到iTunes的最佳时机。当测试人员对产品进行全面测试时，你可以开始准备将其上架销售所需的工作！\n\
    \n是时候访问另一个为iPhone开发者服务的Apple网站了……"
  raw: 'On this website, one line of additional HTML code is also very important:


    <meta name=″viewport″ content=″width=999″ />


    This line gives Safari a hint about the width of your site so that it can optimize
    the display. Replace “999” with the actual width you want to be zoomed to when
    your site is loaded. You can get the scoop on these and many other tricks that
    web developers can use with the mobile version of Safari in these articles at
    A List Apart: *http://www.alistapart.com/articles/putyourcontentinmypocket/*


    *http://www.alistapart.com/articles/putyourcontentinmypocketpart2/*


    Spend a few minutes familiarizing yourself with the capabilities of Mobile Safari—


    your future customers will love you for it.


    *Movies*


    If you’re going to include a movie on your product website, you *must* follow
    one rule: no Flash. Safari on the iPhone can’t display it, so all the work that
    went into making a great pitch for your product will have been for naught.


    Instead, use QuickTime to create the movie. This application, shown in Figure
    7-9, can take a single movie and optimize it for display on the desktop and on
    mobile devices.


    The export process also creates some HTML and JavaScript that makes it easy to
    incorporate the output into your website. The output folder that you specify contains
    a *ReadMe.html* file (Figure 7-10) with the details.


    Another possibility for movies is to use YouTube. Yep, even though YouTube uses
    Flash, you’re not breaking the rule. YouTube converts the movies you upload into
    different file formats. When you view the movie on the desktop, it’s displayed
    in a Flash player. On the iPhone, H.264 video is used—the same format that’s used
    in the iPhone’s YouTube application. You won’t have as much control over the presentation,
    but YouTube can be a cheap and effective way to promote your product.


    **230**


    iPhone App Development: The Missing Manual


    ![Image 70](index-249_1.jpg)


    ![Image 71](index-249_2.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **web development**


    ***Figure 7-9:***


    *The movie* rampchampion.mov *is being*


    *converted into formats that are compat-*


    *ible with the desktop and iPhone (both*


    *via wireless and cellular networks). The*


    *resulting files are placed in a folder*


    *called* rampchampion *on your Mac’s*


    *desktop.*


    ***Figure 7-10:***


    *The exported files in*


    *the* rampchampion


    **folder. Notice how*


    *the desktop file is*


    *9.5 MB, while the file*


    *for the iPhone on a*


    *cellular network is*


    *only 791 KB. Open the*


    ReadMe.html *file in*


    *your browser, and you*


    *see code samples that*


    *show you how to use*


    *the movies on your*


    *website.*


    Chapter 7: Finishing Touches


    **231**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **App Store, Here You**


    **Come**


    *Tracking*


    As customers start to visit your product website, you’ll want to know how many
    there are and where they’re coming from. This information will lead you to websites
    that review your application, people who mention it on Twitter, and online forum
    comments. You’ll get a very good idea of what people are saying about your work.


    The best way to track visitors to your site is with a product called Mint *http://*


    *haveamint.com*. This simple system records all visitors to the site by adding
    a single line of JavaScript code to your HTML header. You need PHP and MySQL to
    install this product, but most web hosting companies provide this free of charge.


    To get an idea of how it works, you can take a look at the Safety Light application’s
    website statistics *http://safetylightapp.com/mint/*. Don’t worry about your competitors
    being able to do this on your website: The standard Mint configuration uses a
    password to protect this information. On this site, it’s been enabled just to
    demonstrate the capabilities.


    **App Store, Here You Come**


    While your beta test is ongoing, it’s also the perfect time to get yourself connected
    to iTunes. While testers are putting the product through its paces, you can get
    started on the work needed to get it ready for sale!


    Time to visit another Apple website for iPhone developers….'
