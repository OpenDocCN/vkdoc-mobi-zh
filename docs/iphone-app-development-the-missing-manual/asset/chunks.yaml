    ## The Missing Credits


    ### About the Author


    **Craig Hockenberry** has been designing award-winning software for over 30 years.
    He is currently a principal at the Iconfactory, a company that has been changing
    the face of the computers since 1996. Their work includes the design and production
    of icons for Microsoft, Apple, Adobe, and other leading software companies.


    Craig almost didn’t buy an iPhone. But a mere five minutes at his local Apple
    store convinced him that he was holding the future in his hands. Shortly thereafter,
    curiosity led to a hacked iPhone where he could run his own applications.


    Apple’s introduction of the App Store let Craig and his fellow factory workers
    share that software with the rest of the world.


    Since those early days, the Iconfactory ( *www.iconfactory.com*) has released
    many groundbreaking and successful titles for the iPhone, including Twitterrific,
    Frenzic, Ramp Champ, and Pickin’ Time. The company has also contributed design
    work to many other leading apps.


    Craig loves writing and hopes you will learn to share his fascination with BIG
    LETTERS.


    ### About the Creative Team


    **Nan Barber** (editor) has been involved with the Missing Manual series since
    its inception. Her job lets her combine her fascination with bright shiny things
    and lifelong love affair with the written word. Email: *nanbarber@oreilly.com*.


    **xi**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Nellie McKesson** (production editor) is a graduate of St. John’s College in
    Santa Fe, New Mexico. She lives in Brockton, Mass., and spends her spare time
    studying graphic design and making t-shirts ( *www.endplasticdesigns.com*). Email:
    *nellie@oreilly.com*.'
