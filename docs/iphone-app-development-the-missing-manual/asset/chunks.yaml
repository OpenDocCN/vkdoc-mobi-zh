- fmt: '# Objective-C 接口定义


    @interface NSString : NSObject <NSCopying, NSMutableCopying, NSCoding>


    - (NSUInteger)length;


    - (unichar)characterAtIndex:(NSUInteger)index;


    @end


    Even if you have experience working with other programming languages, this code
    won’t make any sense. Time to deconstruct the syntax!


    First there’s `@interface`:


    `@interface` NSString : NSObject <NSCopying, NSMutableCopying, NSCoding> This
    code tells Objective-C that you’re about to define data and methods for a class.


    This, in effect, is a template for every object that gets instantiated from the
    class. The interface is also where the class name is defined as `NSString`.


    The interface definition continues until the `@end` and the, well, end.


    ## One class to rule them all


    After definition, there’s a colon and some other names beginning with `NS`. That’s
    your hint that you’re dealing with system class definitions. The most important
    one is `NSObject`:


    `@interface NSString :` **`NSObject`** `<NSCopying, NSMutableCopying, NSCoding>`
    All classes, and therefore objects, in Objective-C “inherit” from another class.


    *Inheritance* lets the characteristics of a parent class pass on to a child class.
    The child class—more commonly referred to as a *subclass*—can then modify the
    methods and instance variables that were defined by the parent. (The parent is
    often called a *superclass*.)


    **Tip:** There’s one exception to this inheritance rule, and that’s `NSObject`.
    It’s the root class in the hierarchy, and it doesn’t inherit from any other class.


    Much as with your parents, inheritance gets you a lot of behavior for free (even
    if you don’t want or need it!). Even if there’s no money involved with this inheritance,
    you’ll find it invaluable because it saves you a lot of time and effort. (For
    details on this “free code,” see the box on page 36.)


    An example of inheritance occurs in custom views. It’s likely that at some point
    in your development, you’ll want to develop a custom view for displaying some
    application-specific data. You’ll start this work by subclassing a system class
    like `UIView`.


    As you implement your child class of `UIView`, you’ll find that a lot of code
    has already been done for you. Things like handling multitouch events, drawing,
    animation, and view management are available from the parent class. You only have
    to implement the new behavior for the view.


    ## Masses of Classes


    Now that you’ve learned a bit about the class hierarchy in Objective-C, it should
    be clear that the first word after the colon is the superclass (parent) of the
    class being defined. `NSString`’s superclass is `NSObject`.


    ### Follow the protocol


    After the superclass name, you’ll see some other class names in angle brackets
    (`< >`):


    `@interface NSString : NSObject` **`<NSCopying, NSMutableCopying, NSCoding>`**
    These are *protocols* that are adopted by the class. Protocols define a group
    of methods that aren’t associated with any particular class.


    Using protocols is like signing a contract. If you specify that your class adopts
    a protocol by including the class names in the angle brackets, you promise to
    implement the methods that are defined in the protocol. For example, the `NSString`
    protocol promises to fulfill the contract of providing copies of itself. These
    object copies can be read-only (with `NSCopying`) and writable (with `NSMutableCopying`).
    The `NSCoding` protocol tells you that the class also implements methods for encoding
    and decoding objects.


    **Note:** The encoding and decoding methods in `NSCoding` are used to archive
    objects on disk or to distribute them across a network. It’s Cocoa’s mechanism
    for serializing objects.


    Protocols aren’t required when you’re defining a new class, but you’ll find them
    used quite a lot as you develop your app. The most common use of protocols is
    with delegates; you’ll see that design pattern in the next chapter.


    **Note:** Since Objective-C supports only single inheritance, protocols are often
    used to achieve the same goals as multiple inheritance in other languages.


    ## The Methods Behind the Madness


    That’s a lot of reading just to understand a single line of code! Thankfully,
    it gets a little easier with the next two lines, both of which begin with a minus
    sign (`-`).


    ```

    - (NSUInteger)length;


    - (unichar)characterAtIndex:(NSUInteger)index;

    ```


    This is how you define methods (page 49) in a class interface. You can represent
    any string in Cocoa with just these two methods: The first returns the length
    of the string; the other returns a Unicode character at an index position.


    **Tip:** When writing about methods in online forums, mailing lists, or blogs,
    many developers use an abbreviated form for the signatures: They leave out type
    information and parameter names. Apple’s developer documentation also uses this
    format.


    It’s common to see something like “I’m having problems with `–messageWithFirstParameter:andSecondParameter:`”
    in a post asking for help. Another reason to keep those method signatures readable!
    The short forms for the `NSString` methods shown above are `–length` and `–characterAtIndex:`.
    This book uses this format throughout.


    The definitions also include types for any parameters and the result. The `–length`
    method returns an unsigned integer (`NSUInteger`). The `–characterAtIndex:` method
    takes one parameter with an unsigned integer index and returns a `unichar`. These
    methods use primitive types, but you can also specify objects using a pointer
    to a class name (you’ll see that shortly with the `–uppercaseString` definition).


    **Tip:** The types used in the method definition are checked at compile time,
    but not when messages are sent at runtime. When you see a compiler warning that
    “`NSString`” may not respond to “`–aNonexistentMethod`”, make sure that you’re
    sending the message to the right kind of object.


    ## Power Users’ Clinic: Tell Us about Yourself


    The concept of free code extends all the way through the object hierarchy. As
    you’re working on a `UIView` subclass, a description message is sent to the object,
    and you’ll have access to the code from `UIView`, `UIResponder` (where touch events
    are handled), and `NSObject` (the root class).


    This behavior can also be handy when you’re logging information. Cocoa’s logging
    function, `NSLog`, takes a `printf`-style string and outputs the results to the
    current console device:


    ```

    NSLog(@″THIS OBJECT IS AWESOME: %@″, chockLockObject);

    ```


    The formatting specification is supplied with an `NSString` (remember the `@`
    shortcut mentioned earlier). There’s also a new formatting specification—`%@`—that
    prints an `NSString` just as `%s` prints a C-style string.


    The really cool part is that the logging function is also smart enough to know
    that `chockLockObject` isn’t an instance of `NSString`, so it uses the object’s
    description method to create the string that’s displayed.


    To see the power of the hierarchy, look at the `–description` method in `NSObject`.
    Since every object is a subclass of this root class, they all know how to describe
    themselves. The default implementation of the method returns the object’s class
    name and a memory address. So even if you don’t know anything about an object,
    you can do this:


    ```

    [mysteryObject description]

    ```


    The resulting string that describes the `mysteryObject` is helpful when you’re
    debugging or working with data from a source outside of your direct control.


    For example, the debugger that you use with Xcode (gdb) includes a `print-object`
    command. When you type this into the debugger:


    ```

    (gdb) po myObjectVariable

    ```


    The resulting string that describes the `myObjectVariable` is then printed on
    the console.'
