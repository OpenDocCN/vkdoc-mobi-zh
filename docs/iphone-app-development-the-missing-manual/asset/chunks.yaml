  trans: '

    # 值对象


    -   你可以在集合中存储以对象形式表示的值。集合能让你轻松管理一组对象。可利用的方法包括对对象进行排序、查找实例，以及根据模式筛选数据。如果你使用的是原始值，就必须自行实现这些数据管理代码。

    -   对象的类提供了大量用于操作值的函数。这能为你带来更高的灵活性，并节省实现过程中的时间。


    ## 这些值对象是什么？问得好！


    ### `NSString`


    如上一章所见，该类是 Cocoa 中的基础类之一。


    许多其他类都使用以对象形式表示的字符串。你可能会忍不住在实现中使用纯 C 字符串，这确实可行，但你会遇到很多阻力。最终，当你在 Cocoa 中使用原始字符串时，将不得不进行大量不必要的转换。


    此外，你还将错过 `NSString` 类提供的一些重要功能：


    -   完整的 Unicode 支持及字符串编码之间的转换（`–dataUsingEncoding:`）。

    -   从文件中读取文本及其编码（`–stringWithContentsOfFile:usedEncoding:error:`）。

    -   字符串的分割（`–componentsSeparatedByString:`）与拼接（`–componentsJoinedByString:`）。

    -   转义字符串以便放入 URL（`–stringByAddingPercentEscapesUsingEncoding:` 和 `–stringByReplacingPercentEscapesUsingEncoding:`）。

    -   子字符串搜索（`–rangeOfString:`）以及获取 Unicode 字符数量（`–length`）。

    -   将字符串转换为数字（`–boolValue`、`–integerValue`、`–floatValue`、`–doubleValue`）。

    -   大小写转换（`–capitalizedString`、`–lowercaseString` 以及最棒的 `–uppercaseString`）。

    -   字符串格式化（`–stringWithFormat:`）和本地化（`NSLocalizedString`）。

    -   使用用户当前的语言设置进行字符串比较（`–localizedCompare:`），并可使用多种选项，包括忽略变音符号（因此 "ö" 等同于 "o"）以及按数值排序（因此
    "CHOCK9.TXT" 在列表中会排在 "CHOCK9000.TXT" 之前）。


    ### `NSNumber`


    在进行值转换时，你会想使用这个值对象。如果你用一个浮点值创建一个数字对象，然后请求该对象返回无符号字符值（`–unsignedCharValue`），内部将执行一次转换，且原始对象中的信息不会丢失。


    如果你的应用程序中进行基于货币的计算，可以使用 `NSDecimalNumber` 子类以获得最高精度。由于该子类允许你使用 38 位有效数字和 –128
    到 127 范围内的指数，因此你无需担心浮点计算中固有的舍入误差和其他数据丢失问题。


    ### `NSDate`


    日期对象提供了一些用于操作时间点的基本函数。你可以比较哪个日期更早（`–earlierDate:`），以及计算两个日期之间的秒数（`–timeIntervalSinceDate:`）。当与
    `NSCalendar` 结合使用时，`NSDate` 的优势尤为突出；如果你曾经尝试在考虑时区和闰年等因素的情况下计算两个时间点之间的月数和天数，你就会感激这项工作为你代劳了。


    ### `NSData`


    作为非结构化字节流的值对象，`NSData` 提供了管理数据缓冲区所需的机制。数据对象通常需要存储到磁盘上，因此提供了读取（`+dataWithContentsOfFile:`）和写入（`–writeToFile:atomically:`）的方法。


    这些数据块通常用于创建其他对象的实例。例如，可以使用 `NSData` 对象创建 `NSString`。同样，你也可以使用 `UIImage` 对象的 `–initWithData:`
    方法创建图像。


    ### `NSNull`

    '
- fmt: "This object serves only one purpose: to represent null values. Collections\
    \ don’t allow `nil` objects, so you can use `NSNull` when you need to put an empty\
    \ value in an array, dictionary (hash table), or set.\n\n## `NSValue`\n\nSometimes\
    \ you need to create objects that closely mirror a primitive type or data structure.\
    \ This situation is most likely if you have some legacy or third-party data and\
    \ need to add it to a collection.\n\nWhenever this need arises, look at the `NSValue`\
    \ class. It can wrap any variable type that’s valid in Objective-C as a value\
    \ object. Pretend you have a legacy system that defines a bizarre data structure\
    \ called `Chockitude`:\n\n```c\ntypedef struct {\n    unsigned char palmCount;\n\
    \    int isFleshy;\n    float height; // in inches\n} Chockitude;\n```\n\nIf you\
    \ need to wrap this data in an object, it’s simple:\n\n```objc\nChockitude ch;\n\
    ch.palmCount = 2;\nch.isFleshy = true;\nch.height = 79.25;\n\nNSValue *value =\
    \ [NSValue valueWithBytes:&ch objCType:@encode(Chockitude)];\n```\n\nWhenever\
    \ you need to retrieve the contents of the value object, you’d write this code:\n\
    \n```objc\nChockitude theChockitude;\n[value getValue:&theChockitude];\nNSLog(@\"\
    palmCount = %d, isFleshy = %s, height = %f\",\n      theChockitude.palmCount,\n\
    \      (theChockitude.isFleshy ? \"YES OF COURSE\" : \"no\"),\n      theChockitude.height);\n\
    // this is displayed in the console log:\n// palmCount = 2, isFleshy = YES OF\
    \ COURSE, height = 79.250000\n```\n\nAnother use for `NSValue` objects is with\
    \ points and other geometry on the iPhone’s display. If you wanted to keep track\
    \ of a series of taps on the screen, you’d probably want to use a collection of\
    \ `CGPoint` structures (that contain the x and y). You can use an `NSValue` category\
    \ that takes these common structures and encodes them into objects: `+valueWithCGPoint:`\
    \ and `+valueWithCGRect:` are used to wrap points and rectangles used by the graphics\
    \ framework.\n\n## Collections\n\nWhen you’re dealing with objects, you’re often\
    \ dealing with many of them. It’s essential to stay organized, and the easiest\
    \ way to do this is by grouping similar objects into *collections*.\n\nFor example,\
    \ when you look at a scrolling list on your iPhone, the data in each row is represented\
    \ by an object. And if that row contains a person’s name and age, you’re likely\
    \ to have other objects for those personal details.\n\n`NSArray` is a natural\
    \ collection for this kind of list view. You can specify the order within the\
    \ collection so the first row in the list is the first object in the array. This\
    \ array class also provides mechanisms for sorting and filtering the data, making\
    \ it easy to model that behavior in a user interface.\n\nWhen you want to collect\
    \ objects by using a unique key, use the `NSDictionary` class. It implements an\
    \ associative array that lets you look up objects (values) associated with a key.\n\
    \n***Note:*** If you’ve used other languages, associative arrays are called a\
    \ lot of different things: hash tables, hashes, maps, and containers are but a\
    \ few. Regardless of name, they all let you find a value with a key.\n\nYou might\
    \ use an `NSDictionary` to store the data for each row in your list. Since you\
    \ can store `NSString`, `NSDate`, and `NSNumber` in a collection, it’s easy to\
    \ create a collection for that information:\n\n```objc\nNSDictionary *personalDetails\
    \ = [NSDictionary dictionaryWithObjectsAndKeys:\n    @\"Craig\", @\"name\",\n\
    \    [NSNumber numberWithInt:50], @\"age\"];\n```\n\nYou can then query the dictionary\
    \ collection whenever you need one of the objects:\n\n```objc\nNSInteger age =\
    \ [[personalDetails objectForKey:@\"age\"] integerValue];\nBOOL crankyOldMan =\
    \ NO;\nif (age > 50) {\n    crankyOldMan = YES;\n}\n```\n\nYou can use `NSSet`\
    \ to collect distinct objects whose order isn’t important. Typically, you’ll use\
    \ this type of collection as you would use a set in mathematics. Methods let you\
    \ test for equality, intersection, and subsets.\n\nAs your application gets more\
    \ complex, you’ll find that you start to combine these collections. For example,\
    \ your list view could use an `NSArray` for each instance of a row and an `NSDictionary`\
    \ for the actual row data. Likewise, it’s possible to have an `NSDictionary` that\
    \ contains an `NSArray` at a key. Imagine that your personal details include a\
    \ `siblingNames` key; that data would be well represented by an array. If you\
    \ don’t have any brothers or sisters, the array is empty, and no matter how prolific\
    \ your parents were, the array would grow to fit the size of your family.\n\n\
    ### Copying in Depth\n\nWhen you make a copy of a collection by sending the `-copy`\
    \ message, the result is a shallow copy of the object. The copied collection can\
    \ be modified independently of the original collection, but the objects in both\
    \ collections are shared.\n\nTo perform a deep copy of a collection, you use a\
    \ *copy items* method. For example, with an `NSArray`, you use `-initWithArray:copyItems:`\
    \ like this:\n\n```objc\nNSArray *original = [NSArray arrayWithObjects:@\"Mimeoscope\"\
    , @\"Cyclostyle\", nil];\nNSArray *shallowCopy = [original copy];\nNSArray *deepCopy\
    \ = [[NSArray alloc] initWithArray:original copyItems:YES];\n```\n\nIn `shallowCopy`,\
    \ both objects in the array are the same instances that were in the original.\
    \ The `deepCopy`, on the other hand, has new instances of `\"Mimeoscope\"` and\
    \ `\"Cyclostyle\"` in the new array.\n\nThe `NSDictionary` and `NSSet` collections\
    \ use the same pattern with the `-initWithDictionary:copyItems:` and `-initWithSet:copyItems:`\
    \ methods.\n\n## Mutable Versus Immutable\n\nWhile looking at `NSString`, you\
    \ may have noticed that the content of the string is never modified directly.\
    \ If you’ve checked out the `NSArray` class, you might be concerned that there\
    \ doesn’t appear to be any way to add or remove items to the array. Don’t worry;\
    \ the folks who designed Cocoa weren’t *that* lazy!\n\nMany of the classes for\
    \ managing data are broken in two: one class to manage the data that never changes\
    \ and a subclass for the part that can change. If the class name for the constant\
    \ data is `NSString`, the class name `NSMutableString` is used for the one that\
    \ can be modified.\n\n### Property Lists\n\nWhen you go to the effort of organizing\
    \ your objects in collections, it’s likely that you’ll want to save that work.\
    \ Both `NSArray` and `NSDictionary` provide a `-writeToFile:atomically:` method.\
    \ They also provide `+arrayWithContentsOfFile:` and `+dictionaryWithContentsOfFile:`\
    \ methods to read the information back from the file.\n\nWhat gets stored in this\
    \ file is a *property list*, a standard format that’s used throughout Cocoa Touch\
    \ as a lightweight and portable mechanism for persistence. Property lists store\
    \ instances of objects in a file with a `.plist` extension. The contents of the\
    \ data can be stored as XML for maximum portability, or in a more efficient binary\
    \ format.\n\nIf you opened your Flashlight application’s resource folder, you\
    \ might have noticed a file named `Flashlight-Info.plist`. This important property\
    \ list contains information that describes your application to the iPhone OS.\
    \ It’s where you specify the icon that appears on the home screen, for example.\
    \ Similarly, when a user updates your application’s settings, the configuration\
    \ is written into a property list.\n\nWhen you’re using property lists, it’s important\
    \ to use only the following classes: `NSArray`, `NSDictionary`, `NSString`, `NSData`,\
    \ `NSDate`, and `NSNumber` (integer, floating-point, and Boolean values). Any\
    \ hierarchy of these objects can be stored in the file. An array of dictionaries\
    \ containing numbers, strings, and dates is completely valid.\n\n***Tip:*** If\
    \ you need to archive an object graph that contains classes not supported in a\
    \ property list, take a look at the `NSKeyedArchiver` class and `NSCoding` protocol."
  raw: 'This object serves only one purpose: to represent null values. Collections
    don’t allow *nil* objects, so you can use *NSNul* when you need to put an empty
    value in an array, dictionary (hash table), or set.


    *NSValue*


    Sometimes you need to create objects that closely mirror a primitive type or data
    structure. This situation is most likely if you have some legacy or third-party
    data and need to add it to a collection.


    Whenever this need arises, look at the *NSValue* class. It can wrap any variable
    type that’s valid in Objective-C as a value object. Pretend you have a legacy
    system that defines a bizarre data structure called *Chockitude*:


    typedef struct {


    unsigned char palmCount;


    int isFleshy;


    float height; // in inches


    } Chockitude;


    **72**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Collections**


    If you need to wrap this data in an object, it’s simple:


    Chockitude ch;


    ch.palmCount = 2;


    ch.isFleshy = true;


    ch.height = 79.25;


    NSValue *value = [NSValue valueWithBytes:&ch objCType:@encode(Chockitude)]; Whenever
    you need to retrieve the contents of the value object, you’d write this code:
    Chockitude theChockitude;


    [value getValue:&theChockitude];


    NSLog(@″palmCount = %d, isFleshy = %s, height = %f″, theChockitude.palmCount,
    (theChockitude.isFleshy ? ″YES OF COURSE″ : ″no″), theChockitude.height);


    // this is displayed in the console log:


    // palmCount = 2, isFleshy = YES OF COURSE, height = 79.250000


    Another use for *NSValue* objects is with points and other geometry on the iPhone’s
    display. If you wanted to keep track of a series of taps on the screen, you’d
    probably want to use a collection of *CGPoint* structures (that contain the x
    and y). You can use an *NSValue* category that takes these common structures and
    encodes them into objects: *+valueWithCGPoint:* and *+valueWithCGRect:* are used
    to wrap points and rectangles used by the graphics framework.


    **Collections**


    When you’re dealing with objects, you’re often dealing with many of them. It’s
    essential to stay organized, and the easiest way to do this is by grouping similar
    objects into *col ections.*


    For example, when you look at a scrolling list on your iPhone, the data in each
    row is represented by an object. And if that row contains a person’s name and
    age, you’re likely to have other objects for those personal details.


    *NSArray* is a natural collection for this kind of list view. You can specify
    the order within the collection so the first row in the list is the first object
    in the array. This array class also provides mechanisms for sorting and filtering
    the data, making it easy to model that behavior in a user interface.


    When you want to collect objects by using a unique key, use the *NSDictionary*
    class.


    It implements an associative array that lets you look up objects (values) associated
    with a key.


    ***Note:*** If you’ve used other languages, associative arrays are called a lot
    of different things: hash tables, hashes, maps, and containers are but a few.
    Regardless of name, they all let you find a value with a key.


    Chapter 3: Cocoa Touch: Putting Objective-C to Work


    **73**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Collections**


    You might use an *NSDictionary* to store the data for each row in your list. Since
    you can store *NSString,* *NSDate,* and *NSNumber* in a collection, it’s easy
    to create a collection for that information:


    NSDictionary *personalDetails = [NSDictionary dictionaryWithObjectsAndKeys:


    @″Craig″, @″name″, [NSNumber numberWithInt:50], @″age″];


    You can then query the dictionary collection whenever you need one of the objects:
    NSInteger age = [[personalDetails objectForKey:@″age″] integerValue]; BOOL crankyOldMan
    = NO;


    if (age > 50) {


    crankyOldMan = YES;


    }


    You can use *NSSet* to collect distinct objects whose order isn’t important. Typical
    y, you’ll use this type of collection as you would use a set in mathematics. Methods
    let you test for equality, intersection, and subsets.


    As your application gets more complex, you’ll find that you start to combine these
    collections. For example, your list view could use an *NSArray* for each instance
    of a row and an *NSDictionary* for the actual row data.


    Likewise, it’s possible to have an *NSDictionary* that contains an *NSArray* at
    a key.


    Imagine that your personal details include a *siblingNames* key; that data would
    be well represented by an array. If you don’t have any brothers or sisters, the
    array is empty, and no matter how prolific your parents were, the array would
    grow to fit the size of your family.


    Copying in Depth


    When you make a copy of a collection by sending the *–copy* message, the result
    is a shallow copy of the object. The copied collection can be modified independently
    of the original collection, but the objects in both collections are shared.


    To perform a deep copy of a collection, you use a *copy items* method. For example,
    with an *NSArray,* you use *–initWithArray:copyItems:* like this: NSArray *original
    = [NSArray arrayWithObjects:@″Mimeoscope″, @″Cyclostyle″, nil];


    NSArray *shallowCopy = [original copy];


    **NSArray *deepCopy = [[NSArray alloc] initWithArray:original copyItems:YES];**
    In *shal owCopy,* both objects in the array are the same instances that were in
    the original. The *deepCopy,* on the other hand, has new instances of *“Mimeoscope”*
    and


    *“Cyclostyle”* in the new array.


    The *NSDictionary* and *NSSet* collections use the same pattern with the


    *–initWithDictionary:copyItems:* and *–initWithSet:copyItems:* methods.


    **74**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Mutable Versus**


