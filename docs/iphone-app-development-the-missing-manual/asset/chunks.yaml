- fmt: '# Advanced Web Development Tools


    Advanced web developers will certainly want to check out `David Kaneda`’s plug-in
    for `jQuery`. This toolkit lets you design sophisticated user interfaces with
    nothing more than standard `HTML`, `CSS`, and `JavaScript`.


    ## Discussion


    `http://groups.google.com/group/iphonewebdev`


    This `Google` group is a great place to connect with other developers working
    on `iPhone`-specific projects.


    ## Keeping Up with News and Business


    ### Books


    `iPhone Marketing (O’Reilly)`


    `Rana June Sobhany` gives an in-depth view of what it takes to market your app.
    Through scores of interviews with successful developers, you’ll learn what it
    takes to get your product noticed.


    ### Web


    `http://daringfireball.net`


    `John Gruber`’s popular website, `Daring Fireball`, takes a pragmatic approach
    to tech journalism. Insightful analysis and hype-free reporting make it easy to
    stay up to date with the latest `Apple` news and to learn how it affects your
    business.


    `http://www.mobileorchard.com/`


    `Mobile Orchard`, run by `Dan Grigsby` and `Ari Braginsky`, offers news, tutorials,
    and podcasts featuring interviews with fellow `iPhone` developers. Their weekly
    news roundup is a great way to stay on top of what’s happening in the industry.


    `http://blogs.oreilly.com/iphone/`


    The `Inside iPhone` site is `O’Reilly Media`’s hub for all things related to the
    `iPhone`. You’ll find an active discussion forum along with frequent blog updates
    covering a variety of topics.


    ### Discussion


    `http://groups.google.com/group/iphonesb`


    `iPhone Software Business` is a `Google` group for small, independent `iPhone`
    developers who want to talk to other developers about the business of `iPhone`
    app development. You’ll find a variety of discussions covering marketing, customer
    support, and independent consulting.


    ---


    ## Open Source Resources


    A thriving community of developers works on the `iPhone`. As a result, there’s
    a lot of excellent open source. Besides being a great way to save time implementing
    your project, novice developers can learn from the talented and generous individuals
    that created it.


    `http://joehewitt.com/post/the-three20-project/`


    `Three20` is an extensive open source project by `Joe Hewitt` that includes many
    of the classes used in `Facebook` applications for the `iPhone`. You’ll find a
    photo viewer, controllers, and views for composing messages, along with various
    other utilities such as an `HTTP` disk cache. The project includes a sample application
    that shows how to use each component. If you’re just starting out, you can learn
    a lot just by reading the code of this expert developer.


    `http://touchcode.com/`


    `TouchCode` is an award-winning project started by `Jonathan Wight`. An active
    community of developers has contributed code such as `XML` and `JSON` parsers,
    an embeddable `HTTP` server, user interface views, and much more. This code is
    being used in many `iPhone` apps, so save yourself some time and check it out!


    `http://code.google.com/p/kissxml`


    Unlike `TouchCode`, which offers a lightweight `XML` parser, `KissXML` provides
    a rich parser and the ability to generate `XML` programmatically.


    `http://code.google.com/p/core-plot/`


    If your application has the need to plot graphs, you’d be wise to check out the
    `CorePlot` project. This framework integrates tightly with other frameworks such
    as `Core Animation` and `Core Data` to give you a flexible system for turning
    your numeric data into compelling 2-D visuals.


    `http://github.com/devinross/tapkulibrary`


    The `Tapku Library`, written by `Devin Ross`, is a beautiful collection of user
    interface classes. You’ll find code to do `CoverFlow`, calendars, graphs, loading
    views, and much more. His weblog at `http://devinsheaven.com/` is also a great
    source of information for `iPhone` developers.


    `http://cocos2d.org/`


    The `cocos2d` framework allows you to create rich graphical scenes that include
    sprites. Perfect for 2-D games, demonstrations, and other types of applications
    that require coordination between images and user interaction.


    `http://allseeing-i.com/ASIHTTPRequest/`


    The `ASIHTTPRequest` project provides an easy-to-use wrapper around the `Core
    Foundation` network `API`. If your project interacts with a web server, submits
    multi-part form data using `POST`, or communicates with `REST`-based `APIs`, this
    code can simplify your work. Plenty of good sample code and documentation gets
    you up to speed, too.


    `http://github.com/AlanQuatermain/iPhoneContacts`


    Many developers find the `C`-based `AddressBook` framework tedious to work with.
    Developer `Jim Dovey` has written several `Objective-C` classes that make working
    with your user’s contact information much simpler and easier. You may also want
    to check out `Jim`’s toolkit of useful utility classes at `http://github.com/AlanQuatermain/AQToolkit`.


    `http://github.com/ldandersen/scifihifi-iphone`


    `Buzz Anderson` tackles another difficult area in the `iPhone SDK`: the keychain
    used to store secure information. The `APIs` available in the `Simulator` and
    devices differ slightly, so `Buzz`’s `SFHFKeychainUtils` wraps it all up in a
    class that can be used on both platforms. Also check out his useful user interface
    elements.


    ---


