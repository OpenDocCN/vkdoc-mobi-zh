    press ⌘-4, and select a new class from the drop-down menu.'
  trans: "\n`CGRect applicationFrame = [[UIScreen mainScreen] applicationFrame];`\
    \  \n编写这段代码的原因在于，即使你已知 iPhone 屏幕的确切尺寸（320 × 480，或显示状态栏时的 320 × 460），屏幕的实际大小也可能与预期不符。例如，在通话中或使用网络共享时，状态栏高度为\
    \ 40 像素而非 20 像素。而在横屏模式下，这些数值是从屏幕宽度而非高度中减去的。因此，最好让 Cocoa Touch 为你计算当前屏幕尺寸。\n\n\
    **提示：** 让系统计算屏幕尺寸的另一个原因是：未来你的应用可能会在更大屏幕的设备上运行，例如 iPad 的 1024 × 768 像素显示屏。这样写能提前适应未来的变化！\n\
    \n---\n\n### Windows 与视图\n\n继续查看`Flashlight_ProAppDelegate.m`，你会看到屏幕是如何被激活的。这一切始于以下代码：\n\
    \n`mainViewController.view.frame = applicationFrame;`\n\n很明显，视图的尺寸和位置（`frame`）被设置为整个屏幕。不太明显的是，视图对象此时也正在被**实例化**。\n\
    \n也就是说，由于控制器的视图是惰性加载的，首次访问`MainViewController`的`view`属性会导致该对象从 NIB 文件加载到内存中。因此，执行这行代码会触发`MainViewController`中的`–viewDidLoad`方法被调用。\n\
    \n让视图显示在屏幕上需要两步：首先，将其添加为窗口的子视图；然后，使窗口可见。如下所示：\n\n```\n[window addSubview:mainViewController.view];\n\
    [window makeKeyAndVisible];\n```\n\n这将导致`MainViewController`中的另一个方法被调用：`–viewDidAppear`中的代码会执行。请注意，这并不是该消息被发送的唯一时机；只要视图出现在屏幕上（例如，在查看设置视图后翻转回主视图时），都会触发此消息。\n\
    \n---\n\n## NIB 文件：值得一看\n\n如你在第 86 页的步骤中所见，使用 Interface Builder 创建基本界面非常简单。尽管\
    \ UI 还无法实现任何实用功能，但你可以看到控件和其他视图。这也会开启一个自然循环：添加视图、在控制器中创建 outlet、添加 action，并将 action\
    \ 连接到视图。\n\n---\n\n**图 6-2：** 你检查的第一个 NIB 文件包含对`UIApplication`对象的引用以及`Flashlight_ProAppDelegate`类的一个实例。此外，应用窗口在此定义并在启动时加载。\n\
    \n首先你会注意到，File’s Owner 被设置为`UIApplication`。正如你在第 89 页所见，该对象知晓你的应用的一切信息。当用户启动应用时，它会自动创建。\n\
    \n`UIApplication`可以有一个委托，该委托会在应用状态发生变化时接收消息。在这个 NIB 中，委托的实例以`Flashlight_ProAppDelegate`类型被归档。当该文件被加载时，你会自动获得该对象的一个实例。\n\
    \n注意，File’s Owner 中的`UIApplication`对象有一个连接到`Flashlight_ProAppDelegate`实例的委托。这确保了你的委托能够知道应用状态何时发生变化。如果没有这个重要的连接，`–applicationDidFinishLaunching:`消息将永远不会被发送，最终你将得到一个没有视图的窗口。当你将目标设置中的主\
    \ NIB 文件配置为`MainWindow`时，你就告诉 Cocoa Touch 在启动时自动加载该文件。这个设置是应用引导过程的关键部分！\n\n**提示：**\
    \ 如果第一个 NIB 文件无法显示，请确保`Info.plist`中的`NSMainNibFile`键具有正确的值。\n\n当你展开`Window`实例旁的三角符号时，会看到它有一个`UIImageView`子视图。这就是为什么当你双击\
    \ Window 在 Interface Builder 中查看时，能看到电池图片。\n\n子视图会彼此堆叠。这个带有电池的图片视图位于堆叠的底部。你可能好奇为什么启动应用时看不到这些电池——因为在`–applicationDidFinishLaunching:`的实现中，你在它上面堆叠了其他内容：\n\
    \n`[window addSubview:mainViewController.view]`\n\n然而，堆叠底部的视图仍然存在。这就是为什么每次在主视图和设置视图之间切换时，你都能看到它。\n\
    \n**注意：** 这种视图堆叠被称为**视图层级**。你并不局限于只有一个堆叠。每个视图都可以有自己的视图堆叠，从而允许构建任意深度和宽度的用户界面元素集合。\n\
    \n这个 NIB 文件中最后一个值得关注的连接是：`Flashlight_ProAppDelegate`为窗口设置了一个 outlet。当该对象从文件加载时，实例变量会自动连接，因此任何发送给`window`的消息都会传递到`UIWindow`。\n\
    \n如果这个连接中断，`window`实例变量将为`nil`，那么发送给`–addSubview:`和`makeKeyAndVisible`的消息将被丢弃。最终你只会看到一张电池图片，其他什么也没有——电源故障！\n\
    \n---\n\n### MainView.xib\n\n当你打开这个 NIB 文件并双击 Light View 时，所看到的内容与你运行应用时看到的类似（图\
    \ 6-3）。这很好，因为这就是主控制器视图。\n\n**图 6-3：** 这是应用主视图的 NIB 文件内容。显示光照的视图名为 Light View，它包含工具栏和状态信息等子视图。你还可以看到`MainViewController`负责管理\
    \ Light View 的内容。\n\n#### File’s Owner\n\n注意，File’s Owner 被设置为`MainViewController`。通常，NIB\
    \ 文件的 owner 是导致它被加载的对象。正如你在第 157 页所见，`UIApplication`是 File’s Owner，因为它负责自动加载`MainWindow.xib`。\n\
    \n当你在`–applicationDidFinishLaunching:`中执行以下代码时，`MainViewController`会加载`MainView.xib`：\n\
    \n`MainViewController *controller = [[MainViewController alloc] initWithNibName:@\"\
    MainView\" bundle:nil];`\n\n这使得`MainViewController`成为`MainView.xib`的 File’s Owner。\n\
    \n**注意：** 当你通过 New File 模板创建新的`UIViewController`子类时，可以选择“With XIB for user interface”。启用该选项后，File’s\
    \ Owner 会自动配置完成。\n\n如果出于某种原因需要更改类，你可以在 Interface Builder 中使用 Identity Inspector。只需在对象列表中选择\
    \ File’s Owner，按 ⌘-4，然后从下拉菜单中选择一个新类即可。\n"
- fmt: '# Chapter 6: A Flashlight for Pros


    ## NIB Files: Something to Look At


    When there’s a mismatch between the class used for File’s Owner and the one used
    in your code, a crash with `***NSInternalInconsistencyException***` can occur
    in `–_loadViewFromNibNamed:bundle:`. If the class setting looks right in the NIB,
    also check that the view outlet is set correctly.


    Having the controller as the main object in the NIB file also gives you access
    to the outlets and actions that are defined in the class’ header file. To see
    these connections, select the `MainViewControl er` in the list of objects. Then
    press `⌘-2` to bring up the Connection Inspector, and hover your mouse over each
    outlet and action. The connected view is highlighted in the Light View window.


    ### Views upon Views


    When you open the disclosure triangle to the left of Light View, you see an Info
    View and a Toolbar. If you open the Toolbar, you see “Flasher”, “Disco”, “SOS”,
    and “Settings” separated by “(Flexible Space)”.


    The view for the light has two subviews: one for the information and another for
    the toolbar. The toolbar, in turn, has seven subviews consisting of four buttons
    and three separators (all from the `UIBarButtonItem` class).


    Sometimes it’s easier to navigate via this list than it is to select items from
    the Light View window. If you click Disco, for example, you can press `⌘-1` and
    quickly see that the button’s image is `ToolbarDiscoStart.png`, or press `⌘-2`
    to see that it sends the `toggleDisco` action. You can also use the arrow keys
    to move around in the list of objects to quickly check all your object’s properties
    in the current inspector.


    ### Custom Views


    This NIB file contains two custom views: `LightView` and `IFInfoView`. When you’re
    creating custom views, you’re often faced with a “chicken and egg” problem. You
    want to place an instance of the view in the NIB *before* you have an implementation
    of the class.


    To work around this situation, you can create an instance of a `UIView` in your
    view hierarchy. You can then use this generic view for placement and other basic
    configuration. Then, after you’ve implemented class, you can use Identity Inspector
    (`⌘-4`) to change the Class Identity from `UIView` to the name of your new view.


    You’ll see the implementation of the `LightView` and `IFInfoView` classes later
    in this section (page 169).


    ## View Sizing


    One of Interface Builder’s inspectors has been noticeably absent so far: the one
    that lets you set the size of a view (Figure 6-4). You can access this panel by
    choosing Tools ➝ Size Inspector or by pressing `⌘-3`.


    **Figure 6-4:** You can see the Info View and its settings in the Size Inspector
    panel. The Size & Position values define the origin of the view along with its
    width and height. The Autosizing control shows four anchors and two stretching
    arrows. The Info View is anchored to the left, top, and right edges and will stretch
    horizontally when the parent view’s size changes. The toolbar has similar settings,
    except it’s anchored to the bottom of the view rather than to the top.


    Sometimes you want to specify a view’s frame with parameters. Info View is a good
    example: You want to make sure that it’s in the upper-left corner of the parent
    view and that its height is set to 44 pixels (so it matches the height of the
    toolbar).


    By specifying X and Y coordinates of 0,0, you ensure that the view is placed at
    the upper-left origin. Likewise, a width of 320 and height of 44 set the initial
    width and height.


    ## Autoresizing


    Setting the dimensions is only a start because a view’s size can change as your
    application runs. Whether it’s by doubling the height of the status bar or by
    changing a device orientation, the application’s screen area will vary. Luckily,
    Cocoa Touch provides an elegant mechanism for automatically resizing views. Called
    *autoresizing*, it’s available for any view and is propagated through the hierarchy.


    ### Digging Deeper: Experiments in Resizing


    The “autosizing” preview gives you a hint of the resizing effect, but a better
    way to check your resizing configuration is to change the view’s orientation.
    Even if your app doesn’t support a landscape mode, clicking the arrow in the top-right
    corner of a view window causes automatic resizing to be applied.


    Here are some simple steps in Interface Builder that should help you understand
    this complex feature:


    1. Open the Light View in `MainView.xib`. In the window that appears, click the
    orientation change icon in the upper-right corner.

    2. The view will turn on its side, and both the Info View and Toolbar are repositioned
    correctly, as shown in Figure 6-5. That’s autoresizing in action! Click the orientation
    arrow again, and the view returns to a portrait orientation. The views return
    to their original positions thanks to autoresizing.

    3. Now open the Light View Attributes Inspector (`⌘-1`) and uncheck Autoresize
    Subviews. After you click the orientation control, note how the toolbar falls
    off the bottom of the screen because the view still thinks the height of the light
    view is 460 pixels. Likewise, the information view’s width remains 320 pixels
    even though the screen is now 480 pixels wide.

    4. Since you don’t want to save these changes to your NIB file, use Interface
    Builder’s File ➝ Revert menu item. After clicking the Revert button, the last
    saved version of the file is reloaded.

    5. To see how the view stretching works, select Info View from the list of objects.
    Bring up the Size Inspector (`⌘-3`), and click the width arrows in the middle
    of the autosizing control. (No red arrows should be in the middle of the black
    box.)

    6. Click the orientation control, and you see that the width of the information
    view remains at 320 pixels.

    7. Leave the orientation in landscape. Now you’re going to adjust the anchor point
    for the Toolbar, so select it from the object list and open the Size Inspector.

    8. Change the anchor at the bottom of the view to the top. Click the red anchor
    at the bottom of the black box to turn it off. Then click the anchor above the
    box to turn it on.

    9. Now, when you change the orientation back to portrait, the toolbar moves to
    the middle of the window. That’s because the toolbar is maintaining the same distance
    between the top edges of the toolbar and light view.


    Feel free to play around with the anchor and stretching controls for all of the
    views to get a feel for how things work. Just make sure not to save changes to
    the `MainView.xib` file, or you’re going to have a flashlight that behaves very
    strangely when it resizes!


    When you select Light View and inspect its attributes (`⌘-1`), you see that Autoresize
    Subviews, in the Drawing section, is turned on. When the size of this view changes
    for whatever reason, both the Info View and Toolbar are resized automatically.


    **Figure 6-5:** When you click the orientation change icon in the upper-right
    corner of the Light View window, the view switches between portrait and landscape.
    Use this icon to quickly test the autoresizing behavior of your views. In this
    figure, you’ll see that both the Info View and Toolbar have a new width, but remain
    anchored to the same edges of the screen.'
