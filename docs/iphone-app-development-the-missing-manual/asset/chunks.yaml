  trans: "\n**232**\n\n**iPhone 应用开发：缺失的手册**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# 章节\n\n## 待售\n\n你的 Beta 测试进展顺利，所以现在是时候将注意力转向如何销售最终产品了。iTunes 上有超过 10 万个应用程序，现在轮到你的应用加入它们了。\n\
    \n本章将向你介绍 `iTunes Connect`，这是一个能访问 App Store 中产品数据库的 Web 应用程序。你将使用浏览器来设置财务细节、提供应用信息、设定或更新定价，以及上传最终版本。\n\
    \n你还会遇到苹果公司对每个提交的审核流程。这是 iPhone 开发中比较令人沮丧的领域之一，因此本章将向你展示如何让这个过程更顺畅。\n\n### 签约落笔\n\
    \n你在 `iTunes Connect` 中要做的第一件事，就是与你的新合作伙伴处理法律合同和银行信息。\n\n#### 欢迎\n\n要登录 `iTunes\
    \ Connect`，请在浏览器中访问 `http://itunesconnect.apple.com`。\n\n花点时间将这个网址加入书签——你会经常用到它。在登录屏幕上，输入你的\
    \ iPhone 开发者中心用户名和密码。\n\n> **提示：** 如果你已经登录了开发者网站，只需点击主页右侧栏中的 `iTunes Connect`\
    \ 链接即可。无需再次登录。\n\n**233**\n\n![Image 72](img/index-252_1.jpg)\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### 签约落笔\n\n登录后，你会看到一个表单，要求你接受网站的条款与条件。你只在首次使用 `iTunes Connect` 或苹果更改合同时才会看到此页面。如果你想将你的应用放入\
    \ iTunes，请接受这些条件。\n\n进入 `iTunes Connect` 后，你会看到一个类似图 8-1 的屏幕。\n\n> **图 8-1：**\
    \ `iTunes Connect` 主屏幕，用于管理在 App Store 上分发应用的所有详细信息。某些项目仅在添加或更新应用时使用，而另一些则可能每天都会用到。首先要做的是设置合同、税务和银行信息。\n\
    \n#### 首要事务\n\n首要事务是设置你的合同、税务和银行信息。当你注册 iPhone 开发者账户时，仅提供了联系信息。但商业合作涉及的内容远不止了解彼此的身份。现在是时候让律师、政府和金融机构参与进来了！\n\
    \n点击 `iTunes Connect` 主页上的“合同、税务和银行信息”链接开始准备。加载此页面后，你会看到你已经有一份生效的合同。当你注册成为 iPhone\
    \ 开发者时，苹果给了你一份在全球范围内分发免费应用的合同。如果你不想从 iTunes 赚钱，那么你就算完成了！\n\n##### 合同\n\n与大多数涉及金钱的事情一样，如果你想让苹果支付费用，情况会稍微复杂一些。打开`请求合同`复选框，然后点击`提交`。\n\
    \n（如果你开发团队中的其他人负责处理法律事务，那么应由该人完成这些步骤。）\n\n**234**\n\niPhone 应用开发：缺失的手册\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### 签约落笔\n\n一旦你提交请求，就会看到苹果向你提供的合同——付费应用。该合同指定苹果作为你的代理人/佣金商来销售和分发你的软件，不拥有所有权权益。你同意提供许可应用并支持最终用户。合同还规定了苹果的佣金（30%）、如何在全球范围内收税，以及你的付款时间（月结后\
    \ 45 天内支付）。\n\n> **注意：** 与任何合同一样，你和你的律师应审查整个文档。上一段只是概述。\n\n如果你和你的律师接受这些条件，请点击`同意`复选框并提交表单。你会看到一个确认屏幕，并且合同\
    \ PDF 将通过电子邮件发送给你。点击`完成`返回合同设置屏幕。\n\n##### 联系信息\n\n设置合同的下一步是添加额外的联系信息。`iTunes\
    \ Connect` 允许你为组织中的不同人员分配特定角色。例如，你的财务部门可以访问财务报告，而市场部门可以生成促销代码。\n\n1. 在你的合同`联系信息`中，点击`编辑`。\n\
    \n   下一个屏幕会显示你公司的法律地址以及 `iTunes Connect` 中的角色。目前，只需将所有角色分配给自己即可。随着需求的出现，你可以点击主屏幕上的`管理用户`，创建具有新\
    \ Apple ID 的新用户。\n\n2. 要创建你的联系信息，请点击`新增人员`，然后输入你的 `iTunes Connect` 用户名和电子邮件地址。添加你的职位和电话号码，然后点击`创建`。\n\
    \n   你将返回到联系信息页面。\n\n3. 对于`高级管理`、`财务`、`技术`、`法律`和`促销`角色，请从下拉菜单中选择你的名字。\n\n完成后，点击`提交`按钮进入下一步。\n\
    \n##### 银行信息\n\n联系人确定后，你需要告知苹果将每月获得的收入存入何处。资金将通过两种方式存入：\n\n- **ACH。** 使用自动清算所的标准电子存款。此方式仅适用于美元收入。来自“Apple\
    \ Inc.”的存款是来自美国 iTunes 商店的收益。你还会看到来自“iTunes S.A.R.L.”的存款，用于那些没有自己的 iTunes 商店的国家。\n\
    \n**235**\n\n从 Wow! eBook 下载\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### 签约落笔\n\n- **SWIFT。** 使用环球银行金融电信协会的电汇。来自澳大利亚、加拿大、欧洲、英国和日本 iTunes 商店的收益通过此机制存入。此转账也会按当前汇率将任何外币兑换成美元。不幸的是，许多银行不提供交易来源或所用汇率的信息，这使得核对你的记录变得困难。\n\
    \n两种转账方式都需要一个账号才能完成存款。\n\nACH 转账使用九位数的 ABA 路由号码来确定资金将存入何处。SWIFT 代码用于外国金融机构之间的电汇。\n\
    \n你可以从你的银行获得 ABA 路由号码和 SWIFT 代码。（查看你银行网站上的支持页面：你不是第一个需要它的人。）一旦掌握这些信息，你就可以填写银行信息表：\n\
    \n1. 在“管理你的合同”屏幕上，在“银行信息”下，点击`编辑`。\n\n   你将进入主“银行信息”屏幕。\n\n2. 要开始设置你的银行信息，请点击`添加地址`。输入你账户所在银行的邮寄地址。点击`提交`。\n\
    \n   你应该可以从上一封银行对账单中获得此信息。\n\n3. 输入你的账户信息。\n\n   选择账户使用的货币，然后填写银行和账户持有人的名称字段。选择`账户类型`：你可能希望使用支票账户，以便轻松支取存款。\n\
    \n   其余四个字段特定于你的账户。你可能已经知道你的账号和分行。如上所述，你也可以轻松获得 ABA 号码和 SWIFT 代码。\n\n4. 仔细检查所有信息。\n\
    \n   真的。然后再次检查。如果有任何错误，你将无法收到付款，而且更新信息是一个繁琐的手动过程。\n\n5. 点击`提交`。\n\n   最后一步是证明你输入的信息真实准确，并授权苹果向你的账户付款。\n"
- fmt: '# 6. Turn on the checkbox, check the information one last time, and then click
    **Submit.**


    ## Sign on the Dotted Line


    ### Tax Info


    You’re earning money and—no surprise—the government wants to know about it. The
    last step in setting up a Paid Applications contract is supplying your tax information.
    Since Apple is collecting payments for the sale of your goods, they’re required
    by the IRS to report that income. They do this by electronically submitting a
    Form W-9 on your behalf:


    1. On the main Manage Your Contracts screen, under Tax Info, click **Edit**.

    2. Enter your name as it’s shown on your income tax return. If you have a business
    name that’s different, enter that as well.

    3. If you’re a sole proprietor, select **Individual** from the drop-down menu.
    Otherwise, select the type of business entity that’s appropriate.

    4. For the **Exempt Payee** radio button, consult your accountant. You can download
    a PDF file of Form W-9 from the IRS website (`www.irs.gov`): It details the conditions
    for exemption.

    5. Select your address from the drop-down menu. If necessary, click **Add Address**
    to specify a new address.

    6. Finally, enter a TIN (Tax Identification Number).


    If you’re an individual, use your Social Security Number (SSN). For a business,
    it’s the Employer Identification Number (EIN). Just type the numbers without any
    dashes or other characters.


    7. Turn on the checkbox to certify that the information is correct and then click
    **Submit**.


    ### Final Approval


    Your contract is ready for Apple to process. Back on the Manage Your Contracts
    screen, you see a green checkmark for Setup In Progress, but you still need to
    wait a few days for the information you submitted to be approved. Once everything
    has been sorted out, you see a new entry under “Your Contracts In Effect”. Congratulations,
    you’re now ready to earn money from iTunes!


    ***Tip:*** Don’t wait until the last minute to do this important electronic paperwork.
    If any problems arise with the information you’ve submitted, approval can take
    more than a few days and throw a wrench into your release schedule.


    Below the contracts list are a few additional links for Canadian and Australian
    developers, who need to submit additional tax information. There’s also a very
    important link that many developers overlook—Japanese tax treaty information.
    Not clicking this link can cost you a lot of money!


    ## Stake Your Claim


    If you don’t submit some additional forms to the Japanese tax authorities, your
    earnings will be subject to a 20 percent withholding rate. For every dollar you
    earn in Japan, 20 cents would be left behind. Submitting these forms is a Byzantine
    process that can take up to 90 days to complete, but in the end, it can be worth
    hundreds or even thousands of dollars each year. Remember to check out the link
    at the bottom of the Manage Your Contracts page once your contract goes into effect.


    Another iTunes Connect task you should do as soon as possible is to start adding
    your application’s metadata. You need to provide the information that controls
    how your application is displayed in the App Store (both from within iTunes and
    from the app on the device).


    It’s possible to provide all this information in a single session, but it’s easier
    and safer to work in small chunks. Don’t be afraid to leave placeholder data the
    first time you add your application. You can make updates to the data as your
    release date approaches.


    ***Note:*** The popularity of the App Store has caused iTunes Connect to be unresponsive
    at times. Working in batches reduces the risk of losing time and any data that’s
    been entered.


    Also, since metadata changes happen regularly, some developers track changes in
    a version control system. You can see an example of one such system if you look
    inside the `iTunes` folder of the `Flashlight Pro` project.


    As you enter your information into iTunes, keep one important fact in mind: This
    data helps customers find and purchase your app. Make sure the information is
    clear, concise, and correct.


    To get started entering your metadata, go to iTunes Connect’s main screen (Figure
    8-1) and select Manage Your Applications. At upper left, click the **Add New Application**
    button.


    ### Export Compliance


    When you add a new application, the first question might seem odd: “Does your
    product contain encryption?”


    Since iTunes will make your app available worldwide, Apple will export it outside
    of the United States. Special export requirements apply if your product has the
    ability to encrypt data. The link on the page provides additional information.


    If your product relies on system facilities for managing encrypted data, such
    as the Keychain API to manage a user’s private data or Secure Sockets Layer (SSL)
    for a network connection, you can select **No**. Apple has already authorized
    these parts of the iPhone OS for export.


    ![Image 73](index-257_1.jpg)


    For products that do contain encryption, you need to supply a copy of the commodity
    classification ruling (CCATS) as a part of the submission.


    ### Overview


    Adding a new application entails several screens of information. The first screen
    is Overview, which provides the application’s basic information (Figure 8-2).


    ***Figure 8-2:*** *The first thing you add to iTunes is an overview of your application.
    You have a lot of fields to fill out, but the following sections will help you
    through it.*


    #### Application Name


    The first field in the overview is your application’s name. This field must be
    unique: No products in the App Store have exactly the same name.


    Some developers get around this by making subtle changes to the name. You’ll find
    “Flashlight”, “Flashlight.”, “Flashlight .”, and “Flashlight™” on the App Store.
    The problem with this approach is that it creates confusion for customers: If
    a friend recommends “Flashlight,” which one is he talking about?


    ***Note:*** This field is case insensitive, so `"FLASHLIGHT"` won’t work. And
    you’re left with a missed opportunity to be awesome.


    It’s also important to remember that the Application Name field doesn’t need to
    match what’s displayed on the iPhone’s home screen. You could use a name like
    “Safety Light – World’s Best Flashlight,” but a name that long will get cut off
    in many of the App Store’s screens.


    The best approach is to keep your name short and simple. The name “Safety Light”
    best expresses this app’s unique feature—the rescue beacon. Any promotions or
    reviews that mention the app by name make it easy for a potential customer to
    find it in iTunes.


    Because your product name must be unique amongst hundreds of thousands of other
    names, it’s a good idea to start adding your data into iTunes Connect as soon
    as possible. Some developers even create a placeholder application before they
    write a single line of code. Making sure that you get the name you want also prevents
    last-minute hiccups with your marketing efforts: Changing the name on promotional
    materials at the last minute can be costly!


    Another thing to note about the application name is that you can’t change it once
    it’s in review. You can change it only when you update your application and upload
    a new version.


