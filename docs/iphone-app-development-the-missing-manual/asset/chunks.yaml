    \ = 0`，会得到一个编译错误。\n\n类扩展又来救场了！你可以在实现文件中重写属性定义：\n\n```\n@interface FlashlightModel\
    \ ()\n@property (nonatomic, assign) NSUInteger currentColorIndex;\n...\n@end\n\
    ```\n\n这样你的 `@implementation` 可以写入该属性，但任何使用你的 `@interface` 的人都只能读取它。\n\n#### 类静态变量\n\
    \n在第 100 页，你看到了如何使用类静态变量实现单例模式。手电筒模型对此做了一个细微的变体。类静态变量用于保存颜色名称和值的数组：\n\n```\n+\
    \ (NSArray *)colors {\n    static NSArray *colors = nil;\n    if (colors == nil)\
    \ {\n        colors = [[NSArray alloc] initWithObjects: ...\n```\n\n第一次使用 `+colors`\
    \ 类方法时，数组被分配并在应用的生命周期内保持。\n\n***提示：*** 你可以使用类静态变量来加速应用的某些部分。如果你有一个频繁访问的对象，并且加载该对象需要花费一些时间，你希望尽量减少实例化它的时间。\n\
    \n一个带有 `UIFont` 或 `UIImage` 的静态变量可以在绘制视图时初始化一次并重复使用。这些缓存对象有助于提高 `UITableView`\
    \ 的滚动速度。请记住，你永远不会收回缓存使用的内存，所以只对小对象使用此技术。\n\n类静态变量也用于存储和检索颜色信息的键：\n\n```\nstatic\
    \ NSString *nameKey = @″name″;\nstatic NSString *colorKey = @″color″;\n```\n\n\
    这种方法允许编译器检查键类型并捕获拼写错误。如果你使用 `@″name″` 写入哈希表的数据，而用拼写错误的 `@″nane″` 来读取，你将会挠头不已。通过使用\
    \ `nameKey`，你避免了这种潜在问题。\n\n#### 用户默认设置\n\nCocoa Touch 提供了一个用于存储用户设置的标准机制。它叫做 `NSUserDefaults`，并充当了这个模型的支柱。\n\
    \n例如，当你向模型发送 `–setSpeed:` 消息时，当前速度值被更新，然后通过 `–setFloat:forKey:` 方法作为浮点值存储到标准用户默认设置中：\n\
    \n```\n- (void)setSpeed:(float)newValue {\n    if (newValue != speed) {\n    \
    \    speed = newValue;\n        [[NSUserDefaults standardUserDefaults] setFloat:speed\n\
    \                                                forKey:speedKey];\n    }\n}\n\
    ```\n"
- fmt: "When the model is initialized, the user defaults are checked using `–objectForKey:`\
    \ to see if a speed value has been set. If that method returns a `nil` value,\
    \ a default setting is assigned. Otherwise, the current setting is read with `–floatForKey:`.\n\
    \n```\n- (id)init {\n    if ((self = [super init])) {\n        NSUserDefaults\
    \ *userDefaults = [NSUserDefaults standardUserDefaults];\n        . . .\n    \
    \    if (! [userDefaults objectForKey:speedKey]) {\n            speed = 0.75f;\n\
    \            [userDefaults setFloat:speed forKey:speedKey];\n        }\n     \
    \   else {\n            speed = [userDefaults floatForKey:speedKey];\n       \
    \ }\n        . . .\n    }\n    return self;\n}\n```\n\nIf you had just called\
    \ `–floatForKey` without checking for its object first, you would have gotten\
    \ back a value of zero and not known if that was because it was the user’s choice\
    \ or a nonexistent setting.\n\nSince settings are stored in property lists, the\
    \ object classes that can be stored are `NSArray`, `NSDictionary`, `NSString`,\
    \ `NSData`, `NSDate`, and `NSNumber` (integer, floating-point, and Boolean values).\n\
    \n### Strings in user interfaces\n\nOne of the reasons for keeping a small database\
    \ of colors is to associate a color value with a human-readable name. Remember\
    \ that not all humans read the same language you do. That’s why a simple string\
    \ like `@\"White\"` is wrapped with a localization macro:\n\n```\nNSLocalizedString(@″White″,\
    \ nil)\n```\n\nWhenever you’re using a string value that’s going to show up in\
    \ a user interface, you should localize it using this technique. How these strings\
    \ get assigned and processed will be described when the tour passes by the `Localizable.strings`\
    \ file.\n\n### Pull Yourself Together\n\nNow that you’ve seen the views and models\
    \ in the application, it’s time to examine how controllers make everything work\
    \ together. They’re the glue that pulls your flashlight together.\n\nYou’ve already\
    \ had a preview of the controllers: There’s one controller for each of the NIB\
    \ files that contains a view (page 86, for example). Of course, the basic controller\
    \ created by Xcode doesn’t have any instance variables or actions, nor does it\
    \ have any of the logic specific to the application.\n\nSo hop back in the bus\
    \ and let the tour continue…\n\n### MainViewController\n\nThe design of the main\
    \ flashlight view is simple by design. This leads to a controller that uses both\
    \ models, but only has three view outlets. Two of the views are custom `UIView`\
    \ subclasses. As with most controllers, the interesting part is how it interacts\
    \ with the views and models.\n\n### Digging Deeper: Crack Open a Simulator\n\n\
    The Simulator is a powerful debugging tool. But it has a problem: Every time you\
    \ build and run a new version of your app, it’s copied into a new folder. This\
    \ folder uses a long string of hexadecimal numbers (in the GUID format) and is\
    \ hard to locate.\n\nAnd you want to locate it while debugging, because that’s\
    \ where your application’s documents and settings are stored. When working on\
    \ models, it’s often helpful to locate the backing store for the data. Whether\
    \ the file contains a SQLite database, a property list, or even a plain-text file,\
    \ it’s important that you can verify what’s been written.\n\nHere’s a short shell\
    \ script that you can use to help locate your application data:\n\n```\n#!/bin/sh\n\
    if [ -z \"$1\" ]; then\n    echo \"usage: $0 <app> [ Preferences | <document>\
    \ ]\"\nelse\n    if [ \"$2\" = \"\" ]; then\n        open \"$dir/Library/Preferences\"\
    \n    else\n        open \"$dir/Documents/$2\"\n    fi\nfi\n```\n\nPut this script\
    \ somewhere on your `PATH`, name it `opensim`, and make it executable. Once it’s\
    \ installed, you can use it to find the most recent application loaded in the\
    \ Simulator and open the Preferences, Documents, or a named document in the Finder.\n\
    \nFor example, to open the current Documents folder for the Safety Light application,\
    \ just do this:\n\n`$ opensim \"Safety Light\"`\n\nNo documents are in that folder,\
    \ but if there were, you could open them with:\n\n`$ opensim \"Safety Light\"\
    \ fleshy.db`  \n`$ opensim \"Safety Light\" awesome.plist`"
