    As with your developer certificate-signing request, it’s a good idea to save your
    distribution request file for later use. It’s one less thing to hassle with when
    your beta build is broken because of an expired certificate.


    If you’re using a company account, each of the developers on the team has an individual
    code-signing certificate for development. With a distribution certificate, you
    have only one for your entire company. That’s because Apple wants to verify which
    company created the software, not the individual developer who did the build.


