    do support on a web-based service, via email, or with some other mechanism. But
    if you spread your attention across many different channels, you’ll go crazy.
    And so will your customers, because they won’t know the best way to contact you.


    Choose one method of contact and stick with it.


    **Product Updates**


    After you’ve fixed your initial bugs and completed some simple feature requests,
    it’s time to upload your 1.0.1 release. Luckily, this is much easier than the
    first time, because much of the metadata in iTunes Connect doesn’t need to change.


    New Info


    Obviously, you’ll have made plenty of changes in your source code. But one change
    is more important than all others: You need to update the version number in the
    Info.plist file.


    When you upload a new binary, iTunes Connect checks the value for the version
    number, and if it’s not greater than the current version, the file will be rejected.
    You’ll also want to remember to remove any nonnumeric values from the version
    number (for example, your beta version number).'
  trans: "好的，这是根据您的要求翻译和格式化的中文 Markdown 文档。\n\n---\n\n# 从这些数字中，你可以生成的另一个统计指标是每次点击的销售额。\n\
    \n对于 `BADGE` 徽章，1,152 次点击产生了 1,229.05 美元的销售额，即每次点击 1.07 美元。而 `TWEET_REVIEW` 链接每次点击仅带来\
    \ 0.35 美元。出现这个数字的原因是 `TWEET_REVIEW` 链接被发布到 Twitter 上，提醒关注者去评论 Safety Light 应用。包含签名的联盟链接可以使用像\
    \ `bit.ly` 这样的服务来缩短。如果你查看链接 `http://bit.ly/info/77QJhk` 的信息，你会看到展开后的链接末尾带有 `SAFETY_LIGHT_TWEET_REVIEW`\
    \ 签名。\n\n信息页面还会用图表显示该链接随时间变化的使用情况。\n\n显然，有些点击链接去写评论的人已经购买了该应用，他们不会产生任何新的销售额。实际上，能产生任何销售额都令人惊讶：在查看“签名订单”报告后，似乎大部分佣金都来自其他产品。\n\
    \n## 客户支持\n\n**注意：** 有些签名会被截断，比如“`SAFETY_LIGHT_TW`”。电子邮件客户端、网页浏览器、复制/粘贴错误以及其他处理错误都可能导致这些不完整的签名。你需要学会忽略它们。\n\
    \n你也可以在其他场景中使用这些技巧，例如：\n\n- **找出哪种广告对你的产品最有效。** 为每个发布商分配一个唯一的签名，然后看看在 TouchArcade\
    \ 还是 SlideToPlay 上投放的广告对你的产品效果更好。\n- **测试不同的广告布局和/或文案。** 用“最好的手电筒”还是“拯救你的生命”作为\
    \ Safety Light 的广告语效果更好？展示应用图标还是巧妙的广告语更好？通过投放带有不同签名的各种广告，你就会知道哪种方式最有效。\n\n###\
    \ 客户支持\n\n随着客户群的扩大，你会发现还有一样东西也在增长：支持邮件。\n\n你的客户会遇到问题，而你的工作就是解决这些问题并让他们满意。\n\n\
    #### 一切完美\n\n你做了大量的 Beta 测试并修复了很多 Bug：一切应该都很完美，对吧？不幸的是，答案是否定的。1.0 版本发布后总会出现一些问题。作为一个聪明的开发者，你应该计划在首次发布后的一到两周内推出一个\
    \ 1.0.1 版本。尽管你很可能需要这样做，但不要计划在发布后的几周内去度假。\n\n这个维护版本将解决客户发现的主要问题。你可能还想加入一些用户提出的简单功能请求。\n\
    \n#### 崩溃速成课\n\n在客户安装应用后，iTunes 会开始收集设备上生成的崩溃报告。如第 7 章（第 226 页）所述，这些崩溃报告是自动生成的，包含能让你识别原因的信息。在同步过程中，iTunes\
    \ 会收集这些报告，并将其转发到苹果公司的服务器上。\n\n每周，你的崩溃报告都会被分析并发布到 iTunes Connect 上，供你下载：\n\n1.\
    \ **登录 iTunes Connect（第 233 页）并选择“管理你的应用”。**\n   从列表中选择你的应用以查看其信息。\n2. **点击“崩溃报告”以查看按所使用的操作系统版本分类的应用报告。**\n\
    \   如果你看到“提交的报告太少，无法显示”，那么恭喜你，你的代码运行得很好！\n   如果你没那么幸运，你会看到导致崩溃的类和方法的列表，并按崩溃发生的频率排序。\n\
    3. **点击“下载报告”将崩溃报告复制到你的 Mac 上。**\n   下载的文件会带有 `.crash` 扩展名。\n\n当你将最终的二进制文件上传到\
    \ iTunes Connect 时，你应该已经保存了一份应用副本以及在构建过程中生成的 `dSYM` 文件（第 262 页）。确保 Spotlight 可以找到这些文件。这种\
    \ Mac OS X 搜索技术能让工具找到并处理包含调试信息的文件。\n\n要查看崩溃报告的内容，请在 Xcode 中打开 Organizer 窗口。然后，在\
    \ `IPHONE DEVELOPMENT` 下，选择 `Crash Logs`，并将你下载的 `.crash` 文件拖入窗口顶部的列表中。崩溃报告处理完成后，你会看到额外的类名、方法名以及与你源代码对应的行号。\n\
    \n**提示：** 使用版本控制系统 (VCS)，并在每次发布时为项目打上标签。这样，当需要检索与当前报告的崩溃相对应的源代码、应用和 `dSYM` 文件时就会非常方便。\n\
    \n流行的 Subversion VCS 工具已预装在 Mac OS X Snow Leopard 版本中。要了解更多信息，请在终端窗口中输入 `mansvn`。\n\
    \n如果你在解析符号时遇到问题，请查看 iTunes Connect 崩溃报告页面底部的技术说明 TN2151 的链接。\n\n### 处理支持邮件\n\n\
    当你努力设计、开发和推广了一款人们愿意购买的应用后，其中一小部分客户会对你的应用有疑问或遇到问题。\n\n许多开发者发现，在 iTunes 上他们的销量很高，所以即使只有一小部分用户寻求帮助，最终你也可能需要进行大量的客户支持。养成能够控制支持工作量的习惯。\n\
    \n以下是处理支持问题的一些技巧：\n\n- **对常见问题使用模板回复。** 创建一个文档，其中包含用户经常遇到的问题的解决方案。然后你可以从该文档中复制粘贴，以减少与客户沟通所花费的时间。\n\
    - **把你的模板回复放在你的产品网站上，** 并更新 iTunes Connect 中的“支持 URL”，指向这个 FAQ（常见问题）列表。许多客户在需要联系你之前就能找到他们问题的解决方案。\n\
    - **使用 Twitter 或其他社交网络** 让客户知道影响许多人的问题。告知用户预计修复问题需要多长时间，并在问题已提交审核时通知他们。当修复版本发布时，提醒他们更新。\n\
    - **建立一个功能请求列表。** 你会发现很多好想法都来自支持邮件和社交网络上的评论。保持该列表的更新，便于你在开始开发下一个版本时使用。某些功能会被频繁请求，这时你只需说“谢谢！这个功能已经在我们的功能请求列表中了。”\n\
    - **使用单一的客服联系点。** 无论你通过基于网络的服务、电子邮件还是其他机制来提供支持，这其实并不重要。但如果你将注意力分散到许多不同的渠道上，你将会抓狂。你的客户也一样，因为他们会不知道联系你的最佳方式。选择一种联系方式并坚持下去。\n\
    \n## 产品更新\n\n在修复了最初的 Bug 并完成了一些简单的功能请求之后，就该上传你的 1.0.1 版本了。幸运的是，这比第一次容易得多，因为 iTunes\
    \ Connect 中的许多元数据不需要更改。\n\n### 新信息\n\n显然，你在源代码中做了很多更改。但有一项更改比其他所有更改都重要：你需要更新 `Info.plist`\
    \ 文件中的版本号。\n\n当你上传一个新的二进制文件时，iTunes Connect 会检查版本号的值，如果该值不大于当前版本，文件将被拒绝。你还需要记得从版本号中删除任何非数字字符（例如，你的测试版版本号）。"
- fmt: 'It’s a good idea to use a consistent pattern for your version numbers. Most
    developers increment the value according to the breadth and depth of changes made.


    For example, if your current release is 1.0, you use the following for the next
    release:


    - **1.0.1.** Minor changes in the release. Primarily bug fixes with no new features.


    **Product Updates**


    - **1.1.** Used for a release with significant changes including bug fixes and
    minor new features.

    - **2.0.** A major new version with many bug fixes and features for customers.


    ## Welcome Back, iTunes


    By now, you’re an old pro at iTunes Connect, but there’s still a few new things
    to learn. To update your application, start by updating the metadata:


    1. Log into iTunes Connect and select Manage Your Applications. Then click the
    icon of the application you want to update.

    2. Click the Update Application link to start the update process.


    The first thing you see is a question asking if export compliance has changed.
    It’s likely that the answer is No.


    3. Click Continue.


    You see a screen where you get to provide updated information about the new version.
    Compared with your initial submission, you have fewer fields to fill in.


    4. Start by filling in the Version Number field.


    It should match the version number you assigned in the `Info.plist`. The Name
    and Keywords fields are prefilled with the current values; if you want to change
    them, now’s your chance. Once you submit your updated binary, these fields will
    not be editable.


    The current values for your content rating are also displayed.


    5. Update any values if necessary. Finally, click “Upload application binary later”
    and then click Save Changes.


    After returning to the application screen, you see that the version number has
    been updated and the status is “Waiting for Upload”. You also see your application
    icon appear twice on the Manage Your Applications screen.


    It’s important to note that you shouldn’t update your Application Description
    or any other data at this point. You may have new features to list or updated
    screenshots, but if you make those changes now, they show for the current version.
    Instead, wait until the new version is approved before you do these updates.


    The last step is to upload a new binary. Do a final build just like you did with
    your initial release (page 262), and then click Upload Binary. Use the Choose
    File button to pick the file, and then click Save Changes.


    ## Product Updates


    When you’re done, you’ll see the status as Waiting For Review. Hopefully, it’s
    a short wait!


    ## Upgrades (or Lack Thereof)


    If you’re a developer coming from another software platform, you probably already
    know the benefit of software upgrades. In short, you know how many customers you
    have and how many of them are likely to upgrade. That information, along with
    the cost of the upgrade, tells you how much money you should spend on development.


    Unfortunately, a key part of this equation is missing on the App Store. There’s
    no way to give an existing customer a discount. Each SKU stands by itself. For
    games and other types of entertainment titles, this isn’t a problem. Customers
    are used to paying for additional game play with the same characters and theme.


    Developers of productivity and other more “serious” apps face a difficult decision:
    Do you give away the upgrade for free, or do you charge for a completely new title?


    As you make this decision, keep these things in mind:


    - You’ll have the same data migration problems that you see when a user moves
    from a free to a paid application. The documents and settings for the current
    version won’t carry over to the new version without a significant amount of effort
    on your part.

    - Users will complain. In one example, Loren Brichter, the author of the popular
    Tweetie app (`www.atebits.com/tweetie-iphone`), faced quite a bit of backlash
    when he decided to charge for his 2.0 upgrade. For whatever reason, customers
    felt a sense of entitlement to a free upgrade, even though the cost was only $3.


    Put on your flameproof underpants, because people will voice their discontent
    through social networks and email.


    - If you have a relatively small user base and high development costs, charging
    for an upgrade can make or break your business. If you’re selling to a niche market,
    spend time teaching your customers how ongoing revenue supports the application
    that they love.


    The good news is that if you’re considering doing an upgrade, it means you’ve
    made some money off your first version. Many products never make it this far,
    so feel proud about a job well done.


    ## Product Updates


    Congratulations!


    It seems like just yesterday you were firing up Xcode for the first time to make
    a simple flashlight application. But as you look back, it’s been a long journey,
    and you’ve learned much along the way.


    If you’re like most iPhone developers, as soon as you finish that first app, you’re
    already thinking about the next one. Top researchers have found that the only
    cure for this disease is prolonged exposure to Xcode. Thank goodness you’re now
    fully prepared to administer that antidote.


    So here’s to a long and successful run as an iPhone developer in the App Store:
    You’ve earned it. Cheers!


    ## Appendix A: Where to Go from Here


    There’s always more to learn when it comes to iPhone development. If you find
    yourself confused about one of the topics covered in this book, check out the
    following resources. You can turn to books, websites, and discussion forums for
    answers.


    It’s also important to remember that iPhone development is a nascent industry.
    New technologies and techniques are constantly being discovered. Don’t be afraid
    to use the terminology you’ve picked up in this book in a Google search!


    ### Help with Objective-C


    **Books**


    `http://developer.apple.com/mac/library/documentation/Cocoa/Conceptual/ObjectiveC`


    Many of the books that cover Cocoa also delve into Objective-C. If you’re looking
    for an excellent introduction and complete language reference, *The Objective-C
    2.0 Programming Language* published by Apple can’t be beat. The glossary and index
    are especially helpful as you encounter new terminology and concepts.


    The document is available in PDF format, making it easier for you to print and
    search.


    **Web**


    `http://sealiesoftware.com/blog/`


    If you have *any* question about the internals of Objective-C, Greg Parker has
    already answered it. When you inevitably find yourself in the bowels of an `objc_msgSend`
    crash, you’ll end up on this website with a sigh of relief.


    ### Help with Cocoa


    **Books**


    `http://bignerdranch.com/products.shtml`


    Aaron Hillegass has been teaching programming for many years at his Big Nerd Ranch.
    In *Cocoa Programming for Mac OS X,* he approaches the topic with clear examples
    and an excellent presentation honed from these classes. This book is revered by
    many longtime Mac developers and, despite its title, is relevant for iPhone developers
    looking for a deeper understanding of the classes and design patterns shared by
    both platforms.


    `http://cocoabook.com/`'
