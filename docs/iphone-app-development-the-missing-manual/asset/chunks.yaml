- fmt: "# Most developers set the initial application description to “TBD” (to be\
    \ determined) or some other placeholder. What you put here depends on how you’re\
    \ going to market the product. In the early stages of the product’s life in the\
    \ iTunes database, you probably don’t have that message clearly defined.\n\nSo\
    \ you put it off until later. Just remember that you need to have a real description\
    \ by the time you submit the final product for review. Your app won’t get approved\
    \ if your description is “TBD”.\n\nAs far as the description goes, remember to\
    \ keep it short and sweet. Only the first three lines of text show up on the initial\
    \ screen. Many users in iTunes won’t bother to click “More…” to see additional\
    \ information. And a long description creates a lot of scrolling in the device’s\
    \ App Store application.\n\nThe text of the description can be any Unicode character.\
    \ This means you can use symbols like bullets (•), stars ( ), and other ornaments\
    \ (♥ and •). Just remember that many of these characters look different on the\
    \ desktop than they do on the device.\n\nEmoji glyphs are a good example: They\
    \ don’t appear at all in iTunes on the desktop.\n\nAlso avoid using prices in\
    \ the description. In some cases, it can even lead to an app being rejected during\
    \ review. The problem is that if you write, “PRICE REDUCED TO 99¢,” it doesn’t\
    \ mean anything to someone in France, where the App Store is displaying prices\
    \ in Euros.\n\n**Tip:** Do yourself and your potential customers a favor, and\
    \ check the spelling before you submit your description.\n\n## Stake Your Claim\n\
    \nIf you’re updating an application description because you’re releasing a new\
    \ version of the application, remember that the information will be updated in\
    \ iTunes on that same day, not on the day that the new version is approved. If\
    \ you’re going to list additional features, do the update after they’re available\
    \ in iTunes.\n\n### Device Capabilities\n\nAfter providing your application description,\
    \ you see a question: “Do you want to limit your app to only run on devices with\
    \ specific capabilities?” You need to answer Yes or No, but the answer real y\
    \ doesn’t matter.\n\nIf you click the Yes radio button, you see a link to some\
    \ online documentation that describes how the `UIRequiredDeviceCapabilities` key\
    \ in the `Info.plist` file works. The buttons don’t affect your application’s\
    \ information in any way; it’s just Apple’s way to get you to Read The Fine Print?\n\
    \nWhen the `UIRequiredDeviceCapabilities` key isn’t listed in your app’s `Info.plist`,\
    \ all customers on iTunes will be able to download it. That’s the best goal to\
    \ have, because the greatest number of people will be able to buy and enjoy your\
    \ app. But sometimes your creation will rely on specific hardware features.\n\n\
    For those cases, you need to specify an array of strings that lists the items\
    \ required by your application. For example, you could specify the following in\
    \ your `Info.plist`:\n\n```\n<key>UIRequiredDeviceCapabilities</key>\n<array>\n\
    \    <string>still-camera</string>\n    <string>magnetometer</string>\n</array>\n\
    ```\n\nThe `still-camera` string says that your application won’t function correctly\
    \ unless it can take pictures. iPod touch owners won’t be able to launch the application,\
    \ because that device doesn’t have the camera. Similarly, the `magnetometer` string\
    \ indicates that your app needs the ability to determine a heading. A user with\
    \ an older iPhone won’t be able to use the app, because the compass only became\
    \ available on the 3GS model.\n\n**Tip:** To learn more about device capabilities\
    \ and to see a full list of capability strings, use the documentation viewer to\
    \ search for `UIRequiredDeviceCapabilities`.\n\nWhen you upload your application\
    \ binary to iTunes, the contents of the `Info.plist` file will be examined. This\
    \ final step in the App Store submission process stores the hardware requirements\
    \ along with your other application data. This information will prevent customers\
    \ from installing the application on a device that does not meet the requirements.\n\
    \nYou may be tempted to just leave out the device capabilities information and\
    \ let all customers download and install your application. You’re assured of having\
    \ the largest number of potential buyers, but it also ensures you get the most\
    \ customer support problems if there’s an incompatibility.\n\nBefore making any\
    \ decisions about your app’s hardware requirements, make sure you’ve tested the\
    \ application on a range of devices—even if it means that you need to get on eBay\
    \ to buy a first-generation iPod touch.\n\n### Categories\n\nThe Primary Category\
    \ menu determines where your application appears in iTunes.\n\nYour app will appear\
    \ as a new release and in the Top Downloads lists for the selected category. In\
    \ some cases, the category is also displayed below the app icon and name.\n\n\
    The Secondary Category is optional and only comes into play with the iTunes Power\
    \ Search feature. Your application won’t be listed in both categories. Set it\
    \ to something relevant, but don’t expect it to double the number of customers\
    \ who see your product.\n\n### Copyright and Version\n\nThe next fields are the\
    \ copyright and version that will be displayed on the product page. For the copyright,\
    \ enter the year and your company name: “2010 Squidger Industries”, for example.\
    \ If you don’t add a © symbol, one will be added for you at the beginning of the\
    \ text.\n\nThe version should be just numbers and periods: values like “1.0” or\
    \ “1.0.1”, not “1.0 final” or “Version 1.0”.\n\n### SKU Number\n\nThe SKU (Stock\
    \ Keeping Unit) number can be any sequence of numbers and letters you’d like.\
    \ The only requirement is that this value is unique to your developer account:\
    \ You can’t have two products that use “OMGWTFBBQ001” as the SKU.\n\nBe careful\
    \ about what you choose for this field: Once a value has been submitted, you can’t\
    \ change it under any circumstances.\n\nYou’ll find that this SKU number appears\
    \ as a vendor identifier in the end-of-month financial reports. You may want to\
    \ use the value to sort or filter data, so take that into consideration when making\
    \ your choice.\n\n### Keywords\n\nThe keywords, along with the application and\
    \ company name, are how iTunes finds app matches when users search. Without keywords,\
    \ a search for “flashlight” or “SOS” wouldn’t return any results with the Safety\
    \ Light application.\n\nWhen entering keywords, separate each word with a comma.\
    \ The number of characters in the field is limited to 100 total, so choose your\
    \ keywords wisely. A word processor can be helpful for checking the length of\
    \ your keywords: Bean is a good choice because it displays the character count\
    \ at the bottom of the window as you type. You can download it for free: `http://www.bean-osx.com/`.\n\
    \nAs with the application name, you can edit your keywords up until the final\
    \ binary is submitted. Once that file is uploaded, the keywords are fixed in place\
    \ until your next version. Think careful y about the words you put in your application\
    \ description. Try to put yourself in the customers’ shoes; think about how they\
    \ might search for your application.\n\nAvoid some keywords: Any offensive words\
    \ or trademarked names will cause your application to be rejected. Likewise, if\
    \ you use the names of other popular applications as a way to fool users into\
    \ finding your product, you’ll run afoul of the review process. If you use common\
    \ sense and don’t try to game the system, you’ll be fine.\n\n### URLs and Email"
  raw: 'Most developers set the initial application description to “TBD” (to be determined)
    or some other placeholder. What you put here depends on how you’re going to market
    the product. In the early stages of the product’s life in the iTunes database,
    you probably don’t have that message clearly defined.


    So you put it off until later. Just remember that you need to have a real description
    by the time you submit the final product for review. Your app won’t get approved
    if your description is “TBD”.


    As far as the description goes, remember to keep it short and sweet. Only the
    first three lines of text show up on the initial screen. Many users in iTunes
    won’t bother to click “More…” to see additional information. And a long description
    creates a lot of scrolling in the device’s App Store application.


    The text of the description can be any Unicode character. This means you can use
    symbols like bullets (•), stars ( ), and other ornaments (♥ and •). Just remember
    that many of these characters look different on the desktop than they do on the
    device.


    Emoji glyphs are a good example: They don’t appear at all in iTunes on the desktop.


    Also avoid using prices in the description. In some cases, it can even lead to
    an app being rejected during review. The problem is that if you write, “PRICE
    REDUCED


    TO 99¢,” it doesn’t mean anything to someone in France, where the App Store is
    displaying prices in Euros.


    ***Tip:*** Do yourself and your potential customers a favor, and check the spelling
    before you submit your description.


    **240**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Stake Your Claim**


    If you’re updating an application description because you’re releasing a new version
    of the application, remember that the information will be updated in iTunes on
    that same day, not on the day that the new version is approved. If you’re going
    to list additional features, do the update after they’re available in iTunes.


    *Device Capabilities*


    After providing your application description, you see a question: “Do you want
    to limit your app to only run on devices with specific capabilities?” You need
    to answer Yes or No, but the answer real y doesn’t matter.


    If you click the Yes radio button, you see a link to some online documentation
    that describes how the *UIRequiredDeviceCapabilities* key in the Info.plist file
    works. The buttons don’t affect your application’s information in any way; it’s
    just Apple’s way to get you to Read The Fine Print?


    When the *UIRequiredDeviceCapabilities* key isn’t listed in your app’s Info.plist,
    all customers on iTunes will be able to download it. That’s the best goal to have,
    because the greatest number of people will be able to buy and enjoy your app.
    But sometimes your creation will rely on specific hardware features.


    For those cases, you need to specify an array of strings that lists the items
    required by your application. For example, you could specify the following in
    your Info.plist:


    <key>UIRequiredDeviceCapabilities</key>


    <array>


    <string>still-camera</string>


    <string>magnetometer</string>


    </array>


    The *still-camera* string says that your application won’t function correctly
    unless it can take pictures. iPod touch owners won’t be able to launch the application,
    because that device doesn’t have the camera. Similarly, the *magnetometer* string
    indicates that your app needs the ability to determine a heading. A user with
    an older iPhone won’t be able to use the app, because the compass only became
    available on the 3GS model.


    ***Tip:*** To learn more about device capabilities and to see a full list of capability
    strings, use the documentation viewer to search for *UIRequiredDeviceCapabilities.*


    When you upload your application binary to iTunes, the contents of the Info.plist
    file will be examined. This final step in the App Store submission process stores
    the hardware requirements along with your other application data. This information
    will prevent customers from installing the application on a device that does not
    meet the requirements.


    You may be tempted to just leave out the device capabilities information and let
    all customers download and install your application. You’re assured of having
    the larg-est number of potential buyers, but it also ensures you get the most
    customer support problems if there’s an incompatibility.


    Chapter 8: For Sale


    **241**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Stake Your Claim**


    Before making any decisions about your app’s hardware requirements, make sure
    you’ve tested the application on a range of devices—even if it means that you
    need to get on eBay to buy a first-generation iPod touch.


    *Categories*


    The Primary Category menu determines where your application appears in iTunes.


    Your app will appear as a new release and in the Top Downloads lists for the selected
    category. In some cases, the category is also displayed below the app icon and
    name.


    The Secondary Category is optional and only comes into play with the iTunes Power
    Search feature. Your application won’t be listed in both categories. Set it to
    something relevant, but don’t expect it to double the number of customers who
    see your product.


    *Copyright and Version*


    The next fields are the copyright and version that will be displayed on the product
    page. For the copyright, enter the year and your company name: “2010 Squidger
    Industries”, for example. If you don’t add a © symbol, one will be added for you
    at the beginning of the text.


    The version should be just numbers and periods: values like “1.0” or “1.0.1”,
    not


    “1.0 final” or “Version 1.0”.


    *SKU Number*


    The SKU (Stock Keeping Unit) number can be any sequence of numbers and letters
    you’d like. The only requirement is that this value is unique to your developer
    account: You can’t have two products that use “OMGWTFBBQ001” as the SKU.


    Be careful about what you choose for this field: Once a value has been submitted,
    you can’t change it under any circumstances.


    You’ll find that this SKU number appears as a vendor identifier in the end-of-month
    financial reports. You may want to use the value to sort or filter data, so take
    that into consideration when making your choice.


    *Keywords*


    The keywords, along with the application and company name, are how iTunes finds
    app matches when users search. Without keywords, a search for “flashlight” or
    “SOS”


    wouldn’t return any results with the Safety Light application.


    When entering keywords, separate each word with a comma. The number of characters
    in the field is limited to 100 total, so choose your keywords wisely. A word processor
    can be helpful for checking the length of your keywords: Bean is a good choice
    because it displays the character count at the bottom of the window as you type.
    You can download it for free: *http://www.bean-osx.com/*.


    **242**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Stake Your Claim**


    As with the application name, you can edit your keywords up until the final binary
    is submitted. Once that file is uploaded, the keywords are fixed in place until
    your next version. Think careful y about the words you put in your application
    description. Try to put yourself in the customers’ shoes; think about how they
    might search for your application.


    Avoid some keywords: Any offensive words or trademarked names will cause your
    application to be rejected. Likewise, if you use the names of other popular applications
    as a way to fool users into finding your product, you’ll run afoul of the review
    process. If you use common sense and don’t try to game the system, you’ll be fine.


    *URLs and Email*'
  trans: "\n# 大多数开发者会将应用的初始描述设置为“待定”或其他占位符。此处填写的内容取决于你打算如何营销该产品。在产品进入 iTunes 数据库的早期阶段，你可能尚未明确该描述信息。\n\
    \n因此你将其推迟到以后处理。只需记住，在提交最终产品以供审核时，你需要提供真实的描述。如果你的描述仍是“待定”，应用将无法通过审核。\n\n就描述本身而言，请保持简短精炼。初始屏幕上只会显示前三行文本。iTunes\
    \ 中的许多用户不会费心点击“更多…”来查看额外信息。而冗长的描述会在设备的 App Store 应用中造成大量滚动。\n\n描述文本可以是任何 Unicode\
    \ 字符。这意味着你可以使用符号，例如项目符号 (•)、星号 ( ) 和其他装饰符号 (♥ 和 •)。只需记住，这些字符中的许多在桌面端显示效果与在设备上不同。\n\
    \nEmoji 字符就是一个很好的例子：它们在桌面版的 iTunes 中根本不会显示。\n\n另外，避免在描述中使用价格。在某些情况下，这甚至可能导致应用在审核期间被拒绝。问题在于，如果你写上“价格降至\
    \ 99 美分”，这对身处法国的用户毫无意义，因为那里的 App Store 以欧元显示价格。\n\n**提示：** 为了你和潜在客户着想，在提交描述之前请检查拼写。\n\
    \n## 声明你的权利\n\n如果你因发布新版本而更新应用描述，请记住，相关信息会在当天更新到 iTunes，而不是在新版本获批的那天。如果你要列出新增功能，请在其出现在\
    \ iTunes 中之后再进行更新。\n\n### 设备能力\n\n在提供你的应用描述后，你会看到一个问题：“你是否希望将应用限制为仅能在具有特定功能的设备上运行？”你需要回答“是”或“否”，但实际答案并不重要。\n\
    \n如果你点击“是”单选按钮，你会看到一个指向在线文档的链接，其中描述了 `Info.plist` 文件中的 `UIRequiredDeviceCapabilities`\
    \ 键的工作方式。这些按钮不会以任何方式影响你的应用信息；这只是苹果公司引导你阅读“细则”的方式？\n\n当你的应用的 `Info.plist` 中未列出\
    \ `UIRequiredDeviceCapabilities` 键时，iTunes 上的所有客户都能下载它。这是最佳目标，因为这样最广泛的人群都能购买并享受你的应用。但有时你的创作会依赖特定的硬件功能。\n\
    \n对于这些情况，你需要指定一组字符串，列出你的应用所需的功能。例如，你可以在 `Info.plist` 中指定如下内容：\n\n```\n<key>UIRequiredDeviceCapabilities</key>\n\
    <array>\n    <string>still-camera</string>\n    <string>magnetometer</string>\n\
    </array>\n```\n\n`still-camera` 字符串表示，除非设备能够拍照，否则你的应用将无法正常运行。iPod touch 用户将无法启动该应用，因为该设备没有摄像头。同样地，`magnetometer`\
    \ 字符串表示你的应用需要具备确定方向的能力。较旧款 iPhone 的用户将无法使用该应用，因为指南针功能仅在 3GS 机型上才可用。\n\n**提示：**\
    \ 要了解更多关于设备功能的信息并查看完整的功能字符串列表，请使用文档查看器搜索 `UIRequiredDeviceCapabilities`。\n\n当你将应用二进制文件上传到\
    \ iTunes 时，系统会检查 `Info.plist` 文件的内容。App Store 提交流程中的这最后一步会将硬件需求与你的其他应用数据一同存储。此信息将防止客户在不满足要求的设备上安装该应用。\n\
    \n你可能倾向于忽略设备功能信息，让所有客户都能下载和安装你的应用。这样你确实能拥有最多的潜在买家，但如果存在不兼容问题，这也将确保你遇到最多的客户支持问题。\n\
    \n在就应用的硬件需求做出任何决定之前，请确保你已在一系列设备上测试了该应用——即使这意味着你需要去 eBay 购买一台初代 iPod touch。\n\n\
    ### 类别\n\n主类别菜单决定了你的应用在 iTunes 中的显示位置。\n\n你的应用会作为新发布版本出现在所选类别的热门下载列表中。在某些情况下，类别也会显示在应用图标和名称下方。\n\
    \n次要类别是可选的，仅在 iTunes 的强力搜索功能中起作用。你的应用不会同时被列在两个类别中。将其设置为相关类别即可，但不要指望这能让看到你产品的客户数量翻倍。\n\
    \n### 版权与版本\n\n接下来的字段是会在产品页面上显示的版权与版本信息。对于版权，请输入年份和你的公司名称：例如“2010 Squidger Industries”。如果你没有添加\
    \ © 符号，系统会在文本开头为你自动添加一个。\n\n版本号应仅包含数字和句点：例如“1.0”或“1.0.1”，而不是“1.0 最终版”或“版本 1.0”。\n\
    \n### SKU 编号\n\nSKU（库存单位）编号可以是任何你想要的数字和字母序列。唯一的要求是该值在你的开发者账户中必须是唯一的：你不能有两个产品使用“OMGWTFBBQ001”作为\
    \ SKU。\n\n请谨慎选择此字段的值：一旦提交了某个值，你在任何情况下都无法更改它。\n\n你会发现这个 SKU 编号在月末财务报告中会作为供应商标识符出现。你可能希望用这个值来排序或筛选数据，因此在做选择时要考虑到这一点。\n\
    \n### 关键词\n\n关键词，连同应用名称和公司名称，是 iTunes 在用户搜索时寻找匹配应用的方式。没有关键词，搜索“手电筒”或“SOS”将不会在\
    \ Safety Light 应用上返回任何结果。\n\n输入关键词时，请用逗号分隔每个词。该字段的字符数限制为总共 100 个，因此请明智地选择你的关键词。使用文字处理软件有助于检查关键词长度：Bean\
    \ 是一个不错的选择，因为它在你输入时会显示窗口底部的字符数。你可以免费下载它：`http://www.bean-osx.com/`。\n\n与应用名称一样，你可以在最终二进制文件提交之前编辑你的关键词。一旦该文件上传，关键词就会被固定下来，直到你的下一个版本。仔细考虑你在应用描述中使用的词语。试着站在客户的角度思考；想想他们可能会如何搜索你的应用。\n\
    \n避免使用某些关键词：任何冒犯性词语或商标名称都会导致你的应用被拒绝。同样，如果你使用其他流行应用的名称来欺骗用户找到你的产品，你将遭遇审核流程的反对。如果你运用常识且不试图钻空子，你就没问题。\n\
    \n### URL 和电子邮件\n"
- fmt: 'The next group of input fields is for your URLs and support email address.
    The `Application URL` field isn’t required, but it’s highly recommended, since
    it’s the first one that appears in iTunes (under the application’s description).
    The text label for the URL is generated automatically using your iPhone Developer
    account information. If you have a company account, you see something like “Squidger
    Industries Web Site”, while individual accounts, for example, would display “Al
    Czervik Web Site”. If you have a website that shows all the products you sell
    in the App Store, it’s a good candidate for this field.


    A `Support URL`, on the other hand, is required and should point to a page where
    customers can get more information about your product. Also have an email address
    or some type of contact form on that web page—it’ll be the only way customers
    can contact you.


    **Tip:** The `Support URL` also appears in the App Store application on the device.
    Unfortunately, it’s not a clickable link, so it’s harder (and less likely) for
    a user to visit your product web page.


    But what about the next field, `Support Email Address`? Can’t customers send you
    email using the value you enter there? Unfortunately, Apple only uses this email
    address in the event that *they* need to contact you about the application.


    ## Demo Account


    Another optional field is “Demo Account – Full Access”. The information you supply
    here is to help Apple’s review staff evaluate your application. If your app communicates
    with a web service that requires a login, such as an online scoreboard or a social
    network, you need to provide access information for the reviewers.


    ## EULA


    Some apps need a custom End User License Agreement (EULA). Links at the bottom
    of the Overview screen let you specify any special terms required by your legal
    department.


    **Stake Your Claim**


    The license agreement that you submit can’t have any markup—just text and line
    breaks. If you supply a custom `EULA`, a link labeled “Application License Agreement”
    appears next to the support link on the product page. In the App Store application
    a similar link is at the bottom of the scrolling list.


    If you don’t specify a `EULA`, you’ll be covered by Apple’s standard license agreement.
    (There’s a link to view this document at the bottom of the Overview screen.)


    **Before moving on**


    You need to supply data for all the required fields before you click the `Continue`
    button at the bottom of the screen. Again, if you don’t have all the necessary
    data, you can supply “TBD” or some other placeholder. All of the values, except
    the version and SKU numbers, remain editable until you submit the final binary.


    If any validation errors occur, they appear at the top of the screen in red. The
    most likely error is that the application name is already in use by another developer.
    If you see this error, try submitting another one. This process is as much a marketing
    exercise as a technical one, so make sure to get input from other people in your
    organization.


    ## Ratings


    After you’ve completed the overview, the next step is to rate your application.
    If your application contains any obscene, pornographic, offensive, defamatory,
    or other content that Apple doesn’t approve of, it’s not going to be listed in
    the App Store (Figure 8-3).


    **Figure 8-3:** The iPhone and iPod touch both have parental controls. By rating
    your app, you’re letting parents restrict content inappropriate for their children.


    **Stake Your Claim**


    Even if your content isn’t objectionable, it still needs to be rated. That’s because
    the iPhone OS has parental controls. Parents can configure, for example, a child’s
    iPod touch to install only content with the appropriate rating. To see how these
    controls work, open the `Settings` app on your iPhone and navigate to `General
    ➝ Restrictions`.


    Once Restrictions are turned on, a parent can specify “Don’t Allow Apps”, “4 to
    17 years or older”, or “Allow All Apps in the Allowed Content” section. Entering
    a passcode is required for the user to change these settings.


    Setting the rating is simple: Just select the radio buttons according to the different
    kinds of content in your app. Each type of content will either be “None”, “Infrequent/Mild”,
    or “Frequent/Intense”, and the overall rating will be updated as you change the
    selections.


    If you see “No Rating”, Apple won’t allow the application in the store. If you’re
    skirting on the edges of what’s acceptable, it’s a good idea to experiment with
    these radio buttons while you’re designing the app. As with the application name
    and keywords, you can’t change ratings once your application binary is submitted.
    You can update them with each new version you submit.


    Once you’re satisfied with your rating, click `Continue` to advance to the next
    screen.


    ## Upload—Show It Off


    Now’s the time to really show off your app! The `Upload` tab (Figure 8-4) is where
    you submit your application icon and screenshots that customers will use to check
    out your app before they make a purchase.


    **Figure 8-4:** The `Upload` tab in iTunes Connect lets you submit your application
    icon and other graphics. You can click the preview links under each item to make
    sure the file transferred correctly. Also make sure that the “Upload application
    binary later” checkbox is turned on.


    **Stake Your Claim**


    ### Application binary


    Skip uploading the first file, Application, by turning on the “Upload application
    binary later” checkbox, for these reasons:


    - **You want to get your metadata into iTunes as soon as possible.** That means
    you probably don’t even have an application binary to submit: It’s not uncommon
    to start setting things up even before you start your beta test!

    - **iTunes Connect has a history of being unreliable.** A combination of many
    developers and high loads on an evolving system results in more downtime than
    anyone likes. It can take awhile to upload your application binary, and if any
    kind of problem arises during that time, you lose the other metadata you’ve entered.


    The only items that are required on this page are the “Large 512 × 512 Icon” and
    the Primary Screenshot. And even if you don’t have final versions of these files,
    you can upload a placeholder graphic that can be replaced as your release date
    approaches.


    ### Application icon


    The application icon graphic is much larger than the 57 × 57-pixel icon that you
    use in the code. If your designer produced your icon with illustration software
    that produces vector graphics, it will be a simple matter to scale up that image.
    If not, she’ll have some extra work to do. You don’t want to scale up a non-vector
    graphic because it’ll get pixilated and blurry; that’s a terrible first impression
    to make with your customers.


    Of course, the advantage of using this separate graphic is that it doesn’t have
    to be exactly the same as the one that appears on the iPhone home screen. Many
    developers put “ON SALE” and other sales messages on this file during their promotions.


    Just keep in mind that this 512 × 512 graphic will be scaled down significantly.
    Make sure any text or details look OK after being reduced in size.


    This graphic is used in iTunes only on the desktop. The App Store on the device
    uses the same 57 × 57-pixel icon from the application. All promotional badges
    that you use won’t be seen by a majority of potential customers.'
  raw: 'The next group of input fields is for your URLs and support email address.
    The Application URL field isn’t required, but it’s highly recommended, since it’s
    the first one that appears in iTunes (under the application’s description). The
    text label for the URL is generated automatical y using your iPhone Developer
    account information. If you have a company account, you see something like “Squidger
    Industries Web Site”, while individual accounts, for example, would display “Al
    Czervik Web Site”. If you have a website that shows all the products you sell
    in the App Store, it’s a good candidate for this field.


    A Support URL, on the other hand, is required and should point to a page where
    customers can get more information about your product. Also have an email address
    or some type of contact form on that web page—it’ll be the only way customers
    can contact you.


    ***Tip:*** The Support URL also appears in the App Store application on the device.
    Unfortunately, it’s not a clickable link, so it’s harder (and less likely) for
    a user to visit your product web page.


    But what about the next field, Support Email Address? Can’t customers send you
    email using the value you enter there? Unfortunately, Apple only uses this email
    address in the event that *they* need to contact you about the application.


    *Demo Account*


    Another optional field is “Demo Account – Full Access”. The information you supply
    here is to help Apple’s review staff evaluate your application. If your app communicates
    with a web service that requires a login, such as an online scoreboard or a social
    network, you need to provide access information for the reviewers.


    *EULA*


    Some apps need a custom End User License Agreement (EULA). Links at the bottom
    of the Overview screen let you specify any special terms required by your legal
    department.


    Chapter 8: For Sale


    **243**


    ![Image 74](index-262_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Stake Your Claim**


    The license agreement that you submit can’t have any markup—just text and line
    breaks. If you supply a custom EULA, a link labeled “Application License Agreement”


    appears next to the support link on the product page. In the App Store application
    a similar link is at the bottom of the scrolling list.


    If you don’t specify a EULA, you’ll be covered by Apple’s standard license agreement.


    (There’s a link to view this document at the bottom of the Overview screen.) *Before
    moving on*


    You need to supply data for all the required fields before you click the Continue
    button at the bottom of the screen. Again, if you don’t have all the necessary
    data, you can supply “TBD” or some other placeholder. All of the values, except
    the version and SKU numbers, remain editable until you submit the final binary.


    If any validation errors occur, they appear at the top of the screen in red. The
    most likely error is that the application name is already in use by another developer.
    If you see this error, try submitting another one. This process is as much a marketing
    exercise as a technical one, so make sure to get input from other people in your
    organization.


    Ratings


    After you’ve completed the overview, the next step is to rate your application.
    If your application contains any obscene, pornographic, offensive, defamatory,
    or other content that Apple doesn’t approve of, it’s not going to be listed in
    the App Store (Figure 8-3).


    ***Figure 8-3:***


    *The iPhone and iPod*


    *touch both have*


    *parental controls.*


    *By rating your*


    *app, you’re letting*


    *parents restrict content*


    *inappropriate for their*


    *children.*


    **244**


    iPhone App Development: The Missing Manual


    ![Image 75](index-263_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Stake Your Claim**


    Even if your content isn’t objectionable, it still needs to be rated. That’s because
    the iPhone OS has parental controls. Parents can configure, for example, a child’s
    iPod touch to install only content with the appropriate rating. To see how these
    controls work, open the Settings app on your iPhone and navigate to General➝Restrictions.


    Once Restrictions are turned on, a parent can specify “Don’t Allow Apps”, “4 to
    17 years or older”, or “Allow All Apps in the Allowed Content” section. Entering
    a passcode is required for the user to change these settings.


    Setting the rating is simple: Just select the radio buttons according to the different
    kinds of content in your app. Each type of content will either be “None”, “Infrequent/


    Mild”, or “Frequent/Intense”, and the overall rating will be updated as you change
    the selections.


    If you see “No Rating”, Apple won’t allow the application in the store. If you’re
    skirt-ing on the edges of what’s acceptable, it’s a good idea to experiment with
    these radio buttons while you’re designing the app. As with the application name
    and keywords, you can’t change ratings once your application binary is submitted.
    You can update them with each new version you submit.


    Once you’re satisfied with your rating, click Continue to advance to the next
    screen.


    Upload—Show It Off


    Now’s the time to real y show off your app! The Upload tab (Figure 8-4) is where
    you submit your application icon and screenshots that customers will use to check
    out your app before they make a purchase.


    ***Figure 8-4:***


    *The Upload tab in*


    *iTunes Connect lets*


    *you submit your*


    *application icon and*


    *other graphics. You*


    *can click the preview*


    *links under each*


    *item to make sure*


    *the file transferred*


    *correctly. Also make*


    *sure that the “Upload*


    *application binary*


    *later” checkbox is*


    *turned on.*


    Chapter 8: For Sale


    **245**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Stake Your Claim**


    *Application binary*


    Skip uploading the first file, Application, by turning on the “Upload application
    binary later” checkbox, for these reasons:


    • **You want to get your metadata into iTunes as soon as possible.** That means
    you probably don’t even have an application binary to submit: It’s not uncommon
    to start setting things up even before you start your beta test!


    • **iTunes Connect has a history of being unreliable.** A combination of many
    developers and high loads on an evolving system results in more downtime than
    anyone likes. It can take awhile to upload your application binary, and if any
    kind of problem arises during that time, you lose the other metadata you’ve entered.


    The only items that are required on this page are the “Large 512 × 512 Icon” and
    the Primary Screenshot. And even if you don’t have final versions of these files,
    you can upload a placeholder graphic that can be replaced as your release date
    approaches.


    *Application icon*


    The application icon graphic is much larger than the 57 × 57-pixel icon that you
    use in the code. If your designer produced your icon with il ustration software
    that produces vector graphics, it will be a simple matter to scale up that image.
    If not, she’ll have some extra work to do. You don’t want to scale up a non-vector
    graphic because it’ll get pixilated and blurry; that’s a terrible first impression
    to make with your customers.


    Of course, the advantage of using this separate graphic is that it doesn’t have
    to be exactly the same as the one that appears on the iPhone home screen. Many
    developers put “ON SALE” and other sales messages on this file during their promotions.


    Just keep in mind that this 512 × 512 graphic will be scaled down significantly.
    Make sure any text or details look OK after being reduced in size.


    This graphic is used in iTunes only on the desktop. The App Store on the device
    uses the same 57 × 57-pixel icon from the application. All promotional badges
    that you use won’t be seen by a majority of potential customers.'
  trans: '

    下一组输入字段用于填写您的网址和支持邮箱地址。`Application URL`字段并非必填，但强烈建议填写，因为它是 iTunes 中（在应用描述下方）首先显示的链接。该
    URL 的文本标签会根据您的 iPhone 开发者账户信息自动生成。如果您拥有公司账户，您会看到类似“Squidger Industries Web Site”的内容；而个人账户，例如，则会显示为“Al
    Czervik Web Site”。如果您有一个展示您所有在 App Store 销售产品的网站，那么它就很适合填入此字段。


    另一方面，`Support URL`是必填字段，应指向一个客户可以获取有关您产品更多信息的页面。同时，请在该网页上提供一个邮箱地址或某种联系表单——这将是客户联系您的唯一途径。


    **提示：** `Support URL`也会出现在设备上的 App Store 应用中。遗憾的是，它并非可点击的链接，因此用户访问您产品网页的难度更大（且可能性更低）。


    那么下一个字段`Support Email Address`呢？客户不能通过您在此输入的值给您发送电子邮件吗？遗憾的是，Apple 仅会在*他们*需要就应用相关事宜联系您时使用此邮箱地址。


    ## Demo Account


    另一个可选字段是“Demo Account – Full Access”。您在此提供的信息旨在帮助 Apple 的审核人员评估您的应用。如果您的应用需要与需要登录的网络服务（例如在线排行榜或社交网络）通信，那么您需要为审核人员提供访问信息。


    ## EULA


    某些应用需要自定义最终用户许可协议（EULA）。概览屏幕底部的链接允许您指定您的法务部门要求的任何特殊条款。


    **明确声明**


    您提交的许可协议不能包含任何标记格式——仅限文本和换行符。如果您提供了自定义的`EULA`，则在产品页面上，支持链接旁边会出现一个标有“Application
    License Agreement”的链接。在 App Store 应用中，类似的链接位于滚动列表的底部。


    如果您未指定`EULA`，则将适用 Apple 的标准许可协议。（概览屏幕底部有一个查看此文档的链接。）


    **继续之前**


    在点击屏幕底部的`Continue`按钮之前，您需要为所有必填字段提供数据。同样，如果您尚未准备好所有必要数据，可以填写“TBD”或其他占位符。除了版本和
    SKU 编号之外，所有值在您提交最终二进制文件之前都是可编辑的。


    如果出现任何验证错误，它们会以红色显示在屏幕顶部。最常见的错误是应用名称已被其他开发者使用。如果看到此错误，请尝试提交另一个名称。这个过程既是一项营销活动，也是一项技术工作，因此请务必从您组织中的其他人那里获取意见。


    ## Ratings


    完成概览后，下一步是为您的应用评级。如果您的应用包含任何淫秽、色情、攻击性、诽谤性或 Apple 不认可的其他内容，它将无法在 App Store 中上架（图
    8-3）。


    **图 8-3：** iPhone 和 iPod touch 均设有家长控制功能。通过对您的应用进行评级，您可以让家长限制其孩子接触不适宜的内容。


    **明确声明**


    即使您的内容并无不妥，也仍然需要评级。这是因为 iPhone OS 具有家长控制功能。例如，家长可以将其孩子的 iPod touch 配置为仅安装具有相应评级的内容。要了解这些控制功能的工作原理，请打开
    iPhone 上的`Settings`应用，并导航至`General ➝ Restrictions`。


    一旦启用“访问限制”，家长可以在“允许的内容”部分指定“不允许应用”、“4 至 17 岁或以上”或“允许所有应用”。用户更改这些设置时需要输入密码。


    设置评级非常简单：只需根据您应用中不同类型的内容选择相应的单选按钮即可。每种类型的内容要么是“无”，要么是“偶尔/轻微”，要么是“频繁/强烈”，整体评级将随您的选择而更新。


    如果您看到“No Rating”，Apple 将不允许该应用在商店中上架。如果您的内容处于可接受范围的边缘，那么在应用设计阶段尝试调整这些单选按钮是个好主意。与应用名称和关键词一样，一旦您提交了应用二进制文件，就无法再更改评级。您可以在每次提交新版本时更新它们。


    对评级满意后，点击`Continue`进入下一个屏幕。


    ## Upload—Show It Off


    现在是真正展示您应用的时候了！`Upload`标签页（图 8-4）是您提交应用图标和截图的地方，客户在购买前会通过这些来了解您的应用。


    **图 8-4：** iTunes Connect 中的`Upload`标签页允许您提交应用图标和其他图形文件。您可以点击每个项目下的预览链接，以确保文件正确传输。同时，请确保“Upload
    application binary later”复选框处于选中状态。


    **明确声明**


    ### Application binary


    通过选中“Upload application binary later”复选框，跳过上传第一个文件“Application”，原因如下：


    -   **您希望尽快将元数据录入 iTunes。** 这意味着您可能甚至还没有要提交的应用二进制文件：甚至在开始 Beta 测试之前就开始进行设置的情况并不少见！

    -   **iTunes Connect 历来不太可靠。** 众多开发者与一个不断演进的系统上的高负载相结合，导致比任何人期望的都更多的停机时间。上传应用二进制文件可能需要一段时间，如果在此期间出现任何问题，您将丢失已输入的其他元数据。


    此页面上唯一必填的项目是“Large 512 × 512 Icon”和主截图。即使您没有这些文件的最终版本，也可以上传占位图形，并随着发布日期的临近进行替换。


    ### Application icon


    应用图标图形比您在代码中使用的 57×57 像素图标要大得多。如果您的设计师使用能够生成矢量图形的插图软件制作了图标，那么放大该图像将很简单。如果不是，他们则需要做一些额外的工作。您不希望放大非矢量图形，因为它会变得像素化且模糊；这会给您的客户留下非常糟糕的第一印象。


    当然，使用这个独立图形的好处在于它不必与 iPhone 主屏幕上显示的图标完全相同。许多开发者在促销期间会将“ON SALE”和其他促销信息放在此文件上。


    请记住，这个 512×512 的图形会被显著缩小。请确保任何文本或细节在缩小尺寸后看起来仍然良好。


    此图形仅在桌面端的 iTunes 中使用。设备上的 App Store 使用应用中相同的 57×57 像素图标。您使用的所有促销徽章，大多数潜在客户都不会看到。

