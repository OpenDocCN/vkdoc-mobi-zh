    Wrapping It Up


    This iPhone app is looking good. It’s now time to start beta testing and getting
    it ready for sale on iTunes. Your coding phase is about to end, but you still
    have a lot of work to do!


    Chapter 6: A Flashlight for Pros


    **209**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Part Three:**


    iii


    **The Business end**


    Chapter 7: Finishing Touches


    Chapter 8: For Sale


    Chapter 9: You’ve Got Customers


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    chapter


    **Finishing Touches**


    You’ve now finished coding the best thing ever seen in the App Store. Or have
    you?


    Now’s the time to put the final spit and polish on your app. That includes testing
    your creation with a wider group of people and their devices. Since your development
    is winding up, now’s the perfect opportunity to clean up your interface graphics.
    Then it’s time to start working on screenshots and other promotional materials
    for a product website.


    **Beta Testing**


    Testing your application before submitting it to the App Store is an important
    part of the development process. Getting your work in front of other people will
    help you find problems with both your design and code.


    Your App Works for You…But


    You and your development team already know how the application works. You’re intimately
    familiar with how each component should function. The code runs perfectly on your
    test devices.


    In other words, you’re the exact opposite of every single person who will download
    your product from the App Store.


    *Users find the darnedest things*


    Giving your application to people who’ve never seen it generates a lot of great
    feedback. As you learned on page 113, customers are your greatest feedback mechanism,
    and beta testers are your first customers.


    **213**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Beta Testing**


    When you give your application to other people, two things will happen:


    • They’ll find bugs in your code.


    • They’ll find things they don’t understand.


    Finding bugs in your brand-new code may be disappointing, but it’s much better
    than the alternative. If you release something to the App Store and find that
    a large percentage of your users are having an issue, you’ll be in quite a predicament.
    It takes many days for a new version of the app to be reviewed by Apple and made
    available for users. During that time, customers will be leaving bad reviews in
    iTunes, you’ll get bad press, and you’ll be sweating bullets.


    But if a large portion of your *test* group doesn’t understand how a feature works
    or gets frustrated using your app, that’s great news. It means one of your design
    decisions was wrong. Don’t get upset when you hear this feedback: Every developer
    has gotten such feedback at one point or another. Now’s your chance to put things
    right before customers in the App Store complain about the same thing!


    *Flashlight improvements*


    In fact, the flashlight you saw in the last chapter went through some design revisions
    based on tester feedback. You may encounter some issues like these in your own
    apps:


    • Several people in the test group found that it was cumbersome to change the
    brightness quickly. They had to go in and out of settings each time to adjust
    the light level. What they real y wanted was a simple gesture to lower the brightness
    temporarily. That’s how the single tap in *LightView* was born.


    • Another tester complained of how easy it was to inadvertently turn off the flasher.
    She was using the Safety Light in an armband during her evening workout and accidental
    y tapping on the toolbar while running. The single tap gesture in *LightView*
    was extended to a double-tap that locked the screen.


    • The designer-type in the bunch wanted some visual flair in the app. The settings
    view looked cool enough, but he wanted something that no other flashlight on the
    App Store had—batteries! The background that you see when flipping to settings
    was an easy feature to add by putting a *UIImageView* in the *MainWindow.*


    The flashlight’s code had a few bugs that you wouldn’t have found without the
    help of the beta testers:


    • The Italian localization didn’t display correctly in some cases because of problems
    in *Localizable.strings.* This user also discovered an issue with long messages
    not being displayed correctly in *IFInfoView.*


    • Another tester found a bug that had never been considered by the development
    team: You could dim the brightness of the light and start the SOS flasher. That
    prevented the warning signal from being as effective as possible.


    Luckily, there weren’t any serious problems, and the beta test went smoothly!


    **214**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Beta Testing**


    Ad Hoc & Roll


    So how do you get this beta version to your testers? With a mechanism called *Ad
    hoc* *distribution.* This technique lets you share your iPhone app with up to
    100 testers.


    But first you need to make a few more changes to your project so these users can
    run it on their iPhone or iPod touch.


    *Gather your testers*


    The first step is to collect device IDs from potential testers. You can use the
    same techniques as you used on page 137\. For most of your testers, clicking the
    serial number in iTunes or running the free Ad Hoc Helper application from the
    App Store is the easiest way to get the 40-character UDID string.


    As a part of this process, also get the testers’ email address and the type of
    device they have. You’ll use the email addresses to set up a mailing list. Knowing
    which type of device they’re testing on will be helpful in debugging hardware-specific
    problems.


    ***Tip:*** Remember that your iPhone developer account limits you to 100 devices
    for the entire year. Keep the number of people in your beta test well below this
    number.'
  trans: "\n# `settings` 视图采用了这种方法。亮度和闪光灯速度使用图标代替文字，无需翻译，所有语言的用户都能理解滑块的功能。\n\n## `AboutView.xib`\n\
    \n尽管你尽力只翻译文字，但有时本地化需要单独的 NIB 文件。例如，如果你正在为游戏制作帮助屏幕，画面中会有大量环绕图像和控件的文本。与其让文本适配单一布局，不如直接改变整个屏幕的布局来得更容易。\n\
    \n`AboutView.xib` 文件就是一个例子。你会看到该文件同时出现在 `English.lproj` 和 `Italian.lproj` 文件夹中。Cocoa\
    \ 会根据用户的语言设置加载正确的 NIB 文件。你可以更改布局的任何部分；只需确保操作和输出口保持不变即可。如果按钮与其操作之间的连接中断，就会出现一个只有使用该语言的用户才会遇到的错误。\n\
    \n## 如何本地化一个文件\n\n你可能已经注意到，可本地化的文件在 `Groups & Files` 列表中会显示一个展开三角。点击该控件时，会显示一个语言列表。Xcode\
    \ 对待可本地化文件的方式与普通文件不同。\n\n以下是创建可本地化文件的方法：\n\n1. 在 Xcode 的 `Groups & Files` 列表中，选择你要本地化的文件。\n\
    2. 选择 `File ➝ Get Info` 调出 `File Inspector` 窗口。\n3. 在 `File Inspector` 中，点击 `Make\
    \ File Localizable` 按钮。此操作会将现有文件移动到一个 `English.lproj` 文件夹中。此时展开三角也会出现。\n4. 在 `File\
    \ Inspector` 中，点击 `General` 标签，左下角会出现一个 `Add Localization` 按钮。点击它。\n5. 系统会提示你输入本地化的新名称。你可以输入\
    \ *Italian*、*French*、*German*、*Spanish*、*Japanese* 或 iPhone OS 支持的任何其他语言。\n\n\
    ## 总结\n\n这个 iPhone 应用看起来不错。现在是时候开始 Beta 测试，并准备在 iTunes 上架销售了。你的编码阶段即将结束，但你还有很多工作要做！\n\
    \n第 6 章：专业手电筒\n\n---\n\n**第三部分：商业环节**\n\n第 7 章：后期润色  \n第 8 章：上架销售  \n第 9 章：你有了客户\n\
    \n---\n\n# 第 7 章：后期润色\n\n现在，你已完成了 App Store 上最棒应用的编码工作。真的吗？\n\n现在是为你的应用做最后打磨抛光的时候了。这包括让更广泛的用户群体及其设备来测试你的作品。由于开发工作已接近尾声，现在正是清理界面图形的好时机。然后，就该开始为产品网站制作截图和其他推广材料了。\n\
    \n## Beta 测试\n\n在将应用提交到 App Store 之前对其进行测试，是开发过程中的重要一环。让你的作品展现在其他人面前，将帮助你发现设计和代码中的问题。\n\
    \n### 你的应用对你有效……但\n\n你和你的开发团队已经知道这个应用是如何工作的。你非常熟悉每个组件应该如何运作。代码在你的测试设备上完美运行。\n\n\
    换句话说，你与每个将从 App Store 下载你产品的人完全相反。\n\n*用户总能发现最离奇的问题*\n\n将你的应用交给从未见过它的人，会产生大量宝贵的反馈。正如你在第\
    \ 113 页所学到的，客户是你最强大的反馈机制，而 Beta 测试者就是你的第一批客户。\n\n---\n\n当你把应用交给其他人时，会发生两件事：\n\n\
    -   他们会发现你代码中的错误。\n-   他们会发现他们不理解的地方。\n\n在你全新的代码中发现错误可能会令人沮丧，但这比另一种情况要好得多。如果你在\
    \ App Store 上发布了一个版本，然后发现很大比例的用户都遇到了问题，你将陷入相当大的困境。新版本的应用需要很多天才能被苹果审核通过并供用户使用。在此期间，客户会在\
    \ iTunes 上留下差评，你会面临负面新闻，并且会焦头烂额。\n\n但是，如果你的 *测试* 组中有很大一部分人不理解某个功能的工作原理，或者在使用你的应用时感到沮丧，那反而是好消息。这意味着你的某个设计决策是错误的。听到这样的反馈时不要沮丧：每个开发者在某个时刻都收到过这样的反馈。现在是你扭转局面的机会，以免\
    \ App Store 上的客户抱怨同样的问题！\n\n### 手电筒改进\n\n事实上，你在上一章看到的手电筒就是根据测试者的反馈进行了一些设计修改。你可能会在自己的应用中也遇到类似的问题：\n\
    \n-   测试组中的几个人发现，快速更改亮度很麻烦。他们每次都必须进入和退出设置来调整灯光级别。他们真正想要的是一个简单的手势来临时降低亮度。这就是 `LightView`\
    \ 中单击手势的由来。\n-   另一位测试者抱怨说，很容易不小心关掉闪光灯。她在晚间锻炼时，将安全灯戴在臂包里，跑步时不小心碰到了工具栏。`LightView`\
    \ 中的单击手势被扩展为双击锁定屏幕。\n-   团队中的设计型成员希望应用中有一些视觉亮点。设置视图看起来已经足够酷了，但他想要 App Store 上其他手电筒都没有的东西——电池！在翻转到设置时看到的背景，是通过在\
    \ `MainWindow` 中放置一个 `UIImageView` 就能轻松添加的功能。\n\n手电筒的代码中有几个错误，如果没有 Beta 测试者的帮助，你是不会发现的：\n\
    \n-   由于 `Localizable.strings` 中的问题，意大利语本地化在某些情况下显示不正确。该用户还发现了一个问题，即长消息无法在 `IFInfoView`\
    \ 中正确显示。\n-   另一位测试者发现了一个开发团队从未考虑过的错误：你可以调暗灯光亮度并启动 SOS 闪光灯。这会阻止警告信号发挥最大效果。\n\n\
    幸运的是，没有出现任何严重问题，Beta 测试进行得很顺利！\n\n---\n\n## Ad Hoc 分发\n\n那么，你如何将这个 Beta 版分发给你的测试者呢？通过一种叫做\
    \ *Ad hoc 分发* 的机制。这种技术允许你与多达 100 名测试者分享你的 iPhone 应用。\n\n但首先，你需要对你的项目进行一些额外的修改，以便这些用户能在他们的\
    \ iPhone 或 iPod touch 上运行它。\n\n### 收集测试者信息\n\n第一步是从潜在的测试者那里收集设备 ID。你可以使用与第 137\
    \ 页相同的技术。对于大多数测试者来说，在 iTunes 中点击序列号，或者从 App Store 运行免费的 `Ad Hoc Helper` 应用，是获取\
    \ 40 位 UDID 字符串的最简单方法。\n\n作为此过程的一部分，也要获取测试者的电子邮件地址和他们拥有的设备类型。你将使用这些电子邮件地址来设置邮件列表。了解他们正在测试的设备类型，将有助于调试特定于硬件的问题。\n\
    \n***提示：** 请记住，你的 iPhone 开发者账户限制你在整个一年内只能注册 100 台设备。请确保 Beta 测试的人数远低于这个数字。*\n"
- fmt: "请注意：你给出的示例中，`varName` 等标记规则非常明确。在处理你提供的文本时，我将严格遵循此规则，对所有可能被误解为变量、函数、命令或路径的专有名称或代码片段添加反引号。\n\
    \n由于原文中包含大量粗体、斜体以及图片和页码等排版元素，我将在保留核心内容的前提下，去除不必要的格式，并对关键代码/文件名/路径等添加反引号。\n\n---\n\
    \nBe aware that adding each new tester increases the amount of work it takes to\
    \ run the beta test: You’ll be responding to additional feedback, helping with\
    \ more installation problems, and doing additional tester support. For most applications,\
    \ you’ll get plenty of test coverage with a group of 20 to 40 people.\n\n## Distribution\n\
    \nUp until now, you’ve only been provisioning devices for development. These profiles\
    \ are designed to work within the Xcode environment. For example, a development\
    \ profile includes a configuration value that allows the debugger to attach to\
    \ your application’s process after it’s launched.\n\nYour testers won’t be using\
    \ Xcode, so they’re going to need a different kind of profile: one for general\
    \ distribution. Luckily the process for creating these profiles is very similar\
    \ to the one you’ve been using for development, so no surprises should occur.\n\
    \n### Certificates\n\nAs with your development profile, the first step is to generate\
    \ a certificate using Keychain Access:\n\n1.  Use the `Keychain Access` application’s\
    \ assistant to generate the request. To start, select `Keychain Access` → `Certificate\
    \ Assistant` → `Request a Certificate From a Certificate Authority`.  \n    The\
    \ `Certificate Assistant` dialog box opens.\n\n2.  In the `User Email Address`\
    \ field, type your email address.  \n    Use the same one you used when signing\
    \ up for the `iPhone Developer Program`.\n\n3.  In the `Common Name` field, type\
    \ your (or your company’s) name. Turn on `Save to disk` so a file is created.\
    \  \n    If you signed up as an individual developer, use the same name you used\
    \ to enroll as an iPhone developer. If you signed up with a company account, use\
    \ the same company name.\n\n4.  Click `Continue`.  \n    You’ll be prompted to\
    \ save the certificate request.\n\n5.  Change the name of the file to `Distribution.certSigningRequest`,\
    \ and save it on the desktop.\n\n6.  Click `Done` to close the assistant after\
    \ you see the confirmation screen.\n\nThen it’s time to upload that certificate\
    \ request to the `Provisioning Portal`. (If you need a refresher on what the portal\
    \ is and how to get there, see page 136.)\n\n1.  On the `Provisioning Portal`\
    \ page, click `Certificates` in the left column.  \n    The `Certificates` page\
    \ opens to the `Development` tab.\n\n2.  You’re going to create a distribution\
    \ certificate, so switch to the `Distribution` tab. You see a warning that you\
    \ don’t have a valid certificate; click the `Request Certificate` button so you\
    \ can upload your request.  \n    Click `Choose File`, and a file dialog box opens\
    \ (Figure 7-1).\n\n3.  Navigate to the `Distribution.certSigningRequest` on your\
    \ desktop and then click `Choose`.\n\n4.  Back on the `Distribution` tab, in the\
    \ lower-right corner, click `Submit`.  \n    You see a confirmation that the request\
    \ was submitted. The certificate’s status reads `Pending Approval`. Believe it\
    \ or not, Apple is asking you to approve your own request.\n\n> **Note:** If you’re\
    \ working with a company account, only the team agent can approve the certificate\
    \ request. The agent is the person who originally signed up for the developer\
    \ account.\n\n5.  In the `Action` column, click `Approve`.  \n    The status column\
    \ changes to `Pending Issuance`.\n\n6.  After a short wait, you should be able\
    \ to refresh your browser and see a `Download` button; click it.  \n    When the\
    \ download is done, you should see a `distribution_identity.cer` file in your\
    \ `Downloads` folder.\n\n7.  Double-click to open the `distribution_identity.cer`\
    \ file.  \n    You’re prompted to confirm the addition of this new certificate.\n\
    \n8.  Make sure the `Keychain` pop-up menu is set to `login` and then click `Add`.\
    \  \n    At this point, your keychain has been set up correctly. You should see\
    \ `iPhone Distribution` along with your name in Keychain Access.\n\nAs with your\
    \ developer certificate-signing request, it’s a good idea to save your distribution\
    \ request file for later use. It’s one less thing to hassle with when your beta\
    \ build is broken because of an expired certificate.\n\nIf you’re using a company\
    \ account, each of the developers on the team has an individual code-signing certificate\
    \ for development. With a distribution certificate, you have only one for your\
    \ entire company. That’s because Apple wants to verify which company created the\
    \ software, not the individual developer who did the build.\n\n> **Tip:** If you\
    \ ever need to check the contents of a certificate-signing request, use this command\
    \ in a `Terminal` window to view it:  \n> `$ openssl req -noout -text -in Distribution.certSigningRequest`\
    \  \n> The output will show the email address and common name (CN) used for the\
    \ request.\n\n### Devices\n\nOnce you’ve collected the relevant information from\
    \ your beta testers, head over to the `Provisioning Portal`, and spend some quality\
    \ time in the `Devices` section. Adding devices for testers is exactly the same\
    \ process you used on page 144.\n\nThe portal doesn’t differentiate between devices\
    \ that are used for development and distribution.\n\nMake sure to use the feature\
    \ that lets you add multiple devices with a single click of `Submit`. Click the\
    \ `+` icon at the end of each line to get another input field for the device name\
    \ and ID; it makes this tedious job a little bit quicker.\n\n### App IDs\n\nFor\
    \ this example, you’re distributing a beta application from your company. You\
    \ want your `App ID` to reflect that. Say that your company is Squidger Industries,\
    \ and your Internet domain is `squidger.com`. Here’s how to create an `App ID`\
    \ called `Squidger Apps`:\n\n1.  On the `Provisioning Portal` page, click `App\
    \ IDs` in the left column.  \n    You should see the `App ID` named `All Apps`\
    \ that you’re using for development.\n\n2.  Click `New App ID` to add the new\
    \ ID you’re going to use for distribution.\n\n3.  For `Description`, type `Squidger\
    \ Apps` as a reminder that you’re using this App ID for building and running Squidger\
    \ apps. Leave the pop-up menu set to `Generate New`.  \n    Next enter the pattern\
    \ used to match the applications.\n\n4.  Type `com.squidger.*` for the `Bundle\
    \ Identifier` and then click `Submit`.  \n    After you return to the main `App\
    \ ID` page, you see `Squidger Apps` in the `Description` column (Figure 7-2).\n\
    \nYou’re now ready to pull it all together in the provisioning profile!\n\n###\
    \ Provisioning\n\nAs you saw with certificates, there’s an additional tab when\
    \ you select the `Provisioning` section in the `Provisioning Portal`. Here’s where\
    \ you create and manage the profiles used for distribution. For now, you’re just\
    \ going to create one for your beta test, but eventually you’ll be adding one\
    \ to distribute your app on iTunes.\n\nAfter switching to the `Distribution` tab,\
    \ click `New Profile`, and you see a screen that looks very much like the one\
    \ you saw for development. The big difference is that you now see a `Distribution\
    \ Method` listed. Since you’re not quite ready for the `App Store`, click `Ad\
    \ Hoc` and you’ll be rockin’.\n\nAs you fill out the `Profile Name`, think for\
    \ a moment about your testers. They like to help developers, and it’s probable\
    \ that they’re also testing someone else’s software."
