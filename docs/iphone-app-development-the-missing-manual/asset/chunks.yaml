- fmt: '***Note:*** An `id` also solves the situation with overridden methods in a
    subclass that return a different type than the original class. By using a generic
    type, both the original class and any of its subclasses can share a common method
    signature and return the appropriate class.


    Again, the `NSArray` class will be explored in the next chapter, but you already
    know that arrays are only useful if you can access the elements in the list. The
    method for doing this is:


    ```

    - (id)objectAtIndex:(NSUInteger)index;

    ```


    So, given an integer index, an `id` value is returned. The same is true when you
    add elements to the array: Combining these methods gives you a way to store any
    kind of object you’d like in the array.


    Of course, your code usually knows what it put in the array, so it’s common to
    do an implicit cast as you read the array element:


    ```

    NSString *element = [myArray objectAtIndex:i];

    ```


    This code lets the compiler check any code that accesses the element object.


    Finally, there’s one special `id` value that you’ve already seen mentioned several
    times in this chapter— `nil`. As with pointers in C, you’ll occasionally want
    to represent the absence of an object. Using `nil` to represent a null object
    lets you do this.


    Both `nil` in Objective-C and `NULL` in C are defined as `void` pointers with
    a value of zero. For example:


    ```

    #define NULL ((void *)0)

    #define __DARWIN_NULL ((void *)0)

    #define nil __DARWIN_NULL

    ```


    Semantically, however, you should use `nil` when dealing with pointers to objects
    and `NULL` for all other types of pointers. Technically, there’s nothing wrong
    with this code:


    ```

    NSString *myString = NULL; // PLEASE BE AWESOME AND USE nil INSTEAD!!!

    ```


    ## Chapter 2: The Power of Brackets


    **59**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### Show Your id


    ### Under The Hood


    ### It Really Is Just C


    On page 30, you saw that Objective-C is just C with a little extra syntax and
    a runtime.


    Now that you’ve learned a little bit about the language, you might want to see
    how Objective-C performs its magic. This is advanced stuff, but if you’re the
    kind of developer who likes to look under the hood, you’ll love this box.


    First, start with some standard Objective-C code from an earlier example:


    ```

    NSString *myString = @"typing power";

    NSString *myResult = [myString awesomeString];

    NSLog(@"myResult = %@", myResult);

    ```


    You can do exactly the same thing with this code:


    ```

    #import <objc/objc-runtime.h>


    id myString = @"typing power";

    SEL mySelector = @selector(awesomeString);

    IMP myImp = class_getMethodImplementation(object_getClass(myString), mySelector);

    id myResult = myImp(myString, mySelector);

    NSLog(@"myResult = %@", myResult);

    ```


    What you’ve just done is replicate the work of `objc_msgSend:`, the code that’s
    used by Objective-C to send messages to objects. It looks a lot like plain old
    C code, doesn’t it?


    You begin by creating a selector for the `-awesomeString` method. That’s just
    a pointer to an internal structure:


    ```

    typedef struct objc_selector *SEL;

    ```


    That selector is then passed to the runtime function `class_getMethodImplementation()`
    that looks up a function using the object’s class and the selector. All methods
    conform to this function definition:


    ```

    typedef id (*IMP)(id, SEL, ...);

    ```


    Once you have the function pointer to the class’s implementation in the `myImp`
    variable, you can call it with the object and selector. This example doesn’t have
    any additional parameters, but since `IMP` is defined with a variable argument
    list, they can be passed in as well.


    When the compiler came across your method implementation:


    ```

    - (NSString *)awesomeString;

    ```


    it generated a C function that looks something like this:


    ```

    id _i_NSString_AwesomeMethods_awesomeString(id self, SEL _cmd);

    ```


    The function name is mangled using the method type (instance or class), the class
    name, category, and method name. The function’s arguments explain how the hidden
    `self` argument is passed. It also shows that there’s another hidden argument
    called `_cmd` that your method implementation can use if it needs to know its
    selector.'
