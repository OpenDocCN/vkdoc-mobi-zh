    The primary difference between signing code for development and for a distribution
    profile is the configuration parameter that allows Xcode to debug your process.
    The default value for the *get-task-al ow* key enables debugging, but when you’re
    doing Ad Hoc distribution, this setting must be turned off.


    To accomplish that, change the Entitlements configuration used during code signing.
    Here are the steps:


    **1\. In Xcode, choose File**➝**New File. Then, in the New File dialog box, choose**
    **Code Signing in the iPhone OS source list.**


    You see two templates, Entitlements and Resource Rules, both of which let you
    configure code signing.


    **2\. Select the Entitlements template and then click Next.**


    **3\. Set the File Name field to *dist.plist*** **and Location to the top level
    of the** **project folder. Make sure that the file is added to the correct targets.
    Click** **Finish.**


    The file should now appear in the property list editor.


    **4\. Turn off the *gettaskallow*** **checkbox and then save the file.**


    You now have a file that can disable the debugger. All that’s left to do is to
    add that file to a target.


    ***Tip:*** Don’t be afraid to be lazy and to use the *dist.plist* file that’s
    in the Flashlight Pro application. The steps above have already been done for
    you!


