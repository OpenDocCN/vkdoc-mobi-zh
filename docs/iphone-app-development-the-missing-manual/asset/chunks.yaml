    \nCGPathAddArc(pathRef, NULL,\nCGRectGetMaxX(insetRect),\nCGPathRelease(pathRef);\n\
    ```\n\n## Chapter 6: A Flashlight for Pros\n\n**181**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### refine the look\n\nTo create dark black with 50% transparency:\n\n```objc\n\
    [[UIColor colorWithWhite:0.0f alpha:0.5f] set];\n```\n\nAnd here’s the code that\
    \ draws the shadow characters in the view:\n\n```objc\n[self.message drawInRect:textRect\
    \ withFont:font];\n```\n\nThe second pass at drawing the text adjusts the origin\
    \ by moving it down 1 pixel, setting the color to white, and using the same method\
    \ to draw the characters: `textRect.origin.y += 1.0f;`\n\n```objc\n[[UIColor whiteColor]\
    \ set];\n[self.message drawInRect:textRect withFont:font];\n```\n\nPretty simple\
    \ and clever, huh?\n\nNote that the `–sizeWithFont:constrainedToSize:` method\
    \ is also used when the message for the view is changed. If the text is longer\
    \ than one line, the computed size is used to adjust the height of the view.\n\
    \n### Image drawing\n\nThere’s one last thing to draw in the view: the icon image.\
    \ The first step is to read the image from the application resources:\n\n```objc\n\
    UIImage *image = nil;\nif (self.type == IFInfoViewTypeAlert) {\n    image = [UIImage\
    \ imageNamed:@\"InfoViewAlert.png\"];\n}\nelse {\n    image = [UIImage imageNamed:@\"\
    InfoViewInfo.png\"];\n}\n```\n\nThe `UIImage` class method `+imageNamed:` locates\
    \ the image file within your application bundle and caches it in memory.\n\nThe\
    \ next step is to compute the placement of the image within the draw rectangle.\n\
    \nThe `–size` method for `UIImage` gives you the image dimensions, which are then\
    \ used to find a rectangle that’s vertical y centered in the view:\n\n```objc\n\
    CGRect imageRect = CGRectZero;\nimageRect.size = [image size];\nCGRect drawRect\
    \ = CGRectMake(CGRectGetMidX(imageRect),\n                             CGRectGetMidY(rect)\
    \ - CGRectGetMidY(imageRect),\n                             imageRect.size.width,\
    \ imageRect.size.height);\n```\n\nTo get the image to appear in the view, all\
    \ you need to do is send the `–drawInRect:` message to the `UIImage` instance:\n\
    \n```objc\n[image drawInRect:drawRect];\n```\n\nYou’re done drawing the view and\
    \ learned a lot in the process. Congratulations!\n\n**182**\n\niPhone App Development:\
    \ The Missing Manual\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n##\
    \ Making Cocoa Touch Your Own\n\n***Tip:*** When you’re drawing a view, it’s always\
    \ a good idea to base all geometry on the rectangle you are passed. As you’ve\
    \ seen, view sizes can change with or without your knowledge. If you make assumptions\
    \ about sizes or hard-code values, you’re setting yourself up for failure.\n\n\
    In some cases a constant value makes sense: The `iconOffset` acts as a margin\
    \ between the image and informational message.\n\n### Making Cocoa Touch Your\
    \ Own\n\nAs you saw in Chapter 2, categories in Objective-C are very powerful\
    \ mechanisms for extending existing classes (page 38). Flashlight Pro has three\
    \ categories. Two are used to create and set colors with a brightness value, and\
    \ a third is used to conceal a view onscreen.\n\n#### UIColor+Brightness\n\nThe\
    \ first category you’re going to look at is `UIColor+Brightness`. This category\
    \ takes some code you found on the Internet, wraps it in Objective-C, and integrates\
    \ it with the existing `UIColor` class.\n\n##### Naming conventions\n\nThe first\
    \ thing you notice about the category is the name of the source file.\n\nSince\
    \ these categories tend to be shared among projects, a naming convention is important\
    \ to avoid conflicts. You’ll find that your own categories get a lot of reuse,\
    \ and you can also find a lot of great open source ones.\n\nIn the convention\
    \ used here, the names are derived from the class being extended and the name\
    \ of the category. For this category, the `@interface` is defined as:\n\n```objc\n\
    @interface UIColor (Brightness)\n```\n\nThat makes the name `UIColor+Brightness`.\
    \ If the category name had been “(Chockolicious)”, the files would be named `UIColor+Chockolicious`\
    \ instead.\n\n***Note:*** Some developers use a dash as a separator instead of\
    \ a plus sign. The separator isn’t really important; it’s the unique combination\
    \ of the original class and the category that matters.\n\n#### Wrapping it up"
