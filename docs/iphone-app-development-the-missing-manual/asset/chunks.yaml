    # 第一部分：入门指南


    ## i with Cocoa Touch


    ### 第 1 章：构建你的第一个 iPhone 应用


    ### 第 2 章：Objective-C：括号的力量


    ### 第 3 章：Cocoa Touch：让 Objective-C 大显身手


    ### 第 4 章：设计工具：打造更出色的手电筒


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 第 章：构建你的第一个 iPhone 应用


    你有一个创意，它将在 iTunes App Store 上为你带来名望与财富。


    你决定编写一个 iPhone 应用。第一个也是最重要的任务是熟悉用于构建产品的工具。中国有句古语："旅途本身就是回报"，而本章正是关于这段旅途的。在接下来的篇幅中，你将从头到尾体验整个应用开发流程。你将学习如何配置所需的软件，并亲自尝试构建一个应用。


    但该构建什么应用呢？如果你快速搜索一下 App Store，会发现手电筒应用比比皆是。对于许多有抱负的开发者来说，这款简单的应用是入门必经之路。那么，现在正是你加入这群优秀开发者行列的机会。一旦你发现创建自己的应用如此简单，你就会纳闷为什么还有人愿意在
    iTunes 上花 99 美分购买它！


    ## 获取工具


    没有工具，你什么都做不了，包括 iPhone 应用。幸运的是，你可以在 Mac 上找到所有需要的东西，或者免费下载。具体来说，你需要在 Mac 上下载并安装
    `Xcode` 开发软件和 iPhone 软件开发工具包（SDK）。（如果你没有 Mac，请参阅下一页的说明。）


    Mac 和 iPhone 都受益于一套经得起时间考验的丰富技术。iPhone SDK 基于 NeXT 公司在 20 世纪 80 年代创建的基础架构构建。这家由史蒂夫·乔布斯创立的公司，打造了一款革命性的面向对象操作系统，名为
    `NeXTSTEP`。这个具有影响力的系统已演变为今天使用的 OS X 操作系统。随着你对 iPhone 的深入了解，你会发现它和 Mac 有许多共同之处。


    **9**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### 获取工具


    ***注意：*** 每当看到以 "NS" 为前缀的对象时，你都能看到 NeXT 的遗产。这些缩写代表 `NeXTSTEP`。


    **快速入门**


    **买一台 Mac**


    如果你想开发 iPhone 应用，就必须在 Macintosh 上完成。苹果的开发工具不能在 Windows 或其他任何操作系统上运行。就像你不能在 Mac
    上运行微软 Visual Studio 一样，你需要一台 Mac 来运行构建 iPhone 应用的工具。这些工具依赖于底层系统软件的特性。


    如果你没有 Mac，以下是一些提示，帮助你做出正确的购买选择：


    - **购买二手设备。** 如果预算紧张，可以看看 `eBay` 或 `craigslist`。别人淘汰的旧硬件完全可以满足 iPhone 开发的需求。你要创建的应用很小，不需要很强的处理器性能来构建和测试。购买较老硬件时唯一需要注意的是，确保这个
    Mac 使用的是 Intel 处理器。开发工具不适用于较老的 PowerPC 处理器。


    - **添置一台 Mac mini。** 购买一台新的 Mac mini 是一个绝佳选择。将 Mac mini 连接到 KVM 交换机后面很方便，这样你就可以快速在不同机器之间切换。


    - **不妨大方一次。** 苹果生产着一些非常性感的硬件。特别是新款笔记本电脑，让人难以抗拒。如果你正在寻找理由来证明这笔消费的合理性，这里有些帮助：Mac
    现在使用 Intel 处理器，这意味着你可以在新机器上运行 Windows 或任何其他基于 x86 的操作系统。你可以使用苹果免费的 Boot Camp 工具启动到任何操作系统。或者，你可能会发现安装第三方软件（如
    `VMware Fusion`）更容易，从而在 Mac OS X 内的虚拟机上运行其他操作系统。当你需要查看 iPhone 产品网站在 Internet Explorer
    中的显示效果时，虚拟机尤其方便。只需启动虚拟机，在 Windows 中打开浏览器，然后加载测试 URL 即可。

