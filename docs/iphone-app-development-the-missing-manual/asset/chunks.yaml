    **Making Cocoa Touch Your Own**


    As you saw in Chapter 2, categories in Objective-C are very powerful mechanisms
    for extending existing classes (page 38). Flashlight Pro has three categories.
    Two are used to create and set colors with a brightness value, and a third is
    used to conceal a view onscreen.


    UIColor+Brightness


    The first category you’re going to look at is *UIColor+Brightness.* This category
    takes some code you found on the Internet, wraps it in Objective-C, and integrates
    it with the existing *UIColor* class.


    *Naming conventions*


    The first thing you notice about the category is the name of the source file.


    Since these categories tend to be shared among projects, a naming convention is
    important to avoid conflicts. You’ll find that your own categories get a lot of
    reuse, and you can also find a lot of great open source ones.


    In the convention used here, the names are derived from the class being extended
    and the name of the category. For this category, the *@interface* is defined as:


    @interface UIColor (Brightness)


    That makes the name *UIColor+Brightness.* If the category name had been “(Chockolicious),”
    the files would be named *UIColor+Chockolicious* instead.


