- fmt: '# Build Settings: Release and Debug


    At the top of each build settings list are drop-down menus for `Release` and `Debug`.
    They let you define different settings depending on whether you’re building a
    test version to debug or a release version to ship.


    A great example of why you’d want to build a separate debug is when you’re dealing
    with debug symbols and optimization levels. When you’re debugging, the job is
    a lot easier when symbols that help you locate problems are in your executable.
    Similarly, optimized code is difficult to step through as you try to reproduce
    a problem.


    The opposite is true with your release version: You want to *remove* the symbols
    so the executable uses less space in the flash memory and so that it loads more
    quickly. You also want to take advantage of any speed and size optimizations that
    the compiler can make.


    ## Beyond the Template


    ### Behind The Scenes


    **Houston, We Have Ignition**


    `Info.plist` is obviously at the heart of the launch process. If you’re the type
    of developer who loves excruciating detail, here’s the sequence of steps that
    brings the Flashlight Pro application to life:


    1. A user taps on your application icon.

    2. Springboard reads `Info.plist` and finds the compiled application by using
    the `CFBundleExecutable` property. This executable is launched just like any other
    process in Unix.

    3. Your application contains a `main` function with the standard `argc` and `argv`
    list. A file named `main.m` in the Other Sources group shows this entry point
    that’s called during the process launch.

    4. When `main()` is called, an autorelease pool for managing memory is created,
    and the `UIApplicationMain()` function is called.

    5. `UIApplicationMain` creates the single object instance of the `UIApplication`
    class. It also reads `Info.plist` and reads the `NSMainNibFile` property. For
    most applications, this property is `MainWindow` and specifies the NIB file to
    load.

    6. When `MainWindow.xib` loads, the File’s Owner is set to the instance of `UIApplication`.
    The other objects in the NIB, including the `Flashlight_ProAppDelegate` and `UIWindow`,
    are also loaded and connected.

    7. The object graph that’s loaded includes an outlet for the window in `Flashlight_ProAppDelegate`.
    The delegate for the instance of `UIApplication` in File’s Owner also points to
    `Flashlight_ProAppDelegate`.

    8. When the `UIApplication` finishes launching, it sends the message `applicationDidFinishLaunching:`
    to the delegate. As the delegate, the method in `Flashlight_ProAppDelegate` is
    used.

    9. The `applicationDidFinishLaunching:` method creates an instance of `MainViewController`
    and assigns it to the delegate’s instance variable. As the controller is instantiated,
    the `initWithNibName:bundle:` method is called with the `MainView.xib` specified
    as a parameter. This loads and connects another object graph. The implementation
    of `initWithNibName:bundle:` also sets up the models and configures notifications.

    10. After the main controller is fully instantiated by the application delegate,
    the `view` message is sent. This causes the view, which is loaded lazily, to be
    read from the NIB file. After that, the `viewDidLoad` message is sent to the main
    controller.

    11. The view created by the controller is then passed back to the application
    delegate. Using the `UIWindow` instance from the `MainWindow` NIB, this view is
    then added as a subview for the window. To make the window and its view visible,
    the `makeKeyAndVisible` message is sent.

    12. Since the main controller’s view is now getting placed onscreen, the controller
    first calls the `viewWillAppear:` method. After the view is displayed, the `viewDidAppear:`
    method is called. Since the main controller overrides the second method, this
    is when the user sees his preferred flashlight color displayed.

    13. From this point on, user actions, and the events they produce, drive the application.
    You’re in orbit.


    Aren’t you glad Cocoa Touch is awesome and that you didn’t have to do all that
    by hand? It certainly makes launching a Space Shuttle look easy! You’ll see a
    more humane approach to the launch sequence in the next chapter (page 157).


    ### Configurations in Practice


    To see how these two configurations differ, open the Target build settings for
    Flashlight Pro using `Project` ➝ `Edit Active Target`. Then click the `Build`
    tab, and set the `Configuration` menu to `Debug`.


    In the Search box, type `optimization` and you see that the optimization level
    is set to `None`. If you change the configuration to `Release`, you see that the
    same setting is `Fastest, Smallest`. When you search for `strip debug` and flip
    between the two configurations, you see that symbols are only stripped from the
    `Release` version. That’s exactly what you want.


    ## Duplicity


    Once you come to terms with the settings and configurations, you’ll begin to wonder
    why two sets of them exist: one for the project and another for the target. Many
    developers get confused because both windows offer a long list of choices that
    are nearly identical. To decide which one to choose, you need to understand the
    hierarchy for the build settings.


    At the bottom of the hierarchy is Xcode. It has built-in defaults for all of the
    settings in the list. For example, the optimization level for the compiler is
    set to `Fastest, Smallest` if you don’t tell Xcode otherwise.


    Above Xcode’s defaults are the build settings for the project. Any settings you
    change here are reflected in all targets that are built with that project. Use
    the project settings for things that you want to happen in all targets. A good
    example of a setting at this level would be the optimization: You’re going to
    want the `Debug` configurations of all targets to have no optimization instead
    of having Xcode’s default.


    The build settings for the target sit at the top of the hierarchy. If you change
    a setting in the target, it will override any setting in the project. Resist the
    urge to put settings here unless they’re clearly tied to the product you’re building.


    When you start out with a project, you have only one target, so it’s easy to ignore
    this hierarchy and just assign settings wherever you please. But you’ll be adding
    more and more targets as your project evolves. For example, you’ll probably add
    a new target when it’s time to build a beta release, and another when it’s time
    to upload the final version to the App Store.


    If you have put a lot of settings in your targets, changing settings is a pain.
    Say that you have three targets and decide that you need to adjust the optimization
    level for your release builds. It’s much easier to change that optimization level
    once in the project build settings than three times in each of the targets.


    ***Note:*** As you’re adjusting build settings, pay attention to ones that are
    in boldface. That’s Xcode’s way of highlighting the settings that are overriding
    a value in the child. For example, if you see “Optimization level” highlighted
    in the target build settings, you know that it’s overriding the value in the project.


    The `Show` menu is another good way to see all settings that are overrides. Select
    “Settings Defined at This Level” to get a list. (This list is filtered by the
    Search field’s current value.)


    ## Make It Official


    Up until now, you’ve been able to run code only in the Simulator. The whole point
    of this book is developing apps for your iPhone, not a big honkin’ facsimile running
    on your Mac. Why can’t you see your app running in the palm of your hand?'
