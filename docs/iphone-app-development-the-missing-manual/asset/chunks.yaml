  trans: "\n建议为版本号采用统一的命名模式。大多数开发者会根据改动幅度和深度来递增版本号。\n\n例如，如果你当前的版本是 1.0，那么下一个版本可以这样命名：\n\
    \n- **1.0.1.** 小版本更新。主要是修复错误，不包含新功能。\n\n**产品更新**\n\n- **1.1.** 用于包含重要变更的版本，包括错误修复和小型新功能。\n\
    - **2.0.** 一个重大的新版本，包含大量错误修复和面向客户的新功能。\n\n## 欢迎回来，iTunes\n\n到现在，你已经是 iTunes Connect\
    \ 的老手了，但还是有一些新东西需要学习。要更新你的应用，请从更新元数据开始：\n\n1.  登录 iTunes Connect，选择“管理你的应用程序”。然后点击你要更新的应用的图标。\n\
    2.  点击“更新应用”链接，开始更新流程。\n\n你首先会看到一个询问导出合规性是否发生变化的问题。答案很可能是“否”。\n\n3.  点击“继续”。\n\
    \n你会看到一个屏幕，你需要在其中提供关于新版本的更新信息。与首次提交相比，需要填写的字段更少。\n\n4.  首先填写“版本号”字段。\n\n该号码应与你在\
    \ `Info.plist` 中分配的版本号一致。“名称”和“关键词”字段会预先填充当前值；如果你想更改，现在正是时候。一旦你提交了更新后的二进制文件，这些字段将无法编辑。\n\
    \n你的内容评级的当前值也会显示出来。\n\n5.  如有必要，请更新任何值。最后，点击“稍后上传应用二进制文件”，然后点击“保存更改”。\n\n返回应用屏幕后，你会看到版本号已更新，状态变为“等待上传”。你还会看到你的应用图标在“管理你的应用程序”屏幕上出现了两次。\n\
    \n需要注意的是，此时**不应**更新你的应用描述或任何其他数据。你可能需要列出新功能或更新截图，但如果现在进行这些更改，它们会显示在当前版本上。相反，请等待新版本批准后再进行这些更新。\n\
    \n最后一步是上传新的二进制文件。像发布初始版本（第 262 页）一样进行最终构建，然后点击“上传二进制文件”。使用“选择文件”按钮选取文件，然后点击“保存更改”。\n\
    \n## 产品更新\n\n完成后，你会看到状态变为“等待审核”。希望审核等待时间不长！\n\n## 升级（或者说，缺乏升级）\n\n如果你是从其他软件平台转过来的开发者，你可能已经了解软件升级的好处。简而言之，你知道自己有多少客户，以及其中有多少人可能会升级。这些信息，加上升级的成本，可以告诉你应该在开发上投入多少钱。\n\
    \n不幸的是，这个等式中关键的一部分在 App Store 上是缺失的。没有办法给现有客户提供折扣。每个 SKU 都是独立的。对于游戏和其他类型的娱乐产品来说，这不是问题。客户已经习惯为使用相同角色和主题的额外游戏内容付费。\n\
    \n而生产力工具和其他更“严肃”应用的开发者则面临一个艰难的决定：是免费提供升级，还是为全新的产品收费？\n\n在做这个决定时，请记住以下几点：\n\n-\
    \   你会遇到与用户从免费应用迁移到付费应用时相同的数据迁移问题。当前版本的文档和设置不会自动迁移到新版本，除非你付出大量努力。\n-   用户会抱怨。举个例子，流行应用\
    \ Tweetie（`www.atebits.com/tweetie-iphone`）的作者 Loren Brichter 在决定对 2.0 升级版本收费时，就遭遇了相当大的抵制。无论出于何种原因，客户觉得他们有权免费升级，即使升级费用只有\
    \ 3 美元。\n    -   穿上你的防火内裤吧，因为人们会通过社交网络和电子邮件表达他们的不满。\n-   如果你的用户基数相对较小，而开发成本较高，那么对升级收费可能会成就或毁掉你的业务。如果你面向的是一个利基市场，请花时间教育你的客户：持续的营收是如何支持他们喜爱的应用的。\n\
    \n好消息是，如果你正在考虑升级，那意味着你的第一个版本已经赚到了一些钱。许多产品永远走不到这一步，所以为你完成的工作感到自豪吧。\n\n## 产品更新\n\
    \n恭喜你！\n\n仿佛就在昨天，你第一次启动 Xcode 来制作一个简单的手电筒应用。但回首往事，这是一段漫长的旅程，你一路上学到了很多。\n\n如果你像大多数\
    \ iPhone 开发者一样，那么一旦你完成第一个应用，你已经在考虑下一个了。顶尖研究人员发现，治愈这种“病”的唯一方法就是长时间接触 Xcode。谢天谢地，你已经完全准备好使用这个“解药”了。\n\
    \n那么，祝愿你在 App Store 作为 iPhone 开发者能长久而成功：这是你应得的。干杯！\n\n## 附录 A：下一步去哪里\n\n关于 iPhone\
    \ 开发，总有更多东西要学。如果你发现自己对本书涉及的某个主题感到困惑，可以查看以下资源。你可以查阅书籍、网站和论坛来寻找答案。\n\n同样重要的是要记住，iPhone\
    \ 开发是一个新兴行业。新技术和方法在不断被发现。不要害怕使用你在本书中学到的术语在 Google 上搜索！\n\n### 关于 Objective-C 的帮助\n\
    \n**书籍**\n\n`http://developer.apple.com/mac/library/documentation/Cocoa/Conceptual/ObjectiveC`\n\
    \n许多关于 Cocoa 的书籍也会深入探讨 Objective-C。如果你想要一个优秀的入门介绍和完整的语言参考，苹果出版的 *The Objective-C\
    \ 2.0 Programming Language* 是无与伦比的。当你遇到新的术语和概念时，术语表和索引尤其有用。\n\n该文档有 PDF 格式，方便你打印和搜索。\n\
    \n**网站**\n\n`http://sealiesoftware.com/blog/`\n\n如果你对 Objective-C 的内部原理有任何疑问，Greg\
    \ Parker 都已经回答过了。当你不可避免地陷入 `objc_msgSend` 崩溃的深渊时，你最终会来到这个网站，长舒一口气。\n\n### 关于 Cocoa\
    \ 的帮助\n\n**书籍**\n\n`http://bignerdranch.com/products.shtml`\n\nAaron Hillegass\
    \ 在他的 Big Nerd Ranch 教授编程多年。在 *Cocoa Programming for Mac OS X* 中，他通过清晰的示例和从这些课程中磨练出的精彩讲解来阐述这个主题。这本书受到许多资深\
    \ Mac 开发者的推崇，并且尽管书名如此，它对于那些希望更深入理解两个平台共享的类和设计模式的 iPhone 开发者来说也很有价值。\n\n`http://cocoabook.com/`\n"
- fmt: '# Appendix A: Where to Go from Here


    ## Cocoa and Objective-C


    ### Books


    *Cocoa and Objective-C: Up and Running,* by Scott Stevenson, takes an in-depth
    look at both Cocoa and Objective-C. Scott has a long history of providing online
    tutorials at his Cocoa Dev Central (`http://cocoadevcentral.com/`) and Theocacao
    (`http://theocacao.com/`) sites. His direct and personal style is easy to read
    and highly recommended for developers who want to get the most out of the language
    and framework.


    `http://www.cocoadesignpatterns.com/`


    Both Erik Buck and Don Yacktman are longtime Cocoa developers. In *Cocoa Design
    Patterns,* they examine the object-oriented design patterns used in the frameworks
    of the iPhone SDK. Through practical examples and sample code, advanced developers
    will discover the underlying elegance and consistency of the components used to
    make their iPhone apps.


    ### Web


    `http://developer.apple.com/cocoa/`


    This page is Apple’s main reference for all things Cocoa. Use it as a launch pad
    for exploring the framework.


    `http://cocoawithlove.com`


    Matt Gallagher’s Cocoa with Love site is a never-ending source of useful code
    and information about the Cocoa framework. Some of his essays delve into the finer
    points of development for the Mac and iPhone, while others are quite accessible
    to newcomers.


    `http://cimgf.com`


    Written by Marcus Zarra and Matt Long, the *Cocoa Is My Girlfriend* site covers
    a wide range of topics in both Mac and iPhone programming. It’s a particularly
    good source of information for two of the most important frameworks on the iPhone:
    Core Animation and Core Data.


    ---


    ## Help with iPhone SDK


    ### Web


    `http://www.mikeash.com/?page=pyblog/`


    *NSBlog,* a site run by veteran Mac developer Mike Ash, covers advanced topics
    in Cocoa development. It’s where the pros go to learn new things.


    ### Discussion


    `http://www.cocoabuilder.com/`


    The *CocoaBuilder* site provides a searchable archive of both the Cocoa and Xcode
    developer’s list. The results are displayed in an easy-to-read threaded format.
    When you’re having a problem understanding something in Cocoa, this site is an
    excellent place to start looking for a solution.


    `http://lists.apple.com/mailman/listinfo/cocoa-dev`


    Sign up for the Apple mailing list on Cocoa development. This list is a good place
    to discuss frameworks, features, and technical issues with Cocoa, not specific
    issues with the iPhone SDK.


    ---


    ## Help with iPhone SDK


    ### Books


    `http://iphonedevbook.com`


    Written by Dave Mark and Jeff LaMarche, *Beginning iPhone 3 Development* takes
    you through the essential parts of the iPhone SDK with step-by-step instructions.
    A follow-up book, *More iPhone 3 Development,* covers new features in the 3.0
    software and more advanced topics.


    `http://ericasadun.com`


    Erica Sadun is a never-ending source of sample code, tips, and tricks for iPhone
    developers. Active since the early days of jailbreaking, she has compiled these
    recipes into her book *The iPhone Developer’s Cookbook.* This book excels at covering
    new topics quickly with relevant source code.


    ### Web


    `http://appdevmanual.com`


    The official site for *iPhone App Development: The Missing Manual.* Additional
    material that’s not covered in the book will be posted here.


    `http://iphonedevelopment.blogspot.com`


    The *iPhone Development* site, written by author Jeff LaMarche, is a great place
    to find tutorials and commentary about the iPhone. Much of the sample code that
    ends up in his books sees the first light of day on this site.


    ---


    ## Help with Interface Design


    ### Web


    `http://iphoneincubator.com/blog/`


    Nick Dalton’s *iPhone Development Blog* was launched on the first day the iPhone
    SDK was released. Since then it has become a valuable collection of tips and tricks.


    `http://iPhoneDeveloperTips.com`


    As its name implies, the *iPhone Developer Tips* website has hundreds of tips
    and tutorials that you’ll be able to use in your projects. John Muchow, author
    and longtime mobile developer, updates the site regularly with great information
    for all developers.


    `http://furbo.org`


    This site, written by your humble author, is a place to cover various development
    topics related to the iPhone. The essay `http://furbo.org/bootstrap` acted as
    the genesis for this book.


    ### Discussion


    `http://devforums.apple.com`


    Apple hosts these discussion forums. In addition to the normal questions and answers
    for common problems, this site is the only legal venue to discuss SDK releases
    that are under a Non-Disclosure Agreement (NDA).


    `http://groups.google.com/group/iphonesdk`


    This Google group run by Erica Sadun hosts a range of discussions about the iPhone
    SDK.


    ---


    ## Help with Interface Design


    ### Books


    `http://developer.apple.com/iphone/library/documentation/UserExperience/Conceptual/MobileHIG`


    Essential guidance when designing your user interface, *iPhone Human Interface
    Guidelines* is an Apple publication that covers the challenges and best practices
    for the best experience possible for your customers. You’ll want to save the file
    as a PDF and to keep it as a handy reference as you’re prototyping a new project.


    `http://www.tobyjoe.com/2009/08/my-iphone-user-experience-book/`


    Toby Joe Boudreax’s *Programming the iPhone User Experience* takes the information
    in the preceding *Human Interface Guidelines* a step further. He covers many of
    the same issues, but in greater depth, along with code examples and critiques
    of many popular iPhone applications. Recommended for designers and developers
    who are looking to get the most out of their user experience.


    ---


    ## Help with Web Development


    ### Books


    `http://apress.com/book/view/1430223596`


    *iPhone User Interface Design Projects* is a survey of 10 popular and award-winning
    iPhone apps. This book examines the approach taken by each developer and designer
    to create the final product. As you’ve seen with Safety Light, the best way to
    learn is by going through the process.


    ---


    ## Help with Xcode


    ### Web


    `http://developer.apple.com/mac/library/referencelibrary/GettingStarted/GS_Tools/`


    This “getting started” document on Apple’s developer site provides an introduction
    to Xcode as well as in-depth coverage of the performance tools you can use to
    improve your iPhone application.


    `http://developer.apple.com/tools/`


    This web page contains links for various topics regarding Apple’s development
    tools. If you have questions about the tools, be sure to check out the Xcode-Users
    mailing list.


    `http://search.lists.apple.com/`


    Apple maintains a searchable archive for all mailing lists. You can find information
    about Xcode, Cocoa, and other technologies in the archives. Make sure to check
    other options and features using the navigation at the bottom of the page.


    `http://developer.apple.com/mac/articles/server/subversionwithxcode3.html`


    This document from Apple explains how to set up Subversion source code management.
    The instructions include setting up a server and configuring Xcode as a client.


    ---


    ## Help with Web Development


    ### Web


    `http://developer.apple.com/safari/library/referencelibrary/GettingStarted/GS_iPhoneWebApp`


    This page on Apple’s developer site is a great launch point for both beginning
    and advanced web developers who want to explore the technical and design issues
    with Safari on the iPhone.


    `http://www.alistapart.com/articles/putyourcontentinmypocket/`


    `http://www.alistapart.com/articles/putyourcontentinmypocketpart2/`


    This series on the popular *A List Apart* web magazine covers the basics of developing
    for the Safari web browser on the iPhone.


    ---


    ## Keeping Up with News and Business


    ### Web


