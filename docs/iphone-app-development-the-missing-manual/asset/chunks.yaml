- fmt: '**1. Quit the iPhone Simulator if it’s running.**


    If you skip this step, the installation process will hang indefinitely, and you’ll
    need to quit the `Installer` and start over.


    **2. Double-click the iPhone SDK icon in the disk image to start the installation
    process. Agree to the licenses and choose a destination hard drive.**


    You see a list of packages to install. In the second column, `Developer` is set
    as the Location. You need to change the location for the beta release.


    **3. Click `Developer` and then select `Other` from the pop-up menu (see Figure
    1-5).**


    A dialog box opens for you to select a folder.


    ***Figure 1-5:*** *You can choose a custom installation location for the iPhone
    SDK. Since you can’t use beta releases of the iPhone SDK to build your application
    for the App Store, you’ll need to keep two versions of the tools on your hard
    drive. During the install process, click the `Developer` folder icon and select
    `Other` to choose the location for the beta version.*


    **4. Navigate to the root of your hard drive by selecting its name from the list
    of DEVICES. Then click the `New Folder` button and type `DeveloperBeta`. Click
    `Create` to create the folder.**


    **5. Select `Choose` to use the `DeveloperBeta` folder for the installation.**


    After you return to the main installation window, you’ll see `DeveloperBeta` as
    the Location.


    **6. To use the beta, launch `Xcode` and other tools from the new `Hard Drive`
    ➝ `DeveloperBeta` ➝ `Applications` folder.**


    Now for the second caveat: the beta release is Apple Confidential Information
    and is covered by a Non-Disclosure Agreement (NDA). These big legal words mean
    that you can’t talk about it in public. You can discuss the new SDK only on the
    Apple Developer Forums (`http://devforums.apple.com`). You can connect with other
    developers who are doing the same thing you are: learning about a new release
    by asking questions and sharing discoveries. Apple engineers also contribute to
    the discussion.


    The NDA also means that you won’t find any books or other media to help you understand
    the changes. The only information about the beta release comes from Apple itself
    and is posted on the iPhone Dev Center. Typically there’s a “What’s New” document,
    release notes, and a list of API differences. Read each of these documents fully:
    it’s a great way to pass the time when you’re waiting for several gigabytes of
    SDK to download!


    Another source of information is Apple’s annual developer conference, WWDC. Beta
    releases often coincide with this weeklong conference so everyone can discuss
    new features in detail. The conference takes place during the summer in San Francisco:
    it’s a great opportunity to meet your fellow developers and learn lots of new
    things.


    ## exploring Your New Tools


    Your Mac is now set up to create iPhone applications, so you’re ready to start
    making your first one. The best part is that you’re not going to write any code.
    How can you develop without writing code? It’s possible with the timesaving power
    of Xcode templates and Interface Builder.


    If you’re an experienced developer, this way of working can present a challenge.
    If you’re used to working in Visual Studio, Eclipse, or some other environment,
    your first encounter with Xcode can be a bit daunting. Besides working on a new
    operating system, you’re also going to be dealing with new project layouts, keyboard
    shortcuts, and preferences. Don’t worry, all of the tools you’re used to having
    are still there, it’s just a matter of time before you become comfortable using
    Xcode’s version of them.


    In this section, you’ll go through all of the phases of creating an iPhone app,
    from creating a project file with Xcode to running it in the iPhone Simulator.
    You’ll also take a peek at the Interface Builder application that lets you modify
    the user interface.'
