    当你点击 `Home` 按钮时，会看到屏幕上显示着 `Xcode` 安装的应用程序。由于目前只有一个应用，你只会看到 `Flashlight` 应用。拖动鼠标即可在应用页面之间滑动切换。你在
    iPhone 上习惯看到的许多应用都消失了，但在测试时你仍然能够使用 `照片`、`通讯录`、`设置` 和 `Safari`。点击应用的图标就会像在真实设备上一样在模拟器中启动它。


    ***提示：*** 模拟器托盘中的 `Safari` 图标对于测试网站在 iPhone 上的显示效果非常有帮助。


    当你开始推广自己的应用时，你会希望使用模拟器在移动设备上检查你的产品页面。


    ## 探索你的新工具


    ### 高级用户课堂：模拟现实


    iPhone 模拟器的工作方式与你口袋中的设备非常相似。然而，有时如何让虚拟设备表现得像物理设备一样并不那么显而易见。


    当你按住 `Option` 键时，会出现两个点。这些点显示了点击鼠标按钮时多点触控事件的位置。利用这一功能可以模拟缩放 iPhone 屏幕的捏合与张开手势。


    你还应该查看一下模拟器的 `硬件` 菜单。该菜单上有两个命令可以让你向左或向右旋转设备——如果你的应用能检测设备方向，这个功能会非常方便。选择 `硬件`➝`向左旋转`
    或 `向右旋转`。


    如果你的应用使用了摇动手势，菜单中也有一个选项可以模拟摇动。摇动是 iPhone 复制和粘贴机制（用于撤销操作）的标准组成部分。


    `硬件` 菜单还允许你模拟 iPhone 通话时显示的状态栏（选择 `硬件`➝`切换通话中状态栏`）。这样，你就可以验证当显示窗口缩小 20 像素时，你的应用是否正确调整了用户界面（UI）。


    随着你在 iPhone 开发中越来越深入，你会有机会使用 `硬件`➝`锁定` 命令。你可以让应用检测 iPhone 何时休眠和唤醒，而 `锁定` 就是模拟这一过程的方式。


    另一个高级模拟器功能是内存警告。iPhone 可供应用使用的内存有限。`硬件`➝`模拟内存警告` 让你可以测试当手机内存不足时应用的行为。许多开发者在从 Mac
    上无限的内存过渡到设备上仅有的 128 MB 内存时遇到了问题。`模拟内存警告` 功能有助于你避免这种命运。


    还需要认识到很重要的一点：模拟器正在共享你 Mac 上的许多资源。由于两者都构建于 OS X 技术之上，像网络这样的东西是两个平台共有的：要善用这种相似性。例如，如果你想看看应用在失去蜂窝网络时如何表现，只需进入
    Mac 的 `系统偏好设置`，然后关闭网络接口即可。


    ## 修订决策


    那么，既然你已经有了一个可以运行的应用，你会注意到白光让它在 iTunes 中看起来和其他手电筒应用没什么两样。你需要为灯光寻找一种更好的颜色——一种能让你在众多应用中脱颖而出的方式。在不打破“不写代码”规则的前提下，你要怎么做呢？答案很简单：`Interface
    Builder`。


    `Xcode` 与 `Interface Builder` 紧密配合，共同创建应用的用户界面（UI）。你使用这个工具创建窗口和按钮等对象，然后将它们放入你的代码中。当你从模板创建项目时，`Xcode`
    会自动创建一个包含这些对象的文件。


    为了了解这种方法有多么简单，请打开你的 `Flashlight` 应用的 UI。从主项目窗口中，点击展开三角形打开 `Resources` 组，然后双击 `MainWindow.xib`
    文件。`Interface Builder` 会打开（你会看到它在程序坞中弹跳）。一旦打开，你就可以开始处理你的 UI 了（图 1-13）。


    ***图 1-13：***

    *Interface Builder 及其*

    *众多窗口几乎占据*

    *了整个显示屏。中间是*

    *.xib 文档（A）*

    *和 iPhone 应用中显示的*

    *窗口（B）。左侧*

    *是用户界面元素库，*

    *按钮、窗口和其他用户*

    *界面组件都可以*

    *在这里访问（C）。*

    *右侧显示的是用于*

    *界面中对象的属性*

    *检查器（D）。*


    主文档窗口是 `MainWindow.xib`。要更改视图模式，请使用左上角的三个按钮。这些按钮的工作原理与它们在 Finder 中非常相似：最左边显示图标，中间显示列表，右边显示分栏。列表视图（你可以在图
    1-13 中看到）更紧凑且更易于阅读（尤其是对于较长的名称）。


    最左边的库窗口包含了所有你可以在设计中使用的界面对象列表。你将在第 3 章详细了解这些对象。


    要开始修改 `Flashlight` 的 UI，请双击 `MainWindow.xib` 列表中 `Window` 项。应用的窗口会在主文档窗口的右侧打开，让你有机会修改颜色。开始想想你最喜欢的颜色吧！


    最右边是属性检查器。你在优化 UI 时会经常用到这个窗口。目前，它显示的是 `窗口属性`，因为你正在处理一个窗口。检查器分为四个主要部分，你可以通过顶部的标签页进行选择。每个部分都允许你调整每个对象的不同方面：


    - **属性。** 对象特定的设置。在幕后，这些项会设置对象的属性和特性，以便省去你编写代码的麻烦（尽管必要时你仍然可以手动编写代码）。

    - **连接。** 连接定义了你的源代码如何访问 UI 对象。对于 `Flashlight` 应用，你会看到“窗口”连接到了“`Flashlight App
    Delegate`”。

    - **大小。** 此面板允许你定义所选对象的几何尺寸。例如，窗口的宽度和高度为 320 × 480（iPhone 屏幕的大小）。

    - **标识。** 此视图显示定义的对象类型。应用的窗口的类是 `UIWindow`。


    ***提示：*** 为了管理 `Interface Builder` 的众多窗口，你会发现使用键盘快捷键可以快速找到你需要的信息。你可以按 `⌘-0` 访问主文档窗口，并通过
    `⌘-1` 到 `⌘-4` 切换到检查器的每个部分。使用 `Shift-⌘-L` 调出库窗口。


    如果你不完全理解这里发生了什么，不用担心。你将在下一章学到关于类、对象和实例的所有知识。


    ***注意：*** 如果你使用过其他开发环境，请将你对 `Interface Builder` 工作方式的固有观念留在门外。`.xib` 文件并非自动生成从资源文件显示
    UI 的代码，而是包含了实际对象实例和层级结构的 XML 表示。当你加载文件时，`Interface Builder` 会在内存中创建一个对象图，并将其连接到你选择的实例变量中。我们将在第
    3 章更详细地探讨其工作原理。


    现在，你已经对 `Interface Builder` 有了一点了解，可以修改你的手电筒 UI 了。确保在 `MainWindow.xib` 文档中选中了
    `Window`，并且属性检查器处于第一个面板（用于修改属性）。

