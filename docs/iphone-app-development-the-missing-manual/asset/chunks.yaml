- fmt: 'Throughout this book, and throughout the Missing Manual series, you’ll find
    sentences like this one: “Open the `Hard Drive`➝`Developer`➝`Applications` folder.”
    That’s shorthand for a much longer instruction that directs you to open two nested
    folders in sequence, like this: “On your hard drive, you’ll find a folder called
    `Developer`. Open that. Inside the `Developer` window is a folder called `Applications`;
    double-click it to open it.”


    Similarly, this kind of arrow shorthand helps to simplify choosing commands in
    menus, as shown in Figure I-2.


    **Figure 1-2:** *When you read in a Missing Manual, “Choose `Build`➝`Build`,”
    that means: “Click the `Build` menu to open it. Then click `Build` in that menu.”*


    ## Living Examples


    This book is designed to get your work onto an iPhone faster and more professionally;
    it’s only natural, then, that half the value of this book also lies on the iPhone.


    As you read the chapters, you’ll encounter a number of *living examples*—step-by-step
    tutorials that you can build yourself, using raw materials (like graphics and
    source code) that you can download from the Missing CD (`www.missingmanuals.com/cds`).
    You might not gain much by simply reading these step-by-step lessons while relaxing
    in your hammock. But if you take the time to work through them at the computer,
    you’ll discover that these tutorials give you an unprecedented insight into the
    way professional iPhone developers build apps.


    iPhone development is also a rapidly evolving topic. To keep up with the latest
    news, check out this book’s website at `http://appdevmanual.com`.


