- fmt: 'Here’s a sampling of sites that mentioned or reviewed `Safety Light` after
    the `Daring Fireball` post: A Brazilian site that covers the `Mac` even picked
    up the story!


    - **Laughing Squid.** `http://laughingsquid.com/safety-light-iphone-flashlight-app-with-sos-signal-feature-for-emergency-rescue/`

    - **The iPhone Blog.** `http://www.theiphoneblog.com/2009/12/29/safety-light-iphone-flashlight-app-redeemed/`

    - **Download Squad.** `http://downloadsquad.com/2009/12/30/safety-light-not-just-another-iphone-flashlight/`

    - **Mac Magazine (Brazil).** `http://macmagazine.uol.com.br/2009/12/30/se-voce-for-baixar-uma-lanterna-para-o-iphone-opte-logo-pela-melhor-safety-light/`


    **Tip:** `Google Language Tools` (`http://google.com/language_tools`) can help
    you understand reviews in foreign languages. Parts will be lost in translation,
    but it’s enough to get the gist.


    Make sure to get links to reviews onto your promotional site as quickly as possible.


    Also, pick the best ones and add them to your Application Description in `iTunes
    Connect`.


    ## Online Advertising


    Another avenue for raising awareness about your app is online advertising. Reviews
    and other mentions in the press tend to generate buzz for a short period; you’ll
    get a lot of traffic for a few days and then it’s over.


    Advertising is a great supplement because it’s *repeated* exposure. If you advertise
    on a popular website, visitors will see your brand and marketing message over
    and over.


    Also, ad networks let you show ads to users while they’re using an `iPhone` or
    `iPod touch`—a direct connection to potential customers.


    ### Budget


    So how much do you spend on advertising? To answer that question, you need to
    look at both the product you’re promoting and the type of advertising you want
    to do.


    A general rule of thumb in the advertising world is that 5–10 percent of your
    gross sales should be reinvested back into product marketing. That’s a good starting
    point for thinking about how much you want to spend, but as you’ll see, things
    change significantly depending on your app’s price.


    In all these advertising scenarios, think about how much money you’re making from
    each sale. It’s easy to forget that Apple’s cut is 30 percent. For a 99¢ title,
    you’re earning just 70¢ per unit sold. If your app’s price is $4.99, the net revenue
    is $3.50. As you’ll see, finding effective ways to advertise a low-priced app
    is tough.


    ### Chapter 9: You’ve Got Customers!


    `http://www.it-ebooks.info/`


    **Advertising and Promotion**


    #### Impression-based advertising


    This traditional form of online advertising is based on the number of times an
    advertisement is displayed to visitors. You buy *impressions* in groups of a thousand
    (commonly called a `CPM`). Prices for `CPM` advertising can be as little as $1
    per thousand and go up into the hundreds of dollars.


    **Note:** “`CPM`” stands for “cost per thousand.” The `M` in the acronym is the
    Roman numeral for 1,000. As you enter the world of online advertising, you’ll
    find a lot of strange, three-letter acronyms.


    The cost depends on the website that’s delivering the ad. Each site attracts different
    types of customers. The number of visitors they attract each day also varies widely.


    Don’t be afraid to ask for demographic and traffic statistics when inquiring about
    advertising rates.


    If you’re going to advertise your `iPhone` game on a popular gaming website, get
    ready to pay a high `CPM`. Smaller sites that serve a niche audience will have
    a lower `CPM` and may be a better fit for your product. When looking at costs
    for impression-based advertising, it’s important to keep your break-even point
    in mind. You’ll recover your advertising costs when you divide the cost for the
    1,000 impressions by the revenue from each sale.


    For example, if you spend $1,000 per `CPM` of your 99¢ app, you need to sell an
    additional 1,429 copies just to break even ($1,000 per `CPM` / $0.70 revenue).
    Considering that you’re reaching a maximum of a thousand customers with the ad
    run, selling 1,429 copies is highly unlikely. You might as well throw $100 bills
    out the window. On the other hand, if your app sells for $4.99 and the `CPM` is
    $100, you need to sell only 29 copies to pay for the advertising. That means that
    only 2.9 percent of the thousand people who see the ad need to make a purchase.
    With the right audience, that’s an achievable goal.


    As you’re looking for sites to advertise your app, remember that the people who
    are selling the ad space often have flexibility with pricing. Don’t be afraid
    to negotiate the quoted prices. You can often get a better deal with the rate
    if you’re willing to move your ad run to a date that lets the publisher fill an
    empty slot.


    #### Click-based advertising


    Many advertising networks—including `AdMob` and `Google`—are now carrying ads
    based on a cost per click (`CPC`) model. You bid, in competition with other advertisers,
    for your ad placement by specifying how much you’re willing to pay for each person
    who clicks the ad. The more you’re willing to pay for each click, the more likely
    and frequently it will show up on the network.


    `http://www.it-ebooks.info/`


    **Advertising and Promotion**


    To determine how much you should pay for each click, you need to know how many
    of the people who visit your page in `iTunes` actually make a purchase. This *conversion
    rate* is usually between 5 percent and 10 percent of potential customers. That
    is, for every 100 people who see your page on `iTunes`, about 5 to 10 people will
    buy the product.


    To break even when advertising your 99¢ app, multiply your net revenue per unit
    ($0.70) by the number of units you sell with each click (the 5 percent to 10 percent
    conversion rate), and you come up with a `CPC` in the range of $0.035 to $0.07.
    With a title that’s $4.99, you end up with a `CPC` between $0.17 and $0.35.


    Of course, monitor your sales during the ad run to get a better idea of your true
    conversion rate. The ad network will report the number of times the ad was clicked,
    and Apple reports on daily sales. Compare the number of sales on the day the ad
    was run to your daily average, and use the results to compute the conversion rate.


    For example, an ad for `Safety Light` had a short run with `AdMob` on January
    5, 2010. Using a `CPC` of $0.05, 127,634 impressions were generated in just a
    few hours. The 1,000 clicks on the ad resulted in a `CTR` (click through rate)
    of 0.78 percent. Sales for that day were about 20 above average, giving a 2 percent
    conversion rate. `AdMob` requires a minimum `CPC` bid of $0.05, so when a conversion
    rate on a 99¢ product is less than 7 percent, you’re wasting money. Safety Light’s
    conversion rate was well below this threshold, so no more ad campaigns were run.


    The fact that the ad campaign was completed in just a matter of hours indicates
    that plenty of `iPhone` apps display ads and that plenty of customers are willing
    to click them. That’s good for you, since it means you’ll get plenty of exposure
    even with a low `CPC`, and that benefits higher priced applications. If `Safety
    Light` were priced at $4.99, it would have needed only 15 additional sales per
    day to be cost-effective with the same 1,000 clicks at $0.05 `CPC`.


    Your goal is to find the lowest possible `CPC` that generates additional sales,
    and since each product is unique, the only way to determine that is with trial
    and error. Spend some of your ad budget to find out what works and what doesn’t.


    #### Flat rate


    With flat-rate advertising, the website or ad network agrees to run your ad for
    a certain period at a fixed cost. There’s no guarantee for either the number of
    impressions or the number of clicks. So what does this type of ad delivery have
    to offer?'
