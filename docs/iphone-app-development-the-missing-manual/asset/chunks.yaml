    you get an activation code via email. After clicking the activation link, you
    receive another email from Apple welcoming you to the iPhone Developer Program.
    This is when it gets interesting!


    *Welcome to the club*


    After your successful enrollment, log into your new account, and you see some
    changes in the iPhone Dev Center ( *http://developer.apple.com/iphone*). The navigation
    column at right shows links to new facilities:


    • **iPhone Provisioning Portal.** You use this web application to manage the products
    you build with Xcode, the developers who create them, and the devices the apps
    run on.'
  trans: '

    # 如果你已经是开发者


    如果你已经是一名开发者，你早已习惯使用源码编辑器、编译器、链接器和调试器。但在 iPhone 上，你需要在构建过程中学习一个全新的概念——`代码签名`。未完成此步骤之前，应用程序将无法在你的
    iPhone 上运行。


    这个开发工具箱中的重要新成员，是 iPhone 开发中最具挑战性的方面之一。许多经验丰富的开发者，即便是那些从 iPhone 初次发布起就一直从事开发的人，也时常对其运行机制感到困惑。当你遇到问题时，可以庆幸自己并非孤军奋战。


    ## 加入 iPhone 开发者计划


    正如你在第 1 章所见，苹果免费提供 iPhone SDK，让你能够廉价且轻松地熟悉这个新的开发环境。但一旦决定分发你的产品，就必须加入 iPhone 开发者计划。要在
    iPhone 或 iPod touch 上安装应用（无论是用于测试还是通过 App Store），每年需要支付 99 美元。


    这笔费用有助于苹果运营该计划，但收费还有一个更微妙的理由——这是公司验证你身份的方式。苹果非常重视 iPhone 的安全性，不希望有恶意开发者破坏平台。


    当你使用信用卡注册该计划时，你提供的姓名和地址已经过金融机构的验证。


    ### 选择你的计划


    如果你访问过 iPhone Dev Center（`http://developer.apple.com/iphone`），可能会注意到右侧栏中的“Learn
    more”链接。点击此链接即可开始注册流程。


    第一步是从三种账户类型中选择最适合你需求的一种。


    你可以从两种标准开发者账户中进行选择：个人账户和公司账户。公司账户允许多位开发者构建和安装应用。


    个人账户和公司账户均可访问 App Store。


    **注意：** 你会在 iTunes 列出应用的方式上发现细微差别。个人账户会将你的姓名显示为“卖家”。公司账户则使用你的公司名称。


    你还可以注册企业账户。这种账户仅适用于拥有 500 名或以上员工的大型组织。使用该账户创建的应用只能在内部分发：你不会在 iTunes 中看到它们。


    第 5 章：认真对待开发


    **135**


    `www.it-ebooks.info`


    ## 正式化流程


    ### 付费参与


    选择公司账户或个人账户后，你将经历一系列步骤，提供个人详细信息，包括信用卡信息。你还需要接受该计划的许可协议。


    如果你以个人身份注册标准计划，请确保你的注册信息与信用卡账单信息完全一致。如果不一致，你的申请将被延迟，因为你还需要提供额外的身份证明。


    （苹果试图确保你不是在借用他人的信用卡来支付注册费用。）


    如果你选择了公司账户，苹果还会验证你的企业身份。


    苹果会要求你提供各种文件，并联系你公司的法定代表人，以验证你有权接受该计划的许可协议。


    一旦你提交了付款并证明了自己确实是你所声称的身份，你将通过电子邮件收到一个激活码。点击激活链接后，你会收到另一封来自苹果的电子邮件，欢迎你加入 iPhone
    开发者计划。这时，事情才变得有趣起来！


    ### 欢迎加入这个俱乐部


    成功注册后，登录你的新账户，你会在 iPhone Dev Center（`http://developer.apple.com/iphone`）中看到一些变化。右侧的导航栏显示了通往新功能的链接：


    - **iPhone Provisioning Portal.** 你使用这个 Web 应用来管理你用 Xcode 构建的产品、创建产品的开发者以及运行应用的设备。

    '
- fmt: '- **iTunes Connect.** 这是另一个Web应用程序，让你控制应用在iTunes中的分发方式。你可以在此上传最终应用，并提供用于在App
    Store中销售应用的信息。

    - **Apple Developer Forums.** 开发者论坛为开发者提供了一个电子聚会场所。你可以搜索以前已回答的问题，或提出自己的问题。iPhone开发者计划的成员还可以提前访问iPhone
    OS测试版。

    - **Developer Support Center.** 一个涵盖广泛主题的常见问题列表。如果你对开发者计划有疑问，这里是首选查阅点。


    ## Open the Door


    你将探索的第一个地方是`Provisioning Portal`。在这里，你可以获取`Xcode`构建和安装应用所需的内容。


    **136**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Make It Official


    ### 代码签名对你意味着什么


    在深入了解代码签名的具体细节之前，最好先了解其必要性以及Apple的实现方式。


    编译器和链接器长期以来一直被用于创建应用程序二进制文件。这些代码可以在目标平台上毫无问题地运行，但它们存在一些与安全相关的缺陷：


    - **无法验证软件的创建者。** 相反，使用签名代码，Apple确切知道上传到App Store的软件是由谁创建的。

    - **无法保证软件未被篡改。** 这就是为什么代码签名使用加密哈希，让操作系统能够验证将要执行的比特位是否与你构建的相同。


    iPhone上的代码使用公钥密码学进行签名。即，公钥和私钥的组合（类似于Web浏览器中用于安全通信的密钥）在可执行文件中创建并验证数字签名。你的*私钥*用于创建数字签名，而*公钥*用于将其与文件内容进行比较。


    签名过程中使用的公钥和私钥作为证书存储在Mac OS X钥匙串中。Apple Worldwide Developer Relations（`WWDR`）的证书颁发机构签发该证书。`WWDR`还规定了证书的过期时间。


    Apple还通过要求开发设备安装*配置文件*来控制签名代码的运行位置。每个配置文件包含一个40字符的十六进制数字列表，这些数字唯一标识允许运行指定应用程序的硬件。某些配置文件特定于单个应用程序，而其他配置文件可以指定多个应用程序。该配置文件还包含对创建应用程序的开发人员证书的引用。


    当你启动应用程序进行测试时，会检查配置文件中的设备列表，如果当前设备在列表中，则正常执行。如果没有匹配项，应用程序将终止。


    ***注意：*** 从App Store下载的应用程序不需要配置文件：`iTunes`使用的`FairPlay DRM`控制其执行。


    简而言之，在iPhone上运行应用程序之前，你需要两样东西：能够使用Mac OS X钥匙串中的条目对代码进行签名，以及一个包含你设备ID的已安装配置文件。


    Chapter 5: Getting Serious about Development


    **137**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Make It Official


    ### 钥匙串设置


    如果你很大胆，尝试对之前的某个项目进行真机构建，你很可能在构建过程中看到代码签名错误。除非你跳到了本章，或者有一些之前的iPhone开发经验，否则构建不会完成，因为你还没有设置钥匙串或安装配置文件。


    第一步是配置Mac OS X钥匙串，以便`Xcode`可以在代码签名构建阶段使用它。'
  raw: '• **iTunes Connect.** This is another web application that lets you control
    how your app is distributed in iTunes. It’s where you upload your final application
    and provide the information used to sell it in the App Store.


    • **Apple Developer Forums.** The developer forums provide an electronic meeting
    place for developers. You can search for previously answered questions, or ask
    your own. Members of the iPhone Developer Program also get early access to iPhone
    OS beta releases.


    • **Developer Support Center.** A list of frequently asked questions covering
    a broad set of topics. If you have a question about the developer program, here’s
    the first place to look.


    Open the Door


    The first place you’re going to explore is the Provisioning Portal. It’s the place
    where you get the stuff needed by Xcode to build and install your application.


    **136**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Make It Official**


    *What code signing means to you*


    Before you head off on the specifics of code signing, it’s good to know why it’s
    necessary and how Apple has implemented it.


    Compilers and linkers have long been used to create application binaries. This
    code can be run on the target platform without any problems, but it has a couple
    of security-related deficiencies:


    • **No way to verify who created the software.** With signed code, by contrast,
    Apple knows exactly who created software that’s uploaded to the App Store.


    • **No guarantee that the software hasn’t been altered.** That’s why code signing
    uses a cryptographic hash that lets the OS verify that the bits that are going
    to be executed are the same ones you built.


    Code on the iPhone is signed using public key cryptography. That is, a combination
    of public and private keys (similar to those used for secure communications in
    your web browser) creates and validates a digital signature in the executable
    file. Your *private* key is used to create the digital signature, and a *public*
    key is used to compare it against the contents of the file.


    The public and private keys used in the signing process are stored in the Mac
    OS X


    keychain as a certificate. A certificate authority at Apple Worldwide Developer
    Relations (WWDR) issues the certificate. WWDR also dictates when the certificate
    expires.


    Apple also controls where the signed code can run by requiring development devices
    to have a *provisioning profile* installed. Each profile contains a list of 40-character
    hexadecimal numbers that uniquely identify the hardware that’s allowed to run
    the specified application. Some provisioning profiles are specific to a single
    application, while others can specify multiple applications. The profile also
    contains a reference to the certificate of the developer who created the application.


    When you launch an application for testing, the list of devices in the provisioning
    profile is checked, and execution proceeds normal y if the current device is included.


    If there’s no match, the application is terminated.


    ***Note:*** Applications downloaded from the App Store don’t require a provisioning
    profile: The FairPlay DRM used by iTunes controls their execution.


    In short, you need two things before you can run an application on the iPhone
    itself: the ability to sign code using entries in Mac OS X’s keychain and an installed
    provisioning profile that contains your device’s ID.


    Chapter 5: Getting Serious about Development


    **137**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Make It Official**


    *Keychain setup*


    If you were adventurous and tried to do a device build of one of the previous
    projects, you likely saw a Code Sign error during the build. Unless you skipped
    ahead to this chapter, or have some previous iPhone development experience, the
    build won’t complete because you haven’t set up the keychain or installed the
    provisioning profile.


    The first step is to get the Mac OS X keychain configured so that Xcode can use
    it during the code-signing build phase.'
