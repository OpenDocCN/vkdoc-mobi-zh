- fmt: '好的，这是根据您的要求对文本进行排版后的结果。


    Remember that you get 50 additional promotional codes with each new version that
    Apple approves. After you see `Ready For Sale` (page 268), the counter is pushed
    up to its maximum value, even if you had some codes left on the previous version.
    Don’t let your promo codes go to waste. Request all of your remaining promo codes
    as soon as you upload your new version. These codes are valid for 30 days, and
    you can use them for promoting either the current version or the upcoming one.


    ## Sale Prices


    Pick up a local newspaper and look at the advertisements: you’ll find no shortage
    of 50 percent OFF or SAVE $20 with LIMITED TIME OFFERS. It’s normal for consumers
    to think of the money they’re saving, rather than the money they’re spending.


    Good advertisers know that everyone wants to think they got a great deal with
    their purchase. The same is true in the App Store. You can increase your sales
    momentum by giving customers a reduced price.


    For many products, you’re not going to make a lot more revenue with this maneuver.


    For example, if you’re selling 100 units a day at $1.99, expect to sell about
    200 units at 99¢. Your gross revenue won’t change much during the sale. So why
    do it?


    - **A sale gives you an opportunity to generate buzz on the Internet.** Sites
    will link to your product because they know their readers love knowing about good
    deals.


    **Note:** Remember, those web links will still be around after your sale is over.
    That’s a good thing, because people will still visit your promotional site and
    learn about the product.


    - **Increasing the size of your customer base also helps with word-of-mouth recommendation.**
    People who love your product *and* got a deal will tell their friends.


    - **The increased sales volume can get you into the top sellers for your category
    on iTunes.** If you’re already there, it will raise your ranking.


    Sale prices also play a part in determining your launch price. If you start at
    99¢, you have no room to play this game. Also remember that it’s much easier to
    drop a price than it is to raise it: Some customers will feel cheated by the increased
    cost.


    *Eddie’s not really crazy*


    The ultimate sale, of course, is to give your product away for free. Sounds crazy
    until you consider the points on page 289. You’re essentially advertising at a
    cost of lost sales. For example, if your normal sales for a 99¢ app are 100 units
    per day, giving it away for free costs you $70 per day. When you consider the
    advertising costs presented earlier in this chapter, that’s pretty darn cheap.


    **Note:** A variation on this promotional technique, discussed on page 260, is
    to offer a free trial version that uses in-app purchases to provide additional
    features. A great trial version will build awareness for your app and lets you
    sell while customers are enjoying your product.


    *Let people know*


    To maximize the effect from sale prices, you need to let people know about it.
    Yes, that means you’re going to be advertising an advertisement. Welcome to the
    crazy world of marketing!


    You’ll use your normal press channels to let the media know when the sale is happening.
    Social networks are also a great mechanism for getting the word out.


    For applications that are already in the charts, or that expect to be because
    of the increased volume, updating the application icon in iTunes Connect can draw
    attention to the promotion.


    ## Plotting It Out


    So how does all of this advertising and promotion affect your revenue? The best
    way to answer that question is with a graph of a year in the life of Gas Cubby
    (an app that tracks vehicle maintenance and calculates your mileage). The app’s
    developer, David Barnard, kept close records of his sales and events throughout
    the year and produced the chart shown in Figure 9-10.


    You can easily see the effect of being mentioned on major websites like The Unofficial
    Apple Weblog (TUAW), Gizmodo, and CNN/Time. Another event that many iPhone developers
    look forward to is the holiday season: Sales take a big jump as people receive
    gift cards and shiny new hardware on Christmas Day.


    Initially, the App Store showed product updates on each category’s page. The spike
    you see for the 2.0.1 update in Figure 9-10 wouldn’t happen today, since only
    new releases are featured within iTunes. Keeping a product updated may generate
    some press, but its primary benefit is to keep customers happy by providing bug
    fixes and new features, not to drive new sales.


    ![Image 91](index-309_1.jpg)


    **Figure 9-10:** *This chart shows the first year of sales for the Gas Cubby app
    sold by App Cubby. Mentions on prominent sites and new releases produce sales
    spikes. Promotion within the App Store also has a huge effect on the revenue.*


    The biggest spikes come from Apple itself. Appearing in the `What’s Hot` or `Staff
    Picks` on the front page of the App Store provides a huge increase that lasts
    over several weeks. The huge spike in the middle is the result of being featured
    on Apple’s website and in a mailing sent out to all customers.


    **Tip:** You can read more about the graph in Figure 9-10 and about many other
    marketing topics in *MarketingiPhoneApps* by Rana June Sobhany (O’Reilly).


    ## Monitor Coverage


    Now that your advertising and promotions are firing on all cylinders, you have
    to ask yourself: Is it effective?


    To answer that question, you have to monitor your product’s discoverability, sales
    ranking, and link effectiveness. That sounds a bit like marketing mumbo-jumbo,
    but it’s actually some pretty cool engineering.


    ### Ranking


    Apple provides data feeds that contain the rankings for the top application in
    each App Store category as well as overall rankings. The feeds are broken down
    into free, paid, and top-grossing lists. As you learned on page 273, several of
    the sales tracking applications let you download and display these rankings.


    If your product makes it into one of the Top 100 lists, you’ll want to track its
    position very closely. That’s when it’s time for a Mac desktop application called
    `MajicRank` ( `http://majicjungle.com/majicrank.html`).


    Dave Frampton developed this app to track his popular iPhone game, Chopper.


    With `MajicRank`, you can automatically download the ranking at an interval of
    your choosing. Your application’s rank is then plotted on a graph, as shown in
    Figure 9-11.


    `MajicRank` requests a $20 donation for using the software.


    ![Image 92](index-310_1.jpg)


    **Figure 9-11:** *This graph, produced by MajicRank, shows how Safety Light’s
    ranking changed every half hour after being featured on Daring Fireball. You can
    see the effect of advertising and other promotions that began on January 5. It’s
    interesting to note that the only European chart that Safety Light appears on
    is Italy and that the only localization for the app is Italian.*


    Rank tracking is also a good way to keep an eye on your competitors. Unlike the
    detailed sales figures, which only you and your team can access, rankings are
    public information. When a competing app does a release with a new feature and
    its ranking jumps, you can infer that sales have increased. That means you have
    some work to do.


    ### Google


    Google is your friend when it comes to finding links to your app. Of course, you’ll
    want to search for your application name. For a common application name like `Safety
    Light`, you’ll get a lot of hits for things that aren’t iPhone applications. In
    such cases, just search for *Safety Light app*, and the results will be much more
    relevant.'
  raw: 'Remember that you get 50 additional promotional codes with each new version
    that Apple approves. After you see Ready For Sale (page 268), the counter is pushed
    up to its maximum value, even if you had some codes left on the previous version.
    Don’t let your promo codes go to waste. Request all of your remaining promo codes
    as soon as you upload your new version. These codes are valid for 30 days, and
    you can use them for promoting either the current version or the upcoming one.


    Sale Prices


    Pick up a local newspaper and look at the advertisements: you’ll find no shortage
    of 50 percent OFF or SAVE $20 with LIMITED TIME OFFERS. It’s normal for consumers
    to think of the money they’re saving, rather than the money they’re spending.


    Good advertisers know that everyone wants to think they got a great deal with
    their purchase. The same is true in the App Store. You can increase your sales
    momentum by giving customers a reduced price.


    For many products, you’re not going to make a lot more revenue with this maneuver.


    For example, if you’re selling 100 units a day at $1.99, expect to sell about
    200 units at 99¢. Your gross revenue won’t change much during the sale. So why
    do it?


    • **A sale gives you an opportunity to generate buzz on the Internet.** Sites
    will link to your product because they know their readers love knowing about good
    deals.


    ***Note:*** Remember, those web links will still be around after your sale is
    over. That’s a good thing, because people will still visit your promotional site
    and learn about the product.


    • **Increasing the size of your customer base also helps with word-of-mouth**
    **recommendation.** People who love your product *and* got a deal will tell their
    friends.


