    kinda boring now, but wait until you get to the controller (page 205). That view
    is going to move and groove!


    **refine the look**


    Now that you’ve seen the NIB files, it’s time to take a look at how some of the
    custom views were created. There’s a custom view for the light source and another
    for information displayed at the top of the screen.


    LightView


    This view is modeled after a physical light. Objects that emulate the real world
    are usual y easier to design, since the correct behavior is already something
    you’re familiar with. They also tend to make your code easier to read.


    You see this tendency a lot in Cocoa Touch. For example, the *UISwitch* control
    manages its state by using a property named *on.* Which of these snippets of code
    is more readable?


    mySwitch.on = YES;


    or


    mySwitch.state = YES;


    The properties of the view let you change the state of the light (on, off, or
    a single pulse). You can also set the brightness and color of the light. To model
    the physical property of the light, you can also set an envelope where attack
    and release variables control the amount of time the light takes to turn on and
    off.


    *Delegation*


    Delegation is not just for system classes. The light uses this design pattern
    to notify another object that taps have occurred in the view. In this application,
    that object is *MainViewControl er.* When the tour reaches the controller code
    (page 194), you see how it acts as the delegate.


    When you look at LightView.h, you see a forward declaration of the protocol:


    @protocol LightViewDelegate;


    This declaration is needed because there’s a chicken-and-egg problem between the
    delegate and the view. Both the class and protocol definition need each other.


    Using this forward declaration, the delegate instance variable is defined as:
    id <LightViewDelegate> delegate;


    This variable tel s the compiler that the delegate can be any object as long as
    it conforms to the *LightViewDelegate* protocol. (Remember that *id* is a generic
    object of any class.)


    Chapter 6: A Flashlight for Pros


    **169**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **refine the look**


    The full protocol declaration follows the *LightView* *@interface*:


    @protocol LightViewDelegate <NSObject>


    @optional


    - (void)lightView:(LightView *)view singleTapAtPoint:(CGPoint)tapPoint;


    - (void)lightView:(LightView *)view doubleTapAtPoint:(CGPoint)tapPoint;


    @end


    The two messages sent by the *LightView* are *–lightView:singleTapAtPoint:* and


    *–lightView:doubleTapAtPoint:*. Both are tagged as *@optional,* so it’s up to
    the delegate whether it implements these methods. If *@optional* is not specified,
    the delegate is required to provide the methods.


    *Enumeration*


    C enumerations are used throughout Cocoa Touch as a way to express multiple options
    in code. The light view uses an enumeration to control the state of the light.
    One example in UIKit is the *UIViewAnimationCurve* enumeration. The enumeration’s
    naming and values follow a simple pattern—a concatenation of the class name, the
    property name, and a unique option name. So the animation curve types are *UIViewAnimationCurveEaseInOut,*
    *UIViewAnimationCurveLinear,* and so on.


    Yes, it’s wordy, but very easy to read in code:


    [UIView setAnimationCurve:UIViewAnimationCurveLinear];


    ***Note:*** This standard naming pattern is very useful with automatic completion
    in Xcode. Once you know the rules, finding these long names is easy.


    For example, you can type ***UIViewAnim*** ****and press Esc to display a list
    of suggestions. You know to type the initial text because you’re working with
    a ***UIView*** ****and the ***animationCurve*** ****property.************


    ******The light view follows this pattern with its own enumeration:


    typedef enum {


    LightViewStateOff = 0,


    LightViewStateOn,


    LightViewStatePulse


    } LightViewState;


    which is used in the instance variable definition:


    LightViewState state;


    and in the property:


    @property (nonatomic, assign) LightViewState state;'
