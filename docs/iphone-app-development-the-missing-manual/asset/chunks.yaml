  raw: 'If you made it through the last two chapters unscathed, you’re probably not
    someone who does design for a living. And that’s just fine, because this section
    isn’t about drawing things that are pretty. It’s about making things that work
    pretty.


    **103**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Plan Before You**


    **Code**


    Many developers think a designer is someone who comes in at the end of a project
    and cleans up graphics—someone who can take all of those ugly images you created
    as placeholders and update them before you ship the product.


    Designers can certainly do these things, but you’re selling them short if that’s
    all you ask them to do. Great designers will help you determine what the product
    should do by providing the perspective of someone who’s not intimately involved
    with the technology.


    As a developer, you tend to look at problems from the implementation outward.


    A designer thinks about the final product and works inward toward how it’s constructed.
    When the logical left side of your brain encounters the designer’s artistic right
    side, great things can happen.


    Designers provide a point of view that you don’t have. Don’t be afraid to get
    this valuable input early in your product’s lifecycle.


    Design Goals


    Here are some of the general things you and your designer should focus on:


    • **Focus on the user and her task.** Your primary goal is to always think about
    use cases before forging ahead with a design solution. Some developers like to
    write user stories to formalize the kinds of tasks their customers will perform.


    • **Follow established conventions.** Apple has done an excellent job developing
    actions, behaviors, gestures, and metaphors with the built-in applications. You’d
    be wise to follow their lead whenever possible.


    • **Maintain consistency.** People intuitively learn the patterns in your application.


    Make sure that the look and feel for these patterns remains the same throughout
    your design. This is especial y important when you need to deviate from the established
    conventions mentioned above.


    • **Reduce complexity.** Designing a complex interface is easy. The most difficult
    job of a designer is distilling the elements down to their most basic level. Always
    question the need to add “just another control.” Removing parts of your interface
    should give you more satisfaction than adding them.


    • **Make the application’s state clear.** If a background task like refresh is
    occurring, you need to convey that information to the user. When a user performs
    an action, visual feedback in the form of a highlight or an animation lets her
    know what’s going on internal y. Assume that people will make mistakes, so provide
    well-written feedback, and give them a way to undo the action.


    • **A good design isn’t static.** Don’t be afraid to iterate! Your customers’
    needs will change over time. Leave room for growth—even when you have no idea
    how the product will evolve.


    **104**


    iPhone App Development: The Missing Manual


    ![Image 35](index-123_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Plan Before You**


    **Code**


    What’s Unique about iPhone Design?


    Even if you’ve had years of application design experience and the list in the
    previous section is second nature to you, you’re still going to face many new
    challenges in your design. If you’re wondering what’s so different about designing
    for the iPhone, there’s a simple answer: lots!


    *Let’s get physical*


    The first thing you notice about the iPhone is how you interact with it physical
    y.


    The contact is direct, not through an intermediate device like a mouse.


    Input by human finger has some immediate implications that you need to consider
    in your design:


    • **Finger size and reach.** A fingertip, like the one shown in Figure 4-1, is
    much larger than a mouse pointer. The length of the finger can also be a limiting
    factor when trying to reach different areas of the screen at the same time. Hands
    also come in a wide variety of sizes.


    ***Figure 4-1:***


