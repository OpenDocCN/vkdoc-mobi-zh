    **5\. Change the name of the file to *Distribution.certSigningRequest,*** **and
    save it on** **the desktop.**


    **6\. Click Done to close the assistant after you see the confirmation screen.**


    Then it’s time to upload that certificate request to the Provisioning Portal.
    (If you need a refresher on what the portal is and how to get there, see page
    136.) **1\. On the Provisioning Portal page, click Certificates in the left column.**


    The Certificates page opens to the Development tab.


    **2\. You’re going to create a distribution certificate, so switch to the Distribution**
    **tab. You see a warning that you don’t have a valid certificate; click the Request**
    **Certificate button so you can upload your request.**


    Click Choose File, and a file dialog box opens (Figure 7-1).


    **3\. Navigate to the *Distribution.certSigningRequest*** **on your desktop and
    then** **click Choose.**


    **4\. Back on the Distribution tab, in the lower-right corner, click Submit.**


    You see a confirmation that the request was submitted. The certificate’s status
    reads “Pending Approval”. Believe it or not, Apple is asking you to approve your
    own request.


    ***Note:*** If you’re working with a company account, only the team agent can
    approve the certificate request.


    The agent is the person who originally signed up for the developer account.


    **5\. In the Action column, click Approve.**


    The status column changes to Pending Issuance.


