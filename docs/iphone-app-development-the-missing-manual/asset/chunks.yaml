    \n要了解它的工作原理，你可以查看 Safety Light 应用程序的网站统计信息 (`http://safetylightapp.com/mint/`)。不必担心你的竞争对手能对你的网站这样做：标准的\
    \ Mint 配置使用密码来保护这些信息。此站点上已启用此功能，仅用于演示其能力。\n\n**App Store，你来了**\n\n当你的 Beta 测试正在进行时，这也是连接到\
    \ iTunes 的最佳时机。当测试人员对产品进行全面测试时，你可以开始准备将其上架销售所需的工作！\n\n是时候访问另一个为 iPhone 开发者服务的\
    \ Apple 网站了……\n"
- fmt: "**232**\n\n**iPhone App Development: The Missing Manual**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# Chapter\n\n## For Sale\n\nYour beta test is going well, so now it’s time to\
    \ turn your attention to how you’re going to sell the final product. iTunes has\
    \ over 100,000 applications, and it’s time for yours to join them.\n\nThis chapter\
    \ will introduce you to `iTunes Connect`, a web application that provides access\
    \ to the database of products offered in the App Store. You’ll use your browser\
    \ to set up financial details, provide information about your application, set\
    \ or update pricing, and to upload the final build.\n\nYou’ll also encounter the\
    \ review process that Apple uses for every submission. It’s one of the more frustrating\
    \ areas of iPhone development, so this chapter will show you how to smooth out\
    \ the process.\n\n### Sign on the dotted line\n\nThe first thing you do in `iTunes\
    \ Connect` is deal with the legal contracts and banking information with your\
    \ new partner.\n\n#### Welcome\n\nTo log into `iTunes Connect`, point your browser\
    \ at `http://itunesconnect.apple.com`.\n\nTake a moment to bookmark that URL—you’ll\
    \ use it a lot. On the login screen, enter your iPhone Developer Center username\
    \ and password.\n\n> **Tip:** If you’re already logged into the developer site,\
    \ you can simply click the `iTunes Connect` link in the right column on the main\
    \ page. You won’t need to log in again.\n\n**233**\n\n![Image 72](index-252_1.jpg)\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### Sign on the dotted line\n\
    \nAfter logging in, you see a form that asks you to accept the terms and conditions\
    \ for the website. You only see this the first time you use `iTunes Connect` or\
    \ if Apple changes the contract. If you want to put your app in iTunes, accept\
    \ these conditions.\n\nOnce in `iTunes Connect`, you see a screen that looks something\
    \ like Figure 8-1.\n\n> **Figure 8-1:** The `iTunes Connect` main screen is where\
    \ you manage all the details for distributing your application on the App Store.\
    \ You use some of the items only when you add or update an app, while you might\
    \ use others every day. The first thing to do is set up contracts and tax and\
    \ banking information.\n\n#### First Order of Business\n\nThe first order of business\
    \ is to get your contracts, tax, and banking information set up. When you signed\
    \ up for your iPhone Developer account, you provided only contact information.\
    \ But a business partnership involves a lot more than knowing each party’s identity.\
    \ It’s time to get the lawyers, government, and financial institutions involved!\n\
    \nStart getting things in place by clicking the “Contracts, Tax, & Banking Information”\
    \ link on the `iTunes Connect` home page. Once this page loads, you see that you\
    \ already have a contract in effect. When you signed up to be an iPhone developer,\
    \ Apple gave you a contract to distribute free applications worldwide. If you\
    \ don’t want to make any money from iTunes, you’re done!\n\n##### Contracts\n\n\
    As with most things involving money, things are a little bit more complicated\
    \ if you want Apple to pay you. Turn on the `Request Contract` checkbox and click\
    \ `Submit`.\n\n(If someone else on your development team is handling the legal\
    \ stuff, that person should complete these steps.)\n\n**234**\n\niPhone App Development:\
    \ The Missing Manual\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n###\
    \ Sign on the dotted line\n\nOnce you submit the request, you see the contract\
    \ that Apple’s offering you—Paid Applications. The contract assigns Apple as your\
    \ agent/commissionaire to sell and distribute your software with no ownership\
    \ interest. You agree to provide licensed applications and to support the end\
    \ user. The contract also stipulates Apple’s commission (30 percent), how taxes\
    \ are collected worldwide, and when you get paid (net 45 days from the close of\
    \ the month).\n\n> **Note:** As with any contract, you should have both your lawyer\
    \ and accountant review the entire document. The previous paragraph is just a\
    \ summary.\n\nIf you and your lawyer accept the conditions, click the `Agree`\
    \ checkbox and submit the form. You see a confirmation screen, and a PDF of the\
    \ contract is on its way to you by email. Click `Done` to return to the contract\
    \ setup screen.\n\n##### Contact info\n\nThe next step to set up the contract\
    \ is to add additional contact information. `iTunes Connect` lets you assign specific\
    \ roles to various people in your organization. For example, your accounting department\
    \ can get access to the financial reports, while marketing can generate promotion\
    \ codes.\n\n1. In the `Contact Info` for your contract, click `Edit`.\n\n   The\
    \ next screen shows your company’s legal address along with the roles within `iTunes\
    \ Connect`. For now, just assign yourself to all the roles. As needs arise, you\
    \ can create new users, with new Apple ID accounts, by clicking `Manage Users`\
    \ on the home screen.\n\n2. To create your contact information, click `Create\
    \ New Person` and then enter your `iTunes Connect` user name and email address.\
    \ Add your title and phone number and then click `Create`.\n\n   You end up back\
    \ on the contact information page.\n\n3. For the `Senior Management`, `Finance`,\
    \ `Technical`, `Legal`, and `Promotions` roles, choose your name from the drop-down\
    \ menu.\n\nOnce you’re done, click the `Submit` button to proceed to the next\
    \ step.\n\n##### Bank info\n\nAfter your contacts are defined, you need to tell\
    \ Apple where to deposit the money you earn each month. The money will be deposited\
    \ in two ways:\n\n- **ACH.** A standard electronic deposit using the Automated\
    \ Clearing House. This method is used only for earnings in U.S. dollars. Deposits\
    \ from “Apple Inc.” are for proceeds in the U.S. iTunes store. You’ll also see\
    \ an “iTunes S.A.R.L.” deposit for countries without their own iTunes store.\n\
    \n**235**\n\nDownload from Wow! eBook\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### Sign on the dotted line\n\n- **SWIFT.** A wire transfer using the Society\
    \ for Worldwide Interbank Financial Telecommunication. Earnings from the iTunes\
    \ stores in Australia, Canada, Europe, Great Britain, and Japan are deposited\
    \ using this mechanism. This transfer also converts any foreign currencies into\
    \ U.S. dollars using the current exchange rate. Unfortunately, many banks don’t\
    \ provide information about the source of the transaction or the rate used, making\
    \ it difficult to reconcile your records.\n\nBoth transfer mechanisms need an\
    \ account number in order to complete the deposit.\n\nAn ACH transfer uses a nine-digit\
    \ ABA routing number to determine where the money will be deposited. A SWIFT code\
    \ is used for the wire transfer between foreign financial institutions.\n\nYou\
    \ get the ABA routing number and SWIFT code from your bank. (Check the support\
    \ pages at your bank’s website: You’re not the first person to need it.) Once\
    \ armed with this information, you can fill out the banking information form:\n\
    \n1. On the `Manage Your Contracts` screen, under `Bank Info`, click `Edit`.\n\
    \n   You land on the main `Banking Information` screen.\n\n2. To begin setting\
    \ up your bank’s information, click `Add Address`. Enter the mailing address for\
    \ the bank where your account is held. Click `Submit`.\n\n   You should be able\
    \ to get this information from your last bank statement.\n\n3. Enter your account\
    \ information.\n\n   Select the currency used for the account, and then fill in\
    \ the name fields for both the bank and the account holder. Choose the `Account\
    \ Type`: You’ll probably want to use a checking account so you can easily draw\
    \ on the deposit.\n\n   The remaining four fields are specific to your account.\
    \ You probably already know your account number and branch. As noted above, you\
    \ can also easily get the ABA number and SWIFT code.\n\n4. Double-check everything.\n\
    \n   Really. Then do it again. If anything is wrong, you won’t get paid, and it’s\
    \ a difficult manual process to get the information updated.\n\n5. Click `Submit`.\n\
    \n   The last step is to certify that the information you entered is true and\
    \ correct, and to authorize Apple to make payments into your account."
