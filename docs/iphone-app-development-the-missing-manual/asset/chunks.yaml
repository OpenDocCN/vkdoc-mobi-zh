- fmt: '```markdown

    As you can see, in most cases the resources are an order of magnitude smaller
    than you’re used to. Many of these limitations will come into play when you’re
    implementing your design; others will have an immediate impact.


    For example, the small display obviously limits the amount of information you
    can present on a single screen. Likewise, the limited amount of memory and processing
    power prevents you from putting thousands of items in your app’s lists. Displaying
    hundreds of items is less taxing on the system *and* on the user who has to interpret
    the information. Less is more, both for the device hardware and the person using
    it.


    ## Keep It Simple


    You have a lot of new things to come to terms with in your first iPhone application.
    Don’t be afraid to avoid some of them initially. Many successful designs on the
    iPhone started out simple. The developers focused on solving the problem at hand
    and kept the implementation as basic as possible. As their knowledge and experience
    about the platform grew, so did their product.


    Your application will certainly evolve over time. Remember that it’s much easier
    to add a feature in a future release than it is to remove one once it’s in a customer’s
    hand. Don’t try to guess what people want from your application. Let them tell
    you and guide your education in this new and exciting platform!


    ## The Design Process


    Whether you’re a designer or developer, you can use some simple steps and tools
    to get your application idea off the ground.


    ### A Paper Prototype


    Even if you don’t have the skills to make nice-looking icons and images, you can
    still draw rough prototypes of your design. Your paper drawings may not be pretty,
    but they’re just fine for getting the initial feel of the app.


    This low-tech design technique is surprisingly effective. The key is that the
    piece of paper and the iPhone share something in common: You can interact with
    both by using your sense of touch.


    Chapter 4: Design Tools: Building a Better Flashlight


    **107**


    ![Image 36](index-126_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Plan Before You Code**


    You’ll find yourself imagining what it’s like to touch the controls drawn on the
    paper. It’s also easy to move pieces of paper around as you envision the transitions
    between one screen and another. The fact that it’s hard to write down a lot of
    information in a constrained space naturally forces you to simplify ideas.


    And unlike with code, if you find something that doesn’t make sense, it’s just
    a matter of pulling out the eraser and modifying the interface. Tools like `Xcode`
    and `Interface Builder` make your life much easier when you’re implementing designs,
    but they can be a huge waste of time when you’re in the discovery phase of development.


    Paper also has another nice quality: It lets the designer and developer work together
    at the same time. It’s difficult for a group to work on a Photoshop composition
    or on an `Interface Builder` document simultaneously. With paper, everyone can
    have a pencil and contribute. See Figure 4-2 for an example of a paper prototype.


    ***Figure 4-2:*** This is a great example of paper prototyping done by Christian
    Krämer at Cultured Code. This illustration shows many of the screens they designed
    for their award-winning `Things` application. Some of these initial screens changed
    over the life of the project, but the basic flow of the application, represented
    by arrows, did not.


    ### A Pencil and Paper And…


    So what tools do you need to create these paper prototypes? Obviously, you need
    paper and a pencil, along with a couple of less obvious things. Take a look in
    Figure 4-3 at the tools that Cultured Code used to create the diagram in Figure
    4-2.


    **108**


    iPhone App Development: The Missing Manual


    ![Image 37](index-127_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Plan Before You Code**


    ***Figure 4-3:*** The tools used to create the paper prototype shown in Figure
    4-2\. Everything in this image is important, especially the templates for standard
    user interface elements.


    Why the eraser? You shouldn’t be afraid to make mistakes at this point in your
    design. Also, if you’re working with a group, the eraser is an important tool
    to help refine someone else’s idea. Highlighting pens are also helpful for visually
    breaking up the interface’s components.


    You’ll also want to have an iPhone handy, with the latest version of the iPhone
    OS. You’ll frequently want to refer to Apple’s apps as examples of how to do things
    “the iPhone way.” iPhone users are most familiar with the device’s built-in software:
    If you mimic those designs and interactions, you’ll be creating something that’s
    easy for folks to learn.


    The most important thing in this photo is the screen template with the iPhone’s
    standard UI dimensions. You’ll be drawing a lot of these boxes as you work through
    your design.


    Christian’s template was created by hand out of necessity. Luckily, entrepreneurs
    have realized that there’s a strong demand for these types of products, and now
    several paper prototyping solutions are on the market:


    - **http://uistencils.com**. This user interface stencil by Design Commission
    makes it a snap to draw the standard symbols and controls used on the iPhone.
    They also sell a sketchpad that works beautifully with the stencil. You spend
    your time thinking about the design rather than how to draw it. Both Figures 4-4
    and 4-5 were created using this stencil and sketchpad.


    - **http://appsketchbook.com**. Stephen Martin came up with this sketchbook after
    being asked to design several iPhone user interfaces. The result is a high-quality
    spiral-bound notebook with a wireframe template printed on each page. Perfect
    for the designer who wants to capture an idea.


    Chapter 4: Design Tools: Building a Better Flashlight


    **109**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Plan Before You Code**


    ### Make It Pretty


    Once you have a feel for the overall design of the application, you’ll want to
    start formalizing how it’s going to look onscreen. This is the point where you
    start thinking about branding and adding unique elements to your app.


    **Note:** For many companies, this is a really important part of the process.
    A firm like UPS doesn’t want their app to be the standard shades of blue with
    black and white text. They’re going to rely on their corporate color scheme of
    brown and gold. You can also bet their logo will be featured prominently.


    This work is best left to a designer who’s an expert with Photoshop and other
    illustration tools. If you’re a developer, people will notice that you can’t draw,
    and that distracts them from the awesome code that’s behind the images. If you
    haven’t gotten a designer involved during the paper prototyping stage, you’ll
    need to spend time explaining your design. Which is another reason to get one
    involved early in the process.


    Not all designs will go through this step. If you’re going to use the standard
    UI controls and layouts, there won’t be much for a designer to do.


    As your designer is working on mockups, you’ll want to make sure that they know
    that the standard UI widgets are available in several document formats. If your
    designer is working with Illustrator, they’ll want to know about Mercury Interactive’s
    vector UI elements (`http://www.mercuryintermedia.com/blog/index.php/2009/03/iphone-ui-vector-elements`).
    For designers who prefer to work in Photoshop, Teehan+Lax (`http://www.teehanlax.com/blog/2009/06/18/iphone-gui-psd-30/`)
    and Smashing Magazine (`http://www.smashingmagazine.com/2008/11/26/iphone-psd-vector-kit/`)
    both provide PSD files with elements arranged in layers. Another option is to
    use Patrick Crowley’s stencil kit for OmniGraffle (`http://graffletopia.com/stencils/413`).

