- fmt: '# Notifications


    When you want to receive a notification about a system event, you tell the notification
    center a little about yourself. Suppose you’re interested in knowing when your
    application becomes active, either at launch or when the iPhone is unlocked. Typically,
    you’d add your view controller as an observer:


    ```

    @implementation MyViewController


    . . .


    - (NSObject *)initWithNibName:(NSString *)nibNameOrNil bundle:(NSBundle *) nibBundleOrNil
    {


    if (self = [super initWithNibName:nibNameOrNil bundle:nibBundleOrNil]) {


    . . .


    [[NSNotificationCenter defaultCenter] addObserver:self selector:@selector(becomeActive:)

    name:UIApplicationDidBecomeActiveNotification object:nil];


    . . .


    }

    ```


    The first parameter is `self`, which tells the notification center that the view
    controller will handle the notification. The selector `becomeActive:` specifies
    the message that is sent to the view controller, and the name indicates the controller’s
    interests. The `UIApplicationDidBecomeActiveNotification` is delivered to the
    controller when a user is able to interact with the user interface.


    **Note:** The object parameter isn’t used in this example, but it can be used
    to specify the sender of the notification. By specifying `nil`, you’re saying
    that you want to receive every notification of this type, regardless of the originating
    object.


    Since you’ve registered to receive the notification, you now need to implement
    the method that will handle it:


    ```

    - (void)becomeActive:(NSNotification *)notification {


    NSLog(@”OPEN PUMPERNICKEL”);


    }

    ```


    Now `OPEN PUMPERNICKEL` will appear in the console log each time you start or
    unlock your app. Great feature, huh?


    OK, so it’s not a great feature. But what if that notification initiated a connection
    to refresh some data using the Internet? Or what about updating the device’s location?
    It’s a good trigger to let you know that the user is actively working with your
    application.


    Similarly, you can use the `UIApplicationWillResignActiveNotification` to cancel
    any pending operations, especially ones that are keeping the wireless connections
    alive. If you stop the network operations, the radios can power down, and you’ll
    increase the battery life. Everyone’s happy!


    It’s very important to tell the notification center when your view controller
    object is no longer interested in knowing about these events. If you don’t, your
    application can crash, because when you add an observer, notification is done
    by reference. If the object that was registered gets freed, the notification will
    be sent to an instance that no longer exists, and a memory fault will occur.


    The fix is quite simple. Make sure you match every `–addObserver:selector:name:object:`
    with a corresponding `–removeObserver:name:object:`. You can also use `–removeObserver:`
    to remove all notifications at once. Since the observer was added during initialization,
    it makes sense to remove it during `–dealloc`:


    ```

    @implementation MyViewController


    . . .


    - (void)dealloc {


    . . .


    [[NSNotificationCenter defaultCenter] removeObserver:self];


    [super dealloc];


    }

    ```


    **Note:** These are notoriously hard bugs to track down. You’ll see failures in
    `objc_msgSend` coming from code you didn’t write, and they’ll happen at times
    you don’t expect. If you use notifications, make sure that they get cleaned up
    properly.


    Notifications aren’t limited to ones generated by the system. You can define your
    own to get the various parts of your app in sync. Imagine several controllers
    in your application need to know when a network connection finishes. `NSURLConnection`
    is based on delegation, so only one object will know when the operation completes.
    That object could pass the information onto interested parties by defining its
    own notification name. A notification name is nothing more than a string object,
    so you’d define its existence in the class interface file like this:


    ```

    extern NSString *MyConnectionDidFinishNotification;

    ```


    In the object’s implementation, you’d define the value for the notification name:


    ```

    NSString *MyConnectionDidFinishNotification = @”MyConnectionDidFinishNotification”;

    ```


    And when the connection completes, you would post the notification like this:


    ```

    [[NSNotificationCenter defaultCenter] postNotificationName:MyConnectionDidFinishNotification
    object:self];

    ```


    Any object in your application that has called `–addObserver:selector:name:object:`
    with `MyConnectionDidFinishNotification` will then get a message and can update
    views, controllers, and models accordingly.


    # Singletons


    The singleton design pattern is used in several key classes in Cocoa Touch. Singletons
    allow a class to return the same object instance anytime another object requests
    it. This is very handy when you *never* want more than one object of that type.


    The `NSNotificationCenter` you just read about is an example. All notifications
    need to be routed through a centralized service for them to be effective. Just
    as importantly, objects need to be able to locate that central instance, and that’s
    accomplished with the notification center’s class method:


    ```

    + (id)defaultCenter;

    ```


    Every object that sends a `+defaultCenter` message gets back the same object.
    That lets all objects add and remove observers in the same place.


    Many times a class will use a singleton as a way to model that the thing only
    occurs once, either physically or virtually. You have only one application, set
    of settings, and hardware accelerometer, for example.


    Unfortunately, there’s no one standard for naming singletons. Older classes, such
    as those in the foundation, use the `default` prefix on the method name. Newer
    classes tend to use `shared` as a prefix. The most common singleton classes are:


    - `NSFileManager` (`defaultManager`)

    - `NSUserDefaults` (`standardUserDefaults`)

    - `UIApplication` (`sharedApplication`)

    - `UIAccelerometer` (`sharedAccelerometer`)

    - `NSNotificationCenter` (`defaultCenter`)


    ## Singletons as Globals


    Many experienced developers recommend against using singletons. If you’ve ever
    programmed using global variables, you’ll realize that singletons are really just
    a fancy way of representing a global state. You’ll also appreciate that as applications
    grow and evolve, maintaining state that’s shared by many components is a headache.


    When you’re implementing a singleton, you supply a class method that returns an
    instance of the class. So if you have a class named `MyFoot`, you’d define the
    method `+sharedFoot` like this:


    ```

    @implementation MyFoot


    + (id)sharedFoot {


    static MyFoot *foot = nil;


    if (! foot) {


    foot = [[self alloc] init];


    }


    return foot;


    }

    ```


    The trick in this code is the static variable in the implementation; it holds
    a global variable that points to the shared object. When your application is launched,
    the value of that variable is `nil`. After the first message is received, the
    instance is allocated and returned for this and successive invocations.'
