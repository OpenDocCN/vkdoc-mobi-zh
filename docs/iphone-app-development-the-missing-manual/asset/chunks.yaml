    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **NIB Files: Something**


    **to look At**


    ***Tip:*** If you ever have a problem with this first NIB file appearing, make
    sure that the *NSMainNibFile* key in Info.plist has the correct value.


    When you open the disclosure triangle next to the Window instance, you see that
    it has a subview that’s a *UIImageView.* That’s why you see the pictures of the
    batteries when you double-click the Window to view it in Interface Builder.


    Subviews stack atop one another. This image view with the batteries sits at the
    bottom of the stack. You might be wondering why you don’t see these batteries
    when you launch your application. Because you stacked something on top of it with
    the


    *–applicationDidFinishLaunching:* implementation:


    [window addSubview:mainViewController.view]


    The view at the very bottom of the stack is still there, though. And that’s why
    you see it every time you flip between the main view and the settings view.


    ***Note:*** This stacking of views is called the *viewhierarchy.* You’re not limited
    to just one stack, either. Each view can have its own stack of views, allowing
    for an arbitrarily deep and wide collection of user interface elements.


    One final connection of interest in this NIB file: *Flashlight_ProAppDelegate*
    has an outlet set for the window. When this object is loaded from the file, the
    instance variable is automatical y connected so any message sent to *window* will
    be delivered to the *UIWindow.*


    If this connection is broken, the window instance variable is *nil,* and the messages
    to *–addSubview:* and *makeKeyAndVisible* are discarded. You end up with a picture
    of batteries and nothing else. Power failure!


