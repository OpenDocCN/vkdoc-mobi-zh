    *at launch.*


    The first thing you see is that the File’s Owner is set to *UIApplication.* As
    you saw on page 89, this object knows all about your application. It’s created
    automatical y when the user launches your app.


    A *UIApplication* can have a delegate that is sent messages as the state of the
    application changes. In this NIB, an instance of that delegate is archived with
    a type of *Flashlight_ProAppDelegate.* When this file is loaded, you automatical
    y get an instance of this object.


    Note that the *UIApplication* object in File’s Owner has a delegate that’s connected
    to the instance of *Flashlight_ProAppDelegate.* That ensures that your delegate
    will know when the application state changes. Without this important connection,
    the


    *–applicationDidFinishLaunching:* message would never be sent, and you’d end up
    with a window without a view. When you configured the Main NIB File in the target
    settings as MainWindow, you told Cocoa Touch to automatical y load this file at
    launch. That setting is an important part of the application bootstrap process!


