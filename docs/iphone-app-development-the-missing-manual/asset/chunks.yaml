    The AboutView.xib file is an example. You’ll see that the file appears in both
    the English.lproj and Italian.lproj folders. Cocoa loads the correct NIB based
    upon the user’s language settings. You can change any part of the layout; just
    make sure that the actions and outlets are maintained. If the connection between
    a button and its action is broken, you have a bug that only users of that language
    will encounter.


