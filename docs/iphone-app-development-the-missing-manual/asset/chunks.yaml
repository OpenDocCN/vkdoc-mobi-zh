    # 缺失的手册


    ## 技术审校者


    **马特·德兰斯**（技术审校）是 Bookhouse Software 的创始人，他为客户和自己开发 iPhone 应用。在创立 Bookhouse 之前，马特在苹果公司的技术推广与开发者技术支持部门工作了八年，与数百名第三方开发者密切合作，共同打造了如今你使用的众多
    iPhone 应用。他愉快地在北加州生活、工作，并参加赛车比赛。


    **蒂娜·斯帕戈**（技术审校）与她的丈夫（职业音乐人）艾德、学龄前儿子马克斯、以及两只调皮的西班牙猎犬——帕克（克伦伯犬）和派珀（苏塞克斯犬），共同生活在波士顿郊区的家中。蒂娜一边兼顾全职妈妈的角色，一边推广和营销艾德的音乐项目，并兼职担任虚拟助理。她在多个行业为高层管理人员提供支持，拥有超过
    20 年的经验。网站：*www.tinaspargo.com*。


    **简·朱**（文字编辑）热爱自由编辑工作、精彩悬疑小说，以及寻找完美的锅贴。电子邮箱：*juepub@sbcglobal.net*。


    **安吉拉·霍华德**（索引编制员）从事索引编制工作已超过十年，主要针对计算机类书籍，偶尔也会涉及旅行、替代医学和豹纹守宫等其他主题。她与丈夫、女儿和两只猫居住在加利福尼亚州。


    ## 致谢


    首先，我必须感谢我的同事们允许我抽出时间撰写本书。戴夫、盖德、科里、塔洛斯、谢丽尔、凯特、肖恩、大卫、路易、安东尼、明迪和特拉维斯，能与你们共事，我深感荣幸。


    我还要感谢卢卡斯·纽曼，他通过“关灯”（Lights Off）应用给了我灵感，并教会我如何“越狱”。苹果公司所有才华横溢的员工也值得认可。没有他们的辛勤工作，这一切都不会发生。


    我的好友金·波因德克斯特和米雷拉·波因德克斯特的热情让我对这个项目充满期待。杰弗里·泽尔德曼则值得感谢，他解释了为什么长达七个月的艰苦工作是个好主意。一路走来，马特·德兰斯和蒂娜·斯帕戈让我保持诚实，并教会我新知识。博学的南·巴伯让我看起来比实际更聪明。


    当然，如果没有比尔和玛丽·杰伊·霍肯伯里，这一切都不会发生，他们允许我发挥创造力，即使这意味着要去急诊室。感谢我的兄弟凯文和嫂子克里斯，他们不断提醒我，普通人也在使用软件。最后，但绝非最不重要的一点，衷心感谢劳伦·梅斯，感谢她的爱、见解、幽默感和即兴舞蹈。


    ## 《缺失手册》系列


    《缺失手册》系列是对计算机产品进行风趣、卓越指导的书籍，这些产品原本不附带印刷手册（基本上所有产品都如此）。每本书都配有精心编制的索引、指向具体页面的交叉引用（而不仅仅是章节），以及可脱离装订的
    Rep-Kover 书脊，让书籍无需重物或砖块压着也能完全平摊。


