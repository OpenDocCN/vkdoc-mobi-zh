    with iTunes!


    As discussed on page 258, setting your application’s price is one of the more
    difficult aspects of preparing your release. You’re the only one who knows how
    much work went into the product and how many licenses you need to sell in order
    to recoup your investment.


    To help you make this decision, you need to look at the market you’re about to
    sell into. In Chapter 4 (page 113), you took the first step in marketing: thinking
    about how to position your application before you even start coding. Now it’s
    time to start thinking about how you’re going to price and then promote that final
    product.


    Metrics


    To begin to understand this new market, take a look at some of the numbers that
    define it. Keep in mind that this new market is also evolving quickly—the links
    included below should help you keep up with the latest changes.


    *Surprise! Apple is secretive*


    Apple doesn’t provide much information about the iPhone OS market. The only substantive
    metric is the number of iPhones sold in each quarterly financial report.


    Using these numbers, you can see in Figure 8-8 that growth of the market is pretty
    impressive.


    It’s interesting that these numbers don’t include a significant portion of your
    potential customer base: Apple does not break out the numbers for the iPod touch
    (instead, it reports the total number of iPods sold). The only information from
    the company regarding the breakdown was during their quarterly earnings call in
    July 2009\. They hinted that 45 million devices were in circulation, suggesting
    that the iPod touch makes up a little over 40 percent of the total market.


    *Third-party research*


    You can get additional market information from third parties. Companies like AdMob
    gather data from ads and surveys they deliver to the devices. Other companies,
    like Pinch Media, let developers add analytics libraries that collect anonymous
    statistics. Even established research companies like the Nielsen Company are surveying
    users in order to establish market patterns.


    **252**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **The Market**


    iPhones Sold


    ***Figure 8-8:***


    *This graph shows the*


    50 M


    *cumulative number of*


    *iPhones sold since the*


    *middle of 2007\. The sales*


    *growth appears to be*


    40 M


    *exponential, causing some*


    *analysts to predict over*


    *70 million devices by the*


    *end of 2009\. Note that*


    30 M


    *these sales numbers*


    *from Apple don’t include*


    *the iPod touch, and that*


    *their fiscal year ends in*


    20 M


    *September.*


    10 M


    0 M


    Q3


    Q4


    Q1


    Q2


    Q3


    Q4


    Q1


    Q2


    Q3


    Q4


    Q1


    These sources have uncovered some interesting results:


    • Ninety percent of users download apps directly from their phone (avoiding iTunes
    on the desktop).


    • iPhone users download about 10 new apps each month, about 25 percent of which
    are paid. On the iPod touch, users pay for about 10 percent of 18 apps downloaded
    each month.


    • The average user spends about $9 on five paid applications each month. That
    averages out to $1.80 per app.


    • Seventy-five percent of all users have downloaded an app (free or paid).


    • Only 20 percent of users continue to use a free application the day after it’s
    downloaded. After 1 month, only 5 percent of users still use the application.


    Here’s where you can check out these sources for yourself. You can find clickable
    links on this book’s Missing CD page ( *www.missingmanuals.com/cds*):


    • **AdMob.** *http://metrics.AdMob.com/2009/08/july-2009-metrics-report/*


    Chapter 8: For Sale


    **253**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **The Market**


    • **Nielsen.** *http://blog.nielsen.com/nielsenwire/online_mobile/iphone-users-watch-more-video-and-are-older-than-you-think/*


    • **Pinch Media.** *http://www.pinchmedia.com/appstore-secrets/*


    *User demographics*


    In June 2009, AdMob and comScore conducted a survey to establish the demographics
    for iPhone and iPod touch users. Not surprisingly, iPhone users are general y
    older, while those on the iPod touch tend to be younger (Figure 8-9).


    Age Demographics


    ***Figure 8-9:***


    *Demographic research*


    50%


    iPod touch


    iPhone


    *by AdMob and comScore*


    *shows that 69 percent*


    *of iPod touch users are*


    *between the ages of 13 and*


    40%


    *24 years of age. On the*


    *iPhone, 78 percent of users*


    *fall between the ages of*


    *18 and 49.*


    30%


    20%


    Percentage of Users


    10%


    0%


    13-17


    18-24


    25-34


    35-49


    50-54


    55-64


    65+


    Age


    Along with the older age demographic, iPhone users earn more. Only 66 percent
    of iPod touch owners made over $25,000 each year versus 78 percent of users with
    iPhones. This survey also reported that over 70 percent of users are male. A prior
    comScore survey in October 2008 showed that 43 percent of iPhone owners earn in
    excess of $100,000\. More interesting was the strong growth of iPhone ownership
    below the median household income: 48 percent in the $25,000–50,000 bracket and
    46 percent in the $50,000–75,000 bracket.'
  trans: "\n# 要输入翻译内容，请从弹出式菜单（图 8-6）中选择一种语言，然后输入任何需要变更的值。除非另有指定，否则产品页面上将显示英文版的截图图像。输入本地化值后，点击`添加其他语言`返回语言选择菜单，或点击`继续`完成元数据的录入。\n\
    \n**图 8-6:**  \n*使用“本地化”标签页以不同语言提供您的应用信息。通过弹出式菜单选择语言，随后会显示更多文本输入字段。*\n\n## 审核\n\
    \n最后一步是检查您的信息。该标签页的默认视图显示数据在美国地区的呈现效果。您可以（也应当）将“审核 App Store”的弹出式菜单切换至其他国家，查看您的营销信息在该国商店用户眼中的显示效果。\n\
    \n如需进行任何修改，请点击页面底部的`返回`按钮，或点击页面顶部的任一标签页。如果一切无误，点击`提交应用`，您的产品将被添加到 iTunes 数据库中。恭喜您！\n\
    \n## 微调\n\n如本节所示，设置元数据是一个迭代过程。输入应用的基本信息后，您可以点击 iTunes Connect 中“管理您的应用”部分的应用图标。您将看到一个包含`编辑信息`按钮的界面，用于更新元数据。\n\
    \n**图 8-7:**  \n*向 iTunes 提交信息的最后一步是核对准确性。您可以使用“审核 App Store”弹出式菜单预览全球各 App Store\
    \ 的信息（A）。检查应用描述中的拼写，并确保分类、关键词和 URL 均正确（B）。您可以点击图片链接，在新窗口中查看它们（C）。最后但同样重要的是，“上架日期”和“价格等级”指定了产品何时开始销售及其售价（D）。*\n\
    \n**备注：** 随着应用经历正常的生命周期，元数据会频繁更改。实际上，您可能需要在源代码目录树中维护一份文档，供开发团队所有成员在必要时更新或回退。\n\
    \nFlashlight Pro 项目将所有 iTunes 相关信息保存在项目文件夹的根目录中。该文件夹包含一个包含元数据的`AppInfo.rtf`文件，以及应用图标和截图图片。\n\
    \n# 市场\n\n与平台本身一样，为 iPhone 销售产品是一个全新的世界。您很可能从未向大众市场销售过软件：但随着 iTunes 的到来，这一切即将改变！\n\
    \n如第 258 页所述，为应用定价是准备发布过程中较困难的环节之一。只有您自己清楚产品投入了多少工作量，以及需要销售多少份许可才能收回投资。\n\n为了帮助您做出决策，需要分析您即将进入的市场。在第\
    \ 4 章（第 113 页）中，您走出了市场营销的第一步：在动笔编码之前，思考如何定位您的应用。现在是时候开始考虑如何定价，以及如何推广最终产品了。\n\n\
    ## 数据指标\n\n要了解这个新市场，首先看看定义它的一些数字。请记住，这个新市场也在快速演变——下方包含的链接应能帮助您跟上最新变化。\n\n*惊喜！苹果公司很神秘*\n\
    \n苹果公司并未提供太多关于 iPhone OS 市场的信息。唯一实质性的指标是每季度财务报告中公布的 iPhone 销量。\n\n利用这些数字，您可以从图\
    \ 8-8 中看到市场的增长势头相当惊人。\n\n有趣的是，这些数字并未包含您潜在客户群的重要部分：苹果公司并未单独公布 iPod touch 的销量（而是报告\
    \ iPod 的总销量）。公司关于该细分数据的唯一信息是在 2009 年 7 月的季度财报电话会议中。他们暗示当时有 4500 万台设备在使用中，这意味着\
    \ iPod touch 占总市场的 40%略多。\n\n*第三方研究*\n\n您可以从第三方获取额外的市场信息。像 AdMob 这样的公司会收集通过广告和推送到设备上的调查问卷获得的数据。其他公司，如\
    \ Pinch Media，则允许开发者添加分析库来收集匿名统计数据。甚至像尼尔森公司这样的老牌研究机构也在对用户进行调查，以建立市场模式。\n\n**图\
    \ 8-8:**  \n*此图表显示了自 2007 年年中以来 iPhone 的累计销量。销量增长呈指数级趋势，导致一些分析师预测到 2009 年底设备数量将超过\
    \ 7000 万。请注意，苹果公司的这些销量数据不包括 iPod touch，且其财年于 9 月份结束。*\n\n这些信息来源揭示了一些有趣的结果：\n\n\
    - 90%的用户直接从手机上（而非通过桌面版 iTunes）下载应用。\n- iPhone 用户每月下载约 10 个新应用，其中约 25%是付费应用。iPod\
    \ touch 用户每月下载约 18 个应用，其中约 10%是付费的。\n- 平均每位用户每月在五个付费应用上花费约 9 美元，平均每个应用花费 1.80\
    \ 美元。\n- 75%的用户曾下载过应用（免费或付费）。\n- 只有 20%的用户在下载免费应用的第二天仍会使用它。一个月后，只有 5%的用户仍在继续使用该应用。\n\
    \n以下是为您提供的查阅这些信息来源的途径。您可以在本书的“缺失手册”页面上找到可点击的链接（`www.missingmanuals.com/cds`）：\n\
    \n- **AdMob。** `http://metrics.AdMob.com/2009/08/july-2009-metrics-report/`\n\
    - **尼尔森。** `http://blog.nielsen.com/nielsenwire/online_mobile/iphone-users-watch-more-video-and-are-older-than-you-think/`\n\
    - **Pinch Media。** `http://www.pinchmedia.com/appstore-secrets/`\n\n*用户人口统计*\n\
    \n2009 年 6 月，AdMob 和 comScore 进行了一项调查，以确定 iPhone 和 iPod touch 用户的人口统计数据。不出所料，iPhone\
    \ 用户通常年龄较大，而 iPod touch 用户则趋于年轻化（图 8-9）。\n\n**图 8-9:**  \n*AdMob 和 comScore 的人口统计研究显示，69%的\
    \ iPod touch 用户年龄在 13 至 24 岁之间。而在 iPhone 用户中，78%的用户年龄介于 18 至 49 岁之间。*\n\n伴随着年龄偏大的人口特征，iPhone\
    \ 用户的收入也更高。iPod touch 用户中只有 66%的人年收入超过 25,000 美元，而 iPhone 用户中这一比例为 78%。该调查还报告称，超过\
    \ 70%的用户为男性。2008 年 10 月的一份额外的 comScore 调查显示，43%的 iPhone 拥有者年收入超过 100,000 美元。更有趣的是，家庭收入低于中位数的\
    \ iPhone 拥有者增长强劲：在 25,000–50,000 美元区间占 48%，在 50,000–75,000 美元区间占 46%。\n"
- fmt: '# This strong growth during a global economic recession suggests that lower
    income users don’t view the `iPhone` as a luxury purchase. Instead, it’s viewed
    as a single communications and entertainment device that is cheaper to own and
    operate than multiple devices and services.


    **The Market**


    Sources:


    - **AdMob.** *http://blog.AdMob.com/2009/06/16/new-research-on-the-demographics-and-behavioral-characteristics-of-iphone-and-ipod-touch-users-from-AdMob-and-comscore/*

    - **comScore.** *http://www.comscore.com/Press_Events/Press_Releases/2008/10/Lower*
    *_Income_Mobile_Consumers_use_Iphone/*


    Don’t forget, the average iPhone customer is also paying thousands of dollars
    over the life of his contract. The research highlighted in this section shows
    that iPhone and iPod touch owners have good incomes with plenty of disposable
    income. The size of the customer base is also growing rapidly across many demographics.


    That’s great news for you as an iPhone developer! Plenty of customers are waiting
    to acquire your product via iTunes. There’s just one problem: a rapidly growing
    market filled with lots of willing customers leads to…


    ## Competition


    You’re not the only developer who’s attracted to this new market. In a recent
    response to an FCC inquiry, Apple reported that approximately 6,800 iPhone applications
    are approved each week. Granted, many of those applications are updates to existing
    titles, but the App Store still gets over 10,000 new applications each month.


    Sources:


    - **Daring Fireball.** *http://daringfireball.net/2009/08/apples_fcc_response*

    - **148 Apps.** *http://148apps.biz/app-store-metrics/?mpage=appcount* *Running
    up the charts*


    If you’re considering making a run at the charts, you’re going to find it very
    hard to do. With the increased number of titles available comes an increase in
    the number of sales needed to enter the Top 100.


    When the App Store debuted with approximately 1,000 applications, you needed to
    sell about 100 copies of your app per day to get into the chart. Now, with over
    100,000 different apps, you need to sell over 1,200 copies per day. (For the full
    story, check out *www.taptaptap.com/blog/the-app-store-pricing-game/*.) You’ll
    also find that the requirements to get a chart-topping application are much higher
    than they used to be. Long gone are the days where you could make a farting or
    flashlight app in a few hours and then rake in tens of thousands of dollars from
    it being a hit. Developers have learned that higher quality and customer value
    are a competitive advantage, and they spend months developing titles that they
    hope are hits.


    Similarly, getting featured in the `“New & Noteworthy”` or `“Staff Favorites”`
    sections of iTunes becomes less likely as the number of titles in the App Store
    increases. If it happens, great, but campaigning to get featured shouldn’t be
    the main focus of your marketing efforts.


    ### Press


    Another facet to the market saturation is that it’s becoming increasingly difficult
    to get press for your application. Online media is having just as hard a time
    keeping up with demand as the rest of the iPhone ecosystem. Don’t wait until the
    last minute to get the press interested in your work. Your marketing efforts should
    begin well ahead of your release date. Remember that anyone you contact is up
    to her eyeballs in press releases. Look for angles that will help the writer come
    up with fresh content. Maybe your app fits into an upcoming holiday, or it does
    something no other app has done before. (It could even be a flashlight that announces
    a new book about iPhone development.)


    As you look for sites to feature your application, don’t be afraid to target a
    niche. It’s unlikely that IGN will be interested in Tiddlywinks Pro. Spend a few
    minutes with Google and search for *Tiddlywinks blog*, and you’ll find plenty
    of places that would be thrilled to learn about your cool new iPhone game.


    Finally, be warned that some `“review”` sites are charging developers for increased
    attention. Don’t go anywhere near these sites—word is quickly spreading that the
    value of the recommendation isn’t worth the paper it’s printed on. That’s saying
    something, considering it’s a web page!


    ## Two Developers, One Store


    As a developer, you can take two basic approaches to selling your app. You can
    enter the new and fast-paced world of hit-based marketing, or you can take a more
    traditional approach of slowly building a loyal customer base.


    The germ of this idea came from Marco Arment ( *www.marco.org/208454730*), developer
    of the Instapaper app, and John Casasanta ( *www.taptaptap.com/blog/convert-first-month-sales/*),
    who led the team that developed Convert and other iPhone hits. Each has been successful
    selling with one of these two approaches.


    To see which approach is best for you, check out Table 8-1.


    ***Table 8-1.** Two ways of positioning your application in the App Store.*


    | **Hit-based** | **Traditional** |

    | :--- | :--- |

    | **App Types** | |

    | Simple and shallow. | Complex and deep. |

    | **Typical Categories** | |

    | Games, Utilities. | Productivity, Photography, Medical. |

    | **Customers** | |

    | Scan `“top”` charts looking for titles. Rarely look for apps outside of iTunes
    or App Store. | Research on Web for available apps before making an informed purchase.
    Read positive review. Clicks advertisement. |

    | **Characteristics** | |

    | Novelties with broad mass-market appeal. Apps have a limited shelf life, often
    just months. | Narrower appeal for individual tastes and needs. App becomes a
    part of customer’s daily life. |

    | **Price Points** | |

    | Lower prices to encourage impulse buying. | Higher prices from customers who
    appreciate depth and quality. |

    | **Marketing** | |

    | Huge PR blitz at launch to generate short-term buzz about new product. | Relies
    on good press, positive reviews, and word-of-mouth recommendations for long-term
    product interest. |

    | **Launch Pricing** | |

    | Low introductory prices to increase sales volume and move up the charts. | No
    introductory pricing, which leads to bad evaluations from customers who aren’t
    invested in product. |

    | **Income Potential** | |

    | High, but comes at risk of not recovering initial development costs. | Lower,
    but much better chance of income for sustained development. |


    Keep in mind that these aren’t hard-and-fast rules, just generalizations that
    will help you figure out what works best for your products.


    ### Look at the music business


    When using the hit-based approach for selling your apps, it’s just like being
    in the music business: You live and die by the charts. If you look at the world
    of pop music, you see that most songs don’t spend much time at the top. After
    a month or two, the public moves onto something else and sales languish. While
    a song is on the charts, a lot of money is spent on promotion to keep the track
    listed.


    And even if you make it onto the charts once, many musicians find that they’re
    one-hit wonders. It’s hard enough to get the first single on the charts: Continued
    success is even more elusive.


    At the same time, a lot of musicians make a great living without ever being on
    the Billboard Hot 100\. Some of them do session work, while others release albums
    to a loyal group of fans. The App Store business is no different.


    ### Choose your customers


    When you’re selling to a mass market, you deal with two types of consumer behavior.
    Some customers want the cheapest solution that gets the job done and don’t care
    about elegance. If they see a product for $5 and another for $10, they always
    choose the lower priced one.'
