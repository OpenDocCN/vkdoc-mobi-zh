- fmt: '# Primarily, these types of ads give you high visibility


    Your ad is likely to be the only one on the page. One ad network example is the
    Deck Network (`http://decknetwork.net`). This network places ads on sites that
    are very influential in the creative, web, and design industries. If your product
    appeals to customers in these fields, spending thousands of dollars for an ad
    run could produce significant results (Figure 9-8).


    ![Image 89](index-304_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Advertising and Promotion


    **Figure 9-8:** The only advertisement on this page at Zeldman.com is one for
    Safety Light. The ad was placed on the Deck Network—a consortium of websites that
    appeal to the creative, web, and design industries. While the ad was being run,
    visits to the Safety Light promotional site were about 10 times higher than normal,
    and sales doubled.


    ## Sponsorship


    Another trend that’s emerging is *blog sponsorship*. Your product gets high visibility
    among the blog’s readers. As with public broadcasting sponsorship, you’re not
    advertising your product or brand directly. Sponsorship rates range from hundreds
    to thousands of dollars per week; the more influential the site, the higher the
    cost.


    Two examples are Daring Fireball (`http://daringfireball.net/feeds/sponsors/`)
    and Hivelogic (`http://hivelogic.com/sponsorship`).


    The major benefit to these forms of advertising is that your product is associated
    with a trusted source. As you can see from the response after the mention from
    Daring Fireball (page 281), it’s a lot easier for a customer to buy when your
    product has this positive association.


    ## Branding


    Advertising is expensive. You need to get as much value out of it as possible.
    Initially, it’s easy to focus on advertising a single product, because that’s
    all you have. Smarter developers think about the long term and advertise the product
    *and* the brand.


    You’ll see this in action with the larger developers and publishers. If you’ve
    been paying attention to the iPhone gaming market, you’ve probably heard of the
    popular series Rolando and Topple. What’s more important is that you’re also probably
    aware of ngmoco:), the company that released the titles.


    That’s no accident. Such companies focus on marketing the brand as much as they
    do the individual apps. The reason is simple: If you’re happy with one game from
    ngmoco:), you’re more receptive toward their new releases. You may have no idea
    what Dr. Awesome is about, but you may buy it just because you loved Rolando so
    much. Once you have multiple titles, you can build your brand at no cost. That’s
    the best kind of advertising.


    Many apps include cross-promotion on a game selection screen or help screen. If
    a customer is enjoying one app, she’ll want to know about your other work. The
    thing to be careful about when doing this kind of brand advertising is to not
    annoy your users. Be subtle, or you risk turning a fan into a foe.


    When you have multiple titles, also consider a promotional website that showcases
    all your titles. For example, all the Iconfactory apps are listed at `http://iconfactoryapps.com`.
    This site extends the cross-promotion to include both Mac and iPhone platforms.
    The eventual goal is that a customer who sees “from the Iconfactory” thinks “this
    has got to be good.”


    ## Promotion Codes


    Another way to get free advertising is with *promotion codes*. As the name implies,
    these codes can help you increase awareness of your product. As you saw on page
    262, reviewers should get the first shot at your promotional codes. By giving
    a single code to a popular reviewer, you can reach hundreds or thousands of potential
    customers who read the review.


    **Tip:** Developers, reviewers, and users all tend to refer to these codes as
    *promocodes*. The shortened version certainly helps when you’re posting to Twitter,
    with its 140-character limit!


    Luckily, Apple provides more promo codes than you’ll need for the launch—every
    version of your app gets a total of 50. You probably won’t use all of them for
    reviewers, so use the rest to generate buzz about your product. And the best way
    to do that is by giving them away. People love to win prizes, even if it’s only
    worth a buck or two.


    The simplest way to give away the promo codes is by posting a message to the people
    who follow your social networking accounts. Advertising is all about reaching
    people, so how you give away those precious codes is important.


    ![Image 90](index-306_1.png)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### Strings attached


    Some developers just post the promo codes and don’t ask for anything in return.
    That certainly works, but you’re not going to reach more people than the ones
    who already follow you. There’s no “echo” to pique the interest of others. Instead,
    make sure that your followers tweet something to their followers in order to win
    the prize.


    As an example, this message was sent out to over 6,100 followers on Twitter:


    “Want a FREE copy of Safety Light? Post a new tweet with `http://safetylightapp.com`
    URL and I’ll DM a promo code to first 20. Be creative!” `http://twitter.com/chockenberry/statuses/7491384567`


    Over the next couple of hours, 60 links to the Safety Light promotional site were
    posted on the social network. These links, in turn, reached hundreds of people
    who visited the site (Figure 9-9).


    **Figure 9-9:** This graph shows the traffic generated by giving away promotional
    codes on Twitter on January 7, 2010. Traffic to the Safety Light website was higher
    for about 12 hours, and sales were higher for the next 5 days.


    Twitter’s search function was then used to look for the winners: `http://search.twitter.com/search?q=safetylightapp.com`.
    After 20 posts were shown, a direct message was used to send the promo code to
    the listed accounts. Some developers have resorted to automated means for generating
    these promotional messages. These *tweet blasts* are a powerful promotional tool,
    but they carry the risk of alienating potential customers. After all, the same
    message appears over and over and becomes tiresome.


    For a more personal touch, ask your followers to be creative when they tweet about
    your app.


    A variation on this giveaway is to offer your promotional codes to a blog as a
    contest prize. Many blogs like to have these contests to attract new readers and
    generate excitement among existing ones. You benefit from offering a contest prize
    because you reach the blog’s visitors, who can number in the hundreds or thousands.
    There’s also a positive association with the blog readers, since you’re supporting
    something that they love.


    **Note:** As you start to give out these promo codes, you’ll learn about a serious
    drawback. Unlike every other aspect of iTunes, the codes currently only work in
    the U.S. store. Some of the winners won’t be able to redeem their prize. Many
    users outside of the United States already know about this limitation and won’t
    bother entering the contest. For the ones who don’t, you’ll need to apologize
    and explain that this is Apple’s policy, not yours.


    ### Replenishment'
