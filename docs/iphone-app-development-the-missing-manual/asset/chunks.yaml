    \ data is referred to in many ways. Objective-C developers use the terms `instancevariable`,\
    \ `ivar`, and `property` interchangeably. If you're talking to a longtime C++\
    \ developer, you may hear `membervariables`. Java diehards use `fields`.\n\nWhichever\
    \ term is used doesn't matter; it's still just a block of memory that's associated\
    \ with each instance of your class.\n\nA few new methods at the end of the interface\
    \ let you read and write the data managed by this new class. These methods are\
    \ called *accessors* because they let you access the class's internal information.\
    \ By convention, the method that reads the instance variable just uses the name.\
    \ The method that updates the instance variable is prefixed with `set`. Other\
    \ languages call these methods *getters* and *setters*.\n\nOnly the implementation\
    \ of this class has easy access to all instance data. Without the accessor methods,\
    \ the data is essentially hidden. In most cases, that's a good thing, especially\
    \ when you have private data that you don't want exposed to the caller.\n\nNow\
    \ for the `@implementation` of your `AwesomeStringMaker` class:\n\n```objc\n@implementation\
    \ AwesomeStringMaker\n\n- (NSNumber *)exclamationCount {\n    return exclamationCount;\n\
    }\n\n- (void)setExclamationCount:(NSNumber *)newExclamationCount {\n    if (exclamationCount\
    \ != newExclamationCount) {\n        [exclamationCount release];\n        exclamationCount\
    \ = [newExclamationCount retain];\n    }\n}\n\n- (NSString *)originalString {\n\
    \    return originalString;\n}\n\n- (void)setOriginalString:(NSString *)newOriginalString\
    \ {\n    if (originalString != newOriginalString) {\n        [originalString release];\n\
    \        originalString = [newOriginalString copy];\n    }\n}\n\n- (NSString *)awesomeString\
    \ {\n    NSString *awesome = [originalString uppercaseString];\n    NSUInteger\
