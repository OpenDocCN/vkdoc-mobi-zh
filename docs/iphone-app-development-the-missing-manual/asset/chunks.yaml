    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Your exceptional**


    **Code**


    More importantly, this form of enumeration is optimized by the runtime and removes
    the possibility for bugs with loop invariants.


    Another example of smart-but-lazy code that’s simpler, safer, and faster.


    **Your exceptional Code**


    As a developer, you know that things don’t always go the way you plan. Code that
    doesn’t work like you expect is a never-ending source of joy in your life. Fortunately,
    Objective-C supplies compiler directives that help you deal with exceptions in
    blocks of code:


    • Use *@try* for code that may throw an exception.


    • *@catch()* lets you specify code that gets run when exceptions occur. You can
    use more than one block if you need to handle different types of exceptions.


    • You can use *@final y* if you have code that needs to run whether or not an
    exception occurred.


    Here’s an example that uses all three:


    NSArray *myArray = [NSArray array]; // an array with no elements


    @try {


    // the array is empty, so this will fail:


    [myArray objectAtIndex:0];


    }


    @catch (NSException *exception)


    {


    NSLog(@″name = %@, reason = %@″, [exception name], [exception reason]);


    }


    @finally


    {


    NSLog(@″Glad that''s over with...″);


    }


    which will generate the following output in the console log:


    name = NSRangeException, reason = *** -[NSCFArray objectAtIndex:]: index (0) beyond
    bounds (0)


    Glad that''s over with...


    If you hadn’t caught the exception, your application would have quit and sent
    the user abruptly to the iPhone’s home screen. Catching exceptions is a good thing.


    When your code needs to generate an exception, use the *NSException* class. Suppose
    you come across a string that’s not awesome enough; you could raise an exception
    like this:


    [[NSException exceptionWithName:@″AwesomeException″ reason:@″Not awesome enough″
    userInfo:nil] raise];


    Chapter 2: The Power of Brackets


    **53**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Your exceptional**


    **Code**


    You can use the *userInfo* parameter if you need to supply some additional information
    along with the exception (the offending string, for example).


    ***Tip:*** When debugging, it’s often helpful to set a breakpoint just before
    the exception is thrown. This way, you can see the stack trace at the point where
    the error occurred. Add a breakpoint at *objc_exception_*'
