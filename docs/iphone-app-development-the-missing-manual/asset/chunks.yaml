- fmt: '• **Watch the amount of data you transfer on the cellular network.** There’s
    no published limit, but make sure that you don’t use more than 5 MB of bandwidth
    over a short interval (5–10 minutes).


    • **Don’t include the names of other apps in your keywords.** You’re not going
    to fool anyone if you try to freeload off another developer’s success.


    • **Don’t use undocumented classes or methods.** Yes, it’s easy to reverse-engineer
    these hidden capabilities, but you’re creating a compatibility problem with future
    versions of the iPhone OS. To combat this problem, Apple scans each application
    after submission to ensure that it’s only using published APIs.


    These guidelines can change over time: Apple has relaxed some requirements and
    tightened others. Fortunately, a website tracks the causes of rejections: `http://appreview.tumblr.com/`.
    It’s a good idea to check this site periodically to keep abreast of any changes.


    ## Coping with Rejection


    When your application is rejected, you get an email from Apple explaining what’s
    wrong. If there’s a problem with the application, you must fix the issue and build
    a new binary. After testing the new version, use iTunes Connect to submit the
    updated version.


    When a problem arises with your app metadata, such as the description or keywords,
    you have to edit the information. The next step isn’t obvious, but it’s essential.
    You must reject the current binary in Manage Your Applications and resubmit the
    last binary you uploaded.


    **Chapter 8: For Sale**


    **267**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Ready for Sale**


    ***Tip:*** If you find a problem with your application after it has been submitted,
    use the Reject Binary feature in iTunes Connect. This button halts the review
    process so you can fix the issue and try again.


    After you resubmit the binary, the review process starts again. The most frustrating
    part about the rejection is that you’re at the end of the line again. The wait
    begins anew.


    **Ready for Sale**


    After you click an application in the Manage Your Applications list, you see a
    link for Status History. Initially, the only items shown are the dates you created
    the application metadata and uploaded the binary. Eventually, the status will
    change to In Review, indicating that Apple has started to evaluate your submission.
    If all goes well, the next item listed is Ready For Sale. Congratulations, your
    app is ready for worldwide release!


    ***Note:*** Apple will also send a message to the email address you used for your
    Apple ID. You don’t have to refresh the Status History page obsessively. Or at
    least not as much.


    You have two important tasks at this point. The first is to decide when you want
    to make the release available. Make sure all your promotional materials are ready
    to go: the website, press releases, email notices, and anything else you have
    planned for the launch.


    Even if everything is ready immediately, wait a day or two. That seems counterintuitive,
    but there’s one more important thing to do in iTunes Connect— generate promotional
    codes. This feature becomes available once your app is Ready For Sale.


    Bloggers and journalists can use these codes to download and install your product
    before it becomes available to the public at large. It’s important to get these
    individuals interested in your product before you can send them a promotional
    code. Use the time spent waiting for approval wisely.


    To generate the promotional codes, follow these steps:


    1. Log into iTunes Connect and select Request Promotional Codes.

    2. From the drop-down list, select your product name and then type the number
    of codes you’d like to generate. The number of remaining codes is displayed under
    the entry field. Click Continue.

    3. Turn on the checkbox at the bottom of the agreement that’s displayed and then
    click Continue.


    **268**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Ready for Sale**'
