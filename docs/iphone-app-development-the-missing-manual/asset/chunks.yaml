- fmt: '***Note:*** The Mac OS X keychain is a security mechanism that’s built into
    the operating system. After you enter a master password, usually at the time you
    log in, applications can get access to other passwords and to secure information.
    For example, when you enter a password for a website, it gets stored in the keychain
    so Safari can use it the next time you visit the site.


    You manage the information stored in your keychain by using `Keychain Access`
    (it’s in your `Applications`➝`Utilities` folder). It’s used to browse and manage
    the information stored in the keychain.


    For Xcode development, you’ll be focusing on items in the `Certificates` category.


    A new authority. The first thing you need to do is to set up Apple’s Developer
    Relations as a certificate authority. Here are the steps:


    1. Log into the iPhone Dev Center at `http://developer.apple.com/iphone`.

    2. In the navigation column at right, click `iPhone Provisioning Portal`.

    3. In the left column, click `Certificates`.

    4. At the bottom of the `Certificates` page, click the link that reads, “If you
    do not have the WWDR intermediate certificate installed, click here to download
    now.”


    A file named `AppleWWDRCA.cer` appears on your Mac.


    5. Double-click the file.


    `Keychain Access` launches.


    6. If an `Add Certificates` dialog box appears, make sure the `Keychain` pop-up
    menu is set to “login” and then click the `Add` button.


    At this point you should see the new certificate installed in your login keychain
    (Figure 5-4).


    ***Figure 5-4:*** *Once you’ve downloaded and installed the WWDR intermediate
    certificate file from the developer portal, you should see a certificate from
    WWDR in the Certificates category of the login keychain.*


    Request a certificate. The next step is to request a new certificate from the
    authority you just added. The process involves generating the request on your
    desktop and then uploading it to Apple via the Provisioning Portal:


    1. Select `Keychain Access`➝`Certificate Assistant`➝`Request a Certificate From
    a Certificate Authority`.


    `Keychain Access` starts an assistant (wizard) that takes you through the request
    process (Figure 5-5).


    ***Figure 5-5:*** *Starting the assistant that generates a request for a new certificate
    from Apple.*


    2. In the dialog box that appears, type your email address in the `User Email
    Address` field.


    This email address should be the same one you used when signing up for the iPhone
    Developer Program.


    3. Fill in the `Common Name` field using the same name you used to enroll as an
    iPhone developer. Select “Saved to disk” so a file will be created in the next
    step.


    Your form should resemble Figure 5-6.


    ***Figure 5-6:*** *A completed form for the certificate request is shown. Make
    sure to select “Saved to disk” and that you enter the same information you used
    when you registered for the iPhone Developer Program.*


    4. Click `Continue`. When prompted to save the certificate request, change the
    name of the file to `iPhone.certSigningRequest`, and save it on the Desktop.


    After the file is saved to disk, you’ll see a confirmation. Click `Done` to close
    the assistant.


    ***Note:*** The certificate that you’re requesting will last only 1 year. You
    can save yourself some time by saving this request and resubmitting it each time
    the current certificate expires.


    Certifiable. Now that you have the request file on your desktop, it’s time to
    upload it with your web browser:


    1. On the `Provisioning Portal` page, click `Certificates` in the left column.


    You’ll see a warning that you don’t have a valid certificate.


    2. To remedy that, click `Request Certificate`.'
