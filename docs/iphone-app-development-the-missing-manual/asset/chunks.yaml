    **Capisce?**


    The next step is to add points for each keyframe. The points tell Core Animation
    where to move. Since position is defined as a point, a `NSValue` for each location
    is added to an array:


    `[values addObject:[NSValue valueWithCGPoint:CGPointMake(-50.0f, -50.0f)]];`


    A corresponding timing function is added to another array. The animation mechanism
    will use this function to interpolate between location values:


    `[timingFunctions addObject:[CAMediaTimingFunction functionWithName:kCAMediaTimingFunctionEaseInEaseOut]];`


    These arrays are then added to the animation:


    `animation.values = values;`


    `animation.timingFunctions = timingFunctions;`


    Every view exposes a property called `layer.` This is an instance of `CALayer`—a
    fundamental component of the animation system. When a view is drawn, the pixels
    are placed in a layer that is then composited along with other layers to produce
    the image you see onscreen.


    When you animate layers, the pixels don’t need to be redrawn. And since the iPhone
    has a small graphics processor, the compositing operations are quick. That’s the
    secret to how the device provides such smooth and sophisticated graphics.


    To get the view’s layer to start moving, all you have to do is add the animation
    to it:


    `[spotlightImageView.layer addAnimation:animation forKey:@"scrollAnimation"];`


    The key parameter defines a unique identifier that can be used to retrieve the
    animation with `–animationForKey:` or to remove it entirely with `–removeAnimation-ForKey:.`


    When you’re using these more sophisticated animations, you need to use the `QuartzCore`
    framework. This class imports the framework with:


    `#import <QuartzCore/QuartzCore.h>`


    And you’ll see `QuartzCore.framework` listed in the Frameworks group in the Xcode
    project window.


    **localized languages: *Capisce?***


    As you’ve been running the flashlight, you probably haven’t noticed an important
    feature for users in Italy: The entire app has been translated into their *madrelingua*
    (mother tongue). Time to look at how this localization was performed.


    ### `Localizable.strings`


    Most of the effort in localization involves changing words. You say “white;” Italians
    say “bianco.” In localized apps like this one, Cocoa helps you pick the right
    word with a file called `Localizable.strings`. This file acts as a small database
    that maps keys


    **206**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **localized languages:**


    **Capisce?**


    to values. If you look up a string with the key `White`, it will return the value
    `Bianco` on phones that are configured to use Italian. If any other language is
    selected, “White” is returned.


    ***Note:*** The default language is defined as English in the `Info.plist` file.


    Actually, it’s a lie to say there’s one `Localizable.strings` file—multiple copies
    exist, one for each language. If you open the Flashlight Pro project in the Finder,
    you see `English.lproj` and `Italian.lproj` in the `Resources➝Localizations` folder.
    These folders contain the files used in each language.


    When you used `NSLocalizedString()`, you performed the lookup (page 194). For
    example, in the `FlashlightModel`, this code is used:


    `NSLocalizedString(@"White", nil)`


    Italians will be loading files from `Italian.lproj`, so this line in `Localizable.strings`
    will come up as a match:


    `"White" = "Bianco";`


    Other users will have loaded the same file from `English.lproj`, so this will
    be the match:


    `"White" = "White";`


    When you’re doing localization, make sure that words don’t creep into other parts
    of your application. A great example is images: If the source text for the graphic
    is buried in a Photoshop layer, you’ll find that your graphic designer isn’t a
    very good translator and that your translator isn’t a very good artist. Keep the
    text separate and your life will be much easier.


    ### Localization logistics


    You have two major hurdles when doing localization: finding a native speaker to
    do the translation and testing the final product. As you look through the Italian
    words in `Localizable.strings`, it looks great. There are plenty of accents and
    cool-looking foreign words. There’s just one problem: A native speaker did not
    do this localization.


    ***Note:*** Your humble author spent several years living in Italy. This language
    perfect he has not, but good it is.


    Don’t use automated tools or get your second cousin’s best friend who spent 6
    months overseas to do the translation. A native speaker will be able to tell that
    it’s wrong and you’ll make a bad impression. For many users, a bad localization
    is harder to use than the original English.


    **Chapter 6: A Flashlight for Pros**


    **207**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **localized languages:**


    **Capisce?**


    Once you’ve done the translation, you encounter the second problem. Unless you’re
    an amazing polyglot, there’s no way you can know if the localization is correct.
    You need to find someone who speaks the language and to get him or her to test
    it for accuracy.


    You should, however, verify that the localization is functionally correct. You
    want to make sure that all the words have matches during the lookup phase.


    The easiest way to do this is by using the Settings application in the Simulator.
    Tap the settings icon, and then pick the first item in the list (General). In
    the next menu, tap the third item from the top (International). Then pick the
    first item in the list (Language) to see a list of all available language settings.
    (Knowing the relative position of all these buttons is important: You need to
    know which buttons to push in order to switch back to English!)


    While you’re changing your language settings, try setting Italian and running
    the Safety Light application. Seeing the localization in action will give you
    a better feel for how it all works.


    ***Note:*** Why go through this hassle? About half of your revenue in iTunes will
    come from outside the United States. The more you cater to these users, the more
    you sell. No one ever promised that making money would be easy.


    ### Layout breakage


    Sometimes differences in language cause view layouts to change. For example, the
    button width for “Tap to close” in English is going to be very different than
    its literal counterpart in German: “Zum Schließen antippen”.


    One approach your translator could take is to find a similar meaning that’s shorter.
    For example, “Tap to close” could be shortened to the German word for close: “Schließen”.
    The width of both phrases is similar, making the visual design easier without
    sacrificing comprehension.


    ***Note:*** Apple uses this technique with some of its system controls. For example,
    “Entriegeln” is displayed instead of “slide to unlock” when you press the Power
