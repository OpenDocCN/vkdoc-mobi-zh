    # 排版后的内容


    最后一个视图是工具栏，它将包含由按钮和视觉分隔符组成的*项目*，这些按钮用于发送操作。对于手电筒模型，你需要存储和检索*亮度*、*速度*和*默认颜色*。迪斯科模式需要一个*随机颜色*，因此你还需要为此添加一个属性。SOS
    模型需要一个*方法*来启动发送信号，以及一种获取当前摩尔斯电码*元素*（点、划或之间的间隔）的方式。


    ## 调光开关


    设置屏幕也将有一个位于中心位置的视图控制器。它将使用与主屏幕相同的手电筒模型，因为你希望当前的手电筒数据在两个视图中保持一致。


    你还可以重用主屏幕中的灯光视图类。它拥有诸如 `brightness` 和 `color` 之类的属性，可用于预览。借助 Objective-C 和 Cocoa
    Touch，你可以轻松实现一次编写，多次复用。


    标准滑块控件将用于控制灯的亮度和闪光速度。同样，你将使用标准的选择器视图来选择颜色。滑块将调用控制器上的 `-brightnessChanged` 和 `-speedChanged`
    方法。控制器将充当选择器视图的委托，并实现 `-pickerView:didSelectRow:inComponent:` 方法来跟踪控件的更改。


    **120**


    iPhone App 开发：缺失手册


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 下一步何去何从


    与主视图控制器类似，每个视图和模型都会有实例变量。图 4-8 展示了该屏幕的整体架构。


    设置视图控制器


    ***图 4-8:***


    `flashlightModel`


    *设置屏幕上使用的各个类。*


    `lightView`


    *四个控件分别用于调节亮度、*


    `brightnessSlider`


    *速度、颜色以及灯光预览。*


    `speedSlider`


    *使用一个模型来存储和检索*


    `colorPickerView`


    *当前的手电筒设置。*


    `-brightnessChanged`


    更新


    `-speedChanged`


    `-done`


    `亮度`


    `手电筒`


    `滑块`


