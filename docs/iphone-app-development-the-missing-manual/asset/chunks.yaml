- fmt: "Apple 最近的一项政策变化为您和您的客户提供了一个更好的解决方案：免费应用程序可以通过应用内购买（In-App Purchases）来解锁付费功能。通过这项技术，您使用`StoreKit`框架向\
    \ iTunes 提供一个唯一的产品 ID。一旦用户批准交易，您就能获取信息来解锁功能。您无需管理两个应用程序，不存在数据迁移问题，并且对您的客户而言，体验也简单得多。\n\
    \n**上传**\n\n当您结束 Beta 测试后，必须再次调整 Xcode 设置。您之前使用 Ad Hoc 配置文件（第 215 页）为 Beta 测试签发了分发构建。您提交给\
    \ iTunes 的构建应使用 App Store 配置文件进行签名。本节将向您展示如何创建新的 App Store 配置文件、创建并上传新构建，以及如何进行测试。最后但同样重要的是，您将开始推广您的新应用并为买家做好准备。\n\
    \n**最终配置文件**\n\n要创建新的配置文件，请启动您的老朋友——配置门户网站（第 136 页）。然后，按照以下步骤操作：\n\n1.  登录配置门户后，在左侧栏中选择“Provisioning”。\n\
    2.  在“Provisioning”页面上，点击“Distribution”选项卡。在“Distribution”选项卡上，点击“New Profile”以创建新的分发配置文件。\n\
    3.  在“Distribution Method”下，保持“App Store”选中状态。\n4.  接下来，提供“Profile Name”。如果您将\
    \ Beta 配置文件命名为“Squidger Beta Distribution”，那么一个好名称是“Squidger Final Distribution”。\n\
    5.  为配置文件选择一个 App ID。使用与您 Beta 测试相同的 App ID：例如，“Squidger Apps”。\n6.  由于您要在 App\
    \ Store 上分发此版本，因此无需指定设备。只需点击“Submit”，您的新配置文件就会创建。\n\n点击“Download”链接获取配置文件，然后将其拖到\
    \ Dock 中的 Xcode 图标上进行安装。您应该在“Organizer”窗口中看到“Squidger Final Distribution”。\n\n\
    上传\n\n**最终目标**\n\n您需要为此构建创建一个新目标，就像您为 Beta 测试构建所做的那样（第 127 页）。此目标将与您为 Beta 测试创建的目标类似，但会在“Code\
    \ Signing”构建设置中具有不同的设置。\n\n对于 Beta 测试，您为代码签名授权添加了一个`dist.plist`文件。对于最终版本，您**不需要**此文件。另一个设置“Code\
    \ Signing Identity”应设置为“Any iPhone OS Device”。此外，您**不**希望使用自动配置文件选择器，因为它可能会意外选择您的\
    \ Beta 配置文件。\n\n相反，请向下滚动列表，然后选择配置文件名称下所列的“iPhone Distribution”（例如，“Squidger Final\
    \ Distribution”）。\n\n要查看这些设置的实际效果，请查看“Safety Light (Final)”的构建设置。\n\n双击目标，您会看到没有授权，并且代码签名身份是“iPhone\
    \ Distribution: Craig Hockenberry”，后跟一个长且全局唯一的 ID（GUID）。\n\n您看到此 GUID 是因为您没有“Craig\
    \ Hockenberry”开发者账户的分发配置文件或代码签名证书。如果您尝试构建项目，您会看到一个代码签名错误，指出“在默认钥匙串中没有有效的证书/私钥对”。如果您想将此应用程序提交到\
    \ App Store，您必须使用自己的唯一证书和配置文件。\n\n***Tip:*** 如果您看到 GUID，通常意味着 Xcode 无法找到配置文件。请从配置门户下载一份新副本。\n\
    \n**最终构建**\n\n现在您已经配置好了要在 App Store 上分发的目标，可以准备构建所有 iTunes 上的客户都将使用的版本了。在这样做之前，请务必更新`Info.plist`中的“Bundle\
    \ version”编号（第 221 页），使其仅包含数字和句点——不要包含字母。如果您保留了像“1.0b3”这样的 Beta 版本号，上传时会被拒绝。\n\
    \n构建之后，您需要备份您的应用程序和`dSYM`文件。这两个文件是调查客户遇到的崩溃所**必需**的（您将在第 298 页学习如何调试这些崩溃）。在上传到\
    \ iTunes 之前，您还需要将刚刚构建的应用归档到一个 Zip 文件中（只需按住 Control 键点击文件，然后从快捷菜单中选择“Compress”）。\n\
    \n***Tip:*** `Flashlight Pro`应用程序有一个名为“Final”的聚合目标，其中包含一个“Package Release”构建阶段，可以自动创建\
    \ Zip 文件。此构建阶段还会创建应用程序和`dSYM`文件的备份，以便它们可以检入到您的版本控制系统中。\n\n上传\n\n**最终上传**\n\n一旦准备好最终的\
    \ Zip 文件，通过 iTunes Connect 上传它只需简单几步：\n\n1.  登录 iTunes Connect（第 233 页），然后点击“Manage\
    \ Your Applications”。在出现的列表中，点击您的应用图标。\n    \n    您应用程序的状态应为“Waiting For Upload”。\n\
    \    \n2.  在应用程序信息屏幕中，点击“Upload Binary”以开始上传过程。\n3.  在下一个屏幕上，点击“Choose File”，然后导航到包含您最终应用程序的\
    \ Zip 文件。完成后，点击“Choose”。\n4.  屏幕上会出现一个新按钮：“Upload File”。点击它，文件就会上传到 Apple 的服务器。\n\
    5.  上传完成后，您会看到一个勾号图标；点击“Save Changes”以完成提交过程。\n\n此时，服务器会检查您上传的文件（图 8-10）。如果发现任何问题，您会在页面顶部看到一个红色横幅，解释错误。\n\
    \n常见的问题来源是分发配置文件：如果遇到此类问题，请返回检查您的构建设置。\n\n***Note:*** 您也可能会看到诸如“我们暂时无法保存您的更改，请稍后重试”这样的错误。有时系统会过载，您可能需要尝试多次才能成功。出于同样的原因，请将更新应用程序元数据与上传文件分开进行。\n\
    \n如果一切顺利，您应用程序的状态将变为“Waiting For Review”。现在只是时间问题了。恭喜！\n\n**最终测试**\n\n但是，有一个小问题：您从未运行过上传到\
    \ iTunes 的最终构建。您也无法运行它，因为它是使用未指定任何设备的 App Store 分发配置文件签名的。\n\n在短短时间内，成百上千的客户将购买和使用这个构建，因此确认一切正常当然很好。幸运的是，您可以通过一个名为`codesign`的命令行工具来获得这种保证。该工具使用与\
    \ Xcode 相同的代码签名方法。\n\n将目录更改为您进行构建的位置后，您可以通过以下方式查看应用中代码签名的当前值：\n\n```\n$ cd build/Final--Release-iphoneos\n\
    $ codesign –d –vv ″Safety Light.app/Safety Light″\nExecutable=/Users/studmuffin/Projects/Flashlight\
    \ Pro/build/Final--Release-iphoneos/Safety Light.app/Safety Light\nIdentifier=com.iconfactory.FlashlightPro\n\
    Format=bundle with Mach-O thin (armv6)\nCodeDirectory v=20100 size=618 flags=0x0(none)\
    \ hashes=22+5 location=embedded Signature size=4280\n```"
  raw: 'A recent policy change by Apple provides a much better solution for you and
    your customers: A free application can use in-app purchases to unlock paid features.
    With this technique, you provide a unique product ID to iTunes by using the StoreKit
    framework. Once the user approves the transaction, get information that lets you
    unlock features. You don’t need to manage two applications, there are no data
    migration issues, and it’s a much simpler experience for your customer.


    **Upload**


    Once you conclude your beta test, you have to take one more pass at adjusting
    your Xcode settings. You signed the distribution builds for your beta test by
    using an Ad Hoc provisioning profile (page 215). The build you submit to iTunes
    should be signed with an App Store profile. This section shows you how to create
    the new App Store profile, create and upload the new build, and how to test it.
    Last but not least, you’ll start to promote your new app and get ready for buyers.


    The Final Profile


    To create the new profile, fire up your old friend the Provisioning Portal website
    (page 136). Then follow these steps:


    **1\. After logging into the Provisioning Portal, select Provisioning in the left
    column.**


    **2\. On the Provisioning page, click the Distribution tab. On the Distribution
    tab,** **click New Profile to create a new distribution profile.**


    **3\. For Distribution Method, leave App Store selected.**


    **4\. Next, supply a Profile Name. If you named your beta profile Squidger Beta**
    **Distribution, then a good name would be Squidger Final Distribution.**


    **5\. Select an App ID for the profile. Use the same one you used for your beta
    test:**


    **“Squidger Apps”, for example.**


    **6\. Since you’re going to distribute this version on the App Store, you don’t
    need** **to specify devices. Just click Submit, and your new profile will be created.**


    Click the Download link to retrieve the profile, and then drag it onto the Xcode
    icon in the Dock to install it. You should see “Squidger Final Distribution” in
    the Organizer window.


    Chapter 8: For Sale


    **261**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Upload**


    The Final Target


    You’ll want to create a new target for this build, much as you did with the beta
    test build (page 127). This target will be just like the one you did for your
    beta test, but will have different settings in the Code Signing build settings.


    For the beta test, you added a *dist.plist* file for the Code Signing Entitlements.
    For the final release, you do *not* need this file. The other setting, Code Signing
    Identity, should be set to Any iPhone OS Device. In addition, you do *not* want
    to use the automatic profile selector, because it may select your beta profile
    by accident.


    Instead, scroll down in the list, and select the iPhone Distribution that’s listed
    under the profile name (Squidger Final Distribution, for example).


    To see these settings in action, look at the “Safety Light (Final)” build settings.


    Double-click the target, and you see no entitlements and that the code-signing
    identity is “iPhone Distribution: Craig Hockenberry” followed by a long and global
    y unique ID (GUID).


    You see this GUID because you don’t have the distribution profile or code-signing
    certificate for the “Craig Hockenberry” developer account. If you try to build
    the project, you see a code-sign error stating that there isn’t a “valid certificate/private
    key pair in the default keychain”. If you want to submit this application to the
    App Store, you have to use your own unique certificate and provisioning.


    ***Tip:*** If you see a GUID, it generally means the provisioning profile can’t
    be located by Xcode. Download a new copy from the Provisioning Portal.


    The Final Build


    Now that you have your target configured for distribution on the App Store, you’re
    ready to do the build that all your customers on iTunes will use. Before you do
    so, make sure to update the “Bundle version” number (page 221) in your Info.plist
    to use just numbers and periods—no letters. If you leave in a beta version number,
    like


    “1.0b3”, it’ll be rejected on upload.


    After the build, you need to make a backup copy of both your application and the
    dSYM file. Both files are *required* to investigate crashes encountered by your
    customers. (You learn how to debug these crashes on page 298.) You also need to
    archive the app you just built in a Zip file before uploading it to iTunes. (Simply
    Control-click the file, and choose Compress from the shortcut menu.)


    ***Tip:*** The Flashlight Pro application has an aggregate target named Final
    with a Package Release build phase that creates the Zip file automatically. This
    build phase also creates a backup of the app and dSYM


    files so they can be checked into your version control system.


    **262**


    iPhone App Development: The Missing Manual


    ![Image 81](index-281_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Upload**


    The Final Upload


    Once you have the final Zip file ready to go, it’s a simple matter of uploading
    it with iTunes Connect:


    **1\. Log into iTunes Connect (page 233) and click Manage Your Applications. In**
    **the list that appears, click your application icon.**


    Your application’s Status should be Waiting For Upload.


    **2\. In the application information screen, click Upload Binary to start the
    upload** **process.**


    **3\. On the next screen, click Choose File, and then navigate to the Zip file
    that** **contains your final application. When you’re done, click Choose.**


    **4\. A new button appears on the screen: Upload File. Click it, and the file
    uploads** **to Apple’s server.**


    **5\. When the upload completes, you see a checkmark icon; click Save Changes
    to** **complete the submission process.**


    At this point, the server checks your uploaded file (Figure 8-10). If it finds
    any problems, you see a red banner at the top of the page that explains the error.


    A common source of problems is the distribution provisioning: Go back and check
    your build settings if you encounter this type of problem.


    ***Figure 8-10:***


    *Once you have all*


    *your application meta-*


    *data in order, the last*


    *step is to upload your*


    *final build to iTunes so*


    *the application review*


    *process can begin.*


    ***Note:*** You may also see an error like “We’re temporarily unable to save your
    changes. Please try again later.” Sometimes the system gets overloaded, and you
    have to try several times for it to work. For the same reason, update your application
    metadata separately from uploading the file.


    Chapter 8: For Sale


    **263**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Upload**


    If everything goes fine, your application’s status changes to Waiting For Review.
    It’s just a matter of time now. Congratulations!


    The Final Test


    There is, however, a slight problem: You’ve never run the final build that you
    uploaded to iTunes. Nor can you, because it’s signed with an App Store distribution
    profile that has no devices specified.


    In just a short time, hundreds or even thousands of customers will be buying and
    using this build, so it sure would be nice to know that everything is OK. Fortunately,
    you can get that reassurance by using a command-line tool called *codesign.* This
    tool uses the same methods as Xcode uses to sign code.


    After changing your directory to where you did the build, you can view the current
    values for code signing in the app with:


    $ cd build/Final--Release-iphoneos


    **$ codesign –d –vv ″Safety Light.app/Safety Light″**


    Executable=/Users/studmuffin/Projects/Flashlight Pro/build/Final--Release-iphoneos/Safety
    Light.app/Safety Light


    Identifier=com.iconfactory.FlashlightPro


    Format=bundle with Mach-O thin (armv6)


    CodeDirectory v=20100 size=618 flags=0x0(none) hashes=22+5 location=embedded Signature
