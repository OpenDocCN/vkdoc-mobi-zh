    \ initially allocated, their retain counter is set to `1`.\n\nNow that you know\
    \ how you keep objects around in memory, you need a way to get rid of them when\
    \ you're finished using them. That's where the `-release` message comes in. It\
    \ does the exact opposite of `-retain`; instead of incrementing, it *decrements*\
    \ the retain count. You're telling the object you don't need it anymore.\n\nAs\
    \ your app runs in the Cocoa Touch environment, the retain count of objects is\
    \ checked periodically. Objects with retain counts that have reached zero aren't\
    \ being used by any other objects, so the system can delete them and reclaim their\
