- fmt: 'iTunes’ default behavior is to make your new release available immediately.
    To control the date your app is released, select an availability date that’s well
    into the future.


    Give yourself enough time to choose a specific date and to coordinate your marketing
    efforts around it. Consider a time to send out review copies, get press releases
    distributed, and to deploy your promotional site. If the switch gets thrown at
    some random date in the middle of the night, you’ll end up with a dud instead
    of a launch.


    By setting the date in the future, you’ll have a chance to get everything organized
    and to update the setting to your actual launch date.


    Another important factor when choosing a launch date: It won’t happen on the day
    you think it does. It’s easy to forget that iTunes is a worldwide enterprise.
    You may be living in California, but plenty of your customers are in New Zealand
    and are a heck of a lot closer to the International Date Line than you are.


    When you specify `Availability Date` as `“10/Oct - 22 – 2009”`, you may be surprised
    when people start hitting your website and sending you support email at 4 a.m.
    on the day before the launch. iTunes made your application available in New Zealand
    on the 22nd as you requested, but you didn’t know that New Zealand is 20 hours
    ahead of your local time. Whoops!


    **248**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # Stake Your Claim


    To figure out when the launch will really happen, use an online time zone converter:
    [http://www.timeanddate.com/worldclock/converter.html](http://www.timeanddate.com/worldclock/converter.html).
    Select midnight in Auckland, New Zealand, as the time and place to convert from,
    and choose your location as the place to convert to. If you’re in the United States,
    it’s going to be sometime in the early morning. Plan your sleep schedule accordingly.


    # Price Tier


    After selecting the availability date, pick a price for your app. Again, since
    iTunes works worldwide, you don’t set the price in dollars and cents. Instead,
    Apple uses `Price Tiers`—groups of equivalent prices.


    The first option is `Free`, and selecting it means that you won’t make any money
    off the download of the application. (You can still make money with in-app purchases
    and advertising, however.)


    If you pick `Tier 1`, your application will go for 99¢ in the United States, €0.79
    throughout Europe, and the equivalent prices in other foreign currencies. Each
    tier level is approximately equal to one dollar until you get to the higher ones.
    (`Tier 85` means $999.99 in the United States!) After you select a tier, the amount
    in various currencies appears along with your proceeds from each sale.


    Of course the hardest part is figuring out how much you should charge for your
    application. The next section will cover some of the market factors that may influence
    your decision. For now, just pick a tier that you think is close, and click `Continue`
    to advance.


    # Localization


    You’ve worked hard to write a great application description, so pick relevant
    keywords, and showcase the best images from your app. And don’t forget languages
    other than English. Otherwise, up to 40 percent of your potential customers may
    never discover your app. When someone in Spain searches for `literna`, you want
    to make sure he finds your flashlight!


    Again, to be successful in iTunes, you need to think globally. A large portion
    of your customer base doesn’t speak the same language you do. You only have their
    attention for a short time: Make your marketing message easy to read.


    The `Localization` tab lets you supply translations for the following items:


    - Application Name and Description

    - Keywords

    - URLs and Email

    - Primary and Additional Screenshots


    iTunes Connect supports many different localizations, but you get the most bang
    for your buck by translating your marketing materials into Japanese, French, German,
    Spanish, and Italian.


    Chapter 8: For Sale


    **249**


    ![Image 77](index-268_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Stake Your Claim**'
