    affects the entire user experience.

    • **Controls feel smaller.** Those buttons that looked large on your Mac’s screen
    aren’t so big anymore.

    • **Environmental conditions change.** The UI that looked great in the controlled
    lighting conditions of your office may not look so good in direct sunlight or
    harsh fluorescent lighting.

    • **Distractions increase.** You’ll be using your application while interacting
    with other people and conditions: Complexity is more difficult to manage.


    Over time, you’ll find things in your application that break when exposed to the
    real world. Sometimes it’s code, like how your application handles a dropped network
    connection. Other times it’s with design: You need to adjust the contrast and
    placement of controls. Either way, you’ll find these issues only by leaving the
    comfort of your work environment.


    ## Ready to Roll


    You’ve got a good handle on the development environment now. Everything is set
    up the way you want, and you can easily build and test your code. Time to start
    thinking about the best way to write your application. It’s likely that you’ve
    worked with other development environments, so you already know how important
    it is to come up to speed on the design patterns and best practices that make
    you an efficient and effective programmer. That means it’s time to dig a little
    deeper into the Flashlight Pro project!


