    **128**


    iPhone App Development: The Missing Manual


    ![Image 42](index-147_1.jpg)


    ![Image 43](index-147_2.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Beyond the Template**


    ***Figure 5-2:*** *The Target Info window shows the main settings for a project’s
    target. In the General tab, you specify the name of the application (A) that appears
    on the iPhone’s home screen. The Properties tab is used to set a unique identifier
    for your app (B) along with the icon (C) and version number (D).*


    A B C D


    ***Note:*** The identifier must conform to the same RFC 1034 specifications as
    domain names, so don’t include any spaces or special characters. Just stick to
    letters, numbers, and dots.


    *Choose a distinctive icon*


    When you built the application in Chapter 1, you might have noticed a boring white
    icon appear on the home screen (Figure 1-12). That’s what happens when you don’t
    type a filename for `Icon File` in the target’s Property tab (Figure 5-2).


    Chapter 5: Getting Serious about Development


    **129**


    ![Image 44](index-148_1.jpg)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Beyond the Template**


    ***Figure 5-3:*** *By default, your application icon gets a gloss and bevel effect
    that makes it feel at home on your iPhone. For some icons, such as the one used
    for Safety Light, these effects distract from the design. The image shows an icon
    on the left with the effect applied and on the right with it removed.*


    To replace boring with bling, supply the name of a 57 × 57-pixel PNG file that
    you want to use for the icon that appears on the scrolling pages of applications.
    You must store this file in your project’s Resources folder, and Apple recommends
    that you name it `Icon.png`.


    Although only one `Icon.png` file appears in the Property tab, Springboard actually
    looks for *two* files when you specify `Icon.png`. Since the 3.0 firmware added
    the Spotlight feature, your app’s icon also needs a 29 × 29-pixel graphic called
    `Icon-Small.png` file in your project Resources. If you don’t supply a smaller
    image, the larger graphic will be scaled down when the user searches for your
    app. In many cases, this automatic scaling doesn’t look as good as you’d want,
    so have your designer create graphics at both resolutions.


    ***Note:*** Another graphic isn’t specified in any configuration file: `Default.png`.
    This graphic is displayed as your application is launched, making it feel faster
    to the user. Some developers, especially ones producing games, use the image as
    a splash screen.


    Make the file 320 × 480 pixels, and put it in your project Resources. If this
    file isn’t included or has the wrong name, a black screen shows until your application
    is active.


    **Removing the Bevel effect.** Many designers also prefer to add their own “shine”
    to the `Icon.png` and `Icon-Small.png` files. This presents a problem when you
    view the icon on the home screen: Springboard’s default behavior is to add a gloss
    and bevel effect to the icon files (Figure 5-3). How do you get rid of that?


    You’ve been editing `Info.plist`. All of the changes you’ve been making in the
    Properties panel of the target settings have been updating the `Info.plist` XML
    file. The file’s full name, when you see it in the Resources group, is based on
    the name of the project. For the Flashlight Pro app, the filename is `Flashlight_Pro-Info.plist`.
    You can see it in the Resources group. When you build your target, the original
    file is processed by replacing environment variables like `${PRODUCT_NAME}` and
    by adding additional information like the minimum version of the OS that is required
    to run the application.


    **130**


