  trans: "\n此对象的唯一用途：表示空值。集合不允许使用 `nil` 对象，因此当需要在数组、字典（哈希表）或集合中放入空值时，可以使用 `NSNull`。\n\
    \n## `NSValue`\n\n有时，你需要创建能够紧密镜像原始类型或数据结构的对象。当你有一些遗留数据或第三方数据，并需要将其添加到集合中时，最可能遇到这种情况。\n\
    \n每当出现这种需求时，请查看 `NSValue` 类。它可以将 Objective-C 中任何有效的变量类型包装为值对象。假设你有一个遗留系统，定义了一种名为\
    \ `Chockitude` 的奇怪数据结构：\n\n```c\ntypedef struct {\n    unsigned char palmCount;\n\
    \    int isFleshy;\n    float height; // 单位为英寸\n} Chockitude;\n```\n\n如果你需要将此数据包装到对象中，操作很简单：\n\
    \n```objc\nChockitude ch;\nch.palmCount = 2;\nch.isFleshy = true;\nch.height =\
    \ 79.25;\n\nNSValue *value = [NSValue valueWithBytes:&ch objCType:@encode(Chockitude)];\n\
    ```\n\n每当需要检索值对象的内容时，你可以编写如下代码：\n\n```objc\nChockitude theChockitude;\n[value\
    \ getValue:&theChockitude];\nNSLog(@\"palmCount = %d, isFleshy = %s, height =\
    \ %f\",\n      theChockitude.palmCount,\n      (theChockitude.isFleshy ? \"YES\
    \ OF COURSE\" : \"no\"),\n      theChockitude.height);\n// 控制台日志中显示：\n// palmCount\
    \ = 2, isFleshy = YES OF COURSE, height = 79.250000\n```\n\n`NSValue` 对象的另一个用途是处理\
    \ iPhone 显示屏上的点和其他几何图形。如果你想跟踪屏幕上的系列点击操作，很可能会想使用 `CGPoint` 结构（包含 x 和 y）的集合。你可以使用一个\
    \ `NSValue` 类别，它能够接收这些常见结构并将其编码为对象：`+valueWithCGPoint:` 和 `+valueWithCGRect:`\
    \ 用于包装图形框架使用的点和矩形。\n\n## 集合\n\n当你处理对象时，通常会涉及许多对象。保持有序至关重要，而实现这一点的最简单方法是将相似对象分组到*集合*中。\n\
    \n例如，当你在 iPhone 上查看滚动列表时，每行中的数据都由一个对象表示。如果该行包含一个人的姓名和年龄，那么你很可能还会有其他对象来存放这些个人详细信息。\n\
    \n对于这种列表视图，`NSArray` 是一种很自然的集合。你可以指定集合内的顺序，使列表中的第一行成为数组中的第一个对象。该数组类还提供了对数据进行排序和过滤的机制，从而轻松地在用户界面中模拟这种行为。\n\
    \n当你想通过唯一键来收集对象时，请使用 `NSDictionary` 类。它实现了关联数组，允许你查找与键关联的对象（值）。\n\n***注意：*** 如果你使用过其他语言，关联数组有多种不同的叫法：哈希表、哈希、映射和容器等只是其中几种。无论名称如何，它们都允许你通过键来查找值。\n\
    \n你可以使用 `NSDictionary` 来存储列表中每行的数据。由于你可以将 `NSString`、`NSDate` 和 `NSNumber` 存储在集合中，因此很容易为这些信息创建集合：\n\
    \n```objc\nNSDictionary *personalDetails = [NSDictionary dictionaryWithObjectsAndKeys:\n\
    \    @\"Craig\", @\"name\",\n    [NSNumber numberWithInt:50], @\"age\"];\n```\n\
    \n然后，每当需要获取其中某个对象时，你都可以查询字典集合：\n\n```objc\nNSInteger age = [[personalDetails objectForKey:@\"\
    age\"] integerValue];\nBOOL crankyOldMan = NO;\nif (age > 50) {\n    crankyOldMan\
    \ = YES;\n}\n```\n\n你可以使用 `NSSet` 来收集不重复的对象，且顺序不重要。通常，你会像在数学中使用集合一样使用这种类型的集合。该类提供了用于测试相等性、交集和子集的方法。\n\
    \n随着应用程序变得越来越复杂，你会发现开始组合这些集合。例如，你的列表视图可以为每行实例使用一个 `NSArray`，并使用一个 `NSDictionary`\
    \ 来存储实际的行数据。同样，也可能出现一个 `NSDictionary` 在其某个键下包含一个 `NSArray` 的情况。假设你的个人详细信息包含一个\
    \ `siblingNames` 键；该数据用数组来表示很合适。如果你没有兄弟姐妹，那么数组就是空的；无论你的父母生育能力多强，数组都会随着家庭规模的增长而扩展。\n\
    \n### 深拷贝\n\n当你通过发送 `-copy` 消息来拷贝集合时，结果是该对象的浅拷贝。拷贝后的集合可以独立于原始集合进行修改，但两个集合中的对象是共享的。\n\
    \n要执行集合的深拷贝，你需要使用*拷贝项目*方法。例如，对于 `NSArray`，你可以像这样使用 `-initWithArray:copyItems:`：\n\
    \n```objc\nNSArray *original = [NSArray arrayWithObjects:@\"Mimeoscope\", @\"\
    Cyclostyle\", nil];\nNSArray *shallowCopy = [original copy];\nNSArray *deepCopy\
    \ = [[NSArray alloc] initWithArray:original copyItems:YES];\n```\n\n在 `shallowCopy`\
    \ 中，数组中的两个对象与原始数组中的实例相同。另一方面，`deepCopy` 在新数组中包含了 `\"Mimeoscope\"` 和 `\"Cyclostyle\"\
    ` 的新实例。\n\n`NSDictionary` 和 `NSSet` 集合使用相同的模式，分别对应 `-initWithDictionary:copyItems:`\
    \ 和 `-initWithSet:copyItems:` 方法。\n\n## 可变与不可变\n\n在查看 `NSString` 时，你可能已经注意到字符串的内容从未直接修改。如果你查看过\
    \ `NSArray` 类，可能会担心它似乎没有任何添加或删除项目中条目的方法。别担心；Cocoa 的设计者们可没那么懒！\n\n许多用于管理数据的类都被一分为二：一个类用于管理从不更改的数据，另一个子类用于处理可以更改的部分。如果常量数据的类名是\
    \ `NSString`，那么用于可修改数据的类名就是 `NSMutableString`。\n\n### 属性列表\n\n当你费心将对象组织到集合中时，很可能会想要保存这些成果。`NSArray`\
    \ 和 `NSDictionary` 都提供了 `-writeToFile:atomically:` 方法。它们还提供了 `+arrayWithContentsOfFile:`\
    \ 和 `+dictionaryWithContentsOfFile:` 方法，用于从文件中读取信息。\n\n存储在文件中的内容就是*属性列表*，这是 Cocoa\
    \ Touch 中作为一种轻量级且可移植的持久化机制而广泛使用的标准格式。属性列表将对象实例存储在扩展名为 `.plist` 的文件中。数据内容可以存储为可移植性最佳的\
    \ XML 格式，也可以存储为效率更高的二进制格式。\n\n如果你打开 Flashlight 应用程序的资源文件夹，可能会注意到一个名为 `Flashlight-Info.plist`\
    \ 的文件。这个重要的属性列表包含了向 iPhone 操作系统描述应用程序的信息。例如，你可以在此指定显示在主屏幕上的图标。同样，当用户更新应用程序的设置时，配置会被写入属性列表。\n\
    \n当你使用属性列表时，必须仅使用以下类：`NSArray`、`NSDictionary`、`NSString`、`NSData`、`NSDate` 和 `NSNumber`（整型、浮点型和布尔值）。这些对象的任何层次结构都可以存储在文件中。一个包含数字、字符串和日期的字典数组是完全有效的。\n\
    \n***提示：*** 如果你需要归档包含属性列表不支持类的对象图，请查看 `NSKeyedArchiver` 类和 `NSCoding` 协议。\n"
- fmt: "# Why Use Two Classes When One Would Suffice?\n\nWhy use two classes when\
    \ they could have just implemented one? For the same reason that constant values\
    \ in other code are a good thing: You know that the data is never going to change\
    \ as it’s processed. You can make assumptions that you wouldn’t have otherwise\
    \ made.\n\n***Note:*** If you’ve ever had an array’s size change as you’re iterating\
    \ over its elements, you know the pain of the bugs that these bad assumptions\
    \ can incur.\n\n## Chapter 3: Cocoa Touch: Putting Objective-C to Work\n\n**75**\n\
    \n**Mutable Versus Immutable**\n\nWhen you’re building your own classes, you’ll\
    \ often have to choose which of these two variants to use for your instance variables.\
    \ A good rule of thumb is to use an immutable object like `NSString` or `NSNumber`\
    \ when the value is replaced entirely.\n\nWhen you were making awesome strings,\
    \ there would have been no point in using an `NSMutableString` since the `–setOriginalString:`\
    \ method updated the whole string rather than making changes to individual characters.\n\
    \nCollections, on the other hand, are often updated incrementally. It’s common\
    \ to add or remove items from an array, so you’d want to use `NSMutableArray`\
    \ and gain the `–insertObject:atIndex:` and `–removeObjectAtIndex:` methods.\n\
    \n### Make It Mutable\n\nWhat do you do when you have an immutable object and\
    \ you need a mutable one?\n\nYou’ll find that a lot of methods in the foundation\
    \ classes return immutable objects as results. These system classes assume that\
    \ you’re probably not going to want to modify the results. And for the most part,\
    \ this is true. But as a developer, you know that it’s the special cases that\
    \ cause the most headaches!\n\nHere’s a simple example of a method that returns\
    \ immutable data—the `NSString` method that splits a string using a separator:\n\
    \n```\n- (NSArray *)componentsSeparatedByString:(NSString *)separator;\n```\n\n\
    If you’re parsing a comma-separated string to just loop through the values, an\
    \ immutable copy works just great:\n\n```\nNSString *oneHand = @″Thumb,Index,Middle,Ring,Little″;\n\
    NSArray *fingers = [oneHand componentsSeparatedByString:@″,″];\nfor (NSString\
    \ *finger in fingers) {\n    NSLog(@″The finger is %@″, finger);\n}\n```\n\nBut\
    \ what if you want to modify the fingers? This is one of those rare and important\
    \ cases where you need a mutable copy. Everyone knows the last finger is called\
    \ the “Pinkie”.\n\nLuckily, it’s an easy fix using the `–mutableCopy` method that’s\
    \ defined by `NSObject`:\n\n```\nNSString *oneHand = @″Thumb,Index,Middle,Ring,Little″;\n\
    NSArray *fingers = [oneHand componentsSeparatedByString:@″,″];\nNSMutableArray\
    \ *mutableFingers = [fingers mutableCopy];\n[mutableFingers removeLastObject];\
    \ // OUCH THAT HURT!!!!\n[mutableFingers addObject:@″Pinkie″]; // IT′S A MIRACLE\
    \ OF MODERN SCIENCE\nfor (NSString *finger in mutableFingers) {\n    NSLog(@″The\
    \ finger is %@″, finger);\n}\n```\n\nIt’s important to note that you can’t make\
    \ a mutable copy of just any object. The class you’re copying needs to support\
    \ the `NSMutableCopying` protocol. If the class definition doesn’t include `<NSMutableCopying>`,\
    \ an exception will be raised when you try to make the copy.\n\n**76**\n\niPhone\
    \ App Development: The Missing Manual\n\n**Mutable Versus Immutable**\n\n***Note:***\
    \ `–mutableCopy` behaves like `–copy` when you’re dealing with collections. A\
    \ shallow copy is performed.\n\nLuckily, all of the value objects and collections\
    \ support the protocol. And when a class doesn’t support the protocol, it’s probably\
    \ for good reason. What would it mean to have a mutable copy of a `UIView` or\
    \ an `NSURLConnection`? You’d have too many dependencies for such an abstraction\
    \ to be understandable.\n\n### Protect Your Data\n\nIt’s common to use mutable\
    \ data in a method implementation. You have no idea how `–componentsSeparatedByString:`\
    \ is implemented, but it’s likely that the array was built up as the parser moved\
    \ from the beginning to the end of the string. So why return it as an immutable\
    \ array?\n\nCocoa Touch is preventing you from shooting yourself in the foot.\
    \ Besides the fact that you probably don’t need the mutable copy, when you have\
    \ two objects with a copy of the same data, someone is going to get hurt if one\
    \ object changes the data without the knowledge of the other object.\n\nImagine\
    \ an array that’s shared between two objects that are adding and removing items.\
    \ The first object computes the length of an array. Then another object removes\
    \ the last object in the array. When the first object goes to access what it thinks\
    \ is the last item, an exception occurs because the array index is out of bounds.\
    \ It’s a hideous bug to track down, because each object appears to be doing the\
    \ right thing. It’s far from obvious that the root of the problem is a shared\
    \ collection.\n\nTo return an immutable copy of a mutable instance, you rely on\
    \ the fact that the mutable class is a subclass and that its superclass implements\
    \ the `<NSCopying>` protocol. When you send a `–copy` message, you get back a\
    \ nonmodifiable copy.\n\nSuppose the `mutableFingers` array you created above\
    \ is an instance variable in a `MyHand` class. You’ve decided to keep the variable\
    \ mutable so you can accommodate those ignorant people who insist on calling the\
    \ last finger “Little.” When another object asks the instance for the finger names,\
    \ you’d return them like this:\n\n```\n@implementation MyHand\n. . .\n- (NSArray\
    \ *)fingers {\n    NSArray *result = (NSArray *)[[mutableFingers copy] autorelease];\n\
    \    return result;\n}\n```\n\nThe resulting object won’t break your `mutableFingers`.\
    \ Even if someone wants to call that last finger “Auricular” and stick it in his\
    \ ear.\n\nChapter 3: Cocoa Touch: Putting Objective-C to Work\n\n**77**\n\n**Delegation\
    \ and Data Sources**\n\nHave you ever needed to perform a task and had no idea\
    \ how to do it? Maybe it’s fixing a dishwasher or knitting a pair of socks. You\
    \ can either learn to do it yourself, or find someone to help you with the parts\
    \ you don’t understand.\n\nCocoa Touch has a design pattern called *delegation*\
    \ that lets your application help out system classes that don’t know what you\
    \ want to do. The way it works is simple: You introduce one object to another\
    \ object that’s able to answer any questions. By assigning a `delegate`, you provide\
    \ hooks into code that can respond to requests and state changes.\n\nIf your object\
    \ is willing to be a delegate, it needs to follow a protocol. As you saw on page\
    \ 36, the protocol is like a contract. Many of the methods in that contract will\
    \ be optional, but others will be required.\n\nThis pattern is used extensively\
    \ throughout Cocoa. If you type `delegate` into the documentation viewer, you’ll\
    \ get back over 100 results. You can tell which classes support delegation, because\
    \ they have a `delegate` property. The actual protocols for delegation are usually\
    \ suffixed with `Delegate`.\n\nThe best way to see what this looks like in practice\
    \ is by checking out one of the classes that uses delegation: the `UIPickerView`\
    \ control that selects values from a scrolling list (Figure 3-2).\n\n***Figure\
    \ 3-2:*** *The standard picker view for Cocoa Touch. The values that are displayed\
    \ come from a delegate and a data source.*\n\n**78**\n\niPhone App Development:\
    \ The Missing Manual\n\n**Delegation and Data Sources**\n\nWhen you look at the\
    \ documentation for the `UIPickerView` class, you’ll see the `delegate` instance\
