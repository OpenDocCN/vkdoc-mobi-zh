    **Fashion Your Models**


    Now that you’ve ventured through the views of Flashlight Pro, it’s time to look
    at the models that provide data to the application.


    You might be thinking, “Data? For a flashlight?”


    Yes! Data comes in many forms: The models for the flashlight let you keep track
    of the light’s settings and build a state machine that controls the SOS flasher.
    It’s not data in the traditional sense, but it’s still information that you separate
    from your controllers.


    SOSModel


    When you’re sending an SOS signal, you’re dealing with a stream of dots and dashes
    that change over time. In essence, you’re working with a state machine. Since
    one of a model’s functions is to manage internal logic and behavior, it makes
    the distress signal a good candidate for this kind of object.


    The model’s interface is simple: A *unitInterval* property lets you define how
    long a dot or a dash takes (dashes are defined as being three times as long as
    a dot). There is also a method that lets you query the current element.


    You start the state machine running by invoking the *–send* method.


    *Notifications*


    After you start the state machine running, how do you find out when to change
    from a dot to a dash? You could poll the element parameter, but you know that
    polling for value updates is terrible to do in an event-driven environment. And
    Cocoa Touch is very much an environment driven by events.


    **190**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Fashion Your Models**


    The solution is to rely on notifications. As you saw on page 97, notifications
    let you distribute information to objects in a structured manner. So that’s what
    you do with the SOS model. Here’s the notification name as it’s defined in the
    *@interface*: extern NSString *const SOSModelElementChangedNotification;


    which has a corresponding definition in the *@implementation*: NSString *const
    SOSModelElementChangedNotification =


    @″SOSModelElementChangedNotification″;


    As the state machine advances, the notification is posted so that any interested
    view controllers can update their views:


    - (void)update {


    [self advance];


    **[[NSNotificationCenter defaultCenter]**


    **postNotificationName:SOSModelElementChangedNotification object:self];**


    [self performSelector:@selector(update) withObject:self


    afterDelay:[self duration]];


    }


    When this tour passes by the *MainViewControl er* class, you’ll see how it handles
    the notification.


    ***Note:*** This class design is very similar to how you’d handle a network refresh
    for data loaded via the Internet. Instead of *–send,* you’d implement *–refresh,*
    which loads data asynchronously using an *NSURLConnection.* When the data finishes
    loading over that connection, you’d send a *refreshdidfinish* notification so
    any registered view controllers could update their views using the new data.


    *Private property*


    Class extensions can also be used to define private properties. You get the advantage
    of having Objective-C create your accessor methods, and you don’t have to expose
    internal data.


    The *SOSModel* uses an integer instance variable to maintain state. Surprisingly,
    this variable is named *state* and is defined in the *@interface*: NSUInteger
    state;


    Notice that no *@property* definition is in the header file. You’ll find it in
    a class extension just above the *@implementation*:


    @interface SOSModel ()


    **@property (nonatomic, assign) NSUInteger state;**


    . . .


    @end


    Chapter 6: A Flashlight for Pros


    **191**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Fashion Your Models**


    At this point you can use the *state* property just as if it had been defined
    external y.


    And you can be assured that a client of your class won’t mess around with your
    internal data.


    FlashlightModel


    You can use the flashlight model to persist the application’s state. The current
    brightness, flashing speed, color, and light pattern are available via properties
    and methods. Whenever you change one of these values in the model, it’s immediately
    saved in the user’s settings database.


    The model also provides a small database of colors. For example, a *UIColor* instance
    can be retrieved along with a localized name for the user interface.


    *Read-only properties*


    As you saw on page 191, in some cases, keeping other objects from snooping around
    in your data is a good idea. Also, in some cases, you don’t mind exposing your
    state, but you don’t want it to be modified. In these cases, you’d use a read-only
    property.


    The *currentColorIndex* in the *@interface* does just that:


    @property (nonatomic, readonly) NSUInteger currentColorIndex;


    Now you have a bit of a problem. You can read the property, but you can’t write
    to it.


    If you try to use *self.currentColorIndex = 0,* you get a compiler error.


    Class extensions to the rescue! You can override the property definition in the
    implementation file:


    @interface FlashlightModel ()


    **@property (nonatomic, assign) NSUInteger currentColorIndex;**


    . . .


    @end


    This lets your *@implementation* write to the property, but anyone using your
    *@interface* will only be able to read it.


    *Class statics*


    On page 100, you saw how to use class static variables to implement a singleton
    pattern. The flashlight model contains a slight variation on this theme. The class
    static is used to hold an array of color names and values:


    + (NSArray *)colors {


    static NSArray *colors = nil;


    if (colors == nil) {


    colors = [[NSArray alloc] initWithObjects: . . .


    . . .


    **192**


    iPhone App Development: The Missing Manual


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Fashion Your Models**


    The first time the *+colors* class method is used, the array is allocated and
    retained for the lifetime of the application.


    ***Tip:*** You can use class statics to speed up parts of your application. If
    you have an object that’s accessed frequently, and it takes a while to load the
    object, you want to minimize the time you spend instantiating it.


    A static variable with a *UIFont* **or ***UIImage*** ****can be initialized once
    and used repeatedly while drawing your view. These cached objects can help improve
    your scrolling speed in a *UITableView.* **Just remember that you’re never getting
    back the memory used by the cache, so use this technique only for small objects.********


    ******Class statics are also used for the keys that store and retrieve the color
    information: static NSString *nameKey = @″name″;


    static NSString *colorKey = @″color″;


    This approach allows the compiler to check the key type and catch typos. If you
    use


    *@*″ *name*″ to write the data in the hash table, and a misspelled *@*" *nane*″
    to read it, you’re going to be doing some head scratching. By using *nameKey,*
    you avoid this potential problem.


    *User defaults*


    Cocoa Touch provides a standard mechanism for storing a user’s settings. It’s
    called *NSUserDefaults* and it acts as the backbone for this model.


    For example, when you send the *–setSpeed:* message to the model, the current
    speed value is updated and then stored as a floating-point value in the standard
    user defaults by using the *–setFloat:forKey:* method:


    - (void)setSpeed:(float)newValue {


    if (newValue != speed) {


    speed = newValue;


    **[[NSUserDefaults standardUserDefaults] setFloat:speed** **forKey:speedKey];**


    }


