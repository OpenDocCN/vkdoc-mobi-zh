  \n图 6-1\n\n使用`Text`视图、`Label`视图或`Image`视图定义按钮标题\n\n## 在按钮中运行代码\n\n你可以存储任何代码，以便在用户点击`Button`时运行。按钮内部常见的一种代码类型是改变状态的代码。在\
  \ SwiftUI 中，你可以像这样将特殊变量声明为 State 变量：\n\n```\n@State var colorMe = false\n```\n\n\
  当你将更新后的数据存储到普通变量中时，使用该变量的程序的其他部分并不知道数据已被更新。确保程序的每个部分都能接收到变量中存储的更新数据可能既繁琐又容易出错。这就是\
  \ SwiftUI 提供 State 变量来解决这个问题的原因。\n\n一旦你改变了 State 变量的值，任何使用该 State 变量的内容都会自动获取该 State\
  \ 变量中存储的最新数据，无需编写任何额外代码。当一个变量持有一个值时，它处于一种状态；当同一个变量持有不同的值时，那就是第二种状态。SwiftUI State\
  \ 变量自动简化了让程序每个部分都了解变量值或状态变化的过程。\n\n前面的例子通过使用`@State`关键字，后跟一个变量声明（`var`）来创建一个 State\
  \ 变量，该声明定义了变量的名称（`colorMe`）、数据类型（推断为布尔类型）和初始值（`false`）。\n\n当使用表示布尔数据类型的 State 变量时，一个常用的命令是`.toggle()`命令，它将布尔变量从`true`改为`false`（或从`false`改为`true`），例如：\n\
  \n```\ncolorMe.toggle()\n```\n\n如果`colorMe` State 变量的值是`true`，那么`.toggle()`命令会将`colorMe`的值改为`false`。如果`colorMe`\
  \ State 变量的值是`false`，那么`.toggle()`命令会将`colorMe`的值改为`true`。\n\n布尔 State 变量常用于做出 if-else\
  \ 决策。通常，修饰符只包含单个值，例如：\n\n```\n.fill(Color.green)\n```\n\n然而，如果你在修饰符中嵌入 if-else 三元运算符，就可以将传统的\
