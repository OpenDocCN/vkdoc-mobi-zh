  \n5. 在`VStack`内部输入以下内容：\n\n```\n    Rectangle()\n    .fill(colorMe ? Color.green\
  \ : Color.gray)\n    .frame(width: 250, height: 100)\n```\n\n这会创建一个矩形，其中`.frame`修饰符将其宽度定义为\
  \ 250，高度定义为 100。注意，`.fill`修饰符使用`colorMe`布尔 State 变量来决定显示哪种颜色。如果`colorMe`为`true`，则矩形显示为绿色。如果`colorMe`为`false`，则矩形显示为灰色。\n\
  \n6. 在`VStack`内部的`Rectangle()`下方输入以下内容，以创建一个普通按钮：\n\n```\n    Button(\"纯文本按钮\")\
  \ {\n    colorMe.toggle()\n    }\n```\n\n\n\n这定义了一个用于显示纯文本的 `Button`。每当用户点击此 `Button`，它都会使用\
  \ `.toggle()` 命令将 `colorMe` 的值从 `true` 改为 `false`（或从 `false` 改为 `true`）。\n\n7. \
