- '# 使用 SwiftUI 设计用户界面


  每个应用都需要一个用户界面。SwiftUI 的基本理念是利用被称为“视图”的构建块来创建用户界面。一个视图在用户界面上显示一个单一项目，例如文本、图像或按钮，如图
  2-1 所示。


  ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig1_HTML.jpg](img/329781_6_En_2_Fig1_HTML.jpg)


  图 2-1


  SwiftUI 用户界面的组成部分


  SwiftUI 的一个限制是它一次只能在屏幕上显示一个视图。为了突破这个限制，SwiftUI 提供了所谓的“堆栈”。一个堆栈被视为单个视图，但它允许你组合或堆叠多达十个额外的视图。通过创建堆栈，你可以在屏幕上显示不止一个视图。堆栈甚至可以容纳其他堆栈，这实际上让你可以在单个屏幕上显示任意数量的视图。


  共有三种类型的堆栈，如图 2-2 所示：


  ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig2_HTML.jpg](img/329781_6_En_2_Fig2_HTML.jpg)


  图 2-2


  垂直、水平堆栈和 ZStack


  * `VStack` – 垂直堆栈，将视图排列在另一个视图的上方和下方

  * `HStack` – 水平堆栈，将视图并排排列

  * `ZStack` – 一个将视图直接叠加在一起的堆栈


  一个堆栈算作单个视图。通过使用水平（`HStack`）或垂直（`VStack`）堆栈，你可以在一个堆栈内添加最多十个视图。为了更大的灵活性，你可以在堆栈中嵌入堆栈，以便根据需要显示任意数量的视图。


  > **注意：** 一个堆栈最多只能包含十个视图。如果你试图在堆栈中存储 11 个或更多视图，Xcode 将显示错误信息并拒绝运行你的程序。


  在 SwiftUI 中创建用户界面时，你有三种选择：


  * 在编辑器面板中键入 Swift 代码。

  * 将一个视图（例如按钮）拖放到编辑器面板中的 Swift 代码中。

  * 将一个视图（例如按钮）拖放到画布面板上。


  在编辑器面板中键入 Swift 代码来设计用户界面是最快且最灵活的方法，但这需要时间，并且需要熟悉不同的选项。为了使键入 Swift 代码定义用户界面视图更容易，当
  Xcode 识别出你正在尝试键入的内容时，它会显示一个选项弹出菜单。通过选择一个选项并按回车键，你可以快速创建用户界面视图，如图 2-3 所示。


  ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig3_HTML.jpg](img/329781_6_En_2_Fig3_HTML.jpg)


  图 2-3


  当你键入 Swift 代码来定义用户界面视图时，Xcode 会显示一个选项菜单


  如果你不熟悉设计用户界面的各种选项，使用库窗口会更简单，该窗口列出了所有你可以使用的用户界面视图，如图 2-4 所示。


  ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig4_HTML.jpg](img/329781_6_En_2_Fig4_HTML.jpg)


  图 2-4


  点击库图标会打开库窗口


  打开库窗口后，你可以将用户界面视图从库窗口中拖放到：


  * 编辑器面板中，如图 2-5 所示

  * 画布面板中模拟的 iOS 设备用户界面上，如图 2-6 所示


  ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig5_HTML.jpg](img/329781_6_En_2_Fig5_HTML.jpg)


