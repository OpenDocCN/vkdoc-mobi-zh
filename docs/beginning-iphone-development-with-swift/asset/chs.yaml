  无论你如何更改用户界面，Xcode 都会保持编辑器面板和画布面板之间的所有更改同步。这意味着当你在编辑器面板中键入 Swift 代码时，画布面板会立即显示你的更改。当你将用户界面视图拖放到画布面板上时，Xcode
  会立即在编辑器面板中自动添加相应的 Swift 代码。


  画布面板显示你的用户界面，但如果你想测试你的应用，你有两种选择，如图 2-7 所示：


  ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig7_HTML.jpg](img/329781_6_En_2_Fig7_HTML.jpg)


  图 2-7


  运行按钮和实时预览图标


  * 点击运行按钮或选择“产品”➤“运行”以打开模拟器。

  * 点击画布面板中的实时预览图标。


  要了解 SwiftUI 如何创建能够响应用户的简单用户界面，请按照以下步骤操作：


  1. 创建一个新的 iOS App 项目，确保它使用 SwiftUI，并为其起一个描述性的名称（例如 `SwiftExample`）。


  2. 在导航器面板中点击 `ContentView` 文件。编辑器面板会显示 `ContentView` 文件的内容。


  3. 选择“编辑器”➤“画布”。（如果“画布”选项前已经有一个复选标记，则跳过此步骤。）这将打开画布，以便你可以预览用户界面。


  4. 删除 `Text` 命令中的文本“Hello World”，并键入以下内容，使 `ContentView` 结构如下所示：


  ```

  struct ContentView: View {

  @State private var message = true

  var body: some View {

  VStack {

  Toggle(isOn: $message) {

  Text("切换消息显示/隐藏")

  }

  if message {

  Text ("这是一条秘密消息！")

  }

  }

  }

  }

  ```


  上述 Swift 代码在屏幕上显示了一个切换开关，但除非你在模拟器（模拟 iOS 设备，如 iPhone 或 iPad）中运行你的应用，或者通过实时预览进行测试，否则你无法看到它工作。在大多数情况下，实时预览提供了一种更快的方式来查看和测试你的用户界面。


  ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig8_HTML.jpg](img/329781_6_En_2_Fig8_HTML.jpg)


  图 2-8


  实时预览让你能与用户界面交互


  1. 点击实时预览图标以开启实时预览。当你点击切换开关时，注意消息会如 2-8 所示出现和消失。


  2. 再次点击实时预览按钮以关闭实时预览。


  重复上述步骤，但这次点击运行按钮以打开模拟器。在模拟器或画布面板中测试你的应用是相同的。主要区别在于画布面板通常使用起来快得多。


  记住，你总是可以选择不同的 iOS 设备来测试你的应用。要更改模拟哪个 iOS 设备，请点击运行按钮右侧的菜单，如图 2-9 所示。


  ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig9_HTML.jpg](img/329781_6_En_2_Fig9_HTML.jpg)


  图 2-9


  更改模拟器模拟的 iOS 设备


  更改要模拟的 iOS 设备的另一种方法是将光标移动到 `ContentView_Previews: PreviewProvider` 结构中的 `ContentView()`
  里。然后点击检查器面板中的“设备”弹出菜单，如图 2-10 所示。


  ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig10_HTML.jpg](img/329781_6_En_2_Fig10_HTML.jpg)


  图 2-10


  更改实时预览模拟的 iOS 设备


  现在让我们回顾一下这个项目，以便你对它的工作方式有一个大致了解。`ContentView` 结构将单个视图定义为 `VStack`。这意味着该 `VStack`
  内部的任何内容都将相互堆叠显示。


  `VStack` 内的第一个视图是一个 `Toggle`，它使用一个 `Text` 视图在切换开关左侧显示以下文本：“切换消息显示/隐藏”。当 `Toggle`
  开启时，一个名为 `message` 的变量会存储为 `true` 值。当 `Toggle` 关闭时，`message` 变量会存储为 `false` 值。




  在 `Toggle` 下方，出现了一个 `if` 语句。如果 `message` 变量为 `true`，它会显示一个 `Text` 视图，内容为“这里有一条秘密消息！”。如果
  `message` 变量为 `false`，则该 `Text` 视图根本不会出现。


  ## 使用检查器面板修改用户界面


  在 SwiftUI 中创建用户界面通常包含两个步骤。首先，你需要安排各种用户界面视图在屏幕上的显示方式。接下来，你需要通过更改每个用户界面视图的大小、颜色或位置来对其进行自定义。


  要自定义用户界面视图，你需要添加修改器。Xcode 提供了两种添加修改器的方式：


  ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig11_HTML.jpg](img/329781_6_En_2_Fig11_HTML.jpg)


  图 2-11：检查器面板显示了修改用户界面视图的不同方式


  *   直接在编辑器面板中输入修改器。

  *   点击你想要修改的视图，然后从检查器面板中选择一个修改器，如图 2-11 所示。


  直接在编辑器面板中输入修改器需要你知道要使用的修改器的名称。随着你经验越来越丰富，直接在 Swift 代码中输入修改器会更快。然而，在刚开始的时候，你可能并不知道有哪些可用的修改器。这时，你可能会更倾向于使用检查器面板。


  首先，选择你想要修改的用户界面视图。你可以通过将光标移动到定义该用户界面视图的 Swift 代码中，或者点击画布面板中的该用户界面视图来完成此操作。当你选中一个用户界面视图后，检查器面板会显示该特定视图的修改器。


  检查器面板会显示最常用的修改器，例如让你为文本选择字体、对齐方式或颜色。通过点击检查器面板底部附近的 **添加修改器** 按钮，你可以查看额外修改器的列表，如图
  2-12 所示。


  ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig12_HTML.jpg](img/329781_6_En_2_Fig12_HTML.jpg)


  图 2-12：**添加修改器** 按钮会显示一个你可以使用的额外修改器列表


  当你在 **添加修改器** 列表中看到想要使用的修改器时，点击该修改器。Xcode 会在检查器面板中显示该修改器。如果你不再想看到可能已添加到检查器面板中的任何修改器，可以点击该修改器右上角的
  **删除** 按钮，如图 2-13 所示。


  ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig13_HTML.jpg](img/329781_6_En_2_Fig13_HTML.jpg)


  图 2-13：会出现一个 **删除** 按钮，用于移除你可能已添加到检查器面板的修改器


  请记住，应用修改器的顺序可能会产生影响。考虑以下带有两个修改器（背景和内边距）的 `Text` 视图：


  ```

  Text("Here''s a secret message!")

  .background(Color.yellow)

  .padding()

  ```


  这会为 `Text` 视图添加一个黄色的背景色，然后在 `Text` 视图周围添加内边距（空间）。假设你这样调换了这些修改器的顺序：


  ```

  Text("Here''s a secret message!")

  .padding()

  .background(Color.yellow)

  ```


  这个顺序会先在 `Text` 视图周围添加内边距（空间）。然后才给背景上色，但由于背景现在包含了新增的空间，背景色也会填充 `Text` 视图周围的空间，如图
  2-14 所示。


  ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig14_HTML.jpg](img/329781_6_En_2_Fig14_HTML.jpg)


  图 2-14：修改器的顺序可能会产生影响


  无论你使用哪种方法来添加修改器，Xcode 都会保持所有内容的同步。因此，如果你在编辑器面板中输入修改器，你的更改会自动出现在检查器面板中。同样地，如果你在检查器面板中选择了一个修改器，Xcode
  会自动将该修改器添加到编辑器面板中的 Swift 代码里。


  要了解如何更改用户界面项目的外观，请按以下步骤操作：


  1.  确保 Xcode 中加载了上一节中的 `SwiftExample` 项目。`ContentView` 文件应包含一个 `Toggle` 和一个出现在 `Toggle`
  下方的 `Text` 视图。


  2.  点击画布面板中的 `Toggle`，或者将光标移动到编辑器面板中的 `Toggle` 里。Xcode 会在 Xcode 窗口右侧显示检查器面板，其中显示了你可以选择用来更改
  `Toggle` 外观的修改器。


  3.  点击画布面板中显示“这里有一条秘密消息！”的 `Text` 视图，或者将光标移动到编辑器面板中的 `Text` 视图里。注意检查器面板会显示用于更改 `Text`
  视图外观的修改器。


  4.  点击 **字体** 弹出菜单。会出现一个不同的字体选项列表，如图 2-15 所示。


  ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig15_HTML.jpg](img/329781_6_En_2_Fig15_HTML.jpg)


  图 2-15：**字体** 弹出菜单会显示不同的字体选项


  5.  选择 **大标题**。注意 Xcode 会自动在 `ContentView` 文件中添加 `.font(.largeTitle)` 命令，如下所示：


  ```

  Text("Here''s a secret message!")

  .font(.largeTitle)

  ```


  6.  点击 **字重** 弹出菜单，然后选择 **半粗体**。

  7.  点击 **颜色** 弹出菜单，然后选择 **红色**。注意每次你选择一个修改器时，Xcode 都会自动将相应的 Swift 代码添加到你的 `.swift`
  文件中，如下所示：


  ```

  Text("Here''s a secret message!")

  .font(.largeTitle)

  .fontWeight(.semibold)

  .foregroundColor(Color.red)

  ```


  8.  将光标移动到 `ContentView_Previews: PreviewProvider` 结构体中的 `ContentView()` 内。

  9.  点击检查器面板中的 **设备** 弹出菜单。

  10. 选择一个 iPad 型号。注意画布面板会变为模拟 iPad 的显示效果。同时注意 SwiftUI 如何自动修改你的用户界面外观，以便它在不同尺寸的屏幕上正确显示，如图
  2-16 所示。（Xcode 可能需要一些时间来更改画布面板以显示不同的 iOS 设备，请耐心等待。）


  ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig16_HTML.jpg](img/329781_6_En_2_Fig16_HTML.jpg)


  图 2-16：SwiftUI 使用户界面适配不同尺寸的屏幕


  11. 再次点击 **设备** 弹出菜单，选择一个 iPhone 型号，例如 **iPhone 11**。画布现在会变为模拟你选择的 iPhone 型号。


  SwiftUI 的基本理念是让你设计用户界面，然后让 Xcode 自动调整其外观以适应不同的 iOS 屏幕尺寸。SwiftUI 让你不必编写大量 Swift 代码来设计用户界面，而是专注于编写最少的
  Swift 代码来设计用户界面，从而让你能够将时间用于编写 Swift 代码，让你的应用实现独特的功能。




  ## 摘要


  每个应用程序都需要用户界面。使用 SwiftUI，你只需定义所需的用户界面元素，SwiftUI 便会确保你的用户界面在不同尺寸的 iOS 屏幕上都能正常显示并呈现美观的视觉效果。


  你可以通过编程方式（编写 Swift 代码）或可视化方式（从“库”窗口拖放用户界面元素）来设计用户界面。程序员通常结合使用这两种方法来设计他们的用户界面。一旦你将元素（按钮、标签、文本字段等）添加到用户界面，就可以通过代码或检查器面板来自定义这些元素。


  设计和自定义用户界面的外观后，你可以通过两种方式对其进行测试。首先，你可以在模拟器程序中运行应用，该程序可以模拟不同的 iOS 设备，如 iPhone 或 iPad。


  其次，你可以使用实时预览功能，在 Xcode 的画布中与用户界面进行交互。实时预览对于快速测试用户界面非常便捷（但实时预览仅适用于 macOS 10.15 Catalina
  或更高版本）。


  用户界面代表了用户看到的内容，因此无论用户在何种类型的 iOS 设备上运行应用，你的用户界面始终看起来美观至关重要。现在你已经了解了用户界面的基本工作原理，是时候开始学习特定用户界面元素（如按钮、选择器和滑块）的细节了。


  '
- "# 3. 在用户界面上放置视图\n\n当你在用户界面上放置单个视图时，无论屏幕是小尺寸的 iPhone 还是大得多的 iPad，SwiftUI 都会将其居中显示在屏幕中间。当你在用户界面中添加更多视图时，SwiftUI\
  \ 会根据你将它们排列在垂直或水平堆栈中，简单地将这些视图相互叠放或并排显示。然而，添加到用户界面的视图越多，相邻视图可能显得越拥挤。为了解决这个问题，SwiftUI\
  \ 提供了几种在用户界面上放置视图的方法：\n\n- 使用填充修饰符\n- 在堆栈内定义间距\n- 使用 Spacer\n- 定义偏移或位置\n\n你可以使用这些不同方法中的一种或多种来在用户界面上排列视图，使它们正好出现在你想要的位置。最重要的是，这些定位方法适用于\
  \ SwiftUI 中的所有用户界面视图。\n\n## 使用填充修饰符\n\n填充修饰符会在用户界面视图周围添加空间。默认情况下，填充修饰符会在视图的顶部、底部、前导（左侧）和尾随（右侧）边缘添加空间。要使用填充修饰符，只需在任何视图后添加以下代码：\n\
  \n```\n.padding()\n```\n\n填充有两个目的。首先，它在视图周围添加空间，这会改变背景（你可以为其着色），从而使视图更大且更易于查看。其次，填充修饰符会将相邻视图推得更远，从而使相邻视图更易于查看并消除拥挤。\n\
  \n最简单的填充修饰符会在视图的所有四个边缘添加 16 点的间距。如果你添加一个数字，则可以定义所需的精确间距，例如 `.padding(45)` 或 `.padding(3)`，如图\
  \ 3-1 所示。\n\n![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig1_HTML.jpg](img/329781_6_En_3_Fig1_HTML.jpg)\n\
  \n*图 3-1*  \n为填充修饰符定义不同的间距\n\n请注意，填充修饰符会在所有边缘添加空间。如果你愿意，可以定义仅在一个或多个特定区域添加间距，如图 3-2\
  \ 所示：\n\n![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig2_HTML.jpg](img/329781_6_En_3_Fig2_HTML.jpg)\n\
  \n*图 3-2*  \n在特定区域定义填充\n\n- `.top`\n- `.bottom`\n- `.vertical`（顶部和底部）\n- `.leading`（左侧）\n\
  - `.trailing`（右侧）\n- `.horizontal`（尾随和前导）\n\n如果你不添加特定值，SwiftUI 将使用默认的 16 点间距。要同时定义添加填充的区域和特定间距，你必须先定义添加填充的区域，然后跟上特定值，例如：\n\
  \n```\n.padding(.top, 30)\n```\n\n如果你想添加间距到两个或三个区域，可以在方括号中定义这些区域，后跟可选的间距值，如下所示：\n\
  \n```\n.padding([.top, .leading])\n.padding([.top, .leading] , 30)\n```\n\n这允许你定义两个添加间距的区域，如图\
  \ 3-3 所示。\n\n![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig3_HTML.jpg](img/329781_6_En_3_Fig3_HTML.jpg)\n\
  \n*图 3-3*  \n在两个区域定义填充\n\n你也可以添加间距到三个区域，并附带可选的间距值，如图 3-4 所示。\n\n![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig4_HTML.jpg](img/329781_6_En_3_Fig4_HTML.jpg)\n\
  \n*图 3-4*  \n在三个区域定义填充\n\n## 在堆栈内定义间距\n\n`.padding()` 修饰符可以方便地分隔不同的视图。如果没有填充，多个视图在堆栈内可能会显得挤压和拥挤。通过为堆栈内的每个视图添加填充，你可以将它们分开，使每个视图更易于查看，如图\
  \ 3-5 所示。\n\n![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig5_HTML.jpg](img/329781_6_En_3_Fig5_HTML.jpg)\n\
  \n*图 3-5*  \n填充将堆栈内的视图分隔开\n\n虽然填充可以使每个视图更易于查看，但你可能希望对堆栈内视图之间的间距有更多控制。为此，你可以在定义堆栈时定义一个间距值，例如：\n\
  \n```\nVStack (spacing: 40) {\n}\n```\n\n在堆栈内，间距会将视图推开一个固定距离，如图 3-6 所示。\n\n![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig6_HTML.jpg](img/329781_6_En_3_Fig6_HTML.jpg)\n\
  \n*图 3-6*  \n间距在堆栈内的所有视图之间创建了一个固定距离\n\n\n\n## 在堆栈中对齐视图\n\n当创建堆栈（`VStack` 或 `HStack`）时，你可以选择定义对齐方式，无论是否定义间距，例如：\n\
  \n```\nVStack (alignment: .leading)\nVStack (alignment: .leading, spacing: 24)\n\
  ```\n\n注意\n\n如果在堆栈中同时定义了对齐方式和间距，必须先定义对齐方式，再定义间距。\n\n对于 `VStack`，有三种对齐视图的方式，如图 3-7\
  \ 所示：\n\n![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig7_HTML.jpg](img/329781_6_En_3_Fig7_HTML.jpg)\n\
  \n图 3-7\n\n在 `VStack` 中对齐视图的三种方式\n\n*   `.leading`（左对齐）\n*   `.center`（未选择其他对齐选项时的默认设置）\n\
  *   `.trailing`（右对齐）\n\n以下 Swift 代码为 `VStack` 定义了 `.leading` 对齐方式：\n\n```\nVStack\
  \ (alignment: .leading){\nText (\"Top\")\n.background(Color.yellow)\nText (\"Middle\
  \ Text View\")\n.background(Color.yellow)\nText (\"Bottom\")\n.background(Color.yellow)\n\
  }\n```\n\n对于 `HStack`，有五种不同的对齐视图方式，如图 3-8 所示：\n\n![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig8_HTML.jpg](img/329781_6_En_3_Fig8_HTML.jpg)\n\
  \n图 3-8\n\n在 `HStack` 中对齐视图的五种方式\n\n*   `.top`\n*   `.bottom`\n*   `.center`（未选择其他对齐选项时的默认设置）\n\
  *   `.firstTextBaseline`\n*   `.lastTextBaseline`\n\n以下 Swift 代码为 `HStack` 定义了 `.bottom`\
  \ 对齐方式：\n\n```\nHStack (alignment: .bottom){\nText (\"Top\")\n.font(.system(size:\
  \ 40))\n.background(Color.yellow)\nText (\"Middle Text View\")\n.background(Color.yellow)\n\
  Text (\"Bottom\")\n.font(.largeTitle)\n.background(Color.yellow)\n}\n```\n\n`.top`、`.bottom`\
  \ 和 `.center` 对齐选项适用于所有类型的用户界面视图。但是，如果你专门处理 `Text` 视图，SwiftUI 还提供了两种基于基线对齐 `Text`\
  \ 视图的额外方式。你可以根据第一个视图（`.firstTextBaseline`）或最后一个视图（`.lastTextBaseline`）来对齐文本，如图 3-9\
  \ 所示。\n\n![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig9_HTML.jpg](img/329781_6_En_3_Fig9_HTML.jpg)\n\
  \n图 3-9\n\n在 `HStack` 中对齐文本\n\n## 使用间距器\n\n在堆栈中的视图之间使用内边距和间距，对于在用户界面上排列视图非常方便。作为在用户界面上定位视图的另一种方法，你还可以使用间距器。间距器就像一个弹簧，尽可能地将两个视图推开。间距器在编辑器窗格中显示如下：\n\
  \n```\nSpacer()\n```\n\n因为间距器会自动适应不同的屏幕尺寸，所以无论屏幕大小如何，间距器都能将视图对齐到屏幕边缘，如图 3-10 所示。\n\
  \n![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig10_HTML.jpg](img/329781_6_En_3_Fig10_HTML.jpg)\n\
  \n图 3-10\n\n间距器尽可能地将视图推开\n\n你可以组合多个间距器来将视图推得更开。例如，考虑在视图前后各使用一个间距器来分隔它们，使用以下 Swift\
  \ 代码：\n\n```\nstruct ContentView: View {\nvar body: some View {\nVStack {\nText\
  \ (\"Top\")\n.font(.system(size: 40))\n.background(Color.yellow)\nSpacer()\nText\
  \ (\"Middle\")\n.font(.system(size: 40))\n.background(Color.yellow)\nSpacer()\n\
  Text (\"Bottom\")\n.font(.system(size: 40))\n.background(Color.yellow)\n}\n}\n}\n\
  ```\n\n上述代码定义了一个包含三个 `Text` 视图的垂直堆栈。每个 `Text` 视图之间的间距器将它们均等推开，如图 3-11 所示。\n\n![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig11_HTML.jpg](img/329781_6_En_3_Fig11_HTML.jpg)\n\
  \n图 3-11\n\n间距器将三个视图均等分隔\n\n如果组合使用间距器，多个间距器会将视图推得更开。如果在 Top 和 Middle 视图之间添加两个间距器，这两个间距器会将\
  \ Middle 视图推得更靠下，如下列 Swift 代码所示：\n\n```\nstruct ContentView: View {\nvar body: some\
  \ View {\nVStack {\nText (\"Top\")\n.font(.system(size: 40))\n.background(Color.yellow)\n\
  Spacer ()\nSpacer()\nText (\"Middle\")\n.font(.system(size: 40))\n.background(Color.yellow)\n\
  Spacer()\nText (\"Bottom\")\n.font(.system(size: 40))\n.background(Color.yellow)\n\
  }\n}\n}\n```\n\n由于现在 Top 和 Middle 视图之间有两个间距器，它们将 Middle 视图进一步向下推，如图 3-12 所示。\n\n\
  ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig12_HTML.jpg](img/329781_6_En_3_Fig12_HTML.jpg)\n\
  \n图 3-12\n\n两个间距器将 Middle 视图进一步向下推\n\n通过使用多个间距器，你可以根据屏幕尺寸调整用户界面上的视图。当应用在较大屏幕上运行时，间距器会将视图进一步推向屏幕边界。当应用在较小屏幕上运行时，间距器推动视图的距离则较短。\n\
  \n间距器会根据屏幕尺寸自动调整其大小。但是，你可能希望为间距器定义一个最小长度，以防止其收缩过度。要定义最小长度，请使用以下代码：\n\n```\nSpacer(minLength:\
  \ 25.73)\n```\n\n请注意，你可以将最小长度定义为小数值（`CGFloat`），不过也可以使用整数值，例如：\n\n```\nSpacer(minLength:\
  \ 25)\n```\n\n如果没有指定最小长度，间距器将仅根据应用运行的屏幕尺寸进行伸缩。\n\n\n\n## 使用偏移与位置修饰符\n\n堆栈中的间隔器、内边距和对齐方式可以改变视图在用户界面上的位置，但要想以另一种方式定位视图，你还可以使用`offset`修饰符。`offset`修饰符允许你指定特定的`x`和`y`值，将视图从\
  \ SwiftUI 原本放置的位置移开。\n\n在每个 iOS 屏幕上，原点(0,0)位于左上角。`x`值越大，视图水平方向越靠右；`y`值越大，视图垂直方向越靠下，如图\
  \ 3-13 所示。\n\n![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig13_HTML.jpg](img/329781_6_En_3_Fig13_HTML.jpg)\n\
  \n图 3-13\n\niOS 屏幕上的原点与 x、y 方向\n\n下面的`ZStack`将两个完全相同的`Text`视图叠放在一起。由于两个`Text`视图出现在完全相同的位置，因此无法同时看到两者：\n\
  \n```\nZStack {\nText (\"Top\")\n.font(.system(size: 40))\n.background(Color.yellow)\n\
  Text (\"Top\")\n.font(.system(size: 40))\n.background(Color.yellow)\n}\n```\n\n\
  如果我们为其中一个`Text`视图添加`offset`修饰符，`offset`修饰符会将第二个`Text`视图从其正常显示位置移动固定的距离，例如：\n\n```\n\
  ZStack {\nText (\"Top\")\n.font(.system(size: 40))\n.background(Color.yellow)\n\
  Text (\"Top\")\n.font(.system(size: 40))\n.background(Color.yellow)\n.offset(x:\
  \ 75, y: 125)\n}\n```\n\n这个偏移将第二个`Text`视图向右移动 75 点、向下移动 125 点，如图 3-14 所示。\n\n![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig14_HTML.jpg](img/329781_6_En_3_Fig14_HTML.jpg)\n\
  \n图 3-14\n\n偏移修饰符将视图从其正常显示位置移开\n\n`x`正值将视图向右移动，`x`负值将视图向左移动。同样，`y`正值将视图向下移动，`y`负值将视图向上移动。假设我们有如下的`offset`修饰符：\n\
  \n```\n.offset(x: -75, y: -125)\n```\n\n这会将第二个`Text`视图从其正常显示位置向左上方移动，如图 3-15 所示。\n\
  \n![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig15_HTML.jpg](img/329781_6_En_3_Fig15_HTML.jpg)\n\
  \n图 3-15\n\nx 和 y 负值将视图向左上方偏移\n\n`offset`修饰符让你能够基于 SwiftUI 通常放置视图的位置来定位视图。如果你希望基于原点（屏幕左上角）定位视图，那么你可能需要使用`position`修饰符。\n\
  \n与`offset`修饰符类似，`position`修饰符也需要`x`和`y`值来定义视图的中心位置。以下 Swift 代码将一个`Text`视图放置在距右侧\
  \ 225 点、距下方 126 点的位置，如图 3-16 所示：\n\n![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig16_HTML.jpg](img/329781_6_En_3_Fig16_HTML.jpg)\n\
  \n图 3-16\n\n使用位置修饰符在用户界面上放置视图\n\n```\nText (\"Top\")\n.font(.system(size: 40))\n\
  .background(Color.yellow)\n.position(x: 225, y: 127)\n```\n\n**注意**\n\n无论使用`offset`还是`position`修饰符，都要小心使用较大的`x`或`y`值。这是因为较大的值可能在大屏幕上完美定位视图，但在小屏幕上却可能使同一视图超出屏幕边缘。\n\
  \n你可以将`offset`和`position`修饰符应用于任何视图。由于堆栈也是视图，你可以在堆栈上应用`offset`和`position`修饰符，这也会自动移动堆栈内每个视图的位置。考虑以下将`offset`修饰符应用于整个`VStack`的\
  \ Swift 代码：\n\n```\nVStack {\nText (\"First\")\n.font(.system(size: 40))\n.background(Color.yellow)\n\
  Text (\"Second View\")\n.font(.system(size: 40))\n.background(Color.yellow)\n}.offset(x:\
  \ 25, y: 125)\n```\n\n上面的代码将整个`VStack`的内容（两个`Text`视图）从其正常显示位置向右下方移动，如图 3-17 所示。\n\
  \n![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig17_HTML.jpg](img/329781_6_En_3_Fig17_HTML.jpg)\n\
  \n图 3-17\n\n偏移修饰符将整个堆栈从其正常显示位置移开\n\n`offset`修饰符将整个`VStack`从其正常位置移动，而`position`修饰符则基于原点（屏幕左上角）定位`VStack`。以下\
  \ Swift 代码使用了完全相同的`x`和`y`值，但在`VStack`上使用了`position`修饰符：\n\n```\nVStack {\nText (\"\
  First\")\n.font(.system(size: 40))\n.background(Color.yellow)\nText (\"Second View\"\
  )\n.font(.system(size: 40))\n.background(Color.yellow)\n}.position(x: 25, y: 125)\n\
  ```\n\n注意，由于`position`修饰符从原点移动`VStack`，`x`值不够大，导致`VStack`的内容被屏幕截断，如图 3-18 所示。\n\n\
  ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig18_HTML.jpg](img/329781_6_En_3_Fig18_HTML.jpg)\n\
  \n图 3-18\n\n位置修饰符相对于原点放置 VStack\n\n## 总结\n\n在 SwiftUI 中设计用户界面时，视图通常居中于屏幕中央。通过使用`padding`修饰符，你可以增加视图周围的空间。`padding`修饰符可以影响视图的一个边、两个边、三个边或全部四个边。\n\
  \n当你希望将视图推开时，可以使用间隔器，它们像弹簧一样，无论屏幕实际大小如何，都能将视图推到屏幕边缘。通过使用多个间隔器，你可以将视图推得更远。你还可以定义间隔器可以收缩的最小长度，以确保它不会收缩到特定长度以下。\n\
  \n在垂直和水平堆栈内，你可以定义堆栈内所有视图之间的间距。通过使用`offset`修饰符，你可以将视图从其正常显示位置移开。通过使用`position`修饰符，你可以基于原点（即\
  \ iOS 屏幕的左上角）精确地将视图放置在屏幕上。\n\n`padding`修饰符、间隔器、堆栈内的间距以及 offset/position 修饰符使你能够安排视图在用户界面上的布局。你可以在任何视图（包括堆栈）上应用`padding`、`offset`和`position`修饰符。通过修改整个堆栈，你可以修改该堆栈内的所有视图。\n\
  \nSwiftUI 有助于创建能够适应任何尺寸 iOS 屏幕的用户界面，无论你的应用运行在小型 iPhone 屏幕还是大得多的 iPad 屏幕上。这样，你可以花更少的时间担心应用在不同\
  \ iOS 设备上的外观，而将更多时间集中在编写代码上，让你的应用实现有用且出色的功能。\n\n\n\n"
- "# 4. 文本处理\n\n每个用户界面都需要在屏幕上显示信息。虽然这些信息可以以多种形式呈现，但用户界面上一种常见的信息显示类型涉及文本。如果你想在用户界面上显示文本，就需要定义一个字符串，并让它出现在一个\
  \ `Text` 视图中，例如：\n\n```\nText(\"Hello World\")\n```\n\n为了获得更高的灵活性，你可以将字符串存储在一个变量或常量中，然后在\
  \ `Text` 视图中使用该变量或常量的名称，例如：\n\n```\nlet myString = \"展示一个字符串变量\"\nText(myString)\n\
  ```\n\n通过使用字符串变量，你可以在该变量中存储不同的字符串，使 `Text` 视图显示新的文本。为了更灵活，`Text` 视图还可以使用字符串插值来显示非字符串数据，例如：\n\
  \n```\nlet myString = 46\nText(\"这是我的年龄 = \\(myString)\")\n```\n\n一个 `Text` 视图可以显示任意长度的字符串。然而，显示的字符串长度可能会因应用程序运行时的屏幕尺寸而异，例如较大的\
  \ iPad 屏幕或较小的 iPhone 屏幕。为了自定义字符串的显示方式，SwiftUI 允许你定义以下内容：\n\n- **行数限制** – 定义 `Text`\
  \ 视图可以显示的最大行数，例如两行或四行。\n- **截断方式** – 定义当无法显示整个字符串时如何进行截断或裁切。\n\n行数限制修改器允许你定义要显示的最大行数。如果你未指定行数限制值，SwiftUI\
  \ 将尽可能多地显示行数。要定义行数限制，请在 Swift 代码中添加一个 `lineLimit` 修改器，如下所示：\n\n```\nText(\"这是我的年龄\
  \ \\(myString)。由于我已经退休，现在有资格领取养老金和社会保障金，因此我可以在余生中放松身心、享受生活，而无需再为收入而工作。\")\n.lineLimit(2)\n\
  ```\n\n图 4-1 展示了两个相同的 `Text` 视图，但顶部的 `Text` 视图没有行数限制。因此，它显示了全部文本。底部的 `Text` 视图限制为两行，因此它只显示前两行文本。\n\
  \n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig1_HTML.jpg](img/329781_6_En_4_Fig1_HTML.jpg)\n\
  \n**图 4-1** – `lineLimit` 修改器可能会截断部分文本。\n\n除了键入 Swift 代码来定义行数限制，你还可以单击 `Text` 视图并打开检查器。然后你可以在检查器窗格中定义行数限制，如图\
  \ 4-2 所示。\n\n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig2_HTML.jpg](img/329781_6_En_4_Fig2_HTML.jpg)\n\
  \n**图 4-2** – 在检查器窗格中定义行数限制。\n\n如果你定义了行数限制（例如两行），而文本超过该限制（例如显示三行或更多行），SwiftUI 就会裁切或截断文本。SwiftUI\
  \ 提供了三种在超出行数限制时截断文本的方式，如图 4-3 所示：\n\n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig3_HTML.jpg](img/329781_6_En_4_Fig3_HTML.jpg)\n\
  \n**图 4-3** – 超出行数限制时截断文本的三种不同方式。\n\n- `.head` – 截断最后一行的开头部分。\n- `.middle` – 截断最后一行的中间部分。\n\
  - `.tail` – 截断最后一行的末尾部分。\n\n默认情况下，SwiftUI 在行尾（Tail）截断文本，但你可以在 `Text` 视图上通过将 `truncationMode`\
  \ 修改器与 `lineLimit` 修改器配合使用来定义开头或中间截断选项，例如：\n\n```\n.truncationMode(.middle)\n```\n\
  \n如果你将光标移入 `Text` 视图，然后单击检查器窗格底部的“添加修改器”按钮，便可以将“截断模式”修改器添加到检查器窗格中。然后你可以在检查器窗格中定义截断选项，如图\
  \ 4-4 所示。\n\n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig4_HTML.jpg](img/329781_6_En_4_Fig4_HTML.jpg)\n\
  \n**图 4-4** – 在检查器窗格中定义截断选项。\n\n\n\n## 更改文本外观\n\n`Text` 视图通常显示纯文本。为了美化文本外观，SwiftUI\
  \ 允许你通过在 Swift 代码中键入修饰符或通过检查器面板来定义字体大小、字重和颜色。字体大小选项包括特定的文本样式，这些样式可以自动适应 iPhone 或\
  \ iPad 上定义的任何辅助功能设置。可用的字体大小选项如图 4-5 所示：\n\n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig5_HTML.jpg](img/329781_6_En_4_Fig5_HTML.jpg)\n\
  \n图 4-5\n\n用于显示文本的不同字体大小\n\n- 大标题\n- 标题\n- 标题 2\n- 标题 3\n- 标题行\n- 副标题行\n- 正文\n-\
  \ 标注\n- 脚注\n- 说明\n- 说明 2\n\n如果你想为 `Text` 视图选择特定字体，可以通过自定义字体修饰符来实现，如下所示：\n\n```\n\
  .font(.custom(\"Courier\", size: 36))\n```\n\n在上述代码中，你定义了字体系列，后跟字体大小。请记住，Xcode 可能不支持所有字体。如果你只想定义自定义字体大小，可以省略字体名称，例如：\n\
  \n```\n.font(.custom(\"\", size: 36))\n```\n\n注意\n\n当你定义自定义字体和字体大小时，`Text` 视图将不会根据用户的\
  \ iOS 设置自动调整文本大小。因此，除非你确实需要，否则最好避免使用自定义字体。\n\n除了字体大小，你还可以选择字重，它定义了文本显示的粗细程度。字重选项包括以下内容，如图\
  \ 4-6 所示：\n\n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig6_HTML.jpg](img/329781_6_En_4_Fig6_HTML.jpg)\n\
  \n图 4-6\n\n用于显示文本的不同字重\n\n- 超级粗体\n- 半粗体\n- 粗体\n- 常规\n- 细体\n- 黑色\n- 中等\n- 轻细\n- 极细\n\
  \n修改文本外观的第三种方法是为文本选择颜色。你可以在 Swift 代码中键入颜色修饰符，或者在检查器面板中选择颜色，如图 4-7 所示。\n\n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig7_HTML.jpg](img/329781_6_En_4_Fig7_HTML.jpg)\n\
  \n图 4-7\n\n定义文本的颜色\n\n使用颜色时，你可以选择标准颜色选项，例如绿色、蓝色或黄色。如果你不想使用标准颜色，还可以选择“自定”，它允许你定义不同的颜色值以及不透明度值（范围从\
  \ 0（不可见）到 1（完全可见））。当你选择“自定”颜色选项时，会弹出一个颜色对话框，供你选择非标准颜色，如图 4-8 所示。\n\n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig8_HTML.jpg](img/329781_6_En_4_Fig8_HTML.jpg)\n\
  \n图 4-8\n\n为文本定义自定义颜色\n\n像文字处理软件一样，SwiftUI 也允许你将文本修改为斜体、粗体、下划线或删除线。要将这些效果添加到文本中，你可以键入以下命令：\n\
  \n```\n.bold()\n.italic()\n.underline()\n.strikethrough()\n```\n\n除了键入这些修饰符，你还可以单击检查器面板中的“添加修饰符”弹出菜单，如图\
  \ 4-9 所示。\n\n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig9_HTML.jpg](img/329781_6_En_4_Fig9_HTML.jpg)\n\
  \n图 4-9\n\n为文本添加粗体、斜体、下划线或删除线\n\n修改文本的另一种方法是定义其对齐方式。三种对齐方式如图 4-10 所示：\n\n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig10_HTML.jpg](img/329781_6_En_4_Fig10_HTML.jpg)\n\
  \n图 4-10\n\n三种文本对齐方式\n\n- 前导 – 文本向左边缘对齐。\n- 居中 – 每行文本在左右边缘之间居中显示。\n- 尾随 – 文本向右边缘对齐。\n\
  \n你可以通过使用 `.multilineTextAlignment` 修饰符，或者在属性检查器中选择文本对齐选项来定义文本对齐，如图 4-11 所示。\n\n\
  ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig11_HTML.jpg](img/329781_6_En_4_Fig11_HTML.jpg)\n\
  \n图 4-11\n\n在检查器面板中对齐文本\n\n\n\n## 使用标签视图\n\n标签视图与文本视图类似。文本视图仅显示单一文本字符串，而标签视图可以并排显示文本和图像，如图\
  \ 4-12 所示。\n\n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig12_HTML.jpg](img/329781_6_En_4_Fig12_HTML.jpg)\n\
  \n图 4-12 标签视图可以同时显示图像和文本\n\n这些图像可以是添加到 Xcode 项目 `Assets` 文件夹中的任意图像，也可以是苹果免费 SF Symbols\
  \ 应用 ([`https://developer.apple.com/sf-symbols/`](https://developer.apple.com/sf-symbols/))\
  \ 中可查看的任意图像，该应用显示了所有可用的系统图像，如图 4-13 所示。\n\n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig13_HTML.jpg](img/329781_6_En_4_Fig13_HTML.jpg)\n\
  \n图 4-13 SF Symbols 应用显示了可包含在 Xcode 项目中的图标\n\n使用 SF Symbol 图标时，无需将其添加到 Xcode 项目。如果想使用自己的图像，则需要将其拖拽到\
  \ `Assets` 文件夹中，如图 4-14 所示。\n\n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig14_HTML.jpg](img/329781_6_En_4_Fig14_HTML.jpg)\n\
  \n图 4-14 可以将图像拖拽到 Xcode 项目的 `Assets` 文件夹中\n\n如果要在标签视图中显示 SF Symbol 图标，可以使用以下代码：\n\
  \n```\nLabel(\"文本\", systemImage: \"此处填写 SF Symbol 图像名称\")\n```\n\n文本可以是任意字符串或字符串变量，而\
  \ SF Symbol 名称必须完全包含在双引号内，例如 `\"creditcard\"` 或 `\"banknote.fill\"`。请确保完全按照 SF Symbols\
  \ 应用中显示的图标名称来输入。你也可以在 SF Symbols 应用中右键点击任意图标，在弹出的菜单中选择“复制名称”，如图 4-15 所示，然后将此名称粘贴到标签视图中。\n\
  \n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig15_HTML.jpg](img/329781_6_En_4_Fig15_HTML.jpg)\n\
  \n图 4-15 右键点击图标可在 SF Symbols 应用中复制其名称\n\n如果要显示存储在 Xcode 项目 `Assets` 文件夹中的图像，可以使用以下代码：\n\
  \n```\nLabel(\"文本\", image: \"此处填写图像名称\")\n```\n\n文本可以是任意字符串或字符串变量，而图像名称必须与 `Assets`\
  \ 文件夹中的图像文件名完全一致，但不包含文件扩展名。\n\n**注意：** 你可能希望在将图像添加到 Xcode 项目的 `Assets` 文件夹之前先调整其大小。否则，如果图像过大，标签视图将以原始尺寸显示该图像，这可能会比你期望的大得多。\n\
  \n定义标签视图最简单的方式是定义一个 `systemImage` 或普通图像，如下所示：\n\n```\nLabel(\"文本\", systemImage:\
  \ \"此处填写 SF Symbol 图像名称\")\nLabel(\"文本\", image: \"此处填写图像名称\")\n```\n\n然而，如果你想自定义文本和/或图像的外观，可以改用以下代码创建标签视图：\n\
  \n```\nLabel {\n    Text(\"备选标签定义\")\n} icon: {\n    Image(systemName: \"此处填写 SF\
  \ Symbol 图像名称\")\n}\n```\n\n或者\n\n```\nLabel {\n    Text(\"备选标签定义\")\n} icon: {\n\
  \    Image(\"此处填写图像名称\")\n}\n```\n\n**注意：** 使用 SF Symbol 图标时，必须定义 `systemName:`\
  \ 参数；但使用 `Assets` 文件夹中的图像时，只需定义图像名称，无需任何参数。\n\n当使用 `Text` 和 `Image` 视图定义标签视图时，可以分别自定义每个元素，例如为文本选择字体和为图像设置透明度，如下所示：\n\
  \n```\nLabel {\n    Text(\"修饰符\")\n        .font(.title)\n} icon: {\n    Image(\"\
  旗帜\")\n        .opacity(0.25)\n}\n```\n\n上述代码中，标签使用 `.title` 字体显示文本，并以 0.25 的透明度显示旗帜图像，如图\
  \ 4-16 所示。\n\n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig16_HTML.jpg](img/329781_6_En_4_Fig16_HTML.jpg)\n\
  \n图 4-16 在标签视图中修改文本和图像\n\n创建标签视图时，你有三个选项，如图 4-17 所示：\n\n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig17_HTML.jpg](img/329781_6_En_4_Fig17_HTML.jpg)\n\
  \n图 4-17 标签视图显示信息的三种不同方式\n\n- 文本和图标（默认）\n- 仅文本\n- 仅图标\n\n### 为文本或标签视图添加边框\n\n要突出显示文本视图和标签视图，可以在其周围添加边框。边框可以由颜色和宽度组成，例如：\n\
  \n```\n.border(Color.red, width: 3)\n```\n\n当对文本或标签视图使用 `.border` 修饰符时，边框会紧密包裹内部的文本，如图\
  \ 4-18 所示。\n\n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig18_HTML.jpg](img/329781_6_En_4_Fig18_HTML.jpg)\n\
  \n图 4-18 边框紧密包裹文本或标签视图内部的文本\n\n如果你不希望边框包裹得太紧，可以首先在文本或标签视图周围添加内边距，然后再应用 `.border`\
  \ 修饰符，如图 4-19 所示。\n\n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig19_HTML.jpg](img/329781_6_En_4_Fig19_HTML.jpg)\n\
  \n图 4-19 内边距修饰符可以为文本或标签视图周围的边框添加空间\n\n**注意：** 请确保在 `.border` 修饰符之前应用 `.padding`\
  \ 修饰符。否则，如果 `.border` 修饰符出现在前面，SwiftUI 将先绘制边框，再在文本或标签视图周围应用内边距。\n\n## 总结\n\n文本视图便于在用户界面上显示任何类型的文本信息。即使需要显示数字、日期或其他数据类型，你也可以使用字符串插值在文本视图中显示数据。标签视图与文本视图类似。\n\
  \n文本视图仅显示文本，而标签视图可以并排显示图像和文本。标签视图可以显示 SF Symbols 应用中列出的图标，或你添加到 Xcode 项目 `Assets`\
  \ 文件夹中的任何图像。通过对标签视图应用不同的样式，你可以显示文本和图标、仅文本或仅图标。通过使用文本视图或标签视图，你的应用可以在用户界面上显示信息供用户查看。\n\
  \n"
- '# 5. 使用图像


  大多数用户界面由文本组成，但仅靠文本可能显得单调。这就是为什么屏幕上第二常见的显示信息类型是图像。图像可以纯粹用于装饰目的，也可以帮助用户在用户界面中进行导航。


  最常见的显示图像类型是图标。SF Symbols 应用 ([`https://developer.apple.com/sf-symbols/`](https://developer.apple.com/sf-symbols/))
  列出了所有可以包含在应用用户界面中的可用图标。除了这些图标，你还可以包含拖拽到 Xcode 项目 `Assets` 文件夹中的任何图像。此外，你还可以包含常见的形状，如矩形或圆形，这些形状可以显示在屏幕上。


  图像允许你通过在屏幕上显示彩色或信息丰富的图形来美化任何用户界面的外观。每当你创建用户界面时，请思考如何添加图形图像，以使你的用户界面在视觉上更吸引用户。




  ## 显示形状


  用户界面中最简单的图像就是常见的几何形状。几何形状可以单独使用，也可以放在其他类型视图（例如`Text`视图）后面的背景中，用于装饰目的。图 5-1 展示了五种常见的几何形状：


  ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig1_HTML.jpg](img/329781_6_En_5_Fig1_HTML.jpg)


  图 5-1


  SwiftUI 中可用的五种不同类型的几何形状


  *   `Capsule`（胶囊形）

  *   `Circle`（圆形）

  *   `Ellipse`（椭圆形）

  *   `Rectangle`（矩形）

  *   `RoundedRectangle(cornerRadius: x)`（圆角矩形）


  要创建这些几何形状中的任何一种，只需声明所需形状的名称，例如 `Circle()`。唯一的例外是圆角矩形，它需要一个圆角半径值来定义角的弯曲程度。值越低，角看起来越锐利，圆角半径为
  0 时会创建一个像普通矩形一样的 90 度角。圆角半径值越高，圆角矩形就越像一个胶囊形。


  ### 为形状着色


  由于每个几何形状的默认颜色都是黑色，你可能希望为你的形状选择不同的颜色。要为形状添加颜色，你可以使用 `fill` 修改器，如下所示：


  ```

  Capsule()

  .fill(Color.yellow)

  ```


  如果你不喜欢使用任何标准颜色（`green`、`red`、`yellow`、`blue` 等），你也可以通过定义红、绿、蓝值或者色相、饱和度、亮度值来自定义颜色，如下所示：


  ```

  Circle()

  .fill(Color(red: 1.0, green: 0.0, blue: 0.0, opacity: 1.0))

  ```


  或者


  ```

  Ellipse()

  .fill(Color(hue: 1.7, saturation: 2.9, brightness: 0.58))

  ```


  ### 使用渐变给形状着色


  另一种添加颜色的方法是使用渐变，它以不同的方式扩散两种或多种颜色。SwiftUI 提供了三种可用的渐变类型，如图 5-2 所示：


  ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig2_HTML.jpg](img/329781_6_En_5_Fig2_HTML.jpg)


  图 5-2


  三种可用的渐变类型


  *   线性渐变

  *   径向渐变

  *   角度渐变


  线性渐变需要定义两种或多种颜色，以及一个起点和一个终点。颜色存储在中括号内，起点和终点可以定义以下位置之一，如图 5-3 所示：


  ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig3_HTML.jpg](img/329781_6_En_5_Fig3_HTML.jpg)


  图 5-3


  线性渐变不同起点/终点的位置


  *   `bottom`（底部）

  *   `bottomLeading`（底部左侧）

  *   `bottomTrailing`（底部右侧）

  *   `center`（中心）

  *   `leading`（左侧）

  *   `top`（顶部）

  *   `topLeading`（顶部左侧）

  *   `topTrailing`（顶部右侧）

  *   `trailing`（右侧）

  *   `zero`（零点）


  要创建线性渐变，只需像这样定义两种或多种颜色以及一个起点和终点：


  ```

  Capsule()

  .fill(LinearGradient(gradient: Gradient(colors: [.blue, .green, .pink]), startPoint:
  .topLeading, endPoint: .bottomTrailing))

  ```


  径向渐变在由 `center` 参数（例如 `.center` 或 `.top`）指定的特定位置绘制一个圆形颜色。如果你选择诸如 `.top` 这样的值，那么渐变中心将从形状的顶部中心开始，如图
  5-4 所示。


  ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig4_HTML.jpg](img/329781_6_En_5_Fig4_HTML.jpg)


  图 5-4


  `center` 参数定义了径向渐变中心开始的位置


  第一种颜色的大小由 `startRadius` 定义。`startRadius` 值越小，第一种颜色的半径就越小。`endRadius` 值与 `startRadius`
  值相比越大，颜色之间的融合就越扩散。`endRadius` 值与 `startRadius` 值相比越小，颜色之间的边界就越清晰，如图 5-5 所示。


  ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig5_HTML.jpg](img/329781_6_En_5_Fig5_HTML.jpg)


  图 5-5


  比较径向渐变中的 `startRadius` 和 `endRadius` 值


  要创建径向渐变，定义两种或多种颜色，指定渐变中心的位置（例如 `.center` 或 `.topLeading`），以及 `startRadius` 和 `endRadius`，如下所示：


  ```

  Ellipse()

  .fill(RadialGradient(gradient: Gradient(colors: [.blue, .yellow]), center: .top,
  startRadius: 10, endRadius: 65))

  ```


  虽然线性渐变和径向渐变只用两种颜色就能很好地工作，但角度渐变在颜色数量更多时效果最佳。如果你只为角度渐变定义两种颜色，SwiftUI 会将这两种颜色并排显示，然后在它们逐渐融合的地方形成过渡，如图
  5-6 所示。


  ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig6_HTML.jpg](img/329781_6_En_5_Fig6_HTML.jpg)


  图 5-6


  仅显示两种不同颜色的角度渐变


  在角度渐变中定义的颜色越多，它们就能更好地混合在一起。除了定义多种颜色，你只需要定义角度渐变的中心，例如 `.center` 或 `.bottomTrailing`。要创建角度渐变，定义多种颜色或重复多次相同的颜色（如图
  5-7 所示）以及中心位置：


  ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig7_HTML.jpg](img/329781_6_En_5_Fig7_HTML.jpg)


  图 5-7


  多次显示相同颜色的角度渐变


  ```

  Rectangle()

  .fill(AngularGradient(gradient: Gradient(colors: [.green, .blue, .black, .green,
  .blue, .black, .green]), center: .center))

  ```




  ## 显示图像


  与 `Text` 视图在用户界面上显示文本类似，`Image` 视图用于在用户界面上显示图标和图形文件。如果你想显示 SF Symbols 应用中存储的图标，可以使用如下
  Swift 代码：


  ```swift

  Image(systemName: "hare.fill")

  ```


  当要显示 SF Symbol 图标时，必须使用 `systemName` 参数。由于图标较小，你可能需要放大它们。最简单的放大方式是定义更大的字体，例如 `.largeTitle`
  或 `.custom`，如图 5-8 所示。


  ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig8_HTML.jpg](img/329781_6_En_5_Fig8_HTML.jpg)


  **图 5-8** – 通过更改字体大小来修改 SF Symbol 图标的大小


  要显示图像，首先需要将其拖放到 Assets 文件夹中。然后，要显示 Assets 文件夹中存储的图像，可以使用 `Image` 视图并指定图像名称，如下所示：


  ```swift

  Image("flag")

  ```


  图像的尺寸可以任意，但如果图像太大或太小，`Image` 视图会以其原始尺寸显示。由于你可能需要调整图像大小以适应用户界面，因此需要在 `Image` 视图上使用以下三个修饰符：


  - `.resizable()`

  - `.aspectRatio(contentMode: z)`

  - `.frame(width: x, height: y)`


  `.resizable()` 修饰符允许 `Image` 视图更改显示图像的大小。如果 `Image` 视图缺少此 `.resizable()` 修饰符，那么无论
  `Image` 视图的尺寸如何，图像都将保持其原始大小。


  `.frame(width: x, height: y)` 修饰符用于定义 `Image` 视图的大小。当与 `.resizable()` 修饰符一起使用时，`.frame`
  修饰符允许你定义图像的固定宽度和高度。


  由于拉伸 `Image` 视图的宽度和高度可能会使内部显示的图像变形，`.aspectRatio` 修饰符允许你定义图像应如何反应。`.fill` 选项将图像扩展到由
  `.frame` 修饰符定义的最大宽度或高度。`.fit` 选项将图像缩小到由 `.frame` 修饰符定义的最小宽度或高度，如图 5-9 所示。


  ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig9_HTML.jpg](img/329781_6_En_5_Fig9_HTML.jpg)


  **图 5-9** – 在图像上使用 `.fill` 和 `.fit` 宽高比


  如果你想要进一步细化宽高比，可以包含一个宽高比值，例如：


  ```swift

  Image("flag")

  .resizable()

  .frame(width: 150, height: 150)

  .aspectRatio(0.5, contentMode: .fill)

  ```


  此宽高比定义了宽度与高度的比例，因此值 `0.5` 表示宽度与高度比为 1:2，而值 `0.75` 则表示 3:4 的宽度与高度比。


  ### 裁剪图像


  `Image` 视图可以显示他人绘制的剪贴画图像，也可以显示用数码相机拍摄的照片。通常，`Image` 视图会在 `.frame` 修饰符定义的矩形内显示任何图片。但是，为了创造更独特的视觉效果，你可以通过使用
  `.clipShape` 修饰符将图像覆盖在几何形状上来裁剪图像。


  `.clipShape` 修饰符接受任何常见的几何形状，例如：


  ```swift

  .clipShape(Circle())

  ```


  当使用其他几何形状（如 `Ellipse()` 或 `Capsule()`）时，请确保框架宽度足够宽。如果框架的宽度和高度相同，那么 `Ellipse()` 和
  `Capsule()` 形状看起来就像 `Circle()`。图 5-10 展示了 `.clipShape(Circle())` 修饰符如何改变通常显示为矩形图像的图像外观。


  ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig10_HTML.jpg](img/329781_6_En_5_Fig10_HTML.jpg)


  **图 5-10** – 使用 `.clipShape()` 修饰符


  ### 为图像添加阴影


  另一种突出 `Image` 视图外观的方法是使用 `.shadow` 修饰符，它可以在视图周围添加阴影。你可以通过定义其半径来调整阴影在视图周围出现的程度，例如：


  ```swift

  .shadow(color: .red, radius: 46, x: 0, y: 0)

  ```


  `.shadow` 修饰符需要以下参数：


  - `Color` – 定义阴影的颜色。

  - `Radius` – 定义阴影在视图周围的大小。

  - `X` – 定义阴影的 x（水平）偏移量；值为 `0` 时，阴影在水平方向上围绕视图居中。

  - `Y` – 定义阴影的 y（垂直）偏移量；值为 `0` 时，阴影在垂直方向上围绕视图居中。


  如果 `x` 和 `y` 值非零，则阴影会偏离 `Image` 视图。如果 `x` 和 `y` 值都为 `0`，则阴影会均匀出现在 `Image` 视图的所有四个边缘周围，如图
  5-11 所示。


  ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig11_HTML.jpg](img/329781_6_En_5_Fig11_HTML.jpg)


  **图 5-11** – 使用不同的 `x` 和 `y` 值为 `Image` 视图添加阴影


  ### 为图像添加边框


  为了进一步突出 `Image` 视图，你可以使用 `.overlay` 修饰符在其周围添加边框，如下所示：


  ```swift

  .overlay(Rectangle().stroke(Color.blue, lineWidth: 10))

  ```


  `.overlay` 修饰符需要以下参数：


  - `Shape` – 定义边框的形状以匹配 `Image` 视图的形状

  - `Color` – 定义边框的颜色

  - `lineWidth` – 定义 `Image` 视图周围边框线的粗细


  图 5-12 展示了使用不同形状、颜色和线宽的 `.overlay` 修饰符的两种用法。


  ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig12_HTML.jpg](img/329781_6_En_5_Fig12_HTML.jpg)


  **图 5-12** – 为 `.overlay` 修饰符使用不同的值


  ### 定义图像的不透明度


  修改图像外观的另一种方法是定义其不透明度。不透明度为 `0` 意味着图像不可见。不透明度为 `1` 意味着图像完全不改变地显示。不透明度越接近 `0`，图像越模糊。不透明度越接近
  `1`，图像越清晰。


  要使用不透明度修饰符，只需像这样定义一个介于 `0` 到 `1` 之间的不透明度值：


  ```swift

  .opacity(0.75)

  ```


  图 5-13 展示了不同的不透明度值如何修改图像的外观。


  ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig13_HTML.jpg](img/329781_6_En_5_Fig13_HTML.jpg)


  **图 5-13** – 为 `.opacity` 修饰符使用不同的值


  ## 总结


  图像提供了在用户界面上呈现信息的另一种方式。图像可以是常见的几何形状（如圆形、椭圆和圆角矩形）、可以在 SF Symbols 应用中找到的图标，也可以是拖放到
  Xcode 项目 Assets 文件夹中的图形图像或数码照片。


  如果你正在创建几何形状，可以使用纯色、自定义颜色或渐变填充它们，以创建多颜色混合的视觉效果。如果你正在使用 SF Symbol 图标，可以使用 `.font`
  修饰符调整其大小。如果你正在使用 Xcode 项目 Assets 文件夹中存储的图像，可以将 `.resizable`、`.frame` 和 `.aspectRatio`
  修饰符结合使用，以定义图像的大小和外观。


  要创造额外的视觉效果，你可以将图像裁剪成几何形状（如圆形）、为图像添加边框、为图像添加阴影以及修改不透明度。有如此多调整图像外观的方法，你应该能够定义图像，使其在用户界面上完全按照你期望的方式显示。




