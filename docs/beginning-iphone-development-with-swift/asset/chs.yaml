  )\n    .resizable()\n    .frame(width: 150, height: 150)\n    .clipShape(Circle())\n\
  \    .overlay(Circle().stroke(Color.yellow, lineWidth: 4))\n    }\n    }\n    }\n\
  \    }\n    struct ContentView_Previews: PreviewProvider {\n    static var previews:\
  \ some View {\n    ContentView()\n    }\n    }\n    ```\n\n10. 单击画布窗格中的“实时预览”图标。\n\
  \n11. 单击任意按钮。请注意，每次单击按钮时，它都会切换 `colorMe` 布尔变量，从而在矩形中交替显示绿色或灰色。\n\n## 使用分段控件\n\n\
  `Button` 代表单个命令，因此如果要向用户提供多个命令之间的选择，则需要使用多个 `Button`。不幸的是，多个 `Button` 可能会挤占用户界面空间，使用起来很不方便。为了解决这个问题，SwiftUI\
  \ 提供了分段控件。\n\n分段控件的主要思想是在紧凑的空间中显示两个或更多选项，而不是使用多个 `Button`。要创建分段控件，您需要以下内容：\n\n*\
  \   一个 `@State` 变量，用于表示用户选择的段（选项）\n*   一个列出两个或更多选项的 `Picker` 视图\n*   链接到每个选项的 `.tag`\
  \ 属性\n*   `SegmentedPickerStyle` 修饰符\n\n要了解如何使用分段控件，请按照以下步骤操作：\n\n![../images/329781_6_En_6_Chapter/329781_6_En_6_Fig2_HTML.jpg](img/329781_6_En_6_Fig2_HTML.jpg)\n\
  \n**图 6-2** 分段控件的完整用户界面\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其指定任意名称，例如“SegmentedControl”。\n\
  \n2.  在导航器窗格中单击 `ContentView` 文件。\n\n3.  在 `struct ContentView: View` 行下方添加一个 `@State`\
  \ 变量，如下所示：\n\n```\n    struct ContentView: View {\n    @State private var selectedColor\
  \ = Color.gray\n    var body: some View {\n    ```\n\n这将创建一个名为 `selectedColor` 的\
  \ `@State` 变量。请注意，“private”关键字是可选的，仅表示此变量只能在此 `ContentView` 结构中使用。注意，此 `selectedColor`\
  \ 变量的初始值是 `Color.gray`，这意味着其推断数据类型为 `Color`。\n\n4.  在 `var body: some View` 内部创建一个间距值为\
  \ 28 的 `VStack`，如下所示：\n\n```\n    struct ContentView: View {\n    @State private\
  \ var selectedColor = Color.gray\n    var body: some View {\n    VStack (spacing:\
  \ 28) {\n    }\n    }\n    }\n    ```\n\n间距值可以是您想要的任何数字，但它会在您添加到 `VStack` 内部的任何视图之间添加间距，这样它们在用户界面上就不会显得拥挤。\n\
  \n5.  输入以下内容在 `VStack` 内部创建一个彩色矩形：\n\n```\n    Rectangle()\n    .fill(selectedColor)\n\
  ```\n\n这将创建一个矩形，其颜色由 `selectedColor` `@State` 变量定义。最初，此矩形填充为 `Color.gray`。\n\n6.\
  \  输入以下内容在 `VStack` 内部创建一个分段控件：\n\n```\n    Picker(\"最喜欢的颜色\", selection: $selectedColor,\
  \ content: {\n    Text(\"红色\").tag(Color.red)\n    Text(\"绿色\").tag(Color.green)\n\
  \    Text(\"蓝色\").tag(Color.blue)\n    }).pickerStyle(SegmentedPickerStyle())\n\
  \    ```\n\n这将创建一个 `Picker` 视图，该视图在分段控件上列出三个选项（“红色”、“绿色”和“蓝色”）。每个选项后面都有一个链接到该选项的\
  \ `.tag`。虽然用户看到的是由三个 `Text` 视图（“红色”、“绿色”和“蓝色”）显示的选项，但 `selectedColor` `@State` 变量实际存储的是\
  \ `.tag` 值，即颜色类型（`.red`、`.green` 和 `.blue`）。`.pickerStyle` 修饰符通过定义 `SegmentedPickerStyle()`\
  \ 将 `Picker` 视图显示为分段控件。\n\n整个 SwiftUI 代码应如下所示：\n\n```\n    import SwiftUI\n    struct\
  \ ContentView: View {\n    @State private var selectedColor = Color.gray\n    var\
  \ body: some View {\n    VStack (spacing: 28) {\n    Rectangle()\n    .fill(selectedColor)\n\
  \    Picker(\"最喜欢的颜色\", selection: $selectedColor, content: {\n    Text(\"红色\").tag(Color.red)\n\
  \    Text(\"绿色\").tag(Color.green)\n    Text(\"蓝色\").tag(Color.blue)\n    }).pickerStyle(SegmentedPickerStyle())\n\
  \    }\n    }\n    }\n    struct ContentView_Previews: PreviewProvider {\n    static\
  \ var previews: some View {\n    ContentView()\n    }\n    }\n    ```\n\n7.  单击画布窗格中的“实时预览”图标。\n\
  \n\n\n8.  点击分段控件上的“红色”、“绿色”和“蓝色”选项。每次你从分段控件中选择不同的选项时，`selectedColor` 状态变量都会发生变化。随后，这个状态变量会自动更改矩形的颜色，如图\
  \ 6-2 所示。\n\n**注意**\n\n如果省略了 `.pickerStyle(SegmentedPickerStyle())` 修饰符，`Picker`\
  \ 视图将以转轮形式垂直显示这三个选项（“红色”、“绿色”和“蓝色”），如图 6-3 所示。\n\n![../images/329781_6_En_6_Chapter/329781_6_En_6_Fig3_HTML.jpg](img/329781_6_En_6_Fig3_HTML.jpg)\n\
  \n*图 6-3* 未使用 `.pickerStyle(SegmentedPickerStyle())` 修饰符时的 `Picker` 视图外观\n\n###\
  \ 从分段控件运行代码\n\n仅仅通过选择分段控件上的选项，分段控件只能更改一个状态变量。如果你想根据用户在分段控件中选择的选项来运行代码，则需要添加一个 `.onChange`\
  \ 修饰符，如下所示：\n\n```\n.onChange(of: stateVariable) { newValue in\n// 要运行的代码\n}\n```\n\
  \n每当用户选择分段控件中的不同选项时，它就会更改一个状态变量。`.onChange` 修饰符会在每次该状态变量发生变化时运行代码。`newValue` 变量包含了最新的更改值，然后即可据此运行代码。要了解其工作原理，请按照以下步骤操作：\n\
  \n![../images/329781_6_En_6_Chapter/329781_6_En_6_Fig4_HTML.jpg](img/329781_6_En_6_Fig4_HTML.jpg)\n\
  \n*图 6-4* `.onChange` 修饰符可以在 `Text` 视图中显示不同的文本\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其命名任意你喜欢的名称，例如“SegmentedControl\
  \ Code”。\n2.  在导航器窗格中点击 `ContentView` 文件。\n3.  在 `struct ContentView: View` 代码行下方添加一个状态变量，如下所示：\n\
  \n```\n    struct ContentView: View {\n    @State private var message = \"\"\n \
  \   var body: some View {\n    ```\n\n这将创建一个名为 `message` 的状态变量。请注意，`private` 关键字是可选的，它仅表示该变量只能在此\
  \ `ContentView` 结构体内部使用。其初始值为一个空字符串，因此其数据类型被推断为 `String`。\n\n4.  在 `var body: some\
  \ View` 内部创建一个间距值为 28 的 `VStack`，如下所示：\n\n```\n    struct ContentView: View {\n\
  \    @State private var message = \"\"\n    var body: some View {\n    VStack (spacing:\
  \ 28) {\n    }\n    }\n    }\n    ```\n\n间距值可以是任意你想要的数字，它会在 `VStack` 内部添加的任意视图之间增加间距，以防止它们在用户界面上显得拥挤。\n\
  \n5.  输入以下代码，在 `VStack` 内部创建一个 `Text` 视图：\n\n```\n    Text(message)\n    ```\n\n\
  这将创建一个显示 `message` 状态变量内容的 `Text` 视图。\n\n6.  输入以下代码，在 `VStack` 内部创建一个分段控件：\n\n```\n\
  \    Picker(\"\", selection: $message, content: {\n    Text(\"Happy\").tag(\"happy\"\
  )\n    Text(\"Sad\").tag(\"sad\")\n    Text(\"Bored\").tag(\"bored\")\n    }).pickerStyle(SegmentedPickerStyle())\n\
  \    ```\n\n这将创建一个显示三个选项（“Happy”、“Sad”和“Bored”）的 `Picker` 视图，选项显示在分段控件上。每个选项后面都有一个与之关联的\
  \ `.tag`。虽然用户看到的是由三个 `Text` 视图显示的选项，但 `message` 状态变量实际存储的是 `.tag` 值，这些值是字符串（`“happy”`、`“sad”`、`“bored”`）。`.pickerStyle`\
  \ 修饰符通过定义 `SegmentedPickerStyle()` 将 `Picker` 视图显示为分段控件。\n\n7.  在 `.pickerStyle`\
  \ 修饰符之后输入以下代码：\n\n```\n    .onChange(of: message) { newValue in\n    switch newValue\
  \ {\n    case \"happy\": message = \"Be happy and joyous\"\n    case \"sad\": message\
  \ = \"Life can be a struggle at times\"\n    case \"bored\": message = \"Look for\
  \ your purpose\"\n    default:\n    break\n    }\n    }\n    ```\n\n当检测到 `message`\
  \ 状态变量发生变化时（即用户选择了分段控件上的不同选项），`.onChange` 修饰符就会运行代码。当用户选择不同选项时，`newValue` 变量会存储该选中的选项（例如\
  \ `.tag(\"happy\")`）。\n\n根据 `newValue` 的值，`switch` 语句决定将哪个文本存储到 `message` 状态变量中。一旦\
  \ `message` 状态变量获得新值，它就会立即显示在 `Text` 视图中。\n\n完整的 SwiftUI 代码应该如下所示：\n\n```\n    import\
  \ SwiftUI\n    struct ContentView: View {\n    @State private var message = \"\"\
  \n    var body: some View {\n    VStack (spacing: 28) {\n    Text(message)\n   \
  \ Picker(\"\", selection: $message, content: {\n    Text(\"Happy\").tag(\"happy\"\
  )\n    Text(\"Sad\").tag(\"sad\")\n    Text(\"Bored\").tag(\"bored\")\n    }).pickerStyle(SegmentedPickerStyle())\n\
  \    .onChange(of: message) { newValue in\n    switch newValue {\n    case \"happy\"\
  : message = \"Be happy and joyous\"\n    case \"sad\": message = \"Life can be a\
  \ struggle at times\"\n    case \"bored\": message = \"Look for your purpose\"\n\
  \    default:\n    break\n    }\n    }\n    }\n    }\n    }\n    struct ContentView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n \
  \   }\n    }\n    ```\n\n8.  点击 Canvas 窗格中的实时预览图标。\n9.  点击分段控件上的“Happy”、“Sad”和“Bored”选项。每次你从分段控件中选择不同的选项时，`message`\
  \ 状态变量都会发生变化。然后，`.onChange` 修饰符会运行代码来更改 `message` 状态变量。这个新的文本随后会出现在 `Text` 视图中，如图\
  \ 6-4 所示。\n\n通过将 `.onChange` 修饰符与分段控件结合使用，当用户在分段控件上选择不同选项时，你可以运行任何你想要的 Swift 代码。\n\
  \n## 总结\n\n按钮是让用户向程序发出命令的最简单方式。在最简单的层面，一个 `Button` 由文本和每次用户选中该 `Button` 时要运行的一段代码列表组成。要自定义一个\
  \ `Button`，你可以使用带有修饰符的 `Text` 视图或 `Label` 视图，或者使用可以显示图像（如图标或数码照片）的 `Image` 视图。\n\
  \n分段控件就像是将两个或多个 `Buttons` 挤在一个单一控件中。通过使用分段控件，你可以比使用多个 `Buttons` 占用更少的空间来向用户显示多个选项。\n\
  \n当处理 `Buttons` 和分段控件时，你通常需要创建一个状态变量。当程序的任何部分更改了状态变量的值时，更新后的数据会自动出现在整个程序中。\n\n虽然\
  \ `Buttons` 可以在每次用户选中该 `Button` 时运行一行或多行 Swift 代码，但分段控件只有与 `.onChange` 修饰符结合使用时才能运行代码。`Buttons`\
  \ 和分段控件都可以让你在用户界面上显示不同的选项供用户选择。\n\n"
- "# 7. 从文本字段和文本编辑器中检索文本\n\n用户界面通常需要从用户处检索文本。有时，这个文本可能是一个单词或短句，但其他时候，这个文本可能由几个段落组成。为了从用户处检索文本，SwiftUI\
  \ 提供了三种类型的视图：\n\n*   文本字段（Text Field）\n*   安全字段（Secure Field）\n*   文本编辑器（Text Editor）\n\
  \n文本字段允许用户输入单行文本，例如姓名或地址。可选地，文本字段可以显示占位符文本，该文本以浅灰色显示，用于说明文本字段期望什么类型的信息。\n\n安全字段的工作方式与文本字段完全相同，只是它会屏蔽用户输入的任何文本。这在要求用户输入敏感信息（如信用卡号）时很有用。\n\
  \n文本编辑器显示为一个大的方框，用户可以在其中输入和编辑多行文本，例如多个段落。\n\n由于文本字段、安全字段和文本编辑器需要存储数据，它们需要与一个可以持有\
  \ `String` 数据类型的状态变量配合使用，例如：\n\n```\n@State private var message = \"\"\n```\n\n\n\
  \n## 使用文本字段\n\n文本字段的主要用途是接收用户输入的少量文本，可以是一个单词或一个短句。为了提示用户输入预期文本，文本字段可以显示占位符文本，这些文本以浅灰色呈现，如图\
  \ 7-1 所示。\n\n![../images/329781_6_En_7_Chapter/329781_6_En_7_Fig1_HTML.jpg](img/329781_6_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1：文本字段可以显示占位符文本来引导用户\n\n当用户在文本字段中输入内容时，该文本会存储在 State 变量中。在图 7-1 中，State 变量名为“message”，其中的美元符号（`$`）表示该\
  \ State 变量已绑定到此文本字段。这意味着更改文本字段的内容会自动更改 `message` State 变量。\n\n### 更改文本字段样式\n\n让文本字段更易于识别的一种方法是显示浅灰色的占位符文本，让用户知道输入什么内容以及在哪里输入。强调文本字段的第二种方法是在其周围添加圆角边框，如图\
  \ 7-2 所示。\n\n![../images/329781_6_En_7_Chapter/329781_6_En_7_Fig2_HTML.jpg](img/329781_6_En_7_Fig2_HTML.jpg)\n\
  \n图 7-2：文本字段周围的圆角边框外观\n\n`.textFieldStyle` 修饰符提供了 `.plain` 或 `.rounded` 边框选项：\n\n\
  ```\n.textFieldStyle(.roundedBorder)\n```\n\n`.roundedBorder` 会在文本字段周围显示边框，而 `.plain`\
  \ 修饰符则移除边框，使文本字段看起来就像没有使用 `.textFieldStyle` 修饰符一样。\n\n### 创建安全文本字段\n\n在文本字段中输入时，输入的文本会直接显示在屏幕上。虽然这在大多数情况下很方便，但在输入密码或信用卡号等敏感信息时就不合适了。为了掩盖用户输入的任何文本，SwiftUI\
  \ 提供了一种特殊的文本字段，称为 `SecureField`。\n\n与文本字段类似，`SecureField` 也会显示占位符文本，并绑定到一个 State\
  \ 变量，如下所示：\n\n```\nSecureField(\"密码\", text: $message)\n```\n\n`SecureField` 在用户界面上看起来与\
  \ `TextField` 完全相同。唯一的区别是，在 `SecureField` 中输入时，它会掩盖你的文本，如图 7-3 所示。\n\n![../images/329781_6_En_7_Chapter/329781_6_En_7_Fig3_HTML.jpg](img/329781_6_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3：`SecureField` 会掩盖文本，而文本字段则会显示用户输入的所有内容\n\n任何可用于文本字段的修饰符，同样也可用于 `SecureField`，例如\
  \ `.textFieldStyle` 修饰符。\n\n### 使用自动更正和文本内容类型\n\n默认情况下，文本字段会启用自动更正功能，这意味着当你输入时，文本字段会尝试猜测你想写的单词。在某些情况下，这很有帮助，但当你试图输入一个名字时，你肯定不希望自动更正功能将名字改成常见单词。\n\
  \n要关闭自动更正，只需添加以下修饰符：\n\n```\n.disableAutocorrection(true)\n```\n\n如果你想重新启用自动更正，可以删除整个\
  \ `.disableAutocorrection` 修饰符，或向其传递 `false` 值，如下所示：\n\n```\n.disableAutocorrection(false)\n\
  ```\n\n虽然禁用自动更正可以阻止文本字段提供不相关的建议，但另一种解决方案是使用 `.textContentType` 修饰符来定义文本字段应期望的文本类型，例如姓名、电子邮件地址或电话号码。要使用\
  \ `.textContentType` 修饰符，只需指定期望的文本类型即可，例如：\n\n```\nTextField(\"输入你的电子邮件地址\", text:\
  \ $emailAddress)\n.textContentType(.emailAddress)\n```\n\n通过定义特定的 `.textContentType`，自动更正功能将减少其提供的不相关建议数量。不同的\
  \ `.textContentType` 修饰符选项如下：\n\n- `.URL` – 用于输入网址数据\n- `.namePrefix` – 用于输入前缀或称谓，例如“博士”或“先生”\n\
  - `.name` – 用于输入姓名\n- `.nameSuffix` – 用于输入姓名后缀，例如“Jr.”\n- `.givenName` – 用于输入名\n\
  - `.middleName` – 用于输入中间名\n- `.familyName` – 用于输入家族名或姓\n- `.nickname` – 用于输入别名\n\
  - `.organizationName` – 用于输入组织名称\n- `.jobTitle` – 用于输入职位\n- `.location` – 用于输入位置，包括地址\n\
  - `.fullStreetAddress` – 用于输入完整的街道地址\n- `.streetAddressLine1` – 用于输入街道地址的第一行\n-\
  \ `.streetAddressLine2` – 用于输入街道地址的第二行\n- `.addressCity` – 用于输入地址中的城市名称\n- `.addressCityAndState`\
  \ – 用于输入地址中的城市和州名\n- `.postalCode` – 用于输入地址中的邮政编码\n- `.sublocality` – 用于输入地址中的子区域\n\
  - `.countryName` – 用于输入地址中的国家或地区名称\n- `.username` – 用于输入账户或登录名\n- `.password` –\
  \ 用于输入密码\n- `.newPassword` – 用于输入新密码\n- `.oneTimeCode` – 用于输入一次性验证码\n- `.emailAddress`\
  \ – 用于输入电子邮件地址\n- `.telephoneNumber` – 用于输入电话号码\n- `.creditCardNumber` – 用于输入信用卡号\n\
  - `.dateTime` – 用于输入日期、时间或时长\n- `.flightNumber` – 用于输入航班号\n- `.shipmentTrackingNumber`\
  \ – 用于输入包裹追踪号\n\n### 定义不同的键盘\n\n在真实的 iOS 设备上，应用会显示一个虚拟键盘，用户可以点击它来输入数字或字符。由于文本字段可能期望特定类型的信息（例如姓名、数字或电子邮件地址），你可以为用户界面上的每个文本字段定义要使用的特定虚拟键盘类型。文本字段可以显示的不同虚拟键盘包括：\n\
  \n- `.default` – 除非另行指定，否则通常显示的虚拟键盘\n- `.asciiCapable` – 显示标准 ASCII 字符\n- `.numbersAndPunctuation`\
  \ – 显示数字和标点符号\n- `.URL` – 显示针对 URL 输入优化的键盘\n- `.numberPad` – 显示用于输入 PIN 码的数字键盘\n\
  - `.phonePad` – 显示用于输入电话号码的拨号键盘\n- `.namePhonePad` – 显示用于输入人名和电话号码的键盘\n- `.emailAddress`\
  \ – 显示用于输入电子邮件地址的键盘\n- `.decimalPad` – 显示带有数字和小数点的键盘\n- `.twitter` – 显示用于 Twitter\
  \ 文本输入的键盘\n- `.webSearch` – 显示用于网络搜索词和 URL 输入的键盘\n- `.asciiCapableNumberPad` – 显示仅输出\
  \ ASCII 数字的数字键盘\n- `.alphabet` – 显示用于字母输入的键盘\n\n图 7-4 展示了虚拟键盘的四种不同外观。\n\n![../images/329781_6_En_7_Chapter/329781_6_En_7_Fig4_HTML.jpg](img/329781_6_En_7_Fig4_HTML.jpg)\n\
  \n图 7-4：虚拟键盘的不同外观\n\n要为文本字段定义特定的键盘类型，请使用 `.keyboardType` 修饰符，如下所示：\n\n```\nTextField(\"\
  输入姓名\", text: $message)\n.keyboardType(.phonePad)\n```\n\n> **注意：** 要查看虚拟键盘，你必须在模拟器或真实的\
  \ iOS 设备上测试项目。在模拟器中，你可以通过选择 I/O ➤ 键盘 ➤ 切换软件键盘，或按 `Command+K` 来隐藏或显示虚拟键盘。你无法在画布窗格中查看虚拟键盘。\n\
  \n\n\n#### 隐藏虚拟键盘\n\n当用户在 `TextField` 中输入时，虚拟键盘会弹出，用户界面会自动向上滑动。然而，当输入完成后，你需要让虚拟键盘再次消失。\n\
  \n一种技术是使用 `.submitLabel` 修饰符，它定义了一个显示在虚拟键盘上的特定按键。通过点击这个由 `.submitLabel` 修饰符定义的按键，用户可以让虚拟键盘消失，如图\
  \ 7-5 所示。`.submitLabel` 修饰符看起来像这样：\n\n![../images/329781_6_En_7_Chapter/329781_6_En_7_Fig5_HTML.jpg](img/329781_6_En_7_Fig5_HTML.jpg)\n\
  \n图 7-5\n\n`.submitLabel(.done)` 修饰符会在虚拟键盘上显示一个“完成”按钮。\n\n```\n.submitLabel(.done)\n\
  ```\n\n如果你没有指定 `.submitLabel` 修饰符，SwiftUI 默认会在虚拟键盘的右下角显示一个“返回”按钮。无论右下角按键上显示什么标签，点击它都会让虚拟键盘消失。\n\
  \n`.submitLabel` 修饰符可以放置在虚拟键盘上的不同按钮类型包括：\n\n- `.continue` – 添加一个“继续”按钮\n- `.done`\
  \ – 添加一个“完成”按钮\n- `.go` – 添加一个“前往”按钮\n- `.join` – 添加一个“加入”按钮\n- `.next` – 添加一个“下一个”按钮\n\
  - `.return` – 添加一个“返回”按钮\n- `.route` – 添加一个“路线”按钮\n- `.search` – 添加一个“搜索”按钮\n- `.send`\
  \ – 添加一个“发送”按钮\n\n**注意**\n\n`.submitLabel` 修饰符仅适用于 iOS 15 及更高版本。\n\n要了解如何通过你可以定义的虚拟键盘按钮来隐藏虚拟键盘，请按照以下步骤操作：\n\
  \n1.  创建一个新的 SwiftUI iOS App 项目，并为其命名，例如“DismissKeyboard”。\n2.  在导航器窗格中点击 `ContentView`\
  \ 文件。\n3.  在 `ContentView` 文件中两个结构体的上方添加以下代码行：\n\n```\n@available(iOS 15.0, *)\n\
  ```\n\n这会检查确保项目仅在 iOS 15 或更高版本上运行。\n\n4.  在 `struct ContentView: View` 行下方添加一个 `@State`\
  \ 变量，如下所示：\n\n```\n@State var message = \"\"\n```\n\n5.  在 `body` 内部添加一个 `TextField`，如下所示：\n\
  \n```swift\nvar body: some View {\n    TextField(\"在此输入\", text: $message)\n   \
  \     .submitLabel(.done)\n        .padding()\n}\n```\n\n整个 `ContentView` 文件应如下所示：\n\
  \n```swift\nimport SwiftUI\n\n@available(iOS 15.0, *)\nstruct ContentView: View\
  \ {\n    @State var message = \"\"\n    \n    var body: some View {\n        TextField(\"\
  在此输入\", text: $message)\n            .submitLabel(.done)\n            .padding()\n\
  \    }\n}\n\n@available(iOS 15.0, *)\nstruct ContentView_Previews: PreviewProvider\
  \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
  \n注意每个结构体上方的两行 `@available(iOS 15.0, *)`。\n\n6.  点击 `_____App` 文件名，其中 `_____` 是你为项目指定的名称。这个其他文件也包含你需要修改的\
  \ Swift 代码。\n7.  在结构体上方添加 `@available(iOS 15.0, *)` 行，如下所示：\n\n```swift\nimport\
  \ SwiftUI\n\n@available(iOS 15.0, *)\n@main\nstruct DismissKeyboard_Chapter_7App:\
  \ App {\n    var body: some Scene {\n        WindowGroup {\n            ContentView()\n\
  \        }\n    }\n}\n```\n\n在上面的示例中，项目名称为“DismissKeyboard Chapter 7”，因此 Xcode 会在导航器窗格中创建一个名为\
  \ `DismissKeyboard_Chapter_7App` 的文件。\n\n8.  点击“运行”按钮或选择 `Product` ➤ `Run` 在模拟器中运行你的应用。\n\
  9.  当你的应用出现在模拟器中时，点击 `TextField`。如果虚拟键盘没有出现，请按 `Command+K` 或选择 `I/O` ➤ `Keyboard`\
  \ ➤ `Toggle Software Keyboard`。\n10. 点击虚拟键盘右下角的“完成”按钮，使虚拟键盘消失。\n\n### 使用文本编辑器\n\n\
  `TextField` 允许用户输入一个单词或短句，而 `TextEditor` 则允许用户输入多行文本，很像一个文字处理器。当你将 `TextEditor`\
  \ 放置在用户界面上时，它会扩展以填充所有可用空间。这就是为什么最好使用 `.frame` 修饰符为 `TextEditor` 定义特定大小。\n\n对于 `TextField`，点击虚拟键盘右下角的按钮即可使其消失。由于\
  \ `TextEditor` 可以容纳多行文本，虚拟键盘右下角的按钮只是将光标移到下一行，并且始终显示“return”标签。\n\n因此，如果你想在使用 `TextEditor`\
  \ 时隐藏虚拟键盘，需要执行以下操作：\n\n- 创建一个代表 `Bool` 值的 `FocusState` 变量。\n- 将 `.focused` 修饰符添加到\
  \ `TextEditor`，并使用 `FocusState` 变量。\n- 创建一个额外的控件，例如 `Button`，将 `FocusState` 变量设置为\
  \ `false`。\n\n**注意**\n\n这种将 `FocusState` 变量与 `.focused` 修饰符和单独控件一起使用的方法也适用于 `TextField`。\n\
  \n首先，你需要创建一个 `FocusState` 变量，如下所示：\n\n```swift\n@FocusState var dismissKeyboard:\
  \ Bool\n```\n\n一旦定义了 `FocusState` 变量，你需要在 `TextEditor`（或 `TextField`）上使用 `.focused`\
  \ 修饰符来链接到 `FocusState` 变量，如下所示：\n\n```swift\nTextEditor(text: $message)\n    .focused($dismissKeyboard)\n\
  ```\n\n然后，你可以通过一个单独的控件将 `FocusState` 变量的值设置为 `false`，以使虚拟键盘消失，如下所示：\n\n```swift\n\
  Button(\"隐藏键盘\") {\n    dismissKeyboard = false\n}\n```\n\n要了解 `FocusState` 变量如何工作，请按照以下步骤操作：\n\
  \n1.  创建一个新的 SwiftUI iOS App 项目，并为其命名，例如“DismissKeyboardTextEditor”。\n2.  在导航器窗格中点击\
  \ `ContentView` 文件。\n3.  在 `ContentView` 文件中两个结构体的上方添加以下代码行：\n\n```\n@available(iOS\
  \ 15.0, *)\n```\n\n4.  创建一个 `@State` 变量来保存 `TextEditor` 的内容，并创建一个 `@FocusState`\
  \ 变量来使虚拟键盘消失，如下所示：\n\n```swift\n@available(iOS 15.0, *)\nstruct ContentView: View\
  \ {\n    @State var message = \"\"\n    @FocusState var dismissKeyboard: Bool\n\
  ```\n\n5.  在 `VStack` 内部添加一个 `Button` 和一个 `TextEditor`。为了防止 `TextEditor` 扩展，请确保为\
  \ `TextEditor` 添加一个 `.frame` 修饰符。`ContentView` 文件中的完整代码如下所示：\n\n```swift\nimport\
  \ SwiftUI\n\n@available(iOS 15.0, *)\nstruct ContentView: View {\n    @State var\
  \ message = \"\"\n    @FocusState var dismissKeyboard: Bool\n    \n    var body:\
  \ some View {\n        VStack {\n            TextEditor(text: $message)\n      \
  \          .focused($dismissKeyboard)\n                .frame(width: 250, height:\
  \ 150)\n                .padding()\n            Button(\"隐藏键盘\") {\n           \
  \     dismissKeyboard = false\n            }\n        }\n    }\n}\n\n@available(iOS\
  \ 15.0, *)\nstruct ContentView_Previews: PreviewProvider {\n    static var previews:\
  \ some View {\n        ContentView()\n    }\n}\n```\n\n6.  点击 `_____App` 文件名，其中\
  \ `_____` 是你为项目指定的名称。这个其他文件也包含你需要修改的 Swift 代码。\n7.  在结构体上方添加 `@available(iOS 15.0,\
  \ *)` 行，如下所示：\n\n```swift\nimport SwiftUI\n\n@available(iOS 15.0, *)\n@main\nstruct\
  \ DismissKeyboardTextEditor_Chapter_7App: App {\n    var body: some Scene {\n  \
  \      WindowGroup {\n            ContentView()\n        }\n    }\n}\n```\n\n8.\
  \  点击“运行”按钮或选择 `Product` ➤ `Run` 在模拟器中运行你的应用。\n9.  当你的应用出现在模拟器中时，点击 `TextEditor`。如果虚拟键盘没有出现，请按\
  \ `Command+K` 或选择 `I/O` ➤ `Keyboard` ➤ `Toggle Software Keyboard`。\n10. 输入一些文本，然后点击你在\
  \ `TextEditor` 下方创建的“隐藏键盘” `Button`。这会将 `FocusState` 变量 `dismissKeyboard` 设置为 `false`，从而使虚拟键盘消失。\n\
  \n你必须使用 `FocusState` 变量才能让 `TextEditor` 的虚拟键盘消失。\n\n\n\n## 概述\n\n用户向应用输入数据最常见的方式之一就是键入文本。`Text`\
  \ 字段可以接收简短文本，例如姓名或一句话。如果用户需要输入不应显示在屏幕上的敏感信息，可以使用`Secure` 字段，它会遮蔽已输入的所有内容。要显示多行文本，可以使用`Text`\
  \ 编辑器，它的作用类似于一个微型文字处理程序。\n\n为了使文本输入更便捷，请使用 `.contentType` 修饰符来定义`Text` 字段预期的信息类型，例如姓名或电子邮件地址。然后使用\
  \ `.keyboardType` 修饰符来定义一个特定的虚拟键盘，该键盘针对输入特定类型信息（如电话号码或姓名）进行了优化。\n\n当用户不再需要虚拟键盘时，为使其消失，`Text`\
  \ 字段和`Secure` 字段可以依靠右下角的按钮来关闭虚拟键盘。通过使用 `.submitLabel` 修饰符，你可以为这个右下角的虚拟键盘按钮定义常见的标题类型，例如“完成”、“发送”或“下一步”。\n\
  \n创建`Text` 编辑器时，它会自动扩展以填充所有可用空间，因此你可能需要使用 `.frame` 修饰符为`Text` 编辑器定义特定的宽度和高度。在使用`Text`\
  \ 编辑器时，若要隐藏虚拟键盘，请结合使用一个焦点状态变量与 `.focused` 修饰符。然后创建一个单独的控件（例如`Button`），将该焦点状态变量设置为\
  \ `false`。这将使虚拟键盘消失。\n\n文本是最常见的输入数据方式，因此请确保用户能够轻松地在`Text` 字段、`Secure` 字段或`Text`\
  \ 编辑器中键入数据。\n\n"
- "# 8. 使用选择器限制选择\n\n`Text` 字段非常适合让用户输入任意类型的信息，例如姓名或问题的简短答案。问题在于，如果用户有输入任何内容的自由，他们可能会意外（或故意）输入无效数据。\n\
  \n例如，如果一个`Text` 字段要求输入地址，你希望用户能够自由地输入任何内容。然而，如果一个`Text` 字段要求输入州、语言或性别，你就不希望用户输入“狗”、“1258dke3”或“我在找鞋子”，因为这些都不是有效输入，并且很可能导致程序崩溃。\n\
  \n一种解决方案是让用户输入任意数据，然后编写 Swift 代码来验证输入是否有效。不幸的是，这可能需要花费大量时间，并且仍然可能不准确。一个好得多的解决方案是，当只有少数几个可接受的选项时，最好将用户限制在有限选项范围内进行选择。\n\
  \n`Picker`s 会显示多个选项，并让用户通过点击选择一个选项。由于所有选项都是有效的，`Picker`s 确保用户只能输入有效数据。普通的`Picker`\
  \ 适用于让用户从一系列文本选项中进行选择。对于选择颜色或日期，SwiftUI 也提供了专门的`Color` 选择器和`Date` 选择器。\n\n`Date`\
  \ 选择器甚至允许你定义有效的日期范围。`Picker`s 的全部目的就是确保用户在任何时候都只能向程序中输入有效数据。\n\n## 使用选择器\n\n一个`Picker`\
  \ 会显示由多个`Text` 视图定义的选项列表。尽管`Picker` 使用文本字符串来显示可用选项，但用户选择的任何选项实际上都可以代表任何值，例如字符串、十进制数、整数或由枚举定义的值。\n\
  \n要创建一个`Picker`，请使用多个`Text` 视图来显示选项，并为每个选项附加一个 `.tag` 修饰符。`.tag` 修饰符定义了用户选择的实际值，例如\n\
  \n```\nPicker(selection: $choice, label: Text(\"Picker\")) {\n    Text(\"1\").tag(\"\
  one\")\n    Text(\"2\").tag(\"two\")\n    Text(\"3\").tag(\"three\")\n    Text(\"\
  4\").tag(\"four\")\n    Text(\"5\").tag(\"five\")\n}\n```\n\n在这个例子中，可用选项是数字，但当用户选择一个数字时，实际的选择会存储为字符串，例如“three”或“five”，如图\
  \ 8-1 所示。\n\n![../images/329781_6_En_8_Chapter/329781_6_En_8_Fig1_HTML.jpg](img/329781_6_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1\n\n`Picker` 使用`Text` 视图在用户界面上显示选项\n\n在`Text` 视图上的 `.tag` 修饰符可以包含任何数据类型，但同一`Picker`\
  \ 内部的所有 `.tag` 修饰符必须是与它链接的状态变量相匹配的相同数据类型。以下 Swift 代码定义了一个`Picker`，其中多个`Text` 视图显示诸如“Cat”或“Bird”之类的单词，但\
  \ `.tag` 修饰符存储的是整数，例如 0 或 2：\n\n```\nPicker(selection: $choice, label: Text(\"Picker\"\
  )) {\n    Text(\"Bird\").tag(1)\n    Text(\"Cat\").tag(2)\n    Text(\"Lizard\").tag(3)\n\
  \    Text(\"Dog\").tag(4)\n    Text(\"Hamster\").tag(5)\n}\n```\n\n因为 `.tag` 修饰符包含整数，所以\
  \ `choice` 状态变量现在需要存储 `Int` 数据类型，例如\n\n```\n@State private var choice = 0\n```\n\
  \n要了解`Picker` 的工作原理，请按以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS App 项目，并为其命名，例如“Picker”。\n\
  2. 在导航窗格中单击 `ContentView` 文件。\n3. 在 `struct ContentView: View` 行下方添加以下状态变量：\n\n\
  ```\nstruct ContentView: View {\n    @State private var choice = 0\n```\n\n这将创建一个初始设置为\
  \ 0 的状态变量，它是一个整数，因此 `choice` 状态变量被定义为保存 `Int` 数据类型。\n\n4. 创建一个 `VStack`，并在 `var\
  \ body: some View` 行内部创建一个 `Picker` 和一个 `Text` 视图：\n\n```\nvar body: some View {\n\
  \    VStack {\n        Picker(selection: $choice, label: Text(\"Picker\")) {\n \
  \           Text(\"Bird\").tag(1)\n            Text(\"Cat\").tag(2)\n          \
  \  Text(\"Lizard\").tag(3)\n            Text(\"Dog\").tag(4)\n            Text(\"\
  Hamster\").tag(5)\n        }\n        Text(\"You chose \\(choice)\")\n    }\n}\n\
  ```\n\n`ContentView` 文件中的完整代码应如下所示：\n\n```\nimport SwiftUI\n\nstruct ContentView:\
  \ View {\n    @State private var choice = 0\n    var body: some View {\n       \
  \ VStack {\n            Picker(selection: $choice, label: Text(\"Picker\")) {\n\
  \                Text(\"Bird\").tag(1)\n                Text(\"Cat\").tag(2)\n \
  \               Text(\"Lizard\").tag(3)\n                Text(\"Dog\").tag(4)\n\
  \                Text(\"Hamster\").tag(5)\n            }\n            Text(\"You\
  \ chose \\(choice)\")\n        }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider\
  \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
  \n5. 在画布窗格中单击“实时预览”图标。\n6. 在 `Picker` 中选择不同的选项。注意，每次选择不同的选项时，`Text` 视图都会显示“You chose\
  \ __”，其中 __ 是附加到用户选择的`Text` 视图上的 `.tag` 值。\n7. 按如下方式更改状态变量，以保存 `Double` 数据类型：\n\n\
  ```\n@State private var choice = 0.0\n```\n\n由于此 `choice` 状态变量的初始值为 0.0，是一个十进制数，因此\
  \ Swift 推断 `choice` 变量现在只能保存 `Double` 数据类型。\n\n8. 按如下方式更改 `Picker` 中的 `.tag` 修饰符：\n\
  \n```\nPicker(selection: $choice, label: Text(\"Picker\")) {\n    Text(\"Bird\"\
  ).tag(1.7)\n    Text(\"Cat\").tag(2.06)\n    Text(\"Lizard\").tag(3.41)\n    Text(\"\
  Dog\").tag(4.13)\n    Text(\"Hamster\").tag(5.28)\n}\n```\n\n因为 `choice` 状态变量已被重新定义为保存\
  \ `Double` 数据类型，所以 `.tag` 修饰符的值现在也必须全部表示 `Double` 数据类型。\n\n\n\n## 使用选择器\n\n![图 8-2](img/329781_6_En_8_Fig2_HTML.jpg)\n\
  \n**图 8-2** – 一个 `Picker` 视图在其 `.tag` 修饰符中使用 `Double` 值\n\n1. 点击画布面板中的**实时预览**图标。\n\
  2. 在 `Picker` 中选择不同选项。请注意，每次选择不同选项时，`Text` 视图会显示“你选择了 __”，其中 `__` 是 `.tag` 值（以 `Double`\
  \ 值表示），如图 8-2 所示。\n\n由于 `\"choice\"` 这个 `State` 变量已被重定义为保存 `Double` 数据类型，因此 `.tag`\
  \ 修饰符的值现在也必须全部表示为 `Double` 数据类型。\n\n请回顾第 6 章的内容，你只需为 `Picker` 视图添加 `.pickerStyle(SegmentedPickerStyle())`\
  \ 修饰符，即可将其转换为分段控件，如图 8-3 所示：\n\n![图 8-3](img/329781_6_En_8_Fig3_HTML.jpg)\n\n**图\
  \ 8-3** – 以分段控件形式显示的 `Picker` 视图\n\n```\nPicker(selection: $choice, label: Text(\"\
  Picker\")) {\n    Text(\"Bird\").tag(1.7)\n    Text(\"Cat\").tag(2.06)\n    Text(\"\
  Lizard\").tag(3.41)\n    Text(\"Dog\").tag(4.13)\n    Text(\"Hamster\").tag(5.28)\n\
  }.pickerStyle(SegmentedPickerStyle())\n```\n\n## 使用 `ColorPicker`\n\n普通的 `Picker`\
  \ 可以让你选择在 `Text` 视图中显示的不同选项。但是，如果你希望用户选择一种特定的颜色该怎么办？你可以在 `Picker` 中列出几种颜色，但如果用户想选择自定义颜色呢？这时就可以使用\
  \ `ColorPicker` 了。\n\n`ColorPicker` 允许用户从网格、色谱或红绿蓝滑块中选择标准颜色（红色、蓝色、绿色、黄色等）或自定义颜色，如图\
  \ 8-4 所示。\n\n![图 8-4](img/329781_6_En_8_Fig4_HTML.jpg)\n\n**图 8-4** – `ColorPicker`\
  \ 提供了三种不同的自定义颜色选择方式\n\n要创建一个 `ColorPicker`，你首先需要创建一个 `State` 变量来保存 `Color` 数据类型，例如：\n\
  \n```\n@State var myColor = Color.red\n```\n\n然后，你可以通过定义一个描述性标题，并链接到代表 `Color` 的\
  \ `State` 变量来创建 `ColorPicker`，如下所示：\n\n```\nColorPicker(\"Pick a color\", selection:\
  \ $myColor)\n```\n\n要了解 `ColorPicker` 的工作原理，请按以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS 应用项目，并为其指定任意名称，例如“ColorPicker”。\n\
  2. 点击导航面板中的 `ContentView` 文件。\n3. 在 `struct ContentView: View` 行下方添加以下 `State` 变量：\n\
  4. 创建一个 `VStack`，并在其中放置一个矩形。由于矩形会扩展至填满整个屏幕，请务必为其添加 `.frame` 修饰符，并使用之前定义的 `State`\
  \ 变量设置其 `.foregroundColor`：\n\n```\nstruct ContentView: View {\n    @State var myColor\
  \ = Color.gray\n```\n\n5. 在 `Rectangle()` 下方，定义一个链接或绑定到 `State` 变量的 `ColorPicker`：\n\
  \n```\nvar body: some View {\n    VStack {\n        Rectangle()\n            .frame(width:\
  \ 200, height: 150)\n            .foregroundColor(myColor)\n    }\n}\n```\n\n```\n\
  ColorPicker(\"Pick a color\", selection: $myColor)\n```\n\n完整的 `ContentView` 文件应如下所示：\n\
  \n![图 8-5](img/329781_6_En_8_Fig5_HTML.jpg)\n\n**图 8-5** – `ColorPicker` 图标\n\n\
  6. 点击画布面板中的**实时预览**图标。请注意，由于 `State` 变量 `myColor` 的初始值被设为灰色，矩形最初会显示为灰色。\n7. 点击 `ColorPicker`\
  \ 图标（如图 8-5 所示），以显示不同的颜色选项（参见图 8-4）。\n\n```\nimport SwiftUI\n\nstruct ContentView:\
  \ View {\n    @State var myColor = Color.gray\n\n    var body: some View {\n   \
  \     VStack {\n            Rectangle()\n                .frame(width: 200, height:\
  \ 150)\n                .foregroundColor(myColor)\n            ColorPicker(\"Pick\
  \ a color\", selection: $myColor)\n        }\n    }\n}\n\nstruct ContentView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
  \    }\n}\n```\n\n8. 点击一种颜色，然后点击 `ColorPicker` 对话框右上角的关闭 (X) 图标将其关闭。请注意，矩形现在会显示你选择的颜色。\n\
  \n## 使用 `DatePicker`\n\n用户需要输入的常见数据类型之一是日期和时间。然而，一个人可能会将日期写为“2023 年 6 月 14 日”，而另一个人可能会将同一日期写为“2023-06-14”。在书写时间时，有人可能会输入“下午\
  \ 6:45”，而另一个人可能会输入“18:45”。\n\n为了便于用户输入日期和时间，SwiftUI 提供了 `DatePicker`。用户无需手动输入日期或时间，只需点击他们想要的日期或时间即可，如图\
  \ 8-6 所示。\n\n![图 8-6](img/329781_6_En_8_Fig6_HTML.jpg)\n\n**图 8-6** – `DatePicker`\n\
  \n要创建一个 `DatePicker`，你只需要定义描述性文本和一个用于存储用户所选日期和/或时间的 `State` 变量，如下所示：\n\n```\nDatePicker(selection:\
  \ $myDate, label: { Text(\"Date\") })\n```\n\n### 选择日期选择器样式\n\n默认情况下，`DatePicker`\
  \ 以用户可选择的字段形式显示日期和时间。选中后，日期或时间会显示用户可选的日期或时间。如果你不喜欢这种默认的紧凑格式，可以使用 `.datePickerStyle()`\
  \ 修饰符自定义 `DatePicker` 的外观，如图 8-7 所示：\n\n![图 8-7](img/329781_6_En_8_Fig7_HTML.jpg)\n\
  \n**图 8-7** – `DatePicker` 的不同样式\n\n* `.compact` – 显示日期和时间的默认方式。当用户选择日期时，会像 `.graphical`\
  \ 样式一样显示一个日历。当用户选择时间时，会像 `.wheel` 样式一样显示不同的时间选项。\n* `.graphical` – 以日历形式显示日期，但时间以字段形式显示。当用户选择时间时，会像\
  \ `.wheel` 样式一样显示不同的时间选项。\n* `.wheel` – 以滚轮形式显示日期和时间。\n\n创建 `DatePicker` 的 Swift\
  \ 代码只需要添加一个用于存储日期的 `State` 变量，然后使用该 `State` 变量。此外，`DatePicker` 允许你在样式为 `.compact`\
  \ 时定义显示的文本：\n\n```\n@State var myDate = Date.now\nDatePicker(selection: $myDate,\
  \ label: { Text(\"Date\") })\n    .datePickerStyle(.graphical)\n```\n\n### 显示日期和/或时间\n\
  \n尽管 `DatePicker` 允许用户同时选择日期和时间，但你可能只需要 `DatePicker` 选择日期或时间中的一项。要将 `DatePicker`\
  \ 限制为仅显示日期或时间，你可以添加 `displayedComponents` 参数，并指定 `[.date]` 或 `[.hourAndMinute]`，如下所示：\n\
  \n```\nDatePicker(selection: $myDate, displayedComponents: [.date], label: { Text(\"\
  Date\") })\nDatePicker(selection: $myDate, displayedComponents: [.hourAndMinute],\
  \ label: { Text(\"Time\") })\n```\n\n\n\n### 限制日期范围\n\n当允许用户选择日期时，你可能希望限制有效日期的列表。例如，如果你正在询问某人的出生日期，那么让\
  \ `DatePicker` 允许用户选择如 1737 年 2 月 3 日这样过时的出生日期是没有意义的。\n\n要限制 `DatePicker` 的日期范围，你必须首先定义起始和结束日期范围，例如：\n\
  \n```\nlet dateRange: ClosedRange = {\n    let calendar = Calendar.current\n   \
  \ let startComponents = DateComponents(year: 2022, month: 1, day: 1)\n    let endComponents\
  \ = DateComponents(year: 2022, month: 12, day: 31, hour: 23, minute: 59, second:\
  \ 59)\n    return calendar.date(from: startComponents)!\n    ...\n    calendar.date(from:\
  \ endComponents)!\n}()\n```\n\n注意，闭合区间需要同时定义起始日期和结束日期。用户不能选择早于起始日期的过去日期，也不能选择晚于结束日期的未来日期。\n\
  \n除了闭合区间，你还可以选择部分区间。一种方法是定义一个从特定日期开始的部分区间，例如：\n\n```\nlet dateRange2: PartialRangeFrom\
  \ = {\n    let calendar = Calendar.current\n    let startComponents = DateComponents(year:\
  \ 2021, month: 1, day: 1)\n    return calendar.date(from: startComponents)!...\n\
  }()\n```\n\n上述区间从 2021 年 1 月 1 日开始，允许 `DatePicker` 选择此起始日期之后的任何日期。另一种定义部分区间的方式是定义一个可以达到但停止于特定日期的区间，例如：\n\
  \n```\nlet dateRange3: PartialRangeThrough = {\n    let calendar = Calendar.current\n\
  \    let stopComponents = DateComponents(year: 2021, month: 1, day: 1)\n    return\
  \ ...calendar.date(from: stopComponents)!\n}()\n```\n\n此区间允许 `DatePicker` 选择截止到指定日期（本例中为\
  \ 2021 年 1 月 1 日）的任何日期。一旦定义了日期区间，你需要将此日期区间添加到 `DatePicker` 中，如下所示：\n\n```\nDatePicker(selection:\
  \ $myDate, in: dateRange, displayedComponents: [.date], label: { Text(\"Date\")\
  \ })\n```\n\n这个 `DatePicker` 使用一个名为 `myDate` 的 `State` 变量，通过 `dateRange` 常量定义有效范围，并且仅显示日期（而非时间）。如果该\
  \ `DatePicker` 的样式是 `.compact`，那么它还会在 `DatePicker` 上显示“Date”。\n\n要了解如何使用 `DatePicker`，请遵循以下步骤：\n\
  \n1. 创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如“DatePicker”。\n\n2. 单击导航面板中的 `ContentView`\
  \ 文件。\n\n3. 在 `ContentView` 文件中的两个结构体上方添加以下代码行：\n\n4. 在 `_____App` 文件的 `import SwiftUI`\
  \ 代码行下方添加这一行 `@available(iOS 15, *)`，其中 `_____` 是你的项目名称，例如：\n\n```\n@available(iOS\
  \ 15, *)\n```\n\n5. 单击 `ContentView` 文件，然后创建一个 `State` 变量来保存一个日期，如下所示：\n\n```\n\
  import SwiftUI\n@available(iOS 15, *)\n@main\nstruct DatePickerApp: App {\n    var\
  \ body: some Scene {\n        WindowGroup {\n            ContentView()\n       \
  \ }\n    }\n}\n```\n\n6. 定义三个日期区间，如下所示：\n\n```\n@State var myDate = Date.now\n```\n\
  \n7. 创建一个 `VStack` 来容纳一个 `Text` 视图和一个 `DatePicker`，如下所示：\n\n```\nlet dateRange:\
  \ ClosedRange = {\n    let calendar = Calendar.current\n    let startComponents\
  \ = DateComponents(year: 2021, month: 1, day: 1)\n    let endComponents = DateComponents(year:\
  \ 2021, month: 12, day: 31, hour: 23, minute: 59, second: 59)\n    return calendar.date(from:\
  \ startComponents)!\n    ...\n    calendar.date(from: endComponents)!\n}()\nlet\
  \ dateRange2: PartialRangeFrom = {\n    let calendar = Calendar.current\n    let\
  \ startComponents = DateComponents(year: 2021, month: 1, day: 1)\n    let endComponents\
  \ = DateComponents(year: 2021, month: 12, day: 31, hour: 23, minute: 59, second:\
  \ 59)\n    return calendar.date(from: endComponents)!...\n}()\nlet dateRange3: PartialRangeThrough\
  \ = {\n    let calendar = Calendar.current\n    let startComponents = DateComponents(year:\
  \ 2021, month: 1, day: 1)\n    let endComponents = DateComponents(year: 2021, month:\
  \ 12, day: 31, hour: 23, minute: 59, second: 59)\n    return ...calendar.date(from:\
  \ startComponents)!\n}()\n```\n\n```\nvar body: some View {\n    VStack {\n    \
  \    Text(\"Chosen date = \\(myDate)\")\n            .padding()\n        DatePicker(selection:\
  \ $myDate, in: dateRange3, displayedComponents: [.date], label: { Text(\"Date\"\
  ) })\n            .datePickerStyle(.graphical)\n            .padding()\n    }\n\
  }\n```\n\n完整的 `ContentView` 文件应该如下所示：\n\n![../images/329781_6_En_8_Chapter/329781_6_En_8_Fig8_HTML.jpg](img/329781_6_En_8_Fig8_HTML.jpg)\n\
  \n**图 8-8** – 显示 `Text` 视图和 `DatePicker` 的用户界面\n\n8. 单击画布中的实时预览图标，并单击任意日期。注意，当你选择一个日期时，它会显示在\
  \ `DatePicker` 上方，如图 8-8 所示。\n\n```\nimport SwiftUI\n@available(iOS 15, *)\nstruct\
  \ ContentView: View {\n    @State var myDate = Date.now\n    let dateRange: ClosedRange\
  \ = {\n        let calendar = Calendar.current\n        let startComponents = DateComponents(year:\
  \ 2021, month: 1, day: 1)\n        let endComponents = DateComponents(year: 2021,\
  \ month: 12, day: 31, hour: 23, minute: 59, second: 59)\n        return calendar.date(from:\
  \ startComponents)!\n        ...\n        calendar.date(from: endComponents)!\n\
  \    }()\n    let dateRange2: PartialRangeFrom = {\n        let calendar = Calendar.current\n\
  \        let startComponents = DateComponents(year: 2021, month: 1, day: 1)\n  \
  \      let endComponents = DateComponents(year: 2021, month: 12, day: 31, hour:\
  \ 23, minute: 59, second: 59)\n        return calendar.date(from: endComponents)!...\n\
  \    }()\n    let dateRange3: PartialRangeThrough = {\n        let calendar = Calendar.current\n\
  \        let startComponents = DateComponents(year: 2021, month: 1, day: 1)\n  \
  \      let endComponents = DateComponents(year: 2021, month: 12, day: 31, hour:\
  \ 23, minute: 59, second: 59)\n        return ...calendar.date(from: startComponents)!\n\
  \    }()\n    var body: some View {\n        VStack {\n            Text(\"Chosen\
  \ date = \\(myDate)\")\n                .padding()\n            DatePicker(selection:\
  \ $myDate, in: dateRange3, displayedComponents: [.date], label: { Text(\"Date\"\
  ) })\n                .datePickerStyle(.graphical)\n                .padding()\n\
  \        }\n    }\n}\n@available(iOS 15, *)\nstruct ContentView_Previews: PreviewProvider\
  \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
  \n9. 尝试更改 `DatePicker` 样式（`.compact`、`.graphical`、`.wheel`），同时选择不同的日期区间（`dateRange`、`dateRange2`、`dateRange3`）。\n\
  \n\n\n### 格式化日期\n\n默认情况下，SwiftUI 会显示包含大量细节的日期，而这些细节你可能并不需要展示。要以特定格式显示日期，你可以使用 `DateFormatter`，如下所示：\n\
  \n```\nlet formatter = DateFormatter()\n```\n\n然后，你可以定义一种样式来显示日期和时间，例如以下之一：\n\n\
  | 样式 | 日期 | 时间 |\n| --- | --- | --- |\n| `.short` | 22/2/15 | 下午 7:15 |\n| `.medium`\
  \ | 2022 年 2 月 15 日 | 下午 7:15:29 |\n| `.long` | 2022 年 2 月 15 日 | 下午 7:15:29 CST\
  \ |\n| `.full` | 2022 年 2 月 15 日星期二 | 中央标准时间下午 7:15:29 |\n\n**注意**\n\n区域设置可能会改变日期的实际显示方式，例如\
  \ “15 June 2021” 或 “June 15, 2021”。\n\n要使用日期样式，你必须像这样定义格式化器的 `dateStyle` 属性：\n\n\
  ```\nformatter.dateStyle = .medium\n```\n\n要使用时间样式，你必须像这样定义格式化器的 `timeStyle` 属性：\n\
  \n```\nformatter.timeStyle = .short\n```\n\n一旦你创建了一个 `DateFormatter` 并定义了它的 `.dateStyle`\
  \ 和 `.timeStyle` 属性，最后一步就是使用该格式化器及其 `dateStyle` 来格式化日期，例如：\n\n```\nformatter.string(from:\
  \ myDate)\n```\n\n要了解如何格式化从日期选择器中选择的日期，请遵循以下步骤：\n\n1. 创建一个新的 SwiftUI iOS App 项目，并为其取任意名称，例如\
  \ “DatePickerFormat”。\n2. 在导航窗格中点击 `ContentView` 文件。\n3. 在 `ContentView` 文件中的两个结构体上方添加以下代码行：\n\
  \   在 `_____App` 文件的 `import SwiftUI` 行下方添加 `@available(iOS 15, *)` 这行代码，其中 `_____`\
  \ 是你的项目名称，例如：\n\n   ```\n   @available(iOS 15, *)\n   ```\n\n4. 点击 `ContentView`\
  \ 文件，并创建一个用于存储日期的状态变量，如下所示：\n\n   ```\n   import SwiftUI\n   @available(iOS 15,\
  \ *)\n   @main\n   struct DatePickerFormatApp: App {\n       var body: some Scene\
  \ {\n           WindowGroup {\n               ContentView()\n           }\n    \
  \   }\n   }\n   ```\n\n5. 在状态变量下方输入以下内容以定义 `DateFormatter`：\n\n   ```\n   @State\
  \ var myDate = Date.now\n   ```\n\n6. 在 `var body: some View` 代码行内添加一个 `VStack`，并在\
  \ `VStack` 内部创建一个日期选择器，如下所示：\n\n   ```\n   let formatter = DateFormatter()\n   ```\n\
  \n   ```\n   VStack {\n       Text(\"所选日期 = \\(formatter.string(from: myDate))\"\
  )\n           .padding()\n       DatePicker(selection: $myDate, label: { Text(\"\
  日期\") })\n   }.onAppear() {\n       formatter.dateStyle = .full\n       formatter.timeStyle\
  \ = .full\n   }\n   ```\n\n   `Text` 视图显示 “所选日期 = ” 后跟存储在 `myDate` 状态变量中的日期。请注意，`formatter.string`\
  \ 命令定义了该日期的实际显示方式。\n\n   日期选择器将所选日期存储在 `myDate` 状态变量中。然后，`.onAppear` 修饰符会在 `VStack`\
  \ 定义的用户界面每次出现时运行 Swift 代码。在该 `.onAppear` 修饰符内部，有一行代码将 `formatter` 的 `.dateStyle`\
  \ 定义为 `.full`。如果你将 `.full` 更改为 `.short`、`.medium` 或 `.long`，你可以看到 `Text` 视图中日期的格式如何变化。\n\
  \n7. 点击画布窗格中的实时预览图标，然后点击任意日期。请注意，当你选择一个日期时，它会显示在日期选择器上方，并使用 `.onAppear` 修饰符中定义的日期和时间样式，例如\
  \ `.full` 或 `.short`。\n\n## 总结\n\n文本字段可以方便用户输入数据。不幸的是，用户可以在文本字段中输入任何内容，甚至完全无意义的数据。\n\
  \n为了将用户限制在有效的选择范围内，你可以使用选择器。选择器可以提供所有有效选项的列表。这样，用户就不可能通过选择器输入无效数据。\n\n创建选择器时，你可以使用\
  \ `.tag` 属性为用户在选择器中的选择分配一个特定值。`.tag` 属性可以持有任何类型的数据，例如整数、小数或字符串。所有 `.tag` 属性必须持有相同的数据类型。\n\
  \n另一种显示有效选项列表的方式是通过颜色选择器。使用颜色选择器，用户可以选择标准颜色，如红、绿、蓝，或创建自定义颜色。\n\n对于选择日期，SwiftUI 提供了日期选择器。你可以格式化日期的显示方式，例如\
  \ “22/6/15” 或 “2022 年 6 月 15 日”。日期选择器还可以以三种不同的样式（`.compact`、`.graphical` 或 `.wheel`）显示。这样，你可以让日期选择器以最适合你应用的方式呈现。通过使用选择器，你可以让用户轻松输入仅有效的数据。\n\
  \n"
- "# 9. 使用开关、步进器和滑块限制选择\n\n理想情况下，你希望限制用户仅选择有效选项。这可以防止用户输入无效数据，例如拼写出数字（如 “thirty-seven”）而不是输入数字（37）。另外三种限制用户仅选择有效数据的方式是开关、步进器和滑块。\n\
  \n开关为用户提供恰好两个选项，例如开或关、是或否、真或假。因为开关只提供两个选项，它表示一个布尔值（真或假）。\n\n步进器将用户输入限制在有效数据范围内。步进器显示减号/加号图标，用户可以点击它以固定增量递增或递减一个值。通过使用步进器，用户无需输入特定数字即可定义值。\n\
  \n滑块也将用户输入限制在有效数据范围内。滑块允许用户通过拖拽来输入特定值，无需任何输入。步进器和滑块都可以定义最小值和最大值，以限制用户仅选择有效的数值。对许多人来说，点击或拖拽选择值比输入数字本身更容易。步进器和滑块都表示一个\
  \ `Double` 值（小数）。\n\n开关、滑块和步进器的全部目的在于确保用户在任何时候都只能向程序输入有效数据。\n\n\n\n## 使用开关\n\n如果你查看\
  \ iPhone 或 iPad 的设置，你会看到一系列可以开启或关闭的选项，如图 9-1 所示。\n\n![../images/329781_6_En_9_Chapter/329781_6_En_9_Fig1_HTML.jpg](img/329781_6_En_9_Fig1_HTML.jpg)\n\
  \n图 9-1\n\n`Toggle` 的典型用途\n\n要创建一个 `Toggle`，你需要定义显示在 `Toggle` 旁边的文本，并将一个 `State`\
  \ 变量链接或绑定到 `Toggle`，例如：\n\n```\nToggle(isOn: $settingValue) {\nText(\"开关文本\")\n\
  }\n```\n\n在这个示例中，`Toggle` 会改变名为 `settingValue` 的 `State` 变量的值，该变量应定义为一个 `Boolean`\
  \ 类型，如下所示：\n\n```\n@State var settingValue = true\n```\n\n然后，`Text` 视图会在 `Toggle`\
  \ 本身旁边显示“开关文本”，如图 9-2 所示。\n\n![../images/329781_6_En_9_Chapter/329781_6_En_9_Fig2_HTML.jpg](img/329781_6_En_9_Fig2_HTML.jpg)\n\
  \n图 9-2\n\n典型 `Toggle` 的外观\n\n要了解 `Toggle` 的工作原理，请按照以下步骤操作：\n\n1. 创建一个新的 SwiftUI\
  \ iOS App 项目，并给它任意你喜欢的名称，例如“Toggle”。\n\n2. 在导航器面板中点击 `ContentView` 文件。\n\n3. 在 `struct\
  \ ContentView: View` 这行下方添加以下 `State` 变量：\n\n4. 创建一个 `VStack` 并在其中放入一个矩形。由于矩形会扩展以填满整个屏幕，请确保为其添加\
  \ `.frame` 修饰符，并使用之前定义的 `State` 变量来定义其 `.foregroundColor`：\n\n```\nstruct ContentView:\
  \ View {\n@State var myToggle = true\n```\n\n5. 在 `Rectangle` 及其修饰符下方添加 `Toggle`，如下所示：\n\
  \n```\nvar body: some View {\nVStack {\nRectangle()\n.frame(width: 200, height:\
  \ 150)\n.foregroundColor(myToggle ? .orange : .green)\n}\n}\n```\n\n```\nToggle(myToggle\
  \ ? \"橙色\" : \"绿色\", isOn: $myToggle)\n```\n\n完整的 `ContentView` 文件应如下所示：\n\n6. 点击画布面板中的\
  \ Live Preview 图标。请注意，由于 `State` 变量 `myToggle` 为 `true`，矩形初始显示为橙色。\n\n7. 点击 `Toggle`。请注意，每次点击\
  \ `Toggle` 时，矩形的颜色会在橙色和绿色之间切换，并且 `Toggle` 上的文本也会在“橙色”和“绿色”之间切换。\n\n```\nimport SwiftUI\n\
  struct ContentView: View {\n@State var myToggle = true\nvar body: some View {\n\
  VStack {\nRectangle()\n.frame(width: 200, height: 150)\n.foregroundColor(myToggle\
  \ ? .orange : .green)\nToggle(myToggle ? \"橙色\" : \"绿色\", isOn: $myToggle)\n}\n\
  }\n}\nstruct ContentView_Previews: PreviewProvider {\nstatic var previews: some\
  \ View {\nContentView()\n}\n}\n```\n\n## 使用步进器\n\n当你希望用户输入数值数据时，你可能希望限制可接受数据的范围。毕竟，如果你询问用户的年龄，你不希望看到\
  \ `–23` 或 `938478`，因为这两个值对于某人的年龄来说显然都是不可能的。为了让用户能够在可接受的范围内轻松输入数值数据，你可以使用 `Stepper`。\n\
  \n`Stepper` 存储一个值，用户可以按固定的增量（例如 `1` 或 `2.5`）来增加该值。你可以定义步进器可以表示的最小值和最大值，例如 `1` 到\
  \ `10` 之间的范围。此外，你还可以定义步进器是否循环。循环意味着如果你持续增加步进器超出其最大值，它将回到最小值。同样，如果你持续减少步进器低于其最小值，它将跳转到最大值。这可以让用户轻松选择不同的值，而无需从一个极端值一步步地增加到另一个极端值。\n\
  \n要了解步进器的工作原理，请按照以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS App 项目，并给它任意你喜欢的名称，例如“Stepper”。\n\
  \n2. 在导航器面板中点击 `ContentView` 文件。\n\n3. 在 `struct ContentView: View` 这行下方添加以下 `State`\
  \ 变量：\n\n4. 在 `var body: some View` 内部创建一个 `VStack`，并添加一个 `Stepper`，如下所示：\n\n```\n\
  struct ContentView: View {\n@State var newValue = 0\n```\n\n```\nvar body: some\
  \ View {\nVStack {\nStepper(value: $newValue) {\nText(\"步进器值 = \\(newValue)\")\n\
  }.padding()\n}\n}\n```\n\n这定义了一个简单的 `Stepper`，它可以表示任何值，并以 `1` 为单位增加或减少其值，如图 9-3\
  \ 所示。\n\n![../images/329781_6_En_9_Chapter/329781_6_En_9_Fig3_HTML.jpg](img/329781_6_En_9_Fig3_HTML.jpg)\n\
  \n图 9-3\n\n一个简单的 `Stepper`\n\n完整的 `ContentView` 文件应如下所示：\n\n5. 点击画布面板中的 Live Preview\
  \ 图标来运行你的应用。\n\n6. 点击 `Stepper` 上的 `–` 和 `+` 图标来减少或增加其值。\n\n```\nimport SwiftUI\n\
  struct ContentView: View {\n@State var newValue = 0\nvar body: some View {\nVStack\
  \ {\nStepper(value: $newValue) {\nText(\"步进器值 = \\(newValue)\")\n}.padding()\n}\n\
  }\n}\nstruct ContentView_Previews: PreviewProvider {\nstatic var previews: some\
  \ View {\nContentView()\n}\n}\n```\n\n### 定义步进器的范围\n\n在许多情况下，你希望定义 `Stepper` 可以表示的有效值范围，例如从\
  \ `1` 到 `25`。要为 `Stepper` 定义一个范围，你需要在 `in:` 参数中列出该范围，如下所示：\n\n```\nStepper(value:\
  \ $newValue, in: 1...10) {\nText(\"步进器值 = \\(newValue)\")\n}.padding()\n```\n\n\
  要了解如何定义 `Stepper` 可以表示的值范围，请添加上述代码，使完整的 `ContentView` 文件如下所示：\n\n```\nimport SwiftUI\n\
  struct ContentView: View {\n@State var newValue = 0\nvar body: some View {\nVStack\
  \ {\n// 基础步进器\nStepper(value: $newValue) {\nText(\"步进器值 = \\(newValue)\")\n}.padding()\n\
  // 带范围的步进器\nStepper(value: $newValue, in: 1...10) {\nText(\"步进器值 = \\(newValue)\"\
  )\n}.padding()\n}\n}\n}\nstruct ContentView_Previews: PreviewProvider {\nstatic\
  \ var previews: some View {\nContentView()\n}\n}\n```\n\n点击画布面板上的 Live Preview 图标，然后点击底部的\
  \ `Stepper`。请注意，由于其范围限制在 `1` 到 `10` 之间，点击底部 `Stepper` 上的 `–` 和 `+` 图标不会将 `Stepper`\
  \ 的值减少到 `1` 以下或增加到 `10` 以上。\n\n\n\n#### 在步进器中定义增量/减量值\n\n通常，`Stepper`（步进器）以 1 为单位增加或减少其值。有时，你可能希望以\
  \ 1 以外的值（例如 2 或 5）进行增减。要为 `Stepper` 定义一个用于增减的整数值，你需要为 `step:` 参数定义一个整数值，如下所示：\n\n\
  ```\nStepper(value: $newValue, in: 1...10, step: 2) {\n    Text(\"Stepper value\
  \ = \\(newValue)\")\n}.padding()\n```\n\n点击画布面板上的实时预览图标，然后点击底部的 `Stepper`。请注意，由于其范围被限制在\
  \ 1 到 10 之间，点击底部 `Stepper` 上的 – 和 + 图标不会将其值减小到 1 以下或增大到 10 以上。然而，点击底部 `Stepper`\
  \ 上的 – 和 + 图标会以 2 为单位增减该 `Stepper` 的值。\n\n如果你希望为 `step:` 参数定义一个十进制值，你需要确保 `Stepper`\
  \ 中使用的每个值都是十进制值，例如：\n\n```\nStepper(value: $decimalValue,\n        in: 1.0...10.0,\n\
  \        step: 0.25) {\n    Text(\"Stepper value = \\(decimalValue)\")\n}.padding()\n\
  ```\n\n在上述 `Stepper` 定义中，范围从 1.0（不仅仅是 1）到 10.0（包含，不仅仅是 10）。然后 `step:` 参数被定义为 0.25。最后，`State`\
  \ 变量（`decimalValue`）也必须被定义为十进制值（`Double` 数据类型），如下所示：\n\n```\n@State var decimalValue:\
  \ Double = 0\n```\n\n整个 `ContentView` 文件应如下所示：\n\n```\nimport SwiftUI\n\nstruct\
  \ ContentView: View {\n    @State var newValue = 0\n    @State var decimalValue:\
  \ Double = 0\n\n    var body: some View {\n        VStack {\n            // 基础步进器\n\
  \            Stepper(value: $newValue) {\n                Text(\"Stepper value =\
  \ \\(newValue)\")\n            }.padding()\n\n            // 限定范围的步进器\n        \
  \    Stepper(value: $newValue, in: 1...10) {\n                Text(\"Stepper value\
  \ = \\(newValue)\")\n            }.padding()\n\n            // 带增量值的步进器\n      \
  \      Stepper(value: $newValue, in: 1...10, step: 2) {\n                Text(\"\
  Stepper value = \\(newValue)\")\n            }.padding()\n\n            // 带十进制增量值的步进器\n\
  \            Stepper(value: $decimalValue,\n                    in: 1.0...10.0,\n\
  \                    step: 0.25) {\n                Text(\"Stepper value = \\(decimalValue)\"\
  )\n            }.padding()\n        }\n    }\n}\n\nstruct ContentView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
  \    }\n}\n```\n\n点击画布面板上的实时预览图标，然后点击底部的 `Stepper`。请注意，由于其范围被限制在 1.0 到 10.0 之间，点击底部\
  \ `Stepper` 上的 – 和 + 图标不会将其值减小到 1.0 以下或增大到 10.0 以上。然而，点击底部 `Stepper` 上的 – 和 + 图标会以\
  \ 0.25 为单位增减该 `Stepper` 的值。\n\n## 使用滑块\n\n与 `Stepper` 类似，`Slider`（滑块）允许用户在不输入特定数字的情况下选择数值。`Stepper`\
  \ 强制用户以固定量增减数值，而 `Slider` 则通过简单的滑动改变滑块位置，使用户能够快速在值域范围内进行选择。这使得 `Slider` 比 `Stepper`\
  \ 更适合让用户从大范围数值中进行选择。\n\n要了解 `Slider` 的工作方式，请遵循以下步骤：\n\n1.  创建一个新的 SwiftUI iOS 应用项目，并为其随意命名，例如“Slider”。\n\
  2.  在导航器面板中点击 `ContentView` 文件。\n3.  在 `struct ContentView: View` 一行下方添加以下 `State`\
  \ 变量：\n\n```\n@State var sliderValue = 0.0\n```\n\n4.  在 `var body: some View` 内部创建一个\
  \ `VStack`，并像这样添加一个 `Text` 和一个 `Slider`：\n\n```\nvar body: some View {\n    VStack\
  \ (spacing: 28){\n        Text(\"Slider value = \\(sliderValue)\")\n        Slider(value:\
  \ $sliderValue)\n    }\n}\n```\n\n5.  点击画布面板中的实时预览图标，并左右拖动滑块。请注意，此 `Slider` 的值范围是从\
  \ 0 到 1，作为 `Double` 值显示，即显示十进制数值。\n\n### 更改滑块的颜色\n\n默认情况下，当您向右拖动滑块时，`Slider` 显示为蓝色。如果您想更改该颜色，可以使用\
  \ `.accentColor` 修饰符，如下所示：\n\n```\nSlider(value: $sliderValue)\n    .accentColor(.red)\n\
  ```\n\n### 为滑块定义范围\n\n默认情况下，`Slider` 的值范围是从 0 到 1。然而，您可能希望为 `Slider` 定义不同的范围，例如：\n\
  \n```\nSlider(value: $sliderValue, in: 1...50)\n```\n\n这将 `Slider` 的最小值定义为 1，最大值定义为\
  \ 50。请记住，这些值实际上是十进制值，例如 1.0 到 50.0。\n\n### 为滑块定义步进增量\n\n如果 `Slider` 的范围大于 1，拖动滑块将使其以\
  \ 1 为单位增减。要为 `Slider` 定义不同的增减值，您需要定义一个 `step:` 参数，例如：\n\n```\nSlider(value: $sliderValue,\
  \ in: 1...50, step: 4)\n```\n\n这定义了 `Slider` 按 4 来改变值，例如从 1 到 5 再到 9。\n\n### 在滑块上显示最小值和最大值标签\n\
  \n为了让 `Slider` 更易于理解，您可以在 `Slider` 的两端显示最小值和最大值标签。这样，您可以明确显示 `Slider` 的最小值和最大值可能是什么，例如：\n\
  \n```\nSlider(value: $sliderValue, in: 1...50, step: 4) {\n    Text(\"Slider\")\n\
  } minimumValueLabel: {\n    Text(\"1\")\n} maximumValueLabel: {\n    Text(\"50\"\
  )\n}\n```\n\n这定义了一个 `Slider`，其最左侧显示 1，最右侧显示 50，如图 9-4 所示。\n\n![../images/329781_6_En_9_Chapter/329781_6_En_9_Fig4_HTML.jpg](img/329781_6_En_9_Fig4_HTML.jpg)\n\
  \n**图 9-4** 在滑块上显示最小值和最大值标签\n\n> **注意：** `minimumValueLabel` 和 `maximumValueLabel`\
  \ 仅在 iOS 15.0 或更高版本中可用。\n\n要了解所有这些不同的 `Slider` 如何工作，请如下所示编辑 `ContentView` 文件：\n\n\
  ```\nimport SwiftUI\n\n@available(iOS 15.0, *)\nstruct ContentView: View {\n   \
  \ @State var sliderValue = 0.0\n\n    var body: some View {\n        VStack (spacing:\
  \ 28){\n            Text(\"Slider value = \\(sliderValue)\")\n            Slider(value:\
  \ $sliderValue)\n                .padding()\n            Slider(value: $sliderValue,\
  \ in: 1...50)\n                .padding()\n            Slider(value: $sliderValue,\
  \ in: 1...50, step: 4)\n                .padding()\n            Slider(value: $sliderValue,\
  \ in: 1...50, step: 4) {\n                Text(\"Slider\")\n            } minimumValueLabel:\
  \ {\n                Text(\"1\")\n            } maximumValueLabel: {\n         \
  \       Text(\"50\")\n            }.padding()\n        }\n    }\n}\n\n@available(iOS\
  \ 15.0, *)\nstruct ContentView_Previews: PreviewProvider {\n    static var previews:\
  \ some View {\n        ContentView()\n    }\n}\n```\n\n确保你还在 `____App` 文件中添加了 `@available(iOS\
  \ 15.0, *)` 一行，例如：\n\n```\nimport SwiftUI\n\n@available(iOS 15.0, *)\n@main\nstruct\
  \ Slider_Chapter_9App: App {\n    var body: some Scene {\n        WindowGroup {\n\
  \            ContentView()\n        }\n    }\n}\n```\n\n当你运行这个项目时，顶部的 `Slider` 值范围是从\
  \ 0 到 1。这意味着当你拖动其他 `Slider` 时，顶部的 `Slider` 会立即移动到最右侧。这是因为顶部的 `Slider` 最大只能为 1，而其他滑块的值范围是从\
  \ 1 到 50。所以拖动其他 `Slider` 总是会将顶部的 `Slider` 固定到最右侧，以表示其能表示的最大值 1。\n\n## 总结\n\n当你的应用需要用户输入数值数据时，文本字段虽然可行，但可能比较笨拙，尤其是当你只想接受有限范围的数值时。为了便于输入数值数据，请使用\
  \ `Stepper` 或 `Slider`。\n\n`Stepper` 和 `Slider` 都可以定义最小值和最大值，这样用户就无法输入低于最小值或高于最大值的数值数据。`Stepper`\
  \ 和 `Slider` 都允许你定义除 1 以外的不同增减值。\n\n`Stepper` 占用的空间较小，但 `Slider` 通过简单的左右拖动滑块，能更方便地从一个极端值快速切换到另一个极端值。\n\
  \n通过使用 `Stepper` 和 `Slider`，你可以让用户轻松输入数值数据。通过使用 `Toggle`（开关），你可以让用户轻松地在恰好两个选项之间进行选择，例如开/关或是/否。`Stepper`、`Slider`\
  \ 和 `Toggle` 只是让用户更容易仅输入有效数据。\n\n\n\n"
- "# 10. 通过链接和菜单提供选项\n\n曾几何时，应用程序只需按钮就能让用户选择命令。随着 iPhone 和 iPad 应用日益复杂，为用户提供其他选择命令方式的需求也随之增长。两种常见的用于展示命令供用户选择的组件是\
  \ **链接**（Link）和 **菜单**（Menu）。\n\n`Link` 类似于 `Button`，不同之处在于它会打开浏览器来显示网站内容。`Menu`\
  \ 让你可以显示一个选项列表，其中也可以包含子菜单，如图 10-1 所示。\n\n![../images/329781_6_En_10_Chapter/329781_6_En_10_Fig1_HTML.jpg](img/329781_6_En_10_Fig1_HTML.jpg)\n\
  \n*图 10-1* —— 菜单显示包含子菜单在内的选项列表\n\n## 使用链接\n\n`Link` 提供了一种便捷的方式，让用户能够从应用内部访问网站。一个\
  \ `Link` 定义了一个网站地址，例如：\n\n```\nLink(destination: URL(string: \"https://www.apple.com\"\
  )! ) {\n    Text(\"Apple\")\n}\n```\n\n`Text` 视图定义了链接上显示的文本。你可以对这个 `Text` 视图应用任何你想要的修饰符，例如定义字体或背景颜色。\n\
  \n`Link` 必须将 `destination` 定义为一个 `URL`。确保网站地址准确无误的一种方法是访问目标网站，然后从浏览器中复制其地址，再粘贴到你的\
  \ Swift 代码中。\n\n> **注意：** 要测试 `Link` 能否成功加载网站地址，你需要在模拟器或实际的 iOS 设备上运行项目。画布窗格（Canvas\
  \ pane）无法像模拟器或 iOS 设备那样打开 Safari 浏览器。\n\n## 使用菜单\n\n有时候，你可能想为用户提供多个选择。在屏幕上塞满多个 `Button`\
  \ 会显得笨拙，就连分段控件也可能过于局限。当你需要在有限的空间内显示多个选项时，就可以使用 `Menu`。\n\n`Menu` 在用户界面上表现为一个 `Button`。当用户点击它时，`Menu`\
  \ 会显示一个选项列表（见图 10-1）。然后用户可以选择一个选项，或打开另一个子菜单来查看更多选项。菜单使得在有限的空间内隐藏多个选项变得容易。\n\n最简单的\
  \ `Menu` 由一个标题和一个由 `Button` 定义的选项列表组成，如下所示：\n\n```\nMenu(\"Options\") {\n    Button(\"\
  Open \", action: openFile)\n    Button(\"Find\", action: findFile)\n    Button(\"\
  Delete...\", action: deleteFile)\n}\n```\n\n上述代码会在屏幕上显示一个显示着 \"Options\" 字样的 `Menu`。当用户点击\
  \ \"Options\" 时，会弹出一个菜单，列出三个选项：Open、Find 和 Delete...，如图 10-2 所示。\n\n![../images/329781_6_En_10_Chapter/329781_6_En_10_Fig2_HTML.jpg](img/329781_6_En_10_Fig2_HTML.jpg)\n\
  \n*图 10-2* —— 菜单在下拉列表中显示按钮列表\n\n当用户点击某个 `Button` 时，该 `Button` 会调用一个函数，例如 `openFile`、`findFile`\
  \ 或 `deleteFile`。请注意，这些函数调用并不包含参数列表，例如 `openFile()`。若要了解如何创建一个简单的菜单，请遵循以下步骤：\n\n\
  1. 创建一个新的 SwiftUI iOS 应用项目，并为其命名，例如 \"MenuSimple\"。\n2. 在导航窗格中点击 `ContentView` 文件。\n\
  3. 在 `struct ContentView: View` 代码行下方添加以下 `State` 变量：\n   - 在 `var body: some View`\
  \ 代码行下创建一个 `VStack`。\n   - 在 `VStack` 内部创建一个 `Text` 视图、`Menu` 和 `Spacer()`，如下所示：\n\
  \n```\nstruct ContentView: View {\n    @State var message = \"\"\n    \n    var\
  \ body: some View {\n        VStack {\n            Text(message)\n             \
  \   .padding()\n            Menu(\"Options\") {\n                Button(\"Open \"\
  , action: openFile)\n                Button(\"Find\", action: findFile)\n      \
  \          Button(\"Delete...\", action: deleteFile)\n            }\n          \
  \  Spacer()\n        }\n    }\n}\n```\n\n所有三个 `Button` 都会调用函数来执行操作。因此，我们需要创建函数来使这些\
  \ `Button` 生效。\n\n4. 在 `struct ContentView: View` 中最后一个花括号的上方，添加以下三个函数：\n\n```\n\
  func openFile() {\n    message = \"Open chosen\"\n}\nfunc findFile() {\n    message\
  \ = \"Find chosen\"\n}\nfunc deleteFile() {\n    message = \"Delete chosen\"\n}\n\
  ```\n\n完整的 `ContentView` 文件应如下所示：\n\n5. 点击画布窗格中的“实时预览”图标。\n6. 点击模拟 iOS 设备中间的 Options\
  \ 按钮。会弹出一个菜单，列出由三个 `Button` 视图定义的三个选项：Open、Find 和 Delete...\n7. 点击任意选项。请注意，无论你选择哪个选项，它都会在\
  \ `Menu` 上方的 `Text` 视图中显示略有不同的消息。\n\n```\nimport SwiftUI\n\nstruct ContentView:\
  \ View {\n    @State var message = \"\"\n    \n    var body: some View {\n     \
  \   VStack {\n            Text(message)\n                .padding()\n          \
  \  Menu(\"Options\") {\n                Button(\"Open \", action: openFile)\n  \
  \              Button(\"Find\", action: findFile)\n                Button(\"Delete...\"\
  , action: deleteFile)\n            }\n            Spacer()\n        }\n    }\n \
  \   \n    func openFile() {\n        message = \"Open chosen\"\n    }\n    \n  \
  \  func findFile() {\n        message = \"Find chosen\"\n    }\n    \n    func deleteFile()\
  \ {\n        message = \"Delete chosen\"\n    }\n}\n\nstruct ContentView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
  \    }\n}\n```\n\n请注意，`Menu` 中的每个 `Button` 都调用由 `action:` 参数定义的函数。除了调用函数，你也可以直接在花括号内包裹一个或多个命令，如下所示：\n\
  \n```\nMenu(\"Options\") {\n    Button(\"Open \", action: {\n        message = \"\
  Open chosen\"\n    })\n    Button(\"Find\", action: {\n        message = \"Find\
  \ chosen\"\n    })\n    Button(\"Delete...\", action: {\n        message = \"Delete\
  \ chosen\"\n    })\n}\n```\n\n### 格式化菜单和按钮上的标题\n\n`Menu` 允许你定义一个看起来像标准 `Button`\
  \ 的标题。然而，如果你想要格式化标题，还有一种替代方式来定义 `Menu`。除了仅定义要显示为标题的文本外，你还可以定义一个 `label:` 参数，在其中使用\
  \ `Text` 或 `Label` 视图，如下所示：\n\n```\nMenu {\n    Button(\"Open \", action: {\n  \
  \      message = \"Open chosen\"\n    })\n    Button(\"Find\", action: {\n     \
  \   message = \"Find chosen\"\n    })\n    Button(\"Delete...\", action: {\n   \
  \     message = \"Delete chosen\"\n    })\n} label: {\n    Text(\"Options\")\n \
  \       .font(.largeTitle)\n        .foregroundColor(.purple)\n        .italic()\n\
  }\n```\n\n此示例使用 `.largeTitle` 字体、紫色和斜体来显示菜单的标题。除了使用 `Text` 视图，你还可以使用 `Label` 视图来并排显示图标和文本，例如：\n\
  \n```\nMenu {\n    Button(\"Open \", action: {\n        message = \"Open chosen\"\
  \n    })\n    Button(\"Find\", action: {\n        message = \"Find chosen\"\n  \
  \  })\n    Button(\"Delete...\", action: {\n        message = \"Delete chosen\"\n\
  \    })\n} label: {\n    Label(\"Options\", systemImage: \"pencil.circle\")\n}\n\
  ```\n\n通过使用 `label:` 参数来定义菜单标题，你可以用多种方式自定义菜单标题。使用上述 `Label` 视图会显示一个带有图标和文本的菜单，如图\
  \ 10-3 所示。\n\n![../images/329781_6_En_10_Chapter/329781_6_En_10_Fig3_HTML.jpg](img/329781_6_En_10_Fig3_HTML.jpg)\n\
  \n*图 10-3* —— 标签视图为菜单标题显示图标和文本\n\n你也可以使用 `Label` 视图而不是 `Text` 视图来格式化 `Button` 标题，如下所示：\n\
  \n```\nMenu {\n    Button(action: {\n        message = \"Open chosen\"\n    }) {\n\
  \        Label(\"Open\", systemImage: \"book\")\n    }\n    Button(action: {\n \
  \       message = \"Find chosen\"\n    }) {\n        Label(\"Find\", systemImage:\
  \ \"magnifyingglass\")\n    }\n    Button(action: {\n        message = \"Delete\
  \ chosen\"\n    }) {\n        Label(\"Delete\", systemImage: \"trash\")\n    }\n\
  } label: {\n    Label(\"Options\", systemImage: \"pencil.circle\")\n}\n```\n\n上述代码显示的菜单列表如图\
  \ 10-4 所示。\n\n![../images/329781_6_En_10_Chapter/329781_6_En_10_Fig4_HTML.jpg](img/329781_6_En_10_Fig4_HTML.jpg)\n\
  \n*图 10-4* —— 使用标签视图在菜单列表中显示按钮\n\n\n\n### 添加子菜单\n\n一个`Menu`可以显示由`Button`定义的选项列表。然而，`Menu`也可以显示列出附加相关命令的子菜单，如图\
  \ 10-5 所示。\n\n![../images/329781_6_En_10_Chapter/329781_6_En_10_Fig5_HTML.jpg](img/329781_6_En_10_Fig5_HTML.jpg)\n\
  \n**图 10-5** 显示子菜单\n\n要创建子菜单，只需定义另一个`Menu`而不是`Button`。然后在子菜单中包含额外的`Button`，如下所示：\n\
  \n```swift\nMenu(\"选项\") {\n    Button(\"打开\", action: openFile)\n    Button(\"\
  查找\", action: findFile)\n    Button(\"删除...\", action: deleteFile)\n    Menu(\"\
  子菜单\") {\n        Button(\"复制格式\", action: copyFormat)\n        Button(\"粘贴格式\"\
  , action: pasteFormat)\n    }\n}\n```\n\n**注意** 可以在子菜单中创建子菜单。作为一般规则，建议只使用一级子菜单，否则过多的选项列表可能会让用户感到混乱。\n\
  \n要了解子菜单的工作方式，请按照以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS 应用项目，并为其指定任意名称，例如`\"Submenu\"\
  `。\n2. 在导航窗格中点击`ContentView`文件。\n3. 编辑`ContentView`文件，使其全部内容如下所示：\n\n![../images/329781_6_En_10_Chapter/329781_6_En_10_Fig6_HTML.jpg](img/329781_6_En_10_Fig6_HTML.jpg)\n\
  \n**图 10-6** `➤`符号标识一个子菜单\n\n4. 在画布窗格上点击实时预览图标。\n5. 点击由`Menu`定义的选项。这将显示一个选项列表，其中包括由`➤`符号标识的子菜单，如图\
  \ 10-6 所示。\n\n```swift\nimport SwiftUI\nstruct ContentView: View {\n    @State var\
  \ message = \"\"\n    var body: some View {\n        VStack {\n            Text(message)\n\
  \                .padding()\n            Menu(\"选项\") {\n                Button(\"\
  打开\", action: openFile)\n                Button(\"查找\", action: findFile)\n    \
  \            Button(\"删除...\", action: deleteFile)\n                Menu(\"子菜单\"\
  ) {\n                    Button(\"复制格式\", action: copyFormat)\n                \
  \    Button(\"粘贴格式\", action: pasteFormat)\n                }\n            }\n \
  \           Spacer()\n        }\n    }\n    func openFile() {\n        message =\
  \ \"已选择打开\"\n    }\n    func findFile() {\n        message = \"已选择查找\"\n    }\n\
  \    func deleteFile() {\n        message = \"已选择删除\"\n    }\n    func copyFormat()\
  \ {\n        message = \"已选择复制格式\"\n    }\n    func pasteFormat() {\n        message\
  \ = \"已选择粘贴格式\"\n    }\n}\nstruct ContentView_Previews: PreviewProvider {\n    static\
  \ var previews: some View {\n        ContentView()\n    }\n}\n```\n\n6. 点击子菜单，查看出现的额外选项列表。\n\
  \n子菜单可以轻松地将相关选项分组，但由于这些选项最初是隐藏的，请谨慎使用子菜单，以免让用户感到困惑。\n\n## 总结\n\n`Link`和`Menu`是用户界面提供选项供用户选择的两种额外方式。`Link`会打开浏览器并跳转到特定网站。`Menu`则显示由`Button`和其他定义子菜单的`Menu`组成的选项列表。\n\
  \n通过在`Menu`中使用`Label`视图，可以将图标和文本并排组合。通过在`Menu`中使用`Text`视图，可以自定义用户界面中显示的文本外观，例如选择字体或颜色。`Menu`提供了一种在不占用大量屏幕空间的情况下向用户显示多个选项的方法。\n\
  \n"
- "# 11. 触摸手势\n\n允许用户通过`Button`、`Toggle`或`Menu`来控制应用程序很方便，但这些控件都会占用屏幕空间。为了消除用户界面上多余的对象，应用程序还可以检测并响应触摸手势，从而允许直接操作屏幕上显示的项目。\n\
  \niOS 应用可以检测并响应的不同类型的触摸手势包括：\n\n- **轻点** – 指尖触碰屏幕然后抬起。\n- **捏合** – 两个指尖合拢或分开。\n\
  - **旋转** – 两个指尖以圆形运动向左或向右旋转。\n- **平移** – 指尖以拖拽动作在屏幕上滑动。\n- **轻扫** – 指尖在屏幕上向上、向下、向左或向右滑动然后抬起。\n\
  - **长按** – 指尖触碰并按住屏幕。\n\n你可以将触摸手势应用于任何视图，例如`Image`、`Text`视图，或像`Rectangle`或`Ellipse`这样的形状。\n\
  \n## 检测轻点手势\n\n轻点手势仅仅是检测用户何时点击屏幕。默认情况下，轻点手势识别单指的单次轻点，但你可以定义由两个或多个手指进行的多次轻点。\n\n\
  要了解如何检测轻点手势，请按照以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS 应用项目，并为其指定任意名称，例如`\"TapGesture\"\
  `。\n2. 在导航窗格中点击`ContentView`文件。\n3. 在`struct ContentView: View`这一行下添加以下状态变量：\n\n\
  ```swift\nstruct ContentView: View {\n    @State var changeMe = false\n```\n\n4.\
  \ 在`body`内部添加一个`VStack`以及一个`Rectangle`，如下所示：\n\n```swift\nvar body: some View {\n\
  \    VStack {\n        Rectangle()\n            .frame(width: 175, height: 125)\n\
  \            .foregroundColor(changeMe ? .red : .yellow)\n            .onTapGesture\
  \ {\n                changeMe.toggle()\n            }\n    }\n}\n```\n\n这将创建一个填满整个屏幕的`Rectangle`。然后`.frame`修饰符将其宽度限制为\
  \ 175，高度限制为 125。`.foregroundColor`修饰符使用`changeMe`状态变量来决定将矩形着色为红色还是黄色。\n\n`.onTapGesture`修饰符使矩形能够检测单次轻点手势。当检测到轻点手势时，它会将`changeMe`状态变量的值从`true`切换为`false`（或`false`切换为`true`）。整个`ContentView`文件应如下所示：\n\
  \n5. 在画布窗格上点击实时预览图标，然后点击矩形。注意，每次点击矩形时，`.onTapGesture`修饰符都会切换`changeMe`状态变量，这会使矩形的颜色在红色和黄色之间交替。\n\
  \n```swift\nimport SwiftUI\nstruct ContentView: View {\n    @State var changeMe\
  \ = false\n    var body: some View {\n        VStack {\n            Rectangle()\n\
  \                .frame(width: 175, height: 125)\n                .foregroundColor(changeMe\
  \ ? .red : .yellow)\n                .onTapGesture {\n                    changeMe.toggle()\n\
  \                }\n        }\n    }\n}\nstruct ContentView_Previews: PreviewProvider\
  \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
  \n默认情况下，`.onTapGesture`修饰符检测单次轻点手势。如果你想检测多次轻点，例如双击或三击，可以像这样定义`count:`参数：\n\n```swift\n\
  .onTapGesture(count: 2)\n```\n\n值为 2 表示双击，而值为 3 则表示三击。\n\n\n\n## 检测长按手势\n\n长按手势发生在用户将一根或多根手指按住屏幕固定时间，且手指没有明显移动时。要定义长按，你可以修改以下属性：\n\
  \n- `minimumDuration` – 定义一根或多根手指需按下屏幕多久才能识别为长按\n- `maximumDistance` – 定义手指在长按手势失败前允许移动的最大距离\n\
  \n最简单的 `.onLongPressGesture` 修饰符如下所示：\n\n```\n.onLongPressGesture {\n//  要运行的代码\n\
  }\n```\n\n如果需要，你可以像这样添加 `minimumDuration:` 和 `maximumDistance:` 参数：\n\n```\n.onLongPressGesture(minimumDuration:\
  \ 3, maximumDistance: 2) {\n//  要运行的代码\n}\n```\n\n上述版本的 `.onLongPressGesture` 修饰符强制用户至少按住三秒钟。如果你希望在用户按下时执行某些操作，可以使用\
  \ `pressing:` 参数，如下所示：\n\n```\n.onLongPressGesture(minimumDuration: 2, maximumDistance:\
  \ 2, pressing: {stillPressed in\n//  在长按发生时运行的代码\n}) {\n//  检测到长按手势后运行的代码\n}\n```\n\
  \n如需了解如何检测长按手势，请按照以下步骤操作：\n\n1. 新建一个 SwiftUI iOS App 项目，并为其任意命名，例如 \"LongPressGesture\"\
  。\n2. 在导航器面板中点击 `ContentView` 文件。\n3. 在 `struct ContentView: View` 行下方添加以下 State\
  \ 变量：\n4. 在 body 中添加一个 `VStack` 以及一个 `Text` 视图，如下所示：\n\n```\nstruct ContentView:\
  \ View {\n@State var changeMe = false\n@State var message = \"\"\n```\n\n5. 在 `Text`\
  \ 视图下方添加一个 `Rectangle`：\n\n```\nvar body: some View {\nVStack {\nText(message)\n\
  }\n}\n```\n\n6. 为 `Rectangle` 添加 `.onLongPressGesture` 修饰符，如下所示：\n\n```\nRectangle()\n\
  .frame(width: 175, height: 125)\n.foregroundColor(changeMe ? .red : .yellow)\n```\n\
  \n```\n.onLongPressGesture(minimumDuration: 2, maximumDistance: 2, pressing: {stillPressed\
  \ in\nmessage = \"正在进行长按: \\(stillPressed)\"\n}) {\nchangeMe.toggle()\n}\n```\n\n\
  `pressing:` 参数在长按手势进行时显示 `true`，在长按手势完成后立即显示 `false`。一旦长按手势完成，它会将 State 变量 `changeMe`\
  \ 从 `false` 切换为 `true`（或从 `true` 切换为 `false`）。\n\n完整的 `ContentView` 文件应如下所示：\n\n\
  7. 在画布面板中点击实时预览图标。\n8. 将鼠标指针移到矩形上，按住鼠标左键模拟按压手势。注意 `Text` 视图会显示 \"正在进行长按: true\"\
  。\n9. 持续按住鼠标左键，直到矩形改变颜色。这表明已达到 2 秒的 `minimumDuration` 并且长按手势已被识别。\n\n```\nimport\
  \ SwiftUI\nstruct ContentView: View {\n@State var changeMe = false\n@State var message\
  \ = \"\"\nvar body: some View {\nVStack {\nText(message)\nRectangle()\n.frame(width:\
  \ 175, height: 125)\n.foregroundColor(changeMe ? .red : .yellow)\n.onLongPressGesture(minimumDuration:\
  \ 2, maximumDistance: 2, pressing: {stillPressed in\nmessage = \"正在进行长按: \\(stillPressed)\"\
  \n}) {\nchangeMe.toggle()\n}\n}\n}\n}\nstruct ContentView_Previews: PreviewProvider\
  \ {\nstatic var previews: some View {\nContentView()\n}\n}\n```\n\n## 检测缩放手势\n\n\
  缩放手势（也称为捏合手势）发生在用户用两根手指按住屏幕，然后分开或合拢手指时。这种缩放手势通常出现在用户想要放大图片或缩小以查看更多内容（例如地图的全景视图）时。\n\
  \n由于缩放手势会改变视图的大小，你需要定义两个 State 变量来表示当前大小和最终大小，数据类型为 `CGFloat`，如下所示：\n\n```\n@State\
  \ private var tempValue: CGFloat = 0\n@State private var finalValue: CGFloat = 1\n\
  ```\n\n要调整视图大小，缩放手势需要与你要调整大小的视图上的 `.scaleEffect` 修饰符配合使用，例如：\n\n```\nImage(systemName:\
  \ \"star.fill\")\n.font(.system(size: 200))\n.foregroundColor(.green)\n.scaleEffect(finalValue\
  \ + tempValue)\n```\n\n然后，你需要使用缩放手势为要调整大小的视图附加 `.gesture` 修饰符，如下所示：\n\n```\n.gesture(\n\
  )\n```\n\n在 `.gesture` 修饰符的括号内，你需要定义缩放手势。你需要在缩放手势变化时以及最终结束时进行检测，如下所示：\n\n```\n.gesture(\n\
  MagnificationGesture()\n.onChanged { amount in\n//  要运行的代码\n}\n.onEnded { amount\
  \ in\n//  要运行的代码\n}\n)\n```\n\n`.onChanged` 修饰符测量用户将两根手指分开或合拢的距离。`.onEnded` 修饰符在用户将两根手指都抬起离开屏幕，结束缩放手势时，测量两根手指之间的距离。\n\
  \n如需了解如何检测缩放手势，请按照以下步骤操作：\n\n1. 新建一个 SwiftUI iOS App 项目，并为其任意命名，例如 \"MagnificationGesture\"\
  。\n2. 在导航器面板中点击 `ContentView` 文件。\n3. 在 `struct ContentView: View` 行下方添加以下 State\
  \ 变量：\n4. 在 body 中添加一个带有 `Image` 的 `VStack`，如下所示：\n\n```\nstruct ContentView: View\
  \ {\n@State private var tempValue: CGFloat = 0\n@State private var finalValue: CGFloat\
  \ = 1\n```\n\n```\nvar body: some View {\nVStack {\nImage(systemName: \"star.fill\"\
  )\n.font(.system(size: 200))\n.foregroundColor(.green)\n.scaleEffect(finalValue\
  \ + tempValue)\n}\n}\n```\n\n这将在 `Image` 视图中显示一颗星号，字体大小为 200，颜色为绿色。注意 `.scaleEffect`\
  \ 修饰符将星型图片的大小定义为两个 State 变量的组合值。大小为 1 代表图片的当前大小，较小的值会缩小图片，较大的值会放大图片。\n\n5. 为 `Image`\
  \ 添加一个 `.gesture` 修饰符，因为我们希望使用缩放手势来调整其大小，如下所示：\n\n```\nvar body: some View {\nVStack\
  \ {\nImage(systemName: \"star.fill\")\n.font(.system(size: 200))\n.foregroundColor(.green)\n\
  .scaleEffect(finalValue + tempValue)\n.gesture(\n)\n}\n}\n```\n\n这使得 `Image` 视图能够识别手势。现在，我们只需定义要识别的手势即可。\n\
  \n6. 在 `.gesture ()` 括号内添加 `MagnificationGesture`，并同时定义 `.onChanged` 和 `.onEnded`\
  \ 修饰符，如下所示：\n\n```\nvar body: some View {\nVStack {\nImage(systemName: \"star.fill\"\
  )\n.font(.system(size: 200))\n.foregroundColor(.green)\n.scaleEffect(finalValue\
  \ + tempValue)\n.gesture(\nMagnificationGesture()\n.onChanged { amount in\ntempValue\
  \ = amount - 1\n}\n.onEnded { amount in\nfinalValue += tempValue\ntempValue = 0\n\
  }\n)\n}\n}\n```\n\n`.onChanged` 修饰符测量两根手指之间的距离，并减去 1 来计算 `tempValue` State 变量的值。如果用户将两根手指分开，`amount`\
  \ 的值会大于 1，因此减去 1 后剩下的值就是调整 `Image` 大小所需的增量。\n\n`.onEnded` 修饰符使用用户两根手指最后定义的距离，并将该值存储到\
  \ `finalValue` State 变量中。然后将 `tempValue` State 值重置为 0。\n\n完整的 `ContentView` 文件应如下所示：\n\
  \n\n\n![../images/329781_6_En_11_Chapter/329781_6_En_11_Fig1_HTML.jpg](img/329781_6_En_11_Fig1_HTML.jpg)\n\
  \n**图 11-1** – 在画布面板中模拟双指按压手势\n\n1.  点击画布面板上的 **Live Preview** 图标。\n2.  按住 **Option**\
  \ 键，并点击画布面板中显示的模拟 iOS 设备屏幕。按住 **Option** 键的同时点击鼠标左键，会显示两个灰色圆圈，模拟用两个指尖按压屏幕，如图 11-1\
  \ 所示。\n\n```\nimport SwiftUI\nstruct ContentView: View {\n@State private var tempValue:\
  \ CGFloat = 0\n@State private var finalValue: CGFloat = 1\nvar body: some View {\n\
  VStack {\nImage(systemName: \"star.fill\")\n.font(.system(size: 200))\n.foregroundColor(.green)\n\
  .scaleEffect(finalValue + tempValue)\n.gesture(\nMagnificationGesture()\n.onChanged\
  \ { amount in\ntempValue = amount - 1\n}\n.onEnded { amount in\nfinalValue += tempValue\n\
  tempValue = 0\n}\n)\n}\n}\n}\nstruct ContentView_Previews: PreviewProvider {\nstatic\
  \ var previews: some View {\nContentView()\n}\n}\n```\n\n3.  按住 **Option** 键不放，拖动鼠标以模拟两个指尖靠近或远离的动作。注意，当拖动鼠标时，星星图像会按比例缩小或放大，以响应缩放手势。\n\
  \n## 检测旋转手势\n\n旋转手势与缩放手势类似，因为它们都使用两个指尖。主要区别在于，旋转手势检测的是两个指尖以顺时针或逆时针方向做圆周运动。\n\n由于缩放手势会改变视图的角度，你需要定义一个\
  \ `State` 变量，用于以 `Double` 数据类型测量旋转角度，如下所示：\n\n```\n@State private var degree = 0.0\n\
  ```\n\n要旋转一个视图，旋转手势需要与要旋转视图上的 `.rotationEffect` 修饰符配合使用，例如：\n\n```\nImage(systemName:\
  \ \"star.fill\")\n.font(.system(size: 200))\n.foregroundColor(.green)\n.rotationEffect(Angle.degrees(degree))\n\
  ```\n\n然后，你需要使用旋转手势将要旋转的视图附加 `.gesture` 修饰符，如下所示：\n\n```\n.gesture(\n)\n```\n\n\
  在 `.gesture` 修饰符的括号内，你可以定义旋转手势并检测其变化，如下所示：\n\n```\n.gesture(\nRotationGesture()\n\
  .onChanged({ angle in\ndegree = angle.degrees\n})\n)\n```\n\n`.onChanged` 修饰符用于测量用户以顺时针或逆时针方向旋转两个指尖的角度。要了解如何检测旋转手势，请按照以下步骤操作：\n\
  \n1.  创建一个新的 SwiftUI iOS App 项目，并为其指定任意名称，例如 \"RotationGesture\"。\n2.  在导航器面板中点击\
  \ **ContentView** 文件。\n3.  在 `struct ContentView: View` 行下方添加以下 `State` 变量：\n\n\
  ```\n@State private var degree = 0.0\n```\n\n4.  在 `body` 内部添加一个包含 `Image` 的 `VStack`，如下所示：\n\
  \n```\nvar body: some View {\nVStack {\nImage(systemName: \"star.fill\")\n.font(.system(size:\
  \ 200))\n.foregroundColor(.green)\n.rotationEffect(Angle.degrees(degree))\n}\n}\n\
  ```\n\n这定义了一个 `Image` 视图，用于显示一颗字号为 200、颜色为绿色的星星。然后，它使用 `.rotationEffect` 修饰符来旋转该\
  \ `Image`。\n\n5.  为 `Image` 添加一个 `.gesture` 修饰符，因为我们要使用旋转手势来旋转它，如下所示：\n\n```\nvar\
  \ body: some View {\nVStack {\nImage(systemName: \"star.fill\")\n.font(.system(size:\
  \ 200))\n.foregroundColor(.green)\n.rotationEffect(Angle.degrees(degree))\n.gesture(\n\
  )\n}\n}\n```\n\n6.  在 `.gesture()` 括号内添加 `RotationGesture`，并定义一个 `.onChanged` 修饰符，如下所示：\n\
  \n```\nvar body: some View {\nVStack {\nImage(systemName: \"star.fill\")\n.font(.system(size:\
  \ 200))\n.foregroundColor(.green)\n.rotationEffect(Angle.degrees(degree))\n.gesture(\n\
  RotationGesture()\n.onChanged({ angle in\ndegree = angle.degrees\n})\n)\n}\n}\n\
  ```\n\n`.onChanged` 修饰符测量用户在屏幕上以双指手势旋转的角度。整个 `ContentView` 文件应如下所示：\n\n```\nvar\
  \ body: some View {\nVStack {\nImage(systemName: \"star.fill\")\n.font(.system(size:\
  \ 200))\n.foregroundColor(.green)\n.rotationEffect(Angle.degrees(degree))\n.gesture(\n\
  RotationGesture()\n.onChanged({ angle in\ndegree = angle.degrees\n})\n)\n}\n}\n\
  ```\n\n7.  点击画布面板中的 **Live Preview** 图标。\n8.  按住 **Option** 键，并点击画布面板中显示的绿色星星内部。按住\
  \ **Option** 键的同时点击鼠标左键，会显示两个灰色圆圈，模拟用两个指尖按压屏幕（见图 11-1）。\n9.  按住 **Option** 键不放，拖动鼠标以模拟两个指尖旋转的动作。注意，当拖动鼠标时，星星图像会旋转以响应旋转手势。\n\
  \n```\nimport SwiftUI\nstruct ContentView: View {\n@State private var degree = 0.0\n\
  var body: some View {\nVStack {\nImage(systemName: \"star.fill\")\n.font(.system(size:\
  \ 200))\n.foregroundColor(.green)\n.rotationEffect(Angle.degrees(degree))\n.gesture(\n\
  RotationGesture()\n.onChanged({ angle in\ndegree = angle.degrees\n})\n)\n}\n}\n\
  }\nstruct ContentView_Previews: PreviewProvider {\nstatic var previews: some View\
  \ {\nContentView()\n}\n}\n```\n\n\n\n## 检测拖动手势\n\n拖动手势发生在用户按下手指并在屏幕上滑动指尖时。拖动手势通常会将屏幕上的某个项目移动到新位置。\n\
  \n由于拖动手势会改变视图的位置，你需要定义一个 `State` 变量，用于将位置测量为一个 `CGPoint`，如下所示：\n\n```\n@State private\
  \ var circlePosition = CGPoint(x: 50, y: 50)\n```\n\n要移动视图，拖动手势需要与你要旋转的视图上的 `.position`\
  \ 修饰符配合使用，例如：\n\n```\nCircle()\n.fill(Color.blue)\n.frame(width: 100, height: 100)\n\
  .position(circlePosition)\n```\n\n然后，你需要将 `.gesture` 修饰符附加到你要使用拖动手势移动的视图上，如下所示：\n\
  \n```\n.gesture(\n)\n```\n\n在 `.gesture` 修饰符的括号内，你可以定义拖动手势并检测其变化，如下所示：\n\n```\n\
  .gesture(DragGesture()\n.onChanged({ value in\n//  要运行的代码\n}))\n```\n\n`.onChanged`\
  \ 修饰符测量用户在屏幕上拖动指尖的距离。要了解如何检测拖动手势，请按照以下步骤操作：\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如\
  \ `\"DragGesture\"`。\n\n2.  在导航器窗格中点击 `ContentView` 文件。\n\n3.  在 `struct ContentView:\
  \ View` 行下方添加以下 `State` 变量：\n\n4.  在 body 中添加一个包含 `Text` 视图和 `Circle` 的 `VStack`，如下所示：\n\
  \n```\nstruct ContentView: View {\n@State private var circlePosition = CGPoint(x:\
  \ 50, y: 50)\n@State private var circleLabel = \"50, 50\"\n```\n\n```\nvar body:\
  \ some View {\nVStack {\nText(circleLabel)\n.padding()\nCircle()\n.fill(Color.blue)\n\
  .frame(width: 100, height: 100)\n.opacity(0.8)\n.position(circlePosition)\n}\n}\n\
  ```\n\n这定义了一个显示 `circleLabel` 状态变量内容的 `Text` 视图，并定义了一个蓝色的 `Circle`。这个 `Circle` 使用\
  \ `.position` 修饰符与拖动手势配合工作。\n\n5.  为 `Circle` 添加一个 `.gesture` 修饰符，因为这是我们要使用拖动手势移动的对象，如下所示：\n\
  \n6.  在 `.gesture()` 括号内添加 `DragGesture`，并定义一个 `.onChanged` 修饰符，如下所示：\n\n```\nvar\
  \ body: some View {\nVStack {\nText(circleLabel)\n.padding()\nCircle()\n.fill(Color.blue)\n\
  .frame(width: 100, height: 100)\n.opacity(0.8)\n.position(circlePosition)\n.gesture(\n\
  )\n}\n}\n```\n\n```\nvar body: some View {\nVStack {\nText(circleLabel)\n.padding()\n\
  Circle()\n.fill(Color.blue)\n.frame(width: 100, height: 100)\n.opacity(0.8)\n.position(circlePosition)\n\
  .gesture(DragGesture()\n.onChanged({ value in\ncirclePosition = value.location\n\
  circleLabel = \"\\(Int(value.location.x)), \\(Int(value.location.y))\"\n}))\n}\n\
  }\n```\n\n`.onChanged` 修饰符测量用户指尖在屏幕上的位置。然后将 x 和 y 位置值存储到 `circleLabel` 中，以显示在 `Text`\
  \ 视图内。整个 `ContentView` 文件应如下所示：\n\n7.  在画布窗格中点击 Live Preview 图标。\n\n8.  将鼠标指针移到画布窗格中模拟\
  \ iOS 设备上的 `Circle` 上，然后拖动鼠标。注意，当你拖动鼠标时，`Text` 视图会不断更新 `Circle` 的 x 和 y 位置。\n\n\
  ```\nimport SwiftUI\nstruct ContentView: View {\n@State private var circlePosition\
  \ = CGPoint(x: 50, y: 50)\n@State private var circleLabel = \"50, 50\"\nvar body:\
  \ some View {\nVStack {\nText(circleLabel)\n.padding()\nCircle()\n.fill(Color.blue)\n\
  .frame(width: 100, height: 100)\n.opacity(0.8)\n.position(circlePosition)\n.gesture(DragGesture()\n\
  .onChanged({ value in\ncirclePosition = value.location\ncircleLabel = \"\\(Int(value.location.x)),\
  \ \\(Int(value.location.y))\"\n}))\n}\n}\n}\nstruct ContentView_Previews: PreviewProvider\
  \ {\nstatic var previews: some View {\nContentView()\n}\n}\n```\n\n## 定义优先级与同时手势\n\
  \n你可以向任何视图添加触摸手势。由于栈本身也是一个视图，这意味着你也可以向 `VStack`、`HStack` 和 `ZStack` 添加触摸手势。如果你向栈内的一个视图添加了一个手势，然后又向栈本身添加了第二个相同的手势，哪个手势会被识别？\n\
  \n当一个手势修改整个栈时，该栈内的每个视图都可以识别该手势。但是，如果该栈内的某个视图有自己的手势修饰符，那么该视图的手势修饰符将优先被识别。要了解其工作原理，请按照以下步骤操作：\n\
  \n1.  创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如 `\"TwoGestures\"`。\n\n2.  在导航器窗格中点击 `ContentView`\
  \ 文件。\n\n3.  在 `struct ContentView: View` 行下方添加以下 `State` 变量：\n\n4.  在 body 中添加一个包含\
  \ `Text` 视图、`Circle` 和 `Spacer` 的 `VStack`，如下所示：\n\n```\nstruct ContentView: View\
  \ {\n@State var message = \"\"\n```\n\n![../images/329781_6_En_11_Chapter/329781_6_En_11_Fig2_HTML.jpg](img/329781_6_En_11_Fig2_HTML.jpg)\n\
  \n图 11-2  \n创建一个 `VStack`，其中 `Spacer` 将边界推至屏幕底部\n\n5.  这将在顶部创建一个 `Text` 视图，并在其下方创建一个蓝色的\
  \ `Circle`。然后，`Spacer` 将 `VStack` 的边界向下推，并将其背景色设为黄色以便于查看，如图 11-2 所示。\n\n```\nvar\
  \ body: some View {\nVStack {\nText(message)\n.padding()\nCircle()\n.frame(width:\
  \ 125, height: 125)\n.foregroundColor(.blue)\nSpacer()\n}.background(Color.yellow)\n\
  }\n```\n\n6.  为 `Circle` 添加一个 `.onTapGesture` 修饰符，如下所示：\n\n```\nCircle()\n.frame(width:\
  \ 125, height: 125)\n.foregroundColor(.blue)\n.onTapGesture {\nmessage = \"Circle\
  \ tapped\"\n}\n```\n\n当用户点击 `Circle` 时，`message` 状态变量将包含字符串 `\"Circle tapped\"`。\n\
  \n7.  为整个 `VStack` 添加一个 `.onTapGesture` 修饰符，如下所示：\n\n```\nvar body: some View {\n\
  VStack {\nText(message)\n.padding()\nCircle()\n.frame(width: 125, height: 125)\n\
  .foregroundColor(.blue)\n.onTapGesture {\nmessage = \"Circle tapped\"\n}\nSpacer()\n\
  }.background(Color.yellow)\n.onTapGesture {\nmessage = \"VStack tapped\"\n}\n```\n\
  \n如果你点击 `Circle`，`Circle` 的 `.onTapGesture` 修饰符（`\"Circle tapped\"`）将被识别。如果你点击 `VStack`\
  \ 中的任何其他位置，`VStack` 的 `.onTapGesture` 修饰符（`\"VStack tapped\"`）将被识别。整个 `ContentView`\
  \ 文件应如下所示：\n\n8.  点击画布窗格上的 Live Preview 图标，然后点击蓝色的 `Circle`。注意，`Text` 视图中会出现 `\"\
  Circle tapped\"`。尽管 `Circle` 位于 `VStack` 内部，但 `VStack` 的 `.onTapGesture` 修饰符会被忽略。\n\
  \n9.  点击 `VStack` 的黄色背景。注意，`Text` 视图中会出现 `\"VStack tapped\"`。\n\n```\nimport SwiftUI\n\
  struct ContentView: View {\n@State var message = \"\"\nvar body: some View {\nVStack\
  \ {\nText(message)\n.padding()\nCircle()\n.frame(width: 125, height: 125)\n.foregroundColor(.blue)\n\
  .onTapGesture {\nmessage = \"Circle tapped\"\n}\nSpacer()\n}.background(Color.yellow)\n\
  .onTapGesture {\nmessage = \"VStack tapped\"\n}\n}\n}\nstruct ContentView_Previews:\
  \ PreviewProvider {\nstatic var previews: some View {\nContentView()\n}\n}\n```\n\
  \n\n\n### 定义高优先级手势\n\n附加到堆栈内部视图上的手势总会被优先识别，而不是附加到堆栈本身的手势。如果你希望堆栈的手势修饰符优先于其内部视图上的手势修饰符运行，则需要使用\
  \ `.highPriorityGesture` 修饰符。\n\n这个 `.highPriorityGesture` 修饰符只是用来指定哪个手势应具有更高优先级。在此例中，我们希望堆栈的手势修饰符先运行，因此需要将其包裹在\
  \ `.highPriorityGesture` 修饰符中，如下所示：\n\n```\n.highPriorityGesture(\n  TapGesture()\n\
  \    .onEnded { _ in\n      message = \"VStack tapped\"\n    }\n)\n```\n\n注意，`TapGesture`\
  \ 使用 `.onEnded` 修饰符来检测轻点手势何时结束，从而能够将 \"VStack tapped\" 存储到 `message` 状态变量中。\n\n\
  要了解 `.highPriorityGesture` 修饰符的工作原理，请按以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS App 项目，并为其取任意名称，例如\
  \ “HighPriorityGestures”。\n2. 在导航窗格中点击 `ContentView` 文件。\n3. 在 `struct ContentView:\
  \ View` 这一行下方添加以下状态变量：\n4. 在 body 内部添加一个包含 `Text` 视图、`Circle` 和 `Spacer` 的 `VStack`，如下所示：\n\
  \n```\nstruct ContentView: View {\n  @State var message = \"\"\n```\n\n```\nvar\
  \ body: some View {\n  VStack {\n    Text(message)\n      .padding()\n    Circle()\n\
  \      .frame(width: 125, height: 125)\n      .foregroundColor(.blue)\n    Spacer()\n\
  \  }.background(Color.yellow)\n}\n```\n\n1. 为 `Circle` 添加一个 `.onTapGesture` 修饰符，如下所示：\n\
  \n```\nCircle()\n  .frame(width: 125, height: 125)\n  .foregroundColor(.blue)\n\
  \  .onTapGesture {\n    message = \"Circle tapped\"\n  }\n```\n\n通常情况下，当用户轻点 `Circle`\
  \ 时，`message` 状态变量会持有字符串 \"Circle tapped\"。\n\n1. 为整个 `VStack` 添加一个 `.highPriorityGesture`\
  \ 修饰符，如下所示：\n\n```\nvar body: some View {\n  VStack {\n    Text(message)\n     \
  \ .padding()\n    Circle()\n      .frame(width: 125, height: 125)\n      .foregroundColor(.blue)\n\
  \      .onTapGesture {\n        message = \"Circle tapped\"\n      }\n    Spacer()\n\
  \  }.background(Color.yellow)\n    .highPriorityGesture(\n      TapGesture()\n \
  \       .onEnded { _ in\n          message = \"VStack tapped\"\n        }\n    )\n\
  }\n```\n\n如果你轻点 `Circle`，正常情况下 `Circle` 的 `.onTapGesture` 修饰符（\"Circle tapped\"\
  ）会被识别。然而，`.highPriorityGesture` 修饰符定义了 `VStack` 上的 `TapGesture` 会先被识别。整个 `ContentView`\
  \ 文件应该如下所示：\n\n1. 点击画布窗格上的实时预览图标，然后点击蓝色 `Circle`。请注意，由于 `VStack` 上的 `.highPriorityGesture`\
  \ 修饰符覆盖了 `Circle` 的 `.onTapGesture` 修饰符，`Text` 视图中会显示 \"VStack tapped\"。\n2. 点击\
  \ `VStack` 的黄色背景。请注意，`Text` 视图中仍然显示 \"VStack tapped\"。\n\n```\nimport SwiftUI\n\n\
  struct ContentView: View {\n  @State var message = \"\"\n\n  var body: some View\
  \ {\n    VStack {\n      Text(message)\n        .padding()\n      Circle()\n   \
  \     .frame(width: 125, height: 125)\n        .foregroundColor(.blue)\n       \
  \ .onTapGesture {\n          message = \"Circle tapped\"\n        }\n      Spacer()\n\
  \    }.background(Color.yellow)\n      .highPriorityGesture(\n        TapGesture()\n\
  \          .onEnded { _ in\n            message = \"VStack tapped\"\n          }\n\
  \      )\n  }\n}\n\nstruct ContentView_Previews: PreviewProvider {\n  static var\
  \ previews: some View {\n    ContentView()\n  }\n}\n```\n\n### 定义同时手势\n\n通常情况下，附加到单个视图上的手势修饰符会优先于附加到堆栈上的任何手势修饰符运行。如果你使用\
  \ `.highPriorityGesture` 修饰符，则可以让堆栈的手势优先于附加到单个视图上的任何手势修饰符运行。但是，如果希望附加到视图和堆栈上的两个手势都运行呢？\n\
  \n那么你可以使用 `.simultaneousGesture` 修饰符来确保堆栈的手势修饰符与附加到单个视图上的手势修饰符同时运行。要定义同时运行的手势，请将通常会被忽略的手势包裹在\
  \ `.simultaneousGesture` 修饰符中，如下所示：\n\n```\n.simultaneousGesture(\n  TapGesture()\n\
  \    .onEnded { _ in\n      message = \"VStack tapped\"\n    }\n)\n```\n\n要了解 `.simultaneousGesture`\
  \ 修饰符的工作原理，请按以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS App 项目，并为其取任意名称，例如 “SimultaneousGestures”。\n\
  2. 在导航窗格中点击 `ContentView` 文件。\n3. 在 `struct ContentView: View` 这一行下方添加以下状态变量：\n\
  4. 在 body 内部添加一个包含 `Text` 视图、`Circle` 和 `Spacer` 的 `VStack`，如下所示：\n\n```\nstruct\
  \ ContentView: View {\n  @State var message = \"\"\n```\n\n```\nvar body: some View\
  \ {\n  VStack {\n    Text(message)\n      .padding()\n    Circle()\n      .frame(width:\
  \ 125, height: 125)\n      .foregroundColor(.blue)\n    Spacer()\n  }.background(Color.yellow)\n\
  }\n```\n\n1. 为 `Circle` 添加一个 `.onTapGesture` 修饰符，如下所示：\n\n```\nCircle()\n  .frame(width:\
  \ 125, height: 125)\n  .foregroundColor(.blue)\n  .onTapGesture {\n    message +=\
  \ \"Circle tapped\"\n  }\n```\n\n注意，当 `Circle` 识别到轻点手势时，它会将 (\"Circle tapped\")\
  \ 追加（`+=`）到 `message` 状态变量的当前值中。\n\n1. 为整个 `VStack` 添加一个 `.simultaneousGesture`\
  \ 修饰符，如下所示：\n\n```\nvar body: some View {\n  VStack {\n    Text(message)\n     \
  \ .padding()\n    Circle()\n      .frame(width: 125, height: 125)\n      .foregroundColor(.blue)\n\
  \      .onTapGesture {\n        message += \"Circle tapped\"\n      }\n    Spacer()\n\
  \  }.background(Color.yellow)\n    .simultaneousGesture(\n      TapGesture()\n \
  \       .onEnded { _ in\n          message = \"VStack tapped\"\n        }\n    )\n\
  }\n```\n\n如果你轻点 `Circle`，正常情况下 `Circle` 的 `.onTapGesture` 修饰符（\"Circle tapped\"\
  ）会被识别。然而，`.simultaneousGesture` 修饰符定义了 `VStack` 上的 `TapGesture` 会先被识别，然后再识别 `Circle`\
  \ 上的手势修饰符。整个 `ContentView` 文件应该如下所示：\n\n1. 点击画布窗格上的实时预览图标，然后点击蓝色 `Circle`。请注意，由于\
  \ `VStack` 上的 `.simultaneousGesture` 修饰符使其在 `Circle` 的 `.onTapGesture` 修饰符之前运行，`Text`\
  \ 视图中会显示 \"VStack tappedCircle tapped\"。\n2. 点击 `VStack` 的黄色背景。请注意，`Text` 视图中仍然显示\
  \ \"VStack tapped\"。\n\n```\nimport SwiftUI\n\nstruct ContentView: View {\n  @State\
  \ var message = \"\"\n\n  var body: some View {\n    VStack {\n      Text(message)\n\
  \        .padding()\n      Circle()\n        .frame(width: 125, height: 125)\n \
  \       .foregroundColor(.blue)\n        .onTapGesture {\n          message += \"\
  Circle tapped\"\n        }\n      Spacer()\n    }.background(Color.yellow)\n   \
  \   .simultaneousGesture(\n        TapGesture()\n          .onEnded { _ in\n   \
  \         message = \"VStack tapped\"\n          }\n      )\n  }\n}\n\nstruct ContentView_Previews:\
  \ PreviewProvider {\n  static var previews: some View {\n    ContentView()\n  }\n\
  }\n```\n\n## 总结\n\n触摸手势无需在用户界面上放置按钮等对象，即可向应用下达命令。手势通常可以用一根或多根手指进行操作，例如双击或三击。\n\n\
  在添加多个手势时，请记住，附加到单个视图上的手势会优先于附加到堆栈上的手势运行。如果你希望堆栈的手势修饰符先运行，请将其包裹在 `.highPriorityGesture`\
  \ 修饰符中。如果你希望堆栈和单个视图的手势修饰符依次运行，请将其包裹在 `.simultaneousGesture` 修饰符中。\n\n向应用添加手势可以让用户直接操作屏幕上的对象，从而使用户界面更简洁、更直观。\n\
  \n\n\n"
- "# 12. 使用警告框、操作列表和上下文菜单\n\n几乎每个应用程序都需要向用户显示信息并接收数据。显示数据最简单的方式是通过一个`Text`视图，但有时你需要展示数据并让用户能够进行回应。在这种情况下，你可以使用`Alert`或`ActionSheet`。另一种向用户展示选项的方式是上下文菜单。\n\
  \n一个`Alert`会弹出在屏幕上，给用户一个回应的机会。然后用户可以通过点击一个或多个按钮来关闭这个`Alert`，如图 12-1 所示。\n\n![../images/329781_6_En_12_Chapter/329781_6_En_12_Fig1_HTML.jpg](img/329781_6_En_12_Fig1_HTML.jpg)\n\
  \n图 12-1 一个典型的`Alert`会显示一条信息和一或多个按钮\n\n一个`ActionSheet`看起来几乎与`Alert`一模一样，区别在于`Alert`出现在屏幕中央，而`ActionSheet`从屏幕底部向上滑出。`Alert`更多地是为了吸引用户的注意力，比如警告你将删除那些之后无法找回或撤销的数据。另一方面，`ActionSheet`更像是一种提醒，可能不那么关键或具有破坏性。\n\
  \n上下文菜单会在对某个视图（例如`Text`视图）执行长按手势后出现。然后它会弹出一个选项列表供用户选择，如图 12-2 所示。\n\n![../images/329781_6_En_12_Chapter/329781_6_En_12_Fig2_HTML.jpg](img/329781_6_En_12_Fig2_HTML.jpg)\n\
  \n图 12-2 上下文菜单列出多个选项供选择\n\n## 显示警告框/操作列表\n\n每个用户界面都需要向用户回显数据。在某些情况下，这些数据可以通过标签直接显示，但有时你需要确保用户看到特定信息。\n\
  \n`Alert`/`ActionSheet`会覆盖在应用程序的用户界面上，并可以通过更改以下属性进行定制：\n\n- `Title` – 出现在`Alert`/`ActionSheet`顶部的文本，通常为粗体和大号字体\n\
  - `Message` – 出现在标题下方、字体较小的文本\n- 一个或多个`Button` – 可以关闭`Alert`/`ActionSheet`的按钮\n\n\
  标题通常由单个单词或简短短语组成，用于说明其目的，例如显示“警告”或“登录”。要关闭`Alert`/`ActionSheet`，你至少需要一个按钮。\n\n要了解如何创建一个仅显示标题、消息和一个关闭按钮的简单`Alert`/`ActionSheet`，请按照以下步骤操作：\n\
  \n1. 创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如“Alert”。\n2. 在导航器窗格中点击`ContentView`文件。\n\
  3. 在`struct ContentView: View`这一行下方添加以下 State 变量：\n\n```swift\n@State var showAlert\
  \ = false\n```\n\n4. 像这样添加一个包含`Button`的`VStack`：\n\n```swift\nvar body: some View\
  \ {\n    VStack {\n        Button(\"Show Alert\") {\n            showAlert.toggle()\n\
  \        }\n    }\n}\n```\n\n5. 像这样为`Button`添加`.alert`修饰符：\n\n```swift\n.alert(isPresented:\
  \ $showAlert) {\n    Alert(title: Text(\"Warning!\"), message: Text(\"Zombies on\
  \ the loose\"), dismissButton: .default(Text(\"OK\")))\n}\n```\n\n当`showAlert` State\
  \ 变量为`true`时，这个`.alert`修饰符会显示一个`Alert`。然后它使用一个`Text`视图显示“Warning!”，并使用第二个`Text`视图显示“Zombies\
  \ on the loose.”。最后，它使用第三个`Text`视图在`Button`上显示“OK”。\n\n**注意**  \n`Alert`使用`dismissButton:`参数定义要显示的单个按钮。为了简化代码，你可以直接使用样式（`.default`）来定义`Button`的外观，而不是使用更长的版本，如下所示：`Alert.Button.default`。\n\
  \n整个`ContentView`文件应该如下所示：\n\n```swift\nimport SwiftUI\n\nstruct ContentView: View\
  \ {\n    @State var showAlert = false\n    var body: some View {\n        VStack\
  \ {\n            Button(\"Show Alert\") {\n                showAlert.toggle()\n\
  \            }\n            .alert(isPresented: $showAlert) {\n                Alert(title:\
  \ Text(\"Warning!\"), message: Text(\"Zombies on the loose\"), dismissButton: .default(Text(\"\
  OK\")))\n            }\n        }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider\
  \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
  \n6. 点击画布上的实时预览图标，然后点击`Button`，`Alert`就会显示在屏幕中央（参见图 12-1）。\n7. 点击 OK 按钮让`Alert`消失。\n\
  8. 像这样将`.alert`替换为`.actionSheet`：\n\n```swift\n.actionSheet(isPresented: $showAlert)\
  \ {\n    ActionSheet(title: Text(\"Warning!\"), message: Text(\"Zombies on the loose\"\
  ), buttons: [.default(Text(\"OK\"))])\n}\n```\n\n**注意**  \n`Alert`使用`dismissButton:`参数定义按钮，而`ActionSheet`则使用`buttons:`参数，并将一个或多个按钮像数组一样放在方括号`[\
  \ ]`内。为了简化代码，你可以直接使用样式（`.default`）来定义`Button`的外观，而不是使用更长的版本，如下所示：`ActionSheet.Button.default`。\n\
  \n9. 在模拟的 iOS 屏幕上点击`Button`。注意，此时一个`ActionSheet`会出现在屏幕底部。\n10. 点击 OK 按钮让`ActionSheet`消失。\n\
  \n创建`Alert`或`ActionSheet`几乎完全相同，仅在定义按钮以及使用`.alert`（和`Alert`）还是`.actionSheet`（和`ActionSheet`）上存在微小差异。\n\
  \n\n\n### 显示和响应多个按钮\n\n最简单的提醒/操作表会显示单个按钮，让用户能够将其关闭。然而，你可能希望为用户提供多个选项，并根据用户点击的按钮做出不同响应。\n\
  \n一个提醒最多可以显示两个按钮，分别称为 `primaryButton` 和 `secondaryButton`。一个操作表最多可以显示三个按钮。对于每个要显示的按钮，你可以从如图\
  \ 12-3 所示的三种样式中选择一种：\n\n![../images/329781_6_En_12_Chapter/329781_6_En_12_Fig3_HTML.jpg](img/329781_6_En_12_Fig3_HTML.jpg)\n\
  \n**图 12-3** 按钮的三种不同样式\n\n- `.default` – 以蓝色显示文本\n- `.destructive` – 以红色显示文本\n-\
  \ `.cancel` – 以粗体显示文本\n\n要了解如何创建显示两个按钮的提醒，请按照以下步骤操作：\n\n1.  创建一个新的 SwiftUI iOS 应用项目，并为其任意命名，例如\
  \ \"AlertTwoButtons\"。\n2.  单击导航窗格中的 `ContentView` 文件。\n3.  在 `struct ContentView:\
  \ View` 行下方添加以下 `State` 变量：\n    -   在 `var body: some View` 内部添加一个 `VStack` 和一个\
  \ `Button`，如下所示：\n\n    ```\n    struct ContentView: View {\n        @State var\
  \ showAlert = false\n    ```\n\n    ```\n    var body: some View {\n        VStack\
  \ {\n            Button(\"Show Alert\") {\n                showAlert.toggle()\n\
  \            }\n        }\n    }\n    ```\n\n4.  为 `Button` 添加一个 `.alert` 修饰符，如下所示：\n\
  \n    ```\n    .alert(isPresented: $showAlert) {\n        Alert(title: Text(\"Warning!\"\
  ),\n              message: Text(\"Zombies on the loose\"),\n              primaryButton:\
  \ .default(Text(\"Default\")),\n              secondaryButton: .cancel(Text(\"Cancel\"\
  )))\n    }\n    ```\n\n对于 `primaryButton` 或 `secondaryButton`，你也可以改用 `.destructive`\
  \ 按钮类型，来观察按钮在提醒中的外观变化。整个 `ContentView` 文件应如下所示：\n\n```\nimport SwiftUI\n\nstruct\
  \ ContentView: View {\n    @State var showAlert = false\n\n    var body: some View\
  \ {\n        VStack {\n            Button(\"Show Alert\") {\n                showAlert.toggle()\n\
  \            }\n            .alert(isPresented: $showAlert) {\n                Alert(title:\
  \ Text(\"Warning!\"),\n                      message: Text(\"Zombies on the loose\"\
  ),\n                      primaryButton: .default(Text(\"Default\")),\n        \
  \              secondaryButton: .cancel(Text(\"Cancel\")))\n            }\n    \
  \    }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider {\n    static var\
  \ previews: some View {\n        ContentView()\n    }\n}\n```\n\n5.  单击画布窗格中的“实时预览”图标，然后单击“Show\
  \ Alert”按钮。提醒会显示出来。\n6.  单击“Default”或“Cancel”按钮以关闭提醒。\n\n要了解如何创建显示三个按钮的操作表，请按照以下步骤操作：\n\
  \n1.  创建一个新的 SwiftUI iOS 应用项目，并为其任意命名，例如 \"ActionSheetButtons\"。\n2.  单击导航窗格中的 `ContentView`\
  \ 文件。\n3.  在 `struct ContentView: View` 行下方添加以下 `State` 变量：\n    -   在 `var body:\
  \ some View` 内部添加一个 `VStack` 和一个 `Button`，如下所示：\n\n    ```\n    struct ContentView:\
  \ View {\n        @State var showAlert = false\n    ```\n\n    ```\n    var body:\
  \ some View {\n        VStack {\n            Button(\"Show Action Sheet\") {\n \
  \               showAlert.toggle()\n            }\n        }\n    }\n    ```\n\n\
  4.  为 `Button` 添加一个 `.actionSheet` 修饰符，如下所示：\n\n    ```\n    .actionSheet(isPresented:\
  \ $showAlert) {\n        ActionSheet(title: Text(\"Warning!\"),\n              \
  \      message: Text(\"Zombies on the loose\"),\n                    buttons: [\n\
  \                        .default(Text(\"Default\")),\n                        .cancel(Text(\"\
  Cancel\")),\n                        .destructive(Text(\"Destructive\"))])\n   \
  \ }\n    ```\n\n整个 `ContentView` 文件应如下所示：\n\n```\nimport SwiftUI\n\nstruct ContentView:\
  \ View {\n    @State var showAlert = false\n\n    var body: some View {\n      \
  \  VStack {\n            Button(\"Show Action Sheet\") {\n                showAlert.toggle()\n\
  \            }\n            .actionSheet(isPresented: $showAlert) {\n          \
  \      ActionSheet(title: Text(\"Warning!\"),\n                            message:\
  \ Text(\"Zombies on the loose\"),\n                            buttons: [\n    \
  \                            .default(Text(\"Default\")),\n                    \
  \            .cancel(Text(\"Cancel\")),\n                                .destructive(Text(\"\
  Destructive\"))])\n            }\n        }\n    }\n}\n\nstruct ContentView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
  \    }\n}\n```\n\n5.  单击画布窗格中的“实时预览”图标，然后单击“Show Action Sheet”按钮。操作表会出现在模拟的 iOS\
  \ 屏幕底部。\n6.  单击“Default”、“Cancel”或“Destructive”按钮以关闭操作表。\n\n\n### 使 Alert/ActionSheet\
  \ 按钮可响应\n\n仅仅向 Alert 或 Action Sheet 添加按钮，只会让这些按钮在用户选中时简单地关闭 Alert 或 Action Sheet。大多数情况下，你希望按钮能执行某种操作。要做到这一点，你必须先创建一个函数，其中包含用户点击特定按钮时要运行的代码。然后，当用户点击按钮时，你必须调用该函数。\n\
  \n要使按钮可响应，你需要像这样添加 `action:` 参数：\n\n```\n.alert(isPresented: $showAlert) {\nAlert(title:\
  \ Text(\"Warning!\"),\nmessage: Text(\"Zombies on the loose\"),\nprimaryButton:\
  \ .default(Text(\"Default\"), action: {\nmessage = \"Default chosen\"\n}),\nsecondaryButton:\
  \ .cancel(Text(\"Cancel\"), action: cancelFunction))\n}\n}\n}\nfunc cancelFunction()\
  \ {\nmessage = \"Cancel chosen\"\n}\n```\n\n使用 `action:` 参数的第一种方法涉及花括号，你可以在其中编写任意多行代码。然而，你编写的代码越多，整个\
  \ `.alert` 或 `.actionSheet` 看起来就越杂乱。\n\n使用 `action:` 参数的第二种方法是调用一个函数。这样，`action:`\
  \ 代码被隔离在一个独立的函数中，同时保持 `.alert` 或 `.actionSheet` 代码更简短、更易读。\n\n无论你选择哪种方法，选中任何一个按钮都会从屏幕上关闭\
  \ Alert 或 Action Sheet。这就是为什么如果你完全省略了 `action:` 参数，选中该按钮也会关闭 Alert 或 Action Sheet。\n\
  \n要了解如何在 Alert 中使按钮可响应，请按照以下步骤操作：\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其指定任意名称，例如\
  \ “AlertResponsiveButtons”。\n2.  在导航器窗格中点击 `ContentView` 文件。\n3.  在 `struct ContentView:\
  \ View` 行下方添加以下状态变量：\n    ```\n    struct ContentView: View {\n    @State var showAlert\
  \ = false\n    @State var message = \"\"\n    ```\n4.  在 `var body: some View` 中添加一个\
  \ `VStack`，并在 VStack 内放置一个 `Text` 视图和一个 `Button`，如下所示：\n    ```\n    var body: some\
  \ View {\n    VStack {\n    Text(message)\n    .padding()\n    Button(\"Show Alert\"\
  ) {\n    showAlert.toggle()\n    }\n    }\n    }\n    }\n    ```\n5.  向 Button 添加一个\
  \ `.alert` 修饰符，如下所示：\n    ```\n    .alert(isPresented: $showAlert) {\n    Alert(title:\
  \ Text(\"Warning!\"),\n    message: Text(\"Zombies on the loose\"),\n    primaryButton:\
  \ .default(Text(\"Default\"), action: {\n    message = \"Default chosen\"\n    }),\n\
  \    secondaryButton: .cancel(Text(\"Cancel\"), action: cancelFunction))\n    }\n\
  \    ```\n6.  在 `struct ContentView: View` 的最后一个花括号之前添加以下函数，如下所示：\n    ```\n   \
  \ func cancelFunction() {\n    message = \"Cancel chosen\"\n    }\n    ```\n\n完整的\
  \ ContentView 文件应如下所示：\n```\nimport SwiftUI\nstruct ContentView: View {\n@State\
  \ var showAlert = false\n@State var message = \"\"\nvar body: some View {\nVStack\
  \ {\nText(message)\n.padding()\nButton(\"Show Alert\") {\nshowAlert.toggle()\n}\n\
  .alert(isPresented: $showAlert) {\nAlert(title: Text(\"Warning!\"),\nmessage: Text(\"\
  Zombies on the loose\"),\nprimaryButton: .default(Text(\"Default\"), action: {\n\
  message = \"Default chosen\"\n}),\nsecondaryButton: .cancel(Text(\"Cancel\"), action:\
  \ cancelFunction))\n}\n}\n}\nfunc cancelFunction() {\nmessage = \"Cancel chosen\"\
  \n}\n}\nstruct ContentView_Previews: PreviewProvider {\nstatic var previews: some\
  \ View {\nContentView()\n}\n}\n```\n\n7.  点击画布窗格中的 Live Preview 图标，然后点击 Show Alert\
  \ 按钮。会出现一个 Alert。\n8.  点击 Cancel 或 Default 按钮。注意，会出现一条消息告知你选择了哪个按钮。\n\n要了解如何在 Action\
  \ Sheet 中使按钮可响应，请按照以下步骤操作：\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其指定任意名称，例如 “ActionSheetResponsiveButtons”。\n\
  2.  在导航器窗格中点击 `ContentView` 文件。\n3.  在 `struct ContentView: View` 行下方添加以下状态变量：\n\
  \    ```\n    struct ContentView: View {\n    @State var showAlert = false\n   \
  \ @State var message = \"\"\n    ```\n4.  在 `var body: some View` 中添加一个 `VStack`，并在\
  \ VStack 内放置一个 `Text` 视图和一个 `Button`，如下所示：\n    ```\n    var body: some View {\n\
  \    VStack {\n    Text(message)\n    .padding()\n    Button(\"Show Action Sheet\"\
  ) {\n    showAlert.toggle()\n    }\n    }\n    }\n    }\n    ```\n5.  向 Button 添加一个\
  \ `.actionSheet` 修饰符，如下所示：\n    ```\n    .actionSheet(isPresented: $showAlert) {\n\
  \    ActionSheet(title: Text(\"Warning!\"),\n    message: Text(\"Zombies on the\
  \ loose\"),\n    buttons: [\n    .default(Text(\"Default\"), action: {\n    message\
  \ = \"Default chosen\"\n    }),\n    .cancel(Text(\"Cancel\"), action: cancelFunction),\n\
  \    .destructive(Text(\"Destructive\"), action: {\n    message = \"Destructive\
  \ chosen\"\n    })])\n    }\n    ```\n6.  在 `struct ContentView: View` 的最后一个花括号之前添加以下函数，如下所示：\n\
  \    ```\n    func cancelFunction() {\n    message = \"Cancel chosen\"\n    }\n\
  \    ```\n\n完整的 ContentView 文件应如下所示：\n```\nimport SwiftUI\nstruct ContentView: View\
  \ {\n@State var showAlert = false\n@State var message = \"\"\nvar body: some View\
  \ {\nVStack {\nText(message)\n.padding()\nButton(\"Show Action Sheet\") {\nshowAlert.toggle()\n\
  }\n.actionSheet(isPresented: $showAlert) {\nActionSheet(title: Text(\"Warning!\"\
  ),\nmessage: Text(\"Zombies on the loose\"),\nbuttons: [\n.default(Text(\"Default\"\
  ), action: {\nmessage = \"Default chosen\"\n}),\n.cancel(Text(\"Cancel\"), action:\
  \ cancelFunction),\n.destructive(Text(\"Destructive\"), action: {\nmessage = \"\
  Destructive chosen\"\n})])\n}\n}\n}\nfunc cancelFunction() {\nmessage = \"Cancel\
  \ chosen\"\n}\n}\nstruct ContentView_Previews: PreviewProvider {\nstatic var previews:\
  \ some View {\nContentView()\n}\n}\n```\n\n7.  点击画布窗格中的 Live Preview 图标，然后点击 Show\
  \ Action Sheet 按钮。会出现一个 Action Sheet。\n8.  点击 Cancel、Default 或 Destructive 按钮。注意，会出现一条消息告知你选择了哪个按钮。\n\
  \n\n## 使用上下文菜单\n\n上下文菜单可以将多个选项隐藏在用户界面中，仅当检测到用户长按某个视图（例如`Text`视图）时才会显示。当上下文菜单列出选项时，用户可以选择其中一个。\n\
  \n上下文菜单定义了一个`Button`列表，每个`Button`都显示文本内容，并在用户选择该按钮时执行相应的操作。该操作可以调用函数，也可以在花括号内编写\
  \ Swift 代码，如下所示：\n\n```\n.contextMenu(menuItems: {\nButton(\"Red\", action: {\n\
  myColor = Color.red\n})\nButton(\"Purple\", action: purple)\nButton(\"Green\", action:\
  \ green)\nButton(\"Orange\", action: orange)\n})\n```\n\n在此示例中，标题为“Red”的`Button`使用花括号定义了要运行的代码。其他三个`Button`（“Purple”、“Green”和“Orange”）则调用函数。请注意，每个函数调用只需使用函数名，如果参数为空，则不需要参数列表。\n\
  \n要了解如何创建上下文菜单，请按照以下步骤操作：\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其命名，例如“ContextualMenu”。\n\
  2.  在导航器窗格中单击`ContentView`文件。\n3.  在`struct ContentView: View`行下方添加以下`State`变量：\n\
  \n```\n@State var myColor = Color.gray\n```\n\n4.  在`var body: some View`中添加一个`VStack`，并在`VStack`内部放置一个`Rectangle`视图和一个`Text`视图，如下所示：\n\
  \n```\nvar body: some View {\nVStack {\nRectangle()\n.foregroundColor(myColor)\n\
  Text(\"Pick a color\")\n.padding()\n}\n}\n```\n\n上述代码定义了一个`Rectangle`，并基于`myColor`\
  \ State 变量为其着色，该变量初始设置为`.gray`。然后显示一个`Text`视图。\n\n5.  为`Text`视图添加一个`.contextualMenu`修改器，如下所示：\n\
  \n```\n.contextMenu(menuItems: {\nButton(\"Red\", action: {\nmyColor = Color.red\n\
  })\nButton(\"Purple\", action: purple)\nButton(\"Green\", action: green)\nButton(\"\
  Orange\", action: orange)\n})\n```\n\n6.  在`struct ContentView: View`的最后一个花括号上方添加以下函数，如下所示：\n\
  \n```\nfunc purple() {\nmyColor = Color.purple\n}\nfunc green() {\nmyColor = Color.green\n\
  }\nfunc orange() {\nmyColor = Color.orange\n}\n```\n\n完整的`ContentView`文件应如下所示：\n\
  \n7.  在画布窗格中点击“Live Preview”图标。\n8.  将鼠标指针移动到“Pick a color”`Text`视图上，并按住鼠标左键模拟长按手势。稍等片刻，上下文菜单就会出现。\n\
  9.  点击上下文菜单中显示的任何选项。注意，矩形会随着您选择的选项改变颜色。\n\n```\nimport SwiftUI\nstruct ContentView:\
  \ View {\n@State var myColor = Color.gray\nvar body: some View {\nVStack {\nRectangle()\n\
  .foregroundColor(myColor)\nText(\"Pick a color\")\n.padding()\n.contextMenu(menuItems:\
  \ {\nButton(\"Red\", action: {\nmyColor = Color.red\n})\nButton(\"Purple\", action:\
  \ purple)\nButton(\"Green\", action: green)\nButton(\"Orange\", action: orange)\n\
  })\n}\n}\nfunc purple() {\nmyColor = Color.purple\n}\nfunc green() {\nmyColor =\
  \ Color.green\n}\nfunc orange() {\nmyColor = Color.orange\n}\n}\nstruct ContentView_Previews:\
  \ PreviewProvider {\nstatic var previews: some View {\nContentView()\n}\n}\n```\n\
  \n## 总结\n\n`Alert`在屏幕中央（`.alert`）显示信息，而操作表（Action Sheet）则在屏幕底部（`.actionSheet`）显示信息。Alert\
  \ 和操作表可以显示标题和消息，以及至少一个用于关闭 Alert/操作表的`Button`。但是，一个 Alert 最多可以显示两个`Button`，而一个操作表最多可以显示三个`Button`。\n\
  \nAlert/操作表上的`Button`只会关闭 Alert/操作表，但您可以附加代码，以便在用户选择`Button`时运行。一种方法是直接在`.alert`/`.actionSheet`修改器中编写代码，但更好的解决方案是调用一个函数，并将该函数中的代码与`.alert`/`.actionSheet`修改器分离。\n\
  \n当需要向用户显示重要信息并立即获得反馈时，例如验证用户是否要删除数据，请使用 Alert。当需要在屏幕底部显示信息时，请使用操作表。当希望将多个选项隐藏在用户界面之外，但在用户想查看时使其可用时，请使用上下文菜单。\n\
  \n"
- "# 显示列表\n\n向用户显示大量相关数据的一种常见方式是通过`List`（也称为表格视图）。`List`只是垂直堆叠多行相似类型的数据，如图 13-1 所示：\n\
  \n![../images/329781_6_En_13_Chapter/329781_6_En_13_Fig1_HTML.jpg](img/329781_6_En_13_Fig1_HTML.jpg)\n\
  \n**图 13-1** 一个包含多个`Text`视图的简单`List`\n\n```\nList {\nText(\"Cat\")\nText(\"Dog\"\
  )\nText(\"Bird\")\nText(\"Reptile\")\nText(\"Fish\")\n}\n```\n\n如果`List`包含的项目超过屏幕一次可显示的范围，`List`将允许用户向上或向下滑动以查看所有数据。最重要的是，此滚动功能不需要任何额外的编码。要了解如何通过上下滑动查看`List`中的所有项目，请按照以下步骤操作：\n\
  \n1.  创建一个新的 SwiftUI iOS App 项目，并为其命名，例如“SimpleList”。\n2.  在导航器窗格中单击`ContentView`文件。\n\
  3.  在`var body: some View`内部添加一个`List`，如下所示：\n\n```\nvar body: some View {\nList\
  \ {\nForEach(1...25, id: \\.self) { index in\nText(\"Animal #\\(index)\")\n}\n}\n\
  ```\n\n此代码使用`ForEach`循环来创建 25 个独立的项目。每次`ForEach`循环运行时，`index`变量都会递增，因此`index`的值将从\
  \ 1 开始，到 25 结束。完整的`ContentView`文件应如下所示：\n\n![../images/329781_6_En_13_Chapter/329781_6_En_13_Fig2_HTML.jpg](img/329781_6_En_13_Fig2_HTML.jpg)\n\
  \n**图 13-2** 由`ForEach`循环定义的`List`的显示效果\n\n4.  在画布窗格上点击“Live Preview”图标。请注意，即使`List`包含\
  \ 25 个项目，屏幕上也不会同时显示所有项目，如图 13-2 所示。\n\n```\nimport SwiftUI\nstruct ContentView:\
  \ View {\nvar body: some View {\nList {\nForEach(1...25, id: \\.self) { index in\n\
  Text(\"Animal #\\(index)\")\n}\n}\n}\n}\nstruct ContentView_Previews: PreviewProvider\
  \ {\nstatic var previews: some View {\nContentView()\n}\n}\n```\n\n5.  向上和向下拖动鼠标以模拟滑动手势。注意，`List`会自动向上/向下滚动，向您显示其余内容。\n\
  \n\n\n## 在列表中显示数组数据\n\n`List` 中显示的数据通常存储在数组中。数组中的项目数量可能是固定的，但更常见的情况是项目数量会随时间变化。这意味着随着数组随时间增加或减少，`List`\
  \ 的内容也可能会发生变化。\n\n要了解如何在 `List` 中显示数组的内容，请按照以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS 应用项目，并为其取任意名称，例如“ListArray”。\n\
  2. 在导航器窗格中点击 `ContentView` 文件。\n3. 在 `struct ContentView: View` 行下方定义一个数组，如下所示：\n\
  4. 在 `var body: some View` 内部添加一个 `VStack`，并像这样创建一个 `List`：\n\n```\nstruct ContentView:\
  \ View {\n    var myArray = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\"\
  , \"Goldfish\", \"Lizard\", \"Canary\", \"Tarantula\", \"Hamster\"]\n}\n```\n\n\
  ```\nvar body: some View {\n    VStack {\n        List {\n            ForEach(0...myArray.count\
  \ - 1, id: \\.self) { index in\n                Text(myArray[index])\n         \
  \   }\n        }\n    }\n}\n```\n\n这会创建一个 `List`，并使用 `ForEach` 循环从 0 计数到数组中的最后一个项目。（请记住，数组中的第一个项目索引值为\
  \ 0，因此数组中最后一个项目的索引值等于数组中的项目总数减去 1。）然后，它使用此索引值从数组中检索每个项目，以显示在 `List` 中，如图 13-3 所示。\n\
  \n![../images/329781_6_En_13_Chapter/329781_6_En_13_Fig3_HTML.jpg](img/329781_6_En_13_Fig3_HTML.jpg)\n\
  \n**图 13-3** – 在 `List` 中显示数组的内容\n\n完整的 `ContentView` 文件应如下所示：\n\n```\nimport SwiftUI\n\
  \nstruct ContentView: View {\n    var myArray = [\"Cat\", \"Dog\", \"Turtle\", \"\
  Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\", \"Canary\", \"Tarantula\", \"Hamster\"\
  ]\n\n    var body: some View {\n        VStack {\n            List {\n         \
  \       ForEach(0...myArray.count - 1, id: \\.self) { index in\n               \
  \     Text(myArray[index])\n                }\n            }\n        }\n    }\n\
  }\n\nstruct ContentView_Previews: PreviewProvider {\n    static var previews: some\
  \ View {\n        ContentView()\n    }\n}\n```\n\n## 在列表中显示结构体数组\n\n之前的代码使用 `ForEach`\
  \ 循环通过索引值检索数组项目。另一种存储数据的方法是使用结构体，然后创建一个结构体数组。\n\n这样做的目的是定义你想要存储的数据，同时附带一个唯一的 ID，你可以用这个\
  \ ID 来标识每个结构体，例如：\n\n```\nstruct Animals: Identifiable {\n    let pet: String\n\
  \    let id = UUID()\n}\n```\n\n一旦你定义了一个 `Identifiable` 结构体，就可以像这样将其存储在一个数组中：\n\n\
  ```\nvar myAnimals = [\n    Animals(pet: \"Cat\"),\n    Animals(pet: \"Dog\"),\n\
  \    Animals(pet: \"Turtle\"),\n    Animals(pet: \"Ferret\"),\n    Animals(pet:\
  \ \"Parrot\"),\n    Animals(pet: \"Goldfish\"),\n    Animals(pet: \"Lizard\"),\n\
  \    Animals(pet: \"Canary\"),\n    Animals(pet: \"Tarantula\"),\n    Animals(pet:\
  \ \"Hamster\")\n]\n```\n\n这个数组不仅在 `pet` 字段中存储了字符串，而且还为每个结构体分配了一个唯一的 ID。现在，你可以使用这个唯一的\
  \ ID 在 `List` 中显示每个项目，如下所示：\n\n```\nList(myAnimals) {\n    Text($0.pet)\n}\n```\n\
  \n请注意，上述代码不需要循环。要了解这段代码的工作原理，请按照以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS 应用项目，并为其取任意名称，例如“ListOfStructures”。\n\
  2. 在导航器窗格中点击 `ContentView` 文件。\n3. 在 `struct ContentView: some View` 行下方定义一个结构体和一个数组，如下所示：\n\
  4. 在 `var body: some View` 内部添加一个 `List`，如下所示：\n\n```\nstruct ContentView: View\
  \ {\n    struct Animals: Identifiable {\n        let pet: String\n        let id\
  \ = UUID()\n    }\n\n    var myAnimals = [\n        Animals(pet: \"Cat\"),\n   \
  \     Animals(pet: \"Dog\"),\n        Animals(pet: \"Turtle\"),\n        Animals(pet:\
  \ \"Ferret\"),\n        Animals(pet: \"Parrot\"),\n        Animals(pet: \"Goldfish\"\
  ),\n        Animals(pet: \"Lizard\"),\n        Animals(pet: \"Canary\"),\n     \
  \   Animals(pet: \"Tarantula\"),\n        Animals(pet: \"Hamster\")\n    ]\n}\n\
  ```\n\n```\nvar body: some View {\n    List(myAnimals) {\n        Text($0.pet)\n\
  \    }\n}\n```\n\n完整的 `ContentView` 文件应如下所示：\n\n```\nimport SwiftUI\n\nstruct ContentView:\
  \ View {\n    struct Animals: Identifiable {\n        let pet: String\n        let\
  \ id = UUID()\n    }\n\n    var myAnimals = [\n        Animals(pet: \"Cat\"),\n\
  \        Animals(pet: \"Dog\"),\n        Animals(pet: \"Turtle\"),\n        Animals(pet:\
  \ \"Ferret\"),\n        Animals(pet: \"Parrot\"),\n        Animals(pet: \"Goldfish\"\
  ),\n        Animals(pet: \"Lizard\"),\n        Animals(pet: \"Canary\"),\n     \
  \   Animals(pet: \"Tarantula\"),\n        Animals(pet: \"Hamster\")\n    ]\n\n \
  \   var body: some View {\n        List(myAnimals) {\n            Text($0.pet)\n\
  \        }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider {\n    static\
  \ var previews: some View {\n        ContentView()\n    }\n}\n```\n\n请注意，与之前需要 `ForEach`\
  \ 循环的版本相比，创建 `List` 的代码看起来要简洁得多。\n\n\n\n## 在列表中创建分组\n\n当`List`中显示的项目过多时，滚动浏览所有数据来查找目标项会变得很困难。为解决这一问题，`List`允许你创建分组，如图\
  \ 13-4 所示。\n\n![../images/329781_6_En_13_Chapter/329781_6_En_13_Fig4_HTML.jpg](img/329781_6_En_13_Fig4_HTML.jpg)\n\
  \n*图 13-4 - 在`List`中以分组形式显示内容*\n\n要定义分组，你需要创建两个结构体。一个结构体用于定义分组标题，另一个结构体用于定义要显示的数据。定义分组标题时，你需要定义：\n\
  \n- 一个`String`常量，用于保存每个分组的名称\n- 一个数组常量，用于保存包含实际数据的结构体数组\n- 一个`ID`，用于为每个分组定义唯一标识\n\
  \n该结构体名称必须定义为`Identifiable`，以便创建唯一 ID，示例如下：\n\n```\nstruct SectionHeading: Identifiable\
  \ {\n    let name: String\n    let animalList: [Animals]\n    let id = UUID()\n\
  }\n```\n\n上述结构体使用`animalList`来存储一个名为`Animals`的结构体数组。这个`Animals`结构体需要：\n\n- 一个`String`常量，用于保存要在`List`中显示的数据\n\
  - 一个`ID`，用于为`List`中的每个项目定义唯一标识\n\n第二个结构体必须定义为`Hashable`和`Identifiable`，示例如下：\n\n\
  ```\nstruct Animals: Hashable, Identifiable {\n    let pet: String\n    let id =\
  \ UUID()\n}\n```\n\n最后，你可以创建一个数组来定义分组及其包含的项目，示例如下：\n\n```\nvar myAnimals = [\n \
  \   SectionHeading(name: \"Mammals\",\n                   animalList: [\n      \
  \                 Animals(pet: \"Cat\"),\n                       Animals(pet: \"\
  Dog\"),\n                       Animals(pet: \"Ferret\"),\n                    \
  \   Animals(pet: \"Hamster\")])\n]\n```\n\n要在`List`中显示项目，你需要使用嵌套的`ForEach`循环。外层的`ForEach`循环用于定义分组名称，示例如下：\n\
  \n```\nForEach(myAnimals) { heading in\n    Section(header: Text(\"\\(heading.name)\
  \ Section\")) {\n    }\n}\n```\n\n然后，内层的`ForEach`循环用于定义每个分组内显示的项目，示例如下：\n\n```\n\
  ForEach(heading.animalList) { creature in\n    Text(creature.pet)\n}\n```\n\n要了解如何创建分组的`List`，请按照以下步骤操作：\n\
  \n1. 创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如“ListSections”。\n2. 在导航窗格中点击`ContentView`文件。\n\
  3. 在`struct ContentView: some View`代码行下方定义一个结构体，用于定义要在`List`中显示的数据，代码如下：\n\n```\n\
  struct Animals: Hashable, Identifiable {\n    let pet: String\n    let id = UUID()\n\
  }\n```\n\n4. 在其下方添加第二个结构体，用于定义要在`List`中显示的分组名称，代码如下：\n\n```\nstruct SectionHeading:\
  \ Identifiable {\n    let name: String\n    let animalList: [Animals]\n    let id\
  \ = UUID()\n}\n```\n\n5. 添加一个数组，列出分组以及每个分组内要显示的项目，代码如下：\n\n```\nvar myAnimals =\
  \ [\n    SectionHeading(name: \"Mammals\",\n                   animalList: [\n \
  \                      Animals(pet: \"Cat\"),\n                       Animals(pet:\
  \ \"Dog\"),\n                       Animals(pet: \"Ferret\"),\n                \
  \       Animals(pet: \"Hamster\")]),\n    SectionHeading(name: \"Reptiles\",\n \
  \                  animalList: [\n                       Animals(pet: \"Turtle\"\
  ),\n                       Animals(pet: \"Lizard\")]),\n    SectionHeading(name:\
  \ \"Birds\",\n                   animalList: [\n                       Animals(pet:\
  \ \"Parrot\"),\n                       Animals(pet: \"Canary\")]),\n    SectionHeading(name:\
  \ \"Other\",\n                   animalList: [\n                       Animals(pet:\
  \ \"Tarantula\"),\n                       Animals(pet: \"Goldfish\")])\n]\n```\n\
  \n6. 在`var body: some View`内部添加一个`List`，代码如下：\n\n```\nvar body: some View {\n  \
  \  List {\n    }\n}\n```\n\n7. 在`List`内部添加一个`ForEach`循环，用于定义分组名称，代码如下：\n\n```\n\
  var body: some View {\n    List {\n        ForEach(myAnimals) { heading in\n   \
  \         Section(header: Text(\"\\(heading.name) Section\")) {\n            }\n\
  \        }\n    }\n}\n```\n\n请注意，`Text`视图显示每个分组的`name`属性，该属性由之前定义的数组提供（“Mammals”，“Reptiles”，“Birds”和“Other”）。\n\
  \n8. 添加第二个`ForEach`循环，用于定义要在`List`中显示的实际数据，代码如下：\n\n```\nvar body: some View {\n\
  \    List {\n        ForEach(myAnimals) { heading in\n            Section(header:\
  \ Text(\"\\(heading.name) Section\")) {\n                ForEach(heading.animalList)\
  \ { creature in\n                    Text(creature.pet)\n                }\n   \
  \         }\n        }\n    }\n}\n```\n\n请注意，第二个`ForEach`循环使用了`pet`属性，该属性由之前定义的数组提供（“Cat”，“Dog”，“Ferret”，“Hamster”，“Turtle”，“Lizard”，“Parrot”，“Canary”，“Tarantula”，“Goldfish”）。\n\
  \n整个`ContentView`文件应如下所示：\n\n```\nimport SwiftUI\n\nstruct ContentView: View {\n\
  \    struct Animals: Hashable, Identifiable {\n        let pet: String\n       \
  \ let id = UUID()\n    }\n\n    struct SectionHeading: Identifiable {\n        let\
  \ name: String\n        let animalList: [Animals]\n        let id = UUID()\n   \
  \ }\n\n    var myAnimals = [\n        SectionHeading(name: \"Mammals\",\n      \
  \                 animalList: [\n                           Animals(pet: \"Cat\"\
  ),\n                           Animals(pet: \"Dog\"),\n                        \
  \   Animals(pet: \"Ferret\"),\n                           Animals(pet: \"Hamster\"\
  )]),\n        SectionHeading(name: \"Reptiles\",\n                       animalList:\
  \ [\n                           Animals(pet: \"Turtle\"),\n                    \
  \       Animals(pet: \"Lizard\")]),\n        SectionHeading(name: \"Birds\",\n \
  \                      animalList: [\n                           Animals(pet: \"\
  Parrot\"),\n                           Animals(pet: \"Canary\")]),\n        SectionHeading(name:\
  \ \"Other\",\n                       animalList: [\n                           Animals(pet:\
  \ \"Tarantula\"),\n                           Animals(pet: \"Goldfish\")])\n   \
  \ ]\n\n    var body: some View {\n        List {\n            ForEach(myAnimals)\
  \ { heading in\n                Section(header: Text(\"\\(heading.name) Section\"\
  )) {\n                    ForEach(heading.animalList) { creature in\n          \
  \              Text(creature.pet)\n                    }\n                }\n  \
  \          }\n        }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider\
  \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
  \n\n\n## 为列表添加行分隔线\n\n列表通常会在项目之间显示分隔线。从 iOS 15 开始，SwiftUI 允许你选择隐藏或显示这些分隔线，或者为它们着色。\n\
  \n要隐藏或显示 `List` 中的分隔线，请使用 `.listRowSeparator` 修饰符，并设置为 `.visible` 或 `.hidden`，如下所示：\n\
  \n```\n.listRowSeparator(.hidden)\n```\n\n要为 `List` 中分隔项目的线条着色，请使用 `.listRowSeparatorTint`\
  \ 修饰符，并传入一个颜色，例如 `.red` 或 `.blue`，如下所示：\n\n```\n.listRowSeparatorTint(.red)\n```\n\
  \n你可以在 `List` 内部同时使用这两个修饰符来修改定义 `List` 显示内容的 `ForEach` 循环。要了解如何隐藏和着色列表中的行分隔线，请按照以下步骤操作：\n\
  \n1.  创建一个新的 SwiftUI iOS 应用项目，并为其命名，例如“ListLines”。\n2.  在导航器窗格中点击 `____App` 文件，其中\
  \ `____` 是你的项目名称，例如 `ListLinesApp`。\n3.  在 `struct` 行上方添加如下代码：\n\n```\n@available(iOS\
  \ 15.0, *)\n@main\nstruct DeleteMe3App: App {\n    var body: some Scene {\n    \
  \    WindowGroup {\n            ContentView()\n        }\n    }\n}\n```\n\n1.  在导航器窗格中点击\
  \ `ContentView` 文件。\n2.  在 `ContentView` 文件的两个结构体中的 `struct` 行上方添加如下代码：\n\n```\n\
  @available(iOS 15.0, *)\n```\n\n1.  在 `struct ContentView: View` 行下方添加一个数组，如下所示：\n\
  \n```\n@available(iOS 15.0, *)\nstruct ContentView: View {\n    var myArray = [\"\
  Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\", \"\
  Canary\", \"Tarantula\", \"Hamster\"]\n```\n\n1.  在此数组下方添加一个 `State` 变量，如下所示：\n\n\
  ```\n@State var showLines = true\n```\n\n1.  在 `var body: some View` 行下方添加一个 `List`，如下所示：\n\
  \n```\nvar body: some View {\n    List {\n    }\n}\n```\n\n1.  在 `List` 内部添加一个 `ForEach`\
  \ 循环，用于遍历从 0 到数组总项数减 1 的所有数组项，如下所示：\n\n```\nvar body: some View {\n    List {\n\
  \        ForEach(0...myArray.count - 1, id: \\.self) { index in\n            Text(myArray[index])\n\
  \        }\n    }\n}\n```\n\n1.  向 `Text(myArray[index])` 视图添加一个 `.onTapGesture`，如下所示：\n\
  \n```\nvar body: some View {\n    List {\n        ForEach(0...myArray.count - 1,\
  \ id: \\.self) { index in\n            Text(myArray[index])\n                .onTapGesture\
  \ {\n                    showLines.toggle()\n                }\n        }\n    }\n\
  }\n```\n\n每当用户选择 `List` 中的任何项目时，`.onTapGesture` 修饰符会将 `showLines` `State` 变量的值从\
  \ `true` 更改为 `false`（或从 `false` 更改为 `true`）。\n\n1.  向 `ForEach` 循环添加一个 `.listRowSeparator`\
  \ 修饰符，如下所示：\n\n```\nvar body: some View {\n    List {\n        ForEach(0...myArray.count\
  \ - 1, id: \\.self) { index in\n            Text(myArray[index])\n             \
  \   .onTapGesture {\n                    showLines.toggle()\n                }\n\
  \        }.listRowSeparator(showLines ? .visible : .hidden)\n    }\n}\n```\n\n此\
  \ `.listRowSeparator` 使用 `showLines` `State` 变量来决定是显示分隔线（`.visible`）还是隐藏它们（`.hidden`）。\n\
  \n1.  向 `ForEach` 循环添加一个 `.listRowSeparatorTint` 修饰符，如下所示：\n\n```\nvar body: some\
  \ View {\n    List {\n        ForEach(0...myArray.count - 1, id: \\.self) { index\
  \ in\n            Text(myArray[index])\n                .onTapGesture {\n      \
  \              showLines.toggle()\n                }\n        }.listRowSeparator(showLines\
  \ ? .visible : .hidden)\n        .listRowSeparatorTint(.red)\n    }\n}\n```\n\n\
  你可以选择任何你想要的颜色，例如 `.orange` 或 `.purple`。整个 `ContentView` 文件应如下所示：\n\n```\nimport\
  \ SwiftUI\n\n@available(iOS 15.0, *)\nstruct ContentView: View {\n    var myArray\
  \ = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\"\
  , \"Canary\", \"Tarantula\", \"Hamster\"]\n    @State var showLines = true\n\n \
  \   var body: some View {\n        List {\n            ForEach(0...myArray.count\
  \ - 1, id: \\.self) { index in\n                Text(myArray[index])\n         \
  \           .onTapGesture {\n                        showLines.toggle()\n      \
  \              }\n            }.listRowSeparator(showLines ? .visible : .hidden)\n\
  \            .listRowSeparatorTint(.red)\n        }\n    }\n}\n\n@available(iOS\
  \ 15.0, *)\nstruct ContentView_Previews: PreviewProvider {\n    static var previews:\
  \ some View {\n        ContentView()\n    }\n}\n```\n\n1.  在画布窗格中点击“实时预览”图标。\n2.\
  \  点击 `List` 中的任何项目。注意，每次点击时，`List` 中的分隔线都会在显示和隐藏之间切换。\n\n## 为列表添加滑动手势\n\n许多常见应用（如邮件、信息和照片）会在\
  \ `List` 中显示项目。通过这些 `List`，用户可以向左或向右滑动，以显示可供选择的更多选项，如图 13-5 所示。\n\n![../images/329781_6_En_13_Chapter/329781_6_En_13_Fig5_HTML.jpg](img/329781_6_En_13_Fig5_HTML.jpg)\n\
  \n图 13-5 – 在 `List` 上滑动可以显示更多选项\n\n`List` 的两种常见操作是删除和移动项目。从 `List` 中删除项目涉及移除该项目，通常是在用户从右向左滑动之后。在列表中移动项目涉及用手指滑动项目，将其放到\
  \ `List` 中的新位置。\n\n### 从列表中删除项目\n\niOS 中删除 `List` 项目最常用的快捷方式是从右向左滑动以显示删除按钮。或者，用户可以继续从右向左滑动来删除项目，而无需点击删除按钮。由于这种滑动删除手势经常使用，SwiftUI\
  \ 使其易于实现。\n\n第一步是将 `.onDelete` 修饰符添加到 `List` 中的 `ForEach` 循环，如下所示：\n\n```\nList\
  \ {\n    ForEach(0...myArray.count - 1, id: \\.self) { index in\n    }.onDelete(perform:\
  \ delete)\n}\n```\n\n这会调用一个 `delete` 函数，该函数使用包含 `List` 中显示项目的数组名称（在以下示例中称为 `\"myArray\"\
  `），并调用 `remove` 方法，如下所示：\n\n```\nfunc delete(at offsets: IndexSet) {\n    myArray.remove(atOffsets:\
  \ offsets)\n}\n```\n\n要了解如何在 `List` 中创建滑动删除手势，请按照以下步骤操作：\n\n1.  创建一个新的 SwiftUI iOS\
  \ 应用项目，并为其命名，例如“ListDelete”。\n2.  在导航器窗格中点击 `ContentView` 文件。\n3.  在 `struct ContentView`\
  \ 行下方添加一个 `State` 变量数组，如下所示：\n\n```\nstruct ContentView: View {\n    @State var\
  \ myArray = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\"\
  , \"Lizard\", \"Canary\", \"Tarantula\", \"Hamster\"]\n```\n\n输入的具体字符串无关紧要，只要输入足够的字符串来填充数组即可。\n\
  \n1.  在 `var body: some View` 行下方添加一个 `List`，如下所示：\n\n```\nvar body: some View {\n\
  \    List {\n    }\n}\n```\n\n1.  在此 `List` 内部添加一个 `ForEach` 循环，用于从 0 计数到数组总项数减\
  \ 1。然后在 `Text` 视图中显示数组项，如下所示：\n\n```\nvar body: some View {\n    List {\n      \
  \  ForEach(0...myArray.count - 1, id: \\.self) { index in\n            Text(myArray[index])\n\
  \        }\n    }\n}\n```\n\n1.  向 `ForEach` 循环添加 `.onDelete` 修饰符，以调用名为 `delete`\
  \ 的函数，如下所示：\n\n```\nvar body: some View {\n    List {\n        ForEach(0...myArray.count\
  \ - 1, id: \\.self) { index in\n            Text(myArray[index])\n        }.onDelete(perform:\
  \ delete)\n    }\n}\n```\n\n1.  在 `struct ContentView: View` 的最后一个右花括号上方添加以下函数，如下所示：\n\
  \n```\nfunc delete(at offsets: IndexSet) {\n    myArray.remove(atOffsets: offsets)\n\
  }\n```\n\n整个 `ContentView` 文件应如下所示：\n\n![../images/329781_6_En_13_Chapter/329781_6_En_13_Fig6_HTML.jpg](img/329781_6_En_13_Fig6_HTML.jpg)\n\
  \n图 13-6 – 由 `.onDelete` 修饰符创建的删除按钮\n\n```\nimport SwiftUI\n\nstruct ContentView:\
  \ View {\n    @State var myArray = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"\
  Parrot\", \"Goldfish\", \"Lizard\", \"Canary\", \"Tarantula\", \"Hamster\"]\n\n\
  \    var body: some View {\n        List {\n            ForEach(0...myArray.count\
  \ - 1, id: \\.self) { index in\n                Text(myArray[index])\n         \
  \   }.onDelete(perform: delete)\n        }\n    }\n\n    func delete(at offsets:\
  \ IndexSet) {\n        myArray.remove(atOffsets: offsets)\n    }\n}\n\nstruct ContentView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
  \    }\n}\n```\n\n1.  在画布窗格上点击“实时预览”图标。\n2.  在 `List` 中的任意项目上从右向左滑动。注意，如图 13-6 所示，`.onDelete`\
  \ 修饰符会自动显示“删除”按钮。\n3.  点击“删除”按钮。注意，包含该项目的那一行会消失。\n\n\n\n#### 在列表中移动项目\n\n使用列表的另一种常见方式是在列表内重新排列或移动项目。在\
  \ iOS 中，这通常分两步完成：首先，你需编辑列表，使其在每个项目右侧显示三条横线图标；其次，你使用这三条横线图标滑动项目，将其放置到新位置，如图 13-7\
  \ 所示。\n\n![../images/329781_6_En_13_Chapter/329781_6_En_13_Fig7_HTML.jpg](img/329781_6_En_13_Fig7_HTML.jpg)\n\
  \n图 13-7\n\n移动图标出现在列表中项目的右侧\n\n第一步是为列表内的 `ForEach` 循环添加 `.onMove` 修饰符，具体如下：\n\n\
  ```\nForEach(0...myArray.count - 1, id: \\.self) { index in\n}.onMove(perform: move)\n\
  ```\n\n这会调用一个 `move` 函数，该函数使用包含列表显示项目的数组名称（在以下示例中为 `myArray`），并调用 `move` 方法，如下所示：\n\
  \n```\nfunc move(from source: IndexSet, to destination: Int) {\nmyArray.move(fromOffsets:\
  \ source, toOffset: destination)\n}\n```\n\n若要了解如何创建滑动以移动列表中的项目，请按以下步骤操作：\n\n1.\
  \  创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如 `ListMove`。\n\n2.  在导航面板中点击 `ContentView`\
  \ 文件。\n\n3.  在 `struct ContentView` 行下添加一个状态变量数组，如下所示：\n\n```\nstruct ContentView:\
  \ View {\n@State var myArray = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\"\
  , \"Goldfish\", \"Lizard\", \"Canary\", \"Tarantula\", \"Hamster\"]\n```\n\n具体输入的字符串内容无关紧要，只要输入多个字符串来填充数组即可。\n\
  \n4.  在 `var body: some View` 行下添加一个 `NavigationView`，如下所示：\n\n```\nvar body: some\
  \ View {\nNavigationView {\n}\n```\n\n`NavigationView` 用于在屏幕右上角显示“编辑”按钮。\n\n5. \
  \ 在 `NavigationView` 内部添加一个 `List`，如下所示：\n\n6.  在该 `List` 内部添加一个 `ForEach` 循环，用于从\
  \ 0 计数到数组中的项目总数减 1。然后在 `Text` 视图中显示数组项目，如下所示：\n\n```\nvar body: some View {\nNavigationView\
  \ {\nList {\n}\n}\n}\n```\n\n7.  为 `List` 添加 `.toolbar` 修饰符，如下所示：\n\n```\nvar body:\
  \ some View {\nNavigationView {\nList {\nForEach(0...myArray.count - 1, id: \\.self)\
  \ { index in\nText(myArray[index])\n}\n}\n}\n}\n```\n\n```\nvar body: some View\
  \ {\nNavigationView {\nList {\nForEach(0...myArray.count - 1, id: \\.self) { index\
  \ in\nText(myArray[index])\n}\n}.toolbar {\nEditButton()\n}\n}\n}\n```\n\n` .toolbar\
  \ { EditButton() } ` 这段代码会在 `NavigationView` 的右上角添加一个“编辑”按钮。\n\n8.  为 `ForEach`\
  \ 循环添加 `.onMove` 修饰符，以调用名为 `move` 的函数，如下所示：\n\n9.  在 `struct ContentView: View`\
  \ 中最后一个花括号上方添加以下函数，如下所示：\n\n```\nvar body: some View {\nNavigationView {\nList {\n\
  ForEach(0...myArray.count - 1, id: \\.self) { index in\nText(myArray[index])\n}.onMove(perform:\
  \ move)\n}.toolbar {\nEditButton()\n}\n}\n}\n```\n\n```\nfunc move(from source:\
  \ IndexSet, to destination: Int) {\nmyArray.move(fromOffsets: source, toOffset:\
  \ destination)\n}\n```\n\n完整的 `ContentView` 文件应如下所示：\n\n10. 点击画布面板上的“实时预览”图标。\n\n\
  11. 点击屏幕右上角的“编辑”按钮。三条横线图标会出现在列表每个项目的右侧（参见图 13-7）。请注意，点击“编辑”按钮后，它会变为“完成”按钮。\n\n12.\
  \ 向上或向下滑动任意横线图标，即可将项目移动到列表中的新位置。\n\n13. 点击屏幕右上角的“完成”按钮，隐藏列表每个项目右侧的三条横线图标。\n\n```\n\
  import SwiftUI\nstruct ContentView: View {\n@State var myArray = [\"Cat\", \"Dog\"\
  , \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\", \"Canary\", \"Tarantula\"\
  , \"Hamster\"]\nvar body: some View {\nNavigationView {\nList {\nForEach(0...myArray.count\
  \ - 1, id: \\.self) { index in\nText(myArray[index])\n}.onMove(perform: move)\n\
  }.toolbar {\nEditButton()\n}\n}\n}\nfunc move(from source: IndexSet, to destination:\
  \ Int) {\nmyArray.move(fromOffsets: source, toOffset: destination)\n}\n}\nstruct\
  \ ContentView_Previews: PreviewProvider {\nstatic var previews: some View {\nContentView()\n\
  }\n}\n```\n\n\n\n### 为列表创建自定义滑动操作\n\n在 iOS 15 中，SwiftUI 还允许在 `List` 项上执行自定义的从左到右和从右到左手势。第一步是向在\
  \ `List` 中显示项的视图（例如 `Text` 视图）添加一个 `.swipeActions` 修饰符。然后定义是需要 `.leading`（从左到右）还是\
  \ `.trailing`（从右到左）滑动手势，如下所示：\n\n```\n.swipeActions(edge: .trailing)\n```\n\n每个\
  \ `.swipeActions` 修饰符都需要定义一个 `Button`（包括 `Button` 的标题和选中时运行的代码），以及一个用于在选中时显示特定颜色的\
  \ `.tint` 修饰符，例如：\n\n```\n.swipeActions(edge: .trailing) {\nButton {\n//  要运行的代码\n\
  } label: {\n//  要显示的图标\n}.tint(.red)\n```\n\n要了解如何创建滑动来移动 `List` 中的项，请按照以下步骤操作：\n\
  \n1. 创建一个新的 SwiftUI iOS App 项目，并为其指定任意名称，例如 \"ListCustomSwipes\"。\n2. 在导航器窗格中单击\
  \ `____App` 文件，其中 `____` 是你的项目名称。\n3. 在结构体之前添加以下代码：\n\n```\n@available(iOS 15.0,\
  \ *)\n```\n\n4. 在导航器窗格中单击 `ContentView` 文件。\n5. 在每个结构体之前添加以下代码：\n\n```\n@available(iOS\
  \ 15.0, *)\n```\n\n6. 在 `struct ContentView` 行下添加一个 `@State` 变量和一个 `@State` 变量数组，如下所示：\n\
  \n```\nstruct ContentView: View {\n@State var myArray = [\"Cat\", \"Dog\", \"Turtle\"\
  , \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\", \"Canary\", \"Tarantula\", \"\
  Hamster\"]\n@State var message = \"\"\n```\n\n7. 在 `var body: some View` 行下添加一个\
  \ `VStack`、`Text` 视图和一个 `List`，如下所示：\n\n```\nvar body: some View {\nVStack {\nText(\"\
  \\(message)\")\nList {\n}\n}\n}\n```\n\n8. 在这个 `List` 内部添加一个 `ForEach` 循环，从 0 计数到数组中项的总数减\
  \ 1。然后在 `Text` 视图中显示数组项，如下所示：\n\n```\nvar body: some View {\nVStack {\nText(\"\\\
  (message)\")\nList {\nForEach(0...myArray.count - 1, id: \\.self) { index in\nText(myArray[index])\n\
  }\n}\n}\n}\n```\n\n9. 在 `ForEach` 循环内的 `Text` 视图中添加多个 `.swipeActions` 修饰符，如下所示：\n\
  \n```\nvar body: some View {\nVStack {\nText(\"\\(message)\")\nList {\nForEach(0...myArray.count\
  \ - 1, id: \\.self) { index in\nText(myArray[index])\n.swipeActions(edge: .trailing)\
  \ {\nButton {\nmessage = \"Item = \\(myArray[index]) -- Index = \\(index)\"\n} label:\
  \ {\nImage(systemName: \"calendar.circle\")\n}.tint(.yellow)\n}\n.swipeActions(edge:\
  \ .trailing) {\nButton {\nmessage = \"Green button selected\"\n} label: {\nImage(systemName:\
  \ \"book\")\n}.tint(.green)\n}\n.swipeActions(edge: .leading) {\nButton {\nmessage\
  \ = \"Left to right swipe\"\n} label: {\nImage(systemName: \"graduationcap\")\n\
  }.tint(.purple)\n}\n}\n}\n}\n}\n```\n\n完整的 `ContentView` 文件应如下所示：\n\n![../images/329781_6_En_13_Chapter/329781_6_En_13_Fig8_HTML.jpg](img/329781_6_En_13_Fig8_HTML.jpg)\n\
  \n图 13-8 – 从左到右滑动手势后 `List` 项的外观\n\n10. 单击画布窗格上的 Live Preview 图标。\n11. 从左向右滑动，查看\
  \ `.leading` 滑动手势 `Button` 的出现，如图 13-8 所示。\n\n```\nimport SwiftUI\n@available(iOS\
  \ 15.0, *)\nstruct ContentView: View {\n@State var myArray = [\"Cat\", \"Dog\",\
  \ \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\", \"Canary\", \"Tarantula\"\
  , \"Hamster\"]\n@State var message = \"\"\nvar body: some View {\nVStack {\nText(\"\
  \\(message)\")\nList {\nForEach(0...myArray.count - 1, id: \\.self) { index in\n\
  Text(myArray[index])\n.swipeActions(edge: .trailing) {\nButton {\nmessage = \"Item\
  \ = \\(myArray[index]) -- Index = \\(index)\"\n} label: {\nImage(systemName: \"\
  calendar.circle\")\n}.tint(.yellow)\n}\n.swipeActions(edge: .trailing) {\nButton\
  \ {\nmessage = \"Green button selected\"\n} label: {\nImage(systemName: \"book\"\
  )\n}.tint(.green)\n}\n.swipeActions(edge: .leading) {\nButton {\nmessage = \"Left\
  \ to right swipe\"\n} label: {\nImage(systemName: \"graduationcap\")\n}.tint(.purple)\n\
  }\n}\n}\n}\n}\n}\n@available(iOS 15.0, *)\nstruct ContentView_Previews: PreviewProvider\
  \ {\nstatic var previews: some View {\nContentView()\n}\n}\n```\n\n![../images/329781_6_En_13_Chapter/329781_6_En_13_Fig9_HTML.jpg](img/329781_6_En_13_Fig9_HTML.jpg)\n\
  \n图 13-9 – 从右到左滑动手势后 `List` 项的外观\n\n12. 点击紫色毕业帽图标。屏幕顶部附近会出现 \"Left to right swipe\"\
  \ 消息。\n13. 从右向左滑动，查看两个 `.trailing` 滑动手势 `Button` 的出现，如图 13-9 所示。\n14. 点击绿色书本图标。会出现\
  \ \"Green button selected\" 消息。\n15. 从右向左滑动，查看两个 `.trailing` 滑动手势 `Button` 的出现（参见图\
  \ 13-9）。\n16. 点击黄色日历圆圈图标。该项的名称及其在数组中的索引位置将出现在屏幕顶部。\n\n> **注**  \n> 如果你创建了自定义的从右到左滑动手势，它将覆盖\
  \ `.onDelete` 手势。\n\n## 总结\n\n列表是一种将多个相关项显示在同一位置的常见方式。为了帮助组织 `List` 中的项，你可以将相关项分组。\n\
  \n除了在 `List` 中显示项之外，你还可以检测从左到右或从右到左的滑动手势。通过使用 `.onDelete` 修饰符，你可以允许用户从 `List` 中删除项。通过使用\
  \ `NavigationView` 和一个 Edit 按钮，你可以使用 `.onMove` 修饰符允许用户在 `List` 内移动项。\n\n你还可以定义要在\
  \ `List` 上显示的自定义滑动手势。创建自定义滑动手势时，你可以为每个 `Button` 定义要显示的图标和颜色。通过将滑动手势与 `List` 结合使用，用户可以通过不同方式修改\
  \ `List` 项。\n\n"
- "# 14. 使用表单和分组框\n\n当你填写纸质表单时，可能会注意到纸质表单将相关项分组在一起。例如，表单可能会在表单的一个区域询问你的姓名、地址和电话号码，并在表单的另一个区域询问你的性别、种族背景或婚姻状况。纸质表单使得在同一个区域输入相关数据变得很容易。\n\
  \nSwiftUI 的 Form 以类似的方式工作，它将提供用户可选择选项和设置的相关视图分组在一起。表单由可选的页眉、可选的页脚以及由 `Text`、`Slider`\
  \ 或 `Toggle` 等视图定义的内容组成，如图 14-1 所示。\n\n![../images/329781_6_En_14_Chapter/329781_6_En_14_Fig1_HTML.jpg](img/329781_6_En_14_Fig1_HTML.jpg)\n\
  \n图 14-1 – 表单的典型组成部分\n\n一个 Form 像堆栈一样将相关视图分组在一起。不同之处在于，Form 还在用户界面上以视觉方式将视图分组。Form\
  \ 内的所有视图会一起显示，而任何不在 Form 内的视图则会通过灰色区域分隔开，如图 14-2 所示。\n\n![../images/329781_6_En_14_Chapter/329781_6_En_14_Fig2_HTML.jpg](img/329781_6_En_14_Fig2_HTML.jpg)\n\
  \n图 14-2 – 表单在用户界面上将视图分组在一起\n\n与 Form 类似的是 Group Boxes（分组框），它为你提供了一种更简单的方法来在用户界面上以视觉方式将相关视图分组。当你需要将视图分组时，可以在\
  \ Form 和 Group Box 之间进行选择。\n\n\n\n## 创建简单表单\n\n最简单的`Form`仅用于将单个或多个视图组合在一起。要创建一个`Form`，只需这样做：\n\
  \n```\nForm {\n    //\n}\n```\n\n要了解如何创建简单的`Form`，请按以下步骤操作：\n\n1. 新建一个 SwiftUI iOS\
  \ App 项目，并为其任意命名，例如 \"SimpleForm\"。\n2. 在导航器窗格中点击`ContentView`文件。\n3. 在`struct ContentView:\
  \ View`代码行下添加两个`State`变量，如下所示：\n\n```\nstruct ContentView: View {\n    @State var\
  \ messageOne = \"\"\n    @State var messageTwo = \"\"\n```\n\n4. 在`var body: some\
  \ View`内部添加一个`VStack`，如下所示：\n\n```\nvar body: some View {\n    VStack {\n    }\n\
  }\n```\n\n5. 在`VStack`内部添加两个`Form`视图和两个`Text`视图，如下所示：\n\n```\nvar body: some View\
  \ {\n    VStack {\n        Form {\n            Text(\"This is the first Form\")\n\
  \            TextField(\"Type here\", text: $messageOne)\n        }\n        Form\
  \ {\n            Text(\"This is the second Form\")\n            TextField(\"Type\
  \ here\", text: $messageTwo)\n        }\n        Text(\"Form #1 = \\(messageOne)\"\
  )\n        Text(\"Form #2 = \\(messageTwo)\")\n    }\n}\n```\n\n整个`ContentView`文件应如下所示：\n\
  \n```\nimport SwiftUI\n\nstruct ContentView: View {\n    @State var messageOne =\
  \ \"\"\n    @State var messageTwo = \"\"\n\n    var body: some View {\n        VStack\
  \ {\n            Form {\n                Text(\"这是第一个表单\")\n                TextField(\"\
  在此输入\", text: $messageOne)\n            }\n            Form {\n                Text(\"\
  这是第二个表单\")\n                TextField(\"在此输入\", text: $messageTwo)\n           \
  \ }\n            Text(\"表单 #1 = \\(messageOne)\")\n            Text(\"表单 #2 = \\\
  (messageTwo)\")\n        }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider\
  \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
  \n此代码创建了一个用户界面，屏幕上显示两个表单，以及两个不属于任何`Form`的`Text`视图，如图 14-3 所示。\n\n![../images/329781_6_En_14_Chapter/329781_6_En_14_Fig3_HTML.jpg](img/329781_6_En_14_Fig3_HTML.jpg)\n\
  \n**图 14-3** 用户界面上出现两个表单\n\n1. 点击画布窗格中的 Live Preview（实时预览）图标。\n2. 点击顶部的`TextField`并输入一些文本。请注意，此文本现在会显示在屏幕底部的`Text`视图（\"\
  表单 #1 =\"）中。\n3. 点击中间的`TextField`并输入一些文本。请注意，此文本现在会显示在屏幕底部的`Text`视图（\"表单 #2 =\"\
  ）中。\n\n### 将表单划分为分区\n\n一个`Form`可以容纳一个或多个视图。然而，`Form`中的视图越多，所有视图会显得越拥挤。为了对相关视图进行分组，你可以将`Form`划分为多个`Section`，每个`Section`可以包含一个或多个要在屏幕上显示的视图。此外，`Section`还可以显示可选的页眉和/或页脚。\n\
  \n最简单的`Section`仅将相关视图分组在一起，如下所示：\n\n```\nSection {\n    // 在此添加视图\n}\n```\n\n尽管`Section`在用户界面上看起来有明显的区别，你还可以通过使用页眉和/或页脚来进一步区隔`Section`。如果你只想定义一个页眉，可以使用如下代码：\n\
  \n```\nSection(\"此处的页眉文本\") {\n    // 在此添加视图\n}\n```\n\n这种方法会以大写字母显示文本，即使你没有以这种方式输入。定义页眉的另一种方式如下所示：\n\
  \n```\nSection(content: {\n    // 在此添加视图\n}, header: {\n    // 在此定义页眉文本\n})\n```\n\
  \n你也可以使用此方法仅定义页脚，如下所示：\n\n```\nSection(content: {\n    // 在此添加视图\n}, footer: {\n\
  \    // 在此定义页脚文本\n})\n```\n\n**注意：** 页脚中的文本会完全按照你输入的形式显示，这与自动以全大写形式显示文本的页眉不同。\n\n\
  如果你想同时定义页眉和页脚，可以使用以下代码：\n\n```\nSection {\n    // 在此添加视图\n} header: {\n    // 在此定义页眉文本\n\
  } footer: {\n    // 在此定义页脚文本\n}\n```\n\n要了解如何在`Section`中创建页眉和页脚，请按以下步骤操作：\n\n1.\
  \ 新建一个 SwiftUI iOS App 项目，并为其任意命名，例如 \"HeaderFormSections\"。\n2. 在导航器窗格中点击`____App`文件，其中`____`是你的项目名称。\n\
  3. 在`struct`上方添加以下内容：\n\n```\n@available(iOS 15.0, *)\n```\n\n4. 在导航器窗格中点击`ContentView`文件。\n\
  5. 在两个结构体上方添加以下内容：\n\n```\n@available(iOS 15.0, *)\n```\n\n6. 在`var body: some View`内部添加一个`Form`，如下所示：\n\
  \n```\nvar body: some View {\n    Form {\n    }\n}\n```\n\n7. 在`Form`内部以不同方式添加四个`Section`，如下所示：\n\
  \n```\nvar body: some View {\n    Form {\n        Section {\n            Text(\"\
  此分区没有页眉\")\n        }\n        Section(\"仅一个页眉\") {\n            Text(\"此分区使用简单的页眉\"\
  )\n        }\n        Section {\n            Text(\"此分区使用简单的页脚\")\n        } footer:\
  \ {\n            Text(\"仅一个页脚\")\n        }\n        Section {\n            Text(\"\
  此分区同时使用了页眉和页脚\")\n        } header: {\n            Text(\"页眉\")\n        } footer:\
  \ {\n            Text(\"页脚\")\n        }\n    }\n}\n```\n\n整个`ContentView`文件应如下所示：\n\
  \n```\nimport SwiftUI\n\n@available(iOS 15.0, *)\nstruct ContentView: View {\n \
  \   var body: some View {\n        Form {\n            Section {\n             \
  \   Text(\"此分区没有页眉\")\n            }\n            Section(\"仅一个页眉\") {\n       \
  \         Text(\"此分区使用简单的页眉\")\n            }\n            Section {\n         \
  \       Text(\"此分区使用简单的页脚\")\n            } footer: {\n                Text(\"仅一个页脚\"\
  )\n            }\n            Section {\n                Text(\"此分区同时使用了页眉和页脚\"\
  )\n            } header: {\n                Text(\"页眉\")\n            } footer:\
  \ {\n                Text(\"页脚\")\n            }\n        }\n    }\n}\n\n@available(iOS\
  \ 15.0, *)\nstruct ContentView_Previews: PreviewProvider {\n    static var previews:\
  \ some View {\n        ContentView()\n    }\n}\n```\n\n上述代码创建了一个包含四个不同`Section`的`Form`，如图\
  \ 14-4 所示。\n\n![../images/329781_6_En_14_Chapter/329781_6_En_14_Fig4_HTML.jpg](img/329781_6_En_14_Fig4_HTML.jpg)\n\
  \n**图 14-4** 显示分区的四种不同方式\n\n\n\n## 在表单中禁用视图\n\n通常，纸质表单可能会提出一系列问题。根据你的回答，另一组问题可能不再相关。例如，如果纸质表单询问你是已婚还是单身，你可能会回答“已婚”。在这种情况下，表单的另一部分可能会询问你配偶的姓名和联系方式。\n\
  \n然而，如果你回答“单身”，就没有必要再回答任何关于配偶的问题了。使用 SwiftUI 表单，你可以通过使用 `.disabled` 修饰符，基于一个布尔值选择性地禁用\
  \ `Form` 中的视图，如下所示：\n\n```\n.disabled(flag)\n```\n\n如果布尔变量的值为 `true`，那么 `.disabled`\
  \ 修饰符会阻止用户与所选视图进行交互。如果布尔变量的值为 `false`，那么 `.disabled` 修饰符则允许用户与所选视图进行交互。\n\n要了解如何在\
  \ `Form` 中使用 `.disabled` 修饰符，请按照以下步骤操作：\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其命名，例如\
  \ “FormDisable”。\n2.  在导航窗格中点击 `____App` 文件，其中 `____` 是你项目的名称。\n3.  在 `struct` 上方添加以下代码：\n\
  \n1.  在导航窗格中点击 `ContentView` 文件。\n2.  在两个结构体上方添加以下代码：\n\n```\n@available(iOS 15.0,\
  \ *)\n```\n\n1.  在 `struct ContentView: View` 行下方添加以下 `State` 变量，如下所示：\n\n```\n\
  @available(iOS 15.0, *)\n```\n\n1.  在 `var body: some View` 中添加一个 `Form`，如下所示：\n\
  \n```\nstruct ContentView: View {\n@State var flag = false\n```\n\n1.  在 `Form`\
  \ 内部添加一个 `Section` 来定义页眉和页脚，如下所示：\n\n```\nvar body: some View {\nForm {\n}\n}\n\
  ```\n\n1.  在 `Section` 内部添加一个 `Toggle` 和一个 `Button`，如下所示：\n\n```\nvar body: some\
  \ View {\nForm {\nSection {\n} header: {\nText(\"Header\")\n} footer: {\nText(\"\
  Footer\")\n}\n}\n}\n```\n\n```\nvar body: some View {\nForm {\nSection {\nToggle(isOn:\
  \ $flag) {\nText(\"Are you married?\")\n}\nButton(flag ? \"Disabled\" : \"Click\
  \ Me\") {\n}.disabled(flag)\n} header: {\nText(\"Header\")\n} footer: {\nText(\"\
  Footer\")\n}\n}\n}\n```\n\n注意，`.disabled` 修饰符会影响 `Button`。如果 `flag` 布尔变量为 `true`，则\
  \ `Button` 将被禁用。如果 `flag` 布尔变量为 `false`，则 `Button` 将处于启用状态。整个 `ContentView` 文件应该如下所示：\n\
  \n1.  点击画布窗格中的“Live Preview”图标。注意 `Button` 以蓝色显示标题“Click Me”。\n2.  点击 `Toggle`。这会将\
  \ `flag` 状态变量从 `false` 更改为 `true`（或从 `true` 更改为 `false`）。当 `flag` 状态变量等于 `true`\
  \ 时，`.disabled` 修饰符会使 `Button` 变灰，使用户无法选择它。\n\n```\nimport SwiftUI\n@available(iOS\
  \ 15.0, *)\nstruct ContentView: View {\n@State var flag = false\nvar body: some\
  \ View {\nForm {\nSection {\nToggle(isOn: $flag) {\nText(\"Are you married?\")\n\
  }\nButton(flag ? \"Disabled\" : \"Click Me\") {\n}.disabled(flag)\n} header: {\n\
  Text(\"Header\")\n} footer: {\nText(\"Footer\")\n}\n}\n}\n}\n@available(iOS 15.0,\
  \ *)\nstruct ContentView_Previews: PreviewProvider {\nstatic var previews: some\
  \ View {\nContentView()\n}\n}\n```\n\n## 使用分组框\n\n分组框提供了一种更简单的方法来将相关视图组织在一起。虽然与\
  \ `Form` 类似，但分组框可以显示标签并以图形方式在灰色矩形内显示多个视图，而 `Form` 则在白色矩形内显示多个视图，如图 14-5 所示。\n\n\
  ![../images/329781_6_En_14_Chapter/329781_6_En_14_Fig5_HTML.jpg](img/329781_6_En_14_Fig5_HTML.jpg)\n\
  \n图 14-5\n\n`Form` 和分组框之间的视觉差异\n\n要了解如何使用分组框，请按照以下步骤操作：\n\n1.  创建一个新的 SwiftUI iOS\
  \ App 项目，并为其命名，例如 “GroupBox”。\n2.  在导航窗格中点击 `ContentView` 文件。\n3.  在 `struct ContentView:\
  \ View` 行下方添加以下 `State` 变量，如下所示：\n\n1.  在 `var body: some View` 中添加一个分组框，如下所示：\n\
  \n```\nstruct ContentView: View {\n@State var flag = false\n@State var message =\
  \ \"\"\n```\n\n1.  在分组框内部添加一个 `Toggle` 和一个 `TextField`，如下所示：\n\n```\nvar body: some\
  \ View {\nGroupBox(label: Text(\"Group Box\")) {\n}\n}\n```\n\n```\nvar body: some\
  \ View {\nGroupBox(label: Text(\"Group Box\")) {\nToggle(isOn: $flag) {\nText(\"\
  Click me\")\n}\nTextField(\"Type here\", text: $message)\n}\n}\n```\n\n整个 `ContentView`\
  \ 文件应该如下所示：\n\n```\nimport SwiftUI\nstruct ContentView: View {\n@State var flag\
  \ = false\n@State var message = \"\"\nvar body: some View {\nGroupBox(label: Text(\"\
  Group Box\")) {\nToggle(isOn: $flag) {\nText(\"Click me\")\n}\nTextField(\"Type\
  \ here\", text: $message)\n}\n}\n}\nstruct ContentView_Previews: PreviewProvider\
  \ {\nstatic var previews: some View {\nContentView()\n}\n}\n```\n\n上述代码创建了一个分组框，如图\
  \ 14-6 所示。\n\n![../images/329781_6_En_14_Chapter/329781_6_En_14_Fig6_HTML.jpg](img/329781_6_En_14_Fig6_HTML.jpg)\n\
  \n图 14-6\n\n分组框的外观\n\n## 总结\n\n`Form` 允许你在用户界面上将相关视图视觉上分组在一起。为了进一步区分 `Form` 上的视图，你可以将一个\
  \ `Form` 划分为多个 `Section`，每个 `Section` 允许你定义可选的页眉和/或页脚。一个 `Section` 可以有页眉、页脚、同时有页眉和页脚，或者两者都没有。\n\
  \n根据用户对用户界面的响应方式，你可能希望禁用一个或多个视图，以防止用户与之交互。禁用一个或多个视图可以防止用户输入不必要的数据。\n\n`Form` 和分组框只是将相关视图分组在一起的两种不同方式，目的是使你的应用程序用户界面更易于理解。\n\
  \n"
- "# 15. 使用 Disclosure Groups、Scroll Views 和 Outline Groups\n\n许多应用程序包含大量信息，例如姓名和地址。但是，你可能不希望同时查看所有存储的信息，以免屏幕过于杂乱。当你希望为用户提供选择性地隐藏或显示信息的选项时，就可以使用\
  \ Disclosure Group 或 Outline Group。\n\nDisclosure Group 可以呈现两种状态。首先，它可以显示为一行代表链接的文本。其次，当用户点击此链接时，它会展开以显示一个或多个附加视图，如图\
  \ 15-1 所示。\n\n![../images/329781_6_En_15_Chapter/329781_6_En_15_Fig1_HTML.jpg](img/329781_6_En_15_Fig1_HTML.jpg)\n\
  \n图 15-1\n\nDisclosure Group 的两种状态\n\nDisclosure Group 可以选择性地隐藏或显示一组相关视图，而 Outline\
  \ Group 则可以在 `List`（参见第 13 章）中选择性地隐藏或显示文本组，如图 15-2 所示。\n\n![../images/329781_6_En_15_Chapter/329781_6_En_15_Fig2_HTML.jpg](img/329781_6_En_15_Fig2_HTML.jpg)\n\
  \n图 15-2\n\nOutline Group 的外观\n\n\n\n## 使用 Disclosure Group\n\n`DisclosureGroup`\
  \ 旨在隐藏一个或多个视图（如 `Text`、`Slider`、`Toggle` 等），直到用户点击 `DisclosureGroup` 名称将其展开。展开时，`DisclosureGroup`\
  \ 会在用户界面上显示一个或多个视图。\n\n**注意：** 与堆栈类似，一个 `DisclosureGroup` 最多可以容纳十个视图。但是，其中某些视图可以是能容纳多个子视图的堆栈。此外，你还可以在\
  \ `DisclosureGroup` 内嵌套其他 `DisclosureGroup`。\n\n要创建一个 `DisclosureGroup`，首先需要创建一段描述性文本，它在用户界面上代表一个链接。这段文本右侧会显示一个\
  \ ➤ 符号，提示用户该链接包含隐藏项。其次，你需要创建一个视图列表（最多十个），当用户选择该 `DisclosureGroup` 链接时，这些视图将会显示出来。\n\
  \n要了解如何创建 `DisclosureGroup`，请按照以下步骤操作：\n\n1.  创建一个新的 SwiftUI iOS App 项目，并随意命名，例如\
  \ “`DisclosureGroup`”。\n2.  在导航器面板中点击 `ContentView` 文件。\n3.  在 `struct ContentView:\
  \ View` 代码行下方添加三个 `State` 变量，如下所示：\n\n    ```\n    struct ContentView: View {\n\
  \    @State var sliderValue = 0.0\n    @State var message = \"\"\n    @State var\
  \ flag = true\n    ```\n\n4.  在 `var body: some View` 内部添加一个 `DisclosureGroup`，如下所示：\n\
  \n    ```\n    var body: some View {\n    DisclosureGroup(\"展开我\") {\n    }\n  \
  \  }\n    ```\n\n5.  在 `DisclosureGroup` 内部添加以下内容：\n\n    ```\n    var body: some\
  \ View {\n    DisclosureGroup(\"展开我\") {\n    Text(\"你输入了 = \\(message)\")\n   \
  \ TextField(\"在此输入\", text: $message)\n    .padding()\n    Text(flag ? \"开关 = 开启\"\
  \ : \"开关 = 关闭\")\n    Toggle(isOn: $flag) {\n    Text(\"开关\")\n    }.padding()\n\
  \    Text(\"滑块值 = \\(sliderValue)\")\n    Slider(value: $sliderValue, in: 0...15)\n\
  \    .padding()\n    }\n    }\n    ```\n\n完整的 `ContentView` 文件应如下所示：\n\n![../images/329781_6_En_15_Chapter/329781_6_En_15_Fig3_HTML.jpg](img/329781_6_En_15_Fig3_HTML.jpg)\n\
  \n**图 15-3** 展开后的 `DisclosureGroup`\n\n6.  点击画布面板中的实时预览图标。\n7.  点击 “展开我” `DisclosureGroup`\
  \ 链接，以显示隐藏在内的所有视图，如图 15-3 所示。\n\n    ```\n    import SwiftUI\n    struct ContentView:\
  \ View {\n    @State var sliderValue = 0.0\n    @State var message = \"\"\n    @State\
  \ var flag = true\n    var body: some View {\n    DisclosureGroup(\"展开我\") {\n \
  \   Text(\"你输入了 = \\(message)\")\n    TextField(\"在此输入\", text: $message)\n    .padding()\n\
  \    Text(flag ? \"开关 = 开启\" : \"开关 = 关闭\")\n    Toggle(isOn: $flag) {\n    Text(\"\
  开关\")\n    }.padding()\n    Text(\"滑块值 = \\(sliderValue)\")\n    Slider(value: $sliderValue,\
  \ in: 0...15)\n    .padding()\n    }\n    }\n    }\n    struct ContentView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n \
  \   }\n    }\n    ```\n\n8.  点击文本字段并输入一些文字。注意，你输入的任何文字都会显示在显示 “你输入了 =” 的 `Text`\
  \ 视图中。\n9.  点击开关。注意，每次点击开关时，开关上方显示 “开关 = 开启” 或 “开关 = 关闭” 的 `Text` 视图会相应更新。\n10.\
  \ 左右拖动滑块。注意，拖动滑块时，其数值会显示在滑块上方显示 “滑块值 =” 的 `Text` 视图中。\n11. 再次点击 `DisclosureGroup`\
  \ 链接以隐藏所有视图。每次点击 `DisclosureGroup` 链接时，它会在显示 `DisclosureGroup` 内的所有视图和隐藏它们之间切换。\n\
  \n## 使用 Scroll View\n\n当你在 `VStack` 中排列多个视图时，这些视图会固定在用户界面中。如果你显示的视图数量超过用户界面所能显示的范围，部分视图将被截断或隐藏不见。为了解决这个问题，SwiftUI\
  \ 提供了一种特殊的容器，称为 Scroll View（滚动视图）。\n\n与堆栈类似，Scroll View 可以容纳多个视图。与堆栈不同，Scroll View\
  \ 允许用户垂直或水平滚动以查看 Scroll View 的全部内容。Scroll View 可以在任何你可能使用堆栈的地方工作，包括在 `DisclosureGroup`\
  \ 内部。\n\n创建 Scroll View 最简单的方法是像这样定义一个 `ScrollView`：\n\n```\nScrollView {\n//  在此放置多个视图\n\
  }\n```\n\n这允许你垂直滚动，并在右侧显示滚动指示器。滚动指示器让你了解当前滚动位置距离列表项开头或结尾的远近程度，如图 15-4 所示。\n\n![../images/329781_6_En_15_Chapter/329781_6_En_15_Fig4_HTML.jpg](img/329781_6_En_15_Fig4_HTML.jpg)\n\
  \n**图 15-4** 滚动指示器出现在垂直滚动的 Scroll View 右侧\n\n另一种创建 Scroll View 的方法是定义滚动方向（`Axis.Set.horizontal`\
  \ 或 `Axis.Set.vertical`）以及是否显示滚动指示器（`showsIndicators:` 参数），如下所示：\n\n```\nScrollView(Axis.Set.horizontal,\
  \ showsIndicators: false, content: {\n}\n```\n\n要了解 Scroll View 如何工作，请按照以下步骤操作：\n\
  \n1.  创建一个新的 SwiftUI iOS App 项目，并随意命名，例如 “`ScrollView`”。\n2.  在导航器面板中点击 `ContentView`\
  \ 文件。\n3.  在 `var body: some View` 代码行下方添加一个 `ScrollView`，如下所示：\n\n    ```\n   \
  \ var body: some View {\n    ScrollView(Axis.Set.vertical, showsIndicators: true,\
  \ content: {\n    })\n    ```\n\n    要缩短 `ScrollView` 代码，你可以直接这样写：\n\n    ```\n\
  \    var body: some View {\n    ScrollView {\n    }\n    ```\n\n4.  在 `ScrollView`\
  \ 内部添加一个 `ForEach` 循环，如下所示：\n\n    ```\n    var body: some View {\n    ScrollView(Axis.Set.vertical,\
  \ showsIndicators: true, content: {\n    ForEach(0..<50) {\n    Text(\"项目 #\\($0)\
  \     \")\n    }\n    })\n    ```\n\n5.  点击画布面板上的实时预览图标。\n6.  在用户界面上显示的 “项目 #” 列表项中上下滚动。注意上下滚动时，你可以看到右侧的滑块指示器。\n\
  \n\n\n## 使用大纲组\n\n`OutlineGroup` 的作用类似于一个超级 `DisclosureGroup`。主要区别在于，`DisclosureGroup`\
  \ 最多只能显示十个视图，而 `OutlineGroup` 可以显示在单独类中定义的无限数量的项目。此外，`OutlineGroup` 会自动缩进类别，以便更容易看清项目之间的层级关系（见图\
  \ 15-2）。\n\n`OutlineGroup` 用于显示定义关系的对象数组。要使用 `OutlineGroup`，您需要执行以下操作：\n\n-   创建一个用于存放要显示数据的类。\n\
  -   创建一个用于存放由该类定义的多个对象的数组。\n-   创建一个用于显示对象中存储数据的 `OutlineGroup`。\n\n要创建一个存放要显示数据的类，您需要使其符合\
  \ `Identifiable` 协议。这样，基于该类创建的每个对象都将拥有一个唯一的标识号，如下所示：\n\n```\nclass Species: Identifiable\
  \ {\n    let id = UUID()\n}\n```\n\n接下来，您需要在 `OutlineGroup` 中定义要显示的数据，例如一个字符串，如下所示：\n\
  \n```\nclass Species: Identifiable {\n    let id = UUID()\n    var name: String\n\
  }\n```\n\n下一步是创建一个可选的数组，用于存放子类别。这些子类别项也必须是同一个类，如下所示：\n\n```\nclass Species: Identifiable\
  \ {\n    let id = UUID()\n    var name: String\n    var classification: [Species]?\n\
  }\n```\n\n最后，该类需要一个初始化器，因为该类的所有属性都没有初始值。这意味着每次创建对象时，都必须为其属性赋值。在这种情况下，唯一需要赋值的属性是“name”属性，它持有一个绝对必要的\
  \ `String` 数据类型。另一个名为“classification”的属性可以持有一个对象数组，也可以是 `nil` 值：\n\n```\nclass Species:\
  \ Identifiable {\n    let id = UUID()\n    var name: String\n    var classification:\
  \ [Species]?\n    init(name: String, classification: [Species]? = nil) {\n     \
  \   self.name = name\n        self.classification = classification\n    }\n}\n```\n\
  \n定义类之后，下一步是定义一个基于该类存放对象的数组，如下所示：\n\n```\nvar Animals: [Species] = [\n    Species(name:\
  \ \"Mammal\", classification: [\n        Species(name: \"Dog\", classification:\
  \ [\n            Species(name: \"Poodle\"),\n            Species(name: \"Collie\"\
  ),\n        ]),\n    ]),\n]\n```\n\n请注意，此数组被定义为存放基于所定义类的对象（本例中为“`Animals`”）。数组中的每个对象都需要一个名称（例如“Mammal”或“Collie”）。某些对象不包含子类别列表，但对于那些包含子类别列表的对象，您需要指定一个基于同一个类（“`Species`”）的对象数组。在前面的示例中，“Dog”对象定义了一个包含“Poodle”和“Collie”的对象数组。\n\
  \n第三步是定义一个 `OutlineGroup`：\n\n```\nOutlineGroup(Animals, id: \\.id, children: \\\
  .classification) { creature in\n    Text(creature.name)\n}\n```\n\n这定义了要使用的数组（`Animals`），并使用唯一\
  \ ID（在类声明中由 `UUID()` 定义）来显示数组中的每个项目。如果对象中存储有任何子项或子类别，则由 `children:` 参数标识。最后，`OutlineGroup`\
  \ 中的 `Text` 视图显示每个对象的 `name` 属性。\n\n要了解如何使用 `OutlineGroup`，请按照以下步骤操作：\n\n1.  创建一个新的\
  \ SwiftUI iOS App 项目，并为其指定任意名称，例如“`OutlineGroup`”。\n2.  在导航器窗格中点击 `ContentView`\
  \ 文件。\n3.  在 `import SwiftUI` 行下方添加以下类声明，如下所示：\n\n```\nclass Species: Identifiable\
  \ {\n    let id = UUID()\n    var name: String\n    var classification: [Species]?\n\
  \    init(name: String, classification: [Species]? = nil) {\n        self.name =\
  \ name\n        self.classification = classification\n    }\n}\n```\n\n4.  在 `struct\
  \ ContentView: View` 行下方添加以下数组，如下所示：\n\n```\nstruct ContentView: View {\n    var\
  \ Animals: [Species] = [\n        Species(name: \"Mammal\", classification: [\n\
  \            Species(name: \"Dog\", classification: [\n                Species(name:\
  \ \"Poodle\"),\n                Species(name: \"Collie\"),\n                Species(name:\
  \ \"St. Bernard\"),\n            ]),\n            Species(name: \"Cat\"),\n    \
  \        Species(name: \"Elephant\"),\n            Species(name: \"Whale\"),\n \
  \       ]),\n        Species(name: \"Bird\", classification: [\n            Species(name:\
  \ \"Canary\"),\n            Species(name: \"Parakeet\"),\n            Species(name:\
  \ \"Eagle\"),\n        ]),\n    ]\n}\n```\n\n5.  在 `var body: some View` 行下方添加 `OutlineGroup`，如下所示：\n\
  \n```\nvar body: some View {\n    List {\n        OutlineGroup(Animals, id: \\.id,\
  \ children: \\.classification) { creature in\n            Text(creature.name)\n\
  \        }\n    }\n}\n```\n\n整个 `ContentView` 文件应如下所示：\n\n```\nimport SwiftUI\n\n\
  class Species: Identifiable {\n    let id = UUID()\n    var name: String\n    var\
  \ classification: [Species]?\n    init(name: String, classification: [Species]?\
  \ = nil) {\n        self.name = name\n        self.classification = classification\n\
  \    }\n}\n\nstruct ContentView: View {\n    var Animals: [Species] = [\n      \
  \  Species(name: \"Mammal\", classification: [\n            Species(name: \"Dog\"\
  , classification: [\n                Species(name: \"Poodle\"),\n              \
  \  Species(name: \"Collie\"),\n                Species(name: \"St. Bernard\"),\n\
  \            ]),\n            Species(name: \"Cat\"),\n            Species(name:\
  \ \"Elephant\"),\n            Species(name: \"Whale\"),\n        ]),\n        Species(name:\
  \ \"Bird\", classification: [\n            Species(name: \"Canary\"),\n        \
  \    Species(name: \"Parakeet\"),\n            Species(name: \"Eagle\"),\n     \
  \   ]),\n    ]\n\n    var body: some View {\n        List {\n            OutlineGroup(Animals,\
  \ id: \\.id, children: \\.classification) { creature in\n                Text(creature.name)\n\
  \            }\n        }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider\
  \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
  \n6.  在画布窗格中点击 Live Preview 图标。\n7.  点击 `OutlineGroup` 中任何在最右侧显示 ➤ 字符的项目。这表示该项目包含可以显示的附加列表（见图\
  \ 15-2）。\n\n`OutlineGroup` 可以很方便地存储和显示用户可以隐藏或显示的项目列表。由于 `OutlineGroup` 使用数组，因此在\
  \ `OutlineGroup` 中可以显示的项目数量没有限制（这与 `DisclosureGroup` 最多十个视图的限制不同）。\n\n## 总结\n\n\
  `DisclosureGroup` 可以方便地暂时隐藏一个或多个视图。通过点击 `DisclosureGroup` 标题，您可以在显示和隐藏附加视图之间切换。可以把\
  \ `DisclosureGroup` 想象成一个可折叠的视图列表。\n\n`DisclosureGroup` 使隐藏或查看数据变得容易，而 `ScrollView`\
  \ 则使上下滚动查看附加数据变得简单。您甚至可以在 `DisclosureGroup` 内部使用 `ScrollView`。\n\n如果您需要以层次结构显示数据，请考虑使用\
  \ `OutlineGroup`。使用 `OutlineGroup` 需要定义一个类，其中包含您要存储的属性以及一个 `UUID()`，以便为每一块数据自动创建不同的\
  \ ID 编号。然后，您需要根据定义的类创建一个对象数组。最后，您可以使用 `OutlineGroup` 在屏幕上显示数据。\n\n`DisclosureGroup`、`ScrollView`\
  \ 和 `OutlineGroup` 只是将相关数据分组在一起的不同方式。`DisclosureGroup` 类似于可折叠的列表。`ScrollView` 允许用户查看通常可能被截断的数据。`OutlineGroup`\
  \ 类似于多个可以有选择地隐藏或显示数据的 `DisclosureGroup`。这三种视图的全部目的都是为了提供向用户显示信息的不同方式。\n\n\n\n##\
  \ 使用导航视图\n\n只有最简单的应用（如计算器应用）才由单个屏幕组成。然而，大多数应用通常需要两个或更多屏幕来显示信息。在 SwiftUI 中，你可以通过创建独立的结构来定义应用用户界面的每个屏幕。然后，你需要提供一种从一个屏幕跳转到另一个屏幕的方法。\n\
  \n从一个屏幕跳转到另一个屏幕的最简单方法之一是通过**导航视图**，它可以按顺序显示多个屏幕。这种导航视图广泛用于许多 iOS 应用（如“设置”），让用户可以查看不同的选项，如图\
  \ 16-1 所示。\n\n![../images/329781_6_En_16_Chapter/329781_6_En_16_Fig1_HTML.png](img/329781_6_En_16_Fig1_HTML.png)\n\
  \n图 16-1\n\n导航视图使从一个屏幕跳转到另一个屏幕变得简单\n\n在图 16-1 中，用户可以点击主屏幕上的“设置”图标来显示设置屏幕。点击“通用”会打开通用屏幕。接着点击“键盘”会打开键盘屏幕。请注意，要返回，只需点击左上角的“返回”按钮即可。\n\
  \n从键盘屏幕，返回按钮带你回到通用屏幕。从通用屏幕，返回按钮带你回到设置屏幕。导航视图所做的仅仅是允许用户按顺序从一个屏幕跳转到另一个屏幕。\n\n## 使用导航视图\n\
  \n导航视图可以像栈一样容纳最多十个视图。导航视图使用如下代码包含多个视图：\n\n```\nNavigationView {\n// 在这里放置多个视图\n\
  }\n```\n\n导航视图会在屏幕顶部创建一小块空间，称为导航栏。这个空间的目的是显示按钮或图标。在添加任何按钮或图标之前，这个导航栏空间将显示为空白。\n\n\
  修改导航视图的一种常见方式是使用 `.navigationTitle` 和 `.navigationBarTitleDisplayMode` 修饰符来添加标题。\n\
  \n> **注意**\n> 当为 `NavigationView` 添加修饰符时，请将修饰符放在 `NavigationView` 的花括号内，如下所示：\n\
  > ```\n> NavigationView {\n>     .navigationTitle(\"导航标题\")\n>     .navigationBarTitleDisplayMode(.inline)\n\
  > }\n> ```\n\n`.navigationTitle` 修饰符允许你定义显示在屏幕顶部的文本。`.navigationBarTitleDisplayMode`\
  \ 修饰符允许你定义该标题在屏幕上的显示方式。两个选项是 `.large` 和 `.inline`，如图 16-2 所示，如果你不添加 `.navigationBarTitleDisplayMode`\
  \ 修饰符，`.large` 是默认选项。\n\n![../images/329781_6_En_16_Chapter/329781_6_En_16_Fig2_HTML.jpg](img/329781_6_En_16_Fig2_HTML.jpg)\n\
  \n图 16-2\n\n导航标题在 `.large` 和 `.inline` 修饰符下的外观\n\n要了解如何创建一个简单的导航视图，请遵循以下步骤：\n\n\
  1. 创建一个新的 SwiftUI iOS 应用项目，并为其指定任意名称，例如 “SimpleNavigationView”。\n2. 在导航器面板中点击 `ContentView`\
  \ 文件。\n3. 在 `struct ContentView: View` 行下添加一个状态变量，如下所示：\n4. 在 `var body: some View`\
  \ 内部添加一个 `NavigationView`，如下所示：\n5. 添加一个 `Toggle`、一个 `.navigationTitle` 修饰符和一个 `.navigationBarTitleDisplayMode`\
  \ 修饰符，如下所示：\n\n```\nstruct ContentView: View {\n    @State var flag = true\n}\n\
  ```\n\n```\nvar body: some View {\n    NavigationView {\n    }\n}\n```\n\n```\n\
  var body: some View {\n    NavigationView {\n        Toggle(isOn: $flag, label:\
  \ {\n            Text(\"切换显示模式\")\n        })\n        .navigationTitle(\"导航标题\"\
  )\n        .navigationBarTitleDisplayMode(flag ? .large : .inline)\n    }\n}\n```\n\
  \n这段代码根据 `Toggle` 的值将导航标题的外观更改为 `.large` 或 `.inline`。\n\n1. 点击画布面板上的 Live Preview\
  \ 图标。\n2. 点击 `Toggle`，观察导航标题如何在 `.large` 和 `.inline` 样式之间切换。\n\n如果你想完全隐藏导航标题和导航栏，可以使用\
  \ `.navigationBarHidden` 修饰符，如下所示：\n\n```\n.navigationBarHidden(true)\n```\n\n如果你不希望导航视图占据屏幕顶部的空间，或者想临时隐藏导航标题，这会很有用。\n\
  \n### 向导航栏添加按钮\n\n导航栏提供了在屏幕顶部显示一个或多个按钮的空间。在导航栏上创建按钮的第一步是向 Navigation View 内部添加 `.toolbar`\
  \ 修饰符，如下所示：\n\n```\nNavigationView {\n    .navigationTitle(\"导航标题\")\n    .toolbar\
  \ {\n    }\n}\n```\n\n默认情况下，在 `.toolbar` 内部定义的任何按钮或图标的颜色都是蓝色。如果你想定义不同的颜色，可以向 `NavigationView`\
  \ 添加 `.accentColor` 修饰符，如下所示：\n\n```\nNavigationView {\n    .navigationTitle(\"\
  导航标题\")\n    .toolbar {\n    }\n}\n.accentColor(.purple)\n```\n\n在 `.toolbar` 修饰符内部，你可以定义一个或多个\
  \ `ToolbarItem`。对于添加的每个 `ToolbarItem`，你可以定义其位置（在左上角为 `.navigationBarLeading`，或在右上角为\
  \ `.navigationBarTrailing`）。此外，你必须定义按钮的外观以及用户选择该按钮时要运行的代码，如下所示：\n\n```\n.toolbar\
  \ {\n    ToolbarItem(placement: .navigationBarLeading) {\n        Button {\n   \
  \         //  要运行的代码\n        } label: {\n            //  在此处定义按钮的外观\n        }\n\
  \    }\n    ToolbarItem(placement: .navigationBarTrailing) {\n        Button {\n\
  \            //  要运行的代码\n        } label: {\n            //  在此处定义按钮的外观\n      \
  \  }\n    }\n}\n```\n\n要了解如何在导航视图中定义按钮，请遵循以下步骤：\n\n1. 创建一个新的 SwiftUI iOS 应用项目，并为其指定任意名称，例如\
  \ “NavigationViewButtons”。\n2. 在导航器面板中点击 `ContentView` 文件。\n3. 在 `struct ContentView:\
  \ View` 行下添加两个状态变量，如下所示：\n4. 在 `var body: some View` 行下添加一个 `NavigationView` 和一个\
  \ `VStack`，如下所示：\n5. 向 `NavigationView` 添加 `.accentColor` 修饰符，如下所示：\n6. 添加一个 `Text`\
  \ 视图、一个 `Toggle`、`.navigationTitle`、`.navigationBarTitleDisplayMode` 和 `.toolbar`\
  \ 修饰符，如下所示：\n7. 在 `.toolbar` 内部添加两个 `ToolbarItems`，如下所示：\n\n```\nstruct ContentView:\
  \ View {\n    @State var flag = true\n    @State var message = \"\"\n}\n```\n\n\
  ```\nvar body: some View {\n    NavigationView {\n        VStack {\n        }\n\
  \    }\n}\n```\n\n```\nvar body: some View {\n    NavigationView {\n        VStack\
  \ {\n        }\n    }\n    .accentColor(.purple)\n}\n```\n\n```\nvar body: some\
  \ View {\n    NavigationView {\n        VStack {\n            Text(message)\n  \
  \          Toggle(isOn: $flag, label: {\n                Text(\"切换显示模式\")\n    \
  \        })\n            .navigationTitle(\"导航标题\")\n            .navigationBarTitleDisplayMode(flag\
  \ ? .large : .inline)\n            .toolbar {\n            }\n        }\n    }\n\
  \    .accentColor(.purple)\n}\n```\n\n```\nvar body: some View {\n    NavigationView\
  \ {\n        VStack {\n            Text(message)\n            Toggle(isOn: $flag,\
  \ label: {\n                Text(\"切换显示模式\")\n            })\n            .navigationTitle(\"\
  导航标题\")\n            .navigationBarTitleDisplayMode(flag ? .large : .inline)\n \
  \           .toolbar {\n                ToolbarItem(placement: .navigationBarLeading)\
  \ {\n                    Button {\n                        message = \"已点击 iCloud\
  \ 图标\"\n                    } label: {\n                        Image(systemName:\
  \ \"icloud\")\n                    }\n                }\n                ToolbarItem(placement:\
  \ .navigationBarTrailing) {\n                    Button {\n                    \
  \    message = \"已点击完成按钮\"\n                    } label: {\n                   \
  \     Text(\"完成\")\n                    }\n                }\n            }\n  \
  \      }\n    }\n    .accentColor(.purple)\n}\n```\n\n对于每个 `ToolbarItem`，你可以使用 `Text`\
  \ 视图或 `Image` 视图来定义按钮的外观。上述代码在左上角显示一个云图标，在右上角显示单词“完成”，如图 16-3 所示。\n\n![../images/329781_6_En_16_Chapter/329781_6_En_16_Fig3_HTML.jpg](img/329781_6_En_16_Fig3_HTML.jpg)\n\
  \n图 16-3\n\n使用 `.inline` 修饰符的工具栏按钮外观\n\n1. 点击画布面板上的 Live Preview 图标。\n2. 点击导航栏中由\
  \ `ToolbarItem` 定义的按钮。注意每次点击工具栏按钮时，`Text` 视图中会显示一条消息，例如“已点击 iCloud 图标”或“已点击完成按钮”。\n\
  \n\n\n## 为导航视图添加链接\n\n`NavigationView`的主要目的是让用户从一个屏幕跳转到另一个屏幕。为此，你需要使用`NavigationLink`来定义：\n\
  \n- 链接上显示的文本\n- 用户选择`NavigationLink`后要显示的下一个视图\n\n`NavigationLink`的结构如下所示：\n\n```\n\
  NavigationLink(destination: /* 要显示的下一个视图 */) {\n    // 用于定义链接外观的文本视图\n}\n```\n\n\
  目标可以是任何视图，而链接通常是一个`Text`视图，但也可以是`Image`视图。要了解如何创建导航链接，请按以下步骤操作：\n\n1. 创建一个新的 SwiftUI\
  \ iOS App 项目，并为其指定任意名称，例如`SimpleNavigationViewLinks`。\n2. 在导航器窗格中点击`ContentView`文件。\n\
  3. 在`var body: some View`代码行内添加一个`NavigationView`和一个`VStack`，如下所示：\n\n```\nvar body:\
  \ some View {\n    NavigationView {\n        VStack {\n        }\n    }\n}\n```\n\
  \n4. 在`VStack`内部添加两个`NavigationLinks`，并添加一个`.navigationTitle`修饰符，如下所示：\n\n```\n\
  var body: some View {\n    NavigationView {\n        VStack {\n            NavigationLink(destination:\
  \ Text(\"文本视图\")) {\n                Text(\"这是一个导航链接\")\n            }\n       \
  \     NavigationLink(destination: Image(systemName: \"hare\")) {\n             \
  \   Text(\"第二个导航链接\")\n            }\n            .navigationTitle(\"导航标题\")\n \
  \       }\n    }\n}\n```\n\n第一个`NavigationLink`将`Text`视图定义为其目标，而第二个`NavigationLink`将`Image`视图定义为其目标。两者都将显示在`NavigationView`内，并在左上角带有一个返回按钮。整个`ContentView`文件应如下所示：\n\
  \n```\nimport SwiftUI\n\nstruct ContentView: View {\n    var body: some View {\n\
  \        NavigationView {\n            VStack {\n                NavigationLink(destination:\
  \ Text(\"文本视图\")) {\n                    Text(\"这是一个导航链接\")\n                }\n\
  \                NavigationLink(destination: Image(systemName: \"hare\")) {\n  \
  \                  Text(\"第二个导航链接\")\n                }\n                .navigationTitle(\"\
  导航标题\")\n            }\n        }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider\
  \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
  \n5. 点击画布窗格上的**实时预览**图标。两个`NavigationLinks`将显示在`导航标题`下方的屏幕上。\n6. 点击`这是一个导航链接`。注意，显示`文本视图`的`Text`视图将出现在屏幕上，并在左上角带有一个返回按钮。\n\
  7. 点击**返回**按钮，返回到显示这两个导航链接的`NavigationView`。\n8. 点击`第二个导航链接`。注意，显示`hare`图标的`Image`视图将出现在屏幕上，并在左上角带有一个返回按钮。\n\
  \n### 在导航视图中显示结构\n\n在某些情况下，仅在`NavigationView`内显示单个视图（如`Text`或`Image`视图）可能没问题。然而，很多时候你可能希望显示一个全新的用户界面。由于你可以使用结构体定义用户界面屏幕，因此你可以使用多个结构体创建多个屏幕，这些屏幕可以显示在`NavigationView`内。\n\
  \n创建新结构体的最简单方法是在`ContentView`文件内进行。然而，这可能会使代码变得臃肿，因此第二种方法是将结构体存储在单独的文件中。\n\n要了解如何创建定义另一个用户界面屏幕的结构体，请按以下步骤操作：\n\
  \n1. 创建一个新的 SwiftUI iOS App 项目，并为其指定任意名称，例如`NavigationViewStructures`。\n2. 在导航器窗格中点击`ContentView`文件。\n\
  3. 在`var body: some View`代码行内添加一个`NavigationView`和一个`VStack`，如下所示：\n\n```\nvar body:\
  \ some View {\n    NavigationView {\n        VStack {\n        }\n    }\n}\n```\n\
  \n4. 向`VStack`添加两个`NavigationLinks`和一个`.navigationTitle`修饰符，如下所示：\n\n```\nvar body:\
  \ some View {\n    NavigationView {\n        VStack {\n            NavigationLink(destination:\
  \ FileView()) {\n                Text(\"链接到同一文件中的结构\")\n            }\n        \
  \    NavigationLink(destination: SeparateFileView()) {\n                Text(\"\
  链接到单独文件\")\n            }\n            .navigationTitle(\"导航标题\")\n        }\n \
  \   }\n}\n```\n\n第一个`NavigationLink`将显示一个名为`FileView`的结构体。第二个`NavigationLink`将显示一个名为`SeparateFileView`的结构体。由于这两个结构体尚不存在，我们需要创建它们。\n\
  \n5. 在`struct ContentView: View`整个结构体下方添加以下结构体，如下所示：\n\n```\nstruct FileView: View\
  \ {\n    var body: some View {\n        HStack {\n            Spacer()\n       \
  \     VStack {\n                Spacer()\n                Text(\"这是一个独立的结构\")\n\
  \                Text(\"存储在同一个文件中\")\n                Spacer()\n            }\n\
  \            Spacer()\n        }.background(Color.yellow)\n    }\n}\n```\n\n整个`ContentView`文件应如下所示：\n\
  \n```\nimport SwiftUI\n\nstruct ContentView: View {\n    var body: some View {\n\
  \        NavigationView {\n            VStack {\n                NavigationLink(destination:\
  \ FileView()) {\n                    Text(\"链接到同一文件中的结构\")\n                }\n\
  \                NavigationLink(destination: SeparateFileView()) {\n           \
  \         Text(\"链接到单独文件\")\n                }\n                .navigationTitle(\"\
  导航标题\")\n            }\n        }\n    }\n}\n\nstruct FileView: View {\n    var\
  \ body: some View {\n        HStack {\n            Spacer()\n            VStack\
  \ {\n                Spacer()\n                Text(\"这是一个独立的结构\")\n           \
  \     Text(\"存储在同一个文件中\")\n                Spacer()\n            }\n           \
  \ Spacer()\n        }.background(Color.yellow)\n    }\n}\n\nstruct ContentView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
  \    }\n}\n```\n\n我们可以继续在`ContentView`文件中添加新的结构体，但这有使文件变得臃肿的风险。创建结构体的第二种方法是将它们存储在单独的文件中，接下来的步骤将指导我们完成此操作。\n\
  \n![图 16-4](img/329781_6_En_16_Fig4_HTML.jpg)\n\n**图 16-4** — 用于选择创建文件的对话框\n\n6.\
  \ 选择**文件** ➤ **新建** ➤ **文件**。将出现一个对话框，如图 16-4 所示。\n7. 点击对话框顶部的 **iOS**，点击 **Swift\
  \ 文件**，然后点击**下一步**。Xcode 会提示你为新创建的文件命名。\n8. 输入`SeparateFile`并点击**创建**。Xcode 会创建一个新的\
  \ Swift 文件。\n9. 删除`SeparateFile`中当前的所有代码，并用以下代码替换：\n\n```\nimport SwiftUI\n\nstruct\
  \ SeparateFileView: View {\n    var body: some View {\n        HStack {\n      \
  \      Spacer()\n            VStack {\n                Spacer()\n              \
  \  Text(\"这是另一个结构\")\n                Text(\"但存储在单独的文件中\")\n                Spacer()\n\
  \            }\n            Spacer()\n        }.background(Color.orange)\n    }\n\
  }\n\nstruct SeparateFileView_Previews: PreviewProvider {\n    static var previews:\
  \ some View {\n        SeparateFileView()\n    }\n}\n```\n\n> **注意：**将结构体存储在单独文件中时，你需要第二个结构体（`PreviewProvider`）才能在画布窗格中显示该用户界面。\n\
  \n10. 在导航器窗格中点击`ContentView`文件。\n11. 点击画布窗格中的**实时预览**图标。\n12. 点击`链接到同一文件中的结构`。注意，这将显示存储在`ContentView`文件中的`FileView`结构体。\n\
  13. 点击**返回**按钮返回原始屏幕。\n14. 点击`链接到单独文件`。注意，这将显示存储在名为`SeparateFile`的文件中的`SeparateFileView`结构体。\n\
  \n\n\n#### 在导航视图中传递数据\n\n上一个项目创建了两个结构体，其中一个存储在 `ContentView` 文件中，另一个存储在单独的文件夹中。在这两种情况下，这些结构体定义的用户界面显示的都是静态信息，与原始结构体\
  \ (`ContentView`) 中的任何内容都没有关联。\n\n在许多情况下，你可能希望将某个结构体中的数据传递到另一个结构体中。这意味着我们必须将数据从一个结构体传递到另一个。\n\
  \n幸运的是，这项任务类似于在函数之间传递数据。当一个结构体需要接收数据时，我们只需通过创建一个变量、为该变量起一个描述性名称并定义该变量可以容纳的数据类型（如\
  \ `String` 或 `Double`）来声明一个属性，如下所示：\n\n```\nstruct FileView: View {\nvar choice:\
  \ String\n```\n\n这定义了一个名为 `choice` 的变量，它可以容纳一个 `String` 值。要将数据传递给此结构体，我们可以通过调用结构体名称\
  \ (`FileView`) 并将这个 `choice` 变量作为参数来加载此结构体，如下所示：\n\n```\nFileView(choice: \"Heads\"\
  )\n```\n\n当将数据传递给存储在同一文件中的结构体时，我们只需遵循以下两步流程：\n\n-   在结构体内部声明一个或多个变量来接收数据。\n-   使用这些变量作为参数来调用该结构体。\n\
  \n然而，当将数据传递给存储在单独文件中的结构体时，还需要额外一步。因为存储在单独文件中的结构体也包含另一个在画布面板中显示用户界面的预览结构体，所以这个预览结构体必须包含该结构体的参数，并同样为其传递数据，如下所示：\n\
  \n```\nstruct SeparateFileView_Previews: PreviewProvider {\nstatic var previews:\
  \ some View {\nSeparateFileView(passedData: \"\")\n}\n}\n```\n\n要了解如何在结构体之间传递数据，请遵循以下步骤：\n\
  \n1.  创建一个新的 SwiftUI iOS 应用项目，并为其任意命名，例如 `NavigationViewPassData`。\n2.  在导航窗格中点击\
  \ `ContentView` 文件。\n3.  像这样编辑 `struct ContentView` 结构体：\n\n```\nstruct ContentView:\
  \ View {\nvar body: some View {\nNavigationView {\nVStack (spacing: 26) {\nText(\"\
  Choose Heads or Tails\")\nNavigationLink(destination: FileView(choice: \"Heads\"\
  )) {\nText(\"Heads\")\n}\nNavigationLink(destination: SeparateFileView(passedData:\
  \ \"Tails\")) {\nText(\"Tails\")\n}\n.navigationTitle(\"Flip a Coin\")\n}\n}\n}\n\
  }\n```\n\n上述代码定义了两个 `NavigationLink`：其中一个调用名为 `FileView` 的结构体，并传入参数 `choice:`，其值为\
  \ `\"Heads\"`。第二个 `NavigationLink` 调用名为 `SeparateFileView` 的结构体，并传入参数 `passedData:`，其值为\
  \ `\"Tails\"`。\n\n4.  在 `struct ContentView` 下方添加一个新的结构体，如下所示：\n\n```\nstruct FileView:\
  \ View {\nvar choice: String\nvar body: some View {\nHStack {\nSpacer()\nVStack\
  \ {\nSpacer()\nText(\"You chose = \\(choice)\")\nSpacer()\n}\nSpacer()\n}.background(Color.yellow)\n\
  }\n}\n```\n\n这个 `FileView` 结构体声明了一个 `choice` 变量，它可以容纳一个 `String` 值。然后，它在一个显示 `\"\
  You chose = \"` 的 `Text` 视图中展示了这个 `choice` 变量。整个 `ContentView` 文件应该如下所示：\n\n```\n\
  import SwiftUI\nstruct ContentView: View {\nvar body: some View {\nNavigationView\
  \ {\nVStack (spacing: 26) {\nText(\"Choose Heads or Tails\")\nNavigationLink(destination:\
  \ FileView(choice: \"Heads\")) {\nText(\"Heads\")\n}\nNavigationLink(destination:\
  \ SeparateFileView(passedData: \"Tails\")) {\nText(\"Tails\")\n}\n.navigationTitle(\"\
  Flip a Coin\")\n}\n}\n}\n}\nstruct FileView: View {\nvar choice: String\nvar body:\
  \ some View {\nHStack {\nSpacer()\nVStack {\nSpacer()\nText(\"You chose = \\(choice)\"\
  )\nSpacer()\n}\nSpacer()\n}.background(Color.yellow)\n}\n}\nstruct ContentView_Previews:\
  \ PreviewProvider {\nstatic var previews: some View {\nContentView()\n}\n}\n```\n\
  \n这段代码创建了一个名为 `FileView` 的结构体，但现在我们需要创建第二个名为 `SeparateFileView` 的结构体，它声明了一个 `passedData`\
  \ 字符串变量。\n\n5.  选择 **文件 ➤ 新建 ➤ 文件**。出现一个对话框（参见图 16-4）。\n6.  点击对话框顶部附近的 **iOS**，点击\
  \ **Swift 文件**，然后点击 **下一步**。Xcode 会要求你为新建的文件命名。\n7.  输入 `SeparateFile` 并点击 **创建**。Xcode\
  \ 会创建一个新的 Swift 文件。\n8.  删除 `SeparateFile` 文件中当前的所有代码，并用以下代码替换：\n\n```\nimport SwiftUI\n\
  struct SeparateFileView: View {\nvar passedData: String\nvar body: some View {\n\
  HStack {\nSpacer()\nVStack {\nSpacer()\nText(\"You chose = \\(passedData)\")\nSpacer()\n\
  }\nSpacer()\n}.background(Color.orange)\n}\n}\nstruct SeparateFileView_Previews:\
  \ PreviewProvider {\nstatic var previews: some View {\nSeparateFileView(passedData:\
  \ \"\")\n}\n}\n```\n\n此文件创建了一个 `SeparateFileView` 结构体，它声明了一个 `passedData` 字符串变量。由于这个\
  \ `SeparateFileView` 结构体存储在单独的文件中，它包含一个 `struct PreviewProvider`，我们必须在此处也使用 `passedData`\
  \ 参数。\n\n9.  点击导航窗格中的 `ContentView` 以返回 `ContentView` 结构体。\n10. 点击画布面板中的 **实时预览**\
  \ 图标。\n11. 点击 **Heads** 导航链接。`FileView` 结构体会出现，并显示 `\"You chose = Heads\"`。\n12.\
  \ 点击左上角的 **返回** 按钮。\n13. 点击 **Tails** 导航链接。`SeparateFileView` 结构体会出现，并显示 `\"You\
  \ chose = Tails\"`。\n\n\n\n### 在导航视图中改变结构体间的数据\n\n上一个项目创建了两个结构体，其中一个存储在 `ContentView`\
  \ 文件中，另一个存储在单独的文件中。在这两种情况下，结构体都定义了用于接收和显示数据的用户界面。\n\n如果我们将数据传递给一个结构体，然后允许该结构体修改这些数据，会发生什么？这需要做出几项修改：\n\
  \n- 创建一个 `State` 变量。\n- 使用 `NavigationLink` 打开另一个结构体，并向该结构体传递一个与 `State` 变量绑定的（`$`\
  \ 符号）引用，例如：\n- 在接收数据的结构体中定义一个 `@Binding` 变量。\n- 在接收数据的结构体中修改该 `Binding` 变量。\n\n\
  ```\nFileView(choice: $message)\n```\n\n要了解如何在导航视图中改变结构体间的数据，请按照以下步骤操作：\n\n1. 创建一个新的\
  \ SwiftUI iOS App 项目，并为其任意命名，例如 \"NavigationViewBindingData\"。\n\n2. 在导航器窗格中点击 `ContentView`\
  \ 文件。\n\n3. 在 `struct ContentView: View` 行下方创建一个 `State` 变量，如下所示：\n\n```\nstruct\
  \ ContentView: View {\n@State var message = \"\"\n```\n\n4. 在 `var body: some View`\
  \ 行内部添加一个 `NavigationView` 和一个 `VStack`，如下所示：\n\n```\nvar body: some View {\nNavigationView\
  \ {\nVStack {\n}\n}\n```\n\n5. 在 `VStack` 内部添加一个 `Text` 视图和两个 `NavigationLink`，如下所示：\n\
  \n```\nNavigationView {\nVStack (spacing: 26) {\nTextField(\"在此输入\", text: $message)\n\
  NavigationLink(destination: FileView(choice: $message)) {\nText(\"发送消息\")\n}\nNavigationLink(destination:\
  \ SeparateFileView(passedData: $message)) {\nText(\"单独文件\")\n}\n.navigationTitle(\"\
  传递数据\")\n}\n}\n```\n\n请注意，第一个 `NavigationLink` 打开了一个名为 `FileView` 的结构体，并将一个绑定变量（`$message`）发送给\
  \ `choice:` 参数。第二个 `NavigationLink` 打开了一个名为 `SeparateFileView` 的结构体，并将同一个绑定变量（`$message`）发送给\
  \ `passedData` 参数。\n\n6. 在 `struct ContentView: View` 结构体下方添加如下结构体：\n\n```\nstruct\
  \ FileView: View {\n@Binding var choice: String\nvar body: some View {\nHStack {\n\
  Spacer()\nVStack {\nSpacer()\nTextField(\"在此输入:\", text: $choice)\nSpacer()\n}\n\
  Spacer()\n}.background(Color.yellow)\n}\n}\n```\n\n请注意，此结构体声明了一个名为 `choice` 的 `@Binding`\
  \ 变量，该变量可以保存一个 `String`。此结构体使用一个 `TextField` 来更改此 `@Binding` 变量（`$choice`），更改会自动发送回\
  \ `ContentView` 结构体。\n\n7. 选择 `File ➤ New ➤ File`。将会出现一个对话框（见图 16-4）。\n\n8. 点击对话框顶部的\
  \ `iOS`，点击 `Swift File`，然后点击 `Next`。Xcode 会提示你为新创建的文件命名。\n\n9. 输入 `SeparateFile`\
  \ 并点击 `Create`。Xcode 会创建一个新的 Swift 文件。\n\n10. 删除 `SeparateFile` 中当前的所有代码，并将其替换为以下内容：\n\
  \n```\nimport SwiftUI\nstruct SeparateFileView: View {\n@Binding var passedData:\
  \ String\nvar body: some View {\nHStack {\nSpacer()\nVStack {\nSpacer()\nTextField(\"\
  在此输入\", text: $passedData)\nSpacer()\n}\nSpacer()\n}.background(Color.orange)\n\
  }\n}\nstruct SeparateFileView_Previews: PreviewProvider {\nstatic var previews:\
  \ some View {\nSeparateFileView(passedData: .constant(\"\"))\n}\n}\n```\n\n请注意，此结构体声明了一个名为\
  \ `passedData` 的 `@Binding` 变量，该变量可以保存一个 `String`。`TextField` 可以更改此变量（`$passedData`）并自动将更改发送回\
  \ `ContentView` 结构体。\n\n另请注意，由于此结构体存储在单独的文件中，因此 `PreviewProvider` 结构体也必须包含 `passedData`\
  \ 参数，方法是为其提供一个 `.constant(\"\")` 值。\n\n11. 在导航器窗格中点击 `ContentView` 文件。\n\n12. 点击画布窗格上的实时预览图标。\n\
  \n13. 点击 `TextField` 并输入一个短语。\n\n14. 点击 \"发送消息\" 导航链接，该链接将字符串传递给存储在 `ContentView`\
  \ 文件中的 `FileView` 结构体。\n\n15. 点击 `FileView` 结构体显示的 `TextField` 并编辑数据。然后点击返回按钮返回到显示修改后数据的\
  \ `ContentView` 结构体。\n\n16. 点击 \"单独文件\" 导航链接，该链接将字符串传递给存储在单独文件中的 `SeparateFileView`\
  \ 结构体。\n\n17. 点击 `SeparateFileView` 结构体显示的 `TextField` 并编辑数据。然后点击返回按钮返回到显示修改后数据的\
  \ `ContentView` 结构体。\n\n\n\n### 在导航视图中实现结构体间数据共享\n\n使用 `@State` 和 `@Binding` 变量能让多个视图共享和修改数据。但假设你创建了一个\
  \ `NavigationView`，按顺序串联起四个结构体。如果在第一个结构体中更改了数据，并希望将其传递到第四个结构体，那么你也必须将数据依次传递给第二和第三个结构体。\n\
  \n虽然这种方法可行，但相当笨拙。更优的做法是直接将数据传递给需要它的结构体。为此，SwiftUI 提供了另一种在结构体间共享数据的方式。首先，创建一个 `ObservableObject`\
  \ 类，其中包含一个或多个待共享的变量。每个变量必须标记为 `@Published`，如下所示：\n\n```\nclass ShareString: ObservableObject\
  \ {\n@Published var message = \"\"\n}\n```\n\n包含 `NavigationView` 的结构体（例如 `ContentView`）需要定义一个\
  \ `@StateObject` 变量，该变量用于创建 `ObservableObject` 类的一个实例，如下所示：\n\n```\n@StateObject\
  \ var showMe = ShareString()\n```\n\n由于我们希望在导航视图内的所有视图之间共享此 `ObservableObject`，需要在\
  \ `NavigationView` 上添加 `.environmentObject` 修饰符，并传入要共享的 `StateObject`，如下所示：\n\n\
  ```\nNavigationView {\n}.environmentObject(showMe)\n```\n\n与其将数据传递给每个视图，`NavigationLink`\
  \ 只需指定要显示的视图名称即可，例如：\n\n```\nNavigationLink(destination: FileView()) {\nText(\"\
  发送消息\")\n}\n```\n\n在每个需要访问 `ObservableObject` 的结构体内部，我们需要声明一个 `@EnvironmentObject`\
  \ 变量，该变量的类型为 `ObservableObject` 类，如下所示：\n\n```\n@EnvironmentObject var choice: ShareString\n\
  ```\n\n最后，在每个定义了 `@EnvironmentObject` 的结构体中，我们可以通过 `@EnvironmentObject` 变量名加上 `@Published`\
  \ 的属性名来访问实际要共享的数据，如下所示：\n\n```\n$choice.message\n```\n\n在此示例中，`choice` 是 `@EnvironmentObject`\
  \ 变量名，`message` 是在 `ObservableObject` 中定义的 `@Published` 属性。要了解如何使用 `ObservableObject`\
  \ 共享数据，请按照以下步骤操作：\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其指定任意名称，例如 `NavigationViewObservable`。\n\
  \n2.  在导航器窗格中点击 `ContentView` 文件。\n\n3.  在 `import SwiftUI` 行下方创建一个 `ObservableObject`\
  \ 类，如下所示：\n\n```\nclass ShareString: ObservableObject {\n@Published var message\
  \ = \"\"\n}\n```\n\n`@Published` 变量将包含要在导航视图内的结构体之间共享的数据。\n\n4.  在 `struct ContentView:\
  \ View` 行下方创建一个 `StateObject` 变量，如下所示：\n\n```\nstruct ContentView: View {\n@StateObject\
  \ var showMe = ShareString()\n```\n\n这将基于 `ShareString` 这个 `ObservableObject` 创建一个新对象（`showMe`）。\n\
  \n5.  在 `var body: some View` 行内添加一个 `NavigationView` 和一个 `VStack`，如下所示：\n\n```\n\
  var body: some View {\nNavigationView {\nVStack (spacing: 26) {\n}\n}\n```\n\n6.\
  \  在 `VStack` 内添加一个 `TextField`、两个 `NavigationLinks` 以及一个 `.navigationTitle` 修饰符，如下所示：\n\
  \n```\nNavigationView {\nVStack (spacing: 26) {\nTextField(\"在此输入\", text: $showMe.message)\n\
  NavigationLink(destination: FileView()) {\nText(\"发送消息\")\n}\nNavigationLink(destination:\
  \ SeparateFileView()) {\nText(\"单独文件\")\n}\n.navigationTitle(\"共享数据\")\n}\n}.environmentObject(showMe)\n\
  ```\n\n确保在 `NavigationView` 的末尾添加了 `.environmentObject(showMe)` 修饰符。这允许共享 `showMe`\
  \ 这个 `ObservableObject`（即 `ShareString` 类）。前面的 `NavigationLinks` 将打开我们需要创建的两个结构体：`FileView`\
  \ 和 `SeparateFileView`。\n\n7.  在 `struct ContentView` 结构体下方添加以下结构体：\n\n```\nstruct\
  \ FileView: View {\n@EnvironmentObject var choice: ShareString\nvar body: some View\
  \ {\nHStack {\nSpacer()\nVStack {\nSpacer()\nTextField(\"在此输入:\", text: $choice.message)\n\
  Spacer()\n}\nSpacer()\n}.background(Color.yellow)\n}\n}\n```\n\n注意，此结构体定义了一个 `@EnvironmentObject`\
  \ 变量，用于容纳 `ShareString` 这个 `ObservableObject`。在 `TextField` 中，我们必须将文本存储在使用 `message`\
  \ 这个 `@Published` 属性的 `choice` 这个 `@EnvironmentObject` 中（`$choice.message`）。整个 `ContentView`\
  \ 文件应如下所示：\n\n8.  选择 `文件` ➤ `新建` ➤ `文件`。将出现一个对话框（见图 \\[16-4\\]）。\n\n9.  点击对话框顶部附近的\
  \ `iOS`，点击 `Swift 文件`，然后点击 `下一步`。Xcode 会要求为你新创建的文件命名。\n\n10. 输入 `SeparateFile` 并点击\
  \ `创建`。Xcode 会创建一个新的 Swift 文件。\n\n11. 删除 `SeparateFile` 中当前的所有代码，并将其替换为以下内容：\n\n\
  ```\nimport SwiftUI\nstruct SeparateFileView: View {\n@EnvironmentObject var passedData:\
  \ ShareString\nvar body: some View {\nHStack {\nSpacer()\nVStack {\nSpacer()\nTextField(\"\
  在此输入\", text: $passedData.message)\nSpacer()\n}\nSpacer()\n}.background(Color.orange)\n\
  }\n}\nstruct SeparateFileView_Previews: PreviewProvider {\nstatic var previews:\
  \ some View {\nSeparateFileView()\n}\n}\n```\n\n注意，此结构体也声明了一个 `@EnvironmentObject`，用于容纳\
  \ `ShareString` 这个 `ObservableObject`。然后 `TextField` 使用 `passedData` 这个 `@EnvironmentObject`\
  \ 来访问 `message` 这个 `@Published` 属性（`$passedData.message`）。\n\n12. 在导航器窗格中点击 `ContentView`\
  \ 文件。\n\n13. 在画布窗格中点击 `实时预览` 图标。\n\n14. 点击 `TextField` 并输入一个短语。\n\n15. 点击 `发送消息`\
  \ 导航链接以打开 `FileView` 结构体。注意，第 14 步输入的内容现在会出现在 `FileView` 的 `TextField` 中。\n\n16.\
  \ 编辑 `TextField` 中的文本，然后点击 `返回` 按钮。注意，修改后的文本现在会出现在 `ContentView` 的 `TextField` 中。\n\
  \n17. 编辑 `TextField` 中的文本，然后点击 `单独文件` 导航链接。编辑后的文本现在会出现在 `SeparateFileView` 的 `TextField`\
  \ 中。\n\n18. 编辑 `TextField` 中的文本并点击 `返回` 按钮。注意，修改后的文本现在会出现在 `ContentView` 的 `TextField`\
  \ 中。这一切展示了各个结构体如何访问 `ObservableObject` 中的 `@Published` 属性。\n\n\n\n### 在导航视图中使用列表\n\
  \n另一种常见做法是不单独显示`NavigationLink`，而是创建一个`List`（参见第 13 章），让`List`中的每个条目都像链接一样工作。通过选择`List`中的条目，导航视图可以打开一个新视图。这种在导航视图中组合`List`的方式在\
  \ iOS 的“设置”应用中很常见。\n\n首先，定义一个结构体，用于将相关信息存储在一个数组中，并使该结构体符合`Identifiable`协议，这样每个结构体都会拥有一个唯一的\
  \ ID，如下所示：\n\n```\nstruct Books: Identifiable {\n    var id = UUID()\n    var title:\
  \ String\n    var summary: String\n}\n```\n\n接下来，创建一个可以容纳该结构体的数组：\n\n```\nlet books:\
  \ [Books] = [\n    Books(title: \"华氏 451 度\", summary: \"关于焚书的反乌托邦小说\"),\n    Books(title:\
  \ \"火星编年史\", summary: \"关于火星殖民的故事\"),\n    Books(title: \"邪恶降临\", summary: \"一个邪恶的马戏团来到小镇\"\
  ),\n    Books(title: \"纹身人\", summary: \"围绕一个纹身男子展开的短篇故事集\")\n]\n```\n\n现在，创建一个结构体来定义一个视图，该视图将在用户选择导航链接时显示。这个结构体需要接收存储在结构体数组中的数据，例如：\n\
  \n```\nstruct BookView: View {\n    var bookInfo: Books\n    var body: some View\
  \ {\n        VStack (spacing: 24) {\n            Text(\"\\(bookInfo.title)\")\n\
  \                .font(.largeTitle)\n            Text(\"\\(bookInfo.summary)\")\n\
  \                .font(.body)\n        }\n    }\n}\n```\n\n最后，创建一个`NavigationView`来显示一个`List`。该`List`必须使用数组来创建`NavigationLink`，这些链接不仅显示结构体数组中的数据，还定义了当用户选择`NavigationLink`时将出现的用户界面屏幕：\n\
  \n```\nNavigationView {\n    List(books) { book in\n        NavigationLink(destination:\
  \ BookView(bookInfo: book)) {\n            Text(\"\\(book.title)\")\n        }\n\
  \    }\n}\n```\n\n要了解如何在导航视图中使用`List`，请遵循以下步骤：\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其取任意名称，例如“NavigationViewList”。\n\
  2.  在导航器窗格中单击`ContentView`文件。\n3.  在`import SwiftUI`代码行下方添加如下结构体：\n\n```\nstruct\
  \ Books: Identifiable {\n    var id = UUID()\n    var title: String\n    var summary:\
  \ String\n}\n```\n\n4.  在`struct ContentView: View`代码行下方添加一个结构体数组，如下所示：\n\n```\n\
  let books: [Books] = [\n    Books(title: \"华氏 451 度\", summary: \"关于焚书的反乌托邦小说\"\
  ),\n    Books(title: \"火星编年史\", summary: \"关于火星殖民的故事\"),\n    Books(title: \"邪恶降临\"\
  , summary: \"一个邪恶的马戏团来到小镇\"),\n    Books(title: \"纹身人\", summary: \"围绕一个纹身男子展开的短篇故事集\"\
  )\n]\n```\n\n5.  在`struct ContentView_Previews: PreviewProvider`代码行上方添加如下结构体：\n\n\
  ```\nstruct BookView: View {\n    var bookInfo: Books\n    var body: some View {\n\
  \        VStack (spacing: 24) {\n            Text(\"\\(bookInfo.title)\")\n    \
  \            .font(.largeTitle)\n            Text(\"\\(bookInfo.summary)\")\n  \
  \              .font(.body)\n        }\n    }\n}\n```\n\n6.  在`var body: some View`内部添加`NavigationView`、`List`和`NavigationLink`，如下所示：\n\
  \n```\nvar body: some View {\n    NavigationView {\n        List(books) { book in\n\
  \            NavigationLink(destination: BookView(bookInfo: book)) {\n         \
  \       Text(\"\\(book.title)\")\n            }\n        }.navigationBarTitle(\"\
  书籍列表\")\n    }\n}\n```\n\n完整的`ContentView`文件应如下所示：\n\n![../images/329781_6_En_16_Chapter/329781_6_En_16_Fig5_HTML.jpg](img/329781_6_En_16_Fig5_HTML.jpg)\n\
  \n图 16-5：导航链接列表\n\n7.  单击画布面板上的“实时预览”图标。注意，`List`将书籍标题显示为导航链接，如图 16-5 所示。\n\n```\n\
  import SwiftUI\n\nstruct Books: Identifiable {\n    var id = UUID()\n    var title:\
  \ String\n    var summary: String\n}\n\nstruct ContentView: View {\n    let books:\
  \ [Books] = [\n        Books(title: \"华氏 451 度\", summary: \"关于焚书的反乌托邦小说\"),\n \
  \       Books(title: \"火星编年史\", summary: \"关于火星殖民的故事\"),\n        Books(title: \"\
  邪恶降临\", summary: \"一个邪恶的马戏团来到小镇\"),\n        Books(title: \"纹身人\", summary: \"围绕一个纹身男子展开的短篇故事集\"\
  )\n    ]\n\n    var body: some View {\n        NavigationView {\n            List(books)\
  \ { book in\n                NavigationLink(destination: BookView(bookInfo: book))\
  \ {\n                    Text(\"\\(book.title)\")\n                }\n         \
  \   }.navigationBarTitle(\"书籍列表\")\n        }\n    }\n}\n\nstruct BookView: View\
  \ {\n    var bookInfo: Books\n    var body: some View {\n        VStack (spacing:\
  \ 24) {\n            Text(\"\\(bookInfo.title)\")\n                .font(.largeTitle)\n\
  \            Text(\"\\(bookInfo.summary)\")\n                .font(.body)\n    \
  \    }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider {\n    static var\
  \ previews: some View {\n        ContentView()\n    }\n}\n```\n\n![../images/329781_6_En_16_Chapter/329781_6_En_16_Fig6_HTML.jpg](img/329781_6_En_16_Fig6_HTML.jpg)\n\
  \n图 16-6：选择导航链接后显示的用户界面\n\n8.  单击任意书籍标题（导航链接）。由`struct BookView`定义的用户界面将出现，并在左上角显示一个“返回”按钮，如图\
  \ 16-6 所示。\n\n`List`可以成为在导航视图中创建导航链接的便捷方式。由于`List`通常依赖数组来提供数据，因此你很可能需要创建一个结构体来存储在数组中。\n\
  \n## 总结\n\n导航视图是显示多个视图的一种便捷方式。一个结构体可以定义一个包含一个或多个`NavigationLink`的导航视图。这些`NavigationLink`可以打开像`Text`或`Image`视图这样简单的视图，但更常见的是打开由结构体定义的视图。这些结构体可以存储在同一个文件中，也可以存储在单独的文件中。\n\
  \n`NavigationLink`可以将数据传递到另一个视图，这类似于向函数传递数据。另一个视图需要定义一个属性，然后`NavigationLink`就可以将数据传递到该属性。如果希望将数据传递到另一个可以修改该数据的视图，可以使用两种不同的方法。\n\
  \n第一种方法使用`@State`和`@Binding`变量，并强制`NavigationLink`将数据传递给其打开的每个视图。第二种方法使用`ObservableObject`、`StateObject`和`EnvironmentObject`在多个视图之间共享数据。\n\
  \n导航视图通常与`List`一起使用。通过点击`List`中的某个条目，用户可以跳转到一个新视图。`List`通常检索存储在数组中的数据。该数组可以存储像字符串这样的单一数据类型，但更常见的是存储结构体以将相关数据分组在一起。`List`中的条目可以自然而然地创建指向另一个视图的导航链接，就像\
  \ iOS 中“设置”应用里的条目一样。\n\n\n\n## 使用标签视图\n\n大多数应用程序由多个屏幕组成。第 16 章讲解了如何创建使用导航视图的应用，该视图可让用户按顺序从一个屏幕跳转到另一个屏幕。这在显示更多详细信息时非常方便，例如\
  \ iOS 中的“设置”应用，它允许你选择各种选项，然后查看多个屏幕以选取不同的设置。\n\n然而，导航视图的一个问题是，如果将过多屏幕链接在一起，导航会变得繁琐，因为你需要从第一个屏幕导航到第二个、第三个，才能到达第四个屏幕。然后你还得反向遍历整个过程，从第四个屏幕返回到第一个屏幕。\n\
  \n为了提供一种在屏幕间跳转的替代方式，你可以使用标签视图，它会在屏幕底部显示图标和/或文本。选择一个标签（图标和/或文本）即可跳转到新的屏幕。例如，“时钟”应用在屏幕底部显示图标/文本，让你可以跳转到不同的功能，如图\
  \ 17-1 所示。\n\n![../images/329781_6_En_17_Chapter/329781_6_En_17_Fig1_HTML.jpg](img/329781_6_En_17_Fig1_HTML.jpg)\n\
  \n图 17-1\n\n标签视图可以轻松地在屏幕间跳转\n\n由于无论你在查看哪个屏幕，标签栏都会出现在屏幕底部，因此标签视图让你可以随时轻松跳转到想看的屏幕。\n\
  \n## 使用标签视图\n\n标签视图通过如下代码包含多个视图：\n\n```\nTabView {\n// 在此处放置多个视图\n}\n```\n\n存储在标签视图中的每个视图可以简单到单个视图（例如\
  \ `Text` 或 `Image` 视图），也可以是更详细的结构，例如定义一个视图的结构体。创建标签视图的第一步就是列出你想要在标签视图中使用的所有视图，就像这样：\n\
  \n```\nTabView {\nText(\"一\")\nText(\"二\")\nText(\"三\")\nText(\"四\")\n}\n```\n\n\
  在定义了要在标签视图中显示的视图之后，下一步是为每个视图定义一个图标和/或文本。为此，需要向每个视图添加一个 `.tabItem` 修饰符，其中使用 `Image`\
  \ 和 `Text` 视图，如下所示：\n\n```\nText(\"一\")\n.tabItem {\nImage(systemName: \"heart.fill\"\
  )\nText(\"标签 1\")\n}\n```\n\n通过为每个视图附加 `.tabItem` 修饰符，并使用 `Image` 和 `Text` 视图定义其内容，你可以创建一个显示在屏幕底部的标签栏，如图\
  \ 17-2 所示。\n\n![../images/329781_6_En_17_Chapter/329781_6_En_17_Fig2_HTML.jpg](img/329781_6_En_17_Fig2_HTML.jpg)\n\
  \n图 17-2\n\n典型的标签栏显示图标和文本\n\n`Image` 视图可以显示任何图像，但通常显示的是你可以在 SF Symbols 应用（`https://developer.apple.com/sf-symbols`）中查看的图标。\n\
  \n注意\n\n标签可以显示为图像加文本、仅图像或仅文本。为了清晰起见，通常最好将标签定义为图像和文本的组合。\n\n要了解如何创建一个简单的标签视图，请按照以下步骤操作：\n\
  \n1. 创建一个新的 SwiftUI iOS 应用项目，并为其指定任意名称，例如“SimpleTabView”。\n2. 在导航器窗格中点击 `ContentView`\
  \ 文件。\n3. 在 `var body: some View` 中添加以下视图，如下所示：\n\n```\nvar body: some View {\n\
  TabView {\nText(\"一\")\nText(\"二\")\nText(\"三\")\nText(\"四\")\n}\n}\n```\n\n为了在屏幕底部创建一个标签栏，我们需要添加使用\
  \ `Image` 和 `Text` 视图的 `.tabItem` 修饰符。\n\n1. 像这样为每个视图添加以下 `.tabItem` 修饰符：\n\n```\n\
  var body: some View {\nTabView {\nText(\"一\")\n.tabItem {\nImage(systemName: \"\
  heart.fill\")\nText(\"一\")\n}\nText(\"二\")\n.tabItem {\nImage(systemName: \"hare.fill\"\
  )\nText(\"二\")\n}\nText(\"三\")\n.tabItem {\nImage(systemName: \"tortoise.fill\"\
  )\nText(\"三\")\n}\nText(\"四\")\n.tabItem {\nImage(systemName: \"folder.fill\")\n\
  Text(\"四\")\n}\n}\n}\n```\n\n你可以随意使用不同的 SF Symbols 图标和文本来自定义屏幕底部标签栏中的按钮。除了使用 `Image`\
  \ 和 `Text` 视图的组合，你也可以像这样使用单个 `Label` 视图：\n\n1. 点击画布面板上的实时预览图标。\n2. 点击屏幕底部的不同标签以查看不同的视图。\n\
  \n**注意** 由于标签视图将每个视图表示为图标/文本，因此标签视图在屏幕底部最多只能显示五个项目。如果你在标签视图中存储了超过五个视图，标签视图会自动创建一个“更多”图标，将任何额外的视图隐藏在第二个标签栏中。\n\
  \n```\nLabel(\"四\", systemImage: \"folder.fill\")\n```\n\n要了解当你显示超过五个视图时，标签视图如何自动在标签栏中创建一个“更多”按钮，请按照以下步骤操作：\n\
  \n1. 打开你之前创建的 Xcode 项目（`SimpleTabView`）。\n2. 编辑 `ContentView` 文件，使整个代码如下所示：\n\n\
  ```\nimport SwiftUI\nstruct ContentView: View {\nvar body: some View {\nTabView\
  \ {\nText(\"一\")\n.tabItem {\nImage(systemName: \"heart.fill\")\nText(\"一\")\n}\n\
  Text(\"二\")\n.tabItem {\nImage(systemName: \"hare.fill\")\nText(\"二\")\n}\nText(\"\
  三\")\n.tabItem {\nImage(systemName: \"tortoise.fill\")\nText(\"三\")\n}\nText(\"\
  四\")\n.tabItem {\nImage(systemName: \"folder.fill\")\nText(\"四\")\n}\nText(\"五\"\
  )\n.tabItem {\nImage(systemName: \"internaldrive.fill\")\nText(\"五\")\n}\nText(\"\
  六\")\n.tabItem {\nImage(systemName: \"cloud.drizzle.fill\")\nText(\"六\")\n}\n}.accentColor(.purple)\n\
  }\n}\nstruct ContentView_Previews: PreviewProvider {\nstatic var previews: some\
  \ View {\nContentView()\n}\n}\n```\n\n注意，标签视图上的 `.accentColor` 修饰符可以让你定义标签栏的颜色。\n\
  \n![../images/329781_6_En_17_Chapter/329781_6_En_17_Fig3_HTML.jpg](img/329781_6_En_17_Fig3_HTML.jpg)\n\
  \n图 17-3\n\n当标签视图包含超过五个标签时，“更多”图标会自动出现\n\n1. 点击画布面板上的实时预览图标。标签栏出现，但现在最右侧会出现一个“更多”图标，如图\
  \ 17-3 所示。\n\n![../images/329781_6_En_17_Chapter/329781_6_En_17_Fig4_HTML.jpg](img/329781_6_En_17_Fig4_HTML.jpg)\n\
  \n图 17-4\n\n“更多”图标显示一个导航视图\n\n1. 点击“更多”图标。注意会出现一个导航视图，以列表形式显示你的其他标签，如图 17-4 所示。\n\
  \n![../images/329781_6_En_17_Chapter/329781_6_En_17_Fig5_HTML.jpg](img/329781_6_En_17_Fig5_HTML.jpg)\n\
  \n图 17-5\n\n用于修改标签栏的拖放屏幕\n\n1. 在导航视图中点击“五”或“六”项目，以查看对应的 `Text` 视图。\n2. 点击右上角的“编辑”按钮。注意会出现一个新屏幕，允许用户拖放标签栏上的图标以重新排列它们，如图\
  \ 17-5 所示。\n3. 将“五”或“六”图标拖放到标签栏上。注意，当你这样做时，屏幕会高亮显示当前未在标签栏上可见的两个图标。\n4. 完成标签栏上图标的重新排列后，点击“完成”按钮。\n\
  \n由于标签栏最多只能显示五个图标，因此最好将选项数量限制在五个或更少。\n\n\n\n### 在标签栏中以编程方式选择按钮\n\n用户只需点击标签栏上的标签即可切换不同视图。默认情况下，最左侧的第一个标签会高亮显示。但有时你可能需要通过代码来选择标签。在这种情况下，你需要使用\
  \ `.tag` 修饰符来标识每个 `.tabItem`。\n\n`.tag` 修饰符允许你使用固定值（如 `2`）来标识每个标签。当每个 `.tabItem`\
  \ 都有唯一的 `.tag` 值时，你就可以通过引用其 `.tag` 值，使用 Swift 代码来选择特定的标签。\n\n要了解如何通过 Swift 代码访问\
  \ Tab View 中的标签，请遵循以下步骤：\n\n1. 创建一个新的 SwiftUI iOS App 项目，并为其命名，例如 “PageView”。\n\
  2. 在导航窗格中点击 `ContentView` 文件。\n3. 在 `struct ContentView: View` 行下添加一个 State 变量，如下所示：\n\
  \n```\nstruct ContentView: View {\n@State var selectedView = 1\n```\n\n4. 在 `var\
  \ body: some View` 行下添加一个 `VStack` 和一个 `HStack`，并在 `HStack` 内添加四个 Button，如下所示：\n\
  \n```\nvar body: some View {\nVStack {\nHStack {\nButton (\"1\") {\nselectedView\
  \ = 1\n}\nButton (\"2\") {\nselectedView = 2\n}\nButton (\"3\") {\nselectedView\
  \ = 3\n}\nButton (\"4\") {\nselectedView = 4\n}\n}\n}\n}\n```\n\n5. 在 `VStack` 内部、`HStack`\
  \ 下方添加一个 Tab View，如下所示：\n\n```\nTabView (selection: $selectedView){\nText(\"One\"\
  )\n.tabItem {\nImage(systemName: \"heart.fill\")\nText(\"One\")\n}.tag(1)\nText(\"\
  Two\")\n.tabItem {\nImage(systemName: \"hare.fill\")\nText(\"Two\")\n}.tag(2)\n\
  Text(\"Three\")\n.tabItem {\nImage(systemName: \"tortoise.fill\")\nText(\"Three\"\
  )\n}.tag(3)\nText(\"Four\")\n.tabItem {\nImage(systemName: \"folder.fill\")\nText(\"\
  Four\")\n}.tag(4)\n}\n```\n\n整个 `ContentView` 文件应如下所示：\n\n```\nimport SwiftUI\n\
  struct ContentView: View {\n@State var selectedView = 1\nvar body: some View {\n\
  VStack {\nHStack {\nButton (\"1\") {\nselectedView = 1\n}\nButton (\"2\") {\nselectedView\
  \ = 2\n}\nButton (\"3\") {\nselectedView = 3\n}\nButton (\"4\") {\nselectedView\
  \ = 4\n}\n}\nTabView (selection: $selectedView){\nText(\"One\")\n.tabItem {\nImage(systemName:\
  \ \"heart.fill\")\nText(\"One\")\n}.tag(1)\nText(\"Two\")\n.tabItem {\nImage(systemName:\
  \ \"hare.fill\")\nText(\"Two\")\n}.tag(2)\nText(\"Three\")\n.tabItem {\nImage(systemName:\
  \ \"tortoise.fill\")\nText(\"Three\")\n}.tag(3)\nText(\"Four\")\n.tabItem {\nImage(systemName:\
  \ \"folder.fill\")\nText(\"Four\")\n}.tag(4)\n}\n}\n}\n}\nstruct ContentView_Previews:\
  \ PreviewProvider {\nstatic var previews: some View {\nContentView()\n}\n}\n```\n\
  \n此代码创建了一个 Tab View 以及位于屏幕顶部、标记为 1、2、3 和 4 的四个按钮。\n\n6. 点击画布面板上的 Live Preview 图标。\n\
  7. 点击屏幕顶部的数字按钮。请注意，如果你点击 `2` 按钮，标签栏上的第二个标签将被选中。如果你点击 `4` 按钮，标签栏上的第四个标签将被选中。`.tag`\
  \ 修饰符为你提供了一种通过 Swift 代码访问特定标签的方法。\n\n### 显示页面视图\n\n通常，Tab View 在屏幕底部显示标签，以便用户选择标签并跳转到不同的视图。作为一种替代方案，你可以将\
  \ Tab View 转换为 Page View。Page View 在屏幕底部中间显示代表不同屏幕的标签栏图标。然后，用户可以左右滚动以按顺序查看每个屏幕。\n\
  \n要将 Tab View 转换为 Page View，只需向 Tab View 添加 `.tabViewStyle` 修饰符并指定 `.page`，如下所示：\n\
  \n```\nTabView {\n}.tabViewStyle(.page)\n```\n\n现在，用户无需从屏幕底部选择标签来打开视图，而是可以左右滑动以按顺序打开每个视图。为了提供可用视图数量的视觉指示，你可以添加\
  \ `.indexViewStyle` 修饰符并为 `backgroundDisplayMode` 指定 `.always`，如下所示：\n\n```\nTabView\
  \ {\n}.tabViewStyle(.page)\n.indexViewStyle(PageIndexViewStyle(backgroundDisplayMode:\
  \ .always))\n```\n\n要了解 Page View 的工作原理，请遵循以下步骤：\n\n1. 创建一个新的 SwiftUI iOS App 项目，并为其命名，例如\
  \ “PageView”。\n2. 在导航窗格中点击 `ContentView` 文件。\n3. 在 `var body: some View` 行内添加一个\
  \ Tab View，如下所示：\n\n```\nTabView {\nText(\"One\")\n.tabItem {\nImage(systemName:\
  \ \"heart.fill\")\n}\nText(\"Two\")\n.tabItem {\nImage(systemName: \"hare.fill\"\
  )\n}\nText(\"Three\")\n.tabItem {\nImage(systemName: \"tortoise.fill\")\n}\nText(\"\
  Four\")\n.tabItem {\nImage(systemName: \"folder.fill\")\n}\nText(\"Five\")\n.tabItem\
  \ {\nImage(systemName: \"tray.fill\")\n}\nText(\"Six\")\n.tabItem {\nImage(systemName:\
  \ \"keyboard.fill\")\n}\n}\n```\n\n请随意为每个 `Text` 视图选择不同的文本，并为每个 `Image` 视图选择不同的\
  \ SF Symbol 图标。请注意，每个 `.tabItem` 只需添加一个 `Image` 视图，不需要 `Text` 视图。\n\n4. 向 Tab View\
  \ 添加 `.tabViewStyle` 和 `.indexViewStyle` 修饰符，如下所示：\n\n```\nTabView {\nText(\"One\"\
  )\n.tabItem {\nImage(systemName: \"heart.fill\")\n}\nText(\"Two\")\n.tabItem {\n\
  Image(systemName: \"hare.fill\")\n}\nText(\"Three\")\n.tabItem {\nImage(systemName:\
  \ \"tortoise.fill\")\n}\nText(\"Four\")\n.tabItem {\nImage(systemName: \"folder.fill\"\
  )\n}\nText(\"Five\")\n.tabItem {\nImage(systemName: \"tray.fill\")\n}\nText(\"Six\"\
  )\n.tabItem {\nImage(systemName: \"keyboard.fill\")\n}\n}.tabViewStyle(.page)\n\
  .indexViewStyle(PageIndexViewStyle(backgroundDisplayMode: .always))\n```\n\n这会将每个\
  \ `Image` 显示为屏幕底部中间的图标列表，如图 17-6 所示。\n\n**图 17-6** Page View 底部的图标栏\n\n整个 `ContentView`\
  \ 文件应如下所示：\n\n```\nimport SwiftUI\nstruct ContentView: View {\nvar body: some View\
  \ {\nTabView {\nText(\"One\")\n.tabItem {\nImage(systemName: \"heart.fill\")\n}\n\
  Text(\"Two\")\n.tabItem {\nImage(systemName: \"hare.fill\")\n}\nText(\"Three\")\n\
  .tabItem {\nImage(systemName: \"tortoise.fill\")\n}\nText(\"Four\")\n.tabItem {\n\
  Image(systemName: \"folder.fill\")\n}\nText(\"Five\")\n.tabItem {\nImage(systemName:\
  \ \"tray.fill\")\n}\nText(\"Six\")\n.tabItem {\nImage(systemName: \"keyboard.fill\"\
  )\n}\n}.tabViewStyle(.page)\n.indexViewStyle(PageIndexViewStyle(backgroundDisplayMode:\
  \ .always))\n}\n}\nstruct ContentView_Previews: PreviewProvider {\nstatic var previews:\
  \ some View {\nContentView()\n}\n}\n```\n\n5. 点击画布面板上的 Live Preview 图标。\n6. 从右向左（以及从左向右）拖动鼠标，从当前视图滑动到下一个视图。请注意，每次执行此操作时，屏幕底部都会有不同的图标高亮显示，以指示你当前所在的位置，以及当前显示视图之前和之后还有多少个其他视图。\n\
  \n\n\n## 在标签视图中显示结构\n\n虽然标签视图可以显示单个视图（如`Text`或`Image`视图），但很多时候你可能希望显示全新的用户界面。由于可以用结构定义用户界面屏幕，因此可以创建多个屏幕，这些屏幕使用多个结构，并能够在标签视图中呈现。\n\
  \n创建新结构最简单的方法是在`ContentView`文件中进行。但这种方法可能使代码变得杂乱，因此第二种方法是将结构存储在单独的文件中。\n\n要了解如何创建定义其他用户界面屏幕的结构，请按照以下步骤操作：\n\
  \n1.  创建一个新的 SwiftUI iOS App 项目，并为其指定任意名称，例如“TabViewStructures”。\n\n2.  在导航器窗格中点击`ContentView`文件。\n\
  \n3.  在`var body: some View`行内添加一个`TabView`，如下所示：\n\n```swift\nvar body: some View\
  \ {\n    TabView {\n    }\n}\n```\n\n4.  在`TabView`内部添加如下内容：\n\n```swift\nvar body:\
  \ some View {\n    TabView {\n        FileView()\n            .tabItem {\n     \
  \           Image(systemName: \"heart.fill\")\n                Text(\"第一\")\n  \
  \          }\n        SeparateFileView()\n            .tabItem {\n             \
  \   Image(systemName: \"hare.fill\")\n                Text(\"第二\")\n           \
  \ }\n    }\n}\n```\n\n上述代码显示了两个视图：`FileView()`和`SeparateFileView()`，我们需要使用结构来定义这两个视图。\n\
  \n5.  在`struct ContentView: View`结构下方添加如下结构：\n\n```swift\nstruct FileView: View\
  \ {\n    var body: some View {\n        HStack {\n            Spacer()\n       \
  \     VStack {\n                Spacer()\n                Text(\"这是单独的结构\")\n  \
  \              Text(\"存储在同一个文件中\")\n                Spacer()\n            }\n  \
  \          Spacer()\n        }.background(Color.yellow)\n    }\n}\n```\n\n完整的`ContentView`文件应如下所示：\n\
  \n```swift\nimport SwiftUI\n\nstruct ContentView: View {\n    var body: some View\
  \ {\n        TabView {\n            FileView()\n                .tabItem {\n   \
  \                 Image(systemName: \"heart.fill\")\n                    Text(\"\
  第一\")\n                }\n            SeparateFileView()\n                .tabItem\
  \ {\n                    Image(systemName: \"hare.fill\")\n                    Text(\"\
  第二\")\n                }\n        }\n    }\n}\n\nstruct FileView: View {\n    var\
  \ body: some View {\n        HStack {\n            Spacer()\n            VStack\
  \ {\n                Spacer()\n                Text(\"这是单独的结构\")\n             \
  \   Text(\"存储在同一个文件中\")\n                Spacer()\n            }\n            Spacer()\n\
  \        }.background(Color.yellow)\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider\
  \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
  \n我们可以继续在`ContentView`文件中添加新结构，但这可能导致文件变得杂乱。第二种创建结构的方法是将它们存储在单独的文件中，接下来的步骤将实现这一点。\n\
  \n1.  选择**文件** ➤ **新建** ➤ **文件**。此时会弹出一个对话框。\n\n2.  点击对话框顶部附近的**iOS**，点击**Swift\
  \ 文件**，然后点击**下一步**。Xcode 会询问新创建文件的名称。\n\n3.  输入`SeparateFile`并点击**创建**。Xcode 会创建一个新的\
  \ Swift 文件。\n\n4.  删除`SeparateFile`中现有的所有代码，并替换为以下内容：\n\n```swift\nimport SwiftUI\n\
  \nstruct SeparateFileView: View {\n    var body: some View {\n        HStack {\n\
  \            Spacer()\n            VStack {\n                Spacer()\n        \
  \        Text(\"这是另一个结构\")\n                Text(\"但存储在单独的文件中\")\n             \
  \   Spacer()\n            }\n            Spacer()\n        }.background(Color.orange)\n\
  \    }\n}\n\nstruct SeparateFileView_Previews: PreviewProvider {\n    static var\
  \ previews: some View {\n        SeparateFileView()\n    }\n}\n```\n\n**注意：** 将结构存储在单独文件中时，需要第二个结构（`PreviewProvider`）才能在画布窗格中显示该用户界面。\n\
  \n5.  在导航器窗格中点击`ContentView`文件。\n\n6.  点击画布窗格中的**实时预览**图标。请注意，`FileView`结构会显示出来，因为标签栏中的**第一**图标默认处于选中状态。\n\
  \n7.  点击标签栏中的**第二**图标。注意，这会显示在`SeparateFile`中定义的`SeparateFileView`结构。\n\n在标签视图中显示由结构定义的视图是更常见的做法。你可以将定义视图的结构存储在同一个文件或不同的文件中。\n\
  \n### 在标签视图中的结构之间传递数据\n\n之前的项目创建了两个结构，其中一个结构存储在`ContentView`文件中，另一个结构存储在单独的文件中。在这两种情况下，这些结构定义的用户界面都显示静态信息，与原始结构（`ContentView`）中的任何内容都没有关联。\n\
  \n在许多情况下，你可能希望一个结构中的数据出现在第二个结构中。这意味着我们必须将数据从一个结构传递到另一个结构。\n\n幸运的是，这项任务类似于在函数之间传递数据。当结构需要接收数据时，我们只需声明一个属性：创建一个变量，为该变量指定一个描述性名称，并定义该变量可以保存的数据类型，例如`String`或`Double`，如下所示：\n\
  \n```swift\nstruct FileView: View {\n    var choice: String\n```\n\n这里定义了一个名为“choice”的变量，它可以保存一个`String`。要向前一个结构传递数据，我们可以通过调用结构名称（`FileView`）并后跟“choice”变量作为参数来加载该结构，如下所示：\n\
  \n```swift\nFileView(choice: \"正面\")\n```\n\n当向存储在同一个文件中的结构传递数据时，只需遵循以下两步流程：\n\n\
  -   在结构内部声明一个或多个变量用于接收数据。\n-   使用该结构的变量作为参数来调用该结构。\n\n但是，当向存储在单独文件中的结构传递数据时，还需要一个额外步骤。因为存储在单独文件中的结构还包含第二个结构，用于在画布窗格中显示用户界面，所以这个预览结构必须包含该结构的参数，并将数据传递给它，如下所示：\n\
  \n```swift\nstruct SeparateFileView_Previews: PreviewProvider {\n    static var\
  \ previews: some View {\n        SeparateFileView(passedData: \"\")\n    }\n}\n\
  ```\n\n要了解如何在标签视图中的结构之间传递数据，请按照以下步骤操作：\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其指定任意名称，例如“TabViewPassData”。\n\
  \n2.  在导航器窗格中点击`ContentView`文件。\n\n3.  编辑`struct ContentView`结构，如下所示：\n\n```swift\n\
  struct ContentView: View {\n    @State var message = \"\"\n    var body: some View\
  \ {\n        TabView {\n            TextField(\"在此输入\", text: $message)\n      \
  \          .tabItem {\n                    Image(systemName: \"house.fill\")\n \
  \                   Text(\"主页\")\n                }\n            FileView(choice:\
  \ message)\n                .tabItem {\n                    Image(systemName: \"\
  heart.fill\")\n                    Text(\"第一\")\n                }\n           \
  \ SeparateFileView(passedData: message)\n                .tabItem {\n          \
  \          Image(systemName: \"hare.fill\")\n                    Text(\"第二\")\n\
  \                }\n        }\n    }\n}\n```\n\n上述代码定义了一个名为`FileView`的结构，其参数为“choice:”，该参数接收状态变量“message”。第二个结构名为`SeparateFileView`，其参数为“passedData:”，同样接收状态变量“message”。\n\
  \n4.  在`struct ContentView`下方添加一个新结构，如下所示：\n\n```swift\nstruct FileView: View {\n\
  \    var choice: String\n    var body: some View {\n        HStack {\n         \
  \   Spacer()\n            VStack {\n                Spacer()\n                Text(\"\
  您输入了 = \\(choice)\")\n                Spacer()\n            }\n            Spacer()\n\
  \        }.background(Color.yellow)\n    }\n}\n```\n\n这个`FileView`结构声明了一个可以保存`String`的“choice”变量。然后它在`Text`视图中显示这个“choice”变量，显示结果为“您输入了\
  \ = ”。完整的`ContentView`文件应如下所示：\n\n```swift\nimport SwiftUI\n\nstruct ContentView:\
  \ View {\n    @State var message = \"\"\n    var body: some View {\n        TabView\
  \ {\n            TextField(\"在此输入\", text: $message)\n                .tabItem {\n\
  \                    Image(systemName: \"house.fill\")\n                    Text(\"\
  主页\")\n                }\n            FileView(choice: message)\n              \
  \  .tabItem {\n                    Image(systemName: \"heart.fill\")\n         \
  \           Text(\"第一\")\n                }\n            SeparateFileView(passedData:\
  \ message)\n                .tabItem {\n                    Image(systemName: \"\
  hare.fill\")\n                    Text(\"第二\")\n                }\n        }\n \
  \   }\n}\n\nstruct FileView: View {\n    var choice: String\n    var body: some\
  \ View {\n        HStack {\n            Spacer()\n            VStack {\n       \
  \         Spacer()\n                Text(\"您输入了 = \\(choice)\")\n              \
  \  Spacer()\n            }\n            Spacer()\n        }.background(Color.yellow)\n\
  \    }\n}\n\nstruct ContentView_Previews: PreviewProvider {\n    static var previews:\
  \ some View {\n        ContentView()\n    }\n}\n```\n\n\n\n此代码创建了一个名为 `FileView`\
  \ 的结构体，但现在我们需要创建第二个名为 `SeparateFileView` 的结构体，该结构体声明一个 `String` 类型的 `passedData`\
  \ 变量。\n\n1.  选择 `File` ➤ `New` ➤ `File`。此时会弹出一个对话框。\n2.  在对话框顶部附近点击 `iOS`，点击 `Swift\
  \ File`，然后点击 `Next`。`Xcode` 会要求您为新创建的文件命名。\n3.  输入 `SeparateFile` 并点击 `Create`。`Xcode`\
  \ 会创建一个新的 Swift 文件。\n4.  删除 `SeparateFile` 中当前的所有代码，并将其替换为以下内容：\n\n```swift\nimport\
  \ SwiftUI\nstruct SeparateFileView: View {\nvar passedData: String\nvar body: some\
  \ View {\nHStack {\nSpacer()\nVStack {\nSpacer()\nText(\"来自文本字段的字符串 = \\(passedData)\"\
  )\nSpacer()\n}\nSpacer()\n}.background(Color.orange)\n}\n}\nstruct SeparateFileView_Previews:\
  \ PreviewProvider {\nstatic var previews: some View {\nSeparateFileView(passedData:\
  \ \"\")\n}\n}\n```\n\n该文件创建了一个 `SeparateFileView` 结构体，该结构体声明了一个 `String` 类型的 `passedData`\
  \ 变量。由于此 `SeparateFileView` 结构体存储在单独的文件中，它包含一个 `struct PreviewProvider`，在其中我们也必须使用\
  \ `passedData` 参数。\n\n1.  在导航器窗格中点击 `ContentView` 以返回 `ContentView` 结构体。\n2.  在画布窗格中点击实时预览图标。此时会出现\
  \ `TextField`。\n3.  在 `TextField` 中点击并输入一个单词或短语。\n4.  点击标签栏中的第一个图标。这会将您在 `TextField`\
  \ 中输入的字符串传递并显示在 `FileView` 结构体中。\n5.  点击标签栏中的第二个图标。这会将您在 `TextField` 中输入的字符串传递并显示在\
  \ `SeparateFileView` 结构体中。\n\n### 在标签视图中更改结构体之间的数据\n\n上一个项目创建了两个结构体，其中一个结构体存储在 `ContentView`\
  \ 文件中，另一个结构体存储在单独的文件中。在这两种情况下，这些结构体都定义了接收数据并显示数据的用户界面。\n\n如果我们向一个结构体传递数据，然后允许该结构体修改该数据，会发生什么？这将需要几个更改：\n\
  \n*   创建一个 `State` 变量。\n*   使用 `NavigationLink` 打开另一个结构体，并向其传递一个指向该 `State` 变量的绑定（使用\
  \ `$` 符号），例如：\n*   在将要接收数据的结构体中定义一个 `@Binding` 变量。\n*   在接收数据的结构体中更改该 `Binding`\
  \ 变量。\n\n```swift\nFileView(choice: $message)\n```\n\n要了解如何在标签视图中更改结构体之间的数据，请按照以下步骤操作：\n\
  \n1.  创建一个新的 SwiftUI iOS App 项目，并任意命名，例如 “TabViewBindingData”。\n2.  在导航器窗格中点击 `ContentView`\
  \ 文件。\n3.  在 `struct ContentView: View` 行下方创建一个 `State` 变量，如下所示：\n4.  在 `var body:\
  \ some View` 行内部添加一个 `TabView`，如下所示：\n\n```swift\nstruct ContentView: View {\n@State\
  \ var message = \"\"\n```\n\n```swift\nvar body: some View {\nTabView {\nTextField(\"\
  在此输入\", text: $message)\n.tabItem {\nImage(systemName: \"house.fill\")\nText(\"\
  主页\")\n}\nFileView(choice: $message)\n.tabItem {\nImage(systemName: \"heart.fill\"\
  )\nText(\"第一个\")\n}\nSeparateFileView(passedData: $message)\n.tabItem {\nImage(systemName:\
  \ \"hare.fill\")\nText(\"第二个\")\n}\n}\n}\n```\n\n请注意，`FileView` 向 `choice:` 参数发送了一个绑定变量（`$message`）。名为\
  \ `SeparateFileView` 的第二个结构体向 `passedData` 参数发送了相同的绑定变量（`$message`）。\n\n1.  在 `struct\
  \ ContentView: View` 结构体下方添加以下结构体：\n\n```swift\nstruct FileView: View {\n@Binding\
  \ var choice: String\nvar body: some View {\nHStack {\nSpacer()\nVStack {\nSpacer()\n\
  TextField(\"在此输入:\", text: $choice)\nSpacer()\n}\nSpacer()\n}.background(Color.yellow)\n\
  }\n}\n```\n\n请注意，此结构体声明了一个名为 `choice` 的 `@Binding` 变量，该变量可以保存一个 `String`。此结构体使用\
  \ `TextField` 来更改此 `@Binding` 变量（`$choice`），这会将更改自动发送回 `ContentView` 结构体。\n\n1.\
  \  选择 `File` ➤ `New` ➤ `File`。此时会弹出一个对话框。\n2.  在对话框顶部附近点击 `iOS`，点击 `Swift File`，然后点击\
  \ `Next`。`Xcode` 会要求您为新创建的文件命名。\n3.  输入 `SeparateFile` 并点击 `Create`。`Xcode` 会创建一个新的\
  \ Swift 文件。\n4.  删除 `SeparateFile` 中当前的所有代码，并将其替换为以下内容：\n\n```swift\nimport SwiftUI\n\
  struct SeparateFileView: View {\n@Binding var passedData: String\nvar body: some\
  \ View {\nHStack {\nSpacer()\nVStack {\nSpacer()\nTextField(\"在此输入\", text: $passedData)\n\
  Spacer()\n}\nSpacer()\n}.background(Color.orange)\n}\n}\nstruct SeparateFileView_Previews:\
  \ PreviewProvider {\nstatic var previews: some View {\nSeparateFileView(passedData:\
  \ .constant(\"\"))\n}\n}\n```\n\n请注意，此结构体声明了一个名为 `passedData` 的 `@Binding` 变量，该变量可以保存一个\
  \ `String`。`TextField` 可以更改此变量（`$passedData`）并自动将更改发送回 `ContentView` 结构体。\n\n同时注意，由于此结构体存储在单独的文件中，`PreviewProvider`\
  \ 结构体也必须通过为其提供 `.constant(\"\")` 来包含 `passedData` 参数。\n\n1.  在导航器窗格中点击 `ContentView`\
  \ 文件。\n2.  在画布窗格中点击实时预览图标。\n3.  在 `TextField` 中点击并输入一个短语。\n4.  点击第一个图标，将字符串传递给存储在\
  \ `ContentView` 文件中的 `FileView` 结构体。\n5.  点击 `FileView` 结构体显示的 `TextField` 并编辑数据。然后点击\
  \ `Home` 标签返回到显示已修改数据的 `ContentView` 结构体。\n6.  编辑此数据。\n7.  点击第二个标签，将字符串传递给存储在单独文件中的\
  \ `SeparateFileView` 结构体。请注意，您编辑后的数据现在显示在 `SeparateFileView` 结构体中。\n8.  点击 `SeparateFileView`\
  \ 结构体显示的 `TextField` 并编辑数据。然后点击 `Home` 标签返回到显示已修改数据的 `ContentView` 结构体。\n\n\n\n\
  ### 在标签页视图中在结构体之间共享数据\n\n使用 `@State` 和 `@Binding` 变量可以让多个视图共享和修改数据。然而，更优的做法是将数据直接传递给需要它的结构体。为此，SwiftUI\
  \ 提供了另一种在结构体之间共享数据的方式。首先，创建一个包含一个或多个待共享变量的 `ObservableObject` 类。每个变量都必须像这样标记为 `@Published`：\n\
  \n```\nclass ShareString: ObservableObject {\n    @Published var message = \"\"\n\
  }\n```\n\n包含 `TabView` 的结构体（例如 `ContentView`）需要定义一个 `@StateObject` 变量，该变量定义一个来自\
  \ `ObservableObject` 类的对象，如下所示：\n\n```\n@StateObject var showMe = ShareString()\n\
  ```\n\n由于我们想要在 Tab View 内的所有视图之间共享这个 `ObservableObject`，我们需要向 `TabView` 添加 `.environmentObject`\
  \ 修饰符，并附带要共享的 StateObject，如下所示：\n\n```\nTabView {\n}.environmentObject(showMe)\n\
  ```\n\n在每个需要访问 `ObservableObject` 的结构体内部，我们需要声明一个使用该 `ObservableObject` 类的 `@EnvironmentObject`\
  \ 变量，如下所示：\n\n```\n@EnvironmentObject var choice: ShareString\n```\n\n最后，在每个定义了\
  \ `@EnvironmentObject` 的结构体内部，我们可以通过使用 `@EnvironmentObject` 的名称加上 `@Published` 属性名来访问要共享的实际数据，如下所示：\n\
  \n```\n$choice.message\n```\n\n在此例中，`choice` 是 `@EnvironmentObject` 的名称，`message`\
  \ 是在 `ObservableObject` 内定义的 `@Published` 属性。要了解如何使用 `ObservableObject` 共享数据，请遵循以下步骤：\n\
  \n1.  创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如 `TabViewObservable`。\n\n2.  在导航器窗格中点击\
  \ `ContentView` 文件。\n\n3.  在 `import SwiftUI` 行下创建一个 `ObservableObject` 类，如下所示：\n\
  \n```\nclass ShareString: ObservableObject {\n    @Published var message = \"\"\n\
  }\n```\n\n`@Published` 变量将包含在 Tab View 内的结构体之间共享的数据。\n\n4.  在 `struct ContentView:\
  \ View` 行下创建一个 `StateObject` 变量，如下所示：\n\n```\nstruct ContentView: View {\n    @StateObject\
  \ var showMe = ShareString()\n```\n\n这将基于 `ShareString` `ObservableObject` 创建一个新对象\
  \ (`showMe`)。\n\n5.  在 `var body: some View` 行内添加一个 `TabView`，如下所示：\n\n```\nvar\
  \ body: some View {\n    TabView {\n        TextField(\"在此输入\", text: $showMe.message)\n\
  \            .tabItem {\n                Image(systemName: \"house.fill\")\n   \
  \             Text(\"主页\")\n            }\n        FileView()\n            .tabItem\
  \ {\n                Image(systemName: \"heart.fill\")\n                Text(\"\
  第一个\")\n            }\n        SeparateFileView()\n            .tabItem {\n    \
  \            Image(systemName: \"hare.fill\")\n                Text(\"第二个\")\n \
  \           }\n    }.environmentObject(showMe)\n}\n```\n\n确保在 `TabView` 的末尾添加了 `.environmentObject(showMe)`\
  \ 修饰符。这允许共享 `showMe` 这个 `ObservableObject` (`ShareString` 类)。前面的 `TabView` 打开了我们需要创建的名称为\
  \ `FileView` 和 `SeparateFileView` 的结构体。\n\n6.  在 `struct ContentView` 结构体下方添加如下结构体：\n\
  \n```\nstruct FileView: View {\n    @EnvironmentObject var choice: ShareString\n\
  \    var body: some View {\n        HStack {\n            Spacer()\n           \
  \ VStack {\n                Spacer()\n                TextField(\"在此输入:\", text:\
  \ $choice.message)\n                Spacer()\n            }\n            Spacer()\n\
  \        }.background(Color.yellow)\n    }\n}\n```\n\n请注意，此结构体定义了一个可以持有 `ShareString`\
  \ `ObservableObject` 的 `@EnvironmentObject` 变量。在 `TextField` 中，我们必须将文本存储在使用了 `message`\
  \ `@Published` 属性 (`$choice.message`) 的 `choice` `@EnvironmentObject` 中。整个 `ContentView`\
  \ 文件应如下所示：\n\n7.  选择 **文件** ➤ **新建** ➤ **文件**。出现一个对话框。\n\n8.  点击对话框顶部附近的 **iOS**，点击\
  \ **Swift 文件**，然后点击 **下一步**。Xcode 会要求你为新创建的文件命名。\n\n9.  输入 `SeparateFile` 并点击 **创建**。Xcode\
  \ 会创建一个新的 Swift 文件。\n\n10. 删除 `SeparateFile` 中当前的所有代码，并将其替换为以下内容：\n\n```\nimport\
  \ SwiftUI\n\nclass ShareString: ObservableObject {\n    @Published var message =\
  \ \"\"\n}\n\nstruct ContentView: View {\n    @StateObject var showMe = ShareString()\n\
  \    var body: some View {\n        TabView {\n            TextField(\"在此输入\", text:\
  \ $showMe.message)\n                .tabItem {\n                    Image(systemName:\
  \ \"house.fill\")\n                    Text(\"主页\")\n                }\n       \
  \     FileView()\n                .tabItem {\n                    Image(systemName:\
  \ \"heart.fill\")\n                    Text(\"第一个\")\n                }\n      \
  \      SeparateFileView()\n                .tabItem {\n                    Image(systemName:\
  \ \"hare.fill\")\n                    Text(\"第二个\")\n                }\n       \
  \ }.environmentObject(showMe)\n    }\n}\n\nstruct FileView: View {\n    @EnvironmentObject\
  \ var choice: ShareString\n    var body: some View {\n        HStack {\n       \
  \     Spacer()\n            VStack {\n                Spacer()\n               \
  \ TextField(\"在此输入:\", text: $choice.message)\n                Spacer()\n      \
  \      }\n            Spacer()\n        }.background(Color.yellow)\n    }\n}\n\n\
  struct ContentView_Previews: PreviewProvider {\n    static var previews: some View\
  \ {\n        ContentView()\n    }\n}\n```\n\n```\nimport SwiftUI\n\nstruct SeparateFileView:\
  \ View {\n    @EnvironmentObject var passedData: ShareString\n    var body: some\
  \ View {\n        HStack {\n            Spacer()\n            VStack {\n       \
  \         Spacer()\n                TextField(\"在此输入\", text: $passedData.message)\n\
  \                Spacer()\n            }\n            Spacer()\n        }.background(Color.orange)\n\
  \    }\n}\n\nstruct SeparateFileView_Previews: PreviewProvider {\n    static var\
  \ previews: some View {\n        SeparateFileView()\n    }\n}\n```\n\n请注意，此结构体也声明了一个可以持有\
  \ `ShareString` `ObservableObject` 的 `@EnvironmentObject`。然后，`TextField` 使用 `passedData`\
  \ `@EnvironmentObject` 来访问 `message` `@Published` 属性 (`$passedData.message`)。\n\n\
  11. 在导航器窗格中点击 `ContentView` 文件。\n\n12. 点击画布窗格中的 **实时预览** 图标。\n\n13. 点击 `TextField`\
  \ 并输入一个短语。\n\n14. 点击 **第一个** 标签。注意，你在第 13 步输入的内容现在出现在 `FileView` 的 `TextField` 中。\n\
  \n15. 编辑 `TextField` 中的文本，然后点击 **主页** 标签。注意，修改后的文本现在出现在 `ContentView` 的 `TextField`\
  \ 中。\n\n16. 编辑 `TextField` 中的文本，然后点击 **第二个** 标签。编辑后的文本现在出现在 `SeparateFileView` 的\
  \ `TextField` 中。\n\n17. 编辑 `TextField` 中的文本，然后点击 **主页** 标签。注意，修改后的文本现在出现在 `ContentView`\
  \ 的 `TextField` 中。所有这些都展示了不同结构体如何访问 `ObservableObject` 中的 `@Published` 属性。\n\n##\
  \ 总结\n\n标签页视图提供了另一种显示多个视图的方式，其中每个视图都可以由屏幕底部的一个标签页表示。标签页视图可以打开像 `Text` 或 `Image`\
  \ 视图这样简单的视图，但更常使用由结构体定义的视图。这些结构体可以存储在同一个文件中，也可以存储在单独的文件中。\n\n标签页视图可以将数据传递给另一个视图，很像将数据传递给函数。这个其他视图需要定义一个属性，然后标签页视图就可以将数据传递给该属性。如果你想将可以修改的数据传递给另一个视图，可以使用两种不同的方法。\n\
  \n第一种方法使用 `@State` 和 `@Binding` 变量，并强制标签页视图将数据传递给它打开的每个视图。第二种方法使用 `ObservableObjects`、`StateObjects`\
  \ 和 `EnvironmentObjects` 在多个视图之间共享数据。\n\n标签页视图在屏幕底部最多可以显示五个标签页。如果你定义了超过五个标签页，SwiftUI\
  \ 会自动创建一个**更多**标签页，并在导航视图中显示所有额外的标签页。\n\n由于标签页视图在屏幕底部只能显示五个标签页，你可以将标签页视图转换为页面视图。这样，你可以在屏幕底部显示超过五个图标。与标签页视图不同，页面视图强制用户按顺序在屏幕之间导航。当用户需要跳转到你应用用户界面上的不同屏幕时，标签页视图非常方便。\n\
  \n\n\n"
- "# 18. 使用网格\n\n`Text` 视图适合显示字符串，而 `Image` 视图则完美适用于显示图形。但是，如果你想在屏幕上显示多块数据呢？这时你可以使用网格，它能够以行（水平方向）或列（垂直方向）的形式显示数据，如图\
  \ 18-1 所示。\n\n![../images/329781_6_En_18_Chapter/329781_6_En_18_Fig1_HTML.jpg](img/329781_6_En_18_Fig1_HTML.jpg)\n\
  \n图 18-1 —— 网格可以水平或垂直显示数据\n\n创建网格需要三个要素：\n\n*   你想要显示的数据\n*   一个 `GridItem` 数组，用于定义数据在网格中的排列方式\n\
  *   一个 `LazyVGrid` 或 `LazyHGrid`，用于将你的数据放置到 `GridItem` 数组中\n\n“Lazy”一词指的是网格加载数据的方式。如果一个网格需要显示\
  \ 1000 个项目，它可能会将所有 1000 个项目加载到内存中，即使其中大部分项目无法显示在屏幕上。由于这会浪费内存，“懒加载”网格只会加载那些需要显示的项目。当用户滚动以查看更多数据时，懒加载网格会立即加载这些项目。通过等到最后一刻才加载数据，懒加载网格使用的内存少得多，并且能让应用运行更高效，代价是运行速度会稍微慢一点。\n\
  \n> **注意：** 懒加载网格通常嵌入在 `ScrollView` 内部，以便用户能够滚动查看网格中存储的更多数据。\n\n要了解如何创建一个简单的水平和垂直网格，请按照以下步骤操作：\n\
  \n1.  创建一个新的 SwiftUI iOS App 项目，并为其命名，例如“SimpleGrid”。\n2.  在导航器窗格中点击 `ContentView`\
  \ 文件。\n3.  在 `var body: some View` 中添加一个 `VStack`，并创建一个 `GridItem` 数组，如下所示：\n\n\
  ```\nvar body: some View {\n    VStack {\n        let gridItems = [GridItem()]\n\
  \    }\n}\n```\n\n`GridItem` 是 SwiftUI 中的一个结构体，允许你定义列和行之间的间距。目前，我们通过将 `GridItem`\
  \ 的参数列表留空来使用默认值。\n\n4.  在 `gridItems` 数组下方，添加一个 `ScrollView` 和一个 `LazyHGrid`，如下所示：\n\
  \n```\nScrollView(Axis.Set.horizontal, showsIndicators: true, content: {\n    LazyHGrid(rows:\
  \ gridItems) {\n        Image(systemName: \"1.circle\")\n        Image(systemName:\
  \ \"2.circle\")\n        Image(systemName: \"3.circle\")\n        Image(systemName:\
  \ \"4.circle\")\n        Image(systemName: \"5.circle\")\n        Image(systemName:\
  \ \"6.circle\")\n        Image(systemName: \"7.circle\")\n        Image(systemName:\
  \ \"8.circle\")\n        Image(systemName: \"9.circle\")\n        Image(systemName:\
  \ \"10.circle\")\n    }.font(.largeTitle)\n})\n```\n\n这段代码定义了一个水平的 `ScrollView`（`Axis.Set.horizontal`），里面包含一个\
  \ `LazyHGrid`，用于显示一行数据。`LazyHGrid` 最多可以容纳十个视图，所以我们用十个 `Image` 视图填充它，每个视图在圆圈内显示一个不同的数字。由于圆圈图标很小，`.font(.largeTitle)`\
  \ 修饰符使它们变大，更容易看清。\n\n5.  在另一个 `ScrollView` 下方，添加第二个带有 `LazyVGrid` 的 `ScrollView`，如下所示：\n\
  \n```\nScrollView(Axis.Set.vertical, showsIndicators: true, content: {\n    LazyVGrid(columns:\
  \ gridItems) {\n        Image(systemName: \"1.square\")\n        Image(systemName:\
  \ \"2.square\")\n        Image(systemName: \"3.square\")\n        Image(systemName:\
  \ \"4.square\")\n        Image(systemName: \"5.square\")\n        Image(systemName:\
  \ \"6.square\")\n        Image(systemName: \"7.square\")\n        Image(systemName:\
  \ \"8.square\")\n        Image(systemName: \"9.square\")\n        Image(systemName:\
  \ \"10.square\")\n    }.font(.largeTitle)\n})\n```\n\n这段代码定义了一个垂直的 `ScrollView`（`Axis.Set.vertical`），里面包含一个\
  \ `LazyVGrid`，用于显示一列数据。这些数据由十个 `Image` 视图组成，每个视图在方块内显示一个不同的数字。`.font(.largeTitle)`\
  \ 修饰符使这些方块图标变大，更容易看清。整个 `ContentView` 文件应该如下所示：\n\n![../images/329781_6_En_18_Chapter/329781_6_En_18_Fig2_HTML.jpg](img/329781_6_En_18_Fig2_HTML.jpg)\n\
  \n图 18-2 —— 在垂直网格上方显示水平网格\n\n6.  点击画布窗格上的 Live Preview 图标。\n7.  从左到右滚动水平网格，查看所有带编号的圆圈，如图\
  \ 18-2 所示。\n\n```\nimport SwiftUI\nstruct ContentView: View {\n    var body: some\
  \ View {\n        VStack {\n            let gridItems = [GridItem()]\n         \
  \   ScrollView(Axis.Set.horizontal, showsIndicators: true, content: {\n        \
  \        LazyHGrid(rows: gridItems) {\n                    Image(systemName: \"\
  1.circle\")\n                    Image(systemName: \"2.circle\")\n             \
  \       Image(systemName: \"3.circle\")\n                    Image(systemName: \"\
  4.circle\")\n                    Image(systemName: \"5.circle\")\n             \
  \       Image(systemName: \"6.circle\")\n                    Image(systemName: \"\
  7.circle\")\n                    Image(systemName: \"8.circle\")\n             \
  \       Image(systemName: \"9.circle\")\n                    Image(systemName: \"\
  10.circle\")\n                }.font(.largeTitle)\n            })\n            ScrollView(Axis.Set.vertical,\
  \ showsIndicators: true, content: {\n                LazyVGrid(columns: gridItems)\
  \ {\n                    Image(systemName: \"1.square\")\n                    Image(systemName:\
  \ \"2.square\")\n                    Image(systemName: \"3.square\")\n         \
  \           Image(systemName: \"4.square\")\n                    Image(systemName:\
  \ \"5.square\")\n                    Image(systemName: \"6.square\")\n         \
  \           Image(systemName: \"7.square\")\n                    Image(systemName:\
  \ \"8.square\")\n                    Image(systemName: \"9.square\")\n         \
  \           Image(systemName: \"10.square\")\n                }.font(.largeTitle)\n\
  \            })\n        }\n    }\n}\nstruct ContentView_Previews: PreviewProvider\
  \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
  \n8.  上下滚动垂直网格，查看所有带编号的方块。\n\n\n\n## 定义多行/多列\n\n上一个项目在 `LazyHGrid` 中创建了单行，在 `LazyVGrid`\
  \ 中创建了单列。这个单行和单列是由 `GridItem` 的数组定义的，如下所示：\n\n```\nlet gridItems = [GridItem()]\n\
  ```\n\n如果你想创建多行或多列，只需要在数组中定义多个 `GridItem`，如下所示：\n\n```\nlet gridItems = [GridItem(),\n\
  GridItem()\n]\n```\n\n这样会在 `LazyHGrid` 中创建两行，或在 `LazyVGrid` 中创建两列。每次向数组中添加一个 `GridItem`，网格中的行数或列数就会增加。\n\
  \n要了解如何更改网格中的行数或列数，请按照以下步骤操作：\n\n1. 确保在 Xcode 中加载了上一个项目（例如\"SimpleGrid\"）。\n2. 按如下方式编辑数组，为\
  \ `LazyHGrid` 定义三行，为 `LazyVGrid` 定义三列：\n\n```\nlet gridItems = [GridItem(),\nGridItem(),\n\
  GridItem()\n]\n```\n\n完整的 `ContentView` 文件应如下所示：\n\n![../images/329781_6_En_18_Chapter/329781_6_En_18_Fig3_HTML.jpg](img/329781_6_En_18_Fig3_HTML.jpg)\n\
  \n图 18-3 显示一个包含三行三列的网格\n\n1. 点击画布面板上的\"实时预览\"图标。\n2. 水平滚动网格，左右滑动查看所有带编号的圆圈，如图 18-3\
  \ 所示。\n\n```\nimport SwiftUI\nstruct ContentView: View {\nvar body: some View {\n\
  VStack {\nlet gridItems = [GridItem(),\nGridItem(),\nGridItem()\n]\nScrollView(Axis.Set.horizontal,\
  \ showsIndicators: true, content: {\nLazyHGrid(rows: gridItems) {\nImage(systemName:\
  \ \"1.circle\")\nImage(systemName: \"2.circle\")\nImage(systemName: \"3.circle\"\
  )\nImage(systemName: \"4.circle\")\nImage(systemName: \"5.circle\")\nImage(systemName:\
  \ \"6.circle\")\nImage(systemName: \"7.circle\")\nImage(systemName: \"8.circle\"\
  )\nImage(systemName: \"9.circle\")\nImage(systemName: \"10.circle\")\n}.font(.largeTitle)\n\
  })\nScrollView(Axis.Set.vertical, showsIndicators: true, content: {\nLazyVGrid(columns:\
  \ gridItems) {\nImage(systemName: \"1.square\")\nImage(systemName: \"2.square\"\
  )\nImage(systemName: \"3.square\")\nImage(systemName: \"4.square\")\nImage(systemName:\
  \ \"5.square\")\nImage(systemName: \"6.square\")\nImage(systemName: \"7.square\"\
  )\nImage(systemName: \"8.square\")\nImage(systemName: \"9.square\")\nImage(systemName:\
  \ \"10.square\")\n}.font(.largeTitle)\n})\n}\n}\n}\nstruct ContentView_Previews:\
  \ PreviewProvider {\nstatic var previews: some View {\nContentView()\n}\n}\n```\n\
  \n1. 垂直滚动网格，上下滑动查看所有带编号的方块。\n\n请注意，当填充 `LazyHGrid` 时，SwiftUI 会将每个项目放置到单独的行中。这就是为什么圆圈\
  \ 1 出现在第一行，圆圈 2 出现在第二行，圆圈 3 出现在第三行，而圆圈 4 又回到第一行的原因。\n\n填充 `LazyVGrid` 时也是如此，只不过\
  \ SwiftUI 会将每个项目放置到单独的列中。方块 1 出现在第一列，方块 2 出现在第二列，方块 3 出现在第三列，而方块 4 又回到第一列。\n\n>\
  \ **注意：** 滚动指示器仅在网格无法同时显示所有项目时出现。当显示三行或三列时，所有项目都可见，因此滚动指示器无需出现。\n\n### 调整行/列间距\n\
  \n通过创建 `GridItem` 数组，我们可以定义网格中的行数/列数。为了进一步自定义，我们还可以定义行与列之间的间距。在网格中定义行/列间距的三种方式包括：\n\
  \n- `.fixed`\n- `.flexible`\n- `.adaptive`\n\n`.fixed` 选项允许你定义一个十进制值（`CGFloat` 数据类型），用于创建特定的间距量。图\
  \ 18-4 显示了不同的固定间距选项，以及它们如何影响网格中行和列的外观。\n\n![../images/329781_6_En_18_Chapter/329781_6_En_18_Fig4_HTML.jpg](img/329781_6_En_18_Fig4_HTML.jpg)\n\
  \n图 18-4 网格的各种 `.fixed` 间距选项\n\n> **注意：** 在图 18-4 中，数组中的所有 `GridItem` 元素都使用了相同的\
  \ `.fixed` 大小值，但你可以根据需要为每个 `GridItem` 赋予不同的大小值。\n\n为网格中的行和列间距定义 `.fixed` 值，可以在任何\
  \ iOS 设备上获得可预测的结果。然而，在较小或较大的 iOS 设备屏幕上，`.fixed` 值可能并不总是美观。如果你希望创建能够根据不同屏幕尺寸变化的网格，请改用\
  \ `.flexible` 或 `.adaptive`。\n\n`.flexible` 选项会尽可能扩大行/列之间的间距。另一方面，`.adaptive` 选项会尽可能缩小行/列之间的间距。`.flexible`\
  \ 和 `.adaptive` 选项都允许你定义最小值和最大值。这定义了网格间距可以使用的值范围。\n\n如果未选择任何选项，默认值为 `.flexible`，最大值为\
  \ `.infinity`。要了解 `.fixed`、`.flexible` 和 `.adaptive` 选项的工作原理，请按照以下步骤操作：\n\n1. 确保在\
  \ Xcode 中加载了上一个项目（例如\"SimpleGrid\"）。\n2. 按如下方式编辑数组，为 `LazyHGrid` 定义三行，为 `LazyVGrid`\
  \ 定义三列：\n\n```\nlet gridItems = [GridItem(.fixed(120)),\nGridItem(.fixed(120)),\n\
  GridItem(.fixed(120))\n]\n```\n\n请注意，这会按固定量分隔网格中的行和列（见图 18-4）。\n\n1. 按如下方式编辑数组，为\
  \ `LazyHGrid` 定义三行，为 `LazyVGrid` 定义三列：\n2. 像这样注释掉第二个 `ScrollView`：\n\n```\nlet gridItems\
  \ = [GridItem(.flexible(minimum: 20, maximum: 450)),\nGridItem(.flexible(minimum:\
  \ 20, maximum: 450)),\nGridItem(.flexible(minimum: 20, maximum: 450))\n]\n```\n\n\
  ```\n//            ScrollView(Axis.Set.vertical, showsIndicators: true, content:\
  \ {\n//                LazyVGrid(columns: gridItems) {\n//                    Image(systemName:\
  \ \"1.square\")\n//                    Image(systemName: \"2.square\")\n//     \
  \               Image(systemName: \"3.square\")\n//                    Image(systemName:\
  \ \"4.square\")\n//                    Image(systemName: \"5.square\")\n//     \
  \               Image(systemName: \"6.square\")\n//                    Image(systemName:\
  \ \"7.square\")\n//                    Image(systemName: \"8.square\")\n//     \
  \               Image(systemName: \"9.square\")\n//                    Image(systemName:\
  \ \"10.square\")\n//                }.font(.largeTitle)\n//            })\n```\n\
  \n请注意，没有第二个 `ScrollView` 后，`LazyHGrid` 现在可以扩展行之间的间距，如图 18-5 所示。\n\n![../images/329781_6_En_18_Chapter/329781_6_En_18_Fig5_HTML.jpg](img/329781_6_En_18_Fig5_HTML.jpg)\n\
  \n图 18-5 左侧显示行间距被扩大，而右侧显示行间距被缩小\n\n1. 按如下方式编辑数组，为 `LazyHGrid` 定义三行，为 `LazyVGrid`\
  \ 定义三列：\n\n```\nlet gridItems = [GridItem(.adaptive(minimum: 20, maximum: 450)),\n\
  GridItem(.adaptive(minimum: 20, maximum: 450)),\nGridItem(.adaptive(minimum: 20,\
  \ maximum: 450))\n]\n```\n\n请注意，`.adaptive` 选项会将间距缩小到最小值，如图 18-6 所示。\n\n![../images/329781_6_En_18_Chapter/329781_6_En_18_Fig6_HTML.jpg](img/329781_6_En_18_Fig6_HTML.jpg)\n\
  \n图 18-6 `.adaptive` 选项将间距缩小到可能的最小值\n\n\n\n## 总结\n\n网格提供了在用户界面上显示视图的另一种方式。`LazyHGrids`\
  \ 可以在行中水平显示视图，而 `LazyVGrids` 可以在列中垂直显示视图。要使用网格，你需要准备要显示的数据、一个用于定义数据在网格中排列方式的 `GridItem`\
  \ 数组，以及一个 `LazyHGrid` 或 `LazyVGrid`。\n\n数组中定义的 `GridItem` 数量决定了网格中显示的行/列数。通过每个 `GridItem`，你可以定义间距选项，例如\
  \ `.fixed`、`.flexible` 或 `.adaptive`。\n\n`.fixed` 选项允许你为间距定义一个十进制值，例如 `25.7`。`.flexible`\
  \ 选项会尽可能扩展间距，而 `.adaptive` 选项则会尽可能缩小间距。你可以为数组中的每个 `GridItem` 应用不同的间距选项。\n\n通过使用网格，你可以按行和列显示数据。网格通常嵌入在滚动视图中，允许用户上下或左右滚动，以查看因网格和\
  \ iOS 设备屏幕尺寸而可能不可见的数据。\n\n"
- "# 19. 使用动画\n\n动画可以移动用户界面上的项目，以提供反馈或只是增加美观效果。与传统的逐帧手绘动画不同，在 SwiftUI 中，动画只需定义开始和结束状态即可工作。然后，SwiftUI\
  \ 会负责在这些开始和结束状态之间为项目制作动画。\n\n最常见的三种动画类型包括：\n\n*   移动 – 改变项目在用户界面上的 x 和 y 位置\n* \
  \  缩放 – 通过缩小或放大来改变项目的大小\n*   旋转 – 顺时针或逆时针改变项目的角度\n\n创建动画涉及定义要动画化的内容、动画化的方式（移动、缩放、旋转）以及何时进行动画化。通常，当用户执行某些操作（例如点击按钮）或特定事件发生时（例如数值达到某个点），动画就会触发。\n\
  \n## 移动动画\n\n要移动视图，我们必须定义一个 x、y 起始位置和一个 x、y 结束位置。指定位置的两个修改器是 `.position` 和 `.offset`。\n\
  \n`.position` 修改器将视图放置在距离 iOS 设备屏幕左上角（被视为原点 (0,0)）特定的 x 和 y 位置处。`.offset` 修改器将视图放置在距离它在用户界面上正常显示位置特定的\
  \ x 和 y 位置处。\n\n`.position` 修改器定义了屏幕上的固定位置。 `.offset` 修改器定义了相对于其 `.offset` 修改器 x\
  \ 和 y 值均为 0 时正常显示位置的位置。在这两种情况下，正的 x 值将视图向右移动，正的 y 值将视图向下移动，如图 19-1 所示。\n\n![../images/329781_6_En_19_Chapter/329781_6_En_19_Fig1_HTML.jpg](img/329781_6_En_19_Fig1_HTML.jpg)\n\
  \n图 19-1\n\n`.position` 修改器和 `.offset` 修改器之间的区别\n\n注意\n\n使用 `.position` 和 `.offset`\
  \ 修改器时，极端的 x 或 y 值可能会使视图移出屏幕。\n\n要了解如何使用 `.position` 和 `.offset` 修改器移动视图，请按照以下步骤操作：\n\
  \n1.  创建一个新的 SwiftUI iOS 应用项目，并随意命名，例如“MoveAnimation”。\n\n2.  在导航器窗格中点击 `ContentView`\
  \ 文件。\n\n3.  在 `struct ContentView: View` 行下添加一个状态变量，如下所示：\n\n    ```\n    struct\
  \ ContentView: View {\n    @State var move = true\n    ```\n\n4.  在 `var body: some\
  \ View` 内部添加一个 `VStack`。\n\n5.  在 `VStack` 内部添加一个 `Text` 视图和一个 `Toggle`，如下所示：\n\n\
  \    ```\n    var body: some View {\n    VStack {\n    Text(\"A Text view\")\n \
  \   .offset(x: move ? 100 : 0, y: move ? 100 : 0)\n    Toggle(isOn: $move) {\n \
  \   Text(\"Toggle me\")\n    }\n    }\n    }\n    ```\n\n整个 `ContentView` 文件应如下所示：\n\
  \n    ```\n    import SwiftUI\n    struct ContentView: View {\n    @State var move\
  \ = true\n    var body: some View {\n    VStack {\n    Text(\"A Text view\")\n \
  \   .offset(x: move ? 100 : 0, y: move ? 100 : 0)\n    Toggle(isOn: $move) {\n \
  \   Text(\"Toggle me\")\n    }\n    }\n    }\n    }\n    struct ContentView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n \
  \   }\n    }\n    ```\n\n6.  在画布窗格上点击 Live Preview 图标。\n\n7.  点击 Toggle。注意 `.offset`\
  \ 修改器将 `Text` 视图移离其正常位置。\n\n8.  编辑 `ContentView` 文件，将 `.offset` 替换为 `.position`，如下所示：\n\
  \n    ```\n    .position(x: move ? 100 : 0, y: move ? 100 : 0)\n    ```\n\n9.  确保\
  \ Live Preview 仍处于开启状态，然后点击 Toggle。注意 `Text` 视图现在基于屏幕左上角的原点 (0,0) 移动。\n\n    注意，`.offset`\
  \ 和 `.position` 修改器都会使 `Text` 视图从一个位置跳到另一个位置。现在是时候为 `Text` 视图添加 `.animation` 修改器，以使移动看起来更平滑。\n\
  \n10. 为 `Text` 视图添加 `.animation` 修改器，使整个 `ContentView` 文件如下所示：\n\n    ```\n    import\
  \ SwiftUI\n    struct ContentView: View {\n    @State var move = true\n    var body:\
  \ some View {\n    VStack {\n    Text(\"A Text view\")\n    //                .offset(x:\
  \ move ? 100 : 0, y: move ? 100 : 0)\n    .position(x: move ? 100 : 0, y: move ?\
  \ 100 : 0)\n    .animation(.default, value: move)\n    Toggle(isOn: $move) {\n \
  \   Text(\"Toggle me\")\n    }\n    }\n    }\n    }\n    struct ContentView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n \
  \   }\n    }\n    ```\n\n11. 确保 Live Preview 仍处于开启状态，然后点击 Toggle。注意 `Text` 视图现在在基于屏幕左上角原点\
  \ (0,0) 移动时呈现动画效果。\n\n12. 将 `.position` 修改器替换为 `.offset` 修改器。\n\n13. 确保 Live Preview\
  \ 仍处于开启状态，然后点击 Toggle。注意 `Text` 视图现在在基于其正常位置移动时呈现动画效果。\n\n在这个项目中，`.animation` 修改器提供了\
  \ `Text` 视图在两个不同 x 和 y 位置之间的过渡。每次 Toggle 更改布尔状态变量时，动画都会再次运行。\n\n\n\n## 缩放动画\n\n\
  另一种创建动画的方式是为视图定义两种不同的尺寸，即缩放。若要定义视图尺寸的起始和结束状态，可使用 `.scaleEffect` 修饰符并指定要进行的相对尺寸变化。例如，`.scaleEffect(1)`\
  \ 代表视图的当前尺寸。大于 1 的 `.scaleEffect` 值定义更大的尺寸或缩放比例，而小于 1 的值则定义更小的尺寸或缩放比例。\n\n若要了解如何通过将视图缩放到不同尺寸来实现动画效果，请按以下步骤操作：\n\
  \n1. 创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如\"ScaleAnimation\"。\n2. 在导航器窗格中点击 `ContentView`\
  \ 文件。\n3. 在 `struct ContentView: View` 行下方添加一个 `State` 变量，如下所示：\n4. 在 `var body:\
  \ some View` 中添加一个 `Image` 视图，如下所示：\n\n```\nstruct ContentView: View {\n@State private\
  \ var changeMe = false\n```\n\n```\nvar body: some View {\nImage(systemName: \"\
  tortoise.fill\")\n.font(.system(size:100))\n.foregroundColor(.red)\n.scaleEffect(changeMe\
  \ ? 1.75 : 1)\n}\n```\n\n这将在屏幕上以 100 的尺寸显示一个乌龟图标，以便于观察。然后，它将乌龟图标设为红色，并使用 `.scaleEffect`\
  \ 修饰符将乌龟尺寸在其正常大小的 1.75 倍和原始大小之间交替变化。\n\n5. 向 `Image` 视图添加以下修饰符，如下所示：\n\n```\n.animation(.default,\
  \ value: changeMe)\n.onTapGesture {\nchangeMe.toggle()\n}\n```\n\n这会为 `Image` 视图添加\
  \ `.animation` 修饰符，使其尺寸变化呈现动画效果。接着，`.onTapGesture` 修饰符检测点击手势，以将 `changeMe` 状态变量从\
  \ `true` 切换为 `false`（或从 `false` 切换为 `true`）。整个 `ContentView` 文件应如下所示：\n\n6. 点击画布面板上的实时预览图标。\n\
  7. 点击乌龟图像。注意，每次点击乌龟图像时，它都会在放大和缩小之间交替变化。\n\n```\nimport SwiftUI\nstruct ContentView:\
  \ View {\n@State private var changeMe = false\nvar body: some View {\nImage(systemName:\
  \ \"tortoise.fill\")\n.font(.system(size:100))\n.foregroundColor(.red)\n.scaleEffect(changeMe\
  \ ? 1.75 : 1)\n.animation(.default, value: changeMe)\n.onTapGesture {\nchangeMe.toggle()\n\
  }\n}\n}\nstruct ContentView_Previews: PreviewProvider {\nstatic var previews: some\
  \ View {\nContentView()\n}\n}\n```\n\n## 旋转动画\n\n旋转动画涉及使用 `.rotationEffect` 修饰符改变视图的角度。`.rotationEffect`\
  \ 值为 0 表示不旋转，而小于或大于 0 的旋转值则会使视图逆时针或顺时针旋转。\n\n若要了解如何通过将视图旋转不同角度来实现动画效果，请按以下步骤操作：\n\
  \n1. 创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如\"RotateAnimation\"。\n2. 在导航器窗格中点击 `ContentView`\
  \ 文件。\n3. 在 `struct ContentView: View` 行下方添加两个 `State` 变量，如下所示：\n4. 在 `var body:\
  \ some View` 中添加一个 `VStack`。\n5. 在 `VStack` 中添加一个 `Text` 视图，如下所示：\n\n```\nstruct\
  \ ContentView: View {\n@State var myDegrees: Double = 0.0\n@State var flag = false\n\
  ```\n\n```\nvar body: some View {\nVStack {\nText(\"Hello, world!\")\n.padding()\n\
  .rotationEffect(Angle(degrees: flag ? myDegrees : 0))\n.animation(.default, value:\
  \ flag)\n```\n\n此 `Text` 视图使用 `.rotationEffect` 来定义起始和结束角度。然后使用 `.animation` 修饰符来让\
  \ `Text` 视图在起始和结束角度之间旋转时呈现动画效果。\n\n6. 在 `VStack` 中的 `Text` 视图下方添加一个 `Button` 和一个\
  \ `Slider`，如下所示：\n\n```\nvar body: some View {\nVStack {\nText(\"Hello, world!\"\
  )\n.padding()\n.rotationEffect(Angle(degrees: flag ? myDegrees : 0))\n.animation(.default,\
  \ value: flag)\nButton(\"现在开始动画\") {\nflag.toggle()\n}\nSlider(value: $myDegrees,\
  \ in: -180...180, step: 1)\n.padding()\n}\n}\n```\n\n`Slider` 允许你在 -180 度到 180 度之间选择角度。整个\
  \ `ContentView` 文件应如下所示：\n\n7. 点击画布面板上的实时预览图标。\n8. 向左或向右拖动 `Slider` 来定义一个结束角度。（起始角度为\
  \ 0。）\n9. 点击 `Button`。注意，`.animation` 修饰符会在 `Text` 视图旋转到新角度时为其添加动画效果。\n\n```\nimport\
  \ SwiftUI\nstruct ContentView: View {\n@State var myDegrees: Double = 0.0\n@State\
  \ var flag = false\nvar body: some View {\nVStack {\nText(\"Hello, world!\")\n.padding()\n\
  .rotationEffect(Angle(degrees: flag ? myDegrees : 0))\n.animation(.default, value:\
  \ flag)\nButton(\"现在开始动画\") {\nflag.toggle()\n}\nSlider(value: $myDegrees, in: -180...180,\
  \ step: 1)\n.padding()\n}\n}\n}\nstruct ContentView_Previews: PreviewProvider {\n\
  static var previews: some View {\nContentView()\n}\n}\n```\n\n## 动画选项\n\n到目前为止，我们一直使用\
  \ `.animation` 修饰符的 `.default` 设置。虽然这有效，但你还可以选择其他几种动画选项：\n\n- `.easeIn` – 动画开始时较慢，然后加速\n\
  - `.easeOut` – 动画在接近结束时减速\n- `.easeInOut` – 动画开始时较慢，然后加速，最后在接近结束时减速（与 `.default`\
  \ 相同）\n- `.linear` – 动画从开始到结束保持恒定速度\n\n通过选择不同的 `.animation` 选项，你可以调整动画运行时的呈现效果。为了比较这些不同的\
  \ `.animation` 选项，请按以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如\"CompareAnimation\"\
  。\n2. 在导航器窗格中点击 `ContentView` 文件。\n3. 在 `struct ContentView: View` 行下方添加一个 `State`\
  \ 变量，如下所示：\n4. 在 `var body: some View` 中添加一个 `VStack`。\n5. 在 `VStack` 中添加一个 `Button`，如下所示：\n\
  \n```\nstruct ContentView: View {\n@State private var start = false\n```\n\n```\n\
  var body: some View {\nVStack {\nButton(\"开始动画\") {\nstart.toggle()\n}\n```\n\n\
  6. 在 `Button` 下方添加一个包含四个 `Text` 视图的 `HStack`，如下所示：\n\n```\nHStack {\nText(\"easeIn\"\
  )\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.easeIn, value: start)\nText(\"\
  easeOut\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.easeOut, value: start)\n\
  Text(\"easeInOut\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.easeInOut, value:\
  \ start)\nText(\"linear\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.linear,\
  \ value: start)\n}.position(x: 150, y: 10)\n```\n\n注意，`.position` 修饰符初始时将整个 `HStack`\
  \ 及其所有四个 `Text` 视图放置在靠近屏幕顶部的位置。整个 `ContentView` 文件应如下所示：\n\n7. 点击画布面板上的实时预览图标。\n\
  8. 点击 `Button`。注意，所有四个 `Text` 视图都会下落至屏幕底部，但由于它们使用了不同的 `.animation` 选项，即使都同时开始和停止，动画的呈现效果也略有不同。\n\
  \n```\nimport SwiftUI\nstruct ContentView: View {\n@State private var start = false\n\
  var body: some View {\nVStack {\nButton(\"开始动画\") {\nstart.toggle()\n}\nHStack {\n\
  Text(\"easeIn\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.easeIn, value:\
  \ start)\nText(\"easeOut\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.easeOut,\
  \ value: start)\nText(\"easeInOut\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.easeInOut,\
  \ value: start)\nText(\"linear\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.linear,\
  \ value: start)\n}.position(x: 150, y: 10)\n}\n}\n}\nstruct ContentView_Previews:\
  \ PreviewProvider {\nstatic var previews: some View {\nContentView()\n}\n}\n```\n\
  \n\n\n### 在动画中使用延迟和持续时间\n\n通过时间修改动画的两种方式包括延迟和持续时间。延迟可让你指定开始动画前等待的秒数。持续时间可让你指定动画应持续的时间。较大的时间值会使动画运行得更慢，而较短的时间值则会使动画运行得更快。\n\
  \n若要定义延迟，请在你希望的 `.animation` 选项上添加 `.delay` 修饰符，例如：\n\n```\n.animation(.linear.delay(2.5),\
  \ value: BooleanStateVariable)\n```\n\n要了解延迟的工作原理，请按照以下步骤操作：\n\n1.  加载之前的 \"CompareAnimation\"\
  \ Xcode 项目。\n2.  像这样为每个 `.animation` 选项添加 `.delay` 修饰符：\n\n```\nHStack {\nText(\"\
  easeIn\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.easeIn.delay(0.5), value:\
  \ start)\nText(\"easeOut\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.easeOut.delay(1.0),\
  \ value: start)\nText(\"easeInOut\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.easeInOut.delay(1.5),\
  \ value: start)\nText(\"linear\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.linear.delay(2.5),\
  \ value: start)\n}.position(x: 150, y: 10)\n```\n\n整个 `ContentView` 文件应如下所示：\n\n\
  1.  点击画布面板上的“实时预览”图标。\n2.  点击按钮。请注意，如果每个 `Text` 视图都有不同的 `.delay` 值，现在它们会在不同的时间开始动画。\n\
  \n```\nimport SwiftUI\nstruct ContentView: View {\n@State private var start = false\n\
  var body: some View {\nVStack {\nButton(\"Start animation\") {\nstart.toggle()\n\
  }\nHStack {\nText(\"easeIn\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.easeIn.delay(0.5),\
  \ value: start)\nText(\"easeOut\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.easeOut.delay(1.0),\
  \ value: start)\nText(\"easeInOut\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.easeInOut.delay(1.5),\
  \ value: start)\nText(\"linear\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.linear.delay(2.5),\
  \ value: start)\n}.position(x: 150, y: 10)\n}\n}\n}\nstruct ContentView_Previews:\
  \ PreviewProvider {\nstatic var previews: some View {\nContentView()\n}\n}\n```\n\
  \n若要定义持续时间，请在你希望的 `.animation` 选项中添加持续时间，例如：\n\n```\n.animation(.easeIn(duration(0.7)),\
  \ value: BooleanStateVariable)\n```\n\n> **注意：** 你可以像这样将持续时间与延迟结合使用：`.animation(.linear(duration:\
  \ 3.1).delay(1.2)), value: BooleanStateVariable)`\n\n延迟暂时阻止动画开始，而持续时间则定义了动画实际运行的时间。要了解持续时间的工作原理，请按照以下步骤操作：\n\
  \n1.  加载之前的 \"CompareAnimation\" Xcode 项目。\n2.  像这样为每个 `.animation` 选项添加一个持续时间：\n\
  \n```\nHStack {\nText(\"easeIn\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.easeIn(duration(0.7)),\
  \ value: start)\nText(\"easeOut\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.easeOut(duration(1.7)),\
  \ value: start)\nText(\"easeInOut\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.easeInOut(duration(2.6)),\
  \ value: start)\nText(\"linear\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.linear(duration(3.1)),\
  \ value: start)\n}.position(x: 150, y: 10)\n```\n\n整个 `ContentView` 文件应如下所示：\n\n\
  1.  点击画布面板上的“实时预览”图标。\n2.  点击按钮。请注意不同的持续时间值如何修改各个动画。\n\n```\nimport SwiftUI\nstruct\
  \ ContentView: View {\n@State private var start = false\nvar body: some View {\n\
  VStack {\nButton(\"Start animation\") {\nstart.toggle()\n}\nHStack {\nText(\"easeIn\"\
  )\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.easeIn(duration: 0.7), value:\
  \ start)\nText(\"easeOut\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.easeOut(duration:\
  \ 1.7), value: start)\nText(\"easeInOut\")\n.offset(x: 0, y: start ? 450 : 0)\n\
  .animation(.easeInOut(duration: 2.6), value: start)\nText(\"linear\")\n.offset(x:\
  \ 0, y: start ? 450 : 0)\n.animation(.linear(duration: 3.1), value: start)\n}.position(x:\
  \ 150, y: 10)\n}\n}\n}\nstruct ContentView_Previews: PreviewProvider {\nstatic var\
  \ previews: some View {\nContentView()\n}\n}\n```\n\n### 在动画中使用插值弹簧\n\n为了提供更多自定义动画工作方式的方法，你还可以为动画定义一个\
  \ `.interpolatingSpring` 修饰符。`.interpolatingSpring` 允许你定义一个或多个以下属性：\n\n-   **质量（Mass）**\
  \ – 低值动画较慢，减震较小；高值动画较快，减震较大。\n-   **刚度（Stiffness）** – 低值动画较慢；高值动画较快。\n-   **阻尼（Damping）**\
  \ – 低值会产生更多“弹跳”；高值则会抑制“弹跳”。\n-   **初始速度（InitialVelocity）** – 低值开始时动画缓慢；高值开始时动画较快。\n\
  \n要了解刚度和阻尼的工作原理，请按照以下步骤操作：\n\n1.  加载之前的 \"CompareAnimation\" Xcode 项目。\n2.  将所有\
  \ `Text` 视图改为显示相同的字符串，例如 \"spring\"。\n3.  像这样为每个 `Text` 视图添加一个 `.interpolatingSpring`\
  \ 修饰符：\n\n```\nHStack {\nText(\"spring\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.interpolatingSpring(stiffness:\
  \ 1, damping: 1), value: start)\nText(\"spring\")\n.offset(x: 0, y: start ? 450\
  \ : 0)\n.animation(.interpolatingSpring(stiffness: 1.8, damping: 1), value: start)\n\
  Text(\"spring\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.interpolatingSpring(stiffness:\
  \ 0.5, damping: 1), value: start)\nText(\"spring\")\n.offset(x: 0, y: start ? 450\
  \ : 0)\n.animation(.interpolatingSpring(stiffness: 2, damping: 1), value: start)\n\
  }.position(x: 150, y: 10)\n```\n\n确保每个 `.animation` 修饰符的阻尼参数相同，并确保每个 `.animation`\
  \ 修饰符的刚度参数不同。整个 `ContentView` 文件应如下所示：\n\n1.  点击画布面板上的“实时预览”图标。\n2.  点击按钮。请注意不同的刚度值如何改变每个\
  \ `Text` 视图的动画方式。\n3.  编辑 `.animation` 修饰符，使刚度值相同但阻尼值不同。\n4.  点击按钮。请注意不同的阻尼值如何改变每个\
  \ `Text` 视图在停止前上下弹跳的方式。\n\n```\nimport SwiftUI\nstruct ContentView: View {\n@State\
  \ private var start = false\nvar body: some View {\nVStack {\nButton(\"Start animation\"\
  ) {\nstart.toggle()\n}\nHStack {\nText(\"spring\")\n.offset(x: 0, y: start ? 450\
  \ : 0)\n.animation(.interpolatingSpring(stiffness: 1, damping: 1), value: start)\n\
  Text(\"spring\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.interpolatingSpring(stiffness:\
  \ 1.8, damping: 1), value: start)\nText(\"spring\")\n.offset(x: 0, y: start ? 450\
  \ : 0)\n.animation(.interpolatingSpring(stiffness: 0.5, damping: 1), value: start)\n\
  Text(\"spring\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.interpolatingSpring(stiffness:\
  \ 2, damping: 1), value: start)\n}.position(x: 150, y: 10)\n}\n}\n}\nstruct ContentView_Previews:\
  \ PreviewProvider {\nstatic var previews: some View {\nContentView()\n}\n}\n```\n\
  \n除了刚度和阻尼，你还可以定义质量和初始速度。通过尝试四个参数的不同值，你可以进一步自定义动画。\n\n要了解质量和初始速度如何影响动画，请按照以下步骤操作：\n\
  \n1.  加载之前的 \"CompareAnimation\" Xcode 项目。\n2.  像这样为每个 `Text` 视图添加一个 `.interpolatingSpring`\
  \ 修饰符：\n\n```\nHStack {\nText(\"spring\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.interpolatingSpring(mass:\
  \ 1, stiffness: 1, damping: 1, initialVelocity: 1), value: start)\nText(\"spring\"\
  )\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.interpolatingSpring(mass: 1.9,\
  \ stiffness: 1, damping: 1, initialVelocity: 1), value: start)\nText(\"spring\"\
  )\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.interpolatingSpring(mass: 2.5,\
  \ stiffness: 1, damping: 1, initialVelocity: 1), value: start)\nText(\"spring\"\
  )\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.interpolatingSpring(mass: 3.5,\
  \ stiffness: 1, damping: 1, initialVelocity: 1), value: start)\n}.position(x: 150,\
  \ y: 10)\n```\n\n\n\n确保每个`.animation`修饰器的`initialVelocity`相同，但每个`.animation`修饰器的`mass`值不同。完整的`ContentView`文件应如下所示：\n\
  \n1.  单击 Canvas 面板上的“Live Preview”图标。\n2.  单击 Button。观察相比于较低的`mass`值，较高的`mass`值如何影响动画。\n\
  3.  编辑`.animation`修饰器，使`mass`值相同，但`initialVelocity`值不同。\n4.  单击 Button。观察不同的`initialVelocity`值如何改变每个`Text`视图开始动画的方式。\n\
  \n```swift\nimport SwiftUI\nstruct ContentView: View {\n@State private var start\
  \ = false\nvar body: some View {\nVStack {\nButton(\"Start animation\") {\nstart.toggle()\n\
  }\nHStack {\nText(\"spring\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.interpolatingSpring(mass:\
  \ 1, stiffness: 1, damping: 1, initialVelocity: 1), value: start)\nText(\"spring\"\
  )\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.interpolatingSpring(mass: 1.9,\
  \ stiffness: 1, damping: 1, initialVelocity: 1), value: start)\nText(\"spring\"\
  )\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.interpolatingSpring(mass: 2.5,\
  \ stiffness: 1, damping: 1, initialVelocity: 1), value: start)\nText(\"spring\"\
  )\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.interpolatingSpring(mass: 3.5,\
  \ stiffness: 1, damping: 1, initialVelocity: 1), value: start)\n}.position(x: 150,\
  \ y: 10)\n}\n}\n}\nstruct ContentView_Previews: PreviewProvider {\nstatic var previews:\
  \ some View {\nContentView()\n}\n}\n```\n\n通过修改`mass`、`stiffness`、`damping`和`initialVelocity`的值，您可以为用户界面找到完美的动画效果。\n\
  \n## 使用`withAnimation`\n\n通过使用`.animation`修饰器，您可以定义要动画化的视图。`.animation`修饰器的一个问题是，如果您有五个视图要以相同方式动画化，您必须为所有五个视图添加相同的`.animation`修饰器，如下所示：\n\
  \n```swift\nHStack {\nText(\"One\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.default,\
  \ value: start)\nText(\"Two\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.default,\
  \ value: start)\nText(\"Three\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.default,\
  \ value: start)\nText(\"Four\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.default,\
  \ value: start)\nText(\"Five\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.default,\
  \ value: start)\n}\n```\n\n为了解决这个问题，SwiftUI 提供了第二种动画化视图的方法。`withAnimation`允许您指定可以动画化视图的`State`变量。您无需在多个视图上编写多个`.animation`修饰器，只需定义要影响的`State`变量，当该`State`变量发生更改时，它会自动动画化使用该`State`变量的任何视图，如下所示：\n\
  \n```swift\nwithAnimation {\nstart.toggle()\n}\n```\n\n要了解`withAnimation`如何工作，请按照以下步骤操作：\n\
  \n1.  创建一个新的 SwiftUI iOS App 项目，并为您喜欢的任何名称，例如“WithAnimation”。\n2.  在 Navigator 窗格中单击`ContentView`文件。\n\
  3.  在`struct ContentView: View`行下添加一个`State`变量，如下所示：\n\n```swift\nstruct ContentView:\
  \ View {\n@State private var start = false\n```\n\n1.  在`var body: some View`行下添加一个`VStack`和一个`Button`，如下所示：\n\
  \n```swift\nvar body: some View {\nVStack {\nButton(\"Start animation\") {\nstart.toggle()\n\
  }\n```\n\n1.  在`Button`下方添加一个包含五个`Text`视图的`HStack`，如下所示：\n\n```swift\nHStack {\n\
  Text(\"One\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.default, value: start)\n\
  Text(\"Two\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.default, value: start)\n\
  Text(\"Three\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.default, value:\
  \ start)\nText(\"Four\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.default,\
  \ value: start)\nText(\"Five\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.default,\
  \ value: start)\n}.position(x: 150, y: 10)\n```\n\n请注意，每个`Text`视图都具有相同的`.animation`修饰器。完整的`ContentView`文件应如下所示：\n\
  \n```swift\nimport SwiftUI\nstruct ContentView: View {\n@State private var start\
  \ = false\nvar body: some View {\nVStack {\nButton(\"Start animation\") {\nstart.toggle()\n\
  }\nHStack {\nText(\"One\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.default,\
  \ value: start)\nText(\"Two\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.default,\
  \ value: start)\nText(\"Three\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.default,\
  \ value: start)\nText(\"Four\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.default,\
  \ value: start)\nText(\"Five\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.default,\
  \ value: start)\n}.position(x: 150, y: 10)\n}\n}\n}\nstruct ContentView_Previews:\
  \ PreviewProvider {\nstatic var previews: some View {\nContentView()\n}\n}\n```\n\
  \n1.  单击 Canvas 面板上的“Live Preview”图标。\n2.  单击 Button 使所有五个`Text`视图以相同方式动画化。\n3.\
  \  注释掉（或删除）每个`Text`视图上的所有`.animation`修饰器。\n4.  编辑`ContentView`文件中的`Button`代码，以包含`withAnimation`块，如下所示：\n\
  \n```swift\nButton(\"Start animation\") {\nwithAnimation {\nstart.toggle()\n}\n\
  }\n```\n\n完整的`ContentView`文件应如下所示：\n\n```swift\nimport SwiftUI\nstruct ContentView:\
  \ View {\n@State private var start = false\nvar body: some View {\nVStack {\nButton(\"\
  Start animation\") {\nwithAnimation {\nstart.toggle()\n}\n}\nHStack {\nText(\"One\"\
  )\n.offset(x: 0, y: start ? 450 : 0)\n//                    .animation(.default,\
  \ value: start)\nText(\"Two\")\n.offset(x: 0, y: start ? 450 : 0)\n//          \
  \          .animation(.default, value: start)\nText(\"Three\")\n.offset(x: 0, y:\
  \ start ? 450 : 0)\n//                    .animation(.default, value: start)\nText(\"\
  Four\")\n.offset(x: 0, y: start ? 450 : 0)\n//                    .animation(.default,\
  \ value: start)\nText(\"Five\")\n.offset(x: 0, y: start ? 450 : 0)\n//         \
  \           .animation(.default, value: start)\n}.position(x: 150, y: 10)\n}\n}\n\
  }\nstruct ContentView_Previews: PreviewProvider {\nstatic var previews: some View\
  \ {\nContentView()\n}\n}\n```\n\n1.  单击 Button，注意所有五个`Text`视图的动画化效果与之前每个`Text`视图都有自己的`.animation`修饰器时完全相同。\n\
  \n如果您想添加延迟和持续时间，可以使用如下代码：\n\n```swift\nwithAnimation(.easeOut(duration: 2.1).delay(1.2))\
  \ {\n}\n```\n\n您还可以使用`.interpolatingSpring`来定义`stiffness`和`damping`，如下所示：\n\n```swift\n\
  withAnimation(.interpolatingSpring(stiffness: 2.4, damping: 1.6)) {\n}\n```\n\n\
  要包含`mass`和`initialVelocity`参数，您可以使用如下代码：\n\n```swift\nwithAnimation(.interpolatingSpring(mass:\
  \ 25, stiffness: 1.5, damping: 2.3, initialVelocity: 1.7)) {\n}\n```\n\n您用`.animation`修饰器能做的任何事情，也都可以用`withAnimation`块来完成。您可以在同一代码中使用一种方法代替另一种方法，或者同时使用两种方法。\n\
  \n## 总结\n\n动画通过向用户提供视觉反馈或提供吸引用户的趣味视觉图像，可以使您的用户界面生动起来。作为一般规则，请谨慎使用动画，因为同时发生过多的视觉变化可能会造成混淆和干扰。最佳的动画能够突出一个动作，但不会在过程中使用户不知所措。\n\
  \n动画涉及定义开始和结束状态，无论您是在移动、调整大小还是旋转视图。然后，您需要某种触发器来定义新状态。最后，您需要用到`.animation`修饰器。如果您要使用完全相同的`.animation`修饰器来动画化多个视图，则可以通过使用`withAnimation`来减少代码重复。\n\
  \n要自定义动画，您可以定义`delay`和`duration`值，以减缓动画开始前的时间以及完成动画所需的时间。要实现更大的自定义，请使用`.interpolatingSpring`修饰器，并定义`mass`、`stiffness`、`damping`和`initialVelocity`。通过使用动画，您可以使您的用户界面更富趣味性和吸引力。\n\
  \n\n\n"
- '# 20. 使用 `GeometryReader`


  iOS 设备的用户界面必须适配不同的屏幕尺寸。不仅 iPhone 和 iPad 的屏幕尺寸不同，而且市面上不同型号的 iPhone 和 iPad 也有不同的屏幕尺寸。为了解决这个问题，SwiftUI
  会将用户界面元素居中放置，但如果需要将用户界面元素精确地放置在特定位置呢？


  具体的 X 和 Y 坐标是行不通的，因为在大屏幕上看起来效果好的坐标，在小屏幕上可能就不合适，反之亦然。当需要将用户界面元素放置在屏幕上的特定位置时，更安全的做法是使用
  `GeometryReader`。


  `GeometryReader` 就像一个容器，能够自动适配不同的屏幕尺寸。添加 `GeometryReader` 后，你可以使用它的相对坐标来放置用户界面元素，而不是不同屏幕尺寸的精确坐标。这样，当应用在不同尺寸的屏幕上运行时，`GeometryReader`
  也会相应地调整其相对坐标。


  ## 理解 `GeometryReader`


  `GeometryReader` 可以像堆栈一样容纳多个视图。关键区别在于 `GeometryReader` 会尽可能多地扩展空间。此外，`GeometryReader`
  可以获取自身的宽度和高度。定义 `GeometryReader` 的代码如下所示：


  ```

  GeometryReader { geometry in

  // 在此处定义视图

  }

  ```


  在上面的示例中，`GeometryReader` 使用了一个任意命名的变量，例如 "geometry"，当然这个变量可以任意命名。然后，要获取 `GeometryReader`
  的宽度和高度，可以像这样获取 `size.width` 和 `size.height` 属性：


  ```

  geometry.size.width

  geometry.size.height

  ```


  要了解 `GeometryReader` 是如何工作的，请按照以下步骤操作：


  1.  创建一个新的 SwiftUI iOS App 项目，并随意给它命名，例如 "BasicGeometryReader"。

  2.  在导航器窗格中单击 `ContentView` 文件。

  3.  在 `var body: some View` 内部添加一个 `GeometryReader`，如下所示：


  ```

  var body: some View {

  GeometryReader { geometry in

  }.background(Color.yellow)

  }

  ```


  `.background` 修饰符为 `GeometryReader` 着色，便于看清其边界。


  4.  在 `GeometryReader` 内部添加一个 `VStack`。

  5.  在 `VStack` 内部添加两个 `Text` 视图，如下所示：


  ```

  var body: some View {

  GeometryReader { geometry in

  VStack {

  Text("Width = \(geometry.size.width)")

  Text("Height = \(geometry.size.height)")

  }

  }.background(Color.yellow)

  }

  ```


  整个 `ContentView` 文件应该如下所示：


  ```

  import SwiftUI

  struct ContentView: View {

  var body: some View {

  GeometryReader { geometry in

  VStack {

  Text("Width = \(geometry.size.width)")

  Text("Height = \(geometry.size.height)")

  }

  }.background(Color.yellow)

  }

  }

  struct ContentView_Previews: PreviewProvider {

  static var previews: some View {

  ContentView()

  }

  }

  ```


  请注意，`geometry.size.width` 和 `geometry.size.height` 属性定义了当前 iOS 设备（例如图 20-1 中显示的
  iPod Touch）内 `GeometryReader` 的高度和宽度。


  ![../images/329781_6_En_20_Chapter/329781_6_En_20_Fig1_HTML.jpg](img/329781_6_En_20_Fig1_HTML.jpg)


  图 20-1 `GeometryReader` 在 iPod Touch 中定义其宽度和高度


  ![../images/329781_6_En_20_Chapter/329781_6_En_20_Fig2_HTML.jpg](img/329781_6_En_20_Fig2_HTML.jpg)


  图 20-2 检查器窗格中的设备弹出菜单


  6.  在 `struct ContentView_Previews: PreviewProvider` 内部单击 `ContentView()`。Xcode
  窗口右侧将显示检查器窗格。

  7.  单击设备弹出菜单，选择不同的屏幕尺寸，例如较大或较小的 iPhone 或 iPad，如图 20-2 所示。


  ![../images/329781_6_En_20_Chapter/329781_6_En_20_Fig3_HTML.jpg](img/329781_6_En_20_Fig3_HTML.jpg)


  图 20-3 在不同尺寸的 iOS 屏幕上显示 `GeometryReader` 的宽度和高度


  8.  选择不同尺寸的 iPhone 或 iPad。注意，`GeometryReader` 会扩展或收缩以适应新的 iOS 屏幕尺寸的边界，并显示不同的宽度和高度，如图
  20-3 所示。


  尝试使用不同的 iOS 设备，例如小屏幕的 iPhone 5s 或大屏幕的 iPad Pro。无论你选择哪种尺寸的 iOS 设备屏幕，`GeometryReader`
  都可以扩展或收缩，并返回其宽度和高度。




  ## 理解全局坐标与局部坐标的区别


  了解 `GeometryReader` 如何根据不同的 iOS 屏幕尺寸缩放以适配宽度和高度后，下一步就是理解它的坐标系统。`GeometryReader` 内的坐标被称为局部坐标。


  而全局坐标则是指整个 iOS 屏幕。不同 iOS 设备屏幕的全局坐标始终不同，但 `GeometryReader` 内的局部坐标始终保持一致。


  要观察局部坐标与全局坐标的区别，请按以下步骤操作：


  1.  创建一个新的 SwiftUI iOS App 项目，并为其命名，例如 “GeometryReaderCoordinates”。

  2.  单击导航面板中的 `ContentView` 文件。

  3.  在 `var body: some View` 内添加一个 `GeometryReader`，代码如下：


  ```

  var body: some View {

  GeometryReader { geometry in

  }.background(Color.yellow)

  .ignoresSafeArea()

  }

  ```


  如果你注意图 20-1 和图 20-3，会看到 iOS 屏幕顶部有一条水平白色条带。由于许多 iPhone 型号在屏幕顶部有刘海，这条白色条带会将所有内容下推，以确保刘海不会遮挡用户界面的任何部分。


  这里的 `.ignoresSafeArea()` 修饰符就是告诉 `GeometryReader` 忽略这条水平条带，并一直扩展到屏幕顶部。


  4.  在 `GeometryReader` 内部添加一个 `VStack`，并添加四个 `Text` 视图和一个 `Divider`，代码如下：


  ```

  GeometryReader { geometry in

  VStack {

  Text("Local X origin = \(geometry.frame(in: .local).origin.x)")

  Text("Local Y origin = \(geometry.frame(in: .local).origin.y)")

  Divider()

  Text("Global X origin = \(geometry.frame(in: .global).origin.x)")

  Text("Global Y origin = \(geometry.frame(in: .global).origin.y)")

  }

  }.background(Color.yellow)

  .ignoresSafeArea()

  ```


  首先要注意，`Divider()` 在 `VStack` 中绘制一条水平线（在 `HStack` 中则绘制垂直线）。其次，`frame` 方法返回坐标值。当使用
  `.local` 坐标时，`GeometryReader` 的 x 和 y 原点始终为 (0,0)。当使用 `.global` 坐标时，`GeometryReader`
  的 x 和 y 原点基于其距离 iOS 屏幕左上角的距离。


  整个 `ContentView` 文件应如下所示：


  ```

  import SwiftUI

  struct ContentView: View {

  var body: some View {

  GeometryReader { geometry in

  VStack {

  Text("Local X origin = \(geometry.frame(in: .local).origin.x)")

  Text("Local Y origin = \(geometry.frame(in: .local).origin.y)")

  Divider()

  Text("Global X origin = \(geometry.frame(in: .global).origin.x)")

  Text("Global Y origin = \(geometry.frame(in: .global).origin.y)")

  }

  }.background(Color.yellow)

  .ignoresSafeArea()

  }

  }

  struct ContentView_Previews: PreviewProvider {

  static var previews: some View {

  ContentView()

  }

  }

  ```


  请注意，因为 `GeometryReader` 扩展到 iOS 屏幕的最顶部，所以 `GeometryReader` 的左上角与 iOS 屏幕的左上角重合。因此，局部原点和全局原点都是
  (0,0)，如图 20-4 所示。


  ![../images/329781_6_En_20_Chapter/329781_6_En_20_Fig4_HTML.jpg](img/329781_6_En_20_Fig4_HTML.jpg)


  图 20-4


  当 GeometryReader 扩展到屏幕顶部时，局部原点与全局原点相同


  5.  按如下方式编辑 `var body: some View` 中的代码：


  ```

  var body: some View {

  VStack {

  Text("This Text view pushes the GeometryReader down")

  HStack {

  Text("Pushes to the right")

  GeometryReader { geometry in

  VStack {

  Text("Local X origin = \(geometry.frame(in: .local).origin.x)")

  Text("Local Y origin = \(geometry.frame(in: .local).origin.y)")

  Divider()

  Text("Global X origin = \(geometry.frame(in: .global).origin.x)")

  Text("Global Y origin = \(geometry.frame(in: .global).origin.y)")

  }

  }.background(Color.yellow)

  .ignoresSafeArea()

  }

  }

  }

  ```


  上述代码使用 `VStack` 将 `GeometryReader` 下推，然后使用 `HStack` 将其右移。注意，`GeometryReader` 的局部原点仍然是
  (0,0)，但全局原点发生了变化，该值是从 iOS 屏幕左上角开始测量的，如图 20-5 所示。


  ![../images/329781_6_En_20_Chapter/329781_6_En_20_Fig5_HTML.jpg](img/329781_6_En_20_Fig5_HTML.jpg)


  图 20-5


  定义 GeometryReader 的全局原点


  ## 识别 GeometryReader 的最小值、中值和最大值


  全局坐标取决于当前 iOS 屏幕的尺寸。较小 iOS 屏幕上的最大 X 和 Y 坐标，会与较大屏幕上的最大 X 和 Y 坐标不同。因此，使用全局坐标定位视图可能会导致视图完全移出屏幕或被部分裁切。


  相比之下，在 `GeometryReader` 内部使用局部坐标则始终能自动适配不同屏幕尺寸。由于 `GeometryReader` 的宽度或高度会随 iOS
  屏幕尺寸变化，因此务必使用最小值和最大值，而不是固定值。


  `GeometryReader` 允许你访问以下定义的属性，如图 20-6 所示：


  ![../images/329781_6_En_20_Chapter/329781_6_En_20_Fig6_HTML.jpg](img/329781_6_En_20_Fig6_HTML.jpg)


  图 20-6


  GeometryReader 的最小值、中值和最大值 X 与 Y 值


  - `minX`

  - `minY`

  - `midX`

  - `midY`

  - `maxX`

  - `maxY`


  要观察 `GeometryReader` 的最小值、中值和最大值 X 与 Y 值是如何工作的，请按以下步骤操作：


  1.  创建一个新的 SwiftUI iOS App 项目，并为其命名，例如 “GeometryReaderValues”。

  2.  单击导航面板中的 `ContentView` 文件。

  3.  在 `var body: some View` 内添加一个 `GeometryReader`，代码如下：


  ```

  var body: some View {

  GeometryReader { geometry in

  }.background(Color.yellow)

  }

  ```


  4.  在 `GeometryReader` 内部添加一个 `VStack`，并添加六个 `Text` 视图和一个 `Divider`，代码如下：


  ```

  var body: some View {

  GeometryReader { geometry in

  VStack {

  Text("minX = \(geometry.frame(in: .local).minX)")

  Text("midX = \(geometry.frame(in: .local).midX)")

  Text("maxX = \(geometry.frame(in: .local).maxX)")

  Divider()

  Text("minY = \(geometry.frame(in: .local).minY)")

  Text("midY = \(geometry.frame(in: .local).midY)")

  Text("maxY = \(geometry.frame(in: .local).maxY)")

  }

  }.background(Color.yellow)

  }

  ```


  整个 `ContentView` 文件应如下所示：


  ```

  import SwiftUI

  struct ContentView: View {

  var body: some View {

  GeometryReader { geometry in

  VStack {

  Text("minX = \(geometry.frame(in: .local).minX)")

  Text("midX = \(geometry.frame(in: .local).midX)")

  Text("maxX = \(geometry.frame(in: .local).maxX)")

  Divider()

  Text("minY = \(geometry.frame(in: .local).minY)")

  Text("midY = \(geometry.frame(in: .local).midY)")

  Text("maxY = \(geometry.frame(in: .local).maxY)")

  }

  }.background(Color.yellow)

  }

  }

  struct ContentView_Previews: PreviewProvider {

  static var previews: some View {

  ContentView()

  }

  }

  ```


  请注意，`maxX` 和 `maxY` 属性只是另一种测量 `GeometryReader` 宽度和高度的方法。


  5.  单击结构体 `ContentView_Previews: PreviewProvider` 内的 `ContentView()`。检查器面板会出现在 Xcode
  窗口的右侧。

  6.  单击设备弹出菜单，选择不同尺寸的屏幕，例如较大或较小的 iPhone 或 iPad（见图 20-2）。

  7.  选择不同尺寸的 iPhone 或 iPad。注意，`GeometryReader` 会扩展或收缩以适应新 iOS 屏幕尺寸的边界，并显示不同的 `maxX`
  和 `maxY` 值。





  ## 总结


  `GeometryReader`是一个独特的容器，可以容纳多个视图。通过使用`GeometryReader`的本地坐标，你可以在用户界面上放置不同的视图，这些视图能够自动适应不同的
  iOS 屏幕尺寸。


  `GeometryReader`可以扩展以填充整个屏幕，也可以与堆栈内的其他视图共享屏幕。识别`GeometryReader`宽度和高度的两种方法是：获取`size.height`和`size.width`属性，以及获取`maxX`和`maxY`属性。


  通过使用`GeometryReader`内的本地坐标，你始终知道原点`(0,0)`出现在`GeometryReader`的左上角，无论`GeometryReader`出现在何处。通过使用全局坐标，你始终知道原点`(0,0)`出现在屏幕的左上角。


  `GeometryReader`只是使用特定的 X 和 Y 坐标在屏幕上定位不同视图的另一种方式。





