  \        .border(Color.blue, width: 6)\n}\n```\n\n这个`Label`视图定义了要显示的文本和图标，然后使用`.font`修饰符定义文本和图标的大小。它使用`.foregroundColor`修饰符将文本和图标显示为紫色，使用`.padding`修饰符在`Label`视图周围添加间距，并使用`.border`修饰符在`Label`视图周围显示宽度为\
