  \n前面的 Swift 代码检查`colorMe`变量的布尔值。如果为`true`，则使用绿色。否则，使用灰色。让我们看看如何将 State 变量、`.toggle()`命令和\
  \ if-else 三元运算符组合起来，使按钮响应用户操作：\n\n1. 创建一个新的 SwiftUI iOS App 项目，并为其指定任意名称，例如`Buttons`。\n\
