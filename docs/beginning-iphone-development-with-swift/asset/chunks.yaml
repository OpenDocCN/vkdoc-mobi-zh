- fmt: "# Summary\n\nEvery app needs a user interface. With SwiftUI, you simply define\
    \ the user interface items you want, and SwiftUI takes care of making sure your\
    \ user interface works and looks correctly on different size iOS screens.\n\n\
    You can design a user interface programmatically (by writing Swift code) or visually\
    \ (by dragging and dropping user interface items from the Library window). Programmers\
    \ often use both methods to design their user interface. Once you've added items\
    \ (buttons, labels, text fields, etc.) to a user interface, you can customize\
    \ those items either through code or through the Inspector pane.\n\nOnce you've\
    \ designed and customized the appearance of your user interface, you can test\
    \ it in two ways. First, you can run your app in the Simulator program, which\
    \ can mimic different iOS devices such as an iPhone or iPad.\n\nSecond, you can\
    \ use the Live Preview feature to interact with your user interface in the canvas\
    \ of Xcode. Live Preview is handy to quickly test your user interface (but Live\
    \ Preview only works with macOS 10.15 Catalina or higher).\n\nUser interfaces\
    \ represent what users see, so it's important that your user interface always\
    \ looks good no matter what type of iOS device the user runs it on. Now that you\
    \ understand the basics of how a user interface works, it's time to start learning\
    \ the details of specific user interface items such as buttons, pickers, and sliders.\n\
    \n# 3. Placing Views on the User Interface\n\nWhen you place a single view on\
    \ a user interface, SwiftUI centers it in the middle of the screen whether that\
    \ screen is a small iPhone screen or a much larger iPad screen. As you add more\
    \ views to your user interface, SwiftUI simply displays those views on top of\
    \ each other or side by side, depending on whether you arrange them in a vertical\
    \ or horizontal stack. However, the more views you add to a user interface, the\
    \ more crowded neighboring views can appear. To solve this problem, SwiftUI offers\
    \ several ways to place views on the user interface:\n\n- Use the padding modifier\n\
    - Define spacing within a stack\n- Use the Spacer\n- Define an offset or position\
    \ location\n\nYou can use one or more of these different methods to arrange views\
    \ on the user interface so they appear exactly where you want them. Best of all,\
    \ these positioning methods work on all user interface views in SwiftUI.\n\n##\
    \ Using the Padding Modifier\n\nThe padding modifier adds space around a user\
    \ interface view. By default, the padding modifier adds space around the top,\
    \ bottom, leading (left), and trailing (right) side of a view. To use the padding\
    \ modifier, just add the following after any view:\n\n```\n.padding()\n```\n\n\
    Padding serves two purposes. First, it adds space around a view, which changes\
    \ the background that you can color to make the view larger and easier to see.\
    \ Second, the padding modifier pushes neighboring views further away to make neighboring\
    \ views easier to see and eliminate crowding.\n\nThe simplest padding modifier\
    \ adds 16 points of spacing on all four sides of a view. If you add a number,\
    \ you can define the precise spacing you want such as `.padding(45)` or `.padding(3)`\
    \ as shown in Figure 3-1.\n\n![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig1_HTML.jpg](images/329781_6_En_3_Chapter/329781_6_En_3_Fig1_HTML.jpg)\n\
    \n*Figure 3-1*  \nDefining different spacing for the padding modifier\n\nNotice\
    \ that the padding modifier adds space around all sides. If you want, you can\
    \ define spacing to occur in one or more specific areas as shown in Figure 3-2:\n\
    \n![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig2_HTML.jpg](images/329781_6_En_3_Chapter/329781_6_En_3_Fig2_HTML.jpg)\n\
    \n*Figure 3-2*  \nDefining padding around certain areas\n\n- `.top`\n- `.bottom`\n\
    - `.vertical` (top and bottom)\n- `.leading` (left)\n- `.trailing` (right)\n-\
    \ `.horizontal` (trailing and leading)\n\nIf you don't add a specific value, SwiftUI\
    \ uses the default 16-point spacing. To define both an area to add padding and\
    \ a specific spacing, you must define the area to add padding first, followed\
    \ by a specific value such as:\n\n```\n.padding(.top, 30)\n```\n\nIf you want\
    \ to add spacing to two or three areas, you can define those areas in square brackets\
    \ followed by an optional spacing value like this:\n\n```\n.padding([.top, .leading])\n\
    .padding([.top, .leading] , 30)\n```\n\nThis lets you define two areas to add\
    \ spacing as shown in Figure 3-3.\n\n![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig3_HTML.jpg](images/329781_6_En_3_Chapter/329781_6_En_3_Fig3_HTML.jpg)\n\
    \n*Figure 3-3*  \nDefining padding around two areas\n\nYou can also add padding\
    \ around three areas with an optional spacing value as shown in Figure 3-4.\n\n\
    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig4_HTML.jpg](images/329781_6_En_3_Chapter/329781_6_En_3_Fig4_HTML.jpg)\n\
    \n*Figure 3-4*  \nDefining padding around three areas\n\n## Defining Spacing Within\
    \ a Stack\n\nThe `.padding()` modifier can be handy to space different views apart.\
    \ Without padding, multiple views can appear squashed and crowded together within\
    \ a stack. By adding padding to each view within a stack, you can separate them\
    \ so each view is easier to see as shown in Figure 3-5.\n\n![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig5_HTML.jpg](images/329781_6_En_3_Chapter/329781_6_En_3_Fig5_HTML.jpg)\n\
    \n*Figure 3-5*  \nPadding separates views within a stack\n\nWhile padding can\
    \ make each view easier to see, you may want more control over the spacing between\
    \ views within a stack. To do that, you can define a spacing value when you define\
    \ a stack such as:\n\n```\nVStack (spacing: 40) {\n}\n```\n\nWithin a stack, spacing\
    \ pushes views apart a fixed distance as shown in Figure 3-6.\n\n![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig6_HTML.jpg](images/329781_6_En_3_Chapter/329781_6_En_3_Fig6_HTML.jpg)\n\
    \n*Figure 3-6*  \nSpacing creates a fixed distance between all views in a stack"
  raw: '## Summary


    Every app needs a user interface. With SwiftUI, you simply define the user interface
    items you want, and SwiftUI takes care of making sure your user interface works
    and looks correctly on different size iOS screens.


    You can design a user interface programmatically (by writing Swift code) or visually
    (by dragging and dropping user interface items from the Library window). Programmers
    often use both methods to design their user interface. Once you’ve added items
    (buttons, labels, text fields, etc.) to a user interface, you can customize those
    items either through code or through the Inspector pane.


    Once you’ve designed and customized the appearance of your user interface, you
    can test it in two ways. First, you can run your app in the Simulator program,
    which can mimic different iOS devices such as an iPhone or iPad.


    Second, you can use the Live Preview feature to interact with your user interface
    in the canvas of Xcode. Live Preview is handy to quickly test your user interface
    (but Live Preview only works with macOS 10.15 Catalina or higher).


    User interfaces represent what users see, so it’s important that your user interface
    always looks good no matter what type of iOS device the user runs it on. Now that
    you understand the basics of how a user interface works, it’s time to start learning
    the details of specific user interface items such as buttons, pickers, and sliders.


    # 3. Placing Views on the User Interface


    When you place a single view on a user interface, SwiftUI centers it in the middle
    of the screen whether that screen is a small iPhone screen or a much larger iPad
    screen. As you add more views to your user interface, SwiftUI simply displays
    those views on top of each other or side by side, depending on whether you arrange
    them in a vertical or horizontal stack. However, the more views you add to a user
    interface, the more crowded neighboring views can appear. To solve this problem,
    SwiftUI offers several ways to place views on the user interface:


    *   Use the padding modifier


    *   Define spacing within a stack


    *   Use the Spacer


    *   Define an offset or position location


    You can use one or more of these different methods to arrange views on the user
    interface so they appear exactly where you want them. Best of all, these positioning
    methods work on all user interface views in SwiftUI.


    ## Using the Padding Modifier


    The padding modifier adds space around a user interface view. By default, the
    padding modifier adds space around the top, bottom, leading (left), and trailing
    (right) side of a view. To use the padding modifier, just add the following after
    any view:


    ```

    .padding()

    ```


    Padding serves two purposes. First, it adds space around a view, which changes
    the background that you can color to make the view larger and easier to see. Second,
    the padding modifier pushes neighboring views further away to make neighboring
    views easier to see and eliminate crowding.


    The simplest padding modifier adds 16 points of spacing on all four sides of a
    view. If you add a number, you can define the precise spacing you want such as
    .padding(45) or .padding(3) as shown in Figure [3-1](#329781_6_En_3_Chapter.xhtml#Fig1).


    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig1_HTML.jpg](images/329781_6_En_3_Chapter/329781_6_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Defining different spacing for the padding modifier


    Notice that the padding modifier adds space around all sides. If you want, you
    can define spacing to occur in one or more specific areas as shown in Figure [3-2](#329781_6_En_3_Chapter.xhtml#Fig2):


    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig2_HTML.jpg](images/329781_6_En_3_Chapter/329781_6_En_3_Fig2_HTML.jpg)


    Figure 3-2


    Defining padding around certain areas


    *   .top


    *   .bottom


    *   .vertical (top and bottom)


    *   .leading (left)


    *   .trailing (right)


    *   .horizontal (trailing and leading)


    If you don’t add a specific value, SwiftUI uses the default 16-point spacing.
    To define both an area to add padding and a specific spacing, you must define
    the area to add padding first, followed by a specific value such as


    ```

    .padding(.top, 30)

    ```


    If you want to add spacing to two or three areas, you can define those areas in
    square brackets followed by an optional spacing value like this:


    ```

    .padding([.top, .leading])

    .padding([.top, .leading] , 30)

    ```


    This lets you define two areas to add spacing as shown in Figure [3-3](#329781_6_En_3_Chapter.xhtml#Fig3).


    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig3_HTML.jpg](images/329781_6_En_3_Chapter/329781_6_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Defining padding around two areas


    You can also add padding around three areas with an optional spacing value as
    shown in Figure [3-4](#329781_6_En_3_Chapter.xhtml#Fig4).


    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig4_HTML.jpg](images/329781_6_En_3_Chapter/329781_6_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Defining padding around three areas


    ## Defining Spacing Within a Stack


    The .padding() modifier can be handy to space different views apart. Without padding,
    multiple views can appear squashed and crowded together within a stack. By adding
    padding to each view within a stack, you can separate them so each view is easier
    to see as shown in Figure [3-5](#329781_6_En_3_Chapter.xhtml#Fig5).


    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig5_HTML.jpg](images/329781_6_En_3_Chapter/329781_6_En_3_Fig5_HTML.jpg)


    Figure 3-5


    Padding separates views within a stack


    While padding can make each view easier to see, you may want more control over
    the spacing between views within a stack. To do that, you can define a spacing
    value when you define a stack such as


    ```

    VStack (spacing: 40) {

    }

    ```


    Within a stack, spacing pushes views apart a fixed distance as shown in Figure
    [3-6](#329781_6_En_3_Chapter.xhtml#Fig6).


    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig6_HTML.jpg](images/329781_6_En_3_Chapter/329781_6_En_3_Fig6_HTML.jpg)


    Figure 3-6


    Spacing creates a fixed distance between all views in a stack'
  trans: "\n# 摘要\n\n每个应用程序都需要用户界面。使用 SwiftUI，你只需定义所需的用户界面元素，SwiftUI 便会确保你的用户界面在不同尺寸的\
    \ iOS 屏幕上都能正常显示并呈现美观的视觉效果。\n\n你可以通过编程方式（编写 Swift 代码）或可视化方式（从“库”窗口拖放用户界面元素）来设计用户界面。程序员通常结合使用这两种方法来设计他们的用户界面。一旦你将元素（按钮、标签、文本字段等）添加到用户界面，就可以通过代码或检查器面板来自定义这些元素。\n\
    \n设计和自定义用户界面的外观后，你可以通过两种方式对其进行测试。首先，你可以在模拟器程序中运行应用，该程序可以模拟不同的 iOS 设备，如 iPhone\
    \ 或 iPad。\n\n其次，你可以使用实时预览功能，在 Xcode 的画布中与用户界面进行交互。实时预览对于快速测试用户界面非常便捷（但实时预览仅适用于\
    \ macOS 10.15 Catalina 或更高版本）。\n\n用户界面代表了用户看到的内容，因此无论用户在何种类型的 iOS 设备上运行应用，你的用户界面始终看起来美观至关重要。现在你已经了解了用户界面的基本工作原理，是时候开始学习特定用户界面元素（如按钮、选择器和滑块）的细节了。\n\
    \n# 3. 在用户界面上放置视图\n\n当你在用户界面上放置单个视图时，无论屏幕是小尺寸的 iPhone 还是大得多的 iPad，SwiftUI 都会将其居中显示在屏幕中间。当你在用户界面中添加更多视图时，SwiftUI\
    \ 会根据你将它们排列在垂直或水平堆栈中，简单地将这些视图相互叠放或并排显示。然而，添加到用户界面的视图越多，相邻视图可能显得越拥挤。为了解决这个问题，SwiftUI\
    \ 提供了几种在用户界面上放置视图的方法：\n\n- 使用填充修饰符\n- 在堆栈内定义间距\n- 使用 Spacer\n- 定义偏移或位置\n\n你可以使用这些不同方法中的一种或多种来在用户界面上排列视图，使它们正好出现在你想要的位置。最重要的是，这些定位方法适用于\
    \ SwiftUI 中的所有用户界面视图。\n\n## 使用填充修饰符\n\n填充修饰符会在用户界面视图周围添加空间。默认情况下，填充修饰符会在视图的顶部、底部、前导（左侧）和尾随（右侧）边缘添加空间。要使用填充修饰符，只需在任何视图后添加以下代码：\n\
    \n```\n.padding()\n```\n\n填充有两个目的。首先，它在视图周围添加空间，这会改变背景（你可以为其着色），从而使视图更大且更易于查看。其次，填充修饰符会将相邻视图推得更远，从而使相邻视图更易于查看并消除拥挤。\n\
    \n最简单的填充修饰符会在视图的所有四个边缘添加 16 点的间距。如果你添加一个数字，则可以定义所需的精确间距，例如 `.padding(45)` 或 `.padding(3)`，如图\
    \ 3-1 所示。\n\n![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig1_HTML.jpg](img/329781_6_En_3_Fig1_HTML.jpg)\n\
    \n*图 3-1*  \n为填充修饰符定义不同的间距\n\n请注意，填充修饰符会在所有边缘添加空间。如果你愿意，可以定义仅在一个或多个特定区域添加间距，如图\
    \ 3-2 所示：\n\n![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig2_HTML.jpg](img/329781_6_En_3_Fig2_HTML.jpg)\n\
    \n*图 3-2*  \n在特定区域定义填充\n\n- `.top`\n- `.bottom`\n- `.vertical`（顶部和底部）\n- `.leading`（左侧）\n\
    - `.trailing`（右侧）\n- `.horizontal`（尾随和前导）\n\n如果你不添加特定值，SwiftUI 将使用默认的 16 点间距。要同时定义添加填充的区域和特定间距，你必须先定义添加填充的区域，然后跟上特定值，例如：\n\
    \n```\n.padding(.top, 30)\n```\n\n如果你想添加间距到两个或三个区域，可以在方括号中定义这些区域，后跟可选的间距值，如下所示：\n\
    \n```\n.padding([.top, .leading])\n.padding([.top, .leading] , 30)\n```\n\n这允许你定义两个添加间距的区域，如图\
    \ 3-3 所示。\n\n![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig3_HTML.jpg](img/329781_6_En_3_Fig3_HTML.jpg)\n\
    \n*图 3-3*  \n在两个区域定义填充\n\n你也可以添加间距到三个区域，并附带可选的间距值，如图 3-4 所示。\n\n![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig4_HTML.jpg](img/329781_6_En_3_Fig4_HTML.jpg)\n\
    \n*图 3-4*  \n在三个区域定义填充\n\n## 在堆栈内定义间距\n\n`.padding()` 修饰符可以方便地分隔不同的视图。如果没有填充，多个视图在堆栈内可能会显得挤压和拥挤。通过为堆栈内的每个视图添加填充，你可以将它们分开，使每个视图更易于查看，如图\
    \ 3-5 所示。\n\n![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig5_HTML.jpg](img/329781_6_En_3_Fig5_HTML.jpg)\n\
    \n*图 3-5*  \n填充将堆栈内的视图分隔开\n\n虽然填充可以使每个视图更易于查看，但你可能希望对堆栈内视图之间的间距有更多控制。为此，你可以在定义堆栈时定义一个间距值，例如：\n\
    \n```\nVStack (spacing: 40) {\n}\n```\n\n在堆栈内，间距会将视图推开一个固定距离，如图 3-6 所示。\n\n![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig6_HTML.jpg](img/329781_6_En_3_Fig6_HTML.jpg)\n\
    \n*图 3-6*  \n间距在堆栈内的所有视图之间创建了一个固定距离\n"
- fmt: '# Aligning Views Within a Stack


    When you create a stack (`VStack` or `HStack`), you have the option of defining
    alignment whether you define spacing or not such as


    ```

    VStack (alignment: .leading)

    VStack (alignment: .leading, spacing: 24)

    ```


    Note


    If you define both alignment and spacing in a stack, you must define alignment
    first followed by spacing second.


    With `VStack`s, you have three ways to align views as shown in Figure [3-7](#329781_6_En_3_Chapter.xhtml#Fig7):


    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig7_HTML.jpg](images/329781_6_En_3_Chapter/329781_6_En_3_Fig7_HTML.jpg)


    Figure 3-7


    Three ways to align views in a `VStack`


    *   `.leading` (left)

    *   `.center` (default setting if no other alignment options are chosen)

    *   `.trailing` (right)


    The following Swift code defines `.leading` alignment for a `VStack`:


    ```

    VStack (alignment: .leading){

    Text ("Top")

    .background(Color.yellow)

    Text ("Middle Text View")

    .background(Color.yellow)

    Text ("Bottom")

    .background(Color.yellow)

    }

    ```


    With `HStack`s, you have five different ways to align views as shown in Figure
    [3-8](#329781_6_En_3_Chapter.xhtml#Fig8):


    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig8_HTML.jpg](images/329781_6_En_3_Chapter/329781_6_En_3_Fig8_HTML.jpg)


    Figure 3-8


    Three ways to align views in an `HStack`


    *   `.top`

    *   `.bottom`

    *   `.center` (default setting if no other alignment options are chosen)

    *   `.firstTextBaseline`

    *   `.lastTextBaseline`


    The following Swift code defines `.bottom` alignment for an `HStack`:


    ```

    HStack (alignment: .bottom){

    Text ("Top")

    .font(.system(size: 40))

    .background(Color.yellow)

    Text ("Middle Text View")

    .background(Color.yellow)

    Text ("Bottom")

    .font(.largeTitle)

    .background(Color.yellow)

    }

    ```


    The `.top`, `.bottom`, and `.center` alignment options work with all types of
    user interface views. However, if you’re specifically working with `Text` views,
    SwiftUI offers two additional ways to align `Text` views based on the baseline.
    You can align text based on the first view (`.firstTextBaseline`) or the last
    view (`.lastTextBaseline`) as shown in Figure [3-9](#329781_6_En_3_Chapter.xhtml#Fig9).


    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig9_HTML.jpg](images/329781_6_En_3_Chapter/329781_6_En_3_Fig9_HTML.jpg)


    Figure 3-9


    Aligning text in an `HStack`


    ## Using Spacers


    Using padding and spacing between views in a stack can be handy for arranging
    views on the user interface. For another way to position views on the user interface,
    you can also use spacers. A spacer acts like a spring that pushes two views as
    far apart as possible. A spacer appears in the Editor pane like this:


    ```

    Spacer()

    ```


    Because spacers automatically adapt to different screen sizes, spacers can align
    views to the edges of the screen no matter what that screen size might be as shown
    in Figure [3-10](#329781_6_En_3_Chapter.xhtml#Fig10).


    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig10_HTML.jpg](images/329781_6_En_3_Chapter/329781_6_En_3_Fig10_HTML.jpg)


    Figure 3-10


    Spacers push views as far apart as possible


    You can combine multiple spacers to push views further apart. For example, consider
    using a spacer before and after a view to separate them using this Swift code:


    ```

    struct ContentView: View {

    var body: some View {

    VStack {

    Text ("Top")

    .font(.system(size: 40))

    .background(Color.yellow)

    Spacer()

    Text ("Middle")

    .font(.system(size: 40))

    .background(Color.yellow)

    Spacer()

    Text ("Bottom")

    .font(.system(size: 40))

    .background(Color.yellow)

    }

    }

    }

    ```


    The preceding code defines a vertical stack that contains three `Text` views.
    A spacer in between each `Text` view pushes them equally apart as shown in Figure
    [3-11](#329781_6_En_3_Chapter.xhtml#Fig11).


    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig11_HTML.jpg](images/329781_6_En_3_Chapter/329781_6_En_3_Fig11_HTML.jpg)


    Figure 3-11


    Spacers separate three views equally apart


    If you combine spacers, multiple spacers push views further apart. If we add two
    spacers in between the Top and Middle views, those two spacers will push the Middle
    view further down as the following Swift code shows:


    ```

    struct ContentView: View {

    var body: some View {

    VStack {

    Text ("Top")

    .font(.system(size: 40))

    .background(Color.yellow)

    Spacer ()

    Spacer()

    Text ("Middle")

    .font(.system(size: 40))

    .background(Color.yellow)

    Spacer()

    Text ("Bottom")

    .font(.system(size: 40))

    .background(Color.yellow)

    }

    }

    }

    ```


    Because there are now two spacers in between the Top and Middle views, they push
    the Middle view further down the screen as shown in Figure [3-12](#329781_6_En_3_Chapter.xhtml#Fig12).


    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig12_HTML.jpg](images/329781_6_En_3_Chapter/329781_6_En_3_Fig12_HTML.jpg)


    Figure 3-12


    Two spacers push the Middle view further down


    By using multiple spacers, you can adjust views on the user interface relative
    to the screen size. When the app runs on a larger screen, the spacers push the
    views further to the boundaries of the screen. When the app runs on a smaller
    screen, the spacers push the views a shorter distance.


    Spacers automatically adjust their size based on screen size. However, you may
    want to define a minimum length for a spacer to keep it from shrinking too far.
    To define a minimum length, use the following code:


    ```

    Spacer(minLength: 25.73)

    ```


    Notice that you can define the minimum length as a decimal value (`CGFloat`) although
    you could use an integer value as well such as


    ```

    Spacer(minLength: 25)

    ```


    If you do not specify a minimum length, the spacer will simply grow or shrink
    based on the screen size that the app is running in.'
