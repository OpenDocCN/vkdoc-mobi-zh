- fmt: '### Moving Items in a List


    Another common way to use Lists is to rearrange or move items within a List. In
    iOS, this is usually a two-step process. First, you must edit the List to display
    three horizontal line icons to the right of each item in the List. Second, you
    slide a List item using those three horizontal line icons to place that item in
    a new location as shown in Figure [13-7](#329781_6_En_13_Chapter.xhtml#Fig7).


    ![../images/329781_6_En_13_Chapter/329781_6_En_13_Fig7_HTML.jpg](images/329781_6_En_13_Chapter/329781_6_En_13_Fig7_HTML.jpg)


    Figure 13-7


    Move icons appear to the right of items in a List


    The first step is to add the `.onMove` modifier to the `ForEach` loop within a
    List like this:


    ```

    ForEach(0...myArray.count - 1, id: \.self) { index in

    }.onMove(perform: move)

    ```


    This calls a `move` function that uses the array name that contains the items
    displayed in a List (called `myArray` in the following example) and calls the
    `move` method like this:


    ```

    func move(from source: IndexSet, to destination: Int) {

    myArray.move(fromOffsets: source, toOffset: destination)

    }

    ```


    To see how to create a swipe to move items in a List, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    `ListMove`.


    2.  Click the `ContentView` file in the Navigator pane.


    3.  Add a State variable array under the `struct ContentView` line like this:


    ```

    struct ContentView: View {

    @State var myArray = ["Cat", "Dog", "Turtle", "Ferret", "Parrot", "Goldfish",
    "Lizard", "Canary", "Tarantula", "Hamster"]

    ```


    The exact strings you type don’t matter just as long as you type several strings
    to fill the array.


    4.  Add a `NavigationView` under the `var body: some View` line like this:


    ```

    var body: some View {

    NavigationView {

    }

    ```


    The `NavigationView` is necessary to display an Edit button in the upper right
    corner of the screen.


    5.  Add a `List` inside the `NavigationView` like this:


    6.  Add a `ForEach` loop inside this `List` to count from 0 to the total number
    of items in the array – 1. Then display the array item in a `Text` view like this:


    ```

    var body: some View {

    NavigationView {

    List {

    }

    }

    }

    ```


    7.  Add the `.toolbar` modifier to the `List` like this:


    ```

    var body: some View {

    NavigationView {

    List {

    ForEach(0...myArray.count - 1, id: \.self) { index in

    Text(myArray[index])

    }

    }

    }

    }

    ```


    ```

    var body: some View {

    NavigationView {

    List {

    ForEach(0...myArray.count - 1, id: \.self) { index in

    Text(myArray[index])

    }

    }.toolbar {

    EditButton()

    }

    }

    }

    ```


    This `.toolbar { EditButton() }` code adds an Edit button in the upper right corner
    of the `NavigationView`.


    8.  Add the `.onMove` modifier to the `ForEach` loop to call a function called
    `move` like this:


    9.  Add the following function above the last curly bracket in the `struct ContentView:
    View` like this:


    ```

    var body: some View {

    NavigationView {

    List {

    ForEach(0...myArray.count - 1, id: \.self) { index in

    Text(myArray[index])

    }.onMove(perform: move)

    }.toolbar {

    EditButton()

    }

    }

    }

    ```


    ```

    func move(from source: IndexSet, to destination: Int) {

    myArray.move(fromOffsets: source, toOffset: destination)

    }

    ```


    The entire `ContentView` file should look like this:


    10.  Click the Live Preview icon on the Canvas pane.


    11.  Tap the Edit button in the upper right corner of the screen. The three horizontal
    line icons appear to the right of each item in the List (see Figure [13-7](#329781_6_En_13_Chapter.xhtml#Fig7)).
    Notice that when you tap the Edit button, it changes into a Done button.


    12.  Slide any of the horizontal line icons up or down to move an item to a new
    location in the List.


    13.  Tap the Done button in the upper right corner of the screen to hide the horizontal
    line icons to the right of each item in the List.


    ```

    import SwiftUI

    struct ContentView: View {

    @State var myArray = ["Cat", "Dog", "Turtle", "Ferret", "Parrot", "Goldfish",
    "Lizard", "Canary", "Tarantula", "Hamster"]

    var body: some View {

    NavigationView {

    List {

    ForEach(0...myArray.count - 1, id: \.self) { index in

    Text(myArray[index])

    }.onMove(perform: move)

    }.toolbar {

    EditButton()

    }

    }

    }

    func move(from source: IndexSet, to destination: Int) {

    myArray.move(fromOffsets: source, toOffset: destination)

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```'
