    ## Adding Swipe Gestures to a List


    Many common apps such as Mail, Messages, and Photos display items in a List. With
    these Lists, users can swipe left to right or right to left to display additional
    options to choose as shown in Figure [13-5](#329781_6_En_13_Chapter.xhtml#Fig5).


    ![../images/329781_6_En_13_Chapter/329781_6_En_13_Fig5_HTML.jpg](images/329781_6_En_13_Chapter/329781_6_En_13_Fig5_HTML.jpg)


    Figure 13-5


    Swiping on a List can reveal additional options


    Two common tasks for Lists involve deleting and moving items. Deleting items from
    a List involves removing the item, typically after the user swipes from right
    to left. Moving items in a list involves sliding a fingertip on an item to place
    it in a new location in the List.


    ### Deleting Items from a List


    The most common shortcut in iOS for deleting an item in a List involves a right
    to left swipe to reveal a Delete button. As an alternative, the user can continue
    the right to left swipe to delete an item without needing to tap the Delete button
    at all. Since this swipe to delete gesture is often used, SwiftUI makes it easy
    to implement.


    The first step is to add the .onDelete modifier to the ForEach loop within a List
    like this:


    ```

    List {

    ForEach(0...myArray.count - 1, id: \.self) { index in

    }.onDelete(perform: delete)

    }

    ```


    This calls a delete function that uses the array name that contains the items
    displayed in a List (called “myArray” in the following example) and calls the
    remove method like this:


    ```

    func delete(at offsets: IndexSet) {

    myArray.remove(atOffsets: offsets)

    }

    ```


    To see how to create a swipe to delete gesture in a List, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “ListDelete.”


    2.  Click the ContentView file in the Navigator pane.


