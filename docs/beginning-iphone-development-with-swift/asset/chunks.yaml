    About the Author About the Technical Reviewer


    # 1. Understanding iOS Programming


    All programming involves the same task of writing commands for a computer to follow.
    To learn iOS programming, you need to learn three different skills:


    *   How to write commands in the Swift programming language


    *   How to use Apple’s software frameworks


    *   How to create user interfaces in Xcode


    You need to write commands in the Swift programming language to make your app
    do something unique. Then you rely on Apple’s software frameworks to handle common
    tasks such as detecting touch gestures or accessing the camera. Finally, you use
    Xcode to design your app’s user interface.


    You want to rely on Apple’s software frameworks as much as possible because this
    lets you perform common tasks without writing (and testing) your own Swift code.
    By relying on Apple’s software frameworks, you can focus solely on the unique
    features of your app rather than the mundane details of making an app use different
    hardware features of an iPhone or iPad.


    Ideally, you want your user interface to look good by adapting to all different
    screen sizes such as an iPhone, iPad, or iPod Touch. The user interface lets you
    display information to the user and retrieve information from the user. The best
    user interface is one that doesn’t require even thinking about.


    Essentially, every iOS app consists of three parts as shown in Figure [1-1](#329781_6_En_1_Chapter.xhtml#Fig1):


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig1_HTML.jpg](images/329781_6_En_1_Chapter/329781_6_En_1_Fig1_HTML.jpg)


    Figure 1-1


    The three parts of an iOS app


    *   Your code to make an app do something useful


    *   A user interface that you can design visually in Xcode


    *   Access to hardware features of an iOS device through one or more of Apple’s
    iOS framework


    Apple provides dozens of frameworks for iOS (and their other operating systems
    as well such as macOS, watchOS, and tvOS). By simply using Apple’s frameworks,
    you can accomplish common tasks by writing little code of your own. Some of Apple’s
    available frameworks include


    *   SwiftUI – User interface and touch screen support


    *   ARKit – Augmented reality features


    *   Core Animation – Displays animation


    *   GameKit – Creates multiplayer interactive apps


    *   Contacts – Accesses the Contacts data on an iOS device


    *   SiriKit – Allows the use of voice commands through Siri


    *   AVKit – Allows playing of audio and video files


    *   MediaLibrary – Allows access to images, audio, and video stored on an iOS
    device


    *   CallKit – Provides voice calling features


    Apple’s frameworks essentially contain code that you can reuse. This makes apps
    more reliable and consistent while also saving developers time by using proven
    code that works correctly. To see a complete list of Apple’s available software
    frameworks, visit Apple’s Developer Documentation site ([`https://developer.apple.com/documentation`](https://developer.apple.com/documentation)).


    Apple’s frameworks can give you a huge head start in creating an iOS app, but
    you still need to provide a user interface so users can interact with your app.
    While you could create a user interface from scratch, this would also be tedious,
    time-consuming, and error-prone. Even worse, if every app developer created a
    user interface from scratch, no two iOS apps would look or work exactly the same,
    confusing users.


    That’s why Apple’s Xcode compiler helps you design user interfaces with standard
    features used in most apps such as views (windows on the screen), buttons, labels,
    text fields, and sliders. In Xcode, each window of a user interface is called
    a view. While simple iOS apps may consist of a single view (think of the calculator
    app on an iPhone), more sophisticated iOS apps consist of multiple views.


    To create user interfaces, Xcode offers two options:


    *   Storyboards


    *   SwiftUI


    Storyboards let you organize each screen (called views) and connect them together
    using segues. The biggest drawback with storyboards is that they tend to be clumsy
    to use when your app needs to display multiple screens. In addition, you need
    to write a large amount of Swift code to make various user interface objects work
    such as table views, text fields, and buttons. Finally, storyboards make it tedious
    and difficult to create user interfaces that can adapt to different size iOS device
    screens automatically.


    For these reasons, Apple now offers a second way to design user interfaces using
    a framework called SwiftUI. The main idea behind SwiftUI is that you write as
    little code as possible to make your user interface work. Instead, you choose
    what you want to appear on your user interface, then you define modifiers that
    change how that user interface looks on the screen.


    You can use storyboards and SwiftUI together in a single project, or you can use
    either storyboards or SwiftUI exclusively. Because SwiftUI represents the future
    for developing apps for all of Apple’s products, this book focuses exclusively
    on creating user interfaces using SwiftUI rather than storyboards.'
