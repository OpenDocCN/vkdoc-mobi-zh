  raw: '### Changing Data Between Structures in a Navigation View


    The previous project created two structures where one structure was stored in
    the ContentView file and a second structure was stored in a separate file. In
    both cases, the structures defined user interfaces that received data and displayed
    it.


    What if we pass data to a structure and then allow that structure to modify that
    data? This will require several changes:


    *   Create a State variable.


    *   Use the NavigationLink to open another structure and pass that structure a
    binding to the State variable (using the $ symbol) such as


    *   Define a @Binding variable in the structure that will receive data.


    *   Change that Binding variable in the structure that received data.


    ```

    FileView(choice: $message)

    ```


    To see how to change data between structures in a Navigation View, follow these
    steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “NavigationViewBindingData.”


    2.  Click the ContentView file in the Navigator pane.


    3.  Create a State variable under the struct ContentView: View line like this:


    1.  Add a NavigationView and a VStack inside the var body: some View line like
    this:


    ```

    struct ContentView: View {

    @State var message = ""

    ```


    1.  Add a Text view and two NavigationLinks inside the VStack like this:


    ```

    var body: some View {

    NavigationView {

    VStack {

    }

    }

    ```


    ```

    NavigationView {

    VStack (spacing: 26) {

    TextField("Type here", text: $message)

    NavigationLink(destination: FileView(choice: $message)) {

    Text("Send a message")

    }

    NavigationLink(destination: SeparateFileView(passedData: $message)) {

    Text("Separate file")

    }

    .navigationTitle("Passing Data")

    }

    }

    ```


    Notice that the first NavigationLink opens a structure called FileView and sends
    a binding variable ($message) to the “choice:” parameter. The second NavigationLink
    opens a structure called SeparateFileView and sends the same binding variable
    ($message) to the “passedData” parameter.


    1.  Add the following structure underneath the struct ContentView: View structure:


    ```

    struct FileView: View {

    @Binding var choice: String

    var body: some View {

    HStack {

    Spacer()

    VStack {

    Spacer()

    TextField("Type here:", text: $choice)

    Spacer()

    }

    Spacer()

    }.background(Color.yellow)

    }

    }

    ```


    Notice that this structure declares a @Binding variable called “choice” that can
    hold a String. This structure uses a TextField to change this @Binding variable
    ($choice), which sends the changes automatically back to the ContentView structure.


    1.  Choose File ➤ New ➤ File. A dialog appears (see Figure [16-4](#329781_6_En_16_Chapter.xhtml#Fig4)).


    2.  Click iOS near the top of the dialog, click Swift File, and then click Next.
    Xcode asks for a name to give your newly created file.


    3.  Type SeparateFile and click Create. Xcode creates a new Swift file.


    4.  Delete all code currently in the SeparateFile and replace it with the following:


    ```

    import SwiftUI

    struct SeparateFileView: View {

    @Binding var passedData: String

    var body: some View {

    HStack {

    Spacer()

    VStack {

    Spacer()

    TextField("Type here", text: $passedData)

    Spacer()

    }

    Spacer()

    }.background(Color.orange)

    }

    }

    struct SeparateFileView_Previews: PreviewProvider {

    static var previews: some View {

    SeparateFileView(passedData: .constant(""))

    }

    }

    ```


    Notice that this structure declares a @Binding variable called “passedData” that
    can hold a String. The TextField can change this variable ($passedData) and automatically
    send the changes back to the ContentView structure.


    Also note that because this structure is stored in a separate file, the PreviewProvider
    structure must also include the “passedData” parameter by giving it a .constant(“”).


    1.  Click the ContentView file in the Navigator pane.


    2.  Click the Live Preview icon on the Canvas pane.


    3.  Click in the TextField and type a phrase.


    4.  Click the “Send a message” navigation link that passes the string to the FileView
    structure stored in the ContentView file.


    5.  Click in the TextField displayed by the FileView structure and edit the data.
    Then click the Back button to return to the ContentView structure that displays
    the modified data.


    6.  Click the “Separate file” navigation link that passes the string to the SeparateFileView
    structure stored in a separate file.


    7.  Click in the TextField displayed by the SeparateFileView structure and edit
    the data. Then click the Back button to return to the ContentView structure that
    displays the modified data.'
  trans: '

    # 在导航视图中改变结构体间的数据


    上一个项目创建了两个结构体，其中一个存储在 `ContentView` 文件中，另一个存储在单独的文件中。在这两种情况下，结构体都定义了用于接收和显示数据的用户界面。


    如果我们将数据传递给一个结构体，然后允许该结构体修改这些数据，会发生什么？这需要做出几项修改：


    - 创建一个 `State` 变量。

    - 使用 `NavigationLink` 打开另一个结构体，并向该结构体传递一个与 `State` 变量绑定的（`$` 符号）引用，例如：

    - 在接收数据的结构体中定义一个 `@Binding` 变量。

    - 在接收数据的结构体中修改该 `Binding` 变量。


    ```

    FileView(choice: $message)

    ```


    要了解如何在导航视图中改变结构体间的数据，请按照以下步骤操作：


    1. 创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如 "NavigationViewBindingData"。


    2. 在导航器窗格中点击 `ContentView` 文件。


    3. 在 `struct ContentView: View` 行下方创建一个 `State` 变量，如下所示：


    ```

    struct ContentView: View {

    @State var message = ""

    ```


    4. 在 `var body: some View` 行内部添加一个 `NavigationView` 和一个 `VStack`，如下所示：


    ```

    var body: some View {

    NavigationView {

    VStack {

    }

    }

    ```


    5. 在 `VStack` 内部添加一个 `Text` 视图和两个 `NavigationLink`，如下所示：


    ```

    NavigationView {

    VStack (spacing: 26) {

    TextField("在此输入", text: $message)

    NavigationLink(destination: FileView(choice: $message)) {

    Text("发送消息")

    }

    NavigationLink(destination: SeparateFileView(passedData: $message)) {

    Text("单独文件")

    }

    .navigationTitle("传递数据")

    }

    }

    ```


    请注意，第一个 `NavigationLink` 打开了一个名为 `FileView` 的结构体，并将一个绑定变量（`$message`）发送给 `choice:`
    参数。第二个 `NavigationLink` 打开了一个名为 `SeparateFileView` 的结构体，并将同一个绑定变量（`$message`）发送给
    `passedData` 参数。


    6. 在 `struct ContentView: View` 结构体下方添加如下结构体：


    ```

    struct FileView: View {

    @Binding var choice: String

    var body: some View {

    HStack {

    Spacer()

    VStack {

    Spacer()

    TextField("在此输入:", text: $choice)

    Spacer()

    }

    Spacer()

    }.background(Color.yellow)

    }

    }

    ```


    请注意，此结构体声明了一个名为 `choice` 的 `@Binding` 变量，该变量可以保存一个 `String`。此结构体使用一个 `TextField`
    来更改此 `@Binding` 变量（`$choice`），更改会自动发送回 `ContentView` 结构体。


    7. 选择 `File ➤ New ➤ File`。将会出现一个对话框（见图 16-4）。


    8. 点击对话框顶部的 `iOS`，点击 `Swift File`，然后点击 `Next`。Xcode 会提示你为新创建的文件命名。


    9. 输入 `SeparateFile` 并点击 `Create`。Xcode 会创建一个新的 Swift 文件。


    10. 删除 `SeparateFile` 中当前的所有代码，并将其替换为以下内容：


    ```

    import SwiftUI

    struct SeparateFileView: View {

    @Binding var passedData: String

    var body: some View {

    HStack {

    Spacer()

    VStack {

    Spacer()

    TextField("在此输入", text: $passedData)

    Spacer()

    }

    Spacer()

    }.background(Color.orange)

    }

    }

    struct SeparateFileView_Previews: PreviewProvider {

    static var previews: some View {

    SeparateFileView(passedData: .constant(""))

    }

    }

    ```


    请注意，此结构体声明了一个名为 `passedData` 的 `@Binding` 变量，该变量可以保存一个 `String`。`TextField` 可以更改此变量（`$passedData`）并自动将更改发送回
    `ContentView` 结构体。


    另请注意，由于此结构体存储在单独的文件中，因此 `PreviewProvider` 结构体也必须包含 `passedData` 参数，方法是为其提供一个 `.constant("")`
    值。


    11. 在导航器窗格中点击 `ContentView` 文件。


    12. 点击画布窗格上的实时预览图标。


    13. 点击 `TextField` 并输入一个短语。


    14. 点击 "发送消息" 导航链接，该链接将字符串传递给存储在 `ContentView` 文件中的 `FileView` 结构体。


    15. 点击 `FileView` 结构体显示的 `TextField` 并编辑数据。然后点击返回按钮返回到显示修改后数据的 `ContentView` 结构体。


    16. 点击 "单独文件" 导航链接，该链接将字符串传递给存储在单独文件中的 `SeparateFileView` 结构体。


    17. 点击 `SeparateFileView` 结构体显示的 `TextField` 并编辑数据。然后点击返回按钮返回到显示修改后数据的 `ContentView`
    结构体。

