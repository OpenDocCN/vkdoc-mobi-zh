- fmt: '# Using the Offset and Position Modifiers


    Spacers, padding, and alignment within a stack can alter the position of views
    on a user interface, but for another way to position views on the user interface,
    you can use the `offset` modifier as well. The `offset` modifier lets you specify
    a specific `x` and `y` value to move a view from where SwiftUI would normally
    place it.


    In every iOS screen, the origin (0,0) appears in the upper left corner. The greater
    the value of `x`, the further to the right horizontally. The greater the value
    of `y`, the further down vertically as shown in Figure [3-13](#329781_6_En_3_Chapter.xhtml#Fig13).


    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig13_HTML.jpg](images/329781_6_En_3_Chapter/329781_6_En_3_Fig13_HTML.jpg)


    Figure 3-13


    The origin and x,y direction on an iOS screen


    The following `ZStack` places two identical `Text` views on top of each other.
    Because both `Text` views appear in the exact same place, you cannot see both
    of them at the same time:


    ```

    ZStack {

    Text ("Top")

    .font(.system(size: 40))

    .background(Color.yellow)

    Text ("Top")

    .font(.system(size: 40))

    .background(Color.yellow)

    }

    ```


    If we add an `offset` modifier to one of the `Text` views, the `offset` modifier
    will move the second `Text` view a fixed distance from where it would normally
    appear such as:


    ```

    ZStack {

    Text ("Top")

    .font(.system(size: 40))

    .background(Color.yellow)

    Text ("Top")

    .font(.system(size: 40))

    .background(Color.yellow)

    .offset(x: 75, y: 125)

    }

    ```


    This offset pushes the second `Text` view 75 points to the right and 125 points
    down as shown in Figure [3-14](#329781_6_En_3_Chapter.xhtml#Fig14).


    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig14_HTML.jpg](images/329781_6_En_3_Chapter/329781_6_En_3_Fig14_HTML.jpg)


    Figure 3-14


    The offset modifier moves a view away from where it would normally appear


    Positive `x` values move a view to the right, and negative `x` values move a view
    to the left. Likewise, positive `y` values move a view down, and negative values
    move a view up. Suppose we had an `offset` modifier as follows:


    ```

    .offset(x: -75, y: -125)

    ```


    This would move the second `Text` view up and to the left from where it would
    normally appear as shown in Figure [3-15](#329781_6_En_3_Chapter.xhtml#Fig15).


    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig15_HTML.jpg](images/329781_6_En_3_Chapter/329781_6_En_3_Fig15_HTML.jpg)


    Figure 3-15


    Negative x and y values offset a view to the left and up


    The `offset` modifier lets you position a view based on where SwiftUI would normally
    place it. If you’d rather position a view based on the origin (the upper left-hand
    corner of the screen), you might want to use the `position` modifier instead.


    Like the `offset` modifier, the `position` modifier needs an `x` and `y` value
    to define the center position of a view. The following Swift code places a `Text`
    view 225 to the right and 126 down as shown in Figure [3-16](#329781_6_En_3_Chapter.xhtml#Fig16):


    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig16_HTML.jpg](images/329781_6_En_3_Chapter/329781_6_En_3_Fig16_HTML.jpg)


    Figure 3-16


    Using the position modifier to place a view on the user interface


    ```

    Text ("Top")

    .font(.system(size: 40))

    .background(Color.yellow)

    .position(x: 225, y: 127)

    ```


    **Note**


    Be careful when using large `x` or `y` values with either the `offset` or `position`
    modifiers. That’s because large values may position a view perfectly on a large
    screen but position that same view off the edge on a smaller screen.


    You can apply the `offset` and `position` modifiers to any views. Since stacks
    are views, you can apply the `offset` and `position` modifiers to stacks, which
    automatically shifts the position of every view inside that stack as well. Consider
    the following Swift code that applies the `offset` modifier to an entire `VStack`:


    ```

    VStack {

    Text ("First")

    .font(.system(size: 40))

    .background(Color.yellow)

    Text ("Second View")

    .font(.system(size: 40))

    .background(Color.yellow)

    }.offset(x: 25, y: 125)

    ```


    The preceding code shifts the entire `VStack`’s contents (the two `Text` views)
    down and to the right from where it would normally appear as shown in Figure [3-17](#329781_6_En_3_Chapter.xhtml#Fig17).


    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig17_HTML.jpg](images/329781_6_En_3_Chapter/329781_6_En_3_Fig17_HTML.jpg)


    Figure 3-17


    The offset modifier moves an entire stack from where it would normally appear


    The `offset` modifier shifts the entire `VStack` from its normal position, but
    the `position` modifier places the `VStack` based on the origin (the upper left-hand
    corner of the screen). The following Swift code uses the exact same `x` and `y`
    values, but uses the `position` modifier on the `VStack` instead:


    ```

    VStack {

    Text ("First")

    .font(.system(size: 40))

    .background(Color.yellow)

    Text ("Second View")

    .font(.system(size: 40))

    .background(Color.yellow)

    }.position(x: 25, y: 125)

    ```


    Notice that since the `position` modifier shifts the `VStack` from the origin,
    the `x` value isn’t large enough and the `VStack`’s contents get cut off by the
    screen as shown in Figure [3-18](#329781_6_En_3_Chapter.xhtml#Fig18).


    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig18_HTML.jpg](images/329781_6_En_3_Chapter/329781_6_En_3_Fig18_HTML.jpg)


    Figure 3-18


    The position modifier places the VStack in relation to the origin


    # Summary


    Designing a user interface in SwiftUI normally centers views in the middle of
    the screen. By using the `padding` modifier, you can increase the space around
    a view. The `padding` modifier can affect one, two, three, or all four sides of
    a view.


    When you want to push views apart, use spacers, which act like springs that push
    views up to the edge of the screen, regardless of the screen’s actual size. By
    using multiple spacers, you can push a view further. You can also define the minimum
    length that a spacer can shrink to make sure it doesn’t shrink beyond a specific
    length.


    Within vertical and horizontal stacks, you can define the spacing between all
    views within a stack. By using the `offset` modifier, you can shift a view from
    where it would normally appear. By using the `position` modifier, you can precisely
    place a view on the screen, based on the origin, which is the upper left-hand
    corner of an iOS screen.


    The `padding` modifier, spacers, spacing within stacks, and the offset/position
    modifiers let you arrange the placement of views on your user interface. You can
    apply the `padding`, `offset`, and `position` modifiers on any view, including
    stacks. By modifying an entire stack, you can modify all views within that stack.


    SwiftUI helps create user interfaces that adapt to any size iOS screen whether
    your app runs on a small iPhone screen or a much larger iPad screen. That way,
    you can spend less time worrying about how your app will look on different iOS
    devices and focus more time on writing code to make your app do something useful
    and amazing.'
  raw: '## Using the Offset and Position Modifiers


    Spacers, padding, and alignment within a stack can alter the position of views
    on a user interface, but for another way to position views on the user interface,
    you can use the offset modifier as well. The offset modifier lets you specify
    a specific x and y value to move a view from where SwiftUI would normally place
    it.


    In every iOS screen, the origin (0,0) appears in the upper left corner. The greater
    the value of x, the further to the right horizontally. The greater the value of
    y, the further down vertically as shown in Figure [3-13](#329781_6_En_3_Chapter.xhtml#Fig13).


    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig13_HTML.jpg](images/329781_6_En_3_Chapter/329781_6_En_3_Fig13_HTML.jpg)


    Figure 3-13


    The origin and x,y direction on an iOS screen


    The following ZStack places two identical Text views on top of each other. Because
    both Text views appear in the exact same place, you cannot see both of them at
    the same time:


    ```

    ZStack {

    Text ("Top")

    .font(.system(size: 40))

    .background(Color.yellow)

    Text ("Top")

    .font(.system(size: 40))

    .background(Color.yellow)

    }

    ```


    If we add an offset modifier to one of the Text views, the offset modifier will
    move the second Text view a fixed distance from where it would normally appear
    such as


    ```

    ZStack {

    Text ("Top")

    .font(.system(size: 40))

    .background(Color.yellow)

    Text ("Top")

    .font(.system(size: 40))

    .background(Color.yellow)

    .offset(x: 75, y: 125)

    }

    ```


    This offset pushes the second Text view 75 points to the right and 125 points
    down as shown in Figure [3-14](#329781_6_En_3_Chapter.xhtml#Fig14).


    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig14_HTML.jpg](images/329781_6_En_3_Chapter/329781_6_En_3_Fig14_HTML.jpg)


    Figure 3-14


    The offset modifier moves a view away from where it would normally appear


    Positive x values move a view to the right, and negative x values move a view
    to the left. Likewise, positive y values move a view down, and negative values
    move a view up. Suppose we had an offset modifier as follows:


    ```

    .offset(x: -75, y: -125)

    ```


    This would move the second Text view up and to the left from where it would normally
    appear as shown in Figure [3-15](#329781_6_En_3_Chapter.xhtml#Fig15).


    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig15_HTML.jpg](images/329781_6_En_3_Chapter/329781_6_En_3_Fig15_HTML.jpg)


    Figure 3-15


    Negative x and y values offset a view to the left and up


    The offset modifier lets you position a view based on where SwiftUI would normally
    place it. If you’d rather position a view based on the origin (the upper left-hand
    corner of the screen), you might want to use the position modifier instead.


    Like the offset modifier, the position modifier needs an x and y value to define
    the center position of a view. The following Swift code places a Text view 225
    to the right and 126 down as shown in Figure [3-16](#329781_6_En_3_Chapter.xhtml#Fig16):


    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig16_HTML.jpg](images/329781_6_En_3_Chapter/329781_6_En_3_Fig16_HTML.jpg)


    Figure 3-16


    Using the position modifier to place a view on the user interface


    ```

    Text ("Top")

    .font(.system(size: 40))

    .background(Color.yellow)

    .position(x: 225, y: 127)

    ```


    Note


    Be careful when using large x or y values with either the offset or position modifiers.
    That’s because large values may position a view perfectly on a large screen but
    position that same view off the edge on a smaller screen.


    You can apply the offset and position modifiers to any views. Since stacks are
    views, you can apply the offset and position modifiers to stacks, which automatically
    shifts the position of every view inside that stack as well. Consider the following
    Swift code that applies the offset modifier to an entire VStack:


    ```

    VStack {

    Text ("First")

    .font(.system(size: 40))

    .background(Color.yellow)

    Text ("Second View")

    .font(.system(size: 40))

    .background(Color.yellow)

    }.offset(x: 25, y: 125)

    ```


    The preceding code shifts the entire VStack’s contents (the two Text views) down
    and to the right from where it would normally appear as shown in Figure [3-17](#329781_6_En_3_Chapter.xhtml#Fig17).


    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig17_HTML.jpg](images/329781_6_En_3_Chapter/329781_6_En_3_Fig17_HTML.jpg)


    Figure 3-17


    The offset modifier moves an entire stack from where it would normally appear


    The offset modifier shifts the entire VStack from its normal position, but the
    position modifier places the VStack based on the origin (the upper left-hand corner
    of the screen). The following Swift code uses the exact same x and y values, but
    uses the position modifier on the VStack instead:


    ```

    VStack {

    Text ("First")

    .font(.system(size: 40))

    .background(Color.yellow)

    Text ("Second View")

    .font(.system(size: 40))

    .background(Color.yellow)

    }.position(x: 25, y: 125)

    ```


    Notice that since the position modifier shifts the VStack from the origin, the
    x value isn’t large enough and the VStack’s contents get cut off by the screen
