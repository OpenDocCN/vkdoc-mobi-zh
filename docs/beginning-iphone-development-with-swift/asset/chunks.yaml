    \ 0.25. Finally, the `State` variable (`decimalValue`) must also be defined as\
    \ a decimal value (`Double` data type) like this:\n\n```\n@State var decimalValue:\
    \ Double = 0\n```\n\nThe entire `ContentView` file should look like this:\n\n\
    ```\nimport SwiftUI\n\nstruct ContentView: View {\n    @State var newValue = 0\n\
    \    @State var decimalValue: Double = 0\n\n    var body: some View {\n      \
