  trans: "\n# 在列表中显示数组数据\n\n`List` 中显示的数据通常存储在数组中。数组中的项目数量可能是固定的，但更常见的情况是项目数量会随时间变化。这意味着随着数组随时间增加或减少，`List`\
    \ 的内容也可能会发生变化。\n\n要了解如何在 `List` 中显示数组的内容，请按照以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS 应用项目，并为其取任意名称，例如“ListArray”。\n\
    2. 在导航器窗格中点击 `ContentView` 文件。\n3. 在 `struct ContentView: View` 行下方定义一个数组，如下所示：\n\
    4. 在 `var body: some View` 内部添加一个 `VStack`，并像这样创建一个 `List`：\n\n```\nstruct ContentView:\
    \ View {\n    var myArray = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\"\
    , \"Goldfish\", \"Lizard\", \"Canary\", \"Tarantula\", \"Hamster\"]\n}\n```\n\n\
    ```\nvar body: some View {\n    VStack {\n        List {\n            ForEach(0...myArray.count\
    \ - 1, id: \\.self) { index in\n                Text(myArray[index])\n       \
    \     }\n        }\n    }\n}\n```\n\n这会创建一个 `List`，并使用 `ForEach` 循环从 0 计数到数组中的最后一个项目。（请记住，数组中的第一个项目索引值为\
    \ 0，因此数组中最后一个项目的索引值等于数组中的项目总数减去 1。）然后，它使用此索引值从数组中检索每个项目，以显示在 `List` 中，如图 13-3\
    \ 所示。\n\n![../images/329781_6_En_13_Chapter/329781_6_En_13_Fig3_HTML.jpg](img/329781_6_En_13_Fig3_HTML.jpg)\n\
    \n**图 13-3** – 在 `List` 中显示数组的内容\n\n完整的 `ContentView` 文件应如下所示：\n\n```\nimport\
    \ SwiftUI\n\nstruct ContentView: View {\n    var myArray = [\"Cat\", \"Dog\",\
    \ \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\", \"Canary\", \"\
    Tarantula\", \"Hamster\"]\n\n    var body: some View {\n        VStack {\n   \
    \         List {\n                ForEach(0...myArray.count - 1, id: \\.self)\
    \ { index in\n                    Text(myArray[index])\n                }\n  \
    \          }\n        }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \n## 在列表中显示结构体数组\n\n之前的代码使用 `ForEach` 循环通过索引值检索数组项目。另一种存储数据的方法是使用结构体，然后创建一个结构体数组。\n\
    \n这样做的目的是定义你想要存储的数据，同时附带一个唯一的 ID，你可以用这个 ID 来标识每个结构体，例如：\n\n```\nstruct Animals:\
    \ Identifiable {\n    let pet: String\n    let id = UUID()\n}\n```\n\n一旦你定义了一个\
    \ `Identifiable` 结构体，就可以像这样将其存储在一个数组中：\n\n```\nvar myAnimals = [\n    Animals(pet:\
    \ \"Cat\"),\n    Animals(pet: \"Dog\"),\n    Animals(pet: \"Turtle\"),\n    Animals(pet:\
    \ \"Ferret\"),\n    Animals(pet: \"Parrot\"),\n    Animals(pet: \"Goldfish\"),\n\
    \    Animals(pet: \"Lizard\"),\n    Animals(pet: \"Canary\"),\n    Animals(pet:\
    \ \"Tarantula\"),\n    Animals(pet: \"Hamster\")\n]\n```\n\n这个数组不仅在 `pet` 字段中存储了字符串，而且还为每个结构体分配了一个唯一的\
    \ ID。现在，你可以使用这个唯一的 ID 在 `List` 中显示每个项目，如下所示：\n\n```\nList(myAnimals) {\n    Text($0.pet)\n\
    }\n```\n\n请注意，上述代码不需要循环。要了解这段代码的工作原理，请按照以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS 应用项目，并为其取任意名称，例如“ListOfStructures”。\n\
    2. 在导航器窗格中点击 `ContentView` 文件。\n3. 在 `struct ContentView: some View` 行下方定义一个结构体和一个数组，如下所示：\n\
    4. 在 `var body: some View` 内部添加一个 `List`，如下所示：\n\n```\nstruct ContentView: View\
    \ {\n    struct Animals: Identifiable {\n        let pet: String\n        let\
    \ id = UUID()\n    }\n\n    var myAnimals = [\n        Animals(pet: \"Cat\"),\n\
    \        Animals(pet: \"Dog\"),\n        Animals(pet: \"Turtle\"),\n        Animals(pet:\
    \ \"Ferret\"),\n        Animals(pet: \"Parrot\"),\n        Animals(pet: \"Goldfish\"\
    ),\n        Animals(pet: \"Lizard\"),\n        Animals(pet: \"Canary\"),\n   \
    \     Animals(pet: \"Tarantula\"),\n        Animals(pet: \"Hamster\")\n    ]\n\
    }\n```\n\n```\nvar body: some View {\n    List(myAnimals) {\n        Text($0.pet)\n\
    \    }\n}\n```\n\n完整的 `ContentView` 文件应如下所示：\n\n```\nimport SwiftUI\n\nstruct\
    \ ContentView: View {\n    struct Animals: Identifiable {\n        let pet: String\n\
    \        let id = UUID()\n    }\n\n    var myAnimals = [\n        Animals(pet:\
    \ \"Cat\"),\n        Animals(pet: \"Dog\"),\n        Animals(pet: \"Turtle\"),\n\
    \        Animals(pet: \"Ferret\"),\n        Animals(pet: \"Parrot\"),\n      \
    \  Animals(pet: \"Goldfish\"),\n        Animals(pet: \"Lizard\"),\n        Animals(pet:\
    \ \"Canary\"),\n        Animals(pet: \"Tarantula\"),\n        Animals(pet: \"\
    Hamster\")\n    ]\n\n    var body: some View {\n        List(myAnimals) {\n  \
    \          Text($0.pet)\n        }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \n请注意，与之前需要 `ForEach` 循环的版本相比，创建 `List` 的代码看起来要简洁得多。\n"
- fmt: "# Creating Groups in a List\n\nIf you have many items displayed in a `List`,\
    \ it can be hard to scroll through all this data to find the item you want. To\
    \ solve this problem, `List`s let you create sections as shown in Figure 13-4.\n\
    \n![../images/329781_6_En_13_Chapter/329781_6_En_13_Fig4_HTML.jpg](images/329781_6_En_13_Chapter/329781_6_En_13_Fig4_HTML.jpg)\n\
    \n*Figure 13-4 - Displaying the contents of a `List` in sections*\n\nTo define\
    \ sections, you need to create two structures. One structure defines the section\
    \ headings, and the second structure defines the data you want to display. To\
    \ define the section heading, you need to define:\n\n- A `String` constant to\
    \ hold each section’s name\n- An array constant to hold an array of structures\
    \ that contain the actual data to display\n- An `ID` that defines a unique ID\
    \ for each section\n\nThe structure name must be defined as `Identifiable` to\
    \ create a unique ID such as:\n\n```\nstruct SectionHeading: Identifiable {\n\
    \    let name: String\n    let animalList: [Animals]\n    let id = UUID()\n}\n\
    ```\n\nThe preceding structure uses `animalList` to store an array of structures\
    \ called `Animals`. This `Animals` structure needs:\n\n- A `String` constant to\
    \ hold the data you want to display in the `List`\n- An `ID` that defines a unique\
    \ ID for each item in the `List`\n\nThis second structure must be defined as `Hashable`\
    \ and `Identifiable` such as:\n\n```\nstruct Animals: Hashable, Identifiable {\n\
    \    let pet: String\n    let id = UUID()\n}\n```\n\nFinally, you can create an\
    \ array that defines the sections and the items within each section such as:\n\
    \n```\nvar myAnimals = [\n    SectionHeading(name: \"Mammals\",\n            \
    \       animalList: [\n                       Animals(pet: \"Cat\"),\n       \
    \                Animals(pet: \"Dog\"),\n                       Animals(pet: \"\
    Ferret\"),\n                       Animals(pet: \"Hamster\")])\n]\n```\n\nThen\
    \ to display items in a `List`, you need to use nested `ForEach` loops. The outer\
    \ `ForEach` loop defines the section names such as:\n\n```\nForEach(myAnimals)\
    \ { heading in\n    Section(header: Text(\"\\(heading.name) Section\")) {\n  \
    \  }\n}\n```\n\nThen the inner `ForEach` loop defines the items to appear within\
    \ each section such as:\n\n```\nForEach(heading.animalList) { creature in\n  \
    \  Text(creature.pet)\n}\n```\n\nTo see how to create a `List` divided into sections,\
    \ follow these steps:\n\n1. Create a new SwiftUI iOS App project and give it any\
    \ name you wish such as “ListSections.”\n2. Click the `ContentView` file in the\
    \ Navigator pane.\n3. Define a structure under the `struct ContentView: some View`\
    \ line to define the data you want to display in the `List` like this:\n\n```\n\
    struct Animals: Hashable, Identifiable {\n    let pet: String\n    let id = UUID()\n\
    }\n```\n\n4. Add a second structure underneath to define the section names to\
    \ display in the `List` like this:\n\n```\nstruct SectionHeading: Identifiable\
    \ {\n    let name: String\n    let animalList: [Animals]\n    let id = UUID()\n\
    }\n```\n\n5. Add an array to list the sections and the items to appear within\
    \ each section like this:\n\n```\nvar myAnimals = [\n    SectionHeading(name:\
    \ \"Mammals\",\n                   animalList: [\n                       Animals(pet:\
    \ \"Cat\"),\n                       Animals(pet: \"Dog\"),\n                 \
    \      Animals(pet: \"Ferret\"),\n                       Animals(pet: \"Hamster\"\
    )]),\n    SectionHeading(name: \"Reptiles\",\n                   animalList: [\n\
    \                       Animals(pet: \"Turtle\"),\n                       Animals(pet:\
    \ \"Lizard\")]),\n    SectionHeading(name: \"Birds\",\n                   animalList:\
    \ [\n                       Animals(pet: \"Parrot\"),\n                      \
    \ Animals(pet: \"Canary\")]),\n    SectionHeading(name: \"Other\",\n         \
    \          animalList: [\n                       Animals(pet: \"Tarantula\"),\n\
    \                       Animals(pet: \"Goldfish\")])\n]\n```\n\n6. Add a `List`\
    \ inside the `var body: some View` like this:\n\n```\nvar body: some View {\n\
    \    List {\n    }\n}\n```\n\n7. Add a `ForEach` loop inside the `List` to define\
    \ the section name like this:\n\n```\nvar body: some View {\n    List {\n    \
    \    ForEach(myAnimals) { heading in\n            Section(header: Text(\"\\(heading.name)\
    \ Section\")) {\n            }\n        }\n    }\n}\n```\n\nNotice that a `Text`\
    \ view displays the `name` property of each section, which was previously defined\
    \ by the array (“Mammals,” “Reptiles,” “Birds,” and “Other”).\n\n8. Add a second\
    \ `ForEach` loop to define the actual data to display in the `List` like this:\n\
    \n```\nvar body: some View {\n    List {\n        ForEach(myAnimals) { heading\
    \ in\n            Section(header: Text(\"\\(heading.name) Section\")) {\n    \
    \            ForEach(heading.animalList) { creature in\n                    Text(creature.pet)\n\
    \                }\n            }\n        }\n    }\n}\n```\n\nNotice that this\
    \ second `ForEach` loop uses the `pet` property that was previously defined by\
    \ the array (“Cat,” “Dog,” “Ferret,” “Hamster,” “Turtle,” “Lizard,” “Parrot,”\
    \ “Canary,” “Tarantula,” “Goldfish”).\n\nThe entire `ContentView` file should\
    \ look like this:\n\n```\nimport SwiftUI\n\nstruct ContentView: View {\n    struct\
    \ Animals: Hashable, Identifiable {\n        let pet: String\n        let id =\
    \ UUID()\n    }\n\n    struct SectionHeading: Identifiable {\n        let name:\
    \ String\n        let animalList: [Animals]\n        let id = UUID()\n    }\n\n\
    \    var myAnimals = [\n        SectionHeading(name: \"Mammals\",\n          \
    \             animalList: [\n                           Animals(pet: \"Cat\"),\n\
    \                           Animals(pet: \"Dog\"),\n                         \
    \  Animals(pet: \"Ferret\"),\n                           Animals(pet: \"Hamster\"\
    )]),\n        SectionHeading(name: \"Reptiles\",\n                       animalList:\
    \ [\n                           Animals(pet: \"Turtle\"),\n                  \
    \         Animals(pet: \"Lizard\")]),\n        SectionHeading(name: \"Birds\"\
    ,\n                       animalList: [\n                           Animals(pet:\
    \ \"Parrot\"),\n                           Animals(pet: \"Canary\")]),\n     \
    \   SectionHeading(name: \"Other\",\n                       animalList: [\n  \
    \                         Animals(pet: \"Tarantula\"),\n                     \
    \      Animals(pet: \"Goldfish\")])\n    ]\n\n    var body: some View {\n    \
    \    List {\n            ForEach(myAnimals) { heading in\n                Section(header:\
    \ Text(\"\\(heading.name) Section\")) {\n                    ForEach(heading.animalList)\
    \ { creature in\n                        Text(creature.pet)\n                \
    \    }\n                }\n            }\n        }\n    }\n}\n\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```"
  raw: '## Creating Groups in a List


    If you have many items displayed in a List, it can be hard to scroll through all
    this data to find the item you want. To solve this problem, Lists let you create
    sections as shown in Figure [13-4](#329781_6_En_13_Chapter.xhtml#Fig4).


    ![../images/329781_6_En_13_Chapter/329781_6_En_13_Fig4_HTML.jpg](images/329781_6_En_13_Chapter/329781_6_En_13_Fig4_HTML.jpg)


    Figure 13-4


    Displaying the contents of a List in sections


    To define sections, you need to create two structures. One structure defines the
    section headings, and the second structure defines the data you want to display.
    To define the section heading, you need to define


    *   A String constant to hold each section’s name


    *   An array constant to hold an array of structures that contain the actual data
    to display


    *   An ID that defines a unique ID for each section


    The structure name must be defined as Identifiable to create a unique ID such
    as


    ```

    struct SectionHeading: Identifiable {

    let name: String

    let animalList: [Animals]

    let id = UUID()

    }

    ```


    The preceding structure uses “animalList” to store an array of structures called
    Animals. This Animals structure needs


    *   A String constant to hold the data you want to display in the List


    *   An ID that defines a unique ID for each item in the List


    This second structure must be defined as Hashable and Identifiable such as


    ```

    struct Animals: Hashable, Identifiable {

    let pet: String

    let id = UUID()

    }

    ```


    Finally, you can create an array that defines the sections and the items within
    each section such as


    ```

    var myAnimals = [

    SectionHeading(name: "Mammals",

    animalList: [

    Animals(pet: "Cat"),

    Animals(pet: "Dog"),

    Animals(pet: "Ferret"),

    Animals(pet: "Hamster")])

    ]

    ```


    Then to display items in a List, you need to use nested ForEach loops. The outer
    ForEach loop defines the section names such as


    ```

    ForEach(myAnimals) { heading in

    Section(header: Text("\(heading.name) Section")) {

    }

    }

    ```


    Then the inner ForEach loop defines the items to appear within each section such
    as


    ```

    ForEach(heading.animalList) { creature in

    Text(creature.pet)

    }

    ```


    To see how to create a List divided into sections, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “ListSections.”


    2.  Click the ContentView file in the Navigator pane.


    3.  Define a structure under the struct ContentView: some View line to define
    the data you want to display in the List like this:


    1.  Add a second structure underneath to define the section names to display in
    the List like this:


    ```

    struct Animals: Hashable, Identifiable {

    let pet: String

    let id = UUID()

    }

    ```


    1.  Add an array to list the sections and the items to appear within each section
    like this:


    ```

    struct SectionHeading: Identifiable {

    let name: String

    let animalList: [Animals]

    let id = UUID()

    }

    ```


    1.  Add a List inside the var body: some View like this:


    ```

    var myAnimals = [

    SectionHeading(name: "Mammals",

    animalList: [

    Animals(pet: "Cat"),

    Animals(pet: "Dog"),

    Animals(pet: "Ferret"),

    Animals(pet: "Hamster")]),

    SectionHeading(name: "Reptiles",

    animalList: [

    Animals(pet: "Turtle"),

    Animals(pet: "Lizard")]),

    SectionHeading(name: "Birds",

    animalList: [

    Animals(pet: "Parrot"),

    Animals(pet: "Canary")]),

    SectionHeading(name: "Other",

    animalList: [

    Animals(pet: "Tarantula"),

    Animals(pet: "Goldfish")])

    ]

    ```


    1.  Add a ForEach loop inside the List to define the section name like this:


    ```

    var body: some View {

    List {

    }

    ```


    ```

    var body: some View {

    List {

    ForEach(myAnimals) { heading in

    Section(header: Text("\(heading.name) Section")) {

    }

    }

    }

    ```


    Notice that a Text view displays the “name” property of each section, which was
    previously defined by the array (“Mammals,” “Reptiles,” “Birds,” and “Other”).


    1.  Add a second ForEach loop to define the actual data to display in the List
    like this:


    ```

    var body: some View {

    List {

    ForEach(myAnimals) { heading in

    Section(header: Text("\(heading.name) Section")) {

    ForEach(heading.animalList) { creature in

    Text(creature.pet)

    }

    }

    }

    }

    ```


    Notice that this second ForEach loop uses the “pet” property that was previously
    defined by the array (“Cat,” “Dog,” “Ferret,” “Hamster,” “Turtle,” “Lizard,” “Parrot,”
    “Canary,” “Tarantula,” “Goldfish”). The entire ContentView file should look like
    this:


    ```

    import SwiftUI

    struct ContentView: View {

    struct Animals: Hashable, Identifiable {

    let pet: String

    let id = UUID()

    }

    struct SectionHeading: Identifiable {

    let name: String

    let animalList: [Animals]

    let id = UUID()

    }

    var myAnimals = [

    SectionHeading(name: "Mammals",

    animalList: [

    Animals(pet: "Cat"),

    Animals(pet: "Dog"),

    Animals(pet: "Ferret"),

    Animals(pet: "Hamster")]),

    SectionHeading(name: "Reptiles",

    animalList: [

    Animals(pet: "Turtle"),

    Animals(pet: "Lizard")]),

    SectionHeading(name: "Birds",

    animalList: [

    Animals(pet: "Parrot"),

    Animals(pet: "Canary")]),

    SectionHeading(name: "Other",

    animalList: [

    Animals(pet: "Tarantula"),

    Animals(pet: "Goldfish")])

    ]

    var body: some View {

    List {

    ForEach(myAnimals) { heading in

    Section(header: Text("\(heading.name) Section")) {

    ForEach(heading.animalList) { creature in

    Text(creature.pet)

    }

    }

    }

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```'
