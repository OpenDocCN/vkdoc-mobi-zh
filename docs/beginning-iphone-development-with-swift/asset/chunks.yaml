    \n**Figure 9-4** Displaying minimum and maximum labels on a Slider\n\n> **Note:**\
    \ The `minimumValueLabel` and `maximumValueLabel` are only available in iOS 15.0\
    \ or higher.\n\nTo see how all these different `Slider`s work, edit the `ContentView`\
    \ file as follows:\n\n```\nimport SwiftUI\n\n@available(iOS 15.0, *)\nstruct ContentView:\
    \ View {\n    @State var sliderValue = 0.0\n\n    var body: some View {\n    \
