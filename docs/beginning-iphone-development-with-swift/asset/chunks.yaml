- fmt: "# Using the Label View\n\nSimilar to the Text view is the Label view. While\
    \ the Text view just displays a single string of text, the Label view can display\
    \ both a string and an image side by side as shown in Figure [4-12](#329781_6_En_4_Chapter.xhtml#Fig12).\n\
    \n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig12_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig12_HTML.jpg)\n\
    \nFigure 4-12 The Label view can display an image and text at the same time\n\n\
    These images can be any image you add into the `Assets` folder of your Xcode project,\
    \ or any image you can view in Apple’s free SF Symbols app ([`https://developer.apple.com/sf-symbols/`](https://developer.apple.com/sf-symbols/))\
    \ that displays all available system images as shown in Figure [4-13](#329781_6_En_4_Chapter.xhtml#Fig13).\n\
    \n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig13_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig13_HTML.jpg)\n\
    \nFigure 4-13 The SF Symbols app displays icons you can include in an Xcode project\n\
    \nWhen you use an SF Symbol icon, you do not need to add it to your Xcode project.\
    \ If you want to use your own images, then you’ll need to drag and drop them into\
    \ the `Assets` folder as shown in Figure [4-14](#329781_6_En_4_Chapter.xhtml#Fig14).\n\
    \n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig14_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig14_HTML.jpg)\n\
    \nFigure 4-14 You can drag and drop images into the `Assets` folder of an Xcode\
    \ project\n\nIf you want to display an SF Symbol icon in a Label view, you can\
    \ use this code:\n\n```\nLabel(\"Text\", systemImage: \"SF Symbol image name here\"\
    )\n```\n\nThe text can be any string or string variable, while the SF Symbol name\
    \ must be completely enclosed within double quotation marks such as `\"creditcard\"\
    ` or `\"banknote.fill\"`. Make sure you type the SF Symbol icon name exactly as\
    \ it appears in the SF Symbols app. You can also right-click any icon in the SF\
    \ Symbols app, and when a popup menu appears, choose Copy Name as shown in Figure\
    \ [4-15](#329781_6_En_4_Chapter.xhtml#Fig15). Then you can paste this name into\
    \ the Label view.\n\n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig15_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig15_HTML.jpg)\n\
    \nFigure 4-15 Right-clicking an icon lets you copy its name within the SF Symbols\
    \ app\n\nIf you want to display an image stored in the `Assets` folder of your\
    \ Xcode project, you can use this code:\n\n```\nLabel(\"Text\", image: \"image\
    \ name here\")\n```\n\nThe text can be any string or string variable, while the\
    \ image name must exactly match the name of the image file in the `Assets` folder\
    \ but without the file extension.\n\n**Note:** You may want to resize an image\
    \ before adding it to the `Assets` folder of your Xcode project. Otherwise, if\
    \ an image is too large, the Label view will display the image at its original\
    \ size, which may be far larger than you might want.\n\nThe simplest way to define\
    \ a Label view is to define either a `systemImage` or regular image like this:\n\
    \n```\nLabel(\"Text\", systemImage: \"SF Symbol image name here\")\nLabel(\"Text\"\
    , image: \"image name here\")\n```\n\nHowever, if you want to customize the appearance\
    \ of the text and/or image, you can create a Label view using this code instead:\n\
    \n```\nLabel {\n    Text(\"Alternate Label definition\")\n} icon: {\n    Image(systemName:\
    \ \"SF Symbol image name here\")\n}\n```\n\nOr\n\n```\nLabel {\n    Text(\"Alternate\
    \ Label definition\")\n} icon: {\n    Image(\"image name here\")\n}\n```\n\n**Note:**\
    \ When using an SF Symbol icon, you must define the `systemName:` parameter, but\
    \ when using an image stored in the `Assets` folder, you just define the image\
    \ name with no parameter at all.\n\nWhen you define a Label view using a `Text`\
    \ and an `Image` view, you can customize each individually such as choosing a\
    \ font for the text and an opacity for the image like this:\n\n```\nLabel {\n\
    \    Text(\"Modifiers\")\n        .font(.title)\n} icon: {\n    Image(\"flag\"\
    )\n        .opacity(0.25)\n}\n```\n\nThe preceding label displays text using the\
    \ `.title` font and displays a flag image with an opacity of 0.25 as shown in\
    \ Figure [4-16](#329781_6_En_4_Chapter.xhtml#Fig16).\n\n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig16_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig16_HTML.jpg)\n\
    \nFigure 4-16 Modifying text and an image in a Label view\n\nWhen creating a Label\
    \ view, you have three options as shown in Figure [4-17](#329781_6_En_4_Chapter.xhtml#Fig17):\n\
    \n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig17_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig17_HTML.jpg)\n\
    \nFigure 4-17 Three different ways the Label view can display information\n\n\
    - Text and icon (default)\n- Text only\n- Icon only\n\n## Adding a Border Around\
    \ a Text or Label View\n\nTo highlight both a Text and a Label view, you can add\
    \ a border around them. A border can consist of a color and a width such as\n\n\
    ```\n.border(Color.red, width: 3)\n```\n\nWhen you use the `.border` modifier\
    \ with a Text or Label view, the border closely wraps around the text inside as\
    \ shown in Figure [4-18](#329781_6_En_4_Chapter.xhtml#Fig18).\n\n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig18_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig18_HTML.jpg)\n\
    \nFigure 4-18 Borders closely wrap around text inside a Text or Label view\n\n\
    In case you don’t want a border to wrap so tightly around text, you can add padding\
    \ around the Text or Label view first, and then apply the `.border` modifier as\
    \ shown in Figure [4-19](#329781_6_En_4_Chapter.xhtml#Fig19).\n\n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig19_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig19_HTML.jpg)\n\
    \nFigure 4-19 The padding modifier can add space for borders around a Text or\
    \ Label view\n\n**Note:** Make sure you apply the `.padding` modifier before the\
    \ `.border` modifier. Otherwise, if the `.border` modifier appears first, SwiftUI\
    \ will draw the border and then apply the padding around the Text or Label view.\n\
    \n## Summary\n\nText views are handy for displaying any type of textual information\
    \ on the user interface. Even if you need to display numbers, dates, or any other\
    \ data types, you can use string interpolation to display data in a Text view.\
    \ Similar to a Text view is the Label view.\n\nWhere the Text view simply displays\
    \ text, the Label view can display an image and text side by side. The Label view\
    \ can display either icons listed in the SF Symbols app or any images you add\
    \ to the `Assets` folder of your Xcode project. By applying different styles to\
    \ a Label view, you can display text and icons, text only, or icon only. By using\
    \ either the Text or Label view, your app can display information on the user\
    \ interface for the user to view.\n\n# 5. Working with Images\n\nMost user interfaces\
    \ consist of text, but text alone can appear plain. That’s why the second most\
    \ common type of information to display on the screen is images. Images can serve\
    \ purely for decorative purposes, or they can help the user navigate through a\
    \ user interface.\n\nThe most common type of images to display is icons. The SF\
    \ Symbols app ([`https://developer.apple.com/sf-symbols/`](https://developer.apple.com/sf-symbols/))\
    \ lists all the available icons you can include on your app’s user interface.\
    \ Besides these icons, you can also include any images you drag and drop into\
    \ the `Assets` folder of an Xcode project. In addition, you can also include common\
    \ shapes such as rectangles or circles that can appear on the screen.\n\nImages\
    \ give you a way to spice up the appearance of any user interface by displaying\
    \ colorful or informative graphics on the screen. Any time you create a user interface,\
    \ think of how you can add graphic images to make your user interface more visually\
    \ appealing to the user."
  raw: '## Using the Label View


    Similar to the Text view is the Label view. While the Text view just displays
    a single string of text, the Label view can display both a string and an image
    side by side as shown in Figure [4-12](#329781_6_En_4_Chapter.xhtml#Fig12).


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig12_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig12_HTML.jpg)


    Figure 4-12


    The Label view can display an image and text at the same time


    These images can be any image you add into the Assets folder of your Xcode project,
    or any image you can view in Apple’s free SF Symbols app ([`https://developer.apple.com/sf-symbols/`](https://developer.apple.com/sf-symbols/))
    that displays all available system images as shown in Figure [4-13](#329781_6_En_4_Chapter.xhtml#Fig13).


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig13_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig13_HTML.jpg)


    Figure 4-13


    The SF Symbols app displays icons you can include in an Xcode project


    When you use an SF Symbol icon, you do not need to add it to your Xcode project.
    If you want to use your own images, then you’ll need to drag and drop them into
    the Assets folder as shown in Figure [4-14](#329781_6_En_4_Chapter.xhtml#Fig14).


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig14_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig14_HTML.jpg)


    Figure 4-14


    You can drag and drop images into the Assets folder of an Xcode project


    If you want to display an SF Symbol icon in a Label view, you can use this code:


    ```

    Label("Text", systemImage: "SF Symbol image name here")

    ```


    The text can be any string or string variable, while the SF Symbol name must be
    completely enclosed within double quotation marks such as “creditcard” or “banknote.fill”.
    Make sure you type the SF Symbol icon name exactly as it appears in the SF Symbols
    app. You can also right-click any icon in the SF Symbols app, and when a popup
    menu appears, choose Copy Name as shown in Figure [4-15](#329781_6_En_4_Chapter.xhtml#Fig15).
    Then you can paste this name into the Label view.


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig15_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig15_HTML.jpg)


    Figure 4-15


    Right-clicking an icon lets you copy its name within the SF Symbols app


    If you want to display an image stored in the Assets folder of your Xcode project,
    you can use this code:


    ```

    Label("Text", image: "image name here")

    ```


    The text can be any string or string variable, while the image name must exactly
    match the name of the image file in the Assets folder but without the file extension.


    Note


    You may want to resize an image before adding it to the Assets folder of your
    Xcode project. Otherwise, if an image is too large, the Label view will display
    the image at its original size, which may be far larger than you might want.


    The simplest way to define a Label view is to define either a systemImage or regular
    image like this:


    ```

    Label("Text", systemImage: "SF Symbol image name here")

    Label("Text", image: "image name here")

    ```


    However, if you want to customize the appearance of the text and/or image, you
    can create a Label view using this code instead:


    ```

    Label {

    Text("Alternate Label definition")

    } icon: {

    Image(systemName: "SF Symbol image name here")

    }

    ```


    Or


    ```

    Label {

    Text("Alternate Label definition")

    } icon: {

    Image("image name here")

    }

    ```


    Note


    When using an SF Symbol icon, you must define the systemName: parameter, but when
    using an image stored in the Assets folder, you just define the image name with
    no parameter at all.


    When you define a Label view using a Text and an Image view, you can customize
    each individually such as choosing a font for the text and an opacity for the
    image like this:


    ```

    Label {

    Text("Modifiers")

    .font(.title)

    } icon: {

    Image("flag")

    .opacity(0.25)

    }

    ```


    The preceding label displays text using the .title font and displays a flag image
    with an opacity of 0.25 as shown in Figure [4-16](#329781_6_En_4_Chapter.xhtml#Fig16).


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig16_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig16_HTML.jpg)


    Figure 4-16


    Modifying text and an image in a Label view


    When creating a Label view, you have three options as shown in Figure [4-17](#329781_6_En_4_Chapter.xhtml#Fig17):


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig17_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig17_HTML.jpg)


    Figure 4-17


    Three different ways the Label view can display information


    *   Text and icon (default)


    *   Text only


    *   Icon only


    ## Adding a Border Around a Text or Label View


    To highlight both a Text and a Label view, you can add a border around them. A
    border can consist of a color and a width such as


    ```

    .border(Color.red, width: 3)

    ```


    When you use the .border modifier with a Text or Label view, the border closely
    wraps around the text inside as shown in Figure [4-18](#329781_6_En_4_Chapter.xhtml#Fig18).


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig18_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig18_HTML.jpg)


    Figure 4-18


    Borders closely wrap around text inside a Text or Label view


    In case you don’t want a border to wrap so tightly around text, you can add padding
    around the Text or Label view first, and then apply the .border modifier as shown
    in Figure [4-19](#329781_6_En_4_Chapter.xhtml#Fig19).


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig19_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig19_HTML.jpg)


    Figure 4-19


    The padding modifier can add space for borders around a Text or Label view


    Note


    Make sure you apply the .padding modifier before the .border modifier. Otherwise,
    if the .border modifier appears first, SwiftUI will draw the border and then apply
    the padding around the Text or Label view.


    ## Summary


    Text views are handy for displaying any type of textual information on the user
    interface. Even if you need to display numbers, dates, or any other data types,
    you can use string interpolation to display data in a Text view. Similar to a
    Text view is the Label view.


    Where the Text view simply displays text, the Label view can display an image
    and text side by side. The Label view can display either icons listed in the SF
    Symbols app or any images you add to the Assets folder of your Xcode project.
    By applying different styles to a Label view, you can display text and icons,
    text only, or icon only. By using either the Text or Label view, your app can
    display information on the user interface for the user to view.


    # 5. Working with Images


    Most user interfaces consist of text, but text alone can appear plain. That’s
    why the second most common type of information to display on the screen is images.
    Images can serve purely for decorative purposes, or they can help the user navigate
    through a user interface.


    The most common type of images to display is icons. The SF Symbols app ([`https://developer.apple.com/sf-symbols/`](https://developer.apple.com/sf-symbols/))
    lists all the available icons you can include on your app’s user interface. Besides
    these icons, you can also include any images you drag and drop into the Assets
    folder of an Xcode project. In addition, you can also include common shapes such
    as rectangles or circles that can appear on the screen.


    Images give you a way to spice up the appearance of any user interface by displaying
    colorful or informative graphics on the screen. Any time you create a user interface,
    think of how you can add graphic images to make your user interface more visually
    appealing to the user.'
  trans: "\n# 使用标签视图\n\n标签视图与文本视图类似。文本视图仅显示单一文本字符串，而标签视图可以并排显示文本和图像，如图 4-12 所示。\n\n\
    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig12_HTML.jpg](img/329781_6_En_4_Fig12_HTML.jpg)\n\
    \n图 4-12 标签视图可以同时显示图像和文本\n\n这些图像可以是添加到 Xcode 项目 `Assets` 文件夹中的任意图像，也可以是苹果免费 SF\
    \ Symbols 应用 ([`https://developer.apple.com/sf-symbols/`](https://developer.apple.com/sf-symbols/))\
    \ 中可查看的任意图像，该应用显示了所有可用的系统图像，如图 4-13 所示。\n\n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig13_HTML.jpg](img/329781_6_En_4_Fig13_HTML.jpg)\n\
    \n图 4-13 SF Symbols 应用显示了可包含在 Xcode 项目中的图标\n\n使用 SF Symbol 图标时，无需将其添加到 Xcode 项目。如果想使用自己的图像，则需要将其拖拽到\
    \ `Assets` 文件夹中，如图 4-14 所示。\n\n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig14_HTML.jpg](img/329781_6_En_4_Fig14_HTML.jpg)\n\
    \n图 4-14 可以将图像拖拽到 Xcode 项目的 `Assets` 文件夹中\n\n如果要在标签视图中显示 SF Symbol 图标，可以使用以下代码：\n\
    \n```\nLabel(\"文本\", systemImage: \"此处填写 SF Symbol 图像名称\")\n```\n\n文本可以是任意字符串或字符串变量，而\
    \ SF Symbol 名称必须完全包含在双引号内，例如 `\"creditcard\"` 或 `\"banknote.fill\"`。请确保完全按照 SF\
    \ Symbols 应用中显示的图标名称来输入。你也可以在 SF Symbols 应用中右键点击任意图标，在弹出的菜单中选择“复制名称”，如图 4-15 所示，然后将此名称粘贴到标签视图中。\n\
    \n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig15_HTML.jpg](img/329781_6_En_4_Fig15_HTML.jpg)\n\
    \n图 4-15 右键点击图标可在 SF Symbols 应用中复制其名称\n\n如果要显示存储在 Xcode 项目 `Assets` 文件夹中的图像，可以使用以下代码：\n\
    \n```\nLabel(\"文本\", image: \"此处填写图像名称\")\n```\n\n文本可以是任意字符串或字符串变量，而图像名称必须与 `Assets`\
    \ 文件夹中的图像文件名完全一致，但不包含文件扩展名。\n\n**注意：** 你可能希望在将图像添加到 Xcode 项目的 `Assets` 文件夹之前先调整其大小。否则，如果图像过大，标签视图将以原始尺寸显示该图像，这可能会比你期望的大得多。\n\
    \n定义标签视图最简单的方式是定义一个 `systemImage` 或普通图像，如下所示：\n\n```\nLabel(\"文本\", systemImage:\
    \ \"此处填写 SF Symbol 图像名称\")\nLabel(\"文本\", image: \"此处填写图像名称\")\n```\n\n然而，如果你想自定义文本和/或图像的外观，可以改用以下代码创建标签视图：\n\
    \n```\nLabel {\n    Text(\"备选标签定义\")\n} icon: {\n    Image(systemName: \"此处填写\
    \ SF Symbol 图像名称\")\n}\n```\n\n或者\n\n```\nLabel {\n    Text(\"备选标签定义\")\n} icon:\
    \ {\n    Image(\"此处填写图像名称\")\n}\n```\n\n**注意：** 使用 SF Symbol 图标时，必须定义 `systemName:`\
    \ 参数；但使用 `Assets` 文件夹中的图像时，只需定义图像名称，无需任何参数。\n\n当使用 `Text` 和 `Image` 视图定义标签视图时，可以分别自定义每个元素，例如为文本选择字体和为图像设置透明度，如下所示：\n\
    \n```\nLabel {\n    Text(\"修饰符\")\n        .font(.title)\n} icon: {\n    Image(\"\
    旗帜\")\n        .opacity(0.25)\n}\n```\n\n上述代码中，标签使用 `.title` 字体显示文本，并以 0.25 的透明度显示旗帜图像，如图\
    \ 4-16 所示。\n\n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig16_HTML.jpg](img/329781_6_En_4_Fig16_HTML.jpg)\n\
    \n图 4-16 在标签视图中修改文本和图像\n\n创建标签视图时，你有三个选项，如图 4-17 所示：\n\n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig17_HTML.jpg](img/329781_6_En_4_Fig17_HTML.jpg)\n\
    \n图 4-17 标签视图显示信息的三种不同方式\n\n- 文本和图标（默认）\n- 仅文本\n- 仅图标\n\n## 为文本或标签视图添加边框\n\n要突出显示文本视图和标签视图，可以在其周围添加边框。边框可以由颜色和宽度组成，例如：\n\
    \n```\n.border(Color.red, width: 3)\n```\n\n当对文本或标签视图使用 `.border` 修饰符时，边框会紧密包裹内部的文本，如图\
    \ 4-18 所示。\n\n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig18_HTML.jpg](img/329781_6_En_4_Fig18_HTML.jpg)\n\
    \n图 4-18 边框紧密包裹文本或标签视图内部的文本\n\n如果你不希望边框包裹得太紧，可以首先在文本或标签视图周围添加内边距，然后再应用 `.border`\
    \ 修饰符，如图 4-19 所示。\n\n![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig19_HTML.jpg](img/329781_6_En_4_Fig19_HTML.jpg)\n\
    \n图 4-19 内边距修饰符可以为文本或标签视图周围的边框添加空间\n\n**注意：** 请确保在 `.border` 修饰符之前应用 `.padding`\
    \ 修饰符。否则，如果 `.border` 修饰符出现在前面，SwiftUI 将先绘制边框，再在文本或标签视图周围应用内边距。\n\n## 总结\n\n文本视图便于在用户界面上显示任何类型的文本信息。即使需要显示数字、日期或其他数据类型，你也可以使用字符串插值在文本视图中显示数据。标签视图与文本视图类似。\n\
    \n文本视图仅显示文本，而标签视图可以并排显示图像和文本。标签视图可以显示 SF Symbols 应用中列出的图标，或你添加到 Xcode 项目 `Assets`\
    \ 文件夹中的任何图像。通过对标签视图应用不同的样式，你可以显示文本和图标、仅文本或仅图标。通过使用文本视图或标签视图，你的应用可以在用户界面上显示信息供用户查看。\n\
    \n# 5. 使用图像\n\n大多数用户界面由文本组成，但仅靠文本可能显得单调。这就是为什么屏幕上第二常见的显示信息类型是图像。图像可以纯粹用于装饰目的，也可以帮助用户在用户界面中进行导航。\n\
    \n最常见的显示图像类型是图标。SF Symbols 应用 ([`https://developer.apple.com/sf-symbols/`](https://developer.apple.com/sf-symbols/))\
    \ 列出了所有可以包含在应用用户界面中的可用图标。除了这些图标，你还可以包含拖拽到 Xcode 项目 `Assets` 文件夹中的任何图像。此外，你还可以包含常见的形状，如矩形或圆形，这些形状可以显示在屏幕上。\n\
    \n图像允许你通过在屏幕上显示彩色或信息丰富的图形来美化任何用户界面的外观。每当你创建用户界面时，请思考如何添加图形图像，以使你的用户界面在视觉上更吸引用户。\n"
- fmt: '# Displaying Shapes


    The simplest image to add to a user interface is common geometric shapes. Geometric
    shapes can be used alone or placed in the background behind other types of views
    (such as a `Text` view) for decorative purposes. The five common geometric shapes
    are shown in Figure [5-1](#329781_6_En_5_Chapter.xhtml#Fig1):


    ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig1_HTML.jpg](images/329781_6_En_5_Chapter/329781_6_En_5_Fig1_HTML.jpg)


    Figure 5-1


    The five different types of geometric shapes available in SwiftUI


    *   `Capsule`

    *   `Circle`

    *   `Ellipse`

    *   `Rectangle`

    *   `RoundedRectangle(cornerRadius: x)`


    To create any of these geometric shapes, just state the name of the shape you
    want such as `Circle()`. The only exception is the rounded rectangle that requires
    a corner radius value that defines how curved the corners appear. The lower the
    value, the sharper the corners appear where a corner radius of 0 creates a 90-degree
    corner just like an ordinary rectangle. The higher the corner radius value, the
    more the rounded rectangle starts to resemble a capsule.


    ## Coloring a Shape


    Since the default color of every geometric shape is black, you may want to choose
    a different color for your shapes. To add color to a shape, you can use the `fill`
    modifier like this:


    ```

    Capsule()

    .fill(Color.yellow)

    ```


    In case you don’t like using any of the standard colors (`green`, `red`, `yellow`,
    `blue`, etc.), you can also define your own colors by defining red, green, and
    blue values or hue, saturation, and brightness values like this:


    ```

    Circle()

    .fill(Color(red: 1.0, green: 0.0, blue: 0.0, opacity: 1.0))

    ```


    Or


    ```

    Ellipse()

    .fill(Color(hue: 1.7, saturation: 2.9, brightness: 0.58))

    ```


    ## Coloring a Shape with Gradients


    Another way to add color is to use gradients that spread two or more colors in
    different ways. SwiftUI offers three types of gradients you can use as shown in
    Figure [5-2](#329781_6_En_5_Chapter.xhtml#Fig2):


    ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig2_HTML.jpg](images/329781_6_En_5_Chapter/329781_6_En_5_Fig2_HTML.jpg)


    Figure 5-2


    The three types of gradients available


    *   Linear gradients

    *   Radial gradients

    *   Angular gradients


    A linear gradient requires defining two or more colors along with a start point
    and an end point. The colors get stored within square brackets, and the start
    and end points can define one of the following positions as shown in Figure [5-3](#329781_6_En_5_Chapter.xhtml#Fig3):


    ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig3_HTML.jpg](images/329781_6_En_5_Chapter/329781_6_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Positions of different starting/ending points for a linear gradient


    *   `bottom`

    *   `bottomLeading`

    *   `bottomTrailing`

    *   `center`

    *   `leading`

    *   `top`

    *   `topLeading`

    *   `topTrailing`

    *   `trailing`

    *   `zero`


    To create a linear gradient, simply define two or more colors along with a start
    and end point like this:


    ```

    Capsule()

    .fill(LinearGradient(gradient: Gradient(colors: [.blue, .green, .pink]), startPoint:
    .topLeading, endPoint: .bottomTrailing))

    ```


    The radial gradient draws a circular color at a specific location defined by the
    `center` parameter such as `.center` or `.top`. If you choose a value such as
    `.top`, then the gradient center will begin at the top center of a shape as shown
    in Figure [5-4](#329781_6_En_5_Chapter.xhtml#Fig4).


    ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig4_HTML.jpg](images/329781_6_En_5_Chapter/329781_6_En_5_Fig4_HTML.jpg)


    Figure 5-4


    The `center` parameter defines where the center of the radial gradient begins


    The size of the first color is defined by the `startRadius`. The smaller the `startRadius`
    value, the smaller the radius of the first color. The larger the `endRadius` value
    is compared to the `startRadius` value, the more diffuse the colors will blend
    together. The smaller the `endRadius` value is compared to the `startRadius`,
    the sharper the boundaries between colors as shown in Figure [5-5](#329781_6_En_5_Chapter.xhtml#Fig5).


    ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig5_HTML.jpg](images/329781_6_En_5_Chapter/329781_6_En_5_Fig5_HTML.jpg)


    Figure 5-5


    Comparing the `startRadius` and `endRadius` values in a radial gradient


    To create a radial gradient, define two or more colors, where the center of the
    gradient should appear (such as `.center` or `.topLeading`), and the `startRadius`
    and `endRadius` like this:


    ```

    Ellipse()

    .fill(RadialGradient(gradient: Gradient(colors: [.blue, .yellow]), center: .top,
    startRadius: 10, endRadius: 65))

    ```


    While the linear and radial gradients can work just fine with two colors, the
    angular gradient works best with a larger number of colors. If you just define
    two colors for the angular gradient, SwiftUI will display the two colors side
    by side and then where they gradually merge as shown in Figure [5-6](#329781_6_En_5_Chapter.xhtml#Fig6).


    ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig6_HTML.jpg](images/329781_6_En_5_Chapter/329781_6_En_5_Fig6_HTML.jpg)


    Figure 5-6


    An angular gradient displaying just two different colors


    The more colors you define in an angular gradient, the more they can all blend
    together. Besides defining multiple colors, you just need to define the center
    of the angular gradient such as `.center` or `.bottomTrailing`. To create an angular
    gradient, define multiple colors or the same colors multiple times (as shown in
    Figure [5-7](#329781_6_En_5_Chapter.xhtml#Fig7)) along with the center such as


    ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig7_HTML.jpg](images/329781_6_En_5_Chapter/329781_6_En_5_Fig7_HTML.jpg)


    Figure 5-7


    An angular gradient displaying the same colors multiple times


    ```

    Rectangle()

    .fill(AngularGradient(gradient: Gradient(colors: [.green, .blue, .black, .green,
    .blue, .black, .green]), center: .center))

    ```'
