  raw: '### Making Alert/ActionSheet Buttons Responsive


    Just adding Buttons to an Alert or Action Sheet makes those Buttons simply dismiss
    the Alert/Action Sheet when the user selects any of them. Most likely, you’ll
    want Buttons to perform some type of action. To do that, you must first create
    a function that contains code you want to run when the user selects a particular
    Button. Then you must call that function when the user selects a Button.


    To make a Button responsive, you need to add the action: parameter like this:


    ```

    .alert(isPresented: $showAlert) {

    Alert(title: Text("Warning!"),

    message: Text("Zombies on the loose"),

    primaryButton: .default(Text("Default"), action: {

    message = "Default chosen"

    }),

    secondaryButton: .cancel(Text("Cancel"), action: cancelFunction))

    }

    }

    }

    func cancelFunction() {

    message = "Cancel chosen"

    }

    ```


    The first method to using the action: parameter involves curly brackets where
    you can type as many lines of code as you wish. However, the more code you type,
    the more cluttered the entire .alert or .actionSheet will look.


    The second method to using the action: parameter is to call a function. That way,
    the action: code is isolated in a separate function while keeping the .alert or
    .actionSheet code shorter and easier to read.


    No matter which method you choose, selecting any Button will dismiss the Alert
    or Action Sheet from the screen. That’s why if you omit the action: parameter
    completely, selecting that Button will dismiss the Alert or Action Sheet.


    To see how to make Buttons responsive in an Alert, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “AlertResponsiveButtons.”


    2.  Click the ContentView file in the Navigator pane.


    3.  Add the following State variables under the struct ContentView: View line:


    1.  Add a VStack in the var body: some View and put a Text view and a Button inside
    the VStack like this:


    ```

    struct ContentView: View {

    @State var showAlert = false

    @State var message = ""

    ```


    1.  Add an .alert modifier to the Button like this:


    ```

    var body: some View {

    VStack {

    Text(message)

    .padding()

    Button("Show Alert") {

    showAlert.toggle()

    }

    }

    }

    }

    ```


    1.  Add the following function above the last curly bracket in the struct ContentView:
    View like this:


    ```

    .alert(isPresented: $showAlert) {

    Alert(title: Text("Warning!"),

    message: Text("Zombies on the loose"),

    primaryButton: .default(Text("Default"), action: {

    message = "Default chosen"

    }),

    secondaryButton: .cancel(Text("Cancel"), action: cancelFunction))

    }

    ```


    ```

    func cancelFunction() {

    message = "Cancel chosen"

    }

    ```


    The entire ContentView file should look like this:


    1.  Click the Live Preview icon in the Canvas pane and then click the Show Alert
    Button. An Alert appears.


    2.  Click the Cancel or Default Button. Notice that a message appears to let you
    know which Button you chose.


    ```

    import SwiftUI

    struct ContentView: View {

    @State var showAlert = false

    @State var message = ""

    var body: some View {

    VStack {

    Text(message)

    .padding()

    Button("Show Alert") {

    showAlert.toggle()

    }

    .alert(isPresented: $showAlert) {

    Alert(title: Text("Warning!"),

    message: Text("Zombies on the loose"),

    primaryButton: .default(Text("Default"), action: {

    message = "Default chosen"

    }),

    secondaryButton: .cancel(Text("Cancel"), action: cancelFunction))

    }

    }

    }

    func cancelFunction() {

    message = "Cancel chosen"

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    To see how to make Buttons responsive in an Action Sheet, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “ActionSheetResponsiveButtons.”


    2.  Click the ContentView file in the Navigator pane.


    3.  Add the following State variables under the struct ContentView: View line:


    1.  Add a VStack in the var body: some View and put a Text view and a Button inside
    the VStack like this:


    ```

    struct ContentView: View {

    @State var showAlert = false

    @State var message = ""

    ```


    1.  Add an .actionSheet modifier to the Button like this:


    ```

    var body: some View {

    VStack {

    Text(message)

    .padding()

    Button("Show Action Sheet") {

    showAlert.toggle()

    }

    }

    }

    }

    ```


    1.  Add the following function above the last curly bracket in the struct ContentView:
    View like this:


    ```

    .actionSheet(isPresented: $showAlert) {

    ActionSheet(title: Text("Warning!"),

    message: Text("Zombies on the loose"),

    buttons: [

    .default(Text("Default"), action: {

    message = "Default chosen"

    }),

    .cancel(Text("Cancel"), action: cancelFunction),

    .destructive(Text("Destructive"), action: {

    message = "Destructive chosen"

    })])

    }

    ```


    ```

    func cancelFunction() {

    message = "Cancel chosen"

    }

    ```


    The entire ContentView file should look like this:


    1.  Click the Live Preview icon in the Canvas pane and then click the Show Action
    Sheet Button. An Action Sheet appears.


    2.  Click the Cancel, Default, or Destructive Button. Notice that a message appears
    to let you know which Button you chose.


    ```

    import SwiftUI

    struct ContentView: View {

    @State var showAlert = false

    @State var message = ""

    var body: some View {

    VStack {

    Text(message)

    .padding()

    Button("Show Action Sheet") {

    showAlert.toggle()

    }

    .actionSheet(isPresented: $showAlert) {

    ActionSheet(title: Text("Warning!"),

    message: Text("Zombies on the loose"),

    buttons: [

    .default(Text("Default"), action: {

    message = "Default chosen"

    }),

    .cancel(Text("Cancel"), action: cancelFunction),

    .destructive(Text("Destructive"), action: {

    message = "Destructive chosen"

    })])

    }

    }

    }

    func cancelFunction() {

    message = "Cancel chosen"

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```'
