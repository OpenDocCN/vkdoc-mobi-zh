    \ types as well.\n\nRemember from Chapter [6](#329781_6_En_6_Chapter.xhtml), you\
    \ can always turn a `Picker` into a segmented control by just adding `.pickerStyle(SegmentedPickerStyle())`\
    \ modifier to the `Picker` view as shown in Figure [8-3](#329781_6_En_8_Chapter.xhtml#Fig3)\
    \ such as:\n\n![Figure 8-3](images/329781_6_En_8_Chapter/329781_6_En_8_Fig3_HTML.jpg)\n\
    \n**Figure 8-3** – A `Picker` view displayed as a segmented control\n\n```\nPicker(selection:\
    \ $choice, label: Text(\"Picker\")) {\n    Text(\"Bird\").tag(1.7)\n    Text(\"\
    Cat\").tag(2.06)\n    Text(\"Lizard\").tag(3.41)\n    Text(\"Dog\").tag(4.13)\n\
    \    Text(\"Hamster\").tag(5.28)\n}.pickerStyle(SegmentedPickerStyle())\n```\n\
    \n## Using the `ColorPicker`\n\nAn ordinary `Picker` lets you select different\
    \ options displayed in a `Text` view. However, what if you want the user to select\
    \ a particular color? You could list several colors in a `Picker`, but what if\
    \ the user wants to select a custom color? That’s when you can use the `ColorPicker`.\n\
    \nThe `ColorPicker` lets the user select standard colors (red, blue, green, yellow,\
    \ etc.) or custom colors from a grid, a spectrum, or from red, green, blue sliders\
    \ as shown in Figure [8-4](#329781_6_En_8_Chapter.xhtml#Fig4).\n\n![Figure 8-4](images/329781_6_En_8_Chapter/329781_6_En_8_Fig4_HTML.jpg)\n\
    \n**Figure 8-4** – A `ColorPicker` gives you three different options for choosing\
    \ a custom color\n\nTo create a `ColorPicker`, you must first create a `State`\
    \ variable to hold a `Color` data type such as:\n\n```\n@State var myColor = Color.red\n\
    ```\n\nThen you can create a `ColorPicker` by defining a descriptive title followed\
    \ by a link to the `State` variable that represents a `Color` like this:\n\n```\n\
    ColorPicker(\"Pick a color\", selection: $myColor)\n```\n\nTo see how a `ColorPicker`\
    \ works, follow these steps:\n\n1. Create a new SwiftUI iOS App project and give\
    \ it any name you wish such as \"ColorPicker\".\n2. Click the `ContentView` file\
    \ in the Navigator pane.\n3. Add the following `State` variable under the `struct\
    \ ContentView: View` line:\n4. Create a `VStack` and put a rectangle inside. Since\
    \ a rectangle will expand to fill the entire screen, make sure you put a `.frame`\
    \ modifier on it and define its `.foregroundColor` with the previously defined\
    \ `State` variable:\n\n```\nstruct ContentView: View {\n    @State var myColor\
    \ = Color.gray\n```\n\n5. Underneath the `Rectangle()`, define a `ColorPicker`\
    \ that links or binds to the `State` variable:\n\n```\nvar body: some View {\n\
    \    VStack {\n        Rectangle()\n            .frame(width: 200, height: 150)\n\
    \            .foregroundColor(myColor)\n    }\n}\n```\n\n```\nColorPicker(\"Pick\
    \ a color\", selection: $myColor)\n```\n\nThe entire `ContentView` file should\
    \ look like this:\n\n![Figure 8-5](images/329781_6_En_8_Chapter/329781_6_En_8_Fig5_HTML.jpg)\n\
    \n**Figure 8-5** – The `ColorPicker` icon\n\n6. Click the **Live Preview** icon\
    \ in the Canvas pane. Notice that since the `State` variable `myColor` is given\
    \ an initial value of gray, the rectangle initially appears as gray.\n7. Click\
    \ the `ColorPicker` icon, as shown in Figure [8-5](#329781_6_En_8_Chapter.xhtml#Fig5),\
    \ to display the different color options (see Figure [8-4](#329781_6_En_8_Chapter.xhtml#Fig4)).\n\
    \n```\nimport SwiftUI\n\nstruct ContentView: View {\n    @State var myColor =\
    \ Color.gray\n\n    var body: some View {\n        VStack {\n            Rectangle()\n\
    \                .frame(width: 200, height: 150)\n                .foregroundColor(myColor)\n\
    \            ColorPicker(\"Pick a color\", selection: $myColor)\n        }\n \
    \   }\n}\n\nstruct ContentView_Previews: PreviewProvider {\n    static var previews:\
    \ some View {\n        ContentView()\n    }\n}\n```\n\n8. Click a color and then\
    \ click the close (X) icon in the upper right corner of the `ColorPicker` dialog\
    \ to make it go away. Notice that the rectangle now displays the color you chose.\n\
    \n## Using the `DatePicker`\n\nOne common type of data that users need to input\
    \ is dates and times. However, one person might write a date as \"June 14, 2023,\"\
    \ and another might write that same date as \"6/14/23.\" When writing a time,\
    \ one person might type \"6:45 pm,\" and another might type \"18:45.\"\n\nTo make\
    \ it easy for users to enter dates and times, SwiftUI offers the `DatePicker`.\
    \ Instead of typing a date or time, users can simply click the date or time they\
    \ want as shown in Figure [8-6](#329781_6_En_8_Chapter.xhtml#Fig6).\n\n![Figure\
    \ 8-6](images/329781_6_En_8_Chapter/329781_6_En_8_Fig6_HTML.jpg)\n\n**Figure 8-6**\
    \ – The `DatePicker`\n\nTo create a `DatePicker`, you just need to define descriptive\
    \ text and a `State` variable to store the user’s selected date and/or time like\
    \ this:\n\n```\nDatePicker(selection: $myDate, label: { Text(\"Date\") })\n```\n\
    \n### Choosing a Date Picker Style\n\nBy default, a `DatePicker` displays a date\
    \ and time as a field that the user can select. Once selected, the date or time\
    \ then displays the date or time that the user can select. In case you don’t like\
    \ this default, compact format, you can customize the `DatePicker`’s appearance\
    \ using the `.datePickerStyle()` modifier as shown in Figure [8-7](#329781_6_En_8_Chapter.xhtml#Fig7):\n\
    \n![Figure 8-7](images/329781_6_En_8_Chapter/329781_6_En_8_Fig7_HTML.jpg)\n\n\
    **Figure 8-7** – Different styles of the `DatePicker`\n\n* `.compact` – The default\
    \ way to display a date and time. When the user selects a date, a calendar appears\
    \ like in the `.graphical` style. When the user selects a time, different times\
    \ appear like in the `.wheel` style.\n* `.graphical` – Displays dates in a calendar\
    \ but the time as a field. When the user selects a time, different times appear\
    \ like in the `.wheel` style.\n* `.wheel` – Displays dates and times in a wheel.\n\
    \nThe Swift code for creating a `DatePicker` requires just adding a `State` variable\
    \ to store a date and then using that `State` variable. In addition, the `DatePicker`\
    \ lets you define text to appear when the `DatePicker` style is `.compact`:\n\n\
    ```\n@State var myDate = Date.now\nDatePicker(selection: $myDate, label: { Text(\"\
    Date\") })\n    .datePickerStyle(.graphical)\n```\n\n### Displaying a Date and/or\
    \ Time\n\nAlthough the `DatePicker` can let the user select both a date and a\
    \ time, you may only want the `DatePicker` to select either a date or a time.\
    \ To limit the `DatePicker` to displaying just a date or a time, you can add the\
    \ `displayedComponents` parameter and specify either `[.date]` or `[.hourAndMinute]`\
    \ like this:\n\n```\nDatePicker(selection: $myDate, displayedComponents: [.date],\
    \ label: { Text(\"Date\") })\nDatePicker(selection: $myDate, displayedComponents:\
    \ [.hourAndMinute], label: { Text(\"Time\") })\n```"
