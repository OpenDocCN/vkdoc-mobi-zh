    # 在标签栏中以编程方式选择按钮


    用户只需点击标签栏上的标签即可切换不同视图。默认情况下，最左侧的第一个标签会高亮显示。但有时你可能需要通过代码来选择标签。在这种情况下，你需要使用 `.tag`
    修饰符来标识每个 `.tabItem`。


    `.tag` 修饰符允许你使用固定值（如 `2`）来标识每个标签。当每个 `.tabItem` 都有唯一的 `.tag` 值时，你就可以通过引用其 `.tag`
    值，使用 Swift 代码来选择特定的标签。


    要了解如何通过 Swift 代码访问 Tab View 中的标签，请遵循以下步骤：


    1. 创建一个新的 SwiftUI iOS App 项目，并为其命名，例如 “PageView”。

    2. 在导航窗格中点击 `ContentView` 文件。

    3. 在 `struct ContentView: View` 行下添加一个 State 变量，如下所示：


    ```

    struct ContentView: View {

    @State var selectedView = 1

    ```


    4. 在 `var body: some View` 行下添加一个 `VStack` 和一个 `HStack`，并在 `HStack` 内添加四个 Button，如下所示：


    ```

    var body: some View {

    VStack {

    HStack {

    Button ("1") {

    selectedView = 1

    }

    Button ("2") {

    selectedView = 2

    }

    Button ("3") {

    selectedView = 3

    }

    Button ("4") {

    selectedView = 4

    }

    }

    }

    }

    ```


    5. 在 `VStack` 内部、`HStack` 下方添加一个 Tab View，如下所示：


    ```

    TabView (selection: $selectedView){

    Text("One")

    .tabItem {

    Image(systemName: "heart.fill")

    Text("One")

    }.tag(1)

    Text("Two")

    .tabItem {

    Image(systemName: "hare.fill")

    Text("Two")

    }.tag(2)

    Text("Three")

    .tabItem {

    Image(systemName: "tortoise.fill")

    Text("Three")

    }.tag(3)

    Text("Four")

    .tabItem {

    Image(systemName: "folder.fill")

    Text("Four")

    }.tag(4)

    }

    ```


    整个 `ContentView` 文件应如下所示：


    ```

