- fmt: "# 12. Using Alerts, Action Sheets, and Contextual Menus\n\nAlmost every app\
    \ needs to display and accept data from the user. The simplest way to display\
    \ data is through a `Text` view, but sometimes you need to display data and give\
    \ the user a way to respond. In that case, you can use an `Alert` or an `ActionSheet`.\
    \ Yet another way to display options to the user is Contextual Menus.\n\nAn `Alert`\
    \ pops up on the screen, giving the user a chance to respond. Then users can dismiss\
    \ the `Alert` by tapping one or more buttons as shown in Figure 12-1.\n\n![../images/329781_6_En_12_Chapter/329781_6_En_12_Fig1_HTML.jpg](images/329781_6_En_12_Chapter/329781_6_En_12_Fig1_HTML.jpg)\n\
    \nFigure 12-1 An `Alert` typically displays a message and one or more buttons\n\
    \nAn `ActionSheet` looks nearly identical to an `Alert` except that the `Alert`\
    \ appears in the middle of the screen, while the `ActionSheet` slides up from\
    \ the bottom of the screen. `Alert`s are meant more to grab the user’s attention\
    \ such as warning if you’re about to delete data that you won’t be able to retrieve\
    \ or undo later. On the other hand, `ActionSheet`s are meant more as a reminder\
    \ that may not be as crucial or destructive.\n\nContextual Menus appear after\
    \ a long press gesture on a view such as a `Text` view. Then it pops up as a list\
    \ of options that the user can select as shown in Figure 12-2.\n\n![../images/329781_6_En_12_Chapter/329781_6_En_12_Fig2_HTML.jpg](images/329781_6_En_12_Chapter/329781_6_En_12_Fig2_HTML.jpg)\n\
    \nFigure 12-2 A Contextual Menu lists multiple options to select\n\n## Displaying\
    \ an Alert/Action Sheet\n\nEvery user interface needs to display data back to\
    \ the user. In some cases, this data can be displayed just in a label, but sometimes\
    \ you need to make sure the user sees certain information.\n\nAn `Alert`/`ActionSheet`\
    \ appears over an app’s user interface and can be customized by changing the following\
    \ properties:\n\n- `Title` – Text that appears at the top of the `Alert`/`ActionSheet`,\
    \ often in bold and a large font size\n- `Message` – Text that appears underneath\
    \ the title in a smaller font size\n- One or more `Button`s – A `Button` that\
    \ can dismiss the `Alert`/`ActionSheet`\n\nA title typically consists of a single\
    \ word or short phrase that explains the purpose such as displaying “Warning”\
    \ or “Log In.” To dismiss an `Alert`/`ActionSheet`, you need at least one button.\n\
    \nTo see how to create a simple `Alert`/`ActionSheet` that does nothing but display\
    \ a title, a message, and a button to dismiss it, follow these steps:\n\n1. Create\
    \ a new SwiftUI iOS App project and give it any name you wish such as “Alert.”\n\
    2. Click the `ContentView` file in the Navigator pane.\n3. Add the following State\
    \ variable under the `struct ContentView: View` line:\n\n```swift\n@State var\
    \ showAlert = false\n```\n\n4. Add a `VStack` with a `Button` like this:\n\n```swift\n\
    var body: some View {\n    VStack {\n        Button(\"Show Alert\") {\n      \
    \      showAlert.toggle()\n        }\n    }\n}\n```\n\n5. Add the `.alert` modifier\
    \ to the `Button` like this:\n\n```swift\n.alert(isPresented: $showAlert) {\n\
    \    Alert(title: Text(\"Warning!\"), message: Text(\"Zombies on the loose\"),\
    \ dismissButton: .default(Text(\"OK\")))\n}\n```\n\nThis `.alert` modifier shows\
    \ an `Alert` when the `showAlert` State variable is `true`. Then it uses a `Text`\
    \ view to display “Warning!” and a second `Text` view to display “Zombies on the\
    \ loose.” Finally, it uses a third `Text` view to display “OK” on a `Button`.\n\
    \n**Note**  \nThe `Alert` uses a `dismissButton:` parameter to define a single\
    \ button to appear. To make the code shorter, you can define the `Button`’s appearance\
    \ by just using the style (`.default`) instead of the longer version like this:\
    \ `Alert.Button.default`.\n\nThe entire `ContentView` file should look like this:\n\
    \n```swift\nimport SwiftUI\n\nstruct ContentView: View {\n    @State var showAlert\
    \ = false\n    var body: some View {\n        VStack {\n            Button(\"\
    Show Alert\") {\n                showAlert.toggle()\n            }\n         \
    \   .alert(isPresented: $showAlert) {\n                Alert(title: Text(\"Warning!\"\
    ), message: Text(\"Zombies on the loose\"), dismissButton: .default(Text(\"OK\"\
    )))\n            }\n        }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \n6. Click the Live Preview icon on the Canvas pane and then click the `Button`\
    \ to display the `Alert` (see Figure 12-1) in the middle of the screen.\n7. Click\
    \ OK to make the `Alert` go away.\n8. Replace `.alert` with `.actionSheet` like\
    \ this:\n\n```swift\n.actionSheet(isPresented: $showAlert) {\n    ActionSheet(title:\
    \ Text(\"Warning!\"), message: Text(\"Zombies on the loose\"), buttons: [.default(Text(\"\
    OK\"))])\n}\n```\n\n**Note**  \nWhere the `Alert` defined a `Button` using the\
    \ `dismissButton:` parameter, the `ActionSheet` uses the `buttons:` parameter\
    \ and encloses one or more buttons inside square brackets `[ ]` like an array.\
    \ To make the code shorter, you can define the `Button`’s appearance by just using\
    \ the style (`.default`) instead of the longer version like this: `ActionSheet.Button.default`.\n\
    \n9. Click the `Button` on the simulated iOS screen. Notice that now an `ActionSheet`\
    \ appears at the bottom of the screen.\n10. Click the OK button to make the `ActionSheet`\
    \ go away.\n\nCreating an `Alert` or an `ActionSheet` is nearly identical but\
    \ with minor differences in defining buttons and whether you use `.alert` (and\
    \ `Alert`) or `.actionSheet` (and `ActionSheet`)."
  raw: '# 12. Using Alerts, Action Sheets, and Contextual Menus


    Almost every app needs to display and accept data from the user. The simplest
    way to display data is through a Text view, but sometimes you need to display
    data and give the user a way to respond. In that case, you can use an Alert or
    an Action Sheet. Yet another way to display options to the user is Contextual
    Menus.


    An Alert pops up on the screen, giving the user a chance to respond. Then users
    can dismiss the Alert by tapping one or more buttons as shown in Figure [12-1](#329781_6_En_12_Chapter.xhtml#Fig1).


    ![../images/329781_6_En_12_Chapter/329781_6_En_12_Fig1_HTML.jpg](images/329781_6_En_12_Chapter/329781_6_En_12_Fig1_HTML.jpg)


    Figure 12-1


    An Alert typically displays a message and one or more buttons


    An Action Sheet looks nearly identical to an Alert except that the Alert appears
    in the middle of the screen, while the Action Sheet slides up from the bottom
    of the screen. Alerts are meant more to grab the user’s attention such as warning
    if you’re about to delete data that you won’t be able to retrieve or undo later.
    On the other hand, Action Sheets are meant more as a reminder that may not be
    as crucial or destructive.


    Contextual Menus appear after a long press gesture on a view such as a Text view.
    Then it pops up as a list of options that the user can select as shown in Figure
    [12-2](#329781_6_En_12_Chapter.xhtml#Fig2).


    ![../images/329781_6_En_12_Chapter/329781_6_En_12_Fig2_HTML.jpg](images/329781_6_En_12_Chapter/329781_6_En_12_Fig2_HTML.jpg)


    Figure 12-2


    A Contextual Menu lists multiple options to select


    ## Displaying an Alert/Action Sheet


    Every user interface needs to display data back to the user. In some cases, this
    data can be displayed just in a label, but sometimes you need to make sure the
    user sees certain information.


    An Alert/Action Sheet appears over an app’s user interface and can be customized
    by changing the following properties:


    *   Title – Text that appears at the top of the Alert/Action Sheet, often in bold
    and a large font size


    *   Message – Text that appears underneath the title in a smaller font size


    *   One or more Buttons – A Button that can dismiss the Alert/Action Sheet


    A title typically consists of a single word or short phrase that explains the
    purpose such as displaying “Warning” or “Log In.” To dismiss an Alert/Action Sheet,
    you need at least one button.


    To see how to create a simple Alert/Action Sheet that does nothing but display
    a title, a message, and a button to dismiss it, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “Alert.”


    2.  Click the ContentView file in the Navigator pane.


    3.  Add the following State variable under the struct ContentView: View line:


    1.  Add a VStack with a Button like this:


    ```

    struct ContentView: View {

    @State var showAlert = false

    ```


    1.  Add the .alert modifier to the Button like this:


    ```

    var body: some View {

    VStack {

    Button("Show Alert") {

    showAlert.toggle()

    }

    }

    ```


    ```

    .alert(isPresented: $showAlert) {

    Alert(title: Text("Warning!"), message: Text("Zombies on the loose"), dismissButton:
    .default(Text("OK")))

    }

    ```


    This .alert modifier shows an Alert when the showAlert State variable is true.
    Then it uses a Text view to display “Warning!” and a second Text view to display
    “Zombies on the loose.” Finally, it uses a third Text view to display “OK” on
    a Button.


    Note


    The Alert uses a dismissButton: parameter to define a single button to appear.
    To make the code shorter, you can define the Button’s appearance by just using
    the style (.default) instead of the longer version like this: Alert.Button.default.


    The entire ContentView file should look like this:


    1.  Click the Live Preview icon on the Canvas pane and then click the Button to
    display the Alert (see Figure [12-1](#329781_6_En_12_Chapter.xhtml#Fig1)) in the
    middle of the screen.


    2.  Click OK to make the Alert go away.


    3.  Replace .alert with .actionSheet like this:


    ```

    import SwiftUI

    struct ContentView: View {

    @State var showAlert = false

    var body: some View {

    VStack {

    Button("Show Alert") {

    showAlert.toggle()

    }

    .alert(isPresented: $showAlert) {

    Alert(title: Text("Warning!"), message: Text("Zombies on the loose"), dismissButton:
    .default(Text("OK")))

    }

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    ```

    .actionSheet(isPresented: $showAlert) {

    ActionSheet(title: Text("Warning!"), message: Text("Zombies on the loose"), buttons:
    [.default(Text("OK"))])

    }

    ```


    Note


    Where the Alert defined a Button using the dismissButton: parameter, the ActionSheet
    uses the buttons: parameter and encloses one or more buttons inside square brackets
    [ ] like an array. To make the code shorter, you can define the Button’s appearance
    by just using the style (.default) instead of the longer version like this: ActionSheet.Button.default.


    1.  Click the Button on the simulated iOS screen. Notice that now an Action Sheet
    appears at the bottom of the screen.


    2.  Click the OK button to make the Action Sheet go away.


    Creating an Alert or an Action Sheet is nearly identical but with minor differences
    in defining buttons and whether you use .alert (and Alert) or .actionSheet (and
    ActionSheet).'
  trans: "\n# 12. 使用警告框、操作列表和上下文菜单\n\n几乎每个应用程序都需要向用户显示信息并接收数据。显示数据最简单的方式是通过一个`Text`视图，但有时你需要展示数据并让用户能够进行回应。在这种情况下，你可以使用`Alert`或`ActionSheet`。另一种向用户展示选项的方式是上下文菜单。\n\
    \n一个`Alert`会弹出在屏幕上，给用户一个回应的机会。然后用户可以通过点击一个或多个按钮来关闭这个`Alert`，如图 12-1 所示。\n\n![../images/329781_6_En_12_Chapter/329781_6_En_12_Fig1_HTML.jpg](img/329781_6_En_12_Fig1_HTML.jpg)\n\
    \n图 12-1 一个典型的`Alert`会显示一条信息和一或多个按钮\n\n一个`ActionSheet`看起来几乎与`Alert`一模一样，区别在于`Alert`出现在屏幕中央，而`ActionSheet`从屏幕底部向上滑出。`Alert`更多地是为了吸引用户的注意力，比如警告你将删除那些之后无法找回或撤销的数据。另一方面，`ActionSheet`更像是一种提醒，可能不那么关键或具有破坏性。\n\
    \n上下文菜单会在对某个视图（例如`Text`视图）执行长按手势后出现。然后它会弹出一个选项列表供用户选择，如图 12-2 所示。\n\n![../images/329781_6_En_12_Chapter/329781_6_En_12_Fig2_HTML.jpg](img/329781_6_En_12_Fig2_HTML.jpg)\n\
    \n图 12-2 上下文菜单列出多个选项供选择\n\n## 显示警告框/操作列表\n\n每个用户界面都需要向用户回显数据。在某些情况下，这些数据可以通过标签直接显示，但有时你需要确保用户看到特定信息。\n\
    \n`Alert`/`ActionSheet`会覆盖在应用程序的用户界面上，并可以通过更改以下属性进行定制：\n\n- `Title` – 出现在`Alert`/`ActionSheet`顶部的文本，通常为粗体和大号字体\n\
    - `Message` – 出现在标题下方、字体较小的文本\n- 一个或多个`Button` – 可以关闭`Alert`/`ActionSheet`的按钮\n\
    \n标题通常由单个单词或简短短语组成，用于说明其目的，例如显示“警告”或“登录”。要关闭`Alert`/`ActionSheet`，你至少需要一个按钮。\n\
    \n要了解如何创建一个仅显示标题、消息和一个关闭按钮的简单`Alert`/`ActionSheet`，请按照以下步骤操作：\n\n1. 创建一个新的 SwiftUI\
    \ iOS App 项目，并为其任意命名，例如“Alert”。\n2. 在导航器窗格中点击`ContentView`文件。\n3. 在`struct ContentView:\
    \ View`这一行下方添加以下 State 变量：\n\n```swift\n@State var showAlert = false\n```\n\n\
    4. 像这样添加一个包含`Button`的`VStack`：\n\n```swift\nvar body: some View {\n    VStack\
    \ {\n        Button(\"Show Alert\") {\n            showAlert.toggle()\n      \
    \  }\n    }\n}\n```\n\n5. 像这样为`Button`添加`.alert`修饰符：\n\n```swift\n.alert(isPresented:\
    \ $showAlert) {\n    Alert(title: Text(\"Warning!\"), message: Text(\"Zombies\
    \ on the loose\"), dismissButton: .default(Text(\"OK\")))\n}\n```\n\n当`showAlert`\
    \ State 变量为`true`时，这个`.alert`修饰符会显示一个`Alert`。然后它使用一个`Text`视图显示“Warning!”，并使用第二个`Text`视图显示“Zombies\
    \ on the loose.”。最后，它使用第三个`Text`视图在`Button`上显示“OK”。\n\n**注意**  \n`Alert`使用`dismissButton:`参数定义要显示的单个按钮。为了简化代码，你可以直接使用样式（`.default`）来定义`Button`的外观，而不是使用更长的版本，如下所示：`Alert.Button.default`。\n\
    \n整个`ContentView`文件应该如下所示：\n\n```swift\nimport SwiftUI\n\nstruct ContentView:\
    \ View {\n    @State var showAlert = false\n    var body: some View {\n      \
    \  VStack {\n            Button(\"Show Alert\") {\n                showAlert.toggle()\n\
    \            }\n            .alert(isPresented: $showAlert) {\n              \
    \  Alert(title: Text(\"Warning!\"), message: Text(\"Zombies on the loose\"), dismissButton:\
    \ .default(Text(\"OK\")))\n            }\n        }\n    }\n}\n\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```\n\n6. 点击画布上的实时预览图标，然后点击`Button`，`Alert`就会显示在屏幕中央（参见图 12-1）。\n7.\
    \ 点击 OK 按钮让`Alert`消失。\n8. 像这样将`.alert`替换为`.actionSheet`：\n\n```swift\n.actionSheet(isPresented:\
    \ $showAlert) {\n    ActionSheet(title: Text(\"Warning!\"), message: Text(\"Zombies\
    \ on the loose\"), buttons: [.default(Text(\"OK\"))])\n}\n```\n\n**注意**  \n`Alert`使用`dismissButton:`参数定义按钮，而`ActionSheet`则使用`buttons:`参数，并将一个或多个按钮像数组一样放在方括号`[\
    \ ]`内。为了简化代码，你可以直接使用样式（`.default`）来定义`Button`的外观，而不是使用更长的版本，如下所示：`ActionSheet.Button.default`。\n\
    \n9. 在模拟的 iOS 屏幕上点击`Button`。注意，此时一个`ActionSheet`会出现在屏幕底部。\n10. 点击 OK 按钮让`ActionSheet`消失。\n\
    \n创建`Alert`或`ActionSheet`几乎完全相同，仅在定义按钮以及使用`.alert`（和`Alert`）还是`.actionSheet`（和`ActionSheet`）上存在微小差异。\n"
- fmt: "### Displaying and Responding to Multiple Buttons\n\nThe simplest Alert/Action\
    \ Sheet displays a single button that allows the user to dismiss it. However,\
    \ you may want to give the user more than one option to choose and then respond\
    \ differently depending on which button the user taps.\n\nAn Alert can display\
    \ up to two buttons called a `primaryButton` and a `secondaryButton`. An ActionSheet\
    \ can display up to three buttons. For each button you want to display, you can\
    \ choose one of three styles as shown in Figure [12-3](#329781_6_En_12_Chapter.xhtml#Fig3):\n\
    \n![../images/329781_6_En_12_Chapter/329781_6_En_12_Fig3_HTML.jpg](images/329781_6_En_12_Chapter/329781_6_En_12_Fig3_HTML.jpg)\n\
    \n**Figure 12-3** The three different styles for buttons\n\n- `.default` – Displays\
    \ text in blue\n- `.destructive` – Displays text in red\n- `.cancel` – Displays\
    \ text in bold\n\nTo see how to create an Alert that displays two buttons, follow\
    \ these steps:\n\n1. Create a new SwiftUI iOS App project and give it any name\
    \ you wish such as \"AlertTwoButtons.\"\n2. Click the `ContentView` file in the\
    \ Navigator pane.\n3. Add the following `State` variable under the `struct ContentView:\
    \ View` line:\n   - Add a `VStack` and a `Button` inside the `var body: some View`\
    \ like this:\n\n   ```\n   struct ContentView: View {\n       @State var showAlert\
    \ = false\n   ```\n\n   ```\n   var body: some View {\n       VStack {\n     \
    \      Button(\"Show Alert\") {\n               showAlert.toggle()\n         \
    \  }\n       }\n   }\n   ```\n\n4. Add an `.alert` modifier to the `Button` like\
    \ this:\n\n   ```\n   .alert(isPresented: $showAlert) {\n       Alert(title: Text(\"\
    Warning!\"),\n             message: Text(\"Zombies on the loose\"),\n        \
    \     primaryButton: .default(Text(\"Default\")),\n             secondaryButton:\
    \ .cancel(Text(\"Cancel\")))\n   }\n   ```\n\nFor either the `primaryButton` or\
    \ `secondaryButton`, you can use the `.destructive` button type instead just to\
    \ see how the button's appearance changes within an Alert. The entire `ContentView`\
    \ file should look like this:\n\n```\nimport SwiftUI\n\nstruct ContentView: View\
    \ {\n    @State var showAlert = false\n\n    var body: some View {\n        VStack\
    \ {\n            Button(\"Show Alert\") {\n                showAlert.toggle()\n\
    \            }\n            .alert(isPresented: $showAlert) {\n              \
    \  Alert(title: Text(\"Warning!\"),\n                      message: Text(\"Zombies\
    \ on the loose\"),\n                      primaryButton: .default(Text(\"Default\"\
    )),\n                      secondaryButton: .cancel(Text(\"Cancel\")))\n     \
    \       }\n        }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \n5. Click the Live Preview icon in the Canvas pane and then click the \"Show\
    \ Alert\" Button. The Alert appears.\n6. Click either the \"Default\" or \"Cancel\"\
    \ Button to make the Alert go away.\n\nTo see how to create an Action Sheet that\
    \ displays three buttons, follow these steps:\n\n1. Create a new SwiftUI iOS App\
    \ project and give it any name you wish such as \"ActionSheetButtons.\"\n2. Click\
    \ the `ContentView` file in the Navigator pane.\n3. Add the following `State`\
    \ variable under the `struct ContentView: View` line:\n   - Add a `VStack` and\
    \ a `Button` inside the `var body: some View` like this:\n\n   ```\n   struct\
    \ ContentView: View {\n       @State var showAlert = false\n   ```\n\n   ```\n\
    \   var body: some View {\n       VStack {\n           Button(\"Show Action Sheet\"\
    ) {\n               showAlert.toggle()\n           }\n       }\n   }\n   ```\n\
    \n4. Add an `.actionSheet` modifier to the `Button` like this:\n\n   ```\n   .actionSheet(isPresented:\
    \ $showAlert) {\n       ActionSheet(title: Text(\"Warning!\"),\n             \
    \      message: Text(\"Zombies on the loose\"),\n                   buttons: [\n\
    \                       .default(Text(\"Default\")),\n                       .cancel(Text(\"\
    Cancel\")),\n                       .destructive(Text(\"Destructive\"))])\n  \
    \ }\n   ```\n\nThe entire `ContentView` file should look like this:\n\n```\nimport\
    \ SwiftUI\n\nstruct ContentView: View {\n    @State var showAlert = false\n\n\
    \    var body: some View {\n        VStack {\n            Button(\"Show Action\
    \ Sheet\") {\n                showAlert.toggle()\n            }\n            .actionSheet(isPresented:\
    \ $showAlert) {\n                ActionSheet(title: Text(\"Warning!\"),\n    \
    \                        message: Text(\"Zombies on the loose\"),\n          \
    \                  buttons: [\n                                .default(Text(\"\
    Default\")),\n                                .cancel(Text(\"Cancel\")),\n   \
    \                             .destructive(Text(\"Destructive\"))])\n        \
    \    }\n        }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider {\n\
    \    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\n\
    5. Click the Live Preview icon in the Canvas pane and then click the \"Show Action\
    \ Sheet\" Button. The Action Sheet appears at the bottom of the simulated iOS\
    \ screen.\n6. Click the \"Default,\" \"Cancel,\" or \"Destructive\" Button to\
    \ make the Action Sheet go away."
  raw: '### Displaying and Responding to Multiple Buttons


    The simplest Alert/Action Sheet displays a single button that allows the user
    to dismiss it. However, you may want to give the user more than one option to
    choose and then respond differently depending on which button the user taps.


    An Alert can display up to two buttons called a primaryButton: and a secondaryButton:.
    An ActionSheet can display up to three buttons. For each button you want to display,
    you can choose one of three styles as shown in Figure [12-3](#329781_6_En_12_Chapter.xhtml#Fig3):


    ![../images/329781_6_En_12_Chapter/329781_6_En_12_Fig3_HTML.jpg](images/329781_6_En_12_Chapter/329781_6_En_12_Fig3_HTML.jpg)


    Figure 12-3


    The three different styles for buttons


    *   .default – Displays text in blue


    *   .destructive – Displays text in red


    *   .cancel – Displays text in bold


    To see how to create an Alert that displays two buttons, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “AlertTwoButtons.”


    2.  Click the ContentView file in the Navigator pane.


    3.  Add the following State variable under the struct ContentView: View line:


    1.  Add a VStack and a Button inside the var body: some View like this:


    ```

    struct ContentView: View {

    @State var showAlert = false

    ```


    1.  Add an .alert modifier to the Button like this:


    ```

    var body: some View {

    VStack {

    Button("Show Alert") {

    showAlert.toggle()

    }

    }

    }

    ```


    ```

    .alert(isPresented: $showAlert) {

    Alert(title: Text("Warning!"),

    message: Text("Zombies on the loose"),

    primaryButton: .default(Text("Default")),

    secondaryButton: .cancel(Text("Cancel")))

    }

    ```


    For either the primaryButton or secondaryButton, you can use the .destructive
    button type instead just to see how the button’s appearance changes within an
    Alert. The entire ContentView file should look like this:


    1.  Click the Live Preview icon in the Canvas pane and then click the “Show Alert”
    Button. The Alert appears.


    2.  Click either the “Default” or “Cancel” Button to make the Alert go away.


    ```

    import SwiftUI

    struct ContentView: View {

    @State var showAlert = false

    var body: some View {

    VStack {

    Button("Show Alert") {

    showAlert.toggle()

    }

    .alert(isPresented: $showAlert) {

    Alert(title: Text("Warning!"),

    message: Text("Zombies on the loose"),

    primaryButton: .default(Text("Default")),

    secondaryButton: .cancel(Text("Cancel")))

    }

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    To see how to create an Action Sheet that displays three buttons, follow these
    steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “ActionSheetButtons.”


    2.  Click the ContentView file in the Navigator pane.


    3.  Add the following State variable under the struct ContentView: View line:


    1.  Add a VStack and a Button inside the var body: some View like this:


    ```

    struct ContentView: View {

    @State var showAlert = false

    ```


    1.  Add an .actionSheet modifier to the Button like this:


    ```

    var body: some View {

    VStack {

    Button("Show Action Sheet") {

    showAlert.toggle()

    }

    }

    }

    ```


    ```

    .actionSheet(isPresented: $showAlert) {

    ActionSheet(title: Text("Warning!"),

    message: Text("Zombies on the loose"),

    buttons: [

    .default(Text("Default")),

    .cancel(Text("Cancel")),

    .destructive(Text("Destructive"))])

    }

    ```


    The entire ContentView file should look like this:


    1.  Click the Live Preview icon in the Canvas pane and then click the “Show Action
    Sheet” Button. The Action Sheet appears at the bottom of the simulated iOS screen.


    2.  Click the “Default,” “Cancel,” or “Destructive” Button to make the Action
    Sheet go away.


    ```

    import SwiftUI

    struct ContentView: View {

    @State var showAlert = false

    var body: some View {

    VStack {

    Button("Show Action Sheet") {

    showAlert.toggle()

    }

    .actionSheet(isPresented: $showAlert) {

    ActionSheet(title: Text("Warning!"),

    message: Text("Zombies on the loose"),

    buttons: [

    .default(Text("Default")),

    .cancel(Text("Cancel")),

    .destructive(Text("Destructive"))])

    }

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```'
  trans: "\n### 显示和响应多个按钮\n\n最简单的提醒/操作表会显示单个按钮，让用户能够将其关闭。然而，你可能希望为用户提供多个选项，并根据用户点击的按钮做出不同响应。\n\
    \n一个提醒最多可以显示两个按钮，分别称为 `primaryButton` 和 `secondaryButton`。一个操作表最多可以显示三个按钮。对于每个要显示的按钮，你可以从如图\
    \ 12-3 所示的三种样式中选择一种：\n\n![../images/329781_6_En_12_Chapter/329781_6_En_12_Fig3_HTML.jpg](img/329781_6_En_12_Fig3_HTML.jpg)\n\
    \n**图 12-3** 按钮的三种不同样式\n\n- `.default` – 以蓝色显示文本\n- `.destructive` – 以红色显示文本\n\
    - `.cancel` – 以粗体显示文本\n\n要了解如何创建显示两个按钮的提醒，请按照以下步骤操作：\n\n1.  创建一个新的 SwiftUI iOS\
    \ 应用项目，并为其任意命名，例如 \"AlertTwoButtons\"。\n2.  单击导航窗格中的 `ContentView` 文件。\n3.  在\
    \ `struct ContentView: View` 行下方添加以下 `State` 变量：\n    -   在 `var body: some View`\
    \ 内部添加一个 `VStack` 和一个 `Button`，如下所示：\n\n    ```\n    struct ContentView: View\
    \ {\n        @State var showAlert = false\n    ```\n\n    ```\n    var body: some\
    \ View {\n        VStack {\n            Button(\"Show Alert\") {\n           \
    \     showAlert.toggle()\n            }\n        }\n    }\n    ```\n\n4.  为 `Button`\
    \ 添加一个 `.alert` 修饰符，如下所示：\n\n    ```\n    .alert(isPresented: $showAlert) {\n\
    \        Alert(title: Text(\"Warning!\"),\n              message: Text(\"Zombies\
    \ on the loose\"),\n              primaryButton: .default(Text(\"Default\")),\n\
    \              secondaryButton: .cancel(Text(\"Cancel\")))\n    }\n    ```\n\n\
    对于 `primaryButton` 或 `secondaryButton`，你也可以改用 `.destructive` 按钮类型，来观察按钮在提醒中的外观变化。整个\
    \ `ContentView` 文件应如下所示：\n\n```\nimport SwiftUI\n\nstruct ContentView: View {\n\
    \    @State var showAlert = false\n\n    var body: some View {\n        VStack\
    \ {\n            Button(\"Show Alert\") {\n                showAlert.toggle()\n\
    \            }\n            .alert(isPresented: $showAlert) {\n              \
    \  Alert(title: Text(\"Warning!\"),\n                      message: Text(\"Zombies\
    \ on the loose\"),\n                      primaryButton: .default(Text(\"Default\"\
    )),\n                      secondaryButton: .cancel(Text(\"Cancel\")))\n     \
    \       }\n        }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \n5.  单击画布窗格中的“实时预览”图标，然后单击“Show Alert”按钮。提醒会显示出来。\n6.  单击“Default”或“Cancel”按钮以关闭提醒。\n\
    \n要了解如何创建显示三个按钮的操作表，请按照以下步骤操作：\n\n1.  创建一个新的 SwiftUI iOS 应用项目，并为其任意命名，例如 \"ActionSheetButtons\"\
    。\n2.  单击导航窗格中的 `ContentView` 文件。\n3.  在 `struct ContentView: View` 行下方添加以下 `State`\
    \ 变量：\n    -   在 `var body: some View` 内部添加一个 `VStack` 和一个 `Button`，如下所示：\n\n\
    \    ```\n    struct ContentView: View {\n        @State var showAlert = false\n\
    \    ```\n\n    ```\n    var body: some View {\n        VStack {\n           \
    \ Button(\"Show Action Sheet\") {\n                showAlert.toggle()\n      \
    \      }\n        }\n    }\n    ```\n\n4.  为 `Button` 添加一个 `.actionSheet` 修饰符，如下所示：\n\
    \n    ```\n    .actionSheet(isPresented: $showAlert) {\n        ActionSheet(title:\
    \ Text(\"Warning!\"),\n                    message: Text(\"Zombies on the loose\"\
    ),\n                    buttons: [\n                        .default(Text(\"Default\"\
    )),\n                        .cancel(Text(\"Cancel\")),\n                    \
    \    .destructive(Text(\"Destructive\"))])\n    }\n    ```\n\n整个 `ContentView`\
    \ 文件应如下所示：\n\n```\nimport SwiftUI\n\nstruct ContentView: View {\n    @State var\
    \ showAlert = false\n\n    var body: some View {\n        VStack {\n         \
    \   Button(\"Show Action Sheet\") {\n                showAlert.toggle()\n    \
    \        }\n            .actionSheet(isPresented: $showAlert) {\n            \
    \    ActionSheet(title: Text(\"Warning!\"),\n                            message:\
    \ Text(\"Zombies on the loose\"),\n                            buttons: [\n  \
    \                              .default(Text(\"Default\")),\n                \
    \                .cancel(Text(\"Cancel\")),\n                                .destructive(Text(\"\
    Destructive\"))])\n            }\n        }\n    }\n}\n\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```\n\n5.  单击画布窗格中的“实时预览”图标，然后单击“Show Action Sheet”按钮。操作表会出现在模拟的 iOS\
    \ 屏幕底部。\n6.  单击“Default”、“Cancel”或“Destructive”按钮以关闭操作表。\n"
- fmt: "### Making Alert/ActionSheet Buttons Responsive\n\nJust adding Buttons to\
    \ an Alert or Action Sheet makes those Buttons simply dismiss the Alert/Action\
    \ Sheet when the user selects any of them. Most likely, you’ll want Buttons to\
    \ perform some type of action. To do that, you must first create a function that\
    \ contains code you want to run when the user selects a particular Button. Then\
    \ you must call that function when the user selects a Button.\n\nTo make a Button\
    \ responsive, you need to add the `action:` parameter like this:\n\n```\n.alert(isPresented:\
    \ $showAlert) {\nAlert(title: Text(\"Warning!\"),\nmessage: Text(\"Zombies on\
    \ the loose\"),\nprimaryButton: .default(Text(\"Default\"), action: {\nmessage\
    \ = \"Default chosen\"\n}),\nsecondaryButton: .cancel(Text(\"Cancel\"), action:\
    \ cancelFunction))\n}\n}\n}\nfunc cancelFunction() {\nmessage = \"Cancel chosen\"\
    \n}\n```\n\nThe first method to using the `action:` parameter involves curly brackets\
    \ where you can type as many lines of code as you wish. However, the more code\
    \ you type, the more cluttered the entire `.alert` or `.actionSheet` will look.\n\
    \nThe second method to using the `action:` parameter is to call a function. That\
    \ way, the `action:` code is isolated in a separate function while keeping the\
    \ `.alert` or `.actionSheet` code shorter and easier to read.\n\nNo matter which\
    \ method you choose, selecting any Button will dismiss the Alert or Action Sheet\
    \ from the screen. That’s why if you omit the `action:` parameter completely,\
    \ selecting that Button will dismiss the Alert or Action Sheet.\n\nTo see how\
    \ to make Buttons responsive in an Alert, follow these steps:\n\n1. Create a new\
    \ SwiftUI iOS App project and give it any name you wish such as “AlertResponsiveButtons.”\n\
    2. Click the `ContentView` file in the Navigator pane.\n3. Add the following State\
