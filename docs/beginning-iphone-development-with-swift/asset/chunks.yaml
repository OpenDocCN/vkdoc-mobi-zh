- fmt: '# Defining Multiple Rows/Columns


    The previous project created a single row in the `LazyHGrid` and a single column
    in the `LazyVGrid`. This single row and column was defined by the array of `GridItem`
    like this:


    ```

    let gridItems = [GridItem()]

    ```


    If you want to create multiple rows or columns, just define the array with more
    than one `GridItem` like this:


    ```

    let gridItems = [GridItem(),

    GridItem()

    ]

    ```


    This will create two rows in a `LazyHGrid` or two columns in a `LazyVGrid`. Each
    time you add an additional `GridItem` to the array, you increase the number of
    rows or columns in the grid.


    To see how to change the number of rows or columns in a grid, follow these steps:


    1. Make sure to load the previous project in Xcode (such as "SimpleGrid").

    2. Edit the array as follows to define three rows in the `LazyHGrid` and three
    columns in the `LazyVGrid`:


    ```

    let gridItems = [GridItem(),

    GridItem(),

    GridItem()

    ]

    ```


    The entire `ContentView` file should look like this:


    ![../images/329781_6_En_18_Chapter/329781_6_En_18_Fig3_HTML.jpg](images/329781_6_En_18_Chapter/329781_6_En_18_Fig3_HTML.jpg)


    Figure 18-3 Displaying a grid with three rows and three columns


    1. Click the Live Preview icon on the Canvas pane.

    2. Scroll the horizontal grid left to right to see all the numbered circles as
    shown in Figure [18-3](#329781_6_En_18_Chapter.xhtml#Fig3).


    ```

    import SwiftUI

    struct ContentView: View {

    var body: some View {

    VStack {

    let gridItems = [GridItem(),

    GridItem(),

    GridItem()

    ]

    ScrollView(Axis.Set.horizontal, showsIndicators: true, content: {

    LazyHGrid(rows: gridItems) {

    Image(systemName: "1.circle")

    Image(systemName: "2.circle")

    Image(systemName: "3.circle")

    Image(systemName: "4.circle")

    Image(systemName: "5.circle")

    Image(systemName: "6.circle")

    Image(systemName: "7.circle")

    Image(systemName: "8.circle")

    Image(systemName: "9.circle")

    Image(systemName: "10.circle")

    }.font(.largeTitle)

    })

    ScrollView(Axis.Set.vertical, showsIndicators: true, content: {

    LazyVGrid(columns: gridItems) {

    Image(systemName: "1.square")

    Image(systemName: "2.square")

    Image(systemName: "3.square")

    Image(systemName: "4.square")

    Image(systemName: "5.square")

    Image(systemName: "6.square")

    Image(systemName: "7.square")

    Image(systemName: "8.square")

    Image(systemName: "9.square")

    Image(systemName: "10.square")

    }.font(.largeTitle)

    })

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    1. Scroll the vertical grid up and down to see all the numbered squares.


    Notice that when filling out a `LazyHGrid`, SwiftUI places each item in a separate
    row. That''s why circle 1 appears in the top row, circle 2 appears in the second
    row, circle 3 appears in the third row, and circle 4 appears back in the top row
    again.


    The same holds true when filling out the `LazyVGrid` except SwiftUI places each
    item in a separate column. Square 1 appears in the first column, square 2 appears
    in the second column, square 3 appears in the third column, and square 4 appears
    back in the first column again.


    > **Note:** The scroll indicator only appears when the grid cannot show all items
    at the same time. When displaying three rows or three columns, all items can be
    visible, so the scroll indicator does not need to appear.


    ## Adjusting Spacing Between Rows/Columns


    By creating an array of `GridItem`, we can define the number of rows/columns in
    a grid. For additional customization, we can also define the spacing between rows
    and columns. Three ways to define spacing between rows/columns in a grid include:


    - `.fixed`

    - `.flexible`

    - `.adaptive`


    The `.fixed` option lets you define a decimal value (`CGFloat` data type) that
    creates a specific spacing amount. Figure [18-4](#329781_6_En_18_Chapter.xhtml#Fig4)
    shows different fixed spacing options and how they affect the appearance of rows
    and columns in grids.


    ![../images/329781_6_En_18_Chapter/329781_6_En_18_Fig4_HTML.jpg](images/329781_6_En_18_Chapter/329781_6_En_18_Fig4_HTML.jpg)


    Figure 18-4 Various `.fixed` spacing options for a grid


    > **Note:** In Figure [18-4](#329781_6_En_18_Chapter.xhtml#Fig4), all `GridItem`
    elements in the array use the same `.fixed` size value, but you can give each
    `GridItem` different size values if you want.


    Defining a `.fixed` value for spacing rows and columns in a grid will give predictable
    results on any iOS device. However, a `.fixed` value may not always look good
    on smaller or larger iOS device screens. In case you want to create grids that
    can change based on different screen sizes, use `.flexible` or `.adaptive` instead.


    The `.flexible` option tries to expand spacing between rows/columns as much as
    possible. On the other hand, the `.adaptive` option tries to shrink spacing between
    rows/columns as much as possible. Both the `.flexible` and `.adaptive` options
    let you define a minimum and maximum value. This defines the range of values the
    grid spacing can use.


    If no option is chosen, the default value is `.flexible` with a maximum value
    of `.infinity`. To see how the `.fixed`, `.flexible`, and `.adaptive` options
    work, follow these steps:


    1. Make sure to load the previous project in Xcode (such as "SimpleGrid").

    2. Edit the array as follows to define three rows in the `LazyHGrid` and three
    columns in the `LazyVGrid`:


    ```

    let gridItems = [GridItem(.fixed(120)),

    GridItem(.fixed(120)),

    GridItem(.fixed(120))

    ]

    ```


    Notice that this separates the rows and columns in the grid by a fixed amount
    (see Figure [18-4](#329781_6_En_18_Chapter.xhtml#Fig4)).


    1. Edit the array as follows to define three rows in the `LazyHGrid` and three
    columns in the `LazyVGrid`:

    2. Comment out the second `ScrollView` like this:


    ```

    let gridItems = [GridItem(.flexible(minimum: 20, maximum: 450)),

    GridItem(.flexible(minimum: 20, maximum: 450)),

    GridItem(.flexible(minimum: 20, maximum: 450))

    ]

    ```


    ```

    //            ScrollView(Axis.Set.vertical, showsIndicators: true, content: {

    //                LazyVGrid(columns: gridItems) {

    //                    Image(systemName: "1.square")

    //                    Image(systemName: "2.square")

    //                    Image(systemName: "3.square")

    //                    Image(systemName: "4.square")

    //                    Image(systemName: "5.square")

    //                    Image(systemName: "6.square")

    //                    Image(systemName: "7.square")

    //                    Image(systemName: "8.square")

    //                    Image(systemName: "9.square")

    //                    Image(systemName: "10.square")

    //                }.font(.largeTitle)

    //            })

    ```


    Notice that without the second `ScrollView`, the `LazyHGrid` can now expand the
    spacing between rows as shown in Figure [18-5](#329781_6_En_18_Chapter.xhtml#Fig5).


    ![../images/329781_6_En_18_Chapter/329781_6_En_18_Fig5_HTML.jpg](images/329781_6_En_18_Chapter/329781_6_En_18_Fig5_HTML.jpg)


    Figure 18-5 The left side shows expanded spacing between rows, while the right
    side shows spacing reduced between rows


    1. Edit the array as follows to define three rows in the `LazyHGrid` and three
    columns in the `LazyVGrid`:


    ```

    let gridItems = [GridItem(.adaptive(minimum: 20, maximum: 450)),

    GridItem(.adaptive(minimum: 20, maximum: 450)),

    GridItem(.adaptive(minimum: 20, maximum: 450))

    ]

    ```


    Notice that the `.adaptive` option shrinks the spacing to the minimum as shown
    in Figure [18-6](#329781_6_En_18_Chapter.xhtml#Fig6).


    ![../images/329781_6_En_18_Chapter/329781_6_En_18_Fig6_HTML.jpg](images/329781_6_En_18_Chapter/329781_6_En_18_Fig6_HTML.jpg)


    Figure 18-6 The `.adaptive` option shrinks spacing to the minimum possible'
