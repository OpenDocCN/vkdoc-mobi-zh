    Text("Second")

    }

    }

    }

    ```


    请注意，`FileView`向`choice:`参数发送了一个绑定变量（`$message`）。名为`SeparateFileView`的第二个结构体向`passedData`参数发送了相同的绑定变量（`$message`）。


    1.  在`struct ContentView: View`结构体下方添加以下结构体：


