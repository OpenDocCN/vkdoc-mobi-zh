    ```

    var body: some View {

    ScrollView(Axis.Set.vertical, showsIndicators: true, content: {

    })

    ```


    To shorten the ScrollView code, you could just do this:


    1.  Add a ForEach loop inside the ScrollView like this:


    ```

    var body: some View {

    ScrollView {

    }

    ```


    1.  Click the Live Preview icon on the Canvas pane.


    2.  Scroll up and down on the list of “Item #” items displayed on the user interface.
    Notice that as you scroll up or down, you can see the slider indicator on the
    right side.


    ```

    var body: some View {

    ScrollView(Axis.Set.vertical, showsIndicators: true, content: {

    ForEach(0..<50) {

    Text("Item #\($0)     ")

    }

    })

    ```'
  trans: "\n# 使用 Disclosure Group\n\n`DisclosureGroup` 旨在隐藏一个或多个视图（如 `Text`、`Slider`、`Toggle`\
    \ 等），直到用户点击 `DisclosureGroup` 名称将其展开。展开时，`DisclosureGroup` 会在用户界面上显示一个或多个视图。\n\
    \n**注意：** 与堆栈类似，一个 `DisclosureGroup` 最多可以容纳十个视图。但是，其中某些视图可以是能容纳多个子视图的堆栈。此外，你还可以在\
    \ `DisclosureGroup` 内嵌套其他 `DisclosureGroup`。\n\n要创建一个 `DisclosureGroup`，首先需要创建一段描述性文本，它在用户界面上代表一个链接。这段文本右侧会显示一个\
    \ ➤ 符号，提示用户该链接包含隐藏项。其次，你需要创建一个视图列表（最多十个），当用户选择该 `DisclosureGroup` 链接时，这些视图将会显示出来。\n\
    \n要了解如何创建 `DisclosureGroup`，请按照以下步骤操作：\n\n1.  创建一个新的 SwiftUI iOS App 项目，并随意命名，例如\
    \ “`DisclosureGroup`”。\n2.  在导航器面板中点击 `ContentView` 文件。\n3.  在 `struct ContentView:\
    \ View` 代码行下方添加三个 `State` 变量，如下所示：\n\n    ```\n    struct ContentView: View {\n\
    \    @State var sliderValue = 0.0\n    @State var message = \"\"\n    @State var\
    \ flag = true\n    ```\n\n4.  在 `var body: some View` 内部添加一个 `DisclosureGroup`，如下所示：\n\
    \n    ```\n    var body: some View {\n    DisclosureGroup(\"展开我\") {\n    }\n\
    \    }\n    ```\n\n5.  在 `DisclosureGroup` 内部添加以下内容：\n\n    ```\n    var body:\
    \ some View {\n    DisclosureGroup(\"展开我\") {\n    Text(\"你输入了 = \\(message)\"\
    )\n    TextField(\"在此输入\", text: $message)\n    .padding()\n    Text(flag ? \"\
    开关 = 开启\" : \"开关 = 关闭\")\n    Toggle(isOn: $flag) {\n    Text(\"开关\")\n    }.padding()\n\
    \    Text(\"滑块值 = \\(sliderValue)\")\n    Slider(value: $sliderValue, in: 0...15)\n\
    \    .padding()\n    }\n    }\n    ```\n\n完整的 `ContentView` 文件应如下所示：\n\n![../images/329781_6_En_15_Chapter/329781_6_En_15_Fig3_HTML.jpg](img/329781_6_En_15_Fig3_HTML.jpg)\n\
    \n**图 15-3** 展开后的 `DisclosureGroup`\n\n6.  点击画布面板中的实时预览图标。\n7.  点击 “展开我” `DisclosureGroup`\
    \ 链接，以显示隐藏在内的所有视图，如图 15-3 所示。\n\n    ```\n    import SwiftUI\n    struct ContentView:\
    \ View {\n    @State var sliderValue = 0.0\n    @State var message = \"\"\n  \
    \  @State var flag = true\n    var body: some View {\n    DisclosureGroup(\"展开我\"\
    ) {\n    Text(\"你输入了 = \\(message)\")\n    TextField(\"在此输入\", text: $message)\n\
    \    .padding()\n    Text(flag ? \"开关 = 开启\" : \"开关 = 关闭\")\n    Toggle(isOn:\
    \ $flag) {\n    Text(\"开关\")\n    }.padding()\n    Text(\"滑块值 = \\(sliderValue)\"\
    )\n    Slider(value: $sliderValue, in: 0...15)\n    .padding()\n    }\n    }\n\
    \    }\n    struct ContentView_Previews: PreviewProvider {\n    static var previews:\
    \ some View {\n    ContentView()\n    }\n    }\n    ```\n\n8.  点击文本字段并输入一些文字。注意，你输入的任何文字都会显示在显示\
    \ “你输入了 =” 的 `Text` 视图中。\n9.  点击开关。注意，每次点击开关时，开关上方显示 “开关 = 开启” 或 “开关 = 关闭” 的 `Text`\
    \ 视图会相应更新。\n10. 左右拖动滑块。注意，拖动滑块时，其数值会显示在滑块上方显示 “滑块值 =” 的 `Text` 视图中。\n11. 再次点击\
    \ `DisclosureGroup` 链接以隐藏所有视图。每次点击 `DisclosureGroup` 链接时，它会在显示 `DisclosureGroup`\
    \ 内的所有视图和隐藏它们之间切换。\n\n## 使用 Scroll View\n\n当你在 `VStack` 中排列多个视图时，这些视图会固定在用户界面中。如果你显示的视图数量超过用户界面所能显示的范围，部分视图将被截断或隐藏不见。为了解决这个问题，SwiftUI\
    \ 提供了一种特殊的容器，称为 Scroll View（滚动视图）。\n\n与堆栈类似，Scroll View 可以容纳多个视图。与堆栈不同，Scroll\
    \ View 允许用户垂直或水平滚动以查看 Scroll View 的全部内容。Scroll View 可以在任何你可能使用堆栈的地方工作，包括在 `DisclosureGroup`\
    \ 内部。\n\n创建 Scroll View 最简单的方法是像这样定义一个 `ScrollView`：\n\n```\nScrollView {\n//\
    \  在此放置多个视图\n}\n```\n\n这允许你垂直滚动，并在右侧显示滚动指示器。滚动指示器让你了解当前滚动位置距离列表项开头或结尾的远近程度，如图\
    \ 15-4 所示。\n\n![../images/329781_6_En_15_Chapter/329781_6_En_15_Fig4_HTML.jpg](img/329781_6_En_15_Fig4_HTML.jpg)\n\
    \n**图 15-4** 滚动指示器出现在垂直滚动的 Scroll View 右侧\n\n另一种创建 Scroll View 的方法是定义滚动方向（`Axis.Set.horizontal`\
    \ 或 `Axis.Set.vertical`）以及是否显示滚动指示器（`showsIndicators:` 参数），如下所示：\n\n```\nScrollView(Axis.Set.horizontal,\
    \ showsIndicators: false, content: {\n}\n```\n\n要了解 Scroll View 如何工作，请按照以下步骤操作：\n\
    \n1.  创建一个新的 SwiftUI iOS App 项目，并随意命名，例如 “`ScrollView`”。\n2.  在导航器面板中点击 `ContentView`\
    \ 文件。\n3.  在 `var body: some View` 代码行下方添加一个 `ScrollView`，如下所示：\n\n    ```\n \
    \   var body: some View {\n    ScrollView(Axis.Set.vertical, showsIndicators:\
    \ true, content: {\n    })\n    ```\n\n    要缩短 `ScrollView` 代码，你可以直接这样写：\n\n \
    \   ```\n    var body: some View {\n    ScrollView {\n    }\n    ```\n\n4.  在\
    \ `ScrollView` 内部添加一个 `ForEach` 循环，如下所示：\n\n    ```\n    var body: some View {\n\
    \    ScrollView(Axis.Set.vertical, showsIndicators: true, content: {\n    ForEach(0..<50)\
    \ {\n    Text(\"项目 #\\($0)     \")\n    }\n    })\n    ```\n\n5.  点击画布面板上的实时预览图标。\n\
    6.  在用户界面上显示的 “项目 #” 列表项中上下滚动。注意上下滚动时，你可以看到右侧的滑块指示器。\n"
- fmt: "# Using an Outline Group\n\nAn `OutlineGroup` acts like a super `DisclosureGroup`.\
    \ The main difference is that a `DisclosureGroup` can only display up to ten views,\
    \ while an `OutlineGroup` can display an endless number of items defined within\
    \ a separate class. In addition, an `OutlineGroup` automatically indents categories\
    \ to make it easier to see the hierarchical relationship between items (see Figure\
    \ [15-2](#329781_6_En_15_Chapter.xhtml#Fig2)).\n\n`OutlineGroup`s display arrays\
    \ of objects that define relationships. To use an `OutlineGroup`, you need to\
    \ do the following:\n\n- Create a class that holds the data you want to display.\n\
    - Create an array that holds multiple objects defined by the class.\n- Create\
    \ an `OutlineGroup` that displays the data stored in the objects.\n\nTo create\
    \ a class that holds the data you want to display, you need to make it `Identifiable`.\
    \ That way, each object based on that class will have a unique identification\
    \ number like this:\n\n```\nclass Species: Identifiable {\n    let id = UUID()\n\
    }\n```\n\nNext, you need to define the data you want to display in the `OutlineGroup`\
    \ such as a string like this:\n\n```\nclass Species: Identifiable {\n    let id\
    \ = UUID()\n    var name: String\n}\n```\n\nThe next step is to create an optional\
    \ array for holding subcategories. These subcategory items must also be the same\
    \ class like this:\n\n```\nclass Species: Identifiable {\n    let id = UUID()\n\
    \    var name: String\n    var classification: [Species]?\n}\n```\n\nFinally,\
    \ the class needs an initializer since none of the class’s properties have an\
    \ initial value. That means each time you create an object, you must assign a\
    \ value to its property. In this case, the only property that needs a value is\
    \ the “name” property that holds a `String` data type that’s absolutely necessary.\
    \ The other property, called “classification,” can hold an array of objects but\
    \ can also be a `nil` value:\n\n```\nclass Species: Identifiable {\n    let id\
    \ = UUID()\n    var name: String\n    var classification: [Species]?\n    init(name:\
    \ String, classification: [Species]? = nil) {\n        self.name = name\n    \
    \    self.classification = classification\n    }\n}\n```\n\nAfter defining a class,\
    \ the next step is to define an array that holds objects based on that class like\
    \ this:\n\n```\nvar Animals: [Species] = [\n    Species(name: \"Mammal\", classification:\
    \ [\n        Species(name: \"Dog\", classification: [\n            Species(name:\
    \ \"Poodle\"),\n            Species(name: \"Collie\"),\n        ]),\n    ]),\n\
    ]\n```\n\nNotice that this array is defined to hold objects based on the defined\
    \ class (“`Animals`” in this example). Each object in the array needs a name (such\
    \ as “Mammal” or “Collie”). Some objects do not hold a list of subcategories,\
    \ but for those that do, you need to specify an array of objects based on the\
    \ same class (“`Species`”). In the preceding example, the “Dog” object defines\
    \ an array of objects that hold “Poodle” and “Collie.”\n\nThe third step is to\
    \ define an `OutlineGroup`:\n\n```\nOutlineGroup(Animals, id: \\.id, children:\
    \ \\.classification) { creature in\n    Text(creature.name)\n}\n```\n\nThis defines\
    \ the array to use (`Animals`) and to display each item in the array using a unique\
    \ ID (defined by `UUID()` within the class declaration). If there are any children\
    \ or subcategories stored within an object, that’s identified by the `children:`\
    \ parameter. Finally, the `Text` view within the `OutlineGroup` displays the `name`\
    \ property of each object.\n\nTo see how to use an `OutlineGroup`, follow these\
    \ steps:\n\n1.  Create a new SwiftUI iOS App project and give it any name you\
    \ wish such as “`OutlineGroup`”.\n2.  Click the `ContentView` file in the Navigator\
    \ pane.\n3.  Add the following class declaration under the `import SwiftUI` line\
    \ like this:\n\n```\nclass Species: Identifiable {\n    let id = UUID()\n    var\
    \ name: String\n    var classification: [Species]?\n    init(name: String, classification:\
    \ [Species]? = nil) {\n        self.name = name\n        self.classification =\
    \ classification\n    }\n}\n```\n\n4.  Add the following array underneath the\
    \ `struct ContentView: View` line like this:\n\n```\nstruct ContentView: View\
    \ {\n    var Animals: [Species] = [\n        Species(name: \"Mammal\", classification:\
    \ [\n            Species(name: \"Dog\", classification: [\n                Species(name:\
    \ \"Poodle\"),\n                Species(name: \"Collie\"),\n                Species(name:\
    \ \"St. Bernard\"),\n            ]),\n            Species(name: \"Cat\"),\n  \
    \          Species(name: \"Elephant\"),\n            Species(name: \"Whale\"),\n\
    \        ]),\n        Species(name: \"Bird\", classification: [\n            Species(name:\
    \ \"Canary\"),\n            Species(name: \"Parakeet\"),\n            Species(name:\
    \ \"Eagle\"),\n        ]),\n    ]\n}\n```\n\n5.  Add the `OutlineGroup` underneath\
    \ the `var body: some View` line like this:\n\n```\nvar body: some View {\n  \
    \  List {\n        OutlineGroup(Animals, id: \\.id, children: \\.classification)\
    \ { creature in\n            Text(creature.name)\n        }\n    }\n}\n```\n\n\
    The entire `ContentView` file should look like this:\n\n```\nimport SwiftUI\n\n\
    class Species: Identifiable {\n    let id = UUID()\n    var name: String\n   \
    \ var classification: [Species]?\n    init(name: String, classification: [Species]?\
    \ = nil) {\n        self.name = name\n        self.classification = classification\n\
    \    }\n}\n\nstruct ContentView: View {\n    var Animals: [Species] = [\n    \
    \    Species(name: \"Mammal\", classification: [\n            Species(name: \"\
    Dog\", classification: [\n                Species(name: \"Poodle\"),\n       \
    \         Species(name: \"Collie\"),\n                Species(name: \"St. Bernard\"\
    ),\n            ]),\n            Species(name: \"Cat\"),\n            Species(name:\
    \ \"Elephant\"),\n            Species(name: \"Whale\"),\n        ]),\n       \
    \ Species(name: \"Bird\", classification: [\n            Species(name: \"Canary\"\
    ),\n            Species(name: \"Parakeet\"),\n            Species(name: \"Eagle\"\
    ),\n        ]),\n    ]\n\n    var body: some View {\n        List {\n        \
    \    OutlineGroup(Animals, id: \\.id, children: \\.classification) { creature\
    \ in\n                Text(creature.name)\n            }\n        }\n    }\n}\n\
    \nstruct ContentView_Previews: PreviewProvider {\n    static var previews: some\
    \ View {\n        ContentView()\n    }\n}\n```\n\n6.  Click the Live Preview icon\
    \ in the Canvas pane.\n7.  Click any of the items in the `OutlineGroup` that displays\
    \ a ➤ character on the far right. This indicates that the item contains additional\
    \ lists that can be displayed (see Figure [15-2](#329781_6_En_15_Chapter.xhtml#Fig2)).\n\
    \n`OutlineGroup`s can be handy for storing and displaying lists of items that\
    \ the user can hide or display. Since `OutlineGroup`s use arrays, there’s no limit\
    \ to the number of items you can display in an `OutlineGroup` (unlike the ten-view\
    \ limit of a `DisclosureGroup`).\n\n## Summary\n\n`DisclosureGroup`s can be handy\
    \ for hiding one or more views temporarily out of sight. By clicking the `DisclosureGroup`\
    \ title, you can toggle between seeing additional views and hiding them. Think\
    \ of `DisclosureGroup`s as a collapsible list of views.\n\nWhile `DisclosureGroup`s\
    \ make it easy to hide or view data, `ScrollView`s make it easy to scroll up or\
    \ down to view additional data. You can even use `ScrollView`s inside of `DisclosureGroup`s\
    \ as well.\n\nIf you need to display data in a hierarchy, consider using the `OutlineGroup`.\
    \ An `OutlineGroup` requires defining a class that contains the properties you\
    \ want to store along with a `UUID()` to automatically create distinct ID numbers\
    \ for each chunk of data. Then you need to create an array of objects, based on\
    \ the class you defined. Finally, you can use an `OutlineGroup` to display data\
    \ on the screen.\n\n`DisclosureGroup`s, `ScrollView`s, and `OutlineGroup`s are\
    \ just different ways to group related data together. `DisclosureGroup`s act like\
    \ collapsible lists. `ScrollView`s let users see data that might normally get\
    \ cut off. `OutlineGroup`s act like multiple `DisclosureGroup`s that can selectively\
    \ hide or display data. The whole purpose of all three views is to provide different\
    \ ways to display information to the user."
  raw: '## Using an Outline Group


    An Outline Group acts like a super Disclosure Group. The main difference is that
    a Disclosure Group can only display up to ten views, while an Outline Group can
    display an endless number of items defined within a separate class. In addition,
    an Outline Group automatically indents categories to make it easier to see the
    hierarchical relationship between items (see Figure [15-2](#329781_6_En_15_Chapter.xhtml#Fig2)).


    Outline Groups display arrays of objects that define relationships. To use an
    Outline Group, you need to do the following:


    *   Create a class that holds the data you want to display.


    *   Create an array that holds multiple objects defined by the class.


    *   Create an Outline Group that displays the data stored in the objects.


    To create a class that holds the data you want to display, you need to make it
    Identifiable. That way, each object based on that class will have a unique identification
    number like this:


    ```

    class Species: Identifiable {

    let id = UUID()

    }

    ```


    Next, you need to define the data you want to display in the Outline Group such
    as a string like this:


    ```

    class Species: Identifiable {

    let id = UUID()

    var name: String

    }

    ```


    The next step is to create an optional array for holding subcategories. These
    subcategory items must also be the same class like this:


    ```

    class Species: Identifiable {

    let id = UUID()

    var name: String

    var classification: [Species]?

    }

    ```


    Finally, the class needs an initializer since none of the class’s properties have
    an initial value. That means each time you create an object, you must assign a
    value to its property. In this case, the only property that needs a value is the
    “name” property that holds a String data type that’s absolutely necessary. The
    other property, called “classification,” can hold an array of objects but can
    also be a nil value:


    ```

    class Species: Identifiable {

    let id = UUID()

    var name: String

    var classification: [Species]?

    init(name: String, classification: [Species]? = nil) {

    self.name = name

    self.classification = classification

    }

    }

    ```


    After defining a class, the next step is to define an array that holds objects
    based on that class like this:


    ```

    var Animals: [Species] = [

    Species(name: "Mammal", classification: [

    Species(name: "Dog", classification: [

    Species(name: "Poodle"),

    Species(name: "Collie"),

    ```


    Notice that this array is defined to hold objects based on the defined class (“Animals”
    in this example). Each object in the array needs a name (such as “Mammal” or “Collie”).
    Some objects do not hold a list of subcategories, but for those that do, you need
    to specify an array of objects based on the same class (“Species”). In the preceding
    example, the “Dog” object defines an array of objects that hold “Poodle” and “Collie.”


    The third step is to define an Outline Group:


    ```

    OutlineGroup(Animals, id: \.id, children: \.classification) { creature in

    Text(creature.name)

    }

    ```


    This defines the array to use (Animals) and to display each item in the array
    using a unique ID (defined by UUID() within the class declaration). If there are
    any children or subcategories stored within an object, that’s identified by the
    children: parameter. Finally, the Text view within the OutlineGroup displays the
    name property of each object.


    To see how to use an Outline Group, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “OutlineGroup.”


    2.  Click the ContentView file in the Navigator pane.


    3.  Add the following class declaration under the import SwiftUI line like this:


    1.  Add the following array underneath the struct ContentView: View line like
    this:


    ```

    class Species: Identifiable {

    let id = UUID()

    var name: String

    var classification: [Species]?

    init(name: String, classification: [Species]? = nil) {

    self.name = name

    self.classification = classification

    }

    }

    ```


    1.  Add the OutlineGroup underneath the var body: some View line like this:


    ```

    struct ContentView: View {

    var Animals: [Species] = [

    Species(name: "Mammal", classification: [

    Species(name: "Dog", classification: [

    Species(name: "Poodle"),

    Species(name: "Collie"),

    Species(name: "St. Bernard"),

    ]),

    Species(name: "Cat"),

    Species(name: "Elephant"),

    Species(name: "Whale"),

    ]),

    Species(name: "Bird", classification: [

    Species(name: "Canary"),

    Species(name: "Parakeet"),

    Species(name: "Eagle"),

    ]),

    ]

    ```


    ```

    var body: some View {

    List {

    OutlineGroup(Animals, id: \.id, children: \.classification) { creature in

    Text(creature.name)

    }

    }

    }

    ```


    The entire ContentView file should look like this:


    1.  Click the Live Preview icon in the Canvas pane.


    2.  Click any of the items in the Outline Group that displays a ➤ character on
    the far right. This indicates that the item contains additional lists that can
    be displayed (see Figure [15-2](#329781_6_En_15_Chapter.xhtml#Fig2)).


    ```

    import SwiftUI

    class Species: Identifiable {

    let id = UUID()

    var name: String

    var classification: [Species]?

    init(name: String, classification: [Species]? = nil) {

    self.name = name

    self.classification = classification

    }

    }

    struct ContentView: View {

    var Animals: [Species] = [

    Species(name: "Mammal", classification: [

    Species(name: "Dog", classification: [

    Species(name: "Poodle"),

    Species(name: "Collie"),

    Species(name: "St. Bernard"),

    ]),

    Species(name: "Cat"),

    Species(name: "Elephant"),

    Species(name: "Whale"),

    ]),

    Species(name: "Bird", classification: [

    Species(name: "Canary"),

    Species(name: "Parakeet"),

    Species(name: "Eagle"),

    ]),

    ]

    var body: some View {

    List {

    OutlineGroup(Animals, id: \.id, children: \.classification) { creature in

    Text(creature.name)

    }

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    Outline Groups can be handy for storing and displaying lists of items that the
    user can hide or display. Since Outline Groups use arrays, there’s no limit to
    the number of items you can display in an Outline Group (unlike the ten-view limit
    of a Disclosure Group).


    ## Summary


    Disclosure Groups can be handy for hiding one or more views temporarily out of
    sight. By clicking the Disclosure Group title, you can toggle between seeing additional
    views and hiding them. Think of Disclosure Groups as a collapsible list of views.


    While Disclosure Groups make it easy to hide or view data, Scroll Views make it
    easy to scroll up or down to view additional data. You can even use Scroll Views
    inside of Disclosure Groups as well.


    If you need to display data in a hierarchy, consider using the Outline Group.
    An Outline Group requires defining a class that contains the properties you want
    to store along with a UUID() to automatically create distinct ID numbers for each
    chunk of data. Then you need to create an array of objects, based on the class
    you defined. Finally, you can use an OutlineGroup to display data on the screen.


    Disclosure Groups, Scroll Views, and Outline Groups are just different ways to
    group related data together. Disclosure Groups act like collapsible lists. Scroll
    Views let users see data that might normally get cut off. Outline Groups act like
    multiple Disclosure Groups that can selectively hide or display data. The whole
    purpose of all three views is to provide different ways to display information
    to the user.'
  trans: "\n# 使用大纲组\n\n`OutlineGroup` 的作用类似于一个超级 `DisclosureGroup`。主要区别在于，`DisclosureGroup`\
    \ 最多只能显示十个视图，而 `OutlineGroup` 可以显示在单独类中定义的无限数量的项目。此外，`OutlineGroup` 会自动缩进类别，以便更容易看清项目之间的层级关系（见图\
    \ 15-2）。\n\n`OutlineGroup` 用于显示定义关系的对象数组。要使用 `OutlineGroup`，您需要执行以下操作：\n\n-  \
    \ 创建一个用于存放要显示数据的类。\n-   创建一个用于存放由该类定义的多个对象的数组。\n-   创建一个用于显示对象中存储数据的 `OutlineGroup`。\n\
    \n要创建一个存放要显示数据的类，您需要使其符合 `Identifiable` 协议。这样，基于该类创建的每个对象都将拥有一个唯一的标识号，如下所示：\n\n\
    ```\nclass Species: Identifiable {\n    let id = UUID()\n}\n```\n\n接下来，您需要在 `OutlineGroup`\
    \ 中定义要显示的数据，例如一个字符串，如下所示：\n\n```\nclass Species: Identifiable {\n    let id =\
    \ UUID()\n    var name: String\n}\n```\n\n下一步是创建一个可选的数组，用于存放子类别。这些子类别项也必须是同一个类，如下所示：\n\
    \n```\nclass Species: Identifiable {\n    let id = UUID()\n    var name: String\n\
    \    var classification: [Species]?\n}\n```\n\n最后，该类需要一个初始化器，因为该类的所有属性都没有初始值。这意味着每次创建对象时，都必须为其属性赋值。在这种情况下，唯一需要赋值的属性是“name”属性，它持有一个绝对必要的\
    \ `String` 数据类型。另一个名为“classification”的属性可以持有一个对象数组，也可以是 `nil` 值：\n\n```\nclass\
    \ Species: Identifiable {\n    let id = UUID()\n    var name: String\n    var\
    \ classification: [Species]?\n    init(name: String, classification: [Species]?\
    \ = nil) {\n        self.name = name\n        self.classification = classification\n\
    \    }\n}\n```\n\n定义类之后，下一步是定义一个基于该类存放对象的数组，如下所示：\n\n```\nvar Animals: [Species]\
    \ = [\n    Species(name: \"Mammal\", classification: [\n        Species(name:\
    \ \"Dog\", classification: [\n            Species(name: \"Poodle\"),\n       \
    \     Species(name: \"Collie\"),\n        ]),\n    ]),\n]\n```\n\n请注意，此数组被定义为存放基于所定义类的对象（本例中为“`Animals`”）。数组中的每个对象都需要一个名称（例如“Mammal”或“Collie”）。某些对象不包含子类别列表，但对于那些包含子类别列表的对象，您需要指定一个基于同一个类（“`Species`”）的对象数组。在前面的示例中，“Dog”对象定义了一个包含“Poodle”和“Collie”的对象数组。\n\
    \n第三步是定义一个 `OutlineGroup`：\n\n```\nOutlineGroup(Animals, id: \\.id, children:\
    \ \\.classification) { creature in\n    Text(creature.name)\n}\n```\n\n这定义了要使用的数组（`Animals`），并使用唯一\
    \ ID（在类声明中由 `UUID()` 定义）来显示数组中的每个项目。如果对象中存储有任何子项或子类别，则由 `children:` 参数标识。最后，`OutlineGroup`\
    \ 中的 `Text` 视图显示每个对象的 `name` 属性。\n\n要了解如何使用 `OutlineGroup`，请按照以下步骤操作：\n\n1.  创建一个新的\
    \ SwiftUI iOS App 项目，并为其指定任意名称，例如“`OutlineGroup`”。\n2.  在导航器窗格中点击 `ContentView`\
    \ 文件。\n3.  在 `import SwiftUI` 行下方添加以下类声明，如下所示：\n\n```\nclass Species: Identifiable\
    \ {\n    let id = UUID()\n    var name: String\n    var classification: [Species]?\n\
    \    init(name: String, classification: [Species]? = nil) {\n        self.name\
    \ = name\n        self.classification = classification\n    }\n}\n```\n\n4.  在\
    \ `struct ContentView: View` 行下方添加以下数组，如下所示：\n\n```\nstruct ContentView: View\
    \ {\n    var Animals: [Species] = [\n        Species(name: \"Mammal\", classification:\
    \ [\n            Species(name: \"Dog\", classification: [\n                Species(name:\
    \ \"Poodle\"),\n                Species(name: \"Collie\"),\n                Species(name:\
    \ \"St. Bernard\"),\n            ]),\n            Species(name: \"Cat\"),\n  \
    \          Species(name: \"Elephant\"),\n            Species(name: \"Whale\"),\n\
    \        ]),\n        Species(name: \"Bird\", classification: [\n            Species(name:\
    \ \"Canary\"),\n            Species(name: \"Parakeet\"),\n            Species(name:\
    \ \"Eagle\"),\n        ]),\n    ]\n}\n```\n\n5.  在 `var body: some View` 行下方添加\
    \ `OutlineGroup`，如下所示：\n\n```\nvar body: some View {\n    List {\n        OutlineGroup(Animals,\
    \ id: \\.id, children: \\.classification) { creature in\n            Text(creature.name)\n\
    \        }\n    }\n}\n```\n\n整个 `ContentView` 文件应如下所示：\n\n```\nimport SwiftUI\n\
    \nclass Species: Identifiable {\n    let id = UUID()\n    var name: String\n \
    \   var classification: [Species]?\n    init(name: String, classification: [Species]?\
    \ = nil) {\n        self.name = name\n        self.classification = classification\n\
    \    }\n}\n\nstruct ContentView: View {\n    var Animals: [Species] = [\n    \
    \    Species(name: \"Mammal\", classification: [\n            Species(name: \"\
    Dog\", classification: [\n                Species(name: \"Poodle\"),\n       \
    \         Species(name: \"Collie\"),\n                Species(name: \"St. Bernard\"\
    ),\n            ]),\n            Species(name: \"Cat\"),\n            Species(name:\
    \ \"Elephant\"),\n            Species(name: \"Whale\"),\n        ]),\n       \
    \ Species(name: \"Bird\", classification: [\n            Species(name: \"Canary\"\
    ),\n            Species(name: \"Parakeet\"),\n            Species(name: \"Eagle\"\
    ),\n        ]),\n    ]\n\n    var body: some View {\n        List {\n        \
    \    OutlineGroup(Animals, id: \\.id, children: \\.classification) { creature\
    \ in\n                Text(creature.name)\n            }\n        }\n    }\n}\n\
    \nstruct ContentView_Previews: PreviewProvider {\n    static var previews: some\
    \ View {\n        ContentView()\n    }\n}\n```\n\n6.  在画布窗格中点击 Live Preview 图标。\n\
    7.  点击 `OutlineGroup` 中任何在最右侧显示 ➤ 字符的项目。这表示该项目包含可以显示的附加列表（见图 15-2）。\n\n`OutlineGroup`\
    \ 可以很方便地存储和显示用户可以隐藏或显示的项目列表。由于 `OutlineGroup` 使用数组，因此在 `OutlineGroup` 中可以显示的项目数量没有限制（这与\
    \ `DisclosureGroup` 最多十个视图的限制不同）。\n\n## 总结\n\n`DisclosureGroup` 可以方便地暂时隐藏一个或多个视图。通过点击\
    \ `DisclosureGroup` 标题，您可以在显示和隐藏附加视图之间切换。可以把 `DisclosureGroup` 想象成一个可折叠的视图列表。\n\
    \n`DisclosureGroup` 使隐藏或查看数据变得容易，而 `ScrollView` 则使上下滚动查看附加数据变得简单。您甚至可以在 `DisclosureGroup`\
    \ 内部使用 `ScrollView`。\n\n如果您需要以层次结构显示数据，请考虑使用 `OutlineGroup`。使用 `OutlineGroup`\
    \ 需要定义一个类，其中包含您要存储的属性以及一个 `UUID()`，以便为每一块数据自动创建不同的 ID 编号。然后，您需要根据定义的类创建一个对象数组。最后，您可以使用\
    \ `OutlineGroup` 在屏幕上显示数据。\n\n`DisclosureGroup`、`ScrollView` 和 `OutlineGroup`\
    \ 只是将相关数据分组在一起的不同方式。`DisclosureGroup` 类似于可折叠的列表。`ScrollView` 允许用户查看通常可能被截断的数据。`OutlineGroup`\
    \ 类似于多个可以有选择地隐藏或显示数据的 `DisclosureGroup`。这三种视图的全部目的都是为了提供向用户显示信息的不同方式。\n"
- fmt: "# Using the Navigation View\n\nOnly the simplest apps consist of a single\
    \ screen such as the Calculator app. However, most apps usually need two or more\
    \ screens to display information. In SwiftUI, you can define each screen of your\
    \ app’s user interface by creating a separate structure. Then you need to provide\
    \ a way to jump from one screen to another.\n\nOne of the simplest ways to jump\
    \ from one screen to another is through a Navigation View, which displays multiple\
    \ screens in sequential order. This Navigation View is commonly used in many iOS\
    \ apps such as Settings to let users view different options as shown in Figure\
    \ 16-1.\n\n![../images/329781_6_En_16_Chapter/329781_6_En_16_Fig1_HTML.png](images/329781_6_En_16_Chapter/329781_6_En_16_Fig1_HTML.png)\n\
    \nFigure 16-1\n\nA Navigation View makes it easy to jump from one screen to another\n\
    \nIn Figure 16-1, the user can tap the Settings icon on the Home screen to display\
    \ the Settings screen. Tapping General opens the General screen. Then tapping\
    \ Keyboard opens the Keyboard screen. Note that to go backward, you can just tap\
    \ the Back button in the upper left corner.\n\nFrom the Keyboards screen, the\
    \ Back button takes you back to the General screen. From the Generals screen,\
    \ the Back button takes you back to the Settings screen. A Navigation View does\
    \ nothing more than allow the user to jump from one screen to another in sequential\
    \ order.\n\n## Using a Navigation View\n\nA Navigation View can hold up to ten\
    \ views just like a stack. A Navigation View contains multiple views using code\
    \ like this:\n\n```\nNavigationView {\n// Put multiple views here\n}\n```\n\n\
    A Navigation View creates a small amount of space at the top of the screen called\
    \ the navigation bar. The purpose of this space is to display buttons or icons.\
    \ Until you add any buttons or icons, this navigation bar space will just appear\
    \ blank.\n\nOne common way to modify the Navigation View is to add a title by\
    \ using the `.navigationTitle` and the `.navigationBarTitleDisplayMode` modifier.\n\
    \n> **Note**\n> When adding modifiers to a `NavigationView`, place the modifiers\
    \ inside the `NavigationView` curly brackets like this:\n> ```\n> NavigationView\
    \ {\n>     .navigationTitle(\"Navigation Title\")\n>     .navigationBarTitleDisplayMode(.inline)\n\
    > }\n> ```\n\nThe `.navigationTitle` modifier lets you define text to appear at\
    \ the top of the screen. The `.navigationBarTitleDisplayMode` modifier lets you\
    \ define how that title appears on the screen. The two options are `.large` and\
    \ `.inline`, as shown in Figure 16-2, where `.large` is the default if you do\
    \ not add a `.navigationBarTitleDisplayMode` modifier.\n\n![../images/329781_6_En_16_Chapter/329781_6_En_16_Fig2_HTML.jpg](images/329781_6_En_16_Chapter/329781_6_En_16_Fig2_HTML.jpg)\n\
    \nFigure 16-2\n\nThe appearance of a navigation title with a `.large` and `.inline`\
    \ modifier\n\nTo see how to create a simple Navigation View, follow these steps:\n\
    \n1. Create a new SwiftUI iOS App project and give it any name you wish such as\
    \ “SimpleNavigationView.”\n2. Click the `ContentView` file in the Navigator pane.\n\
    3. Add a State variable under the `struct ContentView: View` line like this:\n\
    4. Add a `NavigationView` inside the `var body: some View` like this:\n5. Add\
    \ a `Toggle`, a `.navigationTitle` modifier, and a `.navigationBarTitleDisplayMode`\
    \ modifier like this:\n\n```\nstruct ContentView: View {\n    @State var flag\
    \ = true\n}\n```\n\n```\nvar body: some View {\n    NavigationView {\n    }\n\
    }\n```\n\n```\nvar body: some View {\n    NavigationView {\n        Toggle(isOn:\
    \ $flag, label: {\n            Text(\"Toggle display mode\")\n        })\n   \
    \     .navigationTitle(\"Navigation Title\")\n        .navigationBarTitleDisplayMode(flag\
    \ ? .large : .inline)\n    }\n}\n```\n\nThis code changes the appearance of the\
    \ navigation title to either `.large` or `.inline` based on the value of the `Toggle`.\n\
    \n1. Click the Live Preview icon on the Canvas pane.\n2. Click the `Toggle` to\
    \ see how the navigation title switches between the `.large` and `.inline` styles.\n\
    \nIf you want to hide the navigation title and navigation bar completely, you\
    \ can use the `.navigationBarHidden` modifier like this:\n\n```\n.navigationBarHidden(true)\n\
    ```\n\nThis can be useful in case you don’t want the Navigation View to take up\
    \ space at the top of the screen or to temporarily hide the navigation title.\n\
    \n## Adding Buttons to a Navigation Bar\n\nThe navigation bar provides room to\
    \ display one or more buttons at the top of the screen. The first step to creating\
    \ buttons on the navigation bar is to add the `.toolbar` modifier inside the Navigation\
    \ View like this:\n\n```\nNavigationView {\n    .navigationTitle(\"Navigation\
    \ Title\")\n    .toolbar {\n    }\n}\n```\n\nBy default, the color of any buttons\
    \ or icons defined inside the `.toolbar` will be blue. If you want to define a\
    \ different color, you can add the `.accentColor` modifier to the `NavigationView`\
    \ like this:\n\n```\nNavigationView {\n    .navigationTitle(\"Navigation Title\"\
    )\n    .toolbar {\n    }\n}\n.accentColor(.purple)\n```\n\nInside the `.toolbar`\
    \ modifier is where you can define one or more `ToolBarItem`. For each `ToolBarItem`\
    \ you add, you can define its placement (in the upper left corner as `.navigationBarLeading`\
    \ or in the upper right corner as `.navigationBarTrailing`). In addition, you\
    \ must define the appearance of the button and the code to run if the user selects\
    \ that button like this:\n\n```\n.toolbar {\n    ToolbarItem(placement: .navigationBarLeading)\
    \ {\n        Button {\n            //  Code to run\n        } label: {\n     \
    \       //  Define button’s appearance here\n        }\n    }\n    ToolbarItem(placement:\
    \ .navigationBarTrailing) {\n        Button {\n            //  Code to run\n \
    \       } label: {\n            //  Define button’s appearance here\n        }\n\
    \    }\n}\n```\n\nTo see how to define buttons in a Navigation View, follow these\
    \ steps:\n\n1. Create a new SwiftUI iOS App project and give it any name you wish\
    \ such as “NavigationViewButtons.”\n2. Click the `ContentView` file in the Navigator\
    \ pane.\n3. Add two State variables under the `struct ContentView: View` line\
    \ like this:\n4. Add a `NavigationView` and a `VStack` under the `var body: some\
    \ View` line like this:\n5. Add the `.accentColor` modifier to the `NavigationView`\
    \ like this:\n6. Add a `Text` view, a `Toggle`, the `.navigationTitle`, the `.navigationBarTitleDisplayMode`,\
    \ and the `.toolbar` modifiers like this:\n7. Add two `ToolbarItems` inside the\
    \ `.toolbar` like this:\n\n```\nstruct ContentView: View {\n    @State var flag\
    \ = true\n    @State var message = \"\"\n}\n```\n\n```\nvar body: some View {\n\
    \    NavigationView {\n        VStack {\n        }\n    }\n}\n```\n\n```\nvar\
    \ body: some View {\n    NavigationView {\n        VStack {\n        }\n    }\n\
    \    .accentColor(.purple)\n}\n```\n\n```\nvar body: some View {\n    NavigationView\
    \ {\n        VStack {\n            Text(message)\n            Toggle(isOn: $flag,\
    \ label: {\n                Text(\"Toggle display mode\")\n            })\n  \
    \          .navigationTitle(\"Navigation Title\")\n            .navigationBarTitleDisplayMode(flag\
    \ ? .large : .inline)\n            .toolbar {\n            }\n        }\n    }\n\
    \    .accentColor(.purple)\n}\n```\n\n```\nvar body: some View {\n    NavigationView\
    \ {\n        VStack {\n            Text(message)\n            Toggle(isOn: $flag,\
    \ label: {\n                Text(\"Toggle display mode\")\n            })\n  \
    \          .navigationTitle(\"Navigation Title\")\n            .navigationBarTitleDisplayMode(flag\
    \ ? .large : .inline)\n            .toolbar {\n                ToolbarItem(placement:\
    \ .navigationBarLeading) {\n                    Button {\n                   \
    \     message = \"iCloud icon tapped\"\n                    } label: {\n     \
    \                   Image(systemName: \"icloud\")\n                    }\n   \
    \             }\n                ToolbarItem(placement: .navigationBarTrailing)\
    \ {\n                    Button {\n                        message = \"Done button\
    \ tapped\"\n                    } label: {\n                        Text(\"Done\"\
    )\n                    }\n                }\n            }\n        }\n    }\n\
    \    .accentColor(.purple)\n}\n```\n\nFor each `ToolbarItem`, you can define the\
    \ button’s appearance with either a `Text` view or an `Image` view. The preceding\
    \ code displays a cloud icon in the upper left corner and the word “Done” in the\
    \ upper right corner as shown in Figure 16-3.\n\n![../images/329781_6_En_16_Chapter/329781_6_En_16_Fig3_HTML.jpg](images/329781_6_En_16_Chapter/329781_6_En_16_Fig3_HTML.jpg)\n\
    \nFigure 16-3\n\nThe appearance of toolbar buttons with the `.inline` modifier\n\
    \n1. Click the Live Preview icon on the Canvas pane.\n2. Click the buttons in\
    \ the navigation bar, defined by `ToolbarItem`. Notice each time you click a toolbar\
    \ button, a message appears in the `Text` view such as “iCloud icon tapped” or\
    \ “Done button tapped.”"
  raw: '# 16. Using the Navigation View


    Only the simplest apps consist of a single screen such as the Calculator app.
    However, most apps usually need two or more screens to display information. In
    SwiftUI, you can define each screen of your app’s user interface by creating a
    separate structure. Then you need to provide a way to jump from one screen to
    another.


    One of the simplest ways to jump from one screen to another is through a Navigation
    View, which displays multiple screens in sequential order. This Navigation View
    is commonly used in many iOS apps such as Settings to let users view different
    options as shown in Figure [16-1](#329781_6_En_16_Chapter.xhtml#Fig1).


    ![../images/329781_6_En_16_Chapter/329781_6_En_16_Fig1_HTML.png](images/329781_6_En_16_Chapter/329781_6_En_16_Fig1_HTML.png)


    Figure 16-1


    A Navigation View makes it easy to jump from one screen to another


    In Figure [16-1](#329781_6_En_16_Chapter.xhtml#Fig1), the user can tap the Settings
    icon on the Home screen to display the Settings screen. Tapping General opens
    the General screen. Then tapping Keyboard opens the Keyboard screen. Note that
    to go backward, you can just tap the Back button in the upper left corner.


    From the Keyboards screen, the Back button takes you back to the General screen.
    From the Generals screen, the Back button takes you back to the Settings screen.
    A Navigation View does nothing more than allow the user to jump from one screen
    to another in sequential order.


    ## Using a Navigation View


    A Navigation View can hold up to ten views just like a stack. A Navigation View
    contains multiple views using code like this:


    ```

    NavigationView {

    // Put multiple views here

    }

    ```


    A Navigation View creates a small amount of space at the top of the screen called
    the navigation bar. The purpose of this space is to display buttons or icons.
    Until you add any buttons or icons, this navigation bar space will just appear
    blank.


    One common way to modify the Navigation View is to add a title by using the .navigationTitle
    and the .navigationBarTitleDisplayMode modifier.


    Note


    When adding modifiers to a NavigationView, place the modifiers inside the NavigationView
    curly brackets like this:


    `NavigationView {            .navigationTitle("Navigation Title")            .navigationBarTitleDisplayMode(.inline        }`


    The .navigationTitle modifier lets you define text to appear at the top of the
    screen. The .navigationBarTitleDisplayMode modifier lets you define how that title
    appears on the screen. The two options are .large and .inline, as shown in Figure
    [16-2](#329781_6_En_16_Chapter.xhtml#Fig2), where .large is the default if you
    do not add a .navigationBarTitleDisplayMode modifier.


    ![../images/329781_6_En_16_Chapter/329781_6_En_16_Fig2_HTML.jpg](images/329781_6_En_16_Chapter/329781_6_En_16_Fig2_HTML.jpg)


    Figure 16-2


    The appearance of a navigation title with a .large and .inline modifier


    To see how to create a simple Navigation View, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “SimpleNavigationView.”


    2.  Click the ContentView file in the Navigator pane.


    3.  Add a State variable under the struct ContentView: View line like this:


    1.  Add a NavigationView inside the var body: some View like this:


    ```

    struct ContentView: View {

    @State var flag = true

    ```


    1.  Add a Toggle, a .navigationTitle modifier, and a .navigationBarTitleDisplayMode
    modifier like this:


    ```

    var body: some View {

    NavigationView {

    }

    }

    ```


    ```

    var body: some View {

    NavigationView {

    Toggle(isOn: $flag, label: {

    Text("Toggle display mode")

    })

    .navigationTitle("Navigation Title")

    .navigationBarTitleDisplayMode(flag ? .large : .inline)

    }

    }

    ```


    This code changes the appearance of the navigation title to either .large or .inline
    based on the value of the Toggle.


    1.  Click the Live Preview icon on the Canvas pane.


    2.  Click the Toggle to see how the navigation title switches between the .large
    and .inline styles.


    If you want to hide the navigation title and navigation bar completely, you can
    use the .navigationBarHidden modifier like this:


    ```

    .navigationBarHidden(true)

    ```


    This can be useful in case you don’t want the Navigation View to take up space
    at the top of the screen or to temporarily hide the navigation title.


    ## Adding Buttons to a Navigation Bar


    The navigation bar provides room to display one or more buttons at the top of
    the screen. The first step to creating buttons on the navigation bar is to add
    the .toolbar modifier inside the Navigation View like this:


    ```

    NavigationView {

    .navigationTitle("Navigation Title")

    .toolbar {

    }

    }

    ```


    By default, the color of any buttons or icons defined inside the .toolbar will
    be blue. If you want to define a different color, you can add the .accentColor
    modifier to the NavigationView like this:


    ```

    NavigationView {

    .navigationTitle("Navigation Title")

    .toolbar {

    }

    }.accentColor(.purple)

    ```


    Inside the .toolbar modifier is where you can define one or more ToolBarItem.
    For each ToolBarItem you add, you can define its placement (in the upper left
    corner as .navigationBarLeading or in the upper right corner as .navigationBarTrailing).
    In addition, you must define the appearance of the button and the code to run
    if the user selects that button like this:


    ```

    .toolbar {

    ToolbarItem(placement: .navigationBarLeading) {

    Button {

    //  Code to run

    } label: {

    //  Define button’s appearance here

    }

    }

    ToolbarItem(placement: .navigationBarTrailing) {

    Button {

    //  Code to run

    } label: {

    //  Define button’s appearance here

    }

    }

    ```


    To see how to define buttons in a Navigation View, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “NavigationViewButtons.”


    2.  Click the ContentView file in the Navigator pane.


    3.  Add two State variables under the struct ContentView: View line like this:


    1.  Add a NavigationView and a VStack under the var body: some View line like
    this:


    ```

    struct ContentView: View {

    @State var flag = true

    @State var message = ""

    ```


    1.  Add the .accentColor modifier to the NavigationView like this:


    ```

    var body: some View {

    NavigationView {

    VStack {

    }

    }

    ```


    1.  Add a Text view, a Toggle, the .navigationTitle, the .navigationBarTitleDisplayMode,
    and the .toolbar modifiers like this:


    ```

    var body: some View {

    NavigationView {

    VStack {

    }

    }.accentColor(.purple)

    ```


    1.  Add two ToolbarItems inside the .toolbar like this:


    ```

    var body: some View {

    NavigationView {

    VStack {

    Text(message)

    Toggle(isOn: $flag, label: {

    Text("Toggle display mode")

    })

    .navigationTitle("Navigation Title")

    .navigationBarTitleDisplayMode(flag ? .large : .inline)

    .toolbar {

    }

    }

    }.accentColor(.purple)

    ```


    ```

    var body: some View {

    NavigationView {

    VStack {

    Text(message)

    Toggle(isOn: $flag, label: {

    Text("Toggle display mode")

    })

    .navigationTitle("Navigation Title")

    .navigationBarTitleDisplayMode(flag ? .large : .inline)

    .toolbar {

    ToolbarItem(placement: .navigationBarLeading) {

    Button {

    message = "iCloud icon tapped"

    } label: {

    Image(systemName: "icloud")

    }

    }

    ToolbarItem(placement: .navigationBarTrailing) {

    Button {

    message = "Done button tapped"

    } label: {

    Text("Done")

    }

    }

    }

    }

    }.accentColor(.purple)

    ```


    For each ToolbarItem, you can define the button’s appearance with either a Text
    view or an Image view. The preceding code displays a cloud icon in the upper left
    corner and the word “Done” in the upper right corner as shown in Figure [16-3](#329781_6_En_16_Chapter.xhtml#Fig3).


    ![../images/329781_6_En_16_Chapter/329781_6_En_16_Fig3_HTML.jpg](images/329781_6_En_16_Chapter/329781_6_En_16_Fig3_HTML.jpg)


    Figure 16-3


    The appearance of toolbar buttons with the .inline modifier


    1.  Click the Live Preview icon on the Canvas pane.


    2.  Click the buttons in the navigation bar, defined by ToolbarItem. Notice each
    time you click a toolbar button, a message appears in the Text view such as “iCloud
    icon tapped” or “Done button tapped.”'
  trans: "\n# 使用导航视图\n\n只有最简单的应用（如计算器应用）才由单个屏幕组成。然而，大多数应用通常需要两个或更多屏幕来显示信息。在 SwiftUI\
    \ 中，你可以通过创建独立的结构来定义应用用户界面的每个屏幕。然后，你需要提供一种从一个屏幕跳转到另一个屏幕的方法。\n\n从一个屏幕跳转到另一个屏幕的最简单方法之一是通过**导航视图**，它可以按顺序显示多个屏幕。这种导航视图广泛用于许多\
    \ iOS 应用（如“设置”），让用户可以查看不同的选项，如图 16-1 所示。\n\n![../images/329781_6_En_16_Chapter/329781_6_En_16_Fig1_HTML.png](img/329781_6_En_16_Fig1_HTML.png)\n\
    \n图 16-1\n\n导航视图使从一个屏幕跳转到另一个屏幕变得简单\n\n在图 16-1 中，用户可以点击主屏幕上的“设置”图标来显示设置屏幕。点击“通用”会打开通用屏幕。接着点击“键盘”会打开键盘屏幕。请注意，要返回，只需点击左上角的“返回”按钮即可。\n\
    \n从键盘屏幕，返回按钮带你回到通用屏幕。从通用屏幕，返回按钮带你回到设置屏幕。导航视图所做的仅仅是允许用户按顺序从一个屏幕跳转到另一个屏幕。\n\n##\
    \ 使用导航视图\n\n导航视图可以像栈一样容纳最多十个视图。导航视图使用如下代码包含多个视图：\n\n```\nNavigationView {\n//\
    \ 在这里放置多个视图\n}\n```\n\n导航视图会在屏幕顶部创建一小块空间，称为导航栏。这个空间的目的是显示按钮或图标。在添加任何按钮或图标之前，这个导航栏空间将显示为空白。\n\
    \n修改导航视图的一种常见方式是使用 `.navigationTitle` 和 `.navigationBarTitleDisplayMode` 修饰符来添加标题。\n\
    \n> **注意**\n> 当为 `NavigationView` 添加修饰符时，请将修饰符放在 `NavigationView` 的花括号内，如下所示：\n\
    > ```\n> NavigationView {\n>     .navigationTitle(\"导航标题\")\n>     .navigationBarTitleDisplayMode(.inline)\n\
    > }\n> ```\n\n`.navigationTitle` 修饰符允许你定义显示在屏幕顶部的文本。`.navigationBarTitleDisplayMode`\
    \ 修饰符允许你定义该标题在屏幕上的显示方式。两个选项是 `.large` 和 `.inline`，如图 16-2 所示，如果你不添加 `.navigationBarTitleDisplayMode`\
    \ 修饰符，`.large` 是默认选项。\n\n![../images/329781_6_En_16_Chapter/329781_6_En_16_Fig2_HTML.jpg](img/329781_6_En_16_Fig2_HTML.jpg)\n\
    \n图 16-2\n\n导航标题在 `.large` 和 `.inline` 修饰符下的外观\n\n要了解如何创建一个简单的导航视图，请遵循以下步骤：\n\n\
    1. 创建一个新的 SwiftUI iOS 应用项目，并为其指定任意名称，例如 “SimpleNavigationView”。\n2. 在导航器面板中点击\
    \ `ContentView` 文件。\n3. 在 `struct ContentView: View` 行下添加一个状态变量，如下所示：\n4. 在 `var\
    \ body: some View` 内部添加一个 `NavigationView`，如下所示：\n5. 添加一个 `Toggle`、一个 `.navigationTitle`\
    \ 修饰符和一个 `.navigationBarTitleDisplayMode` 修饰符，如下所示：\n\n```\nstruct ContentView:\
    \ View {\n    @State var flag = true\n}\n```\n\n```\nvar body: some View {\n \
    \   NavigationView {\n    }\n}\n```\n\n```\nvar body: some View {\n    NavigationView\
    \ {\n        Toggle(isOn: $flag, label: {\n            Text(\"切换显示模式\")\n    \
    \    })\n        .navigationTitle(\"导航标题\")\n        .navigationBarTitleDisplayMode(flag\
    \ ? .large : .inline)\n    }\n}\n```\n\n这段代码根据 `Toggle` 的值将导航标题的外观更改为 `.large`\
    \ 或 `.inline`。\n\n1. 点击画布面板上的 Live Preview 图标。\n2. 点击 `Toggle`，观察导航标题如何在 `.large`\
    \ 和 `.inline` 样式之间切换。\n\n如果你想完全隐藏导航标题和导航栏，可以使用 `.navigationBarHidden` 修饰符，如下所示：\n\
    \n```\n.navigationBarHidden(true)\n```\n\n如果你不希望导航视图占据屏幕顶部的空间，或者想临时隐藏导航标题，这会很有用。\n\
    \n## 向导航栏添加按钮\n\n导航栏提供了在屏幕顶部显示一个或多个按钮的空间。在导航栏上创建按钮的第一步是向 Navigation View 内部添加\
    \ `.toolbar` 修饰符，如下所示：\n\n```\nNavigationView {\n    .navigationTitle(\"导航标题\"\
    )\n    .toolbar {\n    }\n}\n```\n\n默认情况下，在 `.toolbar` 内部定义的任何按钮或图标的颜色都是蓝色。如果你想定义不同的颜色，可以向\
    \ `NavigationView` 添加 `.accentColor` 修饰符，如下所示：\n\n```\nNavigationView {\n    .navigationTitle(\"\
    导航标题\")\n    .toolbar {\n    }\n}\n.accentColor(.purple)\n```\n\n在 `.toolbar`\
    \ 修饰符内部，你可以定义一个或多个 `ToolbarItem`。对于添加的每个 `ToolbarItem`，你可以定义其位置（在左上角为 `.navigationBarLeading`，或在右上角为\
    \ `.navigationBarTrailing`）。此外，你必须定义按钮的外观以及用户选择该按钮时要运行的代码，如下所示：\n\n```\n.toolbar\
    \ {\n    ToolbarItem(placement: .navigationBarLeading) {\n        Button {\n \
    \           //  要运行的代码\n        } label: {\n            //  在此处定义按钮的外观\n     \
    \   }\n    }\n    ToolbarItem(placement: .navigationBarTrailing) {\n        Button\
    \ {\n            //  要运行的代码\n        } label: {\n            //  在此处定义按钮的外观\n\
    \        }\n    }\n}\n```\n\n要了解如何在导航视图中定义按钮，请遵循以下步骤：\n\n1. 创建一个新的 SwiftUI iOS\
    \ 应用项目，并为其指定任意名称，例如 “NavigationViewButtons”。\n2. 在导航器面板中点击 `ContentView` 文件。\n\
    3. 在 `struct ContentView: View` 行下添加两个状态变量，如下所示：\n4. 在 `var body: some View` 行下添加一个\
    \ `NavigationView` 和一个 `VStack`，如下所示：\n5. 向 `NavigationView` 添加 `.accentColor`\
    \ 修饰符，如下所示：\n6. 添加一个 `Text` 视图、一个 `Toggle`、`.navigationTitle`、`.navigationBarTitleDisplayMode`\
    \ 和 `.toolbar` 修饰符，如下所示：\n7. 在 `.toolbar` 内部添加两个 `ToolbarItems`，如下所示：\n\n```\n\
    struct ContentView: View {\n    @State var flag = true\n    @State var message\
    \ = \"\"\n}\n```\n\n```\nvar body: some View {\n    NavigationView {\n       \
    \ VStack {\n        }\n    }\n}\n```\n\n```\nvar body: some View {\n    NavigationView\
    \ {\n        VStack {\n        }\n    }\n    .accentColor(.purple)\n}\n```\n\n\
    ```\nvar body: some View {\n    NavigationView {\n        VStack {\n         \
    \   Text(message)\n            Toggle(isOn: $flag, label: {\n                Text(\"\
    切换显示模式\")\n            })\n            .navigationTitle(\"导航标题\")\n          \
    \  .navigationBarTitleDisplayMode(flag ? .large : .inline)\n            .toolbar\
    \ {\n            }\n        }\n    }\n    .accentColor(.purple)\n}\n```\n\n```\n\
    var body: some View {\n    NavigationView {\n        VStack {\n            Text(message)\n\
    \            Toggle(isOn: $flag, label: {\n                Text(\"切换显示模式\")\n\
    \            })\n            .navigationTitle(\"导航标题\")\n            .navigationBarTitleDisplayMode(flag\
    \ ? .large : .inline)\n            .toolbar {\n                ToolbarItem(placement:\
    \ .navigationBarLeading) {\n                    Button {\n                   \
    \     message = \"已点击 iCloud 图标\"\n                    } label: {\n          \
    \              Image(systemName: \"icloud\")\n                    }\n        \
    \        }\n                ToolbarItem(placement: .navigationBarTrailing) {\n\
    \                    Button {\n                        message = \"已点击完成按钮\"\n\
    \                    } label: {\n                        Text(\"完成\")\n      \
    \              }\n                }\n            }\n        }\n    }\n    .accentColor(.purple)\n\
    }\n```\n\n对于每个 `ToolbarItem`，你可以使用 `Text` 视图或 `Image` 视图来定义按钮的外观。上述代码在左上角显示一个云图标，在右上角显示单词“完成”，如图\
    \ 16-3 所示。\n\n![../images/329781_6_En_16_Chapter/329781_6_En_16_Fig3_HTML.jpg](img/329781_6_En_16_Fig3_HTML.jpg)\n\
    \n图 16-3\n\n使用 `.inline` 修饰符的工具栏按钮外观\n\n1. 点击画布面板上的 Live Preview 图标。\n2. 点击导航栏中由\
    \ `ToolbarItem` 定义的按钮。注意每次点击工具栏按钮时，`Text` 视图中会显示一条消息，例如“已点击 iCloud 图标”或“已点击完成按钮”。\n"
- fmt: "# Adding Links to a Navigation View\n\nThe main purpose of a `NavigationView`\
    \ is to let the user jump from one screen to another. To do that, you need to\
    \ use a `NavigationLink` that defines:\n\n- The text that appears on the link\n\
    - The next view to display when the user selects the `NavigationLink`\n\nThe `NavigationLink`\
    \ looks like this:\n\n```\nNavigationLink(destination: /* Next view to display\
    \ */) {\n    // Text view to define the appearance of the link\n}\n```\n\nThe\
    \ destination can be any view, while the link is typically a `Text` view but could\
    \ also be an `Image` view. To see how to create navigation links, follow these\
    \ steps:\n\n1. Create a new SwiftUI iOS App project and give it any name you wish\
    \ such as `SimpleNavigationViewLinks`.\n2. Click the `ContentView` file in the\
    \ Navigator pane.\n3. Add a `NavigationView` and a `VStack` inside the `var body:\
    \ some View` line like this:\n\n```\nvar body: some View {\n    NavigationView\
    \ {\n        VStack {\n        }\n    }\n}\n```\n\n4. Add two `NavigationLinks`\
    \ inside the `VStack` along with a `.navigationTitle` modifier like this:\n\n\
    ```\nvar body: some View {\n    NavigationView {\n        VStack {\n         \
    \   NavigationLink(destination: Text(\"Text view\")) {\n                Text(\"\
    This is a navigation link\")\n            }\n            NavigationLink(destination:\
    \ Image(systemName: \"hare\")) {\n                Text(\"Second navigation link\"\
    )\n            }\n            .navigationTitle(\"Navigation Title\")\n       \
    \ }\n    }\n}\n```\n\nThe first `NavigationLink` defines a `Text` view as its\
    \ destination, while the second `NavigationLink` defines an `Image` view as its\
    \ destination. Both will appear within the `NavigationView` with a Back button\
    \ in the upper left corner. The entire `ContentView` file should look like this:\n\
    \n```\nimport SwiftUI\n\nstruct ContentView: View {\n    var body: some View {\n\
    \        NavigationView {\n            VStack {\n                NavigationLink(destination:\
    \ Text(\"Text view\")) {\n                    Text(\"This is a navigation link\"\
    )\n                }\n                NavigationLink(destination: Image(systemName:\
    \ \"hare\")) {\n                    Text(\"Second navigation link\")\n       \
    \         }\n                .navigationTitle(\"Navigation Title\")\n        \
    \    }\n        }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider {\n\
    \    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\n\
    5. Click the Live Preview icon on the Canvas pane. The two `NavigationLinks` appear\
    \ on the screen under `Navigation Title`.\n6. Click `This is a navigation link.`\
    \ Notice that the `Text` view showing `Text view` appears on the screen with a\
    \ Back button in the upper left corner.\n7. Click the Back button to return back\
    \ to the `NavigationView` displaying the two navigation links.\n8. Click `Second\
    \ navigation link.` Notice that the `Image` view showing a `hare` icon appears\
    \ on the screen with a Back button in the upper left corner.\n\n## Displaying\
    \ Structures in a Navigation View\n\nJust displaying a single view like a `Text`\
    \ or `Image` view within a `NavigationView` might be fine in some cases. However,\
    \ many times you may want to display a new user interface altogether. Since you\
    \ can define a user interface screen with a structure, you can create multiple\
    \ screens using multiple structures that can appear within a `NavigationView`.\n\
    \nThe simplest way to create a new structure is within the `ContentView` file.\
    \ However, this can clutter the code, so a second way is to store the structure\
    \ in a separate file.\n\nTo see how to create structures that define another user\
    \ interface screen, follow these steps:\n\n1. Create a new SwiftUI iOS App project\
    \ and give it any name you wish such as `NavigationViewStructures`.\n2. Click\
    \ the `ContentView` file in the Navigator pane.\n3. Add a `NavigationView` and\
    \ a `VStack` inside the `var body: some View` line like this:\n\n```\nvar body:\
    \ some View {\n    NavigationView {\n        VStack {\n        }\n    }\n}\n```\n\
    \n4. Add two `NavigationLinks` and a `.navigationTitle` modifier to the `VStack`\
    \ like this:\n\n```\nvar body: some View {\n    NavigationView {\n        VStack\
    \ {\n            NavigationLink(destination: FileView()) {\n                Text(\"\
    Link to structure in same file\")\n            }\n            NavigationLink(destination:\
    \ SeparateFileView()) {\n                Text(\"Separate file link\")\n      \
    \      }\n            .navigationTitle(\"Navigation Title\")\n        }\n    }\n\
    }\n```\n\nThe first `NavigationLink` will display a structure called `FileView`.\
    \ The second `NavigationLink` will display a structure called `SeparateFileView`.\
    \ Since neither of these structures exist yet, we’ll need to create them.\n\n\
    5. Add the following structure underneath the entire `struct ContentView: View`\
    \ structure like this:\n\n```\nstruct FileView: View {\n    var body: some View\
    \ {\n        HStack {\n            Spacer()\n            VStack {\n          \
    \      Spacer()\n                Text(\"This is a separate structure\")\n    \
    \            Text(\"that's stored in the same file\")\n                Spacer()\n\
    \            }\n            Spacer()\n        }.background(Color.yellow)\n   \
    \ }\n}\n```\n\nThe entire `ContentView` file should look like this:\n\n```\nimport\
    \ SwiftUI\n\nstruct ContentView: View {\n    var body: some View {\n        NavigationView\
    \ {\n            VStack {\n                NavigationLink(destination: FileView())\
    \ {\n                    Text(\"Link to structure in same file\")\n          \
    \      }\n                NavigationLink(destination: SeparateFileView()) {\n\
    \                    Text(\"Separate file link\")\n                }\n       \
    \         .navigationTitle(\"Navigation Title\")\n            }\n        }\n \
    \   }\n}\n\nstruct FileView: View {\n    var body: some View {\n        HStack\
    \ {\n            Spacer()\n            VStack {\n                Spacer()\n  \
    \              Text(\"This is a separate structure\")\n                Text(\"\
    that's stored in the same file\")\n                Spacer()\n            }\n \
    \           Spacer()\n        }.background(Color.yellow)\n    }\n}\n\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```\n\nWe can keep adding new structures inside the `ContentView` file,\
    \ but this risks cluttering up the file. A second way to create structures is\
    \ to store them in a separate file, which the next steps will let us do.\n\n![Figure\
    \ 16-4](images/329781_6_En_16_Chapter/329781_6_En_16_Fig4_HTML.jpg)\n\n**Figure\
    \ 16-4** — A dialog for choosing a file to create\n\n6. Choose **File** ➤ **New**\
    \ ➤ **File**. A dialog appears as shown in Figure 16-4.\n7. Click **iOS** near\
    \ the top of the dialog, click **Swift File**, and then click **Next**. Xcode\
    \ asks for a name to give your newly created file.\n8. Type `SeparateFile` and\
    \ click **Create**. Xcode creates a new Swift file.\n9. Delete all code currently\
    \ in the `SeparateFile` and replace it with the following:\n\n```\nimport SwiftUI\n\
    \nstruct SeparateFileView: View {\n    var body: some View {\n        HStack {\n\
    \            Spacer()\n            VStack {\n                Spacer()\n      \
    \          Text(\"This is another structure\")\n                Text(\"but stored\
    \ in a separate file\")\n                Spacer()\n            }\n           \
    \ Spacer()\n        }.background(Color.orange)\n    }\n}\n\nstruct SeparateFileView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        SeparateFileView()\n\
    \    }\n}\n```\n\n> **Note:** When storing a structure in a separate file, you\
    \ need a second structure (`PreviewProvider`) to display that user interface in\
    \ the Canvas pane.\n\n10. Click the `ContentView` file in the Navigator pane.\n\
    11. Click the Live Preview icon in the Canvas pane.\n12. Click the `Link to structure\
    \ in same file.` Notice that this displays the `FileView` structure stored in\
    \ the `ContentView` file.\n13. Click the Back button to return to the original\
    \ screen.\n14. Click the `Separate file link.` Notice that this displays the `SeparateFileView`\
    \ structure stored in a file called `SeparateFile`."
  raw: '## Adding Links to a Navigation View


    The main purpose of a Navigation View is to let the user jump from one screen
    to another. To do that, you need to use a NavigationLink that defines


    *   The text that appears on the link


    *   The next view to display when the user selects the NavigationLink


    The NavigationLink looks like this:


    ```

    NavigationLink(destination: /* Next view to display */) {

    // Text view to define the appearance of the link

    }

    ```


    The destination can be any view, while the link is typically a Text view but could
    also be an Image view. To see how to create navigation links, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “SimpleNavigationViewLinks.”


    2.  Click the ContentView file in the Navigator pane.


    3.  Add a NavigationView and a VStack inside the var body: some View line like
    this:


    1.  Add two NavigationLinks inside the VStack along with a .navigationTitle modifier
    like this:


    ```

    var body: some View {

    NavigationView {

    VStack {

    }

    }

    ```


    ```

    var body: some View {

    NavigationView {

    VStack {

    NavigationLink(destination: Text("Text view")) {

    Text("This is a navigation link")

    }

    NavigationLink(destination: Image(systemName: "hare")) {

    Text("Second navigation link")

    }

    .navigationTitle("Navigation Title")

    }

    }

    ```


    The first NavigationLink defines a Text view as its destination, while the second
    NavigationLink defines an Image view as its destination. Both will appear within
    the NavigationView with a Back button in the upper left corner. The entire ContentView
    file should look like this:


    1.  Click the Live Preview icon on the Canvas pane. The two NavigationLinks appear
    on the screen under “Navigation Title.”


    2.  Click “This is a navigation link.” Notice that the Text view showing “Text
    view” appears on the screen with a Back button in the upper left corner.


    3.  Click the Back button to return back to the NavigationView displaying the
    two navigation links.


    4.  Click “Second navigation link.” Notice that the Image view showing a “hare”
    icon appears on the screen with a Back button in the upper left corner.


    ```

    import SwiftUI

    struct ContentView: View {

    var body: some View {

    NavigationView {

    VStack {

    NavigationLink(destination: Text("Text view")) {

    Text("This is a navigation link")

    }

    NavigationLink(destination: Image(systemName: "hare")) {

    Text("Second navigation link")

    }

    .navigationTitle("Navigation Title")

    }

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    ### Displaying Structures in a Navigation View


    Just displaying a single view like a Text or Image view within a Navigation View
    might be fine in some cases. However, many times you may want to display a new
    user interface altogether. Since you can define a user interface screen with a
    structure, you can create multiple screens using multiple structures that can
    appear within a Navigation View.


    The simplest way to create a new structure is within the ContentView file. However,
    this can clutter the code, so a second way is to store the structure in a separate
    file.


    To see how to create structures that define another user interface screen, follow
    these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “NavigationViewStructures.”


    2.  Click the ContentView file in the Navigator pane.


    3.  Add a NavigationView and a VStack inside the var body: some View line like
    this:


    1.  Add two NavigationLinks and a .navigationTitle modifier to the VStack like
    this:


    ```

    var body: some View {

    NavigationView {

    VStack {

    }

    }

    ```


    ```

    var body: some View {

    NavigationView {

    VStack {

    NavigationLink(destination: FileView()) {

    Text("Link to structure in same file")

    }

    NavigationLink(destination: SeparateFileView()) {

    Text("Separate file link")

    }

    .navigationTitle("Navigation Title")

    }

    }

    }

    ```


    The first NavigationLink will display a structure called FileView. The second
    NavigationLink will display a structure called SeparateFileView. Since neither
    of these structures exist yet, we’ll need to create them.


    1.  Add the following structure underneath the entire struct ContentView: View
    structure like this:


    ```

    struct FileView: View {

    var body: some View {

    HStack {

    Spacer()

    VStack {

    Spacer()

    Text("This is a separate structure")

    Text("that''s stored in the same file")

    Spacer()

    }

    Spacer()

    }.background(Color.yellow)

    }

    }

    ```


    The entire ContentView file should look like this:


    ```

    import SwiftUI

    struct ContentView: View {

    var body: some View {

    NavigationView {

    VStack {

    NavigationLink(destination: FileView()) {

    Text("Link to structure in same file")

    }

    NavigationLink(destination: SeparateFileView()) {

    Text("Separate file link")

    }

    .navigationTitle("Navigation Title")

    }

    }

    }

    }

    struct FileView: View {

    var body: some View {

    HStack {

    Spacer()

    VStack {

    Spacer()

    Text("This is a separate structure")

    Text("that''s stored in the same file")

    Spacer()

    }

    Spacer()

    }.background(Color.yellow)

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    We can keep adding new structures inside the ContentView file, but this risks
    cluttering up the file. A second way to create structures is to store them in
    a separate file, which the next steps will let us do.


    ![../images/329781_6_En_16_Chapter/329781_6_En_16_Fig4_HTML.jpg](images/329781_6_En_16_Chapter/329781_6_En_16_Fig4_HTML.jpg)


    Figure 16-4


    A dialog for choosing a file to create


    1.  Choose File ➤ New ➤ File. A dialog appears as shown in Figure [16-4](#329781_6_En_16_Chapter.xhtml#Fig4).


    1.  Click iOS near the top of the dialog, click Swift File, and then click Next.
    Xcode asks for a name to give your newly created file.


    2.  Type SeparateFile and click Create. Xcode creates a new Swift file.


    3.  Delete all code currently in the SeparateFile and replace it with the following:


    ```

    import SwiftUI

    struct SeparateFileView: View {

    var body: some View {

    HStack {

    Spacer()

    VStack {

    Spacer()

    Text("This is another structure")

    Text("but stored in a separate file")

    Spacer()

    }

    Spacer()

    }.background(Color.orange)

    }

    }

    struct SeparateFileView_Previews: PreviewProvider {

    static var previews: some View {

    SeparateFileView()

    }

    }

    ```


    Note


    When storing a structure in a separate file, you need a second structure (PreviewProvider)
    to display that user interface in the Canvas pane.


    1.  Click the ContentView file in the Navigator pane.


    2.  Click the Live Preview icon in the Canvas pane.


    3.  Click the “Link to structure in same file.” Notice that this displays the
    FileView structure stored in the ContentView file.


    4.  Click the Back button to return to the original screen.


    5.  Click the “Separate file link.” Notice that this displays the SeparateFileView
    structure stored in a file called SeparateFile.'
  trans: "\n# 为导航视图添加链接\n\n`NavigationView`的主要目的是让用户从一个屏幕跳转到另一个屏幕。为此，你需要使用`NavigationLink`来定义：\n\
    \n- 链接上显示的文本\n- 用户选择`NavigationLink`后要显示的下一个视图\n\n`NavigationLink`的结构如下所示：\n\n\
    ```\nNavigationLink(destination: /* 要显示的下一个视图 */) {\n    // 用于定义链接外观的文本视图\n}\n\
    ```\n\n目标可以是任何视图，而链接通常是一个`Text`视图，但也可以是`Image`视图。要了解如何创建导航链接，请按以下步骤操作：\n\n1. 创建一个新的\
    \ SwiftUI iOS App 项目，并为其指定任意名称，例如`SimpleNavigationViewLinks`。\n2. 在导航器窗格中点击`ContentView`文件。\n\
    3. 在`var body: some View`代码行内添加一个`NavigationView`和一个`VStack`，如下所示：\n\n```\nvar\
    \ body: some View {\n    NavigationView {\n        VStack {\n        }\n    }\n\
    }\n```\n\n4. 在`VStack`内部添加两个`NavigationLinks`，并添加一个`.navigationTitle`修饰符，如下所示：\n\
    \n```\nvar body: some View {\n    NavigationView {\n        VStack {\n       \
    \     NavigationLink(destination: Text(\"文本视图\")) {\n                Text(\"这是一个导航链接\"\
    )\n            }\n            NavigationLink(destination: Image(systemName: \"\
    hare\")) {\n                Text(\"第二个导航链接\")\n            }\n            .navigationTitle(\"\
    导航标题\")\n        }\n    }\n}\n```\n\n第一个`NavigationLink`将`Text`视图定义为其目标，而第二个`NavigationLink`将`Image`视图定义为其目标。两者都将显示在`NavigationView`内，并在左上角带有一个返回按钮。整个`ContentView`文件应如下所示：\n\
    \n```\nimport SwiftUI\n\nstruct ContentView: View {\n    var body: some View {\n\
    \        NavigationView {\n            VStack {\n                NavigationLink(destination:\
    \ Text(\"文本视图\")) {\n                    Text(\"这是一个导航链接\")\n                }\n\
    \                NavigationLink(destination: Image(systemName: \"hare\")) {\n\
    \                    Text(\"第二个导航链接\")\n                }\n                .navigationTitle(\"\
    导航标题\")\n            }\n        }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \n5. 点击画布窗格上的**实时预览**图标。两个`NavigationLinks`将显示在`导航标题`下方的屏幕上。\n6. 点击`这是一个导航链接`。注意，显示`文本视图`的`Text`视图将出现在屏幕上，并在左上角带有一个返回按钮。\n\
    7. 点击**返回**按钮，返回到显示这两个导航链接的`NavigationView`。\n8. 点击`第二个导航链接`。注意，显示`hare`图标的`Image`视图将出现在屏幕上，并在左上角带有一个返回按钮。\n\
    \n## 在导航视图中显示结构\n\n在某些情况下，仅在`NavigationView`内显示单个视图（如`Text`或`Image`视图）可能没问题。然而，很多时候你可能希望显示一个全新的用户界面。由于你可以使用结构体定义用户界面屏幕，因此你可以使用多个结构体创建多个屏幕，这些屏幕可以显示在`NavigationView`内。\n\
    \n创建新结构体的最简单方法是在`ContentView`文件内进行。然而，这可能会使代码变得臃肿，因此第二种方法是将结构体存储在单独的文件中。\n\n要了解如何创建定义另一个用户界面屏幕的结构体，请按以下步骤操作：\n\
    \n1. 创建一个新的 SwiftUI iOS App 项目，并为其指定任意名称，例如`NavigationViewStructures`。\n2. 在导航器窗格中点击`ContentView`文件。\n\
    3. 在`var body: some View`代码行内添加一个`NavigationView`和一个`VStack`，如下所示：\n\n```\nvar\
    \ body: some View {\n    NavigationView {\n        VStack {\n        }\n    }\n\
    }\n```\n\n4. 向`VStack`添加两个`NavigationLinks`和一个`.navigationTitle`修饰符，如下所示：\n\n\
    ```\nvar body: some View {\n    NavigationView {\n        VStack {\n         \
    \   NavigationLink(destination: FileView()) {\n                Text(\"链接到同一文件中的结构\"\
    )\n            }\n            NavigationLink(destination: SeparateFileView())\
    \ {\n                Text(\"链接到单独文件\")\n            }\n            .navigationTitle(\"\
    导航标题\")\n        }\n    }\n}\n```\n\n第一个`NavigationLink`将显示一个名为`FileView`的结构体。第二个`NavigationLink`将显示一个名为`SeparateFileView`的结构体。由于这两个结构体尚不存在，我们需要创建它们。\n\
    \n5. 在`struct ContentView: View`整个结构体下方添加以下结构体，如下所示：\n\n```\nstruct FileView:\
    \ View {\n    var body: some View {\n        HStack {\n            Spacer()\n\
    \            VStack {\n                Spacer()\n                Text(\"这是一个独立的结构\"\
    )\n                Text(\"存储在同一个文件中\")\n                Spacer()\n           \
    \ }\n            Spacer()\n        }.background(Color.yellow)\n    }\n}\n```\n\
    \n整个`ContentView`文件应如下所示：\n\n```\nimport SwiftUI\n\nstruct ContentView: View {\n\
    \    var body: some View {\n        NavigationView {\n            VStack {\n \
    \               NavigationLink(destination: FileView()) {\n                  \
    \  Text(\"链接到同一文件中的结构\")\n                }\n                NavigationLink(destination:\
    \ SeparateFileView()) {\n                    Text(\"链接到单独文件\")\n             \
    \   }\n                .navigationTitle(\"导航标题\")\n            }\n        }\n\
    \    }\n}\n\nstruct FileView: View {\n    var body: some View {\n        HStack\
    \ {\n            Spacer()\n            VStack {\n                Spacer()\n  \
    \              Text(\"这是一个独立的结构\")\n                Text(\"存储在同一个文件中\")\n    \
    \            Spacer()\n            }\n            Spacer()\n        }.background(Color.yellow)\n\
    \    }\n}\n\nstruct ContentView_Previews: PreviewProvider {\n    static var previews:\
    \ some View {\n        ContentView()\n    }\n}\n```\n\n我们可以继续在`ContentView`文件中添加新的结构体，但这有使文件变得臃肿的风险。创建结构体的第二种方法是将它们存储在单独的文件中，接下来的步骤将指导我们完成此操作。\n\
    \n![图 16-4](img/329781_6_En_16_Fig4_HTML.jpg)\n\n**图 16-4** — 用于选择创建文件的对话框\n\n\
    6. 选择**文件** ➤ **新建** ➤ **文件**。将出现一个对话框，如图 16-4 所示。\n7. 点击对话框顶部的 **iOS**，点击 **Swift\
    \ 文件**，然后点击**下一步**。Xcode 会提示你为新创建的文件命名。\n8. 输入`SeparateFile`并点击**创建**。Xcode 会创建一个新的\
    \ Swift 文件。\n9. 删除`SeparateFile`中当前的所有代码，并用以下代码替换：\n\n```\nimport SwiftUI\n\n\
    struct SeparateFileView: View {\n    var body: some View {\n        HStack {\n\
    \            Spacer()\n            VStack {\n                Spacer()\n      \
    \          Text(\"这是另一个结构\")\n                Text(\"但存储在单独的文件中\")\n         \
    \       Spacer()\n            }\n            Spacer()\n        }.background(Color.orange)\n\
    \    }\n}\n\nstruct SeparateFileView_Previews: PreviewProvider {\n    static var\
    \ previews: some View {\n        SeparateFileView()\n    }\n}\n```\n\n> **注意：**将结构体存储在单独文件中时，你需要第二个结构体（`PreviewProvider`）才能在画布窗格中显示该用户界面。\n\
    \n10. 在导航器窗格中点击`ContentView`文件。\n11. 点击画布窗格中的**实时预览**图标。\n12. 点击`链接到同一文件中的结构`。注意，这将显示存储在`ContentView`文件中的`FileView`结构体。\n\
    13. 点击**返回**按钮返回原始屏幕。\n14. 点击`链接到单独文件`。注意，这将显示存储在名为`SeparateFile`的文件中的`SeparateFileView`结构体。\n"
- fmt: '### Passing Data Between Structures in a Navigation View


    The previous project created two structures where one structure was stored in
    the `ContentView` file and a second structure was stored in a separate file. In
    both cases, the structures defined user interfaces that displayed static information
    unconnected to anything from the original structure (`ContentView`).


    In many cases, you may want data from one structure to appear in a second structure.
    That means we must pass data from one structure to another.


    Fortunately, this task is similar to passing data between functions. When a structure
    needs to receive data, we just need to declare a property by creating a variable,
    giving that variable a descriptive name, and defining the data type that variable
    can hold such as `String` or `Double` like this:


    ```

    struct FileView: View {

    var choice: String

    ```


    This defines a variable called `choice` that can hold a `String`. To pass data
    to this structure, we can load this structure by calling the structure name (`FileView`)
    followed by this `choice` variable as a parameter like this:


    ```

    FileView(choice: "Heads")

    ```


    When passing data to a structure stored in the same file, we just need to follow
    this two-step process:


    - Declare one or more variables inside the structure to receive data.

    - Call that structure using its variables as parameters.


    However, when passing data to a structure stored in a separate file, there’s an
    additional step necessary. Because a structure stored in a separate file also
    contains a second structure that displays the user interface in the Canvas pane,
    this preview structure must include the structure’s parameter and pass it data
    as well like this:


    ```

    struct SeparateFileView_Previews: PreviewProvider {

    static var previews: some View {

    SeparateFileView(passedData: "")

    }

    }

    ```


    To see how to pass data between structures, follow these steps:


    1. Create a new SwiftUI iOS App project and give it any name you wish such as
    `NavigationViewPassData`.


    2. Click the `ContentView` file in the Navigator pane.


    3. Edit the `struct ContentView` structure like this:


    ```

    struct ContentView: View {

    var body: some View {

    NavigationView {

    VStack (spacing: 26) {

    Text("Choose Heads or Tails")

    NavigationLink(destination: FileView(choice: "Heads")) {

    Text("Heads")

    }

    NavigationLink(destination: SeparateFileView(passedData: "Tails")) {

    Text("Tails")

    }

    .navigationTitle("Flip a Coin")

    }

    }

    }

    }

    ```


    The preceding code defines two `NavigationLink`s where one calls a structure called
    `FileView` with a parameter of `choice:` that gets passed `"Heads"`. The second
    `NavigationLink` calls a structure called `SeparateFileView` with a parameter
    of `passedData:` that gets passed `"Tails"`.


    4. Add a new structure underneath the `struct ContentView` like this:


    ```

    struct FileView: View {

    var choice: String

    var body: some View {

    HStack {

    Spacer()

    VStack {

    Spacer()

    Text("You chose = \(choice)")

    Spacer()

    }

    Spacer()

    }.background(Color.yellow)

    }

    }

    ```


    This `FileView` structure declares a `choice` variable that can hold a `String`.
    Then it displays this `choice` variable in a `Text` view that shows `"You chose
    = "`. The entire `ContentView` file should look like this:


    ```

    import SwiftUI

    struct ContentView: View {

    var body: some View {

    NavigationView {

    VStack (spacing: 26) {

    Text("Choose Heads or Tails")

    NavigationLink(destination: FileView(choice: "Heads")) {

    Text("Heads")

    }

    NavigationLink(destination: SeparateFileView(passedData: "Tails")) {

    Text("Tails")

    }

    .navigationTitle("Flip a Coin")

    }

    }

    }

    }

    struct FileView: View {

    var choice: String

    var body: some View {

    HStack {

    Spacer()

    VStack {

    Spacer()

    Text("You chose = \(choice)")

    Spacer()

    }

    Spacer()

    }.background(Color.yellow)

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    This code creates a structure called `FileView`, but now we need to create a second
    structure called `SeparateFileView` that declares a `passedData` String variable.


    5. Choose **File ➤ New ➤ File**. A dialog appears (see Figure [16-4](#329781_6_En_16_Chapter.xhtml#Fig4)).


    6. Click **iOS** near the top of the dialog, click **Swift File**, and then click
    **Next**. Xcode asks for a name to give your newly created file.


    7. Type `SeparateFile` and click **Create**. Xcode creates a new Swift file.


    8. Delete all code currently in the `SeparateFile` and replace it with the following:


    ```

    import SwiftUI

    struct SeparateFileView: View {

    var passedData: String

    var body: some View {

    HStack {

    Spacer()

    VStack {

    Spacer()

    Text("You chose = \(passedData)")

    Spacer()

    }

    Spacer()

    }.background(Color.orange)

    }

    }

    struct SeparateFileView_Previews: PreviewProvider {

    static var previews: some View {

    SeparateFileView(passedData: "")

    }

    }

    ```


    This file creates a `SeparateFileView` structure that declares a `passedData`
    String variable. Because this `SeparateFileView` structure is stored in a separate
    file, it contains a `struct PreviewProvider` where we must use the `passedData`
    parameter as well.


    9. Click `ContentView` in the Navigator pane to return to the `ContentView` structure.


    10. Click the **Live Preview** icon in the Canvas pane.


    11. Click the **Heads** navigation link. The `FileView` structure appears, displaying
    `"You chose = Heads"`.


    12. Click the **Back** button in the upper left corner.


    13. Click the **Tails** navigation link. The `SeparateFileView` structure appears,
    displaying `"You chose = Tails"`.'
