    # 使用步进器


    当你希望用户输入数值数据时，你可能希望限制可接受数据的范围。毕竟，如果你询问用户的年龄，你不希望看到 `–23` 或 `938478`，因为这两个值对于某人的年龄来说显然都是不可能的。为了让用户能够在可接受的范围内轻松输入数值数据，你可以使用
    `Stepper`。


    `Stepper` 存储一个值，用户可以按固定的增量（例如 `1` 或 `2.5`）来增加该值。你可以定义步进器可以表示的最小值和最大值，例如 `1` 到
    `10` 之间的范围。此外，你还可以定义步进器是否循环。循环意味着如果你持续增加步进器超出其最大值，它将回到最小值。同样，如果你持续减少步进器低于其最小值，它将跳转到最大值。这可以让用户轻松选择不同的值，而无需从一个极端值一步步地增加到另一个极端值。


    要了解步进器的工作原理，请按照以下步骤操作：


    1. 创建一个新的 SwiftUI iOS App 项目，并给它任意你喜欢的名称，例如“Stepper”。


    2. 在导航器面板中点击 `ContentView` 文件。


    3. 在 `struct ContentView: View` 这行下方添加以下 `State` 变量：


    4. 在 `var body: some View` 内部创建一个 `VStack`，并添加一个 `Stepper`，如下所示：


    ```

    struct ContentView: View {

    @State var newValue = 0

    ```


    ```

    var body: some View {

    VStack {

    Stepper(value: $newValue) {

    Text("步进器值 = \(newValue)")

    }.padding()

    }

    }

    ```


    这定义了一个简单的 `Stepper`，它可以表示任何值，并以 `1` 为单位增加或减少其值，如图 9-3 所示。


    ![../images/329781_6_En_9_Chapter/329781_6_En_9_Fig3_HTML.jpg](img/329781_6_En_9_Fig3_HTML.jpg)


    图 9-3


    一个简单的 `Stepper`


