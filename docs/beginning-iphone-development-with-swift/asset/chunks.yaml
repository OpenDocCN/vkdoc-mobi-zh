    \ DateComponents(year: 2021, month: 1, day: 1)\n        let endComponents = DateComponents(year:\
    \ 2021, month: 12, day: 31, hour: 23, minute: 59, second: 59)\n        return\
    \ calendar.date(from: startComponents)!\n        ...\n        calendar.date(from:\
    \ endComponents)!\n    }()\n    let dateRange2: PartialRangeFrom = {\n       \
    \ let calendar = Calendar.current\n        let startComponents = DateComponents(year:\
    \ 2021, month: 1, day: 1)\n        let endComponents = DateComponents(year: 2021,\
    \ month: 12, day: 31, hour: 23, minute: 59, second: 59)\n        return calendar.date(from:\
    \ endComponents)!...\n    }()\n    let dateRange3: PartialRangeThrough = {\n \
    \       let calendar = Calendar.current\n        let startComponents = DateComponents(year:\
    \ 2021, month: 1, day: 1)\n        let endComponents = DateComponents(year: 2021,\
    \ month: 12, day: 31, hour: 23, minute: 59, second: 59)\n        return ...calendar.date(from:\
    \ startComponents)!\n    }()\n    var body: some View {\n        VStack {\n  \
    \          Text(\"Chosen date = \\(myDate)\")\n                .padding()\n  \
    \          DatePicker(selection: $myDate, in: dateRange3, displayedComponents:\
    \ [.date], label: { Text(\"Date\") })\n                .datePickerStyle(.graphical)\n\
    \                .padding()\n        }\n    }\n}\n@available(iOS 15, *)\nstruct\
    \ ContentView_Previews: PreviewProvider {\n    static var previews: some View\
    \ {\n        ContentView()\n    }\n}\n```\n\n9. 尝试更改 `DatePicker` 样式（`.compact`、`.graphical`、`.wheel`），同时选择不同的日期区间（`dateRange`、`dateRange2`、`dateRange3`）。\n"
- fmt: "### Formatting Dates\n\nBy default, SwiftUI displays dates with lots of details\
    \ that you may not want to display. To display dates within a specific format,\
    \ you can use the `DateFormatter` like this:\n\n```\nlet formatter = DateFormatter()\n\
    ```\n\nThen you can define a style to display dates and times such as one of the\
    \ following:\n\n| Style | Date | Time |\n| --- | --- | --- |\n| `.short` | 2/15/22\
    \ | 7:15 PM |\n| `.medium` | Feb 15, 2022 | 7:15:29 PM |\n| `.long` | February\
    \ 15, 2022 | 7:15:29 PM CST |\n| `.full` | Tuesday, February 15, 2022 | 7:15:29\
    \ PM Central Standard Time |\n\n**Note**\n\nThe locale may change the way dates\
    \ are actually displayed such as 15 June 2021 or June 15, 2021.\n\nTo use a date\
    \ style, you must define the formatter's `dateStyle` property like this:\n\n```\n\
    formatter.dateStyle = .medium\n```\n\nTo use a time style, you must define the\
    \ formatter's `timeStyle` property like this:\n\n```\nformatter.timeStyle = .short\n\
    ```\n\nOnce you've created a `DateFormatter` and defined its `.dateStyle` and\
    \ `.timeStyle` properties, the final step is to format a date using that formatter\
    \ and its `dateStyle` such as:\n\n```\nformatter.string(from: myDate)\n```\n\n\
    To see how to format dates chosen from a Date Picker, follow these steps:\n\n\
    1. Create a new SwiftUI iOS App project and give it any name you wish such as\
    \ \"DatePickerFormat.\"\n2. Click the `ContentView` file in the Navigator pane.\n\
    3. Add the following line above the two structures in the `ContentView` file:\n\
    \   Add this `@available(iOS 15, *)` line underneath the `import SwiftUI` line\
    \ in the `_____App` file where `_____` is the name of your project such as:\n\n\
    \   ```\n   @available(iOS 15, *)\n   ```\n\n4. Click on the `ContentView` file\
    \ and create a State variable to hold a date like this:\n\n   ```\n   import SwiftUI\n\
    \   @available(iOS 15, *)\n   @main\n   struct DatePickerFormatApp: App {\n  \
    \     var body: some Scene {\n           WindowGroup {\n               ContentView()\n\
    \           }\n       }\n   }\n   ```\n\n5. Type the following underneath the\
    \ State variable to define a `DateFormatter`:\n\n   ```\n   @State var myDate\
    \ = Date.now\n   ```\n\n6. Add a `VStack` inside the `var body: some View` line\
    \ and create a Date Picker inside the `VStack` like this:\n\n   ```\n   let formatter\
    \ = DateFormatter()\n   ```\n\n   ```\n   VStack {\n       Text(\"Chosen date\
    \ = \\(formatter.string(from: myDate))\")\n           .padding()\n       DatePicker(selection:\
    \ $myDate, label: { Text(\"Date\") })\n   }.onAppear() {\n       formatter.dateStyle\
    \ = .full\n       formatter.timeStyle = .full\n   }\n   ```\n\n   The `Text` view\
    \ displays \"Chosen date = \" followed by the date, which is stored in the `myDate`\
    \ State variable. Notice that the `formatter.string` command defines how that\
    \ date is actually displayed.\n\n   The Date Picker stores the selected date in\
    \ the `myDate` State variable. Then the `.onAppear` modifier runs Swift code every\
    \ time the user interface defined by the `VStack` appears. Inside this `.onAppear`\
    \ modifier is the single line that defines the `.dateStyle` of the `formatter`\
    \ to `.full`. If you change `.full` to `.short`, `.medium`, or `.long`, you can\
    \ see how that formats the date differently in the `Text` view.\n\n7. Click the\
    \ Live Preview icon in the Canvas pane and click any date. Notice that when you\
    \ choose a date, it appears above the Date Picker, using the date and time style\
    \ defined within the `.onAppear` modifier such as `.full` or `.short`.\n\n###\
    \ Summary\n\nText Fields can be handy for letting users input data. Unfortunately,\
    \ users can type anything into a Text Field, even completely nonsensical data.\n\
    \nTo restrict the user to just a valid range of choices, you can use a Picker.\
    \ A Picker can provide a list of all valid options. Now it's impossible for the\
    \ user to enter invalid data through a Picker.\n\nWhen creating a Picker, you\
    \ can use a `.tag` property to assign a specific value to the user's selection\
    \ in a Picker. The `.tag` property can hold any type of data such as integers,\
    \ decimal numbers, or strings. All `.tag` properties must hold the same data type.\n\
    \nAnother way to display a list of valid options is through the Color Picker.\
    \ By using the Color Picker, users can select standard colors, such as red, green,\
    \ or blue, or create custom colors.\n\nFor selecting dates, SwiftUI offers the\
    \ Date Picker. You can format the way a date appears, such as 6/15/22 or June\
    \ 15, 2022. The Date Picker can also appear in three different styles (`.compact`,\
    \ `.graphical`, or `.wheel`). That way, you can make a Date Picker look the way\
    \ that works best in your app. By using Pickers, you can make it easy for users\
    \ to input only valid data.\n\n# 9. Limiting Choices with Toggles, Steppers, and\
    \ Sliders\n\nIdeally, you want to limit the user to select only valid options.\
    \ That keeps the user from entering invalid data such as spelling out a number\
    \ (such as thirty-seven) instead of typing out the number (37). Three additional\
    \ ways to restrict the user into selecting only valid data are toggles, steppers,\
    \ and sliders.\n\nA Toggle gives users exactly two choices such as on or off,\
    \ yes or no, true or false. Because a Toggle only offers two choices, it represents\
    \ a Boolean value (true or false).\n\nA Stepper restricts user input to a range\
    \ of valid data. Steppers display a minus/plus icon that users can click to increment\
    \ a value by a fixed amount, up or down. By using a stepper, users can define\
    \ a value without typing a specific number.\n\nSliders also restrict user input\
    \ to a range of valid data. Sliders let users drag to input a specific value without\
    \ any typing whatsoever. Both steppers and sliders can define minimum and maximum\
    \ values to restrict users into choosing only valid numeric values. For many people,\
    \ it's easier to click or drag to choose a value than to type that number itself.\
    \ Both Steppers and Sliders represent a Double value (decimal number).\n\nThe\
    \ whole purpose of Toggles, Sliders, and Steppers is to make sure the user can\
    \ only input valid data into a program at any given time."
  raw: '### Formatting Dates


    By default, SwiftUI displays dates with lots of details that you may not want
    to display. To display dates within a specific format, you can use the DateFormatter
    like this:


    ```

    let formatter = DateFormatter()

    ```


    Then you can define a style to display dates and times such as one of the following:


    | Style | Date | Time |

    | --- | --- | --- |

    | .short | 2/15/22 | 7:15 PM |

    | .medium | Feb 15, 2022 | 7:15:29 PM |

    | .long | February 15, 2022 | 7:15:29 PM CST |

    | .full | Tuesday, February 15, 2022 | 7:15:29 PM Central Standard Time |


    Note


    The locale may change the way dates are actually displayed such as 15 June 2021
    or June 15, 2021.


    To use a date style, you must define the formatter’s dateStyle property like this:


    ```

    formatter.dateStyle = .medium

    ```


    To use a time style, you must define the formatter’s timeStyle property like this:


    ```

    formatter.timeStyle = .short

    ```


    Once you’ve created a DateFormatter and defined its .dateStyle and .timeStyle
    properties, the final step is to format a date using that formatter and its dateStyle
    such as


    ```

    formatter.string(from: myDate)

    ```


    To see how to format dates chosen from a Date Picker, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “DatePickerFormat.”


    2.  Click the ContentView file in the Navigator pane.


    3.  Add the following line above the two structures in the ContentView file:


    1.  Add this @available(iOS 15, *) line underneath the import SwiftUI line in
    the _____App file where _____ is the name of your project such as


    ```

    @available(iOS 15, *)

    ```


    1.  Click on the ContentView file and create a State variable to hold a date like
    this:


    ```

    import SwiftUI

    @available(iOS 15, *)

    @main

    struct DatePickerFormatApp: App {

    var body: some Scene {

    WindowGroup {

    ContentView()

    }

    }

    }

    ```


    1.  Type the following underneath the State variable to define a DateFormatter:


    ```

    @State var myDate = Date.now

    ```


    1.  Add a VStack inside the var body: some View line and create a Date Picker
    inside the VStack like this:


    ```

    let formatter = DateFormatter()

    ```


    ```

    VStack {

    Text("Chosen date = \(formatter.string( from: myDate))")

    .padding()

    DatePicker(selection: $myDate, label: { Text("Date })

    }.onAppear() {

    formatter.dateStyle = .full

    formatter.timeStyle = .full

    }

    ```


    The Text view displays “Chosen date = ” followed by the date, which is stored
    in the myDate State variable. Notice that the formatter.string command defines
    how that date is actually displayed.


    The Date Picker stores the selected date in the myDate State variable. Then the
    .onAppear modifier runs Swift code every time the user interface defined by the
    VStack appears. Inside this .onAppear modifier is the single line that defines
    the .dateStyle of the formatter to .full. If you change .full to .short, .medium,
    or .long, you can see how that formats the date differently in the Text view.


    1.  Click the Live Preview icon in the Canvas pane and click any date. Notice
    that when you choose a date, it appears above the Date Picker, using the date
    and time style defined within the .onAppear modifier such as .full or .short.


    ## Summary


    Text Fields can be handy for letting users input data. Unfortunately, users can
    type anything into a Text Field, even completely nonsensical data.


    To restrict the user to just a valid range of choices, you can use a Picker. A
    Picker can provide a list of all valid options. Now it’s impossible for the user
    to enter invalid data through a Picker.


    When creating a Picker, you can use a .tag property to assign a specific value
    to the user’s selection in a Picker. The .tag property can hold any type of data
    such as integers, decimal numbers, or strings. All .tag properties must hold the
    same data type.


    Another way to display a list of valid options is through the Color Picker. By
    using the Color Picker, users can select standard colors, such as red, green,
    or blue, or create custom colors.


    For selecting dates, SwiftUI offers the Date Picker. You can format the way a
    date appears, such as 6/15/22 or June 15, 2022\. The Date Picker can also appear
    in three different styles (.compact, .graphical, or .wheel). That way, you can
    make a Date Picker look the way that works best in your app. By using Pickers,
    you can make it easy for users to input only valid data.


    # 9. Limiting Choices with Toggles, Steppers, and Sliders


    Ideally, you want to limit the user to select only valid options. That keeps the
    user from entering invalid data such as spelling out a number (such as thirty-seven)
    instead of typing out the number (37). Three additional ways to restrict the user
    into selecting only valid data are toggles, steppers, and sliders.


    A Toggle gives users exactly two choices such as on or off, yes or no, true or
    false. Because a Toggle only offers two choices, it represents a Boolean value
    (true or false).


    A Stepper restricts user input to a range of valid data. Steppers display a minus/plus
    icon that users can click to increment a value by a fixed amount, up or down.
    By using a stepper, users can define a value without typing a specific number.


    Sliders also restrict user input to a range of valid data. Sliders let users drag
    to input a specific value without any typing whatsoever. Both steppers and sliders
    can define minimum and maximum values to restrict users into choosing only valid
    numeric values. For many people, it’s easier to click or drag to choose a value
    than to type that number itself. Both Steppers and Sliders represent a Double
    value (decimal number).


    The whole purpose of Toggles, Sliders, and Steppers is to make sure the user can
    only input valid data into a program at any given time.'
  trans: "\n### 格式化日期\n\n默认情况下，SwiftUI 会显示包含大量细节的日期，而这些细节你可能并不需要展示。要以特定格式显示日期，你可以使用\
    \ `DateFormatter`，如下所示：\n\n```\nlet formatter = DateFormatter()\n```\n\n然后，你可以定义一种样式来显示日期和时间，例如以下之一：\n\
    \n| 样式 | 日期 | 时间 |\n| --- | --- | --- |\n| `.short` | 22/2/15 | 下午 7:15 |\n| `.medium`\
    \ | 2022 年 2 月 15 日 | 下午 7:15:29 |\n| `.long` | 2022 年 2 月 15 日 | 下午 7:15:29 CST\
    \ |\n| `.full` | 2022 年 2 月 15 日星期二 | 中央标准时间下午 7:15:29 |\n\n**注意**\n\n区域设置可能会改变日期的实际显示方式，例如\
    \ “15 June 2021” 或 “June 15, 2021”。\n\n要使用日期样式，你必须像这样定义格式化器的 `dateStyle` 属性：\n\
    \n```\nformatter.dateStyle = .medium\n```\n\n要使用时间样式，你必须像这样定义格式化器的 `timeStyle`\
    \ 属性：\n\n```\nformatter.timeStyle = .short\n```\n\n一旦你创建了一个 `DateFormatter` 并定义了它的\
    \ `.dateStyle` 和 `.timeStyle` 属性，最后一步就是使用该格式化器及其 `dateStyle` 来格式化日期，例如：\n\n```\n\
    formatter.string(from: myDate)\n```\n\n要了解如何格式化从日期选择器中选择的日期，请遵循以下步骤：\n\n1. 创建一个新的\
    \ SwiftUI iOS App 项目，并为其取任意名称，例如 “DatePickerFormat”。\n2. 在导航窗格中点击 `ContentView`\
    \ 文件。\n3. 在 `ContentView` 文件中的两个结构体上方添加以下代码行：\n   在 `_____App` 文件的 `import SwiftUI`\
    \ 行下方添加 `@available(iOS 15, *)` 这行代码，其中 `_____` 是你的项目名称，例如：\n\n   ```\n   @available(iOS\
    \ 15, *)\n   ```\n\n4. 点击 `ContentView` 文件，并创建一个用于存储日期的状态变量，如下所示：\n\n   ```\n\
    \   import SwiftUI\n   @available(iOS 15, *)\n   @main\n   struct DatePickerFormatApp:\
    \ App {\n       var body: some Scene {\n           WindowGroup {\n           \
    \    ContentView()\n           }\n       }\n   }\n   ```\n\n5. 在状态变量下方输入以下内容以定义\
    \ `DateFormatter`：\n\n   ```\n   @State var myDate = Date.now\n   ```\n\n6. 在\
    \ `var body: some View` 代码行内添加一个 `VStack`，并在 `VStack` 内部创建一个日期选择器，如下所示：\n\n  \
    \ ```\n   let formatter = DateFormatter()\n   ```\n\n   ```\n   VStack {\n   \
    \    Text(\"所选日期 = \\(formatter.string(from: myDate))\")\n           .padding()\n\
    \       DatePicker(selection: $myDate, label: { Text(\"日期\") })\n   }.onAppear()\
    \ {\n       formatter.dateStyle = .full\n       formatter.timeStyle = .full\n\
    \   }\n   ```\n\n   `Text` 视图显示 “所选日期 = ” 后跟存储在 `myDate` 状态变量中的日期。请注意，`formatter.string`\
    \ 命令定义了该日期的实际显示方式。\n\n   日期选择器将所选日期存储在 `myDate` 状态变量中。然后，`.onAppear` 修饰符会在 `VStack`\
    \ 定义的用户界面每次出现时运行 Swift 代码。在该 `.onAppear` 修饰符内部，有一行代码将 `formatter` 的 `.dateStyle`\
    \ 定义为 `.full`。如果你将 `.full` 更改为 `.short`、`.medium` 或 `.long`，你可以看到 `Text` 视图中日期的格式如何变化。\n\
    \n7. 点击画布窗格中的实时预览图标，然后点击任意日期。请注意，当你选择一个日期时，它会显示在日期选择器上方，并使用 `.onAppear` 修饰符中定义的日期和时间样式，例如\
    \ `.full` 或 `.short`。\n\n### 总结\n\n文本字段可以方便用户输入数据。不幸的是，用户可以在文本字段中输入任何内容，甚至完全无意义的数据。\n\
    \n为了将用户限制在有效的选择范围内，你可以使用选择器。选择器可以提供所有有效选项的列表。这样，用户就不可能通过选择器输入无效数据。\n\n创建选择器时，你可以使用\
    \ `.tag` 属性为用户在选择器中的选择分配一个特定值。`.tag` 属性可以持有任何类型的数据，例如整数、小数或字符串。所有 `.tag` 属性必须持有相同的数据类型。\n\
    \n另一种显示有效选项列表的方式是通过颜色选择器。使用颜色选择器，用户可以选择标准颜色，如红、绿、蓝，或创建自定义颜色。\n\n对于选择日期，SwiftUI\
    \ 提供了日期选择器。你可以格式化日期的显示方式，例如 “22/6/15” 或 “2022 年 6 月 15 日”。日期选择器还可以以三种不同的样式（`.compact`、`.graphical`\
    \ 或 `.wheel`）显示。这样，你可以让日期选择器以最适合你应用的方式呈现。通过使用选择器，你可以让用户轻松输入仅有效的数据。\n\n# 9. 使用开关、步进器和滑块限制选择\n\
    \n理想情况下，你希望限制用户仅选择有效选项。这可以防止用户输入无效数据，例如拼写出数字（如 “thirty-seven”）而不是输入数字（37）。另外三种限制用户仅选择有效数据的方式是开关、步进器和滑块。\n\
    \n开关为用户提供恰好两个选项，例如开或关、是或否、真或假。因为开关只提供两个选项，它表示一个布尔值（真或假）。\n\n步进器将用户输入限制在有效数据范围内。步进器显示减号/加号图标，用户可以点击它以固定增量递增或递减一个值。通过使用步进器，用户无需输入特定数字即可定义值。\n\
    \n滑块也将用户输入限制在有效数据范围内。滑块允许用户通过拖拽来输入特定值，无需任何输入。步进器和滑块都可以定义最小值和最大值，以限制用户仅选择有效的数值。对许多人来说，点击或拖拽选择值比输入数字本身更容易。步进器和滑块都表示一个\
    \ `Double` 值（小数）。\n\n开关、滑块和步进器的全部目的在于确保用户在任何时候都只能向程序输入有效数据。\n"
- fmt: '# Using a Toggle


    If you look at the settings for an iPhone or iPad, you’ll see a list of options
    that you can turn on or off as shown in Figure [9-1](#329781_6_En_9_Chapter.xhtml#Fig1).


    ![../images/329781_6_En_9_Chapter/329781_6_En_9_Fig1_HTML.jpg](images/329781_6_En_9_Chapter/329781_6_En_9_Fig1_HTML.jpg)


    Figure 9-1


    Typical uses for a `Toggle`


    To create a `Toggle`, you need to define the text to appear next to the `Toggle`
    along with linking or binding a `State` variable to the `Toggle` such as


    ```

    Toggle(isOn: $settingValue) {

    Text("Toggle text")

    }

    ```


    In this example, the `Toggle` changes the value of a `State` variable called `settingValue`,
    which should be defined as a `Boolean` like this:


    ```

    @State var settingValue = true

    ```


    Then the `Text` view displays “Toggle text” next to the `Toggle` itself as shown
    in Figure [9-2](#329781_6_En_9_Chapter.xhtml#Fig2).


    ![../images/329781_6_En_9_Chapter/329781_6_En_9_Fig2_HTML.jpg](images/329781_6_En_9_Chapter/329781_6_En_9_Fig2_HTML.jpg)


    Figure 9-2


    The appearance of a typical `Toggle`


    To see how a `Toggle` works, follow these steps:


    1. Create a new SwiftUI iOS App project and give it any name you wish such as
    “Toggle.”


    2. Click the `ContentView` file in the Navigator pane.


    3. Add the following `State` variable under the `struct ContentView: View` line:


    4. Create a `VStack` and put a rectangle inside. Since a rectangle will expand
    to fill the entire screen, make sure you put a `.frame` modifier on it and define
    its `.foregroundColor` with the previously defined `State` variable:


    ```

    struct ContentView: View {

    @State var myToggle = true

    ```


    5. Add the `Toggle` underneath the `Rectangle` and its modifiers like this:


    ```

    var body: some View {

    VStack {

    Rectangle()

    .frame(width: 200, height: 150)

    .foregroundColor(myToggle ? .orange : .green)

    }

    }

    ```


    ```

    Toggle(myToggle ? "Orange" : "Green", isOn: $myToggle)

    ```


    The entire `ContentView` file should look like this:


    6. Click the Live Preview icon in the Canvas pane. Notice that since the `State`
    variable `myToggle` is `true`, the rectangle initially appears in orange.


    7. Click the `Toggle`. Notice that each time you click the `Toggle`, the color
    of the rectangle alternates between orange and green, and the text on the `Toggle`
    alternates between “Orange” and “Green” as well.


    ```

    import SwiftUI

    struct ContentView: View {

    @State var myToggle = true

    var body: some View {

    VStack {

    Rectangle()

    .frame(width: 200, height: 150)

    .foregroundColor(myToggle ? .orange : .green)

    Toggle(myToggle ? "Orange" : "Green", isOn: $myToggle)

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    # Using the Stepper


    When you want the user to input numeric data, you may want to restrict the range
    of acceptable data. After all, if you ask for the user’s age, you don’t want `–23`
    or `938478` since both are clearly impossible for someone’s age. To make it easy
    for the user to input numeric data within an acceptable range, you can use a `Stepper`.


    `Stepper`s store a value that users can increment by a fixed increment such as
    `1` or `2.5`. You can define a minimum and maximum value that the stepper can
    represent such as a range between `1` and `10`. Furthermore, you can define whether
    the stepper wraps or not. Wrapping means if you keep incrementing the stepper
    beyond its maximum value, it goes back to its minimum value. Likewise, if you
    keep decrementing the stepper below its minimum value, it jumps to its maximum
    value. This can make it easy for users to choose different values without having
    to exhaustively step from one extreme value to the other.


    To see how a stepper works, follow these steps:


    1. Create a new SwiftUI iOS App project and give it any name you wish such as
    “Stepper.”


    2. Click the `ContentView` file in the Navigator pane.


    3. Add the following `State` variable under the `struct ContentView: View` line:


    4. Create a `VStack` inside the `var body: some View` and add a `Stepper` like
    this:


    ```

    struct ContentView: View {

    @State var newValue = 0

    ```


    ```

    var body: some View {

    VStack {

    Stepper(value: $newValue) {

    Text("Stepper value = \(newValue)")

    }.padding()

    }

    }

    ```


    This defines a simple `Stepper` that can represent any value and increases or
    decreases its value by `1` as shown in Figure [9-3](#329781_6_En_9_Chapter.xhtml#Fig3).


    ![../images/329781_6_En_9_Chapter/329781_6_En_9_Fig3_HTML.jpg](images/329781_6_En_9_Chapter/329781_6_En_9_Fig3_HTML.jpg)


    Figure 9-3


    A simple `Stepper`


    The entire `ContentView` file should look like this:


    5. Click the Live Preview icon in the Canvas pane to run your app.


    6. Click the `–` and `+` icons on the `Stepper` to decrease or increase its value.


    ```

    import SwiftUI

    struct ContentView: View {

    @State var newValue = 0

    var body: some View {

    VStack {

    Stepper(value: $newValue) {

    Text("Stepper value = \(newValue)")

    }.padding()

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    ## Defining a Range in a Stepper


    In many cases, you want to define a valid range of values that the `Stepper` can
    represent such as from `1` to `25`. To define a range for a `Stepper`, you need
    to list the range within the `in:` parameter like this:


    ```

    Stepper(value: $newValue, in: 1...10) {

    Text("Stepper value = \(newValue)")

    }.padding()

    ```


    To see how to define a range of values that a `Stepper` can represent, add the
    preceding code so the entire `ContentView` file looks like this:


    ```

    import SwiftUI

    struct ContentView: View {

    @State var newValue = 0

    var body: some View {

    VStack {

    // Basic stepper

    Stepper(value: $newValue) {

    Text("Stepper value = \(newValue)")

    }.padding()

    // Stepper in a range

    Stepper(value: $newValue, in: 1...10) {

    Text("Stepper value = \(newValue)")

    }.padding()

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    Click the Live Preview icon on the Canvas pane and click the bottom `Stepper`.
    Notice that because its range is restricted between `1` and `10`, clicking the
    `–` and `+` icons on the bottom `Stepper` won’t decrease the `Stepper`’s value
    below `1` or increase the value above `10`.'
