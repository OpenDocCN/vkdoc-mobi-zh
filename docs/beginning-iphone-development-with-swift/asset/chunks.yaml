    \ the bottom `Stepper` won’t decrease the `Stepper`’s value below 1.0 or above\
    \ 10.0. Yet clicking the – and + icons on the bottom `Stepper` increments/decrements\
    \ the `Stepper`’s value by 0.25.\n\n## Using Sliders\n\nLike a `Stepper`, a `Slider`\
    \ lets the user choose a numeric value without typing a specific number. While\
    \ a `Stepper` forces users to increment/decrement values by a fixed amount, `Slider`s\
    \ make it easy for users to choose between a range of values quickly by simply\
    \ changing the `Slider`’s position. This makes `Slider`s better suited than a\
    \ `Stepper` for letting the user choose from a wide range of values.\n\nTo see\
    \ how a `Slider` works, follow these steps:\n\n1. Create a new SwiftUI iOS App\
    \ project and give it any name you wish such as “Slider.”\n2. Click the `ContentView`\
    \ file in the Navigator pane.\n3. Add the following `State` variable under the\
    \ `struct ContentView: View` line:\n\n```\n@State var sliderValue = 0.0\n```\n\
    \n4. Create a `VStack` inside the `var body: some View` and add a `Text` and a\
    \ `Slider` like this:\n\n```\nvar body: some View {\n    VStack (spacing: 28){\n\
