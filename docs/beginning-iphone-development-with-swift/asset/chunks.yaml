    \      WindowGroup {\n            ContentView()\n        }\n    }\n}\n```\n\n\
    1.  在导航器窗格中点击 `ContentView` 文件。\n2.  在 `ContentView` 文件的两个结构体中的 `struct` 行上方添加如下代码：\n\
    \n```\n@available(iOS 15.0, *)\n```\n\n1.  在 `struct ContentView: View` 行下方添加一个数组，如下所示：\n\
    \n```\n@available(iOS 15.0, *)\nstruct ContentView: View {\n    var myArray =\
    \ [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\"\
    , \"Canary\", \"Tarantula\", \"Hamster\"]\n```\n\n1.  在此数组下方添加一个 `State` 变量，如下所示：\n\
    \n```\n@State var showLines = true\n```\n\n1.  在 `var body: some View` 行下方添加一个\
    \ `List`，如下所示：\n\n```\nvar body: some View {\n    List {\n    }\n}\n```\n\n1.\
    \  在 `List` 内部添加一个 `ForEach` 循环，用于遍历从 0 到数组总项数减 1 的所有数组项，如下所示：\n\n```\nvar body:\
