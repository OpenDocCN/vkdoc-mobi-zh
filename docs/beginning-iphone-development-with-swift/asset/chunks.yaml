  trans: '

    # 20. 使用 `GeometryReader`


    iOS 设备的用户界面必须适配不同的屏幕尺寸。不仅 iPhone 和 iPad 的屏幕尺寸不同，而且市面上不同型号的 iPhone 和 iPad 也有不同的屏幕尺寸。为了解决这个问题，SwiftUI
    会将用户界面元素居中放置，但如果需要将用户界面元素精确地放置在特定位置呢？


    具体的 X 和 Y 坐标是行不通的，因为在大屏幕上看起来效果好的坐标，在小屏幕上可能就不合适，反之亦然。当需要将用户界面元素放置在屏幕上的特定位置时，更安全的做法是使用
    `GeometryReader`。


    `GeometryReader` 就像一个容器，能够自动适配不同的屏幕尺寸。添加 `GeometryReader` 后，你可以使用它的相对坐标来放置用户界面元素，而不是不同屏幕尺寸的精确坐标。这样，当应用在不同尺寸的屏幕上运行时，`GeometryReader`
    也会相应地调整其相对坐标。


    ## 理解 `GeometryReader`


    `GeometryReader` 可以像堆栈一样容纳多个视图。关键区别在于 `GeometryReader` 会尽可能多地扩展空间。此外，`GeometryReader`
    可以获取自身的宽度和高度。定义 `GeometryReader` 的代码如下所示：


    ```

    GeometryReader { geometry in

    // 在此处定义视图

    }

    ```


    在上面的示例中，`GeometryReader` 使用了一个任意命名的变量，例如 "geometry"，当然这个变量可以任意命名。然后，要获取 `GeometryReader`
    的宽度和高度，可以像这样获取 `size.width` 和 `size.height` 属性：


    ```

    geometry.size.width

    geometry.size.height

    ```


    要了解 `GeometryReader` 是如何工作的，请按照以下步骤操作：


    1.  创建一个新的 SwiftUI iOS App 项目，并随意给它命名，例如 "BasicGeometryReader"。

    2.  在导航器窗格中单击 `ContentView` 文件。

    3.  在 `var body: some View` 内部添加一个 `GeometryReader`，如下所示：


    ```

    var body: some View {

    GeometryReader { geometry in

    }.background(Color.yellow)

    }

    ```


    `.background` 修饰符为 `GeometryReader` 着色，便于看清其边界。


    4.  在 `GeometryReader` 内部添加一个 `VStack`。

    5.  在 `VStack` 内部添加两个 `Text` 视图，如下所示：


    ```

    var body: some View {

    GeometryReader { geometry in

    VStack {

    Text("Width = \(geometry.size.width)")

    Text("Height = \(geometry.size.height)")

    }

    }.background(Color.yellow)

    }

    ```


    整个 `ContentView` 文件应该如下所示：


    ```

    import SwiftUI

    struct ContentView: View {

    var body: some View {

    GeometryReader { geometry in

    VStack {

    Text("Width = \(geometry.size.width)")

    Text("Height = \(geometry.size.height)")

    }

    }.background(Color.yellow)

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    请注意，`geometry.size.width` 和 `geometry.size.height` 属性定义了当前 iOS 设备（例如图 20-1 中显示的
    iPod Touch）内 `GeometryReader` 的高度和宽度。


    ![../images/329781_6_En_20_Chapter/329781_6_En_20_Fig1_HTML.jpg](img/329781_6_En_20_Fig1_HTML.jpg)


    图 20-1 `GeometryReader` 在 iPod Touch 中定义其宽度和高度


    ![../images/329781_6_En_20_Chapter/329781_6_En_20_Fig2_HTML.jpg](img/329781_6_En_20_Fig2_HTML.jpg)


    图 20-2 检查器窗格中的设备弹出菜单


    6.  在 `struct ContentView_Previews: PreviewProvider` 内部单击 `ContentView()`。Xcode
    窗口右侧将显示检查器窗格。

    7.  单击设备弹出菜单，选择不同的屏幕尺寸，例如较大或较小的 iPhone 或 iPad，如图 20-2 所示。


    ![../images/329781_6_En_20_Chapter/329781_6_En_20_Fig3_HTML.jpg](img/329781_6_En_20_Fig3_HTML.jpg)


    图 20-3 在不同尺寸的 iOS 屏幕上显示 `GeometryReader` 的宽度和高度


    8.  选择不同尺寸的 iPhone 或 iPad。注意，`GeometryReader` 会扩展或收缩以适应新的 iOS 屏幕尺寸的边界，并显示不同的宽度和高度，如图
    20-3 所示。


    尝试使用不同的 iOS 设备，例如小屏幕的 iPhone 5s 或大屏幕的 iPad Pro。无论你选择哪种尺寸的 iOS 设备屏幕，`GeometryReader`
    都可以扩展或收缩，并返回其宽度和高度。

