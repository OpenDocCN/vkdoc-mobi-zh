    \ ContentView: View {\n  @State var message = \"\"\n```\n\n```\nvar body: some\
    \ View {\n  VStack {\n    Text(message)\n      .padding()\n    Circle()\n    \
    \  .frame(width: 125, height: 125)\n      .foregroundColor(.blue)\n    Spacer()\n\
    \  }.background(Color.yellow)\n}\n```\n\n1. 为 `Circle` 添加一个 `.onTapGesture` 修饰符，如下所示：\n\
    \n```\nCircle()\n  .frame(width: 125, height: 125)\n  .foregroundColor(.blue)\n\
    \  .onTapGesture {\n    message += \"Circle tapped\"\n  }\n```\n\n注意，当 `Circle`\
    \ 识别到轻点手势时，它会将 (\"Circle tapped\") 追加（`+=`）到 `message` 状态变量的当前值中。\n\n1. 为整个 `VStack`\
    \ 添加一个 `.simultaneousGesture` 修饰符，如下所示：\n\n```\nvar body: some View {\n  VStack\
    \ {\n    Text(message)\n      .padding()\n    Circle()\n      .frame(width: 125,\
    \ height: 125)\n      .foregroundColor(.blue)\n      .onTapGesture {\n       \
    \ message += \"Circle tapped\"\n      }\n    Spacer()\n  }.background(Color.yellow)\n\
    \    .simultaneousGesture(\n      TapGesture()\n        .onEnded { _ in\n    \
    \      message = \"VStack tapped\"\n        }\n    )\n}\n```\n\n如果你轻点 `Circle`，正常情况下\
    \ `Circle` 的 `.onTapGesture` 修饰符（\"Circle tapped\"）会被识别。然而，`.simultaneousGesture`\
    \ 修饰符定义了 `VStack` 上的 `TapGesture` 会先被识别，然后再识别 `Circle` 上的手势修饰符。整个 `ContentView`\
    \ 文件应该如下所示：\n\n1. 点击画布窗格上的实时预览图标，然后点击蓝色 `Circle`。请注意，由于 `VStack` 上的 `.simultaneousGesture`\
    \ 修饰符使其在 `Circle` 的 `.onTapGesture` 修饰符之前运行，`Text` 视图中会显示 \"VStack tappedCircle\
