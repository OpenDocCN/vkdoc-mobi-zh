- fmt: "# 6. Responding to the User with Buttons and Segmented Controls\n\nEvery user\
    \ interface needs to display information to the user whether that information\
    \ may be text or images. However, another feature of a user interface is to accept\
    \ commands from the user. The simplest way to accept commands through a user interface\
    \ is through buttons.\n\nButtons represent a single command that can be as simple\
    \ as a confirmation such as OK or Cancel. To create a `Button`, you need to define:\n\
    \n- The title that displays text on the button\n- Swift code that runs when the\
    \ user taps the button\n\nSwiftUI gives you two ways to create a `Button`. The\
    \ simplest way just defines the text to appear on the title followed by the Swift\
    \ code to run when the user selects the button like this:\n\n```\nButton(\"Click\
    \ here\") {\n    // code to run\n}\n```\n\nA second way to create a button gives\
    \ you more flexibility in modifying the appearance of the text on the button such\
    \ as:\n\n```\nButton {\n    // code to run\n} label: {\n    Text(\"Click here\"\
    )\n        .font(.largeTitle)\n        .foregroundColor(.green)\n        .padding()\n\
    \        .border(Color.red, width: 6)\n}\n```\n\nThis second method uses a `Text`\
    \ view to define the title that appears on the text. Then it uses the `.font`\
    \ modifier to define the font size, the `.foregroundColor` modifier to display\
    \ the text in green, the `.padding` modifier to add space around the `Text` view,\
    \ and the `.border` modifier to add a red border with a width of 6 points around\
    \ the `Text` view.\n\nInstead of using a `Text` view to define the button's title,\
    \ you can also use a `Label` view to display both text and an icon like this:\n\
    \n```\nButton {\n    // code to run\n} label: {\n    Label(\"Image button\", systemImage:\
    \ \"hare.fill\")\n        .font(.largeTitle)\n        .foregroundColor(.purple)\n\
    \        .padding()\n        .border(Color.blue, width: 6)\n}\n```\n\nThis `Label`\
    \ view defines text and an icon to appear, then uses the `.font` modifier to define\
    \ the size of both the text and the icon. It uses the `.foregroundColor` modifier\
    \ to display the text and icon in purple, adds space around the `Label` view using\
    \ the `.padding` modifier, and uses the `.border` modifier to display a blue border\
    \ with a width of 6 points around the `Label` view.\n\nYou can also use an `Image`\
    \ view to make an image appear as a button like this:\n\n```\nButton {\n    //\
    \ code to run\n} label: {\n    Image(\"browncat\")\n        .resizable()\n   \
    \     .frame(width: 150, height: 150)\n        .clipShape(Circle())\n        .overlay(Circle().stroke(Color.yellow,\
    \ lineWidth: 4))\n}\n```\n\nThis `Image` view uses an image (called `browncat`)\
    \ stored in the Assets folder, then uses the `.frame` modifier to squeeze the\
    \ image into a square with a width and height of 150. Then it uses the `.clipShape`\
    \ modifier to display the image within a circle followed by the `.overlay` modifier\
    \ that displays a yellow border with a line width of 4.\n\nBy using this second\
    \ method to define the title of a `Button`, you can see how you have more control\
    \ over the appearance of the Button's title, especially compared to the simple\
    \ way of defining a `Button` with plain text as shown in Figure [6-1](#329781_6_En_6_Chapter.xhtml#Fig1).\n\
    \n![../images/329781_6_En_6_Chapter/329781_6_En_6_Fig1_HTML.jpg](images/329781_6_En_6_Chapter/329781_6_En_6_Fig1_HTML.jpg)\n\
    \nFigure 6-1\n\nUsing a `Text` view, a `Label` view, or an `Image` view to define\
    \ a Button's title\n\n## Running Code in a Button\n\nYou can store any code to\
    \ run when the user taps a `Button`. One common type of code to run inside of\
    \ a `Button` is code that changes a state. In SwiftUI, you can declare special\
    \ variables as State variables like this:\n\n```\n@State var colorMe = false\n\
    ```\n\nWhen you store updated data in an ordinary variable, any other part of\
    \ your program that uses that variable has no idea that the data has been updated.\
    \ Making sure every part of your program receives any updated data stored in a\
    \ variable can be tedious and error-prone. That's why SwiftUI offers State variables\
    \ to solve this problem.\n\nThe moment you change the value of a State variable,\
    \ anything that uses that State variable automatically gets the latest data stored\
    \ in that State variable without the need to write any extra code. When a variable\
    \ holds one value, it's in one state, and when that same variable holds a different\
    \ value, that's a second state. SwiftUI State variables simply automate the process\
    \ of making sure every part of your program knows about changes in a variable's\
    \ value or state.\n\nThe preceding example creates a State variable by using the\
    \ `@State` keyword followed by a variable declaration (`var`) that defines a variable's\
    \ name (`colorMe`), data type (Boolean type inferred), and initial value (`false`).\n\
    \nWhen using State variables that represent Boolean data types, one common command\
    \ to use is the `.toggle()` command, which changes a Boolean variable from `true`\
    \ to `false` (or `false` to `true`) such as:\n\n```\ncolorMe.toggle()\n```\n\n\
    If the value of the `colorMe` State variable is `true`, then the `.toggle()` command\
    \ changes the `colorMe` value to `false`. If the value of the `colorMe` State\
    \ variable is `false`, then the `.toggle()` command changes the `colorMe` value\
    \ to `true`.\n\nBoolean State variables are often used to make if-else decisions.\
    \ Normally, modifiers just contain a single value such as:\n\n```\n.fill(Color.green)\n\
    ```\n\nHowever, if you embed an if-else ternary operator in a modifier, you can\
    \ duplicate the traditional if-else statement in a single line like this:\n\n\
    ```\n.fill(colorMe ? Color.green : Color.gray)\n```\n\nThe preceding Swift code\
    \ checks the Boolean value of the `colorMe` variable. If it's `true`, then it\
    \ uses the color green. Otherwise, it uses the color gray. Let's see how to put\
    \ together State variables, the `.toggle()` command, and the if-else ternary operator\
    \ to make a button respond to the user:\n\n1. Create a new SwiftUI iOS App project\
    \ and give it any name you wish such as `Buttons`.\n\n2. Click the `ContentView`\
    \ file in the Navigator pane.\n\n3. Add a State variable underneath the `struct\
    \ ContentView: View` line like this:\n\n```\n    struct ContentView: View {\n\
    \    @State var colorMe = false\n    var body: some View {\n```\n\nThis defines\
    \ a State variable called `colorMe` (the exact name is arbitrary) and sets its\
    \ initial value as `false`, defining it to hold only Boolean data types.\n\n4.\
    \ Create a `VStack` with a spacing value of 28 inside the `var body: some View`\
    \ like this:\n\n```\n    struct ContentView: View {\n    @State var colorMe =\
    \ false\n    var body: some View {\n    VStack (spacing: 28) {\n    }\n    }\n\
    \    }\n```\n\nThe spacing of 28 will separate all views inside the `VStack` so\
    \ they don't appear crowded together.\n\n5. Type the following inside the `VStack`:\n\
    \n```\n    Rectangle()\n    .fill(colorMe ? Color.green : Color.gray)\n    .frame(width:\
    \ 250, height: 100)\n```\n\nThis creates a rectangle where the `.frame` modifier\
    \ defines its width as 250 and its height as 100. Notice that the `.fill` modifier\
    \ uses the `colorMe` Boolean State variable to determine which color to display.\
    \ If `colorMe` is `true`, then the rectangle appears green. If the `colorMe` is\
    \ `false`, then the rectangle appears gray.\n\n6. Type the following underneath\
    \ the `Rectangle()` inside the `VStack` to create a plain `Button`:\n\n```\n \
    \   Button(\"Plain text button\") {\n    colorMe.toggle()\n    }\n```"
  raw: "# 6. Responding to the User with Buttons and Segmented Controls\n\nEvery user\
    \ interface needs to display information to the user whether that information\
    \ may be text or images. However, another feature of a user interface is to accept\
    \ commands from the user. The simplest way to accept commands through a user interface\
    \ is through buttons.\n\nButtons represent a single command that can be as simple\
    \ as a confirmation such as OK or Cancel. To create a Button, you need to define\n\
    \n*   The title that displays text on the button\n\n*   Swift code that runs when\
    \ the user taps the button\n\nSwiftUI gives you two ways to create a Button. The\
    \ simplest way just defines the text to appear on the title followed by the Swift\
    \ code to run when the user selects the button like this:\n\n```\nButton(\"Click\
    \ here\") {\n// code to run\n}\n```\n\nA second way to create a button gives you\
    \ more flexibility in modifying the appearance of the text on the button such\
    \ as\n\n```\nButton {\n// code to run\n} label: {\nText(\"Click here\")\n.font(.largeTitle)\n\
    .foregroundColor(.green)\n.padding()\n.border(Color.red, width: 6)\n}\n```\n\n\
    This second method uses a Text view to define the title that appears on the text.\
    \ Then it uses the .font modifier to define the font size, the .foregroundColor\
    \ modifier to display the text in green, the .padding modifier to add space around\
    \ the Text view, and the .border modifier to add a red border with a width of\
    \ 6 points around the Text view.\n\nInstead of using a Text view to define the\
    \ button’s title, you can also use a Label view to display both text and an icon\
    \ like this:\n\n```\nButton {\n// code to run\n} label: {\nLabel(\"Image button\"\
    , systemImage: \"hare.fill\")\n.font(.largeTitle)\n.foregroundColor(.purple)\n\
    .padding()\n.border(Color.blue, width: 6)\n}\n```\n\nThis Label view defines text\
    \ and an icon to appear, then uses the .font modifier to define the size of both\
    \ the text and the icon. It uses the .foregroundColor modifier to display the\
    \ text and icon in purple, adds space around the Label view using the .padding\
    \ modifier, and uses the .border modifier to display a blue border with a width\
    \ of 6 points around the Label view.\n\nYou can also use an Image view to make\
    \ an image appear as a button like this:\n\n```\nButton {\n// code to run\n} label:\
    \ {\nImage(\"browncat\")\n.resizable()\n.frame(width: 150, height: 150)\n.clipShape(Circle())\n\
    .overlay(Circle().stroke(Color.yellow, lineWidth: 4))\n}\n```\n\nThis Image view\
    \ uses an image (called “browncat”) stored in the Assets folder, then uses the\
    \ .frame modifier to squeeze the image into a square with a width and height of\
    \ 150\\. Then it uses the .clipShape modifier to display the image within a circle\
    \ followed by the .overlay modifier that displays a yellow border with a line\
    \ width of 4.\n\nBy using this second method to define the title of a Button,\
    \ you can see how you have more control over the appearance of the Button’s title,\
    \ especially compared to the simple way of defining a Button with plain text as\
    \ shown in Figure [6-1](#329781_6_En_6_Chapter.xhtml#Fig1).\n\n![../images/329781_6_En_6_Chapter/329781_6_En_6_Fig1_HTML.jpg](images/329781_6_En_6_Chapter/329781_6_En_6_Fig1_HTML.jpg)\n\
    \nFigure 6-1\n\nUsing a Text view, a Label view, or an Image view to define a\
    \ Button’s title\n\n## Running Code in a Button\n\nYou can store any code to run\
    \ when the user taps a Button. One common type of code to run inside of a Button\
    \ is code that changes a state. In SwiftUI, you can declare special variables\
    \ as State variables like this:\n\n```\n@State var colorMe = false\n```\n\nWhen\
    \ you store updated data in an ordinary variable, any other part of your program\
    \ that uses that variable has no idea that the data has been updated. Making sure\
    \ every part of your program receives any updated data stored in a variable can\
    \ be tedious and error-prone. That’s why SwiftUI offers State variables to solve\
    \ this problem.\n\nThe moment you change the value of a State variable, anything\
    \ that uses that State variable automatically gets the latest data stored in that\
    \ State variable without the need to write any extra code. When a variable holds\
    \ one value, it’s in one state, and when that same variable holds a different\
    \ value, that’s a second state. SwiftUI State variables simply automate the process\
    \ of making sure every part of your program knows about changes in a variable’s\
    \ value or state.\n\nThe preceding example creates a State variable by using the\
    \ @State keyword followed by a variable declaration (var) that defines a variable’s\
    \ name (colorMe), data type (Boolean type inferred), and initial value (false).\n\
    \nWhen using State variables that represent Boolean data types, one common command\
    \ to use is the .toggle() command, which changes a Boolean variable from true\
    \ to false (or false to true) such as\n\n```\ncolorMe.toggle()\n```\n\nIf the\
    \ value of the colorMe State variable is true, then the .toggle() command changes\
    \ the colorMe value to false. If the value of the colorMe State variable is false,\
    \ then the .toggle() command changes the colorMe value to true.\n\nBoolean State\
    \ variables are often used to make if-else decisions. Normally, modifiers just\
    \ contain a single value such as\n\n```\n.fill(Color.green)\n```\n\nHowever, if\
    \ you embed an if-else ternary operator in a modifier, you can duplicate the traditional\
    \ if-else statement in a single line like this:\n\n```\n.fill(colorMe ? Color.green\
    \ : Color.gray)\n```\n\nThe preceding Swift code checks the Boolean value of the\
    \ “colorMe” variable. If it’s true, then it uses the color green. Otherwise, it\
    \ uses the color gray. Let’s see how to put together State variables, the .toggle()\
    \ command, and the if-else ternary operator to make a button respond to the user:\n\
    \n1.  Create a new SwiftUI iOS App project and give it any name you wish such\
    \ as “Buttons.”\n\n2.  Click the ContentView file in the Navigator pane.\n\n3.\
    \  Add a State variable underneath the struct ContentView: View line like this:\n\
    \n```\n    struct ContentView: View {\n    @State var colorMe = false\n    var\
    \ body: some View {\n    ```\n\nThis defines a State variable called colorMe (the\
    \ exact name is arbitrary) and sets its initial value as false, defining it to\
    \ hold only Boolean data types.\n\n4.  Create a VStack with a spacing value of\
    \ 28 inside the var body: some View like this:\n\n```\n    struct ContentView:\
    \ View {\n    @State var colorMe = false\n    var body: some View {\n    VStack\
    \ (spacing: 28) {\n    }\n    }\n    }\n    ```\n\nThe spacing of 28 will separate\
    \ all views inside the VStack so they don’t appear crowded together.\n\n5.  Type\
    \ the following inside the VStack:\n\n```\n    Rectangle()\n    .fill(colorMe\
    \ ? Color.green : Color.gray)\n    .frame(width: 250, height: 100)\n    ```\n\n\
    This creates a rectangle where the .frame modifier defines its width as 250 and\
    \ its height as 100\\. Notice that the .fill modifier uses the colorMe Boolean\
    \ State variable to determine which color to display. If colorMe is true, then\
    \ the rectangle appears green. If the colorMe is false, then the rectangle appears\
    \ gray.\n\n6.  Type the following underneath the Rectangle() inside the VStack\
    \ to create a plain Button:\n\n```\n    Button(\"Plain text button\") {\n    colorMe.toggle()\n\
    \    }\n    ```"
  trans: "\n# 6. 使用按钮和分段控件响应用户操作\n\n每个用户界面都需要向用户显示信息，无论是文本还是图像。然而，用户界面的另一个功能是接收用户的命令。通过用户界面接收命令的最简单方式就是使用按钮。\n\
    \n按钮代表单个命令，可以像确认（如确定或取消）一样简单。要创建一个`Button`，你需要定义：\n\n- 在按钮上显示文本的标题\n- 用户点击按钮时运行的\
    \ Swift 代码\n\nSwiftUI 提供了两种创建`Button`的方式。最简单的方式只需定义按钮上显示的文本，紧接着是用户选择按钮时要运行的 Swift\
    \ 代码，如下所示：\n\n```\nButton(\"点击此处\") {\n    // 要运行的代码\n}\n```\n\n第二种创建按钮的方式在修改按钮上文本的外观时提供了更大的灵活性，例如：\n\
    \n```\nButton {\n    // 要运行的代码\n} label: {\n    Text(\"点击此处\")\n        .font(.largeTitle)\n\
    \        .foregroundColor(.green)\n        .padding()\n        .border(Color.red,\
    \ width: 6)\n}\n```\n\n第二种方法使用`Text`视图来定义按钮上显示的标题。然后它使用`.font`修饰符定义字体大小，使用`.foregroundColor`修饰符将文本显示为绿色，使用`.padding`修饰符在`Text`视图周围添加间距，并使用`.border`修饰符在`Text`视图周围添加宽度为\
    \ 6 点的红色边框。\n\n除了使用`Text`视图定义按钮的标题，你也可以使用`Label`视图来同时显示文本和图标，如下所示：\n\n```\nButton\
    \ {\n    // 要运行的代码\n} label: {\n    Label(\"图像按钮\", systemImage: \"hare.fill\"\
    )\n        .font(.largeTitle)\n        .foregroundColor(.purple)\n        .padding()\n\
    \        .border(Color.blue, width: 6)\n}\n```\n\n这个`Label`视图定义了要显示的文本和图标，然后使用`.font`修饰符定义文本和图标的大小。它使用`.foregroundColor`修饰符将文本和图标显示为紫色，使用`.padding`修饰符在`Label`视图周围添加间距，并使用`.border`修饰符在`Label`视图周围显示宽度为\
    \ 6 点的蓝色边框。\n\n你也可以使用`Image`视图让图像显示为按钮，如下所示：\n\n```\nButton {\n    // 要运行的代码\n\
    } label: {\n    Image(\"browncat\")\n        .resizable()\n        .frame(width:\
    \ 150, height: 150)\n        .clipShape(Circle())\n        .overlay(Circle().stroke(Color.yellow,\
    \ lineWidth: 4))\n}\n```\n\n这个`Image`视图使用存储在 Assets 文件夹中的图像（名为`browncat`），然后使用`.frame`修饰符将图像压缩成一个宽高均为\
    \ 150 的正方形。接着它使用`.clipShape`修饰符在圆形内显示图像，随后使用`.overlay`修饰符显示线宽为 4 的黄色边框。\n\n通过使用第二种方法定义`Button`的标题，你可以看到如何更好地控制按钮标题的外观，特别是与使用纯文本简单定义`Button`的方式相比，如图\
    \ 6-1 所示。\n\n![../images/329781_6_En_6_Chapter/329781_6_En_6_Fig1_HTML.jpg](img/329781_6_En_6_Fig1_HTML.jpg)\n\
    \n图 6-1\n\n使用`Text`视图、`Label`视图或`Image`视图定义按钮标题\n\n## 在按钮中运行代码\n\n你可以存储任何代码，以便在用户点击`Button`时运行。按钮内部常见的一种代码类型是改变状态的代码。在\
    \ SwiftUI 中，你可以像这样将特殊变量声明为 State 变量：\n\n```\n@State var colorMe = false\n```\n\
    \n当你将更新后的数据存储到普通变量中时，使用该变量的程序的其他部分并不知道数据已被更新。确保程序的每个部分都能接收到变量中存储的更新数据可能既繁琐又容易出错。这就是\
    \ SwiftUI 提供 State 变量来解决这个问题的原因。\n\n一旦你改变了 State 变量的值，任何使用该 State 变量的内容都会自动获取该\
    \ State 变量中存储的最新数据，无需编写任何额外代码。当一个变量持有一个值时，它处于一种状态；当同一个变量持有不同的值时，那就是第二种状态。SwiftUI\
    \ State 变量自动简化了让程序每个部分都了解变量值或状态变化的过程。\n\n前面的例子通过使用`@State`关键字，后跟一个变量声明（`var`）来创建一个\
    \ State 变量，该声明定义了变量的名称（`colorMe`）、数据类型（推断为布尔类型）和初始值（`false`）。\n\n当使用表示布尔数据类型的\
    \ State 变量时，一个常用的命令是`.toggle()`命令，它将布尔变量从`true`改为`false`（或从`false`改为`true`），例如：\n\
    \n```\ncolorMe.toggle()\n```\n\n如果`colorMe` State 变量的值是`true`，那么`.toggle()`命令会将`colorMe`的值改为`false`。如果`colorMe`\
    \ State 变量的值是`false`，那么`.toggle()`命令会将`colorMe`的值改为`true`。\n\n布尔 State 变量常用于做出\
    \ if-else 决策。通常，修饰符只包含单个值，例如：\n\n```\n.fill(Color.green)\n```\n\n然而，如果你在修饰符中嵌入\
    \ if-else 三元运算符，就可以将传统的 if-else 语句压缩到单行中，如下所示：\n\n```\n.fill(colorMe ? Color.green\
    \ : Color.gray)\n```\n\n前面的 Swift 代码检查`colorMe`变量的布尔值。如果为`true`，则使用绿色。否则，使用灰色。让我们看看如何将\
    \ State 变量、`.toggle()`命令和 if-else 三元运算符组合起来，使按钮响应用户操作：\n\n1. 创建一个新的 SwiftUI iOS\
    \ App 项目，并为其指定任意名称，例如`Buttons`。\n\n2. 在导航器面板中点击`ContentView`文件。\n\n3. 在`struct\
    \ ContentView: View`行下方添加一个 State 变量，如下所示：\n\n```\n    struct ContentView: View\
    \ {\n    @State var colorMe = false\n    var body: some View {\n```\n\n这定义了一个名为`colorMe`的\
    \ State 变量（具体名称可任意），并将其初始值设置为`false`，同时定义它只保存布尔数据类型。\n\n4. 在`var body: some View`内部创建一个间距值为\
    \ 28 的`VStack`，如下所示：\n\n```\n    struct ContentView: View {\n    @State var colorMe\
    \ = false\n    var body: some View {\n    VStack (spacing: 28) {\n    }\n    }\n\
    \    }\n```\n\n间距为 28 将使`VStack`内的所有视图彼此分离，避免显得拥挤。\n\n5. 在`VStack`内部输入以下内容：\n\n\
    ```\n    Rectangle()\n    .fill(colorMe ? Color.green : Color.gray)\n    .frame(width:\
    \ 250, height: 100)\n```\n\n这会创建一个矩形，其中`.frame`修饰符将其宽度定义为 250，高度定义为 100。注意，`.fill`修饰符使用`colorMe`布尔\
    \ State 变量来决定显示哪种颜色。如果`colorMe`为`true`，则矩形显示为绿色。如果`colorMe`为`false`，则矩形显示为灰色。\n\
    \n6. 在`VStack`内部的`Rectangle()`下方输入以下内容，以创建一个普通按钮：\n\n```\n    Button(\"纯文本按钮\"\
    ) {\n    colorMe.toggle()\n    }\n```\n"
- fmt: "This defines a `Button` that displays plain text. Each time the user taps\
    \ this `Button`, it uses the `.toggle()` command to change the value of `colorMe`\
    \ from `true` to `false` (or `false` to `true`).\n\n7.  Type the following underneath\
    \ the `Button` inside the `VStack` to create a `Button` that uses a customized\
    \ `Text` view to display its title:\n\n```\n    Button {\n    colorMe.toggle()\n\
    \    } label: {\n    Text(\"Custom text button\")\n    .font(.largeTitle)\n  \
    \  .foregroundColor(.green)\n    .padding()\n    .border(Color.red, width: 6)\n\
    \    }\n    ```\n\nThis defines a `Button` that also uses the `.toggle()` command\
    \ to change the Boolean value of the `colorMe` variable. However, it uses a `Text`\
    \ view to display the `Button`’s title. The `.font` modifier changes the size\
    \ of the `Text` view, the `.foregroundColor` modifier displays the text in green,\
    \ the `.padding` modifier adds space around the `Text` view, and the `.border`\
    \ modifier displays a red border, with a width of 6, around the `Text` view.\n\
    \n8.  Type the following underneath the previous `Button` inside the `VStack`\
    \ to define a `Button`’s title using a `Label` view:\n\n```\n    Button {\n  \
    \  colorMe.toggle()\n    } label: {\n    Label(\"Image button\", systemImage:\
    \ \"hare.fill\")\n    .font(.largeTitle)\n    .foregroundColor(.purple)\n    .padding()\n\
    \    .border(Color.blue, width: 6)\n    }\n    ```\n\nThis defines a `Button`\
    \ that uses the `.toggle()` command to change the Boolean value of the `colorMe`\
    \ variable. However, it uses a `Label` view to display text (“Image button”) along\
    \ with an icon called “hare.fill”. Then it uses the `.font` modifier to enlarge\
    \ the text and icon and the `.foregroundColor` modifier to display the text and\
    \ icon in purple. Finally, it uses the `.padding` modifier to add space around\
    \ the `Label` view and place a blue border with a width of 6 around the `Label`\
    \ view.\n\n9.  Type the following underneath the previous `Button` inside the\
    \ `VStack` to define a `Button`’s title using an `Image` view:\n\n```\n    Button\
    \ {\n    colorMe.toggle()\n    } label: {\n    Image(\"browncat\")\n    .resizable()\n\
    \    .frame(width: 150, height: 150)\n    .clipShape(Circle())\n    .overlay(Circle().stroke(Color.yellow,\
    \ lineWidth: 4))\n    }\n    ```\n\nThis defines a `Button` that uses the `.toggle()`\
    \ command to change the Boolean value of the `colorMe` variable. Instead of displaying\
    \ text for the `Button`’s title, the `Image` view uses an image (called “browncat”)\
    \ that’s been stored in the Assets folder of the Xcode project. Then it uses the\
    \ `.resizable` and `.frame` modifiers to resize the image into a box 150 in width\
    \ and 150 in height. Finally, it uses the `.clipShape` modifier to shape the image\
    \ in a circle and uses the `.overlay` modifier to place a yellow circle border\
    \ around the image with a line width of 4.\n\nThe entire SwiftUI code should look\
    \ like this:\n\n```\n    import SwiftUI\n    struct ContentView: View {\n    @State\
    \ var colorMe = false\n    var body: some View {\n    VStack (spacing: 28) {\n\
    \    Rectangle()\n    .fill(colorMe ? Color.green : Color.gray)\n    .frame(width:\
    \ 250, height: 100)\n    Button(\"Plain text button\") {\n    colorMe.toggle()\n\
    \    }\n    Button {\n    colorMe.toggle()\n    } label: {\n    Text(\"Custom\
    \ text button\")\n    .font(.largeTitle)\n    .foregroundColor(.green)\n    .padding()\n\
    \    .border(Color.red, width: 6)\n    }\n    Button {\n    colorMe.toggle()\n\
    \    } label: {\n    Label(\"Image button\", systemImage: \"hare.fill\")\n   \
    \ .font(.largeTitle)\n    .foregroundColor(.purple)\n    .padding()\n    .border(Color.blue,\
    \ width: 6)\n    }\n    Button {\n    colorMe.toggle()\n    } label: {\n    Image(\"\
    browncat\")\n    .resizable()\n    .frame(width: 150, height: 150)\n    .clipShape(Circle())\n\
    \    .overlay(Circle().stroke(Color.yellow, lineWidth: 4))\n    }\n    }\n   \
    \ }\n    }\n    struct ContentView_Previews: PreviewProvider {\n    static var\
    \ previews: some View {\n    ContentView()\n    }\n    }\n    ```\n\n10.  Click\
    \ the Live Preview icon in the Canvas pane.\n\n11.  Click any of the buttons.\
    \ Notice that each time you click a button, it toggles the `colorMe` Boolean variable\
    \ to alternate displaying green or gray in the rectangle.\n\n## Using a Segmented\
    \ Control\n\nA `Button` represents a single command, so if you want to offer the\
    \ user a choice between multiple commands, you need to use multiple `Button`s.\
    \ Unfortunately, multiple `Button`s can be cumbersome to cram into a user interface.\
    \ To get around this problem, SwiftUI offers a segmented control.\n\nThe main\
    \ idea behind a segmented control is to display two or more options in a condensed\
    \ space rather than use multiple `Button`s. To create a segmented control, you\
    \ need the following:\n\n*   A `@State` variable to represent which segment (option)\
    \ the user chose\n*   A `Picker` view that lists two or more options\n*   A `.tag`\
    \ property linked to each option\n*   The `SegmentedPickerStyle` modifier\n\n\
    To see how to use a segmented control, follow these steps:\n\n![../images/329781_6_En_6_Chapter/329781_6_En_6_Fig2_HTML.jpg](images/329781_6_En_6_Chapter/329781_6_En_6_Fig2_HTML.jpg)\n\
    \n**Figure 6-2** The complete user interface for the segmented control\n\n1. \
    \ Create a new SwiftUI iOS App project and give it any name you wish such as “SegmentedControl.”\n\
    \n2.  Click the `ContentView` file in the Navigator pane.\n\n3.  Add a `@State`\
    \ variable underneath the `struct ContentView: View` line like this:\n\n```\n\
    \    struct ContentView: View {\n    @State private var selectedColor = Color.gray\n\
    \    var body: some View {\n    ```\n\nThis creates a `@State` variable called\
    \ `selectedColor`. Notice that the “private” keyword is optional, which simply\
    \ means this variable can only be used within this `ContentView` structure. Notice\
    \ that the initial value of this `selectedColor` variable is `Color.gray`, which\
    \ means its inferred data type is `Color`.\n\n4.  Create a `VStack` with a spacing\
    \ value of 28 inside the `var body: some View` like this:\n\n```\n    struct ContentView:\
    \ View {\n    @State private var selectedColor = Color.gray\n    var body: some\
    \ View {\n    VStack (spacing: 28) {\n    }\n    }\n    }\n    ```\n\nThe spacing\
    \ value can be any number you wish, but it adds spacing between any views you\
    \ add inside the `VStack` so they don’t appear crowded together on the user interface.\n\
    \n5.  Type the following to create a colored rectangle inside the `VStack`:\n\n\
    ```\n    Rectangle()\n    .fill(selectedColor)\n    ```\n\nThis creates a rectangle\
    \ that contains the color defined by the `selectedColor` `@State` variable. Initially,\
    \ this rectangle is filled with `Color.gray`.\n\n6.  Type the following to create\
    \ a segmented control inside the `VStack`:\n\n```\n    Picker(\"Favorite Color\"\
    , selection: $selectedColor, content: {\n    Text(\"Red\").tag(Color.red)\n  \
    \  Text(\"Green\").tag(Color.green)\n    Text(\"Blue\").tag(Color.blue)\n    }).pickerStyle(SegmentedPickerStyle())\n\
    \    ```\n\nThis creates a `Picker` view that lists three options (“Red,” “Green,”\
    \ and “Blue”) displayed on the segmented control. After each option is a `.tag`\
