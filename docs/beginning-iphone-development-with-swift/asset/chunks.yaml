    ` .toolbar { EditButton() } ` 这段代码会在 `NavigationView` 的右上角添加一个“编辑”按钮。


    8.  为 `ForEach` 循环添加 `.onMove` 修饰符，以调用名为 `move` 的函数，如下所示：


