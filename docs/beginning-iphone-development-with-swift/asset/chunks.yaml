    ```


    A Text view can display strings of any length. However, the length of a displayed
    string can vary depending on the screen size that the app runs on such as the
    larger iPad screen or the smaller iPhone screen. To customize how strings appear,
    SwiftUI lets you define the following:


    *   Line limits – Defines the maximum number of lines the Text view can display
    such as two or four


    *   Truncation – Defines how to truncate or cut off strings if it’s not possible
    to display the entire string


    The line limit modifier lets you define the maximum number of lines to display.
    If you do not specify a line limit value, SwiftUI will display as many lines as
    possible. To define a line limit, add a lineLimit modifier in Swift code like
    this:


    ```

    Text("This is my age \(myString). Since I am retired, I am now eligible for a
    pension and Social Security so I can spend the rest of my life relaxing and enjoying
    life without having to work for an income anymore.")

    .lineLimit(2)

    ```


    Figure [4-1](#329781_6_En_4_Chapter.xhtml#Fig1) shows two identical Text views,
    but the top Text view does not have a line limit. As a result, it displays all
    of its text. The bottom Text view has a line limit of two, so it only shows the
    first two lines of text.


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig1_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig1_HTML.jpg)


    Figure 4-1


    The lineLimit modifier may cut off part of the text


    Rather than type Swift code to define a line limit, you can also click the Text
    view and open the Inspector. Then you can define a line limit in the Inspector
    pane as shown in Figure [4-2](#329781_6_En_4_Chapter.xhtml#Fig2).


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig2_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Defining a line limit in the Inspector pane


    If you define a line limit (such as two lines) and your text exceeds that limit
    (such as displaying three or more lines), SwiftUI will cut off or truncate text.
    SwiftUI offers three ways to truncate text that exceeds its line limit as shown
    in Figure [4-3](#329781_6_En_4_Chapter.xhtml#Fig3):


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig3_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig3_HTML.jpg)


    Figure 4-3


    Three different ways to truncate text that exceeds its line limit


    *   .head – Truncates the beginning of the last line


    *   .middle – Truncates the middle of the last line


    *   .tail – Truncates the end of the last line


    By default, SwiftUI truncates text at the end of a line (Tail), but you can define
    the head or middle truncation option by using the truncationMode modifier with
    the lineLimit modifier on a Text View such as


    ```

    .truncationMode(.middle)

    ```


    If you move the cursor into a Text view and then click the Add Modifier button
    at the bottom of the Inspector pane, you can add the Truncation Mode modifier
    to the Inspector pane. Then you can define the truncation option in the Inspector
    pane as shown in Figure [4-4](#329781_6_En_4_Chapter.xhtml#Fig4).


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig4_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig4_HTML.jpg)


    Figure 4-4


    Defining a truncation option in the Inspector pane'
  trans: '

    # 4. 文本处理


    每个用户界面都需要在屏幕上显示信息。虽然这些信息可以以多种形式呈现，但用户界面上一种常见的信息显示类型涉及文本。如果你想在用户界面上显示文本，就需要定义一个字符串，并让它出现在一个
    `Text` 视图中，例如：


    ```

    Text("Hello World")

    ```


    为了获得更高的灵活性，你可以将字符串存储在一个变量或常量中，然后在 `Text` 视图中使用该变量或常量的名称，例如：


    ```

    let myString = "展示一个字符串变量"

    Text(myString)

    ```


    通过使用字符串变量，你可以在该变量中存储不同的字符串，使 `Text` 视图显示新的文本。为了更灵活，`Text` 视图还可以使用字符串插值来显示非字符串数据，例如：


    ```

    let myString = 46

    Text("这是我的年龄 = \(myString)")

    ```


    一个 `Text` 视图可以显示任意长度的字符串。然而，显示的字符串长度可能会因应用程序运行时的屏幕尺寸而异，例如较大的 iPad 屏幕或较小的 iPhone
    屏幕。为了自定义字符串的显示方式，SwiftUI 允许你定义以下内容：


    - **行数限制** – 定义 `Text` 视图可以显示的最大行数，例如两行或四行。

    - **截断方式** – 定义当无法显示整个字符串时如何进行截断或裁切。


    行数限制修改器允许你定义要显示的最大行数。如果你未指定行数限制值，SwiftUI 将尽可能多地显示行数。要定义行数限制，请在 Swift 代码中添加一个 `lineLimit`
    修改器，如下所示：


    ```

    Text("这是我的年龄 \(myString)。由于我已经退休，现在有资格领取养老金和社会保障金，因此我可以在余生中放松身心、享受生活，而无需再为收入而工作。")

    .lineLimit(2)

    ```


    图 4-1 展示了两个相同的 `Text` 视图，但顶部的 `Text` 视图没有行数限制。因此，它显示了全部文本。底部的 `Text` 视图限制为两行，因此它只显示前两行文本。


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig1_HTML.jpg](img/329781_6_En_4_Fig1_HTML.jpg)


    **图 4-1** – `lineLimit` 修改器可能会截断部分文本。


    除了键入 Swift 代码来定义行数限制，你还可以单击 `Text` 视图并打开检查器。然后你可以在检查器窗格中定义行数限制，如图 4-2 所示。


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig2_HTML.jpg](img/329781_6_En_4_Fig2_HTML.jpg)


    **图 4-2** – 在检查器窗格中定义行数限制。


    如果你定义了行数限制（例如两行），而文本超过该限制（例如显示三行或更多行），SwiftUI 就会裁切或截断文本。SwiftUI 提供了三种在超出行数限制时截断文本的方式，如图
    4-3 所示：


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig3_HTML.jpg](img/329781_6_En_4_Fig3_HTML.jpg)


    **图 4-3** – 超出行数限制时截断文本的三种不同方式。


    - `.head` – 截断最后一行的开头部分。

    - `.middle` – 截断最后一行的中间部分。

    - `.tail` – 截断最后一行的末尾部分。


    默认情况下，SwiftUI 在行尾（Tail）截断文本，但你可以在 `Text` 视图上通过将 `truncationMode` 修改器与 `lineLimit`
    修改器配合使用来定义开头或中间截断选项，例如：


    ```

    .truncationMode(.middle)

    ```


    如果你将光标移入 `Text` 视图，然后单击检查器窗格底部的“添加修改器”按钮，便可以将“截断模式”修改器添加到检查器窗格中。然后你可以在检查器窗格中定义截断选项，如图
    4-4 所示。


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig4_HTML.jpg](img/329781_6_En_4_Fig4_HTML.jpg)


    **图 4-4** – 在检查器窗格中定义截断选项。

