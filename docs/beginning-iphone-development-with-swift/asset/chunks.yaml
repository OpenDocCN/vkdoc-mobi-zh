    \ Notice that each time you click a button, it toggles the colorMe Boolean variable\
    \ to alternate displaying green or gray in the rectangle.\n\n## Using a Segmented\
    \ Control\n\nA Button represents a single command, so if you want to offer the\
    \ user a choice between multiple commands, you need to use multiple Buttons. Unfortunately,\
    \ multiple Buttons can be cumbersome to cram into a user interface. To get around\
    \ this problem, SwiftUI offers a segmented control.\n\nThe main idea behind a\
    \ segmented control is to display two or more options in a condensed space rather\
    \ than use multiple Buttons. To create a segmented control, you need the following:\n\
    \n*   A State variable to represent which segment (option) the user chose\n\n\
    *   A Picker view that lists two or more options\n\n*   A tag property linked\
    \ to each option\n\n*   The SegmentedPickerStyle modifier\n\nTo see how to use\
    \ a segmented control, follow these steps:\n\n![../images/329781_6_En_6_Chapter/329781_6_En_6_Fig2_HTML.jpg](images/329781_6_En_6_Chapter/329781_6_En_6_Fig2_HTML.jpg)\n\
    \nFigure 6-2\n\nThe complete user interface for the segmented control\n\n1.  Create\
    \ a new SwiftUI iOS App project and give it any name you wish such as “SegmentedControl.”\n\
    \n2.  Click the ContentView file in the Navigator pane.\n\n3.  Add a State variable\
    \ underneath the struct ContentView: View line like this:\n\n```\n    struct ContentView:\
    \ View {\n    @State private var selectedColor = Color.gray\n    var body: some\
    \ View {\n    ```\n\nThis creates a State variable called selectedColor. Notice\
    \ that the “private” keyword is optional, which simply means this variable can\
    \ only be used within this ContentView structure. Notice that the initial value\
    \ of this selectedColor variable is Color.gray, which means its inferred data\
    \ type is Color.\n\n4.  Create a VStack with a spacing value of 28 inside the\
    \ var body: some View like this:\n\n```\n    struct ContentView: View {\n    @State\
    \ private var selectedColor = Color.gray\n    var body: some View {\n    VStack\
    \ (spacing: 28) {\n    }\n    }\n    }\n    ```\n\nThe spacing value can be any\
    \ number you wish, but it adds spacing between any views you add inside the VStack\
    \ so they don’t appear crowded together on the user interface.\n\n5.  Type the\
    \ following to create a colored rectangle inside the VStack:\n\n```\n    Rectangle()\n\
    \    .fill(selectedColor)\n    ```\n\nThis creates a rectangle that contains the\
    \ color defined by the selectedColor State variable. Initially, this rectangle\
    \ is filled with Color.gray.\n\n6.  Type the following to create a segmented control\
    \ inside the VStack:\n\n```\n    Picker(\"Favorite Color\", selection: $selectedColor,\
    \ content: {\n    Text(\"Red\").tag(Color.red)\n    Text(\"Green\").tag(Color.green)\n\
    \    Text(\"Blue\").tag(Color.blue)\n    }).pickerStyle(SegmentedPickerStyle())\n\
    \    ```\n\nThis creates a Picker view that lists three options (“Red,” “Green,”\
    \ and “Blue”) displayed on the segmented control. After each option is a .tag\
    \ that’s linked to each option. While the user sees the options displayed by the\
    \ three Text views (“Red,” “Green,” and “Blue”), the selectedColor State variable\
    \ is actually storing the .tag values, which are Colors (.red, .green, and .blue).\
    \ The .pickerStyle modifier displays the Picker view as a segmented control by\
    \ defining SegmentedPickerStyle().\n\nThe entire SwiftUI code should look like\
    \ this:\n\n```\n    import SwiftUI\n    struct ContentView: View {\n    @State\
    \ private var selectedColor = Color.gray\n    var body: some View {\n    VStack\
    \ (spacing: 28) {\n    Rectangle()\n    .fill(selectedColor)\n    Picker(\"Favorite\
    \ Color\", selection: $selectedColor, content: {\n    Text(\"Red\").tag(Color.red)\n\
    \    Text(\"Green\").tag(Color.green)\n    Text(\"Blue\").tag(Color.blue)\n  \
    \  }).pickerStyle(SegmentedPickerStyle())\n    }\n    }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n\
    \    }\n    }\n    ```\n\n7.  Click the Live Preview icon in the Canvas pane."
