- fmt: "### Dismissing the Virtual Keyboard\n\nWhen the user wants to type in a `TextField`,\
    \ the virtual keyboard appears, and the user interface automatically slides up.\
    \ However, once you’re done typing, you need to make the virtual keyboard go away\
    \ again.\n\nOne technique is to use the `.submitLabel` modifier that defines a\
    \ specific key to appear on the virtual keyboard. By tapping this key defined\
    \ by the `.submitLabel` modifier, users can make the virtual keyboard go away\
    \ as shown in Figure [7-5](#329781_6_En_7_Chapter.xhtml#Fig5). The `.submitLabel`\
    \ modifier looks like this:\n\n![../images/329781_6_En_7_Chapter/329781_6_En_7_Fig5_HTML.jpg](images/329781_6_En_7_Chapter/329781_6_En_7_Fig5_HTML.jpg)\n\
    \nFigure 7-5\n\nThe `.submitLabel(.done)` modifier displays a \"Done\" button\
    \ on the virtual keyboard.\n\n```\n.submitLabel(.done)\n```\n\nIf you don’t specify\
    \ a `.submitLabel` modifier, SwiftUI defaults to displaying a \"Return\" button\
    \ in the bottom right corner of the virtual keyboard. No matter what label appears\
    \ on the bottom right corner key, tapping it will make the virtual keyboard go\
    \ away.\n\nThe different types of buttons the `.submitLabel` modifier can place\
    \ on the virtual keyboard include:\n\n- `.continue` – Adds a \"Continue\" button\n\
    - `.done` – Adds a \"Done\" button\n- `.go` – Adds a \"Go\" button\n- `.join`\
    \ – Adds a \"Join\" button\n- `.next` – Adds a \"Next\" button\n- `.return` –\
    \ Adds a \"Return\" button\n- `.route` – Adds a \"Route\" button\n- `.search`\
    \ – Adds a \"Search\" button\n- `.send` – Adds a \"Send\" button\n\n**Note**\n\
    \nThe `.submitLabel` modifier only works with iOS 15 and greater.\n\nTo see how\
    \ to hide the virtual keyboard by using the virtual keyboard button that you can\
    \ define, follow these steps:\n\n1.  Create a new SwiftUI iOS App project and\
    \ give it any name you wish such as \"DismissKeyboard.\"\n2.  Click the `ContentView`\
    \ file in the Navigator pane.\n3.  Add the following line above the two structures\
    \ in the `ContentView` file:\n\n```\n@available(iOS 15.0, *)\n```\n\nThis checks\
    \ to make sure the project only runs on iOS 15 or greater.\n\n4.  Add a `@State`\
    \ variable underneath the `struct ContentView: View` line like this:\n\n```\n\
    @State var message = \"\"\n```\n\n5.  Add a `TextField` inside the `body` like\
    \ this:\n\n```swift\nvar body: some View {\n    TextField(\"Type here\", text:\
    \ $message)\n        .submitLabel(.done)\n        .padding()\n}\n```\n\nThe entire\
    \ `ContentView` file should look like this:\n\n```swift\nimport SwiftUI\n\n@available(iOS\
    \ 15.0, *)\nstruct ContentView: View {\n    @State var message = \"\"\n    \n\
    \    var body: some View {\n        TextField(\"Type here\", text: $message)\n\
    \            .submitLabel(.done)\n            .padding()\n    }\n}\n\n@available(iOS\
    \ 15.0, *)\nstruct ContentView_Previews: PreviewProvider {\n    static var previews:\
    \ some View {\n        ContentView()\n    }\n}\n```\n\nNotice the two `@available(iOS\
    \ 15.0, *)` lines above each structure.\n\n6.  Click the `_____App` file name\
    \ where `_____` is the name you gave your project. This other file contains Swift\
    \ code you’ll need to modify as well.\n7.  Add the `@available(iOS 15.0, *)` line\
    \ above the structure like this:\n\n```swift\nimport SwiftUI\n\n@available(iOS\
    \ 15.0, *)\n@main\nstruct DismissKeyboard_Chapter_7App: App {\n    var body: some\
    \ Scene {\n        WindowGroup {\n            ContentView()\n        }\n    }\n\
    }\n```\n\nIn the preceding example, the project name is `DismissKeyboard` Chapter\
    \ [7](#329781_6_En_7_Chapter.xhtml), so Xcode creates a file called `DismissKeyboard_Chapter_7App`\
    \ in the Navigator pane.\n\n8.  Click the Run button or choose `Product` ➤ `Run`\
    \ to run your app in the Simulator.\n9.  Click in the `TextField` when your app\
    \ appears in the Simulator. If the virtual keyboard does not appear, press `Command+K`\
    \ or choose `I/O` ➤ `Keyboard` ➤ `Toggle Software Keyboard`.\n10. Click the \"\
    Done\" button in the bottom right corner of the virtual keyboard to make the virtual\
    \ keyboard disappear.\n\n### Using a Text Editor\n\nWhere a `TextField` lets the\
    \ user type in a word or short sentence, a `TextEditor` lets the user type in\
    \ multiple lines of text, much like a word processor. When you place a `TextEditor`\
    \ on a user interface, it expands to fill all available space. That’s why it’s\
    \ best to use the `.frame` modifier to define a specific size for the `TextEditor`.\n\
    \nWith a `TextField`, tapping the button in the bottom right corner of the virtual\
    \ keyboard makes it go away. Since a `TextEditor` can hold multiple lines of text,\
    \ the button in the bottom right corner of the virtual keyboard simply moves the\
    \ cursor to the next line and always displays the \"return\" label.\n\nSo if you\
    \ want to hide a virtual keyboard when using a `TextEditor`, you need to do the\
    \ following:\n\n- Create a `FocusState` variable that represents a `Bool`ean value.\n\
    - Add the `.focused` modifier to the `TextEditor` and use the `FocusState` variable.\n\
    - Create an additional control, such as a `Button`, that sets the `FocusState`\
    \ variable to `false`.\n\n**Note**\n\nThis method of using a `FocusState` variable\
    \ with a `.focused` modifier and a separate control works with `TextField`s as\
    \ well.\n\nFirst, you need to create a `FocusState` variable like this:\n\n```swift\n\
    @FocusState var dismissKeyboard: Bool\n```\n\nOnce you’ve defined a `FocusState`\
    \ variable, you need to use the `.focused` modifier on a `TextEditor` (or `TextField`)\
    \ to link to the `FocusState` variable like this:\n\n```swift\nTextEditor(text:\
    \ $message)\n    .focused($dismissKeyboard)\n```\n\nThen you can set the value\
    \ of the `FocusState` variable to `false` through a separate control to make the\
    \ virtual keyboard disappear like this:\n\n```swift\nButton(\"Hide Keyboard\"\
    ) {\n    dismissKeyboard = false\n}\n```\n\nTo see how `FocusState` variables\
    \ work, follow these steps:\n\n1.  Create a new SwiftUI iOS App project and give\
    \ it any name you wish such as \"DismissKeyboardTextEditor.\"\n2.  Click the `ContentView`\
    \ file in the Navigator pane.\n3.  Add the following line above the two structures\
    \ in the `ContentView` file:\n\n```\n@available(iOS 15.0, *)\n```\n\n4.  Create\
    \ a `@State` variable to hold the contents of a `TextEditor`, and create a `@FocusState`\
    \ variable to make the virtual keyboard disappear as follows:\n\n```swift\n@available(iOS\
    \ 15.0, *)\nstruct ContentView: View {\n    @State var message = \"\"\n    @FocusState\
    \ var dismissKeyboard: Bool\n```\n\n5.  Add a `Button` and a `TextEditor` inside\
    \ of a `VStack`. To keep the `TextEditor` from expanding, make sure you add a\
    \ `.frame` modifier to the `TextEditor`. The entire code inside the `ContentView`\
    \ file should look like this:\n\n```swift\nimport SwiftUI\n\n@available(iOS 15.0,\
    \ *)\nstruct ContentView: View {\n    @State var message = \"\"\n    @FocusState\
    \ var dismissKeyboard: Bool\n    \n    var body: some View {\n        VStack {\n\
    \            TextEditor(text: $message)\n                .focused($dismissKeyboard)\n\
    \                .frame(width: 250, height: 150)\n                .padding()\n\
