    ```


    The entire ContentView file should look like this:


    ![../images/329781_6_En_15_Chapter/329781_6_En_15_Fig3_HTML.jpg](images/329781_6_En_15_Chapter/329781_6_En_15_Fig3_HTML.jpg)


    Figure 15-3


