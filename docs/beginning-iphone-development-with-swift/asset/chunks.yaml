    ## Detecting Magnification Gestures


    A magnification gesture (also known as a pinch gesture) occurs when the user holds
    two fingertips on the screen and moves the fingertips apart or closer together.
    This magnification gesture often occurs when the user wants to zoom in on an image
    or zoom out to see more of something such as a larger view of a map.


    Since the magnification gesture changes the size of a view, you need to define
    two State variables that represent the current size and the final size as CGFloat
    data types like this:


    ```

    @State private var tempValue: CGFloat = 0

    @State private var finalValue: CGFloat = 1

    ```


    To resize a view, the magnification gesture needs to work with the .scaleEffect
    modifier on the view you want to resize such as


    ```

    Image(systemName: "star.fill")

    .font(.system(size: 200))

    .foregroundColor(.green)

    .scaleEffect(finalValue + tempValue)

    ```


    Then you need to attach the .gesture modifier to the view you want to resize using
    the magnification gesture like this:


    ```

    .gesture(

    )

    ```


    Inside the parentheses of the .gesture modifier is where you define the magnification
    gesture. You need to detect when the magnification gesture changes and when it
    finally ends like this:


    ```

    .gesture(

    MagnificationGesture()

    .onChanged { amount in

    //  Code to run

    }

    .onEnded { amount in

    //  Code to run

    }

    )

    ```


    The .onChanged modifier measures how far the user moves two fingertips apart or
    closer together. The .onEnded modifier measures the distance between the two fingertips
    when the user ends the magnification gesture by lifting both fingertips off the
    screen.


    To see how to detect a magnification gesture, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “MagnificationGesture.”


    2.  Click the ContentView file in the Navigator pane.


