    \            }\n        }\n    }\n}\n\n@available(iOS 15.0, *)\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```\n\n6.  Click the `_____App` file name where `_____` is the name\
    \ you gave your project. This other file contains Swift code you’ll need to modify\
    \ as well.\n7.  Add the `@available(iOS 15.0, *)` line above the structure like\
    \ this:\n\n```swift\nimport SwiftUI\n\n@available(iOS 15.0, *)\n@main\nstruct\
    \ DismissKeyboardTextEditor_Chapter_7App: App {\n    var body: some Scene {\n\
    \        WindowGroup {\n            ContentView()\n        }\n    }\n}\n```\n\n\
    8.  Click the Run button or choose `Product` ➤ `Run` to run your app in the Simulator.\n\
    9.  Click in the `TextEditor` when your app appears in the Simulator. If the virtual\
    \ keyboard does not appear, press `Command+K` or choose `I/O` ➤ `Keyboard` ➤ `Toggle\
    \ Software Keyboard`.\n10. Type some text and then click the \"Hide Keyboard\"\
    \ `Button` that you created below the `TextEditor`. This sets the `FocusState`\
    \ variable `dismissKeyboard` to `false`, which makes the virtual keyboard go away.\n\
    \nYou must use a `FocusState` variable to make the virtual keyboard go away with\
