    data type such as


    ```

    @State var myColor = Color.red

    ```


    Then you can create a Color Picker by defining a descriptive title followed by
    a link to the State variable that represents a Color like this:


    ```

    ColorPicker("Pick a color", selection: $myColor)

    ```


