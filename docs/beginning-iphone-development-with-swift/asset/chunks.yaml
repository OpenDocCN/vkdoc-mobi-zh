    \    }\n}\n```\n\n5. Click the Live Preview icon in the Canvas pane and drag the\
    \ slider left and right. Notice that the value of this `Slider` ranges in value\
    \ from 0 to 1 as a `Double` value, which displays decimal values.\n\n### Changing\
