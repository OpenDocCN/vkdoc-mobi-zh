- fmt: "### Creating Custom Swipe Actions for a List\n\nIn iOS 15, SwiftUI also allows\
    \ custom left to right and right to left gestures on `List` items. The first step\
    \ is to add a `.swipeActions` modifier to the view that displays items in a `List`\
    \ such as a `Text` view. Then define whether you want a `.leading` (left to right)\
    \ or `.trailing` (right to left) swipe gesture like this:\n\n```\n.swipeActions(edge:\
    \ .trailing)\n```\n\nEach `.swipeActions` modifier needs to define a `Button`\
    \ (including the `Button`’s title and code to run when selected) along with a\
    \ `.tint` modifier to display a specific color when selected such as\n\n```\n\
    .swipeActions(edge: .trailing) {\nButton {\n//  Code to run\n} label: {\n//  Icon\
    \ to display\n}.tint(.red)\n```\n\nTo see how to create a swipe to move items\
    \ in a `List`, follow these steps:\n\n1. Create a new SwiftUI iOS App project\
    \ and give it any name you wish such as “ListCustomSwipes.”\n2. Click the `____App`\
    \ file in the Navigator pane where `____` is the name of your project.\n3. Add\
    \ the following before the structure:\n\n```\n@available(iOS 15.0, *)\n```\n\n\
    4. Click the `ContentView` file in the Navigator pane.\n5. Add the following before\
    \ each structure:\n\n```\n@available(iOS 15.0, *)\n```\n\n6. Add a `@State` variable\
    \ and a `@State` variable array under the `struct ContentView` line like this:\n\
    \n```\nstruct ContentView: View {\n@State var myArray = [\"Cat\", \"Dog\", \"\
    Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\", \"Canary\", \"Tarantula\"\
    , \"Hamster\"]\n@State var message = \"\"\n```\n\n7. Add a `VStack`, `Text` view,\
    \ and a `List` under the `var body: some View` line like this:\n\n```\nvar body:\
    \ some View {\nVStack {\nText(\"\\(message)\")\nList {\n}\n}\n}\n```\n\n8. Add\
    \ a `ForEach` loop inside this `List` to count from 0 to the total number of items\
    \ in the array – 1. Then display the array item in a `Text` view like this:\n\n\
    ```\nvar body: some View {\nVStack {\nText(\"\\(message)\")\nList {\nForEach(0...myArray.count\
    \ - 1, id: \\.self) { index in\nText(myArray[index])\n}\n}\n}\n}\n```\n\n9. Add\
    \ multiple `.swipeActions` modifiers to the `Text` view inside the `ForEach` loop\
    \ like this:\n\n```\nvar body: some View {\nVStack {\nText(\"\\(message)\")\n\
    List {\nForEach(0...myArray.count - 1, id: \\.self) { index in\nText(myArray[index])\n\
    .swipeActions(edge: .trailing) {\nButton {\nmessage = \"Item = \\(myArray[index])\
    \ -- Index = \\(index)\"\n} label: {\nImage(systemName: \"calendar.circle\")\n\
    }.tint(.yellow)\n}\n.swipeActions(edge: .trailing) {\nButton {\nmessage = \"Green\
    \ button selected\"\n} label: {\nImage(systemName: \"book\")\n}.tint(.green)\n\
    }\n.swipeActions(edge: .leading) {\nButton {\nmessage = \"Left to right swipe\"\
    \n} label: {\nImage(systemName: \"graduationcap\")\n}.tint(.purple)\n}\n}\n}\n\
    }\n}\n```\n\nThe entire `ContentView` file should look like this:\n\n![../images/329781_6_En_13_Chapter/329781_6_En_13_Fig8_HTML.jpg](images/329781_6_En_13_Chapter/329781_6_En_13_Fig8_HTML.jpg)\n\
    \nFigure 13-8 – The appearance of a `List` item after a left to right swipe gesture\n\
    \n10. Click the Live Preview icon on the Canvas pane.\n11. Swipe left to right\
    \ to see the `.leading` swipe gesture `Button` appear as shown in Figure [13-8](#329781_6_En_13_Chapter.xhtml#Fig8).\n\
    \n```\nimport SwiftUI\n@available(iOS 15.0, *)\nstruct ContentView: View {\n@State\
    \ var myArray = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\"\
    , \"Lizard\", \"Canary\", \"Tarantula\", \"Hamster\"]\n@State var message = \"\
    \"\nvar body: some View {\nVStack {\nText(\"\\(message)\")\nList {\nForEach(0...myArray.count\
    \ - 1, id: \\.self) { index in\nText(myArray[index])\n.swipeActions(edge: .trailing)\
    \ {\nButton {\nmessage = \"Item = \\(myArray[index]) -- Index = \\(index)\"\n\
    } label: {\nImage(systemName: \"calendar.circle\")\n}.tint(.yellow)\n}\n.swipeActions(edge:\
    \ .trailing) {\nButton {\nmessage = \"Green button selected\"\n} label: {\nImage(systemName:\
    \ \"book\")\n}.tint(.green)\n}\n.swipeActions(edge: .leading) {\nButton {\nmessage\
    \ = \"Left to right swipe\"\n} label: {\nImage(systemName: \"graduationcap\")\n\
    }.tint(.purple)\n}\n}\n}\n}\n}\n}\n@available(iOS 15.0, *)\nstruct ContentView_Previews:\
    \ PreviewProvider {\nstatic var previews: some View {\nContentView()\n}\n}\n```\n\
    \n![../images/329781_6_En_13_Chapter/329781_6_En_13_Fig9_HTML.jpg](images/329781_6_En_13_Chapter/329781_6_En_13_Fig9_HTML.jpg)\n\
    \nFigure 13-9 – The appearance of a `List` item after a right to left swipe gesture\n\
    \n12. Tap the purple graduation cap icon. The message “Left to right swipe” appears\
    \ near the top of the screen.\n13. Swipe right to left to see the two `.trailing`\
    \ swipe gesture `Button`s appear as shown in Figure [13-9](#329781_6_En_13_Chapter.xhtml#Fig9).\n\
    14. Tap the green book icon. The message “Green button selected” appears.\n15.\
    \ Swipe right to left to see the two `.trailing` swipe gesture `Button`s appear\
    \ (see Figure [13-9](#329781_6_En_13_Chapter.xhtml#Fig9)).\n16. Tap the yellow\
    \ calendar circle icon. The name of the item and its index position in the array\
    \ appears at the top of the screen.\n\n> **Note**  \n> If you create a custom\
    \ right to left swipe gesture, it will override the `.onDelete` gesture.\n\n##\
    \ Summary\n\nLists are common ways to display multiple, related items in one place.\
    \ To help organize items in a `List`, you can group related items together.\n\n\
    Besides displaying items in a `List`, you can also detect swipe gestures from\
    \ left to right or right to left. By using the `.onDelete` modifier, you can allow\
    \ users to delete items from a `List`. By using a `NavigationView` and an Edit\
    \ button, you can use the `.onMove` modifier to allow users to move items within\
    \ a `List`.\n\nYou can also define custom swipe gestures to appear on a `List`.\
    \ When you create custom swipe gestures, you can define an icon and a color to\
    \ appear for each `Button`. By using swipe gestures with `List`s, users can modify\
    \ `List` items in different ways.\n\n# 14. Using Forms and Group Boxes\n\nWhen\
    \ you fill out paper forms, you may notice that the paper forms group related\
    \ items together. For example, the form may ask for your name, address, and phone\
    \ number in one area of the form and ask for your gender, racial background, or\
    \ marital status in another area of a form. Paper forms make it easy to enter\
    \ related data in one area.\n\nA SwiftUI Form works in a similar way by grouping\
    \ related views together that offers options and settings that the user can select.\
    \ Forms consist of an optional header, optional footer, and content inside defined\
    \ by views such as `Text`, `Slider`, or `Toggle` views as shown in Figure [14-1](#329781_6_En_14_Chapter.xhtml#Fig1).\n\
    \n![../images/329781_6_En_14_Chapter/329781_6_En_14_Fig1_HTML.jpg](images/329781_6_En_14_Chapter/329781_6_En_14_Fig1_HTML.jpg)\n\
    \nFigure 14-1 – The typical parts of a Form\n\nA Form groups related views together\
    \ like a stack. The difference is that a Form also visually groups views together\
    \ on the user interface. All views within a Form appear together, while any views\
    \ not in the Form appear separated by a gray area as shown in Figure [14-2](#329781_6_En_14_Chapter.xhtml#Fig2).\n\
    \n![../images/329781_6_En_14_Chapter/329781_6_En_14_Fig2_HTML.jpg](images/329781_6_En_14_Chapter/329781_6_En_14_Fig2_HTML.jpg)\n\
    \nFigure 14-2 – Forms group views together on the user interface\n\nSimilar to\
    \ Forms are Group Boxes, which give you a simpler way to visually group related\
    \ views together on the user interface. When you need to group views together,\
    \ you can choose between a Form and a Group Box."
