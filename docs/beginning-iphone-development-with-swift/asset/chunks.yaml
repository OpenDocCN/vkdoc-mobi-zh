- fmt: '# Understanding the Differences Between Global and Local Coordinates


    Once you’ve seen how the `GeometryReader` can shrink or expand to fit the width
    and height of different iOS screen sizes, the next step is to understand how the
    `GeometryReader`’s coordinates work. Coordinates within the `GeometryReader` are
    known as local coordinates.


    On the other hand, global coordinates refer to the entire iOS screen. While global
    coordinates always differ between different iOS device screens, local coordinates
    within a `GeometryReader` always remains consistent.


    To see the differences between local and global coordinates, follow these steps:


    1. Create a new SwiftUI iOS App project and give it any name you wish such as
    “GeometryReaderCoordinates.”

    2. Click the `ContentView` file in the Navigator pane.

    3. Add a `GeometryReader` inside `var body: some View` like this:


    ```

    var body: some View {

    GeometryReader { geometry in

    }.background(Color.yellow)

    .ignoresSafeArea()

    }

    ```


    If you notice in Figures [20-1](#329781_6_En_20_Chapter.xhtml#Fig1) and [20-3](#329781_6_En_20_Chapter.xhtml#Fig3),
    there’s a horizontal white strip at the top of the iOS screen. Since many iPhone
    models display a notch at the top of the screen, this white strip at the top pushes
    all content down to ensure that the notch doesn’t cover up any part of the user
    interface.


    The `.ignoresSafeArea()` modifier simply tells the `GeometryReader` in this example
    to ignore this horizontal strip and expand all the way to the top.


    4. Add a `VStack` inside the `GeometryReader` and add four `Text` views and a
    `Divider` like this:


    ```

    GeometryReader { geometry in

    VStack {

    Text("Local X origin = \(geometry.frame(in: .local).origin.x)")

    Text("Local Y origin = \(geometry.frame(in: .local).origin.y)")

    Divider()

    Text("Global X origin = \(geometry.frame(in: .global).origin.x)")

    Text("Global Y origin = \(geometry.frame(in: .global).origin.y)")

    }

    }.background(Color.yellow)

    .ignoresSafeArea()

    ```


    First, notice that the `Divider()` simply draws a horizontal line in a `VStack`
    (and a vertical line in an `HStack`). Second, the `frame` returns coordinates.
    When using `.local` coordinates, the x and y origin of a `GeometryReader` is always
    (0,0). When using `.global` coordinates, the x and y origin of a `GeometryReader`
    is based on the distance from the upper left corner of the iOS screen.


    The entire `ContentView` file should look like this:


    ```

    import SwiftUI

    struct ContentView: View {

    var body: some View {

    GeometryReader { geometry in

    VStack {

    Text("Local X origin = \(geometry.frame(in: .local).origin.x)")

    Text("Local Y origin = \(geometry.frame(in: .local).origin.y)")

    Divider()

    Text("Global X origin = \(geometry.frame(in: .global).origin.x)")

    Text("Global Y origin = \(geometry.frame(in: .global).origin.y)")

    }

    }.background(Color.yellow)

    .ignoresSafeArea()

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    Notice that because the `GeometryReader` expands all the way to the top of the
    iOS screen, the upper left corner of the `GeometryReader` is at the upper left
    corner of the iOS screen. Therefore, both the local origin and global origin are
    (0,0) as shown in Figure [20-4](#329781_6_En_20_Chapter.xhtml#Fig4).


    ![../images/329781_6_En_20_Chapter/329781_6_En_20_Fig4_HTML.jpg](images/329781_6_En_20_Chapter/329781_6_En_20_Fig4_HTML.jpg)


    Figure 20-4


    When the GeometryReader expands to the top of the screen, the local and global
    origins are identical


    5. Edit the code inside `var body: some View` like this:


    ```

    var body: some View {

    VStack {

    Text("This Text view pushes the GeometryReader down")

    HStack {

    Text("Pushes to the right")

    GeometryReader { geometry in

    VStack {

    Text("Local X origin = \(geometry.frame(in: .local).origin.x)")

    Text("Local Y origin = \(geometry.frame(in: .local).origin.y)")

    Divider()

    Text("Global X origin = \(geometry.frame(in: .global).origin.x)")

    Text("Global Y origin = \(geometry.frame(in: .global).origin.y)")

    }

    }.background(Color.yellow)

    .ignoresSafeArea()

    }

    }

    }

    ```


    The preceding code uses a `VStack` to push the `GeometryReader` down and then
    uses an `HStack` to push the `GeometryReader` to the right. Notice that the `GeometryReader`’s
    local origin is still (0,0), but the global origin is different as measured from
    the upper left corner of the iOS screen as shown in Figure [20-5](#329781_6_En_20_Chapter.xhtml#Fig5).


    ![../images/329781_6_En_20_Chapter/329781_6_En_20_Fig5_HTML.jpg](images/329781_6_En_20_Chapter/329781_6_En_20_Fig5_HTML.jpg)


    Figure 20-5


    Defining a GeometryReader’s global origin


    ## Identifying Minimum, Mid, and Maximum Values of a GeometryReader


    Global coordinates depend on the current iOS screen size. The maximum X and Y
    coordinates on a smaller iOS screens will be different than the maximum X and
    Y coordinates on a much larger iOS screen. As a result, using global coordinates
    to position views on the screen could move a view entirely off the screen or cut
    part of it off.


    On the other hand, using local coordinates within a `GeometryReader` will always
    adapt to different screen sizes automatically. Since a `GeometryReader`’s width
    or height will vary depending on the iOS screen size, it’s important not to use
    fixed values but minimum and maximum values instead.


    The `GeometryReader` lets you access the following defined properties as shown
    in Figure [20-6](#329781_6_En_20_Chapter.xhtml#Fig6):


    ![../images/329781_6_En_20_Chapter/329781_6_En_20_Fig6_HTML.jpg](images/329781_6_En_20_Chapter/329781_6_En_20_Fig6_HTML.jpg)


    Figure 20-6


    The minimum, mid, and maximum X and Y values of a GeometryReader


    - `minX`

    - `minY`

    - `midX`

    - `midY`

    - `maxX`

    - `maxY`


    To see how the minimum, mid, and maximum X and Y values of the `GeometryReader`
    work, follow these steps:


    1. Create a new SwiftUI iOS App project and give it any name you wish such as
    “GeometryReaderValues.”

    2. Click the `ContentView` file in the Navigator pane.

    3. Add a `GeometryReader` inside `var body: some View` like this:


    ```

    var body: some View {

    GeometryReader { geometry in

    }.background(Color.yellow)

    }

    ```


    4. Add a `VStack` inside the `GeometryReader` and add six `Text` views and a `Divider`
    like this:


    ```

    var body: some View {

    GeometryReader { geometry in

    VStack {

    Text("minX = \(geometry.frame(in: .local).minX)")

    Text("midX = \(geometry.frame(in: .local).midX)")

    Text("maxX = \(geometry.frame(in: .local).maxX)")

    Divider()

    Text("minY = \(geometry.frame(in: .local).minY)")

    Text("midY = \(geometry.frame(in: .local).midY)")

    Text("maxY = \(geometry.frame(in: .local).maxY)")

    }

    }.background(Color.yellow)

    }

    ```


    The entire `ContentView` file should look like this:


    ```

    import SwiftUI

    struct ContentView: View {

    var body: some View {

    GeometryReader { geometry in

    VStack {

    Text("minX = \(geometry.frame(in: .local).minX)")

    Text("midX = \(geometry.frame(in: .local).midX)")

    Text("maxX = \(geometry.frame(in: .local).maxX)")

    Divider()

    Text("minY = \(geometry.frame(in: .local).minY)")

    Text("midY = \(geometry.frame(in: .local).midY)")

    Text("maxY = \(geometry.frame(in: .local).maxY)")

    }

    }.background(Color.yellow)

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    Notice that the `maxX` and `maxY` properties are just another way to measure the
    width and height of the `GeometryReader`.


    5. Click `ContentView()` inside the struct `ContentView_Previews: PreviewProvider`.
    The Inspector pane appears on the right side of the Xcode window.

    6. Click the Device popup menu and choose a different size screen such as a larger
    or smaller iPhone or iPad (see Figure [20-2](#329781_6_En_20_Chapter.xhtml#Fig2)).

    7. Choose a different size iPhone or iPad. Notice that the `GeometryReader` expands
    or shrinks to fit within the boundaries of the new iOS screen size and displays
    a different `maxX` and `maxY` value.'
