- fmt: "# Using a Disclosure Group\n\nA `DisclosureGroup` is designed to hide one\
    \ or more views (`Text`, `Slider`, `Toggle`, etc.) until the user taps on the\
    \ `DisclosureGroup` name to expand it. When expanded, a `DisclosureGroup` reveals\
    \ one or more views on the user interface.\n\n**Note:** Like a stack, a `DisclosureGroup`\
    \ can hold a maximum of ten views. However, one or more of those views can be\
    \ stacks that can hold multiple views. In addition, you can nest `DisclosureGroup`s\
    \ inside of other `DisclosureGroup`s.\n\nTo create a `DisclosureGroup`, you first\
    \ need to create descriptive text that represents a link on the user interface.\
    \ This text appears with a ➤ symbol on the far right to show users that this link\
    \ contains hidden items. Second, you need to create a list of views (up to ten)\
    \ that will appear when the user selects the `DisclosureGroup` link.\n\nTo see\
    \ how to create a `DisclosureGroup`, follow these steps:\n\n1.  Create a new SwiftUI\
    \ iOS App project and give it any name you wish such as “`DisclosureGroup`.”\n\
    2.  Click the `ContentView` file in the Navigator pane.\n3.  Add three `State`\
    \ variables under the `struct ContentView: View` line like this:\n\n    ```\n\
    \    struct ContentView: View {\n    @State var sliderValue = 0.0\n    @State\
    \ var message = \"\"\n    @State var flag = true\n    ```\n\n4.  Add a `DisclosureGroup`\
    \ inside the `var body: some View` like this:\n\n    ```\n    var body: some View\
    \ {\n    DisclosureGroup(\"Expand Me\") {\n    }\n    }\n    ```\n\n5.  Add the\
    \ following inside the `DisclosureGroup`:\n\n    ```\n    var body: some View\
    \ {\n    DisclosureGroup(\"Expand Me\") {\n    Text(\"You typed = \\(message)\"\
    )\n    TextField(\"Type here\", text: $message)\n    .padding()\n    Text(flag\
    \ ? \"Toggle = true\" : \"Toggle = false\")\n    Toggle(isOn: $flag) {\n    Text(\"\
    Toggle\")\n    }.padding()\n    Text(\"The slider value = \\(sliderValue)\")\n\
    \    Slider(value: $sliderValue, in: 0...15)\n    .padding()\n    }\n    }\n \
    \   ```\n\nThe entire `ContentView` file should look like this:\n\n![../images/329781_6_En_15_Chapter/329781_6_En_15_Fig3_HTML.jpg](images/329781_6_En_15_Chapter/329781_6_En_15_Fig3_HTML.jpg)\n\
    \n**Figure 15-3** The expanded `DisclosureGroup`\n\n6.  Click the Live Preview\
    \ icon in the Canvas pane.\n7.  Click the “Expand Me” `DisclosureGroup` link to\
    \ reveal all the views hidden inside as shown in Figure 15-3.\n\n    ```\n   \
    \ import SwiftUI\n    struct ContentView: View {\n    @State var sliderValue =\
    \ 0.0\n    @State var message = \"\"\n    @State var flag = true\n    var body:\
    \ some View {\n    DisclosureGroup(\"Expand Me\") {\n    Text(\"You typed = \\\
    (message)\")\n    TextField(\"Type here\", text: $message)\n    .padding()\n \
    \   Text(flag ? \"Toggle = true\" : \"Toggle = false\")\n    Toggle(isOn: $flag)\
    \ {\n    Text(\"Toggle\")\n    }.padding()\n    Text(\"The slider value = \\(sliderValue)\"\
    )\n    Slider(value: $sliderValue, in: 0...15)\n    .padding()\n    }\n    }\n\
    \    }\n    struct ContentView_Previews: PreviewProvider {\n    static var previews:\
    \ some View {\n    ContentView()\n    }\n    }\n    ```\n\n8.  Click in the Text\
    \ Field and type some text. Notice that whatever you type appears in the `Text`\
    \ view that displayed “You typed =”.\n9.  Click the Toggle. Notice that each time\
    \ you click the Toggle, the `Text` view above the Toggle displays either “Toggle\
    \ = true” or “Toggle = false.”\n10. Drag the Slider left and right. Notice that\
    \ as you drag the slider, its numeric value appears in the `Text` view above the\
    \ slider that displays “The slider value =”.\n11. Click the `DisclosureGroup`\
    \ link again to hide all the views. Each time you click the `DisclosureGroup`\
    \ link, it alternates between showing all the views inside the `DisclosureGroup`\
    \ and hiding them.\n\n## Using a Scroll View\n\nWhen you arrange multiple views\
    \ within a `VStack`, those views remain fixed on the user interface. If you display\
    \ more views than the user interface can show, part of those views will be cut\
    \ off or hidden out of sight. To fix this problem, SwiftUI offers a special container\
    \ called a Scroll View.\n\nLike a stack, a Scroll View can hold multiple views.\
    \ Unlike a stack, a Scroll View lets users scroll vertically or horizontally to\
    \ view the entire contents of the Scroll View. Scroll Views can work anywhere\
    \ you might use a stack, including within a `DisclosureGroup`.\n\nThe simplest\
    \ way to create a Scroll View is to define a `ScrollView` like this:\n\n```\n\
    ScrollView {\n//  Multiple views here\n}\n```\n\nThis lets you scroll vertically\
    \ with a scroll indicator on the right side. The scroll indicator lets you see\
    \ how close or how far away you may be to the beginning or end of the list of\
    \ items as shown in Figure 15-4.\n\n![../images/329781_6_En_15_Chapter/329781_6_En_15_Fig4_HTML.jpg](images/329781_6_En_15_Chapter/329781_6_En_15_Fig4_HTML.jpg)\n\
    \n**Figure 15-4** The scroll indicator appears on the right of a vertically scrolling\
    \ Scroll View\n\nAnother way to create a Scroll View is to define a direction\
    \ to scroll (`Axis.Set.horizontal` or `Axis.Set.vertical`) along with whether\
    \ to show the scroll indicator or not (`showsIndicators:` parameter) like this:\n\
    \n```\nScrollView(Axis.Set.horizontal, showsIndicators: false, content: {\n}\n\
    ```\n\nTo see how the Scroll View works, follow these steps:\n\n1.  Create a new\
    \ SwiftUI iOS App project and give it any name you wish such as “`ScrollView`.”\n\
    2.  Click the `ContentView` file in the Navigator pane.\n3.  Add a `ScrollView`\
    \ under the `var body: some View` line like this:\n\n    ```\n    var body: some\
    \ View {\n    ScrollView(Axis.Set.vertical, showsIndicators: true, content: {\n\
    \    })\n    ```\n\n    To shorten the `ScrollView` code, you could just do this:\n\
    \n    ```\n    var body: some View {\n    ScrollView {\n    }\n    ```\n\n4. \
    \ Add a `ForEach` loop inside the `ScrollView` like this:\n\n    ```\n    var\
    \ body: some View {\n    ScrollView(Axis.Set.vertical, showsIndicators: true,\
    \ content: {\n    ForEach(0..<50) {\n    Text(\"Item #\\($0)     \")\n    }\n\
    \    })\n    ```\n\n5.  Click the Live Preview icon on the Canvas pane.\n6.  Scroll\
    \ up and down on the list of “Item #” items displayed on the user interface. Notice\
    \ that as you scroll up or down, you can see the slider indicator on the right\
    \ side."
  raw: '## Using a Disclosure Group


    A Disclosure Group is designed to hide one or more views (Text, Slider, Toggle,
    etc.) until the user taps on the Disclosure Group name to expand it. When expanded,
    a Disclosure Group reveals one or more views on the user interface.


    Note


    Like a stack, a Disclosure Group can hold a maximum of ten views. However, one
    or more of those views can be stacks that can hold multiple views. In addition,
    you can nest Disclosure Groups inside of other Disclosure Groups.


    To create a Disclosure Group, you first need to create descriptive text that represents
    a link on the user interface. This text appears with a ➤ symbol on the far right
    to show users that this link contains hidden items. Second, you need to create
    a list of views (up to ten) that will appear when the user selects the Disclosure
    Group link.


    To see how to create a Disclosure Group, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “DisclosureGroup.”


    2.  Click the ContentView file in the Navigator pane.


    3.  Add three State variables under the struct ContentView: View line like this:


    1.  Add a DisclosureGroup inside the var body: some View like this:


