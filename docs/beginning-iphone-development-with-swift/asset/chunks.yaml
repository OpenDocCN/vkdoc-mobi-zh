  raw: '### Dismissing the Virtual Keyboard


    When the user wants to type in a Text Field, the virtual keyboard appears, and
    the user interface automatically slides up. However, once you’re done typing,
    you need to make the virtual keyboard go away again.


    One technique is to use the .submitLabel modifier that defines a specific key
    to appear on the virtual keyboard. By tapping this key defined by the .submitLabel
    modifier, users can make the virtual keyboard go away as shown in Figure [7-5](#329781_6_En_7_Chapter.xhtml#Fig5).
    The .submitLabel modifier looks like this:


    ![../images/329781_6_En_7_Chapter/329781_6_En_7_Fig5_HTML.jpg](images/329781_6_En_7_Chapter/329781_6_En_7_Fig5_HTML.jpg)


    Figure 7-5


    The .submitLabel(.done) modifier displays a Done button on the virtual keyboard


    ```

    .submitLabel(.done)

    ```


    If you don’t specify a .submitLabel modifier, SwiftUI defaults to displaying a
    Return button in the bottom right corner of the virtual keyboard. No matter what
    label appears on the bottom right corner key, tapping it will make the virtual
    keyboard go away.


    The different types of buttons the .submitLabel modifier can place on the virtual
    keyboard include


    *   .continue – Adds a Continue button


    *   .done – Adds a Done button


    *   .go – Adds a Go button


    *   .join – Adds a Join button


    *   .next – Adds a Next button


    *   .return – Adds a Return button


    *   .route – Adds a Route button


    *   .search – Adds a Search button


    *   .send – Adds a Send button


    Note


    The .submitLabel modifier only works with iOS 15 and greater.


    To see how to hide the virtual keyboard by using the virtual keyboard button that
    you can define, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “DismissKeyboard.”


    2.  Click the ContentView file in the Navigator pane.


    3.  Add the following line above the two structures in the ContentView file:


    ```

    @available(iOS 15.0, *)

    ```


    This checks to make sure the project only runs on iOS 15 or greater.


    1.  Add a State variable underneath the struct ContentView: View line like this:


    1.  Add a TextField inside the body like this:


    ```

    @available(iOS 15.0, *)

    struct ContentView: View {

    @State var message = ""

    ```


    ```

    var body: some View {

    TextField("Type here", text: $message)

    .submitLabel(.done)

    .padding()

    }

    ```


    The entire ContentView file should look like this:


    ```

    import SwiftUI

    @available(iOS 15.0, *)

    struct ContentView: View {

    @State var message = ""

    var body: some View {

    TextField("Type here", text: $message)

    .submitLabel(.done)

    .padding()

    }

    }

    @available(iOS 15.0, *)

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    Notice the two @available(iOS 15.0, *) lines above each structure.


    1.  Click the _____App file name where _____ is the name you gave your project.
    This other file contains Swift code you’ll need to modify as well.


    2.  Add the @available(iOS 15.0, *) line above the structure like this:


    ```

    import SwiftUI

    @available(iOS 15.0, *)

    @main

    struct DismissKeyboard_Chapter_7App: App {

    var body: some Scene {

    WindowGroup {

    ContentView()

    }

    }

    }

    ```


    In the preceding example, the project name is DismissKeyboard Chapter [7](#329781_6_En_7_Chapter.xhtml),
    so Xcode creates a file called DismissKeyboard_Chapter_7App in the Navigator pane.


    1.  Click the Run button or choose Product ➤ Run to run your app in the Simulator.


    2.  Click in the Text Field when your app appears in the Simulator. If the virtual
    keyboard does not appear, press Command+K or choose I/O ➤ Keyboard ➤ Toggle Software
    Keyboard.


    3.  Click the Done button in the bottom right corner of the virtual keyboard to
    make the virtual keyboard disappear.


    ### Using a Text Editor


    Where a Text Field lets the user type in a word or short sentence, a Text Editor
    lets the user type in multiple lines of text, much like a word processor. When
    you place a Text Editor on a user interface, it expands to fill all available
    space. That’s why it’s best to use the .frame modifier to define a specific size
    for the Text Editor.


    With a Text Field, tapping the button in the bottom right corner of the virtual
    keyboard makes it go away. Since a Text Editor can hold multiple lines of text,
    the button in the bottom right corner of the virtual keyboard simply moves the
    cursor to the next line and always displays the “return” label.


    So if you want to hide a virtual keyboard when using a Text Editor, you need to
    do the following:


    *   Create a Focus State variable that represents a Boolean value.


    *   Add the .focused modifier to the Text Editor and use the Focus State variable.


    *   Create an additional control, such as a Button, that sets the Focus State
    variable to false.


    Note


    This method of using a Focus State variable with a .focused modifier and a separate
    control works with Text Fields as well.


    First, you need to create a FocusState variable like this:


    ```

    @FocusState var dismissKeyboard: Bool

    ```


    Once you’ve defined a FocusState variable, you need to use the .focused modifier
    on a Text Editor (or Text Field) to link to the FocusState variable like this:


    ```

    TextEditor(text: $message)

    .focused($dismissKeyboard)

    ```


    Then you can set the value of the FocusState variable to false through a separate
    control to make the virtual keyboard disappear like this:


    ```

    Button("Hide Keyboard") {

    dismissKeyboard = false

    }

    ```


    To see how Focus State variables work, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “DismissKeyboardTextEditor.”


    2.  Click the ContentView file in the Navigator pane.


    3.  Add the following line above the two structures in the ContentView file:


    1.  Create a State variable to hold the contents of a Text Editor, and create
    a Focus State variable to make the virtual keyboard disappear as follows:


    ```

    @available(iOS 15.0, *)

    ```


    1.  Add a Button and a Text Editor inside of a VStack. To keep the Text Editor
    from expanding, make sure you add a .frame modifier to the Text Editor. The entire
    code inside the ContentView file should look like this:


    ```

    @available(iOS 15.0, *)

    struct ContentView: View {

    @State var message = ""

    @FocusState var dismissKeyboard: Bool

    ```


    1.  Click the _____App file name where _____ is the name you gave your project.
    This other file contains Swift code you’ll need to modify as well.


    2.  Add the @available(iOS 15.0, *) line above the structure like this:


    ```

    import SwiftUI

    @available(iOS 15.0, *)

    struct ContentView: View {

    @State var message = ""

    @FocusState var dismissKeyboard: Bool

    var body: some View {

    VStack {

    TextEditor(text: $message)

    .focused($dismissKeyboard)

    .frame(width: 250, height: 150)

    .padding()

    Button("Hide Keyboard") {

    dismissKeyboard = false

    }

    }

    }

    }

    @available(iOS 15.0, *)

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    1.  Click the Run button or choose Product ➤ Run to run your app in the Simulator.


    2.  Click in the Text Editor when your app appears in the Simulator. If the virtual
    keyboard does not appear, press Command+K or choose I/O ➤ Keyboard ➤ Toggle Software
    Keyboard.


    3.  Type some text and then click the “Hide Keyboard” Button that you created
    below the Text Editor. This sets the Focus State variable dismissKeyboard to false,
    which makes the virtual keyboard go away.


    ```

    import SwiftUI

    @available(iOS 15.0, *)

    @main

    struct DismissKeyboardTextEditor_Chapter_7App: App {

    var body: some Scene {

    WindowGroup {

    ContentView()

    }

    }

    }

    ```


    You must use a Focus State variable to make the virtual keyboard go away with
    a Text Editor.'
  trans: "\n### 隐藏虚拟键盘\n\n当用户在 `TextField` 中输入时，虚拟键盘会弹出，用户界面会自动向上滑动。然而，当输入完成后，你需要让虚拟键盘再次消失。\n\
    \n一种技术是使用 `.submitLabel` 修饰符，它定义了一个显示在虚拟键盘上的特定按键。通过点击这个由 `.submitLabel` 修饰符定义的按键，用户可以让虚拟键盘消失，如图\
    \ 7-5 所示。`.submitLabel` 修饰符看起来像这样：\n\n![../images/329781_6_En_7_Chapter/329781_6_En_7_Fig5_HTML.jpg](img/329781_6_En_7_Fig5_HTML.jpg)\n\
    \n图 7-5\n\n`.submitLabel(.done)` 修饰符会在虚拟键盘上显示一个“完成”按钮。\n\n```\n.submitLabel(.done)\n\
    ```\n\n如果你没有指定 `.submitLabel` 修饰符，SwiftUI 默认会在虚拟键盘的右下角显示一个“返回”按钮。无论右下角按键上显示什么标签，点击它都会让虚拟键盘消失。\n\
    \n`.submitLabel` 修饰符可以放置在虚拟键盘上的不同按钮类型包括：\n\n- `.continue` – 添加一个“继续”按钮\n- `.done`\
    \ – 添加一个“完成”按钮\n- `.go` – 添加一个“前往”按钮\n- `.join` – 添加一个“加入”按钮\n- `.next` – 添加一个“下一个”按钮\n\
    - `.return` – 添加一个“返回”按钮\n- `.route` – 添加一个“路线”按钮\n- `.search` – 添加一个“搜索”按钮\n\
    - `.send` – 添加一个“发送”按钮\n\n**注意**\n\n`.submitLabel` 修饰符仅适用于 iOS 15 及更高版本。\n\n要了解如何通过你可以定义的虚拟键盘按钮来隐藏虚拟键盘，请按照以下步骤操作：\n\
    \n1.  创建一个新的 SwiftUI iOS App 项目，并为其命名，例如“DismissKeyboard”。\n2.  在导航器窗格中点击 `ContentView`\
    \ 文件。\n3.  在 `ContentView` 文件中两个结构体的上方添加以下代码行：\n\n```\n@available(iOS 15.0, *)\n\
    ```\n\n这会检查确保项目仅在 iOS 15 或更高版本上运行。\n\n4.  在 `struct ContentView: View` 行下方添加一个\
    \ `@State` 变量，如下所示：\n\n```\n@State var message = \"\"\n```\n\n5.  在 `body` 内部添加一个\
    \ `TextField`，如下所示：\n\n```swift\nvar body: some View {\n    TextField(\"在此输入\"\
    , text: $message)\n        .submitLabel(.done)\n        .padding()\n}\n```\n\n\
    整个 `ContentView` 文件应如下所示：\n\n```swift\nimport SwiftUI\n\n@available(iOS 15.0,\
    \ *)\nstruct ContentView: View {\n    @State var message = \"\"\n    \n    var\
    \ body: some View {\n        TextField(\"在此输入\", text: $message)\n           \
    \ .submitLabel(.done)\n            .padding()\n    }\n}\n\n@available(iOS 15.0,\
    \ *)\nstruct ContentView_Previews: PreviewProvider {\n    static var previews:\
    \ some View {\n        ContentView()\n    }\n}\n```\n\n注意每个结构体上方的两行 `@available(iOS\
    \ 15.0, *)`。\n\n6.  点击 `_____App` 文件名，其中 `_____` 是你为项目指定的名称。这个其他文件也包含你需要修改的 Swift\
    \ 代码。\n7.  在结构体上方添加 `@available(iOS 15.0, *)` 行，如下所示：\n\n```swift\nimport SwiftUI\n\
    \n@available(iOS 15.0, *)\n@main\nstruct DismissKeyboard_Chapter_7App: App {\n\
    \    var body: some Scene {\n        WindowGroup {\n            ContentView()\n\
    \        }\n    }\n}\n```\n\n在上面的示例中，项目名称为“DismissKeyboard Chapter 7”，因此 Xcode\
    \ 会在导航器窗格中创建一个名为 `DismissKeyboard_Chapter_7App` 的文件。\n\n8.  点击“运行”按钮或选择 `Product`\
    \ ➤ `Run` 在模拟器中运行你的应用。\n9.  当你的应用出现在模拟器中时，点击 `TextField`。如果虚拟键盘没有出现，请按 `Command+K`\
    \ 或选择 `I/O` ➤ `Keyboard` ➤ `Toggle Software Keyboard`。\n10. 点击虚拟键盘右下角的“完成”按钮，使虚拟键盘消失。\n\
    \n### 使用文本编辑器\n\n`TextField` 允许用户输入一个单词或短句，而 `TextEditor` 则允许用户输入多行文本，很像一个文字处理器。当你将\
    \ `TextEditor` 放置在用户界面上时，它会扩展以填充所有可用空间。这就是为什么最好使用 `.frame` 修饰符为 `TextEditor` 定义特定大小。\n\
    \n对于 `TextField`，点击虚拟键盘右下角的按钮即可使其消失。由于 `TextEditor` 可以容纳多行文本，虚拟键盘右下角的按钮只是将光标移到下一行，并且始终显示“return”标签。\n\
    \n因此，如果你想在使用 `TextEditor` 时隐藏虚拟键盘，需要执行以下操作：\n\n- 创建一个代表 `Bool` 值的 `FocusState`\
    \ 变量。\n- 将 `.focused` 修饰符添加到 `TextEditor`，并使用 `FocusState` 变量。\n- 创建一个额外的控件，例如\
    \ `Button`，将 `FocusState` 变量设置为 `false`。\n\n**注意**\n\n这种将 `FocusState` 变量与 `.focused`\
    \ 修饰符和单独控件一起使用的方法也适用于 `TextField`。\n\n首先，你需要创建一个 `FocusState` 变量，如下所示：\n\n```swift\n\
    @FocusState var dismissKeyboard: Bool\n```\n\n一旦定义了 `FocusState` 变量，你需要在 `TextEditor`（或\
    \ `TextField`）上使用 `.focused` 修饰符来链接到 `FocusState` 变量，如下所示：\n\n```swift\nTextEditor(text:\
    \ $message)\n    .focused($dismissKeyboard)\n```\n\n然后，你可以通过一个单独的控件将 `FocusState`\
    \ 变量的值设置为 `false`，以使虚拟键盘消失，如下所示：\n\n```swift\nButton(\"隐藏键盘\") {\n    dismissKeyboard\
    \ = false\n}\n```\n\n要了解 `FocusState` 变量如何工作，请按照以下步骤操作：\n\n1.  创建一个新的 SwiftUI\
    \ iOS App 项目，并为其命名，例如“DismissKeyboardTextEditor”。\n2.  在导航器窗格中点击 `ContentView`\
    \ 文件。\n3.  在 `ContentView` 文件中两个结构体的上方添加以下代码行：\n\n```\n@available(iOS 15.0, *)\n\
    ```\n\n4.  创建一个 `@State` 变量来保存 `TextEditor` 的内容，并创建一个 `@FocusState` 变量来使虚拟键盘消失，如下所示：\n\
    \n```swift\n@available(iOS 15.0, *)\nstruct ContentView: View {\n    @State var\
    \ message = \"\"\n    @FocusState var dismissKeyboard: Bool\n```\n\n5.  在 `VStack`\
    \ 内部添加一个 `Button` 和一个 `TextEditor`。为了防止 `TextEditor` 扩展，请确保为 `TextEditor` 添加一个\
    \ `.frame` 修饰符。`ContentView` 文件中的完整代码如下所示：\n\n```swift\nimport SwiftUI\n\n@available(iOS\
    \ 15.0, *)\nstruct ContentView: View {\n    @State var message = \"\"\n    @FocusState\
    \ var dismissKeyboard: Bool\n    \n    var body: some View {\n        VStack {\n\
    \            TextEditor(text: $message)\n                .focused($dismissKeyboard)\n\
    \                .frame(width: 250, height: 150)\n                .padding()\n\
    \            Button(\"隐藏键盘\") {\n                dismissKeyboard = false\n   \
    \         }\n        }\n    }\n}\n\n@available(iOS 15.0, *)\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```\n\n6.  点击 `_____App` 文件名，其中 `_____` 是你为项目指定的名称。这个其他文件也包含你需要修改的\
    \ Swift 代码。\n7.  在结构体上方添加 `@available(iOS 15.0, *)` 行，如下所示：\n\n```swift\nimport\
    \ SwiftUI\n\n@available(iOS 15.0, *)\n@main\nstruct DismissKeyboardTextEditor_Chapter_7App:\
    \ App {\n    var body: some Scene {\n        WindowGroup {\n            ContentView()\n\
    \        }\n    }\n}\n```\n\n8.  点击“运行”按钮或选择 `Product` ➤ `Run` 在模拟器中运行你的应用。\n\
    9.  当你的应用出现在模拟器中时，点击 `TextEditor`。如果虚拟键盘没有出现，请按 `Command+K` 或选择 `I/O` ➤ `Keyboard`\
    \ ➤ `Toggle Software Keyboard`。\n10. 输入一些文本，然后点击你在 `TextEditor` 下方创建的“隐藏键盘” `Button`。这会将\
    \ `FocusState` 变量 `dismissKeyboard` 设置为 `false`，从而使虚拟键盘消失。\n\n你必须使用 `FocusState`\
    \ 变量才能让 `TextEditor` 的虚拟键盘消失。\n"
- fmt: "# Summary\n\nOne of the most common ways a user can input data into an app\
    \ is by typing in text. A `Text` Field can accept short amount of text such as\
    \ a name or sentence. If the user needs to type in sensitive information that\
    \ shouldn’t be displayed on the screen, you can use a `Secure` Field, which masks\
    \ anything typed. For displaying multiple lines of text, you can use a `Text`\
    \ Editor, which acts like a miniature word processor.\n\nTo make typing text easier,\
    \ use the `.contentType` modifier to define what type of information a `Text`\
    \ Field can expect such as a name or email address. Then use the `.keyboardType`\
    \ modifier to define a specific virtual keyboard optimized for inputting in certain\
    \ type of information such as telephone numbers or names.\n\nTo make a virtual\
    \ keyboard go away when the user no longer needs it, `Text` Fields and `Secure`\
    \ Fields can rely on the bottom right corner button to dismiss the virtual keyboard.\
    \ By using the `.submitLabel` modifier, you can define common types of titles\
    \ for this bottom right corner virtual keyboard button such as Done, Send, or\
    \ Next.\n\nWhen creating a `Text` Editor, it will expand to fill all available\
    \ space, so you may want to use the `.frame` modifier to define a specific width\
    \ and height for the `Text` Editor. To hide a virtual keyboard when using a `Text`\
    \ Editor, use a Focus State variable with the `.focused` modifier. Then create\
    \ a separate control, such as a `Button`, to set the Focus State variable to `false`.\
    \ This will make the virtual keyboard go away.\n\nText is the most common way\
    \ to input data, so make it easy for users to type data into a `Text` Field, `Secure`\
    \ field, or `Text` Editor.\n\n# 8. Limiting Choices with Pickers\n\n`Text` Fields\
    \ are great for letting the user enter any type of information such as names or\
    \ short answers to questions. The problem is that if the user has the freedom\
    \ to enter anything, they could accidentally (or on purpose) enter invalid data.\n\
    \nFor example, if a `Text` Field asks for an address, you want the user to have\
    \ the freedom to type anything. However, if a `Text` Field asks for a state, language,\
    \ or gender, you don’t want the user to type “dog”, “1258dke3”, or “I am looking\
    \ for shoes” because none of this would be valid input and would likely crash\
    \ the program.\n\nOne solution is to let the user enter any data and then write\
    \ Swift code to verify that the input is valid. Unfortunately, this would likely\
    \ take a lot of time and still not be accurate. A far better solution is when\
    \ there are only a handful of acceptable options, it’s best to restrict the user\
    \ to selecting from a limited range of options.\n\n`Picker`s display several options\
    \ and give the user a chance to click to select one option. Since all options\
    \ are valid, `Picker`s ensure that users can only enter valid data. An ordinary\
    \ `Picker` is fine for letting a user select from a range of text options. For\
    \ selecting colors or dates, SwiftUI offers special `Color` Picker and `Date`\
    \ Pickers as well.\n\n`Date` Pickers even let you define a valid date range. The\
    \ whole purpose of `Picker`s is to make sure the user can only input valid data\
    \ into a program at any given time.\n\n## Using a Picker\n\nA `Picker` displays\
    \ a list of options defined by multiple `Text` views. Although a `Picker` uses\
    \ text strings to display available options, whatever option the user chooses\
    \ can actually represent any value such as a string, a decimal number, an integer,\
    \ or a value defined by an enumeration.\n\nTo create a `Picker`, use multiple\
    \ `Text` views to display the options and attach a `.tag` modifier to each option.\
    \ The `.tag` modifier defines the actual value the user chose such as\n\n```\n\
    Picker(selection: $choice, label: Text(\"Picker\")) {\n    Text(\"1\").tag(\"\
    one\")\n    Text(\"2\").tag(\"two\")\n    Text(\"3\").tag(\"three\")\n    Text(\"\
    4\").tag(\"four\")\n    Text(\"5\").tag(\"five\")\n}\n```\n\nIn this example,\
    \ the available options are numbers, but when the user selects a number, the actual\
    \ choice is stored as a string such as “three” or “five” as shown in Figure [8-1](#329781_6_En_8_Chapter.xhtml#Fig1).\n\
    \n![../images/329781_6_En_8_Chapter/329781_6_En_8_Fig1_HTML.jpg](images/329781_6_En_8_Chapter/329781_6_En_8_Fig1_HTML.jpg)\n\
    \nFigure 8-1\n\nA `Picker` uses `Text` views to display choices on the user interface\n\
    \nThe `.tag` modifier on a `Text` view can contain any data type, but all `.tag`\
    \ modifiers inside the same `Picker` must be of the same data type that matches\
    \ the State variable that it’s linked to. The following Swift code defines a `Picker`\
    \ where multiple `Text` views display words such as “Cat” or “Bird”, but the `.tag`\
    \ modifiers store integers such as 0 or 2:\n\n```\nPicker(selection: $choice,\
    \ label: Text(\"Picker\")) {\n    Text(\"Bird\").tag(1)\n    Text(\"Cat\").tag(2)\n\
    \    Text(\"Lizard\").tag(3)\n    Text(\"Dog\").tag(4)\n    Text(\"Hamster\").tag(5)\n\
    }\n```\n\nBecause the `.tag` modifier contains integers, the `choice` State variable\
    \ now needs to store `Int` data types such as\n\n```\n@State private var choice\
    \ = 0\n```\n\nTo see how a `Picker` works, follow these steps:\n\n1. Create a\
    \ new SwiftUI iOS App project and give it any name you wish such as “Picker”.\n\
    2. Click the `ContentView` file in the Navigator pane.\n3. Add the following State\
    \ variable under the `struct ContentView: View` line:\n\n```\nstruct ContentView:\
    \ View {\n    @State private var choice = 0\n```\n\nThis creates a State variable\
    \ that’s initially set to 0, which is an integer so the `choice` State variable\
    \ is defined to hold `Int` data types.\n\n4. Create a `VStack` and create a `Picker`\
    \ and a `Text` view inside the `var body: some View` line:\n\n```\nvar body: some\
    \ View {\n    VStack {\n        Picker(selection: $choice, label: Text(\"Picker\"\
    )) {\n            Text(\"Bird\").tag(1)\n            Text(\"Cat\").tag(2)\n  \
    \          Text(\"Lizard\").tag(3)\n            Text(\"Dog\").tag(4)\n       \
    \     Text(\"Hamster\").tag(5)\n        }\n        Text(\"You chose \\(choice)\"\
    )\n    }\n}\n```\n\nThe entire code in the `ContentView` file should look like\
    \ this:\n\n```\nimport SwiftUI\n\nstruct ContentView: View {\n    @State private\
    \ var choice = 0\n    var body: some View {\n        VStack {\n            Picker(selection:\
    \ $choice, label: Text(\"Picker\")) {\n                Text(\"Bird\").tag(1)\n\
    \                Text(\"Cat\").tag(2)\n                Text(\"Lizard\").tag(3)\n\
    \                Text(\"Dog\").tag(4)\n                Text(\"Hamster\").tag(5)\n\
    \            }\n            Text(\"You chose \\(choice)\")\n        }\n    }\n\
    }\n\nstruct ContentView_Previews: PreviewProvider {\n    static var previews:\
    \ some View {\n        ContentView()\n    }\n}\n```\n\n5. Click the Live Preview\
    \ icon in the Canvas pane.\n6. Select different options in the `Picker`. Notice\
    \ that each time you select a different option, the `Text` view displays “You\
    \ chose __” where __ is the `.tag` value attached to the `Text` view that the\
    \ user chose.\n7. Change the State variable as follows to hold `Double` data types:\n\
    \n```\n@State private var choice = 0.0\n```\n\nBecause this `choice` State variable\
    \ has an initial value of 0.0, which is a decimal number, Swift infers that the\
    \ `choice` variable can now only hold `Double` data types.\n\n8. Change the `.tag`\
    \ modifiers in the `Picker` as follows:\n\n```\nPicker(selection: $choice, label:\
    \ Text(\"Picker\")) {\n    Text(\"Bird\").tag(1.7)\n    Text(\"Cat\").tag(2.06)\n\
    \    Text(\"Lizard\").tag(3.41)\n    Text(\"Dog\").tag(4.13)\n    Text(\"Hamster\"\
    ).tag(5.28)\n}\n```\n\nBecause the `choice` State variable has been redefined\
    \ to hold `Double` data types, the `.tag` modifier values must now all represent\
    \ `Double` data types as well."
  raw: '## Summary


    One of the most common ways a user can input data into an app is by typing in
    text. A Text Field can accept short amount of text such as a name or sentence.
    If the user needs to type in sensitive information that shouldn’t be displayed
    on the screen, you can use a Secure Field, which masks anything typed. For displaying
    multiple lines of text, you can use a Text Editor, which acts like a miniature
    word processor.


    To make typing text easier, use the .contentType modifier to define what type
    of information a Text Field can expect such as a name or email address. Then use
    the .keyboardType modifier to define a specific virtual keyboard optimized for
    inputting in certain type of information such as telephone numbers or names.


    To make a virtual keyboard go away when the user no longer needs it, Text Fields
    and Secure Fields can rely on the bottom right corner button to dismiss the virtual
    keyboard. By using the .submitLabel modifier, you can define common types of titles
    for this bottom right corner virtual keyboard button such as Done, Send, or Next.


    When creating a Text Editor, it will expand to fill all available space, so you
    may want to use the .frame modifier to define a specific width and height for
    the Text Editor. To hide a virtual keyboard when using a Text Editor, use a Focus
    State variable with the .focused modifier. Then create a separate control, such
    as a Button, to set the Focus State variable to false. This will make the virtual
    keyboard go away.


    Text is the most common way to input data, so make it easy for users to type data
    into a Text Field, Secure field, or Text Editor.


    # 8. Limiting Choices with Pickers


    Text Fields are great for letting the user enter any type of information such
    as names or short answers to questions. The problem is that if the user has the
    freedom to enter anything, they could accidentally (or on purpose) enter invalid
    data.


    For example, if a Text Field asks for an address, you want the user to have the
    freedom to type anything. However, if a Text Field asks for a state, language,
    or gender, you don’t want the user to type “dog,” “1258dke3,” or “I am looking
    for shoes” because none of this would be valid input and would likely crash the
    program.


    One solution is to let the user enter any data and then write Swift code to verify
    that the input is valid. Unfortunately, this would likely take a lot of time and
    still not be accurate. A far better solution is when there are only a handful
    of acceptable options, it’s best to restrict the user to selecting from a limited
    range of options.


    Pickers display several options and give the user a chance to click to select
    one option. Since all options are valid, Pickers ensure that users can only enter
    valid data. An ordinary Picker is fine for letting a user select from a range
    of text options. For selecting colors or dates, SwiftUI offers special Color Picker
    and Date Pickers as well.


    Date Pickers even let you define a valid date range. The whole purpose of Pickers
    is to make sure the user can only input valid data into a program at any given
    time.


    ## Using a Picker


    A Picker displays a list of options defined by multiple Text views. Although a
    Picker uses text strings to display available options, whatever option the user
    chooses can actually represent any value such as a string, a decimal number, an
    integer, or a value defined by an enumeration.


    To create a Picker, use multiple Text views to display the options and attach
    a .tag modifier to each option. The .tag modifier defines the actual value the
    user chose such as


    ```

    Picker(selection: $choice, label: Text("Picker"){

    Text("1").tag("one")

    Text("2").tag("two")

    Text("3").tag("three")

    Text("4").tag("four")

    Text("5").tag("five")

    }

    ```


    In this example, the available options are numbers, but when the user selects
    a number, the actual choice is stored as a string such as “three” or “five” as
    shown in Figure [8-1](#329781_6_En_8_Chapter.xhtml#Fig1).


    ![../images/329781_6_En_8_Chapter/329781_6_En_8_Fig1_HTML.jpg](images/329781_6_En_8_Chapter/329781_6_En_8_Fig1_HTML.jpg)


    Figure 8-1


    A Picker uses Text views to display choices on the user interface


    The .tag modifier on a Text view can contain any data type, but all .tag modifiers
    inside the same Picker must be of the same data type that matches the State variable
    that it’s linked to. The following Swift code defines a Picker where multiple
    Text views display words such as “Cat” or “Bird,” but the .tag modifiers store
    integers such as 0 or 2:


    ```

    Picker(selection: $choice, label: Text("Picker")) {

    Text("Bird").tag(1)

    Text("Cat").tag(2)

    Text("Lizard").tag(3)

    Text("Dog").tag(4)

    Text("Hamster").tag(5)

    }

    ```


    Because the .tag modifier contains integers, the “choice” State variable now needs
    to store Int data types such as


    ```

    @State private var choice = 0

    ```


    To see how a Picker works, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “Picker.”


    2.  Click the ContentView file in the Navigator pane.


    3.  Add the following State variable under the struct ContentView: View line:


    ```

    struct ContentView: View {

    @State private var choice = 0

    ```


    This creates a State variable that’s initially set to 0, which is an integer so
    the “choice” State variable is defined to hold Int data types.


    1.  Create a VStack and create a Picker and a Text view inside the var body: some
    View line:


    ```

    var body: some View {

    VStack {

    Picker(selection: $choice, label: Text("Picker")) {

    Text("Bird").tag(1)

    Text("Cat").tag(2)

    Text("Lizard").tag(3)

    Text("Dog").tag(4)

    Text("Hamster").tag(5)

    }

    Text("You chose \(choice)")

    }

    }

    ```


    The entire code in the ContentView file should look like this:


    1.  Click the Live Preview icon in the Canvas pane.


    2.  Select different options in the Picker. Notice that each time you select a
    different option, the Text view displays “You chose __” where __ is the .tag value
    attached to the Text view that the user chose.


    3.  Change the State variable as follows to hold Double data types:


    ```

    import SwiftUI

    struct ContentView: View {

    @State private var choice = 0

    var body: some View {

    VStack {

    Picker(selection: $choice, label: Text("Picker")) {

    Text("Bird").tag(1)

    Text("Cat").tag(2)

    Text("Lizard").tag(3)

    Text("Dog").tag(4)

    Text("Hamster").tag(5)

    }

    Text("You chose \(choice)")

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    ```

    @State private var choice = 0.0

    ```


    Because this “choice” State variable has an initial value of 0.0, which is a decimal
    number, Swift infers that the “choice” variable can now only hold Double data
    types.


    1.  Change the .tag modifiers in the Picker as follows:


    ```

    Picker(selection: $choice, label: Text("Picker")) {

    Text("Bird").tag(1.7)

    Text("Cat").tag(2.06)

    Text("Lizard").tag(3.41)

    Text("Dog").tag(4.13)

    Text("Hamster").tag(5.28)

    }

    ```


    Because the “choice” State variable has been redefined to hold Double data types,
    the .tag modifier values must now all represent Double data types as well.'
  trans: "\n# 概述\n\n用户向应用输入数据最常见的方式之一就是键入文本。`Text` 字段可以接收简短文本，例如姓名或一句话。如果用户需要输入不应显示在屏幕上的敏感信息，可以使用`Secure`\
    \ 字段，它会遮蔽已输入的所有内容。要显示多行文本，可以使用`Text` 编辑器，它的作用类似于一个微型文字处理程序。\n\n为了使文本输入更便捷，请使用\
    \ `.contentType` 修饰符来定义`Text` 字段预期的信息类型，例如姓名或电子邮件地址。然后使用 `.keyboardType` 修饰符来定义一个特定的虚拟键盘，该键盘针对输入特定类型信息（如电话号码或姓名）进行了优化。\n\
    \n当用户不再需要虚拟键盘时，为使其消失，`Text` 字段和`Secure` 字段可以依靠右下角的按钮来关闭虚拟键盘。通过使用 `.submitLabel`\
    \ 修饰符，你可以为这个右下角的虚拟键盘按钮定义常见的标题类型，例如“完成”、“发送”或“下一步”。\n\n创建`Text` 编辑器时，它会自动扩展以填充所有可用空间，因此你可能需要使用\
    \ `.frame` 修饰符为`Text` 编辑器定义特定的宽度和高度。在使用`Text` 编辑器时，若要隐藏虚拟键盘，请结合使用一个焦点状态变量与 `.focused`\
    \ 修饰符。然后创建一个单独的控件（例如`Button`），将该焦点状态变量设置为 `false`。这将使虚拟键盘消失。\n\n文本是最常见的输入数据方式，因此请确保用户能够轻松地在`Text`\
    \ 字段、`Secure` 字段或`Text` 编辑器中键入数据。\n\n# 8. 使用选择器限制选择\n\n`Text` 字段非常适合让用户输入任意类型的信息，例如姓名或问题的简短答案。问题在于，如果用户有输入任何内容的自由，他们可能会意外（或故意）输入无效数据。\n\
    \n例如，如果一个`Text` 字段要求输入地址，你希望用户能够自由地输入任何内容。然而，如果一个`Text` 字段要求输入州、语言或性别，你就不希望用户输入“狗”、“1258dke3”或“我在找鞋子”，因为这些都不是有效输入，并且很可能导致程序崩溃。\n\
    \n一种解决方案是让用户输入任意数据，然后编写 Swift 代码来验证输入是否有效。不幸的是，这可能需要花费大量时间，并且仍然可能不准确。一个好得多的解决方案是，当只有少数几个可接受的选项时，最好将用户限制在有限选项范围内进行选择。\n\
    \n`Picker`s 会显示多个选项，并让用户通过点击选择一个选项。由于所有选项都是有效的，`Picker`s 确保用户只能输入有效数据。普通的`Picker`\
    \ 适用于让用户从一系列文本选项中进行选择。对于选择颜色或日期，SwiftUI 也提供了专门的`Color` 选择器和`Date` 选择器。\n\n`Date`\
    \ 选择器甚至允许你定义有效的日期范围。`Picker`s 的全部目的就是确保用户在任何时候都只能向程序中输入有效数据。\n\n## 使用选择器\n\n一个`Picker`\
    \ 会显示由多个`Text` 视图定义的选项列表。尽管`Picker` 使用文本字符串来显示可用选项，但用户选择的任何选项实际上都可以代表任何值，例如字符串、十进制数、整数或由枚举定义的值。\n\
    \n要创建一个`Picker`，请使用多个`Text` 视图来显示选项，并为每个选项附加一个 `.tag` 修饰符。`.tag` 修饰符定义了用户选择的实际值，例如\n\
    \n```\nPicker(selection: $choice, label: Text(\"Picker\")) {\n    Text(\"1\").tag(\"\
    one\")\n    Text(\"2\").tag(\"two\")\n    Text(\"3\").tag(\"three\")\n    Text(\"\
    4\").tag(\"four\")\n    Text(\"5\").tag(\"five\")\n}\n```\n\n在这个例子中，可用选项是数字，但当用户选择一个数字时，实际的选择会存储为字符串，例如“three”或“five”，如图\
    \ 8-1 所示。\n\n![../images/329781_6_En_8_Chapter/329781_6_En_8_Fig1_HTML.jpg](img/329781_6_En_8_Fig1_HTML.jpg)\n\
    \n图 8-1\n\n`Picker` 使用`Text` 视图在用户界面上显示选项\n\n在`Text` 视图上的 `.tag` 修饰符可以包含任何数据类型，但同一`Picker`\
    \ 内部的所有 `.tag` 修饰符必须是与它链接的状态变量相匹配的相同数据类型。以下 Swift 代码定义了一个`Picker`，其中多个`Text` 视图显示诸如“Cat”或“Bird”之类的单词，但\
    \ `.tag` 修饰符存储的是整数，例如 0 或 2：\n\n```\nPicker(selection: $choice, label: Text(\"\
    Picker\")) {\n    Text(\"Bird\").tag(1)\n    Text(\"Cat\").tag(2)\n    Text(\"\
    Lizard\").tag(3)\n    Text(\"Dog\").tag(4)\n    Text(\"Hamster\").tag(5)\n}\n\
    ```\n\n因为 `.tag` 修饰符包含整数，所以 `choice` 状态变量现在需要存储 `Int` 数据类型，例如\n\n```\n@State private\
    \ var choice = 0\n```\n\n要了解`Picker` 的工作原理，请按以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS\
    \ App 项目，并为其命名，例如“Picker”。\n2. 在导航窗格中单击 `ContentView` 文件。\n3. 在 `struct ContentView:\
    \ View` 行下方添加以下状态变量：\n\n```\nstruct ContentView: View {\n    @State private var\
    \ choice = 0\n```\n\n这将创建一个初始设置为 0 的状态变量，它是一个整数，因此 `choice` 状态变量被定义为保存 `Int` 数据类型。\n\
    \n4. 创建一个 `VStack`，并在 `var body: some View` 行内部创建一个 `Picker` 和一个 `Text` 视图：\n\n\
    ```\nvar body: some View {\n    VStack {\n        Picker(selection: $choice, label:\
    \ Text(\"Picker\")) {\n            Text(\"Bird\").tag(1)\n            Text(\"\
    Cat\").tag(2)\n            Text(\"Lizard\").tag(3)\n            Text(\"Dog\").tag(4)\n\
    \            Text(\"Hamster\").tag(5)\n        }\n        Text(\"You chose \\\
    (choice)\")\n    }\n}\n```\n\n`ContentView` 文件中的完整代码应如下所示：\n\n```\nimport SwiftUI\n\
    \nstruct ContentView: View {\n    @State private var choice = 0\n    var body:\
    \ some View {\n        VStack {\n            Picker(selection: $choice, label:\
    \ Text(\"Picker\")) {\n                Text(\"Bird\").tag(1)\n               \
    \ Text(\"Cat\").tag(2)\n                Text(\"Lizard\").tag(3)\n            \
    \    Text(\"Dog\").tag(4)\n                Text(\"Hamster\").tag(5)\n        \
    \    }\n            Text(\"You chose \\(choice)\")\n        }\n    }\n}\n\nstruct\
    \ ContentView_Previews: PreviewProvider {\n    static var previews: some View\
    \ {\n        ContentView()\n    }\n}\n```\n\n5. 在画布窗格中单击“实时预览”图标。\n6. 在 `Picker`\
    \ 中选择不同的选项。注意，每次选择不同的选项时，`Text` 视图都会显示“You chose __”，其中 __ 是附加到用户选择的`Text` 视图上的\
    \ `.tag` 值。\n7. 按如下方式更改状态变量，以保存 `Double` 数据类型：\n\n```\n@State private var choice\
    \ = 0.0\n```\n\n由于此 `choice` 状态变量的初始值为 0.0，是一个十进制数，因此 Swift 推断 `choice` 变量现在只能保存\
    \ `Double` 数据类型。\n\n8. 按如下方式更改 `Picker` 中的 `.tag` 修饰符：\n\n```\nPicker(selection:\
    \ $choice, label: Text(\"Picker\")) {\n    Text(\"Bird\").tag(1.7)\n    Text(\"\
    Cat\").tag(2.06)\n    Text(\"Lizard\").tag(3.41)\n    Text(\"Dog\").tag(4.13)\n\
    \    Text(\"Hamster\").tag(5.28)\n}\n```\n\n因为 `choice` 状态变量已被重新定义为保存 `Double`\
    \ 数据类型，所以 `.tag` 修饰符的值现在也必须全部表示 `Double` 数据类型。\n"
