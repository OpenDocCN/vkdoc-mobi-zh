    \ 状态变量都会发生变化。然后，`.onChange` 修饰符会运行代码来更改 `message` 状态变量。这个新的文本随后会出现在 `Text` 视图中，如图\
    \ 6-4 所示。\n\n通过将 `.onChange` 修饰符与分段控件结合使用，当用户在分段控件上选择不同选项时，你可以运行任何你想要的 Swift 代码。\n\
    \n## 总结\n\n按钮是让用户向程序发出命令的最简单方式。在最简单的层面，一个 `Button` 由文本和每次用户选中该 `Button` 时要运行的一段代码列表组成。要自定义一个\
    \ `Button`，你可以使用带有修饰符的 `Text` 视图或 `Label` 视图，或者使用可以显示图像（如图标或数码照片）的 `Image` 视图。\n\
    \n分段控件就像是将两个或多个 `Buttons` 挤在一个单一控件中。通过使用分段控件，你可以比使用多个 `Buttons` 占用更少的空间来向用户显示多个选项。\n\
    \n当处理 `Buttons` 和分段控件时，你通常需要创建一个状态变量。当程序的任何部分更改了状态变量的值时，更新后的数据会自动出现在整个程序中。\n\n\
    虽然 `Buttons` 可以在每次用户选中该 `Button` 时运行一行或多行 Swift 代码，但分段控件只有与 `.onChange` 修饰符结合使用时才能运行代码。`Buttons`\
    \ 和分段控件都可以让你在用户界面上显示不同的选项供用户选择。\n\n# 7. 从文本字段和文本编辑器中检索文本\n\n用户界面通常需要从用户处检索文本。有时，这个文本可能是一个单词或短句，但其他时候，这个文本可能由几个段落组成。为了从用户处检索文本，SwiftUI\
    \ 提供了三种类型的视图：\n\n*   文本字段（Text Field）\n*   安全字段（Secure Field）\n*   文本编辑器（Text\
    \ Editor）\n\n文本字段允许用户输入单行文本，例如姓名或地址。可选地，文本字段可以显示占位符文本，该文本以浅灰色显示，用于说明文本字段期望什么类型的信息。\n\
    \n安全字段的工作方式与文本字段完全相同，只是它会屏蔽用户输入的任何文本。这在要求用户输入敏感信息（如信用卡号）时很有用。\n\n文本编辑器显示为一个大的方框，用户可以在其中输入和编辑多行文本，例如多个段落。\n\
    \n由于文本字段、安全字段和文本编辑器需要存储数据，它们需要与一个可以持有 `String` 数据类型的状态变量配合使用，例如：\n\n```\n@State\
    \ private var message = \"\"\n```\n"
- fmt: '# Using Text Fields


    The main purpose of a Text Field is to accept a short amount of text from the
    user. This can be a single word or a short sentence. To prod the user into typing
    the expected text, a Text Field can display placeholder text that appears in light
    gray as shown in Figure 7-1.


    ![../images/329781_6_En_7_Chapter/329781_6_En_7_Fig1_HTML.jpg](images/329781_6_En_7_Chapter/329781_6_En_7_Fig1_HTML.jpg)


    Figure 7-1: Text Fields can display placeholder text to guide the user


    When the user types something into a Text Field, that text gets stored in the
    State variable. In Figure 7-1, the State variable is called “message” and the
    dollar sign (`$`) means that the State variable is bound to this Text Field. That
    means changing the contents of the Text Field automatically changes the `message`
    State variable.


    ## Changing the Text Field Style


    One way to make a Text Field easier to see is to display placeholder text that
    appears in light gray to let the user know what to type and where to type. A second
    way to emphasize a Text Field is to add a rounded border around it as shown in
    Figure 7-2.


    ![../images/329781_6_En_7_Chapter/329781_6_En_7_Fig2_HTML.jpg](images/329781_6_En_7_Chapter/329781_6_En_7_Fig2_HTML.jpg)


    Figure 7-2: The appearance of a rounded border around a Text field


    The `.textFieldStyle` modifier gives you the option of `.plain` or `.rounded`
    border:


    ```

    .textFieldStyle(.roundedBorder)

    ```


    While the `.roundedBorder` displays a border around the Text Field, the `.plain`
    modifier eliminates the border and displays the Text Field as if there was no
    `.textFieldStyle` modifier at all.


    ## Creating Secure Text Fields


    When you type in a Text Field, that text appears visible on the screen. While
    this can be handy in most cases, it’s not appropriate when typing in sensitive
    information like passwords or credit card numbers. To mask any text that the user
    types, SwiftUI offers a special text field called a `SecureField`.


    Like a Text Field, a `SecureField` displays placeholder text and binds itself
    to a State variable like this:


    ```

    SecureField("Password", text: $message)

    ```


    A `SecureField` looks identical to a `TextField` on the user interface. The only
    difference is that when you type in a `SecureField`, it masks your text as shown
    in Figure 7-3.


    ![../images/329781_6_En_7_Chapter/329781_6_En_7_Fig3_HTML.jpg](images/329781_6_En_7_Chapter/329781_6_En_7_Fig3_HTML.jpg)


    Figure 7-3: The `SecureField` masks text unlike a Text Field that displays everything
    the user types


    Any modifier you can use on a Text Field, you can use on a `SecureField` such
    as the `.textFieldStyle` modifier.


    ## Using Autocorrect and Text Content


    By default, Text Fields use autocorrect, which means as you type, the Text Field
    tries to guess the word you want to write. In some cases, this can be helpful,
    but when you’re trying to type a name, you don’t want autocorrect changing names
    to common words.


    To turn off autocorrect, just add the following modifier:


    ```

    .disableAutocorrection(true)

    ```


    If you want to turn autocorrect back on again, either delete the entire `.disableAutocorrection`
    modifier or pass it a `false` value like this:


    ```

    .disableAutocorrection(false)

    ```


    While disabling autocorrect can stop a Text Field from offering irrelevant suggestions,
    another solution is to use the `.textContentType` modifier to define the type
    of text a Text Field should expect such as a name, email address, or telephone
    number. To use the `.textContentType` modifier, you just need to specify the type
    of text to expect such as:


    ```

    TextField("Enter your email address", text: $emailAddress)

    .textContentType(.emailAddress)

    ```


    By defining a specific `.textContentType`, autocorrect will reduce the number
    of irrelevant suggestions it makes. The different `.textContentType` modifier
    options are:


    - `.URL` – For entering URL data

    - `.namePrefix` – For entering prefixes or titles such as Dr. or Mr.

    - `.name` – For entering names

    - `.nameSuffix` – For entering suffixes to names such as Jr.

    - `.givenName` – For entering a first name

    - `.middleName` – For entering a middle name

    - `.familyName` – For entering a family or last name

    - `.nickname` – For entering an alternative name

    - `.organizationName` – For entering an organization name

    - `.jobTitle` – For entering a job title

    - `.location` – For entering a location including an address

    - `.fullStreetAddress` – For entering a complete street address

    - `.streetAddressLine1` – For entering the first line of a street address

    - `.streetAddressLine2` – For entering the second line of a street address

    - `.addressCity` – For entering the city name of an address

    - `.addressCityAndState` – For entering a city and a state name in an address

    - `.postalCode` – For entering a postal code in an address

    - `.sublocality` – For entering a sublocality in an address

    - `.countryName` – For entering a country or region name in an address

    - `.username` – For entering an account or login name

    - `.password` – For entering a password

    - `.newPassword` – For entering a new password

    - `.oneTimeCode` – For entering a one-time code

    - `.emailAddress` – For entering an email address

    - `.telephoneNumber` – For entering a telephone number

    - `.creditCardNumber` – For entering a credit card number

    - `.dateTime` – For entering a date, time, or duration

    - `.flightNumber` – For entering an airline flight number

    - `.shipmentTrackingNumber` – For entering a parcel tracking number


    ## Defining Different Keyboards


    On a real iOS device, apps display a virtual keyboard that users can tap to type
    out numbers or characters. Since a Text Field may expect certain types of information
    such as names, numbers, or email addresses, you can define the specific type of
    virtual keyboard to use for each Text Field on your user interface. Some of the
    different virtual keyboards a Text Field can display include:


    - `.default` – The virtual keyboard that normally appears unless you specify otherwise

    - `.asciiCapable` – Displays standard ASCII characters

    - `.numbersAndPunctuation` – Displays numbers and punctuation marks

    - `.URL` – Displays a keyboard optimized for URL entries

    - `.numberPad` – Displays a numeric keypad for PIN entry

    - `.phonePad` – Displays a keypad for entering telephone numbers

    - `.namePhonePad` – Displays a keypad for entering a person’s name and telephone
    number

    - `.emailAddress` – Displays a keyboard for typing email addresses

    - `.decimalPad` – Displays a keyboard with numbers and a decimal point

    - `.twitter` – Displays a keyboard for Twitter text entry

    - `.webSearch` – Displays a keyboard for web search terms and URL entry

    - `.asciiCapableNumberPad` – Displays a numeric pad that outputs only ASCII digits

    - `.alphabet` – Displays a keyboard for alphabetic entry


    Figure 7-4 shows four different appearances of the virtual keyboard.


    ![../images/329781_6_En_7_Chapter/329781_6_En_7_Fig4_HTML.jpg](images/329781_6_En_7_Chapter/329781_6_En_7_Fig4_HTML.jpg)


    Figure 7-4: Different appearances of the virtual keyboard


    To define a particular keyboard type for a Text Field, use the `.keyboardType`
    modifier like this:


    ```

    TextField("Enter name", text: $message)

    .keyboardType(.phonePad)

    ```


    > **Note:** To view a virtual keyboard, you must test your project on the Simulator
    or on an actual iOS device. In the Simulator, you can toggle to hide or display
    the virtual keyboard by choosing I/O ➤ Keyboard ➤ Toggle Software Keyboard, or
    by pressing `Command+K`. You cannot view the virtual keyboard in the Canvas pane.'
  raw: '## Using Text Fields


    The main purpose of a Text Field is to accept a short amount of text from the
    user. This can be a single word or a short sentence. To prod the user into typing
    the expected text, a Text Field can display placeholder text that appears in light
    gray as shown in Figure [7-1](#329781_6_En_7_Chapter.xhtml#Fig1).


    ![../images/329781_6_En_7_Chapter/329781_6_En_7_Fig1_HTML.jpg](images/329781_6_En_7_Chapter/329781_6_En_7_Fig1_HTML.jpg)


    Figure 7-1


    Text Fields can display placeholder text to guide the user


    When the user types something into a Text Field, that text gets stored in the
    State variable. In Figure [7-1](#329781_6_En_7_Chapter.xhtml#Fig1), the State
    variable is called “message” and the dollar sign ($) means that the State variable
    is bound to this Text Field. That means changing the contents of the Text Field
    automatically changes the message State variable.


    ### Changing the Text Field Style


    One way to make a Text Field easier to see is to display placeholder text that
    appears in light gray to let the user know what to type and where to type. A second
    way to emphasize a Text Field is to add a rounded border around it as shown in
    Figure [7-2](#329781_6_En_7_Chapter.xhtml#Fig2).


    ![../images/329781_6_En_7_Chapter/329781_6_En_7_Fig2_HTML.jpg](images/329781_6_En_7_Chapter/329781_6_En_7_Fig2_HTML.jpg)


    Figure 7-2


    The appearance of a rounded border around a Text field


    The .textFieldStyle modifier gives you the option of .plain or .rounded border:


    ```

    .textFieldStyle(.roundedBorder)

    ```


    While the .roundedBorder displays a border around the Text Field, the .plain modifier
    eliminates the border and displays the Text Field as if there was no .textFieldStyle
    modifier at all.


    ### Creating Secure Text Fields


    When you type in a Text Field, that text appears visible on the screen. While
    this can be handy in most cases, it’s not appropriate when typing in sensitive
    information like passwords or credit card numbers. To mask any text that the user
    types, SwiftUI offers a special text field called a SecureField.


    Like a Text Field, a SecureField displays placeholder text and binds itself to
    a State variable like this:


    ```

    SecureField("Password", text: $message)

    ```


    A SecureField looks identical to a TextField on the user interface. The only difference
    is that when you type in a SecureField, it masks your text as shown in Figure
    [7-3](#329781_6_En_7_Chapter.xhtml#Fig3).


