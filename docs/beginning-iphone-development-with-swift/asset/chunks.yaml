    # 在导航视图中实现结构体间数据共享


    使用 `@State` 和 `@Binding` 变量能让多个视图共享和修改数据。但假设你创建了一个 `NavigationView`，按顺序串联起四个结构体。如果在第一个结构体中更改了数据，并希望将其传递到第四个结构体，那么你也必须将数据依次传递给第二和第三个结构体。


    虽然这种方法可行，但相当笨拙。更优的做法是直接将数据传递给需要它的结构体。为此，SwiftUI 提供了另一种在结构体间共享数据的方式。首先，创建一个 `ObservableObject`
    类，其中包含一个或多个待共享的变量。每个变量必须标记为 `@Published`，如下所示：


    ```

    class ShareString: ObservableObject {

    @Published var message = ""

    }

    ```


    包含 `NavigationView` 的结构体（例如 `ContentView`）需要定义一个 `@StateObject` 变量，该变量用于创建 `ObservableObject`
    类的一个实例，如下所示：


    ```

    @StateObject var showMe = ShareString()

    ```


    由于我们希望在导航视图内的所有视图之间共享此 `ObservableObject`，需要在 `NavigationView` 上添加 `.environmentObject`
    修饰符，并传入要共享的 `StateObject`，如下所示：


    ```

    NavigationView {

    }.environmentObject(showMe)

    ```


    与其将数据传递给每个视图，`NavigationLink` 只需指定要显示的视图名称即可，例如：


    ```

    NavigationLink(destination: FileView()) {

    Text("发送消息")

    }

    ```


    在每个需要访问 `ObservableObject` 的结构体内部，我们需要声明一个 `@EnvironmentObject` 变量，该变量的类型为 `ObservableObject`
    类，如下所示：


    ```

    @EnvironmentObject var choice: ShareString

    ```


    最后，在每个定义了 `@EnvironmentObject` 的结构体中，我们可以通过 `@EnvironmentObject` 变量名加上 `@Published`
    的属性名来访问实际要共享的数据，如下所示：


    ```

    $choice.message

    ```


    在此示例中，`choice` 是 `@EnvironmentObject` 变量名，`message` 是在 `ObservableObject` 中定义的
    `@Published` 属性。要了解如何使用 `ObservableObject` 共享数据，请按照以下步骤操作：


    1.  创建一个新的 SwiftUI iOS App 项目，并为其指定任意名称，例如 `NavigationViewObservable`。


    2.  在导航器窗格中点击 `ContentView` 文件。


    3.  在 `import SwiftUI` 行下方创建一个 `ObservableObject` 类，如下所示：


    ```

    class ShareString: ObservableObject {

    @Published var message = ""

    }

    ```


    `@Published` 变量将包含要在导航视图内的结构体之间共享的数据。


    4.  在 `struct ContentView: View` 行下方创建一个 `StateObject` 变量，如下所示：


    ```

    struct ContentView: View {

    @StateObject var showMe = ShareString()

    ```


    这将基于 `ShareString` 这个 `ObservableObject` 创建一个新对象（`showMe`）。


    5.  在 `var body: some View` 行内添加一个 `NavigationView` 和一个 `VStack`，如下所示：


    ```

    var body: some View {

    NavigationView {

    VStack (spacing: 26) {

    }

    }

    ```


    6.  在 `VStack` 内添加一个 `TextField`、两个 `NavigationLinks` 以及一个 `.navigationTitle`
    修饰符，如下所示：


    ```

    NavigationView {

    VStack (spacing: 26) {

    TextField("在此输入", text: $showMe.message)

    NavigationLink(destination: FileView()) {

    Text("发送消息")

    }

    NavigationLink(destination: SeparateFileView()) {

    Text("单独文件")

    }

    .navigationTitle("共享数据")

    }

    }.environmentObject(showMe)

    ```


    确保在 `NavigationView` 的末尾添加了 `.environmentObject(showMe)` 修饰符。这允许共享 `showMe` 这个
    `ObservableObject`（即 `ShareString` 类）。前面的 `NavigationLinks` 将打开我们需要创建的两个结构体：`FileView`
    和 `SeparateFileView`。


    7.  在 `struct ContentView` 结构体下方添加以下结构体：


    ```

    struct FileView: View {

    @EnvironmentObject var choice: ShareString

    var body: some View {

    HStack {

    Spacer()

    VStack {

    Spacer()

    TextField("在此输入:", text: $choice.message)

    Spacer()

    }

    Spacer()

    }.background(Color.yellow)

    }

    }

    ```


    注意，此结构体定义了一个 `@EnvironmentObject` 变量，用于容纳 `ShareString` 这个 `ObservableObject`。在
    `TextField` 中，我们必须将文本存储在使用 `message` 这个 `@Published` 属性的 `choice` 这个 `@EnvironmentObject`
    中（`$choice.message`）。整个 `ContentView` 文件应如下所示：


    8.  选择 `文件` ➤ `新建` ➤ `文件`。将出现一个对话框（见图 \[16-4\]）。


    9.  点击对话框顶部附近的 `iOS`，点击 `Swift 文件`，然后点击 `下一步`。Xcode 会要求为你新创建的文件命名。


    10. 输入 `SeparateFile` 并点击 `创建`。Xcode 会创建一个新的 Swift 文件。


    11. 删除 `SeparateFile` 中当前的所有代码，并将其替换为以下内容：


    ```

    import SwiftUI

    struct SeparateFileView: View {

    @EnvironmentObject var passedData: ShareString

    var body: some View {

    HStack {

    Spacer()

    VStack {

    Spacer()

    TextField("在此输入", text: $passedData.message)

    Spacer()

    }

    Spacer()

    }.background(Color.orange)

    }

    }

    struct SeparateFileView_Previews: PreviewProvider {

    static var previews: some View {

    SeparateFileView()

    }

    }

    ```


    注意，此结构体也声明了一个 `@EnvironmentObject`，用于容纳 `ShareString` 这个 `ObservableObject`。然后
    `TextField` 使用 `passedData` 这个 `@EnvironmentObject` 来访问 `message` 这个 `@Published`
    属性（`$passedData.message`）。


    12. 在导航器窗格中点击 `ContentView` 文件。


    13. 在画布窗格中点击 `实时预览` 图标。


    14. 点击 `TextField` 并输入一个短语。


    15. 点击 `发送消息` 导航链接以打开 `FileView` 结构体。注意，第 14 步输入的内容现在会出现在 `FileView` 的 `TextField`
    中。


    16. 编辑 `TextField` 中的文本，然后点击 `返回` 按钮。注意，修改后的文本现在会出现在 `ContentView` 的 `TextField`
    中。


    17. 编辑 `TextField` 中的文本，然后点击 `单独文件` 导航链接。编辑后的文本现在会出现在 `SeparateFileView` 的 `TextField`
    中。


    18. 编辑 `TextField` 中的文本并点击 `返回` 按钮。注意，修改后的文本现在会出现在 `ContentView` 的 `TextField`
    中。这一切展示了各个结构体如何访问 `ObservableObject` 中的 `@Published` 属性。

