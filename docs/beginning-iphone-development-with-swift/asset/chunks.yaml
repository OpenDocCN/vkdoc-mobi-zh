  trans: '

    # 使用偏移与位置修饰符


    堆栈中的间隔器、内边距和对齐方式可以改变视图在用户界面上的位置，但要想以另一种方式定位视图，你还可以使用`offset`修饰符。`offset`修饰符允许你指定特定的`x`和`y`值，将视图从
    SwiftUI 原本放置的位置移开。


    在每个 iOS 屏幕上，原点(0,0)位于左上角。`x`值越大，视图水平方向越靠右；`y`值越大，视图垂直方向越靠下，如图 3-13 所示。


    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig13_HTML.jpg](img/329781_6_En_3_Fig13_HTML.jpg)


    图 3-13


    iOS 屏幕上的原点与 x、y 方向


    下面的`ZStack`将两个完全相同的`Text`视图叠放在一起。由于两个`Text`视图出现在完全相同的位置，因此无法同时看到两者：


    ```

    ZStack {

    Text ("Top")

    .font(.system(size: 40))

    .background(Color.yellow)

    Text ("Top")

    .font(.system(size: 40))

    .background(Color.yellow)

    }

    ```


    如果我们为其中一个`Text`视图添加`offset`修饰符，`offset`修饰符会将第二个`Text`视图从其正常显示位置移动固定的距离，例如：


    ```

    ZStack {

    Text ("Top")

    .font(.system(size: 40))

    .background(Color.yellow)

    Text ("Top")

    .font(.system(size: 40))

    .background(Color.yellow)

    .offset(x: 75, y: 125)

    }

    ```


    这个偏移将第二个`Text`视图向右移动 75 点、向下移动 125 点，如图 3-14 所示。


    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig14_HTML.jpg](img/329781_6_En_3_Fig14_HTML.jpg)


    图 3-14


    偏移修饰符将视图从其正常显示位置移开


    `x`正值将视图向右移动，`x`负值将视图向左移动。同样，`y`正值将视图向下移动，`y`负值将视图向上移动。假设我们有如下的`offset`修饰符：


    ```

    .offset(x: -75, y: -125)

    ```


    这会将第二个`Text`视图从其正常显示位置向左上方移动，如图 3-15 所示。


    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig15_HTML.jpg](img/329781_6_En_3_Fig15_HTML.jpg)


    图 3-15


    x 和 y 负值将视图向左上方偏移


    `offset`修饰符让你能够基于 SwiftUI 通常放置视图的位置来定位视图。如果你希望基于原点（屏幕左上角）定位视图，那么你可能需要使用`position`修饰符。


    与`offset`修饰符类似，`position`修饰符也需要`x`和`y`值来定义视图的中心位置。以下 Swift 代码将一个`Text`视图放置在距右侧
    225 点、距下方 126 点的位置，如图 3-16 所示：


    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig16_HTML.jpg](img/329781_6_En_3_Fig16_HTML.jpg)


    图 3-16


    使用位置修饰符在用户界面上放置视图


    ```

    Text ("Top")

    .font(.system(size: 40))

    .background(Color.yellow)

    .position(x: 225, y: 127)

    ```


    **注意**


    无论使用`offset`还是`position`修饰符，都要小心使用较大的`x`或`y`值。这是因为较大的值可能在大屏幕上完美定位视图，但在小屏幕上却可能使同一视图超出屏幕边缘。


    你可以将`offset`和`position`修饰符应用于任何视图。由于堆栈也是视图，你可以在堆栈上应用`offset`和`position`修饰符，这也会自动移动堆栈内每个视图的位置。考虑以下将`offset`修饰符应用于整个`VStack`的
    Swift 代码：


    ```

    VStack {

    Text ("First")

    .font(.system(size: 40))

    .background(Color.yellow)

    Text ("Second View")

    .font(.system(size: 40))

    .background(Color.yellow)

    }.offset(x: 25, y: 125)

    ```


    上面的代码将整个`VStack`的内容（两个`Text`视图）从其正常显示位置向右下方移动，如图 3-17 所示。


    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig17_HTML.jpg](img/329781_6_En_3_Fig17_HTML.jpg)


    图 3-17


    偏移修饰符将整个堆栈从其正常显示位置移开


    `offset`修饰符将整个`VStack`从其正常位置移动，而`position`修饰符则基于原点（屏幕左上角）定位`VStack`。以下 Swift 代码使用了完全相同的`x`和`y`值，但在`VStack`上使用了`position`修饰符：


    ```

    VStack {

    Text ("First")

    .font(.system(size: 40))

    .background(Color.yellow)

    Text ("Second View")

    .font(.system(size: 40))

    .background(Color.yellow)

    }.position(x: 25, y: 125)

    ```


    注意，由于`position`修饰符从原点移动`VStack`，`x`值不够大，导致`VStack`的内容被屏幕截断，如图 3-18 所示。


    ![../images/329781_6_En_3_Chapter/329781_6_En_3_Fig18_HTML.jpg](img/329781_6_En_3_Fig18_HTML.jpg)


    图 3-18


    位置修饰符相对于原点放置 VStack


    # 总结


    在 SwiftUI 中设计用户界面时，视图通常居中于屏幕中央。通过使用`padding`修饰符，你可以增加视图周围的空间。`padding`修饰符可以影响视图的一个边、两个边、三个边或全部四个边。


    当你希望将视图推开时，可以使用间隔器，它们像弹簧一样，无论屏幕实际大小如何，都能将视图推到屏幕边缘。通过使用多个间隔器，你可以将视图推得更远。你还可以定义间隔器可以收缩的最小长度，以确保它不会收缩到特定长度以下。


    在垂直和水平堆栈内，你可以定义堆栈内所有视图之间的间距。通过使用`offset`修饰符，你可以将视图从其正常显示位置移开。通过使用`position`修饰符，你可以基于原点（即
    iOS 屏幕的左上角）精确地将视图放置在屏幕上。


    `padding`修饰符、间隔器、堆栈内的间距以及 offset/position 修饰符使你能够安排视图在用户界面上的布局。你可以在任何视图（包括堆栈）上应用`padding`、`offset`和`position`修饰符。通过修改整个堆栈，你可以修改该堆栈内的所有视图。


    SwiftUI 有助于创建能够适应任何尺寸 iOS 屏幕的用户界面，无论你的应用运行在小型 iPhone 屏幕还是大得多的 iPad 屏幕上。这样，你可以花更少的时间担心应用在不同
    iOS 设备上的外观，而将更多时间集中在编写代码上，让你的应用实现有用且出色的功能。

    '
- fmt: '# 4. Working with Text


    Every user interface needs to display information on the screen. While this information
    can appear in a variety of forms, one common type of information to display on
    the user interface involves text. If you want to display text on the user interface,
    you need to define a string to appear in a `Text` view such as:


    ```

    Text("Hello World")

    ```


    For greater flexibility, you can store a string in a variable or constant and
    then use that variable or constant name in a `Text` view such as:


    ```

    let myString = "Displays a string variable"

    Text(myString)

    ```


    By using string variables, you can store different strings in that variable to
    make the `Text` view display new text. For more flexibility, a `Text` view can
    also display non-string data using string interpolation such as:


    ```

    let myString = 46

    Text("This is my age = \(myString)")

    ```


    A `Text` view can display strings of any length. However, the length of a displayed
    string can vary depending on the screen size that the app runs on such as the
    larger iPad screen or the smaller iPhone screen. To customize how strings appear,
    SwiftUI lets you define the following:


    - **Line limits** – Defines the maximum number of lines the `Text` view can display
    such as two or four.

    - **Truncation** – Defines how to truncate or cut off strings if it’s not possible
    to display the entire string.


    The line limit modifier lets you define the maximum number of lines to display.
    If you do not specify a line limit value, SwiftUI will display as many lines as
    possible. To define a line limit, add a `lineLimit` modifier in Swift code like
    this:


    ```

    Text("This is my age \(myString). Since I am retired, I am now eligible for a
    pension and Social Security so I can spend the rest of my life relaxing and enjoying
    life without having to work for an income anymore.")

    .lineLimit(2)

    ```


    Figure [4-1](#329781_6_En_4_Chapter.xhtml#Fig1) shows two identical `Text` views,
    but the top `Text` view does not have a line limit. As a result, it displays all
    of its text. The bottom `Text` view has a line limit of two, so it only shows
    the first two lines of text.


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig1_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig1_HTML.jpg)


    **Figure 4-1** – The `lineLimit` modifier may cut off part of the text.


    Rather than type Swift code to define a line limit, you can also click the `Text`
    view and open the Inspector. Then you can define a line limit in the Inspector
    pane as shown in Figure [4-2](#329781_6_En_4_Chapter.xhtml#Fig2).


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig2_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig2_HTML.jpg)


    **Figure 4-2** – Defining a line limit in the Inspector pane.


    If you define a line limit (such as two lines) and your text exceeds that limit
    (such as displaying three or more lines), SwiftUI will cut off or truncate text.
    SwiftUI offers three ways to truncate text that exceeds its line limit as shown
    in Figure [4-3](#329781_6_En_4_Chapter.xhtml#Fig3):


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig3_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig3_HTML.jpg)


    **Figure 4-3** – Three different ways to truncate text that exceeds its line limit.


    - `.head` – Truncates the beginning of the last line.

    - `.middle` – Truncates the middle of the last line.

    - `.tail` – Truncates the end of the last line.


    By default, SwiftUI truncates text at the end of a line (Tail), but you can define
    the head or middle truncation option by using the `truncationMode` modifier with
    the `lineLimit` modifier on a `Text` view such as:


    ```

    .truncationMode(.middle)

    ```


    If you move the cursor into a `Text` view and then click the Add Modifier button
    at the bottom of the Inspector pane, you can add the Truncation Mode modifier
    to the Inspector pane. Then you can define the truncation option in the Inspector
    pane as shown in Figure [4-4](#329781_6_En_4_Chapter.xhtml#Fig4).


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig4_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig4_HTML.jpg)


    **Figure 4-4** – Defining a truncation option in the Inspector pane.'
