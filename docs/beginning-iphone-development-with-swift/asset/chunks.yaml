    Image(systemName: "hare.fill")

    Text("Two")

    }.tag(2)

    Text("Three")

    .tabItem {

    Image(systemName: "tortoise.fill")

    Text("Three")

    }.tag(3)

    Text("Four")

    .tabItem {

    Image(systemName: "folder.fill")

    Text("Four")

    }.tag(4)

    }

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    此代码创建了一个 Tab View 以及位于屏幕顶部、标记为 1、2、3 和 4 的四个按钮。


    6. 点击画布面板上的 Live Preview 图标。

    7. 点击屏幕顶部的数字按钮。请注意，如果你点击 `2` 按钮，标签栏上的第二个标签将被选中。如果你点击 `4` 按钮，标签栏上的第四个标签将被选中。`.tag`
    修饰符为你提供了一种通过 Swift 代码访问特定标签的方法。


    ## 显示页面视图


    通常，Tab View 在屏幕底部显示标签，以便用户选择标签并跳转到不同的视图。作为一种替代方案，你可以将 Tab View 转换为 Page View。Page
    View 在屏幕底部中间显示代表不同屏幕的标签栏图标。然后，用户可以左右滚动以按顺序查看每个屏幕。


    要将 Tab View 转换为 Page View，只需向 Tab View 添加 `.tabViewStyle` 修饰符并指定 `.page`，如下所示：


    ```

    TabView {

    }.tabViewStyle(.page)

    ```


    现在，用户无需从屏幕底部选择标签来打开视图，而是可以左右滑动以按顺序打开每个视图。为了提供可用视图数量的视觉指示，你可以添加 `.indexViewStyle`
    修饰符并为 `backgroundDisplayMode` 指定 `.always`，如下所示：


    ```

    TabView {

    }.tabViewStyle(.page)

    .indexViewStyle(PageIndexViewStyle(backgroundDisplayMode: .always))

    ```


    要了解 Page View 的工作原理，请遵循以下步骤：


    1. 创建一个新的 SwiftUI iOS App 项目，并为其命名，例如 “PageView”。

    2. 在导航窗格中点击 `ContentView` 文件。

    3. 在 `var body: some View` 行内添加一个 Tab View，如下所示：


    ```

    TabView {

    Text("One")

    .tabItem {

    Image(systemName: "heart.fill")

    }

    Text("Two")

    .tabItem {

    Image(systemName: "hare.fill")

    }

    Text("Three")

    .tabItem {

    Image(systemName: "tortoise.fill")

    }

    Text("Four")

    .tabItem {

    Image(systemName: "folder.fill")

    }

    Text("Five")

    .tabItem {

    Image(systemName: "tray.fill")

    }

    Text("Six")

    .tabItem {

    Image(systemName: "keyboard.fill")

    }

    }

    ```


    请随意为每个 `Text` 视图选择不同的文本，并为每个 `Image` 视图选择不同的 SF Symbol 图标。请注意，每个 `.tabItem` 只需添加一个
    `Image` 视图，不需要 `Text` 视图。


    4. 向 Tab View 添加 `.tabViewStyle` 和 `.indexViewStyle` 修饰符，如下所示：


    ```

    TabView {

    Text("One")

    .tabItem {

    Image(systemName: "heart.fill")

    }

    Text("Two")

    .tabItem {

    Image(systemName: "hare.fill")

    }

    Text("Three")

    .tabItem {

    Image(systemName: "tortoise.fill")

    }

    Text("Four")

    .tabItem {

    Image(systemName: "folder.fill")

    }

    Text("Five")

    .tabItem {

    Image(systemName: "tray.fill")

    }

    Text("Six")

    .tabItem {

    Image(systemName: "keyboard.fill")

    }

    }.tabViewStyle(.page)

    .indexViewStyle(PageIndexViewStyle(backgroundDisplayMode: .always))

    ```


    这会将每个 `Image` 显示为屏幕底部中间的图标列表，如图 17-6 所示。


    **图 17-6** Page View 底部的图标栏


    整个 `ContentView` 文件应如下所示：


    ```

    import SwiftUI

    struct ContentView: View {

    var body: some View {

    TabView {

    Text("One")

    .tabItem {

    Image(systemName: "heart.fill")

    }

    Text("Two")

    .tabItem {

    Image(systemName: "hare.fill")

    }

    Text("Three")

    .tabItem {

    Image(systemName: "tortoise.fill")

    }

    Text("Four")

    .tabItem {

    Image(systemName: "folder.fill")

    }

    Text("Five")

    .tabItem {

    Image(systemName: "tray.fill")

    }

    Text("Six")

    .tabItem {

    Image(systemName: "keyboard.fill")

    }

    }.tabViewStyle(.page)

    .indexViewStyle(PageIndexViewStyle(backgroundDisplayMode: .always))

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    5. 点击画布面板上的 Live Preview 图标。

    6. 从右向左（以及从左向右）拖动鼠标，从当前视图滑动到下一个视图。请注意，每次执行此操作时，屏幕底部都会有不同的图标高亮显示，以指示你当前所在的位置，以及当前显示视图之前和之后还有多少个其他视图。

