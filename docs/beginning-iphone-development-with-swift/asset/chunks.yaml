- fmt: '# Sharing Data Between Structures in a Navigation View


    Using `@State` and `@Binding` variables lets multiple views share and modify data.
    However, suppose you created a `NavigationView` that links four structures together
    in sequential order. If you change the data on the first structure and want to
    pass it to the fourth structure, you also have to pass that data through the second
    and third structures.


    While this can work, it’s clumsy. It’s far better to pass data straight to the
    structures that need the data. To do this, SwiftUI offers another way to share
    data between structures. First, create an `ObservableObject` class that contains
    one or more variables to share. Each variable must be marked as `@Published` like
    this:


    ```

    class ShareString: ObservableObject {

    @Published var message = ""

    }

    ```


    The structure that contains the `NavigationView` (such as `ContentView`) needs
    to define a `@StateObject` variable that defines an object from the `ObservableObject`
    class like this:


    ```

    @StateObject var showMe = ShareString()

    ```


    Since we want to share this `ObservableObject` between all views within the Navigation
    View, we need to add the `.environmentObject` modifier to the `NavigationView`
    along with the `StateObject` to share like this:


    ```

    NavigationView {

    }.environmentObject(showMe)

    ```


    Instead of passing data to each view, the `NavigationLink` just needs the name
    of the view to display such as


    ```

    NavigationLink(destination: FileView()) {

    Text("Send a message")

    }

    ```


    Within each structure that needs to access the `ObservableObject`, we need to
    declare an `@EnvironmentObject` variable that uses the `ObservableObject` class
    like this:


    ```

    @EnvironmentObject var choice: ShareString

    ```


    Finally, within each structure that defines an `@EnvironmentObject`, we can access
    the actual data to share by using the `@EnvironmentObject` name plus the `@Published`
    property name to share like this:


    ```

    $choice.message

    ```


    In this case, `choice` is the `@EnvironmentObject` name and `message` is the `@Published`
    property defined within the `ObservableObject`. To see how to share data using
    an `ObservableObject`, follow these steps:


    1. Create a new SwiftUI iOS App project and give it any name you wish such as
    `NavigationViewObservable`.


    2. Click the `ContentView` file in the Navigator pane.


    3. Create an `ObservableObject` class under the `import SwiftUI` line like this:


    ```

    class ShareString: ObservableObject {

    @Published var message = ""

    }

    ```


    The `@Published` variable will contain the data to share between structures within
    the Navigation View.


    4. Create a `StateObject` variable under the `struct ContentView: View` line like
    this:


    ```

    struct ContentView: View {

    @StateObject var showMe = ShareString()

    ```


    This creates a new object (`showMe`) based on the `ShareString` `ObservableObject`.


    5. Add a `NavigationView` and a `VStack` inside the `var body: some View` line
    like this:


    ```

    var body: some View {

    NavigationView {

    VStack (spacing: 26) {

    }

    }

    ```


    6. Add a `TextField`, two `NavigationLinks`, and a `.navigationTitle` modifier
    inside the `VStack` like this:


    ```

    NavigationView {

    VStack (spacing: 26) {

    TextField("Type here", text: $showMe.message)

    NavigationLink(destination: FileView()) {

    Text("Send a message")

    }

    NavigationLink(destination: SeparateFileView()) {

    Text("Separate file")

    }

    .navigationTitle("Sharing Data")

    }

    }.environmentObject(showMe)

    ```


    Make sure you add the `.environmentObject(showMe)` modifier at the end of the
    `NavigationView`. This allows sharing of the `showMe` `ObservableObject` `ShareString`
    class. The preceding `NavigationLinks` open a structure called `FileView` and
    `SeparateFileView` that we need to create.


    7. Add the following structure underneath the `struct ContentView` structure like
    this:


    ```

    struct FileView: View {

    @EnvironmentObject var choice: ShareString

    var body: some View {

    HStack {

    Spacer()

    VStack {

    Spacer()

    TextField("Type here:", text: $choice.message)

    Spacer()

    }

    Spacer()

    }.background(Color.yellow)

    }

    }

    ```


    Notice that this structure defines an `@EnvironmentObject` variable that can hold
    a `ShareString` `ObservableObject`. In the `TextField`, we must store the text
    in the `choice` `@EnvironmentObject` that uses the `message` `@Published` property
    (`$choice.message`). The entire `ContentView` file should look like this:


    8. Choose `File` ➤ `New` ➤ `File`. A dialog appears (see Figure \[16-4\]).


    9. Click `iOS` near the top of the dialog, click `Swift File`, and then click
    `Next`. Xcode asks for a name to give your newly created file.


    10. Type `SeparateFile` and click `Create`. Xcode creates a new Swift file.


    11. Delete all code currently in the `SeparateFile` and replace it with the following:


    ```

    import SwiftUI

    struct SeparateFileView: View {

    @EnvironmentObject var passedData: ShareString

    var body: some View {

    HStack {

    Spacer()

    VStack {

    Spacer()

    TextField("Type here", text: $passedData.message)

    Spacer()

    }

    Spacer()

    }.background(Color.orange)

    }

    }

    struct SeparateFileView_Previews: PreviewProvider {

    static var previews: some View {

    SeparateFileView()

    }

    }

    ```


    Notice that this structure also declares an `@EnvironmentObject` that can hold
    a `ShareString` `ObservableObject`. Then the `TextField` uses the `passedData`
    `@EnvironmentObject` to access the `message` `@Published` property (`$passedData.message`).


    12. Click the `ContentView` file in the Navigator pane.


    13. Click the `Live Preview` icon in the Canvas pane.


    14. Click in the `TextField` and type a phrase.


    15. Click the `Send a message` navigation link to open the `FileView` structure.
    Notice that what you typed in step 14 now appears in the `FileView` `TextField`.


    16. Edit the text in the `TextField` and then click the `Back` button. Notice
    that the modified text now appears in the `ContentView` `TextField`.


    17. Edit the text in the `TextField` and then click the `Separate file` navigation
    link. The edited text now appears in the `SeparateFileView` `TextField`.


    18. Edit the text in the `TextField` and click the `Back` button. Notice that
    the modified text now appears in the `ContentView` `TextField`. All this shows
    how the various structures can access the `@Published` property in the `ObservableObject`.'
