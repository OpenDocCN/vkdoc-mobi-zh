    # 动画选项


    到目前为止，我们一直使用 `.animation` 修饰符的 `.default` 设置。虽然这有效，但你还可以选择其他几种动画选项：


    - `.easeIn` – 动画开始时较慢，然后加速

    - `.easeOut` – 动画在接近结束时减速

    - `.easeInOut` – 动画开始时较慢，然后加速，最后在接近结束时减速（与 `.default` 相同）

