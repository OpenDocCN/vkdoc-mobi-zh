- fmt: "# Using Lists in a Navigation View\n\nRather than display `NavigationLink`s\
    \ individually, one common technique is to create a `List` (see Chapter [13](#329781_6_En_13_Chapter.xhtml))\
    \ where each item in the `List` acts like a link. By selecting an item in a `List`,\
    \ the Navigation View can then open a new view. This combination of `List`s within\
    \ a Navigation View is commonly used in the Settings app on iOS.\n\nFirst, define\
    \ a structure to store related information together in an array and make this\
    \ structure `Identifiable` so each structure will have a unique ID like this:\n\
    \n```\nstruct Books: Identifiable {\n    var id = UUID()\n    var title: String\n\
    \    var summary: String\n}\n```\n\nNext, create an array that can hold this structure:\n\
    \n```\nlet books: [Books] = [\n    Books(title: \"Fahrenheit 451\", summary: \"\
    Dystopian novel about book burning\"),\n    Books(title: \"The Martian Chronicles\"\
    , summary: \"Tales about the colonization of Mars\"),\n    Books(title: \"Something\
    \ Wicked This Way Comes\", summary: \"A sinister circus comes to town\"),\n  \
    \  Books(title: \"The Illustrated Man\", summary: \"Short stories revolving around\
    \ a tattooed man\")\n]\n```\n\nNow create a structure to define a view to define\
    \ the user interface to appear when the user selects a navigation link. This structure\
    \ needs to accept data stored in the array of structures such as:\n\n```\nstruct\
    \ BookView: View {\n    var bookInfo: Books\n    var body: some View {\n     \
    \   VStack (spacing: 24) {\n            Text(\"\\(bookInfo.title)\")\n       \
    \         .font(.largeTitle)\n            Text(\"\\(bookInfo.summary)\")\n   \
    \             .font(.body)\n        }\n    }\n}\n```\n\nFinally, create a `NavigationView`\
    \ that displays a `List`. The `List` must use the array to create `NavigationLink`s\
    \ that display data from the array of structures and also define the user interface\
    \ screen to appear when the user selects a `NavigationLink`:\n\n```\nNavigationView\
    \ {\n    List(books) { book in\n        NavigationLink(destination: BookView(bookInfo:\
    \ book)) {\n            Text(\"\\(book.title)\")\n        }\n    }\n}\n```\n\n\
    To see how to use a `List` within a Navigation View, follow these steps:\n\n1.\
    \  Create a new SwiftUI iOS App project and give it any name you wish such as\
    \ \"NavigationViewList.\"\n2.  Click the `ContentView` file in the Navigator pane.\n\
    3.  Add the following structure under the `import SwiftUI` line like this:\n\n\
    ```\nstruct Books: Identifiable {\n    var id = UUID()\n    var title: String\n\
    \    var summary: String\n}\n```\n\n4.  Add an array of structures underneath\
    \ the `struct ContentView: View` line like this:\n\n```\nlet books: [Books] =\
    \ [\n    Books(title: \"Fahrenheit 451\", summary: \"Dystopian novel about book\
    \ burning\"),\n    Books(title: \"The Martian Chronicles\", summary: \"Tales about\
    \ the colonization of Mars\"),\n    Books(title: \"Something Wicked This Way Comes\"\
    , summary: \"A sinister circus comes to town\"),\n    Books(title: \"The Illustrated\
    \ Man\", summary: \"Short stories revolving around a tattooed man\")\n]\n```\n\
    \n5.  Add the following structure above the `struct ContentView_Previews: PreviewProvider`\
    \ line like this:\n\n```\nstruct BookView: View {\n    var bookInfo: Books\n \
    \   var body: some View {\n        VStack (spacing: 24) {\n            Text(\"\
    \\(bookInfo.title)\")\n                .font(.largeTitle)\n            Text(\"\
    \\(bookInfo.summary)\")\n                .font(.body)\n        }\n    }\n}\n```\n\
    \n6.  Add a `NavigationView`, `List`, and `NavigationLink` inside the `var body:\
    \ some View` like this:\n\n```\nvar body: some View {\n    NavigationView {\n\
    \        List(books) { book in\n            NavigationLink(destination: BookView(bookInfo:\
    \ book)) {\n                Text(\"\\(book.title)\")\n            }\n        }.navigationBarTitle(\"\
    Book List\")\n    }\n}\n```\n\nThe entire `ContentView` file should look like\
    \ this:\n\n![../images/329781_6_En_16_Chapter/329781_6_En_16_Fig5_HTML.jpg](images/329781_6_En_16_Chapter/329781_6_En_16_Fig5_HTML.jpg)\n\
    \nFigure 16-5: A List of navigation links\n\n7.  Click the Live Preview icon on\
    \ the Canvas pane. Notice that the `List` displays book titles as navigation links\
    \ as shown in Figure [16-5](#329781_6_En_16_Chapter.xhtml#Fig5).\n\n```\nimport\
    \ SwiftUI\n\nstruct Books: Identifiable {\n    var id = UUID()\n    var title:\
    \ String\n    var summary: String\n}\n\nstruct ContentView: View {\n    let books:\
    \ [Books] = [\n        Books(title: \"Fahrenheit 451\", summary: \"Dystopian novel\
    \ about book burning\"),\n        Books(title: \"The Martian Chronicles\", summary:\
    \ \"Tales about the colonization of Mars\"),\n        Books(title: \"Something\
    \ Wicked This Way Comes\", summary: \"A sinister circus comes to town\"),\n  \
    \      Books(title: \"The Illustrated Man\", summary: \"Short stories revolving\
    \ around a tattooed man\")\n    ]\n\n    var body: some View {\n        NavigationView\
    \ {\n            List(books) { book in\n                NavigationLink(destination:\
    \ BookView(bookInfo: book)) {\n                    Text(\"\\(book.title)\")\n\
    \                }\n            }.navigationBarTitle(\"Book List\")\n        }\n\
    \    }\n}\n\nstruct BookView: View {\n    var bookInfo: Books\n    var body: some\
    \ View {\n        VStack (spacing: 24) {\n            Text(\"\\(bookInfo.title)\"\
    )\n                .font(.largeTitle)\n            Text(\"\\(bookInfo.summary)\"\
    )\n                .font(.body)\n        }\n    }\n}\n\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```\n\n![../images/329781_6_En_16_Chapter/329781_6_En_16_Fig6_HTML.jpg](images/329781_6_En_16_Chapter/329781_6_En_16_Fig6_HTML.jpg)\n\
    \nFigure 16-6: The user interface that appears after selecting a navigation link\n\
    \n8.  Click any book title (navigation link). The user interface defined by the\
    \ `struct BookView` appears with a Back button in the upper left corner as shown\
    \ in Figure [16-6](#329781_6_En_16_Chapter.xhtml#Fig6).\n\n`List`s can be a convenient\
    \ way to create navigation links within a Navigation View. Since `List`s typically\
    \ rely on arrays for data, you'll likely need to create a structure to store in\
    \ an array.\n\n## Summary\n\nA Navigation View is a handy way to display multiple\
    \ views. One structure defines a Navigation View with one or more `NavigationLink`s.\
    \ These `NavigationLink`s open views that can be as simple as `Text` or `Image`\
    \ views, but more often are views defined by structures. These structures can\
    \ be stored in the same file or in a separate file.\n\nA `NavigationLink` can\
    \ pass data to another view, much like passing data to a function. This other\
    \ view needs to define a property, and then the `NavigationLink` can pass data\
    \ to that property. If you want to pass data to another view that can modify the\
    \ data, you can use two different methods.\n\nThe first method uses `@State` and\
    \ `@Binding` variables and forces the `NavigationLink` to pass data to each view\
    \ that it opens. The second method uses `ObservableObject`s, `StateObject`s, and\
    \ `EnvironmentObject`s to share data among multiple views.\n\nNavigation Views\
    \ are often used with `List`s. By tapping on an item in a `List`, users can jump\
    \ to a new view. `List`s typically retrieve data stored in an array. That array\
    \ can store individual data types like strings, but more often the array stores\
    \ structures to group related data together. Items in a `List` can naturally create\
    \ navigation links to another view such as items found in the Settings app in\
    \ iOS."
  raw: '## Using Lists in a Navigation View


    Rather than display NavigationLinks individually, one common technique is to create
    a List (see Chapter [13](#329781_6_En_13_Chapter.xhtml)) where each item in the
    List acts like a link. By selecting an item in a List, the Navigation View can
    then open a new view. This combination of Lists within a Navigation View is commonly
    used in the Settings app on iOS.


    First, define a structure to store related information together in an array and
    make this structure Identifiable so each structure will have a unique ID like
    this:


    ```

    struct Books: Identifiable {

    var id = UUID()

    var title: String

    var summary: String

    }

    ```


    Next, create an array that can hold this structure:


    ```

    let books: [Books] = [

    Books(title: "Fahrenheit 451", summary: "Dystopian novel about book burning"),

    Books(title: "The Martian Chronicles", summary: "Tales about the colonization
    of Mars"),

    Books(title: "Something Wicked This Way Comes", summary: "A sinister circus comes
    to town"),

    Books(title: "The Illustrated Man", summary: "Short stories revolving around a
    tattooed man")

    ]

    ```


    Now create a structure to define a view to define the user interface to appear
    when the user selects a navigation link. This structure needs to accept data stored
    in the array of structures such as


    ```

    struct BookView: View {

    var bookInfo: Books

    var body: some View {

    VStack (spacing: 24) {

    Text("\(bookInfo.title)")

    .font(.largeTitle)

    Text("\(bookInfo.summary)")

    .font(.body)

    }

    }

    }

    ```


    Finally, create a NavigationView that displays a List. The List must use the array
    to create NavigationLinks that display data from the array of structures and also
    define the user interface screen to appear when the user selects a NavigationLink:


    ```

    NavigationView {

    List(books) { book in

    NavigationLink(destination: BookView(bookInfo: book)) {

    Text("\(book.title)")

    }

    }

    }

    ```


    To see how to use a List within a Navigation View, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “NavigationViewList.”


    2.  Click the ContentView file in the Navigator pane.


    3.  Add the following structure under the import SwiftUI line like this:


    1.  Add an array of structures underneath the struct ContentView: View line like
    this:


    ```

    struct Books: Identifiable {

    var id = UUID()

    var title: String

    var summary: String

    }

    ```


    1.  Add the following structure above the struct ContentView_Previews: PreviewProvider
    line like this:


    ```

    let books: [Books] = [

    Books(title: "Fahrenheit 451", summary: "Dystopian novel about book burning"),

    Books(title: "The Martian Chronicles", summary: "Tales about the colonization
    of Mars"),

    Books(title: "Something Wicked This Way Comes", summary: "A sinister circus comes
    to town"),

    Books(title: "The Illustrated Man", summary: "Short stories revolving around a
    tattooed man")

    ]

    ```


    1.  Add a NavigationView, List, and NavigationLink inside the var body: some View
    like this:


    ```

    struct BookView: View {

    var bookInfo: Books

    var body: some View {

    VStack (spacing: 24) {

    Text("\(bookInfo.title)")

    .font(.largeTitle)

    Text("\(bookInfo.summary)")

    .font(.body)

    }

    }

    }

    ```


    ```

    var body: some View {

    NavigationView {

    List(books) { book in

    NavigationLink(destination: BookView(bookInfo: book)) {

    Text("\(book.title)")

    }

    }.navigationBarTitle("Book List")

    }

    }

    ```


    The entire ContentView file should look like this:


    ![../images/329781_6_En_16_Chapter/329781_6_En_16_Fig5_HTML.jpg](images/329781_6_En_16_Chapter/329781_6_En_16_Fig5_HTML.jpg)


    Figure 16-5


    A List of navigation links


    1.  Click the Live Preview icon on the Canvas pane. Notice that the List displays
    book titles as navigation links as shown in Figure [16-5](#329781_6_En_16_Chapter.xhtml#Fig5).


    ```

    import SwiftUI

    struct Books: Identifiable {

    var id = UUID()

    var title: String

    var summary: String

    }

    struct ContentView: View {

    let books: [Books] = [

    Books(title: "Fahrenheit 451", summary: "Dystopian novel about book burning"),

    Books(title: "The Martian Chronicles", summary: "Tales about the colonization
    of Mars"),

    Books(title: "Something Wicked This Way Comes", summary: "A sinister circus comes
    to town"),

    Books(title: "The Illustrated Man", summary: "Short stories revolving around a
    tattooed man")

    ]

    var body: some View {

    NavigationView {

    List(books) { book in

    NavigationLink(destination: BookView(bookInfo: book)) {

    Text("\(book.title)")

    }

    }.navigationBarTitle("Book List")

    }

    }

    }

    struct BookView: View {

    var bookInfo: Books

    var body: some View {

    VStack (spacing: 24) {

    Text("\(bookInfo.title)")

    .font(.largeTitle)

    Text("\(bookInfo.summary)")

    .font(.body)

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    ![../images/329781_6_En_16_Chapter/329781_6_En_16_Fig6_HTML.jpg](images/329781_6_En_16_Chapter/329781_6_En_16_Fig6_HTML.jpg)


    Figure 16-6


    The user interface that appears after selecting a navigation link


    1.  Click any book title (navigation link). The user interface defined by the
    struct BookView appears with a Back button in the upper left corner as shown in
    Figure [16-6](#329781_6_En_16_Chapter.xhtml#Fig6).


    Lists can be a convenient way to create navigation links within a Navigation View.
    Since Lists typically rely on arrays for data, you’ll likely need to create a
    structure to store in an array.


    ## Summary


    A Navigation View is a handy way to display multiple views. One structure defines
    a Navigation View with one or more NavigationLinks. These NavigationLinks open
    views that can be as simple as Text or Image views, but more often are views defined
    by structures. These structures can be stored in the same file or in a separate
    file.


    A NavigationLink can pass data to another view, much like passing data to a function.
    This other view needs to define a property, and then the NavigationLink can pass
    data to that property. If you want to pass data to another view that can modify
    the data, you can use two different methods.


    The first method uses @State and @Binding variables and forces the NavigationLink
    to pass data to each view that it opens. The second method uses ObservableObjects,
    StateObjects, and EnvironmentObjects to share data among multiple views.


    Navigation Views are often used with Lists. By tapping on an item in a List, users
    can jump to a new view. Lists typically retrieve data stored in an array. That
    array can store individual data types like strings, but more often the array stores
    structures to group related data together. Items in a List can naturally create
    navigation links to another view such as items found in the Settings app in iOS.'
  trans: "\n# 在导航视图中使用列表\n\n另一种常见做法是不单独显示`NavigationLink`，而是创建一个`List`（参见第 13 章），让`List`中的每个条目都像链接一样工作。通过选择`List`中的条目，导航视图可以打开一个新视图。这种在导航视图中组合`List`的方式在\
    \ iOS 的“设置”应用中很常见。\n\n首先，定义一个结构体，用于将相关信息存储在一个数组中，并使该结构体符合`Identifiable`协议，这样每个结构体都会拥有一个唯一的\
    \ ID，如下所示：\n\n```\nstruct Books: Identifiable {\n    var id = UUID()\n    var\
    \ title: String\n    var summary: String\n}\n```\n\n接下来，创建一个可以容纳该结构体的数组：\n\n```\n\
    let books: [Books] = [\n    Books(title: \"华氏 451 度\", summary: \"关于焚书的反乌托邦小说\"\
    ),\n    Books(title: \"火星编年史\", summary: \"关于火星殖民的故事\"),\n    Books(title: \"\
    邪恶降临\", summary: \"一个邪恶的马戏团来到小镇\"),\n    Books(title: \"纹身人\", summary: \"围绕一个纹身男子展开的短篇故事集\"\
    )\n]\n```\n\n现在，创建一个结构体来定义一个视图，该视图将在用户选择导航链接时显示。这个结构体需要接收存储在结构体数组中的数据，例如：\n\n\
    ```\nstruct BookView: View {\n    var bookInfo: Books\n    var body: some View\
    \ {\n        VStack (spacing: 24) {\n            Text(\"\\(bookInfo.title)\")\n\
    \                .font(.largeTitle)\n            Text(\"\\(bookInfo.summary)\"\
    )\n                .font(.body)\n        }\n    }\n}\n```\n\n最后，创建一个`NavigationView`来显示一个`List`。该`List`必须使用数组来创建`NavigationLink`，这些链接不仅显示结构体数组中的数据，还定义了当用户选择`NavigationLink`时将出现的用户界面屏幕：\n\
    \n```\nNavigationView {\n    List(books) { book in\n        NavigationLink(destination:\
    \ BookView(bookInfo: book)) {\n            Text(\"\\(book.title)\")\n        }\n\
    \    }\n}\n```\n\n要了解如何在导航视图中使用`List`，请遵循以下步骤：\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其取任意名称，例如“NavigationViewList”。\n\
    2.  在导航器窗格中单击`ContentView`文件。\n3.  在`import SwiftUI`代码行下方添加如下结构体：\n\n```\nstruct\
    \ Books: Identifiable {\n    var id = UUID()\n    var title: String\n    var summary:\
    \ String\n}\n```\n\n4.  在`struct ContentView: View`代码行下方添加一个结构体数组，如下所示：\n\n```\n\
    let books: [Books] = [\n    Books(title: \"华氏 451 度\", summary: \"关于焚书的反乌托邦小说\"\
    ),\n    Books(title: \"火星编年史\", summary: \"关于火星殖民的故事\"),\n    Books(title: \"\
    邪恶降临\", summary: \"一个邪恶的马戏团来到小镇\"),\n    Books(title: \"纹身人\", summary: \"围绕一个纹身男子展开的短篇故事集\"\
    )\n]\n```\n\n5.  在`struct ContentView_Previews: PreviewProvider`代码行上方添加如下结构体：\n\
    \n```\nstruct BookView: View {\n    var bookInfo: Books\n    var body: some View\
    \ {\n        VStack (spacing: 24) {\n            Text(\"\\(bookInfo.title)\")\n\
    \                .font(.largeTitle)\n            Text(\"\\(bookInfo.summary)\"\
    )\n                .font(.body)\n        }\n    }\n}\n```\n\n6.  在`var body: some\
    \ View`内部添加`NavigationView`、`List`和`NavigationLink`，如下所示：\n\n```\nvar body: some\
    \ View {\n    NavigationView {\n        List(books) { book in\n            NavigationLink(destination:\
    \ BookView(bookInfo: book)) {\n                Text(\"\\(book.title)\")\n    \
    \        }\n        }.navigationBarTitle(\"书籍列表\")\n    }\n}\n```\n\n完整的`ContentView`文件应如下所示：\n\
    \n![../images/329781_6_En_16_Chapter/329781_6_En_16_Fig5_HTML.jpg](img/329781_6_En_16_Fig5_HTML.jpg)\n\
    \n图 16-5：导航链接列表\n\n7.  单击画布面板上的“实时预览”图标。注意，`List`将书籍标题显示为导航链接，如图 16-5 所示。\n\n\
    ```\nimport SwiftUI\n\nstruct Books: Identifiable {\n    var id = UUID()\n   \
    \ var title: String\n    var summary: String\n}\n\nstruct ContentView: View {\n\
    \    let books: [Books] = [\n        Books(title: \"华氏 451 度\", summary: \"关于焚书的反乌托邦小说\"\
    ),\n        Books(title: \"火星编年史\", summary: \"关于火星殖民的故事\"),\n        Books(title:\
    \ \"邪恶降临\", summary: \"一个邪恶的马戏团来到小镇\"),\n        Books(title: \"纹身人\", summary:\
    \ \"围绕一个纹身男子展开的短篇故事集\")\n    ]\n\n    var body: some View {\n        NavigationView\
    \ {\n            List(books) { book in\n                NavigationLink(destination:\
    \ BookView(bookInfo: book)) {\n                    Text(\"\\(book.title)\")\n\
    \                }\n            }.navigationBarTitle(\"书籍列表\")\n        }\n  \
    \  }\n}\n\nstruct BookView: View {\n    var bookInfo: Books\n    var body: some\
    \ View {\n        VStack (spacing: 24) {\n            Text(\"\\(bookInfo.title)\"\
    )\n                .font(.largeTitle)\n            Text(\"\\(bookInfo.summary)\"\
    )\n                .font(.body)\n        }\n    }\n}\n\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```\n\n![../images/329781_6_En_16_Chapter/329781_6_En_16_Fig6_HTML.jpg](img/329781_6_En_16_Fig6_HTML.jpg)\n\
    \n图 16-6：选择导航链接后显示的用户界面\n\n8.  单击任意书籍标题（导航链接）。由`struct BookView`定义的用户界面将出现，并在左上角显示一个“返回”按钮，如图\
    \ 16-6 所示。\n\n`List`可以成为在导航视图中创建导航链接的便捷方式。由于`List`通常依赖数组来提供数据，因此你很可能需要创建一个结构体来存储在数组中。\n\
    \n## 总结\n\n导航视图是显示多个视图的一种便捷方式。一个结构体可以定义一个包含一个或多个`NavigationLink`的导航视图。这些`NavigationLink`可以打开像`Text`或`Image`视图这样简单的视图，但更常见的是打开由结构体定义的视图。这些结构体可以存储在同一个文件中，也可以存储在单独的文件中。\n\
    \n`NavigationLink`可以将数据传递到另一个视图，这类似于向函数传递数据。另一个视图需要定义一个属性，然后`NavigationLink`就可以将数据传递到该属性。如果希望将数据传递到另一个可以修改该数据的视图，可以使用两种不同的方法。\n\
    \n第一种方法使用`@State`和`@Binding`变量，并强制`NavigationLink`将数据传递给其打开的每个视图。第二种方法使用`ObservableObject`、`StateObject`和`EnvironmentObject`在多个视图之间共享数据。\n\
    \n导航视图通常与`List`一起使用。通过点击`List`中的某个条目，用户可以跳转到一个新视图。`List`通常检索存储在数组中的数据。该数组可以存储像字符串这样的单一数据类型，但更常见的是存储结构体以将相关数据分组在一起。`List`中的条目可以自然而然地创建指向另一个视图的导航链接，就像\
    \ iOS 中“设置”应用里的条目一样。\n"
- fmt: '# Using the Tab View


    Most apps consist of multiple screens. Chapter 16 explained how to create apps
    that use a Navigation View that lets users jump from one screen to another in
    sequential order. This can be handy for showing more details such as the Settings
    app in iOS that lets you pick various options and then view multiple screens to
    choose different settings.


    However, one problem with the Navigation View is that if you link too many screens
    together, navigation becomes cumbersome since you must navigate from the first
    screen to the second to the third just to get to the fourth screen. Then you have
    to reverse the entire process to get back from the fourth screen to the first
    screen.


    To provide an alternate way of jumping from one screen to another, you can use
    the Tab View, which displays icons and/or text at the bottom of the screen. Selecting
    a tab (icon and/or text) then jumps to a new screen. For example, the Clock app
    displays icons/text at the bottom of the screen to let you jump to different features
    as shown in Figure 17-1.


    ![../images/329781_6_En_17_Chapter/329781_6_En_17_Fig1_HTML.jpg](images/329781_6_En_17_Chapter/329781_6_En_17_Fig1_HTML.jpg)


    Figure 17-1


    A Tab View makes it easy to jump from one screen to another


    Since the tab bar appears at the bottom of the screen no matter which screen you’re
    viewing, Tab Views make it easy to jump to the screen you want to see at any time.


    ## Using a Tab View


    A Tab View contains multiple views using code like this:


    ```

    TabView {

    // Put multiple views here

    }

    ```


    Each view stored within a Tab View can be as simple as an individual view (such
    as a `Text` or `Image` view) or more detailed such as a structure that defines
    a view. The first part of creating a Tab View is simply listing all the views
    you want to use within the Tab View like this:


    ```

    TabView {

    Text("One")

    Text("Two")

    Text("Three")

    Text("Four")

    }

    ```


    After you’ve defined the views to display within a Tab View, the next step is
    to define an icon and/or text to represent each view. To do this, add a `.tabItem`
    modifier to each view that uses an `Image` and a `Text` view like this:


    ```

    Text("One")

    .tabItem {

    Image(systemName: "heart.fill")

    Text("Tab1")

    }

    ```


    By attaching a `.tabItem` modifier to each view and using an `Image` and `Text`
    view to define its contents, you can create a tab bar that appears at the bottom
    of the screen as shown in Figure 17-2.


    ![../images/329781_6_En_17_Chapter/329781_6_En_17_Fig2_HTML.jpg](images/329781_6_En_17_Chapter/329781_6_En_17_Fig2_HTML.jpg)


    Figure 17-2


    A typical tab bar displays icons and text


    The `Image` view can display any image but typically displays an icon that you
    can view inside of the SF Symbols app (`https://developer.apple.com/sf-symbols`).


    Note


    Tabs can appear as an image and text, just an image, or just text. For clarity,
    it’s usually best to define a tab as both an image and text.


    To see how to create a simple Tab View, follow these steps:


    1. Create a new SwiftUI iOS App project and give it any name you wish such as
    “SimpleTabView.”

    2. Click the `ContentView` file in the Navigator pane.

    3. Add the following views inside the `var body: some View` like this:


    ```

    var body: some View {

    TabView {

    Text("One")

    Text("Two")

    Text("Three")

    Text("Four")

    }

    }

    ```


    To create a tab bar at the bottom of the screen, we need to add the `.tabItem`
    modifier that uses an `Image` and a `Text` view.


    1. Add the following `.tabItem` modifiers to each view like this:


    ```

    var body: some View {

    TabView {

    Text("One")

    .tabItem {

    Image(systemName: "heart.fill")

    Text("One")

    }

    Text("Two")

    .tabItem {

    Image(systemName: "hare.fill")

    Text("Two")

    }

    Text("Three")

    .tabItem {

    Image(systemName: "tortoise.fill")

    Text("Three")

    }

    Text("Four")

    .tabItem {

    Image(systemName: "folder.fill")

    Text("Four")

    }

    }

    }

    ```


    Feel free to use different SF Symbol icons and text to customize the buttons in
    the tab bar at the bottom of the screen. Rather than use a combination of an `Image`
    and a `Text` view, you can also use a single `Label` view like this:


    1. Click the Live Preview icon on the Canvas pane.

    2. Click the different tabs at the bottom of the screen to see the different views.


    **Note** Since a Tab View represents each view as an icon/text, Tab Views can
    only display a maximum of five items at the bottom of the screen. If you store
    more than five views in a Tab View, the Tab View automatically creates a More
    icon that hides any additional views in a second tab bar.


    ```

    Label("Four", systemImage: "folder.fill")

    ```


    To see how the Tab View automatically creates a More button in the tab bar if
    you display more than five views in a Tab View, follow these steps:


    1. Open the previous Xcode project (`SimpleTabView`) that you created earlier.

    2. Edit the `ContentView` file so the entire code looks like this:


    ```

    import SwiftUI

    struct ContentView: View {

    var body: some View {

    TabView {

    Text("One")

    .tabItem {

    Image(systemName: "heart.fill")

    Text("One")

    }

    Text("Two")

    .tabItem {

    Image(systemName: "hare.fill")

    Text("Two")

    }

    Text("Three")

    .tabItem {

    Image(systemName: "tortoise.fill")

    Text("Three")

    }

    Text("Four")

    .tabItem {

    Image(systemName: "folder.fill")

    Text("Four")

    }

    Text("Five")

    .tabItem {

    Image(systemName: "internaldrive.fill")

    Text("Five")

    }

    Text("Six")

    .tabItem {

    Image(systemName: "cloud.drizzle.fill")

    Text("Six")

    }

    }.accentColor(.purple)

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    Notice that the `.accentColor` modifier on the Tab View lets you define a color
    for the tab bar.


    ![../images/329781_6_En_17_Chapter/329781_6_En_17_Fig3_HTML.jpg](images/329781_6_En_17_Chapter/329781_6_En_17_Fig3_HTML.jpg)


    Figure 17-3


    The More icon automatically appears when a Tab View contains more than five tabs


    1. Click the Live Preview icon on the Canvas pane. The tab bar appears, but now
    a More icon appears on the far right as shown in Figure 17-3.


    ![../images/329781_6_En_17_Chapter/329781_6_En_17_Fig4_HTML.jpg](images/329781_6_En_17_Chapter/329781_6_En_17_Fig4_HTML.jpg)


    Figure 17-4


    The More icon displays a navigation view


    1. Click the More icon. Notice that a Navigation View appears, listing your additional
    tabs in a list as shown in Figure 17-4.


    ![../images/329781_6_En_17_Chapter/329781_6_En_17_Fig5_HTML.jpg](images/329781_6_En_17_Chapter/329781_6_En_17_Fig5_HTML.jpg)


    Figure 17-5


    The drag and drop screen for modifying a tab bar


    1. Click the `Five` or `Six` item in the navigation view to see that particular
    `Text` view.

    2. Click the Edit button in the upper right corner. Notice that a new screen appears,
    letting the user drag and drop icons on the tab bar to rearrange them as shown
    in Figure 17-5.

    3. Drag and drop the `Five` or `Six` icon onto the tab bar. Notice that when you
    do that, the screen highlights the two icons that are not currently visible on
    the tab bar.

    4. Click the Done button when you’re finished rearranging icons on the tab bar.


    Because the tab bar can only show a maximum of five icons on the tab bar, it’s
    best to limit the number of options to five or less.'
