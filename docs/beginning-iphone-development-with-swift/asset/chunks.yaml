    ## Using Sliders


    Like a Stepper, a Slider lets the user choose a numeric value without typing a
    specific number. While a Stepper forces users to increment/decrement values by
    a fixed amount, Sliders make it easy for users to choose between a range of values
    quickly by simply changing the Slider’s position. This makes Sliders better suited
    than a Stepper for letting the user choose from a wide range of values.


    To see how a Slider works, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “Slider.”


    2.  Click the ContentView file in the Navigator pane.


    3.  Add the following State variable under the struct ContentView: View line:


    1.  Create a VStack inside the var body: some View and add a Text and a Slider
    like this:


    ```

    struct ContentView: View {

    @State var sliderValue = 0.0

    ```


    1.  Click the Live Preview icon in the Canvas pane and drag the slider left and
    right. Notice that the value of this Slider ranges in value from 0 to 1 as a Double
    value, which displays decimal values.


    ```

    var body: some View {

    VStack (spacing: 28){

    Text("Slider value = \(sliderValue)")

    Slider(value: $sliderValue)

    }

    }

    ```


    ### Changing the Color of a Slider


    By default, a Slider displays the color blue as you drag the slider to the right.
    If you want to change that color, you can use the .accentColor modifier like this:


    ```

    Slider(value: $sliderValue)

    .accentColor(.red)

    ```


    ### Defining a Range for a Slider


    By default, a Slider ranges in value from 0 to 1\. However, you may want to define
    a different range for the Slider such as


    ```

    Slider(value: $sliderValue, in: 1...50)

    ```


    This defines a minimum value for the Slider as 1 and a maximum value as 50\. Just
    remember that these values are actually decimal values such as 1.0 through 50.0.


    ### Defining a Step Increment for a Slider


    If the range of a Slider is greater than 1, dragging the Slider increments/decrements
    it by 1\. To define a different value for the Slider to increment/decrement, you
    need to define a step: parameter such as


    ```

    Slider(value: $sliderValue, in: 1...50, step: 4)

    ```


    This defines the Slider to change values by 4 such as going from 1 to 5 to 9.


    ### Displaying Minimum and Maximum Labels on a Slider


    To make a Slider easier to understand, you can display a minimum and a maximum
    value label on each end of the Slider. That way, you can make it clear what the
    minimum and maximum values of a Slider might be such as


    ```

    Slider(value: $sliderValue, in: 1...50, step: 4) {

    Text("Slider")

    } minimumValueLabel: {

    Text("1")

    } maximumValueLabel: {

    Text("50")

    }

    ```


    This defines a Slider that displays 1 at the far left and 50 at the far right
    as shown in Figure [9-4](#329781_6_En_9_Chapter.xhtml#Fig4).


    ![../images/329781_6_En_9_Chapter/329781_6_En_9_Fig4_HTML.jpg](images/329781_6_En_9_Chapter/329781_6_En_9_Fig4_HTML.jpg)


    Figure 9-4


    Displaying minimum and maximum labels on a Slider


    Note


    The minimumValueLabel and maximumValueLabel are only available in iOS 15.0 or
    higher.


    To see how all these different Sliders work, edit the ContentView file as follows:


    ```

    import SwiftUI

    @available(iOS 15.0, *)

    struct ContentView: View {

    @State var sliderValue = 0.0

    var body: some View {

    VStack (spacing: 28){

    Text("Slider value = \(sliderValue)")

    Slider(value: $sliderValue)

    .padding()

    Slider(value: $sliderValue, in: 1...50)

    .padding()

    Slider(value: $sliderValue, in: 1...50, step: 4)

    .padding()

    Slider(value: $sliderValue, in: 1...50, step: 4) {

    Text("Slider")

    } minimumValueLabel: {

    Text("1")

    } maximumValueLabel: {

    Text("50")

    }.padding()

    }

    }

    }

    @available(iOS 15.0, *)

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    Make sure you also add the @available(iOS 15.0, *) line inside the ____App file
    such as


    ```

    import SwiftUI

    @available(iOS 15.0, *)

    @main

    struct Slider_Chapter_9App: App {

    var body: some Scene {

    WindowGroup {

    ContentView()

    }

    }

    }

    ```


    When you run this project, the top Slider ranges in value from 0 to 1\. That means
    when you drag the other Sliders, the top Slider immediately moves all the way
    to the right. That’s because the top Slider can only have a maximum value of 1,
    while the other sliders range in value from 1 to 50\. So dragging the other Sliders
    always pins the top Slider all the way to the right to represent a value of 1,
    which is the maximum value it can represent.


    ## Summary


    When your app needs the user to input numeric data, a text field can work but
    it might be clumsy, especially if you only want to accept a limited range of numeric
    values. To make it easy to input numeric data, use a Stepper or a Slider.


    Both a Stepper and Slider can define a minimum and maximum value so that way the
    user can’t input numeric data below a minimum value or above a maximum value.
    Both Steppers and Sliders let you define a different increment/decrement value
    other than 1.


    A Stepper takes up less space, but a Slider makes it easier to change values from
    one extreme to another by simply dragging the Slider from side to side.


    By using Steppers and Sliders, you can make it easy for users to input numeric
    data. By using a Toggle, you can make it easy for users to choose between exactly
    two choices such as on/off or yes/no. Steppers, Sliders, and Toggles simply make
    it easy for users to enter only valid data.'
  trans: "\n### 在步进器中定义增量/减量值\n\n通常，`Stepper`（步进器）以 1 为单位增加或减少其值。有时，你可能希望以 1 以外的值（例如\
    \ 2 或 5）进行增减。要为 `Stepper` 定义一个用于增减的整数值，你需要为 `step:` 参数定义一个整数值，如下所示：\n\n```\nStepper(value:\
    \ $newValue, in: 1...10, step: 2) {\n    Text(\"Stepper value = \\(newValue)\"\
    )\n}.padding()\n```\n\n点击画布面板上的实时预览图标，然后点击底部的 `Stepper`。请注意，由于其范围被限制在 1 到 10 之间，点击底部\
    \ `Stepper` 上的 – 和 + 图标不会将其值减小到 1 以下或增大到 10 以上。然而，点击底部 `Stepper` 上的 – 和 + 图标会以\
    \ 2 为单位增减该 `Stepper` 的值。\n\n如果你希望为 `step:` 参数定义一个十进制值，你需要确保 `Stepper` 中使用的每个值都是十进制值，例如：\n\
    \n```\nStepper(value: $decimalValue,\n        in: 1.0...10.0,\n        step: 0.25)\
    \ {\n    Text(\"Stepper value = \\(decimalValue)\")\n}.padding()\n```\n\n在上述 `Stepper`\
    \ 定义中，范围从 1.0（不仅仅是 1）到 10.0（包含，不仅仅是 10）。然后 `step:` 参数被定义为 0.25。最后，`State` 变量（`decimalValue`）也必须被定义为十进制值（`Double`\
    \ 数据类型），如下所示：\n\n```\n@State var decimalValue: Double = 0\n```\n\n整个 `ContentView`\
    \ 文件应如下所示：\n\n```\nimport SwiftUI\n\nstruct ContentView: View {\n    @State var\
    \ newValue = 0\n    @State var decimalValue: Double = 0\n\n    var body: some\
    \ View {\n        VStack {\n            // 基础步进器\n            Stepper(value: $newValue)\
    \ {\n                Text(\"Stepper value = \\(newValue)\")\n            }.padding()\n\
    \n            // 限定范围的步进器\n            Stepper(value: $newValue, in: 1...10) {\n\
    \                Text(\"Stepper value = \\(newValue)\")\n            }.padding()\n\
    \n            // 带增量值的步进器\n            Stepper(value: $newValue, in: 1...10, step:\
    \ 2) {\n                Text(\"Stepper value = \\(newValue)\")\n            }.padding()\n\
    \n            // 带十进制增量值的步进器\n            Stepper(value: $decimalValue,\n    \
    \                in: 1.0...10.0,\n                    step: 0.25) {\n        \
    \        Text(\"Stepper value = \\(decimalValue)\")\n            }.padding()\n\
    \        }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider {\n    static\
    \ var previews: some View {\n        ContentView()\n    }\n}\n```\n\n点击画布面板上的实时预览图标，然后点击底部的\
    \ `Stepper`。请注意，由于其范围被限制在 1.0 到 10.0 之间，点击底部 `Stepper` 上的 – 和 + 图标不会将其值减小到 1.0\
    \ 以下或增大到 10.0 以上。然而，点击底部 `Stepper` 上的 – 和 + 图标会以 0.25 为单位增减该 `Stepper` 的值。\n\n\
    ## 使用滑块\n\n与 `Stepper` 类似，`Slider`（滑块）允许用户在不输入特定数字的情况下选择数值。`Stepper` 强制用户以固定量增减数值，而\
    \ `Slider` 则通过简单的滑动改变滑块位置，使用户能够快速在值域范围内进行选择。这使得 `Slider` 比 `Stepper` 更适合让用户从大范围数值中进行选择。\n\
    \n要了解 `Slider` 的工作方式，请遵循以下步骤：\n\n1.  创建一个新的 SwiftUI iOS 应用项目，并为其随意命名，例如“Slider”。\n\
    2.  在导航器面板中点击 `ContentView` 文件。\n3.  在 `struct ContentView: View` 一行下方添加以下 `State`\
    \ 变量：\n\n```\n@State var sliderValue = 0.0\n```\n\n4.  在 `var body: some View`\
    \ 内部创建一个 `VStack`，并像这样添加一个 `Text` 和一个 `Slider`：\n\n```\nvar body: some View {\n\
    \    VStack (spacing: 28){\n        Text(\"Slider value = \\(sliderValue)\")\n\
    \        Slider(value: $sliderValue)\n    }\n}\n```\n\n5.  点击画布面板中的实时预览图标，并左右拖动滑块。请注意，此\
    \ `Slider` 的值范围是从 0 到 1，作为 `Double` 值显示，即显示十进制数值。\n\n### 更改滑块的颜色\n\n默认情况下，当您向右拖动滑块时，`Slider`\
    \ 显示为蓝色。如果您想更改该颜色，可以使用 `.accentColor` 修饰符，如下所示：\n\n```\nSlider(value: $sliderValue)\n\
    \    .accentColor(.red)\n```\n\n### 为滑块定义范围\n\n默认情况下，`Slider` 的值范围是从 0 到 1。然而，您可能希望为\
    \ `Slider` 定义不同的范围，例如：\n\n```\nSlider(value: $sliderValue, in: 1...50)\n```\n\n\
    这将 `Slider` 的最小值定义为 1，最大值定义为 50。请记住，这些值实际上是十进制值，例如 1.0 到 50.0。\n\n### 为滑块定义步进增量\n\
    \n如果 `Slider` 的范围大于 1，拖动滑块将使其以 1 为单位增减。要为 `Slider` 定义不同的增减值，您需要定义一个 `step:` 参数，例如：\n\
    \n```\nSlider(value: $sliderValue, in: 1...50, step: 4)\n```\n\n这定义了 `Slider`\
    \ 按 4 来改变值，例如从 1 到 5 再到 9。\n\n### 在滑块上显示最小值和最大值标签\n\n为了让 `Slider` 更易于理解，您可以在 `Slider`\
    \ 的两端显示最小值和最大值标签。这样，您可以明确显示 `Slider` 的最小值和最大值可能是什么，例如：\n\n```\nSlider(value: $sliderValue,\
    \ in: 1...50, step: 4) {\n    Text(\"Slider\")\n} minimumValueLabel: {\n    Text(\"\
    1\")\n} maximumValueLabel: {\n    Text(\"50\")\n}\n```\n\n这定义了一个 `Slider`，其最左侧显示\
    \ 1，最右侧显示 50，如图 9-4 所示。\n\n![../images/329781_6_En_9_Chapter/329781_6_En_9_Fig4_HTML.jpg](img/329781_6_En_9_Fig4_HTML.jpg)\n\
    \n**图 9-4** 在滑块上显示最小值和最大值标签\n\n> **注意：** `minimumValueLabel` 和 `maximumValueLabel`\
    \ 仅在 iOS 15.0 或更高版本中可用。\n\n要了解所有这些不同的 `Slider` 如何工作，请如下所示编辑 `ContentView` 文件：\n\
    \n```\nimport SwiftUI\n\n@available(iOS 15.0, *)\nstruct ContentView: View {\n\
    \    @State var sliderValue = 0.0\n\n    var body: some View {\n        VStack\
    \ (spacing: 28){\n            Text(\"Slider value = \\(sliderValue)\")\n     \
    \       Slider(value: $sliderValue)\n                .padding()\n            Slider(value:\
    \ $sliderValue, in: 1...50)\n                .padding()\n            Slider(value:\
    \ $sliderValue, in: 1...50, step: 4)\n                .padding()\n           \
    \ Slider(value: $sliderValue, in: 1...50, step: 4) {\n                Text(\"\
    Slider\")\n            } minimumValueLabel: {\n                Text(\"1\")\n \
    \           } maximumValueLabel: {\n                Text(\"50\")\n           \
    \ }.padding()\n        }\n    }\n}\n\n@available(iOS 15.0, *)\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```\n\n确保你还在 `____App` 文件中添加了 `@available(iOS 15.0, *)` 一行，例如：\n\n\
    ```\nimport SwiftUI\n\n@available(iOS 15.0, *)\n@main\nstruct Slider_Chapter_9App:\
    \ App {\n    var body: some Scene {\n        WindowGroup {\n            ContentView()\n\
    \        }\n    }\n}\n```\n\n当你运行这个项目时，顶部的 `Slider` 值范围是从 0 到 1。这意味着当你拖动其他 `Slider`\
    \ 时，顶部的 `Slider` 会立即移动到最右侧。这是因为顶部的 `Slider` 最大只能为 1，而其他滑块的值范围是从 1 到 50。所以拖动其他\
    \ `Slider` 总是会将顶部的 `Slider` 固定到最右侧，以表示其能表示的最大值 1。\n\n## 总结\n\n当你的应用需要用户输入数值数据时，文本字段虽然可行，但可能比较笨拙，尤其是当你只想接受有限范围的数值时。为了便于输入数值数据，请使用\
    \ `Stepper` 或 `Slider`。\n\n`Stepper` 和 `Slider` 都可以定义最小值和最大值，这样用户就无法输入低于最小值或高于最大值的数值数据。`Stepper`\
    \ 和 `Slider` 都允许你定义除 1 以外的不同增减值。\n\n`Stepper` 占用的空间较小，但 `Slider` 通过简单的左右拖动滑块，能更方便地从一个极端值快速切换到另一个极端值。\n\
    \n通过使用 `Stepper` 和 `Slider`，你可以让用户轻松输入数值数据。通过使用 `Toggle`（开关），你可以让用户轻松地在恰好两个选项之间进行选择，例如开/关或是/否。`Stepper`、`Slider`\
    \ 和 `Toggle` 只是让用户更容易仅输入有效数据。\n"
- fmt: "# 10. Providing Options with Links and Menus\n\nAt one time, apps just needed\
    \ Buttons to let the user choose commands. As iPhone and iPad apps started getting\
    \ more sophisticated, the need for alternate ways to allow the user to select\
    \ commands has grown as well. Two common ways to display commands for users to\
    \ select are Links and Menus.\n\nA `Link` resembles a `Button`, except that it\
    \ opens up a browser to display the contents of a website. A `Menu` lets you display\
    \ a list of options, which can also include submenus as shown in Figure 10-1.\n\
    \n![../images/329781_6_En_10_Chapter/329781_6_En_10_Fig1_HTML.jpg](images/329781_6_En_10_Chapter/329781_6_En_10_Fig1_HTML.jpg)\n\
    \n*Figure 10-1* — A Menu displaying a list of options including a submenu\n\n\
    ## Using Links\n\n`Link` offers a handy way to give users a chance to visit a\
    \ website from within an app. A `Link` defines a website address such as:\n\n\
    ```\nLink(destination: URL(string: \"https://www.apple.com\")! ) {\n    Text(\"\
    Apple\")\n}\n```\n\nThe `Text` view defines the text that appears on the link.\
    \ You can add any modifiers you want to this `Text` view such as defining a font\
    \ or background color.\n\nThe `Link` must define a `destination` as a `URL`. One\
    \ way to make sure the website address is accurate is to visit the desired website\
    \ and then copy its address from your browser and paste it into your Swift code.\n\
    \n> **Note:** To test if the `Link` successfully loads the website address, you\
    \ need to test the project either in the Simulator or on an actual iOS device.\
    \ The Canvas pane cannot open the Safari browser like the Simulator or an iOS\
    \ device can do.\n\n## Using Menus\n\nSometimes, you may want to offer the user\
    \ multiple choices. Cramming multiple `Button`s on the screen can be clumsy, and\
    \ even a segmented control can be too limiting. When you need to display multiple\
    \ options in a small space, that's when you can use a `Menu`.\n\nA `Menu` simply\
    \ appears as a `Button` on the user interface. When the user taps it, the `Menu`\
    \ displays a list of options (see Figure 10-1). Now the user can tap an option\
    \ or open an additional submenu to see even more options. Menus make it easy to\
    \ hide multiple options in a limited amount of space.\n\nThe simplest `Menu` consists\
    \ of a title and a list of options defined by `Button`s like this:\n\n```\nMenu(\"\
    Options\") {\n    Button(\"Open \", action: openFile)\n    Button(\"Find\", action:\
    \ findFile)\n    Button(\"Delete...\", action: deleteFile)\n}\n```\n\nThe preceding\
    \ code would display a `Menu` on the screen with the word \"Options\" displayed.\
    \ When the user taps \"Options,\" a menu appears listing three choices: Open,\
    \ Find, and Delete... as shown in Figure 10-2.\n\n![../images/329781_6_En_10_Chapter/329781_6_En_10_Fig2_HTML.jpg](images/329781_6_En_10_Chapter/329781_6_En_10_Fig2_HTML.jpg)\n\
    \n*Figure 10-2* — A Menu displays a list of Buttons in a drop-down menu\n\nWhen\
    \ the user taps on a `Button`, that `Button` calls a function such as `openFile`,\
    \ `findFile`, or `deleteFile`. Notice that these function calls do not include\
    \ a parameter list such as `openFile()`. To see how to create a simple Menu, follow\
    \ these steps:\n\n1. Create a new SwiftUI iOS App project and give it any name\
    \ you wish such as \"MenuSimple.\"\n2. Click the `ContentView` file in the Navigator\
    \ pane.\n3. Add the following `State` variable under the `struct ContentView:\
    \ View` line:\n   - Create a `VStack` under the `var body: some View` line.\n\
    \   - Create a `Text` view, `Menu`, and `Spacer()` inside the `VStack` like this:\n\
    \n```\nstruct ContentView: View {\n    @State var message = \"\"\n    \n    var\
    \ body: some View {\n        VStack {\n            Text(message)\n           \
    \     .padding()\n            Menu(\"Options\") {\n                Button(\"Open\
    \ \", action: openFile)\n                Button(\"Find\", action: findFile)\n\
    \                Button(\"Delete...\", action: deleteFile)\n            }\n  \
    \          Spacer()\n        }\n    }\n}\n```\n\nAll three `Button`s call functions\
    \ to do something. So we need to create functions to make these `Button`s work.\n\
    \n4. Right above the last curly bracket in the `struct ContentView: View`, add\
    \ the following three functions:\n\n```\nfunc openFile() {\n    message = \"Open\
    \ chosen\"\n}\nfunc findFile() {\n    message = \"Find chosen\"\n}\nfunc deleteFile()\
    \ {\n    message = \"Delete chosen\"\n}\n```\n\nThe entire `ContentView` file\
    \ should look like this:\n\n5. Click the Live Preview icon in the Canvas pane.\n\
    6. Click the Options button in the middle of the simulated iOS device. A menu\
    \ appears listing the three options defined by the three `Button` views: Open,\
    \ Find, and Delete...\n7. Click any option. Notice that whatever option you choose,\
    \ it displays a slightly different message in the `Text` view above the `Menu`.\n\
    \n```\nimport SwiftUI\n\nstruct ContentView: View {\n    @State var message =\
    \ \"\"\n    \n    var body: some View {\n        VStack {\n            Text(message)\n\
    \                .padding()\n            Menu(\"Options\") {\n               \
    \ Button(\"Open \", action: openFile)\n                Button(\"Find\", action:\
    \ findFile)\n                Button(\"Delete...\", action: deleteFile)\n     \
    \       }\n            Spacer()\n        }\n    }\n    \n    func openFile() {\n\
    \        message = \"Open chosen\"\n    }\n    \n    func findFile() {\n     \
    \   message = \"Find chosen\"\n    }\n    \n    func deleteFile() {\n        message\
    \ = \"Delete chosen\"\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \nNotice that each `Button` in the `Menu` calls a function defined by the `action:`\
    \ parameter. Rather than call a function, you can just enclose one or more commands\
    \ within curly brackets like this:\n\n```\nMenu(\"Options\") {\n    Button(\"\
    Open \", action: {\n        message = \"Open chosen\"\n    })\n    Button(\"Find\"\
    , action: {\n        message = \"Find chosen\"\n    })\n    Button(\"Delete...\"\
    , action: {\n        message = \"Delete chosen\"\n    })\n}\n```\n\n### Formatting\
    \ Titles on the Menu and Buttons\n\nA `Menu` lets you define a title that appears\
    \ like a standard `Button`. However, if you want to format the title, there's\
    \ an alternate way to define a `Menu`. Instead of just defining the text to appear\
    \ as a title, you can define a `label:` parameter where you can use either a `Text`\
    \ or `Label` view like this:\n\n```\nMenu {\n    Button(\"Open \", action: {\n\
    \        message = \"Open chosen\"\n    })\n    Button(\"Find\", action: {\n \
    \       message = \"Find chosen\"\n    })\n    Button(\"Delete...\", action: {\n\
    \        message = \"Delete chosen\"\n    })\n} label: {\n    Text(\"Options\"\
    )\n        .font(.largeTitle)\n        .foregroundColor(.purple)\n        .italic()\n\
    }\n```\n\nThis example displays the Menu's title using the `.largeTitle` font,\
    \ the color purple, and italics. Rather than use a `Text` view, you can also use\
    \ a `Label` view to display an icon side by side with text such as:\n\n```\nMenu\
    \ {\n    Button(\"Open \", action: {\n        message = \"Open chosen\"\n    })\n\
    \    Button(\"Find\", action: {\n        message = \"Find chosen\"\n    })\n \
    \   Button(\"Delete...\", action: {\n        message = \"Delete chosen\"\n   \
    \ })\n} label: {\n    Label(\"Options\", systemImage: \"pencil.circle\")\n}\n\
    ```\n\nBy using the `label:` parameter to define a Menu's title, you have more\
    \ options for customizing a Menu's title in multiple ways. Using the preceding\
    \ `Label` view displays the Menu with an icon and text as shown in Figure 10-3.\n\
    \n![../images/329781_6_En_10_Chapter/329781_6_En_10_Fig3_HTML.jpg](images/329781_6_En_10_Chapter/329781_6_En_10_Fig3_HTML.jpg)\n\
    \n*Figure 10-3* — A Label view displays an icon and text for the Menu's title\n\
    \nYou can also format the `Button` title using a `Label` view instead of a `Text`\
    \ view like this:\n\n```\nMenu {\n    Button(action: {\n        message = \"Open\
    \ chosen\"\n    }) {\n        Label(\"Open\", systemImage: \"book\")\n    }\n\
    \    Button(action: {\n        message = \"Find chosen\"\n    }) {\n        Label(\"\
    Find\", systemImage: \"magnifyingglass\")\n    }\n    Button(action: {\n     \
    \   message = \"Delete chosen\"\n    }) {\n        Label(\"Delete\", systemImage:\
    \ \"trash\")\n    }\n} label: {\n    Label(\"Options\", systemImage: \"pencil.circle\"\
    )\n}\n```\n\nThe preceding code displays a Menu list as shown in Figure 10-4.\n\
    \n![../images/329781_6_En_10_Chapter/329781_6_En_10_Fig4_HTML.jpg](images/329781_6_En_10_Chapter/329781_6_En_10_Fig4_HTML.jpg)\n\
    \n*Figure 10-4* — Displaying Buttons in a Menu list using the Label view"
  raw: '# 10. Providing Options with Links and Menus


    At one time, apps just needed Buttons to let the user choose commands. As iPhone
    and iPad apps started getting more sophisticated, the need for alternate ways
    to allow the user to select commands has grown as well. Two common ways to display
    commands for users to select are Links and Menus.


    A Link resembles a Button, except that it opens up a browser to display the contents
    of a website. A Menu lets you display a list of options, which can also include
    submenus as shown in Figure [10-1](#329781_6_En_10_Chapter.xhtml#Fig1).


    ![../images/329781_6_En_10_Chapter/329781_6_En_10_Fig1_HTML.jpg](images/329781_6_En_10_Chapter/329781_6_En_10_Fig1_HTML.jpg)


    Figure 10-1


    A Menu displaying a list of options including a submenu


    ## Using Links


    Links offer a handy way to give users a chance to visit a website from within
    an app. A Link defines a website address such as


    ```

    Link(destination: URL(string: "https://www.apple.com")! ) {

    Text("Apple")

    }

    ```


    The Text view defines the text that appears on the link. You can add any modifiers
    you want to this Text view such as defining a font or background color.


    The Link must define a destination as a URL. One way to make sure the website
    address is accurate is to visit the desired website and then copy its address
    from your browser and paste it into your Swift code.


    Note


    To test if the Link successfully loads the website address, you need to test the
    project either in the Simulator or on an actual iOS device. The Canvas pane cannot
    open the Safari browser like the Simulator or an iOS device can do.


    ## Using Menus


    Sometimes, you may want to offer the user multiple choices. Cramming multiple
    Buttons on the screen can be clumsy, and even a segmented control can be too limiting.
    When you need to display multiple options in a small space, that’s when you can
    use a Menu.


    A Menu simply appears as a Button on the user interface. When the user taps it,
    the Menu displays a list of options (see Figure [10-1](#329781_6_En_10_Chapter.xhtml#Fig1)).
    Now the user can tap an option or open an additional submenu to see even more
    options. Menus make it easy to hide multiple options in a limited amount of space.


    The simplest Menu consists of a title and a list of options defined by Buttons
    like this:


    ```

    Menu("Options") {

    Button("Open ", action: openFile)

    Button("Find", action: findFile)

    Button("Delete...", action: deleteFile)

    }

    ```


    The preceding code would display a Menu on the screen with the word “Options”
    displayed. When the user taps “Options,” a menu appears listing three choices:
    Open, Find, and Delete… as shown in Figure [10-2](#329781_6_En_10_Chapter.xhtml#Fig2).


    ![../images/329781_6_En_10_Chapter/329781_6_En_10_Fig2_HTML.jpg](images/329781_6_En_10_Chapter/329781_6_En_10_Fig2_HTML.jpg)


    Figure 10-2


    A Menu displays a list of Buttons in a drop-down menu


    When the user taps on a Button, that Button calls a function such as openFile,
    findFile, or deleteFile. Notice that these function calls do not include a parameter
    list such as openFile(). To see how to create a simple Menu, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “MenuSimple.”


    2.  Click the ContentView file in the Navigator pane.


    3.  Add the following State variable under the struct ContentView: View line:


    1.  Create a VStack under the var body: some View line.


    2.  Create a Text view, Menu, and Spacer() inside the VStack like this:


    ```

    struct ContentView: View {

    @State var message = ""

    ```


    ```

    var body: some View {

    VStack {

    Text(message)

    .padding()

    Menu("Options") {

    Button("Open ", action: openFile)

    Button("Find", action: findFile)

    Button("Delete...", action: deleteFile)

    }

    Spacer()

    }

    }

    ```


    All three Buttons call functions to do something. So we need to create functions
    to make these Buttons work.


    1.  Right above the last curly bracket in the struct ContentView: View, add the
    following three functions:


    ```

    func openFile() {

    message = "Open chosen"

    }

    func findFile() {

    message = "Find chosen"

    }

    func deleteFile() {

    message = "Delete chosen"

    }

    ```


    The entire ContentView file should look like this:


    1.  Click the Live Preview icon in the Canvas pane.


    2.  Click the Options button in the middle of the simulated iOS device. A menu
    appears listing the three options defined by the three Button views: Open, Find,
    and Delete….


    3.  Click any option. Notice that whatever option you choose, it displays a slightly
    different message in the Text view above the Menu.


    ```

    import SwiftUI

    struct ContentView: View {

    @State var message = ""

    var body: some View {

    VStack {

    Text(message)

    .padding()

    Menu("Options") {

    Button("Open ", action: openFile)

    Button("Find", action: findFile)

    Button("Delete...", action: deleteFile)

    }

    Spacer()

    }

    }

    func openFile() {

    message = "Open chosen"

    }

    func findFile() {

    message = "Find chosen"

    }

    func deleteFile() {

    message = "Delete chosen"

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    Notice that each Button in the Menu calls a function defined by the action: parameter.
    Rather than call a function, you can just enclose one or more commands within
    curly brackets like this:


    ```

    Menu("Options") {

    Button("Open ", action: {

    message = "Open chosen"

    })

    Button("Find", action: {

    message = "Find chosen"

    })

    Button("Delete...", action: {

    message = "Delete chosen"

    })

    }

    ```


    ### Formatting Titles on the Menu and Buttons


    A Menu lets you define a title that appears like a standard Button. However, if
    you want to format the title, there’s an alternate way to define a Menu. Instead
    of just defining the text to appear as a title, you can define a label: parameter
    where you can use either a Text or Label view like this:


    ```

    Menu {

    Button("Open ", action: {

    message = "Open chosen"

    })

    Button("Find", action: {

    message = "Find chosen"

    })

    Button("Delete...", action: {

    message = "Delete chosen"

    })

    } label: {

    Text("Options")

    .font(.largeTitle)

    .foregroundColor(.purple)

    .italic()

    }

    ```


    This example displays the Menu’s title using the .largeTitle font, the color purple,
    and italics. Rather than use a Text view, you can also use a Label view to display
    an icon side by side with text such as


    ```

    Menu {

    Button("Open ", action: {

    message = "Open chosen"

    })

    Button("Find", action: {

    message = "Find chosen"

    })

    Button("Delete...", action: {

    message = "Delete chosen"

    })

    } label: {

    Label("Options", systemImage: "pencil.circle")

    }

    ```


    By using the label: parameter to define a Menu’s title, you have more options
    for customizing a Menu’s title in multiple ways. Using the preceding Label view
    displays the Menu with an icon and text as shown in Figure [10-3](#329781_6_En_10_Chapter.xhtml#Fig3).


    ![../images/329781_6_En_10_Chapter/329781_6_En_10_Fig3_HTML.jpg](images/329781_6_En_10_Chapter/329781_6_En_10_Fig3_HTML.jpg)


    Figure 10-3


    A Label view displays an icon and text for the Menu’s title


    You can also format the Button title using a Label view instead of a Text view
    like this:


    ```

    Menu {

    Button(action: {

    message = "Open chosen"

    }) {

    Label("Open", systemImage: "book")

    }

    Button(action: {

    message = "Find chosen"

    }) {

    Label("Find", systemImage: "magnifyingglass")

    }

    Button(action: {

    message = "Delete chosen"

    }) {

    Label("Delete", systemImage: "trash")

    }

    } label: {

    Label("Options", systemImage: "pencil.circle")

    }

    ```


    The preceding code displays a Menu list as shown in Figure [10-4](#329781_6_En_10_Chapter.xhtml#Fig4).


    ![../images/329781_6_En_10_Chapter/329781_6_En_10_Fig4_HTML.jpg](images/329781_6_En_10_Chapter/329781_6_En_10_Fig4_HTML.jpg)


    Figure 10-4


    Displaying Buttons in a Menu list using the Label view'
  trans: "\n# 10. 通过链接和菜单提供选项\n\n曾几何时，应用程序只需按钮就能让用户选择命令。随着 iPhone 和 iPad 应用日益复杂，为用户提供其他选择命令方式的需求也随之增长。两种常见的用于展示命令供用户选择的组件是\
    \ **链接**（Link）和 **菜单**（Menu）。\n\n`Link` 类似于 `Button`，不同之处在于它会打开浏览器来显示网站内容。`Menu`\
    \ 让你可以显示一个选项列表，其中也可以包含子菜单，如图 10-1 所示。\n\n![../images/329781_6_En_10_Chapter/329781_6_En_10_Fig1_HTML.jpg](img/329781_6_En_10_Fig1_HTML.jpg)\n\
    \n*图 10-1* —— 菜单显示包含子菜单在内的选项列表\n\n## 使用链接\n\n`Link` 提供了一种便捷的方式，让用户能够从应用内部访问网站。一个\
    \ `Link` 定义了一个网站地址，例如：\n\n```\nLink(destination: URL(string: \"https://www.apple.com\"\
    )! ) {\n    Text(\"Apple\")\n}\n```\n\n`Text` 视图定义了链接上显示的文本。你可以对这个 `Text` 视图应用任何你想要的修饰符，例如定义字体或背景颜色。\n\
    \n`Link` 必须将 `destination` 定义为一个 `URL`。确保网站地址准确无误的一种方法是访问目标网站，然后从浏览器中复制其地址，再粘贴到你的\
    \ Swift 代码中。\n\n> **注意：** 要测试 `Link` 能否成功加载网站地址，你需要在模拟器或实际的 iOS 设备上运行项目。画布窗格（Canvas\
    \ pane）无法像模拟器或 iOS 设备那样打开 Safari 浏览器。\n\n## 使用菜单\n\n有时候，你可能想为用户提供多个选择。在屏幕上塞满多个\
    \ `Button` 会显得笨拙，就连分段控件也可能过于局限。当你需要在有限的空间内显示多个选项时，就可以使用 `Menu`。\n\n`Menu` 在用户界面上表现为一个\
    \ `Button`。当用户点击它时，`Menu` 会显示一个选项列表（见图 10-1）。然后用户可以选择一个选项，或打开另一个子菜单来查看更多选项。菜单使得在有限的空间内隐藏多个选项变得容易。\n\
    \n最简单的 `Menu` 由一个标题和一个由 `Button` 定义的选项列表组成，如下所示：\n\n```\nMenu(\"Options\") {\n\
    \    Button(\"Open \", action: openFile)\n    Button(\"Find\", action: findFile)\n\
    \    Button(\"Delete...\", action: deleteFile)\n}\n```\n\n上述代码会在屏幕上显示一个显示着 \"\
    Options\" 字样的 `Menu`。当用户点击 \"Options\" 时，会弹出一个菜单，列出三个选项：Open、Find 和 Delete...，如图\
    \ 10-2 所示。\n\n![../images/329781_6_En_10_Chapter/329781_6_En_10_Fig2_HTML.jpg](img/329781_6_En_10_Fig2_HTML.jpg)\n\
    \n*图 10-2* —— 菜单在下拉列表中显示按钮列表\n\n当用户点击某个 `Button` 时，该 `Button` 会调用一个函数，例如 `openFile`、`findFile`\
    \ 或 `deleteFile`。请注意，这些函数调用并不包含参数列表，例如 `openFile()`。若要了解如何创建一个简单的菜单，请遵循以下步骤：\n\
    \n1. 创建一个新的 SwiftUI iOS 应用项目，并为其命名，例如 \"MenuSimple\"。\n2. 在导航窗格中点击 `ContentView`\
    \ 文件。\n3. 在 `struct ContentView: View` 代码行下方添加以下 `State` 变量：\n   - 在 `var body:\
    \ some View` 代码行下创建一个 `VStack`。\n   - 在 `VStack` 内部创建一个 `Text` 视图、`Menu` 和 `Spacer()`，如下所示：\n\
    \n```\nstruct ContentView: View {\n    @State var message = \"\"\n    \n    var\
    \ body: some View {\n        VStack {\n            Text(message)\n           \
    \     .padding()\n            Menu(\"Options\") {\n                Button(\"Open\
    \ \", action: openFile)\n                Button(\"Find\", action: findFile)\n\
    \                Button(\"Delete...\", action: deleteFile)\n            }\n  \
    \          Spacer()\n        }\n    }\n}\n```\n\n所有三个 `Button` 都会调用函数来执行操作。因此，我们需要创建函数来使这些\
    \ `Button` 生效。\n\n4. 在 `struct ContentView: View` 中最后一个花括号的上方，添加以下三个函数：\n\n```\n\
    func openFile() {\n    message = \"Open chosen\"\n}\nfunc findFile() {\n    message\
    \ = \"Find chosen\"\n}\nfunc deleteFile() {\n    message = \"Delete chosen\"\n\
    }\n```\n\n完整的 `ContentView` 文件应如下所示：\n\n5. 点击画布窗格中的“实时预览”图标。\n6. 点击模拟 iOS 设备中间的\
    \ Options 按钮。会弹出一个菜单，列出由三个 `Button` 视图定义的三个选项：Open、Find 和 Delete...\n7. 点击任意选项。请注意，无论你选择哪个选项，它都会在\
    \ `Menu` 上方的 `Text` 视图中显示略有不同的消息。\n\n```\nimport SwiftUI\n\nstruct ContentView:\
    \ View {\n    @State var message = \"\"\n    \n    var body: some View {\n   \
    \     VStack {\n            Text(message)\n                .padding()\n      \
    \      Menu(\"Options\") {\n                Button(\"Open \", action: openFile)\n\
    \                Button(\"Find\", action: findFile)\n                Button(\"\
    Delete...\", action: deleteFile)\n            }\n            Spacer()\n      \
    \  }\n    }\n    \n    func openFile() {\n        message = \"Open chosen\"\n\
    \    }\n    \n    func findFile() {\n        message = \"Find chosen\"\n    }\n\
    \    \n    func deleteFile() {\n        message = \"Delete chosen\"\n    }\n}\n\
    \nstruct ContentView_Previews: PreviewProvider {\n    static var previews: some\
    \ View {\n        ContentView()\n    }\n}\n```\n\n请注意，`Menu` 中的每个 `Button` 都调用由\
    \ `action:` 参数定义的函数。除了调用函数，你也可以直接在花括号内包裹一个或多个命令，如下所示：\n\n```\nMenu(\"Options\"\
    ) {\n    Button(\"Open \", action: {\n        message = \"Open chosen\"\n    })\n\
    \    Button(\"Find\", action: {\n        message = \"Find chosen\"\n    })\n \
    \   Button(\"Delete...\", action: {\n        message = \"Delete chosen\"\n   \
    \ })\n}\n```\n\n### 格式化菜单和按钮上的标题\n\n`Menu` 允许你定义一个看起来像标准 `Button` 的标题。然而，如果你想要格式化标题，还有一种替代方式来定义\
    \ `Menu`。除了仅定义要显示为标题的文本外，你还可以定义一个 `label:` 参数，在其中使用 `Text` 或 `Label` 视图，如下所示：\n\
    \n```\nMenu {\n    Button(\"Open \", action: {\n        message = \"Open chosen\"\
    \n    })\n    Button(\"Find\", action: {\n        message = \"Find chosen\"\n\
    \    })\n    Button(\"Delete...\", action: {\n        message = \"Delete chosen\"\
    \n    })\n} label: {\n    Text(\"Options\")\n        .font(.largeTitle)\n    \
    \    .foregroundColor(.purple)\n        .italic()\n}\n```\n\n此示例使用 `.largeTitle`\
    \ 字体、紫色和斜体来显示菜单的标题。除了使用 `Text` 视图，你还可以使用 `Label` 视图来并排显示图标和文本，例如：\n\n```\nMenu\
    \ {\n    Button(\"Open \", action: {\n        message = \"Open chosen\"\n    })\n\
    \    Button(\"Find\", action: {\n        message = \"Find chosen\"\n    })\n \
    \   Button(\"Delete...\", action: {\n        message = \"Delete chosen\"\n   \
    \ })\n} label: {\n    Label(\"Options\", systemImage: \"pencil.circle\")\n}\n\
    ```\n\n通过使用 `label:` 参数来定义菜单标题，你可以用多种方式自定义菜单标题。使用上述 `Label` 视图会显示一个带有图标和文本的菜单，如图\
    \ 10-3 所示。\n\n![../images/329781_6_En_10_Chapter/329781_6_En_10_Fig3_HTML.jpg](img/329781_6_En_10_Fig3_HTML.jpg)\n\
    \n*图 10-3* —— 标签视图为菜单标题显示图标和文本\n\n你也可以使用 `Label` 视图而不是 `Text` 视图来格式化 `Button`\
    \ 标题，如下所示：\n\n```\nMenu {\n    Button(action: {\n        message = \"Open chosen\"\
    \n    }) {\n        Label(\"Open\", systemImage: \"book\")\n    }\n    Button(action:\
    \ {\n        message = \"Find chosen\"\n    }) {\n        Label(\"Find\", systemImage:\
    \ \"magnifyingglass\")\n    }\n    Button(action: {\n        message = \"Delete\
    \ chosen\"\n    }) {\n        Label(\"Delete\", systemImage: \"trash\")\n    }\n\
    } label: {\n    Label(\"Options\", systemImage: \"pencil.circle\")\n}\n```\n\n\
    上述代码显示的菜单列表如图 10-4 所示。\n\n![../images/329781_6_En_10_Chapter/329781_6_En_10_Fig4_HTML.jpg](img/329781_6_En_10_Fig4_HTML.jpg)\n\
    \n*图 10-4* —— 使用标签视图在菜单列表中显示按钮\n"
- fmt: "### Adding a Submenu\n\nA `Menu` can display a list of options defined by\
    \ `Button`s. However, a `Menu` can also display submenus that list additional,\
    \ related commands as shown in Figure [10-5](#329781_6_En_10_Chapter.xhtml#Fig5).\n\
    \n![../images/329781_6_En_10_Chapter/329781_6_En_10_Fig5_HTML.jpg](images/329781_6_En_10_Chapter/329781_6_En_10_Fig5_HTML.jpg)\n\
    \n**Figure 10-5** Displaying a submenu\n\nTo create a submenu, just define another\
    \ `Menu` instead of a `Button`. Then include additional `Button`s inside the submenu\
    \ like this:\n\n```swift\nMenu(\"Options\") {\n    Button(\"Open \", action: openFile)\n\
    \    Button(\"Find\", action: findFile)\n    Button(\"Delete...\", action: deleteFile)\n\
    \    Menu(\"Submenu\") {\n        Button(\"Copy Format\", action: copyFormat)\n\
    \        Button(\"Paste Format\", action: pasteFormat)\n    }\n}\n```\n\n**Note**\
    \ It’s possible to create submenus inside of submenus. As a general rule, use\
    \ only one level of submenus or else so many lists of options can look confusing\
    \ to the user.\n\nTo see how submenus work, follow these steps:\n\n1.  Create\
    \ a new SwiftUI iOS App project and give it any name you wish such as `\"Submenu\"\
    `.\n2.  Click the `ContentView` file in the Navigator pane.\n3.  Edit the `ContentView`\
    \ file so its entire contents look like this:\n\n![../images/329781_6_En_10_Chapter/329781_6_En_10_Fig6_HTML.jpg](images/329781_6_En_10_Chapter/329781_6_En_10_Fig6_HTML.jpg)\n\
    \n**Figure 10-6** The `➤` symbol identifies a submenu\n\n4.  Click the Live Preview\
    \ icon on the Canvas pane.\n5.  Click Options defined by the `Menu`. This displays\
    \ a list of options including the submenu identified by a `➤` symbol as shown\
    \ in Figure [10-6](#329781_6_En_10_Chapter.xhtml#Fig6).\n\n```swift\nimport SwiftUI\n\
    struct ContentView: View {\n    @State var message = \"\"\n    var body: some\
    \ View {\n        VStack {\n            Text(message)\n                .padding()\n\
    \            Menu(\"Options\") {\n                Button(\"Open \", action: openFile)\n\
    \                Button(\"Find\", action: findFile)\n                Button(\"\
    Delete...\", action: deleteFile)\n                Menu(\"Submenu\") {\n      \
    \              Button(\"Copy Format\", action: copyFormat)\n                 \
    \   Button(\"Paste Format\", action: pasteFormat)\n                }\n       \
    \     }\n            Spacer()\n        }\n    }\n    func openFile() {\n     \
    \   message = \"Open chosen\"\n    }\n    func findFile() {\n        message =\
    \ \"Find chosen\"\n    }\n    func deleteFile() {\n        message = \"Delete\
    \ chosen\"\n    }\n    func copyFormat() {\n        message = \"Copy format chosen\"\
    \n    }\n    func pasteFormat() {\n        message = \"Paste format chosen\"\n\
    \    }\n}\nstruct ContentView_Previews: PreviewProvider {\n    static var previews:\
    \ some View {\n        ContentView()\n    }\n}\n```\n\n6.  Click the submenu to\
    \ see an additional list of options appear.\n\nSubmenus make it easy to group\
    \ related options together, but since these options are initially hidden from\
    \ view, use submenus sparingly to avoid confusing the user.\n\n## Summary\n\n\
    `Link`s and `Menu`s are two additional ways a user interface can display options\
    \ for the user to select. A `Link` opens a browser and jumps to a specific website.\
    \ `Menu`s display a list of options defined by `Button`s and other `Menu`s that\
    \ define submenus.\n\nBy using the `Label` view in a `Menu`, you can combine an\
    \ icon with text side by side. By using the `Text` view in a `Menu`, you can customize\
    \ the appearance of text that appears on the user interface such as choosing a\
    \ font or color. `Menu`s give you a way to display multiple options to the user\
    \ without taking up a lot of space on the screen.\n\n# 11. Touch Gestures\n\n\
    Allowing the user to control an app through `Button`s, `Toggle`s, or `Menu`s is\
    \ handy, but all of these controls take up space on the screen. To eliminate the\
    \ need for extra objects on the user interface, your app can also detect and respond\
    \ to touch gestures that allow direct manipulation of items displayed on the screen.\n\
    \nThe different types of touch gestures that an iOS app can detect and respond\
    \ to include:\n\n- **Tap** – A fingertip touches the screen and lifts up.\n- **Pinch**\
    \ – Two fingertips come together or move apart.\n- **Rotation** – Two fingertips\
    \ rotate left or right in a circular motion.\n- **Pan** – A fingertip slides in\
    \ a dragging motion across the screen.\n- **Swipe** – A fingertip slides up, down,\
    \ left, or right across the screen and lifts up.\n- **Long press** – A fingertip\
    \ touches and presses down on the screen.\n\nYou can apply touch gestures to any\
    \ view such as an `Image`, a `Text` view, or a shape like a `Rectangle` or `Ellipse`.\n\
    \n## Detecting Tap Gestures\n\nTap gestures simply detect when a user taps on\
    \ the screen. By default, a tap gesture recognizes a single tap by one fingertip,\
    \ but you can define multiple taps by two or more fingertips.\n\nTo see how to\
    \ detect tap gestures, follow these steps:\n\n1.  Create a new SwiftUI iOS App\
    \ project and give it any name you wish such as `\"TapGesture\"`.\n2.  Click the\
    \ `ContentView` file in the Navigator pane.\n3.  Add the following State variable\
    \ under the `struct ContentView: View` line:\n\n```swift\nstruct ContentView:\
    \ View {\n    @State var changeMe = false\n```\n\n4.  Add a `VStack` inside the\
    \ `body` along with a `Rectangle` like this:\n\n```swift\nvar body: some View\
    \ {\n    VStack {\n        Rectangle()\n            .frame(width: 175, height:\
    \ 125)\n            .foregroundColor(changeMe ? .red : .yellow)\n            .onTapGesture\
    \ {\n                changeMe.toggle()\n            }\n    }\n}\n```\n\nThis creates\
    \ a `Rectangle` that fills up the entire screen. Then the `.frame` modifier restricts\
    \ its width to 175 and its height to 125. The `.foregroundColor` modifier uses\
    \ the `changeMe` State variable to decide whether to color the rectangle with\
    \ red or yellow.\n\nThe `.onTapGesture` modifier lets the rectangle detect a single\
    \ tap gesture. When it detects a tap gesture, it toggles the value of the `changeMe`\
    \ State variable from `true` to `false` (or `false` to `true`). The entire `ContentView`\
    \ file should look like this:\n\n5.  Click the Live Preview icon on the Canvas\
    \ pane and then click the rectangle. Notice that each time you click the rectangle,\
    \ the `.onTapGesture` modifier toggles the `changeMe` State variable, which alternates\
    \ the rectangle color between red and yellow.\n\n```swift\nimport SwiftUI\nstruct\
    \ ContentView: View {\n    @State var changeMe = false\n    var body: some View\
    \ {\n        VStack {\n            Rectangle()\n                .frame(width:\
    \ 175, height: 125)\n                .foregroundColor(changeMe ? .red : .yellow)\n\
    \                .onTapGesture {\n                    changeMe.toggle()\n    \
    \            }\n        }\n    }\n}\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \nBy default, the `.onTapGesture` modifier detects a single tap gesture. If you\
    \ want to detect multiple taps such as a double or triple tap, you can define\
    \ the `count:` parameter like this:\n\n```swift\n.onTapGesture(count: 2)\n```\n\
    \nA value of 2 defines a double tap, while a value of 3 would define a triple\
    \ tap."
  raw: '### Adding a Submenu


    A Menu can display a list of options defined by Buttons. However, a Menu can also
    display submenus that list additional, related commands as shown in Figure [10-5](#329781_6_En_10_Chapter.xhtml#Fig5).


    ![../images/329781_6_En_10_Chapter/329781_6_En_10_Fig5_HTML.jpg](images/329781_6_En_10_Chapter/329781_6_En_10_Fig5_HTML.jpg)


    Figure 10-5


    Displaying a submenu


    To create a submenu, just define another Menu instead of a Button. Then include
    additional Buttons inside the submenu like this:


    ```

    Menu("Options") {

    Button("Open ", action: openFile)

    Button("Find", action: findFile)

    Button("Delete...", action: deleteFile)

    Menu("Submenu") {

    Button("Copy Format", action: copyFormat)

    Button("Paste Format", action: pasteFormat)

    }

    }

    ```


    Note


    It’s possible to create submenus inside of submenus. As a general rule, use only
    one level of submenus or else so many lists of options can look confusing to the
    user.


    To see how submenus work, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “Submenu.”


    2.  Click the ContentView file in the Navigator pane.


    3.  Edit the ContentView file so its entire contents look like this:


    ![../images/329781_6_En_10_Chapter/329781_6_En_10_Fig6_HTML.jpg](images/329781_6_En_10_Chapter/329781_6_En_10_Fig6_HTML.jpg)


    Figure 10-6


    The ➤ symbol identifies a submenu


    1.  Click the Live Preview icon on the Canvas pane.


    2.  Click Options defined by the Menu. This displays a list of options including
    the submenu identified by a ➤ symbol as shown in Figure [10-6](#329781_6_En_10_Chapter.xhtml#Fig6).


    ```

    import SwiftUI

    struct ContentView: View {

    @State var message = ""

    var body: some View {

    VStack {

    Text(message)

    .padding()

    Menu("Options") {

    Button("Open ", action: openFile)

    Button("Find", action: findFile)

    Button("Delete...", action: deleteFile)

    Menu("Submenu") {

    Button("Copy Format", action: copyFormat)

    Button("Paste Format", action: pasteFormat)

    }

    }

    Spacer()

    }

    }

    func openFile() {

    message = "Open chosen"

    }

    func findFile() {

    message = "Find chosen"

    }

    func deleteFile() {

    message = "Delete chosen"

    }

    func copyFormat() {

    message = "Copy format chosen"

    }

    func pasteFormat() {

    message = "Paste format chosen"

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    1.  Click the submenu to see an additional list of options appear.


    Submenus make it easy to group related options together, but since these options
    are initially hidden from view, use submenus sparingly to avoid confusing the
    user.


    ## Summary


    Links and Menus are two additional ways a user interface can display options for
    the user to select. A Link opens a browser and jumps to a specific website. Menus
    display a list of options defined by Buttons and other Menus that define submenus.


    By using the Label view in a Menu, you can combine an icon with text side by side.
    By using the Text view in a Menu, you can customize the appearance of text that
    appears on the user interface such as choosing a font or color. Menus give you
    a way to display multiple options to the user without taking up a lot of space
    on the screen.


    # 11. Touch Gestures


    Allowing the user to control an app through Buttons, Toggles, or Menus is handy,
    but all of these controls take up space on the screen. To eliminate the need for
    extra objects on the user interface, your app can also detect and respond to touch
    gestures that allow direct manipulation of items displayed on the screen.


    The different types of touch gestures that an iOS app can detect and respond to
    include


    *   Tap – A fingertip touches the screen and lifts up.


    *   Pinch – Two fingertips come together or move apart.


    *   Rotation – Two fingertips rotate left or right in a circular motion.


    *   Pan – A fingertip slides in a dragging motion across the screen.


    *   Swipe – A fingertip slides up, down, left, or right across the screen and
    lifts up.


    *   Long press – A fingertip touches and presses down on the screen.


    You can apply touch gestures to any view such as an Image, a Text view, or a shape
    like a Rectangle or Ellipse.


    ## Detecting Tap Gestures


    Tap gestures simply detect when a user taps on the screen. By default, a tap gesture
    recognizes a single tap by one fingertip, but you can define multiple taps by
    two or more fingertips.


    To see how to detect tap gestures, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “TapGesture.”


    2.  Click the ContentView file in the Navigator pane.


    3.  Add the following State variable under the struct ContentView: View line:


    1.  Add a VStack inside the body along with a Rectangle like this:


    ```

    struct ContentView: View {

    @State var changeMe = false

    ```


    ```

    var body: some View {

    VStack {

    Rectangle()

    .frame(width: 175, height: 125)

    .foregroundColor(changeMe ? .red : .yellow)

    .onTapGesture {

    changeMe.toggle()

    }

    }

    }

    ```


    This creates a Rectangle that fills up the entire screen. Then the .frame modifier
    restricts its width to 175 and its height to 125\. The .foregroundColor modifier
    uses the changeMe State variable to decide whether to color the rectangle with
    red or yellow.


    The .onTapGesture modifier lets the rectangle detect a single tap gesture. When
    it detects a tap gesture, it toggles the value of the changeMe State variable
    from true to false (or false to true). The entire ContentView file should look
    like this:


    1.  Click the Live Preview icon on the Canvas pane and then click the rectangle.
    Notice that each time you click the rectangle, the .onTapGesture modifier toggles
    the changeMe State variable, which alternates the rectangle color between red
    and yellow.


    ```

    import SwiftUI

    struct ContentView: View {

    @State var changeMe = false

    var body: some View {

    VStack {

    Rectangle()

    .frame(width: 175, height: 125)

    .foregroundColor(changeMe ? .red : .yellow)

    .onTapGesture {

    changeMe.toggle()

    }

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    By default, the .onTapGesture modifier detects a single tap gesture. If you want
    to detect multiple taps such as a double or triple tap, you can define the count:
    parameter like this:


    ```

    .onTapGesture(count: 2)

    ```


    A value of 2 defines a double tap, while a value of 3 would define a triple tap.'
  trans: "\n### 添加子菜单\n\n一个`Menu`可以显示由`Button`定义的选项列表。然而，`Menu`也可以显示列出附加相关命令的子菜单，如图\
    \ 10-5 所示。\n\n![../images/329781_6_En_10_Chapter/329781_6_En_10_Fig5_HTML.jpg](img/329781_6_En_10_Fig5_HTML.jpg)\n\
    \n**图 10-5** 显示子菜单\n\n要创建子菜单，只需定义另一个`Menu`而不是`Button`。然后在子菜单中包含额外的`Button`，如下所示：\n\
    \n```swift\nMenu(\"选项\") {\n    Button(\"打开\", action: openFile)\n    Button(\"\
    查找\", action: findFile)\n    Button(\"删除...\", action: deleteFile)\n    Menu(\"\
    子菜单\") {\n        Button(\"复制格式\", action: copyFormat)\n        Button(\"粘贴格式\"\
    , action: pasteFormat)\n    }\n}\n```\n\n**注意** 可以在子菜单中创建子菜单。作为一般规则，建议只使用一级子菜单，否则过多的选项列表可能会让用户感到混乱。\n\
    \n要了解子菜单的工作方式，请按照以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS 应用项目，并为其指定任意名称，例如`\"Submenu\"\
    `。\n2. 在导航窗格中点击`ContentView`文件。\n3. 编辑`ContentView`文件，使其全部内容如下所示：\n\n![../images/329781_6_En_10_Chapter/329781_6_En_10_Fig6_HTML.jpg](img/329781_6_En_10_Fig6_HTML.jpg)\n\
    \n**图 10-6** `➤`符号标识一个子菜单\n\n4. 在画布窗格上点击实时预览图标。\n5. 点击由`Menu`定义的选项。这将显示一个选项列表，其中包括由`➤`符号标识的子菜单，如图\
    \ 10-6 所示。\n\n```swift\nimport SwiftUI\nstruct ContentView: View {\n    @State\
    \ var message = \"\"\n    var body: some View {\n        VStack {\n          \
    \  Text(message)\n                .padding()\n            Menu(\"选项\") {\n   \
    \             Button(\"打开\", action: openFile)\n                Button(\"查找\"\
    , action: findFile)\n                Button(\"删除...\", action: deleteFile)\n \
    \               Menu(\"子菜单\") {\n                    Button(\"复制格式\", action:\
    \ copyFormat)\n                    Button(\"粘贴格式\", action: pasteFormat)\n   \
    \             }\n            }\n            Spacer()\n        }\n    }\n    func\
    \ openFile() {\n        message = \"已选择打开\"\n    }\n    func findFile() {\n  \
    \      message = \"已选择查找\"\n    }\n    func deleteFile() {\n        message =\
    \ \"已选择删除\"\n    }\n    func copyFormat() {\n        message = \"已选择复制格式\"\n \
    \   }\n    func pasteFormat() {\n        message = \"已选择粘贴格式\"\n    }\n}\nstruct\
    \ ContentView_Previews: PreviewProvider {\n    static var previews: some View\
    \ {\n        ContentView()\n    }\n}\n```\n\n6. 点击子菜单，查看出现的额外选项列表。\n\n子菜单可以轻松地将相关选项分组，但由于这些选项最初是隐藏的，请谨慎使用子菜单，以免让用户感到困惑。\n\
    \n## 总结\n\n`Link`和`Menu`是用户界面提供选项供用户选择的两种额外方式。`Link`会打开浏览器并跳转到特定网站。`Menu`则显示由`Button`和其他定义子菜单的`Menu`组成的选项列表。\n\
    \n通过在`Menu`中使用`Label`视图，可以将图标和文本并排组合。通过在`Menu`中使用`Text`视图，可以自定义用户界面中显示的文本外观，例如选择字体或颜色。`Menu`提供了一种在不占用大量屏幕空间的情况下向用户显示多个选项的方法。\n\
    \n# 11. 触摸手势\n\n允许用户通过`Button`、`Toggle`或`Menu`来控制应用程序很方便，但这些控件都会占用屏幕空间。为了消除用户界面上多余的对象，应用程序还可以检测并响应触摸手势，从而允许直接操作屏幕上显示的项目。\n\
    \niOS 应用可以检测并响应的不同类型的触摸手势包括：\n\n- **轻点** – 指尖触碰屏幕然后抬起。\n- **捏合** – 两个指尖合拢或分开。\n\
    - **旋转** – 两个指尖以圆形运动向左或向右旋转。\n- **平移** – 指尖以拖拽动作在屏幕上滑动。\n- **轻扫** – 指尖在屏幕上向上、向下、向左或向右滑动然后抬起。\n\
    - **长按** – 指尖触碰并按住屏幕。\n\n你可以将触摸手势应用于任何视图，例如`Image`、`Text`视图，或像`Rectangle`或`Ellipse`这样的形状。\n\
    \n## 检测轻点手势\n\n轻点手势仅仅是检测用户何时点击屏幕。默认情况下，轻点手势识别单指的单次轻点，但你可以定义由两个或多个手指进行的多次轻点。\n\n\
    要了解如何检测轻点手势，请按照以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS 应用项目，并为其指定任意名称，例如`\"TapGesture\"\
    `。\n2. 在导航窗格中点击`ContentView`文件。\n3. 在`struct ContentView: View`这一行下添加以下状态变量：\n\
    \n```swift\nstruct ContentView: View {\n    @State var changeMe = false\n```\n\
    \n4. 在`body`内部添加一个`VStack`以及一个`Rectangle`，如下所示：\n\n```swift\nvar body: some View\
    \ {\n    VStack {\n        Rectangle()\n            .frame(width: 175, height:\
    \ 125)\n            .foregroundColor(changeMe ? .red : .yellow)\n            .onTapGesture\
    \ {\n                changeMe.toggle()\n            }\n    }\n}\n```\n\n这将创建一个填满整个屏幕的`Rectangle`。然后`.frame`修饰符将其宽度限制为\
    \ 175，高度限制为 125。`.foregroundColor`修饰符使用`changeMe`状态变量来决定将矩形着色为红色还是黄色。\n\n`.onTapGesture`修饰符使矩形能够检测单次轻点手势。当检测到轻点手势时，它会将`changeMe`状态变量的值从`true`切换为`false`（或`false`切换为`true`）。整个`ContentView`文件应如下所示：\n\
    \n5. 在画布窗格上点击实时预览图标，然后点击矩形。注意，每次点击矩形时，`.onTapGesture`修饰符都会切换`changeMe`状态变量，这会使矩形的颜色在红色和黄色之间交替。\n\
    \n```swift\nimport SwiftUI\nstruct ContentView: View {\n    @State var changeMe\
    \ = false\n    var body: some View {\n        VStack {\n            Rectangle()\n\
    \                .frame(width: 175, height: 125)\n                .foregroundColor(changeMe\
    \ ? .red : .yellow)\n                .onTapGesture {\n                    changeMe.toggle()\n\
    \                }\n        }\n    }\n}\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \n默认情况下，`.onTapGesture`修饰符检测单次轻点手势。如果你想检测多次轻点，例如双击或三击，可以像这样定义`count:`参数：\n\n```swift\n\
    .onTapGesture(count: 2)\n```\n\n值为 2 表示双击，而值为 3 则表示三击。\n"
- fmt: '# Detecting Long Press Gestures


    A long press gesture occurs when the user presses one or more fingertips on the
    screen for a fixed amount of time where the fingertips don''t move very far. To
    define a long press, you can modify the following properties:


    - `minimumDuration` – Defines how long one or more fingertips must press down
    on the screen until the long press is recognized

    - `maximumDistance` – Defines how far fingertips can move before the long press
    gesture fails


    The simplest `.onLongPressGesture` modifier looks like this:


    ```

    .onLongPressGesture {

    //  Code to run

    }

    ```


    If you want, you can add the `minimumDuration:` and `maximumDistance:` parameters
    like this:


    ```

    .onLongPressGesture(minimumDuration: 3, maximumDistance: 2) {

    //  Code to run

    }

    ```


    The preceding version of the `.onLongPressGesture` modifier forces the user to
    hold a press for a minimum of three seconds. If you want to do something while
    the user presses down, you can use the `pressing:` parameter like this:


    ```

    .onLongPressGesture(minimumDuration: 2, maximumDistance: 2, pressing: {stillPressed
    in

    //  Code to run while the long press occurs

    }) {

    //  Code to run after detecting the long press gesture

    }

    ```


    To see how to detect a long press gesture, follow these steps:


    1. Create a new SwiftUI iOS App project and give it any name you wish such as
    "LongPressGesture."

    2. Click the `ContentView` file in the Navigator pane.

    3. Add the following State variables under the `struct ContentView: View` line:

    4. Add a `VStack` inside the body along with a `Text` view like this:


    ```

    struct ContentView: View {

    @State var changeMe = false

    @State var message = ""

    ```


    5. Add a `Rectangle` underneath the `Text` view:


    ```

    var body: some View {

    VStack {

    Text(message)

    }

    }

    ```


    6. Add the `.onLongPressGesture` modifier to the `Rectangle` like this:


    ```

    Rectangle()

    .frame(width: 175, height: 125)

    .foregroundColor(changeMe ? .red : .yellow)

    ```


    ```

    .onLongPressGesture(minimumDuration: 2, maximumDistance: 2, pressing: {stillPressed
    in

    message = "Long press in progress: \(stillPressed)"

    }) {

    changeMe.toggle()

    }

    ```


    The `pressing:` parameter displays `true` while the long press gesture is in progress.
    Then it displays `false` as soon as the long press gesture is completed. As soon
    as the long press gesture is completed, it toggles the `changeMe` State variable
    from `false` to `true` (or `true` to `false`).


    The entire `ContentView` file should look like this:


    7. Click the Live Preview icon in the Canvas pane.

    8. Move the mouse pointer over the rectangle and hold down the left mouse button
    to simulate a press gesture. Notice that the `Text` view displays "Long press
    in progress: true."

    9. Keep holding the left mouse button down until the rectangle changes color.
    This indicates that the `minimumDuration` of 2 has been reached and the long press
    gesture recognized.


    ```

    import SwiftUI

    struct ContentView: View {

    @State var changeMe = false

    @State var message = ""

    var body: some View {

    VStack {

    Text(message)

    Rectangle()

    .frame(width: 175, height: 125)

    .foregroundColor(changeMe ? .red : .yellow)

    .onLongPressGesture(minimumDuration: 2, maximumDistance: 2, pressing: {stillPressed
    in

    message = "Long press in progress: \(stillPressed)"

    }) {

    changeMe.toggle()

    }

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    ## Detecting Magnification Gestures


    A magnification gesture (also known as a pinch gesture) occurs when the user holds
    two fingertips on the screen and moves the fingertips apart or closer together.
    This magnification gesture often occurs when the user wants to zoom in on an image
    or zoom out to see more of something such as a larger view of a map.


    Since the magnification gesture changes the size of a view, you need to define
    two State variables that represent the current size and the final size as `CGFloat`
    data types like this:


    ```

    @State private var tempValue: CGFloat = 0

    @State private var finalValue: CGFloat = 1

    ```


    To resize a view, the magnification gesture needs to work with the `.scaleEffect`
    modifier on the view you want to resize such as:


    ```

    Image(systemName: "star.fill")

    .font(.system(size: 200))

    .foregroundColor(.green)

    .scaleEffect(finalValue + tempValue)

    ```


    Then you need to attach the `.gesture` modifier to the view you want to resize
    using the magnification gesture like this:


    ```

    .gesture(

    )

    ```


    Inside the parentheses of the `.gesture` modifier is where you define the magnification
    gesture. You need to detect when the magnification gesture changes and when it
    finally ends like this:


    ```

    .gesture(

    MagnificationGesture()

    .onChanged { amount in

    //  Code to run

    }

    .onEnded { amount in

    //  Code to run

    }

    )

    ```


    The `.onChanged` modifier measures how far the user moves two fingertips apart
    or closer together. The `.onEnded` modifier measures the distance between the
    two fingertips when the user ends the magnification gesture by lifting both fingertips
    off the screen.


    To see how to detect a magnification gesture, follow these steps:


    1. Create a new SwiftUI iOS App project and give it any name you wish such as
    "MagnificationGesture."

    2. Click the `ContentView` file in the Navigator pane.

    3. Add the following State variables under the `struct ContentView: View` line:

    4. Add a `VStack` with an `Image` inside the body like this:


    ```

    struct ContentView: View {

    @State private var tempValue: CGFloat = 0

    @State private var finalValue: CGFloat = 1

    ```


    ```

    var body: some View {

    VStack {

    Image(systemName: "star.fill")

    .font(.system(size: 200))

    .foregroundColor(.green)

    .scaleEffect(finalValue + tempValue)

    }

    }

    ```


    This displays a star in an `Image` view with a font size of 200 and filled with
    the color green. Notice the `.scaleEffect` modifier defines the size of the star
    image as the combination of the two State variables. A size of 1 represents the
    current size of the image where a smaller value shrinks the image and a larger
    value expands the image.


    5. Add a `.gesture` modifier to the `Image` since that''s what we want to resize
    using the magnification gesture like this:


    ```

    var body: some View {

    VStack {

    Image(systemName: "star.fill")

    .font(.system(size: 200))

    .foregroundColor(.green)

    .scaleEffect(finalValue + tempValue)

    .gesture(

    )

    }

    }

    ```


    This allows the `Image` view to recognize a gesture. Now we just need to define
    which gesture to recognize.


    6. Add the `MagnificationGesture` inside the `.gesture ()` parentheses along with
    defining an `.onChanged` and `.onEnded` modifiers like this:


    ```

    var body: some View {

    VStack {

    Image(systemName: "star.fill")

    .font(.system(size: 200))

    .foregroundColor(.green)

    .scaleEffect(finalValue + tempValue)

    .gesture(

    MagnificationGesture()

    .onChanged { amount in

    tempValue = amount - 1

    }

    .onEnded { amount in

    finalValue += tempValue

    tempValue = 0

    }

    )

    }

    }

    ```


    The `.onChanged` modifier measures the distance between the two fingertips and
    subtracts 1 to calculate the value of the `tempValue` State variable. If the user
    moves two fingertips apart, the value of `amount` will be greater than 1, so subtracting
    1 will leave the additional amount to resize the `Image`.


    The `.onEnded` modifier uses the last distance defined by the user''s two fingertips
    and stores that value in the `finalValue` State variable. Then it clears the `tempValue`
    State value to 0.


