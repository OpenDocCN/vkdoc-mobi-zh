    # 更改文本外观


    `Text` 视图通常显示纯文本。为了美化文本外观，SwiftUI 允许你通过在 Swift 代码中键入修饰符或通过检查器面板来定义字体大小、字重和颜色。字体大小选项包括特定的文本样式，这些样式可以自动适应
    iPhone 或 iPad 上定义的任何辅助功能设置。可用的字体大小选项如图 4-5 所示：


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig5_HTML.jpg](img/329781_6_En_4_Fig5_HTML.jpg)


    图 4-5


    用于显示文本的不同字体大小


    - 大标题

    - 标题

    - 标题 2

    - 标题 3

    - 标题行

    - 副标题行

    - 正文

    - 标注

    - 脚注

    - 说明

    - 说明 2


    如果你想为 `Text` 视图选择特定字体，可以通过自定义字体修饰符来实现，如下所示：


    ```

    .font(.custom("Courier", size: 36))

    ```


    在上述代码中，你定义了字体系列，后跟字体大小。请记住，Xcode 可能不支持所有字体。如果你只想定义自定义字体大小，可以省略字体名称，例如：


    ```

    .font(.custom("", size: 36))

    ```


    注意


    当你定义自定义字体和字体大小时，`Text` 视图将不会根据用户的 iOS 设置自动调整文本大小。因此，除非你确实需要，否则最好避免使用自定义字体。


    除了字体大小，你还可以选择字重，它定义了文本显示的粗细程度。字重选项包括以下内容，如图 4-6 所示：


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig6_HTML.jpg](img/329781_6_En_4_Fig6_HTML.jpg)


    图 4-6


    用于显示文本的不同字重


    - 超级粗体

    - 半粗体

    - 粗体

    - 常规

    - 细体

    - 黑色

    - 中等

    - 轻细

    - 极细


    修改文本外观的第三种方法是为文本选择颜色。你可以在 Swift 代码中键入颜色修饰符，或者在检查器面板中选择颜色，如图 4-7 所示。


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig7_HTML.jpg](img/329781_6_En_4_Fig7_HTML.jpg)


    图 4-7


    定义文本的颜色


    使用颜色时，你可以选择标准颜色选项，例如绿色、蓝色或黄色。如果你不想使用标准颜色，还可以选择“自定”，它允许你定义不同的颜色值以及不透明度值（范围从 0（不可见）到
    1（完全可见））。当你选择“自定”颜色选项时，会弹出一个颜色对话框，供你选择非标准颜色，如图 4-8 所示。


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig8_HTML.jpg](img/329781_6_En_4_Fig8_HTML.jpg)


    图 4-8


    为文本定义自定义颜色


    像文字处理软件一样，SwiftUI 也允许你将文本修改为斜体、粗体、下划线或删除线。要将这些效果添加到文本中，你可以键入以下命令：


    ```

    .bold()

    .italic()

    .underline()

    .strikethrough()

    ```


    除了键入这些修饰符，你还可以单击检查器面板中的“添加修饰符”弹出菜单，如图 4-9 所示。


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig9_HTML.jpg](img/329781_6_En_4_Fig9_HTML.jpg)


    图 4-9


    为文本添加粗体、斜体、下划线或删除线


    修改文本的另一种方法是定义其对齐方式。三种对齐方式如图 4-10 所示：


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig10_HTML.jpg](img/329781_6_En_4_Fig10_HTML.jpg)


    图 4-10


    三种文本对齐方式


    - 前导 – 文本向左边缘对齐。

    - 居中 – 每行文本在左右边缘之间居中显示。

    - 尾随 – 文本向右边缘对齐。


    你可以通过使用 `.multilineTextAlignment` 修饰符，或者在属性检查器中选择文本对齐选项来定义文本对齐，如图 4-11 所示。


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig11_HTML.jpg](img/329781_6_En_4_Fig11_HTML.jpg)


    图 4-11


    在检查器面板中对齐文本

