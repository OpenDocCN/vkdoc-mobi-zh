    \ = \"Left to right swipe\"\n} label: {\nImage(systemName: \"graduationcap\")\n\
    }.tint(.purple)\n}\n}\n}\n}\n}\n```\n\n完整的 `ContentView` 文件应如下所示：\n\n![../images/329781_6_En_13_Chapter/329781_6_En_13_Fig8_HTML.jpg](img/329781_6_En_13_Fig8_HTML.jpg)\n\
    \n图 13-8 – 从左到右滑动手势后 `List` 项的外观\n\n10. 单击画布窗格上的 Live Preview 图标。\n11. 从左向右滑动，查看\
    \ `.leading` 滑动手势 `Button` 的出现，如图 13-8 所示。\n\n```\nimport SwiftUI\n@available(iOS\
    \ 15.0, *)\nstruct ContentView: View {\n@State var myArray = [\"Cat\", \"Dog\"\
    , \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\", \"Canary\", \"\
    Tarantula\", \"Hamster\"]\n@State var message = \"\"\nvar body: some View {\n\
    VStack {\nText(\"\\(message)\")\nList {\nForEach(0...myArray.count - 1, id: \\\
    .self) { index in\nText(myArray[index])\n.swipeActions(edge: .trailing) {\nButton\
    \ {\nmessage = \"Item = \\(myArray[index]) -- Index = \\(index)\"\n} label: {\n\
    Image(systemName: \"calendar.circle\")\n}.tint(.yellow)\n}\n.swipeActions(edge:\
    \ .trailing) {\nButton {\nmessage = \"Green button selected\"\n} label: {\nImage(systemName:\
    \ \"book\")\n}.tint(.green)\n}\n.swipeActions(edge: .leading) {\nButton {\nmessage\
    \ = \"Left to right swipe\"\n} label: {\nImage(systemName: \"graduationcap\")\n\
    }.tint(.purple)\n}\n}\n}\n}\n}\n}\n@available(iOS 15.0, *)\nstruct ContentView_Previews:\
    \ PreviewProvider {\nstatic var previews: some View {\nContentView()\n}\n}\n```\n\
    \n![../images/329781_6_En_13_Chapter/329781_6_En_13_Fig9_HTML.jpg](img/329781_6_En_13_Fig9_HTML.jpg)\n\
    \n图 13-9 – 从右到左滑动手势后 `List` 项的外观\n\n12. 点击紫色毕业帽图标。屏幕顶部附近会出现 \"Left to right swipe\"\
    \ 消息。\n13. 从右向左滑动，查看两个 `.trailing` 滑动手势 `Button` 的出现，如图 13-9 所示。\n14. 点击绿色书本图标。会出现\
    \ \"Green button selected\" 消息。\n15. 从右向左滑动，查看两个 `.trailing` 滑动手势 `Button` 的出现（参见图\
    \ 13-9）。\n16. 点击黄色日历圆圈图标。该项的名称及其在数组中的索引位置将出现在屏幕顶部。\n\n> **注**  \n> 如果你创建了自定义的从右到左滑动手势，它将覆盖\
    \ `.onDelete` 手势。\n\n## 总结\n\n列表是一种将多个相关项显示在同一位置的常见方式。为了帮助组织 `List` 中的项，你可以将相关项分组。\n\
    \n除了在 `List` 中显示项之外，你还可以检测从左到右或从右到左的滑动手势。通过使用 `.onDelete` 修饰符，你可以允许用户从 `List`\
    \ 中删除项。通过使用 `NavigationView` 和一个 Edit 按钮，你可以使用 `.onMove` 修饰符允许用户在 `List` 内移动项。\n\
    \n你还可以定义要在 `List` 上显示的自定义滑动手势。创建自定义滑动手势时，你可以为每个 `Button` 定义要显示的图标和颜色。通过将滑动手势与\
    \ `List` 结合使用，用户可以通过不同方式修改 `List` 项。\n\n# 14. 使用表单和分组框\n\n当你填写纸质表单时，可能会注意到纸质表单将相关项分组在一起。例如，表单可能会在表单的一个区域询问你的姓名、地址和电话号码，并在表单的另一个区域询问你的性别、种族背景或婚姻状况。纸质表单使得在同一个区域输入相关数据变得很容易。\n\
    \nSwiftUI 的 Form 以类似的方式工作，它将提供用户可选择选项和设置的相关视图分组在一起。表单由可选的页眉、可选的页脚以及由 `Text`、`Slider`\
    \ 或 `Toggle` 等视图定义的内容组成，如图 14-1 所示。\n\n![../images/329781_6_En_14_Chapter/329781_6_En_14_Fig1_HTML.jpg](img/329781_6_En_14_Fig1_HTML.jpg)\n\
    \n图 14-1 – 表单的典型组成部分\n\n一个 Form 像堆栈一样将相关视图分组在一起。不同之处在于，Form 还在用户界面上以视觉方式将视图分组。Form\
    \ 内的所有视图会一起显示，而任何不在 Form 内的视图则会通过灰色区域分隔开，如图 14-2 所示。\n\n![../images/329781_6_En_14_Chapter/329781_6_En_14_Fig2_HTML.jpg](img/329781_6_En_14_Fig2_HTML.jpg)\n\
    \n图 14-2 – 表单在用户界面上将视图分组在一起\n\n与 Form 类似的是 Group Boxes（分组框），它为你提供了一种更简单的方法来在用户界面上以视觉方式将相关视图分组。当你需要将视图分组时，可以在\
    \ Form 和 Group Box 之间进行选择。\n"
- fmt: "# Creating a Simple Form\n\nThe simplest `Form` just groups one or more views\
    \ together. To create a `Form`, you just need to do this:\n\n```\nForm {\n   \
    \ //\n}\n```\n\nTo see how to create a simple `Form`, follow these steps:\n\n\
    1. Create a new SwiftUI iOS App project and give it any name you wish such as\
    \ \"SimpleForm.\"\n2. Click the `ContentView` file in the Navigator pane.\n3.\
    \ Add two `State` variables under the `struct ContentView: View` line like this:\n\
    \n```\nstruct ContentView: View {\n    @State var messageOne = \"\"\n    @State\
    \ var messageTwo = \"\"\n```\n\n4. Add a `VStack` inside the `var body: some View`\
    \ like this:\n\n```\nvar body: some View {\n    VStack {\n    }\n}\n```\n\n5.\
    \ Add two `Form` views and two `Text` views inside the `VStack` like this:\n\n\
    ```\nvar body: some View {\n    VStack {\n        Form {\n            Text(\"\
    This is the first Form\")\n            TextField(\"Type here\", text: $messageOne)\n\
    \        }\n        Form {\n            Text(\"This is the second Form\")\n  \
    \          TextField(\"Type here\", text: $messageTwo)\n        }\n        Text(\"\
    Form #1 = \\(messageOne)\")\n        Text(\"Form #2 = \\(messageTwo)\")\n    }\n\
    }\n```\n\nThe entire `ContentView` file should look like this:\n\n```\nimport\
    \ SwiftUI\n\nstruct ContentView: View {\n    @State var messageOne = \"\"\n  \
    \  @State var messageTwo = \"\"\n\n    var body: some View {\n        VStack {\n\
    \            Form {\n                Text(\"This is the first Form\")\n      \
    \          TextField(\"Type here\", text: $messageOne)\n            }\n      \
    \      Form {\n                Text(\"This is the second Form\")\n           \
    \     TextField(\"Type here\", text: $messageTwo)\n            }\n           \
    \ Text(\"Form #1 = \\(messageOne)\")\n            Text(\"Form #2 = \\(messageTwo)\"\
    )\n        }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider {\n   \
    \ static var previews: some View {\n        ContentView()\n    }\n}\n```\n\nThis\
    \ code creates a user interface that displays two forms on the screen along with\
    \ two `Text` views that are not part of either `Form` as shown in Figure 14-3.\n\
    \n![../images/329781_6_En_14_Chapter/329781_6_En_14_Fig3_HTML.jpg](images/329781_6_En_14_Chapter/329781_6_En_14_Fig3_HTML.jpg)\n\
    \n**Figure 14-3** Two Forms appear on the user interface\n\n1. Click the Live\
    \ Preview icon in the Canvas pane.\n2. Click in the top `TextField` and type some\
    \ text. Notice that this text now appears in the `Text` view (\"Form #1 =\") at\
    \ the bottom of the screen.\n3. Click in the middle `TextField` and type some\
    \ text. Notice that this text now appears in the `Text` view (\"Form #2 =\") at\
    \ the bottom of the screen.\n\n## Dividing a Form into Sections\n\nA `Form` can\
    \ hold one or more views. However, the more views in a `Form`, the more crowded\
    \ all of those views will appear. To group related views, you can divide a `Form`\
    \ into `Section`s where each `Section` can contain one or more views to display\
    \ on the screen. In addition, `Section`s can display an optional header and/or\
    \ footer.\n\nThe simplest `Section` just groups related views together like this:\n\
    \n```\nSection {\n    // Add views here\n}\n```\n\nWhile a `Section` visibly appears\
    \ distinct on the user interface, you can further distinguish a `Section` by using\
    \ a header and/or a footer. If you just want to define a header, you can use code\
    \ like this:\n\n```\nSection(\"Header text here\") {\n    // Add views here\n\
    }\n```\n\nThis method simply displays text in uppercase even if you don't type\
    \ it that way. Another way to define a header looks like this:\n\n```\nSection(content:\
    \ {\n    // Add views here\n}, header: {\n    // Define header text here\n})\n\
    ```\n\nYou can also use this method to define just a footer like this:\n\n```\n\
    Section(content: {\n    // Add views here\n}, footer: {\n    // Define footer\
    \ text here\n})\n```\n\n**Note:** The text in a footer appears exactly as you\
    \ type it, unlike a header that automatically displays text in all uppercase.\n\
    \nIf you want to define both a header and a footer, you can use this code:\n\n\
    ```\nSection {\n    // Add views here\n} header: {\n    // Define header text\
    \ here\n} footer: {\n    // Define footer text here\n}\n```\n\nTo see how to create\
    \ headers and footers in `Section`s, follow these steps:\n\n1. Create a new SwiftUI\
    \ iOS App project and give it any name you wish such as \"HeaderFormSections.\"\
    \n2. Click the `____App` file in the Navigator pane where `____` is the name of\
    \ your project.\n3. Add the following above the `struct`:\n\n```\n@available(iOS\
    \ 15.0, *)\n```\n\n4. Click the `ContentView` file in the Navigator pane.\n5.\
    \ Add the following above the two structures:\n\n```\n@available(iOS 15.0, *)\n\
    ```\n\n6. Add a `Form` inside the `var body: some View` like this:\n\n```\nvar\
    \ body: some View {\n    Form {\n    }\n}\n```\n\n7. Add four `Section`s defined\
    \ in different ways inside the `Form` like this:\n\n```\nvar body: some View {\n\
    \    Form {\n        Section {\n            Text(\"This Section has no header\"\
    )\n        }\n        Section(\"Just a Header\") {\n            Text(\"This Section\
    \ uses a simple header\")\n        }\n        Section {\n            Text(\"This\
    \ Section uses a simple footer\")\n        } footer: {\n            Text(\"Just\
    \ a Footer\")\n        }\n        Section {\n            Text(\"This Section uses\
    \ both a header and footer\")\n        } header: {\n            Text(\"The header\"\
    )\n        } footer: {\n            Text(\"The footer\")\n        }\n    }\n}\n\
    ```\n\nThe entire `ContentView` file should look like this:\n\n```\nimport SwiftUI\n\
    \n@available(iOS 15.0, *)\nstruct ContentView: View {\n    var body: some View\
    \ {\n        Form {\n            Section {\n                Text(\"This Section\
    \ has no header\")\n            }\n            Section(\"Just a Header\") {\n\
    \                Text(\"This Section uses a simple header\")\n            }\n\
    \            Section {\n                Text(\"This Section uses a simple footer\"\
    )\n            } footer: {\n                Text(\"Just a Footer\")\n        \
    \    }\n            Section {\n                Text(\"This Section uses both a\
    \ header and footer\")\n            } header: {\n                Text(\"The header\"\
    )\n            } footer: {\n                Text(\"The footer\")\n           \
    \ }\n        }\n    }\n}\n\n@available(iOS 15.0, *)\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```\n\nThe preceding code creates a `Form` with four different `Section`s\
    \ as shown in Figure 14-4.\n\n![../images/329781_6_En_14_Chapter/329781_6_En_14_Fig4_HTML.jpg](images/329781_6_En_14_Chapter/329781_6_En_14_Fig4_HTML.jpg)\n\
    \n**Figure 14-4** Four different ways to display a Section"
