- fmt: "### Restricting a Date Range\n\nWhen letting users select a date, you may\
    \ want to restrict the list of valid dates. For example, if you’re asking for\
    \ someone’s birthdate, it doesn’t make sense to let the `DatePicker` allow a user\
    \ to select an outrageously old date of birth such as February 3, 1737.\n\nTo\
    \ restrict a date range for a `DatePicker`, you must first define the start and\
    \ end date range such as:\n\n```\nlet dateRange: ClosedRange = {\n    let calendar\
    \ = Calendar.current\n    let startComponents = DateComponents(year: 2022, month:\
    \ 1, day: 1)\n    let endComponents = DateComponents(year: 2022, month: 12, day:\
    \ 31, hour: 23, minute: 59, second: 59)\n    return calendar.date(from: startComponents)!\n\
    \    ...\n    calendar.date(from: endComponents)!\n}()\n```\n\nNotice that a closed\
    \ range requires defining both a starting date and an ending date. The user can’t\
    \ go further in the past beyond the starting date and can’t go further in the\
    \ future beyond the ending date.\n\nBesides a closed range, you can also choose\
    \ a partial range. One way is to define a partial range that starts from a specific\
    \ date such as:\n\n```\nlet dateRange2: PartialRangeFrom = {\n    let calendar\
    \ = Calendar.current\n    let startComponents = DateComponents(year: 2021, month:\
    \ 1, day: 1)\n    return calendar.date(from: startComponents)!...\n}()\n```\n\n\
    The preceding range starts at January 1, 2021, and allows the `DatePicker` to\
    \ choose any date beyond this starting date. Another way to define a partial range\
    \ is one that goes up to but stops at a specific date such as:\n\n```\nlet dateRange3:\
    \ PartialRangeThrough = {\n    let calendar = Calendar.current\n    let stopComponents\
    \ = DateComponents(year: 2021, month: 1, day: 1)\n    return ...calendar.date(from:\
    \ stopComponents)!\n}()\n```\n\nThis range lets the `DatePicker` choose any date\
    \ up to the specified date (January 1, 2021, in this case). Once you define a\
    \ date range, you need to add this date range into the `DatePicker` like this:\n\
    \n```\nDatePicker(selection: $myDate, in: dateRange, displayedComponents: [.date],\
    \ label: { Text(\"Date\") })\n```\n\nThis `DatePicker` uses a `State` variable\
    \ called `myDate`, defines the valid range by the `dateRange` constant, and only\
    \ displays dates (and not times). If this `DatePicker` style is `.compact`, then\
    \ it will also display “Date” on the `DatePicker`.\n\nTo see how to use a `DatePicker`,\
    \ follow these steps:\n\n1. Create a new SwiftUI iOS App project and give it any\
