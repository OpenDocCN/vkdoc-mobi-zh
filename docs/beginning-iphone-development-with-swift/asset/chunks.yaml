    \                Text(\"Slider\")\n            } minimumValueLabel: {\n      \
    \          Text(\"1\")\n            } maximumValueLabel: {\n                Text(\"\
    50\")\n            }.padding()\n        }\n    }\n}\n\n@available(iOS 15.0, *)\n\
    struct ContentView_Previews: PreviewProvider {\n    static var previews: some\
    \ View {\n        ContentView()\n    }\n}\n```\n\nMake sure you also add the `@available(iOS\
    \ 15.0, *)` line inside the `____App` file such as\n\n```\nimport SwiftUI\n\n\
