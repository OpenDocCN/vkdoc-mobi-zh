    ## Detecting Rotation Gestures


    A rotation gesture is similar to a magnification gesture because they both use
    two fingertips. The main difference is that a rotation gesture detects when the
    two fingertips move in a circular motion clockwise or counterclockwise.


    Since the magnification gesture changes the angle of a view, you need to define
    one `State` variable that measures the angle of rotation as a `Double` data type
    like this:


