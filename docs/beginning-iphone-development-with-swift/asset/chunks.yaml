    \ 提供了另一种在结构体之间共享数据的方式。首先，创建一个包含一个或多个待共享变量的 `ObservableObject` 类。每个变量都必须像这样标记为\
    \ `@Published`：\n\n```\nclass ShareString: ObservableObject {\n    @Published\
    \ var message = \"\"\n}\n```\n\n包含 `TabView` 的结构体（例如 `ContentView`）需要定义一个 `@StateObject`\
    \ 变量，该变量定义一个来自 `ObservableObject` 类的对象，如下所示：\n\n```\n@StateObject var showMe =\
    \ ShareString()\n```\n\n由于我们想要在 Tab View 内的所有视图之间共享这个 `ObservableObject`，我们需要向\
    \ `TabView` 添加 `.environmentObject` 修饰符，并附带要共享的 StateObject，如下所示：\n\n```\nTabView\
    \ {\n}.environmentObject(showMe)\n```\n\n在每个需要访问 `ObservableObject` 的结构体内部，我们需要声明一个使用该\
    \ `ObservableObject` 类的 `@EnvironmentObject` 变量，如下所示：\n\n```\n@EnvironmentObject\
    \ var choice: ShareString\n```\n\n最后，在每个定义了 `@EnvironmentObject` 的结构体内部，我们可以通过使用\
    \ `@EnvironmentObject` 的名称加上 `@Published` 属性名来访问要共享的实际数据，如下所示：\n\n```\n$choice.message\n\
    ```\n\n在此例中，`choice` 是 `@EnvironmentObject` 的名称，`message` 是在 `ObservableObject`\
    \ 内定义的 `@Published` 属性。要了解如何使用 `ObservableObject` 共享数据，请遵循以下步骤：\n\n1.  创建一个新的\
    \ SwiftUI iOS App 项目，并为其任意命名，例如 `TabViewObservable`。\n\n2.  在导航器窗格中点击 `ContentView`\
    \ 文件。\n\n3.  在 `import SwiftUI` 行下创建一个 `ObservableObject` 类，如下所示：\n\n```\nclass\
    \ ShareString: ObservableObject {\n    @Published var message = \"\"\n}\n```\n\
    \n`@Published` 变量将包含在 Tab View 内的结构体之间共享的数据。\n\n4.  在 `struct ContentView: View`\
    \ 行下创建一个 `StateObject` 变量，如下所示：\n\n```\nstruct ContentView: View {\n    @StateObject\
    \ var showMe = ShareString()\n```\n\n这将基于 `ShareString` `ObservableObject` 创建一个新对象\
    \ (`showMe`)。\n\n5.  在 `var body: some View` 行内添加一个 `TabView`，如下所示：\n\n```\nvar\
    \ body: some View {\n    TabView {\n        TextField(\"在此输入\", text: $showMe.message)\n\
    \            .tabItem {\n                Image(systemName: \"house.fill\")\n \
    \               Text(\"主页\")\n            }\n        FileView()\n            .tabItem\
    \ {\n                Image(systemName: \"heart.fill\")\n                Text(\"\
    第一个\")\n            }\n        SeparateFileView()\n            .tabItem {\n  \
    \              Image(systemName: \"hare.fill\")\n                Text(\"第二个\"\
    )\n            }\n    }.environmentObject(showMe)\n}\n```\n\n确保在 `TabView` 的末尾添加了\
    \ `.environmentObject(showMe)` 修饰符。这允许共享 `showMe` 这个 `ObservableObject` (`ShareString`\
    \ 类)。前面的 `TabView` 打开了我们需要创建的名称为 `FileView` 和 `SeparateFileView` 的结构体。\n\n6. \
    \ 在 `struct ContentView` 结构体下方添加如下结构体：\n\n```\nstruct FileView: View {\n    @EnvironmentObject\
    \ var choice: ShareString\n    var body: some View {\n        HStack {\n     \
    \       Spacer()\n            VStack {\n                Spacer()\n           \
    \     TextField(\"在此输入:\", text: $choice.message)\n                Spacer()\n\
    \            }\n            Spacer()\n        }.background(Color.yellow)\n   \
    \ }\n}\n```\n\n请注意，此结构体定义了一个可以持有 `ShareString` `ObservableObject` 的 `@EnvironmentObject`\
    \ 变量。在 `TextField` 中，我们必须将文本存储在使用了 `message` `@Published` 属性 (`$choice.message`)\
    \ 的 `choice` `@EnvironmentObject` 中。整个 `ContentView` 文件应如下所示：\n\n7.  选择 **文件**\
    \ ➤ **新建** ➤ **文件**。出现一个对话框。\n\n8.  点击对话框顶部附近的 **iOS**，点击 **Swift 文件**，然后点击 **下一步**。Xcode\
    \ 会要求你为新创建的文件命名。\n\n9.  输入 `SeparateFile` 并点击 **创建**。Xcode 会创建一个新的 Swift 文件。\n\
    \n10. 删除 `SeparateFile` 中当前的所有代码，并将其替换为以下内容：\n\n```\nimport SwiftUI\n\nclass ShareString:\
    \ ObservableObject {\n    @Published var message = \"\"\n}\n\nstruct ContentView:\
    \ View {\n    @StateObject var showMe = ShareString()\n    var body: some View\
    \ {\n        TabView {\n            TextField(\"在此输入\", text: $showMe.message)\n\
    \                .tabItem {\n                    Image(systemName: \"house.fill\"\
    )\n                    Text(\"主页\")\n                }\n            FileView()\n\
    \                .tabItem {\n                    Image(systemName: \"heart.fill\"\
    )\n                    Text(\"第一个\")\n                }\n            SeparateFileView()\n\
    \                .tabItem {\n                    Image(systemName: \"hare.fill\"\
    )\n                    Text(\"第二个\")\n                }\n        }.environmentObject(showMe)\n\
    \    }\n}\n\nstruct FileView: View {\n    @EnvironmentObject var choice: ShareString\n\
    \    var body: some View {\n        HStack {\n            Spacer()\n         \
    \   VStack {\n                Spacer()\n                TextField(\"在此输入:\", text:\
    \ $choice.message)\n                Spacer()\n            }\n            Spacer()\n\
    \        }.background(Color.yellow)\n    }\n}\n\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```\n\n```\nimport SwiftUI\n\nstruct SeparateFileView: View {\n   \
    \ @EnvironmentObject var passedData: ShareString\n    var body: some View {\n\
    \        HStack {\n            Spacer()\n            VStack {\n              \
    \  Spacer()\n                TextField(\"在此输入\", text: $passedData.message)\n\
    \                Spacer()\n            }\n            Spacer()\n        }.background(Color.orange)\n\
    \    }\n}\n\nstruct SeparateFileView_Previews: PreviewProvider {\n    static var\
    \ previews: some View {\n        SeparateFileView()\n    }\n}\n```\n\n请注意，此结构体也声明了一个可以持有\
    \ `ShareString` `ObservableObject` 的 `@EnvironmentObject`。然后，`TextField` 使用 `passedData`\
    \ `@EnvironmentObject` 来访问 `message` `@Published` 属性 (`$passedData.message`)。\n\
    \n11. 在导航器窗格中点击 `ContentView` 文件。\n\n12. 点击画布窗格中的 **实时预览** 图标。\n\n13. 点击 `TextField`\
    \ 并输入一个短语。\n\n14. 点击 **第一个** 标签。注意，你在第 13 步输入的内容现在出现在 `FileView` 的 `TextField`\
    \ 中。\n\n15. 编辑 `TextField` 中的文本，然后点击 **主页** 标签。注意，修改后的文本现在出现在 `ContentView` 的\
    \ `TextField` 中。\n\n16. 编辑 `TextField` 中的文本，然后点击 **第二个** 标签。编辑后的文本现在出现在 `SeparateFileView`\
    \ 的 `TextField` 中。\n\n17. 编辑 `TextField` 中的文本，然后点击 **主页** 标签。注意，修改后的文本现在出现在 `ContentView`\
    \ 的 `TextField` 中。所有这些都展示了不同结构体如何访问 `ObservableObject` 中的 `@Published` 属性。\n\n\
    ## 总结\n\n标签页视图提供了另一种显示多个视图的方式，其中每个视图都可以由屏幕底部的一个标签页表示。标签页视图可以打开像 `Text` 或 `Image`\
    \ 视图这样简单的视图，但更常使用由结构体定义的视图。这些结构体可以存储在同一个文件中，也可以存储在单独的文件中。\n\n标签页视图可以将数据传递给另一个视图，很像将数据传递给函数。这个其他视图需要定义一个属性，然后标签页视图就可以将数据传递给该属性。如果你想将可以修改的数据传递给另一个视图，可以使用两种不同的方法。\n\
    \n第一种方法使用 `@State` 和 `@Binding` 变量，并强制标签页视图将数据传递给它打开的每个视图。第二种方法使用 `ObservableObjects`、`StateObjects`\
    \ 和 `EnvironmentObjects` 在多个视图之间共享数据。\n\n标签页视图在屏幕底部最多可以显示五个标签页。如果你定义了超过五个标签页，SwiftUI\
    \ 会自动创建一个**更多**标签页，并在导航视图中显示所有额外的标签页。\n\n由于标签页视图在屏幕底部只能显示五个标签页，你可以将标签页视图转换为页面视图。这样，你可以在屏幕底部显示超过五个图标。与标签页视图不同，页面视图强制用户按顺序在屏幕之间导航。当用户需要跳转到你应用用户界面上的不同屏幕时，标签页视图非常方便。\n"
- fmt: "# 18. Using Grids\n\nA `Text` view is fine for displaying strings, and an\
    \ `Image` view is perfect for displaying graphics. However, what if you want to\
    \ display multiple chunks of data on the screen? That’s when you can use a grid\
    \ that can display data in rows (horizontally) or columns (vertically) as shown\
    \ in Figure 18-1.\n\n![../images/329781_6_En_18_Chapter/329781_6_En_18_Fig1_HTML.jpg](images/329781_6_En_18_Chapter/329781_6_En_18_Fig1_HTML.jpg)\n\
    \nFigure 18-1 – Grids can display data horizontally or vertically\n\nCreating\
    \ a grid requires three items:\n\n* The data you want to display\n* An array of\
    \ `GridItem` that defines how to arrange data in a grid\n* A `LazyVGrid` or `LazyHGrid`\
    \ that places your data in the array of `GridItem`\n\nThe term “Lazy” refers to\
    \ the way the grid loads data. If a grid needs to display 1000 items, it could\
    \ load all 1000 items in memory even though most of those items can’t be shown\
    \ on the screen. Since this wastes memory, “Lazy” grids only load those items\
    \ that need to be displayed. The moment the user scrolls to view more data, the\
    \ Lazy grid immediately loads those items. By waiting until the last second to\
    \ load data, Lazy grids use far less memory and allow an app to run more efficiently\
    \ at the slight trade-off of running slightly slower.\n\n> **Note:** Lazy grids\
    \ are commonly embedded inside of a `ScrollView` to let users scroll to see more\
    \ data stored in the grid.\n\nTo see how to create a simple horizontal and vertical\
    \ grid, follow these steps:\n\n1. Create a new SwiftUI iOS App project and give\
    \ it any name you wish such as “SimpleGrid.”\n2. Click the `ContentView` file\
    \ in the Navigator pane.\n3. Add a `VStack` and create an array of `GridItem`\
    \ inside the `var body: some View` like this:\n\n```\nvar body: some View {\n\
    \    VStack {\n        let gridItems = [GridItem()]\n    }\n}\n```\n\n`GridItem`\
    \ is a structure in SwiftUI that allows you to define the spacing between columns\
    \ and rows. For now, we’ll just use default values by leaving the `GridItem` parameter\
    \ list empty.\n\n4. Add a `ScrollView` and a `LazyHGrid` underneath the `gridItems`\
    \ array like this:\n\n```\nScrollView(Axis.Set.horizontal, showsIndicators: true,\
    \ content: {\n    LazyHGrid(rows: gridItems) {\n        Image(systemName: \"1.circle\"\
    )\n        Image(systemName: \"2.circle\")\n        Image(systemName: \"3.circle\"\
    )\n        Image(systemName: \"4.circle\")\n        Image(systemName: \"5.circle\"\
    )\n        Image(systemName: \"6.circle\")\n        Image(systemName: \"7.circle\"\
    )\n        Image(systemName: \"8.circle\")\n        Image(systemName: \"9.circle\"\
    )\n        Image(systemName: \"10.circle\")\n    }.font(.largeTitle)\n})\n```\n\
    \nThis code defines a horizontal `ScrollView` (`Axis.Set.horizontal`) with a `LazyHGrid`\
    \ inside that displays a row of data. The `LazyHGrid` can hold a maximum of ten\
    \ views, so we fill it with ten `Image` views displaying a different number inside\
    \ the circle. Since the circle icons are small, the `.font(.largeTitle)` modifier\
    \ makes them larger and easier to see.\n\n5. Add a second `ScrollView` with a\
    \ `LazyVGrid` underneath the other `ScrollView` like this:\n\n```\nScrollView(Axis.Set.vertical,\
    \ showsIndicators: true, content: {\n    LazyVGrid(columns: gridItems) {\n   \
    \     Image(systemName: \"1.square\")\n        Image(systemName: \"2.square\"\
    )\n        Image(systemName: \"3.square\")\n        Image(systemName: \"4.square\"\
    )\n        Image(systemName: \"5.square\")\n        Image(systemName: \"6.square\"\
    )\n        Image(systemName: \"7.square\")\n        Image(systemName: \"8.square\"\
    )\n        Image(systemName: \"9.square\")\n        Image(systemName: \"10.square\"\
    )\n    }.font(.largeTitle)\n})\n```\n\nThis code defines a vertical `ScrollView`\
    \ (`Axis.Set.vertical`) with a `LazyVGrid` inside that displays a column of data.\
    \ That data consists of ten `Image` views that display a different number inside\
    \ of a square. The `.font(.largeTitle)` modifier makes these square icons larger\
    \ and easier to see. The entire `ContentView` file should look like this:\n\n\
    ![../images/329781_6_En_18_Chapter/329781_6_En_18_Fig2_HTML.jpg](images/329781_6_En_18_Chapter/329781_6_En_18_Fig2_HTML.jpg)\n\
    \nFigure 18-2 – Displaying a horizontal grid on top of a vertical grid\n\n6. Click\
    \ the Live Preview icon on the Canvas pane.\n7. Scroll the horizontal grid left\
    \ to right to see all the numbered circles as shown in Figure 18-2.\n\n```\nimport\
    \ SwiftUI\nstruct ContentView: View {\n    var body: some View {\n        VStack\
    \ {\n            let gridItems = [GridItem()]\n            ScrollView(Axis.Set.horizontal,\
    \ showsIndicators: true, content: {\n                LazyHGrid(rows: gridItems)\
    \ {\n                    Image(systemName: \"1.circle\")\n                   \
    \ Image(systemName: \"2.circle\")\n                    Image(systemName: \"3.circle\"\
    )\n                    Image(systemName: \"4.circle\")\n                    Image(systemName:\
    \ \"5.circle\")\n                    Image(systemName: \"6.circle\")\n       \
    \             Image(systemName: \"7.circle\")\n                    Image(systemName:\
    \ \"8.circle\")\n                    Image(systemName: \"9.circle\")\n       \
    \             Image(systemName: \"10.circle\")\n                }.font(.largeTitle)\n\
    \            })\n            ScrollView(Axis.Set.vertical, showsIndicators: true,\
    \ content: {\n                LazyVGrid(columns: gridItems) {\n              \
    \      Image(systemName: \"1.square\")\n                    Image(systemName:\
    \ \"2.square\")\n                    Image(systemName: \"3.square\")\n       \
    \             Image(systemName: \"4.square\")\n                    Image(systemName:\
    \ \"5.square\")\n                    Image(systemName: \"6.square\")\n       \
    \             Image(systemName: \"7.square\")\n                    Image(systemName:\
    \ \"8.square\")\n                    Image(systemName: \"9.square\")\n       \
    \             Image(systemName: \"10.square\")\n                }.font(.largeTitle)\n\
    \            })\n        }\n    }\n}\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \n8. Scroll the vertical grid up and down to see all the numbered squares."
  raw: '# 18. Using Grids


    A Text view is fine for displaying strings, and an Image view is perfect for displaying
    graphics. However, what if you want to display multiple chunks of data on the
    screen? That’s when you can use a grid that can display data in rows (horizontally)
    or columns (vertically) as shown in Figure [18-1](#329781_6_En_18_Chapter.xhtml#Fig1).


    ![../images/329781_6_En_18_Chapter/329781_6_En_18_Fig1_HTML.jpg](images/329781_6_En_18_Chapter/329781_6_En_18_Fig1_HTML.jpg)


    Figure 18-1


    Grids can display data horizontally or vertically


    Creating a grid requires three items:


    *   The data you want to display


    *   An array of GridItem that defines how to arrange data in a grid


    *   A LazyVGrid or LazyHGrid that places your data in the array of GridItem


    The term “Lazy” refers to the way the grid loads data. If a grid needs to display
    1000 items, it could load all 1000 items in memory even though most of those items
    can’t be shown on the screen. Since this wastes memory, “Lazy” grids only load
    those items that need to be displayed. The moment the user scrolls to view more
    data, the Lazy grid immediately loads those items. By waiting until the last second
    to load data, Lazy grids use far less memory and allow an app to run more efficiently
    at the slight trade-off of running slightly slower.


    Note


    Lazy grids are commonly embedded inside of a Scroll View to let users scroll to
    see more data stored in the grid.


    To see how to create a simple horizontal and vertical grid, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “SimpleGrid.”


    2.  Click the ContentView file in the Navigator pane.


    3.  Add a VStack and create an array of GridItem inside the var body: some View
    like this:


    ```

    var body: some View {

    VStack {

    let gridItems = [GridItem()]

    }

    }

    ```


    GridItem is a structure in SwiftUI that allows you to define the spacing between
    columns and rows. For now, we’ll just use default values by leaving the GridItem
    parameter list empty.


    1.  Add a ScrollView and a LazyHGrid underneath the gridItems array like this:


    ```

    ScrollView(Axis.Set.horizontal, showsIndicators: true, content: {

    LazyHGrid(rows: gridItems) {

    Image(systemName: "1.circle")

    Image(systemName: "2.circle")

    Image(systemName: "3.circle")

    Image(systemName: "4.circle")

    Image(systemName: "5.circle")

    Image(systemName: "6.circle")

    Image(systemName: "7.circle")

    Image(systemName: "8.circle")

    Image(systemName: "9.circle")

    Image(systemName: "10.circle")

    }.font(.largeTitle)

    })

    ```


    This code defines a horizontal Scroll View (Axis.Set.horizontal) with a LazyHGrid
    inside that displays a row of data. The LazyHGrid can hold a maximum of ten views,
    so we fill it with ten Image views displaying a different number inside the circle.
    Since the circle icons are small, the .font(.largeTitle) modifier makes them larger
    and easier to see.


    1.  Add a second ScrollView with a LazyVGrid underneath the other Scroll View
    like this:


    ```

    ScrollView(Axis.Set.vertical, showsIndicators: true, content: {

    LazyVGrid(columns: gridItems) {

    Image(systemName: "1.square")

    Image(systemName: "2.square")

    Image(systemName: "3.square")

    Image(systemName: "4.square")

    Image(systemName: "5.square")

    Image(systemName: "6.square")

    Image(systemName: "7.square")

    Image(systemName: "8.square")

    Image(systemName: "9.square")

    Image(systemName: "10.square")

    }.font(.largeTitle)

    })

    ```


    This code defines a vertical Scroll View (Axis.Set.vertical) with a LazyVGrid
    inside that displays a column of data. That data consists of ten Image views that
    display a different number inside of a square. The .font(.largeTitle) modifier
    makes these square icons larger and easier to see. The entire ContentView file
    should look like this:


    ![../images/329781_6_En_18_Chapter/329781_6_En_18_Fig2_HTML.jpg](images/329781_6_En_18_Chapter/329781_6_En_18_Fig2_HTML.jpg)


    Figure 18-2


    Displaying a horizontal grid on top of a vertical grid


    1.  Click the Live Preview icon on the Canvas pane.


    2.  Scroll the horizontal grid left to right to see all the numbered circles as
    shown in Figure [18-2](#329781_6_En_18_Chapter.xhtml#Fig2).


    ```

    import SwiftUI

    struct ContentView: View {

    var body: some View {

    VStack {

    let gridItems = [GridItem()]

    ScrollView(Axis.Set.horizontal, showsIndicators: true, content: {

    LazyHGrid(rows: gridItems) {

    Image(systemName: "1.circle")

    Image(systemName: "2.circle")

    Image(systemName: "3.circle")

    Image(systemName: "4.circle")

    Image(systemName: "5.circle")

    Image(systemName: "6.circle")

    Image(systemName: "7.circle")

    Image(systemName: "8.circle")

    Image(systemName: "9.circle")

    Image(systemName: "10.circle")

    }.font(.largeTitle)

    })

    ScrollView(Axis.Set.vertical, showsIndicators: true, content: {

    LazyVGrid(columns: gridItems) {

    Image(systemName: "1.square")

    Image(systemName: "2.square")

    Image(systemName: "3.square")

    Image(systemName: "4.square")

    Image(systemName: "5.square")

    Image(systemName: "6.square")

    Image(systemName: "7.square")

    Image(systemName: "8.square")

    Image(systemName: "9.square")

    Image(systemName: "10.square")

    }.font(.largeTitle)

    })

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    1.  Scroll the vertical grid up and down to see all the numbered squares.'
  trans: "\n# 18. 使用网格\n\n`Text` 视图适合显示字符串，而 `Image` 视图则完美适用于显示图形。但是，如果你想在屏幕上显示多块数据呢？这时你可以使用网格，它能够以行（水平方向）或列（垂直方向）的形式显示数据，如图\
    \ 18-1 所示。\n\n![../images/329781_6_En_18_Chapter/329781_6_En_18_Fig1_HTML.jpg](img/329781_6_En_18_Fig1_HTML.jpg)\n\
    \n图 18-1 —— 网格可以水平或垂直显示数据\n\n创建网格需要三个要素：\n\n*   你想要显示的数据\n*   一个 `GridItem` 数组，用于定义数据在网格中的排列方式\n\
    *   一个 `LazyVGrid` 或 `LazyHGrid`，用于将你的数据放置到 `GridItem` 数组中\n\n“Lazy”一词指的是网格加载数据的方式。如果一个网格需要显示\
    \ 1000 个项目，它可能会将所有 1000 个项目加载到内存中，即使其中大部分项目无法显示在屏幕上。由于这会浪费内存，“懒加载”网格只会加载那些需要显示的项目。当用户滚动以查看更多数据时，懒加载网格会立即加载这些项目。通过等到最后一刻才加载数据，懒加载网格使用的内存少得多，并且能让应用运行更高效，代价是运行速度会稍微慢一点。\n\
    \n> **注意：** 懒加载网格通常嵌入在 `ScrollView` 内部，以便用户能够滚动查看网格中存储的更多数据。\n\n要了解如何创建一个简单的水平和垂直网格，请按照以下步骤操作：\n\
    \n1.  创建一个新的 SwiftUI iOS App 项目，并为其命名，例如“SimpleGrid”。\n2.  在导航器窗格中点击 `ContentView`\
    \ 文件。\n3.  在 `var body: some View` 中添加一个 `VStack`，并创建一个 `GridItem` 数组，如下所示：\n\n\
    ```\nvar body: some View {\n    VStack {\n        let gridItems = [GridItem()]\n\
    \    }\n}\n```\n\n`GridItem` 是 SwiftUI 中的一个结构体，允许你定义列和行之间的间距。目前，我们通过将 `GridItem`\
    \ 的参数列表留空来使用默认值。\n\n4.  在 `gridItems` 数组下方，添加一个 `ScrollView` 和一个 `LazyHGrid`，如下所示：\n\
    \n```\nScrollView(Axis.Set.horizontal, showsIndicators: true, content: {\n   \
    \ LazyHGrid(rows: gridItems) {\n        Image(systemName: \"1.circle\")\n    \
    \    Image(systemName: \"2.circle\")\n        Image(systemName: \"3.circle\")\n\
    \        Image(systemName: \"4.circle\")\n        Image(systemName: \"5.circle\"\
    )\n        Image(systemName: \"6.circle\")\n        Image(systemName: \"7.circle\"\
    )\n        Image(systemName: \"8.circle\")\n        Image(systemName: \"9.circle\"\
    )\n        Image(systemName: \"10.circle\")\n    }.font(.largeTitle)\n})\n```\n\
    \n这段代码定义了一个水平的 `ScrollView`（`Axis.Set.horizontal`），里面包含一个 `LazyHGrid`，用于显示一行数据。`LazyHGrid`\
    \ 最多可以容纳十个视图，所以我们用十个 `Image` 视图填充它，每个视图在圆圈内显示一个不同的数字。由于圆圈图标很小，`.font(.largeTitle)`\
    \ 修饰符使它们变大，更容易看清。\n\n5.  在另一个 `ScrollView` 下方，添加第二个带有 `LazyVGrid` 的 `ScrollView`，如下所示：\n\
    \n```\nScrollView(Axis.Set.vertical, showsIndicators: true, content: {\n    LazyVGrid(columns:\
    \ gridItems) {\n        Image(systemName: \"1.square\")\n        Image(systemName:\
    \ \"2.square\")\n        Image(systemName: \"3.square\")\n        Image(systemName:\
    \ \"4.square\")\n        Image(systemName: \"5.square\")\n        Image(systemName:\
    \ \"6.square\")\n        Image(systemName: \"7.square\")\n        Image(systemName:\
    \ \"8.square\")\n        Image(systemName: \"9.square\")\n        Image(systemName:\
