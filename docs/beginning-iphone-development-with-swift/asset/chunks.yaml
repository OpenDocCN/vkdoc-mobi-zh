- fmt: '# Changing the Appearance of Text


    A `Text` view normally displays plain text. To spice up the appearance of text,
    SwiftUI lets you define a font size, weight, and color by either typing modifiers
    in Swift code or through the Inspector pane. The font size options include specific
    text styles that can automatically adapt to any accessibility settings defined
    on an iPhone or iPad. The available font size options are shown in Figure [4-5](#329781_6_En_4_Chapter.xhtml#Fig5):


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig5_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig5_HTML.jpg)


    Figure 4-5


    Different font sizes for displaying text


    - Large Title

    - Title

    - Title 2

    - Title 3

    - Headline

    - Subheadline

    - Body

    - Callout

    - Footnote

    - Caption

    - Caption 2


    In case you want to choose a specific font for a `Text` view, you can do that
    using the custom font modifier like this:


    ```

    .font(.custom("Courier", size: 36))

    ```


    In the preceding code, you define the font family followed by the font size. Just
    keep in mind that Xcode may not support all fonts. If you just want to define
    a custom font size, you can omit the font name such as:


    ```

    .font(.custom("", size: 36))

    ```


    Note


    When you define custom fonts and font sizes, the `Text` view will not automatically
    resize text based on the user’s iOS settings. For that reason, it’s best to avoid
    custom fonts unless you absolutely need them.


    In addition to the font size, you can also select a weight, which defines how
    thin or thick text can appear. The weight options include the following as shown
    in Figure [4-6](#329781_6_En_4_Chapter.xhtml#Fig6):


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig6_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig6_HTML.jpg)


    Figure 4-6


    Different weights for displaying text


    - Heavy

    - Semibold

    - Bold

    - Regular

    - Thin

    - Black

    - Medium

    - Light

    - Ultralight


    A third way to modify the appearance of text is to choose a color for text. You
    can type a color modifier in Swift code or choose a color in the Inspector pane
    as shown in Figure [4-7](#329781_6_En_4_Chapter.xhtml#Fig7).


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig7_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig7_HTML.jpg)


    Figure 4-7


    Defining a color for text


    With color, you can choose a standard color option such as green, blue, or yellow.
    If you don’t want to use a standard color, you can also choose Custom, which lets
    you define different color values and an opacity value as well from 0 (invisible)
    to 1 (completely visible). When you choose a Custom color option, a color dialog
    appears for you to choose a nonstandard color as shown in Figure [4-8](#329781_6_En_4_Chapter.xhtml#Fig8).


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig8_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig8_HTML.jpg)


    Figure 4-8


    Defining a custom color for text


    Just like a word processor, SwiftUI also lets you modify text in italics, bold,
    underline, or strikethrough. To add these effects to text, you can type the following
    commands:


    ```

    .bold()

    .italic()

    .underline()

    .strikethrough()

    ```


    Rather than type these modifiers, you can also click the Add Modifier popup menu
    in the Inspector pane as shown in Figure [4-9](#329781_6_En_4_Chapter.xhtml#Fig9).


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig9_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig9_HTML.jpg)


    Figure 4-9


    Adding bold, italics, underline, or strikethrough to text


    Another way to modify text is to define its alignment. The three types of alignment
    are shown in Figure [4-10](#329781_6_En_4_Chapter.xhtml#Fig10):


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig10_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig10_HTML.jpg)


    Figure 4-10


    Three ways to align text


    - Leading – Text aligns on the left edge.

    - Center – Each line of text appears centered between the left and right edges.

    - Trailing – Text aligns on the right edge.


    You can define text alignment by using the `.multilineTextAlignment` modifier
    or through choosing a text alignment option in the Attributes Inspector as shown
    in Figure [4-11](#329781_6_En_4_Chapter.xhtml#Fig11).


    ![../images/329781_6_En_4_Chapter/329781_6_En_4_Fig11_HTML.jpg](images/329781_6_En_4_Chapter/329781_6_En_4_Fig11_HTML.jpg)


    Figure 4-11


    Aligning text in the Inspector pane'
