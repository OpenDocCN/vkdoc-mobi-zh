- fmt: 'Underneath the `Toggle`, an `if` statement appears. If the `message` variable
    is `true`, then it shows a `Text` view that displays “Here’s a secret message!”.
    If the `message` variable is `false`, then the `Text` view does not appear at
    all.


    ## Modifying the User Interface with the Inspector Pane


    Creating a user interface in SwiftUI typically involves two steps. First, you
    arrange how you want the various user interface views to appear on the screen.
    Next, you need to customize each user interface view by changing its size, color,
    or position.


    To customize user interface views, you add modifiers. Xcode gives you two ways
    to add modifiers:


    ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig11_HTML.jpg](images/329781_6_En_2_Chapter/329781_6_En_2_Fig11_HTML.jpg)


    Figure 2-11: The Inspector pane displays different ways to modify a user interface
    view


    *   Type modifiers directly in the Editor pane.

    *   Click the view you want to modify and then select a modifier from the Inspector
    pane as shown in Figure 2-11.


    Typing modifiers directly into the Editor pane requires knowing the names of the
    modifiers you want to use. As you get more experienced, typing modifiers directly
    into your Swift code will be faster. However, when you’re first getting started,
    you may not know which modifiers are even available. That’s when you might prefer
    using the Inspector pane.


    First, select the user interface view you want to modify. You can do this by moving
    the cursor into the Swift code that defines that user interface view or by clicking
    that user interface view in the Canvas pane. When you select a user interface
    view, the Inspector pane displays modifiers for that particular view.


    The Inspector pane displays the most commonly used modifiers such as letting you
    choose the font, alignment, or color for text. By clicking the **Add Modifier**
    button near the bottom of the Inspector pane, you can view a list of additional
    modifiers as shown in Figure 2-12.


    ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig12_HTML.jpg](images/329781_6_En_2_Chapter/329781_6_En_2_Fig12_HTML.jpg)


    Figure 2-12: The **Add Modifier** button displays a list of additional modifiers
    you can use


    When you see a modifier you want to use from the **Add Modifier** list, click
    that modifier. Xcode displays that modifier in the Inspector pane. If you no longer
    want to see any modifiers you may have added to the Inspector pane, click the
    **Delete** button in the upper right corner of that modifier as shown in Figure
    2-13.


    ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig13_HTML.jpg](images/329781_6_En_2_Chapter/329781_6_En_2_Fig13_HTML.jpg)


    Figure 2-13: A **Delete** button appears to remove modifiers you may have added
    to the Inspector pane


    Keep in mind that the order that you apply modifiers can make a difference. Consider
    the following `Text` view with two modifiers, a background and a padding:


    ```

    Text("Here''s a secret message!")

    .background(Color.yellow)

    .padding()

    ```


    This adds a background color of yellow to the `Text` view, then adds padding (space)
    around that `Text` view. Suppose you switched these modifiers around like this:


    ```

    Text("Here''s a secret message!")

    .padding()

    .background(Color.yellow)

    ```


    This order adds padding (space) around the `Text` view first. Then it colors the
    background, but because the background now includes the added space, the background
    color fills the space around the `Text` view as well, as shown in Figure 2-14.


    ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig14_HTML.jpg](images/329781_6_En_2_Chapter/329781_6_En_2_Fig14_HTML.jpg)


    Figure 2-14: The order of modifiers can make a difference


    No matter which method you use to add modifiers, Xcode keeps everything synchronized.
    So if you type modifiers in the Editor pane, your changes automatically appear
    in the Inspector pane. Likewise, if you choose a modifier in the Inspector pane,
    Xcode automatically adds that modifier to your Swift code in the Editor pane.


    To see how to change the appearance of a user interface item, follow these steps:


    1.  Make sure your `SwiftExample` project from the previous section is loaded
    in Xcode. The `ContentView` file should contain a `Toggle` and a `Text` view that
    appears underneath the `Toggle`.


    2.  Click the `Toggle` in the Canvas pane or move the cursor in the `Toggle` in
    the Editor pane. Xcode displays the Inspector pane on the right side of the Xcode
    window, which shows you the modifiers you can choose to change the appearance
    of the `Toggle`.


    3.  Click the `Text` view in the Canvas pane that displays “Here’s a secret message!”,
    or move the cursor into the `Text` view in the Editor pane. Notice that the Inspector
    pane displays modifiers to change the appearance of the `Text` view.


    4.  Click the **Font** popup menu. A list of different font options appears as
    shown in Figure 2-15.


    ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig15_HTML.jpg](images/329781_6_En_2_Chapter/329781_6_En_2_Fig15_HTML.jpg)


    Figure 2-15: The **Font** popup menu displays different font options


    5.  Choose **Large Title**. Notice that Xcode automatically adds the `.font(.largeTitle)`
    command in the `ContentView` file as shown in the following:


    ```

    Text("Here''s a secret message!")

    .font(.largeTitle)

    ```


    6.  Click the **Weight** popup menu and choose **Semibold**.

    7.  Click the **Color** popup menu and choose **Red**. Notice that each time you
    choose a modifier, Xcode automatically adds the Swift code to your `.swift` file
    as shown in the following:


    ```

    Text("Here''s a secret message!")

    .font(.largeTitle)

    .fontWeight(.semibold)

    .foregroundColor(Color.red)

    ```


    8.  Move the cursor into `ContentView()` inside the `ContentView_Previews: PreviewProvider`
    structure.

    9.  Click the **Device** popup menu in the Inspector pane.

    10.  Choose an iPad model. Notice that the Canvas pane changes to mimic an iPad.
    Also note how SwiftUI automatically modifies the appearance of your user interface
    so it appears correctly on a different size screen as shown in Figure 2-16. (Xcode
    may take time to change the Canvas pane to display a different iOS device, so
    be patient.)


    ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig16_HTML.jpg](images/329781_6_En_2_Chapter/329781_6_En_2_Fig16_HTML.jpg)


    Figure 2-16: SwiftUI adapts user interfaces to different size screens


    11.  Click the **Device** popup menu again and choose an iPhone model such as
    **iPhone 11**. The canvas now changes to mimic your chosen iPhone model.


    The basic idea behind SwiftUI is to let you design your user interface and let
    Xcode automatically adjust its appearance for different iOS screen sizes. Instead
    of writing a lot of Swift code to design your user interface, SwiftUI lets you
    focus on writing a minimal amount of Swift code to design your user interface
    so you can focus your time writing Swift code to make your app do something unique.'
