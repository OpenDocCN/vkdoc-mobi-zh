    \ file and then create a `State` variable to hold a date like this:\n\n```\nimport\
    \ SwiftUI\n@available(iOS 15, *)\n@main\nstruct DatePickerApp: App {\n    var\
    \ body: some Scene {\n        WindowGroup {\n            ContentView()\n     \
    \   }\n    }\n}\n```\n\n6. Define three date ranges as follows:\n\n```\n@State\
    \ var myDate = Date.now\n```\n\n7. Create a `VStack` to hold a `Text` view and\
    \ a `DatePicker` like this:\n\n```\nlet dateRange: ClosedRange = {\n    let calendar\
    \ = Calendar.current\n    let startComponents = DateComponents(year: 2021, month:\
    \ 1, day: 1)\n    let endComponents = DateComponents(year: 2021, month: 12, day:\
    \ 31, hour: 23, minute: 59, second: 59)\n    return calendar.date(from: startComponents)!\n\
    \    ...\n    calendar.date(from: endComponents)!\n}()\nlet dateRange2: PartialRangeFrom\
    \ = {\n    let calendar = Calendar.current\n    let startComponents = DateComponents(year:\
    \ 2021, month: 1, day: 1)\n    let endComponents = DateComponents(year: 2021,\
    \ month: 12, day: 31, hour: 23, minute: 59, second: 59)\n    return calendar.date(from:\
    \ endComponents)!...\n}()\nlet dateRange3: PartialRangeThrough = {\n    let calendar\
    \ = Calendar.current\n    let startComponents = DateComponents(year: 2021, month:\
    \ 1, day: 1)\n    let endComponents = DateComponents(year: 2021, month: 12, day:\
    \ 31, hour: 23, minute: 59, second: 59)\n    return ...calendar.date(from: startComponents)!\n\
    }()\n```\n\n```\nvar body: some View {\n    VStack {\n        Text(\"Chosen date\
    \ = \\(myDate)\")\n            .padding()\n        DatePicker(selection: $myDate,\
    \ in: dateRange3, displayedComponents: [.date], label: { Text(\"Date\") })\n \
    \           .datePickerStyle(.graphical)\n            .padding()\n    }\n}\n```\n\
    \nThe entire `ContentView` file should look like this:\n\n![../images/329781_6_En_8_Chapter/329781_6_En_8_Fig8_HTML.jpg](images/329781_6_En_8_Chapter/329781_6_En_8_Fig8_HTML.jpg)\n\
    \n**Figure 8-8** – The user interface showing a `Text` view and a `DatePicker`\n\
    \n8. Click the Live Preview icon in the Canvas pane and click any date. Notice\
    \ that when you choose a date, it appears above the `DatePicker` as shown in Figure\
    \ 8-8.\n\n```\nimport SwiftUI\n@available(iOS 15, *)\nstruct ContentView: View\
