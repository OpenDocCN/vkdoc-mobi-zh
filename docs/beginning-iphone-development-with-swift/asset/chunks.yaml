    ### Defining Simultaneous Gestures


    Normally, the gesture modifiers attached to an individual view will run instead
    of any gesture modifiers attached to a stack. If you use the .highPriorityGesture
    modifier, then you can make a stack’s gestures run instead of any gesture modifiers
    attached to an individual view. However, what if you want both gestures attached
    to a view and attached to a stack to run?


    Then you can use the .simultaneousGesture modifier to make sure that a stack’s
    gesture modifier run at the same time as a gesture modifier attached to an individual
    view. To define simultaneous gestures to run, enclose the gesture that would normally
    get ignored within the .simultaneousGesture modifier like this:


    ```

    .simultaneousGesture(

    TapGesture()

    .onEnded { _ in

    message = "VStack tapped"

    })

    ```


    To see how the .simultaneousGesture modifier works, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “SimultaneousGestures.”


    2.  Click the ContentView file in the Navigator pane.


    3.  Add the following State variable under the struct ContentView: View line:


    1.  Add a VStack with a Text view, a Circle, and a Spacer inside the body like
    this:


    ```

    struct ContentView: View {

    @State var message = ""

    ```


    1.  Add a .onTapGesture modifier to the Circle like this:


    ```

    var body: some View {

    VStack {

    Text(message)

    .padding()

    Circle()

    .frame(width: 125, height: 125)

    .foregroundColor(.blue)

    Spacer()

    }.background(Color.yellow)

    }

    ```


    ```

    Circle()

    .frame(width: 125, height: 125)

    .foregroundColor(.blue)

    .onTapGesture {

    message += "Circle tapped"

    }

    ```


    Notice that when the Circle recognizes a tap gesture, it adds (+=) “Circle tapped”
    to the current value of the message State variable.


    1.  Add a .simultaneousGesture modifier to the entire VStack like this:


    ```

    var body: some View {

    VStack {

    Text(message)

    .padding()

    Circle()

    .frame(width: 125, height: 125)

    .foregroundColor(.blue)

    .onTapGesture {

    message += "Circle tapped"

    }

    Spacer()

    }.background(Color.yellow)

    .simultaneousGesture(

    TapGesture()

    .onEnded { _ in

    message = "VStack tapped"

    })

    }

    ```


    If you click the Circle, the Circle’s .onTapGesture modifier (“Circle tapped”)
    would normally be recognized. However, the .simultaneousGesture modifier defines
    the TapGesture on the VStack to get recognized first before also recognizing the
    gesture modifier on the Circle. The entire ContentView file should look like this:


    1.  Click the Live Preview icon on the Canvas pane and click the blue Circle.
    Notice “VStack tappedCircle tapped” appears in the Text view because of the .simultaneousGesture
    modifier on the VStack that lets it run before the Circle’s .onTapGesture modifier.


    2.  Click the yellow background of the VStack. Notice “VStack tapped” still appears
    in the Text view.


    ```

    import SwiftUI

    struct ContentView: View {

    @State var message = ""

    var body: some View {

    VStack {

    Text(message)

    .padding()

    Circle()

    .frame(width: 125, height: 125)

    .foregroundColor(.blue)

    .onTapGesture {

    message += "Circle tapped"

    }

    Spacer()

    }.background(Color.yellow)

    .simultaneousGesture(

    TapGesture()

    .onEnded { _ in

    message = "VStack tapped"

    })

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    ## Summary


    Touch gestures give commands to an app without placing an object on the user interface
    such as a button. Gestures can often work with one or more fingertips such as
    a double or triple tap.


    When adding multiple gestures, remember that gestures attached to individual views
    run instead of gestures attached to stacks. If you want a stack’s gesture modifier
    to run first, enclose it within the .highPriorityGesture modifier. If you want
    both the stack and individual view’s gesture modifiers to run one after another,
    enclose it within the .simultaneousGesture modifier.


    Adding gestures to an app can make the user interface less cluttered and more
    intuitive by letting users directly manipulate objects on the screen.'
