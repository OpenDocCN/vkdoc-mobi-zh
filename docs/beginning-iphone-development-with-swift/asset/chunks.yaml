- fmt: "## Summary\n\nGrids offer another way to display views on the user interface.\
    \ `LazyHGrids` can display views horizontally in rows, while `LazyVGrids` can\
    \ display views vertically in columns. To use grids, you need the data you want\
    \ to display, an array of `GridItem` that defines how to arrange data in a grid,\
    \ and a `LazyHGrid` or `LazyVGrid`.\n\nThe number of `GridItem` defined in the\
    \ array determines the number of rows/columns displayed in the grid. With each\
    \ `GridItem`, you can define a spacing option such as `.fixed`, `.flexible`, or\
    \ `.adaptive`.\n\nThe `.fixed` option lets you define a decimal value for spacing\
    \ such as `25.7`. The `.flexible` option tries to expand spacing as much as possible,\
    \ while the `.adaptive` option tries to shrink spacing as much as possible. You\
    \ can apply different spacing options to each `GridItem` in an array.\n\nBy using\
    \ grids, you can display data in rows and columns. Grids are often embedded in\
    \ a Scroll View to allow users to scroll up/down or left/right to view data that\
    \ might not be visible due to the size of the grid and the iOS device screen.\n\
    \n# 19. Using Animation\n\nAnimation can move items on a user interface to provide\
    \ feedback or just add an aesthetic touch. Unlike traditional animation created\
    \ by hand where cartoonists had to draw every single frame but slightly differently,\
    \ animation in SwiftUI works by simply defining a starting and ending state. Then\
    \ SwiftUI takes care of animating an item in between those starting and ending\
    \ states.\n\nThe three most common types of animation involve:\n\n*   Moving –\
    \ Changing the x and y position of an item on the user interface\n*   Scaling\
    \ – Changing the size of an item by shrinking or enlarging it\n*   Rotating –\
    \ Changing the angle of an item in either a clockwise or counterclockwise direction\n\
    \nCreating animation involves defining what to animate, how to animate it (move,\
    \ scale, rotate), and when to animate it. Animation typically occurs when the\
    \ user does something (such as tap a button) or when a specific event occurs (such\
    \ as a numeric value reaching a certain point).\n\n## Moving Animation\n\nTo move\
    \ a view, we must define an x, y starting location and an x, y ending location.\
    \ The two modifiers that specify a location are `.position` and `.offset`.\n\n\
    The `.position` modifier places a view at a specific x and y position away from\
    \ the upper left corner of an iOS device screen, which is considered the origin\
    \ (0,0). The `.offset` modifier places a view at a specific x and y position away\
    \ from where it would normally appear on the user interface.\n\nThe `.position`\
    \ modifier defines fixed locations on the screen. The `.offset` modifier defines\
    \ locations relative to where it would normally appear if its `.offset` modifier\
    \ x and y values were 0. In both cases, positive x values move a view to the right,\
    \ and positive y values move a view down as shown in Figure 19-1.\n\n![../images/329781_6_En_19_Chapter/329781_6_En_19_Fig1_HTML.jpg](images/329781_6_En_19_Chapter/329781_6_En_19_Fig1_HTML.jpg)\n\
    \nFigure 19-1\n\nThe difference between the `.position` modifier and the `.offset`\
    \ modifier\n\nNote\n\nWith both the `.position` and `.offset` modifiers, it’s\
    \ possible that extreme x or y values could place a view off the screen.\n\nTo\
    \ see how to move a view using the `.position` and `.offset` modifiers, follow\
    \ these steps:\n\n1.  Create a new SwiftUI iOS App project and give it any name\
    \ you wish such as “MoveAnimation.”\n\n2.  Click the `ContentView` file in the\
    \ Navigator pane.\n\n3.  Add a State variable under the `struct ContentView: View`\
    \ line like this:\n\n    ```\n    struct ContentView: View {\n    @State var move\
    \ = true\n    ```\n\n4.  Add a `VStack` inside `var body: some View`.\n\n5.  Add\
    \ a `Text` view and a `Toggle` inside the `VStack` like this:\n\n    ```\n   \
    \ var body: some View {\n    VStack {\n    Text(\"A Text view\")\n    .offset(x:\
    \ move ? 100 : 0, y: move ? 100 : 0)\n    Toggle(isOn: $move) {\n    Text(\"Toggle\
    \ me\")\n    }\n    }\n    }\n    ```\n\nThe entire `ContentView` file should\
    \ look like this:\n\n    ```\n    import SwiftUI\n    struct ContentView: View\
    \ {\n    @State var move = true\n    var body: some View {\n    VStack {\n   \
    \ Text(\"A Text view\")\n    .offset(x: move ? 100 : 0, y: move ? 100 : 0)\n \
    \   Toggle(isOn: $move) {\n    Text(\"Toggle me\")\n    }\n    }\n    }\n    }\n\
    \    struct ContentView_Previews: PreviewProvider {\n    static var previews:\
    \ some View {\n    ContentView()\n    }\n    }\n    ```\n\n6.  Click the Live\
    \ Preview icon on the Canvas pane.\n\n7.  Click the Toggle. Notice that the `.offset`\
    \ modifier moves the `Text` view away from its normal position.\n\n8.  Edit the\
    \ `ContentView` file and replace `.offset` with `.position` like this:\n\n   \
    \ ```\n    .position(x: move ? 100 : 0, y: move ? 100 : 0)\n    ```\n\n9.  Make\
    \ sure Live Preview is still turned on and click the Toggle. Notice that the `Text`\
    \ view now moves based on the origin (0,0) in the upper left corner of the screen.\n\
    \n    Notice that both the `.offset` and `.position` modifiers cause the `Text`\
    \ view to jump from one location to another. Now it’s time to add the `.animation`\
    \ modifier to the `Text` view so the movement appears smoother.\n\n10. Add the\
    \ `.animation` modifier to the `Text` view so the entire `ContentView` should\
    \ look like this:\n\n    ```\n    import SwiftUI\n    struct ContentView: View\
    \ {\n    @State var move = true\n    var body: some View {\n    VStack {\n   \
    \ Text(\"A Text view\")\n    //                .offset(x: move ? 100 : 0, y: move\
    \ ? 100 : 0)\n    .position(x: move ? 100 : 0, y: move ? 100 : 0)\n    .animation(.default,\
    \ value: move)\n    Toggle(isOn: $move) {\n    Text(\"Toggle me\")\n    }\n  \
    \  }\n    }\n    }\n    struct ContentView_Previews: PreviewProvider {\n    static\
    \ var previews: some View {\n    ContentView()\n    }\n    }\n    ```\n\n11. Make\
    \ sure Live Preview is still turned on and click the Toggle. Notice that the `Text`\
    \ view now appears animated as it moves based on the origin (0,0) in the upper\
    \ left corner of the screen.\n\n12. Replace the `.position` modifier with the\
    \ `.offset` modifier.\n\n13. Make sure Live Preview is still turned on and click\
    \ the Toggle. Notice that the `Text` view now appears animated as it moves based\
    \ on its normal location.\n\nIn this project, the `.animation` modifier provides\
    \ the transition between the two different x and y locations of the `Text` view.\
    \ Each time the Toggle changes the Boolean State variable, the animation runs\
    \ again."
