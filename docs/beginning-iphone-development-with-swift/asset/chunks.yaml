    ## Using withAnimation


    By using the .animation modifier, you can define which views you want to animate.
    One problem with the .animation modifier is that if you have five views that you
    want to animate identically, you have to add the same .animation modifier to all
    five views like this:


    ```

    HStack {

    Text("One")

    .offset(x: 0, y: start ? 450 : 0)

    .animation(.default, value: start)

    Text("Two")

    .offset(x: 0, y: start ? 450 : 0)

    .animation(.default, value: start)

    Text("Three")

    .offset(x: 0, y: start ? 450 : 0)

    .animation(.default, value: start)

    Text("Four")

    .offset(x: 0, y: start ? 450 : 0)

    .animation(.default, value: start)

    Text("Five")

    .offset(x: 0, y: start ? 450 : 0)

    .animation(.default, value: start)

    }

    ```


    To solve this problem, SwiftUI offers a second way to animate views. The withAnimation
    lets you specify State variables that can animate a view. Rather than write multiple
    .animation modifiers on separate views, you can just define the State variable
    to affect, and when that State variable changes, it automatically animates any
    view that uses that State variable like this:


    ```

    withAnimation {

    start.toggle()

    }

    ```


