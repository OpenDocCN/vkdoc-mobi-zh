    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    This code creates a user interface that displays two forms on the screen along
    with two Text views that are not part of either Form as shown in Figure [14-3](#329781_6_En_14_Chapter.xhtml#Fig3).


    ![../images/329781_6_En_14_Chapter/329781_6_En_14_Fig3_HTML.jpg](images/329781_6_En_14_Chapter/329781_6_En_14_Fig3_HTML.jpg)


    Figure 14-3


    Two Forms appear on the user interface


    1.  Click the Live Preview icon in the Canvas pane.


    2.  Click in the top Text Field and type some text. Notice that this text now
    appears in the Text view (“Form #1 =”) at the bottom of the screen.


    3.  Click in the middle Text Field and type some text. Notice that this text now
    appears in the Text view (“Form #2 =”) at the bottom of the screen.


    ## Dividing a Form into Sections


    A Form can hold one or more views. However, the more views in a Form, the more
    crowded all of those views will appear. To group related views, you can divide
    a Form into Sections where each Section can contain one or more views to display
    on the screen. In addition, Sections can display an optional header and/or footer.


    The simplest Section just groups related views together like this:


    ```

    Section {

    // Add views here

    }

    ```


    While a Section visibly appears distinct on the user interface, you can further
    distinguish a Section by using a header and/or a footer. If you just want to define
    a header, you can use code like this:


    ```

    Section("Header text here") {

    // Add views here

    }

    ```


    This method simply displays text in uppercase even if you don’t type it that way.
    Another way to define a header looks like this:


    ```

    Section(content: {

    // Add views here

    }, header: {

    // Define header text here

    }

    ```


    You can also use this method to define just a footer like this:


    ```

    Section(content: {

    // Add views here

    }, footer: {

    // Define footer text here

    }

    ```


    Note


    The text in a footer appears exactly as you type it, unlike a header that automatically
    displays text in all uppercase.


    If you want to define both a header and a footer, you can use this code:


    ```

    Section {

    // Add views here

    } header: {

    // Define header text here

    } footer: {

    // Define footer text here

    }

    ```


    To see how to create headers and footers in Sections, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “HeaderFormSections.”


    2.  Click the ____App file in the Navigator pane where ____ is the name of your
    project.


    3.  Add the following above the struct:


    1.  Click the ContentView file in the Navigator pane.


    2.  Add the following above the two structures:


    ```

    @available(iOS 15.0, *)

    ```


    1.  Add a Form inside the var body: some View like this:


    ```

    @available(iOS 15.0, *)

    ```


    1.  Add four Sections defined in different ways inside the Form like this:


    ```

    var body: some View {

    Form {

    }

    }

    ```


    ```

    var body: some View {

    Form {

    Section {

    Text("This Section has no header")

    }

    Section("Just a Header") {

    Text("This Section uses a simple header")

    }

    Section {

    Text("This Section uses a simple footer")

    } footer: {

    Text("Just a Footer")

    }

    Section {

    Text("This Section uses both a header and footer")

    } header: {

    Text("The header")

    } footer: {

    Text("The footer")

    }

    }

    }

    ```


    The entire ContentView file should look like this:


    ```

    import SwiftUI

    @available(iOS 15.0, *)

    struct ContentView: View {

    var body: some View {

    Form {

    Section {

    Text("This Section has no header")

    }

