    1.  选择 `File` ➤ `New` ➤ `File`。此时会弹出一个对话框。

    2.  在对话框顶部附近点击 `iOS`，点击 `Swift File`，然后点击 `Next`。`Xcode` 会要求您为新创建的文件命名。

    3.  输入`SeparateFile`并点击 `Create`。`Xcode` 会创建一个新的 Swift 文件。

    4.  删除 `SeparateFile` 中当前的所有代码，并将其替换为以下内容：


