    # 在表单中禁用视图


    通常，纸质表单可能会提出一系列问题。根据你的回答，另一组问题可能不再相关。例如，如果纸质表单询问你是已婚还是单身，你可能会回答“已婚”。在这种情况下，表单的另一部分可能会询问你配偶的姓名和联系方式。


    然而，如果你回答“单身”，就没有必要再回答任何关于配偶的问题了。使用 SwiftUI 表单，你可以通过使用 `.disabled` 修饰符，基于一个布尔值选择性地禁用
    `Form` 中的视图，如下所示：


    ```

    .disabled(flag)

    ```


    如果布尔变量的值为 `true`，那么 `.disabled` 修饰符会阻止用户与所选视图进行交互。如果布尔变量的值为 `false`，那么 `.disabled`
    修饰符则允许用户与所选视图进行交互。


    要了解如何在 `Form` 中使用 `.disabled` 修饰符，请按照以下步骤操作：


    1.  创建一个新的 SwiftUI iOS App 项目，并为其命名，例如 “FormDisable”。

    2.  在导航窗格中点击 `____App` 文件，其中 `____` 是你项目的名称。

    3.  在 `struct` 上方添加以下代码：


    1.  在导航窗格中点击 `ContentView` 文件。

    2.  在两个结构体上方添加以下代码：


    ```

    @available(iOS 15.0, *)

    ```


    1.  在 `struct ContentView: View` 行下方添加以下 `State` 变量，如下所示：


    ```

    @available(iOS 15.0, *)

    ```


    1.  在 `var body: some View` 中添加一个 `Form`，如下所示：


    ```

    struct ContentView: View {

    @State var flag = false

    ```


    1.  在 `Form` 内部添加一个 `Section` 来定义页眉和页脚，如下所示：


    ```

    var body: some View {

    Form {

    }

    }

    ```


    1.  在 `Section` 内部添加一个 `Toggle` 和一个 `Button`，如下所示：


    ```

    var body: some View {

    Form {

    Section {

    } header: {

    Text("Header")

    } footer: {

    Text("Footer")

    }

    }

    }

    ```


    ```

    var body: some View {

    Form {

    Section {

    Toggle(isOn: $flag) {

    Text("Are you married?")

    }

    Button(flag ? "Disabled" : "Click Me") {

    }.disabled(flag)

    } header: {

    Text("Header")

    } footer: {

    Text("Footer")

    }

    }

    }

    ```


    注意，`.disabled` 修饰符会影响 `Button`。如果 `flag` 布尔变量为 `true`，则 `Button` 将被禁用。如果 `flag`
    布尔变量为 `false`，则 `Button` 将处于启用状态。整个 `ContentView` 文件应该如下所示：


    1.  点击画布窗格中的“Live Preview”图标。注意 `Button` 以蓝色显示标题“Click Me”。

    2.  点击 `Toggle`。这会将 `flag` 状态变量从 `false` 更改为 `true`（或从 `true` 更改为 `false`）。当 `flag`
    状态变量等于 `true` 时，`.disabled` 修饰符会使 `Button` 变灰，使用户无法选择它。


    ```

    import SwiftUI

    @available(iOS 15.0, *)

    struct ContentView: View {

    @State var flag = false

    var body: some View {

    Form {

    Section {

    Toggle(isOn: $flag) {

    Text("Are you married?")

    }

    Button(flag ? "Disabled" : "Click Me") {

    }.disabled(flag)

    } header: {

    Text("Header")

    } footer: {

    Text("Footer")

    }

    }

    }

    }

    @available(iOS 15.0, *)

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    # 使用分组框


    分组框提供了一种更简单的方法来将相关视图组织在一起。虽然与 `Form` 类似，但分组框可以显示标签并以图形方式在灰色矩形内显示多个视图，而 `Form`
    则在白色矩形内显示多个视图，如图 14-5 所示。


    ![../images/329781_6_En_14_Chapter/329781_6_En_14_Fig5_HTML.jpg](img/329781_6_En_14_Fig5_HTML.jpg)


    图 14-5


    `Form` 和分组框之间的视觉差异


    要了解如何使用分组框，请按照以下步骤操作：


    1.  创建一个新的 SwiftUI iOS App 项目，并为其命名，例如 “GroupBox”。

    2.  在导航窗格中点击 `ContentView` 文件。

    3.  在 `struct ContentView: View` 行下方添加以下 `State` 变量，如下所示：


    1.  在 `var body: some View` 中添加一个分组框，如下所示：


    ```

    struct ContentView: View {

    @State var flag = false

    @State var message = ""

    ```


    1.  在分组框内部添加一个 `Toggle` 和一个 `TextField`，如下所示：


    ```

    var body: some View {

    GroupBox(label: Text("Group Box")) {

    }

    }

    ```


    ```

    var body: some View {

    GroupBox(label: Text("Group Box")) {

    Toggle(isOn: $flag) {

    Text("Click me")

    }

    TextField("Type here", text: $message)

    }

    }

    ```


    整个 `ContentView` 文件应该如下所示：


    ```

    import SwiftUI

    struct ContentView: View {

    @State var flag = false

    @State var message = ""

    var body: some View {

    GroupBox(label: Text("Group Box")) {

    Toggle(isOn: $flag) {

    Text("Click me")

    }

    TextField("Type here", text: $message)

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    上述代码创建了一个分组框，如图 14-6 所示。


    ![../images/329781_6_En_14_Chapter/329781_6_En_14_Fig6_HTML.jpg](img/329781_6_En_14_Fig6_HTML.jpg)


    图 14-6


    分组框的外观


    # 总结


    `Form` 允许你在用户界面上将相关视图视觉上分组在一起。为了进一步区分 `Form` 上的视图，你可以将一个 `Form` 划分为多个 `Section`，每个
    `Section` 允许你定义可选的页眉和/或页脚。一个 `Section` 可以有页眉、页脚、同时有页眉和页脚，或者两者都没有。


    根据用户对用户界面的响应方式，你可能希望禁用一个或多个视图，以防止用户与之交互。禁用一个或多个视图可以防止用户输入不必要的数据。


    `Form` 和分组框只是将相关视图分组在一起的两种不同方式，目的是使你的应用程序用户界面更易于理解。


    # 15. 使用 Disclosure Groups、Scroll Views 和 Outline Groups


    许多应用程序包含大量信息，例如姓名和地址。但是，你可能不希望同时查看所有存储的信息，以免屏幕过于杂乱。当你希望为用户提供选择性地隐藏或显示信息的选项时，就可以使用
    Disclosure Group 或 Outline Group。


    Disclosure Group 可以呈现两种状态。首先，它可以显示为一行代表链接的文本。其次，当用户点击此链接时，它会展开以显示一个或多个附加视图，如图
    15-1 所示。


    ![../images/329781_6_En_15_Chapter/329781_6_En_15_Fig1_HTML.jpg](img/329781_6_En_15_Fig1_HTML.jpg)


    图 15-1


    Disclosure Group 的两种状态


    Disclosure Group 可以选择性地隐藏或显示一组相关视图，而 Outline Group 则可以在 `List`（参见第 13 章）中选择性地隐藏或显示文本组，如图
    15-2 所示。


    ![../images/329781_6_En_15_Chapter/329781_6_En_15_Fig2_HTML.jpg](img/329781_6_En_15_Fig2_HTML.jpg)


    图 15-2


    Outline Group 的外观

