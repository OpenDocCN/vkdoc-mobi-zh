    ## 总结


    `Alert`在屏幕中央（`.alert`）显示信息，而操作表（Action Sheet）则在屏幕底部（`.actionSheet`）显示信息。Alert
    和操作表可以显示标题和消息，以及至少一个用于关闭 Alert/操作表的`Button`。但是，一个 Alert 最多可以显示两个`Button`，而一个操作表最多可以显示三个`Button`。


    Alert/操作表上的`Button`只会关闭 Alert/操作表，但您可以附加代码，以便在用户选择`Button`时运行。一种方法是直接在`.alert`/`.actionSheet`修改器中编写代码，但更好的解决方案是调用一个函数，并将该函数中的代码与`.alert`/`.actionSheet`修改器分离。


    当需要向用户显示重要信息并立即获得反馈时，例如验证用户是否要删除数据，请使用 Alert。当需要在屏幕底部显示信息时，请使用操作表。当希望将多个选项隐藏在用户界面之外，但在用户想查看时使其可用时，请使用上下文菜单。


    # 显示列表


    向用户显示大量相关数据的一种常见方式是通过`List`（也称为表格视图）。`List`只是垂直堆叠多行相似类型的数据，如图 13-1 所示：


    ![../images/329781_6_En_13_Chapter/329781_6_En_13_Fig1_HTML.jpg](img/329781_6_En_13_Fig1_HTML.jpg)


    **图 13-1** 一个包含多个`Text`视图的简单`List`


    ```

    List {

    Text("Cat")

    Text("Dog")

    Text("Bird")

    Text("Reptile")

    Text("Fish")

    }

    ```


    如果`List`包含的项目超过屏幕一次可显示的范围，`List`将允许用户向上或向下滑动以查看所有数据。最重要的是，此滚动功能不需要任何额外的编码。要了解如何通过上下滑动查看`List`中的所有项目，请按照以下步骤操作：


    1.  创建一个新的 SwiftUI iOS App 项目，并为其命名，例如“SimpleList”。

    2.  在导航器窗格中单击`ContentView`文件。

    3.  在`var body: some View`内部添加一个`List`，如下所示：


    ```

    var body: some View {

    List {

    ForEach(1...25, id: \.self) { index in

    Text("Animal #\(index)")

    }

    }

    ```


    此代码使用`ForEach`循环来创建 25 个独立的项目。每次`ForEach`循环运行时，`index`变量都会递增，因此`index`的值将从 1 开始，到
    25 结束。完整的`ContentView`文件应如下所示：


    ![../images/329781_6_En_13_Chapter/329781_6_En_13_Fig2_HTML.jpg](img/329781_6_En_13_Fig2_HTML.jpg)


    **图 13-2** 由`ForEach`循环定义的`List`的显示效果


    4.  在画布窗格上点击“Live Preview”图标。请注意，即使`List`包含 25 个项目，屏幕上也不会同时显示所有项目，如图 13-2 所示。


    ```

    import SwiftUI

    struct ContentView: View {

    var body: some View {

    List {

    ForEach(1...25, id: \.self) { index in

    Text("Animal #\(index)")

    }

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    5.  向上和向下拖动鼠标以模拟滑动手势。注意，`List`会自动向上/向下滚动，向您显示其余内容。

