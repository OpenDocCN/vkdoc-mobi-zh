    \ some Scene {\n        WindowGroup {\n            ContentView()\n        }\n\
    \    }\n}\n```\n\nWhen you run this project, the top `Slider` ranges in value\
    \ from 0 to 1. That means when you drag the other `Slider`s, the top `Slider`\
    \ immediately moves all the way to the right. That’s because the top `Slider`\
    \ can only have a maximum value of 1, while the other sliders range in value from\
    \ 1 to 50. So dragging the other `Slider`s always pins the top `Slider` all the\
    \ way to the right to represent a value of 1, which is the maximum value it can\
    \ represent.\n\n## Summary\n\nWhen your app needs the user to input numeric data,\
    \ a text field can work but it might be clumsy, especially if you only want to\
    \ accept a limited range of numeric values. To make it easy to input numeric data,\
    \ use a `Stepper` or a `Slider`.\n\nBoth a `Stepper` and `Slider` can define a\
    \ minimum and maximum value so that way the user can’t input numeric data below\
