    # 缩放动画


    另一种创建动画的方式是为视图定义两种不同的尺寸，即缩放。若要定义视图尺寸的起始和结束状态，可使用 `.scaleEffect` 修饰符并指定要进行的相对尺寸变化。例如，`.scaleEffect(1)`
    代表视图的当前尺寸。大于 1 的 `.scaleEffect` 值定义更大的尺寸或缩放比例，而小于 1 的值则定义更小的尺寸或缩放比例。


    若要了解如何通过将视图缩放到不同尺寸来实现动画效果，请按以下步骤操作：


    1. 创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如"ScaleAnimation"。

    2. 在导航器窗格中点击 `ContentView` 文件。

    3. 在 `struct ContentView: View` 行下方添加一个 `State` 变量，如下所示：

    4. 在 `var body: some View` 中添加一个 `Image` 视图，如下所示：


    ```

    struct ContentView: View {

    @State private var changeMe = false

    ```


    ```

    var body: some View {

    Image(systemName: "tortoise.fill")

    .font(.system(size:100))

    .foregroundColor(.red)

    .scaleEffect(changeMe ? 1.75 : 1)

    }

    ```


    这将在屏幕上以 100 的尺寸显示一个乌龟图标，以便于观察。然后，它将乌龟图标设为红色，并使用 `.scaleEffect` 修饰符将乌龟尺寸在其正常大小的
    1.75 倍和原始大小之间交替变化。


    5. 向 `Image` 视图添加以下修饰符，如下所示：


