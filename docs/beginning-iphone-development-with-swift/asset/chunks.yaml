- fmt: "### Defining a High Priority Gesture\n\nThe gestures attached to views inside\
    \ a stack will always be recognized over gestures attached to a stack. If you\
    \ want a stack’s gesture modifier to run instead of a gesture modifier attached\
    \ to a view inside of that stack, you need to use the `.highPriorityGesture` modifier.\n\
    \nThis `.highPriorityGesture` modifier simply identifies which gesture should\
    \ have the higher priority. In this case, we want the stack’s gesture modifier\
    \ to run first, so we need to enclose it within the `.highPriorityGesture` modifier\
    \ like this:\n\n```\n.highPriorityGesture(\n  TapGesture()\n    .onEnded { _ in\n\
    \      message = \"VStack tapped\"\n    }\n)\n```\n\nNotice that the `TapGesture`\
    \ uses the `.onEnded` modifier to detect when the tap gesture ends so it can store\
    \ \"VStack tapped\" in the `message` State variable.\n\nTo see how the `.highPriorityGesture`\
    \ modifier works, follow these steps:\n\n1. Create a new SwiftUI iOS App project\
    \ and give it any name you wish such as \"HighPriorityGestures.\"\n2. Click the\
    \ `ContentView` file in the Navigator pane.\n3. Add the following State variable\
    \ under the `struct ContentView: View` line:\n4. Add a `VStack` with a `Text`\
    \ view, a `Circle`, and a `Spacer` inside the body like this:\n\n```\nstruct ContentView:\
    \ View {\n  @State var message = \"\"\n```\n\n```\nvar body: some View {\n  VStack\
    \ {\n    Text(message)\n      .padding()\n    Circle()\n      .frame(width: 125,\
    \ height: 125)\n      .foregroundColor(.blue)\n    Spacer()\n  }.background(Color.yellow)\n\
    }\n```\n\n1. Add a `.onTapGesture` modifier to the `Circle` like this:\n\n```\n\
    Circle()\n  .frame(width: 125, height: 125)\n  .foregroundColor(.blue)\n  .onTapGesture\
    \ {\n    message = \"Circle tapped\"\n  }\n```\n\nNormally, when the user taps\
    \ the `Circle`, the `message` State variable will hold the string \"Circle tapped.\"\
    \n\n1. Add a `.highPriorityGesture` modifier to the entire `VStack` like this:\n\
    \n```\nvar body: some View {\n  VStack {\n    Text(message)\n      .padding()\n\
    \    Circle()\n      .frame(width: 125, height: 125)\n      .foregroundColor(.blue)\n\
    \      .onTapGesture {\n        message = \"Circle tapped\"\n      }\n    Spacer()\n\
    \  }.background(Color.yellow)\n    .highPriorityGesture(\n      TapGesture()\n\
    \        .onEnded { _ in\n          message = \"VStack tapped\"\n        }\n \
    \   )\n}\n```\n\nIf you click the `Circle`, the `Circle`’s `.onTapGesture` modifier\
    \ (\"Circle tapped\") would normally be recognized. However, the `.highPriorityGesture`\
    \ modifier defines the `TapGesture` on the `VStack` to get recognized first. The\
    \ entire `ContentView` file should look like this:\n\n1. Click the Live Preview\
    \ icon on the Canvas pane and click the blue `Circle`. Notice \"VStack tapped\"\
    \ appears in the `Text` view because of the `.highPriorityGesture` modifier on\
    \ the `VStack` that overrides the `Circle`’s `.onTapGesture` modifier.\n2. Click\
    \ the yellow background of the `VStack`. Notice \"VStack tapped\" still appears\
    \ in the `Text` view.\n\n```\nimport SwiftUI\n\nstruct ContentView: View {\n \
    \ @State var message = \"\"\n\n  var body: some View {\n    VStack {\n      Text(message)\n\
    \        .padding()\n      Circle()\n        .frame(width: 125, height: 125)\n\
    \        .foregroundColor(.blue)\n        .onTapGesture {\n          message =\
    \ \"Circle tapped\"\n        }\n      Spacer()\n    }.background(Color.yellow)\n\
    \      .highPriorityGesture(\n        TapGesture()\n          .onEnded { _ in\n\
    \            message = \"VStack tapped\"\n          }\n      )\n  }\n}\n\nstruct\
    \ ContentView_Previews: PreviewProvider {\n  static var previews: some View {\n\
    \    ContentView()\n  }\n}\n```\n\n### Defining Simultaneous Gestures\n\nNormally,\
    \ the gesture modifiers attached to an individual view will run instead of any\
    \ gesture modifiers attached to a stack. If you use the `.highPriorityGesture`\
    \ modifier, then you can make a stack’s gestures run instead of any gesture modifiers\
    \ attached to an individual view. However, what if you want both gestures attached\
    \ to a view and attached to a stack to run?\n\nThen you can use the `.simultaneousGesture`\
    \ modifier to make sure that a stack’s gesture modifier run at the same time as\
    \ a gesture modifier attached to an individual view. To define simultaneous gestures\
    \ to run, enclose the gesture that would normally get ignored within the `.simultaneousGesture`\
    \ modifier like this:\n\n```\n.simultaneousGesture(\n  TapGesture()\n    .onEnded\
    \ { _ in\n      message = \"VStack tapped\"\n    }\n)\n```\n\nTo see how the `.simultaneousGesture`\
    \ modifier works, follow these steps:\n\n1. Create a new SwiftUI iOS App project\
    \ and give it any name you wish such as \"SimultaneousGestures.\"\n2. Click the\
    \ `ContentView` file in the Navigator pane.\n3. Add the following State variable\
    \ under the `struct ContentView: View` line:\n4. Add a `VStack` with a `Text`\
    \ view, a `Circle`, and a `Spacer` inside the body like this:\n\n```\nstruct ContentView:\
    \ View {\n  @State var message = \"\"\n```\n\n```\nvar body: some View {\n  VStack\
    \ {\n    Text(message)\n      .padding()\n    Circle()\n      .frame(width: 125,\
    \ height: 125)\n      .foregroundColor(.blue)\n    Spacer()\n  }.background(Color.yellow)\n\
    }\n```\n\n1. Add a `.onTapGesture` modifier to the `Circle` like this:\n\n```\n\
    Circle()\n  .frame(width: 125, height: 125)\n  .foregroundColor(.blue)\n  .onTapGesture\
    \ {\n    message += \"Circle tapped\"\n  }\n```\n\nNotice that when the `Circle`\
    \ recognizes a tap gesture, it adds (`+=`) \"Circle tapped\" to the current value\
    \ of the `message` State variable.\n\n1. Add a `.simultaneousGesture` modifier\
    \ to the entire `VStack` like this:\n\n```\nvar body: some View {\n  VStack {\n\
    \    Text(message)\n      .padding()\n    Circle()\n      .frame(width: 125, height:\
    \ 125)\n      .foregroundColor(.blue)\n      .onTapGesture {\n        message\
    \ += \"Circle tapped\"\n      }\n    Spacer()\n  }.background(Color.yellow)\n\
    \    .simultaneousGesture(\n      TapGesture()\n        .onEnded { _ in\n    \
    \      message = \"VStack tapped\"\n        }\n    )\n}\n```\n\nIf you click the\
    \ `Circle`, the `Circle`’s `.onTapGesture` modifier (\"Circle tapped\") would\
    \ normally be recognized. However, the `.simultaneousGesture` modifier defines\
    \ the `TapGesture` on the `VStack` to get recognized first before also recognizing\
    \ the gesture modifier on the `Circle`. The entire `ContentView` file should look\
    \ like this:\n\n1. Click the Live Preview icon on the Canvas pane and click the\
    \ blue `Circle`. Notice \"VStack tappedCircle tapped\" appears in the `Text` view\
    \ because of the `.simultaneousGesture` modifier on the `VStack` that lets it\
    \ run before the `Circle`’s `.onTapGesture` modifier.\n2. Click the yellow background\
    \ of the `VStack`. Notice \"VStack tapped\" still appears in the `Text` view.\n\
    \n```\nimport SwiftUI\n\nstruct ContentView: View {\n  @State var message = \"\
    \"\n\n  var body: some View {\n    VStack {\n      Text(message)\n        .padding()\n\
    \      Circle()\n        .frame(width: 125, height: 125)\n        .foregroundColor(.blue)\n\
    \        .onTapGesture {\n          message += \"Circle tapped\"\n        }\n\
    \      Spacer()\n    }.background(Color.yellow)\n      .simultaneousGesture(\n\
    \        TapGesture()\n          .onEnded { _ in\n            message = \"VStack\
    \ tapped\"\n          }\n      )\n  }\n}\n\nstruct ContentView_Previews: PreviewProvider\
    \ {\n  static var previews: some View {\n    ContentView()\n  }\n}\n```\n\n##\
    \ Summary\n\nTouch gestures give commands to an app without placing an object\
    \ on the user interface such as a button. Gestures can often work with one or\
    \ more fingertips such as a double or triple tap.\n\nWhen adding multiple gestures,\
    \ remember that gestures attached to individual views run instead of gestures\
    \ attached to stacks. If you want a stack’s gesture modifier to run first, enclose\
    \ it within the `.highPriorityGesture` modifier. If you want both the stack and\
    \ individual view’s gesture modifiers to run one after another, enclose it within\
    \ the `.simultaneousGesture` modifier.\n\nAdding gestures to an app can make the\
    \ user interface less cluttered and more intuitive by letting users directly manipulate\
    \ objects on the screen."
