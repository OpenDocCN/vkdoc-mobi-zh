    ## Using the Color Picker


    An ordinary Picker lets you select different options displayed in a Text view.
    However, what if you want the user to select a particular color? You could list
    several colors in a Picker, but what if the user wants to select a custom color?
    That’s when you can use the Color Picker.


    The Color Picker lets the user select standard colors (red, blue, green, yellow,
    etc.) or custom colors from a grid, a spectrum, or from red, green, blue sliders
    as shown in Figure [8-4](#329781_6_En_8_Chapter.xhtml#Fig4).


