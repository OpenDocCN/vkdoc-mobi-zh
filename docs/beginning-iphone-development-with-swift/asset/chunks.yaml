    \ `LazyVGrid`，用于显示一列数据。这些数据由十个 `Image` 视图组成，每个视图在方块内显示一个不同的数字。`.font(.largeTitle)`\
    \ 修饰符使这些方块图标变大，更容易看清。整个 `ContentView` 文件应该如下所示：\n\n![../images/329781_6_En_18_Chapter/329781_6_En_18_Fig2_HTML.jpg](img/329781_6_En_18_Fig2_HTML.jpg)\n\
    \n图 18-2 —— 在垂直网格上方显示水平网格\n\n6.  点击画布窗格上的 Live Preview 图标。\n7.  从左到右滚动水平网格，查看所有带编号的圆圈，如图\
