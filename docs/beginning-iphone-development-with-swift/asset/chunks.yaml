    VStack {

    Button("Start animation") {

    start.toggle()

    }

    HStack {

    Text("easeIn")

    .offset(x: 0, y: start ? 450 : 0)

    .animation(.easeIn.delay(0.5), value: start)

    Text("easeOut")

