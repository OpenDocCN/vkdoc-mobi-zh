    purposes. The Navigator pane displays information about your project such as the
    names of all the files that make up that project. The Editor pane is where you
    can write and edit Swift code. The Canvas pane is where you can see and test the
    user interface defined by your Swift code. The Inspector pane displays information
    about the currently selected object.


    You can resize any of the panes by moving the mouse pointer over the pane border
    and dragging the mouse left or right. If you want, you can toggle between hiding
    and displaying the Navigator and the Inspector pane. That way, you can see more
    of the Editor and Canvas panes.


    To hide/display the Navigator or Inspector pane, you have two options as shown
    in Figure [1-10](#329781_6_En_1_Chapter.xhtml#Fig10):


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig10_HTML.jpg](images/329781_6_En_1_Chapter/329781_6_En_1_Fig10_HTML.jpg)


    Figure 1-10


    Hiding or showing the Navigator and Inspector panes


    *   Choose View ➤ Navigators/Inspectors ➤ Hide/Show Navigator/Inspector.


    *   Click the Show/Hide Navigator/Inspector pane icons.


    The Navigator pane lets you select options to display in the Editor pane. The
    Inspector pane lets you select user interface items to choose different ways to
    modify them as shown in Figure [1-11](#329781_6_En_1_Chapter.xhtml#Fig11).


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig11_HTML.jpg](images/329781_6_En_1_Chapter/329781_6_En_1_Fig11_HTML.jpg)


    Figure 1-11


    The Inspector pane lists different ways to modify a selected item


    To see how the Inspector pane works, follow these steps:


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig12_HTML.jpg](images/329781_6_En_1_Chapter/329781_6_En_1_Fig12_HTML.jpg)


    Figure 1-12


    The Attributes Inspector icon lets you view additional ways to modify an item
    in the Inspector pane


    1.  Click the ContentView file in the Navigator pane. The Editor pane displays
    the contents of the ContentView file.


    2.  Move the cursor in the Text(“Hello, world!”) line.


    3.  Click the Attributes Inspector icon in the Inspector pane as shown in Figure
    [1-12](#329781_6_En_1_Chapter.xhtml#Fig12). The Inspector pane displays additional
    ways to modify the currently selected item.


    As you can see, Xcode’s panes show different information about a project. The
    Navigator pane (on the far left) lets you see an overview of your project. Clicking
    specific items in the Navigator pane displays that item in the Editor pane. The
    Inspector pane (on the far right) shows additional information about something
    selected in the Editor pane. The Canvas pane lets you preview the appearance of
    your user interface.


    If you explore Xcode, you’ll see dozens of features, but it’s not necessary to
    understand everything at once to start using Xcode. Just focus on using only those
    features you need and feel free to ignore the rest until you need them.


    ## Summary


    Creating iOS apps involves more than just writing code. To help your app access
    hardware features of different iOS devices, you can use Apple’s software frameworks
    that provide access to the camera or to Siri’s natural language interface. The
    most important framework that all SwiftUI projects use is the SwiftUI framework.
    By combining your code with Apple’s existing software frameworks, you can focus
    on writing code to make your app work and use Apple’s software frameworks to help
    you perform common functions found on most iOS devices.


    Besides writing code, every iOS app also needs a user interface. To create user
    interfaces, use SwiftUI. Since SwiftUI makes creating user interfaces easier without
    writing a lot of code, SwiftUI is fast becoming the preferred way to design user
    interfaces for apps on all of Apple’s platforms (macOS, iOS, iPadOS, watchOS,
    and tvOS).


    The main tool for creating iOS apps is Apple’s free Xcode program, which lets
    you create projects, organize the separate files of a project, and view and edit
    the contents of each file. Xcode lets you design, edit, and test your app all
    in a single program. Although Xcode offers dozens of features, you only need to
    use a handful of them to start creating iOS apps of your own.


    Learning iOS programming involves learning how to write commands using the Swift
    programming language, learning how to find and use Apple’s various software frameworks,
    learning how to design user interfaces in SwiftUI, and learning how to use Xcode.
    While this might seem like a lot, this book will take you through each step of
    the way so you’ll feel comfortable using Xcode and creating your own iOS apps
    in the near future.'
  trans: '

    ## 操控 Xcode 面板


    Xcode 的四个面板（`Navigator`、`Editor`、`Canvas` 和 `Inspector`）各自服务于不同的目的。`Navigator`
    面板会显示关于你项目的信息，例如组成该项目的所有文件名称。`Editor` 面板是你可以编写和编辑 Swift 代码的地方。`Canvas` 面板则是你可以查看并测试由
    Swift 代码定义的用户界面的地方。`Inspector` 面板会显示关于当前选中对象的信息。


    你可以通过将鼠标指针移动到面板边框上，并向左或向右拖动鼠标来调整任何面板的大小。你也可以切换隐藏或显示 `Navigator` 和 `Inspector`
    面板。这样一来，你就能看到更多 `Editor` 和 `Canvas` 面板的内容。


    要隐藏/显示 `Navigator` 或 `Inspector` 面板，你有两个选项，如图 1-10 所示：


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig10_HTML.jpg](img/329781_6_En_1_Fig10_HTML.jpg)


    **图 1-10** — 隐藏或显示 `Navigator` 和 `Inspector` 面板


    *   选择 `View ➤ Navigators/Inspectors ➤ Hide/Show Navigator/Inspector`。

    *   点击 `Show/Hide Navigator/Inspector` 面板图标。


    `Navigator` 面板让你可以选择要在 `Editor` 面板中显示的内容。`Inspector` 面板则让你可以选择用户界面项目，以便采用不同的方式来修改它们，如图
    1-11 所示。


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig11_HTML.jpg](img/329781_6_En_1_Fig11_HTML.jpg)


    **图 1-11** — `Inspector` 面板列出了修改选中项目的不同方式


    要了解 `Inspector` 面板的工作方式，请遵循以下步骤：


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig12_HTML.jpg](img/329781_6_En_1_Fig12_HTML.jpg)


    **图 1-12** — `Attributes Inspector` 图标让你可以在 `Inspector` 面板中查看修改项目的额外方式


    1.  在 `Navigator` 面板中点击 `ContentView` 文件。`Editor` 面板会显示 `ContentView` 文件的内容。

    2.  将光标移动到 `Text("Hello, world!")` 行。

    3.  点击 `Inspector` 面板中的 `Attributes Inspector` 图标，如图 1-12 所示。`Inspector` 面板会显示修改当前选中项目的额外方式。


    如你所见，Xcode 的面板会显示关于一个项目的不同信息。`Navigator` 面板（位于最左侧）让你可以概览你的项目。在 `Navigator` 面板中点击具体项目，会在
    `Editor` 面板中显示该项目。`Inspector` 面板（位于最右侧）会显示关于在 `Editor` 面板中选中内容的额外信息。`Canvas` 面板则允许你预览用户界面的外观。


    如果你探索 Xcode，会发现它有数十种功能，但刚开始使用 Xcode 时，没必要一下全部理解。只需专注于使用你需要的那些功能，在需要用到其他功能之前，完全可以忽略它们。


    ## 总结


    创建 iOS 应用不仅仅涉及编写代码。为了让你的应用能够访问不同 iOS 设备的硬件特性，你可以使用苹果的软件框架，这些框架提供了访问摄像头或 Siri 自然语言界面的能力。所有
    SwiftUI 项目使用的最重要的框架是 `SwiftUI` 框架。通过将你的代码与苹果现有的软件框架结合，你可以专注于编写让应用运行起来的代码，并利用苹果的软件框架来帮助你实现在大多数
    iOS 设备上常见的功能。


    除了编写代码，每个 iOS 应用还需要一个用户界面。要创建用户界面，请使用 `SwiftUI`。由于 `SwiftUI` 无需编写大量代码就能更轻松地创建用户界面，它正迅速成为在苹果所有平台（`macOS`、`iOS`、`iPadOS`、`watchOS`
    和 `tvOS`）上为应用设计用户界面的首选方式。


    创建 iOS 应用的主要工具是苹果免费的 `Xcode` 程序，它可以让你创建项目、组织项目中的各个文件、以及查看和编辑每个文件的内容。`Xcode` 让你能在同一个程序中设计、编辑和测试你的应用。尽管
    `Xcode` 提供了数十种功能，但开始创建你自己的 iOS 应用时，你只需使用其中一小部分。


    学习 iOS 编程涉及学习如何使用 `Swift` 编程语言编写命令，学习如何查找和使用苹果的各种软件框架，学习如何在 `SwiftUI` 中设计用户界面，以及学习如何使用
    `Xcode`。虽然这看起来任务繁重，但本书会带你逐步了解每一个环节，让你在不久的将来能够自如地使用 `Xcode` 并创建你自己的 iOS 应用。

