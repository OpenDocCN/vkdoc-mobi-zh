- fmt: '# Using Contextual Menus


    A Contextual Menu can hide multiple options from the user interface. Then it appears
    only after detecting a long press gesture on a view such as `Text` view. When
    the Contextual Menu lists options, the user can select one.


    A Contextual Menu defines a list of `Button`s where each `Button` displays text
    and an action to perform if the user selects that `Button`. The action can call
    a function or enclose Swift code within curly brackets like this:


    ```

    .contextMenu(menuItems: {

    Button("Red", action: {

    myColor = Color.red

    })

    Button("Purple", action: purple)

    Button("Green", action: green)

    Button("Orange", action: orange)

    })

    ```


    In this example, the `Button` displaying “Red” as its title uses curly brackets
    to define code to run. The other three `Button`s (“Purple,” “Green,” and “Orange”)
    call functions. Notice that each function call simply uses the function name and
    does not need a parameter list if it is empty.


    To see how to make a Contextual Menu, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “ContextualMenu.”

    2.  Click the `ContentView` file in the Navigator pane.

    3.  Add the following `State` variables under the `struct ContentView: View` line:


    ```

    @State var myColor = Color.gray

    ```


    4.  Add a `VStack` in the `var body: some View` and put a `Rectangle` and a `Text`
    view inside the `VStack` like this:


    ```

    var body: some View {

    VStack {

    Rectangle()

    .foregroundColor(myColor)

    Text("Pick a color")

    .padding()

    }

    }

    ```


    The preceding code defines a `Rectangle` and colors it based on the `myColor`
    State variable, which is initially set to `.gray`. Then it displays a `Text` view.


    5.  Add a `.contextualMenu` modifier to the `Text` view like this:


    ```

    .contextMenu(menuItems: {

    Button("Red", action: {

    myColor = Color.red

    })

    Button("Purple", action: purple)

    Button("Green", action: green)

    Button("Orange", action: orange)

    })

    ```


    6.  Add the following functions above the last curly bracket in the `struct ContentView:
    View` like this:


    ```

    func purple() {

    myColor = Color.purple

    }

    func green() {

    myColor = Color.green

    }

    func orange() {

    myColor = Color.orange

    }

    ```


    The entire `ContentView` file should look like this:


    7.  Click the Live Preview icon in the Canvas pane.

    8.  Move the mouse pointer over the “Pick a color” `Text` view and hold down the
    left mouse button to mimic a long press gesture. After a moment, the Contextual
    Menu appears.

    9.  Click any of the options displayed in the Contextual Menu. Notice that the
    rectangle changes color based on the option you chose.


    ```

    import SwiftUI

    struct ContentView: View {

    @State var myColor = Color.gray

    var body: some View {

    VStack {

    Rectangle()

    .foregroundColor(myColor)

    Text("Pick a color")

    .padding()

    .contextMenu(menuItems: {

    Button("Red", action: {

    myColor = Color.red

    })

    Button("Purple", action: purple)

    Button("Green", action: green)

    Button("Orange", action: orange)

    })

    }

    }

    func purple() {

    myColor = Color.purple

    }

    func green() {

    myColor = Color.green

    }

    func orange() {

    myColor = Color.orange

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    ## Summary


    `Alert`s display information in the middle of the screen (`.alert`), while Action
    Sheets display information at the bottom of the screen (`.actionSheet`). An Alert
    and an Action Sheet can display a title and a message along with at least one
    `Button` to dismiss the Alert/Action Sheet. However, an Alert can display up to
    two `Button`s, while an Action Sheet can display up to three `Button`s.


    `Button`s on an Alert/Action Sheet just dismiss the Alert/Action Sheet, but you
    can attach code to run when the user selects a `Button`. One way is to write the
    code directly in the `.alert`/`.actionSheet` modifier, but a better solution is
    to call a function and separate code in that function away from the `.alert`/`.actionSheet`
    modifier.


    Use Alerts when you need to display important information to the user and get
    immediate feedback, such as verifying if the user wants to delete data. Use Action
    Sheets when you need to display information at the bottom of the screen. Use Contextual
    Menus when you want to hide multiple options off the user interface but make them
    available when the user wants to see them.


    # Displaying Lists


    One common way to display lots of related data to the user is through a `List`
    (also called a table view). A `List` simply shows multiple rows of similar types
    of data stacked vertically. The simplest type of a `List` defines one or more
    `Text` views that appear in separate rows as shown in Figure 13-1:


    ![../images/329781_6_En_13_Chapter/329781_6_En_13_Fig1_HTML.jpg](images/329781_6_En_13_Chapter/329781_6_En_13_Fig1_HTML.jpg)


    **Figure 13-1** A simple `List` containing multiple `Text` views


    ```

    List {

    Text("Cat")

    Text("Dog")

    Text("Bird")

    Text("Reptile")

    Text("Fish")

    }

    ```


    If a `List` contains more items than can appear on the screen at one time, the
    `List` will let users swipe up or down to view all the data. Best of all, this
    scrolling feature doesn’t require any additional coding. To see how to swipe up
    and down to view all items in a `List`, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “SimpleList.”

    2.  Click the `ContentView` file in the Navigator pane.

    3.  Add a `List` inside the `var body: some View` like this:


    ```

    var body: some View {

    List {

    ForEach(1...25, id: \.self) { index in

    Text("Animal #\(index)")

    }

    }

    ```


    This code uses a `ForEach` loop to create 25 separate items. The `index` variable
    increments each time the `ForEach` loop runs, so the value of `index` will start
    at 1 and end at 25. The entire `ContentView` file should look like this:


    ![../images/329781_6_En_13_Chapter/329781_6_En_13_Fig2_HTML.jpg](images/329781_6_En_13_Chapter/329781_6_En_13_Fig2_HTML.jpg)


