- fmt: '# Disabling Views in a Form


    Oftentimes, a paper form might ask a series of questions. Based on your answer,
    another group of questions may not be relevant. For example, if a paper form asks
    if you’re married or single, you might answer “married.” In which case another
    part of the paper form might ask about your spouse’s name and contact information.


    However, if you answer “single,” there’s no point in answering any additional
    questions about a spouse. With SwiftUI Forms, you can selectively disable views
    within a `Form` based on a Boolean value by using the `.disabled` modifier like
    this:


    ```

    .disabled(flag)

    ```


    If the value of the Boolean variable is `true`, then the `.disabled` modifier
    prevents the user from interacting with the selected view. If the Boolean variable
    is `false`, then the `.disabled` modifier allows the user to interact with the
    selected view.


    To see how to use the `.disabled` modifier within a `Form`, follow these steps:


    1. Create a new SwiftUI iOS App project and give it any name you wish such as
    “FormDisable.”

    2. Click the ____App file in the Navigator pane where ____ is the name of your
    project.

    3. Add the following above the `struct`:


    1. Click the `ContentView` file in the Navigator pane.

    2. Add the following above the two structures:


    ```

    @available(iOS 15.0, *)

    ```


    1. Add the following `State` variable under the `struct ContentView: View` line
    like this:


    ```

    @available(iOS 15.0, *)

    ```


    1. Add a `Form` inside the `var body: some View` like this:


    ```

    struct ContentView: View {

    @State var flag = false

    ```


    1. Add a `Section` inside the `Form` to define a header and a footer like this:


    ```

    var body: some View {

    Form {

    }

    }

    ```


    1. Add a `Toggle` and a `Button` inside the `Section` like this:


    ```

    var body: some View {

    Form {

    Section {

    } header: {

    Text("Header")

    } footer: {

    Text("Footer")

    }

    }

    }

    ```


    ```

    var body: some View {

    Form {

    Section {

    Toggle(isOn: $flag) {

    Text("Are you married?")

    }

    Button(flag ? "Disabled" : "Click Me") {

    }.disabled(flag)

    } header: {

    Text("Header")

    } footer: {

    Text("Footer")

    }

    }

    }

    ```


    Notice that the `.disabled` modifier affects the `Button`. If the `flag` Boolean
    variable is `true`, then the `Button` will be disabled. If the `flag` Boolean
    variable is `false`, then the `Button` will be enabled. The entire `ContentView`
    file should look like this:


    1. Click the Live Preview icon in the Canvas pane. Notice that the `Button` displays
    the title “Click Me” in blue.

    2. Click the `Toggle`. This changes the `flag` `State` variable from `false` to
    `true` (or `true` to `false`). When the `flag` `State` variable equals `true`,
    then the `.disabled` modifier grays out the `Button`, making it impossible for
    the user to select.


    ```

    import SwiftUI

    @available(iOS 15.0, *)

    struct ContentView: View {

    @State var flag = false

    var body: some View {

    Form {

    Section {

    Toggle(isOn: $flag) {

    Text("Are you married?")

    }

    Button(flag ? "Disabled" : "Click Me") {

    }.disabled(flag)

    } header: {

    Text("Header")

    } footer: {

    Text("Footer")

    }

    }

    }

    }

    @available(iOS 15.0, *)

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    # Using Group Boxes


    Group Boxes offer a simpler way to organize related views together. Although similar
    to a `Form`, a Group Box can display a label and visually displays multiple views
    within a gray rectangle, while a `Form` displays multiple views within a white
    rectangle as shown in Figure [14-5](#329781_6_En_14_Chapter.xhtml#Fig5).


    ![../images/329781_6_En_14_Chapter/329781_6_En_14_Fig5_HTML.jpg](images/329781_6_En_14_Chapter/329781_6_En_14_Fig5_HTML.jpg)


    Figure 14-5


    The visual differences between a `Form` and a Group Box


    To see how to use a Group Box, follow these steps:


    1. Create a new SwiftUI iOS App project and give it any name you wish such as
    “GroupBox.”

    2. Click the `ContentView` file in the Navigator pane.

    3. Add the following `State` variables under the `struct ContentView: View` line
    like this:


    1. Add a Group Box inside the `var body: some View` like this:


    ```

    struct ContentView: View {

    @State var flag = false

    @State var message = ""

    ```


    1. Add a `Toggle` and a `TextField` inside the Group Box like this:


    ```

    var body: some View {

    GroupBox(label: Text("Group Box")) {

    }

    }

    ```


    ```

    var body: some View {

    GroupBox(label: Text("Group Box")) {

    Toggle(isOn: $flag) {

    Text("Click me")

    }

    TextField("Type here", text: $message)

    }

    }

    ```


    The entire `ContentView` file should look like this:


    ```

    import SwiftUI

    struct ContentView: View {

    @State var flag = false

    @State var message = ""

    var body: some View {

    GroupBox(label: Text("Group Box")) {

    Toggle(isOn: $flag) {

    Text("Click me")

    }

    TextField("Type here", text: $message)

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    The preceding code creates a Group Box as shown in Figure [14-6](#329781_6_En_14_Chapter.xhtml#Fig6).


    ![../images/329781_6_En_14_Chapter/329781_6_En_14_Fig6_HTML.jpg](images/329781_6_En_14_Chapter/329781_6_En_14_Fig6_HTML.jpg)


    Figure 14-6


    The appearance of a Group Box


    # Summary


    `Form`s let you visually group related views together on the user interface. To
    further differentiate views on a `Form`, you can divide a `Form` into multiple
    `Section`s where each `Section` lets you define an optional header and/or optional
    footer. A `Section` can have a header, a footer, both a header and a footer, or
    nothing at all.


    Depending on how the user responds to the user interface, you may want to disable
    one or more views to prevent the user from interacting with them. Disabling one
    or more views prevents the user from inputting unnecessary data.


    Both `Form`s and Group Boxes are simply two different ways to group related views
    together to make your app’s user interface easier to understand.


    # 15. Using Disclosure Groups, Scroll Views, and Outline Groups


    Many apps contain lots of information such as names and addresses. However, you
    may not want to view all stored information at once to avoid cluttering up the
    screen. When you want to give users the option of selectively hiding or displaying
    information, that’s when you can use a Disclosure Group or an Outline Group.


    A Disclosure Group can appear in two states. First, it can appear as a single
    line of text that represents a link. Second, when the user taps on this link,
    it expands to reveal one or more additional views as shown in Figure [15-1](#329781_6_En_15_Chapter.xhtml#Fig1).


    ![../images/329781_6_En_15_Chapter/329781_6_En_15_Fig1_HTML.jpg](images/329781_6_En_15_Chapter/329781_6_En_15_Fig1_HTML.jpg)


    Figure 15-1


    The two states of a Disclosure Group


    While a Disclosure Group can selectively hide or show a group of related views,
    an Outline Group can selectively hide or show groups of text within a `List` (see
    Chapter [13](#329781_6_En_13_Chapter.xhtml)) as shown in Figure [15-2](#329781_6_En_15_Chapter.xhtml#Fig2).


    ![../images/329781_6_En_15_Chapter/329781_6_En_15_Fig2_HTML.jpg](images/329781_6_En_15_Chapter/329781_6_En_15_Fig2_HTML.jpg)


    Figure 15-2


    The appearance of an Outline Group'
