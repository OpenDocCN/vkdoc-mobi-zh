- fmt: '# 20. Using `GeometryReader`


    User interfaces for iOS devices must adapt to different screen sizes. Not only
    are there different size screens for the iPhone and iPad, but there are also different
    screen sizes among different iPhone and iPad models on the market. To solve this
    problem, SwiftUI centers user interface items, but what if you need to precisely
    place user interface items in specific locations?


    Specific X and Y coordinates won’t work because what might look good on a large
    screen won’t look right on a much smaller screen and vice versa. When you need
    to place user interface items in specific locations on the screen, a safer approach
    is to use the `GeometryReader`.


    The `GeometryReader` acts like a container that automatically adapts to different
    screen sizes. After adding a `GeometryReader`, you can then place user interface
    items using the `GeometryReader`’s relative coordinates instead of the exact coordinates
    of different size screens. That way, when an app runs on different size screens,
    the `GeometryReader` adapts its relative coordinates as well.


    ## Understanding the `GeometryReader`


    The `GeometryReader` can hold multiple views like a stack. The key difference
    is that the `GeometryReader` expands to take up as much space as possible. In
    addition, the `GeometryReader` can retrieve its width and height. The code to
    define a `GeometryReader` looks like this:


    ```

    GeometryReader { geometry in

    // Views defined here

    }

    ```


    The `GeometryReader` uses an arbitrarily named variable such as “geometry” in
    the preceding example, although this variable can be named anything. Then to retrieve
    the width and height of the `GeometryReader`, you can retrieve the `size.width`
    and `size.height` properties like this:


    ```

    geometry.size.width

    geometry.size.height

    ```


    To see how a `GeometryReader` works, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “BasicGeometryReader.”

    2.  Click the `ContentView` file in the Navigator pane.

    3.  Add a `GeometryReader` inside `var body: some View` like this:


    ```

    var body: some View {

    GeometryReader { geometry in

    }.background(Color.yellow)

    }

    ```


    The `.background` modifier colors the `GeometryReader` to make it easy to see
    its boundaries.


    4.  Add a `VStack` inside the `GeometryReader`.

    5.  Add two `Text` views inside the `VStack` like this:


    ```

    var body: some View {

    GeometryReader { geometry in

    VStack {

    Text("Width = \(geometry.size.width)")

    Text("Height = \(geometry.size.height)")

    }

    }.background(Color.yellow)

    }

    ```


    The entire `ContentView` file should look like this:


    ```

    import SwiftUI

    struct ContentView: View {

    var body: some View {

    GeometryReader { geometry in

    VStack {

    Text("Width = \(geometry.size.width)")

    Text("Height = \(geometry.size.height)")

    }

    }.background(Color.yellow)

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    Notice that the `geometry.size.width` and `geometry.size.height` properties define
    the height and width of the `GeometryReader` within the current iOS device such
    as an iPod Touch as shown in Figure 20-1.


    ![../images/329781_6_En_20_Chapter/329781_6_En_20_Fig1_HTML.jpg](images/329781_6_En_20_Chapter/329781_6_En_20_Fig1_HTML.jpg)


    Figure 20-1 The `GeometryReader` defines its width and height within an iPod Touch


    ![../images/329781_6_En_20_Chapter/329781_6_En_20_Fig2_HTML.jpg](images/329781_6_En_20_Chapter/329781_6_En_20_Fig2_HTML.jpg)


    Figure 20-2 The Device popup menu in the Inspector pane


    6.  Click `ContentView()` inside the `struct ContentView_Previews: PreviewProvider`.
    The Inspector pane appears on the right side of the Xcode window.

    7.  Click the Device popup menu and choose a different size screen such as a larger
    or smaller iPhone or iPad as shown in Figure 20-2.


    ![../images/329781_6_En_20_Chapter/329781_6_En_20_Fig3_HTML.jpg](images/329781_6_En_20_Chapter/329781_6_En_20_Fig3_HTML.jpg)


    Figure 20-3 Displaying the width and height of the `GeometryReader` in a different
    size iOS screen


    8.  Choose a different size iPhone or iPad. Notice that the `GeometryReader` expands
    or shrinks to fit within the boundaries of the new iOS screen size and displays
    a different width and height as shown in Figure 20-3.


    Try experimenting with different iOS devices such as a small screen iPhone 5s
    or a large screen iPad Pro. No matter which size iOS device screen you choose,
    the `GeometryReader` can expand or shrink and return its width and height.'
