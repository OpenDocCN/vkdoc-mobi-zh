  trans: "\n## 总结\n\n网格提供了在用户界面上显示视图的另一种方式。`LazyHGrids` 可以在行中水平显示视图，而 `LazyVGrids`\
    \ 可以在列中垂直显示视图。要使用网格，你需要准备要显示的数据、一个用于定义数据在网格中排列方式的 `GridItem` 数组，以及一个 `LazyHGrid`\
    \ 或 `LazyVGrid`。\n\n数组中定义的 `GridItem` 数量决定了网格中显示的行/列数。通过每个 `GridItem`，你可以定义间距选项，例如\
    \ `.fixed`、`.flexible` 或 `.adaptive`。\n\n`.fixed` 选项允许你为间距定义一个十进制值，例如 `25.7`。`.flexible`\
    \ 选项会尽可能扩展间距，而 `.adaptive` 选项则会尽可能缩小间距。你可以为数组中的每个 `GridItem` 应用不同的间距选项。\n\n通过使用网格，你可以按行和列显示数据。网格通常嵌入在滚动视图中，允许用户上下或左右滚动，以查看因网格和\
    \ iOS 设备屏幕尺寸而可能不可见的数据。\n\n# 19. 使用动画\n\n动画可以移动用户界面上的项目，以提供反馈或只是增加美观效果。与传统的逐帧手绘动画不同，在\
    \ SwiftUI 中，动画只需定义开始和结束状态即可工作。然后，SwiftUI 会负责在这些开始和结束状态之间为项目制作动画。\n\n最常见的三种动画类型包括：\n\
    \n*   移动 – 改变项目在用户界面上的 x 和 y 位置\n*   缩放 – 通过缩小或放大来改变项目的大小\n*   旋转 – 顺时针或逆时针改变项目的角度\n\
    \n创建动画涉及定义要动画化的内容、动画化的方式（移动、缩放、旋转）以及何时进行动画化。通常，当用户执行某些操作（例如点击按钮）或特定事件发生时（例如数值达到某个点），动画就会触发。\n\
    \n## 移动动画\n\n要移动视图，我们必须定义一个 x、y 起始位置和一个 x、y 结束位置。指定位置的两个修改器是 `.position` 和 `.offset`。\n\
    \n`.position` 修改器将视图放置在距离 iOS 设备屏幕左上角（被视为原点 (0,0)）特定的 x 和 y 位置处。`.offset` 修改器将视图放置在距离它在用户界面上正常显示位置特定的\
    \ x 和 y 位置处。\n\n`.position` 修改器定义了屏幕上的固定位置。 `.offset` 修改器定义了相对于其 `.offset` 修改器\
    \ x 和 y 值均为 0 时正常显示位置的位置。在这两种情况下，正的 x 值将视图向右移动，正的 y 值将视图向下移动，如图 19-1 所示。\n\n![../images/329781_6_En_19_Chapter/329781_6_En_19_Fig1_HTML.jpg](img/329781_6_En_19_Fig1_HTML.jpg)\n\
    \n图 19-1\n\n`.position` 修改器和 `.offset` 修改器之间的区别\n\n注意\n\n使用 `.position` 和 `.offset`\
    \ 修改器时，极端的 x 或 y 值可能会使视图移出屏幕。\n\n要了解如何使用 `.position` 和 `.offset` 修改器移动视图，请按照以下步骤操作：\n\
    \n1.  创建一个新的 SwiftUI iOS 应用项目，并随意命名，例如“MoveAnimation”。\n\n2.  在导航器窗格中点击 `ContentView`\
    \ 文件。\n\n3.  在 `struct ContentView: View` 行下添加一个状态变量，如下所示：\n\n    ```\n    struct\
    \ ContentView: View {\n    @State var move = true\n    ```\n\n4.  在 `var body:\
    \ some View` 内部添加一个 `VStack`。\n\n5.  在 `VStack` 内部添加一个 `Text` 视图和一个 `Toggle`，如下所示：\n\
    \n    ```\n    var body: some View {\n    VStack {\n    Text(\"A Text view\")\n\
    \    .offset(x: move ? 100 : 0, y: move ? 100 : 0)\n    Toggle(isOn: $move) {\n\
    \    Text(\"Toggle me\")\n    }\n    }\n    }\n    ```\n\n整个 `ContentView` 文件应如下所示：\n\
    \n    ```\n    import SwiftUI\n    struct ContentView: View {\n    @State var\
    \ move = true\n    var body: some View {\n    VStack {\n    Text(\"A Text view\"\
    )\n    .offset(x: move ? 100 : 0, y: move ? 100 : 0)\n    Toggle(isOn: $move)\
    \ {\n    Text(\"Toggle me\")\n    }\n    }\n    }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n\
    \    }\n    }\n    ```\n\n6.  在画布窗格上点击 Live Preview 图标。\n\n7.  点击 Toggle。注意 `.offset`\
    \ 修改器将 `Text` 视图移离其正常位置。\n\n8.  编辑 `ContentView` 文件，将 `.offset` 替换为 `.position`，如下所示：\n\
    \n    ```\n    .position(x: move ? 100 : 0, y: move ? 100 : 0)\n    ```\n\n9.\
    \  确保 Live Preview 仍处于开启状态，然后点击 Toggle。注意 `Text` 视图现在基于屏幕左上角的原点 (0,0) 移动。\n\n\
    \    注意，`.offset` 和 `.position` 修改器都会使 `Text` 视图从一个位置跳到另一个位置。现在是时候为 `Text` 视图添加\
    \ `.animation` 修改器，以使移动看起来更平滑。\n\n10. 为 `Text` 视图添加 `.animation` 修改器，使整个 `ContentView`\
    \ 文件如下所示：\n\n    ```\n    import SwiftUI\n    struct ContentView: View {\n   \
    \ @State var move = true\n    var body: some View {\n    VStack {\n    Text(\"\
    A Text view\")\n    //                .offset(x: move ? 100 : 0, y: move ? 100\
    \ : 0)\n    .position(x: move ? 100 : 0, y: move ? 100 : 0)\n    .animation(.default,\
    \ value: move)\n    Toggle(isOn: $move) {\n    Text(\"Toggle me\")\n    }\n  \
    \  }\n    }\n    }\n    struct ContentView_Previews: PreviewProvider {\n    static\
    \ var previews: some View {\n    ContentView()\n    }\n    }\n    ```\n\n11. 确保\
    \ Live Preview 仍处于开启状态，然后点击 Toggle。注意 `Text` 视图现在在基于屏幕左上角原点 (0,0) 移动时呈现动画效果。\n\
