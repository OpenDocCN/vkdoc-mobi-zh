  raw: '### Restricting a Date Range


    When letting users select a date, you may want to restrict the list of valid dates.
    For example, if you’re asking for someone’s birthdate, it doesn’t make sense to
    let the Date Picker allow a user to select an outrageously old date of birth such
    as February 3, 1737.


    To restrict a date range for a Date Picker, you must first define the start and
    end date range such as


    ```

    let dateRange: ClosedRange = {

    let calendar = Calendar.current

    let startComponents = DateComponents(year: 2022, month: 1, day: 1)

    let endComponents = DateComponents(year: 2022, month: 12, day: 31, hour: 23, minute:
    59, second: 59)

    return calendar.date(from:startComponents)!

    ...

    calendar.date(from:endComponents)!

    }()

    ```


    Notice that a closed range requires defining both a starting date and an ending
    date. The user can’t go further in the past beyond the starting date and can’t
    go further in the future beyond the ending date.


    Besides a closed range, you can also choose a partial range. One way is to define
    a partial range that starts from a specific date such as


    ```

    let dateRange2: PartialRangeFrom = {

    let calendar = Calendar.current

    let startComponents = DateComponents(year: 2021, month: 1, day: 1)

    return calendar.date(from:startComponents)!...

    }()

    ```


    The preceding range starts at January 1, 2021, and allows the Date Picker to choose
    any date beyond this starting date. Another way to define a partial range is one
    that goes up to but stops at a specific date such as


    ```

    let dateRange3: PartialRangeThrough = {

    let calendar = Calendar.current

    let stopComponents = DateComponents(year: 2021, month: 1, day: 1)

    return ...calendar.date(from:stopComponents)!

    }()

    ```


    This range lets the Date Picker choose any date up to the specified date (January
    1, 2021, in this case). Once you define a date range, you need to add this date
    range into the Date Picker like this:


    ```

    DatePicker(selection: $myDate, in: dateRange, displayedComponents: [.date], label:
    { Text("Date") })

    ```


    This Date Picker uses a State variable called myDate, defines the valid range
    by the dateRange constant, and only displays dates (and not times). If this Date
    Picker style is .compact, then it will also display “Date” on the Date Picker.


    To see how to use a Date Picker, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “DatePicker.”


    2.  Click the ContentView file in the Navigator pane.


    3.  Add the following line above the two structures in the ContentView file:


    1.  Add this @available(iOS 15, *) line underneath the import SwiftUI line in
    the _____App file where _____ is the name of your project such as


    ```

    @available(iOS 15, *)

    ```


    1.  Click the ContentView file and then create a State variable to hold a date
    like this:


    ```

    import SwiftUI

    @available(iOS 15, *)

    @main

    struct DatePickerApp: App {

    var body: some Scene {

    WindowGroup {

    ContentView()

    }

    }

    }

    ```


    1.  Define three date ranges as follows:


    ```

    @State var myDate = Date.now

    ```


    1.  Create a VStack to hold a Text view and a Date Picker like this:


    ```

    let dateRange: ClosedRange = {

    let calendar = Calendar.current

    let startComponents = DateComponents(year: 2021, month: 1, day: 1)

    let endComponents = DateComponents(year: 2021, month: 12, day: 31, hour: 23, minute:
    59, second: 59)

    return calendar.date(from:startComponents)!

    ...

    calendar.date(from:endComponents)!

    }()

    let dateRange2: PartialRangeFrom = {

    let calendar = Calendar.current

    let startComponents = DateComponents(year: 2021, month: 1, day: 1)

    let endComponents = DateComponents(year: 2021, month: 12, day: 31, hour: 23, minute:
    59, second: 59)

    return calendar.date(from:endComponents)!...

    }()

    let dateRange3: PartialRangeThrough = {

    let calendar = Calendar.current

    let startComponents = DateComponents(year: 2021, month: 1, day: 1)

    let endComponents = DateComponents(year: 2021, month: 12, day: 31, hour: 23, minute:
    59, second: 59)

    return ...calendar.date(from:startComponents)!

    }()

    ```


    ```

    var body: some View {

    VStack {

    Text("Chosen date = \(myDate)")

    .padding()

    DatePicker(selection: $myDate, in: dateRange3, displayedComponents: [.date], label:
    { Text("Date") })

    .datePickerStyle(.graphical)

    .padding()

    }

    }

    ```


    The entire ContentView file should look like this:


    ![../images/329781_6_En_8_Chapter/329781_6_En_8_Fig8_HTML.jpg](images/329781_6_En_8_Chapter/329781_6_En_8_Fig8_HTML.jpg)


    Figure 8-8


    The user interface showing a Text view and a Date Picker


    1.  Click the Live Preview icon in the Canvas pane and click any date. Notice
    that when you choose a date, it appears above the Date Picker as shown in Figure
    [8-8](#329781_6_En_8_Chapter.xhtml#Fig8).


    ```

    import SwiftUI

    @available(iOS 15, *)

    struct ContentView: View {

    @State var myDate = Date.now

    let dateRange: ClosedRange = {

    let calendar = Calendar.current

    let startComponents = DateComponents(year: 2021, month: 1, day: 1)

    let endComponents = DateComponents(year: 2021, month: 12, day: 31, hour: 23, minute:
    59, second: 59)

    return calendar.date(from:startComponents)!

    ...

    calendar.date(from:endComponents)!

    }()

    let dateRange2: PartialRangeFrom = {

    let calendar = Calendar.current

    let startComponents = DateComponents(year: 2021, month: 1, day: 1)

    let endComponents = DateComponents(year: 2021, month: 12, day: 31, hour: 23, minute:
    59, second: 59)

    return calendar.date(from:endComponents)!...

    }()

    let dateRange3: PartialRangeThrough = {

    let calendar = Calendar.current

    let startComponents = DateComponents(year: 2021, month: 1, day: 1)

    let endComponents = DateComponents(year: 2021, month: 12, day: 31, hour: 23, minute:
    59, second: 59)

    return ...calendar.date(from:startComponents)!

    }()

    var body: some View {

    VStack {

    Text("Chosen date = \(myDate)")

    .padding()

    DatePicker(selection: $myDate, in: dateRange3, displayedComponents: [.date], label:
    { Text("Date") })

    .datePickerStyle(.graphical)

    .padding()

    }

    }

    }

    @available(iOS 15, *)

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    1.  Experiment with changing the Date Picker style (.compact, .graphical, .wheel)
    along with choosing the different date ranges (dateRange, dateRange2, dateRange3).'
  trans: "\n### 限制日期范围\n\n当允许用户选择日期时，你可能希望限制有效日期的列表。例如，如果你正在询问某人的出生日期，那么让 `DatePicker`\
    \ 允许用户选择如 1737 年 2 月 3 日这样过时的出生日期是没有意义的。\n\n要限制 `DatePicker` 的日期范围，你必须首先定义起始和结束日期范围，例如：\n\
    \n```\nlet dateRange: ClosedRange = {\n    let calendar = Calendar.current\n \
    \   let startComponents = DateComponents(year: 2022, month: 1, day: 1)\n    let\
    \ endComponents = DateComponents(year: 2022, month: 12, day: 31, hour: 23, minute:\
    \ 59, second: 59)\n    return calendar.date(from: startComponents)!\n    ...\n\
    \    calendar.date(from: endComponents)!\n}()\n```\n\n注意，闭合区间需要同时定义起始日期和结束日期。用户不能选择早于起始日期的过去日期，也不能选择晚于结束日期的未来日期。\n\
    \n除了闭合区间，你还可以选择部分区间。一种方法是定义一个从特定日期开始的部分区间，例如：\n\n```\nlet dateRange2: PartialRangeFrom\
    \ = {\n    let calendar = Calendar.current\n    let startComponents = DateComponents(year:\
    \ 2021, month: 1, day: 1)\n    return calendar.date(from: startComponents)!...\n\
    }()\n```\n\n上述区间从 2021 年 1 月 1 日开始，允许 `DatePicker` 选择此起始日期之后的任何日期。另一种定义部分区间的方式是定义一个可以达到但停止于特定日期的区间，例如：\n\
    \n```\nlet dateRange3: PartialRangeThrough = {\n    let calendar = Calendar.current\n\
    \    let stopComponents = DateComponents(year: 2021, month: 1, day: 1)\n    return\
    \ ...calendar.date(from: stopComponents)!\n}()\n```\n\n此区间允许 `DatePicker` 选择截止到指定日期（本例中为\
    \ 2021 年 1 月 1 日）的任何日期。一旦定义了日期区间，你需要将此日期区间添加到 `DatePicker` 中，如下所示：\n\n```\nDatePicker(selection:\
    \ $myDate, in: dateRange, displayedComponents: [.date], label: { Text(\"Date\"\
    ) })\n```\n\n这个 `DatePicker` 使用一个名为 `myDate` 的 `State` 变量，通过 `dateRange` 常量定义有效范围，并且仅显示日期（而非时间）。如果该\
    \ `DatePicker` 的样式是 `.compact`，那么它还会在 `DatePicker` 上显示“Date”。\n\n要了解如何使用 `DatePicker`，请遵循以下步骤：\n\
    \n1. 创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如“DatePicker”。\n\n2. 单击导航面板中的 `ContentView`\
    \ 文件。\n\n3. 在 `ContentView` 文件中的两个结构体上方添加以下代码行：\n\n4. 在 `_____App` 文件的 `import\
    \ SwiftUI` 代码行下方添加这一行 `@available(iOS 15, *)`，其中 `_____` 是你的项目名称，例如：\n\n```\n\
    @available(iOS 15, *)\n```\n\n5. 单击 `ContentView` 文件，然后创建一个 `State` 变量来保存一个日期，如下所示：\n\
    \n```\nimport SwiftUI\n@available(iOS 15, *)\n@main\nstruct DatePickerApp: App\
    \ {\n    var body: some Scene {\n        WindowGroup {\n            ContentView()\n\
    \        }\n    }\n}\n```\n\n6. 定义三个日期区间，如下所示：\n\n```\n@State var myDate = Date.now\n\
    ```\n\n7. 创建一个 `VStack` 来容纳一个 `Text` 视图和一个 `DatePicker`，如下所示：\n\n```\nlet dateRange:\
    \ ClosedRange = {\n    let calendar = Calendar.current\n    let startComponents\
    \ = DateComponents(year: 2021, month: 1, day: 1)\n    let endComponents = DateComponents(year:\
    \ 2021, month: 12, day: 31, hour: 23, minute: 59, second: 59)\n    return calendar.date(from:\
    \ startComponents)!\n    ...\n    calendar.date(from: endComponents)!\n}()\nlet\
    \ dateRange2: PartialRangeFrom = {\n    let calendar = Calendar.current\n    let\
    \ startComponents = DateComponents(year: 2021, month: 1, day: 1)\n    let endComponents\
    \ = DateComponents(year: 2021, month: 12, day: 31, hour: 23, minute: 59, second:\
    \ 59)\n    return calendar.date(from: endComponents)!...\n}()\nlet dateRange3:\
    \ PartialRangeThrough = {\n    let calendar = Calendar.current\n    let startComponents\
    \ = DateComponents(year: 2021, month: 1, day: 1)\n    let endComponents = DateComponents(year:\
    \ 2021, month: 12, day: 31, hour: 23, minute: 59, second: 59)\n    return ...calendar.date(from:\
    \ startComponents)!\n}()\n```\n\n```\nvar body: some View {\n    VStack {\n  \
    \      Text(\"Chosen date = \\(myDate)\")\n            .padding()\n        DatePicker(selection:\
    \ $myDate, in: dateRange3, displayedComponents: [.date], label: { Text(\"Date\"\
