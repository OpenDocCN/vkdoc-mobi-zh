- fmt: '# Displaying Images


    Just as the `Text` view lets you display text on the user interface, the `Image`
    view lets you display icons and graphic files on the user interface. If you want
    to display an icon stored in the SF Symbols app, you can use Swift code like this:


    ```swift

    Image(systemName: "hare.fill")

    ```


    When you want to display an SF Symbol icon, you must use the `systemName` parameter.
    Since icons are small, you may want to enlarge them. The simplest way to enlarge
    an icon is to define a larger font such as `.largeTitle` or `.custom` as shown
    in Figure 5-8.


    ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig8_HTML.jpg](images/329781_6_En_5_Chapter/329781_6_En_5_Fig8_HTML.jpg)


    **Figure 5-8** – Modifying the size of an SF Symbol icon by changing font size


    To display an image, you must first drag and drop it into the Assets folder. Then
    to display an image stored in the Assets folder, you can use the `Image` view
    and specify the image name like this:


    ```swift

    Image("flag")

    ```


    Images can be of any size, but if they''re too large or too small, the `Image`
    view will display them at their original size. Since you may need to resize an
    image to fit on the user interface, you''ll need to use the following three modifiers
    on an `Image` view:


    - `.resizable()`

    - `.aspectRatio(contentMode: z)`

    - `.frame(width: x, height: y)`


    The `.resizable()` modifier lets an `Image` view change the size of a displayed
    image. If an `Image` view lacks this `.resizable()` modifier, then the image retains
    its original size no matter what the size of the `Image` view might be.


    The `.frame(width: x, height: y)` modifier lets you define the size of the `Image`
    view. When used with the `.resizable()` modifier, the `.frame` modifier lets you
    define a fixed width and height of an image.


    Since stretching the width and height of an `Image` view can warp the image displayed
    inside, the `.aspectRatio` modifier lets you define how the image should react.
    The `.fill` option expands an image to the largest width or height defined by
    the `.frame` modifier. The `.fit` option shrinks an image to the smallest width
    or height defined by the `.frame` modifier as shown in Figure 5-9.


    ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig9_HTML.jpg](images/329781_6_En_5_Chapter/329781_6_En_5_Fig9_HTML.jpg)


    **Figure 5-9** – Using the `.fill` and `.fit` aspect ratio on an image


    If you want to further refine the aspect ratio, you can include an aspect ratio
    value such as:


    ```swift

    Image("flag")

    .resizable()

    .frame(width: 150, height: 150)

    .aspectRatio(0.5, contentMode: .fill)

    ```


    This aspect ratio defines the width to height ratio, so a value of `0.5` would
    be a 1:2 width to height ratio, while a value of `0.75` would be a 3:4 width to
    height ratio.


    ## Clipping Images


    An `Image` view can display clip art images that someone has drawn, but it can
    also display photographs captured with a digital camera. Normally, an `Image`
    view displays any picture in the rectangle defined by the `.frame` modifier. However,
    to create more unique visual effects, you can clip images by overlaying them with
    a geometric shape by using the `.clipShape` modifier.


    The `.clipShape` modifier accepts any common geometric shape such as:


    ```swift

    .clipShape(Circle())

    ```


    When using other geometric shapes such as `Ellipse()` or `Capsule()`, make sure
    the frame width is wide enough. If a frame''s width and height are identical,
    then the `Ellipse()` and `Capsule()` shapes simply look like a `Circle()`. Figure
    5-10 shows how the `.clipShape(Circle())` modifier changes the appearance of an
    image that would normally appear as a rectangular image.


    ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig10_HTML.jpg](images/329781_6_En_5_Chapter/329781_6_En_5_Fig10_HTML.jpg)


    **Figure 5-10** – Using the `.clipShape()` modifier


    ## Adding Shadows to Images


    Another way to highlight the appearance of an `Image` view is to use the `.shadow`
    modifier, which adds a shadow around a view. You can adjust how much the shadow
    appears around a view by defining its radius such as:


    ```swift

    .shadow(color: .red, radius: 46, x: 0, y: 0)

    ```


    The `.shadow` modifier requires the following parameters:


    - `Color` – Defines the shadow''s color.

    - `Radius` – Defines the shadow''s size around the view.

    - `X` – Defines the x (horizontal) offset of the shadow; a value of `0` centers
    the shadow in the horizontal direction around the view.

    - `Y` – Defines the y (vertical) offset of the shadow; a value of `0` centers
    the shadow in the vertical direction around the view.


    If the `x` and `y` values are nonzero, then the shadow shifts away from the `Image`
    view. If the `x` and `y` values are both `0`, then the shadow appears evenly around
    all four edges of the `Image` view as shown in Figure 5-11.


    ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig11_HTML.jpg](images/329781_6_En_5_Chapter/329781_6_En_5_Fig11_HTML.jpg)


    **Figure 5-11** – Adding a shadow to an `Image` view with different `x` and `y`
    values


    ## Adding a Border Around Images


    To further highlight an `Image` view, you can add a border around it using the
    `.overlay` modifier like this:


    ```swift

    .overlay(Rectangle().stroke(Color.blue, lineWidth: 10))

    ```


    The `.overlay` modifier requires the following parameters:


    - `Shape` – Defines the shape of the border to match the shape of the `Image`
    view

    - `Color` – Defines the color of the border

    - `lineWidth` – Defines the thickness of the border line around the `Image` view


    Figure 5-12 shows two uses of the `.overlay` modifier that uses different shapes,
    colors, and line widths.


    ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig12_HTML.jpg](images/329781_6_En_5_Chapter/329781_6_En_5_Fig12_HTML.jpg)


    **Figure 5-12** – Using different values for the `.overlay` modifier


    ## Defining the Opacity of an Image


    Another way to modify the appearance of an image is to define its opacity. An
    opacity of `0` means the image is invisible. An opacity of `1` means the image
    appears with no changes whatsoever. The closer the opacity is to `0`, the fainter
    the image. The closer the opacity is to `1`, the sharper the image.


    To use the opacity modifier, just define an opacity value from `0` to `1` like
    this:


    ```swift

    .opacity(0.75)

    ```


    Figure 5-13 shows how different opacity values modify the appearance of an image.


    ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig13_HTML.jpg](images/329781_6_En_5_Chapter/329781_6_En_5_Fig13_HTML.jpg)


    **Figure 5-13** – Using different values for the `.opacity` modifier


    ## Summary


    Images provide another way to provide information on the user interface. Images
    can be common geometric shapes such as circles, ellipses, and rounded rectangles,
    icons that you can find in the SF Symbols app, or graphic images or digital photographs
    you drag and drop into the Assets folder of an Xcode project.


    If you''re creating geometric shapes, you can fill them with solid colors, custom
    colors, or gradients to create an interesting visual blend of multiple colors.
    If you''re using SF Symbol icons, you can adjust their size using the `.font`
    modifier. If you''re using images stored in the Assets folder of your Xcode project,
    you can use the `.resizable`, `.frame`, and `.aspectRatio` modifiers together
    to define the size and appearance of an image.


    To create extra visual effects, you can clip images into geometric shapes such
    as circles, add borders around images, add shadows around images, and modify the
    opacity. With so many different ways to adjust the appearance of images, you should
    be able to define an image to appear exactly the way you want it to look on your
    user interface.'
  raw: '## Displaying Images


    Just as the Text view lets you display text on the user interface, the Image view
    lets you display icons and graphic files on the user interface. If you want to
    display an icon stored in the SF Symbols app, you can use Swift code like this:


    ```

    Image(systemName: "hare.fill")

    ```


    When you want to display an SF Symbol icon, you must use the systemName parameter.
    Since icons are small, you may want to enlarge them. The simplest way to enlarge
    an icon is to define a larger font such as .largeTitle or .custom as shown in
    Figure [5-8](#329781_6_En_5_Chapter.xhtml#Fig8).


    ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig8_HTML.jpg](images/329781_6_En_5_Chapter/329781_6_En_5_Fig8_HTML.jpg)


    Figure 5-8


    Modifying the size of an SF Symbol icon by changing font size


    To display an image, you must first drag and drop it into the Assets folder. Then
    to display an image stored in the Assets folder, you can use the Image view and
    specify the image name like this:


    ```

    Image("flag")

    ```


    Images can be of any size, but if they’re too large or too small, the Image view
    will display them at their original size. Since you may need to resize an image
    to fit on the user interface, you’ll need to use the following three modifiers
    on an Image view:


    *   .resizable()


    *   .aspectRatio(contentMode: z)


    *   .frame(width: x, height: y)


    The .resizable() modifier lets an Image view change the size of a displayed image.
    If an Image view lacks this .resizable() modifier, then the image retains its
    original size no matter what the size of the Image view might be.


    The .frame(width: x, height: y) modifier lets you define the size of the Image
    view. When used with the .resizable() modifier, the .frame modifier lets you define
    a fixed width and height of an image.


    Since stretching the width and height of an Image view can warp the image displayed
    inside, the .aspectRatio modifier lets you define how the image should react.
    The .fill option expands an image to the largest width or height defined by the
    .frame modifier. The .fit option shrinks an image to the smallest width or height
    defined by the .frame modifier as shown in Figure [5-9](#329781_6_En_5_Chapter.xhtml#Fig9).


    ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig9_HTML.jpg](images/329781_6_En_5_Chapter/329781_6_En_5_Fig9_HTML.jpg)


    Figure 5-9


    Using the .fill and .fit aspect ratio on an image


    If you want to further refine the aspect ratio, you can include an aspect ratio
    value such as


    ```

    Image("flag")

    .resizable()

    .frame(width: 150, height: 150)

    .aspectRatio(0.5, contentMode: .fill)

    ```


    This aspect ratio defines the width to height ratio, so a value of 0.5 would be
    a 1:2 width to height ratio, while a value of 0.75 would be a 3:4 width to height
    ratio.


    ### Clipping Images


    An Image view can display clip art images that someone has drawn, but it can also
    display photographs captured with a digital camera. Normally, an Image view displays
    any picture in the rectangle defined by the .frame modifier. However, to create
    more unique visual effects, you can clip images by overlaying them with a geometric
    shape by using the .clipShape modifier.


    The .clipShape modifier accepts any common geometric shape such as


    ```

    .clipShape(Circle())

    ```


    When using other geometric shapes such as Ellipse() or Capsule(), make sure the
    frame width is wide enough. If a frame’s width and height are identical, then
    the Ellipse() and Capsule() shapes simply look like a Circle(). Figure [5-10](#329781_6_En_5_Chapter.xhtml#Fig10)
    shows how the .clipShape(Circle()) modifier changes the appearance of an image
    that would normally appear as a rectangular image.


    ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig10_HTML.jpg](images/329781_6_En_5_Chapter/329781_6_En_5_Fig10_HTML.jpg)


    Figure 5-10


    Using the .clipShape() modifier


    ### Adding Shadows to Images


    Another way to highlight the appearance of an Image view is to use the .shadow
    modifier, which adds a shadow around a view. You can adjust how much the shadow
    appears around a view by defining its radius such as


    ```

    .shadow(color: .red, radius: 46, x: 0, y: 0)

    ```


    The .shadow modifier requires the following parameters:


    *   Color – Defines the shadow’s color.


    *   Radius – Defines the shadow’s size around the view.


    *   X – Defines the x (horizontal) offset of the shadow; a value of 0 centers
    the shadow in the horizontal direction around the view.


    *   Y – Defines the y (vertical) offset of the shadow; a value of 0 centers the
    shadow in the vertical direction around the view.


    If the x and y values are nonzero, then the shadow shifts away from the Image
    view. If the x and y values are both 0, then the shadow appears evenly around
    all four edges of the Image view as shown in Figure [5-11](#329781_6_En_5_Chapter.xhtml#Fig11).


    ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig11_HTML.jpg](images/329781_6_En_5_Chapter/329781_6_En_5_Fig11_HTML.jpg)


    Figure 5-11


    Adding a shadow to an Image view with different x and y values


    ### Adding a Border Around Images


    To further highlight an Image view, you can add a border around it using the .overlay
    modifier like this:


    ```

    .overlay(Rectangle().stroke(Color.blue, lineWidth: 10))

    ```


    The .overlay modifier requires the following parameters:


    *   Shape – Defines the shape of the border to match the shape of the Image view


    *   Color – Defines the color of the border


    *   lineWidth – Defines the thickness of the border line around the Image view


    Figure [5-12](#329781_6_En_5_Chapter.xhtml#Fig12) shows two uses of the .overlay
    modifier that uses different shapes, colors, and line widths.


    ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig12_HTML.jpg](images/329781_6_En_5_Chapter/329781_6_En_5_Fig12_HTML.jpg)


    Figure 5-12


    Using different values for the .overlay modifier


    ### Defining the Opacity of an Image


    Another way to modify the appearance of an image is to define its opacity. An
    opacity of 0 means the image is invisible. An opacity of 1 means the image appears
    with no changes whatsoever. The closer the opacity is to 0, the fainter the image.
    The closer the opacity is to 1, the sharper the image.


    To use the opacity modifier, just define an opacity value from 0 to 1 like this:


    ```

    .opacity(0.75)

    ```


    Figure [5-13](#329781_6_En_5_Chapter.xhtml#Fig13) shows how different opacity
    values modify the appearance of an image.


    ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig13_HTML.jpg](images/329781_6_En_5_Chapter/329781_6_En_5_Fig13_HTML.jpg)


    Figure 5-13


    Using different values for the .opacity modifier


    ## Summary


    Images provide another way to provide information on the user interface. Images
    can be common geometric shapes such as circles, ellipses, and rounded rectangles,
    icons that you can find in the SF Symbols app, or graphic images or digital photographs
    you drag and drop into the Assets folder of an Xcode project.


    If you’re creating geometric shapes, you can fill them with solid colors, custom
    colors, or gradients to create an interesting visual blend of multiple colors.
    If you’re using SF Symbol icons, you can adjust their size using the .font modifier.
    If you’re using images stored in the Assets folder of your Xcode project, you
    can use the .resizable, .frame, and .aspectRatio modifiers together to define
    the size and appearance of an image.


    To create extra visual effects, you can clip images into geometric shapes such
    as circles, add borders around images, add shadows around images, and modify the
    opacity. With so many different ways to adjust the appearance of images, you should
    be able to define an image to appear exactly the way you want it to look on your
    user interface.'
  trans: '

    # 显示图像


    与 `Text` 视图在用户界面上显示文本类似，`Image` 视图用于在用户界面上显示图标和图形文件。如果你想显示 SF Symbols 应用中存储的图标，可以使用如下
    Swift 代码：


    ```swift

    Image(systemName: "hare.fill")

    ```


    当要显示 SF Symbol 图标时，必须使用 `systemName` 参数。由于图标较小，你可能需要放大它们。最简单的放大方式是定义更大的字体，例如 `.largeTitle`
    或 `.custom`，如图 5-8 所示。


    ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig8_HTML.jpg](img/329781_6_En_5_Fig8_HTML.jpg)


    **图 5-8** – 通过更改字体大小来修改 SF Symbol 图标的大小


    要显示图像，首先需要将其拖放到 Assets 文件夹中。然后，要显示 Assets 文件夹中存储的图像，可以使用 `Image` 视图并指定图像名称，如下所示：


    ```swift

    Image("flag")

    ```


    图像的尺寸可以任意，但如果图像太大或太小，`Image` 视图会以其原始尺寸显示。由于你可能需要调整图像大小以适应用户界面，因此需要在 `Image` 视图上使用以下三个修饰符：


    - `.resizable()`

    - `.aspectRatio(contentMode: z)`

    - `.frame(width: x, height: y)`


    `.resizable()` 修饰符允许 `Image` 视图更改显示图像的大小。如果 `Image` 视图缺少此 `.resizable()` 修饰符，那么无论
    `Image` 视图的尺寸如何，图像都将保持其原始大小。


    `.frame(width: x, height: y)` 修饰符用于定义 `Image` 视图的大小。当与 `.resizable()` 修饰符一起使用时，`.frame`
    修饰符允许你定义图像的固定宽度和高度。


    由于拉伸 `Image` 视图的宽度和高度可能会使内部显示的图像变形，`.aspectRatio` 修饰符允许你定义图像应如何反应。`.fill` 选项将图像扩展到由
    `.frame` 修饰符定义的最大宽度或高度。`.fit` 选项将图像缩小到由 `.frame` 修饰符定义的最小宽度或高度，如图 5-9 所示。


    ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig9_HTML.jpg](img/329781_6_En_5_Fig9_HTML.jpg)


    **图 5-9** – 在图像上使用 `.fill` 和 `.fit` 宽高比


    如果你想要进一步细化宽高比，可以包含一个宽高比值，例如：


    ```swift

    Image("flag")

    .resizable()

    .frame(width: 150, height: 150)

    .aspectRatio(0.5, contentMode: .fill)

    ```


    此宽高比定义了宽度与高度的比例，因此值 `0.5` 表示宽度与高度比为 1:2，而值 `0.75` 则表示 3:4 的宽度与高度比。


    ## 裁剪图像


    `Image` 视图可以显示他人绘制的剪贴画图像，也可以显示用数码相机拍摄的照片。通常，`Image` 视图会在 `.frame` 修饰符定义的矩形内显示任何图片。但是，为了创造更独特的视觉效果，你可以通过使用
    `.clipShape` 修饰符将图像覆盖在几何形状上来裁剪图像。


    `.clipShape` 修饰符接受任何常见的几何形状，例如：


    ```swift

    .clipShape(Circle())

    ```


    当使用其他几何形状（如 `Ellipse()` 或 `Capsule()`）时，请确保框架宽度足够宽。如果框架的宽度和高度相同，那么 `Ellipse()`
    和 `Capsule()` 形状看起来就像 `Circle()`。图 5-10 展示了 `.clipShape(Circle())` 修饰符如何改变通常显示为矩形图像的图像外观。


    ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig10_HTML.jpg](img/329781_6_En_5_Fig10_HTML.jpg)


    **图 5-10** – 使用 `.clipShape()` 修饰符


    ## 为图像添加阴影


    另一种突出 `Image` 视图外观的方法是使用 `.shadow` 修饰符，它可以在视图周围添加阴影。你可以通过定义其半径来调整阴影在视图周围出现的程度，例如：


    ```swift

    .shadow(color: .red, radius: 46, x: 0, y: 0)

    ```


    `.shadow` 修饰符需要以下参数：


    - `Color` – 定义阴影的颜色。

    - `Radius` – 定义阴影在视图周围的大小。

    - `X` – 定义阴影的 x（水平）偏移量；值为 `0` 时，阴影在水平方向上围绕视图居中。

    - `Y` – 定义阴影的 y（垂直）偏移量；值为 `0` 时，阴影在垂直方向上围绕视图居中。


    如果 `x` 和 `y` 值非零，则阴影会偏离 `Image` 视图。如果 `x` 和 `y` 值都为 `0`，则阴影会均匀出现在 `Image` 视图的所有四个边缘周围，如图
    5-11 所示。


    ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig11_HTML.jpg](img/329781_6_En_5_Fig11_HTML.jpg)


    **图 5-11** – 使用不同的 `x` 和 `y` 值为 `Image` 视图添加阴影


    ## 为图像添加边框


    为了进一步突出 `Image` 视图，你可以使用 `.overlay` 修饰符在其周围添加边框，如下所示：


    ```swift

    .overlay(Rectangle().stroke(Color.blue, lineWidth: 10))

    ```


    `.overlay` 修饰符需要以下参数：


    - `Shape` – 定义边框的形状以匹配 `Image` 视图的形状

    - `Color` – 定义边框的颜色

    - `lineWidth` – 定义 `Image` 视图周围边框线的粗细


    图 5-12 展示了使用不同形状、颜色和线宽的 `.overlay` 修饰符的两种用法。


    ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig12_HTML.jpg](img/329781_6_En_5_Fig12_HTML.jpg)


    **图 5-12** – 为 `.overlay` 修饰符使用不同的值


    ## 定义图像的不透明度


    修改图像外观的另一种方法是定义其不透明度。不透明度为 `0` 意味着图像不可见。不透明度为 `1` 意味着图像完全不改变地显示。不透明度越接近 `0`，图像越模糊。不透明度越接近
    `1`，图像越清晰。


    要使用不透明度修饰符，只需像这样定义一个介于 `0` 到 `1` 之间的不透明度值：


    ```swift

    .opacity(0.75)

    ```


    图 5-13 展示了不同的不透明度值如何修改图像的外观。


    ![../images/329781_6_En_5_Chapter/329781_6_En_5_Fig13_HTML.jpg](img/329781_6_En_5_Fig13_HTML.jpg)


    **图 5-13** – 为 `.opacity` 修饰符使用不同的值


    ## 总结


    图像提供了在用户界面上呈现信息的另一种方式。图像可以是常见的几何形状（如圆形、椭圆和圆角矩形）、可以在 SF Symbols 应用中找到的图标，也可以是拖放到
    Xcode 项目 Assets 文件夹中的图形图像或数码照片。


    如果你正在创建几何形状，可以使用纯色、自定义颜色或渐变填充它们，以创建多颜色混合的视觉效果。如果你正在使用 SF Symbol 图标，可以使用 `.font`
    修饰符调整其大小。如果你正在使用 Xcode 项目 Assets 文件夹中存储的图像，可以将 `.resizable`、`.frame` 和 `.aspectRatio`
    修饰符结合使用，以定义图像的大小和外观。


    要创造额外的视觉效果，你可以将图像裁剪成几何形状（如圆形）、为图像添加边框、为图像添加阴影以及修改不透明度。有如此多调整图像外观的方法，你应该能够定义图像，使其在用户界面上完全按照你期望的方式显示。

