- fmt: '# Selecting Buttons Programmatically in a Tab Bar


    To select a different view, users can simply select a tab on the tab bar. By default,
    the first tab on the far left appears highlighted. However, sometimes you may
    want to select a tab through code. In that case, you need to identify each `.tabItem`
    using the `.tag` modifier.


    The `.tag` modifier lets you identify each tab with a fixed value such as `2`.
    When each `.tabItem` has a unique `.tag` value, then you can use Swift code to
    choose a particular tab by referencing its `.tag` value.


    To see how to access tabs in a Tab View through Swift code, follow these steps:


    1. Create a new SwiftUI iOS App project and give it any name you wish such as
    "PageView."

    2. Click the `ContentView` file in the Navigator pane.

    3. Add a State variable under the `struct ContentView: View` line like this:


    ```

    struct ContentView: View {

    @State var selectedView = 1

    ```


    4. Add a `VStack` and an `HStack` under the `var body: some View` line, and add
    four Buttons inside the `HStack` like this:


    ```

    var body: some View {

    VStack {

    HStack {

    Button ("1") {

    selectedView = 1

    }

    Button ("2") {

    selectedView = 2

    }

    Button ("3") {

    selectedView = 3

    }

    Button ("4") {

    selectedView = 4

    }

    }

    }

    }

    ```


    5. Add a Tab View inside the `VStack` and underneath the `HStack` like this:


    ```

    TabView (selection: $selectedView){

    Text("One")

    .tabItem {

    Image(systemName: "heart.fill")

    Text("One")

    }.tag(1)

    Text("Two")

    .tabItem {

    Image(systemName: "hare.fill")

    Text("Two")

    }.tag(2)

    Text("Three")

    .tabItem {

    Image(systemName: "tortoise.fill")

    Text("Three")

    }.tag(3)

    Text("Four")

    .tabItem {

    Image(systemName: "folder.fill")

    Text("Four")

    }.tag(4)

    }

    ```


    The entire `ContentView` file should look like this:


    ```

    import SwiftUI

    struct ContentView: View {

    @State var selectedView = 1

    var body: some View {

    VStack {

    HStack {

    Button ("1") {

    selectedView = 1

    }

    Button ("2") {

    selectedView = 2

    }

    Button ("3") {

    selectedView = 3

    }

    Button ("4") {

    selectedView = 4

    }

    }

    TabView (selection: $selectedView){

    Text("One")

    .tabItem {

    Image(systemName: "heart.fill")

    Text("One")

    }.tag(1)

    Text("Two")

    .tabItem {

    Image(systemName: "hare.fill")

    Text("Two")

    }.tag(2)

    Text("Three")

    .tabItem {

    Image(systemName: "tortoise.fill")

    Text("Three")

    }.tag(3)

    Text("Four")

    .tabItem {

    Image(systemName: "folder.fill")

    Text("Four")

    }.tag(4)

    }

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    This code creates a Tab View and four Buttons at the top of the screen labeled
    1, 2, 3, and 4.


    6. Click the Live Preview icon on the Canvas pane.

    7. Click the numbered Buttons at the top of the screen. Notice that if you click
    the `2` Button, the second tab on the tab bar gets selected. If you click the
    `4` Button, the fourth tab on the tab bar gets selected. The `.tag` modifier gives
    you a way to access a specific tab through Swift code.


    ## Displaying a Page View


    Normally, a Tab View displays tabs at the bottom of the screen so users can select
    a tab and jump to a different view. As an alternative, you can turn a Tab View
    into a Page View. A Page View displays tab bar icons at the bottom middle of the
    screen that represent different screens. Then the user can scroll right and left
    to view each screen in sequential order.


    To turn a Tab View into a Page View, just add the `.tabViewStyle` modifier to
    a Tab View and specify `.page` like this:


    ```

    TabView {

    }.tabViewStyle(.page)

    ```


    Now instead of selecting a tab from the bottom of the screen to open a view, users
    can scroll left and right to open each view in sequential order. To provide a
    visual map of how many views are available, you can add the `.indexViewStyle`
    modifier and specify `.always` for the `backgroundDisplayMode` like this:


    ```

    TabView {

    }.tabViewStyle(.page)

    .indexViewStyle(PageIndexViewStyle(backgroundDisplayMode: .always))

    ```


    To see how a Page View works, follow these steps:


    1. Create a new SwiftUI iOS App project and give it any name you wish such as
    "PageView."

    2. Click the `ContentView` file in the Navigator pane.

    3. Add a Tab View inside the `var body: some View` line like this:


    ```

    TabView {

    Text("One")

    .tabItem {

    Image(systemName: "heart.fill")

    }

    Text("Two")

    .tabItem {

    Image(systemName: "hare.fill")

    }

    Text("Three")

    .tabItem {

    Image(systemName: "tortoise.fill")

    }

    Text("Four")

    .tabItem {

    Image(systemName: "folder.fill")

    }

    Text("Five")

    .tabItem {

    Image(systemName: "tray.fill")

    }

    Text("Six")

    .tabItem {

    Image(systemName: "keyboard.fill")

    }

    }

    ```


    Feel free to choose different text for each `Text` view and different SF Symbol
    icons for each `Image` view. Notice that you only need to add an `Image` view
    and do not need a `Text` view for each `.tabItem`.


    4. Add a `.tabViewStyle` and `.indexViewStyle` modifier to the Tab View like this:


    ```

    TabView {

    Text("One")

    .tabItem {

    Image(systemName: "heart.fill")

    }

    Text("Two")

    .tabItem {

    Image(systemName: "hare.fill")

    }

    Text("Three")

    .tabItem {

    Image(systemName: "tortoise.fill")

    }

    Text("Four")

    .tabItem {

    Image(systemName: "folder.fill")

    }

    Text("Five")

    .tabItem {

    Image(systemName: "tray.fill")

    }

    Text("Six")

    .tabItem {

    Image(systemName: "keyboard.fill")

    }

    }.tabViewStyle(.page)

    .indexViewStyle(PageIndexViewStyle(backgroundDisplayMode: .always))

    ```


    This displays each `Image` as a list of icons in the bottom middle of the screen
    as shown in Figure 17-6.


    **Figure 17-6** The icon bar at the bottom of a Page View


    The entire `ContentView` file should look like this:


    ```

    import SwiftUI

    struct ContentView: View {

    var body: some View {

    TabView {

    Text("One")

    .tabItem {

    Image(systemName: "heart.fill")

    }

    Text("Two")

    .tabItem {

    Image(systemName: "hare.fill")

    }

    Text("Three")

    .tabItem {

    Image(systemName: "tortoise.fill")

    }

    Text("Four")

    .tabItem {

    Image(systemName: "folder.fill")

    }

    Text("Five")

    .tabItem {

    Image(systemName: "tray.fill")

    }

    Text("Six")

    .tabItem {

    Image(systemName: "keyboard.fill")

    }

    }.tabViewStyle(.page)

    .indexViewStyle(PageIndexViewStyle(backgroundDisplayMode: .always))

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    5. Click the Live Preview icon on the Canvas pane.

    6. Drag the mouse from right to left (and left to right) to swipe from one view
    to the next. Notice that each time you do this, a different icon at the bottom
    of the screen appears highlighted to let you know which view you''re currently
    on and how many additional views may be before and after the currently displayed
    view.'
