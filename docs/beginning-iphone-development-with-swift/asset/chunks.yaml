- fmt: '# Designing User Interfaces with SwiftUI


    Every app needs a user interface. The basic idea behind SwiftUI is to create a
    user interface using building blocks known as “views.” A view displays a single
    item on the user interface such as text, an image, or a button as shown in Figure
    [2-1](#329781_6_En_2_Chapter.xhtml#Fig1).


    ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig1_HTML.jpg](images/329781_6_En_2_Chapter/329781_6_En_2_Fig1_HTML.jpg)


    Figure 2-1


    The parts of a SwiftUI user interface


    One limitation of SwiftUI is that it can only display a single view on the screen
    at a time. To get around this limitation, SwiftUI offers something called “stacks.”
    A stack is considered a single view but lets you combine or stack up to ten additional
    views. By creating a stack, you can display more than one view on the screen.
    Stacks can even hold other stacks, essentially letting you display as many views
    as you want on a single screen.


    There are three types of stacks as shown in Figure [2-2](#329781_6_En_2_Chapter.xhtml#Fig2):


    ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig2_HTML.jpg](images/329781_6_En_2_Chapter/329781_6_En_2_Fig2_HTML.jpg)


    Figure 2-2


    Vertical, horizontal, and ZStacks


    * `VStack` – Vertical stacks that arrange views above and below another view

    * `HStack` – Horizontal stacks that arrange views side by side

    * `ZStack` – A stack that overlays views directly over each other


    A stack counts as a single view. By using horizontal (`HStack`) or vertical (`VStack`)
    stacks, you can add up to ten views inside a stack. For greater flexibility, you
    can embed stacks inside of stacks to display as many views as necessary.


    > **Note:** A stack can only contain a maximum of ten views. If you try to store
    11 or more views inside of a stack, Xcode will display an error message and refuse
    to run your program.


    When creating a user interface in SwiftUI, you have three options:


    * Type Swift code in the Editor pane.

    * Drag and drop a view (such as a button) into your Swift code in the Editor pane.

    * Drag and drop a view (such as a button) onto the Canvas pane.


    Typing Swift code in the Editor pane to design a user interface is the fastest
    and most flexible method, but takes time and requires familiarity with different
    options. To make typing Swift code to define user interface views easier, Xcode
    displays a popup menu of options when it recognizes what you’re trying to type.
    By choosing an option and pressing Return, you can create a user interface view
    quickly as shown in Figure [2-3](#329781_6_En_2_Chapter.xhtml#Fig3).


    ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig3_HTML.jpg](images/329781_6_En_2_Chapter/329781_6_En_2_Fig3_HTML.jpg)


    Figure 2-3


    As you type Swift code to define a user interface view, Xcode displays a menu
    of options


    If you’re not familiar with your options for designing a user interface, it’s
    easier to use the Library window, which lists all possible user interface views
    you can use as shown in Figure [2-4](#329781_6_En_2_Chapter.xhtml#Fig4).


    ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig4_HTML.jpg](images/329781_6_En_2_Chapter/329781_6_En_2_Fig4_HTML.jpg)


    Figure 2-4


    Clicking the Library icon opens the Library window


    Once you open the Library window, you can drag and drop a user interface view
    from the Library window either:


    * Into the Editor pane as shown in Figure [2-5](#329781_6_En_2_Chapter.xhtml#Fig5)

    * Onto the simulated iOS device user interface in the Canvas pane as shown in
    Figure [2-6](#329781_6_En_2_Chapter.xhtml#Fig6)


    ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig5_HTML.jpg](images/329781_6_En_2_Chapter/329781_6_En_2_Fig5_HTML.jpg)


    Figure 2-5


    Dragging and dropping a user interface view into the Editor pane


    ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig6_HTML.jpg](images/329781_6_En_2_Chapter/329781_6_En_2_Fig6_HTML.jpg)


    Figure 2-6


    Dragging and dropping a user interface view into the Canvas pane


    No matter how you change the user interface, Xcode keeps all changes synchronized
    between the Editor pane and the Canvas pane. That means when you type Swift code
    in the Editor pane, the Canvas pane shows your changes right away. When you drag
    and drop a user interface view onto the Canvas pane, Xcode automatically adds
    that Swift code in the Editor pane right away.


    The Canvas pane displays your user interface, but if you want to test your app,
    you have two choices as shown in Figure [2-7](#329781_6_En_2_Chapter.xhtml#Fig7):


    ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig7_HTML.jpg](images/329781_6_En_2_Chapter/329781_6_En_2_Fig7_HTML.jpg)


    Figure 2-7


    The Run button and the Live Preview icon


    * Click the Run button or choose Product ➤ Run to open the Simulator.

    * Click the Live Preview icon in the Canvas pane.


    To see how SwiftUI works to create a simple user interface that can respond to
    the user, follow these steps:


    1. Create a new iOS App project, make sure it uses SwiftUI, and give it a descriptive
    name (such as `SwiftExample`).


    2. Click the `ContentView` file in the Navigator pane. The Editor pane displays
    the contents of the `ContentView` file.


    3. Choose Editor ➤ Canvas. (Skip this step if a check mark already appears in
    front of the Canvas option.) This opens the canvas so you can preview your user
    interface.


    4. Delete the text “Hello World” in the `Text` command and type the following
    so the `ContentView` structure looks like this:


    ```

    struct ContentView: View {

    @State private var message = true

    var body: some View {

    VStack {

    Toggle(isOn: $message) {

    Text("Toggle message on/off")

    }

    if message {

    Text ("Here''s a secret message!")

    }

    }

    }

    }

    ```


    The preceding Swift code displays a toggle switch on the screen, but you won’t
    be able to see it work unless you run your app in the Simulator (which mimics
    an iOS device such as an iPhone or iPad), or test it through Live Preview. In
    most cases, Live Preview offers a faster way to view and test your user interface.


    ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig8_HTML.jpg](images/329781_6_En_2_Chapter/329781_6_En_2_Fig8_HTML.jpg)


    Figure 2-8


    Live Preview lets you interact with the user interface


    1. Click the Live Preview icon to turn on Live Preview. As you click the toggle,
    notice that the message appears and disappears as shown in Figure [2-8](#329781_6_En_2_Chapter.xhtml#Fig8).


    2. Click the Live Preview button again to turn off Live Preview.


    Repeat the preceding steps except click the Run button to open the Simulator.
    Testing your app in either the Simulator or the Canvas pane is identical. The
    main difference is that the Canvas pane is usually much faster to use.


    Remember, you can always choose a different iOS device to test your app on. To
    change which iOS device to emulate, click the menu to the right of the Run button
    as shown in Figure [2-9](#329781_6_En_2_Chapter.xhtml#Fig9).


    ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig9_HTML.jpg](images/329781_6_En_2_Chapter/329781_6_En_2_Fig9_HTML.jpg)


    Figure 2-9


    Changing the iOS device the Simulator emulates


    Another way to change the iOS device to emulate is to move the cursor into `ContentView()`
    in the `ContentView_Previews: PreviewProvider` structure. Then click the Device
    popup menu in the Inspector pane as shown in Figure [2-10](#329781_6_En_2_Chapter.xhtml#Fig10).


    ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig10_HTML.jpg](images/329781_6_En_2_Chapter/329781_6_En_2_Fig10_HTML.jpg)


    Figure 2-10


    Changing the iOS device that Live Preview emulates


    Now let’s go over this project so you get a rough idea how it works. The `ContentView`
    structure defines a single view as a `VStack`. That means anything inside this
    `VStack` will appear stacked on top of each other.


    The first view inside the `VStack` is a `Toggle`, which uses a `Text` view to
    display the following text to the left of the toggle: “Toggle message on/off.”
    When the `Toggle` is on, a variable called `message` gets stored a `true` value.
    When the `Toggle` is off, the `message` variable gets stored a `false` value.'
