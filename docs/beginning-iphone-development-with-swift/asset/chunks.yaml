    \n图 13-5 – 在 `List` 上滑动可以显示更多选项\n\n`List` 的两种常见操作是删除和移动项目。从 `List` 中删除项目涉及移除该项目，通常是在用户从右向左滑动之后。在列表中移动项目涉及用手指滑动项目，将其放到\
