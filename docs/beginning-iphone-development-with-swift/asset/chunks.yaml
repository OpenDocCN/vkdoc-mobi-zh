- fmt: '# Scaling Animation


    Another way to create animation is to define two different sizes for a view, known
    as scaling. To define the starting and ending states for a view’s size, use the
    `.scaleEffect` modifier and define the relative size changes to make. For example,
    a `.scaleEffect(1)` represents the view’s current size. A `.scaleEffect` value
    greater than 1 defines a greater size or scale, while a `.scaleEffect` value less
    than 1 defines a smaller size or scale.


    To see how to animate a view by scaling it to different sizes, follow these steps:


    1. Create a new SwiftUI iOS App project and give it any name you wish such as
    “ScaleAnimation.”

    2. Click the `ContentView` file in the Navigator pane.

    3. Add a `State` variable under the `struct ContentView: View` line like this:

    4. Add an `Image` view inside the `var body: some View` like this:


    ```

    struct ContentView: View {

    @State private var changeMe = false

    ```


    ```

    var body: some View {

    Image(systemName: "tortoise.fill")

    .font(.system(size:100))

    .foregroundColor(.red)

    .scaleEffect(changeMe ? 1.75 : 1)

    }

    ```


    This displays a tortoise icon on the screen at a size of 100 to make it easier
    to see. Then it colors the tortoise icon red and uses the `.scaleEffect` modifier
    to alternate the size of the tortoise from 1.75 times its normal size back to
    its original size.


    5. Add the following modifiers to the `Image` view like this:


    ```

    .animation(.default, value: changeMe)

    .onTapGesture {

    changeMe.toggle()

    }

    ```


    This adds the `.animation` modifier to the `Image` view so its size changes appear
    animated. Then the `.onTapGesture` modifier detects a tap gesture to toggle the
    `changeMe` State variable from `true` to `false` (or `false` to `true`). The entire
    `ContentView` file should look like this:


    6. Click the Live Preview icon on the Canvas pane.

    7. Click the tortoise image. Notice that each time you click the tortoise image,
    it alternates between shrinking and expanding in size.


    ```

    import SwiftUI

    struct ContentView: View {

    @State private var changeMe = false

    var body: some View {

    Image(systemName: "tortoise.fill")

    .font(.system(size:100))

    .foregroundColor(.red)

    .scaleEffect(changeMe ? 1.75 : 1)

    .animation(.default, value: changeMe)

    .onTapGesture {

    changeMe.toggle()

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    # Rotating Animation


    Animating rotation involves changing the angle of a view using the `.rotationEffect`
    modifier. A `.rotationEffect` value of 0 displays no rotation, while a rotation
    less than or greater than 0 rotates the view either counterclockwise or clockwise.


    To see how to animate a view by rotating it by different angles, follow these
    steps:


    1. Create a new SwiftUI iOS App project and give it any name you wish such as
    “RotateAnimation.”

    2. Click the `ContentView` file in the Navigator pane.

    3. Add two `State` variables under the `struct ContentView: View` line like this:

    4. Add a `VStack` in the `var body: some View`.

    5. Add a `Text` view inside the `VStack` like this:


    ```

    struct ContentView: View {

    @State var myDegrees: Double = 0.0

    @State var flag = false

    ```


    ```

    var body: some View {

    VStack {

    Text("Hello, world!")

    .padding()

    .rotationEffect(Angle(degrees: flag ? myDegrees : 0))

    .animation(.default, value: flag)

    ```


    This `Text` view uses the `.rotationEffect` to define the starting and ending
    angles. Then it uses the `.animation` modifier to animate the `Text` view as it
    rotates between the starting and ending angles.


    6. Add a `Button` and a `Slider` under the `Text` view inside the `VStack` like
    this:


    ```

    var body: some View {

    VStack {

    Text("Hello, world!")

    .padding()

    .rotationEffect(Angle(degrees: flag ? myDegrees : 0))

    .animation(.default, value: flag)

    Button("Animate now") {

    flag.toggle()

    }

    Slider(value: $myDegrees, in: -180...180, step: 1)

    .padding()

    }

    }

    ```


    The `Slider` lets you choose between an angle of –180 degrees and 180 degrees.
    The entire `ContentView` file should look like this:


    7. Click the Live Preview icon on the Canvas pane.

    8. Drag the `Slider` left or right to define an ending angle. (The starting angle
    is 0.)

    9. Click the `Button`. Notice the `.animation` modifier animates the `Text` view
    as it rotates to its new angle.


    ```

    import SwiftUI

    struct ContentView: View {

    @State var myDegrees: Double = 0.0

    @State var flag = false

    var body: some View {

    VStack {

    Text("Hello, world!")

    .padding()

    .rotationEffect(Angle(degrees: flag ? myDegrees : 0))

    .animation(.default, value: flag)

    Button("Animate now") {

    flag.toggle()

    }

    Slider(value: $myDegrees, in: -180...180, step: 1)

    .padding()

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    # Animation Options


    So far, we’ve used the `.default` setting for the `.animation` modifier. While
    this works, there are several other animation options you can choose:


    - `.easeIn` – Starts the animation slower and then speeds up

    - `.easeOut` – Slows the animation near the end

    - `.easeInOut` – Starts the animation slower, speeds up, then slows down near
    the end (same as `.default`)

    - `.linear` – Maintains a constant speed for the animation from start to finish


    By choosing a different `.animation` option, you can adjust how the animation
    appears when it runs. To compare these different `.animation` options, follow
    these steps:


    1. Create a new SwiftUI iOS App project and give it any name you wish such as
    “CompareAnimation.”

    2. Click the `ContentView` file in the Navigator pane.

    3. Add a `State` variable under the `struct ContentView: View` line like this:

    4. Add a `VStack` in the `var body: some View`.

    5. Add a `Button` inside the `VStack` like this:


    ```

    struct ContentView: View {

    @State private var start = false

    ```


    ```

    var body: some View {

    VStack {

    Button("Start animation") {

    start.toggle()

    }

    ```


    6. Add an `HStack` with four `Text` views underneath the `Button` like this:


    ```

    HStack {

    Text("easeIn")

    .offset(x: 0, y: start ? 450 : 0)

    .animation(.easeIn, value: start)

    Text("easeOut")

    .offset(x: 0, y: start ? 450 : 0)

    .animation(.easeOut, value: start)

    Text("easeInOut")

    .offset(x: 0, y: start ? 450 : 0)

    .animation(.easeInOut, value: start)

    Text("linear")

    .offset(x: 0, y: start ? 450 : 0)

    .animation(.linear, value: start)

    }.position(x: 150, y: 10)

    ```


    Notice that the `.position` modifier initially places the entire `HStack` and
    all four `Text` views near the top of the screen. The entire `ContentView` file
    should look like this:


    7. Click the Live Preview icon on the Canvas pane.

    8. Click the `Button`. Notice that all four `Text` views drop to the bottom of
    the screen, but because they all use different `.animation` options, the animation
    appears slightly different even though they all start and stop at the same time.


    ```

    import SwiftUI

    struct ContentView: View {

    @State private var start = false

    var body: some View {

    VStack {

    Button("Start animation") {

    start.toggle()

    }

    HStack {

    Text("easeIn")

    .offset(x: 0, y: start ? 450 : 0)

    .animation(.easeIn, value: start)

    Text("easeOut")

    .offset(x: 0, y: start ? 450 : 0)

    .animation(.easeOut, value: start)

    Text("easeInOut")

    .offset(x: 0, y: start ? 450 : 0)

    .animation(.easeInOut, value: start)

    Text("linear")

    .offset(x: 0, y: start ? 450 : 0)

    .animation(.linear, value: start)

    }.position(x: 150, y: 10)

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```'
