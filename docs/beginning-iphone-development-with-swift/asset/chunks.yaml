    \n本 Apress 印记由注册公司 APress Media, LLC（斯普林格自然旗下）出版。\n\n注册公司地址为：1 New York Plaza,\
    \ New York, NY 10004, U.S.A。\n\n**关于作者**  \n**关于技术审校**\n\n# 1. 理解 iOS 编程\n\n所有编程都涉及编写计算机要执行的命令这一相同任务。要学会\
    \ iOS 编程，你需要掌握三种不同的技能：\n\n- 如何用 Swift 编程语言编写命令\n- 如何使用苹果的软件框架\n- 如何在 Xcode 中创建用户界面\n\
    \n你需要用 Swift 编程语言编写命令，让应用实现独特的功能。然后借助苹果的软件框架来处理常见任务，例如检测触摸手势或访问摄像头。最后，使用 Xcode\
    \ 设计应用的界面。\n\n应尽可能多地依赖苹果的软件框架，因为这样无需编写（并测试）自己的 Swift 代码，就能执行常见任务。通过依赖苹果的软件框架，你可以专注于应用的独特功能，而无需处理让应用使用\
    \ iPhone 或 iPad 不同硬件特性的繁琐细节。\n\n理想情况下，你希望用户界面能够适配 iPhone、iPad 或 iPod Touch 等所有不同的屏幕尺寸，从而呈现良好外观。用户界面让你可以向用户展示信息，并从用户那里获取信息。最好的用户界面是那种用户几乎无需思考就能使用的界面。\n\
    \n本质上，每个 iOS 应用都由三部分组成，如图 1-1 所示：\n\n![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig1_HTML.jpg](img/329781_6_En_1_Fig1_HTML.jpg)\n\
    \n**图 1-1** iOS 应用的三个组成部分\n\n- 你的代码，用于让应用做有用的事\n- 一个你可以在 Xcode 中可视化设计的用户界面\n-\
    \ 通过一个或多个苹果 iOS 框架对 iOS 设备硬件特性的访问\n\n苹果为 iOS（及其其他操作系统，如 macOS、watchOS 和 tvOS）提供了数十个框架。只需使用苹果的框架，你就能通过编写少量自己的代码来完成常见任务。苹果提供的一些框架包括：\n\
    \n- `SwiftUI` – 用户界面及触控屏支持\n- `ARKit` – 增强现实功能\n- `Core Animation` – 显示动画\n- `GameKit`\
    \ – 创建多人互动应用\n- `Contacts` – 访问 iOS 设备上的通讯录数据\n- `SiriKit` – 允许通过 Siri 使用语音命令\n\
    - `AVKit` – 允许播放音频和视频文件\n- `MediaLibrary` – 允许访问 iOS 设备上存储的图像、音频和视频\n- `CallKit`\
    \ – 提供语音通话功能\n\n苹果的框架本质上包含了你可以复用的代码。这使应用更可靠、更一致，同时通过使用经过验证且能正确运行的代码，节省了开发者的时间。要查看苹果提供的完整软件框架列表，请访问苹果开发者文档网站（[`https://developer.apple.com/documentation`](https://developer.apple.com/documentation)）。\n\
    \n苹果的框架可以为你创建 iOS 应用提供巨大优势，但你仍然需要提供用户界面，以便用户能与应用交互。虽然你可以从头创建用户界面，但这既繁琐、耗时，又容易出错。更糟的是，如果每个应用开发者都从头创建用户界面，那么没有两个\
    \ iOS 应用会看起来或操作方式完全相同，从而使用户感到困惑。\n\n这就是为什么苹果的 Xcode 编译器能帮助你使用大多数应用中使用的标准功能来设计用户界面，例如视图（屏幕上的窗口）、按钮、标签、文本字段和滑块。在\
    \ Xcode 中，用户界面的每个窗口被称为一个视图。简单的 iOS 应用可能只包含一个视图（想想 iPhone 上的计算器应用），而更复杂的 iOS 应用则由多个视图组成。\n\
    \n为了创建用户界面，Xcode 提供了两种选择：\n\n- 故事板\n- SwiftUI\n\n故事板让你组织每个屏幕（称为视图），并使用转场将它们连接起来。故事板最大的缺点是，当应用需要显示多个屏幕时，使用起来往往很笨拙。此外，你需要编写大量\
    \ Swift 代码来使各种用户界面对象（如表视图、文本字段和按钮）工作。最后，故事板使得创建能够自动适应不同尺寸 iOS 设备屏幕的用户界面变得繁琐且困难。\n\
    \n由于这些原因，苹果现在提供了第二种设计用户界面的方式，即使用名为 `SwiftUI` 的框架。`SwiftUI` 的主要理念是，你只需编写尽可能少的代码就能让用户界面工作。取而代之的是，你选择希望在用户界面上显示的内容，然后定义修改器来改变该用户界面在屏幕上的外观。\n\
    \n你可以在单个项目中同时使用故事板和 `SwiftUI`，也可以只使用故事板或只使用 `SwiftUI`。由于 `SwiftUI` 代表了为苹果所有产品开发应用的未来方向，本书将专门聚焦于使用\
    \ `SwiftUI` 而非故事板来创建用户界面。\n"
- fmt: '# Learning About Xcode


    Learning iOS development is more than just learning how to write code in the `Swift`
    programming language. Besides knowing `Swift`, you must also know how to find
    and use Apple’s different software frameworks, how to use `Xcode` to design your
    user interface using `SwiftUI`, and how to organize, create, and delete files
    that contain your `Swift` code. In addition, you must also learn how to write
    code using `Xcode`’s editor.


    Each time you create an `Xcode` project, you’re actually creating a folder that
    contains multiple files. A simple iOS app might consist of a handful of files,
    while a complicated app might contain hundreds or even thousands of separate files.


    By storing code in separate files, you can quickly identify the file that contains
    the data you want to edit and modify while safely ignoring other files. No matter
    how many `.swift` files you have, `Xcode` treats them as if they’re all stored
    in a single file. By breaking up your program into multiple `.swift` files, you
    can group different parts of your program in separate files to make it easier
    to modify specific parts of your app.


    To further help you organize multiple files in a project, `Xcode` lets you create
    separate folders. These folders exist solely for your convenience in organizing
    your code. Figure [1-2](#329781_6_En_1_Chapter.xhtml#Fig2) shows how `Xcode` can
    divide an app into folders and files.


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig2_HTML.jpg](images/329781_6_En_1_Chapter/329781_6_En_1_Fig2_HTML.jpg)


    Figure 1-2


    `Xcode` stores your code in files that you can organize in folders


    To get acquainted with iOS app development, let’s start with a simple project
    that will teach you


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig3_HTML.jpg](images/329781_6_En_1_Chapter/329781_6_En_1_Fig3_HTML.jpg)


    Figure 1-3


    The `Xcode` welcoming screen


    1.  Start `Xcode`. A welcoming screen appears that lets you choose a recently
    used project or the option of creating a new project as shown in Figure [1-3](#329781_6_En_1_Chapter.xhtml#Fig3).
    (You can always open this welcoming screen from within `Xcode` by choosing Windows
    ➤ Welcome to Xcode or by pressing Shift + Command + 1.)


    *   How to understand the parts of a project


    *   How to view different files


    *   How the different parts of `Xcode` work


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig4_HTML.jpg](images/329781_6_En_1_Chapter/329781_6_En_1_Fig4_HTML.jpg)


    Figure 1-4


    Choosing a project template


    1.  Click the `Create a new Xcode project` option. `Xcode` displays templates
    for designing different types of apps as shown in Figure [1-4](#329781_6_En_1_Chapter.xhtml#Fig4).
    Notice that the top of the template window displays different operating systems
    you can develop apps for such as iOS, watchOS, tvOS, and macOS. By selecting different
    operating systems, you can create projects designed for the devices that run that
    particular operating system.


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig5_HTML.jpg](images/329781_6_En_1_Chapter/329781_6_En_1_Fig5_HTML.jpg)


    Figure 1-5


    Defining a project name, organization name, and organization identifier


    1.  Click `iOS` and then click `App`. The `App` template represents the most basic
    iOS project.


    2.  Click the `Next` button. Another window appears, asking for your project name
    along with an organization name and organization identifier as shown in Figure
    [1-5](#329781_6_En_1_Chapter.xhtml#Fig5). You must fill out all three text fields,
    but the project name, organization name, and organization identifier can be any
    descriptive text that you want. Notice that the `Interface` popup menu lets you
    choose between `SwiftUI` and `Storyboard`. For every project in this book, always
    make sure you choose `SwiftUI`.


    1.  Click in the `Project Name` text field and type a name for your project such
    as `MyFirstApp`.


    2.  Click in the `Team` text field and type your name or company name.


    3.  Click in the `Organization Identifier` text field and type any identifying
    text you wish. Typically, this identifier is your website spelled backward such
    as `com.microsoft`.


    4.  Click the `Interface` popup menu and choose `SwiftUI`. Make sure that all
    check boxes are clear. Then click the `Next` button. `Xcode` displays a dialog
    for you to choose which drive and folder to store your project in.


    5.  Choose a drive and folder and click the `Create` button. `Xcode` displays
    your newly created project.


    The `Xcode` window may initially look confusing, but you need to see that `Xcode`
    groups information in several panes. The far left pane is called the Navigator
    pane. By clicking icons at the top of the Navigator pane, you can view different
    parts of your project as shown in Figure [1-6](#329781_6_En_1_Chapter.xhtml#Fig6).


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig6_HTML.jpg](images/329781_6_En_1_Chapter/329781_6_En_1_Fig6_HTML.jpg)


    Figure 1-6


    The Navigator pane appears on the far left of the `Xcode` window


    The main SwiftUI file is called `ContentView`, which contains Swift code that
    defines the user interface of an app.


    ```

    import SwiftUI

    struct ContentView: View {

    var body: some View {

    Text("Hello, world!")

    .padding()

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    The `import SwiftUI` line lets your app use the `SwiftUI` framework for designing
    user interfaces.


    The `ContentView: View` structure displays a single view on the screen. SwiftUI
    can only display one view at a time on the screen. When you create a SwiftUI iOS
    App, the default view is a `Text` view that displays “Hello, world!” in the middle
    of the screen.


    The `ContentView_Previews: PreviewProvider` structure actually displays the user
    interface on the Canvas pane, which appears to the right of the Swift code as
    shown in Figure [1-7](#329781_6_En_1_Chapter.xhtml#Fig7).


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig7_HTML.jpg](images/329781_6_En_1_Chapter/329781_6_En_1_Fig7_HTML.jpg)


    Figure 1-7


    The Editor pane and the Canvas pane


    When the Editor pane and the Canvas pane appear side by side, any changes you
    make to the Editor pane appear in the Canvas pane and vice versa. If you click
    the Editor Options icon in the upper right corner, you can hide or display the
    Canvas pane as shown in Figure [1-8](#329781_6_En_1_Chapter.xhtml#Fig8).


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig8_HTML.jpg](images/329781_6_En_1_Chapter/329781_6_En_1_Fig8_HTML.jpg)


    Figure 1-8


    The Editor Options icon lets you toggle between displaying and hiding the Canvas
    pane


    The Canvas pane serves two purposes. First, it lets you see exactly what your
    user interface looks like on a simulated iOS device as you’re creating it. Second,
    it lets you run your app in the simulated iOS device.


    The Canvas pane can simulate a single iOS device such as an iPod Touch. If you
    want to change which iOS device the Canvas pane simulates, `Xcode` offers three
    methods as shown in Figure [1-9](#329781_6_En_1_Chapter.xhtml#Fig9):


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig9_HTML.jpg](images/329781_6_En_1_Chapter/329781_6_En_1_Fig9_HTML.jpg)


    Figure 1-9


    Displaying a menu of iOS devices to simulate


    *   Click the popup menu in the upper left corner to display a list of iOS devices.


    *   Move the cursor in `ContentView()` inside the `ContentView_Previews: PreviewProvider`
    structure, click inspect Selected Object to display a menu, and click the Device
    popup menu to display a list of iOS devices.


    *   Move the cursor in `ContentView()` inside the `ContentView_Previews: PreviewProvider`
    structure and click the Device popup menu in the Inspector pane (on the right
    side of the `Xcode` window) to display a list of iOS devices.


    After you choose a different iOS device for the Canvas pane, you may need to click
    a Resume button that appears in the upper right corner of the Canvas pane. The
    Resume button makes sure that the Canvas pane matches any changes you might have
    made.'
  raw: '## Learning About Xcode


    Learning iOS development is more than just learning how to write code in the Swift
    programming language. Besides knowing Swift, you must also know how to find and
    use Apple’s different software frameworks, how to use Xcode to design your user
    interface using SwiftUI, and how to organize, create, and delete files that contain
    your Swift code. In addition, you must also learn how to write code using Xcode’s
    editor.


    Each time you create an Xcode project, you’re actually creating a folder that
    contains multiple files. A simple iOS app might consist of a handful of files,
    while a complicated app might contain hundreds or even thousands of separate files.


    By storing code in separate files, you can quickly identify the file that contains
    the data you want to edit and modify while safely ignoring other files. No matter
    how many .swift files you have, Xcode treats them as if they’re all stored in
    a single file. By breaking up your program into multiple .swift files, you can
    group different parts of your program in separate files to make it easier to modify
    specific parts of your app.


    To further help you organize multiple files in a project, Xcode lets you create
    separate folders. These folders exist solely for your convenience in organizing
    your code. Figure [1-2](#329781_6_En_1_Chapter.xhtml#Fig2) shows how Xcode can
    divide an app into folders and files.


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig2_HTML.jpg](images/329781_6_En_1_Chapter/329781_6_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Xcode stores your code in files that you can organize in folders


    To get acquainted with iOS app development, let’s start with a simple project
    that will teach you


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig3_HTML.jpg](images/329781_6_En_1_Chapter/329781_6_En_1_Fig3_HTML.jpg)


    Figure 1-3


    The Xcode welcoming screen


    1.  Start Xcode. A welcoming screen appears that lets you choose a recently used
    project or the option of creating a new project as shown in Figure [1-3](#329781_6_En_1_Chapter.xhtml#Fig3).
    (You can always open this welcoming screen from within Xcode by choosing Windows
    ➤ Welcome to Xcode or by pressing Shift + Command + 1.)


    *   How to understand the parts of a project


    *   How to view different files


    *   How the different parts of Xcode work


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig4_HTML.jpg](images/329781_6_En_1_Chapter/329781_6_En_1_Fig4_HTML.jpg)


    Figure 1-4


    Choosing a project template


    1.  Click the **Create a new Xcode project** option. Xcode displays templates
    for designing different types of apps as shown in Figure [1-4](#329781_6_En_1_Chapter.xhtml#Fig4).
    Notice that the top of the template window displays different operating systems
    you can develop apps for such as iOS, watchOS, tvOS, and macOS. By selecting different
    operating systems, you can create projects designed for the devices that run that
    particular operating system.


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig5_HTML.jpg](images/329781_6_En_1_Chapter/329781_6_En_1_Fig5_HTML.jpg)


    Figure 1-5


    Defining a project name, organization name, and organization identifier


    1.  Click **iOS** and then click **App**. The App template represents the most
    basic iOS project.


    2.  Click the **Next** button. Another window appears, asking for your project
    name along with an organization name and organization identifier as shown in Figure
    [1-5](#329781_6_En_1_Chapter.xhtml#Fig5). You must fill out all three text fields,
    but the project name, organization name, and organization identifier can be any
    descriptive text that you want. Notice that the Interface popup menu lets you
    choose between SwiftUI and Storyboard. For every project in this book, always
    make sure you choose SwiftUI.


    1.  Click in the Project Name text field and type a name for your project such
    as MyFirstApp.


    2.  Click in the Team text field and type your name or company name.


    3.  Click in the Organization Identifier text field and type any identifying text
    you wish. Typically, this identifier is your website spelled backward such as
    com.microsoft.


    4.  Click the Interface popup menu and choose **SwiftUI**. Make sure that all
    check boxes are clear. Then click the **Next** button. Xcode displays a dialog
    for you to choose which drive and folder to store your project in.


    5.  Choose a drive and folder and click the **Create** button. Xcode displays
    your newly created project.


    The Xcode window may initially look confusing, but you need to see that Xcode
    groups information in several panes. The far left pane is called the Navigator
    pane. By clicking icons at the top of the Navigator pane, you can view different
    parts of your project as shown in Figure [1-6](#329781_6_En_1_Chapter.xhtml#Fig6).


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig6_HTML.jpg](images/329781_6_En_1_Chapter/329781_6_En_1_Fig6_HTML.jpg)


    Figure 1-6


    The Navigator pane appears on the far left of the Xcode window


    The main SwiftUI file is called ContentView, which contains Swift code that defines
    the user interface of an app.


    ```

    import SwiftUI

    struct ContentView: View {

    var body: some View {

    Text("Hello, world!")

    .padding()

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    The import SwiftUI line lets your app use the SwiftUI framework for designing
    user interfaces.


    The ContentView: View structure displays a single view on the screen. SwiftUI
    can only display one view at a time on the screen. When you create a SwiftUI iOS
    App, the default view is a Text view that displays “Hello, world!” in the middle
    of the screen.


    The ContentView_Previews: PreviewProvider structure actually displays the user
    interface on the Canvas pane, which appears to the right of the Swift code as
    shown in Figure [1-7](#329781_6_En_1_Chapter.xhtml#Fig7).


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig7_HTML.jpg](images/329781_6_En_1_Chapter/329781_6_En_1_Fig7_HTML.jpg)


    Figure 1-7


    The Editor pane and the Canvas pane


    When the Editor pane and the Canvas pane appear side by side, any changes you
    make to the Editor pane appear in the Canvas pane and vice versa. If you click
    the Editor Options icon in the upper right corner, you can hide or display the
    Canvas pane as shown in Figure [1-8](#329781_6_En_1_Chapter.xhtml#Fig8).


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig8_HTML.jpg](images/329781_6_En_1_Chapter/329781_6_En_1_Fig8_HTML.jpg)


    Figure 1-8


    The Editor Options icon lets you toggle between displaying and hiding the Canvas
    pane


    The Canvas pane serves two purposes. First, it lets you see exactly what your
    user interface looks like on a simulated iOS device as you’re creating it. Second,
    it lets you run your app in the simulated iOS device.


    The Canvas pane can simulate a single iOS device such as an iPod Touch. If you
    want to change which iOS device the Canvas pane simulates, Xcode offers three
    methods as shown in Figure [1-9](#329781_6_En_1_Chapter.xhtml#Fig9):


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig9_HTML.jpg](images/329781_6_En_1_Chapter/329781_6_En_1_Fig9_HTML.jpg)


    Figure 1-9


    Displaying a menu of iOS devices to simulate


    *   Click the popup menu in the upper left corner to display a list of iOS devices.


    *   Move the cursor in ContentView() inside the ContentView_Previews: PreviewProvider
    structure, click inspect Selected Object to display a menu, and click the Device
    popup menu to display a list of iOS devices.


    *   Move the cursor in ContentView() inside the ContentView_Previews: PreviewProvider
    structure and click the Device popup menu in the Inspector pane (on the right
    side of the Xcode window) to display a list of iOS devices.


    After you choose a different iOS device for the Canvas pane, you may need to click
    a Resume button that appears in the upper right corner of the Canvas pane. The
    Resume button makes sure that the Canvas pane matches any changes you might have
    made.'
  trans: '

    # 了解 Xcode


    学习 iOS 开发不仅仅是学习如何使用 `Swift` 编程语言编写代码。除了了解 `Swift`，你还必须知道如何查找和使用 Apple 的不同软件框架、如何使用
    `Xcode` 通过 `SwiftUI` 设计用户界面，以及如何组织、创建和删除包含 `Swift` 代码的文件。此外，你还必须学习如何使用 `Xcode`
    的编辑器编写代码。


    每次创建一个 `Xcode` 项目时，实际上你都在创建一个包含多个文件的文件夹。一个简单的 iOS 应用可能只包含几个文件，而一个复杂的应用则可能包含数百甚至数千个独立的文件。


    通过将代码存储在不同的文件中，你可以快速找到包含你要编辑和修改的数据的那个文件，同时安全地忽略其他文件。无论你有多少个 `.swift` 文件，`Xcode`
    都会将它们视为存储在一个文件中。通过将程序分解成多个 `.swift` 文件，你可以将程序的不同部分分组到不同的文件中，从而更容易修改应用的特定部分。


    为了进一步帮助你组织项目中的多个文件，`Xcode` 允许你创建单独的文件夹。这些文件夹的存在纯粹是为了方便你组织代码。图 1-2 展示了 `Xcode`
    如何将应用划分为文件夹和文件。


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig2_HTML.jpg](img/329781_6_En_1_Fig2_HTML.jpg)


    图 1-2


    `Xcode` 将你的代码存储在文件中，你可以将这些文件组织到文件夹中


    为了熟悉 iOS 应用开发，让我们从一个简单的项目开始，该项目将教你：


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig3_HTML.jpg](img/329781_6_En_1_Fig3_HTML.jpg)


    图 1-3


    `Xcode` 欢迎界面


    1.  启动 `Xcode`。屏幕上会出现欢迎界面，让你选择最近使用过的项目或创建新项目的选项，如图 1-3 所示。（你随时可以通过选择“窗口 ➤ 欢迎使用
    Xcode”或按下 Shift + Command + 1 来从 `Xcode` 内部打开此欢迎界面。）


    *   如何理解项目的组成部分


    *   如何查看不同的文件


    *   `Xcode` 的不同部分如何工作


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig4_HTML.jpg](img/329781_6_En_1_Fig4_HTML.jpg)


    图 1-4


    选择项目模板


    1.  点击“创建新的 Xcode 项目”选项。`Xcode` 会显示用于设计不同类型应用的模板，如图 1-4 所示。请注意，模板窗口顶部会显示你可以为其开发应用的不同操作系统，例如
    iOS、watchOS、tvOS 和 macOS。通过选择不同的操作系统，你可以创建专为运行该特定操作系统的设备设计的项目。


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig5_HTML.jpg](img/329781_6_En_1_Fig5_HTML.jpg)


    图 1-5


    定义项目名称、组织名称和组织标识符


    1.  点击 `iOS`，然后点击 `App`。`App` 模板代表了最基本的 iOS 项目。


    2.  点击“下一步”按钮。将会出现另一个窗口，要求你输入项目名称以及组织名称和组织标识符，如图 1-5 所示。你必须填写所有三个文本字段，但项目名称、组织名称和组织标识符可以是任何你想要的描述性文本。请注意，“界面”弹出菜单让你可以在
    `SwiftUI` 和 `Storyboard` 之间进行选择。对于本书中的所有项目，请务必确保你选择了 `SwiftUI`。


    1.  点击“项目名称”文本字段，然后为你的项目键入一个名称，例如 `MyFirstApp`。


    2.  点击“团队”文本字段，然后键入你的姓名或公司名称。


    3.  点击“组织标识符”文本字段，然后键入你想要的任何标识文本。通常，此标识符是你的网站名称反向拼写，例如 `com.microsoft`。


    4.  点击“界面”弹出菜单并选择 `SwiftUI`。确保所有复选框都未选中。然后点击“下一步”按钮。`Xcode` 会显示一个对话框，让你选择将项目存储在哪个驱动器和文件夹中。


    5.  选择一个驱动器和文件夹，然后点击“创建”按钮。`Xcode` 会显示你新创建的项目。


    `Xcode` 窗口最初可能看起来令人困惑，但你需要明白 `Xcode` 将信息分组到几个窗格中。最左边的窗格称为导航窗格。通过点击导航窗格顶部的图标，你可以查看项目的不同部分，如图
    1-6 所示。


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig6_HTML.jpg](img/329781_6_En_1_Fig6_HTML.jpg)


    图 1-6


    导航窗格显示在 `Xcode` 窗口的最左侧


    主要的 SwiftUI 文件名为 `ContentView`，它包含定义应用用户界面的 Swift 代码。


    ```

    import SwiftUI

    struct ContentView: View {

    var body: some View {

    Text("Hello, world!")

    .padding()

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    `import SwiftUI` 这行代码让你的应用能够使用 `SwiftUI` 框架来设计用户界面。


    `ContentView: View` 结构体在屏幕上显示一个单一视图。SwiftUI 一次只能在屏幕上显示一个视图。当你创建一个 SwiftUI iOS
    应用时，默认视图是一个显示“Hello, world!”的 `Text` 视图，位于屏幕中央。


    `ContentView_Previews: PreviewProvider` 结构体实际上是在画布窗格上显示用户界面，该窗格位于 Swift 代码的右侧，如图
    1-7 所示。


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig7_HTML.jpg](img/329781_6_En_1_Fig7_HTML.jpg)


    图 1-7


    编辑器窗格和画布窗格


    当编辑器窗格和画布窗格并排显示时，你对编辑器窗格所做的任何更改都会显示在画布窗格中，反之亦然。如果你点击右上角的编辑器选项图标，可以隐藏或显示画布窗格，如图
    1-8 所示。


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig8_HTML.jpg](img/329781_6_En_1_Fig8_HTML.jpg)


    图 1-8


    编辑器选项图标允许你在显示和隐藏画布窗格之间切换


    画布窗格有两个用途。首先，它让你在创建用户界面时，能精确地看到它在模拟的 iOS 设备上的外观。其次，它让你可以在模拟的 iOS 设备上运行你的应用。


    画布窗格可以模拟单个 iOS 设备，例如 iPod Touch。如果你想更改画布窗格模拟的 iOS 设备，`Xcode` 提供了三种方法，如图 1-9 所示：


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig9_HTML.jpg](img/329781_6_En_1_Fig9_HTML.jpg)


    图 1-9


    显示要模拟的 iOS 设备菜单


    *   点击左上角的弹出菜单以显示 iOS 设备列表。


    *   将光标移动到 `ContentView_Previews: PreviewProvider` 结构体中的 `ContentView()` 内，点击“检查选中的对象”以显示一个菜单，然后点击“设备”弹出菜单以显示
    iOS 设备列表。


    *   将光标移动到 `ContentView_Previews: PreviewProvider` 结构体中的 `ContentView()` 内，然后点击检查器窗格（位于
    `Xcode` 窗口右侧）中的“设备”弹出菜单以显示 iOS 设备列表。


    在为画布窗格选择了不同的 iOS 设备后，你可能需要点击出现在画布窗格右上角的“恢复”按钮。“恢复”按钮可确保画布窗格与你可能所做的任何更改保持同步。

    '
- fmt: '## Manipulating the Xcode Panes


    The four Xcode panes (`Navigator`, `Editor`, `Canvas`, and `Inspector`) serve
    different purposes. The `Navigator` pane displays information about your project
    such as the names of all the files that make up that project. The `Editor` pane
    is where you can write and edit Swift code. The `Canvas` pane is where you can
    see and test the user interface defined by your Swift code. The `Inspector` pane
    displays information about the currently selected object.


    You can resize any of the panes by moving the mouse pointer over the pane border
    and dragging the mouse left or right. If you want, you can toggle between hiding
    and displaying the `Navigator` and the `Inspector` pane. That way, you can see
    more of the `Editor` and `Canvas` panes.


    To hide/display the `Navigator` or `Inspector` pane, you have two options as shown
    in Figure [1-10](#329781_6_En_1_Chapter.xhtml#Fig10):


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig10_HTML.jpg](images/329781_6_En_1_Chapter/329781_6_En_1_Fig10_HTML.jpg)


    **Figure 1-10** — Hiding or showing the `Navigator` and `Inspector` panes


    * Choose `View ➤ Navigators/Inspectors ➤ Hide/Show Navigator/Inspector`.

    * Click the `Show/Hide Navigator/Inspector` pane icons.


    The `Navigator` pane lets you select options to display in the `Editor` pane.
    The `Inspector` pane lets you select user interface items to choose different
    ways to modify them as shown in Figure [1-11](#329781_6_En_1_Chapter.xhtml#Fig11).


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig11_HTML.jpg](images/329781_6_En_1_Chapter/329781_6_En_1_Fig11_HTML.jpg)


    **Figure 1-11** — The `Inspector` pane lists different ways to modify a selected
    item


    To see how the `Inspector` pane works, follow these steps:


    ![../images/329781_6_En_1_Chapter/329781_6_En_1_Fig12_HTML.jpg](images/329781_6_En_1_Chapter/329781_6_En_1_Fig12_HTML.jpg)


    **Figure 1-12** — The `Attributes Inspector` icon lets you view additional ways
    to modify an item in the `Inspector` pane


    1. Click the `ContentView` file in the `Navigator` pane. The `Editor` pane displays
    the contents of the `ContentView` file.

    2. Move the cursor in the `Text("Hello, world!")` line.

    3. Click the `Attributes Inspector` icon in the `Inspector` pane as shown in Figure
    [1-12](#329781_6_En_1_Chapter.xhtml#Fig12). The `Inspector` pane displays additional
    ways to modify the currently selected item.


    As you can see, Xcode’s panes show different information about a project. The
    `Navigator` pane (on the far left) lets you see an overview of your project. Clicking
    specific items in the `Navigator` pane displays that item in the `Editor` pane.
    The `Inspector` pane (on the far right) shows additional information about something
    selected in the `Editor` pane. The `Canvas` pane lets you preview the appearance
    of your user interface.


    If you explore Xcode, you’ll see dozens of features, but it’s not necessary to
    understand everything at once to start using Xcode. Just focus on using only those
    features you need and feel free to ignore the rest until you need them.


    ## Summary


    Creating iOS apps involves more than just writing code. To help your app access
    hardware features of different iOS devices, you can use Apple’s software frameworks
    that provide access to the camera or to Siri’s natural language interface. The
    most important framework that all SwiftUI projects use is the `SwiftUI` framework.
    By combining your code with Apple’s existing software frameworks, you can focus
    on writing code to make your app work and use Apple’s software frameworks to help
    you perform common functions found on most iOS devices.


    Besides writing code, every iOS app also needs a user interface. To create user
    interfaces, use `SwiftUI`. Since `SwiftUI` makes creating user interfaces easier
    without writing a lot of code, `SwiftUI` is fast becoming the preferred way to
    design user interfaces for apps on all of Apple’s platforms (`macOS`, `iOS`, `iPadOS`,
    `watchOS`, and `tvOS`).


    The main tool for creating iOS apps is Apple’s free `Xcode` program, which lets
    you create projects, organize the separate files of a project, and view and edit
    the contents of each file. `Xcode` lets you design, edit, and test your app all
    in a single program. Although `Xcode` offers dozens of features, you only need
    to use a handful of them to start creating iOS apps of your own.


    Learning iOS programming involves learning how to write commands using the `Swift`
    programming language, learning how to find and use Apple’s various software frameworks,
    learning how to design user interfaces in `SwiftUI`, and learning how to use `Xcode`.
    While this might seem like a lot, this book will take you through each step of
    the way so you’ll feel comfortable using `Xcode` and creating your own iOS apps
    in the near future.'
  raw: '## Manipulating the Xcode Panes


