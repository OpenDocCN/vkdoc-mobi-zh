- fmt: "# Adding Line Separators to a List\n\nLists typically display lines in between\
    \ items. Starting with iOS 15, SwiftUI lets you choose to hide or display those\
    \ lines or tint the lines with a specific color.\n\nTo hide or display lines within\
    \ a `List`, use the `.listRowSeparator` modifier with either `.visible` or `.hidden`\
    \ like this:\n\n```\n.listRowSeparator(.hidden)\n```\n\nTo color the lines separating\
    \ items in a `List`, use the `.listRowSeparatorTint` modifier with a color such\
    \ as `.red` or `.blue` like this:\n\n```\n.listRowSeparatorTint(.red)\n```\n\n\
    You can use both modifiers inside of a `List` to modify the `ForEach` loop that\
    \ defines what to display in a `List`. To see how to hide and color line separators\
    \ in a `List`, follow these steps:\n\n1. Create a new SwiftUI iOS App project\
    \ and give it any name you wish such as \"ListLines.\"\n2. Click the `____App`\
    \ file in the Navigator pane where `____` is the name of your project such as\
    \ `ListLinesApp`.\n3. Add the following above the `struct` line like this:\n\n\
    ```\n@available(iOS 15.0, *)\n@main\nstruct DeleteMe3App: App {\n    var body:\
    \ some Scene {\n        WindowGroup {\n            ContentView()\n        }\n\
    \    }\n}\n```\n\n1. Click the `ContentView` file in the Navigator pane.\n2. Add\
    \ the following above the `struct` lines in the two structures in the `ContentView`\
    \ file like this:\n\n```\n@available(iOS 15.0, *)\n```\n\n1. Add an array under\
    \ the `struct ContentView: View` line like this:\n\n```\n@available(iOS 15.0,\
    \ *)\nstruct ContentView: View {\n    var myArray = [\"Cat\", \"Dog\", \"Turtle\"\
    , \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\", \"Canary\", \"Tarantula\"\
    , \"Hamster\"]\n```\n\n1. Add a `State` variable underneath this array like this:\n\
    \n```\n@State var showLines = true\n```\n\n1. Add a `List` under the `var body:\
    \ some View` line like this:\n\n```\nvar body: some View {\n    List {\n    }\n\
    }\n```\n\n1. Add a `ForEach` loop inside the `List` to find all the array items\
    \ starting from 0 up to the total number of items in the array – 1 like this:\n\
    \n```\nvar body: some View {\n    List {\n        ForEach(0...myArray.count -\
    \ 1, id: \\.self) { index in\n            Text(myArray[index])\n        }\n  \
    \  }\n}\n```\n\n1. Add an `.onTapGesture` to the `Text(myArray[index])` view like\
    \ this:\n\n```\nvar body: some View {\n    List {\n        ForEach(0...myArray.count\
    \ - 1, id: \\.self) { index in\n            Text(myArray[index])\n           \
    \     .onTapGesture {\n                    showLines.toggle()\n              \
    \  }\n        }\n    }\n}\n```\n\nThe `.onTapGesture` modifier changes the value\
    \ of the `showLines` `State` variable from `true` to `false` (or `false` to `true`)\
    \ each time the user selects any item in the `List`.\n\n1. Add a `.listRowSeparator`\
    \ modifier to the `ForEach` loop like this:\n\n```\nvar body: some View {\n  \
    \  List {\n        ForEach(0...myArray.count - 1, id: \\.self) { index in\n  \
    \          Text(myArray[index])\n                .onTapGesture {\n           \
    \         showLines.toggle()\n                }\n        }.listRowSeparator(showLines\
    \ ? .visible : .hidden)\n    }\n}\n```\n\nThis `.listRowSeparator` uses the `showLines`\
    \ `State` variable to determine whether to show the lines (`.visible`) or hide\
    \ them (`.hidden`).\n\n1. Add a `.listRowSeparatorTint` modifier to the `ForEach`\
    \ loop like this:\n\n```\nvar body: some View {\n    List {\n        ForEach(0...myArray.count\
    \ - 1, id: \\.self) { index in\n            Text(myArray[index])\n           \
    \     .onTapGesture {\n                    showLines.toggle()\n              \
    \  }\n        }.listRowSeparator(showLines ? .visible : .hidden)\n        .listRowSeparatorTint(.red)\n\
    \    }\n}\n```\n\nYou can choose any color you want such as `.orange` or `.purple`.\
    \ The entire `ContentView` file should look like this:\n\n```\nimport SwiftUI\n\
    \n@available(iOS 15.0, *)\nstruct ContentView: View {\n    var myArray = [\"Cat\"\
    , \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\", \"Canary\"\
    , \"Tarantula\", \"Hamster\"]\n    @State var showLines = true\n\n    var body:\
    \ some View {\n        List {\n            ForEach(0...myArray.count - 1, id:\
    \ \\.self) { index in\n                Text(myArray[index])\n                \
    \    .onTapGesture {\n                        showLines.toggle()\n           \
    \         }\n            }.listRowSeparator(showLines ? .visible : .hidden)\n\
    \            .listRowSeparatorTint(.red)\n        }\n    }\n}\n\n@available(iOS\
    \ 15.0, *)\nstruct ContentView_Previews: PreviewProvider {\n    static var previews:\
    \ some View {\n        ContentView()\n    }\n}\n```\n\n1. Click the Live Preview\
    \ icon in the Canvas pane.\n2. Click any item in the `List`. Notice that each\
    \ time you click, the lines in the `List` toggle between appearing and disappearing.\n\
    \n# Adding Swipe Gestures to a List\n\nMany common apps such as Mail, Messages,\
    \ and Photos display items in a `List`. With these `List`s, users can swipe left\
    \ to right or right to left to display additional options to choose as shown in\
    \ Figure [13-5](#329781_6_En_13_Chapter.xhtml#Fig5).\n\n![../images/329781_6_En_13_Chapter/329781_6_En_13_Fig5_HTML.jpg](images/329781_6_En_13_Chapter/329781_6_En_13_Fig5_HTML.jpg)\n\
    \nFigure 13-5 – Swiping on a `List` can reveal additional options\n\nTwo common\
    \ tasks for `List`s involve deleting and moving items. Deleting items from a `List`\
    \ involves removing the item, typically after the user swipes from right to left.\
    \ Moving items in a list involves sliding a fingertip on an item to place it in\
    \ a new location in the `List`.\n\n## Deleting Items from a List\n\nThe most common\
    \ shortcut in iOS for deleting an item in a `List` involves a right to left swipe\
    \ to reveal a Delete button. As an alternative, the user can continue the right\
    \ to left swipe to delete an item without needing to tap the Delete button at\
    \ all. Since this swipe to delete gesture is often used, SwiftUI makes it easy\
    \ to implement.\n\nThe first step is to add the `.onDelete` modifier to the `ForEach`\
    \ loop within a `List` like this:\n\n```\nList {\n    ForEach(0...myArray.count\
    \ - 1, id: \\.self) { index in\n    }.onDelete(perform: delete)\n}\n```\n\nThis\
    \ calls a `delete` function that uses the array name that contains the items displayed\
    \ in a `List` (called `\"myArray\"` in the following example) and calls the `remove`\
    \ method like this:\n\n```\nfunc delete(at offsets: IndexSet) {\n    myArray.remove(atOffsets:\
    \ offsets)\n}\n```\n\nTo see how to create a swipe to delete gesture in a `List`,\
    \ follow these steps:\n\n1. Create a new SwiftUI iOS App project and give it any\
    \ name you wish such as \"ListDelete.\"\n2. Click the `ContentView` file in the\
    \ Navigator pane.\n3. Add a `State` variable array under the `struct ContentView`\
    \ line like this:\n\n```\nstruct ContentView: View {\n    @State var myArray =\
    \ [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\"\
    , \"Canary\", \"Tarantula\", \"Hamster\"]\n```\n\nThe exact strings you type don't\
    \ matter just as long as you type several strings to fill the array.\n\n1. Add\
    \ a `List` under the `var body: some View` line like this:\n\n```\nvar body: some\
    \ View {\n    List {\n    }\n}\n```\n\n1. Add a `ForEach` loop inside this `List`\
    \ to count from 0 to the total number of items in the array – 1. Then display\
    \ the array item in a `Text` view like this:\n\n```\nvar body: some View {\n \
    \   List {\n        ForEach(0...myArray.count - 1, id: \\.self) { index in\n \
    \           Text(myArray[index])\n        }\n    }\n}\n```\n\n1. Add the `.onDelete`\
    \ modifier to the `ForEach` loop to call a function called `delete` like this:\n\
    \n```\nvar body: some View {\n    List {\n        ForEach(0...myArray.count -\
    \ 1, id: \\.self) { index in\n            Text(myArray[index])\n        }.onDelete(perform:\
    \ delete)\n    }\n}\n```\n\n1. Add the following function above the last curly\
    \ bracket in the `struct ContentView: View` like this:\n\n```\nfunc delete(at\
    \ offsets: IndexSet) {\n    myArray.remove(atOffsets: offsets)\n}\n```\n\nThe\
    \ entire `ContentView` file should look like this:\n\n![../images/329781_6_En_13_Chapter/329781_6_En_13_Fig6_HTML.jpg](images/329781_6_En_13_Chapter/329781_6_En_13_Fig6_HTML.jpg)\n\
    \nFigure 13-6 – The Delete button created by the `.onDelete` modifier\n\n```\n\
    import SwiftUI\n\nstruct ContentView: View {\n    @State var myArray = [\"Cat\"\
    , \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\", \"Canary\"\
    , \"Tarantula\", \"Hamster\"]\n\n    var body: some View {\n        List {\n \
    \           ForEach(0...myArray.count - 1, id: \\.self) { index in\n         \
    \       Text(myArray[index])\n            }.onDelete(perform: delete)\n      \
    \  }\n    }\n\n    func delete(at offsets: IndexSet) {\n        myArray.remove(atOffsets:\
    \ offsets)\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider {\n    static\
    \ var previews: some View {\n        ContentView()\n    }\n}\n```\n\n1. Click\
    \ the Live Preview icon on the Canvas pane.\n2. Swipe right to left on any item\
    \ in the `List`. Notice that the `.onDelete` modifier automatically displays the\
    \ Delete button as shown in Figure [13-6](#329781_6_En_13_Chapter.xhtml#Fig6).\n\
    3. Tap the Delete button. Notice that the row containing that item disappears."
