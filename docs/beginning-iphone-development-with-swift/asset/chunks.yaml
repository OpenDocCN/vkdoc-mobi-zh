    ## Using a Scroll View


    When you arrange multiple views within a VStack, those views remain fixed on the
    user interface. If you display more views than the user interface can show, part
    of those views will be cut off or hidden out of sight. To fix this problem, SwiftUI
    offers a special container called a Scroll View.


    Like a stack, a Scroll View can hold multiple views. Unlike a stack, a Scroll
    View lets users scroll vertically or horizontally to view the entire contents
    of the Scroll View. Scroll Views can work anywhere you might use a stack, including
    within a Disclosure Group.


    The simplest way to create a Scroll View is to define a ScrollView like this:


    ```

    ScrollView {

    //  Multiple views here

    }

    ```


    This lets you scroll vertically with a scroll indicator on the right side. The
    scroll indicator lets you see how close or how far away you may be to the beginning
    or end of the list of items as shown in Figure [15-4](#329781_6_En_15_Chapter.xhtml#Fig4).


