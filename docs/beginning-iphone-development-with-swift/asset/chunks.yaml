    ## Displaying Arrays of Structures in a List


    The previous code uses a ForEach loop to retrieve array items by index values.
    Another way to store data is to use a structure and then create an array of structures.


    The purpose for this is to define the data you want to store along with a unique
    ID that you can use to identify each structure such as


    ```

    struct Animals: Identifiable {

    let pet: String

    let id = UUID()

    }

    ```


    Once you define an Identifiable structure, you can store it in an array like this:


    ```

    var myAnimals = [

    Animals(pet: "Cat"),

    Animals(pet: "Dog"),

    Animals(pet: "Turtle"),

