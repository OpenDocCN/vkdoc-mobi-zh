    The first view inside the VStack is a Toggle, which uses a Text view to display
    the following text to the left of the toggle: “Toggle message on/off.” When the
    Toggle is on, a variable called “message” gets stored a true value. When the Toggle
    is off, the “message” variable gets stored a false value.'
  trans: '

    # 使用 SwiftUI 设计用户界面


    每个应用都需要一个用户界面。SwiftUI 的基本理念是利用被称为“视图”的构建块来创建用户界面。一个视图在用户界面上显示一个单一项目，例如文本、图像或按钮，如图
    2-1 所示。


    ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig1_HTML.jpg](img/329781_6_En_2_Fig1_HTML.jpg)


    图 2-1


    SwiftUI 用户界面的组成部分


    SwiftUI 的一个限制是它一次只能在屏幕上显示一个视图。为了突破这个限制，SwiftUI 提供了所谓的“堆栈”。一个堆栈被视为单个视图，但它允许你组合或堆叠多达十个额外的视图。通过创建堆栈，你可以在屏幕上显示不止一个视图。堆栈甚至可以容纳其他堆栈，这实际上让你可以在单个屏幕上显示任意数量的视图。


    共有三种类型的堆栈，如图 2-2 所示：


    ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig2_HTML.jpg](img/329781_6_En_2_Fig2_HTML.jpg)


    图 2-2


    垂直、水平堆栈和 ZStack


    * `VStack` – 垂直堆栈，将视图排列在另一个视图的上方和下方

    * `HStack` – 水平堆栈，将视图并排排列

    * `ZStack` – 一个将视图直接叠加在一起的堆栈


    一个堆栈算作单个视图。通过使用水平（`HStack`）或垂直（`VStack`）堆栈，你可以在一个堆栈内添加最多十个视图。为了更大的灵活性，你可以在堆栈中嵌入堆栈，以便根据需要显示任意数量的视图。


    > **注意：** 一个堆栈最多只能包含十个视图。如果你试图在堆栈中存储 11 个或更多视图，Xcode 将显示错误信息并拒绝运行你的程序。


    在 SwiftUI 中创建用户界面时，你有三种选择：


    * 在编辑器面板中键入 Swift 代码。

    * 将一个视图（例如按钮）拖放到编辑器面板中的 Swift 代码中。

    * 将一个视图（例如按钮）拖放到画布面板上。


    在编辑器面板中键入 Swift 代码来设计用户界面是最快且最灵活的方法，但这需要时间，并且需要熟悉不同的选项。为了使键入 Swift 代码定义用户界面视图更容易，当
    Xcode 识别出你正在尝试键入的内容时，它会显示一个选项弹出菜单。通过选择一个选项并按回车键，你可以快速创建用户界面视图，如图 2-3 所示。


    ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig3_HTML.jpg](img/329781_6_En_2_Fig3_HTML.jpg)


    图 2-3


    当你键入 Swift 代码来定义用户界面视图时，Xcode 会显示一个选项菜单


    如果你不熟悉设计用户界面的各种选项，使用库窗口会更简单，该窗口列出了所有你可以使用的用户界面视图，如图 2-4 所示。


    ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig4_HTML.jpg](img/329781_6_En_2_Fig4_HTML.jpg)


    图 2-4


    点击库图标会打开库窗口


    打开库窗口后，你可以将用户界面视图从库窗口中拖放到：


    * 编辑器面板中，如图 2-5 所示

    * 画布面板中模拟的 iOS 设备用户界面上，如图 2-6 所示


    ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig5_HTML.jpg](img/329781_6_En_2_Fig5_HTML.jpg)


    图 2-5


    将用户界面视图拖放到编辑器面板中


    ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig6_HTML.jpg](img/329781_6_En_2_Fig6_HTML.jpg)


    图 2-6


    将用户界面视图拖放到画布面板上


    无论你如何更改用户界面，Xcode 都会保持编辑器面板和画布面板之间的所有更改同步。这意味着当你在编辑器面板中键入 Swift 代码时，画布面板会立即显示你的更改。当你将用户界面视图拖放到画布面板上时，Xcode
    会立即在编辑器面板中自动添加相应的 Swift 代码。


    画布面板显示你的用户界面，但如果你想测试你的应用，你有两种选择，如图 2-7 所示：


    ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig7_HTML.jpg](img/329781_6_En_2_Fig7_HTML.jpg)


    图 2-7


    运行按钮和实时预览图标


    * 点击运行按钮或选择“产品”➤“运行”以打开模拟器。

    * 点击画布面板中的实时预览图标。


    要了解 SwiftUI 如何创建能够响应用户的简单用户界面，请按照以下步骤操作：


    1. 创建一个新的 iOS App 项目，确保它使用 SwiftUI，并为其起一个描述性的名称（例如 `SwiftExample`）。


    2. 在导航器面板中点击 `ContentView` 文件。编辑器面板会显示 `ContentView` 文件的内容。


    3. 选择“编辑器”➤“画布”。（如果“画布”选项前已经有一个复选标记，则跳过此步骤。）这将打开画布，以便你可以预览用户界面。


    4. 删除 `Text` 命令中的文本“Hello World”，并键入以下内容，使 `ContentView` 结构如下所示：


    ```

    struct ContentView: View {

    @State private var message = true

    var body: some View {

    VStack {

    Toggle(isOn: $message) {

    Text("切换消息显示/隐藏")

    }

    if message {

    Text ("这是一条秘密消息！")

    }

    }

    }

    }

    ```


    上述 Swift 代码在屏幕上显示了一个切换开关，但除非你在模拟器（模拟 iOS 设备，如 iPhone 或 iPad）中运行你的应用，或者通过实时预览进行测试，否则你无法看到它工作。在大多数情况下，实时预览提供了一种更快的方式来查看和测试你的用户界面。


    ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig8_HTML.jpg](img/329781_6_En_2_Fig8_HTML.jpg)


    图 2-8


    实时预览让你能与用户界面交互


    1. 点击实时预览图标以开启实时预览。当你点击切换开关时，注意消息会如 2-8 所示出现和消失。


    2. 再次点击实时预览按钮以关闭实时预览。


    重复上述步骤，但这次点击运行按钮以打开模拟器。在模拟器或画布面板中测试你的应用是相同的。主要区别在于画布面板通常使用起来快得多。


    记住，你总是可以选择不同的 iOS 设备来测试你的应用。要更改模拟哪个 iOS 设备，请点击运行按钮右侧的菜单，如图 2-9 所示。


    ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig9_HTML.jpg](img/329781_6_En_2_Fig9_HTML.jpg)


    图 2-9


    更改模拟器模拟的 iOS 设备


    更改要模拟的 iOS 设备的另一种方法是将光标移动到 `ContentView_Previews: PreviewProvider` 结构中的 `ContentView()`
    里。然后点击检查器面板中的“设备”弹出菜单，如图 2-10 所示。


    ![../images/329781_6_En_2_Chapter/329781_6_En_2_Fig10_HTML.jpg](img/329781_6_En_2_Fig10_HTML.jpg)


    图 2-10


    更改实时预览模拟的 iOS 设备


    现在让我们回顾一下这个项目，以便你对它的工作方式有一个大致了解。`ContentView` 结构将单个视图定义为 `VStack`。这意味着该 `VStack`
    内部的任何内容都将相互堆叠显示。


    `VStack` 内的第一个视图是一个 `Toggle`，它使用一个 `Text` 视图在切换开关左侧显示以下文本：“切换消息显示/隐藏”。当 `Toggle`
    开启时，一个名为 `message` 的变量会存储为 `true` 值。当 `Toggle` 关闭时，`message` 变量会存储为 `false` 值。

