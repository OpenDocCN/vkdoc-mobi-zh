    VStack {

    Image(systemName: "star.fill")

    .font(.system(size: 200))

    .foregroundColor(.green)

    .scaleEffect(finalValue + tempValue)

    .gesture(

    )

    }

    }

    ```


    这使得 `Image` 视图能够识别手势。现在，我们只需定义要识别的手势即可。


    6. 在 `.gesture ()` 括号内添加 `MagnificationGesture`，并同时定义 `.onChanged` 和 `.onEnded`
    修饰符，如下所示：


    ```

