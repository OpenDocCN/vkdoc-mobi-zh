  trans: '

    ### 在导航视图中传递数据


    上一个项目创建了两个结构体，其中一个存储在 `ContentView` 文件中，另一个存储在单独的文件夹中。在这两种情况下，这些结构体定义的用户界面显示的都是静态信息，与原始结构体
    (`ContentView`) 中的任何内容都没有关联。


    在许多情况下，你可能希望将某个结构体中的数据传递到另一个结构体中。这意味着我们必须将数据从一个结构体传递到另一个。


    幸运的是，这项任务类似于在函数之间传递数据。当一个结构体需要接收数据时，我们只需通过创建一个变量、为该变量起一个描述性名称并定义该变量可以容纳的数据类型（如
    `String` 或 `Double`）来声明一个属性，如下所示：


    ```

    struct FileView: View {

    var choice: String

    ```


    这定义了一个名为 `choice` 的变量，它可以容纳一个 `String` 值。要将数据传递给此结构体，我们可以通过调用结构体名称 (`FileView`)
    并将这个 `choice` 变量作为参数来加载此结构体，如下所示：


    ```

    FileView(choice: "Heads")

    ```


    当将数据传递给存储在同一文件中的结构体时，我们只需遵循以下两步流程：


    -   在结构体内部声明一个或多个变量来接收数据。

    -   使用这些变量作为参数来调用该结构体。


    然而，当将数据传递给存储在单独文件中的结构体时，还需要额外一步。因为存储在单独文件中的结构体也包含另一个在画布面板中显示用户界面的预览结构体，所以这个预览结构体必须包含该结构体的参数，并同样为其传递数据，如下所示：


    ```

    struct SeparateFileView_Previews: PreviewProvider {

    static var previews: some View {

    SeparateFileView(passedData: "")

    }

    }

    ```


    要了解如何在结构体之间传递数据，请遵循以下步骤：


    1.  创建一个新的 SwiftUI iOS 应用项目，并为其任意命名，例如 `NavigationViewPassData`。

    2.  在导航窗格中点击 `ContentView` 文件。

    3.  像这样编辑 `struct ContentView` 结构体：


    ```

    struct ContentView: View {

    var body: some View {

    NavigationView {

    VStack (spacing: 26) {

    Text("Choose Heads or Tails")

    NavigationLink(destination: FileView(choice: "Heads")) {

    Text("Heads")

    }

    NavigationLink(destination: SeparateFileView(passedData: "Tails")) {

    Text("Tails")

    }

    .navigationTitle("Flip a Coin")

    }

    }

    }

    }

    ```


    上述代码定义了两个 `NavigationLink`：其中一个调用名为 `FileView` 的结构体，并传入参数 `choice:`，其值为 `"Heads"`。第二个
    `NavigationLink` 调用名为 `SeparateFileView` 的结构体，并传入参数 `passedData:`，其值为 `"Tails"`。


    4.  在 `struct ContentView` 下方添加一个新的结构体，如下所示：


    ```

    struct FileView: View {

    var choice: String

    var body: some View {

    HStack {

    Spacer()

    VStack {

    Spacer()

    Text("You chose = \(choice)")

    Spacer()

    }

    Spacer()

    }.background(Color.yellow)

    }

    }

    ```


    这个 `FileView` 结构体声明了一个 `choice` 变量，它可以容纳一个 `String` 值。然后，它在一个显示 `"You chose =
    "` 的 `Text` 视图中展示了这个 `choice` 变量。整个 `ContentView` 文件应该如下所示：


    ```

    import SwiftUI

    struct ContentView: View {

    var body: some View {

    NavigationView {

    VStack (spacing: 26) {

    Text("Choose Heads or Tails")

    NavigationLink(destination: FileView(choice: "Heads")) {

    Text("Heads")

    }

    NavigationLink(destination: SeparateFileView(passedData: "Tails")) {

    Text("Tails")

    }

    .navigationTitle("Flip a Coin")

    }

    }

    }

    }

    struct FileView: View {

    var choice: String

    var body: some View {

    HStack {

    Spacer()

    VStack {

    Spacer()

    Text("You chose = \(choice)")

    Spacer()

    }

    Spacer()

    }.background(Color.yellow)

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    这段代码创建了一个名为 `FileView` 的结构体，但现在我们需要创建第二个名为 `SeparateFileView` 的结构体，它声明了一个 `passedData`
    字符串变量。


    5.  选择 **文件 ➤ 新建 ➤ 文件**。出现一个对话框（参见图 16-4）。

    6.  点击对话框顶部附近的 **iOS**，点击 **Swift 文件**，然后点击 **下一步**。Xcode 会要求你为新建的文件命名。

    7.  输入 `SeparateFile` 并点击 **创建**。Xcode 会创建一个新的 Swift 文件。

    8.  删除 `SeparateFile` 文件中当前的所有代码，并用以下代码替换：


    ```

    import SwiftUI

    struct SeparateFileView: View {

    var passedData: String

    var body: some View {

    HStack {

    Spacer()

    VStack {

    Spacer()

    Text("You chose = \(passedData)")

    Spacer()

    }

    Spacer()

    }.background(Color.orange)

    }

    }

    struct SeparateFileView_Previews: PreviewProvider {

    static var previews: some View {

    SeparateFileView(passedData: "")

    }

    }

    ```


    此文件创建了一个 `SeparateFileView` 结构体，它声明了一个 `passedData` 字符串变量。由于这个 `SeparateFileView`
    结构体存储在单独的文件中，它包含一个 `struct PreviewProvider`，我们必须在此处也使用 `passedData` 参数。


    9.  点击导航窗格中的 `ContentView` 以返回 `ContentView` 结构体。

    10. 点击画布面板中的 **实时预览** 图标。

    11. 点击 **Heads** 导航链接。`FileView` 结构体会出现，并显示 `"You chose = Heads"`。

    12. 点击左上角的 **返回** 按钮。

    13. 点击 **Tails** 导航链接。`SeparateFileView` 结构体会出现，并显示 `"You chose = Tails"`。

    '
- fmt: '# Changing Data Between Structures in a Navigation View


    The previous project created two structures where one structure was stored in
    the `ContentView` file and a second structure was stored in a separate file. In
    both cases, the structures defined user interfaces that received data and displayed
    it.


    What if we pass data to a structure and then allow that structure to modify that
    data? This will require several changes:


    - Create a `State` variable.

    - Use the `NavigationLink` to open another structure and pass that structure a
    binding to the `State` variable (using the `$` symbol) such as:

    - Define a `@Binding` variable in the structure that will receive data.

    - Change that `Binding` variable in the structure that received data.


    ```

    FileView(choice: $message)

    ```


    To see how to change data between structures in a Navigation View, follow these
    steps:


    1. Create a new SwiftUI iOS App project and give it any name you wish such as
    “NavigationViewBindingData.”


    2. Click the `ContentView` file in the Navigator pane.


    3. Create a `State` variable under the `struct ContentView: View` line like this:


    ```

    struct ContentView: View {

    @State var message = ""

    ```


    4. Add a `NavigationView` and a `VStack` inside the `var body: some View` line
    like this:


    ```

    var body: some View {

    NavigationView {

    VStack {

    }

    }

    ```


    5. Add a `Text` view and two `NavigationLink`s inside the `VStack` like this:


    ```

    NavigationView {

    VStack (spacing: 26) {

    TextField("Type here", text: $message)

    NavigationLink(destination: FileView(choice: $message)) {

    Text("Send a message")

    }

    NavigationLink(destination: SeparateFileView(passedData: $message)) {

    Text("Separate file")

    }

    .navigationTitle("Passing Data")

    }

    }

    ```


    Notice that the first `NavigationLink` opens a structure called `FileView` and
    sends a binding variable (`$message`) to the `choice:` parameter. The second `NavigationLink`
    opens a structure called `SeparateFileView` and sends the same binding variable
    (`$message`) to the `passedData` parameter.


    6. Add the following structure underneath the `struct ContentView: View` structure:


    ```

    struct FileView: View {

    @Binding var choice: String

    var body: some View {

    HStack {

    Spacer()

    VStack {

    Spacer()

    TextField("Type here:", text: $choice)

    Spacer()

    }

    Spacer()

    }.background(Color.yellow)

    }

    }

    ```


    Notice that this structure declares a `@Binding` variable called `choice` that
    can hold a `String`. This structure uses a `TextField` to change this `@Binding`
    variable (`$choice`), which sends the changes automatically back to the `ContentView`
    structure.


    7. Choose `File ➤ New ➤ File`. A dialog appears (see Figure [16-4](#329781_6_En_16_Chapter.xhtml#Fig4)).


    8. Click `iOS` near the top of the dialog, click `Swift File`, and then click
    `Next`. Xcode asks for a name to give your newly created file.


    9. Type `SeparateFile` and click `Create`. Xcode creates a new Swift file.


    10. Delete all code currently in the `SeparateFile` and replace it with the following:


    ```

    import SwiftUI

    struct SeparateFileView: View {

    @Binding var passedData: String

    var body: some View {

    HStack {

    Spacer()

    VStack {

    Spacer()

    TextField("Type here", text: $passedData)

    Spacer()

    }

    Spacer()

    }.background(Color.orange)

    }

    }

    struct SeparateFileView_Previews: PreviewProvider {

    static var previews: some View {

    SeparateFileView(passedData: .constant(""))

    }

    }

    ```


    Notice that this structure declares a `@Binding` variable called `passedData`
    that can hold a `String`. The `TextField` can change this variable (`$passedData`)
    and automatically send the changes back to the `ContentView` structure.


    Also note that because this structure is stored in a separate file, the `PreviewProvider`
    structure must also include the `passedData` parameter by giving it a `.constant("")`.


    11. Click the `ContentView` file in the Navigator pane.


    12. Click the Live Preview icon on the Canvas pane.


