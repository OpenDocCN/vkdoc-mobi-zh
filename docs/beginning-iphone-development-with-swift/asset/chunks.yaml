    (see Figure [13-9](#329781_6_En_13_Chapter.xhtml#Fig9)).


    3.  Tap the yellow calendar circle icon. The name of the item and its index position
    in the array appears at the top of the screen.


    Note


    If you create a custom right to left swipe gesture, it will override the .onDelete
    gesture.


    ## Summary


    Lists are common ways to display multiple, related items in one place. To help
    organize items in a List, you can group related items together.


    Besides displaying items in a List, you can also detect swipe gestures from left
    to right or right to left. By using the .onDelete modifier, you can allow users
    to delete items from a List. By using a NavigationView and an Edit button, you
    can use the .onMove modifier to allow users to move items within a List.


    You can also define custom swipe gestures to appear on a List. When you create
    custom swipe gestures, you can define an icon and a color to appear for each Button.
    By using swipe gestures with Lists, users can modify List items in different ways.


    # 14. Using Forms and Group Boxes


    When you fill out paper forms, you may notice that the paper forms group related
    items together. For example, the form may ask for your name, address, and phone
    number in one area of the form and ask for your gender, racial background, or
    marital status in another area of a form. Paper forms make it easy to enter related
    data in one area.


    A SwiftUI Form works in a similar way by grouping related views together that
    offers options and settings that the user can select. Forms consist of an optional
    header, optional footer, and content inside defined by views such as Text, Slider,
    or Toggle views as shown in Figure [14-1](#329781_6_En_14_Chapter.xhtml#Fig1).


    ![../images/329781_6_En_14_Chapter/329781_6_En_14_Fig1_HTML.jpg](images/329781_6_En_14_Chapter/329781_6_En_14_Fig1_HTML.jpg)


    Figure 14-1


    The typical parts of a Form


    A Form groups related views together like a stack. The difference is that a Form
    also visually groups views together on the user interface. All views within a
    Form appear together, while any views not in the Form appear separated by a gray
    area as shown in Figure [14-2](#329781_6_En_14_Chapter.xhtml#Fig2).


    ![../images/329781_6_En_14_Chapter/329781_6_En_14_Fig2_HTML.jpg](images/329781_6_En_14_Chapter/329781_6_En_14_Fig2_HTML.jpg)


    Figure 14-2


    Forms group views together on the user interface


    Similar to Forms are Group Boxes, which give you a simpler way to visually group
    related views together on the user interface. When you need to group views together,
    you can choose between a Form and a Group Box.'
