    ## Using the Date Picker


    One common type of data that users need to input is dates and times. However,
    one person might write a date as “June 14, 2023,” and another might write that
    same date as “6/14/23.” When writing a time, one person might type “6:45 pm,”
    and another might type “18:45.”


    To make it easy for users to enter dates and times, SwiftUI offers the Date Picker.
    Instead of typing a date or time, users can simply click the date or time they
    want as shown in Figure [8-6](#329781_6_En_8_Chapter.xhtml#Fig6).


    ![../images/329781_6_En_8_Chapter/329781_6_En_8_Fig6_HTML.jpg](images/329781_6_En_8_Chapter/329781_6_En_8_Fig6_HTML.jpg)


    Figure 8-6


    The Date Picker


    To create a Date Picker, you just need to define descriptive text and a State
    variable to store the user’s selected date and/or time like this:


    ```

    DatePicker(selection: $myDate, label: { Text("Date") })

    ```


    ### Choosing a Date Picker Style


    By default, a Date Picker displays a date and time as a field that the user can
    select. Once selected, the date or time then displays the date or time that the
    user can select. In case you don’t like this default, compact format, you can
    customize the Date Picker’s appearance using the .datePickerStyle() modifier as
    shown in Figure [8-7](#329781_6_En_8_Chapter.xhtml#Fig7):


    ![../images/329781_6_En_8_Chapter/329781_6_En_8_Fig7_HTML.jpg](images/329781_6_En_8_Chapter/329781_6_En_8_Fig7_HTML.jpg)


    Figure 8-7


    Different styles of the Date Picker


    *   .compact – The default way to display a date and time. When the user selects
    a date, a calendar appears like in the .graphical style. When the user selects
    a time, different times appear like in the .wheel style.


    *   .graphical – Displays dates in a calendar but the time as a field. When the
    user selects a time, different times appear like in the .wheel style.


    *   .wheel – Displays dates and times in a wheel.


    The Swift code for creating a Date Picker requires just adding a State variable
    to store a date and then using that State variable. In addition, the Date Picker
    lets you define text to appear when the Date Picker style is .compact:


    ```

    @State var myDate = Date.now

    DatePicker(selection: $myDate, label: { Text("Date") })

    .datePickerStyle(.graphical)

    ```


    ### Displaying a Date and/or Time


    Although the Date Picker can let the user select both a date and a time, you may
    only want the Date Picker to select either a date or a time. To limit the Date
    Picker to displaying just a date or a time, you can add the displayedComponents
    parameter and specify either [.date] or [.hourAndMinute] like this:


    ```

    DatePicker(selection: $myDate, displayedComponents: [.date], label: { Text("Date")
    })

    DatePicker(selection: $myDate, displayedComponents: [.hourAndMinute], label: {
    Text("Time") })

    ```'
