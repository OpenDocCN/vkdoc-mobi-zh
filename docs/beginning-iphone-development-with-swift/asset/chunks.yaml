    `NavigationView` 用于在屏幕右上角显示“编辑”按钮。


    5.  在 `NavigationView` 内部添加一个 `List`，如下所示：


    6.  在该 `List` 内部添加一个 `ForEach` 循环，用于从 0 计数到数组中的项目总数减 1。然后在 `Text` 视图中显示数组项目，如下所示：


    ```

