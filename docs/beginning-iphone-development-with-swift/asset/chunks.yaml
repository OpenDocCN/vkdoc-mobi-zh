    ## Summary


    Animation can make your user interface come to life by providing visual feedback
    to the user or simply offering fun visual images that engages the user. As a general
    rule, use animation sparingly because too many visual changes happening at once
    can be confusing and distracting. The best animation highlights an action but
    doesn’t overwhelm the user in the process.


    Animation involves defining a starting and ending state whether you’re moving,
    resizing, or rotating a view. Then you need some kind of trigger to define a new
    state. Finally, you need to use the .animation modifier. If you’re going to animate
    multiple views using the exact same .animation modifier, you could reduce duplication
    of code by using withAnimation instead.


    To customize animation, you can define delay and duration values to slow down
    the amount of time before the animation begins and how long it takes to complete.
    For greater customization, use the .interpolatingSpring modifier and define mass,
    stiffness, damping, and initialVelocity. By using animation, you can make your
    user interface fun and more interesting to use.'
