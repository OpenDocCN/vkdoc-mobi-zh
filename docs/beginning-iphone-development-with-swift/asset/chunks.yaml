    ### Using an Interpolating Spring in Animation


    To provide even more ways to customize how an animation works, you can also define
    an `.interpolatingSpring` modifier to an animation. An `.interpolatingSpring`
    lets you define one or more of the following:


    - **Mass** – Low values animate slower with less damping; high values animate
    faster with more damping.

    - **Stiffness** – Low values animate slower; high values animate faster.

    - **Damping** – Low values create more "bounce"; high values dampen the "bounce."

    - **InitialVelocity** – Low values animate slowly in the beginning; high values
    animate faster in the beginning.


    To see how stiffness and damping work, follow these steps:


    1. Load the previous "CompareAnimation" Xcode project.

    2. Change all the `Text` views to display the same string such as "spring."

    3. Add an `.interpolatingSpring` modifier to each `Text` view like this:


    ```

    HStack {

    Text("spring")

    .offset(x: 0, y: start ? 450 : 0)

    .animation(.interpolatingSpring(stiffness: 1, damping: 1), value: start)

    Text("spring")

    .offset(x: 0, y: start ? 450 : 0)

    .animation(.interpolatingSpring(stiffness: 1.8, damping: 1), value: start)

    Text("spring")

    .offset(x: 0, y: start ? 450 : 0)

    .animation(.interpolatingSpring(stiffness: 0.5, damping: 1), value: start)

    Text("spring")

    .offset(x: 0, y: start ? 450 : 0)

    .animation(.interpolatingSpring(stiffness: 2, damping: 1), value: start)

    }.position(x: 150, y: 10)

    ```


    Make sure the damping parameter is identical for every `.animation` modifier,
    and make sure the stiffness parameter is different for every `.animation` modifier.
    The entire `ContentView` file should look like this:


    1. Click the Live Preview icon on the Canvas pane.

    2. Click the Button. Notice how the different stiffness values alter the way each
    `Text` view animates.

    3. Edit the `.animation` modifier so the stiffness value is identical but the
    damping value is different.

    4. Click the Button. Notice how the different damping values alter the way each
    `Text` view bounces up and down before coming to a stop.


    ```

    import SwiftUI

    struct ContentView: View {

    @State private var start = false

    var body: some View {

    VStack {

    Button("Start animation") {

    start.toggle()

    }

    HStack {

    Text("spring")

    .offset(x: 0, y: start ? 450 : 0)

    .animation(.interpolatingSpring(stiffness: 1, damping: 1), value: start)

    Text("spring")

    .offset(x: 0, y: start ? 450 : 0)

    .animation(.interpolatingSpring(stiffness: 1.8, damping: 1), value: start)

    Text("spring")

    .offset(x: 0, y: start ? 450 : 0)

    .animation(.interpolatingSpring(stiffness: 0.5, damping: 1), value: start)

    Text("spring")

    .offset(x: 0, y: start ? 450 : 0)

    .animation(.interpolatingSpring(stiffness: 2, damping: 1), value: start)

    }.position(x: 150, y: 10)

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    Besides stiffness and damping, you can also define a mass and an initial velocity.
    By experimenting with different values for all four parameters, you can further
    customize the animation.


    To see how mass and initial velocity affect animations, follow these steps:


    1. Load the previous "CompareAnimation" Xcode project.

    2. Add an `.interpolatingSpring` modifier to each `Text` view like this:


    ```

    HStack {

    Text("spring")

    .offset(x: 0, y: start ? 450 : 0)

    .animation(.interpolatingSpring(mass: 1, stiffness: 1, damping: 1, initialVelocity:
    1), value: start)

    Text("spring")

    .offset(x: 0, y: start ? 450 : 0)

    .animation(.interpolatingSpring(mass: 1.9, stiffness: 1, damping: 1, initialVelocity:
    1), value: start)

    Text("spring")

    .offset(x: 0, y: start ? 450 : 0)

    .animation(.interpolatingSpring(mass: 2.5, stiffness: 1, damping: 1, initialVelocity:
    1), value: start)

    Text("spring")

    .offset(x: 0, y: start ? 450 : 0)

    .animation(.interpolatingSpring(mass: 3.5, stiffness: 1, damping: 1, initialVelocity:
    1), value: start)

    }.position(x: 150, y: 10)

    ```'
