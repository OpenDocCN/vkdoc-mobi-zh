- fmt: "# Sharing Data Between Structures in a Tab View\n\nUsing `@State` and `@Binding`\
    \ variables lets multiple views share and modify data. However, it's far better\
    \ to pass data straight to the structures that need the data. To do this, SwiftUI\
    \ offers another way to share data between structures. First, create an `ObservableObject`\
    \ class that contains one or more variables to share. Each variable must be marked\
    \ as `@Published` like this:\n\n```\nclass ShareString: ObservableObject {\n \
    \   @Published var message = \"\"\n}\n```\n\nThe structure that contains the `TabView`\
    \ (such as `ContentView`) needs to define a `@StateObject` variable that defines\
    \ an object from the `ObservableObject` class like this:\n\n```\n@StateObject\
    \ var showMe = ShareString()\n```\n\nSince we want to share this `ObservableObject`\
    \ between all views within the Tab View, we need to add the `.environmentObject`\
    \ modifier to the `TabView` along with the StateObject to share like this:\n\n\
    ```\nTabView {\n}.environmentObject(showMe)\n```\n\nWithin each structure that\
    \ needs to access the `ObservableObject`, we need to declare an `@EnvironmentObject`\
    \ variable that uses the `ObservableObject` class like this:\n\n```\n@EnvironmentObject\
    \ var choice: ShareString\n```\n\nFinally, within each structure that defines\
    \ an `@EnvironmentObject`, we can access the actual data to share by using the\
    \ `@EnvironmentObject` name plus the `@Published` property name to share like\
    \ this:\n\n```\n$choice.message\n```\n\nIn this case, `choice` is the `@EnvironmentObject`\
    \ name and `message` is the `@Published` property defined within the `ObservableObject`.\
    \ To see how to share data using an `ObservableObject`, follow these steps:\n\n\
    1.  Create a new SwiftUI iOS App project and give it any name you wish such as\
    \ `TabViewObservable`.\n\n2.  Click the `ContentView` file in the Navigator pane.\n\
    \n3.  Create an `ObservableObject` class under the `import SwiftUI` line like\
    \ this:\n\n```\nclass ShareString: ObservableObject {\n    @Published var message\
    \ = \"\"\n}\n```\n\nThe `@Published` variable will contain the data to share between\
    \ structures within the Tab View.\n\n4.  Create a `StateObject` variable under\
    \ the `struct ContentView: View` line like this:\n\n```\nstruct ContentView: View\
    \ {\n    @StateObject var showMe = ShareString()\n```\n\nThis creates a new object\
    \ (`showMe`) based on the `ShareString` `ObservableObject`.\n\n5.  Add a `TabView`\
    \ inside the `var body: some View` line like this:\n\n```\nvar body: some View\
    \ {\n    TabView {\n        TextField(\"Type here\", text: $showMe.message)\n\
    \            .tabItem {\n                Image(systemName: \"house.fill\")\n \
    \               Text(\"Home\")\n            }\n        FileView()\n          \
    \  .tabItem {\n                Image(systemName: \"heart.fill\")\n           \
    \     Text(\"First\")\n            }\n        SeparateFileView()\n           \
    \ .tabItem {\n                Image(systemName: \"hare.fill\")\n             \
    \   Text(\"Second\")\n            }\n    }.environmentObject(showMe)\n}\n```\n\
    \nMake sure you add the `.environmentObject(showMe)` modifier at the end of the\
    \ `TabView`. This allows sharing of the `showMe` `ObservableObject` `ShareString`\
    \ class. The preceding `TabView` opens a structure called `FileView` and `SeparateFileView`\
    \ that we need to create.\n\n6.  Add the following structure underneath the `struct\
    \ ContentView` structure like this:\n\n```\nstruct FileView: View {\n    @EnvironmentObject\
    \ var choice: ShareString\n    var body: some View {\n        HStack {\n     \
    \       Spacer()\n            VStack {\n                Spacer()\n           \
    \     TextField(\"Type here:\", text: $choice.message)\n                Spacer()\n\
    \            }\n            Spacer()\n        }.background(Color.yellow)\n   \
    \ }\n}\n```\n\nNotice that this structure defines an `@EnvironmentObject` variable\
    \ that can hold a `ShareString` `ObservableObject`. In the `TextField`, we must\
    \ store the text in the `choice` `@EnvironmentObject` that uses the `message`\
    \ `@Published` property (`$choice.message`). The entire `ContentView` file should\
    \ look like this:\n\n7.  Choose **File** ➤ **New** ➤ **File**. A dialog appears.\n\
    \n8.  Click **iOS** near the top of the dialog, click **Swift File**, and then\
    \ click **Next**. Xcode asks for a name to give your newly created file.\n\n9.\
    \  Type `SeparateFile` and click **Create**. Xcode creates a new Swift file.\n\
    \n10. Delete all code currently in the `SeparateFile` and replace it with the\
    \ following:\n\n```\nimport SwiftUI\n\nclass ShareString: ObservableObject {\n\
    \    @Published var message = \"\"\n}\n\nstruct ContentView: View {\n    @StateObject\
    \ var showMe = ShareString()\n    var body: some View {\n        TabView {\n \
    \           TextField(\"Type here\", text: $showMe.message)\n                .tabItem\
    \ {\n                    Image(systemName: \"house.fill\")\n                 \
    \   Text(\"Home\")\n                }\n            FileView()\n              \
    \  .tabItem {\n                    Image(systemName: \"heart.fill\")\n       \
    \             Text(\"First\")\n                }\n            SeparateFileView()\n\
    \                .tabItem {\n                    Image(systemName: \"hare.fill\"\
    )\n                    Text(\"Second\")\n                }\n        }.environmentObject(showMe)\n\
    \    }\n}\n\nstruct FileView: View {\n    @EnvironmentObject var choice: ShareString\n\
    \    var body: some View {\n        HStack {\n            Spacer()\n         \
    \   VStack {\n                Spacer()\n                TextField(\"Type here:\"\
    , text: $choice.message)\n                Spacer()\n            }\n          \
    \  Spacer()\n        }.background(Color.yellow)\n    }\n}\n\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```\n\n```\nimport SwiftUI\n\nstruct SeparateFileView: View {\n   \
    \ @EnvironmentObject var passedData: ShareString\n    var body: some View {\n\
    \        HStack {\n            Spacer()\n            VStack {\n              \
    \  Spacer()\n                TextField(\"Type here\", text: $passedData.message)\n\
    \                Spacer()\n            }\n            Spacer()\n        }.background(Color.orange)\n\
    \    }\n}\n\nstruct SeparateFileView_Previews: PreviewProvider {\n    static var\
    \ previews: some View {\n        SeparateFileView()\n    }\n}\n```\n\nNotice that\
    \ this structure also declares an `@EnvironmentObject` that can hold a `ShareString`\
    \ `ObservableObject`. Then the `TextField` uses the `passedData` `@EnvironmentObject`\
    \ to access the `message` `@Published` property (`$passedData.message`).\n\n11.\
    \ Click the `ContentView` file in the Navigator pane.\n\n12. Click the **Live\
    \ Preview** icon in the Canvas pane.\n\n13. Click in the `TextField` and type\
    \ a phrase.\n\n14. Click the **First** tab. Notice that what you typed in step\
    \ 13 now appears in the `FileView` `TextField`.\n\n15. Edit the text in the `TextField`\
    \ and then click the **Home** tab. Notice that the modified text now appears in\
    \ the `ContentView` `TextField`.\n\n16. Edit the text in the `TextField` and then\
    \ click the **Second** tab. The edited text now appears in the `SeparateFileView`\
    \ `TextField`.\n\n17. Edit the text in the `TextField` and click the **Home**\
    \ tab. Notice that the modified text now appears in the `ContentView` `TextField`.\
    \ All this shows how the various structures can access the `@Published` property\
    \ in the `ObservableObject`.\n\n## Summary\n\nA Tab View offers another way to\
    \ display multiple views where each view can be represented by a tab at the bottom\
    \ of the screen. Tab Views can open views as simple as `Text` or `Image` views,\
    \ but more often use views defined by structures. These structures can be stored\
    \ in the same file or in a separate file.\n\nA Tab View can pass data to another\
    \ view, much like passing data to a function. This other view needs to define\
    \ a property, and then the Tab View can pass data to that property. If you want\
    \ to pass data to another view that can modify the data, you can use two different\
    \ methods.\n\nThe first method uses `@State` and `@Binding` variables and forces\
    \ the Tab View to pass data to each view that it opens. The second method uses\
    \ `ObservableObjects`, `StateObjects`, and `EnvironmentObjects` to share data\
    \ among multiple views.\n\nTab Views can display a maximum of five tabs at the\
    \ bottom of the screen. If you define more than five tabs, SwiftUI automatically\
    \ creates a **More** tab and displays all additional tabs in a navigation view.\n\
    \nSince Tab Views can only display five tabs at the bottom of the screen, you\
    \ can turn a Tab View into a Page View. That way, you can display more than five\
    \ icons at the bottom of the screen. Unlike a Tab View, a Page View forces users\
    \ to navigate between screens sequentially. Tab Views are convenient any time\
    \ users need to jump to a different screen on your app's user interface."
