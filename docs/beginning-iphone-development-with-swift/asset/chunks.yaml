    \ `Text` 视图来显示其标题的 `Button`：\n\n```\n    Button {\n    colorMe.toggle()\n    }\
    \ label: {\n    Text(\"自定义文本按钮\")\n    .font(.largeTitle)\n    .foregroundColor(.green)\n\
    \    .padding()\n    .border(Color.red, width: 6)\n    }\n    ```\n\n这定义了一个 `Button`，它也使用\
    \ `.toggle()` 命令来更改 `colorMe` 变量的布尔值。然而，它使用 `Text` 视图来显示 `Button` 的标题。`.font`\
    \ 修饰符更改 `Text` 视图的大小，`.foregroundColor` 修饰符使文本显示为绿色，`.padding` 修饰符在 `Text` 视图周围添加空间，而\
    \ `.border` 修饰符在 `Text` 视图周围显示宽度为 6 的红色边框。\n\n8.  在 `VStack` 中的前一个 `Button` 下方输入以下内容，以使用\
    \ `Label` 视图来定义 `Button` 的标题：\n\n```\n    Button {\n    colorMe.toggle()\n   \
    \ } label: {\n    Label(\"图片按钮\", systemImage: \"hare.fill\")\n    .font(.largeTitle)\n\
    \    .foregroundColor(.purple)\n    .padding()\n    .border(Color.blue, width:\
    \ 6)\n    }\n    ```\n\n这定义了一个 `Button`，它使用 `.toggle()` 命令来更改 `colorMe` 变量的布尔值。然而，它使用\
    \ `Label` 视图来显示文本（“图片按钮”）以及一个名为“hare.fill”的图标。然后它使用 `.font` 修饰符来放大文本和图标，并使用 `.foregroundColor`\
    \ 修饰符将文本和图标显示为紫色。最后，它使用 `.padding` 修饰符在 `Label` 视图周围添加空间，并在 `Label` 视图周围放置宽度为\
    \ 6 的蓝色边框。\n\n9.  在 `VStack` 中的前一个 `Button` 下方输入以下内容，以使用 `Image` 视图来定义 `Button`\
    \ 的标题：\n\n```\n    Button {\n    colorMe.toggle()\n    } label: {\n    Image(\"\
    browncat\")\n    .resizable()\n    .frame(width: 150, height: 150)\n    .clipShape(Circle())\n\
    \    .overlay(Circle().stroke(Color.yellow, lineWidth: 4))\n    }\n    ```\n\n\
    这定义了一个 `Button`，它使用 `.toggle()` 命令来更改 `colorMe` 变量的布尔值。`Image` 视图没有为 `Button`\
    \ 的标题显示文本，而是使用存储在 Xcode 项目 Assets 文件夹中的图像（称为“browncat”）。然后它使用 `.resizable` 和 `.frame`\
    \ 修饰符将图像大小调整为宽度 150、高度 150 的方框。最后，它使用 `.clipShape` 修饰符将图像裁剪为圆形，并使用 `.overlay`\
    \ 修饰符在图像周围放置一个线宽为 4 的黄色圆形边框。\n\n整个 SwiftUI 代码应如下所示：\n\n```\n    import SwiftUI\n\
    \    struct ContentView: View {\n    @State var colorMe = false\n    var body:\
    \ some View {\n    VStack (spacing: 28) {\n    Rectangle()\n    .fill(colorMe\
    \ ? Color.green : Color.gray)\n    .frame(width: 250, height: 100)\n    Button(\"\
    纯文本按钮\") {\n    colorMe.toggle()\n    }\n    Button {\n    colorMe.toggle()\n\
    \    } label: {\n    Text(\"自定义文本按钮\")\n    .font(.largeTitle)\n    .foregroundColor(.green)\n\
    \    .padding()\n    .border(Color.red, width: 6)\n    }\n    Button {\n    colorMe.toggle()\n\
    \    } label: {\n    Label(\"图片按钮\", systemImage: \"hare.fill\")\n    .font(.largeTitle)\n\
    \    .foregroundColor(.purple)\n    .padding()\n    .border(Color.blue, width:\
    \ 6)\n    }\n    Button {\n    colorMe.toggle()\n    } label: {\n    Image(\"\
    browncat\")\n    .resizable()\n    .frame(width: 150, height: 150)\n    .clipShape(Circle())\n\
    \    .overlay(Circle().stroke(Color.yellow, lineWidth: 4))\n    }\n    }\n   \
    \ }\n    }\n    struct ContentView_Previews: PreviewProvider {\n    static var\
    \ previews: some View {\n    ContentView()\n    }\n    }\n    ```\n\n10. 单击画布窗格中的“实时预览”图标。\n\
    \n11. 单击任意按钮。请注意，每次单击按钮时，它都会切换 `colorMe` 布尔变量，从而在矩形中交替显示绿色或灰色。\n\n## 使用分段控件\n\n\
    `Button` 代表单个命令，因此如果要向用户提供多个命令之间的选择，则需要使用多个 `Button`。不幸的是，多个 `Button` 可能会挤占用户界面空间，使用起来很不方便。为了解决这个问题，SwiftUI\
    \ 提供了分段控件。\n\n分段控件的主要思想是在紧凑的空间中显示两个或更多选项，而不是使用多个 `Button`。要创建分段控件，您需要以下内容：\n\n\
    *   一个 `@State` 变量，用于表示用户选择的段（选项）\n*   一个列出两个或更多选项的 `Picker` 视图\n*   链接到每个选项的\
    \ `.tag` 属性\n*   `SegmentedPickerStyle` 修饰符\n\n要了解如何使用分段控件，请按照以下步骤操作：\n\n![../images/329781_6_En_6_Chapter/329781_6_En_6_Fig2_HTML.jpg](img/329781_6_En_6_Fig2_HTML.jpg)\n\
    \n**图 6-2** 分段控件的完整用户界面\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其指定任意名称，例如“SegmentedControl”。\n\
    \n2.  在导航器窗格中单击 `ContentView` 文件。\n\n3.  在 `struct ContentView: View` 行下方添加一个\
    \ `@State` 变量，如下所示：\n\n```\n    struct ContentView: View {\n    @State private\
    \ var selectedColor = Color.gray\n    var body: some View {\n    ```\n\n这将创建一个名为\
    \ `selectedColor` 的 `@State` 变量。请注意，“private”关键字是可选的，仅表示此变量只能在此 `ContentView`\
    \ 结构中使用。注意，此 `selectedColor` 变量的初始值是 `Color.gray`，这意味着其推断数据类型为 `Color`。\n\n4.\
    \  在 `var body: some View` 内部创建一个间距值为 28 的 `VStack`，如下所示：\n\n```\n    struct ContentView:\
    \ View {\n    @State private var selectedColor = Color.gray\n    var body: some\
    \ View {\n    VStack (spacing: 28) {\n    }\n    }\n    }\n    ```\n\n间距值可以是您想要的任何数字，但它会在您添加到\
    \ `VStack` 内部的任何视图之间添加间距，这样它们在用户界面上就不会显得拥挤。\n\n5.  输入以下内容在 `VStack` 内部创建一个彩色矩形：\n\
    \n```\n    Rectangle()\n    .fill(selectedColor)\n```\n\n这将创建一个矩形，其颜色由 `selectedColor`\
    \ `@State` 变量定义。最初，此矩形填充为 `Color.gray`。\n\n6.  输入以下内容在 `VStack` 内部创建一个分段控件：\n\n\
    ```\n    Picker(\"最喜欢的颜色\", selection: $selectedColor, content: {\n    Text(\"\
    红色\").tag(Color.red)\n    Text(\"绿色\").tag(Color.green)\n    Text(\"蓝色\").tag(Color.blue)\n\
    \    }).pickerStyle(SegmentedPickerStyle())\n    ```\n\n这将创建一个 `Picker` 视图，该视图在分段控件上列出三个选项（“红色”、“绿色”和“蓝色”）。每个选项后面都有一个链接到该选项的\
    \ `.tag`。虽然用户看到的是由三个 `Text` 视图（“红色”、“绿色”和“蓝色”）显示的选项，但 `selectedColor` `@State`\
    \ 变量实际存储的是 `.tag` 值，即颜色类型（`.red`、`.green` 和 `.blue`）。`.pickerStyle` 修饰符通过定义 `SegmentedPickerStyle()`\
    \ 将 `Picker` 视图显示为分段控件。\n\n整个 SwiftUI 代码应如下所示：\n\n```\n    import SwiftUI\n  \
    \  struct ContentView: View {\n    @State private var selectedColor = Color.gray\n\
    \    var body: some View {\n    VStack (spacing: 28) {\n    Rectangle()\n    .fill(selectedColor)\n\
    \    Picker(\"最喜欢的颜色\", selection: $selectedColor, content: {\n    Text(\"红色\"\
    ).tag(Color.red)\n    Text(\"绿色\").tag(Color.green)\n    Text(\"蓝色\").tag(Color.blue)\n\
    \    }).pickerStyle(SegmentedPickerStyle())\n    }\n    }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n\
    \    }\n    }\n    ```\n\n7.  单击画布窗格中的“实时预览”图标。\n"
- fmt: "8.  Click the “Red,” “Green,” and “Blue” options on the segmented control.\
    \ Each time you choose a different option from the segmented control, the `selectedColor`\
    \ State variable changes. Then this State variable automatically changes the color\
    \ of the rectangle as shown in Figure [6-2](#329781_6_En_6_Chapter.xhtml#Fig2).\n\
    \n**Note**\n\nIf you omit the `.pickerStyle(SegmentedPickerStyle())` modifier,\
    \ the `Picker` view will display the three options (“Red,” “Green,” and “Blue”)\
    \ vertically in a wheel as shown in Figure [6-3](#329781_6_En_6_Chapter.xhtml#Fig3).\n\
    \n![../images/329781_6_En_6_Chapter/329781_6_En_6_Fig3_HTML.jpg](images/329781_6_En_6_Chapter/329781_6_En_6_Fig3_HTML.jpg)\n\
    \n*Figure 6-3* The `Picker` view appearance without the `.pickerStyle(SegmentedPickerStyle())`\
    \ modifier\n\n### Running Code from a Segmented Control\n\nBy just selecting options\
    \ on a segmented control, the segmented control can only change a State variable.\
    \ If you want to run code based on which option the user selected in a segmented\
    \ control, you need to add an `.onChange` modifier as follows:\n\n```\n.onChange(of:\
    \ stateVariable) { newValue in\n// code to run\n}\n```\n\nEach time the user selects\
    \ a different option in a segmented control, it changes a State variable. The\
    \ `.onChange` modifier runs code each time this State variable changes. The `newValue`\
    \ variable contains this latest change and can then run code. To see how this\
    \ works, follow these steps:\n\n![../images/329781_6_En_6_Chapter/329781_6_En_6_Fig4_HTML.jpg](images/329781_6_En_6_Chapter/329781_6_En_6_Fig4_HTML.jpg)\n\
    \n*Figure 6-4* The `.onChange` modifier can display different text in the `Text`\
    \ view\n\n1.  Create a new SwiftUI iOS App project and give it any name you wish\
    \ such as “SegmentedControl Code.”\n2.  Click the `ContentView` file in the Navigator\
    \ pane.\n3.  Add a State variable underneath the `struct ContentView: View` line\
    \ like this:\n\n```\n    struct ContentView: View {\n    @State private var message\
    \ = \"\"\n    var body: some View {\n    ```\n\nThis creates a State variable\
    \ called `message`. Notice that the `private` keyword is optional, which simply\
    \ means this variable can only be used within this `ContentView` structure. Its\
    \ initial value is an empty string so its data type is inferred to be a `String`.\n\
    \n4.  Create a `VStack` with a spacing value of 28 inside the `var body: some\
    \ View` like this:\n\n```\n    struct ContentView: View {\n    @State private\
    \ var message = \"\"\n    var body: some View {\n    VStack (spacing: 28) {\n\
    \    }\n    }\n    }\n    ```\n\nThe spacing value can be any number you wish,\
    \ but it adds spacing between any views you add inside the `VStack` so they don’t\
    \ appear crowded together on the user interface.\n\n5.  Type the following to\
    \ create a `Text` view inside the `VStack`:\n\n```\n    Text(message)\n    ```\n\
    \nThis creates a `Text` view that displays the contents of the `message` State\
    \ variable.\n\n6.  Type the following to create a segmented control inside the\
    \ `VStack`:\n\n```\n    Picker(\"\", selection: $message, content: {\n    Text(\"\
    Happy\").tag(\"happy\")\n    Text(\"Sad\").tag(\"sad\")\n    Text(\"Bored\").tag(\"\
    bored\")\n    }).pickerStyle(SegmentedPickerStyle())\n    ```\n\nThis creates\
    \ a `Picker` view that lists three options (“Happy,” “Sad,” and “Bored”) displayed\
    \ on the segmented control. After each option is a `.tag` that’s linked to each\
    \ option. While the user sees the options displayed by the three `Text` views\
    \ (“Happy,” “Sad,” and “Bored”), the `message` State variable is actually storing\
    \ the `.tag` values, which are strings (`“happy”`, `“sad”`, `“bored”`). The `.pickerStyle`\
    \ modifier displays the `Picker` view as a segmented control by defining `SegmentedPickerStyle()`.\n\
    \n7.  Type the following after the `.pickerStyle` modifier:\n\n```\n    .onChange(of:\
    \ message) { newValue in\n    switch newValue {\n    case \"happy\": message =\
    \ \"Be happy and joyous\"\n    case \"sad\": message = \"Life can be a struggle\
    \ at times\"\n    case \"bored\": message = \"Look for your purpose\"\n    default:\n\
    \    break\n    }\n    }\n    ```\n\nThe `.onChange` modifier runs code as soon\
    \ as it detects a change in the `message` State variable, which occurs when the\
    \ user selects a different option on the segmented control. When the user selected\
    \ a different option, the `newValue` variable stores that selected option (such\
    \ as `.tag(\"happy\")`).\n\nBased on the value of `newValue`, a `switch` statement\
    \ determines which text to store in the `message` State variable. As soon as the\
    \ `message` State variable gets a new value, it gets displayed in the `Text` view.\n\
    \nThe entire SwiftUI code should look like this:\n\n```\n    import SwiftUI\n\
    \    struct ContentView: View {\n    @State private var message = \"\"\n    var\
    \ body: some View {\n    VStack (spacing: 28) {\n    Text(message)\n    Picker(\"\
    \", selection: $message, content: {\n    Text(\"Happy\").tag(\"happy\")\n    Text(\"\
    Sad\").tag(\"sad\")\n    Text(\"Bored\").tag(\"bored\")\n    }).pickerStyle(SegmentedPickerStyle())\n\
    \    .onChange(of: message) { newValue in\n    switch newValue {\n    case \"\
    happy\": message = \"Be happy and joyous\"\n    case \"sad\": message = \"Life\
    \ can be a struggle at times\"\n    case \"bored\": message = \"Look for your\
    \ purpose\"\n    default:\n    break\n    }\n    }\n    }\n    }\n    }\n    struct\
    \ ContentView_Previews: PreviewProvider {\n    static var previews: some View\
    \ {\n    ContentView()\n    }\n    }\n    ```\n\n8.  Click the Live Preview icon\
    \ in the Canvas pane.\n9.  Click the “Happy,” “Sad,” and “Bored” options on the\
    \ segmented control. Each time you choose a different option from the segmented\
    \ control, the `message` State variable changes. Then the `.onChange` modifier\
    \ runs code to change the `message` State variable. This new text then appears\
    \ in the `Text` view as shown in Figure [6-4](#329781_6_En_6_Chapter.xhtml#Fig4).\n\
    \nBy using the `.onChange` modifier with a segmented control, you can run any\
    \ Swift code you want when the user chooses a different option on the segmented\
    \ control.\n\n## Summary\n\nButtons represent the simplest way to let the user\
    \ give commands to a program. At the simplest level, a `Button` consists of text\
    \ and a list of code to run each time the user selects that `Button`. To customize\
    \ a `Button`, you can use a `Text` view or `Label` view with modifiers or an `Image`\
    \ view that can display images such as icons or digital photographs.\n\nA segmented\
    \ control acts like two or more `Buttons` crammed together in a single control.\
    \ By using a segmented control, you can display multiple options to the user in\
    \ a much smaller space than by using multiple `Buttons`.\n\nWhen working with\
    \ `Buttons` and segmented controls, you’ll often have to create a State variable.\
    \ When any part of your program changes the value of a State variable, that updated\
    \ data automatically appears throughout your entire program.\n\nWhile `Buttons`\
    \ can run one or more lines of Swift code each time the user selects that `Button`,\
    \ segmented controls can only run code when combined with the `.onChange` modifier.\
    \ Both `Buttons` and segmented controls let you display different options for\
    \ the user to select on a user interface.\n\n# 7. Retrieving Text from Text Fields\
    \ and Text Editors\n\nUser interfaces often need to retrieve text from the user.\
    \ Sometimes, this text can be a single word or short phrase, but other times this\
    \ text might consist of several paragraphs. To retrieve text from the user, SwiftUI\
    \ offers three types of views:\n\n*   Text Field\n*   Secure Field\n*   Text Editor\n\
    \nA Text Field lets the user type in a single line of text such as a name or an\
    \ address. Optionally, Text Fields can display placeholder text that appears in\
    \ light gray and is used to explain what type of information the Text Field expects.\n\
    \nA Secure Field works exactly like a Text Field except that it masks any text\
    \ the user types in. That can be useful when asking the user to type in sensitive\
    \ information such as credit card numbers.\n\nA Text Editor appears as a large\
    \ box where the user can type and edit several lines of text such as multiple\
    \ paragraphs.\n\nSince Text Fields, Secure Fields, and Text Editors need to store\
    \ data, they need to work with a State variable that can hold a String data type\
    \ such as:\n\n```\n@State private var message = \"\"\n```"
