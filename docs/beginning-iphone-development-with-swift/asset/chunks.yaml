    ## Summary


    Alerts display information in the middle of the screen (.alert), while Action
    Sheets display information at the bottom of the screen (.actionSheet). An Alert
    and an Action Sheet can display a title and a message along with at least one
    Button to dismiss the Alert/Action Sheet. However, an Alert can display up to
    two Buttons, while an Action Sheet can display up to three Buttons.


    Buttons on an Alert/Action Sheet just dismiss the Alert/Action Sheet, but you
    can attach code to run when the user selects a Button. One way is to write the
    code directly in the .alert/.actionSheet modifier, but a better solution is to
    call a function and separate code in that function away from the .alert/.actionSheet
    modifier.


    Use Alerts when you need to display important information to the user and get
    immediate feedback, such as verifying if the user wants to delete data. Use Action
    Sheets when you need to display information at the bottom of the screen. Use Contextual
    Menus when you want to hide multiple options off the user interface but make them
    available when the user wants to see them.


    # 13. Displaying Lists


    One common way to display lots of related data to the user is through a List (also
    called a table view). A List simply shows multiple rows of similar types of data
    stacked vertically. The simplest type of a List defines one or more Text views
    that appear in separate rows as shown in Figure [13-1](#329781_6_En_13_Chapter.xhtml#Fig1):


    ![../images/329781_6_En_13_Chapter/329781_6_En_13_Fig1_HTML.jpg](images/329781_6_En_13_Chapter/329781_6_En_13_Fig1_HTML.jpg)


    Figure 13-1


    A simple List containing multiple Text views


    ```

    List {

    Text("Cat")

    Text("Dog")

    Text("Bird")

    Text("Reptile")

    Text("Fish")

    }

    ```


    If a List contains more items than can appear on the screen at one time, the List
    will let users swipe up or down to view all the data. Best of all, this scrolling
    feature doesn’t require any additional coding. To see how to swipe up and down
    to view all items in a List, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “SimpleList.”


    2.  Click the ContentView file in the Navigator pane.


    3.  Add a List inside the var body: some View like this:


    ```

    var body: some View {

    List {

    ForEach(1...25, id: \.self) { index in

    Text("Animal #\(index)")

    }

    }

    ```


    This code uses a ForEach loop to create 25 separate items. The index variable
    increments each time the ForEach loop runs, so the value of index will start at
    1 and end at 25\. The entire ContentView file should look like this:


    ![../images/329781_6_En_13_Chapter/329781_6_En_13_Fig2_HTML.jpg](images/329781_6_En_13_Chapter/329781_6_En_13_Fig2_HTML.jpg)


    Figure 13-2


    The appearance of the List defined by a ForEach loop


    1.  Click the Live Preview icon on the Canvas pane. Notice that even though the
    List contains 25 items, not all items are visible on the screen at once as shown
    in Figure [13-2](#329781_6_En_13_Chapter.xhtml#Fig2).


