    2.  Click the Toggle. Notice that each time you click the Toggle, the color of
    the rectangle alternates between orange and green, and the text on the Toggle
    alternates between “Orange” and “Green” as well.


    ```

    import SwiftUI

    struct ContentView: View {

    @State var myToggle = true

    var body: some View {

    VStack {

    Rectangle()

    .frame(width: 200, height: 150)

    .foregroundColor(myToggle ? .orange : .green)

    Toggle(myToggle ? "Orange" : "Green", isOn: $myToggle)

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    ## Using the Stepper


    When you want the user to input numeric data, you may want to restrict the range
    of acceptable data. After all, if you ask for the user’s age, you don’t want –23
    or 938478 since both are clearly impossible for someone’s age. To make it easy
    for the user to input numeric data within an acceptable range, you can use a Stepper.


    Steppers store a value that users can increment by a fixed increment such as 1
    or 2.5\. You can define a minimum and maximum value that the stepper can represent
    such as a range between 1 and 10\. Furthermore, you can define whether the stepper
    wraps or not. Wrapping means if you keep incrementing the stepper beyond its maximum
    value, it goes back to its minimum value. Likewise, if you keep decrementing the
    stepper below its minimum value, it jumps to its maximum value. This can make
    it easy for users to choose different values without having to exhaustively step
    from one extreme value to the other.


    To see how a stepper works, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “Stepper.”


    2.  Click the ContentView file in the Navigator pane.


    3.  Add the following State variable under the struct ContentView: View line:


    1.  Create a VStack inside the var body: some View and add a Stepper like this:


    ```

    struct ContentView: View {

    @State var newValue = 0

    ```


    ```

    var body: some View {

    VStack {

    Stepper(value: $newValue) {

    Text("Stepper value = \(newValue)")

    }.padding()

    }

    }

    ```


    This defines a simple Stepper that can represent any value and increases or decreases
    its value by 1 as shown in Figure [9-3](#329781_6_En_9_Chapter.xhtml#Fig3).


    ![../images/329781_6_En_9_Chapter/329781_6_En_9_Fig3_HTML.jpg](images/329781_6_En_9_Chapter/329781_6_En_9_Fig3_HTML.jpg)


    Figure 9-3


    A simple Stepper


    The entire ContentView file should look like this:


    1.  Click the Live Preview icon in the Canvas pane to run your app.


    2.  Click the – and + icons on the Stepper to decrease or increase its value.


    ```

    import SwiftUI

    struct ContentView: View {

    @State var newValue = 0

    var body: some View {

    VStack {

    Stepper(value: $newValue) {

    Text("Stepper value = \(newValue)")

    }.padding()

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    ### Defining a Range in a Stepper


    In many cases, you want to define a valid range of values that the Stepper can
    represent such as from 1 to 25\. To define a range for a Stepper, you need to
    list the range within the in: parameter like this:


    ```

    Stepper(value: $newValue, in: 1...10) {

    Text("Stepper value = \(newValue)")

    }.padding()

    ```


    To see how to define a range of values that a Stepper can represent, add the preceding
    code so the entire ContentView file looks like this:


    ```

    import SwiftUI

    struct ContentView: View {

    @State var newValue = 0

    var body: some View {

    VStack {

    // Basic stepper

    Stepper(value: $newValue) {

    Text("Stepper value = \(newValue)")

    }.padding()

    // Stepper in a range

    Stepper(value: $newValue, in: 1...10) {

    Text("Stepper value = \(newValue)")

    }.padding()

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    Click the Live Preview icon on the Canvas pane and click the bottom Stepper. Notice
    that because its range is restricted between 1 and 10, clicking the – and + icons
    on the bottom Stepper won’t decrease the Stepper’s value below 1 or increase the
    value above 10.'
