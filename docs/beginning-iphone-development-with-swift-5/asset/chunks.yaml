  trans: "\n# 使用多个控制器\n\n一个简单的 iOS 应用可能只包含单个视图，比如计算器应用。然而，大多数应用会包含两个或更多控制器，用于在屏幕上显示不同的视图。这意味着你需要了解如何在构成\
    \ iOS 应用用户界面的故事板中处理多个控制器。\n\n当故事板包含两个或更多控制器时，你需要定义一个作为初始视图控制器，这是应用运行时显示的第一个屏幕。要了解其工作原理，请按以下步骤操作：\n\
    \n1.  确保你的 `MySecondApp` 项目已加载到 `Xcode` 中。\n2.  在导航器面板中点击 `Main.storyboard` 文件。\n\
    3.  点击资料库图标以显示对象库。\n4.  将一个第二个视图控制器拖放到故事板上，如图 5-6 所示。\n   ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig6_HTML.jpg](img/329781_5_En_5_Fig6_HTML.jpg)\n\
    \   *图 5-6. 向故事板添加第二个视图控制器*\n5.  在文档大纲中，点击你刚刚添加的第二个视图控制器下方的视图。\n6.  选择“视图”➤“检查器”➤“显示属性检查器”，或点击检查器面板顶部的属性检查器图标。\n\
    7.  点击背景弹出菜单以显示调色板，如图 5-7 所示。\n   ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig7_HTML.jpg](img/329781_5_En_5_Fig7_HTML.jpg)\n\
    \   *图 5-7. 更改视图控制器的背景颜色*\n8.  点击一种颜色，例如蓝色或黄色。目标是选择一种不同于白色的背景颜色，以便在运行应用时轻松看出哪个控制器出现。`Xcode`\
    \ 会将你选择的颜色显示在视图中。现在，让这个彩色视图作为初始视图控制器，以便应用首次运行时显示它。\n9.  点击第二个视图控制器，它包含你在步骤 8 中选择的带有彩色背景的视图。\n\
    10. 将箭头从第一个控制器拖到第二个控制器。（你也可以选择“视图”➤“检查器”➤“显示属性检查器”，然后选中“是初始视图控制器”复选框。）初始视图控制器箭头现在应指向背景非白色的视图控制器，如图\
    \ 5-8 所示。\n    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig8_HTML.jpg](img/329781_5_En_5_Fig8_HTML.jpg)\n\
    \    *图 5-8. 更改初始视图控制器*\n11. 点击“运行”按钮或选择“产品”➤“运行”。模拟器会运行你的应用。注意，彩色视图出现了。\n12.\
    \ 选择“模拟器”➤“退出模拟器”以返回 `Xcode`。\n13. 将箭头从第二个（彩色）控制器拖到第一个（白色背景）控制器。\n14. 点击“运行”按钮或选择“产品”➤“运行”。模拟器会出现。注意，白色背景出现了。\n\
    15. 选择“模拟器”➤“退出模拟器”以返回 `Xcode`。\n\n# 在控制器之间切换\n\n目前我们的应用有两个控制器，但任意时刻只能有一个显示（即定义为初始视图控制器的那个）。要让应用在运行时显示多个视图，你有几种选择。首先，你可以手动在两个控制器之间创建链接。其次，你可以将两个或更多控制器放置在导航控制器或标签栏控制器内。\n\
    \n要了解如何手动连接控制器，请按以下步骤操作：\n\n1.  确保 `MySecondApp` 项目已加载到 `Xcode` 中。\n2.  在导航器面板中点击\
    \ `Main.storyboard` 文件。`Xcode` 会显示两个现有视图，其中一个为白色背景，另一个为彩色背景。应有一个箭头指向白色视图，表明这是应用运行时出现的初始视图控制器。\n\
    3.  点击资料库图标以显示对象库窗口。然后将一个按钮拖放到第一个（白色背景）控制器的视图上。（按钮的具体位置无关紧要。）\n4.  将鼠标指针移到这个按钮上，按住\
    \ Control 键，然后按住 Ctrl 键将鼠标拖到第二个视图上，`Xcode` 会高亮显示该视图，如图 5-9 所示。（另一种做法是，你也可以从按钮按住\
    \ Ctrl 键拖到文档大纲中的第二个视图控制器，如图 5-10 所示。）\n   ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig10_HTML.jpg](img/329781_5_En_5_Fig10_HTML.jpg)\n\
    \   *图 5-10. 从按钮按住 Ctrl 键拖到文档大纲中的另一个视图控制器，同样会创建 segue 链接*\n   ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig9_HTML.jpg](img/329781_5_En_5_Fig9_HTML.jpg)\n\
    \   *图 5-9. 从按钮按住 Ctrl 键拖到另一个视图会创建 segue 链接*\n5.  松开鼠标左键和 Control 键。会出现一个弹出菜单，如图\
    \ 5-11 所示。\n   ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig11_HTML.jpg](img/329781_5_En_5_Fig11_HTML.jpg)\n\
    \   *图 5-11. 按住 Ctrl 键拖动后，会出现一个菜单用于定义如何显示下一个控制器*\n6.  选择 `Show`。`Xcode` 会在两个控制器之间创建一个\
    \ segue。\n7.  点击该 segue 以选中它。然后选择“视图”➤“检查器”➤“显示属性检查器”，或点击检查器面板顶部的属性检查器图标。注意，“种类”弹出菜单允许你定义\
    \ segue，如图 5-12 所示。\n   ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig12_HTML.jpg](img/329781_5_En_5_Fig12_HTML.jpg)\n\
    \   *图 5-12. segue 的属性检查器可让你更改 segue 的类型*\n8.  再次点击资料库图标以显示对象库窗口。然后将一个按钮拖放到第二个（彩色）视图上的任意位置。\n\
    9.  从彩色视图上的这个按钮按住 Ctrl 键拖到第一个（白色）控制器。松开 Control 键和鼠标左键以显示弹出菜单（参见图 5-11）。\n10.\
    \ 选择 `Show`。`Xcode` 会创建第二个 segue，将两个控制器连接在一起，如图 5-13 所示。在运行此应用之前，我们需要确保故事板选择的\
    \ iOS 设备与模拟器选择的 iOS 设备一致。\n    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig13_HTML.jpg](img/329781_5_En_5_Fig13_HTML.jpg)\n\
    \    *图 5-13. 故事板中通过两个 segue 连接在一起的两个控制器*\n11. 查看中间 Xcode 面板底部，了解你的故事板当前模拟的是哪种\
    \ iOS 设备。在图 5-14 中，故事板模拟的是 iPhone 8。你可以点击此“视图为：”文本，显示不同的 iOS 设备进行模拟。\n    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig14_HTML.jpg](img/329781_5_En_5_Fig14_HTML.jpg)\n"
- fmt: "Figure 5-14. Identifying the iOS device the storyboard mimics\n\n12.  Look\
    \ in the upper left corner of the Xcode window for the iOS device the Simulator\
    \ will mimic as shown in Figure [5-15](#329781_5_En_5_Chapter.xhtml#Fig15).\n\n\
    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig15_HTML.jpg](images/329781_5_En_5_Chapter/329781_5_En_5_Fig15_HTML.jpg)\n\
    Figure 5-15. Identifying the iOS device the Simulator mimics\n\n13.  Make sure\
    \ the Simulator iOS device matches the storyboard iOS device. If not, click the\
    \ current iOS device the Simulator mimics so a popup menu appears. Then click\
    \ the iOS device that matches the storyboard iOS device (such as iPhone 8 in Figure\
    \ [5-14](#329781_5_En_5_Chapter.xhtml#Fig14)).\n14.  Click the `Run` button or\
    \ choose `Product` ➤ `Run`. The Simulator appears, displaying the white controller\
    \ and its button.\n15.  Click the button in the white view. The colored controller\
    \ view appears.\n16.  Click the button in the colored view. The white controller\
    \ view appears again. Repeat steps 15 and 16 to see how the buttons and the segues\
    \ let you switch from one view to the other.\n17.  Choose `Simulator` ➤ `Quit\
    \ Simulator` to return to Xcode.\n\n## Embedding in a Navigation Controller\n\n\
    Manually linking two controllers together can work, but it can be clumsy to create.\
    \ As an alternative, you can use a Navigation Controller. A Navigation Controller\
    \ encloses other controllers and takes care of letting the user navigate back\
    \ and forth between the two controllers. That way you don’t need to add buttons\
    \ on both controllers to let users switch back and forth between the two.\n\n\
    If you already have two or more controllers in a storyboard, you can embed them\
    \ inside a Navigation Controller. To see how to embed existing controllers inside\
    \ a Navigation Controller, follow these steps:\n\n1.  Make sure the MySecondApp\
    \ project is loaded in Xcode.\n2.  Click the `Main.storyboard` file in the Navigator\
    \ pane.\n3.  Click the first View Controller Scene (the one with the white background)\
    \ in the Document Outline to select it as shown in Figure [5-16](#329781_5_En_5_Chapter.xhtml#Fig16).\n\
    \n    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig16_HTML.jpg](images/329781_5_En_5_Chapter/329781_5_En_5_Fig16_HTML.jpg)\n\
    \    Figure 5-16. Selecting the first View Controller in the Document Outline\n\
    \n4.  Choose `Editor` ➤ `Embed In` ➤ `Navigation Controller`. Xcode displays a\
    \ Navigation Controller in the storyboard as shown in Figure [5-17](#329781_5_En_5_Chapter.xhtml#Fig17).\n\
    \n    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig17_HTML.jpg](images/329781_5_En_5_Chapter/329781_5_En_5_Fig17_HTML.jpg)\n\
    \    Figure 5-17. Embedding existing controllers inside a Navigation Controller\n\
    \n5.  Click the `Run` button or choose `Product` ➤ `Run`. The Simulator appears,\
    \ displaying the first (white) controller with a button on it.\n6.  Click the\
    \ button. Notice that the second (colored) controller slides into view and displays\
    \ a `< Back` button in the upper left corner as shown in Figure [5-18](#329781_5_En_5_Chapter.xhtml#Fig18).\n\
    \n    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig18_HTML.jpg](images/329781_5_En_5_Chapter/329781_5_En_5_Fig18_HTML.jpg)\n\
    \    Figure 5-18. The Navigation Controller displays a `< Back` button to return\
    \ to the previous view\n\n7.  Click the `< Back` button in the upper left corner.\
    \ Notice that the first (white) controller appears again. Repeat steps 6 and 7\
    \ to see how the Navigation Controller lets you move forward to the colored controller\
    \ and then back to the white controller.\n8.  Choose `Simulator` ➤ `Quit Simulator`\
    \ to return to Xcode.\n\n## Using a Navigation Controller\n\nChoosing the `Embed\
    \ In` command from the Editor menu is one way to add a Navigation Controller to\
    \ a storyboard. A second way is to add a Navigation Controller from the Object\
    \ Library window. When you add a Navigation Controller from the Object Library,\
    \ you’ll also add a Table View Controller that you’ll need to delete. Then you’ll\
    \ need to connect the Navigation Controller to your existing controller and make\
    \ sure the Navigation Controller is the initial View Controller.\n\nTo see how\
    \ to add a Navigation Controller from the Object Library, follow these steps:\n\
    \n1.  Make sure the MySecondApp project is loaded in Xcode.\n2.  Click the `Main.storyboard`\
    \ file in the Navigator pane.\n3.  Click the Navigation Controller Scene in the\
    \ Document Outline and press the `BACKSPACE` or `DELETE` key to delete the existing\
    \ Navigation Controller from your storyboard.\n4.  Click the Library icon to open\
    \ the Object Library window.\n5.  Drag and drop a Navigation Controller onto the\
    \ storyboard. This will include a Navigation Controller and a Table View Controller\
    \ as shown in Figure [5-19](#329781_5_En_5_Chapter.xhtml#Fig19).\n\n    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig19_HTML.jpg](images/329781_5_En_5_Chapter/329781_5_En_5_Fig19_HTML.jpg)\n\
    \    Figure 5-19. Adding a Navigation Controller from the Object Library window\n\
    \n6.  Click the Root View Controller Scene in the Document Outline and press `BACKSPACE`\
    \ or `DELETE` to delete the controller currently linked to the Navigation Controller.\n\
    7.  Click the Navigation Controller Scene in the Document Outline to select it.\n\
    8.  Choose `View` ➤ `Inspectors` ➤ `Show Attributes Inspector`, or click the Attributes\
    \ Inspector icon at the top of the Inspector pane.\n9.  Select the `Is Initial\
    \ View Controller` check box. This makes the Navigation Controller the first controller\
    \ that appears when the app runs.\n10.  Move the mouse pointer over the middle\
    \ of the Navigation Controller, hold down the `Control` key, and Ctrl-drag to\
    \ the middle of the controller with the white background as shown in Figure [5-20](#329781_5_En_5_Chapter.xhtml#Fig20).\n\
    \n    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig20_HTML.jpg](images/329781_5_En_5_Chapter/329781_5_En_5_Fig20_HTML.jpg)\n\
    \    Figure 5-20. Connecting a Navigation Controller to an existing controller\n\
    \n11.  Release the `Control` key and the left mouse button. A popup menu appears\
    \ as shown in Figure [5-21](#329781_5_En_5_Chapter.xhtml#Fig21).\n\n    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig21_HTML.jpg](images/329781_5_En_5_Chapter/329781_5_En_5_Fig21_HTML.jpg)\n\
    \    Figure 5-21. A popup menu appears to define the segue between the Navigation\
    \ Controller and the other controller\n\n12.  Choose `root View Controller` under\
    \ the `Relationship Segue` category.\n13.  Click the `Run` button or choose `Product`\
    \ ➤ `Run`. The first view (the white background) appears in the Simulator.\n14.\
    \  Click the button on the view. The second controller (with the colored background)\
    \ appears. Notice that the Navigation Controller now displays the `< Back` button\
    \ in the upper left corner.\n15.  Click the `< Back` button to return to the first\
    \ controller. Repeat steps 14 and 15 to see how to move back and forth between\
    \ the two different views.\n16.  Choose `Simulator` ➤ `Quit Simulator`.\n\n##\
    \ Summary\n\nThe simplest iOS apps consist of just a single view, but most apps\
    \ will likely need multiple views. When you have multiple controllers in a storyboard,\
    \ you must designate one controller as the initial View Controller, which is the\
    \ first controller that appears when the app runs. Only one controller can be\
    \ the initial View Controller at a time.\n\nTo change which controller appears\
    \ at any given time, you can create links between controllers called segues. To\
    \ create a segue, you can Ctrl-drag the mouse from an object such as a button\
    \ to another controller. However, creating segues manually can be tedious, so\
    \ another alternative is to use a Navigation Controller.\n\nA Navigation Controller\
    \ encloses or embeds other controllers. That way the other controllers can focus\
    \ on displaying information while the Navigation Controller focuses on providing\
    \ a way for users to go back to the previous controller."
