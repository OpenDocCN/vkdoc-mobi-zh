    \ icons that represent different commands the user can choose. The two objects\
    \ to use from the Object Library window are shown in Figure [18-17](#329781_5_En_18_Chapter.xhtml#Fig17):\n\
    \n![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig17_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig17_HTML.jpg)\n\
    \nFigure 18-17\n\nThe Toolbar and Bar Button Item on the Object Library window\n\
    \n*   Tool Bar – Displays a bar at the bottom of the screen\n\n*   Bar Button\
    \ Item – Displays text and/or an icon on a Toolbar\n\nTo see how to add a Toolbar\
    \ and icons and connect them to IBAction methods, follow these steps:\n\n1.  Create\
    \ a new iOS project using the Single View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml))\
    \ and name this new project TabBarMethodsApp. This creates a single view for the\
    \ user interface.\n\n2.  Click the Main.storyboard file in the Navigator pane.\
    \ Xcode displays the single view.\n\n3.  Click the Library icon to open the Object\
    \ Library window.\n\n4.  Drag and drop a Tool Bar from the Object Library window\
    \ to the bottom of the view as shown in Figure [18-18](#329781_5_En_18_Chapter.xhtml#Fig18).\n\
    \n![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig18_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig18_HTML.jpg)\n\
    \nFigure 18-18\n\nDragging and dropping a Toolbar onto a view\n\n5.  Click Item\
    \ underneath Toolbar in the Document Outline as shown in Figure [18-19](#329781_5_En_18_Chapter.xhtml#Fig19).\
    \ This selects the bar button currently visible on the Toolbar.\n\n![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig19_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig19_HTML.jpg)\n\
    \nFigure 18-19\n\nThe Bar Button Item on the Toolbar in the Document Outline\n\
    \n6.  Choose View ➤ Inspectors ➤ Show Attributes Inspector, or click the Attributes\
    \ Inspector icon in the upper right corner of the Xcode window.\n\n7.  Click in\
    \ the System Item popup menu. A popup menu appears, listing common types of icons\
    \ you can select as shown in Figure [18-20](#329781_5_En_18_Chapter.xhtml#Fig20).\n\
    \n![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig20_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig20_HTML.jpg)\n\
    \nFigure 18-20\n\nClicking the System Item popup menu\n\n8.  Choose Add. Notice\
    \ that Xcode now displays the bar button as a + icon.\n\n9.  Choose View ➤ Assistant\
    \ Editor ➤ Show Assistant Editor, or click the Assistant Editor icon in the upper\
    \ right corner of the Xcode window. Xcode displays the Main.storyboard file and\
    \ the ViewController.swift file side by side.\n\n10.  Move the mouse pointer over\
    \ the Add (+) button on the Toolbar, hold down the Control key, and Ctrl-drag\
    \ from the Add (+) button just above the last curly bracket at the bottom of the\
    \ ViewController.swift file.\n\n11.  Release the Control key and the left mouse\
    \ button. A popup window appears.\n\n12.  Click in the Name text field and type\
    \ **addTapped** .\n\n13.  Click in the Type popup menu and choose UIBarButtonItem.\
    \ Then click the Connect button. Xcode creates an addTapped IBAction method.\n\
    \n14.  Edit this addTapped IBAction method as follows:\n\n```\n    @IBAction func\
    \ addTapped(_ sender: UIBarButtonItem) {\n    let alert = UIAlertController(title:\
    \ \"Add\", message: \"Add button tapped\", preferredStyle: .alert)\n    let okAction\
    \ = UIAlertAction(title: \"OK\", style: .default, handler: { action -> Void in\n\
    \    //Just dismiss the action sheet\n    })\n    alert.addAction(okAction)\n\
    \    self.present(alert, animated: true, completion: nil)\n    }\n    ```\n\n\
    The entire ViewController.swift file should look like this:\n\n```\n    import\
    \ UIKit\n    class ViewController: UIViewController {\n    override func viewDidLoad()\
    \ {\n    super.viewDidLoad()\n    // Do any additional setup after loading the\
    \ view.\n    }\n    @IBAction func addTapped(_ sender: UIBarButtonItem) {\n  \
    \  let alert = UIAlertController(title: \"Add\", message: \"Add button tapped\"\
    , preferredStyle: .alert)\n    let okAction = UIAlertAction(title: \"OK\", style:\
    \ .default, handler: { action -> Void in\n    //Just dismiss the action sheet\n\
    \    })\n    alert.addAction(okAction)\n    self.present(alert, animated: true,\
    \ completion: nil)\n    }\n    }\n    ```\n\n15.  Click the Run button or choose\
    \ Product ➤ Run. The Simulator window appears, displaying the Toolbar and the\
    \ Add (+) button at the bottom of the screen.\n\n16.  Click the Add (+) button.\
    \ An alert controller appears.\n\n17.  Click OK to dismiss the alert controller.\n\
    \n18.  Choose Simulator ➤ Quit Simulator to return to Xcode.\n\n### Adding and\
    \ Deleting Tool Bar Buttons\n\nWhen you add a Toolbar, it comes with one bar button\
    \ generically labeled “Item”. After customizing this one bar button, you may want\
    \ to add more buttons to a Toolbar. If you add too many bar buttons, you can always\
    \ delete them. Bar buttons can display icons and/or text as shown in Figure [18-21](#329781_5_En_18_Chapter.xhtml#Fig21).\n\
    \n![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig21_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig21_HTML.jpg)\n\
    \nFigure 18-21\n\nBar buttons typically display text or icons"
  trans: "\n# 创建工具栏\n\n与标签栏控制器类似的是工具栏。标签栏控制器旨在屏幕底部显示图标，代表用户可以打开的不同视图；而工具栏则用于显示图标，代表用户可以选择的命令。从对象库窗口中使用的两个对象如图\
    \ 18-17 所示：\n\n![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig17_HTML.jpg](img/329781_5_En_18_Fig17_HTML.jpg)\n\
    \n图 18-17\n\n对象库窗口中的工具栏和栏按钮项\n\n- `Tool Bar` – 在屏幕底部显示一个栏\n- `Bar Button Item`\
    \ – 在工具栏上显示文本和/或图标\n\n要了解如何添加工具栏和图标并将其连接到 IBAction 方法，请按照以下步骤操作：\n\n1. 使用单视图应用模板创建一个新的\
    \ iOS 项目（参见第 1 章），并将此新项目命名为 `TabBarMethodsApp`。这将为用户界面创建一个单一视图。\n\n2. 在导航器窗格中点击\
    \ `Main.storyboard` 文件。Xcode 会显示该单一视图。\n\n3. 点击库图标以打开对象库窗口。\n\n4. 从对象库窗口中拖放一个工具栏到视图底部，如图\
    \ 18-18 所示。\n\n![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig18_HTML.jpg](img/329781_5_En_18_Fig18_HTML.jpg)\n\
    \n图 18-18\n\n将工具栏拖放到视图上\n\n5. 在文档大纲中点击工具栏下方的 `Item`，如图 18-19 所示。这将选中工具栏上当前可见的栏按钮。\n\
    \n![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig19_HTML.jpg](img/329781_5_En_18_Fig19_HTML.jpg)\n\
    \n图 18-19\n\n文档大纲中工具栏上的栏按钮项\n\n6. 选择 `View` ➤ `Inspectors` ➤ `Show Attributes\
    \ Inspector`，或点击 Xcode 窗口右上角的属性检查器图标。\n\n7. 点击 `System Item` 弹出菜单。将出现一个弹出菜单，列出您可以选择的常见图标类型，如图\
    \ 18-20 所示。\n\n![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig20_HTML.jpg](img/329781_5_En_18_Fig20_HTML.jpg)\n\
    \n图 18-20\n\n点击系统项弹出菜单\n\n8. 选择 `Add`。注意，Xcode 现在将栏按钮显示为 `+` 图标。\n\n9. 选择 `View`\
    \ ➤ `Assistant Editor` ➤ `Show Assistant Editor`，或点击 Xcode 窗口右上角的助理编辑器图标。Xcode\
    \ 会并排显示 `Main.storyboard` 文件和 `ViewController.swift` 文件。\n\n10. 将鼠标指针移到工具栏上的 Add\
    \ (`+`) 按钮上，按住 Control 键，然后从 Add (`+`) 按钮拖拽到 `ViewController.swift` 文件底部最后一个大括号上方。\n\
    \n11. 松开 Control 键和鼠标左键。将出现一个弹出窗口。\n\n12. 点击名称文本字段，输入 **addTapped**。\n\n13. 点击类型弹出菜单，选择\
    \ `UIBarButtonItem`。然后点击连接按钮。Xcode 会创建一个 `addTapped` IBAction 方法。\n\n14. 按如下方式编辑此\
    \ `addTapped` IBAction 方法：\n\n```\n@IBAction func addTapped(_ sender: UIBarButtonItem)\
    \ {\n    let alert = UIAlertController(title: \"Add\", message: \"Add button tapped\"\
    , preferredStyle: .alert)\n    let okAction = UIAlertAction(title: \"OK\", style:\
    \ .default, handler: { action -> Void in\n        //Just dismiss the action sheet\n\
    \    })\n    alert.addAction(okAction)\n    self.present(alert, animated: true,\
    \ completion: nil)\n}\n```\n\n整个 `ViewController.swift` 文件应如下所示：\n\n```\nimport\
    \ UIKit\nclass ViewController: UIViewController {\n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        // Do any additional setup after loading\
    \ the view.\n    }\n    @IBAction func addTapped(_ sender: UIBarButtonItem) {\n\
    \        let alert = UIAlertController(title: \"Add\", message: \"Add button tapped\"\
    , preferredStyle: .alert)\n        let okAction = UIAlertAction(title: \"OK\"\
    , style: .default, handler: { action -> Void in\n            //Just dismiss the\
    \ action sheet\n        })\n        alert.addAction(okAction)\n        self.present(alert,\
    \ animated: true, completion: nil)\n    }\n}\n```\n\n15. 点击运行按钮，或选择 `Product`\
    \ ➤ `Run`。模拟器窗口将出现，在屏幕底部显示工具栏和 Add (`+`) 按钮。\n\n16. 点击 Add (`+`) 按钮。将出现一个警告控制器。\n\
    \n17. 点击 OK 以关闭警告控制器。\n\n18. 选择 `Simulator` ➤ `Quit Simulator` 返回 Xcode。\n\n##\
    \ 添加和删除工具栏按钮\n\n当你添加一个工具栏时，它会自带一个通用标签为“Item”的栏按钮。自定义此栏按钮后，你可能需要向工具栏添加更多按钮。如果添加了过多栏按钮，你也可以随时删除它们。栏按钮可以显示图标和/或文本，如图\
    \ 18-21 所示。\n\n![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig21_HTML.jpg](img/329781_5_En_18_Fig21_HTML.jpg)\n\
    \n图 18-21\n\n栏按钮通常显示文本或图标\n"
- fmt: '### Note


    Although bar buttons can display both text and icons, you can also use one or
    the other. If you have three or fewer buttons on a `Toolbar`, text (with no icon)
    can make each option easier to understand. If you have more than three buttons
    on a `Toolbar`, icons (with no text) take up less space but at the sacrifice of
    the user not understanding what command each icon may represent.


    Besides bar buttons, another object you can add to `Toolbars` is spaces. `Xcode`
    offers two different types of spaces as shown in Figure [18-22](#329781_5_En_18_Chapter.xhtml#Fig22):


    ![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig22_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig22_HTML.jpg)


    Figure 18-22


    Two types of spaces you can add between bar buttons


    - `Fixed space` – Defines an exact value for space between two bar buttons

    - `Flexible space` – Acts like a spring that shrinks or expands between two bar
    buttons when viewed on different size screens such as an `iPhone` and an `iPad`


    To see how to add, delete, and add spaces on a `Toolbar`, follow these steps:


    1. Create a new iOS project using the `Single View App` template (see Chapter
    [1](#329781_5_En_1_Chapter.xhtml)) and name this new project `ToolBarEditApp`.
    This creates a single view for the user interface.

    2. Click the `Main.storyboard` file in the Navigator pane. `Xcode` displays the
    single view.

    3. Click the Library icon to open the Object Library window.

    4. Drag and drop a `Tool Bar` onto the bottom of the view. A generic "Item" bar
    button appears on the `Toolbar`.

    5. Click the Library icon to open the Object Library window and drag and drop
    a `Bar Button Item` onto the `Toolbar`. Notice that the two bar buttons appear
    close together as shown in Figure [18-23](#329781_5_En_18_Chapter.xhtml#Fig23).


    ![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig23_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig23_HTML.jpg)


    Figure 18-23


    Two bar buttons appear on a `Toolbar`


    6. Click the Library icon to open the Object Library window and drag and drop
    a `Fixed Space Bar Button Item` onto the `Toolbar` in between the two existing
    bar buttons. The `Fixed Space Bar Button Item` simply adds space between two bar
    buttons and appears invisible.

    7. Click `Fixed Space` in the Document Outline to select the `Fixed Space Bar
    Button Item`.

    8. Choose `View` ➤ `Inspectors` ➤ `Show Size Inspector`, or click the `Size Inspector`
    icon on the upper right corner of the `Xcode` window.

    9. Click in the `Width` text field, type `75`, and press `ENTER`. The `Width`
    property defines the exact spacing of the `Fixed Space Bar Button Item`.

    10. Click the `Run` button or choose `Product` ➤ `Run`. The Simulator window appears,
    displaying the `Toolbar` at the bottom of the screen with its two bar buttons.

    11. Choose `Hardware` ➤ `Rotate Left`. Notice that the spacing between the two
    bar buttons on the `Toolbar` remains the same as shown in Figure [18-24](#329781_5_En_18_Chapter.xhtml#Fig24).


    ![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig24_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig24_HTML.jpg)


    Figure 18-24


    The `Fixed Space Bar Button Item` maintains an exact distance between two bar
    buttons


    12. Choose `Simulator` ➤ `Quit Simulator` to return to `Xcode`.

    13. Click `Fixed Space` in the Document Outline and press `BACKSPACE` or `DELETE`
    to remove the `Fixed Space Bar Button Item`.

    14. Click the Library icon to open the Object Library window and drag and drop
    a `Flexible Space Bar Button Item` onto the `Toolbar` in between the two existing
    bar buttons. Notice that `Flexible Space Bar Button` pushes the two bar buttons
    on opposite ends of the `Toolbar` as shown in Figure [18-25](#329781_5_En_18_Chapter.xhtml#Fig25).


    ![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig25_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig25_HTML.jpg)


    Figure 18-25


    The `Flexible Space Bar Button Item` acts like a spring between two bar buttons


    15. Click the `Run` button or choose `Product` ➤ `Run`. The Simulator window appears,
    displaying the `Toolbar` at the bottom of the screen with its two bar buttons
    at opposite ends of the `Toolbar`.

    16. Choose `Hardware` ➤ `Rotate Left`. Notice that the spacing between the two
    bar buttons on the `Toolbar` expands to accommodate the wider distance of the
    iPhone in landscape orientation as shown in Figure [18-26](#329781_5_En_18_Chapter.xhtml#Fig26).


    ![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig26_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig26_HTML.jpg)


    Figure 18-26


    The `Flexible Space Bar Button Item` pushes two bar buttons regardless of the
    iOS device orientation


    17. Choose `Simulator` ➤ `Quit Simulator` to return to `Xcode`.


    ## Summary


    Tab Bar Controllers display icons at the bottom of the screen that represent different
    View Controllers. Unlike a Navigation Controller that forces users to display
    View Controllers in sequential order, Tab Bar Controllers let users navigate to
    different View Controllers in any order. Because a Tab Bar Controller can only
    display a limited number of icons, users can only navigate to a limited number
    of View Controllers.


    A Tool Bar also displays icons at the bottom of the screen. While a Tab Bar displays
    icons that jump to a different View Controller, a Tool Bar displays icons that
    represent different commands to manipulate data currently displayed on the screen.
    For example, the Mail app displays icons at the bottom of the screen while showing
    messages. One icon lets you delete the message, while another lets you forward
    it. Yet another icon lets you store the message in another folder.


    Buttons can display text and an image, although it''s more common for buttons
    to display text or an image, but not necessarily both. Text makes it easy to understand
    the purpose of each button, but text buttons take up more space. Icons take up
    far less space but can be harder to understand what they represent.


    When placing buttons on a `Toolbar`, you can also define spacing between buttons
    using either fixed or flexible spacing. Fixed spacing lets you define a specific
    value for spacing between two buttons. Flexible spacing lets the spacing between
    buttons shrink or expand depending on the orientation of the iOS device.


    By using Tab Bars to navigate to different View Controllers or Tool Bars to display
    different types of commands available to manipulating currently displayed data,
    you can make your app easier to use.'
