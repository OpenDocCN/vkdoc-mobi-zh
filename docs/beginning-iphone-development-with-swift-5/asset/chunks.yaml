    \n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig1_HTML.jpg](images/329781_5_En_14_Chapter/329781_5_En_14_Fig1_HTML.jpg)\n\
    \nFigure 14-1\n\nA table view consists of cells that display data in objects such\
    \ as labels and image view\n\nTo create a table view, you can drag a table view\
