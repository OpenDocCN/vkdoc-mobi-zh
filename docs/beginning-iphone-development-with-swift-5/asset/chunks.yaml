    ]`"
  trans: "\n### 注意\n\n只有当表格视图样式为 Plain（普通）而非 Grouped（分组）时，表格视图才能显示索引。\n\n索引通常由 A 到\
    \ Z 的字母组成，但也可以包含任何字符，包括表情符号。每个索引项的位置对应每个分区。因此，索引中显示的第一项会将用户带到第一个分区，第二项带到第二个分区，以此类推。\n\
    \n要了解如何创建索引，请按以下步骤操作：\n\n1.  使用单视图应用模板创建一个新的 iOS 项目（参见第 1 章），并将这个新项目命名为 `TableViewIndexApp`。这会为用户界面创建一个单视图。\n\
    \n2.  在导航窗格中点击 `Main.storyboard` 文件。Xcode 会显示这个单视图。\n\n3.  点击库图标以打开对象库窗口。\n\n\
    4.  将一个表格视图拖放到视图的任意位置（参见图 14-2）。\n\n5.  调整表格视图的大小，使其填满整个屏幕。\n\n6.  选择**编辑器** ➤\
    \ **解决自动布局问题** ➤ **重置为建议的约束**。Xcode 会为表格视图添加约束（参见图 14-3）。\n\n7.  选择**视图** ➤ **检查器**\
    \ ➤ **显示属性检查器**，或点击 Xcode 窗口右上角的**属性检查器**图标。\n\n8.  选择**视图** ➤ **助理编辑器** ➤ **显示助理编辑器**，或点击\
    \ Xcode 窗口右上角的**助理编辑器**图标。\n\n9.  将鼠标指针移到表格视图上，按住 **Control** 键，然后按住 Ctrl 键拖拽到\
    \ `ViewController.swift` 文件中 `class ViewController` 行的下方。\n\n10. 松开 **Control**\
    \ 键和鼠标左键。会弹出一个窗口。\n\n11. 点击 **名称** 文本框，输入 `petTable`，然后点击 **连接** 按钮。Xcode 会创建一个\
    \ `IBOutlet`，如下所示：\n\n```\n@IBOutlet var petTable: UITableView!\n```\n\n12. 选择**视图**\
    \ ➤ **标准编辑器** ➤ **显示标准编辑器**，或点击 Xcode 窗口右上角的**标准编辑器**图标。\n\n13. 在导航窗格中点击 `ViewController.swift`\
    \ 文件。\n\n14. 修改 `class ViewController` 这一行，添加 `UITableViewDelegate, UITableViewDataSource`，如下所示：\n\
    \n```\nclass ViewController: UIViewController, UITableViewDelegate, UITableViewDataSource\
    \ {\n```\n\n此代码的目的是将 `ViewController.swift` 文件标识为表格视图的委托和数据源。\n\n15. 在 `class\
    \ ViewController` 行下方，添加以下数组：\n\n```\nlet petArray = [[\"Bird\", \"parakeet\"\
    , \"parrot\", \"canary\", \"finch\", \"cockatiel\"], [\"Fish\", \"tropical fish\"\
    , \"goldfish\", \"sea horses\", \"eel\"], [\"Mammal\", \"cat\", \"dog\", \"hamster\"\
    , \"gerbil\", \"rabbit\", \"mouse\"], [\"Reptile\", \"turtle\", \"snake\", \"\
    lizard\"]]\n```\n\n这个 `petArray` 包含多个字符串数组，每个字符串数组代表一个不同的分区。每个字符串数组中的第一项代表该分区的分区头。\n\
    \n16. 在 `petArray` 下方，添加第二个数组：\n\n```\nlet indexArray = [\"B\", \"F\", \"M\",\
    \ \"R\"]\n```\n\n这个 `indexArray` 中的每一项代表一个分区。由于 `petArray` 包含四个分区，因此 `indexArray`\
    \ 也包含四个项。虽然你可以使用普通的字母，但也可以添加表情符号。要将表情符号插入代码中，请选择**编辑** ➤ **表情与符号**以打开字符查看器。\n\n\
    然后点击**表情符号** ➤ **动物与自然**，如图 14-13 所示。现在将光标移到你想插入表情符号的位置，然后双击该表情符号即可将其放入代码中。分别点击一个鸟、鱼、哺乳动物和爬行动物的表情符号。\n\
    \n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig13_HTML.jpg](img/329781_5_En_14_Fig13_HTML.jpg)\n\
    \n图 14-13 — 用于将表情符号插入代码的字符查看器窗口\n\n17. 在 `indexArray` 下方添加以下行：\n\n```\nlet cellID\
    \ = \"cellID\"\n```\n\n18. 修改 `viewDidLoad` 方法，如下所示：\n\n```\noverride func viewDidLoad()\
    \ {\n    super.viewDidLoad()\n    petTable.dataSource = self\n    petTable.delegate\
    \ = self\n    petTable.sectionIndexColor = UIColor.white\n    petTable.sectionIndexBackgroundColor\
    \ = UIColor.black\n    petTable.sectionIndexTrackingBackgroundColor = UIColor.darkGray\n\
    \    // Do any additional setup after loading the view, typically from a nib.\n\
    }\n```\n\n`sectioIndexColor`、`sectioIndexBackgroundColor` 和 `sectioIndexTrackingBackgroundColor`\
    \ 通过在黑色背景上显示白色文本，使索引更易识别。\n\n19. 在 `viewDidLoad` 方法下方，添加以下函数来定义每个分区显示的行数，减去 1\
    \ 以考虑到每个分区开头的分区头：\n\n```\nfunc tableView(_ tableView: UITableView, numberOfRowsInSection\
    \ section: Int) -> Int {\n    return petArray[section].count - 1\n}\n```\n\n20.\
    \ 在上一个函数下方，添加以下函数以使用 `petArray` 中的数据填充表格视图：\n\n```\nfunc tableView(_ tableView:\
    \ UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell {\n    var\
    \ cell = tableView.dequeueReusableCell(withIdentifier: cellID)\n    if (cell ==\
    \ nil) {\n        cell = UITableViewCell(\n            style: UITableViewCell.CellStyle.default,\n\
    \            reuseIdentifier: cellID)\n    }\n    cell?.textLabel?.text = petArray[indexPath.section][indexPath.row\
    \ + 1]\n    return cell!\n}\n```\n\n21. 在上一个函数下方，添加以下函数以显示用户从表格视图选择的项目：\n\n```\n\
    func tableView(_ tableView: UITableView, didSelectRowAt indexPath: IndexPath)\
    \ {\n    let selectedItem = petArray[indexPath.section][indexPath.row + 1]\n \
    \   let alert = UIAlertController(title: \"Your Choice\", message: \"\\(selectedItem)\"\
    , preferredStyle: .alert)\n    let okAction = UIAlertAction(title: \"OK\", style:\
    \ .default, handler: { action -> Void in\n        //Just dismiss the action sheet\n\
    \    })\n    alert.addAction(okAction)\n    self.present(alert, animated: true,\
    \ completion: nil)\n}\n```\n\n22. 在上一个函数下方，添加以下函数以定义表格视图中的分区数量：\n\n```\nfunc numberOfSections(in\
    \ tableView: UITableView) -> Int {\n    return petArray.count\n}\n```\n\n23. 在上一个函数下方，添加以下函数以定义每个分区的分区头，即每个字符串数组中的第一项：\n\
    \n```\nfunc tableView(_ tableView: UITableView, titleForHeaderInSection section:\
    \ Int) -> String? {\n    return petArray[section][0]\n}\n```\n\n24. 在上一个函数下方，添加以下函数以定义显示在表格视图右侧的索引：\n\
    \n```\nfunc sectionIndexTitles (for tableView: UITableView) -> [String]? {\n \
    \   return indexArray\n}\n```\n\n完整的 `ViewController.swift` 文件应如下所示：\n\n```\n\
    import UIKit\n\nclass ViewController: UIViewController, UITableViewDelegate, UITableViewDataSource\
    \ {\n    @IBOutlet var petTable: UITableView!\n\n    let petArray = [[\"Bird\"\
    , \"parakeet\", \"parrot\", \"canary\", \"finch\", \"cockatiel\"],\n         \
    \           [\"Fish\", \"tropical fish\", \"goldfish\", \"sea horses\", \"eel\"\
    ],\n                    [\"Mammal\", \"cat\", \"dog\", \"hamster\", \"gerbil\"\
    , \"rabbit\", \"mouse\"],\n                    [\"Reptile\", \"turtle\", \"snake\"\
    , \"lizard\"]]\n\n    let indexArray = [\"B\", \"F\", \"M\", \"R\"]\n    let cellID\
    \ = \"cellID\"\n\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        petTable.dataSource = self\n        petTable.delegate = self\n      \
    \  petTable.sectionIndexColor = UIColor.white\n        petTable.sectionIndexBackgroundColor\
    \ = UIColor.black\n        petTable.sectionIndexTrackingBackgroundColor = UIColor.darkGray\n\
    \        // Do any additional setup after loading the view, typically from a nib.\n\
    \    }\n\n    func tableView(_ tableView: UITableView, numberOfRowsInSection section:\
    \ Int) -> Int {\n        return petArray[section].count - 1\n    }\n\n    func\
    \ tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell\
    \ {\n        var cell = tableView.dequeueReusableCell(withIdentifier: cellID)\n\
    \        if (cell == nil) {\n            cell = UITableViewCell(\n           \
    \     style: UITableViewCell.CellStyle.default,\n                reuseIdentifier:\
    \ cellID)\n        }\n        cell?.textLabel?.text = petArray[indexPath.section][indexPath.row\
    \ + 1]\n        return cell!\n    }\n\n    func tableView(_ tableView: UITableView,\
    \ didSelectRowAt indexPath: IndexPath) {\n        let selectedItem = petArray[indexPath.section][indexPath.row\
    \ + 1]\n        let alert = UIAlertController(title: \"Your Choice\", message:\
    \ \"\\(selectedItem)\", preferredStyle: .alert)\n        let okAction = UIAlertAction(title:\
    \ \"OK\", style: .default, handler: { action -> Void in\n            //Just dismiss\
    \ the action sheet\n        })\n        alert.addAction(okAction)\n        self.present(alert,\
    \ animated: true, completion: nil)\n    }\n\n    func numberOfSections(in tableView:\
    \ UITableView) -> Int {\n        return petArray.count\n    }\n\n    func tableView(_\
    \ tableView: UITableView, titleForHeaderInSection section: Int) -> String? {\n\
    \        return petArray[section][0]\n    }\n\n    func sectionIndexTitles (for\
    \ tableView: UITableView) -> [String]? {\n        return indexArray\n    }\n}\n\
    ```\n"
