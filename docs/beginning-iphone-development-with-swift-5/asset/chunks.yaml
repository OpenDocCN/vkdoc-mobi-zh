    \ as shown in Figure [15-15](#329781_5_En_15_Chapter.xhtml#Fig15).\n\n![../images/329781_5_En_15_Chapter/329781_5_En_15_Fig15_HTML.jpg](images/329781_5_En_15_Chapter/329781_5_En_15_Fig15_HTML.jpg)\n\
    \nFigure 15-15\n\nThe alert controller lets the user type in new text\n\n26. \
    \ Click in the text field (that displays “Pet type here” as placeholder text),\
    \ type **tarantula**, and click the OK button. Notice that the table view now\
    \ displays “tarantula”.\n\n27.  Move the mouse pointer over “rabbit”, hold down\
    \ the left mouse button, and drag to the left. The Add and Delete buttons appear\
    \ (see Figure [15-14](#329781_5_En_15_Chapter.xhtml#Fig14)).\n\n28.  Click the\
    \ Delete button. Notice the row containing “rabbit” disappears.\n\n29.  Choose\
    \ Simulator ➤ Quit Simulator to return to Xcode.\n\n## Summary\n\nBy defining\
    \ different Table View Cell styles, you can display main text, detail text that\
    \ often appears in a smaller font size, and an image. Images and detail text can\
    \ make data displayed in a table view more visually interesting and descriptive.\n\
    \nAs an alternative to choosing different cell styles, you can also design a custom\
    \ Table View Cell by dragging and dropping a Table View Cell from the Object Library\
    \ window onto a table view. Once you’ve created a custom Table View Cell, you\
    \ can drag and drop other objects onto this cell such as multiple labels and image\
    \ views where you can customize each label or image view to create a unique visual\
    \ effect.\n\nWhile table views can be handy for displaying data, they can also\
    \ be useful to allow editing such as adding or deleting rows in a table view.\
    \ To do this, you can include a left swipe gesture that lets a row display buttons.\
    \ By clicking a button, users can add a new item to a table view or delete an\
    \ existing row.\n\nBy customizing Table View Cells and implementing left swipe\
    \ gestures to add or delete rows in a table view, you can define table views unique\
    \ to your app.\n\n# 16. Using Collection Views\n\nTable views are great for displaying\
    \ large amounts of data in rows that the user can scroll through. While table\
    \ views are perfect for the smaller, narrower screen of the iPhone, they are limited\
    \ to scrolling rows of data up and down. If you want to scroll data horizontally\
    \ or display multiple columns of data, you can use a Collection View instead.\n\
    \nLike table views, Collection Views need a data source and a delegate that implements\
    \ methods that define how much data will appear in the Collection View. Think\
    \ of Collection Views as more versatile table views.\n\n## Creating a Collection\
    \ View\n\nCollection views display data in cells that make up a grid that can\
    \ scroll vertically or horizontally. To see how to create a simple Collection\
    \ View, follow these steps:\n\n1.  Create a new iOS project using the Single View\
    \ App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml)) and name this new\
    \ project SimpleCollectionViewApp. This creates a single view for the user interface.\n\
    \n2.  Click the Main.storyboard file in the Navigator pane. Xcode displays the\
    \ single view.\n\n3.  Click the Library icon to open the Object Library window.\n\
    \n4.  Drag and drop a Collection View, as shown in Figure [16-1](#329781_5_En_16_Chapter.xhtml#Fig1),\
    \ on the view.\n\n![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig1_HTML.jpg](images/329781_5_En_16_Chapter/329781_5_En_16_Fig1_HTML.jpg)\n\
    \nFigure 16-1\n\nA Collection View in the Object Library window\n\n5.  Resize\
    \ the Collection View so it fills the entire screen.\n\n6.  Choose Editor ➤ Resolve\
    \ Auto Layout Issues ➤ Reset to Suggested Constraints. Xcode adds constraints\
    \ to the Collection View.\n\n7.  Click Collection View Cell in the Document Outline.\n\
    \n8.  Choose View ➤ Inspectors ➤ Show Attributes Inspector, or click the Attributes\
    \ Inspector icon in the upper right corner of the Xcode window.\n\n9.  Click in\
    \ the Identifier text field, type **customCell**, and press ENTER as shown in\
    \ Figure [16-2](#329781_5_En_16_Chapter.xhtml#Fig2).\n\n![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig2_HTML.jpg](images/329781_5_En_16_Chapter/329781_5_En_16_Fig2_HTML.jpg)\n\
    \nFigure 16-2\n\nThe Identifier text field appears in the Collection View Cell’s\
    \ Attributes Inspector pane\n\n10.  Choose View ➤ Assistant Editor ➤ Show Assistant\
    \ Editor, or click the Assistant Editor icon in the upper right corner of the\
    \ Xcode window.\n\n11.  Move the mouse pointer over the Collection View, hold\
    \ down the Control key, and Ctrl-drag under the “class ViewController” line in\
    \ the ViewController.swift file.\n\n12.  Release the Control key and the left\
    \ mouse button. A popup window appears.\n\n13.  Click in the Name text field,\
    \ type **collectionView**, and click the Connect button. Xcode creates an IBOutlet\
    \ as follows:\n\n```\n    @IBOutlet var collectionView: UICollectionView!\n  \
    \  ```\n\n14.  Choose View ➤ Standard Editor ➤ Show Standard Editor, or click\
    \ the Standard Editor icon in the upper right corner of the Xcode window.\n\n\
    15.  Click the ViewController.swift file in the Navigator pane.\n\n16.  Modify\
    \ the class ViewController line by adding UITableViewDelegate, UITableViewDataSource\
    \ as follows:\n\n```\n    class ViewController: UIViewController, UICollectionViewDataSource,\
    \ UICollectionViewDelegate {\n    ```\n\nThe purpose of this code is to identify\
    \ the ViewController.swift file as both the delegate and data source for the Collection\
    \ View.\n\n17.  Underneath the class ViewController line, add the following:\n\
    \n```\n    var cellColor = true\n    ```\n\n18.  Modify the viewDidLoad method\
    \ as follows:\n\n```\n    override func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    collectionView.dataSource = self\n    collectionView.delegate = self\n  \
    \  // Do any additional setup after loading the view.\n    }\n    ```\n\n19. \
    \ Add the following function underneath the viewDidLoad method to define how many\
    \ items appear in the Collection View section. By default, a Collection View has\
    \ one section:\n\n```\n    func collectionView(_ collectionView: UICollectionView,\
    \ numberOfItemsInSection section: Int) -> Int {\n    return 100\n    }\n    ```\n\
    \n20.  Add the following function underneath the viewDidLoad method to fill the\
    \ Collection View Cells with data:\n\n```\n    func collectionView(_ collectionView:\
    \ UICollectionView, cellForItemAt indexPath: IndexPath) -> UICollectionViewCell\
    \ {\n    let cell = collectionView.dequeueReusableCell(withReuseIdentifier: \"\
    customCell\", for: indexPath)\n    // Alternate colors in the Collection View\
    \ cells\n    if cellColor {\n    cell.backgroundColor = UIColor.yellow\n    }\
    \ else {\n    cell.backgroundColor = UIColor.green\n    }\n    cellColor = !cellColor\n\
    \    return cell\n    }\n    ```"
