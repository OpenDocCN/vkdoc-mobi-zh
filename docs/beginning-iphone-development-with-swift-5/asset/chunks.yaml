    \ nextVC = segue.destination as! SecondViewController\n    nextVC.navigationItem.prompt\
    \ = \"New prompt here\"\n    nextVC.navigationItem.title = \"New title here\"\n\
    \    }\n    ```\n\nThis function defines new prompt and title text for the second\
    \ View Controller .\n\n26.  Click the Run button or choose Product ➤ Run. The\
    \ Simulator window appears, displaying the root view screen with “Prompt text”\
