  raw: "22.  Edit the rotationDetected IBAction method as follows:\n\n```\n    @IBAction\
    \ func rotationDetected(_ sender: UIRotationGestureRecognizer) {\n    topImageView.transform\
    \ = CGAffineTransform(rotationAngle: sender.rotation)\n    }\n    ```\n\nThe rotationDetected\
    \ IBAction method rotates the image view based on the rotation property of the\
    \ rotation gesture where the scale property defines the distance of the pinch\
    \ gesture. The entire ViewController.swift file should look like this:\n\n```\n\
    \    import UIKit\n    class ViewController: UIViewController {\n    @IBOutlet\
    \ var topImageView: UIImageView!\n    override func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    // Do any additional setup after loading the view, typically from a nib.\n\
    \    }\n    @IBAction func rotationDetected(_ sender: UIRotationGestureRecognizer)\
    \ {\n    topImageView.transform = CGAffineTransform(rotationAngle: sender.rotation)\n\
    \    }\n    }\n    ```\n\n23.  Choose View ➤ Standard Editor ➤ Show Standard Editor,\
    \ or click the Standard Editor icon in the upper right corner of the Xcode window.\n\
    \n24.  Click the Run button or choose Product ➤ Run. The Simulator window appears.\
    \ To mimic a rotation gesture, you need to use the mouse and hold down the Option\
    \ key.\n\n25.  Move the mouse pointer over the image view and then hold down the\
    \ Option key. Two gray dots appear to simulate two fingertips on the screen (see\
