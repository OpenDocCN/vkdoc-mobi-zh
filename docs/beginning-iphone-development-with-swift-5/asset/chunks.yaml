  trans: "\n![images/329781_5_En_16_Chapter/329781_5_En_16_Fig8_HTML.jpg](img/329781_5_En_16_Fig8_HTML.jpg)\n\
    \n图 16-8  \n将标签居中对齐到集合视图标签内\n\n20. 在文档大纲中点击 `Collection View`，然后选择 `View ➤ Inspectors\
    \ ➤ Show Size Inspector`，或点击 `Xcode` 窗口右上角的“大小检查器”图标。\n\n21. 在 `Cell Size Width`\
    \ 文本框中点击，输入 `100`，然后按 `ENTER` 键。\n\n22. 在 `Cell Size Height` 文本框中点击，输入 `100`，然后按\
    \ `ENTER` 键。\n\n23. 在 `Min Spacing For Cells` 文本框中点击，输入 `20`，然后按 `ENTER` 键。\n\n\
    24. 在 `Section Insets Top` 文本框中点击，输入 `15`，然后按 `ENTER` 键。`Xcode` 会将 `Collection\
    \ View Cell` 向下移动。\n\n25. 在 `Section Insets Left` 文本框中点击，输入 `15`，然后按 `ENTER` 键。`Xcode`\
    \ 会将 `Collection View Cell` 从左边距移开，如图 16-9 所示。\n\n![images/329781_5_En_16_Chapter/329781_5_En_16_Fig9_HTML.jpg](img/329781_5_En_16_Fig9_HTML.jpg)\n\
    \n图 16-9  \n在集合视图中修改单元格大小和间距\n\n26. 选择 `View ➤ Assistant Editor ➤ Show Assistant\
    \ Editor`，或点击 `Xcode` 窗口右上角的“助理编辑器”图标。这将在左侧显示 `Main.storyboard` 文件，在右侧显示 `ViewController.swift`\
    \ 文件。\n\n27. 将鼠标指针移到文档大纲中的 `Collection View` 上，按住 `Control` 键，然后从 `Collection\
    \ View` 向 `ViewController.swift` 文件中的 `class ViewController` 行下方按住 Control 键拖拽。\n\
    \n28. 释放 `Control` 键和鼠标左键。此时会出现一个弹出窗口。\n\n29. 在 `Name` 文本框中点击，输入 `collectionView`，然后点击\
    \ `Connect` 按钮。`Xcode` 会创建一个 `IBOutlet`，如下所示：\n\n```\n    @IBOutlet var collectionView:\
    \ UICollectionView!\n```\n\n30. 将鼠标指针移到文档大纲中 `customCell` 下的 `Label` 上。如果 `Xcode`\
    \ 没有在助理编辑器中显示 `itemCell.swift` 文件，请点击助理编辑器顶部的两个交叉圆圈图标以显示菜单。\n\n31. 选择 `Automatic\
    \ ➤ itemCell.swift`，如图 16-10 所示。\n\n![images/329781_5_En_16_Chapter/329781_5_En_16_Fig10_HTML.jpg](img/329781_5_En_16_Fig10_HTML.jpg)\n\
    \n图 16-10  \n选择要在助理编辑器中显示的 `itemCell.swift` 文件\n\n32. 将鼠标指针移到标签上，按住 `Control`\
    \ 键，然后从该标签向 `itemCell.swift` 文件中的 `class TableViewCell` 行下方按住 Control 键拖拽。\n\n\
    33. 释放 `Control` 键和鼠标左键。此时会出现一个弹出窗口。\n\n34. 在 `Name` 文本框中点击，输入 `itemLabel`，然后点击\
    \ `Connect` 按钮。`Xcode` 会创建一个 `IBOutlet`，如下所示：\n\n```\n    @IBOutlet var itemLabel:\
    \ UILabel!\n```\n\n整个 `itemCell.swift` 文件应如下所示：\n\n```\n    import UIKit\n   \
    \ class itemCell: UICollectionViewCell {\n        @IBOutlet var itemLabel: UILabel!\n\
    \    }\n```\n\n35. 选择 `View ➤ Standard Editor ➤ Show Standard Editor`，或点击 `Xcode`\
    \ 窗口右上角的“标准编辑器”图标。\n\n36. 在导航面板中点击 `ViewController.swift` 文件。\n\n37. 将 `class\
    \ ViewController` 行编辑为以下内容：\n\n```\n    class ViewController: UIViewController,\
    \ UICollectionViewDataSource, UICollectionViewDelegate {\n```\n\n38. 在 `IBOutlet`\
    \ 下方输入以下内容：\n\n```\n    let petArray = [\"cat\", \"dog\", \"parakeet\", \"parrot\"\
    , \"canary\", \"finch\", \"tropical fish\", \"goldfish\", \"sea horses\", \"hamster\"\
    , \"gerbil\", \"rabbit\", \"turtle\", \"snake\", \"lizard\", \"hermit crab\"]\n\
    ```\n\n39. 将 `viewDidLoad()` 方法编辑为以下内容：\n\n```\n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        collectionView.dataSource = self\n \
    \       collectionView.delegate = self\n        // Do any additional setup after\
    \ loading the view.\n    }\n```\n\n40. 在 `viewDidLoad()` 方法下方添加以下函数：\n\n```\n\
    \    func collectionView(_ collectionView: UICollectionView, numberOfItemsInSection\
    \ section: Int) -> Int {\n        return petArray.count\n    }\n```\n\n41. 在上一个函数下方添加以下函数：\n\
    \n```\n    func collectionView(_ collectionView: UICollectionView, cellForItemAt\
    \ indexPath: IndexPath) -> UICollectionViewCell {\n        let cell = collectionView.dequeueReusableCell(withReuseIdentifier:\
    \ \"customCell\", for: indexPath) as! itemCell\n        cell.itemLabel.text =\
    \ petArray[indexPath.row]\n        return cell\n    }\n```\n\n42. 在上一个函数下方添加以下函数：\n\
    \n```\n    func collectionView(_ collectionView: UICollectionView, didSelectItemAt\
    \ indexPath: IndexPath) {\n        let alert = UIAlertController(title: \"Your\
    \ Choice\", message: \"\\(petArray[indexPath.row])\", preferredStyle: .alert)\n\
    \        let action = UIAlertAction(title: \"OK\", style: .default, handler: nil)\n\
    \        alert.addAction(action)\n        self.present(alert, animated: true,\
    \ completion: nil)\n    }\n```\n\n整个 `ViewController.swift` 文件应如下所示：\n\n```\n\
    \    import UIKit\n    class ViewController: UIViewController, UICollectionViewDataSource,\
    \ UICollectionViewDelegate {\n        @IBOutlet var collectionView: UICollectionView!\n\
    \        let petArray = [\"cat\", \"dog\", \"parakeet\", \"parrot\", \"canary\"\
    , \"finch\", \"tropical fish\", \"goldfish\", \"sea horses\", \"hamster\", \"\
    gerbil\", \"rabbit\", \"turtle\", \"snake\", \"lizard\", \"hermit crab\"]\n  \
    \      override func viewDidLoad() {\n            super.viewDidLoad()\n      \
    \      collectionView.dataSource = self\n            collectionView.delegate =\
    \ self\n            // Do any additional setup after loading the view.\n     \
    \   }\n        func collectionView(_ collectionView: UICollectionView, numberOfItemsInSection\
    \ section: Int) -> Int {\n            return petArray.count\n        }\n     \
    \   func collectionView(_ collectionView: UICollectionView, cellForItemAt indexPath:\
    \ IndexPath) -> UICollectionViewCell {\n            let cell = collectionView.dequeueReusableCell(withReuseIdentifier:\
    \ \"customCell\", for: indexPath) as! itemCell\n            cell.itemLabel.text\
    \ = petArray[indexPath.row]\n            return cell\n        }\n        func\
    \ collectionView(_ collectionView: UICollectionView, didSelectItemAt indexPath:\
    \ IndexPath) {\n            let alert = UIAlertController(title: \"Your Choice\"\
    , message: \"\\(petArray[indexPath.row])\", preferredStyle: .alert)\n        \
    \    let action = UIAlertAction(title: \"OK\", style: .default, handler: nil)\n\
    \            alert.addAction(action)\n            self.present(alert, animated:\
    \ true, completion: nil)\n        }\n    }\n```\n\n43. 点击“运行”按钮，或选择 `Product ➤\
    \ Run`。模拟器窗口会出现，并在 `Collection View` 标签内显示文本，如图 16-11 所示。\n\n![images/329781_5_En_16_Chapter/329781_5_En_16_Fig11_HTML.jpg](img/329781_5_En_16_Fig11_HTML.jpg)\n\
    \n图 16-11  \n在多个集合视图单元格中显示数组中的文本\n\n44. 点击一个单元格。会弹出一个警告，列出您选择的项目。\n\n45. 点击 `OK`\
    \ 关闭警告控制器。\n\n46. 选择 `Simulator ➤ Quit Simulator` 返回 Xcode。\n\n要在集合视图单元格中显示任何数据，都需要在该集合视图单元格内部拖放对象。此示例使用了标签，但您也可以添加图像视图，以便在每个集合视图单元格内显示图片。\n\
    \n"
- fmt: '# Displaying Section Headers in a Collection View


    The simplest Collection View consists of one section, which displays a grid of
    items on the screen. However, it’s more likely that data can be divided into two
    or more groups or sections. When this occurs, a Collection View can display section
    headers to divide items on the screen.


    Creating a section header involves several steps:


    - Enable a section header in the Attributes Inspector pane of the Collection View.

    - Define an arbitrary identifier name for the header.

    - Drag and drop one or more objects into the section header such as a label.

    - Connect the section header objects to `IBOutlets` in a `.swift` file.

    - Implement the `viewForSupplementaryElementOfKind` method to define what appears
    in the header.


    To see how to create and display section headers in a Collection View, follow
    these steps:


    1. Create a new iOS project using the Single View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml))
    and name this new project `CollectionViewSectionApp`. This creates a single view
    for the user interface.


    2. Click the `Main.storyboard` file in the Navigator pane. Xcode displays the
    single view.


    3. Click the Library icon to open the Object Library window.


    4. Drag and drop a Collection View anywhere on the view.


    5. Resize the Collection View so it fills the entire screen.


    6. Choose Editor ➤ Resolve Auto Layout Issues ➤ Reset to Suggested Constraints.
    Xcode adds constraints to the Collection View.


    7. Choose View ➤ Inspectors ➤ Show Size Inspector, or click the Size Inspector
    icon in the upper right corner of the Xcode window.


    8. Click in the Cell Size Width text field, type `100`, and press ENTER.


    9. Click in the Cell Size Height text field, type `100`, and press ENTER.


    10. Choose View ➤ Inspectors ➤ Show Attributes Inspector, or click the Attributes
    Inspector icon in the upper right corner of the Xcode window.


    11. Select the Section Header check box as shown in Figure [16-12](#329781_5_En_16_Chapter.xhtml#Fig12).
    Xcode creates a Collection Reusable View (section header) in the Document Outline
    and on the view as shown in Figure [16-13](#329781_5_En_16_Chapter.xhtml#Fig13).


    ![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig13_HTML.jpg](images/329781_5_En_16_Chapter/329781_5_En_16_Fig13_HTML.jpg)


    Figure 16-13 The Collection Reusable View (section header)


    ![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig12_HTML.jpg](images/329781_5_En_16_Chapter/329781_5_En_16_Fig12_HTML.jpg)


    Figure 16-12 Selecting the Section Header check box in the Attributes Inspector


    12. Click in the Background popup menu and choose a color to make the section
    header easy to see.


    13. Choose File ➤ New ➤ File. A template dialog appears.


    14. Click Cocoa Touch Class under the iOS category and click the **Next** button.
    Another dialog appears.


    15. Click in the Class text field, type `itemCell`, and press ENTER.


    16. Click in the Subclass of popup menu and choose `UICollectionViewCell` as shown
    in Figure [16-14](#329781_5_En_16_Chapter.xhtml#Fig14).


    ![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig14_HTML.jpg](images/329781_5_En_16_Chapter/329781_5_En_16_Fig14_HTML.jpg)


    Figure 16-14 Defining a class name and subclass type for a `.swift` file


    17. Click the **Next** button. Xcode asks where you want to store the `itemCell.swift`
    file.


    18. Click the **Create** button. Xcode displays the `itemCell.swift` file in the
    Navigator pane.


    19. Click Collection Reusable View in the Document Outline and choose View ➤ Inspectors
    ➤ Show Attributes Inspector, or click the Attributes Inspector icon in the upper
    right corner of the Xcode window.


    20. Click in the Identifier text field, type `headerView`, and press ENTER as
    shown in Figure [16-15](#329781_5_En_16_Chapter.xhtml#Fig15).


    ![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig15_HTML.jpg](images/329781_5_En_16_Chapter/329781_5_En_16_Fig15_HTML.jpg)


    Figure 16-15 Defining an identifier for the section header'
