- fmt: "Next, we need to define the object’s position, width, and height. Keep in\
    \ mind that the origin `(0, 0)` is defined as the upper left corner of the screen:\n\
    \n```\nlabel.frame = CGRect(x: 125, y: 125, width: 200, height: 21)\nbutton.frame\
    \ = CGRect(x: 125, y: 300, width: 80, height: 30)\n```\n\nThe first line of code\
    \ defines the `label` to appear 125 points from the left side of the screen and\
    \ down 125 points from the top of the screen. It also defines the width of the\
    \ `label` to be 200 and the height to be 21.\n\nThe second line of code defines\
    \ the `button` to appear 125 points from the left side of the screen and down\
    \ 300 points from the top of the screen. It also defines the width of the `button`\
    \ to be 80 and the height to be 30.\n\nAfter defining the size and position of\
    \ an object, the next step is to customize the object’s appearance. The `label`\
    \ contains the text “This is a label” based on this code:\n\n```\nlabel.text =\
    \ \"This is a label\"\n```\n\nThe `button` gets customized in two different ways.\
    \ First, the button title gets set to “Button” and the color of the text gets\
    \ set to blue:\n\n```\nbutton.setTitle(\"Button\", for: .normal)\nbutton.setTitleColor(UIColor.blue,\
    \ for: .normal)\n```\n\nAfter defining the type of object to display, defining\
    \ its size and position, and customizing it, the final step is to place it on\
    \ the view:\n\n```\nview.addSubview(label)\nview.addSubview(button)\n```\n\nIf\
    \ this looks like a lot of trouble just to create an object to appear on the user\
    \ interface, you’re right. That’s why most developers design their user interface\
    \ visually. Let’s see how this works.\n\n1.  Click the `ViewController.swift`\
    \ file in the Navigator pane. The middle Xcode pane displays the contents of the\
    \ `ViewController.swift` file.\n\n2.  Modify the `ViewController.swift` file so\
    \ it looks like this:\n\n    ```\n    import UIKit\n    class ViewController:\
    \ UIViewController {\n    override func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    }\n    }\n    ```\n\n3.  Click the `Main.storyboard` file in the Navigator\
    \ pane. Xcode displays the storyboard that contains the user interface, which\
    \ consists of a single, blank view.\n\n4.  Click the Library icon. The Objects\
    \ Library window appears, listing all the different objects you can add to your\
    \ user interface as shown in Figure [2-3](#329781_5_En_2_Chapter.xhtml#Fig3).\n\
    \n    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig3_HTML.jpg](images/329781_5_En_2_Chapter/329781_5_En_2_Fig3_HTML.jpg)\n\
    \n    Figure 2-3. The Objects Library lets you choose an object to place on a\
    \ view.\n\n5.  Scroll through the Objects Library list until you find Label, or\
    \ just click in the search field at the top of the Objects Library window, type\
    \ `label`, and press ENTER. The Objects Library window displays the Label object\
    \ as shown in Figure [2-4](#329781_5_En_2_Chapter.xhtml#Fig4).\n\n    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig4_HTML.jpg](images/329781_5_En_2_Chapter/329781_5_En_2_Fig4_HTML.jpg)\n\
    \n    Figure 2-4. Searching for a Label object in the Objects Library window.\n\
    \n6.  Drag and drop the Label object from the Objects Library window to the view.\
    \ As you drag the label, the Objects Library window disappears. When you release\
    \ the left mouse button, the label appears on the view. We can resize and move\
    \ the label to position it, but if you want to define precise values, you’ll need\
    \ to use the Inspector pane.\n\n7.  Click the label to select it. Handles appear\
    \ around the label to show it’s selected.\n\n8.  Choose View ➤ Inspectors ➤ Show\
    \ Attributes Inspector (or click the Show the Attributes Inspector icon at the\
    \ top of the Inspector pane).\n\n9.  Click in the text field that appears above\
    \ the Color popup menu and type `This is a label` and press ENTER as shown in\
    \ Figure [2-5](#329781_5_En_2_Chapter.xhtml#Fig5). The Attributes Inspector pane\
    \ lets us customize the text in a label. Now let’s define the label’s size and\
    \ position.\n\n    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig5_HTML.jpg](images/329781_5_En_2_Chapter/329781_5_En_2_Fig5_HTML.jpg)\n\
    \n    Figure 2-5. Customizing the text that appears on a label using the Attributes\
    \ Inspector pane.\n\n10.  Choose View ➤ Inspectors ➤ Show Size Inspector (or click\
    \ the Show the Size Inspector icon). The Size Inspector pane appears.\n\n11. \
    \ Click in the X text field and type `125`. Then click in the Y text field and\
    \ type `125`.\n\n12.  Click in the Width text field and type `200`. Then click\
    \ the Height text field and type `21`. Press ENTER. This defines the size and\
    \ position of the label as shown in Figure [2-6](#329781_5_En_2_Chapter.xhtml#Fig6).\n\
    \n    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig6_HTML.jpg](images/329781_5_En_2_Chapter/329781_5_En_2_Fig6_HTML.jpg)\n\
    \n    Figure 2-6. Defining the size and position of a label using the Size Inspector\
    \ pane.\n\n13.  Click the Library icon. The Objects Library window appears, listing\
    \ all the different objects you can add to your user interface (see Figure [2-3](#329781_5_En_2_Chapter.xhtml#Fig3)).\n\
    \n14.  Scroll through the Objects Library list until you find Label, or just click\
    \ in the search field at the top of the Objects Library window, type `button`,\
    \ and press ENTER. The Objects Library displays the Button object as shown in\
    \ Figure [2-7](#329781_5_En_2_Chapter.xhtml#Fig7).\n\n    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig7_HTML.jpg](images/329781_5_En_2_Chapter/329781_5_En_2_Fig7_HTML.jpg)\n\
    \n    Figure 2-7. Searching for a Button object in the Objects Library window.\n\
    \n15.  Drag and drop the Button object from the Objects Library window to the\
    \ view. As you drag the button, the Objects Library window disappears. When you\
    \ release the left mouse button, the button appears on the view.\n\n16.  Click\
    \ the button to select it. Handles appear around the button to show it’s selected.\n\
    \n17.  Choose View ➤ Inspectors ➤ Show Attributes Inspector (or click the Show\
    \ the Attributes Inspector icon at the top of the Inspector pane). Notice that\
    \ the Attributes Inspector pane already displays the word “Button” on the button\
    \ and displays it in blue as shown in the Text Color popup menu in Figure [2-8](#329781_5_En_2_Chapter.xhtml#Fig8).\n\
    \n    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig8_HTML.jpg](images/329781_5_En_2_Chapter/329781_5_En_2_Fig8_HTML.jpg)\n\
    \n    Figure 2-8. Customizing the text and color that appears on a button using\
    \ the Attributes Inspector pane.\n\n18.  Choose View ➤ Inspectors ➤ Show Size\
    \ Inspector (or click the Show the Size Inspector icon). The Size Inspector pane\
    \ appears.\n\n19.  Click in the X text field and type `125`. Then click in the\
    \ Y text field and type `300`.\n\n20.  Click in the Width text field and type\
    \ `80`. Then click the Height text field and type `30`. Press ENTER. This defines\
    \ the size and position of the button.\n\n21.  Choose Project ➤ Run or press Command\
    \ + R. Xcode loads the Simulator program that lets you simulate an iOS device.\
    \ When your app loads in the Simulator, it will display a label and a button.\n\
    \n22.  Choose Simulator ➤ Quit Simulator or press Command + Q. The Xcode window\
    \ appears again.\n\n23.  Choose File ➤ Save to save your project.\n\nNotice that\
    \ when you create objects on the user interface programmatically, you had to write\
    \ code to do everything from creating the object to defining its size and position,\
    \ to placing it on the view. On the other hand, designing a user interface visually\
    \ means dragging and dropping objects on a view and then resizing or moving them\
    \ using the mouse. Then to define the appearance, exact size, and position of\
    \ an object, you can open the Attributes Inspector and Size Inspector to choose\
    \ specific values.\n\nMany Xcode projects combine both methods for creating a\
    \ user interface. While it’s generally easier to create user interfaces visually,\
    \ you need to be familiar with writing code to create user interfaces programmatically\
    \ because you may see this in projects created by others."
