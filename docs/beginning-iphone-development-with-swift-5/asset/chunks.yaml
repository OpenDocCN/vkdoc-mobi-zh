    \ the virtual keyboard disappears.\n\n17. Choose `Simulator` ➤ `Quit Simulator`\
    \ to return to Xcode.\n\n### Defining Different Keyboards\n\nOnce you know how\
    \ to make a virtual keyboard appear and disappear without covering up text fields,\
    \ the next step is to learn how to customize the type of keyboard that appears\
    \ when the user clicks in a text field. The default virtual keyboard simply displays\
    \ letters (see Figure [7-19](#329781_5_En_7_Chapter.xhtml#Fig19)). However, what\
    \ if a text field needs to store numbers instead? Then you could display a numeric\
    \ virtual keyboard as shown in Figure [7-20](#329781_5_En_7_Chapter.xhtml#Fig20).\n\
    \n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig20_HTML.jpg](images/329781_5_En_7_Chapter/329781_5_En_7_Fig20_HTML.jpg)\n\
    \n**Figure 7-20** A numeric virtual keyboard\n\nBy giving you different options\
    \ for a keyboard, Xcode lets you choose the best keyboard for a particular text\
    \ field. For example, if you expect the user to type in a URL (web site) address,\
    \ you can choose a virtual keyboard that displays a `.com` key to make it easy\
    \ for users to type common web site addresses. If a text field expects a telephone\
    \ number, then the virtual keyboard can display a typical phone number keypad\
    \ (see Figure [7-20](#329781_5_En_7_Chapter.xhtml#Fig20)). By choosing different\
    \ virtual keyboards, you can make it easy for users to type certain data into\
    \ a text field.\n\nIn our `TextFieldApp` project, we have two text fields. To\
