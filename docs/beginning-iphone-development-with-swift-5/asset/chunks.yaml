    \ UIKit\n    class ViewController: UIViewController, UITableViewDelegate, UITableViewDataSource\
    \ {\n    @IBOutlet var petTable: UITableView!\n    let petArray = [[\"Mammal\"\
    , \"cat\", \"dog\", \"hamster\", \"gerbil\", \"rabbit\"], [\"Bird\", \"parakeet\"\
    , \"parrot\", \"canary\", \"finch\"], [\"Fish\", \"tropical fish\", \"goldfish\"\
