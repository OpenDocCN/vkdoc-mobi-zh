  trans: "\n```swift\nimport UIKit\nclass ViewController: UIViewController {\n   \
    \ @IBOutlet var myTextField: UITextField!\n    override func viewDidLoad() {\n\
    \        super.viewDidLoad()\n        NotificationCenter.default.addObserver(self,\
    \ selector: #selector(keyboardWillShow), name: UIResponder.keyboardWillShowNotification,\
    \ object: nil)\n        NotificationCenter.default.addObserver(self, selector:\
    \ #selector(keyboardWillHide), name: UIResponder.keyboardWillHideNotification,\
    \ object: nil)\n        let tap: UITapGestureRecognizer = UITapGestureRecognizer(target:\
    \ self, action: #selector(self.dismissKeyboard))\n        view.addGestureRecognizer(tap)\n\
    \        myTextField.placeholder = \"Email address here\"\n        myTextField.textColor\
    \ = UIColor.red\n        myTextField.font = UIFont(name: \"Courier\", size: 16)\n\
    \        myTextField.clearButtonMode = .whileEditing\n    }\n    @objc func dismissKeyboard()\
    \ {\n        view.endEditing(true)\n    }\n    @objc func keyboardWillShow(notification:\
    \ NSNotification) {\n        if let keyboardSize = (notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]\
    \ as? NSValue)?.cgRectValue {\n            if self.view.frame.origin.y == 0 {\n\
    \                self.view.frame.origin.y -= keyboardSize.height\n           \
    \ }\n        }\n    }\n    @objc func keyboardWillHide(notification: NSNotification)\
    \ {\n        if ((notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]\
    \ as? NSValue)?.cgRectValue) != nil {\n            if self.view.frame.origin.y\
    \ != 0 {\n                self.view.frame.origin.y = 0\n            }\n      \
    \  }\n    }\n}\n```\n\n4.  点击**运行**按钮或选择**产品 ➤ 运行**。模拟器将会出现。\n\n5.  点击你连接到`myTextField`\
    \ IBOutlet 的文本字段。（该文本字段应以浅灰色显示“电子邮件地址”，此颜色由`placeholder`属性定义。）\n\n6.  点击虚拟键盘。请注意，当你输入时，字母以红色和\
    \ Courier 字体显示。同时注意，一旦你输入一个字符，清除按钮就会出现在最右侧。\n\n7.  选择**模拟器 ➤ 退出模拟器**以返回 Xcode。\n\
    \n在文本字段中定义清除按钮时，你有四种选择：\n\n*   `.never` – 清除按钮永远不会出现在文本字段中。\n*   `.whileEditing`\
    \ – 清除按钮仅在用户开始在文本字段中编辑文本时出现。\n*   `.unlessEditing` – 清除按钮仅在用户未编辑文本字段中的文本时出现。\n\
    *   `.always` – 清除按钮始终出现在文本字段中。\n\n通过修改检查器面板中的属性或使用 Swift 代码，你可以自定义文本字段的外观和行为。\n\
    \n## 使用按钮\n\n按钮代表用户可以点击的单个命令。按钮可以显示文本（通过更改**标题**属性）或图形图像（通过更改**图像**属性）。按钮的主要目的是允许用户选择一个命令，让应用执行某个操作。\n\
    \n与标签等并不总是需要链接到`.swift`文件的对象不同，你总是需要将按钮链接到`.swift`文件中的 IBAction 方法。IBAction 方法包含\
    \ Swift 代码，用于使按钮执行特定任务。\n\n要了解如何为按钮创建 IBAction 方法，请按照以下步骤操作：\n\n1.  确保 **TextFieldApp**\
    \ 项目已在 Xcode 中加载。\n\n2.  在导航器面板中点击 **Main.storyboard** 文件。\n\n3.  点击**库**图标以打开对象库窗口。\n\
    \n4.  在视图上拖放一个按钮。\n\n5.  选择**编辑器 ➤ 解决自动布局问题 ➤ 添加缺失的约束**（从子菜单的上半部分选择）。Xcode 会为按钮添加约束。\n\
    \n6.  选择**视图 ➤ 助理编辑器 ➤ 显示助理编辑器**，或点击 Xcode 窗口右上角的**助理编辑器**图标。Xcode 会在`Main.storyboard`文件旁边显示`ViewController.swift`文件。\n\
    \n7.  将鼠标指针移到选中了**安全文本输入**复选框的文本字段上。\n\n8.  按住 **Control** 键，从该文本字段 **Ctrl-拖动**\
    \ 到`ViewController.swift`文件中现有`IBOutlet`变量的下方。\n\n9.  松开 **Control** 键和鼠标左键。会弹出一个菜单。\n\
    \n10. 在**名称**文本字段中点击，输入 **passwordTextField**，然后点击**连接**按钮。Xcode 会创建一个如下所示的`IBOutlet`变量：\n\
    \n    ```swift\n    @IBOutlet var passwordTextField: UITextField!\n    ```\n\n\
    11. 将鼠标指针移到按钮上，按住 **Control** 键，从按钮 **Ctrl-拖动** 到`ViewController.swift`文件中靠近底部最后一个大括号上方的位置，如图\
    \ 7-27 所示。\n\n    ![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig27_HTML.jpg](img/329781_5_En_7_Fig27_HTML.jpg)\n\
    \    \n    **图 7-27** Ctrl-拖动以为按钮创建 IBAction 方法\n\n12. 松开 **Control** 键和鼠标左键。会弹出一个菜单。\n\
    \n13. 在**名称**文本字段中点击，输入 **displayPassword**。\n\n14. 点击**类型**弹出菜单，选择 **UIButton**。\n\
    \n15. 点击**连接**按钮。Xcode 会创建一个如下所示的 IBAction 方法：\n\n    ```swift\n    @IBAction\
    \ func displayPassword(_ sender: UIButton) {\n    }\n    ```\n\n16. 按如下方式编辑`displayPassword`\
    \ IBAction 方法：\n\n    ```swift\n    @IBAction func displayPassword(_ sender: UIButton)\
    \ {\n        myTextField.text = passwordTextField.text?.uppercased()\n    }\n\
    \    ```\n\n    每次用户点击按钮时，这个 IBAction 方法都会运行。它会获取`passwordTextField`中显示的任何文本，将其转换为大写，然后显示在`myTextField`中。\n\
    \n17. 点击**运行**按钮或选择**产品 ➤ 运行**。模拟器窗口将会出现。\n\n18. 点击**密码**文本字段，使用虚拟键盘输入一个单词。\n\n\
    19. 点击按钮。请注意，你在**密码**文本字段中输入的文本现在会以全部大写的形式显示在另一个文本字段中。\n\n20. 选择**模拟器 ➤ 退出模拟器**以返回\
    \ Xcode。\n\n至此，你应该开始对理解用户界面的工作方式感到更加得心应手了。要访问对象中存储或显示的数据，你需要创建`IBOutlet`变量。要执行某种类型的操作，你需要创建一个`IBAction`方法。\n"
- fmt: '## Summary


    The three most common functions of any user interface involve displaying data,
    allowing the user to input data, and allowing the user to give commands. The most
    common object to display data is the `label`. The most common object to allow
    input is the `text field`. The most common object to accept commands is the `button`.


    With any object, you can modify it through the `Inspector` pane or through Swift
    code. Use the `Inspector` pane when you need to define the initial appearance
    of an object. In many cases, those initial settings will be all you’ll need.


    However, sometimes you may need to change an object’s property while the app runs.
    To do this, you need to write Swift code that modifies an object’s property. To
    find the property name to use when writing Swift code, you need to read Apple’s
    documentation for different objects such as `UIButton` or `UITextField`. You can
    access Apple’s documentation by choosing Help ➤ Developer Documentation.


    When using text fields, you may need to move them out of the way when the virtual
    keyboard appears. To do this, you need to use Swift code to detect when the virtual
    keyboard will appear so your Swift code can slide the view up. When the virtual
    keyboard is no longer needed anymore, then your Swift code must make it slide
    back down and move the view back in its original position as well.


    Since text fields can be used to store different types of data, you can customize
    common types of data for the text field to hold such as names, telephone numbers,
    or e-mail addresses. Besides defining what type of data a text field can hold,
    you can also define what type of virtual keyboard appears when the user wants
    to type in a particular text field. Different virtual keyboards specialize in
    helping the user enter different types of data such as text, numbers, or e-mail
    addresses.


    The basic purpose of any user interface object is to display information, accept
    input, and allow the user to choose commands. Labels, text fields, and buttons
    represent the most common types of objects you’ll need for any user interface.
    All other types of user interface objects perform one or more of these functions
    but just in different ways.


    When designing your own user interface, experiment with the best way to display
    data, accept input from the user, and offer commands for the user to choose. Once
    you understand the basics of labels, text fields, and buttons, you’ll have little
    trouble using other user interface objects.


    # 8. Steppers, Sliders, Progress Views, and Activity Indicator Views


    Labels, text fields, and buttons are the three most common types of user interface
    objects, but they aren’t the only ones used to display information, allow input,
    and allow interaction from the user. Four other user interface objects that can
    display information, allow input, and allow interaction in different ways include:


    - Steppers

    - Sliders

    - Progress Views

    - Activity Indicator Views


    `Steppers` display a minus/plus icon that users can click to increment a value
    by a fixed amount, up or down. By using a stepper, users can define a value without
    typing a specific number.


    `Sliders` give users another way to input a specific value without any typing
    whatsoever. Both steppers and sliders can define minimum and maximum values to
    restrict users into choosing only valid numeric values. For many people, it’s
    easier to click to choose a value than to type that number itself.


    `Progress Views` visually show how far a task needs to go before completion. A
    Progress View displays a bar and highlights part of that bar until the entire
    bar appears highlighted. By visually displaying the completion of a task, a Progress
    View makes it easy to see how much further a task needs to go before it’s done.


    `Activity Indicator Views` provide an animated display to let users know that
    a task is being worked on. Although an Activity Indicator View does not display
    how much further a task needs to go before it’s done, it does provide animation
    to make it obvious that a task is currently being worked on.


    `Steppers` and `sliders` make it easy to input numeric data quickly and accurately.
    `Progress Views` make it easy to see how much further a task needs to go before
    it’s done, while `Activity Indicator Views` simply let users know that something
    is happening.'
  raw: '## Summary


    The three most common functions of any user interface involve displaying data,
    allowing the user to input data, and allowing the user to give commands. The most
    common object to display data is the label. The most common object to allow input
    is the text field. The most common object to accept commands is the button.


    With any object, you can modify it through the Inspector pane or through Swift
    code. Use the Inspector pane when you need to define the initial appearance of
    an object. In many cases, those initial settings will be all you’ll need.


    However, sometimes you may need to change an object’s property while the app runs.
    To do this, you need to write Swift code that modifies an object’s property. To
    find the property name to use when writing Swift code, you need to read Apple’s
    documentation for different objects such as UIButton or UITextField. You can access
    Apple’s documentation by choosing Help ➤ Developer Documentation.


    When using text fields, you may need to move them out of the way when the virtual
    keyboard appears. To do this, you need to use Swift code to detect when the virtual
    keyboard will appear so your Swift code can slide the view up. When the virtual
    keyboard is no longer needed anymore, then your Swift code must make it slide
    back down and move the view back in its original position as well.


    Since text fields can be used to store different types of data, you can customize
    common types of data for the text field to hold such as names, telephone numbers,
    or e-mail addresses. Besides defining what type of data a text field can hold,
    you can also define what type of virtual keyboard appears when the user wants
    to type in a particular text field. Different virtual keyboards specialize in
    helping the user enter different types of data such as text, numbers, or e-mail
    addresses.


    The basic purpose of any user interface object is to display information, accept
    input, and allow the user to choose commands. Labels, text fields, and buttons
    represent the most common types of objects you’ll need for any user interface.
    All other types of user interface objects perform one or more of these functions
    but just in different ways.


    When designing your own user interface, experiment with the best way to display
    data, accept input from the user, and offer commands for the user to choose. Once
    you understand the basics of labels, text fields, and buttons, you’ll have little
    trouble using other user interface objects.


    # 8. Steppers, Sliders, Progress Views, and Activity Indicator Views


    Labels, text fields, and buttons are the three most common types of user interface
    objects, but they aren’t the only ones used to display information, allow input,
    and allow interaction from the user. Four other user interface objects that can
    display information, allow input, and allow interaction in different ways include


    *   Steppers


    *   Sliders


    *   Progress Views


    *   Activity Indicator Views


    Steppers display a minus/plus icon that users can click to increment a value by
    a fixed amount, up or down. By using a stepper, users can define a value without
    typing a specific number.


    Sliders give users another way to input a specific value without any typing whatsoever.
    Both steppers and sliders can define minimum and maximum values to restrict users
    into choosing only valid numeric values. For many people, it’s easier to click
    to choose a value than to type that number itself.


    Progress Views visually show how far a task needs to go before completion. A Progress
    View displays a bar and highlights part of that bar until the entire bar appears
    highlighted. By visually displaying the completion of a task, a Progress View
    makes it easy to see how much further a task needs to go before it’s done.


    Activity Indicator views provide an animated display to let users know that a
    task is being worked on. Although an Activity Indicator View does not display
    how much further a task needs to go before it’s done, it does provide animation
    to make it obvious that a task is currently being worked on.


    Steppers and sliders make it easy to input numeric data quickly and accurately.
    Progress Views make it easy to see how much further a task needs to go before
    it’s done, while Activity Indicator Views simply let users know that something
    is happening.'
  trans: '

    ## 摘要


    任何用户界面的三个最常见功能包括：显示数据、允许用户输入数据以及允许用户下达命令。最常用的数据显示对象是`标签`。最常用的输入对象是`文本字段`。最常用的命令接收对象是`按钮`。


    对于任何对象，你都可以通过`检查器`面板或 Swift 代码对其进行修改。当你需要定义对象的初始外观时，请使用`检查器`面板。在许多情况下，这些初始设置可能就是你所需要的全部内容。


    然而，有时你可能需要在应用运行期间更改对象的属性。为此，你需要编写能够修改对象属性的 Swift 代码。要找到在编写 Swift 代码时应使用的属性名称，你需要阅读
    Apple 针对不同对象（例如 `UIButton` 或 `UITextField`）的文档。你可以通过选择“帮助”➤“开发者文档”来访问 Apple 的文档。


    在使用文本字段时，你可能需要在虚拟键盘出现时将其移开。为此，你需要使用 Swift 代码检测虚拟键盘何时会出现，以便你的 Swift 代码能将视图向上滑动。当不再需要虚拟键盘时，你的
    Swift 代码必须使其滑回原处，同时将视图移回其初始位置。


    由于文本字段可用于存储不同类型的数据，因此你可以为文本字段自定义其可容纳的常见数据类型，例如姓名、电话号码或电子邮件地址。除了定义文本字段能容纳的数据类型外，你还可以定义当用户想要在特定文本字段中输入时，会出现哪种类型的虚拟键盘。不同的虚拟键盘专门用于帮助用户输入不同类型的数据，例如文本、数字或电子邮件地址。


    任何用户界面对象的基本目的都是显示信息、接受输入以及允许用户选择命令。标签、文本字段和按钮代表了任何用户界面中最常用的对象类型。所有其他类型的用户界面对象都执行这些功能中的一种或多种，只是以不同的方式实现。


    在设计自己的用户界面时，请尝试寻找显示数据、接受用户输入以及提供命令供用户选择的最佳方式。一旦你掌握了标签、文本字段和按钮的基础知识，使用其他用户界面对象就不会有太大困难。


    # 8. 步进器、滑块、进度视图和活动指示器视图


    标签、文本字段和按钮是最常见的三种用户界面对象，但它们并非仅有的用于显示信息、接受输入和允许用户交互的对象。另外四种能以不同方式显示信息、接受输入并允许交互的用户界面对象包括：


    - 步进器

    - 滑块

    - 进度视图

    - 活动指示器视图


    `步进器`显示一个减号/加号图标，用户可以点击该图标以固定增量向上或向下增加一个值。通过使用步进器，用户无需键入具体数字即可定义值。


    `滑块`为用户提供了另一种无需任何键入即可输入特定值的方式。步进器和滑块都可以定义最小值和最大值，以限制用户只能选择有效的数值。对许多人来说，点击选择值比键入数字本身更容易。


    `进度视图`直观地显示任务在完成前还需要进行多少。进度视图显示一个条形，并高亮显示该条形的部分内容，直到整个条形都被高亮显示。通过直观地显示任务的完成情况，进度视图可以让人轻松了解任务还需多少进度才能完成。


    `活动指示器视图`提供动画显示，让用户知道某个任务正在处理中。尽管活动指示器视图不显示任务完成前还需多少进度，但它确实提供了动画效果，从而明确告知用户当前有任务正在执行中。


    `步进器`和`滑块`使快速、准确地输入数值数据变得容易。`进度视图`让人轻松了解任务完成前还需多少进度，而`活动指示器视图`则只是让用户知道有事情正在发生。

