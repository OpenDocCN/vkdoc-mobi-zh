    \ Rotation Gesture Recognizer），定义了一个名为`handleRotation`的函数来响应旋转手势，并将该旋转手势链接到图像视图，以便旋转只影响图像视图。最后，它将旋转手势识别器赋值给`rotateMe`变量。\n\
    \n15. 在`viewDidLoad`方法下方添加以下函数：\n\n```\n@objc func handleRotation() {\n    topImageView.transform\
    \ = CGAffineTransform(rotationAngle: rotateMe!.rotation)\n}\n```\n\n完整的`ViewController.swift`文件应如下所示：\n\
    \n```\nimport UIKit\nclass ViewController: UIViewController {\n    @IBOutlet var\
