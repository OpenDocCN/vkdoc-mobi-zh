  trans: "\n# 摘要\n\n每个应用都需要一个用户界面。这个用户界面会被存储在故事板中，而故事板由一个或多个视图组成，其中每个视图代表在单个屏幕上显示的信息。你可以在视图上添加按钮、文本字段、标签和滑块等对象。如果你有两个或更多视图，还需要使用转场（segues）来连接这些视图，以显示它们呈现给用户的顺序。\n\
    \n你可以通过编程（编写代码）或可视化方式向视图添加对象。程序员通常结合使用这两种方法来设计他们的用户界面。你可以通过代码或检查器面板来自定义对象（按钮、标签、文本字段等）。故事板中的每个视图都需要链接到一个`.swift`文件。\n\
    \n由于 iOS 应用可以在不同类型的设备上运行，你需要确保你的应用无论屏幕尺寸或方向如何都能看起来美观。为了帮助你查看应用在不同屏幕尺寸和方向下的用户界面，你可以更改\
    \ Xcode 用于显示故事板的 iOS 设备屏幕尺寸。\n\n在不同屏幕尺寸下测试应用用户界面的另一种方法是运行模拟器程序，并将其设置为模仿不同的 iOS\
    \ 设备，例如 iPad Pro 或 iPhone 8。如果你想要比较应用在不同 iOS 设备屏幕上的显示效果，可以使用预览功能。\n\n用户界面代表了用户所看到的内容，所以无论用户运行的是哪种\
    \ iOS 设备，你的用户界面始终保持美观这一点非常重要。\n\n# 3. 编写 Swift 代码\n\n每个 iOS 应用都需要一个用户界面，但除非你编写\
    \ Swift 代码让它工作，否则这个用户界面不会起任何作用。虽然你可以将所有代码写在一个文件中，但更好的做法是将代码划分到不同的文件中，让每个文件包含相关的代码。一个简单的应用可能只包含少数几个文件，但一个更复杂的应用可能包含数十个甚至数百个包含相关\
    \ Swift 代码的独立文件。在每个文件中，你可以进一步将 Swift 代码组织成不同的函数。\n\n编写 Swift 代码是必要的，用于：\n\n- 从用户界面检索数据\n\
    - 根据检索到的数据计算结果\n- 将该结果显示回用户界面\n\n要从用户界面检索数据，你需要定义称为`IBOutlets`的特殊变量。`IBOutlet`是一个代表用户界面上显示的对象的变量。通过`IBOutlet`，你的其余\
    \ Swift 代码可以以某种方式访问和操作这些数据。\n\n要根据检索到的数据计算结果，你可以编写 Swift 代码来操作数据，但更常见的是同时使用苹果的框架。苹果的框架包含数十个函数，你可以用它们来执行常见任务。这样你就可以使用经过测试的代码，从而花更多时间编写能让你的应用实现有用且独特功能的代码。\n\
    \n要让你的应用执行某些操作，你可以创建称为`IBActions`的特殊函数。`IBAction`使一个用户界面对象具有交互性，例如响应用户点击按钮、在文本字段中输入文本或操作滑块等操作。\n\
    \n一旦你的应用完成计算某些结果，最后一步是将结果显示回用户界面。为此，你将数据存储回`IBOutlet`变量中，以便数据可以出现在用户界面上。\n\n`IBOutlet`变量和`IBAction`函数存储在链接到视图控制器的`.swift`文件中，该视图控制器显示与`IBOutlet`变量或`IBAction`函数连接的用户界面对象。请记住，每个视图控制器都链接到一个`.swift`文件。\n\
    \n要了解`IBOutlets`和`IBAction`函数如何工作，请遵循以下步骤：\n\n1. 打开你的`MyFirstApp`项目（或创建一个新的单视图应用\
    \ iOS 项目）。\n2. 在导航器面板中点击`Main.storyboard`文件。中间的 Xcode 面板会显示你的应用用户界面的内容。它应该显示一个按钮和一个标签。\n\
    3. 点击库图标打开对象库窗口。然后输入`text field`。\n4. 将文本字段从对象库窗口拖到用户界面，如图 3-1 所示。\n\n   ![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig1_HTML.jpg](img/329781_5_En_3_Fig1_HTML.jpg)\n\
    \n   图 3-1. 向视图添加文本字段\n\n5. 调整文本字段的宽度使其更宽。确切的宽度并不重要。此时，你的用户界面应该由一个标签、一个文本字段和一个按钮组成。如果我们运行这个应用，用户可以点击按钮或在文本字段中输入，但什么都不会发生。这是因为我们还没有编写任何\
    \ Swift 代码来让任何功能生效。\n\n## 创建 IBOutlet 变量\n\n`IBOutlet` 无非是一个将你的 Swift 代码连接到用户界面对象（如文本字段或标签）的变量。通过使用\
    \ `IBOutlet`，你可以从用户界面对象检索数据，或者将信息放入该用户界面对象中以供显示。\n\n在 Swift 中创建变量时，你通常需要声明一个变量名及其可以持有的数据类型，例如：\n\
    \n```\nvar age : Int\n```\n\n上述代码声明了一个名为 `age` 的变量，它可以持有整型 (`Int`) 值。当你创建 `IBOutlets`\
    \ 时，你也必须声明一个变量名。两个不同之处在于，你还必须将该变量标识为 `IBOutlet`，并且必须将其类型声明为用户界面对象，例如：\n\n```\n\
    @IBOutlet var age: UITextField!\n```\n\n要标识一个 `IBOutlet`，你必须在 `var` 前使用 `@IBOutlet`。接下来，你必须定义该\
    \ `IBOutlet` 连接到的用户界面对象的类型。在前面的示例中，`age` `IBOutlet` 连接到了一个文本字段 (`UITextField`)。`IBOutlet`\
    \ 可以连接到的其他一些常见的用户界面对象类型包括 `UILabel`、`UIButton` 或 `UISlider`。\n"
- fmt: "# Note\n\nAny user interface object that needs to retrieve or display data\
    \ must be connected to a single `IBOutlet` variable. However, not all user interface\
    \ objects need to be connected to an `IBOutlet` if they won’t be used to retrieve\
    \ or display data.\n\nOne way to create an `IBOutlet` is to type the code yourself.\
    \ Then you have to link the `IBOutlet` from your code to the user interface object\
    \ on the storyboard. A second option is to first create a link from a user interface\
    \ object to your `.swift` file and then type just the `IBOutlet` variable name\
    \ while Xcode types the rest of the code.\n\nTo link code to a storyboard, we\
    \ have to divide the middle Xcode pane in half using a feature called the Assistant\
    \ Editor. This will display the storyboard side by side next to a `.swift` file.\
    \ Let’s see how this works.\n\n1. Open the `MyFirstApp` project that displays\
    \ a label, button, and text field on a view (see Figure [3-1](#329781_5_En_3_Chapter.xhtml#Fig1)).\
    \ First, we’re going to look at the user interface of the app.\n\n2. Click the\
    \ `Main.storyboard` file in the Navigator pane. The middle Xcode pane displays\
    \ the app’s storyboard that contains the user interface.\n\n3. Click the controller\
    \ icon (a yellow circle with a white square inside) either in the Document Outline\
    \ or at the top of the view as shown in Figure [3-2](#329781_5_En_3_Chapter.xhtml#Fig2).\
    \ This selects the controller that contains the user interface objects to link.\
    \ In our simple app, there’s only one controller, but in a more complicated app,\
    \ there will be multiple controllers so you need to tell Xcode which one you want\
    \ to use.\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig2_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig2_HTML.jpg)\n\
    \n**Figure 3-2.** Selecting a controller\n\n4. Choose **View ➤ Assistant Editor\
    \ ➤ Show Assistant Editor** or click the Assistant Editor icon. Xcode displays\
    \ the controller and the `.swift` file that it’s linked to as shown in Figure\
    \ [3-3](#329781_5_En_3_Chapter.xhtml#Fig3).\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig3_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig3_HTML.jpg)\n\
    \n**Figure 3-3.** Opening the Assistant Editor\n\n5. Click in the `ViewController.swift`\
    \ file and type `@IBOutlet var labelResult: UILabel!` So the entire code in the\
    \ `ViewController.swift` file should look like this:\n\n```\nimport UIKit\nclass\
    \ ViewController: UIViewController {\n    @IBOutlet var labelResult: UILabel!\n\
    \    override func viewDidLoad() {\n        super.viewDidLoad()\n    }\n}\n```\n\
    \nNotice that an empty circle appears to the left of your newly created `IBOutlet`\
    \ as shown in Figure [3-4](#329781_5_En_3_Chapter.xhtml#Fig4). This empty circle\
    \ represents the link to your user interface object. Because it’s empty, that\
    \ means this `IBOutlet` hasn’t been linked to any user interface object yet.\n\
    \n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig4_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig4_HTML.jpg)\n\
    \n**Figure 3-4.** An `IBOutlet` that hasn’t been linked to a user interface object\n\
    \n6. Move the mouse pointer over this empty circle, hold down the left mouse button,\
    \ and drag the mouse until it appears over the label either on the storyboard\
    \ or in the Document Outline as shown in Figure [3-5](#329781_5_En_3_Chapter.xhtml#Fig5).\n\
    \n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig5_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig5_HTML.jpg)\n\
    \n**Figure 3-5.** Linking an `IBOutlet` to a user interface object\n\n7. Release\
    \ the left mouse button. Move the mouse pointer over the circle (which should\
    \ no longer appear empty) that appears to the left of the `IBOutlet`. Xcode highlights\
    \ the user interface object linked to that `IBOutlet` and displays the name of\
    \ that `IBOutlet` underneath as shown in Figure [3-6](#329781_5_En_3_Chapter.xhtml#Fig6).\n\
    \n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig6_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig6_HTML.jpg)\n\
    \n**Figure 3-6.** Verifying a connection between an `IBOutlet` and a user interface\
    \ object\n\n8. Click the label on the storyboard or in the Document Outline to\
    \ select it. Then choose **View ➤ Inspectors ➤ Show Connections Inspector**, or\
    \ click the **Show the Connections Inspector** icon. Xcode shows that the `labelResult`\
    \ `IBOutlet` is connected to the `ViewController.swift` file as shown in Figure\
    \ [3-7](#329781_5_En_3_Chapter.xhtml#Fig7).\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig7_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig7_HTML.jpg)\n\
    \n**Figure 3-7.** Verifying that an `IBOutlet` is connected to a user interface\
    \ object in the Connections Inspector\n\nWriting code is one way to create an\
    \ `IBOutlet`, but you need to know what type of user interface object you’re connecting\
    \ to such as a `UITextField` or a `UILabel`. A faster and simpler way to create\
    \ an `IBOutlet` is to Ctrl-drag from the user interface object (such as a text\
    \ field or label) into the `.swift` file. We’ll use this method for the text field.\n\
    \n1. Move the mouse over the text field on the storyboard or in the Document Outline,\
    \ hold down the Control key, and Ctrl-drag the mouse from the text field to the\
    \ area in the `ViewController.swift` file underneath the existing `IBOutlet` as\
    \ shown in Figure [3-8](#329781_5_En_3_Chapter.xhtml#Fig8).\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig8_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig8_HTML.jpg)\n\
    \n**Figure 3-8.** Ctrl-dragging from a user interface object to a `.swift` file\n\
    \n2. When a horizontal line appears inside the `.swift` file, release the Control\
    \ key and the left mouse button. A popup window appears as shown in Figure [3-9](#329781_5_En_3_Chapter.xhtml#Fig9).\n\
    \n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig9_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig9_HTML.jpg)\n\
    \n**Figure 3-9.** Customizing the text that appears on a label using the Attributes\
    \ Inspector pane\n\n3. Click in the **Name** text field and type `textMessage`.\
    \ This name for your `IBOutlet` can be anything you want.\n\n4. Click the **Connect**\
    \ button. Xcode creates an `IBOutlet` in your `.swift` file:\n\n```\n@IBOutlet\
    \ var textMessage: UITextField!\n```\n\nNotice that when you Ctrl-drag from a\
    \ user interface object in the storyboard or Document Outline, Xcode automatically\
    \ types most of the necessary code. All you need to do is type a descriptive name\
    \ for your `IBOutlet`. Because this method involves less typing (which decreases\
    \ your chances of making a mistake), it’s often easier and more reliable to use\
    \ this Ctrl-drag method instead to create `IBOutlet`s.\n\n1. Right-click the text\
    \ field. Xcode displays a popup menu showing you the Connections Inspector as\
    \ shown in Figure [3-10](#329781_5_En_3_Chapter.xhtml#Fig10). Right-clicking an\
    \ object can be faster than opening the Connections Inspector pane.\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig10_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig10_HTML.jpg)\n\
    \n**Figure 3-10.** Right-clicking a user interface object displays the Connections\
    \ Inspector\n\n2. Click the **Close (X)** icon in the upper left corner of the\
    \ popup menu to make it go away.\n\n3. Choose **View ➤ Standard Editor ➤ Show\
    \ Standard Editor**, or click the **Standard Editor** icon as shown in Figure\
    \ [3-11](#329781_5_En_3_Chapter.xhtml#Fig11). The Standard Editor appears, displaying\
    \ the contents of only one file in the middle Xcode pane.\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig11_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig11_HTML.jpg)\n\
    \n**Figure 3-11.** Returning to the Standard Editor\n\nAt this point, we’ve connected\
    \ our label and text field to two different `IBOutlet`s. This allows us to retrieve\
    \ data from the user interface and display new information on the user interface.\
    \ Of course, `IBOutlet`s simply represent user interface objects, but to make\
    \ an app truly interactive, we need to create something called `IBAction` methods."
  raw: "### Note\n\nAny user interface object that needs to retrieve or display data\
    \ must be connected to a single IBOutlet variable. However, not all user interface\
    \ objects need to be connected to an IBOutlet if they won’t be used to retrieve\
    \ or display data.\n\nOne way to create an IBOutlet is to type the code yourself.\
    \ Then you have to link the IBOutlet from your code to the user interface object\
    \ on the storyboard. A second option is to first create a link from a user interface\
    \ object to your .swift file and then type just the IBOutlet variable name while\
    \ Xcode types the rest of the code.\n\nTo link code to a storyboard, we have to\
    \ divide the middle Xcode pane in half using a feature called the Assistant Editor.\
    \ This will display the storyboard side by side next to a .swift file. Let’s see\
    \ how this works.\n\n1.  Open the MyFirstApp project that displays a label, button,\
    \ and text field on a view (see Figure [3-1](#329781_5_En_3_Chapter.xhtml#Fig1)).\
    \ First, we’re going to look at the user interface of the app.\n\n2.  Click the\
    \ Main.storyboard file in the Navigator pane. The middle Xcode pane displays the\
    \ app’s storyboard that contains the user interface.\n\n3.  Click the controller\
    \ icon (a yellow circle with a white square inside) either in the Document Outline\
    \ or at the top of the view as shown in Figure [3-2](#329781_5_En_3_Chapter.xhtml#Fig2).\
    \ This selects the controller that contains the user interface objects to link.\
    \ In our simple app, there’s only one controller, but in a more complicated app,\
    \ there will be multiple controllers so you need to tell Xcode which one you want\
    \ to use.\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig2_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig2_HTML.jpg)\n\
    \nFigure 3-2.\n\nSelecting a controller\n\n4.  Choose View ➤ Assistant Editor\
    \ ➤ Show Assistant Editor or click the Assistant Editor icon. Xcode displays the\
    \ controller and the .swift file that it’s linked to as shown in Figure [3-3](#329781_5_En_3_Chapter.xhtml#Fig3).\n\
    \n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig3_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig3_HTML.jpg)\n\
    \nFigure 3-3.\n\nOpening the Assistant Editor\n\n5.  Click in the ViewController.swift\
    \ file and type @IBOutlet var labelResult: UILabel! So the entire code in the\
    \ ViewController.swift file should look like this:\n\n```\n    import UIKit\n\
    \    class ViewController: UIViewController {\n    @IBOutlet var labelResult:\
    \ UILabel!\n    override func viewDidLoad() {\n    super.viewDidLoad()\n    }\n\
    \    }\n    ```\n\nNotice that an empty circle appears to the left of your newly\
    \ created IBOutlet as shown in Figure [3-4](#329781_5_En_3_Chapter.xhtml#Fig4).\
    \ This empty circle represents the link to your user interface object. Because\
    \ it’s empty, that means this IBOutlet hasn’t been linked to any user interface\
    \ object yet.\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig4_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig4_HTML.jpg)\n\
    \nFigure 3-4.\n\nAn IBOutlet that hasn’t been linked to a user interface object\n\
    \n6.  Move the mouse pointer over this empty circle, hold down the left mouse\
    \ button, and drag the mouse until it appears over the label either on the storyboard\
    \ or in the Document Outline as shown in Figure [3-5](#329781_5_En_3_Chapter.xhtml#Fig5).\n\
    \n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig5_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig5_HTML.jpg)\n\
    \nFigure 3-5.\n\nLinking an IBOutlet to a user interface object\n\n7.  Release\
    \ the left mouse button. Move the mouse pointer over the circle (which should\
    \ no longer appear empty) that appears to the left of the IBOutlet. Xcode highlights\
    \ the user interface object linked to that IBOutlet and displays the name of that\
    \ IBOutlet underneath as shown in Figure [3-6](#329781_5_En_3_Chapter.xhtml#Fig6).\n\
    \n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig6_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig6_HTML.jpg)\n\
    \nFigure 3-6.\n\nVerifying a connection between an IBOutlet and a user interface\
    \ object\n\n8.  Click the label on the storyboard or in the Document Outline to\
    \ select it. Then choose View ➤ Inspectors ➤ Show Connections Inspector, or click\
    \ the Show the Connections Inspector icon. Xcode shows that the labelResult IBOutlet\
    \ is connected to the ViewController.swift file as shown in Figure [3-7](#329781_5_En_3_Chapter.xhtml#Fig7).\n\
    \n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig7_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig7_HTML.jpg)\n\
    \nFigure 3-7.\n\nVerifying that an IBOutlet is connected to a user interface object\
    \ in the Connections Inspector\n\nWriting code is one way to create an IBOutlet,\
    \ but you need to know what type of user interface object you’re connecting to\
    \ such as a UITextField or a UILabel. A faster and simpler way to create an IBOutlet\
    \ is to Ctrl-drag from the user interface object (such as a text field or label)\
    \ into the .swift file. We’ll use this method for the text field.\n\n1.  Move\
    \ the mouse over the text field on the storyboard or in the Document Outline,\
    \ hold down the Control key, and Ctrl-drag the mouse from the text field to the\
    \ area in the ViewController.swift file underneath the existing IBOutlet as shown\
    \ in Figure [3-8](#329781_5_En_3_Chapter.xhtml#Fig8).\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig8_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig8_HTML.jpg)\n\
    \nFigure 3-8.\n\nCtrl-dragging from a user interface object to a .swift file\n\
    \n2.  When a horizontal line appears inside the .swift file, release the Control\
    \ key and the left mouse button. A popup window appears as shown in Figure [3-9](#329781_5_En_3_Chapter.xhtml#Fig9).\n\
    \n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig9_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig9_HTML.jpg)\n\
    \nFigure 3-9.\n\nCustomizing the text that appears on a label using the Attributes\
    \ Inspector pane\n\n3.  Click in the Name text field and type **textMessage**.\
    \ This name for your IBOutlet can be anything you want.\n\n4.  Click the Connect\
    \ button. Xcode creates an IBOutlet in your .swift file:\n\n```\n    @IBOutlet\
    \ var textMessage: UITextField!\n    ```\n\nNotice that when you Ctrl-drag from\
    \ a user interface object in the storyboard or Document Outline, Xcode automatically\
    \ types most of the necessary code. All you need to do is type a descriptive name\
    \ for your IBOutlet. Because this method involves less typing (which decreases\
    \ your chances of making a mistake), it’s often easier and more reliable to use\
    \ this Ctrl-drag method instead to create IBOutlets.\n\n1.  Right-click the text\
    \ field. Xcode displays a popup menu showing you the Connections Inspector as\
    \ shown in Figure [3-10](#329781_5_En_3_Chapter.xhtml#Fig10). Right-clicking an\
    \ object can be faster than opening the Connections Inspector pane.\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig10_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig10_HTML.jpg)\n\
    \nFigure 3-10.\n\nRight-clicking a user interface object displays the Connections\
    \ Inspector\n\n2.  Click the Close (X) icon in the upper left corner of the popup\
    \ menu to make it go away.\n\n3.  Choose View ➤ Standard Editor ➤ Show Standard\
    \ Editor, or click the Standard Editor icon as shown in Figure [3-11](#329781_5_En_3_Chapter.xhtml#Fig11).\
    \ The Standard Editor appears, displaying the contents of only one file in the\
    \ middle Xcode pane.\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig11_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig11_HTML.jpg)\n\
    \nFigure 3-11.\n\nReturning to the Standard Editor\n\nAt this point, we’ve connected\
    \ our label and text field to two different IBOutlets. This allows us to retrieve\
    \ data from the user interface and display new information on the user interface.\
    \ Of course, IBOutlets simply represent user interface objects, but to make an\
    \ app truly interactive, we need to create something called IBAction methods ."
  trans: "\n# 注意\n\n任何需要检索或显示数据的用户界面对象，都必须连接到一个唯一的`IBOutlet`变量。不过，如果某些用户界面对象不用于检索或显示数据，则无需连接到`IBOutlet`。\n\
    \n创建`IBOutlet`的一种方法是手动编写代码。之后，你需要将代码中的`IBOutlet`与故事板上的用户界面对象进行链接。第二种方法是，先从用户界面对象创建一条到你的`.swift`文件的链接，然后只输入`IBOutlet`变量名，由\
    \ Xcode 替你完成其余代码的编写。\n\n要将代码链接到故事板，我们需要使用一个名为“助理编辑器”的功能，将 Xcode 的中间窗格一分为二。这样，故事板就会与一个`.swift`文件并排显示。下面来看看具体操作。\n\
    \n1.  打开在视图上显示了一个标签、按钮和文本字段的 `MyFirstApp` 项目（见图 3-1）。首先，我们查看一下这个应用程序的用户界面。\n\n\
    2.  在导航器窗格中，点击 `Main.storyboard` 文件。Xcode 的中间窗格会显示包含用户界面的应用程序故事板。\n\n3.  点击控制器图标（一个内含白色矩形的黄色圆圈），它位于文档大纲中，或视图顶部（如图\
    \ 3-2 所示）。这样会选中包含要链接的用户界面对象的控制器。在我们这个简单的应用程序中，只有一个控制器；但在更复杂的应用程序中，会有多个控制器，因此你需要告诉\
    \ Xcode 你要使用哪一个。\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig2_HTML.jpg](img/329781_5_En_3_Fig2_HTML.jpg)\n\
    \n**图 3-2.** 选择一个控制器\n\n4.  选择 **视图 ➜ 助理编辑器 ➜ 显示助理编辑器**，或点击助理编辑器图标。Xcode 会显示该控制器及其链接到的`.swift`文件，如图\
    \ 3-3 所示。\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig3_HTML.jpg](img/329781_5_En_3_Fig3_HTML.jpg)\n\
    \n**图 3-3.** 打开助理编辑器\n\n5.  在 `ViewController.swift` 文件中点击，然后输入 `@IBOutlet var\
    \ labelResult: UILabel!`。因此，`ViewController.swift` 文件中的全部代码应该是这样的：\n\n```\nimport\
    \ UIKit\nclass ViewController: UIViewController {\n    @IBOutlet var labelResult:\
    \ UILabel!\n    override func viewDidLoad() {\n        super.viewDidLoad()\n \
    \   }\n}\n```\n\n请注意，在你新建的 `IBOutlet` 左侧会出现一个空心圆圈，如图 3-4 所示。这个空心圆圈代表指向你用户界面对象的链接。因为它是空心的，所以意味着这个\
    \ `IBOutlet` 尚未链接到任何用户界面对象。\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig4_HTML.jpg](img/329781_5_En_3_Fig4_HTML.jpg)\n\
    \n**图 3-4.** 一个尚未链接到用户界面对象的 `IBOutlet`\n\n6.  将鼠标指针移到这个空心圆圈上，按住鼠标左键，然后拖动鼠标，直到它出现在故事板或文档大纲中的标签上方，如图\
    \ 3-5 所示。\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig5_HTML.jpg](img/329781_5_En_3_Fig5_HTML.jpg)\n\
    \n**图 3-5.** 将 `IBOutlet` 链接到用户界面对象\n\n7.  松开鼠标左键。将鼠标指针移到 `IBOutlet` 左侧的圆圈上（此时圆圈应该不再是空心的）。Xcode\
    \ 会高亮显示链接到该 `IBOutlet` 的用户界面对象，并在其下方显示该 `IBOutlet` 的名称，如图 3-6 所示。\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig6_HTML.jpg](img/329781_5_En_3_Fig6_HTML.jpg)\n\
    \n**图 3-6.** 验证 `IBOutlet` 与用户界面对象之间的连接\n\n8.  点击故事板或文档大纲中的标签以将其选中。然后选择 **视图 ➜\
    \ 检查器 ➜ 显示连接检查器**，或点击**显示连接检查器**图标。Xcode 会显示 `labelResult` 这个 `IBOutlet` 已连接到\
    \ `ViewController.swift` 文件，如图 3-7 所示。\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig7_HTML.jpg](img/329781_5_En_3_Fig7_HTML.jpg)\n\
    \n**图 3-7.** 在连接检查器中验证 `IBOutlet` 已连接到用户界面对象\n\n编写代码是创建 `IBOutlet` 的一种方式，但你需要知道你要连接的是何种类型的用户界面对象，例如\
    \ `UITextField` 或 `UILabel`。一种更快更简单的创建 `IBOutlet` 的方法是，按住 Control 键，从用户界面对象（比如文本字段或标签）拖拽到\
    \ `.swift` 文件中。我们将对文本字段使用这种方法。\n\n1.  将鼠标移到故事板或文档大纲中的文本字段上，按住 Control 键，然后按住 Control\
    \ 键从文本字段拖拽到 `ViewController.swift` 文件中现有 `IBOutlet` 下方的区域，如图 3-8 所示。\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig8_HTML.jpg](img/329781_5_En_3_Fig8_HTML.jpg)\n\
    \n**图 3-8.** 按住 Control 键从用户界面对象拖拽到 `.swift` 文件\n\n2.  当一条水平线出现在 `.swift` 文件内部时，松开\
    \ Control 键和鼠标左键。会弹出一个窗口，如图 3-9 所示。\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig9_HTML.jpg](img/329781_5_En_3_Fig9_HTML.jpg)\n\
    \n**图 3-9.** 使用属性检查器窗格自定义标签上显示的文本\n\n3.  点击**名称**文本字段，输入 `textMessage`。你为这个 `IBOutlet`\
    \ 起的名称可以任意。\n\n4.  点击**连接**按钮。Xcode 会在你的 `.swift` 文件中创建一个 `IBOutlet`：\n\n```\n\
    @IBOutlet var textMessage: UITextField!\n```\n\n请注意，当你按住 Control 键从故事板或文档大纲中的用户界面对象拖拽时，Xcode\
    \ 会自动输入大部分必要的代码。你只需要为你的 `IBOutlet` 输入一个描述性的名称即可。由于这种方法减少了输入量（从而降低了出错的可能性），因此使用这种\
    \ Ctrl-拖拽方法创建 `IBOutlet` 通常更简单、更可靠。\n\n1.  右键点击文本字段。Xcode 会显示一个弹出菜单，展示连接检查器，如图\
    \ 3-10 所示。右键点击对象可能比打开连接检查器窗格更快。\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig10_HTML.jpg](img/329781_5_En_3_Fig10_HTML.jpg)\n\
    \n**图 3-10.** 右键点击用户界面对象会显示连接检查器\n\n2.  点击弹出菜单左上角的**关闭 (X)** 图标使其消失。\n\n3.  选择\
    \ **视图 ➜ 标准编辑器 ➜ 显示标准编辑器**，或点击**标准编辑器**图标，如图 3-11 所示。标准编辑器会出现，在 Xcode 的中间窗格中仅显示一个文件的内容。\n\
    \n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig11_HTML.jpg](img/329781_5_En_3_Fig11_HTML.jpg)\n\
    \n**图 3-11.** 返回标准编辑器\n\n至此，我们已经将标签和文本字段连接到了两个不同的 `IBOutlet`。这使得我们能够从用户界面检索数据，并在用户界面上显示新信息。当然，`IBOutlet`\
    \ 仅仅代表用户界面对象，但要使应用程序真正具有交互性，我们需要创建名为 `IBAction` 的方法。\n"
- fmt: "### Note\n\nForgetting to connect `IBOutlets` to user interface objects (or\
    \ connecting `IBOutlets` to the wrong object) is a common source of errors when\
    \ developing iOS apps. Any time your user interface doesn’t seem to be working\
    \ right, open the Connections Inspector pane and check to see if your `IBOutlets`\
    \ are connected properly.\n\n## Creating IBAction Methods\n\nIf we run our app\
    \ right now, the user will see a button on the screen, but the button won’t do\
    \ anything. To make any part of the user interface actually work, we need to create\
    \ `IBAction` methods.\n\nAn `IBAction` method contains Swift code that runs every\
    \ time the user interacts with an object on the user interface such as a button,\
    \ slider, or switch. `IBAction` methods let users make an app do something useful.\n\
    \nTo create an `IBAction` method, you need to use the Assistant Editor to display\
    \ the storyboard side by side with the `.swift` file linked to a particular controller.\
    \ Let’s see how this works.\n\n1. Click the `Main.storyboard` file in the Navigator\
    \ pane. Xcode’s middle pane displays the storyboard that contains your app’s user\
    \ interface.\n\n2. Click the controller icon (a yellow circle with a white square\
    \ inside) either in the Document Outline or at the top of the view (see Figure\
    \ [3‑2](#329781_5_En_3_Chapter.xhtml#Fig2)). This selects the controller that\
    \ contains the user interface objects to link.\n\n3. Choose View ➤ Assistant Editor\
    \ ➤ Show Assistant Editor or click the Assistant Editor icon. Xcode displays the\
    \ controller and the `.swift` file that it’s linked to (see Figure [3‑3](#329781_5_En_3_Chapter.xhtml#Fig3)).\n\
    \n4. Click the button to select it.\n\n5. Hold down the Control key and Ctrl‑drag\
    \ the mouse from the button to the area above the last curly bracket in the `ViewController.swift`\
    \ file as shown in Figure [3‑12](#329781_5_En_3_Chapter.xhtml#Fig12).\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig12_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig12_HTML.jpg)\n\
    \nFigure 3-12. Ctrl‑dragging from a button to the `.swift` file\n\n6. Release\
    \ the Control key and the left mouse button. A popup window appears. Make sure\
    \ the Connection popup menu displays Action.\n\n**Note** One common mistake is\
    \ to create an `IBOutlet` variable (when the Connection popup menu displays Outlet)\
    \ instead of an `IBAction` method (when the Connection popup menu displays Action).\
    \ Always check the Connection popup menu to make sure it displays Outlet or Action,\
    \ depending on what you want to create.\n\n7. Click in the Name text field and\
    \ type `changeButton`.\n\n8. Click in the Type popup menu and choose `UIButton`\
    \ as shown in Figure [3‑13](#329781_5_En_3_Chapter.xhtml#Fig13).\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig13_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig13_HTML.jpg)\n\
    \nFigure 3-13. The Attributes Inspector lets you customize how the scene appears\n\
    \n9. Click the Connect button. Xcode creates an `IBAction` method:\n\n```swift\n\
    @IBAction func changeButton(_ sender: UIButton) {\n}\n```\n\nThis `IBAction` method\
    \ runs every time the user taps on the button. Now we need to write Swift code\
    \ inside this `IBAction` method to make it actually do something.\n\n10. Modify\
    \ this `IBAction` method as follows:\n\n```swift\n@IBAction func changeButton(_\
    \ sender: UIButton) {\n    labelResult.text = textMessage.text\n}\n```\n\nNotice\
    \ that as you type, Xcode displays a list of commands it thinks you want to type\
    \ as shown in Figure [3‑14](#329781_5_En_3_Chapter.xhtml#Fig14). Rather than type\
    \ a complete command, you can simply select the command you want and press ENTER\
    \ to make Xcode type this command for you automatically.\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig14_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig14_HTML.jpg)\n\
    \nFigure 3-14. Xcode’s auto‑complete feature tries to guess the command you want\
    \ to type\n\nThe preceding code for the `IBAction` method simply takes the text\
    \ stored in the `textMessage` `IBOutlet` (which is connected to the text field)\
    \ and displays it in the `labelResult` `IBOutlet` (which is connected to the label).\
    \ Let’s see it actually work.\n\n1. Choose Product ➤ Run, or click the Run button.\
    \ The Simulator appears.\n\n2. Click in the text field and type `Hello there!`\n\
    \n3. Click the button. Notice that the label now displays `Hello there!` as shown\
    \ in Figure [3‑15](#329781_5_En_3_Chapter.xhtml#Fig15).\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig15_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig15_HTML.jpg)\n\
    \nFigure 3-15. Running the app in the Simulator\n\n4. Choose Simulator ➤ Quit\
    \ Simulator. The Xcode window appears again.\n\n5. Choose View ➤ Standard Editor\
    \ ➤ Show Standard Editor, or click the Standard Editor icon (see Figure [3‑11](#329781_5_En_3_Chapter.xhtml#Fig11)).\
    \ The Standard Editor appears, displaying the contents of only one file in the\
    \ middle Xcode pane.\n\nThis example demonstrates several key principles of writing\
    \ Swift code:\n\n* Every user interface object that needs to retrieve or display\
    \ data must be connected to an `IBOutlet` variable.\n\n* Every user interface\
    \ object that the user interacts with must be connected to an `IBAction` method.\n\
    \n* The Assistant Editor helps you create `IBOutlet` variables and `IBAction`\
    \ methods.\n\n* As you type Swift code, Xcode displays lists of commands it thinks\
    \ you want to type."
  raw: "### Note\n\nForgetting to connect IBOutlets to user interface objects (or\
    \ connecting IBOutlets to the wrong object) is a common source of errors when\
    \ developing iOS apps. Any time your user interface doesn’t seem to be working\
    \ right, open the Connections Inspector pane and check to see if your IBOutlets\
    \ are connected properly.\n\n## Creating IBAction Methods\n\nIf we run our app\
    \ right now, the user will see a button on the screen, but the button won’t do\
    \ anything. To make any part of the user interface actually work, we need to create\
    \ IBAction methods.\n\nAn IBAction method contains Swift code that runs every\
    \ time the user interacts with an object on the user interface such as a button,\
    \ slider, or switch. IBAction methods let users make an app do something useful.\n\
    \nTo create an IBAction method, you need to use the Assistant Editor to display\
    \ the storyboard side by side with the .swift file linked to a particular controller.\
    \ Let’s see how this works .\n\n1.  Click the Main.storyboard file in the Navigator\
    \ pane. Xcode’s middle pane displays the storyboard that contains your app’s user\
    \ interface.\n\n2.  Click the controller icon (a yellow circle with a white square\
    \ inside) either in the Document Outline or at the top of the view (see Figure\
    \ [3-2](#329781_5_En_3_Chapter.xhtml#Fig2)). This selects the controller that\
    \ contains the user interface objects to link.\n\n3.  Choose View ➤ Assistant\
    \ Editor ➤ Show Assistant Editor or click the Assistant Editor icon. Xcode displays\
    \ the controller and the .swift file that it’s linked to (see Figure [3-3](#329781_5_En_3_Chapter.xhtml#Fig3)).\n\
    \n4.  Click the button to select it.\n\n5.  Hold down the Control key and Ctrl-drag\
    \ the mouse from the button to the area above the last curly bracket in the ViewController.swift\
    \ file as shown in Figure [3-12](#329781_5_En_3_Chapter.xhtml#Fig12).\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig12_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig12_HTML.jpg)\n\
    \nFigure 3-12.\n\nCtrl-dragging from a button to the .swift file\n\n6.  Release\
    \ the Control key and the left mouse button. A popup window appears. Make sure\
    \ the Connection popup menu displays Action.\n\n**Note** One common mistake is\
    \ to create an IBOutlet variable (when the Connection popup menu displays Outlet)\
    \ instead of an IBAction method (when the Connection popup menu displays Action).\
    \ Always check the Connection popup menu to make sure it displays Outlet or Action,\
    \ depending on what you want to create.\n\n7.  Click in the Name text field and\
    \ type **changeButton**.\n\n8.  Click in the Type popup menu and choose UIButton\
    \ as shown in Figure [3-13](#329781_5_En_3_Chapter.xhtml#Fig13).\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig13_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig13_HTML.jpg)\n\
    \nFigure 3-13.\n\nThe Attributes Inspector lets you customize how the scene appears\n\
    \n9.  Click the Connect button. Xcode creates an IBAction method:\n\n```\n   \
    \ @IBAction func changeButton(_ sender: UIButton) {\n    }\n    ```\n\nThis IBAction\
    \ method runs every time the user taps on the button. Now we need to write Swift\
    \ code inside this IBAction method to make it actually do something.\n\n10.  Modify\
    \ this IBAction method as follows:\n\n```\n    @IBAction func changeButton(_ sender:\
    \ UIButton) {\n    labelResult.text = textMessage.text\n    }\n    ```\n\nNotice\
    \ that as you type, Xcode displays a list of commands it thinks you want to type\
    \ as shown in Figure [3-14](#329781_5_En_3_Chapter.xhtml#Fig14). Rather than type\
    \ a complete command, you can simply select the command you want and press ENTER\
    \ to make Xcode type this command for you automatically.\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig14_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig14_HTML.jpg)\n\
    \nFigure 3-14.\n\nXcode’s auto-complete feature tries to guess the command you\
    \ want to type\n\nThe preceding code for the IBAction method simply takes the\
    \ text stored in the textMessage IBOutlet (which is connected to the text field)\
    \ and displays it in the labelResult IBOutlet (which is connected to the label).\
    \ Let’s see it actually work.\n\n1.  Choose Product ➤ Run, or click the Run button.\
    \ The Simulator appears.\n\n2.  Click in the text field and type **Hello there!**\n\
    \n3.  Click the button. Notice that the label now displays *Hello there!* as shown\
    \ in Figure [3-15](#329781_5_En_3_Chapter.xhtml#Fig15).\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig15_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig15_HTML.jpg)\n\
    \nFigure 3-15.\n\nRunning the app in the Simulator\n\n4.  Choose Simulator ➤ Quit\
    \ Simulator. The Xcode window appears again.\n\n5.  Choose View ➤ Standard Editor\
    \ ➤ Show Standard Editor, or click the Standard Editor icon (see Figure [3-11](#329781_5_En_3_Chapter.xhtml#Fig11)).\
    \ The Standard Editor appears, displaying the contents of only one file in the\
    \ middle Xcode pane.\n\nThis example demonstrates several key principles of writing\
    \ Swift code:\n    *   Every user interface object that needs to retrieve or display\
    \ data must be connected to an IBOutlet variable.\n\n*   Every user interface\
    \ object that the user interacts with must be connected to an IBAction method.\n\
    \n*   The Assistant Editor helps you create IBOutlet variables and IBAction methods.\n\
    \n*   As you type Swift code, Xcode displays lists of commands it thinks you want\
    \ to type ."
  trans: "\n### 注意\n\n在开发 iOS 应用时，忘记将 `IBOutlets` 连接到用户界面对象（或将 `IBOutlets` 连接到错误的对象）是常见的错误来源。每当你感觉用户界面工作不正常时，请打开连接检查器面板，检查你的\
    \ `IBOutlets` 是否已正确连接。\n\n## 创建 IBAction 方法\n\n如果我们现在运行应用，用户会在屏幕上看到一个按钮，但该按钮不会执行任何操作。要使用户界面的任何部分真正工作，我们需要创建\
    \ `IBAction` 方法。\n\n`IBAction` 方法包含 Swift 代码，每当用户与用户界面上的对象（如按钮、滑块或开关）交互时，这些代码就会运行。`IBAction`\
    \ 方法让用户能够使应用执行有用的操作。\n\n要创建一个 `IBAction` 方法，你需要使用助理编辑器，将故事板与链接到特定控制器的 `.swift`\
    \ 文件并排显示。让我们看看这是如何工作的。\n\n1. 在导航窗格中点击 `Main.storyboard` 文件。Xcode 的中间窗格会显示包含应用用户界面的故事板。\n\
    \n2. 在文档大纲中或视图顶部（见图 3‑2）点击控制器图标（一个内含白色方块的黄色圆圈）。这将选中包含要链接的用户界面对象的控制器。\n\n3. 选择\
    \ 视图 ➤ 助理编辑器 ➤ 显示助理编辑器，或点击助理编辑器图标。Xcode 会显示该控制器及其所链接的 `.swift` 文件（见图 3‑3）。\n\n\
    4. 点击按钮以选中它。\n\n5. 按住 Control 键，并从该按钮向 `ViewController.swift` 文件中最后一个花括号上方的区域进行\
    \ Ctrl‑拖拽，如图 3‑12 所示。\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig12_HTML.jpg](img/329781_5_En_3_Fig12_HTML.jpg)\n\
    \n图 3-12. 从按钮向 `.swift` 文件进行 Ctrl‑拖拽\n\n6. 松开 Control 键和鼠标左键。会弹出一个窗口。确保“连接”弹出菜单显示为“Action”。\n\
    \n**注意** 一个常见的错误是创建了 `IBOutlet` 变量（当“连接”弹出菜单显示为“Outlet”时），而不是 `IBAction` 方法（当“连接”弹出菜单显示为“Action”时）。务必检查“连接”弹出菜单，确保它根据你想要创建的内容显示为“Outlet”或“Action”。\n\
    \n7. 点击“名称”文本框，并输入 `changeButton`。\n\n8. 点击“类型”弹出菜单，并选择 `UIButton`，如图 3‑13 所示。\n\
    \n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig13_HTML.jpg](img/329781_5_En_3_Fig13_HTML.jpg)\n\
    \n图 3-13. 属性检查器允许你自定义场景的显示方式\n\n9. 点击“连接”按钮。Xcode 会创建一个 `IBAction` 方法：\n\n```swift\n\
    @IBAction func changeButton(_ sender: UIButton) {\n}\n```\n\n每当用户点击该按钮时，此 `IBAction`\
    \ 方法就会运行。现在我们需要在此 `IBAction` 方法内部编写 Swift 代码，使其真正执行某些操作。\n\n10. 按如下方式修改此 `IBAction`\
    \ 方法：\n\n```swift\n@IBAction func changeButton(_ sender: UIButton) {\n    labelResult.text\
    \ = textMessage.text\n}\n```\n\n请注意，在你输入时，Xcode 会显示一个命令列表，它认为你想要输入这些命令，如图 3‑14\
    \ 所示。你无需输入完整的命令，只需选择所需的命令并按回车键，即可让 Xcode 自动为你输入该命令。\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig14_HTML.jpg](img/329781_5_En_3_Fig14_HTML.jpg)\n\
    \n图 3-14. Xcode 的自动补全功能会尝试猜测你想要输入的命令\n\n上述 `IBAction` 方法的代码只是获取 `textMessage`\
    \ `IBOutlet`（已连接到文本字段）中存储的文本，并将其显示在 `labelResult` `IBOutlet`（已连接到标签）中。让我们看看它实际是如何工作的。\n\
    \n1. 选择 产品 ➤ 运行，或点击运行按钮。模拟器会出现。\n\n2. 点击文本字段，并输入 `Hello there!`。\n\n3. 点击按钮。请注意，现在标签显示了\
    \ `Hello there!`，如图 3‑15 所示。\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig15_HTML.jpg](img/329781_5_En_3_Fig15_HTML.jpg)\n\
    \n图 3-15. 在模拟器中运行应用\n\n4. 选择 模拟器 ➤ 退出模拟器。Xcode 窗口会再次出现。\n\n5. 选择 视图 ➤ 标准编辑器 ➤\
    \ 显示标准编辑器，或点击标准编辑器图标（见图 3‑11）。标准编辑器会显示，并在 Xcode 中间窗格中仅显示一个文件的内容。\n\n此示例演示了编写 Swift\
    \ 代码的几个关键原则：\n\n* 每个需要检索或显示数据的用户界面对象都必须连接到一个 `IBOutlet` 变量。\n\n* 每个用户与之交互的用户界面对象都必须连接到一个\
    \ `IBAction` 方法。\n\n* 助理编辑器可帮助你创建 `IBOutlet` 变量和 `IBAction` 方法。\n\n* 在你输入 Swift\
    \ 代码时，Xcode 会显示它认为你想要输入的命令列表。\n"
- fmt: "# Using Apple’s Frameworks\n\nWhile it’s possible to write Swift code to perform\
    \ various tasks, it’s often easier to use Apple’s frameworks instead. Apple provides\
    \ several commonly needed functions so you don’t have to re-invent the wheel and\
    \ rewrite code that Apple has already written for you. This lets you use Apple’s\
    \ proven and tested code so your app will be more reliable as a result.\n\nIn\
    \ our example, our app simply takes any text typed into the text field and displays\
    \ it in the label. Let’s make this fancier and have the label take any text typed\
    \ into the text field and display that same text in uppercase.\n\nTo do this,\
    \ we could write Swift code to substitute each letter and replace it with its\
    \ uppercase equivalent, but this would take time to write and even more time to\
    \ test. As a simpler alternative, we can just use a special function that Apple’s\
    \ framework provides for us called `uppercased()`.\n\nThis `uppercased()` function\
    \ already works and doesn’t require us to write our own code to replace lowercase\
    \ letters with uppercase letters so it will save us time and increase the reliability\
    \ of our app. As a general rule, rely on Apple’s frameworks as much as possible\
    \ and only write code when Apple’s frameworks can’t help you.\n\nTo use one of\
    \ Apple’s frameworks, you have to import it into your `.swift` file. If you look\
    \ in either the `AppDelegate.swift` or `ViewController.swift` file, you’ll see\
    \ the following line:\n\n```swift\nimport UIKit\n```\n\nThe preceding line allows\
    \ that particular file to use any code stored in the `UIKit` framework. More complicated\
    \ apps typically use more than one framework such as:\n\n```swift\nimport UIKit\n\
    import SceneKit\nimport ARKit\n```\n\nThe preceding code allows access to code\
    \ stored in the `UIKit`, `SceneKit`, and `ARKit` frameworks. Whenever you need\
    \ to use code stored in a different framework, you can simply add it to your `.swift`\
    \ file by adding an `import` line at the top of your `.swift` file.\n\nLet’s see\
    \ how to use the `uppercased()` function in our code:\n\n1.  Open the MyFirstApp\
    \ project in Xcode.\n2.  Click the `ViewController.swift` file in the Navigator\
    \ pane.\n3.  Modify the `IBAction` method as follows:\n\n    ```swift\n    @IBAction\
    \ func changeButton(_ sender: UIButton) {\n        labelResult.text = textMessage.text?.uppercased()\n\
    \    }\n    ```\n\n    By simply using the `uppercased()` function, we can change\
    \ lowercase letters into uppercase without wasting time writing our own code to\
    \ do this.\n\n4.  Choose Product ➤ Run, or click the Run button. The Simulator\
    \ appears.\n5.  Click in the text field and type `Hello there!`\n6.  Click the\
    \ button. Notice that the label now displays `HELLO THERE!` as shown in Figure\
    \ [3-16](#329781_5_En_3_Chapter.xhtml#Fig16).\n\n    ![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig16_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig16_HTML.jpg)\n\
    \n    Figure 3-16. Running the app in the Simulator using the `uppercased()` function\n\
    \n7.  Choose Simulator ➤ Quit Simulator. The Xcode window appears again.\n\n##\
    \ Using the Xcode Editor\n\nWhen you type and edit Swift code, Xcode displays\
    \ certain text in different colors to help you understand the different parts\
    \ of your commands. These different colors highlight the following:\n\n*   Black\
    \ – Arbitrary commands that the user typed\n*   Magenta – Swift keywords such\
    \ as `func` (function) or `@IBOutlet`\n*   Purple – Classes, properties, or methods\
    \ such as `UIButton`, `text`, or `uppercased`\n*   Green – Variable names\n* \
    \  Red – Strings\n\nUsers can always customize how Xcode uses different colors\
    \ to identify the parts of Swift code. To see what colors may be assigned to display\
    \ different Swift code, follow these steps:\n\n1.  Choose Xcode ➤ Preferences.\
    \ A Preferences window appears.\n2.  Click the Fonts & Colors icon. A list of\
    \ different themes appears in the left pane.\n3.  Click the theme currently being\
    \ used by Xcode to view which colors are being used to identify different Swift\
    \ commands as shown in Figure [3-17](#329781_5_En_3_Chapter.xhtml#Fig17). (You\
    \ can identify the theme currently being used by Xcode if you choose Editor ➤\
    \ Theme.)\n\n    ![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig17_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig17_HTML.jpg)\n\
    \n    Figure 3-17. The Preferences window lets you view how Xcode uses different\
    \ colors to identify Swift code\n\n4.  Click the red Close button in the upper\
    \ left corner of the Preferences window to make it go away.\n\n### Getting Help\
    \ with Swift Commands\n\nThe code in a typical app will contain a mixture of your\
    \ own code along with methods and properties. To help you understand what various\
    \ code might mean, you can get help on specific commands by holding down the Option\
    \ key and clicking a particular command. To see how this works, follow these steps:\n\
    \n1.  Load the MyFirstApp project in Xcode.\n2.  Click the `ViewController.swift`\
    \ file in the Navigator pane.\n3.  Hold down the Option key and move the mouse\
    \ pointer over the `uppercased()` function near the bottom of the `ViewController.swift`\
    \ file. The mouse pointer turns into a question mark.\n4.  Click the `uppercased()`\
    \ function while holding down the Option key. Xcode displays a window that explains\
    \ how the `uppercased()` function works as shown in Figure [3-18](#329781_5_En_3_Chapter.xhtml#Fig18).\n\
    \n    ![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig18_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig18_HTML.jpg)\n\
    \n    Figure 3-18. Getting help by holding down the Option key and clicking a\
    \ command\n\n5.  Hold down the Option key and click `UITextField`! Xcode displays\
    \ another window that explains more about the `UITextField`! Command as shown\
    \ in Figure [3-19](#329781_5_En_3_Chapter.xhtml#Fig19).\n\n    ![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig19_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig19_HTML.jpg)\n\
    \n    Figure 3-19. Displaying help about `UITextField`\n\n6.  Hold down the Option\
    \ key and click `labelResult` inside the `IBAction` method. Xcode displays a window\
    \ that shows where the `labelResult` `IBOutlet` was declared as shown in Figure\
    \ [3-20](#329781_5_En_3_Chapter.xhtml#Fig20).\n\n    ![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig20_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig20_HTML.jpg)\n\
    \n    Figure 3-20. Displaying additional information about the `labelResult` `IBOutlet`\n\
    \nBy holding down the Option key and clicking different Swift commands, you can\
    \ get quick help on that command right within the Xcode editor.\n\n### Folding\
    \ and Unfolding Functions\n\nIn complicated apps, a single `.swift` file will\
    \ likely contain multiple functions. This can make finding a specific line of\
    \ code difficult. To temporarily hide code stored in functions, Xcode can fold\
    \ and unfold functions. Folding collapses a function so you can see its name but\
    \ not any code stored inside. Unfolding expands a function so you can see all\
    \ of its code.\n\nTo see how to fold and unfold functions in a `.swift` file,\
    \ follow these steps:\n\n1.  Load the MyFirstApp project in Xcode.\n2.  Click\
    \ the `ViewController.swift` file in the Navigator pane.\n3.  Choose Editor ➤\
    \ Code Folding ➤ Fold Methods and Functions. Xcode now only displays all function\
    \ names but not any of the code inside each function as shown in Figure [3-21](#329781_5_En_3_Chapter.xhtml#Fig21).\
    \ Notice that each folded function displays an ellipsis (…) to show that it’s\
    \ hiding its code from sight.\n\n    ![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig21_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig21_HTML.jpg)\n\
    \n    Figure 3-21. Folded functions\n\n4.  Double-click the ellipsis at the end\
    \ of the `viewDidLoad` folded function. Xcode now displays that function’s code.\n\
    \nBy folding functions, you can hide code that you don’t want to see and focus\
    \ just on the code you do want to see. Code folding is one more simple way Xcode\
    \ makes viewing and editing code a little bit easier."
  raw: "## Using Apple’s Frameworks\n\nWhile it’s possible to write Swift code to\
    \ perform various tasks, it’s often easier to use Apple’s frameworks instead.\
    \ Apple provides several commonly needed functions so you don’t have to re-invent\
    \ the wheel and rewrite code that Apple has already written for you. This lets\
    \ you use Apple’s proven and tested code so your app will be more reliable as\
    \ a result.\n\nIn our example, our app simply takes any text typed into the text\
    \ field and displays it in the label. Let’s make this fancier and have the label\
    \ take any text typed into the text field and display that same text in uppercase.\n\
    \nTo do this, we could write Swift code to substitute each letter and replace\
    \ it with its uppercase equivalent, but this would take time to write and even\
    \ more time to test. As a simpler alternative, we can just use a special function\
    \ that Apple’s framework provides for us called uppercased().\n\nThis uppercased()\
    \ function already works and doesn’t require us to write our own code to replace\
    \ lowercase letters with uppercase letters so it will save us time and increase\
    \ the reliability of our app. As a general rule, rely on Apple’s frameworks as\
    \ much as possible and only write code when Apple’s frameworks can’t help you.\n\
    \nTo use one of Apple’s frameworks, you have to import it into your .swift file.\
    \ If you look in either the AppDelegate.swift or ViewController.swift file, you’ll\
    \ see the following line:\n\n```\nimport UIKit\n```\n\nThe preceding line allows\
    \ that particular file to use any code stored in the UIKit framework. More complicated\
    \ apps typically use more than one framework such as:\n\n```\nimport UIKit\nimport\
    \ SceneKit\nimport ARKit\n```\n\nThe preceding code allows access to code stored\
    \ in the UIKit, SceneKit, and ARKit frameworks. Whenever you need to use code\
    \ stored in a different framework, you can simply add it to your .swift file by\
    \ adding an import line at the top of your .swift file.\n\nLet’s see how to use\
    \ the uppercased() function in our code:\n\n1.  Open the MyFirstApp project in\
    \ Xcode.\n\n2.  Click the ViewController.swift file in the Navigator pane.\n\n\
    3.  Modify the IBAction method as follows:\n\n    ```\n    @IBAction func changeButton(_\
    \ sender: UIButton) {\n    labelResult.text = textMessage.text?.uppercased()\n\
    \    }\n    ```\n\n    By simply using the uppercased() function, we can change\
    \ lowercase letters into uppercase without wasting time writing our own code to\
    \ do this.\n\n4.  Choose Product ➤ Run, or click the Run button. The Simulator\
    \ appears.\n\n5.  Click in the text field and type **Hello there!**\n\n6.  Click\
    \ the button. Notice that the label now displays *HELLO THERE!* as shown in Figure\
    \ [3-16](#329781_5_En_3_Chapter.xhtml#Fig16).\n\n    ![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig16_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig16_HTML.jpg)\n\
    \n    Figure 3-16.\n\n    Running the app in the Simulator using the uppercased()\
    \ function\n\n7.  Choose Simulator ➤ Quit Simulator. The Xcode window appears\
    \ again.\n\n## Using the Xcode Editor\n\nWhen you type and edit Swift code, Xcode\
    \ displays certain text in different colors to help you understand the different\
    \ parts of your commands. These different colors highlight the following:\n\n\
    *   Black – Arbitrary commands that the user typed\n\n*   Magenta – Swift keywords\
    \ such as func (function) or @IBOutlet\n\n*   Purple – Classes, properties, or\
    \ methods such as UIButton, text, or uppercased\n\n*   Green – Variable names\n\
    \n*   Red – Strings\n\nUsers can always customize how Xcode uses different colors\
    \ to identify the parts of Swift code. To see what colors may be assigned to display\
    \ different Swift code, follow these steps:\n\n1.  Choose Xcode ➤ Preferences.\
    \ A Preferences window appears.\n\n2.  Click the Fonts & Colors icon. A list of\
    \ different themes appears in the left pane.\n\n3.  Click the theme currently\
    \ being used by Xcode to view which colors are being used to identify different\
    \ Swift commands as shown in Figure [3-17](#329781_5_En_3_Chapter.xhtml#Fig17).\
    \ (You can identify the theme currently being used by Xcode if you choose Editor\
    \ ➤ Theme.)\n\n    ![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig17_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig17_HTML.jpg)\n\
    \n    Figure 3-17.\n\n    The Preferences window lets you view how Xcode uses\
    \ different colors to identify Swift code\n\n4.  Click the red Close button in\
    \ the upper left corner of the Preferences window to make it go away.\n\n### Getting\
    \ Help with Swift Commands\n\nThe code in a typical app will contain a mixture\
    \ of your own code along with methods and properties. To help you understand what\
    \ various code might mean, you can get help on specific commands by holding down\
    \ the Option key and clicking a particular command. To see how this works, follow\
    \ these steps:\n\n1.  Load the MyFirstApp project in Xcode.\n\n2.  Click the ViewController.swift\
    \ file in the Navigator pane.\n\n3.  Hold down the Option key and move the mouse\
    \ pointer over the uppercased() function near the bottom of the ViewController.swift\
    \ file. The mouse pointer turns into a question mark.\n\n4.  Click the uppercased()\
    \ function while holding down the Option key. Xcode displays a window that explains\
    \ how the uppercased() function works as shown in Figure [3-18](#329781_5_En_3_Chapter.xhtml#Fig18).\n\
    \n    ![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig18_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig18_HTML.jpg)\n\
    \n    Figure 3-18.\n\n    Getting help by holding down the Option key and clicking\
    \ a command\n\n5.  Hold down the Option key and click UITextField! Xcode displays\
    \ another window that explains more about the UITextField! Command as shown in\
    \ Figure [3-19](#329781_5_En_3_Chapter.xhtml#Fig19).\n\n    ![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig19_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig19_HTML.jpg)\n\
    \n    Figure 3-19.\n\n    Displaying help about UITextField\n\n6.  Hold down the\
    \ Option key and click labelResult inside the IBAction method. Xcode displays\
    \ a window that shows where the labelResult IBOutlet was declared as shown in\
    \ Figure [3-20](#329781_5_En_3_Chapter.xhtml#Fig20).\n\n    ![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig20_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig20_HTML.jpg)\n\
    \n    Figure 3-20.\n\n    Displaying additional information about the labelResult\
    \ IBOutlet\n\nBy holding down the Option key and clicking different Swift commands,\
    \ you can get quick help on that command right within the Xcode editor.\n\n###\
    \ Folding and Unfolding Functions\n\nIn complicated apps, a single .swift file\
    \ will likely contain multiple functions. This can make finding a specific line\
    \ of code difficult. To temporarily hide code stored in functions, Xcode can fold\
    \ and unfold functions. Folding collapses a function so you can see its name but\
    \ not any code stored inside. Unfolding expands a function so you can see all\
    \ of its code.\n\nTo see how to fold and unfold functions in a .swift file, follow\
    \ these steps:\n\n1.  Load the MyFirstApp project in Xcode.\n\n2.  Click the ViewController.swift\
    \ file in the Navigator pane.\n\n3.  Choose Editor ➤ Code Folding ➤ Fold Methods\
    \ and Functions. Xcode now only displays all function names but not any of the\
    \ code inside each function as shown in Figure [3-21](#329781_5_En_3_Chapter.xhtml#Fig21).\
    \ Notice that each folded function displays an ellipsis (…) to show that it’s\
    \ hiding its code from sight.\n\n    ![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig21_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig21_HTML.jpg)\n\
    \n    Figure 3-21.\n\n    Folded functions\n\n4.  Double-click the ellipsis at\
    \ the end of the viewDidLoad folded function. Xcode now displays that function’s\
    \ code.\n\nBy folding functions, you can hide code that you don’t want to see\
    \ and focus just on the code you do want to see. Code folding is one more simple\
    \ way Xcode makes viewing and editing code a little bit easier."
  trans: "\n# 使用 Apple 框架\n\n虽然可以编写 Swift 代码来执行各种任务，但通常使用 Apple 的框架会更简单。Apple 提供了许多常用功能，因此你无需重新发明轮子，重写\
    \ Apple 已经为你写好的代码。这让你可以使用 Apple 经过验证和测试的代码，从而使你的应用程序更可靠。\n\n在我们的示例中，应用程序只是将文本字段中输入的任何文本显示在标签中。现在让它变得更酷一些：让标签获取文本字段中输入的任何文本，并以大写形式显示相同的文本。\n\
    \n为此，我们可以编写 Swift 代码来替换每个字母，并将其替换为大写字母，但这需要时间编写，甚至需要更多时间测试。更简单的替代方案是，我们可以直接使用\
    \ Apple 框架提供的一个名为 `uppercased()` 的特殊函数。\n\n这个 `uppercased()` 函数已经可以工作，并且不需要我们编写自己的代码来将小写字母替换为大写字母，因此它将节省我们的时间并提高应用程序的可靠性。作为一般规则，尽可能依赖\
    \ Apple 的框架，只有在 Apple 框架无法帮助你时才编写代码。\n\n要使用 Apple 框架，你必须将其导入到你的 `.swift` 文件中。如果你查看\
    \ `AppDelegate.swift` 或 `ViewController.swift` 文件，你会看到以下一行：\n\n```swift\nimport\
    \ UIKit\n```\n\n上面这一行允许该特定文件使用存储在 `UIKit` 框架中的任何代码。更复杂的应用程序通常会使用多个框架，例如：\n\n```swift\n\
    import UIKit\nimport SceneKit\nimport ARKit\n```\n\n上面的代码允许访问存储在 `UIKit`、`SceneKit`\
    \ 和 `ARKit` 框架中的代码。每当你需要使用存储在不同框架中的代码时，只需在 `.swift` 文件顶部添加一行 `import` 即可将其添加到你的\
    \ `.swift` 文件中。\n\n让我们看看如何在我们的代码中使用 `uppercased()` 函数：\n\n1.  在 Xcode 中打开 MyFirstApp\
    \ 项目。\n2.  在导航窗格中点击 `ViewController.swift` 文件。\n3.  如下修改 `IBAction` 方法：\n\n  \
    \  ```swift\n    @IBAction func changeButton(_ sender: UIButton) {\n        labelResult.text\
    \ = textMessage.text?.uppercased()\n    }\n    ```\n\n    只需使用 `uppercased()`\
    \ 函数，我们就可以将小写字母改为大写，而无需浪费时间编写自己的代码来执行此操作。\n\n4.  选择 **产品** ➤ **运行**，或点击运行按钮。模拟器出现。\n\
    5.  点击文本字段并输入 `Hello there!`。\n6.  点击按钮。请注意，标签现在显示 `HELLO THERE!`，如图 3-16 所示。\n\
    \n    ![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig16_HTML.jpg](img/329781_5_En_3_Fig16_HTML.jpg)\n\
    \n    图 3-16. 在模拟器中使用 `uppercased()` 函数运行应用\n\n7.  选择 **模拟器** ➤ **退出模拟器**。Xcode\
    \ 窗口再次出现。\n\n## 使用 Xcode 编辑器\n\n当你键入和编辑 Swift 代码时，Xcode 会以不同的颜色显示某些文本，以帮助你理解命令的不同部分。这些不同颜色突出显示以下内容：\n\
    \n*   **黑色** – 用户键入的任意命令\n*   **品红色** – Swift 关键字，例如 `func`（函数）或 `@IBOutlet`\n\
    *   **紫色** – 类、属性或方法，例如 `UIButton`、`text` 或 `uppercased`\n*   **绿色** – 变量名\n*\
    \   **红色** – 字符串\n\n用户始终可以自定义 Xcode 如何使用不同颜色来标识 Swift 代码的各个部分。要查看可能分配了哪些颜色来显示不同的\
    \ Swift 代码，请按照以下步骤操作：\n\n1.  选择 **Xcode** ➤ **偏好设置**。出现一个偏好设置窗口。\n2.  点击 **字体与颜色**\
    \ 图标。左侧窗格中会显示一个不同的主题列表。\n3.  点击 Xcode 当前使用的主题，查看使用了哪些颜色来标识不同的 Swift 命令，如图 3-17\
    \ 所示。（如果你选择 **编辑器** ➤ **主题**，即可识别 Xcode 当前使用的主题。）\n\n    ![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig17_HTML.jpg](img/329781_5_En_3_Fig17_HTML.jpg)\n\
    \n    图 3-17. 偏好设置窗口让你查看 Xcode 如何使用不同颜色来标识 Swift 代码\n\n4.  点击偏好设置窗口左上角的红色关闭按钮将其关闭。\n\
    \n### 获取 Swift 命令的帮助\n\n典型应用程序的代码将包含你自己的代码以及方法和属性。为了帮助你理解各种代码可能意味着什么，你可以通过按住 Option\
    \ 键并单击特定命令来获取特定命令的帮助。要了解其工作原理，请执行以下步骤：\n\n1.  在 Xcode 中加载 MyFirstApp 项目。\n2. \
    \ 在导航窗格中点击 `ViewController.swift` 文件。\n3.  按住 Option 键，将鼠标指针移到 `ViewController.swift`\
    \ 文件底部附近的 `uppercased()` 函数上。鼠标指针会变成一个问号。\n4.  按住 Option 键的同时单击 `uppercased()`\
    \ 函数。Xcode 会显示一个窗口，解释 `uppercased()` 函数的工作原理，如图 3-18 所示。\n\n    ![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig18_HTML.jpg](img/329781_5_En_3_Fig18_HTML.jpg)\n\
    \n    图 3-18. 按住 Option 键并单击命令获取帮助\n\n5.  按住 Option 键并单击 `UITextField`！Xcode 会显示另一个窗口，进一步解释\
    \ `UITextField` 命令，如图 3-19 所示。\n\n    ![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig19_HTML.jpg](img/329781_5_En_3_Fig19_HTML.jpg)\n\
    \n    图 3-19. 显示关于 `UITextField` 的帮助\n\n6.  按住 Option 键并单击 `IBAction` 方法内部的 `labelResult`。Xcode\
    \ 会显示一个窗口，显示 `labelResult` `IBOutlet` 的声明位置，如图 3-20 所示。\n\n    ![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig20_HTML.jpg](img/329781_5_En_3_Fig20_HTML.jpg)\n\
    \n    图 3-20. 显示关于 `labelResult` `IBOutlet` 的附加信息\n\n通过按住 Option 键并单击不同的 Swift\
    \ 命令，你可以在 Xcode 编辑器内快速获取该命令的帮助。\n\n### 折叠和展开函数\n\n在复杂的应用程序中，单个 `.swift` 文件可能包含多个函数。这可能会使查找特定代码行变得困难。为了暂时隐藏函数中存储的代码，Xcode\
    \ 可以折叠和展开函数。折叠会将函数收拢，这样你只能看到它的名字，但看不到内部存储的任何代码。展开则会展开一个函数，使你可以看到它的所有代码。\n\n要了解如何在\
    \ `.swift` 文件中折叠和展开函数，请执行以下步骤：\n\n1.  在 Xcode 中加载 MyFirstApp 项目。\n2.  在导航窗格中点击\
    \ `ViewController.swift` 文件。\n3.  选择 **编辑器** ➤ **代码折叠** ➤ **折叠方法和函数**。Xcode 现在只显示所有函数名，而不显示每个函数内部的任何代码，如图\
    \ 3-21 所示。请注意，每个折叠的函数都会显示一个省略号 (…) 以表示它隐藏了代码。\n\n    ![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig21_HTML.jpg](img/329781_5_En_3_Fig21_HTML.jpg)\n\
    \n    图 3-21. 折叠的函数\n\n4.  双击折叠的 `viewDidLoad` 函数末尾的省略号。Xcode 现在会显示该函数的代码。\n\n\
    通过折叠函数，你可以隐藏不想看到的代码，并仅专注于你确实想看到的代码。代码折叠是 Xcode 让查看和编辑代码变得更简单的一个简单方法。\n"
- fmt: "# Summary\n\nSwift code tells your app what to do. To retrieve or display\
    \ data on the user interface, you need to create `IBOutlet` variables and link\
    \ them to different user interface objects such as text fields and labels. If\
    \ a user interface object won’t retrieve or display data, then you won’t need\
    \ to create an `IBOutlet` variable for that object.\n\nTo make certain user interface\
    \ objects interactive such as buttons, you need to write `IBAction` methods. When\
    \ you create an `IBAction` method, you also need to write Swift code that does\
    \ something useful. Both `IBOutlet` variables and `IBAction` methods get stored\
    \ in the `.swift` file connected to a particular controller.\n\nTo keep you from\
    \ rewriting commonly used code, Apple offers frameworks that contain functions\
    \ that you can use. These framework functions have been tested so you can use\
    \ them and write apps faster by focusing solely on the unique code that makes\
    \ your app work. Apple provides dozens of different frameworks that your app can\
    \ use although it’s unlikely you’ll ever use or need all of them in a single app.\n\
    \nTo help you write and understand Swift code, Xcode lets you hold down the Option\
    \ key and click different commands. This displays a window that offers further\
    \ explanations for how a particular command works. Since many `.swift` files contain\
    \ lots of code, Xcode lets you temporarily hide code in functions so you can focus\
    \ on only the code you want to see.\n\nSwift code makes your app do something\
    \ useful, so you’ll spend lots of time writing, rewriting, and studying code.\
    \ Knowing how to use Swift is just the first step to creating iOS apps. You also\
    \ need to know how to use Xcode as well.\n\n# 4. Using Xcode\n\nBefore you start\
    \ writing Swift code and designing user interfaces, take a moment to get acquainted\
    \ with Xcode, Apple’s free tool for creating apps. Xcode offers so many features\
    \ because it’s designed to handle all your needs in creating an app from start\
    \ to finish. Fortunately, you won’t have to learn every single feature of Xcode\
    \ to start creating apps. Instead, you can just focus on learning only the features\
    \ you need and gradually learn any additional features of Xcode later. Xcode provides\
    \ the following features to help you create apps for all of Apple’s products:\n\
    \n- Writing and editing Swift code\n- Designing a user interface\n- Debugging\
    \ your app to find and fix problems\n- Running and testing your app\n\nXcode is\
    \ both an editor and a compiler. The editor lets you write and modify Swift code\
    \ along with designing and customizing user interfaces. Once you’re done creating\
    \ your user interface and Swift code, you can use Xcode to compile and run your\
    \ app to make sure it works.\n\n## Changing Xcode’s Appearance\n\nWhether you’re\
    \ working on a small laptop screen or a much larger desktop monitor, chances are\
    \ good you won’t always have enough room to see everything in Xcode. That’s why\
    \ Xcode offers several ways to hide or display information. That way you can focus\
    \ on what you want to see and avoid the clutter of additional information that\
    \ might get in your way.\n\nSome of the different parts that Xcode can hide or\
    \ display include the following:\n\n- Navigator pane\n- Toolbar\n- Tab bar\n-\
    \ Debug Area\n- Inspector pane\n- Document Outline\n- Object Library\n\n### The\
    \ Navigator Pane\n\nThe Navigator pane appears on the left side of the Xcode window.\
    \ You can toggle between hiding and displaying the Navigator pane by choosing\
    \ any of the following commands:\n\n- Choose View ➤ Navigators ➤ Show/Hide Navigator.\n\
    - Press Command + 0 (zero).\n\nYou can also resize the width of the Navigator\
    \ pane by moving the mouse pointer over the border of the Navigator pane and dragging\
    \ the mouse left or right. By making the Navigator pane too narrow, you can hide\
    \ it completely.\n\n**Note:** Dragging the mouse to the left can hide the Navigator\
    \ pane, but then you’ll need to choose View ➤ Navigators ➤ Show Navigator or press\
    \ Command + 0 (zero) to make the Navigator pane appear again.\n\nAlthough the\
    \ Navigator pane can display different information, the three most common types\
    \ of information to use include the following:\n\n- **Project Navigator (Command\
    \ + 1)** – Displays all the folders and files that make up your project including\
    \ your `.swift` files and `.storyboard` user interface.\n- **Symbol Navigator\
    \ (Command + 3)** – Lists all the functions stored in each `.swift` file.\n- **Issue\
    \ Navigator (Command + 5)** – Displays possible problems with your project.\n\n\
    To see how these three different types of navigators work, follow these steps:\n\
    \n1. Open the `MyFirstApp` project that displays a label, button, and text field\
    \ on a view.\n\n2. Choose View ➤ Navigators ➤ Show Project Navigator, press Command\
    \ + 1, or click the Project Navigator icon. Xcode shows a list of folders and\
    \ files that make up your project as shown in Figure 4-1. The Project Navigator\
    \ is used when you want to view a different file in the middle Xcode pane.\n\n\
    \   ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig1_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig1_HTML.jpg)\n\
    \n   **Figure 4-1.** Choosing the Project Navigator\n\n3. Click the `ViewController.swift`\
    \ file in the Navigator pane. Xcode’s middle pane displays the contents of the\
    \ `ViewController.swift` file so you can write and edit Swift code in that file.\n\
    \n4. Click the `Main.storyboard` file in the Navigator pane. Xcode’s middle pane\
    \ displays the user interface of your app so you can design and edit the user\
    \ interface such as adding buttons or labels.\n\n5. Choose View ➤ Navigators ➤\
    \ Show Symbol Navigator, press Command + 3, or click the Symbol Navigator icon.\
    \ Xcode shows a list of `.swift` files that make up your project. By clicking\
    \ the gray disclosure triangle to the left of each `.swift` file name, you can\
    \ expand or collapse the list of functions and variables used in each `.swift`\
    \ file as shown in Figure 4-2.\n\n   ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig2_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig2_HTML.jpg)\n\
    \n   **Figure 4-2.** The Symbol navigator lets you quickly find a function or\
    \ variable stored in a `.swift` file\n\n6. Click the gray disclosure triangle\
    \ to the left of the `ViewController` file to display the list of functions (also\
    \ known as methods, identified by a capital M icon) and variables (also known\
    \ as properties, identified by a capital P icon) in that file.\n\n7. Click the\
    \ `changeButton` method. Xcode highlights the `changeButton` method in the `ViewController.swift`\
    \ file (see Figure 4-2).\n\n8. Click the `labelResult` property. Xcode highlights\
    \ the `labelResult` property in the `ViewController.swift` file. The Symbol navigator\
    \ helps you quickly jump to a specific property or method in your project.\n\n\
    9. Choose View ➤ Navigators ➤ Show Project Navigator, press Command + 1, or click\
    \ the Project Navigator icon. Then click the `Main.storyboard` file to view your\
    \ app’s user interface.\n\n10. Choose View ➤ Navigators ➤ Show Issue Navigator,\
    \ press Command + 5, or click the Issue Navigator icon. The Issue Navigator displays\
    \ warnings about your project as shown in Figure 4-3. Yellow icons represent problems\
    \ that let your app still work but could cause problems with the user interface’s\
    \ appearance or code not being completely safe to run. Red icons represent problems\
    \ that keep your app from working at all.\n\n    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig3_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig3_HTML.jpg)\n\
    \n    **Figure 4-3.** The Issue Navigator lets you view possible problems with\
    \ your project"
  raw: "## Summary\n\nSwift code tells your app what to do. To retrieve or display\
    \ data on the user interface, you need to create IBOutlet variables and link them\
    \ to different user interface objects such as text fields and labels. If a user\
    \ interface object won’t retrieve or display data, then you won’t need to create\
    \ an IBOutlet variable for that object.\n\nTo make certain user interface objects\
    \ interactive such as buttons, you need to write IBAction methods. When you create\
    \ an IBAction method, you also need to write Swift code that does something useful.\
    \ Both IBOutlet variables and IBAction methods get stored in the .swift file connected\
    \ to a particular controller.\n\nTo keep you from rewriting commonly used code,\
    \ Apple offers frameworks that contain functions that you can use. These framework\
    \ functions have been tested so you can use them and write apps faster by focusing\
    \ solely on the unique code that makes your app work. Apple provides dozens of\
    \ different frameworks that your app can use although it’s unlikely you’ll ever\
    \ use or need all of them in a single app.\n\nTo help you write and understand\
    \ Swift code, Xcode lets you hold down the Option key and click different commands.\
    \ This displays a window that offers further explanations for how a particular\
    \ command works. Since many .swift files contain lots of code, Xcode lets you\
    \ temporarily hide code in functions so you can focus on only the code you want\
    \ to see.\n\nSwift code makes your app do something useful, so you’ll spend lots\
    \ of time writing, rewriting, and studying code. Knowing how to use Swift is just\
    \ the first step to creating iOS apps. You also need to know how to use Xcode\
    \ as well.\n\n# 4. Using Xcode\n\nBefore you start writing Swift code and designing\
    \ user interfaces, take a moment to get acquainted with Xcode, Apple’s free tool\
    \ for creating apps. Xcode offers so many features because it’s designed to handle\
    \ all your needs in creating an app from start to finish. Fortunately, you won’t\
    \ have to learn every single feature of Xcode to start creating apps. Instead,\
    \ you can just focus on learning only the features you need and gradually learn\
    \ any additional features of Xcode later. Xcode provides the following features\
    \ to help you create apps for all of Apple’s products:\n\n*   Writing and editing\
    \ Swift code\n\n*   Designing a user interface\n\n*   Debugging your app to find\
    \ and fix problems\n\n*   Running and testing your app\n\nXcode is both an editor\
    \ and a compiler. The editor lets you write and modify Swift code along with designing\
    \ and customizing user interfaces. Once you’re done creating your user interface\
    \ and Swift code, you can use Xcode to compile and run your app to make sure it\
    \ works.\n\n## Changing Xcode’s Appearance\n\nWhether you’re working on a small\
    \ laptop screen or a much larger desktop monitor, chances are good you won’t always\
    \ have enough room to see everything in Xcode. That’s why Xcode offers several\
    \ ways to hide or display information. That way you can focus on what you want\
    \ to see and avoid the clutter of additional information that might get in your\
    \ way.\n\nSome of the different parts that Xcode can hide or display include the\
    \ following:\n\n*   Navigator pane\n\n*   Toolbar\n\n*   Tab bar\n\n*   Debug\
    \ Area\n\n*   Inspector pane\n\n*   Document Outline\n\n*   Object Library\n\n\
    ### The Navigator Pane\n\nThe Navigator pane appears on the left side of the Xcode\
    \ window. You can toggle between hiding and displaying the Navigator pane by choosing\
    \ any of the following commands:\n\n*   Choose View ➤ Navigators ➤ Show/Hide Navigator.\n\
    \n*   Press Command + 0 (zero).\n\nYou can also resize the width of the Navigator\
    \ pane by moving the mouse pointer over the border of the Navigator pane and dragging\
    \ the mouse left or right. By making the Navigator pane too narrow, you can hide\
    \ it completely.\n\n### Note\n\nDragging the mouse to the left can hide the Navigator\
    \ pane, but then you’ll need to choose View ➤ Navigators ➤ Show Navigator or press\
    \ Command + 0 (zero) to make the Navigator pane appear again.\n\nAlthough the\
    \ Navigator pane can display different information, the three most common types\
    \ of information to use include the following:\n\n*   Project Navigator (Command\
    \ + 1) – Displays all the folders and files that make up your project including\
    \ your .swift files and .storyboard user interface.\n\n*   Symbol Navigator (Command\
    \ + 3) – Lists all the functions stored in each .swift file.\n\n*   Issue Navigator\
    \ (Command + 5) – Displays possible problems with your project.\n\nTo see how\
    \ these three different types of navigators work, follow these steps:\n\n1.  Open\
    \ the MyFirstApp project that displays a label, button, and text field on a view.\n\
    \n2.  Choose View ➤ Navigators ➤ Show Project Navigator, press Command + 1, or\
    \ click the Project Navigator icon. Xcode shows a list of folders and files that\
    \ make up your project as shown in Figure [4-1](#329781_5_En_4_Chapter.xhtml#Fig1).\
    \ The Project Navigator is used when you want to view a different file in the\
    \ middle Xcode pane.\n\n    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig1_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig1_HTML.jpg)\n\
    \n    Figure 4-1.\n\n    Choosing the Project Navigator\n\n3.  Click the ViewController.swift\
    \ file in the Navigator pane. Xcode’s middle pane displays the contents of the\
    \ ViewController.swift file so you can write and edit Swift code in that file.\n\
    \n4.  Click the Main.storyboard file in the Navigator pane. Xcode’s middle pane\
    \ displays the user interface of your app so you can design and edit the user\
    \ interface such as adding buttons or labels.\n\n5.  Choose View ➤ Navigators\
    \ ➤ Show Symbol Navigator, press Command + 3, or click the Symbol Navigator icon.\
    \ Xcode shows a list of .swift files that make up your project. By clicking the\
    \ gray disclosure triangle to the left of each .swift file name, you can expand\
    \ or collapse the list of functions and variables used in each .swift file as\
    \ shown in Figure [4-2](#329781_5_En_4_Chapter.xhtml#Fig2) .\n\n    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig2_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig2_HTML.jpg)\n\
    \n    Figure 4-2.\n\n    The Symbol navigator lets you quickly find a function\
    \ or variable stored in a .swift file\n\n6.  Click the gray disclosure triangle\
    \ to the left of the ViewController file to display the list of functions (also\
    \ known as methods, identified by a capital M icon) and variables (also known\
    \ as properties, identified by a capital P icon) in that file.\n\n7.  Click the\
    \ changeButton method. Xcode highlights the changeButton method in the ViewController.swift\
    \ file (see Figure [4-2](#329781_5_En_4_Chapter.xhtml#Fig2)).\n\n8.  Click the\
    \ labelResult property. Xcode highlights the labelResult property in the ViewController.swift\
    \ file. The Symbol navigator helps you quickly jump to a specific property or\
    \ method in your project.\n\n9.  Choose View ➤ Navigators ➤ Show Project Navigator,\
    \ press Command + 1, or click the Project Navigator icon. Then click the Main.storyboard\
    \ file to view your app’s user interface.\n\n10.  Choose View ➤ Navigators ➤ Show\
    \ Issue Navigator, press Command + 5, or click the Issue Navigator icon. The Issue\
    \ Navigator displays warnings about your project as shown in Figure [4-3](#329781_5_En_4_Chapter.xhtml#Fig3).\
    \ Yellow icons represent problems that let your app still work but could cause\
    \ problems with the user interface’s appearance or code not being completely safe\
    \ to run. Red icons represent problems that keep your app from working at all.\n\
    \n    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig3_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig3_HTML.jpg)\n\
    \n    Figure 4-3.\n\n    The Issue Navigator lets you view possible problems with\
    \ your project"
  trans: "\n# 摘要\n\nSwift 代码决定了应用的运行方式。要在用户界面上检索或显示数据，你需要创建 `IBOutlet` 变量，并将它们与文本字段和标签等不同的用户界面对象关联起来。如果某个用户界面对象不用于检索或显示数据，那么你就不需要为该对象创建\
    \ `IBOutlet` 变量。\n\n为了使按钮等特定用户界面对象具有交互性，你需要编写 `IBAction` 方法。在创建 `IBAction` 方法时，你还需要编写能实现特定功能的\
    \ Swift 代码。`IBOutlet` 变量和 `IBAction` 方法都存储在连接到特定控制器的 `.swift` 文件中。\n\n为了避免重复编写常用代码，Apple\
    \ 提供了包含各种可调用函数的框架。这些框架函数已经过测试，因此你可以直接使用它们，通过专注于编写让应用实现其独特功能的核心代码，来更快地开发应用。Apple\
    \ 提供了数十种不同的框架供你的应用使用，但不太可能在单个应用中用到或需要所有这些框架。\n\n为了帮助你编写和理解 Swift 代码，Xcode 允许你按住\
    \ Option 键并点击不同的命令。这会显示一个窗口，提供有关特定命令如何工作的进一步说明。由于许多 `.swift` 文件包含大量代码，Xcode 允许你临时隐藏函数中的代码，以便只专注于查看你需要的代码。\n\
    \nSwift 代码让你的应用实现实用功能，因此你会花费大量时间编写、重写和研究代码。了解如何使用 Swift 只是创建 iOS 应用的第一步。你还需要知道如何使用\
    \ Xcode。\n\n# 4. 使用 Xcode\n\n在开始编写 Swift 代码和设计用户界面之前，请花点时间熟悉一下 Xcode，这是 Apple\
    \ 提供的免费应用开发工具。Xcode 提供了众多功能，旨在满足你从头到尾创建应用的所有需求。幸运的是，你无需学习 Xcode 的每一个功能就能开始创建应用。相反，你可以只专注于学习你需要的那些功能，然后逐步掌握\
    \ Xcode 的其他功能。Xcode 提供了以下功能来帮助你为所有 Apple 产品创建应用：\n\n- 编写和编辑 Swift 代码\n- 设计用户界面\n\
    - 调试应用程序以查找和修复问题\n- 运行和测试你的应用\n\nXcode 既是编辑器，也是编译器。编辑器允许你编写和修改 Swift 代码，同时设计和自定义用户界面。完成用户界面和\
    \ Swift 代码的创建后，你可以使用 Xcode 来编译和运行你的应用，以确保其正常工作。\n\n## 更改 Xcode 的外观\n\n无论你是在小型笔记本电脑屏幕还是更大的台式显示器上工作，很可能你并不总是有足够的空间来查看\
    \ Xcode 中的所有内容。因此，Xcode 提供了多种隐藏或显示信息的方式。这样你就可以专注于你想看的内容，避免被多余的信息干扰。\n\nXcode 可以隐藏或显示的不同部分包括：\n\
    \n- 导航器面板\n- 工具栏\n- 标签栏\n- 调试区\n- 检查器面板\n- 文档大纲\n- 对象库\n\n### 导航器面板\n\n导航器面板位于\
    \ Xcode 窗口的左侧。你可以通过选择以下任一命令来切换隐藏或显示导航器面板：\n\n- 选择 “显示” ➤ “导航器” ➤ “显示/隐藏导航器”。\n\
    - 按下 Command + 0（零）。\n\n你也可以将鼠标指针移到导航器面板的边框上，然后向左或向右拖动鼠标，来调整导航器面板的宽度。将导航器面板变得太窄，可以将其完全隐藏。\n\
    \n**注意：** 向左拖动鼠标可以隐藏导航器面板，但之后你需要选择 “显示” ➤ “导航器” ➤ “显示导航器” 或按下 Command + 0（零）才能使导航器面板再次出现。\n\
    \n尽管导航器面板可以显示不同的信息，但最常用的三种信息类型包括：\n\n- **项目导航器 (Command + 1)** – 显示构成项目的所有文件夹和文件，包括你的\
    \ `.swift` 文件和 `.storyboard` 用户界面。\n- **符号导航器 (Command + 3)** – 列出每个 `.swift`\
    \ 文件中存储的所有函数。\n- **问题导航器 (Command + 5)** – 显示项目可能存在的问题。\n\n要了解这三种不同类型的导航器如何工作，请按照以下步骤操作：\n\
    \n1.  打开 `MyFirstApp` 项目，该项目在视图上显示一个标签、一个按钮和一个文本字段。\n\n2.  选择 “显示” ➤ “导航器” ➤ “显示项目导航器”，按下\
    \ Command + 1，或点击项目导航器图标。Xcode 会显示构成项目的文件夹和文件列表，如图 4-1 所示。当你想在 Xcode 中间窗格中查看不同文件时，可以使用项目导航器。\n\
    \n    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig1_HTML.jpg](img/329781_5_En_4_Fig1_HTML.jpg)\n\
    \n    **图 4-1.** 选择项目导航器\n\n3.  在导航器面板中点击 `ViewController.swift` 文件。Xcode 的中间窗格会显示\
    \ `ViewController.swift` 文件的内容，这样你就可以在该文件中编写和编辑 Swift 代码。\n\n4.  在导航器面板中点击 `Main.storyboard`\
    \ 文件。Xcode 的中间窗格会显示应用的用户界面，这样你就可以设计和编辑用户界面，例如添加按钮或标签。\n\n5.  选择 “显示” ➤ “导航器” ➤\
    \ “显示符号导航器”，按下 Command + 3，或点击符号导航器图标。Xcode 会显示构成项目的 `.swift` 文件列表。通过点击每个 `.swift`\
    \ 文件名左侧的灰色展开三角形，你可以展开或折叠每个 `.swift` 文件中使用的函数和变量列表，如图 4-2 所示。\n\n    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig2_HTML.jpg](img/329781_5_En_4_Fig2_HTML.jpg)\n\
    \n    **图 4-2.** 符号导航器允许你快速查找存储在 `.swift` 文件中的函数或变量\n\n6.  点击 `ViewController`\
    \ 文件左侧的灰色展开三角形，显示该文件中的函数（也称为方法，由大写字母 M 图标标识）和变量（也称为属性，由大写字母 P 图标标识）列表。\n\n7. \
    \ 点击 `changeButton` 方法。Xcode 会在 `ViewController.swift` 文件中高亮显示 `changeButton`\
    \ 方法（参见图 4-2）。\n\n8.  点击 `labelResult` 属性。Xcode 会在 `ViewController.swift` 文件中高亮显示\
    \ `labelResult` 属性。符号导航器可以帮助你快速跳转到项目中的特定属性或方法。\n\n9.  选择 “显示” ➤ “导航器” ➤ “显示项目导航器”，按下\
    \ Command + 1，或点击项目导航器图标。然后点击 `Main.storyboard` 文件查看应用的用户界面。\n\n10. 选择 “显示” ➤\
    \ “导航器” ➤ “显示问题导航器”，按下 Command + 5，或点击问题导航器图标。问题导航器会显示有关项目的警告，如图 4-3 所示。黄色图标代表允许应用继续运行但可能导致用户界面外观问题或代码运行不完全安全的问题。红色图标代表会导致应用完全无法运行的问题。\n\
    \n    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig3_HTML.jpg](img/329781_5_En_4_Fig3_HTML.jpg)\n\
    \n    **图 4-3.** 问题导航器允许你查看项目可能存在的问题\n"
- fmt: "### The Toolbar\n\nThe Toolbar appears at the top of the Xcode window and\
    \ displays icons that give you one-click access to common commands as shown in\
    \ Figure [4-4](#329781_5_En_4_Chapter.xhtml#Fig4) such as:\n\n![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig4_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig4_HTML.jpg)\n\
    \n**Figure 4-4.** The Toolbar at the top of the Xcode window\n\n- `Run` – Runs\
    \ your iOS project so you can test it in the Simulator (which mimics an iOS device)\
    \ or an actual iOS device connected to your Macintosh\n- `Stop` – Stops running\
    \ your iOS project\n- `Scheme` – Lets you choose which iOS device to mimic in\
    \ the Simulator or which iOS device to use if connected to your Macintosh\n- `Library`\
    \ – Opens the Object Library for designing a user interface (when viewing a `.storyboard`\
    \ file in Xcode’s middle pane) or the Code library (when viewing a `.swift` file\
    \ in Xcode’s middle pane)\n- `Standard Editor` – Displays the standard Editor\
    \ in Xcode’s middle pane\n- `Assistant Editor` – Displays two editors side by\
    \ side in Xcode’s middle pane\n- `Show/Hide Navigator pane` – Toggles between\
    \ hiding and showing the Navigator pane on the left side of the Xcode window\n\
    - `Show/Hide Debug area` – Toggles between hiding and showing the Debug area at\
    \ the bottom of the Xcode window\n- `Show/Hide Inspector pane` – Toggles between\
    \ hiding and showing the Inspector pane on the right side of the Xcode window\n\
    \nYou can toggle between hiding and showing the Toolbar by choosing one of the\
    \ following:\n\n- Choose **View** ➤ **Show/Hide Toolbar**.\n- Press **Option +\
    \ Command + T**.\n\nWhen you want to test your app, you can click the `Scheme`\
    \ popup menu to choose an iOS device. Then click the `Run` and `Stop` icons on\
    \ the Toolbar to start or stop your app from running on your chosen iOS device.\n\
    \nWhen you want to edit a `.swift` or `.storyboard` file, you can click the `Standard\
    \ Editor` icon on the Toolbar. When you need to view two files side by side, such\
    \ as a `.swift` and a `.storyboard` file, you can click the `Assistant Editor`\
    \ icon. When editing a `.storyboard` file, you can click the `Library` icon to\
    \ access different objects to place on your user interface.\n\nFinally, you can\
    \ selectively hide or show the Navigator pane, Debug area, or Inspector pane.\
    \ Hiding any of these areas gives the middle pane more room to appear in Xcode.\n\
    \nTo see how these common icons work in Xcode, follow these steps:\n\n1. Make\
    \ sure your `MyFirstApp` project is loaded in Xcode.\n2. Choose **View** ➤ **Hide\
    \ Toolbar**. The Toolbar disappears from the top of the Xcode window.\n3. Choose\
    \ **View** ➤ **Show Toolbar**. The Toolbar appears again at the top of the Xcode\
    \ window.\n4. Click the `Show/Hide Navigator pane` icon on the far right of the\
    \ Toolbar. Notice that the Navigator pane disappears.\n5. Click the `Show/Hide\
    \ Navigator pane` icon again to make the Navigator pane appear.\n6. Click the\
    \ `Show/Hide Inspector` icon. Notice that the Inspector pane disappears.\n7. Click\
    \ the `Show/Hide Inspector pane` icon again to make the Inspector pane appear\
    \ again.\n8. Click the `Scheme` popup menu on the far left of the Toolbar. A menu\
    \ appears listing different iOS devices you can select for the Simulator to mimic\
    \ as shown in Figure [4-5](#329781_5_En_4_Chapter.xhtml#Fig5).\n\n![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig5_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig5_HTML.jpg)\n\
    \n**Figure 4-5.** The `Scheme` popup menu displays different iOS devices you can\
    \ test your app on\n\n9. Select an iOS device such as iPhone 8 or iPhone XR.\n\
    10. Click the `ViewController.swift` file in the Navigator pane.\n11. Edit the\
    \ `ViewController.swift` file so the `changeButton` method looks like this:\n\n\
    ```\n@IBAction func changeButton(_ sender: UIButton) {\n    labelResult.text =\
    \ textMessage.text?.uppercased()\n    print (labelResult.text!)\n}\n```\n\n12.\
    \ Click the `Run` icon on the Toolbar. The Simulator appears, displaying the `MyFirstApp`’s\
    \ user interface.\n13. Click in the text field on the user interface and type\
    \ **Hello, world!**\n14. Click the button on the user interface. The label displays\
    \ **HELLO, WORLD!**\n15. Click the `Stop` icon on the Toolbar in the Xcode window.\
    \ Notice that this stops your app from running on the Simulator, but the Simulator\
    \ window still remains on the screen.\n16. Choose **Simulator** ➤ **Quit Simulator**\
    \ to make the Simulator window go away. Notice that the bottom of the Xcode window\
    \ displays the Debug Area because the `print (labelResult.text!)` command prints\
    \ **HELLO, WORLD!** in the Debug Area as shown in Figure [4-6](#329781_5_En_4_Chapter.xhtml#Fig6).\n\
    \n![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig6_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig6_HTML.jpg)\n\
    \n**Figure 4-6.** The Debug Area appears at the bottom of the Xcode pane\n\n17.\
    \ Click the `Show/Hide Debug Area` icon on the far right of the Toolbar, or click\
    \ the **Close Debug Area** in the upper left corner of the Debug Area pane. Notice\
    \ that the Debug Area disappears."
  raw: "### The Toolbar\n\nThe Toolbar appears at the top of the Xcode window and\
    \ displays icons that give you one-click access to common commands as shown in\
    \ Figure [4-4](#329781_5_En_4_Chapter.xhtml#Fig4) such as\n\n![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig4_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig4_HTML.jpg)\n\
    \nFigure 4-4.\n\nThe Toolbar at the top of the Xcode window\n\n*   Run – Runs\
    \ your iOS project so you can test it in the Simulator (which mimics an iOS device)\
    \ or an actual iOS device connected to your Macintosh\n\n*   Stop – Stops running\
    \ your iOS project\n\n*   Scheme – Lets you choose which iOS device to mimic in\
    \ the Simulator or which iOS device to use if connected to your Macintosh\n\n\
    *   Library – Opens the Object Library for designing a user interface (when viewing\
    \ a .storyboard file in Xcode’s middle pane) or the Code library (when viewing\
    \ a .swift file in Xcode’s middle pane)\n\n*   Standard Editor – Displays the\
    \ standard Editor in Xcode’s middle pane\n\n*   Assistant Editor – Displays two\
    \ editors side by side in Xcode’s middle pane\n\n*   Show/Hide Navigator pane –\
    \ Toggles between hiding and showing the Navigator pane on the left side of the\
    \ Xcode window\n\n*   Show/Hide Debug area – Toggles between hiding and showing\
    \ the Debug area at the bottom of the Xcode window\n\n*   Show/Hide Inspector\
    \ pane – Toggles between hiding and showing the Inspector pane on the right side\
    \ of the Xcode window\n\nYou can toggle between hiding and showing the Toolbar\
    \ by choosing one of the following:\n\n*   Choose View ➤ Show/Hide Toolbar.\n\n\
    *   Press Option + Command + T.\n\nWhen you want to test your app, you can click\
    \ the Scheme popup menu to choose an iOS device. Then click the Run and Stop icons\
    \ on the Toolbar to start or stop your app from running on your chosen iOS device.\n\
    \nWhen you want to edit a .swift or .storyboard file, you can click the Standard\
    \ Editor icon on the Toolbar. When you need to view two files side by side, such\
    \ as a .swift and a .storyboard file, you can click the Assistant Editor icon.\
    \ When editing a .storyboard file, you can click the Library icon to access different\
    \ objects to place on your user interface.\n\nFinally, you can selectively hide\
    \ or show the Navigator pane, Debug area, or Inspector pane. Hiding any of these\
    \ areas gives the middle pane more room to appear in Xcode.\n\nTo see how these\
    \ common icons work in Xcode, follow these steps:\n\n1.  Make sure your MyFirstApp\
    \ project is loaded in Xcode.\n\n2.  Choose View ➤ Hide Toolbar. The Toolbar disappears\
    \ from the top of the Xcode window.\n\n3.  Choose View ➤ Show Toolbar. The Toolbar\
    \ appears again at the top of the Xcode window.\n\n4.  Click the Show/Hide Navigator\
    \ pane icon on the far right of the Toolbar. Notice that the Navigator pane disappears.\n\
    \n5.  Click the Show/Hide Navigator pane icon again to make the Navigator pane\
    \ appear.\n\n6.  Click the Show/Hide Inspector icon. Notice that the Inspector\
    \ pane disappears.\n\n7.  Click the Show/Hide Inspector pane icon again to make\
    \ the Inspector pane appear again.\n\n8.  Click the Scheme popup menu on the far\
    \ left of the Toolbar. A menu appears listing different iOS devices you can select\
    \ for the Simulator to mimic as shown in Figure [4-5](#329781_5_En_4_Chapter.xhtml#Fig5).\n\
    \n![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig5_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig5_HTML.jpg)\n\
    \nFigure 4-5.\n\nThe Scheme popup menu displays different iOS devices you can\
    \ test your app on\n\n9.  Select an iOS device such as iPhone 8 or iPhone XR.\n\
    \n10.  Click the ViewController.swift file in the Navigator pane.\n\n11.  Edit\
    \ the ViewController.swift file so the changeButton method looks like this:\n\n\
    ```\n    @IBAction func changeButton(_ sender: UIButton) {\n    labelResult.text\
    \ = textMessage.text?.uppercased()\n    print (labelResult.text!)\n    }\n   \
    \ ```\n\n12.  Click the Run icon on the Toolbar. The Simulator appears, displaying\
    \ the MyFirstApp’s user interface.\n\n13.  Click in the text field on the user\
    \ interface and type **Hello, world!**\n\n14.  Click the button on the user interface.\
    \ The label displays HELLO, WORLD!\n\n15.  Click the Stop icon on the Toolbar\
    \ in the Xcode window. Notice that this stops your app from running on the Simulator,\
    \ but the Simulator window still remains on the screen.\n\n16.  Choose Simulator\
    \ ➤ Quit Simulator to make the Simulator window go away. Notice that the bottom\
    \ of the Xcode window displays the Debug Area because the print (labelResult.text!)\
    \ command prints HELLO, WORLD! in the Debug Area as shown in Figure [4-6](#329781_5_En_4_Chapter.xhtml#Fig6).\n\
    \n![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig6_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig6_HTML.jpg)\n\
    \nFigure 4-6.\n\nThe Debug Area appears at the bottom of the Xcode pane\n\n17.\
    \  Click the Show/Hide Debug Area icon on the far right of the Toolbar, or click\
    \ the Close Debug Area in the upper left corner of the Debug Area pane. Notice\
    \ that the Debug Area disappears."
  trans: "\n### 工具栏\n\n工具栏 位于 Xcode 窗口顶部，显示了一些图标，让您能一键访问常用命令，如图 4-4 所示：\n\n![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig4_HTML.jpg](img/329781_5_En_4_Fig4_HTML.jpg)\n\
    \n**图 4-4.** Xcode 窗口顶部的工具栏\n\n-   `Run` – 运行您的 iOS 项目，以便在模拟器（模拟 iOS 设备）或连接到 Macintosh\
    \ 的实际 iOS 设备上进行测试\n-   `Stop` – 停止运行您的 iOS 项目\n-   `Scheme` – 让您选择在模拟器中模拟哪个 iOS\
    \ 设备，或选择已连接到 Macintosh 的哪个 iOS 设备\n-   `Library` – 打开对象库以设计用户界面（当在 Xcode 中间窗格中查看\
    \ `.storyboard` 文件时），或打开代码库（当在 Xcode 中间窗格中查看 `.swift` 文件时）\n-   `Standard Editor`\
    \ – 在 Xcode 的中间窗格中显示标准编辑器\n-   `Assistant Editor` – 在 Xcode 的中间窗格中并排显示两个编辑器\n\
    -   `Show/Hide Navigator pane` – 切换 Xcode 窗口左侧导航器面板的隐藏与显示\n-   `Show/Hide Debug\
    \ area` – 切换 Xcode 窗口底部调试区域的隐藏与显示\n-   `Show/Hide Inspector pane` – 切换 Xcode 窗口右侧检查器面板的隐藏与显示\n\
    \n您可以通过以下任一方式切换工具栏的隐藏与显示：\n\n-   选择 **View** ➤ **Show/Hide Toolbar**。\n-   按下\
    \ **Option + Command + T**。\n\n当您想要测试应用时，可以点击 `Scheme` 弹出菜单选择一个 iOS 设备。然后点击工具栏上的\
    \ `Run` 和 `Stop` 图标来启动或停止您在所选 iOS 设备上运行的应用。\n\n当您想要编辑 `.swift` 或 `.storyboard`\
    \ 文件时，可以点击工具栏上的 `Standard Editor` 图标。当您需要并排查看两个文件（例如 `.swift` 和 `.storyboard`\
    \ 文件）时，可以点击 `Assistant Editor` 图标。编辑 `.storyboard` 文件时，可以点击 `Library` 图标来获取不同的对象并将其放置到用户界面上。\n\
    \n最后，您可以选择隐藏或显示导航器面板、调试区域或检查器面板。隐藏这些区域中的任何一个，都能为中间窗格在 Xcode 中提供更多显示空间。\n\n要了解这些常用图标在\
    \ Xcode 中的工作方式，请遵循以下步骤：\n\n1.  确保您的 `MyFirstApp` 项目已在 Xcode 中加载。\n2.  选择 **View**\
    \ ➤ **Hide Toolbar**。工具栏会从 Xcode 窗口顶部消失。\n3.  选择 **View** ➤ **Show Toolbar**。工具栏会再次出现在\
    \ Xcode 窗口顶部。\n4.  点击工具栏最右侧的 `Show/Hide Navigator pane` 图标。注意导航器面板消失了。\n5.  再次点击\
    \ `Show/Hide Navigator pane` 图标使导航器面板重新出现。\n6.  点击 `Show/Hide Inspector` 图标。注意检查器面板消失了。\n\
    7.  再次点击 `Show/Hide Inspector pane` 图标使检查器面板重新出现。\n8.  点击工具栏最左侧的 `Scheme` 弹出菜单。会出现一个菜单，列出可以供模拟器模拟的不同\
    \ iOS 设备，如图 4-5 所示。\n\n![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig5_HTML.jpg](img/329781_5_En_4_Fig5_HTML.jpg)\n\
    \n**图 4-5.** `Scheme` 弹出菜单显示了您可以在其上测试应用的不同 iOS 设备\n\n9.  选择一个 iOS 设备，例如 iPhone\
    \ 8 或 iPhone XR。\n10. 在导航器面板中点击 `ViewController.swift` 文件。\n11. 编辑 `ViewController.swift`\
    \ 文件，使 `changeButton` 方法如下所示：\n\n```\n@IBAction func changeButton(_ sender: UIButton)\
    \ {\n    labelResult.text = textMessage.text?.uppercased()\n    print (labelResult.text!)\n\
    }\n```\n\n12. 点击工具栏上的 `Run` 图标。模拟器会出现，显示 `MyFirstApp` 的用户界面。\n13. 点击用户界面上的文本字段，输入\
    \ **Hello, world!**\n14. 点击用户界面上的按钮。标签会显示 **HELLO, WORLD!**\n15. 点击 Xcode 窗口中工具栏上的\
    \ `Stop` 图标。注意这会停止应用在模拟器上运行，但模拟器窗口仍然保留在屏幕上。\n16. 选择 **Simulator** ➤ **Quit Simulator**\
    \ 来关闭模拟器窗口。注意 Xcode 窗口底部会显示调试区域，因为 `print (labelResult.text!)` 命令会在调试区域打印出 **HELLO,\
    \ WORLD!**，如图 4-6 所示。\n\n![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig6_HTML.jpg](img/329781_5_En_4_Fig6_HTML.jpg)\n\
    \n**图 4-6.** 调试区域出现在 Xcode 窗格底部\n\n17. 点击工具栏最右侧的 `Show/Hide Debug Area` 图标，或点击调试区域窗格左上角的\
    \ **Close Debug Area**。注意调试区域消失了。\n"
- fmt: "### Tab Bar\n\nXcode 的一个问题是，通常每次只能通过点击导航区中的文件来查看一个文件。助理编辑器可以让你并排查看两个文件，但每个文件都会显得很窄。为了帮助你快速在文件之间来回切换，可以使用\
    \ Tab Bar。\n\n默认情况下，Tab Bar 是隐藏的。要切换显示或隐藏 Tab Bar，请选择 `View ➤ Show/Hide Tab Bar`。\n\
    \nTab Bar 的主要用途是显示代表不同 `.swift` 或 `.storyboard` 文件的选项卡。通过点击选项卡，你可以在文件之间快速切换，而无需先在导航区点击文件名。\n\
    \n要了解如何使用 Tab Bar，请按照以下步骤操作：\n\n1.  确保 `MyFirstApp` 项目已在 Xcode 中加载。\n\n2.  在导航区点击\
    \ `Main.storyboard` 文件。Xcode 会在中间面板显示 `.storyboard` 文件。\n\n3.  选择 `View ➤ Show\
    \ Tab Bar`。Tab Bar 会出现在 Xcode 窗口中。最初只有一个选项卡，显示 `Main.storyboard` 文件的名称，如图 [4-7](#329781_5_En_4_Chapter.xhtml#Fig7)\
    \ 所示。\n\n    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig7_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig7_HTML.jpg)\n\
    \    \n    *图 4-7. 每个选项卡显示其所代表的文件名称*\n\n4.  点击 Tab Bar 最右侧的新建选项卡图标（`+`）。Xcode\
    \ 会显示第二个选项卡。\n\n5.  在导航区点击 `ViewController.swift` 文件。注意，Tab Bar 现在显示两个选项卡：一个代表\
    \ `Main.storyboard` 文件，另一个代表 `ViewController.swift` 文件。\n\n6.  点击 `Main.storyboard`\
    \ 选项卡。Xcode 会显示 `.storyboard` 文件。\n\n7.  点击 `ViewController.swift` 选项卡。Xcode 会显示\
    \ `.swift` 文件。通过使用选项卡，你可以加载最常编辑的文件，并在它们之间来回切换。\n\n8.  选择 `View ➤ Show All Tabs`，或按下\
    \ `Shift + Command + \\`。Xcode 会显示所有打开选项卡的缩略图。这让你可以快速浏览所有当前打开的文件，如图 [4-8](#329781_5_En_4_Chapter.xhtml#Fig8)\
    \ 所示。（你可以通过点击 `+` 缩略图来创建一个新选项卡。）\n\n    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig8_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig8_HTML.jpg)\n\
    \    \n    *图 4-8. 以缩略图形式显示的选项卡*\n\n9.  选择 `View ➤ Show All Tabs` 或按下 `Shift +\
    \ Command + \\` 以隐藏选项卡的缩略图。\n\n10. 将鼠标指针移动到 `ViewController.swift` 选项卡的左侧。会出现一个关闭图标（`X`），如图\
    \ [4-9](#329781_5_En_4_Chapter.xhtml#Fig9) 所示。\n\n    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig9_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig9_HTML.jpg)\n\
    \    \n    *图 4-9. 关闭图标出现在每个选项卡的最左侧*\n\n11. 点击 `ViewController.swift` 选项卡上的关闭图标。该选项卡会消失。请注意，Tab\
    \ Bar 中必须始终至少有一个选项卡。\n\n12. 选择 `View ➤ Hide Tab Bar`。Xcode 会隐藏 Tab Bar。\n\n###\
    \ 注意\n\n当且仅当只有一个选项卡打开时，你才能隐藏 Tab Bar。如果同时打开了多个选项卡，\"Hide Tab Bar\" 命令会显示为灰色不可用状态。\n\
    \n## Marking Swift Code\n\n通过使用符号导航器，你可以查看项目中所有的 `.swift` 文件，并跳转到每个文件中存储的属性和方法。但是，如果你想将\
    \ `.swift` 文件划分为任意部分，你可以创建一个特殊的 `MARK` 注释，用以定义一组相关的代码。`MARK` 命令如下所示：\n\n```\n\
    // MARK:\n```\n\n两个 `//` 符号定义了这行是一个注释。\n\n`MARK:` 命令定义了这是一个标记部分。\n\n`<description>`\
    \ 文本代表你希望定义该部分名称的任意文本。如果你想把部分命名为 `All Properties`，那么标记行应该如下所示：\n\n```\n// MARK:\
    \ All Properties\n```\n\n通过使用 `MARK` 注释来划分你的 Swift 代码，你可以快速跳转到任何 `.swift` 文件的不同部分。要了解其如何工作，请按照以下步骤操作：\n\
    \n1.  在 Xcode 中打开 `MyFirstApp` 项目。\n\n2.  在导航区点击 `ViewController.swift` 文件。\n\n\
    3.  修改 `ViewController.swift` 文件，在 `IBOutlet` 属性和 `IBAction` 方法上方添加两个 `// MARK:`\
    \ 注释，使其看起来像这样：\n\n    ```\n    import UIKit\n    class ViewController: UIViewController\
    \ {\n    // MARK: Properties\n    @IBOutlet var labelResult: UILabel!\n    @IBOutlet\
    \ var textMessage: UITextField!\n    override func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    }\n    // MARK: Methods\n    @IBAction func changeButton(_ sender: UIButton)\
    \ {\n    labelResult.text = textMessage.text?.uppercased()\n    print (labelResult.text!)\n\
    \    }\n    }\n    ```\n\n    注意，Xcode 中间面板的顶部会显示一个层级，例如 `MyFirstApp ➤ MyFirstApp\
    \ ➤ ViewController.swift`，如图 [4-10](#329781_5_En_4_Chapter.xhtml#Fig10) 所示。\n\n\
    \    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig10_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig10_HTML.jpg)\n\
    \    \n    *图 4-10. 项目、文件夹和文件的层级列表*\n\n4.  点击出现在 `ViewController.swift >` 之后的最后一个项（在图\
    \ [4-10](#329781_5_En_4_Chapter.xhtml#Fig10) 中，该项是 `viewDidLoad()`）。会弹出一个菜单，如图\
    \ [4-11](#329781_5_En_4_Chapter.xhtml#Fig11) 所示。\n\n    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig11_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig11_HTML.jpg)\n\
    \    \n    *图 4-11. 用于跳转到当前打开的 `.swift` 文件中不同部分的弹出菜单*\n\n5.  点击 `Properties`。Xcode\
    \ 会高亮 `// MARK: Properties` 这一行。\n\n6.  再次点击出现在 `ViewController.swift >` 之后的最后一个项，以显示弹出菜单。\n\
    \n7.  点击 `Methods`。Xcode 会高亮 `// MARK: Methods` 这一行。\n\n在我们当前这个简短的 `ViewController.swift`\
    \ 文件中，使用 `// MARK:` 注释可能并非必需，但在一个包含大量 Swift 代码的大文件中，你可以看到，将一个大文件划分为命名部分，会使查找和跳转到\
    \ `.swift` 文件的特定部分变得更快、更容易。\n\n即使你没有在任何一个 `.swift` 文件中添加 `// MARK:` 注释，你仍然可以点击层级列表中的项来跳转到\
    \ `.swift` 文件的不同部分。在图 [4-11](#329781_5_En_4_Chapter.xhtml#Fig11) 中，不用点击（由 `//\
    \ MARK:` 注释定义的） `Properties` 或 `Methods`，你可以轻松点击不同的属性（`labelResult` 或 `textMessage`）或不同的方法（`viewDidLoad`\
    \ 或 `changeButton`）来跳转到 `.swift` 文件中的相应位置。"
  raw: "### The Tab Bar\n\nOne problem with Xcode is that you can normally view one\
    \ file at a time by clicking that file in the Navigator pane. The Assistant Editor\
    \ lets you see two files side by side, but each file appears narrow. To help you\
    \ switch back and forth between files quickly, you can use the Tab bar.\n\nBy\
    \ default, the Tab bar remains hidden. To toggle between showing and hiding the\
    \ Tab bar, choose View ➤ Show/Hide Tab Bar.\n\nThe main purpose of the Tab bar\
    \ is to display tabs representing different .swift or .storyboard files. By clicking\
    \ a tab, you can quickly switch between files within clicking the file name in\
    \ the Navigator pane first.\n\nTo see how to use the Tab bar, follow these steps:\n\
    \n1.  Make sure the MyFirstApp project is loaded in Xcode.\n\n2.  Click the Main.storyboard\
    \ file in the Navigator pane. Xcode displays the .storyboard file in the middle\
    \ pane.\n\n3.  Choose View ➤ Show Tab Bar. The Tab bar appears at the Xcode window.\
    \ Initially there’s only one tab that displays the name of the Main.storyboard\
    \ file as shown in Figure [4-7](#329781_5_En_4_Chapter.xhtml#Fig7).\n\n    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig7_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig7_HTML.jpg)\n\
    \n    Figure 4-7.\n\n    Each tab displays the name of the file displayed by that\
    \ tab\n\n4.  Click the New tab icon (+) on the far right of the Tab bar. Xcode\
    \ displays a second tab.\n\n5.  Click the ViewController.swift file in the Navigator\
    \ pane. Notice that the Tab bar now displays two tabs: one representing the Main.storyboard\
    \ file and the other representing the ViewController.swift file.\n\n6.  Click\
    \ the Main.storyboard tab. Xcode displays the .storyboard file.\n\n7.  Click the\
    \ ViewController.swift tab. Xcode displays the .swift file. By using tabs, you\
    \ can load the files you need to edit most often and switch back and forth between\
    \ them.\n\n8.  Choose View ➤ Show All Tabs, or press Shift + Command + \\. Xcode\
    \ displays thumbnail images of all your open tabs. This lets you quickly view\
    \ all your currently open files as shown in Figure [4-8](#329781_5_En_4_Chapter.xhtml#Fig8).\
    \ (You can create a new tab by clicking the + thumbnail.)\n\n    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig8_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig8_HTML.jpg)\n\
    \n    Figure 4-8.\n\n    Tabs displayed as thumbnail images\n\n9.  Choose View\
    \ ➤ Show All Tabs or press Shift + Command + \\ to hide thumbnail images of your\
    \ tabs.\n\n10.  Move the mouse pointer to the left of the ViewController.swift\
    \ tab. A Close icon (X) appears as shown in Figure [4-9](#329781_5_En_4_Chapter.xhtml#Fig9).\n\
    \n    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig9_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig9_HTML.jpg)\n\
    \n    Figure 4-9.\n\n    The Close icon appears on the far left of each tab\n\n\
    11.  Click the Close icon on the ViewController.swift tab. The tab disappears.\
    \ Notice that you must always have at least one tab in the Tab bar.\n\n12.  Chose\
    \ View ➤ Hide Tab Bar. Xcode now hides the Tab bar.\n\n### Note\n\nYou can only\
    \ hide the Tab bar when you only have exactly one tab open. If you have multiple\
    \ tabs open, the Hide Tab Bar command appears grayed out.\n\n## Marking Swift\
    \ Code\n\nBy using the Symbol navigator, you can view all the .swift files in\
    \ your project and jump to the properties and methods stored in each file. However,\
    \ if you want to divide a .swift file into arbitrary sections, you can create\
    \ a special MARK comment that lets you define a group of related code. The MARK\
    \ command looks like this:\n\n```\n// MARK: \n```\n\nThe two // symbols define\
    \ this line as a comment.\n\nThe MARK: command defines this command as a markup\
    \ section.\n\nThe <description> text represents any arbitrary text you want to\
    \ define the name of your section. If you wanted to name your section All Properties,\
    \ then the markup line would look like this:\n\n```\n// MARK: All Properties\n\
    ```\n\nBy dividing your Swift code with the MARK comment, you can quickly jump\
    \ to different parts of any .swift file. To see how this works, follow these steps:\n\
    \n1.  Open the MyFirstApp project in Xcode.\n\n2.  Click the ViewController.swift\
    \ file in the Navigator pane.\n\n3.  Modify the ViewController.swift file with\
    \ two // MARK: comments above the IBOutlet properties and IBAction method so it\
    \ looks like this:\n\n    ```\n    import UIKit\n    class ViewController: UIViewController\
    \ {\n    // MARK: Properties\n    @IBOutlet var labelResult: UILabel!\n    @IBOutlet\
    \ var textMessage: UITextField!\n    override func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    }\n    // MARK: Methods\n    @IBAction func changeButton(_ sender: UIButton)\
    \ {\n    labelResult.text = textMessage.text?.uppercased()\n    print (labelResult.text!)\n\
    \    }\n    }\n    ```\n\n    Notice that the top of the middle pane in Xcode\
    \ displays a hierarchy such as MyFirstApp ➤ MyFirstApp ➤ ViewController.swift\
    \ as shown in Figure [4-10](#329781_5_En_4_Chapter.xhtml#Fig10).\n\n    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig10_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig10_HTML.jpg)\n\
    \n    Figure 4-10.\n\n    The hierarchy list of project, folder, and file\n\n\
    4.  Click the last item that appears after ViewController.swift > (in Figure [4-10](#329781_5_En_4_Chapter.xhtml#Fig10),\
    \ that item is viewDidLoad()). A menu appears as shown in Figure [4-11](#329781_5_En_4_Chapter.xhtml#Fig11).\n\
    \n    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig11_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig11_HTML.jpg)\n\
    \n    Figure 4-11.\n\n    A popup menu for jumping to a different part of the\
    \ currently open .swift file\n\n5.  Click Properties. Xcode highlights the //\
    \ MARK: Properties line.\n\n6.  Click the last item that appears after ViewController.swift\
    \ > to display the popup menu again.\n\n7.  Click Methods. Xcode highlights the\
    \ // MARK: Methods line.\n\nIn a short file like our current ViewController.swift\
    \ file, using the // MARK: comments may not be necessary, but in a large file\
    \ with lots of Swift code, you can see that dividing a large file into named sections\
    \ will make finding and jumping to a specific part of a .swift file much faster\
    \ and easier.\n\nEven if you don’t add // MARK: comments to any of your .swift\
    \ files, you can still click the hierarchy list of items to jump to different\
    \ parts of your .swift file. Instead of clicking Properties or Methods (defined\
    \ by // MARK: comments) in Figure [4-11](#329781_5_En_4_Chapter.xhtml#Fig11),\
    \ you could easily click the different properties (labelResult or textMessage)\
    \ or the different methods (viewDidLoad or changeButton) to jump to that particular\
    \ spot in the .swift file."
  trans: "\n### 标签栏（Tab Bar）\n\nXcode 的一个问题是，通常每次只能通过点击导航区中的文件来查看一个文件。助理编辑器可以让你并排查看两个文件，但每个文件都会显得很窄。为了帮助你快速在文件之间来回切换，可以使用标签栏。\n\
    \n默认情况下，标签栏是隐藏的。要切换显示或隐藏标签栏，请选择 `View ➤ Show/Hide Tab Bar`。\n\n标签栏的主要用途是显示代表不同\
    \ `.swift` 或 `.storyboard` 文件的选项卡。通过点击选项卡，你可以在文件之间快速切换，而无需先在导航区点击文件名。\n\n要了解如何使用标签栏，请按照以下步骤操作：\n\
    \n1.  确保 `MyFirstApp` 项目已在 Xcode 中加载。\n\n2.  在导航区点击 `Main.storyboard` 文件。Xcode\
    \ 会在中间面板显示 `.storyboard` 文件。\n\n3.  选择 `View ➤ Show Tab Bar`。标签栏会出现在 Xcode 窗口中。最初只有一个选项卡，显示\
    \ `Main.storyboard` 文件的名称，如图 4-7 所示。\n\n    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig7_HTML.jpg](img/329781_5_En_4_Fig7_HTML.jpg)\n\
    \    \n    *图 4-7. 每个选项卡显示其所代表的文件名称*\n\n4.  点击标签栏最右侧的新建选项卡图标（`+`）。Xcode 会显示第二个选项卡。\n\
    \n5.  在导航区点击 `ViewController.swift` 文件。注意，标签栏现在显示两个选项卡：一个代表 `Main.storyboard`\
    \ 文件，另一个代表 `ViewController.swift` 文件。\n\n6.  点击 `Main.storyboard` 选项卡。Xcode 会显示\
    \ `.storyboard` 文件。\n\n7.  点击 `ViewController.swift` 选项卡。Xcode 会显示 `.swift` 文件。通过使用选项卡，你可以加载最常编辑的文件，并在它们之间来回切换。\n\
    \n8.  选择 `View ➤ Show All Tabs`，或按下 `Shift + Command + \\`。Xcode 会显示所有打开选项卡的缩略图。这让你可以快速浏览所有当前打开的文件，如图\
    \ 4-8 所示。（你可以通过点击 `+` 缩略图来创建一个新选项卡。）\n\n    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig8_HTML.jpg](img/329781_5_En_4_Fig8_HTML.jpg)\n\
    \    \n    *图 4-8. 以缩略图形式显示的选项卡*\n\n9.  选择 `View ➤ Show All Tabs` 或按下 `Shift +\
    \ Command + \\` 以隐藏选项卡的缩略图。\n\n10. 将鼠标指针移动到 `ViewController.swift` 选项卡的左侧。会出现一个关闭图标（`X`），如图\
    \ 4-9 所示。\n\n    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig9_HTML.jpg](img/329781_5_En_4_Fig9_HTML.jpg)\n\
    \    \n    *图 4-9. 关闭图标出现在每个选项卡的最左侧*\n\n11. 点击 `ViewController.swift` 选项卡上的关闭图标。该选项卡会消失。请注意，标签栏中必须始终至少有一个选项卡。\n\
    \n12. 选择 `View ➤ Hide Tab Bar`。Xcode 会隐藏标签栏。\n\n### 注意\n\n当且仅当只有一个选项卡打开时，你才能隐藏标签栏。如果同时打开了多个选项卡，“Hide\
    \ Tab Bar” 命令会显示为灰色不可用状态。\n\n## 标记 Swift 代码（Marking Swift Code）\n\n通过使用符号导航器，你可以查看项目中所有的\
    \ `.swift` 文件，并跳转到每个文件中存储的属性和方法。但是，如果你想将 `.swift` 文件划分为任意部分，你可以创建一个特殊的 `MARK`\
    \ 注释，用以定义一组相关的代码。`MARK` 命令如下所示：\n\n```\n// MARK:\n```\n\n两个 `//` 符号定义了这行是一个注释。\n\
    \n`MARK:` 命令定义了这是一个标记部分。\n\n`<description>` 文本代表你希望定义该部分名称的任意文本。如果你想把部分命名为 `All\
    \ Properties`，那么标记行应该如下所示：\n\n```\n// MARK: All Properties\n```\n\n通过使用 `MARK`\
    \ 注释来划分你的 Swift 代码，你可以快速跳转到任何 `.swift` 文件的不同部分。要了解其如何工作，请按照以下步骤操作：\n\n1.  在 Xcode\
    \ 中打开 `MyFirstApp` 项目。\n\n2.  在导航区点击 `ViewController.swift` 文件。\n\n3.  修改 `ViewController.swift`\
    \ 文件，在 `IBOutlet` 属性和 `IBAction` 方法上方添加两个 `// MARK:` 注释，使其看起来像这样：\n\n    ```\n\
    \    import UIKit\n    class ViewController: UIViewController {\n    // MARK:\
    \ Properties\n    @IBOutlet var labelResult: UILabel!\n    @IBOutlet var textMessage:\
    \ UITextField!\n    override func viewDidLoad() {\n    super.viewDidLoad()\n \
    \   }\n    // MARK: Methods\n    @IBAction func changeButton(_ sender: UIButton)\
    \ {\n    labelResult.text = textMessage.text?.uppercased()\n    print (labelResult.text!)\n\
    \    }\n    }\n    ```\n\n    注意，Xcode 中间面板的顶部会显示一个层级，例如 `MyFirstApp ➤ MyFirstApp\
    \ ➤ ViewController.swift`，如图 4-10 所示。\n\n    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig10_HTML.jpg](img/329781_5_En_4_Fig10_HTML.jpg)\n\
    \    \n    *图 4-10. 项目、文件夹和文件的层级列表*\n\n4.  点击出现在 `ViewController.swift >` 之后的最后一个项（在图\
    \ 4-10 中，该项是 `viewDidLoad()`）。会弹出一个菜单，如图 4-11 所示。\n\n    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig11_HTML.jpg](img/329781_5_En_4_Fig11_HTML.jpg)\n\
    \    \n    *图 4-11. 用于跳转到当前打开的 `.swift` 文件中不同部分的弹出菜单*\n\n5.  点击 `Properties`。Xcode\
    \ 会高亮 `// MARK: Properties` 这一行。\n\n6.  再次点击出现在 `ViewController.swift >` 之后的最后一个项，以显示弹出菜单。\n\
    \n7.  点击 `Methods`。Xcode 会高亮 `// MARK: Methods` 这一行。\n\n在我们当前这个简短的 `ViewController.swift`\
    \ 文件中，使用 `// MARK:` 注释可能并非必需，但在一个包含大量 Swift 代码的大文件中，你可以看到，将一个大文件划分为命名部分，会使查找和跳转到\
    \ `.swift` 文件的特定部分变得更快、更容易。\n\n即使你没有在任何一个 `.swift` 文件中添加 `// MARK:` 注释，你仍然可以点击层级列表中的项来跳转到\
    \ `.swift` 文件的不同部分。在图 4-11 中，不用点击（由 `// MARK:` 注释定义的） `Properties` 或 `Methods`，你可以轻松点击不同的属性（`labelResult`\
    \ 或 `textMessage`）或不同的方法（`viewDidLoad` 或 `changeButton`）来跳转到 `.swift` 文件中的相应位置。\n"
- fmt: "## Renaming and Deleting IBOutlet Variables\n\nWhen you need to link Swift\
    \ code to a user interface object, you need to create an `IBOutlet` variable that\
    \ represents that user interface object such as\n\n```\n@IBOutlet var petLabel:\
    \ UILabel!\n```\n\nIf you want to rename an `IBOutlet`, you might think you can\
    \ just edit the `IBOutlet` variable name, but if you do this, you’ll also get\
    \ an error when running your project. The problem is that if you rename an `IBOutlet`\
    \ in a `.swift` file, the Connections Inspector is still looking for a connection\
    \ to the previous `IBOutlet` name.\n\nTo rename an `IBOutlet` variable, you must\
    \ let Xcode change the `IBOutlet` name in both the `.swift` file and in the Connections\
    \ Inspector pane by using the Refactor command.\n\nTo see how the Refactor command\
    \ works to rename an `IBOutlet`, follow these steps:\n\n1. Open the `MyFirstApp`\
    \ project in Xcode.\n2. Click the `ViewController.swift` file in the Navigator\
    \ pane.\n3. Select the `textMessage` `IBOutlet`. You can manually select the entire\
    \ \"textMessage\" name or simply double-click it to select it. Make sure the entire\
    \ \"textMessage\" appears selected.\n4. Choose Editor ➤ Refactor ➤ Rename as shown\
    \ in Figure 4-12. Xcode highlights all areas in your project where it found your\
    \ selected text (such as \"textMessage\") as shown in Figure 4-13.\n\n   ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig13_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig13_HTML.jpg)\n\
    \n   **Figure 4-13.** The Refactor command lets Xcode rename text throughout your\
    \ project\n\n   ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig12_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig12_HTML.jpg)\n\
    \n   **Figure 4-12.** The Refactor command appeared on the Editor menu\n\n5. Edit\
    \ the `textMessage` `IBOutlet` by changing its name to `textDisplay`.\n6. Click\
    \ the Rename button in the upper right corner of the middle Xcode pane. Xcode\
    \ automatically renames your `IBOutlet` and changes \"textMessage\" to \"textDisplay\"\
    \ everywhere in your project.\n7. Click `Main.storyboard` in the Navigator pane\
    \ and click the text field (which is linked to the `IBOutlet` variable now named\
    \ \"textDisplay\").\n8. Choose View ➤ Inspectors ➤ Show Connections Inspector,\
    \ or click the Connections Inspector icon in the upper right corner of the Xcode\
    \ window. Notice that the Connections Inspector now displays the connection to\
    \ an `IBOutlet` named \"textDisplay\" as shown in Figure 4-14.\n\n   ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig14_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig14_HTML.jpg)\n\
    \n   **Figure 4-14.** The Connections Inspector displays the updated `IBOutlet`\
    \ `textDisplay`\n\nWhat happens if you want to delete an `IBOutlet` that you may\
    \ have misspelled or simply don’t need anymore? You might think that you can simply\
    \ delete the `IBOutlet` from your `.swift` file, but if you do this and try running\
    \ your project, you’ll get an error.\n\nTo delete an `IBOutlet` variable, you\
    \ must follow two steps:\n\n- First, you must delete the `IBOutlet` variable in\
    \ your `.swift` file.\n- Second, you must break the connection of that `IBOutlet`\
    \ in the Connections Inspector pane.\n\nTo break the connection between a user\
    \ interface object and its `IBOutlet` variable, follow these steps:\n\n1. Click\
    \ the `.swift` file that contains the `IBOutlet` you want to delete.\n2. Select\
    \ the `IBOutlet` and press BACKSPACE or DELETE. This deletes the `IBOutlet` from\
    \ the `.swift` file, but we still need to break its connection to the user interface\
    \ object.\n3. Click `Main.storyboard` in the Navigator pane.\n4. Click the user\
    \ interface object that was linked to the `IBOutlet`.\n5. Choose View ➤ Inspectors\
    \ ➤ Show Connections Inspector, or click the Connections Inspector icon in the\
    \ upper right corner of the Xcode window. The Connections Inspector pane displays\
    \ the `IBOutlet` name and the `.swift` file that it’s connected to as shown in\
    \ Figure 4-15.\n\n   ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig15_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig15_HTML.jpg)\n\
    \n   **Figure 4-15.** The Connections Inspector displays the `IBOutlet` name and\
    \ the `.swift` file it’s connected to\n\n6. Click the X icon to break the connection.\n\
    \n## Summary\n\nXcode is the only tool you need to edit your Swift code, design\
    \ your user interface, and test your app to see if it works. By getting familiar\
    \ with Xcode, you can learn how to take advantage of its different features to\
    \ make viewing your files and editing Swift code easier and more convenient.\n\
    \nThe simplest way to adjust the appearance of Xcode is to temporarily hide the\
    \ Navigator pane, the Inspector pane, or the Debug Area. Xcode gives you multiple\
    \ ways to hide and display these different areas so you can choose the method\
    \ you like best.\n\nRather than rely on Xcode’s pull-down menus all the time,\
    \ you might find it easier to use the icons on the Toolbar to give you one-click\
    \ access to common commands such as Run (to run your app), Stop (to exit out of\
    \ your app), Assistant Editor (to open the Assistant editor), or Show/Hide the\
    \ Navigator pane/Debug Area/Inspector pane.\n\nIf you find yourself switching\
    \ back and forth between files, you may want to display the Tab bar. Now you’ll\
    \ be able to open two or more tabs to represent different files so you can click\
    \ and open each file without going through the Navigator pane over and over again.\n\
    \nIf your project won’t run because of error messages and your Swift code looks\
    \ fine, check the connections between all your user interface objects. If you\
    \ have too many (or not enough) connections, you may need to break some existing\
    \ connections and relink or rename your `IBOutlet`s so the names in the `.swift`\
    \ files exactly match the names displayed in the Connections Inspector pane.\n\
    \nXcode is a powerful, professional programming tool, so take some time to get\
    \ familiar with the more common features of Xcode and feel free to ignore any\
    \ features you don’t understand or need. As you get more familiar with Xcode,\
    \ you’ll gradually learn and need some of its more advanced features. Just remember\
    \ that few people ever need to use every possible feature in Xcode. The more you\
    \ use Xcode, the more comfortable you’ll feel using it over time.\n\n# 5. Working\
    \ with Controllers\n\nThere’s a saying that you don’t get a second chance to make\
    \ a first impression. In the world of app development, that first impression always\
    \ comes through your app’s user interface. It doesn’t matter how useful, fun,\
    \ and creative your app might be if the user interface is sloppy, poorly designed,\
    \ or confusing. If users don’t like your app’s user interface, nothing else will\
    \ really matter.\n\nDesigning a user interface is both an art and a science. As\
    \ a general rule, the best user interface is one that appears to be invisible.\
    \ Always remember that there will be multiple ways to accomplish the same task,\
    \ so create and test out radically different user interface designs to see which\
    \ one might be best suited for your particular app.\n\nFor example, consider the\
    \ task of enlarging a picture. In a traditional user interface from desktop computers,\
    \ a user interface could display a list of menus for the user to choose. Then\
    \ after choosing the right menu, the user could choose a command to enlarge a\
    \ picture. Then a dialog box could appear to give the user options for how much\
    \ to enlarge that picture.\n\nWhile this type of user interface might work, it’s\
    \ obviously clumsier and less intuitive than simply pinching on the screen and\
    \ moving your fingertips apart to enlarge a picture. The best user interface is\
    \ usually one that requires the fewest steps to achieve a desired task."
  raw: '## Renaming and Deleting IBOutlet Variables


    When you need to link Swift code to a user interface object, you need to create
    an IBOutlet variable that represents that user interface object such as


    ```

    @IBOutlet var petLabel: UILabel!

    ```


    If you want to rename an IBOutlet, you might think you can just edit the IBOutlet
    variable name, but if you do this, you’ll also get an error when running your
    project. The problem is that if you rename an IBOutlet in a .swift file, the Connections
    Inspector is still looking for a connection to the previous IBOutlet name.


    To rename an IBOutlet variable, you must let Xcode change the IBOutlet name in
    both the .swift file and in the Connections Inspector pane by using the Refactor
    command.


    To see how the Refactor command works to rename an IBOutlet, follow these steps:


    1.  Open the MyFirstApp project in Xcode.


    2.  Click the ViewController.swift file in the Navigator pane.


    3.  Select the textMessage IBOutlet. You can manually select the entire “textMessage”
    name or simply double-click it to select it. Make sure the entire “textMessage”
    appears selected.


    4.  Choose Editor ➤ Refactor ➤ Rename as shown in Figure [4-12](#329781_5_En_4_Chapter.xhtml#Fig12).
    Xcode highlights all areas in your project where it found your selected text (such
    as “textMessage”) as shown in Figure [4-13](#329781_5_En_4_Chapter.xhtml#Fig13).


    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig13_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig13_HTML.jpg)


    Figure 4-13.


    The Refactor command lets Xcode rename text throughout your project


    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig12_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig12_HTML.jpg)


    Figure 4-12.


    The Refactor command appeared on the Editor menu


    5.  Edit the textMessage IBOutlet by changing its name to **textDisplay**.


    6.  Click the Rename button in the upper right corner of the middle Xcode pane.
    Xcode automatically renames your IBOutlet and changes “textMessage” to “textDisplay”
    everywhere in your project.


    7.  Click Main.storyboard in the Navigator pane and click the text field (which
    is linked to the IBOutlet variable now named “textDisplay”).


    8.  Choose View ➤ Inspectors ➤ Show Connections Inspector, or click the Connections
    Inspector icon in the upper right corner of the Xcode window. Notice that the
    Connections Inspector now displays the connection to an IBOutlet named “textDisplay”
    as shown in Figure [4-14](#329781_5_En_4_Chapter.xhtml#Fig14).


    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig14_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig14_HTML.jpg)


    Figure 4-14.


    The Connections Inspector displays the updated IBOutlet textDisplay


    What happens if you want to delete an IBOutlet that you may have misspelled or
    simply don’t need anymore? You might think that you can simply delete the IBOutlet
    from your .swift file, but if you do this and try running your project, you’ll
    get an error.


    To delete an IBOutlet variable, you must follow two steps:


    *   First, you must delete the IBOutlet variable in your .swift file.


    *   Second, you must break the connection of that IBOutlet in the Connections
    Inspector pane.


    To break the connection between a user interface object and its IBOutlet variable,
    follow these steps :


    1.  Click the .swift file that contains the IBOutlet you want to delete.


    2.  Select the IBOutlet and press BACKSPACE or DELETE. This deletes the IBOutlet
    from the .swift file, but we still need to break its connection to the user interface
    object.


    3.  Click Main.storyboard in the Navigator pane.


    4.  Click the user interface object that was linked to the IBOutlet.


    5.  Choose View ➤ Inspectors ➤ Show Connections Inspector, or click the Connections
    Inspector icon in the upper right corner of the Xcode window. The Connections
    Inspector pane displays the IBOutlet name and the .swift file that it’s connected
    to as shown in Figure [4-15](#329781_5_En_4_Chapter.xhtml#Fig15).


    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig15_HTML.jpg](images/329781_5_En_4_Chapter/329781_5_En_4_Fig15_HTML.jpg)


    Figure 4-15.


    The Connections Inspector displays the IBOutlet name and the .swift file it’s
    connected to


    6.  Click the X icon to break the connection .


    ## Summary


    Xcode is the only tool you need to edit your Swift code, design your user interface,
    and test your app to see if it works. By getting familiar with Xcode, you can
    learn how to take advantage of its different features to make viewing your files
    and editing Swift code easier and more convenient.


    The simplest way to adjust the appearance of Xcode is to temporarily hide the
    Navigator pane, the Inspector pane, or the Debug Area. Xcode gives you multiple
    ways to hide and display these different areas so you can choose the method you
    like best.


    Rather than rely on Xcode’s pull-down menus all the time, you might find it easier
    to use the icons on the Toolbar to give you one-click access to common commands
    such as Run (to run your app), Stop (to exit out of your app), Assistant Editor
    (to open the Assistant editor), or Show/Hide the Navigator pane/Debug Area/Inspector
    pane.


    If you find yourself switching back and forth between files, you may want to display
    the Tab bar. Now you’ll be able to open two or more tabs to represent different
    files so you can click and open each file without going through the Navigator
    pane over and over again.


    If your project won’t run because of error messages and your Swift code looks
    fine, check the connections between all your user interface objects. If you have
    too many (or not enough) connections, you may need to break some existing connections
    and relink or rename your IBOutlets so the names in the .swift files exactly match
    the names displayed in the Connections Inspector pane.


    Xcode is a powerful, professional programming tool, so take some time to get familiar
    with the more common features of Xcode and feel free to ignore any features you
    don’t understand or need. As you get more familiar with Xcode, you’ll gradually
    learn and need some of its more advanced features. Just remember that few people
    ever need to use every possible feature in Xcode. The more you use Xcode, the
    more comfortable you’ll feel using it over time.


    # 5. Working with Controllers


    There’s a saying that you don’t get a second chance to make a first impression.
    In the world of app development, that first impression always comes through your
    app’s user interface. It doesn’t matter how useful, fun, and creative your app
    might be if the user interface is sloppy, poorly designed, or confusing. If users
    don’t like your app’s user interface, nothing else will really matter.


    Designing a user interface is both an art and a science. As a general rule, the
    best user interface is one that appears to be invisible. Always remember that
    there will be multiple ways to accomplish the same task, so create and test out
    radically different user interface designs to see which one might be best suited
    for your particular app.


    For example, consider the task of enlarging a picture. In a traditional user interface
    from desktop computers, a user interface could display a list of menus for the
    user to choose. Then after choosing the right menu, the user could choose a command
    to enlarge a picture. Then a dialog box could appear to give the user options
    for how much to enlarge that picture.


    While this type of user interface might work, it’s obviously clumsier and less
    intuitive than simply pinching on the screen and moving your fingertips apart
    to enlarge a picture. The best user interface is usually one that requires the
    fewest steps to achieve a desired task.'
  trans: "\n## 重命名和删除 IBOutlet 变量\n\n当需要将 Swift 代码链接到用户界面对象时，你需要创建一个代表该用户界面对象的 `IBOutlet`\
    \ 变量，例如：\n\n```\n@IBOutlet var petLabel: UILabel!\n```\n\n如果你想重命名一个 `IBOutlet`，你可能会认为只需编辑\
    \ `IBOutlet` 变量名即可，但如果这样做，运行项目时就会报错。问题在于，如果你在 `.swift` 文件中重命名了 `IBOutlet`，Connections\
    \ Inspector（连接检查器）仍然在寻找与之前 `IBOutlet` 名称的连接。\n\n要重命名 `IBOutlet` 变量，你必须让 Xcode\
    \ 使用 Refactor（重构）命令，同时在 `.swift` 文件和 Connections Inspector 面板中更改 `IBOutlet` 名称。\n\
    \n要了解 Refactor 命令如何重命名 `IBOutlet`，请按照以下步骤操作：\n\n1. 在 Xcode 中打开 `MyFirstApp` 项目。\n\
    2. 在导航面板中点击 `ViewController.swift` 文件。\n3. 选中 `textMessage` 这个 `IBOutlet`。你可以手动选中整个\
    \ \"textMessage\" 名称，或者直接双击它来选中。确保整个 \"textMessage\" 处于被选中状态。\n4. 选择 Editor（编辑器）➤\
    \ Refactor（重构）➤ Rename（重命名），如图 4-12 所示。Xcode 会高亮显示项目中所有找到选中文本（如 \"textMessage\"\
    ）的区域，如图 4-13 所示。\n\n   ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig13_HTML.jpg](img/329781_5_En_4_Fig13_HTML.jpg)\n\
    \n   **图 4-13.** Refactor 命令让 Xcode 在整个项目中重命名文本\n\n   ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig12_HTML.jpg](img/329781_5_En_4_Fig12_HTML.jpg)\n\
    \n   **图 4-12.** Refactor 命令出现在 Editor 菜单中\n\n5. 编辑 `textMessage` 这个 `IBOutlet`，将其名称改为\
    \ `textDisplay`。\n6. 点击中间 Xcode 面板右上角的 Rename（重命名）按钮。Xcode 会自动重命名你的 `IBOutlet`，并将项目中所有\
    \ \"textMessage\" 改为 \"textDisplay\"。\n7. 在导航面板中点击 `Main.storyboard`，然后点击文本字段（该字段已链接到现名为\
    \ \"textDisplay\" 的 `IBOutlet` 变量）。\n8. 选择 View（视图）➤ Inspectors（检查器）➤ Show Connections\
    \ Inspector（显示连接检查器），或点击 Xcode 窗口右上角的 Connections Inspector 图标。注意，Connections\
    \ Inspector 现在显示的是连接到名为 \"textDisplay\" 的 `IBOutlet`，如图 4-14 所示。\n\n   ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig14_HTML.jpg](img/329781_5_En_4_Fig14_HTML.jpg)\n\
    \n   **图 4-14.** Connections Inspector 显示更新后的 `IBOutlet` `textDisplay`\n\n如果你想要删除一个可能拼写错误或不再需要的\
    \ `IBOutlet`，会发生什么？你可能会认为只需从 `.swift` 文件中删除该 `IBOutlet` 即可，但如果这样做并尝试运行项目，就会报错。\n\
    \n要删除 `IBOutlet` 变量，你必须遵循两个步骤：\n\n- 首先，你必须在 `.swift` 文件中删除 `IBOutlet` 变量。\n- 其次，你必须在\
    \ Connections Inspector 面板中断开该 `IBOutlet` 的连接。\n\n要断开用户界面对象与其 `IBOutlet` 变量之间的连接，请按照以下步骤操作：\n\
    \n1. 点击包含要删除的 `IBOutlet` 的 `.swift` 文件。\n2. 选中该 `IBOutlet` 并按 BACKSPACE 或 DELETE\
    \ 键。这会从 `.swift` 文件中删除该 `IBOutlet`，但我们仍然需要断开它与用户界面对象的连接。\n3. 在导航面板中点击 `Main.storyboard`。\n\
    4. 点击链接到该 `IBOutlet` 的用户界面对象。\n5. 选择 View（视图）➤ Inspectors（检查器）➤ Show Connections\
    \ Inspector（显示连接检查器），或点击 Xcode 窗口右上角的 Connections Inspector 图标。Connections Inspector\
    \ 面板会显示 `IBOutlet` 名称及其所连接的 `.swift` 文件，如图 4-15 所示。\n\n   ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig15_HTML.jpg](img/329781_5_En_4_Fig15_HTML.jpg)\n\
    \n   **图 4-15.** Connections Inspector 显示 `IBOutlet` 名称及其所连接的 `.swift` 文件\n\n\
    6. 点击 X 图标来断开连接。\n\n## 总结\n\nXcode 是你编辑 Swift 代码、设计用户界面以及测试应用是否正常运行所需的唯一工具。通过熟悉\
    \ Xcode，你可以学会如何利用其不同功能，让查看文件和编辑 Swift 代码变得更加轻松便捷。\n\n调整 Xcode 外观最简单的方法是临时隐藏导航面板、检查器面板或调试区域。Xcode\
    \ 提供了多种隐藏和显示这些不同区域的方式，因此你可以选择自己最喜欢的方法。\n\n与其一直依赖 Xcode 的下拉菜单，你可能会发现使用工具栏上的图标更方便，只需单击即可访问常用命令，例如\
    \ Run（运行应用）、Stop（退出应用）、Assistant Editor（打开助理编辑器）或显示/隐藏导航面板/调试区域/检查器面板。\n\n如果你发现自己经常在文件之间来回切换，可能需要显示标签栏。这样你就可以打开两个或多个标签页来代表不同的文件，从而无需反复通过导航面板即可点击并打开每个文件。\n\
    \n如果项目因错误信息而无法运行，但你的 Swift 代码看起来没问题，请检查所有用户界面对象之间的连接。如果连接过多（或不足），你可能需要断开一些现有连接，然后重新链接或重命名你的\
    \ `IBOutlet`，使 `.swift` 文件中的名称与 Connections Inspector 面板中显示的名称完全一致。\n\nXcode 是一个功能强大、专业的编程工具，所以请花些时间熟悉\
    \ Xcode 更常用的功能，对于你不理解或不需要的功能，可以随意忽略。随着你对 Xcode 越来越熟悉，你会逐渐了解并需要它的一些更高级的功能。请记住，很少有人需要用到\
    \ Xcode 的所有功能。你使用 Xcode 越多，久而久之，用起来就会越得心应手。\n\n# 5. 使用控制器\n\n俗话说，第一印象只有一次机会。在应用开发领域，第一印象总是通过应用的用户界面来传达。如果用户界面凌乱、设计拙劣或令人困惑，那么你的应用无论多么实用、有趣和富有创意都无关紧要。如果用户不喜欢你应用的界面，其他一切都不再重要。\n\
    \n设计用户界面既是一门艺术，也是一门科学。一般来说，最佳的用户界面是那种似乎无形的界面。始终记住，完成同一项任务会有多种方法，因此要创建并测试截然不同的用户界面设计，看看哪一种最适合你的特定应用。\n\
    \n例如，考虑放大图片的任务。在桌面电脑的传统用户界面中，用户界面可以显示一个菜单列表供用户选择。然后，在选择了正确的菜单后，用户可以选择一个命令来放大图片。接着，可能会弹出一个对话框，让用户选择放大图片的比例。\n\
    \n虽然这种类型的用户界面可能有效，但它显然比在屏幕上捏合手指并分开指尖来放大图片更加笨拙且不够直观。最佳的用户界面通常是那种只需最少的步骤就能完成所需任务的界面。\n"
- fmt: '# Understanding Controllers


    The visual part of any app is its user interface, which is created by using one
    or more controllers. Every controller consists of two parts:


    - The actual view displayed as part of the user interface

    - The `.swift` file that contains Swift code for retrieving and displaying data
    to the user interface (`IBOutlet`s) or methods for running Swift code to respond
    to the user (`IBAction` functions)


    A view fills the entire screen of an iOS device. To create a user interface, you
    need to add objects to the view such as buttons, text fields, and labels. To control
    those user interface objects, you need to use Swift code stored in a `.swift`
    file that’s linked to the view.


    Xcode provides several different types of controllers you can use to create your
    app’s user interface as shown in Figure 5-1:


    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig1_HTML.jpg](images/329781_5_En_5_Chapter/329781_5_En_5_Fig1_HTML.jpg)


    Figure 5-1. The different types of controllers available for creating a user interface


    - **View controller** – Displays a blank screen

    - **Navigation Controller** – Displays other views on the screen with back buttons
    automatically displayed in the upper left corner

    - **Table View Controller** – Displays a table view on the screen

    - **Collection View Controller** – Displays a Collection View on the screen

    - **Tab bar controller** – Displays other views on the screen, accessible through
    tabs at the bottom of the screen

    - **Split View Controller** – Displays two views on the screen at the same time

    - **Page View Controller** – Displays other views like pages in a book

    - **GLKit View Controller** – Displays a view for showing graphics based on the
    OpenGL cross-platform graphics library (Apple has mostly switched to its own Metal
    graphics library, so OpenGL is largely obsolete and is provided for backward compatibility
    with older apps that still use OpenGL.)

    - **AVKit player View Controller** – Displays a view for displaying video on the
    screen


    The Object Library displays all available controllers you can add to create a
    user interface although you likely won’t need all these different controllers.
    You can always modify any controller to display tab bars, tables, or other items
    at any time, so it’s possible to design the exact same user interface by using
    a basic View Controller and modifying it, or by using a specialized controller
    such as the Split View or Table View controller. Starting with a specialized controller
    simply gives you unique features right away.


    To see how to add (and delete) controllers to create a user interface, follow
    these steps:


    1. Create a new iOS project using the Single View App template (see Chapter 1)
    and name this new project `MySecondApp`. This creates a single view for the user
    interface.


    2. Click the `Main.storyboard` file in the Navigator pane. Xcode displays the
    single view.


    3. Choose Editor ➤ Show Document Outline or click the Document Outline icon if
    the Document Outline is not visible.


    4. Click View Controller in the Document Outline as shown in Figure 5-2.


    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig2_HTML.jpg](images/329781_5_En_5_Chapter/329781_5_En_5_Fig2_HTML.jpg)


    Figure 5-2. Selecting a View Controller


    5. Press the `BACKSPACE` or `DELETE` key. Xcode deletes the entire View Controller
    from your storyboard. At this point, your app has no user interface.


    6. Click the Library icon to open the Object Library window (see Figure 5-1).


    7. Drag and drop a View Controller from the Library window to Xcode as shown in
    Figure 5-3. Xcode displays the new View Controller in the storyboard. If you run
    the app now, this view won’t appear on the screen because we need to make this
    view the first view to display, otherwise known as the Initial View Controller.


    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig3_HTML.jpg](images/329781_5_En_5_Chapter/329781_5_En_5_Fig3_HTML.jpg)


    Figure 5-3. Dragging a View controller into the `Main.storyboard` file


    8. Click View Controller in the Document Outline to select it and choose View
    ➤ Inspectors ➤ Show Attributes Inspector, or click the Show the Attributes Inspector
    icon at the top of the Inspector pane.


    9. Select the **Is Initial View Controller** check box as shown in Figure 5-4.
    When the **Is Initial View Controller** check box is selected, an arrow appears
    pointing to the left side of the View Controller to show you which view is the
    initial View Controller, which is the first view that appears when your app runs.
    The next step is to connect this View Controller to the existing `ViewController.swift`
    file.


    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig4_HTML.jpg](images/329781_5_En_5_Chapter/329781_5_En_5_Fig4_HTML.jpg)


    Figure 5-4. The **Is Initial View Controller** check box


    > **Note** Only one View Controller can ever be the initial View Controller at
    a time.


    10. Click View Controller in the Document Outline to select it.


    11. Choose View ➤ Inspectors ➤ Show Identity Inspector, or click the Show the
    Identity Inspector icon at the top of the Inspector pane.


    12. Click the downward-pointing arrow that appears to the right of the **Class**
    text field. A menu appears. Scroll down this menu until you find `ViewController`
    as shown in Figure 5-5.


    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig5_HTML.jpg](images/329781_5_En_5_Chapter/329781_5_En_5_Fig5_HTML.jpg)


    Figure 5-5. Choosing a `.swift` class file to connect to a View Controller


    At this point, you’ve deleted a View Controller, added a new controller, made
    it the initial view, and connected it to the `ViewController.swift` file.'
  raw: '## Understanding Controllers


    The visual part of any app is its user interface, which is created by using one
    or more controllers. Every controller consists of two parts:


    *   The actual view displayed as part of the user interface


    *   The .swift file that contains Swift code for retrieving and displaying data
    to the user interface (IBOutlets) or methods for running Swift code to respond
    to the user (IBAction functions)


    A view fills the entire screen of an iOS device. To create a user interface, you
