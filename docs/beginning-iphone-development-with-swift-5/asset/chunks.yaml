    \ button to simulate an up swipe gesture. Notice that the image view moves upward.\n\
    \n4.  Repeat steps 36 and 37 until the image view disappears out of sight.\n\n\
    5.  Choose Simulator ➤ Quit Simulator to return to Xcode.\n\nThis example defined\
    \ the swipe gesture visually by dragging the Swipe Gesture Recognizer from the\
    \ Object Library. Now let’s see how to duplicate this process through Swift code\
    \ alone.\n\n1.  Create a new iOS project using the Single View App template (see\
    \ Chapter [1](#329781_5_En_1_Chapter.xhtml)) and name this new project SwipeCodeApp.\
    \ This creates a single view for the user interface.\n\n2.  Click the Main.storyboard\
    \ file in the Navigator pane. Xcode displays the single view.\n\n3.  Click the\
