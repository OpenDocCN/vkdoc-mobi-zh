    \ {\n        switch component {\n        case 0: return componentOne[row]\n  \
    \      case 1: return componentTwo[row]\n        default: return componentThree[row]\n\
    \        }\n    }\n    @IBAction func buttonTapped(_ sender: UIButton) {\n   \
    \     let petIndex = myPicker.selectedRow(inComponent: 0)\n        let homeIndex\
    \ = myPicker.selectedRow(inComponent: 1)\n        let placeIndex = myPicker.selectedRow(inComponent:\
    \ 2)\n        let alert = UIAlertController(title: \"Your Choice\", message: \"\
    \\(componentOne[petIndex]) \\(componentTwo[homeIndex]) \\(componentThree[placeIndex])\"\
    , preferredStyle: .alert)\n        let okAction = UIAlertAction(title: \"OK\"\
    , style: .default, handler: { action -> Void in\n            //只需关闭操作表\n     \
    \   })\n        alert.addAction(okAction)\n        self.present(alert, animated:\
    \ true, completion: nil)\n    }\n}\n```\n\n20. 点击“运行”按钮，或选择“产品” ➤ “运行”。模拟器屏幕会如图\
    \ 12-11 所示显示。\n\n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig11_HTML.jpg](img/329781_5_En_12_Fig11_HTML.jpg)\n\
    \n**图 12-11** 包含三个组件的选取视图\n\n21. 旋转选取视图，并从每个滚轮或组件中选择一个选项，例如仓鼠、公寓、户外。\n\n22. 点击按钮。此时会出现一个警告控制器，显示您在选取视图中选择的所有选项。\n\
    \n23. 点击按钮以关闭警告控制器。\n\n24. 重复步骤 20-22，并在选取视图中选择不同的选项。\n\n25. 选择“模拟器” ➤ “退出模拟器”以返回\
    \ Xcode。\n\n## 本章小结\n\n警告可以在屏幕中央（`.alert`）或屏幕底部（`.actionSheet`）显示信息。警告可以显示标题和下方较小字体的消息，并至少附带一个用于关闭警告的按钮。不过，警告也可以显示多个按钮，甚至一个文本字段。\n\
    \n根据用户点击的按钮，应用可以做出不同的响应。如果警告显示了一个文本字段，您可以自定义该文本字段的外观和行为，并存储其内容以供后续使用或操作。警告通过显示用户需要立即了解的重要信息来中断用户操作。\n\
    \n当您的应用需要向用户提供有限范围的选项时，可以使用日期选取器或选取视图。日期选取器允许用户选择不同的日期和时间。您可以根据需要定义检索到的日期和时间的格式（短格式或长格式）。选取视图允许您定义显示的选择类型，并支持多个组件或滚轮，以便用户选择多个选项。\n\
    \n当需要向用户显示信息并获取即时反馈时，请使用警告。当需要将用户的选择限制在有效的有限范围内时，请使用日期选取器或选取视图。\n\n# 13. 约束和堆栈视图\n\
    \n由于 iPhone 和 iPad 具有不同的屏幕尺寸，每个 iOS 应用都需要根据其运行的 iOS 设备类型适应这些不同的屏幕尺寸。要定义不同用户界面对象的位置和间距，可以使用约束。\n\
    \n约束可以定义以下内容：\n\n-   位置（例如屏幕中心）\n-   大小（例如对象的宽度或高度）\n-   距离（例如两个对象之间的间距）\n\n如果没有约束，用户界面上的对象可能在一个尺寸的\
    \ iOS 屏幕上看起来不错，但在另一个屏幕上却完全错位。这就是为什么需要为用户界面上的所有对象添加约束。\n\n添加约束最简单的方法是让 Xcode 为您完成。但是，您可能需要修改约束，因为\
    \ Xcode 并不总是能准确添加约束。您可以添加、删除和修改约束，直到您的用户界面在所有不同尺寸的 iOS 屏幕上看起来都完美。\n\n如果用户界面上有多个对象，添加多个约束可能会显得笨拙，尤其是在需要重新排列对象时。为了简化对单个对象添加约束的过程，您可以将对象组织到堆栈中。这样，您可以移动对象组，并对该组而不是组中的每个对象设置约束。\n\
    \n约束和堆栈视图都使得在用户界面上创建和组织对象变得容易，确保无论应用在哪种 iOS 屏幕尺寸上运行，它们都能正确显示。\n"
- fmt: '# Understanding Constraints


    Constraints define a position, size, or distance using three criteria:


    *   `Constant` – Defines the numeric value of the constraint

    *   `Priority` – Defines which constraints are more important than others, ranging
    from a required (1000) to high (750) to low (250)

    *   `Multiplier` – Multiplies the constant to define the total value of the constraint


    The three choices for a constant are a numeric value such as `37`, a `Standard
    Value`, or a `Canvas Value` as shown in Figure [13-1](#329781_5_En_13_Chapter.xhtml#Fig1).


    ![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig1_HTML.jpg](images/329781_5_En_13_Chapter/329781_5_En_13_Fig1_HTML.jpg)


    **Figure 13-1** — The three options for defining a constant value in a constraint


    A numeric value defines a specific value such as `12` or `84`. When you create
    constraints, Xcode uses numeric values.


    A `Standard Value` uses Xcode’s recommended value. Because your app may run on
    different size iOS screens, `Standard Values` are generally the safest option
    to choose.


    A `Canvas Value` is similar to a specific numeric value except it’s tied to the
    current iOS screen size of your storyboard. That means if your app runs on a different
    screen size, the constraint may not keep objects the proper distance or position.


    ### Note

    As a general rule in programming, it’s usually a good idea to avoid relying on
    specific values known as “magic numbers”. A “magic number” appears as an abstract
    numeric value that does not explain what it means or how the programmer arrived
    at that value. In most cases, use `Standard Values` for constraints.


    When defining values for a constraint, there are three choices:


    *   `Equal (=)` – The constraint must exactly equal a specific value.

    *   `Less than or equal (≤)` – The constraint can be less than or equal to a specific
    value.

    *   `Greater than or equal (≥)` – The constraint can be greater than or equal
    to a specific value.


    By defining a constraint to be less than or equal or greater than or equal to
    a value, you allow more flexibility for the constraint to still work even if screen
    sizes or orientation changes.


    The `priority` defines the importance of a constraint. By default, every constraint
    is assigned the required (1000) priority. However when you add multiple constraints,
    two or more constraints might conflict. For example, one constraint can define
    that a button appears `97` points from the left edge and a second constraint might
    define the button to appear `232` points from the right edge.


    This may work just fine when an iPhone appears in portrait mode, but when tilted
    on its side in landscape mode, maintaining a distance of `97` points from the
    left and `232` points from the right means the button must stretch in width to
    satisfy both constraints. If the button’s width is also constrained to a certain
    size such as `46` points, then it will be impossible for all three constraints
    to work as shown in Figure [13-2](#329781_5_En_13_Chapter.xhtml#Fig2).


    ![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig2_HTML.jpg](images/329781_5_En_13_Chapter/329781_5_En_13_Fig2_HTML.jpg)


    **Figure 13-2** — Constraints can conflict with each other in different orientations
    or screen sizes


    To avoid multiple constraints conflicting, you can assign different priority values
    to each constraint. The most important constraints get a higher value (such as
    `1000`), while other less important constraints get lower values (such as `750`
    or `250`). Now Xcode first follows the highest priority constraints before trying
    to follow lower priority constraints. If the lower priority constraints cannot
    be satisfied, then the higher priority constraints take precedence and the lower
    priority constraint gets ignored.


    The `multiplier` can define a percentage relationship between two objects. The
    default multiplier value is `1`, but you can change this to make the multiplier
    value less than or greater than `1` such as `0.5` or `1.5`.


    Objects typically need two or more constraints to accurately define their size
    and position on a user interface. When you add constraints to an object, Xcode
    uses colors to let you know how effective your constraints are. The meanings of
    these different colors are:


    *   **Blue** – The object has all the necessary constraints to accurately define
    its size and position on the user interface.

    *   **Orange** – The object does not have enough constraints to define its size
    and position on the user interface.

    *   **Red** – The object has conflicting constraints that either need to be modified
    or deleted.


    When you add constraints, Xcode also displays a frame around your selected object.
    That frame normally appears around the border of an object, but if you apply constraints
    and then move the object, you’ll see the frame as a dotted-line rectangle. The
    frame shows where an object will appear even if the object appears somewhere else
    on the user interface as shown in Figure [13-3](#329781_5_En_13_Chapter.xhtml#Fig3).


    ![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig3_HTML.jpg](images/329781_5_En_13_Chapter/329781_5_En_13_Fig3_HTML.jpg)


    **Figure 13-3** — Frames show where an object will appear because of its constraints


    To create a constraint on an object, select the object and then choose one of
    the following methods:'
