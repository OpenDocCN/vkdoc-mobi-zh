    \ so we need to identify the cells for storing data in later.\n\n18.  Modify the\
    \ viewDidLoad method as follows:\n\n```\n    override func viewDidLoad() {\n \
    \   super.viewDidLoad()\n    tableData.delegate = self\n    tableData.dataSource\
    \ = self\n    // Do any additional setup after loading the view, typically from\
    \ a nib.\n    }\n    ```\n\n19.  Add the following function underneath the viewDidLoad\
    \ method:\n\n```\n    func tableView(_ tableView: UITableView, numberOfRowsInSection\
    \ section: Int) -> Int {\n    return mainArray.count\n    }\n    ```\n\n20.  Add\
    \ the following function underneath the viewDidLoad method:\n\n```\n    func tableView(_\
    \ tableView: UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell\
    \ {\n    var cell = tableView.dequeueReusableCell(withIdentifier: cellID)\n  \
    \  if (cell == nil) {\n    cell = UITableViewCell(\n    style: UITableViewCell.CellStyle.subtitle,\n\
    \    reuseIdentifier: cellID)\n    }\n    cell?.textLabel?.text = mainArray[indexPath.row]\n\
    \    cell?.detailTextLabel?.text = detailArray[indexPath.row]\n    cell?.imageView?.image\
    \ = UIImage(named: imageArray[indexPath.row])\n    return cell!\n    }\n    ```\n\
    \nThis function stores the data from the array into the table view. Since each\
    \ row in the table view is defined by a cell, it needs to create a cell with a\
    \ name:\n\n```\n    var cell = tableView.dequeueReusableCell(withIdentifier: cellID)\n\
    \    ```\n\nIf a cell is empty, then the if statement defines the cell’s style\
    \ and gives it the arbitrary cellID name to identify it and defines the cell style\
    \ as .subtitle (feel free to change this to .default or .value1):\n\n```\n   \
    \ if (cell == nil) {\n    cell = UITableViewCell(\n    style: UITableViewCell.CellStyle.subtitle,\n\
    \    reuseIdentifier: cellID)\n    }\n    ```\n\nNext it takes data from the mainArray\
    \ to store in the text label, takes data from detailArray to store in the detail\
    \ text label, and takes data from the imageArray to identify which image to put\
    \ in the image view:\n\n```\n    cell?.textLabel?.text = mainArray[indexPath.row]\n\
    \    cell?.detailTextLabel?.text = detailArray[indexPath.row]\n    cell?.imageView?.image\
    \ = UIImage(named: imageArray[indexPath.row])\n    ```\n\n21.  Add the following\
    \ function underneath the viewDidLoad method to detect which item the user selected:\n\
    \n```\n    func tableView(_ tableView: UITableView, didSelectRowAt indexPath:\
    \ IndexPath) {\n    let selectedItem = mainArray[indexPath.row]\n    let alert\
    \ = UIAlertController(title: \"Your Choice\", message: \"\\(selectedItem)\", preferredStyle:\
    \ .alert)\n    let okAction = UIAlertAction(title: \"OK\", style: .default, handler:\
    \ { action -> Void in\n    //Just dismiss the action sheet\n    })\n    alert.addAction(okAction)\n\
    \    self.present(alert, animated: true, completion: nil)\n    }\n    ```\n\n\
    The complete ViewController.swift file should look like this:"
  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵守您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n---\n\n\n### 注意\n\
