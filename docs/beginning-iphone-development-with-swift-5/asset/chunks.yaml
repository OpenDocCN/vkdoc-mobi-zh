- fmt: "这就是为什么苹果的`Xcode`编译器能帮助你设计用户界面，这些界面使用了大多数应用中的标准功能，例如视图（屏幕上的窗口）、按钮、标签、文本框、开关和滑块。在`Xcode`中，用户界面的每个窗口被称为一个视图。虽然简单的iOS应用可能只包含单个视图（比如iPhone上的计算器应用），但更复杂的iOS应用则包含多个视图。\n\
    \n为了帮助你创建和组织用户界面，`Xcode`将iOS应用的用户界面存储在一个称为`storyboard`的文件中，这个名字来源于电影行业。制作电影时，导演经常使用故事板来直观地展示他们想要拍摄的每个场景。通过按特定顺序浏览这些故事板图像，导演可以在实际拍摄前了解如何讲述一个故事。\n\
    \n在iOS应用开发中，故事板包含视图（`views`）和转场（`segues`）。视图以矩形形式出现，代表不同iOS设备（如`iPhone 8`或`iPad\
    \ Pro`）的屏幕尺寸；而转场则以箭头形式出现，显示视图向用户呈现的顺序，如图[1-2](#329781_5_En_1_Chapter.xhtml#Fig2)所示。\n\
    \n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig2_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig2_HTML.jpg)\n\
    \n图 1-2  \n故事板帮助你设计iOS应用的用户界面\n\n`Xcode`将故事板与你的代码完全分开。这样一来，你就可以轻松更改用户界面，而无需重新测试代码。有些开发者会先创建用户界面来设计应用的结构，然后再编写一行代码。另一些开发者则先编写代码，之后再为用户界面附加代码。\n\
    \n大多数开发者同时编写代码和创建用户界面，以便在开发过程中随时测试应用。无论你选择哪种方法，你都可以针对各种不同的iOS设备屏幕尺寸和方向，直观地设计用户界面。\n\
    \n任何iOS应用的核心都是你编写的独特代码，这些代码让应用能够实现有用的功能。编写代码时，你可以将其全部存储在一个文件中，但这就像把整本小说打印在一长卷纸上——虽然可行，但后续编辑和修改会非常麻烦。\n\
    \n因此，大多数iOS应用都由多个文件组成。即使是一个简单的iOS应用也会包含几个文件，而复杂的应用可能包含数百甚至数千个独立的文件。通过将代码存储在单独的文件中，你可以快速定位需要编辑和修改的文件，同时安全地忽略存储在其他文件中的代码。\n\
    \n当你创建文件来存储`Swift`命令时，这些文件的后缀名将是`.swift`，这有助于你将它们与可能包含其他编程语言（如`Objective-C`，苹果最初的编程语言）代码的文件区分开来。\n\
    \n为了帮助你组织文件，你可以将它们存储在单独的文件夹中。这些文件夹的存在仅仅是为了方便你组织代码。图[1-3](#329781_5_En_1_Chapter.xhtml#Fig3)展示了`Xcode`如何将应用划分为文件夹和文件。\n\
    \n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig3_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig3_HTML.jpg)\n\
    \n图 1-3  \n`Xcode`将你的代码存储在文件中，你可以将它们组织到文件夹中\n\n## 了解Xcode\n\n学习iOS开发不仅仅是学习如何用`Swift`编程语言编写代码。除了掌握`Swift`，你还必须知道如何查找和使用苹果不同的软件框架，如何使用`Xcode`通过故事板设计用户界面，以及如何组织、创建和删除包含`Swift`代码的文件。此外，你还必须学习如何使用`Xcode`的编辑器来编写代码。\n\
    \n为了熟悉iOS应用开发，让我们从一个简单的项目开始，它将教会你：\n\n1.  启动`Xcode`。屏幕上会出现一个欢迎窗口，让你选择最近使用的项目，或者选择创建新项目的选项，如图[1-4](#329781_5_En_1_Chapter.xhtml#Fig4)所示。（你可以随时在`Xcode`中通过选择\
    \ `Windows` ➤ `Welcome to Xcode` 或按 `Shift + Command + 1` 来打开此欢迎窗口。）\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig4_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig4_HTML.jpg)\n\
    \n图 1-4  \n`Xcode`欢迎窗口\n\n2.  点击 **Create a new Xcode project** 选项。`Xcode`会显示用于设计不同类型应用的模板，如图[1-5](#329781_5_En_1_Chapter.xhtml#Fig5)所示。请注意，模板窗口顶部显示了你可以为其开发应用的不同操作系统，例如`iOS`、`watchOS`、`tvOS`和`macOS`。通过选择不同的操作系统，你可以创建专为运行该特定操作系统的设备设计的项目。\n\
    \n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig5_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig5_HTML.jpg)\n\
    \n图 1-5  \n选择项目模板\n\n3.  点击 **iOS**，然后点击 **Single View App**。`Single View App`代表了最简单的iOS项目。\n\
    \n4.  点击 **Next** 按钮。会出现另一个窗口，要求你输入项目名称以及组织名称和组织标识符，如图[1-6](#329781_5_En_1_Chapter.xhtml#Fig6)所示。你必须填写所有三个文本框，但项目名称、组织名称和组织标识符可以是任何你想要的描述性文本。\n\
    \n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig6_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig6_HTML.jpg)\n\
    \n图 1-6  \n定义项目名称、组织名称和组织标识符\n\n5.  点击 Project Name 文本框，并输入你的项目名称，例如 `MyFirstApp`。\n\
    \n6.  点击 Organization Name 文本框，并输入你的名字或公司名称。\n\n7.  点击 Organization Identifier\
    \ 文本框，并输入任何你想要的标识文本。通常，这个标识符是你的网站名称倒过来拼写，例如 `com.microsoft`。\n\n8.  确保 Language\
    \ 弹出菜单显示为 `Swift`，并且所有复选框都已清除。然后点击 **Next** 按钮。`Xcode`会弹出一个对话框，让你选择存储项目的驱动器和文件夹。\n\
    \n9.  选择一个驱动器和文件夹，然后点击 **Create** 按钮。`Xcode`会显示关于你新创建项目的信息，如图[1-7](#329781_5_En_1_Chapter.xhtml#Fig7)所示。\n\
    \n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig7_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig7_HTML.jpg)\n\
    \n图 1-7  \n查看新创建的iOS项目的详细信息\n\n*   如何理解项目的各个部分\n*   如何查看不同的文件\n*   `Xcode`的不同部分如何工作\n\
    \n起初，`Xcode`窗口可能看起来令人困惑，因为它同时显示了太多信息，但`Xcode`将这些信息组织在几个窗格中。\n\n最左边的窗格称为导航器窗格。通过点击导航器窗格顶部的图标，你可以查看项目的不同部分，如图[1-8](#329781_5_En_1_Chapter.xhtml#Fig8)所示。\n\
    \n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig8_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig8_HTML.jpg)\n\
    \n图 1-8  \n导航器窗格出现在`Xcode`窗口的最左侧\n\n最简单的iOS应用包含三个文件："
  raw: 'That’s why Apple’s Xcode compiler helps you design user interfaces with standard
    features used in most apps such as views (windows on the screen), buttons, labels,
    text boxes, switches, and sliders. In Xcode, each window of a user interface is
    called a view. While simple iOS apps may consist of a single view (think of the
    Calculator app on an iPhone), more sophisticated iOS apps consist of multiple
    views.


    To help you create and organize your user interface, Xcode stores an iOS app’s
    user interface in a file called a storyboard, which gets its name from the movie
    industry. When making films, directors often use storyboards that visually show
    each scene the director wants to film. By viewing these storyboard images in a
    specific sequence, a director can see how to tell a story before actually filming
    the scene.


    In iOS app development, storyboards contain views and segues. Views appear as
    rectangles that represent the screen size of different iOS devices such as an
    iPhone 8 or an iPad Pro, while segues appear as arrows that show the order that
    views appear to the user as shown in Figure [1-2](#329781_5_En_1_Chapter.xhtml#Fig2).


    ![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig2_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Storyboards help you design the user interface of an iOS app


    Xcode keeps storyboards completely separate from your code. This way you can easily
    change your user interface without needing to retest your code again. Some developers
    create their user interface first to design the structure of their app before
    they write a single line of code. Other developers write their code first and
    then attach a user interface to the code later.


    Most developers write code and create a user interface at the same time so they
    can test their app as they progress. Whatever method you choose, you’ll be able
    to design your user interface visually for a variety of different iOS device screen
    sizes and orientation.


    The heart of any iOS app is the unique code you write to make your app do something
    useful. When you write code, you could store it in a single file, but this would
    be like printing an entire novel on a long scroll of paper. It’s possible, but
    it would be cumbersome to edit and modify later.


    That’s why most iOS apps consist of multiple files. Even a simple iOS app will
    consist of a handful of files, while a complicated app might contain hundreds
    or even thousands of separate files. By storing code in separate files, you can
    quickly identify the file that contains the code you want to edit and modify while
    safely ignoring code stored in other files.


    When you create files to store Swift commands, your files will have a file extension
    of .swift to help you identify them from files that might contain code written
    in other programming languages such as Objective-C, which was Apple’s original
    programming language.


    To help you organize your files, you can store them in separate folders. These
    folders exist solely for your convenience in organizing your code. Figure [1-3](#329781_5_En_1_Chapter.xhtml#Fig3)
    shows how Xcode can divide an app into folders and files.


    ![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig3_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig3_HTML.jpg)


    Figure 1-3


    Xcode stores your code in files that you can organize in folders


    ## Learning About Xcode


    Learning iOS development is more than just learning how to write code in the Swift
    programming language. Besides knowing Swift, you must also know how to find and
    use Apple’s different software frameworks, how to use Xcode to design your user
    interface using storyboards, and how to organize, create, and delete files that
    contain your Swift code. In addition, you must also learn how to write code using
    Xcode’s editor.


    To get acquainted with iOS app development, let’s start with a simple project
    that will teach you


    1.  Start Xcode. A welcoming screen appears that lets you choose a recently used
    project or the option of creating a new project as shown in Figure [1-4](#329781_5_En_1_Chapter.xhtml#Fig4).
    (You can always open this welcoming screen from within Xcode by choosing Windows
    ➤ Welcome to Xcode or by pressing Shift + Command + 1.)


    ![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig4_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig4_HTML.jpg)


    Figure 1-4


    The Xcode welcoming screen


    2.  Click the **Create a new Xcode project** option. Xcode displays templates
    for designing different types of apps as shown in Figure [1-5](#329781_5_En_1_Chapter.xhtml#Fig5).
    Notice that the top of the template window displays different operating systems
    you can develop apps for, such as iOS, watchOS, tvOS, and macOS. By selecting
    different operating systems, you can create projects designed for the devices
    that run that particular operating system.


    ![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig5_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig5_HTML.jpg)


    Figure 1-5


    Choosing a project template


    3.  Click **iOS** and then click **Single View App**. The Single View App represents
    the simplest iOS project.


    4.  Click the **Next** button. Another window appears, asking for your project
    name along with an organization name and organization identifier as shown in Figure
    [1-6](#329781_5_En_1_Chapter.xhtml#Fig6). You must fill out all three text fields,
    but the project name, organization name, and organization identifier can be any
    descriptive text that you want.


    ![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig6_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig6_HTML.jpg)


    Figure 1-6


    Defining a project name, organization name, and organization identifier


    5.  Click in the Project Name text field and type a name for your project such
    as MyFirstApp.


    6.  Click in the Organization Name text field and type your name or company name.


    7.  Click in the Organization Identifier text field and type any identifying text
    you wish. Typically this identifier is your web site spelled backward such as
    com.microsoft.


    8.  Make sure the Language popup menu shows Swift and that all check boxes are
    clear. Then click the **Next** button. Xcode displays a dialog for you to choose
    which drive and folder to store your project in.


    9.  Choose a drive and folder and click the **Create** button. Xcode displays
    information about your newly created project as shown in Figure [1-7](#329781_5_En_1_Chapter.xhtml#Fig7).


    ![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig7_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig7_HTML.jpg)


    Figure 1-7


    Viewing details of a newly created iOS project


    *   How to understand the parts of a project


    *   How to view different files


    *   How the different parts of Xcode work


    Initially the Xcode window may look confusing because it displays so much information
    on the screen at once, but Xcode organizes this information in several panes.


    The far left pane is called the Navigator pane. By clicking icons at the top of
    the Navigator pane, you can view different parts of your project as shown in Figure
    [1-8](#329781_5_En_1_Chapter.xhtml#Fig8).


    ![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig8_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig8_HTML.jpg)


    Figure 1-8


    The Navigator pane appears on the far left of the Xcode window


    The simplest iOS app consists of three files:'
  trans: "\n这就是为什么苹果的`Xcode`编译器能帮助你设计用户界面，这些界面使用了大多数应用中的标准功能，例如视图（屏幕上的窗口）、按钮、标签、文本框、开关和滑块。在`Xcode`中，用户界面的每个窗口被称为一个视图。虽然简单的\
    \ iOS 应用可能只包含单个视图（比如 iPhone 上的计算器应用），但更复杂的 iOS 应用则包含多个视图。\n\n为了帮助你创建和组织用户界面，`Xcode`将\
    \ iOS 应用的用户界面存储在一个称为`storyboard`的文件中，这个名字来源于电影行业。制作电影时，导演经常使用故事板来直观地展示他们想要拍摄的每个场景。通过按特定顺序浏览这些故事板图像，导演可以在实际拍摄前了解如何讲述一个故事。\n\
    \n在 iOS 应用开发中，故事板包含视图（`views`）和转场（`segues`）。视图以矩形形式出现，代表不同 iOS 设备（如`iPhone 8`或`iPad\
    \ Pro`）的屏幕尺寸；而转场则以箭头形式出现，显示视图向用户呈现的顺序，如图 1-2 所示。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig2_HTML.jpg](img/329781_5_En_1_Fig2_HTML.jpg)\n\
    \n图 1-2  \n故事板帮助你设计 iOS 应用的用户界面\n\n`Xcode`将故事板与你的代码完全分开。这样一来，你就可以轻松更改用户界面，而无需重新测试代码。有些开发者会先创建用户界面来设计应用的结构，然后再编写一行代码。另一些开发者则先编写代码，之后再为用户界面附加代码。\n\
    \n大多数开发者同时编写代码和创建用户界面，以便在开发过程中随时测试应用。无论你选择哪种方法，你都可以针对各种不同的 iOS 设备屏幕尺寸和方向，直观地设计用户界面。\n\
    \n任何 iOS 应用的核心都是你编写的独特代码，这些代码让应用能够实现有用的功能。编写代码时，你可以将其全部存储在一个文件中，但这就像把整本小说打印在一长卷纸上——虽然可行，但后续编辑和修改会非常麻烦。\n\
    \n因此，大多数 iOS 应用都由多个文件组成。即使是一个简单的 iOS 应用也会包含几个文件，而复杂的应用可能包含数百甚至数千个独立的文件。通过将代码存储在单独的文件中，你可以快速定位需要编辑和修改的文件，同时安全地忽略存储在其他文件中的代码。\n\
    \n当你创建文件来存储`Swift`命令时，这些文件的后缀名将是`.swift`，这有助于你将它们与可能包含其他编程语言（如`Objective-C`，苹果最初的编程语言）代码的文件区分开来。\n\
    \n为了帮助你组织文件，你可以将它们存储在单独的文件夹中。这些文件夹的存在仅仅是为了方便你组织代码。图 1-3 展示了`Xcode`如何将应用划分为文件夹和文件。\n\
    \n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig3_HTML.jpg](img/329781_5_En_1_Fig3_HTML.jpg)\n\
    \n图 1-3  \n`Xcode`将你的代码存储在文件中，你可以将它们组织到文件夹中\n\n## 了解 Xcode\n\n学习 iOS 开发不仅仅是学习如何用`Swift`编程语言编写代码。除了掌握`Swift`，你还必须知道如何查找和使用苹果不同的软件框架，如何使用`Xcode`通过故事板设计用户界面，以及如何组织、创建和删除包含`Swift`代码的文件。此外，你还必须学习如何使用`Xcode`的编辑器来编写代码。\n\
    \n为了熟悉 iOS 应用开发，让我们从一个简单的项目开始，它将教会你：\n\n1.  启动`Xcode`。屏幕上会出现一个欢迎窗口，让你选择最近使用的项目，或者选择创建新项目的选项，如图\
    \ 1-4 所示。（你可以随时在`Xcode`中通过选择 `Windows` ➤ `Welcome to Xcode` 或按 `Shift + Command\
    \ + 1` 来打开此欢迎窗口。）\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig4_HTML.jpg](img/329781_5_En_1_Fig4_HTML.jpg)\n\
    \n图 1-4  \n`Xcode`欢迎窗口\n\n2.  点击 **Create a new Xcode project** 选项。`Xcode`会显示用于设计不同类型应用的模板，如图\
    \ 1-5 所示。请注意，模板窗口顶部显示了你可以为其开发应用的不同操作系统，例如`iOS`、`watchOS`、`tvOS`和`macOS`。通过选择不同的操作系统，你可以创建专为运行该特定操作系统的设备设计的项目。\n\
    \n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig5_HTML.jpg](img/329781_5_En_1_Fig5_HTML.jpg)\n\
    \n图 1-5  \n选择项目模板\n\n3.  点击 **iOS**，然后点击 **Single View App**。`Single View App`代表了最简单的\
    \ iOS 项目。\n\n4.  点击 **Next** 按钮。会出现另一个窗口，要求你输入项目名称以及组织名称和组织标识符，如图 1-6 所示。你必须填写所有三个文本框，但项目名称、组织名称和组织标识符可以是任何你想要的描述性文本。\n\
    \n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig6_HTML.jpg](img/329781_5_En_1_Fig6_HTML.jpg)\n\
    \n图 1-6  \n定义项目名称、组织名称和组织标识符\n\n5.  点击 Project Name 文本框，并输入你的项目名称，例如 `MyFirstApp`。\n\
    \n6.  点击 Organization Name 文本框，并输入你的名字或公司名称。\n\n7.  点击 Organization Identifier\
    \ 文本框，并输入任何你想要的标识文本。通常，这个标识符是你的网站名称倒过来拼写，例如 `com.microsoft`。\n\n8.  确保 Language\
    \ 弹出菜单显示为 `Swift`，并且所有复选框都已清除。然后点击 **Next** 按钮。`Xcode`会弹出一个对话框，让你选择存储项目的驱动器和文件夹。\n\
    \n9.  选择一个驱动器和文件夹，然后点击 **Create** 按钮。`Xcode`会显示关于你新创建项目的信息，如图 1-7 所示。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig7_HTML.jpg](img/329781_5_En_1_Fig7_HTML.jpg)\n\
    \n图 1-7  \n查看新创建的 iOS 项目的详细信息\n\n*   如何理解项目的各个部分\n*   如何查看不同的文件\n*   `Xcode`的不同部分如何工作\n\
    \n起初，`Xcode`窗口可能看起来令人困惑，因为它同时显示了太多信息，但`Xcode`将这些信息组织在几个窗格中。\n\n最左边的窗格称为导航器窗格。通过点击导航器窗格顶部的图标，你可以查看项目的不同部分，如图\
    \ 1-8 所示。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig8_HTML.jpg](img/329781_5_En_1_Fig8_HTML.jpg)\n\
    \n图 1-8  \n导航器窗格出现在`Xcode`窗口的最左侧\n\n最简单的 iOS 应用包含三个文件：\n"
- fmt: "*   `AppDelegate.swift` – 包含用于监控应用行为的 Swift 代码\n*   `ViewController.swift`\
    \ – 包含用于控制单个视图用户界面的 Swift 代码\n*   `Main.storyboard` – 包含定义应用用户界面的故事板\n\n在我们的简单应用中，只有一个视图（窗口），因此只有一个`ViewController.swift`文件。在包含多个视图（窗口）的更复杂的应用中，你需要为每个视图准备单独的`ViewController.swift`文件（通常使用独特的名称）。\n\
    \n导航器面板最常见的用途是将项目显示为文件夹和文件。文件夹仅用于帮助你组织文件。通过点击文件夹图标左侧的灰色展开三角形，你可以展开或隐藏文件夹的内容。\n\
    \n要了解导航器面板的工作方式，请按以下步骤操作：\n\n1.  选择以下任一方式，使项目导航器显示在导航器面板中：\n    *   点击导航器面板左上角的项目导航器图标。\n\
    \    *   选择“视图”➤“导航器”➤“显示导航器”。\n    *   按`Command + 1`。\n\n就像在任何计算机上一样，你可以在文件夹中存储文件夹。在每个文件夹中，你可以存储一个或多个文件。在我们的简单\
    \ iOS 应用中，导航器面板中显示的两类文件以`.swift`和`.storyboard`扩展名结尾。\n\n`.swift`扩展名标识包含 Swift\
    \ 代码的文件。`.storyboard`扩展名标识包含用户界面的文件。\n\n1.  点击`AppDelegate.swift`文件。Xcode 会在中间面板中显示该文件的内容，如图\
    \ [1-9](#329781_5_En_1_Chapter.xhtml#Fig9) 所示。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig9_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig9_HTML.jpg)\n\
    \n图 1-9：在导航器面板中点击文件会在中间 Xcode 面板中显示其内容\n\n当你点击`.swift`文件时，中间 Xcode 面板会显示一个编辑器，你可以在其中编写和编辑\
    \ Swift 代码。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig10_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig10_HTML.jpg)\n\
    \n图 1-10：在导航器面板中点击`.storyboard`文件会在中间 Xcode 面板中显示其内容\n\n1.  点击`Main.storyboard`文件。中间\
    \ Xcode 面板会显示故事板，使你能够看到用户界面，如图 [1-10](#329781_5_En_1_Chapter.xhtml#Fig10) 所示。\n\
    \n通常，你在导航器面板中选择的内容会以更详细的形式显示在中间 Xcode 面板中。你可以通过点击导航器面板顶部的图标，或者选择“视图”➤“导航器”菜单选项（如图\
    \ [1-11](#329781_5_En_1_Chapter.xhtml#Fig11) 所示），来选择要在导航器面板中显示的不同信息。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig11_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig11_HTML.jpg)\n\
    \n图 1-11：“视图”➤“导航器”菜单允许你选择在导航器面板中显示的内容\n\n1.  将鼠标指针移到右边界上，直到鼠标指针变为双向箭头。然后拖动鼠标以加宽或缩窄导航器面板的宽度。这可以让你看到导航器面板的更多或更少内容。\n\
    2.  选择“视图”➤“导航器”➤“隐藏/显示导航器”，或按`Command + 0`（零）。这可以在隐藏导航器面板和再次显示它之间切换。你可能想隐藏导航器面板以腾出更多空间，但当你想要切换到另一个文件时，就需要再次显示导航器面板。\n\
    \n最右侧的 Xcode 面板称为检查器面板，用于显示信息或允许你自定义中间面板中显示的项目。要了解检查器面板的工作方式，请按以下步骤操作：\n\n1. \
    \ 在导航器面板中点击`ViewController.swift`文件。中间面板会显示`ViewController.swift`文件的内容。\n2.  选择以下任一方式，在检查器面板中显示快速帮助：\n\
    \    *   点击快速帮助图标。\n    *   选择“视图”➤“检查器”➤“显示快速帮助检查器”。\n    *   按`Option + Command\
    \ + 2`。\n3.  将光标移到单词“`UIViewController`”上。检查器面板会显示关于`UIViewController`的信息，如图 [1-12](#329781_5_En_1_Chapter.xhtml#Fig12)\
    \ 所示。通过使用快速帮助，你可以获取存储在`.swift`文件中不同命令的信息。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig12_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig12_HTML.jpg)\n\
    \n图 1-12：快速帮助在检查器面板中显示关于代码的附加信息\n\n4.  在导航器面板中点击`Main.storyboard`文件。中间 Xcode 面板现在会显示文档大纲和故事板，如图\
    \ [1-13](#329781_5_En_1_Chapter.xhtml#Fig13) 所示。文档大纲以大纲形式列出用户界面上的所有项目，而故事板则显示用户界面项目在用户眼中的位置。\n\
    \n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig13_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig13_HTML.jpg)\n\
    \n图 1-13：文档大纲和故事板显示用户界面\n\n5.  你可以通过两种方式在隐藏和显示文档大纲之间切换，如图 [1-14](#329781_5_En_1_Chapter.xhtml#Fig14)\
    \ 所示：\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig14_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig14_HTML.jpg)\n\
    \n图 1-14：如何显示或隐藏文档大纲\n\n*   选择“编辑器”➤“显示文档大纲”。\n*   点击“显示/隐藏文档大纲”图标。\n\n6.  确保文档大纲已打开，然后点击文档大纲中“视图控制器”图标正下方出现的“视图”图标。\n\
    7.  选择“视图”➤“检查器”➤“显示快速帮助检查器”。检查器面板会显示关于该视图的帮助，该视图显示一个窗口，如图 [1-15](#329781_5_En_1_Chapter.xhtml#Fig15)\
    \ 所示。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig15_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig15_HTML.jpg)\n\
    \n图 1-15：查看用户界面中某个视图的快速帮助\n\n当你在导航器面板中点击`.storyboard`文件时，中间 Xcode 面板会显示应用的用户界面。Xcode\
    \ 一次只能显示单个 iOS 设备（例如 iPhone 8）的应用用户界面。但是，你可以更改应用用户界面的外观，以查看它在各种不同 iOS 设备（例如 iPad\
    \ Pro 或 iPhone XR）上的显示效果。\n\n要更改显示的 iOS 设备类型，请按以下步骤操作：\n\n1.  在导航器面板中点击`.storyboard`文件。\n\
    2.  点击屏幕底部的“视图为：”文本。在图 [1-15](#329781_5_En_1_Chapter.xhtml#Fig15) 中，该文本显示为“视图为：iPhone\
    \ 8”。一个新的底部面板会弹出，让你选择要使用的不同设备和方向，如图 [1-16](#329781_5_En_1_Chapter.xhtml#Fig16)\
    \ 所示。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig16_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig16_HTML.jpg)\n\
    \n图 1-16：点击“视图为：”会显示设备和方向图标\n\n3.  点击一个不同的方向图标，例如横向。注意中间 Xcode 面板如何以新的方向显示用户界面，如图\
    \ [1-17](#329781_5_En_1_Chapter.xhtml#Fig17) 所示。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig17_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig17_HTML.jpg)\n\
    \n图 1-17：以横向显示的 iPhone 用户界面\n\n4.  点击一个不同的设备图标，例如 iPad。注意 Xcode 现在以更大的 iPad 格式显示用户界面。为了帮助你在更大的\
    \ iPad 屏幕上查看用户界面，你还可以更改中间 Xcode 面板的放大倍率。注意中间底部栏显示“视图为：”文本以及减号、100% 和加号。100% 告诉你当前的倍率，减号和加号让你可以增大或减小倍率。"
  raw: "*   AppDelegate.swift – Contains Swift code for monitoring the behavior of\
    \ your app\n\n*   ViewController.swift – Contains Swift code for controlling the\
    \ user interface of a single view\n\n*   Main.storyboard – Contains the storyboard\
    \ that defines your app’s user interface\n\nIn our simple app, we only have one\
    \ view (window) so we only have one ViewController.swift file. In more complicated\
    \ apps that consist of multiple views (windows), you’ll need a separate ViewController.swift\
    \ file (usually given a distinctive name) to work with each individual view.\n\
    \nThe most common use of the Navigator pane is to display your project as folders\
    \ and files. Folders exist solely to help you organize files. By clicking the\
    \ gray disclosure triangles that appear to the left of a folder icon, you can\
    \ expand or hide a folder’s contents.\n\nTo see how the Navigator pane works,\
    \ follow these steps:\n\n1.  Choose one of the following to make the Project Navigator\
    \ appear in the Navigator pane:\n    *   Click the Project Navigator icon at the\
    \ top, left of the Navigator pane.\n\n*   Choose View ➤ Navigators ➤ Show Navigator.\n\
    \n*   Press Command + 1.\n\nJust like on any computer, you can store folders within\
    \ folders. Within each folder you can store one or more files. In our simple iOS\
    \ app, the two types of files displayed in the Navigator pane end with the .swift\
    \ and .storyboard extensions.\n\nA .swift extension identifies a file that contains\
    \ Swift code. A .storyboard extension identifies a file that contains the user\
    \ interface.\n\n1.  Click the AppDelegate.swift file. Xcode displays the contents\
    \ of that file in the middle pane as shown in Figure [1-9](#329781_5_En_1_Chapter.xhtml#Fig9).\n\
    \n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig9_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig9_HTML.jpg)\n\
    \nFigure 1-9\n\nClicking a file in the Navigator pane displays its contents in\
    \ the middle Xcode pane\n\nWhen you click a .swift file, the middle Xcode pane\
    \ displays an editor where you can write and edit Swift code.\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig10_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig10_HTML.jpg)\n\
    \nFigure 1-10\n\nClicking a .storyboard file in the Navigator pane displays its\
    \ contents in the middle Xcode pane\n\n1.  Click the Main.storyboard file. The\
    \ middle Xcode pane displays the storyboard so you can see your user interface\
    \ as shown in Figure [1-10](#329781_5_En_1_Chapter.xhtml#Fig10).\n\nIn general,\
    \ whatever you select in the Navigator pane will appear in more detail in the\
    \ middle Xcode pane. You can select different information to appear in the Navigator\
    \ pane either by clicking the icons at the top of the Navigator pane or by choosing\
    \ the View ➤ Navigators menu option as shown in Figure [1-11](#329781_5_En_1_Chapter.xhtml#Fig11).\n\
    \n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig11_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig11_HTML.jpg)\n\
    \nFigure 1-11\n\nThe View ➤ Navigators menu lets you choose what to display in\
    \ the Navigator pane\n\n1.  Move the mouse pointer over the right border until\
    \ the mouse pointer turns into a two-way pointing arrow. Then drag the mouse to\
    \ widen or narrow the Navigator pane width. This lets you see more or less of\
    \ the Navigator pane.\n\n2.  Choose View ➤ Navigators ➤ Hide/Show Navigator, or\
    \ press Command + 0 (zero). This toggles between hiding the Navigator pane or\
    \ showing it again. You may want to hide the Navigator pane to give you more space,\
    \ but then you’ll need to display the Navigator pane when you want to switch to\
    \ a different file.\n\nThe far right Xcode pane is called the Inspector pane and\
    \ is used to display information or allow you to customize items displayed in\
    \ the middle pane. To see how the Inspector pane works, follow these steps:\n\n\
    1.  Click the ViewController.swift file in the Navigator pane. The middle pane\
    \ displays the contents of the ViewController.swift file.\n\n2.  Choose one of\
    \ the following to display Quick Help in the Inspector pane:\n    *   Click the\
    \ Quick Help icon.\n\n*   Choose View ➤ Inspectors ➤ Show Quick Help Inspector.\n\
    \n*   Press Option + Command + 2.\n\n3.  Move the cursor over the word “UIViewController”.\
    \ The Inspector pane displays information about the UIViewController as shown\
    \ in Figure [1-12](#329781_5_En_1_Chapter.xhtml#Fig12). By using Quick Help, you\
    \ can get information about different commands stored in a .swift file.\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig12_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig12_HTML.jpg)\n\
    \nFigure 1-12\n\nQuick Help displays additional information about code in the\
    \ Inspector pane\n\n4.  Click the Main.storyboard file in the Navigator pane.\
    \ The middle Xcode pane now shows a Document Outline and a Storyboard as shown\
    \ in Figure [1-13](#329781_5_En_1_Chapter.xhtml#Fig13). The Document Outline lists\
    \ all the items on the user interface in an outline, while the Storyboard displays\
    \ the position of the user interface items as they appear to the user.\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig13_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig13_HTML.jpg)\n\
    \nFigure 1-13\n\nThe Document Outline and Storyboard display the user interface\n\
    \n5.  You can toggle between hiding and showing the Document Outline in two ways\
    \ as shown in Figure [1-14](#329781_5_En_1_Chapter.xhtml#Fig14):\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig14_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig14_HTML.jpg)\n\
    \nFigure 1-14\n\nHow to display or hide the Document Outline\n\n*   Choose Editor\
    \ ➤ Show Document Outline.\n\n*   Click the Show/Hide Document Outline icon.\n\
    \n6.  Make sure the Document Outline is open and click the View icon that appears\
    \ directly under the View Controller icon in the Document Outline.\n\n7.  Choose\
    \ View ➤ Inspectors ➤ Show Quick Help Inspector. The Inspector pane displays help\
    \ about the view, which displays a window, as shown in Figure [1-15](#329781_5_En_1_Chapter.xhtml#Fig15).\n\
    \n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig15_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig15_HTML.jpg)\n\
    \nFigure 1-15\n\nViewing Quick Help for a view on the user interface\n\nWhen you\
    \ click a .storyboard file in the Navigator pane, the middle Xcode pane displays\
    \ your app’s user interface. Xcode can only display your user interface for a\
    \ single iOS device at a time such as an iPhone 8\\. However, you can change the\
    \ appearance of your app’s user interface to see how it will look on a variety\
    \ of different iOS devices such as an iPad Pro or an iPhone XR.\n\nTo change the\
    \ type of iOS device to display, follow these steps:\n\n1.  Click a .storyboard\
    \ file in the Navigator pane.\n\n2.  Click the “View as:” text at the bottom of\
    \ the screen. In Figure [1-15](#329781_5_En_1_Chapter.xhtml#Fig15), this text\
    \ reads “View as: iPhone 8”. A new bottom pane appears letting you choose a different\
    \ device and orientation to use as shown in Figure [1-16](#329781_5_En_1_Chapter.xhtml#Fig16).\n\
    \n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig16_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig16_HTML.jpg)\n\
    \nFigure 1-16\n\nClicking “View as:” displays a device and Orientation icon\n\n\
    3.  Click a different Orientation icon such as landscape. Notice how the middle\
    \ Xcode pane displays the user interface in your new orientation as shown in Figure\
    \ [1-17](#329781_5_En_1_Chapter.xhtml#Fig17).\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig17_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig17_HTML.jpg)\n\
    \nFigure 1-17\n\nDisplaying a user interface as an iPhone in landscape orientation\n\
    \n4.  Click a different device icon such as an iPad. Notice that Xcode now displays\
    \ your user interface in the larger iPad format. To help you view your user interface\
    \ in a larger iPad screen, you can also change the magnification of the middle\
    \ Xcode pane. Notice that the middle bottom bar displays the “View as:” text along\
    \ with a minus sign, 100%, and a plus sign. The 100% tells you the current magnification\
    \ and the minus and plus signs let you increase or decrease the magnification."
  trans: "\n*   `AppDelegate.swift` – 包含用于监控应用行为的 Swift 代码\n*   `ViewController.swift`\
    \ – 包含用于控制单个视图用户界面的 Swift 代码\n*   `Main.storyboard` – 包含定义应用用户界面的故事板\n\n在我们的简单应用中，只有一个视图（窗口），因此只有一个`ViewController.swift`文件。在包含多个视图（窗口）的更复杂的应用中，你需要为每个视图准备单独的`ViewController.swift`文件（通常使用独特的名称）。\n\
    \n导航器面板最常见的用途是将项目显示为文件夹和文件。文件夹仅用于帮助你组织文件。通过点击文件夹图标左侧的灰色展开三角形，你可以展开或隐藏文件夹的内容。\n\
    \n要了解导航器面板的工作方式，请按以下步骤操作：\n\n1.  选择以下任一方式，使项目导航器显示在导航器面板中：\n    *   点击导航器面板左上角的项目导航器图标。\n\
    \    *   选择“视图”➤“导航器”➤“显示导航器”。\n    *   按`Command + 1`。\n\n就像在任何计算机上一样，你可以在文件夹中存储文件夹。在每个文件夹中，你可以存储一个或多个文件。在我们的简单\
    \ iOS 应用中，导航器面板中显示的两类文件以`.swift`和`.storyboard`扩展名结尾。\n\n`.swift`扩展名标识包含 Swift\
    \ 代码的文件。`.storyboard`扩展名标识包含用户界面的文件。\n\n1.  点击`AppDelegate.swift`文件。Xcode 会在中间面板中显示该文件的内容，如图\
    \ 1-9 所示。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig9_HTML.jpg](img/329781_5_En_1_Fig9_HTML.jpg)\n\
    \n图 1-9：在导航器面板中点击文件会在中间 Xcode 面板中显示其内容\n\n当你点击`.swift`文件时，中间 Xcode 面板会显示一个编辑器，你可以在其中编写和编辑\
    \ Swift 代码。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig10_HTML.jpg](img/329781_5_En_1_Fig10_HTML.jpg)\n\
    \n图 1-10：在导航器面板中点击`.storyboard`文件会在中间 Xcode 面板中显示其内容\n\n1.  点击`Main.storyboard`文件。中间\
    \ Xcode 面板会显示故事板，使你能够看到用户界面，如图 1-10 所示。\n\n通常，你在导航器面板中选择的内容会以更详细的形式显示在中间 Xcode\
    \ 面板中。你可以通过点击导航器面板顶部的图标，或者选择“视图”➤“导航器”菜单选项（如图 1-11 所示），来选择要在导航器面板中显示的不同信息。\n\n\
    ![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig11_HTML.jpg](img/329781_5_En_1_Fig11_HTML.jpg)\n\
    \n图 1-11：“视图”➤“导航器”菜单允许你选择在导航器面板中显示的内容\n\n1.  将鼠标指针移到右边界上，直到鼠标指针变为双向箭头。然后拖动鼠标以加宽或缩窄导航器面板的宽度。这可以让你看到导航器面板的更多或更少内容。\n\
    2.  选择“视图”➤“导航器”➤“隐藏/显示导航器”，或按`Command + 0`（零）。这可以在隐藏导航器面板和再次显示它之间切换。你可能想隐藏导航器面板以腾出更多空间，但当你想要切换到另一个文件时，就需要再次显示导航器面板。\n\
    \n最右侧的 Xcode 面板称为检查器面板，用于显示信息或允许你自定义中间面板中显示的项目。要了解检查器面板的工作方式，请按以下步骤操作：\n\n1. \
    \ 在导航器面板中点击`ViewController.swift`文件。中间面板会显示`ViewController.swift`文件的内容。\n2.  选择以下任一方式，在检查器面板中显示快速帮助：\n\
    \    *   点击快速帮助图标。\n    *   选择“视图”➤“检查器”➤“显示快速帮助检查器”。\n    *   按`Option + Command\
    \ + 2`。\n3.  将光标移到单词“`UIViewController`”上。检查器面板会显示关于`UIViewController`的信息，如图 1-12\
    \ 所示。通过使用快速帮助，你可以获取存储在`.swift`文件中不同命令的信息。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig12_HTML.jpg](img/329781_5_En_1_Fig12_HTML.jpg)\n\
    \n图 1-12：快速帮助在检查器面板中显示关于代码的附加信息\n\n4.  在导航器面板中点击`Main.storyboard`文件。中间 Xcode 面板现在会显示文档大纲和故事板，如图\
    \ 1-13 所示。文档大纲以大纲形式列出用户界面上的所有项目，而故事板则显示用户界面项目在用户眼中的位置。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig13_HTML.jpg](img/329781_5_En_1_Fig13_HTML.jpg)\n\
    \n图 1-13：文档大纲和故事板显示用户界面\n\n5.  你可以通过两种方式在隐藏和显示文档大纲之间切换，如图 1-14 所示：\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig14_HTML.jpg](img/329781_5_En_1_Fig14_HTML.jpg)\n\
    \n图 1-14：如何显示或隐藏文档大纲\n\n*   选择“编辑器”➤“显示文档大纲”。\n*   点击“显示/隐藏文档大纲”图标。\n\n6.  确保文档大纲已打开，然后点击文档大纲中“视图控制器”图标正下方出现的“视图”图标。\n\
    7.  选择“视图”➤“检查器”➤“显示快速帮助检查器”。检查器面板会显示关于该视图的帮助，该视图显示一个窗口，如图 1-15 所示。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig15_HTML.jpg](img/329781_5_En_1_Fig15_HTML.jpg)\n\
    \n图 1-15：查看用户界面中某个视图的快速帮助\n\n当你在导航器面板中点击`.storyboard`文件时，中间 Xcode 面板会显示应用的用户界面。Xcode\
    \ 一次只能显示单个 iOS 设备（例如 iPhone 8）的应用用户界面。但是，你可以更改应用用户界面的外观，以查看它在各种不同 iOS 设备（例如 iPad\
    \ Pro 或 iPhone XR）上的显示效果。\n\n要更改显示的 iOS 设备类型，请按以下步骤操作：\n\n1.  在导航器面板中点击`.storyboard`文件。\n\
    2.  点击屏幕底部的“视图为：”文本。在图 1-15 中，该文本显示为“视图为：iPhone 8”。一个新的底部面板会弹出，让你选择要使用的不同设备和方向，如图\
    \ 1-16 所示。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig16_HTML.jpg](img/329781_5_En_1_Fig16_HTML.jpg)\n\
    \n图 1-16：点击“视图为：”会显示设备和方向图标\n\n3.  点击一个不同的方向图标，例如横向。注意中间 Xcode 面板如何以新的方向显示用户界面，如图\
    \ 1-17 所示。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig17_HTML.jpg](img/329781_5_En_1_Fig17_HTML.jpg)\n\
    \n图 1-17：以横向显示的 iPhone 用户界面\n\n4.  点击一个不同的设备图标，例如 iPad。注意 Xcode 现在以更大的 iPad 格式显示用户界面。为了帮助你在更大的\
    \ iPad 屏幕上查看用户界面，你还可以更改中间 Xcode 面板的放大倍率。注意中间底部栏显示“视图为：”文本以及减号、100% 和加号。100% 告诉你当前的倍率，减号和加号让你可以增大或减小倍率。\n"
- fmt: "1.  单击减号以缩小放大倍率（例如 50%），从而更轻松地查看 iPad 用户界面，如图 [1-18](#329781_5_En_1_Chapter.xhtml#Fig18)\
    \ 所示。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig18_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig18_HTML.jpg)\n\
    \n*Figure 1-18* 以 50% 放大倍率显示 iPad Pro 用户界面\n\n2.  单击“View as:”文本，使设备和方向窗格消失。\n\
    3.  选择 `File` ➤ `Save` 保存你的项目。\n\n如你所见，Xcode 的三个窗格协同工作，向你展示项目的不同信息。导航器窗格（最左侧）让你可以概览项目。单击导航器窗格中的特定项目，会在中间\
    \ Xcode 窗格中显示该项目。检查器窗格（最右侧）显示中间窗格中选中内容的附加信息。\n\n如果你探索 Xcode，会发现数十个功能，但不必一下子理解所有内容才能开始使用\
    \ Xcode。只需专注于使用你需要的那些功能，其他功能可以暂时忽略，直到需要时再用。\n\n## 总结\n\n创建 iOS 应用不仅涉及编写代码。为了帮助你的应用访问不同\
    \ iOS 设备的硬件功能，你可以使用 Apple 提供的软件框架，这些框架允许访问摄像头或 Siri 的自然语言界面。通过将你的代码与 Apple 现有的软件框架结合，你可以专注于编写使应用运行的代码，并利用\
    \ Apple 的软件框架来实现在大多数 iOS 设备上常见的功能。\n\n除了编写代码，每个 iOS 应用还需要一个用户界面。这个用户界面需要适应不同 iOS\
    \ 设备（如 iPhone XR 或 iPad Pro）的不同方向和屏幕尺寸。\n\n创建 iOS 应用的主要工具是 Apple 免费的 Xcode 程序，它允许你创建项目、组织项目的各个文件，以及查看和编辑每个文件的内容。Xcode\
    \ 让你可以在一个程序中完成设计、编辑和测试你的应用。尽管 Xcode 提供了数十种功能，但你只需要使用其中一部分即可开始创建你自己的 iOS 应用。\n\n\
    学习 iOS 编程涉及学习如何使用 Swift 编程语言编写命令、学习如何查找和使用 Apple 的各种软件框架、学习如何设计用户界面，以及学习如何使用 Xcode。虽然这看起来很多，但本书将带你一步步完成，让你在不久的将来能够舒适地使用\
    \ Xcode 并创建你自己的 iOS 应用。\n\n# 2. 设计用户界面\n\n每个应用都需要一个用户界面。与 Windows 或 macOS 等桌面操作系统可以在屏幕上同时显示多个窗口的用户界面不同，iOS\
    \ 应用通常一次只显示一个填充整个屏幕的窗口（称为视图）。同样，与用户可以使用键盘或鼠标操作的 Windows 或 macOS 用户界面不同，用户必须仅通过触摸屏操作\
    \ iOS 应用，尽管也可以通过可选的键盘进行控制。在 iOS 应用中，图 [2-1](#329781_5_En_2_Chapter.xhtml#Fig1)\
    \ 显示了一个用户界面由以下部分组成：\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig1_HTML.jpg](images/329781_5_En_2_Chapter/329781_5_En_2_Fig1_HTML.jpg)\n\
    \n*Figure 2-1.* iOS 应用用户界面的三个部分\n\n*   **视图**\n*   **对象**，如按钮、标签、文本框和开关\n*   **转场**\n\
    \n我们用于在第一章[1](#329781_5_En_1_Chapter.xhtml)中创建应用的“单视图应用”模板由一个视图组成，并且没有对象。由于只有一个视图，因此也没有转场，因为转场用于连接两个视图，以显示应用运行时每个视图出现的顺序。\n\
    \n就其本身而言，一个没有对象的视图不过是一个空白屏幕。要使视图有用，它需要包含一个或多个对象。使用 Xcode，通常有两种方法可以完成完全相同的任务：\n\
    \n*   **编程方式**\n*   **可视化方式**\n\n编程方式意味着编写代码来完成所有操作。在创建出现在视图上的对象时，这意味着编写 Swift\
    \ 代码来定义要显示的对象、其大小、在视图上的位置以及任何其他自定义设置（如颜色）。\n\n可视化方式意味着使用鼠标将对象拖放到视图上。将对象放置在视图上后，你可以修改其大小、位置或任何其他属性，而无需编写任何代码。\n\
    \n你可以使用其中一种或两种方法，但为了保持一致性，通常最好使用一种方法。此外，虽然你可以通过编写代码（编程方式）来创建整个用户界面，但通常不建议这样做，因为编写的代码越少，修改和调试程序就越容易。编程的目标是用尽可能少的代码完成尽可能多的功能。\n\
    \n首先，让我们看看如何以编程方式创建对象，以便你了解其工作原理。让我们在视图上创建一个标签和一个按钮。\n\n1.  打开你的 `MyFirstApp`\
    \ 项目（或创建一个新的单视图应用 iOS 项目）。\n2.  在导航器窗格中单击 `ViewController.swift` 文件。中间的 Xcode\
    \ 窗格会显示 `ViewController.swift` 文件的内容。\n3.  修改 `ViewController.swift` 文件中的代码，使其如下所示：\n\
    \n```\n    import UIKit\n    class ViewController: UIViewController {\n    override\
    \ func viewDidLoad() {\n    super.viewDidLoad()\n    let label = UILabel()\n \
    \   label.frame = CGRect(x: 125, y: 125, width: 200, height: 80)\n    label.text\
    \ = \"This is a label\"\n    view.addSubview(label)\n    let button = UIButton()\n\
    \    button.frame = CGRect(x: 125, y: 300, width: 80, height: 80)\n    button.setTitle(\"\
    Button\", for: .normal)\n    button.setTitleColor(UIColor.blue, for: .normal)\n\
    \    view.addSubview(button)\n    }\n    }\n    ```\n\n4.  选择 `Project` ➤ `Run`\
    \ 或按下 `Command + R`。Xcode 会加载模拟器程序，让你可以模拟 iOS 设备。当你的应用在模拟器中加载时，它将显示一个标签和一个按钮，如图\
    \ [2-2](#329781_5_En_2_Chapter.xhtml#Fig2) 所示。\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig2_HTML.jpg](images/329781_5_En_2_Chapter/329781_5_En_2_Fig2_HTML.jpg)\n\
    \n*Figure 2-2.* 以编程方式创建的用户界面，显示一个标签和一个按钮\n\n5.  选择 `Simulator` ➤ `Quit Simulator`\
    \ 或按下 `Command + Q`。Xcode 窗口会再次出现。\n\n让我们回顾一下这段代码，以便你理解它是如何工作的。首先，我们必须定义要创建的对象类型，例如\
    \ `UILabel` 或 `UIButton`：\n\n```\nlet label = UILabel()\nlet button = UIButton()\n\
    ```"
  raw: "5.  Click the minus sign to decrease the magnification (such as 50%) so you\
    \ can view the iPad user interface easier as shown in Figure [1-18](#329781_5_En_1_Chapter.xhtml#Fig18).\n\
    \n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig18_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig18_HTML.jpg)\n\
    \nFigure 1-18\n\nDisplaying an iPad Pro user interface at 50% magnification\n\n\
    6.  Click the “View as:” text to make the device and orientation pane disappear.\n\
    \n7.  Choose File ➤ Save to save your project.\n\nAs you can see, the three Xcode\
    \ panes work together to show you different information about your project. The\
    \ Navigator pane (on the far left) lets you see an overview of your project. Clicking\
    \ a specific item in the Navigator pane displays that item in the middle Xcode\
    \ pane. The Inspector pane (on the far right) shows additional information about\
    \ something displayed and selected in the middle pane.\n\nIf you explore Xcode,\
    \ you’ll see dozens of features, but it’s not necessary to understand everything\
    \ at once to start using Xcode. Just focus on using only those features you need\
    \ and feel free to ignore the rest until you need them.\n\n## Summary\n\nCreating\
    \ iOS apps involves more than just writing code. To help your app access hardware\
    \ features of different iOS devices, you can use Apple’s software frameworks that\
    \ provide access to the camera or to Siri’s natural language interface. By combining\
    \ your code with Apple’s existing software frameworks, you can focus on writing\
    \ code to make your app work and use Apple’s software frameworks to help you perform\
    \ common functions found on most iOS devices.\n\nBesides writing code, every iOS\
    \ app also needs a user interface. This user interface needs to adjust to different\
    \ orientations and screen sizes of different iOS devices such as an iPhone XR\
    \ or an iPad Pro.\n\nThe main tool for creating iOS apps is Apple’s free Xcode\
    \ program, which lets you create projects, organize the separate files of a project,\
    \ and view and edit the contents of each file. Xcode lets you design, edit, and\
    \ test your app all in a single program. Although Xcode offers dozens of features,\
    \ you only need to use a handful of them to start creating iOS apps of your own.\n\
    \nLearning iOS programming involves learning how to write commands using the Swift\
    \ programming language, learning how to find and use Apple’s various software\
    \ frameworks, learning how to design user interfaces, and learning how to use\
    \ Xcode. While this might seem like a lot, this book will take you through each\
    \ step of the way so you’ll feel comfortable using Xcode and creating your own\
    \ iOS apps in the near future.\n\n# 2. Designing User Interfaces\n\nEvery app\
    \ needs a user interface. Unlike user interfaces for desktop operating systems\
    \ like Windows or macOS that can display multiple windows on a screen at a time,\
    \ iOS apps typically display a single window (called a view) that fills the entire\
    \ screen at a time. Also unlike Windows or macOS user interfaces that users can\
    \ manipulate using a keyboard or a mouse, users must be able to manipulate iOS\
    \ apps solely through a touch screen although they can also be controlled through\
    \ an optional keyboard as well. In iOS apps, Figure [2-1](#329781_5_En_2_Chapter.xhtml#Fig1)\
    \ shows how a user interface consists of\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig1_HTML.jpg](images/329781_5_En_2_Chapter/329781_5_En_2_Fig1_HTML.jpg)\n\
    \nFigure 2-1.\n\nThe three parts of an iOS app user interface\n\n*   Views\n\n\
    *   Objects such as buttons, labels, text boxes, and switches\n\n*   Segues\n\n\
    The Single View App template that we used to create an app in Chapter [1](#329781_5_En_1_Chapter.xhtml)\
    \ consists of a single view and no objects. Since there’s also only one view,\
    \ there are no segues because segues connect two views together to show the order\
    \ that each view appears when the app runs.\n\nBy itself, a view with no objects\
    \ on it is nothing more than a blank screen. To make a view useful, it needs one\
    \ or more objects on it. With Xcode, there are often two ways to accomplish the\
    \ exact same tasks:\n\n*   Programmatically\n\n*   Visually\n\nProgrammatically\
    \ means writing code to do everything. In the case of creating objects that appear\
    \ on a view, this means writing Swift code to define the object you want to display,\
    \ its size, its position on the view, and any other custom settings such as its\
    \ color.\n\nVisually means using the mouse to drag and drop objects on a view.\
    \ After placing an object on a view, you can then modify its size, position, or\
    \ any other attribute without writing any code at all.\n\nYou can use one or both\
    \ methods, but it’s generally best to use one method for consistency. Also while\
    \ you can create an entire user interface by writing code (programmatically),\
    \ it’s generally best not to do so because the less code you write, the easier\
    \ it will be to modify and debug your program. The goal of programming is to write\
    \ as little code as possible that does as much as possible.\n\nFirst, let’s see\
    \ how to create objects programmatically so you can understand how the process\
    \ works. Let’s create a label and a button on a view.\n\n1.  Open your MyFirstApp\
    \ project (or create a new Single View App iOS project).\n\n2.  Click the ViewController.swift\
    \ file in the Navigator pane. The middle Xcode pane displays the contents of the\
    \ ViewController.swift file.\n\n3.  Modify the code in the ViewController.swift\
    \ file so it looks like this:\n\n```\n    import UIKit\n    class ViewController:\
    \ UIViewController {\n    override func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    let label = UILabel()\n    label.frame = CGRect(x: 125, y: 125, width: 200,\
    \ height: 80)\n    label.text = \"This is a label\"\n    view.addSubview(label)\n\
    \    let button = UIButton()\n    button.frame = CGRect(x: 125, y: 300, width:\
    \ 80, height: 80)\n    button.setTitle(\"Button\", for: .normal)\n    button.setTitleColor(UIColor.blue,\
    \ for: .normal)\n    view.addSubview(button)\n    }\n    }\n    ```\n\n4.  Choose\
    \ Project ➤ Run or press Command + R. Xcode loads the Simulator program that lets\
    \ you simulate an iOS device. When your app loads in the Simulator, it will display\
    \ a label and a button as shown in Figure [2-2](#329781_5_En_2_Chapter.xhtml#Fig2).\n\
    \n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig2_HTML.jpg](images/329781_5_En_2_Chapter/329781_5_En_2_Fig2_HTML.jpg)\n\
    \nFigure 2-2.\n\nThe user interface displaying a label and a button, created programmatically\n\
    \n5.  Choose Simulator ➤ Quit Simulator or press Command + Q. The Xcode window\
    \ appears again.\n\nLet’s go over this code so you understand how it works. First,\
    \ we must define the type of object we want to create such as a UILabel or UIButton:\n\
    \n```\nlet label = UILabel()\nlet button = UIButton()\n```"
