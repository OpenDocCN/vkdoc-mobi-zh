    \ both.\n\n4.  Choose Editor ➤ Embed In ➤ Stack View, or click the Stack View\
    \ icon at the bottom of the Xcode window, and when a menu appears, choose Stack\
    \ View as shown in Figure [6-29](#329781_5_En_6_Chapter.xhtml#Fig29). Xcode displays\
    \ handles around both the button and text field.\n\n    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig29_HTML.png](images/329781_5_En_6_Chapter/329781_5_En_6_Fig29_HTML.png)\n\
    \n    Figure 6-29\n\n    Two ways to choose the Stack View command\n\n5.  Click\
    \ the Align icon at the bottom of the Xcode window and select the Horizontally\
    \ in Container check box. Then click the Add 1 Constraint button as shown in Figure\
    \ [6-30](#329781_5_En_6_Chapter.xhtml#Fig30).\n\n    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig30_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig30_HTML.jpg)\n\
    \n    Figure 6-30\n\n    Placing a constraint to center the stack horizontally\n\
    \n6.  Click the Add new constraints icon at the bottom of the Xcode window. When\
    \ a popup menu appears, click the line defining the distance from the top of the\
    \ stack to the top of the screen as shown in Figure [6-31](#329781_5_En_6_Chapter.xhtml#Fig31).\n\
    \n    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig31_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig31_HTML.jpg)\n\
    \n    Figure 6-31\n\n    Defining a constraint from the top of the stack to the\
    \ top of the screen\n\n7.  Click the Add 1 Constraint button. Xcode adds a constraint.\
    \ Your user interface should now have just two constraints, one defining the distance\
    \ of the stack to the top of the screen and one centering the stack horizontally\
    \ in the screen as shown in Figure [6-32](#329781_5_En_6_Chapter.xhtml#Fig32).\n\
    \n    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig32_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig32_HTML.jpg)\n\
    \n    Figure 6-32\n\n    Two constraints define the position of the stack, which\
    \ consists of a button and a text field\n\n8.  Click the “View as:” button at\
    \ the bottom of the Xcode window and choose a different iOS device for the storyboard\
    \ to mimic such as an iPhone XR or an iPhone SE. No matter which iOS device you\
    \ choose, the stack and constraints keep the button and text field displayed on\
    \ every screen correctly.\n\n9.  Make sure the stack (button and text field) is\
    \ selected. Then choose Editor ➤ Unembed or click the Stack View icon at the bottom\
    \ of the Xcode window, and when a menu appears, choose Unembed as shown in Figure\
    \ [6-33](#329781_5_En_6_Chapter.xhtml#Fig33). Xcode now separates the button and\
    \ text field so you can manipulate and select them individually once more.\n\n\
    \    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig33_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig33_HTML.jpg)\n\
    \n    Figure 6-33\n\n    The Unembed command separates objects in a stack view\n\
    \n## Summary\n\nWhen you place objects on a user interface, you need to define\
    \ each object’s size (width and height) and position (X and Y values measured\
    \ from the upper left corner of the screen). Every user interface object needs\
    \ to define its size and position. Each user interface object may offer additional\
    \ attributes to customize such as text to appear or a background color. By changing\
    \ different attributes of an object, you can customize its appearance on the user\
    \ interface.\n\nBecause apps may run on iOS devices that have different screen\
    \ sizes, you must use constraints to define distances between objects and each\
    \ other or the screen borders.\n\nEvery iOS device offers a Safe Area to place\
    \ objects. As long as objects appear in this Safe Area, they will never risk getting\
    \ cut off on different iOS screens. You’ll need to use constraints to define the\
    \ distance you want to place objects near the borders of this Safe Area or between\
    \ neighboring objects.\n\nConstraints can define the distance between objects\
    \ or the size (width and height) of an object. Constraints can use fixed values,\
    \ but it’s usually better to place objects near each other and then use a Standard\
    \ or Canvas Value instead, which helps adjust the position of user interface objects\
    \ better on different size iOS screens.\n\nWhen using fixed values, you can define\
    \ a distance that’s exactly equal to the fixed value. For more flexibility, you\
    \ might want to choose to use the fixed value to define a minimum or maximum value\
    \ instead. This allows the distance between objects or screen borders to vary,\
    \ bound only by a minimum or maximum value.\n\nIf you have multiple objects, you\
    \ can group them in a stack view. A stack view locks objects in their current\
    \ relative position and lets you move and add constraints to the entire stack\
    \ view rather than to each object individually."
  trans: '

    # 更改约束的固定值


    要了解如何将约束的固定值更改为标准值或画布值，或定义最小或最大距离，请按以下步骤操作：


    1.  确保 `ObjectApp` 项目已在 Xcode 中加载。

    2.  在导航器窗格中点击 `Main.storyboard` 文件。

    3.  如果文档大纲不可见，请选择 **编辑器** ➤ **显示文档大纲**，或点击 Xcode 窗口底部的“文档大纲”图标。

    4.  点击灰色展开三角形的层级（`视图控制器场景` ➤ `视图控制器` ➤ `视图` ➤ `约束`）以查看当前定义的所有约束列表。

    5.  点击 `Hello.top = OK.bottom + 64` 约束。检查器窗格会显示图 6-27 中该约束的值。

    6.  点击“常量”弹出菜单。会出现一个菜单，让您选择标准值或画布值（见图 6-26）。

    7.  点击“关系”弹出菜单，显示不同的选项，例如“小于或等于”、“等于”或“大于或等于”，如图 6-28 所示。“小于或等于”表示距离可以缩小到由常量值定义的最小值。“等于”表示距离必须始终严格等于常量值。“大于或等于”表示距离可以等于常量值或增大到更大的值。


    ## 使用栈视图


    许多应用程序的用户界面会使用多个对象。问题源于为所有这些众多对象定义约束。将某个对象移动到新位置或调整其大小，也需要修改附近对象的所有约束。由于这可能既繁琐又乏味，Xcode
    提供了一种名为栈视图的解决方案。


    栈视图背后的思想是将多个对象分组在一起，并将其视为单个对象。栈视图定义了对象之间的相对位置，而约束则定义了栈视图与屏幕边缘之间的相对关系。栈视图让您可以移动多个对象，而无需担心修改它们之间的各个约束。


    要了解栈视图如何工作，请按以下步骤操作：


    1.  确保 `ObjectApp` 项目已在 Xcode 中加载。

    2.  在导航器窗格中点击 `Main.storyboard` 文件。

    3.  按住 Shift 键并点击按钮和文本字段以同时选中它们。

    4.  选择 **编辑器** ➤ **嵌入于** ➤ **栈视图**，或点击 Xcode 窗口底部的“栈视图”图标，出现菜单时选择“栈视图”，如图 6-29
    所示。Xcode 会在按钮和文本字段周围显示操作手柄。

    5.  点击 Xcode 窗口底部的“对齐”图标，并选中**水平居中于容器**复选框。然后点击**添加 1 个约束**按钮，如图 6-30 所示。

    6.  点击 Xco​​de 窗口底部的“添加新约束”图标。出现弹出菜单时，点击定义从栈顶部到屏幕顶部距离的线条，如图 6-31 所示。

    7.  点击**添加 1 个约束**按钮。Xcode 会添加一个约束。现在您的用户界面应只有两个约束，一个定义栈到屏幕顶部的距离，另一个将栈水平居中于屏幕，如图
    6-32 所示。

    8.  点击 Xcode 窗口底部的**视图为:** 按钮，并选择一个不同的 iOS 设备供故事板模拟，例如 iPhone XR 或 iPhone SE。无论您选择哪个
    iOS 设备，栈和约束都能确保按钮和文本字段在每个屏幕上正确显示。

    9.  确保已选中栈（按钮和文本字段）。然后选择 **编辑器** ➤ **取消嵌入**，或点击 Xcode 窗口底部的“栈视图”图标，出现菜单时选择“取消嵌入”，如图
    6-33 所示。Xcode 现在会将按钮和文本字段分离，以便您可以再次单独操作和选择它们。


    ## 总结


    当您在用户界面上放置对象时，需要定义每个对象的大小（宽度和高度）和位置（从屏幕左上角测量的 X 和 Y 值）。每个用户界面对象都需要定义其大小和位置。每个用户界面对象可能提供额外的属性用于自定义，例如要显示的文本或背景颜色。通过更改对象的不同属性，您可以自定义其在用户界面上的外观。


    由于应用程序可能在具有不同屏幕尺寸的 iOS 设备上运行，因此您必须使用约束来定义对象之间或对象与屏幕边框之间的距离。


    每台 iOS 设备都提供一个安全区域来放置对象。只要对象出现在此安全区域内，它们就不会有在不同 iOS 屏幕上被截断的风险。您需要使用约束来定义希望对象靠近此安全区域边框或邻近对象之间的距离。


    约束可以定义对象之间的距离或对象的大小（宽度和高度）。约束可以使用固定值，但通常更好的做法是将对象彼此靠近放置，然后改用标准值或画布值，这有助于在不同尺寸的
    iOS 屏幕上更好地调整用户界面对象的位置。


    使用固定值时，可以定义一个严格等于该固定值的距离。为了获得更大的灵活性，您可能希望使用固定值来定义最小值或最大值。这允许对象之间或屏幕边框之间的距离有所变化，仅受最小值或最大值的限制。


    如果您有多个对象，可以将它们分组到一个栈视图中。栈视图将对象锁定在其当前的相对位置，并允许您移动整个栈视图并为整个栈视图添加约束，而不是为每个单独的对象进行操作。

