    \ petArray[section][0]\n    }\n    ```\n\n7.  Underneath the previous function,\
    \ add the following function to define the index that appears on the right side\
    \ of the table view:\n\n```\n    func sectionIndexTitles (for tableView: UITableView)\
    \ -> [String]? {\n    return indexArray\n    }\n    ```\n\nThe entire ViewController.swift\
    \ file should look like this:\n\n```\n    import UIKit\n    class ViewController:\
    \ UIViewController, UITableViewDelegate, UITableViewDataSource {\n    @IBOutlet\
    \ var petTable: UITableView!\n    let petArray = [[\"Bird\", \"parakeet\", \"\
    parrot\", \"canary\", \"finch\", \"cockatiel\"], [\"Fish\", \"tropical fish\"\
    , \"goldfish\", \"sea horses\", \"eel\"], [\"Mammal\", \"cat\", \"dog\", \"hamster\"\
    , \"gerbil\", \"rabbit\", \"mouse\"], [\"Reptile\", \"turtle\", \"snake\", \"\
    lizard\"]]\n    ```\n\n**let** `indexArray = [\"`![../images/329781_5_En_14_Chapter/329781_5_En_14_Figa_HTML.gif](images/329781_5_En_14_Chapter/329781_5_En_14_Figa_HTML.gif)`B\"\
