- fmt: "# 19. Using the Page View Controller\n\nOne unique way to display the contents\
    \ of two or more View Controllers is through a Page View Controller, which lets\
    \ users swipe left and right. Each swipe displays a different View Controller\
    \ like swiping through pages in an e-book.\n\nTo use a page controller, you need\
    \ to add a Page Controller to a storyboard. Then you can customize this Page Controller\
    \ by defining the following properties in the Attributes Inspector pane as shown\
    \ in Figure [19-1](#329781_5_En_19_Chapter.xhtml#Fig1):\n\n![../images/329781_5_En_19_Chapter/329781_5_En_19_Fig1_HTML.jpg](images/329781_5_En_19_Chapter/329781_5_En_19_Fig1_HTML.jpg)\n\
    \nFigure 19-1\n\nModifying the behavior of a Page Controller\n\n- **Navigation**\
    \ – Defines whether the user needs to swipe horizontally or vertically to display\
    \ the next or previous view\n- **Transition style** – Defines whether views curl\
    \ like pages in a book (page curl) or whether they simply slide in place (scroll)\n\
    \nAfter customizing the behavior of the Page Controller, the next step is to create\
    \ multiple View Controllers that are completely separate from the storyboard (not\
    \ connected to any existing storyboard scenes through segues). To make these View\
    \ Controllers appear within a Page Controller, each View Controller needs a unique\
    \ Storyboard ID that you can define within the Identity Inspector pane.\n\nFinally,\
    \ you need to create separate `.swift` files and connect them to each View Controller.\
    \ In addition, you need to create a separate `.swift` file and connect it to the\
    \ Page Controller. Altogether, you need two types of `.swift` files:\n\n- A single\
    \ `UIPageViewController` class file to connect to the Page Controller\n- A `UIViewController`\
    \ class file to connect to each View Controller you want to appear inside the\
    \ Page Controller\n\nOnce you’ve added a Page Controller to your storyboard and\
    \ multiple View Controllers that are not connected to any part of the storyboard\
    \ through segues, you can then write Swift code to load the multiple View Controllers.\n\
    \n## Adding and Customizing a Page Controller\n\nThe first step to using a Page\
    \ Controller is to add one to your storyboard. To see how to place a Page Controller\
    \ in a storyboard, follow these steps:\n\n1. Create a new iOS project using the\
    \ Single View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml)) and\
    \ name this new project `PageControllerApp`. This creates a single view for the\
    \ user interface.\n2. Click the `Main.storyboard` file in the Navigator pane.\
    \ Xcode displays the single view.\n3. Click the Library icon to open the Object\
    \ Library window.\n4. Drag and drop a Page Controller from the Object Library\
    \ window to the storyboard as shown in Figure [19-2](#329781_5_En_19_Chapter.xhtml#Fig2).\n\
    \n   ![../images/329781_5_En_19_Chapter/329781_5_En_19_Fig2_HTML.jpg](images/329781_5_En_19_Chapter/329781_5_En_19_Fig2_HTML.jpg)\n\
    \n   Figure 19-2\n\n   Dragging and dropping a Page Controller onto the storyboard\n\
    \n5. Click the Page View Controller icon at the top of the Page Controller (or\
    \ on the Page View Controller in the Document Outline).\n6. Choose View ➤ Inspectors\
    \ ➤ Show Attributes Inspector, or click the Attributes Inspector icon in the upper\
    \ right corner of the Xcode window.\n7. Click in the Navigation popup menu and\
    \ choose Horizontal.\n8. Click in the Transition Style popup menu and choose Page\
    \ Curl.\n9. Select the “Is Initial View Controller” check box. Xcode now displays\
    \ an arrow on the left side of the Page Controller in the storyboard.\n\n## Adding\
    \ View Controllers\n\nA Page Controller displays one or more View Controllers.\
    \ To make each View Controller appear within a Page Controller, each View Controller\
    \ needs:\n\n- A unique Storyboard ID (any arbitrary text)\n- A connection to a\
    \ `.swift` `UIViewController` file\n\nTo make it obvious when we’re viewing different\
    \ View Controllers, we also need to change the background color of each View Controller,\
    \ but in a real app, each View Controller would display different information\
    \ such as text, pictures, or user interface designs.\n\nTo see how to add View\
    \ Controllers to a storyboard to use in a Page Controller, follow these steps:\n\
    \n1. Make sure the `PageControllerApp` is loaded into Xcode.\n2. Click View under\
    \ View Controller Scene in the Document Outline to select it as shown in Figure\
    \ [19-3](#329781_5_En_19_Chapter.xhtml#Fig3).\n\n   ![../images/329781_5_En_19_Chapter/329781_5_En_19_Fig3_HTML.jpg](images/329781_5_En_19_Chapter/329781_5_En_19_Fig3_HTML.jpg)\n\
    \n   Figure 19-3\n\n   Selecting the view on the View Controller\n\n3. Choose\
    \ View ➤ Inspectors ➤ Show Attributes Inspector, or click the Attributes Inspector\
    \ icon in the upper right corner of the Xcode window.\n4. Click the Background\
    \ popup menu and choose a color such as yellow. We want to display different colors\
    \ on all View Controllers displayed by the Page Controller so it’s obvious we’re\
    \ looking at a different View Controller.\n5. Click the View Controller in the\
    \ Document Outline or click the View Controller icon above the View Controller.\n\
    6. Choose View ➤ Inspectors ➤ Show Identity Inspector, or click the Identity Inspector\
    \ icon in the upper right corner of the Xcode window.\n7. Click in the Storyboard\
    \ ID text field, type `page01`, and press ENTER as shown in Figure [19-4](#329781_5_En_19_Chapter.xhtml#Fig4).\n\
    \n   ![../images/329781_5_En_19_Chapter/329781_5_En_19_Fig4_HTML.jpg](images/329781_5_En_19_Chapter/329781_5_En_19_Fig4_HTML.jpg)\n\
    \n   Figure 19-4\n\n   Each View Controller needs a unique Storyboard ID in the\
    \ Identity Inspector pane\n\n8. Choose File ➤ New ➤ File. A dialog appears, displaying\
    \ different templates.\n9. Choose Cocoa Touch Class under the iOS category and\
    \ then click the **Next** button. Another window appears letting you choose a\
    \ name for your file.\n10. Click in the Class text field and type `SecondViewController`.\
    \ (Make sure the Subclass of popup menu displays `UIViewController`.)\n11. Click\
    \ the **Next** button and then the **Create** button. Xcode displays the `SecondViewController.swift`\
    \ file in the Navigator pane.\n12. Repeat steps 8–11 except name this `.swift`\
    \ file as `ThirdViewController`. The Navigator pane should now display the `ViewController.swift`,\
    \ `SecondViewController.swift`, and `ThirdViewController.swift` files as shown\
    \ in Figure [19-5](#329781_5_En_19_Chapter.xhtml#Fig5). (You can rearrange the\
    \ files in the Navigator pane if you wish.)\n\n   ![../images/329781_5_En_19_Chapter/329781_5_En_19_Fig5_HTML.jpg](images/329781_5_En_19_Chapter/329781_5_En_19_Fig5_HTML.jpg)\n\
    \n   Figure 19-5\n\n   Creating three separate View Controller `.swift` files\n\
    \n13. Click the Library icon to open the Object Library window and drag and drop\
    \ a View Controller from the Object Library window to the storyboard. The storyboard\
    \ should now contain a Page Controller and two View Controllers.\n14. Click the\
    \ View Controller in the Document Outline or click the View Controller icon above\
    \ the View Controller.\n15. Choose View ➤ Inspectors ➤ Show Identity Inspector,\
    \ or click the Identity Inspector icon in the upper right corner of the Xcode\
    \ window.\n16. Click in the Class popup menu and choose `SecondViewController`.\n\
    17. Click in the Storyboard ID text field, type `page02`, and press ENTER as shown\
    \ in Figure [19-6](#329781_5_En_19_Chapter.xhtml#Fig6).\n\n   ![../images/329781_5_En_19_Chapter/329781_5_En_19_Fig6_HTML.jpg](images/329781_5_En_19_Chapter/329781_5_En_19_Fig6_HTML.jpg)\n\
    \n   Figure 19-6\n\n   Connecting the second View Controller to a `.swift` class\
    \ file and giving it a Storyboard ID"
