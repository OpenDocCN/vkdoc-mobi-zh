    \ index to jump to a specific section right away."
  trans: "```markdown\n8.  点击`Style`弹出菜单，选择`Grouped`，如图 14-11 所示。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig11_HTML.jpg](img/329781_5_En_14_Fig11_HTML.jpg)\n\
    \n*图 14-11* 将表视图定义为分组表\n\n9.  选择`View` ➤ `Assistant Editor` ➤ `Show Assistant\
    \ Editor`，或点击 Xcode 窗口右上角的`Assistant Editor`图标。\n\n10. 将鼠标指针移到表视图上，按住`Control`键，在`ViewController.swift`文件的`class\
    \ ViewController`行下方进行`Ctrl`-拖拽。\n\n11. 松开`Control`键和鼠标左键。出现一个弹出窗口。\n\n12. 点击`Name`文本字段，输入`petTable`，然后点击`Connect`按钮。Xcode\
    \ 会创建一个`IBOutlet`，如下所示：\n\n```swift\n@IBOutlet var petTable: UITableView!\n```\n\
    \n1.  选择`View` ➤ `Standard Editor` ➤ `Show Standard Editor`，或点击 Xcode 窗口右上角的`Standard\
    \ Editor`图标。\n\n2.  在导航窗格中点击`ViewController.swift`文件。\n\n3.  添加`UITableViewDelegate`和`UITableViewDataSource`，修改`class\
    \ ViewController`行，如下所示：\n\n```swift\nclass ViewController: UIViewController,\
    \ UITableViewDelegate, UITableViewDataSource {\n```\n\n这段代码的目的是将`ViewController.swift`文件标识为表视图的委托和数据源。\n\
    \n4.  在`class ViewController`行下方，添加以下数组：\n\n```swift\nlet petArray = [[\"Mammal\"\
    , \"cat\", \"dog\", \"hamster\", \"gerbil\", \"rabbit\"], [\"Bird\", \"parakeet\"\
    , \"parrot\", \"canary\", \"finch\"], [\"Fish\", \"tropical fish\", \"goldfish\"\
    , \"sea horses\"], [\"Reptile\", \"turtle\", \"snake\", \"lizard\"]]\n```\n\n\
    5.  在此数组下方，添加以下行：\n\n```swift\nlet cellID = \"cellID\"\n```\n\n这段代码的目的是为单元格创建一个任意常量名。表视图由多行单元格组成，因此我们需要标识单元格，以便稍后存储数据。\n\
    \n6.  修改`viewDidLoad`方法，如下所示：\n\n```swift\noverride func viewDidLoad() {\n   \
    \ super.viewDidLoad()\n    petTable.dataSource = self\n    petTable.delegate =\
    \ self\n    // Do any additional setup after loading the view, typically from\
    \ a nib.\n}\n```\n\n这段代码的目的是定义表（`IBOutlet petTable`）从其所在的`ViewController.swift`文件（`self`）获取数据。此外，委托也被定义为`ViewController.swift`文件（`self`）。这意味着`ViewController.swift`文件需要包含定义表需要多少行以及在哪里找到其数据（即`petArray`）的函数。\n\
    \n7.  在`viewDidLoad`方法下方，添加以下函数来计算每个分区中的行数：\n\n```swift\nfunc tableView(_ tableView:\
    \ UITableView, numberOfRowsInSection section: Int) -> Int {\n    return petArray[section].count\
    \ - 1\n}\n```\n\n8.  在上一个函数下方，添加以下函数来用数据填充表视图：\n\n```swift\nfunc tableView(_ tableView:\
    \ UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell {\n    var\
    \ cell = tableView.dequeueReusableCell(withIdentifier: cellID)\n    if (cell ==\
    \ nil) {\n        cell = UITableViewCell(\n            style: UITableViewCell.CellStyle.default,\n\
    \            reuseIdentifier: cellID)\n    }\n    cell?.textLabel?.text = petArray[indexPath.section][indexPath.row\
    \ + 1]\n    return cell!\n}\n```\n\n9.  在上一个函数下方，添加以下函数来标识用户选择了哪个项目：\n\n```swift\n\
    func tableView(_ tableView: UITableView, didSelectRowAt indexPath: IndexPath)\
    \ {\n    let selectedItem = petArray[indexPath.section][indexPath.row + 1]\n \
    \   let alert = UIAlertController(title: \"Your Choice\", message: \"\\(selectedItem)\"\
    , preferredStyle: .alert)\n    let okAction = UIAlertAction(title: \"OK\", style:\
    \ .default, handler: { action -> Void in\n        //Just dismiss the action sheet\n\
    \    })\n    alert.addAction(okAction)\n    self.present(alert, animated: true,\
    \ completion: nil)\n}\n```\n\n10. 在上一个函数下方，添加以下函数来计算要在表视图中显示的分区数：\n\n```swift\n\
    func numberOfSections(in tableView: UITableView) -> Int {\n    return petArray.count\n\
    }\n```\n\n11. 在上一个函数下方，添加以下函数来将每个数组中的第一个项目显示为该分组的标题：\n\n```swift\nfunc tableView(_\
    \ tableView: UITableView, titleForHeaderInSection section: Int) -> String? {\n\
    \    return petArray[section][0]\n}\n```\n\n完整的`ViewController.swift`文件应如下所示：\n\
    \n```swift\nimport UIKit\nclass ViewController: UIViewController, UITableViewDelegate,\
    \ UITableViewDataSource {\n    @IBOutlet var petTable: UITableView!\n    let petArray\
    \ = [[\"Mammal\", \"cat\", \"dog\", \"hamster\", \"gerbil\", \"rabbit\"], [\"\
    Bird\", \"parakeet\", \"parrot\", \"canary\", \"finch\"], [\"Fish\", \"tropical\
    \ fish\", \"goldfish\", \"sea horses\"], [\"Reptile\", \"turtle\", \"snake\",\
    \ \"lizard\"]]\n    let cellID = \"cellID\"\n    override func viewDidLoad() {\n\
    \        super.viewDidLoad()\n        petTable.dataSource = self\n        petTable.delegate\
    \ = self\n        // Do any additional setup after loading the view, typically\
    \ from a nib.\n    }\n    func tableView(_ tableView: UITableView, numberOfRowsInSection\
    \ section: Int) -> Int {\n        return petArray[section].count - 1\n    }\n\
    \    func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath)\
    \ -> UITableViewCell {\n        var cell = tableView.dequeueReusableCell(withIdentifier:\
    \ cellID)\n        if (cell == nil) {\n            cell = UITableViewCell(\n \
    \               style: UITableViewCell.CellStyle.default,\n                reuseIdentifier:\
    \ cellID)\n        }\n        cell?.textLabel?.text = petArray[indexPath.section][indexPath.row\
    \ + 1]\n        return cell!\n    }\n    func tableView(_ tableView: UITableView,\
    \ didSelectRowAt indexPath: IndexPath) {\n        let selectedItem = petArray[indexPath.section][indexPath.row\
    \ + 1]\n        let alert = UIAlertController(title: \"Your Choice\", message:\
    \ \"\\(selectedItem)\", preferredStyle: .alert)\n        let okAction = UIAlertAction(title:\
    \ \"OK\", style: .default, handler: { action -> Void in\n            //Just dismiss\
    \ the action sheet\n        })\n        alert.addAction(okAction)\n        self.present(alert,\
    \ animated: true, completion: nil)\n    }\n    // Code for creating a grouped\
    \ table\n    // First, change the Style property of the table view to Grouped\
    \ in the Attributes Inspector pane\n    func numberOfSections(in tableView: UITableView)\
    \ -> Int {\n        return petArray.count\n    }\n    func tableView(_ tableView:\
    \ UITableView, titleForHeaderInSection section: Int) -> String? {\n        return\
    \ petArray[section][0]\n    }\n}\n```\n\n12. 点击`Run`按钮或选择`Product` ➤ `Run`。模拟器窗口出现，在表视图中显示分组数据，如图\
    \ 14-12 所示。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig12_HTML.jpg](img/329781_5_En_14_Fig12_HTML.jpg)\n\
    \n*图 14-12* 分组表视图\n\n13. 点击表视图中的某个项目。将出现一个警告控制器来标识您的选择。\n\n14. 点击`OK`关闭警告控制器。\n\
    \n15. 选择`Simulator` ➤ `Quit Simulator`以返回 Xcode。\n\n## 显示索引\n\n当表视图显示大量数据时，用户从一个末端滚动表视图列表到另一个末端可能会很繁琐。为了解决这个问题，表视图可以显示一个索引，该索引出现在屏幕的最右侧。现在用户可以点击索引中的某个项目以立即跳转到特定的分区。\n\
    ```"
- fmt: "### Note\n\nTable views can only display an index if the table view style\
    \ is plain, not grouped.\n\nAn index typically consists of letters from A to Z\
    \ but can represent any characters, including emoji. The position of each index\
    \ item corresponds to each section. So the first item displayed in the index takes\
    \ users to the first section, the second item displayed in the index takes users\
    \ to the second section, and so on.\n\nTo see how to create an index, follow these\
    \ steps:\n\n1. Create a new iOS project using the Single View App template (see\
    \ Chapter [1](#329781_5_En_1_Chapter.xhtml)) and name this new project `TableViewIndexApp`.\
    \ This creates a single view for the user interface.\n\n2. Click the `Main.storyboard`\
    \ file in the Navigator pane. Xcode displays the single view.\n\n3. Click the\
    \ Library icon to open the Object Library window.\n\n4. Drag and drop a table\
    \ view (see Figure [14-2](#329781_5_En_14_Chapter.xhtml#Fig2)) anywhere on the\
    \ view.\n\n5. Resize the table view so it fills the entire screen.\n\n6. Choose\
    \ **Editor** ➤ **Resolve Auto Layout Issues** ➤ **Reset to Suggested Constraints**.\
    \ Xcode adds constraints to the table view (see Figure [14-3](#329781_5_En_14_Chapter.xhtml#Fig3)).\n\
    \n7. Choose **View** ➤ **Inspectors** ➤ **Show Attributes Inspector**, or click\
    \ the **Attributes Inspector** icon in the upper right corner of the Xcode window.\n\
    \n8. Choose **View** ➤ **Assistant Editor** ➤ **Show Assistant Editor**, or click\
    \ the **Assistant Editor** icon in the upper right corner of the Xcode window.\n\
    \n9. Move the mouse pointer over the table view, hold down the **Control** key,\
    \ and Ctrl-drag under the `class ViewController` line in the `ViewController.swift`\
    \ file.\n\n10. Release the **Control** key and the left mouse button. A popup\
    \ window appears.\n\n11. Click in the **Name** text field, type `petTable`, and\
    \ click the **Connect** button. Xcode creates an `IBOutlet` as follows:\n\n```\n\
    @IBOutlet var petTable: UITableView!\n```\n\n12. Choose **View** ➤ **Standard\
    \ Editor** ➤ **Show Standard Editor**, or click the **Standard Editor** icon in\
    \ the upper right corner of the Xcode window.\n\n13. Click the `ViewController.swift`\
    \ file in the Navigator pane.\n\n14. Modify the `class ViewController` line by\
    \ adding `UITableViewDelegate, UITableViewDataSource` as follows:\n\n```\nclass\
    \ ViewController: UIViewController, UITableViewDelegate, UITableViewDataSource\
    \ {\n```\n\nThe purpose of this code is to identify the `ViewController.swift`\
    \ file as both the delegate and data source for the table view.\n\n15. Underneath\
    \ the `class ViewController` line, add the following array:\n\n```\nlet petArray\
    \ = [[\"Bird\", \"parakeet\", \"parrot\", \"canary\", \"finch\", \"cockatiel\"\
    ], [\"Fish\", \"tropical fish\", \"goldfish\", \"sea horses\", \"eel\"], [\"Mammal\"\
    , \"cat\", \"dog\", \"hamster\", \"gerbil\", \"rabbit\", \"mouse\"], [\"Reptile\"\
    , \"turtle\", \"snake\", \"lizard\"]]\n```\n\nThis `petArray` contains multiple\
    \ string arrays where each string array represents a different section. The first\
    \ item in each string array represents the section header.\n\n16. Underneath the\
    \ `petArray`, add this second array:\n\n```\nlet indexArray = [\"B\", \"F\", \"\
    M\", \"R\"]\n```\n\nEach item in this `indexArray` represents each section. Since\
    \ `petArray` contains four sections, `indexArray` contains four items. While you\
    \ could use ordinary letters, you can also add emoji. To insert emoji into your\
    \ code, choose **Edit** ➤ **Emoji & Symbols** to open the Character View.\n\n\
    Then click **Emoji** ➤ **Animals & Nature** as shown in Figure [14-13](#329781_5_En_14_Chapter.xhtml#Fig13).\
    \ Now move the cursor where you want to insert an emoji and double-click the emoji\
    \ to place it in your code. Click a bird, fish, mammal, and reptile emoji.\n\n\
    ![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig13_HTML.jpg](images/329781_5_En_14_Chapter/329781_5_En_14_Fig13_HTML.jpg)\n\
    \nFigure 14-13 — The Character View window for inserting emoji into code\n\n17.\
    \ Add the following line underneath the `indexArray`:\n\n```\nlet cellID = \"\
    cellID\"\n```\n\n18. Modify the `viewDidLoad` method as follows:\n\n```\noverride\
    \ func viewDidLoad() {\n    super.viewDidLoad()\n    petTable.dataSource = self\n\
    \    petTable.delegate = self\n    petTable.sectionIndexColor = UIColor.white\n\
    \    petTable.sectionIndexBackgroundColor = UIColor.black\n    petTable.sectionIndexTrackingBackgroundColor\
    \ = UIColor.darkGray\n    // Do any additional setup after loading the view, typically\
    \ from a nib.\n}\n```\n\nThe `sectionIndexColor`, `sectionIndexBackgroundColor`,\
    \ and `sectionIndexTrackingBackgroundColor` make the index easier to see by displaying\
    \ white text against a black background.\n\n19. Underneath the `viewDidLoad` method,\
    \ add the following function to define how many rows appear in each section, subtracting\
    \ one to account for the header at the beginning of each section:\n\n```\nfunc\
    \ tableView(_ tableView: UITableView, numberOfRowsInSection section: Int) -> Int\
    \ {\n    return petArray[section].count - 1\n}\n```\n\n20. Underneath the previous\
    \ function, add the following function to fill the table view with data from the\
    \ `petArray`:\n\n```\nfunc tableView(_ tableView: UITableView, cellForRowAt indexPath:\
    \ IndexPath) -> UITableViewCell {\n    var cell = tableView.dequeueReusableCell(withIdentifier:\
    \ cellID)\n    if (cell == nil) {\n        cell = UITableViewCell(\n         \
    \   style: UITableViewCell.CellStyle.default,\n            reuseIdentifier: cellID)\n\
    \    }\n    cell?.textLabel?.text = petArray[indexPath.section][indexPath.row\
    \ + 1]\n    return cell!\n}\n```\n\n21. Underneath the previous function, add\
    \ the following function to display the item the user selected from the table\
    \ view:\n\n```\nfunc tableView(_ tableView: UITableView, didSelectRowAt indexPath:\
    \ IndexPath) {\n    let selectedItem = petArray[indexPath.section][indexPath.row\
    \ + 1]\n    let alert = UIAlertController(title: \"Your Choice\", message: \"\\\
    (selectedItem)\", preferredStyle: .alert)\n    let okAction = UIAlertAction(title:\
    \ \"OK\", style: .default, handler: { action -> Void in\n        //Just dismiss\
    \ the action sheet\n    })\n    alert.addAction(okAction)\n    self.present(alert,\
    \ animated: true, completion: nil)\n}\n```\n\n22. Underneath the previous function,\
    \ add the following function to define the number of sections in the table view:\n\
    \n```\nfunc numberOfSections(in tableView: UITableView) -> Int {\n    return petArray.count\n\
    }\n```\n\n23. Underneath the previous function, add the following function to\
    \ define the header for each section, which is the first item in each string array:\n\
    \n```\nfunc tableView(_ tableView: UITableView, titleForHeaderInSection section:\
    \ Int) -> String? {\n    return petArray[section][0]\n}\n```\n\n24. Underneath\
    \ the previous function, add the following function to define the index that appears\
    \ on the right side of the table view:\n\n```\nfunc sectionIndexTitles (for tableView:\
    \ UITableView) -> [String]? {\n    return indexArray\n}\n```\n\nThe entire `ViewController.swift`\
    \ file should look like this:\n\n```\nimport UIKit\n\nclass ViewController: UIViewController,\
    \ UITableViewDelegate, UITableViewDataSource {\n    @IBOutlet var petTable: UITableView!\n\
    \n    let petArray = [[\"Bird\", \"parakeet\", \"parrot\", \"canary\", \"finch\"\
    , \"cockatiel\"],\n                    [\"Fish\", \"tropical fish\", \"goldfish\"\
    , \"sea horses\", \"eel\"],\n                    [\"Mammal\", \"cat\", \"dog\"\
    , \"hamster\", \"gerbil\", \"rabbit\", \"mouse\"],\n                    [\"Reptile\"\
    , \"turtle\", \"snake\", \"lizard\"]]\n\n    let indexArray = [\"B\", \"F\", \"\
    M\", \"R\"]\n    let cellID = \"cellID\"\n\n    override func viewDidLoad() {\n\
    \        super.viewDidLoad()\n        petTable.dataSource = self\n        petTable.delegate\
    \ = self\n        petTable.sectionIndexColor = UIColor.white\n        petTable.sectionIndexBackgroundColor\
    \ = UIColor.black\n        petTable.sectionIndexTrackingBackgroundColor = UIColor.darkGray\n\
    \        // Do any additional setup after loading the view, typically from a nib.\n\
    \    }\n\n    func tableView(_ tableView: UITableView, numberOfRowsInSection section:\
    \ Int) -> Int {\n        return petArray[section].count - 1\n    }\n\n    func\
    \ tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell\
    \ {\n        var cell = tableView.dequeueReusableCell(withIdentifier: cellID)\n\
    \        if (cell == nil) {\n            cell = UITableViewCell(\n           \
    \     style: UITableViewCell.CellStyle.default,\n                reuseIdentifier:\
    \ cellID)\n        }\n        cell?.textLabel?.text = petArray[indexPath.section][indexPath.row\
    \ + 1]\n        return cell!\n    }\n\n    func tableView(_ tableView: UITableView,\
    \ didSelectRowAt indexPath: IndexPath) {\n        let selectedItem = petArray[indexPath.section][indexPath.row\
    \ + 1]\n        let alert = UIAlertController(title: \"Your Choice\", message:\
    \ \"\\(selectedItem)\", preferredStyle: .alert)\n        let okAction = UIAlertAction(title:\
    \ \"OK\", style: .default, handler: { action -> Void in\n            //Just dismiss\
    \ the action sheet\n        })\n        alert.addAction(okAction)\n        self.present(alert,\
    \ animated: true, completion: nil)\n    }\n\n    func numberOfSections(in tableView:\
    \ UITableView) -> Int {\n        return petArray.count\n    }\n\n    func tableView(_\
    \ tableView: UITableView, titleForHeaderInSection section: Int) -> String? {\n\
    \        return petArray[section][0]\n    }\n\n    func sectionIndexTitles (for\
