  trans: "\n### 注意\n\n与其他允许你定义高度和宽度的对象不同，栈视图会自动根据其内部存储的对象调整自身的高度和宽度。\n\n要了解如何使用栈视图，请遵循以下步骤：\n\
    \n1. 使用单视图应用模板创建一个新的 iOS 项目（参见第 1 章），并将此新项目命名为 `StackViewApp`。这将为用户界面创建一个单视图。\n\
    2. 在导航窗格中点击 `Main.storyboard` 文件。Xcode 会显示该单视图。\n3. 点击库图标以打开对象库窗口。\n4. 在视图上拖放一个水平或垂直的栈视图，如图\
    \ 13-16 所示。尽管栈视图显示为一个大型矩形，但其尺寸会根据你放入栈视图内的对象数量和类型进行调整。\n\n![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig16_HTML.jpg](img/329781_5_En_13_Fig16_HTML.jpg)\n\
    \n*图 13-16* 对象库窗口中的水平和垂直栈视图\n\n5. 点击库图标以打开对象库窗口，并将以下项目拖放到栈视图中：\n   - 标签\n   -\
    \ 按钮\n   - 文本字段\n\n由于当你向栈视图添加任何对象时，它会自动调整大小，因此你可以轻松地将一个对象直接拖放到用户界面上显示的栈视图中。之后，你需要通过将其他对象拖放到文档大纲中栈视图的下方来添加它们，如图\
    \ 13-17 所示。\n\n![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig17_HTML.jpg](img/329781_5_En_13_Fig17_HTML.jpg)\n\
    \n*图 13-17* 将对象拖放到文档大纲中\n\n6. 在文档大纲中点击栈视图以将其选中。\n7. 将鼠标指针移动到栈视图上，直到鼠标指针变为手型图标。然后拖动鼠标以移动栈视图。请注意，移动栈视图也会将所有对象作为一个整体一起移动。\n\
    8. 选择“视图”➤“检查器”➤“显示属性检查器”，或点击 Xcode 窗口右上角的属性检查器图标。将出现栈视图的属性检查器窗格（参见图 13-13）。\n\
    9. 点击“轴”弹出菜单并在水平和垂直之间来回切换。无论你最初使用的是水平还是垂直栈视图，之后你都可以通过更改其“轴”属性来修改其方向。\n10. 确保“轴”属性设置为垂直。然后点击“间距”文本字段并输入\
    \ `40`。\n11. 点击“对齐”弹出菜单并选择“填充”。这将使所有对象在宽度（垂直栈视图）或高度（水平栈视图）上扩展。\n12. 点击“分布”弹出菜单并选择“等间距”。请注意，Xcode\
    \ 会在栈视图内的所有对象之间创建间距，如图 13-18 所示。\n\n![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig18_HTML.jpg](img/329781_5_En_13_Fig18_HTML.jpg)\n\
    \n*图 13-18* “间距”属性在栈视图中的对象之间创建空白空间\n\n13. 点击“对齐”弹出菜单并选择“居中对齐”。请注意，栈视图现在将根据最大的对象定义其宽度，如图\
    \ 13-19 所示。\n\n![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig19_HTML.jpg](img/329781_5_En_13_Fig19_HTML.jpg)\n\
    \n*图 13-19* 居中对齐根据最宽的对象定义栈宽度\n\n14. 点击“对齐”弹出菜单并选择“前导对齐”。请注意，栈视图将所有对象在左侧对齐。\n15.\
    \ 点击“对齐”弹出菜单并选择“尾随对齐”。请注意，栈视图将所有对象在右侧对齐。\n16. 点击“轴”弹出菜单并选择“水平”。\n17. 点击“对齐”弹出菜单并选择“顶部对齐”。请注意，栈视图将所有对象按其顶部对齐。\n\
    18. 点击“对齐”弹出菜单并选择“底部对齐”。请注意，栈视图将所有对象按其底部对齐。\n19. 点击“分布”弹出菜单并选择“均匀填充”。请注意，栈视图内的所有对象现在显示为相同宽度。尝试使用不同的选项，看看它们如何影响栈视图内对象的外观。\n\
    \n一旦你定义了栈视图内对象的外观，就可以对栈视图应用约束。栈视图允许你将对象组织成行或列，而无需对每个对象单独应用约束。\n\n## 小结\n\n设计用户界面涉及将对象放置到视图上。然而，这些对象的确切位置可能会根据应用程序运行的屏幕尺寸而改变。如果你为较大的屏幕设计用户界面，那么在较小的屏幕上查看时可能会显得过于拥挤。如果你为小屏幕设计用户界面，那么在较大的屏幕上可能会显得空旷且失衡。\n\
    \n为了确保用户界面在所有尺寸的屏幕上看起来都很好，你需要添加约束。约束可以定义对象的大小（宽度和高度）、位置或与附近对象的距离。你可以定义具体的数值和关系，例如等于、小于或等于、大于或等于。添加约束时，Xcode\
    \ 会使用颜色来让你知道约束是否足够（蓝色）、约束不足（橙色）或存在冲突的约束（红色）。\n\n任何时候，你都可以添加、删除或修改约束。由于对多个对象应用约束可能很麻烦，你可以通过将对象存储在栈视图中，将它们分组为垂直列或水平行。然后你可以对栈视图应用约束。\n\
    \n约束和栈视图提供了两种设计用户界面的方法，并确保无论应用程序运行在什么屏幕尺寸上，它们看起来都很好。\n\n# 14. 使用表视图\n\n表视图是最常见的用户界面对象之一，用于以行列表的形式显示大量信息。邮件和照片应用程序使用表视图让用户滚动浏览信息。表视图看起来就像一个无穷无尽的列表，因为当用户向上或向下滚动时，新的数据会不断地填充进来。表视图由单元格组成，这些单元格包含一个或多个对象，例如标签或图像视图，如图\
    \ 14-1 所示。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig1_HTML.jpg](img/329781_5_En_14_Fig1_HTML.jpg)\n\
    \n*图 14-1* 一个表视图由单元格组成，这些单元格在标签和图像视图等对象中显示数据\n\n要创建表视图，你可以从对象库窗口拖动一个表视图并将其放置到视图上。另一种替代方法是从对象库窗口拖动一个表视图控制器并将其放置为故事板的一部分。表视图控制器只不过是一个带有表视图的视图控制器。\n\
    \n要使用表视图，你需要执行以下操作：\n\n- 定义一个包含表视图要显示信息的单元格。\n- 定义一个数据源，用于将信息放入表视图的每个单元格中。\n-\
    \ 定义一个委托（`.swift` 文件），其中包含用于定义节数和行数，以及构成表视图的单元格的方法。\n"
- fmt: "# Creating a Simple Table View\n\nIf you have an existing view, you can drag\
    \ and drop a `Table View` onto that view. Once you have a table view, you must\
    \ fill the table view with data (from a data source) and define how many sections\
    \ and rows the table will hold. Data can come from anywhere but should consist\
    \ of the same number of items. For example, if you want a table view to display\
    \ names and pictures, then each chunk of data should contain text (for a name)\
    \ and an image (for a picture).\n\nTo see how to create and fill a table view,\
    \ follow these steps:\n\n1. Create a new iOS project using the Single View App\
    \ template (see Chapter [1](#329781_5_En_1_Chapter.xhtml)) and name this new project\
    \ `TableViewApp`. This creates a single view for the user interface.\n\n2. Click\
    \ the `Main.storyboard` file in the Navigator pane. Xcode displays the single\
    \ view.\n\n3. Click the Library icon to open the Object Library window.\n\n4.\
    \ Drag and drop a table view, as shown in Figure [14-2](#329781_5_En_14_Chapter.xhtml#Fig2),\
    \ anywhere on the view.\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig2_HTML.jpg](images/329781_5_En_14_Chapter/329781_5_En_14_Fig2_HTML.jpg)\n\
    \nFigure 14-2 A table view in the Object Library window\n\n5. Resize the table\
    \ view so it fills the entire screen.\n\n6. Choose Editor ➤ Resolve Auto Layout\
    \ Issues ➤ Reset to Suggested Constraints. Xcode adds constraints to the table\
    \ view as shown in Figure [14-3](#329781_5_En_14_Chapter.xhtml#Fig3).\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig3_HTML.jpg](images/329781_5_En_14_Chapter/329781_5_En_14_Fig3_HTML.jpg)\n\
    \nFigure 14-3 The table view with constraints\n\n7. Choose View ➤ Assistant Editor\
    \ ➤ Show Assistant Editor, or click the Assistant Editor icon in the upper right\
    \ corner of the Xcode window.\n\n8. Move the mouse pointer over the table view,\
    \ hold down the Control key, and Ctrl-drag under the “class ViewController” line\
    \ in the `ViewController.swift` file.\n\n9. Release the Control key and the left\
    \ mouse button. A popup window appears.\n\n10. Click in the Name text field, type\
    \ `petTable`, and click the Connect button. Xcode creates an `IBOutlet` as follows:\n\
    \n```\n@IBOutlet var petTable: UITableView!\n```\n\n11. Choose View ➤ Standard\
    \ Editor ➤ Show Standard Editor, or click the Standard Editor icon in the upper\
    \ right corner of the Xcode window.\n\n12. Click the `ViewController.swift` file\
    \ in the Navigator pane.\n\n13. Modify the class `ViewController` line by adding\
    \ `UITableViewDelegate`, `UITableViewDataSource` as follows:\n\n```\nclass ViewController:\
    \ UIViewController, UITableViewDelegate, UITableViewDataSource {\n```\n\nThe purpose\
    \ of this code is to identify the `ViewController.swift` file as both the delegate\
    \ and data source for the table view.\n\n14. Underneath the class `ViewController`\
    \ line, add the following array:\n\n```\nlet petArray = [\"cat\", \"dog\", \"\
    parakeet\", \"parrot\", \"canary\", \"finch\", \"tropical fish\", \"goldfish\"\
    , \"sea horses\", \"hamster\", \"gerbil\", \"rabbit\", \"turtle\", \"snake\",\
    \ \"lizard\", \"hermit crab\"]\n```\n\n15. Underneath this array, add the following\
    \ line:\n\n```\nlet cellID = \"cellID\"\n```\n\nThe purpose of this code is to\
    \ create an arbitrary constant name for a cell. A table view consists of rows\
    \ of cells, so we need to identify the cells for storing data in later.\n\n16.\
    \ Modify the `viewDidLoad` method as follows:\n\n```\noverride func viewDidLoad()\
    \ {\n    super.viewDidLoad()\n    petTable.dataSource = self\n    petTable.delegate\
    \ = self\n    // Do any additional setup after loading the view, typically from\
    \ a nib.\n}\n```\n\nThe purpose of this code is to define that the table (`IBOutlet\
    \ petTable`) gets its data from the `ViewController.swift` file that it’s stored\
    \ in (`self`). In addition, the delegate is defined as the `ViewController.swift`\
    \ file (`self`). This means the `ViewController.swift` file needs to contain functions\
    \ that define how many rows the table needs and where to find its data, which\
    \ is the `petArray`.\n\n17. Add the following function underneath the `viewDidLoad`\
    \ method:\n\n```\nfunc tableView(_ tableView: UITableView, numberOfRowsInSection\
    \ section: Int) -> Int {\n    return petArray.count\n}\n```\n\nThis code defines\
    \ how many rows are needed in the table. The number of rows is defined by the\
    \ total number of items stored in the `petArray`.\n\n18. Add the following function\
    \ underneath the `viewDidLoad` method:\n\n```\nfunc tableView(_ tableView: UITableView,\
    \ cellForRowAt indexPath: IndexPath) -> UITableViewCell {\n    var cell = tableView.dequeueReusableCell(withIdentifier:\
    \ cellID)\n    if (cell == nil) {\n        cell = UITableViewCell(\n         \
    \   style: UITableViewCell.CellStyle.default,\n            reuseIdentifier: cellID)\n\
    \    }\n    cell?.textLabel?.text = petArray[indexPath.row]\n    return cell!\n\
    }\n```\n\nThis function runs whenever the table view needs to put data in its\
    \ rows. This can occur the first time the table view appears as well as when the\
    \ user scrolls up or down to display data previously hidden because there weren’t\
    \ enough rows to display all of the data at once. Since each row in the table\
    \ view is defined by a cell, it needs to create a cell with a name:\n\n```\nvar\
    \ cell = tableView.dequeueReusableCell(withIdentifier: cellID)\n```\n\nIf a cell\
    \ is empty, then the `if` statement defines the cell’s style and gives it the\
    \ arbitrary `cellID` name to identify it:\n\n```\nif (cell == nil) {\n    cell\
    \ = UITableViewCell(\n        style: UITableViewCell.CellStyle.default,\n    \
    \    reuseIdentifier: cellID)\n}\n```\n\nNext, it takes data from the `petArray`,\
    \ and based on the cell’s position in the table view (its row number), it stores\
    \ that data in the text property of the cell’s `textLabel`. Then it returns the\
    \ cell so it appears in the table view:\n\n```\ncell?.textLabel?.text = petArray[indexPath.row]\n\
    return cell!\n```\n\nThe complete `ViewController.swift` file should look like\
    \ this:\n\n```\nimport UIKit\nclass ViewController: UIViewController, UITableViewDelegate,\
    \ UITableViewDataSource {\n    @IBOutlet var petTable: UITableView!\n    let petArray\
    \ = [\"cat\", \"dog\", \"parakeet\", \"parrot\", \"canary\", \"finch\", \"tropical\
    \ fish\", \"goldfish\", \"sea horses\", \"hamster\", \"gerbil\", \"rabbit\", \"\
    turtle\", \"snake\", \"lizard\", \"hermit crab\"]\n    let cellID = \"cellID\"\
    \n    override func viewDidLoad() {\n        super.viewDidLoad()\n        petTable.dataSource\
    \ = self\n        petTable.delegate = self\n        // Do any additional setup\
    \ after loading the view, typically from a nib.\n    }\n    func tableView(_ tableView:\
    \ UITableView, numberOfRowsInSection section: Int) -> Int {\n        return petArray.count\n\
    \    }\n    func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath)\
    \ -> UITableViewCell {\n        var cell = tableView.dequeueReusableCell(withIdentifier:\
    \ cellID)\n        if (cell == nil) {\n            cell = UITableViewCell(\n \
    \               style: UITableViewCell.CellStyle.default,\n                reuseIdentifier:\
    \ cellID)\n        }\n        cell?.textLabel?.text = petArray[indexPath.row]\n\
    \        return cell!\n    }\n}\n```\n\n19. Click the Run button or choose Product\
    \ ➤ Run. The Simulator window appears, displaying the data in your table view\
    \ as shown in Figure [14-4](#329781_5_En_14_Chapter.xhtml#Fig4).\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig4_HTML.jpg](images/329781_5_En_14_Chapter/329781_5_En_14_Fig4_HTML.jpg)\n\
    \nFigure 14-4 The table view filled with data from the array\n\n20. Scroll up\
    \ and down the table view to see how data scrolls off the top and bottom of the\
    \ screen.\n\n21. Choose Simulator ➤ Quit Simulator to return to Xcode.\n\nThe\
    \ basic steps to creating a table view are:\n\n- Drag and drop a table view from\
    \ the Object Library window onto a view.\n- Define a `.swift` file to be the delegate\
    \ and data source for the table view.\n- Create or retrieve data to store in the\
    \ table view.\n- Write a function that defines how many rows the table view needs\
    \ to display.\n- Write a function that stores data in different rows in the table\
    \ view."
