    \n![../images/329781_5_En_19_Chapter/329781_5_En_19_Fig11_HTML.jpg](images/329781_5_En_19_Chapter/329781_5_En_19_Fig11_HTML.jpg)\n\
    \nFigure 19-11\n\nThe page curl transition style makes the transition between\
    \ View Controllers look like a physical page turning\n\n19.  Continue swiping\
    \ left and right. Notice that when you reach the last View Controller, swiping\
    \ to the left reveals the first View Controller. When you reach the first View\
    \ Controller, swiping to the left reveals the last View Controller.\n\n20.  Choose\
    \ Simulator ➤ Quit Simulator to return to Xcode.\n\n## Summary\n\nThe Page Controller\
    \ offers another way to display multiple View Controllers in sequential order.\
    \ By using a page curl transition style, swiping can make each View Controller\
    \ look like a physical page turning at the corner. To use a Page Controller, you\
    \ must drag and drop a Page Controller from the Object Library window onto your\
    \ app’s storyboard.\n\nAfter adding a Page Controller to a storyboard, you need\
    \ to add View Controllers to your storyboard. Each View Controller needs a unique\
    \ Storyboard ID (any arbitrary text). In addition, each View Controller needs\
    \ to be connected to a `.swift` `UIViewController` class file.\n\nFinally, you\
    \ need to create a `.swift` `UIPageViewController` class file and connect this\
    \ to the Page Controller. Inside this `.swift` `UIPageViewController`, you need\
    \ to write Swift code to create an array of View Controllers, identifying all\
    \ View Controllers by their unique Storyboard ID.\n\nInside the `UIPageViewController`\
    \ class file, you need to write two methods to define which view to display before\
    \ and after the currently displayed View Controller.\n\nBy using a Page Controller,\
    \ you can create interesting visual effects that create the illusion of turning\
    \ physical pages in a printed book.\n\n# 20. Using the Split View Controller\n\
    \nOne of the most common user interface objects for displaying lists of information\
    \ is the table view. When viewed on the narrow screen of an iPhone in portrait\
    \ orientation, table views look fine. However, when viewed on the much larger\
    \ iPad screen, especially in landscape orientation, a table view can look unbalanced\
    \ with text appearing far to one side with empty space filling the majority of\
    \ the screen as shown in Figure [20-1](#329781_5_En_20_Chapter.xhtml#Fig1).\n\n\
    ![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig1_HTML.jpg](images/329781_5_En_20_Chapter/329781_5_En_20_Fig1_HTML.jpg)\n\
    \nFigure 20-1\n\nA table view displayed on the larger screen of an iPad\n\nTo\
    \ avoid this unbalanced, empty look, you can use a Split View Controller for the\
    \ iPad and for the larger screens on certain iPhone models. Instead of displaying\
    \ a single table view at a time, a Split View Controller displays two views side\
    \ by side. The left view (known as the primary or master view) displays additional\
    \ information in a right view (known as the secondary or detail view) as shown\
    \ in Figure [20-2](#329781_5_En_20_Chapter.xhtml#Fig2).\n\n![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig2_HTML.jpg](images/329781_5_En_20_Chapter/329781_5_En_20_Fig2_HTML.jpg)\n\
    \nFigure 20-2\n\nA Split View Controller displays two views side by side to fill\
    \ a larger screen\n\nThe master view essentially displays the previous table view,\
    \ while the detail view displays the next table view. By displaying them side\
    \ by side, you can easily see the relationship between each list such as seeing\
    \ the About, Accessibility, Keyboard, Language & Region, Dictionary, and Reset\
    \ options all appear under the General category (see Figure [20-2](#329781_5_En_20_Chapter.xhtml#Fig2)).\n\
    \nWhen run on larger iPad and iPhone screens, a Split View Controller divides\
    \ the screen in two parts to display the master view and the detail view. When\
    \ run on smaller iPhone screens, a Split View Controller acts like an ordinary\
    \ table view by displaying a single list of items."
