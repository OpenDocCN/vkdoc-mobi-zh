  trans: "\n这段代码运行一个以 1 秒为增量计时的计时器。运行时，它会调用 `startAnimating` 方法，使活动指示器视图看起来在旋转。活动指示器视图一旦开始旋转，就会显示在屏幕上。\n\
    \n5 秒后，计时器停止运行，并调用 `stopAnimating` 方法，使活动指示器视图停止旋转。它一旦停止旋转，就会从屏幕上消失。完整的 `ViewController.swift`\
    \ 文件应如下所示：\n\n```swift\nimport UIKit\nclass ViewController: UIViewController {\n\
    \    var counter = 0\n    @IBOutlet var activityView: UIActivityIndicatorView!\n\
    \    override func viewDidLoad() {\n        super.viewDidLoad()\n        activityView.hidesWhenStopped\
    \ = true\n        // Do any additional setup after loading the view, typically\
    \ from a nib.\n    }\n    @IBAction func runButton(_ sender: UIButton) {\n   \
    \     Timer.scheduledTimer(withTimeInterval: 1.0, repeats: true) { timer in\n\
    \            self.activityView.startAnimating()\n            self.counter += 1\n\
    \            if self.counter >= 5 {\n                self.activityView.stopAnimating()\n\
    \                timer.invalidate()\n                self.counter = 0\n      \
    \      }\n        }\n    }\n}\n```\n\n3.  点击“运行”按钮，或选择“产品” ➤ “运行”。模拟器屏幕会出现。\n\
    4.  点击该按钮。活动指示器视图会开始旋转，5 秒后，它会消失。\n5.  选择“模拟器” ➤ “退出模拟器”以返回 Xcode。\n\n## 使用进度视图\n\
    \n进度视图会逐渐填满，以显示任务的完成进度。这意味着你的应用程序需要知道任务何时完成。由于进度视图以视觉方式显示进度，最好确保进度视图以较快的速度填满，向用户反馈应用程序正在工作，并显示任务即将完成。如果进度视图填满得太慢，应用程序可能会显得卡顿。\n\
    \n要了解进度视图如何工作，请按照以下步骤操作：\n\n1.  确保 `ProgressApp` 已加载到 Xcode 中。\n2.  在导航窗格中点击 `Main.storyboard`\
    \ 文件。Xcode 会显示单个视图。\n3.  点击“库”图标以显示对象库。\n4.  将标签、步进器和进度视图拖放到用户界面中，使标签位于进度视图上方，步进器位于进度视图下方，如图\
    \ 8-5 所示。\n5.  点击标签，并展开标签的宽度，使其拉伸到进度视图两端之外。\n6.  按住 Shift 键，点击标签、进度视图和步进器，使这三个对象周围都出现控制手柄。\n\
    7.  选择“编辑器” ➤ “解决自动布局问题” ➤ “重置为建议的约束”（子菜单的下半部分）。这将为标签、进度视图和步进器设置约束。\n8.  将鼠标移到标签上，按住\
    \ Control 键，然后 Control-拖动到 `@IBOutlet` 行下方的 `ViewController.swift` 文件中。\n9.  松开\
    \ Control 键和鼠标左键。将出现一个弹出窗口。\n10. 点击“名称”文本字段并输入 `labelProgress`，然后点击“连接”按钮。Xcode\
    \ 会创建一个 `@IBOutlet`，如下所示：\n\n```swift\n@IBOutlet var labelProgress: UILabel!\n\
    ```\n\n11. 将鼠标移到进度视图上，按住 Control 键，然后 Control-拖动到 `class ViewController` 行下方的\
    \ `ViewController.swift` 文件中。\n12. 松开 Control 键和鼠标左键。将出现一个弹出窗口。\n13. 点击“名称”文本字段并输入\
    \ `progressView`，然后点击“连接”按钮。Xcode 会创建一个 `@IBOutlet`，如下所示：\n\n```swift\n@IBOutlet\
    \ var progressView: UIProgressView!\n```\n\n14. 将鼠标移到步进器上，按住 Control 键，然后 Control-拖动到\
    \ `@IBOutlet` 行下方的 `ViewController.swift` 文件中。\n15. 松开 Control 键和鼠标左键。将出现一个弹出窗口。\n\
    16. 点击“名称”文本字段并输入 `stepperObject`，然后点击“连接”按钮。Xcode 会创建一个 `@IBOutlet`，如下所示：\n\n\
    ```swift\n@IBOutlet var stepperObject: UIStepper!\n```\n\n17. 将鼠标移到步进器上，按住 Control\
    \ 键，然后 Control-拖动到 `ViewController.swift` 文件底部最后一个大括号上方的位置。\n18. 松开 Control 键和鼠标左键。将出现一个弹出窗口。\n\
    19. 点击“名称”文本字段，输入 `stepperChanged`，点击“类型”弹出菜单并选择 `UIStepper`，然后点击“连接”按钮。Xcode\
    \ 会创建一个 `@IBAction` 方法，如下所示：\n\n```swift\n@IBAction func stepperChanged(_ sender:\
    \ UIStepper) {\n}\n```\n\n20. 选择“视图” ➤ “标准编辑器” ➤ “显示标准编辑器”，或点击 Xcode 窗口右上角的“标准编辑器”图标。\n\
    21. 在导航窗格中点击 `ViewController.swift` 文件。\n22. 编辑 `stepperChanged` `IBAction` 方法，如下所示：\n\
    \n```swift\n@IBAction func stepperChanged(_ sender: UIStepper) {\n    labelProgress.text\
    \ = \"Completed \\(Int(stepperObject.value * 10)) of 10 tasks\"\n    progressView.progress\
    \ = Float(stepperObject.value)\n}\n```\n\n第一行从步进器获取值，将其乘以 10，并将值转换为整数。第二行获取步进器的值，将其转换为\
    \ `Float` 值，并将此值存储在进度视图中，进度视图通过填充自身来显示该值。\n\n23. 编辑 `viewDidLoad` 方法，添加以下三行代码：\n\
    \n```swift\nprogressView.progress = 0\nstepperObject.stepValue = 0.1\nstepperObject.maximumValue\
    \ = 1.0\n```\n\n第一行将进度视图的值设置为 0，使其在用户界面上看起来是完全空的。第二行定义步进器增量为 0.1。第三行定义步进器最大值为\
    \ 1.0。完整的 `ViewController.swift` 文件应如下所示：\n\n```swift\nimport UIKit\nclass ViewController:\
    \ UIViewController {\n    var counter = 0\n    @IBOutlet var labelProgress: UILabel!\n\
    \    @IBOutlet var progressView: UIProgressView!\n    @IBOutlet var stepperObject:\
    \ UIStepper!\n    @IBOutlet var activityView: UIActivityIndicatorView!\n    override\
    \ func viewDidLoad() {\n        super.viewDidLoad()\n        activityView.hidesWhenStopped\
    \ = true\n        progressView.progress = 0\n        stepperObject.stepValue =\
    \ 0.1\n        stepperObject.maximumValue = 1.0\n        // Do any additional\
    \ setup after loading the view, typically from a nib.\n    }\n    @IBAction func\
    \ runButton(_ sender: UIButton) {\n        Timer.scheduledTimer(withTimeInterval:\
    \ 1.0, repeats: true) { timer in\n            self.activityView.startAnimating()\n\
    \            self.counter += 1\n            if self.counter >= 5 {\n         \
    \       self.activityView.stopAnimating()\n                timer.invalidate()\n\
    \                self.counter = 0\n            }\n        }\n    }\n    @IBAction\
    \ func stepperChanged(_ sender: UIStepper) {\n        labelProgress.text = \"\
    Completed \\(Int(stepperObject.value * 10)) of 10 tasks\"\n        progressView.progress\
    \ = Float(stepperObject.value)\n    }\n}\n```\n\n24. 点击“运行”按钮，或选择“产品” ➤ “运行”。模拟器窗口会出现。\n\
    25. 多次点击步进器上的 `+` 图标。请注意，每次点击步进器上的 `+` 图标时，进度视图看起来会更满，并且标签会显示进度，如图 8-6 所示。\n26.\
    \ 选择“模拟器” ➤ “退出模拟器”以返回 Xcode。\n"
- fmt: '# Summary


    When your app needs the user to input numeric data, a text field can work, but
    it might be clumsy, especially if you only want to accept a limited range of numeric
    values. To make it easy to input numeric data, use a stepper or a slider.


    Both a stepper and slider can define a minimum and maximum value so that way the
    user can’t input numeric data below a minimum value or above a maximum value.
    A stepper has the added advantage of letting the user increment/decrement values
    by a fixed value.


    A stepper takes up less space, but a slider makes it easier to change values from
    one extreme to another by simply dragging the thumb (circle) on the slider. Steppers
    force users to increment/decrement values so steppers can be much slower to define
    values if the range of acceptable values is large.


    To display progress of a task, your app could display a message using a label,
    but it’s often easier to use a `Progress View` or `Activity Indicator View` instead.
    A `Progress View` can let users know how close a task is to completion, while
    an `Activity Indicator View` lets the user know that something is happening.


    You can use `Progress Views` or `Activity Indicator Views` separately or together.
    An `Activity Indicator View` typically appears to display animation and then disappears
    when the task is done.


    By using steppers and sliders, you can make it easy for users to input numeric
    data. By using `Progress Views` and `Activity Indicator Views`, you can make it
    easy for your app to let the user know when a task is working.


    # Image Views and Text Views


    Text fields can display text and let users edit or input new text. However if
    you need to display large amounts of text, a text field can be too limiting. To
    overcome the limited size of a text field, you can use a text view instead. A
    text view is essentially a larger version of a text field that can display large
    amounts of text or allow users to edit and input large amounts of text.


    Since not all data is text, you can use an image view to display graphic images.
    Image views can display graphics for purely decorative purposes or to provide
    additional information to the user, such as changing images based on what the
    user is doing. Both text views and image views let you display information of
    any size on an iOS user interface.


    ## Using Image Views


    At the simplest level, an image view can display a graphic image such as a `.jpg`
    or `.png` image. However, an image view can also allow interaction so it can respond
    to touch or gestures from the user. This lets an image view double as both a way
    to display graphic images and a way to recognize touch input from the user.


    To see how an image view works, follow these steps:


    1. Create a new iOS project using the Single View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml))
    and name this new project `ImageViewApp`. This creates a single view for the user
    interface.


    2. Click the `Main.storyboard` file in the Navigator pane. Xcode displays the
    single view.


    3. Click the Library icon to open the Object Library window.


    4. Drag and drop an image view anywhere on the view. At this point, the image
    view is empty so we need to put something in to display it. Find a `.jpg` or `.png`
    image stored on your Macintosh. You can also find and download plenty of free
    images from `www.pexels.com`, `free-images.com`, or `www.nasa.gov`.


    5. Drag and drop a `.jpg` or `.png` image from the Finder window to the Navigator
    pane as shown in Figure 9-1.


    ![../images/329781_5_En_9_Chapter/329781_5_En_9_Fig1_HTML.jpg](images/329781_5_En_9_Chapter/329781_5_En_9_Fig1_HTML.jpg)


    *Figure 9-1 — Dragging and dropping an image to an Xcode project*


    6. Release the left mouse button when a horizontal line appears in the Navigator
    pane. Xcode displays a dialog to complete the process of copying a graphic image
    into your Xcode project.


    7. Select the "Copy items if needed" check box as shown in Figure 9-2.


    ![../images/329781_5_En_9_Chapter/329781_5_En_9_Fig2_HTML.jpg](images/329781_5_En_9_Chapter/329781_5_En_9_Fig2_HTML.jpg)


    *Figure 9-2 — Storing a graphic image in an Xcode project*


    8. Click the Finish button. Xcode displays the name of your graphic file in the
    Navigator pane.


    9. Click the graphic image name in the Navigator pane. The middle Xcode pane displays
    the contents of your graphic image.


    10. Click the image view object to select it.


    11. Choose `View` ➤ `Inspectors` ➤ `Show Attributes Inspector`, or click the Attributes
    Inspector icon in the upper right corner of the Xcode window.


    12. Click in the Image popup menu and choose the name of your graphic image such
    as `spaceshuttle.jpg` as shown in Figure 9-3. Xcode displays your graphic image
    inside the image view.


    ![../images/329781_5_En_9_Chapter/329781_5_En_9_Fig3_HTML.jpg](images/329781_5_En_9_Chapter/329781_5_En_9_Fig3_HTML.jpg)


    *Figure 9-3 — Selecting a graphic image to display in an image view*


    The Content Mode popup menu offers several options for how to display an image
    in an image view:


    - **Scale to Fill** – Alters the size of an image to fill the image view no matter
    what the height or width of the image view may be. This could create skewered
    images if an image view is too high or wide.

    - **Aspect Fit** – Fits an image within the width and height of the image view
    while retaining the aspect ratio of the original image’s height and width. This
    means the image may not completely fill the height or width of the image view
    as shown in Figure 9-4.


    ![../images/329781_5_En_9_Chapter/329781_5_En_9_Fig4_HTML.jpg](images/329781_5_En_9_Chapter/329781_5_En_9_Fig4_HTML.jpg)


    *Figure 9-4 — Aspect Fit may leave empty space inside the image view*


    - **Aspect Fill** – Expands an image to fill the width or height of an image view.
    This means the image may extend over the width or height of the image view.

    - **Redraw** – Stretches the image to fill the width and height of the image view.

    - **Center** – Displays the image center within the image view. If the image is
    larger than the image view, then the rest of the image appears outside of the
    image view.

    - **Top** – Displays the image top within the image view. If the image is larger
    than the image view, then the rest of the image appears outside of the image view.

    - **Bottom** – Displays the image bottom within the image view. If the image is
    larger than the image view, then the rest of the image appears outside of the
    image view.

    - **Left** – Displays the image left center within the image view. If the image
    is larger than the image view, then the rest of the image appears outside of the
    image view.

    - **Right** – Displays the image right center within the image view. If the image
    is larger than the image view, then the rest of the image appears outside of the
    image view.

    - **Top Left** – Displays the top left of the image within the image view. If
    the image is larger than the image view, then the rest of the image appears outside
    of the image view.

    - **Top Right** – Displays the top right of the image within the image view. If
    the image is larger than the image view, then the rest of the image appears outside
    of the image view.

    - **Bottom Left** – Displays the bottom left of the image within the image view.
    If the image is larger than the image view, then the rest of the image appears
    outside of the image view.

    - **Bottom Right** – Displays the bottom right of the image within the image view.
    If the image is larger than the image view, then the rest of the image appears
    outside of the image view.'
