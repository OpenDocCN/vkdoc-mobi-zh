    \ = CGAffineTransform(rotationAngle: rotateMe!.rotation)\n    }\n}\n```\n\n6.\
    \ Click the Run button or choose Product ➤ Run. The Simulator window appears.\n\
    7. Hold down the left mouse button and drag the mouse to simulate a pan gesture.\
    \ Notice that as the pan gesture moves, the image view also moves.\n8. Choose\
    \ Simulator ➤ Quit Simulator to return to Xcode."
