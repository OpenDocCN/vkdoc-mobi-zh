    \ collectionView: UICollectionView) -> Int {\n    return petArray.count\n    }\n\
    \    func collectionView(_ collectionView: UICollectionView, numberOfItemsInSection\
    \ section: Int) -> Int {\n    return petArray[section].count - 1\n    }\n    func\
    \ collectionView(_ collectionView: UICollectionView, cellForItemAt indexPath:\
    \ IndexPath) -> UICollectionViewCell {\n    let cell = collectionView.dequeueReusableCell(withReuseIdentifier:\
    \ \"customCell\", for: indexPath) as! itemCell\n    cell.itemLabel.text = petArray[indexPath.section][indexPath.row\
    \ + 1]\n    return cell\n    }\n    func collectionView(_ collectionView: UICollectionView,\
    \ didSelectItemAt indexPath: IndexPath) {\n    let alert = UIAlertController(title:\
    \ \"Your Choice\", message: \"\\(petArray[indexPath.section][indexPath.row + 1])\"\
    , preferredStyle: .alert)\n    let action = UIAlertAction(title: \"OK\", style:\
    \ .default, handler: nil)\n    alert.addAction(action)\n    self.present(alert,\
    \ animated: true, completion: nil)\n    }\n    func collectionView(_ collectionView:\
    \ UICollectionView, viewForSupplementaryElementOfKind kind: String, at indexPath:\
    \ IndexPath) -> UICollectionReusableView {\n    let headerView = collectionView.dequeueReusableSupplementaryView(ofKind:\
    \ kind, withReuseIdentifier: \"headerView\", for: indexPath) as! itemCell\n  \
    \  headerView.headerLabel.text = petArray[indexPath.section][0]\n    return headerView\n\
    \    }\n    }\n    ```\n\n60.  Click the Run button or choose Product ➤ Run. The\
    \ Simulator window appears, displaying the Collection View divided into sections\
    \ as shown in Figure [16-18](#329781_5_En_16_Chapter.xhtml#Fig18).\n\n![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig18_HTML.jpg](images/329781_5_En_16_Chapter/329781_5_En_16_Fig18_HTML.jpg)\n\
    \nFigure 16-18\n\nThe Collection View displaying different sections\n\n61.  Click\
    \ any item. An alert controller appears, displaying the item you chose.\n\n62.\
    \  Click OK to dismiss the alert controller.\n\n63.  Choose Simulator ➤ Quit Simulator\
    \ to return to Xcode.\n\n## Summary\n\nCollection views work similar to table\
    \ views where you need to define a delegate and a data source. Collection views\
    \ can be more flexible because they let you scroll horizontally or vertically\
    \ and display items in grids rather than stacked rows like a table view.\n\nTo\
    \ organize the display of data in a Collection View, you can define section headers.\
    \ To further customize the appearance of a Collection View, you can drag and drop\
    \ objects onto a Collection View Cell such as a label and create a separate .swift\
    \ class file to link to this cell. That way you can create IBOutlets to display\
    \ data.\n\nThink of Collection Views as more complicated and more versatile table\
    \ views. Once you understand how table views work, you can easily learn how to\
    \ create and use Collection Views in your future apps."
