    \    }\n}\n```\n\n23. 选择 **View ➤ Standard Editor ➤ Show Standard Editor**，或点击\
    \ Xcode 窗口右上角的 Standard Editor 图标。\n\n24. 点击 Run 按钮或选择 **Product ➤ Run**。模拟器窗口将出现。要模拟旋转手势，您需要使用鼠标并按住\
    \ Option 键。\n\n25. 将鼠标指针移到图像视图上，然后按住 Option 键。两个灰色圆点会出现在屏幕上，模拟两个手指的指尖（见图 11-11）。\n\
    \n26. 按住鼠标左键和 Option 键，然后以圆周运动拖动鼠标，模拟旋转手势。请注意，随着旋转手势的变化，图像视图也会随之旋转。\n\n27. 选择\
    \ **Simulator ➤ Quit Simulator** 返回 Xcode。\n\n本示例通过从对象库中拖拽 Rotation Gesture Recognizer\
    \ 来可视化地定义旋转手势。现在，让我们看看如何仅通过 Swift 代码来复制这一过程。\n\n1.  使用 Single View App 模板创建一个新的\
    \ iOS 项目（见第 1 章），并将此新项目命名为 `RotateCodeApp`。这将为用户界面创建一个单视图。\n\n2.  点击导航器面板中的 `Main.storyboard`\
    \ 文件。Xcode 将显示该单视图。\n\n3.  点击库图标打开对象库窗口，将一个图像视图拖放到用户界面的中心。\n\n4.  点击 Xcode 中间面板底部的对齐图标。将出现一个窗口。\n\
    \n5.  选中 **Horizontally in Container** 和 **Vertically in Container** 复选框，然后点击\
    \ **Add 2 Constraints** 按钮（见图 11-10）。图像视图需要位于中心，以便在模拟器中轻松模拟捏合手势。\n\n6.  选择 **Editor\
    \ ➤ Resolve Auto Layout Issues ➤ Add Missing Constraints**（子菜单的上半部分）。Xcode 会为图像视图添加额外的约束。\n\
    \n7.  选择 **View ➤ Assistant Editor ➤ Show Assistant Editor**，或点击 Assistant Editor\
    \ 图标。Xcode 将并排显示 `Main.storyboard` 和 `ViewController.swift` 文件。\n\n8.  将鼠标指针移到图像视图上，按住\
    \ Control 键，然后从图像视图 Control-拖动到 `ViewController.swift` 文件中 \"class ViewController\"\
    \ 行的下方。\n\n9.  松开 Control 键和鼠标左键。将出现一个弹出窗口。\n\n10. 点击 Name 文本字段，输入 **topImageView**，然后点击\
    \ **Connect** 按钮。Xcode 将创建一个 `IBOutlet` 变量，如下所示：\n\n```\n@IBOutlet var topImageView:\
    \ UIImageView!\n```\n\n11. 选择 **View ➤ Standard Editor ➤ Show Standard Editor**，或点击\
    \ Xcode 窗口右上角的 Standard Editor 图标。\n\n12. 点击导航器面板中的 `ViewController.swift` 文件。\n\
    \n13. 在 `IBOutlet` 下方添加以下代码行：\n\n```\nvar rotateMe: UIRotationGestureRecognizer?\n\
    ```\n\n这定义了一个代表旋转手势的全局变量。\n\n14. 编辑 `viewDidLoad` 方法，如下所示：\n\n```\noverride func\
    \ viewDidLoad() {\n    super.viewDidLoad()\n    topImageView.isUserInteractionEnabled\
    \ = true\n    topImageView.backgroundColor = UIColor.green\n    let rotationGesture\
    \ = UIRotationGestureRecognizer(target: self, action: #selector(handleRotation))\n\
    \    topImageView.addGestureRecognizer(rotationGesture)\n    rotateMe = rotationGesture\n\
    \    // Do any additional setup after loading the view, typically from a nib.\n\
    }\n```\n\n此代码开启了图像视图的 User Interaction Enabled 设置，并将其背景颜色定义为绿色以使其可见。接着，它定义了一个旋转手势识别器（而不是从对象库窗口中拖放一个\
    \ Rotation Gesture Recognizer），定义了一个名为 `handleRotation` 的函数来响应旋转手势，并将该旋转手势链接到图像视图，以便旋转只影响图像视图。最后，它将旋转手势识别器赋值给\
    \ `rotateMe` 变量。\n\n15. 在 `viewDidLoad` 方法下方添加以下函数：\n\n```\n@objc func handleRotation()\
    \ {\n    topImageView.transform = CGAffineTransform(rotationAngle: rotateMe!.rotation)\n\
    }\n```\n\n完整的 `ViewController.swift` 文件应如下所示：\n\n```\nimport UIKit\nclass ViewController:\
    \ UIViewController {\n    @IBOutlet var topImageView: UIImageView!\n    var rotateMe:\
    \ UIRotationGestureRecognizer?\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        topImageView.isUserInteractionEnabled = true\n        topImageView.backgroundColor\
    \ = UIColor.green\n        let rotationGesture = UIRotationGestureRecognizer(target:\
    \ self, action: #selector(handleRotation))\n        topImageView.addGestureRecognizer(rotationGesture)\n\
    \        rotateMe = rotationGesture\n        // Do any additional setup after\
    \ loading the view, typically from a nib.\n    }\n    @objc func handleRotation()\
    \ {\n        topImageView.transform = CGAffineTransform(rotationAngle: rotateMe!.rotation)\n\
    \    }\n}\n```\n\n16. 点击 Run 按钮或选择 **Product ➤ Run**。模拟器窗口将出现。要模拟捏合手势，您需要使用鼠标并按住\
    \ Option 键。\n\n17. 将鼠标指针移到图像视图上，然后按住 Option 键。两个灰色圆点会出现在屏幕上，模拟两个手指的指尖（见图 11-11）。\n\
    \n18. 按住鼠标左键和 Option 键，然后以圆周运动拖动鼠标，模拟旋转手势。请注意，随着旋转手势的旋转，图像视图也会随之旋转。\n\n19. 选择\
    \ **Simulator ➤ Quit Simulator** 返回 Xcode。\n"
- fmt: "### Detecting Pan Gestures\n\nA pan gesture occurs when the user holds a fingertip\
    \ on the screen and moves the fingertip, keeping it pressed on the screen. A pan\
    \ is similar to a dragging motion on a Macintosh and lets you define the minimum\
    \ and maximum number of fingertips needed to define the pan gesture such as at\
    \ least two fingers but no more than four fingertips.\n\nA pan gesture tracks\
    \ the velocity and translation where the velocity measures the speed of the pan\
    \ gesture while the translation measures the movement of the pan gesture.\n\n\
    To see how to use a pan gesture, follow these steps:\n\n1. Create a new iOS project\
    \ using the Single View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml))\
    \ and name this new project `PanApp`. This creates a single view for the user\
    \ interface.\n\n2. Click the `Main.storyboard` file in the Navigator pane. Xcode\
    \ displays the single view.\n\n3. Click the Library icon to open the Object Library\
    \ window and look for the Pan Gesture Recognizer as shown in Figure [11-13](#329781_5_En_11_Chapter.xhtml#Fig13).\n\
    \n   ![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig13_HTML.jpg](images/329781_5_En_11_Chapter/329781_5_En_11_Fig13_HTML.jpg)\n\
    \n   Figure 11-13\n\n   The Pan Gesture Recognizer in the Object Library window\n\
    \n4. Drag and drop the Pan Gesture Recognizer onto the view. Xcode displays the\
    \ Pan Gesture Recognizer in the Document Outline and above the View Controller.\n\
    \n5. Click the Library icon to open the Object Library window and drag and drop\
    \ an image view in the center of the user interface.\n\n6. Choose View ➤ Inspectors\
    \ ➤ Show Attributes Inspector or click the Attributes Inspector icon in the upper\
    \ right corner of the Xcode window.\n\n7. Click in the Background popup menu and\
    \ choose a color such as green or blue. This will make the image view easy to\
    \ find when you run the app in the Simulator. Without a background color, the\
    \ default white background of the image view will blend in with the white background\
    \ of the view.\n\n8. Select the User Interaction Enabled check box. This allows\
    \ the image view to respond to the user.\n\n9. Click the Align icon in the bottom\
    \ of the middle Xcode pane. A window appears.\n\n10. Select the Horizontally in\
    \ Container and Vertically in Container check boxes and then click the Add 2 Constraints\
    \ button (see Figure [11-10](#329781_5_En_11_Chapter.xhtml#Fig10)). The image\
    \ view needs to be in the center to make it easy to mimic pinching gestures in\
    \ the Simulator.\n\n11. Choose Editor ➤ Resolve Auto Layout Issues ➤ Add Missing\
    \ Constraints in the top half of the submenu. Xcode adds additional constraints\
    \ to the image view.\n\n12. Move the mouse pointer over the image view, hold down\
    \ the Control key, and Ctrl-drag from the image view to the Pan Gesture Recognizer\
    \ icon in the Document Outline or at the top of the View Controller.\n\n13. Release\
    \ the Control key and the left mouse button. A window appears.\n\n14. Choose `gestureRecognizers`.\
    \ This link lets the image view detect pan gestures.\n\n15. Choose View ➤ Assistant\
    \ Editor ➤ Show Assistant Editor, or click the Assistant Editor icon. Xcode displays\
    \ the `Main.storyboard` and `ViewController.swift` file side by side.\n\n16. Move\
    \ the mouse pointer over the image view, hold down the Control key, and Ctrl-drag\
    \ from the image view to the `ViewController.swift` file underneath the `class\
    \ ViewController` line.\n\n17. Release the Control key and the left mouse button.\
    \ A popup window appears.\n\n18. Click in the Name text field, type `topImageView`,\
    \ and click the Connect button. Xcode creates an IBOutlet variable as follows:\n\
    \n    ```swift\n    @IBOutlet var topImageView: UIImageView!\n    ```\n\n19. Add\
    \ the following two lines underneath the IBOutlet:\n\n    ```swift\n    var xOrigin:CGFloat\
    \ = 0\n    var yOrigin:CGFloat = 0\n    ```\n\n    Note that both variables are\
    \ defined to hold `CGFloat` data types, which are used for measuring distances.\
    \ Without explicitly defining both variables as `CGFloat`, Xcode would assume\
    \ both variables would just hold integers.\n\n20. Edit the `viewDidLoad` method\
    \ as follows:"
