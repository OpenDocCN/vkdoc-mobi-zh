    \ ViewController” line in the ViewController.swift file.\n\n11.  Release the Control\
    \ key and the left mouse button. A popup window appears.\n\n12.  Click in the\
    \ Name text field, type **petTable** , and click the Connect button. Xcode creates\
    \ an IBOutlet as follows:\n\n```\n    @IBOutlet var petTable: UITableView!\n \
    \   ```\n\n1.  Choose View ➤ Standard Editor ➤ Show Standard Editor, or click\
    \ the Standard Editor icon in the upper right corner of the Xcode window.\n\n\
    2.  Click the ViewController.swift file in the Navigator pane.\n\n3.  Modify the\
    \ class ViewController line by adding UITableViewDelegate, UITableViewDataSource\
    \ as follows:\n\n```\n    class ViewController: UIViewController, UITableViewDelegate,\
    \ UITableViewDataSource {\n    ```\n\nThe purpose of this code is to identify\
    \ the ViewController.swift file as both the delegate and data source for the table\
    \ view.\n\n4.  Underneath the class ViewController line, add the following array:\n\
    \n```\n    let petArray = [[\"Mammal\", \"cat\", \"dog\", \"hamster\", \"gerbil\"\
    , \"rabbit\"], [\"Bird\", \"parakeet\", \"parrot\", \"canary\", \"finch\"], [\"\
    Fish\", \"tropical fish\", \"goldfish\", \"sea horses\"], [\"Reptile\", \"turtle\"\
    , \"snake\", \"lizard\"]]\n    ```\n\n5.  Underneath this array, add the following\
    \ line:\n\n```\n    let cellID = \"cellID\"\n    ```\n\nThe purpose of this code\
    \ is to create an arbitrary constant name for a cell. A table view consists of\
    \ rows of cells, so we need to identify the cells for storing data in later.\n\
    \n6.  Modify the viewDidLoad method as follows:\n\n```\n    override func viewDidLoad()\
    \ {\n    super.viewDidLoad()\n    petTable.dataSource = self\n    petTable.delegate\
    \ = self\n    // Do any additional setup after loading the view, typically from\
    \ a nib.\n    }\n    ```\n\nThe purpose of this code is to define that the table\
    \ (IBOutlet petTable) gets its data from the ViewController.swift file that it’s\
    \ stored in (self). In addition, the delegate is defined as the ViewController.swift\
    \ file (self). This means the ViewController.swift file needs to contain functions\
    \ that define how many rows the table needs and where to find its data, which\
    \ is the petArray.\n\n7.  Underneath the viewDidLoad method, add the following\
    \ function to count the number of rows in each section:\n\n```\n    func tableView(_\
    \ tableView: UITableView, numberOfRowsInSection section: Int) -> Int {\n    return\
    \ petArray[section].count - 1\n    }\n    ```\n\n8.  Underneath the previous function,\
    \ add the following function to fill the table view with data:\n\n```\n    func\
    \ tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell\
    \ {\n    var cell = tableView.dequeueReusableCell(withIdentifier: cellID)\n  \
    \  if (cell == nil) {\n    cell = UITableViewCell(\n    style: UITableViewCell.CellStyle.default,\n\
    \    reuseIdentifier: cellID)\n    }\n    cell?.textLabel?.text = petArray[indexPath.section][indexPath.row\
    \ + 1]\n    return cell!\n    }\n    ```\n\n9.  Underneath the previous function,\
    \ add the following function to identify which item the user selected:\n\n```\n\
    \    func tableView(_ tableView: UITableView, didSelectRowAt indexPath: IndexPath)\
    \ {\n    let selectedItem = petArray[indexPath.section][indexPath.row + 1]\n \
    \   let alert = UIAlertController(title: \"Your Choice\", message: \"\\(selectedItem)\"\
    , preferredStyle: .alert)\n    let okAction = UIAlertAction(title: \"OK\", style:\
    \ .default, handler: { action -> Void in\n    //Just dismiss the action sheet\n\
    \    })\n    alert.addAction(okAction)\n    self.present(alert, animated: true,\
    \ completion: nil)\n    }\n    ```\n\n10.  Underneath the previous function, add\
    \ the following function to count the number of sections to display in the table\
    \ view:\n\n```\n    func numberOfSections(in tableView: UITableView) -> Int {\n\
    \    return petArray.count\n    }\n    ```\n\n11.  Underneath the previous function,\
    \ add the following function to display the first item in each array as the header\
    \ for that group:\n\n```\n    func tableView(_ tableView: UITableView, titleForHeaderInSection\
    \ section: Int) -> String? {\n    return petArray[section][0]\n    }\n    ```\n\
