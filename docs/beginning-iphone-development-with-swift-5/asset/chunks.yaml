    \  Add the following function underneath the viewDidLoad method:\n\n```\n    @objc\
    \ func handleRotation() {\n    topImageView.transform = CGAffineTransform(rotationAngle:\
    \ rotateMe!.rotation)\n    }\n    ```\n\nThe entire ViewController.swift file\
    \ should look like this:\n\n```\n    import UIKit\n    class ViewController: UIViewController\
