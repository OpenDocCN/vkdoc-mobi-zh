    \  }\n    }\n}\n```\n\n12. 点击`运行`按钮或选择`产品` ➤ `运行`。模拟器出现，屏幕底部附近显示你的两个文本字段。\n\n\
    13. 点击任意文本字段。请注意，虚拟键盘会向上滑动，并将视图（以及两个文本字段）向上移动，如图 7-19 所示。（如果虚拟键盘因任何原因未出现，你可以通过选择`硬件`\
