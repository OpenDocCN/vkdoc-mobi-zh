  trans: "\n# 显示并响应多个按钮\n\n最简单的警报控制器会显示一个让用户关闭它的单一按钮。但你可能希望提供给用户多个选项，并根据用户点击的按钮做出不同的响应。\n\
    \n对于想要在警报控制器上显示的每个按钮，都需要添加一个 `UIAlertAction`。当用户点击警报控制器上的按钮时，警报控制器会消失。如果你希望按钮执行更多操作，则需要调用一个单独的函数来执行某些操作。\n\
    \n要了解如何创建一个显示两个按钮并对每个按钮做出不同响应的警报控制器，请遵循以下步骤：\n\n1.  使用单一视图应用模板创建一个新的 iOS 项目（参见第\
    \ 1 章），并将这个新项目命名为 `AlertControllerButtonsApp`。这将为用户界面创建一个单一视图。\n\n2.  在导航面板中点击\
    \ `Main.storyboard` 文件。Xcode 会显示单一视图。\n\n3.  点击库图标打开对象库窗口。\n\n4.  将一个按钮和一个标签拖放到视图上的任意位置。\n\
    \n5.  选择 编辑器 > 解决自动布局问题 > 重置为建议的约束（位于子菜单下半部分）。Xcode 会为按钮和标签添加约束。\n\n6.  选择 视图\
    \ > 辅助编辑器 > 显示辅助编辑器。Xcode 会并排显示 `Main.storyboard` 和 `ViewController.swift` 文件。\n\
    \n7.  将鼠标指针移到标签上，按住 Control 键，然后从图像视图按住 Control 键拖拽到“class ViewController”行下方的\
    \ `ViewController.swift` 文件中。\n\n8.  松开 Control 键和鼠标左键。此时会弹出一个窗口。\n\n9.  点击名称文本框，输入\
    \ `labelResult`，然后点击连接按钮。Xcode 会创建一个 `IBOutlet` 变量，如下所示：\n\n```\n    @IBOutlet\
    \ var labelResult: UILabel!\n```\n\n10. 将鼠标指针移到按钮上，按住 Control 键，然后从图像视图按住 Control\
    \ 键拖拽到文件底部最后一个大括号上方的 `ViewController.swift` 文件中。\n\n11. 松开 Control 键和鼠标左键。此时会弹出一个窗口。\n\
    \n12. 点击名称文本框，输入 `buttonTapped`，点击类型弹出菜单并选择 `UIButton`，然后点击连接按钮。Xcode 会创建一个 `IBAction`\
    \ 方法。\n\n13. 选择 视图 > 标准编辑器 > 显示标准编辑器，或者点击 Xcode 窗口右上角的标准编辑器图标。\n\n14. 在导航面板中点击\
    \ `ViewController.swift` 文件。\n\n15. 修改 `viewDidLoad` 方法，如下所示：\n\n```\n    override\
    \ func viewDidLoad() {\n        super.viewDidLoad()\n        labelResult.numberOfLines\
    \ = 0\n        // Do any additional setup after loading the view, typically from\
    \ a nib.\n    }\n```\n\n将标签的 `numberOfLines` 属性设置为 0，无论其中存储的文本大小如何，都允许其宽度扩展。如果此\
    \ `numberOfLines` 属性保持默认值 1，则标签不会自动调整大小，并且如果文本长度超过标签宽度，则存在文本被截断的风险。\n\n16. 编辑此\
    \ `buttonTapped` `IBAction` 方法，如下所示：\n\n```\n    @IBAction func buttonTapped(_\
    \ sender: UIButton) {\n        let alert = UIAlertController(title: \"Warning\"\
    , message: \"Zombies are loose!\", preferredStyle: .alert)\n        let okAction\
    \ = UIAlertAction(title: \"OK\", style: .default, handler: { action -> Void in\n\
    \            self.labelResult.text = \"OK\"\n        })\n        let cancelAction\
    \ = UIAlertAction(title: \"Cancel\", style: .cancel, handler: { action -> Void\
    \ in\n            self.labelResult.text = \"Cancel\"\n        })\n        let\
    \ destroyAction = UIAlertAction(title: \"Destroy\", style: .destructive, handler:\
    \ { action -> Void in\n            self.labelResult.text = \"Destroy\"\n     \
    \   })\n        alert.addAction(okAction)\n        alert.addAction(cancelAction)\n\
    \        alert.addAction(destroyAction)\n        self.present(alert, animated:\
    \ true, completion: nil)\n    }\n```\n\n定义每个 `UIAlertAction` 的代码仅会更改标签中显示的文本。如果你需要每个按钮执行更复杂的任务，可以在处理程序中放入一个或多个函数的名称。然后你需要创建这些函数，例如：\n\
    \n```\n    let destroyAction = UIAlertAction(title: \"Destroy\", style: .destructive,\
    \ handler: { action -> Void in\n        self.labelResult.text = \"Destroy\"\n\
    \        self.callFunctionOne()\n        self.callFunctionTwo()\n    })\n    func\
    \ callFunctionOne(){\n        // Code here\n    }\n    func callFunctionTwo(){\n\
    \        // Code here\n    }\n```\n\n整个 `ViewController.swift` 文件应如下所示：\n\n```\n\
    \    import UIKit\n    class ViewController: UIViewController {\n        @IBOutlet\
    \ var labelResult: UILabel!\n        override func viewDidLoad() {\n         \
    \   super.viewDidLoad()\n            labelResult.numberOfLines = 0\n         \
    \   // Do any additional setup after loading the view, typically from a nib.\n\
    \        }\n        @IBAction func buttonTapped(_ sender: UIButton) {\n      \
    \      let alert = UIAlertController(title: \"Warning\", message: \"Zombies are\
    \ loose!\", preferredStyle: .alert)\n            let okAction = UIAlertAction(title:\
    \ \"OK\", style: .default, handler: { action -> Void in\n                self.labelResult.text\
    \ = \"OK\"\n            })\n            let cancelAction = UIAlertAction(title:\
    \ \"Cancel\", style: .cancel, handler: { action -> Void in\n                self.labelResult.text\
    \ = \"Cancel\"\n            })\n            let destroyAction = UIAlertAction(title:\
    \ \"Destroy\", style: .destructive, handler: { action -> Void in\n           \
    \     self.labelResult.text = \"Destroy\"\n            })\n            alert.addAction(okAction)\n\
    \            alert.addAction(cancelAction)\n            alert.addAction(destroyAction)\n\
    \            self.present(alert, animated: true, completion: nil)\n        }\n\
    \    }\n```\n\n17. 点击运行按钮或选择 产品 > 运行。模拟器屏幕会出现。\n\n18. 点击按钮。警报控制器会如图 12-4 所示显示出来。\n\
    \n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig4_HTML.jpg](img/329781_5_En_12_Fig4_HTML.jpg)\n\
    \n图 12-4\n\n警报控制器显示三种类型的按钮：`.default`、`.destructive` 和 `.cancel`\n\n19. 点击“OK”按钮（该按钮使用\
    \ `.default` 样式显示）。注意，标签现在显示“OK”，并且警报控制器被关闭。\n\n20. 点击“Destroy”按钮（该按钮使用 `.destructive`\
    \ 样式显示）。注意，标签现在显示“Destroy”，并且警报控制器被关闭。\n\n21. 点击“Cancel”按钮（该按钮使用 `.cancel` 样式显示）。注意，标签现在显示“Cancel”，并且警报控制器被关闭。\n\
    \n22. 选择 模拟器 > 退出模拟器 返回 Xcode。\n\n# 在警报控制器上显示文本字段\n\n按钮允许警报控制器接受用户的选项。你的代码可以根据这些选项做出响应。但有时你可能希望在警报控制器上显示一个文本字段，以便用户输入数据。然后你需要存储这些数据。\n"
- fmt: "### Note\n\nYou can only add text fields on an alert controller that appears\
    \ in the `.alert` preferredStyle. You cannot display text fields on an alert controller\
    \ that appears as the `.actionSheet` preferredStyle.\n\nWhen you add a text field\
    \ to an alert controller, you can modify that text field like any text field such\
    \ as defining a background color or font. In addition, you must also create a\
    \ constant to store the contents of that text field so the rest of your app can\
    \ access whatever data the user typed into the text field on the alert controller.\n\
    \nTo see how to display a text field on an alert controller and access its contents,\
    \ follow these steps:\n\n1. Create a new iOS project using the Single View App\
    \ template (see Chapter [1](#329781_5_En_1_Chapter.xhtml)) and name this new project\
    \ `AlertControllerTextFieldApp`. This creates a single view for the user interface.\n\
    \n2. Click the `Main.storyboard` file in the Navigator pane. Xcode displays the\
    \ single view.\n\n3. Click the Library icon to open the Object Library window.\n\
    \n4. Drag and drop a button and a label anywhere on the view.\n\n5. Choose Editor\
    \ ➤ Resolve Auto Layout Issues ➤ Reset to Suggested Constraints on the bottom\
    \ half of the submenu. Xcode adds constraints to the button and label.\n\n6. Choose\
    \ View ➤ Assistant Editor ➤ Show Assistant Editor. Xcode displays the `Main.storyboard`\
    \ and `ViewController.swift` file side by side.\n\n7. Move the mouse pointer over\
    \ the label, hold down the Control key, and Ctrl-drag from the image view to the\
    \ `ViewController.swift` file under the `class ViewController` line.\n\n8. Release\
    \ the Control key and the left mouse button. A popup window appears.\n\n9. Click\
    \ in the Name text field, type `labelResult`, and click the Connect button. Xcode\
    \ creates an IBOutlet variable as follows:\n\n```\n@IBOutlet var labelResult:\
    \ UILabel!\n```\n\n10. Move the mouse pointer over the button, hold down the Control\
    \ key, and Ctrl-drag from the image view to the `ViewController.swift` file above\
    \ the last curly bracket at the bottom of the file.\n\n11. Release the Control\
    \ key and the left mouse button. A popup window appears.\n\n12. Click in the Name\
    \ text field, type `buttonTapped`, click in the Type popup menu and choose `UIButton`,\
    \ and click the Connect button. Xcode creates an IBAction method.\n\n13. Choose\
    \ View ➤ Standard Editor ➤ Show Standard Editor, or click the Standard Editor\
    \ icon in the upper right corner of the Xcode window.\n\n14. Click the `ViewController.swift`\
    \ file in the Navigator pane.\n\n15. Modify the `viewDidLoad` method as follows:\n\
    \n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    labelResult.numberOfLines\
    \ = 0\n    // Do any additional setup after loading the view, typically from a\
    \ nib.\n}\n```\n\nSetting the `numberOfLines` property of the label to 0 allows\
    \ it to expand in width no matter the size of text stored in it. If this `numberOfLines`\
    \ property is left at its default value of 1, then the label will not resize automatically\
    \ and risks cutting text off if the text is longer than the width of the label.\n\
    \n16. Add the following to the `buttonTapped` IBAction method as follows:\n\n\
    ```\nlet alert = UIAlertController(title: \"Log In\", message: \"Enter Password\"\
    , preferredStyle: .alert)\nalert.addTextField(configurationHandler: {(textField)\
    \ in\n    textField.placeholder = \"Password here\"\n    textField.isSecureTextEntry\
    \ = true\n})\n```\n\nThe first line creates an alert controller that displays\
    \ the title “Log In” and underneath the message “Enter Password”. Because we want\
    \ to display a text field on the alert controller, the alert controller’s `preferredStyle`\
    \ must be `.alert`.\n\nThe second line adds a text field to the alert controller\
    \ and configures the text field to display “Password here” as placeholder text\
    \ and also sets its `isSecureTextEntry` property to `true` which hides the characters\
    \ as the user types them in the text field. Any code listed here simply customized\
    \ the text field.\n\n17. Add the following to the `buttonTapped` IBAction method\
    \ as follows:\n\n```\nlet okAction = UIAlertAction(title: \"OK\", style: .default,\
    \ handler: { action -> Void in\n    let savedText = alert.textFields![0] as UITextField\n\
    \    self.labelResult.text = savedText.text\n})\nalert.addAction(okAction)\nself.present(alert,\
    \ animated: true, completion: nil)\n```\n\nThe first line defines a button with\
    \ the title “OK” and a `.default` style. Inside the handler section of the code,\
    \ this line defines a constant called `savedText`, which represents the first\
    \ text field (note the index value of 0) on the alert controller. If you add more\
    \ than one text field to an alert controller, you’ll need to define additional\
    \ constants to represent those other text fields. Finally, this line stores the\
    \ text from the text field (`savedText`) and displays it in the `labelResult`\
    \ IBOutlet that’s linked to the label on the user interface.\n\nThe second line\
    \ adds the button to the alert controller and the third line presents or displays\
    \ the alert controller.\n\nThe entire `ViewController.swift` file should look\
    \ like this:\n\n```\nimport UIKit\nclass ViewController: UIViewController {\n\
    \    @IBOutlet var labelResult: UILabel!\n    override func viewDidLoad() {\n\
    \        super.viewDidLoad()\n        labelResult.numberOfLines = 0\n        //\
    \ Do any additional setup after loading the view, typically from a nib.\n    }\n\
    \    @IBAction func buttonTapped(_ sender: UIButton) {\n        let alert = UIAlertController(title:\
    \ \"Log In\", message: \"Enter Password\", preferredStyle: .alert)\n        alert.addTextField(configurationHandler:\
    \ {(textField) in\n            textField.placeholder = \"Password here\"\n   \
    \         textField.isSecureTextEntry = true\n        })\n        let okAction\
    \ = UIAlertAction(title: \"OK\", style: .default, handler: { action -> Void in\n\
    \            let savedText = alert.textFields![0] as UITextField\n           \
    \ self.labelResult.text = savedText.text\n        })\n        alert.addAction(okAction)\n\
    \        self.present(alert, animated: true, completion: nil)\n    }\n}\n```\n\
    \n18. Click the Run button or choose Product ➤ Run. The Simulator screen appears.\n\
    \n19. Click the button. The alert controller appears as shown in Figure [12-5](#329781_5_En_12_Chapter.xhtml#Fig5).\n\
    \n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig5_HTML.jpg](images/329781_5_En_12_Chapter/329781_5_En_12_Fig5_HTML.jpg)\n\
    \n**Figure 12-5** An alert controller displaying a text field and a button\n\n\
    20. Type some text in the text field on the alert controller. Notice that as you\
    \ type, the text field masks the characters because its `isSecureTextEntry` property\
    \ is set to `true`.\n\n21. Click the OK button. Notice that whatever text you\
    \ typed into the text field now appears in the label.\n\n22. Choose Simulator\
    \ ➤ Quit Simulator to return to Xcode."
