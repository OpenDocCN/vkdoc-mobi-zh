  trans: "\n20.  松开 `Control` 键和鼠标左键。此时会出现一个弹出窗口。\n\n21.  点击 `Name` 文本字段，输入 `longPressDetected`，点击\
    \ `Type` 弹出菜单并选择 `UILongPressGestureRecognizer`，然后点击 `Connect` 按钮。Xcode 会创建一个\
    \ `IBAction` 方法。\n\n22.  按如下方式编辑 `longPressDetected` `IBAction` 方法：\n\n```swift\n\
    @IBAction func longPressDetected(_ sender: UILongPressGestureRecognizer) {\n \
    \   topImageView.backgroundColor = UIColor.red\n}\n```\n\n当识别到长按手势时，`longPressDetected`\
    \ `IBAction` 方法会将图像视图的背景颜色更改为红色。完整的 `ViewController.swift` 文件应如下所示：\n\n```swift\n\
    import UIKit\nclass ViewController: UIViewController {\n    @IBOutlet var topImageView:\
    \ UIImageView!\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        // Do any additional setup after loading the view, typically from a nib.\n\
    \    }\n    @IBAction func longPressDetected(_ sender: UILongPressGestureRecognizer)\
    \ {\n        topImageView.backgroundColor = UIColor.red\n    }\n}\n```\n\n23.\
    \  点击 `Run` 按钮或选择 `Product ➤ Run`。模拟器窗口将会出现。\n\n24.  将鼠标指针移至图像视图上，然后按住鼠标左键。当图像视图检测到长按手势时，它会将图像视图的背景颜色变为红色。\n\
    \n25.  选择 `Simulator ➤ Quit Simulator` 返回 Xcode。\n\n此示例通过从对象库中拖拽 `Long Press Gesture\
    \ Recognizer` 以可视化的方式定义了长按手势。现在，我们来看看如何仅通过 Swift 代码来复现这个过程。\n\n1.  使用 `Single\
    \ View App` 模板（参见第 1 章）创建一个新的 iOS 项目，并将该项目命名为 `LongPressCodeApp`。这会为用户界面创建一个单一视图。\n\
    \n2.  在导航器面板中点击 `Main.storyboard` 文件。Xcode 会显示该单一视图。\n\n3.  点击 `Library` 图标以打开对象库窗口，然后将一个图像视图拖放到用户界面的中心位置。\n\
    \n4.  点击 Xcode 中间面板底部的 `Align` 图标。此时会出现一个窗口。\n\n5.  选中 `Horizontally in Container`\
    \ 和 `Vertically in Container` 复选框，然后点击 `Add 2 Constraints` 按钮（见图 11-10）。图像视图需要位于中心位置，以便在模拟器中更容易模拟捏合手势。\n\
    \n6.  在子菜单的上半部分选择 `Editor ➤ Resolve Auto Layout Issues ➤ Add Missing Constraints`。Xcode\
    \ 会为图像视图添加额外的约束。\n\n7.  选择 `View ➤ Assistant Editor ➤ Show Assistant Editor`，或点击\
    \ `Assistant Editor` 图标。Xcode 会并排显示 `Main.storyboard` 和 `ViewController.swift`\
    \ 文件。\n\n8.  将鼠标指针移到图像视图上，按住 `Control` 键，并从图像视图 Ctrl-拖拽到 `class ViewController`\
    \ 行下方的 `ViewController.swift` 文件中。\n\n9.  松开 `Control` 键和鼠标左键。此时会出现一个弹出窗口。\n\n\
    10. 点击 `Name` 文本字段，输入 `topImageView`，然后点击 `Connect` 按钮。Xcode 会创建一个 `IBOutlet`\
    \ 变量，如下所示：\n\n```swift\n@IBOutlet var topImageView: UIImageView!\n```\n\n1.  选择\
    \ `View ➤ Standard Editor ➤ Show Standard Editor`，或点击 Xcode 窗口右上角的 `Standard Editor`\
    \ 图标。\n\n2.  在导航器面板中点击 `ViewController.swift` 文件。\n\n3.  按如下方式编辑 `viewDidLoad`\
    \ 方法：\n\n```swift\noverride func viewDidLoad() {\n    super.viewDidLoad()\n  \
    \  topImageView.isUserInteractionEnabled = true\n    topImageView.backgroundColor\
    \ = UIColor.green\n    let longPressGesture = UILongPressGestureRecognizer(target:\
    \ self, action: #selector(handleLongPress))\n    topImageView.addGestureRecognizer(longPressGesture)\n\
    \    // Do any additional setup after loading the view, typically from a nib.\n\
    }\n```\n\n这段代码开启了图像视图的“用户交互已启用”设置，并将其背景颜色定义为绿色以便显示。接着，它定义了一个长按手势识别器（而不是从对象库窗口中拖放一个\
    \ `Long Press Gesture Recognizer`），定义了一个名为 `handleLongPress` 的函数来响应长按手势，并将该长按手势与图像视图关联起来。\n\
    \n4.  在 `viewDidLoad` 方法下方添加以下函数：\n\n```swift\n@objc func handleLongPress() {\n\
    \    topImageView.backgroundColor = UIColor.red\n}\n```\n\n完整的 `ViewController.swift`\
    \ 文件应如下所示：\n\n```swift\nimport UIKit\nclass ViewController: UIViewController {\n\
    \    @IBOutlet var topImageView: UIImageView!\n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        topImageView.isUserInteractionEnabled\
    \ = true\n        topImageView.backgroundColor = UIColor.green\n        let longPressGesture\
    \ = UILongPressGestureRecognizer(target: self, action: #selector(handleLongPress))\n\
    \        topImageView.addGestureRecognizer(longPressGesture)\n        // Do any\
    \ additional setup after loading the view, typically from a nib.\n    }\n    @objc\
    \ func handleLongPress() {\n        topImageView.backgroundColor = UIColor.red\n\
    \    }\n}\n```\n\n5.  点击 `Run` 按钮或选择 `Product ➤ Run`。模拟器窗口将会出现。\n\n6.  将鼠标指针移到图像视图上，然后按住鼠标左键以模拟长按操作。请注意，图像视图的颜色会从绿色变为红色。\n\
    \n7.  选择 `Simulator ➤ Quit Simulator` 返回 Xcode。\n\n## 总结\n\n触摸手势的作用是在用户界面上不放置按钮等对象的情况下，向应用程序发出命令。手势通常可以用一个或多个指尖来操作，你可以通过\
    \ `Attributes Inspector` 面板或 Swift 代码来定义这些手势。\n\n向应用程序添加手势识别器有两种方法。首先，你可以通过对象库将手势识别器添加到故事板中。将手势识别器添加到项目后，你需要从一个对象\
    \ Ctrl-拖拽到这个手势识别器，以使该对象能够识别特定的手势。接下来，你需要创建一个 `IBAction` 方法，以便在手势被识别时做出响应。\n\n\
    第二种方法涉及编写 Swift 代码来创建一个手势识别器，将这个手势识别器添加到一个 `IBOutlet` 对象上，然后编写一个函数来处理手势被识别时的操作。两种方法的效果完全相同，因此你可以根据个人偏好来选择使用哪种方法。\n\
    \n向应用程序添加手势可以让用户界面更简洁、更直观，因为用户可以直接操作屏幕上的对象。\n"
- fmt: "# 12. Using Alerts and Pickers\n\nAlmost every app needs to display and accept\
    \ data from the user. The simplest way to display data is through a label, but\
    \ sometimes you need to display data and give the user a way to respond. In that\
    \ case, you need to use an alert controller.\n\nAn alert controller can display\
    \ a sheet that pops up on the screen, giving the user a chance to respond. Alert\
    \ controllers appear over the user interface to force the user to respond by tapping\
    \ a button to make a choice or dismiss the alert controller as shown in Figure\
    \ 12-1.\n\n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig1_HTML.jpg](images/329781_5_En_12_Chapter/329781_5_En_12_Fig1_HTML.jpg)\n\
    \nFigure 12-1\n\nAn alert controller typically displays a message and one or more\
    \ buttons\n\nBesides displaying data, user interfaces also need to let people\
    \ input data. If that data is text, then you can use a text field to let the user\
    \ type anything in that text field such as a name or telephone number. A text\
    \ field is perfect for accepting any type of data, but when you need to offer\
    \ the user a list of valid choices, you’ll want to use a picker instead.\n\nXcode\
    \ offers two different types of pickers:\n\n- Date Picker – Displays dates and\
    \ times as shown in Figure 12-2\n- Picker View – Displays a spinning wheel of\
    \ different options\n\n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig2_HTML.jpg](images/329781_5_En_12_Chapter/329781_5_En_12_Fig2_HTML.jpg)\n\
    \nFigure 12-2\n\nA Date Picker makes it easy for users to choose dates and times\n\
    \nA picker contains a limited number of options on one or more wheels that the\
    \ user can spin around to select a particular option. The available number of\
    \ options can be as small as two (such as the AM and PM option for choosing a\
    \ time), but typically the available options are greater than two. Pickers insure\
    \ that the user can never choose a non-valid option such as typing a number for\
    \ a name or typing a city incorrectly.\n\n## Using an Alert Controller\n\nEvery\
    \ user interface needs to display data back to the user. In some cases, this data\
    \ can be displayed just in a label, but sometimes you need to make sure the user\
    \ sees certain information. In those situations, you should use an alert controller.\n\
    \nAn alert controller appears over an app’s user interface and can be customized\
    \ by changing the following properties:\n\n- Title – Text that appears at the\
    \ top of the alert controller, often in bold and a large font size\n- Message\
    \ – Text that appears underneath the title in a smaller font size\n- Preferred\
    \ style – Defines the appearance of the alert controller as an action sheet (as\
    \ shown in Figure 12-3) that appear at the bottom of the screen or as an alert\
    \ (see Figure 12-1) that appear in the middle of the screen\n\n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig3_HTML.jpg](images/329781_5_En_12_Chapter/329781_5_En_12_Fig3_HTML.jpg)\n\
    \nFigure 12-3\n\nAn action sheet appears at the bottom of the screen\n\nA title\
    \ typically consists of a single word or short phrase that explains the purpose\
    \ of the alert controller such as displaying \"Warning\" or \"Log In\".\n\nTo\
    \ dismiss an alert controller, an alert controller always needs at least one button.\
    \ However, an alert controller can display two or more buttons to give user a\
    \ choice. Besides displaying buttons, alert controllers can also text fields to\
    \ allow users to enter data as well.\n\nYou can create an alert controller solely\
    \ by writing Swift code. First, you must create the alert controller that defines\
    \ a title, message, and style. Second, you must define an alert action for each\
    \ button or text field you want to display on the alert controller. Third, you\
    \ must actually present that alert controller on the user interface.\n\nTo see\
    \ how to create a simple alert controller that does nothing but display a title,\
    \ a message, and a button to dismiss it, follow these steps:\n\n1. Create a new\
    \ iOS project using the Single View App template (see Chapter 1) and name this\
    \ new project `AlertControllerApp`. This creates a single view for the user interface.\n\
    \n2. Click the `Main.storyboard` file in the Navigator pane. Xcode displays the\
    \ single view.\n\n3. Click the Library icon to open the Object Library window.\n\
    \n4. Drag and drop a button anywhere on the view.\n\n5. Choose Editor ➤ Resolve\
    \ Auto Layout Issues ➤ Reset to Suggested Constraints. Xcode adds constraints\
    \ to the button.\n\n6. Choose View ➤ Assistant Editor ➤ Show Assistant Editor.\
    \ Xcode displays the `Main.storyboard` and `ViewController.swift` file side by\
    \ side.\n\n7. Move the mouse pointer over the button, hold down the Control key,\
    \ and Ctrl-drag from the image view to the `ViewController.swift` file above the\
    \ last curly bracket at the bottom of the file.\n\n8. Release the Control key\
    \ and the left mouse button. A popup window appears.\n\n9. Click in the Name text\
    \ field, type `buttonTapped`, click the Type popup menu and choose `UIButton`,\
    \ and click the Connect button. Xcode creates an IBAction method.\n\n10. Edit\
    \ this `buttonTapped` IBAction method as follows:\n\n    ```\n    @IBAction func\
    \ buttonTapped(_ sender: UIButton) {\n        let alert = UIAlertController(title:\
    \ \"Warning\", message: \"Zombies are loose!\", preferredStyle: .alert)\n    \
    \    let okAction = UIAlertAction(title: \"OK\", style: .default, handler: { action\
    \ -> Void in\n            //Just dismiss the action sheet\n        })\n      \
    \  alert.addAction(okAction)\n        self.present(alert, animated: true, completion:\
    \ nil)\n    }\n    ```\n\n11. Click the Run button or choose Product ➤ Run. The\
    \ Simulator screen appears.\n\n12. Click the button. Notice that the alert controller\
    \ appears in the middle of the screen because the `preferredStyle` were `.alert`.\
    \ (If the `preferredStyle` property were `.actionSheet`, then the alert controller\
    \ would appear at the bottom of the screen.)\n\n13. Tap the OK button on the alert\
    \ controller to make it go away.\n\n14. Choose Simulator ➤ Quit Simulator to return\
    \ to Xcode.\n\nChange the `title` and `message` properties to display different\
    \ text and run the app again to see how it changes the appearance of the alert\
    \ controller. Also change the `preferredStyle` property from `.alert` to `.actionSheet`\
    \ to see how it affects the appearance of the alert controller as well."
