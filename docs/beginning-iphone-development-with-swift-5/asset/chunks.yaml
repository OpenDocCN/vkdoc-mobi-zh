  trans: "\n### 使用 Swift 代码修改滑块\n\n就像你可以通过属性检查器面板自定义滑块一样，你也可以使用 Swift 代码来修改滑块。滑块上一些常见的可修改属性包括：\n\
    \n- `.value` – 定义滑块显示的初始值\n- `.minimumValue` – 定义滑块可表示的最小值\n- `.maximumValue`\
    \ – 定义滑块可表示的最大值\n- `.thumbTintColor` – 定义滑块上滑钮的颜色\n- `.minimumTrackTintColor`\
    \ – 定义最小值轨迹的颜色\n- `.maximumTrackTintColor` – 定义最大值轨迹的颜色\n\n要了解如何使用 Swift 代码修改滑块，请按照以下步骤操作：\n\
    \n1.  确保 SliderApp 项目已在 Xcode 中加载。\n2.  单击导航面板中的 `ViewController.swift` 文件，编辑\
    \ `ViewController.swift` 文件。\n3.  如下所示修改 `changeSlider` IBAction 方法：\n\n```swift\n\
    @IBAction func changeSlider(_ sender: UIButton) {\n    sliderValue.minimumValue\
    \ = 1\n    sliderValue.maximumValue = 25\n    sliderValue.value = 7\n    sliderValue.minimumTrackTintColor\
    \ = UIColor.red\n    sliderValue.maximumTrackTintColor = UIColor.green\n    sliderValue.thumbTintColor\
    \ = UIColor.black\n}\n```\n\n完整的 `ViewController.swift` 文件应如下所示：\n\n```swift\n\
    import UIKit\nclass ViewController: UIViewController {\n    @IBOutlet var labelValue:\
    \ UILabel!\n    @IBOutlet var sliderValue: UISlider!\n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        // 加载视图后进行任何额外的设置，通常来自 nib 文件。\n   \
    \ }\n    @IBAction func changeSlider(_ sender: UIButton) {\n        sliderValue.minimumValue\
    \ = 1\n        sliderValue.maximumValue = 25\n        sliderValue.value = 7\n\
    \        sliderValue.minimumTrackTintColor = UIColor.red\n        sliderValue.maximumTrackTintColor\
    \ = UIColor.green\n        sliderValue.thumbTintColor = UIColor.black\n    }\n\
    \    @IBAction func sliderValueChanged(_ sender: UISlider) {\n        labelValue.text\
    \ = \"\\(sliderValue.value)\"\n    }\n}\n```\n\n4.  单击“运行”按钮或选择“产品”➤“运行”。此时会出现模拟器窗口。\n\
    5.  左右拖动滑块。请注意，标签显示的值在 0 到 1 之间，这些是由属性检查器面板定义的最小值和最大值。\n6.  单击按钮。这会运行 Swift 代码来修改滑块。\n\
    7.  左右拖动滑块。请注意，标签现在显示的值在 1 到 25 之间。此外，滑块会以不同的颜色显示滑钮、最小值轨迹和最大值轨迹。\n8.  选择“模拟器”➤“退出模拟器”以返回\
    \ Xcode。\n\n## 使用进度视图和活动指示器视图\n\n进度视图显示一个水平条，该水平条会填充颜色以直观地显示任务的进度。当进度视图为空时，表示任务尚未开始。当进度视图完全被颜色填满时，表示任务已完成。当进度视图部分被填充时，则表示任务部分完成。\n\
    \n然而，有时无法确切知道任务何时会完成。在这种情况下，进度视图会显得停滞不前，给人一种什么都没发生或应用可能已崩溃的错觉。当无法确定任务何时完成时，最好使用活动指示器视图，它会显示一个动画旋转器，表明有事情正在发生。\n\
    \n进度视图和活动指示器视图的主要区别在于：\n\n-   进度视图显示任务完成了多少，而活动指示器视图则不显示。\n-   活动指示器视图持续显示有事情正在发生，而进度视图可能不会。\n\
    \n要了解如何使用进度视图和活动指示器视图，请按照以下步骤操作：\n\n1.  使用“单视图应用”模板创建一个新的 iOS 项目（参见第 1 章），并将此新项目命名为\
    \ `ProgressApp`。这会为用户界面创建一个单视图。\n2.  单击导航面板中的 `Main.storyboard` 文件。Xcode 将显示该单视图。\n\
    3.  单击“库”图标以显示对象库。\n4.  将一个按钮和一个活动指示器视图拖放到用户界面上，如图 8-4 所示。\n\n![../images/329781_5_En_8_Chapter/329781_5_En_8_Fig4_HTML.png](img/329781_5_En_8_Fig4_HTML.png)\n\
    \n图 8-4 – 将活动指示器视图从对象库窗口拖到用户界面上\n\n5.  选择“编辑器”➤“解决自动布局问题”➤“重置为建议的约束”（位于子菜单的下半部分）。这将为用户界面上的所有对象添加约束。\n\
    6.  单击导航面板中的 `Main.storyboard` 文件。\n7.  选择“视图”➤“辅助编辑器”➤“显示辅助编辑器”，或单击 Xcode 窗口右上角的“辅助编辑器”图标。Xcode\
    \ 会将 `Main.storyboard` 文件与 `ViewController.swift` 文件并排显示。\n8.  将鼠标移到活动指示器视图上，按住\
    \ Control 键，然后 Control-拖动到 `ViewController.swift` 文件中 `IBOutlet` 行下方。\n9.  松开\
    \ Control 键和鼠标左键。将出现一个弹出窗口。\n10. 在“名称”文本字段中单击，输入 `activityView`，然后单击“连接”按钮。Xcode\
    \ 会创建一个如下所示的 `IBOutlet`：\n\n```swift\n@IBOutlet var activityView: UIActivityIndicatorView!\n\
    ```\n\n11. 将鼠标移到按钮上，按住 Control 键，然后 Control-拖动到 `ViewController.swift` 文件中底部最后一个大括号上方。\n\
    12. 松开 Control 键和鼠标左键。将出现一个弹出窗口。\n13. 在“名称”文本字段中单击，输入 `runButton`，单击“类型”弹出菜单并选择\
    \ `UIButton`，然后单击“连接”按钮。Xcode 会创建一个如下所示的 `IBAction` 方法：\n\n```swift\n@IBAction\
    \ func runButton(_ sender: UIButton) {\n}\n```\n\n14. 选择“视图”➤“标准编辑器”➤“显示标准编辑器”，或单击\
    \ Xcode 窗口右上角的“标准编辑器”图标。\n15. 单击导航面板中的 `ViewController.swift` 文件。\n16. 在 `IBOutlet`\
    \ 变量上方添加此行：\n\n```swift\nvar counter = 0\n```\n\n17. 在 `viewDidLoad` 函数内部添加此行：\n\
    \n```swift\nactivityView.hidesWhenStopped = true\n```\n\n18. 如下所示编辑这个 `runButton`\
    \ IBAction 方法：\n\n```swift\n@IBAction func runButton(_ sender: UIButton) {\n \
    \   Timer.scheduledTimer(withTimeInterval: 1.0, repeats: true) { timer in\n  \
    \      self.activityView.startAnimating()\n        self.counter += 1\n       \
    \ if self.counter >= 5 {\n            self.activityView.stopAnimating()\n    \
    \        timer.invalidate()\n        }\n    }\n}\n```\n"
- fmt: "This code runs a timer that counts in 1-second increments. While the timer\
    \ runs, it runs the `startAnimating` method to make the Activity Indicator View\
    \ appear to spin. As soon as the Activity Indicator View starts spinning, it appears\
    \ on the screen.\n\nAfter 5 seconds, the timer stops running and runs the `stopAnimating`\
    \ method to make the Activity Indicator View stop spinning. As soon as it stops\
    \ spinning, it disappears from the screen. The entire `ViewController.swift` file\
    \ should look like this:\n\n```swift\nimport UIKit\nclass ViewController: UIViewController\
    \ {\n    var counter = 0\n    @IBOutlet var activityView: UIActivityIndicatorView!\n\
    \    override func viewDidLoad() {\n        super.viewDidLoad()\n        activityView.hidesWhenStopped\
    \ = true\n        // Do any additional setup after loading the view, typically\
    \ from a nib.\n    }\n    @IBAction func runButton(_ sender: UIButton) {\n   \
    \     Timer.scheduledTimer(withTimeInterval: 1.0, repeats: true) { timer in\n\
    \            self.activityView.startAnimating()\n            self.counter += 1\n\
    \            if self.counter >= 5 {\n                self.activityView.stopAnimating()\n\
    \                timer.invalidate()\n                self.counter = 0\n      \
    \      }\n        }\n    }\n}\n```\n\n3.  Click the Run button or choose Product\
    \ ➤ Run. The Simulator screen appears.\n4.  Click the button. The Activity Indicator\
    \ View appears spinning, then after 5 seconds, it disappears.\n5.  Choose Simulator\
    \ ➤ Quit Simulator to return to Xcode.\n\n## Using a Progress View\n\nA Progress\
    \ View gradually fills up to show the completion of a task. That means your app\
    \ needs to know when a task will be completed. Since a Progress View visually\
    \ displays progress, it’s best to make sure that the Progress View appears to\
    \ fill up fairly quickly to give users feedback that the app is working and to\
    \ show that the task is nearly complete. If the Progress View fills up too slowly,\
    \ the app may appear frozen.\n\nTo see how a Progress View can work, follow these\
    \ steps:\n\n1.  Make sure the `ProgressApp` is loaded in Xcode.\n2.  Click the\
    \ `Main.storyboard` file in the Navigator pane. Xcode displays the single view.\n\
    3.  Click the Library icon to display the Object Library.\n4.  Drag and drop a\
    \ label, a stepper, and a Progress View onto the user interface where the label\
    \ appears above the Progress View and the stepper appears below the Progress View,\
    \ as shown in Figure 8-5.\n5.  Click the label and expand the width of the label\
    \ until it stretches past both ends of the Progress View.\n6.  Hold down the Shift\
    \ key, and click the label, Progress View, and stepper so handles appear around\
    \ all three objects.\n7.  Choose Editor ➤ Resolve Auto Layout Issues ➤ Reset to\
    \ Suggested Constraints in the bottom half of the submenu. This sets constraints\
    \ on the label, Progress View, and stepper.\n8.  Move the mouse over the label,\
    \ hold down the Control key, and Ctrl-drag to the `ViewController.swift` file\
    \ underneath the `@IBOutlet` line.\n9.  Release the Control key and the left mouse\
    \ button. A popup window appears.\n10.  Click in the Name text field and type\
    \ `labelProgress`, and click the Connect button. Xcode creates an `@IBOutlet`\
    \ as follows:\n\n```swift\n@IBOutlet var labelProgress: UILabel!\n```\n\n11. \
    \ Move the mouse over the Progress View, hold down the Control key, and Ctrl-drag\
    \ to the `ViewController.swift` file underneath the `class ViewController` line.\n\
    12.  Release the Control key and the left mouse button. A popup window appears.\n\
    13.  Click in the Name text field and type `progressView`, and click the Connect\
    \ button. Xcode creates an `@IBOutlet` as follows:\n\n```swift\n@IBOutlet var\
    \ progressView: UIProgressView!\n```\n\n14.  Move the mouse over the stepper,\
    \ hold down the Control key, and Ctrl-drag to the `ViewController.swift` file\
    \ underneath the `@IBOutlet` line.\n15.  Release the Control key and the left\
    \ mouse button. A popup window appears.\n16.  Click in the Name text field and\
    \ type `stepperObject`, and click the Connect button. Xcode creates an `@IBOutlet`\
    \ as follows:\n\n```swift\n@IBOutlet var stepperObject: UIStepper!\n```\n\n17.\
    \  Move the mouse over the stepper, hold down the Control key, and Ctrl-drag to\
    \ the `ViewController.swift` file above the last curly bracket at the bottom of\
    \ the file.\n18.  Release the Control key and the left mouse button. A popup window\
    \ appears.\n19.  Click in the Name text field, type `stepperChanged`, click in\
    \ the Type popup menu and choose `UIStepper`, and click the Connect button. Xcode\
    \ creates an `@IBAction` method as follows:\n\n```swift\n@IBAction func stepperChanged(_\
    \ sender: UIStepper) {\n}\n```\n\n20.  Choose View ➤ Standard Editor ➤ Show Standard\
    \ Editor, or click the Standard Editor icon in the upper right corner of the Xcode\
    \ window.\n21.  Click the `ViewController.swift` file in the Navigator pane.\n\
    22.  Edit the `stepperChanged` `IBAction` method as follows:\n\n```swift\n@IBAction\
    \ func stepperChanged(_ sender: UIStepper) {\n    labelProgress.text = \"Completed\
    \ \\(Int(stepperObject.value * 10)) of 10 tasks\"\n    progressView.progress =\
    \ Float(stepperObject.value)\n}\n```\n\nThe first line retrieves the value from\
    \ the stepper, multiplies it by 10, and converts the value to an integer. The\
    \ second line takes the value of the stepper, converts it to a `Float` value,\
    \ and stores this value in the Progress View, which displays the value by filling\
    \ the Progress View.\n\n23.  Edit the `viewDidLoad` method to add the following\
    \ three lines:\n\n```swift\nprogressView.progress = 0\nstepperObject.stepValue\
    \ = 0.1\nstepperObject.maximumValue = 1.0\n```\n\nThe first line sets the Progress\
    \ View value to 0 so it appears on the user interface completely empty. The second\
    \ line defines the stepper to increment values by 0.1. The third line defines\
    \ the maximum stepper value as 1.0. The entire `ViewController.swift` file should\
    \ look like this:\n\n```swift\nimport UIKit\nclass ViewController: UIViewController\
    \ {\n    var counter = 0\n    @IBOutlet var labelProgress: UILabel!\n    @IBOutlet\
    \ var progressView: UIProgressView!\n    @IBOutlet var stepperObject: UIStepper!\n\
    \    @IBOutlet var activityView: UIActivityIndicatorView!\n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        activityView.hidesWhenStopped = true\n\
    \        progressView.progress = 0\n        stepperObject.stepValue = 0.1\n  \
    \      stepperObject.maximumValue = 1.0\n        // Do any additional setup after\
    \ loading the view, typically from a nib.\n    }\n    @IBAction func runButton(_\
    \ sender: UIButton) {\n        Timer.scheduledTimer(withTimeInterval: 1.0, repeats:\
    \ true) { timer in\n            self.activityView.startAnimating()\n         \
    \   self.counter += 1\n            if self.counter >= 5 {\n                self.activityView.stopAnimating()\n\
    \                timer.invalidate()\n                self.counter = 0\n      \
    \      }\n        }\n    }\n    @IBAction func stepperChanged(_ sender: UIStepper)\
    \ {\n        labelProgress.text = \"Completed \\(Int(stepperObject.value * 10))\
    \ of 10 tasks\"\n        progressView.progress = Float(stepperObject.value)\n\
    \    }\n}\n```\n\n24.  Click the Run button or choose Product ➤ Run. The Simulator\
    \ window appears.\n25.  Click the `+` icon on the stepper multiple times. Notice\
    \ that each time you click the `+` icon on the stepper, the Progress View appears\
    \ more filled and the label displays the progress, as shown in Figure 8-6.\n26.\
    \  Choose Simulator ➤ Quit Simulator to return to Xcode."
