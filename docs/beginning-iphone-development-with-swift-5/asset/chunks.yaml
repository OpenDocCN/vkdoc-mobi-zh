    \nFigure 10-4\n\nSwitches are often used to turn settings on or off\n\nThe three\
    \ common properties of a switch to modify include\n\n*   isOn – Determines if\
    \ a switch has a value of true (on) or false (off)\n\n*   onTintColor – Determines\
    \ the color to display when a switch’s isOn property is true (on)\n\n*   tintColor –\
    \ Determines the color to display when a switch’s isOn property is false (off)\n\
    \nTo see how to use a switch, follow these steps:\n\n1.  Make sure your ControlApp\
    \ project is loaded in Xcode.\n\n2.  Click the Main.storyboard file in the Navigator\
    \ pane. Xcode displays the single view.\n\n3.  Click the Library icon to open\
    \ the Object Library window.\n\n4.  Drag and drop a label and a switch on the\
    \ view.\n\n5.  Hold down the SHIFT key and click the switch and label to select\
    \ both of them.\n\n6.  Choose Editor ➤ Resolve Auto Layout Issues ➤ Reset to Suggested\
    \ Constraints at the top half of the submenu. This adds constraints to switch\
    \ and label.\n\n7.  Choose View ➤ Assistant Editor ➤ Show Assistant Editor, or\
    \ click the Assistant Editor icon. Xcode displays the Main.storyboard and ViewController.swift\
    \ file side by side.\n\n8.  Move the mouse pointer over the label, hold down the\
    \ Control key, and Ctrl-drag from the label to the ViewController.swift file underneath\
    \ the IBOutlet line.\n\n9.  Release the Control key and the left mouse button.\
    \ A popup window appears.\n\n10.  Click in the Name text field, type **labelSwitch**,\
    \ and click the Connect button. Xcode creates an IBOutlet variable as follows:\n\
    \n```\n    @IBOutlet var labelSwitch: UILabel!\n    ```\n\n1.  Move the mouse\
    \ pointer over the switch, hold down the Control key, and Ctrl-drag from the button\
    \ to the ViewController.swift file underneath the IBOutlet line.\n\n2.  Release\
    \ the Control key and the left mouse button. A popup window appears.\n\n3.  Click\
    \ in the Name text field, type **switchObject**, and click the Connect button.\
    \ Xcode creates an IBOutlet variable as follows:\n\n```\n    @IBOutlet var switchObject:\
    \ UISwitch!\n    ```\n\n1.  Move the mouse pointer over the switch, hold down\
    \ the Control key, and Ctrl-drag just above the last curly bracket at the bottom\
    \ of the ViewController.swift file.\n\n2.  Release the Control key and the left\
    \ mouse button. A popup window appears.\n\n3.  Click in the Name text field, type\
    \ **switchChanged**, click in the Type popup menu and choose UISwitch, and click\
    \ the Connect button. Xcode creates an IBAction method as follows:\n\n```\n  \
    \  @IBAction func switchChanged(_ sender: UISwitch) {\n    }\n    ```\n\n4.  Edit\
    \ the switchChanged IBAction method as follows:\n\n```\n    @IBAction func switchChanged(_\
    \ sender: UISwitch) {\n    if switchObject.isOn {\n    labelSwitch.text = \"On\"\
    \n    } else {\n    labelSwitch.text = \"Off\"\n    }\n    }\n    ```\n\n5.  Edit\
    \ the touchInside IBAction method as follows:\n\n```\n    @IBAction func touchInside(_\
    \ sender: UIButton) {\n    buttonObject.setTitle(\"New\", for: UIControl.State.normal)\n\
    \    switchObject.onTintColor = UIColor.red\n    switchObject.tintColor = UIColor.blue\n\
    \    }\n    ```\n\nThe touchInside IBAction changes the color of the switch. Each\
    \ time you tap on the switch, it changes from on to off (or vice versa), displays\
    \ the text “On” or “Off” in the labelSwitch object, and displays different on\
    \ and off colors. The entire ViewController.swift file should look like this:\n\
    \n```\n    import UIKit\n    class ViewController: UIViewController {\n    @IBOutlet\
    \ var buttonObject: UIButton!\n    @IBOutlet var labelSwitch: UILabel!\n    @IBOutlet\
    \ var switchObject: UISwitch!\n    override func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    // Do any additional setup after loading the view, typically from a nib.\n\
    \    }\n    @IBAction func touchInside(_ sender: UIButton) {\n    buttonObject.setTitle(\"\
    New\", for: UIControl.State.normal)\n    switchObject.onTintColor = UIColor.red\n\
    \    switchObject.tintColor = UIColor.blue\n    }\n    @IBAction func switchChanged(_\
    \ sender: UISwitch) {\n    if switchObject.isOn {\n    labelSwitch.text = \"On\"\
    \n    } else {\n    labelSwitch.text = \"Off\"\n    }\n    }\n    }\n    ```\n\
    \n6.  Choose View ➤ Standard Editor ➤ Show Standard Editor, or click the Standard\
    \ Editor icon in the upper right corner of the Xcode window.\n\n7.  Click the\
    \ Run button or choose Product ➤ Run. The Simulator window appears.\n\n8.  Click\
    \ the switch. Notice that each time you click the switch, it changes its appearance\
    \ from on and off and displays “On” or “Off” in the label nearby as shown in Figure\
    \ [10-5](#329781_5_En_10_Chapter.xhtml#Fig5).\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig5_HTML.jpg](images/329781_5_En_10_Chapter/329781_5_En_10_Fig5_HTML.jpg)\n\
    \nFigure 10-5\n\nThe label displays whether a switch is on or off\n\n9.  Click\
    \ the button. This runs the Swift code in the touchInside IBAction method, which\
    \ changes the colors of the switch.\n\n10.  Click the switch. Notice that each\
    \ time you click the switch, you can see the colors red and blue appear instead\
    \ of the default colors.\n\n11.  Chose Simulator ➤ Quit Simulator to return to\
    \ Xcode."
  trans: "\n# 使用开关\n\n在许多应用中，用户可以通过开关来开启或关闭某些功能。当用户需要在两个确切的选项之间进行选择时，这正是使用开关的绝佳时机。顾名思义，开关可以向左或向右滑动，分别表示“开”或“关”的状态。当开关打开时，会显示一种颜色，并且开关滑块位于右侧。当开关关闭时，会显示另一种颜色，并且开关滑块位于左侧，如图\
    \ 10-4 所示。\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig4_HTML.jpg](img/329781_5_En_10_Fig4_HTML.jpg)\n\
    \n图 10-4\n\n开关常用来切换设置的开启或关闭状态\n\n开关中可修改的三个常见属性包括：\n\n- `isOn` – 决定开关的值是 `true`（开）还是\
    \ `false`（关）\n- `onTintColor` – 决定当开关的 `isOn` 属性为 `true`（开）时显示的颜色\n- `tintColor`\
    \ – 决定当开关的 `isOn` 属性为 `false`（关）时显示的颜色\n\n要了解如何使用开关，请遵循以下步骤：\n\n1. 确保你的 `ControlApp`\
    \ 项目已在 Xcode 中加载。\n\n2. 在导航器面板中点击 `Main.storyboard` 文件。Xcode 会显示该单一视图。\n\n3. 点击库图标以打开对象库窗口。\n\
    \n4. 在视图上拖放一个标签和一个开关。\n\n5. 按住 Shift 键，同时点击开关和标签以选中这两个元素。\n\n6. 选择 编辑器 ➤ 解决自动布局问题\
    \ ➤ 重置为建议的约束（位于子菜单的上半部分）。这将为开关和标签添加约束。\n\n7. 选择 视图 ➤ 辅助编辑器 ➤ 显示辅助编辑器，或点击辅助编辑器图标。Xcode\
    \ 会并排显示 `Main.storyboard` 和 `ViewController.swift` 文件。\n\n8. 将鼠标指针移到标签上，按住 Control\
    \ 键，然后从标签拖拽到 `ViewController.swift` 文件中 `IBOutlet` 行的下方。\n\n9. 松开 Control 键和鼠标左键。会弹出一个窗口。\n\
    \n10. 在“名称”文本框中点击，输入 `labelSwitch`，然后点击“连接”按钮。Xcode 会创建一个如下的 `IBOutlet` 变量：\n\n\
    ```\n    @IBOutlet var labelSwitch: UILabel!\n```\n\n11. 将鼠标指针移到开关上，按住 Control\
    \ 键，然后从开关拖拽到 `ViewController.swift` 文件中 `IBOutlet` 行的下方。\n\n12. 松开 Control 键和鼠标左键。会弹出一个窗口。\n\
    \n13. 在“名称”文本框中点击，输入 `switchObject`，然后点击“连接”按钮。Xcode 会创建一个如下的 `IBOutlet` 变量：\n\
    \n```\n    @IBOutlet var switchObject: UISwitch!\n```\n\n14. 将鼠标指针移到开关上，按住 Control\
    \ 键，然后从开关拖拽到 `ViewController.swift` 文件底部最后一个大括号的上方。\n\n15. 松开 Control 键和鼠标左键。会弹出一个窗口。\n\
    \n16. 在“名称”文本框中点击，输入 `switchChanged`，在“类型”弹出菜单中点击并选择 `UISwitch`，然后点击“连接”按钮。Xcode\
    \ 会创建一个如下的 `IBAction` 方法：\n\n```\n    @IBAction func switchChanged(_ sender: UISwitch)\
    \ {\n    }\n```\n\n17. 按如下方式编辑 `switchChanged` 这个 `IBAction` 方法：\n\n```\n    @IBAction\
    \ func switchChanged(_ sender: UISwitch) {\n    if switchObject.isOn {\n    labelSwitch.text\
    \ = \"On\"\n    } else {\n    labelSwitch.text = \"Off\"\n    }\n    }\n```\n\n\
    18. 按如下方式编辑 `touchInside` 这个 `IBAction` 方法：\n\n```\n    @IBAction func touchInside(_\
    \ sender: UIButton) {\n    buttonObject.setTitle(\"New\", for: UIControl.State.normal)\n\
    \    switchObject.onTintColor = UIColor.red\n    switchObject.tintColor = UIColor.blue\n\
    \    }\n```\n\n`touchInside` 这个 `IBAction` 会改变开关的颜色。每次点击开关，它都会在开与关之间切换，在 `labelSwitch`\
    \ 对象中显示“On”或“Off”文本，并显示不同的开、关状态颜色。完整的 `ViewController.swift` 文件应如下所示：\n\n```\n\
    \    import UIKit\n    class ViewController: UIViewController {\n    @IBOutlet\
    \ var buttonObject: UIButton!\n    @IBOutlet var labelSwitch: UILabel!\n    @IBOutlet\
    \ var switchObject: UISwitch!\n    override func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    // Do any additional setup after loading the view, typically from a nib.\n\
    \    }\n    @IBAction func touchInside(_ sender: UIButton) {\n    buttonObject.setTitle(\"\
    New\", for: UIControl.State.normal)\n    switchObject.onTintColor = UIColor.red\n\
    \    switchObject.tintColor = UIColor.blue\n    }\n    @IBAction func switchChanged(_\
    \ sender: UISwitch) {\n    if switchObject.isOn {\n    labelSwitch.text = \"On\"\
    \n    } else {\n    labelSwitch.text = \"Off\"\n    }\n    }\n    }\n```\n\n19.\
    \ 选择 视图 ➤ 标准编辑器 ➤ 显示标准编辑器，或点击 Xcode 窗口右上角的标准编辑器图标。\n\n20. 点击“运行”按钮，或选择 产品 ➤ 运行。模拟器窗口会打开。\n\
    \n21. 点击开关。注意，每次点击开关，它的外观都会在打开和关闭之间切换，并在附近的标签中显示“On”或“Off”，如图 10-5 所示。\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig5_HTML.jpg](img/329781_5_En_10_Fig5_HTML.jpg)\n\
    \n图 10-5\n\n标签显示开关是打开还是关闭\n\n22. 点击按钮。这会运行 `touchInside` 这个 `IBAction` 方法中的 Swift\
    \ 代码，从而改变开关的颜色。\n\n23. 点击开关。注意，每次点击开关，你都会看到红色和蓝色替代了默认颜色。\n\n24. 选择 模拟器 ➤ 退出模拟器，以返回到\
    \ Xcode。\n"
- fmt: "# Using a Segmented Control\n\nA button is fine for displaying a single command,\
    \ but when you need to display multiple commands, then multiple buttons can make\
    \ a user interface appear cluttered. When you need to display multiple buttons\
    \ in a limited amount of space, you can use a segmented control.\n\nA segmented\
    \ control can contain two or more segments where each segment acts like an individual\
    \ button. You can define the number of segments through the Attributes Inspector\
    \ pane, but you can also later add more segments using Swift code.\n\nIn the Attributes\
    \ Inspector, you can customize a segmented control in the following ways as shown\
    \ in Figure [10-6](#329781_5_En_10_Chapter.xhtml#Fig6):\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig6_HTML.jpg](images/329781_5_En_10_Chapter/329781_5_En_10_Fig6_HTML.jpg)\n\
    \n*Figure 10-6* Modifying a segmented control in the Attributes Inspector\n\n\
    - **Segments** – Defines the number of segments (buttons) in a segmented control\n\
    - **Segment** – A popup menu that lets you choose which segment to modify\n- **Title**\
    \ – Defines the text that appears on the segment defined by the Segment popup\
    \ menu\n- **Image** – Defines an image to appear on the segment defined by the\
    \ Segment popup menu\n- **Selected** – A check box that defines which segment\
    \ appears selected (highlighted) where only one segment in an entire segmented\
    \ control can be selected\n\nEvery segmented control identifies its different\
    \ segments by an index number where the segment on the far left is at index 0,\
    \ the next segment to the right is at index 1, and so on. Xcode automatically\
    \ assigns an index number to each segment based on the position of that segment.\
    \ You can use the segment index number to identify which segment the user taps.\n\
    \nOnce you’ve added a segmented control to a view, you can add or remove segments\
    \ using Swift code. To see how to modify a segmented control, follow these steps:\n\
    \n1. Click the `Main.storyboard` file in the Navigator pane. Xcode displays the\
    \ storyboard user interface.\n2. Click the Library icon to display the Object\
    \ Library window.\n3. Drag and drop a segmented control anywhere onto the view.\n\
    4. Choose Editor ➤ Resolve Auto Layout Issues ➤ Reset to Suggested Constraints\
    \ on the top half of the submenu. Xcode adds constraints to the segmented control.\n\
    5. Double-click the segment labeled \"First\" on the left of the segmented control.\
    \ Xcode highlights the title on the segment as shown in Figure [10-7](#329781_5_En_10_Chapter.xhtml#Fig7).\n\
    \n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig7_HTML.jpg](images/329781_5_En_10_Chapter/329781_5_En_10_Fig7_HTML.jpg)\n\
    \n*Figure 10-7* Double-clicking directly a segmented control title lets you edit\
    \ that title\n\n6. Type `One` and press ENTER to replace the First label. Double-clicking\
    \ directly an object that displays text is one way to modify the text. A second\
    \ way is to use the Attributes Inspector pane.\n7. Choose View ➤ Inspectors ➤\
    \ Show Attributes Inspector, or click the Attributes Inspector icon in the upper\
    \ right corner of the Xcode window.\n8. Click in the Segment popup menu and choose\
    \ Segment 1 – Second. The Title text field displays the current title for the\
    \ chosen segment as shown in Figure [10-8](#329781_5_En_10_Chapter.xhtml#Fig8).\n\
    \n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig8_HTML.jpg](images/329781_5_En_10_Chapter/329781_5_En_10_Fig8_HTML.jpg)\n\
    \n*Figure 10-8* Changing a segment title in the Attributes Inspector pane\n\n\
    9. Click in the Title text field and change the text to `Two`. Then press ENTER.\
    \ Notice that you can change the title on each segment either by double-clicking\
    \ directly the title or by changing the Title text field of the segment.\n10.\
    \ Choose View ➤ Assistant Editor ➤ Show Assistant Editor, or click the Assistant\
    \ Editor icon. Xcode displays the `Main.storyboard` and `ViewController.swift`\
    \ file side by side.\n11. Move the mouse pointer over the segmented control, hold\
    \ down the Control key, and Ctrl-drag from the segmented control to the `ViewController.swift`\
    \ file underneath the `IBOutlet` line.\n12. Release the Control key and the left\
    \ mouse button. A popup window appears.\n13. Click in the Name text field, type\
    \ `segmentedControl`, and click the Connect button. Xcode creates an `IBOutlet`\
    \ variable as follows:\n\n```swift\n@IBOutlet var segmentedControl: UISegmentedControl!\n\
    ```\n\n14. Move the mouse pointer over the segmented control, hold down the Control\
    \ key, and Ctrl-drag from the segmented control to the `ViewController.swift`\
    \ file above the last curly bracket at the bottom of the file.\n15. Release the\
    \ Control key and the left mouse button. A popup window appears.\n16. Click in\
    \ the Name text field, type `segmentedControlTapped`, and click the Connect button.\
    \ Xcode creates an `IBAction` method.\n17. Modify this `segmentedControlTapped`\
    \ IBAction method as follows:\n\n```swift\n@IBAction func segmentedControlTapped(_\
    \ sender: UISegmentedControl) {\n    switch segmentedControl.selectedSegmentIndex\
    \ {\n    case 0:\n        labelSwitch.text = \"One\"\n    case 1:\n        labelSwitch.text\
    \ = \"Two\"\n    default:\n        labelSwitch.text = \"Three\"\n    }\n}\n```\n\
    \nThis `segmentedControlTapped` IBAction method uses the `.selectedSegmentIndex`\
    \ property to identify which segment the user tapped. Then a `switch` statement\
    \ determines which segment the user tapped (based on its index number) and displays\
    \ `One`, `Two`, or `Three` in the label to identify which segment the user tapped.\n\
    \n18. Edit the `viewDidLoad` method as follows:\n\n```swift\noverride func viewDidLoad()\
    \ {\n    super.viewDidLoad()\n    segmentedControl.insertSegment(withTitle: \"\
    Three\", at: 2, animated: true)\n    segmentedControl.setWidth(50, forSegmentAt:\
    \ 0)\n    segmentedControl.setWidth(50, forSegmentAt: 1)\n    segmentedControl.setWidth(50,\
    \ forSegmentAt: 2)\n    // Do any additional setup after loading the view, typically\
    \ from a nib.\n}\n```\n\nThis Swift code adds a third segment to the existing\
    \ segmented control and it sets the width of each segment in the segmented control.\
    \ The entire `ViewController.swift` file should look like this:\n\n```swift\n\
    import UIKit\nclass ViewController: UIViewController {\n    @IBOutlet var buttonObject:\
    \ UIButton!\n    @IBOutlet var labelSwitch: UILabel!\n    @IBOutlet var switchObject:\
    \ UISwitch!\n    @IBOutlet var segmentedControl: UISegmentedControl!\n    override\
    \ func viewDidLoad() {\n        super.viewDidLoad()\n        segmentedControl.insertSegment(withTitle:\
    \ \"Three\", at: 2, animated: true)\n        segmentedControl.setWidth(50, forSegmentAt:\
    \ 0)\n        segmentedControl.setWidth(50, forSegmentAt: 1)\n        segmentedControl.setWidth(50,\
    \ forSegmentAt: 2)\n        // Do any additional setup after loading the view,\
    \ typically from a nib.\n    }\n    @IBAction func touchInside(_ sender: UIButton)\
    \ {\n        buttonObject.setTitle(\"New\", for: UIControl.State.normal)\n   \
    \     switchObject.onTintColor = UIColor.red\n        switchObject.tintColor =\
    \ UIColor.blue\n    }\n    @IBAction func switchChanged(_ sender: UISwitch) {\n\
    \        if switchObject.isOn {\n            labelSwitch.text = \"On\"\n     \
    \   } else {\n            labelSwitch.text = \"Off\"\n        }\n    }\n    @IBAction\
    \ func segmentedControlTapped(_ sender: UISegmentedControl) {\n        switch\
    \ segmentedControl.selectedSegmentIndex {\n        case 0:\n            labelSwitch.text\
    \ = \"One\"\n        case 1:\n            labelSwitch.text = \"Two\"\n       \
    \ default:\n            labelSwitch.text = \"Three\"\n        }\n    }\n}\n```\n\
    \n19. Click the Run button or choose Product ➤ Run. The Simulator window appears.\n\
    20. Click the second or third segment in the segmented control. Notice that the\
    \ segment you clicked now appears highlighted and the label displays the name\
    \ of the segment you clicked such as \"Two\" or \"Three\".\n21. Click any segment.\
    \ Notice that each time you click a different segment, that segment appears highlighted\
    \ and the label displays different text.\n22. Choose Simulator ➤ Quit Simulator\
    \ to return to Xcode."
