    \ = \"New back text\"\n    navigationItem.backBarButtonItem = customButton\n \
    \   }\n    }\n    ```\n\n5.  Click the Run button or choose Product ➤ Run. The\
    \ Simulator window appears, displaying the root view screen with “Prompt text”\
    \ at the top and “Title text” underneath (see Figure [17-23](#329781_5_En_17_Chapter.xhtml#Fig23)).\n\
    \n6.  Click the screen. The next view appears. Notice that this second view displays\
    \ the Back button text as “New back text” and it appears in red.\n\n7.  Choose\
    \ Simulator ➤ Quit Simulator to return to Xcode.\n\n### Modifying the Color of\
    \ the Navigation Bar\n\nThe barTintColor property defines the color of the navigation\
    \ bar. Keep in mind that whatever color you choose for the navigation bar should\
    \ contrast with any colors defined for the Back button to make it easy to see.\n\
    \nTo see how to change the color of the navigation bar, follow these steps:\n\n\
    1.  Make sure the NavigationTextApp project is loaded into Xcode.\n\n2.  Click\
    \ the ViewController.swift file in the Navigator pane.\n\n3.  Modify the viewDidLoad\
    \ method as follows:\n\n    ```\n    override func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    navigationItem.prompt = \"Prompt text\"\n    navigationItem.title = \"Title\
    \ text\"\n    navigationController?.navigationBar.tintColor = UIColor.red\n  \
    \  navigationController?.navigationBar.barTintColor = UIColor.green\n    // Do\
    \ any additional setup after loading the view.\n    }\n    ```\n\n    Notice that\
    \ the tintColor property of the navigation bar defines the Back button text, while\
    \ the barTintColor property defines the color of the navigation bar.\n\n4.  Click\
    \ the Run button or choose Product ➤ Run. The Simulator window appears. Notice\
    \ that the navigation bar now appears in green.\n\n5.  Click the screen. The next\
    \ view appears.\n\n6.  Choose Simulator ➤ Quit Simulator to return to Xcode."
  trans: "\n# 修改返回按钮\n\n导航控制器始终在视图的左上角显示一个返回按钮，以便用户可以返回上一个视图。你可以修改返回按钮上显示的颜色和文字。修改返回按钮文字有以下三种方式：\n\
    \n- 如果上一个视图没有标题，则返回按钮默认显示“返回”。\n- 如果上一个视图有标题，则返回按钮显示该标题。\n- 如果你自定义了`backBarButtonItem`属性，则可以定义新的返回按钮文字。\n\
    \n返回按钮文字的默认颜色为浅蓝色，但你可以通过修改导航栏的`tintColor`属性来定义不同的颜色。要了解如何更改返回按钮的文字和颜色，请按照以下步骤操作：\n\
    \n1. 确保 `NavigationTextApp` 项目已加载到 Xcode 中。\n2. 单击导航器窗格中的 `ViewController.swift`\
    \ 文件。\n3. 修改 `prepare(for:sender:)` 函数，如下所示：\n\n    ```\n    override func prepare(for\
    \ segue: UIStoryboardSegue, sender: Any?) {\n        let nextVC = segue.destination\
    \ as! SecondViewController\n        nextVC.navigationItem.prompt = \"New prompt\
    \ here\"\n        nextVC.navigationItem.title = \"New title here\"\n        let\
    \ customButton = UIBarButtonItem()\n        customButton.title = \"New back text\"\
    \n        navigationItem.backBarButtonItem = customButton\n    }\n    ```\n\n\
    \    这最后三行代码创建了一个新的 `UIBarButtonItem`，定义了一个新标题，然后将这个新的栏按钮存储在 `backBarButtonItem`\
    \ 属性中，以定义返回按钮上显示的新文字。\n\n4. 修改 `viewDidLoad` 方法，如下所示：\n\n    ```\n    override\
    \ func viewDidLoad() {\n        super.viewDidLoad()\n        navigationItem.prompt\
    \ = \"Prompt text\"\n        navigationItem.title = \"Title text\"\n        navigationController?.navigationBar.tintColor\
    \ = UIColor.red\n        // Do any additional setup after loading the view.\n\
    \    }\n    ```\n\n    导航栏上的 `tintColor` 属性（由导航控制器定义）决定了返回按钮文字的颜色。上述代码将返回按钮文字改为红色，但你可以选择任何颜色，例如黄色或绿色。\n\
    \n    完整的 `ViewController.swift` 文件应如下所示：\n\n    ```\n    import UIKit\n    class\
    \ ViewController: UIViewController {\n        override func viewDidLoad() {\n\
    \            super.viewDidLoad()\n            navigationItem.prompt = \"Prompt\
    \ text\"\n            navigationItem.title = \"Title text\"\n            navigationController?.navigationBar.tintColor\
    \ = UIColor.red\n            // Do any additional setup after loading the view.\n\
    \        }\n        override func touchesBegan(_ touches: Set, with event: UIEvent?)\
    \ {\n            performSegue(withIdentifier: \"firstLink\", sender: self)\n \
    \       }\n        override func prepare(for segue: UIStoryboardSegue, sender:\
    \ Any?) {\n            let nextVC = segue.destination as! SecondViewController\n\
    \            nextVC.navigationItem.prompt = \"New prompt here\"\n            nextVC.navigationItem.title\
    \ = \"New title here\"\n            let customButton = UIBarButtonItem()\n   \
    \         customButton.title = \"New back text\"\n            navigationItem.backBarButtonItem\
    \ = customButton\n        }\n    }\n    ```\n\n5. 单击“运行”按钮或选择“产品”➤“运行”。此时将显示模拟器窗口，顶部为“Prompt\
    \ text”文本，其下方为“Title text”文本（参见图 17-23）。\n6. 单击屏幕。将出现下一个视图。请注意，第二个视图将返回按钮文字显示为“New\
    \ back text”，并且颜色为红色。\n7. 选择“模拟器”➤“退出模拟器”以返回 Xcode。\n\n## 修改导航栏的颜色\n\n`barTintColor`\
    \ 属性用于定义导航栏的颜色。请记住，无论你为导航栏选择何种颜色，都应与为返回按钮定义的颜色形成对比，以便清晰可见。\n\n要了解如何更改导航栏的颜色，请按照以下步骤操作：\n\
    \n1. 确保 `NavigationTextApp` 项目已加载到 Xcode 中。\n2. 单击导航器窗格中的 `ViewController.swift`\
    \ 文件。\n3. 修改 `viewDidLoad` 方法，如下所示：\n\n    ```\n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        navigationItem.prompt = \"Prompt text\"\
    \n        navigationItem.title = \"Title text\"\n        navigationController?.navigationBar.tintColor\
    \ = UIColor.red\n        navigationController?.navigationBar.barTintColor = UIColor.green\n\
    \        // Do any additional setup after loading the view.\n    }\n    ```\n\n\
    \    请注意，导航栏的 `tintColor` 属性定义了返回按钮文字，而 `barTintColor` 属性定义了导航栏的颜色。\n\n4. 单击“运行”按钮或选择“产品”➤“运行”。将显示模拟器窗口。请注意，导航栏现在显示为绿色。\n\
    5. 单击屏幕。将出现下一个视图。\n6. 选择“模拟器”➤“退出模拟器”以返回 Xcode。\n"
- fmt: "### Adding Buttons to a Navigation Bar\n\nThe navigation bar always displays\
    \ a Back button on all but the root view. However, you can always add more buttons\
    \ on the right side of the navigation bar. Then you can connect these buttons\
    \ to `IBAction` methods to make them actually do something.\n\nBesides customizing\
    \ your own button titles, Xcode also includes several common types of button types\
    \ that you can choose such as Save, Done, Reply, Camera, Play, Search, or Undo\
    \ as shown in Figure [17-25](#329781_5_En_17_Chapter.xhtml#Fig25).\n\n![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig25_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig25_HTML.jpg)\n\
    \nFigure 17-25: Common types of buttons to place on a navigation bar\n\nTo see\
    \ how to add and customize a button on the navigation bar, follow these steps:\n\
    \n1.  Create a new iOS project using the Single View App template (see Chapter\
    \ [1](#329781_5_En_1_Chapter.xhtml)) and name this new project `NavigationButtonApp`.\
    \ This creates a single view for the user interface.\n2.  Click the `Main.storyboard`\
    \ file in the Navigator pane. Xcode displays the single view.\n3.  Click the View\
    \ Controller Scene in the Document Outline.\n4.  Choose Editor ➤ Embed In ➤ Navigation\
    \ Controller. Xcode displays a Navigation Controller in the storyboard and makes\
    \ the single view the root view of the Navigation Controller (see Figure [17-4](#329781_5_En_17_Chapter.xhtml#Fig4)).\n\
    5.  Click the Library icon to open the Object Library window.\n6.  Drag and drop\
    \ a View Controller to the right of the root view.\n7.  Choose File ➤ New ➤ File.\
    \ Xcode displays a list of templates.\n8.  Choose Cocoa Touch Class under the\
    \ iOS category and click the **Next** button. Another dialog appears, asking for\
    \ a class name and subclass.\n9.  Click in the Class text field and type **`SecondViewController`**.\n\
    10. Click in the Subclass of popup menu and choose `UIViewController`.\n11. Click\
    \ the **Next** button. Xcode asks where to store the file.\n12. Click the **Create**\
    \ button. Xcode displays the `SecondViewController.swift` file in the Navigator\
    \ pane.\n13. Click the `Main.storyboard` file in the Navigator pane and click\
    \ the View Controller icon at the top of the View Controller you just added to\
    \ the storyboard.\n14. Choose View ➤ Inspectors ➤ Show Identity Inspector, or\
    \ click the Identity Inspector icon in the upper right corner of the Xcode window.\n\
    15. Click in the Class popup menu and choose `SecondViewController`.\n16. Move\
    \ the mouse pointer over the View Controller icon of the root view, hold down\
    \ the Control key, and Ctrl-drag over the second View Controller you just added\
    \ (see Figure [17-22](#329781_5_En_17_Chapter.xhtml#Fig22)).\n17. Release the\
    \ Control key and the left mouse button. A popup menu appears (see Figure [17-8](#329781_5_En_17_Chapter.xhtml#Fig8)).\n\
    18. Choose Show. Xcode draws an arrow (segue) linking the root view to the newly\
    \ added View Controller (see Figure [17-9](#329781_5_En_17_Chapter.xhtml#Fig9)).\n\
    19. Click Show segue to “Second View Controller” in the Document Outline. Xcode\
    \ highlights the segue between the two views.\n20. Choose View ➤ Inspectors ➤\
    \ Show Attributes Inspector, or click the Attributes Inspector icon in the upper\
    \ right corner of the Xcode window.\n21. Click in the Identifier text field, type\
    \ **`firstLink`**, and press ENTER.\n22. Click the `ViewController.swift` file\
    \ in the Navigator pane.\n23. Add the following function underneath the `viewDidLoad`\
    \ method:\n    ```\n    override func touchesBegan(_ touches: Set, with event:\
    \ UIEvent?) {\n        performSegue(withIdentifier: \"firstLink\", sender: self)\n\
    \    }\n    ```\n24. Click the `Main.storyboard` file in the Navigator pane.\n\
    25. Click the Library icon to open the Object Library window.\n26. Drag and drop\
    \ a Bar Button Item to the far right of the navigation bar on the root view as\
    \ shown in Figure [17-26](#329781_5_En_17_Chapter.xhtml#Fig26).\n\n    ![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig26_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig26_HTML.jpg)\n\
    \n    Figure 17-26: Dragging a Bar Button Item to the navigation bar on the root\
    \ view\n\n27. Choose View ➤ Inspectors ➤ Show Attributes Inspector, or click the\
    \ Attributes Inspector icon in the upper right corner of the Xcode window.\n28.\
    \ Click in the System Item popup menu and choose Action. Notice that Xcode displays\
    \ an icon on the bar button as shown in Figure [17-27](#329781_5_En_17_Chapter.xhtml#Fig27).\n\
    \n    ![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig27_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig27_HTML.jpg)\n\
    \n    Figure 17-27: Choosing Action from the System Item popup menu\n\n29. Choose\
    \ View ➤ Assistant Editor ➤ Show Assistant Editor. Xcode displays the `Main.storyboard`\
    \ and `ViewController.swift` file side by side.\n30. Move the mouse pointer over\
    \ the bar button that displays the Action icon, hold down the Control key, and\
    \ Ctrl-drag from the bar button to the space above the last curly bracket in the\
    \ bottom of the `ViewController.swift` file.\n31. Release the Control key and\
    \ the left mouse button. A popup window appears.\n32. Click in the Name text field\
    \ and type **`buttonTapped`**.\n33. Click in the Type popup menu, choose `UIBarButtonItem`,\
    \ and then click the Connect button. Xcode creates an `IBAction` method.\n34.\
    \ Edit the `buttonTapped` `IBAction` method as follows:\n    ```\n    @IBAction\
    \ func buttonTapped(_ sender: UIBarButtonItem) {\n        let alert = UIAlertController(title:\
    \ \"Message\", message: \"Bar button tapped\", preferredStyle: .alert)\n     \
    \   let okAction = UIAlertAction(title: \"OK\", style: .default, handler: { action\
    \ -> Void in\n            //Just dismiss the action sheet\n        })\n      \
    \  alert.addAction(okAction)\n        self.present(alert, animated: true, completion:\
    \ nil)\n    }\n    ```\n\nIf you run the app at this point, a view will appear\
    \ with a button in the upper right corner. Clicking this button will display an\
    \ alert controller. Clicking the view will display the second view with a Back\
    \ button in the upper left corner.\n\nIf you want navigational bar buttons to\
    \ appear on this second view, you must first add a navigation item (navigation\
    \ bar) on this second View Controller. Then you can add a bar button onto the\
    \ navigation item.\n\n35. Choose View ➤ Standard Editor ➤ Show Standard Editor.\
    \ Xcode displays the `Main.storyboard` and `ViewController.swift` file side by\
    \ side.\n36. Click the `Main.storyboard` file in the Navigator pane.\n37. Click\
    \ the Second View Controller icon that appears at the top of the second View Controller.\n\
    38. Choose Editor ➤ Embed In ➤ Navigation Controller. Xcode embeds the second\
    \ View Controller inside a Navigation Controller as shown in Figure [17-28](#329781_5_En_17_Chapter.xhtml#Fig28).\n\
    \n    ![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig28_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig28_HTML.jpg)\n\
    \n    Figure 17-28: Adding a navigation item to the second View Controller\n\n\
    39. Click the Library icon to open the Object Library window.\n40. Drag and drop\
    \ a Bar Button Item to the far right of the navigation bar on the second View\
    \ Controller’s root view as shown in Figure [17-29](#329781_5_En_17_Chapter.xhtml#Fig29).\n\
    \n    ![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig29_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig29_HTML.jpg)\n\
    \n    Figure 17-29: Dragging and dropping a Bar Button Item to the second View\
    \ Controller’s navigation bar\n\n41. Choose View ➤ Inspectors ➤ Show Attributes\
    \ Inspector, or click the Attributes Inspector icon in the upper right corner\
    \ of the Xcode window.\n42. Click in the System Item popup menu and choose Done.\
    \ Notice that Xcode displays “Done” on the bar button as shown in Figure [17-30](#329781_5_En_17_Chapter.xhtml#Fig30).\n\
    \n    ![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig30_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig30_HTML.jpg)\n\
    \n    Figure 17-30: Choosing Done from the System Item popup menu\n\n43. Choose\
    \ View ➤ Assistant Editor ➤ Show Assistant Editor. Xcode displays the `Main.storyboard`\
    \ and `SecondViewController.swift` file side by side."
