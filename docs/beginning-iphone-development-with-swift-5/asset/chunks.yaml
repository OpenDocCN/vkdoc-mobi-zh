  trans: "\n# 使用日期选择器\n\n当应用需要用户输入日期和/或时间时，最好使用日期选择器来提供有效选项列表。用户可以通过旋转日期选择器上的不同滚轮来选择星期、日期和时间，而无需输入任何内容。\n\
    \n将日期选择器从对象库窗口拖放到视图后，您可以通过在属性检查器中修改以下选项来自定义日期选择器，如图 12-6 所示：\n\n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig6_HTML.jpg](img/329781_5_En_12_Fig6_HTML.jpg)\n\
    \n图 12-6 – 属性检查器面板可让您自定义日期选择器\n\n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig7_HTML.jpg](img/329781_5_En_12_Fig7_HTML.jpg)\n\
    \n图 12-7 – 将日期选择器的模式更改为倒计时器\n\n- **模式** – 定义日期选择器显示时间、日期、时间和日期，或倒计时器，如图 12-7 所示\n\
    - **区域设置** – 覆盖系统默认的区域设置属性，该属性定义本地语言，例如美式英语或澳式英语\n- **间隔** – 定义以分钟为单位的时间间隔，从 1\
    \ 分钟到 30 分钟\n- **日期** – 定义初始显示的日期\n- **最小日期** – 定义允许的最小日期\n- **最大日期** – 定义允许的最大日期\n\
    \n无论您为日期选择器选择哪种模式，其值都存储为 `NSDate` 数据类型。要将此 `NSDate` 数据转换为文本，需要两步过程。首先，您需要创建一个表示\
    \ `DateFormatter` 的常量，例如：\n\n```\nlet dateFormatter: DateFormatter = DateFormatter()\n\
    ```\n\n其次，您必须定义 `.dateStyle` 和 `.timeStyle` 属性来显示日期和时间。要定义日期和时间样式，您需要将 `DateFormatter`\
    \ 常量的 `.dateStyle` 和 `.timeStyle` 属性设置为以下选项之一：\n\n- `.none` – 不显示日期或时间\n- `.short`\
    \ – 以“11/23/19”格式显示日期，以“3:48 PM”格式显示时间\n- `.medium` – 以“Nov 23, 2019”格式显示日期，以“3:48:21\
    \ PM”格式显示时间\n- `.long` – 以“November 23, 2019”格式显示日期，以“3:48:21 PM EST”格式显示时间\n\
    - `.full` – 以“Saturday, November 23, 2019 AD”格式显示日期，以“3:48 PM Eastern Standard\
    \ Time”格式显示时间\n\n```\ndateFormatter.dateStyle = .short\ndateFormatter.timeStyle\
    \ = .short\n```\n\n最后，您必须检索日期选择器中当前显示的日期/时间。由于日期选择器中存储的日期/时间值是 `NSDate` 数据类型，您必须使用如下代码将其\
    \ `.date` 属性转换为字符串：\n\n```\nlet selectedDate: String = dateFormatter.string(from:\
    \ myDatePicker.date)\n```\n\n在下面的示例中，我们将看到如何以两种不同方式检索日期选择器中显示的值。首先，当用户更改日期选择器时，我们将检索日期选择器的值。其次，我们将检索日期选择器的值并将其显示在警报控制器上。\n\
    \n要了解如何在按钮上定义标题，请遵循以下步骤：\n\n1. 使用单视图应用模板（见第 1 章）创建一个新的 iOS 项目，并将此新项目命名为 `DatePickerApp`。这将为用户界面创建一个单视图。\n\
    \n2. 在导航器面板中点击 `Main.storyboard` 文件。Xcode 会显示该单视图。\n\n3. 点击库图标以打开对象库窗口。\n\n4.\
    \ 将按钮和日期选择器拖放到视图上的任意位置，如图 12-8 所示。\n\n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig8_HTML.jpg](img/329781_5_En_12_Fig8_HTML.jpg)\n\
    \n图 12-8 – 对象库窗口中的日期选择器\n\n5. 选择 **编辑器** ➤ **解决自动布局问题** ➤ **设置为建议的约束**。Xcode 会为您的按钮和日期选择器添加约束。\n\
    \n6. 选择 **视图** ➤ **助理编辑器** ➤ **显示助理编辑器**。Xcode 会并排显示 `Main.storyboard` 和 `ViewController.swift`\
    \ 文件。\n\n7. 将鼠标指针移到日期选择器上，按住 Control 键，从日期选择器 Control-拖动到 `ViewController.swift`\
    \ 文件中“class ViewController”行的下方。\n\n8. 松开 Control 键和鼠标左键。会出现一个弹出窗口。\n\n9. 在名称文本字段中点击，输入\
    \ `myDatePicker`，然后点击“连接”按钮。Xcode 会创建一个 `IBOutlet` 变量，如下所示：\n\n```\n@IBOutlet\
    \ var myDatePicker: UIDatePicker!\n```\n\n10. 在 `IBOutlet` 下方添加以下代码行来定义一个日期格式化器：\n\
    \n```\nlet dateFormatter: DateFormatter = DateFormatter()\n```\n\n11. 按如下方式编辑\
    \ `viewDidLoad` 方法：\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    dateFormatter.dateStyle = .short\n    dateFormatter.timeStyle = .short\n\
    \    // 加载视图后执行任何额外设置，通常从 nib 文件加载。\n}\n```\n\n这些代码行将 `.dateStyle` 和 `.timeStyle`\
    \ 属性定义为 `.short`。您可以尝试将这些值更改为 `.medium`、`.long` 和 `.full`，看看它们如何以不同方式定义日期和时间。\n\
    \n12. 在 `viewDidLoad` 方法下方，添加以下函数，该函数将接受一个字符串并将其显示在警报控制器中：\n\n```\nfunc ShowAlert(dateTime\
    \ : String) {\n    let alert = UIAlertController(title: \"选中的日期和时间\", message:\
    \ \"\\(dateTime)\", preferredStyle: .alert)\n    let okAction = UIAlertAction(title:\
    \ \"确定\", style: .default, handler: { action -> Void in\n        // 只需关闭操作表\n\
    \    })\n    alert.addAction(okAction)\n    self.present(alert, animated: true,\
    \ completion: nil)\n}\n```\n\n13. 将鼠标指针移到按钮上，按住 Control 键，从按钮 Control-拖动到 `ViewController.swift`\
    \ 文件中底部最后一个大括号的上方。\n\n14. 松开 Control 键和鼠标左键。会出现一个弹出窗口。\n\n15. 在名称文本字段中点击，输入 `getCurrentDateTime`，点击类型弹出菜单并选择\
    \ `UIButton`，然后点击“连接”按钮。Xcode 会创建一个 `IBAction` 方法。\n\n16. 按如下方式编辑此 `getCurrentDateTime`\
    \ `IBAction` 方法：\n\n```\n@IBAction func getCurrentDateTime(_ sender: UIButton)\
    \ {\n    let selectedDate: String = dateFormatter.string(from: myDatePicker.date)\n\
    \    ShowAlert(dateTime: selectedDate)\n}\n```\n\n此 `IBAction` 方法检索 `myDatePicker`\
    \ `IBOutlet`（代表日期选择器）的值，并将此日期和时间转换为字符串，该字符串存储在 `selectedDate` 常量中。然后，它将此 `selectedDate`\
    \ 常量传递给 `ShowAlert` 函数，以将其显示在警报控制器上。\n\n17. 将鼠标指针移到日期选择器上，按住 Control 键，从日期选择器\
    \ Control-拖动到 `ViewController.swift` 文件中底部最后一个大括号的上方。\n\n18. 松开 Control 键和鼠标左键。会出现一个弹出窗口。\n\
    \n19. 在名称文本字段中点击，输入 `dateChanged`，点击类型弹出菜单并选择 `UIDatePicker`，然后点击“连接”按钮。Xcode\
    \ 会创建一个 `IBAction` 方法。\n\n20. 按如下方式编辑此 `dateChanged` `IBAction` 方法：\n\n```\n@IBAction\
    \ func dateChanged(_ sender: UIDatePicker) {\n    let selectedDate: String = dateFormatter.string(from:\
    \ sender.date)\n    ShowAlert(dateTime: selectedDate)\n}\n```\n\n每当用户在日期选择器中更改日期或时间时，此\
    \ `dateChanged` `IBAction` 方法都会运行。它从日期选择器中检索 `.date` 属性并将其转换为字符串，存储在 `selectedDate`\
    \ 常量中。然后，它将此 `selectedDate` 常量传递给 `ShowAlert` 函数，该函数将其显示在警报控制器上。\n\n整个 `ViewController.swift`\
    \ 文件应该如下所示。\n"
- fmt: "```swift\nimport UIKit\nclass ViewController: UIViewController {\n    @IBOutlet\
    \ var myDatePicker: UIDatePicker!\n    let dateFormatter: DateFormatter = DateFormatter()\n\
    \    override func viewDidLoad() {\n        super.viewDidLoad()\n        dateFormatter.dateStyle\
    \ = .short\n        dateFormatter.timeStyle = .short\n        // Do any additional\
    \ setup after loading the view, typically from a nib.\n    }\n    func ShowAlert(dateTime\
    \ : String) {\n        let alert = UIAlertController(title: \"Selected Date and\
    \ Time\", message: \"\\(dateTime)\", preferredStyle: .alert)\n        let okAction\
    \ = UIAlertAction(title: \"OK\", style: .default, handler: { action -> Void in\n\
    \            //Just dismiss the action sheet\n        })\n        alert.addAction(okAction)\n\
    \        self.present(alert, animated: true, completion: nil)\n    }\n    @IBAction\
    \ func dateChanged(_ sender: UIDatePicker) {\n        let selectedDate: String\
    \ = dateFormatter.string(from: sender.date)\n        ShowAlert(dateTime: selectedDate)\n\
    \    }\n    @IBAction func getCurrentDateTime(_ sender: UIButton) {\n        let\
    \ selectedDate: String = dateFormatter.string(from: myDatePicker.date)\n     \
    \   ShowAlert(dateTime: selectedDate)\n    }\n}\n```\n\n21. Click the `Run` button\
    \ or choose Product ➤ Run. The Simulator screen appears.\n\n22. Click the button.\
    \ An alert controller appears, displaying the current date and time displayed\
    \ in the Date Picker.\n\n23. Click the button to dismiss the alert controller.\n\
    \n24. Change the date or time in the Date Picker. Notice another alert controller\
    \ appears, displaying the modified date/time displayed in the Date Picker.\n\n\
    25. Click the button to dismiss the alert controller.\n\n26. Choose Simulator\
    \ ➤ Quit Simulator to return to Xcode.\n\nGo back to step 11 and change the `.dateStyle`\
    \ and `.timeStyle` properties from `.short` to `.medium`, `.long`, or `.full`\
    \ and see how this affects the way dates and times appear. If you change the `.dateStyle`\
    \ or `.timeStyle` to `.none`, then the date or time displayed in the Date Picker\
    \ will be ignored.\n\n## Creating a Custom Picker\n\nThe Date Picker is fine for\
    \ letting the user choose dates and times, but many times you want to offer users\
    \ a limited range of options that are not dates or times. In these situations,\
    \ you need to use the standard picker object and also create the data to display\
    \ in the picker.\n\nTo use a picker, you must define a delegate and data source.\
    \ The delegate defines the file that contains functions that define how many columns\
    \ of data to display (such as a day and month), the total number of options to\
    \ display in the picker, and which data the user chose in the picker.\n\nThe data\
    \ source defines the file that contains the data to display in the picker. This\
    \ data can be an array or a database.\n\nTo see how to use a `Picker View`, follow\
    \ these steps:\n\n1. Create a new iOS project using the Single View App template\
    \ (see Chapter [1](#329781_5_En_1_Chapter.xhtml)) and name this new project `PickerApp`.\
    \ This creates a single view for the user interface.\n\n2. Click the `Main.storyboard`\
    \ file in the Navigator pane. Xcode displays the single view.\n\n3. Click the\
    \ Library icon to open the Object Library window.\n\n4. Drag and drop a button\
    \ and a Picker View anywhere on the view as shown in Figure [12-9](#329781_5_En_12_Chapter.xhtml#Fig9).\n\
    \n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig9_HTML.jpg](images/329781_5_En_12_Chapter/329781_5_En_12_Fig9_HTML.jpg)\n\
    \nFigure 12-9\n\nThe Picker View in the Object Library window\n\n5. Choose Editor\
    \ ➤ Resolve Auto Layout Issues ➤ Set to Suggested Constraints in the bottom half\
    \ of the submenu. Xcode adds constraints to your button and Picker View.\n\n6.\
    \ Choose View ➤ Assistant Editor ➤ Show Assistant Editor. Xcode displays the `Main.storyboard`\
    \ and `ViewController.swift` file side by side.\n\n7. Edit the `class ViewController`\
    \ line as follows:\n\n```swift\nclass ViewController: UIViewController, UIPickerViewDataSource,\
    \ UIPickerViewDelegate {\n```\n\nThis makes the `ViewController.swift` file the\
    \ Picker View’s data source and delegate.\n\n8. Move the mouse pointer over the\
    \ Picker View, hold down the Control key, and Ctrl-drag from the Picker View to\
    \ the `ViewController.swift` file underneath the “class ViewController” line.\n\
    \n9. Release the Control key and the left mouse button. A popup window appears.\n\
    \n10. Click in the Name text field, type **myPicker**, and click the Connect button.\
    \ Xcode creates an `IBOutlet` variable as follows:\n\n```swift\n@IBOutlet var\
    \ myPicker: UIDatePicker!\n```\n\n11. Underneath the `IBOutlet` add the following\
    \ line to define a variable to hold an array of strings:\n\n```swift\nvar pickerData:\
    \ [String] = [String]()\n```\n\n12. Edit the `viewDidLoad` method as follows:\n\
    \n```swift\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    myPicker.delegate\
    \ = self\n    myPicker.dataSource = self\n    pickerData = [\"cat\", \"dog\",\
    \ \"hamster\", \"lizard\", \"parrot\", \"goldfish\"]\n    // Do any additional\
    \ setup after loading the view, typically from a nib.\n}\n```\n\nThese lines of\
    \ code declare the `ViewController.swift` file to be both the delegate and data\
    \ source for the Picker View. Then it defines an array of strings to store in\
    \ the `pickerData` variable.\n\n13. Underneath the `viewDidLoad` method, add the\
    \ following function to define how many components will appear in the Picker View.\
    \ Since we’re only displaying a single wheel of options, the number of components\
    \ is just one:\n\n```swift\nfunc numberOfComponents(in pickerView: UIPickerView)\
    \ -> Int {\n    return 1\n}\n```\n\n14. Add another function underneath to define\
    \ how many items will appear in the Picker View. This number can be found by using\
    \ the `.count` method on the `pickerData` array:\n\n```swift\nfunc pickerView(_\
    \ pickerView: UIPickerView, numberOfRowsInComponent component: Int) -> Int {\n\
    \    return pickerData.count\n}\n```\n\n15. Add a third function underneath to\
    \ display data in the Picker View:\n\n```swift\nfunc pickerView(_ pickerView:\
    \ UIPickerView, titleForRow row: Int, forComponent component: Int) -> String?\
    \ {\n    return pickerData[row]\n}\n```"
