- fmt: "22. Click in the `Class` popup menu and choose `SecondViewController`.\n\n\
    23. Click the `View Controller` icon above the View Controller that appears on\
    \ the far right as shown in Figure [17-16](#329781_5_En_17_Chapter.xhtml#Fig16).\n\
    \n![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig16_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig16_HTML.jpg)\n\
    \nFigure 17-16 – Selecting the third View Controller\n\n24. Choose View ➤ Inspectors\
    \ ➤ Show Identity Inspector, or click the `Identity Inspector` icon in the upper\
    \ right corner of the Xcode window.\n\n25. Click in the `Class` popup menu and\
    \ choose `ThirdViewController`.\n\n26. Move the mouse pointer over the `View Controller`\
    \ icon above the root view, hold down the `Control` key, and Ctrl-drag over the\
    \ View Controller to the right as shown in Figure [17-17](#329781_5_En_17_Chapter.xhtml#Fig17).\n\
    \n![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig17_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig17_HTML.jpg)\n\
    \nFigure 17-17 – Creating a segue between the root view and the next View Controller\n\
    \n27. Release the `Control` key and the left mouse button. A popup menu appears\
    \ (see Figure [17-8](#329781_5_En_17_Chapter.xhtml#Fig8)).\n\n28. Choose `Show`.\
    \ Xcode creates a segue between the root view and the second View Controller.\n\
    \n29. Click this segue and choose View ➤ Inspectors ➤ Show Attributes Inspector,\
    \ or click the `Attributes Inspector` icon in the upper right corner of the Xcode\
    \ window.\n\n30. Click in the `Identifier` text field, type `firstLink`, and press\
    \ ENTER.\n\n31. Move the mouse pointer over the `View Controller` icon above the\
    \ second View Controller, hold down the `Control` key, and Ctrl-drag over the\
    \ third View Controller as shown in Figure [17-18](#329781_5_En_17_Chapter.xhtml#Fig18).\n\
    \n![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig18_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig18_HTML.jpg)\n\
    \nFigure 17-18 – Creating a segue between the second and third View Controllers\n\
    \n32. Release the `Control` key and the left mouse button. A popup menu appears\
    \ (see Figure [17-8](#329781_5_En_17_Chapter.xhtml#Fig8)).\n\n33. Choose `Show`.\
    \ Xcode creates a segue between the second View Controller and the third View\
    \ Controller.\n\n34. Click this segue and choose View ➤ Inspectors ➤ Show Attributes\
    \ Inspector, or click the `Attributes Inspector` icon in the upper right corner\
    \ of the Xcode window.\n\n35. Click in the `Identifier` text field, type `secondLink`,\
    \ and press ENTER.\n\n36. Click in the `ViewController.swift` file in the Navigator\
    \ pane and add the following two functions:\n\n```swift\noverride func touchesBegan(_\
    \ touches: Set, with event: UIEvent?) {\n    performSegue(withIdentifier: \"firstLink\"\
    , sender: self)\n}\noverride func prepare(for segue: UIStoryboardSegue, sender:\
    \ Any?) {\n    let nextVC = segue.destination as! SecondViewController\n    nextVC.navigationItem.title\
    \ = \"Second View Controller\"\n}\n```\n\nThe entire `ViewController.swift` file\
    \ should look like this:\n\n```swift\nimport UIKit\nclass ViewController: UIViewController\
    \ {\n    override func viewDidLoad() {\n        super.viewDidLoad()\n        //\
    \ Do any additional setup after loading the view.\n    }\n    override func touchesBegan(_\
    \ touches: Set, with event: UIEvent?) {\n        performSegue(withIdentifier:\
    \ \"firstLink\", sender: self)\n    }\n    override func prepare(for segue: UIStoryboardSegue,\
    \ sender: Any?) {\n        let nextVC = segue.destination as! SecondViewController\n\
    \        nextVC.navigationItem.title = \"Second View Controller\"\n    }\n}\n\
    ```\n\n37. Click in the `SecondViewController.swift` file in the Navigator pane\
    \ and add the following two functions:\n\n```swift\noverride func touchesBegan(_\
    \ touches: Set, with event: UIEvent?) {\n    performSegue(withIdentifier: \"secondLink\"\
    , sender: self)\n}\noverride func prepare(for segue: UIStoryboardSegue, sender:\
    \ Any?) {\n    let nextVC = segue.destination as! ThirdViewController\n    nextVC.navigationItem.title\
    \ = \"Third View Controller\"\n}\n```\n\nThe entire `SecondViewController.swift`\
    \ file should look like this:\n\n```swift\nimport UIKit\nclass SecondViewController:\
    \ UIViewController {\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        // Do any additional setup after loading the view.\n    }\n    override\
    \ func touchesBegan(_ touches: Set, with event: UIEvent?) {\n        performSegue(withIdentifier:\
    \ \"secondLink\", sender: self)\n    }\n    override func prepare(for segue: UIStoryboardSegue,\
    \ sender: Any?) {\n        let nextVC = segue.destination as! ThirdViewController\n\
    \        nextVC.navigationItem.title = \"Third View Controller\"\n    }\n}\n```\n\
    \n38. Click the `Run` button or choose Product ➤ Run. The Simulator window appears,\
    \ displaying the blank root view screen.\n\n39. Click the screen. The second view\
    \ appears, displaying the title “Second View Controller” along with a `Back` button\
    \ in the upper left corner as shown in Figure [17-19](#329781_5_En_17_Chapter.xhtml#Fig19).\n\
    \n![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig19_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig19_HTML.jpg)\n\
    \nFigure 17-19 – Displaying the second View Controller\n\n40. Click the view.\
    \ The third View Controller appears, displaying the title “Third View Controller”.\n\
    \n41. Click the `Back` button and click the views to move back and forth between\
    \ all three View Controllers.\n\n42. Choose Simulator ➤ Quit Simulator to return\
    \ to Xcode.\n\n## Customizing the Navigation Bar\n\nThe Navigation Controller\
    \ automatically displays a navigation bar at the top of every view. At the very\
    \ least, this navigation bar displays a `Back` button in the upper left corner\
    \ so that way users can always return to a previous view.\n\nBy default, this\
    \ `Back` button always displays “Back”, but you can customize this text to represent\
    \ the title of the previous view. You can also add your own buttons on the navigation\
    \ bar to display additional options. Customizing the navigation bar can create\
    \ a more distinct visual experience for your app’s users as shown in Figure [17-20](#329781_5_En_17_Chapter.xhtml#Fig20).\n\
    \n![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig20_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig20_HTML.jpg)\n\
    \nFigure 17-20 – Displaying custom text for a prompt, title, and back button\n\
    \nSome different ways to customize the navigation bar include:\n\n* **Prompt**\
    \ – Displays a single line of additional text at the top of the navigation bar\n\
    * **Title** – Defines the text that appears in the middle of the navigation bar\n\
    * **Back button** – Changes the back button’s default text of “Back” to something\
    \ more descriptive\n* **Color** – Defines the color of the navigation bar"
