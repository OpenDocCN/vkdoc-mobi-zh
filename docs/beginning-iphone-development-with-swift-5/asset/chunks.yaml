    \ side by side.\n\n11.  Move the mouse pointer over the segmented control, hold\
    \ down the Control key, and Ctrl-drag from the segmented control to the ViewController.swift\
    \ file underneath the IBOutlet line.\n\n12.  Release the Control key and the left\
    \ mouse button. A popup window appears.\n\n13.  Click in the Name text field,\
    \ type **segmentedControl**, and click the Connect button. Xcode creates an IBOutlet\
    \ variable as follows:\n\n```\n    @IBOutlet var segmentedControl: UISegmentedControl!\n\
    \    ```\n\n1.  Move the mouse pointer over the segmented control, hold down the\
    \ Control key, and Ctrl-drag from the segmented control to the ViewController.swift\
    \ file above the last curly bracket at the bottom of the file.\n\n2.  Release\
    \ the Control key and the left mouse button. A popup window appears.\n\n3.  Click\
    \ in the Name text field, type **segmentedControlTapped**, and click the Connect\
    \ button. Xcode creates an IBAction method.\n\n4.  Modify this segmentedControlTapped\
    \ IBAction method as follows:\n\n```\n    @IBAction func segmentedControlTapped(_\
    \ sender: UISegmentedControl) {\n    switch segmentedControl.selectedSegmentIndex\
    \ {\n    case 0:\n    labelSwitch.text = \"One\"\n    case 1:\n    labelSwitch.text\
    \ = \"Two\"\n    default:\n    labelSwitch.text = \"Three\"\n    }\n    }\n  \
    \  ```\n\nThis segmentedControlTapped IBAction method uses the .selectedSegmentIndex\
    \ property to identify which segment the user tapped. Then a switch statement\
    \ determines which segment the user tapped (based on its index number) and displays\
    \ One, Two, or Three in the label to identify which segment the user tapped.\n\
    \n5.  Edit the viewDidLoad method as follows:\n\n```\n    override func viewDidLoad()\
    \ {\n    super.viewDidLoad()\n    segmentedControl.insertSegment(withTitle: \"\
    Three\", at: 2, animated: true)\n    segmentedControl.setWidth(50, forSegmentAt:\
    \ 0)\n    segmentedControl.setWidth(50, forSegmentAt: 1)\n    segmentedControl.setWidth(50,\
    \ forSegmentAt: 2)\n    // Do any additional setup after loading the view, typically\
    \ from a nib.\n    }\n    ```\n\nThis Swift code adds a third segment to the existing\
    \ segmented control and it sets the width of each segment in the segmented control.\
    \ The entire ViewController.swift file should look like this:\n\n```\n    import\
    \ UIKit\n    class ViewController: UIViewController {\n    @IBOutlet var buttonObject:\
    \ UIButton!\n    @IBOutlet var labelSwitch: UILabel!\n    @IBOutlet var switchObject:\
    \ UISwitch!\n    @IBOutlet var segmentedControl: UISegmentedControl!\n    override\
    \ func viewDidLoad() {\n    super.viewDidLoad()\n    segmentedControl.insertSegment(withTitle:\
    \ \"Three\", at: 2, animated: true)\n    segmentedControl.setWidth(50, forSegmentAt:\
    \ 0)\n    segmentedControl.setWidth(50, forSegmentAt: 1)\n    segmentedControl.setWidth(50,\
    \ forSegmentAt: 2)\n    // Do any additional setup after loading the view, typically\
    \ from a nib.\n    }\n    @IBAction func touchInside(_ sender: UIButton) {\n \
    \   buttonObject.setTitle(\"New\", for: UIControl.State.normal)\n    switchObject.onTintColor\
    \ = UIColor.red\n    switchObject.tintColor = UIColor.blue\n    }\n    @IBAction\
    \ func switchChanged(_ sender: UISwitch) {\n    if switchObject.isOn {\n    labelSwitch.text\
    \ = \"On\"\n    } else {\n    labelSwitch.text = \"Off\"\n    }\n    }\n    @IBAction\
    \ func segmentedControlTapped(_ sender: UISegmentedControl) {\n    switch segmentedControl.selectedSegmentIndex\
    \ {\n    case 0:\n    labelSwitch.text = \"One\"\n    case 1:\n    labelSwitch.text\
    \ = \"Two\"\n    default:\n    labelSwitch.text = \"Three\"\n    }\n    }\n  \
    \  }\n    ```\n\n6.  Click the Run button or choose Product ➤ Run. The Simulator\
    \ window appears.\n\n7.  Click the second or third segment in the segmented control.\
    \ Notice that the segment you clicked now appears highlighted and the label displays\
    \ the name of the segment you clicked such as “Two” or “Three”.\n\n8.  Click any\
    \ segment. Notice that each time you click a different segment, that segment appears\
    \ highlighted and the label displays different text.\n\n9.  Choose Simulator ➤\
    \ Quit Simulator to return to Xcode."
  trans: "好的，这是根据您的要求和示例格式翻译的文档。\n\n\n# 使用分段控件\n\n按钮适合显示单个命令，但当您需要显示多个命令时，多个按钮可能会使用户界面显得杂乱。当您需要在有限的空间内显示多个按钮时，可以使用分段控件。\n\
    \n一个分段控件可以包含两个或更多个分段，每个分段就像一个独立的按钮。您可以通过属性检查器面板定义分段的数量，但之后也可以使用 Swift 代码添加更多分段。\n\
    \n在属性检查器中，您可以按图 10-6 所示的方式自定义分段控件：\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig6_HTML.jpg](img/329781_5_En_10_Fig6_HTML.jpg)\n\
    \n*图 10-6* 在属性检查器中修改分段控件\n\n-   **Segments（分段）** – 定义分段控件中的分段（按钮）数量\n-   **Segment（分段）**\
    \ – 一个弹出菜单，允许您选择要修改的分段\n-   **Title（标题）** – 定义显示在由“Segment”（分段）弹出菜单所定义的分段上的文本\n\
    -   **Image（图像）** – 定义要显示在由“Segment”（分段）弹出菜单所定义的分段上的图像\n-   **Selected（已选中）**\
    \ – 一个复选框，用于定义哪个分段显示为已选中（高亮），整个分段控件中只能选择一个分段\n\n每个分段控件都通过索引号来标识其不同的分段，最左侧的分段索引为\
    \ 0，其右侧的下一个分段索引为 1，依此类推。Xcode 会根据每个分段的位置自动为其分配索引号。您可以使用分段索引号来识别用户点击了哪个分段。\n\n\
    一旦您将分段控件添加到视图，就可以使用 Swift 代码添加或移除分段。要了解如何修改分段控件，请遵循以下步骤：\n\n1.  在导航器面板中点击 `Main.storyboard`\
    \ 文件。Xcode 将显示故事板用户界面。\n2.  点击库图标以显示对象库窗口。\n3.  将一个分段控件拖放到视图上的任意位置。\n4.  选择 Editor\
    \ ➤ Resolve Auto Layout Issues ➤ Reset to Suggested Constraints（编辑器 ➤ 解析自动布局问题\
    \ ➤ 重置为建议的约束）子菜单的上半部分。Xcode 会向分段控件添加约束。\n5.  双击分段控件左侧标记为“First”的分段。Xcode 会高亮该分段上的标题，如图\
    \ 10-7 所示。\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig7_HTML.jpg](img/329781_5_En_10_Fig7_HTML.jpg)\n\
    \n*图 10-7* 直接双击分段控件标题可编辑该标题\n\n6.  输入 `One` 并按 ENTER 键替换“First”标签。直接双击显示文本的对象是修改文本的一种方法。第二种方法是使用属性检查器面板。\n\
    7.  选择 View ➤ Inspectors ➤ Show Attributes Inspector（视图 ➤ 检查器 ➤ 显示属性检查器），或点击 Xcode\
    \ 窗口右上角的属性检查器图标。\n8.  点击“Segment”（分段）弹出菜单，然后选择“Segment 1 – Second”。标题文本字段会显示所选分段的当前标题，如图\
    \ 10-8 所示。\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig8_HTML.jpg](img/329781_5_En_10_Fig8_HTML.jpg)\n\
    \n*图 10-8* 在属性检查器面板中更改分段标题\n\n9.  点击标题文本字段，将文本更改为 `Two`。然后按 ENTER 键。请注意，您可以通过直接双击标题或更改分段的“Title”（标题）文本字段来更改每个分段的标题。\n\
    10. 选择 View ➤ Assistant Editor ➤ Show Assistant Editor（视图 ➤ 助理编辑器 ➤ 显示助理编辑器），或点击助理编辑器图标。Xcode\
    \ 会并排显示 `Main.storyboard` 和 `ViewController.swift` 文件。\n11. 将鼠标指针移到分段控件上，按住 Control\
    \ 键，然后从分段控件按住 Ctrl 键拖动到 `ViewController.swift` 文件中 `IBOutlet` 行的下方。\n12. 松开 Control\
    \ 键和鼠标左键。将出现一个弹出窗口。\n13. 点击“Name”（名称）文本字段，输入 `segmentedControl`，然后点击“Connect”（连接）按钮。Xcode\
    \ 会创建一个 `IBOutlet` 变量，如下所示：\n\n```swift\n@IBOutlet var segmentedControl: UISegmentedControl!\n\
    ```\n\n14. 将鼠标指针移到分段控件上，按住 Control 键，然后从分段控件按住 Ctrl 键拖动到 `ViewController.swift`\
    \ 文件中文件底部最后一个花括号的上方。\n15. 松开 Control 键和鼠标左键。将出现一个弹出窗口。\n16. 点击“Name”（名称）文本字段，输入\
    \ `segmentedControlTapped`，然后点击“Connect”（连接）按钮。Xcode 会创建一个 `IBAction` 方法。\n17.\
    \ 按如下方式修改此 `segmentedControlTapped` IBAction 方法：\n\n```swift\n@IBAction func segmentedControlTapped(_\
    \ sender: UISegmentedControl) {\n    switch segmentedControl.selectedSegmentIndex\
    \ {\n    case 0:\n        labelSwitch.text = \"One\"\n    case 1:\n        labelSwitch.text\
    \ = \"Two\"\n    default:\n        labelSwitch.text = \"Three\"\n    }\n}\n```\n\
    \n此 `segmentedControlTapped` IBAction 方法使用 `.selectedSegmentIndex` 属性来识别用户点击了哪个分段。然后，一个\
    \ `switch` 语句（基于其索引号）确定用户点击了哪个分段，并在标签中显示 `One`、`Two` 或 `Three`，以标识用户点击的分段。\n\n\
    18. 按如下方式编辑 `viewDidLoad` 方法：\n\n```swift\noverride func viewDidLoad() {\n   \
    \ super.viewDidLoad()\n    segmentedControl.insertSegment(withTitle: \"Three\"\
    , at: 2, animated: true)\n    segmentedControl.setWidth(50, forSegmentAt: 0)\n\
    \    segmentedControl.setWidth(50, forSegmentAt: 1)\n    segmentedControl.setWidth(50,\
    \ forSegmentAt: 2)\n    // Do any additional setup after loading the view, typically\
    \ from a nib.\n}\n```\n\n此 Swift 代码向现有分段控件添加了第三个分段，并设置了分段控件中每个分段的宽度。整个 `ViewController.swift`\
    \ 文件应如下所示：\n\n```swift\nimport UIKit\nclass ViewController: UIViewController {\n\
    \    @IBOutlet var buttonObject: UIButton!\n    @IBOutlet var labelSwitch: UILabel!\n\
    \    @IBOutlet var switchObject: UISwitch!\n    @IBOutlet var segmentedControl:\
    \ UISegmentedControl!\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        segmentedControl.insertSegment(withTitle: \"Three\", at: 2, animated:\
    \ true)\n        segmentedControl.setWidth(50, forSegmentAt: 0)\n        segmentedControl.setWidth(50,\
    \ forSegmentAt: 1)\n        segmentedControl.setWidth(50, forSegmentAt: 2)\n \
    \       // Do any additional setup after loading the view, typically from a nib.\n\
    \    }\n    @IBAction func touchInside(_ sender: UIButton) {\n        buttonObject.setTitle(\"\
    New\", for: UIControl.State.normal)\n        switchObject.onTintColor = UIColor.red\n\
    \        switchObject.tintColor = UIColor.blue\n    }\n    @IBAction func switchChanged(_\
    \ sender: UISwitch) {\n        if switchObject.isOn {\n            labelSwitch.text\
    \ = \"On\"\n        } else {\n            labelSwitch.text = \"Off\"\n       \
    \ }\n    }\n    @IBAction func segmentedControlTapped(_ sender: UISegmentedControl)\
    \ {\n        switch segmentedControl.selectedSegmentIndex {\n        case 0:\n\
    \            labelSwitch.text = \"One\"\n        case 1:\n            labelSwitch.text\
    \ = \"Two\"\n        default:\n            labelSwitch.text = \"Three\"\n    \
    \    }\n    }\n}\n```\n\n19. 点击运行按钮或选择 Product ➤ Run（产品 ➤ 运行）。模拟器窗口将出现。\n20. 点击分段控件中的第二个或第三个分段。请注意，您点击的分段现在会高亮显示，并且标签会显示您点击的分段名称，例如“Two”或“Three”。\n\
    21. 点击任意分段。请注意，每次您点击不同的分段时，该分段都会高亮显示，并且标签会显示不同的文本。\n22. 选择 Simulator ➤ Quit Simulator（模拟器\
    \ ➤ 退出模拟器）返回 Xcode。\n"
- fmt: "# Connecting Multiple Objects to the Same `IBAction` Method\n\nMost of the\
    \ time when you use objects to interact with the user such as buttons, switches,\
    \ or segmented controls, you create a separate `IBAction` method for each object.\
    \ However, it’s possible to connect two or more objects to the same `IBAction`\
    \ method.\n\nFirst, you need to create an `IBAction` method with one object such\
    \ as a button. Then you can connect another object to that existing `IBAction`\
    \ method. That way both objects can respond to the same `IBAction` method. This\
    \ can be useful because instead of writing two or more separate `IBAction` methods\
    \ that do mostly the same thing, you can write a single `IBAction` method that\
    \ responds slightly differently based on which object the user tapped.\n\nWhen\
    \ connecting two or more objects to the same `IBAction` method, you need to decide\
    \ if you only want identical objects (such as buttons) to connect to the same\
    \ `IBAction` method or whether you want to allow different objects (such as a\
    \ button and an image view) to connect to the same `IBAction` method.\n\nWhenever\
    \ you create an `IBAction` method, you can define the type of object the `IBAction`\
    \ method will respond to. By default, the type is set to `Any`, which means different\
    \ objects can connect to the same `IBAction` method, but you can choose to allow\
    \ only the same type of object to connect to the `IBAction` method such as `UIButton`s\
    \ as shown in Figure [10-9](#329781_5_En_10_Chapter.xhtml#Fig9).\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig9_HTML.jpg](images/329781_5_En_10_Chapter/329781_5_En_10_Fig9_HTML.jpg)\n\
    \n**Figure 10-9** – Choosing the type of object an `IBAction` method can respond\
    \ to\n\nIf you define the `Type` to a specific object such as `UIButton`, your\
    \ `IBAction` method will define the `sender` (the object that called the `IBAction`\
    \ method) as that specific object such as:\n\n```\n@IBAction func buttonTapped(_\
    \ sender: UIButton) {\n}\n```\n\nThe preceding `IBAction` method can only be called\
    \ from `UIButton` objects. If you accept the `Type` default of `Any` when creating\
    \ an `IBAction` method, then your `IBAction` method will define the `sender` as\
    \ `Any` such as:\n\n```\n@IBAction func buttonTapped(_ sender: Any) {\n}\n```\n\
    \nAny type of object can connect to an `IBAction` method where the `sender` is\
    \ defined as `Any`.\n\nWhen two or more objects connect to the same `IBAction`\
    \ method, you need a way to identify which object called that `IBAction` method.\
    \ One way to identify different user interface objects is to give each one a unique\
    \ `Tag` number in the Attributes Inspector pane as shown in Figure [10-10](#329781_5_En_10_Chapter.xhtml#Fig10).\n\
    \n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig10_HTML.jpg](images/329781_5_En_10_Chapter/329781_5_En_10_Fig10_HTML.jpg)\n\
    \n**Figure 10-10** – The `Tag` property can be modified in the Attributes Inspector\
    \ pane\n\nBy default, every object has a `Tag` value of 0, but you can change\
    \ this so each object has a distinct value such as 1, 24, or 894. By identifying\
    \ the `Tag` value, an `IBAction` method can determine which object to respond\
    \ to.\n\nTo show how to link multiple objects to an `IBAction` method and detect\
    \ which object to respond to, follow these steps:\n\n1. Create a new iOS project\
    \ using the Single View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml))\
    \ and name this new project `IBActionApp`. This creates a single view for the\
    \ user interface.\n\n2. Click the `Main.storyboard` file in the Navigator pane.\
    \ Xcode displays the single view.\n\n3. Click the Library icon to open the Object\
    \ Library window.\n\n4. Drag and drop two buttons and a label anywhere on the\
    \ view.\n\n5. Choose **Editor** ➤ **Resolve Auto Layout Issues** ➤ **Reset to\
    \ Suggested Constraints** on the bottom half of the submenu. This will add constraints\
    \ to the two buttons and label on the user interface.\n\n6. Click one button to\
    \ select it.\n\n7. Choose **View** ➤ **Inspectors** ➤ **Show Attributes Inspector**,\
    \ or click the Attributes Inspector icon in the upper right corner of the Xcode\
    \ window.\n\n8. Click in the Title text field, type **First**, and press ENTER.\n\
    \n9. Click in the Tag text field, type **1**, and press ENTER.\n\n10. Click the\
    \ second button to select it.\n\n11. Click in the Title text field, type **Second**,\
    \ and press ENTER.\n\n12. Click in the Tag text field, type **2**, and press ENTER.\n\
    \n13. Choose **View** ➤ **Assistant Editor** ➤ **Show Assistant Editor**, or click\
    \ the Assistant Editor icon. Xcode displays the `Main.storyboard` and `ViewController.swift`\
    \ file side by side.\n\n14. Move the mouse pointer over the label, hold down the\
    \ Control key, and Ctrl-drag from the label to the `ViewController.swift` file\
    \ underneath the `IBOutlet` line.\n\n15. Release the Control key and the left\
    \ mouse button. A popup window appears.\n\n16. Click in the Name text field, type\
    \ `labelResult`, and click the Connect button. Xcode creates an `IBOutlet` variable\
    \ as follows:\n\n```\n    @IBOutlet var labelResult: UILabel!\n```\n\n17. Move\
    \ the mouse pointer over the button titled “First”, hold down the Control key,\
    \ and Ctrl-drag from the button to the `ViewController.swift` file above the last\
    \ curly bracket in the `ViewController.swift` file.\n\n18. Release the Control\
    \ key and the left mouse button. A popup window appears.\n\n19. Click in the Name\
    \ text field, type `buttonTapped`, make sure the `Type` popup menu displays `Any`,\
    \ and click the Connect button. Xcode creates an `IBAction` method as follows:\n\
    \n```\n    @IBAction func buttonTapped(_ sender: Any) {\n    }\n```\n\n20. Move\
    \ the mouse pointer over the button titled “Second”, hold down the Control key,\
    \ and Ctrl-drag from the button to the `buttonTapped` `IBAction` method until\
    \ the entire `IBAction` method appears highlighted as shown in Figure [10-11](#329781_5_En_10_Chapter.xhtml#Fig11).\n\
    \n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig11_HTML.jpg](images/329781_5_En_10_Chapter/329781_5_En_10_Fig11_HTML.jpg)\n\
    \n**Figure 10-11** – Connecting a second object to an existing `IBAction` method\n\
    \n21. Release the Control key and left mouse button.\n\n22. Move the mouse pointer\
    \ over the circle in the left margin of the `buttonTapped` `IBAction` method.\
    \ Xcode highlights the two buttons to verify that both buttons are connected to\
    \ the `buttonTapped` `IBAction` method as shown in Figure [10-12](#329781_5_En_10_Chapter.xhtml#Fig12).\n\
    \n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig12_HTML.jpg](images/329781_5_En_10_Chapter/329781_5_En_10_Fig12_HTML.jpg)\n\
    \n**Figure 10-12** – Verifying all objects connected to a single `IBAction` method\n\
    \n23. Modify the `buttonTapped` `IBAction` method as follows:\n\n```\n    @IBAction\
    \ func buttonTapped(_ sender: Any) {\n    switch (sender as AnyObject).tag {\n\
    \    case 1:\n    labelResult.text = \"Button 1\"\n    case 2:\n    labelResult.text\
    \ = \"Button 2\"\n    default:\n    labelResult.text = \"Default\"\n    }\n  \
    \  }\n```\n\n24. Modify the `viewDidLoad` method as follows:\n\n```\n    override\
    \ func viewDidLoad() {\n    super.viewDidLoad()\n    labelResult.frame.size.width\
    \ = 120\n    // Do any additional setup after loading the view, typically from\
    \ a nib.\n    }\n```\n\nThe entire `ViewController.swift` file should look like\
    \ this:\n\n```\n    import UIKit\n    class ViewController: UIViewController {\n\
    \    @IBOutlet var labelResult: UILabel!\n    override func viewDidLoad() {\n\
    \    super.viewDidLoad()\n    labelResult.frame.size.width = 120\n    // Do any\
    \ additional setup after loading the view, typically from a nib.\n    }\n    @IBAction\
    \ func buttonTapped(_ sender: Any) {\n    switch (sender as AnyObject).tag {\n\
    \    case 1:\n    labelResult.text = \"Button 1\"\n    case 2:\n    labelResult.text\
    \ = \"Button 2\"\n    default:\n    labelResult.text = \"Default\"\n    }\n  \
    \  }\n    }\n```\n\n25. Click the Run button or choose **Product** ➤ **Run**.\
    \ The Simulator screen appears.\n\n26. Click the button titled “First”. Notice\
    \ that the label displays “Button 1”.\n\n27. Click the button titled “Second”.\
    \ Notice that the label displays “Button 2”.\n\n28. Choose **Simulator** ➤ **Quit\
    \ Simulator** to return to Xcode."
