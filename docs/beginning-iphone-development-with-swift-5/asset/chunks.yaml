    \nFigure 15-10\n\nConnecting the Table View Cell to the `TableViewCell.swift`\
    \ file\n\n27.  Choose View ➤ Assistant Editor ➤ Show Assistant Editor, or click\
    \ the Assistant Editor icon in the upper right corner of the Xcode window. This\
    \ displays the `Main.storyboard` file on the left and a `.swift` file on the right.\n\
    \n28.  Click the icon that looks like two circles intertwined at the top of the\
    \ Assistant Editor as shown in Figure [15-11](#329781_5_En_15_Chapter.xhtml#Fig11).\
    \ A popup menu appears.\n\n![../images/329781_5_En_15_Chapter/329781_5_En_15_Fig11_HTML.jpg](images/329781_5_En_15_Chapter/329781_5_En_15_Fig11_HTML.jpg)\n\
    \nFigure 15-11\n\nThe icon of two intertwined circles\n\n29.  Choose Manual ➤\
    \ `TableViewCellVisualApp` ➤ `TableViewCellVisualApp` ➤ `TableViewCell.swift`\
    \ as shown in Figure [15-12](#329781_5_En_15_Chapter.xhtml#Fig12). Xcode now displays\
    \ the `TableViewCell.swift` file to the right of the `Main.storyboard` file.\n\
    \n![../images/329781_5_En_15_Chapter/329781_5_En_15_Fig12_HTML.jpg](images/329781_5_En_15_Chapter/329781_5_En_15_Fig12_HTML.jpg)\n\
    \nFigure 15-12\n\nNavigating to the `TableViewCell.swift` file\n\n30.  Move the\
    \ mouse pointer over the top label, hold down the Control key, and Ctrl-drag under\
    \ the `class TableViewCell` line in the `TableViewCell.swift` file.\n\n31.  Release\
    \ the Control key and the left mouse button. A popup window appears.\n\n32.  Click\
    \ in the Name text field, type `mainText`, and click the Connect button. Xcode\
    \ creates an IBOutlet as follows:\n\n```\n@IBOutlet var mainText: UILabel!\n```\n\
    \n33.  Move the mouse pointer over the bottom label, hold down the Control key,\
    \ and Ctrl-drag under the IBOutlet line.\n\n34.  Release the Control key and the\
    \ left mouse button. A popup window appears.\n\n35.  Click in the Name text field,\
    \ type `detailText`, and click the Connect button. Xcode creates an IBOutlet as\
    \ follows:\n\n```\n@IBOutlet var detailText: UILabel!\n```\n\n36.  Move the mouse\
    \ pointer over the image view, hold down the Control key, and Ctrl-drag under\
    \ the IBOutlet line.\n\n37.  Release the Control key and the left mouse button.\
    \ A popup window appears.\n\n38.  Click in the Name text field, type `cellImage`,\
    \ and click the Connect button. Xcode creates an IBOutlet as follows:\n\n```\n\
    @IBOutlet var cellImage: UIImageView!\n```\n\nThe entire `TableViewCell.swift`\
    \ file should look like this:\n\n```\nimport UIKit\nclass TableViewCell: UITableViewCell\
    \ {\n    @IBOutlet var mainText: UILabel!\n    @IBOutlet var detailText: UILabel!\n\
    \    @IBOutlet var cellImage: UIImageView!\n    override func awakeFromNib() {\n\
    \        super.awakeFromNib()\n        // Initialization code\n    }\n    override\
    \ func setSelected(_ selected: Bool, animated: Bool) {\n        super.setSelected(selected,\
    \ animated: animated)\n        // Configure the view for the selected state\n\
    \    }\n}\n```\n\n39.  Choose View ➤ Standard Editor ➤ Show Standard Editor, or\
    \ click the Standard Editor icon in the upper right corner of the Xcode window.\n\
    \n40.  Click the `ViewController.swift` file in the Navigator pane.\n\n41.  Modify\
    \ the `class ViewController` line as follows:\n\n```\nclass ViewController: UIViewController,\
    \ UITableViewDelegate, UITableViewDataSource {\n```\n\n42.  Drag and drop four\
    \ images into the Navigator pane (see Figure [15-3](#329781_5_En_15_Chapter.xhtml#Fig3)).\
    \ A dialog appears, asking how to add the files to your project."
