    \ \"snake\", \"lizard\"]]\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        collectionView.delegate = self\n        collectionView.dataSource = self\n\
    \        // Do any additional setup after loading the view.\n    }\n    func numberOfSections(in\
    \ collectionView: UICollectionView) -> Int {\n        return petArray.count\n\
    \    }\n    func collectionView(_ collectionView: UICollectionView, numberOfItemsInSection\
    \ section: Int) -> Int {\n        return petArray[section].count - 1\n    }\n\
    \    func collectionView(_ collectionView: UICollectionView, cellForItemAt indexPath:\
    \ IndexPath) -> UICollectionViewCell {\n        let cell = collectionView.dequeueReusableCell(withReuseIdentifier:\
    \ \"customCell\", for: indexPath) as! itemCell\n        cell.itemLabel.text =\
    \ petArray[indexPath.section][indexPath.row + 1]\n        return cell\n    }\n\
    \    func collectionView(_ collectionView: UICollectionView, didSelectItemAt indexPath:\
    \ IndexPath) {\n        let alert = UIAlertController(title: \"Your Choice\",\
    \ message: \"\\(petArray[indexPath.section][indexPath.row + 1])\", preferredStyle:\
    \ .alert)\n        let action = UIAlertAction(title: \"OK\", style: .default,\
    \ handler: nil)\n        alert.addAction(action)\n        self.present(alert,\
    \ animated: true, completion: nil)\n    }\n    func collectionView(_ collectionView:\
    \ UICollectionView, viewForSupplementaryElementOfKind kind: String, at indexPath:\
    \ IndexPath) -> UICollectionReusableView {\n        let headerView = collectionView.dequeueReusableSupplementaryView(ofKind:\
    \ kind, withReuseIdentifier: \"headerView\", for: indexPath) as! itemCell\n  \
    \      headerView.headerLabel.text = petArray[indexPath.section][0]\n        return\
    \ headerView\n    }\n}\n```\n\n60. 单击 Run 按钮或选择`Product ➤ Run`。模拟器窗口出现，显示按分区划分的\
    \ Collection View，如图 16-18 所示。\n\n![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig18_HTML.jpg](img/329781_5_En_16_Fig18_HTML.jpg)\n\
    \n**图 16-18** 显示不同分区的 Collection View\n\n61. 单击任意项目，弹出一个警报控制器，显示所选项目。\n\n62. 单击\
    \ OK 关闭警报控制器。\n\n63. 选择`Simulator ➤ Quit Simulator`返回 Xcode。\n\n## 总结\n\nCollection\
    \ View 的工作方式类似于 Table View，都需要定义代理和数据源。Collection View 更加灵活，因为它支持水平或垂直滚动，并以网格形式显示项目，而不是像\
    \ Table View 那样堆叠成行。\n\n为了组织 Collection View 中数据的显示，可以定义分区标题。要进一步自定义 Collection\
    \ View 的外观，可以将标签等对象拖放到 Collection View Cell 上，并创建一个单独的`.swift`类文件链接到该 Cell。这样便可以创建`IBOutlet`来显示数据。\n\
    \n可以将 Collection View 视为更复杂、更通用的 Table View。一旦理解了 Table View 的工作方式，就可以轻松学习如何在未来的应用中创建和使用\
    \ Collection View。\n"
- fmt: '# 17. Using the Navigation Controller


    Only the simplest apps consist of a single view such as the Calculator app. Most
    apps usually need two or more views to display information. While you could create
    buttons and link them to different views, this can be a clumsy solution. A far
    better solution is to organize related views together.


    `Xcode` offers two ways to group related views together. One option is to use
    a Navigation Controller. This allows the user to browse through a list of views
    in sequential order where each view can open the next view and a special back
    button returns to the previous view as shown in Figure [17-1](#329781_5_En_17_Chapter.xhtml#Fig1).


    ![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig1_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig1_HTML.jpg)


    Figure 17-1


    A Navigation Controller can display multiple views in sequential order


    Many of the apps that come with iOS rely on the Navigation Controller such as
    Mail, Photos, and the Settings app. Typically an app will display a list of options
    as rows in a table view. Selecting an option then displays another list of options
    until you finally reach the last screen that displays information as shown in
    Figure [17-2](#329781_5_En_17_Chapter.xhtml#Fig2).


    ![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig2_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig2_HTML.jpg)


    Figure 17-2


    Many apps rely on the Navigation Controller to display multiple options


    Navigation Controllers are designed to display hierarchical data to users, often
    in rows of information stored in a table view. Notice that no matter which view
    appears on the screen, the Navigation Controller always provides a Back button
    in the upper left corner of the screen to allow users to return to a previous
    view. Navigation Controllers make it easy for users to go back and forth through
    a sequential list of views.


    ## Using a Navigation Controller


    A Navigation Controller acts as a frame around a root view. The root view displays
    data while the Navigation Controller provides a navigation bar at the top of every
    view that can show a title and buttons as shown in Figure [17-3](#329781_5_En_17_Chapter.xhtml#Fig3).


    ![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig3_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig3_HTML.jpg)


    Figure 17-3


    The parts of a Navigation Controller


    Every Navigation Controller needs exactly one root view. By itself, a Navigation
    Controller and its root view does nothing more than display data. What makes the
    Navigation Controller useful is when the root view connects to another view through
    a link called a segue.


    A segue consists of an identifying name and a visual link from one view to another.
    The first view needs a button or some other item for the user to trigger the segue
    and make it display the second view. Then the Navigation Controller automatically
    displays a Back button on the navigation bar of the second view, which allows
    the user to return to the first view. The only code needed to display another
    view is this:


    ```

    performSegue(withIdentifier: "segueIdentifier", sender: self)

    ```


    To see how to create a simple Navigation Controller, follow these steps:


    1.  Create a new iOS project using the Single View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml))
    and name this new project `SimpleNavigationApp`. This creates a single view for
    the user interface.


    2.  Click the `Main.storyboard` file in the Navigator pane. `Xcode` displays the
    single view.


    3.  Click the View Controller Scene in the Document Outline.


    4.  Choose Editor ➤ Embed In ➤ Navigation Controller. `Xcode` displays a Navigation
    Controller in the storyboard and makes the single view the root view of the Navigation
    Controller as shown in Figure [17-4](#329781_5_En_17_Chapter.xhtml#Fig4).


    ![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig4_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig4_HTML.jpg)


    Figure 17-4


    Embedding a view inside a Navigation Controller


    5.  Click the Library icon to open the Object Library window.


    6.  Drag and drop a View Controller from the Object Library window to the storyboard
    as shown in Figure [17-5](#329781_5_En_17_Chapter.xhtml#Fig5).


    ![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig5_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig5_HTML.jpg)


    Figure 17-5


    Dragging and dropping a View Controller onto the storyboard


    7.  Click View in the Document Outline under the View Controller that you just
    added to the storyboard. `Xcode` highlights the view. This view appears on the
    View Controller that is not connected to the Navigation Controller as shown in
    Figure [17-6](#329781_5_En_17_Chapter.xhtml#Fig6).


    ![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig6_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig6_HTML.jpg)


    Figure 17-6


    Selecting the view of the newly added View Controller


    8.  Choose View ➤ Inspectors ➤ Show Attributes Inspector, or click the Attributes
    Inspector icon in the upper right corner of the Xcode window.


    9.  Click Background popup menu and choose a color. `Xcode` fills the view of
    this newly added View Controller with a color. This color will make it easy to
    verify when this View Controller appears.


    10.  Click the View Controller icon of the root controller, hold down the Control
    key, and Ctrl-drag the mouse to point inside the newly added View Controller as
    shown in Figure [17-7](#329781_5_En_17_Chapter.xhtml#Fig7).


    ![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig7_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig7_HTML.jpg)


    Figure 17-7


    Creating a segue between the root controller and a separate View Controller


    11.  Release the Control key and the left mouse button. A popup menu appears as
    shown in Figure [17-8](#329781_5_En_17_Chapter.xhtml#Fig8).


    ![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig8_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig8_HTML.jpg)


    Figure 17-8'
