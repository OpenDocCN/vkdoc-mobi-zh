    28.  点击`Background`弹出菜单并选择一个颜色，例如青色。此时故事板应包含一个`Page Controller`和三个`View Controllers`，每个`View\
    \ Controller`具有不同的背景颜色，如图 19-7 所示。\n\n![../images/329781_5_En_19_Chapter/329781_5_En_19_Fig7_HTML.jpg](img/329781_5_En_19_Fig7_HTML.jpg)\n\
    \n图 19-7\n\n包含一个`Page Controller`和三个`View Controllers`的故事板\n\n## 让视图控制器在页面控制器中显示\n\
    \n要使多个`View Controllers`在`Page Controller`内部显示，首先必须将`Page Controller`连接到一个 `.swift`\
    \ 的 `UIPageController` 类文件。然后，在此 `UIPageController` `.swift` 文件中，需要编写 Swift 代码来完成以下操作：\n\
    \n*   定义一个数组，用于容纳所有需要在`Page Controller`内显示的`View Controllers`。\n\n*   编写一个`viewControllerBefore`方法，用于定义当用户滑动打开上一个视图时，应显示哪个`View\
    \ Controller`。\n\n*   编写一个`viewControllerAfter`方法，用于定义当用户滑动打开下一个视图时，应显示哪个`View\
    \ Controller`。\n\n要了解如何编写 Swift 代码使`Page Controller`工作，请遵循以下步骤：\n\n1.  确保`PageControllerApp`已加载到\
    \ Xcode 中。\n\n2.  选择`File` ➤ `New` ➤ `File`。将会出现一个对话框，显示可用的不同模板。\n\n3.  点击 iOS\
    \ 类别下的`Cocoa Touch Class`，然后点击**Next**按钮。将出现另一个窗口，要求输入类名和子类类型。\n\n4.  点击`Class`文本字段并输入`PageViewController`。\n\
    \n5.  点击`Subclass of`弹出菜单并选择`UIPageViewController`，如图 19-8 所示。\n\n![../images/329781_5_En_19_Chapter/329781_5_En_19_Fig8_HTML.jpg](img/329781_5_En_19_Fig8_HTML.jpg)\n\
    \n图 19-8\n\n创建一个`UIPageViewController` `.swift` 类文件\n\n6.  点击**Next**按钮，然后点击**Create**按钮。Xcode\
    \ 会在导航窗格中显示`PageViewController.swift`文件。\n\n7.  在导航窗格中点击`Main.storyboard`文件。Xcode\
    \ 会显示该故事板。\n\n8.  在文档大纲中点击`Page View Controller`，或点击`Page Controller`顶部的`Page\
    \ View Controller`图标，如图 19-9 所示。\n\n![../images/329781_5_En_19_Chapter/329781_5_En_19_Fig9_HTML.jpg](img/329781_5_En_19_Fig9_HTML.jpg)\n\
    \n图 19-9\n\n选择`Page View Controller`\n\n9.  选择`View` ➤ `Inspectors` ➤ `Show Identity\
    \ Inspector`，或点击 Xcode 窗口右上角的`Identity Inspector`图标。\n\n10.  点击`Class`弹出菜单并选择`PageViewController`，如图\
    \ 19-10 所示。\n\n![../images/329781_5_En_19_Chapter/329781_5_En_19_Fig10_HTML.jpg](img/329781_5_En_19_Fig10_HTML.jpg)\n\
    \n图 19-10\n\n将`Page Controller`连接到`PageViewController.swift`文件\n\n11.  在导航窗格中点击`PageViewController.swift`文件。\n\
    \n12.  按如下方式编辑`class PageViewController`这行代码：\n\n```\n    class PageViewController:\
    \ UIPageViewController, UIPageViewControllerDataSource {\n```\n\n13.  在`class\
    \ PageViewController`这行代码下方，添加以下代码行来声明一个`UIViewControllers`数组：\n\n```\n    var\
    \ controllerArray: [UIViewController]? = nil\n```\n\n14.  按如下方式修改`viewDidLoad`方法：\n\
    \n```\n    override func viewDidLoad() {\n    super.viewDidLoad()\n    dataSource\
    \ = self\n    let storyBoard = UIStoryboard(name: \"Main\", bundle: nil)\n   \
    \ let firstVC = storyBoard.instantiateViewController(withIdentifier: \"page01\"\
    )\n    let secondVC = storyBoard.instantiateViewController(withIdentifier: \"\
    page02\")\n    let thirdVC = storyBoard.instantiateViewController(withIdentifier:\
    \ \"page03\")\n    controllerArray = [firstVC, secondVC, thirdVC]\n    self.setViewControllers([controllerArray![0]],\
    \ direction: UIPageViewController.NavigationDirection.forward, animated: true,\
    \ completion: nil)\n    }\n```\n\n第一行将`PageViewController.swift`文件定义为`Page Controller`的数据源。下一行创建了一个名为`Main`的故事板常量。接下来的三行定义了常量（`firstVC`、`secondVC`和`thirdVC`），用于表示将在`Page\
    \ Controller`内显示的每个`View Controller`。请注意，每个`View Controller`都使用其自身的`Storyboard\
    \ ID`来标识，例如`page01`或`page03`。\n\n接下来，我们将所有这些`View Controllers`存储到`controllerArray`数组中。最后，我们在`Page\
    \ Controller`内部设置这个`View Controllers`数组。\n\n15.  添加以下函数，用于定义当用户显示上一个`View Controller`时应出现的`View\
    \ Controller`：\n\n```\n    func pageViewController(_ pageViewController: UIPageViewController,\
    \ viewControllerBefore viewController: UIViewController) -> UIViewController?\
    \ {\n    guard let vcIndex = controllerArray!.firstIndex(of: viewController) else\
    \ {\n    return nil\n    }\n    let preIndex = vcIndex - 1\n    guard preIndex\
    \ >= 0 else {\n    return controllerArray!.last // 循环回到末尾\n    }\n    guard controllerArray!.count\
    \ > preIndex else {\n    return nil\n    }\n    return controllerArray![preIndex]\n\
    \    }\n```\n\n第一个`guard`语句检查确保控制器数组包含有效的`View Controllers`。然后它创建一个`preIndex`常量来表示上一个`View\
    \ Controller`。只要`preIndex`的值大于 0，`Page Controller`就可以显示数组中的上一个`View Controller`。一旦`preIndex`的值等于或小于\
    \ 0，那么显示的下一个`View Controller`将是数组中的最后一个。这创建了一个无限循环，因此显示的第一个`View Controller`会链接到数组中的最后一个`View\
    \ Controller`。\n\n最后一个`guard`语句确保数组中`View Controllers`的总数大于`preIndex`的值。最后，此函数返回数组中的上一个`View\
    \ Controller`。\n\n16.  添加以下函数，用于定义当用户显示下一个`View Controller`时应出现的`View Controller`：\n\
    \n```\n    func pageViewController(_ pageViewController: UIPageViewController,\
    \ viewControllerAfter viewController: UIViewController) -> UIViewController? {\n\
    \    guard let vcIndex = controllerArray!.firstIndex(of: viewController) else\
    \ {\n    return nil\n    }\n    let nextIndex = vcIndex + 1\n    guard controllerArray!.count\
    \ != nextIndex else {\n    return controllerArray!.first // 循环回到开头\n    }\n  \
    \  guard controllerArray!.count > nextIndex else {\n    return nil\n    }\n  \
    \  return controllerArray![nextIndex]\n    }\n```\n\n整个`PageViewController.swift`文件应如下所示：\n"
