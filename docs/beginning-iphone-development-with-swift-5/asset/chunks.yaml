    \ let go of the left mouse button to simulate a down swipe gesture. Notice that\
    \ the image view moves down.\n\n18.  Repeat steps 16 and 17 until the image view\
    \ disappears out of sight.\n\n19.  Choose Simulator ➤ Quit Simulator to return\
    \ to Xcode.\n\n## Detecting Long Press Gestures\n\nA long press gesture occurs\
    \ when the user presses one or more fingertips on the screen for a fixed amount\
    \ of time where the fingertips don’t move very far. To define a long press, you\
    \ can modify the following properties:\n\n*   .minimumPressDuration – Defines\
    \ how long one or more fingertips must press down on the screen until the long\
    \ press is recognized\n\n*   .numberOfTouchesRequired – Defines how many fingertips\
    \ must press on the screen until the longer press gesture is recognized\n\n* \
    \  .allowableMovement – Defines how far fingertips can move before the long press\
    \ gesture fails\n\nTo see how to use a long press gesture, follow these steps:\n\
    \n1.  Create a new iOS project using the Single View App template (see Chapter\
    \ [1](#329781_5_En_1_Chapter.xhtml)) and name this new project LongPressApp. This\
    \ creates a single view for the user interface.\n\n2.  Click the Main.storyboard\
    \ file in the Navigator pane. Xcode displays the single view.\n\n3.  Click the\
    \ Library icon to open the Object Library window and look for the Long Press Gesture\
    \ Recognizer as shown in Figure [11-18](#329781_5_En_11_Chapter.xhtml#Fig18).\n\
    \n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig18_HTML.jpg](images/329781_5_En_11_Chapter/329781_5_En_11_Fig18_HTML.jpg)\n\
    \nFigure 11-18\n\nThe Long Press Gesture Recognizer in the Object Library window\n\
    \n4.  Drag and drop the Long Press Gesture Recognizer onto the view. Xcode displays\
    \ the Long Press Gesture Recognizer in the Document Outline and above the View\
    \ Controller.\n\n5.  Click the Library icon to open the Object Library window\
    \ and drag and drop an image view on the user interface.\n\n6.  Choose View ➤\
    \ Inspectors ➤ Show Attributes Inspector or click the Attributes Inspector icon\
    \ in the upper right corner of the Xcode window.\n\n7.  Click in the Background\
    \ popup menu and choose a color such as green or blue. This will make the image\
    \ view easy to find when you run the app in the Simulator. Without a background\
    \ color, the default white background of the image view will blend in with the\
    \ white background of the view.\n\n8.  Select the User Interaction Enabled check\
    \ box. This allows the image view to respond to the user.\n\n9.  Click the Align\
    \ icon in the bottom of the middle Xcode pane. A window appears.\n\n10.  Select\
    \ the Horizontally in Container and Vertically in Container check boxes and then\
    \ click the Add 2 Constraints button (see Figure [11-10](#329781_5_En_11_Chapter.xhtml#Fig10)).\
    \ The image view needs to be in the center to make it easy to mimic pinching gestures\
    \ in the Simulator.\n\n11.  Choose Editor ➤ Resolve Auto Layout Issues ➤ Add Missing\
    \ Constraints in the top half of the submenu. Xcode adds additional constraints\
    \ to the image view.\n\n12.  Move the mouse pointer over the image view, hold\
    \ down the Control key, and Ctrl-drag from the image view to the Long Press Gesture\
    \ Recognizer icon in the Document Outline or at the top of the View Controller.\n\
    \n13.  Release the Control key and the left mouse button. A window appears.\n\n\
    14.  Choose gestureRecognizers. This link lets the image view detect long press\
    \ gestures.\n\n15.  Choose View ➤ Assistant Editor ➤ Show Assistant Editor, or\
    \ click the Assistant Editor icon. Xcode displays the Main.storyboard and ViewController.swift\
    \ file side by side.\n\n16.  Move the mouse pointer over the image view, hold\
    \ down the Control key, and Ctrl-drag from the image view to the ViewController.swift\
    \ file underneath the “class ViewController” line.\n\n17.  Release the Control\
    \ key and the left mouse button. A popup window appears.\n\n18.  Click in the\
    \ Name text field, type **topImageView**, and click the Connect button. Xcode\
    \ creates an IBOutlet variable as follows:\n\n```\n    @IBOutlet var topImageView:\
    \ UIImageView!\n    ```\n\n19.  Move the mouse pointer over the Long Press Gesture\
    \ Recognizer icon in the Document Outline or at the top of the View Controller,\
    \ hold down the Control key, and Ctrl-drag from the Long Press Gesture Recognizer\
    \ above the last curly bracket in the ViewController.swift file."
  trans: "\n```\nimport UIKit\nclass ViewController: UIViewController {\n    @IBOutlet\
    \ var topImageView: UIImageView!\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        topImageView.isUserInteractionEnabled = true\n        topImageView.backgroundColor\
    \ = UIColor.green\n        let downSwipeGesture = UISwipeGestureRecognizer(target:\
    \ self, action: #selector(handleDownSwipe))\n        topImageView.addGestureRecognizer(downSwipeGesture)\n\
    \        downSwipeGesture.direction = .down\n        let leftSwipeGesture = UISwipeGestureRecognizer(target:\
    \ self, action: #selector(handleLeftSwipe))\n        topImageView.addGestureRecognizer(leftSwipeGesture)\n\
    \        leftSwipeGesture.direction = .left\n        // 在这里进行视图加载后的额外设置，通常来自 nib\
    \ 文件\n    }\n    @objc func handleDownSwipe() {\n        topImageView.center =\
    \ CGPoint(x: topImageView.center.x, y: topImageView.center.y + topImageView.frame.height)\n\
    \    }\n    @objc func handleLeftSwipe() {\n        topImageView.center = CGPoint(x:\
    \ topImageView.center.x - topImageView.frame.width, y: topImageView.center.y)\n\
    \    }\n}\n```\n\n15. 点击 `Run` 按钮或选择 **Product ➤ Run**。模拟器窗口将出现。\n\n16. 将鼠标指针移动到图像视图上，按住鼠标左键，向左移动鼠标，然后松开鼠标左键，模拟左滑手势。注意图像视图会向左移动。\n\
    \n17. 将鼠标指针移动到图像视图上，按住鼠标左键，向下移动鼠标，然后松开鼠标左键，模拟下滑手势。注意图像视图会向下移动。\n\n18. 重复步骤 16\
    \ 和 17，直到图像视图移出视线。\n\n19. 选择 **Simulator ➤ Quit Simulator** 返回 Xcode。\n\n## 检测长按手势\n\
    \n当用户将一根或多根手指按在屏幕上固定一段时间，且手指没有大幅度移动时，便触发了长按手势。要定义长按手势，你可以修改以下属性：\n\n* `.minimumPressDuration`\
    \ – 定义一根或多根手指必须在屏幕上按压多久，长按手势才能被识别\n* `.numberOfTouchesRequired` – 定义必须有多少根手指按在屏幕上，长按手势才能被识别\n\
    * `.allowableMovement` – 定义在长按手势失败前，手指可以移动的最大距离\n\n要了解如何使用长按手势，请按照以下步骤操作：\n\n\
    1. 使用 **Single View App** 模板创建一个新的 iOS 项目（请参见第 1 章），并将此新项目命名为 `LongPressApp`。这将为用户界面创建一个单一视图。\n\
    \n2. 点击导航窗格中的 `Main.storyboard` 文件。Xcode 会显示该单一视图。\n\n3. 点击库图标打开对象库窗口，并查找 **Long\
    \ Press Gesture Recognizer**，如图 11-18 所示。\n\n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig18_HTML.jpg](img/329781_5_En_11_Fig18_HTML.jpg)\n\
    \n**图 11-18** — 对象库窗口中的长按手势识别器\n\n4. 将 **Long Press Gesture Recognizer** 拖放到视图上。Xcode\
    \ 会在文档大纲和视图控制器上方显示该长按手势识别器。\n\n5. 点击库图标打开对象库窗口，然后将一个图像视图拖放到用户界面上。\n\n6. 选择 **View\
    \ ➤ Inspectors ➤ Show Attributes Inspector**，或点击 Xcode 窗口右上角的 **Attributes Inspector**\
    \ 图标。\n\n7. 点击 **Background** 弹出菜单，选择绿色或蓝色等颜色。这会使你运行模拟器中的应用时，图像视图更容易被找到。如果没有设置背景颜色，图像视图默认的白色背景将与视图的白色背景融为一体。\n\
    \n8. 选中 **User Interaction Enabled** 复选框。这允许图像视图响应用户操作。\n\n9. 点击 Xcode 中间窗格底部的\
    \ **Align** 图标。会弹出一个窗口。\n\n10. 选中 **Horizontally in Container** 和 **Vertically\
    \ in Container** 复选框，然后点击 **Add 2 Constraints** 按钮（见图 11-10）。图像视图需要居中放置，以便在模拟器中更容易模拟捏合手势。\n\
    \n11. 选择子菜单上半部分的 **Editor ➤ Resolve Auto Layout Issues ➤ Add Missing Constraints**。Xcode\
    \ 会为图像视图添加额外的约束。\n\n12. 将鼠标指针移动到图像视图上，按住 **Control** 键，从图像视图拖拽到文档大纲或视图控制器顶部的 **Long\
    \ Press Gesture Recognizer** 图标上。\n\n13. 松开 **Control** 键和鼠标左键。会弹出一个窗口。\n\n14.\
    \ 选择 `gestureRecognizers`。这个链接能让图像视图检测长按手势。\n\n15. 选择 **View ➤ Assistant Editor\
    \ ➤ Show Assistant Editor**，或点击 **Assistant Editor** 图标。Xcode 会并排显示 `Main.storyboard`\
    \ 和 `ViewController.swift` 文件。\n\n16. 将鼠标指针移动到图像视图上，按住 **Control** 键，从图像视图拖拽到\
    \ `ViewController.swift` 文件中 `class ViewController` 行的下方。\n\n17. 松开 **Control**\
    \ 键和鼠标左键。会弹出一个弹出窗口。\n\n18. 点击 **Name** 文本字段，输入 `topImageView`，然后点击 **Connect**\
    \ 按钮。Xcode 会创建如下所示的 `IBOutlet` 变量：\n\n```\n@IBOutlet var topImageView: UIImageView!\n\
    ```\n\n19. 将鼠标指针移动到文档大纲或视图控制器顶部的 **Long Press Gesture Recognizer** 图标上，按住 **Control**\
    \ 键，从 **Long Press Gesture Recognizer** 拖拽到 `ViewController.swift` 文件中最后一个花括号的上方。\n"
- fmt: "20.  Release the `Control` key and the left mouse button. A popup window appears.\n\
    \n21.  Click in the `Name` text field, type `longPressDetected`, click in the\
    \ `Type` popup menu and choose `UILongPressGestureRecognizer`, and click the `Connect`\
    \ button. Xcode creates an `IBAction` method.\n\n22.  Edit the `longPressDetected`\
    \ `IBAction` method as follows:\n\n```swift\n@IBAction func longPressDetected(_\
    \ sender: UILongPressGestureRecognizer) {\n    topImageView.backgroundColor =\
    \ UIColor.red\n}\n```\n\nThe `longPressDetected` `IBAction` method changes the\
    \ background color of the image view to red when it recognizes the long press\
    \ gesture. The entire `ViewController.swift` file should look like this:\n\n```swift\n\
    import UIKit\nclass ViewController: UIViewController {\n    @IBOutlet var topImageView:\
    \ UIImageView!\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        // Do any additional setup after loading the view, typically from a nib.\n\
    \    }\n    @IBAction func longPressDetected(_ sender: UILongPressGestureRecognizer)\
    \ {\n        topImageView.backgroundColor = UIColor.red\n    }\n}\n```\n\n23.\
    \  Click the `Run` button or choose `Product ➤ Run`. The Simulator window appears.\n\
    \n24.  Move the mouse pointer over the image view, then hold down the left mouse\
    \ button. When the image view detects the long press gesture, it turns the image\
    \ view background color to red.\n\n25.  Choose `Simulator ➤ Quit Simulator` to\
    \ return to Xcode.\n\nThis example defined the long press gesture visually by\
    \ dragging the `Long Press Gesture Recognizer` from the Object Library. Now let’s\
    \ see how to duplicate this process through Swift code alone.\n\n1.  Create a\
    \ new iOS project using the `Single View App` template (see Chapter [1](#329781_5_En_1_Chapter.xhtml))\
    \ and name this new project `LongPressCodeApp`. This creates a single view for\
    \ the user interface.\n\n2.  Click the `Main.storyboard` file in the Navigator\
    \ pane. Xcode displays the single view.\n\n3.  Click the `Library` icon to open\
    \ the Object Library window and drag and drop an image view in the center of the\
    \ user interface.\n\n4.  Click the `Align` icon in the bottom of the middle Xcode\
    \ pane. A window appears.\n\n5.  Select the `Horizontally in Container` and `Vertically\
    \ in Container` check boxes and then click the `Add 2 Constraints` button (see\
    \ Figure [11-10](#329781_5_En_11_Chapter.xhtml#Fig10)). The image view needs to\
    \ be in the center to make it easy to mimic pinching gestures in the Simulator.\n\
    \n6.  Choose `Editor ➤ Resolve Auto Layout Issues ➤ Add Missing Constraints` in\
    \ the top half of the submenu. Xcode adds additional constraints to the image\
    \ view.\n\n7.  Choose `View ➤ Assistant Editor ➤ Show Assistant Editor`, or click\
    \ the `Assistant Editor` icon. Xcode displays the `Main.storyboard` and `ViewController.swift`\
    \ file side by side.\n\n8.  Move the mouse pointer over the image view, hold down\
    \ the `Control` key, and Ctrl-drag from the image view to the `ViewController.swift`\
    \ file underneath the `class ViewController` line.\n\n9.  Release the `Control`\
    \ key and the left mouse button. A popup window appears.\n\n10.  Click in the\
    \ `Name` text field, type `topImageView`, and click the `Connect` button. Xcode\
    \ creates an `IBOutlet` variable as follows:\n\n```swift\n@IBOutlet var topImageView:\
    \ UIImageView!\n```\n\n1.  Choose `View ➤ Standard Editor ➤ Show Standard Editor`,\
    \ or click the `Standard Editor` icon in the upper right corner of the Xcode window.\n\
    \n2.  Click the `ViewController.swift` file in the Navigator pane.\n\n3.  Edit\
    \ the `viewDidLoad` method as follows:\n\n```swift\noverride func viewDidLoad()\
    \ {\n    super.viewDidLoad()\n    topImageView.isUserInteractionEnabled = true\n\
    \    topImageView.backgroundColor = UIColor.green\n    let longPressGesture =\
    \ UILongPressGestureRecognizer(target: self, action: #selector(handleLongPress))\n\
    \    topImageView.addGestureRecognizer(longPressGesture)\n    // Do any additional\
    \ setup after loading the view, typically from a nib.\n}\n```\n\nThis code turns\
    \ on the `User Interaction Enabled` setting for the image view and defines its\
    \ background color as green to make it visible. Next, it defines a long press\
    \ gesture recognizer (instead of dragging and dropping a `Long Press Gesture Recognizer`\
    \ from the Object Library window), defines a function called `handleLongPress`\
    \ to respond to the long press gesture, and links the long press gesture to the\
    \ image view.\n\n4.  Add the following function underneath the `viewDidLoad` method:\n\
    \n```swift\n@objc func handleLongPress() {\n    topImageView.backgroundColor =\
    \ UIColor.red\n}\n```\n\nThe entire `ViewController.swift` file should look like\
    \ this:\n\n```swift\nimport UIKit\nclass ViewController: UIViewController {\n\
    \    @IBOutlet var topImageView: UIImageView!\n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        topImageView.isUserInteractionEnabled\
    \ = true\n        topImageView.backgroundColor = UIColor.green\n        let longPressGesture\
    \ = UILongPressGestureRecognizer(target: self, action: #selector(handleLongPress))\n\
    \        topImageView.addGestureRecognizer(longPressGesture)\n        // Do any\
    \ additional setup after loading the view, typically from a nib.\n    }\n    @objc\
    \ func handleLongPress() {\n        topImageView.backgroundColor = UIColor.red\n\
    \    }\n}\n```\n\n5.  Click the `Run` button or choose `Product ➤ Run`. The Simulator\
    \ window appears.\n\n6.  Move the mouse pointer over the image view, then hold\
    \ down the left mouse button to mimic a long press. Notice that the image view\
    \ changes color from green to red.\n\n7.  Choose `Simulator ➤ Quit Simulator`\
    \ to return to Xcode.\n\n## Summary\n\nTouch gestures give commands to an app\
    \ without placing an object on the user interface such as a button. Gestures can\
    \ often work with one or more fingertips that you can define using either the\
    \ `Attributes Inspector` pane or through Swift code.\n\nThere are two ways to\
    \ add gesture recognizers to an app. First, you can add a gesture recognizer to\
    \ a storyboard through the Object Library. Once you add a gesture recognizer to\
    \ a project, you’ll need to Ctrl-drag from an object to the gesture recognizer\
    \ to make that object recognize that particular gesture. Next you’ll need to create\
    \ an `IBAction` method to respond when the gesture is recognized.\n\nA second\
    \ method involves writing Swift code to create a gesture recognizer, adding a\
    \ gesture recognizer to an `IBOutlet` object, and then writing a function to handle\
    \ the gesture when it’s recognized. Both methods work identically so it’s a matter\
    \ of choosing the method you prefer.\n\nAdding gestures to an app can make the\
    \ user interface less cluttered and more intuitive by letting users directly manipulate\
    \ objects on the screen."
