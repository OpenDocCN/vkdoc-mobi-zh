    \ 14-14 所示。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig14_HTML.jpg](img/329781_5_En_14_Fig14_HTML.jpg)\n\
    \n图 14-14\n\n在表格视图的最右侧出现一个索引\n\n9. 点击 `R` 索引项。注意，由于字母 `R` 是索引中的第四项，表格视图会跳转到第四部分。\n\
    \n10. 点击 `B` 索引项。注意，由于字母 `B` 是索引中的第一项，表格视图会跳转到第一部分。\n\n11. 点击另外两个索引条目（`F` 和 `M`），查看表格视图如何跳转到各个部分。\n\
    \n12. 选择 **模拟器** ➤ **退出模拟器** (Simulator ➤ Quit Simulator) 以返回 `Xcode`。\n\n## 使用表格视图控制器\n\
    \n在本章中，我们一直使用的是**单视图应用** (Single View App) 项目，并从对象库窗口中添加了一个**表视图** (table view)。创建表格视图的第二种方法是在故事板中添加一个表格视图控制器。表视图和表格视图控制器之间的主要区别在于，表格视图控制器包含以下部分：\n\
    \n* 一个视图控制器\n* 该视图控制器上的一个表视图\n* 表视图上的一个表格视图单元格\n\n要了解如何使用表格视图控制器，请遵循以下步骤：\n\n\
    1. 使用**单视图应用** (Single View App) 模板创建一个新的 iOS 项目（参见第 1 章），并将此新项目命名为 `TableViewControllerApp`。这会为用户界面创建一个单视图。\n\
    \n2. 在导航面板中点击 `Main.storyboard` 文件。Xcode 会显示每个单视图应用项目自动附带的单视图。\n\n3. 在文档大纲中点击**视图控制器场景**\
    \ (View Controller Scene)，如图 14-15 所示。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig15_HTML.jpg](img/329781_5_En_14_Fig15_HTML.jpg)\n\
    \n图 14-15\n\n选中一个视图控制器\n\n4. 按 **退格键** (BACKSPACE) 或 **删除键** (DELETE) 从故事板中删除该视图控制器。Xcode\
    \ 会从故事板中移除选中的视图控制器。\n\n5. 在导航面板中点击 `ViewController.swift` 文件。这个 `.swift` 文件之前是连接到我们刚删除的那个视图控制器的，所以我们不再需要它了。\n\
    \n6. 按 **退格键** (BACKSPACE) 或 **删除键** (DELETE) 删除 `ViewController.swift` 文件。此时会弹出一个对话框，询问您是移除文件的引用还是将其移到废纸篓，如图\
    \ 14-16 所示。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig16_HTML.jpg](img/329781_5_En_14_Fig16_HTML.jpg)\n\
    \n图 14-16\n\n删除 `.swift` 文件时提供选项\n\n7. 点击 **移到废纸篓** (Move to Trash)。Xcode 会删除\
    \ `ViewController.swift` 文件。\n\n8. 点击 **库** (Library) 图标打开**对象库** (Object Library)\
    \ 窗口，查找黄色的**表格视图控制器**图标，如图 14-17 所示。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig17_HTML.jpg](img/329781_5_En_14_Fig17_HTML.jpg)\n\
    \n图 14-17\n\n对象库窗口中的表格视图控制器\n\n9. 将**表格视图控制器**从对象库窗口拖拽到空白的故事板上。Xcode 会显示该表格视图控制器，如图\
    \ 14-18 所示。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig18_HTML.jpg](img/329781_5_En_14_Fig18_HTML.jpg)\n\
    \n图 14-18\n\n故事板中的表格视图控制器\n\n10. 选择 **视图** ➤ **检查器** ➤ **显示属性检查器** (View ➤ Inspectors\
    \ ➤ Show Attributes Inspector)，或者点击 Xcode 窗口右上角的**属性检查器** (Attributes Inspector)\
    \ 图标。\n\n11. 选中 **是初始视图控制器** (Is Initial View Controller) 复选框，如图 14-19 所示。注意，选中此复选框后，表格视图控制器的左侧会出现一个箭头。\n\
    \n**注意** **只有一个**视图控制器可以被指定为初始视图控制器。初始视图控制器定义了应用运行时会出现的第一个视图控制器。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig19_HTML.jpg](img/329781_5_En_14_Fig19_HTML.jpg)\n\
    \n图 14-19\n\n“是初始视图控制器”复选框\n\n现在故事板中有了一个表格视图控制器，我们需要将其连接到一个 `.swift` 文件。这涉及两步过程：首先创建一个\
    \ `.swift` 文件，然后将它连接到表格视图控制器。\n\n1. 选择 **文件** ➤ **新建** ➤ **文件** (File ➤ New ➤\
    \ File)。此时会弹出一个模板对话框，如图 14-20 所示。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig20_HTML.jpg](img/329781_5_En_14_Fig20_HTML.jpg)\n\
    \n图 14-20\n\n文件模板对话框\n"
- fmt: "2.  Click `Cocoa Touch Class` and click the **Next** button. Another dialog\
    \ appears.\n\n3.  Click in the `Class` text field, delete the existing text, and\
    \ type `TableViewController`. (This class name can be any arbitrary name you wish.)\n\
    \n4.  Click in the `Subclass of` text field and choose `UITableViewController`\
    \ as shown in Figure [14-21](#329781_5_En_14_Chapter.xhtml#Fig21). Then click\
    \ the **Next** button.\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig21_HTML.jpg](images/329781_5_En_14_Chapter/329781_5_En_14_Fig21_HTML.jpg)\n\
    \nFigure 14-21  \nNaming the `.swift` file and defining its subclass\n\n5.  Another\
    \ dialog appears to ask you where to store this `.swift` file. Click the **Create**\
    \ button. Xcode creates the `TableViewController.swift` file. Now the next step\
    \ is to connect this `.swift` file to the Table View Controller.\n\n6.  Click\
    \ the `Main.storyboard` file in the Navigator pane.\n\n7.  Click the Table View\
    \ Controller Scene in the Document Outline or the Table View Controller icon above\
    \ the Table View Controller in the storyboard.\n\n8.  Choose `View` ➤ `Inspectors`\
    \ ➤ `Show Identity Inspector`, or click the Identity Inspector icon in the upper\
    \ right corner of the Xcode window.\n\n9.  Click the `Class` popup menu and choose\
    \ `TableViewController` (or whatever name you gave your `.swift` file in step\
    \ 14) as shown in Figure [14-22](#329781_5_En_14_Chapter.xhtml#Fig22). Connecting\
    \ a `.swift` file to a View Controller now lets you create `IBOutlets`, `IBAction`\
    \ methods, and Swift code to work with the Table View Controller.\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig22_HTML.jpg](images/329781_5_En_14_Chapter/329781_5_En_14_Fig22_HTML.jpg)\n\
    \nFigure 14-22  \nConnecting a `.swift` file to the Table View Controller\n\n\
    10.  Click Table View Cell in the Document Outline. (You may need to click the\
    \ gray disclosure triangle to find the Table View Cell.)\n\n11.  Choose `View`\
    \ ➤ `Inspectors` ➤ `Show Attributes Inspector`, or click the Attributes Inspector\
    \ icon in the upper right corner of the Xcode window.\n\n12.  Click in the `Identifier`\
    \ text field and type `cellID` as shown in Figure [14-23](#329781_5_En_14_Chapter.xhtml#Fig23).\
    \ (This can be any arbitrary name.) Then press ENTER.\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig23_HTML.jpg](images/329781_5_En_14_Chapter/329781_5_En_14_Fig23_HTML.jpg)\n\
    \nFigure 14-23  \nDefining an Identifier for the Table View Cell\n\n13.  Click\
    \ the `TableViewController.swift` file in the Navigator pane.\n\n14.  Add the\
    \ following code underneath the `class TableViewController` line as follows:\n\
    \n```\nlet petArray = [\"cat\", \"dog\", \"parakeet\", \"parrot\", \"canary\"\
    , \"finch\", \"tropical fish\", \"goldfish\", \"sea horses\", \"hamster\", \"\
    gerbil\", \"rabbit\", \"turtle\", \"snake\", \"lizard\", \"hermit crab\"]\n```\n\
    \n15.  Edit the `numberOfSections` function as follows:\n\n```\noverride func\
    \ numberOfSections(in tableView: UITableView) -> Int {\n    return 1\n}\n```\n\
    \n16.  Edit the `numberOfRowsInSection` function as follows:\n\n```\noverride\
    \ func tableView(_ tableView: UITableView, numberOfRowsInSection section: Int)\
    \ -> Int {\n    return petArray.count\n}\n```\n\n17.  Add the following `cellForRowAt`\
    \ function to store data in the table View Cell:\n\n```\noverride func tableView(_\
    \ tableView: UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell\
    \ {\n    let cell = tableView.dequeueReusableCell(withIdentifier: \"cellID\")\n\
    \    cell?.textLabel?.text = petArray[indexPath.row]\n    return cell!\n}\n```\n\
    \n18.  Add the following `didSelectRowAt` function to identify which item the\
    \ user selected:\n\n```\noverride func tableView(_ tableView: UITableView, didSelectRowAt\
    \ indexPath: IndexPath) {\n    let selectedItem = petArray[indexPath.row]\n  \
    \  let alert = UIAlertController(title: \"Your Choice\", message: \"\\(selectedItem)\"\
    , preferredStyle: .alert)\n    let okAction = UIAlertAction(title: \"OK\", style:\
    \ .default, handler: { action -> Void in\n        //Just dismiss the action sheet\n\
    \    })\n    alert.addAction(okAction)\n    self.present(alert, animated: true,\
    \ completion: nil)\n}\n```\n\n19.  Click the `Main.storyboard` file in the Navigator\
    \ pane.\n\n20.  Click the Run button or choose `Product` ➤ `Run`. The Simulator\
    \ window appears, displaying the data in your table view (see Figure [14-4](#329781_5_En_14_Chapter.xhtml#Fig4)).\n\
    \n21.  Click an item in the table view. An alert controller appears to identify\
    \ your choice (see Figure [14-9](#329781_5_En_14_Chapter.xhtml#Fig9)).\n\n22.\
    \  Click OK to dismiss the alert controller.\n\n23.  Choose `Simulator` ➤ `Quit\
    \ Simulator` to return to Xcode.\n\n## Summary\n\nTable views display rows of\
    \ data that users can select. A table view requires a data source and functions\
    \ to define how many rows to display. A simple table view displays one section,\
    \ but a table view can display multiple sections where each section contains different\
    \ numbers of rows.\n\nEach row in a table view is defined by a cell. You can define\
    \ a cell using Swift code or visually by dragging and dropping a Table View Cell\
    \ onto a table view. You must give this cell an identifying name so your swift\
    \ code can reference this cell to store data in it.\n\nWhen using a Table View\
    \ Controller, you need to connect it to its own `.swift` file that you can define\
    \ to make it represent a `UITableViewController`. This eliminates the need to\
    \ declare the `.swift` file as the table view’s delegate and data source.\n\n\
    The main difference between a table view and a Table View Controller is that a\
    \ table view appears on an existing view while a Table View Controller appears\
    \ in the storyboard.\n\n# 15. Customizing Table View Cells\n\nChapter [14](#329781_5_En_14_Chapter.xhtml)\
    \ explained how to create different types of table views including plain and grouped\
    \ tables along with section indexes. So far, we’ve only used a simple cell that\
    \ displays a single line of text. In this chapter you’ll learn how to customize\
    \ a cell to display additional text and images. In addition, you’ll also learn\
    \ how to modify the appearance of cells.\n\nCells in a table view can display\
    \ the following as shown in Figure [15-1](#329781_5_En_15_Chapter.xhtml#Fig1):\n\
    \n![../images/329781_5_En_15_Chapter/329781_5_En_15_Fig1_HTML.jpg](images/329781_5_En_15_Chapter/329781_5_En_15_Fig1_HTML.jpg)\n\
    \nFigure 15-1.  \nThe parts of a Table View Cell\n\n*   `textLabel` – Defines\
    \ the main text displayed in a cell\n*   `detailTextLabel` – Defines the secondary\
    \ text that appears in a smaller font size than the `textLabel` text\n*   `imageView`\
    \ – Defines an image that appears in a cell\n\n## Customizing a Table View Cell\
    \ in Swift\n\nTable view Cells can appear in different styles, which define how\
    \ text, detail text, and images appear. The four different types of cell styles\
    \ are shown in Figure [15-2](#329781_5_En_15_Chapter.xhtml#Fig2):\n\n*   `.default`\
    \ – Displays a text label, but no detail text label. An image view can appear\
    \ on the left.\n*   `.value1` – Displays a text label on the left and a detail\
    \ text label on the right. An image view can appear on the left.\n*   `.value2`\
    \ – Displays a text label in blue indented from the left and a detail text label\
    \ indented from the right. Does not display an image view.\n*   `.subtitle` –\
    \ Displays a text label on the left and a detail text label underneath in a smaller\
    \ font size. An image view can appear on the left.\n\n![../images/329781_5_En_15_Chapter/329781_5_En_15_Fig2_HTML.jpg](images/329781_5_En_15_Chapter/329781_5_En_15_Fig2_HTML.jpg)\n\
    \nFigure 15-2  \nThe four different styles for a cell"
