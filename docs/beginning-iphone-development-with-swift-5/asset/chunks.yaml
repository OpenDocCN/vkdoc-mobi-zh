- fmt: "# Working with Multiple Controllers\n\nA simple iOS app might consist of a\
    \ single view such as the Calculator app. However, most apps will consist of two\
    \ or more controllers that display different views to appear on the screen. That\
    \ means you need to know how to work with multiple controllers in a storyboard\
    \ that make up an iOS app’s user interface.\n\nWhen a storyboard contains two\
    \ or more controllers, you need to define one to be the initial View Controller,\
    \ which is the first screen to appear when your app runs. To see how this works,\
    \ follow these steps:\n\n1. Make sure your `MySecondApp` project is loaded in\
    \ `Xcode`.\n2. Click the `Main.storyboard` file in the Navigator pane.\n3. Click\
    \ the Library icon to display the Object Library.\n4. Drag and drop a second View\
    \ Controller onto the storyboard as shown in Figure [5-6](#329781_5_En_5_Chapter.xhtml#Fig6).\n\
    \   ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig6_HTML.jpg](images/329781_5_En_5_Chapter/329781_5_En_5_Fig6_HTML.jpg)\n\
    \   *Figure 5-6. Adding a second View Controller to a storyboard*\n5. Click the\
    \ View that appears underneath the second View Controller you just added in the\
    \ Document Outline.\n6. Choose View ➤ Inspectors ➤ Show Attributes Inspector,\
    \ or click the Attributes Inspector icon that appears at the top of the Inspector\
    \ pane.\n7. Click the Background popup menu to display a color palette as shown\
    \ in Figure [5-7](#329781_5_En_5_Chapter.xhtml#Fig7).\n   ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig7_HTML.jpg](images/329781_5_En_5_Chapter/329781_5_En_5_Fig7_HTML.jpg)\n\
    \   *Figure 5-7. Changing the background color of a View Controller*\n8. Click\
    \ a color such as blue or yellow. The goal is to choose a different background\
    \ color other than white to make it easy to see which controller appears when\
    \ you run the app. `Xcode` displays your chosen color in the view. Now let’s make\
    \ this colored view appear as the initial View Controller so it appears when the\
    \ app first runs.\n9. Click the second View Controller that contains the view\
    \ with the colored background that you chose in step 8.\n10. Drag the arrow from\
    \ the first controller to the second. (You can also choose View ➤ Inspectors ➤\
    \ Show Attributes Inspector and then select the Is Initial View Controller check\
    \ box.) The initial View Controller arrow should now be pointing at the View Controller\
    \ with the non-white background as shown in Figure [5-8](#329781_5_En_5_Chapter.xhtml#Fig8).\n\
    \    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig8_HTML.jpg](images/329781_5_En_5_Chapter/329781_5_En_5_Fig8_HTML.jpg)\n\
    \    *Figure 5-8. Changing the initial View Controller*\n11. Click the Run button\
    \ or choose Product ➤ Run. The Simulator runs your app. Notice that the colored\
    \ view appears.\n12. Choose Simulator ➤ Quit Simulator to return to `Xcode`.\n\
    13. Drag the arrow from the second (colored) controller to the first (with the\
    \ white background).\n14. Click the Run button or choose Product ➤ Run. The Simulator\
    \ appears. Notice that the white background appears.\n15. Choose Simulator ➤ Quit\
    \ Simulator to return to `Xcode`.\n\n# Transitioning Between Controllers\n\nRight\
    \ now our app has two controllers, but only one can appear at any given time (the\
    \ one defined as the initial View Controller). To allow an app to display more\
    \ than one view while running, you have several options. First, you can manually\
    \ create links between two controllers. Second, you can place two or more controllers\
    \ inside a Navigation or Tab Bar Controller.\n\nTo see how to manually link controllers\
    \ together, follow these steps:\n\n1. Make sure the `MySecondApp` project is loaded\
    \ in `Xcode`.\n2. Click the `Main.storyboard` file in the Navigator pane. `Xcode`\
    \ displays the two existing views where one has a white background and the other\
    \ has a colored background. An arrow should be pointing at the white view to show\
    \ that this is the initial View Controller that appears when the app runs.\n3.\
    \ Click the Library icon to display the Object Library window. Then drag and drop\
    \ a button onto the view of the first (white background) controller. (The exact\
    \ location of the button doesn’t matter.)\n4. Move the mouse pointer over this\
    \ button, hold down the Control key, and Ctrl-drag the mouse to point over the\
    \ second view, which `Xcode` highlights as shown in Figure [5-9](#329781_5_En_5_Chapter.xhtml#Fig9).\
    \ (As an alternative, you can also Ctrl-drag from the button to the second View\
    \ Controller in the Document Outline as shown in Figure [5-10](#329781_5_En_5_Chapter.xhtml#Fig10).)\n\
    \   ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig10_HTML.jpg](images/329781_5_En_5_Chapter/329781_5_En_5_Fig10_HTML.jpg)\n\
    \   *Figure 5-10. Ctrl-dragging from a button to another View Controller in the\
    \ Document Outline also creates a segue link*\n   ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig9_HTML.jpg](images/329781_5_En_5_Chapter/329781_5_En_5_Fig9_HTML.jpg)\n\
    \   *Figure 5-9. Ctrl-dragging from a button to another view creates a segue link*\n\
    5. Release the left mouse button and Control key. A popup menu appears as shown\
    \ in Figure [5-11](#329781_5_En_5_Chapter.xhtml#Fig11).\n   ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig11_HTML.jpg](images/329781_5_En_5_Chapter/329781_5_En_5_Fig11_HTML.jpg)\n\
    \   *Figure 5-11. After Ctrl-dragging, a menu appears to define how to display\
    \ the next controller*\n6. Choose `Show`. `Xcode` creates a segue between the\
    \ two controllers.\n7. Click the segue to select it. Then choose View ➤ Inspectors\
    \ ➤ Show Attributes Inspector, or click the Attributes Inspector icon at the top\
    \ of the Inspector pane. Notice that the Kind popup menu lets you define the segue\
    \ as well as shown in Figure [5-12](#329781_5_En_5_Chapter.xhtml#Fig12).\n   ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig12_HTML.jpg](images/329781_5_En_5_Chapter/329781_5_En_5_Fig12_HTML.jpg)\n\
    \   *Figure 5-12. The Attributes Inspector of the segue lets you change the type\
    \ of segue*\n8. Click the Library icon again to display the Object Library window.\
    \ Then drag and drop a button anywhere on the second (colored) view.\n9. Ctrl-drag\
    \ from this button on the colored view to the first (white) controller. Release\
    \ the Control key and left mouse button to display a popup menu (see Figure [5-11](#329781_5_En_5_Chapter.xhtml#Fig11)).\n\
    10. Choose `Show`. `Xcode` creates a second segue linking the two controllers\
    \ together as shown in Figure [5-13](#329781_5_En_5_Chapter.xhtml#Fig13). Before\
    \ we run this app, we need to make sure the storyboard choice of an iOS device\
    \ matches with the Simulator’s choice of an iOS device.\n    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig13_HTML.jpg](images/329781_5_En_5_Chapter/329781_5_En_5_Fig13_HTML.jpg)\n\
    \    *Figure 5-13. Two controllers in a storyboard linked together by two segues*\n\
    11. Look at the bottom of the middle Xcode pane to see which type of iOS device\
    \ your storyboard currently mimics. In Figure [5-14](#329781_5_En_5_Chapter.xhtml#Fig14),\
    \ the storyboard mimics an iPhone 8. You can click this “View as:” text to display\
    \ different iOS devices to mimic.\n    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig14_HTML.jpg](images/329781_5_En_5_Chapter/329781_5_En_5_Fig14_HTML.jpg)"
