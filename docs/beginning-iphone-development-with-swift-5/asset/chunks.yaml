    \    petTable.dataSource = self\n    petTable.delegate = self\n    // Do any additional\
    \ setup after loading the view, typically from a nib.\n    }\n    func tableView(_\
    \ tableView: UITableView, numberOfRowsInSection section: Int) -> Int {\n    return\
    \ petArray[section].count - 1\n    }\n    func tableView(_ tableView: UITableView,\
    \ cellForRowAt indexPath: IndexPath) -> UITableViewCell {\n    var cell = tableView.dequeueReusableCell(withIdentifier:\
    \ cellID)\n    if (cell == nil) {\n    cell = UITableViewCell(\n    style: UITableViewCell.CellStyle.default,\n\
    \    reuseIdentifier: cellID)\n    }\n    cell?.textLabel?.text = petArray[indexPath.section][indexPath.row\
    \ + 1]\n    return cell!\n    }\n    func tableView(_ tableView: UITableView,\
    \ didSelectRowAt indexPath: IndexPath) {\n    let selectedItem = petArray[indexPath.section][indexPath.row\
    \ + 1]\n    let alert = UIAlertController(title: \"Your Choice\", message: \"\\\
    (selectedItem)\", preferredStyle: .alert)\n    let okAction = UIAlertAction(title:\
    \ \"OK\", style: .default, handler: { action -> Void in\n    //Just dismiss the\
    \ action sheet\n    })\n    alert.addAction(okAction)\n    self.present(alert,\
    \ animated: true, completion: nil)\n    }\n    // Code for creating a grouped\
    \ table\n    // First, change the Style property of the table view to Grouped\
    \ in the Attributes Inspector pane\n    func numberOfSections(in tableView: UITableView)\
    \ -> Int {\n    return petArray.count\n    }\n    func tableView(_ tableView:\
    \ UITableView, titleForHeaderInSection section: Int) -> String? {\n    return\
    \ petArray[section][0]\n    }\n    }\n    ```\n\n12.  Click the Run button or\
    \ choose Product ➤ Run. The Simulator window appears, displaying the grouped data\
    \ in the table view as shown in Figure [14-12](#329781_5_En_14_Chapter.xhtml#Fig12).\n\
    \n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig12_HTML.jpg](images/329781_5_En_14_Chapter/329781_5_En_14_Fig12_HTML.jpg)\n\
    \nFigure 14-12\n\nA grouped table view\n\n13.  Click an item in the table view.\
    \ An alert controller appears to identify your choice.\n\n14.  Click OK to dismiss\
    \ the alert controller.\n\n15.  Choose Simulator ➤ Quit Simulator to return to\
    \ Xcode.\n\n## Displaying Indexes\n\nWhen a table view displays large amounts\
    \ of data, it can be cumbersome for users to scroll from one end of the table\
    \ view list to the other. To solve this problem, table views can display an index,\
