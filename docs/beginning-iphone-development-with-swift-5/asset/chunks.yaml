    class ViewController: UIViewController {

    @IBOutlet var labelValue: UILabel!

    @IBOutlet var stepperValue: UIStepper!

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view, typically from a nib.

    }

    @IBAction func stepperChanged(_ sender: UIStepper) {

    labelValue.text = "\(stepperValue.value)"

    }

    @IBAction func changeStepper(_ sender: UIButton) {

    stepperValue.minimumValue = -10

    stepperValue.maximumValue = -5

    stepperValue.stepValue = 0.5

    stepperValue.isContinuous = true

    stepperValue.autorepeat = true

    stepperValue.wraps = true

    }

    }

    ```


    ## Using Sliders


    Like a stepper, a slider lets the user choose a numeric value without typing a
    specific number. While a stepper forces users to increment/decrement values by
    a fixed amount, sliders make it easy for users to choose between a range of values
    quickly by simply changing the slider’s position.


    One drawback of sliders is that they take up more space than steppers. Another
    drawback is that steppers let you define a fixed increment/decrement value, while
    a slider does not.


    A slider consists of three parts as shown in Figure [8-3](#329781_5_En_8_Chapter.xhtml#Fig3):


    ![../images/329781_5_En_8_Chapter/329781_5_En_8_Fig3_HTML.jpg](images/329781_5_En_8_Chapter/329781_5_En_8_Fig3_HTML.jpg)


    Figure 8-3


    The three parts of a slider


    *   A thumb

    *   A minimum track

    *   A maximum track


    The minimum track and maximum track typically appear in different colors to make
    it easy to see the position of the thumb. However, you can define colors for the
    thumb, minimum, and maximum track to make them more visible.


    To see how to use a slider, follow these steps:


    1.  Create a new iOS project using the Single View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml))
    and name this new project `SliderApp`. This creates a single view for the user
    interface.


    2.  Click the `Main.storyboard` file in the Navigator pane. Xcode displays the
    single view.


    3.  Click the Library icon to display the Object Library.


    4.  Drag and drop a label, a button, and a slider onto the view.


    5.  Expand the width of the slider to make it longer.


    6.  Choose Editor ➤ Resolve Auto Layout Issues ➤ Reset to Suggested Constraints
    in the bottom half of the submenu. This applies constraints to the label, button,
    and slider.


    7.  Choose View ➤ Assistant Editor ➤ Show Assistant Editor, or click the Assistant
    Editor icon. Xcode displays the `Main.storyboard` and `ViewController.swift` file
    side by side.


    8.  Move the mouse pointer over the label, hold down the Control key, and Ctrl-drag
    from the label to the `ViewController.swift` file underneath the `class ViewController`
    line.


    9.  Release the Control key and the left mouse button. A popup window appears.


    10.  Click in the Name text field, type `labelValue`, and click the Connect button.
    Xcode creates an `IBOutlet` variable as follows:


    ```swift

    @IBOutlet var labelValue: UILabel!

    ```


    11.  Move the mouse pointer over the slider, hold down the Control key, and Ctrl-drag
    from the slider to the `ViewController.swift` file underneath the `IBOutlet` line.


    12.  Release the Control key and the left mouse button. A popup window appears.


    13.  Click in the Name text field, type `sliderValue`, and click the Connect button.
    Xcode creates an `IBOutlet` variable as follows:


    ```swift

    @IBOutlet var sliderValue: UISlider!

    ```


    14.  Move the mouse pointer over the button, hold down the Control key, and Ctrl-drag
    from the button to the `ViewController.swift` file above the last curly bracket
    at the bottom of the file.


    15.  Release the Control key and the left mouse button. A popup window appears.


    16.  Click in the Name text field, type `changeSlider`, click the Type popup menu
    and choose `UIButton`, and click the Connect button. Xcode creates an `IBAction`
    method as follows:


    ```swift

    @IBAction func changeSlider(_ sender: UIButton) {

    }

    ```


    17.  Move the mouse pointer over the slider, hold down the Control key, and Ctrl-drag
    from the slider to the `ViewController.swift` file above the last curly bracket
    at the bottom of the file.


    18.  Release the Control key and the left mouse button. A popup window appears.


    19.  Click in the Name text field, type `sliderValueChanged`, click the Type popup
    menu and choose `UISlider`, and click the Connect button. Xcode creates an `IBAction`
    method as follows:


    ```swift

    @IBAction func sliderValueChanged(_ sender: UISlider) {

    }

    ```


    20.  Choose View ➤ Standard Editor ➤ Show Standard Editor, or click the Standard
    Editor icon in the upper right corner of the Xcode window.


    21.  Click the `ViewController.swift` file in the Navigator pane to edit it.


    22.  Modify the `sliderValueChanged` method as follows:


    ```swift

    @IBAction func sliderValueChanged(_ sender: UISlider) {

    labelValue.text = "\(sliderValue.value)"

    }

    ```


    The entire `ViewController.swift` file should look like this:


    ```swift

    import UIKit

    class ViewController: UIViewController {

    @IBOutlet var labelValue: UILabel!

    @IBOutlet var sliderValue: UISlider!

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view, typically from a nib.

    }

    @IBAction func changeSlider(_ sender: UIButton) {

    }

    @IBAction func sliderValueChanged(_ sender: UISlider) {

    labelValue.text = "\(sliderValue.value)"

    }

    }

    ```


    23.  Click the Run button or choose Product ➤ Run. The Simulator window appears.


    24.  Drag the slider left and right. Notice that if you drag the slider thumb
    to the far left, the value 0 (zero) appears in the label, but if you drag the
    thumb to the far right, the value of 1.0 appears. That’s because the default minimum
    and maximum values of the slider are 0 and 1, respectively.


    25.  Choose Simulator ➤ Quit Simulator to return to Xcode.'
