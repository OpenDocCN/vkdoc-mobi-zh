  trans: '

    # 理解约束


    约束通过三个标准来定义位置、大小或距离：


    *   `常量` – 定义约束的数值

    *   `优先级` – 定义哪些约束比其他约束更重要，范围从必需（1000）到高（750）再到低（250）

    *   `乘数` – 乘以常量以定义约束的总值


    常量的三种选择是像 `37` 这样的数值、`标准值`或`画布值`，如图 13-1 所示。


    ![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig1_HTML.jpg](img/329781_5_En_13_Fig1_HTML.jpg)


    **图 13-1** — 在约束中定义常量的三种选项


    数值定义了一个特定的值，例如 `12` 或 `84`。当你创建约束时，Xcode 会使用数值。


    `标准值` 使用 Xcode 推荐的值。由于你的应用可能运行在不同尺寸的 iOS 屏幕上，`标准值`通常是最安全的选择。


    `画布值` 与特定的数值类似，但它与故事板的当前 iOS 屏幕尺寸绑定。这意味着如果你的应用在另一个屏幕尺寸上运行，该约束可能无法保持对象的正确距离或位置。


    ### 注意

    作为编程中的一般原则，通常最好避免依赖被称为“魔术数字”的特定值。“魔术数字”表现为一个抽象的数值，不解释其含义或程序员是如何得出该值的。在大多数情况下，为约束使用`标准值`。


    在定义约束的值时，有三种选择：


    *   `等于 (=)` – 约束必须精确等于特定值。

    *   `小于或等于 (≤)` – 约束可以小于或等于特定值。

    *   `大于或等于 (≥)` – 约束可以大于或等于特定值。


    通过将约束定义为小于等于或大于等于某个值，你可以为约束提供更大的灵活性，使其即使在屏幕尺寸或方向发生变化时也能正常工作。


    `优先级`定义了约束的重要性。默认情况下，每个约束都被分配为必需（1000）优先级。然而，当你添加多个约束时，两个或更多约束可能会冲突。例如，一个约束可以定义一个按钮距离左边缘
    `97` 点，而第二个约束可能定义该按钮距离右边缘 `232` 点。


    当 iPhone 处于竖屏模式时，这可能工作得很好，但当你将其侧放至横屏模式时，保持距左 `97` 点和距右 `232` 点的距离意味着按钮必须在宽度上拉伸以满足这两个约束。如果按钮的宽度也被限制在某个尺寸（例如
    `46` 点），那么所有三个约束将不可能同时工作，如图 13-2 所示。


    ![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig2_HTML.jpg](img/329781_5_En_13_Fig2_HTML.jpg)


    **图 13-2** — 约束在不同方向或屏幕尺寸下可能相互冲突


    为了避免多个约束冲突，你可以为每个约束分配不同的优先级值。最重要的约束获得更高的值（例如 `1000`），而其他不太重要的约束获得较低的值（例如 `750`
    或 `250`）。现在，Xcode 会先遵循最高优先级的约束，然后再尝试遵循较低优先级的约束。如果较低优先级的约束无法满足，那么较高优先级的约束将优先，而较低优先级的约束将被忽略。


    `乘数`可以定义两个对象之间的百分比关系。默认乘数值是 `1`，但你可以更改它，使乘数值小于或大于 `1`，例如 `0.5` 或 `1.5`。


    对象通常需要两个或更多约束来准确地在用户界面上定义其大小和位置。当你向对象添加约束时，Xcode 会使用颜色来告知你约束的有效程度。这些不同颜色的含义是：


    *   **蓝色** – 该对象拥有所有必要的约束，以准确地在用户界面上定义其大小和位置。

    *   **橙色** – 该对象没有足够的约束来在用户界面上定义其大小和位置。

    *   **红色** – 该对象存在冲突的约束，需要修改或删除。


    当你添加约束时，Xcode 还会在你选定的对象周围显示一个框架。该框架通常出现在对象的边框周围，但如果你应用了约束然后移动对象，你会看到该框架呈现为虚线矩形。该框架显示了对象将出现的位置，即使该对象出现在用户界面的其他位置，如图
    13-3 所示。


    ![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig3_HTML.jpg](img/329781_5_En_13_Fig3_HTML.jpg)


    **图 13-3** — 框架显示了因约束而对象将出现的位置


    要创建对象上的约束，请选择该对象，然后选择以下方法之一：

    '
- fmt: '*   选择 `Editor` ➤ `Resolve Auto Layout Issues`，然后选择一个选项，让 Xcode 自动定义约束。

    *   点击 Xcode 窗口底部的 `Align` 或 `Add new constraints` 图标。

    *   从某个对象 `Ctrl`-拖拽至另一个对象。


    `Resolve Auto Layout Issues` 子菜单会在上半部分和下半部分显示相同的命令，如图 13-4 所示。上半部分的子菜单仅影响所选对象，而下半部分的子菜单则影响当前视图中显示的所有对象。


    ![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig4_HTML.jpg](images/329781_5_En_13_Chapter/329781_5_En_13_Fig4_HTML.jpg)


    **图 13-4** `Resolve Auto Layout` 子菜单


    `Resolve Auto Layout Issues` 子菜单的可用选项包括：


    *   `Update Frames` – 用于将对象移动到其框架所在的位置。

    *   `Update Constraint Constants` – 用于将框架和所有约束移动到对象的当前位置。

    *   `Add Missing Constraints` – 为对象上的现有约束添加新约束。

    *   `Reset to Suggested Constraints` – 删除所有现有约束，并添加 Xcode 认为对象需要的新约束。

    *   `Clear Constraints` – 删除对象上的所有约束。


    点击 `Align` 图标会显示一个弹出窗口，让您可以定义对象在视图中的位置，例如水平或垂直位置。如果您选择了两个或多个对象，可以按对象的侧边、顶部或底部将一个对象与另一个对象对齐，如图
    13-5 所示。


    ![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig5_HTML.jpg](images/329781_5_En_13_Chapter/329781_5_En_13_Fig5_HTML.jpg)


    **图 13-5** `Align` 弹出窗口


    点击 `Add new constraints` 图标会显示一个弹出窗口，让您可以定义尺寸（宽度和高度）以及到附近对象的距离，如图 13-6 所示。如果您选择了两个或多个对象，还可以定义所有选中的对象具有相同的宽度或高度。


    ![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig6_HTML.jpg](images/329781_5_En_13_Chapter/329781_5_En_13_Fig6_HTML.jpg)


    **图 13-6** `Add new constraints` 弹出窗口


    为对象添加约束的第三种方式是：从对象 `Ctrl`-拖拽到屏幕边缘或另一个对象上。当您 `Ctrl`-拖拽并释放 `Control` 键和鼠标左键时，会弹出一个窗口，让您可以选择不同的约束，如图
    13-7 所示。此弹出菜单中显示的可用约束会根据您 `Ctrl`-拖拽的位置而有所不同。


    ![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig7_HTML.jpg](images/329781_5_En_13_Chapter/329781_5_En_13_Fig7_HTML.jpg)


    **图 13-7** 当您 `Ctrl`-拖拽以创建约束时出现的弹出菜单


    要了解如何创建、编辑和删除约束以及使用框架，请按以下步骤操作：


    1.  使用 `Single View App` 模板创建一个新的 iOS 项目（参见第 1 章），并将此新项目命名为 `ConstraintApp`。这为用户界面创建了一个单一视图。

    2.  在导航窗格中点击 `Main.storyboard` 文件。Xcode 会显示该单一视图。

    3.  点击 `Library` 图标打开 `Object Library` 窗口。

    4.  在视图上的任意位置拖放一个按钮和一个标签。确保按钮位于标签的下方。

    5.  将鼠标指针移到按钮上，按住 `Control` 键，然后 `Ctrl`-拖拽鼠标，直到鼠标指针出现在标签上方。

    6.  释放 `Control` 键和鼠标左键。会弹出一个窗口（见图 13-7）。

    7.  选择 `Vertical Spacing`。Xcode 会以红色显示此约束，提示您没有足够的约束来正确定义按钮在用户界面上的位置。

    8.  点击按钮以将其选中。

    9.  点击 Xcode 窗口底部的 `Add new constraints` 图标。会弹出一个窗口。'
  raw: '*   Choose Editor ➤ Resolve Auto Layout Issues and choose an option to let
    Xcode define constraints automatically.


    *   Click the Align or Add new constraints icon at the bottom of the Xcode window.


    *   Ctrl-drag from an object to another object.


    The Resolve Auto Layout Issues submenu displays identical commands in a top and
    bottom half as shown Figure [13-4](#329781_5_En_13_Chapter.xhtml#Fig4). The top
    submenu affects only the selected object, while the bottom submenu affects all
    objects in the currently displayed view.


    ![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig4_HTML.jpg](images/329781_5_En_13_Chapter/329781_5_En_13_Fig4_HTML.jpg)


    Figure 13-4


    The Resolve Auto Layout submenu


    The available options on the Resolve Auto Layout Issues submenu include


    *   Update Frames – Used to move an object to the location of its frame


    *   Update Constraint Constants – Used to move the frame and all constraints to
    the current position of the object


    *   Add Missing Constraints – Adds new constraints to any existing constraints
    on an object


    *   Reset to Suggested Constraints – Deletes any existing constraints and adds
    new constraints that Xcode thinks the object needs


    *   Clear Constraints – Deletes all constraints on the object


    Clicking the Align icon displays a popup window that lets you define the position
    of an object such as horizontally or vertically in a view. If you select two or
    more objects, you can align one object to another object by its sides, tops, or
    bottoms as shown in Figure [13-5](#329781_5_En_13_Chapter.xhtml#Fig5).


    ![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig5_HTML.jpg](images/329781_5_En_13_Chapter/329781_5_En_13_Fig5_HTML.jpg)


    Figure 13-5


    The Align popup window


    Clicking the Add new constraints icon displays a popup window that lets you define
    sizes (width and height) and distances to nearby objects as shown in Figure [13-6](#329781_5_En_13_Chapter.xhtml#Fig6).
    If you select two or more objects, you can define all selected objects to have
    the same width or height as well.


    ![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig6_HTML.jpg](images/329781_5_En_13_Chapter/329781_5_En_13_Fig6_HTML.jpg)


    Figure 13-6


    The Add new constraints popup window


    A third way to add constraints to an object is to Ctrl-drag from an object to
    a screen edge or onto another object. When you Ctrl-drag and release the Control
    key and the left mouse button, a popup window appears letting you choose different
    constraints as shown in Figure [13-7](#329781_5_En_13_Chapter.xhtml#Fig7). The
    available constraints that appear in this popup menu differ depending on where
    you Ctrl-drag.


    ![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig7_HTML.jpg](images/329781_5_En_13_Chapter/329781_5_En_13_Fig7_HTML.jpg)


    Figure 13-7


    A popup menu appears when you Ctrl-drag to create a constraint


    To see how to create, edit, and delete a constraint and use frames, follow these
    steps:


    1.  Create a new iOS project using the Single View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml))
    and name this new project ConstraintApp. This creates a single view for the user
    interface.


    2.  Click the Main.storyboard file in the Navigator pane. Xcode displays the single
    view.


    3.  Click the Library icon to open the Object Library window.


    4.  Drag and drop a button and a label anywhere on the view. Make sure the button
    appears lower than the label.


    5.  Move the mouse pointer over the button, hold down the Control key, and Ctrl-drag
    the mouse until the mouse pointer appears over the label.


    6.  Release the Control key and the left mouse button. A popup window appears
    (see Figure [13-7](#329781_5_En_13_Chapter.xhtml#Fig7)).


    7.  Choose Vertical Spacing. Xcode displays this constraint in red to let you
    know there aren’t enough constraints to properly define the button’s position
    on the user interface.


    8.  Click the button to select it.


    9.  Click the Add new constraints icon at the bottom of the Xcode window. A popup
    window appears.'
