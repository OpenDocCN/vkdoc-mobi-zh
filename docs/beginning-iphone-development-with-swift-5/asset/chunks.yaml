  trans: "\n# 使用文本视图显示虚拟键盘\n\n为了让用户能够在文本视图中输入，你需要显示（和隐藏）虚拟键盘。当用户点击文本视图进行编辑时，虚拟键盘应出现，如有必要，还需将文本视图上移。当用户在文本视图中完成文本编辑后，虚拟键盘则需要消失。\n\
    \n首先，你需要让视图控制器监听两个事件：`keyboardWillShowNotification` 和 `keyboardWillHideNotification`。其次，你需要创建\
    \ `keyboardWillShow` 和 `keyboardWillHide` 函数，用于显示虚拟键盘（并将视图上移），以及在不再需要时隐藏虚拟键盘。最后，如果用户点击了文本视图以外的区域，你需要关闭虚拟键盘。\n\
    \n要添加显示和隐藏虚拟键盘的代码，请遵循以下步骤：\n\n1.  在 `TextViewApp` 项目的导航器窗格中点击 `Main.storyboard`\
    \ 文件。\n2.  点击库图标以显示对象库。\n3.  将一个文本视图拖放到用户界面的底部附近。\n4.  选择 **编辑器** ➤ **自动布局问题解决方案**\
    \ ➤ **重置为建议的约束**（位于子菜单的上半部分）。这将为界面中的新文本视图添加约束。\n5.  将以下代码添加到 `viewDidLoad` 方法中：\n\
    \n```swift\nNotificationCenter.default.addObserver(self, selector: #selector(keyboardWillShow),\
    \ name: UIResponder.keyboardWillShowNotification, object: nil)\nNotificationCenter.default.addObserver(self,\
    \ selector: #selector(keyboardWillHide), name: UIResponder.keyboardWillHideNotification,\
    \ object: nil)\nlet tap: UITapGestureRecognizer = UITapGestureRecognizer(target:\
    \ self, action: #selector(self.dismissKeyboard))\nview.addGestureRecognizer(tap)\n\
    ```\n\n6.  在 `buttonTapped` IBAction 方法上方添加如下代码：\n\n```swift\n@objc func dismissKeyboard()\
    \ {\n    view.endEditing(true)\n}\n@objc func keyboardWillShow(notification: NSNotification)\
    \ {\n    if let keyboardSize = (notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]\
    \ as? NSValue)?.cgRectValue {\n        if self.view.frame.origin.y == 0 {\n  \
    \          self.view.frame.origin.y -= keyboardSize.height\n        }\n    }\n\
    }\n@objc func keyboardWillHide(notification: NSNotification) {\n    if ((notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]\
    \ as? NSValue)?.cgRectValue) != nil {\n        if self.view.frame.origin.y !=\
    \ 0 {\n            self.view.frame.origin.y = 0\n        }\n    }\n}\n```\n\n\
    整个 `ViewController.swift` 文件应如下所示：\n\n```swift\nimport UIKit\nclass ViewController:\
    \ UIViewController {\n    @IBOutlet var textView: UITextView!\n    @IBOutlet var\
    \ buttonObject: UIButton!\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        textView.dataDetectorTypes = UIDataDetectorTypes.link\n        textView.isEditable\
    \ = false\n        textView.isSelectable = true\n        textView.text = \"This\
    \ is an example of clickable text www.yahoo.com\"\n        NotificationCenter.default.addObserver(self,\
    \ selector: #selector(keyboardWillShow), name: UIResponder.keyboardWillShowNotification,\
    \ object: nil)\n        NotificationCenter.default.addObserver(self, selector:\
    \ #selector(keyboardWillHide), name: UIResponder.keyboardWillHideNotification,\
    \ object: nil)\n        let tap: UITapGestureRecognizer = UITapGestureRecognizer(target:\
    \ self, action: #selector(self.dismissKeyboard))\n        view.addGestureRecognizer(tap)\n\
    \        // Do any additional setup after loading the view, typically from a nib.\n\
    \    }\n    @objc func dismissKeyboard() {\n        view.endEditing(true)\n  \
    \  }\n    @objc func keyboardWillShow(notification: NSNotification) {\n      \
    \  if let keyboardSize = (notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]\
    \ as? NSValue)?.cgRectValue {\n            if self.view.frame.origin.y == 0 {\n\
    \                self.view.frame.origin.y -= keyboardSize.height\n           \
    \ }\n        }\n    }\n    @objc func keyboardWillHide(notification: NSNotification)\
    \ {\n        if ((notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]\
    \ as? NSValue)?.cgRectValue) != nil {\n            if self.view.frame.origin.y\
    \ != 0 {\n                self.view.frame.origin.y = 0\n            }\n      \
    \  }\n    }\n    @IBAction func buttonTapped(_ sender: UIButton) {\n        if\
    \ textView.isEditable == true {\n            textView.isEditable = false\n   \
    \         textView.backgroundColor = UIColor.yellow\n            textView.textColor\
    \ = UIColor.blue\n            textView.font = UIFont(name: \"Courier\", size:\
    \ 24)\n        } else {\n            textView.isEditable = true\n            textView.backgroundColor\
    \ = UIColor.blue\n            textView.textColor = UIColor.white\n           \
    \ textView.font = UIFont(name: \"Ariel\", size: 10)\n        }\n    }\n}\n```\n\
    \n7.  点击**运行**按钮或选择**产品** ➤ **运行**。模拟器屏幕出现。\n8.  点击底部的文本视图。（如果虚拟键盘没有出现，请按 **Command\
    \ + K** 或选择**硬件** ➤ **键盘** ➤ **切换虚拟键盘**。）\n9.  使用虚拟键盘在文本视图中添加和删除文本。\n10. 点击文本视图之外的任何位置。虚拟键盘消失。\n\
    11. 选择**模拟器** ➤ **退出模拟器**以返回 Xcode。\n\n## 总结\n\n图像视图和文本视图让你的应用能够在用户界面上显示数据。图像视图以图像的形式直观地展示信息。这些图像可以是静态的，仅用于装饰目的，也可以显示有用的信息，比如图表。图像视图也可以是交互式的，能够响应点击。\n\
    \n文本视图既可以显示文本，也允许用户编辑和输入文本。文本视图的行为与文本字段非常相似，但它能一次显示大量文本，就像一个微型文字处理器。你可以修改文本的外观，但任何更改都会影响文本视图中的所有文本。\n\
    \n如果你将文本视图设置为不可编辑，那么你还可以创建可点击的文本，文本视图可以识别常见的词和短语类型，例如电话号码、街道地址、URL 以及日期和时间等日历事件。\n\
    \n文本视图可以简单地向用户显示信息，也可以允许输入。图像视图可以显示视觉数据，或者允许交互，以便你的应用能在用户点击图像视图时做出响应。通过同时使用文本视图和图像视图，你便拥有了展示数据、允许输入以及接受用户交互的另一种方式。\n\
    \n# 按钮、开关和分段控件\n\n除了显示数据或让用户输入数据外，用户界面的第二个最重要的目的是允许用户控制应用。在最简单的层面上，用户可以使用按钮，每个按钮代表一个命令。当然，如果你想要显示多个选项，那么屏幕上显示多个按钮可能会显得拥挤。\n\
    \n作为发出命令的两种替代方案，Xcode 提供了开关和分段控件。开关让用户可以选择打开或关闭某个设置。分段控件就像一个浓缩区域内的多个按钮，用户可以点击以选择不同的选项。图\
    \ 10-1 显示了按钮、开关和分段控件的视觉外观。\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig1_HTML.jpg](img/329781_5_En_10_Fig1_HTML.jpg)\n\
    \n**图 10-1** 比较按钮、开关和分段控件的视觉外观\n"
- fmt: "# Understanding Events\n\nUser interface objects that represent commands,\
    \ such as buttons, switches, and segmented controls, respond to events. The simplest\
    \ event occurs when the user taps or touches inside an object. A more complicated\
    \ event might occur when the user drags or slides a finger inside an object.\n\
    \nAll types of user interface objects can respond to events such as when the user\
    \ taps on an object such as a button. The combination of an object plus an event\
    \ defines an `IBAction` method. If you want an object to respond to two different\
    \ events, you’ll need to create two different `IBAction` methods for that particular\
    \ object.\n\nThe different available types of events an object can respond to\
    \ include:\n\n- **Touch Up Inside** – A tap inside the bounds of an object with\
    \ the finger lifting up\n- **Touch Up Outside** – A tap outside the bounds of\
    \ an object\n- **Touch Down** – A tap inside the bounds of an object\n- **Touch\
    \ Down Repeat** – Two or more taps inside the bounds of an object\n- **Touch Drag\
    \ Enter** – Where a finger touches outside the object and slides over the object\n\
    - **Touch Drag Exit** – Where a finger touches inside an object and slides away\
    \ from it\n- **Touch Drag Inside** – Where a finger slides inside an object\n\
    - **Touch Drag Outside** – Where a finger slides just outside an object\n- **Value\
    \ Changed** – Where manipulating an object changes its stored value such as with\
    \ a slider\n- **Editing Changed** – When text changes inside a text field\n- **Editing\
    \ Did Begin** – When a finger taps inside a text field\n- **Editing Did End**\
    \ – When a finger taps outside a text field\n\nBy choosing which events a particular\
    \ object can respond to, you can allow the user to interact with user interface\
    \ objects in different and unique ways. In most cases, user interface objects\
    \ only need to respond to the most likely event such as **Touch Up Inside**, which\
    \ detects when the user taps an object.\n\n# Using Buttons\n\nA button typically\
    \ responds to the **Touch Up Inside** event and displays the command that it represents\
    \ such as OK, Cancel, or Done. The text that appears on a button can be modified\
    \ in three ways:\n\n- In the **Attributes Inspector** pane\n- By double-clicking\
    \ the button\n- Through Swift code\n\nTo see how we define the title on a button,\
    \ follow these steps:\n\n1. Create a new iOS project using the Single View App\
    \ template (see Chapter [1](#329781_5_En_1_Chapter.xhtml)) and name this new project\
    \ `ControlApp`. This creates a single view for the user interface.\n\n2. Click\
    \ the `Main.storyboard` file in the Navigator pane. Xcode displays the single\
    \ view.\n\n3. Click the Library icon to open the **Object Library** window.\n\n\
    4. Drag and drop a button anywhere on the view. By default, the title on a button\
    \ displays “Title”.\n\n5. Choose **View** ➤ **Inspectors** ➤ **Show Attributes\
    \ Inspector**.\n\n6. Click in the **Title** text field as shown in Figure [10-2](#329781_5_En_10_Chapter.xhtml#Fig2),\
    \ delete the existing text (“Title”), and type **Cancel**. Then press ENTER. Notice\
    \ that Xcode now displays the word “Cancel” on the button.\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig2_HTML.jpg](images/329781_5_En_10_Chapter/329781_5_En_10_Fig2_HTML.jpg)\n\
    \n**Figure 10-2** Changing the title of a button in the Attributes Inspector\n\
    \n7. Double-click the button to select the title.\n\n8. Type **Done** and press\
    \ ENTER. Notice that now the button displays **Done**.\n\n9. Choose **Editor**\
    \ ➤ **Resolve Auto Layout Issues** ➤ **Set to Suggested Constraints**. Xcode adds\
    \ constraints to your button.\n\n10. Choose **View** ➤ **Assistant Editor** ➤\
    \ **Show Assistant Editor**. Xcode displays the `Main.storyboard` and `ViewController.swift`\
    \ file side by side.\n\n11. Move the mouse pointer over the button, hold down\
    \ the Control key, and Ctrl-drag from the image view to the `ViewController.swift`\
    \ file underneath the `class ViewController` line.\n\n12. Release the Control\
    \ key and the left mouse button. A popup window appears.\n\n13. Click in the **Name**\
    \ text field, type `buttonObject`, and click the **Connect** button. Xcode creates\
    \ an `IBOutlet` variable as follows:\n\n```swift\n@IBOutlet var buttonObject:\
    \ UIButton!\n```\n\n14. Move the mouse pointer over the button, hold down the\
    \ Control key, and Ctrl-drag from the image view to the `ViewController.swift`\
    \ file above the last curly bracket at the bottom of the file.\n\n15. Release\
    \ the Control key and the left mouse button. A popup window appears. Notice that\
    \ the **Event** popup menu already chooses the **Touch Up Inside** event by default\
    \ as shown in Figure [10-3](#329781_5_En_10_Chapter.xhtml#Fig3).\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig3_HTML.jpg](images/329781_5_En_10_Chapter/329781_5_En_10_Fig3_HTML.jpg)\n\
    \n**Figure 10-3** The Event popup menu displays Touch Up Inside by default for\
    \ buttons\n\n16. Click in the **Name** text field, type `touchInside`, click in\
    \ the **Type** popup menu and choose `UIButton`, and click the **Connect** button.\
    \ Xcode creates an `IBAction` method.\n\n17. Edit this `touchInside` `IBAction`\
    \ method as follows:\n\n```swift\n@IBAction func touchInside(_ sender: UIButton)\
    \ {\n    buttonObject.setTitle(\"New\", for: UIControl.State.normal)\n}\n```\n\
    \nThis `IBAction` runs every time the user taps on the button, and the Swift code\
    \ changes the button title to “New”. By using `setTitle`, your Swift code can\
    \ change a button’s title while your app runs.\n\nThe entire `ViewController.swift`\
    \ file should look like this:\n\n```swift\nimport UIKit\nclass ViewController:\
    \ UIViewController {\n    @IBOutlet var buttonObject: UIButton!\n    override\
    \ func viewDidLoad() {\n        super.viewDidLoad()\n        // Do any additional\
    \ setup after loading the view, typically from a nib.\n    }\n    @IBAction func\
    \ touchInside(_ sender: UIButton) {\n        buttonObject.setTitle(\"New\", for:\
    \ UIControl.State.normal)\n    }\n}\n```\n\n18. Click the **Run** button or choose\
    \ **Product** ➤ **Run**. The Simulator screen appears. Notice that the button\
    \ title currently displays **Done**.\n\n19. Click the button. Notice that the\
    \ button title now changes to “New”.\n\n20. Choose **Simulator** ➤ **Quit Simulator**\
    \ to return to Xcode."
  raw: "## Understanding Events\n\nUser interface objects that represent commands,\
    \ such as buttons, switches, and segmented controls, respond to events. The simplest\
    \ event occurs when the user taps or touches inside an object. A more complicated\
    \ event might occur when the user drags or slides a finger inside an object.\n\
    \nAll types of user interface objects can respond to events such as when the user\
    \ taps on an object such as a button. The combination of an object plus an event\
    \ defines an IBAction method. If you want an object to respond to two different\
    \ events, you’ll need to create two different IBAction methods for that particular\
    \ object.\n\nThe different available types of events an object can respond to\
    \ include\n\n*   Touch Up Inside – A tap inside the bounds of an object with the\
    \ finger lifting up\n\n*   Touch Up Outside – A tap outside the bounds of an object\n\
    \n*   Touch Down – A tap inside the bounds of an object\n\n*   Touch Down Repeat –\
    \ Two or more taps inside the bounds of an object\n\n*   Touch Drag Enter – Where\
    \ a finger touches outside the object and slides over the object\n\n*   Touch\
    \ Drag Exit – Where a finger touches inside an object and slides away from it\n\
    \n*   Touch Drag Inside – Where a finger slides inside an object\n\n*   Touch\
    \ Drag Outside – Where a finger slides just outside an object\n\n*   Value Changed –\
    \ Where manipulating an object changes its stored value such as with a slider\n\
    \n*   Editing Changed – When text changes inside a text field\n\n*   Editing Did\
    \ Begin – When a finger taps inside a text field\n\n*   Editing Did End – When\
    \ a finger taps outside a text field\n\nBy choosing which events a particular\
    \ object can respond to, you can allow the user to interact with user interface\
    \ objects in different and unique ways. In most cases, user interface objects\
    \ only need to respond to the most likely event such as Touch Up Inside, which\
    \ detects when the user taps an object.\n\n## Using Buttons\n\nA button typically\
    \ responds to the Touch Up Inside event and displays the command that it represents\
    \ such as OK, Cancel, or Done. The text that appears on a button can be modified\
    \ in three ways:\n\n*   In the Attributes Inspector pane\n\n*   By double-clicking\
    \ the button\n\n*   Through Swift code\n\nTo see how we define the title on a\
    \ button, follow these steps:\n\n1.  Create a new iOS project using the Single\
    \ View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml)) and name this\
    \ new project ControlApp. This creates a single view for the user interface.\n\
    \n2.  Click the Main.storyboard file in the Navigator pane. Xcode displays the\
    \ single view.\n\n3.  Click the Library icon to open the Object Library window.\n\
    \n4.  Drag and drop a button anywhere on the view. By default, the title on a\
    \ button displays “Title”.\n\n5.  Choose View ➤ Inspectors ➤ Show Attributes Inspector.\n\
    \n6.  Click in the Title text field as shown in Figure [10-2](#329781_5_En_10_Chapter.xhtml#Fig2),\
    \ delete the existing text (“Title”), and type **Cancel**. Then press ENTER. Notice\
    \ that Xcode now displays the word “Cancel” on the button.\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig2_HTML.jpg](images/329781_5_En_10_Chapter/329781_5_En_10_Fig2_HTML.jpg)\n\
    \nFigure 10-2\n\nChanging the title of a button in the Attributes Inspector\n\n\
    7.  Double-click the button to select the title.\n\n8.  Type **Done** and press\
    \ ENTER. Notice that now the button displays Done.\n\n9.  Choose Editor ➤ Resolve\
    \ Auto Layout Issues ➤ Set to Suggested Constraints. Xcode adds constraints to\
    \ your button.\n\n10.  Choose View ➤ Assistant Editor ➤ Show Assistant Editor.\
    \ Xcode displays the Main.storyboard and ViewController.swift file side by side.\n\
    \n11.  Move the mouse pointer over the button, hold down the Control key, and\
    \ Ctrl-drag from the image view to the ViewController.swift file underneath the\
    \ “class ViewController” line.\n\n12.  Release the Control key and the left mouse\
    \ button. A popup window appears.\n\n13.  Click in the Name text field, type **buttonObject**,\
    \ and click the Connect button. Xcode creates an IBOutlet variable as follows:\n\
    \n```\n    @IBOutlet var buttonObject: UIButton!\n    ```\n\n14.  Move the mouse\
    \ pointer over the button, hold down the Control key, and Ctrl-drag from the image\
    \ view to the ViewController.swift file above the last curly bracket at the bottom\
    \ of the file.\n\n15.  Release the Control key and the left mouse button. A popup\
    \ window appears. Notice that the Event popup menu already chooses the Touch Up\
    \ Inside event by default as shown in Figure [10-3](#329781_5_En_10_Chapter.xhtml#Fig3).\n\
    \n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig3_HTML.jpg](images/329781_5_En_10_Chapter/329781_5_En_10_Fig3_HTML.jpg)\n\
    \nFigure 10-3\n\nThe Event popup menu displays Touch Up Inside by default for\
    \ buttons\n\n16.  Click in the Name text field, type **touchInside**, click in\
    \ the Type popup menu and choose UIButton, and click the Connect button. Xcode\
    \ creates an IBAction method.\n\n17.  Edit this touchInside IBAction method as\
    \ follows:\n\n```\n    @IBAction func touchInside(_ sender: UIButton) {\n    buttonObject.setTitle(\"\
    New\", for: UIControl.State.normal)\n    }\n    ```\n\nThis IBAction runs every\
    \ time the user taps on the button, and the Swift code changes the button title\
    \ to “New”. By using setTitle, your Swift code can change a button’s title while\
    \ your app runs.\n\nThe entire ViewController.swift file should look like this:\n\
    \n```\n    import UIKit\n    class ViewController: UIViewController {\n    @IBOutlet\
    \ var buttonObject: UIButton!\n    override func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    // Do any additional setup after loading the view, typically from a nib.\n\
    \    }\n    @IBAction func touchInside(_ sender: UIButton) {\n    buttonObject.setTitle(\"\
    New\", for: UIControl.State.normal)\n    }\n    }\n    ```\n\n18.  Click the Run\
    \ button or choose Product ➤ Run. The Simulator screen appears. Notice that the\
    \ button title currently displays Done.\n\n19.  Click the button. Notice that\
    \ the button title now changes to “New”.\n\n20.  Choose Simulator ➤ Quit Simulator\
    \ to return to Xcode."
  trans: "\n# 理解事件\n\n代表命令的用户界面对象（如按钮、开关和分段控件）会响应事件。最简单的事件发生在用户轻点或触摸对象内部时。更复杂的事件可能发生在用户手指在对象内部拖拽或滑动时。\n\
    \n所有类型的用户界面对象都可以响应事件，例如用户轻点按钮等对象时。对象与事件的组合定义了一个 `IBAction` 方法。如果你希望一个对象响应两个不同的事件，则需要为该特定对象创建两个不同的\
    \ `IBAction` 方法。\n\n对象可以响应的不同事件类型包括：\n\n- **Touch Up Inside** – 在对象边界内轻点并抬起手指\n\
    - **Touch Up Outside** – 在对象边界外轻点\n- **Touch Down** – 在对象边界内按下\n- **Touch Down\
    \ Repeat** – 在对象边界内连续轻点两次或更多次\n- **Touch Drag Enter** – 手指在对象外部触摸并滑入对象内部\n- **Touch\
    \ Drag Exit** – 手指在对象内部触摸并滑出对象外部\n- **Touch Drag Inside** – 手指在对象内部滑动\n- **Touch\
    \ Drag Outside** – 手指在对象外部边缘滑动\n- **Value Changed** – 操作对象（如滑块）改变其存储值时触发\n- **Editing\
    \ Changed** – 文本字段中的文本发生变化时触发\n- **Editing Did Begin** – 手指轻点文本字段内部时触发\n- **Editing\
    \ Did End** – 手指轻点文本字段外部时触发\n\n通过选择特定对象能够响应的事件，你可以让用户以不同且独特的方式与用户界面对象交互。在大多数情况下，用户界面对象只需响应最可能的事件，例如\
    \ **Touch Up Inside**（检测用户何时轻点对象）。\n\n# 使用按钮\n\n按钮通常响应 **Touch Up Inside** 事件，并显示其代表的命令，如“确定”、“取消”或“完成”。按钮上显示的文本可以通过三种方式修改：\n\
    \n- 在**属性检查器**面板中\n- 通过双击按钮\n- 通过 Swift 代码\n\n要了解如何在按钮上定义标题，请按照以下步骤操作：\n\n1. 使用“单视图应用”模板创建一个新的\
    \ iOS 项目（参见第 1 章），并将这个新项目命名为 `ControlApp`。这会为用户界面创建一个单视图。\n\n2. 在导航面板中点击 `Main.storyboard`\
    \ 文件。Xcode 会显示该单视图。\n\n3. 点击库图标打开**对象库**窗口。\n\n4. 将一个按钮拖放到视图上的任意位置。默认情况下，按钮上显示的标题为“Title”。\n\
    \n5. 选择**视图** ➤ **检查器** ➤ **显示属性检查器**。\n\n6. 如图 10-2 所示，点击**标题**文本字段，删除现有文本（“Title”），然后输入\
    \ **Cancel**。按 ENTER 键。注意，Xcode 现在会在按钮上显示单词“Cancel”。\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig2_HTML.jpg](img/329781_5_En_10_Fig2_HTML.jpg)\n\
    \n**图 10-2** 在属性检查器中更改按钮的标题\n\n7. 双击按钮以选中标题。\n\n8. 输入 **Done** 并按 ENTER 键。注意，现在按钮显示的是\
    \ **Done**。\n\n9. 选择**编辑器** ➤ **解决自动布局问题** ➤ **设置为建议的约束**。Xcode 会给你的按钮添加约束。\n\n\
    10. 选择**视图** ➤ **助理编辑器** ➤ **显示助理编辑器**。Xcode 会将 `Main.storyboard` 和 `ViewController.swift`\
    \ 文件并排显示。\n\n11. 将鼠标指针移到按钮上，按住 Control 键，从图像视图拖拽到 `ViewController.swift` 文件中 `class\
    \ ViewController` 行下方。\n\n12. 松开 Control 键和鼠标左键。会出现一个弹出窗口。\n\n13. 点击**名称**文本字段，输入\
    \ `buttonObject`，然后点击**连接**按钮。Xcode 会创建一个 `IBOutlet` 变量，如下所示：\n\n```swift\n@IBOutlet\
    \ var buttonObject: UIButton!\n```\n\n14. 将鼠标指针移到按钮上，按住 Control 键，从图像视图拖拽到 `ViewController.swift`\
    \ 文件中底部最后一个花括号上方。\n\n15. 松开 Control 键和鼠标左键。会出现一个弹出窗口。注意，如图 10-3 所示，**事件**弹出菜单默认已选择了\
    \ **Touch Up Inside** 事件。\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig3_HTML.jpg](img/329781_5_En_10_Fig3_HTML.jpg)\n\
    \n**图 10-3** 事件弹出菜单默认显示 Touch Up Inside（针对按钮）\n\n16. 点击**名称**文本字段，输入 `touchInside`，点击**类型**弹出菜单并选择\
    \ `UIButton`，然后点击**连接**按钮。Xcode 会创建一个 `IBAction` 方法。\n\n17. 按如下方式编辑这个 `touchInside`\
    \ `IBAction` 方法：\n\n```swift\n@IBAction func touchInside(_ sender: UIButton) {\n\
    \    buttonObject.setTitle(\"New\", for: UIControl.State.normal)\n}\n```\n\n每当用户轻点该按钮时，此\
    \ `IBAction` 都会运行，并且 Swift 代码会将按钮标题更改为“New”。通过使用 `setTitle`，你的 Swift 代码可以在应用程序运行时更改按钮的标题。\n\
    \n整个 `ViewController.swift` 文件应如下所示：\n\n```swift\nimport UIKit\nclass ViewController:\
    \ UIViewController {\n    @IBOutlet var buttonObject: UIButton!\n    override\
    \ func viewDidLoad() {\n        super.viewDidLoad()\n        // Do any additional\
    \ setup after loading the view, typically from a nib.\n    }\n    @IBAction func\
    \ touchInside(_ sender: UIButton) {\n        buttonObject.setTitle(\"New\", for:\
    \ UIControl.State.normal)\n    }\n}\n```\n\n18. 点击**运行**按钮或选择**产品** ➤ **运行**。模拟器屏幕会出现。注意，按钮标题当前显示的是\
    \ **Done**。\n\n19. 点击该按钮。注意，按钮标题现在会变为“New”。\n\n20. 选择**模拟器** ➤ **退出模拟器**以返回 Xcode。\n"
- fmt: "# Using a Switch\n\nIn many apps, users can turn features on or off. Whenever\
    \ users have a choice between exactly two options, that’s a perfect time to use\
    \ a switch. As its name implies, a switch can slide right or left to represent\
    \ an on or off value. When a switch is turned on, a color appears and the switch\
    \ appears on the right. When a switch is turned off, the switch displays a different\
    \ color and the switch appears on the left as shown in Figure [10-4](#329781_5_En_10_Chapter.xhtml#Fig4).\n\
    \n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig4_HTML.jpg](images/329781_5_En_10_Chapter/329781_5_En_10_Fig4_HTML.jpg)\n\
    \nFigure 10-4\n\nSwitches are often used to turn settings on or off\n\nThe three\
    \ common properties of a switch to modify include:\n\n- `isOn` – Determines if\
    \ a switch has a value of true (on) or false (off)\n- `onTintColor` – Determines\
    \ the color to display when a switch’s `isOn` property is true (on)\n- `tintColor`\
    \ – Determines the color to display when a switch’s `isOn` property is false (off)\n\
    \nTo see how to use a switch, follow these steps:\n\n1. Make sure your `ControlApp`\
    \ project is loaded in Xcode.\n\n2. Click the `Main.storyboard` file in the Navigator\
    \ pane. Xcode displays the single view.\n\n3. Click the Library icon to open the\
    \ Object Library window.\n\n4. Drag and drop a label and a switch on the view.\n\
    \n5. Hold down the SHIFT key and click the switch and label to select both of\
    \ them.\n\n6. Choose Editor ➤ Resolve Auto Layout Issues ➤ Reset to Suggested\
    \ Constraints at the top half of the submenu. This adds constraints to switch\
    \ and label.\n\n7. Choose View ➤ Assistant Editor ➤ Show Assistant Editor, or\
    \ click the Assistant Editor icon. Xcode displays the `Main.storyboard` and `ViewController.swift`\
    \ file side by side.\n\n8. Move the mouse pointer over the label, hold down the\
    \ Control key, and Ctrl-drag from the label to the `ViewController.swift` file\
    \ underneath the `IBOutlet` line.\n\n9. Release the Control key and the left mouse\
    \ button. A popup window appears.\n\n10. Click in the Name text field, type `labelSwitch`,\
    \ and click the Connect button. Xcode creates an `IBOutlet` variable as follows:\n\
    \n```\n    @IBOutlet var labelSwitch: UILabel!\n```\n\n11. Move the mouse pointer\
    \ over the switch, hold down the Control key, and Ctrl-drag from the button to\
    \ the `ViewController.swift` file underneath the `IBOutlet` line.\n\n12. Release\
    \ the Control key and the left mouse button. A popup window appears.\n\n13. Click\
    \ in the Name text field, type `switchObject`, and click the Connect button. Xcode\
    \ creates an `IBOutlet` variable as follows:\n\n```\n    @IBOutlet var switchObject:\
    \ UISwitch!\n```\n\n14. Move the mouse pointer over the switch, hold down the\
    \ Control key, and Ctrl-drag just above the last curly bracket at the bottom of\
    \ the `ViewController.swift` file.\n\n15. Release the Control key and the left\
    \ mouse button. A popup window appears.\n\n16. Click in the Name text field, type\
    \ `switchChanged`, click in the Type popup menu and choose `UISwitch`, and click\
    \ the Connect button. Xcode creates an `IBAction` method as follows:\n\n```\n\
    \    @IBAction func switchChanged(_ sender: UISwitch) {\n    }\n```\n\n17. Edit\
    \ the `switchChanged` `IBAction` method as follows:\n\n```\n    @IBAction func\
    \ switchChanged(_ sender: UISwitch) {\n    if switchObject.isOn {\n    labelSwitch.text\
    \ = \"On\"\n    } else {\n    labelSwitch.text = \"Off\"\n    }\n    }\n```\n\n\
    18. Edit the `touchInside` `IBAction` method as follows:\n\n```\n    @IBAction\
    \ func touchInside(_ sender: UIButton) {\n    buttonObject.setTitle(\"New\", for:\
    \ UIControl.State.normal)\n    switchObject.onTintColor = UIColor.red\n    switchObject.tintColor\
    \ = UIColor.blue\n    }\n```\n\nThe `touchInside` `IBAction` changes the color\
    \ of the switch. Each time you tap on the switch, it changes from on to off (or\
    \ vice versa), displays the text \"On\" or \"Off\" in the `labelSwitch` object,\
    \ and displays different on and off colors. The entire `ViewController.swift`\
    \ file should look like this:\n\n```\n    import UIKit\n    class ViewController:\
    \ UIViewController {\n    @IBOutlet var buttonObject: UIButton!\n    @IBOutlet\
    \ var labelSwitch: UILabel!\n    @IBOutlet var switchObject: UISwitch!\n    override\
    \ func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional setup\
    \ after loading the view, typically from a nib.\n    }\n    @IBAction func touchInside(_\
    \ sender: UIButton) {\n    buttonObject.setTitle(\"New\", for: UIControl.State.normal)\n\
    \    switchObject.onTintColor = UIColor.red\n    switchObject.tintColor = UIColor.blue\n\
    \    }\n    @IBAction func switchChanged(_ sender: UISwitch) {\n    if switchObject.isOn\
    \ {\n    labelSwitch.text = \"On\"\n    } else {\n    labelSwitch.text = \"Off\"\
    \n    }\n    }\n    }\n```\n\n19. Choose View ➤ Standard Editor ➤ Show Standard\
    \ Editor, or click the Standard Editor icon in the upper right corner of the Xcode\
    \ window.\n\n20. Click the Run button or choose Product ➤ Run. The Simulator window\
    \ appears.\n\n21. Click the switch. Notice that each time you click the switch,\
    \ it changes its appearance from on and off and displays \"On\" or \"Off\" in\
    \ the label nearby as shown in Figure [10-5](#329781_5_En_10_Chapter.xhtml#Fig5).\n\
    \n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig5_HTML.jpg](images/329781_5_En_10_Chapter/329781_5_En_10_Fig5_HTML.jpg)\n\
    \nFigure 10-5\n\nThe label displays whether a switch is on or off\n\n22. Click\
    \ the button. This runs the Swift code in the `touchInside` `IBAction` method,\
    \ which changes the colors of the switch.\n\n23. Click the switch. Notice that\
    \ each time you click the switch, you can see the colors red and blue appear instead\
    \ of the default colors.\n\n24. Chose Simulator ➤ Quit Simulator to return to\
    \ Xcode."
