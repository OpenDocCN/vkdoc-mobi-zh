    \ = (notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey] as? NSValue)?.cgRectValue\
    \ {\n    if self.view.frame.origin.y == 0 {\n    self.view.frame.origin.y -= keyboardSize.height\n\
    \    }\n    }\n    }\n    ```\n\nThis function defines the keyboard size based\
    \ on the size of the iOS screen. (Remember, iPhone screens are narrower than iPad\
    \ screens.) Then this function uses the height of the virtual keyboard to determine\
    \ how far to slide the view (along with all its user interface objects) up to\
    \ make room for the virtual keyboard.\n\n11.  Type the following underneath the\
    \ keyboardWillShow function :\n\n```\n    @objc func keyboardWillHide(notification:\
    \ NSNotification) {\n    if ((notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]\
    \ as? NSValue)?.cgRectValue) != nil {\n    if self.view.frame.origin.y != 0 {\n\
    \    self.view.frame.origin.y = 0\n    }\n    }\n    }\n    ```\n\nThis function\
    \ checks if the virtual keyboard is visible. If not, then do nothing. If the virtual\
    \ keyboard is visible, then move the view back down to cover and hide the virtual\
    \ keyboard. The entire ViewController.swift file should look like this:"
  trans: "\n# 使用文本字段\n\n若只需显示文本，请使用标签。若要用户输入文本，则需使用文本字段。使用文本字段的关键在于，应用必须在屏幕上显示虚拟键盘。使用虚拟键盘时，需要注意其在屏幕上的位置以及文本字段的位置。\n\
    \n如果文本字段靠近屏幕顶部，虚拟键盘可以向上滑动而不会遮挡文本字段。但如果文本字段过于靠近屏幕底部，虚拟键盘向上滑动时会遮盖用户要输入的文本字段。\n\n\
    若出现这种情况，应用需要将视图向上滑动，保持文本字段可见，同时让虚拟键盘占据屏幕底部。当用户完成文本字段的输入后，虚拟键盘需要消失，文本字段也需要回到原位。\n\
    \n为了让屏幕随虚拟键盘的出现而上下滑动，每个应用都需要使用 iOS 通知中心，它能检测事件何时发生。当用户点击文本字段时，会发送一条通知，表明虚拟键盘需要出现。当用户完成文本字段的编辑时，会发送另一条通知，表明虚拟键盘需要消失。\n\
    \n要接收通知，应用需要使用 `addObserver` 方法，该方法定义一个对象（即视图）来接收通知，并指定接收到特定通知时要运行的方法。为了检测虚拟键盘何时应出现和消失，我们需要检测两个通知：\n\
    \n- `keyboardWillShowNotification`\n- `keyboardWillHideNotification`\n\n接下来，我们需要编写两个函数来显示和隐藏虚拟键盘。要显示虚拟键盘，我们需要根据虚拟键盘的高度将视图向上滑动，这个高度取决于运行设备的类型，例如\
    \ iPhone SE 这样的小屏幕，或 iPad Pro 这样的大屏幕。\n\n要隐藏虚拟键盘，我们需要将视图恢复到其原始 Y 坐标位置，该位置决定了其在屏幕上的垂直位置。不过，只要光标出现在文本字段中，虚拟键盘就不会消失。\n\
    \n为了让应用关闭虚拟键盘，我们还需要检测用户是否点击了文本字段之外的任何区域。点击视图会告知应用结束文本字段的编辑，进而发送通知以移除虚拟键盘。当视图收到虚拟键盘需要消失的通知时（即用户点击了文本字段外部），我们需要一个函数将视图移回原位。\n\
    \n所有这些都需要编写代码来接收两个通知（`keyboardWillShowNotification` 和 `keyboardWillHideNotification`）。此外，我们还需要检测文本字段外部的点击手势。\n\
    \n最后，我们需要编写三个函数。第一个函数通过计算屏幕高度和宽度，然后根据虚拟键盘的高度将视图向上滑动来显示虚拟键盘。第二个函数结束文本字段的编辑，触发 `keyboardWillHideNotification`。第三个函数在虚拟键盘消失后将视图移回原位。\n\
    \n要了解如何让虚拟键盘随文本字段的出现和消失而动作，请按照以下步骤操作：\n\n1.  使用单视图应用模板创建一个新的 iOS 项目（参见第 1 章），并将此新项目命名为\
    \ `TextFieldApp`。这将为用户界面创建一个单一视图。\n\n2.  在导航窗格中点击 `Main.storyboard` 文件。Xcode 会显示这个单一视图。\n\
    \n3.  点击库图标以显示对象库。\n\n4.  将两个文本字段拖放到视图底部三分之一处，这样当虚拟键盘从底部滑出时，它就会覆盖这些文本字段，如图 7-18\
    \ 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig18_HTML.jpg](img/329781_5_En_7_Fig18_HTML.jpg)\n\
    \n图 7-18 — 将两个文本字段放置在视图底部三分之一处\n\n5.  选择 Editor ➤ Resolve Auto Layout Issues ➤\
    \ Reset to Suggested Constraints （位于子菜单的下半部分）。这将对两个文本字段应用约束。\n\n6.  在导航窗格中点击 `ViewController.swift`\
    \ 文件。\n\n7.  在 `viewDidLoad` 方法内部添加以下代码：\n\n```\nNotificationCenter.default.addObserver(self,\
    \ selector: #selector(keyboardWillShow), name: UIResponder.keyboardWillShowNotification,\
    \ object: nil)\nNotificationCenter.default.addObserver(self, selector: #selector(keyboardWillHide),\
    \ name: UIResponder.keyboardWillHideNotification, object: nil)\n```\n\n第一行将视图定义为观察者，用于接收\
    \ `keyboardWillShowNotification`。当此通知出现时，应用需要运行名为 `keyboardWillShow` 的函数。第二行将视图定义为观察者，用于接收\
    \ `keyboardWillHideNotification`。当此通知出现时，应用需要运行名为 `keyboardWillHide` 的函数。\n\n\
    8.  在 `viewDidLoad` 方法内部添加以下代码：\n\n```\nlet tap: UITapGestureRecognizer = UITapGestureRecognizer(target:\
    \ self, action: #selector(self.dismissKeyboard))\nview.addGestureRecognizer(tap)\n\
    ```\n\n这段代码允许视图检测点击手势（即用户点击文本字段外部时）。当这种情况发生时，此行代码会运行一个名为 `dismissKeyboard` 的函数。完整的\
    \ `viewDidLoad` 函数应如下所示：\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    NotificationCenter.default.addObserver(self, selector: #selector(keyboardWillShow),\
    \ name: UIResponder.keyboardWillShowNotification, object: nil)\n    NotificationCenter.default.addObserver(self,\
    \ selector: #selector(keyboardWillHide), name: UIResponder.keyboardWillHideNotification,\
    \ object: nil)\n    let tap: UITapGestureRecognizer = UITapGestureRecognizer(target:\
    \ self, action: #selector(self.dismissKeyboard))\n    view.addGestureRecognizer(tap)\n\
    }\n```\n\n9.  在 `viewDidLoad` 函数下方输入以下代码：\n\n```\n@objc func dismissKeyboard()\
    \ {\n    view.endEditing(true)\n}\n```\n\n当用户点击文本字段外部时，此函数运行，结束编辑并发送虚拟键盘需要消失的通知（`keyboardWillHideNotification`）。\n\
    \n10. 在 `dismissKeyboard` 函数下方输入以下代码：\n\n```\n@objc func keyboardWillShow(notification:\
    \ NSNotification) {\n    if let keyboardSize = (notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]\
    \ as? NSValue)?.cgRectValue {\n        if self.view.frame.origin.y == 0 {\n  \
    \          self.view.frame.origin.y -= keyboardSize.height\n        }\n    }\n\
    }\n```\n\n此函数根据 iOS 屏幕尺寸定义键盘大小。（请记住，iPhone 屏幕比 iPad 屏幕窄。）然后，该函数使用虚拟键盘的高度来确定视图（及其所有用户界面对象）需要向上滑动多远，以便为虚拟键盘腾出空间。\n\
    \n11. 在 `keyboardWillShow` 函数下方输入以下代码：\n\n```\n@objc func keyboardWillHide(notification:\
    \ NSNotification) {\n    if ((notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]\
    \ as? NSValue)?.cgRectValue) != nil {\n        if self.view.frame.origin.y !=\
    \ 0 {\n            self.view.frame.origin.y = 0\n        }\n    }\n}\n```\n\n\
    此函数检查虚拟键盘是否可见。如果不可见，则不执行任何操作。如果虚拟键盘可见，则将视图向下移回原位以覆盖并隐藏虚拟键盘。完整的 `ViewController.swift`\
    \ 文件应如下所示：\n"
