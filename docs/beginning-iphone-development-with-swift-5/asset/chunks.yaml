    \n25.  点击 Class 弹出菜单，选择 `itemCell`（参见图 16-16）。\n\n26.  选择“视图”➤“检查器”➤“显示属性检查器”，或点击\
    \ Xcode 窗口右上角的属性检查器图标。\n\n27.  点击 Identifier 文本字段，输入 `customCell`，然后按 ENTER 键。\n\
    \n28.  点击 Background 弹出菜单，选择一种颜色，使 Collection View Cell 易于查看。\n\n29.  点击 Library\
