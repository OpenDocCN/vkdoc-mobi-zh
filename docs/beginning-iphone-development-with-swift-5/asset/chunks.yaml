    \ text in a text view, then the virtual keyboard needs to go away.\n\nFirst, you\
    \ need to define the View Controller to be notified of two events: keyboardWillShowNotification\
    \ and keyboardWillHideNotification. Second, you need to create a keyboardWillShow\
    \ and keyboardWillHide function to show the virtual keyboard (and move the view\
    \ up) and hide the virtual keyboard when it’s no longer needed. Finally, you need\
    \ to dismiss the virtual keyboard if the user taps away from the text view.\n\n\
