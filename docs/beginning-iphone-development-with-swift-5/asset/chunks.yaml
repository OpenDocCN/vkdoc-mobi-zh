- fmt: '# Using Common User Interface Objects


    A user interface must display information to the user. In addition, a user interface
    must also allow the user to input data such as text or numbers. Finally, a user
    interface must allow the user to control the app. Displaying data, accepting data,
    and accepting commands form the heart of any user interface.


    The three most common types of user interface objects are:


    - Labels

    - Text fields

    - Buttons


    Labels simply display text. Text fields can display text but are most often used
    to allow the user to type in text. Buttons can also display text (usually the
    name of the command that the button represents) but are most often used to let
    the user control the app.


    Although Xcode offers dozens of different user interface objects, their purpose
    is either to display information, allow the user to input data, or offer a way
    for the user to give a command to the app. These other user interface objects
    exist to provide different ways to display information, allow input, or offer
    a way to choose a command.


    For example, labels can display data as text, but a Progress View object displays
    data visually in the form of a bar that changes over time to show how much a task
    has been completed. A label could display this exact same information as a number,
    but a Progress View makes it easier to see at a glance while also visually showing
    how much further a task has to go before it’s done as shown in Figure 7-1.


    ![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig1_HTML.jpg](images/329781_5_En_7_Chapter/329781_5_En_7_Fig1_HTML.jpg)


    *Figure 7-1: Displaying information as text and a visual progress bar*


    A text field allows users to input text as data, but when inputting numbers as
    data, typing a number can be clumsy. As an alternative to using a text field to
    input numbers, you could use a slider instead. By dragging a slider, the user
    can quickly choose a numeric value without the hassle of typing a number instead
    or typing a letter instead of a number as shown in Figure 7-2.


    ![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig2_HTML.jpg](images/329781_5_En_7_Chapter/329781_5_En_7_Fig2_HTML.jpg)


    *Figure 7-2: A slider lets the user choose a numeric value without any typing*


    A button represents a single command, but if you need to display multiple commands,
    displaying multiple buttons can clutter the screen. As an alternative to cluttering
    a screen with buttons to choose different commands, an app can offer gesture recognizers
    instead where each gesture performs a different command such as shrinking or moving
    an item. Gestures eliminate the need to display commands on the screen and allow
    users to manipulate objects directly using their fingers in different ways as
    shown in Figure 7-3.


    ![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig3_HTML.jpg](images/329781_5_En_7_Chapter/329781_5_En_7_Fig3_HTML.jpg)


    *Figure 7-3: A slider lets the user choose a numeric value without any typing*


    By using common user interface objects, you can quickly design an app then add
    Swift code to make it actually work. Just remember to try different user interface
    designs until you find the one that works best for your app.


    ## Using Labels


    The main purpose of a label is to display text on the screen. Sometimes that text
    helps describe the purpose of a neighboring object (such as a switch) and sometimes
    that text is meant to provide more detailed information to the user as shown in
    Figure 7-4.


    ![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig4_HTML.jpg](images/329781_5_En_7_Chapter/329781_5_En_7_Fig4_HTML.jpg)


    *Figure 7-4: Labels display text to provide information to the user*


    With all user interface objects, there are two ways to customize them. One, you
    can modify attributes in the Inspector pane. Two, you can modify attributes using
    Swift code. Swift code lets you dynamically change an object’s attributes while
    your app is running. Every user interface object offers dozens of different attributes
    you can modify, but you’ll rarely need to modify all of them.


    Since a label is designed to display text, the most common attributes to modify
    are those that affect the appearance of text such as color, font, or alignment.


    To see how to modify the more common attributes of a label in both the Inspector
    pane and in Swift code, follow these steps:


    1.  Create a new iOS project using the Single View App template (see Chapter 1)
    and name this new project `LabelApp`. This creates a single view for the user
    interface.

    2.  Click the `Main.storyboard` file in the Navigator pane. Xcode displays the
    single view.

    3.  Click the Library icon to open the Object Library window.

    4.  Drag and drop a label anywhere on the user interface.

    5.  Choose **View** ➤ **Inspectors** ➤ **Show Attributes Inspector**, or click
    the Attributes Inspector icon at the top of the Inspector pane. The Inspector
    pane shows all attributes available for a label.

    6.  Click in the text field underneath the Text popup menu. By default, every
    label displays “Label” as shown in Figure 7-5.


    ![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig5_HTML.jpg](images/329781_5_En_7_Chapter/329781_5_En_7_Fig5_HTML.jpg)


    *Figure 7-5: The attribute for modifying the text that appears in a label*


    7.  Use the BACKSPACE or DELETE key to delete the text, type **This is a label**,
    and press ENTER. Xcode displays “This is a label” on the label on your user interface.
    (You can also double-click a label to edit the text directly on that label.)

    8.  Click the square icon that displays a T inside at the far right of the Font
    text field. A popup menu appears allowing you to choose a different font and font
    size as shown in Figure 7-6.


    ![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig6_HTML.jpg](images/329781_5_En_7_Chapter/329781_5_En_7_Fig6_HTML.jpg)


    *Figure 7-6: Defining a font and font size for text displayed in a label*


    9.  Click in the Font popup menu. When another menu appears, choose Custom as
    shown in Figure 7-7.


    ![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig7_HTML.jpg](images/329781_5_En_7_Chapter/329781_5_En_7_Fig7_HTML.jpg)


    *Figure 7-7: Choosing Custom lets you define a font for text in a label*


    10.  Click the Family popup menu. A list of all available fonts appears.

    11.  Click a font you want to use such as Helvetica.

    12.  Click in the Size text field and type a new value (such as 24) or click the
    up/down arrows at the far right of the text field to increase/decrease the displayed
    value.

    13.  Click the Done button. Xcode displays the label text in your chosen font
    and font size.


    Changing the text, font, and font size is the most common way to modify a label.
    Some other ways to customize a label include changing its background, how many
    lines of text the label can display, and whether text appears enabled (dark) or
    not (gray). To see how to change these attributes of a label, follow these steps:'
