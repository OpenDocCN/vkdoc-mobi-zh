    \n26. 按住鼠标左键和 Option 键，然后以圆周运动拖动鼠标，模拟旋转手势。请注意，随着旋转手势的变化，图像视图也会随之旋转。\n\n27. 选择\
    \ **Simulator ➤ Quit Simulator** 返回 Xcode。\n\n本示例通过从对象库中拖拽 Rotation Gesture Recognizer\
    \ 来可视化地定义旋转手势。现在，让我们看看如何仅通过 Swift 代码来复制这一过程。\n\n1.  使用 Single View App 模板创建一个新的\
