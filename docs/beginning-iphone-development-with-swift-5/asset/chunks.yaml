  trans: "\n### 向导航栏添加按钮\n\n导航栏始终会在除根视图以外的所有视图上显示一个返回按钮。不过，你还可以在导航栏右侧添加更多按钮。然后，你可以将这些按钮连接到\
    \ `IBAction` 方法，使它们真正发挥作用。\n\n除了自定义按钮标题外，Xcode 还包含几种常见的按钮类型供你选择，例如“保存”、“完成”、“回复”、“相机”、“播放”、“搜索”或“撤销”，如图\
    \ 17-25 所示。\n\n![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig25_HTML.jpg](img/329781_5_En_17_Fig25_HTML.jpg)\n\
