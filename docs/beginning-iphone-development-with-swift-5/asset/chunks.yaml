    \ user interface.\n\n2.  Click the Main.storyboard file in the Navigator pane.\
    \ Xcode displays the single view.\n\n3.  Click the Library icon to open the Object\
    \ Library window.\n\n4.  Drag and drop a button and a Picker View anywhere on\
    \ the view (see Figure [12-9](#329781_5_En_12_Chapter.xhtml#Fig9)).\n\n5.  Choose\
    \ Editor ➤ Resolve Auto Layout Issues ➤ Set to Suggested Constraints in the bottom\
    \ half of the submenu. Xcode adds constraints to your button and Picker View.\n\
    \n6.  Edit the class ViewController line as follows:\n\n```\n    class ViewController:\
    \ UIViewController, UIPickerViewDataSource, UIPickerViewDelegate {\n    ```\n\n\
    This makes the ViewController.swift file the Picker View’s data source and delegate.\n\
    \n7.  Choose View ➤ Assistant Editor ➤ Show Assistant Editor. Xcode displays the\
    \ Main.storyboard and ViewController.swift file side by side.\n\n8.  Move the\
    \ mouse pointer over the Picker View, hold down the Control key, and Ctrl-drag\
    \ from the Picker View to the ViewController.swift file underneath the “class\
    \ ViewController” line.\n\n9.  Release the Control key and the left mouse button.\
    \ A popup window appears.\n\n10.  Click in the Name text field, type **myPicker**,\
    \ and click the Connect button. Xcode creates an IBOutlet variable as follows:\n\
    \n```\n    @IBOutlet var myPicker: UIDatePicker!\n    ```\n\n11.  Underneath the\
    \ IBOutlet add the following three lines to define three variables to hold an\
    \ array of strings:\n\n```\n    var componentOne: [String] = [String]()\n    var\
