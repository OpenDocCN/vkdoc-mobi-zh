    \ Library`窗口，然后从`Object Library`窗口拖放一个`View Controller`到故事板。此时故事板应包含一个`Page Controller`和三个`View\
    \ Controllers`。\n\n22.  在文档大纲中点击`View Controller`，或点击`View Controller`上方的`View\
    \ Controller`图标。\n\n23.  选择`View` ➤ `Inspectors` ➤ `Show Identity Inspector`，或点击\
