    \ method will define the sender (the object that called the IBAction method) as\
    \ that specific object such as:\n\n```\n@IBAction func buttonTapped(_ sender:\
    \ UIButton) {\n}\n```\n\nThe preceding IBAction method can only be called from\
    \ UIButton objects. If you accept the Type default of Any when creating an IBAction\
    \ method, then your IBAction method will define the sender as Any such as:\n\n\
    ```\n@IBAction func buttonTapped(_ sender: Any) {\n}\n```\n\nAny type of object\
    \ can connect to an IBAction method where the sender is defined as Any.\n\nWhen\
    \ two or more objects connect to the same IBAction method, you need a way to identify\
    \ which object called that IBAction method. One way to identify different user\
    \ interface objects is to give each one a unique Tag number in the Attributes\
    \ Inspector pane as shown in Figure [10-10](#329781_5_En_10_Chapter.xhtml#Fig10).\n\
    \n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig10_HTML.jpg](images/329781_5_En_10_Chapter/329781_5_En_10_Fig10_HTML.jpg)\n\
    \nFigure 10-10\n\nThe Tag property can be modified in the Attributes Inspector\
    \ pane\n\nBy default, every object has a Tag value of 0, but you can change this\
    \ so each object has a distinct value such as 1, 24, or 894\\. By identifying\
    \ the Tag value, an IBAction method can determine which object to respond to.\n\
    \nTo show how to link multiple objects to an IBAction method and detect which\
    \ object to respond to, follow these steps:\n\n1.  Create a new iOS project using\
    \ the Single View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml))\
    \ and name this new project IBActionApp. This creates a single view for the user\
    \ interface.\n\n2.  Click the Main.storyboard file in the Navigator pane. Xcode\
    \ displays the single view.\n\n3.  Click the Library icon to open the Object Library\
    \ window.\n\n4.  Drag and drop two buttons and a label anywhere on the view.\n\
    \n5.  Choose Editor ➤ Resolve Auto Layout Issues ➤ Reset to Suggested Constraints\
    \ on the bottom half of the submenu. This will add constraints to the two buttons\
    \ and label on the user interface.\n\n6.  Click one button to select it.\n\n7.\
    \  Choose View ➤ Inspectors ➤ Show Attributes Inspector, or click the Attributes\
    \ Inspector icon in the upper right corner of the Xcode window.\n\n8.  Click in\
    \ the Title text field, type **First**, and press ENTER.\n\n9.  Click in the Tag\
    \ text field, type **1**, and press ENTER.\n\n10.  Click the second button to\
    \ select it.\n\n11.  Click in the Title text field, type **Second**, and press\
    \ ENTER.\n\n12.  Click in the Tag text field, type **2**, and press ENTER.\n\n\
    13.  Choose View ➤ Assistant Editor ➤ Show Assistant Editor, or click the Assistant\
    \ Editor icon. Xcode displays the Main.storyboard and ViewController.swift file\
    \ side by side.\n\n14.  Move the mouse pointer over the label, hold down the Control\
    \ key, and Ctrl-drag from the label to the ViewController.swift file underneath\
    \ the IBOutlet line.\n\n15.  Release the Control key and the left mouse button.\
    \ A popup window appears.\n\n16.  Click in the Name text field, type **labelResult**,\
    \ and click the Connect button. Xcode creates an IBOutlet variable as follows:\n\
    \n```\n    @IBOutlet var labelResult: UILabel!\n    ```\n\n17.  Move the mouse\
    \ pointer over the button titled “First”, hold down the Control key, and Ctrl-drag\
    \ from the button to the ViewController.swift file above the last curly bracket\
    \ in the ViewController.swift file.\n\n18.  Release the Control key and the left\
    \ mouse button. A popup window appears.\n\n19.  Click in the Name text field,\
    \ type **buttonTapped**, make sure the Type popup menu displays Any, and click\
    \ the Connect button. Xcode creates an IBAction method as follows:\n\n```\n  \
    \  @IBAction func buttonTapped(_ sender: Any) {\n    }\n    ```\n\n20.  Move the\
    \ mouse pointer over the button titled “Second”, hold down the Control key, and\
    \ Ctrl-drag from the button to the buttonTapped IBAction method until the entire\
    \ IBAction method appears highlighted as shown in Figure [10-11](#329781_5_En_10_Chapter.xhtml#Fig11).\n\
    \n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig11_HTML.jpg](images/329781_5_En_10_Chapter/329781_5_En_10_Fig11_HTML.jpg)\n\
    \nFigure 10-11\n\nConnecting a second object to an existing IBAction method\n\n\
    21.  Release the Control key and left mouse button.\n\n22.  Move the mouse pointer\
    \ over the circle in the left margin of the buttonTapped IBAction method. Xcode\
    \ highlights the two buttons to verify that both buttons are connected to the\
    \ buttonTapped IBAction method as shown in Figure [10-12](#329781_5_En_10_Chapter.xhtml#Fig12).\n\
    \n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig12_HTML.jpg](images/329781_5_En_10_Chapter/329781_5_En_10_Fig12_HTML.jpg)\n\
    \nFigure 10-12\n\nVerifying all objects connected to a single IBAction method\n\
    \n23.  Modify the buttonTapped IBAction method as follows:\n\n```\n    @IBAction\
    \ func buttonTapped(_ sender: Any) {\n    switch (sender as AnyObject).tag {\n\
    \    case 1:\n    labelResult.text = \"Button 1\"\n    case 2:\n    labelResult.text\
    \ = \"Button 2\"\n    default:\n    labelResult.text = \"Default\"\n    }\n  \
    \  }\n    ```\n\n24.  Modify the viewDidLoad method as follows:\n\n```\n    override\
    \ func viewDidLoad() {\n    super.viewDidLoad()\n    labelResult.frame.size.width\
    \ = 120\n    // Do any additional setup after loading the view, typically from\
    \ a nib.\n    }\n    ```\n\nThe entire ViewController.swift file should look like\
    \ this:\n\n```\n    import UIKit\n    class ViewController: UIViewController {\n\
    \    @IBOutlet var labelResult: UILabel!\n    override func viewDidLoad() {\n\
    \    super.viewDidLoad()\n    labelResult.frame.size.width = 120\n    // Do any\
    \ additional setup after loading the view, typically from a nib.\n    }\n    @IBAction\
    \ func buttonTapped(_ sender: Any) {\n    switch (sender as AnyObject).tag {\n\
    \    case 1:\n    labelResult.text = \"Button 1\"\n    case 2:\n    labelResult.text\
    \ = \"Button 2\"\n    default:\n    labelResult.text = \"Default\"\n    }\n  \
    \  }\n    }\n    ```\n\n25.  Click the Run button or choose Product ➤ Run. The\
    \ Simulator screen appears.\n\n26.  Click the button titled “First”. Notice that\
    \ the label displays “Button 1”.\n\n27.  Click the button titled “Second”. Notice\
    \ that the label displays “Button 2”.\n\n28.  Chose Simulator ➤ Quit Simulator\
    \ to return to Xcode."
  trans: "\n# 将多个对象连接到同一个 `IBAction` 方法\n\n大多数情况下，当你使用按钮、开关或分段控件等对象与用户交互时，你会为每个对象创建一个独立的\
    \ `IBAction` 方法。然而，也可以将两个或多个对象连接到同一个 `IBAction` 方法。\n\n首先，你需要用一个对象（例如一个按钮）创建一个\
    \ `IBAction` 方法。然后，你可以将另一个对象连接到那个已有的 `IBAction` 方法。这样，两个对象都能响应同一个 `IBAction` 方法。这很有用，因为你无需编写两个或多个功能大致相同的独立\
    \ `IBAction` 方法，只需编写一个单一的 `IBAction` 方法，它能根据用户点击的是哪个对象而做出略有不同的响应。\n\n当将两个或多个对象连接到同一个\
    \ `IBAction` 方法时，你需要决定是只允许相同类型的对象（如按钮）连接到同一个 `IBAction` 方法，还是允许不同类型的对象（如一个按钮和一个图像视图）连接到同一个\
    \ `IBAction` 方法。\n\n每当你创建一个 `IBAction` 方法时，你可以定义该 `IBAction` 方法将响应哪种类型的对象。默认情况下，类型设置为\
    \ `Any`，这意味着不同类型的对象可以连接到同一个 `IBAction` 方法，但你也可以选择只允许同一类型的对象连接到该 `IBAction` 方法，例如\
    \ `UIButton`，如图 10-9 所示。\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig9_HTML.jpg](img/329781_5_En_10_Fig9_HTML.jpg)\n\
    \n**图 10-9** – 选择 `IBAction` 方法可以响应的对象类型\n\n如果你将 `类型` 定义为特定对象（如 `UIButton`），则你的\
    \ `IBAction` 方法会将 `sender`（调用该 `IBAction` 方法的对象）定义为该特定对象，例如：\n\n```\n@IBAction\
    \ func buttonTapped(_ sender: UIButton) {\n}\n```\n\n上述 `IBAction` 方法只能由 `UIButton`\
    \ 对象调用。如果在创建 `IBAction` 方法时接受 `类型` 的默认值 `Any`，那么你的 `IBAction` 方法会将 `sender` 定义为\
    \ `Any`，例如：\n\n```\n@IBAction func buttonTapped(_ sender: Any) {\n}\n```\n\n任何类型的对象都可以连接到一个\
    \ `sender` 被定义为 `Any` 的 `IBAction` 方法。\n\n当两个或多个对象连接到同一个 `IBAction` 方法时，你需要一种方法来识别是哪个对象调用了该\
    \ `IBAction` 方法。识别不同用户界面对象的一种方法是在属性检查器面板中为每个对象分配一个唯一的 `Tag` 编号，如图 10-10 所示。\n\n\
    ![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig10_HTML.jpg](img/329781_5_En_10_Fig10_HTML.jpg)\n\
    \n**图 10-10** – `Tag` 属性可以在属性检查器面板中修改\n\n默认情况下，每个对象的 `Tag` 值都为 0，但你可以更改此值，使每个对象拥有不同的值，例如\
    \ 1、24 或 894。通过识别 `Tag` 值，`IBAction` 方法可以确定要响应哪个对象。\n\n为了演示如何将多个对象链接到一个 `IBAction`\
    \ 方法并检测要响应的对象，请遵循以下步骤：\n\n1. 使用单视图应用模板（见第 1 章）创建一个新的 iOS 项目，并将此新项目命名为 `IBActionApp`。这将为用户界面创建一个单视图。\n\
    \n2. 在导航器面板中点击 `Main.storyboard` 文件。Xcode 会显示该单视图。\n\n3. 点击库图标以打开对象库窗口。\n\n4.\
    \ 在视图上的任意位置拖放两个按钮和一个标签。\n\n5. 选择 **编辑器** ➤ **解决自动布局问题** ➤ **重置为建议的约束**（在子菜单的下半部分）。这将为两个按钮和标签添加约束到用户界面。\n\
    \n6. 点击一个按钮以选中它。\n\n7. 选择 **视图** ➤ **检查器** ➤ **显示属性检查器**，或点击 Xcode 窗口右上角的属性检查器图标。\n\
    \n8. 点击标题文本字段，输入 **First**，然后按回车键。\n\n9. 点击标签文本字段，输入 **1**，然后按回车键。\n\n10. 点击第二个按钮以选中它。\n\
    \n11. 点击标题文本字段，输入 **Second**，然后按回车键。\n\n12. 点击标签文本字段，输入 **2**，然后按回车键。\n\n13. 选择\
    \ **视图** ➤ **助理编辑器** ➤ **显示助理编辑器**，或点击助理编辑器图标。Xcode 会并排显示 `Main.storyboard` 和\
    \ `ViewController.swift` 文件。\n\n14. 将鼠标指针移到标签上，按住 Control 键，并从标签拖拽到 `ViewController.swift`\
    \ 文件中 `IBOutlet` 行的下方。\n\n15. 松开 Control 键和鼠标左键。会弹出一个窗口。\n\n16. 点击名称文本字段，输入 `labelResult`，然后点击连接按钮。Xcode\
    \ 会创建一个 `IBOutlet` 变量，如下所示：\n\n```\n    @IBOutlet var labelResult: UILabel!\n\
    ```\n\n17. 将鼠标指针移到标题为 \"First\" 的按钮上，按住 Control 键，并从该按钮拖拽到 `ViewController.swift`\
    \ 文件中最后一个花括号上方的位置。\n\n18. 松开 Control 键和鼠标左键。会弹出一个窗口。\n\n19. 点击名称文本字段，输入 `buttonTapped`，确保\
    \ `类型` 弹出菜单显示为 `Any`，然后点击连接按钮。Xcode 会创建一个 `IBAction` 方法，如下所示：\n\n```\n    @IBAction\
    \ func buttonTapped(_ sender: Any) {\n    }\n```\n\n20. 将鼠标指针移到标题为 \"Second\"\
    \ 的按钮上，按住 Control 键，并从该按钮拖拽到 `buttonTapped` `IBAction` 方法，直到整个 `IBAction` 方法高亮显示，如图\
    \ 10-11 所示。\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig11_HTML.jpg](img/329781_5_En_10_Fig11_HTML.jpg)\n\
    \n**图 10-11** – 将第二个对象连接到现有的 `IBAction` 方法\n\n21. 松开 Control 键和鼠标左键。\n\n22. 将鼠标指针移到\
    \ `buttonTapped` `IBAction` 方法左侧边距中的圆点上。Xcode 会高亮显示这两个按钮，以验证两个按钮都已连接到 `buttonTapped`\
    \ `IBAction` 方法，如图 10-12 所示。\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig12_HTML.jpg](img/329781_5_En_10_Fig12_HTML.jpg)\n\
    \n**图 10-12** – 验证所有连接到单个 `IBAction` 方法的对象\n\n23. 按如下方式修改 `buttonTapped` `IBAction`\
    \ 方法：\n\n```\n    @IBAction func buttonTapped(_ sender: Any) {\n    switch (sender\
    \ as AnyObject).tag {\n    case 1:\n    labelResult.text = \"Button 1\"\n    case\
    \ 2:\n    labelResult.text = \"Button 2\"\n    default:\n    labelResult.text\
    \ = \"Default\"\n    }\n    }\n```\n\n24. 按如下方式修改 `viewDidLoad` 方法：\n\n```\n \
    \   override func viewDidLoad() {\n    super.viewDidLoad()\n    labelResult.frame.size.width\
    \ = 120\n    // 加载视图后执行任何额外的设置，通常从 nib 文件加载。\n    }\n```\n\n整个 `ViewController.swift`\
    \ 文件应如下所示：\n\n```\n    import UIKit\n    class ViewController: UIViewController\
    \ {\n    @IBOutlet var labelResult: UILabel!\n    override func viewDidLoad()\
    \ {\n    super.viewDidLoad()\n    labelResult.frame.size.width = 120\n    // 加载视图后执行任何额外的设置，通常从\
    \ nib 文件加载。\n    }\n    @IBAction func buttonTapped(_ sender: Any) {\n    switch\
    \ (sender as AnyObject).tag {\n    case 1:\n    labelResult.text = \"Button 1\"\
    \n    case 2:\n    labelResult.text = \"Button 2\"\n    default:\n    labelResult.text\
    \ = \"Default\"\n    }\n    }\n    }\n```\n\n25. 点击运行按钮或选择 **产品** ➤ **运行**。模拟器屏幕出现。\n\
    \n26. 点击标题为 \"First\" 的按钮。注意标签显示 \"Button 1\"。\n\n27. 点击标题为 \"Second\" 的按钮。注意标签显示\
    \ \"Button 2\"。\n\n28. 选择 **模拟器** ➤ **退出模拟器** 以返回 Xcode。\n"
- fmt: "In the preceding example, two buttons connect to the same `IBAction` method,\
    \ but because the `IBAction` type is `Any`, you could connect any objects to this\
    \ `IBAction` method. In most cases, it’s better to restrict an `IBAction` method\
    \ to specific types of objects such as `UIButton`.\n\nBesides reducing the risk\
    \ that an unintended object could connect to an `IBAction` method, restricting\
    \ an `IBAction` method to a specific object type also lets you access that specific\
    \ object’s properties. For example, an `IBAction` method linked only to `UIButtons`\
    \ will then be able to access all the properties that a `UIButton` object contains\
    \ such as `titleLabel.text`.\n\nBefore we link the two existing buttons to a new\
    \ `IBAction` method, we need to break the connection between the current `IBAction`\
    \ method in the Connections Inspector pane. After we break the connection between\
    \ an `IBOutlet` and an `IBAction` method, we can delete the actual `IBOutlet`\
    \ or `IBAction` method in the `.swift` file.\n\n### Note\n\nJust deleting an `IBOutlet`\
    \ variable or `IBAction` method will not break its link to an object on the user\
    \ interface. You must break the actual link in the Connections Inspector pane.\
    \ If you fail to break the link in the Connections Inspector pane, running your\
    \ app will not work and Xcode will display an error message.\n\nTo see how to\
    \ break a connection between an existing `IBAction` method and a user interface\
    \ object and create an `IBAction` method for specific types of objects only, follow\
    \ these steps:\n\n1.  Make sure the `IBActionApp` project is loaded in Xcode.\n\
    \n2.  Click the `Main.storyboard` file in the Navigator pane.\n\n3.  Click the\
    \ button titled “First” to select it.\n\n4.  Choose View ➤ Inspectors ➤ Show Connections\
    \ Inspector, or click the Connections Inspector icon in the upper right corner\
    \ of the Xcode window. The Connections Inspector pane appears, showing all `IBOutlet`s\
    \ and `IBAction` methods linked to the selected object. In Figure [10-13](#329781_5_En_10_Chapter.xhtml#Fig13),\
    \ the selected button is linked to an `IBAction` method called `buttonTapped`,\
    \ which responds to the Touch Up Inside event.\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig13_HTML.jpg](images/329781_5_En_10_Chapter/329781_5_En_10_Fig13_HTML.jpg)\n\
    \nFigure 10-13\n\nThe Connections Inspector pane displays all links to `IBOutlet`s\
    \ and `IBAction` methods\n\n5.  Click the Close icon (X) that appears to the left\
    \ of View Controller `buttonTapped`. This breaks the link between the selected\
    \ button and the `buttonTapped` `IBAction` method stored in the `ViewController.swift`\
    \ file.\n\n6.  Click the button titled “Second” to select it.\n\n7.  Click the\
    \ Close icon (X) that appears to the left of View Controller `buttonTapped`. This\
    \ breaks the link between the second button and the `buttonTapped` `IBAction`\
    \ method stored in the `ViewController.swift` file.\n\n8.  Choose View ➤ Assistant\
    \ Editor ➤ Show Assistant Editor, or click the Assistant Editor icon. Xcode displays\
    \ the `Main.storyboard` and `ViewController.swift` file side by side.\n\n9.  Move\
    \ the mouse pointer over the button titled “First”, hold down the Control key,\
    \ and Ctrl-drag the mouse above the last curly bracket at the bottom of the `ViewController.swift`\
    \ file.\n\n10.  Release the Control key and the left mouse button. A popup window\
    \ appears.\n\n11.  Click in the Name text field, type `buttonRespond`, click the\
    \ Type popup menu to choose `UIButton`, and click the Connect button. Xcode creates\
    \ an `IBAction` method as follows:\n\n```\n    @IBAction func buttonRespond(_\
    \ sender: UIButton) {\n    }\n    ```\n\n12.  Move the mouse pointer over the\
    \ button titled “First”, hold down the Control key, and Ctrl-drag the mouse over\
    \ the `buttonRespond` `IBAction` method to highlight it as shown in Figure [10-14](#329781_5_En_10_Chapter.xhtml#Fig14)\
    \ .\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig14_HTML.jpg](images/329781_5_En_10_Chapter/329781_5_En_10_Fig14_HTML.jpg)\n\
    \nFigure 10-14\n\nConnecting a button to an existing `IBAction` method\n\n13.\
    \  Release the Control key and the left mouse button.\n\n14.  Edit the `buttonRespond`\
    \ `IBAction` method as follows:\n\n```\n    @IBAction func buttonRespond(_ sender:\
    \ UIButton) {\n    switch sender.tag {\n    case 1:\n    labelResult.text = sender.titleLabel?.text\n\
    \    case 2:\n    labelResult.text = sender.titleLabel?.text\n    default:\n \
    \   labelResult.text = \"Default\"\n    }\n    }\n    ```\n\nThe entire `ViewController.swift`\
    \ file should look like this:\n\n```\n    import UIKit\n    class ViewController:\
    \ UIViewController {\n    @IBOutlet var labelResult: UILabel!\n    override func\
    \ viewDidLoad() {\n    super.viewDidLoad()\n    labelResult.frame.size.width =\
    \ 120\n    // Do any additional setup after loading the view, typically from a\
    \ nib.\n    }\n    @IBAction func buttonTapped(_ sender: Any) {\n    switch (sender\
    \ as AnyObject).tag {\n    case 1:\n    labelResult.text = \"Button 1\"\n    case\
    \ 2:\n    labelResult.text = \"Button 2\"\n    default:\n    labelResult.text\
    \ = \"Default\"\n    }\n    }\n    @IBAction func buttonRespond(_ sender: UIButton)\
    \ {\n    switch sender.tag {\n    case 1:\n    labelResult.text = sender.titleLabel?.text\n\
    \    case 2:\n    labelResult.text = sender.titleLabel?.text\n    default:\n \
    \   labelResult.text = \"Default\"\n    }\n    }\n    }\n    ```\n\n15.  Click\
    \ the Run button or choose Product ➤ Run. The Simulator screen appears.\n\n16.\
    \  Click the button titled “First”. Notice that the label displays “First”.\n\n\
    17.  Click the button titled “Second”. Notice that the label displays “Second”.\n\
    \n18.  Chose Simulator ➤ Quit Simulator to return to Xcode.\n\n## Summary\n\n\
    Buttons, switches, and segmented controls offer ways for users to control an app.\
    \ By using the Inspector pane or Swift code, you can modify buttons, switches,\
    \ and segmented controls to customize them for your particular app.\n\nButtons\
    \ represent a single command. Switches let users choose exactly two settings,\
    \ on (true) and off (false). Segmented controls act like multiple buttons but\
    \ take up less space than multiple buttons.\n\nTypically you link a button, switch,\
    \ or segmented control to a single `IBAction` method. However, you can connect\
    \ two or more objects to a single `IBAction` method. When creating an `IBAction`\
    \ method, you can allow any type of object to connect to it or you can define\
    \ that only a specific type of object (such as a `UIButton`) can connect to the\
    \ `IBAction` method. If you define that only a specific type of object can connect\
    \ to an `IBAction` method, then you’ll be able to access properties of that object.\n\
    \nOnce you connect an object to an `IBOutlet` or `IBAction` method, you can always\
    \ break that connection later. You must break that connection in the Connections\
    \ Inspector pane. If you fail to break a connection and later delete an `IBOutlet`\
    \ or `IBAction` method, then Xcode will give an error message if you try to run\
    \ the app."
