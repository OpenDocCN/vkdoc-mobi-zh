- fmt: "# Summary\n\nEvery app needs a user interface. That user interface gets stored\
    \ in a storyboard that consists of one or more views where a view represents information\
    \ displayed on a single screen. You can add objects on a view such as buttons,\
    \ text fields, labels, and sliders. If you have two or more views, you’ll also\
    \ need segues to connect views, showing the order that they appear to the user.\n\
    \nYou can add objects to a view programmatically (by writing code) or visually.\
    \ Programmers often use both methods to design their user interface. You can customize\
    \ objects (buttons, labels, text fields, etc.) either through code or through\
    \ the Inspector pane. Each view in your storyboard needs to be linked to a `.swift`\
    \ file.\n\nSince iOS apps can run on different types of devices, you need to make\
    \ sure your app looks good no matter what the screen size or orientation might\
    \ be. To help you view your app’s user interface in different screen sizes and\
    \ orientations, you can change the iOS device screen size that Xcode uses to display\
    \ your storyboard.\n\nAnother way to test your app’s user interface in different\
    \ screen sizes is to run the Simulator program and define it to mimic different\
    \ iOS devices such as an iPad Pro or an iPhone 8. If you want to compare how your\
    \ app will look on different iOS device screens, you can use the Preview feature.\n\
    \nUser interfaces represent what users see, so it’s important that your user interface\
    \ always looks good no matter what type of iOS device the user runs it on.\n\n\
    # 3. Writing Swift Code\n\nEvery iOS app needs a user interface, but that user\
    \ interface won’t do anything until you write Swift code to make it work. While\
    \ you could write all your code in a single file, it’s better to divide your code\
    \ into files where each file contains related code. A simple app might only contain\
    \ a handful of files, but a more complicated app could contain dozens or even\
    \ hundreds of separate files that contain related Swift code. Within each file,\
    \ you can further organize your Swift code into separate functions.\n\nSwift code\
    \ is necessary to:\n\n- Retrieve data from the user interface\n- Calculate some\
    \ result from retrieved data\n- Display that result back on the user interface\
    \ again\n\nTo retrieve data from the user interface, you need to define special\
    \ variables known as `IBOutlets`. An `IBOutlet` is a variable that represents\
    \ an object displayed on the user interface. Through an `IBOutlet`, the rest of\
    \ your Swift code can access and manipulate that data somehow.\n\nTo calculate\
    \ a result from retrieved data, you can write Swift code to manipulate data, but\
    \ it’s far more common to also use Apple’s frameworks as well. Apple’s frameworks\
    \ contain dozens of functions that you can use to perform common tasks. That way\
    \ you can use tested code and spend more time writing code that makes your app\
    \ do something useful and unique.\n\nTo make your app do something, you can create\
    \ special functions known as `IBActions`. An `IBAction` makes a user interface\
    \ object interactive such as responding if the user taps a button, types text\
    \ in a text field, or manipulates a slider.\n\nOnce your app finishes calculating\
    \ some result, the final step is to display that result back on the user interface\
    \ again. To do that, you store the data back in an `IBOutlet` variable so that\
    \ the data can appear in the user interface.\n\n`IBOutlet` variables and `IBAction`\
    \ functions are stored in the `.swift` file linked to the View Controller displaying\
    \ the user interface objects connected to an `IBOutlet` variable or an `IBAction`\
    \ function. Remember, each View Controller is linked to a `.swift` file.\n\nTo\
    \ see how `IBOutlets` and `IBAction` functions work, follow these steps:\n\n1.\
    \ Open your `MyFirstApp` project (or create a new Single View App iOS project).\n\
    2. Click the `Main.storyboard` file in the Navigator pane. The middle Xcode pane\
    \ displays the contents of your app’s user interface. It should display a button\
    \ and a label.\n3. Click the Library icon to open the Object Library window. Then\
    \ type `text field`.\n4. Drag the text field from the Object Library window to\
    \ the user interface as shown in Figure [3-1](#329781_5_En_3_Chapter.xhtml#Fig1).\n\
    \n   ![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig1_HTML.jpg](images/329781_5_En_3_Chapter/329781_5_En_3_Fig1_HTML.jpg)\n\
    \n   Figure 3-1. Adding a text field to the view\n\n5. Resize the width of the\
    \ text field to make it wider. The exact width isn’t important. At this point,\
    \ your user interface should consist of a label, a text field, and a button. If\
    \ we ran this app, the user could tap on the button or type in the text field,\
    \ but nothing would happen. That’s because we haven’t written any Swift code to\
    \ make anything work yet.\n\n## Creating IBOutlet Variables\n\nAn `IBOutlet` is\
    \ nothing more than a variable that connects your Swift code to a user interface\
    \ object such as a text field or a label. By using an `IBOutlet`, you can retrieve\
    \ data from a user interface object or put information to appear inside that user\
    \ interface object.\n\nWhen creating a variable in Swift, you normally need to\
    \ declare a variable name and the type of data it can hold such as:\n\n```\nvar\
    \ age : Int\n```\n\nThe preceding code declares a variable called `age` that can\
    \ hold an integer (`Int`) value. When you create `IBOutlets`, you must also declare\
    \ a variable name. The two differences are that you must also identify the variable\
    \ as an `IBOutlet` and you must declare its type as a user interface object such\
    \ as:\n\n```\n@IBOutlet var age: UITextField!\n```\n\nTo identify an `IBOutlet`,\
    \ you must use `@IBOutlet` in front of `var`. Next, you must define the type of\
    \ user interface object the `IBOutlet` connects to. In the preceding example,\
    \ the `age` `IBOutlet` connects to a text field (`UITextField`). Some other common\
    \ types of user interface objects an `IBOutlet` can connect to include `UILabel`,\
    \ `UIButton`, or `UISlider`."
