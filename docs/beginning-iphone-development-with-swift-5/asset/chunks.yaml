    \ icon in the upper right corner of the Xcode window.\n\n9.  Click the DetailViewController.swift\
    \ file in the Navigator pane.\n\n10.  Add the following property under the IBOutlet:\n\
    \n    ```\n    var detailItem: String? {\n    didSet {\n    configureView()\n\
    \    }\n    }\n    ```\n\n11.  Add the following function under the IBOutlet:\n\
    \n    ```\n    func configureView() {\n    if let label = petLabel {\n    label.text\
    \ = detailItem\n    }\n    }\n    ```\n\n12.  Modify the viewDidLoad method as\
    \ follows:\n\n    ```\n    override func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    configureView()\n    }\n    ```\n\nWhen the view loads for the first time,\
    \ it calls the configureView function, which stores the detailItem data into the\
    \ label. Each time the user chooses a different item in the table view displayed\
    \ on the master view, this chosen item gets stored in the detailItem property.\n\
    \nThe complete DetailViewController.swift file should look like this:\n\n```\n\
    import UIKit\nclass DetailViewController: UIViewController {\n@IBOutlet var petLabel:\
    \ UILabel!\nvar detailItem: String? {\ndidSet {\nconfigureView()\n}\n}\nfunc configureView()\
    \ {\nif let label = petLabel {\nlabel.text = detailItem\n}\n}\noverride func viewDidLoad()\
    \ {\nsuper.viewDidLoad()\nconfigureView()\n// Do any additional setup after loading\
    \ the view.\n}\n}\n```\n\n### Modifying the MasterTableViewController.swift File\n\
    \nThe MasterTableViewController.swift file displays a table view for the user\
    \ to select an item. That means the MasterTableViewController.swift file needs\
    \ to define how many sections appear in the table view (1) and how many number\
    \ of rows appear in the table view (the total array count of data) and fill the\
    \ table view with data from an array. The array simply displays a list of strings\
    \ where each string appears in a row in the table view.\n\nIn addition to filling\
    \ the table view with data, the MasterTableViewController.swift file also needs\
    \ to create a variable that represents the detail View Controller and pass that\
    \ detail View Controller the item selected from the table view by using the segue\
    \ defined in the storyboard.\n\nTo modify the MasterTableViewController.swift\
    \ file, follow these steps:\n\n1.  Make sure the SplitViewCustomApp project is\
    \ loaded in Xcode.\n\n2.  Click the MasterTableViewController.swift file in the\
    \ Navigator pane.\n\n3.  Underneath the “class MasterTableViewController” line,\
    \ add the following:\n\n```\n    var detailVC: DetailViewController? = nil\n \
    \   let petArray = [\"cat\", \"dog\", \"parakeet\", \"parrot\", \"canary\", \"\
    finch\", \"tropical fish\", \"goldfish\", \"sea horses\", \"hamster\", \"gerbil\"\
    , \"rabbit\", \"turtle\", \"snake\", \"lizard\", \"hermit crab\"]\n    ```\n\n\
    4.  Modify the viewDidLoad method as follows:\n\n```\n    override func viewDidLoad()\
    \ {\n    super.viewDidLoad()\n    if let split = splitViewController {\n    detailVC\
    \ = (split.viewControllers.last as! UINavigationController).topViewController\
    \ as? DetailViewController\n    }\n    }\n    ```\n\n5.  Add the following method\
    \ underneath the viewDidLoad method:\n\n```\n    override func viewWillAppear(_\
    \ animated: Bool) {\n    clearsSelectionOnViewWillAppear = splitViewController!.isCollapsed\n\
    \    super.viewWillAppear(animated)\n    }\n    ```\n\n6.  Add the following under\
    \ the viewWillAppear method to define the table view and fill it with data from\
    \ the array:\n\n```\n    override func numberOfSections(in tableView: UITableView)\
    \ -> Int {\n    return 1\n    }\n    override func tableView(_ tableView: UITableView,\
    \ numberOfRowsInSection section: Int) -> Int {\n    return petArray.count\n  \
    \  }\n    override func tableView(_ tableView: UITableView, cellForRowAt indexPath:\
    \ IndexPath) -> UITableViewCell {\n    // Make sure you define the table view's\
    \ cell Identifier in the Attributes Inspector pane\n    let cell = tableView.dequeueReusableCell(withIdentifier:\
    \ \"customCell\", for: indexPath)\n    cell.textLabel!.text = petArray[indexPath.row]\n\
    \    return cell\n    }\n    ```\n\n7.  Add the following prepare for segue function\
    \ to retrieve data from the table view and send it to the DetailViewController.swift\
    \ file:\n\n```\n    override func prepare(for segue: UIStoryboardSegue, sender:\
    \ Any?) {\n    if segue.identifier == \"showDetail\" {\n    if let indexPath =\
    \ tableView.indexPathForSelectedRow {\n    let object = petArray[indexPath.row]\n\
    \    let controller = (segue.destination as! UINavigationController).topViewController\
    \ as! DetailViewController\n    controller.detailItem = object\n    controller.navigationItem.leftBarButtonItem\
    \ = splitViewController?.displayModeButtonItem\n    controller.navigationItem.leftItemsSupplementBackButton\
    \ = true\n    }\n    }\n    }\n    ```\n\n8.  Click the Run button or choose Product\
    \ ➤ Run. The Simulator window appears, displaying a table view filled with items\
    \ from the petArray.\n\n9.  Click any item. Notice that the detail view displays\
    \ the chosen item in its label.\n\n10.  Choose Hardware ➤ Rotate Left.\n\n11.\
    \  Move the mouse to the left of the Simulator and drag to the right to pull the\
    \ master view out as shown in Figure [20-17](#329781_5_En_20_Chapter.xhtml#Fig17).\n\
    \n![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig17_HTML.jpg](images/329781_5_En_20_Chapter/329781_5_En_20_Fig17_HTML.jpg)\n\
    \nFigure 20-17\n\nRunning the app on a simulated iPhone in landscape orientation\n\
    \n12.  Move the mouse pointer to the right of the master view and drag the mouse\
    \ to the left to collapse the master view.\n\n13.  Choose Hardware ➤ Rotate Right.\n\
    \n14.  Choose Simulator ➤ Quit Simulator to return to Xcode."
  trans: "\n### 修改 `DetailViewController.swift` 文件\n\n`DetailViewController.swift`\
    \ 文件用于显示用户的选择。当前，详情视图控制器显示了一个标签，但这个标签需要连接到 `IBOutlet`，以便 Swift 代码能够在该标签中显示数据。\n\
    \n此外，`DetailViewController.swift` 文件还需要定义一个 `detailItem` 属性。该 `detailItem` 属性用于存储从\
    \ `MasterTableViewController.swift` 文件发送过来的数据，该文件定义了用户所选表格视图行中的项目。当详情视图控制器首次加载以及用户每次在表格视图中选择不同项目时，这些数据都需要显示在标签中。\n\
    \n要修改 `DetailViewController.swift` 文件，请按照以下步骤操作：\n\n1.  确保 `SplitViewCustomApp`\
    \ 项目已在 Xcode 中加载。\n2.  在导航器窗格中点击 `Main.storyboard` 文件。\n3.  在文档大纲中点击详情视图控制器场景。\n\
    4.  选择 视图 ➤ 辅助编辑器 ➤ 显示辅助编辑器，或者点击 Xcode 窗口右上角的辅助编辑器图标。这将并排显示 `Main.storyboard`\
    \ 和 `DetailViewController.swift` 文件。\n5.  将鼠标移到文档大纲中详情视图控制器场景下的标签上，按住 Control\
    \ 键，然后 Ctrl-拖拽到 `DetailViewController.swift` 文件中的“class `DetailViewController`”行。\n\
    6.  松开 Control 键和鼠标左键。会弹出一个窗口。\n7.  点击名称文本字段，输入 `petLabel`，然后点击连接按钮。Xcode 会创建一个\
    \ `IBOutlet`，如下所示：\n\n    ```\n    @IBOutlet var petLabel: UILabel!\n    ```\n\
    \n8.  选择 视图 ➤ 标准编辑器 ➤ 显示标准编辑器，或者点击 Xcode 窗口右上角的标准编辑器图标。\n9.  在导航器窗格中点击 `DetailViewController.swift`\
    \ 文件。\n10. 在 `IBOutlet` 下方添加以下属性：\n\n    ```\n    var detailItem: String? {\n\
    \        didSet {\n            configureView()\n        }\n    }\n    ```\n\n\
    11. 在 `IBOutlet` 下方添加以下函数：\n\n    ```\n    func configureView() {\n        if\
    \ let label = petLabel {\n            label.text = detailItem\n        }\n   \
    \ }\n    ```\n\n12. 修改 `viewDidLoad` 方法如下：\n\n    ```\n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        configureView()\n    }\n    ```\n\n\
    当视图首次加载时，它会调用 `configureView()` 函数，该函数将 `detailItem` 数据存储到标签中。每次用户在主视图显示的表格视图中选择不同项目时，所选项目都会被存储到\
    \ `detailItem` 属性中。\n\n完整的 `DetailViewController.swift` 文件应如下所示：\n\n```\nimport\
    \ UIKit\nclass DetailViewController: UIViewController {\n    @IBOutlet var petLabel:\
    \ UILabel!\n    var detailItem: String? {\n        didSet {\n            configureView()\n\
    \        }\n    }\n    func configureView() {\n        if let label = petLabel\
    \ {\n            label.text = detailItem\n        }\n    }\n    override func\
    \ viewDidLoad() {\n        super.viewDidLoad()\n        configureView()\n    \
    \    // 视图加载后执行任何其他设置\n    }\n}\n```\n\n### 修改 `MasterTableViewController.swift`\
    \ 文件\n\n`MasterTableViewController.swift` 文件显示一个表格视图，供用户选择项目。这意味着 `MasterTableViewController.swift`\
    \ 文件需要定义表格视图中显示的分区数（1）以及表格视图中显示的行数（数据的数组总长度），并使用数组中的数据填充表格视图。该数组仅显示一个字符串列表，每个字符串显示在表格视图的一行中。\n\
    \n除了用数据填充表格视图，`MasterTableViewController.swift` 文件还需要创建一个代表详情视图控制器的变量，并通过故事板中定义的转场（segue）将用户在表格视图中选择的项目传递给该详情视图控制器。\n\
    \n要修改 `MasterTableViewController.swift` 文件，请按照以下步骤操作：\n\n1.  确保 `SplitViewCustomApp`\
    \ 项目已在 Xcode 中加载。\n2.  在导航器窗格中点击 `MasterTableViewController.swift` 文件。\n3.  在“class\
    \ `MasterTableViewController`”行下方添加以下代码：\n\n    ```\n    var detailVC: DetailViewController?\
    \ = nil\n    let petArray = [\"cat\", \"dog\", \"parakeet\", \"parrot\", \"canary\"\
    , \"finch\", \"tropical fish\", \"goldfish\", \"sea horses\", \"hamster\", \"\
    gerbil\", \"rabbit\", \"turtle\", \"snake\", \"lizard\", \"hermit crab\"]\n  \
    \  ```\n\n4.  修改 `viewDidLoad()` 方法如下：\n\n    ```\n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        if let split = splitViewController {\n\
    \            detailVC = (split.viewControllers.last as! UINavigationController).topViewController\
    \ as? DetailViewController\n        }\n    }\n    ```\n\n5.  在 `viewDidLoad()`\
    \ 方法下方添加以下方法：\n\n    ```\n    override func viewWillAppear(_ animated: Bool) {\n\
    \        clearsSelectionOnViewWillAppear = splitViewController!.isCollapsed\n\
    \        super.viewWillAppear(animated)\n    }\n    ```\n\n6.  在 `viewWillAppear(_:)`\
    \ 方法下方添加以下代码，以定义表格视图并使用数组中的数据填充它：\n\n    ```\n    override func numberOfSections(in\
    \ tableView: UITableView) -> Int {\n        return 1\n    }\n    override func\
    \ tableView(_ tableView: UITableView, numberOfRowsInSection section: Int) -> Int\
    \ {\n        return petArray.count\n    }\n    override func tableView(_ tableView:\
    \ UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell {\n     \
    \   // 确保在属性检查器面板中定义了表格视图的单元格标识符\n        let cell = tableView.dequeueReusableCell(withIdentifier:\
    \ \"customCell\", for: indexPath)\n        cell.textLabel!.text = petArray[indexPath.row]\n\
    \        return cell\n    }\n    ```\n\n7.  添加以下 `prepare(for:sender:)` 函数，从表格视图中检索数据并发送到\
    \ `DetailViewController.swift` 文件：\n\n    ```\n    override func prepare(for segue:\
    \ UIStoryboardSegue, sender: Any?) {\n        if segue.identifier == \"showDetail\"\
    \ {\n            if let indexPath = tableView.indexPathForSelectedRow {\n    \
    \            let object = petArray[indexPath.row]\n                let controller\
    \ = (segue.destination as! UINavigationController).topViewController as! DetailViewController\n\
    \                controller.detailItem = object\n                controller.navigationItem.leftBarButtonItem\
    \ = splitViewController?.displayModeButtonItem\n                controller.navigationItem.leftItemsSupplementBackButton\
    \ = true\n            }\n        }\n    }\n    ```\n\n8.  点击运行按钮，或选择 产品 ➤ 运行。模拟器窗口会出现，显示一个填充了\
    \ `petArray` 中项目的表格视图。\n9.  点击任意项目。请注意，详情视图会在其标签中显示所选项目。\n10. 选择 硬件 ➤ 向左旋转。\n\
    11. 将鼠标移到模拟器左侧并向右侧拖拽，以拉出主视图，如图 20-17 所示。\n\n![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig17_HTML.jpg](img/329781_5_En_20_Fig17_HTML.jpg)\n\
    \n图 20-17\n\n在模拟的 iPhone 上以横屏方向运行应用\n\n12. 将鼠标指针移到主视图右侧，并向左侧拖拽鼠标以收起主视图。\n13. 选择\
    \ 硬件 ➤ 向右旋转。\n14. 选择 模拟器 ➤ 退出模拟器，返回 Xcode。\n"
- fmt: '# Summary


    A Split View Controller is designed for larger screens such as the iPad or the
    larger screen models of the iPhone. A Split View Controller can display two views
    side by side where one side (known as the master view) typically displays a table
    of items. Selecting an item from this table then transfers this data to the second
    side (known as the detail view).


    When displayed on large screens, Split View Controllers can display both a master
    view and a detail view side by side. When displayed on smaller screens, Split
    View Controllers act like ordinary Navigation Controllers in sliding views back
    and forth.


    When using a Split View Controller, make sure you name the segue between the Table
    View Cell and the Navigation Controller by defining the segue''s `Identifier`
    property in the Attributes Inspector pane. Also make sure you name the Table View
    Cell by modifying its `Identifier` property as well.


    The master View Controller and the detail View Controller both need a separate
    `.swift` class file to connect to. In addition to writing code in these two `.swift`
    files, you''ll also need to write code in the `AppDelegate.swift` file.


    Split View Controllers help display data correctly in both large and small screens.
    Think of a Split View Controller as a fancier version of a Navigation Controller
    that''s especially suited for large screens such as the iPad.


