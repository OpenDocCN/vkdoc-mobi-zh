- fmt: "# Displaying the Virtual Keyboard with a Text View\n\nFor users to type in\
    \ the text view, you need to display (and hide) the virtual keyboard. When the\
    \ user taps in the text view to edit its contents, the virtual keyboard should\
    \ appear, moving the text view up if necessary. When the user is done editing\
    \ text in a text view, then the virtual keyboard needs to go away.\n\nFirst, you\
    \ need to define the View Controller to be notified of two events: `keyboardWillShowNotification`\
    \ and `keyboardWillHideNotification`. Second, you need to create a `keyboardWillShow`\
    \ and `keyboardWillHide` function to show the virtual keyboard (and move the view\
    \ up) and hide the virtual keyboard when it’s no longer needed. Finally, you need\
    \ to dismiss the virtual keyboard if the user taps away from the text view.\n\n\
    To add code to show and hide the virtual keyboard, follow these steps:\n\n1. Click\
    \ the `Main.storyboard` file in the Navigator pane of the `TextViewApp` project.\n\
    2. Click the Library icon to display the Object Library.\n3. Drag and drop a text\
    \ view near the bottom of the user interface.\n4. Choose **Editor** ➤ **Resolve\
    \ Auto Layout Issues** ➤ **Reset to Suggested Constraints** on the top half of\
    \ the submenu. This will add constraints to the new text view on the user interface.\n\
    5. Add the following to the `viewDidLoad` method:\n\n```swift\nNotificationCenter.default.addObserver(self,\
    \ selector: #selector(keyboardWillShow), name: UIResponder.keyboardWillShowNotification,\
    \ object: nil)\nNotificationCenter.default.addObserver(self, selector: #selector(keyboardWillHide),\
    \ name: UIResponder.keyboardWillHideNotification, object: nil)\nlet tap: UITapGestureRecognizer\
    \ = UITapGestureRecognizer(target: self, action: #selector(self.dismissKeyboard))\n\
    view.addGestureRecognizer(tap)\n```\n\n6. Add the following code above the `buttonTapped`\
    \ IBAction method as follows:\n\n```swift\n@objc func dismissKeyboard() {\n  \
    \  view.endEditing(true)\n}\n@objc func keyboardWillShow(notification: NSNotification)\
    \ {\n    if let keyboardSize = (notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]\
    \ as? NSValue)?.cgRectValue {\n        if self.view.frame.origin.y == 0 {\n  \
    \          self.view.frame.origin.y -= keyboardSize.height\n        }\n    }\n\
    }\n@objc func keyboardWillHide(notification: NSNotification) {\n    if ((notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]\
    \ as? NSValue)?.cgRectValue) != nil {\n        if self.view.frame.origin.y !=\
    \ 0 {\n            self.view.frame.origin.y = 0\n        }\n    }\n}\n```\n\n\
    The entire `ViewController.swift` file should look like this:\n\n```swift\nimport\
    \ UIKit\nclass ViewController: UIViewController {\n    @IBOutlet var textView:\
    \ UITextView!\n    @IBOutlet var buttonObject: UIButton!\n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        textView.dataDetectorTypes = UIDataDetectorTypes.link\n\
    \        textView.isEditable = false\n        textView.isSelectable = true\n \
    \       textView.text = \"This is an example of clickable text www.yahoo.com\"\
    \n        NotificationCenter.default.addObserver(self, selector: #selector(keyboardWillShow),\
    \ name: UIResponder.keyboardWillShowNotification, object: nil)\n        NotificationCenter.default.addObserver(self,\
    \ selector: #selector(keyboardWillHide), name: UIResponder.keyboardWillHideNotification,\
    \ object: nil)\n        let tap: UITapGestureRecognizer = UITapGestureRecognizer(target:\
    \ self, action: #selector(self.dismissKeyboard))\n        view.addGestureRecognizer(tap)\n\
    \        // Do any additional setup after loading the view, typically from a nib.\n\
    \    }\n    @objc func dismissKeyboard() {\n        view.endEditing(true)\n  \
    \  }\n    @objc func keyboardWillShow(notification: NSNotification) {\n      \
    \  if let keyboardSize = (notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]\
    \ as? NSValue)?.cgRectValue {\n            if self.view.frame.origin.y == 0 {\n\
    \                self.view.frame.origin.y -= keyboardSize.height\n           \
    \ }\n        }\n    }\n    @objc func keyboardWillHide(notification: NSNotification)\
    \ {\n        if ((notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]\
    \ as? NSValue)?.cgRectValue) != nil {\n            if self.view.frame.origin.y\
    \ != 0 {\n                self.view.frame.origin.y = 0\n            }\n      \
    \  }\n    }\n    @IBAction func buttonTapped(_ sender: UIButton) {\n        if\
    \ textView.isEditable == true {\n            textView.isEditable = false\n   \
    \         textView.backgroundColor = UIColor.yellow\n            textView.textColor\
    \ = UIColor.blue\n            textView.font = UIFont(name: \"Courier\", size:\
    \ 24)\n        } else {\n            textView.isEditable = true\n            textView.backgroundColor\
    \ = UIColor.blue\n            textView.textColor = UIColor.white\n           \
    \ textView.font = UIFont(name: \"Ariel\", size: 10)\n        }\n    }\n}\n```\n\
    \n7. Click the **Run** button or choose **Product** ➤ **Run**. The Simulator screen\
    \ appears.\n8. Click in the bottom text view. (If the virtual keyboard does not\
    \ appear, press **Command + K** or choose **Hardware** ➤ **Keyboard** ➤ **Toggle\
    \ Virtual Keyboard**.)\n9. Add and delete text inside the text view using the\
    \ virtual keyboard.\n10. Click anywhere but inside a text view. The virtual keyboard\
    \ disappears.\n11. Choose **Simulator** ➤ **Quit Simulator** to return to Xcode.\n\
    \n## Summary\n\nImage views and text views let your app display data on the user\
    \ interface. An image view displays information visually as images. These images\
    \ can be static and serve purely decorative purposes or display useful information\
    \ such as a chart. Image views can also be interactive that can respond to taps.\n\
    \nText views can both display text and allow the user to edit and input text.\
    \ A text view behaves much like a text field except it can display large amounts\
    \ of text at once, much like a miniature word processor. You can modify the appearance\
    \ of text but any changes affect all text in a text view.\n\nIf you make a text\
    \ view non-editable, then you can also create clickable text where the text view\
    \ can recognize common types of words and phrases such as telephone numbers, street\
    \ addresses, URLs, and calendar events such as dates and times.\n\nText views\
    \ can simply display information to the user or they can allow input. Image views\
    \ can display visual data or allow interaction so your app can respond if the\
    \ user taps on the image view. By using both text views and image views, you have\
    \ another way to display data, allow input, and accept interaction from the user.\n\
    \n# Buttons, Switches, and Segmented Controls\n\nBesides displaying data or letting\
    \ users input data, the second most important purpose of a user interface is to\
    \ allow users to control an app. At the simplest level, users can use buttons\
    \ where each button represents a single command. Of course if you want to display\
    \ multiple options, displaying multiple buttons on the screen can get crowded.\n\
    \nFor two alternatives for giving commands, Xcode offers switches and segmented\
    \ controls. A switch lets users choose to turn a setting on or off. A segmented\
    \ control acts like multiple buttons, in a condensed area, that the user can tap\
    \ to select different options. Figure 10-1 shows the visual appearance of a button,\
    \ switch, and segmented control.\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig1_HTML.jpg](images/329781_5_En_10_Chapter/329781_5_En_10_Fig1_HTML.jpg)\n\
    \n**Figure 10-1** Comparing the visual appearance of a button, switch, and segmented\
    \ control"
  raw: "### Displaying the Virtual Keyboard with a Text View\n\nFor users to type\
    \ in the text view, you need to display (and hide) the virtual keyboard. When\
    \ the user taps in the text view to edit its contents, the virtual keyboard should\
