- fmt: '# Changing Fixed Values for Constraints


    To see how to change a fixed value for a constraint to a Standard or Canvas Value,
    or define a minimum or maximum distance, follow these steps:


    1.  Make sure the `ObjectApp` project is loaded in Xcode.

    2.  Click the `Main.storyboard` file in the Navigator pane.

    3.  If the Document Outline isn’t visible, choose **Editor** ➤ **Show Document
    Outline** or click the Document Outline icon at the bottom of the Xcode window.

    4.  Click the hierarchy of gray disclosure triangles (`View Controller Scene`
    ➤ `View Controller` ➤ `View` ➤ `Constraints`) to see a list of all constraints
    currently defined.

    5.  Click the `Hello.top = OK.bottom + 64` constraint. The Inspector pane shows
    the constraint’s values in Figure 6-27.

    6.  Click in the Constant popup menu. A menu appears, letting you choose Standard
    Value or Canvas Value (see Figure 6-26).

    7.  Click the Relationship popup menu to display different options such as Less
    Than or Equal, Equal, or Greater Than or Equal as shown in Figure 6-28. Less Than
    or Equal means the distance can shrink down to a minimum value defined by the
    Constant value. Equal means the distance must always be exactly equal to the Constant
    value. Greater Than or Equal means the distance can equal the Constant value or
    increase to a greater value.


    ## Using Stack Views


    Many app user interfaces use multiple objects. The problem comes from defining
    constraints for all those numerous objects. Move one object to a new position
    or resize it and you’ll need to modify all constraints of nearby objects as well.
    Since this can be cumbersome and tedious, Xcode offers a solution called stack
    views.


    The idea behind stack views is to group multiple objects together and treat them
    as a single object. The stack view defines the position of objects between themselves,
    and constraints define how the stack appears in relation to the screen edges.
    Stack views let you move multiple objects without worrying about modifying the
    individual constraints between them.


    To see how stack views work, follow these steps:


    1.  Make sure the `ObjectApp` project is loaded in Xcode.

    2.  Click the `Main.storyboard` file in the Navigator pane.

    3.  Hold down the SHIFT key and click the button and text field to select them
    both.

    4.  Choose **Editor** ➤ **Embed In** ➤ **Stack View**, or click the Stack View
    icon at the bottom of the Xcode window, and when a menu appears, choose Stack
    View as shown in Figure 6-29. Xcode displays handles around both the button and
    text field.

    5.  Click the Align icon at the bottom of the Xcode window and select the **Horizontally
    in Container** check box. Then click the **Add 1 Constraint** button as shown
    in Figure 6-30.

    6.  Click the Add new constraints icon at the bottom of the Xcode window. When
    a popup menu appears, click the line defining the distance from the top of the
    stack to the top of the screen as shown in Figure 6-31.

    7.  Click the **Add 1 Constraint** button. Xcode adds a constraint. Your user
    interface should now have just two constraints, one defining the distance of the
    stack to the top of the screen and one centering the stack horizontally in the
    screen as shown in Figure 6-32.

    8.  Click the **View as:** button at the bottom of the Xcode window and choose
    a different iOS device for the storyboard to mimic such as an iPhone XR or an
    iPhone SE. No matter which iOS device you choose, the stack and constraints keep
    the button and text field displayed on every screen correctly.

    9.  Make sure the stack (button and text field) is selected. Then choose **Editor**
    ➤ **Unembed** or click the Stack View icon at the bottom of the Xcode window,
    and when a menu appears, choose Unembed as shown in Figure 6-33. Xcode now separates
    the button and text field so you can manipulate and select them individually once
    more.


    ## Summary


    When you place objects on a user interface, you need to define each object’s size
    (width and height) and position (X and Y values measured from the upper left corner
    of the screen). Every user interface object needs to define its size and position.
    Each user interface object may offer additional attributes to customize such as
    text to appear or a background color. By changing different attributes of an object,
    you can customize its appearance on the user interface.


    Because apps may run on iOS devices that have different screen sizes, you must
    use constraints to define distances between objects and each other or the screen
    borders.


    Every iOS device offers a Safe Area to place objects. As long as objects appear
    in this Safe Area, they will never risk getting cut off on different iOS screens.
    You’ll need to use constraints to define the distance you want to place objects
    near the borders of this Safe Area or between neighboring objects.


    Constraints can define the distance between objects or the size (width and height)
    of an object. Constraints can use fixed values, but it’s usually better to place
    objects near each other and then use a Standard or Canvas Value instead, which
    helps adjust the position of user interface objects better on different size iOS
    screens.


    When using fixed values, you can define a distance that’s exactly equal to the
    fixed value. For more flexibility, you might want to choose to use the fixed value
    to define a minimum or maximum value instead. This allows the distance between
    objects or screen borders to vary, bound only by a minimum or maximum value.


    If you have multiple objects, you can group them in a stack view. A stack view
    locks objects in their current relative position and lets you move and add constraints
    to the entire stack view rather than to each object individually.'
