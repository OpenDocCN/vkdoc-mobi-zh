- fmt: "# Making the Image View Interactive\n\nBy default, an image view ignores all\
    \ touch interaction. To make an image view respond to touches, you can turn on\
    \ user interaction in one of two ways as shown in Figure [9-5](#329781_5_En_9_Chapter.xhtml#Fig5):\n\
    \n![../images/329781_5_En_9_Chapter/329781_5_En_9_Fig5_HTML.jpg](images/329781_5_En_9_Chapter/329781_5_En_9_Fig5_HTML.jpg)\n\
    \nFigure 9-5  \nAllowing an image view to respond to touch gestures\n\n* Select\
    \ the User Interaction Enabled check box.\n* Set the `.isUserInteractionEnabled`\
    \ property to `true` using Swift code.\n\nTo see how to make an image view respond\
    \ to touch gestures, follow these steps:\n\n1. Click the `Main.storyboard` file\
    \ in the Navigator pane of the `ImageViewApp` project.\n2. Choose View ➤ Assistant\
    \ Editor ➤ Show Assistant Editor, or click the Assistant Editor icon. Xcode displays\
    \ the `Main.storyboard` and `ViewController.swift` file side by side.\n3. Move\
    \ the mouse pointer over the image view, hold down the Control key, and Ctrl-drag\
    \ from the image view to the `ViewController.swift` file underneath the “class\
    \ ViewController” line.\n4. Release the Control key and the left mouse button.\
    \ A popup window appears.\n5. Click in the Name text field, type **imageView**,\
    \ and click the Connect button. Xcode creates an `IBOutlet` variable as follows:\n\
    \n    ```\n    @IBOutlet var imageView: UIImageView!\n    ```\n\n1. Choose View\
    \ ➤ Standard Editor ➤ Show Standard Editor, or click the Standard Editor icon.\n\
    2. Click the `ViewController.swift` file in the Navigator pane.\n3. Add the following\
    \ line to the `viewDidLoad` method:\n\n    ```\n    imageView.isUserInteractionEnabled\
    \ = true\n    ```\n\n1. Type the following underneath the `viewDidLoad` method:\n\
    \n    ```\n    override func touchesBegan(_ touches: Set<UITouch>, with event:\
    \ UIEvent?) {\n    let touch = touches.first\n    if touch?.view == imageView\
    \ {\n    print (\"Touched\")\n    } else {\n    print (\"Nothing \")\n    }\n\
    \    }\n    ```\n\nThe preceding `touchesBegan` method runs any time the user\
    \ taps the screen. (In the Simulator, clicking the mouse mimics a finger tap.)\
    \ The `if-else` statement checks to see if the user tapped the image view. If\
    \ so, then it prints “Touched”. If the user tapped away from the image view, then\
    \ it prints “Nothing”.\n\nThe entire `ViewController.swift` file should look like\
    \ this:\n\n```\nimport UIKit\nclass ViewController: UIViewController {\n@IBOutlet\
    \ var imageView: UIImageView!\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n\
    imageView.isUserInteractionEnabled = true\n// Do any additional setup after loading\
    \ the view, typically from a nib.\n}\noverride func touchesBegan(_ touches: Set<UITouch>,\
    \ with event: UIEvent?) {\nlet touch = touches.first\nif touch?.view == imageView\
    \ {\nprint (\"Touched\")\n} else {\nprint (\"Nothing \")\n}\n}\n}\n```\n\n1. Click\
    \ the Run button or choose Product ➤ Run. The Simulator screen appears.\n2. Click\
    \ the graphic image you stored in the image view. Notice that the Debug Area at\
    \ the bottom of the Xcode window displays “Touched” each time you click the image\
    \ view.\n3. Click anywhere else on the Simulator screen away from the image view.\
    \ Notice that the Debug Area at the bottom of the Xcode window displays “Nothing”\
    \ each time you click away from the image view.\n4. Choose Simulator ➤ Quit Simulator\
    \ to return to Xcode.\n\n# Using a Text View\n\nA text view acts just like a text\
    \ field. The big difference is that a text view can be much larger and acts more\
    \ like a miniature word processor that allows the user to move the cursor around\
    \ and view or edit large amounts of text. Since a text view can both display text\
    \ and allow the user to input text, the first property to modify is whether you\
    \ want a text view to be editable or not.\n\nAn editable text view means the user\
    \ can modify the text displayed inside. A non-editable text view means the user\
    \ cannot modify the text so the text view acts like a large label. There are two\
    \ ways to modify a text view’s editable property:\n\n* Select the Editable check\
    \ box in the Attributes Inspector (selected by default) as shown in Figure [9-6](#329781_5_En_9_Chapter.xhtml#Fig6).\n\
    * Set the text view’s `.editable` property to `true` using Swift code.\n\n![../images/329781_5_En_9_Chapter/329781_5_En_9_Fig6_HTML.jpg](images/329781_5_En_9_Chapter/329781_5_En_9_Fig6_HTML.jpg)\n\
    \nFigure 9-6  \nMaking a text view editable\n\nTo see how to use a text view,\
    \ follow these steps:\n\n1. Create a new iOS project using the Single View App\
    \ template (see Chapter [1](#329781_5_En_1_Chapter.xhtml)) and name this new project\
    \ `TextViewApp`. This creates a single view for the user interface.\n2. Click\
    \ the `Main.storyboard` file in the Navigator pane. Xcode displays the single\
    \ view.\n3. Click the Library icon to open the Object Library window.\n4. Drag\
    \ and drop a text view and a button near the top of the view.\n5. Choose Editor\
    \ ➤ Resolve Auto Layout Issues ➤ Reset to Suggested Constraints at the bottom\
    \ half of the submenu. This adds constraints to both the text view and the button.\n\
    6. Choose View ➤ Assistant Editor ➤ Show Assistant Editor, or click the Assistant\
    \ Editor icon. Xcode displays the `Main.storyboard` and `ViewController.swift`\
    \ file side by side.\n7. Move the mouse pointer over the text view, hold down\
    \ the Control key, and Ctrl-drag from the text view to the `ViewController.swift`\
    \ file underneath the “class ViewController” line.\n8. Release the Control key\
    \ and the left mouse button. A popup window appears.\n9. Click in the Name text\
    \ field, type **textView**, and click the Connect button. Xcode creates an `IBOutlet`\
    \ variable as follows:\n\n    ```\n    @IBOutlet var textView: UITextView!\n \
    \   ```\n\n1. Move the mouse pointer over the button, hold down the Control key,\
    \ and Ctrl-drag from the button to the `ViewController.swift` file underneath\
    \ the `IBOutlet` line.\n2. Release the Control key and the left mouse button.\
    \ A popup window appears.\n3. Click in the Name text field, type **buttonObject**,\
    \ and click the Connect button. Xcode creates an `IBOutlet` variable as follows:\n\
    \n    ```\n    @IBOutlet var buttonObject: UIButton!\n    ```\n\n1. Move the mouse\
    \ pointer over the button, hold down the Control key, and Ctrl-drag just above\
    \ the last curly bracket at the bottom of the `ViewController.swift` file.\n2.\
    \ Release the Control key and the left mouse button. A popup window appears.\n\
    3. Click in the Name text field, type **buttonTapped**, click in the Type popup\
    \ menu and choose `UIButton`, and click the Connect button. Xcode creates an `IBAction`\
    \ method as follows:\n\n    ```\n    @IBAction func buttonTapped(_ sender: UIButton)\
    \ {\n    }\n    ```\n\n4. Edit the `buttonTapped` `IBAction` method as follows:\n\
    \n    ```\n    @IBAction func buttonTapped(_ sender: UIButton) {\n    if textView.isEditable\
    \ == true {\n    textView.isEditable = false\n    } else {\n    textView.isEditable\
    \ = true\n    }\n    }\n    ```"
