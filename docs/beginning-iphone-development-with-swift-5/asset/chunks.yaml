    ## 关于作者和技术审稿人


    ### 关于作者


    ### 关于技术审稿人


    # 1. 理解 iOS 编程


    所有编程都涉及编写计算机要执行的指令这一相同任务。要学习 iOS 编程，你需要掌握三种不同的技能：


    - 如何用 Swift 编程语言编写指令

    - 如何使用 Apple 的软件框架

    - 如何在 Xcode 中创建用户界面


    虽然完全使用 Swift 代码来创建整个 iOS 应用是可行的，但这是一种繁琐、耗时且容易出错的方法。尝试用 Swift 编写整个 iOS 应用意味着你需要编写代码来创建用户界面，编写更多代码来与
    iOS 设备（如 iPhone 或 iPad）的硬件进行交互，然后再编写第三套代码来让应用实际工作。


    与其完全通过代码创建用户界面，不如在 Xcode 中以可视化的方式设计用户界面。这不仅能让创建用户界面更简单、更快速，并且与其他 iOS 应用的用户界面更一致，还能使你的代码不依赖于任何特定的用户界面设计。通过使用
    Xcode，你可以保持用户界面与使应用工作的代码相分离。这让你可以灵活地修改用户界面，而无需同时修改代码。


    每个 iOS 应用都需要与 iOS 设备的不同硬件特性（如摄像头或触摸屏）进行通信。Apple 并非强迫你编写代码与硬件交互，而是提供了多个软件库或框架，为你封装了这些代码。现在，无需编写自己的代码来访问摄像头或触摸屏，您可以直接使用
    Apple 经过验证的框架，从一开始就让应用正确工作。


    本质上，每个 iOS 应用都由三个部分组成，如图 1-1 所示：


    ![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig1_HTML.jpg](img/329781_5_En_1_Fig1_HTML.jpg)


    **图 1-1** iOS 应用的三个组成部分


    - 你的代码，用于使应用执行有用功能

    - 可以在 Xcode 中可视化设计的用户界面

    - 通过一个或多个 Apple iOS 框架访问 iOS 设备硬件特性


    Apple 为 iOS（以及其他操作系统，如 macOS、watchOS 和 tvOS）提供了数十个框架。只需使用 Apple 的框架，你就能通过编写很少的代码来完成常见任务。Apple
    提供的一些框架包括：


    - `UIKit` – iOS 用户界面和触摸屏支持

    - `ARKit` – 增强现实特性

    - `Core Animation` – 显示动画

    - `GameKit` – 创建多人互动应用

    - `Contacts` – 访问 iOS 设备上的通讯录数据

    - `SiriKit` – 允许通过 Siri 使用语音命令

    - `AVKit` – 允许播放音频和视频文件

    - `MediaLibrary` – 允许访问存储在 iOS 设备上的图像、音频和视频

    - `CallKit` – 提供语音通话功能


    Apple 的框架本质上包含可重用的代码。这使得应用更可靠、更一致，同时通过使用经过验证且能正常工作的代码，节省了开发者的时间。要查看 Apple 可用软件框架的完整列表，请访问
    Apple 的开发者文档网站（[`https://developer.apple.com/documentation`](https://developer.apple.com/documentation)）。


    Apple 的框架可以让你在创建 iOS 应用时占据巨大先机，但你仍然需要提供一个用户界面，以便用户与你的应用交互。虽然你可以从头开始创建用户界面，但这同样繁琐、耗时且容易出错。更糟糕的是，如果每个应用开发者都从头创建用户界面，那么不同的
    iOS 应用在外观和操作上就无法统一，从而让用户感到困惑。

