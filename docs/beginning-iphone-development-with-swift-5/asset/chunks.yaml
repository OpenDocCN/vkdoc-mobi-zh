- fmt: "16. 选择 View ➤ Inspectors ➤ Show Connections Inspector，或点击 Xcode 窗口右上角的 Collections\
    \ Inspector 图标。 Connections Inspector 窗格显示该标签已连接到 Tap Gesture Recognizer，如图 [11-8](#329781_5_En_11_Chapter.xhtml#Fig8)\
    \ 所示，这意味着只有该标签可以响应轻点手势。\n\n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig8_HTML.jpg](images/329781_5_En_11_Chapter/329781_5_En_11_Fig8_HTML.jpg)\n\
    \nFigure 11-8 Connections Inspector 确认标签已连接到 Tap Gesture Recognizer\n\n17. 选择\
    \ View ➤ Assistant Editor ➤ Show Assistant Editor，或点击 Xcode 窗口右上角的 Assistant Editor\
    \ 图标。\n\n18. 将鼠标指针移至 Document Outline 或 View Controller 顶部的 Tap Gesture Recognizer\
    \ 图标上，按住 Control 键，然后从该图标向 `ViewController.swift` 文件底部最后一个花括号上方拖拽。\n\n19. 松开 Control\
    \ 键和鼠标左键。此时会出现一个弹出窗口。\n\n20. 在 Name 文本字段中点击，输入 `tapDetected`，点击 Type 弹出菜单并选择 `UITapGestureRecognizer`，然后点击\
    \ Connect 按钮。Xcode 会创建一个 `IBAction` 方法。\n\n21. 修改此 `tapDetected` 的 `IBAction`\
    \ 方法，如下所示：\n\n```\n@IBAction func tapDetected(_ sender: UITapGestureRecognizer)\
    \ {\n    print (\"Tap detected\")\n}\n```\n\n完整的 `ViewController.swift` 文件应如下所示：\n\
    \n```\nimport UIKit\nclass ViewController: UIViewController {\n    override func\
    \ viewDidLoad() {\n        super.viewDidLoad()\n        // Do any additional setup\
    \ after loading the view, typically from a nib.\n    }\n    @IBAction func tapDetected(_\
    \ sender: UITapGestureRecognizer) {\n        print (\"Tap detected\")\n    }\n\
    }\n```\n\n22. 点击 Run 按钮或选择 Product ➤ Run。模拟器屏幕将会出现。\n\n23. 点击 Visual Solution\
    \ 标签。请注意，在 Xcode 窗口底部的 Debug Area 中会出现消息 “Tap detected”。\n\n24. 点击 Visual Solution\
    \ 标签以外的任意位置。请注意，每次点击 Visual Solution 标签以外的位置或点击 Programmatic Solution 标签时，Xcode\
    \ 窗口的 Debug Area 中不会显示其他内容。\n\n25. 选择 Simulator ➤ Quit Simulator 以返回 Xcode。\n\n\
    上述步骤允许标签检测轻点手势，但我们唯一需要创建的代码是 `tapDetected` 的 `IBAction` 方法。我们也可以完全通过 Swift 代码定义手势识别器，接下来将对\
    \ Programmatic Solution 标签执行此操作。\n\n1. 确保 `TapApp` 项目已在 Xcode 中加载。\n\n2. 在 Navigator\
    \ 窗格中点击 `Main.storyboard` 文件。Xcode 将显示单个视图。\n\n3. 选择 View ➤ Assistant Editor ➤\
    \ Show Assistant Editor，或点击 Xcode 窗口右上角的 Assistant Editor 图标。Xcode 将并排显示 `Main.storyboard`\
    \ 和 `ViewController.swift` 文件。\n\n4. 将鼠标指针移至 Programmatic Solution 标签上，按住 Control\
    \ 键，然后从该标签向 `ViewController.swift` 文件中的 `class ViewController` 行下方拖拽。\n\n5. 松开\
    \ Control 键和鼠标左键。此时会出现一个弹出窗口。\n\n6. 在 Name 文本字段中点击，输入 `labelCode`，然后点击 Connect\
    \ 按钮。Xcode 会创建一个 `IBOutlet`，如下所示：\n\n```\n@IBOutlet var labelCode: UILabel!\n\
    ```\n\n7. 编辑 `viewDidLoad` 方法，如下所示：\n\n```\noverride func viewDidLoad() {\n  \
    \  super.viewDidLoad()\n    labelCode.isUserInteractionEnabled = true\n    let\
    \ tapGesture = UITapGestureRecognizer(target: self, action: #selector(handleTap))\n\
    \    labelCode.addGestureRecognizer(tapGesture)\n    // Do any additional setup\
    \ after loading the view, typically from a nib.\n}\n```\n\n我们可以不选中 Attributes\
    \ Inspector 窗格中的 User Interaction Enabled 复选框，而是直接为第二个显示 “Programmatic Solution”\
    \ 的标签将 `.isUserInteractionEnabled` 属性设置为 `true`。\n\n我们可以不将 Tap Gesture Recognizer\
    \ 从 Object Library 拖放到视图上，而是使用 Swift 代码创建 `UITapGestureRecognizer`。这意味着我们还需要定义一个函数来响应轻点手势，该函数由\
    \ `#selector(handleTap)` 定义。最后，我们需要将此轻点手势添加到标签，而不是通过 Connections Inspector 窗格进行连接。\n\
    \n8. 在 `viewDidLoad` 方法下方添加以下内容：\n\n```\n@objc func handleTap() {\n    print (\"\
    Tap on second label detected\")\n}\n```\n\n完整的 `ViewController.swift` 文件应如下所示：\n\
    \n```\nimport UIKit\nclass ViewController: UIViewController {\n    @IBOutlet var\
    \ labelCode: UILabel!\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        labelCode.isUserInteractionEnabled = true\n        let tapGesture = UITapGestureRecognizer(target:\
    \ self, action: #selector(handleTap))\n        labelCode.addGestureRecognizer(tapGesture)\n\
    \        // Do any additional setup after loading the view, typically from a nib.\n\
    \    }\n    @objc func handleTap() {\n        print (\"Tap on second label detected\"\
    )\n    }\n    @IBAction func tapDetected(_ sender: UITapGestureRecognizer) {\n\
    \        print (\"Tap detected\")\n    }\n}\n```\n\n9. 点击 Run 按钮或选择 Product ➤\
    \ Run。模拟器屏幕将会出现。\n\n10. 点击 Programmatic Solution 标签。请注意，在 Xcode 窗口底部的 Debug Area\
    \ 中会出现消息 “Tap on second label detected”。\n\n11. 点击 Visual Solution 标签。请注意，在 Xcode\
    \ 窗口底部的 Debug Area 中会出现消息 “Tap detected”。\n\n12. 点击两个标签以外的任意位置。请注意，即使你在屏幕上轻点，轻点手势也不会被识别，因为两个轻点手势都连接到了标签上。\n\
    \n13. 选择 Simulator ➤ Quit Simulator 以返回 Xcode。\n\n使用手势识别器时，你可以通过 Object Library\
    \ 和 Inspector 窗格可视地定义它们，也可以通过 Swift 代码创建手势识别器。两种方法本质相同，因此取决于你偏好编写 Swift 代码还是使用\
    \ Object Library。\n\n使用 Swift 代码自定义轻点手势时，可以定义以下两个属性：\n\n*   `.numberOfTapsRequired`\
    \ – 定义识别轻点手势所需的点击次数，例如一次点击（默认值）\n*   `.numberOfTouchesRequired` – 定义识别轻点手势所需的指尖（触摸）数量"
