    performSegue(withIdentifier: "Link Identifier", sender: self)

    ```


    `Navigation Controller`会自动在其显示的任何`View Controller`上显示一个导航栏。这个导航栏会在左上角显示一个`Back`按钮。默认情况下，这个`Back`按钮显示“Back”，但如果之前的`View
    Controller`有标题，这个`Back`按钮将会显示那个标题。如果你愿意，也可以自定义`Back`按钮的文本。


    由于一个`Navigation Controller`可以显示多个`View Controller`，你可以将数据从一个`View Controller`传递到另一个。这样，从一个视图获取的信息就可以在另一个视图中使用和显示。


    为了使`Navigation Controller`看起来更具吸引力，你可以更改导航栏的颜色或添加`Bar Button Items`。你可以将这些栏按钮链接到`IBAction`方法，并在其上显示你想要的任何文本。作为快捷方式，Xcode
    也可以在栏按钮上显示图标和常见的按钮标题（例如`Done`或`Cancel`）。


    一个`Navigation Controller`可以顺序显示一系列`View Controller`。每当你需要将相关的`View Controller`组合在一起并逐个显示时，请使用`Navigation
    Controller`。


    # 18. 使用标签栏和工具栏


    与`Navigation Controller`类似，`Tab Bar Controller`也能将相关的`View Controller`组合在一起。主要区别在于，`Navigation
    Controller`只能按顺序显示`View Controller`。而另一方面，`Tab Bar Controller`可以直接跳转到另一个`View
    Controller`。


    尽管`Navigation Controller`在其打开的每个`View Controller`上始终会显示一个导航栏和一个`Back`按钮，但`Tab
    Bar Controller`始终会在屏幕底部显示一系列图标，每个图标代表一个不同的`View Controller`。通过点击图标，用户可以立即跳转到特定的`View
    Controller`。然后，用户可以再次返回到`Tab Bar Controller`查看代表其他`View Controller`的图标列表，如图 18-1
    所示。


    ### 注


    由于`Tab Bar Controller`在屏幕底部能显示的图标数量有限，这往往会限制`Tab Bar Controller`所能包含的`View Controller`的数量。通常，在
    iPhone 竖屏模式下，`Tab bar`上最多显示五个图标在视觉上比较美观。


    ![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig1_HTML.jpg](img/329781_5_En_18_Fig1_HTML.jpg)


    图 18-1


    一个`Tab bar Controller`显示代表多个视图的图标


    与`Tab bar`类似的是`Toolbar`（工具栏）。`Tab bar`严格用于导航到不同视图，而`Toolbar`则显示代表用户可能想要执行的操作的图标。许多
    iOS 自带的应用如`Mail`和`Photos`应用，会在屏幕底部显示`Toolbar`，这些工具栏可以删除选中的消息或照片，如图 18-2 所示。


    ![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig2_HTML.jpg](img/329781_5_En_18_Fig2_HTML.jpg)


    图 18-2


    许多应用在屏幕底部显示`Toolbar`


    `Tab bar`和`Toolbar`都受限于在任意时刻能舒适显示的图标数量。图标越多，`Tab bar`的外观就越拥挤，用户也就越难点击到正确的图标。通常，不要在`Tab
    bar`上显示太多图标，以免让用户难以找到或选择特定图标。


    `Tab Bar`和`Tool Bar`的主要区别在于：


    *   `Tab Bar`显示不同的`View Controller`。

    *   `Tool Bar`执行不同的命令。

