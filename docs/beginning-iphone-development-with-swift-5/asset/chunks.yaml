  trans: "\n# 修改提示文本与标题文本\n\n默认情况下，导航栏不显示提示文字或标题文字。标题文字通常显示屏幕上信息的名称或类别，例如“设置”应用中标识不同数据类别的标题文本，如图\
    \ 17-21 所示。\n\n![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig21_HTML.jpg](img/329781_5_En_17_Fig21_HTML.jpg)\n\
    \n图 17-21：标题通常显示上一视图中选中的选项\n\n提示文本使用较少，但可以向用户显示有用的信息。要了解如何修改导航栏的提示文本和标题文本，请按照以下步骤操作：\n\
    \n1.  使用“单视图应用”模板创建一个新的 iOS 项目（参见第 1 章），并将该项目命名为 `NavigationTextApp`。这将为用户界面创建一个单视图。\n\
    \n2.  在导航器窗格中点击 `Main.storyboard` 文件。Xcode 将显示该单视图。\n\n3.  在文档大纲中点击“视图控制器场景”。\n\
    \n4.  选择“编辑器”➤“嵌入”➤“导航控制器”。Xcode 会在故事板中显示一个导航控制器，并将该单视图设置为导航控制器的根视图（见图 17-4）。\n\
    \n5.  点击“库”图标以打开“对象库”窗口。\n\n6.  将一个视图控制器拖放到根视图的右侧。\n\n7.  选择“文件”➤“新建”➤“文件”。Xcode\
    \ 会显示一个模板列表。\n\n8.  在 iOS 类别下选择“Cocoa Touch 类”，然后点击**下一步**按钮。会弹出另一个对话框，要求输入类名和子类。\n\
    \n9.  在“类”文本字段中点击，然后输入 `SecondViewController`。\n\n10. 在“子类”弹出菜单中点击，然后选择 `UIViewController`。\n\
    \n11. 点击**下一步**按钮。Xcode 会询问文件的存储位置。\n\n12. 点击**创建**按钮。Xcode 会在导航器窗格中显示 `SecondViewController.swift`\
    \ 文件。\n\n13. 在导航器窗格中点击 `Main.storyboard` 文件，然后点击你刚刚添加到故事板的视图控制器顶部的“视图控制器”图标。\n\
    \n14. 选择“视图”➤“检查器”➤“显示身份检查器”，或点击 Xcode 窗口右上角的“身份检查器”图标。\n\n15. 在“类”弹出菜单中点击，然后选择\
    \ `SecondViewController`。\n\n16. 将鼠标指针移到根视图的“视图控制器”图标上，按住 Control 键，并向你刚刚添加的第二个视图控制器进行\
    \ Ctrl-拖拽，如图 17-22 所示。\n\n![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig22_HTML.jpg](img/329781_5_En_17_Fig22_HTML.jpg)\n\
    \n图 17-22：将根视图连接到新添加的视图控制器\n\n17. 松开 Control 键和鼠标左键。会弹出一个菜单（见图 17-8）。\n\n18. 选择“Show”。Xcode\
    \ 会绘制一个箭头（转场），将根视图连接到新添加的视图控制器（见图 17-9）。\n\n19. 在文档大纲中点击“Show segue to 'Second\
    \ View Controller'”。Xcode 会高亮显示两个视图之间的转场。\n\n20. 选择“视图”➤“检查器”➤“显示属性检查器”，或点击 Xcode\
    \ 窗口右上角的“属性检查器”图标。\n\n21. 在“标识符”文本字段中点击，输入 `firstLink`，然后按回车键。\n\n22. 在导航器窗格中点击\
    \ `ViewController.swift` 文件。\n\n23. 按如下方式编辑 `viewDidLoad` 方法，以定义根视图的提示文本和标题文本：\n\
    \n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    navigationItem.prompt\
    \ = \"Prompt text\"\n    navigationItem.title = \"Title text\"\n    // Do any\
    \ additional setup after loading the view.\n}\n```\n\n24. 在 `viewDidLoad` 方法下方添加以下函数：\n\
    \n```\noverride func touchesBegan(_ touches: Set, with event: UIEvent?) {\n  \
    \  performSegue(withIdentifier: \"firstLink\", sender: self)\n}\n```\n\n25. 在上一个函数下方添加以下函数：\n\
    \n```\noverride func prepare(for segue: UIStoryboardSegue, sender: Any?) {\n \
    \   let nextVC = segue.destination as! SecondViewController\n    nextVC.navigationItem.prompt\
    \ = \"New prompt here\"\n    nextVC.navigationItem.title = \"New title here\"\n\
    }\n```\n\n此函数为第二个视图控制器定义了新的提示文本和标题文本。\n\n26. 点击“运行”按钮，或选择“产品”➤“运行”。模拟器窗口将出现，显示根视图屏幕，顶部为“Prompt\
    \ text”，其下方为“Title text”，如图 17-23 所示。\n\n![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig23_HTML.jpg](img/329781_5_En_17_Fig23_HTML.jpg)\n\
    \n图 17-23：在根视图上显示提示文本和标题文本\n\n27. 点击屏幕以显示第二个视图控制器。请注意，此时提示文本显示为“New prompt here”，标题文本显示为“New\
    \ title here”。同时请注意，“返回”按钮显示了上一个视图的标题，如图 17-24 所示。（如果上一个视图没有标题，那么“返回”按钮将仅显示默认文本“Back”。）\n\
    \n![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig24_HTML.jpg](img/329781_5_En_17_Fig24_HTML.jpg)\n\
    \n图 17-24：第二个视图控制器上不同的提示文本和标题文本\n\n28. 选择“模拟器”➤“退出模拟器”以返回 Xcode。\n"
- fmt: "# Modifying the Back Button\n\nThe Navigation Controller always displays a\
    \ Back button in the upper left corner of a view so users can return to a previous\
    \ view. You can modify both the color and text that appears on the Back button.\
    \ The three ways to modify the text on the Back button are as follows:\n\n- If\
    \ the previous view does not have a title, then the Back button defaults to displaying\
    \ \"Back\".\n- If the previous view has a title, then the Back button displays\
    \ that title.\n- If you customize the `backBarButtonItem` property, you can define\
    \ new Back button text.\n\nThe default text color for the Back button text is\
    \ light blue, but you can define a different color by modifying the navigation\
    \ bar's `tintColor` property. To see how to change the Back button text and color,\
    \ follow these steps:\n\n1. Make sure the `NavigationTextApp` project is loaded\
    \ into Xcode.\n2. Click the `ViewController.swift` file in the Navigator pane.\n\
    3. Modify the `prepare(for:sender:)` function as follows:\n\n    ```\n    override\
    \ func prepare(for segue: UIStoryboardSegue, sender: Any?) {\n        let nextVC\
    \ = segue.destination as! SecondViewController\n        nextVC.navigationItem.prompt\
    \ = \"New prompt here\"\n        nextVC.navigationItem.title = \"New title here\"\
    \n        let customButton = UIBarButtonItem()\n        customButton.title = \"\
    New back text\"\n        navigationItem.backBarButtonItem = customButton\n   \
    \ }\n    ```\n\n    These last three lines create a new `UIBarButtonItem`, define\
    \ a new title, and then store this new bar button in the `backBarButtonItem` property\
    \ to define new text to appear in the Back button.\n\n4. Modify the `viewDidLoad`\
    \ method as follows:\n\n    ```\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        navigationItem.prompt = \"Prompt text\"\n        navigationItem.title\
    \ = \"Title text\"\n        navigationController?.navigationBar.tintColor = UIColor.red\n\
    \        // Do any additional setup after loading the view.\n    }\n    ```\n\n\
    \    The `tintColor` property on the navigation bar (which is defined by the Navigation\
    \ Controller) defines the color of the Back button text. The preceding code changes\
    \ the Back button text to red, but you can choose any color such as yellow or\
    \ green.\n\n    The entire `ViewController.swift` file should look like this:\n\
    \n    ```\n    import UIKit\n    class ViewController: UIViewController {\n  \
    \      override func viewDidLoad() {\n            super.viewDidLoad()\n      \
    \      navigationItem.prompt = \"Prompt text\"\n            navigationItem.title\
    \ = \"Title text\"\n            navigationController?.navigationBar.tintColor\
    \ = UIColor.red\n            // Do any additional setup after loading the view.\n\
    \        }\n        override func touchesBegan(_ touches: Set, with event: UIEvent?)\
    \ {\n            performSegue(withIdentifier: \"firstLink\", sender: self)\n \
    \       }\n        override func prepare(for segue: UIStoryboardSegue, sender:\
    \ Any?) {\n            let nextVC = segue.destination as! SecondViewController\n\
    \            nextVC.navigationItem.prompt = \"New prompt here\"\n            nextVC.navigationItem.title\
    \ = \"New title here\"\n            let customButton = UIBarButtonItem()\n   \
    \         customButton.title = \"New back text\"\n            navigationItem.backBarButtonItem\
    \ = customButton\n        }\n    }\n    ```\n\n5. Click the Run button or choose\
    \ Product ➤ Run. The Simulator window appears, displaying the root view screen\
    \ with \"Prompt text\" at the top and \"Title text\" underneath (see Figure 17-23).\n\
    6. Click the screen. The next view appears. Notice that this second view displays\
    \ the Back button text as \"New back text\" and it appears in red.\n7. Choose\
    \ Simulator ➤ Quit Simulator to return to Xcode.\n\n## Modifying the Color of\
    \ the Navigation Bar\n\nThe `barTintColor` property defines the color of the navigation\
    \ bar. Keep in mind that whatever color you choose for the navigation bar should\
    \ contrast with any colors defined for the Back button to make it easy to see.\n\
    \nTo see how to change the color of the navigation bar, follow these steps:\n\n\
    1. Make sure the `NavigationTextApp` project is loaded into Xcode.\n2. Click the\
    \ `ViewController.swift` file in the Navigator pane.\n3. Modify the `viewDidLoad`\
    \ method as follows:\n\n    ```\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        navigationItem.prompt = \"Prompt text\"\n        navigationItem.title\
    \ = \"Title text\"\n        navigationController?.navigationBar.tintColor = UIColor.red\n\
    \        navigationController?.navigationBar.barTintColor = UIColor.green\n  \
    \      // Do any additional setup after loading the view.\n    }\n    ```\n\n\
    \    Notice that the `tintColor` property of the navigation bar defines the Back\
    \ button text, while the `barTintColor` property defines the color of the navigation\
    \ bar.\n\n4. Click the Run button or choose Product ➤ Run. The Simulator window\
    \ appears. Notice that the navigation bar now appears in green.\n5. Click the\
    \ screen. The next view appears.\n6. Choose Simulator ➤ Quit Simulator to return\
    \ to Xcode."
