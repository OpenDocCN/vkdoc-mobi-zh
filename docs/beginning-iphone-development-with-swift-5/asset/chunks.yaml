    \ window appears, displaying the data in your table view (see Figure [14-4](#329781_5_En_14_Chapter.xhtml#Fig4)).\n\
    \n21.  Click an item in the table view. An alert controller appears to identify\
    \ your choice (see Figure [14-9](#329781_5_En_14_Chapter.xhtml#Fig9)).\n\n22.\
    \  Click OK to dismiss the alert controller.\n\n23.  Choose Simulator ➤ Quit Simulator\
    \ to return to Xcode.\n\n## Summary\n\nTable views display rows of data that users\
    \ can select. A table view requires a data source and functions to define how\
    \ many rows to display. A simple table view displays one section, but a table\
    \ view can display multiple sections where each section contains different numbers\
    \ of rows.\n\nEach row in a table view is defined by a cell. You can define a\
    \ cell using Swift code or visually by dragging and dropping a Table View Cell\
    \ onto a table view. You must give this cell an identifying name so your swift\
    \ code can reference this cell to store data in it.\n\nWhen using a Table View\
    \ Controller, you need to connect it to its own .swift file that you can define\
    \ to make it represent a UITableViewController. This eliminates the need to declare\
    \ the .swift file as the table view’s delegate and data source.\n\nThe main difference\
    \ between a table view and a Table View Controller is that a table view appears\
    \ on an existing view while a Table View Controller appears in the storyboard.\n\
    \n# 15. Customizing Table View Cells\n\nChapter [14](#329781_5_En_14_Chapter.xhtml)\
    \ explained how to create different types of table views including plain and grouped\
    \ tables along with section indexes. So far, we’ve only used a simple cell that\
    \ displays a single line of text. In this chapter you’ll learn how to customize\
    \ a cell to display additional text and images. In addition, you’ll also learn\
    \ how to modify the appearance of cells.\n\nCells in a table view can display\
    \ the following as shown in Figure [15-1](#329781_5_En_15_Chapter.xhtml#Fig1):\n\
    \n![../images/329781_5_En_15_Chapter/329781_5_En_15_Fig1_HTML.jpg](images/329781_5_En_15_Chapter/329781_5_En_15_Fig1_HTML.jpg)\n\
    \nFigure 15-1.\n\nThe parts of a Table View Cell\n\n*   textLabel – Defines the\
    \ main text displayed in a cell\n\n*   detailTextLabel – Defines the secondary\
    \ text that appears in a smaller font size than the textLabel text\n\n*   imageView –\
    \ Defines an image that appears in a cell\n\n## Customizing a Table View Cell\
    \ in Swift\n\nTable view Cells can appear in different styles, which define how\
    \ text, detail text, and images appear. The four different types of cell styles\
    \ are shown in Figure [15-2](#329781_5_En_15_Chapter.xhtml#Fig2):\n\n*   .default –\
    \ Displays a text label, but no detail text label. An image view can appear on\
    \ the left.\n\n*   .value1 – Displays a text label on the left and a detail text\
    \ label on the right. An image view can appear on the left.\n\n*   .value2 – Displays\
    \ a text label in blue indented from the left and a detail text label indented\
    \ from the right. Does not display an image view.\n\n*   .subtitle – Displays\
    \ a text label on the left and a detail text label underneath in a smaller font\
    \ size. An image view can appear on the left.\n\n    ![../images/329781_5_En_15_Chapter/329781_5_En_15_Fig2_HTML.jpg](images/329781_5_En_15_Chapter/329781_5_En_15_Fig2_HTML.jpg)\n\
    \n    Figure 15-2\n\n    The four different styles for a cell"
  trans: "\n2.  点击 `Cocoa Touch Class`，然后点击**Next**按钮。此时会出现另一个对话框。\n\n3.  点击 `Class`\
    \ 文本字段，删除现有文本，并输入 `TableViewController`。（该类名可任意指定。）\n\n4.  点击 `Subclass of` 文本字段，选择\
    \ `UITableViewController`，如图 14-21 所示。然后点击**Next**按钮。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig21_HTML.jpg](img/329781_5_En_14_Fig21_HTML.jpg)\n\
    \n图 14-21  \n命名 `.swift` 文件并定义其子类\n\n5.  会出现另一个对话框询问你将该 `.swift` 文件存储在哪里。点击**Create**按钮。Xcode\
    \ 会创建 `TableViewController.swift` 文件。下一步是将此 `.swift` 文件连接到 Table View Controller。\n\
    \n6.  在导航窗格中点击 `Main.storyboard` 文件。\n\n7.  点击文档大纲中的“Table View Controller Scene”（表格视图控制器场景），或点击故事板中表格视图控制器上方的“Table\
    \ View Controller”（表格视图控制器）图标。\n\n8.  选择 `View` ➤ `Inspectors` ➤ `Show Identity\
    \ Inspector`，或者点击 Xcode 窗口右上角的“Identity Inspector”（身份检查器）图标。\n\n9.  点击 `Class`\
    \ 弹出菜单，选择 `TableViewController`（或你在步骤 14 中给 `.swift` 文件起的任何名称），如图 14-22 所示。将 `.swift`\
    \ 文件连接到视图控制器后，你现在可以创建用于处理表格视图控制器的 `IBOutlets`、`IBAction` 方法和 Swift 代码。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig22_HTML.jpg](img/329781_5_En_14_Fig22_HTML.jpg)\n\
    \n图 14-22  \n将 `.swift` 文件连接到 Table View Controller\n\n10. 在文档大纲中点击“Table View\
    \ Cell”（表格视图单元格）。（你可能需要点击灰色的展开三角才能找到表格视图单元格。）\n\n11. 选择 `View` ➤ `Inspectors`\
    \ ➤ `Show Attributes Inspector`，或者点击 Xcode 窗口右上角的“Attributes Inspector”（属性检查器）图标。\n\
    \n12. 点击 `Identifier` 文本字段，输入 `cellID`，如图 14-23 所示。（该名称可任意指定。）然后按 ENTER 键。\n\n\
    ![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig23_HTML.jpg](img/329781_5_En_14_Fig23_HTML.jpg)\n\
    \n图 14-23  \n为 Table View Cell 定义标识符\n\n13. 在导航窗格中点击 `TableViewController.swift`\
    \ 文件。\n\n14. 在 `class TableViewController` 行下方添加如下代码：\n\n```\nlet petArray = [\"\
    cat\", \"dog\", \"parakeet\", \"parrot\", \"canary\", \"finch\", \"tropical fish\"\
    , \"goldfish\", \"sea horses\", \"hamster\", \"gerbil\", \"rabbit\", \"turtle\"\
    , \"snake\", \"lizard\", \"hermit crab\"]\n```\n\n15. 按如下方式编辑 `numberOfSections`\
    \ 函数：\n\n```\noverride func numberOfSections(in tableView: UITableView) -> Int\
    \ {\n    return 1\n}\n```\n\n16. 按如下方式编辑 `numberOfRowsInSection` 函数：\n\n```\n\
    override func tableView(_ tableView: UITableView, numberOfRowsInSection section:\
    \ Int) -> Int {\n    return petArray.count\n}\n```\n\n17. 添加以下 `cellForRowAt`\
    \ 函数以将数据存储到表格视图单元格中：\n\n```\noverride func tableView(_ tableView: UITableView,\
    \ cellForRowAt indexPath: IndexPath) -> UITableViewCell {\n    let cell = tableView.dequeueReusableCell(withIdentifier:\
    \ \"cellID\")\n    cell?.textLabel?.text = petArray[indexPath.row]\n    return\
    \ cell!\n}\n```\n\n18. 添加以下 `didSelectRowAt` 函数以识别用户选择了哪一项：\n\n```\noverride func\
    \ tableView(_ tableView: UITableView, didSelectRowAt indexPath: IndexPath) {\n\
    \    let selectedItem = petArray[indexPath.row]\n    let alert = UIAlertController(title:\
    \ \"Your Choice\", message: \"\\(selectedItem)\", preferredStyle: .alert)\n  \
    \  let okAction = UIAlertAction(title: \"OK\", style: .default, handler: { action\
    \ -> Void in\n        //Just dismiss the action sheet\n    })\n    alert.addAction(okAction)\n\
    \    self.present(alert, animated: true, completion: nil)\n}\n```\n\n19. 在导航窗格中点击\
    \ `Main.storyboard` 文件。\n\n20. 点击“Run”（运行）按钮，或选择 `Product` ➤ `Run`。模拟器窗口会打开，并在你的表格视图中显示数据（见图\
    \ 14-4）。\n\n21. 点击表格视图中的某一项。会弹出一个警告控制器来标识你的选择（见图 14-9）。\n\n22. 点击 OK 以关闭警告控制器。\n\
    \n23. 选择 `Simulator` ➤ `Quit Simulator` 以返回 Xcode。\n\n## 总结\n\n表格视图显示可供用户选择的数据行。表格视图需要一个数据源以及用于定义显示行数的函数。一个简单的表格视图只显示一个分区，但表格视图也可以显示多个分区，每个分区包含不同数量的行。\n\
    \n表格视图中的每一行都由一个单元格定义。你可以使用 Swift 代码定义单元格，也可以通过将表格视图单元格拖放到表格视图上来以可视方式定义。你必须为该单元格指定一个标识名称，这样你的\
    \ Swift 代码才能引用此单元格以在其中存储数据。\n\n使用 Table View Controller 时，你需要将其连接到自己的 `.swift`\
    \ 文件，你可以定义该文件以使其代表一个 `UITableViewController`。这样就无需将 `.swift` 文件声明为表格视图的委托和数据源。\n\
    \n表格视图和 Table View Controller 的主要区别在于，表格视图出现在现有视图上，而 Table View Controller 则出现在故事板中。\n\
    \n# 15. 自定义表格视图单元格\n\n第 14 章介绍了如何创建不同类型的表格视图，包括普通表格和分组表格以及分区索引。到目前为止，我们只使用了显示单行文本的简单单元格。在本章中，你将学习如何自定义单元格以显示额外的文本和图像。此外，你还将学习如何修改单元格的外观。\n\
    \n表格视图中的单元格可以显示如图 15-1 所示的内容：\n\n![../images/329781_5_En_15_Chapter/329781_5_En_15_Fig1_HTML.jpg](img/329781_5_En_15_Fig1_HTML.jpg)\n\
    \n图 15-1  \n表格视图单元格的组成部分\n\n*   `textLabel` – 定义单元格中显示的主要文本\n*   `detailTextLabel`\
    \ – 定义次要文本，其字体大小小于 `textLabel` 文本\n*   `imageView` – 定义单元格中显示的图像\n\n## 在 Swift\
    \ 中自定义表格视图单元格\n\n表格视图单元格可以有不同的样式，这些样式定义了文本、详细文本和图像如何显示。四种不同的单元格样式类型如图 15-2 所示：\n\
    \n*   `.default` – 显示文本标签，但不显示详细文本标签。图像视图可以显示在左侧。\n*   `.value1` – 在左侧显示文本标签，在右侧显示详细文本标签。图像视图可以显示在左侧。\n\
    *   `.value2` – 在左侧以蓝色缩进显示文本标签，在右侧以缩进显示详细文本标签。不显示图像视图。\n*   `.subtitle` – 在左侧显示文本标签，在其下方以较小字体显示详细文本标签。图像视图可以显示在左侧。\n\
    \n![../images/329781_5_En_15_Chapter/329781_5_En_15_Fig2_HTML.jpg](img/329781_5_En_15_Fig2_HTML.jpg)\n\
    \n图 15-2  \n单元格的四种不同样式\n"
- fmt: "### Note\n\nThe `.default` cell style is the only one that does not allow\
    \ a detail text label to appear. The `.value2` cell style is the only one that\
    \ does not allow an image view to appear.\n\nBefore creating a table view that\
    \ can display images, we'll need some images. Some sources of free, public domain\
    \ images include:\n\n- icons8.com\n- iconarchive.com\n- aiconica.net\n\nFor this\
    \ example, we'll need four different images, preferably of the same size and file\
    \ format such as `.png` or `.jpg`. The exact name of each image doesn't matter\
    \ but we'll need to be able to identify each image.\n\nIn this example, we'll\
    \ display four items in the table view. To simplify matters, we'll use three different\
    \ arrays containing four items, one for the text label, one for the detail text\
    \ label, and one for the image view. In a real app, you'll likely want to use\
    \ a single data structure such as a dictionary to keep related data together.\n\
    \nDisplaying text in a Table View Cell involves assigning the Table View Cell's\
    \ `textLabel.text` and `detailTextLabel.text` properties to a string such as:\n\
    \n```swift\ncell?.textLabel?.text = \"String or string variable\"\ncell?.detailTextLabel?.text\
    \ = \"String or string variable\"\n```\n\nDisplaying an image in a Table View\
    \ Cell involves assigning the image file name to the image view's `Image` property\
    \ such as:\n\n```swift\ncell?.imageView?.image = UIImage(named: \"Image file name\"\
    )\n```\n\nTo see how to create and fill a table view with text, detail text, and\
    \ an image, follow these steps:\n\n1. Create a new iOS project using the Single\
    \ View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml)) and name this\
    \ new project `TableCellApp`. This creates a single view for the user interface.\n\
    \n2. Click the `Main.storyboard` file in the Navigator pane. Xcode displays the\
    \ single view.\n\n3. Click the Library icon to open the Object Library window.\n\
    \n4. Drag and drop a table view on the view.\n\n5. Resize the table view so it\
    \ fills the entire screen.\n\n6. Choose **Editor > Resolve Auto Layout Issues\
    \ > Reset to Suggested Constraints**. Xcode adds constraints to the table view.\n\
    \n7. Choose **View > Assistant Editor > Show Assistant Editor**, or click the\
    \ Assistant Editor icon in the upper right corner of the Xcode window.\n\n8. Move\
    \ the mouse pointer over the table view, hold down the **Control** key, and Ctrl-drag\
    \ under the `class ViewController` line in the `ViewController.swift` file.\n\n\
    9. Release the **Control** key and the left mouse button. A popup window appears.\n\
    \n10. Click in the Name text field, type `tableData`, and click the Connect button.\
    \ Xcode creates an `IBOutlet` as follows:\n\n```swift\n@IBOutlet var tableData:\
    \ UITableView!\n```\n\n11. Choose **View > Standard Editor > Show Standard Editor**,\
    \ or click the Standard Editor icon in the upper right corner of the Xcode window.\n\
    \n12. Click the `ViewController.swift` file in the Navigator pane.\n\n13. Modify\
    \ the `class ViewController` line by adding `UITableViewDelegate`, `UITableViewDataSource`\
    \ as follows:\n\n```swift\nclass ViewController: UIViewController, UITableViewDelegate,\
    \ UITableViewDataSource {\n```\n\nThe purpose of this code is to identify the\
    \ `ViewController.swift` file as both the delegate and data source for the table\
    \ view.\n\n14. Drag and drop four images into the Navigator pane as shown in Figure\
    \ [15-3](#329781_5_En_15_Chapter.xhtml#Fig3). A dialog appears, asking how to\
    \ add the files to your project.\n\n![../images/329781_5_En_15_Chapter/329781_5_En_15_Fig3_HTML.jpg](images/329781_5_En_15_Chapter/329781_5_En_15_Fig3_HTML.jpg)\n\
    \nFigure 15-3: Dragging and dropping image files into the Navigator pane\n\n15.\
    \ Click the Finish button. Note the exact names of all the image files.\n\n16.\
    \ Underneath the `class ViewController` line, add the following three arrays to\
    \ fill the table view with four rows of data:\n\n```swift\nlet mainArray = [\"\
    Shuttle bus\", \"Hierarchy\", \"Exchange\", \"Padlock\"]\nlet detailArray = [\"\
    6am - 10pm\", \"Acme corporation\", \"Ideas worth sharing\", \"Access denied\"\
    ]\nlet imageArray = [\"shuttle.png\", \"hierarchy.png\", \"exchange.png\", \"\
    padlock.png\"]\n```\n\nFor the `imageArray`, replace these file names with the\
    \ names of the image files you dragged and dropped into the Navigator pane in\
    \ step 14.\n\n17. Underneath this array, add the following line:\n\n```swift\n\
    let cellID = \"cellID\"\n```\n\nThe purpose of this code is to create an arbitrary\
    \ constant name for a cell. A table view consists of rows of cells, so we need\
    \ to identify the cells for storing data in later.\n\n18. Modify the `viewDidLoad`\
    \ method as follows:\n\n```swift\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    tableData.delegate = self\n    tableData.dataSource = self\n    // Do any\
    \ additional setup after loading the view, typically from a nib.\n}\n```\n\n19.\
    \ Add the following function underneath the `viewDidLoad` method:\n\n```swift\n\
    func tableView(_ tableView: UITableView, numberOfRowsInSection section: Int) ->\
    \ Int {\n    return mainArray.count\n}\n```\n\n20. Add the following function\
    \ underneath the `viewDidLoad` method:\n\n```swift\nfunc tableView(_ tableView:\
    \ UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell {\n    var\
    \ cell = tableView.dequeueReusableCell(withIdentifier: cellID)\n    if (cell ==\
    \ nil) {\n        cell = UITableViewCell(\n            style: UITableViewCell.CellStyle.subtitle,\n\
    \            reuseIdentifier: cellID)\n    }\n    cell?.textLabel?.text = mainArray[indexPath.row]\n\
    \    cell?.detailTextLabel?.text = detailArray[indexPath.row]\n    cell?.imageView?.image\
    \ = UIImage(named: imageArray[indexPath.row])\n    return cell!\n}\n```\n\nThis\
    \ function stores the data from the array into the table view. Since each row\
    \ in the table view is defined by a cell, it needs to create a cell with a name:\n\
    \n```swift\nvar cell = tableView.dequeueReusableCell(withIdentifier: cellID)\n\
    ```\n\nIf a cell is empty, then the `if` statement defines the cell's style and\
    \ gives it the arbitrary `cellID` name to identify it and defines the cell style\
    \ as `.subtitle` (feel free to change this to `.default` or `.value1`):\n\n```swift\n\
    if (cell == nil) {\n    cell = UITableViewCell(\n        style: UITableViewCell.CellStyle.subtitle,\n\
    \        reuseIdentifier: cellID)\n}\n```\n\nNext it takes data from the `mainArray`\
    \ to store in the text label, takes data from `detailArray` to store in the detail\
    \ text label, and takes data from the `imageArray` to identify which image to\
    \ put in the image view:\n\n```swift\ncell?.textLabel?.text = mainArray[indexPath.row]\n\
    cell?.detailTextLabel?.text = detailArray[indexPath.row]\ncell?.imageView?.image\
    \ = UIImage(named: imageArray[indexPath.row])\n```\n\n21. Add the following function\
    \ underneath the `viewDidLoad` method to detect which item the user selected:\n\
    \n```swift\nfunc tableView(_ tableView: UITableView, didSelectRowAt indexPath:\
    \ IndexPath) {\n    let selectedItem = mainArray[indexPath.row]\n    let alert\
    \ = UIAlertController(title: \"Your Choice\", message: \"\\(selectedItem)\", preferredStyle:\
    \ .alert)\n    let okAction = UIAlertAction(title: \"OK\", style: .default, handler:\
    \ { action -> Void in\n        //Just dismiss the action sheet\n    })\n    alert.addAction(okAction)\n\
    \    self.present(alert, animated: true, completion: nil)\n}\n```\n\nThe complete\
    \ `ViewController.swift` file should look like this."
