    \ a global variable that represents the rotation gesture along with defining two\
    \ CGFloat variables.\n\n4.  Edit the viewDidLoad method as follows:\n\n```\n \
    \   override func viewDidLoad() {\n    super.viewDidLoad()\n    xOrigin = topImageView.center.x\n\
