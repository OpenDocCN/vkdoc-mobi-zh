    \n图15-15\n\n该提示控制器允许用户输入新的文本。\n\n26.  点击文本字段（显示占位符文本“Pet type here”），输入`tarantula`，然后点击“OK”按钮。注意，表格视图现在显示“tarantula”。\n\
    \n27.  将鼠标指针移到“rabbit”上，按住鼠标左键，然后向左拖动。“Add”和“Delete”按钮会显示出来（见图15-14）。\n\n28. \
    \ 点击“Delete”按钮。注意，包含“rabbit”的行消失了。\n\n29.  选择“Simulator ➤ Quit Simulator”以返回Xcode。\n\
    \n## 总结\n\n通过定义不同的表格视图单元格样式，你可以显示主文本、通常以较小字体显示的详细文本以及图像。图像和详细文本可以使表格视图中显示的数据在视觉上更有趣、更具描述性。\n\
    \n除了选择不同的单元格样式外，你还可以通过从对象库窗口将表格视图单元格拖放到表格视图上，来设计自定义的表格视图单元格。创建自定义表格视图单元格后，你可以将多个标签和图像视图等其他对象拖放到此单元格上，然后自定义每个标签或图像视图以创建独特的视觉效果。\n\
    \n虽然表格视图便于显示数据，但它们也可用于允许编辑操作，例如在表格视图中添加或删除行。为此，你可以包含一个左滑手势，让行显示按钮。通过点击按钮，用户可以向表格视图添加新项或删除现有行。\n\
    \n通过自定义表格视图单元格并实现用于在表格视图中添加或删除行的左滑手势，你可以定义应用独特的表格视图。\n\n# 16. 使用集合视图\n\n表格视图非常适合以行形式显示大量数据，以便用户可以滚动浏览。虽然表格视图对于iPhone较小、较窄的屏幕来说是完美的，但它们仅限于上下滚动数据行。如果你想水平滚动数据或显示多列数据，你可以改用集合视图。\n\
    \n与表格视图一样，集合视图需要数据源和委托，它们实现的方法定义了集合视图中将显示多少数据。可以将集合视图视为功能更丰富的表格视图。\n\n## 创建集合视图\n\
    \n集合视图在构成网格的单元格中显示数据，该网格可以垂直或水平滚动。要了解如何创建简单的集合视图，请按照以下步骤操作：\n\n1.  使用“Single View\
    \ App”模板创建一个新的iOS项目（参见第1章），并将此新项目命名为`SimpleCollectionViewApp`。这会为用户界面创建一个单视图。\n\
    \n2.  点击导航器窗格中的`Main.storyboard`文件。Xcode会显示该单视图。\n\n3.  点击库图标以打开对象库窗口。\n\n4. \
    \ 将一个集合视图拖放到视图上，如图16-1所示。\n\n![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig1_HTML.jpg](images/329781_5_En_16_Chapter/329781_5_En_16_Fig1_HTML.jpg)\n\
    \n图16-1\n\n对象库窗口中的集合视图\n\n5.  调整集合视图的大小，使其填满整个屏幕。\n\n6.  选择“Editor ➤ Resolve Auto\
    \ Layout Issues ➤ Reset to Suggested Constraints”。Xcode会向集合视图添加约束。\n\n7.  点击文档大纲中的“Collection\
    \ View Cell”。\n\n8.  选择“View ➤ Inspectors ➤ Show Attributes Inspector”，或点击Xcode窗口右上角的属性检查器图标。\n\
    \n9.  点击“Identifier”文本字段，输入`customCell`，然后按回车键，如图16-2所示。\n\n![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig2_HTML.jpg](images/329781_5_En_16_Chapter/329781_5_En_16_Fig2_HTML.jpg)\n\
    \n图16-2\n\n集合视图单元格的属性检查器窗格中显示的“Identifier”文本字段\n\n10.  选择“View ➤ Assistant Editor\
    \ ➤ Show Assistant Editor”，或点击Xcode窗口右上角的助理编辑器图标。\n\n11.  将鼠标指针移到集合视图上，按住Control键，并按住Control键从集合视图拖拽到`ViewController.swift`文件中的“`class\
    \ ViewController`”行下方。\n\n12.  松开Control键和鼠标左键。会弹出一个窗口。\n\n13.  点击“Name”文本字段，输入`collectionView`，然后点击“Connect”按钮。Xcode会创建一个`IBOutlet`，如下所示：\n\
    \n```\n    @IBOutlet var collectionView: UICollectionView!\n```\n\n14.  选择“View\
    \ ➤ Standard Editor ➤ Show Standard Editor”，或点击Xcode窗口右上角的标准编辑器图标。\n\n15.  点击导航器窗格中的`ViewController.swift`文件。\n\
    \n16.  修改`class ViewController`行，添加`UITableViewDelegate`和`UITableViewDataSource`，如下所示：\n\
    \n```\n    class ViewController: UIViewController, UICollectionViewDataSource,\
    \ UICollectionViewDelegate {\n```\n\n这段代码的目的是将`ViewController.swift`文件标识为集合视图的委托和数据源。\n\
    \n17.  在`class ViewController`行下方，添加以下代码：\n\n```\n    var cellColor = true\n```\n\
    \n18.  修改`viewDidLoad`方法，如下所示：\n\n```\n    override func viewDidLoad() {\n   \
    \     super.viewDidLoad()\n        collectionView.dataSource = self\n        collectionView.delegate\
    \ = self\n        // Do any additional setup after loading the view.\n    }\n\
    ```\n\n19.  在`viewDidLoad`方法下方添加以下函数，以定义集合视图分区中显示多少个项目。默认情况下，集合视图有一个分区：\n\n```\n\
    \    func collectionView(_ collectionView: UICollectionView, numberOfItemsInSection\
    \ section: Int) -> Int {\n        return 100\n    }\n```\n\n20.  在`viewDidLoad`方法下方添加以下函数，以向集合视图单元格填充数据：\n\
    \n```\n    func collectionView(_ collectionView: UICollectionView, cellForItemAt\
    \ indexPath: IndexPath) -> UICollectionViewCell {\n        let cell = collectionView.dequeueReusableCell(withReuseIdentifier:\
    \ \"customCell\", for: indexPath)\n        // Alternate colors in the Collection\
    \ View cells\n        if cellColor {\n            cell.backgroundColor = UIColor.yellow\n\
    \        } else {\n            cell.backgroundColor = UIColor.green\n        }\n\
    \        cellColor = !cellColor\n        return cell\n    }\n```"
