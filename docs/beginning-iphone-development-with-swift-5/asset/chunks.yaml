    点击 `Add new constraints` 图标会显示一个弹出窗口，让您可以定义尺寸（宽度和高度）以及到附近对象的距离，如图 13-6 所示。如果您选择了两个或多个对象，还可以定义所有选中的对象具有相同的宽度或高度。


    ![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig6_HTML.jpg](img/329781_5_En_13_Fig6_HTML.jpg)


    **图 13-6** `Add new constraints` 弹出窗口


    为对象添加约束的第三种方式是：从对象 `Ctrl`-拖拽到屏幕边缘或另一个对象上。当您 `Ctrl`-拖拽并释放 `Control` 键和鼠标左键时，会弹出一个窗口，让您可以选择不同的约束，如图
    13-7 所示。此弹出菜单中显示的可用约束会根据您 `Ctrl`-拖拽的位置而有所不同。


    ![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig7_HTML.jpg](img/329781_5_En_13_Fig7_HTML.jpg)


    **图 13-7** 当您 `Ctrl`-拖拽以创建约束时出现的弹出菜单


    要了解如何创建、编辑和删除约束以及使用框架，请按以下步骤操作：


    1.  使用 `Single View App` 模板创建一个新的 iOS 项目（参见第 1 章），并将此新项目命名为 `ConstraintApp`。这为用户界面创建了一个单一视图。

    2.  在导航窗格中点击 `Main.storyboard` 文件。Xcode 会显示该单一视图。

    3.  点击 `Library` 图标打开 `Object Library` 窗口。

    4.  在视图上的任意位置拖放一个按钮和一个标签。确保按钮位于标签的下方。

    5.  将鼠标指针移到按钮上，按住 `Control` 键，然后 `Ctrl`-拖拽鼠标，直到鼠标指针出现在标签上方。

    6.  释放 `Control` 键和鼠标左键。会弹出一个窗口（见图 13-7）。

    7.  选择 `Vertical Spacing`。Xcode 会以红色显示此约束，提示您没有足够的约束来正确定义按钮在用户界面上的位置。

    8.  点击按钮以将其选中。

    9.  点击 Xcode 窗口底部的 `Add new constraints` 图标。会弹出一个窗口。

    '
- fmt: '10.  Click the two dotted lines that represent a constraint to the right and
    bottom of the screen as shown in Figure [13-8](#329781_5_En_13_Chapter.xhtml#Fig8).


    ![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig8_HTML.jpg](images/329781_5_En_13_Chapter/329781_5_En_13_Fig8_HTML.jpg)


    Figure 13-8


    Defining constraints to the right and bottom of the screen


    11.  Click the `Add 2 Constraints` button. Xcode adds two more constraints. Notice
    that all constraints now appear in blue, which means you have enough constraints
    on the button to properly place it no matter what iOS device the app runs on.


    12.  Move the mouse pointer over the button and drag the button to a new position
    on the user interface. Notice that Xcode now displays a dotted rectangle to define
    the frame. The frame shows where the button will appear when the app runs, even
    though the button appears somewhere else as shown in Figure [13-9](#329781_5_En_13_Chapter.xhtml#Fig9).


    ![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig9_HTML.jpg](images/329781_5_En_13_Chapter/329781_5_En_13_Fig9_HTML.jpg)


    Figure 13-9


    Frames show where an object will appear based on its constraints


    13.  Choose `Editor` ➤ `Resolve Auto Layout Issues` ➤ `Update Frames`. Xcode moves
    the button to the frame’s position.


    14.  Choose `Edit` ➤ `Undo` or press `Command + Z`. Xcode moves the button back
    to its previous position, displaying the frame again.


    15.  Choose `Editor` ➤ `Resolve Auto Layout Issues` ➤ `Update Constraint Constants`.
    Xcode keeps the button in its current position and changes its constraints to
    display the button at its current location.


    **Note** The `Update Frames` command moves an object back to its frame, while
    the `Update Constraint Constants` command moves the frame and all constraints
    to the object’s current position.


    16.  Hold down the `SHIFT` key and click the button and label to select both of
    them.


    17.  Click the `Align` icon at the bottom of the Xcode window. A popup window
    appears.


    18.  Select the `Leading Edges` check box (leading edges define the left side
    of an object while trailing edges define the right side of an object) as shown
    in Figure [13-10](#329781_5_En_13_Chapter.xhtml#Fig10).


    19.  Click the `Add 1 Constraint` button. Notice that Xcode aligns the label and
    button by their leading (left) edges.


    ![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig10_HTML.jpg](images/329781_5_En_13_Chapter/329781_5_En_13_Fig10_HTML.jpg)


    Figure 13-10


    Aligning two objects by leading edges


    20.  Click the button to select it and choose `View` ➤ `Inspectors` ➤ `Show Size
    Inspector`, or click the `Size Inspector` icon in the upper right corner of the
    Xcode window. A list of constraints appears in the `Constraints` category as shown
    in Figure [13-11](#329781_5_En_13_Chapter.xhtml#Fig11).


    ![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig11_HTML.jpg](images/329781_5_En_13_Chapter/329781_5_En_13_Fig11_HTML.jpg)


    Figure 13-11


    Constraints appear in the `Size Inspector` pane


    21.  Click the `Edit` button that appears on the right side of every constraint.
    A popup window appears, listing the constant, priority, and multiplier values
    for the constraint as shown in Figure [13-12](#329781_5_En_13_Chapter.xhtml#Fig12).


    ![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig12_HTML.jpg](images/329781_5_En_13_Chapter/329781_5_En_13_Fig12_HTML.jpg)


    Figure 13-12


    Editing a constraint


    22.  Click in the `Constant` popup menu and you can define an `=`, `≤`, or `≥`.


    23.  Click in the downward-pointing arrow that appears to the right of the text
    field displaying a value. A popup menu appears, letting you choose a `Standard
    Value` or a `Canvas Value`.


    24.  Click in the downward-pointing arrow that appears to the right of the `Priority`
    text field displaying a value. A popup menu appears, letting you choose different
    priorities. (You can always type a value in this text field.)


    25.  Click the button to display all constraints.


    26.  Click a constraint to select it, then press `BACKSPACE` or `DELETE` to delete
    that constraint. This lets you delete individual constraints.


    27.  Choose `Editor` ➤ `Resolve Auto Layout Issues` ➤ `Clear Constraints` at the
    bottom of the submenu. This deletes constraints for all objects on the view.


    In this exercise, you learned how to add constraints, edit them, and delete them.
    Every user interface you design must have constraints defined to make sure objects
    appear correctly on the user interface no matter what size screen the app runs
    on.'
