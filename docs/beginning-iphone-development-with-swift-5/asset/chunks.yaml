    \ Navigation Controller (see Figure [17-4](#329781_5_En_17_Chapter.xhtml#Fig4)).\n\
    \n5.  Click the Library icon to open the Object Library window.\n\n6.  Drag and\
    \ drop a View Controller to the right of the root view.\n\n7.  Choose File ➤ New\
