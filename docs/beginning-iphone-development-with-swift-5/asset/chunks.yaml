    \n```\n    @IBAction func upSwipeDetected(_ sender: UISwipeGestureRecognizer)\
    \ {\n    topImageView.center = CGPoint(x: topImageView.center.x, y: topImageView.center.y\
    \ - topImageView.frame.height)\n    }\n    ```\n\n**Note** Notice that this code\
    \ subtracts from the image view center because, for the y-axis, positive numbers\
    \ increase downward and decrease upward since the origin appears in the upper\
    \ left corner of the view.\n\nThe entire ViewController.swift file should look\
    \ like this:\n\n```\n    import UIKit\n    class ViewController: UIViewController\
    \ {\n    @IBOutlet var topImageView: UIImageView!\n    override func viewDidLoad()\
    \ {\n    super.viewDidLoad()\n    // Do any additional setup after loading the\
    \ view, typically from a nib.\n    }\n    @IBAction func rightSwipeDetected(_\
    \ sender: UISwipeGestureRecognizer) {\n    topImageView.center = CGPoint(x: topImageView.center.x\
    \ + topImageView.frame.width, y: topImageView.center.y)\n    }\n    @IBAction\
    \ func upSwipeDetected(_ sender: UISwipeGestureRecognizer) {\n    topImageView.center\
    \ = CGPoint(x: topImageView.center.x, y: topImageView.center.y - topImageView.frame.height)\n\
    \    }\n    }\n    ```\n\n1.  Click the Run button or choose Product ➤ Run. The\
