    \ setup after loading the view.\n    }\n    func collectionView(_ collectionView:\
    \ UICollectionView, numberOfItemsInSection section: Int) -> Int {\n        return\
    \ 100\n    }\n    func collectionView(_ collectionView: UICollectionView, cellForItemAt\
    \ indexPath: IndexPath) -> UICollectionViewCell {\n        let cell = collectionView.dequeueReusableCell(withReuseIdentifier:\
    \ \"customCell\", for: indexPath)\n        // Alternate colors in the Collection\
    \ View cells\n        if cellColor {\n            cell.backgroundColor = UIColor.yellow\n\
    \        } else {\n            cell.backgroundColor = UIColor.green\n        }\n\
    \        cellColor = !cellColor\n        return cell\n    }\n}\n```\n\n21. 点击运行按钮或选择“Product\
    \ ➤ Run”。模拟器窗口将出现，显示交替显示绿色和黄色单元格的集合视图，如图 16-3 所示。\n\n![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig3_HTML.jpg](img/329781_5_En_16_Fig3_HTML.jpg)\n\
    \n**图 16-3** 显示交替单元格颜色的集合视图\n\n22. 上下滚动。\n\n23. 选择“Simulator ➤ Quit Simulator”返回\
    \ Xcode。\n\n24. 点击`Main.storyboard`文件，然后在文档大纲中点击“Collection View”。\n\n25. 选择“View\
    \ ➤ Inspectors ➤ Show Attributes Inspector”，或点击 Xcode 窗口右上角的属性检查器图标。\n\n26. 点击“Scroll\
    \ Direction”弹出菜单，选择“Horizontal”，如图 16-4 所示。\n\n![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig4_HTML.jpg](img/329781_5_En_16_Fig4_HTML.jpg)\n\
    \n**图 16-4** “Scroll Direction”弹出菜单允许您在垂直或水平滚动之间选择\n\n27. 点击运行按钮或选择“Product ➤\
    \ Run”。模拟器窗口将出现，显示交替显示绿色和黄色单元格的集合视图（参见图 16-3）。\n\n28. 注意，您现在可以左右滚动，但不能上下滚动。\n\n\
    29. 选择“Simulator ➤ Quit Simulator”返回 Xcode。\n\n## 在集合视图中显示数据\n\n集合视图的主要目的是在单元格中显示信息。要在单元格中显示信息，需要以下几个步骤：\n\
    \n- 将对象拖放到集合视图单元格上。\n- 创建一个新的`.swift`类文件来表示集合视图单元格。\n- 在身份检查器窗格中将这个新的`.swift`类文件连接到集合视图单元格。\n\
    - 从集合视图单元格上的对象按住 Ctrl 键拖拽到`.swift`类文件，创建`IBOutlet`变量来表示每个对象。\n- 在`cellForItemAt`函数中编写代码，将数据存储到每个集合视图单元格中。\n\
    \n在设计集合视图单元格时，您可以调整其高度和宽度。此外，您还可以定义单元格之间的间距，以及单元格距离屏幕顶部、左侧、底部或右侧边缘的距离。\n\n要了解如何在集合视图单元格中显示文本，请按照以下步骤操作：\n\
    \n1. 使用单视图应用模板创建一个新的 iOS 项目（参见第 1 章），并将此新项目命名为`CollectionViewDataApp`。这将为用户界面创建一个单一视图。\n\
    \n2. 在导航器窗格中点击`Main.storyboard`文件。Xcode 会显示该单一视图。\n\n3. 点击库图标打开对象库窗口。\n\n4. 将集合视图拖放到视图上的任意位置。\n\
    \n5. 调整集合视图的大小，使其填满整个屏幕。\n\n6. 选择“Editor ➤ Resolve Auto Layout Issues ➤ Reset\
    \ to Suggested Constraints”。Xcode 会为集合视图添加约束。\n\n7. 选择“File ➤ New ➤ File”。Xcode\
    \ 会显示一个模板列表。\n\n8. 在 iOS 类别下选择“Cocoa Touch Class”，然后点击**Next**按钮。将出现另一个对话框，要求提供类名和子类。\n\
    \n9. 在“Class”文本字段中点击并输入`itemCell`。\n\n10. 点击“Subclass of”弹出菜单，选择`UICollectionViewCell`，如图\
    \ 16-5 所示。\n\n![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig5_HTML.jpg](img/329781_5_En_16_Fig5_HTML.jpg)\n\
    \n**图 16-5** 为集合视图单元格创建一个新的`.swift`类文件\n\n11. 点击**Next**按钮。Xcode 会询问文件的存储位置。\n\
    \n12. 点击**Create**按钮。Xcode 会在导航器窗格中显示`itemCell.swift`文件。\n\n13. 在导航器窗格中点击`Main.storyboard`，在文档大纲中点击“Collection\
    \ View Cell”，然后选择“View ➤ Inspectors ➤ Show Attributes Inspector”，或点击 Xcode 窗口右上角的属性检查器图标。\n\
    \n14. 在标识符文本字段中点击，输入`customCell`，然后按回车键，如图 16-6 所示。\n\n![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig6_HTML.jpg](img/329781_5_En_16_Fig6_HTML.jpg)\n\
    \n**图 16-6** 在属性检查器窗格中定义集合视图单元格的标识符\n\n15. 点击“Background color”弹出菜单，选择一种颜色，例如黄色。Xcode\
    \ 会高亮显示该集合视图单元格。\n\n16. 选择“View ➤ Inspectors ➤ Show Identity Inspector”，或点击 Xcode\
    \ 窗口右上角的身份检查器图标。\n\n17. 点击“Class”弹出菜单，选择`itemCell`，如图 16-7 所示。\n\n![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig7_HTML.jpg](img/329781_5_En_16_Fig7_HTML.jpg)\n\
    \n**图 16-7** 将集合视图单元格连接到`itemCell.swift`文件\n\n18. 点击库图标打开对象库窗口，将一个标签拖放到集合视图单元格的中心。\n\
    \n19. 点击 Xcode 窗口底部的对齐图标，选中“Horizontally in Container”和“Vertically in Container”复选框，然后点击“Add\
    \ 2 Constraints”按钮。Xcode 会添加约束，以确保标签在集合视图单元格内居中，如图 16-8 所示。\n"
- fmt: "![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig8_HTML.jpg](images/329781_5_En_16_Chapter/329781_5_En_16_Fig8_HTML.jpg)\n\
    \nFigure 16-8  \nCentering a label inside a Collection View label\n\n20. Click\
    \ `Collection View` in the Document Outline and then choose `View ➤ Inspectors\
    \ ➤ Show Size Inspector`, or click the Size Inspector icon in the upper right\
    \ corner of the `Xcode` window.\n\n21. Click in the `Cell Size Width` text fields,\
    \ type `100`, and press `ENTER`.\n\n22. Click in the `Cell Size Height` text fields,\
    \ type `100`, and press `ENTER`.\n\n23. Click in the `Min Spacing For Cells` text\
    \ field, type `20`, and press `ENTER`.\n\n24. Click in the `Section Insets Top`\
    \ text field, type `15`, and press `ENTER`. `Xcode` moves the `Collection View\
    \ Cell` down from the top.\n\n25. Click in the `Section Insets Left` text field,\
    \ type `15`, and press `ENTER`. `Xcode` moves the `Collection View Cell` away\
    \ from the left edge as shown in Figure [16-9](#329781_5_En_16_Chapter.xhtml#Fig9).\n\
    \n![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig9_HTML.jpg](images/329781_5_En_16_Chapter/329781_5_En_16_Fig9_HTML.jpg)\n\
    \nFigure 16-9  \nModifying the cell size and spacing in a Collection View\n\n\
    26. Choose `View ➤ Assistant Editor ➤ Show Assistant Editor`, or click the Assistant\
    \ Editor icon in the upper right corner of the `Xcode` window. This displays the\
    \ `Main.storyboard` file on the left and the `ViewController.swift` file on the\
    \ right.\n\n27. Move the mouse pointer over the `Collection View` in the Document\
    \ Outline, hold down the `Control` key, and Ctrl-drag from the `Collection View`\
    \ to the `ViewController.swift` file underneath the `class ViewController` line.\n\
    \n28. Release the `Control` key and the left mouse button. A popup window appears.\n\
    \n29. Click in the `Name` text field and type `collectionView`. Then click the\
    \ `Connect` button. `Xcode` creates an `IBOutlet` as follows:\n\n```\n    @IBOutlet\
    \ var collectionView: UICollectionView!\n```\n\n30. Move the mouse pointer over\
    \ `Label` under `customCell` in the Document Outline. If `Xcode` does not display\
    \ the `itemCell.swift` file in the Assistant Editor, click the two intertwined\
    \ circles icon at the top of the Assistant Editor to display a menu.\n\n31. Choose\
    \ `Automatic ➤ itemCell.swift` as shown in Figure [16-10](#329781_5_En_16_Chapter.xhtml#Fig10).\n\
    \n![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig10_HTML.jpg](images/329781_5_En_16_Chapter/329781_5_En_16_Fig10_HTML.jpg)\n\
    \nFigure 16-10  \nChoosing the `itemCell.swift` file to appear in the Assistant\
    \ Editor\n\n32. Move the mouse pointer over the Label, hold down the `Control`\
    \ key, and Ctrl-drag from the Label under the `class TableViewCell` line in the\
    \ `itemCell.swift` file.\n\n33. Release the `Control` key and the left mouse button.\
    \ A popup window appears.\n\n34. Click in the `Name` text field, type `itemLabel`,\
    \ and click the `Connect` button. `Xcode` creates an `IBOutlet` as follows:\n\n\
    ```\n    @IBOutlet var itemLabel: UILabel!\n```\n\nThe entire `itemCell.swift`\
    \ file should look like this:\n\n```\n    import UIKit\n    class itemCell: UICollectionViewCell\
    \ {\n        @IBOutlet var itemLabel: UILabel!\n    }\n```\n\n35. Choose `View\
    \ ➤ Standard Editor ➤ Show Standard Editor`, or click the Standard Editor icon\
    \ in the upper right corner of the `Xcode` window.\n\n36. Click the `ViewController.swift`\
    \ file in the Navigator pane.\n\n37. Edit the `class ViewController` line as follows:\n\
    \n```\n    class ViewController: UIViewController, UICollectionViewDataSource,\
    \ UICollectionViewDelegate {\n```\n\n38. Type the following underneath the `IBOutlet`:\n\
    \n```\n    let petArray = [\"cat\", \"dog\", \"parakeet\", \"parrot\", \"canary\"\
    , \"finch\", \"tropical fish\", \"goldfish\", \"sea horses\", \"hamster\", \"\
    gerbil\", \"rabbit\", \"turtle\", \"snake\", \"lizard\", \"hermit crab\"]\n```\n\
    \n39. Edit the `viewDidLoad()` method as follows:\n\n```\n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        collectionView.dataSource = self\n \
    \       collectionView.delegate = self\n        // Do any additional setup after\
    \ loading the view.\n    }\n```\n\n40. Add the following function under the `viewDidLoad()`\
    \ method:\n\n```\n    func collectionView(_ collectionView: UICollectionView,\
    \ numberOfItemsInSection section: Int) -> Int {\n        return petArray.count\n\
    \    }\n```\n\n41. Add the following function under the previous function:\n\n\
    ```\n    func collectionView(_ collectionView: UICollectionView, cellForItemAt\
    \ indexPath: IndexPath) -> UICollectionViewCell {\n        let cell = collectionView.dequeueReusableCell(withReuseIdentifier:\
    \ \"customCell\", for: indexPath) as! itemCell\n        cell.itemLabel.text =\
    \ petArray[indexPath.row]\n        return cell\n    }\n```\n\n42. Add the following\
    \ function under the previous function:\n\n```\n    func collectionView(_ collectionView:\
    \ UICollectionView, didSelectItemAt indexPath: IndexPath) {\n        let alert\
    \ = UIAlertController(title: \"Your Choice\", message: \"\\(petArray[indexPath.row])\"\
    , preferredStyle: .alert)\n        let action = UIAlertAction(title: \"OK\", style:\
    \ .default, handler: nil)\n        alert.addAction(action)\n        self.present(alert,\
    \ animated: true, completion: nil)\n    }\n```\n\nThe entire `ViewController.swift`\
    \ file should look like this:\n\n```\n    import UIKit\n    class ViewController:\
    \ UIViewController, UICollectionViewDataSource, UICollectionViewDelegate {\n \
    \       @IBOutlet var collectionView: UICollectionView!\n        let petArray\
    \ = [\"cat\", \"dog\", \"parakeet\", \"parrot\", \"canary\", \"finch\", \"tropical\
    \ fish\", \"goldfish\", \"sea horses\", \"hamster\", \"gerbil\", \"rabbit\", \"\
    turtle\", \"snake\", \"lizard\", \"hermit crab\"]\n        override func viewDidLoad()\
    \ {\n            super.viewDidLoad()\n            collectionView.dataSource =\
    \ self\n            collectionView.delegate = self\n            // Do any additional\
    \ setup after loading the view.\n        }\n        func collectionView(_ collectionView:\
    \ UICollectionView, numberOfItemsInSection section: Int) -> Int {\n          \
    \  return petArray.count\n        }\n        func collectionView(_ collectionView:\
    \ UICollectionView, cellForItemAt indexPath: IndexPath) -> UICollectionViewCell\
    \ {\n            let cell = collectionView.dequeueReusableCell(withReuseIdentifier:\
    \ \"customCell\", for: indexPath) as! itemCell\n            cell.itemLabel.text\
    \ = petArray[indexPath.row]\n            return cell\n        }\n        func\
    \ collectionView(_ collectionView: UICollectionView, didSelectItemAt indexPath:\
    \ IndexPath) {\n            let alert = UIAlertController(title: \"Your Choice\"\
    , message: \"\\(petArray[indexPath.row])\", preferredStyle: .alert)\n        \
    \    let action = UIAlertAction(title: \"OK\", style: .default, handler: nil)\n\
    \            alert.addAction(action)\n            self.present(alert, animated:\
    \ true, completion: nil)\n        }\n    }\n```\n\n43. Click the Run button or\
    \ choose `Product ➤ Run`. The Simulator window appears, displaying text inside\
    \ the `Collection View` labels as shown in Figure [16-11](#329781_5_En_16_Chapter.xhtml#Fig11).\n\
    \n![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig11_HTML.jpg](images/329781_5_En_16_Chapter/329781_5_En_16_Fig11_HTML.jpg)\n\
    \nFigure 16-11  \nDisplaying text from an array in multiple Collection View Cells\n\
    \n44. Click a cell. An alert appears, listing the item you selected.\n\n45. Click\
    \ `OK` to dismiss the alert controller.\n\n46. Choose `Simulator ➤ Quit Simulator`\
    \ to return to Xcode.\n\nMaking any data appear in a Collection View Cell involves\
    \ dragging and dropping objects inside that Collection View Cell. This example\
    \ used a label but you can also add image views to display pictures inside each\
    \ Collection View Cell as well."
