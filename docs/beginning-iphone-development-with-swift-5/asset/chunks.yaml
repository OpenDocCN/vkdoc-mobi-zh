  trans: '

    # 6. 添加用户界面对象


    控制器包含出现在 iOS 屏幕上的用户界面。在最简单的层面上，一个控制器可以包含一个视图，该视图代表一个 iOS 屏幕。默认情况下，这个视图是空白的，因此要让它显示信息或为用户提供交互，您可以添加各种用户界面对象，例如按钮、文本字段、标签或滑块。


    用户界面对象通常执行两种不同的任务。其一，它们要么显示信息，要么允许用户输入信息。用于显示或允许输入的常见用户界面对象类型包括文本字段和标签。


    其二，它们为用户提供一种与用户界面交互以发出指令的方式。交互式用户界面对象的示例包括按钮、滑块和开关。


    要将对象放置在用户界面上，您必须打开“对象库”窗口并拖放一个对象。然后，您需要通过 `IBOutlet` 属性或 `IBAction` 方法将大多数对象连接到一个
    `.swift` 文件。无论您向用户界面添加什么类型的对象，都需要调整以下内容：


    -   大小

    -   位置

    -   其他属性，例如颜色、显示的文本等。


    每个用户界面对象都提供多个可修改的属性，但您可能不需要修改所有属性。您可以通过“检查器”面板或 Swift 代码来修改对象的属性。


    ## 更改对象的大小和位置


    将对象放置在用户界面上后，您可以使用鼠标更改其大小或位置，或者通过为其高度和宽度或从视图左上角测量的 X 和 Y 值（如图 6-1 所示）定义特定值来更改。


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig1_HTML.png](img/329781_5_En_6_Fig1_HTML.png)


    图 6-1 从左上角测量对象的 X 和 Y 位置


    通过使用鼠标，您可以轻松更改对象的大小或位置，但为对象的高度、宽度、X 和 Y 值定义特定值可以让您精确控制该对象的大小和位置。


    要了解如何更改用户界面上对象的大小和位置，请按照以下步骤操作：


    1.  使用“单视图应用”模板（参见第 1 章）创建一个新的 iOS 项目，并将此新项目命名为 `ObjectApp`。这会为用户界面创建一个单独的视图。


    2.  在导航器面板中单击 `Main.storyboard` 文件。Xcode 会显示该单一视图。


    3.  确保 Xcode 中间面板底部的“视图方式：”文本显示为 iPhone 8，如图 6-2 所示。


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig2_HTML.jpg](img/329781_5_En_6_Fig2_HTML.jpg)


    图 6-2 定义您的故事板用户界面以模拟 iPhone 8 屏幕


    4.  单击“库”图标以打开“对象库”窗口。


    5.  将一个按钮拖放到视图上的任意位置。按钮周围会出现手柄，如图 6-3 所示。任何时候您选择一个对象，手柄都会出现以显示您选择了哪些对象。


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig3_HTML.jpg](img/329781_5_En_6_Fig3_HTML.jpg)


    图 6-3 手柄出现在选中的对象周围


    6.  将鼠标指针移到按钮周围的手柄上，直到鼠标指针变成双向箭头。


    7.  拖动鼠标以调整按钮大小，使其变得更宽或更窄、更高或更短。当您更改对象的大小时，Xcode 会在该对象的左上角显示其当前宽度和高度，如图 6-4 所示。


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig4_HTML.jpg](img/329781_5_En_6_Fig4_HTML.jpg)


    图 6-4 拖动鼠标时查看对象的高度和宽度


    8.  确保手柄仍然出现在按钮周围。（如果没有，请单击按钮以将其选中。）


    9.  选择“视图”➤“检查器”➤“大小检查器”，或单击“检查器”面板顶部的“大小检查器”图标。“大小检查器”面板中的“视图”类别会显示用于指定所选对象的高度、宽度、X
    和 Y 值的文本字段，如图 6-5 所示。


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig5_HTML.jpg](img/329781_5_En_6_Fig5_HTML.jpg)


    图 6-5 “视图”类别允许您在“大小检查器”面板中定义大小和位置值


    10. 在“宽度”文本字段中单击，输入 `80`，然后按 ENTER 键。


    11. 在“高度”文本字段中单击，输入 `30`，然后按 ENTER 键。


    12. 将鼠标指针移到按钮上。当鼠标指针变成手形图标时，将按钮拖动到视图的左上角，直到看到两条蓝色参考线出现，如图 6-6 所示。


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig6_HTML.jpg](img/329781_5_En_6_Fig6_HTML.jpg)


    图 6-6 出现参考线以帮助您使用鼠标对齐对象


    13. 松开鼠标按钮。注意，停止移动鼠标后，蓝色参考线会消失。


    14. 单击 X 文本字段中的上/下箭头以更改其中显示的值。注意，当您增加 X 值时，按钮会向右移动；当您减小 X 值时，按钮会向左移动。


    15. 确保 X 文本字段中显示值为 16，然后单击 Y 文本字段。


    16. 单击 Y 文本字段中的上/下箭头。注意，当您增加 Y 值时，按钮会向下移动；当您减小 Y 值时，按钮会向上移动。


    17. 确保 Y 文本字段中显示值为 20。注意，当您定义特定的 X 或 Y 值来定义按钮在视图上的位置时，不会出现蓝色参考线，因为只有在使用鼠标移动对象时才会显示它们。

    '
- fmt: "### Changing an Object’s Attributes\n\nEvery object lets you define its size\
    \ and position, but you can also modify other attributes as well, depending on\
    \ the object. For example, a button lets you change a `Title` attribute that defines\
    \ the text that appears on a button, while a text field has a `Text` attribute\
    \ that defines the text that appears inside the text field.\n\nTo see how different\
    \ objects offer different types of attributes, follow these steps:\n\n1. Make\
    \ sure your `ObjectApp` project is loaded in `Xcode`.\n2. Click the `Main.storyboard`\
    \ file in the Navigator pane.\n3. Click the Library icon to display the Object\
    \ Library.\n4. Drag and drop a text field anywhere onto the storyboard.\n5. Move\
    \ the mouse pointer over the text field. When the mouse pointer turns into a hand\
    \ icon, drag the mouse underneath the button at the upper left corner of the view.\
    \ Notice that when you bring two objects near each other, guidelines appear to\
    \ help you align one object next to a second one as shown in Figure [6-7](#329781_5_En_6_Chapter.xhtml#Fig7).\n\
    \n   ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig7_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig7_HTML.jpg)\n\
    \n   Figure 6-7  \n   Guidelines appear when dragging an object near another object\n\
    \n6. Click the text field to select it so handles appear around it.\n7. Choose\
    \ `View ➤ Inspectors ➤ Show Attributes Inspector`, or click the Attributes Inspector\
    \ icon that appears at the top of the Inspector pane.\n8. Click in the `Text`\
    \ text field and type `Hello` and press `ENTER`. Notice that the text appears\
    \ in the `Text` text field and on the text field on the user interface as shown\
    \ in Figure [6-8](#329781_5_En_6_Chapter.xhtml#Fig8).\n\n   ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig8_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig8_HTML.jpg)\n\
    \n   Figure 6-8  \n   Changing the `Text` attribute of a text field\n\n9. Click\
    \ the button so handles appear around it. Notice that the Attributes Inspector\
    \ pane changes to display attributes for the selected button.\n10. Click in the\
    \ `Title` text field and type `OK` and press `ENTER`. Notice that `OK` now appears\
    \ on the button as well as shown in Figure [6-9](#329781_5_En_6_Chapter.xhtml#Fig9).\n\
    \n    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig9_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig9_HTML.jpg)\n\
    \n    Figure 6-9  \n    Changing the `Title` attribute of a button\n\n11. Click\
    \ the text field to select it.\n12. Choose `View ➤ Inspectors ➤ Show Size Inspector`,\
    \ or click the Size Inspector icon at the top of the Inspector pane.\n13. Click\
    \ in the `X` text field, type 16, and press `ENTER`. Notice that the text field\
    \ moves close to the left border of the view.\n14. Click in the `Y` text field,\
    \ type 115, and press `ENTER`. Notice that the text field appears under the button.\n\
    \n### Understanding the Safe Area\n\nAt this point, your `ObjectApp` user interface\
    \ contains a button in the upper left corner and a text field that appears underneath\
    \ the button. Since we started the storyboard currently mimics an iPhone 8, our\
    \ user interface will look perfect as long as it’s running on an iPhone 8 or running\
    \ in the Simulator when it’s mimicking an iPhone 8. However, if we switch our\
    \ storyboard to mimic an iPhone XR, suddenly the placement of the button no longer\
    \ looks right as shown in Figure [6-10](#329781_5_En_6_Chapter.xhtml#Fig10).\n\
    \n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig10_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig10_HTML.jpg)\n\
    \nFigure 6-10  \nViewing the `ObjectApp` user interface on an iPhone XR screen\n\
    \nThe problem is that we placed the button based on the size of the iPhone 8 screen,\
    \ but the iPhone XR screen has slightly different dimensions. When you’re designing\
    \ an iOS app, you never know which iOS device someone might run your app on such\
    \ as a smaller screen iPhone SE or a larger screen iPad Pro. Apple keeps introducing\
    \ different size iPhones and iPads every year, so you can never predict how screen\
    \ sizes may change in the future.\n\nTo help you design iOS apps that will look\
    \ good on any iOS device, now and in the future, `Xcode` offers two features:\n\
    \n- Safe Area\n- Auto Layout\n\nThe Safe Area defines the area where you should\
    \ place your user interface objects, so they will always appear properly on any\
    \ iOS device’s screen. To view the Safe Area of any iOS device, follow these steps:\n\
    \n1. Make sure the `ObjectApp` project is loaded in `Xcode`.\n2. Click the `Main.storyboard`\
    \ file in the Navigator pane to view the app’s user interface.\n3. Click `Safe\
    \ Area` in the Document Outline. (If the Document Outline is not visible, choose\
    \ `Editor ➤ Show Document Outline`, or click the Document Outline icon near the\
    \ bottom of the `Xcode` window.) `Xcode` shades the Safe Area so you can see where\
    \ you need to place user interface objects as shown in Figure [6-11](#329781_5_En_6_Chapter.xhtml#Fig11).\
    \ Notice that the button in Figure [6-11](#329781_5_En_6_Chapter.xhtml#Fig11)\
    \ appears outside the Safe Area, which explains why it doesn’t look right.\n\n\
    \   ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig11_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig11_HTML.jpg)\n\
    \n   Figure 6-11  \n   Viewing the Safe Area of an iOS device\n\n4. Click the\
    \ “View as:” button at the bottom of the `Xcode` window and choose a different\
    \ iOS device for the storyboard to mimic, such as an iPhone 8 Plus. Notice that\
    \ the button didn’t appear correctly on one iOS device but now appears correctly\
    \ on a different iOS device as shown in Figure [6-12](#329781_5_En_6_Chapter.xhtml#Fig12).\n\
    \n   ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig12_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig12_HTML.jpg)\n\
    \n   Figure 6-12  \n   Viewing the storyboard as an iPhone 8 Plus"
  raw: "## Changing an Object’s Attributes\n\nEvery object lets you define its size\
