- fmt: '# Using Stack Views


    When you have multiple objects on a user interface, it can be troublesome defining
    constraints for all of them. Even worse, once you define constraints for multiple
    objects, you might later want to move one or more objects to a different location.
    That means redefining constraints all over again.


    To use a stack view, just drag and drop a stack view from the `Object Library`
    window onto a view. Then drag and drop other objects into the stack view. The
    stack view ensures that objects align vertically or horizontally, so you just
    need to add constraints to the stack view itself. This eliminates the need to
    add constraints to the objects inside the stack view.


    Some of the properties you can modify in a stack view include:


    - `Axis` – Displays objects vertically or horizontally

    - `Alignment` – Defines how objects appear inside a stack view with the following
    options: `Fill`, `Top`, `Center`, `Bottom`, `First Baseline`, and `Last Baseline`

    - `Distribution` – Defines how objects appear inside a stack view with the following
    options: `Fill`, `Fill Equally`, `Fill Proportionally`, `Equal Spacing`, and `Equal
    Centering`

    - `Spacing` – Defines the distance between objects inside the stack view


    Changing the `Axis` lets you define how objects appear inside a stack view. `Horizontally`
    displays objects in a row. `Vertically` displays objects in a column as shown
    in Figure [13-13](#329781_5_En_13_Chapter.xhtml#Fig13). Although the `Object Library`
    window offers `Horizontal Stack Views` and `Vertical Stack Views`, you can simply
    modify the `Axis` property to change either stack view to act differently.


    ![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig13_HTML.jpg](images/329781_5_En_13_Chapter/329781_5_En_13_Fig13_HTML.jpg)


    Figure 13-13


    The `Attributes Inspector` pane for a stack view


    The `Alignment` property defines how objects appear arranged in a stack view:


    - `Fill` – Expands the height (horizontal stack) or width (vertical stack) of
    all objects to match the tallest or widest object

    - `Center` – Centers all objects horizontally or vertically

    - `Leading` (vertical stacks only) – Aligns all objects to the left side of the
    stack view

    - `Trailing` (vertical stacks only) – Aligns all objects to the right side of
    the stack view

    - `Top` (horizontal stacks only) – Aligns all objects to the top of the stack
    view

    - `Bottom` (horizontal stacks only) – Aligns all objects to the bottom of the
    stack view

    - `First Baseline` (horizontal stacks only) – Aligns all objects by the bottom
    of the first line of text (`First Baseline`) as shown in Figure [13-14](#329781_5_En_13_Chapter.xhtml#Fig14)

    - `Last Baseline` (horizontal stacks only) – Aligns all objects by the bottom
    of the last line of text (`First Baseline`) as shown in Figure [13-15](#329781_5_En_13_Chapter.xhtml#Fig15)


    ![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig15_HTML.jpg](images/329781_5_En_13_Chapter/329781_5_En_13_Fig15_HTML.jpg)


    Figure 13-15


    The `Last Baseline` is the bottom of the last line of text


    ![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig14_HTML.jpg](images/329781_5_En_13_Chapter/329781_5_En_13_Fig14_HTML.jpg)


    Figure 13-14


    The `First Baseline` is the bottom of the first line of text


    The `Distribution` property defines how objects resize themselves within a stack
    view:


    - `Fill` – The stack view expands or shrinks to make sure all objects are visible.

    - `Fill Equally` – Resizes all objects so they are the same width (horizontal
    stack) or height (vertical stack) based on the widest or tallest object.

    - `Fill Proportionally` – Resizes the stack view to expand or shrink so all objects
    inside remain their original size.

    - `Equal Spacing` – Adds an equal amount of space between all objects in the stack
    view.

    - `Equal Centering` – Maintains equal spacing between the centers of neighboring
    objects in addition to maintaining the value defined by the `Spacing` property
    to define distances between neighboring objects.


    The `Spacing` property defines the distance between the edges of neighboring objects
    in a stack view. Rather than resize a stack view directly, you can resize it by
    modifying its various properties so the stack view conforms to the objects it
    holds with no wasted space at the ends.


    Ultimately, the main purpose of stack views is to organize multiple objects vertically
    in columns or horizontally in rows. That way you don''t have to create constraints
    on multiple objects but just need to place constraints on a single stack view.'
