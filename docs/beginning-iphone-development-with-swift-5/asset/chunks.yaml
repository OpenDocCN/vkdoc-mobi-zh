  trans: "\n# 让图像视图实现交互\n\n默认情况下，图像视图会忽略所有触摸交互。要让图像视图响应触摸，可以通过以下两种方式之一启用用户交互，如图 9-5\
    \ 所示：\n\n![../images/329781_5_En_9_Chapter/329781_5_En_9_Fig5_HTML.jpg](img/329781_5_En_9_Fig5_HTML.jpg)\n\
    \n图 9-5  \n允许图像视图响应触摸手势\n\n*   选中**启用用户交互**复选框。\n*   使用 Swift 代码将 `.isUserInteractionEnabled`\
    \ 属性设置为 `true`。\n\n要了解如何使图像视图响应触摸手势，请按照以下步骤操作：\n\n1.  在 `ImageViewApp` 项目的导航器窗格中，点击\
    \ `Main.storyboard` 文件。\n2.  选择“视图” ➤ “助理编辑器” ➤ “显示助理编辑器”，或点击助理编辑器图标。Xcode 会并排显示\
    \ `Main.storyboard` 和 `ViewController.swift` 文件。\n3.  将鼠标指针移到图像视图上，按住 Control\
    \ 键，然后从图像视图按住 Control 键拖拽到 `ViewController.swift` 文件中 `“class ViewController”`\
    \ 行下方的位置。\n4.  松开 Control 键和鼠标左键。会弹出一个窗口。\n5.  在“名称”文本字段中点击，输入 **imageView**，然后点击“连接”按钮。Xcode\
    \ 会创建一个 `IBOutlet` 变量，如下所示：\n\n    ```\n    @IBOutlet var imageView: UIImageView!\n\
    \    ```\n\n1.  选择“视图” ➤ “标准编辑器” ➤ “显示标准编辑器”，或点击标准编辑器图标。\n2.  在导航器窗格中点击 `ViewController.swift`\
    \ 文件。\n3.  向 `viewDidLoad` 方法添加以下代码行：\n\n    ```\n    imageView.isUserInteractionEnabled\
    \ = true\n    ```\n\n1.  在 `viewDidLoad` 方法下方键入以下代码：\n\n    ```\n    override\
    \ func touchesBegan(_ touches: Set<UITouch>, with event: UIEvent?) {\n    let\
    \ touch = touches.first\n    if touch?.view == imageView {\n    print (\"Touched\"\
    )\n    } else {\n    print (\"Nothing \")\n    }\n    }\n    ```\n\n每当用户点击屏幕时，上述\
    \ `touchesBegan` 方法都会运行。（在模拟器中，点击鼠标模拟手指点击。）`if-else` 语句会检查用户是否点击了图像视图。如果是，则输出“Touched”。如果用户点击了图像视图以外的区域，则输出“Nothing”。\n\
    \n整个 `ViewController.swift` 文件应如下所示：\n\n```\nimport UIKit\nclass ViewController:\
    \ UIViewController {\n@IBOutlet var imageView: UIImageView!\noverride func viewDidLoad()\
    \ {\nsuper.viewDidLoad()\nimageView.isUserInteractionEnabled = true\n// 视图加载后执行任何其他设置，通常从\
    \ nib 文件加载。\n}\noverride func touchesBegan(_ touches: Set<UITouch>, with event:\
    \ UIEvent?) {\nlet touch = touches.first\nif touch?.view == imageView {\nprint\
    \ (\"Touched\")\n} else {\nprint (\"Nothing \")\n}\n}\n}\n```\n\n1.  点击“运行”按钮或选择“产品”\
    \ ➤ “运行”。模拟器屏幕出现。\n2.  点击您存储在图像视图中的图形图像。注意，每次点击图像视图时，Xcode 窗口底部的“调试区域”都会显示“Touched”。\n\
    3.  点击模拟器屏幕上远离图像视图的任何其他位置。注意，每次点击图像视图以外的区域时，Xcode 窗口底部的“调试区域”都会显示“Nothing”。\n\
    4.  选择“模拟器” ➤ “退出模拟器”以返回 Xcode。\n\n# 使用文本视图\n\n文本视图的行为类似于文本字段。主要区别在于，文本视图可以更大，更像是一个微型文字处理器，允许用户移动光标并查看或编辑大量文本。由于文本视图既可以显示文本，也允许用户输入文本，因此需要修改的第一个属性是是否希望文本视图可编辑。\n\
    \n可编辑的文本视图意味着用户可以修改其中显示的文本。不可编辑的文本视图意味着用户无法修改文本，因此文本视图就像一个大的标签。修改文本视图可编辑属性的方法有两种：\n\
    \n*   在属性检查器中选中“可编辑”复选框（默认已选中），如图 9-6 所示。\n*   使用 Swift 代码将文本视图的 `.editable` 属性设置为\
    \ `true`。\n\n![../images/329781_5_En_9_Chapter/329781_5_En_9_Fig6_HTML.jpg](img/329781_5_En_9_Fig6_HTML.jpg)\n\
    \n图 9-6  \n使文本视图可编辑\n\n要了解如何使用文本视图，请按照以下步骤操作：\n\n1.  使用“单视图应用”模板创建一个新的 iOS 项目（参见第\
    \ 1 章），并将此新项目命名为 `TextViewApp`。这会为用户界面创建一个单视图。\n2.  在导航器窗格中点击 `Main.storyboard`\
    \ 文件。Xcode 会显示该单视图。\n3.  点击库图标以打开对象库窗口。\n4.  在视图顶部附近拖放一个文本视图和一个按钮。\n5.  选择“编辑器”\
    \ ➤ “解决自动布局问题” ➤ “重置为建议的约束”（位于子菜单的下半部分）。这会为文本视图和按钮添加约束。\n6.  选择“视图” ➤ “助理编辑器”\
    \ ➤ “显示助理编辑器”，或点击助理编辑器图标。Xcode 会并排显示 `Main.storyboard` 和 `ViewController.swift`\
    \ 文件。\n7.  将鼠标指针移到文本视图上，按住 Control 键，然后从文本视图按住 Control 键拖拽到 `ViewController.swift`\
    \ 文件中 `“class ViewController”` 行下方的位置。\n8.  松开 Control 键和鼠标左键。会弹出一个窗口。\n9.  在“名称”文本字段中点击，输入\
    \ **textView**，然后点击“连接”按钮。Xcode 会创建一个 `IBOutlet` 变量，如下所示：\n\n    ```\n    @IBOutlet\
    \ var textView: UITextView!\n    ```\n\n1.  将鼠标指针移到按钮上，按住 Control 键，然后从按钮按住 Control\
    \ 键拖拽到 `ViewController.swift` 文件中 `IBOutlet` 行下方的位置。\n2.  松开 Control 键和鼠标左键。会弹出一个窗口。\n\
    3.  在“名称”文本字段中点击，输入 **buttonObject**，然后点击“连接”按钮。Xcode 会创建一个 `IBOutlet` 变量，如下所示：\n\
    \n    ```\n    @IBOutlet var buttonObject: UIButton!\n    ```\n\n1.  将鼠标指针移到按钮上，按住\
    \ Control 键，然后按住 Control 键拖拽到 `ViewController.swift` 文件底部最后一个右花括号的上方。\n2.  松开\
    \ Control 键和鼠标左键。会弹出一个窗口。\n3.  在“名称”文本字段中点击，输入 **buttonTapped**，点击“类型”弹出菜单并选择\
    \ `UIButton`，然后点击“连接”按钮。Xcode 会创建一个 `IBAction` 方法，如下所示：\n\n    ```\n    @IBAction\
    \ func buttonTapped(_ sender: UIButton) {\n    }\n    ```\n\n4.  编辑 `buttonTapped`\
    \ `IBAction` 方法，如下所示：\n\n    ```\n    @IBAction func buttonTapped(_ sender: UIButton)\
    \ {\n    if textView.isEditable == true {\n    textView.isEditable = false\n \
    \   } else {\n    textView.isEditable = true\n    }\n    }\n    ```\n"
- fmt: '### Note


    When assigning a value to a variable, you use a single (`=`) equal sign, but when
    comparing two values, you use a double equal sign (`==`).


    This `IBAction` method toggles the text view between making it editable or not.
    When a text view is editable, you can modify the text. When a text view is not
    editable, you cannot edit the text. The entire `ViewController.swift` file should
    look like this:


    1. Click the Run button or choose Product ➤ Run. The Simulator window appears.

    2. Click in the text view. Press the BACKSPACE and DELETE keys to delete text.

    3. Click the button. This runs the Swift code in the `buttonTapped` IBAction method,
    which makes the text view non-editable.

    4. Click in the text view. Notice that you cannot edit the text in the text view
    anymore.

    5. Repeat steps 18–20 to see how you can switch the text view from being editable
    to not being editable.

    6. Chose Simulator ➤ Quit Simulator to return to Xcode.


    ```

    import UIKit

    class ViewController: UIViewController {

    @IBOutlet var textView: UITextView!

    @IBOutlet var buttonObject: UIButton!

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view, typically from a nib.

    }

    @IBAction func buttonTapped(_ sender: UIButton) {

    if textView.isEditable == true {

    textView.isEditable = false

    } else {

    textView.isEditable = true

    }

    }

    }

    ```


    ### Changing Text Appearance in a Text View


    Unlike a word processor that lets you selectively change the appearance of different
    text, all text inside a text view always appears in the same text color, background
    color, font, and font size. The properties to modify text color, background color,
    font, and font size in Swift are as follows:


    * `.text` – Defines the actual text that appears in the text view

    * `.backgroundColor` – Defines the background of the text view

    * `.textColor` – Defines the color of the text

    * `.font` – Defines the font and font size of text


    To see how to modify the appearance of text using Swift code, follow these steps:


    1. Choose View ➤ Standard Editor ➤ Show Standard Editor, or click the Standard
    Editor icon in the upper right corner of the Xcode window.

    2. Click the `ViewController.swift` file in the Navigator pane. Xcode displays
    the `ViewController.swift` file.

    3. Modify the `buttonTapped` IBAction method as follows:


    ```

    @IBAction func buttonTapped(_ sender: UIButton) {

    if textView.isEditable == true {

    textView.isEditable = false

    textView.backgroundColor = UIColor.yellow

    textView.textColor = UIColor.blue

    textView.font = UIFont(name: "Courier", size: 24)

    } else {

    textView.isEditable = true

    textView.backgroundColor = UIColor.blue

    textView.textColor = UIColor.white

    textView.font = UIFont(name: "Ariel", size: 10)

    }

    }

    ```


    4. Click the Run button or choose Product ➤ Run. The Simulator window appears.

    5. Click the button. Notice how the text changes appearance in the text view with
    a yellow background and blue text color.

    6. Click the button again. Notice that now the text appears with a blue background
    and a white text color along with a smaller font size.

    7. Choose Simulator ➤ Quit Simulator to return to Xcode.


    ### Creating Clickable Text in a Text View


    If you type in an iOS app like Notes or Messages, you may notice that if you type
    a phone number, web site URL, or date, that text gets highlighted so you can tap
    on it to take action. For example, if you type a phone number in the Notes app,
    that phone number text appears highlighted. If you tap this highlighted text,
    then an iPhone can call this phone number.


    To make clickable text appear in a text view, the text view must not be editable.
    Some of the different types of clickable text a text view can highlight include:


    * `.address` – Detects street addresses

    * `.calendarEvent` – Detects times and dates

    * `.flightNumber` – Detects airline flight numbers

    * `.link` – Detects URLs

    * `.lookupSuggestion` – Detects words or phrases such as restaurant names, movie
    titles, celebrity names, etc.

    * `.phoneNumber` – Detects phone numbers


    You can define clickable text using Swift code or by selecting a check box in
    the Data Detectors category in the Attributes Inspector pane as shown in Figure
    [9-7](#329781_5_En_9_Chapter.xhtml#Fig7).


    ![../images/329781_5_En_9_Chapter/329781_5_En_9_Fig7_HTML.jpg](images/329781_5_En_9_Chapter/329781_5_En_9_Fig7_HTML.jpg)


    Figure 9-7


    Defining clickable text in the Data Detectors category of the Attributes Inspector
    pane


    To see how to make text clickable in a text view, follow these steps:


    1. Make sure the `TextViewApp` project is loaded in Xcode.

    2. Click the `ViewController.swift` file in the Navigator pane to edit the `ViewController.swift`
    file.

    3. Edit the `viewDidLoad` method as follows:


    ```

    override func viewDidLoad() {

    super.viewDidLoad()

    textView.dataDetectorTypes = UIDataDetectorTypes.link

    textView.isEditable = false

    textView.isSelectable = true

    textView.text = "This is an example of clickable text www.yahoo.com"

    // Do any additional setup after loading the view, typically from a nib.

    }

    ```


    The entire `ViewController.swift` file should look like this:


    ```

    import UIKit

    class ViewController: UIViewController {

    @IBOutlet var textView: UITextView!

    @IBOutlet var buttonObject: UIButton!

    override func viewDidLoad() {

    super.viewDidLoad()

    textView.dataDetectorTypes = UIDataDetectorTypes.link

    textView.isEditable = false

    textView.isSelectable = true

    textView.text = "This is an example of clickable text www.yahoo.com"

    // Do any additional setup after loading the view, typically from a nib.

    }

    @IBAction func buttonTapped(_ sender: UIButton) {

    if textView.isEditable == true {

    textView.isEditable = false

    textView.backgroundColor = UIColor.yellow

    textView.textColor = UIColor.blue

    textView.font = UIFont(name: "Courier", size: 24)

    } else {

    textView.isEditable = true

    textView.backgroundColor = UIColor.blue

    textView.textColor = UIColor.white

    textView.font = UIFont(name: "Ariel", size: 10)

    }

    }

    }

    ```


    4. Click the Run button or chose Product ➤ Run. The Simulator window appears.
    Notice that the URL `www.yahoo.com` appears highlighted as a blue hyperlink.

    5. Click the `www.yahoo.com` hyperlink. The Simulator displays the Safari browser
    and the `www.yahoo.com` web site, which is exactly what would happen if this app
    were running on a real iPhone or iPad.

    6. Choose Simulator ➤ Quit Simulator to return to Xcode.'
