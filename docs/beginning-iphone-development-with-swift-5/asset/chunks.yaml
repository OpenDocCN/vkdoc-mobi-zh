    6.  Click the Library icon to open the Object Library window (see Figure [5-1](#329781_5_En_5_Chapter.xhtml#Fig1)).


    7.  Drag and drop a View Controller from the Library window to Xcode as shown
    in Figure [5-3](#329781_5_En_5_Chapter.xhtml#Fig3). Xcode displays the new View
