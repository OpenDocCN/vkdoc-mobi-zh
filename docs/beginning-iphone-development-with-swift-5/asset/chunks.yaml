    \n**图 7-19** 当用户点击文本字段时，虚拟键盘出现\n\n14. 点击虚拟键盘上的按键，在文本字段中输入一个单词。\n\n15. 点击第二个文本字段，并使用虚拟键盘输入另一个单词。\n\
    \n16. 点击文本字段之外的任意位置。请注意，虚拟键盘会消失。\n\n17. 选择`模拟器` ➤ `退出模拟器`，返回 Xcode。\n\n### 定义不同的键盘\n\
    \n了解如何让虚拟键盘出现和消失而不遮挡文本字段后，下一步是学习如何自定义当用户点击文本字段时出现的键盘类型。默认的虚拟键盘仅显示字母（见图 7-19）。但是，如果文本字段需要存储数字呢？此时，你可以显示一个数字虚拟键盘，如图\
    \ 7-20 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig20_HTML.jpg](img/329781_5_En_7_Fig20_HTML.jpg)\n\
    \n**图 7-20** 数字虚拟键盘\n\n通过提供不同的键盘选项，Xcode 允许你为特定文本字段选择最合适的键盘。例如，如果你预期用户输入 URL（网站）地址，可以选择一个显示`.com`键的虚拟键盘，方便用户输入常见网址。如果文本字段需要输入电话号码，那么虚拟键盘可以显示典型的电话号码拨号盘（见图\
    \ 7-20）。通过选择不同的虚拟键盘，你可以让用户在文本字段中输入特定数据变得更加便捷。\n\n在我们的`TextFieldApp`项目中，有两个文本字段。要查看如何为每个文本字段选择并显示不同的虚拟键盘，请按照以下步骤操作：\n\
    \n1. 确保`TextFieldApp`项目已在 Xcode 中加载。\n\n2. 点击导航窗格中的`Main.storyboard`文件，查看应用程序的用户界面。\n\
    \n3. 点击一个文本字段，然后选择`视图` ➤ `检查器` ➤ `显示属性检查器`，或点击检查器窗格顶部的`属性检查器`图标。\n\n4. 点击`键盘类型`弹出菜单，显示弹出菜单，如图\
    \ 7-21 所示。\n\n   ![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig21_HTML.jpg](img/329781_5_En_7_Fig21_HTML.jpg)\n\
    \n   **图 7-21** 选择要显示的不同虚拟键盘\n\n5. 选择一种虚拟键盘，例如`URL`或`数字小键盘`。\n\n6. 点击第二个文本字段，然后点击`键盘类型`弹出菜单，选择不同的虚拟键盘，例如`电子邮件地址`或`网页搜索`。\n\
    \n7. 点击`运行`按钮或选择`产品` ➤ `运行`。模拟器窗口出现。\n\n8. 点击一个文本字段。注意你为该文本字段定义的虚拟键盘的外观。\n\n9.\
    \ 点击第二个文本字段。注意该文本字段的虚拟键盘与此不同，如图 7-22 所示。\n\n   ![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig22_HTML.jpg](img/329781_5_En_7_Fig22_HTML.jpg)\n\
    \n   **图 7-22** 数字和标点虚拟键盘\n\n10. 选择`模拟器` ➤ `退出模拟器`，返回 Xcode。\n```"
- fmt: "### Defining the Content of a Text Field\n\nText fields capture text input\
    \ from the user, but every text field has a different purpose. One text field\
    \ might capture names, while a second text field might capture numeric data such\
    \ as telephone numbers. Yet another text field might need to capture a password.\n\
    \nTo define different ways a text field can accept data, the `Attributes Inspector`\
    \ pane displays a `Text Input Traits` category with different options you can\
    \ choose as shown in Figure [7-23](#329781_5_En_7_Chapter.xhtml#Fig23).\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig23_HTML.jpg](images/329781_5_En_7_Chapter/329781_5_En_7_Fig23_HTML.jpg)\n\
    \nFigure 7-23\n\nThe `Text Input Traits` category on the `Attributes Inspector`\
    \ pane\n\nSome of the different options you can customize include:\n\n- **Content\
    \ Type** – Defines the type of data the text field should expect such as a telephone\
    \ number or name\n- **Capitalization** – Defines whether to capitalize every word,\
    \ only the beginning of sentences, or every character\n- **Correction** – Defines\
    \ whether Auto-correct is turned on or off\n- **Keyboard Look** – Defines a dark\
    \ or light appearance\n- **Return Key** – Defines the title that appears on the\
    \ Return Key such as `Return`, `Join`, `Next`, `Search`, or `Done`\n\nThe `Secure\
    \ Text Entry` check box lets you configure a text field to hide the actual characters\
    \ typed by a user, which can be useful to mask a password.\n\nTo see how these\
    \ different text field options can work, follow these steps:\n\n1. Make sure the\
    \ `TextFieldApp` project is loaded in `Xcode`.\n2. Click the `Main.storyboard`\
    \ file in the `Navigator` pane.\n3. Click in a text field and choose `View ➤ Inspectors\
    \ ➤ Show Attributes Inspector`, or click the `Attributes Inspector` icon at the\
    \ top of the `Inspector` pane.\n4. Click the `Content Type` popup menu and choose\
    \ `Password` as shown in Figure [7-24](#329781_5_En_7_Chapter.xhtml#Fig24).\n\
    \   ![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig24_HTML.jpg](images/329781_5_En_7_Chapter/329781_5_En_7_Fig24_HTML.jpg)\n\
    \   Figure 7-24\n   Changing the content type of a text field to `Password`\n\
    5. Click the `Keyboard Type` popup menu and choose `Default`.\n6. Click the `Return\
    \ Key` popup menu and choose `Done`.\n7. Select the `Secure Text Entry` check\
    \ box.\n8. Click in the other text field.\n9. Click the `Content Type` popup menu\
    \ and choose `E-mail Address`.\n10. Click the `Keyboard Type` popup menu and choose\
    \ `E-Mail Address`.\n11. Click the `Return Key` popup menu and choose `Send`.\n\
    12. Click the `Run` button or choose `Product ➤ Run`. The `Simulator` window appears.\n\
    13. Click in the text field defined as `Password` content type. The virtual keyboard\
    \ appears and displays `Done` in the bottom right corner.\n14. Click the virtual\
    \ keyboard keys. Notice that as you type, the text field masks the actual characters\
    \ as shown in Figure [7-25](#329781_5_En_7_Chapter.xhtml#Fig25).\n    ![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig25_HTML.jpg](images/329781_5_En_7_Chapter/329781_5_En_7_Fig25_HTML.jpg)\n\
    \    Figure 7-25\n    Masking typed characters in a text field\n15. Click in the\
    \ other text field. Notice that the Web Search virtual keyboard appears that displays\
    \ a `@` key and a `Send` button in the bottom right corner as shown in Figure\
    \ [7-26](#329781_5_En_7_Chapter.xhtml#Fig26).\n    ![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig26_HTML.jpg](images/329781_5_En_7_Chapter/329781_5_En_7_Fig26_HTML.jpg)\n\
    \    Figure 7-26\n    Displaying a virtual keyboard with a `Send` return key\n\
    16. Choose `Simulator ➤ Quit Simulator` to return to `Xcode`.\n\nBy configuring\
    \ the text field and the virtual keyboard that appears, you can customize a text\
    \ field for allowing the user to enter specific types of information using a virtual\
    \ keyboard optimized for that task.\n\n### Modifying the Appearance of a Text\
    \ Field\n\nOnce you know the type of data a text field will hold and the best\
    \ virtual keyboard to appear for that particular text field, the final step involves\
    \ modifying the text field's appearance. Several ways you can modify a text field's\
    \ appearance include:\n\n- **Text** – Stores the text that appears in a text field\n\
    - **Placeholder** – Defines text that appears in light gray to explain to the\
    \ user the type of text the text field expects such as a password or name\n- **Color**\
    \ – Defines the color of text in a text field\n- **Font** – Defines the font and\
    \ font size of text in a text field\n- **Clear button** – Defines whether a clear\
    \ button appears in a text field, which allows the user to delete everything in\
    \ a text field\n\nWhile you can modify these properties in the `Inspector` pane,\
    \ you can also define them using Swift code. First, we'll need to create an `IBOutlet`\
    \ for the text field we want to modify using Swift code. Then we'll need to write\
    \ Swift code to modify each property of the text field. To see all properties\
    \ you can modify in a text field, choose `Help ➤ Developer Documentation` and\
    \ search for `UITextField`.\n\nTo see how to customize the appearance of a text\
    \ field using Swift code, follow these steps:\n\n1. Make sure the `TextFieldApp`\
    \ project is loaded in `Xcode`.\n2. Click the `Main.storyboard` file in the `Navigator`\
    \ pane.\n3. Choose `View ➤ Assistant Editor ➤ Show Assistant Editor` or click\
    \ the `Assistant Editor` icon in the upper right corner of the `Xcode` window.\
    \ `Xcode` displays the `ViewController.swift` file next to the `Main.storyboard`\
    \ file.\n4. Move the mouse pointer over the text field that does not have the\
    \ `Secure Text Entry` check box selected, hold down the `Control` key, and `Ctrl-drag`\
    \ from the text field to the `ViewController.swift` file underneath the `class\
    \ ViewController` line.\n5. Release the `Control` key and the left mouse button.\
    \ A popup menu appears.\n6. Click in the `Name` text field and type **myTextField**.\n\
    7. Click the `Connect` button. `Xcode` creates an `IBOutlet` as shown here:\n\n\
    ```\n@IBOutlet var myTextField: UITextField!\n```\n\n8. Click the `ViewController.swift`\
    \ file in the `Navigator` pane.\n9. Choose `View ➤ Standard Editor ➤ Show Standard\
    \ Editor`, or click the `Standard Editor` icon in the upper right corner of the\
    \ `Xcode` window. `Xcode` displays the `ViewController.swift` file.\n10. Add the\
    \ following code to the `viewDidLoad` function:\n\n```\nmyTextField.placeholder\
    \ = \"Email address here\"\nmyTextField.textColor = UIColor.red\nmyTextField.font\
    \ = UIFont(name: \"Courier\", size: 16)\nmyTextField.clearButtonMode = .whileEditing\n\
    ```\n\nThe entire `ViewController.swift` file should look like this:"
