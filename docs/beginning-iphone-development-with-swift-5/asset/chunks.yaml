- fmt: "### Modifying a Slider with Swift Code\n\nJust as you can customize a slider\
    \ through the Attributes Inspector pane, so can you modify a slider using Swift\
    \ code. Some of the common properties to modify on a slider include:\n\n- `.value`\
    \ – Defines the initial value displayed by the slider\n- `.minimumValue` – Defines\
    \ the minimum value the slider can represent\n- `.maximumValue` – Defines the\
    \ maximum value the slider can represent\n- `.thumbTintColor` – Defines the color\
    \ of the thumb on the slider\n- `.minimumTrackTintColor` – Defines the color of\
    \ the minimum track\n- `.maximumTrackTintColor` – Defines the color of the maximum\
    \ track\n\nTo see how to use Swift code to modify a slider, follow these steps:\n\
    \n1. Make sure the SliderApp project is loaded in Xcode.\n2. Click the `ViewController.swift`\
    \ file in the Navigator pane to edit the `ViewController.swift` file.\n3. Modify\
    \ the `changeSlider` IBAction method as follows:\n\n```swift\n@IBAction func changeSlider(_\
    \ sender: UIButton) {\n    sliderValue.minimumValue = 1\n    sliderValue.maximumValue\
    \ = 25\n    sliderValue.value = 7\n    sliderValue.minimumTrackTintColor = UIColor.red\n\
    \    sliderValue.maximumTrackTintColor = UIColor.green\n    sliderValue.thumbTintColor\
    \ = UIColor.black\n}\n```\n\nThe entire `ViewController.swift` file should look\
    \ like this:\n\n```swift\nimport UIKit\nclass ViewController: UIViewController\
    \ {\n    @IBOutlet var labelValue: UILabel!\n    @IBOutlet var sliderValue: UISlider!\n\
    \    override func viewDidLoad() {\n        super.viewDidLoad()\n        // Do\
    \ any additional setup after loading the view, typically from a nib.\n    }\n\
    \    @IBAction func changeSlider(_ sender: UIButton) {\n        sliderValue.minimumValue\
    \ = 1\n        sliderValue.maximumValue = 25\n        sliderValue.value = 7\n\
    \        sliderValue.minimumTrackTintColor = UIColor.red\n        sliderValue.maximumTrackTintColor\
    \ = UIColor.green\n        sliderValue.thumbTintColor = UIColor.black\n    }\n\
    \    @IBAction func sliderValueChanged(_ sender: UISlider) {\n        labelValue.text\
    \ = \"\\(sliderValue.value)\"\n    }\n}\n```\n\n4. Click the Run button or choose\
    \ Product ➤ Run. The Simulator window appears.\n5. Drag the slider left and right.\
    \ Notice that the label displays a value between 0 and 1, which are the minimum\
    \ and maximum values defined by the Attributes Inspector pane.\n6. Click the button.\
    \ This runs the Swift code to modify the slider.\n7. Drag the slider left and\
    \ right. Notice that the label now displays a value between 1 and 25. In addition,\
    \ the slider appears with the thumb, minimum track, and maximum track displayed\
    \ in different colors.\n8. Choose Simulator ➤ Quit Simulator to return to Xcode.\n\
    \n## Using the Progress and Activity Indicator Views\n\nThe Progress View displays\
    \ a horizontal bar that fills with color to visually show the progress of a task.\
    \ When the Progress View is empty, that means the task hasn’t started yet. When\
    \ the Progress View is completely filled with color, that means the task is completed.\
    \ When the Progress View is partially filled, that indicates the task is partially\
    \ completed.\n\nHowever, it’s not always possible to know exactly when a task\
    \ might be completed. In that case, the Progress View would appear stagnant, giving\
    \ the illusion that nothing is happening or that the app may have crashed. When\
    \ the completion of a task can’t be determined, it’s better to use the Activity\
    \ Indicator View, which displays an animated spinner that shows something’s happening.\n\
    \nThe main differences between the Progress View and the Activity Indicator View\
    \ are:\n\n- The Progress View shows how far a task has been completed, while an\
    \ Activity Indicator View does not.\n- The Activity Indicator View constantly\
    \ shows that something is happening, while a Progress View may not.\n\nTo see\
    \ how to use the Progress and Activity Indicator views, follow these steps:\n\n\
    1. Create a new iOS project using the Single View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml))\
    \ and name this new project `ProgressApp`. This creates a single view for the\
    \ user interface.\n2. Click the `Main.storyboard` file in the Navigator pane.\
    \ Xcode displays the single view.\n3. Click the Library icon to display the Object\
    \ Library.\n4. Drag and drop a button and Activity Indicator View onto the user\
    \ interface as shown in Figure [8-4](#329781_5_En_8_Chapter.xhtml#Fig4).\n\n![../images/329781_5_En_8_Chapter/329781_5_En_8_Fig4_HTML.png](images/329781_5_En_8_Chapter/329781_5_En_8_Fig4_HTML.png)\n\
    \nFigure 8-4 – Dragging the Activity Indicator View from the Object Library window\
    \ to the user interface\n\n5. Choose Editor ➤ Resolve Auto Layout Issues ➤ Reset\
    \ to Suggested Constraints on the bottom half of the submenu. This will add constraints\
    \ to all objects on the user interface.\n6. Click the `Main.storyboard` file in\
    \ the Navigator pane.\n7. Choose View ➤ Assistant Editor ➤ Show Assistant Editor,\
    \ or click the Assistant Editor icon in the upper right corner of the Xcode window.\
    \ Xcode displays the `Main.storyboard` file side by side with the `ViewController.swift`\
    \ file.\n8. Move the mouse over the Activity Indicator View, hold down the Control\
    \ key, and Ctrl-drag to the `ViewController.swift` file underneath the `IBOutlet`\
    \ line.\n9. Release the Control key and the left mouse button. A popup window\
    \ appears.\n10. Click in the Name text field and type `activityView`, and click\
    \ the Connect button. Xcode creates an `IBOutlet` as follows:\n\n```swift\n@IBOutlet\
    \ var activityView: UIActivityIndicatorView!\n```\n\n11. Move the mouse over the\
    \ button, hold down the Control key, and Ctrl-drag to the `ViewController.swift`\
    \ file above the last curly bracket at the bottom of the file.\n12. Release the\
    \ Control key and the left mouse button. A popup window appears.\n13. Click in\
    \ the Name text field and type `runButton`, click in the Type popup menu and choose\
    \ `UIButton`, and click the Connect button. Xcode creates an `IBAction` method\
    \ as follows:\n\n```swift\n@IBAction func runButton(_ sender: UIButton) {\n}\n\
    ```\n\n14. Choose View ➤ Standard Editor ➤ Show Standard Editor, or click the\
    \ Standard Editor icon in the upper right corner of the Xcode window.\n15. Click\
    \ the `ViewController.swift` file in the Navigator pane.\n16. Add this line above\
    \ the `IBOutlet` variables:\n\n```swift\nvar counter = 0\n```\n\n17. Add this\
    \ line inside the `viewDidLoad` function:\n\n```swift\nactivityView.hidesWhenStopped\
    \ = true\n```\n\n18. Edit this `runButton` IBAction method as follows:\n\n```swift\n\
    @IBAction func runButton(_ sender: UIButton) {\n    Timer.scheduledTimer(withTimeInterval:\
    \ 1.0, repeats: true) { timer in\n        self.activityView.startAnimating()\n\
    \        self.counter += 1\n        if self.counter >= 5 {\n            self.activityView.stopAnimating()\n\
    \            timer.invalidate()\n        }\n    }\n}\n```"
