    \nFigure 15-7\n\nThe design of two labels and an image view on the Table View\
    \ Cell\n\n![../images/329781_5_En_15_Chapter/329781_5_En_15_Fig6_HTML.jpg](images/329781_5_En_15_Chapter/329781_5_En_15_Fig6_HTML.jpg)\n\
