    \    myLabel.isEnabled = false\n    }\n    ```\n\n**Note**  In the preceding Swift\
    \ code, the \\n symbol stands for new line. This forces the text to appear on\
    \ the next line below.\n\n7.  Click the Run button or choose Product ➤ Run. The\
    \ Simulator displays your app in a simulated iOS device.\n\n8.  Click the button\
    \ on the user interface. The Swift code modifies the text by changing the text,\
    \ the number of lines to display in the label, the font and font size, and the\
    \ background color and disabling it as shown in Figure [7-16](#329781_5_En_7_Chapter.xhtml#Fig16).\n\
    \n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig16_HTML.jpg](images/329781_5_En_7_Chapter/329781_5_En_7_Fig16_HTML.jpg)\n\
    \nFigure 7-16\n\nDisplaying modified text in a label using Swift code\n\n9.  Choose\
    \ Simulator ➤ Quit Simulator to return to Xcode.\n\nNotice that Swift code can\
    \ modify every property of the label. To learn the exact Swift command to use,\
    \ you’ll need to look in Apple’s documentation. Since we need to access properties\
    \ of a label, we need to look up what properties are available to a label. In\
    \ iOS, Label objects are called UILabel.\n\nTo view Apple’s documentation within\
    \ Xcode, choose Help ➤ Developer Documentation to open the documentation window.\
    \ Then type the word or phrase that you want to find. In this case, we want information\
    \ about labels, so we’d type UILabel into the documentation window. This will\
    \ display information about all the properties you can access and modify in a\
    \ label as shown in Figure [7-17](#329781_5_En_7_Chapter.xhtml#Fig17).\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig17_HTML.jpg](images/329781_5_En_7_Chapter/329781_5_En_7_Fig17_HTML.jpg)\n\
    \nFigure 7-17\n\nViewing available properties in the documentation window"
  trans: "\n1. 选择（或清除）`Enabled`复选框。如果`Enabled`复选框被选中，文本将正常显示；但如果`Enabled`复选框被清除，文本将显示为灰色，如图\
    \ 7-8 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig8_HTML.jpg](img/329781_5_En_7_Fig8_HTML.jpg)\n\
    \n图 7-8 — `Enabled`复选框定义了文本的外观\n\n2. 点击`Background`弹出菜单。将出现一个包含不同颜色的菜单，如图 7-9\
    \ 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig9_HTML.jpg](img/329781_5_En_7_Fig9_HTML.jpg)\n\
    \n图 7-9 — 为标签选择背景颜色\n\n3. 将鼠标指针移到标签最右边的手柄上，向左下方拖动鼠标以缩小标签的宽度并增加其高度。请注意，标签内的文本显示被截断，如图\
    \ 7-10 所示。这是因为`Lines`文本字段包含的值为`1`，这意味着标签只能显示一行文本。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig10_HTML.jpg](img/329781_5_En_7_Fig10_HTML.jpg)\n\
    \n图 7-10 — 调整标签大小\n\n4. 点击`Lines`文本字段并输入`2`，或者点击`Lines`文本字段最右侧的上/下箭头直到数字`2`出现。这允许标签最多显示两行文本。请注意，当您将`Lines`属性增加到`2`时，标签现在会显示两行文本，如图\
    \ 7-11 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig11_HTML.png](img/329781_5_En_7_Fig11_HTML.png)\n\
    \n图 7-11 — 在标签中显示两行文本\n\n### 注意\n\n如果您需要标签显示多行文本，请增加`Lines`文本字段中的值。如果您在`Lines`文本字段中指定的值为`0`（零），则标签将能够容纳无限行数的文本。\n\
    \n在您知道应用运行前文本应如何显示的情况下，在 Inspector 面板中修改标签的属性是可行的。但在某些情况下，您可能需要在应用运行时更改标签的属性。最常见的更改属性是`Text`属性，它定义了标签内显示的文本，但\
    \ Inspector 面板中显示的任何属性都可以使用 Swift 代码进行修改。要修改任何用户界面对象，您必须首先为您想要使用 Swift 代码修改的每个用户界面对象定义一个`IBOutlet`变量。\n\
    \n要了解如何使用 Swift 代码更改标签的属性，请遵循以下步骤：\n\n1. 在 Xcode 中打开`LabelApp`的`Main.storyboard`文件，点击库图标打开`Object\
    \ Library`窗口。\n\n2. 拖放一个按钮到视图的任意位置。\n\n3. 选择 `Editor` ➤ `Resolve Auto Layout Issues`\
    \ ➤ `Reset to Suggested Constraints`（位于菜单底部）。Xcode 会为按钮和标签添加约束。\n\n4. 选择 `View`\
    \ ➤ `Assistant Editor` ➤ `Show Assistant Editor`，或点击 Xcode 窗口右上角的`Assistant Editor`图标。Xcode\
    \ 会将`Main.storyboard`文件与`ViewController.swift`文件并排显示。\n\n5. 将鼠标指针移到标签上，按住`Control`键，从标签`Ctrl`-拖拽到`ViewController.swift`文件中“`class\
    \ ViewController`”行下方的空白区域，如图 7-12 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig12_HTML.jpg](img/329781_5_En_7_Fig12_HTML.jpg)\n\
    \n图 7-12 — 从标签`Ctrl`-拖拽到`ViewController.swift`文件\n\n6. 松开`Control`键和鼠标左键。将出现一个窗口，如图\
    \ 7-13 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig13_HTML.jpg](img/329781_5_En_7_Fig13_HTML.jpg)\n\
    \n图 7-13 — 出现一个窗口，允许您为标签定义一个`IBOutlet`变量\n\n7. 点击`Name`文本字段，输入一个描述性名称，例如`myLabel`。\n\
    \n8. 点击`Connect`按钮。Xcode 会创建一个`IBOutlet`变量，如下所示：\n\n```\n@IBOutlet var myLabel:\
    \ UILabel!\n```\n\n9. 将鼠标指针移到按钮上，按住`Control`键，从按钮`Ctrl`-拖拽到`ViewController.swift`文件中最后一个大括号上方的区域，如图\
    \ 7-14 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig14_HTML.jpg](img/329781_5_En_7_Fig14_HTML.jpg)\n\
    \n图 7-14 — 从按钮`Ctrl`-拖拽到`ViewController.swift`文件\n\n10. 松开`Control`键和鼠标左键。将出现一个窗口，如图\
    \ 7-15 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig15_HTML.jpg](img/329781_5_En_7_Fig15_HTML.jpg)\n\
    \n图 7-15 — 从按钮`Ctrl`-拖拽到`ViewController.swift`文件\n\n11. 确保`Connection`弹出菜单显示为`Action`，然后点击`Name`文本字段并输入`changeLabel`。\n\
    \n12. 点击`Type`弹出菜单并选择`UIButton`。\n\n13. 点击`Connect`按钮。Xcode 会显示一个`IBAction`方法，如下所示：\n\
    \n```\n@IBAction func changeLabel(_ sender: UIButton) {\n}\n```\n\n14. 编辑这个`changeLabel`方法，如下所示：\n\
    \n```\n@IBAction func changeLabel(_ sender: UIButton) {\n    myLabel.text = \"\
    Text created by Swift \\ncode using Xcode\"\n    myLabel.numberOfLines = 2\n \
    \   myLabel.font = UIFont(name: \"Courier\", size: 14)\n    myLabel.backgroundColor\
    \ = UIColor.yellow\n    myLabel.isEnabled = false\n}\n```\n\n**注意**  在上述 Swift\
    \ 代码中，`\\n`符号代表换行。这将强制文本在下一行显示。\n\n15. 点击`Run`按钮或选择`Product` ➤ `Run`。模拟器将在一个模拟的\
    \ iOS 设备中显示您的应用。\n\n16. 点击用户界面上的按钮。Swift 代码会通过更改文本、标签中显示的行数、字体和字号、背景颜色以及禁用它来修改文本，如图\
    \ 7-16 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig16_HTML.jpg](img/329781_5_En_7_Fig16_HTML.jpg)\n\
    \n图 7-16 — 使用 Swift 代码在标签中显示修改后的文本\n\n17. 选择`Simulator` ➤ `Quit Simulator`以返回\
    \ Xcode。\n\n请注意，Swift 代码可以修改标签的每个属性。要了解要使用的确切 Swift 命令，您需要查阅 Apple 的文档。由于我们需要访问标签的属性，因此需要查找标签有哪些可用属性。在\
    \ iOS 中，标签对象被称为`UILabel`。\n\n要在 Xcode 中查看 Apple 的文档，请选择`Help` ➤ `Developer Documentation`以打开文档窗口。然后输入您要查找的单词或短语。在这种情况下，我们想要关于标签的信息，因此我们在文档窗口中输入`UILabel`。这将显示有关您可以在标签中访问和修改的所有属性的信息，如图\
    \ 7-17 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig17_HTML.jpg](img/329781_5_En_7_Fig17_HTML.jpg)\n\
    \n图 7-17 — 在文档窗口中查看可用属性\n"
- fmt: "# Using Text Fields\n\nWhen you just want to display text, use a label. When\
    \ you need the user to input text, then you need to use a text field. The key\
    \ to using a text field is that your app must display a virtual keyboard on the\
    \ screen. When using the virtual keyboard, you need to be aware of its position\
    \ on the screen and the text fields.\n\nIf text fields appear near the top of\
    \ the screen, then the virtual keyboard can slide up without risk of covering\
    \ up the text fields. However, if the text fields appear too close to the bottom\
    \ of the screen, the virtual keyboard will slide up and cover the text fields\
    \ that the user wants to type in.\n\nIf this occurs, your app needs to slide its\
    \ view up to keep the text field visible while allowing the virtual keyboard to\
    \ fill the bottom of the screen. After the user gets done typing text in a text\
    \ field, then the virtual keyboard needs to disappear and the text field needs\
    \ to slide back down again.\n\nTo make the screen slide up and down to accommodate\
    \ the appearance of the virtual keyboard, every app needs to use the iOS notification\
    \ center, which detects when events will occur. When the user clicks in a text\
    \ field, this sends a notification that the virtual keyboard needs to appear.\
    \ When the user is done editing text in a text field, this sends another notification\
    \ that the virtual keyboard needs to go away.\n\nTo receive notifications, an\
    \ app needs to use the `addObserver` method that defines an object (the view)\
    \ to receive notifications along with a method to run when it receives that specific\
    \ notification. To detect when the virtual keyboard should appear and disappear,\
    \ we’ll need to detect two notifications:\n\n- `keyboardWillShowNotification`\n\
    - `keyboardWillHideNotification`\n\nNext, we’ll need to write two functions to\
    \ display the virtual keyboard and hide it. To show the virtual keyboard, we need\
    \ to slide the view up by the size of the virtual keyboard's height, which varies\
    \ depending on the type of iOS device it runs on such as a small screen like an\
    \ iPhone SE or a larger screen like an iPad Pro.\n\nTo hide the virtual keyboard,\
    \ we need to return the view back to its original Y position that determines its\
    \ vertical position on the screen. However, the virtual keyboard will never go\
    \ away as long as the cursor appears in a text field.\n\nTo tell our app to make\
    \ the virtual keyboard go away, we also need to detect if the user taps anywhere\
    \ outside of a text field. Tapping on the view tells the app to end editing in\
    \ the text field, which sends a notification to remove the virtual keyboard. When\
    \ the view receives notification that the virtual keyboard needs to go away (when\
    \ the user taps outside the text field), we need a function to move the view back\
    \ to its original position.\n\nAll of this requires writing code to receive the\
    \ two notifications (`keyboardWillShowNotification` and `keyboardWillHideNotification`).\
    \ Then we also need to detect the tap gesture outside of the text field.\n\nFinally,\
    \ we need to write three functions. One function displays the virtual keyboard\
    \ by calculating the screen height and width, then sliding the view up by the\
    \ height of the virtual keyboard. A second function ends editing in a text field,\
    \ triggering the `keyboardWillHideNotification`. The third function moves the\
    \ view back to its original position after the virtual keyboard disappears.\n\n\
    To see how to make the virtual keyboard appear and disappear with text fields,\
    \ follow these steps:\n\n1.  Create a new iOS project using the Single View App\
    \ template (see Chapter [1](#329781_5_En_1_Chapter.xhtml)) and name this new project\
    \ `TextFieldApp`. This creates a single view for the user interface.\n\n2.  Click\
    \ the `Main.storyboard` file in the Navigator pane. Xcode displays the single\
    \ view.\n\n3.  Click the Library icon to display the Object Library.\n\n4.  Drag\
    \ and drop two text fields in the bottom one-third of the view, so when the virtual\
    \ keyboard slides up from the bottom, it will cover the text fields as shown in\
    \ Figure [7-18](#329781_5_En_7_Chapter.xhtml#Fig18).\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig18_HTML.jpg](images/329781_5_En_7_Chapter/329781_5_En_7_Fig18_HTML.jpg)\n\
    \nFigure 7-18 — Placing two text fields in the bottom one-third of the view\n\n\
    5.  Choose Editor ➤ Resolve Auto Layout Issues ➤ Reset to Suggested Constraints\
    \ in the bottom half of the submenu. This applies constraints to both text fields.\n\
    \n6.  Click the `ViewController.swift` file in the Navigator pane.\n\n7.  Add\
    \ the following inside the `viewDidLoad` method:\n\n```\nNotificationCenter.default.addObserver(self,\
    \ selector: #selector(keyboardWillShow), name: UIResponder.keyboardWillShowNotification,\
    \ object: nil)\nNotificationCenter.default.addObserver(self, selector: #selector(keyboardWillHide),\
    \ name: UIResponder.keyboardWillHideNotification, object: nil)\n```\n\nThe first\
    \ line defines the view as an observer to receive the `keyboardWillShowNotification`.\
    \ When this notification appears, then the app needs to run a function called\
    \ `keyboardWillShow`. The second line defines the view as an observer to receive\
    \ the `keyboardWillHideNotification`. When this notification appears, then the\
    \ app needs to run a function called `keyboardWillHide`.\n\n8.  Add the following\
    \ inside the `viewDidLoad` method:\n\n```\nlet tap: UITapGestureRecognizer = UITapGestureRecognizer(target:\
    \ self, action: #selector(self.dismissKeyboard))\nview.addGestureRecognizer(tap)\n\
    ```\n\nThis code allows the view to detect tap gestures (when the user taps outside\
    \ of a text field). When this occurs, this line runs a function called `dismissKeyboard`.\
    \ The entire `viewDidLoad` function should look like this:\n\n```\noverride func\
    \ viewDidLoad() {\n    super.viewDidLoad()\n    NotificationCenter.default.addObserver(self,\
    \ selector: #selector(keyboardWillShow), name: UIResponder.keyboardWillShowNotification,\
    \ object: nil)\n    NotificationCenter.default.addObserver(self, selector: #selector(keyboardWillHide),\
    \ name: UIResponder.keyboardWillHideNotification, object: nil)\n    let tap: UITapGestureRecognizer\
    \ = UITapGestureRecognizer(target: self, action: #selector(self.dismissKeyboard))\n\
    \    view.addGestureRecognizer(tap)\n}\n```\n\n9.  Type the following underneath\
    \ the `viewDidLoad` function:\n\n```\n@objc func dismissKeyboard() {\n    view.endEditing(true)\n\
    }\n```\n\nThis function runs when the user taps outside of a text field, which\
    \ ends editing and sends the notification that the virtual keyboard needs to go\
    \ away (`keyboardWillHideNotification`).\n\n10.  Type the following underneath\
    \ the `dismissKeyboard` function:\n\n```\n@objc func keyboardWillShow(notification:\
    \ NSNotification) {\n    if let keyboardSize = (notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]\
    \ as? NSValue)?.cgRectValue {\n        if self.view.frame.origin.y == 0 {\n  \
    \          self.view.frame.origin.y -= keyboardSize.height\n        }\n    }\n\
    }\n```\n\nThis function defines the keyboard size based on the size of the iOS\
    \ screen. (Remember, iPhone screens are narrower than iPad screens.) Then this\
    \ function uses the height of the virtual keyboard to determine how far to slide\
    \ the view (along with all its user interface objects) up to make room for the\
    \ virtual keyboard.\n\n11.  Type the following underneath the `keyboardWillShow`\
    \ function:\n\n```\n@objc func keyboardWillHide(notification: NSNotification)\
    \ {\n    if ((notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]\
    \ as? NSValue)?.cgRectValue) != nil {\n        if self.view.frame.origin.y !=\
    \ 0 {\n            self.view.frame.origin.y = 0\n        }\n    }\n}\n```\n\n\
    This function checks if the virtual keyboard is visible. If not, then do nothing.\
    \ If the virtual keyboard is visible, then move the view back down to cover and\
    \ hide the virtual keyboard. The entire `ViewController.swift` file should look\
    \ like this:"
