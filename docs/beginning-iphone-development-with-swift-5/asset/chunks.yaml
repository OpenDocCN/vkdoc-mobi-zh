  trans: "\n### 定义文本字段的内容\n\n文本字段用于捕获用户的文本输入，但每个文本字段都有不同的用途。一个文本字段可能用来捕获姓名，而另一个则可能用于捕获电话号码这样的数字数据。还有的文本字段可能需要用于输入密码。\n\
    \n为了定义文本字段接受数据的不同方式，`属性检查器`面板中显示了`文本输入特征`类别，其中包含多种可供选择的选项，如图 7-23 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig23_HTML.jpg](img/329781_5_En_7_Fig23_HTML.jpg)\n\
    \n图 7-23\n\n`属性检查器`面板上的`文本输入特征`类别\n\n您可以自定义的一些不同选项包括：\n\n- **内容类型** – 定义文本字段应预期的数据类型，例如电话号码或姓名\n\
    - **首字母大写** – 定义是否对每个单词、仅句首或每个字符进行大写\n- **更正** – 定义自动更正功能的开启或关闭\n- **键盘外观** –\
    \ 定义深色或浅色外观\n- **Return 键** – 定义 Return 键上显示的标题，例如`Return`、`Join`、`Next`、`Search`或`Done`\n\
    \n选中`安全文本输入`复选框，您可以配置文本字段隐藏用户实际输入的字符，这对于屏蔽密码非常有用。\n\n要了解这些不同的文本字段选项如何工作，请按照以下步骤操作：\n\
    \n1.  确保`TextFieldApp`项目已在`Xcode`中加载。\n2.  单击`导航器`面板中的`Main.storyboard`文件。\n3.\
    \  单击一个文本字段，然后选择`视图 ➤ 检查器 ➤ 显示属性检查器`，或单击`检查器`面板顶部的`属性检查器`图标。\n4.  单击`内容类型`弹出菜单，选择`Password`，如图\
    \ 7-24 所示。\n   ![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig24_HTML.jpg](img/329781_5_En_7_Fig24_HTML.jpg)\n\
    \   图 7-24\n   将文本字段的内容类型更改为`Password`\n5.  单击`键盘类型`弹出菜单，选择`Default`。\n6.  单击`Return\
    \ 键`弹出菜单，选择`Done`。\n7.  选中`安全文本输入`复选框。\n8.  单击另一个文本字段。\n9.  单击`内容类型`弹出菜单，选择`E-mail\
    \ Address`。\n10. 单击`键盘类型`弹出菜单，选择`E-Mail Address`。\n11. 单击`Return 键`弹出菜单，选择`Send`。\n\
    12. 单击`运行`按钮，或选择`产品 ➤ 运行`。`模拟器`窗口将出现。\n13. 单击定义为`Password`内容类型的文本字段。虚拟键盘将出现，并在右下角显示`Done`。\n\
    14. 单击虚拟键盘按键。注意，当您输入时，文本字段会隐藏实际字符，如图 7-25 所示。\n    ![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig25_HTML.jpg](img/329781_5_En_7_Fig25_HTML.jpg)\n\
    \    图 7-25\n    在文本字段中隐藏输入的字符\n15. 单击另一个文本字段。注意，Web 搜索虚拟键盘将出现，并显示一个`@`键和右下角的`Send`按钮，如图\
    \ 7-26 所示。\n    ![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig26_HTML.jpg](img/329781_5_En_7_Fig26_HTML.jpg)\n\
    \    图 7-26\n    显示带有`Send` Return 键的虚拟键盘\n16. 选择`模拟器 ➤ 退出模拟器`以返回`Xcode`。\n\n\
    通过配置文本字段及其显示的虚拟键盘，您可以自定义文本字段，以便用户使用针对特定任务优化的虚拟键盘输入特定类型的信息。\n\n### 修改文本字段的外观\n\n\
    一旦确定文本字段将要保存的数据类型以及最适合该文本字段显示的虚拟键盘，最后一步就是修改文本字段的外观。修改文本字段外观的几种方式包括：\n\n- **文本**\
    \ – 存储文本字段中显示的文本\n- **占位符** – 定义以浅灰色显示的文本，用于向用户说明文本字段期望输入的文本类型，例如密码或姓名\n- **颜色**\
    \ – 定义文本字段中文本的颜色\n- **字体** – 定义文本字段中文本的字体和字号\n- **清除按钮** – 定义文本字段中是否显示清除按钮，允许用户删除文本字段中的所有内容\n\
    \n虽然您可以在`检查器`面板中修改这些属性，但您也可以使用 Swift 代码来定义它们。首先，我们需要为要使用 Swift 代码修改的文本字段创建一个`IBOutlet`。然后，我们需要编写\
    \ Swift 代码来修改文本字段的每个属性。要查看文本字段中所有可以修改的属性，请选择`帮助 ➤ 开发者文档`并搜索`UITextField`。\n\n\
    要了解如何使用 Swift 代码自定义文本字段的外观，请按照以下步骤操作：\n\n1.  确保`TextFieldApp`项目已在`Xcode`中加载。\n\
    2.  单击`导航器`面板中的`Main.storyboard`文件。\n3.  选择`视图 ➤ 助理编辑器 ➤ 显示助理编辑器`，或单击`Xcode`窗口右上角的`助理编辑器`图标。`Xcode`将在`Main.storyboard`文件旁边显示`ViewController.swift`文件。\n\
    4.  将鼠标指针移到未选中`安全文本输入`复选框的文本字段上，按住`Control`键，然后从该文本字段`Ctrl-拖拽`到`class ViewController`行下方的`ViewController.swift`文件中。\n\
    5.  松开`Control`键和鼠标左键。将出现一个弹出菜单。\n6.  单击`名称`文本字段，输入 **myTextField**。\n7.  单击`连接`按钮。`Xcode`将创建一个`IBOutlet`，如下所示：\n\
    \n```\n@IBOutlet var myTextField: UITextField!\n```\n\n8.  单击`导航器`面板中的`ViewController.swift`文件。\n\
    9.  选择`视图 ➤ 标准编辑器 ➤ 显示标准编辑器`，或单击`Xcode`窗口右上角的`标准编辑器`图标。`Xcode`将显示`ViewController.swift`文件。\n\
    10. 将以下代码添加到`viewDidLoad`函数中：\n\n```\nmyTextField.placeholder = \"Email address\
    \ here\"\nmyTextField.textColor = UIColor.red\nmyTextField.font = UIFont(name:\
    \ \"Courier\", size: 16)\nmyTextField.clearButtonMode = .whileEditing\n```\n\n\
    完整的`ViewController.swift`文件应如下所示：\n"
- fmt: "```swift\nimport UIKit\nclass ViewController: UIViewController {\n    @IBOutlet\
    \ var myTextField: UITextField!\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        NotificationCenter.default.addObserver(self, selector: #selector(keyboardWillShow),\
    \ name: UIResponder.keyboardWillShowNotification, object: nil)\n        NotificationCenter.default.addObserver(self,\
    \ selector: #selector(keyboardWillHide), name: UIResponder.keyboardWillHideNotification,\
    \ object: nil)\n        let tap: UITapGestureRecognizer = UITapGestureRecognizer(target:\
    \ self, action: #selector(self.dismissKeyboard))\n        view.addGestureRecognizer(tap)\n\
    \        myTextField.placeholder = \"Email address here\"\n        myTextField.textColor\
    \ = UIColor.red\n        myTextField.font = UIFont(name: \"Courier\", size: 16)\n\
    \        myTextField.clearButtonMode = .whileEditing\n    }\n    @objc func dismissKeyboard()\
    \ {\n        view.endEditing(true)\n    }\n    @objc func keyboardWillShow(notification:\
    \ NSNotification) {\n        if let keyboardSize = (notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]\
    \ as? NSValue)?.cgRectValue {\n            if self.view.frame.origin.y == 0 {\n\
    \                self.view.frame.origin.y -= keyboardSize.height\n           \
    \ }\n        }\n    }\n    @objc func keyboardWillHide(notification: NSNotification)\
    \ {\n        if ((notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]\
    \ as? NSValue)?.cgRectValue) != nil {\n            if self.view.frame.origin.y\
    \ != 0 {\n                self.view.frame.origin.y = 0\n            }\n      \
    \  }\n    }\n}\n```\n\n4.  Click the **Run** button or choose **Product ➤ Run**.\
    \ The Simulator appears.\n\n5.  Click in the text field that you connected to\
    \ the `myTextField` IBOutlet. (This text field should display “Email address”\
    \ in light gray, which is defined by the `placeholder` property.)\n\n6.  Click\
    \ the virtual keyboard. Notice that as you type, the letters appear in red and\
    \ in Courier font. Notice that as soon as you type one character, the clear button\
    \ appears on the far right.\n\n7.  Choose **Simulator ➤ Quit Simulator** to return\
    \ to Xcode.\n\nWhen defining the clear button in a text field, your four choices\
    \ are:\n\n*   `.never` – The clear button never appears in the text field.\n*\
    \   `.whileEditing` – The clear button only appears when the user starts editing\
    \ text in the text field.\n*   `.unlessEditing` – The clear button only appears\
    \ when the user is not editing text in the text field.\n*   `.always` – The clear\
    \ button always appears in the text field.\n\nBy modifying properties in the Inspector\
    \ pane or using Swift code, you can customize the appearance and behavior of a\
    \ text field.\n\n## Using Buttons\n\nButtons represent a single command that the\
    \ user can tap. A button can display text (by changing the **Title** property)\
    \ or a graphic image (by changing the **Image** property). The main purpose of\
    \ a button is to allow the user to choose a command that makes the app do something.\n\
    \nUnlike objects like labels that do not always need to link to a `.swift` file,\
    \ you always need to link a button to an IBAction method in a `.swift` file. The\
    \ IBAction method contains Swift code to make the button perform a specific task.\n\
    \nTo see how to create an IBAction method to a button, follow these steps:\n\n\
    1.  Make sure the **TextFieldApp** project is loaded in Xcode.\n\n2.  Click the\
    \ **Main.storyboard** file in the Navigator pane.\n\n3.  Click the **Library**\
    \ icon to open the Object Library window.\n\n4.  Drag and drop a button on the\
    \ view.\n\n5.  Choose **Editor ➤ Resolve Auto Layout Issues ➤ Add Missing Constraints**\
    \ from the top half of the submenu. Xcode adds constraints to the button.\n\n\
    6.  Choose **View ➤ Assistant Editor ➤ Show Assistant Editor** or click the **Assistant\
    \ Editor** icon in the upper right corner of the Xcode window. Xcode displays\
    \ the `ViewController.swift` file next to the `Main.storyboard` file.\n\n7.  Move\
    \ the mouse pointer over the text field that has the **Secure Text Entry** check\
    \ box selected.\n\n8.  Hold down the **Control** key and **Ctrl-drag** from the\
    \ text field underneath the existing `IBOutlet` variable in the `ViewController.swift`\
    \ file.\n\n9.  Release the **Control** key and the left mouse button. A popup\
    \ menu appears.\n\n10. Click in the **Name** text field and type **passwordTextField**,\
    \ then click the **Connect** button. Xcode creates an `IBOutlet` variable like\
    \ this:\n\n    ```swift\n    @IBOutlet var passwordTextField: UITextField!\n \
    \   ```\n\n11. Move the mouse pointer over the button, hold down the **Control**\
    \ key, and **Ctrl-drag** from the button to the `ViewController.swift` file just\
    \ above the last curly bracket near the bottom of the file as shown in Figure\
    \ 7-27.\n\n    ![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig27_HTML.jpg](images/329781_5_En_7_Chapter/329781_5_En_7_Fig27_HTML.jpg)\n\
    \    \n    **Figure 7-27** Ctrl-dragging to create an IBAction method for the\
    \ button\n\n12. Release the **Control** key and the left mouse button. A popup\
    \ menu appears.\n\n13. Click in the **Name** text field and type **displayPassword**.\n\
    \n14. Click the **Type** popup menu and choose **UIButton**.\n\n15. Click the\
    \ **Connect** button. Xcode creates an IBAction method like this:\n\n    ```swift\n\
    \    @IBAction func displayPassword(_ sender: UIButton) {\n    }\n    ```\n\n\
    16. Edit the `displayPassword` IBAction method as follows:\n\n    ```swift\n \
    \   @IBAction func displayPassword(_ sender: UIButton) {\n        myTextField.text\
    \ = passwordTextField.text?.uppercased()\n    }\n    ```\n\n    This IBAction\
    \ method runs every time the user taps on the button. It takes whatever text appears\
    \ in the `passwordTextField`, changes the text to uppercase, and then displays\
    \ that text in the `myTextField`.\n\n17. Click the **Run** button or choose **Product\
    \ ➤ Run**. The Simulator window appears.\n\n18. Click in the **Password** text\
    \ field and type a word using the virtual keyboard.\n\n19. Click the button. Notice\
    \ that the text you typed in the **Password** text field now appears all uppercase\
    \ in the other text field.\n\n20. Choose **Simulator ➤ Quit Simulator** to return\
    \ to Xcode.\n\nBy this point, you should start feeling more comfortable understanding\
    \ how user interfaces work. To access data stored or displayed in an object, you\
    \ need to create `IBOutlet` variables. To perform some type of action, you need\
    \ to create an `IBAction` method."
