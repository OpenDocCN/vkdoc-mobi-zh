  trans: "\n# 创建简单的表格视图\n\n如果你已有现有视图，可以将`Table View`拖放到该视图上。有了表格视图后，必须用数据（来自数据源）填充它，并定义表格包含多少分区和行。数据可以来自任何地方，但每个数据块应包含相同数量的项。例如，如果你希望表格视图显示姓名和图片，那么每个数据块应包含文本（姓名）和图像（图片）。\n\
    \n要了解如何创建并填充表格视图，请按照以下步骤操作：\n\n1. 使用单视图应用模板创建一个新的 iOS 项目（见第 1 章），并将此新项目命名为`TableViewApp`。这将为用户界面创建一个单视图。\n\
    \n2. 在导航窗格中点击`Main.storyboard`文件。Xcode 会显示该单视图。\n\n3. 点击库图标以打开对象库窗口。\n\n4. 拖放一个表格视图，如图\
    \ 14-2 所示，放置在视图的任意位置。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig2_HTML.jpg](img/329781_5_En_14_Fig2_HTML.jpg)\n\
    \n图 14-2 对象库窗口中的表格视图\n\n5. 调整表格视图的大小，使其填满整个屏幕。\n\n6. 选择 编辑器 ➤ 解决自动布局问题 ➤ 重置为建议的约束。Xcode\
    \ 会为表格视图添加约束，如图 14-3 所示。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig3_HTML.jpg](img/329781_5_En_14_Fig3_HTML.jpg)\n\
    \n图 14-3 带有约束的表格视图\n\n7. 选择 视图 ➤ 辅助编辑器 ➤ 显示辅助编辑器，或点击 Xcode 窗口右上角的辅助编辑器图标。\n\n\
    8. 将鼠标指针移到表格视图上，按住 Control 键，并在`ViewController.swift`文件中的“class ViewController”行下方进行\
    \ Ctrl-拖拽。\n\n9. 松开 Control 键和鼠标左键。会弹出一个窗口。\n\n10. 点击名称文本字段，输入`petTable`，然后点击连接按钮。Xcode\
    \ 会创建一个`IBOutlet`，如下所示：\n\n```\n@IBOutlet var petTable: UITableView!\n```\n\n\
    11. 选择 视图 ➤ 标准编辑器 ➤ 显示标准编辑器，或点击 Xcode 窗口右上角的标准编辑器图标。\n\n12. 在导航窗格中点击`ViewController.swift`文件。\n\
    \n13. 修改类`ViewController`行，添加`UITableViewDelegate`、`UITableViewDataSource`，如下所示：\n\
    \n```\nclass ViewController: UIViewController, UITableViewDelegate, UITableViewDataSource\
    \ {\n```\n\n这段代码的目的是将`ViewController.swift`文件标识为表格视图的委托和数据源。\n\n14. 在类`ViewController`行的下方，添加以下数组：\n\
    \n```\nlet petArray = [\"cat\", \"dog\", \"parakeet\", \"parrot\", \"canary\"\
    , \"finch\", \"tropical fish\", \"goldfish\", \"sea horses\", \"hamster\", \"\
    gerbil\", \"rabbit\", \"turtle\", \"snake\", \"lizard\", \"hermit crab\"]\n```\n\
    \n15. 在此数组下方，添加以下代码行：\n\n```\nlet cellID = \"cellID\"\n```\n\n这段代码的目的是为单元格创建一个任意常量名称。表格视图由一行行单元格组成，因此我们需要标识单元格，以便稍后存储数据。\n\
    \n16. 按如下方式修改`viewDidLoad`方法：\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    petTable.dataSource = self\n    petTable.delegate = self\n    // Do any additional\
    \ setup after loading the view, typically from a nib.\n}\n```\n\n这段代码的目的是定义表格（`IBOutlet\
    \ petTable`）从它所在的`ViewController.swift`文件（`self`）获取数据。此外，委托也被定义为`ViewController.swift`文件（`self`）。这意味着`ViewController.swift`文件需要包含定义表格需要多少行以及数据来源（即`petArray`）的函数。\n\
    \n17. 在`viewDidLoad`方法下方添加以下函数：\n\n```\nfunc tableView(_ tableView: UITableView,\
    \ numberOfRowsInSection section: Int) -> Int {\n    return petArray.count\n}\n\
    ```\n\n这段代码定义了表格需要多少行。行数由`petArray`中存储项的总数决定。\n\n18. 在`viewDidLoad`方法下方添加以下函数：\n\
    \n```\nfunc tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath)\
    \ -> UITableViewCell {\n    var cell = tableView.dequeueReusableCell(withIdentifier:\
    \ cellID)\n    if (cell == nil) {\n        cell = UITableViewCell(\n         \
    \   style: UITableViewCell.CellStyle.default,\n            reuseIdentifier: cellID)\n\
    \    }\n    cell?.textLabel?.text = petArray[indexPath.row]\n    return cell!\n\
    }\n```\n\n每当表格视图需要将数据放入行时，就会运行此函数。这可能发生在表格视图首次出现时，或者用户上下滚动以显示之前因一次无法显示所有数据而被隐藏的数据时。由于表格视图中的每一行都由一个单元格定义，因此需要创建一个具有名称的单元格：\n\
    \n```\nvar cell = tableView.dequeueReusableCell(withIdentifier: cellID)\n```\n\
    \n如果单元格为空，则`if`语句会定义单元格的样式，并赋予其任意的`cellID`名称来标识它：\n\n```\nif (cell == nil) {\n\
    \    cell = UITableViewCell(\n        style: UITableViewCell.CellStyle.default,\n\
    \        reuseIdentifier: cellID)\n}\n```\n\n接着，它从`petArray`中获取数据，并根据单元格在表格视图中的位置（其行号），将这些数据存储在单元格`textLabel`的文本属性中。然后返回该单元格，使其显示在表格视图中：\n\
    \n```\ncell?.textLabel?.text = petArray[indexPath.row]\nreturn cell!\n```\n\n\
    完整的`ViewController.swift`文件应如下所示：\n\n```\nimport UIKit\nclass ViewController:\
    \ UIViewController, UITableViewDelegate, UITableViewDataSource {\n    @IBOutlet\
    \ var petTable: UITableView!\n    let petArray = [\"cat\", \"dog\", \"parakeet\"\
    , \"parrot\", \"canary\", \"finch\", \"tropical fish\", \"goldfish\", \"sea horses\"\
    , \"hamster\", \"gerbil\", \"rabbit\", \"turtle\", \"snake\", \"lizard\", \"hermit\
    \ crab\"]\n    let cellID = \"cellID\"\n    override func viewDidLoad() {\n  \
    \      super.viewDidLoad()\n        petTable.dataSource = self\n        petTable.delegate\
    \ = self\n        // Do any additional setup after loading the view, typically\
    \ from a nib.\n    }\n    func tableView(_ tableView: UITableView, numberOfRowsInSection\
    \ section: Int) -> Int {\n        return petArray.count\n    }\n    func tableView(_\
    \ tableView: UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell\
    \ {\n        var cell = tableView.dequeueReusableCell(withIdentifier: cellID)\n\
    \        if (cell == nil) {\n            cell = UITableViewCell(\n           \
    \     style: UITableViewCell.CellStyle.default,\n                reuseIdentifier:\
    \ cellID)\n        }\n        cell?.textLabel?.text = petArray[indexPath.row]\n\
    \        return cell!\n    }\n}\n```\n\n19. 点击运行按钮或选择 产品 ➤ 运行。模拟器窗口会出现，显示表格视图中的数据，如图\
    \ 14-4 所示。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig4_HTML.jpg](img/329781_5_En_14_Fig4_HTML.jpg)\n\
    \n图 14-4 用数组数据填充后的表格视图\n\n20. 在表格视图中上下滚动，查看数据如何从屏幕顶部和底部滚动消失。\n\n21. 选择 模拟器 ➤ 退出模拟器，返回\
    \ Xcode。\n\n创建表格视图的基本步骤如下：\n\n- 从对象库窗口将表格视图拖放到视图上。\n- 将`.swift`文件定义为表格视图的委托和数据源。\n\
    - 创建或获取要存储在表格视图中的数据。\n- 编写一个函数，定义表格视图需要显示多少行。\n- 编写一个函数，将数据存储到表格视图的不同行中。\n"
- fmt: "在前一个例子中，我们通过在`ViewController.swift`文件中编写代码来创建并填充了一个表格视图。由于Xcode提供了多种方式（通过代码或可视化）来完成同一任务，接下来我们将看到如何用更少的代码复制完全相同的表格视图项目。\n\
    \n我们将通过两种方式实现这一点。首先，我们将通过可视化方式定义委托和数据源，从而省略以下三行代码：\n\n```swift\n@IBOutlet var\
    \ petTable: UITableView!\npetTable.dataSource = self\npetTable.delegate = self\n\
    ```\n\n接着，我们将从对象库窗口中拖放一个单元格到表格视图上，从而省略以下代码：\n\n```swift\nlet cellID = \"cellID\"\
    \nif (cell == nil) {\n    cell = UITableViewCell(\n        style: UITableViewCell.CellStyle.default,\n\
    \        reuseIdentifier: \"cellID\")\n}\n```\n\n减少创建应用所需的代码量，可以让您专注于编写使应用独具特色的代码。不过，减少代码的代价是，您必须意识到这些代码已被其他方式替代，而这些方式初看之下并不总是显而易见。\n\
    \n要了解如何以可视化方式创建表格视图，请按照以下步骤操作：\n\n1.  使用“单视图应用”模板创建一个新的iOS项目（参见第[1](#329781_5_En_1_Chapter.xhtml)章），并将这个新项目命名为`TableViewVisualApp`。这将为用户界面创建一个单视图。\n\
    \n2.  在导航面板中点击`Main.storyboard`文件。Xcode会显示该单视图。\n\n3.  点击库图标打开对象库窗口。\n\n4.  将表格视图（见图\
    \ [14-2](#329781_5_En_14_Chapter.xhtml#Fig2)）拖放到视图上的任意位置。\n\n5.  调整表格视图的大小，使其填满整个屏幕。\n\
    \n6.  选择 `Editor ➤ Resolve Auto Layout Issues ➤ Reset to Suggested Constraints`。Xcode会为表格视图添加约束（见图\
    \ [14-3](#329781_5_En_14_Chapter.xhtml#Fig3)）。\n\n7.  点击库图标打开对象库窗口。然后拖放一个表格视图单元格到顶部，如图\
    \ [14-5](#329781_5_En_14_Chapter.xhtml#Fig5) 所示。\n\n    ![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig5_HTML.jpg](images/329781_5_En_14_Chapter/329781_5_En_14_Fig5_HTML.jpg)\n\
    \n    图 14-5\n\n    将表格视图单元格拖到表格视图上\n\n8.  选择 `View ➤ Inspectors ➤ Show Attributes\
    \ Inspector`，或者点击Xcode窗口右上角的属性检查器图标。\n\n9.  点击标识符文本字段（如图 [14-6](#329781_5_En_14_Chapter.xhtml#Fig6)\
    \ 所示），输入**cellID**（您可以给它任意名称），然后按回车键。\n\n    ![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig6_HTML.jpg](images/329781_5_En_14_Chapter/329781_5_En_14_Fig6_HTML.jpg)\n\
    \n    图 14-6\n\n    属性检查器中的标识符文本字段\n\n10. 点击表格视图以将其选中，然后选择 `View ➤ Inspectors\
    \ ➤ Show Connections Inspector`，或者点击Xcode窗口右上角的连接检查器图标。\n\n11. 点击`dataSource`右侧出现的圆圈，然后将鼠标拖到视图控制器顶部的`ViewController`图标上，或者文档大纲中的对应图标上，如图\
    \ [14-7](#329781_5_En_14_Chapter.xhtml#Fig7) 所示。\n\n    ![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig7_HTML.jpg](images/329781_5_En_14_Chapter/329781_5_En_14_Fig7_HTML.jpg)\n\
    \n    图 14-7\n\n    连接检查器面板允许您将`dataSource`和`delegate`连接到视图控制器\n\n12. 松开鼠标左键。\n\
    \n13. 点击`delegate`右侧出现的圆圈，然后将鼠标拖到视图控制器顶部的`ViewController`图标上，或者文档大纲中的对应图标上。\n\n\
    14. 松开鼠标左键。连接检查器面板应显示`ViewController`文件现在是`dataSource`和`delegate`，如图 [14-8](#329781_5_En_14_Chapter.xhtml#Fig8)\
    \ 所示。\n\n    ![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig8_HTML.jpg](images/329781_5_En_14_Chapter/329781_5_En_14_Fig8_HTML.jpg)\n\
    \n    图 14-8\n\n    将`delegate`和`dataSource`连接到`ViewController.swift`文件\n\n15.\
    \ 在导航面板中点击`ViewController.swift`文件。\n\n16. 通过添加`UITableViewDelegate, UITableViewDataSource`来修改`class\
    \ ViewController`这一行，如下所示：\n\n    ```swift\n    class ViewController: UIViewController,\
    \ UITableViewDelegate, UITableViewDataSource {\n    ```\n\n    这段代码的目的是将`ViewController.swift`文件标识为表格视图的委托和数据源。\n\
    \n17. 在`class ViewController`这一行的下方，添加以下数组：\n\n    ```swift\n    let petArray\
    \ = [\"cat\", \"dog\", \"parakeet\", \"parrot\", \"canary\", \"finch\", \"tropical\
    \ fish\", \"goldfish\", \"sea horses\", \"hamster\", \"gerbil\", \"rabbit\", \"\
    turtle\", \"snake\", \"lizard\", \"hermit crab\"]\n    ```\n\n18. 在`viewDidLoad`方法的下方，添加以下函数来定义所需的总行数：\n\
    \n    ```swift\n    func tableView(_ tableView: UITableView, numberOfRowsInSection\
    \ section: Int) -> Int {\n        return petArray.count\n    }\n    ```\n\n19.\
    \ 在`viewDidLoad`方法的下方，添加以下函数来将数据加载到表格中：\n\n    ```swift\n    func tableView(_\
    \ tableView: UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell\
    \ {\n        let cell = tableView.dequeueReusableCell(withIdentifier: \"cellID\"\
    )\n        cell?.textLabel?.text = petArray[indexPath.row]\n        return cell!\n\
    \    }\n    ```\n\n    这段代码引用了具有`\"cellID\"`标识符的单元格，这正是我们在第9步中为表格视图单元格定义的标识符。整个`ViewController.swift`文件应如下所示：\n\
    \n    ```swift\n    import UIKit\n    class ViewController: UIViewController,\
    \ UITableViewDelegate, UITableViewDataSource {\n        let petArray = [\"cat\"\
    , \"dog\", \"parakeet\", \"parrot\", \"canary\", \"finch\", \"tropical fish\"\
    , \"goldfish\", \"sea horses\", \"hamster\", \"gerbil\", \"rabbit\", \"turtle\"\
    , \"snake\", \"lizard\", \"hermit crab\"]\n        override func viewDidLoad()\
    \ {\n            super.viewDidLoad()\n            // Do any additional setup after\
    \ loading the view, typically from a nib.\n        }\n        func tableView(_\
    \ tableView: UITableView, numberOfRowsInSection section: Int) -> Int {\n     \
    \       return petArray.count\n        }\n        func tableView(_ tableView:\
    \ UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell {\n     \
    \       let cell = tableView.dequeueReusableCell(withIdentifier: \"cellID\")\n\
    \            cell?.textLabel?.text = petArray[indexPath.row]\n            return\
    \ cell!\n        }\n    }\n    ```\n\n20. 点击运行按钮或选择 `Product ➤ Run`。模拟器窗口出现，显示表格视图中的数据（见图\
    \ [14-4](#329781_5_En_14_Chapter.xhtml#Fig4)）。\n\n21. 在表格视图中上下滚动，观察数据如何从屏幕顶部和底部滚动出去。\n\
    \n22. 选择 `Simulator ➤ Quit Simulator` 返回Xcode。"
  raw: "In the previous example, we created and filled a table view by writing code\
    \ in the ViewController.swift file. Since Xcode gives you multiple ways to accomplish\
    \ the same task through code or visually, let’s see how to duplicate the exact\
    \ same table view project except with less code.\n\nWe’ll do this in two ways.\
    \ First, we’ll define the delegate and data source visually and eliminate these\
    \ three lines of code:\n\n```\n@IBOutlet var petTable: UITableView!\npetTable.dataSource\
    \ = self\npetTable.delegate = self\n```\n\nNext, we’ll drag and drop a cell from\
    \ the Object Library window onto the table view so we can eliminate this code:\n\
    \n```\nlet cellID = \"cellID\"\nif (cell == nil) {\ncell = UITableViewCell(\n\
    style: UITableViewCell.CellStyle.default,\nreuseIdentifier: \"cellID\")\n}\n```\n\
    \nReducing the amount of code used to create an app allows you to focus on code\
    \ that makes your app unique. The drawback of eliminating code though is that\
    \ you must realize that the code has been replaced in other ways that aren’t always\
    \ obvious at first glance.\n\nTo see how to create a table view visually, follow\
    \ these steps:\n\n1.  Create a new iOS project using the Single View App template\
    \ (see Chapter [1](#329781_5_En_1_Chapter.xhtml)) and name this new project TableViewVisualApp.\
    \ This creates a single view for the user interface.\n\n2.  Click the Main.storyboard\
    \ file in the Navigator pane. Xcode displays the single view.\n\n3.  Click the\
    \ Library icon to open the Object Library window.\n\n4.  Drag and drop a table\
    \ view (see Figure [14-2](#329781_5_En_14_Chapter.xhtml#Fig2)) anywhere on the\
    \ view.\n\n5.  Resize the table view so it fills the entire screen.\n\n6.  Choose\
    \ Editor ➤ Resolve Auto Layout Issues ➤ Reset to Suggested Constraints. Xcode\
    \ adds constraints to the table view (see Figure [14-3](#329781_5_En_14_Chapter.xhtml#Fig3)).\n\
    \n7.  Click the Library icon to open the Object Library window. Then drag and\
    \ drop a Table View Cell onto the top as shown in Figure [14-5](#329781_5_En_14_Chapter.xhtml#Fig5).\n\
    \n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig5_HTML.jpg](images/329781_5_En_14_Chapter/329781_5_En_14_Fig5_HTML.jpg)\n\
    \nFigure 14-5\n\nDragging a Table View Cell onto a table view\n\n8.  Choose View\
    \ ➤ Inspectors ➤ Show Attributes Inspector, or click the Attributes Inspector\
    \ icon in the upper right corner of the Xcode window.\n\n9.  Click in the Identifier\
    \ text field as shown in Figure [14-6](#329781_5_En_14_Chapter.xhtml#Fig6), type\
    \ **cellID** (which can be an arbitrary name you wish to give it), and press ENTER.\n\
    \n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig6_HTML.jpg](images/329781_5_En_14_Chapter/329781_5_En_14_Fig6_HTML.jpg)\n\
    \nFigure 14-6\n\nThe Identifier text field in the Attributes Inspector\n\n10.\
    \  Click the table view to select it and choose View ➤ Inspectors ➤ Show Connections\
    \ Inspector, or click the Connections Inspector icon in the upper right corner\
    \ of the Xcode window.\n\n11.  Click in the circle that appears to the right of\
    \ dataSource and drag the mouse over the ViewController icon at the top of the\
    \ View Controller or in the Document Outline as shown in Figure [14-7](#329781_5_En_14_Chapter.xhtml#Fig7).\n\
    \n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig7_HTML.jpg](images/329781_5_En_14_Chapter/329781_5_En_14_Fig7_HTML.jpg)\n\
    \nFigure 14-7\n\nThe Connections Inspector pane lets you connect the dataSource\
    \ and delegate to the View Controller\n\n12.  Release the left mouse button.\n\
    \n13.  Click in the circle that appears to the right of delegate and drag the\
    \ mouse over the ViewController icon at the top of the View Controller or in the\
    \ Document Outline.\n\n14.  Release the left mouse button. The Connections Inspector\
    \ pane should show that the ViewController file is now the dataSource and delegate\
    \ as shown in Figure [14-8](#329781_5_En_14_Chapter.xhtml#Fig8).\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig8_HTML.jpg](images/329781_5_En_14_Chapter/329781_5_En_14_Fig8_HTML.jpg)\n\
    \nFigure 14-8\n\nConnecting the delegate and dataSource to the ViewController.swift\
    \ file\n\n15.  Click the ViewController.swift file in the Navigator pane.\n\n\
    16.  Modify the class ViewController line by adding UITableViewDelegate, UITableViewDataSource\
    \ as follows:\n\n```\n    class ViewController: UIViewController, UITableViewDelegate,\
    \ UITableViewDataSource {\n    ```\n\nThe purpose of this code is to identify\
    \ the ViewController.swift file as both the delegate and data source for the table\
    \ view.\n\n17.  Underneath the class ViewController line, add the following array:\n\
    \n```\n    let petArray = [\"cat\", \"dog\", \"parakeet\", \"parrot\", \"canary\"\
    , \"finch\", \"tropical fish\", \"goldfish\", \"sea horses\", \"hamster\", \"\
    gerbil\", \"rabbit\", \"turtle\", \"snake\", \"lizard\", \"hermit crab\"]\n  \
    \  ```\n\n18.  Underneath the viewDidLoad method, add the following function to\
    \ define the total number of rows needed:\n\n```\n    func tableView(_ tableView:\
    \ UITableView, numberOfRowsInSection section: Int) -> Int {\n    return petArray.count\n\
    \    }\n    ```\n\n19.  Underneath the viewDidLoad method, add the following function\
    \ to load data into the table:\n\n```\n    func tableView(_ tableView: UITableView,\
    \ cellForRowAt indexPath: IndexPath) -> UITableViewCell {\n    let cell = tableView.dequeueReusableCell(withIdentifier:\
    \ \"cellID\")\n    cell?.textLabel?.text = petArray[indexPath.row]\n    return\
    \ cell!\n    }\n    ```\n\nThis code references the cell that has the “cellID”\
    \ Identifier, which is what we defined the Table View Cell in step 9\\. The entire\
    \ ViewController.swift file should look like this:\n\n```\n    import UIKit\n\
    \    class ViewController: UIViewController, UITableViewDelegate, UITableViewDataSource\
    \ {\n    let petArray = [\"cat\", \"dog\", \"parakeet\", \"parrot\", \"canary\"\
    , \"finch\", \"tropical fish\", \"goldfish\", \"sea horses\", \"hamster\", \"\
    gerbil\", \"rabbit\", \"turtle\", \"snake\", \"lizard\", \"hermit crab\"]\n  \
    \  override func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional\
    \ setup after loading the view, typically from a nib.\n    }\n    func tableView(_\
    \ tableView: UITableView, numberOfRowsInSection section: Int) -> Int {\n    return\
    \ petArray.count\n    }\n    func tableView(_ tableView: UITableView, cellForRowAt\
    \ indexPath: IndexPath) -> UITableViewCell {\n    let cell = tableView.dequeueReusableCell(withIdentifier:\
    \ \"cellID\")\n    cell?.textLabel?.text = petArray[indexPath.row]\n    return\
    \ cell!\n    }\n    }\n    ```\n\n20.  Click the Run button or choose Product\
    \ ➤ Run. The Simulator window appears, displaying the data in your table view\
    \ (see Figure [14-4](#329781_5_En_14_Chapter.xhtml#Fig4)).\n\n21.  Scroll up and\
    \ down the table view to see how data scrolls off the top and bottom of the screen.\n\
    \n22.  Choose Simulator ➤ Quit Simulator to return to Xcode."
  trans: "好的，作为高级文档工程师和翻译员，我将严格遵守您提供的注意事项，将给定的英文文本翻译成符合 Markdown 格式的中文。\n\n\n在前一个例子中，我们通过在`ViewController.swift`文件中编写代码来创建并填充了一个表格视图。由于\
    \ Xcode 提供了多种方式（通过代码或可视化）来完成同一任务，接下来我们将看到如何用更少的代码复制完全相同的表格视图项目。\n\n我们将通过两种方式实现这一点。首先，我们将通过可视化方式定义委托和数据源，从而省略以下三行代码：\n\
    \n```swift\n@IBOutlet var petTable: UITableView!\npetTable.dataSource = self\n\
    petTable.delegate = self\n```\n\n接着，我们将从对象库窗口中拖放一个单元格到表格视图上，从而省略以下代码：\n\n```swift\n\
    let cellID = \"cellID\"\nif (cell == nil) {\n    cell = UITableViewCell(\n   \
    \     style: UITableViewCell.CellStyle.default,\n        reuseIdentifier: \"cellID\"\
    )\n}\n```\n\n减少创建应用所需的代码量，可以让您专注于编写使应用独具特色的代码。不过，减少代码的代价是，您必须意识到这些代码已被其他方式替代，而这些方式初看之下并不总是显而易见。\n\
    \n要了解如何以可视化方式创建表格视图，请按照以下步骤操作：\n\n1.  使用“单视图应用”模板创建一个新的 iOS 项目（参见第 1 章），并将这个新项目命名为`TableViewVisualApp`。这将为用户界面创建一个单视图。\n\
    \n2.  在导航面板中点击`Main.storyboard`文件。Xcode 会显示该单视图。\n\n3.  点击库图标打开对象库窗口。\n\n4.  将表格视图（见图\
    \ 14-2）拖放到视图上的任意位置。\n\n5.  调整表格视图的大小，使其填满整个屏幕。\n\n6.  选择 `Editor ➤ Resolve Auto\
    \ Layout Issues ➤ Reset to Suggested Constraints`。Xcode 会为表格视图添加约束（见图 14-3）。\n\
    \n7.  点击库图标打开对象库窗口。然后拖放一个表格视图单元格到顶部，如图 14-5 所示。\n\n    ![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig5_HTML.jpg](img/329781_5_En_14_Fig5_HTML.jpg)\n\
    \n    图 14-5\n\n    将表格视图单元格拖到表格视图上\n\n8.  选择 `View ➤ Inspectors ➤ Show Attributes\
    \ Inspector`，或者点击 Xcode 窗口右上角的属性检查器图标。\n\n9.  点击标识符文本字段（如图 14-6 所示），输入**cellID**（您可以给它任意名称），然后按回车键。\n\
    \n    ![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig6_HTML.jpg](img/329781_5_En_14_Fig6_HTML.jpg)\n\
    \n    图 14-6\n\n    属性检查器中的标识符文本字段\n\n10. 点击表格视图以将其选中，然后选择 `View ➤ Inspectors\
    \ ➤ Show Connections Inspector`，或者点击 Xcode 窗口右上角的连接检查器图标。\n\n11. 点击`dataSource`右侧出现的圆圈，然后将鼠标拖到视图控制器顶部的`ViewController`图标上，或者文档大纲中的对应图标上，如图\
    \ 14-7 所示。\n\n    ![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig7_HTML.jpg](img/329781_5_En_14_Fig7_HTML.jpg)\n\
    \n    图 14-7\n\n    连接检查器面板允许您将`dataSource`和`delegate`连接到视图控制器\n\n12. 松开鼠标左键。\n\
    \n13. 点击`delegate`右侧出现的圆圈，然后将鼠标拖到视图控制器顶部的`ViewController`图标上，或者文档大纲中的对应图标上。\n\n\
    14. 松开鼠标左键。连接检查器面板应显示`ViewController`文件现在是`dataSource`和`delegate`，如图 14-8 所示。\n\
    \n    ![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig8_HTML.jpg](img/329781_5_En_14_Fig8_HTML.jpg)\n\
    \n    图 14-8\n\n    将`delegate`和`dataSource`连接到`ViewController.swift`文件\n\n15.\
    \ 在导航面板中点击`ViewController.swift`文件。\n\n16. 通过添加`UITableViewDelegate, UITableViewDataSource`来修改`class\
    \ ViewController`这一行，如下所示：\n\n    ```swift\n    class ViewController: UIViewController,\
    \ UITableViewDelegate, UITableViewDataSource {\n    ```\n\n    这段代码的目的是将`ViewController.swift`文件标识为表格视图的委托和数据源。\n\
    \n17. 在`class ViewController`这一行的下方，添加以下数组：\n\n    ```swift\n    let petArray\
    \ = [\"cat\", \"dog\", \"parakeet\", \"parrot\", \"canary\", \"finch\", \"tropical\
    \ fish\", \"goldfish\", \"sea horses\", \"hamster\", \"gerbil\", \"rabbit\", \"\
    turtle\", \"snake\", \"lizard\", \"hermit crab\"]\n    ```\n\n18. 在`viewDidLoad`方法的下方，添加以下函数来定义所需的总行数：\n\
    \n    ```swift\n    func tableView(_ tableView: UITableView, numberOfRowsInSection\
    \ section: Int) -> Int {\n        return petArray.count\n    }\n    ```\n\n19.\
    \ 在`viewDidLoad`方法的下方，添加以下函数来将数据加载到表格中：\n\n    ```swift\n    func tableView(_\
    \ tableView: UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell\
    \ {\n        let cell = tableView.dequeueReusableCell(withIdentifier: \"cellID\"\
    )\n        cell?.textLabel?.text = petArray[indexPath.row]\n        return cell!\n\
    \    }\n    ```\n\n    这段代码引用了具有`\"cellID\"`标识符的单元格，这正是我们在第 9 步中为表格视图单元格定义的标识符。整个`ViewController.swift`文件应如下所示：\n\
    \n    ```swift\n    import UIKit\n    class ViewController: UIViewController,\
    \ UITableViewDelegate, UITableViewDataSource {\n        let petArray = [\"cat\"\
    , \"dog\", \"parakeet\", \"parrot\", \"canary\", \"finch\", \"tropical fish\"\
    , \"goldfish\", \"sea horses\", \"hamster\", \"gerbil\", \"rabbit\", \"turtle\"\
    , \"snake\", \"lizard\", \"hermit crab\"]\n        override func viewDidLoad()\
    \ {\n            super.viewDidLoad()\n            // Do any additional setup after\
    \ loading the view, typically from a nib.\n        }\n        func tableView(_\
    \ tableView: UITableView, numberOfRowsInSection section: Int) -> Int {\n     \
    \       return petArray.count\n        }\n        func tableView(_ tableView:\
    \ UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell {\n     \
    \       let cell = tableView.dequeueReusableCell(withIdentifier: \"cellID\")\n\
    \            cell?.textLabel?.text = petArray[indexPath.row]\n            return\
    \ cell!\n        }\n    }\n    ```\n\n20. 点击运行按钮或选择 `Product ➤ Run`。模拟器窗口出现，显示表格视图中的数据（见图\
    \ 14-4）。\n\n21. 在表格视图中上下滚动，观察数据如何从屏幕顶部和底部滚动出去。\n\n22. 选择 `Simulator ➤ Quit Simulator`\
    \ 返回 Xcode。\n"
- fmt: "# Selecting an Item in a Table View\n\nA table view displays rows of data\
    \ for the user to select. To detect which row the user tapped to select, we need\
    \ another function called `didSelectRowAt`, which can identify the row selected\
    \ and retrieve the data from that row. To see how to select an item in a table\
    \ view, follow these steps:\n\n1. Make sure the `TableViewApp` project is loaded\
    \ in Xcode.\n2. Click the `ViewController.swift` file in the Navigator pane. Xcode\
    \ displays the single view.\n3. Add the following function underneath the `viewDidLoad`\
    \ method:\n\n```swift\nfunc tableView(_ tableView: UITableView, didSelectRowAt\
    \ indexPath: IndexPath) {\n    let selectedItem = petArray[indexPath.row]\n  \
    \  let alert = UIAlertController(title: \"Your Choice\", message: \"\\(selectedItem)\"\
    , preferredStyle: .alert)\n    let okAction = UIAlertAction(title: \"OK\", style:\
    \ .default, handler: { action -> Void in\n        //Just dismiss the action sheet\n\
    \    })\n    alert.addAction(okAction)\n    self.present(alert, animated: true,\
    \ completion: nil)\n}\n```\n\nThis function returns the `indexPath`, which can\
    \ be used to identify the row the user tapped. Based on this index, we can retrieve\
    \ the proper item from the `petArray` that filled the table view with data. Then\
    \ it displays an alert controller to identify what item the user tapped on. The\
    \ entire `ViewController.swift` file should look like this:\n\n```swift\nimport\
    \ UIKit\nclass ViewController: UIViewController, UITableViewDelegate, UITableViewDataSource\
    \ {\n    let petArray = [\"cat\", \"dog\", \"parakeet\", \"parrot\", \"canary\"\
    , \"finch\", \"tropical fish\", \"goldfish\", \"sea horses\", \"hamster\", \"\
    gerbil\", \"rabbit\", \"turtle\", \"snake\", \"lizard\", \"hermit crab\"]\n  \
    \  override func viewDidLoad() {\n        super.viewDidLoad()\n        // Do any\
    \ additional setup after loading the view, typically from a nib.\n    }\n    func\
    \ tableView(_ tableView: UITableView, numberOfRowsInSection section: Int) -> Int\
    \ {\n        return petArray.count\n    }\n    func tableView(_ tableView: UITableView,\
    \ cellForRowAt indexPath: IndexPath) -> UITableViewCell {\n        let cell =\
    \ tableView.dequeueReusableCell(withIdentifier: \"cellID\")\n        cell?.textLabel?.text\
    \ = petArray[indexPath.row]\n        return cell!\n    }\n    func tableView(_\
    \ tableView: UITableView, didSelectRowAt indexPath: IndexPath) {\n        let\
    \ selectedItem = petArray[indexPath.row]\n        let alert = UIAlertController(title:\
    \ \"Your Choice\", message: \"\\(selectedItem)\", preferredStyle: .alert)\n  \
    \      let okAction = UIAlertAction(title: \"OK\", style: .default, handler: {\
    \ action -> Void in\n            //Just dismiss the action sheet\n        })\n\
    \        alert.addAction(okAction)\n        self.present(alert, animated: true,\
    \ completion: nil)\n    }\n}\n```\n\n4. Click the Run button or choose Product\
    \ ➤ Run. The Simulator window appears, displaying the data in your table view\
    \ (see Figure 14-4).\n5. Click an item in the table view. An alert controller\
    \ appears to identify your choice as shown in Figure 14-9.\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig9_HTML.jpg](images/329781_5_En_14_Chapter/329781_5_En_14_Fig9_HTML.jpg)\n\
    \nFigure 14-9: An alert appears to identify the selected choice\n\n6. Click OK\
    \ to dismiss the alert controller.\n7. Choose Simulator ➤ Quit Simulator to return\
    \ to Xcode.\n\n# Creating Grouped Tables\n\nOur current examples of a table simply\
    \ list data in endless rows, which is known as a plain table style. To help organize\
    \ data displayed in a table view, you can create a grouped table style that divides\
    \ data into sections where each section has a header title as shown in Figure\
    \ 14-10.\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig10_HTML.jpg](images/329781_5_En_14_Chapter/329781_5_En_14_Fig10_HTML.jpg)\n\
    \nFigure 14-10: Grouped tables divide data into sections with headers\n\nCreating\
    \ a grouped table involves several additional steps:\n\n- Define the table view\
    \ as a grouped style.\n- Write a `numberOfSections` function that defines how\
    \ many sections the table view contains.\n- Write a `numberOfRowsInSection` function\
    \ that defines how many rows appear in each section.\n- Write a `titleForHeaderInSection`\
    \ function that defines the header that appears for each section.\n\nTo define\
    \ sections, data must be arranged differently. In the previous example, we simply\
    \ had an array of strings. However to display data in sections, we need an array\
    \ of arrays. Each array of strings represents a different section such as:\n\n\
    ```swift\nlet petArray = [[\"Mammal\", \"cat\", \"dog\", \"hamster\", \"gerbil\"\
    , \"rabbit\"], [\"Bird\", \"parakeet\", \"parrot\", \"canary\", \"finch\"], [\"\
    Fish\", \"tropical fish\", \"goldfish\", \"sea horses\"], [\"Reptile\", \"turtle\"\
    , \"snake\", \"lizard\"]]\n```\n\nThe preceding array contains four arrays of\
    \ strings where the first item in each array defines a header for that section.\
    \ So the first array’s header is “Mammal”, the second array’s header is “Bird”,\
    \ the third array’s header is “Fish”, and the fourth array’s header is “Reptile”.\n\
    \nWhen determining the number of rows in each section, we need to subtract 1 because\
    \ the section header appears at the beginning of each array. So the `numberOfRowsInSection`\
    \ function subtracts 1 to accurately count the rows in each section like this:\n\
    \n```swift\nfunc tableView(_ tableView: UITableView, numberOfRowsInSection section:\
    \ Int) -> Int {\n    return petArray[section].count - 1\n}\n```\n\nDisplaying\
    \ data in a table view involves identifying the section and then the row. However,\
    \ since the first element of each array contains a section header, we need to\
    \ skip over this header by adding 1 to the array index like this line, which appears\
    \ inside the `cellForRowAt` function:\n\n```swift\ncell?.textLabel?.text = petArray[indexPath.section][indexPath.row\
    \ + 1]\n```\n\nIn addition, we need to identify the item the user tapped on with\
    \ this code in the `didSelectRowAt` function:\n\n```swift\nlet selectedItem =\
    \ petArray[indexPath.section][indexPath.row + 1]\n```\n\nIdentifying the number\
    \ of sections is simply a matter of counting all the elements (arrays) in the\
    \ `petArray` like this:\n\n```swift\nfunc numberOfSections(in tableView: UITableView)\
    \ -> Int {\n    return petArray.count\n}\n```\n\nTo display the header, we need\
    \ to retrieve the first element from each section like this:\n\n```swift\nfunc\
    \ tableView(_ tableView: UITableView, titleForHeaderInSection section: Int) ->\
    \ String? {\n    return petArray[section][0]\n}\n```\n\nTo see how to create a\
    \ grouped table, follow these steps:\n\n1. Create a new iOS project using the\
    \ Single View App template (see Chapter 1) and name this new project `GroupTableViewApp`.\
    \ This creates a single view for the user interface.\n2. Click the `Main.storyboard`\
    \ file in the Navigator pane. Xcode displays the single view.\n3. Click the Library\
    \ icon to open the Object Library window.\n4. Drag and drop a table view (see\
    \ Figure 14-2) anywhere on the view.\n5. Resize the table view so it fills the\
    \ entire screen.\n6. Choose Editor ➤ Resolve Auto Layout Issues ➤ Reset to Suggested\
    \ Constraints. Xcode adds constraints to the table view (see Figure 14-3).\n7.\
    \ Choose View ➤ Inspectors ➤ Show Attributes Inspector, or click the Attributes\
    \ Inspector icon in the upper right corner of the Xcode window."
