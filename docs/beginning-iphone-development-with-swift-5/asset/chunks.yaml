- fmt: '# Adding a Split View Controller to a Storyboard


    Once you’ve seen how a `Split View Controller` behaves in different iOS devices
    and orientations, it’s time to learn more about creating and customizing a `Split
    View Controller`. A `Split View Controller` typically needs at least one table
    view to represent the master view and a `View Controller` to represent the detail
    view.


    That means you need to fill a table view with data and then write code to define
    how the `Split View Controller` displays data in the master and detail views.


    To see how to create the storyboard for a `Split View Controller`, follow these
    steps:


    1.  Create a new iOS project using the Single View App template (see Chapter 1)
    and name this new project `SplitViewCustomApp`. This creates a single view for
    the user interface.


    2.  Click the `Main.storyboard` in the Navigator pane.


    3.  Click the View Controller Scene in the Document Outline and press BACKSPACE
    or DELETE to remove the View Controller from the storyboard.


    4.  Click `ViewController.swift` in the Navigator pane and choose Edit ➤ Delete.
    A dialog appears, asking how you want to delete the file.


    5.  Click the Move to Trash button. The `ViewController.swift` file disappears
    from the Navigator pane.


    6.  Click the `Main.storyboard` file in the Navigator pane.


    7.  Click the Library icon to open the Object Library window.


    8.  Drag and drop a Split View Controller from the Object Library window to the
    storyboard as shown in Figure 20-12.


    ![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig12_HTML.jpg](images/329781_5_En_20_Chapter/329781_5_En_20_Fig12_HTML.jpg)


    Figure 20-12


    Dragging a Split View Controller onto a storyboard


    9.  Click the Split View Controller Scene in the Document Outline.


    10.  Choose View ➤ Inspectors ➤ Show Attributes Inspector, or click the Attributes
    Inspector icon in the upper right corner of the Xcode window.


    11.  Select the “Is Initial View Controller” check box. Xcode displays an arrow
    pointing to the Split View Controller.


    12.  Click the View Controller Scene in the Document Outline.


    13.  Choose Editor ➤ Embed In ➤ Navigation Controller. Xcode embeds the View Controller
    inside a Navigation Controller. This will allow the View Controller to slide in
    and out, but we need to create a segue between the table cell and this Navigation
    Controller, so when the user clicks a table cell, it displays the View Controller
    inside this Navigation Controller.


    14.  Click the Table View Cell under Table View in the Root View Controller Scene
    in the Document Outline.


    15.  Choose View ➤ Inspectors ➤ Show Attributes Inspector, or click the Attributes
    Inspector icon in the upper right corner of the Xcode window.


    16.  Click in the Identifier text field, type `customCell`, and press ENTER. Xcode
    changes the Table View Cell name in the Document Outline to `customCell`.


    17.  Move the mouse pointer over `customCell` in the Document Outline, hold down
    the Control key, and Ctrl-drag from `customCell` to the Navigation Controller
    that embeds the blank View Controller as shown in Figure 20-13.


    ![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig13_HTML.jpg](images/329781_5_En_20_Chapter/329781_5_En_20_Fig13_HTML.jpg)


    Figure 20-13


    Creating a segue between the Table View Cell and the Navigation Controller


    18.  Release the Control key and the left mouse button. A popup menu appears as
    shown in Figure 20-14.


    ![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig14_HTML.jpg](images/329781_5_En_20_Chapter/329781_5_En_20_Fig14_HTML.jpg)


    Figure 20-14


    A segue popup menu


    19.  Choose Show Detail. Xcode create a segue between the Table View Cell (named
    `customCell`) and the Navigation Controller that embeds the blank View Controller.


    20.  Click the Show Detail segue “showDetail” to “Navigation Controller” in the
    Document Outline. This selects the segue from the Table View Cell (`customCell`)
    to the Navigation Controller.


    21.  Choose View ➤ Inspectors ➤ Show Attributes Inspector, or click the Attributes
    Inspector icon in the upper right corner of the Xcode window.


    22.  Click in the Identifier text field, type `showDetail`, and press ENTER as
    shown in Figure 20-15.


    ![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig15_HTML.jpg](images/329781_5_En_20_Chapter/329781_5_En_20_Fig15_HTML.jpg)


    Figure 20-15


    Defining an Identifier name for the segue between the Table View Cell and the
    Navigation Controller


    23.  Click View under View Controller Scene in the Document Outline.


    24.  Choose View ➤ Inspectors ➤ Show Attributes Inspector, or click the Attributes
    Inspector icon in the upper right corner of the Xcode window.


    25.  Click in the Background popup menu and choose a different color such as yellow
    to make it easy to identify the View Controller when the app runs.


    26.  Click the Library icon to open the Object Library window.


    27.  Drag and drop a label in the middle of the view that you just modified to
    display a background color such as yellow.


    28.  Click the Align icon at the bottom of the Xcode window to display a popup
    window.


    29.  Select the Horizontally in Container and Vertically in Container check boxes.
    Then click the Add 2 Constraints button.


    The storyboard for the Split View Controller is now complete. Now we need to create
    `.swift` files for the Split View Controller’s master view and detail view.'
