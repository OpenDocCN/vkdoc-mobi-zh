    \ {(textField) in\n        textField.placeholder = \"Pet type here\"\n    })\n\
    \    let okAction = UIAlertAction(title: \"OK\", style: .default, handler: { action\
    \ -> Void in\n        let savedText = alert.textFields![0] as UITextField\n  \
    \      self.petArray.insert(savedText.text ?? \"default\", at: location)\n   \
    \     self.tableView.reloadData()\n    })\n    let cancelAction = UIAlertAction(title:\
    \ \"Cancel\", style: .default, handler: { action -> Void in\n        // Do nothing\n\
    \    })\n    alert.addAction(okAction)\n    alert.addAction(cancelAction)\n  \
    \  self.present(alert, animated: true, completion: nil)\n}\n```\n\n`displayAlert`函数接受一个整数，该整数代表一个索引位置值，用于标识`petArray`中当前选中的项目。然后它会显示一个警告控制器，其中包含一个文本字段和两个标记为“OK”和“Cancel”的按钮。\n\
    \n如果用户点击“Cancel”按钮，则不会发生任何操作，警告控制器消失。如果用户点击“OK”按钮，则警告控制器获取文本字段中的内容，并将其插入到`petArray`中。然后，它会重新加载整个表格视图以显示修改后的数组内容。\n\
    \n22. 在上一个函数下方，添加以下函数以在用户滑动表格视图行时显示两个按钮：\n\n```\nfunc tableView(_ tableView: UITableView,\
    \ editActionsForRowAt indexPath: IndexPath) -> [UITableViewRowAction]? {\n   \
    \ let addAction = UITableViewRowAction(style: UITableViewRowAction.Style.normal,\
    \ title: \"Add\", handler: {(action: UITableViewRowAction, indexPath: IndexPath)\
    \ in\n        self.displayAlert(location: indexPath.row)\n    })\n    let deleteAction\
    \ = UITableViewRowAction(style: UITableViewRowAction.Style.destructive, title:\
    \ \"Delete\", handler: {(action: UITableViewRowAction, indexPath: IndexPath) in\n\
    \        self.petArray.remove(at: indexPath.row)\n        tableView.deleteRows(at:\
    \ [indexPath], with: UITableView.RowAnimation.fade)\n    })\n    return [deleteAction,\
    \ addAction]\n}\n```\n\n`addAction`行定义了一个使用`.normal`样式（显示为灰色按钮）的“Add”按钮。点击“Add”按钮会运行`displayAlert`函数，并传递表格视图中选中项目的当前索引值。\n\
    \n`deleteAction`行定义了一个“Delete”按钮，它从`petArray`和表格视图中移除选中的项目。\n\n整个`ViewController.swift`文件应如下所示：\n\
    \n```\nimport UIKit\nclass ViewController: UIViewController, UITableViewDelegate,\
    \ UITableViewDataSource {\n    @IBOutlet var tableView: UITableView!\n    var\
    \ petArray = [\"cat\", \"dog\", \"parakeet\", \"parrot\", \"canary\", \"finch\"\
    , \"tropical fish\", \"goldfish\", \"sea horses\", \"hamster\", \"gerbil\", \"\
    rabbit\", \"turtle\", \"snake\", \"lizard\", \"hermit crab\"]\n    let cellID\
    \ = \"cellID\"\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        tableView.dataSource = self\n        tableView.delegate = self\n    \
    \    // Do any additional setup after loading the view, typically from a nib.\n\
    \    }\n    func tableView(_ tableView: UITableView, numberOfRowsInSection section:\
    \ Int) -> Int {\n        return petArray.count\n    }\n    func tableView(_ tableView:\
    \ UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell {\n     \
    \   var cell = tableView.dequeueReusableCell(withIdentifier: cellID)\n       \
    \ if (cell == nil) {\n            cell = UITableViewCell(\n                style:\
    \ UITableViewCell.CellStyle.default,\n                reuseIdentifier: cellID)\n\
    \        }\n        cell?.textLabel?.text = petArray[indexPath.row]\n        return\
    \ cell!\n    }\n    func tableView(_ tableView: UITableView, didSelectRowAt indexPath:\
    \ IndexPath) {\n        let selectedItem = petArray[indexPath.row]\n        let\
    \ alert = UIAlertController(title: \"Your Choice\", message: \"\\(selectedItem)\"\
    , preferredStyle: .alert)\n        let okAction = UIAlertAction(title: \"OK\"\
    , style: .default, handler: { action -> Void in\n            //Just dismiss the\
    \ action sheet\n        })\n        alert.addAction(okAction)\n        self.present(alert,\
    \ animated: true, completion: nil)\n    }\n    func displayAlert(location: Int)\
    \ {\n        let alert = UIAlertController(title: \"Add\", message: \"New Pet\"\
    , preferredStyle: .alert)\n        alert.addTextField(configurationHandler: {(textField)\
    \ in\n            textField.placeholder = \"Pet type here\"\n        })\n    \
    \    let okAction = UIAlertAction(title: \"OK\", style: .default, handler: { action\
    \ -> Void in\n            let savedText = alert.textFields![0] as UITextField\n\
    \            self.petArray.insert(savedText.text ?? \"default\", at: location)\n\
    \            self.tableView.reloadData()\n        })\n        let cancelAction\
    \ = UIAlertAction(title: \"Cancel\", style: .default, handler: { action -> Void\
    \ in\n            // Do nothing\n        })\n        alert.addAction(okAction)\n\
    \        alert.addAction(cancelAction)\n        self.present(alert, animated:\
    \ true, completion: nil)\n    }\n    func tableView(_ tableView: UITableView,\
    \ editActionsForRowAt indexPath: IndexPath) -> [UITableViewRowAction]? {\n   \
    \     let addAction = UITableViewRowAction(style: UITableViewRowAction.Style.normal,\
    \ title: \"Add\", handler: {(action: UITableViewRowAction, indexPath: IndexPath)\
    \ in\n            self.displayAlert(location: indexPath.row)\n        })\n   \
    \     let deleteAction = UITableViewRowAction(style: UITableViewRowAction.Style.destructive,\
    \ title: \"Delete\", handler: {(action: UITableViewRowAction, indexPath: IndexPath)\
    \ in\n            self.petArray.remove(at: indexPath.row)\n            tableView.deleteRows(at:\
    \ [indexPath], with: UITableView.RowAnimation.fade)\n        })\n        return\
    \ [deleteAction, addAction]\n    }\n}\n```\n\n23. 点击运行按钮或选择 Product ➤ Run。模拟器窗口出现，显示表格视图。\n\
    \n24. 将鼠标指针移到“tropical fish”上，按住鼠标左键并向左拖动。“Add”和“Delete”按钮出现，如图 15-14 所示。\n\n\
    ![../images/329781_5_En_15_Chapter/329781_5_En_15_Fig14_HTML.jpg](img/329781_5_En_15_Fig14_HTML.jpg)\n\
    \n图 15-14\n向左滑动会显示“Add”和“Delete”按钮\n"
