  trans: "\n### 更改对象的属性\n\n每个对象都允许您定义其大小和位置，但您也可以根据对象类型修改其他属性。例如，按钮允许您更改定义按钮上显示文本的\
    \ `Title` 属性，而文本字段则具有定义文本字段内显示文本的 `Text` 属性。\n\n若要查看不同对象如何提供不同类型的属性，请按照以下步骤操作：\n\
    \n1. 确保你的 `ObjectApp` 项目已在 `Xcode` 中加载。\n2. 在导航器窗格中点击 `Main.storyboard` 文件。\n\
    3. 点击库图标以显示对象库。\n4. 将文本字段拖放至故事板的任意位置。\n5. 将鼠标指针移到文本字段上。当鼠标指针变成手形图标时，将鼠标拖动到视图左上角按钮的下方。请注意，当两个对象靠近时，会出现参考线帮助你将一个对象与另一个对象对齐，如图\
    \ 6-7 所示。\n\n   ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig7_HTML.jpg](img/329781_5_En_6_Fig7_HTML.jpg)\n\
    \n   图 6-7  \n   将对象拖到另一对象附近时出现的参考线\n\n6. 点击文本字段将其选中，使其周围出现控制柄。\n7. 选择 `View ➤\
    \ Inspectors ➤ Show Attributes Inspector`，或点击检查器窗格顶部的属性检查器图标。\n8. 点击 `Text` 文本字段，输入\
    \ `Hello` 并按 `ENTER` 键。请注意，文本会显示在 `Text` 文本字段以及用户界面上的文本字段中，如图 6-8 所示。\n\n   ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig8_HTML.jpg](img/329781_5_En_6_Fig8_HTML.jpg)\n\
    \n   图 6-8  \n   更改文本字段的 `Text` 属性\n\n9. 点击按钮，使其周围出现控制柄。请注意，属性检查器窗格会发生变化，以显示所选按钮的属性。\n\
    10. 点击 `Title` 文本字段，输入 `OK` 并按 `ENTER` 键。请注意，`OK` 现在也会显示在按钮上，如图 6-9 所示。\n\n  \
    \  ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig9_HTML.jpg](img/329781_5_En_6_Fig9_HTML.jpg)\n\
    \n    图 6-9  \n    更改按钮的 `Title` 属性\n\n11. 点击文本字段将其选中。\n12. 选择 `View ➤ Inspectors\
    \ ➤ Show Size Inspector`，或点击检查器窗格顶部的大小检查器图标。\n13. 点击 `X` 文本字段，输入 16，然后按 `ENTER`\
    \ 键。请注意，文本字段会向左移动，靠近视图的左边界。\n14. 点击 `Y` 文本字段，输入 115，然后按 `ENTER` 键。请注意，文本字段会出现在按钮下方。\n\
    \n### 了解安全区域\n\n目前，你的 `ObjectApp` 用户界面在左上角包含一个按钮，其下方有一个文本字段。由于我们现在使用的故事板模仿的是 iPhone\
    \ 8，因此只要在 iPhone 8 上运行，或者在模拟器中模拟 iPhone 8 时运行，用户界面看起来都会很完美。但是，如果我们将故事板切换为模仿 iPhone\
    \ XR，按钮的位置突然就看起来不对劲了，如图 6-10 所示。\n\n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig10_HTML.jpg](img/329781_5_En_6_Fig10_HTML.jpg)\n\
    \n图 6-10  \n在 iPhone XR 屏幕上查看 `ObjectApp` 用户界面\n\n问题在于，我们根据 iPhone 8 的屏幕尺寸放置了按钮，但\
    \ iPhone XR 的屏幕尺寸略有不同。在设计 iOS 应用时，你永远无法预知用户会在哪种 iOS 设备上运行你的应用，可能是屏幕较小的 iPhone\
    \ SE，也可能是屏幕较大的 iPad Pro。苹果每年都会推出不同尺寸的 iPhone 和 iPad，所以你永远无法预测未来的屏幕尺寸会如何变化。\n\n\
    为了帮助你设计出在当前及未来任何 iOS 设备上都能良好显示的 iOS 应用，`Xcode` 提供了两个功能：\n\n- 安全区域\n- 自动布局\n\n\
    安全区域定义了应放置用户界面对象的区域，这样它们就能在任何 iOS 设备屏幕上正确显示。要查看任何 iOS 设备的安全区域，请按照以下步骤操作：\n\n1.\
    \ 确保 `ObjectApp` 项目已在 `Xcode` 中加载。\n2. 在导航器窗格中点击 `Main.storyboard` 文件以查看应用的用户界面。\n\
    3. 在文档大纲中点击 `Safe Area`。（如果文档大纲不可见，请选择 `Editor ➤ Show Document Outline`，或点击 `Xcode`\
    \ 窗口底部附近的文档大纲图标。）`Xcode` 会为安全区域添加阴影，以便你查看需要放置用户界面对象的位置，如图 6-11 所示。请注意，图 6-11 中的按钮显示在安全区域之外，这就解释了它为什么看起来不对劲。\n\
    \n   ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig11_HTML.jpg](img/329781_5_En_6_Fig11_HTML.jpg)\n\
    \n   图 6-11  \n   查看 iOS 设备的安全区域\n\n4. 点击 `Xcode` 窗口底部的“View as:”按钮，为故事板选择另一个模仿的\
    \ iOS 设备，例如 iPhone 8 Plus。请注意，之前在一个 iOS 设备上显示不正确的按钮，现在在另一个 iOS 设备上却显示正确了，如图 6-12\
    \ 所示。\n\n   ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig12_HTML.jpg](img/329781_5_En_6_Fig12_HTML.jpg)\n\
    \n   图 6-12  \n   将故事板查看为 iPhone 8 Plus\n"
- fmt: "# Defining Constraints\n\nSince different iOS devices have varying screen\
    \ sizes (and Safe Areas), the way to design user interfaces correctly is to use\
    \ a feature called Auto Layout. The main idea behind Auto Layout is that you position\
    \ objects on the user interface, within the Safe Area, then you define how far\
    \ those objects should appear from the borders of the Safe Area.\n\nThe distances\
    \ you define for your user interface objects are called constraints. Constraints\
    \ tell Auto Layout where to position objects on the user interface regardless\
    \ of the iOS device screen the app is running on at the time.\n\nConstraints work\
    \ either by defining distances between objects or by defining the size (width/height)\
    \ of an object. The different ways to define a constraint include the following:\n\
    \n- Define a specific distance between one object and another object or the border\
    \ of the Safe Area, or a specific height or width of an object.\n- Define a minimum\
    \ or maximum distance the object can appear to another object or to the border\
    \ of the Safe Area, or a minimum/maximum height or width of an object.\n- Define\
    \ a relative position for an object such as centered vertically or horizontally\
    \ in a view.\n- Define which constraints have greater priority over other constraints.\n\
    \nA fixed constraint defines a specific size or distance between two objects (or\
    \ one object and the Safe Area border). Now no matter what iOS device the app\
    \ runs on, that object always appears a fixed distance from another object or\
    \ Safe Area border. Fixed distance constraints are the most common types of constraints\
    \ used.\n\nA constraint that defines a minimum or maximum distance between two\
    \ objects (or the Safe Area border) allows an object to vary its distance depending\
    \ on the iOS device the app is running on. This allows a user interface to adjust\
    \ its appearance for a larger iPad Pro screen and shrink down in size when appearing\
    \ on the much smaller iPhone SE screen. Constraints that define minimum or maximum\
    \ distances are often used together with fixed distance constraints.\n\nWhen designing\
    \ simple user interfaces, you may only need to design fixed distance constraints.\
    \ When designing more complicated user interfaces, you may also need constraints\
    \ that can vary distances between objects. However, the more constraints you place\
    \ on different user interface objects, the more likely you risk creating contradictory\
    \ constraints.\n\nContradictory constraints commonly occur when you use two or\
    \ more fixed distance constraints. For example, you might want a button to appear\
    \ a fixed width and a fixed distance from the left and right side of the screen.\
    \ However, it’s impossible to keep an object a fixed width and a fixed distance\
    \ from both the left and right sides of the screen on both large and small iOS\
    \ device screens.\n\nThe solution is to assign priorities to different constraints\
    \ where one constraint is more important than another. Now if your app runs on\
    \ different iOS device screens, the constraints with the highest priority define\
    \ the user interface first and then the constraints with lower priorities define\
    \ the user interface next.\n\n## Defining Constraints Automatically\n\nThe simplest\
    \ way to define constraints is to let Xcode do it for you automatically. The drawback\
    \ with this method is that Xcode may not always create the constraints you might\
    \ want for your user interface, but you can always delete or modify its constraints\
    \ later if necessary.\n\nTo see how to define constraints automatically, follow\
    \ these steps:\n\n1. Make sure the ObjectApp project is loaded in Xcode.\n2. Click\
    \ the `Main.storyboard` file in the Navigator pane.\n3. Choose `Editor` ➤ `Resolve\
    \ Auto Layout Issues`. A menu appears as shown in Figure [6-13]. The top half\
    \ of this submenu applies to any selected objects. The bottom half of this submenu\
    \ applies to all objects whether you selected them or not.\n\n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig13_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig13_HTML.jpg)\n\
    \nFigure 6-13  \nThe `Resolve Auto Layout Issues` submenu\n\n4. Choose `Add Missing\
    \ Constraints` in the bottom half of the submenu.\n5. Hold down the SHIFT key\
    \ and click the button and the text field so handles appear around both objects.\
    \ Notice that Xcode displays constraints as lines defining distances between objects\
    \ or the Safe Area boundaries as shown in Figure [6-14].\n\n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig14_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig14_HTML.jpg)\n\
    \nFigure 6-14  \nViewing constraints for selected objects\n\n6. Click the `View\
    \ as:` button at the bottom of the Xcode window and choose iPhone XR to make the\
    \ storyboard mimic the iPhone XR screen. Notice that after we defined constraints,\
    \ Xcode correctly displays the button in the upper left corner of the iPhone XR\
    \ screen as shown in Figure [6-15].\n\n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig15_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig15_HTML.jpg)\n\
    \nFigure 6-15  \nConstraints correctly define objects in any size iOS screen\n\
    \nXcode displays constraints in different colors to help you identify possible\
    \ problems. The different color constraints Xcode can display include:\n\n- **Blue**\
    \ – Your constraints are sufficient to define the position of your user interface\
    \ object on different size iOS screens.\n- **Orange** – You do not have enough\
    \ constraints to properly define the position of your user interface object on\
    \ different size iOS screens.\n- **Red** – Your constraints are contradictory\
    \ or insufficient and will not display the position of your user interface object\
    \ correctly.\n\n## Viewing and Deleting Constraints\n\nOnce you’ve defined constraints,\
    \ you can always view or delete them later. Viewing constraints gives you a chance\
    \ to modify how they behave. Deleting constraints lets you remove any constraints\
    \ you don’t need.\n\nTo see how to view and delete constraints, follow these steps:\n\
    \n1. Make sure the ObjectApp project is loaded in Xcode.\n2. Click the `Main.storyboard`\
    \ file in the Navigator pane.\n3. If the Document Outline isn’t visible, choose\
    \ `Editor` ➤ `Show Document Outline` or click the Document Outline icon at the\
    \ bottom of the Xcode window.\n4. Click the hierarchy of gray disclosure triangles\
    \ (`View Controller Scene` ➤ `View Controller` ➤ `View` ➤ `Constraints`) to see\
    \ a list of all constraints currently defined as shown in Figure [6-16].\n\n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig16_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig16_HTML.jpg)\n\
    \nFigure 6-16  \nViewing constraints in the Document Outline\n\n5. Click any constraint\
    \ to select it. Notice that details of that constraint appear in the Inspector\
    \ pane as shown in Figure [6-17].\n\n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig17_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig17_HTML.jpg)\n\
    \nFigure 6-17  \nThe Inspector pane lets you modify different parts of a constraint\n\
    \n6. Click the constraint you want to delete and press the BACKSPACE or DELETE\
    \ key. Repeat this step until you have deleted all the constraints. Notice that\
    \ as you delete constraints, Xcode may change the colors of any remaining constraints\
    \ to show you do not have enough constraints to properly define an object’s position\
    \ on the user interface. (You can also remove constraints by choosing `Editor`\
    \ ➤ `Resolve Auto Layout Issues` ➤ `Clear Constraints`. If you choose the top\
    \ half of the submenu, you’ll only clear constraints from the selected objects.\
    \ If you choose the bottom half of the submenu, you’ll clear constraints from\
    \ all objects whether you’ve selected them or not.)"
  raw: "## Defining Constraints\n\nSince different iOS devices have varying screen\
    \ sizes (and Safe Areas), the way to design user interfaces correctly is to use\
    \ a feature called Auto Layout . The main idea behind Auto Layout is that you\
    \ position objects on the user interface, within the Safe Area, then you define\
    \ how far those objects should appear from the borders of the Safe Area.\n\nThe\
    \ distances you define for your user interface objects are called constraints.\
    \ Constraints tell Auto Layout where to position objects on the user interface\
    \ regardless of the iOS device screen the app is running on at the time.\n\nConstraints\
    \ work either by defining distances between objects or by defining the size (width/height)\
    \ of an object. The different ways to define a constraint include the following:\n\
    \n*   Define a specific distance between one object and another object or the\
    \ border of the Safe Area, or a specific height or width of an object.\n\n*  \
    \ Define a minimum or maximum distance the object can appear to another object\
    \ or to the border of the Safe Area, or a minimum/maximum height or width of an\
    \ object.\n\n*   Define a relative position for an object such as centered vertically\
    \ or horizontally in a view.\n\n*   Define which constraints have greater priority\
    \ over other constraints.\n\nA fixed constraint defines a specific size or distance\
    \ between two objects (or one object and the Safe Area border). Now no matter\
    \ what iOS device the app runs on, that object always appears a fixed distance\
    \ from another object or Safe Area border. Fixed distance constraints are the\
    \ most common types of constraints used.\n\nA constraint that defines a minimum\
    \ or maximum distance between two objects (or the Safe Area border) allows an\
    \ object to vary its distance depending on the iOS device the app is running on.\
    \ This allows a user interface to adjust its appearance for a larger iPad Pro\
    \ screen and shrink down in size when appearing on the much smaller iPhone SE\
    \ screen. Constraints that define minimum or maximum distances are often used\
    \ together with fixed distance constraints.\n\nWhen designing simple user interfaces,\
    \ you may only need to design fixed distance constraints. When designing more\
    \ complicated user interfaces, you may also need constraints that can vary distances\
    \ between objects. However, the more constraints you place on different user interface\
    \ objects, the more likely you risk creating contradictory constraints.\n\nContradictory\
    \ constraints commonly occur when you use two or more fixed distance constraints.\
    \ For example, you might want a button to appear a fixed width and a fixed distance\
    \ from the left and right side of the screen. However, it’s impossible to keep\
    \ an object a fixed width and a fixed distance from both the left and right sides\
    \ of the screen on both large and small iOS device screens.\n\nThe solution is\
    \ to assign priorities to different constraints where one constraint is more important\
    \ than another. Now if your app runs on different iOS device screens, the constraints\
    \ with the highest priority define the user interface first and then the constraints\
    \ with lower priorities define the user interface next.\n\n### Defining Constraints\
    \ Automatically\n\nThe simplest way to define constraints is to let Xcode do it\
    \ for you automatically. The drawback with this method is that Xcode may not always\
    \ create the constraints you might want for your user interface, but you can always\
    \ delete or modify its constraints later if necessary.\n\nTo see how to define\
    \ constraints automatically, follow these steps:\n\n1.  Make sure the ObjectApp\
    \ project is loaded in Xcode.\n\n2.  Click the Main.storyboard file in the Navigator\
    \ pane.\n\n3.  Choose Editor ➤ Resolve Auto Layout Issues. A menu appears as shown\
    \ in Figure [6-13](#329781_5_En_6_Chapter.xhtml#Fig13). The top half of this submenu\
    \ applies to any selected objects. The bottom half of this submenu applies to\
    \ all objects whether you selected them or not.\n\n    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig13_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig13_HTML.jpg)\n\
    \n    Figure 6-13\n\n    The Resolve Auto Layout Issues submenu\n\n4.  Choose\
    \ Add Missing Constraints in the bottom half of the submenu.\n\n5.  Hold down\
    \ the SHIFT key and click the button and the text field so handles appear around\
    \ both objects. Notice that Xcode displays constraints as lines defining distances\
    \ between objects or the Safe Area boundaries as shown in Figure [6-14](#329781_5_En_6_Chapter.xhtml#Fig14).\n\
    \n    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig14_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig14_HTML.jpg)\n\
    \n    Figure 6-14\n\n    Viewing constraints for selected objects\n\n6.  Click\
    \ the “View as:” button at the bottom of the Xcode window and choose iPhone XR\
    \ to make the storyboard mimic the iPhone XR screen. Notice that after we defined\
    \ constraints, Xcode correctly displays the button in the upper left corner of\
    \ the iPhone XR screen as shown in Figure [6-15](#329781_5_En_6_Chapter.xhtml#Fig15).\n\
    \n    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig15_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig15_HTML.jpg)\n\
    \n    Figure 6-15\n\n    Constraints correctly define objects in any size iOS\
    \ screen\n\nXcode displays constraints in different colors to help you identify\
    \ possible problems. The different color constraints Xcode can display include\n\
    \n*   Blue – Your constraints are sufficient to define the position of your user\
    \ interface object on different size iOS screens.\n\n*   Orange – You do not have\
    \ enough constraints to properly define the position of your user interface object\
    \ on different size iOS screens.\n\n*   Red – Your constraints are contradictory\
    \ or insufficient and will not display the position of your user interface object\
    \ correctly.\n\n### Viewing and Deleting Constraints\n\nOnce you’ve defined constraints,\
    \ you can always view or delete them later. Viewing constraints gives you a chance\
    \ to modify how they behave. Deleting constraints lets you remove any constraints\
    \ you don’t need.\n\nTo see how to view and delete constraints, follow these steps:\n\
    \n1.  Make sure the ObjectApp project is loaded in Xcode.\n\n2.  Click the Main.storyboard\
    \ file in the Navigator pane.\n\n3.  If the Document Outline isn’t visible, choose\
    \ Editor ➤ Show Document Outline or click the Document Outline icon at the bottom\
    \ of the Xcode window.\n\n4.  Click the hierarchy of gray disclosure triangles\
    \ (View Controller Scene ➤ View Controller ➤ View ➤ Constraints) to see a list\
    \ of all constraints currently defined as shown in Figure [6-16](#329781_5_En_6_Chapter.xhtml#Fig16).\n\
    \n    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig16_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig16_HTML.jpg)\n\
    \n    Figure 6-16\n\n    Viewing constraints in the Document Outline\n\n5.  Click\
    \ any constraint to select it. Notice that details of that constraint appear in\
    \ the Inspector pane as shown in Figure [6-17](#329781_5_En_6_Chapter.xhtml#Fig17).\n\
    \n    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig17_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig17_HTML.jpg)\n\
    \n    Figure 6-17\n\n    The Inspector pane lets you modify different parts of\
    \ a constraint\n\n6.  Click the constraint you want to delete and press the BACKSPACE\
    \ or DELETE key. Repeat this step until you have deleted all the constraints.\
    \ Notice that as you delete constraints, Xcode may change the colors of any remaining\
    \ constraints to show you do not have enough constraints to properly define an\
    \ object’s position on the user interface. (You can also remove constraints by\
    \ choosing Editor ➤ Resolve Auto Layout Issues ➤ Clear Constraints. If you choose\
    \ the top half of the submenu, you’ll only clear constraints from the selected\
    \ objects. If you choose the bottom half of the submenu, you’ll clear constraints\
    \ from all objects whether you’ve selected them or not.)"
  trans: "\n# 定义约束\n\n由于不同的 iOS 设备具有不同的屏幕尺寸（和安全区域），正确设计用户界面的方法是使用一种名为 Auto Layout\
    \ 的功能。Auto Layout 的核心思想是，你在安全区域内将对象定位在用户界面上，然后定义这些对象距离安全区域边界应该有多远。\n\n你为用户界面对象定义的这些距离被称为**约束**。约束告诉\
    \ Auto Layout 如何在用户界面上定位对象，无论应用当时运行在什么 iOS 设备屏幕上。\n\n约束通过定义对象之间的距离或定义对象的尺寸（宽度/高度）来工作。定义约束的不同方式包括以下这些：\n\
    \n- 定义一个对象与另一个对象或安全区域边界之间的特定距离，或者一个对象的特定高度或宽度。\n- 定义对象可以出现在另一个对象或安全区域边界的最小或最大距离，或者对象的最小/最大高度或宽度。\n\
    - 定义一个对象的相对位置，例如在视图中垂直或水平居中。\n- 定义哪些约束比其他约束具有更高的优先级。\n\n固定约束定义了两个对象（或一个对象与安全区域边界）之间的特定尺寸或距离。这样一来，无论应用在什么\
    \ iOS 设备上运行，该对象始终与另一个对象或安全区域边界保持固定的距离。固定距离约束是使用最普遍的约束类型。\n\n定义两个对象（或安全区域边界）之间最小或最大距离的约束允许对象根据应用运行的\
    \ iOS 设备来变化其距离。这使得用户界面能够针对更大的 iPad Pro 屏幕调整其外观，并在更小的 iPhone SE 屏幕上缩小尺寸。定义最小或最大距离的约束通常与固定距离约束一起使用。\n\
    \n在设计简单的用户界面时，你可能只需要设计固定距离约束。在设计更复杂的用户界面时，你可能还需要能改变对象间距离的约束。然而，你在不同的用户界面对象上放置的约束越多，产生矛盾约束的风险就越大。\n\
    \n当你使用两个或更多固定距离约束时，矛盾约束经常发生。例如，你可能希望一个按钮具有固定的宽度，并且距离屏幕左侧和右侧都是固定的距离。然而，在大屏和小屏 iOS\
    \ 设备上，要使一个对象保持固定宽度且同时距离屏幕左右两侧固定距离是不可能的。\n\n解决方案是为不同的约束分配优先级，让一个约束比另一个更重要。这样一来，当你的应用在不同的\
    \ iOS 设备屏幕上运行时，优先级最高的约束会先定义用户界面，然后优先级较低的约束再接着定义用户界面。\n\n## 自动定义约束\n\n定义约束最简单的方法是让\
    \ Xcode 自动为你完成。这种方法的缺点是 Xcode 可能并不总是按照你期望的方式为用户界面创建约束，但如果有必要，你之后总可以删除或修改它的约束。\n\
    \n要了解如何自动定义约束，请按照以下步骤操作：\n\n1. 确保 Xcode 中已加载 ObjectApp 项目。\n2. 在导航窗格中点击 `Main.storyboard`\
    \ 文件。\n3. 选择 `Editor` ➤ `Resolve Auto Layout Issues`。此时会显示一个菜单，如图 [6-13] 所示。该子菜单的上半部分适用于任何选中的对象。下半部分适用于所有对象，无论你是否选中它们。\n\
    \n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig13_HTML.jpg](img/329781_5_En_6_Fig13_HTML.jpg)\n\
    \n图 6-13  \n`Resolve Auto Layout Issues` 子菜单\n\n4. 在子菜单的下半部分选择 `Add Missing Constraints`。\n\
    5. 按住 SHIFT 键并点击按钮和文本字段，使两个对象周围出现手柄。注意 Xcode 会将约束显示为线，用于定义对象之间的距离或安全区域边界，如图 [6-14]\
    \ 所示。\n\n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig14_HTML.jpg](img/329781_5_En_6_Fig14_HTML.jpg)\n\
    \n图 6-14  \n查看选中对象的约束\n\n6. 点击 Xcode 窗口底部的 `View as:` 按钮，选择 iPhone XR，使 storyboard\
    \ 模拟 iPhone XR 的屏幕。注意，在我们定义了约束后，Xcode 正确地将按钮显示在 iPhone XR 屏幕的左上角，如图 [6-15] 所示。\n\
    \n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig15_HTML.jpg](img/329781_5_En_6_Fig15_HTML.jpg)\n\
    \n图 6-15  \n这些约束在任何尺寸的 iOS 屏幕上都能正确定义对象的位置\n\nXcode 会用不同的颜色显示约束，以帮助你发现潜在的问题。Xcode\
    \ 可能会显示的不同颜色约束包括：\n\n- **蓝色** – 你的约束足以在不同尺寸的 iOS 屏幕上定义用户界面对象的位置。\n- **橙色** – 你没有足够的约束来正确定义用户界面对象在不同尺寸\
    \ iOS 屏幕上的位置。\n- **红色** – 你的约束互相矛盾或不足，将无法正确显示用户界面对象的位置。\n\n## 查看和删除约束\n\n一旦定义了约束，你之后可以随时查看或删除它们。查看约束让你有机会修改它们的行为。删除约束则允许你移除任何不需要的约束。\n\
    \n要了解如何查看和删除约束，请按照以下步骤操作：\n\n1. 确保 Xcode 中已加载 ObjectApp 项目。\n2. 在导航窗格中点击 `Main.storyboard`\
    \ 文件。\n3. 如果文档大纲不可见，请选择 `Editor` ➤ `Show Document Outline`，或点击 Xcode 窗口底部的文档大纲图标。\n\
    4. 点击灰色展开三角形的层级结构（`View Controller Scene` ➤ `View Controller` ➤ `View` ➤ `Constraints`）以查看当前定义的所有约束列表，如图\
    \ [6-16] 所示。\n\n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig16_HTML.jpg](img/329781_5_En_6_Fig16_HTML.jpg)\n\
    \n图 6-16  \n在文档大纲中查看约束\n\n5. 点击任意约束以将其选中。注意，该约束的详细信息会出现在检查器窗格中，如图 [6-17] 所示。\n\
    \n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig17_HTML.jpg](img/329781_5_En_6_Fig17_HTML.jpg)\n\
    \n图 6-17  \n检查器窗格允许你修改约束的不同部分\n\n6. 点击你想要删除的约束，然后按 BACKSPACE 或 DELETE 键。重复此步骤直到你删除了所有约束。注意，当你删除约束时，Xcode\
    \ 可能会改变任何剩余约束的颜色，以表明你没有足够的约束来正确定义对象在用户界面上的位置。（你也可以通过选择 `Editor` ➤ `Resolve Auto\
    \ Layout Issues` ➤ `Clear Constraints` 来移除约束。如果你选择子菜单的上半部分，将只清除选中对象的约束。如果你选择子菜单的下半部分，将清除所有对象的约束，无论你是否选中了它们。）\n"
- fmt: '### Adding Constraints Manually


    You can let `Xcode` define constraints automatically, but you might want to add
    constraints manually. To add constraints manually, you need to follow a two-step
    process. First, select one or more objects. Second, click one of the icons at
    the bottom of the `Xcode` window to choose the type of constraints you want as
    shown in Figure 6-18:


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig18_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig18_HTML.jpg)


    Figure 6-18 – Icons for manually adding constraints


    - `Align`

    - `Add new constraints`

    - `Resolve Auto Layout Issues` (equivalent to choosing `Editor` ➤ `Resolve Auto
    Layout Issues`)


    The `Align` icon lets you position an object in relation to another one such as
    aligning two objects by their bottoms or left sides. In addition, the `Align`
    icon also lets you position an object to appear horizontally or vertically within
    a view as shown in Figure 6-19.


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig19_HTML.png](images/329781_5_En_6_Chapter/329781_5_En_6_Fig19_HTML.png)


    Figure 6-19 – The `Align` popup menu options


    The `Add new constraints` icon lets you define size constraints or distance constraints
    to nearby objects or Safe Area borders as shown in Figure 6-20. Grayed-out options
    become visible only when you select two or more objects so you can define all
    selected objects with the same width or height.


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig20_HTML.png](images/329781_5_En_6_Chapter/329781_5_En_6_Fig20_HTML.png)


    Figure 6-20 – The `Add new constraints` popup menu options


    The `Resolve Auto Layout Issues` icon displays the same submenu as choosing `Editor`
    ➤ `Resolve Auto Layout Issues` as shown in Figure 6-21. `Reset to Suggested Constraints`
    removes any current constraints on the selected object and adds new constraints
    that `Xcode` thinks your objects need. If you have already added constraints to
    an object, then `Add Missing Constraints` simply adds the constraints `Xcode`
    thinks your object needs.


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig21_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig21_HTML.jpg)


    Figure 6-21 – The `Resolve Auto Layout` icon menu


    To see how to define constraints manually, follow these steps:


    1.  Make sure the `ObjectApp` project is loaded in `Xcode`.

    2.  Click the `Main.storyboard` file in the Navigator pane.

    3.  Click the button to select it so handles appear.

    4.  Click the `Align` icon. A popup menu appears (see Figure 6-19).

    5.  Select the `Horizontally in Container` check box and click the `Add 1 Constraint`
    button as shown in Figure 6-22. `Xcode` moves the button to the top middle of
    the screen.


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig22_HTML.png](images/329781_5_En_6_Chapter/329781_5_En_6_Fig22_HTML.png)


    Figure 6-22 – Adding a constraint to place an object horizontally in a view


    6.  Hold down the `SHIFT` key and click the text field. Handles should now appear
    around both the button and the text field to show that both objects are selected.

    7.  Click the `Align` icon, and when a popup menu appears, select the `Horizontal
    Centers` check box, then click the `Add 1 Constraint` button as shown in Figure
    6-23. `Xcode` moves the text field centered under the button.


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig23_HTML.png](images/329781_5_En_6_Chapter/329781_5_En_6_Fig23_HTML.png)


    Figure 6-23 – Aligning two objects vertically by the center


    8.  Click the text field to select it (handles appear around it) and unselect
    the button. Then click the `Add new constraints` icon at the bottom of the `Xcode`
    window. A popup menu appears.

    9.  Click the top line that defines how far the text field must appear from the
    nearest object or border. This defines a fixed distance constraint as shown in
    Figure 6-24.


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig24_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig24_HTML.jpg)


    Figure 6-24 – Defining a fixed distance from the top of an object to its nearest
    neighbor


    10.  Click the `Add 1 Constraint` button. `Xcode` displays a constraint between
    the top of the text field and the bottom of the button. However, this constraint
    appears in orange, which tells us that there aren’t enough constraints to make
    the text field appear properly in different size iOS screens.

    11.  Click the text field again to select it, and then click the `Add new constraints`
    icon at the bottom of the `Xcode` window. A popup menu appears again.

    12.  Click the button near the top to select it.

    13.  Click the `Add new constraints` icon at the bottom of the `Xcode` window.
    A popup menu appears.

    14.  Click the top line to define how far the button appears from the top of the
    screen as shown in Figure 6-25.


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig25_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig25_HTML.jpg)


    Figure 6-25 – Defining a top constraint for the button


    15.  Click the `Add 1 Constraint` button. `Xcode` adds a top constraint to the
    button. Notice that `Xcode` no longer displays any orange constraints because
    you have defined enough constraints to define the appearance of all user interface
    objects.

    16.  Click the “View as:” button at the bottom of the `Xcode` window and choose
    a different iOS device to mimic such as an iPhone SE or iPhone 8 Plus. Notice
    that no matter which iOS device you choose, the button and text field appear correctly
    centered and spaced on the screen.


    As you can see, `Auto Layout` and constraints let you define where objects should
    appear on the user interface. In this example, we defined a fixed distance constraint
    (between the top of the text field and the bottom of the button) along with a
    relative constraint that defined the button and text field to be centered horizontally.


    The fixed distance constraint defines that exact distance no matter what the screen
    size, but the relative constraint automatically centers the button and text field
    horizontally based on the size of the iOS device screen. Here are some general
    rules for using constraints:


    - Use the fewest constraints possible. The more constraints you add, the more
    likely constraints will contradict each other on different size iOS device screens.

    - Avoid fixed distance constraints. On extremely large or small iOS device screens,
    fixed distance constraints increase the chance of skewering the appearance of
    the user interface.


    To avoid using fixed values, `Xcode` offers two options. First, when you define
    a constant value for a constraint, you’ll have a choice between typing a number
    and choosing between a `Standard Value` and a `Canvas Value` as shown in Figure
    6-26.


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig26_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig26_HTML.jpg)


    Figure 6-26 – You can choose to use a `Standard` or `Canvas Value` for a constraint


    Rather than use a specific value, you can choose to define a constraint using
    a `Canvas Value`, which uses the distance of the current storyboard size, or a
    `Standard Value`, which lets `Xcode` decide the best value to use for different
    iOS screen sizes. In most cases, try a `Standard Value` first, and if that doesn’t
    work, then try `Canvas Value`.


    A specific value defines a fixed distance, but you can use that fixed value to
    define a minimum or maximum distance. This allows the distance between two objects
    (or an object and the edge of the screen) to vary within a minimum or maximum
    value depending on the iOS screen size.'
  raw: '### Adding Constraints Manually


    You can let Xcode define constraints automatically, but you might want to add
    constraints manually. To add constraints manually, you need to follow a two-step
    process. First, select one or more objects. Second, click one of the icons at
    the bottom of the Xcode window to choose the type of constraints you want as shown
    in Figure [6-18](#329781_5_En_6_Chapter.xhtml#Fig18):


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig18_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig18_HTML.jpg)


    Figure 6-18


    Icons for manually adding constraints


    *   Align


    *   Add new constraints


    *   Resolve Auto Layout Issues (equivalent to choosing Editor ➤ Resolve Auto Layout
    Issues)


    The Align icon lets you position an object in relation to another one such as
    aligning two objects by their bottoms or left sides. In addition, the Align icon
    also lets you position an object to appear horizontally or vertically within a
    view as shown in Figure [6-19](#329781_5_En_6_Chapter.xhtml#Fig19).


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig19_HTML.png](images/329781_5_En_6_Chapter/329781_5_En_6_Fig19_HTML.png)


    Figure 6-19


    The Align popup menu options


    The Add new constraints icon lets you define size constraints or distance constraints
    to nearby objects or Safe Area borders as shown in Figure [6-20](#329781_5_En_6_Chapter.xhtml#Fig20).
    Grayed-out options become visible only when you select two or more objects so
    you can define all selected objects with the same width or height.


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig20_HTML.png](images/329781_5_En_6_Chapter/329781_5_En_6_Fig20_HTML.png)


    Figure 6-20


    The Add new constraints popup menu options


    The Resolve Auto Layout Issues icon displays the same submenu as choosing Editor
    ➤ Resolve Auto Layout Issues as shown in Figure [6-21](#329781_5_En_6_Chapter.xhtml#Fig21).
    Reset to Suggested Constraints removes any current constraints on the selected
    object and adds new constraints that Xcode thinks your objects need. If you have
    already added constraints to an object, then Add Missing Constraints simply adds
    the constraints Xcode thinks your object needs.


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig21_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig21_HTML.jpg)


    Figure 6-21


    The Resolve Auto Layout icon menu


    To see how to define constraints manually, follow these steps:


    1.  Make sure the ObjectApp project is loaded in Xcode.


    2.  Click the Main.storyboard file in the Navigator pane.


    3.  Click the button to select it so handles appear.


    4.  Click the Align icon. A popup menu appears (see Figure [6-19](#329781_5_En_6_Chapter.xhtml#Fig19)).


    5.  Select the Horizontally in Container check box and click the Add 1 Constraint
    button as shown in Figure [6-22](#329781_5_En_6_Chapter.xhtml#Fig22). Xcode moves
    the button to the top middle of the screen.


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig22_HTML.png](images/329781_5_En_6_Chapter/329781_5_En_6_Fig22_HTML.png)


    Figure 6-22


    Adding a constraint to place an object horizontally in a view


    6.  Hold down the SHIFT key and click the text field. Handles should now appear
    around both the button and the text field to show that both objects are selected.


    7.  Click the Align icon, and when a popup menu appears, select the Horizontal
    Centers check box, then click the Add 1 Constraint button as shown in Figure [6-23](#329781_5_En_6_Chapter.xhtml#Fig23).
    Xcode moves the text field centered under the button.


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig23_HTML.png](images/329781_5_En_6_Chapter/329781_5_En_6_Fig23_HTML.png)


    Figure 6-23


    Aligning two objects vertically by the center


    8.  Click the text field to select it (handles appear around it) and unselect
    the button. Then click the Add new constraints icon at the bottom of the Xcode
    window. A popup menu appears.


    9.  Click the top line that defines how far the text field must appear from the
    nearest object or border. This defines a fixed distance constraint as shown in
    Figure [6-24](#329781_5_En_6_Chapter.xhtml#Fig24).


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig24_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig24_HTML.jpg)


    Figure 6-24


    Defining a fixed distance from the top of an object to its nearest neighbor


    10.  Click the Add 1 Constraint button. Xcode displays a constraint between the
    top of the text field and the bottom of the button. However, this constraint appears
    in orange, which tells us that there aren’t enough constraints to make the text
    field appear properly in different size iOS screens.


    11.  Click the text field again to select it, and then click the Add new constraints
    icon at the bottom of the Xcode window. A popup menu appears again.


    12.  Click the button near the top to select it.


    13.  Click the Add new constraints icon at the bottom of the Xcode window. A popup
    menu appears.


    14.  Click the top line to define how far the button appears from the top of the
    screen as shown in Figure [6-25](#329781_5_En_6_Chapter.xhtml#Fig25).


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig25_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig25_HTML.jpg)


    Figure 6-25


    Defining a top constraint for the button


    15.  Click the Add 1 Constraint button. Xcode adds a top constraint to the button.
    Notice that Xcode no longer displays any orange constraints because you have defined
    enough constraints to define the appearance of all user interface objects.


    16.  Click the “View as:” button at the bottom of the Xcode window and choose
    a different iOS device to mimic such as an iPhone SE or iPhone 8 Plus. Notice
    that no matter which iOS device you choose, the button and text field appear correctly
    centered and spaced on the screen.


    As you can see, Auto Layout and constraints let you define where objects should
    appear on the user interface. In this example, we defined a fixed distance constraint
    (between the top of the text field and the bottom of the button) along with a
    relative constraint that defined the button and text field to be centered horizontally.


    The fixed distance constraint defines that exact distance no matter what the screen
    size, but the relative constraint automatically centers the button and text field
    horizontally based on the size of the iOS device screen. Here are some general
    rules for using constraints:


    *   Use the fewest constraints possible. The more constraints you add, the more
    likely constraints will contradict each other on different size iOS device screens.


    *   Avoid fixed distance constraints. On extremely large or small iOS device screens,
    fixed distance constraints increase the chance of skewering the appearance of
    the user interface.


    To avoid using fixed values, Xcode offers two options. First, when you define
    a constant value for a constraint, you’ll have a choice between typing a number
    and choosing between a Standard Value and a Canvas Value as shown in Figure [6-26](#329781_5_En_6_Chapter.xhtml#Fig26).


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig26_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig26_HTML.jpg)


    Figure 6-26


    You can choose to use a Standard or Canvas Value for a constraint


    Rather than use a specific value, you can choose to define a constraint using
    a Canvas Value, which uses the distance of the current storyboard size, or a Standard
    Value, which lets Xcode decide the best value to use for different iOS screen
    sizes. In most cases, try a Standard Value first, and if that doesn’t work, then
    try Canvas Value.


    A specific value defines a fixed distance, but you can use that fixed value to
    define a minimum or maximum distance. This allows the distance between two objects
    (or an object and the edge of the screen) to vary within a minimum or maximum
    value depending on the iOS screen size.'
  trans: '

    ### 手动添加约束


    你可以让 `Xcode` 自动定义约束，但也可能需要手动添加约束。要手动添加约束，需要遵循两步流程。首先，选择一个或多个对象。其次，点击 `Xcode` 窗口底部的某个图标，选择所需的约束类型，如图
    6-18 所示：


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig18_HTML.jpg](img/329781_5_En_6_Fig18_HTML.jpg)


    图 6-18 – 手动添加约束的图标


    - `Align`（对齐）

    - `Add new constraints`（添加新约束）

    - `Resolve Auto Layout Issues`（解决自动布局问题，等同于选择 `Editor` ➤ `Resolve Auto Layout
    Issues`）


    `Align`（对齐）图标允许你根据其他对象来定位某个对象，例如按底部或左侧对齐两个对象。此外，`Align`（对齐）图标还允许你将对象定位在视图内的水平或垂直中心位置，如图
    6-19 所示。


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig19_HTML.png](img/329781_5_En_6_Fig19_HTML.png)


    图 6-19 – `Align`（对齐）弹出菜单选项


    `Add new constraints`（添加新约束）图标允许你定义尺寸约束，或到附近对象或安全区域边界的距离约束，如图 6-20 所示。灰色选项仅在选中两个或更多对象时才可见，这样你可以为所有选中对象定义相同的宽度或高度。


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig20_HTML.png](img/329781_5_En_6_Fig20_HTML.png)


    图 6-20 – `Add new constraints`（添加新约束）弹出菜单选项


    `Resolve Auto Layout Issues`（解决自动布局问题）图标显示的子菜单与选择 `Editor` ➤ `Resolve Auto Layout
    Issues` 相同，如图 6-21 所示。`Reset to Suggested Constraints`（重置为建议的约束）会移除选中对象上的所有现有约束，并添加
    `Xcode` 认为你的对象需要的新约束。如果你已经向某个对象添加了约束，那么 `Add Missing Constraints`（添加缺失的约束）仅会添加
    `Xcode` 认为你的对象需要的约束。


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig21_HTML.jpg](img/329781_5_En_6_Fig21_HTML.jpg)


    图 6-21 – `Resolve Auto Layout`（解决自动布局）图标菜单


    要了解如何手动定义约束，请遵循以下步骤：


    1.  确保 `ObjectApp` 项目已加载到 `Xcode` 中。

    2.  在导航面板中点击 `Main.storyboard` 文件。

    3.  点击按钮以选中它，使其出现控制手柄。

    4.  点击 `Align`（对齐）图标。将出现一个弹出菜单（见图 6-19）。

    5.  选中 `Horizontally in Container`（在容器中水平居中）复选框，然后点击 `Add 1 Constraint`（添加 1 个约束）按钮，如图
    6-22 所示。`Xcode` 会将按钮移动到屏幕顶部中间。


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig22_HTML.png](img/329781_5_En_6_Fig22_HTML.png)


    图 6-22 – 添加约束以将对象水平放置在视图中


    6.  按住 `SHIFT` 键并点击文本字段。此时按钮和文本字段周围都应出现控制手柄，表示两者均被选中。

    7.  点击 `Align`（对齐）图标，弹出菜单出现后，选中 `Horizontal Centers`（水平中心对齐）复选框，然后点击 `Add 1 Constraint`（添加
    1 个约束）按钮，如图 6-23 所示。`Xcode` 会将文本字段移动到按钮下方居中位置。


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig23_HTML.png](img/329781_5_En_6_Fig23_HTML.png)


    图 6-23 – 通过中心将两个对象垂直对齐


    8.  点击文本字段以选中它（其周围出现控制手柄），并取消选中按钮。然后点击 `Xcode` 窗口底部的 `Add new constraints`（添加新约束）图标。将出现一个弹出菜单。

    9.  点击顶部线条，定义文本字段距离最近对象或边框的距离。这将定义一个固定距离约束，如图 6-24 所示。


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig24_HTML.jpg](img/329781_5_En_6_Fig24_HTML.jpg)


    图 6-24 – 定义从对象顶部到其最近邻居的固定距离


    10. 点击 `Add 1 Constraint`（添加 1 个约束）按钮。`Xcode` 会在文本字段顶部和按钮底部之间显示一个约束。然而，此约束显示为橙色，这表示约束不足，无法使文本字段在不同尺寸的
    iOS 屏幕上正确显示。

    11. 再次点击文本字段以选中它，然后点击 `Xcode` 窗口底部的 `Add new constraints`（添加新约束）图标。将再次出现一个弹出菜单。

    12. 点击靠近顶部的线条以选中它。

    13. 点击 `Xcode` 窗口底部的 `Add new constraints`（添加新约束）图标。将出现一个弹出菜单。

    14. 点击顶部线条，定义按钮距离屏幕顶部的距离，如图 6-25 所示。


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig25_HTML.jpg](img/329781_5_En_6_Fig25_HTML.jpg)


    图 6-25 – 为按钮定义顶部约束


    15. 点击 `Add 1 Constraint`（添加 1 个约束）按钮。`Xcode` 会向按钮添加一个顶部约束。请注意，`Xcode` 不再显示任何橙色约束，因为您已经定义了足够的约束来定义所有用户界面对象的显示。

    16. 点击 `Xcode` 窗口底部的“View as:”（视图为：）按钮，然后选择不同的 iOS 设备进行模拟，例如 iPhone SE 或 iPhone
    8 Plus。请注意，无论您选择哪种 iOS 设备，按钮和文本字段都会在屏幕上正确居中并保持间距。


    如您所见，`Auto Layout`（自动布局）和约束允许您定义对象在用户界面上的显示位置。在此示例中，我们定义了一个固定距离约束（在文本字段顶部和按钮底部之间），以及一个定义按钮和文本字段水平居中的相对约束。


    固定距离约束定义了确切的距离，无论屏幕尺寸如何，而相对约束则根据 iOS 设备屏幕的尺寸自动将按钮和文本字段水平居中。以下是使用约束的一些通用规则：


    - 尽可能使用最少的约束。添加的约束越多，在不同尺寸的 iOS 设备屏幕上约束之间相互矛盾的可能性就越大。

    - 避免使用固定距离约束。在极大或极小的 iOS 设备屏幕上，固定距离约束会增加扭曲用户界面外观的可能性。


    为了避免使用固定值，`Xcode` 提供了两个选项。首先，当您为约束定义一个常量值时，您可以选择输入一个数字，或在 `Standard Value`（标准值）和
    `Canvas Value`（画布值）之间进行选择，如图 6-26 所示。


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig26_HTML.jpg](img/329781_5_En_6_Fig26_HTML.jpg)


    图 6-26 – 您可以选择使用 `Standard`（标准）或 `Canvas Value`（画布值）作为约束


    除了使用特定值，您还可以选择使用 `Canvas Value`（画布值）来定义约束，该值使用当前故事板大小的距离；或者使用 `Standard Value`（标准值），该值让
    `Xcode` 决定针对不同 iOS 屏幕尺寸使用的最佳值。大多数情况下，请先尝试使用 `Standard Value`（标准值），如果不行，再尝试使用 `Canvas
    Value`（画布值）。


    特定值定义了一个固定距离，但您可以使用该固定值来定义最小或最大距离。这允许两个对象之间（或对象与屏幕边缘之间）的距离根据 iOS 屏幕尺寸在最小值和最大值范围内变化。

