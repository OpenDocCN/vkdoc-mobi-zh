    \n### Displaying a Multiple-Component Picker View\n\nIf you look at the Date Picker,\
    \ it displays separate wheels or components for the day, hour, minute, and whether\
    \ it’s AM or PM. The simple Picker View we created in the previous example just\
    \ displayed a single wheel or component listing different types of pets.\n\nFor\
    \ each component you want to display in a Picker View, you need to define a separate\
    \ data source. Then you need to define how many total components you want the\
    \ Picker View to display (such as two or three) along with displaying all components\
    \ and storing the data in each component.\n\nTo see how to create a Picker View\
    \ that consists of three components, follow these steps:\n\n1.  Create a new iOS\
    \ project using the Single View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml))\
