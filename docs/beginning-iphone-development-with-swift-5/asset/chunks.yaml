- fmt: "### Note\n\nUnlike other objects that let you define the height and width,\
    \ stack views automatically adjust their height and width based on the objects\
    \ stored inside that stack view.\n\nTo see how to use a stack view, follow these\
    \ steps:\n\n1. Create a new iOS project using the Single View App template (see\
    \ Chapter [1](#329781_5_En_1_Chapter.xhtml)) and name this new project `StackViewApp`.\
    \ This creates a single view for the user interface.\n2. Click the `Main.storyboard`\
    \ file in the Navigator pane. Xcode displays the single view.\n3. Click the Library\
    \ icon to open the Object Library window.\n4. Drag and drop a horizontal or a\
    \ vertical stack view on the view as shown in Figure [13-16](#329781_5_En_13_Chapter.xhtml#Fig16).\
    \ Although a stack view appears as a large rectangle, its size will adjust based\
    \ on the number and types of objects you put inside that stack view.\n\n![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig16_HTML.jpg](images/329781_5_En_13_Chapter/329781_5_En_13_Fig16_HTML.jpg)\n\
    \n*Figure 13-16* The Horizontal and Vertical Stack Views in the Object Library\
    \ window\n\n5. Click the Library icon to open the Object Library window, and drag\
    \ and drop the following items into the stack view:\n   - Label\n   - Button\n\
    \   - Text field\n\nBecause the stack view automatically adjusts its size when\
    \ you add any object to it, you can easily drag and drop one object directly onto\
    \ the stack view displayed on the user interface. Afterward, you’ll need to add\
    \ any additional objects onto the stack view by dragging and dropping them underneath\
    \ the stack view in the Document Outline as shown in Figure [13-17](#329781_5_En_13_Chapter.xhtml#Fig17).\n\
    \n![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig17_HTML.jpg](images/329781_5_En_13_Chapter/329781_5_En_13_Fig17_HTML.jpg)\n\
    \n*Figure 13-17* Dragging and dropping objects into the Document Outline\n\n6.\
    \ Click the stack view in the Document Outline to select it.\n7. Move the mouse\
    \ pointer over the stack view until the mouse pointer turns into a hand icon.\
    \ Then drag the mouse to move the stack view. Notice that moving the stack view\
    \ also moves all objects together in a group.\n8. Choose View ➤ Inspectors ➤ Show\
    \ Attributes Inspector, or click the Attributes Inspector icon in the upper right\
    \ corner of the Xcode window. The Attributes Inspector pane for the stack view\
    \ appears (see Figure [13-13](#329781_5_En_13_Chapter.xhtml#Fig13)).\n9. Click\
    \ in the Axis popup menu and switch back and forth between horizontal and vertical.\
    \ Whether you start with a horizontal or vertical stack view, you can always modify\
    \ its orientation later just by changing its Axis property.\n10. Make sure the\
    \ Axis property is vertical. Then click in the Spacing text field and type `40`.\n\
    11. Click the Alignment popup menu and choose Fill. This causes all objects to\
    \ expand in width (vertical stack views) or height (horizontal stack views).\n\
    12. Click in the Distribution popup menu and choose Equal Spacing. Notice that\
    \ Xcode creates space between all objects inside the stack view as shown in Figure\
    \ [13-18](#329781_5_En_13_Chapter.xhtml#Fig18).\n\n![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig18_HTML.jpg](images/329781_5_En_13_Chapter/329781_5_En_13_Fig18_HTML.jpg)\n\
    \n*Figure 13-18* The Spacing property creates empty space between objects in a\
    \ stack view\n\n13. Click the Alignment popup menu and choose Center. Notice that\
    \ the stack view now defines its width based on the largest object as shown in\
    \ Figure [13-19](#329781_5_En_13_Chapter.xhtml#Fig19).\n\n![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig19_HTML.jpg](images/329781_5_En_13_Chapter/329781_5_En_13_Fig19_HTML.jpg)\n\
    \n*Figure 13-19* Center alignment defines the stack width based on the widest\
    \ object\n\n14. Click the Alignment popup menu and choose Leading. Notice that\
    \ the stack view aligns all objects on the left side.\n15. Click the Alignment\
    \ popup menu and choose Trailing. Notice that the stack view aligns all objects\
    \ on the right side.\n16. Click in the Axis popup menu and choose Horizontal.\n\
    17. Click in the Alignment popup menu and choose Top. Notice that the stack view\
    \ aligns all objects by their tops.\n18. Click in the Alignment popup menu and\
    \ choose Bottom. Notice that the stack view aligns all objects by their bottoms.\n\
    19. Click in the Distribution popup menu and choose Fill Equally. Notice that\
    \ all objects inside the stack view now appear with the same width. Experiment\
    \ with different options to see how they affect the appearance of objects inside\
    \ the stack view.\n\nOnce you have defined the appearance of objects inside a\
    \ stack view, then you can apply constraints on the stack view. Stack views let\
    \ you organize objects in rows or columns without applying constraints on each\
    \ object individually.\n\n## Summary\n\nDesigning a user interface involves placing\
    \ objects on a view. However, the exact position of these objects can change depending\
    \ on the screen size that the app runs on. If you design a user interface for\
    \ a larger screen, then it might look too cramped when viewed on a smaller screen.\
    \ If you design a user interface for a small screen, it might look empty and out\
    \ of balance on a larger screen.\n\nTo make sure a user interface looks good on\
    \ all size screens, you need to add constraints. Constraints can define an object’s\
    \ size (width and height), position, or distance to nearby objects. You can define\
    \ specific values and relationships such as equal, less than or equal to, or greater\
    \ than or equal to. When adding constraints, Xcode uses colors to let you know\
    \ if you have enough constraints (blue), do not have enough constraints (orange),\
    \ or have conflicting constraints (red).\n\nAt any time, you can add, delete,\
    \ or modify a constraint. Since applying constraints to multiple objects can be\
    \ troublesome, you can group objects into vertical columns or horizontal rows\
    \ by storing them inside stack views. Then you can apply constraints to the stack\
    \ view.\n\nConstraints and stack views provide two ways to design your user interface\
    \ and insure that they look good no matter what screen size your app runs on.\n\
    \n# 14. Using Table Views\n\nTable views are one of the most common user interface\
    \ objects for displaying large amounts of information in a list of rows. The Mail\
    \ and Photos apps use table views to let users scroll through information. Table\
    \ views appear to create an endless list because the moment the user scrolls up\
    \ or down, new data constantly appears to take its place. Table views consist\
    \ of cells that contain one or more objects such as labels or image views as shown\
    \ in Figure [14-1](#329781_5_En_14_Chapter.xhtml#Fig1).\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig1_HTML.jpg](images/329781_5_En_14_Chapter/329781_5_En_14_Fig1_HTML.jpg)\n\
    \n*Figure 14-1* A table view consists of cells that display data in objects such\
    \ as labels and image view\n\nTo create a table view, you can drag a table view\
    \ from the Object Library window and drop it on a view. Another alternative is\
    \ to drag and drop a Table View Controller from the Object Library window and\
    \ place it as part of the storyboard. A Table View Controller is nothing more\
    \ than a View Controller with a table view on it.\n\nTo use a table view, you\
    \ need to do the following:\n\n- Define a cell that contains the information you\
    \ want the table view to display.\n- Define a data source that will put information\
    \ into each cell of a table view.\n- Define a delegate `.swift` file that contains\
    \ methods to define the number of sections and rows in addition to defining the\
    \ cell that will make up the table view."
