    \ left mouse button and the Option key, then drag the mouse in a circular motion\
    \ to simulate a rotation gesture. Notice that as the rotation gesture changes,\
    \ the image view also changes as it rotates.\n\n27.  Choose Simulator ➤ Quit Simulator\
    \ to return to Xcode.\n\nThis example defined the rotation gesture visually by\
    \ dragging the Rotation Gesture Recognizer from the Object Library. Now let’s\
    \ see how to duplicate this process through Swift code alone.\n\n1.  Create a\
    \ new iOS project using the Single View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml))\
    \ and name this new project RotateCodeApp. This creates a single view for the\
    \ user interface.\n\n2.  Click the Main.storyboard file in the Navigator pane.\
    \ Xcode displays the single view.\n\n3.  Click the Library icon to open the Object\
    \ Library window and drag and drop an image view in the center of the user interface.\n\
    \n4.  Click the Align icon in the bottom of the middle Xcode pane. A window appears.\n\
    \n5.  Select the Horizontally in Container and Vertically in Container check boxes\
    \ and then click the Add 2 Constraints button (see Figure [11-10](#329781_5_En_11_Chapter.xhtml#Fig10)).\
    \ The image view needs to be in the center to make it easy to mimic pinching gestures\
    \ in the Simulator.\n\n6.  Choose Editor ➤ Resolve Auto Layout Issues ➤ Add Missing\
    \ Constraints in the top half of the submenu. Xcode adds additional constraints\
    \ to the image view.\n\n7.  Choose View ➤ Assistant Editor ➤ Show Assistant Editor,\
    \ or click the Assistant Editor icon. Xcode displays the Main.storyboard and ViewController.swift\
    \ file side by side.\n\n8.  Move the mouse pointer over the image view, hold down\
    \ the Control key, and Ctrl-drag from the image view to the ViewController.swift\
    \ file underneath the “class ViewController” line.\n\n9.  Release the Control\
    \ key and the left mouse button. A popup window appears.\n\n10.  Click in the\
    \ Name text field, type **topImageView**, and click the Connect button. Xcode\
    \ creates an IBOutlet variable as follows:\n\n```\n    @IBOutlet var topImageView:\
    \ UIImageView!\n    ```\n\n11.  Choose View ➤ Standard Editor ➤ Show Standard\
    \ Editor, or click the Standard Editor icon in the upper right corner of the Xcode\
    \ window.\n\n12.  Click the ViewController.swift file in the Navigator pane.\n\
    \n13.  Add the following line underneath the IBOutlet:\n\n```\n    var rotateMe:\
    \ UIRotationGestureRecognizer?\n    ```\n\nThis defines a global variable that\
    \ represents the rotation gesture.\n\n14.  Edit the viewDidLoad method as follows:\n\
    \n```\n    override func viewDidLoad() {\n    super.viewDidLoad()\n    topImageView.isUserInteractionEnabled\
    \ = true\n    topImageView.backgroundColor = UIColor.green\n    let rotationGesture\
    \ = UIRotationGestureRecognizer(target: self, action: #selector(handleRotation))\n\
    \    topImageView.addGestureRecognizer(rotationGesture)\n    rotateMe = rotationGesture\n\
    \    // Do any additional setup after loading the view, typically from a nib.\n\
    \    }\n    ```\n\nThis code turns on the User Interaction Enabled setting for\
    \ the image view and defines its background color as green to make it visible.\
    \ Next, it defines a rotation gesture recognizer (instead of dragging and dropping\
    \ a Rotation Gesture Recognizer from the Object Library window), defines a function\
    \ called handleRotation to respond to the rotation gesture, and links the rotation\
    \ gesture to the image view so rotations only affect the image view. Finally,\
