  trans: "\n# 12. 使用警告控制器和选择器\n\n几乎每个应用都需要向用户展示数据并接受用户输入。展示数据最简单的方式是使用标签，但有时你需要展示数据并让用户能够做出响应。在这种情况下，你需要使用警告控制器。\n\
    \n警告控制器可以显示一个弹出屏幕的表格，让用户有机会做出响应。警告控制器会出现在用户界面之上，强制用户通过点击按钮做出选择来响应，或者关闭警告控制器，如图\
    \ 12-1 所示。\n\n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig1_HTML.jpg](img/329781_5_En_12_Fig1_HTML.jpg)\n\
    \n图 12-1\n\n警告控制器通常显示一条消息和一个或多个按钮\n\n除了显示数据，用户界面还需要让人们输入数据。如果数据是文本，那么你可以使用文本字段让用户在该文本字段中输入任意内容，例如姓名或电话号码。文本字段非常适合接受任何类型的数据，但当需要向用户提供有效选项列表时，你应该改用选择器。\n\
    \nXcode 提供了两种不同类型的选择器：\n\n-   日期选择器 – 显示日期和时间，如图 12-2 所示\n-   选择器视图 – 显示一个包含不同选项的转轮\n\
    \n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig2_HTML.jpg](img/329781_5_En_12_Fig2_HTML.jpg)\n\
    \n图 12-2\n\n日期选择器让用户能够轻松选择日期和时间\n\n选择器在一个或多个转轮上包含有限数量的选项，用户可以通过滚动转轮来选择特定选项。可用选项的数量可以少到两个（例如选择时间时的上午和下午选项），但通常可用选项多于两个。选择器确保用户永远不会选择无效选项，例如在姓名栏中输入数字或错误地输入城市名。\n\
    \n## 使用警告控制器\n\n每个用户界面都需要向用户回显数据。在某些情况下，这些数据可以仅显示在标签中，但有时你需要确保用户看到特定信息。在这些情况下，你应该使用警告控制器。\n\
    \n警告控制器会出现在应用的用户界面之上，并可以通过更改以下属性进行自定义：\n\n-   标题 – 出现在警告控制器顶部的文本，通常为粗体和大字体\n-\
    \   消息 – 出现在标题下方的文本，字体较小\n-   首选样式 – 定义警告控制器的外观，可以是出现在屏幕底部的操作列表（如图 12-3 所示），也可以是出现在屏幕中央的警告框（见图\
    \ 12-1）\n\n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig3_HTML.jpg](img/329781_5_En_12_Fig3_HTML.jpg)\n\
    \n图 12-3\n\n操作列表出现在屏幕底部\n\n标题通常由一个单词或短语组成，用于解释警告控制器的用途，例如显示“警告”或“登录”。\n\n要关闭警告控制器，警告控制器始终需要至少一个按钮。然而，警告控制器可以显示两个或多个按钮以给用户选择。除了显示按钮，警告控制器还可以包含文本字段，允许用户输入数据。\n\
    \n你完全可以只通过编写 Swift 代码来创建警告控制器。首先，你必须创建警告控制器，并定义其标题、消息和样式。其次，你必须为想要在警告控制器上显示的每个按钮或文本字段定义一个警告动作。第三，你必须在用户界面上实际呈现该警告控制器。\n\
    \n要了解如何创建一个仅显示标题、消息和关闭按钮的简单警告控制器，请按以下步骤操作：\n\n1.  使用“单视图应用”模板（见第 1 章）创建一个新的 iOS\
    \ 项目，并将这个新项目命名为 `AlertControllerApp`。这会为用户界面创建一个单一视图。\n\n2.  在导航面板中点击 `Main.storyboard`\
    \ 文件。Xcode 会显示该单一视图。\n\n3.  点击库图标打开对象库窗口。\n\n4.  将一个按钮拖放到视图上的任意位置。\n\n5.  选择“编辑器”➤“解决自动布局问题”➤“重置为建议的约束”。Xcode\
    \ 会为该按钮添加约束。\n\n6.  选择“视图”➤“辅助编辑器”➤“显示辅助编辑器”。Xcode 会并排显示 `Main.storyboard` 和 `ViewController.swift`\
    \ 文件。\n\n7.  将鼠标指针移到按钮上，按住 Control 键，然后从按钮 Control-拖动到文件底部最后一个花括号上方的 `ViewController.swift`\
    \ 文件中。\n\n8.  松开 Control 键和鼠标左键。会弹出一个窗口。\n\n9.  在“名称”文本框中点击，输入 `buttonTapped`，点击“类型”弹出菜单并选择\
    \ `UIButton`，然后点击“连接”按钮。Xcode 会创建一个 IBAction 方法。\n\n10. 按如下方式编辑这个 `buttonTapped`\
    \ IBAction 方法：\n\n    ```\n    @IBAction func buttonTapped(_ sender: UIButton)\
    \ {\n        let alert = UIAlertController(title: \"警告\", message: \"僵尸出没！\",\
    \ preferredStyle: .alert)\n        let okAction = UIAlertAction(title: \"确定\"\
    , style: .default, handler: { action -> Void in\n            // 只是关闭操作列表\n   \
    \     })\n        alert.addAction(okAction)\n        self.present(alert, animated:\
    \ true, completion: nil)\n    }\n    ```\n\n11. 点击“运行”按钮或选择“产品”➤“运行”。模拟器屏幕会出现。\n\
    \n12. 点击按钮。注意，警告控制器会出现在屏幕中央，因为 `preferredStyle` 设置为 `.alert`。（如果 `preferredStyle`\
    \ 属性设置为 `.actionSheet`，那么警告控制器会出现在屏幕底部。）\n\n13. 点击警告控制器上的“确定”按钮将其关闭。\n\n14. 选择“模拟器”➤“退出模拟器”返回\
    \ Xcode。\n\n更改 `title` 和 `message` 属性以显示不同的文本，然后再次运行应用，看看它如何改变警告控制器的外观。同时，将 `preferredStyle`\
    \ 属性从 `.alert` 更改为 `.actionSheet`，看看它如何影响警告控制器的外观。"
- fmt: "# Displaying and Responding to Multiple Buttons\n\nThe simplest alert controller\
    \ displays a single button that allows the user to dismiss it. However, you may\
    \ want to give the user more than one option to choose and then respond differently\
    \ depending on which button the user taps.\n\nFor each button you want to display\
    \ on an alert controller, you need to add a `UIAlertAction`. When the user taps\
    \ a button on an alert controller, the alert controller goes away. If you want\
    \ the button to do more, then you need to call a separate function that does some\
    \ action.\n\nTo see how to create an alert controller that displays two buttons\
    \ and responds differently to each button, follow these steps:\n\n1. Create a\
    \ new iOS project using the Single View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml))\
    \ and name this new project `AlertControllerButtonsApp`. This creates a single\
    \ view for the user interface.\n\n2. Click the `Main.storyboard` file in the Navigator\
    \ pane. Xcode displays the single view.\n\n3. Click the Library icon to open the\
    \ Object Library window.\n\n4. Drag and drop a button and a label anywhere on\
    \ the view.\n\n5. Choose Editor > Resolve Auto Layout Issues > Reset to Suggested\
    \ Constraints on the bottom half of the submenu. Xcode adds constraints to the\
    \ button and label.\n\n6. Choose View > Assistant Editor > Show Assistant Editor.\
    \ Xcode displays the `Main.storyboard` and `ViewController.swift` file side by\
    \ side.\n\n7. Move the mouse pointer over the label, hold down the Control key,\
    \ and Ctrl-drag from the image view to the `ViewController.swift` file under the\
    \ \"class ViewController\" line.\n\n8. Release the Control key and the left mouse\
    \ button. A popup window appears.\n\n9. Click in the Name text field, type `labelResult`,\
    \ and click the Connect button. Xcode creates an `IBOutlet` variable as follows:\n\
    \n```\n    @IBOutlet var labelResult: UILabel!\n```\n\n10. Move the mouse pointer\
    \ over the button, hold down the Control key, and Ctrl-drag from the image view\
    \ to the `ViewController.swift` file above the last curly bracket at the bottom\
    \ of the file.\n\n11. Release the Control key and the left mouse button. A popup\
    \ window appears.\n\n12. Click in the Name text field, type `buttonTapped`, click\
    \ in the Type popup menu and choose `UIButton`, and click the Connect button.\
    \ Xcode creates an `IBAction` method.\n\n13. Choose View > Standard Editor > Show\
    \ Standard Editor, or click the Standard Editor icon in the upper right corner\
    \ of the Xcode window.\n\n14. Click the `ViewController.swift` file in the Navigator\
    \ pane.\n\n15. Modify the `viewDidLoad` method as follows:\n\n```\n    override\
    \ func viewDidLoad() {\n        super.viewDidLoad()\n        labelResult.numberOfLines\
    \ = 0\n        // Do any additional setup after loading the view, typically from\
    \ a nib.\n    }\n```\n\nSetting the `numberOfLines` property of the label to 0\
    \ allows it to expand in width no matter the size of text stored in it. If this\
    \ `numberOfLines` property is left at its default value of 1, then the label will\
    \ not resize automatically and risks cutting text off if the text is longer than\
    \ the width of the label.\n\n16. Edit this `buttonTapped` `IBAction` method as\
    \ follows:\n\n```\n    @IBAction func buttonTapped(_ sender: UIButton) {\n   \
    \     let alert = UIAlertController(title: \"Warning\", message: \"Zombies are\
    \ loose!\", preferredStyle: .alert)\n        let okAction = UIAlertAction(title:\
    \ \"OK\", style: .default, handler: { action -> Void in\n            self.labelResult.text\
    \ = \"OK\"\n        })\n        let cancelAction = UIAlertAction(title: \"Cancel\"\
    , style: .cancel, handler: { action -> Void in\n            self.labelResult.text\
    \ = \"Cancel\"\n        })\n        let destroyAction = UIAlertAction(title: \"\
    Destroy\", style: .destructive, handler: { action -> Void in\n            self.labelResult.text\
    \ = \"Destroy\"\n        })\n        alert.addAction(okAction)\n        alert.addAction(cancelAction)\n\
    \        alert.addAction(destroyAction)\n        self.present(alert, animated:\
    \ true, completion: nil)\n    }\n```\n\nThe code to define each `UIAlertAction`\
    \ simply changes the text displayed in the label. If you need each button to perform\
    \ more complicated tasks, you can put the name of one or more functions in the\
    \ handler. Then you'll need to create those functions such as:\n\n```\n    let\
    \ destroyAction = UIAlertAction(title: \"Destroy\", style: .destructive, handler:\
    \ { action -> Void in\n        self.labelResult.text = \"Destroy\"\n        self.callFunctionOne()\n\
    \        self.callFunctionTwo()\n    })\n    func callFunctionOne(){\n       \
    \ // Code here\n    }\n    func callFunctionTwo(){\n        // Code here\n   \
    \ }\n```\n\nThe entire `ViewController.swift` file should look like this:\n\n\
    ```\n    import UIKit\n    class ViewController: UIViewController {\n        @IBOutlet\
    \ var labelResult: UILabel!\n        override func viewDidLoad() {\n         \
    \   super.viewDidLoad()\n            labelResult.numberOfLines = 0\n         \
    \   // Do any additional setup after loading the view, typically from a nib.\n\
    \        }\n        @IBAction func buttonTapped(_ sender: UIButton) {\n      \
    \      let alert = UIAlertController(title: \"Warning\", message: \"Zombies are\
    \ loose!\", preferredStyle: .alert)\n            let okAction = UIAlertAction(title:\
    \ \"OK\", style: .default, handler: { action -> Void in\n                self.labelResult.text\
    \ = \"OK\"\n            })\n            let cancelAction = UIAlertAction(title:\
    \ \"Cancel\", style: .cancel, handler: { action -> Void in\n                self.labelResult.text\
    \ = \"Cancel\"\n            })\n            let destroyAction = UIAlertAction(title:\
    \ \"Destroy\", style: .destructive, handler: { action -> Void in\n           \
    \     self.labelResult.text = \"Destroy\"\n            })\n            alert.addAction(okAction)\n\
    \            alert.addAction(cancelAction)\n            alert.addAction(destroyAction)\n\
    \            self.present(alert, animated: true, completion: nil)\n        }\n\
    \    }\n```\n\n17. Click the Run button or choose Product > Run. The Simulator\
    \ screen appears.\n\n18. Click the button. The alert controller appears as shown\
    \ in Figure [12-4](#329781_5_En_12_Chapter.xhtml#Fig4).\n\n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig4_HTML.jpg](images/329781_5_En_12_Chapter/329781_5_En_12_Fig4_HTML.jpg)\n\
    \nFigure 12-4\n\nThe alert controller displaying three types of buttons, `.default`,\
    \ `.destructive`, and `.cancel`\n\n19. Click the OK button, which appears using\
    \ the `.default` style. Notice that the label now displays \"OK\" and dismisses\
    \ the alert controller.\n\n20. Click the Destroy button, which appears using the\
    \ `.destructive` style. Notice that the label now displays \"Destroy\" and dismisses\
    \ the alert controller.\n\n21. Click the Cancel button, which appears using the\
    \ `.cancel` style. Notice that the label now displays \"Cancel\" and dismisses\
    \ the alert controller.\n\n22. Choose Simulator > Quit Simulator to return to\
    \ Xcode.\n\n# Displaying a Text Field on an Alert Controller\n\nButtons let an\
    \ alert controller accept choices from the user. Based on those choices, your\
    \ code can then respond. However, sometimes you might want to display a text field\
    \ on an alert controller to allow the user to type in data. Then you'll need to\
    \ store this data."
