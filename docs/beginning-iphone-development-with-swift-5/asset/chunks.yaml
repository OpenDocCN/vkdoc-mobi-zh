    ## Displaying Multiple Views in a Navigation Controller


    Every Navigation Controller needs a root view. However to be useful, a Navigation
    Controller also needs at least one other view. That way users can move from the
    root view to the second view and back to the root view again. Of course, a Navigation
    Controller can display more than a single view to work with the root view. By
    storing multiple views in a sequential list, a Navigation Controller can display
    more information.


    Each time you add a new View Controller to a storyboard, you need to do the following:


    - Create a new `.swift` Cocoa Touch Class file and connect it to the View Controller.

    - Create a segue link from the last View Controller in the Navigation Controller
    to the newly added view.

    - Define an identifying name for this new segue link.

    - Write Swift code in the last view’s `.swift` file to open the next display when
    triggered by user interaction such as tapping a button or the screen.


    To see how to add more views to a Navigation Controller, follow these steps:


    1. Create a new iOS project using the Single View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml))
    and name this new project `MultipleNavigationApp`. This creates a single view
    for the user interface.


    2. Click the `Main.storyboard` file in the Navigator pane. Xcode displays the
    single view.


    3. Click the View Controller Scene in the Document Outline.


    4. Choose `Editor ➤ Embed In ➤ Navigation Controller`. Xcode displays a Navigation
    Controller in the storyboard and makes the single view the root view of the Navigation
    Controller (see Figure [17-4](#329781_5_En_17_Chapter.xhtml#Fig4)).


    5. Click the Library icon to open the Object Library window.


    6. Drag and drop two View Controllers to the right of the root view. There should
    be a Navigation Controller and three View Controllers as shown in Figure [17-14](#329781_5_En_17_Chapter.xhtml#Fig14).
    At this point, the `ViewController.swift` file is connected to the root view of
    the Navigation Controller (the one connected to the Navigation Controller by an
    arrow). We’ll need to create separate `.swift` Cocoa Touch Class files for each
    of the other two View Controllers and connect them.


    ![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig14_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig14_HTML.jpg)


    Figure 17-14


    Two View Controllers separate from a Navigation Controller and its root view


    7. Choose `File ➤ New ➤ File`. Xcode displays a list of templates.


    8. Choose `Cocoa Touch Class` under the iOS category and click the **Next** button.
    Another dialog appears, asking for a class name and subclass.


    9. Click in the Class text field and type `SecondViewController`.


    10. Click in the Subclass of popup menu and choose `UIViewController`.


    11. Click the **Next** button. Xcode asks where to store the file.


    12. Click the **Create** button. Xcode displays the `SecondViewController.swift`
    file in the Navigator pane.


    13. Choose `File ➤ New ➤ File`. Xcode displays a list of templates.


    14. Choose `Cocoa Touch Class` under the iOS category and click the **Next** button.
    Another dialog appears, asking for a class name and subclass.


    15. Click in the Class text field and type `ThirdViewController`.


    16. Click in the Subclass of popup menu and choose `UIViewController`.


    17. Click the **Next** button. Xcode asks where to store the file.


    18. Click the **Create** button. Xcode displays the `ThirdViewController.swift`
    file in the Navigator pane.


    19. Click the `Main.storyboard` in the Navigator pane.


    20. Click the View Controller icon above the View Controller that appears to the
    right of the Navigation Controller root view as shown in Figure [17-15](#329781_5_En_17_Chapter.xhtml#Fig15).


    ![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig15_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig15_HTML.jpg)


    Figure 17-15


    Selecting the second View Controller


    21. Choose `View ➤ Inspectors ➤ Show Identity Inspector`, or click the Identity
    Inspector icon in the upper right corner of the Xcode window.'
