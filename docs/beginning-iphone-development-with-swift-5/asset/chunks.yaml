    \ mainArray.count\n}\n```\n\n46. Underneath the previous function, add the following\
    \ function to fill the table view with data:\n\n```swift\nfunc tableView(_ tableView:\
    \ UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell {\n    let\
    \ cell: TableViewCell = tableView.dequeueReusableCell(withIdentifier: \"customCell\"\
    ) as! TableViewCell\n    cell.mainText?.text = self.mainArray[indexPath.row]\n\
    \    cell.detailText?.text = self.detailArray[indexPath.row]\n    cell.imageView?.image\
    \ = UIImage(named: self.imageArray[indexPath.row])\n    return cell\n}\n```\n\n\
    The first line defines a cell based on the `TableViewCell.swift` file. Then it\
    \ stores the `mainArray` strings in the `mainText` IBOutlet, the `detailArray`\
