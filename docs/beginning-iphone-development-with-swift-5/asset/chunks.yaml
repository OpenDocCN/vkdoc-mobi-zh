    \n18.  从屏幕右下角向左拖动鼠标。注意，翻页卷曲过渡效果会使视图控制器看起来像一页真实的纸张，如图 19-11 所示。\n\n![../images/329781_5_En_19_Chapter/329781_5_En_19_Fig11_HTML.jpg](img/329781_5_En_19_Fig11_HTML.jpg)\n\
    \n图 19-11\n\n翻页卷曲过渡样式使视图控制器之间的切换如同真实纸张翻页\n\n19.  继续向左和向右滑动。注意，当到达最后一个视图控制器时，向左滑动会显示第一个视图控制器。当到达第一个视图控制器时，向左滑动则显示最后一个视图控制器。\n\
    \n20.  选择 **Simulator** ➤ **Quit Simulator** 返回 Xcode。\n\n## 总结\n\n页面控制器提供了另一种按顺序显示多个视图控制器的方式。通过使用翻页卷曲过渡样式，滑动操作可以让每个视图控制器看起来像纸张在角落翻动。要使用页面控制器，必须从对象库窗口中拖放一个页面控制器到应用程序的故事板中。\n\
    \n将页面控制器添加到故事板后，还需要向故事板中添加视图控制器。每个视图控制器都需要一个唯一的故事板 ID（可以是任意文本）。此外，每个视图控制器都需要连接到一个\
    \ `.swift` 的 `UIViewController` 类文件。\n\n最后，需要创建一个 `.swift` 的 `UIPageViewController`\
    \ 类文件，并将其连接到该页面控制器。在这个 `.swift` 的 `UIPageViewController` 文件中，需要编写 Swift 代码来创建一个视图控制器数组，通过它们唯一的故事板\
    \ ID 来标识所有视图控制器。\n\n在 `UIPageViewController` 类文件中，需要编写两个方法，分别定义在当前显示的视图控制器之前和之后要显示哪个视图。\n\
    \n通过使用页面控制器，可以创建有趣的视觉效果，营造出翻动实体书页的错觉。\n\n# 20. 使用分栏视图控制器\n\n用于显示信息列表的最常见的用户界面对象之一就是表格视图。当在竖屏方向的窄屏\
    \ iPhone 上查看时，表格视图看起来没问题。然而，在更大的 iPad 屏幕上查看时，尤其是横屏方向，表格视图可能会显得不平衡，文本偏向一侧，而大部分屏幕区域被空白填充，如图\
    \ 20-1 所示。\n\n![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig1_HTML.jpg](img/329781_5_En_20_Fig1_HTML.jpg)\n\
    \n图 20-1\n\n在 iPad 大屏幕上显示的表格视图\n\n为了避免这种不平衡、空荡荡的外观，可以针对 iPad 以及某些 iPhone 型号的大屏幕使用分栏视图控制器。分栏视图控制器不是一次只显示一个表格视图，而是并排显示两个视图。左侧视图（称为主视图或母视图）在右侧视图（称为次视图或明细视图）中显示附加信息，如图\
    \ 20-2 所示。\n\n![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig2_HTML.jpg](img/329781_5_En_20_Fig2_HTML.jpg)\n\
    \n图 20-2\n\n分栏视图控制器并排显示两个视图以填充更大的屏幕\n\n主视图本质上显示的是上一个表格视图，而次视图显示的是下一个表格视图。通过将它们并排显示，可以轻松看到各个列表之间的关系，例如在“通用”类别下可以看到“关于”、“辅助功能”、“键盘”、“语言与地区”、“词典”和“还原”等选项（见图\
    \ 20-2）。\n\n当在更大的 iPad 和 iPhone 屏幕上运行时，分栏视图控制器会将屏幕分成两部分，分别显示主视图和次视图。当在较小的 iPhone\
    \ 屏幕上运行时，分栏视图控制器的行为类似于普通表格视图，只显示单一的项目列表。\n"
- fmt: '# Understanding the Structure of a Split View Controller


    While other types of controllers, such as the Page View Controller or a Table
    View Controller, consist of a single item, a Split View Controller is far more
    complicated. A Split View Controller must connect to two separate View Controllers,
    which represent the master-detail side-by-side views.


    To define the master view, a Split View Controller must connect to a Navigation
    Controller. To define the detail view, a Split View Controller can connect to
    a View Controller. When you drag and drop a Split View Controller from the Object
    Library, you’ll see the basic structure of a Split View Controller as shown in
    Figure [20-3](#329781_5_En_20_Chapter.xhtml#Fig3).


    ![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig3_HTML.jpg](images/329781_5_En_20_Chapter/329781_5_En_20_Fig3_HTML.jpg)


    Figure 20-3


    The basic structure of a Split View Controller


    In addition to the Split View Controller relying on at least one Navigation Controller
    and a View Controller, a Split View Controller also requires Swift code spread
    across three separate files to work:


    - `AppDelegate.swift` – Controls the two View Controllers that make up the master
    and detail views

    - A `.swift` file that connects to the master view – Controls the master View
    Controller

    - A `.swift` file that connects to the detail view – Controls the detail View
    Controller


    To see how a Split View Controller works, follow these steps:


    1. Choose File ➤ New ➤ Project. A dialog appears listing different templates.

    2. Choose Master-Detail App under the iOS category as shown in Figure [20-4](#329781_5_En_20_Chapter.xhtml#Fig4).


    ![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig4_HTML.jpg](images/329781_5_En_20_Chapter/329781_5_En_20_Fig4_HTML.jpg)


    Figure 20-4


    The basic structure of a Split View Controller


    3. Click the **Next** button. Xcode displays another window asking for a Product
    name.

    4. Click in the Product name text field, type `SplitViewApp`, and click the **Next**
    button. Then click the **Create** button. Xcode displays the Master-Detail App.

    5. Click the `AppDelegate.swift` file in the Navigator pane and notice the Swift
    code inside.

    6. Click the `MasterViewController.swift` file in the Navigator pane and study
    the Swift code inside.

    7. Click the `DetailViewController.swift` file in the Navigator pane and study
    the Swift code inside.

    8. Click the `Main.storyboard` file in the Navigator pane. Notice how the storyboard
    displays a Split View Controller connected to two Navigation Controllers as shown
    in Figure [20-5](#329781_5_En_20_Chapter.xhtml#Fig5).


    ![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig5_HTML.jpg](images/329781_5_En_20_Chapter/329781_5_En_20_Fig5_HTML.jpg)


    Figure 20-5


    The storyboard of the Master-Detail App


    9. Click the Active Scheme popup menu as shown in Figure [20-6](#329781_5_En_20_Chapter.xhtml#Fig6).
    A popup menu appears.


    ![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig6_HTML.jpg](images/329781_5_En_20_Chapter/329781_5_En_20_Fig6_HTML.jpg)


    Figure 20-6


    Clicking the Active Scheme popup menu


    10. Chose an iPad model such as an iPad Air or an iPad Pro.

    11. Click the Run button or choose Product ➤ Run. The Simulator window appears,
    simulating your chosen iPad model.

    12. Choose Hardware ➤ Rotate Left. Notice that the Split View Controller displays
    a table view on the left and a blank view on the right as shown in Figure [20-7](#329781_5_En_20_Chapter.xhtml#Fig7).


    ![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig7_HTML.jpg](images/329781_5_En_20_Chapter/329781_5_En_20_Fig7_HTML.jpg)


    Figure 20-7


    Displaying the Split View Controller


    13. Click the + icon that appears at the top of the left (master) view. Click
    this + icon multiple times. Each time you click this + icon, the time you clicked
    appears in the left (master) view.

    14. Click any of the times displayed in the left (master) view. Notice that the
    right (detail) view displays that time as shown in Figure [20-8](#329781_5_En_20_Chapter.xhtml#Fig8).


    ![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig8_HTML.jpg](images/329781_5_En_20_Chapter/329781_5_En_20_Fig8_HTML.jpg)


    Figure 20-8


    Selecting an item in the left (master) view displays more information in the right
    (detail) view


    15. Choose Hardware ➤ Rotate Right. Notice that the Split View Controller now
    hides the master view and only shows the detail view.

    16. Click the `< Master` button in the upper left corner of the simulated iPad
    screen. Notice how the master view slides out as shown in Figure [20-9](#329781_5_En_20_Chapter.xhtml#Fig9).


    ![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig9_HTML.jpg](images/329781_5_En_20_Chapter/329781_5_En_20_Fig9_HTML.jpg)


    Figure 20-9


    The master view slides out from the left


    17. Choose Simulator ➤ Quit Simulator to return to Xcode.


    By experimenting with the Split View Controller in the Master-Detail App template,
    you can see how the Split View Controller changes its appearance based on the
    simulated iPad’s orientation (portrait or landscape).


    18. Click the Active Scheme popup menu (see Figure [20-6](#329781_5_En_20_Chapter.xhtml#Fig6)).
    A popup menu appears.

    19. Choose iPhone XR.

    20. Click the Run button or choose Product ➤ Run. The Simulator window appears,
    simulating an iPhone XR in portrait orientation.

    21. Click the + icon in the upper right corner multiple times. Each time you click
    the + icon, the master view displays the time. Notice that in the smaller screen
    size of an iPhone in portrait orientation, the Split View Controller looks like
    a standard table view as shown in Figure [20-10](#329781_5_En_20_Chapter.xhtml#Fig10).


    ![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig10_HTML.jpg](images/329781_5_En_20_Chapter/329781_5_En_20_Fig10_HTML.jpg)


    Figure 20-10


    The Split View Controller appears as a table view on an iPhone in portrait orientation


    22. Choose Hardware ➤ Rotate Left.

    23. Click the `< Master` button in the upper left corner. Notice that the Split
    View Controller slides the master view from the left and displays the detail view
    on the right as shown in Figure [20-11](#329781_5_En_20_Chapter.xhtml#Fig11).


    ![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig11_HTML.jpg](images/329781_5_En_20_Chapter/329781_5_En_20_Fig11_HTML.jpg)


    Figure 20-11


    The master view can slide from the left when an iPhone switches to landscape orientation


    24. Choose Hardware ➤ Rotate Right. Notice that the master view disappears again.

    25. Choose Simulator ➤ Quit Simulator to return to Xcode.


    Try experimenting by running this app in different iOS devices such as a small
    screen iPhone 5s or a large screen iPad Pro. Then rotate the iOS device left and
    right. Notice that the Split View Controller behaves differently depending on
    the iOS device chosen and its orientation:


    - On an iPad in portrait orientation, the Split View Controller hides the master
    view but slides it out when the user requests it.

    - On an iPad in landscape orientation, the Split View Controller displays the
    master view on the left and the detail view on the right.

    - On a large screen iPhone in portrait orientation, the Split View Controller
    displays a table view.

    - On a large screen iPhone in landscape orientation, the Split View Controller
    hides the master view but slides it out when the user requests it.

    - On a small screen iPhone, the Split View Controller displays a table view in
    both portrait and landscape orientation.'
