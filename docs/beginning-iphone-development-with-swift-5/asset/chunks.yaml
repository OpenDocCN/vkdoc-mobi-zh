  trans: "\n# 了解视图与类文件\n\n任何应用用户界面最重要的组成部分都是视图，它负责在 iOS 设备屏幕上显示信息。最简单的应用只包含一个视图，但大多数应用会包含多个视图。你可以轻松地在项目中添加或删除视图。既然视图包含按钮和文本字段等用户界面对象，你可能会好奇视图是如何存储用户在界面上输入的数据的。答案是每个视图都需要一个类文件，其中包含能够存储数据和响应用户交互（例如点击按钮）的\
    \ Swift 代码。\n\n在继续之前，请注意 Xcode 使用了一些容易混淆的术语来描述用户界面的各个部分。用户界面存储在故事板中，屏幕上显示的每个独立窗口被称为场景。大多数应用包含多个场景，因此文档大纲允许你有选择地隐藏或显示每个场景的详细信息，如图\
    \ 2-9 所示。通过点击文档大纲中的每个场景，你可以快速查看构成用户界面的不同场景。\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig9_HTML.jpg](img/329781_5_En_2_Fig9_HTML.jpg)\n\
    \n图 2-9。 文档大纲能让您轻松查找和查看场景\n\n每个场景内部都有一个控制器。控制器定义了该场景在屏幕上的显示方式。你可以通过点击文档大纲中的控制器名称，或者点击故事板中的控制器图标来选择控制器，如图\
    \ 2-10 所示。\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig10_HTML.jpg](img/329781_5_En_2_Fig10_HTML.jpg)\n\
    \n图 2-10。 您可以在文档大纲或故事板中选择控制器\n\n每个控制器内部通常包含一个视图，它定义了应用运行时屏幕上的显示内容。按钮或标签等对象出现在视图上，因此如果你删除了一个视图，你也将删除该视图上存储的所有对象。\n\
    \n让我们看看我们已创建的“单视图应用”项目中的两个 `.swift` 文件，并了解文档大纲的层级结构是如何运作的：\n\n1.  在导航器面板中点击 `AppDelegate.swift`\
    \ 文件。Xcode 的中间面板会显示 `AppDelegate.swift` 文件的内容。你会注意到，已经为你创建了几个不包含代码的函数。这些函数让你可以处理应用运行时的不同情况：\n\
    \    *   `didFinishLaunchingWithOptions` – 在应用启动后运行\n    *   `applicationWillResignActive`\
    \ – 在应用不再是屏幕上处于活跃状态的应用之前运行\n    *   `applicationDidEnterBackground` – 在应用被推入后台时立即运行，以便用户使用其他应用\n\
    \    *   `applicationWillEnterForeground` – 在应用即将再次成为屏幕上的活跃应用之前运行\n    *   `applicationDidBecomeActive`\
    \ – 在应用成为屏幕上活跃的应用之后运行\n    *   `applicationWillTerminate` – 在应用即将关闭之前运行\n\n在许多情况下，你不需要为所有这些函数编写代码。例如，你可能希望在应用关闭前保存数据（`applicationWillTerminate`），然后在应用首次启动时重新加载这些数据（`didFinishLaunchingWithOptions`）。`AppDelegate.swift`\
    \ 文件就是你编写 Swift 代码来控制应用行为的地方。\n\n2.  在导航器面板中点击 `Main.storyboard` 文件。Xcode 会显示你的用户界面。确保文档大纲可见。（你可以通过选择“编辑器”➤“显示/隐藏文档大纲”或点击文档大纲图标来切换显示或隐藏文档大纲。）\n\
    \n3.  在文档大纲或故事板中点击控制器图标（参见图 2-10）。\n\n4.  选择“视图”➤“检查器”➤“显示身份检查器”，或者点击检查器面板顶部的“显示身份检查器”图标。注意，“类”文本字段显示为\
    \ `ViewController`，如图 2-11 所示。此名称指向导航器面板中的 `ViewController.swift` 文件，并将控制器与名为\
    \ `ViewController.swift` 的文件关联起来。你可以随时更改文件名，但如果更改了文件名，则必须确保所有控制器都使用正确的文件名。\n\n\
    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig11_HTML.jpg](img/329781_5_En_2_Fig11_HTML.jpg)\n\
    \n图 2-11。 身份检查器允许您将 `.swift` 文件链接到控制器\n\n5.  选择“视图”➤“检查器”➤“显示属性检查器”，或者点击“显示属性检查器”图标，如图\
    \ 2-12 所示。\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig12_HTML.jpg](img/329781_5_En_2_Fig12_HTML.jpg)\n\
    \n图 2-12。 属性检查器允许您自定义场景的外观\n\n6.  在文档大纲中点击 `View`。注意，属性检查器面板现在会显示用于自定义视图的不同选项，如图\
    \ 2-13 所示。\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig13_HTML.jpg](img/329781_5_En_2_Fig13_HTML.jpg)\n\
    \n图 2-13。 属性检查器允许您自定义视图的外观\n\n7.  在文档大纲中点击标签。（你也可以直接在故事板中点击标签进行选择。）注意，属性检查器面板现在会显示用于自定义标签的选项，如图\
    \ 2-14 所示。\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig14_HTML.jpg](img/329781_5_En_2_Fig14_HTML.jpg)\n\
    \n图 2-14。 为标签显示属性检查器\n\n8.  在文档大纲中点击按钮。（你也可以直接在故事板中点击按钮进行选择。）注意，属性检查器面板现在会显示用于自定义按钮的选项，如图\
    \ 2-15 所示。\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig15_HTML.jpg](img/329781_5_En_2_Fig15_HTML.jpg)\n\
    \n图 2-15。 为按钮显示属性检查器\n\n至此，你已经了解了如何使用文档大纲和不同的检查器面板。关键点在于，每个故事板场景都有一个控制器，并且每个控制器都需要链接到一个\
    \ `.swift` 文件。在我们的单视图应用中，我们只有一个场景。\n\n该控制器被赋予一个通用名称“视图控制器”，并链接到一个名为 `ViewController.swift`\
    \ 的 `.swift` 文件。在创建你自己的应用时，你很可能希望为控制器及其关联的 `.swift` 文件赋予一个更具描述性的名称。\n\n若要更改文档大纲中显示的任何控制器的名称，请遵循以下步骤：\n\
    \n1.  在导航器面板中点击 `Main.storyboard` 文件。\n\n2.  通过选择“编辑器”➤“显示文档大纲”或点击文档大纲图标，确保文档大纲可见。\n\
    \n3.  点击文档大纲中显示的一个控制器，然后按 ENTER 键。Xcode 会高亮显示控制器名称，如图 2-16 所示。现在你可以使用箭头键或退格键和删除键来编辑控制器名称。\n\
    \n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig16_HTML.jpg](img/329781_5_En_2_Fig16_HTML.jpg)\n\
    \n图 2-16。 您可以通过按 ENTER 键在文档大纲中编辑控制器名称\n\n选中项目并按 ENTER 键也同样允许你更改导航器面板或 macOS 访达中显示的文件名。\n"
- fmt: '# Working with Different Screen Sizes


    When you design a user interface, you have to choose the iOS device screen and
    orientation such as an iPhone 8 in portrait orientation or an iPad in landscape
    orientation. Since your iOS app might be run on different iOS devices, you need
    to test your app on all different screen sizes and orientations.


    `Xcode` gives you three different ways to view your app’s user interface in different
    iOS device screen sizes and orientations:


    * Click the “View as:” text at the bottom of the `Xcode` window and choose a different
    iOS device screen size and orientation.

    * Choose a different iOS device and orientation for the Simulator to mimic.

    * Preview your views in `Xcode`.


    The first option (clicking the “View as:” text) lets you quickly switch between
    different iOS screen sizes and orientations. The second option (using the Simulator)
    lets you test your app as if it were running in an actual iOS device.


    You’ll likely use the first option while designing your user interface and use
    the second option to verify everything works. Let’s see how to test our Single
    View App project with different screen sizes and orientations:


    1. Make sure you have loaded your `MyFirstApp` project in `Xcode`.

    2. Click the `Main.storyboard` file in the Navigator pane. `Xcode` displays the
    storyboard of your project.

    3. Click the “View as:” text at the bottom of the `Xcode` window to display the
    different iOS device and orientation options as shown in Figure [2-17](#329781_5_En_2_Chapter.xhtml#Fig17).


    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig17_HTML.jpg](images/329781_5_En_2_Chapter/329781_5_En_2_Fig17_HTML.jpg)


    Figure 2-17. Choosing a different iOS device screen size and orientation


    4. Click an iPad Pro icon. Notice that `Xcode` changes the storyboard to match
    the size of an iPad Pro screen as shown in Figure [2-18](#329781_5_En_2_Chapter.xhtml#Fig18).
    (You may need to click the minus sign icon to lower the magnification so you can
    see the entire iPad Pro screen.)


    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig18_HTML.jpg](images/329781_5_En_2_Chapter/329781_5_En_2_Fig18_HTML.jpg)


    Figure 2-18. Viewing the app user interface on an iPad Pro screen


    5. Click the smaller iPhone SE icon. Notice how `Xcode` now displays your user
    interface to show how it would appear on the smaller iPhone SE screen as shown
    in Figure [2-19](#329781_5_En_2_Chapter.xhtml#Fig19).


    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig19_HTML.jpg](images/329781_5_En_2_Chapter/329781_5_En_2_Fig19_HTML.jpg)


    Figure 2-19. Viewing the app user interface on a smaller iPhone SE screen


    6. Look in the upper left corner of the `Xcode` window for the name of your project
    (`MyFirstApp`) followed by the name of an iOS device such as iPhone XR as shown
    in Figure [2-20](#329781_5_En_2_Chapter.xhtml#Fig20).


    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig20_HTML.jpg](images/329781_5_En_2_Chapter/329781_5_En_2_Fig20_HTML.jpg)


    Figure 2-20. Identifying the type of iOS device the Simulator will mimic


    7. Click the name of the currently displayed iOS device in the upper left corner
    of the `Xcode` window. A menu of different iOS devices appears as shown in Figure
    [2-21](#329781_5_En_2_Chapter.xhtml#Fig21).


    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig21_HTML.jpg](images/329781_5_En_2_Chapter/329781_5_En_2_Fig21_HTML.jpg)


    Figure 2-21. Viewing different iOS devices for the Simulator to mimic


    8. Click a different iOS device than the one currently displayed in the upper
    left corner of the `Xcode` window such as iPad Air or iPhone 8 Plus. Once you
    choose an iOS device for the Simulator to mimic, you need to run the Simulator.

    9. Choose `Product ➤ Run`, press `Command + R`, or click the Run icon. The Simulator
    window appears, mimicking your chosen iOS device.

    10. Click the Hardware menu and you’ll see options to change the orientation of
    the iOS device such as Rotate Left or Rotate Right as shown in Figure [2-22](#329781_5_En_2_Chapter.xhtml#Fig22).


    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig22_HTML.jpg](images/329781_5_En_2_Chapter/329781_5_En_2_Fig22_HTML.jpg)


    Figure 2-22. The Hardware menu of the Simulator program


    11. Choose `Simulator ➤ Quit Simulator`. The `Xcode` window appears again.


    By viewing your user interface in different iOS device screen sizes and orientations,
    you can make sure your app appears correctly. Since you likely won’t have every
    possible iOS device available to test your app on, you’ll have to rely on `Xcode`
    and the Simulator program to help you verify that your app looks the way it should
    no matter what screen size and orientation a user might have.


    ## Previewing the User Interface


    Another way to see how your app will look on different iOS device screen sizes
    is to use the Preview feature. This lets you select a controller in the storyboard
    and then see how that controller will look in different types of iOS devices.


    To see how to preview a controller, follow these steps:


    1. Make sure you have loaded your `MyFirstApp` project in `Xcode`.

    2. Click the `Main.storyboard` file in the Navigator pane.

    3. Choose `View ➤ Assistant Editor ➤ Show Assistant Editor` or click the Assistant
    Editor icon. `Xcode` displays the `Main.storyboard` file side by side with the
    `ViewController.swift` file as shown in Figure [2-23](#329781_5_En_2_Chapter.xhtml#Fig23).


    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig23_HTML.jpg](images/329781_5_En_2_Chapter/329781_5_En_2_Fig23_HTML.jpg)


    Figure 2-23. Opening the Assistant Editor


    4. Click the double circles that appear at the top of the `.swift` file. A menu
    appears as shown in Figure [2-24](#329781_5_En_2_Chapter.xhtml#Fig24).


    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig24_HTML.jpg](images/329781_5_En_2_Chapter/329781_5_En_2_Fig24_HTML.jpg)


    Figure 2-24. Displaying the double circle menu


    5. Choose `Preview ➤ Main.storyboard (Preview)`. `Xcode` displays your user interface
    in the current iOS device you’ve chosen as shown in Figure [2-25](#329781_5_En_2_Chapter.xhtml#Fig25).


    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig25_HTML.jpg](images/329781_5_En_2_Chapter/329781_5_En_2_Fig25_HTML.jpg)


    Figure 2-25. Previewing a user interface


    6. Click the Add Device icon (`+`). A menu appears, listing all the different
    iOS devices you can choose as shown in Figure [2-26](#329781_5_En_2_Chapter.xhtml#Fig26).


    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig26_HTML.jpg](images/329781_5_En_2_Chapter/329781_5_En_2_Fig26_HTML.jpg)


    Figure 2-26. The Add Device icon displays a menu listing different iOS devices
    to preview a user interface


    7. Click an iOS device such as an iPad Pro. The Preview pane shows what your user
    interface would look like in your chosen device as shown in Figure [2-27](#329781_5_En_2_Chapter.xhtml#Fig27).


    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig27_HTML.jpg](images/329781_5_En_2_Chapter/329781_5_En_2_Fig27_HTML.jpg)


    Figure 2-27. Displaying previews on multiple iOS devices


    8. Click a preview and press `BACKSPACE` or `DELETE` to remove it.

    9. Click the Close icon in the upper right corner of the Preview pane to make
    the Preview pane disappear.


    By using the Preview pane, you can see how your user interface will look on different
    size iOS devices. Even better, you can compare different size screens side by
    side.'
