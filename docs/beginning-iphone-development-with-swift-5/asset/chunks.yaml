- fmt: "# Switching View Controllers in a Tab Bar Controller\n\nTab Bar Controllers\
    \ make it easy to switch from one view to another in any order you wish. Each\
    \ icon on the Tab bar represents a different View Controller. The basic steps\
    \ to using a Tab Bar Controller to represent different views are to add multiple\
    \ View Controllers to your storyboard and then `Ctrl-drag` to connect the Tab\
    \ Bar Controller to a View Controller.\n\nThen the next step is to create a title\
    \ and icon to represent that View Controller. You may also want to reorder the\
    \ icons on the Tab bar or delete a View Controller and its Tab bar icon later.\n\
    \nTo see how to create a simple Tab Bar Controller, follow these steps:\n\n1.\
    \  Create a new iOS project using the Single View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml))\
    \ and name this new project `TabBarApp`. This creates a single view for the user\
    \ interface.\n\n2.  Click the `Main.storyboard` file in the Navigator pane. Xcode\
    \ displays the single view.\n\n3.  Click the View Controller Scene at the top\
    \ of the View Controller.\n\n4.  Choose Editor ➤ Embed In ➤ Tab Bar Controller.\
    \ Xcode displays a Tab Bar Controller in the storyboard connected to the existing\
    \ View Controller as shown in Figure [18-3](#329781_5_En_18_Chapter.xhtml#Fig3).\n\
    \n![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig3_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig3_HTML.jpg)\n\
    \nFigure 18-3 Embedding a view inside a Tab Bar Controller\n\n5.  Click the Library\
    \ icon to open the Object Library window.\n\n6.  Drag and drop a View Controller\
    \ from the Object Library window to the storyboard as shown in Figure [18-4](#329781_5_En_18_Chapter.xhtml#Fig4).\n\
    \n![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig4_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig4_HTML.jpg)\n\
    \nFigure 18-4 Dragging and dropping a View Controller onto the storyboard\n\n\
    7.  Move the mouse over the Tab Bar Controller icon at the top of the Tab Bar\
    \ Controller (or over the Tab Bar Controller in the Document Outline).\n\n8. \
    \ Hold down the Control key and `Ctrl-drag` over the newly added View Controller\
    \ you just added to the storyboard as shown in Figure [18-5](#329781_5_En_18_Chapter.xhtml#Fig5).\n\
    \n![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig5_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig5_HTML.jpg)\n\
    \nFigure 18-5 Ctrl-dragging from the Tab Bar Controller to the separate View Controller\n\
    \n9.  Release the left mouse button and the Control key. A popup menu appears\
    \ as shown in Figure [18-6](#329781_5_En_18_Chapter.xhtml#Fig6).\n\n![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig6_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig6_HTML.jpg)\n\
    \nFigure 18-6 A popup menu for connecting a View Controller to a Tab Bar Controller\n\
    \n10.  Choose View Controllers under the Relationship Segue category. Xcode draws\
    \ an arrow (segue) linking the Tab Bar Controller to the newly added View Controller\
    \ as shown in Figure [18-7](#329781_5_En_18_Chapter.xhtml#Fig7). (You may need\
    \ to move the View Controller to see that the Tab Bar Controller’s segues fork\
    \ to connect to both View Controllers.)\n\n![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig7_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig7_HTML.jpg)\n\
    \nFigure 18-7 A segue links two views within a Navigation Controller\n\n11.  Click\
    \ in the middle of the top View Controller (or click view in the Document Outline).\n\
    \n12.  Choose View ➤ Inspectors ➤ Show Attributes Inspector, or click the Attributes\
    \ Inspector icon in the upper right corner of the Xcode window.\n\n13.  Click\
    \ in the Background popup menu and choose a color such as yellow.\n\n14.  Click\
    \ in the middle of the bottom View Controller (or click view in the Document Outline).\n\
    \n15.  Click in the Background popup menu and choose a color such as orange.\n\
    \n16.  Click the Run button or choose Product ➤ Run. The Simulator window appears,\
    \ displaying a colored screen of the first View Controller.\n\n17.  Click the\
    \ second icon on the Tab bar at the bottom of the screen. The second View Controller\
    \ appears showing a different color.\n\n18.  Choose Simulator ➤ Quit Simulator\
    \ to return to Xcode.\n\n## Customizing Tab Bar Icons\n\nTab Bar Controllers display\
    \ icons on a Tab bar at the bottom of the screen. By default, this icon simply\
    \ displays a generic label such as \"Item\", but you can customize this icon to\
    \ include more descriptive text and/or an icon. You can create icons using a graphics\
    \ editor such as Adobe Illustrator. When creating your own icons, be sure to follow\
    \ Apple's guidelines for designing icons ( `https://developer.apple.com/design/human-interface-guidelines/ios/icons-and-images/custom-icons/`\
    \ ).\n\nAs an alternative to creating your own icons, you can buy or download\
    \ icons from the following sites:\n\n*   iconbeast.com\n*   icons8.com\n*   pixellove.com\n\
    \nTo see how to customize Tab bar icons, follow these steps:\n\n1.  Make sure\
    \ the `TabBarApp` is loaded in Xcode.\n\n2.  Download two or more free icons from\
    \ any site that offers free icons.\n\n3.  Click the `Assets.xcassets` folder.\n\
    \n4.  Click the `+` icon to display a popup menu as shown in Figure [18-8](#329781_5_En_18_Chapter.xhtml#Fig8).\n\
    \n    ![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig8_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig8_HTML.jpg)\n\
    \n    Figure 18-8 Creating a new image set in the `Assets.xcassets` folder\n\n\
    5.  Choose New Image Set. Xcode displays an Image item underneath AppIcon.\n\n\
    6.  Click this Image item and press ENTER to highlight the text as shown in Figure\
    \ [18-9](#329781_5_En_18_Chapter.xhtml#Fig9).\n\n    ![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig9_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig9_HTML.jpg)\n\
    \n    Figure 18-9 Editing the Image name\n\n7.  Type `First` and press ENTER.\n\
    \n8.  Drag and drop an icon into all the placeholders labeled `1x`, `2x`, and\
    \ `3x` as shown in Figure [18-10](#329781_5_En_18_Chapter.xhtml#Fig10).\n\n  \
    \  ![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig10_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig10_HTML.jpg)\n\
    \n    Figure 18-10 Dragging and dropping icons into the image set\n\n9.  Repeat\
    \ steps 5–8 but label this image set `Second` and drag and drop a different icon\
    \ into each `1x`, `2x`, and `3x` placeholder as shown in Figure [18-11](#329781_5_En_18_Chapter.xhtml#Fig11).\n\
    \n    ![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig11_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig11_HTML.jpg)\n\
    \n    Figure 18-11 Creating two image sets with icons\n\nFigure [18-11](#329781_5_En_18_Chapter.xhtml#Fig11). Creating\
    \ a second image set."
