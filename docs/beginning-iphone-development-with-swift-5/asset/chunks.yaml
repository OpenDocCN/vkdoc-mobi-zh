    \ and click the Connect button. Xcode creates an `IBAction` method.\n\n19. Edit\
    \ this `buttonTapped` IBAction method as follows:\n\n```swift\n@IBAction func\
    \ buttonTapped(_ sender: UIButton) {\n    let petIndex = myPicker.selectedRow(inComponent:\
    \ 0)\n    let homeIndex = myPicker.selectedRow(inComponent: 1)\n    let placeIndex\
    \ = myPicker.selectedRow(inComponent: 2)\n    let alert = UIAlertController(title:\
    \ \"Your Choice\", message: \"\\(componentOne[petIndex]) \\(componentTwo[homeIndex])\
    \ \\(componentThree[placeIndex])\", preferredStyle: .alert)\n    let okAction\
    \ = UIAlertAction(title: \"OK\", style: .default, handler: { action -> Void in\n\
    \        //Just dismiss the action sheet\n    })\n    alert.addAction(okAction)\n\
    \    self.present(alert, animated: true, completion: nil)\n}\n```\n\nThe three\
    \ lines in the `buttonTapped` IBAction method retrieves the index number of the\
    \ choice currently displayed in the Picker View where the first item has an index\
    \ of 0, the second item has an index of 1, and so on. Then it uses this index\
    \ value to determine which item in the three different arrays to display in an\
    \ alert controller.\n\nThe entire `ViewController.swift` file should look like\
    \ this:\n\n```swift\nimport UIKit\nclass ViewController: UIViewController, UIPickerViewDataSource,\
    \ UIPickerViewDelegate {\n    @IBOutlet var myPicker: UIPickerView!\n    var componentOne:\
    \ [String] = [String]()\n    var componentTwo: [String] = [String]()\n    var\
    \ componentThree: [String] = [String]()\n    override func viewDidLoad() {\n \
    \       super.viewDidLoad()\n        myPicker.delegate = self\n        myPicker.dataSource\
    \ = self\n        componentOne = [\"cat\", \"dog\", \"hamster\", \"lizard\", \"\
    parrot\", \"goldfish\"]\n        componentTwo = [\"house\", \"apartment\", \"\
    condo\", \"RV\"]\n        componentThree = [\"indoor\", \"outdoor\"]\n       \
    \ // Do any additional setup after loading the view, typically from a nib.\n \
    \   }\n    func numberOfComponents(in pickerView: UIPickerView) -> Int {\n   \
    \     return 3\n    }\n    func pickerView(_ pickerView: UIPickerView, numberOfRowsInComponent\
    \ component: Int) -> Int {\n        switch component {\n        case 0: return\
    \ componentOne.count\n        case 1: return componentTwo.count\n        default:\
    \ return componentThree.count\n        }\n    }\n    func pickerView(_ pickerView:\
    \ UIPickerView, titleForRow row: Int, forComponent component: Int) -> String?\
    \ {\n        switch component {\n        case 0: return componentOne[row]\n  \
    \      case 1: return componentTwo[row]\n        default: return componentThree[row]\n\
    \        }\n    }\n    @IBAction func buttonTapped(_ sender: UIButton) {\n   \
    \     let petIndex = myPicker.selectedRow(inComponent: 0)\n        let homeIndex\
    \ = myPicker.selectedRow(inComponent: 1)\n        let placeIndex = myPicker.selectedRow(inComponent:\
    \ 2)\n        let alert = UIAlertController(title: \"Your Choice\", message: \"\
    \\(componentOne[petIndex]) \\(componentTwo[homeIndex]) \\(componentThree[placeIndex])\"\
    , preferredStyle: .alert)\n        let okAction = UIAlertAction(title: \"OK\"\
    , style: .default, handler: { action -> Void in\n            //Just dismiss the\
    \ action sheet\n        })\n        alert.addAction(okAction)\n        self.present(alert,\
    \ animated: true, completion: nil)\n    }\n}\n```\n\n20. Click the Run button\
    \ or choose Product ➤ Run. The Simulator screen appears as shown in Figure [12-11](#329781_5_En_12_Chapter.xhtml#Fig11).\n\
    \n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig11_HTML.jpg](images/329781_5_En_12_Chapter/329781_5_En_12_Fig11_HTML.jpg)\n\
    \n**Figure 12-11** A Picker View with three components\n\n21. Spin the Picker\
    \ View and choose an option from each wheel or component such as hamster, apartment,\
    \ outdoor.\n\n22. Click the button. An alert controller appears, displaying all\
    \ the options you chose in the Picker View.\n\n23. Click the button to dismiss\
    \ the alert controller.\n\n24. Repeat steps 20–22 and choose different options\
    \ in the Picker View.\n\n25. Choose Simulator ➤ Quit Simulator to return to Xcode.\n\
    \n## Summary\n\nAlerts display information either in the middle of the screen\
    \ (`.alert`) or at the bottom of the screen (`.actionSheet`). An alert can display\
    \ a title and a message in a smaller font underneath, along with at least one\
    \ button to dismiss the alert. However, an alert can display multiple buttons\
    \ and even a text field as well.\n\nDepending on which button a user taps, the\
    \ app can respond differently. If an alert displays a text field, you can customize\
    \ the text field's appearance and behavior and store the contents of the text\
    \ field to use or manipulate later. Alerts interrupt the user by displaying important\
    \ information that the user needs to know right away.\n\nWhen your app needs to\
    \ give users a limited range of options, you can use a Date Picker or a Picker\
    \ View. A Date Picker lets the user choose different dates and times. You can\
    \ define the format of the date and time retrieved to be short or long, depending\
    \ on how you want this information displayed. A Picker View lets you define the\
    \ type of choices to appear and display multiple components or wheels so users\
    \ can select multiple options.\n\nUse alerts when you need to display information\
    \ to the user and get immediate feedback. Use a Date Picker or a Picker View when\
    \ you need to restrict a user's choices to a limited range of valid options.\n\
    \n# 13. Constraints and Stack Views\n\nSince the iPhone and iPad come in different\
    \ screen sizes, every iOS app needs to adapt to these different screen sizes depending\
    \ on the type of iOS device it's running on. To define the position and spacing\
    \ of different user interface objects, you can use constraints.\n\nConstraints\
    \ can define the following:\n\n- Position (such as the center of the screen)\n\
    - Size (such as the width or height of an object)\n- Distance (such as the space\
    \ between two objects)\n\nWithout constraints, objects on the user interface might\
    \ look good on one size iOS screen but look completely skewered on another one.\
    \ That's why you need constraints on all objects placed on the user interface.\n\
    \nThe simplest way to add constraints is to let Xcode do it for you. However,\
    \ you may need to modify constraints since Xcode may not always add constraints\
    \ accurately. You can add, delete, and modify constraints until your user interface\
    \ looks perfectly on all different size iOS screens.\n\nIf you have multiple objects\
    \ on a user interface, adding multiple constraints can be clumsy, especially if\
    \ you need to rearrange objects. To simplify putting constraints on individual\
    \ objects, you can organize objects into stacks. This lets you move groups of\
    \ objects around and place constraints on that group rather than on all individual\
    \ objects in that group.\n\nBoth constraints and stack views make it easy to create\
    \ and organize objects on the user interface so they appear correctly no matter\
    \ what iOS screen size the app runs on."
