  trans: "\n### 备注\n\n你只能在以 `.alert` preferredStyle 显示**警告控制器**上添加文本字段。在以 `.actionSheet`\
    \ preferredStyle 显示的警告控制器上无法显示文本字段。\n\n当你向警告控制器添加文本字段时，你可以像对待任何其他文本字段一样对其进行修改，例如定义背景颜色或字体。此外，你还必须创建一个常量来存储该文本字段的内容，以便应用的其他部分能够访问用户在警告控制器的文本字段中输入的任何数据。\n\
    \n要了解如何在警告控制器上显示文本字段并访问其内容，请按照以下步骤操作：\n\n1.  使用“单视图应用”模板创建一个新的 iOS 项目（参见第 1 章），并将此新项目命名为\
    \ `AlertControllerTextFieldApp`。这将为用户界面创建一个单一视图。\n\n2.  在导航窗格中点击 `Main.storyboard`\
    \ 文件。Xcode 会显示该单一视图。\n\n3.  点击“资源库”图标以打开“对象库”窗口。\n\n4.  将按钮和标签拖放到视图上的任意位置。\n\n\
    5.  选择编辑器 ➤ 解决自动布局问题 ➤ 重置为建议的约束（位于子菜单的下半部分）。Xcode 将为按钮和标签添加约束。\n\n6.  选择视图 ➤ 助理编辑器\
    \ ➤ 显示助理编辑器。Xcode 会并排显示 `Main.storyboard` 和 `ViewController.swift` 文件。\n\n7. \
    \ 将鼠标指针移到标签上，按住 Control 键，从图像视图拖拽到 `class ViewController` 行下方的 `ViewController.swift`\
    \ 文件中。\n\n8.  松开 Control 键和鼠标左键。此时会弹出一个窗口。\n\n9.  在“名称”文本字段中点击，输入 `labelResult`，然后点击“连接”按钮。Xcode\
    \ 会创建一个如下所示的 IBOutlet 变量：\n\n```\n@IBOutlet var labelResult: UILabel!\n```\n\n\
    10. 将鼠标指针移到按钮上，按住 Control 键，从图像视图拖拽到文件底部最后一个大括号上方的 `ViewController.swift` 文件中。\n\
    \n11. 松开 Control 键和鼠标左键。此时会弹出一个窗口。\n\n12. 在“名称”文本字段中点击，输入 `buttonTapped`，点击“类型”弹出菜单并选择\
    \ `UIButton`，然后点击“连接”按钮。Xcode 会创建一个 IBAction 方法。\n\n13. 选择视图 ➤ 标准编辑器 ➤ 显示标准编辑器，或者点击\
    \ Xcode 窗口右上角的“标准编辑器”图标。\n\n14. 在导航窗格中点击 `ViewController.swift` 文件。\n\n15. 按如下方式修改\
    \ `viewDidLoad` 方法：\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    labelResult.numberOfLines = 0\n    // 加载视图后的任何其他设置，通常来自 nib 文件。\n}\n```\n\
    \n将标签的 `numberOfLines` 属性设置为 0，使其能够根据存储文本的大小自动扩展宽度。如果此 `numberOfLines` 属性保持默认值\
    \ 1，那么标签将不会自动调整大小，并且如果文本长度超过标签宽度，可能会截断文本。\n\n16. 按如下方式向 `buttonTapped` IBAction\
    \ 方法添加以下代码：\n\n```\nlet alert = UIAlertController(title: \"Log In\", message:\
    \ \"Enter Password\", preferredStyle: .alert)\nalert.addTextField(configurationHandler:\
    \ {(textField) in\n    textField.placeholder = \"Password here\"\n    textField.isSecureTextEntry\
    \ = true\n})\n```\n\n第一行创建了一个警告控制器，显示标题“Log In”以及下方的消息“Enter Password”。因为我们希望在警告控制器上显示文本字段，所以警告控制器的\
    \ `preferredStyle` 必须是 `.alert`。\n\n第二行向警告控制器添加了一个文本字段，并将其配置为显示“Password here”作为占位符文本，同时将其\
    \ `isSecureTextEntry` 属性设置为 `true`，这会在用户输入时隐藏输入的字符。此处的任何代码只是对文本字段进行了自定义。\n\n17.\
    \ 按如下方式向 `buttonTapped` IBAction 方法添加以下代码：\n\n```\nlet okAction = UIAlertAction(title:\
    \ \"OK\", style: .default, handler: { action -> Void in\n    let savedText = alert.textFields![0]\
    \ as UITextField\n    self.labelResult.text = savedText.text\n})\nalert.addAction(okAction)\n\
    self.present(alert, animated: true, completion: nil)\n```\n\n第一行定义了一个标题为“OK”、样式为\
    \ `.default` 的按钮。在代码的 handler 部分，这行定义了一个名为 `savedText` 的常量，它代表警告控制器上的第一个文本字段（注意索引值为\
    \ 0）。如果你向警告控制器添加了多个文本字段，则需要定义额外的常量来表示其他文本字段。最后，这行存储了文本字段中的文本（`savedText`），并将其显示在连接到用户界面标签的\
    \ `labelResult` IBOutlet 中。\n\n第二行将按钮添加到警告控制器，第三行呈现或显示该警告控制器。\n\n整个 `ViewController.swift`\
    \ 文件应如下所示：\n\n```\nimport UIKit\nclass ViewController: UIViewController {\n  \
    \  @IBOutlet var labelResult: UILabel!\n    override func viewDidLoad() {\n  \
    \      super.viewDidLoad()\n        labelResult.numberOfLines = 0\n        //\
    \ 加载视图后的任何其他设置，通常来自 nib 文件。\n    }\n    @IBAction func buttonTapped(_ sender:\
    \ UIButton) {\n        let alert = UIAlertController(title: \"Log In\", message:\
    \ \"Enter Password\", preferredStyle: .alert)\n        alert.addTextField(configurationHandler:\
    \ {(textField) in\n            textField.placeholder = \"Password here\"\n   \
    \         textField.isSecureTextEntry = true\n        })\n        let okAction\
    \ = UIAlertAction(title: \"OK\", style: .default, handler: { action -> Void in\n\
    \            let savedText = alert.textFields![0] as UITextField\n           \
    \ self.labelResult.text = savedText.text\n        })\n        alert.addAction(okAction)\n\
    \        self.present(alert, animated: true, completion: nil)\n    }\n}\n```\n\
    \n18. 点击“运行”按钮，或选择产品 ➤ 运行。模拟器屏幕出现。\n\n19. 点击按钮。警告控制器显示出来，如图 12-5 所示。\n\n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig5_HTML.jpg](img/329781_5_En_12_Fig5_HTML.jpg)\n\
    \n**图 12-5** 显示文本字段和按钮的警告控制器\n\n20. 在警告控制器的文本字段中输入一些文本。注意，当你输入时，文本字段会对字符进行掩码处理，因为其\
    \ `isSecureTextEntry` 属性被设置为 `true`。\n\n21. 点击“OK”按钮。注意，你在文本字段中输入的任何文本现在都会出现在标签中。\n\
    \n22. 选择模拟器 ➤ 退出模拟器以返回 Xcode。\n"
- fmt: "# Using a Date Picker\n\nWhen an app needs the user to input a date and/or\
    \ a time, it’s best to use the Date Picker to provide a list of valid options.\
    \ By spinning different wheels on a Date Picker, users can pick days, dates, and\
    \ times without typing a thing.\n\nAfter dragging and dropping a Date Picker from\
    \ the Object Library window to a view, you can customize a Date Picker by modifying\
    \ the following options in the Attributes Inspector as shown in Figure 12-6:\n\
    \n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig6_HTML.jpg](images/329781_5_En_12_Chapter/329781_5_En_12_Fig6_HTML.jpg)\n\
    \nFigure 12-6 – The Attributes Inspector pane lets you customize a Date Picker\n\
    \n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig7_HTML.jpg](images/329781_5_En_12_Chapter/329781_5_En_12_Fig7_HTML.jpg)\n\
    \nFigure 12-7 – Changing the Mode of a Date Picker to a Count Down Timer\n\n-\
    \ **Mode** – Defines the Date Picker to display Time, Date, Time and Date, or\
    \ Count Down Timer as shown in Figure 12-7\n- **Locale** – Overrides the system\
    \ default locale property that defines the local language such as American English\
    \ or Australian English\n- **Interval** – Defines the time interval in minutes\
    \ from 1 minute up to 30 minutes\n- **Date** – Defines the date to display initially\n\
    - **Minimum Date** – Defines the minimum date allowed\n- **Maximum Date** – Defines\
    \ the maximum date allowed\n\nNo matter what mode you choose for a Date Picker,\
    \ its value is stored as an `NSDate` data type. To convert this `NSDate` data\
    \ into text, you need a two-step process. First, you need to create a constant\
    \ that represents a `DateFormatter` such as:\n\n```\nlet dateFormatter: DateFormatter\
    \ = DateFormatter()\n```\n\nSecond, you have to define the `.dateStyle` and `.timeStyle`\
    \ properties to display the date and time. To define the date and time style,\
    \ you need to set the `.dateStyle` and `.timeStyle` properties of the `DateFormatter`\
    \ constant to one of the following options:\n\n- `.none` – Does not display the\
    \ date or time\n- `.short` – Displays dates in this format “11/23/19” and times\
    \ in this format “3:48 PM”\n- `.medium` – Displays dates in this format “Nov 23,\
    \ 2019” and times in this format “3:48:21 PM”\n- `.long` – Displays dates in this\
    \ format “November 23, 2019” and times in this format “3:48:21 PM EST”\n- `.full`\
    \ – Displays dates in this format “Saturday, November 23, 2019 AD” and times in\
    \ this format “3:48 PM Eastern Standard Time”\n\n```\ndateFormatter.dateStyle\
    \ = .short\ndateFormatter.timeStyle = .short\n```\n\nFinally, you have to retrieve\
    \ the date/time currently displayed in the Date Picker. Since the date/time value\
    \ stored in the Date Picker is in the `NSDate` data type, you have to convert\
    \ its `.date` property to a string by using code such as this:\n\n```\nlet selectedDate:\
    \ String = dateFormatter.string(from: myDatePicker.date)\n```\n\nIn the following\
    \ example, we’ll see how to retrieve the value displayed in a Date Picker in two\
    \ different ways. First, we’ll retrieve the Date Picker value any time the user\
    \ changes the Date Picker. Second, we’ll retrieve the Date Picker value and display\
    \ it on an alert controller.\n\nTo see how to define the title on a button, follow\
    \ these steps:\n\n1. Create a new iOS project using the Single View App template\
    \ (see Chapter 1) and name this new project `DatePickerApp`. This creates a single\
    \ view for the user interface.\n\n2. Click the `Main.storyboard` file in the Navigator\
    \ pane. Xcode displays the single view.\n\n3. Click the Library icon to open the\
    \ Object Library window.\n\n4. Drag and drop a button and a Date Picker anywhere\
    \ on the view as shown in Figure 12-8.\n\n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig8_HTML.jpg](images/329781_5_En_12_Chapter/329781_5_En_12_Fig8_HTML.jpg)\n\
    \nFigure 12-8 – The Date Picker in the Object Library window\n\n5. Choose **Editor**\
    \ ➤ **Resolve Auto Layout Issues** ➤ **Set to Suggested Constraints**. Xcode adds\
    \ constraints to your button and Date Picker.\n\n6. Choose **View** ➤ **Assistant\
    \ Editor** ➤ **Show Assistant Editor**. Xcode displays the `Main.storyboard` and\
    \ `ViewController.swift` file side by side.\n\n7. Move the mouse pointer over\
    \ the Date Picker, hold down the Control key, and Ctrl-drag from the Date Picker\
    \ to the `ViewController.swift` file underneath the “class ViewController” line.\n\
    \n8. Release the Control key and the left mouse button. A popup window appears.\n\
    \n9. Click in the Name text field, type `myDatePicker`, and click the Connect\
    \ button. Xcode creates an `IBOutlet` variable as follows:\n\n```\n@IBOutlet var\
    \ myDatePicker: UIDatePicker!\n```\n\n10. Underneath the `IBOutlet` add the following\
    \ line to define a date formatter:\n\n```\nlet dateFormatter: DateFormatter =\
    \ DateFormatter()\n```\n\n11. Edit the `viewDidLoad` method as follows:\n\n```\n\
    override func viewDidLoad() {\n    super.viewDidLoad()\n    dateFormatter.dateStyle\
    \ = .short\n    dateFormatter.timeStyle = .short\n    // Do any additional setup\
    \ after loading the view, typically from a nib.\n}\n```\n\nThese lines of code\
    \ define the `.dateStyle` and `.timeStyle` properties to `.short`. You can experiment\
    \ by changing these values to `.medium`, `.long`, and `.full` to see how it defines\
    \ the date and time differently.\n\n12. Underneath the `viewDidLoad` method, add\
    \ the following function which will accept a string and display it in an alert\
    \ controller:\n\n```\nfunc ShowAlert(dateTime : String) {\n    let alert = UIAlertController(title:\
    \ \"Selected Date and Time\", message: \"\\(dateTime)\", preferredStyle: .alert)\n\
    \    let okAction = UIAlertAction(title: \"OK\", style: .default, handler: { action\
    \ -> Void in\n        //Just dismiss the action sheet\n    })\n    alert.addAction(okAction)\n\
    \    self.present(alert, animated: true, completion: nil)\n}\n```\n\n13. Move\
    \ the mouse pointer over the button, hold down the Control key, and Ctrl-drag\
    \ from the button to the `ViewController.swift` file above the last curly bracket\
    \ at the bottom of the file.\n\n14. Release the Control key and the left mouse\
    \ button. A popup window appears.\n\n15. Click in the Name text field, type `getCurrentDateTime`,\
    \ click in the Type popup menu and choose `UIButton`, and click the Connect button.\
    \ Xcode creates an `IBAction` method.\n\n16. Edit this `getCurrentDateTime` `IBAction`\
    \ method as follows:\n\n```\n@IBAction func getCurrentDateTime(_ sender: UIButton)\
    \ {\n    let selectedDate: String = dateFormatter.string(from: myDatePicker.date)\n\
    \    ShowAlert(dateTime: selectedDate)\n}\n```\n\nThis `IBAction` method retrieves\
    \ the value of the `myDatePicker` `IBOutlet` (that represents the Date Picker)\
    \ and converts this date and time into a string that gets stored in the `selectedDate`\
    \ constant. Then it passes this `selectedDate` constant to the `ShowAlert` function\
    \ to display it on the alert controller.\n\n17. Move the mouse pointer over the\
    \ Date Picker, hold down the Control key, and Ctrl-drag from the Date Picker to\
    \ the `ViewController.swift` file above the last curly bracket at the bottom of\
    \ the file.\n\n18. Release the Control key and the left mouse button. A popup\
    \ window appears.\n\n19. Click in the Name text field, type `dateChanged`, click\
    \ in the Type popup menu and choose `UIDatePicker`, and click the Connect button.\
    \ Xcode creates an `IBAction` method.\n\n20. Edit this `dateChanged` `IBAction`\
    \ method as follows:\n\n```\n@IBAction func dateChanged(_ sender: UIDatePicker)\
    \ {\n    let selectedDate: String = dateFormatter.string(from: sender.date)\n\
    \    ShowAlert(dateTime: selectedDate)\n}\n```\n\nThis `dateChanged` `IBAction`\
    \ method runs every time the user changes the date or time in the Date Picker.\
    \ It retrieves the `.date` property from the Date Picker and converts it into\
    \ a string, which it stores in the `selectedDate` constant. Then it passes this\
    \ `selectedDate` constant into the `ShowAlert` function that displays it on an\
    \ alert controller.\n\nThe entire `ViewController.swift` file should look like\
    \ this."
