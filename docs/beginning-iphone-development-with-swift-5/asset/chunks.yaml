    \ 图标，选中 Horizontally in Container 和 Vertically in Container 复选框，然后点击 Add 2 Constraints\
    \ 按钮。用户界面应如图 16-17 所示。\n\n![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig17_HTML.jpg](img/329781_5_En_16_Fig17_HTML.jpg)\n\
    \n*图 16-17 单元格和节标题中心的标签*\n\n35.  选择“视图”➤“助理编辑器”➤“显示助理编辑器”，或点击 Xcode 窗口右上角的助理编辑器图标。`Main.storyboard`\
    \ 显示在左侧。\n\n36.  点击右侧助理编辑器顶部的两个相连圆圈，选择 Manual。然后浏览文件夹以选择 `itemCell.swift`。\n\n\
    37.  将鼠标指针移到节标题中的标签上，按住 Control 键，然后 Ctrl-拖动到 `itemCell.swift` 文件中 \"class ViewController\"\
    \ 行的下方。\n\n38.  松开 Control 键和鼠标左键。弹出一个窗口。\n\n39.  点击 Name 文本字段，输入 `headerLabel`，然后点击\
    \ Connect 按钮。Xcode 会创建一个 `IBOutlet`，如下所示：\n\n```\n    @IBOutlet var headerLabel:\
    \ UILabel!\n```\n\n40.  将鼠标指针移到 Collection View Cell 中的标签上，按住 Control 键，然后 Ctrl-拖动到\
    \ `itemCell.swift` 文件中 \"class ViewController\" 行的下方。\n\n41.  松开 Control 键和鼠标左键。弹出一个窗口。\n\
    \n42.  点击 Name 文本字段，输入 `itemLabel`，然后点击 Connect 按钮。Xcode 会创建一个 `IBOutlet`，如下所示：\n\
    \n```\n    @IBOutlet var itemLabel: UILabel!\n```\n\n整个 `itemCell.swift` 文件应如下所示：\n\
    \n```\n    import UIKit\n    class itemCell: UICollectionViewCell {\n    @IBOutlet\
    \ var headerLabel: UILabel!\n    @IBOutlet var itemLabel: UILabel!\n    }\n```\n\
    \n43.  选择“视图”➤“标准编辑器”➤“显示标准编辑器”，或点击 Xcode 窗口右上角的标准编辑器图标。\n\n44.  在导航器窗格中点击 `ViewController.swift`\
    \ 文件。\n\n45.  修改 `class ViewController` 行，添加 `UICollectionViewDelegate` 和 `UICollectionViewDataSource`，如下所示：\n\
    \n```\n    class ViewController: UIViewController, UICollectionViewDataSource,\
    \ UICollectionViewDelegate {\n```\n\n此代码的目的是将 `ViewController.swift` 文件标识为 Collection\
    \ View 的委托和数据源。\n"
- fmt: "46. 在`class ViewController`行下方添加以下数组：\n\n```\nlet petArray = [[\"Mammal\"\
    , \"cat\", \"dog\", \"hamster\", \"gerbil\", \"rabbit\"], [\"Bird\", \"parakeet\"\
    , \"parrot\", \"canary\", \"finch\"], [\"Fish\", \"tropical fish\", \"goldfish\"\
    , \"sea horses\"], [\"Reptile\", \"turtle\", \"snake\", \"lizard\"]]\n```\n\n\
    `petArray`由四个字符串数组组成，每个数组中的第一个元素定义了分区标题，例如`\"Mammal\"`或`\"Bird\"`。\n\n47. 单击导航面板中的`Main.storyboard`文件。\n\
    \n48. 选择`View ➤ Assistant Editor ➤ Show Assistant Editor`，或单击Xcode窗口右上角的Assistant\
    \ Editor图标。`Main.storyboard`显示在左侧，`ViewController.swift`文件应显示在右侧。\n\n49. 将鼠标指针移到文档大纲中的`Collection\
    \ View`上，按住Control键，然后Ctrl-拖拽到`itemCell.swift`文件中`class ViewController`行下方。\n\n\
    50. 松开Control键和鼠标左键，弹出窗口出现。\n\n51. 在名称文本字段中单击，输入`collectionView`，然后单击Connect按钮。Xcode创建一个`IBOutlet`，如下所示：\n\
    \n```\n@IBOutlet var collectionView: UICollectionView!\n```\n\n52. 选择`View ➤ Standard\
    \ Editor ➤ Show Standard Editor`，或单击Xcode窗口右上角的Standard Editor图标。\n\n53. 单击导航面板中的`ViewController.swift`文件。\n\
    \n54. 修改`viewDidLoad`方法如下：\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    collectionView.delegate = self\n    collectionView.dataSource = self\n  \
    \  // Do any additional setup after loading the view.\n}\n```\n\n55. 在`viewDidLoad`方法下方添加以下函数，以定义Collection\
    \ View中显示的分区数量：\n\n```\nfunc numberOfSections(in collectionView: UICollectionView)\
    \ -> Int {\n    return petArray.count\n}\n```\n\n56. 在上一个函数下方添加以下函数，以标识每个分区中的项目数量：\n\
    \n```\nfunc collectionView(_ collectionView: UICollectionView, numberOfItemsInSection\
    \ section: Int) -> Int {\n    return petArray[section].count - 1\n}\n```\n\n该函数返回每个字符串数组中除一个项目外的所有项目计数，因为每个字符串数组中的一个项目是分区标题名称（例如`\"\
    Mammal\"`）。\n\n57. 在上一个函数下方添加以下函数，以使用`petArray`中的数据填充Collection View：\n\n```\n\
    func collectionView(_ collectionView: UICollectionView, cellForItemAt indexPath:\
    \ IndexPath) -> UICollectionViewCell {\n    let cell = collectionView.dequeueReusableCell(withReuseIdentifier:\
    \ \"customCell\", for: indexPath) as! itemCell\n    cell.itemLabel.text = petArray[indexPath.section][indexPath.row\
    \ + 1]\n    return cell\n}\n```\n\n58. 在上一个函数下方添加以下函数，以显示用户从Collection View中选择的项目：\n\
    \n```\nfunc collectionView(_ collectionView: UICollectionView, didSelectItemAt\
    \ indexPath: IndexPath) {\n    let alert = UIAlertController(title: \"Your Choice\"\
    , message: \"\\(petArray[indexPath.section][indexPath.row + 1])\", preferredStyle:\
    \ .alert)\n    let action = UIAlertAction(title: \"OK\", style: .default, handler:\
    \ nil)\n    alert.addAction(action)\n    self.present(alert, animated: true, completion:\
    \ nil)\n}\n```\n\n59. 在上一个函数下方添加以下函数，以用每个字符串数组中的第一个元素填充分区标题：\n\n```\nfunc collectionView(_\
    \ collectionView: UICollectionView, viewForSupplementaryElementOfKind kind: String,\
    \ at indexPath: IndexPath) -> UICollectionReusableView {\n    let headerView =\
    \ collectionView.dequeueReusableSupplementaryView(ofKind: kind, withReuseIdentifier:\
    \ \"headerView\", for: indexPath) as! itemCell\n    headerView.headerLabel.text\
    \ = petArray[indexPath.section][0]\n    return headerView\n}\n```\n\n整个`ViewController.swift`文件应如下所示：\n\
    \n```\nimport UIKit\nclass ViewController: UIViewController, UICollectionViewDataSource,\
    \ UICollectionViewDelegate {\n    @IBOutlet var collectionView: UICollectionView!\n\
    \    let petArray = [[\"Mammal\", \"cat\", \"dog\", \"hamster\", \"gerbil\", \"\
    rabbit\"], [\"Bird\", \"parakeet\", \"parrot\", \"canary\", \"finch\"], [\"Fish\"\
    , \"tropical fish\", \"goldfish\", \"sea horses\"], [\"Reptile\", \"turtle\",\
    \ \"snake\", \"lizard\"]]\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        collectionView.delegate = self\n        collectionView.dataSource = self\n\
    \        // Do any additional setup after loading the view.\n    }\n    func numberOfSections(in\
    \ collectionView: UICollectionView) -> Int {\n        return petArray.count\n\
    \    }\n    func collectionView(_ collectionView: UICollectionView, numberOfItemsInSection\
    \ section: Int) -> Int {\n        return petArray[section].count - 1\n    }\n\
    \    func collectionView(_ collectionView: UICollectionView, cellForItemAt indexPath:\
    \ IndexPath) -> UICollectionViewCell {\n        let cell = collectionView.dequeueReusableCell(withReuseIdentifier:\
    \ \"customCell\", for: indexPath) as! itemCell\n        cell.itemLabel.text =\
    \ petArray[indexPath.section][indexPath.row + 1]\n        return cell\n    }\n\
    \    func collectionView(_ collectionView: UICollectionView, didSelectItemAt indexPath:\
    \ IndexPath) {\n        let alert = UIAlertController(title: \"Your Choice\",\
    \ message: \"\\(petArray[indexPath.section][indexPath.row + 1])\", preferredStyle:\
    \ .alert)\n        let action = UIAlertAction(title: \"OK\", style: .default,\
    \ handler: nil)\n        alert.addAction(action)\n        self.present(alert,\
    \ animated: true, completion: nil)\n    }\n    func collectionView(_ collectionView:\
    \ UICollectionView, viewForSupplementaryElementOfKind kind: String, at indexPath:\
    \ IndexPath) -> UICollectionReusableView {\n        let headerView = collectionView.dequeueReusableSupplementaryView(ofKind:\
    \ kind, withReuseIdentifier: \"headerView\", for: indexPath) as! itemCell\n  \
    \      headerView.headerLabel.text = petArray[indexPath.section][0]\n        return\
    \ headerView\n    }\n}\n```\n\n60. 单击Run按钮或选择`Product ➤ Run`。模拟器窗口出现，显示按分区划分的Collection\
    \ View，如图16-18所示。\n\n![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig18_HTML.jpg](images/329781_5_En_16_Chapter/329781_5_En_16_Fig18_HTML.jpg)\n\
    \n**图16-18** 显示不同分区的Collection View\n\n61. 单击任意项目，弹出一个警报控制器，显示所选项目。\n\n62. 单击OK关闭警报控制器。\n\
    \n63. 选择`Simulator ➤ Quit Simulator`返回Xcode。\n\n## 总结\n\nCollection View的工作方式类似于Table\
    \ View，都需要定义代理和数据源。Collection View更加灵活，因为它支持水平或垂直滚动，并以网格形式显示项目，而不是像Table View那样堆叠成行。\n\
    \n为了组织Collection View中数据的显示，可以定义分区标题。要进一步自定义Collection View的外观，可以将标签等对象拖放到Collection\
    \ View Cell上，并创建一个单独的`.swift`类文件链接到该Cell。这样便可以创建`IBOutlet`来显示数据。\n\n可以将Collection\
    \ View视为更复杂、更通用的Table View。一旦理解了Table View的工作方式，就可以轻松学习如何在未来的应用中创建和使用Collection\
    \ View。"
