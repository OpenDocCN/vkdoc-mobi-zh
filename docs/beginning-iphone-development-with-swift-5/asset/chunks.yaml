    \    override func viewDidLoad() {\n        super.viewDidLoad()\n        topImageView.isUserInteractionEnabled\
    \ = true\n        topImageView.backgroundColor = UIColor.green\n        let rotationGesture\
    \ = UIRotationGestureRecognizer(target: self, action: #selector(handleRotation))\n\
    \        topImageView.addGestureRecognizer(rotationGesture)\n        rotateMe\
    \ = rotationGesture\n        // Do any additional setup after loading the view,\
    \ typically from a nib.\n    }\n    @objc func handleRotation() {\n        topImageView.transform\
    \ = CGAffineTransform(rotationAngle: rotateMe!.rotation)\n    }\n}\n```\n\n16.\
    \ 点击 Run 按钮或选择 **Product ➤ Run**。模拟器窗口将出现。要模拟捏合手势，您需要使用鼠标并按住 Option 键。\n\n17.\
    \ 将鼠标指针移到图像视图上，然后按住 Option 键。两个灰色圆点会出现在屏幕上，模拟两个手指的指尖（见图[11-11](#329781_5_En_11_Chapter.xhtml#Fig11)）。\n\
