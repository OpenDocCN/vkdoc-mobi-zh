    \n虽然表格视图便于显示数据，但它们也可用于允许编辑操作，例如在表格视图中添加或删除行。为此，你可以包含一个左滑手势，让行显示按钮。通过点击按钮，用户可以向表格视图添加新项或删除现有行。\n\
    \n通过自定义表格视图单元格并实现用于在表格视图中添加或删除行的左滑手势，你可以定义应用独特的表格视图。\n\n# 16. 使用集合视图\n\n表格视图非常适合以行形式显示大量数据，以便用户可以滚动浏览。虽然表格视图对于\
    \ iPhone 较小、较窄的屏幕来说是完美的，但它们仅限于上下滚动数据行。如果你想水平滚动数据或显示多列数据，你可以改用集合视图。\n\n与表格视图一样，集合视图需要数据源和委托，它们实现的方法定义了集合视图中将显示多少数据。可以将集合视图视为功能更丰富的表格视图。\n\
    \n## 创建集合视图\n\n集合视图在构成网格的单元格中显示数据，该网格可以垂直或水平滚动。要了解如何创建简单的集合视图，请按照以下步骤操作：\n\n1.\
    \  使用“单视图应用”模板创建一个新的 iOS 项目（参见第 1 章），并将此新项目命名为`SimpleCollectionViewApp`。这会为用户界面创建一个单视图。\n\
    \n2.  点击导航器窗格中的`Main.storyboard`文件。Xcode 会显示该单视图。\n\n3.  点击库图标以打开对象库窗口。\n\n4.\
    \  将一个集合视图拖放到视图上，如图 16-1 所示。\n\n![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig1_HTML.jpg](img/329781_5_En_16_Fig1_HTML.jpg)\n\
    \n**图 16-1**\n\n对象库窗口中的集合视图\n\n5.  调整集合视图的大小，使其填满整个屏幕。\n\n6.  选择“编辑器 ➤ 解决自动布局问题\
    \ ➤ 重置为建议的约束”。Xcode 会向集合视图添加约束。\n\n7.  点击文档大纲中的“集合视图单元格”。\n\n8.  选择“视图 ➤ 检查器 ➤\
    \ 显示属性检查器”，或点击 Xcode 窗口右上角的属性检查器图标。\n\n9.  点击“标识符”文本字段，输入`customCell`，然后按回车键，如图\
    \ 16-2 所示。\n\n![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig2_HTML.jpg](img/329781_5_En_16_Fig2_HTML.jpg)\n\
    \n**图 16-2**\n\n集合视图单元格的属性检查器窗格中显示的“标识符”文本字段\n\n10.  选择“视图 ➤ 助理编辑器 ➤ 显示助理编辑器”，或点击\
    \ Xcode 窗口右上角的助理编辑器图标。\n\n11.  将鼠标指针移到集合视图上，按住 Control 键，并按住 Control 键从集合视图拖拽到`ViewController.swift`文件中的“`class\
    \ ViewController`”行下方。\n\n12.  松开 Control 键和鼠标左键。会弹出一个窗口。\n\n13.  点击“名称”文本字段，输入`collectionView`，然后点击“连接”按钮。Xcode\
    \ 会创建一个`IBOutlet`，如下所示：\n\n```\n    @IBOutlet var collectionView: UICollectionView!\n\
    ```\n\n14.  选择“视图 ➤ 标准编辑器 ➤ 显示标准编辑器”，或点击 Xcode 窗口右上角的标准编辑器图标。\n\n15.  点击导航器窗格中的`ViewController.swift`文件。\n\
    \n16.  修改`class ViewController`行，添加`UITableViewDelegate`和`UITableViewDataSource`，如下所示：\n\
    \n```\n    class ViewController: UIViewController, UICollectionViewDataSource,\
    \ UICollectionViewDelegate {\n```\n\n这段代码的目的是将`ViewController.swift`文件标识为集合视图的委托和数据源。\n\
    \n17.  在`class ViewController`行下方，添加以下代码：\n\n```\n    var cellColor = true\n```\n\
    \n18.  修改`viewDidLoad`方法，如下所示：\n\n```\n    override func viewDidLoad() {\n   \
    \     super.viewDidLoad()\n        collectionView.dataSource = self\n        collectionView.delegate\
    \ = self\n        // Do any additional setup after loading the view.\n    }\n\
    ```\n\n19.  在`viewDidLoad`方法下方添加以下函数，以定义集合视图分区中显示多少个项目。默认情况下，集合视图有一个分区：\n\n```\n\
    \    func collectionView(_ collectionView: UICollectionView, numberOfItemsInSection\
    \ section: Int) -> Int {\n        return 100\n    }\n```\n\n20.  在`viewDidLoad`方法下方添加以下函数，以向集合视图单元格填充数据：\n\
    \n```\n    func collectionView(_ collectionView: UICollectionView, cellForItemAt\
    \ indexPath: IndexPath) -> UICollectionViewCell {\n        let cell = collectionView.dequeueReusableCell(withReuseIdentifier:\
    \ \"customCell\", for: indexPath)\n        // Alternate colors in the Collection\
    \ View cells\n        if cellColor {\n            cell.backgroundColor = UIColor.yellow\n\
    \        } else {\n            cell.backgroundColor = UIColor.green\n        }\n\
    \        cellColor = !cellColor\n        return cell\n    }\n```\n"
- fmt: "该函数通过标识符“customCell”定义了集合视图单元格：\n\n```swift\nlet cell = collectionView.dequeueReusableCell(withReuseIdentifier:\
    \ \"customCell\", for: indexPath)\n```\n\n接下来，如果`cellColor`的值为`true`，则将集合视图单元格填充为黄色。否则，如果`cellColor`的值为`false`，则将集合视图单元格填充为绿色。\n\
    \n```swift\nif cellColor {\n    cell.backgroundColor = UIColor.yellow\n} else\
    \ {\n    cell.backgroundColor = UIColor.green\n}\n```\n\n最后，它将`cellColor`的值从`true`改为`false`（或从`false`改为`true`），并返回该单元格。\n\
    \n完整的`ViewController.swift`文件应如下所示：\n\n```swift\nimport UIKit\nclass ViewController:\
    \ UIViewController, UICollectionViewDataSource, UICollectionViewDelegate {\n \
    \   @IBOutlet var collectionView: UICollectionView!\n    var cellColor = true\n\
    \    override func viewDidLoad() {\n        super.viewDidLoad()\n        collectionView.dataSource\
    \ = self\n        collectionView.delegate = self\n        // Do any additional\
    \ setup after loading the view.\n    }\n    func collectionView(_ collectionView:\
    \ UICollectionView, numberOfItemsInSection section: Int) -> Int {\n        return\
    \ 100\n    }\n    func collectionView(_ collectionView: UICollectionView, cellForItemAt\
    \ indexPath: IndexPath) -> UICollectionViewCell {\n        let cell = collectionView.dequeueReusableCell(withReuseIdentifier:\
    \ \"customCell\", for: indexPath)\n        // Alternate colors in the Collection\
    \ View cells\n        if cellColor {\n            cell.backgroundColor = UIColor.yellow\n\
    \        } else {\n            cell.backgroundColor = UIColor.green\n        }\n\
    \        cellColor = !cellColor\n        return cell\n    }\n}\n```\n\n21. 点击运行按钮或选择“Product\
    \ ➤ Run”。模拟器窗口将出现，显示交替显示绿色和黄色单元格的集合视图，如图[16-3](#329781_5_En_16_Chapter.xhtml#Fig3)所示。\n\
    \n![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig3_HTML.jpg](images/329781_5_En_16_Chapter/329781_5_En_16_Fig3_HTML.jpg)\n\
    \n**图16-3** 显示交替单元格颜色的集合视图\n\n22. 上下滚动。\n\n23. 选择“Simulator ➤ Quit Simulator”返回\
    \ Xcode。\n\n24. 点击`Main.storyboard`文件，然后在文档大纲中点击“Collection View”。\n\n25. 选择“View\
    \ ➤ Inspectors ➤ Show Attributes Inspector”，或点击 Xcode 窗口右上角的属性检查器图标。\n\n26. 点击“Scroll\
    \ Direction”弹出菜单，选择“Horizontal”，如图[16-4](#329781_5_En_16_Chapter.xhtml#Fig4)所示。\n\
    \n![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig4_HTML.jpg](images/329781_5_En_16_Chapter/329781_5_En_16_Fig4_HTML.jpg)\n\
    \n**图16-4** “Scroll Direction”弹出菜单允许您在垂直或水平滚动之间选择\n\n27. 点击运行按钮或选择“Product ➤ Run”。模拟器窗口将出现，显示交替显示绿色和黄色单元格的集合视图（参见图[16-3](#329781_5_En_16_Chapter.xhtml#Fig3)）。\n\
    \n28. 注意，您现在可以左右滚动，但不能上下滚动。\n\n29. 选择“Simulator ➤ Quit Simulator”返回 Xcode。\n\n\
    ## 在集合视图中显示数据\n\n集合视图的主要目的是在单元格中显示信息。要在单元格中显示信息，需要以下几个步骤：\n\n- 将对象拖放到集合视图单元格上。\n\
    - 创建一个新的`.swift`类文件来表示集合视图单元格。\n- 在身份检查器窗格中将这个新的`.swift`类文件连接到集合视图单元格。\n- 从集合视图单元格上的对象按住\
    \ Ctrl 键拖拽到`.swift`类文件，创建`IBOutlet`变量来表示每个对象。\n- 在`cellForItemAt`函数中编写代码，将数据存储到每个集合视图单元格中。\n\
    \n在设计集合视图单元格时，您可以调整其高度和宽度。此外，您还可以定义单元格之间的间距，以及单元格距离屏幕顶部、左侧、底部或右侧边缘的距离。\n\n要了解如何在集合视图单元格中显示文本，请按照以下步骤操作：\n\
    \n1. 使用单视图应用模板创建一个新的 iOS 项目（参见第[1](#329781_5_En_1_Chapter.xhtml)章），并将此新项目命名为`CollectionViewDataApp`。这将为用户界面创建一个单一视图。\n\
    \n2. 在导航器窗格中点击`Main.storyboard`文件。Xcode 会显示该单一视图。\n\n3. 点击库图标打开对象库窗口。\n\n4. 将集合视图拖放到视图上的任意位置。\n\
    \n5. 调整集合视图的大小，使其填满整个屏幕。\n\n6. 选择“Editor ➤ Resolve Auto Layout Issues ➤ Reset\
    \ to Suggested Constraints”。Xcode 会为集合视图添加约束。\n\n7. 选择“File ➤ New ➤ File”。Xcode\
    \ 会显示一个模板列表。\n\n8. 在 iOS 类别下选择“Cocoa Touch Class”，然后点击**Next**按钮。将出现另一个对话框，要求提供类名和子类。\n\
    \n9. 在“Class”文本字段中点击并输入`itemCell`。\n\n10. 点击“Subclass of”弹出菜单，选择`UICollectionViewCell`，如图[16-5](#329781_5_En_16_Chapter.xhtml#Fig5)所示。\n\
    \n![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig5_HTML.jpg](images/329781_5_En_16_Chapter/329781_5_En_16_Fig5_HTML.jpg)\n\
    \n**图16-5** 为集合视图单元格创建一个新的`.swift`类文件\n\n11. 点击**Next**按钮。Xcode 会询问文件的存储位置。\n\n\
    12. 点击**Create**按钮。Xcode 会在导航器窗格中显示`itemCell.swift`文件。\n\n13. 在导航器窗格中点击`Main.storyboard`，在文档大纲中点击“Collection\
    \ View Cell”，然后选择“View ➤ Inspectors ➤ Show Attributes Inspector”，或点击 Xcode 窗口右上角的属性检查器图标。\n\
    \n14. 在标识符文本字段中点击，输入`customCell`，然后按回车键，如图[16-6](#329781_5_En_16_Chapter.xhtml#Fig6)所示。\n\
    \n![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig6_HTML.jpg](images/329781_5_En_16_Chapter/329781_5_En_16_Fig6_HTML.jpg)\n\
    \n**图16-6** 在属性检查器窗格中定义集合视图单元格的标识符\n\n15. 点击“Background color”弹出菜单，选择一种颜色，例如黄色。Xcode\
    \ 会高亮显示该集合视图单元格。\n\n16. 选择“View ➤ Inspectors ➤ Show Identity Inspector”，或点击 Xcode\
    \ 窗口右上角的身份检查器图标。\n\n17. 点击“Class”弹出菜单，选择`itemCell`，如图[16-7](#329781_5_En_16_Chapter.xhtml#Fig7)所示。\n\
    \n![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig7_HTML.jpg](images/329781_5_En_16_Chapter/329781_5_En_16_Fig7_HTML.jpg)\n\
    \n**图16-7** 将集合视图单元格连接到`itemCell.swift`文件\n\n18. 点击库图标打开对象库窗口，将一个标签拖放到集合视图单元格的中心。\n\
    \n19. 点击 Xcode 窗口底部的对齐图标，选中“Horizontally in Container”和“Vertically in Container”复选框，然后点击“Add\
    \ 2 Constraints”按钮。Xcode 会添加约束，以确保标签在集合视图单元格内居中，如图[16-8](#329781_5_En_16_Chapter.xhtml#Fig8)所示。"
  raw: "This function defines the Collection View Cell by its identifier “customCell”:\n\
    \n```\n    let cell = collectionView.dequeueReusableCell(withReuseIdentifier:\
    \ \"customCell\", for: indexPath)\n    ```\n\nNext, if the value of cellColor\
    \ is true, then it fills the Collection View Cell with the color yellow. Otherwise\
    \ if the value of cellColor is false, then it fills the Collection View Cell with\
    \ the color green.\n\n```\n    if cellColor {\n    cell.backgroundColor = UIColor.yellow\n\
    \    } else {\n    cell.backgroundColor = UIColor.green\n    }\n    ```\n\nFinally\
    \ it changes the value of cellColor from true to false (or false to true) and\
    \ returns the cell.\n\nThe complete ViewController.swift file should look like\
    \ this:\n\n```\n    import UIKit\n    class ViewController: UIViewController,\
    \ UICollectionViewDataSource, UICollectionViewDelegate {\n    @IBOutlet var collectionView:\
    \ UICollectionView!\n    var cellColor = true\n    override func viewDidLoad()\
    \ {\n    super.viewDidLoad()\n    collectionView.dataSource = self\n    collectionView.delegate\
    \ = self\n    // Do any additional setup after loading the view.\n    }\n    func\
    \ collectionView(_ collectionView: UICollectionView, numberOfItemsInSection section:\
    \ Int) -> Int {\n    return 100\n    }\n    func collectionView(_ collectionView:\
    \ UICollectionView, cellForItemAt indexPath: IndexPath) -> UICollectionViewCell\
    \ {\n    let cell = collectionView.dequeueReusableCell(withReuseIdentifier: \"\
    customCell\", for: indexPath)\n    // Alternate colors in the Collection View\
    \ cells\n    if cellColor {\n    cell.backgroundColor = UIColor.yellow\n    }\
    \ else {\n    cell.backgroundColor = UIColor.green\n    }\n    cellColor = !cellColor\n\
    \    return cell\n    }\n    }\n    ```\n\n21.  Click the Run button or choose\
    \ Product ➤ Run. The Simulator window appears, displaying the Collection View\
    \ showing alternating green and yellow cells as shown in Figure [16-3](#329781_5_En_16_Chapter.xhtml#Fig3).\n\
    \n![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig3_HTML.jpg](images/329781_5_En_16_Chapter/329781_5_En_16_Fig3_HTML.jpg)\n\
    \nFigure 16-3\n\nThe Collection View displaying alternating cell colors\n\n22.\
    \  Scroll up and down.\n\n23.  Choose Simulator ➤ Quit Simulator to return to\
    \ Xcode.\n\n24.  Click the Main.storyboard file and click Collection View in the\
    \ Document Outline.\n\n25.  Choose View ➤ Inspectors ➤ Show Attributes Inspector,\
    \ or click the Attributes Inspector icon in the upper right corner of the Xcode\
    \ window.\n\n26.  Click the Scroll Direction popup menu and choose Horizontal\
    \ as shown in Figure [16-4](#329781_5_En_16_Chapter.xhtml#Fig4).\n\n![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig4_HTML.jpg](images/329781_5_En_16_Chapter/329781_5_En_16_Fig4_HTML.jpg)\n\
    \nFigure 16-4\n\nThe Scroll Direction popup menu lets you choose between Vertical\
    \ or Horizontal scrolling\n\n27.  Click the Run button or choose Product ➤ Run.\
    \ The Simulator window appears, displaying the Collection View showing alternating\
    \ green and yellow cells (see Figure [16-3](#329781_5_En_16_Chapter.xhtml#Fig3)).\n\
    \n28.  Notice that you can now scroll left and right but not up or down.\n\n29.\
    \  Choose Simulator ➤ Quit Simulator to return to Xcode.\n\n## Displaying Data\
    \ in a Collection View\n\nThe main purpose of a Collection View is to display\
    \ information in cells. To display information in a cell takes several steps:\n\
    \n*   Drag and drop objects onto the Collection View Cell.\n\n*   Create a new\
    \ .swift class file to represent the Collection View Cell.\n\n*   Connect this\
    \ new .swift class file to the Collection View Cell in the Identity Inspector\
    \ pane.\n\n*   Ctrl-drag from the objects on the Collection View Cell to the .swift\
    \ class file to create IBOutlet variables to represent each object.\n\n*   Write\
    \ code in the cellForItemAt function to store data in each Collection View Cell.\n\
    \nWhen designing a Collection View Cell, you can resize its height and width.\
    \ In addition, you can also define the spacing between cells along with how much\
    \ space cells appear away from the top, left, bottom, or right edges of the screen.\n\
    \nTo see how to display text in a Collection View Cell, follow these steps:\n\n\
    1.  Create a new iOS project using the Single View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml))\
    \ and name this new project CollectionViewDataApp. This creates a single view\
    \ for the user interface.\n\n2.  Click the Main.storyboard file in the Navigator\
    \ pane. Xcode displays the single view.\n\n3.  Click the Library icon to open\
    \ the Object Library window.\n\n4.  Drag and drop a Collection View anywhere on\
    \ the view.\n\n5.  Resize the Collection View so it fills the entire screen.\n\
    \n6.  Choose Editor ➤ Resolve Auto Layout Issues ➤ Reset to Suggested Constraints.\
    \ Xcode adds constraints to the Collection View.\n\n7.  Choose File ➤ New ➤ File.\
    \ Xcode displays a list of templates.\n\n8.  Choose Cocoa Touch Class under the\
    \ iOS category and click the **Next** button. Another dialog appears, asking for\
    \ a class name and subclass.\n\n9.  Click in the Class text field and type **itemCell**.\n\
    \n10.  Click in the Subclass of popup menu and choose UICollectionViewCell as\
    \ shown in Figure [16-5](#329781_5_En_16_Chapter.xhtml#Fig5).\n\n![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig5_HTML.jpg](images/329781_5_En_16_Chapter/329781_5_En_16_Fig5_HTML.jpg)\n\
    \nFigure 16-5\n\nCreating a new .swift class file for the Collection View Cell\n\
    \n11.  Click the **Next** button. Xcode asks where to store the file.\n\n12. \
    \ Click the **Create** button. Xcode displays the itemCell.swift file in the Navigator\
    \ pane.\n\n13.  Click the Main.storyboard in the Navigator pane, click the Collection\
    \ View Cell in the Document Outline and choose View ➤ Inspectors ➤ Show Attributes\
    \ Inspector, or click the Attributes Inspector icon in the upper right corner\
    \ of the Xcode window.\n\n14.  Click in the identifier text field, type **customCell**,\
    \ and press ENTER as shown in Figure [16-6](#329781_5_En_16_Chapter.xhtml#Fig6).\n\
    \n![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig6_HTML.jpg](images/329781_5_En_16_Chapter/329781_5_En_16_Fig6_HTML.jpg)\n\
    \nFigure 16-6\n\nDefining the Collection View Cell’s identifier the Attributes\
    \ Inspector pane.\n\n15.  Click in the Background color popup menu and choose\
    \ a color such as yellow. Xcode highlights the Collection View Cell.\n\n16.  Choose\
    \ View ➤ Inspectors ➤ Show Identity Inspector, or click the Identity Inspector\
    \ icon in the upper right corner of the Xcode window.\n\n17.  Click in the Class\
    \ popup menu and choose itemCell as shown in Figure [16-7](#329781_5_En_16_Chapter.xhtml#Fig7).\n\
    \n![../images/329781_5_En_16_Chapter/329781_5_En_16_Fig7_HTML.jpg](images/329781_5_En_16_Chapter/329781_5_En_16_Fig7_HTML.jpg)\n\
    \nFigure 16-7\n\nConnecting the Collection View Cell to the itemCell.swift file\n\
    \n18.  Click the Library icon to open the Object Library window and drag and drop\
    \ a label in the center of the Collection View Cell.\n\n19.  Click the Align icon\
    \ at the bottom of the Xcode window and select the Horizontally in Container and\
    \ Vertically in Container check boxes. Then click the Add 2 Constraints button.\
    \ Xcode adds constraints to make sure the label is centered inside the Collection\
    \ View Cell as shown in Figure [16-8](#329781_5_En_16_Chapter.xhtml#Fig8)."
