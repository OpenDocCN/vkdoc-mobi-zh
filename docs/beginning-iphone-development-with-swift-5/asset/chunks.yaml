    \ window appears, displaying the grouped data in the table view as shown in Figure\
    \ [14-14](#329781_5_En_14_Chapter.xhtml#Fig14).\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig14_HTML.jpg](images/329781_5_En_14_Chapter/329781_5_En_14_Fig14_HTML.jpg)\n\
    \nFigure 14-14\n\nAn index appears on the far right of the table view\n\n9. Click\
    \ the `R` index listing. Notice that the table view jumps to the fourth section\
    \ because the letter `R` is the fourth item in the index.\n\n10. Click the `B`\
    \ index listing. Notice that the table view jumps to the first section because\
    \ the letter `B` is the first item in the index.\n\n11. Click the other two index\
    \ entries (`F` and `M`) to see how the table view jumps to each section.\n\n12.\
    \ Choose Simulator ➤ Quit Simulator to return to `Xcode`.\n\n## Using a Table\
    \ View Controller\n\nThrough this chapter, we’ve created a Single View App project\
    \ and added a table view from the Object Library window. A second way to create\
    \ a table view is to add a Table View Controller to a storyboard. The main difference\
    \ between a table view and a Table View Controller is that the Table View Controller\
    \ consists of the following:\n\n* A View Controller\n* A table view on that View\
    \ Controller\n* A Table View Cell on the table view\n\nTo see how to use a Table\
    \ View Controller, follow these steps:\n\n1. Create a new iOS project using the\
    \ Single View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml)) and\
    \ name this new project `TableViewControllerApp`. This creates a single view for\
    \ the user interface.\n\n2. Click the `Main.storyboard` file in the Navigator\
    \ pane. Xcode displays the single view that automatically appears with every Single\
    \ View App project.\n\n3. Click View Controller Scene in the Document Outline\
    \ as shown in Figure [14-15](#329781_5_En_14_Chapter.xhtml#Fig15).\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig15_HTML.jpg](images/329781_5_En_14_Chapter/329781_5_En_14_Fig15_HTML.jpg)\n\
    \nFigure 14-15\n\nSelecting a View Controller\n\n4. Press the BACKSPACE or DELETE\
    \ key to delete the View Controller from the storyboard. Xcode removes the selected\
    \ View Controller from the storyboard.\n\n5. Click the `ViewController.swift`\
    \ file in the Navigator pane. This `.swift` file was connected to the View Controller\
    \ we just deleted so we don’t need it anymore.\n\n6. Press the BACKSPACE or DELETE\
    \ key to delete the `ViewController.swift` file. A dialog appears, asking if you\
    \ want to remove the file’s reference or move it to the trash as shown in Figure\
    \ [14-16](#329781_5_En_14_Chapter.xhtml#Fig16).\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig16_HTML.jpg](images/329781_5_En_14_Chapter/329781_5_En_14_Fig16_HTML.jpg)\n\
    \nFigure 14-16\n\nDeleting a `.swift` file gives you options\n\n7. Click Move\
    \ to Trash. Xcode deletes the `ViewController.swift` file.\n\n8. Click the Library\
    \ icon to open the Object Library window and look for the yellow Table View Controller\
    \ icon as shown in Figure [14-17](#329781_5_En_14_Chapter.xhtml#Fig17).\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig17_HTML.jpg](images/329781_5_En_14_Chapter/329781_5_En_14_Fig17_HTML.jpg)\n\
    \nFigure 14-17\n\nThe Table View Controller in the Object Library window\n\n9.\
    \ Drag and drop the Table View Controller from the Object Library window to the\
    \ empty storyboard. Xcode displays the Table View Controller as shown in Figure\
    \ [14-18](#329781_5_En_14_Chapter.xhtml#Fig18).\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig18_HTML.jpg](images/329781_5_En_14_Chapter/329781_5_En_14_Fig18_HTML.jpg)\n\
    \nFigure 14-18\n\nThe Table View Controller in the storyboard\n\n10. Choose View\
    \ ➤ Inspectors ➤ Show Attributes Inspector, or click the Attributes Inspector\
    \ icon in the upper right corner of the Xcode window.\n\n11. Select the Is Initial\
    \ View Controller check box as shown in Figure [14-19](#329781_5_En_14_Chapter.xhtml#Fig19).\
    \ Notice that when you select this check box, an arrow appears pointing to the\
    \ left side of the Table View Controller.\n\n**Note** Only one View Controller\
    \ can be designated as the initial View Controller. The initial View Controller\
    \ defines the first View Controller that appears when the app runs.\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig19_HTML.jpg](images/329781_5_En_14_Chapter/329781_5_En_14_Fig19_HTML.jpg)\n\
    \nFigure 14-19\n\nThe Is Initial View Controller check box\n\nNow that we have\
    \ a Table View Controller in the storyboard, we need to connect it to a `.swift`\
    \ file. That involves a two-step process of first creating a `.swift` file and\
    \ then connecting it to the Table View Controller.\n\n1. Choose File ➤ New ➤ File.\
    \ A template dialog appears as shown in Figure [14-20](#329781_5_En_14_Chapter.xhtml#Fig20).\n\
    \n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig20_HTML.jpg](images/329781_5_En_14_Chapter/329781_5_En_14_Fig20_HTML.jpg)\n\
    \nFigure 14-20\n\nThe file template dialog"
