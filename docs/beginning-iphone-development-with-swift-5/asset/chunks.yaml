- fmt: "# Swipe to Add and Delete a Row\n\nTable views can display large amounts of\
    \ data in multiple rows. However, besides viewing data, you might also want to\
    \ be able to add or delete data to a table view. One way to modify a table view\
    \ to add or delete items is to use a left swiping gesture. When the user swipes\
    \ left on a table view row, one or more buttons can appear, letting the user choose\
    \ an option such as adding a new item or deleting the existing item.\n\nTo allow\
    \ a left swiping gesture on a table view row, we need an `editActionsForRowAt`\
    \ function such as:\n\n```\nfunc tableView(_ tableView: UITableView, editActionsForRowAt\
    \ indexPath: IndexPath) -> [UITableViewRowAction]? {\n}\n```\n\nInside this function,\
    \ we can define one or more buttons such as:\n\n```\nlet addAction = UITableViewRowAction(style:\
    \ UITableViewRowAction.Style.normal, title: \"Add\", handler: {(action: UITableViewRowAction,\
    \ indexPath: IndexPath) in\n})\nlet deleteAction = UITableViewRowAction(style:\
    \ UITableViewRowAction.Style.destructive, title: \"Delete\", handler: {(action:\
    \ UITableViewRowAction, indexPath: IndexPath) in\n})\nreturn [deleteAction, addAction]\n\
    ```\n\nThe preceding code defines two buttons labeled “Add” and “Delete”. The\
    \ “Add” button appears with the `.normal` style, which makes it appear light gray.\
    \ The “Delete” button appears with the `.destructive` style so it appears as bright\
    \ red. The last line returns the two `UITableViewRowAction` constants that represent\
    \ the “Add” and “Delete” buttons.\n\nTo see how to add and delete items in a table\
    \ view using a swiping gesture, follow these steps:\n\n1. Create a new iOS project\
    \ using the Single View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml))\
    \ and name this new project EditRowApp. This creates a single view for the user\
    \ interface.\n\n2. Click the `Main.storyboard` file in the Navigator pane. Xcode\
    \ displays the single view.\n\n3. Click the Library icon to open the Object Library\
    \ window.\n\n4. Drag and drop a table view anywhere on the view.\n\n5. Resize\
    \ the table view so it fills the entire screen.\n\n6. Choose Editor ➤ Resolve\
    \ Auto Layout Issues ➤ Reset to Suggested Constraints. Xcode adds constraints\
    \ to the table view.\n\n7. Choose View ➤ Inspectors ➤ Show Attributes Inspector,\
    \ or click the Attributes Inspector icon in the upper right corner of the Xcode\
    \ window.\n\n8. Choose View ➤ Assistant Editor ➤ Show Assistant Editor, or click\
    \ the Assistant Editor icon in the upper right corner of the Xcode window.\n\n\
    9. Move the mouse pointer over the table view, hold down the Control key, and\
    \ Ctrl-drag under the `class ViewController` line in the `ViewController.swift`\
    \ file.\n\n10. Release the Control key and the left mouse button. A popup window\
    \ appears.\n\n11. Click in the Name text field, type `tableView`, and click the\
    \ Connect button. Xcode creates an `IBOutlet` as follows:\n\n    ```\n    @IBOutlet\
    \ var tableView: UITableView!\n    ```\n\n12. Choose View ➤ Standard Editor ➤\
    \ Show Standard Editor, or click the Standard Editor icon in the upper right corner\
    \ of the Xcode window.\n\n13. Click the `ViewController.swift` file in the Navigator\
    \ pane.\n\n14. Modify the `class ViewController` line by adding `UITableViewDelegate`,\
    \ `UITableViewDataSource` as follows:\n\n    ```\n    class ViewController: UIViewController,\
    \ UITableViewDelegate, UITableViewDataSource {\n    ```\n\n    The purpose of\
    \ this code is to identify the `ViewController.swift` file as both the delegate\
    \ and data source for the table view.\n\n15. Underneath the `class ViewController`\
    \ line, add the following array:\n\n    ```\n    var petArray = [\"cat\", \"dog\"\
    , \"parakeet\", \"parrot\", \"canary\", \"finch\", \"tropical fish\", \"goldfish\"\
    , \"sea horses\", \"hamster\", \"gerbil\", \"rabbit\", \"turtle\", \"snake\",\
    \ \"lizard\", \"hermit crab\"]\n    ```\n\n    Notice that this `petArray` is\
    \ declared as `var`, which means we’ll be able to modify it by adding or deleting\
    \ items to this array. If we declared this `petArray` with `let`, then we wouldn’t\
    \ be able to add or delete items from the array.\n\n16. Add the following line\
    \ underneath the `petArray`:\n\n    ```\n    let cellID = \"cellID\"\n    ```"
