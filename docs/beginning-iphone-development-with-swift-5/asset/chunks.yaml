  trans: "\n# 19. 使用页面视图控制器\n\n显示两个或多个视图控制器内容的一种独特方式是通过页面视图控制器，它允许用户向左或向右滑动。每次滑动都会显示不同的视图控制器，就像在电子书中翻阅页面一样。\n\
    \n要使用页面控制器，你需要在故事板中添加一个页面控制器。然后，你可以通过在属性检查器面板中定义以下属性来自定义此页面控制器，如图 19-1 所示：\n\n\
    ![../images/329781_5_En_19_Chapter/329781_5_En_19_Fig1_HTML.jpg](img/329781_5_En_19_Fig1_HTML.jpg)\n\
    \n图 19-1\n\n修改页面控制器的行为\n\n- **导航** – 定义用户需要水平还是垂直滑动以显示上一个或下一个视图\n- **过渡样式** –\
    \ 定义视图是像书页一样卷曲（页面卷曲），还是简单地滑入到位（滚动）\n\n自定义页面控制器的行为后，下一步是创建多个完全独立于故事板的视图控制器（不通过转场连接到任何现有的故事板场景）。为了让这些视图控制器出现在页面控制器中，每个视图控制器都需要一个唯一的\
    \ Storyboard ID，你可以在身份检查器面板中定义它。\n\n最后，你需要创建独立的 `.swift` 文件，并将它们连接到每个视图控制器。此外，你还需要创建一个独立的\
    \ `.swift` 文件并将其连接到页面控制器。总共，你需要两种类型的 `.swift` 文件：\n\n- 一个连接到页面控制器的 `UIPageViewController`\
    \ 类文件\n- 一个连接到每个你想要显示在页面控制器内部的视图控制器的 `UIViewController` 类文件\n\n一旦你在故事板中添加了一个页面控制器和多个未通过转场连接到故事板任何部分的视图控制器，你就可以编写\
    \ Swift 代码来加载这些多个视图控制器。\n\n## 添加和自定义页面控制器\n\n使用页面控制器的第一步是将其添加到你的故事板中。要了解如何在故事板中放置页面控制器，请按照以下步骤操作：\n\
    \n1. 使用单视图应用模板创建一个新的 iOS 项目（参见第 1 章），并将此新项目命名为 `PageControllerApp`。这将为用户界面创建一个单一视图。\n\
    2. 在导航器面板中点击 `Main.storyboard` 文件。Xcode 会显示该单一视图。\n3. 点击库图标以打开对象库窗口。\n4. 从对象库窗口拖放一个页面控制器到故事板，如图\
    \ 19-2 所示。\n\n   ![../images/329781_5_En_19_Chapter/329781_5_En_19_Fig2_HTML.jpg](img/329781_5_En_19_Fig2_HTML.jpg)\n\
    \n   图 19-2\n\n   将页面控制器拖放到故事板上\n\n5. 点击页面控制器顶部的页面视图控制器图标（或文档大纲中的页面视图控制器）。\n6.\
    \ 选择 视图 ➤ 检查器 ➤ 显示属性检查器，或点击 Xcode 窗口右上角的属性检查器图标。\n7. 点击导航弹出菜单并选择水平。\n8. 点击过渡样式弹出菜单并选择页面卷曲。\n\
    9. 选中“是初始视图控制器”复选框。Xcode 现在会在故事板中页面控制器的左侧显示一个箭头。\n\n## 添加视图控制器\n\n页面控制器显示一个或多个视图控制器。为了让每个视图控制器出现在页面控制器内部，每个视图控制器需要：\n\
    \n- 一个唯一的 Storyboard ID（任意文本）\n- 连接到 `.swift` 的 `UIViewController` 文件\n\n为了让我们在查看不同视图控制器时一目了然，我们还需要更改每个视图控制器的背景颜色，但在实际应用中，每个视图控制器会显示不同的信息，例如文本、图片或用户界面设计。\n\
    \n要了解如何向故事板添加视图控制器以在页面控制器中使用，请按照以下步骤操作：\n\n1. 确保 `PageControllerApp` 已加载到 Xcode\
    \ 中。\n2. 在文档大纲中点击视图控制器场景下的视图以将其选中，如图 19-3 所示。\n\n   ![../images/329781_5_En_19_Chapter/329781_5_En_19_Fig3_HTML.jpg](img/329781_5_En_19_Fig3_HTML.jpg)\n\
    \n   图 19-3\n\n   在视图控制器上选择视图\n\n3. 选择 视图 ➤ 检查器 ➤ 显示属性检查器，或点击 Xcode 窗口右上角的属性检查器图标。\n\
    4. 点击背景弹出菜单并选择一种颜色，例如黄色。我们希望页面控制器显示的所有视图控制器都有不同的颜色，以便清楚地看到我们正在查看不同的视图控制器。\n5.\
    \ 点击文档大纲中的视图控制器，或点击视图控制器上方的视图控制器图标。\n6. 选择 视图 ➤ 检查器 ➤ 显示身份检查器，或点击 Xcode 窗口右上角的身份检查器图标。\n\
    7. 点击 Storyboard ID 文本字段，输入 `page01`，然后按回车键，如图 19-4 所示。\n\n   ![../images/329781_5_En_19_Chapter/329781_5_En_19_Fig4_HTML.jpg](img/329781_5_En_19_Fig4_HTML.jpg)\n\
    \n   图 19-4\n\n   每个视图控制器在身份检查器面板中都需要一个唯一的 Storyboard ID\n\n8. 选择 文件 ➤ 新建 ➤ 文件。会弹出一个对话框，显示不同的模板。\n\
    9. 在 iOS 类别下选择 Cocoa Touch Class，然后点击**下一步**按钮。另一个窗口会弹出，让你为文件命名。\n10. 点击类文本字段并输入\
    \ `SecondViewController`。（确保子类弹出菜单显示 `UIViewController`。）\n11. 点击**下一步**按钮，然后点击**创建**按钮。Xcode\
    \ 会在导航器面板中显示 `SecondViewController.swift` 文件。\n12. 重复步骤 8–11，但将此 `.swift` 文件命名为\
    \ `ThirdViewController`。导航器面板现在应显示 `ViewController.swift`、`SecondViewController.swift`\
    \ 和 `ThirdViewController.swift` 文件，如图 19-5 所示。（如果需要，你可以重新排列导航器面板中的文件。）\n\n   \
    \ ![../images/329781_5_En_19_Chapter/329781_5_En_19_Fig5_HTML.jpg](img/329781_5_En_19_Fig5_HTML.jpg)\n\
    \n    图 19-5\n\n    创建三个独立的视图控制器 `.swift` 文件\n\n13. 点击库图标以打开对象库窗口，并从对象库窗口拖放一个视图控制器到故事板。故事板现在应包含一个页面控制器和两个视图控制器。\n\
    14. 点击文档大纲中的视图控制器，或点击视图控制器上方的视图控制器图标。\n15. 选择 视图 ➤ 检查器 ➤ 显示身份检查器，或点击 Xcode 窗口右上角的身份检查器图标。\n\
    16. 点击类弹出菜单并选择 `SecondViewController`。\n17. 点击 Storyboard ID 文本字段，输入 `page02`，然后按回车键，如图\
    \ 19-6 所示。\n\n    ![../images/329781_5_En_19_Chapter/329781_5_En_19_Fig6_HTML.jpg](img/329781_5_En_19_Fig6_HTML.jpg)\n\
    \n    图 19-6\n\n    将第二个视图控制器连接到 `.swift` 类文件并为其指定 Storyboard ID\n"
- fmt: "18.  Click the `View` of the second `View Controller` in the Document Outline,\
    \ or click in the middle of the second `View Controller`.\n\n19.  Choose `View`\
    \ ➤ `Inspectors` ➤ `Show Attributes Inspector`, or click the `Attributes Inspector`\
    \ icon in the upper right corner of the Xcode window.\n\n20.  Click in the `Background`\
    \ popup menu and choose a color such as orange.\n\n21.  Click the `Library` icon\
    \ to open the `Object Library` window and drag and drop a `View Controller` from\
    \ the `Object Library` window to the storyboard. The storyboard should now contain\
    \ a `Page Controller` and three `View Controllers`.\n\n22.  Click the `View Controller`\
    \ in the Document Outline or click the `View Controller` icon above the `View\
    \ Controller`.\n\n23.  Choose `View` ➤ `Inspectors` ➤ `Show Identity Inspector`,\
    \ or click the `Identity Inspector` icon in the upper right corner of the Xcode\
    \ window.\n\n24.  Click in the `Class` popup menu and choose `ThirdViewController`.\n\
    \n25.  Click in the `Storyboard ID` text field, type `page03`, and press `ENTER`.\n\
    \n26.  Click the `View` of the third `View Controller` in the Document Outline,\
    \ or click in the middle of the third `View Controller`.\n\n27.  Choose `View`\
    \ ➤ `Inspectors` ➤ `Show Attributes Inspector`, or click the `Attributes Inspector`\
    \ icon in the upper right corner of the Xcode window.\n\n28.  Click the `Background`\
    \ popup menu and choose a color such as cyan. The storyboard should contain a\
    \ `Page Controller` and three `View Controllers` where each `View Controller`\
    \ has a different background color as shown in Figure [19-7](#329781_5_En_19_Chapter.xhtml#Fig7).\n\
    \n![../images/329781_5_En_19_Chapter/329781_5_En_19_Fig7_HTML.jpg](images/329781_5_En_19_Chapter/329781_5_En_19_Fig7_HTML.jpg)\n\
    \nFigure 19-7\n\nThe storyboard with one `Page Controller` and three `View Controllers`\n\
    \n## Making View Controllers Appear in a Page Controller\n\nTo make multiple `View\
    \ Controllers` appear inside a `Page Controller`, you must first connect the `Page\
    \ Controller` to a `.swift` `UIPageController` class file. Then within this `UIPageController`\
    \ `.swift` file, you need to write Swift code to do the following:\n\n*   Define\
    \ an array to hold all the `View Controllers` to display inside the `Page Controller`.\n\
    \n*   Write a `viewControllerBefore` method to define which `View Controller`\
    \ to display when the user swipes to open the previous view.\n\n*   Write a `viewControllerAfter`\
    \ method to define which `View Controller` to display when the user swipes to\
    \ open the next view.\n\nTo see how to write Swift code to make a `Page Controller`\
    \ work, follow these steps:\n\n1.  Make sure the `PageControllerApp` is loaded\
    \ into Xcode.\n\n2.  Choose `File` ➤ `New` ➤ `File`. A dialog appears displaying\
    \ different templates available.\n\n3.  Click `Cocoa Touch Class` under the iOS\
    \ category and click the **Next** button. Another window appears, asking for a\
    \ class name and subclass type.\n\n4.  Click in the `Class` text field and type\
    \ `PageViewController`.\n\n5.  Click in the `Subclass of` popup menu and choose\
    \ `UIPageViewController` as shown in Figure [19-8](#329781_5_En_19_Chapter.xhtml#Fig8).\n\
    \n![../images/329781_5_En_19_Chapter/329781_5_En_19_Fig8_HTML.jpg](images/329781_5_En_19_Chapter/329781_5_En_19_Fig8_HTML.jpg)\n\
    \nFigure 19-8\n\nCreating a `UIPageViewController` `.swift` class file\n\n6. \
    \ Click the **Next** button and then click the **Create** button. Xcode displays\
    \ the `PageViewController.swift` file in the Navigator pane.\n\n7.  Click the\
    \ `Main.storyboard` file in the Navigator pane. Xcode displays the storyboard.\n\
    \n8.  Click `Page View Controller` in the Document Outline, or click the `Page\
    \ View Controller` icon at the top of the `Page Controller` as shown in Figure\
    \ [19-9](#329781_5_En_19_Chapter.xhtml#Fig9).\n\n![../images/329781_5_En_19_Chapter/329781_5_En_19_Fig9_HTML.jpg](images/329781_5_En_19_Chapter/329781_5_En_19_Fig9_HTML.jpg)\n\
    \nFigure 19-9\n\nSelecting the `Page View Controller`\n\n9.  Choose `View` ➤ `Inspectors`\
    \ ➤ `Show Identity Inspector`, or click the `Identity Inspector` icon at the top\
    \ right corner of the Xcode window.\n\n10.  Click in the `Class` popup menu and\
    \ choose `PageViewController` as shown in Figure [19-10](#329781_5_En_19_Chapter.xhtml#Fig10).\n\
    \n![../images/329781_5_En_19_Chapter/329781_5_En_19_Fig10_HTML.jpg](images/329781_5_En_19_Chapter/329781_5_En_19_Fig10_HTML.jpg)\n\
    \nFigure 19-10\n\nConnecting the `Page Controller` to the `PageViewController.swift`\
    \ file\n\n11.  Click the `PageViewController.swift` file in the Navigator pane.\n\
    \n12.  Edit the `class PageViewController` line as follows:\n\n```\n    class\
    \ PageViewController: UIPageViewController, UIPageViewControllerDataSource {\n\
    ```\n\n13.  Under the `class PageViewController` line, add the following line\
    \ that declares an array of `UIViewControllers`:\n\n```\n    var controllerArray:\
    \ [UIViewController]? = nil\n```\n\n14.  Modify the `viewDidLoad` method as follows:\n\
    \n```\n    override func viewDidLoad() {\n    super.viewDidLoad()\n    dataSource\
    \ = self\n    let storyBoard = UIStoryboard(name: \"Main\", bundle: nil)\n   \
    \ let firstVC = storyBoard.instantiateViewController(withIdentifier: \"page01\"\
    )\n    let secondVC = storyBoard.instantiateViewController(withIdentifier: \"\
    page02\")\n    let thirdVC = storyBoard.instantiateViewController(withIdentifier:\
    \ \"page03\")\n    controllerArray = [firstVC, secondVC, thirdVC]\n    self.setViewControllers([controllerArray![0]],\
    \ direction: UIPageViewController.NavigationDirection.forward, animated: true,\
    \ completion: nil)\n    }\n```\n\nThe first line defines the `PageViewController.swift`\
    \ file as the data source for the `Page Controller`. The next line creates a storyboard\
    \ constant named `Main`. The next three lines define constants (`firstVC`, `secondVC`,\
    \ and `thirdVC`) to represent each `View Controller` to appear inside the `Page\
    \ Controller`. Notice that each `View Controller` uses the `Storyboard ID` of\
    \ each `View Controller` to identify it such as `page01` or `page03`.\n\nNext,\
    \ we store all of these `View Controllers` into the `controllerArray`. Finally,\
    \ we set this array of `View Controllers` inside the `Page Controller`.\n\n15.\
    \  Add the following function to define the `View Controller` to appear when the\
    \ user displays the previous `View Controller`:\n\n```\n    func pageViewController(_\
    \ pageViewController: UIPageViewController, viewControllerBefore viewController:\
    \ UIViewController) -> UIViewController? {\n    guard let vcIndex = controllerArray!.firstIndex(of:\
    \ viewController) else {\n    return nil\n    }\n    let preIndex = vcIndex -\
    \ 1\n    guard preIndex >= 0 else {\n    return controllerArray!.last // loops\
    \ back to end\n    }\n    guard controllerArray!.count > preIndex else {\n   \
    \ return nil\n    }\n    return controllerArray![preIndex]\n    }\n```\n\nThe\
    \ first `guard` statement checks to make sure that the controller array contains\
    \ valid `View Controllers`. Then it creates a `preIndex` constant to represent\
    \ the previous `View Controller`. As long as the value of `preIndex` is greater\
    \ than 0, the `Page Controller` can display the previous `View Controller` in\
    \ the array. The moment the value of `preIndex` equals 0 or less, then the next\
    \ `View Controller` displayed is the last one. This creates an infinite loop so\
    \ the first `View Controller` displayed links to the last `View Controller` in\
    \ the array.\n\nThe last `guard` statement makes sure that the total number of\
    \ `View Controllers` in the array is greater than the value of `preIndex`. Finally\
    \ this function returns the previous `View Controller` in the array.\n\n16.  Add\
    \ the following function to define the `View Controller` to appear when the user\
    \ displays the next `View Controller`:\n\n```\n    func pageViewController(_ pageViewController:\
    \ UIPageViewController, viewControllerAfter viewController: UIViewController)\
    \ -> UIViewController? {\n    guard let vcIndex = controllerArray!.firstIndex(of:\
    \ viewController) else {\n    return nil\n    }\n    let nextIndex = vcIndex +\
    \ 1\n    guard controllerArray!.count != nextIndex else {\n    return controllerArray!.first\
    \ // loops back to beginning\n    }\n    guard controllerArray!.count > nextIndex\
    \ else {\n    return nil\n    }\n    return controllerArray![nextIndex]\n    }\n\
    ```\n\nThe entire `PageViewController.swift` file should look like this:"
