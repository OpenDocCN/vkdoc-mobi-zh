  trans: "\n### 检测平移手势\n\n当用户将手指按在屏幕上并保持按下状态进行移动时，即触发平移手势。这种操作类似于在 Macintosh 电脑上拖动鼠标，你可以定义触发平移手势所需的最小和最大手指数量，例如至少两根手指但不超过四根。\n\
    \n平移手势会追踪**速度**和**位移**两个参数：速度用于衡量平移的快慢，而位移则衡量手指移动的距离。\n\n要了解如何使用平移手势，请按照以下步骤操作：\n\
    \n1.  使用单视图应用模板创建一个新的 iOS 项目（参见第 1 章），并将新项目命名为 `PanApp`。这将为用户界面创建一个单视图。\n\n2.\
    \  在导航面板中点击 `Main.storyboard` 文件，Xcode 将显示该单视图。\n\n3.  点击库图标以打开对象库窗口，并找到如图 11-13\
    \ 所示的平移手势识别器。\n\n    ![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig13_HTML.jpg](img/329781_5_En_11_Fig13_HTML.jpg)\n\
    \n    图 11-13\n\n    对象库窗口中的平移手势识别器\n\n4.  将平移手势识别器拖放到视图上。Xcode 会在文档大纲中和视图控制器上方显示该手势识别器。\n\
    \n5.  点击库图标打开对象库窗口，将一个图像视图拖放到用户界面的中心位置。\n\n6.  选择“视图” ➤ “检查器” ➤ “显示属性检查器”，或点击\
    \ Xcode 窗口右上角的属性检查器图标。\n\n7.  点击“背景”弹出菜单，选择一种颜色，例如绿色或蓝色。这将使你在模拟器中运行应用时更容易找到该图像视图。如果没有设置背景色，图像视图默认的白色背景会与视图的白色背景融为一体。\n\
    \n8.  勾选“启用用户交互”复选框。这允许图像视图响应用户操作。\n\n9.  点击 Xcode 中间面板底部的“对齐”图标。将出现一个窗口。\n\n\
    10. 勾选“水平居中在容器中”和“垂直居中在容器中”复选框，然后点击“添加 2 个约束”按钮（见图 11-10）。图像视图需要居中放置，以便在模拟器中更容易模拟捏合手势。\n\
    \n11. 选择“编辑器” ➤ “解决自动布局问题” ➤ 在子菜单的上半部分点击“添加缺少的约束”。Xcode 会为图像视图添加额外的约束。\n\n12.\
    \ 将鼠标指针移到图像视图上，按住 Control 键，然后从图像视图向文档大纲或视图控制器顶部的平移手势识别器图标进行 Ctrl-拖拽。\n\n13. 松开\
    \ Control 键和鼠标左键。会出现一个窗口。\n\n14. 选择 `gestureRecognizers`。这个连接可以让图像视图检测平移手势。\n\n\
    15. 选择“视图” ➤ “辅助编辑器” ➤ “显示辅助编辑器”，或点击辅助编辑器图标。Xcode 会并排显示 `Main.storyboard` 和 `ViewController.swift`\
    \ 文件。\n\n16. 将鼠标指针移到图像视图上，按住 Control 键，然后从图像视图向 `ViewController.swift` 文件中 `class\
    \ ViewController` 行下方进行 Ctrl-拖拽。\n\n17. 松开 Control 键和鼠标左键。会弹出一个窗口。\n\n18. 点击“名称\
    \ (Name)”文本字段，输入 `topImageView`，然后点击“连接 (Connect)”按钮。Xcode 会创建一个如下所示的 IBOutlet\
    \ 变量：\n\n    ```swift\n    @IBOutlet var topImageView: UIImageView!\n    ```\n\
    \n19. 在 IBOutlet 下方添加以下两行代码：\n\n    ```swift\n    var xOrigin:CGFloat = 0\n  \
    \  var yOrigin:CGFloat = 0\n    ```\n\n    请注意，这两个变量被定义为 `CGFloat` 数据类型，该类型用于测量距离。如果没有显式将两个变量定义为\
    \ `CGFloat`，Xcode 会假定这两个变量仅用于存储整数。\n\n20. 按如下方式编辑 `viewDidLoad` 方法：\n"
- fmt: "```swift\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    xOrigin\
    \ = topImageView.center.x\n    yOrigin = topImageView.center.y\n    // Do any\
    \ additional setup after loading the view, typically from a nib.\n}\n```\n\n21.\
    \ Move the mouse pointer over the Pan Gesture Recognizer icon in the Document\
    \ Outline or at the top of the View Controller, hold down the Control key, and\
    \ Ctrl-drag from the Pan Gesture Recognizer above the last curly bracket in the\
    \ `ViewController.swift` file.\n22. Release the Control key and the left mouse\
    \ button. A popup window appears.\n23. Click in the Name text field, type `panDetected`,\
    \ click in the Type popup menu and choose `UIPanGestureRecognizer`, and click\
    \ the Connect button. Xcode creates an IBAction method.\n24. Edit the `panDetected`\
    \ IBAction method as follows:\n\n```swift\n@IBAction func panDetected(_ sender:\
    \ UIPanGestureRecognizer) {\n    let translation = sender.translation(in: view)\n\
    \    topImageView.center = CGPoint(x: xOrigin + translation.x, y: yOrigin + translation.y)\n\
    }\n```\n\nThe `panDetected` IBAction method captures the translation distance\
    \ that the user’s fingertip moved. Then it adds these distances to the image view’s\
    \ center. The entire `ViewController.swift` file should look like this:\n\n```swift\n\
    import UIKit\nclass ViewController: UIViewController {\n    @IBOutlet var topImageView:\
    \ UIImageView!\n    var xOrigin:CGFloat = 0\n    var yOrigin:CGFloat = 0\n   \
    \ override func viewDidLoad() {\n        super.viewDidLoad()\n        xOrigin\
    \ = topImageView.center.x\n        yOrigin = topImageView.center.y\n        //\
    \ Do any additional setup after loading the view, typically from a nib.\n    }\n\
    \    @IBAction func panDetected(_ sender: UIPanGestureRecognizer) {\n        let\
    \ translation = sender.translation(in: view)\n        topImageView.center = CGPoint(x:\
    \ xOrigin + translation.x, y: yOrigin + translation.y)\n    }\n}\n```\n\n25. Choose\
    \ View ➤ Standard Editor ➤ Show Standard Editor, or click the Standard Editor\
    \ icon in the upper right corner of the Xcode window.\n26. Click the Run button\
    \ or choose Product ➤ Run. The Simulator window appears.\n27. Hold down the left\
    \ mouse button and move the mouse to simulate a pan gesture. Notice that as the\
    \ pan gesture changes, the image view also moves.\n28. Choose Simulator ➤ Quit\
    \ Simulator to return to Xcode.\n\nThis example defined the pan gesture visually\
    \ by dragging the Pan Gesture Recognizer from the Object Library. Now let’s see\
    \ how to duplicate this process through Swift code alone.\n\n1. Create a new iOS\
    \ project using the Single View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml))\
    \ and name this new project `PanCodeApp`. This creates a single view for the user\
    \ interface.\n2. Click the `Main.storyboard` file in the Navigator pane. Xcode\
    \ displays the single view.\n3. Click the Library icon to open the Object Library\
    \ window and drag and drop an image view in the center of the user interface.\n\
    4. Click the Align icon in the bottom of the middle Xcode pane. A window appears.\n\
    5. Select the Horizontally in Container and Vertically in Container check boxes\
    \ and then click the Add 2 Constraints button (see Figure [11-10](#329781_5_En_11_Chapter.xhtml#Fig10)).\
    \ The image view needs to be in the center to make it easy to mimic pinching gestures\
    \ in the Simulator.\n6. Choose Editor ➤ Resolve Auto Layout Issues ➤ Add Missing\
    \ Constraints in the top half of the submenu. Xcode adds additional constraints\
    \ to the image view.\n7. Choose View ➤ Assistant Editor ➤ Show Assistant Editor,\
    \ or click the Assistant Editor icon. Xcode displays the `Main.storyboard` and\
    \ `ViewController.swift` file side by side.\n8. Move the mouse pointer over the\
    \ image view, hold down the Control key, and Ctrl-drag from the image view to\
    \ the `ViewController.swift` file underneath the `class ViewController` line.\n\
    9. Release the Control key and the left mouse button. A popup window appears.\n\
    10. Click in the Name text field, type `topImageView`, and click the Connect button.\
    \ Xcode creates an IBOutlet variable as follows:\n\n```swift\n@IBOutlet var topImageView:\
    \ UIImageView!\n```\n\n1. Choose View ➤ Standard Editor ➤ Show Standard Editor,\
    \ or click the Standard Editor icon in the upper right corner of the Xcode window.\n\
    2. Click the `ViewController.swift` file in the Navigator pane.\n3. Add the following\
    \ lines underneath the IBOutlet:\n\n```swift\nvar panMe: UIPanGestureRecognizer?\n\
    var xOrigin:CGFloat = 0\nvar yOrigin:CGFloat = 0\n```\n\nThis defines a global\
    \ variable that represents the rotation gesture along with defining two `CGFloat`\
    \ variables.\n\n4. Edit the `viewDidLoad` method as follows:\n\n```swift\noverride\
    \ func viewDidLoad() {\n    super.viewDidLoad()\n    xOrigin = topImageView.center.x\n\
    \    yOrigin = topImageView.center.y\n    topImageView.isUserInteractionEnabled\
    \ = true\n    topImageView.backgroundColor = UIColor.green\n    let panGesture\
    \ = UIPanGestureRecognizer(target: self, action: #selector(handlePan))\n    topImageView.addGestureRecognizer(panGesture)\n\
    \    panMe = panGesture\n    // Do any additional setup after loading the view,\
    \ typically from a nib.\n}\n```\n\nThis code stores the image view’s center points\
