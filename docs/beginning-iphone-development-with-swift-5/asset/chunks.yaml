    \n25.  点击`Storyboard ID`文本字段，输入`page03`，然后按`ENTER`键。\n\n26.  在文档大纲中点击第三个`View\
    \ Controller`的`View`，或点击第三个`View Controller`的中间区域。\n\n27.  选择`View` ➤ `Inspectors`\
