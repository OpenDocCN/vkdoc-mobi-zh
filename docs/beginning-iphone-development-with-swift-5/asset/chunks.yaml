    , \"lizard\", \"parrot\", \"goldfish\"]\n    componentTwo = [\"house\", \"apartment\"\
    , \"condo\", \"RV\"]\n    componentThree = [\"indoor\", \"outdoor\"]\n    // Do\
    \ any additional setup after loading the view, typically from a nib.\n    }\n\
    \    ```\n\nThese lines of code declare the ViewController.swift file to be both\
    \ the delegate and data source for the Picker View. Then it defines three arrays\
    \ of strings that will appear in each component of the Picker View.\n\n13.  Underneath\
    \ the viewDidLoad method, add the following function to define how many components\
