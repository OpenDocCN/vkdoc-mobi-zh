  trans: "\n图 5-14. 识别 Storyboard 模拟的 iOS 设备\n\n12.  查看 Xcode 窗口左上角，找到模拟器将模拟的 iOS\
    \ 设备，如图 5-15 所示。\n\n![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig15_HTML.jpg](img/329781_5_En_5_Fig15_HTML.jpg)\n\
    图 5-15. 识别模拟器模拟的 iOS 设备\n\n13.  确保模拟器的 iOS 设备与 storyboard 的 iOS 设备匹配。如果不匹配，请点击模拟器当前模拟的\
    \ iOS 设备，弹出菜单。然后点击与 storyboard iOS 设备匹配的 iOS 设备（例如图 5-14 中的 iPhone 8）。\n14.  点击\
    \ `Run` 按钮或选择 `Product` ➤ `Run`。模拟器出现，显示白色控制器及其按钮。\n15.  点击白色视图中的按钮。彩色控制器视图出现。\n\
    16.  点击彩色视图中的按钮。白色控制器视图再次出现。重复步骤 15 和 16，查看按钮和 Segue 如何让您从一个视图切换到另一个视图。\n17. \
    \ 选择 `Simulator` ➤ `Quit Simulator` 返回 Xcode。\n\n## 嵌入导航控制器\n\n手动将两个控制器连接起来是可行的，但创建起来可能比较笨拙。作为替代方案，您可以使用导航控制器。导航控制器包含其他控制器，并负责让用户在两个控制器之间来回导航。这样，您无需在两个控制器上都添加按钮来让用户来回切换。\n\
    \n如果您已经在 storyboard 中有两个或更多控制器，可以将它们嵌入到导航控制器中。要了解如何将现有控制器嵌入到导航控制器中，请按照以下步骤操作：\n\
    \n1.  确保 MySecondApp 项目已在 Xcode 中加载。\n2.  在导航器窗格中点击 `Main.storyboard` 文件。\n3.\
    \  在文档大纲中点击第一个视图控制器场景（背景为白色的那个）以将其选中，如图 5-16 所示。\n\n    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig16_HTML.jpg](img/329781_5_En_5_Fig16_HTML.jpg)\n\
    \    图 5-16. 在文档大纲中选择第一个视图控制器\n\n4.  选择 `Editor` ➤ `Embed In` ➤ `Navigation Controller`。Xcode\
    \ 在 storyboard 中显示一个导航控制器，如图 5-17 所示。\n\n    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig17_HTML.jpg](img/329781_5_En_5_Fig17_HTML.jpg)\n\
    \    图 5-17. 将现有控制器嵌入到导航控制器中\n\n5.  点击 `Run` 按钮或选择 `Product` ➤ `Run`。模拟器出现，显示带有按钮的第一个（白色）控制器。\n\
    6.  点击按钮。注意，第二个（彩色）控制器滑入视图，并在左上角显示一个 `< Back` 按钮，如图 5-18 所示。\n\n    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig18_HTML.jpg](img/329781_5_En_5_Fig18_HTML.jpg)\n\
    \    图 5-18. 导航控制器显示一个 `< Back` 按钮，用于返回上一个视图\n\n7.  点击左上角的 `< Back` 按钮。注意，第一个（白色）控制器再次出现。重复步骤\
    \ 6 和 7，查看导航控制器如何让您前进到彩色控制器，再返回到白色控制器。\n8.  选择 `Simulator` ➤ `Quit Simulator`\
    \ 返回 Xcode。\n\n## 使用导航控制器\n\n从 Editor 菜单中选择 `Embed In` 命令是向 storyboard 添加导航控制器的一种方法。第二种方法是从对象库窗口中添加导航控制器。当您从对象库添加导航控制器时，还会添加一个表视图控制器，您需要将其删除。然后，您需要将导航控制器连接到现有控制器，并确保导航控制器是初始视图控制器。\n\
    \n要了解如何从对象库添加导航控制器，请按照以下步骤操作：\n\n1.  确保 MySecondApp 项目已在 Xcode 中加载。\n2.  在导航器窗格中点击\
    \ `Main.storyboard` 文件。\n3.  在文档大纲中点击导航控制器场景，然后按 `BACKSPACE` 或 `DELETE` 键，从 storyboard\
    \ 中删除现有的导航控制器。\n4.  点击库图标以打开对象库窗口。\n5.  将一个导航控制器拖放到 storyboard 上。这将会包含一个导航控制器和一个表视图控制器，如图\
    \ 5-19 所示。\n\n    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig19_HTML.jpg](img/329781_5_En_5_Fig19_HTML.jpg)\n\
    \    图 5-19. 从对象库窗口添加导航控制器\n\n6.  在文档大纲中点击根视图控制器场景，然后按 `BACKSPACE` 或 `DELETE`\
    \ 删除当前链接到导航控制器的控制器。\n7.  在文档大纲中点击导航控制器场景以将其选中。\n8.  选择 `View` ➤ `Inspectors` ➤\
    \ `Show Attributes Inspector`，或点击检查器窗格顶部的属性检查器图标。\n9.  选中 `Is Initial View Controller`\
    \ 复选框。这会使导航控制器成为应用运行时首先出现的控制器。\n10. 将鼠标指针移动到导航控制器的中间，按住 `Control` 键，然后 Ctrl-拖拽到背景为白色的控制器中间，如图\
    \ 5-20 所示。\n\n    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig20_HTML.jpg](img/329781_5_En_5_Fig20_HTML.jpg)\n\
    \    图 5-20. 将导航控制器连接到现有控制器\n\n11. 松开 `Control` 键和鼠标左键。出现一个弹出菜单，如图 5-21 所示。\n\n\
    \    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig21_HTML.jpg](img/329781_5_En_5_Fig21_HTML.jpg)\n\
    \    图 5-21. 出现一个弹出菜单，用于定义导航控制器与其他控制器之间的 Segue\n\n12. 在 `Relationship Segue` 分类下选择\
    \ `root View Controller`。\n13. 点击 `Run` 按钮或选择 `Product` ➤ `Run`。第一个视图（白色背景）出现在模拟器中。\n\
    14. 点击视图上的按钮。第二个控制器（彩色背景）出现。注意，导航控制器现在在左上角显示 `< Back` 按钮。\n15. 点击 `< Back` 按钮返回第一个控制器。重复步骤\
    \ 14 和 15，查看如何在两个不同视图之间来回移动。\n16. 选择 `Simulator` ➤ `Quit Simulator`。\n\n## 总结\n\
    \n最简单的 iOS 应用仅包含单个视图，但大多数应用可能需要多个视图。当 storyboard 中有多个控制器时，必须指定一个控制器作为初始视图控制器，这是应用运行时最先出现的控制器。一次只能有一个控制器作为初始视图控制器。\n\
    \n要更改在任意给定时间显示哪个控制器，可以在控制器之间创建称为 Segue 的链接。要创建 Segue，您可以按住 `Control` 键从按钮等对象拖拽鼠标到另一个控制器。但是，手动创建\
    \ Segue 可能很繁琐，因此另一种替代方案是使用导航控制器。\n\n导航控制器包含或嵌入其他控制器。这样，其他控制器可以专注于显示信息，而导航控制器则专注于为用户提供返回上一个控制器的方式。\n"
- fmt: '# 6. Adding User Interface Objects


    Controllers contain the user interface that appears on an iOS screen. At the simplest
    level, a controller can contain a view, which represents an iOS screen. By default,
    this view is blank, so to make it display information or provide interaction to
    the user, you can add a variety of user interface objects such as buttons, text
    fields, labels, or sliders.


    User interface objects typically perform two different tasks. One, they either
    display information or allow the user to type or input information. Common types
    of user interface objects that display or allow input include text fields and
    labels.


    Two, they provide a way for the user to interact with the user interface to give
    commands. Examples of interactive user interface objects include buttons, sliders,
    and switches.


    To place an object on the user interface, you must open the Object Library window
    and drag and drop an object. Then you’ll need to connect most objects to a `.swift`
    file through `IBOutlet` properties or `IBAction` methods. No matter what type
    of object you add to a user interface, you’ll need to adjust the following:


    - Size

    - Position

    - Other attributes such as color, text displayed, etc.


    Every user interface object offers multiple properties you can modify, but you’ll
    likely not need to modify all of them. You can modify an object’s properties either
    through the Inspector pane or through Swift code.


    ## Changing the Size and Position of Objects


    After placing an object on the user interface, you can change its size or position
    using the mouse or by defining specific values for its height and width or its
    X and Y values measured from the upper left corner of the view as shown in Figure
    6-1.


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig1_HTML.png](images/329781_5_En_6_Chapter/329781_5_En_6_Fig1_HTML.png)


    Figure 6-1 Measuring the X and Y position of an object from the upper left corner


    By using the mouse, you can change an object’s size or position easily, but defining
    specific values for an object’s height, width, X, and Y values gives you precise
    control over that object’s size and position.


    To see how to change the size and position of an object on a user interface, follow
    these steps:


    1. Create a new iOS project using the Single View App template (see Chapter 1)
    and name this new project `ObjectApp`. This creates a single view for the user
    interface.


    2. Click the `Main.storyboard` file in the Navigator pane. Xcode displays the
    single view.


    3. Make sure the "View as:" text at the bottom of the Xcode middle pane displays
    an iPhone 8 as shown in Figure 6-2.


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig2_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig2_HTML.jpg)


    Figure 6-2 Defining your storyboard user interface to mimic the iPhone 8 screen


    4. Click the Library icon to open the Object Library window.


    5. Drag and drop a button anywhere on the view. Handles appear around the button
    as shown in Figure 6-3. Any time you select an object, handles appear around to
    show which objects you''ve selected.


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig3_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig3_HTML.jpg)


    Figure 6-3 Handles appear around a selected object


    6. Move the mouse pointer over the handles around the button until the mouse pointer
    turns into a two-way pointing arrow.


    7. Drag the mouse to resize the button by making it wider or narrower, taller
    or shorter. As you change the size of an object, Xcode displays its current width
    and height in the upper left corner of that object as shown in Figure 6-4.


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig4_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig4_HTML.jpg)


    Figure 6-4 Viewing the height and width of an object while dragging the mouse


    8. Make sure handles still appear around your button. (If not, click the button
    to select it.)


    9. Choose View ➤ Inspectors ➤ Size Inspector, or click the Size Inspector icon
    at the top of the Inspector pane. The View category in the Size Inspector pane
    displays text fields for specifying the height, width, X, and Y values of the
    selected object as shown in Figure 6-5.


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig5_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig5_HTML.jpg)


    Figure 6-5 The View category lets you define size and position values in the Size
    Inspector pane


    10. Click in the Width text field, type 80, and press ENTER.


    11. Click in the Height text field, type 30, and press ENTER.


    12. Move the mouse pointer over the button. As soon as the mouse pointer turns
    into a hand icon, drag the button to the upper left corner of the view until you
    see two blue guidelines appear as shown in Figure 6-6.


    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig6_HTML.jpg](images/329781_5_En_6_Chapter/329781_5_En_6_Fig6_HTML.jpg)


    Figure 6-6 Guidelines appear to help you align objects using the mouse


    13. Release the mouse button. Notice that the blue guidelines disappear after
    you stop moving the mouse.


    14. Click the up/down arrows in the X text field to change the value displayed
    within. Notice that as you increase the X value, the button moves further to the
    right, and when you decrease the X value, the button moves further to the left.


    15. Make sure a value of 16 appears in the X text field and then click in the
    Y text field.


    16. Click the up/down arrows in the Y text field. Notice that as you increase
    the Y value, the button moves further down, and when you decrease the Y value,
    the button moves further up.


    17. Make sure a value of 20 appears in the Y text field. Notice that when you
    define specific X or Y values to define the button''s position on the view, no
    blue guidelines appear because they only appear when you''re moving an object
    using the mouse.'
