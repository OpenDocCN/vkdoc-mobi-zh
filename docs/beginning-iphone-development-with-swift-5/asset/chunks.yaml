  trans: "\n# 注意\n\n1x 图像出现在旧款 iOS 设备屏幕上。2x 图像出现在 Retina 显示屏上。3x 图标图像则用于 iPhone X\
    \ 及更新机型的 Retina Display HD 显示屏。\n\n1. 在导航窗格中点击 `Main.storyboard` 文件。\n2. 在文档大纲中点击\
    \ `Item`，如图 18-12 所示。\n   ![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig12_HTML.jpg](img/329781_5_En_18_Fig12_HTML.jpg)\n\
    \   **图 18-12** 在视图控制器上选中标签栏\n3. 选择 `View ➤ Inspectors ➤ Show Attributes Inspector`，或点击\
    \ Xcode 窗口右上角的 `Attributes Inspector` 图标。\n4. 在 `Bar Item` 分类下点击 `Image` 弹出菜单，并选择\
    \ `First`，如图 18-13 所示。\n   ![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig13_HTML.jpg](img/329781_5_En_18_Fig13_HTML.jpg)\n\
    \   **图 18-13** 为标签栏图标选择一个图像集\n5. 点击 `Title` 文本字段，删除“Item”文本，输入视图控制器的颜色（例如 yellow），然后按\
    \ ENTER 键。注意标签栏现在显示了你选择的图标和文本。\n6. 对另一个标签栏项重复步骤 11–14，但将其 `Image` 选择为 `Second`，并在\
    \ `Title` 中输入不同的颜色。\n7. 点击 `Run` 按钮或选择 `Product ➤ Run`。模拟器窗口出现，显示标签栏上的两个图标，如图\
    \ 18-14 所示。\n   ![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig14_HTML.jpg](img/329781_5_En_18_Fig14_HTML.jpg)\n\
    \   **图 18-14** 显示自定义文本和图标的标签栏\n8. 点击第二个标签。注意该标签对应的第二个视图控制器出现。\n9. 点击第一个标签。注意该标签对应的第一个视图控制器出现。\n\
    10. 选择 `Simulator ➤ Quit Simulator` 以返回 Xcode。\n\n## 从标签栏控制器中删除视图控制器\n\n你可以将多个视图控制器连接到标签栏控制器。然而，如果之后你想断开某个视图控制器与标签栏控制器的连接，有两个选项：\n\
    - 删除视图控制器及其与标签栏控制器的转场（segue）。\n- 仅删除与标签栏控制器之间的转场，但保留视图控制器。\n\n删除视图控制器会同时删除它与标签栏控制器的转场以及视图控制器本身，但这意味着你也会丢失存储在该视图控制器上的所有内容，例如按钮、文本字段和标签。另一种选择是仅删除转场而保留视图控制器。\n\
    \n要同时从标签栏控制器删除视图控制器及其转场，请按以下步骤操作：\n1. 在导航窗格中点击 `Main.storyboard`。\n2. 在文档大纲中点击代表你想删除并从标签栏控制器断开的视图控制器的\
    \ `Item Scene`，如图 18-15 所示。\n   ![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig15_HTML.jpg](img/329781_5_En_18_Fig15_HTML.jpg)\n\
    \   **图 18-15** 选中一个 Item Scene 以从标签栏控制器中删除\n3. 按 BACKSPACE 或 DELETE 键。Xcode 会移除选中的视图控制器及其与标签栏控制器之间的转场。\n\
    \n### 注意\n如果在删除转场和/或其连接的视图控制器时操作有误，请选择 `Edit ➤ Undo` 或按 `Command + Z` 来撤销删除命令。\n\
    \n有时你可能不想删除视图控制器，而只是希望将其与标签栏控制器断开连接。要断开视图控制器与标签栏控制器的转场同时保留视图控制器，请按以下步骤操作：\n1.\
    \ 在导航窗格中点击 `Main.storyboard`。\n2. 在文档大纲中的 `Tab Bar Controller Scene` 下点击一个 `Relationship`\
    \ 图标，如图 18-16 所示。\n   ![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig16_HTML.jpg](img/329781_5_En_18_Fig16_HTML.jpg)\n\
    \   **图 18-16** 在文档大纲中选择一个转场\n3. 按 BACKSPACE 或 DELETE 键。Xcode 会移除与标签栏控制器的转场，但会在\
    \ storyboard 中保留该视图控制器。\n"
- fmt: "# Creating a Tool Bar\n\nSimilar to Tab Bar Controller is a Tool Bar. While\
    \ a Tab Bar Controller is designed to display icons at the bottom of the screen\
    \ that represent different views users can open, a Tool Bar is meant to display\
    \ icons that represent different commands the user can choose. The two objects\
    \ to use from the Object Library window are shown in Figure 18-17:\n\n![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig17_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig17_HTML.jpg)\n\
    \nFigure 18-17\n\nThe Toolbar and Bar Button Item on the Object Library window\n\
    \n- `Tool Bar` – Displays a bar at the bottom of the screen\n- `Bar Button Item`\
    \ – Displays text and/or an icon on a Toolbar\n\nTo see how to add a Toolbar and\
    \ icons and connect them to IBAction methods, follow these steps:\n\n1. Create\
    \ a new iOS project using the Single View App template (see Chapter 1) and name\
    \ this new project `TabBarMethodsApp`. This creates a single view for the user\
    \ interface.\n\n2. Click the `Main.storyboard` file in the Navigator pane. Xcode\
    \ displays the single view.\n\n3. Click the Library icon to open the Object Library\
    \ window.\n\n4. Drag and drop a Tool Bar from the Object Library window to the\
    \ bottom of the view as shown in Figure 18-18.\n\n![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig18_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig18_HTML.jpg)\n\
    \nFigure 18-18\n\nDragging and dropping a Toolbar onto a view\n\n5. Click `Item`\
    \ underneath Toolbar in the Document Outline as shown in Figure 18-19. This selects\
    \ the bar button currently visible on the Toolbar.\n\n![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig19_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig19_HTML.jpg)\n\
    \nFigure 18-19\n\nThe Bar Button Item on the Toolbar in the Document Outline\n\
    \n6. Choose `View` ➤ `Inspectors` ➤ `Show Attributes Inspector`, or click the\
    \ Attributes Inspector icon in the upper right corner of the Xcode window.\n\n\
    7. Click in the `System Item` popup menu. A popup menu appears, listing common\
    \ types of icons you can select as shown in Figure 18-20.\n\n![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig20_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig20_HTML.jpg)\n\
    \nFigure 18-20\n\nClicking the System Item popup menu\n\n8. Choose `Add`. Notice\
    \ that Xcode now displays the bar button as a `+` icon.\n\n9. Choose `View` ➤\
    \ `Assistant Editor` ➤ `Show Assistant Editor`, or click the Assistant Editor\
    \ icon in the upper right corner of the Xcode window. Xcode displays the `Main.storyboard`\
    \ file and the `ViewController.swift` file side by side.\n\n10. Move the mouse\
    \ pointer over the Add (`+`) button on the Toolbar, hold down the Control key,\
    \ and Ctrl-drag from the Add (`+`) button just above the last curly bracket at\
    \ the bottom of the `ViewController.swift` file.\n\n11. Release the Control key\
    \ and the left mouse button. A popup window appears.\n\n12. Click in the Name\
    \ text field and type **addTapped**.\n\n13. Click in the Type popup menu and choose\
    \ `UIBarButtonItem`. Then click the Connect button. Xcode creates an `addTapped`\
    \ IBAction method.\n\n14. Edit this `addTapped` IBAction method as follows:\n\n\
    ```\n@IBAction func addTapped(_ sender: UIBarButtonItem) {\n    let alert = UIAlertController(title:\
    \ \"Add\", message: \"Add button tapped\", preferredStyle: .alert)\n    let okAction\
    \ = UIAlertAction(title: \"OK\", style: .default, handler: { action -> Void in\n\
    \        //Just dismiss the action sheet\n    })\n    alert.addAction(okAction)\n\
    \    self.present(alert, animated: true, completion: nil)\n}\n```\n\nThe entire\
    \ `ViewController.swift` file should look like this:\n\n```\nimport UIKit\nclass\
    \ ViewController: UIViewController {\n    override func viewDidLoad() {\n    \
    \    super.viewDidLoad()\n        // Do any additional setup after loading the\
    \ view.\n    }\n    @IBAction func addTapped(_ sender: UIBarButtonItem) {\n  \
    \      let alert = UIAlertController(title: \"Add\", message: \"Add button tapped\"\
    , preferredStyle: .alert)\n        let okAction = UIAlertAction(title: \"OK\"\
    , style: .default, handler: { action -> Void in\n            //Just dismiss the\
    \ action sheet\n        })\n        alert.addAction(okAction)\n        self.present(alert,\
    \ animated: true, completion: nil)\n    }\n}\n```\n\n15. Click the Run button\
    \ or choose `Product` ➤ `Run`. The Simulator window appears, displaying the Toolbar\
    \ and the Add (`+`) button at the bottom of the screen.\n\n16. Click the Add (`+`)\
    \ button. An alert controller appears.\n\n17. Click OK to dismiss the alert controller.\n\
    \n18. Choose `Simulator` ➤ `Quit Simulator` to return to Xcode.\n\n## Adding and\
    \ Deleting Tool Bar Buttons\n\nWhen you add a Toolbar, it comes with one bar button\
    \ generically labeled \"Item\". After customizing this one bar button, you may\
    \ want to add more buttons to a Toolbar. If you add too many bar buttons, you\
    \ can always delete them. Bar buttons can display icons and/or text as shown in\
    \ Figure 18-21.\n\n![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig21_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig21_HTML.jpg)\n\
    \nFigure 18-21\n\nBar buttons typically display text or icons"
