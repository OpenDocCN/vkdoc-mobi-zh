    \ `Main.storyboard` 文件。Xcode 会显示该单视图。\n3.  在文档大纲中点击“视图控制器场景”。\n4.  选择“编辑器”➤“嵌入于”➤“导航控制器”。Xcode\
    \ 会在故事板中显示一个导航控制器，并将该单视图设为导航控制器的根视图（见图 17-4）。\n5.  点击“库”图标以打开“对象库”窗口。\n6.  将一个“视图控制器”拖放到根视图的右侧。\n\
