    完整的 `ViewController.swift` 文件应如下所示：\n\n```\nimport UIKit\nclass ViewController:\
    \ UIViewController {\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        // Do any additional setup after loading the view, typically from a nib.\n\
    \    }\n    @IBAction func tapDetected(_ sender: UITapGestureRecognizer) {\n \
    \       print (\"Tap detected\")\n    }\n}\n```\n\n22.  点击 Run 按钮或选择 Product ➤\
    \ Run。模拟器屏幕将会出现。\n\n23.  点击 Visual Solution 标签。请注意，在 Xcode 窗口底部的 Debug Area 中会出现消息\
    \ “Tap detected”。\n\n24.  点击 Visual Solution 标签以外的任意位置。请注意，每次点击 Visual Solution\
    \ 标签以外的位置或点击 Programmatic Solution 标签时，Xcode 窗口的 Debug Area 中不会显示其他内容。\n\n25.\
    \  选择 Simulator ➤ Quit Simulator 以返回 Xcode。\n\n上述步骤允许标签检测轻点手势，但我们唯一需要创建的代码是 `tapDetected`\
    \ 的 `IBAction` 方法。我们也可以完全通过 Swift 代码定义手势识别器，接下来将对 Programmatic Solution 标签执行此操作。\n\
    \n1.  确保 `TapApp` 项目已在 Xcode 中加载。\n\n2.  在 Navigator 窗格中点击 `Main.storyboard` 文件。Xcode\
    \ 将显示单个视图。\n\n3.  选择 View ➤ Assistant Editor ➤ Show Assistant Editor，或点击 Xcode\
    \ 窗口右上角的 Assistant Editor 图标。Xcode 将并排显示 `Main.storyboard` 和 `ViewController.swift`\
    \ 文件。\n\n4.  将鼠标指针移至 Programmatic Solution 标签上，按住 Control 键，然后从该标签向 `ViewController.swift`\
    \ 文件中的 `class ViewController` 行下方拖拽。\n\n5.  松开 Control 键和鼠标左键。此时会出现一个弹出窗口。\n\n\
    6.  在 Name 文本字段中点击，输入 `labelCode`，然后点击 Connect 按钮。Xcode 会创建一个 `IBOutlet`，如下所示：\n\
    \n```\n@IBOutlet var labelCode: UILabel!\n```\n\n7.  编辑 `viewDidLoad` 方法，如下所示：\n\
    \n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    labelCode.isUserInteractionEnabled\
    \ = true\n    let tapGesture = UITapGestureRecognizer(target: self, action: #selector(handleTap))\n\
    \    labelCode.addGestureRecognizer(tapGesture)\n    // Do any additional setup\
    \ after loading the view, typically from a nib.\n}\n```\n\n我们可以不选中 Attributes\
    \ Inspector 窗格中的 User Interaction Enabled 复选框，而是直接为第二个显示 “Programmatic Solution”\
    \ 的标签将 `.isUserInteractionEnabled` 属性设置为 `true`。\n\n我们可以不将 Tap Gesture Recognizer\
    \ 从 Object Library 拖放到视图上，而是使用 Swift 代码创建 `UITapGestureRecognizer`。这意味着我们还需要定义一个函数来响应轻点手势，该函数由\
    \ `#selector(handleTap)` 定义。最后，我们需要将此轻点手势添加到标签，而不是通过 Connections Inspector 窗格进行连接。\n\
    \n8.  在 `viewDidLoad` 方法下方添加以下内容：\n\n```\n@objc func handleTap() {\n    print\
    \ (\"Tap on second label detected\")\n}\n```\n\n完整的 `ViewController.swift` 文件应如下所示：\n\
    \n```\nimport UIKit\nclass ViewController: UIViewController {\n    @IBOutlet var\
    \ labelCode: UILabel!\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        labelCode.isUserInteractionEnabled = true\n        let tapGesture = UITapGestureRecognizer(target:\
    \ self, action: #selector(handleTap))\n        labelCode.addGestureRecognizer(tapGesture)\n\
    \        // Do any additional setup after loading the view, typically from a nib.\n\
    \    }\n    @objc func handleTap() {\n        print (\"Tap on second label detected\"\
    )\n    }\n    @IBAction func tapDetected(_ sender: UITapGestureRecognizer) {\n\
    \        print (\"Tap detected\")\n    }\n}\n```\n\n9.  点击 Run 按钮或选择 Product ➤\
    \ Run。模拟器屏幕将会出现。\n\n10.  点击 Programmatic Solution 标签。请注意，在 Xcode 窗口底部的 Debug Area\
    \ 中会出现消息 “Tap on second label detected”。\n\n11.  点击 Visual Solution 标签。请注意，在 Xcode\
    \ 窗口底部的 Debug Area 中会出现消息 “Tap detected”。\n\n12.  点击两个标签以外的任意位置。请注意，即使你在屏幕上轻点，轻点手势也不会被识别，因为两个轻点手势都连接到了标签上。\n\
    \n13.  选择 Simulator ➤ Quit Simulator 以返回 Xcode。\n\n使用手势识别器时，你可以通过 Object Library\
    \ 和 Inspector 窗格可视地定义它们，也可以通过 Swift 代码创建手势识别器。两种方法本质相同，因此取决于你偏好编写 Swift 代码还是使用\
    \ Object Library。\n\n使用 Swift 代码自定义轻点手势时，可以定义以下两个属性：\n\n*   `.numberOfTapsRequired`\
    \ – 定义识别轻点手势所需的点击次数，例如一次点击（默认值）\n*   `.numberOfTouchesRequired` – 定义识别轻点手势所需的指尖（触摸）数量\n"
- fmt: "# Detecting Pinch Gestures\n\nA pinch gesture occurs when two fingertips either\
    \ move toward each other or move away from each other. During a pinch gesture,\
    \ an app can recognize scale and velocity. The scale defines the relative position\
    \ of the two fingertips, while velocity detects the speed of the pinching motion.\n\
    \nTo see how to detect a pinch gesture, follow these steps:\n\n1. Create a new\
    \ iOS project using the Single View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml))\
    \ and name this new project `PinchApp`. This creates a single view for the user\
    \ interface.\n\n2. Click the `Main.storyboard` file in the Navigator pane. Xcode\
    \ displays the single view.\n\n3. Click the Library icon to open the Object Library\
    \ window and look for the Pinch Gesture Recognizer as shown in Figure [11-9](#329781_5_En_11_Chapter.xhtml#Fig9).\n\
    \n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig9_HTML.jpg](images/329781_5_En_11_Chapter/329781_5_En_11_Fig9_HTML.jpg)\n\
    *Figure 11-9* — The Pinch Gesture Recognizer in the Object Library window\n\n\
    4. Drag and drop the Pinch Gesture Recognizer onto the view. Xcode displays the\
    \ Pinch Gesture Recognizer in the Document Outline and above the View Controller.\n\
    \n5. Click the Library icon to open the Object Library window and drag and drop\
    \ an image view in the center of the user interface.\n\n6. Choose View ➤ Inspectors\
    \ ➤ Show Attributes Inspector or click the Attributes Inspector icon in the upper\
    \ right corner of the Xcode window.\n\n7. Click in the Background popup menu and\
    \ choose a color such as green or blue. This will make the image view easy to\
    \ find when you run the app in the Simulator. Without a background color, the\
    \ default white background of the image view will blend in with the white background\
    \ of the view.\n\n8. Select the User Interaction Enabled check box. This allows\
    \ the image view to respond to the user.\n\n9. Click the Align icon in the bottom\
    \ of the middle Xcode pane. A window appears.\n\n10. Select the Horizontally in\
    \ Container and Vertically in Container check boxes and then click the Add 2 Constraints\
    \ button as shown in Figure [11-10](#329781_5_En_11_Chapter.xhtml#Fig10). The\
    \ image view needs to be in the center to make it easy to mimic pinching gestures\
    \ in the Simulator.\n\n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig10_HTML.jpg](images/329781_5_En_11_Chapter/329781_5_En_11_Fig10_HTML.jpg)\n\
    *Figure 11-10* — Centering an image view\n\n11. Choose Editor ➤ Resolve Auto Layout\
    \ Issues ➤ Add Missing Constraints in the top half of the submenu. Xcode adds\
    \ additional constraints to the image view.\n\n12. Move the mouse pointer over\
    \ the image view, hold down the Control key, and Ctrl-drag from the image view\
    \ to the Pinch Gesture Recognizer icon in the Document Outline or at the top of\
    \ the View Controller.\n\n13. Release the Control key and the left mouse button.\
    \ A window appears.\n\n14. Choose `gestureRecognizers`. This link lets the image\
    \ view detect pinch gestures.\n\n15. Choose View ➤ Assistant Editor ➤ Show Assistant\
    \ Editor, or click the Assistant Editor icon. Xcode displays the `Main.storyboard`\
    \ and `ViewController.swift` file side by side.\n\n16. Move the mouse pointer\
    \ over the image view, hold down the Control key, and Ctrl-drag from the image\
    \ view to the `ViewController.swift` file underneath the `IBOutlet` line.\n\n\
    17. Release the Control key and the left mouse button. A popup window appears.\n\
    \n18. Click in the Name text field, type `topImageView`, and click the Connect\
    \ button. Xcode creates an `IBOutlet` variable as follows:\n\n```\n@IBOutlet var\
    \ topImageView: UIImageView!\n```\n\n19. Move the mouse pointer over the Pinch\
    \ Gesture Recognizer icon in the Document Outline or at the top of the View Controller,\
    \ hold down the Control key, and Ctrl-drag from the Pinch Gesture Recognizer above\
    \ the last curly bracket in the `ViewController.swift` file.\n\n20. Release the\
    \ Control key and the left mouse button. A popup window appears.\n\n21. Click\
    \ in the Name text field, type `pinchDetected`, click in the Type popup menu and\
    \ choose `UIPinchGestureRecognizer`, and click the Connect button. Xcode creates\
    \ an `IBAction` method.\n\n22. Edit the `pinchDetected` `IBAction` method as follows:\n\
    \n```\n@IBAction func pinchDetected(_ sender: UIPinchGestureRecognizer) {\n  \
    \  topImageView.transform = CGAffineTransform(scaleX: sender.scale, y: sender.scale)\n\
    }\n```\n\nThe `pinchDetected` `IBAction` method changes the size of the image\
    \ view based on the scale property of the pinch gesture where the scale property\
    \ defines the distance of the pinch gesture. The entire `ViewController.swift`\
    \ file should look like this:\n\n```\nimport UIKit\nclass ViewController: UIViewController\
    \ {\n    @IBOutlet var topImageView: UIImageView!\n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        // Do any additional setup after loading\
    \ the view, typically from a nib.\n    }\n    @IBAction func pinchDetected(_ sender:\
    \ UIPinchGestureRecognizer) {\n        topImageView.transform = CGAffineTransform(scaleX:\
    \ sender.scale, y: sender.scale)\n    }\n}\n```\n\n23. Choose View ➤ Standard\
    \ Editor ➤ Show Standard Editor, or click the Standard Editor icon in the upper\
    \ right corner of the Xcode window.\n\n24. Click the Run button or choose Product\
    \ ➤ Run. The Simulator window appears. To mimic a pinch gesture, you need to use\
    \ the mouse and hold down the Option key.\n\n25. Move the mouse pointer over the\
    \ image view, then hold down the Option key. Two gray dots appear to simulate\
    \ two fingertips on the screen as shown in Figure [11-11](#329781_5_En_11_Chapter.xhtml#Fig11).\n\
    \n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig11_HTML.jpg](images/329781_5_En_11_Chapter/329781_5_En_11_Fig11_HTML.jpg)\n\
    *Figure 11-11* — Holding down the Option key while dragging the mouse simulates\
    \ a two-finger pinch gesture in the Simulator\n\n26. Hold down the left mouse\
    \ button and the Option key, then drag the mouse to simulate a pinch gesture.\
    \ Notice that as the pinch gesture changes, the image view also changes in size.\n\
    \n27. Chose Simulator ➤ Quit Simulator to return to Xcode.\n\nThis example defined\
    \ the pinch gesture visually by dragging the Pinch Gesture Recognizer from the\
    \ Object Library. Now let’s see how to duplicate this process through Swift code\
    \ alone.\n\n1. Create a new iOS project using the Single View App template (see\
    \ Chapter [1](#329781_5_En_1_Chapter.xhtml)) and name this new project `PinchCodeApp`.\
    \ This creates a single view for the user interface.\n\n2. Click the `Main.storyboard`\
    \ file in the Navigator pane. Xcode displays the single view.\n\n3. Click the\
    \ Library icon to open the Object Library window and drag and drop an image view\
    \ in the center of the user interface.\n\n4. Click the Align icon in the bottom\
    \ of the middle Xcode pane. A window appears.\n\n5. Select the Horizontally in\
    \ Container and Vertically in Container check boxes and then click the Add 2 Constraints\
    \ button (see Figure [11-10](#329781_5_En_11_Chapter.xhtml#Fig10)). The image\
    \ view needs to be in the center to make it easy to mimic pinching gestures in\
    \ the Simulator.\n\n6. Choose Editor ➤ Resolve Auto Layout Issues ➤ Add Missing\
    \ Constraints in the top half of the submenu. Xcode adds additional constraints\
    \ to the image view.\n\n7. Choose View ➤ Assistant Editor ➤ Show Assistant Editor,\
    \ or click the Assistant Editor icon. Xcode displays the `Main.storyboard` and\
    \ `ViewController.swift` file side by side.\n\n8. Move the mouse pointer over\
    \ the image view, hold down the Control key, and Ctrl-drag from the image view\
    \ to the `ViewController.swift` file underneath the `IBOutlet` line.\n\n9. Release\
    \ the Control key and the left mouse button. A popup window appears.\n\n10. Click\
    \ in the Name text field, type `topImageView`, and click the Connect button. Xcode\
    \ creates an `IBOutlet` variable as follows:\n\n```\n@IBOutlet var topImageView:\
    \ UIImageView!\n```\n\n11. Choose View ➤ Standard Editor ➤ Show Standard Editor,\
    \ or click the Standard Editor icon in the upper right corner of the Xcode window."
