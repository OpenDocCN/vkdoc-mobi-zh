- fmt: "# Using Steppers\n\n`Steppers` store a value that users can increment by a\
    \ fixed increment such as 1 or 2.5. You can define a minimum and maximum value\
    \ that the stepper can represent such as a range between 1 and 10. Furthermore,\
    \ you can define whether the stepper wraps or not. Wrapping means if you keep\
    \ incrementing the stepper beyond its maximum value, it goes back to its minimum\
    \ value. Likewise if you keep decrementing the stepper below its minimum value,\
    \ it jumps to its maximum value. This can make it easy for users to choose different\
    \ values without having to exhaustively step from one extreme value to the other.\n\
    \nTo see how a stepper works, follow these steps:\n\n1. Create a new iOS project\
    \ using the Single View App template (see Chapter 1) and name this new project\
    \ `StepperApp`. This creates a single view for the user interface.\n2. Click the\
    \ `Main.storyboard` file in the Navigator pane. Xcode displays the single view.\n\
    3. Click the Library icon to open the Object Library window.\n4. Drag and drop\
    \ a stepper anywhere on the view.\n5. Choose View ➤ Inspectors ➤ Show Attributes\
    \ Inspector, or click the Attributes Inspector icon at the top of the Inspector\
    \ pane. The Inspector pane shows all attributes available for a stepper as shown\
    \ in Figure 8-1.\n\n![../images/329781_5_En_8_Chapter/329781_5_En_8_Fig1_HTML.jpg](images/329781_5_En_8_Chapter/329781_5_En_8_Fig1_HTML.jpg)\n\
    \n*Figure 8-1 Modifying attributes for a stepper in the Inspector pane*\n\nThe\
    \ default settings for a stepper define its current value as 0, its minimum value\
    \ as 0, its maximum value as 100, and its increment value as 1.\n\nIn addition,\
    \ its `Autorepeat` option is selected, which means the user doesn’t need to click\
    \ the stepper each time to increment or decrement its value. Instead, the user\
    \ can simply hold down left mouse down over the stepper.\n\nThe `Continuous` check\
    \ box is also selected, which means the value of the stepper constantly changes\
    \ to reflect the latest value. If this `Continuous` check box is clear, then the\
    \ value of the stepper only changes once the user stops clicking it.\n\nThe `Wrap`\
    \ check box is clear, which means once the stepper reaches its minimum or maximum\
    \ value, it won’t decrement or increment anymore. If the `Wrap` check box is selected,\
    \ then the user can move past the maximum value defined (100) and return to 0\
    \ again, or move below the minimum value defined (0) and return to 100 again.\n\
    \n1. Click the Library icon to open the Object Library window.\n2. Drag and drop\
    \ a label near the stepper.\n3. Click the Library icon to open the Object Library\
    \ window and drag and drop a button near the stepper and label. At this point,\
    \ your user interface should contain a stepper, a label, and a button as shown\
    \ in Figure 8-2.\n\n![../images/329781_5_En_8_Chapter/329781_5_En_8_Fig2_HTML.jpg](images/329781_5_En_8_Chapter/329781_5_En_8_Fig2_HTML.jpg)\n\
    \n*Figure 8-2 A stepper, label, and button on the user interface*\n\n4. Choose\
    \ Editor ➤ Resolve Auto Layout Issues ➤ Reset to Suggested Constraints at the\
    \ bottom half of the submenu. This adds constraints to all your objects.\n5. Choose\
    \ View ➤ Assistant Editor ➤ Show Assistant Editor, or click the Assistant Editor\
    \ icon. Xcode displays the `Main.storyboard` and `ViewController.swift` file side\
    \ by side.\n6. Move the mouse pointer over the label, hold down the Control key,\
    \ and Ctrl-drag from the label to the `ViewController.swift` file underneath the\
    \ `class ViewController` line.\n7. Release the Control key and the left mouse\
    \ button. A popup window appears.\n8. Click in the Name text field, type `labelValue`,\
    \ and click the Connect button. Xcode creates an `IBOutlet` variable as follows:\n\
    \n```\n@IBOutlet var labelValue: UILabel!\n```\n\n1. Move the mouse pointer over\
    \ the stepper, hold down the Control key, and Ctrl-drag from the stepper to the\
    \ `ViewController.swift` file underneath the `IBOutlet` line.\n2. Release the\
    \ Control key and the left mouse button. A popup window appears.\n3. Click in\
    \ the Name text field, type `stepperValue`, and click the Connect button. Xcode\
    \ creates an `IBOutlet` variable as follows:\n\n```\n@IBOutlet var stepperValue:\
    \ UIStepper!\n```\n\n4. Move the mouse pointer over the stepper, hold down the\
    \ Control key, and Ctrl-drag from the stepper to the `ViewController.swift` file\
    \ above the last curly bracket at the bottom.\n5. Release the Control key and\
    \ the left mouse button. A popup window appears.\n6. Click in the Name text field,\
    \ type `stepperChanged`, click in the Type popup menu and choose `UIStepper`,\
    \ and click the Connect button. Xcode creates an `IBAction` method as follows:\n\
    \n```\n@IBAction func stepperChanged(_ sender: UIStepper) {\n}\n```\n\n7. Move\
    \ the mouse pointer over the button, hold down the Control key, and Ctrl-drag\
    \ from the button to the `ViewController.swift` file above the last curly bracket\
    \ at the bottom.\n8. Release the Control key and the left mouse button. A popup\
    \ window appears.\n9. Click in the Name text field, type `changeStepper`, click\
    \ in the Type popup menu and choose `UIButton`, and click the Connect button.\
    \ Xcode creates an `IBAction` method as follows:\n\n```\n@IBAction func changeStepper(_\
    \ sender: UIButton) {\n}\n```\n\n10. Edit the `stepperChanged` IBAction method\
    \ as follows:\n\n```\n@IBAction func stepperChanged(_ sender: UIStepper) {\n \
    \   labelValue.text = \"\\(stepperValue.value)\"\n}\n```\n\nThis IBAction method\
    \ retrieves the current value of the stepper, which is a number, and displays\
    \ it as text. Then it puts this text into the label.\n\n**Note** The `\\()` symbol\
    \ is called string interpolation. You can place any value inside the parentheses\
    \ to convert that value into a string.\n\n11. Choose View ➤ Standard Editor ➤\
    \ Show Standard Editor, or click the Standard Editor icon.\n12. Click the Run\
    \ button or choose Product ➤ Run.\n13. Click the `+` icon on the stepper multiple\
    \ times. Notice that each time you click the `+` icon of the stepper, its numeric\
    \ value increases by 1 in the label.\n14. Click the `–` icon on the stepper multiple\
    \ times. Notice that each time you click the `–` icon of the stepper, its numeric\
    \ value decreases by 1 in the label.\n15. Choose Simulator ➤ Quit Simulator to\
    \ return to Xcode.\n\nThe stepper increments by 1 and has a minimum value of 0\
    \ and a maximum value of 100 because of its default settings as displayed in the\
    \ Attributes Inspector pane. We could change those settings in the Inspector pane\
    \ but let’s change them using Swift code instead.\n\nTo see how to change a stepper’s\
    \ properties using Swift code, follow these steps:\n\n1. Click the `ViewController.swift`\
    \ file in the Navigator pane.\n2. Edit the `changeStepper` IBAction method as\
    \ follows:\n\n```\n@IBAction func changeStepper(_ sender: UIButton) {\n    stepperValue.minimumValue\
    \ = -10\n    stepperValue.maximumValue = -5\n    stepperValue.stepValue = 0.5\n\
    \    stepperValue.isContinuous = true\n    stepperValue.autorepeat = true\n  \
    \  stepperValue.wraps = true\n}\n```\n\nSetting the stepper’s `isContinuous`,\
    \ `autorepeat`, and `wraps` properties to `true` is equivalent to selecting the\
    \ `Continuous`, `Autorepeat`, and `Wraps` check boxes in the Inspector pane.\n\
    \n3. Click the Run button or choose Product ➤ Run. The Simulator window appears.\n\
    4. Click the `+` icon on the stepper. Notice that the value in the label increases\
    \ by 1 each time you click the `+` icon.\n5. Click the button. This runs the Swift\
    \ code in the `changeStepper` IBAction method.\n6. Click the `–` and `+` icons\
    \ in the stepper. Notice that it now increments or decrements by 0.5 because the\
    \ Swift code defined its `stepValue` property to 0.5.\n7. Choose Simulator ➤ Quit\
    \ Simulator to return to Xcode.\n\nThe entire `ViewController.swift` file should\
    \ look like this:"
