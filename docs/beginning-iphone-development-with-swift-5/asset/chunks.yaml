- fmt: "### A popup menu lets you define the segue\n\n12.  Choose **Show**. Xcode\
    \ draws an arrow (segue) linking the root view to the newly added View Controller\
    \ as shown in Figure [17-9](#329781_5_En_17_Chapter.xhtml#Fig9).\n\n![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig9_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig9_HTML.jpg)\n\
    \n**Figure 17-9** – A segue links two views within a Navigation Controller\n\n\
    13.  Click **Show segue to “View Controller”** in the Document Outline. Xcode\
    \ highlights the segue between the two views as shown in Figure [17-10](#329781_5_En_17_Chapter.xhtml#Fig10).\n\
    \n![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig10_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig10_HTML.jpg)\n\
    \n**Figure 17-10** – Selecting the segue between two views\n\n14.  Choose **View\
    \ ➤ Inspectors ➤ Show Attributes Inspector**, or click the Attributes Inspector\
    \ icon in the upper right corner of the Xcode window.\n\n15.  Click in the Identifier\
    \ text field, type **firstLink**, and press ENTER as shown in Figure [17-11](#329781_5_En_17_Chapter.xhtml#Fig11).\n\
    \n![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig11_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig11_HTML.jpg)\n\
    \n**Figure 17-11** – Defining an identifier name for a segue\n\n16.  Click the\
    \ `ViewController.swift` file in the Navigator pane.\n\n17.  Add the following\
    \ function:\n\n```swift\noverride func touchesBegan(_ touches: Set<UITouch>, with\
    \ event: UIEvent?) {\n    performSegue(withIdentifier: \"firstLink\", sender:\
    \ self)\n}\n```\n\nThe purpose of this code is to identify the segue named `\"\
    firstLink\"` and follow that segue to open another view, which is the view with\
    \ a different background color.\n\nThe complete `ViewController.swift` file should\
    \ look like this:\n\n```swift\nimport UIKit\nclass ViewController: UIViewController\
    \ {\n    override func viewDidLoad() {\n        super.viewDidLoad()\n        //\
    \ Do any additional setup after loading the view.\n    }\n    override func touchesBegan(_\
    \ touches: Set<UITouch>, with event: UIEvent?) {\n        performSegue(withIdentifier:\
    \ \"firstLink\", sender: self)\n    }\n}\n```\n\n18.  Click the **Run** button\
    \ or choose **Product ➤ Run**. The Simulator window appears, displaying a blank\
    \ screen.\n\n19.  Click anywhere inside the Simulator window. This causes the\
    \ `touchesBegan` function to run and call the `performSegue` command. Notice that\
    \ the second view, with the colored background, now appears and displays a **Back**\
    \ button in the upper left corner that was created automatically by the Navigation\
    \ Controller.\n\n20.  Choose **Simulator ➤ Quit Simulator** to return to Xcode.\n\
    \n## Passing Data to Other Views\n\nWhen an app displays multiple views in a Navigation\
    \ Controller, data selected or entered in one view may need to be used in another\
    \ view. Since the whole purpose of object-oriented programming is to isolate data,\
    \ the solution is to pass data from one view to the other.\n\nTo **receive** data,\
    \ a view needs the following:\n\n*   A `.swift` Cocoa Touch Class file connected\
    \ to its View Controller.\n*   Properties defined with the `var` keyword in this\
    \ `.swift` file. Any data stored in a property can then be copied into any objects\
    \ on the user interface connected by an `IBOutlet` variable.\n\nTo **send** data,\
    \ a view needs the following in its own `.swift` Cocoa Touch Class file:\n\n*\
    \   A `prepare(for:sender:)` function that defines a constant that represents\
    \ the segue destination\n*   Data assigned to properties defined by the receiving\
    \ view’s `.swift` file\n\nTo see how to pass data from one view to another in\
    \ a Navigation Controller, follow these steps:\n\n1.  Make sure the `CollectionViewDataApp`\
    \ is loaded in Xcode.\n2.  Click the `Main.storyboard` file in the Navigator pane.\
    \ Xcode displays the storyboard.\n3.  Click the Library icon to open the Object\
    \ Library window.\n4.  Drag and drop a label anywhere on the second (colored)\
    \ view.\n5.  Resize the label's width so it can display more than a single word\
    \ of text.\n6.  Choose **Editor ➤ Resolve Auto Layout Issues ➤ Reset to Suggested\
    \ Constraints**. Xcode adds constraints to the label.\n7.  Choose **File ➤ New\
    \ ➤ File**. Xcode displays a list of templates.\n8.  Choose **Cocoa Touch Class**\
    \ under the iOS category and click the **Next** button. Another dialog appears,\
    \ asking for a class name and subclass.\n9.  Click in the Class text field and\
    \ type **SecondViewController**.\n10.  Click in the Subclass of popup menu and\
    \ choose `UIViewController`.\n11.  Click the **Next** button. Xcode asks where\
    \ to store the file.\n12.  Click the **Create** button. Xcode displays the `SecondViewController.swift`\
    \ file in the Navigator pane.\n13.  Click the `Main.storyboard` in the Navigator\
    \ pane.\n14.  Click the View Controller icon above the second view to select it.\n\
    15.  Choose **View ➤ Inspectors ➤ Show Identity Inspector**, or click the Identity\
    \ Inspector icon in the upper right corner of the Xcode window.\n16.  Click in\
    \ the Class popup menu and choose **SecondViewController** as shown in Figure\
    \ [17-12](#329781_5_En_17_Chapter.xhtml#Fig12). This connects the `SecondViewController.swift`\
    \ file to the second View Controller with the colored background.\n\n![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig12_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig12_HTML.jpg)\n\
    \n**Figure 17-12** – Connecting the `SecondViewController.swift` file to the second\
    \ View Controller\n\n17.  Choose **View ➤ Assistant Editor ➤ Show Assistant Editor**,\
    \ or click the Assistant Editor icon in the upper right corner of the Xcode window.\
    \ This displays the `Main.storyboard` file on the left and the `SecondViewController.swift`\
    \ file on the right.\n18.  Move the mouse pointer over the label on the second\
    \ view, hold down the Control key, and Ctrl-drag from the label to the `SecondViewController.swift`\
    \ file underneath the `class SecondViewController` line.\n19.  Release the Control\
    \ key and the left mouse button. A popup window appears.\n20.  Click in the Name\
    \ text field and type **labelDisplay**. Then click the **Connect** button. Xcode\
    \ creates an `IBOutlet` as follows:\n\n```swift\n@IBOutlet var labelDisplay: UILabel!\n\
    ```\n\n21.  Add the following underneath this `IBOutlet`:\n\n```swift\nvar receivedString\
    \ = \"\"\n```\n\n22.  Edit the `viewDidLoad` method as follows:\n\n```swift\n\
    override func viewDidLoad() {\n    super.viewDidLoad()\n    labelDisplay.text\
    \ = receivedString\n    // Do any additional setup after loading the view.\n}\n\
    ```\n\nThis `viewDidLoad` method takes whatever data is stored in the `receivedString`\
    \ property and stores it in the `labelDisplay.text` property so the text can appear\
    \ on the label on the user interface.\n\nThe entire `SecondViewController.swift`\
    \ file should look like this:"
