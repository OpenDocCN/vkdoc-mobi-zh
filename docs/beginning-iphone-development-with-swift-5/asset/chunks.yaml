  trans: "\n接下来，我们需要定义对象的位置、宽度和高度。请记住，原点 `(0, 0)` 被定义为屏幕的左上角：\n\n```\nlabel.frame\
    \ = CGRect(x: 125, y: 125, width: 200, height: 21)\nbutton.frame = CGRect(x: 125,\
    \ y: 300, width: 80, height: 30)\n```\n\n第一行代码将 `label` 定义为距离屏幕左侧 125 点、距离屏幕顶部\
    \ 125 点的位置。同时，该代码还定义了 `label` 的宽度为 200，高度为 21。\n\n第二行代码将 `button` 定义为距离屏幕左侧 125\
    \ 点、距离屏幕顶部 300 点的位置。同时，该代码还定义了 `button` 的宽度为 80，高度为 30。\n\n定义好对象的大小和位置后，下一步是自定义对象的外观。`label`\
    \ 包含文本 “This is a label”，基于以下代码：\n\n```\nlabel.text = \"This is a label\"\n```\n\
    \n`button` 通过两种不同方式进行自定义。首先，按钮标题设置为 “Button”，并将文字颜色设置为蓝色：\n\n```\nbutton.setTitle(\"\
    Button\", for: .normal)\nbutton.setTitleColor(UIColor.blue, for: .normal)\n```\n\
    \n在定义了要显示的对象类型、其大小和位置，并进行自定义之后，最后一步是将其放置到视图上：\n\n```\nview.addSubview(label)\n\
    view.addSubview(button)\n```\n\n如果以上步骤看起来只是为了在用户界面上创建一个对象而大费周章，那你是对的。这就是为什么大多数开发者选择以可视化的方式设计用户界面。让我们看看这是如何操作的。\n\
    \n1.  在导航器面板中点击 `ViewController.swift` 文件。Xcode 中间的面板会显示 `ViewController.swift`\
    \ 文件的内容。\n\n2.  修改 `ViewController.swift` 文件，使其看起来像这样：\n\n    ```\n    import\
    \ UIKit\n    class ViewController: UIViewController {\n    override func viewDidLoad()\
    \ {\n    super.viewDidLoad()\n    }\n    }\n    ```\n\n3.  在导航器面板中点击 `Main.storyboard`\
    \ 文件。Xcode 会显示包含用户界面的故事板，其中只有一个空白视图。\n\n4.  点击库图标。对象库窗口出现，列出了所有可以添加到用户界面中的不同对象，如图\
    \ 2-3 所示。\n\n    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig3_HTML.jpg](img/329781_5_En_2_Fig3_HTML.jpg)\n\
    \n    图 2-3. 对象库让你可以选择要放置在视图上的对象。\n\n5.  在对象库列表中滚动，直到找到标签，或者直接在对象库窗口顶部的搜索字段中点击，输入\
    \ `label`，然后按回车键。对象库窗口会显示标签对象，如图 2-4 所示。\n\n    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig4_HTML.jpg](img/329781_5_En_2_Fig4_HTML.jpg)\n\
    \n    图 2-4. 在对象库窗口中搜索标签对象。\n\n6.  将标签对象从对象库窗口拖放到视图上。拖动标签时，对象库窗口会消失。松开鼠标左键时，标签会出现在视图上。我们可以调整标签的大小和位置，但如果要定义精确的值，则需要使用检查器面板。\n\
    \n7.  点击标签以将其选中。标签周围会出现控制柄，表示它已被选中。\n\n8.  选择 视图 ➤ 检查器 ➤ 显示属性检查器（或点击检查器面板顶部的显示属性检查器图标）。\n\
    \n9.  点击颜色弹出菜单上方的文本字段，输入 `This is a label`，然后按回车键，如图 2-5 所示。属性检查器面板允许我们自定义标签中的文本。现在让我们定义标签的大小和位置。\n\
    \n    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig5_HTML.jpg](img/329781_5_En_2_Fig5_HTML.jpg)\n\
    \n    图 2-5. 使用属性检查器面板自定义标签上显示的文本。\n\n10. 选择 视图 ➤ 检查器 ➤ 显示大小检查器（或点击显示大小检查器图标）。大小检查器面板随即出现。\n\
    \n11. 点击 X 文本字段，输入 `125`。然后点击 Y 文本字段，输入 `125`。\n\n12. 点击宽度文本字段，输入 `200`。然后点击高度文本字段，输入\
    \ `21`。按回车键。这将定义标签的大小和位置，如图 2-6 所示。\n\n    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig6_HTML.jpg](img/329781_5_En_2_Fig6_HTML.jpg)\n\
    \n    图 2-6. 使用大小检查器面板定义标签的大小和位置。\n\n13. 点击库图标。对象库窗口出现，列出了所有可以添加到用户界面中的不同对象（参见图\
    \ 2-3）。\n\n14. 在对象库列表中滚动，直到找到按钮，或者直接在对象库窗口顶部的搜索字段中点击，输入 `button`，然后按回车键。对象库会显示按钮对象，如图\
    \ 2-7 所示。\n\n    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig7_HTML.jpg](img/329781_5_En_2_Fig7_HTML.jpg)\n\
    \n    图 2-7. 在对象库窗口中搜索按钮对象。\n\n15. 将按钮对象从对象库窗口拖放到视图上。拖动按钮时，对象库窗口会消失。松开鼠标左键时，按钮会出现在视图上。\n\
    \n16. 点击按钮以将其选中。按钮周围会出现控制柄，表示它已被选中。\n\n17. 选择 视图 ➤ 检查器 ➤ 显示属性检查器（或点击检查器面板顶部的显示属性检查器图标）。注意，属性检查器面板中已经显示按钮上的文字\
    \ “Button”，且颜色为蓝色，如图 2-8 中的文本颜色弹出菜单所示。\n\n    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig8_HTML.jpg](img/329781_5_En_2_Fig8_HTML.jpg)\n\
    \n    图 2-8. 使用属性检查器面板自定义按钮上显示的文本和颜色。\n\n18. 选择 视图 ➤ 检查器 ➤ 显示大小检查器（或点击显示大小检查器图标）。大小检查器面板随即出现。\n\
    \n19. 点击 X 文本字段，输入 `125`。然后点击 Y 文本字段，输入 `300`。\n\n20. 点击宽度文本字段，输入 `80`。然后点击高度文本字段，输入\
    \ `30`。按回车键。这将定义按钮的大小和位置。\n\n21. 选择 项目 ➤ 运行，或按 Command + R。Xcode 会加载模拟器程序，让你可以模拟\
    \ iOS 设备。当你的应用在模拟器中加载时，它会显示一个标签和一个按钮。\n\n22. 选择 模拟器 ➤ 退出模拟器，或按 Command + Q。Xcode\
    \ 窗口会再次出现。\n\n23. 选择 文件 ➤ 保存以保存你的项目。\n\n注意，当你以编程方式在用户界面上创建对象时，你需要编写代码来完成从创建对象、定义其大小和位置，到将其放置到视图上的所有步骤。另一方面，以可视化方式设计用户界面意味着将对象拖放到视图上，然后使用鼠标调整其大小或移动它们。然后，要定义对象的外观、精确大小和位置，你可以打开属性检查器和大小检查器来选择合适的值。\n\
    \n许多 Xcode 项目会结合两种方法来创建用户界面。虽然通常以可视化方式创建用户界面更容易，但你也需要熟悉编写代码以编程方式创建用户界面，因为你可能会在他人创建的项目中看到这种做法。\n"
- fmt: "# Learning About Views and Class Files\n\nThe most important part of any app’s\
    \ user interface is a view, which displays information on an iOS device’s screen.\
    \ The simplest app contains just one view but most apps contain multiple views.\
    \ You can easily add or delete views from a project. While a view contains user\
    \ interface objects such as buttons and text fields, you may wonder how does a\
    \ view store data that a user might type in from the user interface. The answer\
    \ is that each view needs a class file that contains Swift code that can store\
    \ data and handle interactions such as the user tapping a button.\n\nBefore we\
    \ go on, be aware that Xcode uses confusing terms to describe parts of the user\
    \ interface. A user interface is stored in a storyboard where each individual\
    \ window displayed on the screen is called a scene. Most apps contain multiple\
    \ scenes, so the Document Outline lets you selectively hide or display the details\
    \ of each scene as shown in Figure [2-9](#329781_5_En_2_Chapter.xhtml#Fig9). By\
    \ clicking each scene in the Document Outline, you can quickly see the different\
    \ scenes that make up your user interface.\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig9_HTML.jpg](images/329781_5_En_2_Chapter/329781_5_En_2_Fig9_HTML.jpg)\n\
    \nFigure 2-9. The Document Outline makes it easy to find and view scenes\n\nWithin\
    \ each scene is a controller. A controller defines how that scene appears on the\
    \ screen. You can select the controller by clicking the controller name in the\
    \ Document Outline or by clicking the controller icon in the storyboard as shown\
    \ in Figure [2-10](#329781_5_En_2_Chapter.xhtml#Fig10).\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig10_HTML.jpg](images/329781_5_En_2_Chapter/329781_5_En_2_Fig10_HTML.jpg)\n\
    \nFigure 2-10. You can select a controller in the Document Outline or in the storyboard\n\
    \nWithin each controller is typically a view, which defines what appears on the\
    \ screen when the app runs. Objects such as buttons or labels appear on the view,\
    \ so if you delete a view, you also delete any objects stored on that view.\n\n\
    Let’s take a look at the two `.swift` files in the Single View App project we’ve\
    \ created so far and see how the hierarchy of the Document Outline works:\n\n\
    1.  Click the `AppDelegate.swift` file in the Navigator pane. Xcode’s middle pane\
    \ displays the contents of the `AppDelegate.swift` file. You’ll notice several\
    \ functions already created for you that contain no code. These functions let\
    \ you handle different conditions when your app runs:\n    *   `didFinishLaunchingWithOptions`\
    \ – Runs after your app starts\n    *   `applicationWillResignActive` – Runs before\
    \ your app no longer remains the active app on the screen\n    *   `applicationDidEnterBackground`\
    \ – Runs as soon as your app is pushed into the background so the user can use\
    \ a different app\n    *   `applicationWillEnterForeground` – Runs right before\
    \ your app becomes active again on the screen\n    *   `applicationDidBecomeActive`\
    \ – Runs after the app becomes active on the screen\n    *   `applicationWillTerminate`\
    \ – Runs right before your app closes\n\nIn many cases, you won’t need to write\
    \ code for all of these functions. For example, you may want your app to save\
    \ data before it closes (`applicationWillTerminate`) and then you may want your\
    \ app to retrieve data again when it first starts (`didFinishLaunchingWithOptions`).\
    \ The `AppDelegate.swift` file is where you write Swift code to control your app’s\
    \ behavior.\n\n2.  Click the `Main.storyboard` file in the Navigator pane. Xcode\
    \ displays your user interface. Make sure the Document Outline appears. (You can\
    \ toggle between showing and hiding the Document Outline by choosing Editor ➤\
    \ Show/Hide Document Outline or by clicking the Document Outline icon.)\n\n3.\
    \  Click the controller icon either in the Document Outline or in the storyboard\
    \ (see Figure [2-10](#329781_5_En_2_Chapter.xhtml#Fig10)).\n\n4.  Choose View\
    \ ➤ Inspectors ➤ Show the Identity Inspector, or click the Show the Identity Inspector\
    \ icon at the top of the Inspector pane. Notice that the Class text field displays\
    \ the text `ViewController` as shown in Figure [2-11](#329781_5_En_2_Chapter.xhtml#Fig11).\
    \ This name refers to the `ViewController.swift` file in the Navigator pane and\
    \ links the controller to the file named `ViewController.swift`. You can always\
    \ change the name of your files, but if you change a file name, you must also\
    \ make sure any controllers use the correct file name.\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig11_HTML.jpg](images/329781_5_En_2_Chapter/329781_5_En_2_Fig11_HTML.jpg)\n\
    \nFigure 2-11. The Identity Inspector lets you link `.swift` files to a controller\n\
    \n5.  Choose View ➤ Inspectors ➤ Show Attributes Inspector, or click the Show\
    \ the Attributes Inspector icon as shown in Figure [2-12](#329781_5_En_2_Chapter.xhtml#Fig12).\n\
    \n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig12_HTML.jpg](images/329781_5_En_2_Chapter/329781_5_En_2_Fig12_HTML.jpg)\n\
    \nFigure 2-12. The Attributes Inspector lets you customize how the scene appears\n\
    \n6.  Click `View` in the Document Outline. Notice how the Attributes Inspector\
    \ pane now displays different options for customizing the view as shown in Figure\
    \ [2-13](#329781_5_En_2_Chapter.xhtml#Fig13).\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig13_HTML.jpg](images/329781_5_En_2_Chapter/329781_5_En_2_Fig13_HTML.jpg)\n\
    \nFigure 2-13. The Attributes Inspector lets you customize how the view appears\n\
    \n7.  Click the label in the Document Outline. (You can also select the label\
    \ by clicking it directly in the storyboard.) Notice how the Attributes Inspector\
    \ pane now displays options for customizing the label as shown in Figure [2-14](#329781_5_En_2_Chapter.xhtml#Fig14).\n\
    \n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig14_HTML.jpg](images/329781_5_En_2_Chapter/329781_5_En_2_Fig14_HTML.jpg)\n\
    \nFigure 2-14. Displaying the Attributes Inspector for a label\n\n8.  Click the\
    \ button in the Document Outline. (You can also select the button by clicking\
    \ it directly in the storyboard.) Notice how the Attributes Inspector pane now\
    \ displays options for customizing the button as shown in Figure [2-15](#329781_5_En_2_Chapter.xhtml#Fig15).\n\
    \n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig15_HTML.jpg](images/329781_5_En_2_Chapter/329781_5_En_2_Fig15_HTML.jpg)\n\
    \nFigure 2-15. Displaying the Attributes Inspector for a button\n\nAt this point\
    \ you’ve seen how to use the Document Outline and the different Inspector panes.\
    \ The main point is that every storyboard scene has a controller, and every controller\
    \ needs to be linked to a `.swift` file. In our Single View App, we just have\
    \ a single scene.\n\nThe controller is given a generic name of View Controller\
    \ and it’s linked to a `.swift` file called `ViewController.swift`. When creating\
    \ your own app, you’ll likely want to give both your controller and its linked\
    \ `.swift` file a more descriptive name.\n\nTo change the name of any controller\
    \ displayed in the Document Outline, follow these steps:\n\n1.  Click the `Main.storyboard`\
    \ file in the Navigator pane.\n\n2.  Make sure the Document Outline appears by\
    \ choosing Editor ➤ Show Document Outline or click the Document Outline icon.\n\
    \n3.  Click a controller displayed in the Document Outline and press ENTER. Xcode\
    \ highlights the controller name as shown in Figure [2-16](#329781_5_En_2_Chapter.xhtml#Fig16).\
    \ Now you can edit the controller name by using the arrow keys or BACKSPACE and\
    \ DELETE keys.\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig16_HTML.jpg](images/329781_5_En_2_Chapter/329781_5_En_2_Fig16_HTML.jpg)\n\
    \nFigure 2-16. You can edit a controller name in the Document Outline by pressing\
    \ ENTER\n\nSelecting items and pressing ENTER also lets you change the names of\
    \ files displayed in the Navigator pane or in the macOS Finder as well."
