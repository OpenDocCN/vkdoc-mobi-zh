    \n2.  点击导航器面板中的`Main.storyboard`文件。Xcode 将显示该单视图。\n\n3.  点击库图标打开对象库窗口，将一个图像视图拖放到用户界面的中心。\n\
    \n4.  点击 Xcode 中间面板底部的对齐图标。将出现一个窗口。\n\n5.  选中 **Horizontally in Container** 和\
    \ **Vertically in Container** 复选框，然后点击 **Add 2 Constraints** 按钮（见图[11-10](#329781_5_En_11_Chapter.xhtml#Fig10)）。图像视图需要位于中心，以便在模拟器中轻松模拟捏合手势。\n\
    \n6.  选择 **Editor ➤ Resolve Auto Layout Issues ➤ Add Missing Constraints**（子菜单的上半部分）。Xcode\
    \ 会为图像视图添加额外的约束。\n\n7.  选择 **View ➤ Assistant Editor ➤ Show Assistant Editor**，或点击\
    \ Assistant Editor 图标。Xcode 将并排显示`Main.storyboard`和`ViewController.swift`文件。\n\
    \n8.  将鼠标指针移到图像视图上，按住 Control 键，然后从图像视图 Control-拖动到`ViewController.swift`文件中\"\
    class ViewController\"行的下方。\n\n9.  松开 Control 键和鼠标左键。将出现一个弹出窗口。\n\n10. 点击 Name\
    \ 文本字段，输入**topImageView**，然后点击 **Connect** 按钮。Xcode 将创建一个`IBOutlet`变量，如下所示：\n\n\
    ```\n@IBOutlet var topImageView: UIImageView!\n```\n\n11. 选择 **View ➤ Standard\
    \ Editor ➤ Show Standard Editor**，或点击 Xcode 窗口右上角的 Standard Editor 图标。\n\n12.\
    \ 点击导航器面板中的`ViewController.swift`文件。\n\n13. 在`IBOutlet`下方添加以下代码行：\n\n```\nvar\
    \ rotateMe: UIRotationGestureRecognizer?\n```\n\n这定义了一个代表旋转手势的全局变量。\n\n14. 编辑`viewDidLoad`方法，如下所示：\n\
    \n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    topImageView.isUserInteractionEnabled\
    \ = true\n    topImageView.backgroundColor = UIColor.green\n    let rotationGesture\
    \ = UIRotationGestureRecognizer(target: self, action: #selector(handleRotation))\n\
