- fmt: '44.  Move the mouse pointer over the bar button that displays the `Done` button,
    hold down the `Control` key, and `Ctrl`-drag from the bar button to the space
    above the last curly bracket in the bottom of the `SecondViewController.swift`
    file.


    45.  Release the `Control` key and the left mouse button. A popup window appears.


    46.  Click in the `Name` text field and type `doneTapped`.


    47.  Click in the `Type` popup menu, choose `UIBarButtonItem`, and then click
    the `Connect` button. Xcode creates an `IBAction` method.


    48.  Edit the `doneTapped` `IBAction` method as follows:


    ```

    @IBAction func doneTapped(_ sender: UIBarButtonItem) {

    let alert = UIAlertController(title: "Message", message: "Done button tapped",
    preferredStyle: .alert)

    let okAction = UIAlertAction(title: "OK", style: .default, handler: { action ->
    Void in

    //Just dismiss the action sheet

    })

    alert.addAction(okAction)

    self.present(alert, animated: true, completion: nil)

    }

    ```


    49.  Click the `Run` button or choose `Product` ➤ `Run`. The Simulator window
    appears, displaying the root view screen with the `Action` icon in the upper right
    corner.


    50.  Click the screen. The next view appears. Notice that this second view displays
    the `Back` button.


    51.  Click the `Done` button in the upper right corner. An alert controller appears.


    52.  Click `OK` to dismiss the alert controller.


    53.  Choose `Simulator` ➤ `Quit Simulator` to return to Xcode.


    Before you can add `Bar Button Items` to a navigation bar on anything other than
    the root view, you need to first add a navigation item. Then you can add a bar
    button onto this navigation item.


    ## Summary


    A `Navigation Controller` always needs exactly one root view. To link to other
    views, you need to create segues. When you create a segue, you must also give
    that segue an identifier name. Then to display the next `View Controller` connected
    to a segue, you use this line of code where you replace `“Link Identifier”` with
    the identifier name you give to your segue:


    ```

    performSegue(withIdentifier: "Link Identifier", sender: self)

    ```


    The `Navigation Controller` takes care of automatically displaying a navigation
    bar on any `View Controller` that it displays. This navigation bar displays a
    `Back` button in the upper left corner. By default, this `Back` button displays
    `“Back”`, but if the previous `View Controller` has a title, this `Back` button
    will display that title. You can also define `Back` button text if you wish.


    Since a `Navigation Controller` can display multiple `View Controllers`, you can
    pass data from one `View Controller` to another. That way information retrieved
    from one view can be used and displayed in another view.


    To make a `Navigation Controller` look more appealing, you can change the color
    of the navigation bar or add `Bar Button Items`. You can link these bar buttons
    to `IBAction` methods and display any text on them that you wish. As a shortcut,
    Xcode can also display icons and common button titles (such as `Done` or `Cancel`)
    on bar buttons.


    A `Navigation Controller` can display a list of `View Controllers` sequentially.
    Whenever you need to group related `View Controllers` together and display them
    one after another, use a `Navigation Controller`.


    # 18. Using Tab Bars and Tool Bars


    Like a `Navigation Controller`, a `Tab Bar Controller` also groups related `View
    Controllers` together. The main difference is that a `Navigation Controller` can
    only display `View Controllers` in sequential order. On the other hand, a `Tab
    Bar Controller` can jump to another `View Controller` directly.


    While a `Navigation Controller` always displays a navigation bar and a `Back`
    button on every `View Controller` it opens, a `Tab Bar Controller` always displays
    a list of icons at the bottom of the screen where each icon represents a different
    `View Controller`. By tapping on an icon, the user can jump to that particular
    `View Controller` right away. Then the user can return to the `Tab Bar Controller`
    again to see the list of icons representing the other `View Controllers` as shown
    in Figure [18-1](#329781_5_En_18_Chapter.xhtml#Fig1).


    ### Note


    Because a `Tab Bar Controller` can only display a limited number of icons at the
    bottom of the screen, this tends to limit the number of `View Controllers` that
    the `Tab Bar Controller` can contain. As a general rule, five icons is usually
    the maximum number to appear on a `Tab bar` to look aesthetically pleasing on
    an iPhone in portrait orientation.


    ![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig1_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig1_HTML.jpg)


    Figure 18-1


    A `Tab bar Controller` displays icons that represent multiple views


    Similar to a `Tab bar` is a `Toolbar`. While a `Tab bar` is strictly for navigating
    to different views, a `Toolbar` displays icons that represent actions that the
    user may want to perform. Many of the apps that come with iOS display a `Toolbar`
    at the bottom of the screen such as `Mail` and the `Photos` app, which can delete
    a selected message or photo as shown in Figure [18-2](#329781_5_En_18_Chapter.xhtml#Fig2).


    ![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig2_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig2_HTML.jpg)


    Figure 18-2


    Many apps display a `Toolbar` at the bottom of the screen


    Both `tab` and `Toolbars` are limited by the number of icons that can comfortably
    appear at any given time. The more icons, the more cluttered the `Tab bar` appearance
    and the harder it will be for a user to tap the right icon. As a general rule,
    don’t display too many icons on a `Tab bar` that will make finding or choosing
    any particular icon too difficult for the user.


    The main differences between a `Tab Bar bar` and a `Tool Bar` are


    *   A `Tab Bar` displays different `View Controllers`.


    *   A `Tool Bar` runs different commands.'
