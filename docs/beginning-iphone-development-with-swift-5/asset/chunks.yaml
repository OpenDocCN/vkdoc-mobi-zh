    \ IBAction method. In most cases, it’s better to restrict an IBAction method to\
    \ specific types of objects such as UIButton.\n\nBesides reducing the risk that\
    \ an unintended object could connect to an IBAction method, restricting an IBAction\
    \ method to a specific object type also lets you access that specific object’s\
    \ properties. For example, an IBAction method linked only to UIButtons will then\
    \ be able to access all the properties that a UIButton object contains such as\
    \ titleLabel.text.\n\nBefore we link the two existing buttons to a new IBAction\
    \ method, we need to break the connection between the current IBAction method\
    \ in the Connections Inspector pane. After we break the connection between an\
    \ IBOutlet and an IBAction method, we can delete the actual IBOutlet or IBAction\
    \ method in the .swift file.\n\n### Note\n\nJust deleting an IBOutlet variable\
    \ or IBAction method will not break its link to an object on the user interface.\
    \ You must break the actual link in the Connections Inspector pane. If you fail\
    \ to break the link in the Connections Inspector pane, running your app will not\
    \ work and Xcode will display an error message.\n\nTo see how to break a connection\
    \ between an existing IBAction method and a user interface object and create an\
    \ IBAction method for specific types of objects only, follow these steps:\n\n\
    1.  Make sure the IBActionApp project is loaded in Xcode.\n\n2.  Click the Main.storyboard\
    \ file in the Navigator pane.\n\n3.  Click the button titled “First” to select\
    \ it.\n\n4.  Choose View ➤ Inspectors ➤ Show Connections Inspector, or click the\
    \ Connections Inspector icon in the upper right corner of the Xcode window. The\
    \ Connections Inspector pane appears, showing all IBOutlets and IBAction methods\
    \ linked to the selected object. In Figure [10-13](#329781_5_En_10_Chapter.xhtml#Fig13),\
    \ the selected button is linked to an IBAction method called buttonTapped, which\
    \ responds to the Touch Up Inside event.\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig13_HTML.jpg](images/329781_5_En_10_Chapter/329781_5_En_10_Fig13_HTML.jpg)\n\
    \nFigure 10-13\n\nThe Connections Inspector pane displays all links to IBOutlets\
    \ and IBAction methods\n\n5.  Click the Close icon (X) that appears to the left\
    \ of View Controller buttonTapped. This breaks the link between the selected button\
    \ and the buttonTapped IBAction method stored in the ViewController.swift file.\n\
    \n6.  Click the button titled “Second” to select it.\n\n7.  Click the Close icon\
    \ (X) that appears to the left of View Controller buttonTapped. This breaks the\
    \ link between the second button and the buttonTapped IBAction method stored in\
    \ the ViewController.swift file.\n\n8.  Choose View ➤ Assistant Editor ➤ Show\
    \ Assistant Editor, or click the Assistant Editor icon. Xcode displays the Main.storyboard\
    \ and ViewController.swift file side by side.\n\n9.  Move the mouse pointer over\
    \ the button titled “First”, hold down the Control key, and Ctrl-drag the mouse\
    \ above the last curly bracket at the bottom of the ViewController.swift file.\n\
    \n10.  Release the Control key and the left mouse button. A popup window appears.\n\
    \n11.  Click in the Name text field, type **buttonRespond**, click the Type popup\
    \ menu to choose UIButton, and click the Connect button. Xcode creates an IBAction\
    \ method as follows:\n\n```\n    @IBAction func buttonRespond(_ sender: UIButton)\
    \ {\n    }\n    ```\n\n12.  Move the mouse pointer over the button titled “First”,\
    \ hold down the Control key, and Ctrl-drag the mouse over the buttonRespond IBAction\
    \ method to highlight it as shown in Figure [10-14](#329781_5_En_10_Chapter.xhtml#Fig14)\
    \ .\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig14_HTML.jpg](images/329781_5_En_10_Chapter/329781_5_En_10_Fig14_HTML.jpg)\n\
    \nFigure 10-14\n\nConnecting a button to an existing IBAction method\n\n13.  Release\
    \ the Control key and the left mouse button.\n\n14.  Edit the buttonRespond IBAction\
    \ method as follows:\n\n```\n    @IBAction func buttonRespond(_ sender: UIButton)\
    \ {\n    switch sender.tag {\n    case 1:\n    labelResult.text = sender.titleLabel?.text\n\
    \    case 2:\n    labelResult.text = sender.titleLabel?.text\n    default:\n \
    \   labelResult.text = \"Default\"\n    }\n    }\n    ```\n\nThe entire ViewController.swift\
    \ file should look like this:\n\n```\n    import UIKit\n    class ViewController:\
    \ UIViewController {\n    @IBOutlet var labelResult: UILabel!\n    override func\
    \ viewDidLoad() {\n    super.viewDidLoad()\n    labelResult.frame.size.width =\
    \ 120\n    // Do any additional setup after loading the view, typically from a\
    \ nib.\n    }\n    @IBAction func buttonTapped(_ sender: Any) {\n    switch (sender\
    \ as AnyObject).tag {\n    case 1:\n    labelResult.text = \"Button 1\"\n    case\
    \ 2:\n    labelResult.text = \"Button 2\"\n    default:\n    labelResult.text\
    \ = \"Default\"\n    }\n    }\n    @IBAction func buttonRespond(_ sender: UIButton)\
    \ {\n    switch sender.tag {\n    case 1:\n    labelResult.text = sender.titleLabel?.text\n\
    \    case 2:\n    labelResult.text = sender.titleLabel?.text\n    default:\n \
    \   labelResult.text = \"Default\"\n    }\n    }\n    }\n    ```\n\n15.  Click\
    \ the Run button or choose Product ➤ Run. The Simulator screen appears.\n\n16.\
    \  Click the button titled “First”. Notice that the label displays “First”.\n\n\
    17.  Click the button titled “Second”. Notice that the label displays “Second”.\n\
    \n18.  Chose Simulator ➤ Quit Simulator to return to Xcode.\n\n## Summary\n\n\
    Buttons, switches, and segmented controls offer ways for users to control an app.\
    \ By using the Inspector pane or Swift code, you can modify buttons, switches,\
    \ and segmented controls to customize them for your particular app.\n\nButtons\
    \ represent a single command. Switches let users choose exactly two settings,\
    \ on (true) and off (false). Segmented controls act like multiple buttons but\
    \ take up less space than multiple buttons.\n\nTypically you link a button, switch,\
    \ or segmented control to a single IBAction method. However, you can connect two\
    \ or more objects to a single IBAction method. When creating an IBAction method,\
    \ you can allow any type of object to connect to it or you can define that only\
    \ a specific type of object (such as a UIButton) can connect to the IBAction method.\
    \ If you define that only a specific type of object can connect to an IBAction\
    \ method, then you’ll be able to access properties of that object.\n\nOnce you\
    \ connect an object to an IBOutlet or IBAction method, you can always break that\
    \ connection later. You must break that connection in the Connections Inspector\
    \ pane. If you fail to break a connection and later delete an IBOutlet or IBAction\
    \ method, then Xcode will give an error message if you try to run the app."
  trans: "\n在前面的示例中，两个按钮连接到同一个 `IBAction` 方法，但由于 `IBAction` 的类型是 `Any`，你可以将任何对象连接到这个\
    \ `IBAction` 方法。在大多数情况下，最好将 `IBAction` 方法限制为特定类型的对象，例如 `UIButton`。\n\n除了降低非预期对象连接到\
    \ `IBAction` 方法的风险外，将 `IBAction` 方法限制为特定对象类型还能让你访问该特定对象的属性。例如，一个仅链接到 `UIButton`\
    \ 的 `IBAction` 方法将能访问 `UIButton` 对象包含的所有属性，例如 `titleLabel.text`。\n\n在我们把现有的两个按钮链接到新的\
    \ `IBAction` 方法之前，需要先断开它们在连接检查器面板中与当前 `IBAction` 方法的连接。断开 `IBOutlet` 与 `IBAction`\
    \ 方法的连接后，我们可以删除 `.swift` 文件中实际的 `IBOutlet` 或 `IBAction` 方法。\n\n### 注意\n\n仅仅删除\
    \ `IBOutlet` 变量或 `IBAction` 方法并不会断开它与用户界面对象的链接。你必须在连接检查器面板中实际断开链接。如果未能在连接检查器面板中断开链接，运行你的应用将不会正常工作，并且\
    \ Xcode 会显示一条错误信息。\n\n要了解如何断开现有 `IBAction` 方法与用户界面对象的连接，并仅为特定类型的对象创建一个 `IBAction`\
    \ 方法，请遵循以下步骤：\n\n1.  确保 `IBActionApp` 项目已在 Xcode 中加载。\n\n2.  在导航器面板中点击 `Main.storyboard`\
    \ 文件。\n\n3.  点击标题为“First”的按钮以选中它。\n\n4.  选择“视图”➤“检查器”➤“显示连接检查器”，或者点击 Xcode 窗口右上角的连接检查器图标。此时会出现连接检查器面板，显示链接到所选对象的所有\
    \ `IBOutlet` 和 `IBAction` 方法。在图 10-13 中，选中的按钮链接到一个名为 `buttonTapped` 的 `IBAction`\
    \ 方法，该方法响应“Touch Up Inside”事件。\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig13_HTML.jpg](img/329781_5_En_10_Fig13_HTML.jpg)\n\
    \n图 10-13\n\n连接检查器面板显示所有与 `IBOutlet` 和 `IBAction` 方法的链接\n\n5.  点击视图控制器 `buttonTapped`\
    \ 左侧出现的关闭图标 (X)。这将断开所选按钮与存储在 `ViewController.swift` 文件中的 `buttonTapped` `IBAction`\
    \ 方法之间的链接。\n\n6.  点击标题为“Second”的按钮以选中它。\n\n7.  点击视图控制器 `buttonTapped` 左侧出现的关闭图标\
    \ (X)。这将断开第二个按钮与存储在 `ViewController.swift` 文件中的 `buttonTapped` `IBAction` 方法之间的链接。\n\
    \n8.  选择“视图”➤“辅助编辑器”➤“显示辅助编辑器”，或者点击辅助编辑器图标。Xcode 会并排显示 `Main.storyboard` 和 `ViewController.swift`\
    \ 文件。\n\n9.  将鼠标指针移到标题为“First”的按钮上，按住 Control 键，然后按住 Control 键将鼠标拖拽到 `ViewController.swift`\
    \ 文件底部最后一个大括号的上方。\n\n10. 松开 Control 键和鼠标左键。此时会弹出一个窗口。\n\n11. 点击“名称”文本字段，输入 `buttonRespond`，点击“类型”弹出菜单并选择\
    \ `UIButton`，然后点击“连接”按钮。Xcode 会创建一个如下的 `IBAction` 方法：\n\n```\n    @IBAction func\
    \ buttonRespond(_ sender: UIButton) {\n    }\n    ```\n\n12. 将鼠标指针移到标题为“First”的按钮上，按住\
    \ Control 键，然后按住 Control 键将鼠标拖拽到 `buttonRespond` `IBAction` 方法上并将其高亮显示，如图 10-14\
    \ 所示。\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig14_HTML.jpg](img/329781_5_En_10_Fig14_HTML.jpg)\n\
    \n图 10-14\n\n将按钮连接到现有的 `IBAction` 方法\n\n13. 松开 Control 键和鼠标左键。\n\n14. 将 `buttonRespond`\
    \ `IBAction` 方法编辑如下：\n\n```\n    @IBAction func buttonRespond(_ sender: UIButton)\
    \ {\n    switch sender.tag {\n    case 1:\n    labelResult.text = sender.titleLabel?.text\n\
    \    case 2:\n    labelResult.text = sender.titleLabel?.text\n    default:\n \
    \   labelResult.text = \"Default\"\n    }\n    }\n    ```\n\n整个 `ViewController.swift`\
    \ 文件应如下所示：\n\n```\n    import UIKit\n    class ViewController: UIViewController\
    \ {\n    @IBOutlet var labelResult: UILabel!\n    override func viewDidLoad()\
    \ {\n    super.viewDidLoad()\n    labelResult.frame.size.width = 120\n    // 加载视图后的任何额外设置（通常来自\
    \ nib 文件）\n    }\n    @IBAction func buttonTapped(_ sender: Any) {\n    switch\
    \ (sender as AnyObject).tag {\n    case 1:\n    labelResult.text = \"Button 1\"\
    \n    case 2:\n    labelResult.text = \"Button 2\"\n    default:\n    labelResult.text\
    \ = \"Default\"\n    }\n    }\n    @IBAction func buttonRespond(_ sender: UIButton)\
    \ {\n    switch sender.tag {\n    case 1:\n    labelResult.text = sender.titleLabel?.text\n\
    \    case 2:\n    labelResult.text = sender.titleLabel?.text\n    default:\n \
    \   labelResult.text = \"Default\"\n    }\n    }\n    }\n    ```\n\n15. 点击“运行”按钮或选择“产品”➤“运行”。模拟器屏幕会出现。\n\
    \n16. 点击标题为“First”的按钮。注意标签显示为“First”。\n\n17. 点击标题为“Second”的按钮。注意标签显示为“Second”。\n\
    \n18. 选择“模拟器”➤“退出模拟器”以返回 Xcode。\n\n## 总结\n\n按钮、开关和分段控件为用户提供了控制应用的方式。通过使用检查器面板或\
    \ Swift 代码，你可以修改按钮、开关和分段控件，为你的特定应用进行自定义。\n\n按钮代表单个命令。开关允许用户恰好选择两种设置：开（true）和关（false）。分段控件的作用类似于多个按钮，但比多个按钮占用更少的空间。\n\
    \n通常，你会将一个按钮、开关或分段控件链接到单个 `IBAction` 方法。但是，你可以将两个或更多对象连接到同一个 `IBAction` 方法。创建\
    \ `IBAction` 方法时，你可以允许任何类型的对象连接到它，也可以定义只有特定类型的对象（例如 `UIButton`）才能连接到该 `IBAction`\
    \ 方法。如果定义只有特定类型的对象可以连接到 `IBAction` 方法，那么你将能够访问该对象的属性。\n\n一旦将对象连接到 `IBOutlet` 或\
    \ `IBAction` 方法，你随时可以断开该连接。你必须在连接检查器面板中断开该连接。如果未能断开连接，并在之后删除了 `IBOutlet` 或 `IBAction`\
    \ 方法，那么当你尝试运行应用时，Xcode 会显示一条错误信息。\n"
- fmt: '# 11. Touch Gestures


    Allowing the user to control an app through buttons, switches, or segmented controls
    is handy, but all of these controls take up space on the screen. To eliminate
    the need for extra objects on the user interface, your app can also detect and
    respond to touch gestures that allow direct manipulation of items displayed on
    the screen.


    The different types of touch gestures that an iOS app can detect and respond to
    include:


    * **Tap** – A fingertip touches the screen and lifts up.

    * **Pinch** – Two fingertips come together or move apart.

    * **Rotation** – Two fingertips rotate left or right in a circular motion.

    * **Pan** – A fingertip slides in a dragging motion across the screen.

    * **Swipe** – A fingertip slides up, down, left, or right across the screen and
    lifts up.

    * **Screen edge pan** – A fingertip slides in a dragging motion that starts near
    the edge of the screen.

    * **Long press** – A fingertip touches and presses down on the screen.


    You can create touch gestures on an app’s user interface solely through Swift
    code or by placing gesture recognizer objects on a view from the Object Library
    as shown in Figure [11-1](#329781_5_En_11_Chapter.xhtml#Fig1).


    ![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig1_HTML.jpg](images/329781_5_En_11_Chapter/329781_5_En_11_Fig1_HTML.jpg)


    Figure 11-1. The list of gestures available in the Object Library window


    To detect gestures in an app, you need to do the following:


    * Add a gesture recognizer to a view.

    * Create an `IBAction` method to respond to the gesture.

    * Define which object needs to respond to the gesture.


    ## Detecting Tap Gestures


    Tap gestures simply detect when a user taps on the screen. By default, a tap gesture
    recognizes a single tap by one fingertip, but you can define multiple taps by
    two or more fingertips.


    To see how to detect tap gestures, follow these steps:


    1. Create a new iOS project using the Single View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml))
    and name this new project `TapApp`. This creates a single view for the user interface.

    2. Click the `Main.storyboard` file in the Navigator pane. Xcode displays the
    single view.

    3. Click the Library icon to open the Object Library window and look for the Tap
    Gesture Recognizer as shown in Figure [11-2](#329781_5_En_11_Chapter.xhtml#Fig2).


    ![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig2_HTML.jpg](images/329781_5_En_11_Chapter/329781_5_En_11_Fig2_HTML.jpg)


    Figure 11-2. The Tap Gesture Recognizer in the Object Library


    4. Drag and drop a Tap Gesture Recognizer anywhere on the view. Notice that a
    gesture recognizer doesn’t appear directly on the view but appears at the top
    of the view and in the Document Outline as shown in Figure [11-3](#329781_5_En_11_Chapter.xhtml#Fig3).


    ![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig3_HTML.jpg](images/329781_5_En_11_Chapter/329781_5_En_11_Fig3_HTML.jpg)


    Figure 11-3. A Tap Gesture Recognizer appears in the Document Outline and at the
    top of the View Controller


    5. Click the Tap Gesture Recognizer in the Document Outline or at the top of the
    View Controller.

    6. Choose View ➤ Inspectors ➤ Show Attributes Inspector, or click the Attributes
    Inspector icon in the upper right corner of the Xcode window. Notice that the
    Attributes Inspector lets you define how many taps and touches (fingertips) needed
    to recognize a tap gesture. By default, a tap gesture only requires 1 tap with
    1 touch (fingertip) as shown in Figure [11-4](#329781_5_En_11_Chapter.xhtml#Fig4).


    ![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig4_HTML.jpg](images/329781_5_En_11_Chapter/329781_5_En_11_Fig4_HTML.jpg)


    Figure 11-4. A Tap Gesture Recognizer appears in the Document Outline and at the
    top of the View Controller


    7. Click the Library icon to open the Object Library window and drag and drop
    two labels anywhere on the view.

    8. Double-click one label and type **Visual Solution** and press ENTER.

    9. Double-click the other label and type **Programmatic Solution** and press ENTER.

    10. Choose Editor ➤ Resolve Auto Layout Issues ➤ Reset to Suggested Constraints
    at the bottom half of the submenu. Xcode adds constraints to both labels.

    11. Click the **Visual Solution** label and choose View ➤ Inspectors ➤ Show Attributes
    Inspector, or click the Attributes Inspector icon in the upper right corner of
    the Xcode window.

    12. Select the **User Interaction Enabled** check box as shown in Figure [11-5](#329781_5_En_11_Chapter.xhtml#Fig5).
    With **User Interaction Enabled** selected, the label can respond to the user
    touching it.


    ![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig5_HTML.jpg](images/329781_5_En_11_Chapter/329781_5_En_11_Fig5_HTML.jpg)


    Figure 11-5. Selecting the **User Interaction Enabled** check box


    13. Move the mouse pointer over the **Visual Solution** label, hold down the Control
    key, and Ctrl-drag from the label to the Tap Gesture Recognizer in the Document
    Outline or above the View Controller as shown in Figure [11-6](#329781_5_En_11_Chapter.xhtml#Fig6).


    ![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig6_HTML.jpg](images/329781_5_En_11_Chapter/329781_5_En_11_Fig6_HTML.jpg)


    Figure 11-6. Ctrl-dragging from the label to the Tap Gesture Recognizer links
    the label to the tap gesture


    14. Release the Control key and the left mouse button. A popup menu appears as
    shown in Figure [11-7](#329781_5_En_11_Chapter.xhtml#Fig7).


    ![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig7_HTML.jpg](images/329781_5_En_11_Chapter/329781_5_En_11_Fig7_HTML.jpg)


    Figure 11-7. A popup menu lets you choose what to connect to the label


    15. Click `gestureRecognizers`.'
