  trans: '

    # 在 Storyboard 中添加分视图控制器


    了解 `Split View Controller` 在不同 iOS 设备和方向下的行为后，接下来要学习如何创建和自定义 `Split View Controller`。一个
    `Split View Controller` 通常至少需要一张表格视图来代表主视图，以及一个 `View Controller` 来代表详细视图。


    这意味着你需要用数据填充表格视图，然后编写代码来定义 `Split View Controller` 如何在主视图和详细视图中显示数据。


    若要了解如何为 `Split View Controller` 创建 storyboard，请按以下步骤操作：


    1.  使用 Single View App 模板创建一个新的 iOS 项目（参见第 1 章），并将这个新项目命名为 `SplitViewCustomApp`。这将为用户界面创建一个单一视图。


    2.  在导航窗格中点击 `Main.storyboard`。


    3.  在文档大纲中点击 View Controller Scene，然后按 BACKSPACE 或 DELETE 键从 storyboard 中移除该 View
    Controller。


    4.  在导航窗格中点击 `ViewController.swift`，然后选择 编辑 ➤ 删除。此时会出现一个对话框，询问您希望如何删除文件。


    5.  点击“移到废纸篓”按钮。`ViewController.swift` 文件会从导航窗格中消失。


    6.  在导航窗格中点击 `Main.storyboard` 文件。


    7.  点击“库”图标以打开“对象库”窗口。


    8.  从“对象库”窗口中将一个 Split View Controller 拖放到 storyboard 上，如图 20-12 所示。


    ![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig12_HTML.jpg](img/329781_5_En_20_Fig12_HTML.jpg)


    图 20-12


    将分视图控制器拖放到 storyboard 上


    9.  在文档大纲中点击 Split View Controller Scene。


    10. 选择 视图 ➤ 检查器 ➤ 显示属性检查器，或点击 Xcode 窗口右上角的“属性检查器”图标。


    11. 选中“是初始视图控制器”复选框。Xcode 会显示一个指向 Split View Controller 的箭头。


    12. 在文档大纲中点击 View Controller Scene。


    13. 选择 编辑器 ➤ 嵌入于 ➤ 导航控制器。Xcode 将 View Controller 嵌入到一个 Navigation Controller 中。这将使
    View Controller 能够滑入和滑出，但我们需要在表格单元格和这个 Navigation Controller 之间创建一个转场，以便用户在点击表格单元格时，显示此
    Navigation Controller 内的 View Controller。


    14. 在文档大纲的 Root View Controller Scene 下，点击 Table View 下方的 Table View Cell。


    15. 选择 视图 ➤ 检查器 ➤ 显示属性检查器，或点击 Xcode 窗口右上角的“属性检查器”图标。


    16. 点击标识符文本字段，输入 `customCell`，然后按 ENTER 键。Xcode 会将文档大纲中的 Table View Cell 名称更改为
    `customCell`。


    17. 将鼠标指针移动到文档大纲中的 `customCell` 上，按住 Control 键，然后从 `customCell` 按住 Control 键拖动到嵌入了空白
    View Controller 的 Navigation Controller 上，如图 20-13 所示。


    ![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig13_HTML.jpg](img/329781_5_En_20_Fig13_HTML.jpg)


    图 20-13


    在表格视图单元格和导航控制器之间创建转场


    18. 松开 Control 键和鼠标左键。此时会出现一个弹出菜单，如图 20-14 所示。


    ![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig14_HTML.jpg](img/329781_5_En_20_Fig14_HTML.jpg)


    图 20-14


    转场弹出菜单


    19. 选择“显示详细信息”。Xcode 会在 Table View Cell（名为 `customCell`）和嵌入了空白 View Controller
    的 Navigation Controller 之间创建一个转场。


    20. 在文档大纲中点击“showDetail”至“Navigation Controller”的 Show Detail 转场。这将选中从 Table View
    Cell (`customCell`) 到 Navigation Controller 的转场。


    21. 选择 视图 ➤ 检查器 ➤ 显示属性检查器，或点击 Xcode 窗口右上角的“属性检查器”图标。


    22. 点击标识符文本字段，输入 `showDetail`，然后按 ENTER 键，如图 20-15 所示。


    ![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig15_HTML.jpg](img/329781_5_En_20_Fig15_HTML.jpg)


    图 20-15


    为表格视图单元格和导航控制器之间的转场定义标识符名称


    23. 在文档大纲中，点击 View Controller Scene 下的 View。


    24. 选择 视图 ➤ 检查器 ➤ 显示属性检查器，或点击 Xcode 窗口右上角的“属性检查器”图标。


    25. 点击背景弹出菜单，选择一种不同的颜色（例如黄色），以便在应用运行时更容易识别此 View Controller。


    26. 点击“库”图标以打开“对象库”窗口。


    27. 将一个标签拖放到您刚刚修改过的、显示背景颜色（如黄色）的视图中央。


    28. 点击 Xcode 窗口底部的“对齐”图标，显示一个弹出窗口。


    29. 选中“在容器中水平居中”和“在容器中垂直居中”复选框。然后点击“添加 2 个约束”按钮。


    至此，Split View Controller 的 storyboard 就完成了。现在我们需要为 Split View Controller 的主视图和详细视图创建
    `.swift` 文件。

    '
- fmt: "### Creating Class Files\n\nWith a Split View Controller, you need two .swift\
    \ class files, one for the table view (`UITableViewController`) and one for the\
    \ View Controller (`UIViewController`). The `UITableViewController` .swift file\
    \ defines the master view that fills the table view rows with data and then detects\
    \ when the user taps on a particular row. The `UIViewController` .swift file displays\
    \ data on the View Controller that represents the detail view.\n\nTo create two\
    \ .swift class files, follow these steps:\n\n1. Make sure the `SplitViewCustomApp`\
    \ is loaded into Xcode.\n2. Choose File ➤ New ➤ File. A dialog appears displaying\
    \ different templates available.\n3. Click Cocoa Touch Class under the iOS category\
    \ and click the **Next** button. Another window appears, asking for a class name\
    \ and subclass type.\n4. Click in the Class text field and type `MasterTableViewController`.\n\
    5. Click in the Subclass of popup menu and choose `UITableViewController`.\n6.\
    \ Click the **Next** button and then click the **Create** button. Xcode displays\
    \ the `MasterViewController.swift` file in the Navigator pane.\n7. Choose File\
    \ ➤ New ➤ File. A dialog appears displaying different templates available.\n8.\
    \ Click Cocoa Touch Class under the iOS category and click the **Next** button.\
    \ Another window appears, asking for a class name and subclass type.\n9. Click\
    \ in the Class text field and type `DetailViewController`.\n10. Click in the Subclass\
    \ of popup menu and choose `UIViewController`.\n11. Click the **Next** button\
    \ and then click the **Create** button. Xcode displays the `DetailViewController.swift`\
    \ file in the Navigator pane.\n12. Click the `Main.storyboard` file in the Navigator\
    \ pane. Xcode displays the storyboard.\n13. Click the Root View Controller in\
    \ the Document Outline.\n14. Choose View ➤ Inspectors ➤ Show Identity Inspector,\
    \ or click the Identity Inspector icon at the top right corner of the Xcode window.\n\
    15. Click in the Class popup menu and choose `MasterViewController` as shown in\
    \ Figure [20-16](#329781_5_En_20_Chapter.xhtml#Fig16).\n    ![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig16_HTML.jpg](images/329781_5_En_20_Chapter/329781_5_En_20_Fig16_HTML.jpg)\n\
    \    **Figure 20-16** Connecting the Root View Controller to the `MasterViewController.swift`\
    \ file\n16. Click the View Controller Scene in the Document Outline.\n17. Choose\
    \ View ➤ Inspectors ➤ Show Identity Inspector, or click the Identity Inspector\
    \ icon at the top right corner of the Xcode window.\n18. Click the Class popup\
    \ menu and choose `DetailViewController`.\n\n### Modifying the AppDelegate.swift\
    \ File\n\nThe `AppDelegate.swift` file typically monitors the app behavior such\
    \ as loading or terminating. For our example, we need the `AppDelegate.swift`\
    \ file to set up the Split View Controller. This means writing Swift code and\
    \ declaring the `AppDelegate.swift` file to be the delegate for the Split View\
    \ Controller.\n\nThat means adding these two lines of code to assign the `AppDelegate.swift`\
    \ file as the Split View Controller delegate:\n\n```\nlet splitVC = window!.rootViewController\
    \ as! UISplitViewController\nsplitVC.delegate = self\n```\n\nThe first line declares\
    \ a `splitVC` constant that represents the Split View Controller on the storyboard.\
    \ The second line makes sure that the Split View Controller (the `splitVC` constant)\
    \ knows that the `AppDelegate.swift` file is its delegate, which means that the\
    \ `AppDelegate.swift` file will contain Swift code to load the Navigation Controller\
    \ into the Split View Controller.\n\nThe Split View Controller keeps track of\
    \ all the View Controllers it can display by storing them in an array. Initially,\
    \ the Split View Controller displays the last item in this array.\n\n```\nlet\
    \ navigationVC = splitVC.viewControllers.last as? UINavigationController\n```\n\
    \nFinally, the Navigation Controller needs a left bar button, which the following\
    \ code creates:\n\n```\nnavigationVC.topViewController!.navigationItem.leftBarButtonItem\
    \ = splitVC.displayModeButtonItem\n```\n\nTo make all these changes, follow these\
    \ steps:\n\n1. Make sure the `SplitViewCustomApp` project is loaded in Xcode.\n\
    2. Click the `AppDelegate.swift` file in the Navigator pane.\n3. Edit the class\
    \ AppDelegate line as follows:\n\n```\n    class AppDelegate: UIResponder, UIApplicationDelegate,\
    \ UISplitViewControllerDelegate {\n```\n\n4. Edit the `didFinishLaunchingWithOptions`\
    \ method as follows:\n\n```\n    func application(_ application: UIApplication,\
    \ didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey:\
    \ Any]?) -> Bool {\n        let splitVC = window!.rootViewController as! UISplitViewController\n\
    \        splitVC.delegate = self\n        let navigationVC = splitVC.viewControllers.last\
    \ as? UINavigationController\n        navigationVC?.topViewController!.navigationItem.leftBarButtonItem\
    \ = splitVC.displayModeButtonItem\n        return true\n    }\n```\n\n5. Add the\
    \ following method at the bottom of the `AppDelegate.swift` file above the last\
    \ curly bracket:\n\n```\n    func splitViewController(_ splitViewController: UISplitViewController,\
    \ collapseSecondary secondaryViewController:UIViewController, onto primaryViewController:UIViewController)\
    \ -> Bool {\n        guard let secondaryAsNavController = secondaryViewController\
    \ as? UINavigationController else { return false }\n        guard let topAsDetailController\
    \ = secondaryAsNavController.topViewController as? DetailViewController else {\
    \ return false }\n        if topAsDetailController.detailItem == nil {\n     \
    \       // Return true to indicate that we have handled the collapse by doing\
    \ nothing; the secondary controller will be discarded.\n            return true\n\
    \        }\n        return false\n    }\n```\n\nThis `collapseSecondary` function\
    \ takes care of showing or hiding the detail view. The `if` statement checks if\
    \ a `detailItem` property is nil. This `detailItem` property holds the data to\
    \ appear in the detail view and will be defined in the `DetailViewController.swift`\
    \ file, so don’t worry if Xcode displays an error message for now.\n\nThe entire\
    \ `AppDelegate.swift` file should look like this:\n\n```\nimport UIKit\n@UIApplicationMain\n\
    class AppDelegate: UIResponder, UIApplicationDelegate, UISplitViewControllerDelegate\
    \ {\n    var window: UIWindow?\n    func application(_ application: UIApplication,\
    \ didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey:\
    \ Any]?) -> Bool {\n        let splitVC = window!.rootViewController as! UISplitViewController\n\
    \        splitVC.delegate = self\n        let navigationVC = splitVC.viewControllers.last\
    \ as? UINavigationController\n        navigationVC?.topViewController!.navigationItem.leftBarButtonItem\
    \ = splitVC.displayModeButtonItem\n        return true\n    }\n    func splitViewController(_\
    \ splitViewController: UISplitViewController, collapseSecondary secondaryViewController:UIViewController,\
    \ onto primaryViewController:UIViewController) -> Bool {\n        guard let secondaryAsNavController\
    \ = secondaryViewController as? UINavigationController else { return false }\n\
    \        guard let topAsDetailController = secondaryAsNavController.topViewController\
    \ as? DetailViewController else { return false }\n        if topAsDetailController.detailItem\
    \ == nil {\n            // Return true to indicate that we have handled the collapse\
    \ by doing nothing; the secondary controller will be discarded.\n            return\
    \ true\n        }\n        return false\n    }\n}\n```"
  raw: "### Creating Class Files\n\nWith a Split View Controller, you need two .swift\
    \ class files , one for the table view (UITableViewController) and one for the\
    \ View Controller (UIViewController). The UITableViewController .swift file defines\
    \ the master view that fills the table view rows with data and then detects when\
    \ the user taps on a particular row. The UIViewController .swift file displays\
    \ data on the View Controller that represents the detail view.\n\nTo create two\
    \ .swift class files, follow these steps:\n\n1.  Make sure the SplitViewCustomApp\
    \ is loaded into Xcode.\n\n2.  Choose File ➤ New ➤ File. A dialog appears displaying\
    \ different templates available.\n\n3.  Click Cocoa Touch Class under the iOS\
    \ category and click the **Next** button. Another window appears, asking for a\
    \ class name and subclass type.\n\n4.  Click in the Class text field and type\
    \ **MasterTableViewController**.\n\n5.  Click in the Subclass of popup menu and\
    \ choose UITableViewController.\n\n6.  Click the **Next** button and then click\
    \ the **Create** button. Xcode displays the MasterViewController.swift file in\
    \ the Navigator pane.\n\n7.  Choose File ➤ New ➤ File. A dialog appears displaying\
    \ different templates available.\n\n8.  Click Cocoa Touch Class under the iOS\
    \ category and click the **Next** button. Another window appears, asking for a\
    \ class name and subclass type.\n\n9.  Click in the Class text field and type\
    \ **DetailViewController**.\n\n10.  Click in the Subclass of popup menu and choose\
    \ UIViewController.\n\n11.  Click the **Next** button and then click the **Create**\
    \ button. Xcode displays the DetailViewController.swift file in the Navigator\
    \ pane.\n\n12.  Click the Main.storyboard file in the Navigator pane. Xcode displays\
    \ the storyboard.\n\n13.  Click the Root View Controller in the Document Outline.\n\
    \n14.  Choose View ➤ Inspectors ➤ Show Identity Inspector, or click the Identity\
    \ Inspector icon at the top right corner of the Xcode window.\n\n15.  Click in\
    \ the Class popup menu and choose MasterViewController as shown in Figure [20-16](#329781_5_En_20_Chapter.xhtml#Fig16).\n\
    \n    ![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig16_HTML.jpg](images/329781_5_En_20_Chapter/329781_5_En_20_Fig16_HTML.jpg)\n\
    \n    Figure 20-16\n\n    Connecting the Root View Controller to the MasterViewController.swift\
    \ file\n\n16.  Click the View Controller Scene in the Document Outline.\n\n17.\
    \  Choose View ➤ Inspectors ➤ Show Identity Inspector, or click the Identity Inspector\
    \ icon at the top right corner of the Xcode window.\n\n18.  Click the Class popup\
    \ menu and choose DetailViewController.\n\n### Modifying the AppDelegate.swift\
    \ File\n\nThe AppDelegate.swift file typically monitors the app behavior such\
    \ as loading or terminating. For our example, we need the AppDelegate.swift file\
    \ to set up the Split View Controller. This means writing Swift code and declaring\
    \ the AppDelegate.swift file to be the delegate for the Split View Controller.\n\
    \nThat means adding these two lines of code to assign the AppDelegate.swift file\
    \ as the Split View Controller delegate:\n\n```\nlet splitVC = window!.rootViewController\
    \ as! UISplitViewController\nsplitVC.delegate = self\n```\n\nThe first line declares\
    \ a splitVC constant that represents the Split View Controller on the storyboard.\
    \ The second line makes sure that the Split View Controller (the splitVC constant)\
    \ knows that the AppDelegate.swift file is its delegate, which means that the\
    \ AppDelegate.swift file will contain Swift code to load the Navigation Controller\
    \ into the Split View Controller.\n\nThe Split View Controller keeps track of\
    \ all the View Controllers it can display by storing them in an array. Initially,\
    \ the Split View Controller displays the last item in this array.\n\n```\nlet\
    \ navigationVC = splitVC.viewControllers.last as? UINavigationController\n```\n\
    \nFinally, the Navigation Controller needs a left bar button, which the following\
    \ code creates:\n\n```\nnavigationVC.topViewController!.navigationItem.leftBarButtonItem\
    \ = splitVC.displayModeButtonItem\n```\n\nTo make all these changes, follow these\
    \ steps:\n\n1.  Make sure the SplitViewCustomApp project is loaded in Xcode.\n\
    \n2.  Click the AppDelegate.swift file in the Navigator pane.\n\n3.  Edit the\
    \ class AppDelegate line as follows:\n\n```\n    class AppDelegate: UIResponder,\
    \ UIApplicationDelegate, UISplitViewControllerDelegate {\n    ```\n\n4.  Edit\
    \ the didFinishLaunchingWithOptions method as follows:\n\n```\n    func application(_\
    \ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey:\
    \ Any]?) -> Bool {\n    let splitVC = window!.rootViewController as! UISplitViewController\n\
    \    splitVC.delegate = self\n    let navigationVC = splitVC.viewControllers.last\
    \ as? UINavigationController\n    navigationVC?.topViewController!.navigationItem.leftBarButtonItem\
    \ = splitVC.displayModeButtonItem\n    return true\n    }\n    ```\n\n5.  Add\
    \ the following method at the bottom of the AppDelegate.swift file above the last\
    \ curly bracket:\n\n```\n    func splitViewController(_ splitViewController: UISplitViewController,\
    \ collapseSecondary secondaryViewController:UIViewController, onto primaryViewController:UIViewController)\
    \ -> Bool {\n    guard let secondaryAsNavController = secondaryViewController\
    \ as? UINavigationController else { return false }\n    guard let topAsDetailController\
    \ = secondaryAsNavController.topViewController as? DetailViewController else {\
    \ return false }\n    if topAsDetailController.detailItem == nil {\n    // Return\
    \ true to indicate that we have handled the collapse by doing nothing; the secondary\
    \ controller will be discarded.\n    return true\n    }\n    return false\n  \
    \  }\n    ```\n\nThis collapseSecondary function takes care of showing or hiding\
    \ the detail view. The if statement checks if a detailItem property is nil. This\
    \ detailItem property holds the data to appear in the detail view and will be\
    \ defined in the DetailViewController.swift file so don’t worry if Xcode displays\
    \ an error message for now.\n\nThe entire AppDelegate.swift file should look like\
    \ this:\n\n```\nimport UIKit\n@UIApplicationMain\nclass AppDelegate: UIResponder,\
    \ UIApplicationDelegate, UISplitViewControllerDelegate {\nvar window: UIWindow?\n\
    func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions:\
    \ [UIApplication.LaunchOptionsKey: Any]?) -> Bool {\nlet splitVC = window!.rootViewController\
    \ as! UISplitViewController\nsplitVC.delegate = self\nlet navigationVC = splitVC.viewControllers.last\
    \ as? UINavigationController\nnavigationVC?.topViewController!.navigationItem.leftBarButtonItem\
    \ = splitVC.displayModeButtonItem\nreturn true\n}\nfunc splitViewController(_\
    \ splitViewController: UISplitViewController, collapseSecondary secondaryViewController:UIViewController,\
    \ onto primaryViewController:UIViewController) -> Bool {\nguard let secondaryAsNavController\
    \ = secondaryViewController as? UINavigationController else { return false }\n\
    guard let topAsDetailController = secondaryAsNavController.topViewController as?\
    \ DetailViewController else { return false }\nif topAsDetailController.detailItem\
    \ == nil {\n// Return true to indicate that we have handled the collapse by doing\
    \ nothing; the secondary controller will be discarded.\nreturn true\n}\nreturn\
    \ false\n}\n}\n```"
  trans: "\n### 创建类文件\n\n使用分割视图控制器时，需要两个 .swift 类文件：一个用于表格视图（`UITableViewController`），另一个用于视图控制器（`UIViewController`）。`UITableViewController`\
    \ 的 .swift 文件定义了主视图，负责用数据填充表格视图的行，并检测用户何时点击特定行。而 `UIViewController` 的 .swift 文件则负责在代表详细视图的视图控制器上显示数据。\n\
    \n要创建两个 .swift 类文件，请按以下步骤操作：\n\n1. 确保 `SplitViewCustomApp` 已加载到 Xcode 中。\n2. 选择\
    \ File ➤ New ➤ File。将出现一个对话框，显示可用的不同模板。\n3. 点击 iOS 类别下的 Cocoa Touch Class，然后点击\
    \ **Next** 按钮。将出现另一个窗口，要求输入类名和子类类型。\n4. 在 Class 文本字段中点击并输入 `MasterTableViewController`。\n\
    5. 在 Subclass of 弹出菜单中点击并选择 `UITableViewController`。\n6. 点击 **Next** 按钮，然后点击 **Create**\
    \ 按钮。Xcode 会在导航器面板中显示 `MasterViewController.swift` 文件。\n7. 选择 File ➤ New ➤ File。将出现一个对话框，显示可用的不同模板。\n\
    8. 点击 iOS 类别下的 Cocoa Touch Class，然后点击 **Next** 按钮。将出现另一个窗口，要求输入类名和子类类型。\n9. 在\
    \ Class 文本字段中点击并输入 `DetailViewController`。\n10. 在 Subclass of 弹出菜单中点击并选择 `UIViewController`。\n\
    11. 点击 **Next** 按钮，然后点击 **Create** 按钮。Xcode 会在导航器面板中显示 `DetailViewController.swift`\
    \ 文件。\n12. 在导航器面板中点击 `Main.storyboard` 文件。Xcode 会显示故事板。\n13. 在文档大纲中点击根视图控制器。\n\
    14. 选择 View ➤ Inspectors ➤ Show Identity Inspector，或点击 Xcode 窗口右上角的身份检查器图标。\n\
    15. 在 Class 弹出菜单中点击并选择 `MasterViewController`，如图 20-16 所示。\n    ![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig16_HTML.jpg](img/329781_5_En_20_Fig16_HTML.jpg)\n\
    \    **图 20-16** 将根视图控制器连接到 `MasterViewController.swift` 文件\n16. 在文档大纲中点击视图控制器场景。\n\
    17. 选择 View ➤ Inspectors ➤ Show Identity Inspector，或点击 Xcode 窗口右上角的身份检查器图标。\n\
    18. 点击 Class 弹出菜单并选择 `DetailViewController`。\n\n### 修改 AppDelegate.swift 文件\n\n\
    `AppDelegate.swift` 文件通常监控应用的行为，例如加载或终止。在我们的示例中，需要 `AppDelegate.swift` 文件来设置分割视图控制器。这意味着要编写\
    \ Swift 代码，并将 `AppDelegate.swift` 文件声明为分割视图控制器的代理。\n\n也就是说，需要添加以下两行代码，将 `AppDelegate.swift`\
    \ 文件指定为分割视图控制器的代理：\n\n```\nlet splitVC = window!.rootViewController as! UISplitViewController\n\
    splitVC.delegate = self\n```\n\n第一行声明了一个 `splitVC` 常量，它代表故事板上的分割视图控制器。第二行确保分割视图控制器（`splitVC`\
    \ 常量）知道 `AppDelegate.swift` 文件是它的代理，这意味着 `AppDelegate.swift` 文件将包含用于将导航控制器加载到分割视图控制器中的\
    \ Swift 代码。\n\n分割视图控制器通过将可显示的所有视图控制器存储在一个数组中来进行跟踪。最初，分割视图控制器会显示该数组中的最后一个项。\n\n\
    ```\nlet navigationVC = splitVC.viewControllers.last as? UINavigationController\n\
    ```\n\n最后，导航控制器需要一个左侧栏按钮，以下代码可以创建该按钮：\n\n```\nnavigationVC.topViewController!.navigationItem.leftBarButtonItem\
    \ = splitVC.displayModeButtonItem\n```\n\n要进行所有这些更改，请按以下步骤操作：\n\n1. 确保 `SplitViewCustomApp`\
    \ 项目已加载到 Xcode 中。\n2. 在导航器面板中点击 `AppDelegate.swift` 文件。\n3. 按如下方式编辑类 AppDelegate\
    \ 行：\n\n```\n    class AppDelegate: UIResponder, UIApplicationDelegate, UISplitViewControllerDelegate\
    \ {\n```\n\n4. 按如下方式编辑 `didFinishLaunchingWithOptions` 方法：\n\n```\n    func application(_\
    \ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey:\
    \ Any]?) -> Bool {\n        let splitVC = window!.rootViewController as! UISplitViewController\n\
    \        splitVC.delegate = self\n        let navigationVC = splitVC.viewControllers.last\
    \ as? UINavigationController\n        navigationVC?.topViewController!.navigationItem.leftBarButtonItem\
    \ = splitVC.displayModeButtonItem\n        return true\n    }\n```\n\n5. 在 `AppDelegate.swift`\
    \ 文件末尾、最后一个花括号之前添加以下方法：\n\n```\n    func splitViewController(_ splitViewController:\
    \ UISplitViewController, collapseSecondary secondaryViewController:UIViewController,\
    \ onto primaryViewController:UIViewController) -> Bool {\n        guard let secondaryAsNavController\
    \ = secondaryViewController as? UINavigationController else { return false }\n\
    \        guard let topAsDetailController = secondaryAsNavController.topViewController\
    \ as? DetailViewController else { return false }\n        if topAsDetailController.detailItem\
    \ == nil {\n            // 返回 true 表示已通过不做任何操作来处理折叠；次要控制器将被丢弃。\n            return\
    \ true\n        }\n        return false\n    }\n```\n\n这个 `collapseSecondary`\
    \ 函数负责显示或隐藏详细视图。`if` 语句检查 `detailItem` 属性是否为空。这个 `detailItem` 属性保存要在详细视图中显示的数据，并将在\
    \ `DetailViewController.swift` 文件中定义，因此如果 Xcode 现在显示错误消息，不必担心。\n\n整个 `AppDelegate.swift`\
    \ 文件应如下所示：\n\n```\nimport UIKit\n@UIApplicationMain\nclass AppDelegate: UIResponder,\
    \ UIApplicationDelegate, UISplitViewControllerDelegate {\n    var window: UIWindow?\n\
    \    func application(_ application: UIApplication, didFinishLaunchingWithOptions\
    \ launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {\n        let\
    \ splitVC = window!.rootViewController as! UISplitViewController\n        splitVC.delegate\
    \ = self\n        let navigationVC = splitVC.viewControllers.last as? UINavigationController\n\
    \        navigationVC?.topViewController!.navigationItem.leftBarButtonItem = splitVC.displayModeButtonItem\n\
    \        return true\n    }\n    func splitViewController(_ splitViewController:\
    \ UISplitViewController, collapseSecondary secondaryViewController:UIViewController,\
    \ onto primaryViewController:UIViewController) -> Bool {\n        guard let secondaryAsNavController\
    \ = secondaryViewController as? UINavigationController else { return false }\n\
    \        guard let topAsDetailController = secondaryAsNavController.topViewController\
    \ as? DetailViewController else { return false }\n        if topAsDetailController.detailItem\
    \ == nil {\n            // 返回 true 表示已通过不做任何操作来处理折叠；次要控制器将被丢弃。\n            return\
    \ true\n        }\n        return false\n    }\n}\n```\n"
- fmt: "### Modifying the `DetailViewController.swift` File\n\nThe `DetailViewController.swift`\
    \ file displays the user’s selection. Right now the detail View Controller displays\
    \ a label, but this label needs to be connected to an `IBOutlet` so Swift code\
    \ can display data in that label.\n\nIn addition, the `DetailViewController.swift`\
    \ file also needs to define a `detailItem` property. This `detailItem` property\
    \ stores data sent from the `MasterTableViewController.swift` file, which defines\
    \ the item in the table view row that the user selected. This data needs to be\
    \ displayed in the label when the detail View Controller first loads and each\
    \ time when the user selects a different item in the table view.\n\nTo modify\
    \ the `DetailViewController.swift` file, follow these steps:\n\n1. Make sure the\
    \ `SplitViewCustomApp` project is loaded in Xcode.\n2. Click the `Main.storyboard`\
    \ file in the Navigator pane.\n3. Click the Detail View Controller Scene in the\
    \ Document Outline.\n4. Choose View ➤ Assistant Editor ➤ Show Assistant Editor,\
    \ or click the Assistant Editor icon in the upper right corner of the Xcode window.\
    \ This displays the `Main.storyboard` and `DetailViewController.swift` file side\
    \ by side.\n5. Move the mouse over the Label under the Detail View Controller\
    \ Scene in the Document Outline, hold down the Control key, and Ctrl-drag to the\
    \ “class `DetailViewController`” line in the `DetailViewController.swift` file.\n\
    6. Release the Control key and the left mouse button. A popup window appears.\n\
    7. Click in the Name text field, type `petLabel`, and click the Connect button.\
    \ Xcode creates an `IBOutlet` as follows:\n\n    ```\n    @IBOutlet var petLabel:\
    \ UILabel!\n    ```\n\n8. Choose View ➤ Standard Editor ➤ Show Standard Editor,\
    \ or click the Standard Editor icon in the upper right corner of the Xcode window.\n\
    9. Click the `DetailViewController.swift` file in the Navigator pane.\n10. Add\
    \ the following property under the `IBOutlet`:\n\n    ```\n    var detailItem:\
    \ String? {\n        didSet {\n            configureView()\n        }\n    }\n\
    \    ```\n\n11. Add the following function under the `IBOutlet`:\n\n    ```\n\
    \    func configureView() {\n        if let label = petLabel {\n            label.text\
    \ = detailItem\n        }\n    }\n    ```\n\n12. Modify the `viewDidLoad` method\
    \ as follows:\n\n    ```\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        configureView()\n    }\n    ```\n\nWhen the view loads for the first\
    \ time, it calls the `configureView()` function, which stores the `detailItem`\
    \ data into the label. Each time the user chooses a different item in the table\
    \ view displayed on the master view, this chosen item gets stored in the `detailItem`\
    \ property.\n\nThe complete `DetailViewController.swift` file should look like\
    \ this:\n\n```\nimport UIKit\nclass DetailViewController: UIViewController {\n\
    \    @IBOutlet var petLabel: UILabel!\n    var detailItem: String? {\n       \
    \ didSet {\n            configureView()\n        }\n    }\n    func configureView()\
    \ {\n        if let label = petLabel {\n            label.text = detailItem\n\
    \        }\n    }\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        configureView()\n        // Do any additional setup after loading the\
    \ view.\n    }\n}\n```\n\n### Modifying the `MasterTableViewController.swift`\
    \ File\n\nThe `MasterTableViewController.swift` file displays a table view for\
    \ the user to select an item. That means the `MasterTableViewController.swift`\
    \ file needs to define how many sections appear in the table view (1) and how\
    \ many number of rows appear in the table view (the total array count of data)\
    \ and fill the table view with data from an array. The array simply displays a\
    \ list of strings where each string appears in a row in the table view.\n\nIn\
    \ addition to filling the table view with data, the `MasterTableViewController.swift`\
    \ file also needs to create a variable that represents the detail View Controller\
    \ and pass that detail View Controller the item selected from the table view by\
    \ using the segue defined in the storyboard.\n\nTo modify the `MasterTableViewController.swift`\
    \ file, follow these steps:\n\n1. Make sure the `SplitViewCustomApp` project is\
    \ loaded in Xcode.\n2. Click the `MasterTableViewController.swift` file in the\
    \ Navigator pane.\n3. Underneath the “class `MasterTableViewController`” line,\
    \ add the following:\n\n    ```\n    var detailVC: DetailViewController? = nil\n\
    \    let petArray = [\"cat\", \"dog\", \"parakeet\", \"parrot\", \"canary\", \"\
    finch\", \"tropical fish\", \"goldfish\", \"sea horses\", \"hamster\", \"gerbil\"\
    , \"rabbit\", \"turtle\", \"snake\", \"lizard\", \"hermit crab\"]\n    ```\n\n\
    4. Modify the `viewDidLoad()` method as follows:\n\n    ```\n    override func\
    \ viewDidLoad() {\n        super.viewDidLoad()\n        if let split = splitViewController\
    \ {\n            detailVC = (split.viewControllers.last as! UINavigationController).topViewController\
    \ as? DetailViewController\n        }\n    }\n    ```\n\n5. Add the following\
    \ method underneath the `viewDidLoad()` method:\n\n    ```\n    override func\
    \ viewWillAppear(_ animated: Bool) {\n        clearsSelectionOnViewWillAppear\
    \ = splitViewController!.isCollapsed\n        super.viewWillAppear(animated)\n\
    \    }\n    ```\n\n6. Add the following under the `viewWillAppear(_:)` method\
    \ to define the table view and fill it with data from the array:\n\n    ```\n\
    \    override func numberOfSections(in tableView: UITableView) -> Int {\n    \
    \    return 1\n    }\n    override func tableView(_ tableView: UITableView, numberOfRowsInSection\
    \ section: Int) -> Int {\n        return petArray.count\n    }\n    override func\
    \ tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell\
    \ {\n        // Make sure you define the table view's cell Identifier in the Attributes\
    \ Inspector pane\n        let cell = tableView.dequeueReusableCell(withIdentifier:\
    \ \"customCell\", for: indexPath)\n        cell.textLabel!.text = petArray[indexPath.row]\n\
    \        return cell\n    }\n    ```\n\n7. Add the following `prepare(for:sender:)`\
    \ function to retrieve data from the table view and send it to the `DetailViewController.swift`\
    \ file:\n\n    ```\n    override func prepare(for segue: UIStoryboardSegue, sender:\
    \ Any?) {\n        if segue.identifier == \"showDetail\" {\n            if let\
    \ indexPath = tableView.indexPathForSelectedRow {\n                let object\
    \ = petArray[indexPath.row]\n                let controller = (segue.destination\
    \ as! UINavigationController).topViewController as! DetailViewController\n   \
    \             controller.detailItem = object\n                controller.navigationItem.leftBarButtonItem\
    \ = splitViewController?.displayModeButtonItem\n                controller.navigationItem.leftItemsSupplementBackButton\
    \ = true\n            }\n        }\n    }\n    ```\n\n8. Click the Run button\
    \ or choose Product ➤ Run. The Simulator window appears, displaying a table view\
    \ filled with items from the `petArray`.\n9. Click any item. Notice that the detail\
    \ view displays the chosen item in its label.\n10. Choose Hardware ➤ Rotate Left.\n\
    11. Move the mouse to the left of the Simulator and drag to the right to pull\
    \ the master view out as shown in Figure [20-17](#329781_5_En_20_Chapter.xhtml#Fig17).\n\
    \n![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig17_HTML.jpg](images/329781_5_En_20_Chapter/329781_5_En_20_Fig17_HTML.jpg)\n\
    \nFigure 20-17\n\nRunning the app on a simulated iPhone in landscape orientation\n\
    \n12. Move the mouse pointer to the right of the master view and drag the mouse\
    \ to the left to collapse the master view.\n13. Choose Hardware ➤ Rotate Right.\n\
    14. Choose Simulator ➤ Quit Simulator to return to Xcode."
