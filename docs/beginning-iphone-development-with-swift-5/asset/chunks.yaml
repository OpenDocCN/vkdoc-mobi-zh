    *This book is dedicated to everyone who has an idea for an app but didn’t know
    what to do first or how to get started. First, believe in your idea. Second, trust
    that you have intelligence to achieve your dream even if you don’t know how you’ll
    get there. Third, keep learning and improving your skills all the time. Fourth,
    stay focused. Success will come one day as long as you persist and never give
    up on yourself.*


    ## About the Author and About the Technical Reviewer


    ### About the Author


    ### About the Technical Reviewer


    # 1. Understanding iOS Programming


    All programming involves the same task of writing commands for a computer to follow.
    To learn iOS programming, you need to learn three different skills:


    - How to write commands in the Swift programming language

    - How to use Apple’s software frameworks

    - How to create user interfaces in Xcode


    While it’s possible to create an entire iOS app using nothing but Swift code,
    this is a tedious, time-consuming, and error-prone method. Trying to write an
    entire iOS app in Swift means you’ll need to write code to create your user interface,
    write more code to work with the hardware of an iOS device such as an iPhone or
    iPad, and then write a third set of code to make your app actually work.


    Rather than create your user interface entirely in code, you can design your user
    interface visually in Xcode. Not only does this make creating your user interface
    easier, faster, and more consistent with the user interfaces of other iOS apps,
    but it also frees your code from relying on any particular user interface design.
    By using Xcode, you can keep your user interface separate from the code that makes
    your app work. This gives you the flexibility to modify user interfaces without
    the need to modify your code at the same time.


    Every iOS app needs to communicate with different hardware features of an iOS
    device such as its camera or touch screen. Rather than force you to write code
    to work with hardware, Apple provides several software libraries or frameworks
    that provide this code for you. Now instead of writing your own code to access
    the camera or touch screen, you can use Apple’s proven frameworks to make your
    app work correctly right from the start.


    Essentially, every iOS app consists of three parts as shown in Figure 1-1:


    ![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig1_HTML.jpg](images/329781_5_En_1_Chapter/329781_5_En_1_Fig1_HTML.jpg)


    **Figure 1-1** The three parts of an iOS app


    - Your code to make an app do something useful

    - A user interface that you can design visually in Xcode

    - Access to hardware features of an iOS device through one or more of Apple’s
    iOS frameworks


    Apple provides dozens of frameworks for iOS (and their other operating systems
    as well such as macOS, watchOS, and tvOS). By simply using Apple’s frameworks,
    you can accomplish common tasks by writing little code of your own. Some of Apple’s
    available frameworks include:


    - `UIKit` – iOS user interface and touch screen support

    - `ARKit` – Augmented reality features

    - `Core Animation` – Displays animation

    - `GameKit` – Creates multiplayer interactive apps

    - `Contacts` – Accesses the Contacts data on an iOS device

    - `SiriKit` – Allows the use of voice commands through Siri

    - `AVKit` – Allows playing of audio and video files

    - `MediaLibrary` – Allows access to images, audio, and video stored on an iOS
    device

    - `CallKit` – Provides voice calling features


    Apple’s frameworks essentially contain code that you can reuse. This makes apps
    more reliable and consistent while also saving developers’ time by using proven
    code that works correctly. To see a complete list of Apple’s available software
    frameworks, visit Apple’s developer documentation site ( [`https://developer.apple.com/documentation`](https://developer.apple.com/documentation)
    ).


    Apple’s frameworks can give you a huge head start in creating an iOS app, but
    you still need to provide a user interface so users can interact with your app.
    While you could create a user interface from scratch, this would also be tedious,
    time-consuming, and error-prone. Even worse, if every app developer created a
    user interface from scratch, no two iOS apps would look or work exactly the same,
    confusing users.'
