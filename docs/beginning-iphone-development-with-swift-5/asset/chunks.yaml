  trans: "\n22. 在 `Class` 弹出菜单中选择并点击 `SecondViewController`。\n\n23. 点击最右侧出现的视图控制器（ViewController）上方的\
    \ `View Controller` 图标，如图 17-16 所示。\n\n![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig16_HTML.jpg](img/329781_5_En_17_Fig16_HTML.jpg)\n\
    \n图 17-16 – 选择第三个视图控制器\n\n24. 选择“视图”➤“检查器”➤“显示身份检查器”，或点击 Xcode 窗口右上角的 `Identity\
    \ Inspector` 图标。\n\n25. 在 `Class` 弹出菜单中选择并点击 `ThirdViewController`。\n\n26. 将鼠标指针移到根视图上方的\
    \ `View Controller` 图标上，按住 `Control` 键，然后按住 Ctrl 键并向右拖动到视图控制器，如图 17-17 所示。\n\n\
    ![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig17_HTML.jpg](img/329781_5_En_17_Fig17_HTML.jpg)\n\
    \n图 17-17 – 在根视图与下一个视图控制器之间创建转场\n\n27. 松开 `Control` 键和鼠标左键。此时会出现一个弹出菜单（参见图 17-8）。\n\
    \n28. 选择 `Show`。Xcode 将在根视图与第二个视图控制器之间创建一个转场。\n\n29. 点击该转场，然后选择“视图”➤“检查器”➤“显示属性检查器”，或点击\
    \ Xcode 窗口右上角的 `Attributes Inspector` 图标。\n\n30. 在 `Identifier` 文本字段中点击，输入 `firstLink`，然后按回车键。\n\
    \n31. 将鼠标指针移到第二个视图控制器上方的 `View Controller` 图标上，按住 `Control` 键，然后按住 Ctrl 键并拖动到第三个视图控制器，如图\
    \ 17-18 所示。\n\n![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig18_HTML.jpg](img/329781_5_En_17_Fig18_HTML.jpg)\n\
    \n图 17-18 – 在第二个与第三个视图控制器之间创建转场\n\n32. 松开 `Control` 键和鼠标左键。此时会出现一个弹出菜单（参见图 17-8）。\n\
    \n33. 选择 `Show`。Xcode 将在第二个视图控制器与第三个视图控制器之间创建一个转场。\n\n34. 点击该转场，然后选择“视图”➤“检查器”➤“显示属性检查器”，或点击\
    \ Xcode 窗口右上角的 `Attributes Inspector` 图标。\n\n35. 在 `Identifier` 文本字段中点击，输入 `secondLink`，然后按回车键。\n\
    \n36. 在导航面板中点击 `ViewController.swift` 文件，并添加以下两个函数：\n\n```swift\noverride func\
    \ touchesBegan(_ touches: Set, with event: UIEvent?) {\n    performSegue(withIdentifier:\
    \ \"firstLink\", sender: self)\n}\noverride func prepare(for segue: UIStoryboardSegue,\
    \ sender: Any?) {\n    let nextVC = segue.destination as! SecondViewController\n\
    \    nextVC.navigationItem.title = \"Second View Controller\"\n}\n```\n\n整个 `ViewController.swift`\
    \ 文件应如下所示：\n\n```swift\nimport UIKit\nclass ViewController: UIViewController {\n\
    \    override func viewDidLoad() {\n        super.viewDidLoad()\n        // Do\
    \ any additional setup after loading the view.\n    }\n    override func touchesBegan(_\
    \ touches: Set, with event: UIEvent?) {\n        performSegue(withIdentifier:\
    \ \"firstLink\", sender: self)\n    }\n    override func prepare(for segue: UIStoryboardSegue,\
    \ sender: Any?) {\n        let nextVC = segue.destination as! SecondViewController\n\
    \        nextVC.navigationItem.title = \"Second View Controller\"\n    }\n}\n\
    ```\n\n37. 在导航面板中点击 `SecondViewController.swift` 文件，并添加以下两个函数：\n\n```swift\noverride\
    \ func touchesBegan(_ touches: Set, with event: UIEvent?) {\n    performSegue(withIdentifier:\
    \ \"secondLink\", sender: self)\n}\noverride func prepare(for segue: UIStoryboardSegue,\
    \ sender: Any?) {\n    let nextVC = segue.destination as! ThirdViewController\n\
    \    nextVC.navigationItem.title = \"Third View Controller\"\n}\n```\n\n整个 `SecondViewController.swift`\
    \ 文件应如下所示：\n\n```swift\nimport UIKit\nclass SecondViewController: UIViewController\
    \ {\n    override func viewDidLoad() {\n        super.viewDidLoad()\n        //\
    \ Do any additional setup after loading the view.\n    }\n    override func touchesBegan(_\
    \ touches: Set, with event: UIEvent?) {\n        performSegue(withIdentifier:\
    \ \"secondLink\", sender: self)\n    }\n    override func prepare(for segue: UIStoryboardSegue,\
    \ sender: Any?) {\n        let nextVC = segue.destination as! ThirdViewController\n\
    \        nextVC.navigationItem.title = \"Third View Controller\"\n    }\n}\n```\n\
    \n38. 点击 `Run` 按钮，或选择“产品”➤“运行”。模拟器窗口将出现，并显示空白的根视图屏幕。\n\n39. 点击屏幕。第二个视图将出现，显示标题“Second\
    \ View Controller”，左上角有一个 `Back` 按钮，如图 17-19 所示。\n\n![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig19_HTML.jpg](img/329781_5_En_17_Fig19_HTML.jpg)\n\
    \n图 17-19 – 显示第二个视图控制器\n\n40. 点击视图。第三个视图控制器将出现，显示标题“Third View Controller”。\n\n\
    41. 点击 `Back` 按钮，然后点击视图，即可在所有三个视图控制器之间来回切换。\n\n42. 选择“模拟器”➤“退出模拟器”以返回 Xcode。\n\
    \n## 自定义导航栏\n\n导航控制器会在每个视图的顶部自动显示一个导航栏。该导航栏至少会在左上角显示一个 `Back` 按钮，以便用户始终可以返回上一个视图。\n\
    \n默认情况下，此 `Back` 按钮始终显示“Back”，但你可以将这段文本自定义为上一个视图的标题。你还可以在导航栏上添加自己的按钮来显示其他选项。自定义导航栏可以为你的应用用户创造更独特的视觉体验，如图\
    \ 17-20 所示。\n\n![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig20_HTML.jpg](img/329781_5_En_17_Fig20_HTML.jpg)\n\
    \n图 17-20 – 为提示、标题和返回按钮显示自定义文本\n\n自定义导航栏的一些不同方式包括：\n\n* **提示** – 在导航栏顶部显示一行额外的文本\n\
    * **标题** – 定义显示在导航栏中间的文本\n* **返回按钮** – 将返回按钮的默认文本“Back”更改为更具描述性的内容\n* **颜色** –\
    \ 定义导航栏的颜色\n"
- fmt: "# Modifying the Prompt and Title Text\n\nBy default, the navigation bar doesn’t\
    \ show a prompt or title text. A title text typically displays the name or category\
    \ of the information displayed on the screen such as the title text identifying\
    \ different categories of data in the Settings app as shown in Figure [17-21](#329781_5_En_17_Chapter.xhtml#Fig21).\n\
    \n![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig21_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig21_HTML.jpg)\n\
    \nFigure 17-21: Titles typically display the option chosen from the previous view\n\
    \nPrompt text is used less often but can display helpful information to the user.\
    \ To see how to modify the prompt and title text of a navigation bar, follow these\
    \ steps:\n\n1.  Create a new iOS project using the Single View App template (see\
    \ Chapter [1](#329781_5_En_1_Chapter.xhtml)) and name this new project `NavigationTextApp`.\
    \ This creates a single view for the user interface.\n\n2.  Click the `Main.storyboard`\
    \ file in the Navigator pane. Xcode displays the single view.\n\n3.  Click the\
    \ View Controller Scene in the Document Outline.\n\n4.  Choose Editor ➤ Embed\
    \ In ➤ Navigation Controller. Xcode displays a Navigation Controller in the storyboard\
    \ and makes the single view the root view of the Navigation Controller (see Figure\
    \ [17-4](#329781_5_En_17_Chapter.xhtml#Fig4)).\n\n5.  Click the Library icon to\
    \ open the Object Library window.\n\n6.  Drag and drop a View Controller to the\
    \ right of the root view.\n\n7.  Choose File ➤ New ➤ File. Xcode displays a list\
    \ of templates.\n\n8.  Choose Cocoa Touch Class under the iOS category and click\
    \ the **Next** button. Another dialog appears, asking for a class name and subclass.\n\
    \n9.  Click in the Class text field and type `SecondViewController`.\n\n10.  Click\
    \ in the Subclass of popup menu and choose `UIViewController`.\n\n11.  Click the\
    \ **Next** button. Xcode asks where to store the file.\n\n12.  Click the **Create**\
    \ button. Xcode displays the `SecondViewController.swift` file in the Navigator\
    \ pane.\n\n13.  Click the `Main.storyboard` file in the Navigator pane and click\
    \ the View Controller icon at the top of the View Controller you just added to\
    \ the storyboard.\n\n14.  Choose View ➤ Inspectors ➤ Show Identity Inspector,\
    \ or click the Identity Inspector icon in the upper right corner of the Xcode\
    \ window.\n\n15.  Click in the Class popup menu and choose `SecondViewController`.\n\
    \n16.  Move the mouse pointer over the View Controller icon of the root view,\
    \ hold down the Control key, and Ctrl-drag over the second View Controller you\
    \ just added as shown in Figure [17-22](#329781_5_En_17_Chapter.xhtml#Fig22).\n\
    \n![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig22_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig22_HTML.jpg)\n\
    \nFigure 17-22: Connecting the root view to the newly added View Controller\n\n\
    17.  Release the Control key and the left mouse button. A popup menu appears (see\
    \ Figure [17-8](#329781_5_En_17_Chapter.xhtml#Fig8)).\n\n18.  Choose Show. Xcode\
    \ draws an arrow (segue) linking the root view to the newly added View Controller\
    \ (see Figure [17-9](#329781_5_En_17_Chapter.xhtml#Fig9)).\n\n19.  Click Show\
    \ segue to “Second View Controller” in the Document Outline. Xcode highlights\
    \ the segue between the two views.\n\n20.  Choose View ➤ Inspectors ➤ Show Attributes\
    \ Inspector, or click the Attributes Inspector icon in the upper right corner\
    \ of the Xcode window.\n\n21.  Click in the Identifier text field, type `firstLink`,\
    \ and press ENTER.\n\n22.  Click the `ViewController.swift` file in the Navigator\
    \ pane.\n\n23.  Edit the `viewDidLoad` method as follows to define the prompt\
    \ and title text for the root view:\n\n```\noverride func viewDidLoad() {\n  \
    \  super.viewDidLoad()\n    navigationItem.prompt = \"Prompt text\"\n    navigationItem.title\
    \ = \"Title text\"\n    // Do any additional setup after loading the view.\n}\n\
    ```\n\n24.  Add the following function under the `viewDidLoad` method:\n\n```\n\
    override func touchesBegan(_ touches: Set, with event: UIEvent?) {\n    performSegue(withIdentifier:\
    \ \"firstLink\", sender: self)\n}\n```\n\n25.  Add the following function underneath\
    \ the previous function:\n\n```\noverride func prepare(for segue: UIStoryboardSegue,\
    \ sender: Any?) {\n    let nextVC = segue.destination as! SecondViewController\n\
    \    nextVC.navigationItem.prompt = \"New prompt here\"\n    nextVC.navigationItem.title\
    \ = \"New title here\"\n}\n```\n\nThis function defines new prompt and title text\
    \ for the second View Controller.\n\n26.  Click the Run button or choose Product\
    \ ➤ Run. The Simulator window appears, displaying the root view screen with “Prompt\
    \ text” at the top and “Title text” underneath as shown in Figure [17-23](#329781_5_En_17_Chapter.xhtml#Fig23).\n\
    \n![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig23_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig23_HTML.jpg)\n\
    \nFigure 17-23: Displaying prompt and title text on the root view\n\n27.  Click\
    \ the screen to display the second View Controller. Notice that the prompt now\
    \ displays “New prompt here” and the title displays “New title here”. Also notice\
    \ that the Back button displays the title of the previous view as shown in Figure\
    \ [17-24](#329781_5_En_17_Chapter.xhtml#Fig24). (If the previous view does not\
    \ have a title, then the Back button would simply display the default text of\
    \ “Back”.)\n\n![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig24_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig24_HTML.jpg)\n\
    \nFigure 17-24: Different prompt and title text on the second View Controller\n\
    \n28.  Choose Simulator ➤ Quit Simulator to return to Xcode."
  raw: "### Modifying the Prompt and Title Text\n\nBy default, the navigation bar\
    \ doesn’t show a prompt or title text. A title text typically displays the name\
    \ or category of the information displayed on the screen such as the title text\
    \ identifying different categories of data in the Settings app as shown in Figure\
    \ [17-21](#329781_5_En_17_Chapter.xhtml#Fig21).\n\n![../images/329781_5_En_17_Chapter/329781_5_En_17_Fig21_HTML.jpg](images/329781_5_En_17_Chapter/329781_5_En_17_Fig21_HTML.jpg)\n\
    \nFigure 17-21\n\nTitles typically display the option chosen from the previous\
    \ view\n\nPrompt text is used less often but can display helpful information to\
    \ the user. To see how to modify the prompt and title text of a navigation bar,\
    \ follow these steps:\n\n1.  Create a new iOS project using the Single View App\
    \ template (see Chapter [1](#329781_5_En_1_Chapter.xhtml)) and name this new project\
    \ NavigationTextApp. This creates a single view for the user interface.\n\n2.\
