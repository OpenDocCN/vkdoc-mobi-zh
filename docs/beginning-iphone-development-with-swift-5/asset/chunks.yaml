    \        cell.detailText?.text = self.detailArray[indexPath.row]\n        cell.imageView?.image\
    \ = UIImage(named: self.imageArray[indexPath.row])\n        return cell\n    }\n\
    \    \n    override func viewDidLoad() {\n        super.viewDidLoad()\n      \
    \  // Do any additional setup after loading the view, typically from a nib.\n\
    \    }\n    \n    func tableView(_ tableView: UITableView, didSelectRowAt indexPath:\
    \ IndexPath) {\n        let selectedItem = mainArray[indexPath.row]\n        let\
    \ alert = UIAlertController(title: \"Your Choice\", message: \"\\(selectedItem)\"\
    , preferredStyle: .alert)\n        let okAction = UIAlertAction(title: \"OK\"\
    , style: .default, handler: { action -> Void in\n            //Just dismiss the\
    \ action sheet\n        })\n        alert.addAction(okAction)\n        self.present(alert,\
    \ animated: true, completion: nil)\n    }\n}\n```\n\n48. Click the `Run` button\
    \ or choose **Product** ➤ **Run**. The Simulator window appears, displaying the\
    \ image and text in the two labels as shown in Figure 15-13. Notice that the bottom\
    \ label appears indented from the left and appears in a different font and size,\
    \ which we had customized earlier.\n\n![../images/329781_5_En_15_Chapter/329781_5_En_15_Fig13_HTML.jpg](images/329781_5_En_15_Chapter/329781_5_En_15_Fig13_HTML.jpg)\n\
