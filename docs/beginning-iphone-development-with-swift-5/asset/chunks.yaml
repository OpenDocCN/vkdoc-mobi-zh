    23. 点击“名称”文本字段，输入 `panDetected`，点击“类型”弹出菜单并选择 `UIPanGestureRecognizer`，然后点击“连接”按钮。Xcode\
    \ 会创建一个 IBAction 方法。\n24. 按如下方式编辑 `panDetected` IBAction 方法：\n\n```swift\n@IBAction\
    \ func panDetected(_ sender: UIPanGestureRecognizer) {\n    let translation =\
    \ sender.translation(in: view)\n    topImageView.center = CGPoint(x: xOrigin +\
    \ translation.x, y: yOrigin + translation.y)\n}\n```\n\n`panDetected` IBAction\
    \ 方法捕获了用户指尖移动的平移距离。然后将这些距离累加到图像视图的中心点上。完整的 `ViewController.swift` 文件应如下所示：\n\n\
    ```swift\nimport UIKit\nclass ViewController: UIViewController {\n    @IBOutlet\
    \ var topImageView: UIImageView!\n    var xOrigin:CGFloat = 0\n    var yOrigin:CGFloat\
    \ = 0\n    override func viewDidLoad() {\n        super.viewDidLoad()\n      \
    \  xOrigin = topImageView.center.x\n        yOrigin = topImageView.center.y\n\
    \        // 视图加载完成后进行额外的设置，通常从 nib 文件加载\n    }\n    @IBAction func panDetected(_\
    \ sender: UIPanGestureRecognizer) {\n        let translation = sender.translation(in:\
    \ view)\n        topImageView.center = CGPoint(x: xOrigin + translation.x, y:\
    \ yOrigin + translation.y)\n    }\n}\n```\n\n25. 选择“视图”➤“标准编辑器”➤“显示标准编辑器”，或点击\
    \ Xcode 窗口右上角的“标准编辑器”图标。\n26. 点击“运行”按钮，或选择“产品”➤“运行”。此时会显示模拟器窗口。\n27. 按住鼠标左键并移动鼠标来模拟平移手势。注意，当平移手势变化时，图像视图也会随之移动。\n\
    28. 选择“模拟器”➤“退出模拟器”返回 Xcode。\n\n这个示例通过从对象库拖拽“平移手势识别器”来可视化地定义平移手势。现在让我们看看如何仅通过\
    \ Swift 代码来重复此过程。\n\n1. 使用“单视图应用”模板创建一个新的 iOS 项目（参见第 1 章），并将这个新项目命名为 `PanCodeApp`。这会为用户界面创建一个单一的视图。\n\
    2. 在导航窗格中点击 `Main.storyboard` 文件。Xcode 会显示这个单视图。\n3. 点击“库”图标打开对象库窗口，将一个图像视图拖放至用户界面的中央。\n\
    4. 点击 Xcode 中间窗格底部的“对齐”图标。此时会弹出一个窗口。\n5. 勾选“在容器中水平居中”和“在容器中垂直居中”复选框，然后点击“添加 2\
    \ 个约束”按钮（见图 11-10）。图像视图需要位于中心，以便在模拟器中轻松模拟捏合手势。\n6. 选择“编辑器”➤“解决自动布局问题”➤ 在子菜单的上半部分选择“添加缺失的约束”。Xcode\
    \ 会为图像视图添加额外的约束。\n7. 选择“视图”➤“助理编辑器”➤“显示助理编辑器”，或点击“助理编辑器”图标。Xcode 会并排显示 `Main.storyboard`\
    \ 和 `ViewController.swift` 文件。\n8. 将鼠标指针移到图像视图上，按住 Control 键，从图像视图按住 Ctrl 键拖拽到\
    \ `class ViewController` 行下方的 `ViewController.swift` 文件中。\n9. 松开 Control 键和鼠标左键。此时会弹出一个窗口。\n\
    10. 点击“名称”文本字段，输入 `topImageView`，然后点击“连接”按钮。Xcode 会创建一个 IBOutlet 变量，如下所示：\n\n\
    ```swift\n@IBOutlet var topImageView: UIImageView!\n```\n\n1. 选择“视图”➤“标准编辑器”➤“显示标准编辑器”，或点击\
    \ Xcode 窗口右上角的“标准编辑器”图标。\n2. 在导航窗格中点击 `ViewController.swift` 文件。\n3. 在 IBOutlet\
    \ 下方添加以下几行代码：\n\n```swift\nvar panMe: UIPanGestureRecognizer?\nvar xOrigin:CGFloat\
    \ = 0\nvar yOrigin:CGFloat = 0\n```\n\n这定义了一个表示旋转手势的全局变量，同时定义了两个 `CGFloat` 变量。\n\
    \n4. 按如下方式编辑 `viewDidLoad` 方法：\n\n```swift\noverride func viewDidLoad() {\n  \
    \  super.viewDidLoad()\n    xOrigin = topImageView.center.x\n    yOrigin = topImageView.center.y\n\
    \    topImageView.isUserInteractionEnabled = true\n    topImageView.backgroundColor\
    \ = UIColor.green\n    let panGesture = UIPanGestureRecognizer(target: self, action:\
    \ #selector(handlePan))\n    topImageView.addGestureRecognizer(panGesture)\n \
    \   panMe = panGesture\n    // 视图加载完成后进行额外的设置，通常从 nib 文件加载\n}\n```\n\n这段代码将图像视图的中心点坐标存储到\
    \ `xOrigin` 和 `yOrigin` 变量中。然后启用了图像视图的“用户交互已启用”设置，并将其背景色定义为绿色以便可见。接着，它定义了一个平移手势识别器（而不是从对象库窗口拖放一个平移手势识别器），定义了一个名为\
    \ `handlePan` 的函数来响应平移手势，并将该平移手势链接到图像视图上，使得平移操作仅影响该图像视图。最后，它将平移手势识别器赋值给 `panMe`\
    \ 变量。\n\n5. 在 `viewDidLoad` 方法下方添加以下函数：\n\n```swift\n@objc func handleRotation()\
    \ {\n    topImageView.transform = CGAffineTransform(rotationAngle: rotateMe!.rotation)\n\
    }\n```\n\n完整的 `ViewController.swift` 文件应如下所示：\n\n```swift\nimport UIKit\nclass\
    \ ViewController: UIViewController {\n    @IBOutlet var topImageView: UIImageView!\n\
    \    var rotateMe: UIRotationGestureRecognizer?\n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        topImageView.isUserInteractionEnabled\
    \ = true\n        topImageView.backgroundColor = UIColor.green\n        let rotationGesture\
    \ = UIRotationGestureRecognizer(target: self, action: #selector(handleRotation))\n\
    \        topImageView.addGestureRecognizer(rotationGesture)\n        rotateMe\
    \ = rotationGesture\n        // 视图加载完成后进行额外的设置，通常从 nib 文件加载\n    }\n    @objc\
    \ func handleRotation() {\n        topImageView.transform = CGAffineTransform(rotationAngle:\
    \ rotateMe!.rotation)\n    }\n}\n```\n\n6. 点击“运行”按钮，或选择“产品”➤“运行”。此时会显示模拟器窗口。\n\
    7. 按住鼠标左键并拖动鼠标来模拟平移手势。注意，当平移手势移动时，图像视图也会随之移动。\n8. 选择“模拟器”➤“退出模拟器”返回 Xcode。"
- fmt: "# Detecting Screen Edge Pan Gestures\n\nOne unique gesture that an app can\
    \ detect is called a screen edge pan. This occurs when the user slides a fingertip\
    \ from the top, bottom, left, or right edge of the screen. By default, iOS uses\
    \ top edge pans to display notifications and bottom edge pans to display the Control\
    \ Center. You’ll need to override these default iOS edge pans if you want your\
    \ own app to detect top or bottom edge pans.\n\nWhen creating a screen edge pan\
    \ gesture, you’ll also need to create a separate screen edge pan gesture recognizer\
    \ for each edge you want to detect. So if you want your app to detect a bottom\
    \ and a left edge pan, you’ll need to create two separate gesture recognizers,\
    \ one to detect bottom edge pans and a second to detect left edge pans.\n\nTo\
    \ see how to use a screen edge pan gestures, follow these steps:\n\n1. Create\
    \ a new iOS project using the Single View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml))\
    \ and name this new project `EdgePanApp`. This creates a single view for the user\
    \ interface.\n\n2. Click the `Main.storyboard` file in the Navigator pane. Xcode\
    \ displays the single view.\n\n3. Click the Library icon to open the Object Library\
    \ window and look for the Screen Edge Pan Gesture Recognizer as shown in Figure\
    \ [11-14](#329781_5_En_11_Chapter.xhtml#Fig14).\n\n   ![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig14_HTML.jpg](images/329781_5_En_11_Chapter/329781_5_En_11_Fig14_HTML.jpg)\n\
    \n   **Figure 11-14** The Screen Edge Pan Gesture Recognizer in the Object Library\
    \ window\n\n4. Drag and drop the Screen Edge Pan Gesture Recognizer onto the view.\
    \ Xcode displays the Screen Edge Pan Gesture Recognizer in the Document Outline\
    \ and above the View Controller.\n\n5. Choose View ➤ Inspectors ➤ Show Attributes\
    \ Inspector, or click the Attributes Inspector icon in the upper right corner\
    \ of the Xcode window. The Attributes Inspector pane appears as shown in Figure\
    \ [11-15](#329781_5_En_11_Chapter.xhtml#Fig15).\n\n   ![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig15_HTML.jpg](images/329781_5_En_11_Chapter/329781_5_En_11_Fig15_HTML.jpg)\n\
    \n   **Figure 11-15** The Attributes Inspector pane for the Screen Edge Pan Gesture\
    \ Recognizer\n\n6. Select the Bottom check box to recognize bottom screen edge\
    \ pan gestures.\n\n   **Note:** You can only choose one check box to define a\
    \ screen edge even though it appears you can select two or more check boxes.\n\
    \n7. Choose View ➤ Assistant Editor ➤ Show Assistant Editor, or click the Assistant\
    \ Editor icon. Xcode displays the `Main.storyboard` and `ViewController.swift`\
    \ file side by side.\n\n8. Move the mouse pointer over the Screen Edge Pan Gesture\
    \ Recognizer at the top of the View Controller or in the Document Outline, hold\
    \ down the Control key, and Ctrl-drag above the last curly bracket at the bottom\
    \ of the `ViewController.swift` file.\n\n9. Release the Control key and the left\
    \ mouse button. A popup window appears.\n\n10. Click in the Name text field and\
    \ type `bottomEdgeDetected`, click in the Type popup menu and choose `UIScreenEdgePanGestureRecognizer`,\
    \ then click the Connect button.\n\n11. Edit this `bottomEdgeDetected` IBAction\
    \ method as follows:\n\n    ```swift\n    @IBAction func bottomEdgeDetected(_\
    \ sender: UIScreenEdgePanGestureRecognizer) {\n        print (\"Bottom edge pan\
    \ gesture\")\n    }\n    ```\n\n12. Click the Screen Edge Pan Gesture Recognizer\
    \ in the Document Outline and press ENTER. Xcode highlights the entire name.\n\
    \n13. Type `Bottom Edge Gesture` and press ENTER to rename your gesture recognizer.\n\
    \n14. Add the following method underneath the `viewDidLoad` method:\n\n    ```swift\n\
    \    override var preferredScreenEdgesDeferringSystemGestures: UIRectEdge {\n\
    \        return UIRectEdge.bottom\n    }\n    ```\n\n    This method overrides\
    \ the default behavior of iOS to display the Control Center when the user pans\
    \ up from the bottom edge of the screen. If you only want to detect left or right\
    \ pan edge gestures, you do not need the preceding code.\n\n15. Click the `Main.storyboard`\
    \ in the Navigator pane.\n\n16. Click the Library icon to open the Object Library\
    \ window.\n\n17. Drag and drop another Screen Edge Pan Gesture Recognizer onto\
    \ the view. Xcode displays the second Screen Edge Pan Gesture Recognizer in the\
    \ Document Outline and above the View Controller.\n\n18. Click the Screen Edge\
    \ Pan Gesture Recognizer in the Document Outline and press ENTER to highlight\
    \ the entire name. Then type `Left Edge Gesture` and press ENTER.\n\n19. Click\
    \ this Left Edge Gesture in the Document Outline and choose View ➤ Inspectors\
    \ ➤ Show Attributes Inspector, or click the Attributes Inspector icon in the upper\
    \ right corner of the Xcode window.\n\n20. Select the Left check box to define\
    \ it to detect left screen edge pan gestures.\n\n21. Move the mouse pointer over\
    \ the Left Edge Gesture in the Document Outline, hold down the Control key, and\
    \ Ctrl-drag above the last curly bracket at the bottom of the `ViewController.swift`\
    \ file.\n\n22. Release the Control key and the left mouse button. A popup window\
    \ appears.\n\n23. Click in the Name text field, type `leftEdgeDetected`, click\
    \ in the Type popup menu and choose `UIScreenEdgePanGestureRecognizer`, then click\
    \ the Connect button.\n\n24. Edit this `leftEdgeDetected` IBAction method as follows:\n\
    \n    ```swift\n    @IBAction func leftEdgeDetected(_ sender: UIScreenEdgePanGestureRecognizer)\
    \ {\n        print (\"Left edge pan gesture\")\n    }\n    ```\n\n25. Click the\
    \ Run button or choose Product ➤ Run. The Simulator window appears.\n\n26. Move\
    \ the mouse pointer just underneath the bottom of the view, hold down the left\
    \ mouse button, and drag the mouse up. Notice that the Debug Area in the Xcode\
    \ window displays multiple \"Bottom edge pan gesture\" lines, indicating that\
    \ the app recognized the bottom screen edge pan gesture.\n\n27. Move the mouse\
    \ pointer just left of the view, hold down the left mouse button, and drag the\
    \ mouse to the right. Notice that the Debug Area in the Xcode window displays\
    \ multiple \"Left edge pan gesture\" lines, indicating that the app recognized\
    \ the left screen edge pan gesture.\n\n28. Choose Simulator ➤ Quit Simulator to\
    \ return to Xcode.\n\nThis example defined the screen edge pan gesture visually\
    \ by dragging the Screen Edge Pan Gesture Recognizer from the Object Library.\
    \ Now let’s see how to duplicate this process through Swift code alone.\n\n1.\
    \ Create a new iOS project using the Single View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml))\
    \ and name this new project `EdgePanCodeApp`. This creates a single view for the\
    \ user interface.\n\n2. Click the `Main.storyboard` file in the Navigator pane.\n\
    \n3. Choose View ➤ Assistant Editor ➤ Show Assistant Editor, or click the Assistant\
    \ Editor icon. Xcode displays the `Main.storyboard` and `ViewController.swift`\
    \ file side by side.\n\n4. Move the mouse pointer over the view (the entire screen\
    \ of the simulated iOS device), hold down the Control key, and Ctrl-drag underneath\
    \ the `class ViewController` line in the `ViewController.swift` file.\n\n5. Release\
    \ the Control key and the left mouse button. A popup window appears.\n\n6. Click\
    \ in the Name text field and type `myView`, then click the Connect button. Xcode\
    \ creates an `IBOutlet` as follows:\n\n   ```swift\n   @IBOutlet var myView: UIView!\n\
    \   ```\n\n7. Choose View ➤ Standard Editor ➤ Show Standard Editor, or click the\
    \ Standard Editor icon.\n\n8. Click the `ViewController.swift` file in the Navigator\
    \ pane.\n\n9. Modify the `viewDidLoad` method as follows:\n\n   ```swift\n   override\
    \ func viewDidLoad() {\n       super.viewDidLoad()\n       let bottomEdgeGesture\
    \ = UIScreenEdgePanGestureRecognizer(target: self, action: #selector(handleBottomEdge))\n\
    \       myView.addGestureRecognizer(bottomEdgeGesture)\n       bottomEdgeGesture.edges\
    \ = .bottom\n       let leftEdgeGesture = UIScreenEdgePanGestureRecognizer(target:\
    \ self, action: #selector(handleLeftEdge))\n       myView.addGestureRecognizer(leftEdgeGesture)\n\
    \       leftEdgeGesture.edges = .left\n       // Do any additional setup after\
    \ loading the view, typically from a nib.\n   }\n   ```"
  raw: "## Detecting Screen Edge Pan Gestures\n\nOne unique gesture that an app can\
    \ detect is called a screen edge pan. This occurs when the user slides a fingertip\
    \ from the top, bottom, left, or right edge of the screen. By default, iOS uses\
    \ top edge pans to display notifications and bottom edge pans to display the Control\
    \ Center. You’ll need to override these default iOS edge pans if you want your\
    \ own app to detect top or bottom edge pans.\n\nWhen creating a screen edge pan\
    \ gesture, you’ll also need to create a separate screen edge pan gesture recognizer\
    \ for each edge you want to detect. So if you want your app to detect a bottom\
    \ and a left edge pan, you’ll need to create two separate gesture recognizers,\
    \ one to detect bottom edge pans and a second to detect left edge pans.\n\nTo\
    \ see how to use a screen edge pan gestures, follow these steps:\n\n1.  Create\
    \ a new iOS project using the Single View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml))\
    \ and name this new project EdgePanApp. This creates a single view for the user\
    \ interface.\n\n2.  Click the Main.storyboard file in the Navigator pane. Xcode\
    \ displays the single view.\n\n3.  Click the Library icon to open the Object Library\
    \ window and look for the Screen Edge Pan Gesture Recognizer as shown in Figure\
    \ [11-14](#329781_5_En_11_Chapter.xhtml#Fig14).\n\n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig14_HTML.jpg](images/329781_5_En_11_Chapter/329781_5_En_11_Fig14_HTML.jpg)\n\
    \nFigure 11-14\n\nThe Screen Edge Pan Gesture Recognizer in the Object Library\
    \ window\n\n4.  Drag and drop the Screen Edge Pan Gesture Recognizer onto the\
    \ view. Xcode displays the Screen Edge Pan Gesture Recognizer in the Document\
    \ Outline and above the View Controller.\n\n5.  Choose View ➤ Inspectors ➤ Show\
    \ Attributes Inspector, or click the Attributes Inspector icon in the upper right\
    \ corner of the Xcode window. The Attributes Inspector pane appears as shown in\
    \ Figure [11-15](#329781_5_En_11_Chapter.xhtml#Fig15).\n\n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig15_HTML.jpg](images/329781_5_En_11_Chapter/329781_5_En_11_Fig15_HTML.jpg)\n\
    \nFigure 11-15\n\nThe Attributes Inspector pane for the Screen Edge Pan Gesture\
    \ Recognizer\n\n6.  Select the Bottom check box to recognize bottom screen edge\
    \ pan gestures.\n\n**Note**  You can only choose one check box to define a screen\
    \ edge even though it appears you can select two or more check boxes.\n\n7.  Choose\
    \ View ➤ Assistant Editor ➤ Show Assistant Editor, or click the Assistant Editor\
    \ icon. Xcode displays the Main.storyboard and ViewController.swift file side\
    \ by side.\n\n8.  Move the mouse pointer over the Screen Edge Pan Gesture Recognizer\
    \ at the top of the View Controller or in the Document Outline, hold down the\
    \ Control key, and Ctrl-drag above the last curly bracket at the bottom of the\
    \ ViewController.swift file.\n\n9.  Release the Control key and the left mouse\
    \ button. A popup window appears.\n\n10.  Click in the Name text field and type\
    \ **bottomEdgeDetected** , click in the Type popup menu and choose UIScreenEdgePanGestureRecognizer,\
    \ then click the Connect button.\n\n11.  Edit this bottomEdgeDetected IBAction\
    \ method as follows:\n\n```\n    @IBAction func bottomEdgeDetected(_ sender: UIScreenEdgePanGestureRecognizer)\
    \ {\n    print (\"Bottom edge pan gesture\")\n    }\n    ```\n\n12.  Click the\
    \ Screen Edge Pan Gesture Recognizer in the Document Outline and press ENTER.\
    \ Xcode highlights the entire name.\n\n13.  Type **Bottom Edge Gesture** and press\
    \ ENTER to rename your gesture recognizer.\n\n14.  Add the following method underneath\
    \ the viewDidLoad method:\n\n```\n    override var preferredScreenEdgesDeferringSystemGestures:\
    \ UIRectEdge {\n    return UIRectEdge.bottom\n    }\n    ```\n\nThis method overrides\
    \ the default behavior of iOS to display the Control Center when the user pans\
    \ up from the bottom edge of the screen. If you only want to detect left or right\
    \ pan edge gestures, you do not need the preceding code.\n\n15.  Click the Main.storyboard\
    \ in the Navigator pane.\n\n16.  Click the Library icon to open the Object Library\
    \ window.\n\n17.  Drag and drop another Screen Edge Pan Gesture Recognizer onto\
    \ the view. Xcode displays the second Screen Edge Pan Gesture Recognizer in the\
    \ Document Outline and above the View Controller.\n\n18.  Click the Screen Edge\
    \ Pan Gesture Recognizer in the Document Outline and press ENTER to highlight\
    \ the entire name. Then type **Left Edge Gesture** and press ENTER.\n\n19.  Click\
    \ this Left Edge Gesture in the Document Outline and choose View ➤ Inspectors\
    \ ➤ Show Attributes Inspector, or click the Attributes Inspector icon in the upper\
    \ right corner of the Xcode window.\n\n20.  Select the Left check box to define\
    \ it to detect left screen edge pan gestures.\n\n21.  Move the mouse pointer over\
    \ the Left Edge Gesture in the Document Outline, hold down the Control key, and\
    \ Ctrl-drag above the last curly bracket at the bottom of the ViewController.swift\
    \ file.\n\n22.  Release the Control key and the left mouse button. A popup window\
    \ appears.\n\n23.  Click in the Name text field, type **leftEdgeDetected**, click\
    \ in the Type popup menu and choose UIScreenEdgePanGestureRecognizer, then click\
    \ the Connect button.\n\n24.  Edit this leftEdgeDetected IBAction method as follows:\n\
    \n```\n    @IBAction func leftEdgeDetected(_ sender: UIScreenEdgePanGestureRecognizer)\
    \ {\n    print (\"Left edge pan gesture\")\n    }\n    ```\n\n25.  Click the Run\
    \ button or choose Product ➤ Run. The Simulator window appears.\n\n26.  Move the\
    \ mouse pointer just underneath the bottom of the view, hold down the left mouse\
    \ button, and drag the mouse up. Notice that the Debug Area in the Xcode window\
    \ displays multiple “Bottom edge pan gesture” lines, indicating that the app recognized\
    \ the bottom screen edge pan gesture.\n\n27.  Move the mouse pointer just left\
    \ of the view, hold down the left mouse button, and drag the mouse to the right.\
    \ Notice that the Debug Area in the Xcode window displays multiple “Left edge\
    \ pan gesture” lines, indicating that the app recognized the left screen edge\
    \ pan gesture.\n\n28.  Choose Simulator ➤ Quit Simulator to return to Xcode.\n\
    \nThis example defined the screen edge pan gesture visually by dragging the Screen\
    \ Edge Pan Gesture Recognizer from the Object Library. Now let’s see how to duplicate\
    \ this process through Swift code alone.\n\n1.  Create a new iOS project using\
    \ the Single View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml))\
    \ and name this new project EdgePanCodeApp. This creates a single view for the\
    \ user interface.\n\n2.  Click the Main.storyboard file in the Navigator pane.\n\
    \n3.  Choose View ➤ Assistant Editor ➤ Show Assistant Editor, or click the Assistant\
    \ Editor icon. Xcode displays the Main.storyboard and ViewController.swift file\
    \ side by side.\n\n4.  Move the mouse pointer over the view (the entire screen\
    \ of the simulated iOS device), hold down the Control key, and Ctrl-drag underneath\
    \ the “class ViewController” line in the ViewController.swift file.\n\n5.  Release\
    \ the Control key and the left mouse button. A popup window appears.\n\n6.  Click\
    \ in the Name text field and type **myView**, then click the Connect button. Xcode\
    \ creates an IBOutlet as follows:\n\n```\n    @IBOutlet var myView: UIView!\n\
    \    ```\n\n7.  Choose View ➤ Standard Editor ➤ Show Standard Editor, or click\
    \ the Standard Editor icon.\n\n8.  Click the ViewController.swift file in the\
    \ Navigator pane.\n\n9.  Modify the viewDidLoad method as follows:\n\n```\n  \
    \  override func viewDidLoad() {\n    super.viewDidLoad()\n    let bottomEdgeGesture\
    \ = UIScreenEdgePanGestureRecognizer(target: self, action: #selector(handleBottomEdge))\n\
    \    myView.addGestureRecognizer(bottomEdgeGesture)\n    bottomEdgeGesture.edges\
    \ = .bottom\n    let leftEdgeGesture = UIScreenEdgePanGestureRecognizer(target:\
    \ self, action: #selector(handleLeftEdge))\n    myView.addGestureRecognizer(leftEdgeGesture)\n\
    \    leftEdgeGesture.edges = .left\n    // Do any additional setup after loading\
    \ the view, typically from a nib.\n    }\n    ```"
  trans: "\n# 检测屏幕边缘滑动手势\n\n应用可以检测的一种独特手势称为屏幕边缘滑动。当用户从屏幕的上、下、左、右边缘滑动指尖时，就会触发此手势。默认情况下，iOS\
    \ 使用上边缘滑动来显示通知，使用下边缘滑动来显示控制中心。如果你希望自己的应用检测上边缘或下边缘滑动，则需要覆盖 iOS 的这些默认边缘滑动。\n\n在创建屏幕边缘滑动手势时，你需要为每个要检测的边缘单独创建一个屏幕边缘滑动手势识别器。因此，如果你希望应用检测下边缘和左边缘滑动，就需要创建两个独立的手势识别器：一个用于检测下边缘滑动，另一个用于检测左边缘滑动。\n\
    \n要了解如何使用屏幕边缘滑动手势，请按照以下步骤操作：\n\n1.  使用“单视图应用”模板（参见第 1 章）创建一个新的 iOS 项目，并将该项目命名为\
    \ `EdgePanApp`。这将为用户界面创建一个单一视图。\n\n2.  在导航窗格中点击 `Main.storyboard` 文件。Xcode 会显示该单一视图。\n\
    \n3.  点击“库”图标打开“对象库”窗口，并找到如图 11-14 所示的“屏幕边缘滑动手势识别器”。\n\n    ![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig14_HTML.jpg](img/329781_5_En_11_Fig14_HTML.jpg)\n\
    \n    **图 11-14** 对象库窗口中的屏幕边缘滑动手势识别器\n\n4.  将“屏幕边缘滑动手势识别器”拖放到视图上。Xcode 会在文档大纲中以及视图控制器上方显示该识别器。\n\
    \n5.  选择“视图”➤“检查器”➤“显示属性检查器”，或点击 Xcode 窗口右上角的“属性检查器”图标。此时会显示如图 11-15 所示的属性检查器窗格。\n\
    \n    ![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig15_HTML.jpg](img/329781_5_En_11_Fig15_HTML.jpg)\n\
    \n    **图 11-15** 屏幕边缘滑动手势识别器的属性检查器窗格\n\n6.  选中“底部”复选框，以识别屏幕下边缘的滑动手势。\n\n    **注意：**\
    \ 尽管看起来你可以选择两个或更多复选框，但实际上你只能选择一个复选框来定义一个屏幕边缘。\n\n7.  选择“视图”➤“辅助编辑器”➤“显示辅助编辑器”，或点击“辅助编辑器”图标。Xcode\
    \ 会并排显示 `Main.storyboard` 和 `ViewController.swift` 文件。\n\n8.  将鼠标指针移动到视图控制器顶部或文档大纲中的“屏幕边缘滑动手势识别器”上，按住\
    \ Control 键，然后将其 Control-拖拽到 `ViewController.swift` 文件底部最后一个花括号的上方。\n\n9.  松开\
    \ Control 键和鼠标左键。此时会弹出一个窗口。\n\n10. 在“名称”文本框中点击，输入 `bottomEdgeDetected`，在“类型”弹出菜单中选择\
    \ `UIScreenEdgePanGestureRecognizer`，然后点击“连接”按钮。\n\n11. 如下所示编辑这个 `bottomEdgeDetected`\
    \ IBAction 方法：\n\n    ```swift\n    @IBAction func bottomEdgeDetected(_ sender:\
    \ UIScreenEdgePanGestureRecognizer) {\n        print (\"检测到下滑动手势\")\n    }\n \
    \   ```\n\n12. 在文档大纲中点击“屏幕边缘滑动手势识别器”，然后按回车键。Xcode 会高亮显示整个名称。\n\n13. 输入 `下滑动手势`\
    \ 并按回车键，重新命名你的手势识别器。\n\n14. 在 `viewDidLoad` 方法下方添加以下方法：\n\n    ```swift\n    override\
    \ var preferredScreenEdgesDeferringSystemGestures: UIRectEdge {\n        return\
    \ UIRectEdge.bottom\n    }\n    ```\n\n    此方法会覆盖 iOS 的默认行为（即当用户从屏幕下边缘向上滑动时显示控制中心）。如果你只想检测左边缘或右边缘的滑动手势，则不需要上述代码。\n\
    \n15. 在导航窗格中点击 `Main.storyboard` 文件。\n\n16. 点击“库”图标打开“对象库”窗口。\n\n17. 将另一个“屏幕边缘滑动手势识别器”拖放到视图上。Xcode\
    \ 会在文档大纲中以及视图控制器上方显示第二个识别器。\n\n18. 在文档大纲中点击该“屏幕边缘滑动手势识别器”，按回车键高亮显示整个名称。然后输入 `左边缘手势`\
    \ 并按回车键。\n\n19. 在文档大纲中点击这个“左边缘手势”，选择“视图”➤“检查器”➤“显示属性检查器”，或点击 Xcode 窗口右上角的“属性检查器”图标。\n\
    \n20. 选中“左侧”复选框，将其定义为检测屏幕左边缘的滑动手势。\n\n21. 将鼠标指针移动到文档大纲中的“左边缘手势”上，按住 Control 键，然后将其\
    \ Control-拖拽到 `ViewController.swift` 文件底部最后一个花括号的上方。\n\n22. 松开 Control 键和鼠标左键。此时会弹出一个窗口。\n\
    \n23. 在“名称”文本框中点击，输入 `leftEdgeDetected`，在“类型”弹出菜单中选择 `UIScreenEdgePanGestureRecognizer`，然后点击“连接”按钮。\n\
    \n24. 如下所示编辑这个 `leftEdgeDetected` IBAction 方法：\n\n    ```swift\n    @IBAction\
    \ func leftEdgeDetected(_ sender: UIScreenEdgePanGestureRecognizer) {\n      \
    \  print (\"检测到左滑动手势\")\n    }\n    ```\n\n25. 点击“运行”按钮，或选择“产品”➤“运行”。模拟器窗口会显示。\n\
    \n26. 将鼠标指针移动到视图底部边缘稍下方，按住鼠标左键，然后向上拖拽。注意，Xcode 窗口的调试区域会显示多行“检测到下滑动手势”，表明应用已识别到屏幕下边缘的滑动手势。\n\
    \n27. 将鼠标指针移动到视图左侧边缘稍左，按住鼠标左键，然后向右拖拽。注意，Xcode 窗口的调试区域会显示多行“检测到左滑动手势”，表明应用已识别到屏幕左边缘的滑动手势。\n\
    \n28. 选择“模拟器”➤“退出模拟器”返回 Xcode。\n\n此示例通过从对象库拖拽“屏幕边缘滑动手势识别器”直观地定义了屏幕边缘滑动手势。现在让我们看看如何仅通过\
    \ Swift 代码来复制此过程。\n\n1.  使用“单视图应用”模板（参见第 1 章）创建一个新的 iOS 项目，并将该项目命名为 `EdgePanCodeApp`。这将为用户界面创建一个单一视图。\n\
    \n2.  在导航窗格中点击 `Main.storyboard` 文件。\n\n3.  选择“视图”➤“辅助编辑器”➤“显示辅助编辑器”，或点击“辅助编辑器”图标。Xcode\
    \ 会并排显示 `Main.storyboard` 和 `ViewController.swift` 文件。\n\n4.  将鼠标指针移动到视图（模拟 iOS\
    \ 设备的整个屏幕）上，按住 Control 键，然后将其 Control-拖拽到 `ViewController.swift` 文件中的 `class ViewController`\
    \ 行下方。\n\n5.  松开 Control 键和鼠标左键。此时会弹出一个窗口。\n\n6.  在“名称”文本框中点击，输入 `myView`，然后点击“连接”按钮。Xcode\
    \ 会创建一个 `IBOutlet`，如下所示：\n\n    ```swift\n    @IBOutlet var myView: UIView!\n\
    \    ```\n\n7.  选择“视图”➤“标准编辑器”➤“显示标准编辑器”，或点击“标准编辑器”图标。\n\n8.  在导航窗格中点击 `ViewController.swift`\
    \ 文件。\n\n9.  如下所示修改 `viewDidLoad` 方法：\n\n    ```swift\n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        let bottomEdgeGesture = UIScreenEdgePanGestureRecognizer(target:\
    \ self, action: #selector(handleBottomEdge))\n        myView.addGestureRecognizer(bottomEdgeGesture)\n\
    \        bottomEdgeGesture.edges = .bottom\n        let leftEdgeGesture = UIScreenEdgePanGestureRecognizer(target:\
    \ self, action: #selector(handleLeftEdge))\n        myView.addGestureRecognizer(leftEdgeGesture)\n\
    \        leftEdgeGesture.edges = .left\n        // 在此处添加任何额外的视图加载后设置，通常来自于 nib\
    \ 文件。\n    }\n    ```\n"
- fmt: "This code creates two screen edge pan gesture recognizers named `bottomEdgeGesture`\
    \ and `leftEdgeGesture`. Then it links both gestures to the view (`myView`) and\
    \ defines the `bottomEdgeGesture` to recognize bottom screen edge pans and the\
    \ `leftEdgeGesture` to recognize left screen edge pans.\n\nFinally, it calls on\
    \ two functions named `handleBottomEdge` and `handleLeftEdge` to respond to each\
    \ screen edge pan gesture.\n\n10. Add the following code underneath the `viewDidLoad`\
    \ method:\n\n```swift\noverride var preferredScreenEdgesDeferringSystemGestures:\
    \ UIRectEdge {\nreturn UIRectEdge.bottom\n}\n@objc func handleBottomEdge() {\n\
    print (\"Bottom edge pan gesture\")\n}\n@objc func handleLeftEdge() {\nprint (\"\
    Left edge pan gesture\")\n}\n```\n\n11. Click the Run button or choose **Product**\
    \ ➤ **Run**. The Simulator window appears.\n\n12. Move the mouse pointer just\
    \ underneath the bottom of the view, hold down the left mouse button, and drag\
    \ the mouse up. Notice that the Debug Area in the Xcode window displays multiple\
    \ \"Bottom edge pan gesture\" lines, indicating that the app recognized the bottom\
    \ screen edge pan gesture.\n\n13. Move the mouse pointer just left of the view,\
    \ hold down the left mouse button, and drag the mouse to the right. Notice that\
    \ the Debug Area in the Xcode window displays multiple \"Left edge pan gesture\"\
    \ lines, indicating that the app recognized the left screen edge pan gesture.\n\
    \n14. Choose **Simulator** ➤ **Quit Simulator** to return to Xcode.\n\n## Detecting\
    \ Swipe Gestures\n\nSwipe gestures occur when the user swipes across the screen\
    \ in one of the four directions: up, down, left, or right. You can define how\
    \ many fingertips are needed for a swipe and also the direction you want the gesture\
    \ recognizer to detect.\n\nEach swipe gesture recognizer can only detect swipes\
    \ in a single direction. That means if you want to detect an up and down swipe,\
    \ you’ll need to define two separate swipe gesture recognizers where one recognizes\
    \ only up swipes and the second only recognizes down swipes.\n\nTo see how to\
    \ use a swipe gesture, follow these steps:\n\n1. Create a new iOS project using\
    \ the Single View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml))\
    \ and name this new project `SwipeApp`. This creates a single view for the user\
    \ interface.\n\n2. Click the `Main.storyboard` file in the Navigator pane. Xcode\
    \ displays the single view.\n\n3. Click the Library icon to open the Object Library\
    \ window and look for the Pan Gesture Recognizer as shown in Figure [11-16](#329781_5_En_11_Chapter.xhtml#Fig16).\n\
    \n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig16_HTML.jpg](images/329781_5_En_11_Chapter/329781_5_En_11_Fig16_HTML.jpg)\n\
    \n**Figure 11-16**  \nThe Swipe Gesture Recognizer in the Object Library window\n\
    \n4. Drag and drop the Swipe Gesture Recognizer onto the view. Xcode displays\
    \ the Swipe Gesture Recognizer in the Document Outline and above the View Controller.\n\
    \n5. Click the Swipe Gesture Recognizer in the Document Outline and press **ENTER**.\
    \ Then type **Right Swipe Gesture** and press **ENTER**.\n\n6. Drag and drop a\
    \ second Swipe Gesture Recognizer onto the view. Xcode displays the Swipe Gesture\
    \ Recognizer in the Document Outline and above the View Controller.\n\n7. Click\
    \ the Swipe Gesture Recognizer in the Document Outline and press **ENTER**. Then\
    \ type **Up Swipe Gesture** and press **ENTER**.\n\n8. Click the Library icon\
    \ to open the Object Library window and drag and drop an image view in the center\
    \ of the user interface.\n\n9. Choose **View** ➤ **Inspectors** ➤ **Show Attributes\
    \ Inspector** or click the Attributes Inspector icon in the upper right corner\
    \ of the Xcode window.\n\n10. Click in the Background popup menu and choose a\
    \ color such as green or blue. This will make the image view easy to find when\
    \ you run the app in the Simulator. Without a background color, the default white\
    \ background of the image view will blend in with the white background of the\
    \ view.\n\n11. Select the **User Interaction Enabled** check box. This allows\
    \ the image view to respond to the user.\n\n12. Click the Align icon in the bottom\
    \ of the middle Xcode pane. A window appears.\n\n13. Select the **Horizontally\
    \ in Container** and **Vertically in Container** check boxes and then click the\
    \ **Add 2 Constraints** button (see Figure [11-10](#329781_5_En_11_Chapter.xhtml#Fig10)).\
    \ The image view needs to be in the center to make it easy to mimic pinching gestures\
    \ in the Simulator.\n\n14. Choose **Editor** ➤ **Resolve Auto Layout Issues**\
    \ ➤ **Add Missing Constraints** in the top half of the submenu. Xcode adds additional\
    \ constraints to the image view.\n\n15. Move the mouse pointer over the image\
    \ view, hold down the **Control** key, and Ctrl-drag from the image view to the\
    \ **Right Swipe Gesture** icon in the Document Outline or at the top of the View\
    \ Controller.\n\n16. Release the **Control** key and the left mouse button. A\
    \ window appears.\n\n17. Choose `gestureRecognizers`. This link lets the image\
    \ view detect right swipe gestures.\n\n18. Move the mouse pointer over the image\
    \ view, hold down the **Control** key, and Ctrl-drag from the image view to the\
    \ **Up Swipe Gesture** icon in the Document Outline or at the top of the View\
    \ Controller.\n\n19. Release the **Control** key and the left mouse button. A\
    \ window appears.\n\n20. Choose `gestureRecognizers`. This link lets the image\
    \ view detect up swipe gestures.\n\n21. Click **Up Swipe Gesture** in the Document\
    \ Outline and choose **View** ➤ **Inspectors** ➤ **Show Attributes Inspector**,\
    \ or click the Attributes Inspector icon in the upper right corner of the Xcode\
    \ window."
  raw: "This code creates two screen edge pan gesture recognizers named bottomEdgeGesture\
    \ and leftEdgeGesture. Then it links both gestures to the view (myView) and defines\
    \ the bottomEdgeGesture to recognize bottom screen edge pans and the leftEdgeGesture\
    \ to recognize left screen edge pans.\n\nFinally, it calls on two functions called\
    \ handleBottomEdge and handleLeftEdge to respond to each screen edge pan gesture.\n\
    \n10.  Add the following code underneath the viewDidLoad method:\n\n```\n    override\
    \ var preferredScreenEdgesDeferringSystemGestures: UIRectEdge {\n    return UIRectEdge.bottom\n\
    \    }\n    @objc func handleBottomEdge() {\n    print (\"Bottom edge pan gesture\"\
    )\n    }\n    @objc func handleLeftEdge() {\n    print (\"Left edge pan gesture\"\
    )\n    }\n    ```\n\n11.  Click the Run button or choose Product ➤ Run. The Simulator\
    \ window appears.\n\n12.  Move the mouse pointer just underneath the bottom of\
    \ the view, hold down the left mouse button, and drag the mouse up. Notice that\
    \ the Debug Area in the Xcode window displays multiple “Bottom edge pan gesture”\
    \ lines, indicating that the app recognized the bottom screen edge pan gesture.\n\
    \n13.  Move the mouse pointer just left of the view, hold down the left mouse\
    \ button, and drag the mouse to the right. Notice that the Debug Area in the Xcode\
    \ window displays multiple “Left edge pan gesture” lines, indicating that the\
    \ app recognized the left screen edge pan gesture.\n\n14.  Choose Simulator ➤\
    \ Quit Simulator to return to Xcode.\n\n## Detecting Swipe Gestures\n\nSwipe gestures\
    \ occur when the user swipes across the screen in one of the four directions:\
    \ up, down, left, or right. You can define how many fingertips are needed for\
    \ a swipe and also the direction you want the gesture recognizer to detect.\n\n\
    Each swipe gesture recognizer can only detect swipes in a single direction. That\
    \ means if you want to detect an up and down swipe, you’ll need to define two\
    \ separate swipe gesture recognizers where one recognizes only up swipes and the\
    \ second only recognizes down swipes.\n\nTo see how to use a swipe gesture, follow\
    \ these steps:\n\n1.  Create a new iOS project using the Single View App template\
    \ (see Chapter [1](#329781_5_En_1_Chapter.xhtml)) and name this new project SwipeApp.\
    \ This creates a single view for the user interface.\n\n2.  Click the Main.storyboard\
    \ file in the Navigator pane. Xcode displays the single view.\n\n3.  Click the\
    \ Library icon to open the Object Library window and look for the Pan Gesture\
    \ Recognizer as shown in Figure [11-16](#329781_5_En_11_Chapter.xhtml#Fig16).\n\
    \n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig16_HTML.jpg](images/329781_5_En_11_Chapter/329781_5_En_11_Fig16_HTML.jpg)\n\
    \nFigure 11-16\n\nThe Swipe Gesture Recognizer in the Object Library window\n\n\
    4.  Drag and drop the Swipe Gesture Recognizer onto the view. Xcode displays the\
    \ Swipe Gesture Recognizer in the Document Outline and above the View Controller.\n\
    \n5.  Click the Swipe Gesture Recognizer in the Document Outline and press ENTER.\
    \ Then type **Right Swipe Gesture** and press ENTER.\n\n6.  Drag and drop a second\
    \ Swipe Gesture Recognizer onto the view. Xcode displays the Swipe Gesture Recognizer\
    \ in the Document Outline and above the View Controller.\n\n7.  Click the Swipe\
    \ Gesture Recognizer in the Document Outline and press ENTER. Then type **Up Swipe\
    \ Gesture** and press ENTER.\n\n8.  Click the Library icon to open the Object\
    \ Library window and drag and drop an image view in the center of the user interface.\n\
    \n9.  Choose View ➤ Inspectors ➤ Show Attributes Inspector or click the Attributes\
    \ Inspector icon in the upper right corner of the Xcode window.\n\n10.  Click\
    \ in the Background popup menu and choose a color such as green or blue. This\
    \ will make the image view easy to find when you run the app in the Simulator.\
    \ Without a background color, the default white background of the image view will\
    \ blend in with the white background of the view.\n\n11.  Select the User Interaction\
    \ Enabled check box. This allows the image view to respond to the user.\n\n12.\
    \  Click the Align icon in the bottom of the middle Xcode pane. A window appears.\n\
    \n13.  Select the Horizontally in Container and Vertically in Container check\
    \ boxes and then click the Add 2 Constraints button (see Figure [11-10](#329781_5_En_11_Chapter.xhtml#Fig10)).\
    \ The image view needs to be in the center to make it easy to mimic pinching gestures\
    \ in the Simulator.\n\n14.  Choose Editor ➤ Resolve Auto Layout Issues ➤ Add Missing\
    \ Constraints in the top half of the submenu. Xcode adds additional constraints\
    \ to the image view.\n\n15.  Move the mouse pointer over the image view, hold\
    \ down the Control key, and Ctrl-drag from the image view to the Right Swipe Gesture\
    \ icon in the Document Outline or at the top of the View Controller.\n\n16.  Release\
    \ the Control key and the left mouse button. A window appears.\n\n17.  Choose\
    \ gestureRecognizers. This link lets the image view detect right swipe gestures.\n\
    \n18.  Move the mouse pointer over the image view, hold down the Control key,\
    \ and Ctrl-drag from the image view to the Up Swipe Gesture icon in the Document\
    \ Outline or at the top of the View Controller.\n\n19.  Release the Control key\
    \ and the left mouse button. A window appears.\n\n20.  Choose gestureRecognizers.\
    \ This link lets the image view detect up swipe gestures.\n\n21.  Click Up Swipe\
    \ Gesture in the Document Outline and choose View ➤ Inspectors ➤ Show Attributes\
    \ Inspector, or click the Attributes Inspector icon in the upper right corner\
    \ of the Xcode window."
  trans: "\n这段代码创建了两个屏幕边缘平移手势识别器，分别命名为 `bottomEdgeGesture` 和 `leftEdgeGesture`。接着，它将这两个手势都关联到视图（`myView`）上，并设定\
    \ `bottomEdgeGesture` 识别屏幕底部边缘的平移操作，`leftEdgeGesture` 识别屏幕左侧边缘的平移操作。\n\n最后，它调用了名为\
    \ `handleBottomEdge` 和 `handleLeftEdge` 的两个函数，来响应各自的屏幕边缘平移手势。\n\n10. 在 `viewDidLoad`\
    \ 方法下方添加以下代码：\n\n```swift\noverride var preferredScreenEdgesDeferringSystemGestures:\
    \ UIRectEdge {\nreturn UIRectEdge.bottom\n}\n@objc func handleBottomEdge() {\n\
    print (\"底部边缘平移手势\")\n}\n@objc func handleLeftEdge() {\nprint (\"左侧边缘平移手势\")\n\
    }\n```\n\n11. 点击“运行”按钮，或者选择 **Product** ➤ **Run**。模拟器窗口将会出现。\n\n12. 将鼠标指针移动到视图底部正下方，按住鼠标左键，并向上拖动鼠标。注意，Xcode\
    \ 窗口中的调试区域会显示多行 \"底部边缘平移手势\"，表明应用已识别到屏幕底部边缘的平移手势。\n\n13. 将鼠标指针移动到视图左侧，按住鼠标左键，并向右拖动鼠标。注意，Xcode\
    \ 窗口中的调试区域会显示多行 \"左侧边缘平移手势\"，表明应用已识别到屏幕左侧边缘的平移手势。\n\n14. 选择 **Simulator** ➤ **Quit\
    \ Simulator** 返回 Xcode。\n\n## 检测轻扫手势\n\n当用户在屏幕上沿四个方向（上、下、左、右）之一进行轻扫时，就会触发轻扫手势。你可以定义轻扫所需的手指数量，以及希望手势识别器检测的方向。\n\
    \n每个轻扫手势识别器只能检测单一方向的轻扫。这意味着，如果你想同时检测向上和向下的轻扫，你需要定义两个独立的轻扫手势识别器，其中一个只识别向上轻扫，另一个只识别向下轻扫。\n\
    \n要了解如何使用轻扫手势，请按照以下步骤操作：\n\n1. 使用“单视图应用”模板创建一个新的 iOS 项目（参见第 1 章），并将此新项目命名为 `SwipeApp`。这将为用户界面创建一个单一视图。\n\
    \n2. 在导航面板中点击 `Main.storyboard` 文件。Xcode 会显示该单一视图。\n\n3. 点击“库”图标以打开“对象库”窗口，并查找“平移手势识别器”，如图\
    \ 11-16 所示。\n\n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig16_HTML.jpg](img/329781_5_En_11_Fig16_HTML.jpg)\n\
    \n**图 11-16**  \n对象库窗口中的“轻扫手势识别器”\n\n4. 将“轻扫手势识别器”拖放到视图上。Xcode 会在“文档大纲”以及“视图控制器”上方显示该“轻扫手势识别器”。\n\
    \n5. 在“文档大纲”中点击“轻扫手势识别器”，然后按 **ENTER** 键。接着输入 **右侧轻扫手势** 并再次按 **ENTER** 键。\n\n\
    6. 将第二个“轻扫手势识别器”拖放到视图上。Xcode 会在“文档大纲”以及“视图控制器”上方显示该“轻扫手势识别器”。\n\n7. 在“文档大纲”中点击“轻扫手势识别器”，然后按\
    \ **ENTER** 键。接着输入 **向上轻扫手势** 并再次按 **ENTER** 键。\n\n8. 点击“库”图标以打开“对象库”窗口，然后将一个“图像视图”拖放到用户界面的中央位置。\n\
    \n9. 选择 **View** ➤ **Inspectors** ➤ **Show Attributes Inspector**，或者点击 Xcode 窗口右上角的“属性检查器”图标。\n\
    \n10. 点击“背景”弹出菜单，然后选择一种颜色，例如绿色或蓝色。这会使图像视图在模拟器中运行应用时容易被找到。如果没有背景色，图像视图默认的白色背景会与视图的白色背景融为一体。\n\
    \n11. 选中 **User Interaction Enabled**（用户交互已启用）复选框。这允许图像视图响应用户操作。\n\n12. 点击 Xcode\
    \ 中间窗格底部的“对齐”图标。将会出现一个窗口。\n\n13. 选中 **Horizontally in Container**（容器中水平居中）和 **Vertically\
    \ in Container**（容器中垂直居中）复选框，然后点击 **Add 2 Constraints**（添加 2 个约束）按钮（见图 11-10）。图像视图需要位于中央，以便在模拟器中更容易模拟捏合手势。\n\
    \n14. 选择 **Editor** ➤ **Resolve Auto Layout Issues** ➤ **Add Missing Constraints**（位于子菜单的上半部分）。Xcode\
    \ 会为图像视图添加额外的约束。\n\n15. 将鼠标指针移到图像视图上，按住 **Control** 键，然后从图像视图按住 Control 键拖拽到“文档大纲”或“视图控制器”顶部的\
    \ **Right Swipe Gesture**（右侧轻扫手势）图标上。\n\n16. 松开 **Control** 键和鼠标左键。将会出现一个窗口。\n\
    \n17. 选择 `gestureRecognizers`。此连接允许图像视图检测右侧轻扫手势。\n\n18. 将鼠标指针移到图像视图上，按住 **Control**\
    \ 键，然后从图像视图按住 Control 键拖拽到“文档大纲”或“视图控制器”顶部的 **Up Swipe Gesture**（向上轻扫手势）图标上。\n\
    \n19. 松开 **Control** 键和鼠标左键。将会出现一个窗口。\n\n20. 选择 `gestureRecognizers`。此连接允许图像视图检测向上轻扫手势。\n\
    \n21. 在“文档大纲”中点击 **Up Swipe Gesture**（向上轻扫手势），然后选择 **View** ➤ **Inspectors** ➤\
    \ **Show Attributes Inspector**，或者点击 Xcode 窗口右上角的“属性检查器”图标。\n"
- fmt: "22.  Click in the Swipe popup menu and choose `Up` as shown in Figure[11-17](#329781_5_En_11_Chapter.xhtml#Fig17).\
    \ (By default, every swipe gesture recognizer only recognizes right swipes unless\
    \ you define it otherwise.)\n\n![Figure 11-17: Choosing a swipe direction to recognize\
    \ for a swipe gesture recognizer](../images/329781_5_En_11_Chapter/329781_5_En_11_Fig17_HTML.jpg)\n\
    \n23.  Choose `View` ➤ `Assistant Editor` ➤ `Show Assistant Editor`, or click\
    \ the Assistant Editor icon. Xcode displays the `Main.storyboard` and `ViewController.swift`\
    \ file side by side.\n\n24.  Move the mouse pointer over the image view, hold\
    \ down the Control key, and Ctrl-drag from the image view to the `ViewController.swift`\
    \ file underneath the `class ViewController` line.\n\n25.  Release the Control\
    \ key and the left mouse button. A popup window appears.\n\n26.  Click in the\
    \ Name text field, type `topImageView`, and click the Connect button. Xcode creates\
    \ an `IBOutlet` variable as follows:\n\n```swift\n@IBOutlet var topImageView:\
    \ UIImageView!\n```\n\n27.  Move the mouse pointer over the Right Swipe Gesture\
    \ icon in the Document Outline or at the top of the View Controller, hold down\
    \ the Control key, and Ctrl-drag from the Right Swipe Gesture to above the last\
    \ curly bracket in the `ViewController.swift` file.\n\n28.  Release the Control\
    \ key and the left mouse button. A popup window appears.\n\n29.  Click in the\
    \ Name text field, type `rightSwipeDetected`, click in the Type popup menu and\
    \ choose `UISwipeGestureRecognizer`, and click the Connect button. Xcode creates\
    \ an `IBAction` method.\n\n30.  Edit the `rightSwipeDetected` IBAction method\
    \ as follows:\n\n```swift\n@IBAction func rightSwipeDetected(_ sender: UISwipeGestureRecognizer)\
    \ {\n    topImageView.center = CGPoint(x: topImageView.center.x + topImageView.frame.width,\
    \ y: topImageView.center.y)\n}\n```\n\n31.  Move the mouse pointer over the Up\
    \ Swipe Gesture icon in the Document Outline or at the top of the View Controller,\
    \ hold down the Control key, and Ctrl-drag from the Right Swipe Gesture to above\
    \ the last curly bracket in the `ViewController.swift` file.\n\n32.  Release the\
    \ Control key and the left mouse button. A popup window appears.\n\n33.  Click\
    \ in the Name text field, type `upSwipeDetected`, click in the Type popup menu\
    \ and choose `UISwipeGestureRecognizer`, and click the Connect button. Xcode creates\
    \ an `IBAction` method.\n\n34.  Edit the `upSwipeDetected` IBAction method as\
    \ follows:\n\n```swift\n@IBAction func upSwipeDetected(_ sender: UISwipeGestureRecognizer)\
    \ {\n    topImageView.center = CGPoint(x: topImageView.center.x, y: topImageView.center.y\
    \ - topImageView.frame.height)\n}\n```\n\n**Note:** Notice that this code subtracts\
    \ from the image view center because, for the y-axis, positive numbers increase\
    \ downward and decrease upward since the origin appears in the upper left corner\
    \ of the view.\n\nThe entire `ViewController.swift` file should look like this:\n\
    \n```swift\nimport UIKit\nclass ViewController: UIViewController {\n    @IBOutlet\
    \ var topImageView: UIImageView!\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        // Do any additional setup after loading the view, typically from a nib.\n\
    \    }\n    @IBAction func rightSwipeDetected(_ sender: UISwipeGestureRecognizer)\
    \ {\n        topImageView.center = CGPoint(x: topImageView.center.x + topImageView.frame.width,\
    \ y: topImageView.center.y)\n    }\n    @IBAction func upSwipeDetected(_ sender:\
    \ UISwipeGestureRecognizer) {\n        topImageView.center = CGPoint(x: topImageView.center.x,\
    \ y: topImageView.center.y - topImageView.frame.height)\n    }\n}\n```\n\n1. \
    \ Click the Run button or choose `Product` ➤ `Run`. The Simulator window appears.\n\
    \n2.  Move the mouse pointer over the image view, hold down the left mouse button,\
    \ move the mouse to the right, and let go of the left mouse button to simulate\
    \ a right swipe gesture. Notice that the image view moves to the right.\n\n3.\
    \  Move the mouse pointer over the image view, hold down the left mouse button,\
    \ move the mouse up, and let go of the left mouse button to simulate an up swipe\
    \ gesture. Notice that the image view moves upward.\n\n4.  Repeat steps 36 and\
    \ 37 until the image view disappears out of sight.\n\n5.  Choose `Simulator` ➤\
    \ `Quit Simulator` to return to Xcode.\n\nThis example defined the swipe gesture\
    \ visually by dragging the Swipe Gesture Recognizer from the Object Library. Now\
    \ let’s see how to duplicate this process through Swift code alone.\n\n1.  Create\
    \ a new iOS project using the Single View App template (see Chapter[1](#329781_5_En_1_Chapter.xhtml))\
    \ and name this new project `SwipeCodeApp`. This creates a single view for the\
    \ user interface.\n\n2.  Click the `Main.storyboard` file in the Navigator pane.\
    \ Xcode displays the single view.\n\n3.  Click the Library icon to open the Object\
    \ Library window and drag and drop an image view in the center of the user interface.\n\
    \n4.  Click the Align icon in the bottom of the middle Xcode pane. A window appears.\n\
    \n5.  Select the `Horizontally in Container` and `Vertically in Container` check\
    \ boxes and then click the `Add 2 Constraints` button (see Figure[11-10](#329781_5_En_11_Chapter.xhtml#Fig10)).\
    \ The image view needs to be in the center to make it easy to mimic pinching gestures\
    \ in the Simulator.\n\n6.  Choose `Editor` ➤ `Resolve Auto Layout Issues` ➤ `Add\
    \ Missing Constraints` in the top half of the submenu. Xcode adds additional constraints\
    \ to the image view.\n\n7.  Choose `View` ➤ `Assistant Editor` ➤ `Show Assistant\
    \ Editor`, or click the Assistant Editor icon. Xcode displays the `Main.storyboard`\
    \ and `ViewController.swift` file side by side.\n\n8.  Move the mouse pointer\
    \ over the image view, hold down the Control key, and Ctrl-drag from the image\
    \ view to the `ViewController.swift` file underneath the `class ViewController`\
    \ line.\n\n9.  Release the Control key and the left mouse button. A popup window\
    \ appears.\n\n10.  Click in the Name text field, type `topImageView`, and click\
    \ the Connect button. Xcode creates an `IBOutlet` variable as follows:\n\n```swift\n\
    @IBOutlet var topImageView: UIImageView!\n```\n\n11.  Choose `View` ➤ `Standard\
    \ Editor` ➤ `Show Standard Editor`, or click the Standard Editor icon in the upper\
    \ right corner of the Xcode window.\n\n12.  Click the `ViewController.swift` file\
    \ in the Navigator pane.\n\n13.  Edit the `viewDidLoad` method as follows:\n\n\
    ```swift\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    topImageView.isUserInteractionEnabled\
    \ = true\n    topImageView.backgroundColor = UIColor.green\n    let downSwipeGesture\
    \ = UISwipeGestureRecognizer(target: self, action: #selector(handleDownSwipe))\n\
    \    topImageView.addGestureRecognizer(downSwipeGesture)\n    downSwipeGesture.direction\
    \ = .down\n    let leftSwipeGesture = UISwipeGestureRecognizer(target: self, action:\
    \ #selector(handleLeftSwipe))\n    topImageView.addGestureRecognizer(leftSwipeGesture)\n\
    \    leftSwipeGesture.direction = .left\n    // Do any additional setup after\
    \ loading the view, typically from a nib.\n}\n```\n\nThis code turns on the `User\
    \ Interaction Enabled` setting for the image view and defines its background color\
    \ as green to make it visible. Next, it defines two swipe gesture recognizers\
    \ (instead of dragging and dropping a Swipe Gesture Recognizer from the Object\
    \ Library window), defines a function called `handleDownSwipe` and `handleLeftSwipe`\
    \ to respond to the two swipe gestures, and links the swipe gestures to the image\
    \ view. In addition, it also defines the direction each swipe gesture can recognize\
    \ such as down and left.\n\n14.  Add the following functions underneath the `viewDidLoad`\
    \ method:\n\n```swift\n@objc func handleDownSwipe() {\n    topImageView.center\
    \ = CGPoint(x: topImageView.center.x, y: topImageView.center.y + topImageView.frame.height)\n\
    }\n@objc func handleLeftSwipe() {\n    topImageView.center = CGPoint(x: topImageView.center.x\
    \ - topImageView.frame.width, y: topImageView.center.y)\n}\n```\n\nThe entire\
    \ `ViewController.swift` file should look like this."
