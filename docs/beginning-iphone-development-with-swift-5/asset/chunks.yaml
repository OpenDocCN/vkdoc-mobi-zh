  trans: "\n# 在标签栏控制器中切换视图控制器\n\n标签栏控制器让你能够轻松地按照任意顺序从一个视图切换到另一个视图。标签栏上的每个图标代表一个不同的视图控制器。使用标签栏控制器展示不同视图的基本步骤是：向故事板中添加多个视图控制器，然后通过`Ctrl-拖拽`将标签栏控制器连接到某个视图控制器。\n\
    \n接下来需要为这个视图控制器创建标题和图标。你可能还想重新排列标签栏上的图标顺序，或者稍后删除某个视图控制器及其标签栏图标。\n\n要了解如何创建一个简单的标签栏控制器，请按照以下步骤操作：\n\
    \n1.  使用“单视图应用”模板创建一个新的 iOS 项目（参见第 1 章），并将这个新项目命名为 `TabBarApp`。这将为用户界面创建一个单视图。\n\
    \n2.  在导航面板中点击 `Main.storyboard` 文件。Xcode 会显示这个单视图。\n\n3.  点击视图控制器顶部的视图控制器场景。\n\
    \n4.  选择“编辑器” ➤ “嵌入为” ➤ “标签栏控制器”。Xcode 会在故事板中显示一个标签栏控制器，并与现有的视图控制器连接，如图 18-3 所示。\n\
    \n![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig3_HTML.jpg](img/329781_5_En_18_Fig3_HTML.jpg)\n\
    \n图 18-3 在标签栏控制器中嵌入视图\n\n5.  点击“库”图标以打开“对象库”窗口。\n\n6.  从“对象库”窗口中拖放一个视图控制器到故事板上，如图\
    \ 18-4 所示。\n\n![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig4_HTML.jpg](img/329781_5_En_18_Fig4_HTML.jpg)\n\
    \n图 18-4 将视图控制器拖放到故事板上\n\n7.  将鼠标移到标签栏控制器顶部的标签栏控制器图标上（或移到大纲面板中的标签栏控制器上）。\n\n8.\
    \  按住 Control 键，然后`Ctrl-拖拽`到刚刚添加到故事板上的新视图控制器上，如图 18-5 所示。\n\n![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig5_HTML.jpg](img/329781_5_En_18_Fig5_HTML.jpg)\n\
    \n图 18-5 从标签栏控制器 Ctrl-拖拽到独立的视图控制器\n\n9.  松开鼠标左键和 Control 键。会弹出一个弹出菜单，如图 18-6 所示。\n\
    \n![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig6_HTML.jpg](img/329781_5_En_18_Fig6_HTML.jpg)\n\
    \n图 18-6 用于将视图控制器连接到标签栏控制器的弹出菜单\n\n10. 在“关系转场”类别下选择“视图控制器”。Xcode 会绘制一个箭头（转场）将标签栏控制器连接到新添加的视图控制器，如图\
    \ 18-7 所示。（你可能需要移动视图控制器才能看到标签栏控制器的转场分叉连接到两个视图控制器。）\n\n![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig7_HTML.jpg](img/329781_5_En_18_Fig7_HTML.jpg)\n\
    \n图 18-7 转场在导航控制器内连接两个视图\n\n11. 点击顶部视图控制器的中间区域（或在大纲面板中点击“视图”）。\n\n12. 选择“视图” ➤\
    \ “检查器” ➤ “显示属性检查器”，或者点击 Xcode 窗口右上角的“属性检查器”图标。\n\n13. 在“背景”弹出菜单中点击，并选择一种颜色，例如黄色。\n\
    \n14. 点击底部视图控制器的中间区域（或在大纲面板中点击“视图”）。\n\n15. 在“背景”弹出菜单中点击，并选择一种颜色，例如橙色。\n\n16.\
    \ 点击“运行”按钮，或选择“产品” ➤ “运行”。模拟器窗口会弹出，显示第一个视图控制器的彩色屏幕。\n\n17. 点击屏幕底部标签栏上的第二个图标。第二个视图控制器会显示，并呈现不同的颜色。\n\
    \n18. 选择“模拟器” ➤ “退出模拟器”以返回 Xcode。\n\n## 自定义标签栏图标\n\n标签栏控制器会在屏幕底部的标签栏上显示图标。默认情况下，这个图标仅显示一个通用标签，例如“项目”，但你可以自定义此图标以包含更具描述性的文本和/或图标。你可以使用图形编辑器（如\
    \ Adobe Illustrator）创建图标。创建自己的图标时，请务必遵循 Apple 的图标设计指南（ `https://developer.apple.com/design/human-interface-guidelines/ios/icons-and-images/custom-icons/`\
    \ ）。\n\n除了自己创建图标，你还可以从以下网站购买或下载图标：\n\n*   iconbeast.com\n*   icons8.com\n*   pixellove.com\n\
    \n要了解如何自定义标签栏图标，请按照以下步骤操作：\n\n1.  确保 `TabBarApp` 已加载到 Xcode 中。\n\n2.  从任何提供免费图标的网站下载两个或更多的免费图标。\n\
    \n3.  点击 `Assets.xcassets` 文件夹。\n\n4.  点击 `+` 图标以显示弹出菜单，如图 18-8 所示。\n\n    ![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig8_HTML.jpg](img/329781_5_En_18_Fig8_HTML.jpg)\n\
    \n    图 18-8 在 `Assets.xcassets` 文件夹中创建新的图像集\n\n5.  选择“新建图像集”。Xcode 会在 AppIcon\
    \ 下方显示一个“图像”项。\n\n6.  点击这个“图像”项，然后按 ENTER 键高亮显示文本，如图 18-9 所示。\n\n    ![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig9_HTML.jpg](img/329781_5_En_18_Fig9_HTML.jpg)\n\
    \n    图 18-9 编辑图像名称\n\n7.  输入 `First` 并按 ENTER 键。\n\n8.  将一个图标拖放到所有标有 `1x`、`2x`\
    \ 和 `3x` 的占位符中，如图 18-10 所示。\n\n    ![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig10_HTML.jpg](img/329781_5_En_18_Fig10_HTML.jpg)\n\
    \n    图 18-10 将图标拖放到图像集中\n\n9.  重复步骤 5–8，但将此图像集命名为 `Second`，并将不同的图标拖放到每个 `1x`、`2x`\
    \ 和 `3x` 占位符中，如图 18-11 所示。\n\n    ![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig11_HTML.jpg](img/329781_5_En_18_Fig11_HTML.jpg)\n\
    \n    图 18-11 创建两个包含图标的图像集\n\n图 18-11. 创建第二个图像集。\n"
- fmt: "# Note\n\nThe 1x image appears on older iOS device screens. The 2x image appears\
    \ on Retina displays. The 3x icon image appears on Retina Display HD displays\
    \ for the iPhone X and later models.\n\n1. Click the `Main.storyboard` file in\
    \ the Navigator pane.\n2. Click `Item` in the Document Outline as shown in Figure\
    \ [18-12](#329781_5_En_18_Chapter.xhtml#Fig12).\n   ![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig12_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig12_HTML.jpg)\n\
    \   **Figure 18-12** Selecting the tab bar on a View Controller\n3. Choose `View\
    \ ➤ Inspectors ➤ Show Attributes Inspector`, or click the `Attributes Inspector`\
    \ icon in the upper right corner of the Xcode window.\n4. Click the `Image` popup\
    \ menu under the `Bar Item` category and select `First` as shown in Figure [18-13](#329781_5_En_18_Chapter.xhtml#Fig13).\n\
    \   ![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig13_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig13_HTML.jpg)\n\
    \   **Figure 18-13** Choosing an image set for a Tab bar icon\n5. Click in the\
    \ `Title` text field, delete the “Item” text, type the color of the View Controller\
    \ (such as yellow), and press ENTER. Notice that the Tab bar now displays your\
    \ chosen icon and text.\n6. Repeat steps 11–14 for the other Tab bar item except\
    \ choose `Second` for its `Image` and type a different color for its `Title`.\n\
    7. Click the `Run` button or choose `Product ➤ Run`. The Simulator window appears\
    \ showing the two icons on the Tab bar as shown in Figure [18-14](#329781_5_En_18_Chapter.xhtml#Fig14).\n\
    \   ![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig14_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig14_HTML.jpg)\n\
    \   **Figure 18-14** The Tab bar displaying the custom text and icon\n8. Click\
    \ the second tab. Notice that the second View Controller appears for that tab.\n\
    9. Click the first tab. Notice that the first View Controller appears for that\
    \ tab.\n10. Choose `Simulator ➤ Quit Simulator` to return to Xcode.\n\n## Deleting\
    \ View Controllers from a Tab Bar Controller\n\nYou can connect multiple View\
    \ Controllers to a Tab Bar Controller. However, if you later want to disconnect\
    \ a View Controller from a Tab Bar Controller, you have two options:\n- Delete\
    \ the View Controller and its segue from the Tab Bar Controller.\n- Delete just\
    \ the segue from the Tab Bar Controller but keep the View Controller.\n\nDeleting\
    \ a View Controller will delete both the segue from the Tab Bar Controller and\
    \ the View Controller, but this also means you’ll lose everything stored on that\
    \ View Controller such as buttons, text fields, and labels. Another option is\
    \ to delete just the segue and keep the View Controller.\n\nTo delete both a View\
    \ Controller and its segue from a Tab Bar Controller, follow these steps:\n1.\
    \ Click the `Main.storyboard` in the Navigator pane.\n2. Click the `Item Scene`\
    \ in the Document Outline that represents the View Controller you want to delete\
    \ and disconnect from the Tab Bar Controller as shown in Figure [18-15](#329781_5_En_18_Chapter.xhtml#Fig15).\n\
    \   ![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig15_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig15_HTML.jpg)\n\
    \   **Figure 18-15** Selecting an Item Scene to delete from a Tab Bar Controller\n\
    3. Press BACKSPACE or DELETE. Xcode removes the selected View Controller and the\
    \ segue connecting it to the Tab Bar Controller.\n\n### Note\nIf you make a mistake\
    \ deleting a segue and/or its connecting View Controller, choose `Edit ➤ Undo`\
    \ or press `Command + Z` to undo the delete command.\n\nSometimes you may not\
    \ want to delete a View Controller. Instead, you just want to disconnect it from\
    \ a Tab Bar Controller. To disconnect a View Controller’s segue to a Tab Bar Controller\
    \ while keeping the View Controller, follow these steps:\n1. Click the `Main.storyboard`\
    \ in the Navigator pane.\n2. Click a `Relationship` icon under the `Tab Bar Controller\
    \ Scene` in the Document Outline as shown in Figure [18-16](#329781_5_En_18_Chapter.xhtml#Fig16).\n\
    \   ![../images/329781_5_En_18_Chapter/329781_5_En_18_Fig16_HTML.jpg](images/329781_5_En_18_Chapter/329781_5_En_18_Fig16_HTML.jpg)\n\
    \   **Figure 18-16** Selecting a segue in the Document Outline\n3. Press BACKSPACE\
    \ or DELETE. Xcode removes the segue to the Tab Bar Controller but keeps the View\
    \ Controller in the storyboard."
