  trans: "\n# 检测捏合手势\n\n当两个指尖相互靠近或相互远离时，就会发生捏合手势。在捏合手势过程中，应用可以识别缩放比例和速度。缩放比例定义了两个指尖的相对位置，而速度则检测捏合动作的快慢。\n\
    \n要了解如何检测捏合手势，请按照以下步骤操作：\n\n1.  使用“单视图应用”模板创建一个新的 iOS 项目（参见第 1 章），并将此新项目命名为 `PinchApp`。这将为用户界面创建一个单视图。\n\
    \n2.  在导航器窗格中点击 `Main.storyboard` 文件。Xcode 将显示该单视图。\n\n3.  点击“资源库”图标打开“对象库”窗口，查找“捏合手势识别器”，如图\
    \ 11-9 所示。\n\n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig9_HTML.jpg](img/329781_5_En_11_Fig9_HTML.jpg)\n\
    *图 11-9* — 对象库窗口中的“捏合手势识别器”\n\n4.  将“捏合手势识别器”拖放到视图上。Xcode 会在文档大纲中和视图控制器上方显示“捏合手势识别器”。\n\
    \n5.  点击“资源库”图标打开“对象库”窗口，并将一个图像视图拖放到用户界面的中心位置。\n\n6.  选择“视图”➤“检查器”➤“显示属性检查器”，或点击\
    \ Xcode 窗口右上角的“属性检查器”图标。\n\n7.  点击“背景”弹出菜单，然后选择一种颜色，例如绿色或蓝色。这将使你在模拟器中运行应用时能轻松找到该图像视图。如果没有背景色，图像视图默认的白色背景会与视图的白色背景融为一体。\n\
    \n8.  选中“启用用户交互”复选框。这允许图像视图响应用户操作。\n\n9.  点击 Xcode 中间窗格底部的“对齐”图标。将出现一个窗口。\n\n\
    10. 选中“容器中水平居中”和“容器中垂直居中”复选框，然后点击“添加 2 个约束”按钮，如图 11-10 所示。图像视图需要居中，以便在模拟器中轻松模拟捏合手势。\n\
    \n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig10_HTML.jpg](img/329781_5_En_11_Fig10_HTML.jpg)\n\
    *图 11-10* — 将图像视图居中\n\n11. 选择“编辑器”➤“解决自动布局问题”➤“添加缺少的约束”（在子菜单的上半部分）。Xcode 会为图像视图添加额外的约束。\n\
    \n12. 将鼠标指针移到图像视图上，按住 Control 键，然后从图像视图 Control-拖拽到文档大纲中或视图控制器顶部的“捏合手势识别器”图标上。\n\
    \n13. 松开 Control 键和鼠标左键。将出现一个窗口。\n\n14. 选择 `gestureRecognizers`。此关联使图像视图能够检测捏合手势。\n\
    \n15. 选择“视图”➤“辅助编辑器”➤“显示辅助编辑器”，或点击“辅助编辑器”图标。Xcode 会并排显示 `Main.storyboard` 和 `ViewController.swift`\
    \ 文件。\n\n16. 将鼠标指针移到图像视图上，按住 Control 键，然后从图像视图 Control-拖拽到 `ViewController.swift`\
    \ 文件中 `IBOutlet` 行的下方。\n\n17. 松开 Control 键和鼠标左键。将出现一个弹出窗口。\n\n18. 点击“名称”文本字段，输入\
    \ `topImageView`，然后点击“连接”按钮。Xcode 会创建一个 `IBOutlet` 变量，如下所示：\n\n```\n@IBOutlet\
    \ var topImageView: UIImageView!\n```\n\n19. 将鼠标指针移到文档大纲中或视图控制器顶部的“捏合手势识别器”图标上，按住\
    \ Control 键，然后从“捏合手势识别器”Control-拖拽到 `ViewController.swift` 文件中最后一个花括号的上方。\n\n\
    20. 松开 Control 键和鼠标左键。将出现一个弹出窗口。\n\n21. 点击“名称”文本字段，输入 `pinchDetected`，点击“类型”弹出菜单并选择\
    \ `UIPinchGestureRecognizer`，然后点击“连接”按钮。Xcode 会创建一个 `IBAction` 方法。\n\n22. 按如下方式编辑\
    \ `pinchDetected` `IBAction` 方法：\n\n```\n@IBAction func pinchDetected(_ sender:\
    \ UIPinchGestureRecognizer) {\n    topImageView.transform = CGAffineTransform(scaleX:\
    \ sender.scale, y: sender.scale)\n}\n```\n\n`pinchDetected` `IBAction` 方法根据捏合手势的\
    \ scale 属性更改图像视图的大小，其中 scale 属性定义了捏合手势的距离。整个 `ViewController.swift` 文件应如下所示：\n\
    \n```\nimport UIKit\nclass ViewController: UIViewController {\n    @IBOutlet var\
    \ topImageView: UIImageView!\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        // Do any additional setup after loading the view, typically from a nib.\n\
    \    }\n    @IBAction func pinchDetected(_ sender: UIPinchGestureRecognizer) {\n\
    \        topImageView.transform = CGAffineTransform(scaleX: sender.scale, y: sender.scale)\n\
    \    }\n}\n```\n\n23. 选择“视图”➤“标准编辑器”➤“显示标准编辑器”，或点击 Xcode 窗口右上角的“标准编辑器”图标。\n\n\
    24. 点击“运行”按钮，或选择“产品”➤“运行”。模拟器窗口将会出现。要模拟捏合手势，你需要使用鼠标并按住 Option 键。\n\n25. 将鼠标指针移到图像视图上，然后按住\
    \ Option 键。屏幕上会出现两个灰色圆点，模拟两个指尖，如图 11-11 所示。\n\n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig11_HTML.jpg](img/329781_5_En_11_Fig11_HTML.jpg)\n\
    *图 11-11* — 在模拟器中，按住 Option 键的同时拖拽鼠标可模拟双指捏合手势\n\n26. 按住鼠标左键和 Option 键，然后拖拽鼠标以模拟捏合手势。请注意，当捏合手势变化时，图像视图的大小也会随之改变。\n\
    \n27. 选择“模拟器”➤“退出模拟器”以返回 Xcode。\n\n此示例通过从对象库拖拽“捏合手势识别器”来直观地定义捏合手势。现在让我们看看如何仅通过\
    \ Swift 代码来复制此过程。\n\n1.  使用“单视图应用”模板创建一个新的 iOS 项目（参见第 1 章），并将此新项目命名为 `PinchCodeApp`。这将为用户界面创建一个单视图。\n\
    \n2.  在导航器窗格中点击 `Main.storyboard` 文件。Xcode 将显示该单视图。\n\n3.  点击“资源库”图标打开“对象库”窗口，并将一个图像视图拖放到用户界面的中心位置。\n\
    \n4.  点击 Xcode 中间窗格底部的“对齐”图标。将出现一个窗口。\n\n5.  选中“容器中水平居中”和“容器中垂直居中”复选框，然后点击“添加\
    \ 2 个约束”按钮（参见图 11-10）。图像视图需要居中，以便在模拟器中轻松模拟捏合手势。\n\n6.  选择“编辑器”➤“解决自动布局问题”➤“添加缺少的约束”（在子菜单的上半部分）。Xcode\
    \ 会为图像视图添加额外的约束。\n\n7.  选择“视图”➤“辅助编辑器”➤“显示辅助编辑器”，或点击“辅助编辑器”图标。Xcode 会并排显示 `Main.storyboard`\
    \ 和 `ViewController.swift` 文件。\n\n8.  将鼠标指针移到图像视图上，按住 Control 键，然后从图像视图 Control-拖拽到\
    \ `ViewController.swift` 文件中 `IBOutlet` 行的下方。\n\n9.  松开 Control 键和鼠标左键。将出现一个弹出窗口。\n\
    \n10. 点击“名称”文本字段，输入 `topImageView`，然后点击“连接”按钮。Xcode 会创建一个 `IBOutlet` 变量，如下所示：\n\
    \n```\n@IBOutlet var topImageView: UIImageView!\n```\n\n11. 选择“视图”➤“标准编辑器”➤“显示标准编辑器”，或点击\
    \ Xcode 窗口右上角的“标准编辑器”图标。\n"
- fmt: "## 12. 点击导航面板中的`ViewController.swift`文件。\n\n## 13. 在`IBOutlet`下方添加以下代码行：\n\
    \n```swift\nvar pinchMe: UIPinchGestureRecognizer?\n```\n\n该代码定义了一个全局变量，用于表示捏合手势。\n\
    \n## 14. 按如下方式编辑`viewDidLoad`方法：\n\n```swift\noverride func viewDidLoad() {\n\
    \    super.viewDidLoad()\n    topImageView.isUserInteractionEnabled = true\n \
    \   topImageView.backgroundColor = UIColor.green\n    let pinchGesture = UIPinchGestureRecognizer(target:\
    \ self, action: #selector(handlePinch))\n    topImageView.addGestureRecognizer(pinchGesture)\n\
    \    pinchMe = pinchGesture\n    // Do any additional setup after loading the\
    \ view, typically from a nib.\n}\n```\n\n这段代码开启了图像视图的用户交互启用设置，并将其背景颜色定义为绿色以便可见。接着，它定义了一个捏合手势识别器（而非从对象库窗口中拖放捏合手势识别器），定义了一个名为`handlePinch`的函数来响应捏合手势，并将捏合手势链接到图像视图，使得捏合操作仅影响该图像视图。最后，它将捏合手势识别器赋值给`pinchMe`变量。\n\
    \n## 15. 在`viewDidLoad`方法下方添加以下函数：\n\n```swift\n@objc func handlePinch() {\n \
    \   topImageView.transform = CGAffineTransform(scaleX: pinchMe!.scale, y: pinchMe!.scale)\n\
    }\n```\n\n整个`ViewController.swift`文件应如下所示：\n\n```swift\nimport UIKit\nclass ViewController:\
    \ UIViewController {\n    @IBOutlet var topImageView: UIImageView!\n    var pinchMe:\
    \ UIPinchGestureRecognizer?\n    \n    override func viewDidLoad() {\n       \
    \ super.viewDidLoad()\n        topImageView.isUserInteractionEnabled = true\n\
    \        topImageView.backgroundColor = UIColor.green\n        let pinchGesture\
    \ = UIPinchGestureRecognizer(target: self, action: #selector(handlePinch))\n \
    \       topImageView.addGestureRecognizer(pinchGesture)\n        pinchMe = pinchGesture\n\
    \        // Do any additional setup after loading the view, typically from a nib.\n\
    \    }\n    \n    @objc func handlePinch() {\n        topImageView.transform =\
    \ CGAffineTransform(scaleX: pinchMe!.scale, y: pinchMe!.scale)\n    }\n}\n```\n\
    \n## 16. 点击运行按钮或选择“产品” ➤ “运行”。模拟器窗口将出现。要模拟捏合手势，您需要使用鼠标并按住 Option 键。\n\n## 17.\
    \ 将鼠标指针移到图像视图上，然后按住 Option 键。屏幕上会出现两个灰点，模拟两个指尖（见图 [11-11](#329781_5_En_11_Chapter.xhtml#Fig11)）。\n\
    \n## 18. 按住鼠标左键和 Option 键，然后拖动鼠标模拟捏合手势。注意，当捏合手势变化时，图像视图的大小也会随之变化。\n\n## 19. 选择“模拟器”\
    \ ➤ “退出模拟器”以返回 Xcode。\n\n# 检测旋转手势\n\n旋转手势与捏合手势类似，因为它们都使用两个指尖。主要区别在于，旋转手势检测两个指尖以顺时针或逆时针方向做圆周运动的情况。在旋转手势期间，应用可以识别旋转（以弧度为单位）和速度（以弧度/秒为单位）。\n\
    \n要了解如何使用旋转手势，请按照以下步骤操作：\n\n## 1. 使用“单一视图应用”模板（见第 [1](#329781_5_En_1_Chapter.xhtml)\
    \ 章）创建一个新的 iOS 项目，并将此新项目命名为`RotateApp`。这将为用户界面创建一个单一视图。\n\n## 2. 点击导航面板中的`Main.storyboard`文件。Xcode\
    \ 显示该单一视图。\n\n## 3. 点击库图标以打开“对象库”窗口，查找“旋转手势识别器”，如图 [11-12](#329781_5_En_11_Chapter.xhtml#Fig12)\
    \ 所示。\n\n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig12_HTML.jpg](images/329781_5_En_11_Chapter/329781_5_En_11_Fig12_HTML.jpg)\n\
    \n图 11-12 — 对象库窗口中的旋转手势识别器\n\n## 4. 将旋转手势识别器拖放到视图上。Xcode 会在文档大纲和视图控制器上方显示旋转手势识别器。\n\
    \n## 5. 点击库图标以打开“对象库”窗口，并将一个图像视图拖放到用户界面上。\n\n## 6. 选择“视图” ➤ “检查器” ➤ “显示属性检查器”，或点击\
    \ Xcode 窗口右上角的“属性检查器”图标。\n\n## 7. 点击“背景”弹出菜单，选择一种颜色，例如绿色或蓝色。这将使图像视图在模拟器中运行应用时易于找到。若无背景颜色，图像视图默认的白色背景将与视图的白色背景融为一体。\n\
    \n## 8. 勾选“启用用户交互”复选框。这允许图像视图响应用户操作。\n\n## 9. 点击 Xcode 中间面板底部的“对齐”图标。将出现一个窗口。\n\
    \n## 10. 勾选“水平居中于容器”和“垂直居中于容器”复选框，然后点击“添加 2 个约束”按钮（见图 [11-10](#329781_5_En_11_Chapter.xhtml#Fig10)）。图像视图需要位于中心位置，以便在模拟器中轻松模拟捏合手势。\n\
    \n## 11. 选择“编辑器” ➤ “解决自动布局问题” ➤ 在子菜单的上半部分点击“添加缺失的约束”。Xcode 会为图像视图添加额外的约束。\n\n\
    ## 12. 将鼠标指针移到图像视图上，按住 Control 键，然后从图像视图 Control-拖动到文档大纲或视图控制器顶部的“旋转手势识别器”图标上。\n\
    \n## 13. 松开 Control 键和鼠标左键。将出现一个窗口。\n\n## 14. 选择`gestureRecognizers`。此链接使图像视图能够检测旋转手势。\n\
    \n## 15. 选择“视图” ➤ “辅助编辑器” ➤ “显示辅助编辑器”，或点击“辅助编辑器”图标。Xcode 并排显示`Main.storyboard`和`ViewController.swift`文件。\n\
    \n## 16. 将鼠标指针移到图像视图上，按住 Control 键，然后从图像视图 Control-拖动到`ViewController.swift`文件中`class\
    \ ViewController`行下方。\n\n## 17. 松开 Control 键和鼠标左键。将出现一个弹出窗口。\n\n## 18. 在“名称”文本字段中点击，输入`topImageView`，然后点击“连接”按钮。Xcode\
    \ 会创建一个`IBOutlet`变量，如下所示：\n\n```swift\n@IBOutlet var topImageView: UIImageView!\n\
    ```\n\n## 19. 将鼠标指针移到文档大纲或视图控制器顶部的“旋转手势识别器”图标上，按住 Control 键，然后从旋转手势识别器 Control-拖动到`ViewController.swift`文件中最后一个大括号上方。\n\
    \n## 20. 松开 Control 键和鼠标左键。将出现一个弹出窗口。\n\n## 21. 在“名称”文本字段中点击，输入`rotationDetected`，在“类型”弹出菜单中选择`UIRotationGestureRecognizer`，然后点击“连接”按钮。Xcode\
    \ 会创建一个`IBAction`方法。"
  raw: "12.  Click the ViewController.swift file in the Navigator pane.\n\n13.  Add\
    \ the following line underneath the IBOutlet:\n\n```\n    var pinchMe: UIPinchGestureRecognizer?\n\
    \    ```\n\nThis defines a global variable that represents the pinch gesture.\n\
    \n14.  Edit the viewDidLoad method as follows:\n\n```\n    override func viewDidLoad()\
    \ {\n    super.viewDidLoad()\n    topImageView.isUserInteractionEnabled = true\n\
    \    topImageView.backgroundColor = UIColor.green\n    let pinchGesture = UIPinchGestureRecognizer(target:\
    \ self, action: #selector(handlePinch))\n    topImageView.addGestureRecognizer(pinchGesture)\n\
    \    pinchMe = pinchGesture\n    // Do any additional setup after loading the\
    \ view, typically from a nib.\n    }\n    ```\n\nThis code turns on the User Interaction\
    \ Enabled setting for the image view and defines its background color as green\
    \ to make it visible. Next, it defines a pinch gesture recognizer (instead of\
    \ dragging and dropping a Pinch Gesture Recognizer from the Object Library window),\
    \ defines a function called handlePinch to respond to the pinch gesture, and links\
    \ the pinch gesture to the image view so pinches only affect the image view. Finally,\
    \ it assigns the pinch gesture recognizer to the pinchMe variable.\n\n15.  Add\
    \ the following function underneath the viewDidLoad method:\n\n```\n    @objc\
    \ func handlePinch() {\n    topImageView.transform = CGAffineTransform(scaleX:\
    \ pinchMe!.scale, y: pinchMe!.scale)\n    }\n    ```\n\nThe entire ViewController.swift\
    \ file should look like this:\n\n```\n    import UIKit\n    class ViewController:\
    \ UIViewController {\n    @IBOutlet var topImageView: UIImageView!\n    var pinchMe:\
    \ UIPinchGestureRecognizer?\n    override func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    topImageView.isUserInteractionEnabled = true\n    topImageView.backgroundColor\
    \ = UIColor.green\n    let pinchGesture = UIPinchGestureRecognizer(target: self,\
    \ action: #selector(handlePinch))\n    topImageView.addGestureRecognizer(pinchGesture)\n\
    \    pinchMe = pinchGesture\n    // Do any additional setup after loading the\
    \ view, typically from a nib.\n    }\n    @objc func handlePinch() {\n    topImageView.transform\
    \ = CGAffineTransform(scaleX: pinchMe!.scale, y: pinchMe!.scale)\n    }\n    }\n\
    \    ```\n\n16.  Click the Run button or choose Product ➤ Run. The Simulator window\
    \ appears. To mimic a pinch gesture, you need to use the mouse and hold down the\
    \ Option key.\n\n17.  Move the mouse pointer over the image view, then hold down\
    \ the Option key. Two gray dots appear to simulate two fingertips on the screen\
    \ (see Figure [11-11](#329781_5_En_11_Chapter.xhtml#Fig11)).\n\n18.  Hold down\
    \ the left mouse button and the Option key, then drag the mouse to simulate a\
    \ pinch gesture. Notice that as the pinch gesture changes, the image view also\
    \ changes in size.\n\n19.  Choose Simulator ➤ Quit Simulator to return to Xcode.\n\
    \n## Detecting Rotation Gestures\n\nA rotation gesture is similar to a pinch gesture\
    \ because they both use two fingertips. The main difference is that rotation gesture\
    \ detects when the two fingertips move in a circular motion clockwise or counterclockwise.\
    \ During a rotation gesture, an app can recognize rotation (measured in radians)\
    \ and velocity (measured in radians per second).\n\nTo see how to use a rotation\
    \ gesture, follow these steps:\n\n1.  Create a new iOS project using the Single\
    \ View App template (see Chapter [1](#329781_5_En_1_Chapter.xhtml)) and name this\
    \ new project RotateApp. This creates a single view for the user interface.\n\n\
    2.  Click the Main.storyboard file in the Navigator pane. Xcode displays the single\
    \ view.\n\n3.  Click the Library icon to open the Object Library window and look\
    \ for the Rotate Gesture Recognizer as shown in Figure [11-12](#329781_5_En_11_Chapter.xhtml#Fig12).\n\
    \n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig12_HTML.jpg](images/329781_5_En_11_Chapter/329781_5_En_11_Fig12_HTML.jpg)\n\
    \nFigure 11-12\n\nThe Rotate Gesture Recognizer in the Object Library window\n\
    \n4.  Drag and drop the Rotate Gesture Recognizer onto the view. Xcode displays\
    \ the Rotate Gesture Recognizer in the Document Outline and above the View Controller.\n\
    \n5.  Click the Library icon to open the Object Library window and drag and drop\
    \ an image view on the user interface.\n\n6.  Choose View ➤ Inspectors ➤ Show\
    \ Attributes Inspector or click the Attributes Inspector icon in the upper right\
    \ corner of the Xcode window.\n\n7.  Click in the Background popup menu and choose\
    \ a color such as green or blue. This will make the image view easy to find when\
    \ you run the app in the Simulator. Without a background color, the default white\
    \ background of the image view will blend in with the white background of the\
    \ view.\n\n8.  Select the User Interaction Enabled check box. This allows the\
    \ image view to respond to the user.\n\n9.  Click the Align icon in the bottom\
    \ of the middle Xcode pane. A window appears.\n\n10.  Select the Horizontally\
    \ in Container and Vertically in Container check boxes and then click the Add\
    \ 2 Constraints button (see Figure [11-10](#329781_5_En_11_Chapter.xhtml#Fig10)).\
    \ The image view needs to be in the center to make it easy to mimic pinching gestures\
    \ in the Simulator.\n\n11.  Choose Editor ➤ Resolve Auto Layout Issues ➤ Add Missing\
    \ Constraints in the top half of the submenu. Xcode adds additional constraints\
    \ to the image view.\n\n12.  Move the mouse pointer over the image view, hold\
    \ down the Control key, and Ctrl-drag from the image view to the Rotation Gesture\
    \ Recognizer icon in the Document Outline or at the top of the View Controller.\n\
    \n13.  Release the Control key and the left mouse button. A window appears.\n\n\
    14.  Choose gestureRecognizers. This link lets the image view detect rotation\
    \ gestures.\n\n15.  Choose View ➤ Assistant Editor ➤ Show Assistant Editor, or\
    \ click the Assistant Editor icon. Xcode displays the Main.storyboard and ViewController.swift\
    \ file side by side.\n\n16.  Move the mouse pointer over the image view, hold\
    \ down the Control key, and Ctrl-drag from the image view to the ViewController.swift\
    \ file underneath the “class ViewController” line.\n\n17.  Release the Control\
    \ key and the left mouse button. A popup window appears.\n\n18.  Click in the\
    \ Name text field, type **topImageView**, and click the Connect button. Xcode\
    \ creates an IBOutlet variable as follows:\n\n```\n    @IBOutlet var topImageView:\
    \ UIImageView!\n    ```\n\n19.  Move the mouse pointer over the Rotation Gesture\
    \ Recognizer icon in the Document Outline or at the top of the View Controller,\
    \ hold down the Control key, and Ctrl-drag from the Rotation Gesture Recognizer\
    \ above the last curly bracket in the ViewController.swift file.\n\n20.  Release\
    \ the Control key and the left mouse button. A popup window appears.\n\n21.  Click\
    \ in the Name text field, type **rotationDetected** , click in the Type popup\
    \ menu and choose UIRotationGestureRecognizer, and click the Connect button. Xcode\
    \ creates an IBAction method."
  trans: "```markdown\n\n## 12. 点击导航面板中的`ViewController.swift`文件。\n\n## 13. 在`IBOutlet`下方添加以下代码行：\n\
    \n```swift\nvar pinchMe: UIPinchGestureRecognizer?\n```\n\n该代码定义了一个全局变量，用于表示捏合手势。\n\
    \n## 14. 按如下方式编辑`viewDidLoad`方法：\n\n```swift\noverride func viewDidLoad() {\n\
    \    super.viewDidLoad()\n    topImageView.isUserInteractionEnabled = true\n \
    \   topImageView.backgroundColor = UIColor.green\n    let pinchGesture = UIPinchGestureRecognizer(target:\
    \ self, action: #selector(handlePinch))\n    topImageView.addGestureRecognizer(pinchGesture)\n\
    \    pinchMe = pinchGesture\n    // Do any additional setup after loading the\
    \ view, typically from a nib.\n}\n```\n\n这段代码开启了图像视图的用户交互启用设置，并将其背景颜色定义为绿色以便可见。接着，它定义了一个捏合手势识别器（而非从对象库窗口中拖放捏合手势识别器），定义了一个名为`handlePinch`的函数来响应捏合手势，并将捏合手势链接到图像视图，使得捏合操作仅影响该图像视图。最后，它将捏合手势识别器赋值给`pinchMe`变量。\n\
    \n## 15. 在`viewDidLoad`方法下方添加以下函数：\n\n```swift\n@objc func handlePinch() {\n \
    \   topImageView.transform = CGAffineTransform(scaleX: pinchMe!.scale, y: pinchMe!.scale)\n\
    }\n```\n\n整个`ViewController.swift`文件应如下所示：\n\n```swift\nimport UIKit\nclass ViewController:\
    \ UIViewController {\n    @IBOutlet var topImageView: UIImageView!\n    var pinchMe:\
    \ UIPinchGestureRecognizer?\n    \n    override func viewDidLoad() {\n       \
    \ super.viewDidLoad()\n        topImageView.isUserInteractionEnabled = true\n\
    \        topImageView.backgroundColor = UIColor.green\n        let pinchGesture\
    \ = UIPinchGestureRecognizer(target: self, action: #selector(handlePinch))\n \
    \       topImageView.addGestureRecognizer(pinchGesture)\n        pinchMe = pinchGesture\n\
    \        // Do any additional setup after loading the view, typically from a nib.\n\
    \    }\n    \n    @objc func handlePinch() {\n        topImageView.transform =\
    \ CGAffineTransform(scaleX: pinchMe!.scale, y: pinchMe!.scale)\n    }\n}\n```\n\
    \n## 16. 点击运行按钮或选择“产品” ➤ “运行”。模拟器窗口将出现。要模拟捏合手势，您需要使用鼠标并按住 Option 键。\n\n## 17.\
    \ 将鼠标指针移到图像视图上，然后按住 Option 键。屏幕上会出现两个灰点，模拟两个指尖（见图 11-11）。\n\n## 18. 按住鼠标左键和 Option\
    \ 键，然后拖动鼠标模拟捏合手势。注意，当捏合手势变化时，图像视图的大小也会随之变化。\n\n## 19. 选择“模拟器” ➤ “退出模拟器”以返回 Xcode。\n\
    \n# 检测旋转手势\n\n旋转手势与捏合手势类似，因为它们都使用两个指尖。主要区别在于，旋转手势检测两个指尖以顺时针或逆时针方向做圆周运动的情况。在旋转手势期间，应用可以识别旋转（以弧度为单位）和速度（以弧度/秒为单位）。\n\
    \n要了解如何使用旋转手势，请按照以下步骤操作：\n\n## 1. 使用“单一视图应用”模板（见第 1 章）创建一个新的 iOS 项目，并将此新项目命名为`RotateApp`。这将为用户界面创建一个单一视图。\n\
    \n## 2. 点击导航面板中的`Main.storyboard`文件。Xcode 显示该单一视图。\n\n## 3. 点击库图标以打开“对象库”窗口，查找“旋转手势识别器”，如图\
    \ 11-12 所示。\n\n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig12_HTML.jpg](img/329781_5_En_11_Fig12_HTML.jpg)\n\
    \n图 11-12 — 对象库窗口中的旋转手势识别器\n\n## 4. 将旋转手势识别器拖放到视图上。Xcode 会在文档大纲和视图控制器上方显示旋转手势识别器。\n\
    \n## 5. 点击库图标以打开“对象库”窗口，并将一个图像视图拖放到用户界面上。\n\n## 6. 选择“视图” ➤ “检查器” ➤ “显示属性检查器”，或点击\
    \ Xcode 窗口右上角的“属性检查器”图标。\n\n## 7. 点击“背景”弹出菜单，选择一种颜色，例如绿色或蓝色。这将使图像视图在模拟器中运行应用时易于找到。若无背景颜色，图像视图默认的白色背景将与视图的白色背景融为一体。\n\
    \n## 8. 勾选“启用用户交互”复选框。这允许图像视图响应用户操作。\n\n## 9. 点击 Xcode 中间面板底部的“对齐”图标。将出现一个窗口。\n\
    \n## 10. 勾选“水平居中于容器”和“垂直居中于容器”复选框，然后点击“添加 2 个约束”按钮（见图 11-10）。图像视图需要位于中心位置，以便在模拟器中轻松模拟捏合手势。\n\
    \n## 11. 选择“编辑器” ➤ “解决自动布局问题” ➤ 在子菜单的上半部分点击“添加缺失的约束”。Xcode 会为图像视图添加额外的约束。\n\n\
    ## 12. 将鼠标指针移到图像视图上，按住 Control 键，然后从图像视图 Control-拖动到文档大纲或视图控制器顶部的“旋转手势识别器”图标上。\n\
    \n## 13. 松开 Control 键和鼠标左键。将出现一个窗口。\n\n## 14. 选择`gestureRecognizers`。此链接使图像视图能够检测旋转手势。\n\
    \n## 15. 选择“视图” ➤ “辅助编辑器” ➤ “显示辅助编辑器”，或点击“辅助编辑器”图标。Xcode 并排显示`Main.storyboard`和`ViewController.swift`文件。\n\
    \n## 16. 将鼠标指针移到图像视图上，按住 Control 键，然后从图像视图 Control-拖动到`ViewController.swift`文件中`class\
    \ ViewController`行下方。\n\n## 17. 松开 Control 键和鼠标左键。将出现一个弹出窗口。\n\n## 18. 在“名称”文本字段中点击，输入`topImageView`，然后点击“连接”按钮。Xcode\
    \ 会创建一个`IBOutlet`变量，如下所示：\n\n```swift\n@IBOutlet var topImageView: UIImageView!\n\
    ```\n\n## 19. 将鼠标指针移到文档大纲或视图控制器顶部的“旋转手势识别器”图标上，按住 Control 键，然后从旋转手势识别器 Control-拖动到`ViewController.swift`文件中最后一个大括号上方。\n\
    \n## 20. 松开 Control 键和鼠标左键。将出现一个弹出窗口。\n\n## 21. 在“名称”文本字段中点击，输入`rotationDetected`，在“类型”弹出菜单中选择`UIRotationGestureRecognizer`，然后点击“连接”按钮。Xcode\
    \ 会创建一个`IBAction`方法。\n\n```"
- fmt: "22. 编辑`rotationDetected` IBAction 方法，如下所示：\n\n```\n@IBAction func rotationDetected(_\
    \ sender: UIRotationGestureRecognizer) {\n    topImageView.transform = CGAffineTransform(rotationAngle:\
    \ sender.rotation)\n}\n```\n\n`rotationDetected` IBAction 方法根据旋转手势的`rotation`属性旋转图像视图，其中`scale`属性定义了捏合手势的距离。完整的`ViewController.swift`文件应如下所示：\n\
    \n```\nimport UIKit\nclass ViewController: UIViewController {\n    @IBOutlet var\
    \ topImageView: UIImageView!\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        // Do any additional setup after loading the view, typically from a nib.\n\
    \    }\n    @IBAction func rotationDetected(_ sender: UIRotationGestureRecognizer)\
    \ {\n        topImageView.transform = CGAffineTransform(rotationAngle: sender.rotation)\n\
    \    }\n}\n```\n\n23. 选择 **View ➤ Standard Editor ➤ Show Standard Editor**，或点击\
    \ Xcode 窗口右上角的 Standard Editor 图标。\n\n24. 点击 Run 按钮或选择 **Product ➤ Run**。模拟器窗口将出现。要模拟旋转手势，您需要使用鼠标并按住\
