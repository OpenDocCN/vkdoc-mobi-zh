  \n图 14-14\n\n在表格视图的最右侧出现一个索引\n\n9. 点击 `R` 索引项。注意，由于字母 `R` 是索引中的第四项，表格视图会跳转到第四部分。\n\
  \n10. 点击 `B` 索引项。注意，由于字母 `B` 是索引中的第一项，表格视图会跳转到第一部分。\n\n11. 点击另外两个索引条目（`F` 和 `M`），查看表格视图如何跳转到各个部分。\n\
  \n12. 选择 **模拟器** ➤ **退出模拟器** (Simulator ➤ Quit Simulator) 以返回 `Xcode`。\n\n## 使用表格视图控制器\n\
  \n在本章中，我们一直使用的是**单视图应用** (Single View App) 项目，并从对象库窗口中添加了一个**表视图** (table view)。创建表格视图的第二种方法是在故事板中添加一个表格视图控制器。表视图和表格视图控制器之间的主要区别在于，表格视图控制器包含以下部分：\n\
  \n* 一个视图控制器\n* 该视图控制器上的一个表视图\n* 表视图上的一个表格视图单元格\n\n要了解如何使用表格视图控制器，请遵循以下步骤：\n\n1.\
  \ 使用**单视图应用** (Single View App) 模板创建一个新的 iOS 项目（参见第 1 章），并将此新项目命名为 `TableViewControllerApp`。这会为用户界面创建一个单视图。\n\
  \n2. 在导航面板中点击 `Main.storyboard` 文件。Xcode 会显示每个单视图应用项目自动附带的单视图。\n\n3. 在文档大纲中点击**视图控制器场景**\
  \ (View Controller Scene)，如图 14-15 所示。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig15_HTML.jpg](img/329781_5_En_14_Fig15_HTML.jpg)\n\
  \n图 14-15\n\n选中一个视图控制器\n\n4. 按 **退格键** (BACKSPACE) 或 **删除键** (DELETE) 从故事板中删除该视图控制器。Xcode\
  \ 会从故事板中移除选中的视图控制器。\n\n5. 在导航面板中点击 `ViewController.swift` 文件。这个 `.swift` 文件之前是连接到我们刚删除的那个视图控制器的，所以我们不再需要它了。\n\
  \n6. 按 **退格键** (BACKSPACE) 或 **删除键** (DELETE) 删除 `ViewController.swift` 文件。此时会弹出一个对话框，询问您是移除文件的引用还是将其移到废纸篓，如图\
  \ 14-16 所示。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig16_HTML.jpg](img/329781_5_En_14_Fig16_HTML.jpg)\n\
  \n图 14-16\n\n删除 `.swift` 文件时提供选项\n\n7. 点击 **移到废纸篓** (Move to Trash)。Xcode 会删除 `ViewController.swift`\
  \ 文件。\n\n8. 点击 **库** (Library) 图标打开**对象库** (Object Library) 窗口，查找黄色的**表格视图控制器**图标，如图\
  \ 14-17 所示。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig17_HTML.jpg](img/329781_5_En_14_Fig17_HTML.jpg)\n\
  \n图 14-17\n\n对象库窗口中的表格视图控制器\n\n9. 将**表格视图控制器**从对象库窗口拖拽到空白的故事板上。Xcode 会显示该表格视图控制器，如图\
  \ 14-18 所示。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig18_HTML.jpg](img/329781_5_En_14_Fig18_HTML.jpg)\n\
  \n图 14-18\n\n故事板中的表格视图控制器\n\n10. 选择 **视图** ➤ **检查器** ➤ **显示属性检查器** (View ➤ Inspectors\
  \ ➤ Show Attributes Inspector)，或者点击 Xcode 窗口右上角的**属性检查器** (Attributes Inspector)\
  \ 图标。\n\n11. 选中 **是初始视图控制器** (Is Initial View Controller) 复选框，如图 14-19 所示。注意，选中此复选框后，表格视图控制器的左侧会出现一个箭头。\n\
  \n**注意** **只有一个**视图控制器可以被指定为初始视图控制器。初始视图控制器定义了应用运行时会出现的第一个视图控制器。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig19_HTML.jpg](img/329781_5_En_14_Fig19_HTML.jpg)\n\
  \n图 14-19\n\n“是初始视图控制器”复选框\n\n现在故事板中有了一个表格视图控制器，我们需要将其连接到一个 `.swift` 文件。这涉及两步过程：首先创建一个\
  \ `.swift` 文件，然后将它连接到表格视图控制器。\n\n1. 选择 **文件** ➤ **新建** ➤ **文件** (File ➤ New ➤ File)。此时会弹出一个模板对话框，如图\
  \ 14-20 所示。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig20_HTML.jpg](img/329781_5_En_14_Fig20_HTML.jpg)\n\
  \n图 14-20\n\n文件模板对话框\n\n\n\n2.  点击 `Cocoa Touch Class`，然后点击**Next**按钮。此时会出现另一个对话框。\n\
  \n3.  点击 `Class` 文本字段，删除现有文本，并输入 `TableViewController`。（该类名可任意指定。）\n\n4.  点击 `Subclass\
  \ of` 文本字段，选择 `UITableViewController`，如图 14-21 所示。然后点击**Next**按钮。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig21_HTML.jpg](img/329781_5_En_14_Fig21_HTML.jpg)\n\
  \n图 14-21  \n命名 `.swift` 文件并定义其子类\n\n5.  会出现另一个对话框询问你将该 `.swift` 文件存储在哪里。点击**Create**按钮。Xcode\
  \ 会创建 `TableViewController.swift` 文件。下一步是将此 `.swift` 文件连接到 Table View Controller。\n\
  \n6.  在导航窗格中点击 `Main.storyboard` 文件。\n\n7.  点击文档大纲中的“Table View Controller Scene”（表格视图控制器场景），或点击故事板中表格视图控制器上方的“Table\
  \ View Controller”（表格视图控制器）图标。\n\n8.  选择 `View` ➤ `Inspectors` ➤ `Show Identity\
  \ Inspector`，或者点击 Xcode 窗口右上角的“Identity Inspector”（身份检查器）图标。\n\n9.  点击 `Class` 弹出菜单，选择\
  \ `TableViewController`（或你在步骤 14 中给 `.swift` 文件起的任何名称），如图 14-22 所示。将 `.swift` 文件连接到视图控制器后，你现在可以创建用于处理表格视图控制器的\
  \ `IBOutlets`、`IBAction` 方法和 Swift 代码。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig22_HTML.jpg](img/329781_5_En_14_Fig22_HTML.jpg)\n\
  \n图 14-22  \n将 `.swift` 文件连接到 Table View Controller\n\n10. 在文档大纲中点击“Table View Cell”（表格视图单元格）。（你可能需要点击灰色的展开三角才能找到表格视图单元格。）\n\
  \n11. 选择 `View` ➤ `Inspectors` ➤ `Show Attributes Inspector`，或者点击 Xcode 窗口右上角的“Attributes\
  \ Inspector”（属性检查器）图标。\n\n12. 点击 `Identifier` 文本字段，输入 `cellID`，如图 14-23 所示。（该名称可任意指定。）然后按\
  \ ENTER 键。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig23_HTML.jpg](img/329781_5_En_14_Fig23_HTML.jpg)\n\
  \n图 14-23  \n为 Table View Cell 定义标识符\n\n13. 在导航窗格中点击 `TableViewController.swift`\
  \ 文件。\n\n14. 在 `class TableViewController` 行下方添加如下代码：\n\n```\nlet petArray = [\"\
  cat\", \"dog\", \"parakeet\", \"parrot\", \"canary\", \"finch\", \"tropical fish\"\
  , \"goldfish\", \"sea horses\", \"hamster\", \"gerbil\", \"rabbit\", \"turtle\"\
  , \"snake\", \"lizard\", \"hermit crab\"]\n```\n\n15. 按如下方式编辑 `numberOfSections`\
  \ 函数：\n\n```\noverride func numberOfSections(in tableView: UITableView) -> Int {\n\
  \    return 1\n}\n```\n\n16. 按如下方式编辑 `numberOfRowsInSection` 函数：\n\n```\noverride\
  \ func tableView(_ tableView: UITableView, numberOfRowsInSection section: Int) ->\
  \ Int {\n    return petArray.count\n}\n```\n\n17. 添加以下 `cellForRowAt` 函数以将数据存储到表格视图单元格中：\n\
  \n```\noverride func tableView(_ tableView: UITableView, cellForRowAt indexPath:\
  \ IndexPath) -> UITableViewCell {\n    let cell = tableView.dequeueReusableCell(withIdentifier:\
  \ \"cellID\")\n    cell?.textLabel?.text = petArray[indexPath.row]\n    return cell!\n\
  }\n```\n\n18. 添加以下 `didSelectRowAt` 函数以识别用户选择了哪一项：\n\n```\noverride func tableView(_\
  \ tableView: UITableView, didSelectRowAt indexPath: IndexPath) {\n    let selectedItem\
  \ = petArray[indexPath.row]\n    let alert = UIAlertController(title: \"Your Choice\"\
  , message: \"\\(selectedItem)\", preferredStyle: .alert)\n    let okAction = UIAlertAction(title:\
  \ \"OK\", style: .default, handler: { action -> Void in\n        //Just dismiss\
  \ the action sheet\n    })\n    alert.addAction(okAction)\n    self.present(alert,\
  \ animated: true, completion: nil)\n}\n```\n\n19. 在导航窗格中点击 `Main.storyboard` 文件。\n\
  \n20. 点击“Run”（运行）按钮，或选择 `Product` ➤ `Run`。模拟器窗口会打开，并在你的表格视图中显示数据（见图 14-4）。\n\n21.\
  \ 点击表格视图中的某一项。会弹出一个警告控制器来标识你的选择（见图 14-9）。\n\n22. 点击 OK 以关闭警告控制器。\n\n23. 选择 `Simulator`\
  \ ➤ `Quit Simulator` 以返回 Xcode。\n\n## 总结\n\n表格视图显示可供用户选择的数据行。表格视图需要一个数据源以及用于定义显示行数的函数。一个简单的表格视图只显示一个分区，但表格视图也可以显示多个分区，每个分区包含不同数量的行。\n\
  \n表格视图中的每一行都由一个单元格定义。你可以使用 Swift 代码定义单元格，也可以通过将表格视图单元格拖放到表格视图上来以可视方式定义。你必须为该单元格指定一个标识名称，这样你的\
  \ Swift 代码才能引用此单元格以在其中存储数据。\n\n使用 Table View Controller 时，你需要将其连接到自己的 `.swift` 文件，你可以定义该文件以使其代表一个\
  \ `UITableViewController`。这样就无需将 `.swift` 文件声明为表格视图的委托和数据源。\n\n表格视图和 Table View\
  \ Controller 的主要区别在于，表格视图出现在现有视图上，而 Table View Controller 则出现在故事板中。\n\n# 15. 自定义表格视图单元格\n\
  \n第 14 章介绍了如何创建不同类型的表格视图，包括普通表格和分组表格以及分区索引。到目前为止，我们只使用了显示单行文本的简单单元格。在本章中，你将学习如何自定义单元格以显示额外的文本和图像。此外，你还将学习如何修改单元格的外观。\n\
  \n表格视图中的单元格可以显示如图 15-1 所示的内容：\n\n![../images/329781_5_En_15_Chapter/329781_5_En_15_Fig1_HTML.jpg](img/329781_5_En_15_Fig1_HTML.jpg)\n\
  \n图 15-1  \n表格视图单元格的组成部分\n\n*   `textLabel` – 定义单元格中显示的主要文本\n*   `detailTextLabel`\
  \ – 定义次要文本，其字体大小小于 `textLabel` 文本\n*   `imageView` – 定义单元格中显示的图像\n\n## 在 Swift 中自定义表格视图单元格\n\
  \n表格视图单元格可以有不同的样式，这些样式定义了文本、详细文本和图像如何显示。四种不同的单元格样式类型如图 15-2 所示：\n\n*   `.default`\
  \ – 显示文本标签，但不显示详细文本标签。图像视图可以显示在左侧。\n*   `.value1` – 在左侧显示文本标签，在右侧显示详细文本标签。图像视图可以显示在左侧。\n\
  *   `.value2` – 在左侧以蓝色缩进显示文本标签，在右侧以缩进显示详细文本标签。不显示图像视图。\n*   `.subtitle` – 在左侧显示文本标签，在其下方以较小字体显示详细文本标签。图像视图可以显示在左侧。\n\
  \n![../images/329781_5_En_15_Chapter/329781_5_En_15_Fig2_HTML.jpg](img/329781_5_En_15_Fig2_HTML.jpg)\n\
  \n图 15-2  \n单元格的四种不同样式\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵守您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n---\n\n\n#### 注意\n\n`.default` 单元格样式是唯一不允许显示详细文本标签的样式。`.value2` 单元格样式是唯一不允许显示图像视图的样式。\n\
  \n在创建可以显示图像的表格视图之前，我们需要一些图像。一些免费的、公共领域的图片来源包括：\n\n-   icons8.com\n-   iconarchive.com\n\
  -   aiconica.net\n\n对于本例，我们需要四个不同的图像，最好是相同大小和文件格式，例如 `.png` 或 `.jpg`。每个图像的具体名称无关紧要，但我们需要能够识别每个图像。\n\
  \n在本例中，我们将在表格视图中显示四个项目。为简化问题，我们将使用三个包含四个项目的不同数组，一个用于文本标签，一个用于详细文本标签，一个用于图像视图。在实际应用中，您可能希望使用单一数据结构（如字典）来将相关数据放在一起。\n\
  \n在表格视图单元格中显示文本涉及将表格视图单元格的 `textLabel.text` 和 `detailTextLabel.text` 属性分配给一个字符串，例如：\n\
  \n```swift\ncell?.textLabel?.text = \"String or string variable\"\ncell?.detailTextLabel?.text\
  \ = \"String or string variable\"\n```\n\n在表格视图单元格中显示图像涉及将图像文件名分配给图像视图的 `Image`\
  \ 属性，例如：\n\n```swift\ncell?.imageView?.image = UIImage(named: \"Image file name\"\
  )\n```\n\n要了解如何创建并用文本、详细文本和图像填充表格视图，请遵循以下步骤：\n\n1.  使用单视图应用模板创建一个新的 iOS 项目（见第 1\
  \ 章），并将这个新项目命名为 `TableCellApp`。这会为用户界面创建一个单一视图。\n\n2.  在导航窗格中点击 `Main.storyboard`\
  \ 文件。Xcode 会显示该单一视图。\n\n3.  点击库图标以打开对象库窗口。\n\n4.  将一个表格视图拖放到视图上。\n\n5.  调整表格视图的大小，使其填满整个屏幕。\n\
  \n6.  选择 **Editor > Resolve Auto Layout Issues > Reset to Suggested Constraints**。Xcode\
  \ 会为表格视图添加约束。\n\n7.  选择 **View > Assistant Editor > Show Assistant Editor**，或点击\
  \ Xcode 窗口右上角的 Assistant Editor 图标。\n\n8.  将鼠标指针移到表格视图上，按住 **Control** 键，然后在 `ViewController.swift`\
  \ 文件中的 `class ViewController` 行下方进行 Ctrl-拖拽。\n\n9.  松开 **Control** 键和鼠标左键。会弹出一个窗口。\n\
  \n10. 点击名称文本字段，输入 `tableData`，然后点击连接按钮。Xcode 会创建一个 `IBOutlet`，如下所示：\n\n```swift\n\
  @IBOutlet var tableData: UITableView!\n```\n\n11. 选择 **View > Standard Editor >\
  \ Show Standard Editor**，或点击 Xcode 窗口右上角的 Standard Editor 图标。\n\n12. 在导航窗格中点击 `ViewController.swift`\
  \ 文件。\n\n13. 通过添加 `UITableViewDelegate`, `UITableViewDataSource` 来修改 `class ViewController`\
  \ 行，如下所示：\n\n```swift\nclass ViewController: UIViewController, UITableViewDelegate,\
  \ UITableViewDataSource {\n```\n\n此代码的目的是将 `ViewController.swift` 文件标识为表格视图的委托和数据源。\n\
  \n14. 将四个图像拖放到导航窗格中，如图 15-3 所示。会弹出一个对话框，询问如何将文件添加到项目中。\n\n![../images/329781_5_En_15_Chapter/329781_5_En_15_Fig3_HTML.jpg](img/329781_5_En_15_Fig3_HTML.jpg)\n\
  \n图 15-3：将图像文件拖放到导航窗格\n\n15. 点击完成按钮。记下所有图像文件的确切名称。\n\n16. 在 `class ViewController`\
  \ 行下方，添加以下三个数组以用四行数据填充表格视图：\n\n```swift\nlet mainArray = [\"Shuttle bus\", \"Hierarchy\"\
  , \"Exchange\", \"Padlock\"]\nlet detailArray = [\"6am - 10pm\", \"Acme corporation\"\
  , \"Ideas worth sharing\", \"Access denied\"]\nlet imageArray = [\"shuttle.png\"\
  , \"hierarchy.png\", \"exchange.png\", \"padlock.png\"]\n```\n\n对于 `imageArray`，请将这些文件名替换为您在第\
  \ 14 步中拖放到导航窗格中的图像文件的名称。\n\n17. 在此数组下方，添加以下代码行：\n\n```swift\nlet cellID = \"cellID\"\
  \n```\n\n此代码的目的是为单元格创建一个任意的常量名称。表格视图由一行行单元格组成，因此我们需要标识这些单元格以便稍后存储数据。\n\n18. 修改 `viewDidLoad`\
  \ 方法，如下所示：\n\n```swift\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
  \    tableData.delegate = self\n    tableData.dataSource = self\n    // Do any additional\
  \ setup after loading the view, typically from a nib.\n}\n```\n\n19. 在 `viewDidLoad`\
  \ 方法下方添加以下函数：\n\n```swift\nfunc tableView(_ tableView: UITableView, numberOfRowsInSection\
  \ section: Int) -> Int {\n    return mainArray.count\n}\n```\n\n20. 在 `viewDidLoad`\
  \ 方法下方添加以下函数：\n\n```swift\nfunc tableView(_ tableView: UITableView, cellForRowAt\
  \ indexPath: IndexPath) -> UITableViewCell {\n    var cell = tableView.dequeueReusableCell(withIdentifier:\
  \ cellID)\n    if (cell == nil) {\n        cell = UITableViewCell(\n           \
  \ style: UITableViewCell.CellStyle.subtitle,\n            reuseIdentifier: cellID)\n\
  \    }\n    cell?.textLabel?.text = mainArray[indexPath.row]\n    cell?.detailTextLabel?.text\
  \ = detailArray[indexPath.row]\n    cell?.imageView?.image = UIImage(named: imageArray[indexPath.row])\n\
  \    return cell!\n}\n```\n\n该函数将数组中的数据存储到表格视图中。由于表格视图中的每一行都由一个单元格定义，因此需要创建一个带有名称的单元格：\n\
  \n```swift\nvar cell = tableView.dequeueReusableCell(withIdentifier: cellID)\n```\n\
  \n如果单元格为空，则 `if` 语句会定义单元格的样式，并为其指定一个任意的 `cellID` 名称以便识别，并将单元格样式定义为 `.subtitle`（您可以随意将其更改为\
  \ `.default` 或 `.value1`）：\n\n```swift\nif (cell == nil) {\n    cell = UITableViewCell(\n\
  \        style: UITableViewCell.CellStyle.subtitle,\n        reuseIdentifier: cellID)\n\
  }\n```\n\n接着，它从 `mainArray` 中获取数据以存储在文本标签中，从 `detailArray` 中获取数据以存储在详细文本标签中，并从 `imageArray`\
  \ 中获取数据以确定将哪个图像放入图像视图：\n\n```swift\ncell?.textLabel?.text = mainArray[indexPath.row]\n\
  cell?.detailTextLabel?.text = detailArray[indexPath.row]\ncell?.imageView?.image\
  \ = UIImage(named: imageArray[indexPath.row])\n```\n\n21. 在 `viewDidLoad` 方法下方添加以下函数，以检测用户选择了哪个项目：\n\
  \n```swift\nfunc tableView(_ tableView: UITableView, didSelectRowAt indexPath: IndexPath)\
  \ {\n    let selectedItem = mainArray[indexPath.row]\n    let alert = UIAlertController(title:\
  \ \"Your Choice\", message: \"\\(selectedItem)\", preferredStyle: .alert)\n    let\
  \ okAction = UIAlertAction(title: \"OK\", style: .default, handler: { action ->\
  \ Void in\n        //Just dismiss the action sheet\n    })\n    alert.addAction(okAction)\n\
  \    self.present(alert, animated: true, completion: nil)\n}\n```\n\n完整的 `ViewController.swift`\
  \ 文件应如下所示。\n\n\n\n```swift\nimport UIKit\nclass ViewController: UIViewController,\
  \ UITableViewDelegate, UITableViewDataSource {\n    @IBOutlet var tableData: UITableView!\n\
  \    let mainArray = [\"Shuttle bus\", \"Hierarchy\", \"Exchange\", \"Padlock\"\
  ]\n    let detailArray = [\"6am - 10pm\", \"Acme corporation\", \"Ideas worth sharing\"\
  , \"Access denied\"]\n    let imageArray = [\"shuttle.png\", \"hierarchy.png\",\
  \ \"exchange.png\", \"padlock.png\"]\n    let cellID = \"cellID\"\n    override\
  \ func viewDidLoad() {\n        super.viewDidLoad()\n        tableData.delegate\
  \ = self\n        tableData.dataSource = self\n        // 在此处执行任何额外的设置，通常是从 nib\
  \ 加载后执行。\n    }\n    func tableView(_ tableView: UITableView, numberOfRowsInSection\
  \ section: Int) -> Int {\n        return mainArray.count\n    }\n    func tableView(_\
  \ tableView: UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell\
  \ {\n        var cell = tableView.dequeueReusableCell(withIdentifier: cellID)\n\
  \        if (cell == nil) {\n            cell = UITableViewCell(\n             \
  \   style: UITableViewCell.CellStyle.subtitle,\n                reuseIdentifier:\
  \ cellID)\n        }\n        cell?.textLabel?.text = mainArray[indexPath.row]\n\
  \        cell?.detailTextLabel?.text = detailArray[indexPath.row]\n        cell?.imageView?.image\
  \ = UIImage(named: imageArray[indexPath.row])\n        return cell!\n    }\n   \
  \ func tableView(_ tableView: UITableView, didSelectRowAt indexPath: IndexPath)\
  \ {\n        let selectedItem = mainArray[indexPath.row]\n        let alert = UIAlertController(title:\
  \ \"您的选择\", message: \"\\(selectedItem)\", preferredStyle: .alert)\n        let\
  \ okAction = UIAlertAction(title: \"确定\", style: .default, handler: { action ->\
  \ Void in\n            // 仅关闭操作表\n        })\n        alert.addAction(okAction)\n\
  \        self.present(alert, animated: true, completion: nil)\n    }\n}\n```\n\n\
  22. 点击运行按钮或者选择**产品（Product）** ➤ **运行（Run）**。模拟器窗口将出现，显示表格视图中的数据，如图 15-4 所示。\n\n\
  ![../images/329781_5_En_15_Chapter/329781_5_En_15_Fig4_HTML.jpg](img/329781_5_En_15_Fig4_HTML.jpg)\n\
  \n图 15-4\n\n显示文本标签、详细文本标签和图像视图的表格视图\n\n23. 点击某一项，会看到一个提示控制器显示您所选的项。然后点击**确定**以关闭提示控制器。\n\
  \n24. 选择**模拟器（Simulator）** ➤ **退出模拟器（Quit Simulator）** 返回 Xcode。\n\n尝试使用不同的单元格样式，例如\
  \ `.default`、`.value1`、`.value2` 和 `.subtitle`，看看它们如何改变表格视图的外观。请注意，如果将单元格样式更改为 `.value2`，图像视图将不会显示。\n\
  \n## 设计自定义表格视图单元格\n\n通过更改表格视图单元格样式，我们可以改变表格视图中每一行显示文本、详细文本和图像的方式。为了获得更大的灵活性，我们还可以通过从对象库窗口拖放对象到表格视图单元格上来设计自定义的表格视图单元格。\n\
  \n您不仅可以在自定义单元格中定义标签的位置，还可以自定义标签中文字的字体和字号大小。要了解如何创建自定义的表格视图单元格，请按照以下步骤操作：\n\n1. 使用单视图应用模板创建一个新的\
  \ iOS 项目（参见第 1 章），并将这个新项目命名为 `TableViewCellVisualApp`。这将为用户界面创建一个单视图。\n\n2. 在导航窗格中点击\
  \ `Main.storyboard` 文件。Xcode 将显示该单视图。\n\n3. 点击库图标以打开对象库窗口。\n\n4. 将表格视图拖放到视图的任意位置。\n\
  \n5. 调整表格视图的大小，使其填满整个屏幕。\n\n6. 选择**编辑器（Editor）** ➤ **解决自动布局问题（Resolve Auto Layout\
  \ Issues）** ➤ **重置为建议的约束（Reset to Suggested Constraints）**。Xcode 将为表格视图添加约束。\n\n\
  7. 点击库图标以打开对象库窗口。\n\n8. 将一个表格视图单元格（如图 15-5 所示）拖放到表格视图上。\n\n![../images/329781_5_En_15_Chapter/329781_5_En_15_Fig5_HTML.jpg](img/329781_5_En_15_Fig5_HTML.jpg)\n\
  \n图 15-5\n\n对象库窗口中的表格视图单元格\n\n9. 点击库图标以打开对象库窗口，并将一个图像视图拖放到表格视图单元格的最左侧。\n\n10. 点击库图标以打开对象库窗口，并将两个标签拖放到表格视图单元格上。\n\
  \n11. 将一个标签移动到图像视图的右上角。\n\n12. 将第二个标签移动到第一个标签的下方，并向右缩进。\n\n13. 点击第二个标签，然后选择**视图（View）**\
  \ ➤ **检查器（Inspectors）** ➤ **属性检查器（Attributes Inspector）**，或者点击 Xcode 窗口右上角的属性检查器图标。\n\
  \n14. 点击字体文本字段中的方形 T 图标，将弹出一个窗口。\n\n15. 点击**系列（Family）**弹出菜单，并选择 **Courier New**。\n\
  \n16. 在**大小（Size）**文本字段中点击并输入 12，如图 15-6 所示。整个表格视图单元格的外观应类似于图 15-7。\n\n![../images/329781_5_En_15_Chapter/329781_5_En_15_Fig7_HTML.jpg](img/329781_5_En_15_Fig7_HTML.jpg)\n\
  \n图 15-7\n\n表格视图单元格上两个标签和一个图像视图的设计\n\n![../images/329781_5_En_15_Chapter/329781_5_En_15_Fig6_HTML.jpg](img/329781_5_En_15_Fig6_HTML.jpg)\n\
  \n图 15-6\n\n为表格视图单元格自定义标签中的文本\n\n17. 在文档大纲中点击表格视图单元格，然后选择**视图（View）** ➤ **检查器（Inspectors）**\
  \ ➤ **显示属性检查器（Show Attributes Inspector）**，或者点击 Xcode 窗口右上角的属性检查器图标。\n\n18. 在**标识符（Identifier）**文本字段中点击，输入\
  \ `customCell`，然后按回车键，如图 15-8 所示。\n\n![../images/329781_5_En_15_Chapter/329781_5_En_15_Fig8_HTML.jpg](img/329781_5_En_15_Fig8_HTML.jpg)\n\
  \n图 15-8\n\n更改表格视图单元格的标识符\n\n19. 选择**文件（File）** ➤ **新建（New）** ➤ **文件（File）**。将出现一个模板窗口。\n\
  \n20. 选择 **Cocoa Touch 类（Cocoa Touch Class）**，然后点击**下一步（Next）**按钮。将出现另一个对话框，要求您输入文件的名称和子类。\n\
  \n21. 在**类（Class）**文本字段中点击并输入 `TableViewCell`。\n\n22. 在**子类于（Subclass of）**弹出菜单中点击，然后选择\
  \ `UITableViewCell`，如图 15-9 所示。\n\n![../images/329781_5_En_15_Chapter/329781_5_En_15_Fig9_HTML.jpg](img/329781_5_En_15_Fig9_HTML.jpg)\n\
  \n图 15-9\n\n定义一个新的 Cocoa Touch 类文件的类名和子类类型\n\n\n\n23.  点击**下一步**按钮。Xcode 会询问文件的存储位置。点击**创建**按钮。Xcode\
  \ 会在导航器面板中显示`TableViewCell.swift`文件。\n\n24.  点击导航器面板中的`Main.storyboard`文件。\n\n25.\
  \  在文档大纲中点击 customCell，然后选择“视图”➤“检查器”➤“显示身份检查器”，或点击 Xcode 窗口右上角的身份检查器图标。\n\n26.\
  \  点击类弹出菜单，然后选择`TableViewCell`，即你刚刚创建的`.swift`文件，如图 15-10 所示。\n\n![../images/329781_5_En_15_Chapter/329781_5_En_15_Fig10_HTML.jpg](img/329781_5_En_15_Fig10_HTML.jpg)\n\
  \n图 15-10\n\n将表格视图单元格连接到`TableViewCell.swift`文件\n\n27.  选择“视图”➤“辅助编辑器”➤“显示辅助编辑器”，或点击\
  \ Xcode 窗口右上角的辅助编辑器图标。此时，`Main.storyboard`文件显示在左侧，一个`.swift`文件显示在右侧。\n\n28.  点击辅助编辑器顶部看似两个圆环交错的图标，如图\
  \ 15-11 所示。将出现一个弹出菜单。\n\n![../images/329781_5_En_15_Chapter/329781_5_En_15_Fig11_HTML.jpg](img/329781_5_En_15_Fig11_HTML.jpg)\n\
  \n图 15-11\n\n两个圆环交错的图标\n\n29.  选择“手动”➤`TableViewCellVisualApp`➤`TableViewCellVisualApp`➤`TableViewCell.swift`，如图\
  \ 15-12 所示。现在，Xcode 会在`Main.storyboard`文件的右侧显示`TableViewCell.swift`文件。\n\n![../images/329781_5_En_15_Chapter/329781_5_En_15_Fig12_HTML.jpg](img/329781_5_En_15_Fig12_HTML.jpg)\n\
  \n图 15-12\n\n导航至`TableViewCell.swift`文件\n\n30.  将鼠标指针移到顶部标签上，按住 Control 键，然后 Ctrl-拖拽到`TableViewCell.swift`文件中的`class\
  \ TableViewCell`行下方。\n\n31.  松开 Control 键和鼠标左键。将出现一个弹出窗口。\n\n32.  点击“名称”文本框，输入`mainText`，然后点击“连接”按钮。Xcode\
  \ 会创建一个 `IBOutlet` 如下：\n\n```\n@IBOutlet var mainText: UILabel!\n```\n\n33.  将鼠标指针移到底部标签上，按住\
  \ Control 键，然后 Ctrl-拖拽到 `IBOutlet` 行的下方。\n\n34.  松开 Control 键和鼠标左键。将出现一个弹出窗口。\n\n\
  35.  点击“名称”文本框，输入`detailText`，然后点击“连接”按钮。Xcode 会创建一个 `IBOutlet` 如下：\n\n```\n@IBOutlet\
  \ var detailText: UILabel!\n```\n\n36.  将鼠标指针移到图像视图上，按住 Control 键，然后 Ctrl-拖拽到 `IBOutlet`\
