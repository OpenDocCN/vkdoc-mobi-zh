  \n图 16-10  \n选择要在助理编辑器中显示的 `itemCell.swift` 文件\n\n32. 将鼠标指针移到标签上，按住 `Control` 键，然后从该标签向\
  \ `itemCell.swift` 文件中的 `class TableViewCell` 行下方按住 Control 键拖拽。\n\n33. 释放 `Control`\
  \ 键和鼠标左键。此时会出现一个弹出窗口。\n\n34. 在 `Name` 文本框中点击，输入 `itemLabel`，然后点击 `Connect` 按钮。`Xcode`\
