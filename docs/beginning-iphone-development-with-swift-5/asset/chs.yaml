  48. 点击`Run`按钮或选择**Product** ➤ **Run**。模拟器窗口出现，在两个标签中显示图像和文本，如图 15-13 所示。请注意，底部标签从左边缘缩进，并以不同的字体和大小显示——这是我们在之前自定义的。\n\
