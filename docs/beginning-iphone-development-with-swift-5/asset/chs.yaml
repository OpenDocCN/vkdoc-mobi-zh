- "# 1. 理解 iOS 编程\n\n所有编程都涉及编写计算机要执行的指令这一相同任务。要学习 iOS 编程，你需要掌握三种不同的技能：\n\n- 如何用 Swift\
  \ 编程语言编写指令\n- 如何使用 Apple 的软件框架\n- 如何在 Xcode 中创建用户界面\n\n虽然完全使用 Swift 代码来创建整个 iOS\
  \ 应用是可行的，但这是一种繁琐、耗时且容易出错的方法。尝试用 Swift 编写整个 iOS 应用意味着你需要编写代码来创建用户界面，编写更多代码来与 iOS\
  \ 设备（如 iPhone 或 iPad）的硬件进行交互，然后再编写第三套代码来让应用实际工作。\n\n与其完全通过代码创建用户界面，不如在 Xcode 中以可视化的方式设计用户界面。这不仅能让创建用户界面更简单、更快速，并且与其他\
  \ iOS 应用的用户界面更一致，还能使你的代码不依赖于任何特定的用户界面设计。通过使用 Xcode，你可以保持用户界面与使应用工作的代码相分离。这让你可以灵活地修改用户界面，而无需同时修改代码。\n\
  \n每个 iOS 应用都需要与 iOS 设备的不同硬件特性（如摄像头或触摸屏）进行通信。Apple 并非强迫你编写代码与硬件交互，而是提供了多个软件库或框架，为你封装了这些代码。现在，无需编写自己的代码来访问摄像头或触摸屏，您可以直接使用\
  \ Apple 经过验证的框架，从一开始就让应用正确工作。\n\n本质上，每个 iOS 应用都由三个部分组成，如图 1-1 所示：\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig1_HTML.jpg](img/329781_5_En_1_Fig1_HTML.jpg)\n\
  \n**图 1-1** iOS 应用的三个组成部分\n\n- 你的代码，用于使应用执行有用功能\n- 可以在 Xcode 中可视化设计的用户界面\n- 通过一个或多个\
  \ Apple iOS 框架访问 iOS 设备硬件特性\n\nApple 为 iOS（以及其他操作系统，如 macOS、watchOS 和 tvOS）提供了数十个框架。只需使用\
  \ Apple 的框架，你就能通过编写很少的代码来完成常见任务。Apple 提供的一些框架包括：\n\n- `UIKit` – iOS 用户界面和触摸屏支持\n\
  - `ARKit` – 增强现实特性\n- `Core Animation` – 显示动画\n- `GameKit` – 创建多人互动应用\n- `Contacts`\
  \ – 访问 iOS 设备上的通讯录数据\n- `SiriKit` – 允许通过 Siri 使用语音命令\n- `AVKit` – 允许播放音频和视频文件\n\
  - `MediaLibrary` – 允许访问存储在 iOS 设备上的图像、音频和视频\n- `CallKit` – 提供语音通话功能\n\nApple 的框架本质上包含可重用的代码。这使得应用更可靠、更一致，同时通过使用经过验证且能正常工作的代码，节省了开发者的时间。要查看\
  \ Apple 可用软件框架的完整列表，请访问 Apple 的开发者文档网站（[`https://developer.apple.com/documentation`](https://developer.apple.com/documentation)）。\n\
  \nApple 的框架可以让你在创建 iOS 应用时占据巨大先机，但你仍然需要提供一个用户界面，以便用户与你的应用交互。虽然你可以从头开始创建用户界面，但这同样繁琐、耗时且容易出错。更糟糕的是，如果每个应用开发者都从头创建用户界面，那么不同的\
  \ iOS 应用在外观和操作上就无法统一，从而让用户感到困惑。\n\n\n\n这就是为什么苹果的`Xcode`编译器能帮助你设计用户界面，这些界面使用了大多数应用中的标准功能，例如视图（屏幕上的窗口）、按钮、标签、文本框、开关和滑块。在`Xcode`中，用户界面的每个窗口被称为一个视图。虽然简单的\
  \ iOS 应用可能只包含单个视图（比如 iPhone 上的计算器应用），但更复杂的 iOS 应用则包含多个视图。\n\n为了帮助你创建和组织用户界面，`Xcode`将\
  \ iOS 应用的用户界面存储在一个称为`storyboard`的文件中，这个名字来源于电影行业。制作电影时，导演经常使用故事板来直观地展示他们想要拍摄的每个场景。通过按特定顺序浏览这些故事板图像，导演可以在实际拍摄前了解如何讲述一个故事。\n\
  \n在 iOS 应用开发中，故事板包含视图（`views`）和转场（`segues`）。视图以矩形形式出现，代表不同 iOS 设备（如`iPhone 8`或`iPad\
  \ Pro`）的屏幕尺寸；而转场则以箭头形式出现，显示视图向用户呈现的顺序，如图 1-2 所示。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig2_HTML.jpg](img/329781_5_En_1_Fig2_HTML.jpg)\n\
  \n图 1-2  \n故事板帮助你设计 iOS 应用的用户界面\n\n`Xcode`将故事板与你的代码完全分开。这样一来，你就可以轻松更改用户界面，而无需重新测试代码。有些开发者会先创建用户界面来设计应用的结构，然后再编写一行代码。另一些开发者则先编写代码，之后再为用户界面附加代码。\n\
  \n大多数开发者同时编写代码和创建用户界面，以便在开发过程中随时测试应用。无论你选择哪种方法，你都可以针对各种不同的 iOS 设备屏幕尺寸和方向，直观地设计用户界面。\n\
  \n任何 iOS 应用的核心都是你编写的独特代码，这些代码让应用能够实现有用的功能。编写代码时，你可以将其全部存储在一个文件中，但这就像把整本小说打印在一长卷纸上——虽然可行，但后续编辑和修改会非常麻烦。\n\
  \n因此，大多数 iOS 应用都由多个文件组成。即使是一个简单的 iOS 应用也会包含几个文件，而复杂的应用可能包含数百甚至数千个独立的文件。通过将代码存储在单独的文件中，你可以快速定位需要编辑和修改的文件，同时安全地忽略存储在其他文件中的代码。\n\
  \n当你创建文件来存储`Swift`命令时，这些文件的后缀名将是`.swift`，这有助于你将它们与可能包含其他编程语言（如`Objective-C`，苹果最初的编程语言）代码的文件区分开来。\n\
  \n为了帮助你组织文件，你可以将它们存储在单独的文件夹中。这些文件夹的存在仅仅是为了方便你组织代码。图 1-3 展示了`Xcode`如何将应用划分为文件夹和文件。\n\
  \n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig3_HTML.jpg](img/329781_5_En_1_Fig3_HTML.jpg)\n\
  \n图 1-3  \n`Xcode`将你的代码存储在文件中，你可以将它们组织到文件夹中\n\n## 了解 Xcode\n\n学习 iOS 开发不仅仅是学习如何用`Swift`编程语言编写代码。除了掌握`Swift`，你还必须知道如何查找和使用苹果不同的软件框架，如何使用`Xcode`通过故事板设计用户界面，以及如何组织、创建和删除包含`Swift`代码的文件。此外，你还必须学习如何使用`Xcode`的编辑器来编写代码。\n\
  \n为了熟悉 iOS 应用开发，让我们从一个简单的项目开始，它将教会你：\n\n1.  启动`Xcode`。屏幕上会出现一个欢迎窗口，让你选择最近使用的项目，或者选择创建新项目的选项，如图\
  \ 1-4 所示。（你可以随时在`Xcode`中通过选择 `Windows` ➤ `Welcome to Xcode` 或按 `Shift + Command\
  \ + 1` 来打开此欢迎窗口。）\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig4_HTML.jpg](img/329781_5_En_1_Fig4_HTML.jpg)\n\
  \n图 1-4  \n`Xcode`欢迎窗口\n\n2.  点击 **Create a new Xcode project** 选项。`Xcode`会显示用于设计不同类型应用的模板，如图\
  \ 1-5 所示。请注意，模板窗口顶部显示了你可以为其开发应用的不同操作系统，例如`iOS`、`watchOS`、`tvOS`和`macOS`。通过选择不同的操作系统，你可以创建专为运行该特定操作系统的设备设计的项目。\n\
  \n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig5_HTML.jpg](img/329781_5_En_1_Fig5_HTML.jpg)\n\
  \n图 1-5  \n选择项目模板\n\n3.  点击 **iOS**，然后点击 **Single View App**。`Single View App`代表了最简单的\
  \ iOS 项目。\n\n4.  点击 **Next** 按钮。会出现另一个窗口，要求你输入项目名称以及组织名称和组织标识符，如图 1-6 所示。你必须填写所有三个文本框，但项目名称、组织名称和组织标识符可以是任何你想要的描述性文本。\n\
  \n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig6_HTML.jpg](img/329781_5_En_1_Fig6_HTML.jpg)\n\
  \n图 1-6  \n定义项目名称、组织名称和组织标识符\n\n5.  点击 Project Name 文本框，并输入你的项目名称，例如 `MyFirstApp`。\n\
  \n6.  点击 Organization Name 文本框，并输入你的名字或公司名称。\n\n7.  点击 Organization Identifier 文本框，并输入任何你想要的标识文本。通常，这个标识符是你的网站名称倒过来拼写，例如\
  \ `com.microsoft`。\n\n8.  确保 Language 弹出菜单显示为 `Swift`，并且所有复选框都已清除。然后点击 **Next**\
  \ 按钮。`Xcode`会弹出一个对话框，让你选择存储项目的驱动器和文件夹。\n\n9.  选择一个驱动器和文件夹，然后点击 **Create** 按钮。`Xcode`会显示关于你新创建项目的信息，如图\
  \ 1-7 所示。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig7_HTML.jpg](img/329781_5_En_1_Fig7_HTML.jpg)\n\
  \n图 1-7  \n查看新创建的 iOS 项目的详细信息\n\n*   如何理解项目的各个部分\n*   如何查看不同的文件\n*   `Xcode`的不同部分如何工作\n\
  \n起初，`Xcode`窗口可能看起来令人困惑，因为它同时显示了太多信息，但`Xcode`将这些信息组织在几个窗格中。\n\n最左边的窗格称为导航器窗格。通过点击导航器窗格顶部的图标，你可以查看项目的不同部分，如图\
  \ 1-8 所示。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig8_HTML.jpg](img/329781_5_En_1_Fig8_HTML.jpg)\n\
  \n图 1-8  \n导航器窗格出现在`Xcode`窗口的最左侧\n\n最简单的 iOS 应用包含三个文件：\n\n\n\n*   `AppDelegate.swift`\
  \ – 包含用于监控应用行为的 Swift 代码\n*   `ViewController.swift` – 包含用于控制单个视图用户界面的 Swift 代码\n\
  *   `Main.storyboard` – 包含定义应用用户界面的故事板\n\n在我们的简单应用中，只有一个视图（窗口），因此只有一个`ViewController.swift`文件。在包含多个视图（窗口）的更复杂的应用中，你需要为每个视图准备单独的`ViewController.swift`文件（通常使用独特的名称）。\n\
  \n导航器面板最常见的用途是将项目显示为文件夹和文件。文件夹仅用于帮助你组织文件。通过点击文件夹图标左侧的灰色展开三角形，你可以展开或隐藏文件夹的内容。\n\n\
  要了解导航器面板的工作方式，请按以下步骤操作：\n\n1.  选择以下任一方式，使项目导航器显示在导航器面板中：\n    *   点击导航器面板左上角的项目导航器图标。\n\
  \    *   选择“视图”➤“导航器”➤“显示导航器”。\n    *   按`Command + 1`。\n\n就像在任何计算机上一样，你可以在文件夹中存储文件夹。在每个文件夹中，你可以存储一个或多个文件。在我们的简单\
  \ iOS 应用中，导航器面板中显示的两类文件以`.swift`和`.storyboard`扩展名结尾。\n\n`.swift`扩展名标识包含 Swift 代码的文件。`.storyboard`扩展名标识包含用户界面的文件。\n\
  \n1.  点击`AppDelegate.swift`文件。Xcode 会在中间面板中显示该文件的内容，如图 1-9 所示。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig9_HTML.jpg](img/329781_5_En_1_Fig9_HTML.jpg)\n\
  \n图 1-9：在导航器面板中点击文件会在中间 Xcode 面板中显示其内容\n\n当你点击`.swift`文件时，中间 Xcode 面板会显示一个编辑器，你可以在其中编写和编辑\
  \ Swift 代码。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig10_HTML.jpg](img/329781_5_En_1_Fig10_HTML.jpg)\n\
  \n图 1-10：在导航器面板中点击`.storyboard`文件会在中间 Xcode 面板中显示其内容\n\n1.  点击`Main.storyboard`文件。中间\
  \ Xcode 面板会显示故事板，使你能够看到用户界面，如图 1-10 所示。\n\n通常，你在导航器面板中选择的内容会以更详细的形式显示在中间 Xcode 面板中。你可以通过点击导航器面板顶部的图标，或者选择“视图”➤“导航器”菜单选项（如图\
  \ 1-11 所示），来选择要在导航器面板中显示的不同信息。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig11_HTML.jpg](img/329781_5_En_1_Fig11_HTML.jpg)\n\
  \n图 1-11：“视图”➤“导航器”菜单允许你选择在导航器面板中显示的内容\n\n1.  将鼠标指针移到右边界上，直到鼠标指针变为双向箭头。然后拖动鼠标以加宽或缩窄导航器面板的宽度。这可以让你看到导航器面板的更多或更少内容。\n\
  2.  选择“视图”➤“导航器”➤“隐藏/显示导航器”，或按`Command + 0`（零）。这可以在隐藏导航器面板和再次显示它之间切换。你可能想隐藏导航器面板以腾出更多空间，但当你想要切换到另一个文件时，就需要再次显示导航器面板。\n\
  \n最右侧的 Xcode 面板称为检查器面板，用于显示信息或允许你自定义中间面板中显示的项目。要了解检查器面板的工作方式，请按以下步骤操作：\n\n1.  在导航器面板中点击`ViewController.swift`文件。中间面板会显示`ViewController.swift`文件的内容。\n\
  2.  选择以下任一方式，在检查器面板中显示快速帮助：\n    *   点击快速帮助图标。\n    *   选择“视图”➤“检查器”➤“显示快速帮助检查器”。\n\
  \    *   按`Option + Command + 2`。\n3.  将光标移到单词“`UIViewController`”上。检查器面板会显示关于`UIViewController`的信息，如图\
  \ 1-12 所示。通过使用快速帮助，你可以获取存储在`.swift`文件中不同命令的信息。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig12_HTML.jpg](img/329781_5_En_1_Fig12_HTML.jpg)\n\
  \n图 1-12：快速帮助在检查器面板中显示关于代码的附加信息\n\n4.  在导航器面板中点击`Main.storyboard`文件。中间 Xcode 面板现在会显示文档大纲和故事板，如图\
  \ 1-13 所示。文档大纲以大纲形式列出用户界面上的所有项目，而故事板则显示用户界面项目在用户眼中的位置。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig13_HTML.jpg](img/329781_5_En_1_Fig13_HTML.jpg)\n\
  \n图 1-13：文档大纲和故事板显示用户界面\n\n5.  你可以通过两种方式在隐藏和显示文档大纲之间切换，如图 1-14 所示：\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig14_HTML.jpg](img/329781_5_En_1_Fig14_HTML.jpg)\n\
  \n图 1-14：如何显示或隐藏文档大纲\n\n*   选择“编辑器”➤“显示文档大纲”。\n*   点击“显示/隐藏文档大纲”图标。\n\n6.  确保文档大纲已打开，然后点击文档大纲中“视图控制器”图标正下方出现的“视图”图标。\n\
  7.  选择“视图”➤“检查器”➤“显示快速帮助检查器”。检查器面板会显示关于该视图的帮助，该视图显示一个窗口，如图 1-15 所示。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig15_HTML.jpg](img/329781_5_En_1_Fig15_HTML.jpg)\n\
  \n图 1-15：查看用户界面中某个视图的快速帮助\n\n当你在导航器面板中点击`.storyboard`文件时，中间 Xcode 面板会显示应用的用户界面。Xcode\
  \ 一次只能显示单个 iOS 设备（例如 iPhone 8）的应用用户界面。但是，你可以更改应用用户界面的外观，以查看它在各种不同 iOS 设备（例如 iPad\
  \ Pro 或 iPhone XR）上的显示效果。\n\n要更改显示的 iOS 设备类型，请按以下步骤操作：\n\n1.  在导航器面板中点击`.storyboard`文件。\n\
  2.  点击屏幕底部的“视图为：”文本。在图 1-15 中，该文本显示为“视图为：iPhone 8”。一个新的底部面板会弹出，让你选择要使用的不同设备和方向，如图\
  \ 1-16 所示。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig16_HTML.jpg](img/329781_5_En_1_Fig16_HTML.jpg)\n\
  \n图 1-16：点击“视图为：”会显示设备和方向图标\n\n3.  点击一个不同的方向图标，例如横向。注意中间 Xcode 面板如何以新的方向显示用户界面，如图\
  \ 1-17 所示。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig17_HTML.jpg](img/329781_5_En_1_Fig17_HTML.jpg)\n\
  \n图 1-17：以横向显示的 iPhone 用户界面\n\n4.  点击一个不同的设备图标，例如 iPad。注意 Xcode 现在以更大的 iPad 格式显示用户界面。为了帮助你在更大的\
  \ iPad 屏幕上查看用户界面，你还可以更改中间 Xcode 面板的放大倍率。注意中间底部栏显示“视图为：”文本以及减号、100% 和加号。100% 告诉你当前的倍率，减号和加号让你可以增大或减小倍率。\n\
  \n\n\n1.  单击减号以缩小放大倍率（例如 50%），从而更轻松地查看 iPad 用户界面，如图 1-18 所示。\n\n![../images/329781_5_En_1_Chapter/329781_5_En_1_Fig18_HTML.jpg](img/329781_5_En_1_Fig18_HTML.jpg)\n\
  \n*图 1-18* 以 50% 放大倍率显示 iPad Pro 用户界面\n\n2.  单击“View as:”文本，使设备和方向窗格消失。\n3.  选择\
  \ `File` ➤ `Save` 保存你的项目。\n\n如你所见，Xcode 的三个窗格协同工作，向你展示项目的不同信息。导航器窗格（最左侧）让你可以概览项目。单击导航器窗格中的特定项目，会在中间\
  \ Xcode 窗格中显示该项目。检查器窗格（最右侧）显示中间窗格中选中内容的附加信息。\n\n如果你探索 Xcode，会发现数十个功能，但不必一下子理解所有内容才能开始使用\
  \ Xcode。只需专注于使用你需要的那些功能，其他功能可以暂时忽略，直到需要时再用。\n\n## 总结\n\n创建 iOS 应用不仅涉及编写代码。为了帮助你的应用访问不同\
  \ iOS 设备的硬件功能，你可以使用 Apple 提供的软件框架，这些框架允许访问摄像头或 Siri 的自然语言界面。通过将你的代码与 Apple 现有的软件框架结合，你可以专注于编写使应用运行的代码，并利用\
  \ Apple 的软件框架来实现在大多数 iOS 设备上常见的功能。\n\n除了编写代码，每个 iOS 应用还需要一个用户界面。这个用户界面需要适应不同 iOS\
  \ 设备（如 iPhone XR 或 iPad Pro）的不同方向和屏幕尺寸。\n\n创建 iOS 应用的主要工具是 Apple 免费的 Xcode 程序，它允许你创建项目、组织项目的各个文件，以及查看和编辑每个文件的内容。Xcode\
  \ 让你可以在一个程序中完成设计、编辑和测试你的应用。尽管 Xcode 提供了数十种功能，但你只需要使用其中一部分即可开始创建你自己的 iOS 应用。\n\n\
  学习 iOS 编程涉及学习如何使用 Swift 编程语言编写命令、学习如何查找和使用 Apple 的各种软件框架、学习如何设计用户界面，以及学习如何使用 Xcode。虽然这看起来很多，但本书将带你一步步完成，让你在不久的将来能够舒适地使用\
  \ Xcode 并创建你自己的 iOS 应用。\n\n"
- "# 2. 设计用户界面\n\n每个应用都需要一个用户界面。与 Windows 或 macOS 等桌面操作系统可以在屏幕上同时显示多个窗口的用户界面不同，iOS\
  \ 应用通常一次只显示一个填充整个屏幕的窗口（称为视图）。同样，与用户可以使用键盘或鼠标操作的 Windows 或 macOS 用户界面不同，用户必须仅通过触摸屏操作\
  \ iOS 应用，尽管也可以通过可选的键盘进行控制。在 iOS 应用中，图 2-1 显示了一个用户界面由以下部分组成：\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig1_HTML.jpg](img/329781_5_En_2_Fig1_HTML.jpg)\n\
  \n*图 2-1.* iOS 应用用户界面的三个部分\n\n*   **视图**\n*   **对象**，如按钮、标签、文本框和开关\n*   **转场**\n\
  \n我们用于在第一章 1 中创建应用的“单视图应用”模板由一个视图组成，并且没有对象。由于只有一个视图，因此也没有转场，因为转场用于连接两个视图，以显示应用运行时每个视图出现的顺序。\n\
  \n就其本身而言，一个没有对象的视图不过是一个空白屏幕。要使视图有用，它需要包含一个或多个对象。使用 Xcode，通常有两种方法可以完成完全相同的任务：\n\n\
  *   **编程方式**\n*   **可视化方式**\n\n编程方式意味着编写代码来完成所有操作。在创建出现在视图上的对象时，这意味着编写 Swift 代码来定义要显示的对象、其大小、在视图上的位置以及任何其他自定义设置（如颜色）。\n\
  \n可视化方式意味着使用鼠标将对象拖放到视图上。将对象放置在视图上后，你可以修改其大小、位置或任何其他属性，而无需编写任何代码。\n\n你可以使用其中一种或两种方法，但为了保持一致性，通常最好使用一种方法。此外，虽然你可以通过编写代码（编程方式）来创建整个用户界面，但通常不建议这样做，因为编写的代码越少，修改和调试程序就越容易。编程的目标是用尽可能少的代码完成尽可能多的功能。\n\
  \n首先，让我们看看如何以编程方式创建对象，以便你了解其工作原理。让我们在视图上创建一个标签和一个按钮。\n\n1.  打开你的 `MyFirstApp` 项目（或创建一个新的单视图应用\
  \ iOS 项目）。\n2.  在导航器窗格中单击 `ViewController.swift` 文件。中间的 Xcode 窗格会显示 `ViewController.swift`\
  \ 文件的内容。\n3.  修改 `ViewController.swift` 文件中的代码，使其如下所示：\n\n```\n    import UIKit\n\
  \    class ViewController: UIViewController {\n    override func viewDidLoad() {\n\
  \    super.viewDidLoad()\n    let label = UILabel()\n    label.frame = CGRect(x:\
  \ 125, y: 125, width: 200, height: 80)\n    label.text = \"This is a label\"\n \
  \   view.addSubview(label)\n    let button = UIButton()\n    button.frame = CGRect(x:\
  \ 125, y: 300, width: 80, height: 80)\n    button.setTitle(\"Button\", for: .normal)\n\
  \    button.setTitleColor(UIColor.blue, for: .normal)\n    view.addSubview(button)\n\
  \    }\n    }\n    ```\n\n4.  选择 `Project` ➤ `Run` 或按下 `Command + R`。Xcode 会加载模拟器程序，让你可以模拟\
  \ iOS 设备。当你的应用在模拟器中加载时，它将显示一个标签和一个按钮，如图 2-2 所示。\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig2_HTML.jpg](img/329781_5_En_2_Fig2_HTML.jpg)\n\
  \n*图 2-2.* 以编程方式创建的用户界面，显示一个标签和一个按钮\n\n5.  选择 `Simulator` ➤ `Quit Simulator` 或按下\
  \ `Command + Q`。Xcode 窗口会再次出现。\n\n让我们回顾一下这段代码，以便你理解它是如何工作的。首先，我们必须定义要创建的对象类型，例如\
  \ `UILabel` 或 `UIButton`：\n\n```\nlet label = UILabel()\nlet button = UIButton()\n\
  ```\n\n\n\n接下来，我们需要定义对象的位置、宽度和高度。请记住，原点 `(0, 0)` 被定义为屏幕的左上角：\n\n```\nlabel.frame\
  \ = CGRect(x: 125, y: 125, width: 200, height: 21)\nbutton.frame = CGRect(x: 125,\
  \ y: 300, width: 80, height: 30)\n```\n\n第一行代码将 `label` 定义为距离屏幕左侧 125 点、距离屏幕顶部 125\
  \ 点的位置。同时，该代码还定义了 `label` 的宽度为 200，高度为 21。\n\n第二行代码将 `button` 定义为距离屏幕左侧 125 点、距离屏幕顶部\
  \ 300 点的位置。同时，该代码还定义了 `button` 的宽度为 80，高度为 30。\n\n定义好对象的大小和位置后，下一步是自定义对象的外观。`label`\
  \ 包含文本 “This is a label”，基于以下代码：\n\n```\nlabel.text = \"This is a label\"\n```\n\
  \n`button` 通过两种不同方式进行自定义。首先，按钮标题设置为 “Button”，并将文字颜色设置为蓝色：\n\n```\nbutton.setTitle(\"\
  Button\", for: .normal)\nbutton.setTitleColor(UIColor.blue, for: .normal)\n```\n\
  \n在定义了要显示的对象类型、其大小和位置，并进行自定义之后，最后一步是将其放置到视图上：\n\n```\nview.addSubview(label)\nview.addSubview(button)\n\
  ```\n\n如果以上步骤看起来只是为了在用户界面上创建一个对象而大费周章，那你是对的。这就是为什么大多数开发者选择以可视化的方式设计用户界面。让我们看看这是如何操作的。\n\
  \n1.  在导航器面板中点击 `ViewController.swift` 文件。Xcode 中间的面板会显示 `ViewController.swift`\
  \ 文件的内容。\n\n2.  修改 `ViewController.swift` 文件，使其看起来像这样：\n\n    ```\n    import UIKit\n\
  \    class ViewController: UIViewController {\n    override func viewDidLoad() {\n\
  \    super.viewDidLoad()\n    }\n    }\n    ```\n\n3.  在导航器面板中点击 `Main.storyboard`\
  \ 文件。Xcode 会显示包含用户界面的故事板，其中只有一个空白视图。\n\n4.  点击库图标。对象库窗口出现，列出了所有可以添加到用户界面中的不同对象，如图\
  \ 2-3 所示。\n\n    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig3_HTML.jpg](img/329781_5_En_2_Fig3_HTML.jpg)\n\
  \n    图 2-3. 对象库让你可以选择要放置在视图上的对象。\n\n5.  在对象库列表中滚动，直到找到标签，或者直接在对象库窗口顶部的搜索字段中点击，输入\
  \ `label`，然后按回车键。对象库窗口会显示标签对象，如图 2-4 所示。\n\n    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig4_HTML.jpg](img/329781_5_En_2_Fig4_HTML.jpg)\n\
  \n    图 2-4. 在对象库窗口中搜索标签对象。\n\n6.  将标签对象从对象库窗口拖放到视图上。拖动标签时，对象库窗口会消失。松开鼠标左键时，标签会出现在视图上。我们可以调整标签的大小和位置，但如果要定义精确的值，则需要使用检查器面板。\n\
  \n7.  点击标签以将其选中。标签周围会出现控制柄，表示它已被选中。\n\n8.  选择 视图 ➤ 检查器 ➤ 显示属性检查器（或点击检查器面板顶部的显示属性检查器图标）。\n\
  \n9.  点击颜色弹出菜单上方的文本字段，输入 `This is a label`，然后按回车键，如图 2-5 所示。属性检查器面板允许我们自定义标签中的文本。现在让我们定义标签的大小和位置。\n\
  \n    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig5_HTML.jpg](img/329781_5_En_2_Fig5_HTML.jpg)\n\
  \n    图 2-5. 使用属性检查器面板自定义标签上显示的文本。\n\n10. 选择 视图 ➤ 检查器 ➤ 显示大小检查器（或点击显示大小检查器图标）。大小检查器面板随即出现。\n\
  \n11. 点击 X 文本字段，输入 `125`。然后点击 Y 文本字段，输入 `125`。\n\n12. 点击宽度文本字段，输入 `200`。然后点击高度文本字段，输入\
  \ `21`。按回车键。这将定义标签的大小和位置，如图 2-6 所示。\n\n    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig6_HTML.jpg](img/329781_5_En_2_Fig6_HTML.jpg)\n\
  \n    图 2-6. 使用大小检查器面板定义标签的大小和位置。\n\n13. 点击库图标。对象库窗口出现，列出了所有可以添加到用户界面中的不同对象（参见图\
  \ 2-3）。\n\n14. 在对象库列表中滚动，直到找到按钮，或者直接在对象库窗口顶部的搜索字段中点击，输入 `button`，然后按回车键。对象库会显示按钮对象，如图\
  \ 2-7 所示。\n\n    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig7_HTML.jpg](img/329781_5_En_2_Fig7_HTML.jpg)\n\
  \n    图 2-7. 在对象库窗口中搜索按钮对象。\n\n15. 将按钮对象从对象库窗口拖放到视图上。拖动按钮时，对象库窗口会消失。松开鼠标左键时，按钮会出现在视图上。\n\
  \n16. 点击按钮以将其选中。按钮周围会出现控制柄，表示它已被选中。\n\n17. 选择 视图 ➤ 检查器 ➤ 显示属性检查器（或点击检查器面板顶部的显示属性检查器图标）。注意，属性检查器面板中已经显示按钮上的文字\
  \ “Button”，且颜色为蓝色，如图 2-8 中的文本颜色弹出菜单所示。\n\n    ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig8_HTML.jpg](img/329781_5_En_2_Fig8_HTML.jpg)\n\
  \n    图 2-8. 使用属性检查器面板自定义按钮上显示的文本和颜色。\n\n18. 选择 视图 ➤ 检查器 ➤ 显示大小检查器（或点击显示大小检查器图标）。大小检查器面板随即出现。\n\
  \n19. 点击 X 文本字段，输入 `125`。然后点击 Y 文本字段，输入 `300`。\n\n20. 点击宽度文本字段，输入 `80`。然后点击高度文本字段，输入\
  \ `30`。按回车键。这将定义按钮的大小和位置。\n\n21. 选择 项目 ➤ 运行，或按 Command + R。Xcode 会加载模拟器程序，让你可以模拟\
  \ iOS 设备。当你的应用在模拟器中加载时，它会显示一个标签和一个按钮。\n\n22. 选择 模拟器 ➤ 退出模拟器，或按 Command + Q。Xcode\
  \ 窗口会再次出现。\n\n23. 选择 文件 ➤ 保存以保存你的项目。\n\n注意，当你以编程方式在用户界面上创建对象时，你需要编写代码来完成从创建对象、定义其大小和位置，到将其放置到视图上的所有步骤。另一方面，以可视化方式设计用户界面意味着将对象拖放到视图上，然后使用鼠标调整其大小或移动它们。然后，要定义对象的外观、精确大小和位置，你可以打开属性检查器和大小检查器来选择合适的值。\n\
  \n许多 Xcode 项目会结合两种方法来创建用户界面。虽然通常以可视化方式创建用户界面更容易，但你也需要熟悉编写代码以编程方式创建用户界面，因为你可能会在他人创建的项目中看到这种做法。\n\
  \n\n\n## 了解视图与类文件\n\n任何应用用户界面最重要的组成部分都是视图，它负责在 iOS 设备屏幕上显示信息。最简单的应用只包含一个视图，但大多数应用会包含多个视图。你可以轻松地在项目中添加或删除视图。既然视图包含按钮和文本字段等用户界面对象，你可能会好奇视图是如何存储用户在界面上输入的数据的。答案是每个视图都需要一个类文件，其中包含能够存储数据和响应用户交互（例如点击按钮）的\
  \ Swift 代码。\n\n在继续之前，请注意 Xcode 使用了一些容易混淆的术语来描述用户界面的各个部分。用户界面存储在故事板中，屏幕上显示的每个独立窗口被称为场景。大多数应用包含多个场景，因此文档大纲允许你有选择地隐藏或显示每个场景的详细信息，如图\
  \ 2-9 所示。通过点击文档大纲中的每个场景，你可以快速查看构成用户界面的不同场景。\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig9_HTML.jpg](img/329781_5_En_2_Fig9_HTML.jpg)\n\
  \n图 2-9。 文档大纲能让您轻松查找和查看场景\n\n每个场景内部都有一个控制器。控制器定义了该场景在屏幕上的显示方式。你可以通过点击文档大纲中的控制器名称，或者点击故事板中的控制器图标来选择控制器，如图\
  \ 2-10 所示。\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig10_HTML.jpg](img/329781_5_En_2_Fig10_HTML.jpg)\n\
  \n图 2-10。 您可以在文档大纲或故事板中选择控制器\n\n每个控制器内部通常包含一个视图，它定义了应用运行时屏幕上的显示内容。按钮或标签等对象出现在视图上，因此如果你删除了一个视图，你也将删除该视图上存储的所有对象。\n\
  \n让我们看看我们已创建的“单视图应用”项目中的两个 `.swift` 文件，并了解文档大纲的层级结构是如何运作的：\n\n1.  在导航器面板中点击 `AppDelegate.swift`\
  \ 文件。Xcode 的中间面板会显示 `AppDelegate.swift` 文件的内容。你会注意到，已经为你创建了几个不包含代码的函数。这些函数让你可以处理应用运行时的不同情况：\n\
  \    *   `didFinishLaunchingWithOptions` – 在应用启动后运行\n    *   `applicationWillResignActive`\
  \ – 在应用不再是屏幕上处于活跃状态的应用之前运行\n    *   `applicationDidEnterBackground` – 在应用被推入后台时立即运行，以便用户使用其他应用\n\
  \    *   `applicationWillEnterForeground` – 在应用即将再次成为屏幕上的活跃应用之前运行\n    *   `applicationDidBecomeActive`\
  \ – 在应用成为屏幕上活跃的应用之后运行\n    *   `applicationWillTerminate` – 在应用即将关闭之前运行\n\n在许多情况下，你不需要为所有这些函数编写代码。例如，你可能希望在应用关闭前保存数据（`applicationWillTerminate`），然后在应用首次启动时重新加载这些数据（`didFinishLaunchingWithOptions`）。`AppDelegate.swift`\
  \ 文件就是你编写 Swift 代码来控制应用行为的地方。\n\n2.  在导航器面板中点击 `Main.storyboard` 文件。Xcode 会显示你的用户界面。确保文档大纲可见。（你可以通过选择“编辑器”➤“显示/隐藏文档大纲”或点击文档大纲图标来切换显示或隐藏文档大纲。）\n\
  \n3.  在文档大纲或故事板中点击控制器图标（参见图 2-10）。\n\n4.  选择“视图”➤“检查器”➤“显示身份检查器”，或者点击检查器面板顶部的“显示身份检查器”图标。注意，“类”文本字段显示为\
  \ `ViewController`，如图 2-11 所示。此名称指向导航器面板中的 `ViewController.swift` 文件，并将控制器与名为 `ViewController.swift`\
  \ 的文件关联起来。你可以随时更改文件名，但如果更改了文件名，则必须确保所有控制器都使用正确的文件名。\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig11_HTML.jpg](img/329781_5_En_2_Fig11_HTML.jpg)\n\
  \n图 2-11。 身份检查器允许您将 `.swift` 文件链接到控制器\n\n5.  选择“视图”➤“检查器”➤“显示属性检查器”，或者点击“显示属性检查器”图标，如图\
  \ 2-12 所示。\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig12_HTML.jpg](img/329781_5_En_2_Fig12_HTML.jpg)\n\
  \n图 2-12。 属性检查器允许您自定义场景的外观\n\n6.  在文档大纲中点击 `View`。注意，属性检查器面板现在会显示用于自定义视图的不同选项，如图\
  \ 2-13 所示。\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig13_HTML.jpg](img/329781_5_En_2_Fig13_HTML.jpg)\n\
  \n图 2-13。 属性检查器允许您自定义视图的外观\n\n7.  在文档大纲中点击标签。（你也可以直接在故事板中点击标签进行选择。）注意，属性检查器面板现在会显示用于自定义标签的选项，如图\
