  \ Library`窗口拖放一个`View Controller`到故事板。此时故事板应包含一个`Page Controller`和三个`View Controllers`。\n\
  \n22.  在文档大纲中点击`View Controller`，或点击`View Controller`上方的`View Controller`图标。\n\n\
  23.  选择`View` ➤ `Inspectors` ➤ `Show Identity Inspector`，或点击 Xcode 窗口右上角的`Identity\
  \ Inspector`图标。\n\n24.  点击`Class`弹出菜单并选择`ThirdViewController`。\n\n25.  点击`Storyboard\
  \ ID`文本字段，输入`page03`，然后按`ENTER`键。\n\n26.  在文档大纲中点击第三个`View Controller`的`View`，或点击第三个`View\
  \ Controller`的中间区域。\n\n27.  选择`View` ➤ `Inspectors` ➤ `Show Attributes Inspector`，或点击\
  \ Xcode 窗口右上角的`Attributes Inspector`图标。\n\n28.  点击`Background`弹出菜单并选择一个颜色，例如青色。此时故事板应包含一个`Page\
  \ Controller`和三个`View Controllers`，每个`View Controller`具有不同的背景颜色，如图 19-7 所示。\n\n\
  ![../images/329781_5_En_19_Chapter/329781_5_En_19_Fig7_HTML.jpg](img/329781_5_En_19_Fig7_HTML.jpg)\n\
  \n图 19-7\n\n包含一个`Page Controller`和三个`View Controllers`的故事板\n\n## 让视图控制器在页面控制器中显示\n\
  \n要使多个`View Controllers`在`Page Controller`内部显示，首先必须将`Page Controller`连接到一个 `.swift`\
  \ 的 `UIPageController` 类文件。然后，在此 `UIPageController` `.swift` 文件中，需要编写 Swift 代码来完成以下操作：\n\
  \n*   定义一个数组，用于容纳所有需要在`Page Controller`内显示的`View Controllers`。\n\n*   编写一个`viewControllerBefore`方法，用于定义当用户滑动打开上一个视图时，应显示哪个`View\
  \ Controller`。\n\n*   编写一个`viewControllerAfter`方法，用于定义当用户滑动打开下一个视图时，应显示哪个`View Controller`。\n\
  \n要了解如何编写 Swift 代码使`Page Controller`工作，请遵循以下步骤：\n\n1.  确保`PageControllerApp`已加载到\
  \ Xcode 中。\n\n2.  选择`File` ➤ `New` ➤ `File`。将会出现一个对话框，显示可用的不同模板。\n\n3.  点击 iOS 类别下的`Cocoa\
  \ Touch Class`，然后点击**Next**按钮。将出现另一个窗口，要求输入类名和子类类型。\n\n4.  点击`Class`文本字段并输入`PageViewController`。\n\
  \n5.  点击`Subclass of`弹出菜单并选择`UIPageViewController`，如图 19-8 所示。\n\n![../images/329781_5_En_19_Chapter/329781_5_En_19_Fig8_HTML.jpg](img/329781_5_En_19_Fig8_HTML.jpg)\n\
  \n图 19-8\n\n创建一个`UIPageViewController` `.swift` 类文件\n\n6.  点击**Next**按钮，然后点击**Create**按钮。Xcode\
  \ 会在导航窗格中显示`PageViewController.swift`文件。\n\n7.  在导航窗格中点击`Main.storyboard`文件。Xcode\
  \ 会显示该故事板。\n\n8.  在文档大纲中点击`Page View Controller`，或点击`Page Controller`顶部的`Page View\
  \ Controller`图标，如图 19-9 所示。\n\n![../images/329781_5_En_19_Chapter/329781_5_En_19_Fig9_HTML.jpg](img/329781_5_En_19_Fig9_HTML.jpg)\n\
  \n图 19-9\n\n选择`Page View Controller`\n\n9.  选择`View` ➤ `Inspectors` ➤ `Show Identity\
  \ Inspector`，或点击 Xcode 窗口右上角的`Identity Inspector`图标。\n\n10.  点击`Class`弹出菜单并选择`PageViewController`，如图\
  \ 19-10 所示。\n\n![../images/329781_5_En_19_Chapter/329781_5_En_19_Fig10_HTML.jpg](img/329781_5_En_19_Fig10_HTML.jpg)\n\
  \n图 19-10\n\n将`Page Controller`连接到`PageViewController.swift`文件\n\n11.  在导航窗格中点击`PageViewController.swift`文件。\n\
  \n12.  按如下方式编辑`class PageViewController`这行代码：\n\n```\n    class PageViewController:\
  \ UIPageViewController, UIPageViewControllerDataSource {\n```\n\n13.  在`class PageViewController`这行代码下方，添加以下代码行来声明一个`UIViewControllers`数组：\n\
  \n```\n    var controllerArray: [UIViewController]? = nil\n```\n\n14.  按如下方式修改`viewDidLoad`方法：\n\
  \n```\n    override func viewDidLoad() {\n    super.viewDidLoad()\n    dataSource\
  \ = self\n    let storyBoard = UIStoryboard(name: \"Main\", bundle: nil)\n    let\
  \ firstVC = storyBoard.instantiateViewController(withIdentifier: \"page01\")\n \
  \   let secondVC = storyBoard.instantiateViewController(withIdentifier: \"page02\"\
  )\n    let thirdVC = storyBoard.instantiateViewController(withIdentifier: \"page03\"\
  )\n    controllerArray = [firstVC, secondVC, thirdVC]\n    self.setViewControllers([controllerArray![0]],\
  \ direction: UIPageViewController.NavigationDirection.forward, animated: true, completion:\
  \ nil)\n    }\n```\n\n第一行将`PageViewController.swift`文件定义为`Page Controller`的数据源。下一行创建了一个名为`Main`的故事板常量。接下来的三行定义了常量（`firstVC`、`secondVC`和`thirdVC`），用于表示将在`Page\
  \ Controller`内显示的每个`View Controller`。请注意，每个`View Controller`都使用其自身的`Storyboard ID`来标识，例如`page01`或`page03`。\n\
  \n接下来，我们将所有这些`View Controllers`存储到`controllerArray`数组中。最后，我们在`Page Controller`内部设置这个`View\
  \ Controllers`数组。\n\n15.  添加以下函数，用于定义当用户显示上一个`View Controller`时应出现的`View Controller`：\n\
  \n```\n    func pageViewController(_ pageViewController: UIPageViewController, viewControllerBefore\
  \ viewController: UIViewController) -> UIViewController? {\n    guard let vcIndex\
  \ = controllerArray!.firstIndex(of: viewController) else {\n    return nil\n   \
  \ }\n    let preIndex = vcIndex - 1\n    guard preIndex >= 0 else {\n    return\
  \ controllerArray!.last // 循环回到末尾\n    }\n    guard controllerArray!.count > preIndex\
  \ else {\n    return nil\n    }\n    return controllerArray![preIndex]\n    }\n\
  ```\n\n第一个`guard`语句检查确保控制器数组包含有效的`View Controllers`。然后它创建一个`preIndex`常量来表示上一个`View\
  \ Controller`。只要`preIndex`的值大于 0，`Page Controller`就可以显示数组中的上一个`View Controller`。一旦`preIndex`的值等于或小于\
  \ 0，那么显示的下一个`View Controller`将是数组中的最后一个。这创建了一个无限循环，因此显示的第一个`View Controller`会链接到数组中的最后一个`View\
  \ Controller`。\n\n最后一个`guard`语句确保数组中`View Controllers`的总数大于`preIndex`的值。最后，此函数返回数组中的上一个`View\
  \ Controller`。\n\n16.  添加以下函数，用于定义当用户显示下一个`View Controller`时应出现的`View Controller`：\n\
  \n```\n    func pageViewController(_ pageViewController: UIPageViewController, viewControllerAfter\
  \ viewController: UIViewController) -> UIViewController? {\n    guard let vcIndex\
  \ = controllerArray!.firstIndex(of: viewController) else {\n    return nil\n   \
  \ }\n    let nextIndex = vcIndex + 1\n    guard controllerArray!.count != nextIndex\
  \ else {\n    return controllerArray!.first // 循环回到开头\n    }\n    guard controllerArray!.count\
  \ > nextIndex else {\n    return nil\n    }\n    return controllerArray![nextIndex]\n\
  \    }\n```\n\n整个`PageViewController.swift`文件应如下所示：\n\n\n\n```swift\nimport UIKit\n\
  class PageViewController: UIPageViewController, UIPageViewControllerDataSource {\n\
  \    var controllerArray: [UIViewController]? = nil\n    override func viewDidLoad()\
  \ {\n        super.viewDidLoad()\n        dataSource = self\n        let storyBoard\
  \ = UIStoryboard(name: \"Main\", bundle: nil)\n        let firstVC = storyBoard.instantiateViewController(withIdentifier:\
  \ \"page01\")\n        let secondVC = storyBoard.instantiateViewController(withIdentifier:\
  \ \"page02\")\n        let thirdVC = storyBoard.instantiateViewController(withIdentifier:\
  \ \"page03\")\n        controllerArray = [firstVC, secondVC, thirdVC]\n        self.setViewControllers([controllerArray![0]],\
  \ direction: UIPageViewController.NavigationDirection.forward, animated: true, completion:\
  \ nil)\n        // 加载视图后的其他设置\n    }\n    func pageViewController(_ pageViewController:\
  \ UIPageViewController, viewControllerBefore viewController: UIViewController) ->\
  \ UIViewController? {\n        guard let vcIndex = controllerArray!.firstIndex(of:\
  \ viewController) else {\n            return nil\n        }\n        let preIndex\
  \ = vcIndex - 1\n        guard preIndex >= 0 else {\n            return controllerArray!.last\
  \ // 循环回到末尾\n        }\n        guard controllerArray!.count > preIndex else {\n\
  \            return nil\n        }\n        return controllerArray![preIndex]\n\
  \    }\n    func pageViewController(_ pageViewController: UIPageViewController,\
  \ viewControllerAfter viewController: UIViewController) -> UIViewController? {\n\
  \        guard let vcIndex = controllerArray!.firstIndex(of: viewController) else\
  \ {\n            return nil\n        }\n        let nextIndex = vcIndex + 1\n  \
  \      guard controllerArray!.count != nextIndex else {\n            return controllerArray!.first\
  \ // 循环回到开头\n        }\n        guard controllerArray!.count > nextIndex else {\n\
  \            return nil\n        }\n        return controllerArray![nextIndex]\n\
  \    }\n}\n```\n\n17.  点击 `Run` 按钮，或选择 **Product** ➤ **Run**。模拟器窗口将显示第一个视图控制器。\n\
  \n18.  从屏幕右下角向左拖动鼠标。注意，翻页卷曲过渡效果会使视图控制器看起来像一页真实的纸张，如图 19-11 所示。\n\n![../images/329781_5_En_19_Chapter/329781_5_En_19_Fig11_HTML.jpg](img/329781_5_En_19_Fig11_HTML.jpg)\n\
  \n图 19-11\n\n翻页卷曲过渡样式使视图控制器之间的切换如同真实纸张翻页\n\n19.  继续向左和向右滑动。注意，当到达最后一个视图控制器时，向左滑动会显示第一个视图控制器。当到达第一个视图控制器时，向左滑动则显示最后一个视图控制器。\n\
  \n20.  选择 **Simulator** ➤ **Quit Simulator** 返回 Xcode。\n\n## 总结\n\n页面控制器提供了另一种按顺序显示多个视图控制器的方式。通过使用翻页卷曲过渡样式，滑动操作可以让每个视图控制器看起来像纸张在角落翻动。要使用页面控制器，必须从对象库窗口中拖放一个页面控制器到应用程序的故事板中。\n\
  \n将页面控制器添加到故事板后，还需要向故事板中添加视图控制器。每个视图控制器都需要一个唯一的故事板 ID（可以是任意文本）。此外，每个视图控制器都需要连接到一个\
  \ `.swift` 的 `UIViewController` 类文件。\n\n最后，需要创建一个 `.swift` 的 `UIPageViewController`\
  \ 类文件，并将其连接到该页面控制器。在这个 `.swift` 的 `UIPageViewController` 文件中，需要编写 Swift 代码来创建一个视图控制器数组，通过它们唯一的故事板\
  \ ID 来标识所有视图控制器。\n\n在 `UIPageViewController` 类文件中，需要编写两个方法，分别定义在当前显示的视图控制器之前和之后要显示哪个视图。\n\
  \n通过使用页面控制器，可以创建有趣的视觉效果，营造出翻动实体书页的错觉。\n\n# 20. 使用分栏视图控制器\n\n用于显示信息列表的最常见的用户界面对象之一就是表格视图。当在竖屏方向的窄屏\
  \ iPhone 上查看时，表格视图看起来没问题。然而，在更大的 iPad 屏幕上查看时，尤其是横屏方向，表格视图可能会显得不平衡，文本偏向一侧，而大部分屏幕区域被空白填充，如图\
  \ 20-1 所示。\n\n![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig1_HTML.jpg](img/329781_5_En_20_Fig1_HTML.jpg)\n\
  \n图 20-1\n\n在 iPad 大屏幕上显示的表格视图\n\n为了避免这种不平衡、空荡荡的外观，可以针对 iPad 以及某些 iPhone 型号的大屏幕使用分栏视图控制器。分栏视图控制器不是一次只显示一个表格视图，而是并排显示两个视图。左侧视图（称为主视图或母视图）在右侧视图（称为次视图或明细视图）中显示附加信息，如图\
  \ 20-2 所示。\n\n![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig2_HTML.jpg](img/329781_5_En_20_Fig2_HTML.jpg)\n\
  \n图 20-2\n\n分栏视图控制器并排显示两个视图以填充更大的屏幕\n\n主视图本质上显示的是上一个表格视图，而次视图显示的是下一个表格视图。通过将它们并排显示，可以轻松看到各个列表之间的关系，例如在“通用”类别下可以看到“关于”、“辅助功能”、“键盘”、“语言与地区”、“词典”和“还原”等选项（见图\
  \ 20-2）。\n\n当在更大的 iPad 和 iPhone 屏幕上运行时，分栏视图控制器会将屏幕分成两部分，分别显示主视图和次视图。当在较小的 iPhone\
  \ 屏幕上运行时，分栏视图控制器的行为类似于普通表格视图，只显示单一的项目列表。\n\n\n\n## 理解分视图控制器的结构\n\n虽然其他类型的控制器（例如页面视图控制器或表视图控制器）仅由单一项目构成，但**分视图控制器**要复杂得多。分视图控制器必须连接两个独立的视图控制器，它们分别代表主视图和详细视图，并排显示。\n\
  \n为了定义主视图，分视图控制器必须要连接到一个导航控制器。为了定义详细视图，分视图控制器可以连接到一个视图控制器。当你从对象库中拖放一个分视图控制器时，你将看到其基本结构，如图\
  \ 20-3 所示。\n\n![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig3_HTML.jpg](img/329781_5_En_20_Fig3_HTML.jpg)\n\
  \n图 20-3\n\n分视图控制器的基本结构\n\n除了分视图控制器需要依赖至少一个导航控制器和一个视图控制器之外，它还需要分布在三个不同文件中的 Swift\
  \ 代码才能工作：\n\n- `AppDelegate.swift` – 控制组成主视图和详细视图的两个视图控制器。\n- 一个连接到主视图的 `.swift`\
  \ 文件 – 控制主视图控制器。\n- 一个连接到详细视图的 `.swift` 文件 – 控制详细视图控制器。\n\n要了解分视图控制器如何工作，请遵循以下步骤：\n\
  \n1. 选择“文件”➤“新建”➤“项目”。会出现一个对话框，列出不同的模板。\n2. 在 iOS 类别下选择“主-详细应用”，如图 20-4 所示。\n\n\
  ![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig4_HTML.jpg](img/329781_5_En_20_Fig4_HTML.jpg)\n\
  \n图 20-4\n\n分视图控制器的基本结构\n\n3. 点击**下一步**按钮。Xcode 会显示另一个窗口，要求提供“产品名称”。\n4. 点击“产品名称”文本字段，输入\
  \ `SplitViewApp`，然后点击**下一步**按钮。接着点击**创建**按钮。Xcode 会显示主-详细应用。\n5. 在导航窗格中点击 `AppDelegate.swift`\
  \ 文件，并注意其中的 Swift 代码。\n6. 在导航窗格中点击 `MasterViewController.swift` 文件，并研究其中的 Swift\
  \ 代码。\n7. 在导航窗格中点击 `DetailViewController.swift` 文件，并研究其中的 Swift 代码。\n8. 在导航窗格中点击\
  \ `Main.storyboard` 文件。注意故事板如何显示一个连接到两个导航控制器的分视图控制器，如图 20-5 所示。\n\n![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig5_HTML.jpg](img/329781_5_En_20_Fig5_HTML.jpg)\n\
  \n图 20-5\n\n主-详细应用的故事板\n\n9. 点击“活动方案”弹出菜单，如图 20-6 所示。会出现一个弹出菜单。\n\n![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig6_HTML.jpg](img/329781_5_En_20_Fig6_HTML.jpg)\n\
  \n图 20-6\n\n点击“活动方案”弹出菜单\n\n10. 选择一个 iPad 型号，例如 iPad Air 或 iPad Pro。\n11. 点击“运行”按钮，或选择“产品”➤“运行”。模拟器窗口会出现，模拟你所选的\
  \ iPad 型号。\n12. 选择“硬件”➤“向左旋转”。注意分视图控制器会在左侧显示一个表格视图，在右侧显示一个空白视图，如图 20-7 所示。\n\n![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig7_HTML.jpg](img/329781_5_En_20_Fig7_HTML.jpg)\n\
  \n图 20-7\n\n显示分视图控制器\n\n13. 点击左侧（主）视图顶部出现的 + 图标。多次点击这个 + 图标。每次点击此 + 图标时，点击的时间会显示在左侧（主）视图中。\n\
  14. 点击左侧（主）视图中显示的任何一条时间。注意右侧（详细）视图会显示该时间，如图 20-8 所示。\n\n![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig8_HTML.jpg](img/329781_5_En_20_Fig8_HTML.jpg)\n\
  \n图 20-8\n\n在左侧（主）视图中选择一项，会在右侧（详细）视图中显示更多信息\n\n15. 选择“硬件”➤“向右旋转”。注意分视图控制器现在会隐藏主视图，仅显示详细视图。\n\
  16. 点击模拟 iPad 屏幕左上角的 `< 主` 按钮。注意主视图会像图 20-9 所示的那样滑出。\n\n![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig9_HTML.jpg](img/329781_5_En_20_Fig9_HTML.jpg)\n\
  \n图 20-9\n\n主视图从左侧滑出\n\n17. 选择“模拟器”➤“退出模拟器”以返回 Xcode。\n\n通过在“主-详细应用”模板中试验分视图控制器，你可以看到分视图控制器如何根据模拟\
  \ iPad 的方向（竖屏或横屏）改变其外观。\n\n18. 点击“活动方案”弹出菜单（见图 20-6）。会出现一个弹出菜单。\n19. 选择 iPhone XR。\n\
  20. 点击“运行”按钮，或选择“产品”➤“运行”。模拟器窗口会出现，模拟竖屏方向的 iPhone XR。\n21. 多次点击右上角的 + 图标。每次点击 +\
  \ 图标时，主视图都会显示时间。注意在竖屏方向的较小 iPhone 屏幕上，分视图控制器看起来像一个标准的表格视图，如图 20-10 所示。\n\n![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig10_HTML.jpg](img/329781_5_En_20_Fig10_HTML.jpg)\n\
  \n图 20-10\n\n在竖屏方向的 iPhone 上，分视图控制器显示为表格视图\n\n22. 选择“硬件”➤“向左旋转”。\n23. 点击左上角的 `<\
  \ 主` 按钮。注意分视图控制器会将主视图从左侧滑出，并在右侧显示详细视图，如图 20-11 所示。\n\n![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig11_HTML.jpg](img/329781_5_En_20_Fig11_HTML.jpg)\n\
  \n图 20-11\n\n当 iPhone 切换到横屏方向时，主视图可以从左侧滑出\n\n24. 选择“硬件”➤“向右旋转”。注意主视图再次消失。\n25. 选择“模拟器”➤“退出模拟器”以返回\
  \ Xcode。\n\n尝试在不同的 iOS 设备上运行此应用，例如小屏幕的 iPhone 5s 或大屏幕的 iPad Pro。然后向左和向右旋转 iOS 设备。注意分视图控制器会根据所选的\
  \ iOS 设备及其方向表现出不同的行为：\n\n- 在竖屏方向的 iPad 上，分视图控制器会隐藏主视图，但在用户请求时可以将其滑出。\n- 在横屏方向的 iPad\
  \ 上，分视图控制器会在左侧显示主视图，在右侧显示详细视图。\n- 在大屏幕 iPhone 的竖屏方向上，分视图控制器显示为表格视图。\n- 在大屏幕 iPhone\
  \ 的横屏方向上，分视图控制器会隐藏主视图，但在用户请求时可以将其滑出。\n- 在小屏幕 iPhone 上，无论在竖屏还是横屏方向，分视图控制器都显示为表格视图。\n\
  \n\n\n## 在 Storyboard 中添加分视图控制器\n\n了解 `Split View Controller` 在不同 iOS 设备和方向下的行为后，接下来要学习如何创建和自定义\
  \ `Split View Controller`。一个 `Split View Controller` 通常至少需要一张表格视图来代表主视图，以及一个 `View\
  \ Controller` 来代表详细视图。\n\n这意味着你需要用数据填充表格视图，然后编写代码来定义 `Split View Controller` 如何在主视图和详细视图中显示数据。\n\
  \n若要了解如何为 `Split View Controller` 创建 storyboard，请按以下步骤操作：\n\n1.  使用 Single View\
  \ App 模板创建一个新的 iOS 项目（参见第 1 章），并将这个新项目命名为 `SplitViewCustomApp`。这将为用户界面创建一个单一视图。\n\
  \n2.  在导航窗格中点击 `Main.storyboard`。\n\n3.  在文档大纲中点击 View Controller Scene，然后按 BACKSPACE\
  \ 或 DELETE 键从 storyboard 中移除该 View Controller。\n\n4.  在导航窗格中点击 `ViewController.swift`，然后选择\
  \ 编辑 ➤ 删除。此时会出现一个对话框，询问您希望如何删除文件。\n\n5.  点击“移到废纸篓”按钮。`ViewController.swift` 文件会从导航窗格中消失。\n\
  \n6.  在导航窗格中点击 `Main.storyboard` 文件。\n\n7.  点击“库”图标以打开“对象库”窗口。\n\n8.  从“对象库”窗口中将一个\
  \ Split View Controller 拖放到 storyboard 上，如图 20-12 所示。\n\n![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig12_HTML.jpg](img/329781_5_En_20_Fig12_HTML.jpg)\n\
  \n图 20-12\n\n将分视图控制器拖放到 storyboard 上\n\n9.  在文档大纲中点击 Split View Controller Scene。\n\
  \n10. 选择 视图 ➤ 检查器 ➤ 显示属性检查器，或点击 Xcode 窗口右上角的“属性检查器”图标。\n\n11. 选中“是初始视图控制器”复选框。Xcode\
  \ 会显示一个指向 Split View Controller 的箭头。\n\n12. 在文档大纲中点击 View Controller Scene。\n\n\
  13. 选择 编辑器 ➤ 嵌入于 ➤ 导航控制器。Xcode 将 View Controller 嵌入到一个 Navigation Controller 中。这将使\
  \ View Controller 能够滑入和滑出，但我们需要在表格单元格和这个 Navigation Controller 之间创建一个转场，以便用户在点击表格单元格时，显示此\
  \ Navigation Controller 内的 View Controller。\n\n14. 在文档大纲的 Root View Controller Scene\
  \ 下，点击 Table View 下方的 Table View Cell。\n\n15. 选择 视图 ➤ 检查器 ➤ 显示属性检查器，或点击 Xcode 窗口右上角的“属性检查器”图标。\n\
  \n16. 点击标识符文本字段，输入 `customCell`，然后按 ENTER 键。Xcode 会将文档大纲中的 Table View Cell 名称更改为\
  \ `customCell`。\n\n17. 将鼠标指针移动到文档大纲中的 `customCell` 上，按住 Control 键，然后从 `customCell`\
  \ 按住 Control 键拖动到嵌入了空白 View Controller 的 Navigation Controller 上，如图 20-13 所示。\n\n\
  ![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig13_HTML.jpg](img/329781_5_En_20_Fig13_HTML.jpg)\n\
  \n图 20-13\n\n在表格视图单元格和导航控制器之间创建转场\n\n18. 松开 Control 键和鼠标左键。此时会出现一个弹出菜单，如图 20-14\
  \ 所示。\n\n![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig14_HTML.jpg](img/329781_5_En_20_Fig14_HTML.jpg)\n\
  \n图 20-14\n\n转场弹出菜单\n\n19. 选择“显示详细信息”。Xcode 会在 Table View Cell（名为 `customCell`）和嵌入了空白\
  \ View Controller 的 Navigation Controller 之间创建一个转场。\n\n20. 在文档大纲中点击“showDetail”至“Navigation\
  \ Controller”的 Show Detail 转场。这将选中从 Table View Cell (`customCell`) 到 Navigation\
  \ Controller 的转场。\n\n21. 选择 视图 ➤ 检查器 ➤ 显示属性检查器，或点击 Xcode 窗口右上角的“属性检查器”图标。\n\n22.\
  \ 点击标识符文本字段，输入 `showDetail`，然后按 ENTER 键，如图 20-15 所示。\n\n![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig15_HTML.jpg](img/329781_5_En_20_Fig15_HTML.jpg)\n\
  \n图 20-15\n\n为表格视图单元格和导航控制器之间的转场定义标识符名称\n\n23. 在文档大纲中，点击 View Controller Scene 下的\
  \ View。\n\n24. 选择 视图 ➤ 检查器 ➤ 显示属性检查器，或点击 Xcode 窗口右上角的“属性检查器”图标。\n\n25. 点击背景弹出菜单，选择一种不同的颜色（例如黄色），以便在应用运行时更容易识别此\
  \ View Controller。\n\n26. 点击“库”图标以打开“对象库”窗口。\n\n27. 将一个标签拖放到您刚刚修改过的、显示背景颜色（如黄色）的视图中央。\n\
  \n28. 点击 Xcode 窗口底部的“对齐”图标，显示一个弹出窗口。\n\n29. 选中“在容器中水平居中”和“在容器中垂直居中”复选框。然后点击“添加 2\
  \ 个约束”按钮。\n\n至此，Split View Controller 的 storyboard 就完成了。现在我们需要为 Split View Controller\
  \ 的主视图和详细视图创建 `.swift` 文件。\n\n\n\n### 创建类文件\n\n使用分割视图控制器时，需要两个 .swift 类文件：一个用于表格视图（`UITableViewController`），另一个用于视图控制器（`UIViewController`）。`UITableViewController`\
  \ 的 .swift 文件定义了主视图，负责用数据填充表格视图的行，并检测用户何时点击特定行。而 `UIViewController` 的 .swift 文件则负责在代表详细视图的视图控制器上显示数据。\n\
  \n要创建两个 .swift 类文件，请按以下步骤操作：\n\n1. 确保 `SplitViewCustomApp` 已加载到 Xcode 中。\n2. 选择\
  \ File ➤ New ➤ File。将出现一个对话框，显示可用的不同模板。\n3. 点击 iOS 类别下的 Cocoa Touch Class，然后点击 **Next**\
  \ 按钮。将出现另一个窗口，要求输入类名和子类类型。\n4. 在 Class 文本字段中点击并输入 `MasterTableViewController`。\n\
  5. 在 Subclass of 弹出菜单中点击并选择 `UITableViewController`。\n6. 点击 **Next** 按钮，然后点击 **Create**\
  \ 按钮。Xcode 会在导航器面板中显示 `MasterViewController.swift` 文件。\n7. 选择 File ➤ New ➤ File。将出现一个对话框，显示可用的不同模板。\n\
  8. 点击 iOS 类别下的 Cocoa Touch Class，然后点击 **Next** 按钮。将出现另一个窗口，要求输入类名和子类类型。\n9. 在 Class\
  \ 文本字段中点击并输入 `DetailViewController`。\n10. 在 Subclass of 弹出菜单中点击并选择 `UIViewController`。\n\
  11. 点击 **Next** 按钮，然后点击 **Create** 按钮。Xcode 会在导航器面板中显示 `DetailViewController.swift`\
  \ 文件。\n12. 在导航器面板中点击 `Main.storyboard` 文件。Xcode 会显示故事板。\n13. 在文档大纲中点击根视图控制器。\n14.\
  \ 选择 View ➤ Inspectors ➤ Show Identity Inspector，或点击 Xcode 窗口右上角的身份检查器图标。\n15. 在\
  \ Class 弹出菜单中点击并选择 `MasterViewController`，如图 20-16 所示。\n    ![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig16_HTML.jpg](img/329781_5_En_20_Fig16_HTML.jpg)\n\
  \    **图 20-16** 将根视图控制器连接到 `MasterViewController.swift` 文件\n16. 在文档大纲中点击视图控制器场景。\n\
  17. 选择 View ➤ Inspectors ➤ Show Identity Inspector，或点击 Xcode 窗口右上角的身份检查器图标。\n18.\
  \ 点击 Class 弹出菜单并选择 `DetailViewController`。\n\n### 修改 AppDelegate.swift 文件\n\n`AppDelegate.swift`\
  \ 文件通常监控应用的行为，例如加载或终止。在我们的示例中，需要 `AppDelegate.swift` 文件来设置分割视图控制器。这意味着要编写 Swift\
  \ 代码，并将 `AppDelegate.swift` 文件声明为分割视图控制器的代理。\n\n也就是说，需要添加以下两行代码，将 `AppDelegate.swift`\
  \ 文件指定为分割视图控制器的代理：\n\n```\nlet splitVC = window!.rootViewController as! UISplitViewController\n\
  splitVC.delegate = self\n```\n\n第一行声明了一个 `splitVC` 常量，它代表故事板上的分割视图控制器。第二行确保分割视图控制器（`splitVC`\
  \ 常量）知道 `AppDelegate.swift` 文件是它的代理，这意味着 `AppDelegate.swift` 文件将包含用于将导航控制器加载到分割视图控制器中的\
  \ Swift 代码。\n\n分割视图控制器通过将可显示的所有视图控制器存储在一个数组中来进行跟踪。最初，分割视图控制器会显示该数组中的最后一个项。\n\n```\n\
  let navigationVC = splitVC.viewControllers.last as? UINavigationController\n```\n\
  \n最后，导航控制器需要一个左侧栏按钮，以下代码可以创建该按钮：\n\n```\nnavigationVC.topViewController!.navigationItem.leftBarButtonItem\
  \ = splitVC.displayModeButtonItem\n```\n\n要进行所有这些更改，请按以下步骤操作：\n\n1. 确保 `SplitViewCustomApp`\
  \ 项目已加载到 Xcode 中。\n2. 在导航器面板中点击 `AppDelegate.swift` 文件。\n3. 按如下方式编辑类 AppDelegate\
  \ 行：\n\n```\n    class AppDelegate: UIResponder, UIApplicationDelegate, UISplitViewControllerDelegate\
  \ {\n```\n\n4. 按如下方式编辑 `didFinishLaunchingWithOptions` 方法：\n\n```\n    func application(_\
  \ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey:\
  \ Any]?) -> Bool {\n        let splitVC = window!.rootViewController as! UISplitViewController\n\
  \        splitVC.delegate = self\n        let navigationVC = splitVC.viewControllers.last\
  \ as? UINavigationController\n        navigationVC?.topViewController!.navigationItem.leftBarButtonItem\
  \ = splitVC.displayModeButtonItem\n        return true\n    }\n```\n\n5. 在 `AppDelegate.swift`\
  \ 文件末尾、最后一个花括号之前添加以下方法：\n\n```\n    func splitViewController(_ splitViewController:\
  \ UISplitViewController, collapseSecondary secondaryViewController:UIViewController,\
  \ onto primaryViewController:UIViewController) -> Bool {\n        guard let secondaryAsNavController\
  \ = secondaryViewController as? UINavigationController else { return false }\n \
  \       guard let topAsDetailController = secondaryAsNavController.topViewController\
  \ as? DetailViewController else { return false }\n        if topAsDetailController.detailItem\
  \ == nil {\n            // 返回 true 表示已通过不做任何操作来处理折叠；次要控制器将被丢弃。\n            return\
  \ true\n        }\n        return false\n    }\n```\n\n这个 `collapseSecondary` 函数负责显示或隐藏详细视图。`if`\
  \ 语句检查 `detailItem` 属性是否为空。这个 `detailItem` 属性保存要在详细视图中显示的数据，并将在 `DetailViewController.swift`\
  \ 文件中定义，因此如果 Xcode 现在显示错误消息，不必担心。\n\n整个 `AppDelegate.swift` 文件应如下所示：\n\n```\nimport\
  \ UIKit\n@UIApplicationMain\nclass AppDelegate: UIResponder, UIApplicationDelegate,\
  \ UISplitViewControllerDelegate {\n    var window: UIWindow?\n    func application(_\
  \ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey:\
  \ Any]?) -> Bool {\n        let splitVC = window!.rootViewController as! UISplitViewController\n\
  \        splitVC.delegate = self\n        let navigationVC = splitVC.viewControllers.last\
  \ as? UINavigationController\n        navigationVC?.topViewController!.navigationItem.leftBarButtonItem\
  \ = splitVC.displayModeButtonItem\n        return true\n    }\n    func splitViewController(_\
  \ splitViewController: UISplitViewController, collapseSecondary secondaryViewController:UIViewController,\
  \ onto primaryViewController:UIViewController) -> Bool {\n        guard let secondaryAsNavController\
  \ = secondaryViewController as? UINavigationController else { return false }\n \
  \       guard let topAsDetailController = secondaryAsNavController.topViewController\
  \ as? DetailViewController else { return false }\n        if topAsDetailController.detailItem\
  \ == nil {\n            // 返回 true 表示已通过不做任何操作来处理折叠；次要控制器将被丢弃。\n            return\
  \ true\n        }\n        return false\n    }\n}\n```\n\n\n\n### 修改 `DetailViewController.swift`\
  \ 文件\n\n`DetailViewController.swift` 文件用于显示用户的选择。当前，详情视图控制器显示了一个标签，但这个标签需要连接到 `IBOutlet`，以便\
  \ Swift 代码能够在该标签中显示数据。\n\n此外，`DetailViewController.swift` 文件还需要定义一个 `detailItem`\
  \ 属性。该 `detailItem` 属性用于存储从 `MasterTableViewController.swift` 文件发送过来的数据，该文件定义了用户所选表格视图行中的项目。当详情视图控制器首次加载以及用户每次在表格视图中选择不同项目时，这些数据都需要显示在标签中。\n\
  \n要修改 `DetailViewController.swift` 文件，请按照以下步骤操作：\n\n1.  确保 `SplitViewCustomApp`\
  \ 项目已在 Xcode 中加载。\n2.  在导航器窗格中点击 `Main.storyboard` 文件。\n3.  在文档大纲中点击详情视图控制器场景。\n\
  4.  选择 视图 ➤ 辅助编辑器 ➤ 显示辅助编辑器，或者点击 Xcode 窗口右上角的辅助编辑器图标。这将并排显示 `Main.storyboard` 和\
  \ `DetailViewController.swift` 文件。\n5.  将鼠标移到文档大纲中详情视图控制器场景下的标签上，按住 Control 键，然后\
  \ Ctrl-拖拽到 `DetailViewController.swift` 文件中的“class `DetailViewController`”行。\n6.\
  \  松开 Control 键和鼠标左键。会弹出一个窗口。\n7.  点击名称文本字段，输入 `petLabel`，然后点击连接按钮。Xcode 会创建一个 `IBOutlet`，如下所示：\n\
  \n    ```\n    @IBOutlet var petLabel: UILabel!\n    ```\n\n8.  选择 视图 ➤ 标准编辑器 ➤\
  \ 显示标准编辑器，或者点击 Xcode 窗口右上角的标准编辑器图标。\n9.  在导航器窗格中点击 `DetailViewController.swift`\
  \ 文件。\n10. 在 `IBOutlet` 下方添加以下属性：\n\n    ```\n    var detailItem: String? {\n  \
  \      didSet {\n            configureView()\n        }\n    }\n    ```\n\n11. 在\
  \ `IBOutlet` 下方添加以下函数：\n\n    ```\n    func configureView() {\n        if let label\
  \ = petLabel {\n            label.text = detailItem\n        }\n    }\n    ```\n\
  \n12. 修改 `viewDidLoad` 方法如下：\n\n    ```\n    override func viewDidLoad() {\n   \
  \     super.viewDidLoad()\n        configureView()\n    }\n    ```\n\n当视图首次加载时，它会调用\
  \ `configureView()` 函数，该函数将 `detailItem` 数据存储到标签中。每次用户在主视图显示的表格视图中选择不同项目时，所选项目都会被存储到\
  \ `detailItem` 属性中。\n\n完整的 `DetailViewController.swift` 文件应如下所示：\n\n```\nimport\
  \ UIKit\nclass DetailViewController: UIViewController {\n    @IBOutlet var petLabel:\
  \ UILabel!\n    var detailItem: String? {\n        didSet {\n            configureView()\n\
  \        }\n    }\n    func configureView() {\n        if let label = petLabel {\n\
  \            label.text = detailItem\n        }\n    }\n    override func viewDidLoad()\
  \ {\n        super.viewDidLoad()\n        configureView()\n        // 视图加载后执行任何其他设置\n\
  \    }\n}\n```\n\n### 修改 `MasterTableViewController.swift` 文件\n\n`MasterTableViewController.swift`\
  \ 文件显示一个表格视图，供用户选择项目。这意味着 `MasterTableViewController.swift` 文件需要定义表格视图中显示的分区数（1）以及表格视图中显示的行数（数据的数组总长度），并使用数组中的数据填充表格视图。该数组仅显示一个字符串列表，每个字符串显示在表格视图的一行中。\n\
  \n除了用数据填充表格视图，`MasterTableViewController.swift` 文件还需要创建一个代表详情视图控制器的变量，并通过故事板中定义的转场（segue）将用户在表格视图中选择的项目传递给该详情视图控制器。\n\
  \n要修改 `MasterTableViewController.swift` 文件，请按照以下步骤操作：\n\n1.  确保 `SplitViewCustomApp`\
  \ 项目已在 Xcode 中加载。\n2.  在导航器窗格中点击 `MasterTableViewController.swift` 文件。\n3.  在“class\
  \ `MasterTableViewController`”行下方添加以下代码：\n\n    ```\n    var detailVC: DetailViewController?\
  \ = nil\n    let petArray = [\"cat\", \"dog\", \"parakeet\", \"parrot\", \"canary\"\
  , \"finch\", \"tropical fish\", \"goldfish\", \"sea horses\", \"hamster\", \"gerbil\"\
  , \"rabbit\", \"turtle\", \"snake\", \"lizard\", \"hermit crab\"]\n    ```\n\n4.\
  \  修改 `viewDidLoad()` 方法如下：\n\n    ```\n    override func viewDidLoad() {\n    \
  \    super.viewDidLoad()\n        if let split = splitViewController {\n       \
  \     detailVC = (split.viewControllers.last as! UINavigationController).topViewController\
  \ as? DetailViewController\n        }\n    }\n    ```\n\n5.  在 `viewDidLoad()` 方法下方添加以下方法：\n\
  \n    ```\n    override func viewWillAppear(_ animated: Bool) {\n        clearsSelectionOnViewWillAppear\
  \ = splitViewController!.isCollapsed\n        super.viewWillAppear(animated)\n \
  \   }\n    ```\n\n6.  在 `viewWillAppear(_:)` 方法下方添加以下代码，以定义表格视图并使用数组中的数据填充它：\n\n\
  \    ```\n    override func numberOfSections(in tableView: UITableView) -> Int {\n\
  \        return 1\n    }\n    override func tableView(_ tableView: UITableView,\
  \ numberOfRowsInSection section: Int) -> Int {\n        return petArray.count\n\
  \    }\n    override func tableView(_ tableView: UITableView, cellForRowAt indexPath:\
  \ IndexPath) -> UITableViewCell {\n        // 确保在属性检查器面板中定义了表格视图的单元格标识符\n      \
  \  let cell = tableView.dequeueReusableCell(withIdentifier: \"customCell\", for:\
  \ indexPath)\n        cell.textLabel!.text = petArray[indexPath.row]\n        return\
  \ cell\n    }\n    ```\n\n7.  添加以下 `prepare(for:sender:)` 函数，从表格视图中检索数据并发送到 `DetailViewController.swift`\
  \ 文件：\n\n    ```\n    override func prepare(for segue: UIStoryboardSegue, sender:\
  \ Any?) {\n        if segue.identifier == \"showDetail\" {\n            if let indexPath\
  \ = tableView.indexPathForSelectedRow {\n                let object = petArray[indexPath.row]\n\
  \                let controller = (segue.destination as! UINavigationController).topViewController\
  \ as! DetailViewController\n                controller.detailItem = object\n   \
  \             controller.navigationItem.leftBarButtonItem = splitViewController?.displayModeButtonItem\n\
  \                controller.navigationItem.leftItemsSupplementBackButton = true\n\
  \            }\n        }\n    }\n    ```\n\n8.  点击运行按钮，或选择 产品 ➤ 运行。模拟器窗口会出现，显示一个填充了\
  \ `petArray` 中项目的表格视图。\n9.  点击任意项目。请注意，详情视图会在其标签中显示所选项目。\n10. 选择 硬件 ➤ 向左旋转。\n11.\
  \ 将鼠标移到模拟器左侧并向右侧拖拽，以拉出主视图，如图 20-17 所示。\n\n![../images/329781_5_En_20_Chapter/329781_5_En_20_Fig17_HTML.jpg](img/329781_5_En_20_Fig17_HTML.jpg)\n\
  \n图 20-17\n\n在模拟的 iPhone 上以横屏方向运行应用\n\n12. 将鼠标指针移到主视图右侧，并向左侧拖拽鼠标以收起主视图。\n13. 选择\
  \ 硬件 ➤ 向右旋转。\n14. 选择 模拟器 ➤ 退出模拟器，返回 Xcode。\n\n\n\n## 摘要\n\n分割视图控制器专为 iPad 或 iPhone\
  \ 的大屏幕型号等较大屏幕而设计。分割视图控制器可以并排显示两个视图，其中一个视图（称为主视图）通常显示一个项目列表。从该列表中选择一个项目后，会将此数据传输到第二个视图（称为详细视图）。\n\
  \n当在大屏幕上显示时，分割视图控制器可以并排显示主视图和详细视图。当在较小屏幕上显示时，分割视图控制器的行为类似于普通的导航控制器，通过滑动视图来前后切换。\n\
  \n使用分割视图控制器时，请确保通过在属性检查器面板中定义转场的 `Identifier` 属性，来命名表格视图单元格和导航控制器之间的转场。同时，也要通过修改表格视图单元格的\
  \ `Identifier` 属性来为其命名。\n\n主视图控制器和详细视图控制器都需要连接一个单独的 `.swift` 类文件。除了在这两个 `.swift`\
  \ 文件中编写代码外，你还需要在 `AppDelegate.swift` 文件中编写代码。\n\n分割视图控制器有助于在大屏幕和小屏幕上正确显示数据。可以将分割视图控制器视为导航控制器的更高级版本，它特别适用于\
  \ iPad 等大屏幕。\n\n### A\n\n`Activity Indicator view` `addObserver` 方法 `Alert controller`\
