  \ \"OK\", style: .default, handler: { action -> Void in\n            //Just dismiss\
  \ the action sheet\n        })\n        alert.addAction(okAction)\n        self.present(alert,\
  \ animated: true, completion: nil)\n    }\n    // Code for creating a grouped table\n\
  \    // First, change the Style property of the table view to Grouped in the Attributes\
