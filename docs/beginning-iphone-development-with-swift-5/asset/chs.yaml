  \ 11-11）。\n\n26. 按住鼠标左键和 Option 键，然后以圆周运动拖动鼠标，模拟旋转手势。请注意，随着旋转手势的变化，图像视图也会随之旋转。\n\
  \n27. 选择 **Simulator ➤ Quit Simulator** 返回 Xcode。\n\n本示例通过从对象库中拖拽 Rotation Gesture\
