  \n图 16-9  \n在集合视图中修改单元格大小和间距\n\n26. 选择 `View ➤ Assistant Editor ➤ Show Assistant\
  \ Editor`，或点击 `Xcode` 窗口右上角的“助理编辑器”图标。这将在左侧显示 `Main.storyboard` 文件，在右侧显示 `ViewController.swift`\
  \ 文件。\n\n27. 将鼠标指针移到文档大纲中的 `Collection View` 上，按住 `Control` 键，然后从 `Collection View`\
  \ 向 `ViewController.swift` 文件中的 `class ViewController` 行下方按住 Control 键拖拽。\n\n28.\
  \ 释放 `Control` 键和鼠标左键。此时会出现一个弹出窗口。\n\n29. 在 `Name` 文本框中点击，输入 `collectionView`，然后点击\
  \ `Connect` 按钮。`Xcode` 会创建一个 `IBOutlet`，如下所示：\n\n```\n    @IBOutlet var collectionView:\
