  \ ➤ **表情与符号**以打开字符查看器。\n\n然后点击**表情符号** ➤ **动物与自然**，如图 14-13 所示。现在将光标移到你想插入表情符号的位置，然后双击该表情符号即可将其放入代码中。分别点击一个鸟、鱼、哺乳动物和爬行动物的表情符号。\n\
