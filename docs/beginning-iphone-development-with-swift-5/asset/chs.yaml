  \n**图 15-13** 显示自定义表格视图单元格的表格视图\n\n49. 在表格视图中点击一个项目。会出现一个提醒控制器来标识你的选择。\n\n50. 点击`OK`关闭提醒控制器。\n\
  \n51. 选择**Simulator** ➤ **Quit Simulator**以返回 Xcode。\n\n\n\n## 滑动添加与删除行\n\n表格视图可以在多行中显示大量数据。然而，除了查看数据，你可能还希望能够向表格视图添加或删除数据。修改表格视图以添加或删除项目的一种方法是使用左滑手势。当用户在表格视图行上向左滑动时，可以显示一个或多个按钮，让用户选择诸如添加新项目或删除现有项目等选项。\n\
  \n要允许在表格视图行上使用左滑手势，我们需要一个 `editActionsForRowAt` 函数，例如：\n\n```\nfunc tableView(_\
  \ tableView: UITableView, editActionsForRowAt indexPath: IndexPath) -> [UITableViewRowAction]?\
  \ {\n}\n```\n\n在这个函数内部，我们可以定义一个或多个按钮，例如：\n\n```\nlet addAction = UITableViewRowAction(style:\
  \ UITableViewRowAction.Style.normal, title: \"Add\", handler: {(action: UITableViewRowAction,\
  \ indexPath: IndexPath) in\n})\nlet deleteAction = UITableViewRowAction(style: UITableViewRowAction.Style.destructive,\
  \ title: \"Delete\", handler: {(action: UITableViewRowAction, indexPath: IndexPath)\
  \ in\n})\nreturn [deleteAction, addAction]\n```\n\n上述代码定义了两个按钮，分别标记为“Add”和“Delete”。“Add”按钮使用\
  \ `.normal` 样式，显示为浅灰色。“Delete”按钮使用 `.destructive` 样式，因此显示为亮红色。最后一行返回代表“Add”和“Delete”按钮的两个\
  \ `UITableViewRowAction` 常量。\n\n要了解如何使用滑动手势在表格视图中添加和删除项目，请按以下步骤操作：\n\n1. 使用单视图应用模板（参见第\
  \ 1 章）创建一个新的 iOS 项目，并将此新项目命名为 EditRowApp。这将为用户界面创建一个单一视图。\n\n2. 在导航面板中点击 `Main.storyboard`\
  \ 文件。Xcode 会显示该单一视图。\n\n3. 点击库图标以打开对象库窗口。\n\n4. 将表格视图拖放到视图的任意位置。\n\n5. 调整表格视图大小，使其填满整个屏幕。\n\
  \n6. 选择 Editor ➤ Resolve Auto Layout Issues ➤ Reset to Suggested Constraints。Xcode\
  \ 会为表格视图添加约束。\n\n7. 选择 View ➤ Inspectors ➤ Show Attributes Inspector，或点击 Xcode 窗口右上角的\
  \ Attributes Inspector 图标。\n\n8. 选择 View ➤ Assistant Editor ➤ Show Assistant Editor，或点击\
  \ Xcode 窗口右上角的 Assistant Editor 图标。\n\n9. 将鼠标指针移动到表格视图上，按住 Control 键，然后按住 Ctrl 键并拖动到\
  \ `ViewController.swift` 文件中 `class ViewController` 行的下方。\n\n10. 松开 Control 键和鼠标左键。将出现一个弹出窗口。\n\
  \n11. 点击 Name 文本字段，输入 `tableView`，然后点击 Connect 按钮。Xcode 会创建一个 `IBOutlet`，如下所示：\n\
  \n    ```\n    @IBOutlet var tableView: UITableView!\n    ```\n\n12. 选择 View ➤ Standard\
  \ Editor ➤ Show Standard Editor，或点击 Xcode 窗口右上角的 Standard Editor 图标。\n\n13. 在导航面板中点击\
  \ `ViewController.swift` 文件。\n\n14. 修改 `class ViewController` 行，添加 `UITableViewDelegate`、`UITableViewDataSource`，如下所示：\n\
  \n    ```\n    class ViewController: UIViewController, UITableViewDelegate, UITableViewDataSource\
  \ {\n    ```\n\n    此代码的目的是将 `ViewController.swift` 文件标识为表格视图的委托和数据源。\n\n15. 在 `class\
  \ ViewController` 行的下方，添加以下数组：\n\n    ```\n    var petArray = [\"cat\", \"dog\"\
  , \"parakeet\", \"parrot\", \"canary\", \"finch\", \"tropical fish\", \"goldfish\"\
  , \"sea horses\", \"hamster\", \"gerbil\", \"rabbit\", \"turtle\", \"snake\", \"\
  lizard\", \"hermit crab\"]\n    ```\n\n    注意，此 `petArray` 被声明为 `var`，这意味着我们能够通过向此数组添加或删除项目来修改它。如果我们用\
  \ `let` 声明此 `petArray`，则无法从数组中添加或删除项目。\n\n16. 在 `petArray` 下方添加以下行：\n\n    ```\n\
  \    let cellID = \"cellID\"\n    ```\n\n\n\n17. 修改`viewDidLoad`方法如下：\n\n```\noverride\
  \ func viewDidLoad() {\n    super.viewDidLoad()\n    tableView.dataSource = self\n\
  \    tableView.delegate = self\n    // Do any additional setup after loading the\
  \ view, typically from a nib.\n}\n```\n\n18. 在`viewDidLoad`方法下方，添加以下函数来定义表格视图中显示的行数，该表格仅包含一个分区：\n\
  \n```\nfunc tableView(_ tableView: UITableView, numberOfRowsInSection section: Int)\
  \ -> Int {\n    return petArray.count\n}\n```\n\n19. 在上一个函数下方，添加以下函数以使用`petArray`中的数据填充表格视图：\n\
  \n```\nfunc tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath)\
  \ -> UITableViewCell {\n    var cell = tableView.dequeueReusableCell(withIdentifier:\
  \ cellID)\n    if (cell == nil) {\n        cell = UITableViewCell(\n           \
  \ style: UITableViewCell.CellStyle.default,\n            reuseIdentifier: cellID)\n\
  \    }\n    cell?.textLabel?.text = petArray[indexPath.row]\n    return cell!\n\
  }\n```\n\n20. 在上一个函数下方，添加以下函数以显示用户从表格视图中选择的项目：\n\n```\nfunc tableView(_ tableView:\
  \ UITableView, didSelectRowAt indexPath: IndexPath) {\n    let selectedItem = petArray[indexPath.row]\n\
  \    let alert = UIAlertController(title: \"Your Choice\", message: \"\\(selectedItem)\"\
  , preferredStyle: .alert)\n    let okAction = UIAlertAction(title: \"OK\", style:\
  \ .default, handler: { action -> Void in\n        //Just dismiss the action sheet\n\
  \    })\n    alert.addAction(okAction)\n    self.present(alert, animated: true,\
  \ completion: nil)\n}\n```\n\n21. 在上一个函数下方，添加以下函数以显示一个带有文本字段的警告控制器，让用户输入数据以向表格视图添加新行：\n\
  \n```\nfunc displayAlert(location: Int) {\n    let alert = UIAlertController(title:\
  \ \"Add\", message: \"New Pet\", preferredStyle: .alert)\n    alert.addTextField(configurationHandler:\
  \ {(textField) in\n        textField.placeholder = \"Pet type here\"\n    })\n \
  \   let okAction = UIAlertAction(title: \"OK\", style: .default, handler: { action\
  \ -> Void in\n        let savedText = alert.textFields![0] as UITextField\n    \
  \    self.petArray.insert(savedText.text ?? \"default\", at: location)\n       \
  \ self.tableView.reloadData()\n    })\n    let cancelAction = UIAlertAction(title:\
  \ \"Cancel\", style: .default, handler: { action -> Void in\n        // Do nothing\n\
  \    })\n    alert.addAction(okAction)\n    alert.addAction(cancelAction)\n    self.present(alert,\
  \ animated: true, completion: nil)\n}\n```\n\n`displayAlert`函数接受一个整数，该整数代表一个索引位置值，用于标识`petArray`中当前选中的项目。然后它会显示一个警告控制器，其中包含一个文本字段和两个标记为“OK”和“Cancel”的按钮。\n\
  \n如果用户点击“Cancel”按钮，则不会发生任何操作，警告控制器消失。如果用户点击“OK”按钮，则警告控制器获取文本字段中的内容，并将其插入到`petArray`中。然后，它会重新加载整个表格视图以显示修改后的数组内容。\n\
  \n22. 在上一个函数下方，添加以下函数以在用户滑动表格视图行时显示两个按钮：\n\n```\nfunc tableView(_ tableView: UITableView,\
  \ editActionsForRowAt indexPath: IndexPath) -> [UITableViewRowAction]? {\n    let\
  \ addAction = UITableViewRowAction(style: UITableViewRowAction.Style.normal, title:\
  \ \"Add\", handler: {(action: UITableViewRowAction, indexPath: IndexPath) in\n \
  \       self.displayAlert(location: indexPath.row)\n    })\n    let deleteAction\
  \ = UITableViewRowAction(style: UITableViewRowAction.Style.destructive, title: \"\
  Delete\", handler: {(action: UITableViewRowAction, indexPath: IndexPath) in\n  \
  \      self.petArray.remove(at: indexPath.row)\n        tableView.deleteRows(at:\
  \ [indexPath], with: UITableView.RowAnimation.fade)\n    })\n    return [deleteAction,\
  \ addAction]\n}\n```\n\n`addAction`行定义了一个使用`.normal`样式（显示为灰色按钮）的“Add”按钮。点击“Add”按钮会运行`displayAlert`函数，并传递表格视图中选中项目的当前索引值。\n\
  \n`deleteAction`行定义了一个“Delete”按钮，它从`petArray`和表格视图中移除选中的项目。\n\n整个`ViewController.swift`文件应如下所示：\n\
