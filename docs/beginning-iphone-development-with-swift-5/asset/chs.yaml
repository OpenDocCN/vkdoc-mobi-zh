  \n目前示例中的表格只是将数据列为无尽的行，这被称为普通表格样式。为了帮助组织表格视图中显示的数据，您可以创建分组表格样式，将数据划分为多个分区，每个分区都有一个标题，如图\
  \ 14-10 所示。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig10_HTML.jpg](img/329781_5_En_14_Fig10_HTML.jpg)\n\
  \n图 14-10：分组表格将数据划分为带有标题的分区\n\n创建分组表格需要额外的步骤：\n\n-   将表格视图定义为分组样式。\n-   编写一个 `numberOfSections`\
  \ 函数，定义表格视图包含多少个分区。\n-   编写一个 `numberOfRowsInSection` 函数，定义每个分区中有多少行。\n-   编写一个\
  \ `titleForHeaderInSection` 函数，定义每个分区显示的标题。\n\n为了定义分区，数据必须以不同的方式排列。在前面的例子中，我们只有一个字符串数组。但是要在分区中显示数据，我们需要一个数组的数组。每个字符串数组代表一个不同的分区，例如：\n\
  \n```swift\nlet petArray = [[\"Mammal\", \"cat\", \"dog\", \"hamster\", \"gerbil\"\
  , \"rabbit\"], [\"Bird\", \"parakeet\", \"parrot\", \"canary\", \"finch\"], [\"\
  Fish\", \"tropical fish\", \"goldfish\", \"sea horses\"], [\"Reptile\", \"turtle\"\
  , \"snake\", \"lizard\"]]\n```\n\n上面的数组包含四个字符串数组，其中每个数组的第一项定义了该分区的标题。因此，第一个数组的标题是“Mammal”，第二个数组的标题是“Bird”，第三个数组的标题是“Fish”，第四个数组的标题是“Reptile”。\n\
  \n在确定每个分区中的行数时，我们需要减去 1，因为分区标题出现在每个数组的开头。因此，`numberOfRowsInSection` 函数会减去 1 来准确计算每个分区中的行数，如下所示：\n\
  \n```swift\nfunc tableView(_ tableView: UITableView, numberOfRowsInSection section:\
  \ Int) -> Int {\n    return petArray[section].count - 1\n}\n```\n\n在表格视图中显示数据涉及识别分区和行。但是，由于每个数组的第一个元素包含分区标题，我们需要通过在数组索引上加\
  \ 1 来跳过这个标题，就像 `cellForRowAt` 函数中的这一行代码：\n\n```swift\ncell?.textLabel?.text = petArray[indexPath.section][indexPath.row\
  \ + 1]\n```\n\n此外，我们需要使用 `didSelectRowAt` 函数中的以下代码来识别用户点击的项目：\n\n```swift\nlet selectedItem\
  \ = petArray[indexPath.section][indexPath.row + 1]\n```\n\n识别分区数量只需统计 `petArray`\
  \ 中所有元素（数组）的数量，如下所示：\n\n```swift\nfunc numberOfSections(in tableView: UITableView)\
  \ -> Int {\n    return petArray.count\n}\n```\n\n为了显示标题，我们需要从每个分区中检索第一个元素，如下所示：\n\
  \n```swift\nfunc tableView(_ tableView: UITableView, titleForHeaderInSection section:\
  \ Int) -> String? {\n    return petArray[section][0]\n}\n```\n\n要了解如何创建分组表格，请按照以下步骤操作：\n\
  \n1.  使用单视图应用模板创建一个新的 iOS 项目（见第 1 章），并将此新项目命名为 `GroupTableViewApp`。这将为用户界面创建一个单独的视图。\n\
  2.  在导航窗格中点击 `Main.storyboard` 文件。Xcode 会显示单个视图。\n3.  点击库图标以打开对象库窗口。\n4.  将表格视图（见图\
  \ 14-2）拖放到视图的任意位置。\n5.  调整表格视图的大小，使其填满整个屏幕。\n6.  选择编辑器 ➤ 解析自动布局问题 ➤ 重置为建议的约束。Xcode\
  \ 会向表格视图添加约束（见图 14-3）。\n7.  选择视图 ➤ 检查器 ➤ 显示属性检查器，或点击 Xcode 窗口右上角的属性检查器图标。\n\n\n\
  ```markdown\n8.  点击`Style`弹出菜单，选择`Grouped`，如图 14-11 所示。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig11_HTML.jpg](img/329781_5_En_14_Fig11_HTML.jpg)\n\
  \n*图 14-11* 将表视图定义为分组表\n\n9.  选择`View` ➤ `Assistant Editor` ➤ `Show Assistant Editor`，或点击\
  \ Xcode 窗口右上角的`Assistant Editor`图标。\n\n10. 将鼠标指针移到表视图上，按住`Control`键，在`ViewController.swift`文件的`class\
  \ ViewController`行下方进行`Ctrl`-拖拽。\n\n11. 松开`Control`键和鼠标左键。出现一个弹出窗口。\n\n12. 点击`Name`文本字段，输入`petTable`，然后点击`Connect`按钮。Xcode\
  \ 会创建一个`IBOutlet`，如下所示：\n\n```swift\n@IBOutlet var petTable: UITableView!\n```\n\
  \n1.  选择`View` ➤ `Standard Editor` ➤ `Show Standard Editor`，或点击 Xcode 窗口右上角的`Standard\
  \ Editor`图标。\n\n2.  在导航窗格中点击`ViewController.swift`文件。\n\n3.  添加`UITableViewDelegate`和`UITableViewDataSource`，修改`class\
  \ ViewController`行，如下所示：\n\n```swift\nclass ViewController: UIViewController, UITableViewDelegate,\
  \ UITableViewDataSource {\n```\n\n这段代码的目的是将`ViewController.swift`文件标识为表视图的委托和数据源。\n\
  \n4.  在`class ViewController`行下方，添加以下数组：\n\n```swift\nlet petArray = [[\"Mammal\"\
  , \"cat\", \"dog\", \"hamster\", \"gerbil\", \"rabbit\"], [\"Bird\", \"parakeet\"\
  , \"parrot\", \"canary\", \"finch\"], [\"Fish\", \"tropical fish\", \"goldfish\"\
  , \"sea horses\"], [\"Reptile\", \"turtle\", \"snake\", \"lizard\"]]\n```\n\n5.\
  \  在此数组下方，添加以下行：\n\n```swift\nlet cellID = \"cellID\"\n```\n\n这段代码的目的是为单元格创建一个任意常量名。表视图由多行单元格组成，因此我们需要标识单元格，以便稍后存储数据。\n\
  \n6.  修改`viewDidLoad`方法，如下所示：\n\n```swift\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
  \    petTable.dataSource = self\n    petTable.delegate = self\n    // Do any additional\
  \ setup after loading the view, typically from a nib.\n}\n```\n\n这段代码的目的是定义表（`IBOutlet\
  \ petTable`）从其所在的`ViewController.swift`文件（`self`）获取数据。此外，委托也被定义为`ViewController.swift`文件（`self`）。这意味着`ViewController.swift`文件需要包含定义表需要多少行以及在哪里找到其数据（即`petArray`）的函数。\n\
  \n7.  在`viewDidLoad`方法下方，添加以下函数来计算每个分区中的行数：\n\n```swift\nfunc tableView(_ tableView:\
  \ UITableView, numberOfRowsInSection section: Int) -> Int {\n    return petArray[section].count\
  \ - 1\n}\n```\n\n8.  在上一个函数下方，添加以下函数来用数据填充表视图：\n\n```swift\nfunc tableView(_ tableView:\
  \ UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell {\n    var\
  \ cell = tableView.dequeueReusableCell(withIdentifier: cellID)\n    if (cell ==\
  \ nil) {\n        cell = UITableViewCell(\n            style: UITableViewCell.CellStyle.default,\n\
  \            reuseIdentifier: cellID)\n    }\n    cell?.textLabel?.text = petArray[indexPath.section][indexPath.row\
  \ + 1]\n    return cell!\n}\n```\n\n9.  在上一个函数下方，添加以下函数来标识用户选择了哪个项目：\n\n```swift\n\
  func tableView(_ tableView: UITableView, didSelectRowAt indexPath: IndexPath) {\n\
  \    let selectedItem = petArray[indexPath.section][indexPath.row + 1]\n    let\
  \ alert = UIAlertController(title: \"Your Choice\", message: \"\\(selectedItem)\"\
  , preferredStyle: .alert)\n    let okAction = UIAlertAction(title: \"OK\", style:\
  \ .default, handler: { action -> Void in\n        //Just dismiss the action sheet\n\
  \    })\n    alert.addAction(okAction)\n    self.present(alert, animated: true,\
  \ completion: nil)\n}\n```\n\n10. 在上一个函数下方，添加以下函数来计算要在表视图中显示的分区数：\n\n```swift\n\
  func numberOfSections(in tableView: UITableView) -> Int {\n    return petArray.count\n\
  }\n```\n\n11. 在上一个函数下方，添加以下函数来将每个数组中的第一个项目显示为该分组的标题：\n\n```swift\nfunc tableView(_\
  \ tableView: UITableView, titleForHeaderInSection section: Int) -> String? {\n \
  \   return petArray[section][0]\n}\n```\n\n完整的`ViewController.swift`文件应如下所示：\n\n\
