  \ 文件。\n13. 在导航器面板中点击 `Main.storyboard` 文件，然后点击你刚刚添加到故事板的视图控制器顶部的“视图控制器”图标。\n14.\
  \ 选择“视图”➤“检查器”➤“显示身份检查器”，或点击 Xcode 窗口右上角的“身份检查器”图标。\n15. 在“类”弹出菜单中点击，并选择 `SecondViewController`。\n\
