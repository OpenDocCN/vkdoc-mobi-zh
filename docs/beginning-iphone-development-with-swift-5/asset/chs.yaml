  \n```\n@IBOutlet var topImageView: UIImageView!\n```\n\n11. 选择 **View ➤ Standard\
  \ Editor ➤ Show Standard Editor**，或点击 Xcode 窗口右上角的 Standard Editor 图标。\n\n12. 点击导航器面板中的\
  \ `ViewController.swift` 文件。\n\n13. 在 `IBOutlet` 下方添加以下代码行：\n\n```\nvar rotateMe:\
  \ UIRotationGestureRecognizer?\n```\n\n这定义了一个代表旋转手势的全局变量。\n\n14. 编辑 `viewDidLoad`\
  \ 方法，如下所示：\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    topImageView.isUserInteractionEnabled\
  \ = true\n    topImageView.backgroundColor = UIColor.green\n    let rotationGesture\
  \ = UIRotationGestureRecognizer(target: self, action: #selector(handleRotation))\n\
  \    topImageView.addGestureRecognizer(rotationGesture)\n    rotateMe = rotationGesture\n\
  \    // Do any additional setup after loading the view, typically from a nib.\n\
  }\n```\n\n此代码开启了图像视图的 User Interaction Enabled 设置，并将其背景颜色定义为绿色以使其可见。接着，它定义了一个旋转手势识别器（而不是从对象库窗口中拖放一个\
  \ Rotation Gesture Recognizer），定义了一个名为 `handleRotation` 的函数来响应旋转手势，并将该旋转手势链接到图像视图，以便旋转只影响图像视图。最后，它将旋转手势识别器赋值给\
  \ `rotateMe` 变量。\n\n15. 在 `viewDidLoad` 方法下方添加以下函数：\n\n```\n@objc func handleRotation()\
  \ {\n    topImageView.transform = CGAffineTransform(rotationAngle: rotateMe!.rotation)\n\
  }\n```\n\n完整的 `ViewController.swift` 文件应如下所示：\n\n```\nimport UIKit\nclass ViewController:\
  \ UIViewController {\n    @IBOutlet var topImageView: UIImageView!\n    var rotateMe:\
  \ UIRotationGestureRecognizer?\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
  \        topImageView.isUserInteractionEnabled = true\n        topImageView.backgroundColor\
  \ = UIColor.green\n        let rotationGesture = UIRotationGestureRecognizer(target:\
  \ self, action: #selector(handleRotation))\n        topImageView.addGestureRecognizer(rotationGesture)\n\
  \        rotateMe = rotationGesture\n        // Do any additional setup after loading\
  \ the view, typically from a nib.\n    }\n    @objc func handleRotation() {\n  \
  \      topImageView.transform = CGAffineTransform(rotationAngle: rotateMe!.rotation)\n\
  \    }\n}\n```\n\n16. 点击 Run 按钮或选择 **Product ➤ Run**。模拟器窗口将出现。要模拟捏合手势，您需要使用鼠标并按住\
  \ Option 键。\n\n17. 将鼠标指针移到图像视图上，然后按住 Option 键。两个灰色圆点会出现在屏幕上，模拟两个手指的指尖（见图 11-11）。\n\
  \n18. 按住鼠标左键和 Option 键，然后以圆周运动拖动鼠标，模拟旋转手势。请注意，随着旋转手势的旋转，图像视图也会随之旋转。\n\n19. 选择 **Simulator\
  \ ➤ Quit Simulator** 返回 Xcode。\n\n\n\n### 检测平移手势\n\n当用户将手指按在屏幕上并保持按下状态进行移动时，即触发平移手势。这种操作类似于在\
  \ Macintosh 电脑上拖动鼠标，你可以定义触发平移手势所需的最小和最大手指数量，例如至少两根手指但不超过四根。\n\n平移手势会追踪**速度**和**位移**两个参数：速度用于衡量平移的快慢，而位移则衡量手指移动的距离。\n\
  \n要了解如何使用平移手势，请按照以下步骤操作：\n\n1.  使用单视图应用模板创建一个新的 iOS 项目（参见第 1 章），并将新项目命名为 `PanApp`。这将为用户界面创建一个单视图。\n\
  \n2.  在导航面板中点击 `Main.storyboard` 文件，Xcode 将显示该单视图。\n\n3.  点击库图标以打开对象库窗口，并找到如图 11-13\
  \ 所示的平移手势识别器。\n\n    ![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig13_HTML.jpg](img/329781_5_En_11_Fig13_HTML.jpg)\n\
  \n    图 11-13\n\n    对象库窗口中的平移手势识别器\n\n4.  将平移手势识别器拖放到视图上。Xcode 会在文档大纲中和视图控制器上方显示该手势识别器。\n\
  \n5.  点击库图标打开对象库窗口，将一个图像视图拖放到用户界面的中心位置。\n\n6.  选择“视图” ➤ “检查器” ➤ “显示属性检查器”，或点击 Xcode\
  \ 窗口右上角的属性检查器图标。\n\n7.  点击“背景”弹出菜单，选择一种颜色，例如绿色或蓝色。这将使你在模拟器中运行应用时更容易找到该图像视图。如果没有设置背景色，图像视图默认的白色背景会与视图的白色背景融为一体。\n\
  \n8.  勾选“启用用户交互”复选框。这允许图像视图响应用户操作。\n\n9.  点击 Xcode 中间面板底部的“对齐”图标。将出现一个窗口。\n\n10.\
  \ 勾选“水平居中在容器中”和“垂直居中在容器中”复选框，然后点击“添加 2 个约束”按钮（见图 11-10）。图像视图需要居中放置，以便在模拟器中更容易模拟捏合手势。\n\
  \n11. 选择“编辑器” ➤ “解决自动布局问题” ➤ 在子菜单的上半部分点击“添加缺少的约束”。Xcode 会为图像视图添加额外的约束。\n\n12. 将鼠标指针移到图像视图上，按住\
  \ Control 键，然后从图像视图向文档大纲或视图控制器顶部的平移手势识别器图标进行 Ctrl-拖拽。\n\n13. 松开 Control 键和鼠标左键。会出现一个窗口。\n\
  \n14. 选择 `gestureRecognizers`。这个连接可以让图像视图检测平移手势。\n\n15. 选择“视图” ➤ “辅助编辑器” ➤ “显示辅助编辑器”，或点击辅助编辑器图标。Xcode\
  \ 会并排显示 `Main.storyboard` 和 `ViewController.swift` 文件。\n\n16. 将鼠标指针移到图像视图上，按住 Control\
  \ 键，然后从图像视图向 `ViewController.swift` 文件中 `class ViewController` 行下方进行 Ctrl-拖拽。\n\n\
  17. 松开 Control 键和鼠标左键。会弹出一个窗口。\n\n18. 点击“名称 (Name)”文本字段，输入 `topImageView`，然后点击“连接\
  \ (Connect)”按钮。Xcode 会创建一个如下所示的 IBOutlet 变量：\n\n    ```swift\n    @IBOutlet var\
  \ topImageView: UIImageView!\n    ```\n\n19. 在 IBOutlet 下方添加以下两行代码：\n\n    ```swift\n\
  \    var xOrigin:CGFloat = 0\n    var yOrigin:CGFloat = 0\n    ```\n\n    请注意，这两个变量被定义为\
  \ `CGFloat` 数据类型，该类型用于测量距离。如果没有显式将两个变量定义为 `CGFloat`，Xcode 会假定这两个变量仅用于存储整数。\n\n20.\
  \ 按如下方式编辑 `viewDidLoad` 方法：\n\n\n```swift\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
  \    xOrigin = topImageView.center.x\n    yOrigin = topImageView.center.y\n    //\
  \ 视图加载完成后进行额外的设置，通常从 nib 文件加载\n}\n```\n\n21. 将鼠标指针移到文档大纲或视图控制器顶部的“平移手势识别器”图标上，按住\
  \ Control 键，从该平移手势识别器按住 Ctrl 键拖拽到 `ViewController.swift` 文件中最后一个花括号的上方。\n22. 松开\
  \ Control 键和鼠标左键。此时会弹出一个窗口。\n23. 点击“名称”文本字段，输入 `panDetected`，点击“类型”弹出菜单并选择 `UIPanGestureRecognizer`，然后点击“连接”按钮。Xcode\
  \ 会创建一个 IBAction 方法。\n24. 按如下方式编辑 `panDetected` IBAction 方法：\n\n```swift\n@IBAction\
  \ func panDetected(_ sender: UIPanGestureRecognizer) {\n    let translation = sender.translation(in:\
  \ view)\n    topImageView.center = CGPoint(x: xOrigin + translation.x, y: yOrigin\
  \ + translation.y)\n}\n```\n\n`panDetected` IBAction 方法捕获了用户指尖移动的平移距离。然后将这些距离累加到图像视图的中心点上。完整的\
  \ `ViewController.swift` 文件应如下所示：\n\n```swift\nimport UIKit\nclass ViewController:\
  \ UIViewController {\n    @IBOutlet var topImageView: UIImageView!\n    var xOrigin:CGFloat\
  \ = 0\n    var yOrigin:CGFloat = 0\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
  \        xOrigin = topImageView.center.x\n        yOrigin = topImageView.center.y\n\
  \        // 视图加载完成后进行额外的设置，通常从 nib 文件加载\n    }\n    @IBAction func panDetected(_\
  \ sender: UIPanGestureRecognizer) {\n        let translation = sender.translation(in:\
  \ view)\n        topImageView.center = CGPoint(x: xOrigin + translation.x, y: yOrigin\
  \ + translation.y)\n    }\n}\n```\n\n25. 选择“视图”➤“标准编辑器”➤“显示标准编辑器”，或点击 Xcode 窗口右上角的“标准编辑器”图标。\n\
  26. 点击“运行”按钮，或选择“产品”➤“运行”。此时会显示模拟器窗口。\n27. 按住鼠标左键并移动鼠标来模拟平移手势。注意，当平移手势变化时，图像视图也会随之移动。\n\
  28. 选择“模拟器”➤“退出模拟器”返回 Xcode。\n\n这个示例通过从对象库拖拽“平移手势识别器”来可视化地定义平移手势。现在让我们看看如何仅通过 Swift\
  \ 代码来重复此过程。\n\n1. 使用“单视图应用”模板创建一个新的 iOS 项目（参见第 1 章），并将这个新项目命名为 `PanCodeApp`。这会为用户界面创建一个单一的视图。\n\
  2. 在导航窗格中点击 `Main.storyboard` 文件。Xcode 会显示这个单视图。\n3. 点击“库”图标打开对象库窗口，将一个图像视图拖放至用户界面的中央。\n\
  4. 点击 Xcode 中间窗格底部的“对齐”图标。此时会弹出一个窗口。\n5. 勾选“在容器中水平居中”和“在容器中垂直居中”复选框，然后点击“添加 2 个约束”按钮（见图\
  \ 11-10）。图像视图需要位于中心，以便在模拟器中轻松模拟捏合手势。\n6. 选择“编辑器”➤“解决自动布局问题”➤ 在子菜单的上半部分选择“添加缺失的约束”。Xcode\
  \ 会为图像视图添加额外的约束。\n7. 选择“视图”➤“助理编辑器”➤“显示助理编辑器”，或点击“助理编辑器”图标。Xcode 会并排显示 `Main.storyboard`\
  \ 和 `ViewController.swift` 文件。\n8. 将鼠标指针移到图像视图上，按住 Control 键，从图像视图按住 Ctrl 键拖拽到 `class\
  \ ViewController` 行下方的 `ViewController.swift` 文件中。\n9. 松开 Control 键和鼠标左键。此时会弹出一个窗口。\n\
  10. 点击“名称”文本字段，输入 `topImageView`，然后点击“连接”按钮。Xcode 会创建一个 IBOutlet 变量，如下所示：\n\n```swift\n\
  @IBOutlet var topImageView: UIImageView!\n```\n\n1. 选择“视图”➤“标准编辑器”➤“显示标准编辑器”，或点击\
  \ Xcode 窗口右上角的“标准编辑器”图标。\n2. 在导航窗格中点击 `ViewController.swift` 文件。\n3. 在 IBOutlet\
  \ 下方添加以下几行代码：\n\n```swift\nvar panMe: UIPanGestureRecognizer?\nvar xOrigin:CGFloat\
  \ = 0\nvar yOrigin:CGFloat = 0\n```\n\n这定义了一个表示旋转手势的全局变量，同时定义了两个 `CGFloat` 变量。\n\
  \n4. 按如下方式编辑 `viewDidLoad` 方法：\n\n```swift\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
  \    xOrigin = topImageView.center.x\n    yOrigin = topImageView.center.y\n    topImageView.isUserInteractionEnabled\
  \ = true\n    topImageView.backgroundColor = UIColor.green\n    let panGesture =\
  \ UIPanGestureRecognizer(target: self, action: #selector(handlePan))\n    topImageView.addGestureRecognizer(panGesture)\n\
  \    panMe = panGesture\n    // 视图加载完成后进行额外的设置，通常从 nib 文件加载\n}\n```\n\n这段代码将图像视图的中心点坐标存储到\
  \ `xOrigin` 和 `yOrigin` 变量中。然后启用了图像视图的“用户交互已启用”设置，并将其背景色定义为绿色以便可见。接着，它定义了一个平移手势识别器（而不是从对象库窗口拖放一个平移手势识别器），定义了一个名为\
  \ `handlePan` 的函数来响应平移手势，并将该平移手势链接到图像视图上，使得平移操作仅影响该图像视图。最后，它将平移手势识别器赋值给 `panMe`\
  \ 变量。\n\n5. 在 `viewDidLoad` 方法下方添加以下函数：\n\n```swift\n@objc func handleRotation()\
  \ {\n    topImageView.transform = CGAffineTransform(rotationAngle: rotateMe!.rotation)\n\
  }\n```\n\n完整的 `ViewController.swift` 文件应如下所示：\n\n```swift\nimport UIKit\nclass ViewController:\
  \ UIViewController {\n    @IBOutlet var topImageView: UIImageView!\n    var rotateMe:\
  \ UIRotationGestureRecognizer?\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
  \        topImageView.isUserInteractionEnabled = true\n        topImageView.backgroundColor\
  \ = UIColor.green\n        let rotationGesture = UIRotationGestureRecognizer(target:\
  \ self, action: #selector(handleRotation))\n        topImageView.addGestureRecognizer(rotationGesture)\n\
  \        rotateMe = rotationGesture\n        // 视图加载完成后进行额外的设置，通常从 nib 文件加载\n  \
  \  }\n    @objc func handleRotation() {\n        topImageView.transform = CGAffineTransform(rotationAngle:\
  \ rotateMe!.rotation)\n    }\n}\n```\n\n6. 点击“运行”按钮，或选择“产品”➤“运行”。此时会显示模拟器窗口。\n7.\
  \ 按住鼠标左键并拖动鼠标来模拟平移手势。注意，当平移手势移动时，图像视图也会随之移动。\n8. 选择“模拟器”➤“退出模拟器”返回 Xcode。\n\n\n\
  ## 检测屏幕边缘滑动手势\n\n应用可以检测的一种独特手势称为屏幕边缘滑动。当用户从屏幕的上、下、左、右边缘滑动指尖时，就会触发此手势。默认情况下，iOS 使用上边缘滑动来显示通知，使用下边缘滑动来显示控制中心。如果你希望自己的应用检测上边缘或下边缘滑动，则需要覆盖\
  \ iOS 的这些默认边缘滑动。\n\n在创建屏幕边缘滑动手势时，你需要为每个要检测的边缘单独创建一个屏幕边缘滑动手势识别器。因此，如果你希望应用检测下边缘和左边缘滑动，就需要创建两个独立的手势识别器：一个用于检测下边缘滑动，另一个用于检测左边缘滑动。\n\
  \n要了解如何使用屏幕边缘滑动手势，请按照以下步骤操作：\n\n1.  使用“单视图应用”模板（参见第 1 章）创建一个新的 iOS 项目，并将该项目命名为 `EdgePanApp`。这将为用户界面创建一个单一视图。\n\
  \n2.  在导航窗格中点击 `Main.storyboard` 文件。Xcode 会显示该单一视图。\n\n3.  点击“库”图标打开“对象库”窗口，并找到如图\
  \ 11-14 所示的“屏幕边缘滑动手势识别器”。\n\n    ![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig14_HTML.jpg](img/329781_5_En_11_Fig14_HTML.jpg)\n\
  \n    **图 11-14** 对象库窗口中的屏幕边缘滑动手势识别器\n\n4.  将“屏幕边缘滑动手势识别器”拖放到视图上。Xcode 会在文档大纲中以及视图控制器上方显示该识别器。\n\
  \n5.  选择“视图”➤“检查器”➤“显示属性检查器”，或点击 Xcode 窗口右上角的“属性检查器”图标。此时会显示如图 11-15 所示的属性检查器窗格。\n\
  \n    ![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig15_HTML.jpg](img/329781_5_En_11_Fig15_HTML.jpg)\n\
  \n    **图 11-15** 屏幕边缘滑动手势识别器的属性检查器窗格\n\n6.  选中“底部”复选框，以识别屏幕下边缘的滑动手势。\n\n    **注意：**\
  \ 尽管看起来你可以选择两个或更多复选框，但实际上你只能选择一个复选框来定义一个屏幕边缘。\n\n7.  选择“视图”➤“辅助编辑器”➤“显示辅助编辑器”，或点击“辅助编辑器”图标。Xcode\
  \ 会并排显示 `Main.storyboard` 和 `ViewController.swift` 文件。\n\n8.  将鼠标指针移动到视图控制器顶部或文档大纲中的“屏幕边缘滑动手势识别器”上，按住\
  \ Control 键，然后将其 Control-拖拽到 `ViewController.swift` 文件底部最后一个花括号的上方。\n\n9.  松开 Control\
  \ 键和鼠标左键。此时会弹出一个窗口。\n\n10. 在“名称”文本框中点击，输入 `bottomEdgeDetected`，在“类型”弹出菜单中选择 `UIScreenEdgePanGestureRecognizer`，然后点击“连接”按钮。\n\
  \n11. 如下所示编辑这个 `bottomEdgeDetected` IBAction 方法：\n\n    ```swift\n    @IBAction\
  \ func bottomEdgeDetected(_ sender: UIScreenEdgePanGestureRecognizer) {\n      \
  \  print (\"检测到下滑动手势\")\n    }\n    ```\n\n12. 在文档大纲中点击“屏幕边缘滑动手势识别器”，然后按回车键。Xcode\
  \ 会高亮显示整个名称。\n\n13. 输入 `下滑动手势` 并按回车键，重新命名你的手势识别器。\n\n14. 在 `viewDidLoad` 方法下方添加以下方法：\n\
  \n    ```swift\n    override var preferredScreenEdgesDeferringSystemGestures: UIRectEdge\
  \ {\n        return UIRectEdge.bottom\n    }\n    ```\n\n    此方法会覆盖 iOS 的默认行为（即当用户从屏幕下边缘向上滑动时显示控制中心）。如果你只想检测左边缘或右边缘的滑动手势，则不需要上述代码。\n\
  \n15. 在导航窗格中点击 `Main.storyboard` 文件。\n\n16. 点击“库”图标打开“对象库”窗口。\n\n17. 将另一个“屏幕边缘滑动手势识别器”拖放到视图上。Xcode\
  \ 会在文档大纲中以及视图控制器上方显示第二个识别器。\n\n18. 在文档大纲中点击该“屏幕边缘滑动手势识别器”，按回车键高亮显示整个名称。然后输入 `左边缘手势`\
  \ 并按回车键。\n\n19. 在文档大纲中点击这个“左边缘手势”，选择“视图”➤“检查器”➤“显示属性检查器”，或点击 Xcode 窗口右上角的“属性检查器”图标。\n\
  \n20. 选中“左侧”复选框，将其定义为检测屏幕左边缘的滑动手势。\n\n21. 将鼠标指针移动到文档大纲中的“左边缘手势”上，按住 Control 键，然后将其\
  \ Control-拖拽到 `ViewController.swift` 文件底部最后一个花括号的上方。\n\n22. 松开 Control 键和鼠标左键。此时会弹出一个窗口。\n\
  \n23. 在“名称”文本框中点击，输入 `leftEdgeDetected`，在“类型”弹出菜单中选择 `UIScreenEdgePanGestureRecognizer`，然后点击“连接”按钮。\n\
  \n24. 如下所示编辑这个 `leftEdgeDetected` IBAction 方法：\n\n    ```swift\n    @IBAction func\
  \ leftEdgeDetected(_ sender: UIScreenEdgePanGestureRecognizer) {\n        print\
  \ (\"检测到左滑动手势\")\n    }\n    ```\n\n25. 点击“运行”按钮，或选择“产品”➤“运行”。模拟器窗口会显示。\n\n26. 将鼠标指针移动到视图底部边缘稍下方，按住鼠标左键，然后向上拖拽。注意，Xcode\
  \ 窗口的调试区域会显示多行“检测到下滑动手势”，表明应用已识别到屏幕下边缘的滑动手势。\n\n27. 将鼠标指针移动到视图左侧边缘稍左，按住鼠标左键，然后向右拖拽。注意，Xcode\
  \ 窗口的调试区域会显示多行“检测到左滑动手势”，表明应用已识别到屏幕左边缘的滑动手势。\n\n28. 选择“模拟器”➤“退出模拟器”返回 Xcode。\n\n\
  此示例通过从对象库拖拽“屏幕边缘滑动手势识别器”直观地定义了屏幕边缘滑动手势。现在让我们看看如何仅通过 Swift 代码来复制此过程。\n\n1.  使用“单视图应用”模板（参见第\
  \ 1 章）创建一个新的 iOS 项目，并将该项目命名为 `EdgePanCodeApp`。这将为用户界面创建一个单一视图。\n\n2.  在导航窗格中点击 `Main.storyboard`\
  \ 文件。\n\n3.  选择“视图”➤“辅助编辑器”➤“显示辅助编辑器”，或点击“辅助编辑器”图标。Xcode 会并排显示 `Main.storyboard`\
  \ 和 `ViewController.swift` 文件。\n\n4.  将鼠标指针移动到视图（模拟 iOS 设备的整个屏幕）上，按住 Control 键，然后将其\
  \ Control-拖拽到 `ViewController.swift` 文件中的 `class ViewController` 行下方。\n\n5.  松开\
  \ Control 键和鼠标左键。此时会弹出一个窗口。\n\n6.  在“名称”文本框中点击，输入 `myView`，然后点击“连接”按钮。Xcode 会创建一个\
  \ `IBOutlet`，如下所示：\n\n    ```swift\n    @IBOutlet var myView: UIView!\n    ```\n\
  \n7.  选择“视图”➤“标准编辑器”➤“显示标准编辑器”，或点击“标准编辑器”图标。\n\n8.  在导航窗格中点击 `ViewController.swift`\
  \ 文件。\n\n9.  如下所示修改 `viewDidLoad` 方法：\n\n    ```swift\n    override func viewDidLoad()\
  \ {\n        super.viewDidLoad()\n        let bottomEdgeGesture = UIScreenEdgePanGestureRecognizer(target:\
  \ self, action: #selector(handleBottomEdge))\n        myView.addGestureRecognizer(bottomEdgeGesture)\n\
  \        bottomEdgeGesture.edges = .bottom\n        let leftEdgeGesture = UIScreenEdgePanGestureRecognizer(target:\
  \ self, action: #selector(handleLeftEdge))\n        myView.addGestureRecognizer(leftEdgeGesture)\n\
  \        leftEdgeGesture.edges = .left\n        // 在此处添加任何额外的视图加载后设置，通常来自于 nib 文件。\n\
  \    }\n    ```\n\n\n\n这段代码创建了两个屏幕边缘平移手势识别器，分别命名为 `bottomEdgeGesture` 和 `leftEdgeGesture`。接着，它将这两个手势都关联到视图（`myView`）上，并设定\
  \ `bottomEdgeGesture` 识别屏幕底部边缘的平移操作，`leftEdgeGesture` 识别屏幕左侧边缘的平移操作。\n\n最后，它调用了名为\
  \ `handleBottomEdge` 和 `handleLeftEdge` 的两个函数，来响应各自的屏幕边缘平移手势。\n\n10. 在 `viewDidLoad`\
  \ 方法下方添加以下代码：\n\n```swift\noverride var preferredScreenEdgesDeferringSystemGestures:\
  \ UIRectEdge {\nreturn UIRectEdge.bottom\n}\n@objc func handleBottomEdge() {\nprint\
  \ (\"底部边缘平移手势\")\n}\n@objc func handleLeftEdge() {\nprint (\"左侧边缘平移手势\")\n}\n```\n\
  \n11. 点击“运行”按钮，或者选择 **Product** ➤ **Run**。模拟器窗口将会出现。\n\n12. 将鼠标指针移动到视图底部正下方，按住鼠标左键，并向上拖动鼠标。注意，Xcode\
  \ 窗口中的调试区域会显示多行 \"底部边缘平移手势\"，表明应用已识别到屏幕底部边缘的平移手势。\n\n13. 将鼠标指针移动到视图左侧，按住鼠标左键，并向右拖动鼠标。注意，Xcode\
  \ 窗口中的调试区域会显示多行 \"左侧边缘平移手势\"，表明应用已识别到屏幕左侧边缘的平移手势。\n\n14. 选择 **Simulator** ➤ **Quit\
  \ Simulator** 返回 Xcode。\n\n## 检测轻扫手势\n\n当用户在屏幕上沿四个方向（上、下、左、右）之一进行轻扫时，就会触发轻扫手势。你可以定义轻扫所需的手指数量，以及希望手势识别器检测的方向。\n\
  \n每个轻扫手势识别器只能检测单一方向的轻扫。这意味着，如果你想同时检测向上和向下的轻扫，你需要定义两个独立的轻扫手势识别器，其中一个只识别向上轻扫，另一个只识别向下轻扫。\n\
  \n要了解如何使用轻扫手势，请按照以下步骤操作：\n\n1. 使用“单视图应用”模板创建一个新的 iOS 项目（参见第 1 章），并将此新项目命名为 `SwipeApp`。这将为用户界面创建一个单一视图。\n\
  \n2. 在导航面板中点击 `Main.storyboard` 文件。Xcode 会显示该单一视图。\n\n3. 点击“库”图标以打开“对象库”窗口，并查找“平移手势识别器”，如图\
  \ 11-16 所示。\n\n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig16_HTML.jpg](img/329781_5_En_11_Fig16_HTML.jpg)\n\
  \n**图 11-16**  \n对象库窗口中的“轻扫手势识别器”\n\n4. 将“轻扫手势识别器”拖放到视图上。Xcode 会在“文档大纲”以及“视图控制器”上方显示该“轻扫手势识别器”。\n\
  \n5. 在“文档大纲”中点击“轻扫手势识别器”，然后按 **ENTER** 键。接着输入 **右侧轻扫手势** 并再次按 **ENTER** 键。\n\n6.\
  \ 将第二个“轻扫手势识别器”拖放到视图上。Xcode 会在“文档大纲”以及“视图控制器”上方显示该“轻扫手势识别器”。\n\n7. 在“文档大纲”中点击“轻扫手势识别器”，然后按\
  \ **ENTER** 键。接着输入 **向上轻扫手势** 并再次按 **ENTER** 键。\n\n8. 点击“库”图标以打开“对象库”窗口，然后将一个“图像视图”拖放到用户界面的中央位置。\n\
  \n9. 选择 **View** ➤ **Inspectors** ➤ **Show Attributes Inspector**，或者点击 Xcode 窗口右上角的“属性检查器”图标。\n\
  \n10. 点击“背景”弹出菜单，然后选择一种颜色，例如绿色或蓝色。这会使图像视图在模拟器中运行应用时容易被找到。如果没有背景色，图像视图默认的白色背景会与视图的白色背景融为一体。\n\
  \n11. 选中 **User Interaction Enabled**（用户交互已启用）复选框。这允许图像视图响应用户操作。\n\n12. 点击 Xcode\
  \ 中间窗格底部的“对齐”图标。将会出现一个窗口。\n\n13. 选中 **Horizontally in Container**（容器中水平居中）和 **Vertically\
  \ in Container**（容器中垂直居中）复选框，然后点击 **Add 2 Constraints**（添加 2 个约束）按钮（见图 11-10）。图像视图需要位于中央，以便在模拟器中更容易模拟捏合手势。\n\
  \n14. 选择 **Editor** ➤ **Resolve Auto Layout Issues** ➤ **Add Missing Constraints**（位于子菜单的上半部分）。Xcode\
  \ 会为图像视图添加额外的约束。\n\n15. 将鼠标指针移到图像视图上，按住 **Control** 键，然后从图像视图按住 Control 键拖拽到“文档大纲”或“视图控制器”顶部的\
  \ **Right Swipe Gesture**（右侧轻扫手势）图标上。\n\n16. 松开 **Control** 键和鼠标左键。将会出现一个窗口。\n\n\
  17. 选择 `gestureRecognizers`。此连接允许图像视图检测右侧轻扫手势。\n\n18. 将鼠标指针移到图像视图上，按住 **Control**\
  \ 键，然后从图像视图按住 Control 键拖拽到“文档大纲”或“视图控制器”顶部的 **Up Swipe Gesture**（向上轻扫手势）图标上。\n\n\
  19. 松开 **Control** 键和鼠标左键。将会出现一个窗口。\n\n20. 选择 `gestureRecognizers`。此连接允许图像视图检测向上轻扫手势。\n\
  \n21. 在“文档大纲”中点击 **Up Swipe Gesture**（向上轻扫手势），然后选择 **View** ➤ **Inspectors** ➤ **Show\
  \ Attributes Inspector**，或者点击 Xcode 窗口右上角的“属性检查器”图标。\n\n\n\n22. 在弹出的“滑动”菜单中点击，然后选择`向上`，如图\
  \ 11-17 所示。（默认情况下，除非另行定义，每个轻扫手势识别器只识别向右轻扫。）\n\n![图 11-17：为轻扫手势识别器选择要识别的轻扫方向](img/329781_5_En_11_Fig17_HTML.jpg)\n\
  \n23. 选择`视图` ➤ `助理编辑器` ➤ `显示助理编辑器`，或点击助理编辑器图标。Xcode 会并排显示`Main.storyboard`和`ViewController.swift`文件。\n\
  \n24. 将鼠标指针移到图像视图上，按住 Control 键，然后从图像视图拖拽到`class ViewController`行下方的`ViewController.swift`文件中。\n\
  \n25. 松开 Control 键和鼠标左键。此时会弹出一个窗口。\n\n26. 在“名称”文本字段中点击，输入`topImageView`，然后点击“连接”按钮。Xcode\
  \ 会创建一个`IBOutlet`变量，如下所示：\n\n```swift\n@IBOutlet var topImageView: UIImageView!\n\
  ```\n\n27. 将鼠标指针移到文档大纲或视图控制器顶部的“向右轻扫手势”图标上，按住 Control 键，然后从“向右轻扫手势”拖拽到`ViewController.swift`文件中最后一个花括号的上方。\n\
  \n28. 松开 Control 键和鼠标左键。此时会弹出一个窗口。\n\n29. 在“名称”文本字段中点击，输入`rightSwipeDetected`，在“类型”弹出菜单中点击并选择`UISwipeGestureRecognizer`，然后点击“连接”按钮。Xcode\
  \ 会创建一个`IBAction`方法。\n\n30. 按如下方式编辑`rightSwipeDetected` IBAction 方法：\n\n```swift\n\
  @IBAction func rightSwipeDetected(_ sender: UISwipeGestureRecognizer) {\n    topImageView.center\
  \ = CGPoint(x: topImageView.center.x + topImageView.frame.width, y: topImageView.center.y)\n\
  }\n```\n\n31. 将鼠标指针移到文档大纲或视图控制器顶部的“向上轻扫手势”图标上，按住 Control 键，然后从“向右轻扫手势”拖拽到`ViewController.swift`文件中最后一个花括号的上方。\n\
  \n32. 松开 Control 键和鼠标左键。此时会弹出一个窗口。\n\n33. 在“名称”文本字段中点击，输入`upSwipeDetected`，在“类型”弹出菜单中点击并选择`UISwipeGestureRecognizer`，然后点击“连接”按钮。Xcode\
  \ 会创建一个`IBAction`方法。\n\n34. 按如下方式编辑`upSwipeDetected` IBAction 方法：\n\n```swift\n\
  @IBAction func upSwipeDetected(_ sender: UISwipeGestureRecognizer) {\n    topImageView.center\
  \ = CGPoint(x: topImageView.center.x, y: topImageView.center.y - topImageView.frame.height)\n\
  }\n```\n\n**注意：** 注意这段代码对图像视图的中心进行了减法运算，这是因为对于 y 轴来说，由于原点位于视图的左上角，正值向下增加，向上则减少。\n\
  \n整个`ViewController.swift`文件应如下所示：\n\n```swift\nimport UIKit\nclass ViewController:\
  \ UIViewController {\n    @IBOutlet var topImageView: UIImageView!\n    override\
  \ func viewDidLoad() {\n        super.viewDidLoad()\n        // 加载视图后执行任何额外的设置，通常来自\
  \ nib 文件。\n    }\n    @IBAction func rightSwipeDetected(_ sender: UISwipeGestureRecognizer)\
  \ {\n        topImageView.center = CGPoint(x: topImageView.center.x + topImageView.frame.width,\
  \ y: topImageView.center.y)\n    }\n    @IBAction func upSwipeDetected(_ sender:\
  \ UISwipeGestureRecognizer) {\n        topImageView.center = CGPoint(x: topImageView.center.x,\
  \ y: topImageView.center.y - topImageView.frame.height)\n    }\n}\n```\n\n1.  点击“运行”按钮或选择`产品`\
  \ ➤ `运行`。模拟器窗口将出现。\n\n2.  将鼠标指针移到图像视图上，按住鼠标左键，向右移动鼠标，然后松开鼠标左键，模拟向右轻扫手势。注意图像视图会向右移动。\n\
  \n3.  将鼠标指针移到图像视图上，按住鼠标左键，向上移动鼠标，然后松开鼠标左键，模拟向上轻扫手势。注意图像视图会向上移动。\n\n4.  重复步骤 36 和\
  \ 37，直到图像视图从视野中消失。\n\n5.  选择`模拟器` ➤ `退出模拟器`以返回 Xcode。\n\n此示例通过从对象库拖拽“轻扫手势识别器”来直观地定义轻扫手势。现在让我们看看如何仅通过\
  \ Swift 代码来复制此过程。\n\n1.  使用“单视图应用”模板创建一个新的 iOS 项目（参见第 1 章），并将这个新项目命名为`SwipeCodeApp`。这会为用户界面创建一个单独的视图。\n\
  \n2.  在导航器面板中点击`Main.storyboard`文件。Xcode 会显示该单视图。\n\n3.  点击“库”图标打开对象库窗口，然后将一个图像视图拖放到用户界面的中央。\n\
  \n4.  点击 Xcode 中间面板底部的“对齐”图标。此时会弹出一个窗口。\n\n5.  选中“在容器中水平居中”和“在容器中垂直居中”复选框，然后点击“添加\
  \ 2 个约束”按钮（见图 11-10）。图像视图需要居中，以便于在模拟器中模拟捏合手势。\n\n6.  选择`编辑器` ➤ `解决自动布局问题` ➤ `添加缺失的约束`（位于子菜单的上半部分）。Xcode\
  \ 会为图像视图添加额外的约束。\n\n7.  选择`视图` ➤ `助理编辑器` ➤ `显示助理编辑器`，或点击助理编辑器图标。Xcode 会并排显示`Main.storyboard`和`ViewController.swift`文件。\n\
  \n8.  将鼠标指针移到图像视图上，按住 Control 键，然后从图像视图拖拽到`class ViewController`行下方的`ViewController.swift`文件中。\n\
  \n9.  松开 Control 键和鼠标左键。此时会弹出一个窗口。\n\n10. 在“名称”文本字段中点击，输入`topImageView`，然后点击“连接”按钮。Xcode\
  \ 会创建一个`IBOutlet`变量，如下所示：\n\n```swift\n@IBOutlet var topImageView: UIImageView!\n\
  ```\n\n11. 选择`视图` ➤ `标准编辑器` ➤ `显示标准编辑器`，或点击 Xcode 窗口右上角的标准编辑器图标。\n\n12. 在导航器面板中点击`ViewController.swift`文件。\n\
  \n13. 按如下方式编辑`viewDidLoad`方法：\n\n```swift\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
  \    topImageView.isUserInteractionEnabled = true\n    topImageView.backgroundColor\
  \ = UIColor.green\n    let downSwipeGesture = UISwipeGestureRecognizer(target: self,\
  \ action: #selector(handleDownSwipe))\n    topImageView.addGestureRecognizer(downSwipeGesture)\n\
  \    downSwipeGesture.direction = .down\n    let leftSwipeGesture = UISwipeGestureRecognizer(target:\
  \ self, action: #selector(handleLeftSwipe))\n    topImageView.addGestureRecognizer(leftSwipeGesture)\n\
  \    leftSwipeGesture.direction = .left\n    // 加载视图后执行任何额外的设置，通常来自 nib 文件。\n}\n\
  ```\n\n这段代码开启了图像视图的“允许用户交互”设置，并将其背景色定义为绿色以便可见。接着，它定义了两个轻扫手势识别器（而不是从对象库窗口拖放一个轻扫手势识别器），定义了名为`handleDownSwipe`和`handleLeftSwipe`的函数来响应这两个轻扫手势，并将轻扫手势链接到图像视图。此外，它还定义了每个轻扫手势可以识别的方向，例如向下和向左。\n\
  \n14. 在`viewDidLoad`方法下方添加以下函数：\n\n```swift\n@objc func handleDownSwipe() {\n  \
  \  topImageView.center = CGPoint(x: topImageView.center.x, y: topImageView.center.y\
  \ + topImageView.frame.height)\n}\n@objc func handleLeftSwipe() {\n    topImageView.center\
  \ = CGPoint(x: topImageView.center.x - topImageView.frame.width, y: topImageView.center.y)\n\
  }\n```\n\n整个`ViewController.swift`文件应如下所示。\n\n\n\n```\nimport UIKit\nclass ViewController:\
  \ UIViewController {\n    @IBOutlet var topImageView: UIImageView!\n    override\
  \ func viewDidLoad() {\n        super.viewDidLoad()\n        topImageView.isUserInteractionEnabled\
  \ = true\n        topImageView.backgroundColor = UIColor.green\n        let downSwipeGesture\
  \ = UISwipeGestureRecognizer(target: self, action: #selector(handleDownSwipe))\n\
  \        topImageView.addGestureRecognizer(downSwipeGesture)\n        downSwipeGesture.direction\
  \ = .down\n        let leftSwipeGesture = UISwipeGestureRecognizer(target: self,\
  \ action: #selector(handleLeftSwipe))\n        topImageView.addGestureRecognizer(leftSwipeGesture)\n\
  \        leftSwipeGesture.direction = .left\n        // 在这里进行视图加载后的额外设置，通常来自 nib\
  \ 文件\n    }\n    @objc func handleDownSwipe() {\n        topImageView.center = CGPoint(x:\
  \ topImageView.center.x, y: topImageView.center.y + topImageView.frame.height)\n\
  \    }\n    @objc func handleLeftSwipe() {\n        topImageView.center = CGPoint(x:\
  \ topImageView.center.x - topImageView.frame.width, y: topImageView.center.y)\n\
  \    }\n}\n```\n\n15. 点击 `Run` 按钮或选择 **Product ➤ Run**。模拟器窗口将出现。\n\n16. 将鼠标指针移动到图像视图上，按住鼠标左键，向左移动鼠标，然后松开鼠标左键，模拟左滑手势。注意图像视图会向左移动。\n\
  \n17. 将鼠标指针移动到图像视图上，按住鼠标左键，向下移动鼠标，然后松开鼠标左键，模拟下滑手势。注意图像视图会向下移动。\n\n18. 重复步骤 16 和\
  \ 17，直到图像视图移出视线。\n\n19. 选择 **Simulator ➤ Quit Simulator** 返回 Xcode。\n\n## 检测长按手势\n\
  \n当用户将一根或多根手指按在屏幕上固定一段时间，且手指没有大幅度移动时，便触发了长按手势。要定义长按手势，你可以修改以下属性：\n\n* `.minimumPressDuration`\
  \ – 定义一根或多根手指必须在屏幕上按压多久，长按手势才能被识别\n* `.numberOfTouchesRequired` – 定义必须有多少根手指按在屏幕上，长按手势才能被识别\n\
  * `.allowableMovement` – 定义在长按手势失败前，手指可以移动的最大距离\n\n要了解如何使用长按手势，请按照以下步骤操作：\n\n1.\
  \ 使用 **Single View App** 模板创建一个新的 iOS 项目（请参见第 1 章），并将此新项目命名为 `LongPressApp`。这将为用户界面创建一个单一视图。\n\
  \n2. 点击导航窗格中的 `Main.storyboard` 文件。Xcode 会显示该单一视图。\n\n3. 点击库图标打开对象库窗口，并查找 **Long\
  \ Press Gesture Recognizer**，如图 11-18 所示。\n\n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig18_HTML.jpg](img/329781_5_En_11_Fig18_HTML.jpg)\n\
  \n**图 11-18** — 对象库窗口中的长按手势识别器\n\n4. 将 **Long Press Gesture Recognizer** 拖放到视图上。Xcode\
  \ 会在文档大纲和视图控制器上方显示该长按手势识别器。\n\n5. 点击库图标打开对象库窗口，然后将一个图像视图拖放到用户界面上。\n\n6. 选择 **View\
  \ ➤ Inspectors ➤ Show Attributes Inspector**，或点击 Xcode 窗口右上角的 **Attributes Inspector**\
  \ 图标。\n\n7. 点击 **Background** 弹出菜单，选择绿色或蓝色等颜色。这会使你运行模拟器中的应用时，图像视图更容易被找到。如果没有设置背景颜色，图像视图默认的白色背景将与视图的白色背景融为一体。\n\
  \n8. 选中 **User Interaction Enabled** 复选框。这允许图像视图响应用户操作。\n\n9. 点击 Xcode 中间窗格底部的 **Align**\
  \ 图标。会弹出一个窗口。\n\n10. 选中 **Horizontally in Container** 和 **Vertically in Container**\
  \ 复选框，然后点击 **Add 2 Constraints** 按钮（见图 11-10）。图像视图需要居中放置，以便在模拟器中更容易模拟捏合手势。\n\n11.\
  \ 选择子菜单上半部分的 **Editor ➤ Resolve Auto Layout Issues ➤ Add Missing Constraints**。Xcode\
  \ 会为图像视图添加额外的约束。\n\n12. 将鼠标指针移动到图像视图上，按住 **Control** 键，从图像视图拖拽到文档大纲或视图控制器顶部的 **Long\
  \ Press Gesture Recognizer** 图标上。\n\n13. 松开 **Control** 键和鼠标左键。会弹出一个窗口。\n\n14. 选择\
  \ `gestureRecognizers`。这个链接能让图像视图检测长按手势。\n\n15. 选择 **View ➤ Assistant Editor ➤ Show\
  \ Assistant Editor**，或点击 **Assistant Editor** 图标。Xcode 会并排显示 `Main.storyboard` 和\
  \ `ViewController.swift` 文件。\n\n16. 将鼠标指针移动到图像视图上，按住 **Control** 键，从图像视图拖拽到 `ViewController.swift`\
  \ 文件中 `class ViewController` 行的下方。\n\n17. 松开 **Control** 键和鼠标左键。会弹出一个弹出窗口。\n\n18.\
  \ 点击 **Name** 文本字段，输入 `topImageView`，然后点击 **Connect** 按钮。Xcode 会创建如下所示的 `IBOutlet`\
  \ 变量：\n\n```\n@IBOutlet var topImageView: UIImageView!\n```\n\n19. 将鼠标指针移动到文档大纲或视图控制器顶部的\
  \ **Long Press Gesture Recognizer** 图标上，按住 **Control** 键，从 **Long Press Gesture\
  \ Recognizer** 拖拽到 `ViewController.swift` 文件中最后一个花括号的上方。\n\n\n\n20.  松开 `Control`\
  \ 键和鼠标左键。此时会出现一个弹出窗口。\n\n21.  点击 `Name` 文本字段，输入 `longPressDetected`，点击 `Type` 弹出菜单并选择\
  \ `UILongPressGestureRecognizer`，然后点击 `Connect` 按钮。Xcode 会创建一个 `IBAction` 方法。\n\n\
  22.  按如下方式编辑 `longPressDetected` `IBAction` 方法：\n\n```swift\n@IBAction func longPressDetected(_\
  \ sender: UILongPressGestureRecognizer) {\n    topImageView.backgroundColor = UIColor.red\n\
  }\n```\n\n当识别到长按手势时，`longPressDetected` `IBAction` 方法会将图像视图的背景颜色更改为红色。完整的 `ViewController.swift`\
  \ 文件应如下所示：\n\n```swift\nimport UIKit\nclass ViewController: UIViewController {\n\
  \    @IBOutlet var topImageView: UIImageView!\n    override func viewDidLoad() {\n\
  \        super.viewDidLoad()\n        // Do any additional setup after loading the\
  \ view, typically from a nib.\n    }\n    @IBAction func longPressDetected(_ sender:\
  \ UILongPressGestureRecognizer) {\n        topImageView.backgroundColor = UIColor.red\n\
  \    }\n}\n```\n\n23.  点击 `Run` 按钮或选择 `Product ➤ Run`。模拟器窗口将会出现。\n\n24.  将鼠标指针移至图像视图上，然后按住鼠标左键。当图像视图检测到长按手势时，它会将图像视图的背景颜色变为红色。\n\
  \n25.  选择 `Simulator ➤ Quit Simulator` 返回 Xcode。\n\n此示例通过从对象库中拖拽 `Long Press Gesture\
  \ Recognizer` 以可视化的方式定义了长按手势。现在，我们来看看如何仅通过 Swift 代码来复现这个过程。\n\n1.  使用 `Single View\
  \ App` 模板（参见第 1 章）创建一个新的 iOS 项目，并将该项目命名为 `LongPressCodeApp`。这会为用户界面创建一个单一视图。\n\n\
  2.  在导航器面板中点击 `Main.storyboard` 文件。Xcode 会显示该单一视图。\n\n3.  点击 `Library` 图标以打开对象库窗口，然后将一个图像视图拖放到用户界面的中心位置。\n\
  \n4.  点击 Xcode 中间面板底部的 `Align` 图标。此时会出现一个窗口。\n\n5.  选中 `Horizontally in Container`\
  \ 和 `Vertically in Container` 复选框，然后点击 `Add 2 Constraints` 按钮（见图 11-10）。图像视图需要位于中心位置，以便在模拟器中更容易模拟捏合手势。\n\
  \n6.  在子菜单的上半部分选择 `Editor ➤ Resolve Auto Layout Issues ➤ Add Missing Constraints`。Xcode\
  \ 会为图像视图添加额外的约束。\n\n7.  选择 `View ➤ Assistant Editor ➤ Show Assistant Editor`，或点击\
  \ `Assistant Editor` 图标。Xcode 会并排显示 `Main.storyboard` 和 `ViewController.swift` 文件。\n\
  \n8.  将鼠标指针移到图像视图上，按住 `Control` 键，并从图像视图 Ctrl-拖拽到 `class ViewController` 行下方的 `ViewController.swift`\
  \ 文件中。\n\n9.  松开 `Control` 键和鼠标左键。此时会出现一个弹出窗口。\n\n10. 点击 `Name` 文本字段，输入 `topImageView`，然后点击\
  \ `Connect` 按钮。Xcode 会创建一个 `IBOutlet` 变量，如下所示：\n\n```swift\n@IBOutlet var topImageView:\
  \ UIImageView!\n```\n\n1.  选择 `View ➤ Standard Editor ➤ Show Standard Editor`，或点击\
  \ Xcode 窗口右上角的 `Standard Editor` 图标。\n\n2.  在导航器面板中点击 `ViewController.swift` 文件。\n\
  \n3.  按如下方式编辑 `viewDidLoad` 方法：\n\n```swift\noverride func viewDidLoad() {\n   \
  \ super.viewDidLoad()\n    topImageView.isUserInteractionEnabled = true\n    topImageView.backgroundColor\
  \ = UIColor.green\n    let longPressGesture = UILongPressGestureRecognizer(target:\
  \ self, action: #selector(handleLongPress))\n    topImageView.addGestureRecognizer(longPressGesture)\n\
  \    // Do any additional setup after loading the view, typically from a nib.\n\
  }\n```\n\n这段代码开启了图像视图的“用户交互已启用”设置，并将其背景颜色定义为绿色以便显示。接着，它定义了一个长按手势识别器（而不是从对象库窗口中拖放一个\
  \ `Long Press Gesture Recognizer`），定义了一个名为 `handleLongPress` 的函数来响应长按手势，并将该长按手势与图像视图关联起来。\n\
  \n4.  在 `viewDidLoad` 方法下方添加以下函数：\n\n```swift\n@objc func handleLongPress() {\n\
  \    topImageView.backgroundColor = UIColor.red\n}\n```\n\n完整的 `ViewController.swift`\
  \ 文件应如下所示：\n\n```swift\nimport UIKit\nclass ViewController: UIViewController {\n\
  \    @IBOutlet var topImageView: UIImageView!\n    override func viewDidLoad() {\n\
  \        super.viewDidLoad()\n        topImageView.isUserInteractionEnabled = true\n\
  \        topImageView.backgroundColor = UIColor.green\n        let longPressGesture\
  \ = UILongPressGestureRecognizer(target: self, action: #selector(handleLongPress))\n\
  \        topImageView.addGestureRecognizer(longPressGesture)\n        // Do any\
  \ additional setup after loading the view, typically from a nib.\n    }\n    @objc\
  \ func handleLongPress() {\n        topImageView.backgroundColor = UIColor.red\n\
  \    }\n}\n```\n\n5.  点击 `Run` 按钮或选择 `Product ➤ Run`。模拟器窗口将会出现。\n\n6.  将鼠标指针移到图像视图上，然后按住鼠标左键以模拟长按操作。请注意，图像视图的颜色会从绿色变为红色。\n\
  \n7.  选择 `Simulator ➤ Quit Simulator` 返回 Xcode。\n\n## 总结\n\n触摸手势的作用是在用户界面上不放置按钮等对象的情况下，向应用程序发出命令。手势通常可以用一个或多个指尖来操作，你可以通过\
  \ `Attributes Inspector` 面板或 Swift 代码来定义这些手势。\n\n向应用程序添加手势识别器有两种方法。首先，你可以通过对象库将手势识别器添加到故事板中。将手势识别器添加到项目后，你需要从一个对象\
  \ Ctrl-拖拽到这个手势识别器，以使该对象能够识别特定的手势。接下来，你需要创建一个 `IBAction` 方法，以便在手势被识别时做出响应。\n\n第二种方法涉及编写\
  \ Swift 代码来创建一个手势识别器，将这个手势识别器添加到一个 `IBOutlet` 对象上，然后编写一个函数来处理手势被识别时的操作。两种方法的效果完全相同，因此你可以根据个人偏好来选择使用哪种方法。\n\
  \n向应用程序添加手势可以让用户界面更简洁、更直观，因为用户可以直接操作屏幕上的对象。\n\n\n\n# 12. 使用警告控制器和选择器\n\n几乎每个应用都需要向用户展示数据并接受用户输入。展示数据最简单的方式是使用标签，但有时你需要展示数据并让用户能够做出响应。在这种情况下，你需要使用警告控制器。\n\
  \n警告控制器可以显示一个弹出屏幕的表格，让用户有机会做出响应。警告控制器会出现在用户界面之上，强制用户通过点击按钮做出选择来响应，或者关闭警告控制器，如图 12-1\
  \ 所示。\n\n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig1_HTML.jpg](img/329781_5_En_12_Fig1_HTML.jpg)\n\
  \n图 12-1\n\n警告控制器通常显示一条消息和一个或多个按钮\n\n除了显示数据，用户界面还需要让人们输入数据。如果数据是文本，那么你可以使用文本字段让用户在该文本字段中输入任意内容，例如姓名或电话号码。文本字段非常适合接受任何类型的数据，但当需要向用户提供有效选项列表时，你应该改用选择器。\n\
  \nXcode 提供了两种不同类型的选择器：\n\n-   日期选择器 – 显示日期和时间，如图 12-2 所示\n-   选择器视图 – 显示一个包含不同选项的转轮\n\
  \n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig2_HTML.jpg](img/329781_5_En_12_Fig2_HTML.jpg)\n\
  \n图 12-2\n\n日期选择器让用户能够轻松选择日期和时间\n\n选择器在一个或多个转轮上包含有限数量的选项，用户可以通过滚动转轮来选择特定选项。可用选项的数量可以少到两个（例如选择时间时的上午和下午选项），但通常可用选项多于两个。选择器确保用户永远不会选择无效选项，例如在姓名栏中输入数字或错误地输入城市名。\n\
  \n## 使用警告控制器\n\n每个用户界面都需要向用户回显数据。在某些情况下，这些数据可以仅显示在标签中，但有时你需要确保用户看到特定信息。在这些情况下，你应该使用警告控制器。\n\
  \n警告控制器会出现在应用的用户界面之上，并可以通过更改以下属性进行自定义：\n\n-   标题 – 出现在警告控制器顶部的文本，通常为粗体和大字体\n-  \
  \ 消息 – 出现在标题下方的文本，字体较小\n-   首选样式 – 定义警告控制器的外观，可以是出现在屏幕底部的操作列表（如图 12-3 所示），也可以是出现在屏幕中央的警告框（见图\
  \ 12-1）\n\n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig3_HTML.jpg](img/329781_5_En_12_Fig3_HTML.jpg)\n\
  \n图 12-3\n\n操作列表出现在屏幕底部\n\n标题通常由一个单词或短语组成，用于解释警告控制器的用途，例如显示“警告”或“登录”。\n\n要关闭警告控制器，警告控制器始终需要至少一个按钮。然而，警告控制器可以显示两个或多个按钮以给用户选择。除了显示按钮，警告控制器还可以包含文本字段，允许用户输入数据。\n\
  \n你完全可以只通过编写 Swift 代码来创建警告控制器。首先，你必须创建警告控制器，并定义其标题、消息和样式。其次，你必须为想要在警告控制器上显示的每个按钮或文本字段定义一个警告动作。第三，你必须在用户界面上实际呈现该警告控制器。\n\
  \n要了解如何创建一个仅显示标题、消息和关闭按钮的简单警告控制器，请按以下步骤操作：\n\n1.  使用“单视图应用”模板（见第 1 章）创建一个新的 iOS\
  \ 项目，并将这个新项目命名为 `AlertControllerApp`。这会为用户界面创建一个单一视图。\n\n2.  在导航面板中点击 `Main.storyboard`\
  \ 文件。Xcode 会显示该单一视图。\n\n3.  点击库图标打开对象库窗口。\n\n4.  将一个按钮拖放到视图上的任意位置。\n\n5.  选择“编辑器”➤“解决自动布局问题”➤“重置为建议的约束”。Xcode\
  \ 会为该按钮添加约束。\n\n6.  选择“视图”➤“辅助编辑器”➤“显示辅助编辑器”。Xcode 会并排显示 `Main.storyboard` 和 `ViewController.swift`\
  \ 文件。\n\n7.  将鼠标指针移到按钮上，按住 Control 键，然后从按钮 Control-拖动到文件底部最后一个花括号上方的 `ViewController.swift`\
  \ 文件中。\n\n8.  松开 Control 键和鼠标左键。会弹出一个窗口。\n\n9.  在“名称”文本框中点击，输入 `buttonTapped`，点击“类型”弹出菜单并选择\
  \ `UIButton`，然后点击“连接”按钮。Xcode 会创建一个 IBAction 方法。\n\n10. 按如下方式编辑这个 `buttonTapped`\
  \ IBAction 方法：\n\n    ```\n    @IBAction func buttonTapped(_ sender: UIButton) {\n\
  \        let alert = UIAlertController(title: \"警告\", message: \"僵尸出没！\", preferredStyle:\
  \ .alert)\n        let okAction = UIAlertAction(title: \"确定\", style: .default,\
  \ handler: { action -> Void in\n            // 只是关闭操作列表\n        })\n        alert.addAction(okAction)\n\
  \        self.present(alert, animated: true, completion: nil)\n    }\n    ```\n\n\
  11. 点击“运行”按钮或选择“产品”➤“运行”。模拟器屏幕会出现。\n\n12. 点击按钮。注意，警告控制器会出现在屏幕中央，因为 `preferredStyle`\
  \ 设置为 `.alert`。（如果 `preferredStyle` 属性设置为 `.actionSheet`，那么警告控制器会出现在屏幕底部。）\n\n13.\
  \ 点击警告控制器上的“确定”按钮将其关闭。\n\n14. 选择“模拟器”➤“退出模拟器”返回 Xcode。\n\n更改 `title` 和 `message`\
  \ 属性以显示不同的文本，然后再次运行应用，看看它如何改变警告控制器的外观。同时，将 `preferredStyle` 属性从 `.alert` 更改为 `.actionSheet`，看看它如何影响警告控制器的外观。\n\
  \n\n### 显示并响应多个按钮\n\n最简单的警报控制器会显示一个让用户关闭它的单一按钮。但你可能希望提供给用户多个选项，并根据用户点击的按钮做出不同的响应。\n\
  \n对于想要在警报控制器上显示的每个按钮，都需要添加一个 `UIAlertAction`。当用户点击警报控制器上的按钮时，警报控制器会消失。如果你希望按钮执行更多操作，则需要调用一个单独的函数来执行某些操作。\n\
  \n要了解如何创建一个显示两个按钮并对每个按钮做出不同响应的警报控制器，请遵循以下步骤：\n\n1.  使用单一视图应用模板创建一个新的 iOS 项目（参见第\
  \ 1 章），并将这个新项目命名为 `AlertControllerButtonsApp`。这将为用户界面创建一个单一视图。\n\n2.  在导航面板中点击 `Main.storyboard`\
  \ 文件。Xcode 会显示单一视图。\n\n3.  点击库图标打开对象库窗口。\n\n4.  将一个按钮和一个标签拖放到视图上的任意位置。\n\n5.  选择\
  \ 编辑器 > 解决自动布局问题 > 重置为建议的约束（位于子菜单下半部分）。Xcode 会为按钮和标签添加约束。\n\n6.  选择 视图 > 辅助编辑器 >\
  \ 显示辅助编辑器。Xcode 会并排显示 `Main.storyboard` 和 `ViewController.swift` 文件。\n\n7.  将鼠标指针移到标签上，按住\
  \ Control 键，然后从图像视图按住 Control 键拖拽到“class ViewController”行下方的 `ViewController.swift`\
  \ 文件中。\n\n8.  松开 Control 键和鼠标左键。此时会弹出一个窗口。\n\n9.  点击名称文本框，输入 `labelResult`，然后点击连接按钮。Xcode\
  \ 会创建一个 `IBOutlet` 变量，如下所示：\n\n```\n    @IBOutlet var labelResult: UILabel!\n```\n\
  \n10. 将鼠标指针移到按钮上，按住 Control 键，然后从图像视图按住 Control 键拖拽到文件底部最后一个大括号上方的 `ViewController.swift`\
  \ 文件中。\n\n11. 松开 Control 键和鼠标左键。此时会弹出一个窗口。\n\n12. 点击名称文本框，输入 `buttonTapped`，点击类型弹出菜单并选择\
  \ `UIButton`，然后点击连接按钮。Xcode 会创建一个 `IBAction` 方法。\n\n13. 选择 视图 > 标准编辑器 > 显示标准编辑器，或者点击\
  \ Xcode 窗口右上角的标准编辑器图标。\n\n14. 在导航面板中点击 `ViewController.swift` 文件。\n\n15. 修改 `viewDidLoad`\
  \ 方法，如下所示：\n\n```\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
  \        labelResult.numberOfLines = 0\n        // Do any additional setup after\
  \ loading the view, typically from a nib.\n    }\n```\n\n将标签的 `numberOfLines` 属性设置为\
  \ 0，无论其中存储的文本大小如何，都允许其宽度扩展。如果此 `numberOfLines` 属性保持默认值 1，则标签不会自动调整大小，并且如果文本长度超过标签宽度，则存在文本被截断的风险。\n\
  \n16. 编辑此 `buttonTapped` `IBAction` 方法，如下所示：\n\n```\n    @IBAction func buttonTapped(_\
  \ sender: UIButton) {\n        let alert = UIAlertController(title: \"Warning\"\
  , message: \"Zombies are loose!\", preferredStyle: .alert)\n        let okAction\
  \ = UIAlertAction(title: \"OK\", style: .default, handler: { action -> Void in\n\
  \            self.labelResult.text = \"OK\"\n        })\n        let cancelAction\
  \ = UIAlertAction(title: \"Cancel\", style: .cancel, handler: { action -> Void in\n\
  \            self.labelResult.text = \"Cancel\"\n        })\n        let destroyAction\
  \ = UIAlertAction(title: \"Destroy\", style: .destructive, handler: { action ->\
  \ Void in\n            self.labelResult.text = \"Destroy\"\n        })\n       \
  \ alert.addAction(okAction)\n        alert.addAction(cancelAction)\n        alert.addAction(destroyAction)\n\
  \        self.present(alert, animated: true, completion: nil)\n    }\n```\n\n定义每个\
  \ `UIAlertAction` 的代码仅会更改标签中显示的文本。如果你需要每个按钮执行更复杂的任务，可以在处理程序中放入一个或多个函数的名称。然后你需要创建这些函数，例如：\n\
  \n```\n    let destroyAction = UIAlertAction(title: \"Destroy\", style: .destructive,\
  \ handler: { action -> Void in\n        self.labelResult.text = \"Destroy\"\n  \
  \      self.callFunctionOne()\n        self.callFunctionTwo()\n    })\n    func\
  \ callFunctionOne(){\n        // Code here\n    }\n    func callFunctionTwo(){\n\
  \        // Code here\n    }\n```\n\n整个 `ViewController.swift` 文件应如下所示：\n\n```\n\
  \    import UIKit\n    class ViewController: UIViewController {\n        @IBOutlet\
  \ var labelResult: UILabel!\n        override func viewDidLoad() {\n           \
  \ super.viewDidLoad()\n            labelResult.numberOfLines = 0\n            //\
  \ Do any additional setup after loading the view, typically from a nib.\n      \
  \  }\n        @IBAction func buttonTapped(_ sender: UIButton) {\n            let\
  \ alert = UIAlertController(title: \"Warning\", message: \"Zombies are loose!\"\
  , preferredStyle: .alert)\n            let okAction = UIAlertAction(title: \"OK\"\
  , style: .default, handler: { action -> Void in\n                self.labelResult.text\
  \ = \"OK\"\n            })\n            let cancelAction = UIAlertAction(title:\
  \ \"Cancel\", style: .cancel, handler: { action -> Void in\n                self.labelResult.text\
  \ = \"Cancel\"\n            })\n            let destroyAction = UIAlertAction(title:\
  \ \"Destroy\", style: .destructive, handler: { action -> Void in\n             \
  \   self.labelResult.text = \"Destroy\"\n            })\n            alert.addAction(okAction)\n\
  \            alert.addAction(cancelAction)\n            alert.addAction(destroyAction)\n\
  \            self.present(alert, animated: true, completion: nil)\n        }\n \
  \   }\n```\n\n17. 点击运行按钮或选择 产品 > 运行。模拟器屏幕会出现。\n\n18. 点击按钮。警报控制器会如图 12-4 所示显示出来。\n\
  \n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig4_HTML.jpg](img/329781_5_En_12_Fig4_HTML.jpg)\n\
  \n图 12-4\n\n警报控制器显示三种类型的按钮：`.default`、`.destructive` 和 `.cancel`\n\n19. 点击“OK”按钮（该按钮使用\
  \ `.default` 样式显示）。注意，标签现在显示“OK”，并且警报控制器被关闭。\n\n20. 点击“Destroy”按钮（该按钮使用 `.destructive`\
  \ 样式显示）。注意，标签现在显示“Destroy”，并且警报控制器被关闭。\n\n21. 点击“Cancel”按钮（该按钮使用 `.cancel` 样式显示）。注意，标签现在显示“Cancel”，并且警报控制器被关闭。\n\
  \n22. 选择 模拟器 > 退出模拟器 返回 Xcode。\n\n### 在警报控制器上显示文本字段\n\n按钮允许警报控制器接受用户的选项。你的代码可以根据这些选项做出响应。但有时你可能希望在警报控制器上显示一个文本字段，以便用户输入数据。然后你需要存储这些数据。\n\
  \n\n\n#### 备注\n\n你只能在以 `.alert` preferredStyle 显示**警告控制器**上添加文本字段。在以 `.actionSheet`\
  \ preferredStyle 显示的警告控制器上无法显示文本字段。\n\n当你向警告控制器添加文本字段时，你可以像对待任何其他文本字段一样对其进行修改，例如定义背景颜色或字体。此外，你还必须创建一个常量来存储该文本字段的内容，以便应用的其他部分能够访问用户在警告控制器的文本字段中输入的任何数据。\n\
  \n要了解如何在警告控制器上显示文本字段并访问其内容，请按照以下步骤操作：\n\n1.  使用“单视图应用”模板创建一个新的 iOS 项目（参见第 1 章），并将此新项目命名为\
  \ `AlertControllerTextFieldApp`。这将为用户界面创建一个单一视图。\n\n2.  在导航窗格中点击 `Main.storyboard`\
  \ 文件。Xcode 会显示该单一视图。\n\n3.  点击“资源库”图标以打开“对象库”窗口。\n\n4.  将按钮和标签拖放到视图上的任意位置。\n\n5.\
  \  选择编辑器 ➤ 解决自动布局问题 ➤ 重置为建议的约束（位于子菜单的下半部分）。Xcode 将为按钮和标签添加约束。\n\n6.  选择视图 ➤ 助理编辑器\
  \ ➤ 显示助理编辑器。Xcode 会并排显示 `Main.storyboard` 和 `ViewController.swift` 文件。\n\n7.  将鼠标指针移到标签上，按住\
  \ Control 键，从图像视图拖拽到 `class ViewController` 行下方的 `ViewController.swift` 文件中。\n\n\
  8.  松开 Control 键和鼠标左键。此时会弹出一个窗口。\n\n9.  在“名称”文本字段中点击，输入 `labelResult`，然后点击“连接”按钮。Xcode\
  \ 会创建一个如下所示的 IBOutlet 变量：\n\n```\n@IBOutlet var labelResult: UILabel!\n```\n\n10.\
  \ 将鼠标指针移到按钮上，按住 Control 键，从图像视图拖拽到文件底部最后一个大括号上方的 `ViewController.swift` 文件中。\n\n\
  11. 松开 Control 键和鼠标左键。此时会弹出一个窗口。\n\n12. 在“名称”文本字段中点击，输入 `buttonTapped`，点击“类型”弹出菜单并选择\
  \ `UIButton`，然后点击“连接”按钮。Xcode 会创建一个 IBAction 方法。\n\n13. 选择视图 ➤ 标准编辑器 ➤ 显示标准编辑器，或者点击\
  \ Xcode 窗口右上角的“标准编辑器”图标。\n\n14. 在导航窗格中点击 `ViewController.swift` 文件。\n\n15. 按如下方式修改\
  \ `viewDidLoad` 方法：\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
  \    labelResult.numberOfLines = 0\n    // 加载视图后的任何其他设置，通常来自 nib 文件。\n}\n```\n\n\
  将标签的 `numberOfLines` 属性设置为 0，使其能够根据存储文本的大小自动扩展宽度。如果此 `numberOfLines` 属性保持默认值 1，那么标签将不会自动调整大小，并且如果文本长度超过标签宽度，可能会截断文本。\n\
  \n16. 按如下方式向 `buttonTapped` IBAction 方法添加以下代码：\n\n```\nlet alert = UIAlertController(title:\
  \ \"Log In\", message: \"Enter Password\", preferredStyle: .alert)\nalert.addTextField(configurationHandler:\
  \ {(textField) in\n    textField.placeholder = \"Password here\"\n    textField.isSecureTextEntry\
  \ = true\n})\n```\n\n第一行创建了一个警告控制器，显示标题“Log In”以及下方的消息“Enter Password”。因为我们希望在警告控制器上显示文本字段，所以警告控制器的\
  \ `preferredStyle` 必须是 `.alert`。\n\n第二行向警告控制器添加了一个文本字段，并将其配置为显示“Password here”作为占位符文本，同时将其\
  \ `isSecureTextEntry` 属性设置为 `true`，这会在用户输入时隐藏输入的字符。此处的任何代码只是对文本字段进行了自定义。\n\n17.\
  \ 按如下方式向 `buttonTapped` IBAction 方法添加以下代码：\n\n```\nlet okAction = UIAlertAction(title:\
  \ \"OK\", style: .default, handler: { action -> Void in\n    let savedText = alert.textFields![0]\
  \ as UITextField\n    self.labelResult.text = savedText.text\n})\nalert.addAction(okAction)\n\
  self.present(alert, animated: true, completion: nil)\n```\n\n第一行定义了一个标题为“OK”、样式为\
  \ `.default` 的按钮。在代码的 handler 部分，这行定义了一个名为 `savedText` 的常量，它代表警告控制器上的第一个文本字段（注意索引值为\
  \ 0）。如果你向警告控制器添加了多个文本字段，则需要定义额外的常量来表示其他文本字段。最后，这行存储了文本字段中的文本（`savedText`），并将其显示在连接到用户界面标签的\
  \ `labelResult` IBOutlet 中。\n\n第二行将按钮添加到警告控制器，第三行呈现或显示该警告控制器。\n\n整个 `ViewController.swift`\
  \ 文件应如下所示：\n\n```\nimport UIKit\nclass ViewController: UIViewController {\n    @IBOutlet\
  \ var labelResult: UILabel!\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
  \        labelResult.numberOfLines = 0\n        // 加载视图后的任何其他设置，通常来自 nib 文件。\n \
  \   }\n    @IBAction func buttonTapped(_ sender: UIButton) {\n        let alert\
  \ = UIAlertController(title: \"Log In\", message: \"Enter Password\", preferredStyle:\
  \ .alert)\n        alert.addTextField(configurationHandler: {(textField) in\n  \
  \          textField.placeholder = \"Password here\"\n            textField.isSecureTextEntry\
  \ = true\n        })\n        let okAction = UIAlertAction(title: \"OK\", style:\
  \ .default, handler: { action -> Void in\n            let savedText = alert.textFields![0]\
  \ as UITextField\n            self.labelResult.text = savedText.text\n        })\n\
  \        alert.addAction(okAction)\n        self.present(alert, animated: true,\
  \ completion: nil)\n    }\n}\n```\n\n18. 点击“运行”按钮，或选择产品 ➤ 运行。模拟器屏幕出现。\n\n19. 点击按钮。警告控制器显示出来，如图\
  \ 12-5 所示。\n\n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig5_HTML.jpg](img/329781_5_En_12_Fig5_HTML.jpg)\n\
  \n**图 12-5** 显示文本字段和按钮的警告控制器\n\n20. 在警告控制器的文本字段中输入一些文本。注意，当你输入时，文本字段会对字符进行掩码处理，因为其\
  \ `isSecureTextEntry` 属性被设置为 `true`。\n\n21. 点击“OK”按钮。注意，你在文本字段中输入的任何文本现在都会出现在标签中。\n\
  \n22. 选择模拟器 ➤ 退出模拟器以返回 Xcode。\n\n\n\n## 使用日期选择器\n\n当应用需要用户输入日期和/或时间时，最好使用日期选择器来提供有效选项列表。用户可以通过旋转日期选择器上的不同滚轮来选择星期、日期和时间，而无需输入任何内容。\n\
  \n将日期选择器从对象库窗口拖放到视图后，您可以通过在属性检查器中修改以下选项来自定义日期选择器，如图 12-6 所示：\n\n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig6_HTML.jpg](img/329781_5_En_12_Fig6_HTML.jpg)\n\
  \n图 12-6 – 属性检查器面板可让您自定义日期选择器\n\n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig7_HTML.jpg](img/329781_5_En_12_Fig7_HTML.jpg)\n\
  \n图 12-7 – 将日期选择器的模式更改为倒计时器\n\n- **模式** – 定义日期选择器显示时间、日期、时间和日期，或倒计时器，如图 12-7 所示\n\
  - **区域设置** – 覆盖系统默认的区域设置属性，该属性定义本地语言，例如美式英语或澳式英语\n- **间隔** – 定义以分钟为单位的时间间隔，从 1 分钟到\
  \ 30 分钟\n- **日期** – 定义初始显示的日期\n- **最小日期** – 定义允许的最小日期\n- **最大日期** – 定义允许的最大日期\n\n\
  无论您为日期选择器选择哪种模式，其值都存储为 `NSDate` 数据类型。要将此 `NSDate` 数据转换为文本，需要两步过程。首先，您需要创建一个表示 `DateFormatter`\
  \ 的常量，例如：\n\n```\nlet dateFormatter: DateFormatter = DateFormatter()\n```\n\n其次，您必须定义\
  \ `.dateStyle` 和 `.timeStyle` 属性来显示日期和时间。要定义日期和时间样式，您需要将 `DateFormatter` 常量的 `.dateStyle`\
  \ 和 `.timeStyle` 属性设置为以下选项之一：\n\n- `.none` – 不显示日期或时间\n- `.short` – 以“11/23/19”格式显示日期，以“3:48\
  \ PM”格式显示时间\n- `.medium` – 以“Nov 23, 2019”格式显示日期，以“3:48:21 PM”格式显示时间\n- `.long`\
  \ – 以“November 23, 2019”格式显示日期，以“3:48:21 PM EST”格式显示时间\n- `.full` – 以“Saturday,\
  \ November 23, 2019 AD”格式显示日期，以“3:48 PM Eastern Standard Time”格式显示时间\n\n```\ndateFormatter.dateStyle\
  \ = .short\ndateFormatter.timeStyle = .short\n```\n\n最后，您必须检索日期选择器中当前显示的日期/时间。由于日期选择器中存储的日期/时间值是\
  \ `NSDate` 数据类型，您必须使用如下代码将其 `.date` 属性转换为字符串：\n\n```\nlet selectedDate: String =\
  \ dateFormatter.string(from: myDatePicker.date)\n```\n\n在下面的示例中，我们将看到如何以两种不同方式检索日期选择器中显示的值。首先，当用户更改日期选择器时，我们将检索日期选择器的值。其次，我们将检索日期选择器的值并将其显示在警报控制器上。\n\
  \n要了解如何在按钮上定义标题，请遵循以下步骤：\n\n1. 使用单视图应用模板（见第 1 章）创建一个新的 iOS 项目，并将此新项目命名为 `DatePickerApp`。这将为用户界面创建一个单视图。\n\
  \n2. 在导航器面板中点击 `Main.storyboard` 文件。Xcode 会显示该单视图。\n\n3. 点击库图标以打开对象库窗口。\n\n4. 将按钮和日期选择器拖放到视图上的任意位置，如图\
  \ 12-8 所示。\n\n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig8_HTML.jpg](img/329781_5_En_12_Fig8_HTML.jpg)\n\
  \n图 12-8 – 对象库窗口中的日期选择器\n\n5. 选择 **编辑器** ➤ **解决自动布局问题** ➤ **设置为建议的约束**。Xcode 会为您的按钮和日期选择器添加约束。\n\
  \n6. 选择 **视图** ➤ **助理编辑器** ➤ **显示助理编辑器**。Xcode 会并排显示 `Main.storyboard` 和 `ViewController.swift`\
  \ 文件。\n\n7. 将鼠标指针移到日期选择器上，按住 Control 键，从日期选择器 Control-拖动到 `ViewController.swift`\
  \ 文件中“class ViewController”行的下方。\n\n8. 松开 Control 键和鼠标左键。会出现一个弹出窗口。\n\n9. 在名称文本字段中点击，输入\
  \ `myDatePicker`，然后点击“连接”按钮。Xcode 会创建一个 `IBOutlet` 变量，如下所示：\n\n```\n@IBOutlet var\
  \ myDatePicker: UIDatePicker!\n```\n\n10. 在 `IBOutlet` 下方添加以下代码行来定义一个日期格式化器：\n\n\
  ```\nlet dateFormatter: DateFormatter = DateFormatter()\n```\n\n11. 按如下方式编辑 `viewDidLoad`\
  \ 方法：\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    dateFormatter.dateStyle\
  \ = .short\n    dateFormatter.timeStyle = .short\n    // 加载视图后执行任何额外设置，通常从 nib 文件加载。\n\
  }\n```\n\n这些代码行将 `.dateStyle` 和 `.timeStyle` 属性定义为 `.short`。您可以尝试将这些值更改为 `.medium`、`.long`\
  \ 和 `.full`，看看它们如何以不同方式定义日期和时间。\n\n12. 在 `viewDidLoad` 方法下方，添加以下函数，该函数将接受一个字符串并将其显示在警报控制器中：\n\
  \n```\nfunc ShowAlert(dateTime : String) {\n    let alert = UIAlertController(title:\
  \ \"选中的日期和时间\", message: \"\\(dateTime)\", preferredStyle: .alert)\n    let okAction\
  \ = UIAlertAction(title: \"确定\", style: .default, handler: { action -> Void in\n\
  \        // 只需关闭操作表\n    })\n    alert.addAction(okAction)\n    self.present(alert,\
  \ animated: true, completion: nil)\n}\n```\n\n13. 将鼠标指针移到按钮上，按住 Control 键，从按钮 Control-拖动到\
  \ `ViewController.swift` 文件中底部最后一个大括号的上方。\n\n14. 松开 Control 键和鼠标左键。会出现一个弹出窗口。\n\n\
  15. 在名称文本字段中点击，输入 `getCurrentDateTime`，点击类型弹出菜单并选择 `UIButton`，然后点击“连接”按钮。Xcode 会创建一个\
  \ `IBAction` 方法。\n\n16. 按如下方式编辑此 `getCurrentDateTime` `IBAction` 方法：\n\n```\n@IBAction\
  \ func getCurrentDateTime(_ sender: UIButton) {\n    let selectedDate: String =\
  \ dateFormatter.string(from: myDatePicker.date)\n    ShowAlert(dateTime: selectedDate)\n\
  }\n```\n\n此 `IBAction` 方法检索 `myDatePicker` `IBOutlet`（代表日期选择器）的值，并将此日期和时间转换为字符串，该字符串存储在\
  \ `selectedDate` 常量中。然后，它将此 `selectedDate` 常量传递给 `ShowAlert` 函数，以将其显示在警报控制器上。\n\n\
  17. 将鼠标指针移到日期选择器上，按住 Control 键，从日期选择器 Control-拖动到 `ViewController.swift` 文件中底部最后一个大括号的上方。\n\
  \n18. 松开 Control 键和鼠标左键。会出现一个弹出窗口。\n\n19. 在名称文本字段中点击，输入 `dateChanged`，点击类型弹出菜单并选择\
  \ `UIDatePicker`，然后点击“连接”按钮。Xcode 会创建一个 `IBAction` 方法。\n\n20. 按如下方式编辑此 `dateChanged`\
  \ `IBAction` 方法：\n\n```\n@IBAction func dateChanged(_ sender: UIDatePicker) {\n\
  \    let selectedDate: String = dateFormatter.string(from: sender.date)\n    ShowAlert(dateTime:\
  \ selectedDate)\n}\n```\n\n每当用户在日期选择器中更改日期或时间时，此 `dateChanged` `IBAction` 方法都会运行。它从日期选择器中检索\
  \ `.date` 属性并将其转换为字符串，存储在 `selectedDate` 常量中。然后，它将此 `selectedDate` 常量传递给 `ShowAlert`\
  \ 函数，该函数将其显示在警报控制器上。\n\n整个 `ViewController.swift` 文件应该如下所示。\n\n\n\n```swift\nimport\
  \ UIKit\nclass ViewController: UIViewController {\n    @IBOutlet var myDatePicker:\
  \ UIDatePicker!\n    let dateFormatter: DateFormatter = DateFormatter()\n    override\
  \ func viewDidLoad() {\n        super.viewDidLoad()\n        dateFormatter.dateStyle\
  \ = .short\n        dateFormatter.timeStyle = .short\n        // Do any additional\
  \ setup after loading the view, typically from a nib.\n    }\n    func ShowAlert(dateTime\
  \ : String) {\n        let alert = UIAlertController(title: \"Selected Date and\
  \ Time\", message: \"\\(dateTime)\", preferredStyle: .alert)\n        let okAction\
  \ = UIAlertAction(title: \"OK\", style: .default, handler: { action -> Void in\n\
  \            //Just dismiss the action sheet\n        })\n        alert.addAction(okAction)\n\
  \        self.present(alert, animated: true, completion: nil)\n    }\n    @IBAction\
  \ func dateChanged(_ sender: UIDatePicker) {\n        let selectedDate: String =\
  \ dateFormatter.string(from: sender.date)\n        ShowAlert(dateTime: selectedDate)\n\
  \    }\n    @IBAction func getCurrentDateTime(_ sender: UIButton) {\n        let\
  \ selectedDate: String = dateFormatter.string(from: myDatePicker.date)\n       \
  \ ShowAlert(dateTime: selectedDate)\n    }\n}\n```\n\n21. 点击`Run`按钮或依次选择 Product\
  \ ➤ Run。模拟器屏幕出现。\n\n22. 点击该按钮。一个警报控制器出现，显示日期选择器中显示的当前日期和时间。\n\n23. 点击按钮关闭警报控制器。\n\
  \n24. 更改日期选择器中的日期或时间。注意另一个警报控制器出现，显示日期选择器中修改后的日期/时间。\n\n25. 点击按钮关闭警报控制器。\n\n26.\
  \ 依次选择 Simulator ➤ Quit Simulator 返回 Xcode。\n\n回到步骤 11，将`.dateStyle`和`.timeStyle`属性从`.short`改为`.medium`、`.long`或`.full`，观察这对日期和时间显示方式的影响。如果将`.dateStyle`或`.timeStyle`改为`.none`，则日期选择器中显示的日期或时间将被忽略。\n\
  \n## 创建自定义选择器\n\n日期选择器适用于让用户选择日期和时间，但很多时候你希望为用户提供有限的选项范围，而这些选项并非日期或时间。在这种情况下，你需要使用标准的选择器对象，并创建要显示在选择器中的数据。\n\
  \n要使用选择器，你必须定义委托和数据源。委托定义了包含函数的文件，这些函数用于确定要显示的列数（例如日和月）、选择器中要显示的总选项数，以及用户在选择器中选择了哪些数据。\n\
  \n数据源定义了包含要显示在选择器中的数据的文件。这些数据可以是数组或数据库。\n\n要了解如何使用`Picker View`，请按以下步骤操作：\n\n1.\
  \ 使用“单视图应用”模板（见第 1 章）创建一个新的 iOS 项目，并将新项目命名为`PickerApp`。这会为用户界面创建一个单视图。\n\n2. 在导航窗格中点击`Main.storyboard`文件。Xcode\
  \ 会显示该单视图。\n\n3. 点击库图标打开对象库窗口。\n\n4. 将一个按钮和一个选择器视图拖放到视图上的任意位置，如图 12-9 所示。\n\n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig9_HTML.jpg](img/329781_5_En_12_Fig9_HTML.jpg)\n\
  \n图 12-9\n\n对象库窗口中的选择器视图\n\n5. 选择 Editor ➤ Resolve Auto Layout Issues ➤ 在子菜单下半部分选择\
  \ Set to Suggested Constraints。Xcode 会为你的按钮和选择器视图添加约束。\n\n6. 选择 View ➤ Assistant\
  \ Editor ➤ Show Assistant Editor。Xcode 会并排显示`Main.storyboard`和`ViewController.swift`文件。\n\
  \n7. 按如下所示编辑 `class ViewController` 这一行：\n\n```swift\nclass ViewController: UIViewController,\
  \ UIPickerViewDataSource, UIPickerViewDelegate {\n```\n\n这使`ViewController.swift`文件成为选择器视图的数据源和委托。\n\
  \n8. 将鼠标指针移到选择器视图上，按住 Control 键，然后从选择器视图 Control-拖拽到`ViewController.swift`文件中“class\
  \ ViewController”行的下方。\n\n9. 释放 Control 键和鼠标左键。会弹出一个弹出窗口。\n\n10. 在“名称”文本字段中点击，输入\
  \ **myPicker**，然后点击“连接”按钮。Xcode 会创建一个如下所示的 `IBOutlet` 变量：\n\n```swift\n@IBOutlet\
  \ var myPicker: UIDatePicker!\n```\n\n11. 在 `IBOutlet` 下方添加以下行，定义一个用于保存字符串数组的变量：\n\
  \n```swift\nvar pickerData: [String] = [String]()\n```\n\n12. 按如下所示编辑 `viewDidLoad`\
  \ 方法：\n\n```swift\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    myPicker.delegate\
  \ = self\n    myPicker.dataSource = self\n    pickerData = [\"cat\", \"dog\", \"\
  hamster\", \"lizard\", \"parrot\", \"goldfish\"]\n    // Do any additional setup\
  \ after loading the view, typically from a nib.\n}\n```\n\n这几行代码声明了`ViewController.swift`文件作为选择器视图的委托和数据源。然后定义了一个字符串数组，存储在`pickerData`变量中。\n\
  \n13. 在 `viewDidLoad` 方法下方，添加以下函数来定义选择器视图中将显示多少个组件。由于我们只显示一个滚轮选项，因此组件数量为一：\n\n```swift\n\
  func numberOfComponents(in pickerView: UIPickerView) -> Int {\n    return 1\n}\n\
  ```\n\n14. 在其下方添加另一个函数，定义选择器视图中将显示的项数。这个数字可以通过对`pickerData`数组使用`.count`方法获得：\n\n\
  ```swift\nfunc pickerView(_ pickerView: UIPickerView, numberOfRowsInComponent component:\
  \ Int) -> Int {\n    return pickerData.count\n}\n```\n\n15. 在其下方添加第三个函数，用于在选择器视图中显示数据：\n\
  \n```swift\nfunc pickerView(_ pickerView: UIPickerView, titleForRow row: Int, forComponent\
  \ component: Int) -> String? {\n    return pickerData[row]\n}\n```\n\n\n\n16. 将鼠标指针移到按钮上，按住`Control`键，并从按钮`Ctrl-拖移`到`ViewController.swift`文件中底部最后一个大括号的上方。\n\
  \n17. 松开`Control`键和鼠标左键。弹出窗口出现。\n\n18. 在“名称（Name）”文本字段中点击，输入`buttonTapped`，在“类型（Type）”弹出菜单中选择`UIButton`，然后点击“连接（Connect）”按钮。Xcode\
  \ 会创建一个`IBAction`方法。\n\n19. 按如下方式编辑`buttonTapped IBAction`方法：\n\n```swift\n@IBAction\
  \ func buttonTapped(_ sender: UIButton) {\n    let pickerIndex = myPicker.selectedRow(inComponent:\
  \ 0)\n    let alert = UIAlertController(title: \"Your Choice\", message: \"\\(pickerData[pickerIndex])\"\
  , preferredStyle: .alert)\n    let okAction = UIAlertAction(title: \"OK\", style:\
  \ .default, handler: { action -> Void in\n        //Just dismiss the action sheet\n\
  \    })\n    alert.addAction(okAction)\n    self.present(alert, animated: true,\
  \ completion: nil)\n}\n```\n\n`buttonTapped IBAction`方法中的第一行获取选择器视图中当前显示选项的索引号，其中第一个项目的索引为\
  \ 0，第二个项目的索引为 1，以此类推。然后，它使用该索引值来确定在警告控制器中显示`pickerData`数组中的哪个项目。\n\n整个`ViewController.swift`文件应如下所示：\n\
  \n```swift\nimport UIKit\nclass ViewController: UIViewController, UIPickerViewDataSource,\
  \ UIPickerViewDelegate {\n    @IBOutlet var myPicker: UIPickerView!\n    var pickerData:\
  \ [String] = [String]()\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
  \        myPicker.delegate = self\n        myPicker.dataSource = self\n        pickerData\
  \ = [\"cat\", \"dog\", \"hamster\", \"lizard\", \"parrot\", \"goldfish\"]\n    \
  \    // Do any additional setup after loading the view, typically from a nib.\n\
  \    }\n    func numberOfComponents(in pickerView: UIPickerView) -> Int {\n    \
  \    return 1\n    }\n    func pickerView(_ pickerView: UIPickerView, numberOfRowsInComponent\
  \ component: Int) -> Int {\n        return pickerData.count\n    }\n    func pickerView(_\
  \ pickerView: UIPickerView, titleForRow row: Int, forComponent component: Int) ->\
  \ String? {\n        return pickerData[row]\n    }\n    @IBAction func buttonTapped(_\
  \ sender: UIButton) {\n        let pickerIndex = myPicker.selectedRow(inComponent:\
  \ 0)\n        let alert = UIAlertController(title: \"Your Choice\", message: \"\\\
  (pickerData[pickerIndex])\", preferredStyle: .alert)\n        let okAction = UIAlertAction(title:\
  \ \"OK\", style: .default, handler: { action -> Void in\n            //Just dismiss\
  \ the action sheet\n        })\n        alert.addAction(okAction)\n        self.present(alert,\
  \ animated: true, completion: nil)\n    }\n}\n```\n\n20. 点击“运行”按钮或选择“产品”>“运行”。模拟器屏幕出现，如图\
  \ 12-10 所示。\n\n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig10_HTML.jpg](img/329781_5_En_12_Fig10_HTML.jpg)\n\
  \n**图 12-10** 应用上的选择器视图\n\n21. 滚动选择器视图并选择一个选项。\n\n22. 点击按钮。会出现一个警告控制器，显示您在选取器视图中选择的选项。\n\
  \n23. 点击按钮以关闭警告控制器。\n\n24. 重复步骤 20-22，并在选择器视图中选择不同的选项。\n\n25. 选择“模拟器”>“退出模拟器”以返回\
  \ Xcode。\n\n### 显示多组件选择器视图\n\n如果您查看日期选择器，它会显示用于日、时、分以及上午或下午的独立滚轮或组件。我们在上一个例子中创建的简单选择器视图仅显示一个列出不同宠物类型的滚轮或组件。\n\
  \n对于您希望在选择器视图中显示的每个组件，您需要定义一个单独的数据源。然后，您需要定义选择器视图要显示的总组件数量（例如两个或三个），同时显示所有组件并存储每个组件中的数据。\n\
  \n要了解如何创建包含三个组件的选择器视图，请按以下步骤操作：\n\n1.  使用“单视图应用（Single View App）”模板创建一个新的 iOS 项目（参见第\
  \ 1 章），并将此新项目命名为`ThreePickerApp`。这会为用户界面创建一个单视图。\n\n2.  在导航窗格中点击`Main.storyboard`文件。Xcode\
  \ 会显示该单视图。\n\n3.  点击“库”图标以打开“对象库”窗口。\n\n4.  将按钮和选择器视图拖放到视图上的任意位置（参见图 12-9）。\n\n\
  5.  选择“编辑器”>“解决自动布局问题”>“在子菜单的下半部分选择建议约束”。Xcode 会为按钮和选择器视图添加约束。\n\n6.  按如下方式编辑`class\
  \ ViewController`一行：\n\n```swift\nclass ViewController: UIViewController, UIPickerViewDataSource,\
  \ UIPickerViewDelegate {\n```\n\n这会使`ViewController.swift`文件成为选择器视图的数据源和委托。\n\n\
  7.  选择“视图”>“助理编辑器”>“显示助理编辑器”。Xcode 会并排显示`Main.storyboard`和`ViewController.swift`文件。\n\
  \n8.  将鼠标指针移到选择器视图上，按住`Control`键，并从选择器视图`Ctrl-拖移`到`ViewController.swift`文件中`class\
  \ ViewController`行下方。\n\n9.  松开`Control`键和鼠标左键。弹出窗口出现。\n\n10. 在“名称（Name）”文本字段中点击，输入`myPicker`，然后点击“连接（Connect）”按钮。Xcode\
  \ 会创建一个`IBOutlet`变量，如下所示：\n\n```swift\n@IBOutlet var myPicker: UIDatePicker!\n```\n\
  \n11. 在`IBOutlet`下方添加以下三行，以定义三个用于保存字符串数组的变量：\n\n```swift\nvar componentOne: [String]\
  \ = [String]()\nvar componentTwo: [String] = [String]()\nvar componentThree: [String]\
  \ = [String]()\n```\n\n12. 按如下方式编辑`viewDidLoad`方法：\n\n```swift\noverride func viewDidLoad()\
  \ {\n    super.viewDidLoad()\n    myPicker.delegate = self\n    myPicker.dataSource\
  \ = self\n    componentOne = [\"cat\", \"dog\", \"hamster\", \"lizard\", \"parrot\"\
  , \"goldfish\"]\n    componentTwo = [\"house\", \"apartment\", \"condo\", \"RV\"\
  ]\n    componentThree = [\"indoor\", \"outdoor\"]\n    // Do any additional setup\
  \ after loading the view, typically from a nib.\n}\n```\n\n这些代码行声明`ViewController.swift`文件既是选择器视图的委托又是其数据源。然后，它定义了三个字符串数组，这些数组将出现在选择器视图的每个组件中。\n\
  \n13. 在`viewDidLoad`方法下方，添加以下函数以定义选择器视图中将显示多少个组件。由于我们只显示单个滚轮选项，因此组件数量为一：\n\n```swift\n\
  func numberOfComponents(in pickerView: UIPickerView) -> Int {\n    return 3\n}\n\
  ```\n\n14. 在下方添加另一个函数，以定义选择器视图中将显示多少个项目。这个数字可以通过对三个不同的数组使用`.count`方法来找到，因此我们需要一个`switch`语句来定义每个组件中出现的元素数量。第一个组件将显示不同的宠物（如`\"\
  仓鼠\"`），第二个组件将显示不同的家（如`\"公寓\"`），第三个组件将显示不同的地点（如`\"室内\"`）。\n\n\n\n```swift\nfunc pickerView(_\
  \ pickerView: UIPickerView, numberOfRowsInComponent component: Int) -> Int {\n \
  \   switch component {\n    case 0: return componentOne.count\n    case 1: return\
  \ componentTwo.count\n    default: return componentThree.count\n    }\n}\n```\n\n\
  15. 在其下方添加第三个函数，用于在选取视图中显示数据：第一个组件（0）显示宠物，第二个组件（1）显示房屋，第三个组件（2）显示位置：\n\n```swift\n\
  func pickerView(_ pickerView: UIPickerView, titleForRow row: Int, forComponent component:\
  \ Int) -> String? {\n    switch component {\n    case 0: return componentOne[row]\n\
  \    case 1: return componentTwo[row]\n    default: return componentThree[row]\n\
  \    }\n}\n```\n\n16. 将鼠标指针移到按钮上，按住 Control 键，然后从按钮拖拽到文件底部最后一个花括号上方的 `ViewController.swift`\
  \ 文件中。\n\n17. 松开 Control 键和鼠标左键。此时会弹出一个窗口。\n\n18. 在“名称”文本框中点击，输入 `buttonTapped`，在“类型”弹出菜单中选择\
  \ `UIButton`，然后点击“连接”按钮。Xcode 会创建一个 `IBAction` 方法。\n\n19. 按如下方式编辑这个 `buttonTapped`\
  \ IBAction 方法：\n\n```swift\n@IBAction func buttonTapped(_ sender: UIButton) {\n\
  \    let petIndex = myPicker.selectedRow(inComponent: 0)\n    let homeIndex = myPicker.selectedRow(inComponent:\
  \ 1)\n    let placeIndex = myPicker.selectedRow(inComponent: 2)\n    let alert =\
  \ UIAlertController(title: \"Your Choice\", message: \"\\(componentOne[petIndex])\
  \ \\(componentTwo[homeIndex]) \\(componentThree[placeIndex])\", preferredStyle:\
  \ .alert)\n    let okAction = UIAlertAction(title: \"OK\", style: .default, handler:\
  \ { action -> Void in\n        //只需关闭操作表\n    })\n    alert.addAction(okAction)\n\
  \    self.present(alert, animated: true, completion: nil)\n}\n```\n\n`buttonTapped`\
  \ IBAction 方法中的三行代码会获取选取视图中当前显示选项的索引号（第一个项目的索引为 0，第二个项目的索引为 1，以此类推）。然后，它会使用这个索引值来确定在警告控制器中显示三个不同数组中的哪个项目。\n\
  \n整个 `ViewController.swift` 文件应如下所示：\n\n```swift\nimport UIKit\nclass ViewController:\
  \ UIViewController, UIPickerViewDataSource, UIPickerViewDelegate {\n    @IBOutlet\
  \ var myPicker: UIPickerView!\n    var componentOne: [String] = [String]()\n   \
  \ var componentTwo: [String] = [String]()\n    var componentThree: [String] = [String]()\n\
  \    override func viewDidLoad() {\n        super.viewDidLoad()\n        myPicker.delegate\
  \ = self\n        myPicker.dataSource = self\n        componentOne = [\"cat\", \"\
  dog\", \"hamster\", \"lizard\", \"parrot\", \"goldfish\"]\n        componentTwo\
  \ = [\"house\", \"apartment\", \"condo\", \"RV\"]\n        componentThree = [\"\
  indoor\", \"outdoor\"]\n        // 在此处执行任何额外的视图加载设置，通常来自 nib 文件。\n    }\n    func\
  \ numberOfComponents(in pickerView: UIPickerView) -> Int {\n        return 3\n \
  \   }\n    func pickerView(_ pickerView: UIPickerView, numberOfRowsInComponent component:\
  \ Int) -> Int {\n        switch component {\n        case 0: return componentOne.count\n\
  \        case 1: return componentTwo.count\n        default: return componentThree.count\n\
  \        }\n    }\n    func pickerView(_ pickerView: UIPickerView, titleForRow row:\
  \ Int, forComponent component: Int) -> String? {\n        switch component {\n \
  \       case 0: return componentOne[row]\n        case 1: return componentTwo[row]\n\
  \        default: return componentThree[row]\n        }\n    }\n    @IBAction func\
  \ buttonTapped(_ sender: UIButton) {\n        let petIndex = myPicker.selectedRow(inComponent:\
  \ 0)\n        let homeIndex = myPicker.selectedRow(inComponent: 1)\n        let\
  \ placeIndex = myPicker.selectedRow(inComponent: 2)\n        let alert = UIAlertController(title:\
  \ \"Your Choice\", message: \"\\(componentOne[petIndex]) \\(componentTwo[homeIndex])\
  \ \\(componentThree[placeIndex])\", preferredStyle: .alert)\n        let okAction\
  \ = UIAlertAction(title: \"OK\", style: .default, handler: { action -> Void in\n\
  \            //只需关闭操作表\n        })\n        alert.addAction(okAction)\n        self.present(alert,\
  \ animated: true, completion: nil)\n    }\n}\n```\n\n20. 点击“运行”按钮，或选择“产品” ➤ “运行”。模拟器屏幕会如图\
  \ 12-11 所示显示。\n\n![../images/329781_5_En_12_Chapter/329781_5_En_12_Fig11_HTML.jpg](img/329781_5_En_12_Fig11_HTML.jpg)\n\
  \n**图 12-11** 包含三个组件的选取视图\n\n21. 旋转选取视图，并从每个滚轮或组件中选择一个选项，例如仓鼠、公寓、户外。\n\n22. 点击按钮。此时会出现一个警告控制器，显示您在选取视图中选择的所有选项。\n\
  \n23. 点击按钮以关闭警告控制器。\n\n24. 重复步骤 20-22，并在选取视图中选择不同的选项。\n\n25. 选择“模拟器” ➤ “退出模拟器”以返回\
  \ Xcode。\n\n## 本章小结\n\n警告可以在屏幕中央（`.alert`）或屏幕底部（`.actionSheet`）显示信息。警告可以显示标题和下方较小字体的消息，并至少附带一个用于关闭警告的按钮。不过，警告也可以显示多个按钮，甚至一个文本字段。\n\
  \n根据用户点击的按钮，应用可以做出不同的响应。如果警告显示了一个文本字段，您可以自定义该文本字段的外观和行为，并存储其内容以供后续使用或操作。警告通过显示用户需要立即了解的重要信息来中断用户操作。\n\
  \n当您的应用需要向用户提供有限范围的选项时，可以使用日期选取器或选取视图。日期选取器允许用户选择不同的日期和时间。您可以根据需要定义检索到的日期和时间的格式（短格式或长格式）。选取视图允许您定义显示的选择类型，并支持多个组件或滚轮，以便用户选择多个选项。\n\
  \n当需要向用户显示信息并获取即时反馈时，请使用警告。当需要将用户的选择限制在有效的有限范围内时，请使用日期选取器或选取视图。\n\n# 13. 约束和堆栈视图\n\
  \n由于 iPhone 和 iPad 具有不同的屏幕尺寸，每个 iOS 应用都需要根据其运行的 iOS 设备类型适应这些不同的屏幕尺寸。要定义不同用户界面对象的位置和间距，可以使用约束。\n\
  \n约束可以定义以下内容：\n\n-   位置（例如屏幕中心）\n-   大小（例如对象的宽度或高度）\n-   距离（例如两个对象之间的间距）\n\n如果没有约束，用户界面上的对象可能在一个尺寸的\
  \ iOS 屏幕上看起来不错，但在另一个屏幕上却完全错位。这就是为什么需要为用户界面上的所有对象添加约束。\n\n添加约束最简单的方法是让 Xcode 为您完成。但是，您可能需要修改约束，因为\
  \ Xcode 并不总是能准确添加约束。您可以添加、删除和修改约束，直到您的用户界面在所有不同尺寸的 iOS 屏幕上看起来都完美。\n\n如果用户界面上有多个对象，添加多个约束可能会显得笨拙，尤其是在需要重新排列对象时。为了简化对单个对象添加约束的过程，您可以将对象组织到堆栈中。这样，您可以移动对象组，并对该组而不是组中的每个对象设置约束。\n\
  \n约束和堆栈视图都使得在用户界面上创建和组织对象变得容易，确保无论应用在哪种 iOS 屏幕尺寸上运行，它们都能正确显示。\n\n\n\n## 理解约束\n\n\
  约束通过三个标准来定义位置、大小或距离：\n\n*   `常量` – 定义约束的数值\n*   `优先级` – 定义哪些约束比其他约束更重要，范围从必需（1000）到高（750）再到低（250）\n\
  *   `乘数` – 乘以常量以定义约束的总值\n\n常量的三种选择是像 `37` 这样的数值、`标准值`或`画布值`，如图 13-1 所示。\n\n![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig1_HTML.jpg](img/329781_5_En_13_Fig1_HTML.jpg)\n\
  \n**图 13-1** — 在约束中定义常量的三种选项\n\n数值定义了一个特定的值，例如 `12` 或 `84`。当你创建约束时，Xcode 会使用数值。\n\
  \n`标准值` 使用 Xcode 推荐的值。由于你的应用可能运行在不同尺寸的 iOS 屏幕上，`标准值`通常是最安全的选择。\n\n`画布值` 与特定的数值类似，但它与故事板的当前\
  \ iOS 屏幕尺寸绑定。这意味着如果你的应用在另一个屏幕尺寸上运行，该约束可能无法保持对象的正确距离或位置。\n\n#### 注意\n作为编程中的一般原则，通常最好避免依赖被称为“魔术数字”的特定值。“魔术数字”表现为一个抽象的数值，不解释其含义或程序员是如何得出该值的。在大多数情况下，为约束使用`标准值`。\n\
  \n在定义约束的值时，有三种选择：\n\n*   `等于 (=)` – 约束必须精确等于特定值。\n*   `小于或等于 (≤)` – 约束可以小于或等于特定值。\n\
  *   `大于或等于 (≥)` – 约束可以大于或等于特定值。\n\n通过将约束定义为小于等于或大于等于某个值，你可以为约束提供更大的灵活性，使其即使在屏幕尺寸或方向发生变化时也能正常工作。\n\
  \n`优先级`定义了约束的重要性。默认情况下，每个约束都被分配为必需（1000）优先级。然而，当你添加多个约束时，两个或更多约束可能会冲突。例如，一个约束可以定义一个按钮距离左边缘\
  \ `97` 点，而第二个约束可能定义该按钮距离右边缘 `232` 点。\n\n当 iPhone 处于竖屏模式时，这可能工作得很好，但当你将其侧放至横屏模式时，保持距左\
  \ `97` 点和距右 `232` 点的距离意味着按钮必须在宽度上拉伸以满足这两个约束。如果按钮的宽度也被限制在某个尺寸（例如 `46` 点），那么所有三个约束将不可能同时工作，如图\
  \ 13-2 所示。\n\n![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig2_HTML.jpg](img/329781_5_En_13_Fig2_HTML.jpg)\n\
  \n**图 13-2** — 约束在不同方向或屏幕尺寸下可能相互冲突\n\n为了避免多个约束冲突，你可以为每个约束分配不同的优先级值。最重要的约束获得更高的值（例如\
  \ `1000`），而其他不太重要的约束获得较低的值（例如 `750` 或 `250`）。现在，Xcode 会先遵循最高优先级的约束，然后再尝试遵循较低优先级的约束。如果较低优先级的约束无法满足，那么较高优先级的约束将优先，而较低优先级的约束将被忽略。\n\
  \n`乘数`可以定义两个对象之间的百分比关系。默认乘数值是 `1`，但你可以更改它，使乘数值小于或大于 `1`，例如 `0.5` 或 `1.5`。\n\n对象通常需要两个或更多约束来准确地在用户界面上定义其大小和位置。当你向对象添加约束时，Xcode\
  \ 会使用颜色来告知你约束的有效程度。这些不同颜色的含义是：\n\n*   **蓝色** – 该对象拥有所有必要的约束，以准确地在用户界面上定义其大小和位置。\n\
  *   **橙色** – 该对象没有足够的约束来在用户界面上定义其大小和位置。\n*   **红色** – 该对象存在冲突的约束，需要修改或删除。\n\n当你添加约束时，Xcode\
  \ 还会在你选定的对象周围显示一个框架。该框架通常出现在对象的边框周围，但如果你应用了约束然后移动对象，你会看到该框架呈现为虚线矩形。该框架显示了对象将出现的位置，即使该对象出现在用户界面的其他位置，如图\
  \ 13-3 所示。\n\n![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig3_HTML.jpg](img/329781_5_En_13_Fig3_HTML.jpg)\n\
  \n**图 13-3** — 框架显示了因约束而对象将出现的位置\n\n要创建对象上的约束，请选择该对象，然后选择以下方法之一：\n\n\n\n*   选择 `Editor`\
  \ ➤ `Resolve Auto Layout Issues`，然后选取一个选项，让 Xcode 自动定义约束。\n*   点击 Xcode 窗口底部的 `Align`\
  \ 或 `Add new constraints` 图标。\n*   从一个对象 `Ctrl`-拖拽至另一个对象。\n\n`Resolve Auto Layout\
  \ Issues` 子菜单会在上半部分和下半部分显示相同的命令，如图 13-4 所示。上半部分的子菜单仅影响所选对象，而下半部分的子菜单则影响当前视图中显示的所有对象。\n\
  \n![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig4_HTML.jpg](img/329781_5_En_13_Fig4_HTML.jpg)\n\
  \n**图 13-4** `Resolve Auto Layout` 子菜单\n\n`Resolve Auto Layout Issues` 子菜单的可用选项包括：\n\
  \n*   `Update Frames` – 用于将对象移动到其框架所在的位置。\n*   `Update Constraint Constants` – 用于将框架和所有约束移动到对象的当前位置。\n\
  *   `Add Missing Constraints` – 为对象上的现有约束添加新约束。\n*   `Reset to Suggested Constraints`\
  \ – 删除所有现有约束，并添加 Xcode 认为对象需要的新约束。\n*   `Clear Constraints` – 删除对象上的所有约束。\n\n点击\
  \ `Align` 图标会显示一个弹出窗口，让您可以定义对象在视图中的位置，例如水平或垂直位置。如果您选择了两个或多个对象，可以按对象的侧边、顶部或底部将一个对象与另一个对象对齐，如图\
  \ 13-5 所示。\n\n![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig5_HTML.jpg](img/329781_5_En_13_Fig5_HTML.jpg)\n\
  \n**图 13-5** `Align` 弹出窗口\n\n点击 `Add new constraints` 图标会显示一个弹出窗口，让您可以定义尺寸（宽度和高度）以及到附近对象的距离，如图\
  \ 13-6 所示。如果您选择了两个或多个对象，还可以定义所有选中的对象具有相同的宽度或高度。\n\n![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig6_HTML.jpg](img/329781_5_En_13_Fig6_HTML.jpg)\n\
  \n**图 13-6** `Add new constraints` 弹出窗口\n\n为对象添加约束的第三种方式是：从对象 `Ctrl`-拖拽到屏幕边缘或另一个对象上。当您\
  \ `Ctrl`-拖拽并释放 `Control` 键和鼠标左键时，会弹出一个窗口，让您可以选择不同的约束，如图 13-7 所示。此弹出菜单中显示的可用约束会根据您\
  \ `Ctrl`-拖拽的位置而有所不同。\n\n![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig7_HTML.jpg](img/329781_5_En_13_Fig7_HTML.jpg)\n\
  \n**图 13-7** 当您 `Ctrl`-拖拽以创建约束时出现的弹出菜单\n\n要了解如何创建、编辑和删除约束以及使用框架，请按以下步骤操作：\n\n1.\
  \  使用 `Single View App` 模板创建一个新的 iOS 项目（参见第 1 章），并将此新项目命名为 `ConstraintApp`。这为用户界面创建了一个单一视图。\n\
  2.  在导航窗格中点击 `Main.storyboard` 文件。Xcode 会显示该单一视图。\n3.  点击 `Library` 图标打开 `Object\
  \ Library` 窗口。\n4.  在视图上的任意位置拖放一个按钮和一个标签。确保按钮位于标签的下方。\n5.  将鼠标指针移到按钮上，按住 `Control`\
  \ 键，然后 `Ctrl`-拖拽鼠标，直到鼠标指针出现在标签上方。\n6.  释放 `Control` 键和鼠标左键。会弹出一个窗口（见图 13-7）。\n7.\
  \  选择 `Vertical Spacing`。Xcode 会以红色显示此约束，提示您没有足够的约束来正确定义按钮在用户界面上的位置。\n8.  点击按钮以将其选中。\n\
  9.  点击 Xcode 窗口底部的 `Add new constraints` 图标。会弹出一个窗口。\n\n\n\n10.  点击屏幕右侧和底部表示约束的两条虚线，如图\
  \ 13-8 所示。\n\n![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig8_HTML.jpg](img/329781_5_En_13_Fig8_HTML.jpg)\n\
  \n图 13-8\n\n定义屏幕右侧和底部的约束\n\n11.  点击 `Add 2 Constraints` 按钮。Xcode 会添加两个新的约束。请注意，所有约束现在都以蓝色显示，这意味着该按钮已具备足够约束条件，无论应用在何种\
  \ iOS 设备上运行，都能正确放置。\n\n12.  将鼠标指针移到按钮上，然后将其拖拽到用户界面的新位置。请注意，Xcode 现在会显示一个虚线矩形来定义框架。该框架显示了应用运行时按钮将出现的位置，即便按钮当前显示在其他位置，如图\
  \ 13-9 所示。\n\n![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig9_HTML.jpg](img/329781_5_En_13_Fig9_HTML.jpg)\n\
  \n图 13-9\n\n框架显示了对象根据其约束将出现的位置\n\n13.  选择 `Editor` ➤ `Resolve Auto Layout Issues`\
  \ ➤ `Update Frames`。Xcode 会将按钮移动到框架所在的位置。\n\n14.  选择 `Edit` ➤ `Undo` 或按下 `Command\
  \ + Z`。Xcode 会将按钮移回先前的位置，并再次显示框架。\n\n15.  选择 `Editor` ➤ `Resolve Auto Layout Issues`\
  \ ➤ `Update Constraint Constants`。Xcode 会将按钮保留在当前位置，并更改其约束，以便按钮在当前位置显示。\n\n**注** `Update\
  \ Frames` 命令会将对象移回其框架，而 `Update Constraint Constants` 命令则会将框架和所有约束移动到对象的当前位置。\n\n\
  16.  按住 `SHIFT` 键，点击按钮和标签，将两者同时选中。\n\n17.  点击 Xcode 窗口底部的 `Align` 图标。此时会弹出一个窗口。\n\
  \n18.  选中 `Leading Edges` 复选框（前导边缘定义对象的左侧，而尾随边缘定义对象的右侧），如图 13-10 所示。\n\n19.  点击\
  \ `Add 1 Constraint` 按钮。注意，Xcode 会根据标签和按钮的前导（左侧）边缘对齐它们。\n\n![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig10_HTML.jpg](img/329781_5_En_13_Fig10_HTML.jpg)\n\
  \n图 13-10\n\n通过前导边缘对齐两个对象\n\n20.  点击按钮将其选中，然后选择 `View` ➤ `Inspectors` ➤ `Show Size\
  \ Inspector`，或者点击 Xcode 窗口右上角的 `Size Inspector` 图标。此时，在 `Constraints` 类别下会显示一个约束列表，如图\
  \ 13-11 所示。\n\n![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig11_HTML.jpg](img/329781_5_En_13_Fig11_HTML.jpg)\n\
  \n图 13-11\n\n约束显示在 `Size Inspector` 面板中\n\n21.  点击每条约束右侧出现的 `Edit` 按钮。此时会弹出一个窗口，列出该约束的常量、优先级和乘数数值，如图\
  \ 13-12 所示。\n\n![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig12_HTML.jpg](img/329781_5_En_13_Fig12_HTML.jpg)\n\
  \n图 13-12\n\n编辑约束\n\n22.  在 `Constant` 弹出菜单中点击，可以定义一个 `=`、`≤` 或 `≥` 关系。\n\n23. \
  \ 点击显示数值的文本字段右侧出现的向下箭头。此时会出现一个弹出菜单，允许你选择 `Standard Value` 或 `Canvas Value`。\n\n\
  24.  点击显示数值的 `Priority` 文本字段右侧出现的向下箭头。此时会出现一个弹出菜单，允许你选择不同的优先级。（你也可以随时在此文本字段中手动输入数值。）\n\
  \n25.  点击按钮，显示所有约束。\n\n26.  点击一个约束将其选中，然后按下 `BACKSPACE` 或 `DELETE` 键删除该约束。这样你可以删除单个约束。\n\
  \n27.  在子菜单底部选择 `Editor` ➤ `Resolve Auto Layout Issues` ➤ `Clear Constraints`。这将删除视图上所有对象的约束。\n\
  \n在此练习中，你学习了如何添加、编辑和删除约束。你设计的每个用户界面都必须定义约束，以确保无论应用在何种屏幕尺寸的设备上运行，对象都能在用户界面上正确显示。\n\
  \n\n\n## 使用堆栈视图\n\n当用户界面上有多个对象时，为所有对象定义约束可能会很麻烦。更糟的是，一旦你为多个对象定义了约束，之后可能还想将一个或多个对象移动到不同的位置，这意味着需要重新定义所有约束。\n\
  \n要使用堆栈视图，只需从`对象库`窗口中将一个堆栈视图拖放到视图上。然后将其他对象拖放到堆栈视图中。堆栈视图确保对象垂直或水平对齐，因此你只需要为堆栈视图本身添加约束。这样就无需为堆栈视图内部的对象添加约束。\n\
  \n你可以在堆栈视图中修改的一些属性包括：\n\n- `轴` – 垂直或水平显示对象\n- `对齐` – 定义对象在堆栈视图内的显示方式，包含以下选项：`填充`、`顶部`、`居中`、`底部`、`第一基线`和`最后基线`\n\
  - `分布` – 定义对象在堆栈视图内的显示方式，包含以下选项：`填充`、`均匀填充`、`等比填充`、`等间距`和`等中心距`\n- `间距` – 定义堆栈视图内对象之间的距离\n\
  \n更改`轴`可以让您定义对象在堆栈视图内的显示方式。`水平`将对象按行显示。`垂直`将对象按列显示，如图 13-13 所示。虽然`对象库`窗口提供了`水平堆栈视图`和`垂直堆栈视图`，但您只需修改`轴`属性即可改变任一堆栈视图的行为。\n\
  \n![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig13_HTML.jpg](img/329781_5_En_13_Fig13_HTML.jpg)\n\
  \n图 13-13\n\n堆栈视图的`属性检查器`面板\n\n`对齐`属性定义了对象在堆栈视图中的排列方式：\n\n- `填充` – 扩展所有对象的高度（水平堆栈）或宽度（垂直堆栈），以匹配最高或最宽的对象\n\
  - `居中` – 水平或垂直居中所有对象\n- `前导`（仅垂直堆栈） – 将所有对象对齐到堆栈视图的左侧\n- `尾随`（仅垂直堆栈） – 将所有对象对齐到堆栈视图的右侧\n\
  - `顶部`（仅水平堆栈） – 将所有对象对齐到堆栈视图的顶部\n- `底部`（仅水平堆栈） – 将所有对象对齐到堆栈视图的底部\n- `第一基线`（仅水平堆栈）\
  \ – 根据第一行文本的底部对齐所有对象（`第一基线`），如图 13-14 所示\n- `最后基线`（仅水平堆栈） – 根据最后一行文本的底部对齐所有对象（`最后基线`），如图\
  \ 13-15 所示\n\n![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig15_HTML.jpg](img/329781_5_En_13_Fig15_HTML.jpg)\n\
  \n图 13-15\n\n`最后基线`是最后一行文本的底部\n\n![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig14_HTML.jpg](img/329781_5_En_13_Fig14_HTML.jpg)\n\
  \n图 13-14\n\n`第一基线`是第一行文本的底部\n\n`分布`属性定义了对象如何在堆栈视图内调整自身大小：\n\n- `填充` – 堆栈视图会扩展或缩小，以确保所有对象可见。\n\
  - `均匀填充` – 调整所有对象的大小，使其基于最宽或最高的对象具有相同的宽度（水平堆栈）或高度（垂直堆栈）。\n- `等比填充` – 扩展或缩小堆栈视图，以保持内部所有对象的原始大小。\n\
  - `等间距` – 在堆栈视图中的所有对象之间添加相等的空间。\n- `等中心距` – 保持相邻对象中心之间的等距，同时保留由`间距`属性定义的值，以确定相邻对象之间的距离。\n\
  \n`间距`属性定义了堆栈视图中相邻对象边缘之间的距离。您无需直接调整堆栈视图的大小，而是可以通过修改其各种属性来调整它，使堆栈视图适应其包含的对象，并且在两端没有浪费的空间。\n\
  \n最终，堆栈视图的主要目的是将多个对象垂直排列成列或水平排列成行。这样，您就不必为多个对象创建约束，而只需为单个堆栈视图添加约束。\n\n\n\n#### 注意\n\
  \n与其他允许你定义高度和宽度的对象不同，栈视图会自动根据其内部存储的对象调整自身的高度和宽度。\n\n要了解如何使用栈视图，请遵循以下步骤：\n\n1. 使用单视图应用模板创建一个新的\
  \ iOS 项目（参见第 1 章），并将此新项目命名为 `StackViewApp`。这将为用户界面创建一个单视图。\n2. 在导航窗格中点击 `Main.storyboard`\
  \ 文件。Xcode 会显示该单视图。\n3. 点击库图标以打开对象库窗口。\n4. 在视图上拖放一个水平或垂直的栈视图，如图 13-16 所示。尽管栈视图显示为一个大型矩形，但其尺寸会根据你放入栈视图内的对象数量和类型进行调整。\n\
  \n![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig16_HTML.jpg](img/329781_5_En_13_Fig16_HTML.jpg)\n\
  \n*图 13-16* 对象库窗口中的水平和垂直栈视图\n\n5. 点击库图标以打开对象库窗口，并将以下项目拖放到栈视图中：\n   - 标签\n   - 按钮\n\
  \   - 文本字段\n\n由于当你向栈视图添加任何对象时，它会自动调整大小，因此你可以轻松地将一个对象直接拖放到用户界面上显示的栈视图中。之后，你需要通过将其他对象拖放到文档大纲中栈视图的下方来添加它们，如图\
  \ 13-17 所示。\n\n![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig17_HTML.jpg](img/329781_5_En_13_Fig17_HTML.jpg)\n\
  \n*图 13-17* 将对象拖放到文档大纲中\n\n6. 在文档大纲中点击栈视图以将其选中。\n7. 将鼠标指针移动到栈视图上，直到鼠标指针变为手型图标。然后拖动鼠标以移动栈视图。请注意，移动栈视图也会将所有对象作为一个整体一起移动。\n\
  8. 选择“视图”➤“检查器”➤“显示属性检查器”，或点击 Xcode 窗口右上角的属性检查器图标。将出现栈视图的属性检查器窗格（参见图 13-13）。\n9.\
  \ 点击“轴”弹出菜单并在水平和垂直之间来回切换。无论你最初使用的是水平还是垂直栈视图，之后你都可以通过更改其“轴”属性来修改其方向。\n10. 确保“轴”属性设置为垂直。然后点击“间距”文本字段并输入\
  \ `40`。\n11. 点击“对齐”弹出菜单并选择“填充”。这将使所有对象在宽度（垂直栈视图）或高度（水平栈视图）上扩展。\n12. 点击“分布”弹出菜单并选择“等间距”。请注意，Xcode\
  \ 会在栈视图内的所有对象之间创建间距，如图 13-18 所示。\n\n![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig18_HTML.jpg](img/329781_5_En_13_Fig18_HTML.jpg)\n\
  \n*图 13-18* “间距”属性在栈视图中的对象之间创建空白空间\n\n13. 点击“对齐”弹出菜单并选择“居中对齐”。请注意，栈视图现在将根据最大的对象定义其宽度，如图\
  \ 13-19 所示。\n\n![../images/329781_5_En_13_Chapter/329781_5_En_13_Fig19_HTML.jpg](img/329781_5_En_13_Fig19_HTML.jpg)\n\
  \n*图 13-19* 居中对齐根据最宽的对象定义栈宽度\n\n14. 点击“对齐”弹出菜单并选择“前导对齐”。请注意，栈视图将所有对象在左侧对齐。\n15.\
  \ 点击“对齐”弹出菜单并选择“尾随对齐”。请注意，栈视图将所有对象在右侧对齐。\n16. 点击“轴”弹出菜单并选择“水平”。\n17. 点击“对齐”弹出菜单并选择“顶部对齐”。请注意，栈视图将所有对象按其顶部对齐。\n\
  18. 点击“对齐”弹出菜单并选择“底部对齐”。请注意，栈视图将所有对象按其底部对齐。\n19. 点击“分布”弹出菜单并选择“均匀填充”。请注意，栈视图内的所有对象现在显示为相同宽度。尝试使用不同的选项，看看它们如何影响栈视图内对象的外观。\n\
  \n一旦你定义了栈视图内对象的外观，就可以对栈视图应用约束。栈视图允许你将对象组织成行或列，而无需对每个对象单独应用约束。\n\n## 小结\n\n设计用户界面涉及将对象放置到视图上。然而，这些对象的确切位置可能会根据应用程序运行的屏幕尺寸而改变。如果你为较大的屏幕设计用户界面，那么在较小的屏幕上查看时可能会显得过于拥挤。如果你为小屏幕设计用户界面，那么在较大的屏幕上可能会显得空旷且失衡。\n\
  \n为了确保用户界面在所有尺寸的屏幕上看起来都很好，你需要添加约束。约束可以定义对象的大小（宽度和高度）、位置或与附近对象的距离。你可以定义具体的数值和关系，例如等于、小于或等于、大于或等于。添加约束时，Xcode\
  \ 会使用颜色来让你知道约束是否足够（蓝色）、约束不足（橙色）或存在冲突的约束（红色）。\n\n任何时候，你都可以添加、删除或修改约束。由于对多个对象应用约束可能很麻烦，你可以通过将对象存储在栈视图中，将它们分组为垂直列或水平行。然后你可以对栈视图应用约束。\n\
  \n约束和栈视图提供了两种设计用户界面的方法，并确保无论应用程序运行在什么屏幕尺寸上，它们看起来都很好。\n\n# 14. 使用表视图\n\n表视图是最常见的用户界面对象之一，用于以行列表的形式显示大量信息。邮件和照片应用程序使用表视图让用户滚动浏览信息。表视图看起来就像一个无穷无尽的列表，因为当用户向上或向下滚动时，新的数据会不断地填充进来。表视图由单元格组成，这些单元格包含一个或多个对象，例如标签或图像视图，如图\
  \ 14-1 所示。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig1_HTML.jpg](img/329781_5_En_14_Fig1_HTML.jpg)\n\
  \n*图 14-1* 一个表视图由单元格组成，这些单元格在标签和图像视图等对象中显示数据\n\n要创建表视图，你可以从对象库窗口拖动一个表视图并将其放置到视图上。另一种替代方法是从对象库窗口拖动一个表视图控制器并将其放置为故事板的一部分。表视图控制器只不过是一个带有表视图的视图控制器。\n\
  \n要使用表视图，你需要执行以下操作：\n\n- 定义一个包含表视图要显示信息的单元格。\n- 定义一个数据源，用于将信息放入表视图的每个单元格中。\n- 定义一个委托（`.swift`\
  \ 文件），其中包含用于定义节数和行数，以及构成表视图的单元格的方法。\n\n\n\n## 创建简单的表格视图\n\n如果你已有现有视图，可以将`Table View`拖放到该视图上。有了表格视图后，必须用数据（来自数据源）填充它，并定义表格包含多少分区和行。数据可以来自任何地方，但每个数据块应包含相同数量的项。例如，如果你希望表格视图显示姓名和图片，那么每个数据块应包含文本（姓名）和图像（图片）。\n\
  \n要了解如何创建并填充表格视图，请按照以下步骤操作：\n\n1. 使用单视图应用模板创建一个新的 iOS 项目（见第 1 章），并将此新项目命名为`TableViewApp`。这将为用户界面创建一个单视图。\n\
  \n2. 在导航窗格中点击`Main.storyboard`文件。Xcode 会显示该单视图。\n\n3. 点击库图标以打开对象库窗口。\n\n4. 拖放一个表格视图，如图\
  \ 14-2 所示，放置在视图的任意位置。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig2_HTML.jpg](img/329781_5_En_14_Fig2_HTML.jpg)\n\
  \n图 14-2 对象库窗口中的表格视图\n\n5. 调整表格视图的大小，使其填满整个屏幕。\n\n6. 选择 编辑器 ➤ 解决自动布局问题 ➤ 重置为建议的约束。Xcode\
  \ 会为表格视图添加约束，如图 14-3 所示。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig3_HTML.jpg](img/329781_5_En_14_Fig3_HTML.jpg)\n\
  \n图 14-3 带有约束的表格视图\n\n7. 选择 视图 ➤ 辅助编辑器 ➤ 显示辅助编辑器，或点击 Xcode 窗口右上角的辅助编辑器图标。\n\n8.\
  \ 将鼠标指针移到表格视图上，按住 Control 键，并在`ViewController.swift`文件中的“class ViewController”行下方进行\
  \ Ctrl-拖拽。\n\n9. 松开 Control 键和鼠标左键。会弹出一个窗口。\n\n10. 点击名称文本字段，输入`petTable`，然后点击连接按钮。Xcode\
  \ 会创建一个`IBOutlet`，如下所示：\n\n```\n@IBOutlet var petTable: UITableView!\n```\n\n11.\
  \ 选择 视图 ➤ 标准编辑器 ➤ 显示标准编辑器，或点击 Xcode 窗口右上角的标准编辑器图标。\n\n12. 在导航窗格中点击`ViewController.swift`文件。\n\
  \n13. 修改类`ViewController`行，添加`UITableViewDelegate`、`UITableViewDataSource`，如下所示：\n\
  \n```\nclass ViewController: UIViewController, UITableViewDelegate, UITableViewDataSource\
  \ {\n```\n\n这段代码的目的是将`ViewController.swift`文件标识为表格视图的委托和数据源。\n\n14. 在类`ViewController`行的下方，添加以下数组：\n\
  \n```\nlet petArray = [\"cat\", \"dog\", \"parakeet\", \"parrot\", \"canary\", \"\
  finch\", \"tropical fish\", \"goldfish\", \"sea horses\", \"hamster\", \"gerbil\"\
  , \"rabbit\", \"turtle\", \"snake\", \"lizard\", \"hermit crab\"]\n```\n\n15. 在此数组下方，添加以下代码行：\n\
  \n```\nlet cellID = \"cellID\"\n```\n\n这段代码的目的是为单元格创建一个任意常量名称。表格视图由一行行单元格组成，因此我们需要标识单元格，以便稍后存储数据。\n\
  \n16. 按如下方式修改`viewDidLoad`方法：\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
  \    petTable.dataSource = self\n    petTable.delegate = self\n    // Do any additional\
  \ setup after loading the view, typically from a nib.\n}\n```\n\n这段代码的目的是定义表格（`IBOutlet\
  \ petTable`）从它所在的`ViewController.swift`文件（`self`）获取数据。此外，委托也被定义为`ViewController.swift`文件（`self`）。这意味着`ViewController.swift`文件需要包含定义表格需要多少行以及数据来源（即`petArray`）的函数。\n\
  \n17. 在`viewDidLoad`方法下方添加以下函数：\n\n```\nfunc tableView(_ tableView: UITableView,\
  \ numberOfRowsInSection section: Int) -> Int {\n    return petArray.count\n}\n```\n\
  \n这段代码定义了表格需要多少行。行数由`petArray`中存储项的总数决定。\n\n18. 在`viewDidLoad`方法下方添加以下函数：\n\n```\n\
  func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell\
  \ {\n    var cell = tableView.dequeueReusableCell(withIdentifier: cellID)\n    if\
  \ (cell == nil) {\n        cell = UITableViewCell(\n            style: UITableViewCell.CellStyle.default,\n\
  \            reuseIdentifier: cellID)\n    }\n    cell?.textLabel?.text = petArray[indexPath.row]\n\
  \    return cell!\n}\n```\n\n每当表格视图需要将数据放入行时，就会运行此函数。这可能发生在表格视图首次出现时，或者用户上下滚动以显示之前因一次无法显示所有数据而被隐藏的数据时。由于表格视图中的每一行都由一个单元格定义，因此需要创建一个具有名称的单元格：\n\
  \n```\nvar cell = tableView.dequeueReusableCell(withIdentifier: cellID)\n```\n\n\
  如果单元格为空，则`if`语句会定义单元格的样式，并赋予其任意的`cellID`名称来标识它：\n\n```\nif (cell == nil) {\n   \
  \ cell = UITableViewCell(\n        style: UITableViewCell.CellStyle.default,\n \
  \       reuseIdentifier: cellID)\n}\n```\n\n接着，它从`petArray`中获取数据，并根据单元格在表格视图中的位置（其行号），将这些数据存储在单元格`textLabel`的文本属性中。然后返回该单元格，使其显示在表格视图中：\n\
  \n```\ncell?.textLabel?.text = petArray[indexPath.row]\nreturn cell!\n```\n\n完整的`ViewController.swift`文件应如下所示：\n\
  \n```\nimport UIKit\nclass ViewController: UIViewController, UITableViewDelegate,\
  \ UITableViewDataSource {\n    @IBOutlet var petTable: UITableView!\n    let petArray\
  \ = [\"cat\", \"dog\", \"parakeet\", \"parrot\", \"canary\", \"finch\", \"tropical\
  \ fish\", \"goldfish\", \"sea horses\", \"hamster\", \"gerbil\", \"rabbit\", \"\
  turtle\", \"snake\", \"lizard\", \"hermit crab\"]\n    let cellID = \"cellID\"\n\
  \    override func viewDidLoad() {\n        super.viewDidLoad()\n        petTable.dataSource\
  \ = self\n        petTable.delegate = self\n        // Do any additional setup after\
  \ loading the view, typically from a nib.\n    }\n    func tableView(_ tableView:\
  \ UITableView, numberOfRowsInSection section: Int) -> Int {\n        return petArray.count\n\
  \    }\n    func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath)\
  \ -> UITableViewCell {\n        var cell = tableView.dequeueReusableCell(withIdentifier:\
  \ cellID)\n        if (cell == nil) {\n            cell = UITableViewCell(\n   \
  \             style: UITableViewCell.CellStyle.default,\n                reuseIdentifier:\
  \ cellID)\n        }\n        cell?.textLabel?.text = petArray[indexPath.row]\n\
  \        return cell!\n    }\n}\n```\n\n19. 点击运行按钮或选择 产品 ➤ 运行。模拟器窗口会出现，显示表格视图中的数据，如图\
  \ 14-4 所示。\n\n![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig4_HTML.jpg](img/329781_5_En_14_Fig4_HTML.jpg)\n\
  \n图 14-4 用数组数据填充后的表格视图\n\n20. 在表格视图中上下滚动，查看数据如何从屏幕顶部和底部滚动消失。\n\n21. 选择 模拟器 ➤ 退出模拟器，返回\
  \ Xcode。\n\n创建表格视图的基本步骤如下：\n\n- 从对象库窗口将表格视图拖放到视图上。\n- 将`.swift`文件定义为表格视图的委托和数据源。\n\
  - 创建或获取要存储在表格视图中的数据。\n- 编写一个函数，定义表格视图需要显示多少行。\n- 编写一个函数，将数据存储到表格视图的不同行中。\n\n\n好的，作为高级文档工程师和翻译员，我将严格遵守您提供的注意事项，将给定的英文文本翻译成符合\
  \ Markdown 格式的中文。\n\n\n在前一个例子中，我们通过在`ViewController.swift`文件中编写代码来创建并填充了一个表格视图。由于\
  \ Xcode 提供了多种方式（通过代码或可视化）来完成同一任务，接下来我们将看到如何用更少的代码复制完全相同的表格视图项目。\n\n我们将通过两种方式实现这一点。首先，我们将通过可视化方式定义委托和数据源，从而省略以下三行代码：\n\
  \n```swift\n@IBOutlet var petTable: UITableView!\npetTable.dataSource = self\npetTable.delegate\
  \ = self\n```\n\n接着，我们将从对象库窗口中拖放一个单元格到表格视图上，从而省略以下代码：\n\n```swift\nlet cellID =\
  \ \"cellID\"\nif (cell == nil) {\n    cell = UITableViewCell(\n        style: UITableViewCell.CellStyle.default,\n\
  \        reuseIdentifier: \"cellID\")\n}\n```\n\n减少创建应用所需的代码量，可以让您专注于编写使应用独具特色的代码。不过，减少代码的代价是，您必须意识到这些代码已被其他方式替代，而这些方式初看之下并不总是显而易见。\n\
  \n要了解如何以可视化方式创建表格视图，请按照以下步骤操作：\n\n1.  使用“单视图应用”模板创建一个新的 iOS 项目（参见第 1 章），并将这个新项目命名为`TableViewVisualApp`。这将为用户界面创建一个单视图。\n\
  \n2.  在导航面板中点击`Main.storyboard`文件。Xcode 会显示该单视图。\n\n3.  点击库图标打开对象库窗口。\n\n4.  将表格视图（见图\
  \ 14-2）拖放到视图上的任意位置。\n\n5.  调整表格视图的大小，使其填满整个屏幕。\n\n6.  选择 `Editor ➤ Resolve Auto\
  \ Layout Issues ➤ Reset to Suggested Constraints`。Xcode 会为表格视图添加约束（见图 14-3）。\n\n\
  7.  点击库图标打开对象库窗口。然后拖放一个表格视图单元格到顶部，如图 14-5 所示。\n\n    ![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig5_HTML.jpg](img/329781_5_En_14_Fig5_HTML.jpg)\n\
  \n    图 14-5\n\n    将表格视图单元格拖到表格视图上\n\n8.  选择 `View ➤ Inspectors ➤ Show Attributes\
  \ Inspector`，或者点击 Xcode 窗口右上角的属性检查器图标。\n\n9.  点击标识符文本字段（如图 14-6 所示），输入**cellID**（您可以给它任意名称），然后按回车键。\n\
  \n    ![../images/329781_5_En_14_Chapter/329781_5_En_14_Fig6_HTML.jpg](img/329781_5_En_14_Fig6_HTML.jpg)\n\
  \n    图 14-6\n\n    属性检查器中的标识符文本字段\n\n10. 点击表格视图以将其选中，然后选择 `View ➤ Inspectors ➤\
