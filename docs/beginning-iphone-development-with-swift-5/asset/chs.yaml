  \n\n\n## 适配不同屏幕尺寸\n\n在设计用户界面时，你需要选择 iOS 设备的屏幕和方向，例如竖屏模式的 iPhone 8 或横屏模式的 iPad。由于你的\
  \ iOS 应用可能会在不同 iOS 设备上运行，因此需要在所有不同的屏幕尺寸和方向下对应用进行测试。\n\n`Xcode` 提供了三种不同的方式，让你能够在不同的\
  \ iOS 设备屏幕尺寸和方向下查看应用的用户界面：\n\n*   点击 `Xcode` 窗口底部的“视图为：”文本，然后选择不同的 iOS 设备屏幕尺寸和方向。\n\
  *   为模拟器选择不同的 iOS 设备和方向进行模拟。\n*   在 `Xcode` 中预览你的视图。\n\n第一种方式（点击“视图为：”文本）可让你在不同\
  \ iOS 屏幕尺寸和方向之间快速切换。第二种方式（使用模拟器）则能让你测试应用，就像它在真实 iOS 设备上运行一样。\n\n你可能会在设计用户界面时使用第一种方式，然后用第二种方式来验证一切是否正常。接下来，让我们看看如何在我们的单视图应用项目中测试不同的屏幕尺寸和方向：\n\
  \n1.  确保你已在 `Xcode` 中加载了 `MyFirstApp` 项目。\n2.  在导航区域中点击 `Main.storyboard` 文件。`Xcode`\
  \ 会显示项目的故事板。\n3.  点击 `Xcode` 窗口底部的“视图为：”文本，显示不同的 iOS 设备和方向选项，如图 2-17 所示。\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig17_HTML.jpg](img/329781_5_En_2_Fig17_HTML.jpg)\n\
  \n图 2-17. 选择不同的 iOS 设备屏幕尺寸和方向\n\n4.  点击一个 iPad Pro 图标。请注意，`Xcode` 会更改故事板以匹配 iPad\
  \ Pro 屏幕的尺寸，如图 2-18 所示。（你可能需要点击减号图标来降低放大比例，以便看到整个 iPad Pro 屏幕。）\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig18_HTML.jpg](img/329781_5_En_2_Fig18_HTML.jpg)\n\
  \n图 2-18. 在 iPad Pro 屏幕上查看应用用户界面\n\n5.  点击较小的 iPhone SE 图标。请注意 `Xcode` 现在如何显示你的用户界面，以展示它在较小的\
  \ iPhone SE 屏幕上的效果，如图 2-19 所示。\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig19_HTML.jpg](img/329781_5_En_2_Fig19_HTML.jpg)\n\
  \n图 2-19. 在较小的 iPhone SE 屏幕上查看应用用户界面\n\n6.  在 `Xcode` 窗口的左上角找到项目名称（`MyFirstApp`），其后跟着\
  \ iOS 设备名称，例如 iPhone XR，如图 2-20 所示。\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig20_HTML.jpg](img/329781_5_En_2_Fig20_HTML.jpg)\n\
  \n图 2-20. 识别模拟器将要模拟的 iOS 设备类型\n\n7.  点击 `Xcode` 窗口左上角当前显示的 iOS 设备名称。此时会出现一个显示不同\
  \ iOS 设备的菜单，如图 2-21 所示。\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig21_HTML.jpg](img/329781_5_En_2_Fig21_HTML.jpg)\n\
  \n图 2-21. 查看模拟器可模拟的不同 iOS 设备\n\n8.  点击一个与 `Xcode` 窗口左上角当前显示的 iOS 设备不同的设备，例如 iPad\
  \ Air 或 iPhone 8 Plus。一旦你为模拟器选择了一个 iOS 设备，就需要运行模拟器。\n9.  选择 `Product ➤ Run`，按下 `Command\
  \ + R`，或点击运行图标。模拟器窗口出现，并模拟你选择的 iOS 设备。\n10. 点击硬件菜单，你会看到更改 iOS 设备方向的选项，例如向左旋转或向右旋转，如图\
  \ 2-22 所示。\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig22_HTML.jpg](img/329781_5_En_2_Fig22_HTML.jpg)\n\
  \n图 2-22. 模拟器程序的硬件菜单\n\n11. 选择 `Simulator ➤ Quit Simulator`。`Xcode` 窗口再次出现。\n\n\
  通过在不同的 iOS 设备屏幕尺寸和方向下查看用户界面，你可以确保你的应用显示正确。由于你很可能无法拥有所有可能的 iOS 设备来测试应用，你将需要依赖 `Xcode`\
  \ 和模拟器程序来帮助验证你的应用在任何屏幕尺寸和方向上都能呈现出应有的效果。\n\n## 预览用户界面\n\n另一种查看应用在不同 iOS 设备屏幕尺寸上显示效果的方法是使用预览功能。这允许你在故事板中选择一个控制器，然后查看该控制器在不同类型\
  \ iOS 设备上的显示效果。\n\n要了解如何预览控制器，请按照以下步骤操作：\n\n1.  确保你已在 `Xcode` 中加载了 `MyFirstApp`\
  \ 项目。\n2.  在导航区域中点击 `Main.storyboard` 文件。\n3.  选择 `View ➤ Assistant Editor ➤ Show\
  \ Assistant Editor` 或点击助理编辑器图标。`Xcode` 会将 `Main.storyboard` 文件与 `ViewController.swift`\
  \ 文件并排显示，如图 2-23 所示。\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig23_HTML.jpg](img/329781_5_En_2_Fig23_HTML.jpg)\n\
  \n图 2-23. 打开助理编辑器\n\n4.  点击 `.swift` 文件顶部出现的双圆圈图标。此时会弹出一个菜单，如图 2-24 所示。\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig24_HTML.jpg](img/329781_5_En_2_Fig24_HTML.jpg)\n\
  \n图 2-24. 显示双圆圈菜单\n\n5.  选择 `Preview ➤ Main.storyboard (Preview)`。`Xcode` 会在你当前选择的\
  \ iOS 设备上显示你的用户界面，如图 2-25 所示。\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig25_HTML.jpg](img/329781_5_En_2_Fig25_HTML.jpg)\n\
  \n图 2-25. 预览用户界面\n\n6.  点击添加设备图标（`+`）。此时会弹出一个菜单，列出所有可供选择的 iOS 设备，如图 2-26 所示。\n\n\
  ![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig26_HTML.jpg](img/329781_5_En_2_Fig26_HTML.jpg)\n\
  \n图 2-26. 添加设备图标显示一个列出不同 iOS 设备的菜单，用于预览用户界面\n\n7.  点击一个 iOS 设备，例如 iPad Pro。预览面板会显示你的用户界面在你所选设备上的效果，如图\
  \ 2-27 所示。\n\n![../images/329781_5_En_2_Chapter/329781_5_En_2_Fig27_HTML.jpg](img/329781_5_En_2_Fig27_HTML.jpg)\n\
  \n图 2-27. 在多个 iOS 设备上显示预览\n\n8.  点击某个预览，然后按 `BACKSPACE` 或 `DELETE` 键将其移除。\n9.  点击预览面板右上角的关闭图标，使预览面板消失。\n\
  \n通过使用预览面板，你可以看到用户界面在不同尺寸 iOS 设备上的显示效果。更棒的是，你还可以对不同尺寸的屏幕进行并排比较。\n\n\n\n## 摘要\n\n\
  每个应用都需要一个用户界面。这个用户界面会被存储在故事板中，而故事板由一个或多个视图组成，其中每个视图代表在单个屏幕上显示的信息。你可以在视图上添加按钮、文本字段、标签和滑块等对象。如果你有两个或更多视图，还需要使用转场（segues）来连接这些视图，以显示它们呈现给用户的顺序。\n\
  \n你可以通过编程（编写代码）或可视化方式向视图添加对象。程序员通常结合使用这两种方法来设计他们的用户界面。你可以通过代码或检查器面板来自定义对象（按钮、标签、文本字段等）。故事板中的每个视图都需要链接到一个`.swift`文件。\n\
  \n由于 iOS 应用可以在不同类型的设备上运行，你需要确保你的应用无论屏幕尺寸或方向如何都能看起来美观。为了帮助你查看应用在不同屏幕尺寸和方向下的用户界面，你可以更改\
  \ Xcode 用于显示故事板的 iOS 设备屏幕尺寸。\n\n在不同屏幕尺寸下测试应用用户界面的另一种方法是运行模拟器程序，并将其设置为模仿不同的 iOS 设备，例如\
  \ iPad Pro 或 iPhone 8。如果你想要比较应用在不同 iOS 设备屏幕上的显示效果，可以使用预览功能。\n\n用户界面代表了用户所看到的内容，所以无论用户运行的是哪种\
  \ iOS 设备，你的用户界面始终保持美观这一点非常重要。\n\n"
- "# 3. 编写 Swift 代码\n\n每个 iOS 应用都需要一个用户界面，但除非你编写 Swift 代码让它工作，否则这个用户界面不会起任何作用。虽然你可以将所有代码写在一个文件中，但更好的做法是将代码划分到不同的文件中，让每个文件包含相关的代码。一个简单的应用可能只包含少数几个文件，但一个更复杂的应用可能包含数十个甚至数百个包含相关\
  \ Swift 代码的独立文件。在每个文件中，你可以进一步将 Swift 代码组织成不同的函数。\n\n编写 Swift 代码是必要的，用于：\n\n- 从用户界面检索数据\n\
  - 根据检索到的数据计算结果\n- 将该结果显示回用户界面\n\n要从用户界面检索数据，你需要定义称为`IBOutlets`的特殊变量。`IBOutlet`是一个代表用户界面上显示的对象的变量。通过`IBOutlet`，你的其余\
  \ Swift 代码可以以某种方式访问和操作这些数据。\n\n要根据检索到的数据计算结果，你可以编写 Swift 代码来操作数据，但更常见的是同时使用苹果的框架。苹果的框架包含数十个函数，你可以用它们来执行常见任务。这样你就可以使用经过测试的代码，从而花更多时间编写能让你的应用实现有用且独特功能的代码。\n\
  \n要让你的应用执行某些操作，你可以创建称为`IBActions`的特殊函数。`IBAction`使一个用户界面对象具有交互性，例如响应用户点击按钮、在文本字段中输入文本或操作滑块等操作。\n\
  \n一旦你的应用完成计算某些结果，最后一步是将结果显示回用户界面。为此，你将数据存储回`IBOutlet`变量中，以便数据可以出现在用户界面上。\n\n`IBOutlet`变量和`IBAction`函数存储在链接到视图控制器的`.swift`文件中，该视图控制器显示与`IBOutlet`变量或`IBAction`函数连接的用户界面对象。请记住，每个视图控制器都链接到一个`.swift`文件。\n\
  \n要了解`IBOutlets`和`IBAction`函数如何工作，请遵循以下步骤：\n\n1. 打开你的`MyFirstApp`项目（或创建一个新的单视图应用\
  \ iOS 项目）。\n2. 在导航器面板中点击`Main.storyboard`文件。中间的 Xcode 面板会显示你的应用用户界面的内容。它应该显示一个按钮和一个标签。\n\
  3. 点击库图标打开对象库窗口。然后输入`text field`。\n4. 将文本字段从对象库窗口拖到用户界面，如图 3-1 所示。\n\n   ![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig1_HTML.jpg](img/329781_5_En_3_Fig1_HTML.jpg)\n\
  \n   图 3-1. 向视图添加文本字段\n\n5. 调整文本字段的宽度使其更宽。确切的宽度并不重要。此时，你的用户界面应该由一个标签、一个文本字段和一个按钮组成。如果我们运行这个应用，用户可以点击按钮或在文本字段中输入，但什么都不会发生。这是因为我们还没有编写任何\
  \ Swift 代码来让任何功能生效。\n\n## 创建 IBOutlet 变量\n\n`IBOutlet` 无非是一个将你的 Swift 代码连接到用户界面对象（如文本字段或标签）的变量。通过使用\
  \ `IBOutlet`，你可以从用户界面对象检索数据，或者将信息放入该用户界面对象中以供显示。\n\n在 Swift 中创建变量时，你通常需要声明一个变量名及其可以持有的数据类型，例如：\n\
  \n```\nvar age : Int\n```\n\n上述代码声明了一个名为 `age` 的变量，它可以持有整型 (`Int`) 值。当你创建 `IBOutlets`\
  \ 时，你也必须声明一个变量名。两个不同之处在于，你还必须将该变量标识为 `IBOutlet`，并且必须将其类型声明为用户界面对象，例如：\n\n```\n@IBOutlet\
  \ var age: UITextField!\n```\n\n要标识一个 `IBOutlet`，你必须在 `var` 前使用 `@IBOutlet`。接下来，你必须定义该\
  \ `IBOutlet` 连接到的用户界面对象的类型。在前面的示例中，`age` `IBOutlet` 连接到了一个文本字段 (`UITextField`)。`IBOutlet`\
  \ 可以连接到的其他一些常见的用户界面对象类型包括 `UILabel`、`UIButton` 或 `UISlider`。\n\n\n\n#### 注意\n\n\
  任何需要检索或显示数据的用户界面对象，都必须连接到一个唯一的`IBOutlet`变量。不过，如果某些用户界面对象不用于检索或显示数据，则无需连接到`IBOutlet`。\n\
  \n创建`IBOutlet`的一种方法是手动编写代码。之后，你需要将代码中的`IBOutlet`与故事板上的用户界面对象进行链接。第二种方法是，先从用户界面对象创建一条到你的`.swift`文件的链接，然后只输入`IBOutlet`变量名，由\
  \ Xcode 替你完成其余代码的编写。\n\n要将代码链接到故事板，我们需要使用一个名为“助理编辑器”的功能，将 Xcode 的中间窗格一分为二。这样，故事板就会与一个`.swift`文件并排显示。下面来看看具体操作。\n\
  \n1.  打开在视图上显示了一个标签、按钮和文本字段的 `MyFirstApp` 项目（见图 3-1）。首先，我们查看一下这个应用程序的用户界面。\n\n2.\
  \  在导航器窗格中，点击 `Main.storyboard` 文件。Xcode 的中间窗格会显示包含用户界面的应用程序故事板。\n\n3.  点击控制器图标（一个内含白色矩形的黄色圆圈），它位于文档大纲中，或视图顶部（如图\
  \ 3-2 所示）。这样会选中包含要链接的用户界面对象的控制器。在我们这个简单的应用程序中，只有一个控制器；但在更复杂的应用程序中，会有多个控制器，因此你需要告诉\
  \ Xcode 你要使用哪一个。\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig2_HTML.jpg](img/329781_5_En_3_Fig2_HTML.jpg)\n\
  \n**图 3-2.** 选择一个控制器\n\n4.  选择 **视图 ➜ 助理编辑器 ➜ 显示助理编辑器**，或点击助理编辑器图标。Xcode 会显示该控制器及其链接到的`.swift`文件，如图\
  \ 3-3 所示。\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig3_HTML.jpg](img/329781_5_En_3_Fig3_HTML.jpg)\n\
  \n**图 3-3.** 打开助理编辑器\n\n5.  在 `ViewController.swift` 文件中点击，然后输入 `@IBOutlet var labelResult:\
  \ UILabel!`。因此，`ViewController.swift` 文件中的全部代码应该是这样的：\n\n```\nimport UIKit\nclass\
  \ ViewController: UIViewController {\n    @IBOutlet var labelResult: UILabel!\n\
  \    override func viewDidLoad() {\n        super.viewDidLoad()\n    }\n}\n```\n\
  \n请注意，在你新建的 `IBOutlet` 左侧会出现一个空心圆圈，如图 3-4 所示。这个空心圆圈代表指向你用户界面对象的链接。因为它是空心的，所以意味着这个\
  \ `IBOutlet` 尚未链接到任何用户界面对象。\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig4_HTML.jpg](img/329781_5_En_3_Fig4_HTML.jpg)\n\
  \n**图 3-4.** 一个尚未链接到用户界面对象的 `IBOutlet`\n\n6.  将鼠标指针移到这个空心圆圈上，按住鼠标左键，然后拖动鼠标，直到它出现在故事板或文档大纲中的标签上方，如图\
  \ 3-5 所示。\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig5_HTML.jpg](img/329781_5_En_3_Fig5_HTML.jpg)\n\
  \n**图 3-5.** 将 `IBOutlet` 链接到用户界面对象\n\n7.  松开鼠标左键。将鼠标指针移到 `IBOutlet` 左侧的圆圈上（此时圆圈应该不再是空心的）。Xcode\
  \ 会高亮显示链接到该 `IBOutlet` 的用户界面对象，并在其下方显示该 `IBOutlet` 的名称，如图 3-6 所示。\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig6_HTML.jpg](img/329781_5_En_3_Fig6_HTML.jpg)\n\
  \n**图 3-6.** 验证 `IBOutlet` 与用户界面对象之间的连接\n\n8.  点击故事板或文档大纲中的标签以将其选中。然后选择 **视图 ➜ 检查器\
  \ ➜ 显示连接检查器**，或点击**显示连接检查器**图标。Xcode 会显示 `labelResult` 这个 `IBOutlet` 已连接到 `ViewController.swift`\
  \ 文件，如图 3-7 所示。\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig7_HTML.jpg](img/329781_5_En_3_Fig7_HTML.jpg)\n\
  \n**图 3-7.** 在连接检查器中验证 `IBOutlet` 已连接到用户界面对象\n\n编写代码是创建 `IBOutlet` 的一种方式，但你需要知道你要连接的是何种类型的用户界面对象，例如\
  \ `UITextField` 或 `UILabel`。一种更快更简单的创建 `IBOutlet` 的方法是，按住 Control 键，从用户界面对象（比如文本字段或标签）拖拽到\
  \ `.swift` 文件中。我们将对文本字段使用这种方法。\n\n1.  将鼠标移到故事板或文档大纲中的文本字段上，按住 Control 键，然后按住 Control\
  \ 键从文本字段拖拽到 `ViewController.swift` 文件中现有 `IBOutlet` 下方的区域，如图 3-8 所示。\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig8_HTML.jpg](img/329781_5_En_3_Fig8_HTML.jpg)\n\
  \n**图 3-8.** 按住 Control 键从用户界面对象拖拽到 `.swift` 文件\n\n2.  当一条水平线出现在 `.swift` 文件内部时，松开\
  \ Control 键和鼠标左键。会弹出一个窗口，如图 3-9 所示。\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig9_HTML.jpg](img/329781_5_En_3_Fig9_HTML.jpg)\n\
  \n**图 3-9.** 使用属性检查器窗格自定义标签上显示的文本\n\n3.  点击**名称**文本字段，输入 `textMessage`。你为这个 `IBOutlet`\
  \ 起的名称可以任意。\n\n4.  点击**连接**按钮。Xcode 会在你的 `.swift` 文件中创建一个 `IBOutlet`：\n\n```\n@IBOutlet\
  \ var textMessage: UITextField!\n```\n\n请注意，当你按住 Control 键从故事板或文档大纲中的用户界面对象拖拽时，Xcode\
  \ 会自动输入大部分必要的代码。你只需要为你的 `IBOutlet` 输入一个描述性的名称即可。由于这种方法减少了输入量（从而降低了出错的可能性），因此使用这种\
  \ Ctrl-拖拽方法创建 `IBOutlet` 通常更简单、更可靠。\n\n1.  右键点击文本字段。Xcode 会显示一个弹出菜单，展示连接检查器，如图 3-10\
  \ 所示。右键点击对象可能比打开连接检查器窗格更快。\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig10_HTML.jpg](img/329781_5_En_3_Fig10_HTML.jpg)\n\
  \n**图 3-10.** 右键点击用户界面对象会显示连接检查器\n\n2.  点击弹出菜单左上角的**关闭 (X)** 图标使其消失。\n\n3.  选择 **视图\
  \ ➜ 标准编辑器 ➜ 显示标准编辑器**，或点击**标准编辑器**图标，如图 3-11 所示。标准编辑器会出现，在 Xcode 的中间窗格中仅显示一个文件的内容。\n\
  \n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig11_HTML.jpg](img/329781_5_En_3_Fig11_HTML.jpg)\n\
  \n**图 3-11.** 返回标准编辑器\n\n至此，我们已经将标签和文本字段连接到了两个不同的 `IBOutlet`。这使得我们能够从用户界面检索数据，并在用户界面上显示新信息。当然，`IBOutlet`\
  \ 仅仅代表用户界面对象，但要使应用程序真正具有交互性，我们需要创建名为 `IBAction` 的方法。\n\n\n\n#### 注意\n\n在开发 iOS 应用时，忘记将\
  \ `IBOutlets` 连接到用户界面对象（或将 `IBOutlets` 连接到错误的对象）是常见的错误来源。每当你感觉用户界面工作不正常时，请打开连接检查器面板，检查你的\
  \ `IBOutlets` 是否已正确连接。\n\n## 创建 IBAction 方法\n\n如果我们现在运行应用，用户会在屏幕上看到一个按钮，但该按钮不会执行任何操作。要使用户界面的任何部分真正工作，我们需要创建\
  \ `IBAction` 方法。\n\n`IBAction` 方法包含 Swift 代码，每当用户与用户界面上的对象（如按钮、滑块或开关）交互时，这些代码就会运行。`IBAction`\
  \ 方法让用户能够使应用执行有用的操作。\n\n要创建一个 `IBAction` 方法，你需要使用助理编辑器，将故事板与链接到特定控制器的 `.swift` 文件并排显示。让我们看看这是如何工作的。\n\
  \n1. 在导航窗格中点击 `Main.storyboard` 文件。Xcode 的中间窗格会显示包含应用用户界面的故事板。\n\n2. 在文档大纲中或视图顶部（见图\
  \ 3‑2）点击控制器图标（一个内含白色方块的黄色圆圈）。这将选中包含要链接的用户界面对象的控制器。\n\n3. 选择 视图 ➤ 助理编辑器 ➤ 显示助理编辑器，或点击助理编辑器图标。Xcode\
  \ 会显示该控制器及其所链接的 `.swift` 文件（见图 3‑3）。\n\n4. 点击按钮以选中它。\n\n5. 按住 Control 键，并从该按钮向 `ViewController.swift`\
  \ 文件中最后一个花括号上方的区域进行 Ctrl‑拖拽，如图 3‑12 所示。\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig12_HTML.jpg](img/329781_5_En_3_Fig12_HTML.jpg)\n\
  \n图 3-12. 从按钮向 `.swift` 文件进行 Ctrl‑拖拽\n\n6. 松开 Control 键和鼠标左键。会弹出一个窗口。确保“连接”弹出菜单显示为“Action”。\n\
  \n**注意** 一个常见的错误是创建了 `IBOutlet` 变量（当“连接”弹出菜单显示为“Outlet”时），而不是 `IBAction` 方法（当“连接”弹出菜单显示为“Action”时）。务必检查“连接”弹出菜单，确保它根据你想要创建的内容显示为“Outlet”或“Action”。\n\
  \n7. 点击“名称”文本框，并输入 `changeButton`。\n\n8. 点击“类型”弹出菜单，并选择 `UIButton`，如图 3‑13 所示。\n\
  \n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig13_HTML.jpg](img/329781_5_En_3_Fig13_HTML.jpg)\n\
  \n图 3-13. 属性检查器允许你自定义场景的显示方式\n\n9. 点击“连接”按钮。Xcode 会创建一个 `IBAction` 方法：\n\n```swift\n\
  @IBAction func changeButton(_ sender: UIButton) {\n}\n```\n\n每当用户点击该按钮时，此 `IBAction`\
  \ 方法就会运行。现在我们需要在此 `IBAction` 方法内部编写 Swift 代码，使其真正执行某些操作。\n\n10. 按如下方式修改此 `IBAction`\
  \ 方法：\n\n```swift\n@IBAction func changeButton(_ sender: UIButton) {\n    labelResult.text\
  \ = textMessage.text\n}\n```\n\n请注意，在你输入时，Xcode 会显示一个命令列表，它认为你想要输入这些命令，如图 3‑14 所示。你无需输入完整的命令，只需选择所需的命令并按回车键，即可让\
  \ Xcode 自动为你输入该命令。\n\n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig14_HTML.jpg](img/329781_5_En_3_Fig14_HTML.jpg)\n\
  \n图 3-14. Xcode 的自动补全功能会尝试猜测你想要输入的命令\n\n上述 `IBAction` 方法的代码只是获取 `textMessage` `IBOutlet`（已连接到文本字段）中存储的文本，并将其显示在\
  \ `labelResult` `IBOutlet`（已连接到标签）中。让我们看看它实际是如何工作的。\n\n1. 选择 产品 ➤ 运行，或点击运行按钮。模拟器会出现。\n\
  \n2. 点击文本字段，并输入 `Hello there!`。\n\n3. 点击按钮。请注意，现在标签显示了 `Hello there!`，如图 3‑15 所示。\n\
  \n![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig15_HTML.jpg](img/329781_5_En_3_Fig15_HTML.jpg)\n\
  \n图 3-15. 在模拟器中运行应用\n\n4. 选择 模拟器 ➤ 退出模拟器。Xcode 窗口会再次出现。\n\n5. 选择 视图 ➤ 标准编辑器 ➤ 显示标准编辑器，或点击标准编辑器图标（见图\
  \ 3‑11）。标准编辑器会显示，并在 Xcode 中间窗格中仅显示一个文件的内容。\n\n此示例演示了编写 Swift 代码的几个关键原则：\n\n* 每个需要检索或显示数据的用户界面对象都必须连接到一个\
  \ `IBOutlet` 变量。\n\n* 每个用户与之交互的用户界面对象都必须连接到一个 `IBAction` 方法。\n\n* 助理编辑器可帮助你创建 `IBOutlet`\
  \ 变量和 `IBAction` 方法。\n\n* 在你输入 Swift 代码时，Xcode 会显示它认为你想要输入的命令列表。\n\n\n\n## 使用 Apple\
  \ 框架\n\n虽然可以编写 Swift 代码来执行各种任务，但通常使用 Apple 的框架会更简单。Apple 提供了许多常用功能，因此你无需重新发明轮子，重写\
  \ Apple 已经为你写好的代码。这让你可以使用 Apple 经过验证和测试的代码，从而使你的应用程序更可靠。\n\n在我们的示例中，应用程序只是将文本字段中输入的任何文本显示在标签中。现在让它变得更酷一些：让标签获取文本字段中输入的任何文本，并以大写形式显示相同的文本。\n\
  \n为此，我们可以编写 Swift 代码来替换每个字母，并将其替换为大写字母，但这需要时间编写，甚至需要更多时间测试。更简单的替代方案是，我们可以直接使用 Apple\
  \ 框架提供的一个名为 `uppercased()` 的特殊函数。\n\n这个 `uppercased()` 函数已经可以工作，并且不需要我们编写自己的代码来将小写字母替换为大写字母，因此它将节省我们的时间并提高应用程序的可靠性。作为一般规则，尽可能依赖\
  \ Apple 的框架，只有在 Apple 框架无法帮助你时才编写代码。\n\n要使用 Apple 框架，你必须将其导入到你的 `.swift` 文件中。如果你查看\
  \ `AppDelegate.swift` 或 `ViewController.swift` 文件，你会看到以下一行：\n\n```swift\nimport\
  \ UIKit\n```\n\n上面这一行允许该特定文件使用存储在 `UIKit` 框架中的任何代码。更复杂的应用程序通常会使用多个框架，例如：\n\n```swift\n\
  import UIKit\nimport SceneKit\nimport ARKit\n```\n\n上面的代码允许访问存储在 `UIKit`、`SceneKit`\
  \ 和 `ARKit` 框架中的代码。每当你需要使用存储在不同框架中的代码时，只需在 `.swift` 文件顶部添加一行 `import` 即可将其添加到你的\
  \ `.swift` 文件中。\n\n让我们看看如何在我们的代码中使用 `uppercased()` 函数：\n\n1.  在 Xcode 中打开 MyFirstApp\
  \ 项目。\n2.  在导航窗格中点击 `ViewController.swift` 文件。\n3.  如下修改 `IBAction` 方法：\n\n    ```swift\n\
  \    @IBAction func changeButton(_ sender: UIButton) {\n        labelResult.text\
  \ = textMessage.text?.uppercased()\n    }\n    ```\n\n    只需使用 `uppercased()` 函数，我们就可以将小写字母改为大写，而无需浪费时间编写自己的代码来执行此操作。\n\
  \n4.  选择 **产品** ➤ **运行**，或点击运行按钮。模拟器出现。\n5.  点击文本字段并输入 `Hello there!`。\n6.  点击按钮。请注意，标签现在显示\
  \ `HELLO THERE!`，如图 3-16 所示。\n\n    ![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig16_HTML.jpg](img/329781_5_En_3_Fig16_HTML.jpg)\n\
  \n    图 3-16. 在模拟器中使用 `uppercased()` 函数运行应用\n\n7.  选择 **模拟器** ➤ **退出模拟器**。Xcode\
  \ 窗口再次出现。\n\n## 使用 Xcode 编辑器\n\n当你键入和编辑 Swift 代码时，Xcode 会以不同的颜色显示某些文本，以帮助你理解命令的不同部分。这些不同颜色突出显示以下内容：\n\
  \n*   **黑色** – 用户键入的任意命令\n*   **品红色** – Swift 关键字，例如 `func`（函数）或 `@IBOutlet`\n*\
  \   **紫色** – 类、属性或方法，例如 `UIButton`、`text` 或 `uppercased`\n*   **绿色** – 变量名\n*  \
  \ **红色** – 字符串\n\n用户始终可以自定义 Xcode 如何使用不同颜色来标识 Swift 代码的各个部分。要查看可能分配了哪些颜色来显示不同的 Swift\
  \ 代码，请按照以下步骤操作：\n\n1.  选择 **Xcode** ➤ **偏好设置**。出现一个偏好设置窗口。\n2.  点击 **字体与颜色** 图标。左侧窗格中会显示一个不同的主题列表。\n\
  3.  点击 Xcode 当前使用的主题，查看使用了哪些颜色来标识不同的 Swift 命令，如图 3-17 所示。（如果你选择 **编辑器** ➤ **主题**，即可识别\
  \ Xcode 当前使用的主题。）\n\n    ![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig17_HTML.jpg](img/329781_5_En_3_Fig17_HTML.jpg)\n\
  \n    图 3-17. 偏好设置窗口让你查看 Xcode 如何使用不同颜色来标识 Swift 代码\n\n4.  点击偏好设置窗口左上角的红色关闭按钮将其关闭。\n\
  \n### 获取 Swift 命令的帮助\n\n典型应用程序的代码将包含你自己的代码以及方法和属性。为了帮助你理解各种代码可能意味着什么，你可以通过按住 Option\
  \ 键并单击特定命令来获取特定命令的帮助。要了解其工作原理，请执行以下步骤：\n\n1.  在 Xcode 中加载 MyFirstApp 项目。\n2.  在导航窗格中点击\
  \ `ViewController.swift` 文件。\n3.  按住 Option 键，将鼠标指针移到 `ViewController.swift` 文件底部附近的\
  \ `uppercased()` 函数上。鼠标指针会变成一个问号。\n4.  按住 Option 键的同时单击 `uppercased()` 函数。Xcode\
  \ 会显示一个窗口，解释 `uppercased()` 函数的工作原理，如图 3-18 所示。\n\n    ![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig18_HTML.jpg](img/329781_5_En_3_Fig18_HTML.jpg)\n\
  \n    图 3-18. 按住 Option 键并单击命令获取帮助\n\n5.  按住 Option 键并单击 `UITextField`！Xcode 会显示另一个窗口，进一步解释\
  \ `UITextField` 命令，如图 3-19 所示。\n\n    ![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig19_HTML.jpg](img/329781_5_En_3_Fig19_HTML.jpg)\n\
  \n    图 3-19. 显示关于 `UITextField` 的帮助\n\n6.  按住 Option 键并单击 `IBAction` 方法内部的 `labelResult`。Xcode\
  \ 会显示一个窗口，显示 `labelResult` `IBOutlet` 的声明位置，如图 3-20 所示。\n\n    ![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig20_HTML.jpg](img/329781_5_En_3_Fig20_HTML.jpg)\n\
  \n    图 3-20. 显示关于 `labelResult` `IBOutlet` 的附加信息\n\n通过按住 Option 键并单击不同的 Swift 命令，你可以在\
  \ Xcode 编辑器内快速获取该命令的帮助。\n\n### 折叠和展开函数\n\n在复杂的应用程序中，单个 `.swift` 文件可能包含多个函数。这可能会使查找特定代码行变得困难。为了暂时隐藏函数中存储的代码，Xcode\
  \ 可以折叠和展开函数。折叠会将函数收拢，这样你只能看到它的名字，但看不到内部存储的任何代码。展开则会展开一个函数，使你可以看到它的所有代码。\n\n要了解如何在\
  \ `.swift` 文件中折叠和展开函数，请执行以下步骤：\n\n1.  在 Xcode 中加载 MyFirstApp 项目。\n2.  在导航窗格中点击 `ViewController.swift`\
  \ 文件。\n3.  选择 **编辑器** ➤ **代码折叠** ➤ **折叠方法和函数**。Xcode 现在只显示所有函数名，而不显示每个函数内部的任何代码，如图\
  \ 3-21 所示。请注意，每个折叠的函数都会显示一个省略号 (…) 以表示它隐藏了代码。\n\n    ![../images/329781_5_En_3_Chapter/329781_5_En_3_Fig21_HTML.jpg](img/329781_5_En_3_Fig21_HTML.jpg)\n\
  \n    图 3-21. 折叠的函数\n\n4.  双击折叠的 `viewDidLoad` 函数末尾的省略号。Xcode 现在会显示该函数的代码。\n\n通过折叠函数，你可以隐藏不想看到的代码，并仅专注于你确实想看到的代码。代码折叠是\
  \ Xcode 让查看和编辑代码变得更简单的一个简单方法。\n\n\n\n## 摘要\n\nSwift 代码决定了应用的运行方式。要在用户界面上检索或显示数据，你需要创建\
  \ `IBOutlet` 变量，并将它们与文本字段和标签等不同的用户界面对象关联起来。如果某个用户界面对象不用于检索或显示数据，那么你就不需要为该对象创建 `IBOutlet`\
  \ 变量。\n\n为了使按钮等特定用户界面对象具有交互性，你需要编写 `IBAction` 方法。在创建 `IBAction` 方法时，你还需要编写能实现特定功能的\
  \ Swift 代码。`IBOutlet` 变量和 `IBAction` 方法都存储在连接到特定控制器的 `.swift` 文件中。\n\n为了避免重复编写常用代码，Apple\
  \ 提供了包含各种可调用函数的框架。这些框架函数已经过测试，因此你可以直接使用它们，通过专注于编写让应用实现其独特功能的核心代码，来更快地开发应用。Apple\
  \ 提供了数十种不同的框架供你的应用使用，但不太可能在单个应用中用到或需要所有这些框架。\n\n为了帮助你编写和理解 Swift 代码，Xcode 允许你按住\
  \ Option 键并点击不同的命令。这会显示一个窗口，提供有关特定命令如何工作的进一步说明。由于许多 `.swift` 文件包含大量代码，Xcode 允许你临时隐藏函数中的代码，以便只专注于查看你需要的代码。\n\
  \nSwift 代码让你的应用实现实用功能，因此你会花费大量时间编写、重写和研究代码。了解如何使用 Swift 只是创建 iOS 应用的第一步。你还需要知道如何使用\
  \ Xcode。\n\n"
- "# 4. 使用 Xcode\n\n在开始编写 Swift 代码和设计用户界面之前，请花点时间熟悉一下 Xcode，这是 Apple 提供的免费应用开发工具。Xcode\
  \ 提供了众多功能，旨在满足你从头到尾创建应用的所有需求。幸运的是，你无需学习 Xcode 的每一个功能就能开始创建应用。相反，你可以只专注于学习你需要的那些功能，然后逐步掌握\
  \ Xcode 的其他功能。Xcode 提供了以下功能来帮助你为所有 Apple 产品创建应用：\n\n- 编写和编辑 Swift 代码\n- 设计用户界面\n\
  - 调试应用程序以查找和修复问题\n- 运行和测试你的应用\n\nXcode 既是编辑器，也是编译器。编辑器允许你编写和修改 Swift 代码，同时设计和自定义用户界面。完成用户界面和\
  \ Swift 代码的创建后，你可以使用 Xcode 来编译和运行你的应用，以确保其正常工作。\n\n## 更改 Xcode 的外观\n\n无论你是在小型笔记本电脑屏幕还是更大的台式显示器上工作，很可能你并不总是有足够的空间来查看\
  \ Xcode 中的所有内容。因此，Xcode 提供了多种隐藏或显示信息的方式。这样你就可以专注于你想看的内容，避免被多余的信息干扰。\n\nXcode 可以隐藏或显示的不同部分包括：\n\
  \n- 导航器面板\n- 工具栏\n- 标签栏\n- 调试区\n- 检查器面板\n- 文档大纲\n- 对象库\n\n### 导航器面板\n\n导航器面板位于 Xcode\
  \ 窗口的左侧。你可以通过选择以下任一命令来切换隐藏或显示导航器面板：\n\n- 选择 “显示” ➤ “导航器” ➤ “显示/隐藏导航器”。\n- 按下 Command\
  \ + 0（零）。\n\n你也可以将鼠标指针移到导航器面板的边框上，然后向左或向右拖动鼠标，来调整导航器面板的宽度。将导航器面板变得太窄，可以将其完全隐藏。\n\
  \n**注意：** 向左拖动鼠标可以隐藏导航器面板，但之后你需要选择 “显示” ➤ “导航器” ➤ “显示导航器” 或按下 Command + 0（零）才能使导航器面板再次出现。\n\
  \n尽管导航器面板可以显示不同的信息，但最常用的三种信息类型包括：\n\n- **项目导航器 (Command + 1)** – 显示构成项目的所有文件夹和文件，包括你的\
  \ `.swift` 文件和 `.storyboard` 用户界面。\n- **符号导航器 (Command + 3)** – 列出每个 `.swift` 文件中存储的所有函数。\n\
  - **问题导航器 (Command + 5)** – 显示项目可能存在的问题。\n\n要了解这三种不同类型的导航器如何工作，请按照以下步骤操作：\n\n1.\
  \  打开 `MyFirstApp` 项目，该项目在视图上显示一个标签、一个按钮和一个文本字段。\n\n2.  选择 “显示” ➤ “导航器” ➤ “显示项目导航器”，按下\
  \ Command + 1，或点击项目导航器图标。Xcode 会显示构成项目的文件夹和文件列表，如图 4-1 所示。当你想在 Xcode 中间窗格中查看不同文件时，可以使用项目导航器。\n\
  \n    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig1_HTML.jpg](img/329781_5_En_4_Fig1_HTML.jpg)\n\
  \n    **图 4-1.** 选择项目导航器\n\n3.  在导航器面板中点击 `ViewController.swift` 文件。Xcode 的中间窗格会显示\
  \ `ViewController.swift` 文件的内容，这样你就可以在该文件中编写和编辑 Swift 代码。\n\n4.  在导航器面板中点击 `Main.storyboard`\
  \ 文件。Xcode 的中间窗格会显示应用的用户界面，这样你就可以设计和编辑用户界面，例如添加按钮或标签。\n\n5.  选择 “显示” ➤ “导航器” ➤ “显示符号导航器”，按下\
  \ Command + 3，或点击符号导航器图标。Xcode 会显示构成项目的 `.swift` 文件列表。通过点击每个 `.swift` 文件名左侧的灰色展开三角形，你可以展开或折叠每个\
  \ `.swift` 文件中使用的函数和变量列表，如图 4-2 所示。\n\n    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig2_HTML.jpg](img/329781_5_En_4_Fig2_HTML.jpg)\n\
  \n    **图 4-2.** 符号导航器允许你快速查找存储在 `.swift` 文件中的函数或变量\n\n6.  点击 `ViewController` 文件左侧的灰色展开三角形，显示该文件中的函数（也称为方法，由大写字母\
  \ M 图标标识）和变量（也称为属性，由大写字母 P 图标标识）列表。\n\n7.  点击 `changeButton` 方法。Xcode 会在 `ViewController.swift`\
  \ 文件中高亮显示 `changeButton` 方法（参见图 4-2）。\n\n8.  点击 `labelResult` 属性。Xcode 会在 `ViewController.swift`\
  \ 文件中高亮显示 `labelResult` 属性。符号导航器可以帮助你快速跳转到项目中的特定属性或方法。\n\n9.  选择 “显示” ➤ “导航器” ➤\
  \ “显示项目导航器”，按下 Command + 1，或点击项目导航器图标。然后点击 `Main.storyboard` 文件查看应用的用户界面。\n\n10.\
  \ 选择 “显示” ➤ “导航器” ➤ “显示问题导航器”，按下 Command + 5，或点击问题导航器图标。问题导航器会显示有关项目的警告，如图 4-3 所示。黄色图标代表允许应用继续运行但可能导致用户界面外观问题或代码运行不完全安全的问题。红色图标代表会导致应用完全无法运行的问题。\n\
  \n    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig3_HTML.jpg](img/329781_5_En_4_Fig3_HTML.jpg)\n\
  \n    **图 4-3.** 问题导航器允许你查看项目可能存在的问题\n\n\n\n### 工具栏\n\n工具栏 位于 Xcode 窗口顶部，显示了一些图标，让您能一键访问常用命令，如图\
  \ 4-4 所示：\n\n![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig4_HTML.jpg](img/329781_5_En_4_Fig4_HTML.jpg)\n\
  \n**图 4-4.** Xcode 窗口顶部的工具栏\n\n-   `Run` – 运行您的 iOS 项目，以便在模拟器（模拟 iOS 设备）或连接到 Macintosh\
  \ 的实际 iOS 设备上进行测试\n-   `Stop` – 停止运行您的 iOS 项目\n-   `Scheme` – 让您选择在模拟器中模拟哪个 iOS\
  \ 设备，或选择已连接到 Macintosh 的哪个 iOS 设备\n-   `Library` – 打开对象库以设计用户界面（当在 Xcode 中间窗格中查看\
  \ `.storyboard` 文件时），或打开代码库（当在 Xcode 中间窗格中查看 `.swift` 文件时）\n-   `Standard Editor`\
  \ – 在 Xcode 的中间窗格中显示标准编辑器\n-   `Assistant Editor` – 在 Xcode 的中间窗格中并排显示两个编辑器\n- \
  \  `Show/Hide Navigator pane` – 切换 Xcode 窗口左侧导航器面板的隐藏与显示\n-   `Show/Hide Debug area`\
  \ – 切换 Xcode 窗口底部调试区域的隐藏与显示\n-   `Show/Hide Inspector pane` – 切换 Xcode 窗口右侧检查器面板的隐藏与显示\n\
  \n您可以通过以下任一方式切换工具栏的隐藏与显示：\n\n-   选择 **View** ➤ **Show/Hide Toolbar**。\n-   按下 **Option\
  \ + Command + T**。\n\n当您想要测试应用时，可以点击 `Scheme` 弹出菜单选择一个 iOS 设备。然后点击工具栏上的 `Run` 和\
  \ `Stop` 图标来启动或停止您在所选 iOS 设备上运行的应用。\n\n当您想要编辑 `.swift` 或 `.storyboard` 文件时，可以点击工具栏上的\
  \ `Standard Editor` 图标。当您需要并排查看两个文件（例如 `.swift` 和 `.storyboard` 文件）时，可以点击 `Assistant\
  \ Editor` 图标。编辑 `.storyboard` 文件时，可以点击 `Library` 图标来获取不同的对象并将其放置到用户界面上。\n\n最后，您可以选择隐藏或显示导航器面板、调试区域或检查器面板。隐藏这些区域中的任何一个，都能为中间窗格在\
  \ Xcode 中提供更多显示空间。\n\n要了解这些常用图标在 Xcode 中的工作方式，请遵循以下步骤：\n\n1.  确保您的 `MyFirstApp`\
  \ 项目已在 Xcode 中加载。\n2.  选择 **View** ➤ **Hide Toolbar**。工具栏会从 Xcode 窗口顶部消失。\n3.  选择\
  \ **View** ➤ **Show Toolbar**。工具栏会再次出现在 Xcode 窗口顶部。\n4.  点击工具栏最右侧的 `Show/Hide Navigator\
  \ pane` 图标。注意导航器面板消失了。\n5.  再次点击 `Show/Hide Navigator pane` 图标使导航器面板重新出现。\n6.  点击\
  \ `Show/Hide Inspector` 图标。注意检查器面板消失了。\n7.  再次点击 `Show/Hide Inspector pane` 图标使检查器面板重新出现。\n\
  8.  点击工具栏最左侧的 `Scheme` 弹出菜单。会出现一个菜单，列出可以供模拟器模拟的不同 iOS 设备，如图 4-5 所示。\n\n![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig5_HTML.jpg](img/329781_5_En_4_Fig5_HTML.jpg)\n\
  \n**图 4-5.** `Scheme` 弹出菜单显示了您可以在其上测试应用的不同 iOS 设备\n\n9.  选择一个 iOS 设备，例如 iPhone 8\
  \ 或 iPhone XR。\n10. 在导航器面板中点击 `ViewController.swift` 文件。\n11. 编辑 `ViewController.swift`\
  \ 文件，使 `changeButton` 方法如下所示：\n\n```\n@IBAction func changeButton(_ sender: UIButton)\
  \ {\n    labelResult.text = textMessage.text?.uppercased()\n    print (labelResult.text!)\n\
  }\n```\n\n12. 点击工具栏上的 `Run` 图标。模拟器会出现，显示 `MyFirstApp` 的用户界面。\n13. 点击用户界面上的文本字段，输入\
  \ **Hello, world!**\n14. 点击用户界面上的按钮。标签会显示 **HELLO, WORLD!**\n15. 点击 Xcode 窗口中工具栏上的\
  \ `Stop` 图标。注意这会停止应用在模拟器上运行，但模拟器窗口仍然保留在屏幕上。\n16. 选择 **Simulator** ➤ **Quit Simulator**\
  \ 来关闭模拟器窗口。注意 Xcode 窗口底部会显示调试区域，因为 `print (labelResult.text!)` 命令会在调试区域打印出 **HELLO,\
  \ WORLD!**，如图 4-6 所示。\n\n![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig6_HTML.jpg](img/329781_5_En_4_Fig6_HTML.jpg)\n\
  \n**图 4-6.** 调试区域出现在 Xcode 窗格底部\n\n17. 点击工具栏最右侧的 `Show/Hide Debug Area` 图标，或点击调试区域窗格左上角的\
  \ **Close Debug Area**。注意调试区域消失了。\n\n\n\n### 标签栏（Tab Bar）\n\nXcode 的一个问题是，通常每次只能通过点击导航区中的文件来查看一个文件。助理编辑器可以让你并排查看两个文件，但每个文件都会显得很窄。为了帮助你快速在文件之间来回切换，可以使用标签栏。\n\
  \n默认情况下，标签栏是隐藏的。要切换显示或隐藏标签栏，请选择 `View ➤ Show/Hide Tab Bar`。\n\n标签栏的主要用途是显示代表不同 `.swift`\
  \ 或 `.storyboard` 文件的选项卡。通过点击选项卡，你可以在文件之间快速切换，而无需先在导航区点击文件名。\n\n要了解如何使用标签栏，请按照以下步骤操作：\n\
  \n1.  确保 `MyFirstApp` 项目已在 Xcode 中加载。\n\n2.  在导航区点击 `Main.storyboard` 文件。Xcode 会在中间面板显示\
  \ `.storyboard` 文件。\n\n3.  选择 `View ➤ Show Tab Bar`。标签栏会出现在 Xcode 窗口中。最初只有一个选项卡，显示\
  \ `Main.storyboard` 文件的名称，如图 4-7 所示。\n\n    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig7_HTML.jpg](img/329781_5_En_4_Fig7_HTML.jpg)\n\
  \    \n    *图 4-7. 每个选项卡显示其所代表的文件名称*\n\n4.  点击标签栏最右侧的新建选项卡图标（`+`）。Xcode 会显示第二个选项卡。\n\
  \n5.  在导航区点击 `ViewController.swift` 文件。注意，标签栏现在显示两个选项卡：一个代表 `Main.storyboard` 文件，另一个代表\
  \ `ViewController.swift` 文件。\n\n6.  点击 `Main.storyboard` 选项卡。Xcode 会显示 `.storyboard`\
  \ 文件。\n\n7.  点击 `ViewController.swift` 选项卡。Xcode 会显示 `.swift` 文件。通过使用选项卡，你可以加载最常编辑的文件，并在它们之间来回切换。\n\
  \n8.  选择 `View ➤ Show All Tabs`，或按下 `Shift + Command + \\`。Xcode 会显示所有打开选项卡的缩略图。这让你可以快速浏览所有当前打开的文件，如图\
  \ 4-8 所示。（你可以通过点击 `+` 缩略图来创建一个新选项卡。）\n\n    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig8_HTML.jpg](img/329781_5_En_4_Fig8_HTML.jpg)\n\
  \    \n    *图 4-8. 以缩略图形式显示的选项卡*\n\n9.  选择 `View ➤ Show All Tabs` 或按下 `Shift + Command\
  \ + \\` 以隐藏选项卡的缩略图。\n\n10. 将鼠标指针移动到 `ViewController.swift` 选项卡的左侧。会出现一个关闭图标（`X`），如图\
  \ 4-9 所示。\n\n    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig9_HTML.jpg](img/329781_5_En_4_Fig9_HTML.jpg)\n\
  \    \n    *图 4-9. 关闭图标出现在每个选项卡的最左侧*\n\n11. 点击 `ViewController.swift` 选项卡上的关闭图标。该选项卡会消失。请注意，标签栏中必须始终至少有一个选项卡。\n\
  \n12. 选择 `View ➤ Hide Tab Bar`。Xcode 会隐藏标签栏。\n\n#### 注意\n\n当且仅当只有一个选项卡打开时，你才能隐藏标签栏。如果同时打开了多个选项卡，“Hide\
  \ Tab Bar” 命令会显示为灰色不可用状态。\n\n## 标记 Swift 代码（Marking Swift Code）\n\n通过使用符号导航器，你可以查看项目中所有的\
  \ `.swift` 文件，并跳转到每个文件中存储的属性和方法。但是，如果你想将 `.swift` 文件划分为任意部分，你可以创建一个特殊的 `MARK` 注释，用以定义一组相关的代码。`MARK`\
  \ 命令如下所示：\n\n```\n// MARK:\n```\n\n两个 `//` 符号定义了这行是一个注释。\n\n`MARK:` 命令定义了这是一个标记部分。\n\
  \n`<description>` 文本代表你希望定义该部分名称的任意文本。如果你想把部分命名为 `All Properties`，那么标记行应该如下所示：\n\
  \n```\n// MARK: All Properties\n```\n\n通过使用 `MARK` 注释来划分你的 Swift 代码，你可以快速跳转到任何 `.swift`\
  \ 文件的不同部分。要了解其如何工作，请按照以下步骤操作：\n\n1.  在 Xcode 中打开 `MyFirstApp` 项目。\n\n2.  在导航区点击\
  \ `ViewController.swift` 文件。\n\n3.  修改 `ViewController.swift` 文件，在 `IBOutlet` 属性和\
  \ `IBAction` 方法上方添加两个 `// MARK:` 注释，使其看起来像这样：\n\n    ```\n    import UIKit\n   \
  \ class ViewController: UIViewController {\n    // MARK: Properties\n    @IBOutlet\
  \ var labelResult: UILabel!\n    @IBOutlet var textMessage: UITextField!\n    override\
  \ func viewDidLoad() {\n    super.viewDidLoad()\n    }\n    // MARK: Methods\n \
  \   @IBAction func changeButton(_ sender: UIButton) {\n    labelResult.text = textMessage.text?.uppercased()\n\
  \    print (labelResult.text!)\n    }\n    }\n    ```\n\n    注意，Xcode 中间面板的顶部会显示一个层级，例如\
  \ `MyFirstApp ➤ MyFirstApp ➤ ViewController.swift`，如图 4-10 所示。\n\n    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig10_HTML.jpg](img/329781_5_En_4_Fig10_HTML.jpg)\n\
  \    \n    *图 4-10. 项目、文件夹和文件的层级列表*\n\n4.  点击出现在 `ViewController.swift >` 之后的最后一个项（在图\
  \ 4-10 中，该项是 `viewDidLoad()`）。会弹出一个菜单，如图 4-11 所示。\n\n    ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig11_HTML.jpg](img/329781_5_En_4_Fig11_HTML.jpg)\n\
  \    \n    *图 4-11. 用于跳转到当前打开的 `.swift` 文件中不同部分的弹出菜单*\n\n5.  点击 `Properties`。Xcode\
  \ 会高亮 `// MARK: Properties` 这一行。\n\n6.  再次点击出现在 `ViewController.swift >` 之后的最后一个项，以显示弹出菜单。\n\
  \n7.  点击 `Methods`。Xcode 会高亮 `// MARK: Methods` 这一行。\n\n在我们当前这个简短的 `ViewController.swift`\
  \ 文件中，使用 `// MARK:` 注释可能并非必需，但在一个包含大量 Swift 代码的大文件中，你可以看到，将一个大文件划分为命名部分，会使查找和跳转到\
  \ `.swift` 文件的特定部分变得更快、更容易。\n\n即使你没有在任何一个 `.swift` 文件中添加 `// MARK:` 注释，你仍然可以点击层级列表中的项来跳转到\
  \ `.swift` 文件的不同部分。在图 4-11 中，不用点击（由 `// MARK:` 注释定义的） `Properties` 或 `Methods`，你可以轻松点击不同的属性（`labelResult`\
  \ 或 `textMessage`）或不同的方法（`viewDidLoad` 或 `changeButton`）来跳转到 `.swift` 文件中的相应位置。\n\
  \n\n\n## 重命名和删除 IBOutlet 变量\n\n当需要将 Swift 代码链接到用户界面对象时，你需要创建一个代表该用户界面对象的 `IBOutlet`\
  \ 变量，例如：\n\n```\n@IBOutlet var petLabel: UILabel!\n```\n\n如果你想重命名一个 `IBOutlet`，你可能会认为只需编辑\
  \ `IBOutlet` 变量名即可，但如果这样做，运行项目时就会报错。问题在于，如果你在 `.swift` 文件中重命名了 `IBOutlet`，Connections\
  \ Inspector（连接检查器）仍然在寻找与之前 `IBOutlet` 名称的连接。\n\n要重命名 `IBOutlet` 变量，你必须让 Xcode 使用\
  \ Refactor（重构）命令，同时在 `.swift` 文件和 Connections Inspector 面板中更改 `IBOutlet` 名称。\n\n\
  要了解 Refactor 命令如何重命名 `IBOutlet`，请按照以下步骤操作：\n\n1. 在 Xcode 中打开 `MyFirstApp` 项目。\n\
  2. 在导航面板中点击 `ViewController.swift` 文件。\n3. 选中 `textMessage` 这个 `IBOutlet`。你可以手动选中整个\
  \ \"textMessage\" 名称，或者直接双击它来选中。确保整个 \"textMessage\" 处于被选中状态。\n4. 选择 Editor（编辑器）➤\
  \ Refactor（重构）➤ Rename（重命名），如图 4-12 所示。Xcode 会高亮显示项目中所有找到选中文本（如 \"textMessage\"\
  ）的区域，如图 4-13 所示。\n\n   ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig13_HTML.jpg](img/329781_5_En_4_Fig13_HTML.jpg)\n\
  \n   **图 4-13.** Refactor 命令让 Xcode 在整个项目中重命名文本\n\n   ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig12_HTML.jpg](img/329781_5_En_4_Fig12_HTML.jpg)\n\
  \n   **图 4-12.** Refactor 命令出现在 Editor 菜单中\n\n5. 编辑 `textMessage` 这个 `IBOutlet`，将其名称改为\
  \ `textDisplay`。\n6. 点击中间 Xcode 面板右上角的 Rename（重命名）按钮。Xcode 会自动重命名你的 `IBOutlet`，并将项目中所有\
  \ \"textMessage\" 改为 \"textDisplay\"。\n7. 在导航面板中点击 `Main.storyboard`，然后点击文本字段（该字段已链接到现名为\
  \ \"textDisplay\" 的 `IBOutlet` 变量）。\n8. 选择 View（视图）➤ Inspectors（检查器）➤ Show Connections\
  \ Inspector（显示连接检查器），或点击 Xcode 窗口右上角的 Connections Inspector 图标。注意，Connections Inspector\
  \ 现在显示的是连接到名为 \"textDisplay\" 的 `IBOutlet`，如图 4-14 所示。\n\n   ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig14_HTML.jpg](img/329781_5_En_4_Fig14_HTML.jpg)\n\
  \n   **图 4-14.** Connections Inspector 显示更新后的 `IBOutlet` `textDisplay`\n\n如果你想要删除一个可能拼写错误或不再需要的\
  \ `IBOutlet`，会发生什么？你可能会认为只需从 `.swift` 文件中删除该 `IBOutlet` 即可，但如果这样做并尝试运行项目，就会报错。\n\
  \n要删除 `IBOutlet` 变量，你必须遵循两个步骤：\n\n- 首先，你必须在 `.swift` 文件中删除 `IBOutlet` 变量。\n- 其次，你必须在\
  \ Connections Inspector 面板中断开该 `IBOutlet` 的连接。\n\n要断开用户界面对象与其 `IBOutlet` 变量之间的连接，请按照以下步骤操作：\n\
  \n1. 点击包含要删除的 `IBOutlet` 的 `.swift` 文件。\n2. 选中该 `IBOutlet` 并按 BACKSPACE 或 DELETE\
  \ 键。这会从 `.swift` 文件中删除该 `IBOutlet`，但我们仍然需要断开它与用户界面对象的连接。\n3. 在导航面板中点击 `Main.storyboard`。\n\
  4. 点击链接到该 `IBOutlet` 的用户界面对象。\n5. 选择 View（视图）➤ Inspectors（检查器）➤ Show Connections\
  \ Inspector（显示连接检查器），或点击 Xcode 窗口右上角的 Connections Inspector 图标。Connections Inspector\
  \ 面板会显示 `IBOutlet` 名称及其所连接的 `.swift` 文件，如图 4-15 所示。\n\n   ![../images/329781_5_En_4_Chapter/329781_5_En_4_Fig15_HTML.jpg](img/329781_5_En_4_Fig15_HTML.jpg)\n\
  \n   **图 4-15.** Connections Inspector 显示 `IBOutlet` 名称及其所连接的 `.swift` 文件\n\n6.\
  \ 点击 X 图标来断开连接。\n\n## 总结\n\nXcode 是你编辑 Swift 代码、设计用户界面以及测试应用是否正常运行所需的唯一工具。通过熟悉 Xcode，你可以学会如何利用其不同功能，让查看文件和编辑\
  \ Swift 代码变得更加轻松便捷。\n\n调整 Xcode 外观最简单的方法是临时隐藏导航面板、检查器面板或调试区域。Xcode 提供了多种隐藏和显示这些不同区域的方式，因此你可以选择自己最喜欢的方法。\n\
  \n与其一直依赖 Xcode 的下拉菜单，你可能会发现使用工具栏上的图标更方便，只需单击即可访问常用命令，例如 Run（运行应用）、Stop（退出应用）、Assistant\
  \ Editor（打开助理编辑器）或显示/隐藏导航面板/调试区域/检查器面板。\n\n如果你发现自己经常在文件之间来回切换，可能需要显示标签栏。这样你就可以打开两个或多个标签页来代表不同的文件，从而无需反复通过导航面板即可点击并打开每个文件。\n\
  \n如果项目因错误信息而无法运行，但你的 Swift 代码看起来没问题，请检查所有用户界面对象之间的连接。如果连接过多（或不足），你可能需要断开一些现有连接，然后重新链接或重命名你的\
  \ `IBOutlet`，使 `.swift` 文件中的名称与 Connections Inspector 面板中显示的名称完全一致。\n\nXcode 是一个功能强大、专业的编程工具，所以请花些时间熟悉\
  \ Xcode 更常用的功能，对于你不理解或不需要的功能，可以随意忽略。随着你对 Xcode 越来越熟悉，你会逐渐了解并需要它的一些更高级的功能。请记住，很少有人需要用到\
  \ Xcode 的所有功能。你使用 Xcode 越多，久而久之，用起来就会越得心应手。\n\n"
- "# 5. 使用控制器\n\n俗话说，第一印象只有一次机会。在应用开发领域，第一印象总是通过应用的用户界面来传达。如果用户界面凌乱、设计拙劣或令人困惑，那么你的应用无论多么实用、有趣和富有创意都无关紧要。如果用户不喜欢你应用的界面，其他一切都不再重要。\n\
  \n设计用户界面既是一门艺术，也是一门科学。一般来说，最佳的用户界面是那种似乎无形的界面。始终记住，完成同一项任务会有多种方法，因此要创建并测试截然不同的用户界面设计，看看哪一种最适合你的特定应用。\n\
  \n例如，考虑放大图片的任务。在桌面电脑的传统用户界面中，用户界面可以显示一个菜单列表供用户选择。然后，在选择了正确的菜单后，用户可以选择一个命令来放大图片。接着，可能会弹出一个对话框，让用户选择放大图片的比例。\n\
  \n虽然这种类型的用户界面可能有效，但它显然比在屏幕上捏合手指并分开指尖来放大图片更加笨拙且不够直观。最佳的用户界面通常是那种只需最少的步骤就能完成所需任务的界面。\n\
  \n\n\n## 理解控制器\n\n任何应用的视觉部分就是其用户界面，它是通过使用一个或多个控制器来创建的。每个控制器包含两个部分：\n\n- 作为用户界面一部分显示的实际视图\n\
  - 一个 `.swift` 文件，其中包含用于向用户界面检索和显示数据的 Swift 代码（`IBOutlet`），或用于运行 Swift 代码以响应用户操作的函数（`IBAction`\
  \ 函数）\n\n视图会填满 iOS 设备的整个屏幕。要创建用户界面，你需要在视图中添加按钮、文本框和标签等对象。要控制这些用户界面对象，你需要使用存储在与该视图关联的\
  \ `.swift` 文件中的 Swift 代码。\n\nXcode 提供了几种不同类型的控制器，你可以用它们来创建应用的用户界面，如图 5-1 所示：\n\n\
  ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig1_HTML.jpg](img/329781_5_En_5_Fig1_HTML.jpg)\n\
  \n图 5-1. 可用于创建用户界面的不同类型控制器\n\n- **视图控制器（View Controller）** – 显示一个空白屏幕\n- **导航控制器（Navigation\
  \ Controller）** – 在屏幕上显示其他视图，并在左上角自动显示返回按钮\n- **表格视图控制器（Table View Controller）**\
  \ – 在屏幕上显示一个表格视图\n- **集合视图控制器（Collection View Controller）** – 在屏幕上显示一个集合视图\n- **标签栏控制器（Tab\
  \ Bar Controller）** – 在屏幕上显示其他视图，可通过屏幕底部的标签页进行访问\n- **分栏视图控制器（Split View Controller）**\
  \ – 同时在屏幕上显示两个视图\n- **页面视图控制器（Page View Controller）** – 像书本中的页面一样显示其他视图\n- **GLKit\
  \ 视图控制器（GLKit View Controller）** – 显示一个用于展示基于 OpenGL 跨平台图形库的图形的视图（Apple 已基本转向自家\
  \ Metal 图形库，因此 OpenGL 已基本过时，仅为仍在使用 OpenGL 的旧应用提供向后兼容性。）\n- **AVKit 播放器视图控制器（AVKit\
  \ Player View Controller）** – 显示一个用于在屏幕上播放视频的视图\n\n对象库中显示了所有可用的控制器，你可以添加它们来创建用户界面，不过你可能不需要所有这些不同类型的控制器。你可以随时修改任何控制器来显示标签栏、表格或其他项目，因此既可以使用基本的视图控制器并对其进行修改，也可以使用**分栏视图控制器**或**表格视图控制器**等专用控制器来设计完全相同的用户界面。从专用控制器入手，能让你立刻获得特定功能。\n\
  \n要了解如何添加（和删除）控制器来创建用户界面，请按以下步骤操作：\n\n1.  使用**单视图应用（Single View App）**模板创建一个新的 iOS\
  \ 项目（参见第 1 章），并将这个新项目命名为 `MySecondApp`。这将为用户界面创建一个单独的视图。\n\n2.  在导航面板中点击 `Main.storyboard`\
  \ 文件。Xcode 会显示这个单独的视图。\n\n3.  如果文档大纲未显示，请选择 **编辑器（Editor）➤ 显示文档大纲（Show Document\
  \ Outline）**，或点击文档大纲图标。\n\n4.  如图 5-2 所示，在文档大纲中点击 **视图控制器（View Controller）**。\n\n\
  ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig2_HTML.jpg](img/329781_5_En_5_Fig2_HTML.jpg)\n\
  \n图 5-2. 选择一个视图控制器\n\n5.  按下 `BACKSPACE` 或 `DELETE` 键。Xcode 会从故事板中删除整个视图控制器。此时，你的应用就没有用户界面了。\n\
  \n6.  点击**库（Library）**图标以打开对象库窗口（见图 5-1）。\n\n7.  如图 5-3 所示，将一个**视图控制器**从库窗口拖放到 Xcode\
  \ 中。Xcode 会在故事板中显示新的视图控制器。如果你现在运行应用，这个视图不会出现在屏幕上，因为我们需要让这个视图成为第一个显示的视图，也称为**初始视图控制器（Initial\
  \ View Controller）**。\n\n![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig3_HTML.jpg](img/329781_5_En_5_Fig3_HTML.jpg)\n\
  \n图 5-3. 将一个视图控制器拖入 `Main.storyboard` 文件\n\n8.  在文档大纲中点击**视图控制器**以将其选中，然后选择 **视图（View）➤\
  \ 检查器（Inspectors）➤ 显示属性检查器（Show Attributes Inspector）**，或点击检查器面板顶部的**显示属性检查器**图标。\n\
  \n9.  如图 5-4 所示，勾选**是初始视图控制器（Is Initial View Controller）**复选框。当**是初始视图控制器**复选框被选中时，会有一个箭头指向视图控制器的左侧，以显示哪个视图是初始视图控制器，也就是应用运行时首先出现的视图。下一步是将此视图控制器连接到现有的\
  \ `ViewController.swift` 文件。\n\n![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig4_HTML.jpg](img/329781_5_En_5_Fig4_HTML.jpg)\n\
  \n图 5-4. **是初始视图控制器**复选框\n\n> **注意** 任何时候，只能有一个视图控制器作为初始视图控制器。\n\n10. 在文档大纲中点击**视图控制器**以将其选中。\n\
  \n11. 选择 **视图（View）➤ 检查器（Inspectors）➤ 显示身份检查器（Show Identity Inspector）**，或点击检查器面板顶部的**显示身份检查器**图标。\n\
  \n12. 点击**类（Class）**文本框右侧出现的向下箭头。会弹出一个菜单。向下滚动此菜单，直到找到 `ViewController`，如图 5-5 所示。\n\
  \n![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig5_HTML.jpg](img/329781_5_En_5_Fig5_HTML.jpg)\n\
  \n图 5-5. 选择连接到视图控制器的 `.swift` 类文件\n\n至此，你已经删除了一个视图控制器，添加了一个新的控制器，将其设置为初始视图，并将其连接到了\
  \ `ViewController.swift` 文件。\n\n\n\n## 使用多个控制器\n\n一个简单的 iOS 应用可能只包含单个视图，比如计算器应用。然而，大多数应用会包含两个或更多控制器，用于在屏幕上显示不同的视图。这意味着你需要了解如何在构成\
  \ iOS 应用用户界面的故事板中处理多个控制器。\n\n当故事板包含两个或更多控制器时，你需要定义一个作为初始视图控制器，这是应用运行时显示的第一个屏幕。要了解其工作原理，请按以下步骤操作：\n\
  \n1.  确保你的 `MySecondApp` 项目已加载到 `Xcode` 中。\n2.  在导航器面板中点击 `Main.storyboard` 文件。\n\
  3.  点击资料库图标以显示对象库。\n4.  将一个第二个视图控制器拖放到故事板上，如图 5-6 所示。\n   ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig6_HTML.jpg](img/329781_5_En_5_Fig6_HTML.jpg)\n\
  \   *图 5-6. 向故事板添加第二个视图控制器*\n5.  在文档大纲中，点击你刚刚添加的第二个视图控制器下方的视图。\n6.  选择“视图”➤“检查器”➤“显示属性检查器”，或点击检查器面板顶部的属性检查器图标。\n\
  7.  点击背景弹出菜单以显示调色板，如图 5-7 所示。\n   ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig7_HTML.jpg](img/329781_5_En_5_Fig7_HTML.jpg)\n\
  \   *图 5-7. 更改视图控制器的背景颜色*\n8.  点击一种颜色，例如蓝色或黄色。目标是选择一种不同于白色的背景颜色，以便在运行应用时轻松看出哪个控制器出现。`Xcode`\
  \ 会将你选择的颜色显示在视图中。现在，让这个彩色视图作为初始视图控制器，以便应用首次运行时显示它。\n9.  点击第二个视图控制器，它包含你在步骤 8 中选择的带有彩色背景的视图。\n\
  10. 将箭头从第一个控制器拖到第二个控制器。（你也可以选择“视图”➤“检查器”➤“显示属性检查器”，然后选中“是初始视图控制器”复选框。）初始视图控制器箭头现在应指向背景非白色的视图控制器，如图\
  \ 5-8 所示。\n    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig8_HTML.jpg](img/329781_5_En_5_Fig8_HTML.jpg)\n\
  \    *图 5-8. 更改初始视图控制器*\n11. 点击“运行”按钮或选择“产品”➤“运行”。模拟器会运行你的应用。注意，彩色视图出现了。\n12. 选择“模拟器”➤“退出模拟器”以返回\
  \ `Xcode`。\n13. 将箭头从第二个（彩色）控制器拖到第一个（白色背景）控制器。\n14. 点击“运行”按钮或选择“产品”➤“运行”。模拟器会出现。注意，白色背景出现了。\n\
  15. 选择“模拟器”➤“退出模拟器”以返回 `Xcode`。\n\n## 在控制器之间切换\n\n目前我们的应用有两个控制器，但任意时刻只能有一个显示（即定义为初始视图控制器的那个）。要让应用在运行时显示多个视图，你有几种选择。首先，你可以手动在两个控制器之间创建链接。其次，你可以将两个或更多控制器放置在导航控制器或标签栏控制器内。\n\
  \n要了解如何手动连接控制器，请按以下步骤操作：\n\n1.  确保 `MySecondApp` 项目已加载到 `Xcode` 中。\n2.  在导航器面板中点击\
  \ `Main.storyboard` 文件。`Xcode` 会显示两个现有视图，其中一个为白色背景，另一个为彩色背景。应有一个箭头指向白色视图，表明这是应用运行时出现的初始视图控制器。\n\
  3.  点击资料库图标以显示对象库窗口。然后将一个按钮拖放到第一个（白色背景）控制器的视图上。（按钮的具体位置无关紧要。）\n4.  将鼠标指针移到这个按钮上，按住\
  \ Control 键，然后按住 Ctrl 键将鼠标拖到第二个视图上，`Xcode` 会高亮显示该视图，如图 5-9 所示。（另一种做法是，你也可以从按钮按住\
  \ Ctrl 键拖到文档大纲中的第二个视图控制器，如图 5-10 所示。）\n   ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig10_HTML.jpg](img/329781_5_En_5_Fig10_HTML.jpg)\n\
  \   *图 5-10. 从按钮按住 Ctrl 键拖到文档大纲中的另一个视图控制器，同样会创建 segue 链接*\n   ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig9_HTML.jpg](img/329781_5_En_5_Fig9_HTML.jpg)\n\
  \   *图 5-9. 从按钮按住 Ctrl 键拖到另一个视图会创建 segue 链接*\n5.  松开鼠标左键和 Control 键。会出现一个弹出菜单，如图\
  \ 5-11 所示。\n   ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig11_HTML.jpg](img/329781_5_En_5_Fig11_HTML.jpg)\n\
  \   *图 5-11. 按住 Ctrl 键拖动后，会出现一个菜单用于定义如何显示下一个控制器*\n6.  选择 `Show`。`Xcode` 会在两个控制器之间创建一个\
  \ segue。\n7.  点击该 segue 以选中它。然后选择“视图”➤“检查器”➤“显示属性检查器”，或点击检查器面板顶部的属性检查器图标。注意，“种类”弹出菜单允许你定义\
  \ segue，如图 5-12 所示。\n   ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig12_HTML.jpg](img/329781_5_En_5_Fig12_HTML.jpg)\n\
  \   *图 5-12. segue 的属性检查器可让你更改 segue 的类型*\n8.  再次点击资料库图标以显示对象库窗口。然后将一个按钮拖放到第二个（彩色）视图上的任意位置。\n\
  9.  从彩色视图上的这个按钮按住 Ctrl 键拖到第一个（白色）控制器。松开 Control 键和鼠标左键以显示弹出菜单（参见图 5-11）。\n10. 选择\
  \ `Show`。`Xcode` 会创建第二个 segue，将两个控制器连接在一起，如图 5-13 所示。在运行此应用之前，我们需要确保故事板选择的 iOS 设备与模拟器选择的\
  \ iOS 设备一致。\n    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig13_HTML.jpg](img/329781_5_En_5_Fig13_HTML.jpg)\n\
  \    *图 5-13. 故事板中通过两个 segue 连接在一起的两个控制器*\n11. 查看中间 Xcode 面板底部，了解你的故事板当前模拟的是哪种 iOS\
  \ 设备。在图 5-14 中，故事板模拟的是 iPhone 8。你可以点击此“视图为：”文本，显示不同的 iOS 设备进行模拟。\n    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig14_HTML.jpg](img/329781_5_En_5_Fig14_HTML.jpg)\n\
  \n\n\n图 5-14. 识别 Storyboard 模拟的 iOS 设备\n\n12.  查看 Xcode 窗口左上角，找到模拟器将模拟的 iOS 设备，如图\
  \ 5-15 所示。\n\n![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig15_HTML.jpg](img/329781_5_En_5_Fig15_HTML.jpg)\n\
  图 5-15. 识别模拟器模拟的 iOS 设备\n\n13.  确保模拟器的 iOS 设备与 storyboard 的 iOS 设备匹配。如果不匹配，请点击模拟器当前模拟的\
  \ iOS 设备，弹出菜单。然后点击与 storyboard iOS 设备匹配的 iOS 设备（例如图 5-14 中的 iPhone 8）。\n14.  点击\
  \ `Run` 按钮或选择 `Product` ➤ `Run`。模拟器出现，显示白色控制器及其按钮。\n15.  点击白色视图中的按钮。彩色控制器视图出现。\n\
  16.  点击彩色视图中的按钮。白色控制器视图再次出现。重复步骤 15 和 16，查看按钮和 Segue 如何让您从一个视图切换到另一个视图。\n17.  选择\
  \ `Simulator` ➤ `Quit Simulator` 返回 Xcode。\n\n### 嵌入导航控制器\n\n手动将两个控制器连接起来是可行的，但创建起来可能比较笨拙。作为替代方案，您可以使用导航控制器。导航控制器包含其他控制器，并负责让用户在两个控制器之间来回导航。这样，您无需在两个控制器上都添加按钮来让用户来回切换。\n\
  \n如果您已经在 storyboard 中有两个或更多控制器，可以将它们嵌入到导航控制器中。要了解如何将现有控制器嵌入到导航控制器中，请按照以下步骤操作：\n\n\
  1.  确保 MySecondApp 项目已在 Xcode 中加载。\n2.  在导航器窗格中点击 `Main.storyboard` 文件。\n3.  在文档大纲中点击第一个视图控制器场景（背景为白色的那个）以将其选中，如图\
  \ 5-16 所示。\n\n    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig16_HTML.jpg](img/329781_5_En_5_Fig16_HTML.jpg)\n\
  \    图 5-16. 在文档大纲中选择第一个视图控制器\n\n4.  选择 `Editor` ➤ `Embed In` ➤ `Navigation Controller`。Xcode\
  \ 在 storyboard 中显示一个导航控制器，如图 5-17 所示。\n\n    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig17_HTML.jpg](img/329781_5_En_5_Fig17_HTML.jpg)\n\
  \    图 5-17. 将现有控制器嵌入到导航控制器中\n\n5.  点击 `Run` 按钮或选择 `Product` ➤ `Run`。模拟器出现，显示带有按钮的第一个（白色）控制器。\n\
  6.  点击按钮。注意，第二个（彩色）控制器滑入视图，并在左上角显示一个 `< Back` 按钮，如图 5-18 所示。\n\n    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig18_HTML.jpg](img/329781_5_En_5_Fig18_HTML.jpg)\n\
  \    图 5-18. 导航控制器显示一个 `< Back` 按钮，用于返回上一个视图\n\n7.  点击左上角的 `< Back` 按钮。注意，第一个（白色）控制器再次出现。重复步骤\
  \ 6 和 7，查看导航控制器如何让您前进到彩色控制器，再返回到白色控制器。\n8.  选择 `Simulator` ➤ `Quit Simulator` 返回\
  \ Xcode。\n\n## 使用导航控制器\n\n从 Editor 菜单中选择 `Embed In` 命令是向 storyboard 添加导航控制器的一种方法。第二种方法是从对象库窗口中添加导航控制器。当您从对象库添加导航控制器时，还会添加一个表视图控制器，您需要将其删除。然后，您需要将导航控制器连接到现有控制器，并确保导航控制器是初始视图控制器。\n\
  \n要了解如何从对象库添加导航控制器，请按照以下步骤操作：\n\n1.  确保 MySecondApp 项目已在 Xcode 中加载。\n2.  在导航器窗格中点击\
  \ `Main.storyboard` 文件。\n3.  在文档大纲中点击导航控制器场景，然后按 `BACKSPACE` 或 `DELETE` 键，从 storyboard\
  \ 中删除现有的导航控制器。\n4.  点击库图标以打开对象库窗口。\n5.  将一个导航控制器拖放到 storyboard 上。这将会包含一个导航控制器和一个表视图控制器，如图\
  \ 5-19 所示。\n\n    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig19_HTML.jpg](img/329781_5_En_5_Fig19_HTML.jpg)\n\
  \    图 5-19. 从对象库窗口添加导航控制器\n\n6.  在文档大纲中点击根视图控制器场景，然后按 `BACKSPACE` 或 `DELETE` 删除当前链接到导航控制器的控制器。\n\
  7.  在文档大纲中点击导航控制器场景以将其选中。\n8.  选择 `View` ➤ `Inspectors` ➤ `Show Attributes Inspector`，或点击检查器窗格顶部的属性检查器图标。\n\
  9.  选中 `Is Initial View Controller` 复选框。这会使导航控制器成为应用运行时首先出现的控制器。\n10. 将鼠标指针移动到导航控制器的中间，按住\
  \ `Control` 键，然后 Ctrl-拖拽到背景为白色的控制器中间，如图 5-20 所示。\n\n    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig20_HTML.jpg](img/329781_5_En_5_Fig20_HTML.jpg)\n\
  \    图 5-20. 将导航控制器连接到现有控制器\n\n11. 松开 `Control` 键和鼠标左键。出现一个弹出菜单，如图 5-21 所示。\n\n\
  \    ![../images/329781_5_En_5_Chapter/329781_5_En_5_Fig21_HTML.jpg](img/329781_5_En_5_Fig21_HTML.jpg)\n\
  \    图 5-21. 出现一个弹出菜单，用于定义导航控制器与其他控制器之间的 Segue\n\n12. 在 `Relationship Segue` 分类下选择\
  \ `root View Controller`。\n13. 点击 `Run` 按钮或选择 `Product` ➤ `Run`。第一个视图（白色背景）出现在模拟器中。\n\
  14. 点击视图上的按钮。第二个控制器（彩色背景）出现。注意，导航控制器现在在左上角显示 `< Back` 按钮。\n15. 点击 `< Back` 按钮返回第一个控制器。重复步骤\
  \ 14 和 15，查看如何在两个不同视图之间来回移动。\n16. 选择 `Simulator` ➤ `Quit Simulator`。\n\n## 总结\n\n\
  最简单的 iOS 应用仅包含单个视图，但大多数应用可能需要多个视图。当 storyboard 中有多个控制器时，必须指定一个控制器作为初始视图控制器，这是应用运行时最先出现的控制器。一次只能有一个控制器作为初始视图控制器。\n\
  \n要更改在任意给定时间显示哪个控制器，可以在控制器之间创建称为 Segue 的链接。要创建 Segue，您可以按住 `Control` 键从按钮等对象拖拽鼠标到另一个控制器。但是，手动创建\
  \ Segue 可能很繁琐，因此另一种替代方案是使用导航控制器。\n\n导航控制器包含或嵌入其他控制器。这样，其他控制器可以专注于显示信息，而导航控制器则专注于为用户提供返回上一个控制器的方式。\n\
  \n\n\n"
- "# 6. 添加用户界面对象\n\n控制器包含出现在 iOS 屏幕上的用户界面。在最简单的层面上，一个控制器可以包含一个视图，该视图代表一个 iOS 屏幕。默认情况下，这个视图是空白的，因此要让它显示信息或为用户提供交互，您可以添加各种用户界面对象，例如按钮、文本字段、标签或滑块。\n\
  \n用户界面对象通常执行两种不同的任务。其一，它们要么显示信息，要么允许用户输入信息。用于显示或允许输入的常见用户界面对象类型包括文本字段和标签。\n\n其二，它们为用户提供一种与用户界面交互以发出指令的方式。交互式用户界面对象的示例包括按钮、滑块和开关。\n\
  \n要将对象放置在用户界面上，您必须打开“对象库”窗口并拖放一个对象。然后，您需要通过 `IBOutlet` 属性或 `IBAction` 方法将大多数对象连接到一个\
  \ `.swift` 文件。无论您向用户界面添加什么类型的对象，都需要调整以下内容：\n\n-   大小\n-   位置\n-   其他属性，例如颜色、显示的文本等。\n\
  \n每个用户界面对象都提供多个可修改的属性，但您可能不需要修改所有属性。您可以通过“检查器”面板或 Swift 代码来修改对象的属性。\n\n## 更改对象的大小和位置\n\
  \n将对象放置在用户界面上后，您可以使用鼠标更改其大小或位置，或者通过为其高度和宽度或从视图左上角测量的 X 和 Y 值（如图 6-1 所示）定义特定值来更改。\n\
  \n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig1_HTML.png](img/329781_5_En_6_Fig1_HTML.png)\n\
  \n图 6-1 从左上角测量对象的 X 和 Y 位置\n\n通过使用鼠标，您可以轻松更改对象的大小或位置，但为对象的高度、宽度、X 和 Y 值定义特定值可以让您精确控制该对象的大小和位置。\n\
  \n要了解如何更改用户界面上对象的大小和位置，请按照以下步骤操作：\n\n1.  使用“单视图应用”模板（参见第 1 章）创建一个新的 iOS 项目，并将此新项目命名为\
  \ `ObjectApp`。这会为用户界面创建一个单独的视图。\n\n2.  在导航器面板中单击 `Main.storyboard` 文件。Xcode 会显示该单一视图。\n\
  \n3.  确保 Xcode 中间面板底部的“视图方式：”文本显示为 iPhone 8，如图 6-2 所示。\n\n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig2_HTML.jpg](img/329781_5_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2 定义您的故事板用户界面以模拟 iPhone 8 屏幕\n\n4.  单击“库”图标以打开“对象库”窗口。\n\n5.  将一个按钮拖放到视图上的任意位置。按钮周围会出现手柄，如图\
  \ 6-3 所示。任何时候您选择一个对象，手柄都会出现以显示您选择了哪些对象。\n\n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig3_HTML.jpg](img/329781_5_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3 手柄出现在选中的对象周围\n\n6.  将鼠标指针移到按钮周围的手柄上，直到鼠标指针变成双向箭头。\n\n7.  拖动鼠标以调整按钮大小，使其变得更宽或更窄、更高或更短。当您更改对象的大小时，Xcode\
  \ 会在该对象的左上角显示其当前宽度和高度，如图 6-4 所示。\n\n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig4_HTML.jpg](img/329781_5_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4 拖动鼠标时查看对象的高度和宽度\n\n8.  确保手柄仍然出现在按钮周围。（如果没有，请单击按钮以将其选中。）\n\n9.  选择“视图”➤“检查器”➤“大小检查器”，或单击“检查器”面板顶部的“大小检查器”图标。“大小检查器”面板中的“视图”类别会显示用于指定所选对象的高度、宽度、X\
  \ 和 Y 值的文本字段，如图 6-5 所示。\n\n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig5_HTML.jpg](img/329781_5_En_6_Fig5_HTML.jpg)\n\
  \n图 6-5 “视图”类别允许您在“大小检查器”面板中定义大小和位置值\n\n10. 在“宽度”文本字段中单击，输入 `80`，然后按 ENTER 键。\n\n\
  11. 在“高度”文本字段中单击，输入 `30`，然后按 ENTER 键。\n\n12. 将鼠标指针移到按钮上。当鼠标指针变成手形图标时，将按钮拖动到视图的左上角，直到看到两条蓝色参考线出现，如图\
  \ 6-6 所示。\n\n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig6_HTML.jpg](img/329781_5_En_6_Fig6_HTML.jpg)\n\
  \n图 6-6 出现参考线以帮助您使用鼠标对齐对象\n\n13. 松开鼠标按钮。注意，停止移动鼠标后，蓝色参考线会消失。\n\n14. 单击 X 文本字段中的上/下箭头以更改其中显示的值。注意，当您增加\
  \ X 值时，按钮会向右移动；当您减小 X 值时，按钮会向左移动。\n\n15. 确保 X 文本字段中显示值为 16，然后单击 Y 文本字段。\n\n16. 单击\
  \ Y 文本字段中的上/下箭头。注意，当您增加 Y 值时，按钮会向下移动；当您减小 Y 值时，按钮会向上移动。\n\n17. 确保 Y 文本字段中显示值为 20。注意，当您定义特定的\
  \ X 或 Y 值来定义按钮在视图上的位置时，不会出现蓝色参考线，因为只有在使用鼠标移动对象时才会显示它们。\n\n\n\n### 更改对象的属性\n\n每个对象都允许您定义其大小和位置，但您也可以根据对象类型修改其他属性。例如，按钮允许您更改定义按钮上显示文本的\
  \ `Title` 属性，而文本字段则具有定义文本字段内显示文本的 `Text` 属性。\n\n若要查看不同对象如何提供不同类型的属性，请按照以下步骤操作：\n\
  \n1. 确保你的 `ObjectApp` 项目已在 `Xcode` 中加载。\n2. 在导航器窗格中点击 `Main.storyboard` 文件。\n3.\
  \ 点击库图标以显示对象库。\n4. 将文本字段拖放至故事板的任意位置。\n5. 将鼠标指针移到文本字段上。当鼠标指针变成手形图标时，将鼠标拖动到视图左上角按钮的下方。请注意，当两个对象靠近时，会出现参考线帮助你将一个对象与另一个对象对齐，如图\
  \ 6-7 所示。\n\n   ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig7_HTML.jpg](img/329781_5_En_6_Fig7_HTML.jpg)\n\
  \n   图 6-7  \n   将对象拖到另一对象附近时出现的参考线\n\n6. 点击文本字段将其选中，使其周围出现控制柄。\n7. 选择 `View ➤ Inspectors\
  \ ➤ Show Attributes Inspector`，或点击检查器窗格顶部的属性检查器图标。\n8. 点击 `Text` 文本字段，输入 `Hello`\
  \ 并按 `ENTER` 键。请注意，文本会显示在 `Text` 文本字段以及用户界面上的文本字段中，如图 6-8 所示。\n\n   ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig8_HTML.jpg](img/329781_5_En_6_Fig8_HTML.jpg)\n\
  \n   图 6-8  \n   更改文本字段的 `Text` 属性\n\n9. 点击按钮，使其周围出现控制柄。请注意，属性检查器窗格会发生变化，以显示所选按钮的属性。\n\
  10. 点击 `Title` 文本字段，输入 `OK` 并按 `ENTER` 键。请注意，`OK` 现在也会显示在按钮上，如图 6-9 所示。\n\n    ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig9_HTML.jpg](img/329781_5_En_6_Fig9_HTML.jpg)\n\
  \n    图 6-9  \n    更改按钮的 `Title` 属性\n\n11. 点击文本字段将其选中。\n12. 选择 `View ➤ Inspectors\
  \ ➤ Show Size Inspector`，或点击检查器窗格顶部的大小检查器图标。\n13. 点击 `X` 文本字段，输入 16，然后按 `ENTER`\
  \ 键。请注意，文本字段会向左移动，靠近视图的左边界。\n14. 点击 `Y` 文本字段，输入 115，然后按 `ENTER` 键。请注意，文本字段会出现在按钮下方。\n\
  \n### 了解安全区域\n\n目前，你的 `ObjectApp` 用户界面在左上角包含一个按钮，其下方有一个文本字段。由于我们现在使用的故事板模仿的是 iPhone\
  \ 8，因此只要在 iPhone 8 上运行，或者在模拟器中模拟 iPhone 8 时运行，用户界面看起来都会很完美。但是，如果我们将故事板切换为模仿 iPhone\
  \ XR，按钮的位置突然就看起来不对劲了，如图 6-10 所示。\n\n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig10_HTML.jpg](img/329781_5_En_6_Fig10_HTML.jpg)\n\
  \n图 6-10  \n在 iPhone XR 屏幕上查看 `ObjectApp` 用户界面\n\n问题在于，我们根据 iPhone 8 的屏幕尺寸放置了按钮，但\
  \ iPhone XR 的屏幕尺寸略有不同。在设计 iOS 应用时，你永远无法预知用户会在哪种 iOS 设备上运行你的应用，可能是屏幕较小的 iPhone SE，也可能是屏幕较大的\
  \ iPad Pro。苹果每年都会推出不同尺寸的 iPhone 和 iPad，所以你永远无法预测未来的屏幕尺寸会如何变化。\n\n为了帮助你设计出在当前及未来任何\
  \ iOS 设备上都能良好显示的 iOS 应用，`Xcode` 提供了两个功能：\n\n- 安全区域\n- 自动布局\n\n安全区域定义了应放置用户界面对象的区域，这样它们就能在任何\
  \ iOS 设备屏幕上正确显示。要查看任何 iOS 设备的安全区域，请按照以下步骤操作：\n\n1. 确保 `ObjectApp` 项目已在 `Xcode` 中加载。\n\
  2. 在导航器窗格中点击 `Main.storyboard` 文件以查看应用的用户界面。\n3. 在文档大纲中点击 `Safe Area`。（如果文档大纲不可见，请选择\
  \ `Editor ➤ Show Document Outline`，或点击 `Xcode` 窗口底部附近的文档大纲图标。）`Xcode` 会为安全区域添加阴影，以便你查看需要放置用户界面对象的位置，如图\
  \ 6-11 所示。请注意，图 6-11 中的按钮显示在安全区域之外，这就解释了它为什么看起来不对劲。\n\n   ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig11_HTML.jpg](img/329781_5_En_6_Fig11_HTML.jpg)\n\
  \n   图 6-11  \n   查看 iOS 设备的安全区域\n\n4. 点击 `Xcode` 窗口底部的“View as:”按钮，为故事板选择另一个模仿的\
  \ iOS 设备，例如 iPhone 8 Plus。请注意，之前在一个 iOS 设备上显示不正确的按钮，现在在另一个 iOS 设备上却显示正确了，如图 6-12\
  \ 所示。\n\n   ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig12_HTML.jpg](img/329781_5_En_6_Fig12_HTML.jpg)\n\
  \n   图 6-12  \n   将故事板查看为 iPhone 8 Plus\n\n\n\n## 定义约束\n\n由于不同的 iOS 设备具有不同的屏幕尺寸（和安全区域），正确设计用户界面的方法是使用一种名为\
  \ Auto Layout 的功能。Auto Layout 的核心思想是，你在安全区域内将对象定位在用户界面上，然后定义这些对象距离安全区域边界应该有多远。\n\
  \n你为用户界面对象定义的这些距离被称为**约束**。约束告诉 Auto Layout 如何在用户界面上定位对象，无论应用当时运行在什么 iOS 设备屏幕上。\n\
  \n约束通过定义对象之间的距离或定义对象的尺寸（宽度/高度）来工作。定义约束的不同方式包括以下这些：\n\n- 定义一个对象与另一个对象或安全区域边界之间的特定距离，或者一个对象的特定高度或宽度。\n\
  - 定义对象可以出现在另一个对象或安全区域边界的最小或最大距离，或者对象的最小/最大高度或宽度。\n- 定义一个对象的相对位置，例如在视图中垂直或水平居中。\n\
  - 定义哪些约束比其他约束具有更高的优先级。\n\n固定约束定义了两个对象（或一个对象与安全区域边界）之间的特定尺寸或距离。这样一来，无论应用在什么 iOS 设备上运行，该对象始终与另一个对象或安全区域边界保持固定的距离。固定距离约束是使用最普遍的约束类型。\n\
  \n定义两个对象（或安全区域边界）之间最小或最大距离的约束允许对象根据应用运行的 iOS 设备来变化其距离。这使得用户界面能够针对更大的 iPad Pro 屏幕调整其外观，并在更小的\
  \ iPhone SE 屏幕上缩小尺寸。定义最小或最大距离的约束通常与固定距离约束一起使用。\n\n在设计简单的用户界面时，你可能只需要设计固定距离约束。在设计更复杂的用户界面时，你可能还需要能改变对象间距离的约束。然而，你在不同的用户界面对象上放置的约束越多，产生矛盾约束的风险就越大。\n\
  \n当你使用两个或更多固定距离约束时，矛盾约束经常发生。例如，你可能希望一个按钮具有固定的宽度，并且距离屏幕左侧和右侧都是固定的距离。然而，在大屏和小屏 iOS\
  \ 设备上，要使一个对象保持固定宽度且同时距离屏幕左右两侧固定距离是不可能的。\n\n解决方案是为不同的约束分配优先级，让一个约束比另一个更重要。这样一来，当你的应用在不同的\
  \ iOS 设备屏幕上运行时，优先级最高的约束会先定义用户界面，然后优先级较低的约束再接着定义用户界面。\n\n### 自动定义约束\n\n定义约束最简单的方法是让\
  \ Xcode 自动为你完成。这种方法的缺点是 Xcode 可能并不总是按照你期望的方式为用户界面创建约束，但如果有必要，你之后总可以删除或修改它的约束。\n\n\
  要了解如何自动定义约束，请按照以下步骤操作：\n\n1. 确保 Xcode 中已加载 ObjectApp 项目。\n2. 在导航窗格中点击 `Main.storyboard`\
  \ 文件。\n3. 选择 `Editor` ➤ `Resolve Auto Layout Issues`。此时会显示一个菜单，如图 [6-13] 所示。该子菜单的上半部分适用于任何选中的对象。下半部分适用于所有对象，无论你是否选中它们。\n\
  \n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig13_HTML.jpg](img/329781_5_En_6_Fig13_HTML.jpg)\n\
  \n图 6-13  \n`Resolve Auto Layout Issues` 子菜单\n\n4. 在子菜单的下半部分选择 `Add Missing Constraints`。\n\
  5. 按住 SHIFT 键并点击按钮和文本字段，使两个对象周围出现手柄。注意 Xcode 会将约束显示为线，用于定义对象之间的距离或安全区域边界，如图 [6-14]\
  \ 所示。\n\n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig14_HTML.jpg](img/329781_5_En_6_Fig14_HTML.jpg)\n\
  \n图 6-14  \n查看选中对象的约束\n\n6. 点击 Xcode 窗口底部的 `View as:` 按钮，选择 iPhone XR，使 storyboard\
  \ 模拟 iPhone XR 的屏幕。注意，在我们定义了约束后，Xcode 正确地将按钮显示在 iPhone XR 屏幕的左上角，如图 [6-15] 所示。\n\
  \n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig15_HTML.jpg](img/329781_5_En_6_Fig15_HTML.jpg)\n\
  \n图 6-15  \n这些约束在任何尺寸的 iOS 屏幕上都能正确定义对象的位置\n\nXcode 会用不同的颜色显示约束，以帮助你发现潜在的问题。Xcode\
  \ 可能会显示的不同颜色约束包括：\n\n- **蓝色** – 你的约束足以在不同尺寸的 iOS 屏幕上定义用户界面对象的位置。\n- **橙色** – 你没有足够的约束来正确定义用户界面对象在不同尺寸\
  \ iOS 屏幕上的位置。\n- **红色** – 你的约束互相矛盾或不足，将无法正确显示用户界面对象的位置。\n\n### 查看和删除约束\n\n一旦定义了约束，你之后可以随时查看或删除它们。查看约束让你有机会修改它们的行为。删除约束则允许你移除任何不需要的约束。\n\
  \n要了解如何查看和删除约束，请按照以下步骤操作：\n\n1. 确保 Xcode 中已加载 ObjectApp 项目。\n2. 在导航窗格中点击 `Main.storyboard`\
  \ 文件。\n3. 如果文档大纲不可见，请选择 `Editor` ➤ `Show Document Outline`，或点击 Xcode 窗口底部的文档大纲图标。\n\
  4. 点击灰色展开三角形的层级结构（`View Controller Scene` ➤ `View Controller` ➤ `View` ➤ `Constraints`）以查看当前定义的所有约束列表，如图\
  \ [6-16] 所示。\n\n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig16_HTML.jpg](img/329781_5_En_6_Fig16_HTML.jpg)\n\
  \n图 6-16  \n在文档大纲中查看约束\n\n5. 点击任意约束以将其选中。注意，该约束的详细信息会出现在检查器窗格中，如图 [6-17] 所示。\n\n\
  ![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig17_HTML.jpg](img/329781_5_En_6_Fig17_HTML.jpg)\n\
  \n图 6-17  \n检查器窗格允许你修改约束的不同部分\n\n6. 点击你想要删除的约束，然后按 BACKSPACE 或 DELETE 键。重复此步骤直到你删除了所有约束。注意，当你删除约束时，Xcode\
  \ 可能会改变任何剩余约束的颜色，以表明你没有足够的约束来正确定义对象在用户界面上的位置。（你也可以通过选择 `Editor` ➤ `Resolve Auto\
  \ Layout Issues` ➤ `Clear Constraints` 来移除约束。如果你选择子菜单的上半部分，将只清除选中对象的约束。如果你选择子菜单的下半部分，将清除所有对象的约束，无论你是否选中了它们。）\n\
  \n\n\n### 手动添加约束\n\n你可以让 `Xcode` 自动定义约束，但也可能需要手动添加约束。要手动添加约束，需要遵循两步流程。首先，选择一个或多个对象。其次，点击\
  \ `Xcode` 窗口底部的某个图标，选择所需的约束类型，如图 6-18 所示：\n\n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig18_HTML.jpg](img/329781_5_En_6_Fig18_HTML.jpg)\n\
  \n图 6-18 – 手动添加约束的图标\n\n- `Align`（对齐）\n- `Add new constraints`（添加新约束）\n- `Resolve\
  \ Auto Layout Issues`（解决自动布局问题，等同于选择 `Editor` ➤ `Resolve Auto Layout Issues`）\n\n\
  `Align`（对齐）图标允许你根据其他对象来定位某个对象，例如按底部或左侧对齐两个对象。此外，`Align`（对齐）图标还允许你将对象定位在视图内的水平或垂直中心位置，如图\
  \ 6-19 所示。\n\n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig19_HTML.png](img/329781_5_En_6_Fig19_HTML.png)\n\
  \n图 6-19 – `Align`（对齐）弹出菜单选项\n\n`Add new constraints`（添加新约束）图标允许你定义尺寸约束，或到附近对象或安全区域边界的距离约束，如图\
  \ 6-20 所示。灰色选项仅在选中两个或更多对象时才可见，这样你可以为所有选中对象定义相同的宽度或高度。\n\n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig20_HTML.png](img/329781_5_En_6_Fig20_HTML.png)\n\
  \n图 6-20 – `Add new constraints`（添加新约束）弹出菜单选项\n\n`Resolve Auto Layout Issues`（解决自动布局问题）图标显示的子菜单与选择\
  \ `Editor` ➤ `Resolve Auto Layout Issues` 相同，如图 6-21 所示。`Reset to Suggested Constraints`（重置为建议的约束）会移除选中对象上的所有现有约束，并添加\
  \ `Xcode` 认为你的对象需要的新约束。如果你已经向某个对象添加了约束，那么 `Add Missing Constraints`（添加缺失的约束）仅会添加\
  \ `Xcode` 认为你的对象需要的约束。\n\n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig21_HTML.jpg](img/329781_5_En_6_Fig21_HTML.jpg)\n\
  \n图 6-21 – `Resolve Auto Layout`（解决自动布局）图标菜单\n\n要了解如何手动定义约束，请遵循以下步骤：\n\n1.  确保 `ObjectApp`\
  \ 项目已加载到 `Xcode` 中。\n2.  在导航面板中点击 `Main.storyboard` 文件。\n3.  点击按钮以选中它，使其出现控制手柄。\n\
  4.  点击 `Align`（对齐）图标。将出现一个弹出菜单（见图 6-19）。\n5.  选中 `Horizontally in Container`（在容器中水平居中）复选框，然后点击\
  \ `Add 1 Constraint`（添加 1 个约束）按钮，如图 6-22 所示。`Xcode` 会将按钮移动到屏幕顶部中间。\n\n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig22_HTML.png](img/329781_5_En_6_Fig22_HTML.png)\n\
  \n图 6-22 – 添加约束以将对象水平放置在视图中\n\n6.  按住 `SHIFT` 键并点击文本字段。此时按钮和文本字段周围都应出现控制手柄，表示两者均被选中。\n\
  7.  点击 `Align`（对齐）图标，弹出菜单出现后，选中 `Horizontal Centers`（水平中心对齐）复选框，然后点击 `Add 1 Constraint`（添加\
  \ 1 个约束）按钮，如图 6-23 所示。`Xcode` 会将文本字段移动到按钮下方居中位置。\n\n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig23_HTML.png](img/329781_5_En_6_Fig23_HTML.png)\n\
  \n图 6-23 – 通过中心将两个对象垂直对齐\n\n8.  点击文本字段以选中它（其周围出现控制手柄），并取消选中按钮。然后点击 `Xcode` 窗口底部的\
  \ `Add new constraints`（添加新约束）图标。将出现一个弹出菜单。\n9.  点击顶部线条，定义文本字段距离最近对象或边框的距离。这将定义一个固定距离约束，如图\
  \ 6-24 所示。\n\n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig24_HTML.jpg](img/329781_5_En_6_Fig24_HTML.jpg)\n\
  \n图 6-24 – 定义从对象顶部到其最近邻居的固定距离\n\n10. 点击 `Add 1 Constraint`（添加 1 个约束）按钮。`Xcode` 会在文本字段顶部和按钮底部之间显示一个约束。然而，此约束显示为橙色，这表示约束不足，无法使文本字段在不同尺寸的\
  \ iOS 屏幕上正确显示。\n11. 再次点击文本字段以选中它，然后点击 `Xcode` 窗口底部的 `Add new constraints`（添加新约束）图标。将再次出现一个弹出菜单。\n\
  12. 点击靠近顶部的线条以选中它。\n13. 点击 `Xcode` 窗口底部的 `Add new constraints`（添加新约束）图标。将出现一个弹出菜单。\n\
  14. 点击顶部线条，定义按钮距离屏幕顶部的距离，如图 6-25 所示。\n\n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig25_HTML.jpg](img/329781_5_En_6_Fig25_HTML.jpg)\n\
  \n图 6-25 – 为按钮定义顶部约束\n\n15. 点击 `Add 1 Constraint`（添加 1 个约束）按钮。`Xcode` 会向按钮添加一个顶部约束。请注意，`Xcode`\
  \ 不再显示任何橙色约束，因为您已经定义了足够的约束来定义所有用户界面对象的显示。\n16. 点击 `Xcode` 窗口底部的“View as:”（视图为：）按钮，然后选择不同的\
  \ iOS 设备进行模拟，例如 iPhone SE 或 iPhone 8 Plus。请注意，无论您选择哪种 iOS 设备，按钮和文本字段都会在屏幕上正确居中并保持间距。\n\
  \n如您所见，`Auto Layout`（自动布局）和约束允许您定义对象在用户界面上的显示位置。在此示例中，我们定义了一个固定距离约束（在文本字段顶部和按钮底部之间），以及一个定义按钮和文本字段水平居中的相对约束。\n\
  \n固定距离约束定义了确切的距离，无论屏幕尺寸如何，而相对约束则根据 iOS 设备屏幕的尺寸自动将按钮和文本字段水平居中。以下是使用约束的一些通用规则：\n\n\
  - 尽可能使用最少的约束。添加的约束越多，在不同尺寸的 iOS 设备屏幕上约束之间相互矛盾的可能性就越大。\n- 避免使用固定距离约束。在极大或极小的 iOS\
  \ 设备屏幕上，固定距离约束会增加扭曲用户界面外观的可能性。\n\n为了避免使用固定值，`Xcode` 提供了两个选项。首先，当您为约束定义一个常量值时，您可以选择输入一个数字，或在\
  \ `Standard Value`（标准值）和 `Canvas Value`（画布值）之间进行选择，如图 6-26 所示。\n\n![../images/329781_5_En_6_Chapter/329781_5_En_6_Fig26_HTML.jpg](img/329781_5_En_6_Fig26_HTML.jpg)\n\
  \n图 6-26 – 您可以选择使用 `Standard`（标准）或 `Canvas Value`（画布值）作为约束\n\n除了使用特定值，您还可以选择使用 `Canvas\
  \ Value`（画布值）来定义约束，该值使用当前故事板大小的距离；或者使用 `Standard Value`（标准值），该值让 `Xcode` 决定针对不同\
  \ iOS 屏幕尺寸使用的最佳值。大多数情况下，请先尝试使用 `Standard Value`（标准值），如果不行，再尝试使用 `Canvas Value`（画布值）。\n\
  \n特定值定义了一个固定距离，但您可以使用该固定值来定义最小或最大距离。这允许两个对象之间（或对象与屏幕边缘之间）的距离根据 iOS 屏幕尺寸在最小值和最大值范围内变化。\n\
  \n\n\n## 更改约束的固定值\n\n要了解如何将约束的固定值更改为标准值或画布值，或定义最小或最大距离，请按以下步骤操作：\n\n1.  确保 `ObjectApp`\
  \ 项目已在 Xcode 中加载。\n2.  在导航器窗格中点击 `Main.storyboard` 文件。\n3.  如果文档大纲不可见，请选择 **编辑器**\
  \ ➤ **显示文档大纲**，或点击 Xcode 窗口底部的“文档大纲”图标。\n4.  点击灰色展开三角形的层级（`视图控制器场景` ➤ `视图控制器` ➤\
  \ `视图` ➤ `约束`）以查看当前定义的所有约束列表。\n5.  点击 `Hello.top = OK.bottom + 64` 约束。检查器窗格会显示图\
  \ 6-27 中该约束的值。\n6.  点击“常量”弹出菜单。会出现一个菜单，让您选择标准值或画布值（见图 6-26）。\n7.  点击“关系”弹出菜单，显示不同的选项，例如“小于或等于”、“等于”或“大于或等于”，如图\
  \ 6-28 所示。“小于或等于”表示距离可以缩小到由常量值定义的最小值。“等于”表示距离必须始终严格等于常量值。“大于或等于”表示距离可以等于常量值或增大到更大的值。\n\
  \n## 使用栈视图\n\n许多应用程序的用户界面会使用多个对象。问题源于为所有这些众多对象定义约束。将某个对象移动到新位置或调整其大小，也需要修改附近对象的所有约束。由于这可能既繁琐又乏味，Xcode\
  \ 提供了一种名为栈视图的解决方案。\n\n栈视图背后的思想是将多个对象分组在一起，并将其视为单个对象。栈视图定义了对象之间的相对位置，而约束则定义了栈视图与屏幕边缘之间的相对关系。栈视图让您可以移动多个对象，而无需担心修改它们之间的各个约束。\n\
  \n要了解栈视图如何工作，请按以下步骤操作：\n\n1.  确保 `ObjectApp` 项目已在 Xcode 中加载。\n2.  在导航器窗格中点击 `Main.storyboard`\
  \ 文件。\n3.  按住 Shift 键并点击按钮和文本字段以同时选中它们。\n4.  选择 **编辑器** ➤ **嵌入于** ➤ **栈视图**，或点击\
  \ Xcode 窗口底部的“栈视图”图标，出现菜单时选择“栈视图”，如图 6-29 所示。Xcode 会在按钮和文本字段周围显示操作手柄。\n5.  点击 Xcode\
  \ 窗口底部的“对齐”图标，并选中**水平居中于容器**复选框。然后点击**添加 1 个约束**按钮，如图 6-30 所示。\n6.  点击 Xco​​de 窗口底部的“添加新约束”图标。出现弹出菜单时，点击定义从栈顶部到屏幕顶部距离的线条，如图\
  \ 6-31 所示。\n7.  点击**添加 1 个约束**按钮。Xcode 会添加一个约束。现在您的用户界面应只有两个约束，一个定义栈到屏幕顶部的距离，另一个将栈水平居中于屏幕，如图\
  \ 6-32 所示。\n8.  点击 Xcode 窗口底部的**视图为:** 按钮，并选择一个不同的 iOS 设备供故事板模拟，例如 iPhone XR 或 iPhone\
  \ SE。无论您选择哪个 iOS 设备，栈和约束都能确保按钮和文本字段在每个屏幕上正确显示。\n9.  确保已选中栈（按钮和文本字段）。然后选择 **编辑器**\
  \ ➤ **取消嵌入**，或点击 Xcode 窗口底部的“栈视图”图标，出现菜单时选择“取消嵌入”，如图 6-33 所示。Xcode 现在会将按钮和文本字段分离，以便您可以再次单独操作和选择它们。\n\
  \n## 总结\n\n当您在用户界面上放置对象时，需要定义每个对象的大小（宽度和高度）和位置（从屏幕左上角测量的 X 和 Y 值）。每个用户界面对象都需要定义其大小和位置。每个用户界面对象可能提供额外的属性用于自定义，例如要显示的文本或背景颜色。通过更改对象的不同属性，您可以自定义其在用户界面上的外观。\n\
  \n由于应用程序可能在具有不同屏幕尺寸的 iOS 设备上运行，因此您必须使用约束来定义对象之间或对象与屏幕边框之间的距离。\n\n每台 iOS 设备都提供一个安全区域来放置对象。只要对象出现在此安全区域内，它们就不会有在不同\
  \ iOS 屏幕上被截断的风险。您需要使用约束来定义希望对象靠近此安全区域边框或邻近对象之间的距离。\n\n约束可以定义对象之间的距离或对象的大小（宽度和高度）。约束可以使用固定值，但通常更好的做法是将对象彼此靠近放置，然后改用标准值或画布值，这有助于在不同尺寸的\
  \ iOS 屏幕上更好地调整用户界面对象的位置。\n\n使用固定值时，可以定义一个严格等于该固定值的距离。为了获得更大的灵活性，您可能希望使用固定值来定义最小值或最大值。这允许对象之间或屏幕边框之间的距离有所变化，仅受最小值或最大值的限制。\n\
  \n如果您有多个对象，可以将它们分组到一个栈视图中。栈视图将对象锁定在其当前的相对位置，并允许您移动整个栈视图并为整个栈视图添加约束，而不是为每个单独的对象进行操作。\n\
  \n\n\n"
- "# 使用常见的用户界面对象\n\n用户界面必须向用户展示信息。此外，用户界面还必须允许用户输入文本或数字等数据。最后，用户界面必须允许用户控制应用程序。显示数据、接收数据和接收命令构成了任何用户界面的核心。\n\
  \n三种最常见的用户界面对象类型包括：\n\n- 标签\n- 文本框\n- 按钮\n\n标签仅用于显示文本。文本框可以显示文本，但最常用于允许用户输入文本。按钮也可以显示文本（通常是该按钮所代表命令的名称），但最常用于让用户控制应用程序。\n\
  \n尽管 Xcode 提供了数十种不同的用户界面对象，但它们的目的无非是显示信息、允许用户输入数据，或为用户提供向应用程序下达命令的方式。这些其他的用户界面对象之所以存在，是为了提供不同的方式来展示信息、允许输入，或提供选择命令的途径。\n\
  \n例如，标签可以将数据显示为文本，但进度视图对象则以条形图的形式直观地展示数据，该条形图会随时间变化，以显示任务已完成多少。标签可以将完全相同的信息显示为数字，但进度视图让用户一眼就能看清进度，同时还能直观地显示任务还剩多少才能完成，如图\
  \ 7-1 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig1_HTML.jpg](img/329781_5_En_7_Fig1_HTML.jpg)\n\
  \n*图 7-1：以文本和可视进度条形式显示信息*\n\n文本框允许用户输入文本作为数据，但在输入数字作为数据时，键入数字可能比较笨拙。作为使用文本框输入数字的替代方案，你可以改用滑块。通过拖动滑块，用户可以快速选择一个数值，而无需费心键入数字或误将字母输成数字，如图\
  \ 7-2 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig2_HTML.jpg](img/329781_5_En_7_Fig2_HTML.jpg)\n\
  \n*图 7-2：滑块让用户无需任何键入即可选择数值*\n\n按钮代表单个命令，但如果需要显示多个命令，显示多个按钮会使屏幕变得杂乱。作为用按钮选择不同命令而让屏幕杂乱的替代方案，应用程序可以提供手势识别器，其中每种手势执行不同的命令，例如缩小或移动某个项目。手势消除了在屏幕上显示命令的需要，并允许用户以不同方式直接用手指操控对象，如图\
  \ 7-3 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig3_HTML.jpg](img/329781_5_En_7_Fig3_HTML.jpg)\n\
  \n*图 7-3：滑块让用户无需任何键入即可选择数值*\n\n通过使用常见的用户界面对象，你可以快速设计一个应用，然后添加 Swift 代码使其真正运行。只需记住尝试不同的用户界面设计，直到找到最适合你应用的那一款。\n\
  \n## 使用标签\n\n标签的主要目的是在屏幕上显示文本。有时，这些文本用于描述相邻对象（例如开关）的用途；有时，这些文本旨在向用户提供更详细的信息，如图 7-4\
  \ 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig4_HTML.jpg](img/329781_5_En_7_Fig4_HTML.jpg)\n\
  \n*图 7-4：标签显示文本以向用户提供信息*\n\n对于所有用户界面对象，有两种自定义方式。其一，你可以在检查器面板中修改属性。其二，你可以使用 Swift\
  \ 代码修改属性。Swift 代码允许你在应用运行时动态更改对象的属性。每个用户界面对象都提供数十种可修改的属性，但你很少需要修改所有属性。\n\n由于标签旨在显示文本，因此最常见的可修改属性是那些影响文本外观的属性，例如颜色、字体或对齐方式。\n\
  \n要了解如何在检查器面板和 Swift 代码中修改标签的更常见属性，请按照以下步骤操作：\n\n1.  使用单视图应用模板创建一个新的 iOS 项目（见第 1\
  \ 章），并将此新项目命名为 `LabelApp`。这将为用户界面创建一个单一视图。\n2.  在导航器面板中单击 `Main.storyboard` 文件。Xcode\
  \ 会显示该单一视图。\n3.  单击库图标以打开对象库窗口。\n4.  将标签拖放到用户界面上的任意位置。\n5.  选择 **View** ➤ **Inspectors**\
  \ ➤ **Show Attributes Inspector**，或单击检查器面板顶部的属性检查器图标。检查器面板会显示标签可用的所有属性。\n6.  单击文本弹出菜单下方的文本字段。默认情况下，每个标签都会显示“Label”，如图\
  \ 7-5 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig5_HTML.jpg](img/329781_5_En_7_Fig5_HTML.jpg)\n\
  \n*图 7-5：用于修改标签中显示文本的属性*\n\n7.  使用 BACKSPACE 或 DELETE 键删除该文本，键入**This is a label**，然后按\
  \ ENTER 键。Xcode 会在用户界面上的标签中显示“This is a label”。（你也可以双击标签直接在其上编辑文本。）\n8.  单击字体文本字段最右侧显示内含\
  \ T 的方形图标。会弹出一个菜单，允许你选择不同的字体和字号，如图 7-6 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig6_HTML.jpg](img/329781_5_En_7_Fig6_HTML.jpg)\n\
  \n*图 7-6：为标签中显示的文本定义字体和字号*\n\n9.  单击字体弹出菜单。当另一个菜单出现时，选择 Custom，如图 7-7 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig7_HTML.jpg](img/329781_5_En_7_Fig7_HTML.jpg)\n\
  \n*图 7-7：选择 Custom 可以为标签中的文本定义字体*\n\n10.  单击 Family 弹出菜单。会显示所有可用字体的列表。\n11.  点击你想要使用的字体，例如\
  \ Helvetica。\n12.  在 Size 文本字段中单击并键入一个新值（例如 24），或者点击文本字段最右侧的上/下箭头来增加/减少显示的值。\n13.\
  \  单击 Done 按钮。Xcode 会以你选择的字体和字号显示标签文本。\n\n更改文本、字体和字号是修改标签最常见的方式。自定义标签的其他方式包括更改其背景、标签可以显示的行数，以及文本是显示为启用状态（深色）还是禁用状态（灰色）。要了解如何更改标签的这些属性，请按照以下步骤操作：\n\
  \n\n\n1. 选择（或清除）`Enabled`复选框。如果`Enabled`复选框被选中，文本将正常显示；但如果`Enabled`复选框被清除，文本将显示为灰色，如图\
  \ 7-8 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig8_HTML.jpg](img/329781_5_En_7_Fig8_HTML.jpg)\n\
  \n图 7-8 — `Enabled`复选框定义了文本的外观\n\n2. 点击`Background`弹出菜单。将出现一个包含不同颜色的菜单，如图 7-9 所示。\n\
  \n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig9_HTML.jpg](img/329781_5_En_7_Fig9_HTML.jpg)\n\
  \n图 7-9 — 为标签选择背景颜色\n\n3. 将鼠标指针移到标签最右边的手柄上，向左下方拖动鼠标以缩小标签的宽度并增加其高度。请注意，标签内的文本显示被截断，如图\
  \ 7-10 所示。这是因为`Lines`文本字段包含的值为`1`，这意味着标签只能显示一行文本。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig10_HTML.jpg](img/329781_5_En_7_Fig10_HTML.jpg)\n\
  \n图 7-10 — 调整标签大小\n\n4. 点击`Lines`文本字段并输入`2`，或者点击`Lines`文本字段最右侧的上/下箭头直到数字`2`出现。这允许标签最多显示两行文本。请注意，当您将`Lines`属性增加到`2`时，标签现在会显示两行文本，如图\
  \ 7-11 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig11_HTML.png](img/329781_5_En_7_Fig11_HTML.png)\n\
  \n图 7-11 — 在标签中显示两行文本\n\n#### 注意\n\n如果您需要标签显示多行文本，请增加`Lines`文本字段中的值。如果您在`Lines`文本字段中指定的值为`0`（零），则标签将能够容纳无限行数的文本。\n\
  \n在您知道应用运行前文本应如何显示的情况下，在 Inspector 面板中修改标签的属性是可行的。但在某些情况下，您可能需要在应用运行时更改标签的属性。最常见的更改属性是`Text`属性，它定义了标签内显示的文本，但\
  \ Inspector 面板中显示的任何属性都可以使用 Swift 代码进行修改。要修改任何用户界面对象，您必须首先为您想要使用 Swift 代码修改的每个用户界面对象定义一个`IBOutlet`变量。\n\
  \n要了解如何使用 Swift 代码更改标签的属性，请遵循以下步骤：\n\n1. 在 Xcode 中打开`LabelApp`的`Main.storyboard`文件，点击库图标打开`Object\
  \ Library`窗口。\n\n2. 拖放一个按钮到视图的任意位置。\n\n3. 选择 `Editor` ➤ `Resolve Auto Layout Issues`\
  \ ➤ `Reset to Suggested Constraints`（位于菜单底部）。Xcode 会为按钮和标签添加约束。\n\n4. 选择 `View`\
  \ ➤ `Assistant Editor` ➤ `Show Assistant Editor`，或点击 Xcode 窗口右上角的`Assistant Editor`图标。Xcode\
  \ 会将`Main.storyboard`文件与`ViewController.swift`文件并排显示。\n\n5. 将鼠标指针移到标签上，按住`Control`键，从标签`Ctrl`-拖拽到`ViewController.swift`文件中“`class\
  \ ViewController`”行下方的空白区域，如图 7-12 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig12_HTML.jpg](img/329781_5_En_7_Fig12_HTML.jpg)\n\
  \n图 7-12 — 从标签`Ctrl`-拖拽到`ViewController.swift`文件\n\n6. 松开`Control`键和鼠标左键。将出现一个窗口，如图\
  \ 7-13 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig13_HTML.jpg](img/329781_5_En_7_Fig13_HTML.jpg)\n\
  \n图 7-13 — 出现一个窗口，允许您为标签定义一个`IBOutlet`变量\n\n7. 点击`Name`文本字段，输入一个描述性名称，例如`myLabel`。\n\
  \n8. 点击`Connect`按钮。Xcode 会创建一个`IBOutlet`变量，如下所示：\n\n```\n@IBOutlet var myLabel:\
  \ UILabel!\n```\n\n9. 将鼠标指针移到按钮上，按住`Control`键，从按钮`Ctrl`-拖拽到`ViewController.swift`文件中最后一个大括号上方的区域，如图\
  \ 7-14 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig14_HTML.jpg](img/329781_5_En_7_Fig14_HTML.jpg)\n\
  \n图 7-14 — 从按钮`Ctrl`-拖拽到`ViewController.swift`文件\n\n10. 松开`Control`键和鼠标左键。将出现一个窗口，如图\
  \ 7-15 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig15_HTML.jpg](img/329781_5_En_7_Fig15_HTML.jpg)\n\
  \n图 7-15 — 从按钮`Ctrl`-拖拽到`ViewController.swift`文件\n\n11. 确保`Connection`弹出菜单显示为`Action`，然后点击`Name`文本字段并输入`changeLabel`。\n\
  \n12. 点击`Type`弹出菜单并选择`UIButton`。\n\n13. 点击`Connect`按钮。Xcode 会显示一个`IBAction`方法，如下所示：\n\
  \n```\n@IBAction func changeLabel(_ sender: UIButton) {\n}\n```\n\n14. 编辑这个`changeLabel`方法，如下所示：\n\
  \n```\n@IBAction func changeLabel(_ sender: UIButton) {\n    myLabel.text = \"Text\
  \ created by Swift \\ncode using Xcode\"\n    myLabel.numberOfLines = 2\n    myLabel.font\
  \ = UIFont(name: \"Courier\", size: 14)\n    myLabel.backgroundColor = UIColor.yellow\n\
  \    myLabel.isEnabled = false\n}\n```\n\n**注意**  在上述 Swift 代码中，`\\n`符号代表换行。这将强制文本在下一行显示。\n\
  \n15. 点击`Run`按钮或选择`Product` ➤ `Run`。模拟器将在一个模拟的 iOS 设备中显示您的应用。\n\n16. 点击用户界面上的按钮。Swift\
  \ 代码会通过更改文本、标签中显示的行数、字体和字号、背景颜色以及禁用它来修改文本，如图 7-16 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig16_HTML.jpg](img/329781_5_En_7_Fig16_HTML.jpg)\n\
  \n图 7-16 — 使用 Swift 代码在标签中显示修改后的文本\n\n17. 选择`Simulator` ➤ `Quit Simulator`以返回 Xcode。\n\
  \n请注意，Swift 代码可以修改标签的每个属性。要了解要使用的确切 Swift 命令，您需要查阅 Apple 的文档。由于我们需要访问标签的属性，因此需要查找标签有哪些可用属性。在\
  \ iOS 中，标签对象被称为`UILabel`。\n\n要在 Xcode 中查看 Apple 的文档，请选择`Help` ➤ `Developer Documentation`以打开文档窗口。然后输入您要查找的单词或短语。在这种情况下，我们想要关于标签的信息，因此我们在文档窗口中输入`UILabel`。这将显示有关您可以在标签中访问和修改的所有属性的信息，如图\
  \ 7-17 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig17_HTML.jpg](img/329781_5_En_7_Fig17_HTML.jpg)\n\
  \n图 7-17 — 在文档窗口中查看可用属性\n\n\n\n## 使用文本字段\n\n若只需显示文本，请使用标签。若要用户输入文本，则需使用文本字段。使用文本字段的关键在于，应用必须在屏幕上显示虚拟键盘。使用虚拟键盘时，需要注意其在屏幕上的位置以及文本字段的位置。\n\
  \n如果文本字段靠近屏幕顶部，虚拟键盘可以向上滑动而不会遮挡文本字段。但如果文本字段过于靠近屏幕底部，虚拟键盘向上滑动时会遮盖用户要输入的文本字段。\n\n若出现这种情况，应用需要将视图向上滑动，保持文本字段可见，同时让虚拟键盘占据屏幕底部。当用户完成文本字段的输入后，虚拟键盘需要消失，文本字段也需要回到原位。\n\
  \n为了让屏幕随虚拟键盘的出现而上下滑动，每个应用都需要使用 iOS 通知中心，它能检测事件何时发生。当用户点击文本字段时，会发送一条通知，表明虚拟键盘需要出现。当用户完成文本字段的编辑时，会发送另一条通知，表明虚拟键盘需要消失。\n\
  \n要接收通知，应用需要使用 `addObserver` 方法，该方法定义一个对象（即视图）来接收通知，并指定接收到特定通知时要运行的方法。为了检测虚拟键盘何时应出现和消失，我们需要检测两个通知：\n\
  \n- `keyboardWillShowNotification`\n- `keyboardWillHideNotification`\n\n接下来，我们需要编写两个函数来显示和隐藏虚拟键盘。要显示虚拟键盘，我们需要根据虚拟键盘的高度将视图向上滑动，这个高度取决于运行设备的类型，例如\
  \ iPhone SE 这样的小屏幕，或 iPad Pro 这样的大屏幕。\n\n要隐藏虚拟键盘，我们需要将视图恢复到其原始 Y 坐标位置，该位置决定了其在屏幕上的垂直位置。不过，只要光标出现在文本字段中，虚拟键盘就不会消失。\n\
  \n为了让应用关闭虚拟键盘，我们还需要检测用户是否点击了文本字段之外的任何区域。点击视图会告知应用结束文本字段的编辑，进而发送通知以移除虚拟键盘。当视图收到虚拟键盘需要消失的通知时（即用户点击了文本字段外部），我们需要一个函数将视图移回原位。\n\
  \n所有这些都需要编写代码来接收两个通知（`keyboardWillShowNotification` 和 `keyboardWillHideNotification`）。此外，我们还需要检测文本字段外部的点击手势。\n\
  \n最后，我们需要编写三个函数。第一个函数通过计算屏幕高度和宽度，然后根据虚拟键盘的高度将视图向上滑动来显示虚拟键盘。第二个函数结束文本字段的编辑，触发 `keyboardWillHideNotification`。第三个函数在虚拟键盘消失后将视图移回原位。\n\
  \n要了解如何让虚拟键盘随文本字段的出现和消失而动作，请按照以下步骤操作：\n\n1.  使用单视图应用模板创建一个新的 iOS 项目（参见第 1 章），并将此新项目命名为\
  \ `TextFieldApp`。这将为用户界面创建一个单一视图。\n\n2.  在导航窗格中点击 `Main.storyboard` 文件。Xcode 会显示这个单一视图。\n\
  \n3.  点击库图标以显示对象库。\n\n4.  将两个文本字段拖放到视图底部三分之一处，这样当虚拟键盘从底部滑出时，它就会覆盖这些文本字段，如图 7-18\
  \ 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig18_HTML.jpg](img/329781_5_En_7_Fig18_HTML.jpg)\n\
  \n图 7-18 — 将两个文本字段放置在视图底部三分之一处\n\n5.  选择 Editor ➤ Resolve Auto Layout Issues ➤ Reset\
  \ to Suggested Constraints （位于子菜单的下半部分）。这将对两个文本字段应用约束。\n\n6.  在导航窗格中点击 `ViewController.swift`\
  \ 文件。\n\n7.  在 `viewDidLoad` 方法内部添加以下代码：\n\n```\nNotificationCenter.default.addObserver(self,\
  \ selector: #selector(keyboardWillShow), name: UIResponder.keyboardWillShowNotification,\
  \ object: nil)\nNotificationCenter.default.addObserver(self, selector: #selector(keyboardWillHide),\
  \ name: UIResponder.keyboardWillHideNotification, object: nil)\n```\n\n第一行将视图定义为观察者，用于接收\
  \ `keyboardWillShowNotification`。当此通知出现时，应用需要运行名为 `keyboardWillShow` 的函数。第二行将视图定义为观察者，用于接收\
  \ `keyboardWillHideNotification`。当此通知出现时，应用需要运行名为 `keyboardWillHide` 的函数。\n\n8.\
  \  在 `viewDidLoad` 方法内部添加以下代码：\n\n```\nlet tap: UITapGestureRecognizer = UITapGestureRecognizer(target:\
  \ self, action: #selector(self.dismissKeyboard))\nview.addGestureRecognizer(tap)\n\
  ```\n\n这段代码允许视图检测点击手势（即用户点击文本字段外部时）。当这种情况发生时，此行代码会运行一个名为 `dismissKeyboard` 的函数。完整的\
  \ `viewDidLoad` 函数应如下所示：\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
  \    NotificationCenter.default.addObserver(self, selector: #selector(keyboardWillShow),\
  \ name: UIResponder.keyboardWillShowNotification, object: nil)\n    NotificationCenter.default.addObserver(self,\
  \ selector: #selector(keyboardWillHide), name: UIResponder.keyboardWillHideNotification,\
  \ object: nil)\n    let tap: UITapGestureRecognizer = UITapGestureRecognizer(target:\
  \ self, action: #selector(self.dismissKeyboard))\n    view.addGestureRecognizer(tap)\n\
  }\n```\n\n9.  在 `viewDidLoad` 函数下方输入以下代码：\n\n```\n@objc func dismissKeyboard() {\n\
  \    view.endEditing(true)\n}\n```\n\n当用户点击文本字段外部时，此函数运行，结束编辑并发送虚拟键盘需要消失的通知（`keyboardWillHideNotification`）。\n\
  \n10. 在 `dismissKeyboard` 函数下方输入以下代码：\n\n```\n@objc func keyboardWillShow(notification:\
  \ NSNotification) {\n    if let keyboardSize = (notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]\
  \ as? NSValue)?.cgRectValue {\n        if self.view.frame.origin.y == 0 {\n    \
  \        self.view.frame.origin.y -= keyboardSize.height\n        }\n    }\n}\n\
  ```\n\n此函数根据 iOS 屏幕尺寸定义键盘大小。（请记住，iPhone 屏幕比 iPad 屏幕窄。）然后，该函数使用虚拟键盘的高度来确定视图（及其所有用户界面对象）需要向上滑动多远，以便为虚拟键盘腾出空间。\n\
  \n11. 在 `keyboardWillShow` 函数下方输入以下代码：\n\n```\n@objc func keyboardWillHide(notification:\
  \ NSNotification) {\n    if ((notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]\
  \ as? NSValue)?.cgRectValue) != nil {\n        if self.view.frame.origin.y != 0\
  \ {\n            self.view.frame.origin.y = 0\n        }\n    }\n}\n```\n\n此函数检查虚拟键盘是否可见。如果不可见，则不执行任何操作。如果虚拟键盘可见，则将视图向下移回原位以覆盖并隐藏虚拟键盘。完整的\
  \ `ViewController.swift` 文件应如下所示：\n\n\n```swift\nimport UIKit\nclass ViewController:\
  \ UIViewController {\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
  \        NotificationCenter.default.addObserver(self, selector: #selector(keyboardWillShow),\
  \ name: UIResponder.keyboardWillShowNotification, object: nil)\n        NotificationCenter.default.addObserver(self,\
  \ selector: #selector(keyboardWillHide), name: UIResponder.keyboardWillHideNotification,\
  \ object: nil)\n        let tap: UITapGestureRecognizer = UITapGestureRecognizer(target:\
  \ self, action: #selector(self.dismissKeyboard))\n        view.addGestureRecognizer(tap)\n\
  \    }\n    @objc func dismissKeyboard() {\n        view.endEditing(true)\n    }\n\
  \    @objc func keyboardWillShow(notification: NSNotification) {\n        if let\
  \ keyboardSize = (notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]\
  \ as? NSValue)?.cgRectValue {\n            if self.view.frame.origin.y == 0 {\n\
  \                self.view.frame.origin.y -= keyboardSize.height\n            }\n\
  \        }\n    }\n    @objc func keyboardWillHide(notification: NSNotification)\
  \ {\n        if ((notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]\
  \ as? NSValue)?.cgRectValue) != nil {\n            if self.view.frame.origin.y !=\
  \ 0 {\n                self.view.frame.origin.y = 0\n            }\n        }\n\
  \    }\n}\n```\n\n12. 点击`运行`按钮或选择`产品` ➤ `运行`。模拟器出现，屏幕底部附近显示你的两个文本字段。\n\n13. 点击任意文本字段。请注意，虚拟键盘会向上滑动，并将视图（以及两个文本字段）向上移动，如图\
  \ 7-19 所示。（如果虚拟键盘因任何原因未出现，你可以通过选择`硬件` ➤ `键盘` ➤ `切换软件键盘`，或按`Command + K`使其显示或消失。）\n\
  \n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig19_HTML.jpg](img/329781_5_En_7_Fig19_HTML.jpg)\n\
  \n**图 7-19** 当用户点击文本字段时，虚拟键盘出现\n\n14. 点击虚拟键盘上的按键，在文本字段中输入一个单词。\n\n15. 点击第二个文本字段，并使用虚拟键盘输入另一个单词。\n\
  \n16. 点击文本字段之外的任意位置。请注意，虚拟键盘会消失。\n\n17. 选择`模拟器` ➤ `退出模拟器`，返回 Xcode。\n\n### 定义不同的键盘\n\
  \n了解如何让虚拟键盘出现和消失而不遮挡文本字段后，下一步是学习如何自定义当用户点击文本字段时出现的键盘类型。默认的虚拟键盘仅显示字母（见图 7-19）。但是，如果文本字段需要存储数字呢？此时，你可以显示一个数字虚拟键盘，如图\
  \ 7-20 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig20_HTML.jpg](img/329781_5_En_7_Fig20_HTML.jpg)\n\
  \n**图 7-20** 数字虚拟键盘\n\n通过提供不同的键盘选项，Xcode 允许你为特定文本字段选择最合适的键盘。例如，如果你预期用户输入 URL（网站）地址，可以选择一个显示`.com`键的虚拟键盘，方便用户输入常见网址。如果文本字段需要输入电话号码，那么虚拟键盘可以显示典型的电话号码拨号盘（见图\
  \ 7-20）。通过选择不同的虚拟键盘，你可以让用户在文本字段中输入特定数据变得更加便捷。\n\n在我们的`TextFieldApp`项目中，有两个文本字段。要查看如何为每个文本字段选择并显示不同的虚拟键盘，请按照以下步骤操作：\n\
  \n1. 确保`TextFieldApp`项目已在 Xcode 中加载。\n\n2. 点击导航窗格中的`Main.storyboard`文件，查看应用程序的用户界面。\n\
  \n3. 点击一个文本字段，然后选择`视图` ➤ `检查器` ➤ `显示属性检查器`，或点击检查器窗格顶部的`属性检查器`图标。\n\n4. 点击`键盘类型`弹出菜单，显示弹出菜单，如图\
  \ 7-21 所示。\n\n   ![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig21_HTML.jpg](img/329781_5_En_7_Fig21_HTML.jpg)\n\
  \n   **图 7-21** 选择要显示的不同虚拟键盘\n\n5. 选择一种虚拟键盘，例如`URL`或`数字小键盘`。\n\n6. 点击第二个文本字段，然后点击`键盘类型`弹出菜单，选择不同的虚拟键盘，例如`电子邮件地址`或`网页搜索`。\n\
  \n7. 点击`运行`按钮或选择`产品` ➤ `运行`。模拟器窗口出现。\n\n8. 点击一个文本字段。注意你为该文本字段定义的虚拟键盘的外观。\n\n9. 点击第二个文本字段。注意该文本字段的虚拟键盘与此不同，如图\
  \ 7-22 所示。\n\n   ![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig22_HTML.jpg](img/329781_5_En_7_Fig22_HTML.jpg)\n\
  \n   **图 7-22** 数字和标点虚拟键盘\n\n10. 选择`模拟器` ➤ `退出模拟器`，返回 Xcode。\n```\n\n\n### 定义文本字段的内容\n\
  \n文本字段用于捕获用户的文本输入，但每个文本字段都有不同的用途。一个文本字段可能用来捕获姓名，而另一个则可能用于捕获电话号码这样的数字数据。还有的文本字段可能需要用于输入密码。\n\
  \n为了定义文本字段接受数据的不同方式，`属性检查器`面板中显示了`文本输入特征`类别，其中包含多种可供选择的选项，如图 7-23 所示。\n\n![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig23_HTML.jpg](img/329781_5_En_7_Fig23_HTML.jpg)\n\
  \n图 7-23\n\n`属性检查器`面板上的`文本输入特征`类别\n\n您可以自定义的一些不同选项包括：\n\n- **内容类型** – 定义文本字段应预期的数据类型，例如电话号码或姓名\n\
  - **首字母大写** – 定义是否对每个单词、仅句首或每个字符进行大写\n- **更正** – 定义自动更正功能的开启或关闭\n- **键盘外观** – 定义深色或浅色外观\n\
  - **Return 键** – 定义 Return 键上显示的标题，例如`Return`、`Join`、`Next`、`Search`或`Done`\n\n\
  选中`安全文本输入`复选框，您可以配置文本字段隐藏用户实际输入的字符，这对于屏蔽密码非常有用。\n\n要了解这些不同的文本字段选项如何工作，请按照以下步骤操作：\n\
  \n1.  确保`TextFieldApp`项目已在`Xcode`中加载。\n2.  单击`导航器`面板中的`Main.storyboard`文件。\n3. \
  \ 单击一个文本字段，然后选择`视图 ➤ 检查器 ➤ 显示属性检查器`，或单击`检查器`面板顶部的`属性检查器`图标。\n4.  单击`内容类型`弹出菜单，选择`Password`，如图\
  \ 7-24 所示。\n   ![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig24_HTML.jpg](img/329781_5_En_7_Fig24_HTML.jpg)\n\
  \   图 7-24\n   将文本字段的内容类型更改为`Password`\n5.  单击`键盘类型`弹出菜单，选择`Default`。\n6.  单击`Return\
  \ 键`弹出菜单，选择`Done`。\n7.  选中`安全文本输入`复选框。\n8.  单击另一个文本字段。\n9.  单击`内容类型`弹出菜单，选择`E-mail\
  \ Address`。\n10. 单击`键盘类型`弹出菜单，选择`E-Mail Address`。\n11. 单击`Return 键`弹出菜单，选择`Send`。\n\
  12. 单击`运行`按钮，或选择`产品 ➤ 运行`。`模拟器`窗口将出现。\n13. 单击定义为`Password`内容类型的文本字段。虚拟键盘将出现，并在右下角显示`Done`。\n\
  14. 单击虚拟键盘按键。注意，当您输入时，文本字段会隐藏实际字符，如图 7-25 所示。\n    ![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig25_HTML.jpg](img/329781_5_En_7_Fig25_HTML.jpg)\n\
  \    图 7-25\n    在文本字段中隐藏输入的字符\n15. 单击另一个文本字段。注意，Web 搜索虚拟键盘将出现，并显示一个`@`键和右下角的`Send`按钮，如图\
  \ 7-26 所示。\n    ![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig26_HTML.jpg](img/329781_5_En_7_Fig26_HTML.jpg)\n\
  \    图 7-26\n    显示带有`Send` Return 键的虚拟键盘\n16. 选择`模拟器 ➤ 退出模拟器`以返回`Xcode`。\n\n通过配置文本字段及其显示的虚拟键盘，您可以自定义文本字段，以便用户使用针对特定任务优化的虚拟键盘输入特定类型的信息。\n\
  \n### 修改文本字段的外观\n\n一旦确定文本字段将要保存的数据类型以及最适合该文本字段显示的虚拟键盘，最后一步就是修改文本字段的外观。修改文本字段外观的几种方式包括：\n\
  \n- **文本** – 存储文本字段中显示的文本\n- **占位符** – 定义以浅灰色显示的文本，用于向用户说明文本字段期望输入的文本类型，例如密码或姓名\n\
  - **颜色** – 定义文本字段中文本的颜色\n- **字体** – 定义文本字段中文本的字体和字号\n- **清除按钮** – 定义文本字段中是否显示清除按钮，允许用户删除文本字段中的所有内容\n\
  \n虽然您可以在`检查器`面板中修改这些属性，但您也可以使用 Swift 代码来定义它们。首先，我们需要为要使用 Swift 代码修改的文本字段创建一个`IBOutlet`。然后，我们需要编写\
  \ Swift 代码来修改文本字段的每个属性。要查看文本字段中所有可以修改的属性，请选择`帮助 ➤ 开发者文档`并搜索`UITextField`。\n\n要了解如何使用\
  \ Swift 代码自定义文本字段的外观，请按照以下步骤操作：\n\n1.  确保`TextFieldApp`项目已在`Xcode`中加载。\n2.  单击`导航器`面板中的`Main.storyboard`文件。\n\
  3.  选择`视图 ➤ 助理编辑器 ➤ 显示助理编辑器`，或单击`Xcode`窗口右上角的`助理编辑器`图标。`Xcode`将在`Main.storyboard`文件旁边显示`ViewController.swift`文件。\n\
  4.  将鼠标指针移到未选中`安全文本输入`复选框的文本字段上，按住`Control`键，然后从该文本字段`Ctrl-拖拽`到`class ViewController`行下方的`ViewController.swift`文件中。\n\
  5.  松开`Control`键和鼠标左键。将出现一个弹出菜单。\n6.  单击`名称`文本字段，输入 **myTextField**。\n7.  单击`连接`按钮。`Xcode`将创建一个`IBOutlet`，如下所示：\n\
  \n```\n@IBOutlet var myTextField: UITextField!\n```\n\n8.  单击`导航器`面板中的`ViewController.swift`文件。\n\
  9.  选择`视图 ➤ 标准编辑器 ➤ 显示标准编辑器`，或单击`Xcode`窗口右上角的`标准编辑器`图标。`Xcode`将显示`ViewController.swift`文件。\n\
  10. 将以下代码添加到`viewDidLoad`函数中：\n\n```\nmyTextField.placeholder = \"Email address\
  \ here\"\nmyTextField.textColor = UIColor.red\nmyTextField.font = UIFont(name: \"\
  Courier\", size: 16)\nmyTextField.clearButtonMode = .whileEditing\n```\n\n完整的`ViewController.swift`文件应如下所示：\n\
  \n\n\n```swift\nimport UIKit\nclass ViewController: UIViewController {\n    @IBOutlet\
  \ var myTextField: UITextField!\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
  \        NotificationCenter.default.addObserver(self, selector: #selector(keyboardWillShow),\
  \ name: UIResponder.keyboardWillShowNotification, object: nil)\n        NotificationCenter.default.addObserver(self,\
  \ selector: #selector(keyboardWillHide), name: UIResponder.keyboardWillHideNotification,\
  \ object: nil)\n        let tap: UITapGestureRecognizer = UITapGestureRecognizer(target:\
  \ self, action: #selector(self.dismissKeyboard))\n        view.addGestureRecognizer(tap)\n\
  \        myTextField.placeholder = \"Email address here\"\n        myTextField.textColor\
  \ = UIColor.red\n        myTextField.font = UIFont(name: \"Courier\", size: 16)\n\
  \        myTextField.clearButtonMode = .whileEditing\n    }\n    @objc func dismissKeyboard()\
  \ {\n        view.endEditing(true)\n    }\n    @objc func keyboardWillShow(notification:\
  \ NSNotification) {\n        if let keyboardSize = (notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]\
  \ as? NSValue)?.cgRectValue {\n            if self.view.frame.origin.y == 0 {\n\
  \                self.view.frame.origin.y -= keyboardSize.height\n            }\n\
  \        }\n    }\n    @objc func keyboardWillHide(notification: NSNotification)\
  \ {\n        if ((notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]\
  \ as? NSValue)?.cgRectValue) != nil {\n            if self.view.frame.origin.y !=\
  \ 0 {\n                self.view.frame.origin.y = 0\n            }\n        }\n\
  \    }\n}\n```\n\n4.  点击**运行**按钮或选择**产品 ➤ 运行**。模拟器将会出现。\n\n5.  点击你连接到`myTextField`\
  \ IBOutlet 的文本字段。（该文本字段应以浅灰色显示“电子邮件地址”，此颜色由`placeholder`属性定义。）\n\n6.  点击虚拟键盘。请注意，当你输入时，字母以红色和\
  \ Courier 字体显示。同时注意，一旦你输入一个字符，清除按钮就会出现在最右侧。\n\n7.  选择**模拟器 ➤ 退出模拟器**以返回 Xcode。\n\
  \n在文本字段中定义清除按钮时，你有四种选择：\n\n*   `.never` – 清除按钮永远不会出现在文本字段中。\n*   `.whileEditing`\
  \ – 清除按钮仅在用户开始在文本字段中编辑文本时出现。\n*   `.unlessEditing` – 清除按钮仅在用户未编辑文本字段中的文本时出现。\n*\
  \   `.always` – 清除按钮始终出现在文本字段中。\n\n通过修改检查器面板中的属性或使用 Swift 代码，你可以自定义文本字段的外观和行为。\n\
  \n## 使用按钮\n\n按钮代表用户可以点击的单个命令。按钮可以显示文本（通过更改**标题**属性）或图形图像（通过更改**图像**属性）。按钮的主要目的是允许用户选择一个命令，让应用执行某个操作。\n\
  \n与标签等并不总是需要链接到`.swift`文件的对象不同，你总是需要将按钮链接到`.swift`文件中的 IBAction 方法。IBAction 方法包含\
  \ Swift 代码，用于使按钮执行特定任务。\n\n要了解如何为按钮创建 IBAction 方法，请按照以下步骤操作：\n\n1.  确保 **TextFieldApp**\
  \ 项目已在 Xcode 中加载。\n\n2.  在导航器面板中点击 **Main.storyboard** 文件。\n\n3.  点击**库**图标以打开对象库窗口。\n\
  \n4.  在视图上拖放一个按钮。\n\n5.  选择**编辑器 ➤ 解决自动布局问题 ➤ 添加缺失的约束**（从子菜单的上半部分选择）。Xcode 会为按钮添加约束。\n\
  \n6.  选择**视图 ➤ 助理编辑器 ➤ 显示助理编辑器**，或点击 Xcode 窗口右上角的**助理编辑器**图标。Xcode 会在`Main.storyboard`文件旁边显示`ViewController.swift`文件。\n\
  \n7.  将鼠标指针移到选中了**安全文本输入**复选框的文本字段上。\n\n8.  按住 **Control** 键，从该文本字段 **Ctrl-拖动**\
  \ 到`ViewController.swift`文件中现有`IBOutlet`变量的下方。\n\n9.  松开 **Control** 键和鼠标左键。会弹出一个菜单。\n\
  \n10. 在**名称**文本字段中点击，输入 **passwordTextField**，然后点击**连接**按钮。Xcode 会创建一个如下所示的`IBOutlet`变量：\n\
  \n    ```swift\n    @IBOutlet var passwordTextField: UITextField!\n    ```\n\n11.\
  \ 将鼠标指针移到按钮上，按住 **Control** 键，从按钮 **Ctrl-拖动** 到`ViewController.swift`文件中靠近底部最后一个大括号上方的位置，如图\
  \ 7-27 所示。\n\n    ![../images/329781_5_En_7_Chapter/329781_5_En_7_Fig27_HTML.jpg](img/329781_5_En_7_Fig27_HTML.jpg)\n\
  \    \n    **图 7-27** Ctrl-拖动以为按钮创建 IBAction 方法\n\n12. 松开 **Control** 键和鼠标左键。会弹出一个菜单。\n\
  \n13. 在**名称**文本字段中点击，输入 **displayPassword**。\n\n14. 点击**类型**弹出菜单，选择 **UIButton**。\n\
  \n15. 点击**连接**按钮。Xcode 会创建一个如下所示的 IBAction 方法：\n\n    ```swift\n    @IBAction func\
  \ displayPassword(_ sender: UIButton) {\n    }\n    ```\n\n16. 按如下方式编辑`displayPassword`\
  \ IBAction 方法：\n\n    ```swift\n    @IBAction func displayPassword(_ sender: UIButton)\
  \ {\n        myTextField.text = passwordTextField.text?.uppercased()\n    }\n  \
  \  ```\n\n    每次用户点击按钮时，这个 IBAction 方法都会运行。它会获取`passwordTextField`中显示的任何文本，将其转换为大写，然后显示在`myTextField`中。\n\
  \n17. 点击**运行**按钮或选择**产品 ➤ 运行**。模拟器窗口将会出现。\n\n18. 点击**密码**文本字段，使用虚拟键盘输入一个单词。\n\n\
  19. 点击按钮。请注意，你在**密码**文本字段中输入的文本现在会以全部大写的形式显示在另一个文本字段中。\n\n20. 选择**模拟器 ➤ 退出模拟器**以返回\
  \ Xcode。\n\n至此，你应该开始对理解用户界面的工作方式感到更加得心应手了。要访问对象中存储或显示的数据，你需要创建`IBOutlet`变量。要执行某种类型的操作，你需要创建一个`IBAction`方法。\n\
  \n\n\n## 摘要\n\n任何用户界面的三个最常见功能包括：显示数据、允许用户输入数据以及允许用户下达命令。最常用的数据显示对象是`标签`。最常用的输入对象是`文本字段`。最常用的命令接收对象是`按钮`。\n\
  \n对于任何对象，你都可以通过`检查器`面板或 Swift 代码对其进行修改。当你需要定义对象的初始外观时，请使用`检查器`面板。在许多情况下，这些初始设置可能就是你所需要的全部内容。\n\
  \n然而，有时你可能需要在应用运行期间更改对象的属性。为此，你需要编写能够修改对象属性的 Swift 代码。要找到在编写 Swift 代码时应使用的属性名称，你需要阅读\
  \ Apple 针对不同对象（例如 `UIButton` 或 `UITextField`）的文档。你可以通过选择“帮助”➤“开发者文档”来访问 Apple 的文档。\n\
  \n在使用文本字段时，你可能需要在虚拟键盘出现时将其移开。为此，你需要使用 Swift 代码检测虚拟键盘何时会出现，以便你的 Swift 代码能将视图向上滑动。当不再需要虚拟键盘时，你的\
  \ Swift 代码必须使其滑回原处，同时将视图移回其初始位置。\n\n由于文本字段可用于存储不同类型的数据，因此你可以为文本字段自定义其可容纳的常见数据类型，例如姓名、电话号码或电子邮件地址。除了定义文本字段能容纳的数据类型外，你还可以定义当用户想要在特定文本字段中输入时，会出现哪种类型的虚拟键盘。不同的虚拟键盘专门用于帮助用户输入不同类型的数据，例如文本、数字或电子邮件地址。\n\
  \n任何用户界面对象的基本目的都是显示信息、接受输入以及允许用户选择命令。标签、文本字段和按钮代表了任何用户界面中最常用的对象类型。所有其他类型的用户界面对象都执行这些功能中的一种或多种，只是以不同的方式实现。\n\
  \n在设计自己的用户界面时，请尝试寻找显示数据、接受用户输入以及提供命令供用户选择的最佳方式。一旦你掌握了标签、文本字段和按钮的基础知识，使用其他用户界面对象就不会有太大困难。\n\
  \n# 8. 步进器、滑块、进度视图和活动指示器视图\n\n标签、文本字段和按钮是最常见的三种用户界面对象，但它们并非仅有的用于显示信息、接受输入和允许用户交互的对象。另外四种能以不同方式显示信息、接受输入并允许交互的用户界面对象包括：\n\
  \n- 步进器\n- 滑块\n- 进度视图\n- 活动指示器视图\n\n`步进器`显示一个减号/加号图标，用户可以点击该图标以固定增量向上或向下增加一个值。通过使用步进器，用户无需键入具体数字即可定义值。\n\
  \n`滑块`为用户提供了另一种无需任何键入即可输入特定值的方式。步进器和滑块都可以定义最小值和最大值，以限制用户只能选择有效的数值。对许多人来说，点击选择值比键入数字本身更容易。\n\
  \n`进度视图`直观地显示任务在完成前还需要进行多少。进度视图显示一个条形，并高亮显示该条形的部分内容，直到整个条形都被高亮显示。通过直观地显示任务的完成情况，进度视图可以让人轻松了解任务还需多少进度才能完成。\n\
  \n`活动指示器视图`提供动画显示，让用户知道某个任务正在处理中。尽管活动指示器视图不显示任务完成前还需多少进度，但它确实提供了动画效果，从而明确告知用户当前有任务正在执行中。\n\
  \n`步进器`和`滑块`使快速、准确地输入数值数据变得容易。`进度视图`让人轻松了解任务完成前还需多少进度，而`活动指示器视图`则只是让用户知道有事情正在发生。\n\
  \n\n\n## 使用步进器\n\n`Steppers`（步进器）可以存储一个数值，用户能够以固定增量（例如 1 或 2.5）来递增该值。你可以定义步进器可表示的最小值和最大值，比如范围在\
  \ 1 到 10 之间。此外，你还可以定义步进器是否循环。循环的意思是，如果你持续递增步进器超过其最大值，它会回到其最小值。同样，如果你持续递减步进器低于其最小值，它会跳转到其最大值。这可以让用户轻松选择不同的值，而不必从一个极端值费力地逐步走到另一个极端值。\n\
  \n要了解步进器的工作原理，请按以下步骤操作：\n\n1. 使用“单视图应用”模板创建一个新的 iOS 项目（参见第 1 章），并将这个新项目命名为`StepperApp`。这会为用户界面创建一个单视图。\n\
  2. 在导航窗格中点击`Main.storyboard`文件。Xcode 会显示该单视图。\n3. 点击“库”图标以打开“对象库”窗口。\n4. 将步进器拖放到视图上的任意位置。\n\
  5. 选择“视图”➤“检查器”➤“显示属性检查器”，或者点击检查器窗格顶部的“属性检查器”图标。检查器窗格会显示步进器可用的所有属性，如图 8-1 所示。\n\n\
  ![../images/329781_5_En_8_Chapter/329781_5_En_8_Fig1_HTML.jpg](img/329781_5_En_8_Fig1_HTML.jpg)\n\
  \n*图 8-1 在检查器窗格中修改步进器的属性*\n\n步进器的默认设置将其当前值定义为 0，最小值定义为 0，最大值定义为 100，增量值定义为 1。\n\n\
  此外，其`Autorepeat`（自动重复）选项是选中的，这意味着用户无需每次都点击步进器来递增或递减其值。相反，用户只需在步进器上按住鼠标左键即可。\n\n\
  `Continuous`（连续）复选框也是选中的，这意味着步进器的值会不断变化以反映最新的数值。如果这个`Continuous` 复选框被清除，那么步进器的值只有在用户停止点击它时才会改变。\n\
  \n`Wrap`（循环）复选框是清除状态，这意味着一旦步进器达到其最小值或最大值，它就不会再递减或递增。如果`Wrap`复选框被选中，那么用户可以越过定义的最大值（100）并再次回到\
  \ 0，或者低于定义的最小值（0）并再次回到 100。\n\n1. 点击“库”图标以打开“对象库”窗口。\n2. 在步进器附近拖放一个标签。\n3. 点击“库”图标以打开“对象库”窗口，并在步进器和标签附近拖放一个按钮。此时，你的用户界面应包含一个步进器、一个标签和一个按钮，如图\
  \ 8-2 所示。\n\n![../images/329781_5_En_8_Chapter/329781_5_En_8_Fig2_HTML.jpg](img/329781_5_En_8_Fig2_HTML.jpg)\n\
  \n*图 8-2 用户界面上的步进器、标签和按钮*\n\n4. 选择“编辑器”➤“解决自动布局问题”➤“重置为建议的约束”（位于子菜单的下半部分）。这会将约束添加到所有对象上。\n\
  5. 选择“视图”➤“助理编辑器”➤“显示助理编辑器”，或者点击“助理编辑器”图标。Xcode 会并排显示`Main.storyboard`和`ViewController.swift`文件。\n\
  6. 将鼠标指针移到标签上，按住 Control 键，然后从标签 Control-拖拽到`ViewController.swift`文件中`class ViewController`行的下方。\n\
  7. 松开 Control 键和鼠标左键。会弹出一个窗口。\n8. 在“名称”文本框中点击，输入`labelValue`，然后点击“连接”按钮。Xcode 会创建一个`IBOutlet`变量，如下所示：\n\
  \n```\n@IBOutlet var labelValue: UILabel!\n```\n\n1. 将鼠标指针移到步进器上，按住 Control 键，然后从步进器\
  \ Control-拖拽到`ViewController.swift`文件中`IBOutlet`行的下方。\n2. 松开 Control 键和鼠标左键。会弹出一个窗口。\n\
  3. 在“名称”文本框中点击，输入`stepperValue`，然后点击“连接”按钮。Xcode 会创建一个`IBOutlet`变量，如下所示：\n\n```\n\
  @IBOutlet var stepperValue: UIStepper!\n```\n\n4. 将鼠标指针移到步进器上，按住 Control 键，然后从步进器\
  \ Control-拖拽到`ViewController.swift`文件底部最后一个花括号的上方。\n5. 松开 Control 键和鼠标左键。会弹出一个窗口。\n\
  6. 在“名称”文本框中点击，输入`stepperChanged`，在“类型”弹出菜单中点击并选择`UIStepper`，然后点击“连接”按钮。Xcode 会创建一个`IBAction`方法，如下所示：\n\
  \n```\n@IBAction func stepperChanged(_ sender: UIStepper) {\n}\n```\n\n7. 将鼠标指针移到按钮上，按住\
  \ Control 键，然后从按钮 Control-拖拽到`ViewController.swift`文件底部最后一个花括号的上方。\n8. 松开 Control\
  \ 键和鼠标左键。会弹出一个窗口。\n9. 在“名称”文本框中点击，输入`changeStepper`，在“类型”弹出菜单中点击并选择`UIButton`，然后点击“连接”按钮。Xcode\
  \ 会创建一个`IBAction`方法，如下所示：\n\n```\n@IBAction func changeStepper(_ sender: UIButton)\
  \ {\n}\n```\n\n10. 编辑`stepperChanged` IBAction 方法，如下所示：\n\n```\n@IBAction func stepperChanged(_\
  \ sender: UIStepper) {\n    labelValue.text = \"\\(stepperValue.value)\"\n}\n```\n\
  \n这个 IBAction 方法会检索步进器的当前值（这是一个数字），并将其显示为文本。然后将此文本放入标签中。\n\n**注意** `\\()`符号被称为字符串插值。你可以在括号内放置任何值，以将该值转换为字符串。\n\
  \n11. 选择“视图”➤“标准编辑器”➤“显示标准编辑器”，或者点击“标准编辑器”图标。\n12. 点击“运行”按钮或选择“产品”➤“运行”。\n13. 多次点击步进器上的`+`图标。请注意，每次点击步进器的`+`图标时，标签中的数值都会增加\
  \ 1。\n14. 多次点击步进器上的`–`图标。请注意，每次点击步进器的`–`图标时，标签中的数值都会减少 1。\n15. 选择“模拟器”➤“退出模拟器”以返回\
  \ Xcode。\n\n步进器的增量为 1，最小值为 0，最大值为 100，这是因为其在属性检查器窗格中显示的默认设置。我们可以在检查器窗格中更改这些设置，但这里我们改为使用\
  \ Swift 代码来更改它们。\n\n要了解如何使用 Swift 代码更改步进器的属性，请按以下步骤操作：\n\n1. 在导航窗格中点击`ViewController.swift`文件。\n\
  2. 编辑`changeStepper` IBAction 方法，如下所示：\n\n```\n@IBAction func changeStepper(_ sender:\
  \ UIButton) {\n    stepperValue.minimumValue = -10\n    stepperValue.maximumValue\
  \ = -5\n    stepperValue.stepValue = 0.5\n    stepperValue.isContinuous = true\n\
  \    stepperValue.autorepeat = true\n    stepperValue.wraps = true\n}\n```\n\n将步进器的`isContinuous`、`autorepeat`和`wraps`属性设置为`true`，等同于在检查器窗格中选中`Continuous`、`Autorepeat`和`Wraps`复选框。\n\
  \n3. 点击“运行”按钮或选择“产品”➤“运行”。模拟器窗口会显示。\n4. 点击步进器上的`+`图标。请注意，每次点击`+`图标时，标签中的值都会增加 1。\n\
  5. 点击按钮。这会运行`changeStepper` IBAction 方法中的 Swift 代码。\n6. 点击步进器中的`–`和`+`图标。请注意，现在步进器以\
  \ 0.5 为增量递增或递减，因为 Swift 代码将其`stepValue`属性定义为了 0.5。\n7. 选择“模拟器”➤“退出模拟器”以返回 Xcode。\n\
  \n完整的`ViewController.swift`文件应如下所示：\n\n\n\n```swift\nimport UIKit\nclass ViewController:\
  \ UIViewController {\n@IBOutlet var labelValue: UILabel!\n@IBOutlet var stepperValue:\
  \ UIStepper!\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n// Do any additional\
  \ setup after loading the view, typically from a nib.\n}\n@IBAction func stepperChanged(_\
  \ sender: UIStepper) {\nlabelValue.text = \"\\(stepperValue.value)\"\n}\n@IBAction\
  \ func changeStepper(_ sender: UIButton) {\nstepperValue.minimumValue = -10\nstepperValue.maximumValue\
  \ = -5\nstepperValue.stepValue = 0.5\nstepperValue.isContinuous = true\nstepperValue.autorepeat\
  \ = true\nstepperValue.wraps = true\n}\n}\n```\n\n## 使用滑块\n\n与步进器类似，滑块允许用户在不输入具体数字的情况下选择数值。步进器强制用户以固定增量/减量更改数值，而滑块则让用户通过简单地改变滑块位置，快速在一系列数值之间进行选择。\n\
  \n滑块的一个缺点是比步进器占用更多空间。另一个缺点是步进器允许你定义固定的增量/减量值，而滑块则不能。\n\n如图 8-3 所示，滑块由三部分组成：\n\n\
  ![../images/329781_5_En_8_Chapter/329781_5_En_8_Fig3_HTML.jpg](img/329781_5_En_8_Fig3_HTML.jpg)\n\
  \n图 8-3\n\n滑块的三个部分\n\n*   拇指滑块\n*   最小轨迹\n*   最大轨迹\n\n最小轨迹和最大轨迹通常以不同颜色显示，以便清晰显示拇指滑块的位置。不过，你可以为拇指滑块、最小轨迹和最大轨迹定义颜色，使其更加醒目。\n\
  \n要了解如何使用滑块，请按照以下步骤操作：\n\n1.  使用“单视图应用”模板（见第 1 章）创建一个新的 iOS 项目，并将该项目命名为 `SliderApp`。这将为界面创建一个单视图。\n\
  \n2.  在导航面板中点击 `Main.storyboard` 文件。Xcode 会显示该单视图。\n\n3.  点击库图标以显示对象库。\n\n4.  将一个标签、一个按钮和一个滑块拖放至视图中。\n\
  \n5.  拉伸滑块的宽度，使其更长。\n\n6.  选择“编辑器”➤“解决自动布局问题”➤“重置为建议的约束”（位于子菜单的下半部分）。这将为标签、按钮和滑块应用约束。\n\
  \n7.  选择“视图”➤“助理编辑器”➤“显示助理编辑器”，或点击助理编辑器图标。Xcode 会并排显示 `Main.storyboard` 和 `ViewController.swift`\
  \ 文件。\n\n8.  将鼠标指针移到标签上，按住 Control 键，然后从标签处按住 Control 键拖拽至 `ViewController.swift`\
  \ 文件中 `class ViewController` 行的下方。\n\n9.  松开 Control 键和鼠标左键。将出现一个弹出窗口。\n\n10. 点击“名称”文本字段，输入\
  \ `labelValue`，然后点击“连接”按钮。Xcode 会按如下方式创建一个 `IBOutlet` 变量：\n\n```swift\n@IBOutlet\
  \ var labelValue: UILabel!\n```\n\n11. 将鼠标指针移到滑块上，按住 Control 键，然后从滑块处按住 Control\
  \ 键拖拽至 `ViewController.swift` 文件中 `IBOutlet` 行的下方。\n\n12. 松开 Control 键和鼠标左键。将出现一个弹出窗口。\n\
  \n13. 点击“名称”文本字段，输入 `sliderValue`，然后点击“连接”按钮。Xcode 会按如下方式创建一个 `IBOutlet` 变量：\n\n\
  ```swift\n@IBOutlet var sliderValue: UISlider!\n```\n\n14. 将鼠标指针移到按钮上，按住 Control\
  \ 键，然后从按钮处按住 Control 键拖拽至 `ViewController.swift` 文件底部最后一个花括号的上方。\n\n15. 松开 Control\
  \ 键和鼠标左键。将出现一个弹出窗口。\n\n16. 点击“名称”文本字段，输入 `changeSlider`，点击“类型”弹出菜单并选择 `UIButton`，然后点击“连接”按钮。Xcode\
  \ 会按如下方式创建一个 `IBAction` 方法：\n\n```swift\n@IBAction func changeSlider(_ sender: UIButton)\
  \ {\n}\n```\n\n17. 将鼠标指针移到滑块上，按住 Control 键，然后从滑块处按住 Control 键拖拽至 `ViewController.swift`\
  \ 文件底部最后一个花括号的上方。\n\n18. 松开 Control 键和鼠标左键。将出现一个弹出窗口。\n\n19. 点击“名称”文本字段，输入 `sliderValueChanged`，点击“类型”弹出菜单并选择\
  \ `UISlider`，然后点击“连接”按钮。Xcode 会按如下方式创建一个 `IBAction` 方法：\n\n```swift\n@IBAction func\
  \ sliderValueChanged(_ sender: UISlider) {\n}\n```\n\n20. 选择“视图”➤“标准编辑器”➤“显示标准编辑器”，或点击\
  \ Xcode 窗口右上角的标准编辑器图标。\n\n21. 在导航面板中点击 `ViewController.swift` 文件进行编辑。\n\n22. 按如下方式修改\
  \ `sliderValueChanged` 方法：\n\n```swift\n@IBAction func sliderValueChanged(_ sender:\
  \ UISlider) {\nlabelValue.text = \"\\(sliderValue.value)\"\n}\n```\n\n完整的 `ViewController.swift`\
  \ 文件应如下所示：\n\n```swift\nimport UIKit\nclass ViewController: UIViewController {\n\
  @IBOutlet var labelValue: UILabel!\n@IBOutlet var sliderValue: UISlider!\noverride\
  \ func viewDidLoad() {\nsuper.viewDidLoad()\n// Do any additional setup after loading\
  \ the view, typically from a nib.\n}\n@IBAction func changeSlider(_ sender: UIButton)\
  \ {\n}\n@IBAction func sliderValueChanged(_ sender: UISlider) {\nlabelValue.text\
  \ = \"\\(sliderValue.value)\"\n}\n}\n```\n\n23. 点击“运行”按钮，或选择“产品”➤“运行”。模拟器窗口会显示。\n\
  \n24. 左右拖动滑块。注意，如果将滑块拇指拖到最左侧，标签中会显示值 0（零）；如果将滑块拇指拖到最右侧，则会显示值 1.0。这是因为滑块的默认最小值和最大值分别为\
  \ 0 和 1。\n\n25. 选择“模拟器”➤“退出模拟器”返回 Xcode。\n\n\n\n### 使用 Swift 代码修改滑块\n\n就像你可以通过属性检查器面板自定义滑块一样，你也可以使用\
  \ Swift 代码来修改滑块。滑块上一些常见的可修改属性包括：\n\n- `.value` – 定义滑块显示的初始值\n- `.minimumValue` –\
  \ 定义滑块可表示的最小值\n- `.maximumValue` – 定义滑块可表示的最大值\n- `.thumbTintColor` – 定义滑块上滑钮的颜色\n\
  - `.minimumTrackTintColor` – 定义最小值轨迹的颜色\n- `.maximumTrackTintColor` – 定义最大值轨迹的颜色\n\
  \n要了解如何使用 Swift 代码修改滑块，请按照以下步骤操作：\n\n1.  确保 SliderApp 项目已在 Xcode 中加载。\n2.  单击导航面板中的\
  \ `ViewController.swift` 文件，编辑 `ViewController.swift` 文件。\n3.  如下所示修改 `changeSlider`\
  \ IBAction 方法：\n\n```swift\n@IBAction func changeSlider(_ sender: UIButton) {\n\
  \    sliderValue.minimumValue = 1\n    sliderValue.maximumValue = 25\n    sliderValue.value\
  \ = 7\n    sliderValue.minimumTrackTintColor = UIColor.red\n    sliderValue.maximumTrackTintColor\
  \ = UIColor.green\n    sliderValue.thumbTintColor = UIColor.black\n}\n```\n\n完整的\
  \ `ViewController.swift` 文件应如下所示：\n\n```swift\nimport UIKit\nclass ViewController:\
  \ UIViewController {\n    @IBOutlet var labelValue: UILabel!\n    @IBOutlet var\
  \ sliderValue: UISlider!\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
  \        // 加载视图后进行任何额外的设置，通常来自 nib 文件。\n    }\n    @IBAction func changeSlider(_\
  \ sender: UIButton) {\n        sliderValue.minimumValue = 1\n        sliderValue.maximumValue\
  \ = 25\n        sliderValue.value = 7\n        sliderValue.minimumTrackTintColor\
  \ = UIColor.red\n        sliderValue.maximumTrackTintColor = UIColor.green\n   \
  \     sliderValue.thumbTintColor = UIColor.black\n    }\n    @IBAction func sliderValueChanged(_\
  \ sender: UISlider) {\n        labelValue.text = \"\\(sliderValue.value)\"\n   \
  \ }\n}\n```\n\n4.  单击“运行”按钮或选择“产品”➤“运行”。此时会出现模拟器窗口。\n5.  左右拖动滑块。请注意，标签显示的值在 0 到\
  \ 1 之间，这些是由属性检查器面板定义的最小值和最大值。\n6.  单击按钮。这会运行 Swift 代码来修改滑块。\n7.  左右拖动滑块。请注意，标签现在显示的值在\
  \ 1 到 25 之间。此外，滑块会以不同的颜色显示滑钮、最小值轨迹和最大值轨迹。\n8.  选择“模拟器”➤“退出模拟器”以返回 Xcode。\n\n## 使用进度视图和活动指示器视图\n\
  \n进度视图显示一个水平条，该水平条会填充颜色以直观地显示任务的进度。当进度视图为空时，表示任务尚未开始。当进度视图完全被颜色填满时，表示任务已完成。当进度视图部分被填充时，则表示任务部分完成。\n\
  \n然而，有时无法确切知道任务何时会完成。在这种情况下，进度视图会显得停滞不前，给人一种什么都没发生或应用可能已崩溃的错觉。当无法确定任务何时完成时，最好使用活动指示器视图，它会显示一个动画旋转器，表明有事情正在发生。\n\
  \n进度视图和活动指示器视图的主要区别在于：\n\n-   进度视图显示任务完成了多少，而活动指示器视图则不显示。\n-   活动指示器视图持续显示有事情正在发生，而进度视图可能不会。\n\
  \n要了解如何使用进度视图和活动指示器视图，请按照以下步骤操作：\n\n1.  使用“单视图应用”模板创建一个新的 iOS 项目（参见第 1 章），并将此新项目命名为\
  \ `ProgressApp`。这会为用户界面创建一个单视图。\n2.  单击导航面板中的 `Main.storyboard` 文件。Xcode 将显示该单视图。\n\
  3.  单击“库”图标以显示对象库。\n4.  将一个按钮和一个活动指示器视图拖放到用户界面上，如图 8-4 所示。\n\n![../images/329781_5_En_8_Chapter/329781_5_En_8_Fig4_HTML.png](img/329781_5_En_8_Fig4_HTML.png)\n\
  \n图 8-4 – 将活动指示器视图从对象库窗口拖到用户界面上\n\n5.  选择“编辑器”➤“解决自动布局问题”➤“重置为建议的约束”（位于子菜单的下半部分）。这将为用户界面上的所有对象添加约束。\n\
  6.  单击导航面板中的 `Main.storyboard` 文件。\n7.  选择“视图”➤“辅助编辑器”➤“显示辅助编辑器”，或单击 Xcode 窗口右上角的“辅助编辑器”图标。Xcode\
  \ 会将 `Main.storyboard` 文件与 `ViewController.swift` 文件并排显示。\n8.  将鼠标移到活动指示器视图上，按住\
  \ Control 键，然后 Control-拖动到 `ViewController.swift` 文件中 `IBOutlet` 行下方。\n9.  松开 Control\
  \ 键和鼠标左键。将出现一个弹出窗口。\n10. 在“名称”文本字段中单击，输入 `activityView`，然后单击“连接”按钮。Xcode 会创建一个如下所示的\
  \ `IBOutlet`：\n\n```swift\n@IBOutlet var activityView: UIActivityIndicatorView!\n\
  ```\n\n11. 将鼠标移到按钮上，按住 Control 键，然后 Control-拖动到 `ViewController.swift` 文件中底部最后一个大括号上方。\n\
  12. 松开 Control 键和鼠标左键。将出现一个弹出窗口。\n13. 在“名称”文本字段中单击，输入 `runButton`，单击“类型”弹出菜单并选择\
  \ `UIButton`，然后单击“连接”按钮。Xcode 会创建一个如下所示的 `IBAction` 方法：\n\n```swift\n@IBAction func\
  \ runButton(_ sender: UIButton) {\n}\n```\n\n14. 选择“视图”➤“标准编辑器”➤“显示标准编辑器”，或单击 Xcode\
  \ 窗口右上角的“标准编辑器”图标。\n15. 单击导航面板中的 `ViewController.swift` 文件。\n16. 在 `IBOutlet` 变量上方添加此行：\n\
  \n```swift\nvar counter = 0\n```\n\n17. 在 `viewDidLoad` 函数内部添加此行：\n\n```swift\n\
  activityView.hidesWhenStopped = true\n```\n\n18. 如下所示编辑这个 `runButton` IBAction 方法：\n\
  \n```swift\n@IBAction func runButton(_ sender: UIButton) {\n    Timer.scheduledTimer(withTimeInterval:\
  \ 1.0, repeats: true) { timer in\n        self.activityView.startAnimating()\n \
  \       self.counter += 1\n        if self.counter >= 5 {\n            self.activityView.stopAnimating()\n\
  \            timer.invalidate()\n        }\n    }\n}\n```\n\n\n\n这段代码运行一个以 1 秒为增量计时的计时器。运行时，它会调用\
  \ `startAnimating` 方法，使活动指示器视图看起来在旋转。活动指示器视图一旦开始旋转，就会显示在屏幕上。\n\n5 秒后，计时器停止运行，并调用\
  \ `stopAnimating` 方法，使活动指示器视图停止旋转。它一旦停止旋转，就会从屏幕上消失。完整的 `ViewController.swift` 文件应如下所示：\n\
  \n```swift\nimport UIKit\nclass ViewController: UIViewController {\n    var counter\
  \ = 0\n    @IBOutlet var activityView: UIActivityIndicatorView!\n    override func\
  \ viewDidLoad() {\n        super.viewDidLoad()\n        activityView.hidesWhenStopped\
  \ = true\n        // Do any additional setup after loading the view, typically from\
  \ a nib.\n    }\n    @IBAction func runButton(_ sender: UIButton) {\n        Timer.scheduledTimer(withTimeInterval:\
  \ 1.0, repeats: true) { timer in\n            self.activityView.startAnimating()\n\
  \            self.counter += 1\n            if self.counter >= 5 {\n           \
  \     self.activityView.stopAnimating()\n                timer.invalidate()\n  \
  \              self.counter = 0\n            }\n        }\n    }\n}\n```\n\n3. \
  \ 点击“运行”按钮，或选择“产品” ➤ “运行”。模拟器屏幕会出现。\n4.  点击该按钮。活动指示器视图会开始旋转，5 秒后，它会消失。\n5.  选择“模拟器”\
  \ ➤ “退出模拟器”以返回 Xcode。\n\n### 使用进度视图\n\n进度视图会逐渐填满，以显示任务的完成进度。这意味着你的应用程序需要知道任务何时完成。由于进度视图以视觉方式显示进度，最好确保进度视图以较快的速度填满，向用户反馈应用程序正在工作，并显示任务即将完成。如果进度视图填满得太慢，应用程序可能会显得卡顿。\n\
  \n要了解进度视图如何工作，请按照以下步骤操作：\n\n1.  确保 `ProgressApp` 已加载到 Xcode 中。\n2.  在导航窗格中点击 `Main.storyboard`\
  \ 文件。Xcode 会显示单个视图。\n3.  点击“库”图标以显示对象库。\n4.  将标签、步进器和进度视图拖放到用户界面中，使标签位于进度视图上方，步进器位于进度视图下方，如图\
  \ 8-5 所示。\n5.  点击标签，并展开标签的宽度，使其拉伸到进度视图两端之外。\n6.  按住 Shift 键，点击标签、进度视图和步进器，使这三个对象周围都出现控制手柄。\n\
  7.  选择“编辑器” ➤ “解决自动布局问题” ➤ “重置为建议的约束”（子菜单的下半部分）。这将为标签、进度视图和步进器设置约束。\n8.  将鼠标移到标签上，按住\
  \ Control 键，然后 Control-拖动到 `@IBOutlet` 行下方的 `ViewController.swift` 文件中。\n9.  松开\
  \ Control 键和鼠标左键。将出现一个弹出窗口。\n10. 点击“名称”文本字段并输入 `labelProgress`，然后点击“连接”按钮。Xcode\
  \ 会创建一个 `@IBOutlet`，如下所示：\n\n```swift\n@IBOutlet var labelProgress: UILabel!\n```\n\
  \n11. 将鼠标移到进度视图上，按住 Control 键，然后 Control-拖动到 `class ViewController` 行下方的 `ViewController.swift`\
  \ 文件中。\n12. 松开 Control 键和鼠标左键。将出现一个弹出窗口。\n13. 点击“名称”文本字段并输入 `progressView`，然后点击“连接”按钮。Xcode\
  \ 会创建一个 `@IBOutlet`，如下所示：\n\n```swift\n@IBOutlet var progressView: UIProgressView!\n\
  ```\n\n14. 将鼠标移到步进器上，按住 Control 键，然后 Control-拖动到 `@IBOutlet` 行下方的 `ViewController.swift`\
  \ 文件中。\n15. 松开 Control 键和鼠标左键。将出现一个弹出窗口。\n16. 点击“名称”文本字段并输入 `stepperObject`，然后点击“连接”按钮。Xcode\
  \ 会创建一个 `@IBOutlet`，如下所示：\n\n```swift\n@IBOutlet var stepperObject: UIStepper!\n\
  ```\n\n17. 将鼠标移到步进器上，按住 Control 键，然后 Control-拖动到 `ViewController.swift` 文件底部最后一个大括号上方的位置。\n\
  18. 松开 Control 键和鼠标左键。将出现一个弹出窗口。\n19. 点击“名称”文本字段，输入 `stepperChanged`，点击“类型”弹出菜单并选择\
  \ `UIStepper`，然后点击“连接”按钮。Xcode 会创建一个 `@IBAction` 方法，如下所示：\n\n```swift\n@IBAction\
  \ func stepperChanged(_ sender: UIStepper) {\n}\n```\n\n20. 选择“视图” ➤ “标准编辑器” ➤ “显示标准编辑器”，或点击\
  \ Xcode 窗口右上角的“标准编辑器”图标。\n21. 在导航窗格中点击 `ViewController.swift` 文件。\n22. 编辑 `stepperChanged`\
  \ `IBAction` 方法，如下所示：\n\n```swift\n@IBAction func stepperChanged(_ sender: UIStepper)\
  \ {\n    labelProgress.text = \"Completed \\(Int(stepperObject.value * 10)) of 10\
  \ tasks\"\n    progressView.progress = Float(stepperObject.value)\n}\n```\n\n第一行从步进器获取值，将其乘以\
  \ 10，并将值转换为整数。第二行获取步进器的值，将其转换为 `Float` 值，并将此值存储在进度视图中，进度视图通过填充自身来显示该值。\n\n23. 编辑\
  \ `viewDidLoad` 方法，添加以下三行代码：\n\n```swift\nprogressView.progress = 0\nstepperObject.stepValue\
  \ = 0.1\nstepperObject.maximumValue = 1.0\n```\n\n第一行将进度视图的值设置为 0，使其在用户界面上看起来是完全空的。第二行定义步进器增量为\
  \ 0.1。第三行定义步进器最大值为 1.0。完整的 `ViewController.swift` 文件应如下所示：\n\n```swift\nimport UIKit\n\
  class ViewController: UIViewController {\n    var counter = 0\n    @IBOutlet var\
  \ labelProgress: UILabel!\n    @IBOutlet var progressView: UIProgressView!\n   \
  \ @IBOutlet var stepperObject: UIStepper!\n    @IBOutlet var activityView: UIActivityIndicatorView!\n\
  \    override func viewDidLoad() {\n        super.viewDidLoad()\n        activityView.hidesWhenStopped\
  \ = true\n        progressView.progress = 0\n        stepperObject.stepValue = 0.1\n\
  \        stepperObject.maximumValue = 1.0\n        // Do any additional setup after\
  \ loading the view, typically from a nib.\n    }\n    @IBAction func runButton(_\
  \ sender: UIButton) {\n        Timer.scheduledTimer(withTimeInterval: 1.0, repeats:\
  \ true) { timer in\n            self.activityView.startAnimating()\n           \
  \ self.counter += 1\n            if self.counter >= 5 {\n                self.activityView.stopAnimating()\n\
  \                timer.invalidate()\n                self.counter = 0\n        \
  \    }\n        }\n    }\n    @IBAction func stepperChanged(_ sender: UIStepper)\
  \ {\n        labelProgress.text = \"Completed \\(Int(stepperObject.value * 10))\
  \ of 10 tasks\"\n        progressView.progress = Float(stepperObject.value)\n  \
  \  }\n}\n```\n\n24. 点击“运行”按钮，或选择“产品” ➤ “运行”。模拟器窗口会出现。\n25. 多次点击步进器上的 `+` 图标。请注意，每次点击步进器上的\
  \ `+` 图标时，进度视图看起来会更满，并且标签会显示进度，如图 8-6 所示。\n26. 选择“模拟器” ➤ “退出模拟器”以返回 Xcode。\n\n\n\
  \n## 摘要\n\n当你的应用需要用户输入数值数据时，文本框虽然可行，但使用起来可能不够便捷，尤其是当你只想接受一个有限范围的数值时。为了简化数值数据的输入，可以使用步进器或滑块。\n\
  \n步进器和滑块都可以定义最小值和最大值，这样用户就无法输入低于最小值或高于最大值的数值。步进器的额外优势在于，它可以让用户按固定值递增/递减数值。\n\n步进器占用空间更小，但滑块通过简单拖拽滑块上的拇指（圆形）就能更轻松地将数值从一个极端更改为另一个极端。如果可接受的数值范围很大，步进器会强制用户逐次递增/递减，因此定义数值的速度可能会慢得多。\n\
  \n为了显示任务的进度，你的应用可以使用标签显示一条消息，但更简单的方法是使用`进度视图`或`活动指示器视图`。`进度视图`可以让用户了解任务完成的进度，而`活动指示器视图`则让用户知道有事情正在发生。\n\
  \n你可以单独或同时使用`进度视图`或`活动指示器视图`。`活动指示器视图`通常会显示动画，然后在任务完成时消失。\n\n通过使用步进器和滑块，你可以让用户轻松输入数值数据。通过使用`进度视图`和`活动指示器视图`，你的应用可以轻松地让用户知道任务正在执行。\n\
  \n# 图像视图和文本视图\n\n文本字段可以显示文本，并允许用户编辑或输入新文本。但是，如果需要显示大量文本，文本字段可能会显得过于局限。为了克服文本字段大小有限的问题，你可以改用文本视图。文本视图本质上是文本字段的放大版本，可以显示大量文本，或允许用户编辑和输入大量文本。\n\
  \n由于并非所有数据都是文本，你可以使用图像视图来显示图形图像。图像视图可以显示纯装饰性的图形，或为用户提供额外信息，例如根据用户正在执行的操作更改图像。文本视图和图像视图都可以让你在\
  \ iOS 用户界面上显示任意大小的信息。\n\n## 使用图像视图\n\n在最简单的情况下，图像视图可以显示图形图像，例如`.jpg`或`.png`图像。然而，图像视图也可以允许交互，从而能够响应用户的触摸或手势。这使得图像视图既能显示图形图像，又能识别用户的触摸输入。\n\
  \n要了解图像视图的工作原理，请遵循以下步骤：\n\n1. 使用“单视图应用”模板创建一个新的 iOS 项目（参见第 1 章），并将此新项目命名为`ImageViewApp`。这将为用户界面创建一个单独的视图。\n\
  \n2. 在导航面板中点击`Main.storyboard`文件。Xcode 会显示该单独视图。\n\n3. 点击库图标以打开对象库窗口。\n\n4. 将图像视图拖放到视图上的任意位置。此时图像视图是空的，因此我们需要放些东西进去才能显示它。在你的\
  \ Macintosh 电脑上找一个`.jpg`或`.png`图像。你也可以从`www.pexels.com`、`free-images.com`或`www.nasa.gov`查找并下载大量免费图像。\n\
  \n5. 将`.jpg`或`.png`图像从“访达”窗口拖放到导航面板中，如图 9-1 所示。\n\n![../images/329781_5_En_9_Chapter/329781_5_En_9_Fig1_HTML.jpg](img/329781_5_En_9_Fig1_HTML.jpg)\n\
  \n*图 9-1 — 将图像拖放到 Xcode 项目*\n\n6. 当导航面板中出现一条水平线时，松开鼠标左键。Xcode 会显示一个对话框，以完成将图形图像复制到\
  \ Xcode 项目中的过程。\n\n7. 选中“如果需要，拷贝项目”复选框，如图 9-2 所示。\n\n![../images/329781_5_En_9_Chapter/329781_5_En_9_Fig2_HTML.jpg](img/329781_5_En_9_Fig2_HTML.jpg)\n\
  \n*图 9-2 — 在 Xcode 项目中存储图形图像*\n\n8. 点击“完成”按钮。Xcode 会在导航面板中显示你的图形文件名称。\n\n9. 在导航面板中点击图形图像名称。中间的\
  \ Xcode 面板会显示图形图像的内容。\n\n10. 点击图像视图对象以将其选中。\n\n11. 选择`视图` ➤ `检查器` ➤ `显示属性检查器`，或点击\
  \ Xcode 窗口右上角的“属性检查器”图标。\n\n12. 点击“图像”弹出菜单，并选择你的图形图像名称，例如`spaceshuttle.jpg`，如图 9\
  \ -3 所示。Xcode 会将你的图形图像显示在图像视图内部。\n\n![../images/329781_5_En_9_Chapter/329781_5_En_9_Fig3_HTML.jpg](img/329781_5_En_9_Fig3_HTML.jpg)\n\
  \n*图 9-3 — 选择要在图像视图中显示的图形图像*\n\n“内容模式”弹出菜单提供了几种在图像视图中显示图像的选项：\n\n-   **缩放填充** –\
  \ 改变图像尺寸以填充图像视图，无论图像视图的高度或宽度如何。如果图像视图过高或过宽，这可能会导致图像变形。\n-   **比例适配** – 在保留原始图像宽高比的情况下，使图像适配图像视图的宽度和高度。这意味着图像可能无法完全填满图像视图的高度或宽度，如图\
  \ 9-4 所示。\n\n![../images/329781_5_En_9_Chapter/329781_5_En_9_Fig4_HTML.jpg](img/329781_5_En_9_Fig4_HTML.jpg)\n\
  \n*图 9-4 — 比例适配可能会在图像视图内留下空白区域*\n\n-   **比例填充** – 扩展图像以填充图像视图的宽度或高度。这意味着图像可能会超出图像视图的宽度或高度。\n\
  -   **重绘** – 拉伸图像以填充图像视图的宽度和高度。\n-   **居中** – 在图像视图内居中显示图像。如果图像大于图像视图，则图像的其余部分会显示在图像视图之外。\n\
  -   **顶部** – 在图像视图内靠顶部显示图像。如果图像大于图像视图，则图像的其余部分会显示在图像视图之外。\n-   **底部** – 在图像视图内靠底部显示图像。如果图像大于图像视图，则图像的其余部分会显示在图像视图之外。\n\
  -   **左侧** – 在图像视图内靠左居中显示图像。如果图像大于图像视图，则图像的其余部分会显示在图像视图之外。\n-   **右侧** – 在图像视图内靠右居中显示图像。如果图像大于图像视图，则图像的其余部分会显示在图像视图之外。\n\
  -   **左上** – 在图像视图内显示图像的左上角。如果图像大于图像视图，则图像的其余部分会显示在图像视图之外。\n-   **右上** – 在图像视图内显示图像的右上角。如果图像大于图像视图，则图像的其余部分会显示在图像视图之外。\n\
  -   **左下** – 在图像视图内显示图像的左下角。如果图像大于图像视图，则图像的其余部分会显示在图像视图之外。\n-   **右下** – 在图像视图内显示图像的右下角。如果图像大于图像视图，则图像的其余部分会显示在图像视图之外。\n\
  \n\n\n### 让图像视图实现交互\n\n默认情况下，图像视图会忽略所有触摸交互。要让图像视图响应触摸，可以通过以下两种方式之一启用用户交互，如图 9-5\
  \ 所示：\n\n![../images/329781_5_En_9_Chapter/329781_5_En_9_Fig5_HTML.jpg](img/329781_5_En_9_Fig5_HTML.jpg)\n\
  \n图 9-5  \n允许图像视图响应触摸手势\n\n*   选中**启用用户交互**复选框。\n*   使用 Swift 代码将 `.isUserInteractionEnabled`\
  \ 属性设置为 `true`。\n\n要了解如何使图像视图响应触摸手势，请按照以下步骤操作：\n\n1.  在 `ImageViewApp` 项目的导航器窗格中，点击\
  \ `Main.storyboard` 文件。\n2.  选择“视图” ➤ “助理编辑器” ➤ “显示助理编辑器”，或点击助理编辑器图标。Xcode 会并排显示\
  \ `Main.storyboard` 和 `ViewController.swift` 文件。\n3.  将鼠标指针移到图像视图上，按住 Control 键，然后从图像视图按住\
  \ Control 键拖拽到 `ViewController.swift` 文件中 `“class ViewController”` 行下方的位置。\n4. \
  \ 松开 Control 键和鼠标左键。会弹出一个窗口。\n5.  在“名称”文本字段中点击，输入 **imageView**，然后点击“连接”按钮。Xcode\
  \ 会创建一个 `IBOutlet` 变量，如下所示：\n\n    ```\n    @IBOutlet var imageView: UIImageView!\n\
  \    ```\n\n1.  选择“视图” ➤ “标准编辑器” ➤ “显示标准编辑器”，或点击标准编辑器图标。\n2.  在导航器窗格中点击 `ViewController.swift`\
  \ 文件。\n3.  向 `viewDidLoad` 方法添加以下代码行：\n\n    ```\n    imageView.isUserInteractionEnabled\
  \ = true\n    ```\n\n1.  在 `viewDidLoad` 方法下方键入以下代码：\n\n    ```\n    override func\
  \ touchesBegan(_ touches: Set<UITouch>, with event: UIEvent?) {\n    let touch =\
  \ touches.first\n    if touch?.view == imageView {\n    print (\"Touched\")\n  \
  \  } else {\n    print (\"Nothing \")\n    }\n    }\n    ```\n\n每当用户点击屏幕时，上述 `touchesBegan`\
  \ 方法都会运行。（在模拟器中，点击鼠标模拟手指点击。）`if-else` 语句会检查用户是否点击了图像视图。如果是，则输出“Touched”。如果用户点击了图像视图以外的区域，则输出“Nothing”。\n\
  \n整个 `ViewController.swift` 文件应如下所示：\n\n```\nimport UIKit\nclass ViewController:\
  \ UIViewController {\n@IBOutlet var imageView: UIImageView!\noverride func viewDidLoad()\
  \ {\nsuper.viewDidLoad()\nimageView.isUserInteractionEnabled = true\n// 视图加载后执行任何其他设置，通常从\
  \ nib 文件加载。\n}\noverride func touchesBegan(_ touches: Set<UITouch>, with event:\
  \ UIEvent?) {\nlet touch = touches.first\nif touch?.view == imageView {\nprint (\"\
  Touched\")\n} else {\nprint (\"Nothing \")\n}\n}\n}\n```\n\n1.  点击“运行”按钮或选择“产品”\
  \ ➤ “运行”。模拟器屏幕出现。\n2.  点击您存储在图像视图中的图形图像。注意，每次点击图像视图时，Xcode 窗口底部的“调试区域”都会显示“Touched”。\n\
  3.  点击模拟器屏幕上远离图像视图的任何其他位置。注意，每次点击图像视图以外的区域时，Xcode 窗口底部的“调试区域”都会显示“Nothing”。\n4.\
  \  选择“模拟器” ➤ “退出模拟器”以返回 Xcode。\n\n## 使用文本视图\n\n文本视图的行为类似于文本字段。主要区别在于，文本视图可以更大，更像是一个微型文字处理器，允许用户移动光标并查看或编辑大量文本。由于文本视图既可以显示文本，也允许用户输入文本，因此需要修改的第一个属性是是否希望文本视图可编辑。\n\
  \n可编辑的文本视图意味着用户可以修改其中显示的文本。不可编辑的文本视图意味着用户无法修改文本，因此文本视图就像一个大的标签。修改文本视图可编辑属性的方法有两种：\n\
  \n*   在属性检查器中选中“可编辑”复选框（默认已选中），如图 9-6 所示。\n*   使用 Swift 代码将文本视图的 `.editable` 属性设置为\
  \ `true`。\n\n![../images/329781_5_En_9_Chapter/329781_5_En_9_Fig6_HTML.jpg](img/329781_5_En_9_Fig6_HTML.jpg)\n\
  \n图 9-6  \n使文本视图可编辑\n\n要了解如何使用文本视图，请按照以下步骤操作：\n\n1.  使用“单视图应用”模板创建一个新的 iOS 项目（参见第\
  \ 1 章），并将此新项目命名为 `TextViewApp`。这会为用户界面创建一个单视图。\n2.  在导航器窗格中点击 `Main.storyboard`\
  \ 文件。Xcode 会显示该单视图。\n3.  点击库图标以打开对象库窗口。\n4.  在视图顶部附近拖放一个文本视图和一个按钮。\n5.  选择“编辑器”\
  \ ➤ “解决自动布局问题” ➤ “重置为建议的约束”（位于子菜单的下半部分）。这会为文本视图和按钮添加约束。\n6.  选择“视图” ➤ “助理编辑器” ➤\
  \ “显示助理编辑器”，或点击助理编辑器图标。Xcode 会并排显示 `Main.storyboard` 和 `ViewController.swift` 文件。\n\
  7.  将鼠标指针移到文本视图上，按住 Control 键，然后从文本视图按住 Control 键拖拽到 `ViewController.swift` 文件中\
  \ `“class ViewController”` 行下方的位置。\n8.  松开 Control 键和鼠标左键。会弹出一个窗口。\n9.  在“名称”文本字段中点击，输入\
  \ **textView**，然后点击“连接”按钮。Xcode 会创建一个 `IBOutlet` 变量，如下所示：\n\n    ```\n    @IBOutlet\
  \ var textView: UITextView!\n    ```\n\n1.  将鼠标指针移到按钮上，按住 Control 键，然后从按钮按住 Control\
  \ 键拖拽到 `ViewController.swift` 文件中 `IBOutlet` 行下方的位置。\n2.  松开 Control 键和鼠标左键。会弹出一个窗口。\n\
  3.  在“名称”文本字段中点击，输入 **buttonObject**，然后点击“连接”按钮。Xcode 会创建一个 `IBOutlet` 变量，如下所示：\n\
  \n    ```\n    @IBOutlet var buttonObject: UIButton!\n    ```\n\n1.  将鼠标指针移到按钮上，按住\
  \ Control 键，然后按住 Control 键拖拽到 `ViewController.swift` 文件底部最后一个右花括号的上方。\n2.  松开 Control\
  \ 键和鼠标左键。会弹出一个窗口。\n3.  在“名称”文本字段中点击，输入 **buttonTapped**，点击“类型”弹出菜单并选择 `UIButton`，然后点击“连接”按钮。Xcode\
  \ 会创建一个 `IBAction` 方法，如下所示：\n\n    ```\n    @IBAction func buttonTapped(_ sender:\
  \ UIButton) {\n    }\n    ```\n\n4.  编辑 `buttonTapped` `IBAction` 方法，如下所示：\n\n \
  \   ```\n    @IBAction func buttonTapped(_ sender: UIButton) {\n    if textView.isEditable\
  \ == true {\n    textView.isEditable = false\n    } else {\n    textView.isEditable\
  \ = true\n    }\n    }\n    ```\n\n\n\n#### 注意\n\n赋值变量时使用单个等号（`=`），而比较两个值时则使用双等号（`==`）。\n\
  \n这个 `IBAction` 方法用于切换文本视图的编辑状态。当文本视图可编辑时，可以修改文字；当文本视图不可编辑时，则无法修改文字。完整的 `ViewController.swift`\
  \ 文件应如下所示：\n\n1.  点击运行按钮，或选择“产品”➤“运行”。模拟器窗口随即出现。\n2.  点击文本视图。按退格键和删除键删除文字。\n3. \
  \ 点击按钮。这将执行 `buttonTapped` IBAction 方法中的 Swift 代码，使文本视图变为不可编辑。\n4.  点击文本视图。请注意，您已无法再编辑其中的文字。\n\
  5.  重复步骤 18–20，观察如何将文本视图在可编辑与不可编辑状态间切换。\n6.  选择“模拟器”➤“退出模拟器”以返回 Xcode。\n\n```\n\
  import UIKit\nclass ViewController: UIViewController {\n@IBOutlet var textView:\
  \ UITextView!\n@IBOutlet var buttonObject: UIButton!\noverride func viewDidLoad()\
  \ {\nsuper.viewDidLoad()\n// 加载视图后的其他设置，通常来自 nib 文件\n}\n@IBAction func buttonTapped(_\
  \ sender: UIButton) {\nif textView.isEditable == true {\ntextView.isEditable = false\n\
  } else {\ntextView.isEditable = true\n}\n}\n}\n```\n\n### 更改文本视图中的文字外观\n\n与可以分别更改不同文字外观的文字处理软件不同，文本视图中的所有文字总是以相同的文字颜色、背景颜色、字体及字号显示。在\
  \ Swift 中，用于修改文字颜色、背景颜色、字体及字号的属性如下：\n\n*   `.text` – 定义文本视图中显示的实际文字\n*   `.backgroundColor`\
  \ – 定义文本视图的背景\n*   `.textColor` – 定义文字的颜色\n*   `.font` – 定义文字的字体和字号\n\n要了解如何使用 Swift\
  \ 代码修改文字外观，请按照以下步骤操作：\n\n1.  选择“视图”➤“标准编辑器”➤“显示标准编辑器”，或点击 Xcode 窗口右上角的“标准编辑器”图标。\n\
  2.  在导航窗格中点击 `ViewController.swift` 文件。Xcode 会显示该文件。\n3.  按如下方式修改 `buttonTapped`\
  \ IBAction 方法：\n\n```\n@IBAction func buttonTapped(_ sender: UIButton) {\nif textView.isEditable\
  \ == true {\ntextView.isEditable = false\ntextView.backgroundColor = UIColor.yellow\n\
  textView.textColor = UIColor.blue\ntextView.font = UIFont(name: \"Courier\", size:\
  \ 24)\n} else {\ntextView.isEditable = true\ntextView.backgroundColor = UIColor.blue\n\
  textView.textColor = UIColor.white\ntextView.font = UIFont(name: \"Ariel\", size:\
  \ 10)\n}\n}\n```\n\n4.  点击运行按钮，或选择“产品”➤“运行”。模拟器窗口随即出现。\n5.  点击按钮。注意文本视图中的文字外观如何变为黄色背景和蓝色文字。\n\
  6.  再次点击按钮。请注意，现在文字显示为蓝色背景和白色文字，且字号变小。\n7.  选择“模拟器”➤“退出模拟器”以返回 Xcode。\n\n### 在文本视图中创建可点击文字\n\
  \n如果您在“备忘录”或“信息”等 iOS 应用中输入文字，可能会注意到当输入电话号码、网站 URL 或日期时，这些文字会被高亮显示，以便您点击执行操作。例如，在“备忘录”应用中输入电话号码，该电话号码文字会高亮显示。点击此高亮文字，iPhone\
  \ 即可拨打该号码。\n\n要在文本视图中显示可点击文字，该文本视图必须不可编辑。文本视图可以高亮显示的不同可点击文字类型包括：\n\n*   `.address`\
  \ – 检测街道地址\n*   `.calendarEvent` – 检测时间和日期\n*   `.flightNumber` – 检测航班号\n*   `.link`\
  \ – 检测 URL\n*   `.lookupSuggestion` – 检测词语或短语，如餐厅名称、电影名称、名人姓名等\n*   `.phoneNumber`\
  \ – 检测电话号码\n\n您可以通过 Swift 代码定义可点击文字，也可以在“属性检查器”面板的“数据探测”类别中选择复选框来定义，如图 9-7 所示。\n\
  \n![../images/329781_5_En_9_Chapter/329781_5_En_9_Fig7_HTML.jpg](img/329781_5_En_9_Fig7_HTML.jpg)\n\
  \n图 9-7\n\n在“属性检查器”面板的“数据探测”类别中定义可点击文字\n\n要了解如何在文本视图中使文字可点击，请按照以下步骤操作：\n\n1.  确保\
  \ Xcode 中已加载 `TextViewApp` 项目。\n2.  在导航窗格中点击 `ViewController.swift` 文件以编辑它。\n3.\
  \  按如下方式编辑 `viewDidLoad` 方法：\n\n```\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n\
  textView.dataDetectorTypes = UIDataDetectorTypes.link\ntextView.isEditable = false\n\
  textView.isSelectable = true\ntextView.text = \"This is an example of clickable\
  \ text www.yahoo.com\"\n// 加载视图后的其他设置，通常来自 nib 文件\n}\n```\n\n完整的 `ViewController.swift`\
  \ 文件应如下所示：\n\n```\nimport UIKit\nclass ViewController: UIViewController {\n@IBOutlet\
  \ var textView: UITextView!\n@IBOutlet var buttonObject: UIButton!\noverride func\
  \ viewDidLoad() {\nsuper.viewDidLoad()\ntextView.dataDetectorTypes = UIDataDetectorTypes.link\n\
  textView.isEditable = false\ntextView.isSelectable = true\ntextView.text = \"This\
  \ is an example of clickable text www.yahoo.com\"\n// 加载视图后的其他设置，通常来自 nib 文件\n}\n\
  @IBAction func buttonTapped(_ sender: UIButton) {\nif textView.isEditable == true\
  \ {\ntextView.isEditable = false\ntextView.backgroundColor = UIColor.yellow\ntextView.textColor\
  \ = UIColor.blue\ntextView.font = UIFont(name: \"Courier\", size: 24)\n} else {\n\
  textView.isEditable = true\ntextView.backgroundColor = UIColor.blue\ntextView.textColor\
  \ = UIColor.white\ntextView.font = UIFont(name: \"Ariel\", size: 10)\n}\n}\n}\n\
  ```\n\n4.  点击运行按钮，或选择“产品”➤“运行”。模拟器窗口出现。请注意，URL `www.yahoo.com` 以蓝色超链接形式高亮显示。\n5.\
  \  点击 `www.yahoo.com` 超链接。模拟器会显示 Safari 浏览器以及 `www.yahoo.com` 网站，这正是在真实 iPhone 或\
  \ iPad 上运行该应用时会发生的情况。\n6.  选择“模拟器”➤“退出模拟器”以返回 Xcode。\n\n\n\n### 使用文本视图显示虚拟键盘\n\n\
  为了让用户能够在文本视图中输入，你需要显示（和隐藏）虚拟键盘。当用户点击文本视图进行编辑时，虚拟键盘应出现，如有必要，还需将文本视图上移。当用户在文本视图中完成文本编辑后，虚拟键盘则需要消失。\n\
  \n首先，你需要让视图控制器监听两个事件：`keyboardWillShowNotification` 和 `keyboardWillHideNotification`。其次，你需要创建\
  \ `keyboardWillShow` 和 `keyboardWillHide` 函数，用于显示虚拟键盘（并将视图上移），以及在不再需要时隐藏虚拟键盘。最后，如果用户点击了文本视图以外的区域，你需要关闭虚拟键盘。\n\
  \n要添加显示和隐藏虚拟键盘的代码，请遵循以下步骤：\n\n1.  在 `TextViewApp` 项目的导航器窗格中点击 `Main.storyboard`\
  \ 文件。\n2.  点击库图标以显示对象库。\n3.  将一个文本视图拖放到用户界面的底部附近。\n4.  选择 **编辑器** ➤ **自动布局问题解决方案**\
  \ ➤ **重置为建议的约束**（位于子菜单的上半部分）。这将为界面中的新文本视图添加约束。\n5.  将以下代码添加到 `viewDidLoad` 方法中：\n\
  \n```swift\nNotificationCenter.default.addObserver(self, selector: #selector(keyboardWillShow),\
  \ name: UIResponder.keyboardWillShowNotification, object: nil)\nNotificationCenter.default.addObserver(self,\
  \ selector: #selector(keyboardWillHide), name: UIResponder.keyboardWillHideNotification,\
  \ object: nil)\nlet tap: UITapGestureRecognizer = UITapGestureRecognizer(target:\
  \ self, action: #selector(self.dismissKeyboard))\nview.addGestureRecognizer(tap)\n\
  ```\n\n6.  在 `buttonTapped` IBAction 方法上方添加如下代码：\n\n```swift\n@objc func dismissKeyboard()\
  \ {\n    view.endEditing(true)\n}\n@objc func keyboardWillShow(notification: NSNotification)\
  \ {\n    if let keyboardSize = (notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]\
  \ as? NSValue)?.cgRectValue {\n        if self.view.frame.origin.y == 0 {\n    \
  \        self.view.frame.origin.y -= keyboardSize.height\n        }\n    }\n}\n\
  @objc func keyboardWillHide(notification: NSNotification) {\n    if ((notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]\
  \ as? NSValue)?.cgRectValue) != nil {\n        if self.view.frame.origin.y != 0\
  \ {\n            self.view.frame.origin.y = 0\n        }\n    }\n}\n```\n\n整个 `ViewController.swift`\
  \ 文件应如下所示：\n\n```swift\nimport UIKit\nclass ViewController: UIViewController {\n\
  \    @IBOutlet var textView: UITextView!\n    @IBOutlet var buttonObject: UIButton!\n\
  \    override func viewDidLoad() {\n        super.viewDidLoad()\n        textView.dataDetectorTypes\
  \ = UIDataDetectorTypes.link\n        textView.isEditable = false\n        textView.isSelectable\
  \ = true\n        textView.text = \"This is an example of clickable text www.yahoo.com\"\
  \n        NotificationCenter.default.addObserver(self, selector: #selector(keyboardWillShow),\
  \ name: UIResponder.keyboardWillShowNotification, object: nil)\n        NotificationCenter.default.addObserver(self,\
  \ selector: #selector(keyboardWillHide), name: UIResponder.keyboardWillHideNotification,\
  \ object: nil)\n        let tap: UITapGestureRecognizer = UITapGestureRecognizer(target:\
  \ self, action: #selector(self.dismissKeyboard))\n        view.addGestureRecognizer(tap)\n\
  \        // Do any additional setup after loading the view, typically from a nib.\n\
  \    }\n    @objc func dismissKeyboard() {\n        view.endEditing(true)\n    }\n\
  \    @objc func keyboardWillShow(notification: NSNotification) {\n        if let\
  \ keyboardSize = (notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]\
  \ as? NSValue)?.cgRectValue {\n            if self.view.frame.origin.y == 0 {\n\
  \                self.view.frame.origin.y -= keyboardSize.height\n            }\n\
  \        }\n    }\n    @objc func keyboardWillHide(notification: NSNotification)\
  \ {\n        if ((notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]\
  \ as? NSValue)?.cgRectValue) != nil {\n            if self.view.frame.origin.y !=\
  \ 0 {\n                self.view.frame.origin.y = 0\n            }\n        }\n\
  \    }\n    @IBAction func buttonTapped(_ sender: UIButton) {\n        if textView.isEditable\
  \ == true {\n            textView.isEditable = false\n            textView.backgroundColor\
  \ = UIColor.yellow\n            textView.textColor = UIColor.blue\n            textView.font\
  \ = UIFont(name: \"Courier\", size: 24)\n        } else {\n            textView.isEditable\
  \ = true\n            textView.backgroundColor = UIColor.blue\n            textView.textColor\
  \ = UIColor.white\n            textView.font = UIFont(name: \"Ariel\", size: 10)\n\
  \        }\n    }\n}\n```\n\n7.  点击**运行**按钮或选择**产品** ➤ **运行**。模拟器屏幕出现。\n8.  点击底部的文本视图。（如果虚拟键盘没有出现，请按\
  \ **Command + K** 或选择**硬件** ➤ **键盘** ➤ **切换虚拟键盘**。）\n9.  使用虚拟键盘在文本视图中添加和删除文本。\n\
  10. 点击文本视图之外的任何位置。虚拟键盘消失。\n11. 选择**模拟器** ➤ **退出模拟器**以返回 Xcode。\n\n## 总结\n\n图像视图和文本视图让你的应用能够在用户界面上显示数据。图像视图以图像的形式直观地展示信息。这些图像可以是静态的，仅用于装饰目的，也可以显示有用的信息，比如图表。图像视图也可以是交互式的，能够响应点击。\n\
  \n文本视图既可以显示文本，也允许用户编辑和输入文本。文本视图的行为与文本字段非常相似，但它能一次显示大量文本，就像一个微型文字处理器。你可以修改文本的外观，但任何更改都会影响文本视图中的所有文本。\n\
  \n如果你将文本视图设置为不可编辑，那么你还可以创建可点击的文本，文本视图可以识别常见的词和短语类型，例如电话号码、街道地址、URL 以及日期和时间等日历事件。\n\
  \n文本视图可以简单地向用户显示信息，也可以允许输入。图像视图可以显示视觉数据，或者允许交互，以便你的应用能在用户点击图像视图时做出响应。通过同时使用文本视图和图像视图，你便拥有了展示数据、允许输入以及接受用户交互的另一种方式。\n\
  \n# 按钮、开关和分段控件\n\n除了显示数据或让用户输入数据外，用户界面的第二个最重要的目的是允许用户控制应用。在最简单的层面上，用户可以使用按钮，每个按钮代表一个命令。当然，如果你想要显示多个选项，那么屏幕上显示多个按钮可能会显得拥挤。\n\
  \n作为发出命令的两种替代方案，Xcode 提供了开关和分段控件。开关让用户可以选择打开或关闭某个设置。分段控件就像一个浓缩区域内的多个按钮，用户可以点击以选择不同的选项。图\
  \ 10-1 显示了按钮、开关和分段控件的视觉外观。\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig1_HTML.jpg](img/329781_5_En_10_Fig1_HTML.jpg)\n\
  \n**图 10-1** 比较按钮、开关和分段控件的视觉外观\n\n\n\n## 理解事件\n\n代表命令的用户界面对象（如按钮、开关和分段控件）会响应事件。最简单的事件发生在用户轻点或触摸对象内部时。更复杂的事件可能发生在用户手指在对象内部拖拽或滑动时。\n\
  \n所有类型的用户界面对象都可以响应事件，例如用户轻点按钮等对象时。对象与事件的组合定义了一个 `IBAction` 方法。如果你希望一个对象响应两个不同的事件，则需要为该特定对象创建两个不同的\
  \ `IBAction` 方法。\n\n对象可以响应的不同事件类型包括：\n\n- **Touch Up Inside** – 在对象边界内轻点并抬起手指\n\
  - **Touch Up Outside** – 在对象边界外轻点\n- **Touch Down** – 在对象边界内按下\n- **Touch Down Repeat**\
  \ – 在对象边界内连续轻点两次或更多次\n- **Touch Drag Enter** – 手指在对象外部触摸并滑入对象内部\n- **Touch Drag\
  \ Exit** – 手指在对象内部触摸并滑出对象外部\n- **Touch Drag Inside** – 手指在对象内部滑动\n- **Touch Drag\
  \ Outside** – 手指在对象外部边缘滑动\n- **Value Changed** – 操作对象（如滑块）改变其存储值时触发\n- **Editing\
  \ Changed** – 文本字段中的文本发生变化时触发\n- **Editing Did Begin** – 手指轻点文本字段内部时触发\n- **Editing\
  \ Did End** – 手指轻点文本字段外部时触发\n\n通过选择特定对象能够响应的事件，你可以让用户以不同且独特的方式与用户界面对象交互。在大多数情况下，用户界面对象只需响应最可能的事件，例如\
  \ **Touch Up Inside**（检测用户何时轻点对象）。\n\n## 使用按钮\n\n按钮通常响应 **Touch Up Inside** 事件，并显示其代表的命令，如“确定”、“取消”或“完成”。按钮上显示的文本可以通过三种方式修改：\n\
  \n- 在**属性检查器**面板中\n- 通过双击按钮\n- 通过 Swift 代码\n\n要了解如何在按钮上定义标题，请按照以下步骤操作：\n\n1. 使用“单视图应用”模板创建一个新的\
  \ iOS 项目（参见第 1 章），并将这个新项目命名为 `ControlApp`。这会为用户界面创建一个单视图。\n\n2. 在导航面板中点击 `Main.storyboard`\
  \ 文件。Xcode 会显示该单视图。\n\n3. 点击库图标打开**对象库**窗口。\n\n4. 将一个按钮拖放到视图上的任意位置。默认情况下，按钮上显示的标题为“Title”。\n\
  \n5. 选择**视图** ➤ **检查器** ➤ **显示属性检查器**。\n\n6. 如图 10-2 所示，点击**标题**文本字段，删除现有文本（“Title”），然后输入\
  \ **Cancel**。按 ENTER 键。注意，Xcode 现在会在按钮上显示单词“Cancel”。\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig2_HTML.jpg](img/329781_5_En_10_Fig2_HTML.jpg)\n\
  \n**图 10-2** 在属性检查器中更改按钮的标题\n\n7. 双击按钮以选中标题。\n\n8. 输入 **Done** 并按 ENTER 键。注意，现在按钮显示的是\
  \ **Done**。\n\n9. 选择**编辑器** ➤ **解决自动布局问题** ➤ **设置为建议的约束**。Xcode 会给你的按钮添加约束。\n\n\
  10. 选择**视图** ➤ **助理编辑器** ➤ **显示助理编辑器**。Xcode 会将 `Main.storyboard` 和 `ViewController.swift`\
  \ 文件并排显示。\n\n11. 将鼠标指针移到按钮上，按住 Control 键，从图像视图拖拽到 `ViewController.swift` 文件中 `class\
  \ ViewController` 行下方。\n\n12. 松开 Control 键和鼠标左键。会出现一个弹出窗口。\n\n13. 点击**名称**文本字段，输入\
  \ `buttonObject`，然后点击**连接**按钮。Xcode 会创建一个 `IBOutlet` 变量，如下所示：\n\n```swift\n@IBOutlet\
  \ var buttonObject: UIButton!\n```\n\n14. 将鼠标指针移到按钮上，按住 Control 键，从图像视图拖拽到 `ViewController.swift`\
  \ 文件中底部最后一个花括号上方。\n\n15. 松开 Control 键和鼠标左键。会出现一个弹出窗口。注意，如图 10-3 所示，**事件**弹出菜单默认已选择了\
  \ **Touch Up Inside** 事件。\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig3_HTML.jpg](img/329781_5_En_10_Fig3_HTML.jpg)\n\
  \n**图 10-3** 事件弹出菜单默认显示 Touch Up Inside（针对按钮）\n\n16. 点击**名称**文本字段，输入 `touchInside`，点击**类型**弹出菜单并选择\
  \ `UIButton`，然后点击**连接**按钮。Xcode 会创建一个 `IBAction` 方法。\n\n17. 按如下方式编辑这个 `touchInside`\
  \ `IBAction` 方法：\n\n```swift\n@IBAction func touchInside(_ sender: UIButton) {\n\
  \    buttonObject.setTitle(\"New\", for: UIControl.State.normal)\n}\n```\n\n每当用户轻点该按钮时，此\
  \ `IBAction` 都会运行，并且 Swift 代码会将按钮标题更改为“New”。通过使用 `setTitle`，你的 Swift 代码可以在应用程序运行时更改按钮的标题。\n\
  \n整个 `ViewController.swift` 文件应如下所示：\n\n```swift\nimport UIKit\nclass ViewController:\
  \ UIViewController {\n    @IBOutlet var buttonObject: UIButton!\n    override func\
  \ viewDidLoad() {\n        super.viewDidLoad()\n        // Do any additional setup\
  \ after loading the view, typically from a nib.\n    }\n    @IBAction func touchInside(_\
  \ sender: UIButton) {\n        buttonObject.setTitle(\"New\", for: UIControl.State.normal)\n\
  \    }\n}\n```\n\n18. 点击**运行**按钮或选择**产品** ➤ **运行**。模拟器屏幕会出现。注意，按钮标题当前显示的是 **Done**。\n\
  \n19. 点击该按钮。注意，按钮标题现在会变为“New”。\n\n20. 选择**模拟器** ➤ **退出模拟器**以返回 Xcode。\n\n\n\n##\
  \ 使用开关\n\n在许多应用中，用户可以通过开关来开启或关闭某些功能。当用户需要在两个确切的选项之间进行选择时，这正是使用开关的绝佳时机。顾名思义，开关可以向左或向右滑动，分别表示“开”或“关”的状态。当开关打开时，会显示一种颜色，并且开关滑块位于右侧。当开关关闭时，会显示另一种颜色，并且开关滑块位于左侧，如图\
  \ 10-4 所示。\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig4_HTML.jpg](img/329781_5_En_10_Fig4_HTML.jpg)\n\
  \n图 10-4\n\n开关常用来切换设置的开启或关闭状态\n\n开关中可修改的三个常见属性包括：\n\n- `isOn` – 决定开关的值是 `true`（开）还是\
  \ `false`（关）\n- `onTintColor` – 决定当开关的 `isOn` 属性为 `true`（开）时显示的颜色\n- `tintColor`\
  \ – 决定当开关的 `isOn` 属性为 `false`（关）时显示的颜色\n\n要了解如何使用开关，请遵循以下步骤：\n\n1. 确保你的 `ControlApp`\
  \ 项目已在 Xcode 中加载。\n\n2. 在导航器面板中点击 `Main.storyboard` 文件。Xcode 会显示该单一视图。\n\n3. 点击库图标以打开对象库窗口。\n\
  \n4. 在视图上拖放一个标签和一个开关。\n\n5. 按住 Shift 键，同时点击开关和标签以选中这两个元素。\n\n6. 选择 编辑器 ➤ 解决自动布局问题\
  \ ➤ 重置为建议的约束（位于子菜单的上半部分）。这将为开关和标签添加约束。\n\n7. 选择 视图 ➤ 辅助编辑器 ➤ 显示辅助编辑器，或点击辅助编辑器图标。Xcode\
  \ 会并排显示 `Main.storyboard` 和 `ViewController.swift` 文件。\n\n8. 将鼠标指针移到标签上，按住 Control\
  \ 键，然后从标签拖拽到 `ViewController.swift` 文件中 `IBOutlet` 行的下方。\n\n9. 松开 Control 键和鼠标左键。会弹出一个窗口。\n\
  \n10. 在“名称”文本框中点击，输入 `labelSwitch`，然后点击“连接”按钮。Xcode 会创建一个如下的 `IBOutlet` 变量：\n\n\
  ```\n    @IBOutlet var labelSwitch: UILabel!\n```\n\n11. 将鼠标指针移到开关上，按住 Control 键，然后从开关拖拽到\
  \ `ViewController.swift` 文件中 `IBOutlet` 行的下方。\n\n12. 松开 Control 键和鼠标左键。会弹出一个窗口。\n\
  \n13. 在“名称”文本框中点击，输入 `switchObject`，然后点击“连接”按钮。Xcode 会创建一个如下的 `IBOutlet` 变量：\n\n\
  ```\n    @IBOutlet var switchObject: UISwitch!\n```\n\n14. 将鼠标指针移到开关上，按住 Control\
  \ 键，然后从开关拖拽到 `ViewController.swift` 文件底部最后一个大括号的上方。\n\n15. 松开 Control 键和鼠标左键。会弹出一个窗口。\n\
  \n16. 在“名称”文本框中点击，输入 `switchChanged`，在“类型”弹出菜单中点击并选择 `UISwitch`，然后点击“连接”按钮。Xcode\
  \ 会创建一个如下的 `IBAction` 方法：\n\n```\n    @IBAction func switchChanged(_ sender: UISwitch)\
  \ {\n    }\n```\n\n17. 按如下方式编辑 `switchChanged` 这个 `IBAction` 方法：\n\n```\n    @IBAction\
  \ func switchChanged(_ sender: UISwitch) {\n    if switchObject.isOn {\n    labelSwitch.text\
  \ = \"On\"\n    } else {\n    labelSwitch.text = \"Off\"\n    }\n    }\n```\n\n\
  18. 按如下方式编辑 `touchInside` 这个 `IBAction` 方法：\n\n```\n    @IBAction func touchInside(_\
  \ sender: UIButton) {\n    buttonObject.setTitle(\"New\", for: UIControl.State.normal)\n\
  \    switchObject.onTintColor = UIColor.red\n    switchObject.tintColor = UIColor.blue\n\
  \    }\n```\n\n`touchInside` 这个 `IBAction` 会改变开关的颜色。每次点击开关，它都会在开与关之间切换，在 `labelSwitch`\
  \ 对象中显示“On”或“Off”文本，并显示不同的开、关状态颜色。完整的 `ViewController.swift` 文件应如下所示：\n\n```\n \
  \   import UIKit\n    class ViewController: UIViewController {\n    @IBOutlet var\
  \ buttonObject: UIButton!\n    @IBOutlet var labelSwitch: UILabel!\n    @IBOutlet\
  \ var switchObject: UISwitch!\n    override func viewDidLoad() {\n    super.viewDidLoad()\n\
  \    // Do any additional setup after loading the view, typically from a nib.\n\
  \    }\n    @IBAction func touchInside(_ sender: UIButton) {\n    buttonObject.setTitle(\"\
  New\", for: UIControl.State.normal)\n    switchObject.onTintColor = UIColor.red\n\
  \    switchObject.tintColor = UIColor.blue\n    }\n    @IBAction func switchChanged(_\
  \ sender: UISwitch) {\n    if switchObject.isOn {\n    labelSwitch.text = \"On\"\
  \n    } else {\n    labelSwitch.text = \"Off\"\n    }\n    }\n    }\n```\n\n19.\
  \ 选择 视图 ➤ 标准编辑器 ➤ 显示标准编辑器，或点击 Xcode 窗口右上角的标准编辑器图标。\n\n20. 点击“运行”按钮，或选择 产品 ➤ 运行。模拟器窗口会打开。\n\
  \n21. 点击开关。注意，每次点击开关，它的外观都会在打开和关闭之间切换，并在附近的标签中显示“On”或“Off”，如图 10-5 所示。\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig5_HTML.jpg](img/329781_5_En_10_Fig5_HTML.jpg)\n\
  \n图 10-5\n\n标签显示开关是打开还是关闭\n\n22. 点击按钮。这会运行 `touchInside` 这个 `IBAction` 方法中的 Swift\
  \ 代码，从而改变开关的颜色。\n\n23. 点击开关。注意，每次点击开关，你都会看到红色和蓝色替代了默认颜色。\n\n24. 选择 模拟器 ➤ 退出模拟器，以返回到\
  \ Xcode。\n\n\n好的，这是根据您的要求和示例格式翻译的文档。\n\n\n## 使用分段控件\n\n按钮适合显示单个命令，但当您需要显示多个命令时，多个按钮可能会使用户界面显得杂乱。当您需要在有限的空间内显示多个按钮时，可以使用分段控件。\n\
  \n一个分段控件可以包含两个或更多个分段，每个分段就像一个独立的按钮。您可以通过属性检查器面板定义分段的数量，但之后也可以使用 Swift 代码添加更多分段。\n\
  \n在属性检查器中，您可以按图 10-6 所示的方式自定义分段控件：\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig6_HTML.jpg](img/329781_5_En_10_Fig6_HTML.jpg)\n\
  \n*图 10-6* 在属性检查器中修改分段控件\n\n-   **Segments（分段）** – 定义分段控件中的分段（按钮）数量\n-   **Segment（分段）**\
  \ – 一个弹出菜单，允许您选择要修改的分段\n-   **Title（标题）** – 定义显示在由“Segment”（分段）弹出菜单所定义的分段上的文本\n\
  -   **Image（图像）** – 定义要显示在由“Segment”（分段）弹出菜单所定义的分段上的图像\n-   **Selected（已选中）** –\
  \ 一个复选框，用于定义哪个分段显示为已选中（高亮），整个分段控件中只能选择一个分段\n\n每个分段控件都通过索引号来标识其不同的分段，最左侧的分段索引为 0，其右侧的下一个分段索引为\
  \ 1，依此类推。Xcode 会根据每个分段的位置自动为其分配索引号。您可以使用分段索引号来识别用户点击了哪个分段。\n\n一旦您将分段控件添加到视图，就可以使用\
  \ Swift 代码添加或移除分段。要了解如何修改分段控件，请遵循以下步骤：\n\n1.  在导航器面板中点击 `Main.storyboard` 文件。Xcode\
  \ 将显示故事板用户界面。\n2.  点击库图标以显示对象库窗口。\n3.  将一个分段控件拖放到视图上的任意位置。\n4.  选择 Editor ➤ Resolve\
  \ Auto Layout Issues ➤ Reset to Suggested Constraints（编辑器 ➤ 解析自动布局问题 ➤ 重置为建议的约束）子菜单的上半部分。Xcode\
  \ 会向分段控件添加约束。\n5.  双击分段控件左侧标记为“First”的分段。Xcode 会高亮该分段上的标题，如图 10-7 所示。\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig7_HTML.jpg](img/329781_5_En_10_Fig7_HTML.jpg)\n\
  \n*图 10-7* 直接双击分段控件标题可编辑该标题\n\n6.  输入 `One` 并按 ENTER 键替换“First”标签。直接双击显示文本的对象是修改文本的一种方法。第二种方法是使用属性检查器面板。\n\
  7.  选择 View ➤ Inspectors ➤ Show Attributes Inspector（视图 ➤ 检查器 ➤ 显示属性检查器），或点击 Xcode\
  \ 窗口右上角的属性检查器图标。\n8.  点击“Segment”（分段）弹出菜单，然后选择“Segment 1 – Second”。标题文本字段会显示所选分段的当前标题，如图\
  \ 10-8 所示。\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig8_HTML.jpg](img/329781_5_En_10_Fig8_HTML.jpg)\n\
  \n*图 10-8* 在属性检查器面板中更改分段标题\n\n9.  点击标题文本字段，将文本更改为 `Two`。然后按 ENTER 键。请注意，您可以通过直接双击标题或更改分段的“Title”（标题）文本字段来更改每个分段的标题。\n\
  10. 选择 View ➤ Assistant Editor ➤ Show Assistant Editor（视图 ➤ 助理编辑器 ➤ 显示助理编辑器），或点击助理编辑器图标。Xcode\
  \ 会并排显示 `Main.storyboard` 和 `ViewController.swift` 文件。\n11. 将鼠标指针移到分段控件上，按住 Control\
  \ 键，然后从分段控件按住 Ctrl 键拖动到 `ViewController.swift` 文件中 `IBOutlet` 行的下方。\n12. 松开 Control\
  \ 键和鼠标左键。将出现一个弹出窗口。\n13. 点击“Name”（名称）文本字段，输入 `segmentedControl`，然后点击“Connect”（连接）按钮。Xcode\
  \ 会创建一个 `IBOutlet` 变量，如下所示：\n\n```swift\n@IBOutlet var segmentedControl: UISegmentedControl!\n\
  ```\n\n14. 将鼠标指针移到分段控件上，按住 Control 键，然后从分段控件按住 Ctrl 键拖动到 `ViewController.swift`\
  \ 文件中文件底部最后一个花括号的上方。\n15. 松开 Control 键和鼠标左键。将出现一个弹出窗口。\n16. 点击“Name”（名称）文本字段，输入\
  \ `segmentedControlTapped`，然后点击“Connect”（连接）按钮。Xcode 会创建一个 `IBAction` 方法。\n17. 按如下方式修改此\
  \ `segmentedControlTapped` IBAction 方法：\n\n```swift\n@IBAction func segmentedControlTapped(_\
  \ sender: UISegmentedControl) {\n    switch segmentedControl.selectedSegmentIndex\
  \ {\n    case 0:\n        labelSwitch.text = \"One\"\n    case 1:\n        labelSwitch.text\
  \ = \"Two\"\n    default:\n        labelSwitch.text = \"Three\"\n    }\n}\n```\n\
  \n此 `segmentedControlTapped` IBAction 方法使用 `.selectedSegmentIndex` 属性来识别用户点击了哪个分段。然后，一个\
  \ `switch` 语句（基于其索引号）确定用户点击了哪个分段，并在标签中显示 `One`、`Two` 或 `Three`，以标识用户点击的分段。\n\n18.\
  \ 按如下方式编辑 `viewDidLoad` 方法：\n\n```swift\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
  \    segmentedControl.insertSegment(withTitle: \"Three\", at: 2, animated: true)\n\
  \    segmentedControl.setWidth(50, forSegmentAt: 0)\n    segmentedControl.setWidth(50,\
  \ forSegmentAt: 1)\n    segmentedControl.setWidth(50, forSegmentAt: 2)\n    // Do\
  \ any additional setup after loading the view, typically from a nib.\n}\n```\n\n\
  此 Swift 代码向现有分段控件添加了第三个分段，并设置了分段控件中每个分段的宽度。整个 `ViewController.swift` 文件应如下所示：\n\n\
  ```swift\nimport UIKit\nclass ViewController: UIViewController {\n    @IBOutlet\
  \ var buttonObject: UIButton!\n    @IBOutlet var labelSwitch: UILabel!\n    @IBOutlet\
  \ var switchObject: UISwitch!\n    @IBOutlet var segmentedControl: UISegmentedControl!\n\
  \    override func viewDidLoad() {\n        super.viewDidLoad()\n        segmentedControl.insertSegment(withTitle:\
  \ \"Three\", at: 2, animated: true)\n        segmentedControl.setWidth(50, forSegmentAt:\
  \ 0)\n        segmentedControl.setWidth(50, forSegmentAt: 1)\n        segmentedControl.setWidth(50,\
  \ forSegmentAt: 2)\n        // Do any additional setup after loading the view, typically\
  \ from a nib.\n    }\n    @IBAction func touchInside(_ sender: UIButton) {\n   \
  \     buttonObject.setTitle(\"New\", for: UIControl.State.normal)\n        switchObject.onTintColor\
  \ = UIColor.red\n        switchObject.tintColor = UIColor.blue\n    }\n    @IBAction\
  \ func switchChanged(_ sender: UISwitch) {\n        if switchObject.isOn {\n   \
  \         labelSwitch.text = \"On\"\n        } else {\n            labelSwitch.text\
  \ = \"Off\"\n        }\n    }\n    @IBAction func segmentedControlTapped(_ sender:\
  \ UISegmentedControl) {\n        switch segmentedControl.selectedSegmentIndex {\n\
  \        case 0:\n            labelSwitch.text = \"One\"\n        case 1:\n    \
  \        labelSwitch.text = \"Two\"\n        default:\n            labelSwitch.text\
  \ = \"Three\"\n        }\n    }\n}\n```\n\n19. 点击运行按钮或选择 Product ➤ Run（产品 ➤ 运行）。模拟器窗口将出现。\n\
  20. 点击分段控件中的第二个或第三个分段。请注意，您点击的分段现在会高亮显示，并且标签会显示您点击的分段名称，例如“Two”或“Three”。\n21. 点击任意分段。请注意，每次您点击不同的分段时，该分段都会高亮显示，并且标签会显示不同的文本。\n\
  22. 选择 Simulator ➤ Quit Simulator（模拟器 ➤ 退出模拟器）返回 Xcode。\n\n\n\n## 将多个对象连接到同一个 `IBAction`\
  \ 方法\n\n大多数情况下，当你使用按钮、开关或分段控件等对象与用户交互时，你会为每个对象创建一个独立的 `IBAction` 方法。然而，也可以将两个或多个对象连接到同一个\
  \ `IBAction` 方法。\n\n首先，你需要用一个对象（例如一个按钮）创建一个 `IBAction` 方法。然后，你可以将另一个对象连接到那个已有的 `IBAction`\
  \ 方法。这样，两个对象都能响应同一个 `IBAction` 方法。这很有用，因为你无需编写两个或多个功能大致相同的独立 `IBAction` 方法，只需编写一个单一的\
  \ `IBAction` 方法，它能根据用户点击的是哪个对象而做出略有不同的响应。\n\n当将两个或多个对象连接到同一个 `IBAction` 方法时，你需要决定是只允许相同类型的对象（如按钮）连接到同一个\
  \ `IBAction` 方法，还是允许不同类型的对象（如一个按钮和一个图像视图）连接到同一个 `IBAction` 方法。\n\n每当你创建一个 `IBAction`\
  \ 方法时，你可以定义该 `IBAction` 方法将响应哪种类型的对象。默认情况下，类型设置为 `Any`，这意味着不同类型的对象可以连接到同一个 `IBAction`\
  \ 方法，但你也可以选择只允许同一类型的对象连接到该 `IBAction` 方法，例如 `UIButton`，如图 10-9 所示。\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig9_HTML.jpg](img/329781_5_En_10_Fig9_HTML.jpg)\n\
  \n**图 10-9** – 选择 `IBAction` 方法可以响应的对象类型\n\n如果你将 `类型` 定义为特定对象（如 `UIButton`），则你的\
  \ `IBAction` 方法会将 `sender`（调用该 `IBAction` 方法的对象）定义为该特定对象，例如：\n\n```\n@IBAction func\
  \ buttonTapped(_ sender: UIButton) {\n}\n```\n\n上述 `IBAction` 方法只能由 `UIButton` 对象调用。如果在创建\
  \ `IBAction` 方法时接受 `类型` 的默认值 `Any`，那么你的 `IBAction` 方法会将 `sender` 定义为 `Any`，例如：\n\
  \n```\n@IBAction func buttonTapped(_ sender: Any) {\n}\n```\n\n任何类型的对象都可以连接到一个 `sender`\
  \ 被定义为 `Any` 的 `IBAction` 方法。\n\n当两个或多个对象连接到同一个 `IBAction` 方法时，你需要一种方法来识别是哪个对象调用了该\
  \ `IBAction` 方法。识别不同用户界面对象的一种方法是在属性检查器面板中为每个对象分配一个唯一的 `Tag` 编号，如图 10-10 所示。\n\n\
  ![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig10_HTML.jpg](img/329781_5_En_10_Fig10_HTML.jpg)\n\
  \n**图 10-10** – `Tag` 属性可以在属性检查器面板中修改\n\n默认情况下，每个对象的 `Tag` 值都为 0，但你可以更改此值，使每个对象拥有不同的值，例如\
  \ 1、24 或 894。通过识别 `Tag` 值，`IBAction` 方法可以确定要响应哪个对象。\n\n为了演示如何将多个对象链接到一个 `IBAction`\
  \ 方法并检测要响应的对象，请遵循以下步骤：\n\n1. 使用单视图应用模板（见第 1 章）创建一个新的 iOS 项目，并将此新项目命名为 `IBActionApp`。这将为用户界面创建一个单视图。\n\
  \n2. 在导航器面板中点击 `Main.storyboard` 文件。Xcode 会显示该单视图。\n\n3. 点击库图标以打开对象库窗口。\n\n4. 在视图上的任意位置拖放两个按钮和一个标签。\n\
  \n5. 选择 **编辑器** ➤ **解决自动布局问题** ➤ **重置为建议的约束**（在子菜单的下半部分）。这将为两个按钮和标签添加约束到用户界面。\n\n\
  6. 点击一个按钮以选中它。\n\n7. 选择 **视图** ➤ **检查器** ➤ **显示属性检查器**，或点击 Xcode 窗口右上角的属性检查器图标。\n\
  \n8. 点击标题文本字段，输入 **First**，然后按回车键。\n\n9. 点击标签文本字段，输入 **1**，然后按回车键。\n\n10. 点击第二个按钮以选中它。\n\
  \n11. 点击标题文本字段，输入 **Second**，然后按回车键。\n\n12. 点击标签文本字段，输入 **2**，然后按回车键。\n\n13. 选择\
  \ **视图** ➤ **助理编辑器** ➤ **显示助理编辑器**，或点击助理编辑器图标。Xcode 会并排显示 `Main.storyboard` 和 `ViewController.swift`\
  \ 文件。\n\n14. 将鼠标指针移到标签上，按住 Control 键，并从标签拖拽到 `ViewController.swift` 文件中 `IBOutlet`\
  \ 行的下方。\n\n15. 松开 Control 键和鼠标左键。会弹出一个窗口。\n\n16. 点击名称文本字段，输入 `labelResult`，然后点击连接按钮。Xcode\
  \ 会创建一个 `IBOutlet` 变量，如下所示：\n\n```\n    @IBOutlet var labelResult: UILabel!\n```\n\
  \n17. 将鼠标指针移到标题为 \"First\" 的按钮上，按住 Control 键，并从该按钮拖拽到 `ViewController.swift` 文件中最后一个花括号上方的位置。\n\
  \n18. 松开 Control 键和鼠标左键。会弹出一个窗口。\n\n19. 点击名称文本字段，输入 `buttonTapped`，确保 `类型` 弹出菜单显示为\
  \ `Any`，然后点击连接按钮。Xcode 会创建一个 `IBAction` 方法，如下所示：\n\n```\n    @IBAction func buttonTapped(_\
  \ sender: Any) {\n    }\n```\n\n20. 将鼠标指针移到标题为 \"Second\" 的按钮上，按住 Control 键，并从该按钮拖拽到\
  \ `buttonTapped` `IBAction` 方法，直到整个 `IBAction` 方法高亮显示，如图 10-11 所示。\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig11_HTML.jpg](img/329781_5_En_10_Fig11_HTML.jpg)\n\
  \n**图 10-11** – 将第二个对象连接到现有的 `IBAction` 方法\n\n21. 松开 Control 键和鼠标左键。\n\n22. 将鼠标指针移到\
  \ `buttonTapped` `IBAction` 方法左侧边距中的圆点上。Xcode 会高亮显示这两个按钮，以验证两个按钮都已连接到 `buttonTapped`\
  \ `IBAction` 方法，如图 10-12 所示。\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig12_HTML.jpg](img/329781_5_En_10_Fig12_HTML.jpg)\n\
  \n**图 10-12** – 验证所有连接到单个 `IBAction` 方法的对象\n\n23. 按如下方式修改 `buttonTapped` `IBAction`\
  \ 方法：\n\n```\n    @IBAction func buttonTapped(_ sender: Any) {\n    switch (sender\
  \ as AnyObject).tag {\n    case 1:\n    labelResult.text = \"Button 1\"\n    case\
  \ 2:\n    labelResult.text = \"Button 2\"\n    default:\n    labelResult.text =\
  \ \"Default\"\n    }\n    }\n```\n\n24. 按如下方式修改 `viewDidLoad` 方法：\n\n```\n    override\
  \ func viewDidLoad() {\n    super.viewDidLoad()\n    labelResult.frame.size.width\
  \ = 120\n    // 加载视图后执行任何额外的设置，通常从 nib 文件加载。\n    }\n```\n\n整个 `ViewController.swift`\
  \ 文件应如下所示：\n\n```\n    import UIKit\n    class ViewController: UIViewController\
  \ {\n    @IBOutlet var labelResult: UILabel!\n    override func viewDidLoad() {\n\
  \    super.viewDidLoad()\n    labelResult.frame.size.width = 120\n    // 加载视图后执行任何额外的设置，通常从\
  \ nib 文件加载。\n    }\n    @IBAction func buttonTapped(_ sender: Any) {\n    switch\
  \ (sender as AnyObject).tag {\n    case 1:\n    labelResult.text = \"Button 1\"\n\
  \    case 2:\n    labelResult.text = \"Button 2\"\n    default:\n    labelResult.text\
  \ = \"Default\"\n    }\n    }\n    }\n```\n\n25. 点击运行按钮或选择 **产品** ➤ **运行**。模拟器屏幕出现。\n\
  \n26. 点击标题为 \"First\" 的按钮。注意标签显示 \"Button 1\"。\n\n27. 点击标题为 \"Second\" 的按钮。注意标签显示\
  \ \"Button 2\"。\n\n28. 选择 **模拟器** ➤ **退出模拟器** 以返回 Xcode。\n\n\n\n在前面的示例中，两个按钮连接到同一个\
  \ `IBAction` 方法，但由于 `IBAction` 的类型是 `Any`，你可以将任何对象连接到这个 `IBAction` 方法。在大多数情况下，最好将\
  \ `IBAction` 方法限制为特定类型的对象，例如 `UIButton`。\n\n除了降低非预期对象连接到 `IBAction` 方法的风险外，将 `IBAction`\
  \ 方法限制为特定对象类型还能让你访问该特定对象的属性。例如，一个仅链接到 `UIButton` 的 `IBAction` 方法将能访问 `UIButton`\
  \ 对象包含的所有属性，例如 `titleLabel.text`。\n\n在我们把现有的两个按钮链接到新的 `IBAction` 方法之前，需要先断开它们在连接检查器面板中与当前\
  \ `IBAction` 方法的连接。断开 `IBOutlet` 与 `IBAction` 方法的连接后，我们可以删除 `.swift` 文件中实际的 `IBOutlet`\
  \ 或 `IBAction` 方法。\n\n#### 注意\n\n仅仅删除 `IBOutlet` 变量或 `IBAction` 方法并不会断开它与用户界面对象的链接。你必须在连接检查器面板中实际断开链接。如果未能在连接检查器面板中断开链接，运行你的应用将不会正常工作，并且\
  \ Xcode 会显示一条错误信息。\n\n要了解如何断开现有 `IBAction` 方法与用户界面对象的连接，并仅为特定类型的对象创建一个 `IBAction`\
  \ 方法，请遵循以下步骤：\n\n1.  确保 `IBActionApp` 项目已在 Xcode 中加载。\n\n2.  在导航器面板中点击 `Main.storyboard`\
  \ 文件。\n\n3.  点击标题为“First”的按钮以选中它。\n\n4.  选择“视图”➤“检查器”➤“显示连接检查器”，或者点击 Xcode 窗口右上角的连接检查器图标。此时会出现连接检查器面板，显示链接到所选对象的所有\
  \ `IBOutlet` 和 `IBAction` 方法。在图 10-13 中，选中的按钮链接到一个名为 `buttonTapped` 的 `IBAction`\
  \ 方法，该方法响应“Touch Up Inside”事件。\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig13_HTML.jpg](img/329781_5_En_10_Fig13_HTML.jpg)\n\
  \n图 10-13\n\n连接检查器面板显示所有与 `IBOutlet` 和 `IBAction` 方法的链接\n\n5.  点击视图控制器 `buttonTapped`\
  \ 左侧出现的关闭图标 (X)。这将断开所选按钮与存储在 `ViewController.swift` 文件中的 `buttonTapped` `IBAction`\
  \ 方法之间的链接。\n\n6.  点击标题为“Second”的按钮以选中它。\n\n7.  点击视图控制器 `buttonTapped` 左侧出现的关闭图标\
  \ (X)。这将断开第二个按钮与存储在 `ViewController.swift` 文件中的 `buttonTapped` `IBAction` 方法之间的链接。\n\
  \n8.  选择“视图”➤“辅助编辑器”➤“显示辅助编辑器”，或者点击辅助编辑器图标。Xcode 会并排显示 `Main.storyboard` 和 `ViewController.swift`\
  \ 文件。\n\n9.  将鼠标指针移到标题为“First”的按钮上，按住 Control 键，然后按住 Control 键将鼠标拖拽到 `ViewController.swift`\
  \ 文件底部最后一个大括号的上方。\n\n10. 松开 Control 键和鼠标左键。此时会弹出一个窗口。\n\n11. 点击“名称”文本字段，输入 `buttonRespond`，点击“类型”弹出菜单并选择\
  \ `UIButton`，然后点击“连接”按钮。Xcode 会创建一个如下的 `IBAction` 方法：\n\n```\n    @IBAction func\
  \ buttonRespond(_ sender: UIButton) {\n    }\n    ```\n\n12. 将鼠标指针移到标题为“First”的按钮上，按住\
  \ Control 键，然后按住 Control 键将鼠标拖拽到 `buttonRespond` `IBAction` 方法上并将其高亮显示，如图 10-14\
  \ 所示。\n\n![../images/329781_5_En_10_Chapter/329781_5_En_10_Fig14_HTML.jpg](img/329781_5_En_10_Fig14_HTML.jpg)\n\
  \n图 10-14\n\n将按钮连接到现有的 `IBAction` 方法\n\n13. 松开 Control 键和鼠标左键。\n\n14. 将 `buttonRespond`\
  \ `IBAction` 方法编辑如下：\n\n```\n    @IBAction func buttonRespond(_ sender: UIButton)\
  \ {\n    switch sender.tag {\n    case 1:\n    labelResult.text = sender.titleLabel?.text\n\
  \    case 2:\n    labelResult.text = sender.titleLabel?.text\n    default:\n   \
  \ labelResult.text = \"Default\"\n    }\n    }\n    ```\n\n整个 `ViewController.swift`\
  \ 文件应如下所示：\n\n```\n    import UIKit\n    class ViewController: UIViewController\
  \ {\n    @IBOutlet var labelResult: UILabel!\n    override func viewDidLoad() {\n\
  \    super.viewDidLoad()\n    labelResult.frame.size.width = 120\n    // 加载视图后的任何额外设置（通常来自\
  \ nib 文件）\n    }\n    @IBAction func buttonTapped(_ sender: Any) {\n    switch (sender\
  \ as AnyObject).tag {\n    case 1:\n    labelResult.text = \"Button 1\"\n    case\
  \ 2:\n    labelResult.text = \"Button 2\"\n    default:\n    labelResult.text =\
  \ \"Default\"\n    }\n    }\n    @IBAction func buttonRespond(_ sender: UIButton)\
  \ {\n    switch sender.tag {\n    case 1:\n    labelResult.text = sender.titleLabel?.text\n\
  \    case 2:\n    labelResult.text = sender.titleLabel?.text\n    default:\n   \
  \ labelResult.text = \"Default\"\n    }\n    }\n    }\n    ```\n\n15. 点击“运行”按钮或选择“产品”➤“运行”。模拟器屏幕会出现。\n\
  \n16. 点击标题为“First”的按钮。注意标签显示为“First”。\n\n17. 点击标题为“Second”的按钮。注意标签显示为“Second”。\n\
  \n18. 选择“模拟器”➤“退出模拟器”以返回 Xcode。\n\n## 总结\n\n按钮、开关和分段控件为用户提供了控制应用的方式。通过使用检查器面板或 Swift\
  \ 代码，你可以修改按钮、开关和分段控件，为你的特定应用进行自定义。\n\n按钮代表单个命令。开关允许用户恰好选择两种设置：开（true）和关（false）。分段控件的作用类似于多个按钮，但比多个按钮占用更少的空间。\n\
  \n通常，你会将一个按钮、开关或分段控件链接到单个 `IBAction` 方法。但是，你可以将两个或更多对象连接到同一个 `IBAction` 方法。创建 `IBAction`\
  \ 方法时，你可以允许任何类型的对象连接到它，也可以定义只有特定类型的对象（例如 `UIButton`）才能连接到该 `IBAction` 方法。如果定义只有特定类型的对象可以连接到\
  \ `IBAction` 方法，那么你将能够访问该对象的属性。\n\n一旦将对象连接到 `IBOutlet` 或 `IBAction` 方法，你随时可以断开该连接。你必须在连接检查器面板中断开该连接。如果未能断开连接，并在之后删除了\
  \ `IBOutlet` 或 `IBAction` 方法，那么当你尝试运行应用时，Xcode 会显示一条错误信息。\n\n\n\n# 11. 触摸手势\n\n\
  允许用户通过按钮、开关或分段控件来控制应用确实很方便，但所有这些控件都会占用屏幕空间。为了消除用户界面上额外对象的需求，你的应用还可以检测并响应触摸手势，从而允许用户直接操作屏幕上显示的项目。\n\
  \niOS 应用可以检测和响应的不同类型的触摸手势包括：\n\n* **轻点** – 指尖触碰屏幕后抬起。\n* **捏合** – 两个指尖靠拢或分开。\n*\
  \ **旋转** – 两个指尖以圆形轨迹向左或向右旋转。\n* **平移** – 指尖在屏幕上拖动滑行。\n* **轻扫** – 指尖在屏幕上向上、向下、向左或向右滑行后抬起。\n\
  * **屏幕边缘平移** – 指尖从屏幕边缘附近开始拖动的滑行动作。\n* **长按** – 指尖触碰并按压屏幕。\n\n你可以完全通过 Swift 代码，或者通过从对象库中将手势识别器对象放置到视图上（如图\
  \ 11-1 所示）来在应用的用户界面上创建触摸手势。\n\n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig1_HTML.jpg](img/329781_5_En_11_Fig1_HTML.jpg)\n\
  \n图 11-1. 对象库窗口中可用的手势列表\n\n要在应用中检测手势，你需要执行以下操作：\n\n* 向视图添加手势识别器。\n* 创建一个 `IBAction`\
  \ 方法来响应手势。\n* 定义哪个对象需要响应手势。\n\n## 检测轻点手势\n\n轻点手势简单地检测用户何时轻点屏幕。默认情况下，轻点手势识别单指的一次轻点，但你可以定义使用两根或更多手指的多次轻点。\n\
  \n要了解如何检测轻点手势，请遵循以下步骤：\n\n1.  使用单视图应用模板创建一个新的 iOS 项目（参见第 1 章），并将这个新项目命名为 `TapApp`。这会为用户界面创建一个单独的视图。\n\
  2.  在导航器窗格中点击 `Main.storyboard` 文件。Xcode 会显示该单独视图。\n3.  点击库图标以打开对象库窗口，并查找轻点手势识别器，如图\
  \ 11-2 所示。\n\n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig2_HTML.jpg](img/329781_5_En_11_Fig2_HTML.jpg)\n\
  \n图 11-2. 对象库中的轻点手势识别器\n\n4.  将轻点手势识别器拖放到视图上的任意位置。请注意，手势识别器不会直接显示在视图上，而是显示在视图的顶部以及文档大纲中，如图\
  \ 11-3 所示。\n\n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig3_HTML.jpg](img/329781_5_En_11_Fig3_HTML.jpg)\n\
  \n图 11-3. 轻点手势识别器出现在文档大纲和视图控制器的顶部\n\n5.  在文档大纲或视图控制器顶部点击轻点手势识别器。\n6.  选择“视图”➤“检查器”➤“显示属性检查器”，或点击\
  \ Xcode 窗口右上角的属性检查器图标。请注意，属性检查器允许你定义识别轻点手势所需的轻点次数和触摸次数（指尖数）。默认情况下，轻点手势只需要 1 次轻点和\
  \ 1 次触摸（指尖），如图 11-4 所示。\n\n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig4_HTML.jpg](img/329781_5_En_11_Fig4_HTML.jpg)\n\
  \n图 11-4. 轻点手势识别器出现在文档大纲和视图控制器的顶部\n\n7.  点击库图标以打开对象库窗口，然后将两个标签拖放到视图上的任意位置。\n8. \
  \ 双击一个标签，输入**可视化解决方案**并按回车键。\n9.  双击另一个标签，输入**编程解决方案**并按回车键。\n10. 选择“编辑器”➤“解决自动布局问题”➤“重置为建议的约束”（位于子菜单的下半部分）。Xcode\
  \ 会为两个标签添加约束。\n11. 点击**可视化解决方案**标签，然后选择“视图”➤“检查器”➤“显示属性检查器”，或点击 Xcode 窗口右上角的属性检查器图标。\n\
  12. 选中**启用用户交互**复选框，如图 11-5 所示。选中**启用用户交互**后，标签可以响应用户的触摸。\n\n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig5_HTML.jpg](img/329781_5_En_11_Fig5_HTML.jpg)\n\
  \n图 11-5. 选中**启用用户交互**复选框\n\n13. 将鼠标指针移到**可视化解决方案**标签上，按住 Control 键，然后从标签 Ctrl-拖拽到文档大纲中或视图控制器上方的轻点手势识别器上，如图\
  \ 11-6 所示。\n\n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig6_HTML.jpg](img/329781_5_En_11_Fig6_HTML.jpg)\n\
  \n图 11-6. 从标签 Ctrl-拖拽到轻点手势识别器会将标签链接到轻点手势\n\n14. 松开 Control 键和鼠标左键。会弹出一个弹出菜单，如图 11-7\
  \ 所示。\n\n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig7_HTML.jpg](img/329781_5_En_11_Fig7_HTML.jpg)\n\
  \n图 11-7. 弹出菜单让你选择要连接到标签的内容\n\n15. 点击 `gestureRecognizers`。\n\n\n\n16.  选择 View\
  \ ➤ Inspectors ➤ Show Connections Inspector，或点击 Xcode 窗口右上角的 Connections Inspector\
  \ 图标。Connections Inspector 窗格显示该标签已连接到 Tap Gesture Recognizer，如图 11-8 所示，这意味着只有该标签可以响应轻点手势。\n\
  \n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig8_HTML.jpg](img/329781_5_En_11_Fig8_HTML.jpg)\n\
  \n**图 11-8** Connections Inspector 确认标签已连接到 Tap Gesture Recognizer\n\n17.  选择 View\
  \ ➤ Assistant Editor ➤ Show Assistant Editor，或点击 Xcode 窗口右上角的 Assistant Editor 图标。\n\
  \n18.  将鼠标指针移至 Document Outline 或 View Controller 顶部的 Tap Gesture Recognizer 图标上，按住\
  \ Control 键，然后从该图标向 `ViewController.swift` 文件底部最后一个花括号上方拖拽。\n\n19.  松开 Control 键和鼠标左键。此时会出现一个弹出窗口。\n\
  \n20.  在 Name 文本字段中点击，输入 `tapDetected`，点击 Type 弹出菜单并选择 `UITapGestureRecognizer`，然后点击\
  \ Connect 按钮。Xcode 会创建一个 `IBAction` 方法。\n\n21.  修改此 `tapDetected` 的 `IBAction` 方法，如下所示：\n\
  \n```\n@IBAction func tapDetected(_ sender: UITapGestureRecognizer) {\n    print\
  \ (\"Tap detected\")\n}\n```\n\n完整的 `ViewController.swift` 文件应如下所示：\n\n```\nimport\
  \ UIKit\nclass ViewController: UIViewController {\n    override func viewDidLoad()\
  \ {\n        super.viewDidLoad()\n        // Do any additional setup after loading\
  \ the view, typically from a nib.\n    }\n    @IBAction func tapDetected(_ sender:\
  \ UITapGestureRecognizer) {\n        print (\"Tap detected\")\n    }\n}\n```\n\n\
  22.  点击 Run 按钮或选择 Product ➤ Run。模拟器屏幕将会出现。\n\n23.  点击 Visual Solution 标签。请注意，在 Xcode\
  \ 窗口底部的 Debug Area 中会出现消息 “Tap detected”。\n\n24.  点击 Visual Solution 标签以外的任意位置。请注意，每次点击\
  \ Visual Solution 标签以外的位置或点击 Programmatic Solution 标签时，Xcode 窗口的 Debug Area 中不会显示其他内容。\n\
  \n25.  选择 Simulator ➤ Quit Simulator 以返回 Xcode。\n\n上述步骤允许标签检测轻点手势，但我们唯一需要创建的代码是\
  \ `tapDetected` 的 `IBAction` 方法。我们也可以完全通过 Swift 代码定义手势识别器，接下来将对 Programmatic Solution\
  \ 标签执行此操作。\n\n1.  确保 `TapApp` 项目已在 Xcode 中加载。\n\n2.  在 Navigator 窗格中点击 `Main.storyboard`\
  \ 文件。Xcode 将显示单个视图。\n\n3.  选择 View ➤ Assistant Editor ➤ Show Assistant Editor，或点击\
  \ Xcode 窗口右上角的 Assistant Editor 图标。Xcode 将并排显示 `Main.storyboard` 和 `ViewController.swift`\
  \ 文件。\n\n4.  将鼠标指针移至 Programmatic Solution 标签上，按住 Control 键，然后从该标签向 `ViewController.swift`\
  \ 文件中的 `class ViewController` 行下方拖拽。\n\n5.  松开 Control 键和鼠标左键。此时会出现一个弹出窗口。\n\n6.\
  \  在 Name 文本字段中点击，输入 `labelCode`，然后点击 Connect 按钮。Xcode 会创建一个 `IBOutlet`，如下所示：\n\n\
  ```\n@IBOutlet var labelCode: UILabel!\n```\n\n7.  编辑 `viewDidLoad` 方法，如下所示：\n\n\
  ```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    labelCode.isUserInteractionEnabled\
  \ = true\n    let tapGesture = UITapGestureRecognizer(target: self, action: #selector(handleTap))\n\
  \    labelCode.addGestureRecognizer(tapGesture)\n    // Do any additional setup\
  \ after loading the view, typically from a nib.\n}\n```\n\n我们可以不选中 Attributes Inspector\
  \ 窗格中的 User Interaction Enabled 复选框，而是直接为第二个显示 “Programmatic Solution” 的标签将 `.isUserInteractionEnabled`\
  \ 属性设置为 `true`。\n\n我们可以不将 Tap Gesture Recognizer 从 Object Library 拖放到视图上，而是使用 Swift\
  \ 代码创建 `UITapGestureRecognizer`。这意味着我们还需要定义一个函数来响应轻点手势，该函数由 `#selector(handleTap)`\
  \ 定义。最后，我们需要将此轻点手势添加到标签，而不是通过 Connections Inspector 窗格进行连接。\n\n8.  在 `viewDidLoad`\
  \ 方法下方添加以下内容：\n\n```\n@objc func handleTap() {\n    print (\"Tap on second label\
  \ detected\")\n}\n```\n\n完整的 `ViewController.swift` 文件应如下所示：\n\n```\nimport UIKit\n\
  class ViewController: UIViewController {\n    @IBOutlet var labelCode: UILabel!\n\
  \    override func viewDidLoad() {\n        super.viewDidLoad()\n        labelCode.isUserInteractionEnabled\
  \ = true\n        let tapGesture = UITapGestureRecognizer(target: self, action:\
  \ #selector(handleTap))\n        labelCode.addGestureRecognizer(tapGesture)\n  \
  \      // Do any additional setup after loading the view, typically from a nib.\n\
  \    }\n    @objc func handleTap() {\n        print (\"Tap on second label detected\"\
  )\n    }\n    @IBAction func tapDetected(_ sender: UITapGestureRecognizer) {\n \
  \       print (\"Tap detected\")\n    }\n}\n```\n\n9.  点击 Run 按钮或选择 Product ➤ Run。模拟器屏幕将会出现。\n\
  \n10.  点击 Programmatic Solution 标签。请注意，在 Xcode 窗口底部的 Debug Area 中会出现消息 “Tap on second\
  \ label detected”。\n\n11.  点击 Visual Solution 标签。请注意，在 Xcode 窗口底部的 Debug Area 中会出现消息\
  \ “Tap detected”。\n\n12.  点击两个标签以外的任意位置。请注意，即使你在屏幕上轻点，轻点手势也不会被识别，因为两个轻点手势都连接到了标签上。\n\
  \n13.  选择 Simulator ➤ Quit Simulator 以返回 Xcode。\n\n使用手势识别器时，你可以通过 Object Library\
  \ 和 Inspector 窗格可视地定义它们，也可以通过 Swift 代码创建手势识别器。两种方法本质相同，因此取决于你偏好编写 Swift 代码还是使用 Object\
  \ Library。\n\n使用 Swift 代码自定义轻点手势时，可以定义以下两个属性：\n\n*   `.numberOfTapsRequired` – 定义识别轻点手势所需的点击次数，例如一次点击（默认值）\n\
  *   `.numberOfTouchesRequired` – 定义识别轻点手势所需的指尖（触摸）数量\n\n\n\n## 检测捏合手势\n\n当两个指尖相互靠近或相互远离时，就会发生捏合手势。在捏合手势过程中，应用可以识别缩放比例和速度。缩放比例定义了两个指尖的相对位置，而速度则检测捏合动作的快慢。\n\
  \n要了解如何检测捏合手势，请按照以下步骤操作：\n\n1.  使用“单视图应用”模板创建一个新的 iOS 项目（参见第 1 章），并将此新项目命名为 `PinchApp`。这将为用户界面创建一个单视图。\n\
  \n2.  在导航器窗格中点击 `Main.storyboard` 文件。Xcode 将显示该单视图。\n\n3.  点击“资源库”图标打开“对象库”窗口，查找“捏合手势识别器”，如图\
  \ 11-9 所示。\n\n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig9_HTML.jpg](img/329781_5_En_11_Fig9_HTML.jpg)\n\
  *图 11-9* — 对象库窗口中的“捏合手势识别器”\n\n4.  将“捏合手势识别器”拖放到视图上。Xcode 会在文档大纲中和视图控制器上方显示“捏合手势识别器”。\n\
  \n5.  点击“资源库”图标打开“对象库”窗口，并将一个图像视图拖放到用户界面的中心位置。\n\n6.  选择“视图”➤“检查器”➤“显示属性检查器”，或点击\
  \ Xcode 窗口右上角的“属性检查器”图标。\n\n7.  点击“背景”弹出菜单，然后选择一种颜色，例如绿色或蓝色。这将使你在模拟器中运行应用时能轻松找到该图像视图。如果没有背景色，图像视图默认的白色背景会与视图的白色背景融为一体。\n\
  \n8.  选中“启用用户交互”复选框。这允许图像视图响应用户操作。\n\n9.  点击 Xcode 中间窗格底部的“对齐”图标。将出现一个窗口。\n\n10.\
  \ 选中“容器中水平居中”和“容器中垂直居中”复选框，然后点击“添加 2 个约束”按钮，如图 11-10 所示。图像视图需要居中，以便在模拟器中轻松模拟捏合手势。\n\
  \n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig10_HTML.jpg](img/329781_5_En_11_Fig10_HTML.jpg)\n\
  *图 11-10* — 将图像视图居中\n\n11. 选择“编辑器”➤“解决自动布局问题”➤“添加缺少的约束”（在子菜单的上半部分）。Xcode 会为图像视图添加额外的约束。\n\
  \n12. 将鼠标指针移到图像视图上，按住 Control 键，然后从图像视图 Control-拖拽到文档大纲中或视图控制器顶部的“捏合手势识别器”图标上。\n\
  \n13. 松开 Control 键和鼠标左键。将出现一个窗口。\n\n14. 选择 `gestureRecognizers`。此关联使图像视图能够检测捏合手势。\n\
  \n15. 选择“视图”➤“辅助编辑器”➤“显示辅助编辑器”，或点击“辅助编辑器”图标。Xcode 会并排显示 `Main.storyboard` 和 `ViewController.swift`\
  \ 文件。\n\n16. 将鼠标指针移到图像视图上，按住 Control 键，然后从图像视图 Control-拖拽到 `ViewController.swift`\
  \ 文件中 `IBOutlet` 行的下方。\n\n17. 松开 Control 键和鼠标左键。将出现一个弹出窗口。\n\n18. 点击“名称”文本字段，输入\
  \ `topImageView`，然后点击“连接”按钮。Xcode 会创建一个 `IBOutlet` 变量，如下所示：\n\n```\n@IBOutlet var\
  \ topImageView: UIImageView!\n```\n\n19. 将鼠标指针移到文档大纲中或视图控制器顶部的“捏合手势识别器”图标上，按住 Control\
  \ 键，然后从“捏合手势识别器”Control-拖拽到 `ViewController.swift` 文件中最后一个花括号的上方。\n\n20. 松开 Control\
  \ 键和鼠标左键。将出现一个弹出窗口。\n\n21. 点击“名称”文本字段，输入 `pinchDetected`，点击“类型”弹出菜单并选择 `UIPinchGestureRecognizer`，然后点击“连接”按钮。Xcode\
  \ 会创建一个 `IBAction` 方法。\n\n22. 按如下方式编辑 `pinchDetected` `IBAction` 方法：\n\n```\n@IBAction\
  \ func pinchDetected(_ sender: UIPinchGestureRecognizer) {\n    topImageView.transform\
  \ = CGAffineTransform(scaleX: sender.scale, y: sender.scale)\n}\n```\n\n`pinchDetected`\
  \ `IBAction` 方法根据捏合手势的 scale 属性更改图像视图的大小，其中 scale 属性定义了捏合手势的距离。整个 `ViewController.swift`\
  \ 文件应如下所示：\n\n```\nimport UIKit\nclass ViewController: UIViewController {\n    @IBOutlet\
  \ var topImageView: UIImageView!\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
  \        // Do any additional setup after loading the view, typically from a nib.\n\
  \    }\n    @IBAction func pinchDetected(_ sender: UIPinchGestureRecognizer) {\n\
  \        topImageView.transform = CGAffineTransform(scaleX: sender.scale, y: sender.scale)\n\
  \    }\n}\n```\n\n23. 选择“视图”➤“标准编辑器”➤“显示标准编辑器”，或点击 Xcode 窗口右上角的“标准编辑器”图标。\n\n24.\
  \ 点击“运行”按钮，或选择“产品”➤“运行”。模拟器窗口将会出现。要模拟捏合手势，你需要使用鼠标并按住 Option 键。\n\n25. 将鼠标指针移到图像视图上，然后按住\
  \ Option 键。屏幕上会出现两个灰色圆点，模拟两个指尖，如图 11-11 所示。\n\n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig11_HTML.jpg](img/329781_5_En_11_Fig11_HTML.jpg)\n\
  *图 11-11* — 在模拟器中，按住 Option 键的同时拖拽鼠标可模拟双指捏合手势\n\n26. 按住鼠标左键和 Option 键，然后拖拽鼠标以模拟捏合手势。请注意，当捏合手势变化时，图像视图的大小也会随之改变。\n\
  \n27. 选择“模拟器”➤“退出模拟器”以返回 Xcode。\n\n此示例通过从对象库拖拽“捏合手势识别器”来直观地定义捏合手势。现在让我们看看如何仅通过 Swift\
  \ 代码来复制此过程。\n\n1.  使用“单视图应用”模板创建一个新的 iOS 项目（参见第 1 章），并将此新项目命名为 `PinchCodeApp`。这将为用户界面创建一个单视图。\n\
  \n2.  在导航器窗格中点击 `Main.storyboard` 文件。Xcode 将显示该单视图。\n\n3.  点击“资源库”图标打开“对象库”窗口，并将一个图像视图拖放到用户界面的中心位置。\n\
  \n4.  点击 Xcode 中间窗格底部的“对齐”图标。将出现一个窗口。\n\n5.  选中“容器中水平居中”和“容器中垂直居中”复选框，然后点击“添加 2\
  \ 个约束”按钮（参见图 11-10）。图像视图需要居中，以便在模拟器中轻松模拟捏合手势。\n\n6.  选择“编辑器”➤“解决自动布局问题”➤“添加缺少的约束”（在子菜单的上半部分）。Xcode\
  \ 会为图像视图添加额外的约束。\n\n7.  选择“视图”➤“辅助编辑器”➤“显示辅助编辑器”，或点击“辅助编辑器”图标。Xcode 会并排显示 `Main.storyboard`\
  \ 和 `ViewController.swift` 文件。\n\n8.  将鼠标指针移到图像视图上，按住 Control 键，然后从图像视图 Control-拖拽到\
  \ `ViewController.swift` 文件中 `IBOutlet` 行的下方。\n\n9.  松开 Control 键和鼠标左键。将出现一个弹出窗口。\n\
  \n10. 点击“名称”文本字段，输入 `topImageView`，然后点击“连接”按钮。Xcode 会创建一个 `IBOutlet` 变量，如下所示：\n\n\
  ```\n@IBOutlet var topImageView: UIImageView!\n```\n\n11. 选择“视图”➤“标准编辑器”➤“显示标准编辑器”，或点击\
  \ Xcode 窗口右上角的“标准编辑器”图标。\n\n\n```markdown\n\n## 12. 点击导航面板中的`ViewController.swift`文件。\n\
  \n## 13. 在`IBOutlet`下方添加以下代码行：\n\n```swift\nvar pinchMe: UIPinchGestureRecognizer?\n\
  ```\n\n该代码定义了一个全局变量，用于表示捏合手势。\n\n## 14. 按如下方式编辑`viewDidLoad`方法：\n\n```swift\noverride\
  \ func viewDidLoad() {\n    super.viewDidLoad()\n    topImageView.isUserInteractionEnabled\
  \ = true\n    topImageView.backgroundColor = UIColor.green\n    let pinchGesture\
  \ = UIPinchGestureRecognizer(target: self, action: #selector(handlePinch))\n   \
  \ topImageView.addGestureRecognizer(pinchGesture)\n    pinchMe = pinchGesture\n\
  \    // Do any additional setup after loading the view, typically from a nib.\n\
  }\n```\n\n这段代码开启了图像视图的用户交互启用设置，并将其背景颜色定义为绿色以便可见。接着，它定义了一个捏合手势识别器（而非从对象库窗口中拖放捏合手势识别器），定义了一个名为`handlePinch`的函数来响应捏合手势，并将捏合手势链接到图像视图，使得捏合操作仅影响该图像视图。最后，它将捏合手势识别器赋值给`pinchMe`变量。\n\
  \n## 15. 在`viewDidLoad`方法下方添加以下函数：\n\n```swift\n@objc func handlePinch() {\n   \
  \ topImageView.transform = CGAffineTransform(scaleX: pinchMe!.scale, y: pinchMe!.scale)\n\
  }\n```\n\n整个`ViewController.swift`文件应如下所示：\n\n```swift\nimport UIKit\nclass ViewController:\
  \ UIViewController {\n    @IBOutlet var topImageView: UIImageView!\n    var pinchMe:\
  \ UIPinchGestureRecognizer?\n    \n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
  \        topImageView.isUserInteractionEnabled = true\n        topImageView.backgroundColor\
  \ = UIColor.green\n        let pinchGesture = UIPinchGestureRecognizer(target: self,\
  \ action: #selector(handlePinch))\n        topImageView.addGestureRecognizer(pinchGesture)\n\
  \        pinchMe = pinchGesture\n        // Do any additional setup after loading\
  \ the view, typically from a nib.\n    }\n    \n    @objc func handlePinch() {\n\
  \        topImageView.transform = CGAffineTransform(scaleX: pinchMe!.scale, y: pinchMe!.scale)\n\
  \    }\n}\n```\n\n## 16. 点击运行按钮或选择“产品” ➤ “运行”。模拟器窗口将出现。要模拟捏合手势，您需要使用鼠标并按住 Option\
  \ 键。\n\n## 17. 将鼠标指针移到图像视图上，然后按住 Option 键。屏幕上会出现两个灰点，模拟两个指尖（见图 11-11）。\n\n## 18.\
  \ 按住鼠标左键和 Option 键，然后拖动鼠标模拟捏合手势。注意，当捏合手势变化时，图像视图的大小也会随之变化。\n\n## 19. 选择“模拟器” ➤ “退出模拟器”以返回\
  \ Xcode。\n\n## 检测旋转手势\n\n旋转手势与捏合手势类似，因为它们都使用两个指尖。主要区别在于，旋转手势检测两个指尖以顺时针或逆时针方向做圆周运动的情况。在旋转手势期间，应用可以识别旋转（以弧度为单位）和速度（以弧度/秒为单位）。\n\
  \n要了解如何使用旋转手势，请按照以下步骤操作：\n\n## 1. 使用“单一视图应用”模板（见第 1 章）创建一个新的 iOS 项目，并将此新项目命名为`RotateApp`。这将为用户界面创建一个单一视图。\n\
  \n## 2. 点击导航面板中的`Main.storyboard`文件。Xcode 显示该单一视图。\n\n## 3. 点击库图标以打开“对象库”窗口，查找“旋转手势识别器”，如图\
  \ 11-12 所示。\n\n![../images/329781_5_En_11_Chapter/329781_5_En_11_Fig12_HTML.jpg](img/329781_5_En_11_Fig12_HTML.jpg)\n\
  \n图 11-12 — 对象库窗口中的旋转手势识别器\n\n## 4. 将旋转手势识别器拖放到视图上。Xcode 会在文档大纲和视图控制器上方显示旋转手势识别器。\n\
  \n## 5. 点击库图标以打开“对象库”窗口，并将一个图像视图拖放到用户界面上。\n\n## 6. 选择“视图” ➤ “检查器” ➤ “显示属性检查器”，或点击\
  \ Xcode 窗口右上角的“属性检查器”图标。\n\n## 7. 点击“背景”弹出菜单，选择一种颜色，例如绿色或蓝色。这将使图像视图在模拟器中运行应用时易于找到。若无背景颜色，图像视图默认的白色背景将与视图的白色背景融为一体。\n\
  \n## 8. 勾选“启用用户交互”复选框。这允许图像视图响应用户操作。\n\n## 9. 点击 Xcode 中间面板底部的“对齐”图标。将出现一个窗口。\n\n\
  ## 10. 勾选“水平居中于容器”和“垂直居中于容器”复选框，然后点击“添加 2 个约束”按钮（见图 11-10）。图像视图需要位于中心位置，以便在模拟器中轻松模拟捏合手势。\n\
  \n## 11. 选择“编辑器” ➤ “解决自动布局问题” ➤ 在子菜单的上半部分点击“添加缺失的约束”。Xcode 会为图像视图添加额外的约束。\n\n##\
  \ 12. 将鼠标指针移到图像视图上，按住 Control 键，然后从图像视图 Control-拖动到文档大纲或视图控制器顶部的“旋转手势识别器”图标上。\n\n\
  ## 13. 松开 Control 键和鼠标左键。将出现一个窗口。\n\n## 14. 选择`gestureRecognizers`。此链接使图像视图能够检测旋转手势。\n\
  \n## 15. 选择“视图” ➤ “辅助编辑器” ➤ “显示辅助编辑器”，或点击“辅助编辑器”图标。Xcode 并排显示`Main.storyboard`和`ViewController.swift`文件。\n\
  \n## 16. 将鼠标指针移到图像视图上，按住 Control 键，然后从图像视图 Control-拖动到`ViewController.swift`文件中`class\
  \ ViewController`行下方。\n\n## 17. 松开 Control 键和鼠标左键。将出现一个弹出窗口。\n\n## 18. 在“名称”文本字段中点击，输入`topImageView`，然后点击“连接”按钮。Xcode\
  \ 会创建一个`IBOutlet`变量，如下所示：\n\n```swift\n@IBOutlet var topImageView: UIImageView!\n\
  ```\n\n## 19. 将鼠标指针移到文档大纲或视图控制器顶部的“旋转手势识别器”图标上，按住 Control 键，然后从旋转手势识别器 Control-拖动到`ViewController.swift`文件中最后一个大括号上方。\n\
  \n## 20. 松开 Control 键和鼠标左键。将出现一个弹出窗口。\n\n## 21. 在“名称”文本字段中点击，输入`rotationDetected`，在“类型”弹出菜单中选择`UIRotationGestureRecognizer`，然后点击“连接”按钮。Xcode\
  \ 会创建一个`IBAction`方法。\n\n```\n\n\n22. 编辑 `rotationDetected` IBAction 方法，如下所示：\n\n\
  ```\n@IBAction func rotationDetected(_ sender: UIRotationGestureRecognizer) {\n\
  \    topImageView.transform = CGAffineTransform(rotationAngle: sender.rotation)\n\
  }\n```\n\n`rotationDetected` IBAction 方法根据旋转手势的 `rotation` 属性旋转图像视图，其中 `scale` 属性定义了捏合手势的距离。完整的\
  \ `ViewController.swift` 文件应如下所示：\n\n```\nimport UIKit\nclass ViewController: UIViewController\
  \ {\n    @IBOutlet var topImageView: UIImageView!\n    override func viewDidLoad()\
  \ {\n        super.viewDidLoad()\n        // Do any additional setup after loading\
  \ the view, typically from a nib.\n    }\n    @IBAction func rotationDetected(_\
  \ sender: UIRotationGestureRecognizer) {\n        topImageView.transform = CGAffineTransform(rotationAngle:\
  \ sender.rotation)\n    }\n}\n```\n\n23. 选择 **View ➤ Standard Editor ➤ Show Standard\
  \ Editor**，或点击 Xcode 窗口右上角的 Standard Editor 图标。\n\n24. 点击 Run 按钮或选择 **Product ➤\
