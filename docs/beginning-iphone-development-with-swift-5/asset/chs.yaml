  ```\n\n52. 选择`View ➤ Standard Editor ➤ Show Standard Editor`，或单击 Xcode 窗口右上角的 Standard\
  \ Editor 图标。\n\n53. 单击导航面板中的`ViewController.swift`文件。\n\n54. 修改`viewDidLoad`方法如下：\n\
