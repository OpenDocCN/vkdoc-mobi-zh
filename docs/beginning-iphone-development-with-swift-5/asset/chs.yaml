  \ Editor ➤ Show Standard Editor`，或点击 `Xcode` 窗口右上角的“标准编辑器”图标。\n\n36. 在导航面板中点击 `ViewController.swift`\
  \ 文件。\n\n37. 将 `class ViewController` 行编辑为以下内容：\n\n```\n    class ViewController:\
  \ UIViewController, UICollectionViewDataSource, UICollectionViewDelegate {\n```\n\
  \n38. 在 `IBOutlet` 下方输入以下内容：\n\n```\n    let petArray = [\"cat\", \"dog\", \"parakeet\"\
  , \"parrot\", \"canary\", \"finch\", \"tropical fish\", \"goldfish\", \"sea horses\"\
