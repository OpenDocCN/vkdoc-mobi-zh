  图 11-23. iTunes Connect 中的 **准备上传二进制文件** 按钮


  该页面右上角现在出现了一个 **准备上传二进制文件** 按钮。点击它，`iTunes Connect` 会询问应用是否使用加密技术，这是出于出口法规的考虑（图
