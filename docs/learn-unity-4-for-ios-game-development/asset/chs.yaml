  `iTunes Connect` 要求必须上传图标和至少一张截图，否则无法继续操作，尽管我们实际上需要为应用支持的每种屏幕类型（宽高比）都上传截图。如果一款 Unity
  iOS 应用同时为 iPhone 和 iPad 构建，那么就需要为所有三类设备上传截图，大致对应 iPhone 4、iPhone 5 和 iPad。


  > **警告**   `iTunes Connect` 的超时时间很短。如果在此页面完成之前超时，整个应用描述会消失，你将不得不从头开始。这就是我们提前准备好图标和截图的原因。


  ### 为上传做准备


