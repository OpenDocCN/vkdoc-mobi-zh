  然后就是等待 Apple 批准或拒绝应用。


  **提示** 提交后重新登录 iTunes Connect 并验证应用状态是否为`Waiting for Review`是一个好主意。即使应用二进制文件有效，审核也可能因例如缺少截图而被搁置。


  你最终会收到一封电子邮件，通知你应用已在 App Store 上可用、已被拒绝，或者 Apple 需要更多时间来审核。此回复通常会在提交后几周内到达，但我曾有过应用在
  24 小时内被接受，或在两个月后被拒绝的经历。当审核期延长时，Apple 通常会发送一封电子邮件，说明他们需要更多时间来审核你的应用。


  ### 为拒绝做好准备


  如果应用被拒绝，电子邮件将告知你返回 iTunes Connect 中的应用，点击`Resolution Center`按钮查看并选择性地回应拒绝原因，这些原因可能包括技术问题、崩溃
  Bug 或违反 Apple 的 App Store 审核指南（在注册成为 iOS 开发者后，你可以在 Apple 开发者网站上阅读该指南）。


  如果你选择修改应用，你必须在再次上传前点击`Reject Binary`和`Ready for Upload`。如果你认为拒绝不合理，`Resolution Center`也允许你向
  App Review Board 提出申诉。


  如果被接受，并且你在 iTunes Connect 中选择了自动发布选项，应用将很快出现在 App Store 上。否则，应用将处于`Pending Developer
  Release`状态，直到你登录 iTunes Connect，点击应用的`View Details`，然后点击`Release this Version`按钮。


  ### 更新应用


  应用被批准后，你可以随时返回 iTunes Connect 中的应用页面，点击`View Details`来编辑应用描述，修改后的文本将在几小时内显示在 App
  Store 上。iTunes Connect 页面还会显示一个`Add New Version`按钮。点击此按钮将引导你完成原始提交流程的简化版本，以提交应用更新。除了包
  ID（bundle ID）外，你可以更改几乎所有详细信息，但唯一需要更改的是增加包版本（bundle version）。


  **提示** 更新应用时，请记住同时增加 iTunes Connect 和 Unity Player Settings 中的包版本。


  请注意，包 ID 中以句点分隔的组成部分被视为数字而不是字符串，因此将版本`247`更新为`2.049`是（令人惊讶地）可以的，因为它比较的是数字`47`和`49`（Figure
  11-33）。


  ![9781430248750_Fig11-33.jpg](img/9781430248750_Fig11-33.jpg)


