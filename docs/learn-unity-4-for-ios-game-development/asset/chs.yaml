  默认语言表示你为此应用提交的所有资源和描述将使用的主要语言。


  `SKU Number` 可以是任何你想要的字符串，但它必须在你所有的应用中保持唯一，并且当你在报告中看到它时，应能轻松识别出对应的应用。


  ### 上架时间与价格


  从“App Information”页面继续后，iTunes Connect 会要求你指定应用的价格以及你希望应用在 App Store 上架的时间（图 11-17）。


  ![9781430248750_Fig11-17.jpg](img/9781430248750_Fig11-17.jpg)


  图 11-17. 在 iTunes Connect 上设置应用上架时间与价格


  上架时间取决于苹果审核应用的进度。因此，如果你指定的上架日期是提交应用后的一周，而审核花费了两周，那么应用将在审核通过之日上架。如果你希望应用尽快上架，只需使用默认日期，即你输入此信息的当天。


  价格选项包括免费、$0.99、$1.99、$2.99 等。无需过分担心定价是否恰当，因为以后随时可以更改。


  接下来的页面是此流程中信息最为集中的环节。大部分应用信息都在此添加，幸运的是，这个庞大的表单被分成了若干部分。


  ### 版本、类别与版权


  第一部分是版本号、版权和分类信息（图 11-18）。


  ![9781430248750_Fig11-18.jpg](img/9781430248750_Fig11-18.jpg)


