  This is a label\");\n}\n```\n\n\n\n"
- "# 排版后的文本\n\n所有 UnityGUI 控件都是通过调用`GUI`类（以及`GUILayout`类，但将在下一节中介绍）中的静态函数来创建的。`OnGUI`回调在列表\
  \ 9-1 中调用`GUI.Label`来绘制一个标签，传入一个`Rect`（矩形），指定标签绘制在 x,y 坐标为 5,100 的位置（UnityGUI 的坐标系中，0,0\
  \ 位于屏幕左上角），宽度和高度分别为 200 和 20 像素。第二个参数是要在标签中显示的文本。点击 Play，您应该会看到“This is a label”显示在屏幕上。\n\
  \n如果用户界面很复杂，将用户界面代码放在单个脚本回调中可能会很繁琐。但就这个简单的用户界面而言，`OnGUI`回调很方便，我们可以在此基础上构建一个极简的纯文本保龄球记分牌。让我们用列表\
  \ 9-2 的内容替换`FuguBowlScoreboard`中的单标签示例。\n\n列表 9-2. 保龄球记分牌\n\n```\n#pragma strict\n\
  \nvar style:GUIStyle; // customize the appearance\n\nfunction OnGUI() {\n      \
  \ for (var f:int=0; f<10; f++) {\n               var score:String=\"\";\n      \
  \         var roll1:int = FuguBowl.player.scores[f].ball1;\n               var roll2:int\
  \ = FuguBowl.player.scores[f].ball2;\n               var roll3:int = FuguBowl.player.scores[f].ball3;\n\
  \               switch (roll1) {\n                      case -1: score += \" \"\
  ; break;\n                      case 10: score +=\"X\"; break;\n               \
  \       default: score += roll1;\n               }\n               score+=\"/\"\
  ;\n               if (FuguBowl.player.IsSpare(f)) {\n                      score\
  \ +=\"I\";\n               } else {\n                      switch (roll2) {\n  \
  \                            case -1: score += \" \"; break;\n                 \
  \             case 10: score +=\"X\"; break;\n                              default:\
  \ score += roll2;\n                      }\n               }\n               if\
  \ (f==9) {\n                      score+=\"/\";\n                      if (10==roll2+roll3)\
  \ {\n                              score +=\"I\";\n                      } else\
  \ {\n                              switch (roll3) {\n                          \
  \           case -1: score += \" \"; break;\n                                  \
  \   case 10: score +=\"X\"; break;\n                                     default:\
  \ score += roll3;\n                              }\n                      }\n  \
  \             }\n               GUI.Label(Rect(f*30+5,5,50,20),score,style);\n \
  \              var total:int=FuguBowl.player.GetScore(f);\n               if (total\
  \ != -1) {\n                      GUI.Label(Rect(f*30+5,20,50,20),\" \"+total,style);\n\
  \               }\n       }\n}\n```\n\n新的`OnGUI`回调遍历所有十个回合，查询`FuguBowlPlayer`以获取代表每个回合的`FuguBowlScore`。在循环的底部，会执行一次或两次对`GUI.Label`的调用。第一个`GUI.Label`显示该回合每球的得分，第二个`GUI.Label`绘制在第一个下方，如果可用则显示该回合的游戏总分。\n\
  \n循环中的大部分代码用于确定每个回合的每个球要显示什么。对于`ball1`，如果尚未投掷，则要显示的`String`只是一个空格。如果投掷了全中，则显示字母“X”。否则，显示数字分数（1-9）。\n\
  \n`ball2`与`ball1`类似，不同之处在于它还显示字母“I”来表示补中。通常，我会使用斜杠字符“/”来表示补中，但这里用它来分隔`ball1`、`ball2`和`ball3`的分数。\n\
  \n只有当回合是第十回合（索引 9）时，才会构建`ball3`的`String`。`ball3`与`ball2`相同，区别在于它检查的是`ball2`和`ball3`的补中组合，而不是`ball1`和`ball2`。\n\
  \n通过调用`FuguBowlPlayer`函数`GetScore`来检索回合总分，只要分数可用（即不为-1）就显示。每个`GUI.Label`的`Rect`基于其显示的回合在屏幕上从左上角开始递增偏移（图\
